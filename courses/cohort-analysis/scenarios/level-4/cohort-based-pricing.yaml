meta:
  id: cohort-based-pricing
  level: 4
  course: cohort-analysis
  type: output
  description: "Optimize pricing using cohort analysis — measure price sensitivity by cohort, analyze pricing change impacts, and design cohort-aware pricing strategies"
  tags: [pricing, price-sensitivity, pricing-changes, cohort-economics, expert]

state: {}

trigger: |
  The VP of Product says: "We're considering a 20% price increase.
  But I'm worried about churn. Different cohorts probably have
  different price sensitivity — our earliest users got a great deal,
  newer users pay more. How do I use cohort analysis to understand
  the impact of pricing changes?"

  Task: Explain how to use cohort analysis to evaluate pricing
  changes, measure price sensitivity by cohort, and design a
  cohort-aware pricing strategy.

assertions:
  - type: llm_judge
    criteria: "Response explains analyzing price sensitivity by cohort — sensitivity: 'Price sensitivity analysis by cohort: different cohorts have different price anchors and different willingness to pay. Understanding price anchoring by cohort: early cohorts (2022 signups): original price $10/month. Have never experienced a price increase. Strong sense of value at $10. Current ARPU: $14/month (through organic upgrades). Mid cohorts (2023 signups): signed up at $15/month. Experienced one minor price adjustment. Current ARPU: $17/month. Recent cohorts (2024 signups): signed up at $20/month. No price change experience. Current ARPU: $21/month. Price sensitivity is typically inversely related to the price they are ALREADY paying. Early cohorts paying $10 are the most sensitive to increases — a $2 increase is +20% for them. Recent cohorts paying $20 are less sensitive — a $4 increase is also +20% but they already accepted the higher starting price. Measuring price sensitivity with cohort data: approach 1 — Historical price change analysis: analyze past price changes and their cohort-level impact. 2023 price increase ($10 → $15 for new signups): existing $10 cohorts were grandfathered. Net impact: no churn effect on existing cohorts. New cohort signup rate: dropped 8% initially, recovered in 3 months. 2024 plan restructure (removed the $10 plan, moved everyone to $15+): cohort-by-cohort churn impact: 2022 cohorts (forced from $10 to $15): 22% incremental churn in the first month (vs 3% normal monthly churn). 2023 cohorts (no change for them): 4% churn (slightly elevated due to negative sentiment). 2024 cohorts (signed up at $15+): 3% churn (normal). The 2022 cohorts experienced 7x normal churn — they were highly price-sensitive when their anchor price was violated'"
    weight: 0.35
    description: "Sensitivity"
  - type: llm_judge
    criteria: "Response covers modeling price increase impact and mitigation strategies — modeling: 'Modeling the proposed 20% price increase: segment the impact by cohort: 2022 cohorts (500 customers, $10-14 ARPU, moving to $12-17): predicted incremental churn: 15-20% (very price-sensitive). Revenue impact: +$1,500/month from price increase vs -$1,200/month from churn. Net: +$300/month (barely positive, high customer goodwill cost). 2023 cohorts (800 customers, $15-17 ARPU, moving to $18-20): predicted incremental churn: 8-12%. Revenue impact: +$2,400/month from price vs -$1,800/month from churn. Net: +$600/month. 2024 cohorts (1,200 customers, $20-21 ARPU, moving to $24-25): predicted incremental churn: 3-5%. Revenue impact: +$4,800/month from price vs -$1,200/month from churn. Net: +$3,600/month. Total projected impact: +$4,500/month net revenue. But 2022 cohort loyalty damage is disproportionate. Mitigation strategies: Strategy 1 — Cohort-tiered pricing: grandfather early cohorts at their current price (or a smaller increase). Apply the full increase only to new signups and recent cohorts. 2022 cohorts: no increase (loyalty reward). 2023 cohorts: 10% increase (moderate). 2024 cohorts: 15% increase. New signups: 20% increase (new anchor). This preserves loyalty while capturing value from less-sensitive cohorts. Strategy 2 — Value-add increase: pair the price increase with a meaningful feature release. Announce: we are adding collaboration features, advanced reporting, and mobile app improvements. The new price reflects the expanded product. This reframes the increase as a value exchange, not a price gouge. Strategy 3 — Phased rollout: increase prices for new signups immediately (zero churn risk). Increase for the 2024 cohort in 60 days (with advance notice). Increase for the 2023 cohort in 120 days. Evaluate 2022 cohort separately based on results. Measure churn impact at each phase before proceeding to the next'"
    weight: 0.35
    description: "Modeling"
  - type: llm_judge
    criteria: "Response covers cohort-based pricing optimization framework — framework: 'Cohort-based pricing optimization framework: beyond the price increase — ongoing pricing intelligence: 1. Track willingness to pay by cohort: for each cohort vintage, calculate: conversion rate at each price point. Upgrade rate (free to paid, basic to pro). Downgrade rate after price changes. Price elasticity: percentage change in quantity demanded / percentage change in price. Example: 2022 cohorts price elasticity: -2.5 (highly elastic — 1% price increase causes 2.5% demand decrease). 2024 cohorts: -0.8 (inelastic — price increases have limited impact on demand). 2. Feature-based pricing cohort analysis: analyze which features each cohort values most: 2022 cohorts use collaboration heavily (it was their original value prop). 2024 cohorts use reporting and integrations more (newer features). Design pricing tiers aligned with cohort feature preferences. Consider: a collaboration-focused tier for early cohorts and an analytics-focused tier for newer cohorts. 3. Annual vs monthly pricing cohort analysis: annual subscribers by cohort vintage: 2022 cohorts: 60% annual (locked in, low churn). 2023 cohorts: 45% annual. 2024 cohorts: 30% annual. Offer annual pricing at a 15-20% discount to lock in price-sensitive cohorts. This reduces churn risk from future price increases. 4. Pricing experiment design: A/B test pricing for NEW cohorts only (no risk to existing customers). Test: control at $20 vs variant at $24 vs variant at $28. Measure: signup conversion, M3 retention, M6 LTV. Finding: $24 reduces signups by 5% but increases LTV by 15% (higher-quality users). $28 reduces signups by 20% and LTV by 5% (too aggressive). Optimal price: $24 (best LTV:CAC ratio). For the VP of Product: implement cohort-tiered pricing with the smallest increase for the oldest cohorts. Pair with a value-add feature launch. Run a pricing A/B test on new signups before adjusting existing customers. Monitor churn by cohort weekly during the rollout'"
    weight: 0.30
    description: "Framework"
