meta:
  id: cohort-alerting-systems
  level: 4
  course: cohort-analysis
  type: output
  description: "Design cohort alerting systems — build intelligent alerts that detect retention shifts, distinguish signal from noise, and reduce alert fatigue across the organization"
  tags: [alerting, signal-detection, alert-fatigue, intelligent-alerts, expert]

state: {}

trigger: |
  The VP of Product says: "We set up Slack alerts for retention changes
  but now we get 15 alerts a day. Most are noise — small fluctuations
  that don't mean anything. The team started ignoring all alerts and
  we missed a real retention drop last week. How do we build alerts
  that actually matter?"

  Task: Design an intelligent cohort alerting system that separates
  signal from noise, prioritizes actionable alerts, and prevents
  alert fatigue.

assertions:
  - type: llm_judge
    criteria: "Response covers intelligent alert design and noise reduction — design: 'Intelligent cohort alert design: why current alerts fail: static thresholds (alert if retention drops below 30%) generate too many alerts because: day-to-day retention naturally fluctuates by 2-3pp. Weekly seasonality causes predictable dips (weekends). Small cohorts have high variance (a cohort of 50 users can swing 10pp from random chance alone). Building smarter alerts: Principle 1 — Dynamic thresholds based on historical variance: instead of a fixed threshold, calculate what is normal for this specific metric, this cohort size, and this day of week. Example: month-1 retention for organic users. Historical mean: 38%, standard deviation: 2.5pp. Monday baseline: 36% (Mondays are always lower). A reading of 34% on Monday is within normal range (36% - 2.5pp). A reading of 30% on Monday is 2.4 sigma below the Monday baseline — this is a real signal. Principle 2 — Cohort-size-adjusted sensitivity: large cohorts (1,000+ users): alert on 2pp deviation (high precision, even small shifts are meaningful). Medium cohorts (200-1,000): alert on 4pp deviation. Small cohorts (under 200): alert on 8pp deviation or suppress entirely. This prevents small cohorts from generating noisy alerts while ensuring large cohorts get sensitive monitoring. Principle 3 — Trend-based alerts (not point-based): instead of alerting on a single data point, alert on trends. Single point alert: month-1 retention for March is 31% (below the 33% threshold) → alert. Trend alert: month-1 retention has declined for 3 consecutive cohorts (35% → 33% → 31%) → alert. The trend alert is more actionable because it indicates a persistent issue, not a one-time fluctuation. Require 2-3 consecutive data points outside bounds before alerting'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers alert prioritization and routing — prioritization: 'Alert prioritization and routing: four-tier alert system: Tier 1 — Critical (immediate action required): criteria: month-1 retention drops more than 3 sigma OR below an absolute business threshold (e.g., below 25%). Revenue impact exceeds $10K/month. Multiple segments affected simultaneously. Routing: PagerDuty to on-call analyst + Slack to leadership channel. Expected response: investigation within 2 hours, status update within 4 hours. Example: month-1 retention dropped from 38% to 26% across all channels — likely a product issue affecting all new users. Tier 2 — Warning (investigate within 24 hours): criteria: retention drops 2-3 sigma or declines for 2+ consecutive cohorts. Single segment affected (one channel or one geography). Routing: Slack to analytics team channel. Expected response: analyst reviews within 24 hours, reports findings. Example: paid social month-1 retention dropped from 18% to 12% — acquisition quality issue in one channel. Tier 3 — Informational (review weekly): criteria: metric is 1-2 sigma from baseline. Small or medium cohort with high variance. Routing: included in weekly digest email. Expected response: analyst reviews during weekly data review meeting. Example: APAC cohort month-3 retention is 3pp below average but the cohort only has 80 users — could be noise. Tier 4 — Suppressed (logged only): criteria: known issue already being addressed. Metric within 1 sigma of baseline. Seasonal pattern already documented. Routing: logged to monitoring database, not sent to any channel. Alert deduplication: if the same issue triggers alerts across multiple cohorts or metrics, consolidate into a single alert with all affected dimensions listed. Example: instead of 5 separate alerts (one per affected cohort), send one alert: retention dropped across 5 recent cohorts — likely a systematic issue'"
    weight: 0.35
    description: "Prioritization"
  - type: llm_judge
    criteria: "Response covers alert lifecycle management and continuous improvement — lifecycle: 'Alert lifecycle management: every alert follows a lifecycle: fired → acknowledged → investigated → resolved or suppressed. Alert lifecycle tracking: 1. Fired: system detects anomaly and routes alert. Metadata: timestamp, metric, cohort, severity, threshold, actual value. 2. Acknowledged: analyst marks the alert as seen. SLA: tier 1 within 30 minutes, tier 2 within 4 hours. 3. Investigated: analyst performs root cause analysis. Records: initial hypothesis, data examined, findings. 4. Resolved: one of three outcomes: true positive — action taken (e.g., rolled back deploy, paused campaign). Expected result: metric recovers within N days. False positive — threshold adjustment needed. Analyst adjusts the alert configuration. Known issue — suppressed for N days while the team works on a fix. Alert accuracy tracking: track monthly: total alerts fired by tier. True positive rate (target: above 80% for tier 1, above 60% for tier 2). Mean time to acknowledge. Mean time to resolve. False positive rate by alert type. Continuous improvement cycle: monthly alert review: 1. Which alerts were false positives? Adjust their thresholds or reclassify to a lower tier. 2. Which issues were MISSED (no alert fired)? Add new alert rules or lower thresholds. 3. Which alerts had the highest business impact? Ensure they are at the right tier. 4. Are any alert categories generating chronic noise? Consider suppressing or redesigning them. Alert configuration as code: store all alert definitions in version-controlled YAML: alert: month_1_retention_drop. metric: retention_rate. filter: period_offset = 1. method: dynamic_threshold. sensitivity: 2_sigma. min_cohort_size: 200. consecutive_points: 2. tier: 2. routing: slack:#analytics-alerts. Version-controlled configs allow: review and approval of alert changes. Rollback if a config change causes alert storms. Audit trail of why thresholds were set. For the VP of Product: reduce alerts from 15/day to 2-3/day by implementing dynamic thresholds and cohort-size-adjusted sensitivity. Route tier 1 to PagerDuty, tier 2 to Slack, tier 3 to weekly digest. Track alert accuracy monthly and continuously tune. The team will trust alerts again because they will be actionable, not noise'"
    weight: 0.30
    description: "Lifecycle"
