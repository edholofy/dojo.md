meta:
  id: cohort-data-architecture
  level: 4
  course: cohort-analysis
  type: output
  description: "Design cohort data architecture — build dimensional models, define cohort semantics, and create reusable cohort data assets for the analytics organization"
  tags: [data-architecture, dimensional-modeling, semantic-layer, data-assets, expert]

state: {}

trigger: |
  The Head of Data Engineering says: "Every analyst builds their own
  cohort queries from scratch. They use different definitions of
  'active', different cohort boundaries, and get different numbers.
  I need a cohort data architecture that gives everyone consistent,
  trustworthy cohort data without reinventing the wheel."

  Task: Design a cohort data architecture with consistent definitions,
  dimensional models, and reusable data assets.

assertions:
  - type: llm_judge
    criteria: "Response covers cohort semantic layer and definition standardization — semantics: 'Cohort semantic layer — standardizing definitions: the root cause of inconsistent cohort numbers: analyst A defines active as logged in at least once. Analyst B defines active as performed a core action. Analyst A assigns users to monthly cohorts by UTC date. Analyst B uses the user's local timezone. These definitional differences create conflicting numbers from the same data. Building the cohort semantic layer: Definition 1 — Cohort assignment: rule: a user's cohort is determined by their signup date in UTC, assigned to the calendar month of signup. Edge case: users who sign up on the last day of the month (e.g., January 31 11:59 PM UTC) are in the January cohort, not February. Implementation: cohort_month = DATE_TRUNC('month', signup_date_utc). This is computed once at signup and stored as a user attribute. Definition 2 — Active: primary definition (DAU/MAU): a user is active on day D if they triggered any server-side event on day D. Alternative definitions (clearly labeled): core active: performed a core product action (created task, sent message, made purchase). Revenue active: generated revenue (made a payment, subscription renewed). Login active: opened the app or logged in. Each definition has a specific use case. The primary definition is the default. Definition 3 — Retention: a user is retained in period P if they were active at least once during period P. Period P is defined as: monthly: the calendar month that is P months after the user's cohort_month. Weekly: the 7-day window starting P×7 days after the user's signup date. Lifecycle-based (preferred for precision): the P-th 30-day window after the individual user's signup date. Definition 4 — Churn: a user is churned if they have had zero activity for 30+ consecutive days. Churn date = last activity date + 30 days. A churned user can be reactivated if they perform any activity after the churn date. All definitions are documented in a data dictionary and versioned. Changes to definitions require a review process and trigger recalculation of historical cohort data'"
    weight: 0.35
    description: "Semantics"
  - type: llm_judge
    criteria: "Response covers dimensional model design — dimensional: 'Dimensional model for cohort analysis: the cohort data warehouse follows a star schema optimized for analytical queries. Fact tables: 1. fact_user_daily_activity: grain: one row per user per active day. Columns: user_id, activity_date, cohort_month, session_count, events_count, revenue, core_actions_count. Built daily via incremental ETL from raw event data. This is the foundational fact table — all cohort queries derive from it. 2. fact_cohort_retention: grain: one row per cohort × period × segment. Columns: cohort_month, period_offset, segment_key, cohort_size, active_count, retention_rate, revenue, cumulative_revenue_per_user. Pre-aggregated from fact_user_daily_activity. Updated daily (only the latest period for each cohort changes). This is the table that powers dashboards — queries are instant because aggregation is pre-computed. Dimension tables: 1. dim_user: user_id, signup_date, cohort_month, acquisition_channel, geography, plan_type, initial_utm_source. Slowly changing dimension type 2 for plan changes. 2. dim_date: date, week_number, month, quarter, year, is_holiday, day_of_week. 3. dim_segment: segment_key, channel, geography, plan_type, engagement_tier. Pre-built segment combinations for fast filtering. Conformed dimensions: cohort_month is a conformed dimension across all fact tables. Any metric can be broken down by cohort using a simple JOIN on cohort_month. Materialized views: mv_cohort_heatmap: the retention triangle, refreshed daily. mv_cohort_trends: sparkline data for key metrics, refreshed daily. mv_cohort_ltv: cumulative revenue per user by cohort, refreshed daily. These views serve the dashboard layer and answer 90% of cohort questions in under 1 second'"
    weight: 0.35
    description: "Dimensional"
  - type: llm_judge
    criteria: "Response covers reusable data assets and governance — governance: 'Reusable cohort data assets and governance: self-service cohort toolkit: 1. Certified cohort metrics: a library of pre-built, validated metrics that analysts can use without writing SQL. Metric catalog: month_1_retention(cohort, segment) — returns month-1 retention for any cohort and segment combination. cumulative_ltv(cohort, month) — returns per-user cumulative LTV. churn_rate(cohort, period) — returns churn rate for a specific period. nrr(cohort, period) — net revenue retention. Each metric has: SQL definition (version-controlled). Unit tests (expected output for known inputs). Owner (the analyst responsible for correctness). Last validation date. 2. Cohort builder UI: a no-code interface where product managers and marketers can: define custom behavioral cohorts (users who did X in their first 7 days). Compare cohorts on standard metrics (retention, LTV, feature adoption). Export cohort user lists for targeting campaigns. The builder queries the pre-aggregated fact tables for speed. Data governance: 1. Change management: any change to a core definition (active, churn, cohort assignment) requires: RFC document explaining the change and its impact. Recalculation of all affected historical metrics. Communication to all downstream consumers. 2. Data quality SLAs: fact_user_daily_activity refreshed by 6 AM daily. Retention data accurate within 1% (validated against raw events weekly). Dashboard latency: under 3 seconds for any standard query. 3. Access control: raw user-level data: restricted to data team. Aggregated cohort data (10+ users per cell): available to all analysts. Individual user lookup: requires privacy review. 4. Lineage tracking: every dashboard metric traces back through: dashboard → materialized view → fact table → raw events. When a number looks wrong, anyone can trace the full lineage to find the issue. For the Head of Data Engineering: build the semantic layer first (definitions), then the dimensional model, then the self-service toolkit. This eliminates the inconsistent numbers problem and reduces analyst time spent writing cohort queries by 80%'"
    weight: 0.30
    description: "Governance"
