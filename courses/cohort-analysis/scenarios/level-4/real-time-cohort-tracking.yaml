meta:
  id: real-time-cohort-tracking
  level: 4
  course: cohort-analysis
  type: output
  description: "Build real-time cohort tracking — design streaming cohort computations, live dashboards, and early warning systems for instant retention visibility"
  tags: [real-time, streaming, live-dashboard, early-warning, expert]

state: {}

trigger: |
  The CTO says: "Our cohort data is always 24-48 hours stale. When
  we ship a broken update, we don't see the retention impact for two
  days. I want real-time cohort tracking that shows me retention
  impact within hours of a deployment. Is this even possible?"

  Task: Explain how to build real-time cohort tracking with streaming
  computation, live dashboards, and deployment impact detection.

assertions:
  - type: llm_judge
    criteria: "Response explains real-time cohort architecture — architecture: 'Real-time cohort tracking architecture: traditional cohort pipelines are batch-based (daily ETL → warehouse → dashboard). Real-time cohort tracking requires a streaming architecture. Streaming cohort pipeline: Layer 1 — Event ingestion: all user events flow through a message queue (Kafka, Kinesis). Events tagged with: user_id, timestamp, event_type, cohort_month, session_id. Volume: 10K-100K events/second for a mid-size product. Layer 2 — Stream processing (Flink, Spark Streaming, or Materialize): maintain running state per user: last activity timestamp, session count, cohort membership. Compute rolling retention metrics: for each cohort, how many distinct users were active in the last 1/4/24 hours? Use tumbling windows (1-hour buckets) for aggregation. Layer 3 — Real-time serving (Redis, Druid, or Pinot): store pre-computed metrics for sub-second dashboard queries. Metrics updated every minute or on each event. Layer 4 — Live dashboard (Grafana, custom React dashboard): real-time retention curves updating every 5 minutes. Deployment markers on the timeline. Color-coded alerts when metrics deviate from baseline. What real-time means for cohort metrics: hourly retention proxy: for today's cohort (users who signed up today), what percentage returned within: 1 hour: 40% (quick re-engagement). 4 hours: 50%. 24 hours: 55%. This is NOT month-1 retention — it is an early proxy. Historical correlation: if 1-hour return rate drops below 35%, month-1 retention typically drops by 3-5pp. Calibration: build a model mapping hourly engagement signals to monthly retention predictions. Update the model weekly as more data validates predictions'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers deployment impact detection — deployment: 'Deployment impact detection: detecting retention impact within hours of a release: Step 1 — Baseline establishment: for each hour of each day of the week, calculate the expected user activity level. Monday 2 PM baseline: 5,000 active users (±500). Account for: day of week, time of day, seasonality, and any scheduled events. Step 2 — Deploy and monitor: mark the deployment timestamp. For each cohort active at the time of deployment: track hourly active users vs baseline. Track error rates, session duration, and key action completion rates. Step 3 — Impact detection: compare post-deploy metrics to the pre-deploy baseline. Detection windows: 1 hour post-deploy: can detect catastrophic issues (crashes, login failures). Signal: active users drop 20%+ below baseline. Confidence: high if the drop is immediate and large. 4 hours post-deploy: can detect significant UX issues (confusion, broken workflows). Signal: session duration drops 15%+, key action completion drops 10%+. Confidence: moderate (some noise from daily patterns). 24 hours post-deploy: can detect moderate retention impact. Signal: daily return rate drops 5pp+ below the trailing average. Confidence: high (full daily cycle observed). Example detection: deployment at 2 PM: active users baseline: 5,000. 3 PM: 4,200 (16% below baseline — warning threshold). 4 PM: 3,800 (24% below baseline — alert threshold). Alert triggered: post-deploy activity drop detected. New signup cohort hourly return rate: 30% (baseline: 42%). Alert: new user engagement significantly impacted by the deployment. Action: investigate immediately, prepare to rollback if the trend continues at 5 PM'"
    weight: 0.35
    description: "Deployment"
  - type: llm_judge
    criteria: "Response covers operational considerations and trade-offs — operations: 'Operational considerations and trade-offs: trade-off 1 — Accuracy vs speed: batch cohort data (daily): highly accurate, complete day's data processed. Real-time cohort data (streaming): approximate, may have late-arriving events. Solution: use real-time for alerting and monitoring, batch for reporting and analysis. Reconcile daily: compare real-time estimates to batch-computed actuals. Track the delta — if real-time consistently overestimates retention by 2pp, apply a correction factor. Trade-off 2 — Cost vs latency: streaming infrastructure costs 3-5x more than batch-only. Justify by calculating the cost of delayed detection: if a broken deploy goes undetected for 48 hours and affects 10,000 users, and 5% of those users churn permanently: 500 users × $100 LTV = $50,000 lost per incident. If real-time detection reduces detection time to 4 hours: only 2,000 users affected, 100 churn permanently = $10,000 lost. Savings per incident: $40,000. Break-even: if streaming costs $3K/month and incidents occur quarterly, ROI is positive. Trade-off 3 — Complexity vs reliability: streaming systems are more complex to operate than batch pipelines. Require: on-call engineering support, monitoring of the monitoring system, graceful handling of event processing lag. Recommendation: start simple — hourly batch micro-batches can achieve 1-hour latency without full streaming complexity. Move to true streaming only if hourly granularity is insufficient. Operational playbook: 1. Deploy dashboard: integrate with CI/CD pipeline, auto-create deployment markers. 2. Runbook: when alert fires, engineer checks dashboard, compares to deployment changelog. 3. Rollback criteria: if active users are 15%+ below baseline for 2+ hours post-deploy, auto-rollback. 4. Post-incident review: analyze which cohorts were most affected, estimate retention impact, update baseline models. For the CTO: start with hourly micro-batches (80% of the benefit at 20% of the complexity). Add deployment markers to existing dashboards. Set up automated alerts for post-deploy metric drops. Invest in full streaming only if hourly granularity proves insufficient'"
    weight: 0.30
    description: "Operations"
