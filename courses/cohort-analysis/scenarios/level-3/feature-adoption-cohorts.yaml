meta:
  id: feature-adoption-cohorts
  level: 3
  course: cohort-analysis
  type: output
  description: "Track feature adoption across cohorts — measure how quickly new features are adopted by different cohorts and whether adoption drives improved outcomes"
  tags: [feature-adoption, release-impact, adoption-curves, product-development, advanced]

state: {}

trigger: |
  The Head of Product says: "We ship features every two weeks but we
  never properly measure adoption. I want to track how each feature
  spreads through our user base — both new and existing users. Do
  newer cohorts adopt features faster? Does feature adoption actually
  improve their outcomes?"

  Task: Explain how to build feature adoption cohort analyses that
  track adoption curves and connect feature usage to user outcomes.

assertions:
  - type: llm_judge
    criteria: "Response explains feature adoption tracking methodology — methodology: 'Feature adoption cohort analysis: measuring how features spread: framework: for each feature release, track adoption across two dimensions: time since the feature launched (calendar-based adoption curve) and time since the user signed up (lifecycle-based adoption). Calendar-based adoption curve (feature-centric): track cumulative adoption over time since launch. Example — collaboration feature launched March 1: week 1: 5% of all active users tried it. Week 2: 12%. Week 4: 22%. Week 8: 30%. Week 12: 35% (adoption plateaus). The S-curve shape reveals adoption velocity: early adopters (0-2 weeks): power users, typically 5-10% of users. Early majority (2-8 weeks): mainstream users, 15-25%. Late majority (8-16 weeks): slower adopters, 5-10%. Laggards (16+ weeks): may never adopt. Lifecycle-based adoption (cohort-centric): how does adoption differ by user cohort? Pre-launch cohorts (existing users, signed up before March): week 1 adoption: 3%, week 4: 15%, week 12: 25%. Post-launch cohorts (new users, signed up after March): week 1 after SIGNUP: 20%, week 4: 35%, week 12: 45%. Key finding: new users adopt the feature at 2x the rate of existing users. Why? New users encounter the feature during onboarding when they are exploring. Existing users have established workflows and are less likely to change. Implication: if the feature improves retention, its impact will show more strongly in post-launch cohorts. The feature effectively creates two different products — one experienced by pre-launch cohorts and one by post-launch cohorts'"
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Response covers measuring feature impact on retention by cohort — impact: 'Measuring feature impact on retention: Step 1 — Compare adopters vs non-adopters within the same cohort: March cohort (post-launch, 1,000 signups): collaboration adopters (350 users): month-3 retention 52%. Non-adopters (650 users): month-3 retention 28%. Retention gap: +24pp for adopters. But beware selection bias — users who adopt new features may be inherently more engaged. Step 2 — Control for engagement level: segment by pre-feature engagement: high engagement + adopted: 65% retention. High engagement + did not adopt: 48% retention. Adoption gap for high-engagement users: +17pp. Low engagement + adopted: 35% retention. Low engagement + did not adopt: 12% retention. Adoption gap for low-engagement users: +23pp. The feature helps low-engagement users MORE (23pp vs 17pp). This suggests the feature genuinely provides value — it is not just a proxy for engagement. Step 3 — Compare pre-launch vs post-launch cohorts at the same lifecycle point: January cohort (pre-launch) at month 3: 30% retention. March cohort (post-launch) at month 3: 38% retention. Improvement: +8pp. But channel mix and other factors may differ. Control by channel: organic January M3: 35%, organic March M3: 44% (+9pp). Paid January M3: 22%, paid March M3: 28% (+6pp). Improvement is consistent across channels, supporting that the feature drove the gain. Step 4 — Track the feature's impact over time: does the adoption gap persist or narrow? Month 1: adopters 60% vs non-adopters 42% (18pp gap). Month 3: adopters 52% vs non-adopters 28% (24pp gap). Month 6: adopters 40% vs non-adopters 18% (22pp gap). The gap persists and even widens at month 3, suggesting the feature provides lasting value, not just a novelty spike'"
    weight: 0.35
    description: "Impact"
  - type: llm_judge
    criteria: "Response covers feature portfolio analysis and prioritization — portfolio: 'Feature portfolio analysis — which features to build next: build a feature impact scorecard: Feature | adoption rate | retention gap | time to adopt | development cost. Collaboration: 35% | +24pp | 2 weeks | 3 months dev. Calendar sync: 22% | +18pp | 1 week | 1 month dev. Mobile app: 40% | +15pp | 3 days | 4 months dev. Templates: 28% | +8pp | 1 day | 2 weeks dev. Reporting: 20% | +22pp | 4 weeks | 2 months dev. Impact score = adoption rate × retention gap: collaboration: 35% × 24 = 8.4 (highest). Mobile: 40% × 15 = 6.0. Reporting: 20% × 22 = 4.4. Calendar: 22% × 18 = 4.0. Templates: 28% × 8 = 2.2. Efficiency score = impact / development cost (months): calendar: 4.0 / 1 = 4.0 (best ROI). Templates: 2.2 / 0.5 = 4.4 (also high ROI). Collaboration: 8.4 / 3 = 2.8. Reporting: 4.4 / 2 = 2.2. Mobile: 6.0 / 4 = 1.5. For the Head of Product: high-impact, high-efficiency: calendar sync and templates should be enhanced further. High-impact, lower-efficiency: collaboration and reporting are worth the investment for their impact. Lower-impact: mobile is widely adopted but has a smaller retention gap — it supports retention but does not drive it. Feature adoption monitoring dashboard: track weekly: adoption rate for each feature by signup cohort (are newer cohorts adopting faster?). Retention gap by feature (is the gap stable, growing, or shrinking?). Time to first use (is the product surfacing features effectively?). Cross-feature adoption (which feature combinations predict the best outcomes?). Alert on: adoption rate declining for a feature (UI regression? competitor alternative?). Retention gap narrowing (feature losing its differentiation value?)'"
    weight: 0.30
    description: "Portfolio"
