meta:
  id: reactivation-strategy-optimization
  level: 3
  course: cohort-analysis
  type: output
  description: "Optimize reactivation strategies using cohorts — design multi-channel win-back programs, measure incremental lift, and maximize ROI on churned user re-engagement"
  tags: [reactivation-optimization, win-back, incremental-lift, multi-channel, advanced]

state: {}

trigger: |
  The VP of Marketing says: "We spend $50K/month on win-back campaigns
  but I have no idea if it's working. Some users would have come back
  anyway. How do I measure the true incremental impact of our win-back
  efforts and optimize the strategy using cohort analysis?"

  Task: Explain how to measure incremental lift from reactivation
  campaigns, design a holdout-based measurement framework, and
  optimize the win-back strategy using cohort data.

assertions:
  - type: llm_judge
    criteria: "Response explains incremental lift measurement with holdout groups — measurement: 'Measuring incremental lift from win-back campaigns: the fundamental problem: if 1,000 churned users receive a win-back email and 100 return, the campaign did NOT reactivate 100 users. Some would have returned organically. Incremental lift = campaign returns minus organic returns. Holdout-based measurement: randomly split churned users into treatment (90%) and holdout (10%). Treatment group: receives the win-back campaign. Holdout group: receives nothing (or a neutral message). Example results: treatment group (4,500 users): 450 returned (10.0% reactivation rate). Holdout group (500 users): 25 returned (5.0% reactivation rate). Incremental reactivation rate: 10.0% - 5.0% = 5.0%. Incremental users: 4,500 × 5.0% = 225 users. Of the 450 who returned, only 225 were caused by the campaign — the other 225 would have returned anyway. True campaign efficiency: incremental users (225) / total campaign cost ($50K) = $222 per incremental reactivation. If each reactivated user generates $40 in revenue over 3 months: incremental revenue: 225 × $40 = $9,000. Campaign cost: $50K. ROI: -$41K (the campaign is actually losing money). Critical insight: without a holdout group, the campaign appeared to reactivate 450 users generating $18K in revenue against $50K spend (still negative). With the holdout, the true picture is even worse. Holdout group sizing: too small (under 5%): noisy estimates of organic return rate. Too large (over 20%): leaving revenue on the table if the campaign does work. 10% holdout is a standard balance for win-back measurement'"
    weight: 0.35
    description: "Measurement"
  - type: llm_judge
    criteria: "Response covers cohort-based optimization of win-back targeting — optimization: 'Optimizing win-back targeting using cohort data: not all churned users are equally worth reactivating. Use cohort analysis to identify which churned users to target. Dimension 1 — Inactivity duration cohorts: 30-45 day inactive: 12% organic return, 22% with campaign (+10pp lift). 46-90 day inactive: 5% organic return, 9% with campaign (+4pp lift). 91-180 day inactive: 2% organic return, 3% with campaign (+1pp lift). 180+ day inactive: 0.5% organic return, 0.8% with campaign (+0.3pp lift). Incremental lift decreases sharply with inactivity duration. Reallocate budget: spend 60% on 30-45 day cohort (highest lift), 30% on 46-90 day, 10% on 91-180 day. Stop targeting 180+ day churners (near-zero incremental return). Dimension 2 — Pre-churn engagement level: highly engaged before churn (20+ sessions/month): 18% organic return, 30% with campaign (+12pp lift). Moderately engaged (5-19 sessions): 6% organic return, 12% with campaign (+6pp lift). Low engagement (1-4 sessions): 2% organic return, 3% with campaign (+1pp lift). Formerly high-engagement users respond best to win-back. They experienced value before and can be reminded. Low-engagement churners barely respond — they never found value in the first place. Dimension 3 — Reason for churn (if known): pricing concern: 15% lift with discount offer. Feature gap: 8% lift when the missing feature ships. Poor experience/bug: 20% lift with apology + fix notification. Natural fade: 3% lift regardless of message. Optimized targeting matrix: target highest-lift segments first: recent churn + high engagement + known reason = maximum ROI. Exclude: long-dormant + low engagement = near-zero incremental return'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers multi-channel strategy and post-reactivation cohort tracking — strategy: 'Multi-channel win-back strategy and post-reactivation tracking: multi-channel sequencing: instead of a single email, design a sequenced multi-channel campaign: Day 30 (inactivity trigger): email — personalized content showing what they missed. Day 37 (if no return): push notification — highlighting a new feature relevant to their usage pattern. Day 45 (if no return): SMS — personal message from customer success. Day 60 (if no return): retargeting ad — social media display ad. Day 90 (final attempt): email — honest ask with a special offer. Test each channel incrementally: add channels one at a time to the sequence. Measure incremental lift of each additional channel. Results: email alone: +5pp lift, cost per incremental return $222. Email + push: +7pp lift, cost per incremental return $185. Email + push + SMS: +8.5pp lift, cost per incremental return $210. Email + push + SMS + retargeting: +9pp lift, cost per incremental return $280. The optimal sequence is email + push (best cost efficiency). Adding SMS provides marginal lift at similar cost. Retargeting is expensive relative to incremental lift — cut it. Post-reactivation cohort tracking: the real test is whether reactivated users STAY. Track reactivation cohorts separately: R+1 retention by segment: campaign-reactivated users: 22%. Organic returners: 35%. New users: 40%. Campaign-reactivated users retain worst because many came back for the incentive, not the product. Track R+3 and R+6 retention: if it drops below 5%, the campaign is creating temporary returns, not lasting re-engagement. For the VP of Marketing: reduce win-back spend from $50K to $20K by cutting low-ROI segments and channels. Focus on 30-60 day churners who were highly engaged. Use email + push sequence (cut retargeting). Implement holdout measurement permanently. Track post-reactivation retention — if reactivated users do not stick, the campaign is wasting money regardless of initial reactivation numbers'"
    weight: 0.30
    description: "Strategy"
