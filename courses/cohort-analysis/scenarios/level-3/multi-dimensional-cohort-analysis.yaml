meta:
  id: multi-dimensional-cohort-analysis
  level: 3
  course: cohort-analysis
  type: output
  description: "Perform multi-dimensional cohort analysis — combine time, behavior, channel, and product dimensions to uncover interaction effects and compound insights"
  tags: [multi-dimensional, interaction-effects, cross-tabulation, compound-analysis, advanced]

state: {}

trigger: |
  The Chief Product Officer says: "I've seen single-dimension cohort
  analyses — by signup month, by channel, by behavior. But I want to
  see the interactions. Do paid users who complete onboarding retain
  differently than organic users who complete onboarding? How do I
  analyze cohorts across multiple dimensions simultaneously?"

  Task: Explain how to perform multi-dimensional cohort analysis
  combining time, behavior, channel, and product dimensions.

assertions:
  - type: llm_judge
    criteria: "Response explains multi-dimensional cohort design — design: 'Multi-dimensional cohort analysis: designing the analysis: single-dimension analysis examines one factor at a time: by signup month (time cohort), by channel (acquisition cohort), or by behavior (behavioral cohort). Multi-dimensional analysis examines combinations. The CPO wants to know: does the INTERACTION between dimensions matter? Example: completing onboarding improves retention for everyone, but does it help organic users MORE than paid users? Setting up the dimensional framework: Dimension 1 — Time: Q1, Q2, Q3, Q4. Dimension 2 — Channel: organic, paid search, paid social, referral. Dimension 3 — Behavior: completed onboarding vs did not complete. Dimension 4 — Product: free plan vs paid plan. Full cross-tabulation: 4 × 4 × 2 × 2 = 64 cells. But many cells will have too few users. Practical approach: start with 2-dimensional analysis (the most impactful pair). Expand to 3 dimensions only where the 2D analysis suggests interaction effects. 2-dimensional example — channel × behavior: organic + completed onboarding (400 users): M3 retention 55%. Organic + did not complete (200 users): M3 retention 18%. Paid search + completed onboarding (250 users): M3 retention 42%. Paid search + did not complete (350 users): M3 retention 10%. Paid social + completed onboarding (100 users): M3 retention 30%. Paid social + did not complete (500 users): M3 retention 5%. Key findings: onboarding completion improves retention for ALL channels. The improvement is largest for organic users (+37pp) and smallest for paid social (+25pp). Paid social users who complete onboarding (30%) still retain worse than organic users who do NOT complete onboarding (18%). This suggests paid social user quality is fundamentally lower — onboarding cannot fully compensate'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers interaction effects and statistical considerations — interactions: 'Detecting and interpreting interaction effects: an interaction effect exists when the combined effect of two factors is different from the sum of their individual effects. Testing for interactions: if onboarding adds +20pp retention regardless of channel: no interaction (additive effects). Organic baseline: 18%, with onboarding: 38% (+20pp). Paid social baseline: 5%, with onboarding: 25% (+20pp). If onboarding adds +37pp for organic but only +25pp for paid social: interaction exists. The effect of onboarding depends on the channel. Interpreting the interaction: the CPO should not assume that investing in onboarding will equally help all acquisition channels. Organic users respond most to onboarding — possibly because they have higher intent and just need guidance. Paid social users respond less — they may be less committed regardless of onboarding quality. Statistical considerations for multi-dimensional analysis: 1. Sample size per cell: each cell in the multi-dimensional table needs sufficient users for reliable estimates. Rule of thumb: minimum 100 users per cell. With 64 cells (4 time × 4 channel × 2 behavior × 2 plan), you need 6,400+ total users. If any cell has fewer than 50 users, collapse dimensions (e.g., merge Q1 and Q2 into H1). 2. Multiple comparisons: with 64 cells, some will show differences by chance. Apply a correction when claiming statistical significance (e.g., Bonferroni: divide significance threshold by number of comparisons). 3. Confounding: channel and behavior are not independent — organic users may be more likely to complete onboarding. Control for this by examining within-channel onboarding effects. 4. Visualization: a 64-cell table is unreadable. Use heatmaps, faceted charts, or interactive dashboards. Show the 2D cross-tabs as separate panels (one per time period)'"
    weight: 0.35
    description: "Interactions"
  - type: llm_judge
    criteria: "Response covers practical workflow and actionable insights — workflow: 'Practical multi-dimensional cohort workflow: Step 1 — Start with the primary dimension (usually time): build a standard time-based retention triangle. Identify the overall trend (improving, flat, declining). Step 2 — Add the most impactful second dimension: test each candidate second dimension: channel × time, behavior × time, plan × time. For each, calculate the variance explained — which dimension creates the largest retention spread? Example: adding channel splits retention into 18-45% range (27pp spread). Adding behavior splits into 8-55% range (47pp spread). Adding plan splits into 12-50% range (38pp spread). Behavior creates the widest spread — it is the most predictive dimension. Step 3 — Test for interactions: for the top two dimensions (behavior + channel), check if the effect of behavior varies by channel. If interaction exists, the CPO needs dimension-specific strategies. Step 4 — Build the insight pyramid: Level 1 (broadest): overall retention trend (for the board). Level 2 (segmented): retention by channel and by behavior (for the product team). Level 3 (interaction): channel × behavior interactions (for specific teams). Level 4 (deep dive): individual cells (only when investigating specific hypotheses). Actionable output for the CPO: 1. Invest in onboarding optimization — it has the largest impact on retention across all channels. 2. Focus onboarding investment on organic and paid search users (highest ROI). 3. For paid social: improving onboarding helps but cannot overcome the fundamental quality gap. Either improve targeting or reduce spend. 4. Track the onboarding completion rate by channel weekly — if it drops for any channel, investigate immediately. 5. The Q3 cohorts show stronger interaction effects than Q1 — investigate whether seasonality affects how users respond to onboarding'"
    weight: 0.30
    description: "Workflow"
