meta:
  id: product-engagement-cohorts
  level: 3
  course: cohort-analysis
  type: output
  description: "Build product engagement cohorts — track feature adoption, usage depth, and engagement intensity by cohort to identify the features that drive retention"
  tags: [engagement-cohorts, feature-adoption, usage-depth, product-analytics, advanced]

state: {}

trigger: |
  The VP of Product says: "We have 15 features but I don't know which
  ones actually matter for retention. I want to build cohort analyses
  around feature usage — which features do retained users adopt vs
  churned users? And what's the adoption curve by cohort?"

  Task: Explain how to build product engagement cohorts that tie
  feature adoption to retention outcomes and identify the features
  that drive long-term value.

assertions:
  - type: llm_judge
    criteria: "Response explains feature adoption cohort methodology — methodology: 'Feature adoption cohort methodology: instead of asking how many users are active?, ask how are active users engaging? Step 1 — Define engagement metrics for each feature: for a project management tool with 15 features, select the top 8 most used: task creation, project creation, team invitations, file uploads, comments, calendar integration, mobile app, reporting dashboard. For each feature, track: adoption rate: percentage of the cohort that used the feature at least once. Depth: average number of times adopters used the feature. Time to first use: median days from signup to first use. Step 2 — Build feature adoption curves by cohort: for the January cohort (1,000 users), track cumulative feature adoption over time: task creation: day 1: 60%, day 7: 75%, day 30: 82%, day 90: 85%. Project creation: day 1: 40%, day 7: 55%, day 30: 65%, day 90: 70%. Team invitations: day 1: 5%, day 7: 12%, day 30: 20%, day 90: 25%. Calendar integration: day 1: 2%, day 7: 8%, day 30: 15%, day 90: 22%. Reporting dashboard: day 1: 1%, day 7: 5%, day 30: 12%, day 90: 20%. Step 3 — Correlate feature adoption with retention: for each feature, compare month-6 retention of adopters vs non-adopters: task creation: adopters 28% vs non-adopters 5% (23pp gap). Team invitations: adopters 52% vs non-adopters 15% (37pp gap). Calendar integration: adopters 48% vs non-adopters 18% (30pp gap). Reporting dashboard: adopters 45% vs non-adopters 19% (26pp gap). Mobile app: adopters 42% vs non-adopters 16% (26pp gap). File uploads: adopters 30% vs non-adopters 20% (10pp gap). Team invitations have the largest retention gap — they are the strongest predictor of long-term engagement'"
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Response covers engagement depth analysis and feature combinations — depth: 'Engagement depth and feature combination analysis: depth analysis — how much usage matters: it is not just whether users adopted a feature but how intensely they use it. Team invitations depth cohorts: invited 1 person: month-6 retention 38%. Invited 2-3 people: month-6 retention 55%. Invited 4+ people: month-6 retention 72%. There is a dose-response relationship — more invitations correlate with higher retention. The activation threshold may be inviting 2+ teammates (the jump from 38% to 55% is the largest). Feature combination analysis: users who adopted certain feature COMBINATIONS retain even better than single-feature adopters. Feature combination | adoption rate | month-6 retention. Tasks only: 30% of users | 22%. Tasks + team invites: 15% | 55%. Tasks + team + calendar: 8% | 65%. Tasks + team + calendar + mobile: 5% | 78%. All 5 features: 3% | 85%. Pattern: each additional feature adopted increases retention, but with diminishing returns. The biggest jump is from tasks-only (22%) to tasks + team invites (55%) — confirming that team invitations are the critical behavior. Feature adoption sequence analysis: does the ORDER of adoption matter? Path A: tasks → projects → team invites → calendar. Month-6 retention: 58%. Path B: tasks → team invites → projects → calendar. Month-6 retention: 65%. Users who invite teammates earlier in their journey retain better. This suggests the onboarding flow should promote team invitations immediately after task creation, not after project creation. Cohort trend in feature adoption: compare feature adoption rates across cohorts. If team invitation adoption is increasing month over month (from 20% to 28%), product improvements are working. If it is flat or declining, the feature may need to be more prominent in the UI'"
    weight: 0.35
    description: "Depth"
  - type: llm_judge
    criteria: "Response covers actionable product recommendations — recommendations: 'Actionable product recommendations from engagement cohorts: Priority matrix — rank features by impact × adoption gap: Feature | retention gap | current adoption | adoption gap | priority. Team invitations: 37pp gap | 25% adoption | 75% not adopting | critical. Calendar integration: 30pp gap | 22% adoption | 78% not adopting | high. Reporting: 26pp gap | 20% adoption | 80% not adopting | high. Mobile app: 26pp gap | 35% adoption | 65% not adopting | high. File uploads: 10pp gap | 50% adoption | 50% not adopting | low. Team invitations are the top priority — high retention impact and low current adoption. Recommendation 1 — Redesign onboarding around team invitations: current flow: signup → create project → add tasks → (eventually discover team invites). Proposed flow: signup → invite your team → create a project together → add first tasks. Target: increase team invitation rate from 25% to 40% within 60 days. Expected impact: if 15% more users invite teammates, and inviting increases month-6 retention by 37pp, overall month-6 retention improves by approximately 5.5pp (15% × 37pp). Recommendation 2 — Surface calendar integration earlier: add calendar setup to the second-session experience. Show users how tasks appear on their calendar. Target: increase calendar adoption from 22% to 35%. Recommendation 3 — Encourage mobile adoption: send a push notification or email on day 3 with a link to download the mobile app. Users who go multi-platform retain 26pp better. Recommendation 4 — Monitor engagement cohort dashboard: track weekly for each cohort: feature adoption rates at day 7, day 30. Feature depth metrics (median uses per adopter). Feature combination penetration. Retention by feature adoption segment. Alert when any feature's adoption rate drops below the 90-day trailing average by more than 10%'"
    weight: 0.30
    description: "Recommendations"
