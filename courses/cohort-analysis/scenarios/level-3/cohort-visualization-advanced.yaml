meta:
  id: cohort-visualization-advanced
  level: 3
  course: cohort-analysis
  type: output
  description: "Create advanced cohort visualizations — build animated cohort charts, interactive dashboards, and executive-ready cohort presentations that tell compelling data stories"
  tags: [advanced-visualization, dashboards, animation, storytelling, advanced]

state: {}

trigger: |
  The Chief Data Officer says: "Our cohort charts are static
  spreadsheets. The board can't engage with them. I want interactive
  cohort dashboards, animated retention curves that show improvement
  over time, and a cohort data storytelling framework for our quarterly
  business reviews."

  Task: Explain advanced cohort visualization techniques including
  interactive dashboards, animation, and data storytelling for
  executive audiences.

assertions:
  - type: llm_judge
    criteria: "Response covers interactive cohort dashboard design — dashboard: 'Interactive cohort dashboard design: the four views every cohort dashboard needs: View 1 — The retention heatmap with filters: interactive heatmap where the user can filter by: time granularity (weekly / monthly / quarterly). Acquisition channel (organic / paid / referral / all). User segment (free / trial / paid / all). Geography (US / EU / APAC / all). Each filter instantly recalculates the heatmap. Hover over any cell to see: retention percentage, absolute user count, confidence interval (if cohort is small), and comparison to the previous cohort at the same point. Color encoding: use a diverging color scale centered on target retention (e.g., green above 30%, red below 20%, yellow in between). Add conditional formatting: bold the diagonal (most recent data), gray out incomplete cells. View 2 — Retention curve comparison: overlay 3-6 cohort curves on the same chart. Default: show the best cohort, worst cohort, and most recent cohort. Interactive: click on any cohort in the heatmap to add its curve to the comparison. Add a benchmark line (industry average or company target). Annotation layer: mark product launches, campaigns, and outages directly on the chart. View 3 — Trend sparklines: for key metrics (month-1 retention, month-3 retention, month-6 retention): show a small trend chart (sparkline) for the last 12 cohorts. Instantly communicate whether retention is improving, flat, or declining. Add a trend arrow and numerical change (e.g., month-1 retention: 35% → 42%, +7pp over 12 months). View 4 — Cohort health scorecard: a summary table showing each cohort's score across 4 dimensions: size, month-1 retention, month-3 retention, LTV projection. Color-coded cells (green/yellow/red) for instant pattern recognition'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response covers animated and dynamic cohort visualizations — animation: 'Animated cohort visualizations: Animation 1 — The growing triangle: start with just the oldest cohort's retention curve. Each frame adds the next cohort's curve below it. The audience watches the retention triangle build row by row. As newer cohorts appear, the curves shift upward (if retention is improving). This creates a powerful visual narrative: you can SEE the product getting better over time. Technical implementation: use D3.js, Flourish, or similar tools that support step-by-step animation. Each animation step: 500-800ms, with easing. Animation 2 — The cohort race: retention curves as a race — all cohorts start at 100% and the animation shows them dropping over time. Faster-dropping curves represent worse-retaining cohorts. The audience watches which cohorts stay higher for longer. Annotate: when a cohort's curve stays higher than the previous one, highlight the gap and label the product change that caused it. Animation 3 — Time-lapse heatmap: show the heatmap evolving month by month. In January, only the January row exists. By June, 6 rows are visible. The audience watches the table fill and can see the vertical trend (newer cohorts getting greener) emerge naturally. Animation 4 — Revenue cohort waterfall: animate cumulative revenue per user building month over month. Show each monthly revenue increment stacking on top of the previous. The audience sees LTV building and can visually identify when the curve flattens (diminishing monthly revenue). Dynamic elements for dashboards: tooltips: hover to reveal underlying numbers. Drill-down: click a cell to see the underlying user list or behavioral breakdown. Time scrubber: slide to focus on a specific time range. Cohort selector: toggle individual cohorts on and off'"
    weight: 0.35
    description: "Animation"
  - type: llm_judge
    criteria: "Response covers data storytelling framework for executive presentations — storytelling: 'Cohort data storytelling for executive audiences: the three-act narrative structure: Act 1 — The headline (30 seconds): one sentence that captures the key insight. Example: our retention has improved 40% in 8 months, driven by onboarding improvements. Show ONE chart: the month-1 retention trend sparkline rising from 30% to 42%. This is the only thing the executive needs to see if they have 30 seconds. Act 2 — The evidence (3 minutes): show the retention curve overlay: 3 cohorts (oldest, middle, most recent). The visual clearly shows newer curves staying higher. Show the heatmap: point to the vertical improvement in the month-1 column. Explain the driver: the onboarding change launched in March, and every cohort since shows higher retention. Show the A/B test result if available: the onboarding test showed +5pp lift. Act 3 — The so-what (2 minutes): translate the data into business impact: 42% month-1 retention vs 30% means 120 more users retained per 1,000 signups. At $15 ARPU, that is $1,800 more monthly revenue per cohort. Over 12 months: $21,600 per cohort or approximately $260K annually. Next steps: continue investing in onboarding. Target the week-1 drop (where we still lose 58% of users). Goal: reach 50% month-1 retention by Q3. Presentation rules: 1. One chart per slide. 2. Title every chart with the insight, not the metric (Retention improved 40% not Month-1 retention by cohort). 3. Use consistent colors across all slides (so cohorts are always the same color). 4. Annotate directly on charts rather than in bullet points. 5. Have the detailed heatmap in the appendix for questions. 6. End with a single recommendation slide'"
    weight: 0.30
    description: "Storytelling"
