meta:
  id: revenue-cohorts-basics
  level: 1
  course: cohort-analysis
  type: output
  description: "Build basic revenue cohorts — track cumulative and monthly revenue by cohort to understand how different user groups contribute to business economics over time"
  tags: [revenue-cohort, cumulative-revenue, LTV-basics, monetization, beginner]

state: {}

trigger: |
  The finance team asks: "We know our average revenue per user is $15
  per month. But that's an average across all users. I want to know:
  do January signups generate more revenue than March signups? How
  quickly do new cohorts pay back their acquisition cost?"

  Task: Explain how to build revenue cohorts and use them to track
  monetization over the user lifecycle.

assertions:
  - type: llm_judge
    criteria: "Response explains revenue cohort construction — construction: 'Revenue cohort construction: instead of tracking retention (did the user come back?), track revenue (how much did the user spend?). Two views of revenue cohorts: 1. Monthly revenue per user by cohort: for each cohort, what is the average revenue per user in each month of their lifecycle? January cohort (1,000 signups): month 0: $8/user. Month 1: $12/user. Month 2: $14/user. Month 3: $15/user. Month 4: $14/user. March cohort (1,500 signups): month 0: $5/user. Month 1: $8/user. Month 2: $10/user. Month 3: $11/user. This includes ALL users in the cohort — including churned users who generate $0. So monthly revenue per user declines if users churn even if remaining users spend the same amount. 2. Cumulative revenue per user by cohort: the running total of revenue generated by each cohort member. January cohort: month 0: $8. By month 1: $20. By month 2: $34. By month 3: $49. By month 6: $85. March cohort: month 0: $5. By month 1: $13. By month 2: $23. By month 3: $34. The cumulative curve shows how quickly a cohort generates total value. January's cumulative curve is higher at every point — January users are more valuable. The shape of the cumulative curve tells you about monetization health: a curve that keeps rising steeply: users are spending more over time (expansion revenue, increased usage). A curve that flattens: users are churning or spending less over time. A curve that is concave (bending upward): accelerating monetization (very healthy — often seen in subscription + usage-based models)'"
    weight: 0.35
    description: "Construction"
  - type: llm_judge
    criteria: "Response covers payback period calculation by cohort — payback: 'Payback period by cohort: payback period = the number of months until cumulative revenue per user equals the customer acquisition cost (CAC). January cohort: CAC = $30 (organic — low cost). Cumulative revenue reaches $30 by month 2. Payback period: 2 months. March cohort: CAC = $55 (paid ads — higher cost). Cumulative revenue reaches $55 by month 6. Payback period: 6 months. But with 65% churn by month 6, most March cohort users have already left before paying back their CAC. The cohort is unprofitable. Payback period analysis by cohort reveals: which acquisition channels produce profitable cohorts. How quickly the business recovers its marketing investment. Whether the company can afford to scale acquisition spending. Payback visualization: plot cumulative revenue per user for each cohort on the same chart. Draw a horizontal line at the CAC level. Where each cohort's curve crosses the CAC line is its payback period. Healthy business: all cohort curves cross the CAC line within 3-6 months. Unhealthy business: some cohort curves never cross the CAC line (they flatten below CAC due to churn). For the finance team: the average $15/month ARPU is misleading. January users generate $85 in 6 months (profitable). March users generate $55 in 6 months (barely breaking even). The difference is driven by: higher churn in March cohort (fewer users paying in later months). Lower spending per active user in March cohort. Both effects reduce cohort revenue — retention AND monetization are weaker for the newer cohort'"
    weight: 0.35
    description: "Payback"
  - type: llm_judge
    criteria: "Response covers revenue cohort insights and common patterns — insights: 'Revenue cohort insights: Pattern 1 — Improving cohort economics: Q1 cohorts: $60 cumulative revenue per user at month 6. Q2 cohorts: $70 at month 6. Q3 cohorts: $80 at month 6. Each newer cohort generates more revenue. This could mean: better retention (more users still paying in month 6). Higher pricing or better upsell (remaining users spend more). Better product-market fit (users get more value, pay more). Pattern 2 — Degrading cohort economics (the growth team's problem): as signups scale through paid acquisition, cohort economics worsen. Revenue per user declines even as total revenue grows (from sheer volume). The business looks healthy on total revenue but is deteriorating on a per-cohort basis. Pattern 3 — Expansion revenue within cohorts: SaaS products often see revenue per ACTIVE user increase over time. Month 1: $10/active user (starter plan). Month 6: $15/active user (upgraded to pro). Month 12: $25/active user (added team seats). Even though some users churn, remaining users spend more. If expansion exceeds churn: net revenue per cohort member increases over time. This is the holy grail — negative net revenue churn. Pattern 4 — Seasonal revenue patterns: holiday season cohorts may have high initial spending but low repeat purchases. Back-to-school cohorts may have moderate initial spending but steady repeat purchases. Revenue cohorts reveal which seasonal acquisition efforts produce lasting value vs one-time buyers. For the finance team: build revenue cohorts monthly. Track: cumulative revenue per user at month 1, 3, 6, and 12 for each cohort. Payback period by cohort. Whether newer cohorts are improving or degrading. This is the foundation for accurate LTV estimation and marketing budget allocation'"
    weight: 0.30
    description: "Insights"
