meta:
  id: what-is-a-cohort
  level: 1
  course: cohort-analysis
  type: output
  description: "Understand what a cohort is — learn the definition, purpose, and types of cohorts used in product and business analytics"
  tags: [cohort-definition, types, fundamentals, beginner]

state: {}

trigger: |
  A junior analyst asks: "My manager keeps talking about 'cohort
  analysis' but I don't understand what a cohort is. Is it just a
  fancy word for a group of users? Why can't we just look at all
  users together?"

  Task: Explain what cohorts are, why they matter, and the main
  types of cohorts used in analytics.

assertions:
  - type: llm_judge
    criteria: "Response defines cohorts and explains why they matter — definition: 'What is a cohort: a cohort is a group of users who share a common characteristic or experience within a defined time period. The most common cohort: users who signed up in the same week or month (acquisition cohort). January cohort = all users who signed up in January. February cohort = all users who signed up in February. Why cohorts matter — the problem with aggregate metrics: imagine a product with 10,000 monthly active users. This number has been stable for 6 months. It looks healthy. But cohort analysis reveals: January cohort (1,000 signups): only 200 still active (80% churned). February cohort (1,200 signups): only 300 still active (75% churned). March cohort (1,500 signups): 600 still active (60% churned). The aggregate MAU is stable only because new signups replace churned users. This is a leaky bucket — the product has a severe retention problem masked by growth. Without cohort analysis, you see stable MAU and think everything is fine. With cohort analysis, you see that 60-80% of users leave within months. Cohort analysis separates the behavior of different user groups over time, revealing patterns that aggregate metrics hide'"
    weight: 0.35
    description: "Definition"
  - type: llm_judge
    criteria: "Response covers the main types of cohorts — types: 'Types of cohorts: 1. Acquisition cohorts (most common): grouped by when users signed up or were acquired. January 2026 cohort, February 2026 cohort, etc. Used for: tracking retention over time, comparing whether newer cohorts retain better than older ones. 2. Behavioral cohorts: grouped by an action users took. Users who completed onboarding vs users who skipped it. Users who made a purchase in their first week vs users who did not. Users who used feature X vs users who did not. Used for: understanding which behaviors predict long-term retention and value. 3. Time-based cohorts: grouped by calendar time period regardless of signup date. All users active in Q1 2026. Used for: seasonal analysis and period-over-period comparisons. 4. Segment cohorts: grouped by a shared attribute. Users from organic search vs paid ads. Mobile users vs desktop users. Free tier vs paid tier users. Used for: comparing the lifecycle and value of different user segments. Example: acquisition cohort. Users who signed up in January: week 0 (signup week): 1,000 users active. Week 1: 600 active (60% retention). Week 2: 450 active (45% retention). Week 4: 300 active (30% retention). Week 8: 200 active (20% retention). Week 12: 150 active (15% retention). This retention curve shows how the January cohort's engagement decays over time. Comparing this curve to February's curve tells you whether the product is improving at retaining users'"
    weight: 0.35
    description: "Types"
  - type: llm_judge
    criteria: "Response covers when to use cohort analysis — when: 'When to use cohort analysis: Use case 1 — Measuring retention: the most common use. Track what percentage of each signup cohort remains active over weeks or months. Healthy products: retention stabilizes (flattens) after initial drop-off. Unhealthy products: retention keeps declining toward zero. Use case 2 — Evaluating product changes: you launch a new onboarding flow in March. Compare: January cohort (old onboarding): 20% retained at week 8. February cohort (old onboarding): 22% retained at week 8. March cohort (new onboarding): 35% retained at week 8. The March cohort retains significantly better — the new onboarding works. Without cohort analysis, you would not know if the retention improvement was due to the onboarding change or other factors. Use case 3 — Understanding customer lifetime value (LTV): track cumulative revenue by cohort over time. January cohort: $10 revenue per user by month 1, $25 by month 3, $40 by month 6. February cohort: $12 revenue per user by month 1, $30 by month 3. February cohort is more valuable early — they may have higher lifetime value. Use case 4 — Identifying seasonal patterns: compare cohorts from different seasons. Summer signup cohort: 30% week-4 retention. Winter signup cohort: 45% week-4 retention. Winter signups retain better — perhaps because summer users are more casual. Key takeaway: cohort analysis is not a single technique — it is a way of thinking about data. Instead of asking how are our users doing? you ask how is each group of users doing over time? This shift in perspective reveals trends, problems, and opportunities that aggregate metrics completely miss'"
    weight: 0.30
    description: "When"
