meta:
  id: acquisition-cohorts
  level: 1
  course: cohort-analysis
  type: output
  description: "Analyze acquisition cohorts — group users by signup period and track their behavior over time to measure product health and growth quality"
  tags: [acquisition-cohort, signup, growth-quality, tracking, beginner]

state: {}

trigger: |
  The growth team tripled signups from 1,000/month to 3,000/month
  over the last quarter. The CEO is excited: "Our growth is amazing!"
  But the data analyst notices something concerning when they build
  acquisition cohorts.

  Task: Show how acquisition cohort analysis reveals the quality
  of growth beyond just signup numbers.

assertions:
  - type: llm_judge
    criteria: "Response shows acquisition cohort analysis revealing growth quality — quality: 'Acquisition cohort analysis — growth quality check: The CEO sees: monthly signups tripled from 1,000 to 3,000. Monthly active users grew from 3,500 to 5,200. Everything looks great at the aggregate level. What acquisition cohorts reveal: October cohort (1,000 signups, organic growth): month 1 retention: 45%. Month 3 retention: 30%. Month 6 retention: 22%. Revenue per user at month 3: $35. November cohort (1,800 signups, started paid ads): month 1 retention: 32%. Month 3 retention: 18%. Revenue per user at month 3: $20. December cohort (3,000 signups, heavy paid spend): month 1 retention: 22%. Month 3 retention: 10%. Revenue per user at month 3: $12. The pattern is clear: as signups tripled, retention halved and revenue per user dropped by 65%. The growth is low quality — paid acquisition is bringing users who do not stick around. The business is growing signups but degrading unit economics. Where aggregate metrics mislead: MAU grew from 3,500 to 5,200 because the flood of new (but low-quality) signups temporarily inflates the active user count. But these users are churning faster. In 3 months, the December cohort will be nearly gone, and MAU may decline unless the company keeps spending aggressively on acquisition. This is the treadmill problem: you must keep acquiring faster just to maintain the same user base because retention is poor'"
    weight: 0.35
    description: "Quality"
  - type: llm_judge
    criteria: "Response covers how to compare acquisition cohorts — comparison: 'Comparing acquisition cohorts: build a side-by-side retention table: columns represent months since signup (month 0, 1, 2, 3, ...). Rows represent cohorts (October, November, December). October: 100% → 45% → 35% → 30% → 27% → 25% → 22%. November: 100% → 32% → 22% → 18% → 15%. December: 100% → 22% → 14% → 10%. Reading the table: compare vertically (same column, different rows): month 1 retention is declining: 45% → 32% → 22%. Each newer cohort retains worse. This signals degrading acquisition quality. Compare diagonally (the most recent data for each cohort): October at month 5: 25% (mature, stable). November at month 3: 18% (still declining). December at month 2: 14% (very early, already low). Overlay the retention curves on a single chart: all three curves on one graph. October's curve is highest and flattest. December's curve is lowest and steepest. The visual makes the quality problem immediately obvious. Key comparisons to make: compare cohorts across acquisition channels: organic cohorts vs paid cohorts. Which channels produce users who retain? Compare cohorts across time: are newer cohorts retaining better or worse? If the product is improving, newer cohorts should retain better. Compare cohorts across geographies: do users from different markets retain differently? This identifies which markets have product-market fit'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response covers actionable recommendations from acquisition cohort analysis — actions: 'Actionable recommendations: For the growth team: 1. Calculate the payback period by cohort: October cohort: $35 revenue per user at month 3 with $10 CAC → payback in month 1. December cohort: $12 revenue per user at month 3 with $25 CAC → payback not until month 7 (if ever, given 90% churn by month 3). The paid growth is unprofitable — each December user costs more to acquire and generates less revenue. 2. Set acquisition quality guardrails: do not evaluate growth only on signup volume. Track week 1 and month 1 retention for each acquisition cohort. Set a minimum retention threshold: new cohorts must achieve at least 35% week 1 retention. If a channel's cohorts fall below the threshold, reduce spend on that channel. 3. Investigate channel-level cohorts: break December's 3,000 signups by channel: organic (500 signups): month 1 retention 42% (healthy). Facebook ads (1,200 signups): month 1 retention 18% (poor). Google ads (800 signups): month 1 retention 25% (below threshold). Influencer campaigns (500 signups): month 1 retention 12% (terrible). Action: cut influencer and Facebook spend. Scale organic and improve Google ad targeting. 4. Report growth quality alongside growth volume: present to the CEO: signups: 3,000 (up 3x). Quality-adjusted signups (users who retain to month 1): 660 (up only 1.1x from October's 450). The real growth is 1.1x, not 3x. Quality-adjusted growth is the honest metric'"
    weight: 0.30
    description: "Actions"
