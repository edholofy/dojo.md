meta:
  id: hashtag-basics
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Learn Instagram hashtag strategy — optimal number, types, placement, and avoiding banned hashtags"
  tags: [instagram, hashtags, reach, discovery, strategy, beginner]

state: {}

trigger: |
  Instagram now limits posts to 5 hashtags maximum (as of December
  2025). Hashtags in captions boost reach by 36% for accounts under
  5,000 followers. The strategy has shifted from volume (30 hashtags)
  to precision (5 highly relevant tags). Over 1,800 hashtags are
  currently banned and can reduce your reach or get your account
  flagged.

  Part 1: Hashtag fundamentals
  Explain the current hashtag strategy:
  1. The 5-hashtag limit (December 2025 change):
     - Why Instagram reduced the limit
     - How this changes strategy from volume to precision
  2. Hashtag types:
     - Broad/popular (#fitness, #food — high competition)
     - Niche (#veganmealprep, #yogaforbeginners — targeted)
     - Branded (#YourBrandName — community building)
     - Location (#NYCfoodie — local discovery)
     - Community (#bookstagram — interest groups)
  3. Placement strategy:
     - In caption (better for accounts under 5K followers: +36% reach)
     - In first comment (better for accounts over 100K: +15.9% reach)
     - Don't bury at end of caption — integrate naturally
  4. Banned hashtags:
     - What they are and why they matter
     - Categories most commonly banned (mental health, explicit content)
     - How to check if a hashtag is banned
     - Consequences of using banned hashtags

  Part 2: Hashtag selection exercise
  Select 5 hashtags for each of these 5 accounts:

  Account 1: A vegan bakery in Austin, Texas (800 followers)
  Account 2: A business coach for women entrepreneurs (5,000 followers)
  Account 3: A travel photographer (15,000 followers)
  Account 4: A sustainable fashion brand (3,000 followers)
  Account 5: A tech startup sharing behind-the-scenes content (1,200 followers)

  For each set of 5 hashtags:
  - Explain why each hashtag was chosen
  - Categorize each (broad, niche, branded, location, community)
  - Note placement recommendation (caption vs. first comment)
  - Flag any potential issues (too broad, too niche, risk of ban)

  Part 3: Hashtag audit
  Review these hashtag sets and identify problems:
  Set A: #love #instagood #photooftheday #beautiful #happy
  Set B: #fitness #fitfam #gym #workout #bodybuilding
  Explain what's wrong and provide improved alternatives.

assertions:
  - type: llm_judge
    criteria: "The 5-hashtag limit is correctly explained with strategic implications — showing how the shift from 30 to 5 changes the approach entirely"
    weight: 0.25
    description: "Correct limit explanation"
  - type: llm_judge
    criteria: "Hashtag selections for the 5 accounts are specific, relevant, and strategically varied — not generic tags that could apply to anyone"
    weight: 0.30
    description: "Specific relevant selections"
  - type: llm_judge
    criteria: "The hashtag audit correctly identifies problems with generic, overly competitive tags and provides improved alternatives"
    weight: 0.25
    description: "Correct audit and improvements"
  - type: llm_judge
    criteria: "Banned hashtag guidance is practical — explains how to check and what happens if you accidentally use one"
    weight: 0.20
    description: "Practical banned hashtag guidance"
