meta:
  id: hook-writing
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Write scroll-stopping Instagram hooks that work within the 125-character truncation limit"
  tags: [instagram, hooks, attention, scroll-stopping, beginner]

state: {}

trigger: |
  The hook is everything. Instagram truncates captions after ~125
  characters, showing "…more" — if your hook doesn't compel users
  to tap, the rest of your caption is invisible. Hooks should be
  5-10 words and use curiosity, emotion, controversy, or value
  to stop the scroll.

  Part 1: Hook types
  Explain and demonstrate 6 hook categories with 3 examples each:

  1. Curiosity gap: Creates a question the reader needs answered
  2. Bold statement: Makes a claim that demands attention
  3. Personal story opener: Draws readers into a narrative
  4. Number/list hook: Promises specific, quantified value
  5. Question hook: Asks something the reader wants to answer
  6. Contrarian hook: Challenges a common belief

  For each of the 18 hooks:
  - Write the complete hook (under 125 characters)
  - Note the exact character count
  - Explain why it works psychologically

  Part 2: Hook writing exercise
  For each of these 6 post topics, write 3 hook options
  (one using a different category each):

  Topic 1: Sharing your morning routine as a CEO
  Topic 2: Launching a new skincare product
  Topic 3: Giving business advice about pricing
  Topic 4: Sharing a recipe for healthy meal prep
  Topic 5: Announcing a sale or promotion
  Topic 6: Sharing a personal failure and lesson learned

  For each set of 3, recommend the strongest hook and explain why.

  Part 3: Hook mistakes
  Show 5 common hook mistakes with before/after improvements:
  - Too vague, too long, too clickbaity, too generic, too salesy

assertions:
  - type: llm_judge
    criteria: "All hooks are under 125 characters with exact character counts noted — demonstrating mastery of the truncation constraint"
    weight: 0.25
    description: "Character-count mastery"
  - type: llm_judge
    criteria: "Hook categories are clearly distinct — curiosity gap hooks feel different from bold statements, which feel different from question hooks"
    weight: 0.25
    description: "Distinct hook categories"
  - type: llm_judge
    criteria: "Hooks are genuinely scroll-stopping — they would make a real Instagram user pause and tap 'more'"
    weight: 0.30
    description: "Genuinely scroll-stopping"
  - type: llm_judge
    criteria: "Hook mistakes show clear before/after improvement with specific explanations of what went wrong"
    weight: 0.20
    description: "Clear mistake improvements"
