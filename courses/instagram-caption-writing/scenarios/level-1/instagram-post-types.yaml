meta:
  id: instagram-post-types
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Understand caption requirements for each Instagram format — feed posts, Reels, Stories, carousels, and collabs"
  tags: [instagram, post-types, reels, carousel, stories, beginner]

state: {}

trigger: |
  Each Instagram format has different caption requirements. Feed
  posts allow up to 2,200 characters. Reels perform better with
  shorter captions and text overlays (85% watch without sound).
  Carousels work best with 8-12 slides and teaser captions.
  Stories use text overlays with interactive stickers.

  Part 1: Format overview
  Explain caption best practices for each format:
  1. Feed posts (single image):
     - Optimal caption length (150-200 words)
     - When short vs. long captions work better
     - Formatting for readability
  2. Reels (video):
     - Why shorter captions perform better
     - Text overlay vs. caption relationship
     - Hook delivery within first 1-2 seconds
  3. Carousels:
     - First slide as the hook (tease content)
     - Optimal slide count (8-12 for educational, 12-20 for guides)
     - "Swipe" CTA strategies
  4. Stories:
     - Text overlay best practices
     - Interactive sticker usage (polls, questions, quizzes)
     - Optimal posting frequency (3-5/day, drop-off after 5)
  5. Collaborative posts:
     - How to credit collaborators
     - Voice and tone when co-posting

  Part 2: Write captions for each format
  For a fitness brand "FlexFit" launching a new workout program:

  1. Feed post caption: Announcing the program launch
  2. Reel caption: 30-second workout preview video
  3. Carousel caption: "5 exercises you can do anywhere" (10 slides)
  4. Story text: Countdown to launch with poll sticker
  5. Collab post caption: With a fitness influencer partner

  Write each caption in full, optimized for its specific format.

  Part 3: Format selection guide
  Create a decision framework: given a piece of content, which
  Instagram format should you choose? Cover 5 common scenarios
  with format recommendations and reasoning.

assertions:
  - type: llm_judge
    criteria: "Each format's unique caption requirements are clearly explained with specific length guidelines, formatting rules, and performance data"
    weight: 0.25
    description: "Clear format-specific guidelines"
  - type: llm_judge
    criteria: "The 5 sample captions are genuinely different — the Reel caption is shorter than the feed post, the carousel teases content to encourage swiping"
    weight: 0.30
    description: "Format-adapted captions"
  - type: llm_judge
    criteria: "The format selection guide provides practical decision-making criteria that a content creator could apply immediately"
    weight: 0.25
    description: "Practical format selection"
  - type: llm_judge
    criteria: "Stories and Reels guidance addresses the 85% no-sound viewing reality with appropriate text overlay and caption strategies"
    weight: 0.20
    description: "Sound-off optimization"
