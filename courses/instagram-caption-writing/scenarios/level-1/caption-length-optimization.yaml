meta:
  id: caption-length-optimization
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Optimize Instagram caption length — when to write short vs. long captions based on content type and goals"
  tags: [instagram, caption-length, optimization, short, long, beginner]

state: {}

trigger: |
  Caption length matters. The recommended mix is 60% short (under
  150 characters), 30% medium (150-300 words), and 10% long
  (700-2,200 characters). Shorter captions have higher engagement
  rates, but longer captions work better for educational content
  that provides value and context. The sweet spot for most posts
  is 150-200 words.

  Part 1: Length strategy
  Explain when to use each caption length:
  1. Short captions (under 150 characters):
     - Best for: memes, product shots, quotes, Reels
     - Engagement advantage: higher rate per impression
     - Examples of accounts that excel with short captions
     - Write 3 sample short captions
  2. Medium captions (150-300 words):
     - Best for: storytelling, tips, behind-the-scenes
     - Why this is the "sweet spot" for most posts
     - Formatting techniques for readability
     - Write 3 sample medium captions
  3. Long captions (700-2,200 characters):
     - Best for: educational carousels, personal stories, thought leadership
     - When length adds value vs. when it loses readers
     - How to keep long captions engaging (formatting, hooks, pacing)
     - Write 3 sample long caption openings (first 300 words)

  Part 2: Content-to-length matching
  For each of these 8 content types, recommend the ideal caption
  length and write a sample caption at that length:

  1. Product launch photo
  2. Educational carousel (10 tips)
  3. Motivational quote graphic
  4. Behind-the-scenes Reel
  5. User testimonial repost
  6. Industry news reaction
  7. Personal story/vulnerability post
  8. Meme or humor post

  Part 3: The 60/30/10 content calendar
  Design a 2-week content calendar (10 posts) showing the
  60/30/10 caption length mix in practice. For each post,
  note the content type, format, and caption length category.

assertions:
  - type: llm_judge
    criteria: "Length guidelines include specific character/word counts and the 60/30/10 mix is clearly explained with rationale"
    weight: 0.25
    description: "Specific length guidelines"
  - type: llm_judge
    criteria: "Sample captions at each length are appropriately sized — short captions are genuinely concise, long captions justify their length with value"
    weight: 0.30
    description: "Appropriately sized samples"
  - type: llm_judge
    criteria: "Content-to-length matching is well-reasoned — the length recommendations match the content type's needs and audience expectations"
    weight: 0.25
    description: "Well-reasoned length matching"
  - type: llm_judge
    criteria: "The 2-week content calendar demonstrates the 60/30/10 mix in a realistic, sustainable posting plan"
    weight: 0.20
    description: "Realistic content calendar"
