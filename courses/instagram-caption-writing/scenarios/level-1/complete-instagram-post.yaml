meta:
  id: complete-instagram-post
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Write a complete Instagram post from scratch — photo concept, caption, hashtags, alt text, and posting strategy"
  tags: [instagram, complete-post, caption, hashtags, alt-text, beginner]

state: {}

trigger: |
  Bringing together all the fundamentals, write complete Instagram
  posts that include every element — not just the caption, but the
  photo concept, hashtags, alt text, and posting strategy.

  Write 4 complete Instagram posts for a plant-based food brand
  called "GreenBite" (4,000 followers, targeting health-conscious
  millennials and Gen Z):

  Post 1: Product showcase
  Content: Their best-selling protein smoothie bowl
  Write:
  - Photo/visual concept description
  - Complete caption (hook + body + CTA, ~150 words)
  - 5 hashtags with selection reasoning
  - Alt text for the image (20-100 words)
  - Best posting day/time recommendation
  - Expected engagement type (saves? shares? comments?)

  Post 2: Educational carousel
  Content: "5 plant proteins that are complete amino acid sources"
  Write:
  - Carousel slide descriptions (what's on each of 8 slides)
  - Complete caption (hook + body + CTA, ~200 words)
  - 5 hashtags with selection reasoning
  - Alt text for the first slide
  - Posting strategy

  Post 3: Behind-the-scenes Reel
  Content: A day in the kitchen making their products
  Write:
  - Reel concept (30-second video outline)
  - Text overlay copy for key moments
  - Complete caption (shorter for Reels, ~75 words)
  - 5 hashtags
  - Reel-specific posting considerations

  Post 4: Community engagement post
  Content: Asking followers about their favorite smoothie combos
  Write:
  - Visual concept (photo or graphic)
  - Complete caption with engagement-driving question
  - 5 hashtags
  - Response strategy (how to reply to comments)
  - Follow-up content plan (how to use responses in future posts)

  For all 4 posts, ensure:
  - Consistent brand voice throughout
  - Hooks under 125 characters
  - CTAs matched to the post goal
  - Hashtags strategically selected (not repeated across posts)

assertions:
  - type: llm_judge
    criteria: "All 4 posts are complete with every element — caption, hashtags, alt text, and posting strategy are all included and well-crafted"
    weight: 0.25
    description: "Complete multi-element posts"
  - type: llm_judge
    criteria: "Brand voice is consistent across all 4 posts — GreenBite sounds like the same brand whether showcasing product, educating, or engaging community"
    weight: 0.25
    description: "Consistent brand voice"
  - type: llm_judge
    criteria: "Each post format is optimized for its type — the carousel caption differs from the Reel caption which differs from the product showcase"
    weight: 0.25
    description: "Format-optimized posts"
  - type: llm_judge
    criteria: "Alt text is descriptive and useful — it goes beyond basic description to include context that helps both accessibility and SEO"
    weight: 0.25
    description: "Useful descriptive alt text"
