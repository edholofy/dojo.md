meta:
  id: caption-formatting
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Format Instagram captions for readability — line breaks, spacing, bullet points, and visual hierarchy"
  tags: [instagram, formatting, readability, line-breaks, spacing, beginner]

state: {}

trigger: |
  Good formatting makes captions scannable and readable on small
  mobile screens. Line breaks create breathing room, bullet points
  organize information, and emoji placement guides the eye. Poor
  formatting turns a great caption into a wall of text that nobody
  reads.

  Part 1: Formatting techniques
  Explain and demonstrate each formatting technique:
  1. Line breaks:
     - How to create line breaks in Instagram (the blank line trick)
     - When to break paragraphs (every 2-3 sentences)
     - How line breaks affect readability on mobile
  2. Bullet points and lists:
     - Using emojis as bullet points
     - Numbered lists for sequential content
     - When lists are better than paragraphs
  3. Visual hierarchy:
     - How to make key information stand out
     - Using ALL CAPS sparingly for emphasis
     - Using emojis as section dividers
  4. White space:
     - The importance of breathing room
     - How dense text affects engagement
     - Formatting for mobile vs. desktop viewing

  Part 2: Formatting makeover
  Take these 5 poorly formatted captions and reformat them
  for maximum readability:

  Caption A (wall of text):
  "We just launched our new collection and we're so excited to share
  it with you! There are 12 new pieces including 3 dresses 4 tops
  and 5 accessories all made from sustainable materials and ethically
  sourced fabrics. Prices range from $29 to $149 and everything ships
  free. Use code LAUNCH20 for 20% off your first order. Link in bio
  to shop now. What piece are you most excited about?"

  Caption B (over-formatted):
  "🔥🔥🔥 BIG NEWS 🔥🔥🔥
  ✨ NEW ✨ PRODUCT ✨ ALERT ✨
  💯💯💯 Check. This. Out. 💯💯💯
  👉 LINK 👈 IN 👉 BIO 👈
  🙌🙌🙌🙌🙌🙌🙌🙌"

  Caption C (no structure):
  "5 tips for better sleep. Go to bed at the same time every day.
  Avoid screens 1 hour before bed. Keep your room cool at 65-68
  degrees. Don't eat heavy meals after 8pm. Try reading instead
  of scrolling. Which tip will you try tonight?"

  Caption D (buried information):
  "Happy Monday everyone! Hope you had a great weekend. The weather
  here was amazing so I spent a lot of time outside. Anyway, wanted
  to let you know that we're hiring a senior designer. If you know
  anyone who might be interested, send them our way. Oh also our
  new pricing goes into effect on March 1st. Current customers keep
  their current rate though. And one more thing — free webinar this
  Thursday on design trends."

  Caption E (too many CTAs):
  "New blog post is live! Go read it. Also follow us on TikTok.
  And subscribe to our newsletter. Don't forget to share this post.
  Tag a friend who needs this. Save for later. Link in bio."

  Reformat each with proper structure and explain your changes.

assertions:
  - type: llm_judge
    criteria: "Formatting techniques are clearly explained with specific rules — when to break, how to create line breaks, and how formatting affects mobile readability"
    weight: 0.25
    description: "Clear formatting rules"
  - type: llm_judge
    criteria: "All 5 reformatted captions are significantly more readable than the originals while preserving the same information"
    weight: 0.30
    description: "Significantly improved readability"
  - type: llm_judge
    criteria: "Changes are explained — the reasoning behind each formatting decision teaches the underlying principles"
    weight: 0.25
    description: "Explained formatting decisions"
  - type: llm_judge
    criteria: "The over-formatted and too-many-CTAs examples are fixed with restraint — showing that less is often more"
    weight: 0.20
    description: "Restrained improvement"
