meta:
  id: caption-voice-tone
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Develop a consistent Instagram caption voice — casual vs. professional, brand personality, and tone adaptation"
  tags: [instagram, voice, tone, brand, personality, beginner]

state: {}

trigger: |
  Voice is your brand personality (fixed and consistent). Tone is
  how you adjust that voice for different situations (flexible).
  Consistent brand voice tells your audience you're the same brand
  everywhere — whether sharing a product drop, a case study, or
  behind-the-scenes content. Instagram tends toward conversational,
  but the right tone depends on your audience.

  Part 1: Voice development
  Explain the 4 main Instagram caption tone styles:
  1. Casual/fun: Playful emojis, conversational language, humor
  2. Professional: Formal language, industry terminology, authority
  3. Inspirational: Motivational language, success stories, aspiration
  4. Educational: Teaching-focused, instructional, value-first

  For each style:
  - Describe the ideal audience
  - List 5 "voice words" (adjectives that define the voice)
  - Write a sample caption about "launching a new product"
  - Show how the same information sounds completely different

  Part 2: Voice documentation exercise
  Create a mini brand voice guide for these 3 brands:

  Brand A: "Brew & Co" — specialty coffee roaster
  Target audience: 25-35, urban professionals, coffee enthusiasts
  Personality: Knowledgeable but approachable, passionate but not pretentious

  Brand B: "LegalEase" — legal tech startup
  Target audience: 30-45, small business owners, not lawyers
  Personality: Demystifying, reassuring, professional but not stuffy

  Brand C: "WildHeart Athletics" — outdoor fitness brand
  Target audience: 25-40, adventure seekers, nature lovers
  Personality: Bold, empowering, authentic, slightly rebellious

  For each brand, provide:
  - 3 voice characteristics (what they always sound like)
  - 3 "do" examples and 3 "don't" examples
  - A sample feed post caption
  - A sample Reel caption
  - How the voice adapts from a product post to a personal story

  Part 3: Tone adaptation
  Show how "Brew & Co" adapts its tone across 4 situations:
  1. Celebrating a milestone (joyful)
  2. Addressing a customer complaint publicly (empathetic)
  3. Sharing coffee education (knowledgeable)
  4. Promoting a flash sale (urgent but on-brand)

assertions:
  - type: llm_judge
    criteria: "The 4 tone styles produce genuinely different captions about the same topic — the casual version sounds nothing like the professional version"
    weight: 0.25
    description: "Genuinely different tone styles"
  - type: llm_judge
    criteria: "Brand voice guides are specific and actionable — 'do/don't' examples would help a new social media manager write on-brand immediately"
    weight: 0.30
    description: "Specific actionable voice guides"
  - type: llm_judge
    criteria: "Tone adaptation maintains brand identity — Brew & Co sounds like Brew & Co in all 4 situations, just adjusted for context"
    weight: 0.25
    description: "Consistent identity across tones"
  - type: llm_judge
    criteria: "Voice characteristics are specific enough to be useful — not vague words like 'fun' but precise descriptions of how the brand communicates"
    weight: 0.20
    description: "Precise voice characteristics"
