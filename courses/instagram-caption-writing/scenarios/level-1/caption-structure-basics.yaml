meta:
  id: caption-structure-basics
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Learn the fundamental Hook-Body-CTA caption structure for Instagram posts"
  tags: [instagram, caption, structure, hook, cta, beginner]

state: {}

trigger: |
  Instagram captions follow a Hook → Body → CTA structure. The
  first 125 characters appear before the "…more" truncation — this
  is your hook. Users decide whether to tap "more" at this point.
  The body delivers value in 3-5 sentences, and the CTA drives
  a specific action. Posts with clear CTAs generate 70% more
  comments than those without.

  Part 1: Structure explanation
  Explain the 3-part caption structure with specific guidelines:
  1. Hook (first 125 characters):
     - Why this is the most critical part
     - 5-10 word hooks that stop the scroll
     - Two hook categories: emotional and educational
     - 5 example hooks for each category
  2. Body (3-5 sentences):
     - How to deliver value concisely
     - Line break and formatting best practices
     - When to use bullet points vs. paragraphs
  3. CTA (call to action):
     - Why specific CTAs outperform generic ones by 3x
     - Types: comment, save, share, link in bio, tag
     - 5 example CTAs for different goals

  Part 2: Write complete captions
  Write 5 complete captions using the Hook-Body-CTA structure:

  Caption 1: A coffee shop sharing a new seasonal drink
  Caption 2: A personal trainer sharing a workout tip
  Caption 3: A SaaS company announcing a new feature
  Caption 4: A travel blogger sharing a destination photo
  Caption 5: A small business celebrating a milestone (1,000 orders)

  For each caption:
  - Mark where the hook ends (125 character cutoff)
  - Highlight the CTA
  - Note the word count
  - Explain why this structure works for this specific post

assertions:
  - type: llm_judge
    criteria: "All 3 structural elements are clearly explained with specific character counts, formatting rules, and examples"
    weight: 0.25
    description: "Clear structural explanation"
  - type: llm_judge
    criteria: "All 5 captions follow Hook-Body-CTA structure with hooks that would genuinely stop scrolling within 125 characters"
    weight: 0.30
    description: "Effective hook-body-CTA execution"
  - type: llm_judge
    criteria: "CTAs are specific and action-oriented — not generic 'let me know' but directed actions like 'comment with the emoji that matches your mood'"
    weight: 0.25
    description: "Specific action-oriented CTAs"
  - type: llm_judge
    criteria: "The 5 captions demonstrate range — each sounds appropriate for its industry and audience"
    weight: 0.20
    description: "Industry-appropriate range"
