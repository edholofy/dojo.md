meta:
  id: cta-writing-instagram
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Write effective Instagram calls-to-action — comment prompts, save requests, share CTAs, and link-in-bio drivers"
  tags: [instagram, cta, engagement, comments, saves, beginner]

state: {}

trigger: |
  Specific CTAs outperform generic ones by 3x on Instagram. Posts
  with clear CTAs generate 70% more comments. In the 2025-2026
  algorithm, shares (DM sends) are 3-5x more valuable than likes,
  and saves signal high-quality content. Your CTA should target
  the engagement signal that matters most for your goal.

  Part 1: CTA types by algorithm value
  Explain each CTA type ranked by algorithm impact:
  1. Share/DM CTAs (highest value — 3-5x more than likes):
     - "Send this to someone who needs to hear it"
     - 3 more share CTA examples
  2. Save CTAs (signals high-quality content):
     - "Save this for your next [situation]"
     - 3 more save CTA examples
  3. Comment CTAs (drives conversation depth):
     - "Comment with your favorite tip from this list"
     - 3 more comment CTA examples (avoid yes/no questions)
  4. Link-in-bio CTAs (drives website traffic):
     - "Grab the free guide — link in bio"
     - 3 more link-in-bio CTA examples
  5. Follow CTAs (grows audience):
     - "Follow for daily [topic] tips"
     - 3 more follow CTA examples

  Part 2: CTA writing exercise
  Write CTAs for 6 different post goals:

  Post 1: Educational carousel about time management tips
  Goal: Maximize saves (reference content)
  Write 3 CTA options

  Post 2: Reel showing a before/after home renovation
  Goal: Maximize shares (wow factor)
  Write 3 CTA options

  Post 3: Product photo of new sneakers
  Goal: Drive website traffic (purchases)
  Write 3 CTA options

  Post 4: Personal story about overcoming a challenge
  Goal: Drive meaningful comments (conversation)
  Write 3 CTA options

  Post 5: Behind-the-scenes of a restaurant kitchen
  Goal: Drive followers (brand awareness)
  Write 3 CTA options

  Post 6: Sponsored post for a skincare brand
  Goal: Drive saves + link clicks (conversion)
  Write 3 CTA options

  Part 3: CTA mistakes
  List the top 5 Instagram CTA mistakes with fixes:
  - "Click the link" (no link in feed posts)
  - Multiple competing CTAs in one post
  - Generic "let me know in the comments"
  - CTA doesn't match the content
  - CTA buried at the end of a long caption

assertions:
  - type: llm_judge
    criteria: "CTA types are ranked by algorithm value with accurate data — shares > saves > comments is correctly prioritized"
    weight: 0.25
    description: "Algorithm-value ranked CTAs"
  - type: llm_judge
    criteria: "CTA options for each post goal are specific and creative — not repetitive 'comment below' variants but genuinely different approaches"
    weight: 0.30
    description: "Specific creative CTAs"
  - type: llm_judge
    criteria: "Each CTA matches its post goal — save CTAs for reference content, share CTAs for emotional content, link CTAs for conversion content"
    weight: 0.25
    description: "Goal-matched CTAs"
  - type: llm_judge
    criteria: "CTA mistakes are realistic and the fixes are practical — particularly addressing the 'no link in feed posts' confusion"
    weight: 0.20
    description: "Practical mistake fixes"
