meta:
  id: emoji-usage
  level: 1
  course: instagram-caption-writing
  type: output
  description: "Use emojis effectively in Instagram captions — impact on engagement, optimal frequency, and placement strategies"
  tags: [instagram, emojis, engagement, formatting, visual, beginner]

state: {}

trigger: |
  Emojis increase Instagram engagement by 48%. Posts with emojis
  see 72% more likes and 70% more comments in user-generated content.
  The optimal range is 3-5 emojis per caption. But excessive emoji
  use can hurt brand perception and look unprofessional. Each emoji
  should serve a purpose.

  Part 1: Emoji strategy
  Explain effective emoji usage:
  1. Engagement data:
     - 48% engagement increase with emojis
     - 33% higher rate of comments and shares
     - Why emojis work psychologically (visual processing, emotion)
  2. Placement strategies:
     - Opening emoji (grabs attention)
     - Inline emphasis (highlights key points)
     - Bullet point emojis (creates scannable lists)
     - Closing emoji (playful sign-off)
     - Separator emojis (creates visual sections)
  3. Frequency guidelines:
     - 3-5 per caption is optimal
     - When more is acceptable (casual brands, lifestyle)
     - When fewer is better (professional, luxury, B2B)
  4. Emoji selection:
     - Match emojis to brand voice
     - Popular 2025 emojis (sparkles, fire, rocket, etc.)
     - Cultural considerations (emojis mean different things globally)

  Part 2: Emoji exercise
  Write 2 versions of each caption — one with emojis, one without.
  Then compare their effectiveness:

  Caption 1: A bakery announcing fresh croissants available
  Caption 2: A tech company sharing a product update
  Caption 3: A motivational coach sharing a mindset tip
  Caption 4: A real estate agent listing a new property
  Caption 5: A nonprofit sharing impact results

  Part 3: Emoji mistakes
  Show 5 common emoji mistakes with corrections:
  - Over-stuffing (every other word has an emoji)
  - Wrong tone (playful emojis on serious content)
  - Random placement (emojis that don't relate to the text)
  - Brand mismatch (luxury brand using casual emojis)
  - Accessibility issues (relying on emojis to convey meaning)

assertions:
  - type: llm_judge
    criteria: "Emoji strategy covers engagement data, placement, frequency, and selection with specific guidelines rather than generic 'use emojis' advice"
    weight: 0.25
    description: "Specific emoji strategy"
  - type: llm_judge
    criteria: "The with/without emoji comparisons clearly show how emojis enhance readability and engagement when used well"
    weight: 0.30
    description: "Clear emoji comparison"
  - type: llm_judge
    criteria: "Emoji selections match the brand and context — the bakery uses different emojis than the tech company or the nonprofit"
    weight: 0.25
    description: "Context-appropriate emojis"
  - type: llm_judge
    criteria: "Emoji mistakes are realistic and the corrections demonstrate restrained, purposeful usage"
    weight: 0.20
    description: "Realistic mistake corrections"
