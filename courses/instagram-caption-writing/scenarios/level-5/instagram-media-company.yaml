meta:
  id: instagram-media-company
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Build an Instagram-first media company — editorial caption standards, multi-format content systems, monetization through captions, and audience development"
  tags: [instagram, media-company, editorial, monetization, scale, mastery]

state: {}

trigger: |
  Some of the most successful Instagram accounts operate like
  media companies — producing high-volume, high-quality caption
  content across multiple verticals, formats, and contributors.
  Building an Instagram-first media company requires editorial
  standards, scalable production systems, and monetization
  strategies built into the caption layer.

  Design an Instagram-first media company:

  Company: "Urban Pulse" — a city lifestyle media brand
  Accounts: 1 main account (250K followers) + 5 city accounts
  (NYC 80K, LA 65K, Chicago 40K, Austin 30K, Miami 35K)
  Team: Editor-in-chief + 5 city editors + 10 freelance writers
  Revenue: Sponsored content, brand partnerships, events

  Part 1: Editorial caption standards
  1. Editorial style guide:
     - Voice and tone framework that scales across 6 accounts
     - Caption quality tiers (A-grade publish, B-grade revise, C-grade reject)
     - Editorial calendar governance (who decides what gets posted)
  2. Content formats with caption standards:
     - Breaking local news/events (speed + accuracy)
     - Long-form narrative posts (storytelling)
     - Listicle carousels (informative + shareable)
     - Reel commentary (witty + concise)
     - Community spotlights (authentic + promotional-free)
  3. Write one caption of each format for both the main account
     and one city account, showing how voice adapts

  Part 2: Scalable production system
  1. Daily editorial workflow (pitch → assign → write → edit → publish)
  2. Content pipeline management for 6 accounts posting 5-7x/week each
  3. Breaking news caption protocol (15-minute turnaround)
  4. Freelancer management system (briefs, deadlines, quality standards)
  5. Seasonal planning (quarterly content themes across all accounts)

  Part 3: Caption monetization
  1. Sponsored content caption framework:
     - How sponsored captions maintain editorial voice
     - Disclosure integration that doesn't break flow
     - Rate card structure (what determines caption pricing)
  2. Partnership models:
     - Single post vs. series vs. takeover caption structures
     - Performance guarantees and caption optimization
  3. Revenue tracking per caption/campaign

  Part 4: Audience development through captions
  1. Growth strategy by city account (localization + cross-promotion)
  2. Viral content formula (what caption patterns drive shares)
  3. Audience retention through caption consistency
  4. Cross-platform syndication of Instagram captions

assertions:
  - type: llm_judge
    criteria: "Editorial standards are rigorous enough for a media company — quality tiers, editorial governance, and style guides would maintain consistency across 16+ contributors"
    weight: 0.25
    description: "Media-grade editorial standards"
  - type: llm_judge
    criteria: "Production system handles the scale — managing 30-42 posts/week across 6 accounts with clear workflows, roles, and deadlines"
    weight: 0.25
    description: "Scalable production system"
  - type: llm_judge
    criteria: "Caption monetization framework is commercially viable — sponsored content integration, rate structures, and partnership models are realistic and detailed"
    weight: 0.25
    description: "Viable monetization framework"
  - type: llm_judge
    criteria: "City account voices are differentiated while maintaining brand coherence — NYC sounds different from Austin, but both are recognizably Urban Pulse"
    weight: 0.25
    description: "Localized brand coherence"
