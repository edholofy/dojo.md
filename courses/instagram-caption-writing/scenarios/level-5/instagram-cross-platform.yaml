meta:
  id: instagram-cross-platform
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Design cross-platform caption ecosystems — adapting Instagram captions for TikTok, LinkedIn, X, YouTube, and Threads while maintaining platform-native voice"
  tags: [instagram, cross-platform, adaptation, multi-channel, ecosystem, mastery]

state: {}

trigger: |
  Most brands don't exist on Instagram alone. Content crosses
  platforms, and captions must be adapted — not just copy-pasted —
  to feel native on each. A cross-platform caption strategy
  maximizes content ROI while respecting each platform's culture,
  algorithm, and audience expectations.

  Design a cross-platform caption ecosystem for "NovaTech" — a
  consumer electronics brand present on:
  - Instagram (85K followers)
  - TikTok (120K followers)
  - LinkedIn (45K followers)
  - X/Twitter (60K followers)
  - YouTube (95K subscribers)
  - Threads (15K followers)

  Part 1: Platform-native caption adaptation
  Take 5 Instagram captions and adapt each for all 6 platforms:

  Caption 1: Product launch (wireless headphones)
  - Instagram: Full caption with hooks, emojis, hashtags
  - TikTok: Short, casual, trend-aware
  - LinkedIn: Professional, industry-context angle
  - X: Concise, conversational, thread potential
  - YouTube: Description + timestamps + SEO
  - Threads: Text-forward, conversational, no hashtags

  Caption 2: Behind-the-scenes (factory tour)
  Adapt for all 6 platforms

  Caption 3: Customer testimonial (video review)
  Adapt for all 6 platforms

  Caption 4: Industry hot take (opinion on AI in consumer tech)
  Adapt for all 6 platforms

  Caption 5: Promotional (holiday sale)
  Adapt for all 6 platforms

  For each adaptation, annotate what changed and why.

  Part 2: Cross-platform content strategy
  1. Platform role definition:
     - What's Instagram's unique role in the ecosystem?
     - Content origination vs. syndication for each platform
     - Where each platform fits in the customer journey
  2. Workflow design:
     - Write once, adapt many: the production pipeline
     - Which platform gets content first and why
     - Timing strategy across platforms
  3. Cross-platform engagement integration:
     - How to drive Instagram followers to YouTube (and vice versa)
     - Cross-platform conversation management
     - Unified community building across channels

  Part 3: Cross-platform analytics
  1. Unified reporting dashboard design
  2. Platform comparison metrics (how to fairly compare Instagram vs. TikTok)
  3. Cross-platform attribution (how one platform drives another)
  4. Content format performance matrix (which formats work where)
  5. Resource allocation recommendations based on platform ROI

assertions:
  - type: llm_judge
    criteria: "Platform adaptations feel truly native — TikTok captions feel like TikTok, LinkedIn captions feel like LinkedIn, not just shorter/longer versions of Instagram"
    weight: 0.30
    description: "Platform-native adaptations"
  - type: llm_judge
    criteria: "Adaptation annotations explain meaningful differences — they identify platform culture, algorithm preferences, and audience expectations, not just character limits"
    weight: 0.25
    description: "Insightful adaptation reasoning"
  - type: llm_judge
    criteria: "Cross-platform strategy is coherent — platform roles are distinct but complementary, creating an integrated ecosystem rather than siloed channels"
    weight: 0.25
    description: "Coherent ecosystem strategy"
  - type: llm_judge
    criteria: "Cross-platform analytics framework is practical — comparing metrics across platforms fairly and tracking cross-platform influence is addressed realistically"
    weight: 0.20
    description: "Practical cross-platform analytics"
