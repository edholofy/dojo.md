meta:
  id: instagram-roi-framework
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Measure and maximize Instagram caption ROI — attribution models, revenue tracking, caption value scoring, and executive reporting frameworks"
  tags: [instagram, roi, attribution, revenue, measurement, mastery]

state: {}

trigger: |
  Connecting Instagram captions to business revenue requires
  attribution models, conversion tracking, and value frameworks
  that go beyond vanity metrics. Expert caption strategists can
  demonstrate the business impact of caption quality and prove
  ROI to stakeholders.

  Build a comprehensive Instagram caption ROI framework for
  "Meridian Skincare" — a DTC skincare brand:
  - Annual Instagram budget: $180,000 (team + tools + ads)
  - Monthly revenue from Instagram channel: ~$45,000
  - 95K followers, 35% of web traffic from Instagram
  - E-commerce average order value: $72

  Part 1: Caption attribution model
  Design a system to attribute revenue to caption quality:
  1. Direct attribution metrics:
     - Link click → purchase tracking
     - Promo code usage by post
     - Instagram Shop checkout attribution
     - DM conversation → sale tracking
  2. Indirect attribution:
     - Caption influence on brand search volume
     - Caption-driven UGC and its secondary conversion value
     - Comment sentiment correlation with purchase intent
     - Save rate as purchase intent indicator
  3. Attribution model design:
     - First-touch vs. multi-touch vs. time-decay models
     - How to assign caption contribution percentage
     - Controlling for visual quality, timing, and other variables

  Part 2: Caption value scoring system
  Create a scoring model that rates caption business value:
  1. Define 10 scoring criteria with weights
  2. Show how to score 5 actual captions using the system
  3. Correlate caption scores with actual performance data
  4. Use scoring to predict high-performing captions before posting

  Part 3: ROI optimization strategies
  Based on analysis, recommend optimizations:
  1. Caption investment reallocation (where to spend more/less time)
  2. Content type ROI ranking (which formats generate most revenue)
  3. Caption length vs. revenue correlation
  4. CTA optimization for conversion (which CTAs drive actual sales)
  5. Seasonal ROI patterns and budget allocation

  Part 4: Executive ROI reporting
  Create a quarterly Instagram caption ROI report:
  1. Revenue attribution summary (captions' contribution to $45K/month)
  2. Cost per caption analysis (production cost vs. revenue generated)
  3. Caption quality trend and its correlation with revenue
  4. Competitive ROI benchmarking
  5. Next quarter projections and investment recommendations

assertions:
  - type: llm_judge
    criteria: "Attribution model is sophisticated yet practical — it accounts for both direct and indirect caption impact without requiring enterprise-level tooling"
    weight: 0.30
    description: "Sophisticated practical attribution"
  - type: llm_judge
    criteria: "Caption value scoring system is rigorous — criteria are weighted logically, scoring examples are consistent, and the correlation with performance is demonstrated"
    weight: 0.25
    description: "Rigorous scoring system"
  - type: llm_judge
    criteria: "ROI optimization recommendations are data-driven — each recommendation connects directly to metrics and shows projected impact"
    weight: 0.25
    description: "Data-driven ROI optimization"
  - type: llm_judge
    criteria: "Executive report would satisfy a CFO — it connects Instagram caption activity to revenue in concrete terms with clear projections"
    weight: 0.20
    description: "CFO-grade ROI reporting"
