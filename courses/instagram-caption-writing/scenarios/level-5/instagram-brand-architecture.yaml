meta:
  id: instagram-brand-architecture
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Design Instagram caption architecture for complex brand portfolios — parent-subsidiary relationships, brand mergers, and global-local caption governance"
  tags: [instagram, brand-architecture, portfolio, governance, global-local, mastery]

state: {}

trigger: |
  Complex organizations manage multiple brands with interconnected
  Instagram presences. Parent companies, subsidiaries, acquired
  brands, and regional accounts all need caption strategies that
  maintain individual identity while serving corporate objectives.

  Design the Instagram caption architecture for "Pinnacle Hospitality
  Group" — a hotel and restaurant conglomerate:

  Portfolio:
  1. @pinnacle_hospitality (corporate, 50K followers)
  2. @theelysium_hotels (luxury hotel chain, 180K followers)
  3. @waypoint_inns (boutique budget hotels, 65K followers)
  4. @table_and_vine (fine dining restaurants, 90K followers)
  5. @quickplate (fast-casual restaurants, 40K followers)
  6. @pinnacle_events (corporate events and weddings, 30K followers)
  Plus 12 individual property accounts (5K-25K followers each)

  Part 1: Brand voice architecture
  1. Master brand voice framework:
     - Corporate brand voice principles (what unifies all accounts)
     - Sub-brand voice differentiation map
     - How luxury (Elysium) and budget (Waypoint) coexist without conflict
     - Fine dining (Table & Vine) vs. fast-casual (QuickPlate) voice contrast
  2. Write the same announcement (Group won "Best Employer" award)
     as it would appear on all 6 main accounts
  3. Voice governance document:
     - Who has caption authority for each brand
     - Escalation process for sensitive content
     - Brand protection rules (what can never appear in captions)

  Part 2: Cross-brand caption strategies
  1. Cross-promotion frameworks:
     - How Elysium Hotels promotes Table & Vine dining
     - How corporate supports sub-brand launches
     - Guest journey captions (hotel + restaurant + event)
  2. Acquisition integration:
     - Caption strategy for a newly acquired brand joining the portfolio
     - How to transition followers from old voice to new positioning
     - Maintaining authenticity during brand integration
  3. Crisis cascade:
     - How a crisis at one brand affects captions across the portfolio
     - Firewall vs. solidarity approach
     - Crisis caption templates for corporate and sub-brand accounts

  Part 3: Global-local governance
  1. Template system for 12 property accounts:
     - Property-specific customization zones
     - Non-negotiable brand elements
     - Local market adaptation guidelines
  2. Content approval matrix (who approves what, at which level)
  3. Training program for property-level social media managers
  4. Quality audit process across all 18 accounts

assertions:
  - type: llm_judge
    criteria: "Brand voice architecture successfully differentiates luxury from budget, fine dining from fast-casual — all under one corporate umbrella with clear rationale"
    weight: 0.30
    description: "Complex portfolio differentiation"
  - type: llm_judge
    criteria: "The same announcement written for 6 accounts demonstrates mastery of voice adaptation — each sounds natural for its brand while conveying the same message"
    weight: 0.25
    description: "Expert voice adaptation"
  - type: llm_judge
    criteria: "Governance systems are practical for a large organization — approval matrices, training programs, and audit processes would work in a real corporate setting"
    weight: 0.25
    description: "Enterprise-grade governance"
  - type: llm_judge
    criteria: "Crisis cascade strategy is nuanced — it addresses how a crisis at one brand affects the entire portfolio with specific firewall and solidarity approaches"
    weight: 0.20
    description: "Nuanced crisis cascade handling"
