meta:
  id: instagram-psychology
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Apply psychology to Instagram captions — persuasion principles, behavioral triggers, emotional design, cognitive biases, and ethical influence"
  tags: [instagram, psychology, persuasion, behavioral, influence, mastery]

state: {}

trigger: |
  Expert Instagram caption writers understand the psychology
  behind why people engage, save, share, and buy. Persuasion
  principles, cognitive biases, emotional triggers, and social
  proof mechanics all influence caption performance when applied
  ethically.

  Part 1: Psychology-driven caption frameworks
  Design caption frameworks based on 8 psychological principles:

  1. Social proof and conformity
     - How to write captions that leverage social proof ethically
     - Write 3 captions showing different social proof techniques
     - The line between social proof and manufactured consensus

  2. Scarcity and urgency
     - Real vs. artificial scarcity in captions
     - Write 3 captions with genuine urgency that don't feel manipulative
     - When scarcity messaging becomes unethical

  3. Reciprocity
     - How giving value in captions creates reciprocal engagement
     - Write 3 captions that demonstrate the reciprocity principle
     - Designing content that earns the right to ask

  4. Story and narrative transportation
     - Why stories bypass rational resistance
     - Write 3 captions using narrative transportation techniques
     - The neuroscience of storytelling in 2,200 characters

  5. Identity and self-concept
     - Captions that connect products/ideas to identity
     - Write 3 captions that tap into audience self-concept
     - Ethical considerations of identity-based marketing

  6. Loss aversion
     - Framing benefits as losses avoided vs. gains achieved
     - Write 3 captions using loss aversion framing
     - When loss framing crosses into fear-mongering

  7. Curiosity gap
     - Creating information gaps that drive engagement
     - Write 3 captions with effective curiosity gaps
     - The difference between curiosity and clickbait

  8. Emotional contagion
     - How caption emotion spreads through comments
     - Write 3 captions designed to create specific emotional states
     - Responsible emotional design in captions

  Part 2: Cognitive bias application
  Show how 5 cognitive biases can be ethically applied in captions:
  1. Anchoring (price/value framing)
  2. Bandwagon effect (participation momentum)
  3. IKEA effect (investment increases valuation)
  4. Halo effect (positive association transfer)
  5. Availability heuristic (memorable examples)

  For each, write a caption example and a "misuse" example.

  Part 3: Ethical influence framework
  1. Where to draw the line between persuasion and manipulation
  2. Dark patterns in Instagram captions (what to avoid)
  3. Vulnerable audience considerations
  4. Building long-term trust vs. short-term conversion
  5. Self-audit checklist: "Is this caption ethical?"

assertions:
  - type: llm_judge
    criteria: "Psychology principles are accurately applied — each framework correctly reflects the underlying research, not pop psychology simplifications"
    weight: 0.25
    description: "Accurate psychology application"
  - type: llm_judge
    criteria: "Caption examples effectively demonstrate each principle — a reader could identify which psychological principle is at work and how"
    weight: 0.25
    description: "Clear principle demonstration"
  - type: llm_judge
    criteria: "Ethics are genuinely addressed — the line between ethical influence and manipulation is clearly defined with specific criteria, not just lip service"
    weight: 0.30
    description: "Genuine ethical framework"
  - type: llm_judge
    criteria: "Cognitive bias examples include both ethical use and misuse — the contrast helps readers understand appropriate application"
    weight: 0.20
    description: "Balanced bias examples"
