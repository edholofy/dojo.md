meta:
  id: instagram-mastery-challenge
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Complete mastery challenge — write 10 captions across every format, industry, and difficulty level to demonstrate full Instagram caption expertise"
  tags: [instagram, mastery, challenge, comprehensive, portfolio, mastery]

state: {}

trigger: |
  This mastery challenge tests your ability to write Instagram
  captions across every format, industry, tone, and purpose.
  Each caption must demonstrate expert-level understanding of
  the platform, audience psychology, and brand voice adaptation.

  Write 10 expert-level captions. For each, include:
  - The complete caption (ready to post)
  - Strategy notes (why you made each creative choice)
  - Expected performance analysis (which metrics this should excel at)

  Caption 1: Luxury brand product launch (Reel caption)
  Brand: "Maison Noir" — haute couture fragrance house
  Context: Launching a $350 unisex fragrance called "Dusk"
  Audience: 180K followers, affluent, aesthetics-driven
  Challenge: Convey luxury without being pretentious

  Caption 2: Crisis response (feed post)
  Brand: "FreshFarm Delivery" — organic grocery delivery
  Context: Data breach exposed 12,000 customer email addresses
  Audience: 45K followers, health-conscious families
  Challenge: Be transparent and reassuring without legal liability

  Caption 3: Viral engagement bait that doesn't feel cheap
  Brand: "BookNest" — independent bookstore chain
  Context: No specific product to push, just drive engagement
  Audience: 30K followers, avid readers
  Challenge: Create debate/conversation without clickbait tactics

  Caption 4: Technical product explanation (carousel)
  Brand: "SolarSync" — residential solar panel company
  Context: Explaining net metering to homeowners
  Audience: 15K followers, homeowners considering solar
  Challenge: Make complex topic accessible without dumbing it down

  Caption 5: Emotional storytelling (long-form feed post)
  Brand: "Second Chances Animal Rescue"
  Context: Adoption success story of a senior dog
  Audience: 55K followers, animal lovers
  Challenge: Create emotion that drives action (donations), not just likes

  Caption 6: Gen Z tone for legacy brand
  Brand: "Hartford Insurance" — 200-year-old insurance company
  Context: Launching renter's insurance product for young adults
  Audience: 25K followers (trying to grow younger demographic)
  Challenge: Sound authentic to Gen Z without being cringe

  Caption 7: Controversial opinion/thought leadership
  Brand: Personal brand of a marketing consultant
  Context: Hot take on why engagement pods are killing organic reach
  Audience: 40K followers, marketers and entrepreneurs
  Challenge: Be provocative enough to generate debate without alienating

  Caption 8: Multi-cultural audience caption
  Brand: "WorldSpice" — global spice and seasoning brand
  Context: Diwali celebration post featuring turmeric products
  Audience: 60K followers, diverse, food enthusiasts
  Challenge: Celebrate authentically without cultural appropriation

  Caption 9: B2B Instagram caption (carousel)
  Brand: "DataFlow" — enterprise data analytics platform
  Context: Case study showing client achieved 3x ROI
  Audience: 8K followers, CTOs and data leaders
  Challenge: Drive leads on a visual platform for a non-visual product

  Caption 10: Comeback/relaunch after long silence
  Brand: "Vinyl Revival" — record store that closed during pandemic
  Context: Reopening after 18 months with a new location
  Audience: 12K followers (many may have unfollowed)
  Challenge: Re-engage dormant audience with excitement, not guilt

assertions:
  - type: llm_judge
    criteria: "All 10 captions demonstrate mastery of their specific challenge — the luxury caption feels luxurious, the crisis caption feels appropriate, the Gen Z caption feels authentic"
    weight: 0.30
    description: "Challenge-specific mastery"
  - type: llm_judge
    criteria: "Voice adaptation is exceptional — each caption sounds like it was written by someone who deeply understands that specific brand and audience"
    weight: 0.25
    description: "Exceptional voice adaptation"
  - type: llm_judge
    criteria: "Strategy notes reveal expert thinking — creative choices are justified with platform knowledge, audience psychology, and business strategy"
    weight: 0.25
    description: "Expert strategic reasoning"
  - type: llm_judge
    criteria: "Performance predictions are realistic and specific — identifying which metrics each caption should excel at with reasoning"
    weight: 0.20
    description: "Realistic performance predictions"
