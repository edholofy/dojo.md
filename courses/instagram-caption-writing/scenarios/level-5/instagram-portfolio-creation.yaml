meta:
  id: instagram-portfolio-creation
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Create a professional Instagram caption writing portfolio — case studies, before/after transformations, process documentation, and client-ready presentations"
  tags: [instagram, portfolio, professional, case-study, career, mastery]

state: {}

trigger: |
  A professional Instagram caption writer's portfolio demonstrates
  range, strategy, and results. Unlike design portfolios that
  show visuals, caption portfolios must convey voice mastery,
  strategic thinking, and measurable impact through text alone.

  Build a complete professional portfolio for an Instagram
  caption writer/strategist:

  Part 1: Portfolio case studies (create 4 fictional but realistic ones)

  Case Study 1: Brand voice transformation
  Client: "Zenith Watches" — luxury watch brand
  Challenge: Captions were corporate and stiff, engagement at 1.2%
  Solution: Voice overhaul from corporate to sophisticated-casual
  Show: 3 before/after caption pairs with performance improvement
  Results: Engagement increased to 3.8%, saves up 240%

  Case Study 2: Growth campaign
  Client: "GreenRoot Supplements" — health brand, 5K to 25K followers
  Challenge: Growing followers while maintaining engagement quality
  Solution: Content pillar strategy with engagement-optimized captions
  Show: Monthly growth trajectory with key caption milestones
  Results: 5x follower growth in 8 months, engagement maintained at 5.1%

  Case Study 3: Commerce optimization
  Client: "Artisan & Oak" — furniture e-commerce
  Challenge: Beautiful products but captions not driving sales
  Solution: Shopping caption framework with strategic CTAs
  Show: Caption evolution from pure aesthetic to conversion-optimized
  Results: Instagram-attributed revenue up 180%, AOV up 22%

  Case Study 4: Crisis management
  Client: "FreshBite" — food delivery service
  Challenge: Viral complaint video, negative sentiment spike
  Solution: Crisis caption sequence + reputation recovery plan
  Show: The crisis caption, daily response captions, recovery arc
  Results: Sentiment recovered to pre-crisis levels in 3 weeks

  Part 2: Writing samples organized by specialty
  Create sample captions demonstrating expertise in:
  1. Voice range: Same product, 5 different brand voices
  2. Format mastery: Same message across feed, Reel, carousel, Story
  3. Industry breadth: 6 industries, one caption each
  4. Promotional: Product launch, flash sale, seasonal campaign
  5. Engagement: Conversation starter, UGC prompt, community feature

  Part 3: Portfolio presentation
  1. Portfolio structure and navigation (how to organize for maximum impact)
  2. How to present process (strategy → draft → edit → result)
  3. Metrics presentation (making results compelling)
  4. Client testimonial integration
  5. Pricing and services page copy

assertions:
  - type: llm_judge
    criteria: "Case studies are realistic and compelling — they tell a clear story of challenge, solution, and measurable results that a potential client would find credible"
    weight: 0.30
    description: "Compelling realistic case studies"
  - type: llm_judge
    criteria: "Before/after transformations clearly demonstrate value — the improvement in caption quality is obvious and the strategic reasoning is clear"
    weight: 0.25
    description: "Clear value demonstration"
  - type: llm_judge
    criteria: "Writing samples show genuine range — voice adaptation, format mastery, and industry breadth are demonstrated convincingly"
    weight: 0.25
    description: "Demonstrated writing range"
  - type: llm_judge
    criteria: "Portfolio presentation advice is professional — the structure, navigation, and client-facing elements would work as an actual portfolio"
    weight: 0.20
    description: "Professional portfolio structure"
