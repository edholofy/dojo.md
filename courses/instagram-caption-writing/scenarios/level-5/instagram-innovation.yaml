meta:
  id: instagram-innovation
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Innovate Instagram caption formats — interactive captions, serialized content, transmedia storytelling, and emerging format experimentation"
  tags: [instagram, innovation, formats, experimental, creative, mastery]

state: {}

trigger: |
  The best Instagram captions push the platform's boundaries.
  Interactive elements, serialized narratives, transmedia
  storytelling, and format-breaking experiments create content
  that stands out in an increasingly homogeneous feed.

  Part 1: Interactive caption formats
  Design 5 innovative caption formats that create interaction:

  1. "Choose Your Adventure" caption
     - A caption that presents a scenario with 2-3 choices
     - Followers vote via comments/emoji reactions
     - Write the initial caption AND follow-up captions for each path
     - Brand: Travel company

  2. "Caption Puzzle" format
     - A caption that contains a hidden message, riddle, or code
     - Followers must engage deeply to solve it
     - Write 3 examples with increasing difficulty
     - Brand: Education technology company

  3. "Collaborative Story" caption
     - A caption that starts a story and asks followers to continue
     - How to curate and feature the best contributions
     - Write the launch caption and the compilation post caption
     - Brand: Creative writing app

  4. "Micro-course" serialized caption series
     - A 5-day Instagram caption course delivered via feed posts
     - Each caption teaches one concept and builds on the previous
     - Write all 5 captions with learning objectives
     - Brand: Personal finance advisor

  5. "Real-time Narration" format
     - Captions that update with edits as an event unfolds
     - How to use Instagram's edit feature strategically
     - Write the initial caption and 3 edit versions
     - Brand: Sports media account during a championship game

  Part 2: Transmedia caption strategy
  Design a transmedia story that unfolds across Instagram formats:
  - Feed post caption (the narrative anchor)
  - Carousel caption (the deep dive)
  - Reel caption (the emotional hook)
  - Story text (the exclusive details)
  - Broadcast channel message (the insider commentary)

  Brand: "Ember & Oak" — a furniture maker, launching a new collection
  The story: The journey from reclaimed wood to finished table

  Part 3: Future of Instagram captions
  1. How AI-generated content will change caption expectations
  2. Voice and audio captions (accessibility and engagement)
  3. Ephemeral vs. evergreen caption strategy shifts
  4. Community-created content curation as caption strategy
  5. Predictions for caption trends in the next 2 years

assertions:
  - type: llm_judge
    criteria: "Interactive formats are genuinely innovative — they go beyond basic questions to create new forms of audience participation"
    weight: 0.30
    description: "Genuinely innovative formats"
  - type: llm_judge
    criteria: "Serialized and transmedia content creates compelling narratives — the story arc across formats builds engagement and anticipation"
    weight: 0.25
    description: "Compelling cross-format narratives"
  - type: llm_judge
    criteria: "Each innovative format is practical to execute — creative ideas are grounded in actual Instagram functionality and audience behavior"
    weight: 0.25
    description: "Practically executable innovations"
  - type: llm_judge
    criteria: "Future predictions are thoughtful and informed — they demonstrate deep understanding of platform evolution and content trends"
    weight: 0.20
    description: "Informed future predictions"
