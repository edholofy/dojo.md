meta:
  id: comprehensive-instagram-engagement
  level: 5
  course: instagram-caption-writing
  type: output
  description: "Complete Instagram client engagement capstone — full 6-month Instagram caption strategy from audit through execution, optimization, and reporting"
  tags: [instagram, capstone, client-engagement, comprehensive, strategy, mastery]

state: {}

trigger: |
  This capstone project simulates a complete 6-month client
  engagement for Instagram caption strategy. From initial audit
  through strategy development, execution, optimization, and
  reporting — demonstrate mastery of every aspect of Instagram
  caption writing at the professional level.

  Client: "Solara Beauty" — clean beauty brand
  Current state: 42K followers, posting 3x/week, engagement rate 2.1%
  Goals: Reach 80K followers, 4.5% engagement rate, $30K/month
  Instagram-attributed revenue
  Budget: $8,000/month for content team and tools
  Team: 1 social media manager, 1 content creator, 1 copywriter

  Part 1: Discovery and audit (Month 0)
  1. Caption audit of last 90 days:
     - Voice consistency assessment
     - Performance pattern analysis
     - Content mix evaluation
     - Competitive positioning
  2. Audience research findings:
     - Audience persona development (2 primary personas)
     - Content preference insights
     - Engagement behavior analysis
  3. Gap analysis and opportunity identification

  Part 2: Strategy development (Month 1)
  1. Brand voice refinement:
     - Updated voice guidelines
     - Tone spectrum definition
     - Word lists (use/avoid)
  2. Content pillar strategy with caption frameworks
  3. Posting calendar structure (increased to 5x/week)
  4. Template library (8 caption templates)
  5. Hashtag and SEO strategy
  6. Team workflow and approval process
  7. KPI targets by month

  Part 3: Execution samples (Months 2-4)
  Write actual caption samples for key moments:
  1. Brand voice launch post (introducing the new tone)
  2. Product launch carousel caption (new serum)
  3. Customer story feature (long-form)
  4. Educational Reel caption (skincare routine)
  5. Community engagement post (weekly ritual)
  6. Promotional caption (seasonal sale)
  7. Partnership/collab caption (with a wellness influencer)
  8. Trending moment response (relevant beauty trend)

  Part 4: Optimization and reporting (Months 5-6)
  1. Mid-engagement performance review:
     - What worked and what didn't
     - Strategy adjustments based on data
     - Caption A/B test results
  2. Final 6-month report:
     - Follower growth trajectory
     - Engagement rate improvement
     - Revenue attribution
     - Content type performance ranking
     - Top 5 learnings and recommendations
  3. Renewal proposal:
     - Next 6-month strategy preview
     - Expanded scope recommendations
     - Updated pricing and deliverables

assertions:
  - type: llm_judge
    criteria: "The engagement follows a professional consulting arc — audit, strategy, execution, optimization, and reporting flow logically with each phase building on the previous"
    weight: 0.25
    description: "Professional engagement structure"
  - type: llm_judge
    criteria: "Caption samples demonstrate the strategy in action — voice, templates, and frameworks from Part 2 are visible in the Part 3 captions"
    weight: 0.25
    description: "Strategy-aligned execution"
  - type: llm_judge
    criteria: "Performance review and optimization show analytical rigor — data-driven adjustments and A/B test insights demonstrate expert-level optimization"
    weight: 0.25
    description: "Data-driven optimization"
  - type: llm_judge
    criteria: "The renewal proposal is compelling — it demonstrates enough value delivered to justify continued investment with expanded scope"
    weight: 0.25
    description: "Compelling renewal proposal"
