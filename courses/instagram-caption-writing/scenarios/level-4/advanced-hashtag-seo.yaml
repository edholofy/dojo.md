meta:
  id: advanced-hashtag-seo
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Master advanced Instagram SEO and hashtag strategy — keyword optimization, search discovery, hashtag analytics, and algorithm-aligned caption writing"
  tags: [instagram, seo, hashtags, discovery, algorithm, expert]

state: {}

trigger: |
  Instagram SEO has evolved beyond hashtags. With Instagram's
  search function now analyzing caption text, alt text, and
  profile information, caption writing is now a discovery strategy.
  Advanced hashtag usage means understanding reach patterns,
  competition levels, and rotation strategies.

  Build an advanced Instagram SEO and hashtag system for
  "Mindful Living Co." — a wellness and mindfulness brand
  (22K followers):

  Part 1: Instagram SEO caption optimization
  1. Keyword research for the wellness niche:
     - Primary keywords (high search volume, high competition)
     - Secondary keywords (moderate volume, moderate competition)
     - Long-tail keywords (lower volume, low competition)
     - Trending keywords (seasonal or momentum-based)
  2. How to naturally integrate keywords into captions:
     - Write 5 captions — one keyword-stuffed (bad) version and
       one naturally optimized (good) version of each
  3. Alt text optimization strategy:
     - How to write SEO-friendly alt text for 5 image types
  4. Profile SEO and how it connects to caption discovery

  Part 2: Advanced hashtag strategy
  Build a complete hashtag system:
  1. Hashtag research methodology:
     - How to evaluate hashtag quality (not just size)
     - Competition analysis for hashtag ranking
     - Hashtag velocity (how fast posts cycle through)
  2. Hashtag library organized by:
     - Content pillar (mindfulness, wellness, self-care, meditation)
     - Reach tier (small <10K, medium 10K-500K, large 500K+)
     - Intent (discovery, community, branded)
  3. Hashtag rotation system:
     - 10 hashtag sets of 5 each, organized by content type
     - Rotation schedule to avoid shadow-ban patterns
     - How to test and replace underperforming hashtags
  4. Branded hashtag strategy:
     - Creating and launching a branded hashtag
     - Community adoption tactics
     - Tracking branded hashtag performance

  Part 3: Discovery optimization
  1. Explore page caption patterns (what captions get featured)
  2. Search result optimization (how captions appear in search)
  3. Suggested content signals (what makes Instagram suggest your post)
  4. Caption elements that improve algorithmic distribution
  5. Monthly SEO audit checklist for Instagram captions

assertions:
  - type: llm_judge
    criteria: "Keyword integration examples clearly show the difference between stuffed and natural — the optimized versions read naturally while still being discoverable"
    weight: 0.25
    description: "Natural keyword integration"
  - type: llm_judge
    criteria: "Hashtag strategy goes beyond basic lists — the system includes evaluation methodology, rotation logic, and performance tracking"
    weight: 0.30
    description: "Systematic hashtag approach"
  - type: llm_judge
    criteria: "SEO recommendations are current with Instagram's search functionality — addressing caption text search, alt text, and profile optimization together"
    weight: 0.25
    description: "Current Instagram SEO knowledge"
  - type: llm_judge
    criteria: "Discovery optimization advice is specific and actionable — Explore page patterns and suggested content signals are concrete, not vague"
    weight: 0.20
    description: "Actionable discovery advice"
