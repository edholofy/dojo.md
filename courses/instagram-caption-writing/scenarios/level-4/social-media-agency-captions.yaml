meta:
  id: social-media-agency-captions
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Build an agency-level Instagram caption service — client onboarding, multi-client management, caption production workflows, and quality assurance"
  tags: [instagram, agency, multi-client, workflow, production, expert]

state: {}

trigger: |
  Social media agencies manage Instagram captions for multiple
  clients simultaneously. Each client has a different brand voice,
  audience, and goals. The challenge is maintaining quality and
  brand accuracy across 5-15 accounts while meeting deadlines
  and managing client feedback.

  Design a complete agency caption service for "SocialSpark Agency"
  managing 8 Instagram accounts:

  Part 1: Client onboarding system
  Create the onboarding process for a new Instagram client:
  1. Brand voice discovery questionnaire (15 questions)
  2. Caption style audit process (analyzing their existing captions)
  3. Competitor caption analysis template
  4. Brand voice document creation (deliverable to client)
  5. Approval workflow setup

  Part 2: Multi-client caption production
  Design the weekly workflow for 8 clients:
  - Client A: Luxury real estate (5 posts/week)
  - Client B: Organic baby food (7 posts/week)
  - Client C: SaaS startup (5 posts/week)
  - Client D: Local restaurant (4 posts/week)
  - Client E: Fashion boutique (6 posts/week)
  - Client F: Fitness influencer (7 posts/week)
  - Client G: Dental practice (3 posts/week)
  - Client H: Pet grooming (4 posts/week)

  For each client, write one example caption that demonstrates
  the distinct brand voice. Then design:
  1. Weekly production schedule (batching by client or by day?)
  2. Writer assignment strategy (specialist vs. generalist)
  3. Quality control checkpoints
  4. Client review and approval process
  5. Revision management system

  Part 3: Agency quality metrics
  Define how the agency measures caption performance:
  1. Per-client KPIs and reporting templates
  2. Internal quality scoring rubric (rate captions 1-10)
  3. Client satisfaction tracking
  4. Writer performance metrics

assertions:
  - type: llm_judge
    criteria: "The 8 example captions sound distinctly different — luxury real estate sounds nothing like organic baby food or SaaS startup"
    weight: 0.30
    description: "Distinct multi-client voices"
  - type: llm_judge
    criteria: "The production workflow is operationally sound — managing 41 posts/week across 8 clients with clear processes and timelines"
    weight: 0.25
    description: "Scalable production workflow"
  - type: llm_judge
    criteria: "Client onboarding captures enough information to write on-brand captions without constant back-and-forth"
    weight: 0.25
    description: "Thorough onboarding process"
  - type: llm_judge
    criteria: "Quality metrics go beyond vanity metrics — the scoring rubric and performance tracking are sophisticated enough for agency use"
    weight: 0.20
    description: "Professional quality metrics"
