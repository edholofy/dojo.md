meta:
  id: influencer-campaign-captions
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Manage influencer marketing caption campaigns — multi-influencer coordination, campaign messaging, performance tracking, and brand safety"
  tags: [instagram, influencer, campaign, management, coordination, expert]

state: {}

trigger: |
  Large influencer campaigns involve coordinating captions across
  10-50+ creators while maintaining consistent messaging, ensuring
  FTC compliance, and tracking performance. The brand must create
  flexible guidelines that preserve authenticity while hitting
  campaign goals.

  Design a complete influencer caption campaign:

  Brand: "VitaGlow" — premium vitamin supplements
  Campaign: "Morning Ritual" — new morning vitamin pack launch
  Budget: $150,000 across 25 influencers
  Duration: 6-week campaign
  Goal: 10,000 website visits and 2,000 trial sign-ups

  Part 1: Influencer tier strategy and caption guidelines
  Design caption guidelines for each tier:

  Tier 1: 3 macro-influencers (200K-500K followers)
  - Caption brief with key messaging, approved claims, required elements
  - 2 example captions showing the range of acceptable copy
  - What can be customized vs. what must stay fixed

  Tier 2: 7 mid-tier influencers (50K-200K followers)
  - Caption brief (more structured than Tier 1)
  - Caption template with fill-in sections
  - Required hashtags and disclosure language

  Tier 3: 15 micro-influencers (10K-50K followers)
  - Detailed caption guidelines (most structured)
  - 3 caption templates to choose from
  - Exact disclosure and CTA requirements

  Part 2: Campaign timeline and caption rollout
  Plan the 6-week caption schedule:
  - Week 1-2: Teaser phase (intrigue, no product name)
  - Week 3-4: Launch phase (reveal, features, trial offer)
  - Week 5-6: Social proof phase (results, testimonials)
  For each phase, provide campaign-wide caption guidelines
  and one example caption per tier.

  Part 3: Compliance and brand safety
  1. FTC compliance checklist for every influencer caption
  2. Claim review process (what claims need legal review)
  3. Brand safety monitoring (what to watch for in comments)
  4. Crisis protocol if an influencer goes off-script
  5. Performance reporting template per influencer

assertions:
  - type: llm_judge
    criteria: "Tier-specific guidelines appropriately balance control and creativity — macro-influencers get more freedom, micro-influencers get more structure"
    weight: 0.25
    description: "Tiered influencer approach"
  - type: llm_judge
    criteria: "Campaign phases have distinct caption strategies — teaser captions feel different from launch captions and social proof captions"
    weight: 0.25
    description: "Phase-differentiated captions"
  - type: llm_judge
    criteria: "FTC compliance is thoroughly addressed — disclosures, approved claims, and monitoring processes are specific and practical"
    weight: 0.25
    description: "Thorough compliance framework"
  - type: llm_judge
    criteria: "The campaign is operationally manageable — coordinating 25 influencers over 6 weeks with clear timelines, approvals, and tracking"
    weight: 0.25
    description: "Operationally feasible campaign"
