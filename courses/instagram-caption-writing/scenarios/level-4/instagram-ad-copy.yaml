meta:
  id: instagram-ad-copy
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Write Instagram ad copy — feed ads, Story ads, Reel ads, carousel ads, and A/B testing frameworks for paid social"
  tags: [instagram, advertising, paid-social, ad-copy, conversion, expert]

state: {}

trigger: |
  Instagram ad copy follows different rules than organic captions.
  Paid content must hook in the first line (users scroll past ads
  faster), clearly communicate the value proposition, and drive
  a specific conversion action. Ad copy also needs to work with
  Meta's ad policies and character limits.

  Write Instagram ad copy for "CloudDesk" — a remote work SaaS
  platform ($29/month, 14-day free trial):

  Part 1: Full-funnel ad copy
  Write ad copy for each funnel stage:

  Top of Funnel (Awareness):
  1. Feed ad — introduce the problem CloudDesk solves
  2. Reel ad — 15-second hook + value prop + CTA
  3. Story ad — immediate impact, swipe-up CTA
  Write 3 variations of each for A/B testing

  Middle of Funnel (Consideration):
  4. Carousel ad — "5 Features Remote Teams Love"
  5. Feed ad — social proof / testimonial style
  6. Reel ad — product demo walkthrough
  Write 2 variations of each

  Bottom of Funnel (Conversion):
  7. Feed ad — free trial offer with urgency
  8. Story ad — limited-time discount
  9. Retargeting ad — for website visitors who didn't convert
  Write 2 variations of each

  Part 2: Ad copy vs. organic caption comparison
  For 3 topics, write both the organic caption and the ad version,
  then explain the key differences:
  1. Feature announcement
  2. Customer success story
  3. Industry insight/thought leadership

  Part 3: Ad copy optimization framework
  1. Character count best practices by ad format
  2. Headline vs. primary text vs. description strategy
  3. CTA button + caption CTA alignment
  4. Dynamic creative considerations (how copy works with auto-placement)
  5. Performance metrics to track and optimize against
  6. Common ad copy mistakes and fixes

assertions:
  - type: llm_judge
    criteria: "Ad copy variations are meaningfully different — A/B test versions change hooks, angles, or value props, not just word substitutions"
    weight: 0.30
    description: "Meaningful ad variations"
  - type: llm_judge
    criteria: "Funnel stages have appropriate copy — awareness ads focus on problems, consideration on features/proof, conversion on urgency and offers"
    weight: 0.25
    description: "Funnel-appropriate copy"
  - type: llm_judge
    criteria: "Ad copy vs. organic comparison clearly shows the differences — ad copy is more direct, benefits-focused, and action-oriented"
    weight: 0.25
    description: "Clear ad vs organic distinction"
  - type: llm_judge
    criteria: "Optimization framework is specific to Instagram ads — character counts, placement considerations, and metrics are accurate and practical"
    weight: 0.20
    description: "Platform-specific optimization"
