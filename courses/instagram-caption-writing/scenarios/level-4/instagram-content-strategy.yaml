meta:
  id: instagram-content-strategy
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Build a comprehensive Instagram content strategy — content pillars, posting cadence, caption frameworks by pillar, and 30-day content plans"
  tags: [instagram, content-strategy, planning, pillars, cadence, expert]

state: {}

trigger: |
  A successful Instagram presence requires more than individual
  good captions — it needs a cohesive content strategy that ties
  every post to business goals. Content pillars create consistency,
  posting cadence drives algorithm favor, and caption frameworks
  ensure quality at scale.

  Build a complete Instagram content strategy for:
  Brand: "Apex Fitness" — boutique gym chain (3 locations)
  Account: 18,000 followers, posting 4x/week currently
  Goal: Grow to 50,000 followers and drive 200 new memberships/month
  Audience: Urban professionals 25-40, interested in boutique fitness

  Part 1: Content pillar architecture
  Design 5 content pillars with caption strategy for each:
  1. For each pillar define:
     - Pillar name and purpose (what business goal it serves)
     - Content types within the pillar (feed, Reel, carousel, Story)
     - Caption framework specific to this pillar
     - Example caption for each content type
     - KPIs for the pillar
  2. Define the ratio between pillars (e.g., 30% educational,
     25% community, etc.)
  3. How pillars connect to the customer journey
     (awareness → consideration → conversion → retention)

  Part 2: 30-day content calendar with captions
  Create a full 30-day plan:
  - 7 posts/week (mix of feed, Reels, carousels)
  - Each post: content type, pillar, caption draft, hashtag set
  - Include 4 Story series with text captions
  - Mark key engagement moments (best times to post, engagement
    windows)

  Part 3: Caption scaling system
  1. How to maintain quality while increasing from 4 to 7 posts/week
  2. Batch creation workflow (themed days, template usage)
  3. Content repurposing strategy (one idea → 5 caption variations)
  4. Team delegation framework (what to outsource, what to keep)

assertions:
  - type: llm_judge
    criteria: "Content pillars are strategically designed — each pillar serves a clear business purpose and maps to the customer journey"
    weight: 0.30
    description: "Strategic content pillars"
  - type: llm_judge
    criteria: "The 30-day calendar is complete and realistic — includes all 7 weekly posts with actual caption drafts, not just placeholders"
    weight: 0.25
    description: "Complete actionable calendar"
  - type: llm_judge
    criteria: "Caption frameworks vary meaningfully by pillar — educational content sounds different from community content, and each has its own structure"
    weight: 0.25
    description: "Pillar-differentiated captions"
  - type: llm_judge
    criteria: "The scaling system addresses real operational challenges — batch workflows, repurposing, and delegation are practical for a small team"
    weight: 0.20
    description: "Practical scaling system"
