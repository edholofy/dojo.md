meta:
  id: multi-account-management
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Manage captions across multiple Instagram accounts — brand architecture, cross-posting strategy, voice differentiation, and operational efficiency"
  tags: [instagram, multi-account, brand-architecture, management, scale, expert]

state: {}

trigger: |
  Many brands operate multiple Instagram accounts — a main brand
  account, sub-brand accounts, regional accounts, or personal
  brand accounts for executives. Each needs its own voice while
  maintaining brand coherence. Managing captions across 3-10
  accounts requires systems, not just talent.

  Design a multi-account caption management system for
  "Harvest Foods" — an organic food company:

  Accounts:
  1. @harvestfoods (main brand, 120K followers)
  2. @harvestkids (children's food line, 35K followers)
  3. @harvestpets (pet food line, 22K followers)
  4. @harvestfarm (farm/sustainability content, 15K followers)
  5. @chef_marcus_harvest (founder's personal brand, 45K followers)

  Part 1: Voice architecture
  For each account, define:
  1. Brand voice profile (personality, tone, vocabulary)
  2. Audience persona (who follows, what they want)
  3. Content pillars specific to the account
  4. Caption style guide excerpt (dos and don'ts)
  5. One example caption showing the account's distinct voice

  Then create a voice differentiation matrix showing how the
  same topic (e.g., "new organic certification") would be
  captioned differently across all 5 accounts.

  Part 2: Cross-posting and coordination
  Design the cross-account strategy:
  1. When content should appear on multiple accounts (and how captions differ)
  2. Cross-promotion caption templates ("Check out @harvestkids for...")
  3. Unified campaign execution (how a brand campaign rolls out across all accounts)
  4. Content calendar coordination (avoiding same-day overlap, creating synergy)

  Write a unified campaign example: "Farm to Table Week"
  - Caption for each of the 5 accounts on launch day
  - How accounts reference and support each other

  Part 3: Operational systems
  1. Content planning workflow for 5 accounts
  2. Writer specialization vs. rotation strategy
  3. Approval hierarchy (who signs off on what)
  4. Cross-account performance dashboard design
  5. Monthly coordination meeting agenda

assertions:
  - type: llm_judge
    criteria: "Voice architecture creates 5 genuinely distinct voices — @harvestkids sounds playful, @harvestfarm sounds earthy, and @chef_marcus_harvest sounds personal"
    weight: 0.30
    description: "Distinct account voices"
  - type: llm_judge
    criteria: "The differentiation matrix effectively demonstrates how the same topic gets different treatments — each account's take feels natural, not forced"
    weight: 0.25
    description: "Effective voice differentiation"
  - type: llm_judge
    criteria: "Cross-posting strategy is thoughtful — it identifies when cross-posting adds value vs. when it dilutes, with clear guidelines"
    weight: 0.25
    description: "Strategic cross-posting"
  - type: llm_judge
    criteria: "Operational systems are realistic for a team managing 5 accounts — workflows, approvals, and coordination are practical"
    weight: 0.20
    description: "Realistic operational systems"
