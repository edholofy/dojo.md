meta:
  id: competitive-caption-analysis
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Analyze competitor Instagram captions — reverse-engineer strategies, identify gaps, benchmark performance, and develop competitive advantages"
  tags: [instagram, competitive-analysis, benchmarking, strategy, research, expert]

state: {}

trigger: |
  Competitive caption analysis goes beyond "what are they posting" —
  it reverse-engineers why certain captions outperform, identifies
  strategic gaps you can exploit, and benchmarks your performance
  against industry leaders.

  Conduct a competitive Instagram caption analysis for "BrewCraft" —
  a specialty coffee brand (12K followers, launching DTC e-commerce):

  Competitors to analyze:
  1. "MorningBrew Coffee" (85K followers) — established premium brand
  2. "BeanBox" (45K followers) — subscription coffee service
  3. "Counter Culture" (120K followers) — specialty roaster
  4. "Blue Bottle" (400K followers) — premium chain
  5. "Trade Coffee" (55K followers) — discovery platform

  Part 1: Caption strategy reverse-engineering
  For each competitor, analyze their caption approach:
  1. Voice and tone characterization (3-5 adjective description)
  2. Average caption length and structure patterns
  3. Hook strategies (what types of hooks do they use most?)
  4. CTA patterns (what actions do they drive?)
  5. Hashtag strategy (branded, community, discovery)
  6. Emoji usage patterns
  7. Engagement technique preferences (questions, polls, challenges)
  8. Content mix (educational vs. promotional vs. community)

  Create a comparison matrix showing all 5 competitors side by side.

  Part 2: Gap analysis and opportunity identification
  Based on the competitive analysis:
  1. Identify 5 caption strategies none of the competitors use well
  2. Find the "white space" — topics or approaches that are underserved
  3. Determine which competitor's approach would be easiest to beat
  4. Identify caption elements to borrow (with differentiation)
  5. Define BrewCraft's unique caption positioning

  Part 3: Competitive caption playbook
  Create BrewCraft's differentiated caption strategy:
  1. 5 caption types that competitors don't use (or use poorly)
  2. Write example captions for each showing how BrewCraft stands apart
  3. Competitive response templates (how to caption when a competitor
     launches something, runs a campaign, or goes viral)
  4. Quarterly competitive review process

assertions:
  - type: llm_judge
    criteria: "Competitor analysis is specific and differentiated — each competitor's caption strategy is distinctly characterized, not described in generic terms"
    weight: 0.25
    description: "Specific competitor characterization"
  - type: llm_judge
    criteria: "Gap analysis identifies genuine opportunities — the white space findings are actionable, not obvious or already saturated"
    weight: 0.30
    description: "Genuine gap identification"
  - type: llm_judge
    criteria: "BrewCraft's differentiated strategy builds on competitive insights — the recommended approach clearly responds to gaps and weaknesses identified"
    weight: 0.25
    description: "Insight-driven differentiation"
  - type: llm_judge
    criteria: "Example captions demonstrate the competitive advantage in practice — they would visibly stand out in a feed alongside competitor content"
    weight: 0.20
    description: "Demonstrably differentiated captions"
