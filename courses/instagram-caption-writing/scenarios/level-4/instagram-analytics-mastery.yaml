meta:
  id: instagram-analytics-mastery
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Master Instagram analytics for caption optimization — advanced metrics, cohort analysis, predictive modeling, and data-driven content decisions"
  tags: [instagram, analytics, advanced-metrics, data-driven, optimization, expert]

state: {}

trigger: |
  Beyond basic engagement rates, advanced Instagram analytics
  reveal deeper patterns in caption performance. Cohort analysis,
  save-to-impression ratios, comment sentiment, and follower
  journey mapping all inform caption strategy at the expert level.

  Perform advanced caption analytics for "StyleVault" — a
  fashion e-commerce brand (65K followers, 9 months of data):

  Part 1: Advanced metric analysis
  Given this quarterly data:

  Q1 (Jan-Mar): 78 posts
  - Avg reach: 8,200 | Avg engagement rate: 4.2%
  - Top format: Carousel (5.8% ER) | Lowest: Single image (2.9% ER)
  - Avg saves: 85/post | Avg shares: 32/post
  - Captions with questions: 6.1% ER | Without: 3.4% ER
  - Short captions (<100 words): 3.1% ER | Long (>200): 5.5% ER
  - Posts with emojis: 4.5% ER | Without: 3.8% ER
  - Posting time: 9am (4.8% ER) | 12pm (3.9%) | 6pm (4.1%)

  Q2 (Apr-Jun): 84 posts
  - Avg reach: 9,500 | Avg engagement rate: 3.8%
  - Top format: Reel (5.2% ER) | Lowest: Single image (2.6% ER)
  - Avg saves: 92/post | Avg shares: 45/post
  - Captions with questions: 5.4% ER | Without: 3.1% ER
  - Short captions: 2.8% ER | Long: 4.9% ER
  - Posts with emojis: 4.1% ER | Without: 3.5% ER
  - Posting time: 9am (4.2% ER) | 12pm (3.7%) | 6pm (4.5%)

  Q3 (Jul-Sep): 91 posts
  - Avg reach: 11,200 | Avg engagement rate: 3.5%
  - Top format: Reel (4.8% ER) | Lowest: Single image (2.3% ER)
  - Avg saves: 78/post | Avg shares: 58/post
  - Captions with questions: 4.9% ER | Without: 2.8% ER
  - Short captions: 2.5% ER | Long: 4.4% ER
  - Posts with emojis: 3.7% ER | Without: 3.2% ER
  - Posting time: 9am (3.8% ER) | 12pm (3.4%) | 6pm (4.8%)

  Analyze:
  1. Quarter-over-quarter trends (what's improving, what's declining)
  2. The "engagement rate paradox" (ER dropping while reach grows)
  3. Save-to-share ratio shifts and what they indicate
  4. Optimal caption formula based on the data
  5. Predicted Q4 performance with current strategy vs. optimized

  Part 2: Caption A/B testing framework
  Design a rigorous testing system:
  1. What variables to test (and in what order)
  2. Sample size requirements for statistical significance
  3. Testing calendar (one variable per 2-week cycle)
  4. How to isolate caption impact from visual/timing variables
  5. Decision framework (when to declare a winner)

  Part 3: Executive reporting
  Create a monthly Instagram caption performance report template
  designed for a CMO audience:
  - Key metrics dashboard layout
  - Insight extraction (what the data means for business)
  - Recommendations with projected impact
  - Competitive benchmarking section

assertions:
  - type: llm_judge
    criteria: "The engagement rate paradox is correctly identified and explained — reach growth naturally dilutes ER, and the analysis separates growth effects from content quality"
    weight: 0.30
    description: "Correct paradox analysis"
  - type: llm_judge
    criteria: "Quarter-over-quarter analysis identifies non-obvious trends — like the shift from saves to shares indicating content becoming more shareable but less reference-worthy"
    weight: 0.25
    description: "Non-obvious trend identification"
  - type: llm_judge
    criteria: "A/B testing framework is statistically sound — addresses sample size, variable isolation, and significance thresholds properly"
    weight: 0.25
    description: "Statistically sound testing"
  - type: llm_judge
    criteria: "Executive report template translates metrics into business insights — a CMO would find this actionable, not just informational"
    weight: 0.20
    description: "Business-oriented reporting"
