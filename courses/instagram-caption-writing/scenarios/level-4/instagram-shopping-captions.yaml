meta:
  id: instagram-shopping-captions
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Write Instagram Shopping captions — product tags, shoppable posts, product launches, collection showcases, and conversion-optimized commerce copy"
  tags: [instagram, shopping, ecommerce, conversion, product, expert]

state: {}

trigger: |
  Instagram Shopping turns captions into conversion tools. Product
  tags, shoppable posts, and checkout features mean captions now
  serve dual purposes: engaging the audience AND driving purchases.
  The best shopping captions sell without feeling like ads.

  Write Instagram Shopping captions for "Luna & Bloom" — a
  mid-range jewelry brand (35K followers, avg order $85):

  Part 1: Product launch captions
  Write captions for a new collection launch ("Celestial Collection"):

  1. Teaser caption (3 days before launch)
     - Build anticipation without revealing the full collection
     - Drive Story engagement and DM conversations

  2. Launch day caption (feed post with product tags)
     - Showcase hero pieces, include product tags for 4 items
     - Create urgency without being pushy
     - Drive to Instagram Shop

  3. Launch day Reel caption
     - Short, punchy copy for video showcase
     - Link to collection in Shop

  4. Post-launch carousel caption (day 3)
     - Style guide: "5 ways to wear the Celestial Collection"
     - Each slide tagged with shoppable products
     - Educational + commercial blend

  Part 2: Ongoing shopping content captions
  Write captions for 6 recurring commerce post types:

  1. Single product spotlight (ring, $65)
  2. "Complete the look" bundle post (3 items, $180 total)
  3. Customer photo repost with product tag
  4. Limited edition/low stock alert
  5. Gift guide carousel (Mother's Day, 8 items)
  6. Flash sale announcement (24-hour, 25% off)

  Each caption should:
  - Include natural product tag references
  - Have a clear but non-aggressive CTA
  - Balance storytelling with commerce

  Part 3: Shopping caption optimization
  1. Caption formulas that drive highest add-to-cart rates
  2. How to write product descriptions within captions (vs. product page)
  3. Price mention strategy (when to include price, when not to)
  4. Urgency and scarcity language that works without being manipulative
  5. Post-purchase captions (order confirmation shares, unboxing prompts)

assertions:
  - type: llm_judge
    criteria: "Product launch captions create genuine excitement and urgency without feeling like hard sells — the brand personality comes through despite the commercial intent"
    weight: 0.30
    description: "Engaging commerce captions"
  - type: llm_judge
    criteria: "Shopping captions naturally integrate product references — product tags and CTAs feel like part of the story, not interruptions"
    weight: 0.25
    description: "Natural product integration"
  - type: llm_judge
    criteria: "Different commerce post types have distinct caption approaches — a flash sale sounds different from a gift guide, which sounds different from a customer repost"
    weight: 0.25
    description: "Varied commerce approaches"
  - type: llm_judge
    criteria: "Shopping optimization advice is specific and actionable — price mention strategy, urgency language, and CTA placement are backed by clear reasoning"
    weight: 0.20
    description: "Actionable commerce optimization"
