meta:
  id: instagram-community-captions
  level: 4
  course: instagram-caption-writing
  type: output
  description: "Build Instagram community through captions — engagement loops, conversation starters, UGC campaigns, community rituals, and loyalty programs"
  tags: [instagram, community, engagement, ugc, loyalty, expert]

state: {}

trigger: |
  Community-building captions transform followers into a loyal
  audience that engages, advocates, and converts. This goes beyond
  asking questions — it creates rituals, inside jokes, shared
  experiences, and a sense of belonging that makes unfollowing
  feel like leaving a community.

  Build a community-driven caption strategy for "TrailBlaze" —
  an outdoor adventure gear brand (28K followers):

  Part 1: Community caption frameworks
  Design 6 community-building caption types:

  1. Weekly ritual caption
     - Design a recurring weekly feature that followers anticipate
     - Write 4 weeks of captions showing how the ritual evolves
     - How to encourage participation and feature community members

  2. UGC campaign caption system
     - Launch caption for a UGC campaign ("Show Us Your Trail")
     - Submission guidelines caption
     - Weekly feature caption (reposting user content)
     - Campaign wrap-up caption

  3. Conversation starter captions
     - Write 10 conversation-starting captions that go beyond
       "What's your favorite...?" — prompts that generate stories,
       debates, and meaningful exchanges

  4. Community milestone captions
     - Follower milestone (reaching 30K)
     - Brand anniversary
     - Community member spotlight

  5. Inside joke/community language captions
     - How to develop community-specific language and references
     - 3 captions that build on recurring community themes

  6. Challenge/participation captions
     - 7-day adventure challenge launch
     - Daily prompt captions
     - Challenge recap and winner announcement

  Part 2: Engagement loop design
  Create a system where captions drive continuous engagement:
  1. Comment → response → follow-up post loop
  2. Story → feed → Story engagement chain
  3. DM conversation → content creation pipeline
  4. How to turn one-time commenters into regular engagers

  Part 3: Community health metrics
  1. Community engagement scoring (beyond likes/comments)
  2. Advocate identification and nurturing
  3. Sentiment tracking through caption responses
  4. Community growth vs. community depth balance

assertions:
  - type: llm_judge
    criteria: "Community captions create genuine belonging — the weekly rituals, inside language, and participation prompts would actually make followers feel part of something"
    weight: 0.30
    description: "Genuine community building"
  - type: llm_judge
    criteria: "Conversation starters are creative and specific — they go beyond basic questions to prompts that would generate stories, debates, and emotional responses"
    weight: 0.25
    description: "Creative conversation prompts"
  - type: llm_judge
    criteria: "Engagement loops are well-designed — the systems create self-reinforcing cycles where one interaction naturally leads to the next"
    weight: 0.25
    description: "Self-reinforcing engagement"
  - type: llm_judge
    criteria: "UGC campaign is complete and actionable — from launch through participation to feature and wrap-up, with clear guidelines at each stage"
    weight: 0.20
    description: "Complete UGC campaign system"
