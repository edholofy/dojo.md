meta:
  id: multi-platform-adaptation
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Adapt Instagram captions for cross-posting — Instagram vs. Facebook, TikTok, LinkedIn, and Twitter/X differences"
  tags: [instagram, cross-posting, multi-platform, adaptation, repurposing, advanced]

state: {}

trigger: |
  Most brands post across multiple platforms, but copy-pasting
  the same caption everywhere fails. Each platform has different
  audience expectations, character limits, and engagement norms.
  Instagram is visual-first and conversational, LinkedIn is
  professional, TikTok is raw and authentic, and Twitter/X
  is concise and conversational.

  Part 1: Platform comparison
  Explain how captions differ across platforms:
  1. Instagram: Visual storytelling, 2,200 char limit, emoji-rich
  2. Facebook: Longer text acceptable, link-friendly, older demographic
  3. TikTok: Ultra-casual, hashtag-heavy, sound-driven, Gen Z voice
  4. LinkedIn: Professional, thought leadership, industry keywords
  5. Twitter/X: 280 characters, punchy, thread-friendly

  Part 2: Cross-platform adaptation exercise
  Take 4 pieces of content and adapt the caption for all 5 platforms:

  Content 1: New product launch (a smart water bottle)
  Write the caption for: Instagram, Facebook, TikTok, LinkedIn, Twitter/X
  Note what changes and what stays the same

  Content 2: Industry insight (the future of remote work)
  Write the caption for all 5 platforms

  Content 3: Behind-the-scenes (team building day)
  Write the caption for all 5 platforms

  Content 4: Customer success story (B2B client case study)
  Write the caption for all 5 platforms

  For each adaptation:
  - Note what changed from the Instagram version and why
  - Highlight platform-specific elements (hashtags, links, @mentions)
  - Explain which platform this content works best on

  Part 3: Cross-posting efficiency
  1. Create a repurposing workflow:
     - Write Instagram caption first (why it's the best starting point)
     - Adaptation checklist for each platform
     - What to never copy-paste directly
  2. Which content types work across all platforms vs. which are
     platform-specific
  3. Tools and scheduling for cross-platform posting

assertions:
  - type: llm_judge
    criteria: "Platform adaptations are genuinely different — the TikTok caption sounds like TikTok, the LinkedIn caption sounds like LinkedIn"
    weight: 0.30
    description: "Genuinely different adaptations"
  - type: llm_judge
    criteria: "The same core message is maintained across platforms while the format, tone, and features change appropriately"
    weight: 0.25
    description: "Consistent message, adapted format"
  - type: llm_judge
    criteria: "Platform-specific features are used — LinkedIn has links, Twitter has threads, TikTok has trending hashtags"
    weight: 0.25
    description: "Platform-specific features used"
  - type: llm_judge
    criteria: "The repurposing workflow is practical and would save time while maintaining quality across platforms"
    weight: 0.20
    description: "Practical repurposing workflow"
