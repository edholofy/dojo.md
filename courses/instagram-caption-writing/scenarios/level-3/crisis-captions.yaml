meta:
  id: crisis-captions
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Write Instagram captions during crises — product issues, PR problems, social issues, and brand reputation management"
  tags: [instagram, crisis, reputation, response, sensitive, advanced]

state: {}

trigger: |
  Crisis captions on Instagram require a completely different
  approach — no emojis, no CTAs to buy, no hashtags for reach.
  The tone shifts to transparency, empathy, and accountability.
  Getting it wrong (too defensive, too dismissive, too late)
  amplifies the crisis. Getting it right builds trust.

  Write crisis captions for 5 scenarios:

  Scenario 1: Product recall
  Brand: "PureJuice" — a juice company (25K followers)
  Crisis: Voluntary recall of one product due to undeclared allergen
  Write:
  - Initial announcement caption (feed post)
  - Story text for immediate response
  - Follow-up caption (48 hours later with more details)
  - Comment response templates for concerned customers

  Scenario 2: Negative viral moment
  Brand: "QuickDeliver" — a delivery app (80K followers)
  Crisis: Video of a delivery driver mishandling a package goes viral
  Write:
  - Response caption acknowledging the incident
  - What NOT to say (with examples)
  - Follow-up caption after investigation complete

  Scenario 3: Social/political issue response
  Brand: "EcoWear" — sustainable fashion brand (40K followers)
  Crisis: Called out for supplier using unethical labor practices
  Write:
  - Acknowledgment caption (immediate)
  - Action plan caption (what the brand is doing about it)
  - Tone guidelines for the crisis period

  Scenario 4: Employee misconduct public
  Brand: "TechForward" — tech startup (15K followers)
  Crisis: A senior employee's offensive social media posts surface
  Write:
  - Company response caption
  - Internal communication guidance
  - Return to normal posting guidelines

  Scenario 5: Data breach
  Brand: "CloudSafe" — SaaS security company (30K followers)
  Crisis: Customer data exposure affecting 5,000 users
  Write:
  - Disclosure caption (transparent, factual)
  - FAQ-style follow-up caption
  - Recovery narrative caption (1 week later)

  For each crisis:
  - Note what makes crisis captions different from regular captions
  - Explain timing considerations
  - Define when to pause regular content and for how long

assertions:
  - type: llm_judge
    criteria: "Crisis captions strike the right tone — transparent, empathetic, and accountable without being defensive or over-apologetic"
    weight: 0.30
    description: "Appropriate crisis tone"
  - type: llm_judge
    criteria: "Each crisis type receives a different approach — a product recall is handled differently from a social issue response"
    weight: 0.25
    description: "Crisis-specific approaches"
  - type: llm_judge
    criteria: "Timing and escalation are addressed — the guidance on when to post, when to pause, and how to transition back is practical"
    weight: 0.25
    description: "Practical timing guidance"
  - type: llm_judge
    criteria: "Comment response templates are appropriate — they acknowledge concerns without making promises or admitting liability prematurely"
    weight: 0.20
    description: "Appropriate comment responses"
