meta:
  id: influencer-caption-strategy
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Write captions for influencer marketing — brand briefs, creator guidelines, partnership captions, and brand-creator alignment"
  tags: [instagram, influencer, partnership, brand-brief, creator, advanced]

state: {}

trigger: |
  Influencer captions must balance brand messaging with creator
  authenticity. Overly scripted captions feel fake and underperform.
  Overly free-form captions miss key brand messages. The best
  influencer partnerships create guidelines that protect brand
  interests while letting creators sound like themselves.

  Part 1: Brand brief creation
  Design a caption brief template that a brand gives to influencers:
  1. Key messages (what must be communicated)
  2. Required elements (hashtags, mentions, disclosures)
  3. Brand voice guidelines (how the brand should be described)
  4. Do's and don'ts (approved claims, restricted language)
  5. Content format guidance (Reel, carousel, feed post)
  6. CTA requirements (what action to drive)

  Part 2: Influencer caption writing
  Write captions for 5 influencer-brand partnerships:

  Partnership 1: Micro-influencer x Skincare brand
  Influencer: @wellness_with_maya (8K followers, wellness niche)
  Brand: "PureSkin" — organic skincare, launching new serum
  Requirements: Natural integration, FTC disclosure, link in bio CTA
  Write: The brand brief AND the influencer's caption

  Partnership 2: Mid-tier influencer x Tech product
  Influencer: @tech_tyler (50K followers, tech reviews)
  Brand: "SonicBuds" — wireless earbuds, product review
  Requirements: Feature highlights, honest review feel, discount code
  Write: The brand brief AND the influencer's caption

  Partnership 3: Macro-influencer x Fashion brand
  Influencer: @style_by_sarah (200K followers, fashion/lifestyle)
  Brand: "Luxe Label" — premium clothing, seasonal collection
  Requirements: Aspirational content, multiple outfit posts, brand tagging
  Write: The brand brief AND the influencer's Reel caption

  Partnership 4: Nano-influencer x Local business
  Influencer: @foodie_chicago (2K followers, local food)
  Brand: "Mama Rosa's" — Italian restaurant, new menu tasting
  Requirements: Authentic experience sharing, reservation CTA
  Write: The brand brief AND the influencer's caption

  Partnership 5: Creator x SaaS product
  Influencer: @productivity_pro (30K followers, productivity tips)
  Brand: "FocusApp" — productivity app, free trial drive
  Requirements: Tutorial-style content, app demo, sign-up CTA
  Write: The brand brief AND the influencer's carousel caption

  Part 3: Caption approval process
  Design the review and approval workflow:
  - How brands should give feedback (constructive, not controlling)
  - Red lines vs. creative freedom zones
  - Revision process and timeline

assertions:
  - type: llm_judge
    criteria: "Brand briefs are clear and complete — an influencer could write an effective caption using only the brief without additional communication"
    weight: 0.25
    description: "Complete usable brand briefs"
  - type: llm_judge
    criteria: "Influencer captions sound authentic to each creator's voice — not like the brand wrote them, but still hitting brand messages"
    weight: 0.30
    description: "Authentic creator voices"
  - type: llm_judge
    criteria: "FTC compliance is naturally integrated in all partnership captions — disclosures are present but not awkward"
    weight: 0.25
    description: "Natural compliance integration"
  - type: llm_judge
    criteria: "The approval workflow balances brand protection with creator freedom — it's structured enough without being controlling"
    weight: 0.20
    description: "Balanced approval workflow"
