meta:
  id: ai-caption-tools
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Use AI tools effectively for Instagram caption generation — prompting strategies, editing workflows, and quality control"
  tags: [instagram, ai, tools, generation, workflow, advanced]

state: {}

trigger: |
  AI tools can dramatically speed up Instagram caption creation,
  but using them effectively requires good prompting, careful
  editing, and quality control. The best approach uses AI for
  first drafts and ideation while keeping human judgment for
  voice, brand alignment, and emotional resonance.

  Part 1: AI caption workflow
  Design the AI-assisted caption creation process:
  1. When to use AI vs. when to write manually:
     - AI excels at: variations, hashtag suggestions, reformatting
     - Humans excel at: voice, humor, emotional connection, controversy
  2. The prompt → draft → edit → publish workflow:
     - How to write effective prompts for caption generation
     - The editing pass (what to always change in AI output)
     - Quality control checklist before publishing

  Part 2: Prompt engineering for Instagram captions
  Write optimized prompts for 6 caption types:

  Prompt 1: Product showcase caption
  Write the AI prompt, show the expected output, then show
  the human-edited final version

  Prompt 2: Educational carousel caption
  Full prompt → expected output → edited version

  Prompt 3: Storytelling caption
  Full prompt → expected output → edited version

  Prompt 4: Promotional/sale caption
  Full prompt → expected output → edited version

  Prompt 5: Engagement-driving caption
  Full prompt → expected output → edited version

  Prompt 6: Reel caption with text overlays
  Full prompt → expected output → edited version

  For each, highlight what the human editor changed and why.

  Part 3: AI caption pitfalls
  Identify the top 8 problems with AI-generated Instagram captions:
  1. Generic voice (sounds like every other AI-generated caption)
  2. Over-optimistic tone (too many exclamation marks)
  3. Missing brand personality
  4. Incorrect or outdated information
  5. Awkward emoji placement
  6. Generic CTAs
  7. Missing context-specific details
  8. FTC compliance oversights

  For each, show the AI mistake and the human correction.

  Part 4: Batch caption generation
  Design a system for using AI to generate 20 captions in 1 hour:
  - Pre-session preparation (brand guidelines, content calendar)
  - Prompt templates for each content pillar
  - Editing workflow for speed and quality
  - Final review checklist

assertions:
  - type: llm_judge
    criteria: "AI-human workflow is clearly defined — specific tasks for AI vs. human are identified with practical reasoning"
    weight: 0.25
    description: "Clear AI-human task division"
  - type: llm_judge
    criteria: "Prompt examples are well-crafted — they include brand context, audience details, and specific output requirements"
    weight: 0.25
    description: "Well-crafted prompt examples"
  - type: llm_judge
    criteria: "Human edits demonstrate real value — the edited versions are noticeably better than the AI output in voice, specificity, and engagement potential"
    weight: 0.30
    description: "Value-adding human edits"
  - type: llm_judge
    criteria: "The batch generation system is practical — generating 20 quality captions in 1 hour using this system is realistic"
    weight: 0.20
    description: "Practical batch system"
