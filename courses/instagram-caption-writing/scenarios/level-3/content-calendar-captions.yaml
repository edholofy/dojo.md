meta:
  id: content-calendar-captions
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Build a month-long Instagram content calendar with pre-written captions across all post types and content pillars"
  tags: [instagram, content-calendar, planning, batch-writing, strategy, advanced]

state: {}

trigger: |
  Professional Instagram accounts don't write captions one post
  at a time. Content calendars with pre-written captions enable
  batch production, consistent posting, and strategic content
  distribution across pillars, formats, and engagement goals.

  Build a complete 4-week content calendar for:

  Brand: "NomadCode" — a remote work SaaS platform
  Followers: 18,000
  Posting frequency: 5 posts per week (M-F)
  Content pillars:
  1. Product education (how to use features)
  2. Remote work tips and advice
  3. Customer success stories
  4. Industry news and trends
  5. Team and culture (behind-the-scenes)

  Part 1: Calendar design
  Create a 4-week calendar (20 posts total) with:
  - Date, day of week
  - Content pillar
  - Post format (feed, Reel, carousel)
  - Caption length category (short/medium/long)
  - Primary engagement signal targeted
  - Posting time recommendation

  Ensure:
  - Each pillar appears at least 3 times
  - Each format appears at least 4 times
  - No two consecutive posts target the same engagement signal
  - The 60/30/10 caption length mix is maintained

  Part 2: Write ALL 20 captions
  Write complete, publication-ready captions for all 20 posts
  including:
  - Hook (under 125 characters)
  - Body (appropriate length for the category)
  - CTA (matched to the engagement signal)
  - 5 hashtags (varied across posts, no repeats)
  - Alt text

  Part 3: Calendar optimization
  1. Analyze the calendar for balance:
     - Pillar distribution
     - Format variety
     - Engagement signal coverage
     - Tonal variety (educational, entertaining, promotional, personal)
  2. Identify 3 adjustments to improve the calendar
  3. Create the batch-writing workflow:
     - How to write 20 captions in one session
     - Tools and templates to speed up the process
     - Review and scheduling process

assertions:
  - type: llm_judge
    criteria: "All 20 captions are fully written and publication-ready — not outlines or placeholders but complete captions with hooks, bodies, CTAs, and hashtags"
    weight: 0.25
    description: "20 complete publication-ready captions"
  - type: llm_judge
    criteria: "The calendar maintains strategic balance — content pillars, formats, engagement signals, and caption lengths are distributed intentionally"
    weight: 0.25
    description: "Strategic calendar balance"
  - type: llm_judge
    criteria: "Brand voice is consistent across all 20 posts — NomadCode sounds like the same brand in product education posts and behind-the-scenes posts"
    weight: 0.25
    description: "Consistent brand voice"
  - type: llm_judge
    criteria: "The batch-writing workflow is practical — a social media manager could realistically write 20 captions in one session using this process"
    weight: 0.25
    description: "Practical batch workflow"
