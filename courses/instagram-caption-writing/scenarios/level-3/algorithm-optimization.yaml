meta:
  id: algorithm-optimization
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Optimize captions for the Instagram algorithm — engagement signals, conversation depth, shareability, and reach maximization"
  tags: [instagram, algorithm, optimization, reach, engagement, advanced]

state: {}

trigger: |
  The 2025-2026 Instagram algorithm prioritizes views as the
  primary metric, with shares (DM sends) being 3-5x more
  valuable than likes for reaching new audiences. Long comments
  (5+ words) are classified as "high social relevance." Simple
  comments no longer count as meaningful engagement. Keywords
  in captions drive 30% more reach than hashtags alone.

  Part 1: Algorithm signal analysis
  Explain each algorithm signal and how captions influence it:
  1. Shares/DMs (highest weight for non-follower reach):
     - What makes content shareable
     - Caption techniques that drive DM sharing
     - Content types that get forwarded
  2. Saves (signals high-quality content):
     - What makes content saveable
     - Caption techniques that drive saves
     - Reference content vs. aspirational content
  3. Conversation depth (comment quality > quantity):
     - Why 5+ word comments matter more than emoji reactions
     - How to prompt detailed responses
     - Reply strategies that extend threads
  4. Time spent (dwell time on content):
     - How longer captions increase time spent
     - How carousels extend viewing time
     - The readability-length balance
  5. Keywords and searchability:
     - 30% reach increase from caption keywords
     - Placement in first 1-2 lines
     - Long-tail keyword integration

  Part 2: Algorithm-optimized caption writing
  Take these 5 content pieces and write captions optimized
  for maximum algorithmic reach:

  Content 1: Infographic about saving money on groceries
  Primary signal to target: Saves (reference content)
  Write the caption optimized for saves

  Content 2: Relatable meme about remote work struggles
  Primary signal to target: Shares (DM sending)
  Write the caption optimized for shares

  Content 3: Controversial opinion about social media marketing
  Primary signal to target: Comment depth (extended threads)
  Write the caption optimized for detailed comments

  Content 4: Educational carousel about investing basics
  Primary signal to target: Multiple signals (saves + shares + comments)
  Write the caption optimized for all engagement types

  Content 5: Personal story about career change
  Primary signal to target: Time spent + comments
  Write the caption optimized for dwell time and conversation

  Part 3: Algorithm-aware content calendar
  Design a 1-week content plan (5 posts) that strategically
  targets different algorithm signals across the week:
  - Monday: [target signal] → [content type] → [caption approach]
  - Through Friday with varied signal targeting
  Explain why the variety helps overall account health.

assertions:
  - type: llm_judge
    criteria: "Algorithm signals are accurately explained with correct weighting — shares > saves > comment depth > likes hierarchy is properly represented"
    weight: 0.25
    description: "Accurate algorithm signal explanation"
  - type: llm_judge
    criteria: "Each optimized caption clearly targets its specified signal — the save-optimized caption is different from the share-optimized caption"
    weight: 0.30
    description: "Signal-targeted caption optimization"
  - type: llm_judge
    criteria: "Captions still sound natural despite being algorithm-optimized — they don't feel manipulative or artificially engagement-baiting"
    weight: 0.25
    description: "Natural despite optimization"
  - type: llm_judge
    criteria: "The weekly content calendar demonstrates strategic signal diversity — not targeting the same signal every day"
    weight: 0.20
    description: "Strategic signal diversity"
