meta:
  id: industry-specific-captions
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Write Instagram captions for specific industries — e-commerce, restaurants, fitness, real estate, and professional services"
  tags: [instagram, industry-specific, ecommerce, restaurant, fitness, advanced]

state: {}

trigger: |
  Different industries require dramatically different Instagram
  caption approaches. An e-commerce brand drives purchases through
  urgency and social proof, while a restaurant builds cravings
  through sensory language. A fitness brand motivates through
  transformation stories, and a B2B service builds trust through
  expertise.

  Write complete caption packages for 5 different industries:

  Industry 1: E-commerce fashion brand
  Brand: "UrbanThread" — contemporary streetwear (12K followers)
  Write 4 captions:
  a) New collection launch (feed post)
  b) Styling tips carousel (10 slides)
  c) Customer wearing the brand (UGC repost)
  d) Flash sale announcement (limited 24 hours)

  Industry 2: Restaurant
  Brand: "Harvest Table" — farm-to-table restaurant (5K followers)
  Write 4 captions:
  a) New seasonal menu announcement
  b) Behind-the-scenes Reel (chef preparing signature dish)
  c) Customer review photo repost
  d) Special event (wine pairing dinner)

  Industry 3: Fitness and wellness
  Brand: "IronPath Gym" — boutique fitness studio (8K followers)
  Write 4 captions:
  a) Client transformation story (before/after)
  b) Workout tutorial Reel (30-second exercise demo)
  c) Motivational quote graphic
  d) New class schedule announcement

  Industry 4: Real estate
  Brand: Agent "Sarah Chen" — luxury real estate (15K followers)
  Write 4 captions:
  a) New listing showcase (luxury home)
  b) Market update carousel (monthly stats)
  c) Just sold celebration
  d) Homebuyer tips educational post

  Industry 5: Professional services (B2B)
  Brand: "Clarity Consulting" — management consulting (6K followers)
  Write 4 captions:
  a) Thought leadership post (industry insight)
  b) Case study results carousel
  c) Team member spotlight
  d) Webinar promotion

  For each caption, include:
  - Complete caption text with hashtags
  - Alt text for the visual
  - CTA matched to the industry goal
  - Note on voice and tone specific to the industry

assertions:
  - type: llm_judge
    criteria: "Each industry has a distinct voice — the streetwear brand sounds edgy, the restaurant sounds sensory, the real estate agent sounds authoritative"
    weight: 0.30
    description: "Distinct industry voices"
  - type: llm_judge
    criteria: "Captions drive the right action for each industry — e-commerce drives purchases, restaurant drives reservations, B2B drives consultation bookings"
    weight: 0.25
    description: "Industry-appropriate CTAs"
  - type: llm_judge
    criteria: "All 20 captions are complete and publication-ready with hashtags and alt text included"
    weight: 0.25
    description: "Complete publication-ready captions"
  - type: llm_judge
    criteria: "The 4 content types within each industry (launch, educational, UGC, promotional) show appropriate tonal variation while maintaining brand consistency"
    weight: 0.20
    description: "Tonal variation within consistency"
