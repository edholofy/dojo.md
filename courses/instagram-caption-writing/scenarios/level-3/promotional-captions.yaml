meta:
  id: promotional-captions
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Write promotional Instagram captions that sell without being salesy — launches, sales, and product features"
  tags: [instagram, promotional, sales, launch, conversion, advanced]

state: {}

trigger: |
  Promotional captions are the hardest to write well. Too salesy
  and followers unfollow. Too subtle and nobody buys. The best
  promotional captions provide value while driving action, using
  storytelling, social proof, and urgency strategically rather
  than resorting to "BUY NOW!!!" tactics.

  Part 1: Promotional caption frameworks
  Explain 4 approaches to promotional captions:
  1. Value-first selling (lead with benefit, end with offer)
  2. Social proof selling (let customers do the convincing)
  3. Story-driven selling (narrative that leads to the product)
  4. Urgency/scarcity selling (when used ethically and honestly)

  Part 2: Write promotional captions
  Write captions for 8 promotional scenarios:

  Promo 1: Product launch
  Brand: "ClearSkin" — launching a new vitamin C serum
  Write: Feed post caption that creates excitement without hype

  Promo 2: Flash sale (24 hours)
  Brand: "BookNook" — online bookstore, 30% off bestsellers
  Write: Caption with genuine urgency (not fake scarcity)

  Promo 3: New feature announcement
  Brand: "TaskFlow" — project management SaaS, new Kanban view
  Write: Caption that makes the feature exciting to users

  Promo 4: Bundle offer
  Brand: "Wellness Box" — curated health subscription box
  Write: Carousel caption showing what's in this month's box

  Promo 5: Testimonial-driven promo
  Brand: "FitCoach" — online fitness coaching program
  Write: Caption built around a client's transformation quote

  Promo 6: Limited edition
  Brand: "ArtPrint Studio" — limited run of 100 prints
  Write: Caption with real scarcity (not manufactured urgency)

  Promo 7: Seasonal promotion
  Brand: "GreenGarden" — landscaping services, spring special
  Write: Caption that ties the promotion to the season naturally

  Promo 8: Free trial or lead magnet
  Brand: "MindSpace" — meditation app, 30-day free trial
  Write: Caption that sells the trial without devaluing the product

  Part 3: Promotional content ratio
  Explain the 80/20 rule for promotional content:
  - How to balance value content and promotional content
  - Signs you're over-promoting (engagement drops, unfollow spikes)
  - How to make promotional posts feel like value content

assertions:
  - type: llm_judge
    criteria: "Promotional captions sell effectively without being salesy — each drives action while providing genuine value to the reader"
    weight: 0.30
    description: "Effective non-salesy selling"
  - type: llm_judge
    criteria: "All 8 promotional scenarios use different approaches — launch excitement, genuine urgency, social proof, and story-driven selling are all represented"
    weight: 0.25
    description: "Varied promotional approaches"
  - type: llm_judge
    criteria: "Urgency and scarcity are used honestly — limited editions are genuinely limited, flash sales are genuinely time-bound"
    weight: 0.25
    description: "Honest urgency usage"
  - type: llm_judge
    criteria: "The 80/20 ratio guidance is practical — a content creator could apply it to their posting schedule immediately"
    weight: 0.20
    description: "Practical ratio guidance"
