meta:
  id: caption-analytics
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Analyze Instagram caption performance — interpreting metrics, identifying patterns, and data-driven caption optimization"
  tags: [instagram, analytics, metrics, performance, optimization, advanced]

state: {}

trigger: |
  Data-driven caption optimization requires understanding what
  metrics matter, how to interpret them, and how to translate
  insights into better captions. Views are now the primary metric,
  but engagement rate, saves, shares, and comment quality tell
  a more complete story.

  Part 1: Metrics interpretation
  Explain how to analyze caption performance:
  1. Key metrics and what they indicate:
     - Reach and impressions (how far your caption spread)
     - Engagement rate (quality of content)
     - Save rate (reference value)
     - Share rate (shareability/relatability)
     - Comment quality (conversation depth)
     - Profile visits (CTA effectiveness)
     - Link clicks (conversion effectiveness)
  2. How to calculate each metric
  3. Benchmarks by account size and industry
  4. Warning signs in your metrics

  Part 2: Performance analysis exercise
  Given these metrics for 10 posts from "TechTips" account (20K followers):

  Post 1: Short caption (25 words), product photo
  Reach: 3,200 | Likes: 180 | Comments: 12 | Saves: 45 | Shares: 8

  Post 2: Long caption (250 words), personal story
  Reach: 5,800 | Likes: 420 | Comments: 85 | Saves: 120 | Shares: 35

  Post 3: Medium caption (100 words), educational carousel
  Reach: 8,200 | Likes: 350 | Comments: 42 | Saves: 310 | Shares: 55

  Post 4: Short caption (30 words), meme
  Reach: 12,500 | Likes: 890 | Comments: 65 | Saves: 25 | Shares: 220

  Post 5: Long caption (200 words), thought leadership
  Reach: 4,100 | Likes: 210 | Comments: 95 | Saves: 85 | Shares: 15

  Post 6: Medium caption (120 words), Reel
  Reach: 15,000 | Likes: 520 | Comments: 38 | Saves: 180 | Shares: 95

  Post 7: Short caption (40 words), product launch
  Reach: 6,500 | Likes: 290 | Comments: 55 | Saves: 40 | Shares: 12

  Post 8: Long caption (280 words), customer story
  Reach: 4,800 | Likes: 380 | Comments: 110 | Saves: 95 | Shares: 42

  Post 9: Medium caption (90 words), tips list
  Reach: 7,100 | Likes: 310 | Comments: 28 | Saves: 245 | Shares: 38

  Post 10: Short caption (20 words), behind-the-scenes
  Reach: 3,500 | Likes: 195 | Comments: 22 | Saves: 15 | Shares: 18

  Analyze:
  1. Which posts performed best and why?
  2. What patterns emerge about caption length vs. engagement?
  3. Which content types generate saves vs. shares vs. comments?
  4. Top 5 recommendations for improving future captions
  5. What should the next month's content strategy prioritize?

  Part 3: Monthly analytics review template
  Create a template for monthly Instagram caption performance review.

assertions:
  - type: llm_judge
    criteria: "Performance analysis identifies correct patterns — the carousel's high saves, meme's high shares, and personal story's high comments should be noted"
    weight: 0.30
    description: "Correct pattern identification"
  - type: llm_judge
    criteria: "Recommendations are specific and actionable — tied to the actual data rather than generic advice"
    weight: 0.25
    description: "Data-tied recommendations"
  - type: llm_judge
    criteria: "Analysis goes beyond surface metrics — engagement rate calculations, save rate vs. like rate comparisons, and quality signals are examined"
    weight: 0.25
    description: "Beyond-surface analysis"
  - type: llm_judge
    criteria: "The monthly review template is practical and reusable — a social media manager could use it every month"
    weight: 0.20
    description: "Practical review template"
