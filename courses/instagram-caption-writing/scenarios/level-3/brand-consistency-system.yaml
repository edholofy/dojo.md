meta:
  id: brand-consistency-system
  level: 3
  course: instagram-caption-writing
  type: output
  description: "Build a brand consistency system for Instagram — style guides, template libraries, and multi-contributor caption management"
  tags: [instagram, brand-consistency, style-guide, templates, team, advanced]

state: {}

trigger: |
  As Instagram accounts grow, multiple people contribute captions —
  social media managers, freelancers, agencies, and team members.
  Without a system, brand voice fragments and quality becomes
  inconsistent. A brand consistency system ensures every caption
  sounds like it's from the same brand.

  Build a complete brand consistency system for:

  Brand: "Evergreen Nutrition" — a plant-based supplement company
  Team: 1 social media manager + 2 freelance writers + 1 agency
  Posting: 7 posts/week across feed, Reels, and Stories
  Followers: 45,000

  Part 1: Instagram style guide
  Create a comprehensive style guide covering:
  1. Voice and tone:
     - 5 brand voice attributes with "do" and "don't" examples
     - Tone spectrum (how voice adapts from celebratory to educational)
     - Words/phrases to always use and always avoid
  2. Caption structure standards:
     - Hook format guidelines
     - Body length by content type
     - CTA preferences and approved CTAs
  3. Formatting rules:
     - Line break conventions
     - Emoji usage rules (which emojis, how many, when)
     - Capitalization and punctuation standards
  4. Hashtag guidelines:
     - Approved hashtag library (by content pillar)
     - Branded hashtag usage rules
     - Banned/restricted hashtags list
  5. Visual-caption alignment:
     - How caption tone should match visual style
     - Photo vs. graphic vs. video caption differences

  Part 2: Caption template library
  Create templates for 8 recurring post types:
  1. Product spotlight template
  2. Educational tip template
  3. Customer testimonial template
  4. Behind-the-scenes template
  5. Promotional/sale template
  6. Community engagement template
  7. Seasonal/holiday template
  8. Partner/collab template

  Each template should include:
  - Fill-in-the-blank structure
  - Example using the template
  - Customization guidelines (what can change, what stays fixed)

  Part 3: Quality control process
  1. Caption review workflow (writer → editor → approval)
  2. Brand consistency checklist (10 items to check)
  3. Feedback framework (how to give notes that improve quality)
  4. Monthly voice audit process

assertions:
  - type: llm_judge
    criteria: "The style guide is comprehensive enough that a new freelancer could write an on-brand caption using only this document"
    weight: 0.25
    description: "Comprehensive style guide"
  - type: llm_judge
    criteria: "Caption templates are flexible yet structured — they provide enough framework for consistency while allowing creativity"
    weight: 0.25
    description: "Flexible structured templates"
  - type: llm_judge
    criteria: "The quality control process would work for a team of 4+ contributors — review workflow, checklist, and feedback are all practical"
    weight: 0.25
    description: "Team-ready quality control"
  - type: llm_judge
    criteria: "Voice attributes and word lists are specific to 'Evergreen Nutrition' — not generic guidelines that could apply to any brand"
    weight: 0.25
    description: "Brand-specific voice guidelines"
