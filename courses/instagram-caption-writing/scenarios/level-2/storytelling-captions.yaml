meta:
  id: storytelling-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Master Instagram storytelling — personal narratives, brand stories, customer journeys, and emotional connection through captions"
  tags: [instagram, storytelling, narrative, emotional, connection, intermediate]

state: {}

trigger: |
  Storytelling captions create emotional connections that drive
  engagement far beyond product photos. Instagram users follow
  accounts for the stories as much as the visuals. A well-told
  story in a caption can generate hundreds of comments, saves,
  and shares because people relate to narratives, not features.

  Part 1: Storytelling principles for Instagram
  Explain how storytelling works in a 2,200-character limit:
  1. The micro-story format:
     - Beginning (set the scene in 1-2 sentences)
     - Tension (the problem, challenge, or question)
     - Turning point (what changed)
     - Resolution (the outcome or lesson)
  2. Emotional hooks vs. informational hooks:
     - Why emotions drive shares and saves
     - How vulnerability builds trust
     - When to be personal vs. professional
  3. Show, don't tell:
     - Using specific details instead of generalizations
     - Sensory language in Instagram captions
     - "I sat in my car for 20 minutes" vs. "I was nervous"

  Part 2: Write storytelling captions
  Write 5 complete storytelling captions:

  Story 1: Founder origin story (personal brand)
  Brand: A solo entrepreneur who quit their corporate job
  Post: Photo at their home office desk
  Write a 200-word caption using the micro-story format

  Story 2: Customer transformation story (brand)
  Brand: "FitLife" — a fitness coaching company
  Post: Before/after client photos (with permission)
  Write a 250-word caption that tells the client's journey

  Story 3: Behind-the-scenes challenge (brand)
  Brand: "Handmade Pottery Co" — artisan ceramics
  Post: Photo of a kiln with a batch that cracked
  Write a 180-word caption about failure and perseverance

  Story 4: Community impact story (nonprofit)
  Brand: "Read Together" — children's literacy nonprofit
  Post: Photo of a child reading their first book
  Write a 200-word caption that drives donations

  Story 5: Product development story (brand)
  Brand: "NovaTech" — consumer electronics startup
  Post: Photo of early prototypes alongside the finished product
  Write a 220-word caption about the 2-year development journey

  Part 3: Storytelling mistakes
  Show 3 common Instagram storytelling mistakes:
  - Too vague (no specific details)
  - Too long (doesn't respect the format)
  - Too self-centered (not relatable to the audience)
  Provide before/after examples for each.

assertions:
  - type: llm_judge
    criteria: "Storytelling principles are practical for Instagram — the micro-story format respects the 2,200-character limit while creating genuine narrative"
    weight: 0.25
    description: "Instagram-adapted storytelling"
  - type: llm_judge
    criteria: "All 5 storytelling captions create emotional engagement — they would make a reader feel something, not just learn something"
    weight: 0.30
    description: "Emotionally engaging stories"
  - type: llm_judge
    criteria: "Stories use specific details — 'sat in my car for 20 minutes' level specificity rather than vague generalizations"
    weight: 0.25
    description: "Specific detail usage"
  - type: llm_judge
    criteria: "Each story serves a different brand type and goal — founder, customer, failure, nonprofit, and product stories are distinct approaches"
    weight: 0.20
    description: "Distinct story approaches"
