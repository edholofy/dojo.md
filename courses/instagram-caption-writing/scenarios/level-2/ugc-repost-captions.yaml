meta:
  id: ugc-repost-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Write captions for user-generated content and reposts — crediting, adding context, and maintaining brand voice"
  tags: [instagram, ugc, repost, credit, user-content, intermediate]

state: {}

trigger: |
  User-generated content is 76% more trustworthy than branded
  advertising. But reposting requires explicit permission (just
  because someone tags your brand doesn't grant repost rights),
  proper crediting (visible above the "See more" fold), and
  captions that add brand context to the original content.

  Part 1: UGC caption guidelines
  Explain the rules for UGC and repost captions:
  1. Permission requirements:
     - Why tagging isn't automatic consent
     - How to request permission (DM template)
     - Documenting consent
  2. Crediting best practices:
     - Creator credit above the fold (not buried in hashtags)
     - Tag in caption AND in photo
     - How to express gratitude naturally
  3. Adding brand value:
     - How to contextualize UGC for your audience
     - Adding your perspective without overshadowing the creator
     - Connecting UGC to your brand narrative

  Part 2: Write UGC captions
  Write complete captions for 6 UGC repost scenarios:

  Scenario 1: Customer review photo
  Brand: "Glow Cosmetics" — skincare brand
  UGC: Customer @sarah_wellness posted a photo showing their skin
  transformation using your products over 3 months
  Write the repost caption with proper crediting

  Scenario 2: Product in action
  Brand: "TrailBlazer Gear" — outdoor equipment
  UGC: Customer @mountain_mike posted a photo using your backpack
  at the summit of Mt. Rainier
  Write the repost caption

  Scenario 3: Unboxing video
  Brand: "Artisan Candles Co" — handmade candles
  UGC: Customer @cozy_corner posted an unboxing Reel of their order
  Write the Reel repost caption

  Scenario 4: Restaurant review
  Brand: "Sakura Sushi" — Japanese restaurant
  UGC: Food blogger @eat_with_emma posted a detailed review with photos
  Write the repost caption

  Scenario 5: Event photo
  Brand: "TechConf" — tech conference organizer
  UGC: Attendee @dev_julia posted a photo from your keynote session
  Write the repost caption

  Scenario 6: Creative use of product
  Brand: "PaintBox Art Supplies" — art supplies
  UGC: Artist @creative.maria used your watercolors to paint a mural
  Write the repost caption celebrating the artwork

  Part 3: Permission request templates
  Write 3 DM templates for requesting repost permission:
  - Casual/friendly version
  - Professional/brand version
  - Offering something in return (feature, discount, etc.)

assertions:
  - type: llm_judge
    criteria: "Permission and crediting guidelines are legally sound — the requirements for consent, attribution, and documentation are accurately stated"
    weight: 0.25
    description: "Legally sound guidelines"
  - type: llm_judge
    criteria: "UGC captions prominently credit creators — the original poster's handle appears early in the caption, not buried"
    weight: 0.25
    description: "Prominent creator credit"
  - type: llm_judge
    criteria: "Captions add brand context without overshadowing the creator — the brand's voice enhances rather than hijacks the UGC"
    weight: 0.30
    description: "Brand context without hijacking"
  - type: llm_judge
    criteria: "Permission request DMs are respectful and professional — they would make a creator feel valued, not used"
    weight: 0.20
    description: "Respectful permission requests"
