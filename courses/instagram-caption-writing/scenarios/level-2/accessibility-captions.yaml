meta:
  id: accessibility-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Write accessible Instagram captions — alt text, image descriptions, inclusive language, and screen reader optimization"
  tags: [instagram, accessibility, alt-text, inclusive, screen-reader, intermediate]

state: {}

trigger: |
  Accessible Instagram content reaches a wider audience and
  demonstrates inclusive values. Alt text should be 20-100 words
  and describe what the image shows AND why it matters. Video
  captions help the deaf/hard-of-hearing community and the 85%
  of users who watch without sound. Separate captions from image
  descriptions — they serve different purposes.

  Part 1: Accessibility fundamentals
  Explain each accessibility consideration for Instagram:
  1. Alt text:
     - How screen readers use alt text
     - Instagram's auto-generated descriptions (helpful but incomplete)
     - How to write effective custom alt text
     - Alt text vs. image descriptions in captions
  2. Image descriptions in captions:
     - When to include (complex images, infographics, text-heavy images)
     - How to format (separate from caption content)
     - Level of detail needed
  3. Video captions and subtitles:
     - Auto-captions accuracy and limitations
     - When to add manual captions
     - Font, contrast, and readability guidelines
  4. Inclusive language:
     - Avoiding ableist language
     - Gender-inclusive writing
     - Cultural sensitivity in global audiences
  5. Emoji accessibility:
     - How screen readers announce emojis (reads each one aloud)
     - Why emoji overuse is an accessibility barrier
     - Best practices for accessible emoji usage

  Part 2: Accessible caption writing exercise
  Write accessible versions of 5 Instagram posts:

  Post 1: Infographic about climate change statistics
  Write: Caption + alt text + image description

  Post 2: Photo of a team celebrating a product launch
  Write: Caption + alt text (describing who's in the photo and context)

  Post 3: Carousel with text-heavy slides (tips for interviews)
  Write: Caption that summarizes slide content for non-visual access + alt text

  Post 4: Reel with fast-moving text overlays
  Write: Caption that provides the text overlay content + accessibility notes

  Post 5: Meme with text embedded in the image
  Write: Caption + alt text that makes the meme accessible

  Part 3: Accessibility audit
  Review these 3 posts and identify accessibility issues:
  Post A: Photo with no alt text and emoji-only caption "🔥🔥🔥💯"
  Post B: Carousel with 10 text-heavy slides and caption "Swipe!"
  Post C: Reel with white text on light background, no captions

  For each, list the accessibility problems and provide fixes.

assertions:
  - type: llm_judge
    criteria: "Accessibility guidelines are comprehensive — alt text, image descriptions, video captions, inclusive language, and emoji accessibility are all covered"
    weight: 0.25
    description: "Comprehensive accessibility coverage"
  - type: llm_judge
    criteria: "Alt text examples go beyond basic description — they include context and meaning, not just 'woman holding product'"
    weight: 0.25
    description: "Contextual meaningful alt text"
  - type: llm_judge
    criteria: "The distinction between captions and image descriptions is clearly explained — they serve different purposes and are formatted differently"
    weight: 0.25
    description: "Clear caption-description distinction"
  - type: llm_judge
    criteria: "Accessibility audit identifies real barriers and provides practical fixes that don't sacrifice engagement"
    weight: 0.25
    description: "Practical barrier fixes"
