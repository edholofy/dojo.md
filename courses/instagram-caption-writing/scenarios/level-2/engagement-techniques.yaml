meta:
  id: engagement-techniques
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Drive Instagram engagement through captions — questions, polls, controversy, value-first content, and conversation starters"
  tags: [instagram, engagement, comments, conversation, questions, intermediate]

state: {}

trigger: |
  Instagram's 2025-2026 algorithm values conversation depth. Long
  comments (5+ words) are classified as "high social relevance."
  Replies between users and extended comment threads drive reach
  more than simple likes. Shares (DM sends) are 3-5x more valuable
  than likes for reaching new audiences.

  Part 1: Engagement mechanics
  Explain what the algorithm actually rewards:
  1. Shares/DMs (3-5x value of likes) — content people send to friends
  2. Saves — content people bookmark for later
  3. Comment depth — long comments and reply threads
  4. Comment quality — 5+ word comments vs. emoji-only
  5. Time spent — how long users view the post

  Part 2: Engagement-driving caption techniques
  Demonstrate 8 techniques with complete caption examples:

  Technique 1: The "This or That" question
  Post: Fashion brand showing 2 outfits
  Write the caption that drives comment debate

  Technique 2: The "Unpopular opinion" take
  Post: Marketing expert challenging common advice
  Write the caption that provokes thoughtful disagreement

  Technique 3: The "Fill in the blank" prompt
  Post: Travel brand asking about dream destinations
  Write the caption that's easy to respond to

  Technique 4: The "Save this for later" value post
  Post: Financial advisor sharing a tax deduction checklist
  Write the caption optimized for saves

  Technique 5: The "Tag someone who..." share prompt
  Post: A relatable meme about Monday mornings
  Write the caption that drives tags and shares

  Technique 6: The "Story time" comment driver
  Post: Entrepreneur sharing a business failure
  Write the caption that invites readers to share their own stories

  Technique 7: The "Hot take" conversation starter
  Post: Designer sharing a design trend opinion
  Write the caption that generates extended comment threads

  Technique 8: The "Micro-poll" in captions
  Post: Restaurant testing new menu items
  Write the caption using emoji voting (🍕 for option A, 🌮 for B)

  Part 3: Engagement response strategy
  Explain how to respond to comments to drive algorithm signals:
  - Reply length and timing guidelines
  - How to extend conversations (not just "thanks!")
  - When to pin comments and why
  - How to handle negative comments constructively

assertions:
  - type: llm_judge
    criteria: "Algorithm mechanics are accurately explained — shares > saves > comment depth > likes hierarchy is correctly prioritized"
    weight: 0.25
    description: "Accurate algorithm mechanics"
  - type: llm_judge
    criteria: "All 8 engagement techniques produce genuinely engaging captions — they would drive real comments, saves, and shares"
    weight: 0.30
    description: "Genuinely engaging techniques"
  - type: llm_judge
    criteria: "Engagement response strategy goes beyond 'reply to comments' — it teaches how to extend conversations for algorithm benefit"
    weight: 0.25
    description: "Strategic response guidance"
  - type: llm_judge
    criteria: "Techniques are varied — questions, opinions, value posts, and interactive prompts represent different engagement approaches"
    weight: 0.20
    description: "Varied engagement approaches"
