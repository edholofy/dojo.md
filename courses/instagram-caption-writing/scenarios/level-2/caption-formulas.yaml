meta:
  id: caption-formulas
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Apply proven caption formulas — SOAR, BAB, AIDA, Hook-Shift-Snap, and micro three-act structure"
  tags: [instagram, formulas, copywriting, frameworks, storytelling, intermediate]

state: {}

trigger: |
  Caption formulas provide reliable structures for different
  content types. The SOAR framework works for storytelling,
  Before-After-Bridge (BAB) illustrates transformation, AIDA
  drives promotional content, and Hook-Shift-Snap creates
  punchline moments.

  Part 1: Formula explanations
  Explain 5 caption formulas with structure and best use case:

  1. SOAR (Storytelling):
     - Situation → Obstacle → Action → Results
     - Best for: personal stories, case studies, transformation posts

  2. BAB (Before-After-Bridge):
     - Before (the problem) → After (the desired state) → Bridge (how to get there)
     - Best for: product showcases, service promotions, aspirational content

  3. AIDA (Promotional):
     - Attention → Interest → Desire → Action
     - Best for: sales posts, launch announcements, offer promotions

  4. Hook-Shift-Snap:
     - Hook (grab attention) → Shift (pivot the narrative) → Snap (deliver the punchline)
     - Best for: opinion pieces, contrarian takes, surprising insights

  5. Micro Three-Act Structure:
     - Setup → Conflict → Resolution
     - Best for: brand stories, customer journeys, behind-the-scenes narratives

  Part 2: Formula application
  Apply ALL 5 formulas to the SAME topic: "Our client doubled
  their revenue in 6 months using our marketing strategy."

  Write 5 complete captions — same core message, 5 different
  formulas — showing how the formula transforms the approach.

  Part 3: Formula matching exercise
  For each of these 6 content ideas, recommend the best formula
  and write the complete caption:

  1. A fitness coach sharing a client transformation story
  2. A software company launching a new feature
  3. A chef sharing an unexpected cooking technique
  4. A consultant sharing a controversial business opinion
  5. A nonprofit showing the impact of donations
  6. A brand announcing a flash sale

assertions:
  - type: llm_judge
    criteria: "All 5 formulas are clearly explained with their structure and best use cases — a writer could immediately apply any of them"
    weight: 0.25
    description: "Clear formula explanations"
  - type: llm_judge
    criteria: "The 5 versions of the same topic are genuinely different — SOAR tells a story, BAB shows transformation, AIDA drives action"
    weight: 0.30
    description: "Genuinely different formula applications"
  - type: llm_judge
    criteria: "Formula recommendations for the 6 content ideas are well-matched — each formula serves the content's specific communication goal"
    weight: 0.25
    description: "Well-matched formula selection"
  - type: llm_judge
    criteria: "Captions using formulas still sound natural and Instagram-native — not like rigid copywriting templates"
    weight: 0.20
    description: "Natural formula application"
