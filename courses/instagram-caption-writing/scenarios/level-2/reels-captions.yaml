meta:
  id: reels-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Write Instagram Reels captions and text overlays — hooks, pacing, sound-off optimization, and engagement drivers"
  tags: [instagram, reels, video, text-overlay, hooks, intermediate]

state: {}

trigger: |
  85% of Instagram users watch Reels without sound, making text
  overlays and captions essential. Reel hooks must capture attention
  within 1-2 seconds and deliver the promise by the 3-second mark.
  Shorter captions perform better for Reels, but text overlays
  carry the narrative.

  Part 1: Reel caption strategy
  Explain the dual-layer approach to Reels text:
  1. Text overlays (on-screen text):
     - High-contrast, simple fonts
     - Short and punchy (not novels)
     - Keyword highlighting and point reinforcement
     - Timing with video content
  2. Caption (below the video):
     - Shorter than feed post captions
     - CTA-focused (comment, save, share)
     - Hashtag integration
  3. Hook delivery:
     - 1-2 second attention capture
     - 3-second promise fulfillment
     - Psychological triggers: curiosity, controversy, social proof,
       FOMO, immediate value

  Part 2: Write Reels content packages
  For each Reel, write the text overlay script AND the caption:

  Reel 1: "3 productivity hacks that changed my workflow"
  Format: Talking head, 30 seconds
  Write: Text overlay for each of 3 points + caption + 5 hashtags

  Reel 2: "Watch this cake decorating transformation"
  Format: Process video, 45 seconds, no talking
  Write: Text overlay narrating the process + caption + 5 hashtags

  Reel 3: "POV: Your first day as a freelancer vs. year 3"
  Format: Trending audio, skit format, 20 seconds
  Write: Text overlay for each scene + caption + 5 hashtags

  Reel 4: "The mistake most people make when negotiating salary"
  Format: Educational, direct-to-camera, 60 seconds
  Write: Text overlay highlighting key points + caption + 5 hashtags

  Reel 5: "How we pack 500 orders in one day"
  Format: Behind-the-scenes, time-lapse, 30 seconds
  Write: Text overlay with fun facts/milestones + caption + 5 hashtags

  Part 3: Hook formulas for Reels
  Provide 10 proven Reel hook formulas with examples:
  - "Stop scrolling if you..." / "This will change how you..."
  - Include the psychological trigger each hook uses
  - Note which hook types work best for which content

assertions:
  - type: llm_judge
    criteria: "Text overlays and captions serve different purposes — overlays carry the visual narrative while captions drive engagement actions"
    weight: 0.25
    description: "Distinct overlay-caption purposes"
  - type: llm_judge
    criteria: "All 5 Reel content packages include both text overlays and captions that work together as a cohesive content piece"
    weight: 0.30
    description: "Cohesive content packages"
  - type: llm_judge
    criteria: "Hook formulas are varied and psychologically grounded — each uses a different attention mechanism"
    weight: 0.25
    description: "Varied psychological hooks"
  - type: llm_judge
    criteria: "Sound-off optimization is addressed — the content would make sense and be engaging even with sound completely off"
    weight: 0.20
    description: "Sound-off optimization"
