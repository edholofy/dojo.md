meta:
  id: ftc-compliance-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Write FTC-compliant Instagram captions for sponsored content — disclosure requirements, placement rules, and compliant language"
  tags: [instagram, ftc, compliance, sponsored, disclosure, intermediate]

state: {}

trigger: |
  FTC violations can cost $43,792 per violation for non-compliant
  sponsored content. Disclosures must be "clear and conspicuous" —
  above the "See More" fold, readable on mobile, and using
  unambiguous language (#ad, #sponsored, "Paid Partnership").
  Platform built-in branded content tools are not sufficient alone.
  The rule applies to all influencers regardless of follower count.

  Part 1: FTC compliance rules
  Explain the current FTC requirements for Instagram:
  1. When disclosure is required:
     - Free products received
     - Paid partnerships
     - Affiliate relationships
     - Employee or ambassador relationships
     - Any "material connection" between poster and brand
  2. "Clear and conspicuous" standards:
     - Placement: Above the fold (before "…more" truncation)
     - Size: Readable on mobile screens
     - Language: "#ad" or "#sponsored" (not #sp or #partner)
     - Duration: For Reels, visible for entire duration
  3. What does NOT satisfy requirements:
     - Burying #ad at end of hashtag string
     - Using platform tools alone (without additional disclosure)
     - Vague language ("thanks to Brand X" without #ad)
     - Hiding disclosure in Stories that disappear

  Part 2: Compliant caption writing
  Write FTC-compliant captions for 5 sponsored post scenarios:

  Scenario 1: Product review (gifted product)
  Influencer: Beauty blogger reviewing a free moisturizer from "LuxSkin"
  Write: Compliant caption that's still engaging (not just "ad" disclaimer)

  Scenario 2: Paid partnership post
  Influencer: Fitness influencer paid by "FitPro Supplements" for post
  Write: Compliant caption using branded content tool + additional disclosure

  Scenario 3: Affiliate link promotion
  Influencer: Tech reviewer sharing a laptop review with affiliate link
  Write: Compliant caption with affiliate disclosure

  Scenario 4: Ambassador program
  Influencer: Brand ambassador for "EcoWear" clothing with ongoing relationship
  Write: Compliant caption that naturally integrates the disclosure

  Scenario 5: Reel sponsorship
  Influencer: Lifestyle creator making a Reel sponsored by "HomeChef"
  Write: Caption + text overlay disclosure guidelines

  Part 3: Compliance mistakes
  Show 5 common compliance mistakes with corrections:
  - Each showing the non-compliant version and the fixed version
  - Explaining exactly what violates FTC guidelines

  Part 4: Compliance checklist
  Create a pre-post compliance checklist for sponsored content.

assertions:
  - type: llm_judge
    criteria: "FTC requirements are accurately stated — disclosure placement, language requirements, and penalty information are correct"
    weight: 0.25
    description: "Accurate FTC requirements"
  - type: llm_judge
    criteria: "Compliant captions are still engaging — they integrate disclosure naturally without making the entire post feel like a legal disclaimer"
    weight: 0.30
    description: "Engaging compliant captions"
  - type: llm_judge
    criteria: "Compliance mistakes show real violations that influencers commonly make — not obscure edge cases"
    weight: 0.25
    description: "Real common violations"
  - type: llm_judge
    criteria: "The compliance checklist is practical enough to use before every sponsored post"
    weight: 0.20
    description: "Practical compliance checklist"
