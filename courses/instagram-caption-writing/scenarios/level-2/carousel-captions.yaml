meta:
  id: carousel-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Write Instagram carousel captions — teasing content, educational series, myth-busting, and swipe-driving strategies"
  tags: [instagram, carousel, swipe, educational, series, intermediate]

state: {}

trigger: |
  Carousels are Instagram's highest-engagement format. Optimal
  slide count is 8-12 for educational posts and 12-20 for deep
  guides. The first slide is the hook — it must tease enough to
  drive swipes without giving everything away. The caption and
  slide content work together to create a complete experience.

  Part 1: Carousel caption strategies
  Explain 4 carousel caption approaches:
  1. The teaser caption: Hints at what's inside, drives curiosity
  2. The context caption: Provides background the slides don't cover
  3. The summary caption: Distills the carousel's key takeaway
  4. The story caption: Adds personal narrative to factual slides

  Part 2: Write complete carousel packages
  For each carousel, write the caption AND slide content outlines:

  Carousel 1: Educational list
  Topic: "7 resume mistakes recruiters hate (and what to do instead)"
  Slide structure:
  - Slide 1: Hook/title slide
  - Slides 2-8: One mistake per slide with the fix
  - Slide 9: Summary + CTA slide
  Write: All slide text + caption + 5 hashtags

  Carousel 2: Myth-busting
  Topic: "5 skincare myths that are ruining your routine"
  Slide structure:
  - Slide 1: Bold hook
  - Slide 2: Myth #1 stated → Slide 3: "MYTH!" reveal + truth
  - Continue pattern for 5 myths (10 slides)
  - Slide 11: Summary
  - Slide 12: CTA
  Write: All slide text + caption + 5 hashtags

  Carousel 3: Step-by-step tutorial
  Topic: "How to meal prep for the entire week in 2 hours"
  Slide structure:
  - Slide 1: Hook with result preview
  - Slides 2-9: One step per slide with specific instructions
  - Slide 10: Final result + CTA
  Write: All slide text + caption + 5 hashtags

  Carousel 4: Before/after transformation
  Topic: "How we redesigned our client's living room on a budget"
  Slide structure:
  - Slide 1: Before photo with teaser text
  - Slides 2-7: Process and design decisions
  - Slide 8: After reveal
  - Slide 9: Budget breakdown
  - Slide 10: CTA for design consultation
  Write: All slide text + caption + 5 hashtags

  Part 3: Swipe optimization
  List 5 techniques to increase carousel swipe rate:
  - With specific copy examples for each technique

assertions:
  - type: llm_judge
    criteria: "Caption and slide content work together — the caption adds value beyond what's on the slides rather than just repeating slide content"
    weight: 0.25
    description: "Caption-slide synergy"
  - type: llm_judge
    criteria: "First slides are strong hooks — they tease enough to drive swipes without giving everything away"
    weight: 0.30
    description: "Strong first-slide hooks"
  - type: llm_judge
    criteria: "Slide text is concise and scannable — each slide can be read in 2-3 seconds while still delivering value"
    weight: 0.25
    description: "Concise scannable slide text"
  - type: llm_judge
    criteria: "The 4 carousel types are genuinely different approaches — educational, myth-busting, tutorial, and transformation each use different structures"
    weight: 0.20
    description: "Different carousel approaches"
