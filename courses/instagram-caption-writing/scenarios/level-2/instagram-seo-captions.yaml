meta:
  id: instagram-seo-captions
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Optimize Instagram captions for SEO — keyword placement, alt text, searchability, and Google indexing"
  tags: [instagram, seo, keywords, alt-text, searchability, intermediate]

state: {}

trigger: |
  Instagram captions are now indexed by Google and Bing. Keywords
  in captions drive 30% more reach compared to hashtags alone.
  Place critical terms in the first 1-2 lines. Use long-tail
  keywords naturally. Alt text (20-100 words) provides additional
  SEO signals for image content.

  Part 1: Instagram SEO fundamentals
  Explain how Instagram SEO works in 2025-2026:
  1. Caption keyword optimization:
     - How search engines now index Instagram captions
     - Keyword placement priority (first 1-2 lines most critical)
     - Long-tail keywords vs. short keywords
     - Natural vs. forced keyword integration
  2. Alt text strategy:
     - How to write effective alt text (20-100 words)
     - Bad example: "woman smiling"
     - Good example: "Our lead designer reviewing the Q4 strategy
       on a whiteboard with her product marketing team"
     - SEO vs. accessibility balance
  3. Hashtags as SEO:
     - How hashtags function as keywords
     - Hashtag research for searchability
  4. Profile and username optimization:
     - How your handle and name field affect search
     - Bio keyword strategy

  Part 2: SEO caption writing exercise
  Write SEO-optimized captions for 5 businesses:

  Business 1: "Pure Glow Skincare" — organic skincare brand
  Target keyword: "organic anti-aging night cream for sensitive skin"
  Post: Product photo of their best-selling night cream
  Write: Caption + alt text (both keyword-optimized)

  Business 2: "FitSpace Studio" — boutique fitness studio in Denver
  Target keyword: "beginner-friendly yoga classes Denver"
  Post: Photo of a morning yoga class
  Write: Caption + alt text

  Business 3: "TechMentor Academy" — online coding bootcamp
  Target keyword: "learn Python programming for beginners"
  Post: Carousel of student success stories
  Write: Caption + alt text for first slide

  Business 4: "Paws & Play" — premium pet grooming
  Target keyword: "luxury dog grooming near me"
  Post: Before/after grooming transformation Reel
  Write: Caption + alt text

  Business 5: "Bloom Events" — wedding planning company
  Target keyword: "affordable destination wedding planner"
  Post: Photo gallery from a recent wedding
  Write: Caption + alt text

  Part 3: SEO audit
  Review and improve these captions for SEO:
  Original 1: "Look at this beauty! 😍 #skincare #beauty #glow"
  Original 2: "New class alert! Drop in anytime 🧘‍♀️"
  Rewrite each with proper keyword integration and alt text.

assertions:
  - type: llm_judge
    criteria: "SEO fundamentals correctly explain how Google now indexes Instagram captions and how keyword placement affects discoverability"
    weight: 0.25
    description: "Correct SEO fundamentals"
  - type: llm_judge
    criteria: "Keywords are integrated naturally — captions read as genuine Instagram content, not stuffed with keywords"
    weight: 0.30
    description: "Natural keyword integration"
  - type: llm_judge
    criteria: "Alt text examples are descriptive and keyword-rich without being spammy — they serve both accessibility and SEO"
    weight: 0.25
    description: "Effective dual-purpose alt text"
  - type: llm_judge
    criteria: "The SEO audit demonstrates clear before/after improvement with specific keyword strategies applied"
    weight: 0.20
    description: "Clear SEO improvement"
