meta:
  id: caption-ab-testing
  level: 2
  course: instagram-caption-writing
  type: output
  description: "Design A/B tests for Instagram captions — testing hooks, CTAs, length, emojis, and format to improve engagement"
  tags: [instagram, ab-testing, optimization, testing, data-driven, intermediate]

state: {}

trigger: |
  Instagram doesn't have built-in A/B testing for captions, but
  you can design systematic tests to learn what works for your
  audience. By varying one element at a time and tracking results,
  you can optimize every aspect of your captions based on data
  rather than guesswork.

  Part 1: Testing methodology
  Explain how to A/B test Instagram captions:
  1. What to test (one variable at a time):
     - Hook type (curiosity vs. bold statement vs. question)
     - Caption length (short vs. medium vs. long)
     - CTA type (comment vs. save vs. share)
     - Emoji usage (with vs. without, quantity)
     - Hashtag placement (caption vs. first comment)
     - Format (paragraph vs. bullet points)
  2. How to isolate variables:
     - Same content type, visual quality, posting time
     - Only change the one element being tested
  3. Sample size and duration:
     - Minimum posts per variant
     - How to account for natural variation
  4. Metrics to track:
     - Which metric matters for which test
     - How to create a simple tracking spreadsheet

  Part 2: Design 5 A/B tests
  For a wellness brand "MindBody Studio" (8,000 followers):

  Test 1: Hook type comparison
  Hypothesis: Question hooks drive more comments than statement hooks
  Control: "Our yoga class will transform your morning routine"
  Variant: "What if your morning routine could change everything?"
  Write both complete captions (same body and CTA)
  Define success metric and sample needed

  Test 2: Caption length comparison
  Hypothesis: Medium captions (150 words) outperform short (30 words)
  Write both versions for the same content
  Define success metric

  Test 3: CTA comparison
  Hypothesis: "Save this" CTAs drive more saves than "comment below"
  Write both versions
  Define how to measure

  Test 4: Emoji impact test
  Hypothesis: Captions with 3-5 emojis get more engagement than no emojis
  Write both versions
  Define measurement

  Test 5: Hashtag placement test
  Hypothesis: Hashtags in caption perform better than first comment
  Design the test methodology (same hashtags, different placement)
  Define measurement approach

  Part 3: Results analysis
  Given hypothetical results from Test 1:
  Control (statement): 3.2% engagement, 45 comments, 120 saves
  Variant (question): 4.1% engagement, 82 comments, 95 saves
  Analyze the results and recommend next steps.

  Part 4: Testing calendar
  Create a 4-week testing plan that tests one element per week.

assertions:
  - type: llm_judge
    criteria: "Testing methodology is scientifically sound — variable isolation, sample size considerations, and metric selection are correctly addressed"
    weight: 0.25
    description: "Sound testing methodology"
  - type: llm_judge
    criteria: "A/B test pairs are well-designed — each pair changes only one variable while keeping everything else the same"
    weight: 0.30
    description: "Well-designed test pairs"
  - type: llm_judge
    criteria: "Results analysis demonstrates analytical thinking — the interpretation goes beyond 'higher number wins' to consider different engagement types"
    weight: 0.25
    description: "Thoughtful results analysis"
  - type: llm_judge
    criteria: "The testing calendar is practical for a real Instagram account — sustainable pace, clear process, and actionable outcomes"
    weight: 0.20
    description: "Practical testing calendar"
