meta:
  id: financial-projection-slides
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Create financial projection slides that are credible — build 3-5 year models with defensible assumptions that investors trust instead of dismiss"
  tags: [sales, pitch-deck, financial-projections, revenue-model, assumptions, intermediate]

state: {}

trigger: |
  You're a financial modeling consultant helping "CloudKitchen" (ghost
  kitchen SaaS platform, $1.8M ARR) build their financial projections
  slide for a Series A raise ($8M target).

  Current financials:
  - Revenue: $1.8M ARR (MRR $150K)
  - Growth: 12% MoM over last 6 months
  - Customers: 85 ghost kitchen operators
  - ACV: $21,200
  - Gross margin: 78%
  - Operating burn: $280K/month
  - Runway: 14 months at current burn
  - CAC: $4,200 (blended)
  - LTV: $48,000 (based on 27-month avg lifetime)
  - NRR: 112%

  The founder's current projection slide:
  "Revenue Forecast:
   2026: $5M → 2027: $18M → 2028: $55M → 2029: $150M → 2030: $400M"

  The problem: This is a classic "hockey stick" with no methodology.
  Revenue jumps from $1.8M to $400M in 4 years with no explanation.
  No investor will take this seriously.

  Tasks:
  1. Build a credible 3-year financial projection using bottom-up
     methodology. Show: the key assumptions (customer acquisition
     rate, ACV growth, churn, expansion revenue), the revenue build
     (monthly for Year 1, quarterly for Years 2-3), the expense model
     (team, CAC, infrastructure), and the path to operating leverage.
     Then write the slide content: what to show on the slide (high-
     level) vs what to have in the appendix (detailed model).

  2. Write the "Assumptions Defense Guide" — the 8-10 assumptions that
     drive the model, each with: the assumption, the data supporting it,
     the sensitivity analysis (what if it's 20% worse?), and how to
     present it to investors. Include: customer acquisition rate,
     churn rate, ACV growth, gross margin trajectory, sales efficiency,
     and hiring plan.

  3. Write the "Financial Slide Design Guide" — how to present financial
     projections visually. Include: the "3 numbers" approach (show 3
     key metrics, not the full P&L), the stacked bar chart for revenue
     build, the bridge chart for assumptions, and the "base case vs.
     upside" framing. Address: why not to show best/worst/base case
     on the main slide (shows lack of confidence) and where to put
     the detailed model (appendix).

assertions:
  - type: llm_judge
    criteria: "3-year projection is bottom-up and credible — built from specific assumptions (acquisition, ACV, churn, expansion) with monthly/quarterly detail, showing operating leverage, not just a hockey stick"
    weight: 0.35
    description: "Credible bottom-up projection"
  - type: llm_judge
    criteria: "Assumptions defense is investment-ready — each key assumption has supporting data, sensitivity analysis, and presentation guidance that prepares founders for investor scrutiny"
    weight: 0.35
    description: "Investment-ready assumptions defense"
  - type: llm_judge
    criteria: "Financial slide design separates signal from noise — clear guidance on what to show vs. hide, with visual approaches that communicate the growth story without overwhelming"
    weight: 0.30
    description: "Signal-focused financial design"
