meta:
  id: demo-integration
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Integrate product demos into pitch decks seamlessly — design the deck-to-demo transition, live demo slides, and fallback strategies when demos fail"
  tags: [sales, pitch-deck, demo, product, live-demo, transition, intermediate]

state: {}

trigger: |
  You're the Sales Enablement Manager at "DesignHub" (collaborative
  design platform, $40M ARR, competing with Figma and Canva for
  enterprise teams). Your sales team does 15 demos per week. The
  current approach is broken:

  Current flow:
  1. Rep shows 12-slide pitch deck (15 minutes)
  2. Rep says "Now let me show you the product" (awkward transition)
  3. Rep opens DesignHub in browser (30 seconds of loading/login)
  4. Rep clicks through features randomly for 20 minutes
  5. Prospect asks "Can you go back to that slide about pricing?"
  6. Rep switches back to slides, loses their place

  Problems identified from call recordings:
  - 40% of demos have technical issues (slow loading, wrong account,
    broken prototype)
  - Reps show features the prospect doesn't care about
  - The deck→demo transition feels like two separate meetings
  - Prospects disengage during feature tours that don't match their
    pain points
  - Reps don't return to slides after demo (skip closing/CTA)

  DesignHub's demo-worthy features:
  - Real-time collaboration (multiple cursors, live editing)
  - AI-powered design suggestions (unique differentiator)
  - Brand asset management (enterprise value prop)
  - Design-to-code export (developer handoff)
  - Version control with visual diff

  Tasks:
  1. Redesign the deck-to-demo flow. Create a 3-phase meeting structure:
     a) Context Setting (deck slides, 10 min) — which slides to use
     b) Interactive Demo (live product, 20 min) — structured flow
     c) Close (deck slides, 10 min) — return to slides for next steps
     For each phase, specify: the slide content or demo script, the
     transition language, and the time allocation.

  2. Write the "Demo Integration Slides" — 3-4 slides that bridge the
     deck and demo. Include: the "What You'll See" preview slide (sets
     expectations before the demo), the "Live Demo" placeholder slide
     (shown while switching to product), the "What You Just Saw"
     summary slide (reinforces key points after demo), and the
     persona-based demo paths (which features to show which persona).

  3. Write the "Demo Failure Playbook" — what to do when things go
     wrong. Include: the pre-recorded video backup strategy, the
     screenshot walkthrough approach, the "let me show you on your
     data" pivot, the graceful recovery scripts for 5 common failures
     (wifi down, account login issue, data not loaded, feature bug,
     demo environment crash).

assertions:
  - type: llm_judge
    criteria: "3-phase meeting structure is seamless — deck→demo→close flow feels like one cohesive experience, with specific transition language, time allocation, and content for each phase"
    weight: 0.35
    description: "Seamless 3-phase meeting structure"
  - type: llm_judge
    criteria: "Demo integration slides bridge effectively — preview, placeholder, and summary slides maintain narrative continuity, with persona-based demo paths that show relevant features"
    weight: 0.35
    description: "Effective demo bridge slides"
  - type: llm_judge
    criteria: "Demo failure playbook is practical — 5 specific failure scenarios with recovery scripts and backup strategies that maintain professionalism when technology fails"
    weight: 0.30
    description: "Practical demo failure playbook"
