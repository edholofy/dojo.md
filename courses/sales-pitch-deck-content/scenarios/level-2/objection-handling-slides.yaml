meta:
  id: objection-handling-slides
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Build slides that preemptively handle objections — design deck content that addresses common concerns before they become deal blockers"
  tags: [sales, pitch-deck, objections, preemptive, concerns, intermediate]

state: {}

trigger: |
  You're the Director of Sales Enablement at "MigratePro" (cloud
  migration platform, $55M ARR). Win/loss analysis shows that 4
  objections kill 73% of lost deals:

  Objection 1 — "Too expensive" (mentioned in 42% of losses):
  Reality: MigratePro costs $150K for a typical migration project.
  Competitors charge $80-120K. But MigratePro completes in 8 weeks
  vs 6 months, and has a 99.7% data integrity rate vs industry
  average of 94%.

  Objection 2 — "Too risky to switch" (mentioned in 31% of losses):
  Reality: Migration projects are inherently risky. Prospects fear
  data loss, downtime, and project failure. MigratePro has completed
  2,800 migrations with zero data loss incidents.

  Objection 3 — "We can do it in-house" (mentioned in 28% of losses):
  Reality: Companies that DIY migrations take 3x longer and 2.4x
  over budget on average. 65% of DIY migrations experience significant
  data issues. But prospects think "our team is smart enough."

  Objection 4 — "Not the right time" (mentioned in 22% of losses):
  Reality: Legacy systems cost 4x more to maintain per year. Every
  quarter of delay costs the average customer $180K in technical debt
  and missed cloud savings.

  Tasks:
  1. For each objection, design a deck slide that preemptively addresses
     the concern BEFORE it becomes an objection. The slide shouldn't
     say "you might think we're too expensive" — it should make the
     case so well that the objection never surfaces. Write: the slide
     headline, content, supporting data, visual approach, and speaker
     notes. Specify where each slide goes in the deck sequence.

  2. Write the "Hidden Slide Library" — 8-10 backup slides that reps
     can pull up when objections do surface mid-presentation. Each
     hidden slide should: directly address one specific concern, use
     data over assertions, include a customer quote or proof point,
     and take under 60 seconds to present. Specify the navigation
     shortcut or technique for accessing hidden slides quickly.

  3. Write the "Objection-to-Deck Mapping" — a reference guide that
     maps the 20 most common objections to specific slides in the
     deck (both standard and hidden). Include: the objection trigger
     phrase (what the buyer says), the mapped slide(s), and the
     transition language (how to navigate to the right slide smoothly).

assertions:
  - type: llm_judge
    criteria: "Preemptive slides are subtle and effective — each addresses a concern through positive framing and data rather than defensive 'here's why that's wrong' messaging"
    weight: 0.35
    description: "Subtle effective preemptive slides"
  - type: llm_judge
    criteria: "Hidden slide library is ready-to-use — 8-10 data-driven slides for specific objections with quick-access guidance, proof points, and 60-second delivery design"
    weight: 0.35
    description: "Ready-to-use hidden slide library"
  - type: llm_judge
    criteria: "Objection-to-deck mapping is comprehensive — 20 objections mapped to specific slides with trigger phrases and transition language that helps reps respond in real-time"
    weight: 0.30
    description: "Comprehensive objection mapping"
