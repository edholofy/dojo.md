meta:
  id: deck-analytics-optimization
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Use deck analytics to optimize content — track which slides engage buyers, identify drop-off points, and iterate based on data instead of gut feeling"
  tags: [sales, pitch-deck, analytics, optimization, data-driven, intermediate]

state: {}

trigger: |
  You're the RevOps Manager at "PipelineIQ" (sales intelligence
  platform, $35M ARR). You've implemented DocSend for tracking deck
  engagement and have 6 months of data across 450 deck shares.

  Deck analytics data (10-slide standard deck):
  - Slide 1 (Title): 98% view rate, 8 sec avg time
  - Slide 2 (Problem): 94% view rate, 22 sec avg time
  - Slide 3 (Solution): 91% view rate, 18 sec avg time
  - Slide 4 (How It Works): 85% view rate, 35 sec avg time ← highest
    engagement
  - Slide 5 (Traction): 78% view rate, 15 sec avg time
  - Slide 6 (Case Studies): 72% view rate, 28 sec avg time
  - Slide 7 (Competitive): 65% view rate, 12 sec avg time ← big
    drop-off starts here
  - Slide 8 (Team): 52% view rate, 6 sec avg time ← skipped by half
  - Slide 9 (Pricing): 48% view rate, 42 sec avg time ← most time
    for those who reach it
  - Slide 10 (CTA/Next Steps): 45% view rate, 14 sec avg time

  Additional data points:
  - Decks shared via email: 65% opened, 40% viewed past slide 3
  - Average total time per deck: 3 min 12 sec
  - Decks that led to meetings: avg 4 min 45 sec total view time
  - Correlation: Prospects who viewed pricing slide were 3.2x more
    likely to take a meeting
  - Day of week: Tuesday shares had 28% higher engagement
  - Time of day: 9-11am shares had highest open rates

  Tasks:
  1. Write the "Deck Analytics Diagnosis" — analyze the data and
     identify the 5 biggest optimization opportunities. For each: the
     insight from the data, what it means for the deck, and the
     specific change to make. Address: the big drop-off at slide 7,
     why the team slide is getting skipped, why pricing has the longest
     view time but lowest reach, and the gap between "most time on How
     It Works" and subsequent engagement.

  2. Write the "Optimized Deck Sequence" — redesign the 10-slide deck
     order based on analytics. Move high-value slides earlier, remove
     or rework underperforming slides, and create a new sequence that
     maximizes the number of prospects reaching the pricing and CTA
     slides. Justify every change with data.

  3. Write the "Deck Analytics Playbook" — how to set up ongoing deck
     optimization. Include: what metrics to track (view rate, time
     per slide, completion rate, share-to-meeting conversion), how
     often to review (monthly analysis cycle), the A/B testing approach
     (test one slide change at a time), and the escalation triggers
     (when a slide's metrics warrant immediate attention).

assertions:
  - type: llm_judge
    criteria: "Analytics diagnosis identifies real insights — 5 optimization opportunities drawn directly from the data with specific, actionable changes, not generic advice"
    weight: 0.35
    description: "Data-driven analytics diagnosis"
  - type: llm_judge
    criteria: "Optimized sequence is justified by data — deck reorder addresses drop-off, prioritizes high-engagement content, and maximizes prospect reach to pricing/CTA, with data-backed reasoning for each change"
    weight: 0.35
    description: "Data-justified optimized sequence"
  - type: llm_judge
    criteria: "Analytics playbook enables ongoing optimization — practical framework for tracking, reviewing, A/B testing, and acting on deck performance data as a continuous process"
    weight: 0.30
    description: "Continuous optimization playbook"
