meta:
  id: traction-metrics-slides
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Build traction slides that demonstrate momentum — select the right metrics for your stage, visualize growth effectively, and tell the traction story investors and buyers want to hear"
  tags: [sales, pitch-deck, traction, metrics, growth, visualization, intermediate]

state: {}

trigger: |
  You're advising 3 SaaS companies at different stages on their
  traction slides. Each company has data but doesn't know how to
  present it compellingly.

  Company 1 — Pre-revenue startup "CodeReview AI":
  Available metrics: 2,400 beta signups in 3 months, 340 active weekly
  users (14% of signups), 72 paying pilot customers ($0 revenue —
  free pilots), average session time 23 minutes, NPS 68, 3 enterprise
  LOIs (letters of intent) worth $180K combined, 12 GitHub stars on
  their open-source tool, featured in TechCrunch, Y Combinator W26.
  Challenge: No revenue. How do you build a traction slide?

  Company 2 — Early-revenue "ScheduleBot" ($45K MRR):
  Available metrics: $45K MRR (grew from $8K to $45K in 9 months),
  120 paying customers, $375 average MRR per customer, 15% MoM revenue
  growth, 4% monthly churn, CAC $890, LTV $9,375 (25-month avg
  lifetime), LTV:CAC ratio of 10.5:1, NRR 115%, 92% customer
  satisfaction, deployed at 3 Fortune 500 companies.
  Challenge: Good metrics but too many — which ones to show?

  Company 3 — Growth-stage "DataVault" ($3.2M ARR):
  Available metrics: $3.2M ARR (from $800K to $3.2M in 18 months),
  280 customers across 12 industries, $11,400 average ACV, NRR 128%,
  40% YoY growth rate, gross margin 82%, CAC payback 8 months, Rule
  of 40 score: 52 (40% growth + 12% margin), 3 $100K+ enterprise deals
  closed, SOC 2 Type II certified, expanded to 4 countries.
  Challenge: Sophisticated audience (Series B investors) — needs to
  show efficiency, not just growth.

  Tasks:
  1. For each company, design the traction slide(s): select the 3-5
     most impactful metrics, write the slide headline (insight, not
     description), design the visual layout (chart type, arrangement),
     and write speaker notes. For the pre-revenue company, show how
     to present momentum without revenue.

  2. Write the "Metric Selection Guide by Stage" — a framework that
     helps companies choose the right metrics for their traction slide.
     Include: pre-revenue metrics (engagement, LOIs, waitlist growth),
     early-revenue metrics (MRR, growth rate, unit economics), growth-
     stage metrics (ARR, NRR, efficiency ratios), and the "vanity vs.
     value" test for each metric.

  3. Write the "Data Visualization for Traction" guide — how to make
     numbers visually compelling. Include: when to use line charts
     (growth over time), bar charts (comparisons), single big numbers
     (headline metrics), and combination layouts. Address: how to
     handle inconsistent growth (don't cherry-pick), how to show
     context (industry benchmarks), and the "up and to the right"
     without lying about trajectory.

assertions:
  - type: llm_judge
    criteria: "Traction slides are stage-appropriate — pre-revenue shows momentum without faking it, early-revenue highlights growth and unit economics, growth-stage demonstrates efficiency, all with insight-driven headlines"
    weight: 0.35
    description: "Stage-appropriate traction slides"
  - type: llm_judge
    criteria: "Metric selection guide is practical — clear framework by stage with specific metrics to include/exclude and the vanity vs. value test that helps any company choose their best metrics"
    weight: 0.35
    description: "Practical metric selection guide"
  - type: llm_judge
    criteria: "Data visualization guide improves chart design — specific guidance on chart types, handling imperfect data honestly, providing context, and making numbers visually compelling"
    weight: 0.30
    description: "Improved data visualization"
