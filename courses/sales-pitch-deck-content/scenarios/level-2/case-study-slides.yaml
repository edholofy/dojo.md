meta:
  id: case-study-slides
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Transform customer success stories into compelling case study slides — structure narratives, quantify outcomes, and match case studies to prospect contexts"
  tags: [sales, pitch-deck, case-studies, customer-stories, outcomes, intermediate]

state: {}

trigger: |
  You're the Customer Marketing Manager at "RevenueOS" (revenue
  operations platform, $70M ARR). You have 15 published case studies
  but your sales deck only uses customer logos. Reps say "we have
  great customers but our deck doesn't tell their stories."

  5 case studies available for deck integration:

  Case Study 1 — Shopify (e-commerce, 10,000 employees):
  Challenge: Revenue ops team of 8 managing 3 disconnected tools.
  Result: 45% faster deal cycles, $12M in recovered pipeline leakage,
  consolidated from 3 tools to 1. Timeline: 6-week deployment.
  Quote: "RevenueOS gave us visibility we didn't know we were missing."

  Case Study 2 — Stripe (fintech, 8,000 employees):
  Challenge: Forecasting accuracy at 62% — CFO couldn't trust numbers.
  Result: Forecast accuracy improved to 94%, Board confidence increased,
  saved 15 hours/week in manual reporting. Timeline: 4-week deployment.
  Quote: "Our CFO now actually trusts our forecast. That's priceless."

  Case Study 3 — HubSpot (SaaS, 7,000 employees):
  Challenge: Sales-to-CS handoff causing 23% churn in first 90 days.
  Result: First-90-day churn reduced to 8%, onboarding NPS from 32
  to 71, $4.2M in retained revenue. Timeline: 8-week deployment.
  Quote: "The handoff problem was invisible until RevenueOS showed us."

  Case Study 4 — Notion (SaaS, 500 employees):
  Challenge: Scaling from 200 to 800 reps without process breaking.
  Result: Onboarded 600 new reps in 4 months, maintained deal velocity,
  rep ramp time reduced from 6 months to 3.5 months. Timeline: 3 weeks.
  Quote: "We 4x'd our team without 4x'ing our operational complexity."

  Case Study 5 — Mayo Clinic (healthcare, 75,000 employees):
  Challenge: Complex multi-stakeholder buying cycles averaging 14 months.
  Result: Buying cycle compressed to 9 months, stakeholder alignment
  improved, $8M in new vendor contracts closed faster. Timeline: 12 weeks.
  Quote: "RevenueOS helped us understand our own buying process better."

  Tasks:
  1. Create 3 case study slide formats:
     a) The "Quick Hit" format (1 slide, 30 seconds) — logo, one
        metric, one quote. For rapid social proof.
     b) The "Story Arc" format (2 slides) — challenge→solution→result
        narrative with supporting data. For building credibility.
     c) The "Deep Dive" format (3 slides) — full narrative with context,
        implementation journey, and detailed outcomes. For late-stage
        presentations. Write each format using the Shopify case study.

  2. Write the "Case Study Matching Guide" — how reps select the right
     case study for each prospect. Include: matching by industry (same
     vertical), matching by company size (similar scale), matching by
     pain point (same challenge), matching by persona (same buyer role),
     and the "ideal case study hierarchy" (best match criteria).
     Map all 5 case studies to prospect scenarios.

  3. Write the "Case Study Slide Best Practices" — 8 rules for using
     case studies in decks. Include: always lead with the result (not
     the company name), use specific numbers (not "improved"), pair
     data with quotes (numbers + emotion), don't use competitors'
     case studies against them, keep case studies fresh (under 2
     years), get approval for logo and quote use, and customize the
     emphasis per audience.

assertions:
  - type: llm_judge
    criteria: "Three formats serve different purposes — Quick Hit for rapid proof, Story Arc for credibility building, Deep Dive for late-stage, each demonstrated with the Shopify case study"
    weight: 0.35
    description: "Purpose-matched case study formats"
  - type: llm_judge
    criteria: "Matching guide helps reps choose — clear criteria for matching case studies to prospects by industry, size, pain point, and persona, with all 5 case studies mapped to scenarios"
    weight: 0.30
    description: "Clear case study matching"
  - type: llm_judge
    criteria: "Best practices are actionable — 8 specific rules that improve how case studies appear in decks, with practical guidance reps can apply immediately"
    weight: 0.35
    description: "Actionable case study practices"
