meta:
  id: intermediate-pitch-deck-shift
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Intermediate shift simulation — rebuild a deck for a pivoting company that needs to tell a completely new story to a new market while retaining existing customer confidence"
  tags: [sales, pitch-deck, pivot, repositioning, simulation, intermediate]

state: {}

trigger: |
  SCENARIO: Company pivot requires complete deck overhaul in 1 week.

  "TaskMaster" was a project management tool ($8M ARR, 500 customers).
  The board just approved a pivot to become an "AI Work Assistant"
  platform. The product hasn't changed much — they've added AI features
  to their existing project management tool — but the positioning,
  market, and competitive landscape are completely different.

  Old positioning:
  - Category: Project management (competing with Asana, Monday.com)
  - Buyer: Director of Operations / Project Managers
  - Value prop: "Simpler project management for growing teams"
  - Average deal: $12K ACV
  - Market: Crowded, commoditized, price-sensitive

  New positioning:
  - Category: AI productivity / work intelligence (competing with
    Notion AI, ClickUp AI, Microsoft Copilot)
  - Buyer: VP of Engineering / CTO / COO
  - Value prop: "AI that understands your team's work patterns and
    automates the 40% of work that shouldn't require humans"
  - Target deal: $35K ACV (3x increase)
  - Market: Hot, growing, premium pricing acceptable

  New AI features (genuinely built):
  - AI task assignment (analyzes team skills + workload + deadlines)
  - Automated status updates (learns from team patterns, writes updates)
  - Predictive project risk scoring (identifies delays 2 weeks early)
  - Meeting→action item extraction (records, transcribes, creates tasks)
  - Workload intelligence (prevents burnout, balances teams)

  Constraints:
  - 500 existing customers on old positioning — can't alienate them
  - New deck must be ready for a conference keynote in 7 days
  - 45 sales reps need to start using it immediately
  - Competitors (Notion AI, Copilot) have massive brand awareness

  Tasks:
  1. Write the complete 12-slide "AI Work Assistant" pitch deck outline.
     For each slide: headline, key content, design approach, and speaker
     notes. The deck must: position AI as the core value (not an add-on),
     differentiate from Notion AI/Copilot, appeal to VP/CTO buyers
     (not PMs), and justify the $35K ACV price point.

  2. Write the "Pivot Narrative" — the 3-minute story the CEO will
     tell at the conference keynote introducing the new positioning.
     Include: the "why now" moment (AI makes this possible), the
     insight (40% of knowledge work is automatable), the transformation
     story (from PM tool to AI work platform), and the vision (where
     this goes in 3 years). This narrative should flow through the
     entire deck.

  3. Write the "Transition Communication Plan" — how to manage the
     messaging change with 3 audiences: existing customers (reassure,
     don't alienate), sales reps (retrain, new talk tracks), and new
     prospects (fresh narrative). Include the specific messaging for
     each audience and the FAQ for reps on handling "didn't you used
     to be a project management tool?" questions.

assertions:
  - type: llm_judge
    criteria: "12-slide deck positions AI as core value — not a PM tool with AI added, but a genuinely repositioned AI work platform, differentiated from Notion/Copilot, targeting VP/CTO buyers at $35K ACV"
    weight: 0.35
    description: "AI-core positioning deck"
  - type: llm_judge
    criteria: "Pivot narrative is compelling — 3-minute story with 'why now' moment, insight, transformation arc, and vision that a CEO could deliver at a conference to launch the new positioning"
    weight: 0.30
    description: "Compelling pivot narrative"
  - type: llm_judge
    criteria: "Transition plan manages all 3 audiences — existing customers are reassured, reps are retrained with specific talk tracks, and new prospects hear a fresh story, with FAQ for awkward questions"
    weight: 0.35
    description: "Three-audience transition plan"
