meta:
  id: investor-vs-sales-deck
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Understand the differences between investor pitch decks and sales pitch decks — adapt content, structure, and emphasis for fundraising versus selling contexts"
  tags: [sales, pitch-deck, investor-deck, sales-deck, adaptation, intermediate]

state: {}

trigger: |
  You're the VP of Marketing at "FleetTrack" (fleet management SaaS,
  $12M ARR, Series A stage). The CEO has asked you to build two decks
  from the same company story: one for the Series A fundraise ($15M
  target) and one for enterprise sales ($100K+ deals). Currently,
  reps are using the investor deck for sales calls, and it's bombing.

  FleetTrack company data:
  - Product: GPS tracking + route optimization + maintenance prediction
    for commercial fleets
  - 320 customers, mostly trucking and delivery companies
  - $37,500 average ACV
  - 18% MoM growth (last 6 months)
  - NRR: 125% (strong expansion)
  - TAM: $8.5B (North American fleet management software)
  - Team: 45 people, founded by ex-UPS logistics engineers
  - Differentiator: AI predicts vehicle maintenance 14 days before
    breakdown (industry first, 92% accuracy)
  - Customer results: 22% fuel savings, 35% fewer breakdowns, 18%
    improvement in on-time delivery
  - Competitors: Samsara ($800M ARR, public), Verizon Connect, Geotab

  Why the investor deck fails for sales:
  - Prospects don't care about TAM/SAM/SOM
  - Financial projections confuse buyers
  - "Team slide" feels irrelevant to their problem
  - No demo flow or implementation detail
  - The "ask" slide asks for money, not a purchase

  Tasks:
  1. Write the side-by-side outline for both decks — 10 slides each,
     showing how the same company story becomes two different
     presentations. For each slide pair, explain: what's the same
     (shared data), what's different (framing), and why (audience
     motivation). Show the fundamental structural differences.

  2. Write 2 slides that are radically different between decks:
     a) The "Market Opportunity" slide: Investor version (TAM/SAM/SOM
        with growth thesis) vs Sales version (industry pain points
        with buyer-specific context)
     b) The "Why Us" slide: Investor version (competitive moat,
        defensibility, team) vs Sales version (product depth, customer
        results, implementation ease)
     Full content with speaker notes for all 4 slides.

  3. Write the "Deck Purpose Guide" — when to use which deck and the
     common mistakes of using the wrong one. Include: 6 scenarios
     (investor meeting, sales first call, board update, partner
     pitch, conference keynote, customer QBR) mapped to the right
     deck type, and the "fatal mismatches" (when using the wrong deck
     kills the conversation).

assertions:
  - type: llm_judge
    criteria: "Side-by-side outlines reveal structural differences — 10 slides each with clear mapping of shared data, different framing, and audience-specific reasoning that shows why decks must differ"
    weight: 0.35
    description: "Clear structural differences"
  - type: llm_judge
    criteria: "Radically different slides demonstrate the principle — same company data presented for investor vs buyer audiences with genuinely different emphasis, language, and supporting evidence"
    weight: 0.35
    description: "Radically different slide demonstrations"
  - type: llm_judge
    criteria: "Deck purpose guide prevents mismatches — 6 scenarios mapped to correct deck types with clear explanation of why wrong-deck usage fails"
    weight: 0.30
    description: "Mismatch-preventing purpose guide"
