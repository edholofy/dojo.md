meta:
  id: market-sizing-slides
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Create credible market sizing slides — present TAM, SAM, and SOM using bottom-up methodology that investors and executives trust"
  tags: [sales, pitch-deck, market-sizing, TAM, SAM, SOM, intermediate]

state: {}

trigger: |
  You're a pitch deck consultant working with 3 companies that all
  have terrible market sizing slides. Each is making a different
  classic mistake.

  Company 1 — "MedTech AI" (AI diagnostics for radiology):
  Current slide: "TAM: $45B (global medical imaging market)"
  Problem: They're citing the ENTIRE medical imaging market, including
  hardware (MRI machines, CT scanners). Their software product is only
  relevant to a fraction. Investors will call this out immediately.
  Their reality: They serve radiologists in the US, analyzing chest
  X-rays and CT scans for pulmonary conditions. About 12,000 radiology
  practices, average contract $80K/year.

  Company 2 — "EduStream" (live tutoring marketplace):
  Current slide: "TAM: $350B (global education market)"
  Problem: They're citing the entire education market — from K-12
  schools to corporate training. They're a tutoring marketplace for
  high school and college students in North America. $350B is laughable.
  Their reality: 15M US high school/college students use tutoring,
  average spend $2,400/year. They take 20% commission.

  Company 3 — "AgriSense" (precision agriculture sensors):
  Current slide: "TAM: $8.5B (precision agriculture market by 2028)"
  Problem: This is a Gartner top-down number with no methodology.
  It looks lazy and doesn't show they understand their customer.
  Their reality: They sell soil sensor kits ($15K each) + software
  subscriptions ($3K/year) to farms with 1,000+ acres in the US
  Midwest corn belt. About 85,000 qualifying farms.

  Tasks:
  1. Rewrite each company's market sizing using the bottom-up approach.
     For each, calculate: SOM (realistic Year 3 revenue target), SAM
     (addressable market they could reach), and TAM (total opportunity
     if fully expanded). Show the math — every assumption explicit.
     Then write the actual slide content (headline, visual approach,
     speaker notes).

  2. Write the "Market Sizing Framework" — the step-by-step process
     for building bottom-up market sizing. Include: how to define your
     customer segment (specificity wins), how to estimate willingness
     to pay, how to account for market penetration rates, the difference
     between top-down and bottom-up (and when each is appropriate), and
     the "show your work" principle.

  3. Write the "Market Sizing Red Flags" guide — 7 mistakes that
     destroy credibility with investors. Include: the trillion-dollar
     TAM, the top-down-only approach, confusing TAM and revenue
     potential, no SOM calculation, citing outdated research, the
     "if we get 1% of the market" argument, and mixing geographies
     and segments inconsistently.

assertions:
  - type: llm_judge
    criteria: "Bottom-up calculations are credible — each company's SOM/SAM/TAM uses specific assumptions with visible math, customer segments are properly defined, and the numbers are defensible"
    weight: 0.35
    description: "Credible bottom-up calculations"
  - type: llm_judge
    criteria: "Market sizing framework is reusable — step-by-step process anyone can follow, with clear guidance on segmentation, pricing, penetration rates, and the show-your-work principle"
    weight: 0.35
    description: "Reusable market sizing framework"
  - type: llm_judge
    criteria: "Red flags guide identifies real mistakes — 7 credibility-destroying errors with explanations of why each fails with sophisticated investors"
    weight: 0.30
    description: "Real credibility red flags"
