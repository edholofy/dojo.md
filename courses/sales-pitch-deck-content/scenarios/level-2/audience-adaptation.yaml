meta:
  id: audience-adaptation
  level: 2
  course: sales-pitch-deck-content
  type: output
  description: "Adapt pitch deck content for different audiences — customize messaging, depth, and emphasis for C-suite executives, technical buyers, financial decision-makers, and end users"
  tags: [sales, pitch-deck, audience, persona, customization, intermediate]

state: {}

trigger: |
  You're the Sales Enablement Director at "WorkflowPro" (process
  automation platform, $60M ARR). You have one master deck but 4
  different buyer personas who evaluate your product. Each persona
  cares about completely different things.

  The 4 personas and what they care about:
  1. CTO/VP Engineering: Technical architecture, API capabilities,
     security certifications, integration complexity, scalability.
     Skeptical of marketing claims. Wants to see under the hood.
  2. CFO/VP Finance: ROI, total cost of ownership, payback period,
     risk reduction, budget impact. Doesn't care about features —
     only financial outcomes.
  3. COO/VP Operations: Process efficiency, time savings, team
     adoption, change management complexity, operational metrics.
     Wants to know "how does this change my team's daily work?"
  4. End User Champion: Ease of use, training requirements, daily
     workflow impact, mobile access, support quality. Already sold
     on the concept — needs to justify to leadership.

  WorkflowPro data available:
  - Deploys in 6 weeks with dedicated CSM
  - SOC 2 Type II, ISO 27001, GDPR compliant
  - REST API + 150 native integrations
  - Average customer: 68% reduction in manual processes
  - ROI: 3.8x in first year, payback in 4.2 months
  - NPS: 74 (industry average: 36)
  - 92% user adoption rate within 90 days
  - Handles 500K+ workflows/day for largest customer

  Tasks:
  1. Create the "Persona Slide Matrix" — for each of the 10-12 core
     deck slides, specify what changes per persona. Show which slides
     stay the same (universal), which get different content (adapted),
     and which are persona-specific (added/removed). Create a matrix
     that guides reps on exactly what to modify.

  2. Write 4 versions of the same "Why WorkflowPro" slide — one for
     each persona. Same product, completely different framing. Include
     headline, 3-4 key points, supporting data, and speaker notes.
     Show how the same facts become different stories for different
     audiences.

  3. Write the "Pre-Meeting Research Guide" — how reps determine which
     persona variation to use. Include: research steps before the call
     (LinkedIn, annual reports, org chart), questions to ask in
     discovery, signals that indicate persona type, and the hybrid
     approach (when multiple personas are in the room).

assertions:
  - type: llm_judge
    criteria: "Persona slide matrix is practical — clearly shows which slides are universal, adapted, or persona-specific, with specific guidance on what changes per persona across the full deck"
    weight: 0.35
    description: "Practical persona slide matrix"
  - type: llm_judge
    criteria: "Four 'Why WorkflowPro' versions are genuinely different — same product positioned through CTO (technical), CFO (financial), COO (operational), and champion (usability) lenses with distinct data points"
    weight: 0.35
    description: "Genuinely different persona versions"
  - type: llm_judge
    criteria: "Pre-meeting research guide is actionable — specific research steps, discovery questions, persona signals, and multi-persona handling that reps can execute before any meeting"
    weight: 0.30
    description: "Actionable pre-meeting research guide"
