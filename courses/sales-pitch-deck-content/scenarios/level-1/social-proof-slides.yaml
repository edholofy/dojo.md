meta:
  id: social-proof-slides
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Build social proof slides that establish credibility — use customer logos, case studies, metrics, and testimonials effectively without overwhelming or underwhelming"
  tags: [sales, pitch-deck, social-proof, case-studies, testimonials, beginner]

state: {}

trigger: |
  You're building the social proof section for "ShipFast" (logistics
  SaaS platform, $28M ARR, 450 customers). ShipFast helps mid-market
  e-commerce companies optimize shipping and reduce costs.

  Available proof points:
  - Customer logos: 450 total. Notable: Warby Parker, Allbirds,
    Glossier, Casper, Away, Dollar Shave Club, Bombas, Chubbies
  - Case studies (detailed): Warby Parker (38% shipping cost
    reduction, $2.1M saved annually), Allbirds (50% faster fulfillment,
    95% on-time delivery up from 82%), Bombas (handled 4x holiday
    surge without adding headcount)
  - Testimonials: "ShipFast saved us $2M in the first year and we
    deployed in 3 weeks" — VP Ops, Warby Parker. "We went from 82%
    to 95% on-time delivery. Customers noticed." — Head of Logistics,
    Allbirds. "During Black Friday, our system handled 4x normal volume.
    Zero downtime." — CTO, Bombas
  - Metrics: Average customer sees 30% cost reduction, 92% customer
    retention rate, NPS of 72, 3 weeks average deployment time
  - Awards: G2 Leader (3 quarters), Gartner Cool Vendor 2025
  - Industry data: 450 customers across 12 industries, processing
    $4.2B in annual shipping volume

  Tasks:
  1. Design 3 social proof slides for the deck:
     a) The "Logo Wall" slide — which logos to feature and how to
        arrange them (not just a grid of 50 logos)
     b) The "Results" slide — aggregate metrics that tell the
        collective customer story
     c) The "Case Study Spotlight" slide — one deep customer story
        that resonates with mid-market e-commerce buyers
     For each, write the headline, content, design guidance, and
     speaker notes.

  2. Write the "Proof Point Selection Framework" — how to choose
     which proof points to include based on the audience. Include:
     matching proof to buyer persona (VP Ops vs CFO vs CTO), matching
     proof to deal stage (early vs late), matching proof to objection
     (cost, risk, complexity), and the "proof hierarchy" (which types
     of proof are most credible).

  3. Write the "Social Proof Mistakes" guide — 5 common mistakes
     companies make with proof slides. Include: logo overload (50
     tiny logos nobody recognizes), vanity metrics ("10,000 users"
     with no context), testimonials without specifics, missing the
     "similar to you" factor, and proof that's too old.

assertions:
  - type: llm_judge
    criteria: "Three proof slides are well-designed — logo wall is curated not cluttered, results slide uses meaningful aggregate metrics, case study spotlight tells a compelling story with specific numbers"
    weight: 0.35
    description: "Well-designed proof slides"
  - type: llm_judge
    criteria: "Proof selection framework is audience-aware — provides clear guidance on matching proof to persona, deal stage, and objection, with a credibility hierarchy that helps reps choose the right proof"
    weight: 0.35
    description: "Audience-aware proof selection"
  - type: llm_judge
    criteria: "Mistakes guide is practical — 5 common proof slide mistakes with realistic examples of what bad looks like and clear guidance on what good looks like"
    weight: 0.30
    description: "Practical proof mistakes guide"
