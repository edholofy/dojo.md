meta:
  id: storytelling-narrative-arc
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Build a narrative arc in your pitch deck — learn storytelling frameworks that transform a list of slides into a compelling story that holds attention and drives action"
  tags: [sales, pitch-deck, storytelling, narrative, engagement, beginner]

state: {}

trigger: |
  You're a pitch deck coach working with "GreenTrack" (sustainability
  compliance platform, $15M ARR). Their current deck is informational
  but boring — it reads like a Wikipedia article about their product.
  The founder says "prospects seem to tune out by slide 4."

  GreenTrack's current deck flow:
  1. Title slide (company name + logo)
  2. About us (founded 2021, 45 employees, Series A)
  3. Our mission (make sustainability reporting easy)
  4. Product overview (screenshot + 8 features listed)
  5. How it works (3-step process diagram)
  6. Features (12 bullet points)
  7. More features (8 more bullet points)
  8. Integrations (logo grid of 50 tools)
  9. Pricing (3 tiers)
  10. Team (headshots + bios)
  11. Customers (logo wall)
  12. Contact us

  The problems are obvious: company-centric (starts with "about us"),
  no problem framing, feature-heavy, no story, no urgency, no clear
  ask. Prospects have no reason to care by slide 2.

  GreenTrack's actual story (what SHOULD be in the deck):
  - EU's CSRD regulation affects 50,000+ companies starting 2025
  - Non-compliance fines: up to 5% of global revenue
  - Most companies are unprepared: 72% haven't started compliance
  - Manual compliance takes 6-12 months and $500K+ in consulting
  - GreenTrack automates 80% of the process in 8 weeks
  - Customers: 200 companies across EU and US
  - Average savings: $350K vs manual compliance approach

  Tasks:
  1. Rewrite GreenTrack's deck outline using the "Situation-
     Complication-Resolution" storytelling framework. For each slide,
     write: the slide purpose (where it fits in the narrative), the
     headline, key content, and the emotional beat (what the audience
     should feel at this point). Show how the deck now tells a story
     instead of listing information.

  2. Write the "Pitch Deck Storytelling Guide" — 3 narrative frameworks
     reps can use:
     a) Situation-Complication-Resolution (McKinsey Pyramid)
     b) The Hero's Journey (buyer is the hero, not your product)
     c) Before-During-After (transformation story)
     For each, explain the framework, show how it maps to deck slides,
     and identify when to use it (which buyer/situation).

  3. Write the "Attention Audit Checklist" — a diagnostic tool that
     evaluates whether a deck holds attention. Include: the "slide 3
     test" (would the buyer still be engaged?), the "headline scan"
     (do headlines alone tell the story?), the "so what" filter
     (does every slide answer "why should I care?"), and the engagement
     curve (where attention peaks and valleys should be).

assertions:
  - type: llm_judge
    criteria: "Rewritten deck tells a compelling story — transforms the informational deck into a narrative using Situation-Complication-Resolution, with clear emotional beats and buyer-centric framing"
    weight: 0.35
    description: "Compelling storytelling transformation"
  - type: llm_judge
    criteria: "Three narrative frameworks are practical — each is clearly explained with deck-slide mapping and situational guidance, giving reps multiple storytelling tools"
    weight: 0.35
    description: "Practical narrative frameworks"
  - type: llm_judge
    criteria: "Attention audit checklist is diagnostic — provides specific tests (slide 3 test, headline scan, so what filter) that anyone can apply to evaluate whether a deck holds attention"
    weight: 0.30
    description: "Diagnostic attention checklist"
