meta:
  id: competitive-positioning-slides
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Create competitive positioning slides that differentiate without bashing — use frameworks like 2x2 matrices and category positioning to show why you're the best choice"
  tags: [sales, pitch-deck, competitive, positioning, differentiation, beginner]

state: {}

trigger: |
  You're the Product Marketing Manager at "FormStack" (form builder
  and workflow automation platform, $40M ARR). You need to create the
  competitive positioning slide for your sales deck.

  Your competitive landscape:
  - Typeform: Beautiful design, great UX, but limited workflow
    automation. Popular with marketing teams. Weak enterprise features.
  - JotForm: Feature-rich, affordable, but complex UI. Popular with
    SMBs. Limited integrations.
  - Google Forms: Free, ubiquitous, but extremely basic. No workflow
    automation, no conditional logic, limited design options.
  - Microsoft Forms: Free with Microsoft 365, basic features, good
    for internal surveys. No external-facing workflows.
  - SurveyMonkey: Strong survey/research tools but not a form builder
    or workflow platform. Different use case bleeding into your space.

  FormStack's differentiation:
  - Only platform combining forms + documents + signatures + workflows
    in one product
  - Enterprise-grade security (HIPAA, SOC 2, FedRAMP authorized)
  - 300+ integrations including Salesforce native
  - No-code workflow automation (unique — competitors require Zapier)
  - Average customer reduces manual processes by 60%

  Tasks:
  1. Create 3 versions of the competitive positioning slide:
     a) The "2x2 Matrix" — choose the right axes that put FormStack
        in the top-right quadrant naturally (not artificially)
     b) The "Category of One" — position FormStack as creating a new
        category that competitors don't play in
     c) The "Feature Comparison" — honest comparison table that
        highlights FormStack's strengths without lying about competitors
     For each, write the headline, visual layout, content, and speaker
     notes explaining how to present it.

  2. Write the "Competitive Slide Ethics Guide" — rules for ethical
     competitive positioning in decks. Include: what you can say about
     competitors (verified facts only), what you should never say
     (unverified claims, FUD), how to handle "what about [competitor]?"
     questions, and the difference between differentiation and bashing.

  3. Write the "When NOT to Use a Competitive Slide" guide — situations
     where including competitive positioning hurts more than helps.
     Include: when you're creating the category (no competition yet),
     when the competitor is much larger (don't validate them), and
     when the buyer hasn't mentioned competitors.

assertions:
  - type: llm_judge
    criteria: "Three competitive slides are distinct approaches — 2x2 matrix uses natural axes (not rigged), category-of-one creates legitimate new framing, feature comparison is honest, all with speaker notes"
    weight: 0.35
    description: "Distinct honest competitive slides"
  - type: llm_judge
    criteria: "Ethics guide draws clear lines — distinguishes differentiation from bashing, provides rules for what's acceptable, and handles competitor questions professionally"
    weight: 0.35
    description: "Clear competitive ethics guide"
  - type: llm_judge
    criteria: "When-not-to-use guide shows strategic thinking — identifies situations where competitive slides backfire and explains the reasoning behind each scenario"
    weight: 0.30
    description: "Strategic when-not-to-use guide"
