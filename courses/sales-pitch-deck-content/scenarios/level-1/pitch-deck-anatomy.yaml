meta:
  id: pitch-deck-anatomy
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Learn the essential structure of a sales pitch deck — understand the 10-12 core slides, their purpose, and how they flow together to tell a compelling story"
  tags: [sales, pitch-deck, structure, anatomy, storytelling, beginner]

state: {}

trigger: |
  You're a newly hired Sales Enablement Specialist at "CloudMetrics"
  (B2B analytics platform, $20M ARR, 200 customers). The VP of Sales
  has asked you to create the company's first standardized sales pitch
  deck. Currently, every rep has their own version — some have 8 slides,
  others have 40.

  Company context:
  - Product: Real-time analytics dashboard for e-commerce companies
  - Target buyer: VP of E-commerce or VP of Analytics at mid-market
    companies ($50M-$500M revenue)
  - Average deal size: $45K ARR
  - Sales cycle: 45-60 days
  - Key differentiator: 10x faster than competitors with real-time
    data processing (competitors have 15-minute delays)
  - Top customer results: 23% increase in conversion rates, 15%
    reduction in ad waste, 3.2x ROI in first year

  Tasks:
  1. Write the "Pitch Deck Blueprint" — define the 10-12 essential
     slides for CloudMetrics' sales deck. For each slide, specify: the
     slide title, its purpose (why this slide exists), the key message
     (one sentence), the content elements (what goes on the slide), and
     design guidance (visual approach). Explain the narrative arc — how
     slides flow from problem to solution to proof to action.

  2. Write the actual content for 3 critical slides: the Problem slide
     (quantify the pain), the Solution slide (present CloudMetrics
     without feature dumping), and the Social Proof slide (customer
     results that build credibility). Each should include the headline,
     body text, supporting data points, and speaker notes.

  3. Write the "Deck Standards Guide" — the rules that ensure every
     rep's deck is consistent. Include: slide count limits, text rules
     (max words per slide), visual standards, what NOT to include, and
     the "one idea per slide" principle.

assertions:
  - type: llm_judge
    criteria: "Pitch deck blueprint has 10-12 well-defined slides with clear narrative arc — each slide has a specific purpose, key message, content elements, and design guidance, and the sequence tells a coherent story from problem to action"
    weight: 0.35
    description: "Well-structured pitch deck blueprint"
  - type: llm_judge
    criteria: "Three critical slides are compelling — Problem slide quantifies pain with data, Solution slide presents value without feature dumping, Social Proof slide uses specific customer results, all with speaker notes"
    weight: 0.35
    description: "Compelling critical slide content"
  - type: llm_judge
    criteria: "Deck standards guide enforces consistency — practical rules for slide count, text limits, visual standards, and 'one idea per slide' that prevent common deck problems"
    weight: 0.30
    description: "Practical deck standards guide"
