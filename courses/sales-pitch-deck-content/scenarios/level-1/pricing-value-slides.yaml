meta:
  id: pricing-value-slides
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Design pricing and value slides that justify your price point — present ROI, total cost of ownership, and pricing tiers without triggering sticker shock"
  tags: [sales, pitch-deck, pricing, ROI, value, cost-justification, beginner]

state: {}

trigger: |
  You're the Sales Enablement lead at "SecureNet" (endpoint security
  platform, $50M ARR). Your pricing is perceived as "expensive" by
  prospects. Your sales deck needs pricing/value slides that shift
  the conversation from cost to value.

  SecureNet pricing:
  - Starter: $8/endpoint/month (basic protection, up to 500 endpoints)
  - Professional: $15/endpoint/month (advanced threat detection, up to
    5,000 endpoints, 24/7 support)
  - Enterprise: $22/endpoint/month (full platform, unlimited endpoints,
    dedicated CSM, custom integrations)

  Competitor pricing context:
  - CrowdStrike: $12-25/endpoint/month
  - SentinelOne: $10-20/endpoint/month
  - Free alternatives: Windows Defender (included), basic antivirus

  Value data you have:
  - Average data breach cost: $4.45M
  - SecureNet customers: 0 successful breaches in last 3 years
  - Average customer has 2,500 endpoints → Professional tier = $37,500/month
  - SecureNet detects threats 47 minutes faster than industry average
  - Customers reduce security incident response time by 68%
  - Total cost of a security incident (including downtime): $150K average
  - SecureNet prevents an average of 12 incidents per year per customer
  - ROI calculation: $1.8M prevented losses vs $450K annual cost = 4x ROI

  Tasks:
  1. Create the "Value Before Price" slide sequence — 2-3 slides that
     build the value case BEFORE showing pricing. Include: the "cost
     of doing nothing" slide, the "ROI model" slide, and the "pricing"
     slide. Write content, design guidance, and speaker notes for each.

  2. Write the "Pricing Presentation Guide" for reps — how to present
     pricing without flinching. Include: when to show pricing in the
     deck (after value, never first), how to anchor to the cost of the
     problem (not competitor prices), how to handle "that's expensive"
     in the moment, and the tier recommendation approach (always
     recommend Professional, explain why).

  3. Write the "ROI Slide Calculator Framework" — a template reps can
     customize per prospect. Include: the input variables (number of
     endpoints, current incidents, breach risk), the calculation
     methodology, how to present assumptions transparently, and the
     "conservative vs. realistic" framing approach.

assertions:
  - type: llm_judge
    criteria: "Value-before-price sequence builds compelling case — cost of doing nothing quantifies risk, ROI model shows clear return, and pricing slide follows naturally with anchoring to value, all with speaker notes"
    weight: 0.35
    description: "Compelling value-before-price sequence"
  - type: llm_judge
    criteria: "Pricing presentation guide is practical — gives reps confidence with specific techniques for anchoring, handling objections, and recommending tiers, not just theory"
    weight: 0.30
    description: "Practical pricing presentation guide"
  - type: llm_judge
    criteria: "ROI calculator framework is customizable — template with clear inputs, transparent methodology, conservative assumptions, and a format reps can adapt per prospect"
    weight: 0.35
    description: "Customizable ROI calculator framework"
