meta:
  id: solution-slide-design
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Craft solution slides that present your product as the answer to the buyer's problem — without feature dumping, jargon, or losing the narrative thread"
  tags: [sales, pitch-deck, solution, value-proposition, product, beginner]

state: {}

trigger: |
  You're a sales enablement manager at "DataSync" (data integration
  platform, $35M ARR). Your product connects 200+ data sources, has
  real-time sync, visual pipeline builder, automated error handling,
  and SOC 2 compliance. The engineering team is proud of all features.

  The current solution slide is a disaster:
  "DataSync: The Complete Data Integration Platform
  - 200+ pre-built connectors
  - Real-time bidirectional sync
  - Visual drag-and-drop pipeline builder
  - Automated schema detection
  - Error handling with retry logic
  - SOC 2 Type II certified
  - 99.99% uptime SLA
  - Custom API support
  - Version control for pipelines
  - Role-based access control
  - Audit logging
  - Multi-region deployment"

  The problem: This is 12 bullet points of features. Buyers' eyes
  glaze over. Reps read the slide word-for-word. Nobody remembers
  what DataSync actually does for them.

  Your target buyer: VP of Engineering or Head of Data at companies
  spending $200K+/year on data infrastructure. Their pain: data teams
  spend 60% of time on pipeline maintenance instead of analysis. When
  pipelines break, it takes 4 hours average to diagnose and fix.

  Tasks:
  1. Rewrite the solution slide using 3 different approaches:
     a) The "Before/After" approach (show transformation)
     b) The "3 Pillars" approach (group into 3 memorable categories)
     c) The "Single Big Idea" approach (one powerful statement +
        supporting visual)
     For each, write the headline, body content, and speaker notes.
     Recommend which approach is best for DataSync and why.

  2. Write the "Feature-to-Value Translation Guide" — a framework
     for converting technical features into buyer value. Take 6 of
     DataSync's features and show the translation: Feature → Benefit
     → Business Value → Slide-worthy statement.

  3. Write the "Solution Slide Rules" — the 5 rules that prevent
     feature dumping. Include: the maximum number of points per slide,
     the "so what" test for every bullet, the jargon elimination
     checklist, the visual-over-text principle, and the "would a
     buyer screenshot this?" test.

assertions:
  - type: llm_judge
    criteria: "Three solution approaches are distinct and compelling — each transforms the 12-bullet feature dump into buyer-centric value communication, with clear headlines, concise content, and useful speaker notes"
    weight: 0.35
    description: "Distinct compelling solution approaches"
  - type: llm_judge
    criteria: "Feature-to-value translations are practical — 6 features are systematically converted through Feature→Benefit→Business Value→Slide statement, demonstrating the thinking process reps can replicate"
    weight: 0.30
    description: "Practical feature-to-value translations"
  - type: llm_judge
    criteria: "Solution slide rules are memorable and enforceable — 5 clear rules that anyone can apply to prevent feature dumping, with practical tests like 'would a buyer screenshot this?'"
    weight: 0.35
    description: "Memorable enforceable rules"
