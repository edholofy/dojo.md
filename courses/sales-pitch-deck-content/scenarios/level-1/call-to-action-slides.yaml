meta:
  id: call-to-action-slides
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Craft effective call-to-action and next-steps slides — close the deck with clear asks that move deals forward instead of ending with 'any questions?'"
  tags: [sales, pitch-deck, CTA, closing, next-steps, beginner]

state: {}

trigger: |
  You're a sales trainer reviewing pitch decks across 4 SaaS companies.
  Every single deck ends the same weak way: a "Thank You" slide with
  the company logo and "Questions?" underneath. None of them close
  with a clear call to action.

  Company 1 — "PayFlow" (payment processing, avg deal $60K):
  Last slide: "Thank you! — Questions? — contact@payflow.com"
  Sales cycle: 30 days. Next step should be: technical POC with
  buyer's dev team (2-week pilot).

  Company 2 — "TalentHub" (ATS platform, avg deal $35K):
  Last slide: "Thanks for your time! — Let's connect! — www.talenthub.com"
  Sales cycle: 45 days. Next step should be: discovery call with
  hiring team to map current workflow.

  Company 3 — "ComplianceAI" (regulatory compliance, avg deal $120K):
  Last slide: "Questions? — We'd love to help! — sales@complianceai.com"
  Sales cycle: 90 days. Next step should be: compliance gap assessment
  (free, 2-hour session with their legal team).

  Company 4 — "MarketPulse" (market research platform, avg deal $25K):
  Last slide: "Thank You — Schedule a demo at marketpulse.com/demo"
  Sales cycle: 21 days. Next step should be: free trial with their
  actual data (14-day trial, guided onboarding call).

  Tasks:
  1. Rewrite the final 2 slides for each company: a "Summary/Why Us"
     slide that reinforces the key value proposition, and a "Next Steps"
     slide with a specific, low-friction call to action. Each CTA
     should match the company's sales cycle and natural next step.
     Include speaker notes on how to deliver the close.

  2. Write the "CTA Slide Framework" — rules for effective deck
     closings. Include: why "Questions?" is the worst ending, the
     "specific ask" principle (one clear next step, not three options),
     how to match CTA to deal stage (first meeting vs follow-up vs
     final presentation), how to create urgency without pressure, and
     the "next 48 hours" commitment technique.

  3. Write the "Deck Closing Scenarios" guide — how to close differently
     based on 4 common meeting outcomes: enthusiastic interest (fast-
     track), cautious interest (nurture), mixed signals (address
     concerns), and going cold (re-engage). Include the verbal close
     and the follow-up email template for each scenario.

assertions:
  - type: llm_judge
    criteria: "Rewritten final slides are specific and actionable — each company's CTA matches their sales cycle with a clear, low-friction next step, and summary slides reinforce value, all with delivery speaker notes"
    weight: 0.35
    description: "Specific actionable closing slides"
  - type: llm_judge
    criteria: "CTA framework provides clear rules — explains why generic endings fail, establishes the specific-ask principle, matches CTAs to deal stages, and includes urgency techniques"
    weight: 0.30
    description: "Clear CTA framework rules"
  - type: llm_judge
    criteria: "Closing scenarios are realistic — 4 meeting outcomes with appropriate verbal close and follow-up email for each, showing reps how to adapt their close to buyer signals"
    weight: 0.35
    description: "Realistic closing scenarios"
