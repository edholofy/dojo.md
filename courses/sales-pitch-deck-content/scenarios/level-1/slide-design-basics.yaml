meta:
  id: slide-design-basics
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Apply fundamental slide design principles — learn visual hierarchy, data visualization, minimal text rules, and design consistency that make decks professional and scannable"
  tags: [sales, pitch-deck, design, visual-hierarchy, data-visualization, beginner]

state: {}

trigger: |
  You're a design-aware sales enablement specialist at "FlowMetrics"
  (business intelligence platform, $30M ARR). The sales team's decks
  are embarrassingly bad — text walls, clip art, inconsistent fonts,
  and charts that make data harder to understand. The VP of Marketing
  has asked you to create design guidelines that non-designers can
  follow.

  Examples of current problems:
  - Slide 1: 150 words of text in 12pt font, 3 different fonts, a
    gradient background, and a stock photo of people in a meeting
  - Slide 2: A pie chart with 12 slices, all in similar shades of
    blue, with labels overlapping each other
  - Slide 3: 8 bullet points with sub-bullets, each in a different
    color, with animated transitions between points
  - Slide 4: A comparison table with 15 rows and 6 columns, text too
    small to read, no highlighting of key differences
  - Slide 5: Company logo taking up 40% of the slide, with contact
    info in 3 places

  FlowMetrics brand elements:
  - Primary color: #2563EB (blue), Secondary: #10B981 (green)
  - Accent: #F59E0B (amber for highlights)
  - Font: Inter (headings), Inter (body)
  - Logo: Simple wordmark, should be small and consistent

  Tasks:
  1. Write the "Slide Design Rulebook" for non-designers — 10 rules
     that any sales rep can follow. Include: the one-idea-per-slide
     rule, the 30-word maximum rule, font size minimums (24pt for body,
     32pt for headlines), the 3-color maximum, white space requirements,
     image guidelines, chart simplification, and consistency standards.
     For each rule, show a "bad example" description and "good example"
     description.

  2. Create the "Data Visualization Guide" — how to present numbers
     and data on slides. Include: when to use bar charts vs line charts
     vs single big numbers, how to simplify complex data (highlight the
     key insight, not all the data), the "chart title = insight" rule
     (title should state the conclusion, not describe the data), and
     color usage in charts.

  3. Write the "Template Specification" — the exact specifications
     for FlowMetrics' slide template. Include: slide dimensions, margin
     guidelines, title placement, content zones, logo placement, font
     hierarchy (H1, H2, body, caption), color usage rules, and footer
     design. This should be specific enough for a designer to build
     the template.

assertions:
  - type: llm_judge
    criteria: "Design rulebook is accessible to non-designers — 10 clear rules with bad/good examples that sales reps without design training can follow to create professional-looking slides"
    weight: 0.35
    description: "Accessible design rulebook"
  - type: llm_judge
    criteria: "Data visualization guide improves chart communication — provides clear guidance on chart type selection, data simplification, insight-first titles, and color usage that makes data easier to understand"
    weight: 0.30
    description: "Improved chart communication"
  - type: llm_judge
    criteria: "Template specification is buildable — specific enough dimensions, placements, font hierarchy, and color rules that a designer could create the actual template from this document"
    weight: 0.35
    description: "Buildable template specification"
