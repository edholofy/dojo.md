meta:
  id: problem-slide-framing
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "Master the problem slide — learn to articulate buyer pain points with data, emotional resonance, and urgency that makes the audience feel the problem before hearing the solution"
  tags: [sales, pitch-deck, problem-framing, pain-points, storytelling, beginner]

state: {}

trigger: |
  You're a pitch deck consultant helping 3 different SaaS companies
  improve their problem slides. Each company has a weak problem slide
  that fails to resonate with buyers.

  Company 1 — "HireRight" (recruiting platform):
  Current problem slide: "Hiring is broken. Companies struggle to find
  good candidates."
  Reality: The average time-to-hire is 42 days. Bad hires cost 30% of
  first-year salary. 73% of hiring managers say they've made a wrong
  hire. 65% of candidates ghost during the process. Companies with
  100+ employees spend $500K+ annually on recruiting.

  Company 2 — "SecureFlow" (cybersecurity platform):
  Current problem slide: "Cyber threats are increasing. Your company
  needs better security."
  Reality: Average cost of a data breach is $4.45M. Mean time to
  identify a breach is 204 days. 60% of small businesses close within
  6 months of a breach. Companies face an average of 1,168 attacks
  per week. Security teams are understaffed — 3.4M unfilled positions.

  Company 3 — "FieldOps" (field service management):
  Current problem slide: "Managing field teams is hard. Scheduling is
  complex."
  Reality: Field service companies lose 20% of revenue to scheduling
  inefficiency. Technicians spend 40% of time driving (not working).
  First-time fix rate averages 72% (28% require return visits costing
  $300+ each). Customer no-shows waste $150 per appointment. Paper-
  based teams have 35% more scheduling errors.

  Tasks:
  1. For each company, rewrite the problem slide with: a compelling
     headline (not generic), 3-4 data points that quantify the pain,
     a "so what?" statement that connects the problem to the buyer's
     world, and speaker notes explaining how to deliver the slide.

  2. Write the "Problem Slide Framework" — the reusable method for
     crafting problem slides. Include: the difference between features
     and problems, how to quantify pain (cost, time, risk), the
     "before state" technique, how to create urgency without fear-
     mongering, and the rule of 3 data points.

  3. Write 3 "anti-patterns" — common problem slide mistakes with
     examples of what they look like and why they fail. Include: the
     generic problem ("X is broken"), the feature-disguised problem
     ("You need AI-powered analytics"), and the data dump (20 stats
     with no narrative).

assertions:
  - type: llm_judge
    criteria: "Rewritten problem slides are dramatically better — each has a specific headline, 3-4 relevant data points, a 'so what?' connection to the buyer, and speaker notes, transforming generic statements into compelling problem framing"
    weight: 0.35
    description: "Dramatically improved problem slides"
  - type: llm_judge
    criteria: "Problem slide framework is reusable — teaches the method, not just examples, with clear guidance on quantifying pain, creating urgency, using the rule of 3, and avoiding feature-masquerading-as-problem"
    weight: 0.35
    description: "Reusable problem slide framework"
  - type: llm_judge
    criteria: "Anti-patterns are recognizable — each mistake is clearly explained with a realistic bad example and an explanation of why it fails to resonate with buyers"
    weight: 0.30
    description: "Recognizable anti-patterns"
