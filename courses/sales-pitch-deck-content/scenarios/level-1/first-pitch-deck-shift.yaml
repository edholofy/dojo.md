meta:
  id: first-pitch-deck-shift
  level: 1
  course: sales-pitch-deck-content
  type: output
  description: "First shift simulation — build a complete mini pitch deck under time pressure when a major prospect requests a custom presentation in 24 hours"
  tags: [sales, pitch-deck, simulation, time-pressure, complete-deck, beginner]

state: {}

trigger: |
  URGENT: It's Tuesday 4pm. Your top AE just messaged you:

  "Hey — huge news. Got a meeting with the VP of Operations at
  Nordstrom tomorrow at 2pm. They're evaluating 3 vendors to replace
  their current inventory management system. Budget is $500K+. But
  they want a custom pitch deck focused on retail inventory challenges.
  Our standard deck won't work — it's too generic. Can you help me
  build something by tomorrow morning?"

  You're at "InventoryIQ" (inventory management SaaS, $45M ARR).

  What you know about Nordstrom's situation:
  - 350+ stores, plus e-commerce (omnichannel complexity)
  - Current system: legacy on-premise solution, 8 years old
  - Pain points: stockouts cost them ~$12M annually, overstock ties
    up $30M in working capital, no real-time visibility across channels
  - They're also evaluating: Oracle Retail and Manhattan Associates
  - The VP of Ops cares about: speed of deployment, integration with
    existing ERP (SAP), and proving ROI within 6 months
  - Nordstrom's recent earnings call mentioned "inventory optimization"
    as a key initiative for 2026

  InventoryIQ's relevant strengths:
  - Deploys in 12 weeks (Oracle: 18 months, Manhattan: 9 months)
  - Pre-built SAP integration (certified SAP partner)
  - Retail-specific AI demand forecasting (94% accuracy vs industry 78%)
  - Customer results: Target reduced stockouts 45%, Macy's freed $18M
    in working capital, REI achieved 97% inventory accuracy
  - Real-time omnichannel inventory visibility
  - Price: ~$400K first year (below their $500K budget)

  Tasks:
  1. Write the complete 10-slide custom deck outline for the Nordstrom
     meeting. For each slide, write: the headline, the key content
     (bullet points or data), and speaker notes. The deck should be
     Nordstrom-specific — not generic. Reference their specific pain
     points, competitor weaknesses, and relevant retail proof points.

  2. Write the 3 most critical slides in full detail:
     a) The "Nordstrom's Inventory Challenge" slide (custom problem)
     b) The "Why InventoryIQ for Retail" slide (solution positioning)
     c) The "Similar Retailers, Real Results" slide (Target, Macy's,
        REI case studies positioned for Nordstrom relevance)

  3. Write the "24-Hour Custom Deck Playbook" — a process guide for
     building custom decks quickly. Include: what to customize (problem
     framing, proof points, competitive positioning) vs what stays
     standard (product demo flow, pricing structure), the research
     checklist (what to learn about the prospect in 2 hours), and the
     quality checklist (what to verify before the meeting).

assertions:
  - type: llm_judge
    criteria: "10-slide deck is Nordstrom-specific — references their stores, omnichannel challenges, SAP integration need, competitor comparison (Oracle/Manhattan), relevant retail proof, and stays within scope"
    weight: 0.35
    description: "Nordstrom-specific custom deck"
  - type: llm_judge
    criteria: "Three critical slides are compelling — custom problem slide uses Nordstrom's numbers, solution slide positions against Oracle/Manhattan weaknesses, proof slide uses similar retailers with relevant metrics"
    weight: 0.35
    description: "Compelling critical slides"
  - type: llm_judge
    criteria: "24-hour playbook is practical — reusable process for building custom decks quickly with clear customize-vs-standard guidance, research checklist, and quality verification"
    weight: 0.30
    description: "Practical 24-hour playbook"
