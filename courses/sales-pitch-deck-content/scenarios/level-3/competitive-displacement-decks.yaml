meta:
  id: competitive-displacement-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Create competitive displacement decks — design presentations that convince prospects to switch from an incumbent solution to yours"
  tags: [sales, pitch-deck, displacement, switching, incumbent, competitive, advanced]

state: {}

trigger: |
  You're the Competitive Strategy Lead at "NextCRM" (modern CRM
  platform, $85M ARR). 60% of your pipeline involves displacing
  Salesforce. These are the hardest deals to close — prospects have
  invested millions in Salesforce over years.

  The displacement challenge:
  - Average Salesforce customer has used it for 7.3 years
  - Typical Salesforce implementation cost: $500K-$2M
  - Sunk cost psychology: "We've already invested so much"
  - Data migration fear: "What about our 8 years of customer data?"
  - Training fear: "We just trained 500 reps on Salesforce"
  - Integration dependency: Average of 12 integrations to replicate
  - Contract lock-in: 67% have 2-3 year contracts with Salesforce

  NextCRM's displacement advantages:
  - 60% lower TCO over 3 years ($1.2M vs $3M for 500-rep deployment)
  - Modern UX: reps adopt in 2 weeks vs 3 months for Salesforce
  - Migration tool: automated data migration in 4 weeks (guaranteed)
  - API-first: replicate integrations 3x faster than Salesforce
  - Customer results: Drift saved $1.8M/year switching from Salesforce,
    Notion improved rep productivity 40%, Stripe reduced CRM admin
    from 3 FTEs to 0.5 FTEs

  Win/loss data from Salesforce displacement deals:
  - Win rate: 22% (vs 35% for non-displacement deals)
  - Top reason for loss: "Switching risk too high" (45%)
  - Second reason: "Can't justify the disruption" (28%)
  - Third reason: "Salesforce matched pricing" (18%)
  - Average sales cycle: 9 months (vs 4 months non-displacement)
  - Deals that included "displacement deck": 31% win rate

  Tasks:
  1. Create the 12-slide "Salesforce Displacement Deck." This is a
     specialized deck, not the standard sales deck with anti-Salesforce
     slides added. Structure it around the displacement journey:
     acknowledge the investment → quantify the hidden costs → show the
     migration path → prove it works → make the business case. Write
     full content for each slide with speaker notes.

  2. Write the "Objection Map for Displacement Deals" — the 10 most
     common Salesforce-specific objections mapped to deck slides. For
     each: the exact words prospects use, the underlying fear, which
     slide(s) address it, the talk track, and the proof point. Include
     the 3 objections that are actually buying signals in disguise.

  3. Write the "Displacement Deal Strategy" — the 9-month sales play
     that uses the deck at the right moments. Include: the 3-meeting
     progression (Meeting 1: why consider switching, Meeting 2: how
     the switch works, Meeting 3: the business case), which slides
     to use in each meeting, the champion enablement materials (what
     your internal champion needs to sell the switch to their CEO),
     and the "Salesforce retention offer" counter-play (what to do
     when Salesforce discounts to keep them).

assertions:
  - type: llm_judge
    criteria: "Displacement deck addresses the real psychology — acknowledges sunk costs, quantifies hidden incumbent costs, provides clear migration path, and builds the business case for switching progressively"
    weight: 0.35
    description: "Psychology-aware displacement deck"
  - type: llm_judge
    criteria: "Objection map is Salesforce-specific — 10 objections use real prospect language, address underlying fears, map to specific slides, and identify 3 buying signals disguised as objections"
    weight: 0.35
    description: "Salesforce-specific objection map"
  - type: llm_judge
    criteria: "Displacement strategy is a complete 9-month play — 3-meeting progression with right slides per meeting, champion enablement, and counter-play for Salesforce retention offers"
    weight: 0.30
    description: "Complete 9-month displacement strategy"
