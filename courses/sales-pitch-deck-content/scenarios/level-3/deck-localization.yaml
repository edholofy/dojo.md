meta:
  id: deck-localization
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Localize pitch decks for global markets — adapt content, data, cultural references, and presentation style for international audiences"
  tags: [sales, pitch-deck, localization, global, international, cultural, advanced]

state: {}

trigger: |
  You're the Global Sales Enablement Manager at "TeamSync" (team
  collaboration platform, $150M ARR, selling in 18 countries). The
  US-built deck is underperforming in international markets. Win rates:

  Win rates by region (same deck):
  - North America: 28% (home market, deck was built here)
  - Western Europe: 22% (good product-market fit, but deck feels "too
    American" — too aggressive, too many superlatives)
  - Japan: 12% (deck is too direct, doesn't build enough trust before
    the pitch, no consensus-building structure)
  - Germany: 19% (deck lacks technical depth, Germans want specifics
    not claims, case studies feel like marketing)
  - Middle East: 15% (relationship-building phase missing, deck jumps
    to product too fast, pricing approach culturally wrong)
  - Brazil: 20% (deck feels corporate and cold, no emotional
    connection, storytelling expected)

  Feedback from regional sales leaders:
  - Japan: "We can't show the competitive slide. Directly comparing
    to competitors is considered disrespectful here."
  - Germany: "Saying 'we're the best' doesn't work. Show data, show
    methodology, show engineering depth."
  - Middle East: "The first meeting should be about building trust.
    Showing a product deck in the first meeting is a mistake."
  - Brazil: "Our prospects want to feel inspired, not informed. The
    deck reads like a technical manual."
  - Western Europe: "GDPR isn't a slide — it's a requirement. Move
    it from slide 9 to slide 2."

  Tasks:
  1. Create deck adaptation guides for 3 regions: Japan, Germany, and
     Middle East. For each: the structural changes (slide order,
     slides to add/remove), the content changes (language, tone, data
     presentation), the cultural considerations (relationship vs task
     orientation, direct vs indirect communication), and the
     presentation style changes (pacing, interaction, Q&A).

  2. Write the "Global Deck Localization Framework" — the systematic
     process for adapting decks across cultures. Include: the cultural
     dimensions that affect deck design (Hofstede's framework adapted
     for sales), the 5 universal slides (work everywhere) vs the
     5 cultural slides (must be adapted), the translation vs
     localization distinction (it's not just language), and the local
     validation process (how to get regional feedback).

  3. Write the "Anti-Localization Mistakes" guide — 8 mistakes
     companies make when localizing decks. Include: direct translation
     without cultural adaptation, US case studies in non-US markets,
     pricing in USD only, American humor/idioms, competitive comparison
     in non-competitive cultures, one-size-fits-all compliance slides,
     stock photos that don't represent the local market, and metric
     systems (imperial vs metric, date formats).

assertions:
  - type: llm_judge
    criteria: "Regional adaptations are culturally informed — Japan, Germany, and Middle East guides reflect real cultural business norms with specific structural, content, and presentation changes"
    weight: 0.35
    description: "Culturally informed regional adaptations"
  - type: llm_judge
    criteria: "Localization framework is systematic — cultural dimensions, universal vs cultural slides, translation vs localization distinction, and validation process that any company can follow"
    weight: 0.35
    description: "Systematic localization framework"
  - type: llm_judge
    criteria: "Anti-localization mistakes are real — 8 common errors with specific examples that companies actually make, not theoretical problems"
    weight: 0.30
    description: "Real localization mistakes"
