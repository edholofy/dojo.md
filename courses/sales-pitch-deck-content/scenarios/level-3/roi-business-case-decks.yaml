meta:
  id: roi-business-case-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Build ROI and business case decks — create financial justification presentations that help champions sell internally to budget holders and procurement"
  tags: [sales, pitch-deck, ROI, business-case, financial-justification, advanced]

state: {}

trigger: |
  You're a Value Engineering consultant at "CloudOps" (cloud
  infrastructure management, $110M ARR). Your champion at "RetailMax"
  (a $5B retailer) needs help building the internal business case
  to justify a $600K annual investment in CloudOps. The champion
  (VP of Engineering) says: "I love your product. But I need a deck
  that my CFO will approve. She kills 70% of vendor proposals."

  RetailMax's current situation:
  - $8M annual cloud infrastructure spend (AWS + Azure)
  - 4-person cloud ops team managing 2,400 instances
  - Average monthly cloud waste: $180K (instances running unused)
  - 3 major outages last year (avg $450K per outage in lost revenue)
  - Mean time to detect: 22 minutes, Mean time to resolve: 4.2 hours
  - Compliance audit findings: 14 critical items related to cloud
    security configuration
  - Cloud team spends 65% of time on manual operations vs. innovation

  CloudOps value for RetailMax (estimated):
  - Cloud waste reduction: Save $1.8M/year (conservative 80% of waste)
  - Outage prevention: Save $900K/year (reduce from 3 to 0.5 outages)
  - Team productivity: Recover 2.6 FTEs worth of time ($520K value)
  - Compliance automation: Resolve 14 findings, avoid potential fines
  - Total estimated value: $3.22M/year vs. $600K cost = 5.4x ROI
  - Payback period: 2.2 months

  The CFO's known criteria for approvals:
  - Must show payback within 6 months
  - Requires 3+ reference customers in retail
  - Needs risk assessment (what if the tool doesn't deliver?)
  - Wants to see comparison to hiring additional headcount
  - Demands sensitivity analysis on assumptions

  Tasks:
  1. Create the 8-slide "CFO Business Case Deck" for RetailMax. This
     is NOT a product deck — it's a financial justification document.
     Structure: current state costs → proposed investment → value
     drivers → ROI calculation → risk mitigation → implementation
     timeline → recommendation. Write full content with CFO-level
     language and supporting calculations.

  2. Write the "Value Engineering Methodology" — the reusable process
     for building customer-specific ROI decks. Include: discovery
     questions to gather the data (15 questions), the value driver
     framework (cost savings, revenue impact, risk reduction, time
     savings), the calculation methodology (conservative, realistic,
     optimistic — always present conservative), the sensitivity
     analysis approach, and the "build vs. buy" comparison.

  3. Write the "Champion Enablement Kit" — materials the champion
     needs to present this deck internally without you in the room.
     Include: the deck with detailed speaker notes (as if you wrote
     a script), the FAQ document (20 questions the CFO might ask with
     answers), the one-page executive summary, and the "if she says
     no" playback plan (how to address specific rejection reasons).

assertions:
  - type: llm_judge
    criteria: "CFO business case deck speaks finance language — 8 slides focused on financial justification with ROI calculation, sensitivity analysis, risk mitigation, and build-vs-buy that a CFO would take seriously"
    weight: 0.35
    description: "Finance-language business case"
  - type: llm_judge
    criteria: "Value engineering methodology is reusable — discovery questions, value driver framework, calculation methodology, and sensitivity analysis that can be applied to any customer"
    weight: 0.30
    description: "Reusable value engineering methodology"
  - type: llm_judge
    criteria: "Champion enablement kit empowers internal selling — script-level speaker notes, 20-question FAQ, executive summary, and rejection-handling plan that let the champion present without vendor support"
    weight: 0.35
    description: "Empowering champion enablement kit"
