meta:
  id: channel-partner-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Create channel partner pitch decks — design presentations that enable partners to sell your product effectively without your direct involvement"
  tags: [sales, pitch-deck, channel, partner, enablement, co-selling, advanced]

state: {}

trigger: |
  You're the VP of Channel Sales at "ComplianceCloud" (regulatory
  compliance platform, $75M ARR). You have 200 channel partners
  (consulting firms, system integrators, and resellers) responsible
  for 35% of revenue. The problem: partners can't pitch your product
  effectively.

  Channel partner feedback:
  - "Your deck is too technical for our clients" (consulting firms)
  - "We need a deck we can put our logo on" (resellers)
  - "Your deck doesn't explain how we add value" (system integrators)
  - "We can't demo your product, so the deck needs to do the selling"
    (all partners)

  Partner types and their needs:
  1. Management Consulting Firms (40 partners, avg deal $200K):
     Present to C-suite, need strategic positioning, want to sell
     their implementation services alongside ComplianceCloud.
  2. System Integrators (80 partners, avg deal $120K):
     Technical audience, need integration architecture slides, want
     to show their migration/deployment expertise.
  3. Resellers/VARs (80 partners, avg deal $60K):
     SMB audience, need simple value proposition, want co-branded
     deck they can customize easily.

  ComplianceCloud partner program:
  - Partners earn 20-30% commission
  - Dedicated partner portal with resources
  - Co-marketing fund ($5K per qualified deal)
  - Partner certification program (3 tiers)

  Tasks:
  1. Create 3 partner deck variants (10 slides each):
     a) Consulting firm deck — strategic, C-suite ready, positions the
        consulting firm as the transformation partner with ComplianceCloud
        as the enabling technology
     b) System integrator deck — technical depth, architecture diagrams,
        positions the SI as the implementation expert
     c) Reseller deck — simple, co-brandable, SMB-focused, self-
        contained (no demo needed)
     For each, write slide outlines with headlines and content guidance.

  2. Write the "Partner Deck Customization Guide" — rules for what
     partners can and cannot modify. Include: the 4 slides that must
     stay as-is (compliance, security, legal claims), the 6 slides
     partners can customize (problem framing, case studies, pricing,
     services positioning), the co-branding guidelines (logo placement,
     partner introduction slide), and the approval process for
     customized decks.

  3. Write the "Partner Pitch Training Curriculum" — a 2-hour virtual
     training that teaches partners to deliver the deck. Include: the
     module breakdown (product knowledge, deck walkthrough, objection
     handling, demo alternatives), the certification quiz (10
     questions), and the ongoing support model (monthly partner calls,
     deck update notifications, deal support escalation).

assertions:
  - type: llm_judge
    criteria: "Three partner deck variants serve distinct needs — consulting firm (strategic), SI (technical), reseller (simple) decks have genuinely different structure, content, and positioning"
    weight: 0.35
    description: "Distinct partner deck variants"
  - type: llm_judge
    criteria: "Customization guide balances flexibility and control — clear rules on locked vs customizable slides, co-branding guidelines, and approval process that protects the brand while empowering partners"
    weight: 0.30
    description: "Balanced customization guide"
  - type: llm_judge
    criteria: "Partner pitch training is comprehensive — 2-hour curriculum with modules, certification, and ongoing support that ensures partners can deliver the deck effectively"
    weight: 0.35
    description: "Comprehensive partner training"
