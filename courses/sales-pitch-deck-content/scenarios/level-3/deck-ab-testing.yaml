meta:
  id: deck-ab-testing
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Design and execute pitch deck A/B tests — systematically test slide variations to improve conversion rates with statistical rigor"
  tags: [sales, pitch-deck, ab-testing, optimization, experimentation, advanced]

state: {}

trigger: |
  You're the Revenue Operations Director at "SalesForge" (sales
  engagement platform, $65M ARR, 120 AEs). The CEO wants a "data-
  driven deck optimization program." Currently, deck changes are based
  on opinion — the CMO wants more branding, the CRO wants more ROI
  data, and AEs want fewer slides. Nobody has data to support their
  position.

  Current deck performance baseline (from DocSend + CRM correlation):
  - Deck-to-meeting conversion: 18% (deck shared → meeting booked)
  - Meeting-to-opportunity: 42% (meeting held → opportunity created)
  - Overall deck-influenced pipeline: $48M/quarter
  - Average deal size: $55K

  Proposed tests (from different stakeholders):
  1. CMO: "Lead with the brand story slide (why we exist) instead of
     the problem slide. It builds emotional connection."
  2. CRO: "Add an ROI calculator slide after the pricing slide.
     Self-serve ROI justification will speed decisions."
  3. Head of Sales: "Cut the deck from 12 slides to 8. Remove team
     slide, competitive slide, and two feature slides. Shorter = better."
  4. Product Marketing: "Replace the static competitive slide with an
     interactive comparison tool link. Let prospects explore themselves."
  5. Top AE (Sarah): "Put the case study slide BEFORE the solution
     slide. Show proof first, then explain how."

  Resources available:
  - DocSend (slide-level analytics)
  - Salesforce CRM (deal outcomes)
  - 120 AEs who can be split into test groups
  - 6-month testing window
  - $15K budget for tools/analysis

  Tasks:
  1. Design the "Deck A/B Testing Program" — a 6-month plan to
     systematically test deck changes. Include: the testing methodology
     (how to isolate variables, control for AE skill level, ensure
     statistical significance), the testing calendar (which tests to
     run in which order, why), the sample size requirements (how many
     deck shares per variant for significance), and the measurement
     framework (what to measure at each stage).

  2. For the 5 proposed tests, write the test design for each: the
     hypothesis, the control vs variant description, the primary
     metric (what defines "winner"), the sample size needed, the
     expected test duration, and the decision criteria. Prioritize
     the 5 tests from highest expected impact to lowest, with
     reasoning.

  3. Write the "Test Results Presentation Template" — how to present
     A/B test results to stakeholders. Include: the results summary
     format (metric, confidence level, recommendation), how to handle
     inconclusive results, how to calculate revenue impact of winning
     variants, and the implementation plan for rolling out winners
     to all 120 AEs.

assertions:
  - type: llm_judge
    criteria: "Testing program is statistically sound — methodology isolates variables, controls for AE skill, calculates sample sizes, and maintains rigor over 6 months with a clear testing calendar"
    weight: 0.35
    description: "Statistically sound testing program"
  - type: llm_judge
    criteria: "Five test designs are well-structured — each has a clear hypothesis, control/variant, primary metric, sample size, duration, and decision criteria, with rational prioritization"
    weight: 0.35
    description: "Well-structured test designs"
  - type: llm_judge
    criteria: "Results presentation template is stakeholder-ready — clear format for presenting winners, handling inconclusive results, calculating revenue impact, and rolling out changes"
    weight: 0.30
    description: "Stakeholder-ready results template"
