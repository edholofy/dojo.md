meta:
  id: executive-briefing-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Create executive briefing decks — design condensed, high-impact presentations for C-suite audiences who have 15 minutes and zero patience for fluff"
  tags: [sales, pitch-deck, executive, C-suite, briefing, advanced]

state: {}

trigger: |
  You're the Enterprise Sales Enablement lead at "CyberShield"
  (enterprise cybersecurity platform, $180M ARR). Your enterprise AEs
  have secured 4 C-suite meetings this quarter, but they're using the
  standard 15-slide sales deck. The CISO at a Fortune 100 company
  literally said: "I have 15 minutes. Your deck has 15 slides. I'll
  have to stop you at slide 3."

  The executive meeting reality:
  - C-suite meetings average 22 minutes (scheduled for 30, start late)
  - Executives interrupt with questions by slide 2
  - They don't follow linear slide sequences
  - They care about strategic outcomes, not features
  - They want to understand risk and business impact, not product tours
  - They'll ask questions you didn't anticipate
  - They may ask you to "skip to the pricing" at any moment

  4 upcoming executive meetings:
  1. CISO, JPMorgan Chase: Concerned about AI-powered attacks increasing
     300% YoY. Evaluating 3 vendors. Budget approved. 15-min meeting.
  2. CFO, United Airlines: Board mandated cybersecurity audit after
     industry breach. Needs cost justification. 20-min meeting.
  3. CEO, Marriott International: Post-breach (competitor Hilton was
     breached). Wants strategic cyber roadmap. 25-min meeting.
  4. CTO, Pfizer: Pharmaceutical IP protection. Regulatory compliance
     (FDA, HIPAA). 15-min meeting.

  CyberShield data for executive conversations:
  - Prevents avg $15M per breach (industry avg breach cost: $4.45M,
    enterprise avg: $15.4M)
  - 47-second mean time to detect (industry: 204 days)
  - Zero breaches across 600 enterprise customers in 5 years
  - ROI: $11 saved per $1 spent on CyberShield
  - Compliance: SOC 2, ISO 27001, HIPAA, PCI-DSS, FedRAMP
  - 3,200 enterprise deployments globally

  Tasks:
  1. Design the "Executive Briefing Deck Template" — a 5-7 slide
     format specifically for C-suite meetings. For each slide: purpose,
     headline, content (max 3 points), visual approach, and speaker
     notes. Include the design principles: modular (any slide can
     stand alone), non-linear (any order works), data-dense (executives
     want density, not simplicity).

  2. Write the customized executive briefing for the JPMorgan CISO
     meeting (15 minutes, 5 slides max). Include: full slide content,
     anticipated questions and prepared responses, the "hallway
     conversation" follow-up strategy, and the executive summary
     leave-behind (1-page PDF they'll actually read).

  3. Write the "Executive Meeting Playbook" — how AEs prepare for
     and execute C-suite presentations. Include: pre-meeting research
     (SEC filings, earnings calls, LinkedIn, board priorities), the
     "first 90 seconds" (what you say before showing any slides),
     handling interruptions gracefully, the non-linear navigation
     technique (jumping to any slide on demand), and the follow-up
     cadence (executive attention spans require different follow-up).

assertions:
  - type: llm_judge
    criteria: "Executive briefing template is C-suite-appropriate — 5-7 modular, non-linear slides with strategic framing, data density, and the ability to present in any order for time-constrained executives"
    weight: 0.35
    description: "C-suite appropriate briefing template"
  - type: llm_judge
    criteria: "JPMorgan CISO briefing is meeting-ready — 5 slides with customized content for AI-powered attack concerns, anticipated questions with responses, and executive leave-behind"
    weight: 0.35
    description: "Meeting-ready CISO briefing"
  - type: llm_judge
    criteria: "Executive meeting playbook addresses real challenges — pre-meeting research, first 90 seconds, interruption handling, non-linear navigation, and executive follow-up that reflect actual C-suite meeting dynamics"
    weight: 0.30
    description: "Real-challenge executive playbook"
