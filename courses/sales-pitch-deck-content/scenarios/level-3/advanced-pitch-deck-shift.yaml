meta:
  id: advanced-pitch-deck-shift
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Advanced shift simulation — create a board-level presentation for a CEO who needs to win board approval for a company-defining acquisition"
  tags: [sales, pitch-deck, board, acquisition, high-stakes, simulation, advanced]

state: {}

trigger: |
  CRITICAL SCENARIO: You're the Chief Strategy Officer at "CloudFirst"
  (enterprise cloud platform, $250M ARR, public company). The CEO has
  identified a transformative acquisition target — "DataAI" (AI/ML
  startup, $30M ARR, growing 120% YoY, 200 employees). The acquisition
  price is $450M (15x revenue).

  You have one shot to convince the board in a 45-minute presentation.
  The board is split:
  - 3 directors support the acquisition (growth thesis believers)
  - 2 directors are against (price too high, integration risk)
  - 2 directors are undecided (need financial justification)

  Board concerns you must address:
  - "Is $450M justified for a $30M ARR company?" (valuation)
  - "How do we integrate 200 AI engineers into our 2,000-person
    engineering org?" (culture/integration)
  - "What if the AI hype cools and this becomes a write-down?"
    (market risk)
  - "Why can't we build this in-house for $50M over 3 years?" (build
    vs. buy)
  - "How does this affect our Q3 earnings guidance?" (financial impact)

  Data for the board presentation:
  - CloudFirst revenue: $250M ARR, growing 20% YoY
  - DataAI revenue: $30M ARR, growing 120% YoY, 90% gross margin
  - Combined platform TAM: $15B (vs CloudFirst standalone TAM: $5B)
  - Build vs buy analysis: Internal build = 3 years + $120M + talent
    acquisition risk. DataAI has 47 patents, 200 ML engineers
  - Synergy model: $80M incremental revenue by Year 3 from cross-sell
  - Integration plan: 18 months, $25M integration budget
  - Comparable acquisitions: Salesforce/Tableau ($15.7B/47x), Adobe/
    Figma ($20B/50x), Cisco/Splunk ($28B/14x)
  - Risk: 3 key DataAI engineers have cliff vesting in 12 months

  Tasks:
  1. Write the complete 15-slide board presentation. For each slide:
     the headline, full content, data visualization approach, and
     speaker notes. Structure must address: strategic rationale →
     market opportunity → financial analysis → integration plan →
     risk mitigation → recommendation. The deck must persuade the
     2 undecided directors while not alienating the 2 opponents.

  2. Write the "Board Q&A Preparation" — the 15 most likely questions
     from board directors, with prepared answers. For each: the
     question, which director type is likely to ask it (supporter,
     opponent, undecided), the prepared answer (under 90 seconds),
     and the backup slide reference. Include the 3 "killer questions"
     that could derail the vote and the strategies to handle them.

  3. Write the "Board Presentation Delivery Plan" — how the CEO should
     present this deck. Include: the pre-meeting lobbying strategy
     (which directors to meet individually before the board meeting),
     the 45-minute time allocation (presentation vs. discussion), the
     "sensing the room" strategy (when to accelerate vs. slow down),
     and the closing move (how to call for the vote at the right
     moment).

assertions:
  - type: llm_judge
    criteria: "Board presentation is persuasive and complete — 15 slides build a compelling acquisition case with strategic rationale, financial analysis, integration plan, and risk mitigation that addresses all board concerns"
    weight: 0.35
    description: "Persuasive complete board presentation"
  - type: llm_judge
    criteria: "Q&A preparation anticipates real challenges — 15 questions map to director types, answers are concise and data-backed, killer questions are identified with mitigation strategies"
    weight: 0.35
    description: "Real-challenge Q&A preparation"
  - type: llm_judge
    criteria: "Delivery plan shows political sophistication — pre-meeting lobbying, time management, room sensing, and vote timing that reflect real board meeting dynamics"
    weight: 0.30
    description: "Politically sophisticated delivery plan"
