meta:
  id: presentation-delivery
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Master pitch deck delivery techniques — go beyond slide content to the verbal, non-verbal, and interactive skills that make presentations compelling"
  tags: [sales, pitch-deck, delivery, presentation, public-speaking, advanced]

state: {}

trigger: |
  You're a sales presentation coach hired by "NetSecure" (network
  security, $90M ARR) to improve their AEs' deck delivery. You've
  observed 20 live sales presentations and identified systemic
  problems.

  Observations from 20 recorded presentations:

  Delivery problems:
  - 85% of AEs read slides word-for-word (zero eye contact)
  - Average speaking pace: 180 words/minute (ideal: 130-150)
  - 12 of 20 AEs never paused between slides (no breathing room)
  - Only 3 of 20 asked the prospect a question during the deck
  - 17 of 20 rushed through the last 3 slides when time ran short
  - None used silence strategically (no "let that sink in" moments)

  Engagement problems:
  - Average prospect talk time: 8% (ideal: 30-40% during deck)
  - Prospects checked phones on average 4 times per presentation
  - Questions from prospects averaged 1.2 per presentation (low)
  - 90% of AEs said "Does that make sense?" instead of real questions

  Best performer analysis (Sarah, top AE, 42% win rate):
  - Speaks at 135 words/minute
  - Pauses 3-5 seconds between key points
  - Asks 4-5 questions during the deck
  - Makes prospect talk 35% of the time
  - Covers only 8 of 12 slides (skips based on conversation)
  - Uses "power phrases" like "What that means for your team is..."
  - Always starts with a relevant insight, not the first slide

  Tasks:
  1. Write the "Presentation Delivery Playbook" — the complete guide
     to delivering a sales deck effectively. Cover: pacing and pausing
     (when to slow down, when to pause for 3 seconds), slide-by-slide
     speaker notes format (what to say vs. what's on the slide),
     engagement techniques (questions to embed, when to go off-script),
     the "conversational" delivery method (deck as a conversation
     framework, not a script), and the 10/20/30 timing framework.

  2. Write the "Presentation Skills Assessment Rubric" — a scoring
     tool for evaluating deck delivery. Include 10 criteria: eye
     contact, pacing, pausing, question asking, prospect engagement,
     slide navigation (skipping/adapting), energy/enthusiasm, handling
     interruptions, closing strength, and time management. Each
     criterion: description, scoring (1-5), and coaching notes for
     improvement.

  3. Write the "Delivery Practice Program" — a 4-week training plan
     for AEs. Include: Week 1 (pacing and pausing exercises), Week 2
     (engagement and questioning), Week 3 (adaptive presenting —
     skipping slides, going non-linear), Week 4 (full mock presentations
     with scoring). Each week: the specific exercises, practice
     recordings to review, and peer coaching format.

assertions:
  - type: llm_judge
    criteria: "Delivery playbook transforms reading into presenting — specific techniques for pacing, pausing, questioning, and conversational delivery that address the observed problems"
    weight: 0.35
    description: "Reading-to-presenting transformation"
  - type: llm_judge
    criteria: "Assessment rubric is fair and useful — 10 criteria with clear 1-5 scoring, practical coaching notes, and measures that distinguish great delivery from mediocre"
    weight: 0.30
    description: "Fair useful assessment rubric"
  - type: llm_judge
    criteria: "Practice program builds skills progressively — 4 weeks of specific exercises that address real delivery problems, with practice format and peer coaching that drive improvement"
    weight: 0.35
    description: "Progressive skills practice program"
