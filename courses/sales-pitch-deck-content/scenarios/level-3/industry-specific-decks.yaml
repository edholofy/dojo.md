meta:
  id: industry-specific-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Build industry-specific pitch deck variants — adapt a horizontal platform's deck for healthcare, financial services, manufacturing, and government verticals"
  tags: [sales, pitch-deck, industry, vertical, healthcare, fintech, advanced]

state: {}

trigger: |
  You're the VP of Industry Marketing at "DataPlatform" (enterprise
  data analytics platform, $120M ARR). DataPlatform sells across 6
  industries, but the sales team uses one generic deck for all of them.
  Win rate varies dramatically by industry:

  Win rates by industry (with generic deck):
  - Technology: 32% (familiar with analytics concepts)
  - Financial Services: 24% (heavy compliance requirements)
  - Healthcare: 18% (HIPAA sensitivity, risk-averse buyers)
  - Manufacturing: 15% (skeptical of "cloud" and "AI" terms)
  - Government: 12% (procurement complexity, security clearance)
  - Retail: 28% (data-hungry, faster decisions)

  Industry-specific knowledge:
  - Healthcare: HIPAA compliance required, data residency matters,
    clinical vs operational analytics distinction, IRB approval for
    research use, Epic/Cerner integration critical
  - Financial Services: SOX compliance, real-time fraud detection use
    case, regulatory reporting (Basel III, DORA), data lineage required
    for auditors, bank secrecy act considerations
  - Manufacturing: OT/IT convergence, predictive maintenance use case,
    supply chain visibility, MES/SCADA integration, shop floor data
    collection, skepticism of "AI" buzzword
  - Government: FedRAMP authorization, FOIA considerations, GSA
    schedule pricing, ATO (Authority to Operate) process, citizen
    privacy, multi-year budget cycles

  Tasks:
  1. Create deck adaptation plans for Healthcare and Financial Services.
     For each industry: identify which 4-5 slides need major changes,
     write the adapted content for those slides, add 1-2 industry-
     specific slides (compliance, use cases), and specify the industry
     language changes (terminology swaps, jargon to use/avoid).

  2. Write the "Industry Deck Adaptation Framework" — the reusable
     process for creating vertical variants from a horizontal deck.
     Include: the discovery research process (what to learn about each
     industry), the 5 elements that always change (problem framing,
     proof points, compliance, language, use cases), the elements that
     stay the same (product architecture, company overview), and the
     quality assurance process (industry expert review).

  3. Write the "Industry Language Guide" — a terminology reference
     for 4 industries. For each: the 10 terms to always use (builds
     credibility), the 10 terms to never use (destroys credibility),
     the buyer titles and their priorities, and the typical objections
     unique to that industry. Cover healthcare, financial services,
     manufacturing, and government.

assertions:
  - type: llm_judge
    criteria: "Healthcare and fintech adaptations are genuinely industry-specific — adapted slides use correct terminology, address real compliance requirements, reference actual industry systems, and include credible use cases"
    weight: 0.35
    description: "Genuinely industry-specific adaptations"
  - type: llm_judge
    criteria: "Adaptation framework is reusable — provides a process any company can follow to verticalize a horizontal deck, with clear guidance on what changes, what stays, and how to validate"
    weight: 0.30
    description: "Reusable adaptation framework"
  - type: llm_judge
    criteria: "Language guide builds credibility — industry-specific terms to use/avoid, buyer titles with priorities, and unique objections that help reps sound like insiders, not outsiders"
    weight: 0.35
    description: "Credibility-building language guide"
