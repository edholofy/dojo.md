meta:
  id: multi-stakeholder-decks
  level: 3
  course: sales-pitch-deck-content
  type: output
  description: "Design decks for multi-stakeholder buying committees — create presentations that resonate with 5+ decision-makers in the room simultaneously"
  tags: [sales, pitch-deck, multi-stakeholder, committee, enterprise, advanced]

state: {}

trigger: |
  You're a senior AE at "IntegrateHQ" (enterprise integration platform,
  $95M ARR). You've landed the final presentation meeting with "Global
  Logistics Corp" — a $2B logistics company evaluating a $400K deal.
  The meeting has 7 people in the room, each with different priorities
  and veto power.

  The buying committee:
  1. Sarah (CTO) — Decision maker. Cares about: technical architecture,
     security, scalability. Skeptical of vendors who oversimplify.
  2. Marcus (CFO) — Budget approver. Cares about: ROI, payback period,
     cost comparison. Will ask "what if we delay 6 months?"
  3. Lisa (VP Operations) — Primary champion. Already sold on you.
     Needs you to convince the others. Cares about: operational
     efficiency, time savings.
  4. David (VP IT) — Technical evaluator. Cares about: integration
     complexity, migration plan, support SLA. Worried about burden
     on his 12-person team.
  5. Rachel (CISO) — Security veto. Will kill the deal if security
     isn't addressed. Cares about: SOC 2, penetration test results,
     data residency, access controls.
  6. Tom (Procurement) — Contract negotiator. Looking for leverage.
     Cares about: pricing transparency, contract terms, vendor
     stability.
  7. Jennifer (End User Manager) — Team lead who'll use it daily.
     Cares about: ease of use, training, day-to-day workflow impact.

  IntegrateHQ for Global Logistics:
  - $400K/year for enterprise tier
  - 3-month implementation with dedicated team
  - 24/7 support with 15-min SLA
  - SOC 2 Type II, ISO 27001, HIPAA
  - Customer: FedEx saved $3.2M/year, DHL reduced integration time 70%
  - ROI: 4.2x in year 1 for similar-size logistics companies

  Tasks:
  1. Design the 12-slide presentation for this 7-person room. For each
     slide: identify the primary audience (which 1-2 people this slide
     is for), the secondary value (what others in the room get from it),
     the potential interruption (who might ask a question and what),
     and the speaker notes. The deck must flow as a story while having
     something for everyone.

  2. Write the "Stakeholder Engagement Map" — a pre-meeting planning
     tool. For each of the 7 stakeholders: their likely concerns, their
     potential objections, the key slide(s) that address them, the proof
     point that matters most to them, and the "meeting within the
     meeting" strategy (how to make each person feel the deck was
     built for them).

  3. Write the "Room Reading Guide" — how to adapt the presentation
     in real-time based on committee dynamics. Include: how to read
     body language for engagement/disengagement, when to pivot from
     prepared slides to Q&A, how to handle conflicting stakeholder
     priorities (CTO wants depth, CFO wants speed), the "turn to the
     quiet person" technique, and how to identify the real decision
     maker (it's not always the most senior person).

assertions:
  - type: llm_judge
    criteria: "12-slide deck serves all 7 stakeholders — each slide identifies primary audience and secondary value, with realistic interruption predictions and speaker notes that manage multi-stakeholder dynamics"
    weight: 0.35
    description: "All-stakeholder serving deck"
  - type: llm_judge
    criteria: "Stakeholder engagement map is thorough — each of 7 stakeholders has mapped concerns, objections, key slides, proof points, and individual engagement strategy"
    weight: 0.35
    description: "Thorough stakeholder engagement map"
  - type: llm_judge
    criteria: "Room reading guide addresses real dynamics — body language reading, real-time pivoting, conflicting priorities, quiet-person engagement, and real decision-maker identification"
    weight: 0.30
    description: "Real-dynamics room reading"
