meta:
  id: deck-economics-model
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Build the economics model for pitch deck effectiveness — quantify the revenue impact of presentation quality across an entire sales organization"
  tags: [sales, pitch-deck, economics, revenue-impact, modeling, quantification, master]

state: {}

trigger: |
  You're a Revenue Analytics researcher who has been commissioned to
  write the definitive analysis on "The Economics of Sales Presentations."
  Your research spans 50 B2B SaaS companies with $50M-$5B in revenue.

  Research data set:
  - 50 companies, 12,000 total AEs
  - 180,000 deals analyzed over 3 years
  - Deck analytics from DocSend, Highspot, Seismic, and Showpad
  - Conversation intelligence from Gong and Chorus
  - CRM data from Salesforce
  - Win/loss analysis from 8,400 interviews

  Key findings (your research):
  1. Deck Quality Score (1-100) correlates with win rate:
     - Score 80+: 34% win rate
     - Score 60-79: 25% win rate
     - Score 40-59: 18% win rate
     - Score below 40: 11% win rate
  2. Companies that update decks monthly: 27% avg win rate
     Companies that update quarterly: 22% avg win rate
     Companies that update annually: 17% avg win rate
  3. Personalized decks (prospect-specific): 31% win rate
     Semi-personalized (industry-specific): 24% win rate
     Generic decks: 18% win rate
  4. AEs who complete presentation training: 29% win rate
     AEs without training: 20% win rate
  5. Companies with deck analytics: 26% avg win rate
     Companies without: 20% avg win rate
  6. Average cost to create one enterprise deck: $2,800
     Average cost per slide change: $180
     Average annual deck budget per AE: $1,400
  7. Revenue impact model: A 1-percentage-point increase in competitive
     win rate = $X in additional revenue (varies by company pipeline)

  Tasks:
  1. Write the "Sales Presentation Economics Model" — the complete
     quantitative framework for measuring deck ROI. Include: the input
     variables (pipeline, deal size, win rate, deck cost), the
     calculation methodology (how deck investment translates to revenue
     impact), the sensitivity analysis (which variables matter most),
     the benchmark tables (by company size, industry, deal complexity),
     and a worked example for a $200M ARR company with 300 AEs.

  2. Write the "Investment Optimization Framework" — where companies
     should invest their deck budget for maximum ROI. Using the research
     data, rank the 5 investment areas by impact: deck content quality,
     update frequency, personalization capability, presentation training,
     and analytics platform. For each: the investment required, the
     expected win rate improvement, the revenue impact, and the ROI.
     Include the "diminishing returns" curve (where additional investment
     stops producing proportional returns).

  3. Write the "Board-Ready Presentation Economics Brief" — a 3-page
     executive document that any CRO could present to their board to
     justify deck investment. Include: the research headline (what the
     data shows), the company-specific impact (fill-in-the-blank
     model), the investment recommendation, and the measurement plan.
     Write it as a polished, data-driven document.

assertions:
  - type: llm_judge
    criteria: "Economics model is quantitatively rigorous — complete framework with input variables, calculation methodology, sensitivity analysis, benchmarks, and worked example that produces specific dollar amounts"
    weight: 0.35
    description: "Quantitatively rigorous economics model"
  - type: llm_judge
    criteria: "Investment optimization ranks by data — 5 investment areas ranked by ROI using research findings, with diminishing returns analysis that helps companies allocate budget optimally"
    weight: 0.35
    description: "Data-ranked investment optimization"
  - type: llm_judge
    criteria: "Board-ready brief is polished and compelling — 3-page document with research headline, customizable impact model, investment recommendation, and measurement plan worthy of board presentation"
    weight: 0.30
    description: "Polished board-ready brief"
