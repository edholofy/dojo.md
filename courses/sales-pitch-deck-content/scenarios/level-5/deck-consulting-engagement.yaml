meta:
  id: deck-consulting-engagement
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Run a pitch deck consulting engagement — lead a $500K transformation of a Fortune 500 company's entire presentation strategy across sales, marketing, and executive communications"
  tags: [sales, pitch-deck, consulting, transformation, Fortune-500, master]

state: {}

trigger: |
  You're a Managing Partner at a top sales enablement consultancy.
  "GlobalTech" (Fortune 200 technology company, $8B revenue, 5,000
  sales reps, 40 countries) has hired you for a $500K, 6-month
  engagement to transform their presentation strategy.

  The CEO's brief: "Our decks are our #1 sales tool and our #1 sales
  problem. We spend $3M/year on deck creation. Win rates are declining.
  Reps don't use our materials. Customers say our presentations are
  'corporate and forgettable.' Fix it."

  Discovery findings (Month 1 diagnostic):
  - 3,200 deck files across the organization (no central management)
  - 14 teams create decks independently (product marketing, sales
    enablement, executive comms, regional marketing, partner marketing,
    customer success, corporate comms, IR, HR, field marketing, events,
    channel, alliances, and the CEO's office)
  - Average deck creation time: 23 hours
  - Deck adoption rate: 28% (72% of reps modify or ignore decks)
  - Customer feedback: "Your presentations look like every other
    enterprise software company"
  - Win rate with standard deck: 21% (declining from 28% 3 years ago)
  - Win rate with top-performer custom decks: 34%
  - No deck analytics platform
  - No standardized design system for presentations
  - Competitive win/loss shows "better presentation" cited in 15% of
    wins at competitors

  Tasks:
  1. Write the "Presentation Transformation Strategy" — the complete
     6-month engagement plan. Include: the 5 workstreams (strategy,
     content, design, enablement, analytics), the phased approach
     (Month 1-2: Foundation, Month 3-4: Build, Month 5-6: Launch),
     the team structure (who from your consultancy + who from
     GlobalTech), the deliverables per workstream per phase, the
     budget allocation ($500K across workstreams), and the success
     metrics (KPIs measured at Month 3 and Month 6).

  2. Write the "Diagnostic Report and Recommendations" — the Month 1
     deliverable to the CEO. Include: the current state assessment
     (key findings from the diagnostic, quantified), the root cause
     analysis (why decks are underperforming — 5 root causes), the
     maturity assessment (where GlobalTech falls on a presentation
     maturity model), the benchmark comparison (vs. industry best
     practices), and the 10 prioritized recommendations with expected
     impact and effort for each.

  3. Write the "Engagement Value Proof" — the business case that
     justifies the $500K investment and secures the CEO's continued
     sponsorship. Calculate: the revenue impact of improving deck
     effectiveness (from 21% win rate to 28% on $8B pipeline), the
     efficiency savings (reducing 23-hour creation time by 60%), the
     brand impact (quantified customer perception improvement), and
     the competitive advantage (closing the "better presentation"
     gap). Present as a formal ROI analysis.

assertions:
  - type: llm_judge
    criteria: "Transformation strategy is consultant-grade — 5 workstreams, phased approach, team structure, deliverables, budget allocation, and success metrics that justify a $500K engagement"
    weight: 0.35
    description: "Consultant-grade transformation strategy"
  - type: llm_judge
    criteria: "Diagnostic report is executive-ready — quantified current state, root cause analysis, maturity assessment, benchmarks, and prioritized recommendations that a Fortune 200 CEO would respect"
    weight: 0.35
    description: "Executive-ready diagnostic report"
  - type: llm_judge
    criteria: "Value proof justifies the investment — specific revenue impact, efficiency savings, brand impact, and competitive advantage calculations that prove ROI on $500K"
    weight: 0.30
    description: "Investment-justifying value proof"
