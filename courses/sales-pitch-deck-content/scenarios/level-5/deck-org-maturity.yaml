meta:
  id: deck-org-maturity
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Design a presentation maturity model — create the definitive framework for assessing and advancing an organization's presentation capabilities from ad-hoc to world-class"
  tags: [sales, pitch-deck, maturity-model, assessment, organizational, excellence, master]

state: {}

trigger: |
  You're the founder of a sales enablement consulting firm. Your most
  requested framework is the "Presentation Maturity Model" (PMM) — an
  assessment tool that helps organizations understand their current
  presentation capabilities and build a roadmap to excellence.

  You've assessed 200+ B2B companies and identified 5 maturity levels
  across 8 capability dimensions. Your task is to codify this into a
  comprehensive, publishable framework.

  The 5 maturity levels (high-level):
  1. Ad Hoc: No standards. Everyone builds their own decks.
  2. Standardized: Template exists, some consistency, minimal training.
  3. Managed: Central team, analytics, regular updates, enablement.
  4. Optimized: Data-driven, A/B tested, personalized, measured impact.
  5. World-Class: AI-powered, adaptive, integrated into revenue ops,
     competitive advantage.

  The 8 capability dimensions:
  1. Content Strategy: How deck content is planned and created
  2. Design Quality: Visual consistency, brand alignment, accessibility
  3. Personalization: Ability to customize for audience/context
  4. Enablement: Training, certification, ongoing coaching
  5. Analytics: Measurement of deck usage, engagement, and impact
  6. Technology: Tools and platforms for deck creation and management
  7. Governance: Version control, compliance, approval workflows
  8. Innovation: Adoption of emerging formats and technologies

  Benchmark data from your 200 assessments:
  - Average maturity score: 2.1 (between Standardized and Managed)
  - Top 10% of companies: 3.8+ (Optimized)
  - Correlation: Companies at Level 4+ have 34% higher win rates
  - Most neglected dimension: Analytics (avg 1.6)
  - Strongest dimension: Design Quality (avg 2.8)

  Tasks:
  1. Write the complete "Presentation Maturity Model" — a 5×8 matrix
     that defines what each maturity level looks like across all 8
     capability dimensions. For each cell: the description (what it
     looks like), the key indicators (how to assess), and the evidence
     required (what to look for in an audit). This should be detailed
     enough for a consultant to use in a client assessment.

  2. Write the "PMM Assessment Guide" — how to conduct a presentation
     maturity assessment. Include: the assessment methodology (interviews,
     content audit, analytics review, rep survey), the scoring rubric
     (how to rate each dimension), the report template (how to present
     findings), and the benchmark comparison (how to contextualize
     results against the 200-company dataset). Include the assessment
     questionnaire (30 questions, 6 per category for the top 5
     dimensions).

  3. Write the "Maturity Advancement Playbook" — for each level
     transition (1→2, 2→3, 3→4, 4→5), write: the prerequisite
     capabilities, the key initiatives to reach the next level, the
     typical timeline, the investment required, the organizational
     changes needed, and the common obstacles. Include the "quick
     assessment" tool — 10 questions an organization can answer in 5
     minutes to estimate their current level.

assertions:
  - type: llm_judge
    criteria: "5×8 maturity matrix is comprehensive — each cell has description, indicators, and evidence across all 40 intersections, detailed enough for consultant use in client assessments"
    weight: 0.35
    description: "Comprehensive maturity matrix"
  - type: llm_judge
    criteria: "Assessment guide is methodologically sound — interview methodology, scoring rubric, report template, benchmarking, and 30-question assessment that produce reliable, repeatable results"
    weight: 0.35
    description: "Methodologically sound assessment"
  - type: llm_judge
    criteria: "Advancement playbook provides clear paths — each level transition has prerequisites, initiatives, timeline, investment, changes, and obstacles, plus a quick 10-question self-assessment"
    weight: 0.30
    description: "Clear advancement paths"
