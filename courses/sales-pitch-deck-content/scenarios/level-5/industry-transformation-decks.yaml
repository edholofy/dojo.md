meta:
  id: industry-transformation-decks
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Create decks for industry transformation moments — design presentations for companies navigating existential market shifts where the old pitch no longer applies"
  tags: [sales, pitch-deck, transformation, disruption, industry-shift, existential, master]

state: {}

trigger: |
  You're a strategic communications consultant specializing in
  companies facing existential market transformations. Three clients
  are in crisis — their industries are being disrupted and their
  existing pitch decks are now irrelevant.

  Client 1 — "FinanceFlow" (traditional financial software, $300M ARR):
  Disruption: DeFi and blockchain are eliminating the need for
  traditional financial intermediary software. Their core product
  (payment processing middleware) is being replaced by smart contracts.
  Revenue declining 8% YoY. They need a deck that repositions them
  from "payment processing" to "financial orchestration" — managing
  both traditional and crypto payments.
  Challenge: 80% of their customers don't use crypto yet. How do you
  pitch the future without alienating the present?

  Client 2 — "AdTech Prime" (digital advertising platform, $200M ARR):
  Disruption: Privacy regulations (GDPR, CCPA, iOS 17+), cookie
  deprecation, and AI-generated content are destroying the traditional
  ad tech model. Third-party data is gone. Their targeting accuracy
  has dropped from 78% to 45%. They need a deck that repositions from
  "targeted advertising" to "privacy-first audience intelligence."
  Challenge: Buyers are skeptical that any ad tech company can solve
  privacy AND performance. The entire category has a trust problem.

  Client 3 — "AutoDrive" (fleet management software, $150M ARR):
  Disruption: Autonomous vehicles will eliminate 60% of their use case
  (driver management, routing optimization, safety monitoring). Timeline:
  5-10 years. They need a deck that positions them for the autonomous
  future while selling to customers who still have human drivers.
  Challenge: If they talk about autonomous vehicles, customers think
  "this company isn't focused on my current problems." If they don't,
  they look like they'll be disrupted.

  Tasks:
  1. For each client, write the strategic repositioning narrative —
     the story that bridges from their current identity to their
     future identity. Include: the "burning platform" (why the old
     positioning fails), the "bridge narrative" (how to honor the
     present while pointing to the future), the "new category" they're
     creating, and the timeline story (what to say now vs. in 12
     months vs. in 3 years). Then write the 3 most critical deck
     slides for each client.

  2. Write the "Disruption Deck Framework" — the methodology for
     building presentations during industry transformation. Include:
     the "Acknowledge-Bridge-Lead" structure (acknowledge the current
     reality, bridge to the shift, lead to the new category), the
     customer segmentation approach (which customers hear which message),
     the competitive positioning strategy (when the competition is the
     old way of doing things, not a company), and the investor/board
     narrative (how transformation decks differ for different audiences).

  3. Write the "Transformation Communication Playbook" — how to manage
     the messaging transition over 18 months. Include: Month 1-6
     (introduce the transformation narrative alongside existing pitch),
     Month 7-12 (shift primary narrative to new positioning, legacy
     as secondary), Month 13-18 (complete transition, legacy customers
     on maintenance narrative). For each phase: the deck changes, the
     sales training required, the customer communication, and the
     market response metrics.

assertions:
  - type: llm_judge
    criteria: "Three repositioning narratives are strategic and authentic — each bridges present to future with burning platform, bridge narrative, new category, and timeline that feels credible, not forced"
    weight: 0.35
    description: "Strategic authentic repositioning"
  - type: llm_judge
    criteria: "Disruption deck framework is methodologically sound — Acknowledge-Bridge-Lead structure, customer segmentation, competitive positioning, and audience adaptation that applies to any disruption"
    weight: 0.30
    description: "Methodologically sound disruption framework"
  - type: llm_judge
    criteria: "18-month playbook manages the transition — phased approach with specific deck changes, training, customer communication, and metrics that don't alienate existing customers while building future positioning"
    weight: 0.35
    description: "Transition-managing 18-month playbook"
