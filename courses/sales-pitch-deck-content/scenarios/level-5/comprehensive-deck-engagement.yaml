meta:
  id: comprehensive-deck-engagement
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Comprehensive capstone — design, implement, and measure a complete pitch deck transformation for a global organization with declining win rates"
  tags: [sales, pitch-deck, capstone, comprehensive, transformation, master]

state: {}

trigger: |
  You're the newly appointed Chief Revenue Officer at "OmniTech"
  (enterprise software platform, $900M ARR, 2,500 sales reps, 30
  countries). Your predecessor was fired because the company's
  competitive win rate has declined from 32% to 19% over 3 years.
  Win/loss analysis reveals that "quality of sales presentation" is
  the #2 reason for competitive losses (after pricing).

  Your 90-day diagnostic:
  - 2,500 reps across 5 segments: SMB, Mid-Market, Enterprise,
    Strategic, Channel/Partner
  - 30 countries, 12 languages
  - 6 product lines, each with independent marketing teams
  - Current deck inventory: 1,200+ variants (unmanaged)
  - Deck adoption rate: 22% (78% use old or custom decks)
  - Average deck age: 9 months (oldest in rotation: 3 years)
  - No presentation analytics platform
  - No deck governance or version control
  - No presentation training or certification
  - Customer feedback: "Your presentations are generic, too long,
    and don't address our specific challenges"
  - Competitor comparison: Top competitor invested $3M in
    "presentation excellence" program 2 years ago; their win rate
    increased from 25% to 33%

  Budget: $3M over 2 years ($1.5M/year)
  Board mandate: Competitive win rate from 19% to 27% by end of Year 2

  Tasks:
  1. Write the "2-Year Presentation Excellence Strategy":
     a) Year 1: Foundation — deck audit, content strategy, design
        system, technology platform, governance model, core deck
        creation, enablement program launch, analytics baseline
     b) Year 2: Scale — AI personalization, global rollout, advanced
        analytics, certification program, A/B testing, continuous
        optimization, channel/partner enablement
     For each year: key initiatives (with quarterly milestones),
     budget allocation, headcount plan, technology investments, and
     risk factors.

  2. Write the "Business Case for Presentation Excellence" — the
     document that justifies $3M to the board. Use OmniTech's numbers:
     $900M ARR, 19% competitive win rate, $4.5B in competitive
     pipeline, to calculate the revenue impact of improvement and ROI.
     Include: the cost of inaction (what happens if win rate continues
     to decline), the competitive urgency (competitor's $3M investment
     results), the investment breakdown, and the conservative vs.
     realistic ROI scenarios.

  3. Write the "100-Day Quick Wins Plan" — 5 initiatives in the first
     100 days that demonstrate measurable improvement and build
     organizational confidence. Include: the initiative description,
     the expected impact, the resource requirements, and the Day 100
     board update showing progress. The quick wins must be visible
     enough to maintain board support for the 2-year program.

assertions:
  - type: llm_judge
    criteria: "2-year strategy is comprehensive and phased — Year 1 builds foundation without overwhelming, Year 2 scales with AI and global rollout, each with quarterly milestones, budget, headcount, and risk factors"
    weight: 0.35
    description: "Comprehensive phased 2-year strategy"
  - type: llm_judge
    criteria: "Business case is board-compelling — uses OmniTech's numbers to show revenue impact, competitive urgency, cost of inaction, and ROI that justifies $3M investment"
    weight: 0.35
    description: "Board-compelling business case"
  - type: llm_judge
    criteria: "100-day quick wins build confidence — 5 initiatives that produce visible, measurable results with a Day 100 board update showing momentum"
    weight: 0.30
    description: "Confidence-building quick wins"
