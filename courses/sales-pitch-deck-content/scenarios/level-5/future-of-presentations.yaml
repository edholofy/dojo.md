meta:
  id: future-of-presentations
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Envision the future of sales presentations — design a keynote speech on how AI, interactive media, and changing buyer behavior will transform B2B presentations by 2030"
  tags: [sales, pitch-deck, future, AI, innovation, keynote, master]

state: {}

trigger: |
  You've been invited to deliver the closing keynote at SaaStr Annual
  2027 (8,000 attendees, mostly SaaS founders and revenue leaders).
  Topic: "Presentations 2030: What Replaces the Pitch Deck?"

  Your keynote must be provocative but practical — challenge the
  audience's assumptions while giving them a clear roadmap.

  Trends to address:
  1. AI-generated presentations: Tools like Gamma, Tome, and Beautiful.ai
     can generate full decks in seconds. What does this mean when every
     company has AI-generated decks? Does quality equalize?
  2. Buyer self-service: 70% of the B2B buying journey happens before
     talking to sales. Buyers consume content asynchronously. The deck
     they see might never be presented by a human.
  3. Interactive experiences: Digital sales rooms (Aligned, Dock),
     interactive demos (Reprise, Navattic), and personalized microsites
     are replacing static decks.
  4. Video-first selling: Async video (Loom, Vidyard) is replacing
     deck-sharing. A 3-minute personalized video outperforms a
     12-slide deck in engagement.
  5. Multi-modal buying: Committees of 14+ use different formats —
     some want decks, some want videos, some want interactive tools,
     some want white papers. One format can't serve all.
  6. Real-time personalization: AI that knows the prospect's tech
     stack, recent news, funding status, and competitors can generate
     hyper-relevant content in real-time.
  7. Immersive experiences: AR/VR for product visualization, 3D
     interactive models, spatial computing (Apple Vision Pro for
     enterprise presentations).

  Tasks:
  1. Write the 30-minute keynote script (structured for slides +
     speaker delivery). Include: the provocative opening (challenge
     assumptions), the "3 deaths" (3 things that are dying in
     presentations), the "3 births" (3 things replacing them), the
     practical framework (what to do about it), and the closing
     vision (what 2030 looks like). Include stage directions and
     visual cues for slides.

  2. Write the "2030 Presentation Stack" — the technology and content
     strategy for a forward-thinking B2B company. Include: the content
     architecture (modular, multi-format, AI-enhanced), the technology
     stack (specific tools for each layer), the team structure (who
     builds this), the measurement framework (how to evaluate
     effectiveness across formats), and the transition plan (how to
     get from today's decks to 2030's adaptive experiences).

  3. Write the "Audience Action Guide" — the handout attendees receive
     after the keynote. Include: the "3 things to do Monday morning"
     (immediate actions), the "3 experiments to run this quarter"
     (pilot projects), the "assessment tool" (10 questions to evaluate
     readiness), and the "resource list" (tools, books, communities
     for staying current). This should be practical enough that a CRO
     could hand it to their team.

assertions:
  - type: llm_judge
    criteria: "Keynote is audience-captivating — provocative opening, clear 3-deaths/3-births structure, practical framework, and inspiring vision with stage directions suitable for SaaStr 8,000-person venue"
    weight: 0.35
    description: "Audience-captivating keynote"
  - type: llm_judge
    criteria: "2030 presentation stack is forward-thinking but grounded — modular architecture, specific tools, team structure, and transition plan that's visionary without being science fiction"
    weight: 0.35
    description: "Grounded forward-thinking stack"
  - type: llm_judge
    criteria: "Action guide is immediately useful — Monday-morning actions, quarterly experiments, readiness assessment, and resources that attendees can execute without further consulting"
    weight: 0.30
    description: "Immediately useful action guide"
