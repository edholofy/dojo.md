meta:
  id: behavioral-science-decks
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Apply behavioral science to pitch deck design — use cognitive psychology, decision science, and persuasion research to create decks that influence buyer behavior ethically"
  tags: [sales, pitch-deck, behavioral-science, psychology, persuasion, ethics, master]

state: {}

trigger: |
  You're a behavioral scientist consulting for enterprise SaaS
  companies on "evidence-based presentation design." You've been asked
  to write the definitive guide on applying cognitive science to pitch
  deck content.

  Your research identifies 8 cognitive principles that determine how
  buyers process pitch decks:

  1. Primacy Effect: Buyers remember the first thing they see. The
     opening slide anchors all subsequent evaluation.
  2. Recency Effect: Buyers also remember the last thing. The closing
     slide determines what they'll recall tomorrow.
  3. Processing Fluency: Simpler presentations feel more trustworthy.
     Complex decks trigger suspicion, not sophistication.
  4. Social Proof: "Others like you chose us" is more persuasive than
     "our product is better." Peer validation > vendor claims.
  5. Loss Aversion: Buyers respond 2-2.5x more strongly to potential
     losses than equivalent gains. "What you'll lose by not acting"
     > "What you'll gain."
  6. Anchoring: The first number a buyer sees becomes the anchor.
     Show the cost of the problem before your price.
  7. Peak-End Rule: Buyers evaluate the entire presentation based on
     the emotional peak and the ending, not the average quality.
  8. Narrative Transportation: When buyers are absorbed in a story,
     they lower their critical defenses. Story-driven decks face less
     scrutiny than data-driven decks.

  Tasks:
  1. For each of the 8 principles, write: the scientific basis (which
     research supports it), how it applies to pitch deck design
     (specific slide design implications), a before/after example
     (how a slide changes when designed with this principle), and the
     ethical boundary (when using this principle crosses from
     persuasion to manipulation).

  2. Create the "Behavioral Deck Template" — a 12-slide deck format
     designed using all 8 principles. For each slide: which principle
     it leverages, why this slide is in this position, the content
     strategy (what to emphasize and de-emphasize), and the emotional
     arc (how the audience should feel). Compare this to a traditional
     deck structure to show the differences.

  3. Write the "Ethics of Persuasive Deck Design" — the guidelines
     for using behavioral science in sales presentations responsibly.
     Include: the 5 ethical principles (transparency, truthfulness,
     respect for autonomy, fair representation, informed consent),
     3 case studies of ethical use (helping buyers see true value)
     vs 3 case studies of unethical use (exploiting biases to mislead),
     and the self-audit checklist (10 questions to evaluate whether
     your deck crosses ethical lines).

assertions:
  - type: llm_judge
    criteria: "8 principles are scientifically grounded — each has research basis, specific deck design implications, before/after examples, and ethical boundaries that show genuine behavioral science knowledge"
    weight: 0.35
    description: "Scientifically grounded principles"
  - type: llm_judge
    criteria: "Behavioral deck template is genuinely different — 12 slides designed using all 8 principles with clear emotional arc, compared to traditional structure showing meaningful differences"
    weight: 0.35
    description: "Genuinely different behavioral template"
  - type: llm_judge
    criteria: "Ethics guide draws clear lines — 5 principles with 3 ethical and 3 unethical case studies that distinguish helping buyers from manipulating them, plus practical self-audit checklist"
    weight: 0.30
    description: "Clear ethical guidelines"
