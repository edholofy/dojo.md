meta:
  id: deck-thought-leadership
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Write thought leadership on the future of sales presentations — author a provocative chapter for a business book on why traditional pitch decks are dying and what replaces them"
  tags: [sales, pitch-deck, thought-leadership, future, innovation, publishing, master]

state: {}

trigger: |
  You've been invited to write a chapter for "The Future of B2B Sales"
  (Harvard Business Publishing, 2027). Your chapter title: "The Death
  of the Pitch Deck: Why Slides Are Failing and What Replaces Them."

  Your thesis: The traditional linear slide deck — created in
  PowerPoint, presented in sequence, emailed as a PDF — is a relic
  of 1990s sales methodology being used in a 2026 buying environment.
  It's failing because:

  1. Buying committees (14+ stakeholders) can't be served by one linear
     presentation. Different people need different content at different
     times.
  2. AI is making generic decks obvious. Buyers know when content is
     templated. They expect personalization that feels bespoke.
  3. The "asynchronous deck" (shared via email, read without presenter)
     now accounts for 60% of deck consumption, but decks are still
     designed for live presentation.
  4. Interactive content (ROI calculators, product configurators, video
     testimonials) outperforms static slides by 3x in engagement.
  5. The attention span for slides has halved in 10 years. The average
     buyer reads a deck for 2 minutes 18 seconds.

  The emerging alternatives:
  - Interactive microsites (Reprise, Navattic, Tourial)
  - Personalized video messages (Vidyard, Loom)
  - Digital sales rooms (Aligned, Dock, Highspot)
  - AI-generated adaptive content
  - "Living documents" that update in real-time
  - Conversational selling (no slides, pure dialogue)

  Tasks:
  1. Write the chapter (3,000-4,000 words). Structure: the historical
     context (how we got here), the current crisis (5 reasons decks
     are failing with data), the emerging alternatives (what's replacing
     decks), the transition framework (how companies should evolve
     their presentation strategy), and the prediction (what B2B
     presentations look like in 2030). This should be provocative but
     balanced — acknowledge that decks won't fully disappear.

  2. Write the "Presentation Evolution Maturity Model" — a 5-level
     framework companies can use to assess where they are and where
     they need to go:
     Level 1: Static slides (PowerPoint, emailed as PDF)
     Level 2: Branded decks (consistent design, but still linear)
     Level 3: Analytics-driven decks (tracked, measured, optimized)
     Level 4: Interactive presentations (calculators, video, dynamic)
     Level 5: Adaptive experiences (AI-personalized, multi-format,
     real-time). For each level: description, characteristics,
     technology requirements, and the catalyst to move to the next.

  3. Write the "CRO's Guide to Presentation Innovation" — the
     practical memo for revenue leaders on how to modernize their
     presentation strategy. Include: the 90-day quick wins (what to
     change immediately), the 1-year transformation plan, the technology
     evaluation criteria, the organizational change required, and the
     investment framework. This should be actionable, not academic.

assertions:
  - type: llm_judge
    criteria: "Chapter is publication-quality — 3,000-4,000 words with historical context, data-supported crisis analysis, balanced evaluation of alternatives, transition framework, and forward-looking predictions"
    weight: 0.35
    description: "Publication-quality chapter"
  - type: llm_judge
    criteria: "Maturity model is usable — 5 clear levels with descriptions, characteristics, technology requirements, and transition catalysts that companies can use for self-assessment"
    weight: 0.30
    description: "Usable maturity model"
  - type: llm_judge
    criteria: "CRO guide is practical — 90-day quick wins, 1-year plan, technology criteria, organizational change, and investment framework that a revenue leader could execute"
    weight: 0.35
    description: "Practical CRO guide"
