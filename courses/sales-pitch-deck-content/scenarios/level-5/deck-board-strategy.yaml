meta:
  id: deck-board-strategy
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Present a deck strategy transformation to the board — build the business case for a $2M investment in presentation excellence and defend it against skeptical board members"
  tags: [sales, pitch-deck, board, investment, strategy, transformation, master]

state: {}

trigger: |
  You're the CRO of "MetaScale" ($1.2B ARR, 3,000 sales reps, public
  company). You're presenting to the board a $2M/year investment in
  "Presentation Excellence" — a comprehensive program to transform how
  MetaScale's sales team presents. The board is skeptical: "You want
  $2M for... better slides?"

  The business case data:
  - MetaScale's competitive win rate: 23% (industry top quartile: 30%)
  - $4.8B in annual competitive pipeline
  - Win rate improvement from 23% to 30% = $336M in additional revenue
  - Current presentation investment: $400K/year (0.003% of revenue)
  - Proposed investment: $2M/year (0.017% of revenue)
  - Gong analysis: "Quality of presentation" cited as factor in 28%
    of competitive losses
  - Customer survey: 34% of buyers say MetaScale's presentations are
    "worse than competitors"
  - Internal survey: 67% of AEs say "our decks don't help me win"

  The $2M investment breakdown:
  - Presentation technology platform: $400K/year
  - AI personalization tools: $300K/year
  - Design team (3 FTEs): $450K/year
  - Enablement & training: $350K/year
  - Analytics & measurement: $200K/year
  - Content creation: $300K/year

  Board member profiles:
  - Chair (former CEO): "Everything should be measured by revenue impact"
  - Finance committee chair: "What's the payback period?"
  - Technology director: "Is this an AI play?"
  - Sales expert director: "Will this actually change AE behavior?"
  - New director (former CMO): "Finally someone talking about brand
    in sales materials"

  Tasks:
  1. Write the complete 12-slide board presentation. For each slide:
     full content with data visualization approach and speaker notes.
     Structure: the competitive gap (data showing presentation quality
     as competitive disadvantage) → the opportunity (revenue impact
     model) → the investment plan ($2M breakdown with ROI) → the
     implementation approach (phased, measurable) → the risk
     mitigation → the ask.

  2. Write the "Board Q&A Guide" — 20 anticipated questions from the
     5 board members (4 per member based on their profile), with
     data-backed answers under 90 seconds each. Include 3 "hostile
     questions" (designed to kill the proposal) with defusing
     strategies.

  3. Write the "Success Metrics Dashboard" — the quarterly report the
     board will receive to track the investment's impact. Include: the
     5 leading indicators (measured monthly — deck adoption, training
     completion, personalization rate, analytics usage, content
     freshness), the 3 lagging indicators (measured quarterly — win
     rate change, competitive displacement rate, deal velocity), and
     the 2 strategic indicators (measured annually — customer perception,
     competitive benchmarking). Design the dashboard layout with
     specific metric definitions and targets.

assertions:
  - type: llm_judge
    criteria: "Board presentation makes the case compellingly — 12 slides with competitive gap data, revenue impact model, ROI analysis, phased implementation, and risk mitigation that justify $2M investment"
    weight: 0.35
    description: "Compelling board presentation"
  - type: llm_judge
    criteria: "Q&A guide anticipates real board challenges — 20 questions mapped to board member profiles, with data-backed answers, including 3 hostile questions with defusing strategies"
    weight: 0.35
    description: "Real-challenge Q&A anticipation"
  - type: llm_judge
    criteria: "Success metrics dashboard is governable — leading, lagging, and strategic indicators with targets and measurement frequency that gives the board confidence in tracking the investment"
    weight: 0.30
    description: "Governable success metrics"
