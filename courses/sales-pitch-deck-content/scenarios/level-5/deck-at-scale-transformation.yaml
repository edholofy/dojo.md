meta:
  id: deck-at-scale-transformation
  level: 5
  course: sales-pitch-deck-content
  type: output
  description: "Lead a post-acquisition presentation unification — merge the deck strategies of two companies with 5,000 combined sales reps into one coherent presentation ecosystem"
  tags: [sales, pitch-deck, acquisition, unification, scale, integration, master]

state: {}

trigger: |
  You're the Chief Revenue Officer of "TechMerge" — the newly combined
  company formed when "AlphaCloud" ($1.5B ARR, enterprise cloud
  platform, 3,000 sales reps) acquired "BetaAI" ($400M ARR, AI/ML
  platform, 2,000 sales reps) for $6B.

  The presentation chaos:
  - AlphaCloud decks: 450 variants, professional design system, mature
    governance, data-driven analytics. Problem: corporate, rigid, and
    "enterprise boring."
  - BetaAI decks: 180 variants, startup aesthetic, minimal governance,
    no analytics. Problem: inconsistent, outdated, but "exciting and
    innovative."
  - Combined: 5,000 reps, 630 deck variants, 2 completely different
    brand identities, 2 different content management systems
  - Customers are confused: "Are you AlphaCloud or BetaAI? Your teams
    show different decks that contradict each other."
  - Cross-sell opportunity: $800M in cross-sell pipeline depends on
    presenting the combined platform coherently

  The integration constraints:
  - New brand identity won't be ready for 6 months ("TechMerge" brand)
  - Both companies have active customers who need continuity
  - 2,000 BetaAI reps need to learn AlphaCloud products (and vice versa)
  - Q1 board meeting (3 months) needs to show cross-sell progress
  - Competitive threat: Salesforce and Microsoft are targeting confused
    TechMerge customers

  Cultural dynamics:
  - AlphaCloud culture: Process-driven, slides reviewed by committee,
    brand police active. Reps feel constrained.
  - BetaAI culture: Move fast, every rep is their own marketer, minimal
    oversight. Reps feel creative.
  - Tension: AlphaCloud sees BetaAI as "chaotic." BetaAI sees
    AlphaCloud as "bureaucratic."

  Tasks:
  1. Write the "Presentation Integration Strategy" — the 12-month plan
     to unify 630 deck variants into one coherent system. Include: the
     3 phases (Month 1-3: Bridge, Month 4-8: Build, Month 9-12: Launch),
     the content strategy per phase (what decks exist and how they
     evolve), the technology consolidation plan (one platform from two),
     the governance model (balancing AlphaCloud's rigor with BetaAI's
     creativity), and the cross-sell deck strategy (how to present the
     combined platform before the new brand is ready).

  2. Write the "Day 1 Presentation Kit" — the immediate materials
     needed on acquisition close day. Include: the "combined value
     proposition" slide (why 1+1=3), the "customer reassurance" slide
     (for existing customers worried about the change), the "cross-
     sell teaser" slide (for AlphaCloud reps selling BetaAI and vice
     versa), the FAQ for reps (30 questions about the combined company),
     and the "anti-competitor" slide (addressing Salesforce/Microsoft
     targeting confused customers).

  3. Write the "Cultural Integration Approach for Presentations" — how
     to merge AlphaCloud's process-driven culture with BetaAI's
     creative culture into a presentation approach that satisfies both.
     Include: the design principles (what we take from each culture),
     the governance model (structured enough for compliance, flexible
     enough for creativity), the training approach (cross-pollination
     where each culture learns from the other), and the success metrics
     (how to measure if the cultural integration is working).

assertions:
  - type: llm_judge
    criteria: "Integration strategy is phased and realistic — 12-month plan with bridge/build/launch phases, content evolution, technology consolidation, governance balance, and cross-sell deck strategy"
    weight: 0.35
    description: "Phased realistic integration strategy"
  - type: llm_judge
    criteria: "Day 1 kit addresses immediate needs — combined value prop, customer reassurance, cross-sell teaser, 30-question FAQ, and anti-competitor slide ready for acquisition close"
    weight: 0.30
    description: "Immediate-need Day 1 kit"
  - type: llm_judge
    criteria: "Cultural integration is thoughtful — merges process-driven and creative cultures with design principles, governance balance, cross-training, and metrics that respect both cultures"
    weight: 0.35
    description: "Thoughtful cultural integration"
