meta:
  id: deck-for-complex-deals
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Design decks for complex enterprise deals — create multi-deck strategies for deals with multiple stages, stakeholders, and evaluation criteria over 6-12 month cycles"
  tags: [sales, pitch-deck, enterprise, complex-deals, multi-stage, strategy, expert]

state: {}

trigger: |
  You're a Strategic Account Director at "CloudScale" (enterprise
  cloud platform, $400M ARR). You're pursuing "MegaBank" — a $2M
  annual deal with a 9-month sales cycle. This deal requires not
  one deck but a "deck strategy" — different presentations at each
  stage of the buying journey.

  The MegaBank buying process:
  - Stage 1 (Month 1-2): Exploration — VP of Technology wants to
    understand CloudScale at a high level. 30-min virtual meeting.
    Outcome: Get on the shortlist (3-5 vendors).
  - Stage 2 (Month 3-4): Technical Evaluation — 5-person technical
    team evaluates architecture, security, and scalability. 90-min
    deep dive. Outcome: Pass technical validation.
  - Stage 3 (Month 5-6): Business Case — CFO and COO evaluate ROI
    and business impact. 45-min executive briefing. Outcome: Budget
    approval.
  - Stage 4 (Month 7): Proof of Concept — Live POC with MegaBank's
    data. Outcome: Validate claims.
  - Stage 5 (Month 8-9): Final Presentation — Full buying committee
    (12 people). 60-min final pitch. Outcome: Win the deal.
  - Stage 6 (Post-win): Kickoff — Implementation team alignment.
    30-min kickoff deck.

  CloudScale for MegaBank:
  - Estimated value: Reduce infrastructure costs by $8M/year
  - Compliance: SOC 2, PCI-DSS, FFIEC compliant
  - Banking references: JP Morgan, Goldman Sachs, HSBC
  - Implementation: 6-month phased deployment
  - Risk: Incumbent is AWS with 7-year relationship

  Tasks:
  1. Design the "Multi-Deck Strategy" — the deck plan for all 6
     stages. For each stage: the deck purpose (what it must accomplish),
     the slide count and format, the audience and their priorities,
     the 3 key messages (what they must remember), and the transition
     to the next stage (what needs to happen to advance). Show how
     the narrative builds across all 6 decks — each one continues
     the story, not repeats it.

  2. Write the full deck for Stage 5 (Final Presentation to 12-person
     committee). This is the deal-winning deck. Include: 12 slides
     with full content and speaker notes, the stakeholder map (who
     in the room cares about what), the POC results integration
     (reference the successful POC), the competitive positioning vs
     AWS (incumbent), and the "why now" urgency argument.

  3. Write the "Deal Deck Tracker" — a tool for managing the multi-
     deck strategy. Include: the master messaging document (ensuring
     consistency across 6 decks), the stakeholder-to-slide mapping
     (who needs to see what across all stages), the content reuse
     guide (which slides carry forward, which are unique), the
     competitive intelligence integration points (when to update
     competitive content), and the win criteria for each stage.

assertions:
  - type: llm_judge
    criteria: "Multi-deck strategy builds a coherent 9-month narrative — each of 6 stages has clear purpose, audience, key messages, and transition logic, with narrative progression across the entire buying cycle"
    weight: 0.35
    description: "Coherent 9-month deck strategy"
  - type: llm_judge
    criteria: "Final presentation deck is deal-winning — 12 slides for 12-person committee with POC results, AWS displacement positioning, urgency, and stakeholder-aware content"
    weight: 0.35
    description: "Deal-winning final presentation"
  - type: llm_judge
    criteria: "Deal deck tracker enables coordination — master messaging, stakeholder mapping, content reuse, competitive updates, and stage win criteria that keep the multi-deck strategy aligned"
    weight: 0.30
    description: "Coordination-enabling deal tracker"
