meta:
  id: deck-metrics-revenue-impact
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Measure pitch deck revenue impact — build the analytics framework that proves deck quality drives pipeline and win rates"
  tags: [sales, pitch-deck, metrics, revenue-impact, analytics, attribution, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "DataDrive" ($180M ARR, 400
  AEs). The CMO asks every quarter: "What's the ROI of the $500K we
  spend on sales decks?" You've never been able to answer. It's time
  to build the attribution model.

  Available data sources:
  - CRM (Salesforce): Deal outcomes, stages, values, close dates
  - Content management (Highspot): Which decks are used, by whom,
    how often, which slides are viewed by prospects
  - Conversation intelligence (Gong): Call recordings, deck usage
    during calls, prospect engagement scores
  - DocSend: Email-shared deck analytics (views, time, completion)
  - Marketing automation (Marketo): Prospect engagement before sales
  - Deal desk: Pricing, discounting, competitive flags

  Hypothesis to test:
  1. AEs who use the current approved deck win at higher rates than
     those who use old/custom decks
  2. Specific slides correlate with deal advancement
  3. Deck customization level correlates with deal size
  4. Prospect engagement with shared decks predicts deal outcome
  5. Deck delivery quality (Gong scores) predicts close rates

  Current (unvalidated) observations:
  - Top quartile AEs (by revenue) seem to customize decks more
  - Deals where prospects request the deck to share internally close
    at 2x the rate of those that don't
  - Competitive deals where the competitive slide is presented have
    higher win rates
  - The pricing slide gets the most time from prospects who end up
    closing

  Tasks:
  1. Design the "Deck Revenue Attribution Model" — the framework for
     measuring deck impact on revenue. Include: the data architecture
     (which sources connect how), the attribution methodology (direct
     vs influenced, first-touch vs multi-touch), the correlation
     analysis plan (deck usage patterns → deal outcomes), the
     controlled experiment design (A/B test for causal, not just
     correlational, evidence), and the dashboard specification (what
     the CMO sees quarterly).

  2. For each of the 5 hypotheses, write the analysis plan: the data
     required, the analysis methodology (statistical test), the
     expected sample size for significance, the confounding variables
     to control for (AE experience, deal size, segment), and the
     decision criteria (what result would change deck investment).

  3. Write the "Deck ROI Report Template" — the quarterly report that
     proves deck value to the CMO. Include: the executive summary
     format, the 5 key metrics (deck-influenced pipeline, win rate by
     deck version, prospect engagement correlation, delivery quality
     impact, content freshness impact), the trend analysis, and the
     investment recommendations. Write a sample report using
     hypothetical but realistic data.

assertions:
  - type: llm_judge
    criteria: "Attribution model is analytically sound — data architecture connects the right sources, methodology distinguishes correlation from causation, and dashboard gives the CMO actionable insights"
    weight: 0.35
    description: "Analytically sound attribution model"
  - type: llm_judge
    criteria: "Hypothesis analysis plans are rigorous — each of 5 hypotheses has clear data requirements, statistical methodology, sample size, confounding variable controls, and decision criteria"
    weight: 0.35
    description: "Rigorous hypothesis analysis"
  - type: llm_judge
    criteria: "ROI report template proves deck value — executive summary, 5 key metrics, trend analysis, and investment recommendations with sample data that answers 'what's the ROI of $500K in decks?'"
    weight: 0.30
    description: "Value-proving ROI report"
