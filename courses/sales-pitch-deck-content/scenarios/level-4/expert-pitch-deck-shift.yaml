meta:
  id: expert-pitch-deck-shift
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Expert shift simulation — redesign the entire deck strategy for a company preparing for IPO, where every presentation must now satisfy investors, regulators, customers, and employees simultaneously"
  tags: [sales, pitch-deck, IPO, regulatory, multi-audience, simulation, expert]

state: {}

trigger: |
  SCENARIO: IPO changes everything about your decks.

  You're the Chief Marketing Officer at "DataStream" (enterprise data
  platform, $600M ARR, preparing for IPO in 6 months). The CFO has
  just informed you: "Once we file the S-1, every external presentation
  becomes a potential securities violation. Our decks need to be
  rebuilt from the ground up."

  The IPO impact on decks:
  - Quiet Period: Once the S-1 is filed, the company enters a "quiet
    period." Any external communication that could be seen as promoting
    the stock is restricted.
  - Forward-looking statements: Every projection, estimate, or "we
    expect" claim needs Safe Harbor language.
  - Material non-public information: Sales decks can't contain revenue
    numbers, growth rates, or customer data that hasn't been publicly
    disclosed.
  - Consistency requirement: Anything said in a sales deck must be
    consistent with S-1 disclosures. Contradictions = legal risk.
  - Competitor claims: Any claim about competitors must be verifiable
    and defensible. FUD that was tolerated pre-IPO becomes litigation
    risk post-IPO.

  Current deck inventory that needs review:
  - Standard sales deck (12 slides) — contains revenue claims, growth
    metrics, forward-looking product roadmap
  - Executive briefing deck (7 slides) — contains competitive claims
    and market share data
  - Partner deck (10 slides) — contains revenue sharing details
  - Investor relations deck (15 slides) — needs complete rebuild for
    roadshow
  - Conference keynote deck (25 slides) — CEO's standard keynote with
    customer data and projections
  - Internal all-hands deck (20 slides) — contains MNPI that could leak

  Legal team's requirements:
  - All external decks must pass legal review
  - No revenue numbers unless publicly filed
  - No customer logos without written permission
  - Forward-looking statement disclaimers on every deck
  - Competitive claims must cite public sources
  - No promises about future product releases

  Tasks:
  1. Write the "IPO Deck Compliance Framework" — the rules for all
     presentations during the IPO process. Include: what can and cannot
     be said in external decks (specific examples), the legal review
     process and timeline (how long reviews take), the Safe Harbor
     language to include, the customer reference approval process,
     the competitor claim verification requirements, and the internal
     deck handling protocol (preventing MNPI leaks).

  2. Rewrite the standard sales deck (12 slides) for IPO compliance.
     Show the before (current problematic content) and after (compliant
     content) for 5 critical slides that need the most changes: the
     traction slide, the competitive slide, the customer results slide,
     the product roadmap slide, and the pricing slide. Explain what
     changed and why for each.

  3. Write the "Roadshow Deck Strategy" — the plan for the investor
     roadshow presentation. Include: the 20-slide roadshow deck
     outline (content that satisfies SEC requirements while being
     compelling), the speaker notes optimized for the 40-minute
     roadshow format, the Q&A preparation (20 investor questions with
     compliant answers), and the coordination between the sales deck
     and roadshow deck (ensuring consistency).

assertions:
  - type: llm_judge
    criteria: "IPO compliance framework is legally informed — specific rules on what can/cannot be said, with Safe Harbor language, review processes, and MNPI handling that reflect real IPO constraints"
    weight: 0.35
    description: "Legally informed compliance framework"
  - type: llm_judge
    criteria: "Before/after rewrites show real compliance changes — 5 slides with specific problematic content identified and rewritten compliantly while maintaining selling effectiveness"
    weight: 0.35
    description: "Real compliance slide rewrites"
  - type: llm_judge
    criteria: "Roadshow deck strategy serves dual purpose — 20-slide outline that satisfies SEC while compelling investors, with Q&A prep and sales/roadshow consistency"
    weight: 0.30
    description: "Dual-purpose roadshow strategy"
