meta:
  id: deck-operations-at-scale
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Build pitch deck operations at scale — design the systems, governance, and automation that manage 100+ deck variants across a global sales organization"
  tags: [sales, pitch-deck, operations, scale, governance, automation, expert]

state: {}

trigger: |
  You're the Global VP of Sales Enablement at "EnterpriseAI"
  ($500M ARR, 800 AEs across 20 countries, 6 product lines). The
  deck situation is chaos:

  Current state audit:
  - 847 unique deck files found across Google Drive, SharePoint,
    and local laptops
  - 23 "official" decks (last updated 3-18 months ago)
  - 64% of AEs use self-modified decks
  - Average deck contains 3.2 outdated claims (product changes, old
    pricing, former customers)
  - 12% of decks contain competitor information that's now inaccurate
  - No version control — nobody knows which is "current"
  - Regional teams create local variants without notifying HQ
  - Product launches require 4-6 weeks to propagate into decks
  - Legal has flagged 8 compliance issues in decks this year

  Desired state:
  - Single source of truth for all deck content
  - Modular architecture (components, not monolithic decks)
  - Role-based customization (AEs can personalize within guardrails)
  - Automated updates (product changes reflect in days, not months)
  - Analytics on which decks and slides drive pipeline
  - Compliance reviewed content only
  - Regional adaptation with global consistency

  Budget: $400K/year (tools, headcount, design)

  Tasks:
  1. Design the "Deck Operations Architecture" — the complete system
     for managing decks at scale. Include: the content management
     platform (recommendation with justification), the modular deck
     architecture (how content is organized into reusable components),
     the version control and approval workflow, the regional
     adaptation process, the automated update pipeline (product
     change → deck update), and the analytics layer. Create the
     architecture diagram description and the implementation timeline.

  2. Write the "Deck Governance Policy" — the rules that maintain
     quality at scale. Include: content ownership (who owns which
     slides), approval workflows (who can publish), compliance review
     requirements, update cadence (mandatory quarterly review), the
     "sunset policy" (when decks expire), the customization boundaries
     (what AEs can/cannot change), and the escalation path for
     exceptions.

  3. Write the "Deck Operations Team Charter" — the team structure
     to run this at scale. Include: the roles needed (Deck Ops Manager,
     Content Designers, Regional Coordinators), the interaction model
     with Product Marketing, Sales, Legal, and Regional teams, the
     KPIs for the team (deck freshness, adoption rate, compliance
     score, pipeline influence), and the $400K budget allocation.

assertions:
  - type: llm_judge
    criteria: "Deck operations architecture solves the chaos — modular system with version control, automated updates, analytics, and regional adaptation that transforms 847 rogue decks into a governed system"
    weight: 0.35
    description: "Chaos-solving deck architecture"
  - type: llm_judge
    criteria: "Governance policy balances control and flexibility — clear ownership, approval workflows, compliance review, and customization boundaries that maintain quality without killing AE productivity"
    weight: 0.35
    description: "Balanced governance policy"
  - type: llm_judge
    criteria: "Team charter is realistic — roles, interactions, KPIs, and budget allocation that could actually run deck operations for 800 AEs across 20 countries"
    weight: 0.30
    description: "Realistic team charter"
