meta:
  id: strategic-narrative-decks
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Build strategic narrative decks — create category-defining presentations that change how buyers think about the problem space, not just your product"
  tags: [sales, pitch-deck, strategic-narrative, category-creation, thought-leadership, expert]

state: {}

trigger: |
  You're a strategic narrative consultant hired by "SignalAI" (revenue
  intelligence platform, $80M ARR). SignalAI competes in a crowded
  category with Gong, Chorus, Clari, and 20 others. The CEO's
  directive: "Stop competing in revenue intelligence. Create a new
  category. Our deck should change how buyers think, not just how
  they evaluate vendors."

  The current competitive landscape:
  - "Revenue intelligence" category: 25+ vendors, $2.8B market
  - SignalAI's current positioning: "Better revenue intelligence"
  - Current win rate: 24% (declining from 30% two years ago)
  - Problem: Every vendor says the same thing — "we give you better
    insights into your revenue." Buyers can't differentiate.

  SignalAI's unique insight (not yet articulated):
  - Traditional revenue intelligence = look backward at what happened
  - SignalAI actually predicts what WILL happen (forward-looking)
  - Their AI has 91% accuracy predicting deal outcomes 60 days out
  - They can identify "hidden churn signals" 120 days before renewal
  - They predict which prospects will buy before the prospect knows
  - No competitor can do this — they all analyze past conversations

  The strategic narrative opportunity:
  - Old category: "Revenue Intelligence" (backward-looking analytics)
  - New category: "Revenue Science" (predictive, forward-looking)
  - The shift: From "understanding what happened" to "predicting
    what will happen and prescribing actions"
  - Historical parallel: Salesforce created "CRM → Cloud CRM,"
    HubSpot created "Marketing Software → Inbound Marketing,"
    Drift created "Chat → Conversational Marketing"

  Tasks:
  1. Write the "Strategic Narrative Deck" — a 15-slide presentation
     that doesn't sell SignalAI but sells the category shift from
     Revenue Intelligence to Revenue Science. Structure: the old
     world (backward-looking) → the shift happening (why now) → the
     new world (predictive) → the promised land (what's possible) →
     SignalAI as the path. The product shouldn't appear until slide 10.
     Write full content with speaker notes for all 15 slides.

  2. Write the "Category Creation Playbook" — the methodology for
     building a category-defining deck. Include: the "before/after"
     world framework, the "villain" identification (what's wrong with
     the current approach, not a competitor), the "why now" trigger
     (technology shift, market shift, or cultural shift), the "promised
     land" articulation (the outcome buyers should aspire to), and the
     "magic gift" positioning (your product as the enabler, not the
     hero). Reference the historical parallels.

  3. Write the "Internal Alignment Presentation" — the deck the CEO
     uses to align the entire company around the new strategic
     narrative. Include: why the current positioning is failing (data),
     the new narrative (Revenue Science), how it changes every
     department (marketing messaging, sales pitch, product roadmap,
     customer success), the rollout plan (6-month category launch),
     and the success metrics (how to know if category creation is
     working).

assertions:
  - type: llm_judge
    criteria: "Strategic narrative deck changes thinking — 15 slides build a compelling case for category shift from Revenue Intelligence to Revenue Science, with product appearing only after the narrative is established"
    weight: 0.35
    description: "Thinking-changing strategic narrative"
  - type: llm_judge
    criteria: "Category creation playbook is methodological — provides a reusable framework with before/after, villain, why now, promised land, and magic gift that any company could apply"
    weight: 0.30
    description: "Methodological category creation"
  - type: llm_judge
    criteria: "Internal alignment presentation drives organizational change — shows why current positioning fails, how the new narrative changes every department, and provides a realistic rollout plan"
    weight: 0.35
    description: "Change-driving internal alignment"
