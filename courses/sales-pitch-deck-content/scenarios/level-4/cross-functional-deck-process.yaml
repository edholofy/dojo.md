meta:
  id: cross-functional-deck-process
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Manage cross-functional deck creation — coordinate product marketing, sales, design, legal, and executives to build decks that satisfy all stakeholders"
  tags: [sales, pitch-deck, cross-functional, process, stakeholders, coordination, expert]

state: {}

trigger: |
  You're the Senior Director of Product Marketing at "NexaCloud"
  ($250M ARR). Every deck creation process is a political nightmare.
  The latest deck took 14 weeks and 47 revision rounds because every
  stakeholder had conflicting opinions.

  The stakeholder conflict map:
  - CRO: "The deck needs more pricing slides and ROI data. Make it
    longer — 20 slides minimum. We need every objection answered."
  - CMO: "The deck is too long and boring. Cut it to 10 slides. Lead
    with brand story. More emotional, less data."
  - CPO: "The product slides are wrong. Features X and Y aren't
    mentioned. The architecture diagram is oversimplified."
  - General Counsel: "Slides 4, 7, and 11 make claims we can't
    substantiate. Remove 'industry-leading' and 'guaranteed ROI.'"
  - VP of Design: "The deck is ugly. Wrong colors, wrong fonts, too
    many words per slide. Start over with our design system."
  - CEO: "I want it to tell a story. Don't start with the product.
    Start with the industry problem. And make it shorter."
  - Regional VPs: "This deck doesn't work in EMEA/APAC. We need
    local case studies and compliance slides."

  The 14-week timeline (what happened):
  - Week 1-2: Product marketing writes first draft
  - Week 3-4: CRO reviews, requests 12 changes
  - Week 5-6: CMO reviews, requests 15 changes (conflicting with CRO)
  - Week 7-8: Escalation to CEO, CEO redesigns the narrative
  - Week 9-10: Legal review, 8 claims flagged
  - Week 11-12: Design overhaul
  - Week 13: Regional feedback (late), 3 new slides needed
  - Week 14: Final approval (everyone slightly unhappy)

  Tasks:
  1. Design the "Deck Creation Process" — a streamlined 4-week process
     that replaces the 14-week chaos. Include: the RACI matrix (who
     is Responsible, Accountable, Consulted, Informed for each deck
     section), the review workflow (parallel reviews, not sequential),
     the conflict resolution protocol (how to resolve CRO vs CMO
     disagreements), the timeline with milestones, and the "decision
     rights" framework (who has final say on what).

  2. Write the "Stakeholder Brief Template" — the document that aligns
     all stakeholders BEFORE the deck is created. Include: the deck
     purpose (what outcome it must achieve), the target audience, the
     key messages (agreed upon upfront), the constraints (slide count,
     compliance requirements, design system), and the evaluation
     criteria (how we'll know the deck is "done"). This brief
     prevents the 47-revision problem by aligning expectations first.

  3. Write the "Deck Review Protocol" — the rules for how stakeholders
     provide feedback. Include: the feedback format (specific,
     actionable, with rationale), the review timeline (48 hours per
     review round), the "one-voice" rule (each team submits one
     consolidated review, not 5 individual opinions), the escalation
     path (how to resolve deadlocks), and the "good enough" threshold
     (when to ship vs. when to keep iterating).

assertions:
  - type: llm_judge
    criteria: "4-week process replaces 14-week chaos — RACI matrix, parallel reviews, conflict resolution, decision rights, and timeline that actually work for a multi-stakeholder organization"
    weight: 0.35
    description: "Chaos-replacing streamlined process"
  - type: llm_judge
    criteria: "Stakeholder brief prevents misalignment — pre-creation alignment on purpose, audience, messages, constraints, and done criteria that eliminates the root cause of revision cycles"
    weight: 0.35
    description: "Misalignment-preventing stakeholder brief"
  - type: llm_judge
    criteria: "Review protocol makes feedback productive — specific format, consolidated reviews, time limits, escalation path, and 'good enough' threshold that prevent death by committee"
    weight: 0.30
    description: "Productive review protocol"
