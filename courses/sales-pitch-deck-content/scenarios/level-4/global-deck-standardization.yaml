meta:
  id: global-deck-standardization
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Standardize pitch decks across a global organization — create the framework that balances global consistency with local market adaptation across 15+ countries"
  tags: [sales, pitch-deck, global, standardization, localization, governance, expert]

state: {}

trigger: |
  You're the Global Head of Sales Enablement at "CloudSecure"
  ($450M ARR, 1,200 AEs across 25 countries, 4 product lines). The
  CEO has mandated "one global brand voice in our pitch decks" after
  discovering that the German team's deck contradicts the US team's
  positioning, and the Japan team's deck makes claims the US team
  stopped making 6 months ago.

  The current chaos:
  - 25 country teams, each with their own deck versions
  - 4 product lines, each with independent marketing teams
  - Total deck variants: estimated 200+ (nobody knows exact count)
  - Contradictory claims found in 15% of decks across regions
  - Outdated content in 40% of non-US decks (lag of 3-9 months)
  - 3 recent legal issues from unapproved claims in regional decks
  - Customer complaint: "Your team in London told me X, but your
    team in New York told me Y about the same product"

  Regional complexity:
  - North America (500 AEs): Most current decks, sets the standard
  - EMEA (350 AEs): GDPR requires different compliance messaging, 8
    languages needed, different competitive landscape per country
  - APAC (250 AEs): Japan and Korea need completely different selling
    style, China deck must comply with local data sovereignty laws
  - LATAM (100 AEs): Portuguese and Spanish needed, different buying
    cycles, smaller deal sizes require simpler decks

  Tasks:
  1. Design the "Global Deck Architecture" — the system for managing
     decks across 25 countries and 4 product lines. Include: the
     modular content framework (global core + regional modules +
     local customization layer), the translation and localization
     process, the version control and synchronization system, the
     regional review and approval workflow, and the technology stack
     recommendation.

  2. Write the "Global-Local Balance Policy" — the rules for what's
     global (must be identical everywhere) vs. what's local (can be
     adapted). Include: the 5 global elements (brand positioning,
     product architecture, security/compliance facts, pricing structure,
     competitive positioning principles) and the 5 local elements
     (case studies, regulatory compliance details, competitive landscape,
     language/cultural adaptation, pricing in local currency). Specify
     the approval process for each category.

  3. Write the "Global Rollout Plan" — the 6-month plan to transition
     from 200+ rogue decks to the governed system. Include: Month 1
     (audit and architecture), Month 2-3 (core content creation and
     regional adaptation), Month 4 (regional pilot with 3 countries),
     Month 5 (full rollout with training), Month 6 (optimization and
     enforcement). Specify the change management approach for getting
     25 country teams to adopt the new system.

assertions:
  - type: llm_judge
    criteria: "Global deck architecture scales — modular framework with global core, regional modules, and local customization that works across 25 countries, 4 product lines, with version control and synchronization"
    weight: 0.35
    description: "Scaling global deck architecture"
  - type: llm_judge
    criteria: "Global-local balance policy is practical — clear distinction between mandatory global elements and adaptable local elements with approval processes that prevent contradictions without killing local relevance"
    weight: 0.35
    description: "Practical global-local balance"
  - type: llm_judge
    criteria: "Rollout plan manages change — 6-month phased approach with audit, creation, pilot, rollout, and optimization that includes change management for getting 25 country teams on board"
    weight: 0.30
    description: "Change-managing rollout plan"
