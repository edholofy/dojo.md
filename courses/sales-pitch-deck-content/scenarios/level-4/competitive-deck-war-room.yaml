meta:
  id: competitive-deck-war-room
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Run a competitive deck war room — rapidly create and deploy competitive response decks when a major competitor launches a disruptive product or campaign"
  tags: [sales, pitch-deck, competitive, war-room, crisis-response, rapid, expert]

state: {}

trigger: |
  BREAKING: Your top competitor just made 3 simultaneous announcements
  that threaten your business. It's 8am Monday. Your 400 AEs need
  updated decks by Wednesday.

  You're the VP of Competitive Strategy at "EnterpriseOne" ($300M ARR,
  enterprise collaboration platform). The competitor is "WorkHub."

  WorkHub's announcements (this morning):
  1. Free tier launch: WorkHub is now free for up to 500 users. Your
     SMB segment ($60M revenue) is directly threatened. Your cheapest
     plan is $12/user/month.
  2. AI agent announcement: WorkHub launched "WorkHub AI" — an AI
     agent that auto-schedules meetings, writes project updates, and
     assigns tasks. Marketing claims: "Replace 3 tools with one."
     Your AI features won't ship for 4 months.
  3. Gartner leadership: WorkHub is now in the "Leader" quadrant in
     Gartner's latest report. You're in "Visionary." WorkHub's AEs
     will weaponize this in every deal.

  Your competitive intelligence assessment:
  - Free tier: Limited features, no admin controls, no SSO, no
    compliance. Fine for small teams, insufficient for enterprises.
  - AI agent: Demo was impressive but early beta. No customer
    testimonials. Privacy concerns (training on customer data).
  - Gartner: Report specifically notes WorkHub's weak security and
    compliance. Your security scores are 2x higher.

  Your sales team's current competitive deck:
  - Last updated 4 months ago
  - Doesn't address free tier competition
  - No AI comparison content
  - Uses old Gartner position (you were "Challenger" last year)
  - 12 slides, but slide 7 (competitive) is the only competitive slide

  Tasks:
  1. Write the "72-Hour War Room Plan" — the operational plan for
     updating all sales materials in 3 days. Include: Hour 0-8
     (intelligence gathering and analysis), Hour 8-24 (content
     creation — who writes what), Hour 24-48 (review and approval),
     Hour 48-72 (distribution and training). Specify the team needed,
     the deliverables at each milestone, and the quality checkpoints.

  2. Create the 3 competitive response slides to add to the existing
     deck (one per announcement). For each: the slide headline and
     content, the talk track for AEs, the supporting data, and the
     "if the prospect brings it up first" recovery script. These must
     be factual, not FUD. Address each announcement honestly — where
     WorkHub is genuinely strong and where they're weak.

  3. Write the "Competitive Response Communication" — the internal
     message to 400 AEs that goes out with the updated deck. Include:
     the situation summary (what happened and what it means), the
     key talking points (3 points for each announcement), the FAQ (15
     questions prospects will ask with answers), the do/don't list
     (what to say vs what to never say about WorkHub), and the
     confidence builder (why EnterpriseOne still wins and the data
     to prove it).

assertions:
  - type: llm_judge
    criteria: "72-hour war room plan is operational — hour-by-hour milestones with team assignments, deliverables, and quality checkpoints that could actually produce updated materials in 3 days"
    weight: 0.35
    description: "Operational 72-hour war room"
  - type: llm_judge
    criteria: "Three competitive slides are honest and effective — each addresses one announcement factually, acknowledges competitor strengths, highlights weaknesses, with talk tracks and recovery scripts"
    weight: 0.35
    description: "Honest effective competitive slides"
  - type: llm_judge
    criteria: "Internal communication equips AEs — situation summary, talking points per announcement, 15-question FAQ, do/don't list, and confidence data that prepare reps for prospect conversations"
    weight: 0.30
    description: "AE-equipping internal communication"
