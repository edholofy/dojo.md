meta:
  id: ai-powered-deck-creation
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Leverage AI for pitch deck creation — design workflows that use LLMs, generative AI, and automation to create personalized decks at scale while managing quality and hallucination risks"
  tags: [sales, pitch-deck, AI, automation, LLM, personalization, expert]

state: {}

trigger: |
  You're the Head of Sales Innovation at "TechCorp" ($350M ARR, 500
  AEs). The CEO saw a demo of AI-generated presentations and said:
  "Why can't we use AI to create personalized pitch decks for every
  prospect automatically?" You need to design the AI-powered deck
  creation system — but also manage the risks.

  Current manual process:
  - AEs spend 2.5 hours customizing each deck for enterprise prospects
  - 60% of customizations are the same patterns (industry, size, pain)
  - Marketing creates 20 "template" variants per quarter
  - Win rate correlation: personalized decks win 31% vs 22% for generic

  AI capabilities available:
  - LLM APIs (Claude, GPT-4) for content generation
  - Company intelligence APIs (Clearbit, ZoomInfo) for prospect data
  - CRM data (Salesforce) for deal context and history
  - Internal content library (500 slides, 45 case studies, 120 data
    points)
  - Presentation tools with APIs (Google Slides, Beautiful.ai, Pitch)

  Risks to manage:
  - Hallucination: AI invents customer quotes or statistics
  - Brand consistency: AI-generated content might not match brand voice
  - Compliance: AI might make claims that haven't been legal-reviewed
  - Accuracy: Prospect-specific data might be wrong or outdated
  - Over-automation: Decks feel generic despite being "personalized"
  - AE dependency: Reps stop understanding the content they present

  Tasks:
  1. Design the "AI Deck Creation Workflow" — the end-to-end system
     from prospect data input to delivered personalized deck. Include:
     data sources and enrichment (what feeds the AI), the content
     generation pipeline (which parts AI writes vs. which it selects
     from approved content), the human review checkpoints (where AEs
     must verify), the quality assurance layer (hallucination detection,
     brand compliance, accuracy verification), and the feedback loop
     (how AE edits improve future generations).

  2. Write the "AI Content Guardrails" — the rules that prevent AI
     from creating problematic deck content. Include: the approved
     content library approach (AI selects and adapts, not creates from
     scratch), the claim verification system (every statistic must
     trace to a source), the brand voice constraints (tone, language,
     prohibited phrases), the legal review triggers (when AI content
     needs legal review), and the "human in the loop" requirements.

  3. Write the "AI Deck ROI Business Case" — the justification for
     investing $200K in building this system. Include: time savings
     calculation (2.5 hours × 500 AEs × 50 enterprise deals/year),
     win rate improvement projection (from 22% generic to 31%
     personalized applied to more deals), implementation costs,
     ongoing costs, risk-adjusted ROI, and the 12-month roadmap from
     pilot to full deployment.

assertions:
  - type: llm_judge
    criteria: "AI workflow is practical and safe — end-to-end pipeline with clear data sources, content generation approach, human review checkpoints, and quality assurance that prevents hallucination and brand violations"
    weight: 0.35
    description: "Practical safe AI workflow"
  - type: llm_judge
    criteria: "Content guardrails prevent real risks — approved content library, claim verification, brand constraints, legal triggers, and human-in-loop requirements that address actual AI deck risks"
    weight: 0.35
    description: "Risk-preventing content guardrails"
  - type: llm_judge
    criteria: "Business case is investment-ready — specific time/win-rate calculations, implementation costs, risk-adjusted ROI, and phased roadmap that justify the $200K investment"
    weight: 0.30
    description: "Investment-ready business case"
