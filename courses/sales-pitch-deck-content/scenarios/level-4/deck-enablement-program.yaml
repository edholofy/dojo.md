meta:
  id: deck-enablement-program
  level: 4
  course: sales-pitch-deck-content
  type: output
  description: "Design a comprehensive deck enablement program — build the training, certification, and coaching infrastructure that ensures every rep can deliver a compelling pitch"
  tags: [sales, pitch-deck, enablement, training, certification, coaching, expert]

state: {}

trigger: |
  You're the Director of Sales Enablement at "ScaleForce" (enterprise
  SaaS, $200M ARR, 300 AEs). You've built great decks, but adoption
  and delivery quality are inconsistent.

  Current performance data:
  - Deck adoption: 45% of AEs use the current approved deck (55% use
    old versions or self-built decks)
  - Delivery quality (scored from call recordings):
    - Top quartile AEs: 4.2/5 average delivery score, 38% win rate
    - Bottom quartile AEs: 2.1/5 delivery score, 14% win rate
  - New hire ramp: Takes 4.5 months before new AEs deliver the deck
    confidently (target: 6 weeks)
  - Product updates: 3 months average lag between product launch and
    reps incorporating into their pitch
  - Feedback: 62% of AEs say "the deck doesn't work for my deals"
    (indicates they don't know how to adapt it)

  Resources:
  - Enablement team: 4 people (you + 3 enablement managers)
  - Tools: Gong (conversation intelligence), Highspot (content
    management), LMS (learning platform)
  - Budget: $150K/year for the deck enablement program
  - Sales kickoff: Annual event (400 attendees, January)
  - Quarterly business reviews: Regional events (50-75 per region)

  Tasks:
  1. Design the "Deck Mastery Program" — a tiered certification program
     for pitch deck delivery. Include: 3 tiers (Foundation, Advanced,
     Expert) with specific requirements for each, the assessment
     criteria (recorded presentation scoring, peer review, manager
     certification), the rewards/consequences (certification affects
     deal assignment, President's Club eligibility), and the ongoing
     maintenance (annual recertification).

  2. Write the "New Hire Deck Onboarding" — a 6-week program that
     gets new AEs confident with the deck. Include: Week-by-week
     curriculum (what they learn and practice each week), the practice
     exercises (recorded dry runs, peer presentations, mock prospect
     calls), the certification milestone (when they're cleared to
     present to prospects), and the buddy system (pairing with a
     top-performer for shadowing and coaching).

  3. Write the "Continuous Improvement Engine" — the ongoing system
     that keeps deck delivery sharp across 300 AEs. Include: the
     monthly "Deck Clinic" format (group coaching on common delivery
     issues), the Gong insight pipeline (how conversation intelligence
     identifies delivery improvements), the "Best Practices Library"
     (curated recordings of top performers), the product update
     integration process (product launch → deck update → training →
     certification in under 3 weeks), and the quarterly deck
     effectiveness review (data-driven deck content optimization).

assertions:
  - type: llm_judge
    criteria: "Deck Mastery Program drives real behavior change — 3 certification tiers with meaningful requirements, fair assessment, and consequences that motivate adoption and delivery quality improvement"
    weight: 0.35
    description: "Behavior-changing mastery program"
  - type: llm_judge
    criteria: "New hire onboarding accelerates ramp — 6-week program with progressive skill building, practice format, certification milestone, and buddy system that achieves confidence faster than 4.5 months"
    weight: 0.35
    description: "Ramp-accelerating new hire program"
  - type: llm_judge
    criteria: "Continuous improvement engine is sustainable — monthly clinics, Gong pipeline, best practices library, and product update process that maintain quality across 300 AEs without heroic effort"
    weight: 0.30
    description: "Sustainable improvement engine"
