meta:
  id: escalation-documentation
  level: 1
  course: customer-support-escalation
  type: output
  description: "Write effective escalation notes — document customer context, troubleshooting history, and requested outcomes so the next handler can resolve without re-asking"
  tags: [support, escalation, documentation, handoff-notes, beginner]

state: {}

trigger: |
  The number one customer complaint about escalation is having to
  repeat their story. Great escalation documentation prevents this
  by giving the next agent everything they need.

  Part 1: What makes good escalation notes
  1. Customer context (who they are, account details, history)
  2. Issue summary (what happened, in the customer's words)
  3. Troubleshooting already attempted (what you tried, results)
  4. Customer emotional state (calm, frustrated, angry, anxious)
  5. Customer's desired outcome (what they want to happen)
  6. Why you're escalating (authority limit, technical expertise,
     specialized knowledge needed)
  7. Urgency and timeline (any deadlines or SLA considerations)

  Part 2: Write escalation notes for these scenarios

  Scenario 1:
  Customer Sarah Chen (Premium tier, 3-year customer) called about
  being double-charged $199 for her annual subscription renewal.
  You've verified in the billing system that two charges appear on
  the same day. Your refund authority is limited to $50. Sarah is
  frustrated but calm. She wants one charge reversed and a credit
  for the inconvenience. She mentioned she's evaluating competitors.
  Write the escalation note to the billing specialist team.

  Scenario 2:
  Developer Mike Torres submitted a ticket 3 days ago about webhook
  delivery failures. You've confirmed webhooks are configured
  correctly. Server logs show 200 responses from your side but Mike
  says he never receives them. You've exhausted your troubleshooting
  options. Mike is patient but needs resolution by Friday for a
  client demo. His company pays $500/month.
  Write the escalation note to the engineering team.

  Scenario 3:
  Customer Jenny Williams is extremely upset. She received the wrong
  product (ordered red shoes size 8, received blue shoes size 6).
  This is the second time in 3 months she's received a wrong item.
  She's demanding to speak to a manager and threatening to post on
  social media. She wants a full refund, the correct item expedited,
  and "someone to explain how this keeps happening."
  Write the escalation note to the team lead.

assertions:
  - type: llm_judge
    criteria: "Escalation notes include all critical context — customer identity, issue summary, troubleshooting done, emotional state, desired outcome, and urgency are all present"
    weight: 0.30
    description: "Complete escalation context"
  - type: llm_judge
    criteria: "Notes prevent the customer from repeating themselves — the next handler has enough information to pick up where the previous agent left off"
    weight: 0.25
    description: "Continuity preservation"
  - type: llm_judge
    criteria: "Emotional state and churn risk are flagged — Sarah's competitor evaluation and Jenny's social media threat are noted as risk signals"
    weight: 0.25
    description: "Risk signal flagging"
  - type: llm_judge
    criteria: "Notes are concise but thorough — they're structured for quick reading, not long paragraphs that the next agent has to parse"
    weight: 0.20
    description: "Structured concise notes"
