meta:
  id: escalation-triggers
  level: 1
  course: customer-support-escalation
  type: output
  description: "Identify escalation triggers — recognize the signals that indicate an issue needs to be escalated based on severity, urgency, customer emotion, and business impact"
  tags: [support, escalation, triggers, severity, urgency, beginner]

state: {}

trigger: |
  Escalation triggers are specific conditions that indicate an
  issue should be moved to a higher tier. Recognizing these
  triggers quickly prevents issues from festering and customers
  from becoming more frustrated.

  Part 1: Common escalation trigger categories
  1. Technical severity: system outage, data loss, security breach
  2. Customer emotion: anger, threats, crying, repeated contacts
  3. Financial impact: large amounts, billing errors, fraud
  4. Time sensitivity: deadlines, SLA approaching, events
  5. Authority limits: refund caps, policy exceptions needed
  6. Legal risk: lawsuit threats, regulatory complaints
  7. Reputational risk: media mentions, influencer complaints
  8. Safety concerns: product defect causing harm

  Part 2: Classify these situations by trigger type and urgency

  Rate each scenario as: Immediate (escalate now), Urgent
  (escalate within 1 hour), Standard (escalate within 4 hours),
  or Low (escalate within 24 hours or handle yourself).

  1. Customer says: "I've already spoken to 4 different agents
     about this and nobody can fix it."
  2. Customer says: "I'm a journalist writing about your company's
     billing practices. I'd like a comment."
  3. Customer says: "Your children's toy has a sharp edge. My child
     got a small cut."
  4. Customer says: "I need this resolved by 5 PM today for our
     company's fiscal close."
  5. Customer says: "I'd like to discuss upgrading our team plan
     from 50 to 500 seats."
  6. Customer says: "I think someone hacked my account. There are
     orders I didn't place."
  7. Customer says: "Your product page says 'Made in USA' but the
     label says 'Made in China.' This is false advertising."
  8. Customer says: "I'm fine waiting. Just want to understand why
     my order is 2 days late."
  9. Customer says: "Our entire company lost access to the platform
     10 minutes ago. 300 users affected."
  10. Customer says: "If you can't fix this, I'm posting on Reddit
      with screenshots."

  For each: identify the trigger type(s), urgency level, and
  recommended escalation path.

assertions:
  - type: llm_judge
    criteria: "Safety and security issues are rated highest urgency — the child injury, account hack, and 300-user outage are all classified as immediate escalation"
    weight: 0.30
    description: "Safety and security urgency"
  - type: llm_judge
    criteria: "The journalist inquiry is recognized as a reputational risk — it's escalated to PR/communications, not treated as a standard complaint"
    weight: 0.25
    description: "Journalist reputational risk"
  - type: llm_judge
    criteria: "The 500-seat upgrade is identified as a sales opportunity — it's routed to sales/account management, not just treated as a support question"
    weight: 0.25
    description: "Sales opportunity recognition"
  - type: llm_judge
    criteria: "Patient customers are still handled appropriately — the late order customer who's fine waiting still gets proper attention, not deprioritized"
    weight: 0.20
    description: "Patient customer appropriate handling"
