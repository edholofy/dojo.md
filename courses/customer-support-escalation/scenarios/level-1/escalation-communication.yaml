meta:
  id: escalation-communication
  level: 1
  course: customer-support-escalation
  type: output
  description: "Communicate clearly during escalation — set expectations, provide updates, and keep customers informed throughout the escalation process"
  tags: [support, escalation, communication, expectations, updates, beginner]

state: {}

trigger: |
  The escalation experience is shaped by communication. Customers
  who feel informed and valued during an escalation rate their
  experience higher than customers whose issues are resolved
  quickly but with poor communication.

  Part 1: Communication at each escalation stage
  1. Before escalation: "Here's what I'm going to do for you"
  2. During handoff: "Here's who will help you and what they know"
  3. While waiting: "Here's an update on where things stand"
  4. At resolution: "Here's what was done and what to expect"
  5. After resolution: "Was everything resolved to your satisfaction?"

  Part 2: Write communication for each stage

  Scenario: A customer's enterprise account has a data export
  feature that's producing corrupted files. You've confirmed the
  bug and need to escalate to engineering. The customer needs the
  export for a board meeting in 3 days.

  1. Write the message to the customer explaining you're escalating
     to engineering (before escalation).

  2. Write the handoff introduction if the engineer joins the
     chat/call (during handoff).

  3. Write a 24-hour update when engineering is still investigating
     but hasn't resolved yet (while waiting). The board meeting is
     now in 2 days.

  4. Write the resolution message when engineering fixes the bug
     and the export works (at resolution).

  5. Write the follow-up message 2 days after resolution checking
     if the board meeting went well (after resolution).

  Part 3: Handling difficult communication moments
  - What to say when you don't have an update yet
  - What to say when the timeline is slipping
  - What to say when the escalation team needs more information
    from the customer
  - What to say when the resolution isn't what the customer hoped

assertions:
  - type: llm_judge
    criteria: "Each communication stage is appropriate — before sets expectations, during provides context, waiting gives honest updates, resolution confirms the fix, after shows care"
    weight: 0.30
    description: "Stage-appropriate communication"
  - type: llm_judge
    criteria: "The 24-hour update is honest about uncertainty — it doesn't promise resolution by the deadline but shows urgency and commitment"
    weight: 0.25
    description: "Honest uncertainty communication"
  - type: llm_judge
    criteria: "The follow-up demonstrates genuine care — checking on the board meeting outcome shows the agent understood the customer's real concern"
    weight: 0.25
    description: "Genuine follow-up care"
  - type: llm_judge
    criteria: "Difficult communication moments are handled gracefully — no update, slipping timelines, and disappointing resolutions are addressed without empty promises"
    weight: 0.20
    description: "Graceful difficult communications"
