meta:
  id: de-escalation-before-escalation
  level: 1
  course: customer-support-escalation
  type: output
  description: "Practice de-escalation techniques before resorting to escalation — calm frustrated customers and resolve issues at the first tier when possible"
  tags: [support, escalation, de-escalation, customer-emotion, beginner]

state: {}

trigger: |
  Not every request for a manager is a true escalation need.
  Often, customers ask for a manager because they feel unheard
  or believe they've hit a wall. Effective de-escalation can
  resolve the situation without a transfer, saving time for
  everyone and demonstrating your competence.

  Part 1: De-escalation fundamentals
  1. The HEARD framework:
     - Hear: let the customer fully express their frustration
     - Empathize: acknowledge their feelings genuinely
     - Apologize: take ownership of the experience
     - Resolve: offer a concrete solution
     - Diagnose: identify root cause to prevent recurrence
  2. When de-escalation is appropriate vs. when to just escalate
  3. Warning signs that de-escalation isn't working
  4. Your authority boundaries (what you CAN do without a manager)

  Part 2: Practice de-escalation

  Scenario 1 — "Let me speak to your manager!":
  Customer: "This is the third time I've called about this issue.
  Nobody seems to know what they're doing. I want to speak to a
  manager NOW."
  Context: The issue is a recurring billing discrepancy. You can
  see the previous tickets and have the authority to fix it.
  Write a de-escalation response that may prevent the need to
  escalate.

  Scenario 2 — "I'm going to leave a bad review everywhere":
  Customer: "I paid $300 for this product and it broke after 2
  weeks. Your warranty process is a nightmare. I'm going to tell
  everyone how terrible your company is."
  Context: You can process a warranty replacement immediately.
  Write a response that addresses both the issue and the emotion.

  Scenario 3 — "This is fraud, I'm calling my lawyer":
  Customer: "You charged my card without authorization. This is
  fraud. I'm contacting my bank and my attorney."
  Context: You can see the customer signed up for a free trial
  that auto-converted to a paid plan. The terms were in the
  signup flow.
  Write a response that de-escalates while explaining the charge.

  Scenario 4 — When de-escalation fails:
  The customer from Scenario 1 responds: "I don't care what you
  can do. I've heard that before. Get me your manager right now
  or I'm done with your company."
  Write the response that gracefully transitions to escalation.

assertions:
  - type: llm_judge
    criteria: "De-escalation attempts are genuine — they acknowledge the customer's frustration and offer concrete solutions, not just scripted apologies"
    weight: 0.30
    description: "Genuine de-escalation"
  - type: llm_judge
    criteria: "The fraud accusation is handled carefully — the response explains the trial conversion clearly without being defensive or dismissive"
    weight: 0.25
    description: "Careful fraud accusation handling"
  - type: llm_judge
    criteria: "The failed de-escalation transitions gracefully — when the customer insists on a manager, the agent respects the request without making the customer feel guilty"
    weight: 0.25
    description: "Graceful transition to escalation"
  - type: llm_judge
    criteria: "Each response demonstrates the HEARD framework — hearing, empathizing, apologizing, resolving, and diagnosing are evident"
    weight: 0.20
    description: "HEARD framework application"
