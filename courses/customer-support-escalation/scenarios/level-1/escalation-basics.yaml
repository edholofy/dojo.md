meta:
  id: escalation-basics
  level: 1
  course: customer-support-escalation
  type: output
  description: "Learn the fundamentals of support escalation — understand what escalation means, when it's appropriate, and the different types of escalation paths"
  tags: [support, escalation, basics, fundamentals, beginner]

state: {}

trigger: |
  Escalation is the process of transferring a customer issue to
  someone with more expertise, authority, or resources to resolve
  it. Knowing when and how to escalate is one of the most critical
  skills in customer support.

  Part 1: Escalation fundamentals
  1. What is escalation and why does it exist?
  2. Types of escalation:
     - Functional: transferring to a specialist (billing, technical)
     - Hierarchical: involving a manager or senior agent
     - Priority: raising the urgency level of a ticket
     - Channel: moving to a more effective channel (email → phone)
  3. When to escalate vs. when to keep working on it yourself
  4. The cost of unnecessary escalation (customer wait time,
     resource waste, customer frustration from being transferred)
  5. The cost of NOT escalating when you should (customer churn,
     safety risks, legal exposure, SLA breach)

  Part 2: Practice identifying escalation needs
  For each scenario, decide: escalate or handle yourself? If
  escalate, what type of escalation and to whom?

  Scenario A: "I've been trying to reset my password for 30
  minutes. Your reset email never arrives."
  (You've verified the email is correct and checked spam.)

  Scenario B: "I want to cancel my subscription and get a full
  refund for the past 3 months. Your product never worked."
  (Your authority: refund up to 1 month.)

  Scenario C: "Your website says my order shipped but the tracking
  number shows 'label created' for 5 days now."

  Scenario D: "I'm a developer and your API is returning 500 errors
  intermittently. I've checked my code and it's correct."

  Scenario E: "I need to speak with your CEO. This is unacceptable."
  (The customer is upset about a billing error of $12.)

  Part 3: Explain your reasoning
  For each scenario, explain:
  - Why you chose to escalate or not
  - What information you'd gather before escalating
  - How you'd communicate with the customer about the escalation

assertions:
  - type: llm_judge
    criteria: "Escalation decisions are appropriate — the password issue needs technical investigation, the refund exceeds authority, the shipping needs logistics, the API needs engineering, and the CEO request should be de-escalated"
    weight: 0.30
    description: "Appropriate escalation decisions"
  - type: llm_judge
    criteria: "The CEO request is handled diplomatically — rather than escalating to the CEO for a $12 billing error, the response de-escalates while still addressing the customer's frustration"
    weight: 0.25
    description: "Diplomatic CEO request handling"
  - type: llm_judge
    criteria: "Each scenario includes information gathering — before escalating, the agent identifies what context needs to be collected"
    weight: 0.25
    description: "Pre-escalation information gathering"
  - type: llm_judge
    criteria: "Customer communication is clear — the customer is told what's happening, why, and what to expect next"
    weight: 0.20
    description: "Clear escalation communication"
