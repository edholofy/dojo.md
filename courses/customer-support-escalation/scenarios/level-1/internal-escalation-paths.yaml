meta:
  id: internal-escalation-paths
  level: 1
  course: customer-support-escalation
  type: output
  description: "Navigate internal escalation paths — understand which teams handle which issues and how to route escalations to billing, engineering, legal, product, and management"
  tags: [support, escalation, internal, routing, cross-department, beginner]

state: {}

trigger: |
  Escalation isn't always "up" — it's often "across." Different
  issues need different teams, and knowing who owns what prevents
  customers from being bounced between departments.

  Part 1: Common internal escalation paths
  1. Billing/Finance: overcharges, refund disputes, pricing errors,
     payment failures, invoice questions
  2. Engineering/Technical: bugs, outages, performance issues, data
     problems, integration failures
  3. Product: feature requests, product feedback, roadmap questions,
     beta access, documentation issues
  4. Legal: lawsuit threats, regulatory complaints, contract disputes,
     IP/copyright claims, subpoenas
  5. Security: account compromises, data breaches, vulnerability
     reports, fraud detection
  6. Sales: upgrade inquiries, enterprise deals, contract renewals,
     competitive situations
  7. Marketing/PR: media inquiries, influencer complaints, brand
     mentions, social media crises
  8. Management: policy exceptions, VIP customers, repeated failures,
     agent authority limits

  Part 2: Route these customer issues

  For each issue, identify the primary team and any secondary
  teams that should be notified:

  1. "Your API documentation is wrong. The endpoint returns a
     different schema than documented."
  2. "I need an invoice that splits the charges between two of
     our company's cost centers."
  3. "We're evaluating your competitor and they offered us 40% off.
     Can you match it?"
  4. "I received a cease and desist letter saying your product
     infringes on our patent."
  5. "Your product is being discussed in a Reddit thread about
     worst customer service experiences."
  6. "I tried to export my data for GDPR compliance and the export
     is missing half my records."
  7. "We need a custom SLA for our enterprise deployment. Who
     negotiates those?"
  8. "Your mobile app is crashing on the latest iOS update. I've
     tried reinstalling."

  For each: primary team, secondary notifications, urgency, and
  what information to include in the internal escalation.

assertions:
  - type: llm_judge
    criteria: "Routing is accurate — API docs go to product/engineering, invoice splitting to billing, patent claim to legal, Reddit thread to marketing/PR"
    weight: 0.30
    description: "Accurate team routing"
  - type: llm_judge
    criteria: "Secondary teams are identified where relevant — the patent claim needs legal AND product, the Reddit thread needs PR AND support leadership"
    weight: 0.25
    description: "Secondary team identification"
  - type: llm_judge
    criteria: "The GDPR data export issue is treated with appropriate urgency — it combines a technical bug with a compliance obligation"
    weight: 0.25
    description: "GDPR compliance urgency"
  - type: llm_judge
    criteria: "Each escalation includes what information the receiving team needs — not just 'route to engineering' but specific context they'll need"
    weight: 0.20
    description: "Contextual routing information"
