meta:
  id: warm-vs-cold-handoff
  level: 1
  course: customer-support-escalation
  type: output
  description: "Understand warm vs. cold handoffs — learn when each is appropriate, how to execute them, and how to minimize customer friction during transfers"
  tags: [support, escalation, handoff, warm-transfer, cold-transfer, beginner]

state: {}

trigger: |
  How you transfer a customer matters as much as whether you
  transfer them. A warm handoff (introducing the customer to the
  next agent with full context) feels like teamwork. A cold handoff
  (dropping the customer into a queue) feels like abandonment.

  Part 1: Warm vs. cold handoff fundamentals
  1. Warm handoff: what it is and when to use it
     - Agent stays on the line/in the chat during introduction
     - Context is shared verbally/visually with the new agent
     - Customer confirms the new agent understands their issue
  2. Cold handoff: what it is and when it's acceptable
     - Customer is transferred to a queue or new ticket is created
     - Written notes are the only context transfer
     - When used: different business hours, long resolution expected
  3. The customer experience impact of each approach

  Part 2: Practice both handoff types

  Scenario A — Warm handoff (live chat):
  You're chatting with a customer about a technical integration
  issue that needs an API specialist. The specialist is available.
  Write the complete warm handoff conversation including:
  - What you tell the customer
  - How you introduce the specialist
  - What context you share with the specialist in the chat
  - The actual transition moment

  Scenario B — Cold handoff (email):
  A customer's complex billing dispute needs the finance team's
  review. The finance team handles escalations within 24 hours.
  Write the complete cold handoff including:
  - The email response to the customer explaining the transfer
  - The internal escalation note to the finance team
  - Setting expectations for next steps and timeline

  Scenario C — Deciding which type:
  For each situation, choose warm or cold and explain why:
  1. Angry customer needs a manager right now (manager available)
  2. Technical issue needs engineering investigation (48hr SLA)
  3. Customer wants to upgrade their plan (sales team available)
  4. Complex return needs warehouse team input (next business day)
  5. Customer reporting a security vulnerability (security on-call)

assertions:
  - type: llm_judge
    criteria: "The warm handoff preserves context seamlessly — the specialist receives full context and the customer doesn't need to repeat anything"
    weight: 0.30
    description: "Seamless warm handoff"
  - type: llm_judge
    criteria: "The cold handoff sets clear expectations — the customer knows who will contact them, when, and through what channel"
    weight: 0.25
    description: "Clear cold handoff expectations"
  - type: llm_judge
    criteria: "Handoff type decisions are appropriate — urgent/emotional situations get warm handoffs, asynchronous investigations get cold handoffs"
    weight: 0.25
    description: "Appropriate handoff type selection"
  - type: llm_judge
    criteria: "The security vulnerability is treated urgently — it gets an immediate warm handoff to security, not a cold transfer"
    weight: 0.20
    description: "Urgent security escalation"
