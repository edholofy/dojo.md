meta:
  id: customer-expectations-during-escalation
  level: 1
  course: customer-support-escalation
  type: output
  description: "Manage customer expectations during escalation — set realistic timelines, explain the process, and prevent frustration from uncertainty"
  tags: [support, escalation, expectations, timeline, customer-communication, beginner]

state: {}

trigger: |
  The biggest source of frustration during escalation isn't the
  wait — it's the uncertainty. Customers who know what to expect
  are significantly more patient than those left wondering.

  Part 1: Setting expectations
  1. What customers need to know:
     - Who will handle their issue next
     - When they can expect to hear back
     - Through which channel (email, phone, chat)
     - What the next person will already know (so they don't repeat)
     - What to do if they don't hear back by the promised time
  2. Common mistakes in expectation setting:
     - Overpromising timelines ("you'll hear back in an hour")
     - Being vague ("someone will get back to you soon")
     - Not providing a fallback ("if you don't hear from us...")
     - Forgetting to explain why escalation is needed

  Part 3: Write expectation-setting messages

  Scenario 1 — Quick escalation:
  You're transferring a chat customer to a billing specialist who
  is available now. The customer has been in chat for 10 minutes
  and is mildly frustrated about an overcharge.
  Write the message transitioning the customer.

  Scenario 2 — Delayed escalation:
  You're escalating a technical issue to the engineering team. They
  have a 24-48 hour SLA for escalation review. The customer is a
  business user whose team is working around the issue.
  Write the email setting expectations.

  Scenario 3 — Uncertain timeline:
  You're escalating a complex data recovery request. You honestly
  don't know how long it will take — it could be hours or days
  depending on what engineering finds.
  Write the message that's honest without causing panic.

  Scenario 4 — Timeline slip:
  You promised a customer they'd hear back within 24 hours. It's
  been 22 hours and engineering says they need another 48 hours.
  Write the proactive update message before the deadline passes.

  Part 3: The "no update" update
  Write a template for proactively reaching out when you have
  no new information but the customer is waiting. This is one of
  the hardest messages to write but most important.

assertions:
  - type: llm_judge
    criteria: "Expectations are specific — messages include who, when, how (channel), and what-if, not vague promises"
    weight: 0.30
    description: "Specific expectation setting"
  - type: llm_judge
    criteria: "The timeline slip is communicated proactively — the update goes out BEFORE the deadline, not after the customer has to chase"
    weight: 0.25
    description: "Proactive timeline communication"
  - type: llm_judge
    criteria: "The uncertain timeline message is honest without causing alarm — it explains the uncertainty while showing the situation is being actively worked"
    weight: 0.25
    description: "Honest uncertainty handling"
  - type: llm_judge
    criteria: "The 'no update' template is genuine — it acknowledges the wait, confirms active work, and gives a next check-in time"
    weight: 0.20
    description: "Genuine no-update communication"
