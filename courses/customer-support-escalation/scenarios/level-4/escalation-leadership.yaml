meta:
  id: escalation-leadership
  level: 4
  course: customer-support-escalation
  type: output
  description: "Lead an escalation team — hire, develop, and retain escalation specialists while building a culture of ownership, quality, and continuous improvement"
  tags: [support, escalation, leadership, hiring, team-building, expert]

state: {}

trigger: |
  Leading an escalation team is uniquely challenging. Escalation
  specialists handle the hardest cases, deal with the most
  frustrated customers, and carry the weight of being the "last
  line of defense." Burnout, turnover, and quality inconsistency
  are constant threats.

  Build and lead an escalation team for "TrustPay" — a fintech
  payment processing company:
  - Growing from 5 to 15 escalation specialists in 12 months
  - Industries served: e-commerce, SaaS, retail (each has unique
    regulatory requirements)
  - Escalation complexity: payment disputes, fraud investigation,
    regulatory compliance, enterprise SLA management
  - Current challenges: 40% annual turnover, inconsistent quality
    across specialists, no formal onboarding for escalation role

  1. Hiring the right escalation specialists:
     - Ideal candidate profile (skills, experience, personality)
     - Interview process design (including scenario-based assessment)
     - Write 3 interview scenarios and scoring rubrics
     - Onboarding program for new escalation specialists (8-week plan)
     - How escalation hiring differs from L1 hiring

  2. Team development and retention:
     - Career path: L2 specialist → Senior specialist → Escalation
       lead → Escalation manager → Support leadership
     - Skills development program (technical, interpersonal, industry)
     - Compensation strategy for escalation specialists
     - Recognition programs for excellent escalation handling
     - Burnout prevention (rotation, case load limits, mental health)

  3. Culture and quality:
     - Building a "resolution ownership" culture
     - Quality standards and calibration sessions
     - Peer mentoring and knowledge sharing
     - Blameless post-mortem culture for escalation failures
     - Celebrating difficult resolutions (not just easy wins)

  4. Performance management:
     - Balanced scorecard for escalation specialists
     - Metrics that don't create perverse incentives (e.g., speed
       shouldn't compromise quality)
     - Coaching conversations for underperformance
     - Performance improvement plans specific to escalation
     - When and how to move someone out of the escalation role

assertions:
  - type: llm_judge
    criteria: "Interview scenarios test escalation-specific skills — they assess judgment, empathy under pressure, and cross-team communication, not just knowledge"
    weight: 0.25
    description: "Escalation-specific hiring"
  - type: llm_judge
    criteria: "Burnout prevention is substantive — it includes specific measures like case load limits and rotation, not just 'we care about wellbeing'"
    weight: 0.25
    description: "Substantive burnout prevention"
  - type: llm_judge
    criteria: "Performance metrics don't create perverse incentives — speed metrics are balanced with quality, so specialists don't rush escalations to close faster"
    weight: 0.25
    description: "Balanced performance metrics"
  - type: llm_judge
    criteria: "The career path provides growth beyond specialist — there's a clear progression from specialist to leadership, reducing turnover"
    weight: 0.25
    description: "Career growth path"
