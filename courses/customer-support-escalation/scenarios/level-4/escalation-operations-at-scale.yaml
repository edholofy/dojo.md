meta:
  id: escalation-operations-at-scale
  level: 4
  course: customer-support-escalation
  type: output
  description: "Scale escalation operations — design systems that maintain quality and speed as ticket volume grows from thousands to hundreds of thousands per month"
  tags: [support, escalation, scale, operations, growth, expert]

state: {}

trigger: |
  Escalation processes that work at 5,000 tickets/month break at
  50,000. Scaling requires rethinking routing, staffing, automation,
  and quality assurance to handle volume without sacrificing the
  human touch that makes escalation effective.

  Design escalation operations for scale at "DataFlow" — a rapidly
  growing analytics SaaS:
  - Current: 8,000 tickets/month, 18% escalation rate, 40 agents
  - Projected: 50,000 tickets/month within 18 months
  - Customer segments: SMB (60%), Mid-market (30%), Enterprise (10%)
  - Current escalation team: 6 L2 specialists, 2 L3 engineers
  - Current escalation CSAT: 3.9 (target: 4.3)
  - Re-escalation rate: 22% (target: under 10%)

  1. Scale the escalation team structure:
     - Organizational design for 50K tickets/month
     - Specialist pods vs. generalist escalation agents
     - L2/L3 staffing ratios based on projected volume
     - Escalation lead/manager roles and responsibilities
     - On-call rotation design for 24/7 coverage
     - Career progression path for escalation specialists

  2. Design the scaled routing system:
     - Intelligent routing based on issue type, customer segment,
       agent skills, and current workload
     - Load balancing across escalation teams
     - Priority queuing for enterprise vs. SMB escalations
     - Overflow handling during volume spikes
     - Cross-training to create flexible escalation capacity

  3. Quality at scale:
     - Automated quality scoring for escalation interactions
     - Statistical sampling for manual quality review
     - Real-time dashboards for escalation health monitoring
     - Agent coaching program scaled for larger team
     - Consistency standards across specialist pods

  4. Reduce the 22% re-escalation rate:
     - Analyze common re-escalation causes
     - Design interventions for each cause
     - Set milestone targets (22% → 15% → 10%)
     - Measure impact of each intervention

assertions:
  - type: llm_judge
    criteria: "The team structure scales realistically — the staffing model accounts for 6x volume growth with specific L2/L3 ratios based on escalation patterns"
    weight: 0.25
    description: "Realistic team scaling"
  - type: llm_judge
    criteria: "Intelligent routing goes beyond simple categorization — it considers agent skills, workload, customer segment, and issue complexity"
    weight: 0.25
    description: "Intelligent routing design"
  - type: llm_judge
    criteria: "Quality assurance scales with statistical sampling — not every escalation needs manual review, but the sampling strategy maintains oversight"
    weight: 0.25
    description: "Scalable quality assurance"
  - type: llm_judge
    criteria: "The re-escalation reduction plan is specific — it identifies causes and designs targeted interventions, not just aspirational targets"
    weight: 0.25
    description: "Targeted re-escalation reduction"
