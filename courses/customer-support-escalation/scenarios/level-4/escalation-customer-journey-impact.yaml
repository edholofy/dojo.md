meta:
  id: escalation-customer-journey-impact
  level: 4
  course: customer-support-escalation
  type: output
  description: "Analyze escalation's impact on the customer journey — understand how escalation experiences shape customer perception, loyalty, and lifetime value"
  tags: [support, escalation, customer-journey, loyalty, experience, expert]

state: {}

trigger: |
  An escalation is a defining moment in the customer journey.
  Research shows that customers who have a problem resolved through
  effective escalation can become MORE loyal than customers who
  never had a problem (the service recovery paradox). But poorly
  handled escalation is the #1 driver of churn.

  Part 1: Map escalation's impact on the customer journey

  For "AppVault" — a B2B SaaS platform with 50K customers:

  Customer journey data:
  - Customers who never escalated: 4% annual churn
  - Customers with well-handled escalation: 3% annual churn (!)
  - Customers with poorly handled escalation: 28% annual churn
  - NPS after good escalation: +15 points from pre-escalation
  - NPS after bad escalation: -35 points from pre-escalation
  - Expansion revenue after good escalation: 22% higher than avg
  - Referral rate after good escalation: 3x average

  1. Quantify the customer journey impact:
     - Calculate the LTV difference between good and bad escalation
     - Calculate the referral value of well-handled escalations
     - Calculate the expansion revenue opportunity
     - Calculate the total business value of escalation quality
     - Build the case: every dollar invested in escalation quality
       returns X dollars in customer lifetime value

  2. Design the "escalation experience":
     Just as companies design the purchase experience or onboarding
     experience, design the escalation experience:
     - The first moment: how the customer feels when they realize
       they need to escalate (minimize frustration)
     - The handoff: how context is transferred without the customer
       repeating (minimize effort)
     - The wait: how the customer is kept informed (minimize anxiety)
     - The resolution: how the solution is delivered (maximize
       satisfaction and confidence)
     - The follow-up: how the relationship is strengthened after
       (maximize loyalty and advocacy)
     For each moment: current state pain points, desired state
     experience, specific improvements.

  3. Build the service recovery program:
     Design specific recovery actions based on escalation severity:
     - Minor escalation recovery (e.g., longer wait than expected):
       proactive apology, small goodwill gesture
     - Moderate escalation recovery (e.g., bug that caused data
       issue): personal outreach, SLA credit, account review
     - Major escalation recovery (e.g., outage that impacted
       customer's customers): executive-level outreach, substantial
       credit, dedicated reliability commitment
     For each: actions, timing, personalization, measurement.

  4. Measure the impact:
     - Pre/post escalation NPS tracking
     - Escalation-to-churn correlation analysis
     - Recovery success rate (customer retained after escalation)
     - Expansion revenue influenced by escalation quality
     - Monthly escalation experience health scorecard

assertions:
  - type: llm_judge
    criteria: "The LTV calculation shows that good escalation creates more loyal customers — the 3% churn rate after good escalation vs. 4% for never-escalated is highlighted"
    weight: 0.25
    description: "Service recovery paradox quantified"
  - type: llm_judge
    criteria: "The escalation experience is designed as deliberately as a purchase experience — each moment has specific improvements, not just aspirational statements"
    weight: 0.25
    description: "Deliberately designed experience"
  - type: llm_judge
    criteria: "Service recovery actions are proportional — minor issues get small gestures while major issues get executive-level outreach"
    weight: 0.25
    description: "Proportional recovery actions"
  - type: llm_judge
    criteria: "Measurement tracks business outcomes — not just CSAT after escalation but churn, expansion, and referral rates are measured"
    weight: 0.25
    description: "Business outcome measurement"
