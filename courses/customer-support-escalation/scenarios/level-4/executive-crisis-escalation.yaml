meta:
  id: executive-crisis-escalation
  level: 4
  course: customer-support-escalation
  type: output
  description: "Manage executive-level crisis escalation — coordinate C-suite communication, board notifications, and multi-stakeholder crisis response"
  tags: [support, escalation, executive, crisis, c-suite, expert]

state: {}

trigger: |
  When escalation reaches the executive level, the stakes are
  highest: brand reputation, customer relationships worth millions,
  regulatory exposure, and potential legal liability. Executive
  escalation requires precise communication, strategic thinking,
  and the ability to coordinate across the entire organization.

  Part 1: Executive escalation scenarios

  Scenario 1 — CEO escalation from a Fortune 100 customer:
  The CEO receives a direct email from the CIO of a Fortune 100
  customer ($2M ARR): "We've experienced 4 significant outages in
  the past quarter. Our team has lost confidence in your platform's
  reliability. We're beginning an evaluation of alternatives and
  will make a decision within 60 days. I'd like to discuss this
  directly with you."

  - Write the briefing document for the CEO:
    * Customer history, revenue, strategic importance
    * Outage timeline and root causes
    * What support/engineering have already done
    * What the customer has been told
    * Recommended talking points for the call
    * Proposed retention package
  - Write the CEO's response email
  - Design the cross-functional retention plan (engineering
    reliability commitment, dedicated support, SLA credits,
    executive sponsor assignment)
  - Write the 60-day save plan with milestones

  Scenario 2 — Board notification of systemic issue:
  Analysis reveals that a product defect has been silently
  corrupting customer data for 3 months. 2,000 customers are
  affected. The board needs to be notified before the public
  disclosure.
  - Write the board notification memo
  - Design the customer notification sequence
  - Create the escalation response structure (incident commander,
    engineering, communications, legal, support)
  - Write the public disclosure statement

  Scenario 3 — Regulatory escalation:
  A government regulatory body has opened an investigation based
  on customer complaints about data handling practices. They've
  sent a formal information request.
  - Write the escalation to legal and the CEO
  - Design the response coordination structure
  - Write the internal communication to affected teams
  - Draft the customer FAQ for potential inquiries

assertions:
  - type: llm_judge
    criteria: "The CEO briefing is executive-ready — it provides the essential context, talking points, and recommended actions without unnecessary detail"
    weight: 0.25
    description: "Executive-ready briefing"
  - type: llm_judge
    criteria: "The 60-day retention plan has specific milestones — it's not just 'improve reliability' but concrete actions week by week"
    weight: 0.25
    description: "Milestone-driven retention plan"
  - type: llm_judge
    criteria: "The board notification is appropriately serious — it presents the scope, impact, and remediation plan without minimizing or catastrophizing"
    weight: 0.25
    description: "Appropriately serious board communication"
  - type: llm_judge
    criteria: "The regulatory response coordinates legal and communications — the information request is handled by legal while customer-facing communication is prepared"
    weight: 0.25
    description: "Coordinated regulatory response"
