meta:
  id: escalation-cost-optimization
  level: 4
  course: customer-support-escalation
  type: output
  description: "Optimize escalation costs — analyze the true cost of escalation, identify waste, and design a more cost-effective escalation operation without sacrificing quality"
  tags: [support, escalation, cost, optimization, efficiency, expert]

state: {}

trigger: |
  Escalation is expensive — each escalated ticket costs 3-5x more
  than a first-tier resolution. But cutting escalation costs without
  understanding the value they protect can be devastating to
  customer retention and satisfaction.

  Analyze and optimize escalation costs for "MetricsPro" — a
  business intelligence SaaS:
  - 20,000 tickets/month, 22% escalation rate (4,400 escalations)
  - L1 cost per ticket: $8
  - L2 cost per ticket: $28
  - L3 cost per ticket: $85
  - Management escalation cost: $120
  - Average escalation touches: 3.2 (before resolution)
  - Re-escalation rate: 18%
  - CSAT for escalated tickets: 3.6 (vs. 4.2 for non-escalated)
  - Churn rate after escalation: 15% (vs. 5% without escalation)
  - Average customer LTV: $12,000
  - Customer LTV saved by successful escalation: est. $8,400

  1. Calculate the true cost of escalation:
     - Direct costs: agent time, tool costs, management time
     - Indirect costs: customer wait time, satisfaction impact,
       churn risk, brand impact
     - Calculate: total annual escalation cost
     - Calculate: revenue protected by escalation (churn prevented)
     - Calculate: net cost/benefit of the escalation program

  2. Identify cost optimization opportunities:
     - Unnecessary escalations (what % could be resolved at L1?)
     - Re-escalations (each re-escalation adds a full cycle cost)
     - Over-engineering (using L3 when L2 could resolve)
     - Process inefficiency (multiple touches per escalation)
     For each: calculate the savings and implementation approach.

  3. Design the cost-optimized escalation model:
     - Target escalation rate: 15% (from 22%)
     - Target re-escalation rate: 8% (from 18%)
     - Target touches per escalation: 2.0 (from 3.2)
     - Investment needed to achieve these targets
     - Expected savings and ROI timeline
     - Quality safeguards (CSAT must improve, not decline)

  4. Build the CFO-ready business case:
     - Current state cost analysis
     - Proposed changes and investments
     - Projected savings (conservative, moderate, optimistic)
     - Implementation timeline and milestones
     - Risk factors and mitigation

assertions:
  - type: llm_judge
    criteria: "The cost analysis includes both direct and indirect costs — it calculates not just agent time but also churn risk and revenue protection"
    weight: 0.25
    description: "Complete cost analysis"
  - type: llm_judge
    criteria: "Revenue protected by escalation is quantified — the analysis shows that escalation saves revenue by preventing churn, not just creates costs"
    weight: 0.25
    description: "Revenue protection quantification"
  - type: llm_judge
    criteria: "Optimization targets are achievable — reducing escalation from 22% to 15% and re-escalation from 18% to 8% are ambitious but realistic with specific interventions"
    weight: 0.25
    description: "Achievable optimization targets"
  - type: llm_judge
    criteria: "Quality safeguards are explicit — the optimization explicitly states that CSAT must improve, preventing cost-cutting that hurts customers"
    weight: 0.25
    description: "Quality-protected cost optimization"
