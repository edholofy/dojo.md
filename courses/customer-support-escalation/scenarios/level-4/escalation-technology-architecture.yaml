meta:
  id: escalation-technology-architecture
  level: 4
  course: customer-support-escalation
  type: output
  description: "Architect escalation technology — evaluate, implement, and integrate tools for escalation routing, tracking, automation, and analytics"
  tags: [support, escalation, technology, architecture, tools, expert]

state: {}

trigger: |
  The right technology stack transforms escalation from a manual,
  error-prone process into a streamlined, data-driven operation.
  The architecture must support routing, tracking, automation,
  reporting, and cross-team coordination.

  Design the escalation technology architecture for "SafeGuard" —
  a cybersecurity SaaS company migrating from Zendesk to a more
  sophisticated escalation stack:
  - 25,000 tickets/month, 20% escalation rate (5,000 escalations)
  - Current pain: manual routing, lost context during transfers,
    no escalation analytics, no SLA tracking per escalation tier
  - Budget: $150K annual for escalation technology

  1. Evaluate and recommend the escalation tech stack:
     Core platform: Help desk with native escalation capabilities
     Compare for this use case:
     - Zendesk with Escalation workflows
     - Freshdesk with Advanced ticket routing
     - Intercom with Custom workflows
     - Jira Service Management with escalation tiers
     Evaluation criteria: routing flexibility, SLA tracking per
     tier, cross-team collaboration, automation capabilities,
     API/integration depth, reporting, pricing at 5K escalations/month.

  2. Design the integration architecture:
     - Help desk ↔ Engineering tools (Jira, Linear) for L3 escalation
     - Help desk ↔ CRM (Salesforce) for account context
     - Help desk ↔ Communication (Slack) for real-time alerts
     - Help desk ↔ Analytics (Looker/Tableau) for escalation reporting
     - Help desk ↔ PagerDuty for on-call escalation
     Map data flows, sync frequency, and critical integrations.

  3. Design the escalation dashboard:
     Real-time escalation command center:
     - Active escalations by tier, team, and priority
     - SLA health across all open escalations
     - Agent workload and availability
     - Escalation trend (hour/day/week)
     - Customer impact score for prioritization
     - Bottleneck identification (where do escalations stall?)

  4. Implementation plan:
     Phase 1 (weeks 1-4): Core platform migration
     Phase 2 (weeks 5-8): Routing and SLA automation
     Phase 3 (weeks 9-12): Cross-team integrations
     Phase 4 (weeks 13-16): Analytics and optimization
     For each: tasks, risks, success criteria, rollback plan.

assertions:
  - type: llm_judge
    criteria: "Platform evaluation considers cybersecurity-specific needs — SLA tracking per escalation tier and cross-team engineering collaboration are prioritized"
    weight: 0.25
    description: "Industry-specific evaluation"
  - type: llm_judge
    criteria: "The integration architecture eliminates context loss — data flows ensure that customer history, account value, and previous interactions follow the escalation"
    weight: 0.25
    description: "Context-preserving integrations"
  - type: llm_judge
    criteria: "The dashboard identifies bottlenecks — it shows where escalations stall, not just how many are open"
    weight: 0.25
    description: "Bottleneck identification dashboard"
  - type: llm_judge
    criteria: "The implementation plan includes rollback — each phase has risk mitigation and a way to revert if things go wrong"
    weight: 0.25
    description: "Risk-aware implementation"
