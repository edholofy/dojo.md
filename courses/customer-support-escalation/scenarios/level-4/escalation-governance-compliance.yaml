meta:
  id: escalation-governance-compliance
  level: 4
  course: customer-support-escalation
  type: output
  description: "Design escalation governance and compliance — create oversight structures, audit processes, and regulatory compliance frameworks for escalation operations"
  tags: [support, escalation, governance, compliance, audit, expert]

state: {}

trigger: |
  Escalation governance ensures consistency, compliance, and
  accountability across the entire escalation operation. In
  regulated industries, escalation handling is subject to audit,
  and non-compliance can result in significant penalties.

  Design the governance framework for "HealthSync" — a healthcare
  IT company (HIPAA-regulated, SOC 2 certified):
  - 35,000 tickets/month across 200 healthcare provider customers
  - Escalation rate: 15% (5,250 escalations/month)
  - Regulatory requirements: HIPAA, HITECH, state privacy laws
  - Audit frequency: SOC 2 annual, HIPAA annually, customer audits
    quarterly

  1. Escalation governance structure:
     - Escalation review board (who, frequency, authority)
     - Escalation policy ownership and update process
     - Decision-making framework (RACI for escalation decisions)
     - Exception management (who can override escalation policies?)
     - Change management (how are escalation processes updated?)

  2. Compliance requirements for escalation:
     - PHI handling during escalation (HIPAA requirements)
     - Data minimization in escalation notes (need-to-know basis)
     - Escalation audit trail requirements (who accessed what, when)
     - Cross-border data considerations (if escalation goes to
       offshore team)
     - Breach notification escalation (mandatory reporting timelines)
     - Customer right to escalate (regulatory requirements)

  3. Audit readiness:
     - Escalation documentation standards for audit compliance
     - Audit trail integrity (tamper-proof logging)
     - Regular self-assessments (monthly internal audit checklist)
     - Audit response procedure (when auditors request escalation
       records)
     - Remediation tracking for audit findings

  4. Continuous improvement governance:
     - Monthly escalation quality metrics review
     - Quarterly policy and process review
     - Annual governance framework assessment
     - Stakeholder feedback integration (agents, customers, teams)
     - Benchmarking against industry standards

assertions:
  - type: llm_judge
    criteria: "PHI handling in escalation is specifically addressed — escalation notes can't contain unnecessary PHI, and data minimization is enforced"
    weight: 0.30
    description: "HIPAA-compliant escalation handling"
  - type: llm_judge
    criteria: "Audit readiness is practical — documentation standards and self-assessment checklists prepare the team for audits, not just react to them"
    weight: 0.25
    description: "Proactive audit readiness"
  - type: llm_judge
    criteria: "The governance structure has clear RACI — who is responsible, accountable, consulted, and informed for escalation decisions is defined"
    weight: 0.25
    description: "Clear RACI governance"
  - type: llm_judge
    criteria: "Cross-border data considerations are addressed — escalation to offshore teams has specific HIPAA and data residency requirements"
    weight: 0.20
    description: "Cross-border data compliance"
