meta:
  id: complex-escalation-simulation
  level: 4
  course: customer-support-escalation
  type: output
  description: "Navigate a complex multi-day escalation simulation — manage interconnected escalations across crisis response, customer retention, regulatory compliance, and organizational change"
  tags: [support, escalation, simulation, complex, multi-thread, expert]

state: {}

trigger: |
  You are the Head of Escalation at "NetSecure" — a cybersecurity
  SaaS company ($80M ARR, 5,000 B2B customers, 120-person support
  team). Navigate a critical week:

  MONDAY:
  Thread 1 — Customer escalation cascade:
  Your top 3 customers (combined $5M ARR) simultaneously report
  that the latest security patch broke their SSO integrations.
  Their employees can't log in. All three have 2-hour resolution
  SLAs.
  Task: Design the immediate response and escalation coordination
  for all three customers with a shared root cause.

  Thread 2 — Regulatory inquiry:
  A European data protection authority requests documentation of
  your escalation procedures as part of an industry-wide GDPR
  compliance review. Response due in 14 days.
  Task: Begin preparing the response documentation.

  WEDNESDAY:
  Thread 1 update: Engineering identifies the root cause (SSO
  library compatibility issue). Fix available but requires
  customer-side configuration changes. One customer's IT team
  is resistant to making changes ("your update broke it, you
  fix it"). SLA has already breached for 2 of 3 customers.
  Task: Handle the resistant customer and the SLA breaches.

  Thread 3 — Internal escalation crisis:
  Three escalation specialists resign in the same week (burnout,
  better offers, relocation). Your escalation team capacity drops
  25%. The remaining team is already overloaded from Thread 1.
  Task: Create an emergency staffing plan while maintaining
  escalation quality.

  FRIDAY:
  Thread 1 resolution: All three customers are back online.
  One is threatening contract renegotiation due to SLA breaches.
  Task: Design the retention and recovery strategy.

  Thread 4 — Strategic initiative:
  CEO asks you to present an "Escalation Excellence" program to
  the board. They want to position superior escalation handling
  as a competitive differentiator.
  Task: Create the board presentation concept.

  End of week: Write your executive summary covering all 4 threads.

assertions:
  - type: llm_judge
    criteria: "The shared root cause response coordinates all three customers together — the engineering fix is developed once and deployed to all three, with communication tailored to each"
    weight: 0.25
    description: "Coordinated multi-customer response"
  - type: llm_judge
    criteria: "The resistant customer is handled diplomatically — the response acknowledges their frustration while explaining why customer-side changes are necessary"
    weight: 0.25
    description: "Diplomatic resistant customer handling"
  - type: llm_judge
    criteria: "The emergency staffing plan maintains quality — it doesn't just redistribute workload but includes temporary measures like overtime, cross-training, and hiring acceleration"
    weight: 0.25
    description: "Quality-maintaining emergency staffing"
  - type: llm_judge
    criteria: "The executive summary synthesizes all threads coherently — it presents a clear picture of the week's challenges, actions, outcomes, and remaining risks"
    weight: 0.25
    description: "Coherent multi-thread synthesis"
