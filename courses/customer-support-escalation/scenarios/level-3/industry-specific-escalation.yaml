meta:
  id: industry-specific-escalation
  level: 3
  course: customer-support-escalation
  type: output
  description: "Navigate industry-specific escalation requirements — handle escalations in regulated industries where compliance, safety, and legal requirements shape the process"
  tags: [support, escalation, industry-specific, regulated, compliance, advanced]

state: {}

trigger: |
  Escalation processes vary dramatically by industry. Healthcare
  requires HIPAA-compliant handoffs. Finance demands regulatory
  documentation. E-commerce prioritizes speed. Each industry has
  unique legal, safety, and regulatory requirements.

  Part 1: Handle industry-specific escalation scenarios

  Scenario 1 — Healthcare (HIPAA-compliant):
  A patient calls a telehealth platform's support line: "I received
  someone else's lab results in my patient portal. I can see their
  name, diagnosis, and medication list."
  - Escalate while maintaining HIPAA compliance
  - Write the escalation to compliance, IT security, and the
    affected patient's care team
  - Document without putting PHI in the support ticket
  - Draft the notification to the affected patient
  - Report to HIPAA Privacy Officer (mandatory breach notification)

  Scenario 2 — Financial services (regulatory):
  A banking app customer reports: "I transferred $5,000 to the
  wrong account number yesterday. I need it reversed immediately."
  - Escalate under financial fraud/error protocols
  - Navigate Regulation E requirements (Electronic Fund Transfer Act)
  - Write the escalation to the fraud team with urgency levels
  - Set expectations around investigation timeline
  - Document for regulatory compliance

  Scenario 3 — SaaS (technical + enterprise):
  An enterprise customer's admin reports their SAML SSO integration
  is misconfigured after a provider update, locking out 2,000
  employees from critical business tools. It's 8 AM their time,
  business is halted.
  - Escalate through technical tiers with enterprise SLA urgency
  - Coordinate with the customer's IT team and your engineering
  - Write the escalation bridge/war room setup
  - Provide temporary access workaround while fixing root cause

  Scenario 4 — E-commerce (time-sensitive + emotional):
  A customer ordered a custom engagement ring ($3,500) for a
  proposal next Saturday. The tracking shows it was delivered to
  the wrong address. The customer is in tears.
  - Escalate combining logistics, emotional support, and urgency
  - Navigate the shipping investigation while providing emotional
    support
  - Design a recovery plan (replacement? expedited reshipment?)
  - Write the communication that balances empathy with process

assertions:
  - type: llm_judge
    criteria: "The HIPAA scenario follows breach notification requirements — the Privacy Officer is notified, PHI is not placed in standard support tickets, and the affected patient is notified"
    weight: 0.25
    description: "HIPAA-compliant escalation"
  - type: llm_judge
    criteria: "The financial scenario references Regulation E — the response understands that electronic fund transfer errors have specific regulatory timelines and processes"
    weight: 0.25
    description: "Regulatory-aware financial escalation"
  - type: llm_judge
    criteria: "The SSO lockout gets immediate workaround plus root cause fix — 2,000 employees can't wait for a permanent fix, so temporary access is provided"
    weight: 0.25
    description: "Workaround plus root cause approach"
  - type: llm_judge
    criteria: "The engagement ring scenario balances emotional support with logistics — the response acknowledges the emotional weight of the situation, not just the package tracking"
    weight: 0.25
    description: "Emotional-logistical balance"
