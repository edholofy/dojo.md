meta:
  id: predictive-escalation
  level: 3
  course: customer-support-escalation
  type: output
  description: "Design predictive escalation systems — use data signals to identify issues likely to escalate before the customer requests it, enabling proactive intervention"
  tags: [support, escalation, predictive, ai, proactive, advanced]

state: {}

trigger: |
  Predictive escalation uses customer behavior signals, ticket
  content analysis, and historical patterns to identify issues
  that are likely to escalate — before the customer asks for
  a manager. Early intervention can resolve issues faster and
  improve customer satisfaction.

  Part 1: Predictive escalation signals
  1. Customer behavior signals:
     - Multiple contacts about the same issue
     - Increasing message length or emotional language
     - Previous escalation history
     - Account tenure and value (high-value customers expect more)
     - Time since last response (patience depleting)
  2. Ticket content signals:
     - Negative sentiment keywords ("unacceptable," "frustrated")
     - Legal/regulatory language ("GDPR," "lawsuit," "attorney")
     - Competitive mentions ("switching to [competitor]")
     - Financial impact mentions ("costing me money")
  3. Systemic signals:
     - Known outage or bug affecting the customer's setup
     - SLA approaching or breached
     - Previous agent noted complexity
     - Issue category with high historical escalation rate

  Part 2: Design a predictive escalation system

  For a SaaS company with 10,000 tickets/month:

  1. Design the scoring model:
     - List all signals and assign weights
     - Define score thresholds (green/yellow/red)
     - Specify actions triggered at each threshold
     - Example: Score > 80 = auto-route to senior agent
     - Example: Score > 60 = flag for supervisor review

  2. Design proactive intervention workflows:
     - When a ticket hits "yellow" (likely to escalate):
       What proactive steps does the agent take?
     - When a ticket hits "red" (very likely to escalate):
       What automated and manual actions trigger?
     - Write the proactive outreach templates for each scenario

  3. Measure the system's effectiveness:
     - Metrics: escalation prevention rate, false positive rate,
       customer satisfaction for predicted vs. non-predicted
     - A/B test design: predicted-and-intervened vs. control group
     - Feedback loop: how do outcomes improve the model?

  Part 3: AI-assisted escalation routing
  1. NLP-based ticket classification for auto-routing
  2. Sentiment analysis for real-time escalation alerts
  3. Historical pattern matching for similar ticket outcomes
  4. Agent skill matching for optimal escalation routing

assertions:
  - type: llm_judge
    criteria: "The scoring model uses multiple signal types — customer behavior, ticket content, and systemic signals are all weighted and combined into a practical score"
    weight: 0.30
    description: "Multi-signal scoring model"
  - type: llm_judge
    criteria: "Threshold actions are graduated — yellow triggers proactive agent steps, red triggers automatic routing, not binary escalate/don't-escalate"
    weight: 0.25
    description: "Graduated threshold actions"
  - type: llm_judge
    criteria: "The measurement framework includes false positives — the system accounts for the cost of over-predicting escalation (unnecessary senior agent involvement)"
    weight: 0.25
    description: "False positive awareness"
  - type: llm_judge
    criteria: "The feedback loop improves the model — outcomes are used to refine signal weights and thresholds over time"
    weight: 0.20
    description: "Self-improving feedback loop"
