meta:
  id: escalation-root-cause-analysis
  level: 3
  course: customer-support-escalation
  type: output
  description: "Perform root cause analysis on escalation patterns — identify systemic issues driving escalation volume and design interventions to address them"
  tags: [support, escalation, root-cause, analysis, patterns, advanced]

state: {}

trigger: |
  Individual escalations solve individual problems. Root cause
  analysis of escalation patterns solves systemic problems. A
  single RCA that eliminates a category of escalation can save
  thousands of hours annually.

  Part 1: RCA methodology for escalations
  1. Data collection: categorize escalations by reason, team,
     outcome, customer segment, time, agent
  2. Pattern identification: what clusters emerge?
  3. Root cause techniques: 5 Whys, fishbone diagram, Pareto
  4. Intervention design: what change addresses the root cause?
  5. Impact measurement: did the intervention work?

  Part 2: Analyze escalation data and identify root causes

  Dataset (last 90 days, SaaS company, 2,500 escalations):

  By reason:
  - Refund authority exceeded: 680 (27.2%)
  - Technical beyond L1 capability: 525 (21.0%)
  - Customer demands manager: 420 (16.8%)
  - Policy exception needed: 310 (12.4%)
  - Cross-department coordination: 275 (11.0%)
  - Compliance/legal concern: 165 (6.6%)
  - Other: 125 (5.0%)

  By outcome:
  - Resolved by L2 within SLA: 55%
  - Resolved by L2 beyond SLA: 20%
  - Re-escalated to L3/management: 15%
  - Customer churned during escalation: 10%

  By agent (top escalators):
  - Agent A: 280 escalations (avg team: 100)
  - Agent B: 250 escalations
  - Agent C: 220 escalations
  - Agent D: 45 escalations (lowest)

  Additional data:
  - 40% of "customer demands manager" resolved without manager
    intervention (the L2 agent resolved it)
  - 60% of "refund authority exceeded" were for amounts $26-$50
    (agent limit is $25)
  - Re-escalation rate highest for technical issues (35%)
  - 10% churn rate during escalation = ~$250K annual revenue loss

  1. Perform the analysis:
     - Apply Pareto principle (which causes drive 80% of escalations?)
     - Run 5 Whys on the top 3 causes
     - Calculate the cost of each escalation category
     - Identify the highest-ROI interventions

  2. Design intervention plan:
     - For each root cause: proposed fix, implementation cost,
       expected escalation reduction, timeline
     - Prioritize by ROI
     - Identify quick wins vs. structural changes

  3. Create the RCA presentation for leadership:
     - Current state with data visualization
     - Root causes identified
     - Proposed interventions with expected impact
     - Investment required vs. cost savings
     - Implementation timeline

assertions:
  - type: llm_judge
    criteria: "The Pareto analysis correctly identifies that refund authority and technical capability drive nearly 50% of escalations — these are the highest-ROI targets"
    weight: 0.30
    description: "Correct Pareto analysis"
  - type: llm_judge
    criteria: "The 5 Whys dig to actual root causes — refund authority limit of $25 when 60% of escalated refunds are $26-$50 points to a policy fix, not a training fix"
    weight: 0.25
    description: "Deep root cause identification"
  - type: llm_judge
    criteria: "The high-escalation agents are analyzed fairly — Agent A's 280 escalations might indicate a training need, or might indicate they handle the hardest tickets"
    weight: 0.25
    description: "Fair agent analysis"
  - type: llm_judge
    criteria: "The churn-during-escalation cost ($250K) is used to justify investment — the business case connects escalation improvement to revenue retention"
    weight: 0.20
    description: "Revenue-justified investment"
