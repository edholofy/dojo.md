meta:
  id: escalation-shift-advanced
  level: 3
  course: customer-support-escalation
  type: output
  description: "Simulate an advanced escalation management shift — handle overlapping crises, resource constraints, and complex multi-thread escalation coordination"
  tags: [support, escalation, simulation, advanced-shift, crisis, advanced]

state: {}

trigger: |
  You're the senior escalation manager on a Friday afternoon.
  Half the team is out for a holiday weekend. Multiple situations
  are developing simultaneously.

  Resources available:
  - 2 L2 agents (one billing, one general — technical specialist
    is on PTO)
  - 1 team lead (available but also covering another team)
  - Engineering on-call (but they're already handling a SEV 2)
  - Legal team: email only, responds within 4 hours
  - You (can handle escalations directly if needed)

  Timeline of events:

  2:00 PM — Developing situation:
  Social media team alerts you: a customer's negative experience
  thread on Reddit is gaining traction (2,000 upvotes in 3 hours).
  The customer claims they were promised a feature during the
  sales process that doesn't exist. Screenshots of sales emails
  are included.

  2:15 PM — Incoming escalation:
  Enterprise customer (top 10 account, $250K ARR) reports their
  entire data analytics module is showing incorrect numbers.
  They're presenting to their board on Monday using this data.
  Engineering on-call is already occupied with the SEV 2.

  2:30 PM — Escalating crisis:
  The Reddit thread has been picked up by a tech news website.
  A reporter has emailed your press@company email asking for
  comment. The sales VP wants to know "how did this happen?"

  2:45 PM — New escalation:
  A customer in the EU submits a GDPR erasure request. They're a
  free trial user who also has a pending support ticket about a
  billing error during their trial.

  3:00 PM — Situation worsens:
  The enterprise customer's CTO calls your main phone line directly
  and is transferred to you. They're upset: "If I present wrong
  numbers to my board, heads will roll — including the decision
  to use your product."

  Handle the full afternoon:
  1. Prioritize all situations with reasoning
  2. Allocate your limited resources
  3. Write key communications for each thread
  4. Identify what you personally handle vs. delegate
  5. Write the end-of-day executive summary
  6. Prepare the Monday morning handoff

assertions:
  - type: llm_judge
    criteria: "The enterprise CTO call gets personal attention — a $250K ARR customer facing a board presentation crisis needs the senior person, not delegation"
    weight: 0.25
    description: "Enterprise CTO personal handling"
  - type: llm_judge
    criteria: "The Reddit situation is managed across PR, sales, and support — the reporter inquiry, the sales VP's question, and the customer's complaint are all addressed"
    weight: 0.25
    description: "Multi-team Reddit crisis management"
  - type: llm_judge
    criteria: "Resource constraints are acknowledged and managed — the response doesn't pretend all situations can be handled simultaneously with limited staff"
    weight: 0.25
    description: "Realistic resource constraint management"
  - type: llm_judge
    criteria: "The GDPR request isn't deprioritized despite being less urgent — the 30-day regulatory deadline is noted even while handling more immediate crises"
    weight: 0.25
    description: "Regulatory compliance maintained"
