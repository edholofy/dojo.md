meta:
  id: escalation-automation
  level: 3
  course: customer-support-escalation
  type: output
  description: "Design escalation automation — create rules, workflows, and AI-assisted routing that handle routine escalations automatically while preserving quality"
  tags: [support, escalation, automation, workflows, routing, advanced]

state: {}

trigger: |
  Automation can handle the mechanics of escalation — routing,
  notification, SLA tracking, and documentation — freeing agents
  to focus on the human elements: empathy, judgment, and creative
  problem-solving.

  Part 1: Escalation automation opportunities
  1. Auto-routing based on ticket category and complexity
  2. SLA-triggered escalation (auto-escalate at threshold)
  3. Sentiment-based routing (angry → senior agent)
  4. Skill-based routing (technical → technical specialist)
  5. Priority-based routing (VIP → priority queue)
  6. Notification automation (alert teams, update customers)

  Part 2: Design escalation automation for a support platform

  For a SaaS company using Zendesk, design the following
  automation rules:

  1. Auto-escalation rules:
     - SLA-triggered: When a ticket reaches 80% of SLA time,
       automatically escalate to next tier
     - Keyword-triggered: When customer uses "lawyer," "lawsuit,"
       "attorney," auto-route to legal queue
     - Repeat-contact: When a customer contacts 3+ times about
       the same issue, auto-escalate to senior agent
     - Revenue-triggered: When the ticket is from a customer with
       ARR > $50K, auto-route to VIP queue

     For each rule: define the trigger condition, the action,
     exceptions, and potential false positive handling.

  2. Notification workflows:
     - Agent notification when assigned an escalation
     - Manager notification when SLA is at risk
     - Customer notification when escalation is created
     - Team notification when crisis-level escalation triggers
     - Daily digest of open escalations for team leads

     For each: define timing, channel, content, and recipients.

  3. Escalation routing decision tree:
     Design an automated routing decision tree that examines:
     - Ticket category → appropriate team
     - Customer tier → priority level
     - Issue severity → urgency level
     - Agent availability → assignment
     - Time of day → on-call routing

  4. Quality safeguards:
     - When should automation be overridden by human judgment?
     - How to handle edge cases that don't fit rules?
     - Monitoring for automation errors (wrong routing)
     - Regular audit of automation effectiveness

assertions:
  - type: llm_judge
    criteria: "Automation rules include false positive handling — the keyword trigger for 'lawyer' won't auto-escalate a customer saying 'I'm a lawyer by profession'"
    weight: 0.30
    description: "False positive handling"
  - type: llm_judge
    criteria: "The routing decision tree is comprehensive — it considers category, customer tier, severity, availability, and time of day in a logical sequence"
    weight: 0.25
    description: "Comprehensive routing logic"
  - type: llm_judge
    criteria: "Quality safeguards preserve human judgment — automation handles mechanics but humans can override when edge cases don't fit the rules"
    weight: 0.25
    description: "Human override preservation"
  - type: llm_judge
    criteria: "Notification timing is appropriate — urgent notifications are immediate while digest summaries are daily, not everything is treated as urgent"
    weight: 0.20
    description: "Appropriate notification timing"
