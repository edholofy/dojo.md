meta:
  id: escalation-training-program
  level: 3
  course: customer-support-escalation
  type: output
  description: "Design an escalation training program — create curriculum, role-play scenarios, and certification for agents to master escalation skills"
  tags: [support, escalation, training, curriculum, certification, advanced]

state: {}

trigger: |
  Effective escalation handling is a trained skill, not an innate
  ability. A structured training program ensures consistency,
  reduces unnecessary escalations, and gives agents confidence
  to handle difficult situations.

  Design a comprehensive escalation training program for a support
  team of 30 agents across L1 and L2 tiers.

  1. New hire escalation training (Week 2 of onboarding):
     - Day 1: Escalation fundamentals
       (types, tiers, when/why, documentation standards)
     - Day 2: De-escalation techniques
       (HEARD framework, emotional intelligence, active listening)
     - Day 3: Hands-on practice
       (role-play 10 escalation scenarios with feedback)
     Create the curriculum outline, learning objectives, and
     3 role-play scenarios with model answers.

  2. Ongoing escalation skills development (monthly):
     - Escalation case review sessions (review real cases, good/bad)
     - New policy/process training (when escalation rules change)
     - Advanced de-escalation workshops (quarterly)
     - Cross-department shadowing (understand what happens after
       you escalate — shadow engineering, billing, legal for 2 hours)
     Create the monthly calendar and session design for one quarter.

  3. Escalation certification program:
     - Level 1 certification: can handle standard escalations
     - Level 2 certification: can handle complex/multi-team escalations
     - Level 3 certification: can handle crisis/legal/VIP escalations
     For each level:
     - Knowledge assessment (written test topics)
     - Practical assessment (scenarios to role-play)
     - Minimum experience requirements
     - Recertification cadence

  4. Escalation coaching framework:
     - Weekly 1:1 escalation review (manager reviews agent's
       escalation decisions from the past week)
     - Coaching script for addressing over-escalation
     - Coaching script for addressing under-escalation
     - Coaching script for improving escalation documentation

assertions:
  - type: llm_judge
    criteria: "The new hire training is practical — Day 3 role-plays simulate real escalation situations, not just theory"
    weight: 0.25
    description: "Practical new hire training"
  - type: llm_judge
    criteria: "Cross-department shadowing is included — agents understand what happens after they escalate, which improves their documentation and decision-making"
    weight: 0.25
    description: "Cross-department shadowing"
  - type: llm_judge
    criteria: "The certification levels are progressive — each level builds on the previous with increasing complexity and responsibility"
    weight: 0.25
    description: "Progressive certification levels"
  - type: llm_judge
    criteria: "Coaching scripts address both over-escalation and under-escalation — both failure modes are recognized as problems with different root causes"
    weight: 0.25
    description: "Balanced coaching approach"
