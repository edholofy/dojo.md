meta:
  id: cultural-escalation-differences
  level: 3
  course: customer-support-escalation
  type: output
  description: "Navigate cultural differences in escalation — understand how escalation expectations, communication styles, and authority perceptions vary across cultures"
  tags: [support, escalation, cultural, international, communication, advanced]

state: {}

trigger: |
  Escalation expectations vary significantly across cultures.
  What feels like assertive advocacy in one culture may feel like
  rude aggression in another. Understanding these differences is
  critical for global support teams.

  Part 1: Cultural dimensions affecting escalation
  1. Power distance (how comfortable customers are asking for
     a manager in high vs. low power-distance cultures)
  2. Directness vs. indirectness (explicit escalation requests
     vs. subtle dissatisfaction signals)
  3. Individualism vs. collectivism (personal complaint vs.
     group/company complaint)
  4. Time orientation (urgency expectations vary by culture)
  5. Relationship vs. task orientation (trust-building before
     resolution vs. immediate resolution focus)

  Part 2: Handle culturally varied escalation scenarios

  Scenario 1 — Japanese customer (indirect communication):
  A long-standing customer in Japan responds to your resolution
  attempt with: "Thank you for your kind explanation. I understand
  your position. I will consider this matter further."
  Context: In Japanese business culture, this polite response
  likely means they're dissatisfied but won't directly say so.
  - Interpret the underlying message
  - Write a response that addresses possible dissatisfaction
  - Determine if proactive escalation is appropriate even though
    the customer hasn't asked for it
  - Design a follow-up approach that respects cultural norms

  Scenario 2 — German customer (direct + process-oriented):
  "This is the third occurrence of this error in our billing. I
  require: 1) A written explanation of the root cause. 2) A
  corrective action plan with timeline. 3) Confirmation from
  your quality manager that this has been reviewed."
  - Respond to the structured request with equal precision
  - Determine which requests require escalation
  - Write the escalation that matches this customer's expectations
  - Design the follow-up cadence

  Scenario 3 — Brazilian customer (relationship-first):
  A customer starts with extended personal conversation before
  getting to their issue, mentions they've been loyal for 5 years,
  tells a story about how the product helped their business, and
  then mentions a problem almost as an afterthought.
  - Identify the actual issue beneath the relationship context
  - Respond in a culturally appropriate way (don't rush to resolution)
  - Determine if escalation is needed
  - Maintain the relationship while resolving the issue

  Scenario 4 — US customer (direct, escalation-ready):
  "I need this resolved today. If your system is broken, get me
  someone who can fix it. I've been going back and forth for a week
  and I'm done with the runaround."
  - Respond to the direct communication style
  - Assess whether escalation is actually needed or if faster
    resolution at current tier is the real request
  - Write the appropriate response

  Part 3: Building cultural competency
  1. Training agents on cultural signals
  2. Regional escalation path adaptations
  3. Language and tone calibration
  4. When cultural sensitivity conflicts with company policy

assertions:
  - type: llm_judge
    criteria: "The Japanese customer's indirect dissatisfaction is correctly read — the polite response is interpreted as unresolved dissatisfaction, and proactive follow-up is offered"
    weight: 0.30
    description: "Indirect communication interpretation"
  - type: llm_judge
    criteria: "The German customer receives structured, precise responses — the reply matches their communication style with clear action items and timelines"
    weight: 0.25
    description: "Process-oriented response matching"
  - type: llm_judge
    criteria: "The Brazilian customer's relationship context is respected — the response doesn't skip to resolution but acknowledges the loyalty story before addressing the issue"
    weight: 0.25
    description: "Relationship-first respect"
  - type: llm_judge
    criteria: "Cultural adaptation doesn't mean lowering standards — all customers get quality resolution regardless of communication style"
    weight: 0.20
    description: "Consistent quality across cultures"
