meta:
  id: escalation-metrics-reporting
  level: 3
  course: customer-support-escalation
  type: output
  description: "Build escalation metrics and reporting — track escalation rates, quality, outcomes, and trends to drive continuous improvement"
  tags: [support, escalation, metrics, reporting, analytics, advanced]

state: {}

trigger: |
  What gets measured gets managed. An escalation metrics program
  provides visibility into escalation health, identifies trends,
  and proves the ROI of improvement initiatives.

  Part 1: Core escalation metrics
  Design a comprehensive escalation metrics framework:

  1. Volume metrics:
     - Escalation rate (% of tickets escalated)
     - Escalation rate by tier (L1→L2, L2→L3, to management)
     - Escalation rate by channel (chat, email, phone)
     - Escalation rate by agent
     - Escalation rate by issue category
     Define targets and benchmarks for each.

  2. Quality metrics:
     - Escalation accuracy (was escalation necessary?)
     - Documentation completeness score
     - Routing accuracy (sent to correct team?)
     - De-escalation attempt rate (tried before escalating?)
     Define scoring criteria and target scores.

  3. Outcome metrics:
     - Time to escalation (how long before agent escalates)
     - Time to resolution after escalation
     - Re-escalation rate (escalated again after first attempt)
     - Customer satisfaction for escalated tickets vs. non-escalated
     - Churn rate for escalated customers
     Define targets and benchmarks.

  4. Trend metrics:
     - Escalation rate trend (weekly, monthly, quarterly)
     - New escalation categories emerging
     - Seasonal patterns in escalation
     - Correlation with product releases, outages, promotions

  Part 2: Build reporting dashboards

  1. Agent-level dashboard:
     What does an individual agent see about their own escalation
     performance? Design the view with specific metrics, comparisons,
     and improvement suggestions.

  2. Manager-level dashboard:
     What does a support manager need for weekly team review?
     Design the view with team aggregates, individual outliers,
     and trend analysis.

  3. Executive-level dashboard:
     What does the VP of Support present to leadership quarterly?
     Design the view focusing on business impact, improvement
     trends, and resource needs.

  Part 3: Using metrics to drive improvement
  1. Identifying training needs from metrics
  2. Justifying headcount or tool investment
  3. Proving escalation program ROI
  4. Setting realistic improvement targets

assertions:
  - type: llm_judge
    criteria: "Metrics cover volume, quality, outcomes, and trends — the framework isn't just 'escalation rate' but a multi-dimensional view"
    weight: 0.30
    description: "Multi-dimensional metrics framework"
  - type: llm_judge
    criteria: "Dashboards serve different audiences — agents see their own performance, managers see team health, executives see business impact"
    weight: 0.25
    description: "Audience-appropriate dashboards"
  - type: llm_judge
    criteria: "Benchmarks and targets are provided — each metric has a reasonable target and industry benchmark for comparison"
    weight: 0.25
    description: "Benchmarked metrics"
  - type: llm_judge
    criteria: "Metrics connect to actionable improvements — the framework shows how to use data to identify training needs and justify investment"
    weight: 0.20
    description: "Actionable metrics usage"
