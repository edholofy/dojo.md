meta:
  id: crisis-escalation-protocols
  level: 3
  course: customer-support-escalation
  type: output
  description: "Design and execute crisis escalation protocols — handle major incidents, product recalls, data breaches, and PR crises with structured escalation procedures"
  tags: [support, escalation, crisis, protocols, incident-response, advanced]

state: {}

trigger: |
  Crisis escalation is fundamentally different from standard
  escalation. Speed, coordination, and communication precision
  become critical when the impact extends beyond a single customer
  to potentially thousands.

  Part 1: Crisis escalation framework
  1. Crisis severity levels:
     - SEV 1 (Critical): Full outage, data breach, safety risk
     - SEV 2 (Major): Partial outage, significant data issue
     - SEV 3 (Moderate): Degraded performance, workaround available
     - SEV 4 (Minor): Cosmetic issue, limited impact
  2. Escalation response matrix by severity
  3. War room protocol (who's in, roles, cadence)
  4. External communication protocols (customers, media, regulators)

  Part 2: Execute crisis escalation scenarios

  Scenario 1 — Data breach (SEV 1):
  At 2:00 AM, your monitoring system detects unauthorized database
  access. Preliminary analysis shows customer PII (names, emails,
  hashed passwords) for approximately 50,000 accounts may have been
  exposed. You're the on-call escalation lead.
  - Write the immediate escalation chain (who gets called, in order)
  - Write the initial incident brief
  - Draft the 1-hour, 4-hour, and 24-hour communication plans
  - Define the customer notification strategy
  - Address regulatory notification requirements (GDPR 72-hour rule)

  Scenario 2 — Product safety recall (SEV 1):
  A children's product is discovered to have a choking hazard.
  15,000 units have been sold. Three customer complaints mention
  children putting small parts in their mouths, but no injuries
  reported yet.
  - Write the escalation to executive leadership
  - Write the escalation to legal and product safety
  - Draft the customer notification (urgency + clarity)
  - Design the recall process through support channels
  - Plan for media inquiry handling

  Scenario 3 — Cascading outage (SEV 2):
  Your payment processing partner goes down at 10 AM on Black
  Friday. No orders can be processed. Estimated 500 customers per
  hour are affected. No ETA from the partner.
  - Write the escalation plan
  - Draft customer communication for affected transactions
  - Design the triage process for angry customers
  - Plan for service recovery once payments resume
  - Calculate estimated revenue impact for leadership

assertions:
  - type: llm_judge
    criteria: "The data breach response follows a structured incident process — security first, then assessment, then communication, with GDPR 72-hour notification addressed"
    weight: 0.30
    description: "Structured breach response"
  - type: llm_judge
    criteria: "The product safety recall prioritizes child safety — customer notification goes out immediately without waiting for a full investigation"
    weight: 0.25
    description: "Safety-first recall response"
  - type: llm_judge
    criteria: "The Black Friday outage includes revenue impact — leadership gets both the operational situation and the business impact quantified"
    weight: 0.25
    description: "Business impact quantification"
  - type: llm_judge
    criteria: "Communication plans are staged — different messages at different time intervals as more information becomes available"
    weight: 0.20
    description: "Staged crisis communication"
