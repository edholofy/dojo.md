meta:
  id: escalation-process-design
  level: 3
  course: customer-support-escalation
  type: output
  description: "Design a complete escalation process — create the policies, workflows, decision trees, and documentation standards for a support organization"
  tags: [support, escalation, process-design, policy, workflow, advanced]

state: {}

trigger: |
  A well-designed escalation process turns individual judgment
  calls into consistent, repeatable procedures. It gives agents
  confidence to make decisions and ensures customers receive
  predictable, quality experiences.

  Design the complete escalation process for "CloudOps" — a B2B
  SaaS company with:
  - 100 support agents (75 L1, 20 L2, 5 L3)
  - 4 specialist teams (billing, technical, security, compliance)
  - 15,000 tickets/month
  - Customer tiers: Starter, Professional, Enterprise
  - Current escalation rate: 28% (target: 18%)

  1. Escalation policy document:
     - Purpose and scope
     - Escalation types and definitions
     - Authority levels by tier (what each tier can do)
     - Escalation criteria (when to escalate, with specific rules)
     - SLA requirements per tier and customer level
     - Documentation requirements
     - Communication standards
     - Exceptions and override procedures

  2. Escalation decision tree:
     Create a visual-friendly decision tree that agents can follow:
     - Is this a safety/security issue? → Immediate escalation
     - Does this exceed my authority? → Escalate to appropriate tier
     - Has the customer requested a manager? → Attempt de-escalation
       first, then escalate if requested again
     - Am I stuck after X minutes? → Escalate with documentation
     Include at least 8 decision points with clear paths.

  3. Escalation templates:
     Create standardized templates for:
     - L1 → L2 escalation note
     - L2 → L3 escalation note
     - Escalation to management
     - Customer escalation acknowledgment
     - Customer escalation update (in progress)
     - Customer escalation resolution
     Each template should be practical and easy to fill out.

  4. Escalation governance:
     - Weekly escalation review meeting agenda
     - Monthly escalation quality audit process
     - Quarterly escalation process improvement cycle
     - Annual escalation policy review and update

assertions:
  - type: llm_judge
    criteria: "The escalation policy covers authority levels clearly — each tier knows exactly what they can and cannot do, eliminating ambiguity"
    weight: 0.30
    description: "Clear authority levels"
  - type: llm_judge
    criteria: "The decision tree is practical — agents can follow it in real-time without extensive interpretation"
    weight: 0.25
    description: "Practical decision tree"
  - type: llm_judge
    criteria: "Templates reduce documentation friction — they're structured enough to ensure completeness but not so rigid that agents spend more time filling them than helping customers"
    weight: 0.25
    description: "Friction-reducing templates"
  - type: llm_judge
    criteria: "Governance includes regular review — the process is designed to evolve through weekly, monthly, quarterly, and annual review cycles"
    weight: 0.20
    description: "Evolving governance process"
