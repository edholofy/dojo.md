meta:
  id: escalation-portfolio
  level: 5
  course: customer-support-escalation
  type: output
  description: "Create a professional escalation management portfolio — document expertise through case studies, frameworks, and measurable outcomes"
  tags: [support, escalation, portfolio, case-study, professional, mastery]

state: {}

trigger: |
  A professional portfolio demonstrates escalation mastery through
  documented outcomes, frameworks, and case studies.

  Create a portfolio demonstrating escalation management expertise:

  1. Case study — Escalation transformation:
     Write a STAR-format case study for transforming escalation at
     a fictional company "SalesForce Cloud" (CRM SaaS, $50M ARR):
     - Situation: 30% escalation rate, 3-day average resolution,
       20% customer churn after escalation, no formal process
     - Task: Reduce escalation rate to 15%, resolution to 1 day,
       churn after escalation to 8%
     - Actions: 9-month transformation story including process
       design, training program, technology implementation, cross-
       department SLAs, and predictive routing
     - Results: specific metrics showing improvement, revenue saved,
       CSAT improvement, team satisfaction increase
     Include lessons learned and what you'd do differently.

  2. Framework — Escalation Decision Matrix:
     Create a comprehensive decision matrix that any support
     organization can adopt:
     - Rows: issue categories (billing, technical, security, legal,
       product, service, relationship)
     - Columns: severity levels (low, medium, high, critical)
     - Cells: recommended action (L1 handle, L2 escalate, L3
       escalate, management, immediate crisis protocol)
     Include modifications for customer tier and time sensitivity.

  3. Playbook — Handling the "I want to speak to a manager":
     Write a complete playbook for the most common escalation
     trigger — the manager request:
     - Assessment: is this a genuine need or emotional request?
     - De-escalation: 3 techniques to try first
     - Graceful escalation: how to transfer if de-escalation fails
     - Manager prep: what the manager needs to know
     - Post-escalation: follow-up and relationship repair
     Include scripts, decision trees, and examples.

  4. Thought leadership piece:
     Write an 800-word article: "Why Your Best Agents Should
     Handle Escalations (Not Your Managers)" covering:
     - The myth that escalation requires management authority
     - How specialist escalation agents outperform managers
     - Building an escalation career path
     - The ROI of dedicated escalation teams

assertions:
  - type: llm_judge
    criteria: "The case study has specific metrics — before/after numbers for escalation rate, resolution time, churn, and CSAT show measurable impact"
    weight: 0.25
    description: "Metrics-driven case study"
  - type: llm_judge
    criteria: "The decision matrix is comprehensive and practical — any support org could adopt it by filling in their specific categories and thresholds"
    weight: 0.25
    description: "Adoptable decision matrix"
  - type: llm_judge
    criteria: "The manager request playbook provides actual scripts — agents can use the language directly, not just conceptual guidance"
    weight: 0.25
    description: "Script-equipped playbook"
  - type: llm_judge
    criteria: "The thought leadership article makes a counterintuitive argument with evidence — it challenges the assumption that managers should handle escalations"
    weight: 0.25
    description: "Evidence-backed thought leadership"
