meta:
  id: escalation-consultancy
  level: 5
  course: customer-support-escalation
  type: output
  description: "Act as an escalation consultant — audit an existing escalation operation, identify transformation opportunities, and deliver a strategic improvement roadmap"
  tags: [support, escalation, consultancy, audit, transformation, mastery]

state: {}

trigger: |
  You've been hired as a consultant to transform the escalation
  operation at "GlobalTech" — a mid-market SaaS company ($120M ARR,
  15,000 customers, 200-person support organization):

  Current state assessment:
  - Escalation rate: 35% (industry benchmark: 15-20%)
  - Re-escalation rate: 28% (benchmark: under 10%)
  - Average escalation resolution time: 5.2 days (benchmark: 1.5 days)
  - Escalation CSAT: 2.8/5.0 (overall CSAT: 3.6)
  - Customer churn after escalation: 32% within 90 days
  - Escalation team: 15 L2, 4 L3, no dedicated escalation manager
  - Tools: basic Zendesk with no escalation-specific automation
  - Documentation: no standardized escalation notes, no decision trees
  - Training: "shadow a senior agent for a week" — no formal program
  - No escalation metrics tracked beyond volume
  - Cross-department SLAs: non-existent (engineering responds "when
    they can")
  - Agent feedback: "I escalate because I don't know what else to do"

  Deliverables:

  1. Escalation audit report:
     - Current state diagnosis with data-driven root cause analysis
     - Benchmarking against industry standards
     - Quantified cost of poor escalation (churn, agent time, customer
       lifetime value lost)
     - Top 10 specific findings ranked by impact

  2. 6-month transformation roadmap:
     Month 1: Foundation (process design, documentation, metrics)
     Month 2: Training (certification program, decision trees)
     Month 3: Technology (automation, routing, tracking)
     Month 4: Cross-department (internal SLAs, integration)
     Month 5: Analytics (dashboards, predictive models)
     Month 6: Optimization (continuous improvement, advanced)
     For each: initiatives, investment, expected impact, risks.

  3. Quick wins document (30-day impact):
     Identify 5 changes that can show measurable improvement within
     30 days without significant investment.

  4. Business case for executive approval:
     - Total investment over 6 months
     - Expected ROI (churn reduction, efficiency, CSAT improvement)
     - Risk factors and mitigation
     - Success metrics and governance

assertions:
  - type: llm_judge
    criteria: "The audit identifies systemic root causes — the 35% escalation rate is traced to training gaps, missing documentation, and agent authority issues, not just 'too many tickets'"
    weight: 0.25
    description: "Systemic root cause identification"
  - type: llm_judge
    criteria: "The 6-month roadmap is phased logically — process and documentation come before technology, because automating a broken process makes it worse"
    weight: 0.25
    description: "Logically phased roadmap"
  - type: llm_judge
    criteria: "Quick wins are genuinely achievable in 30 days — they don't require new tools or headcount, just process changes and training"
    weight: 0.25
    description: "Achievable quick wins"
  - type: llm_judge
    criteria: "The business case quantifies churn cost — 32% churn after escalation × customer LTV shows the revenue at stake"
    weight: 0.25
    description: "Churn-quantified business case"
