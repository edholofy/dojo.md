meta:
  id: escalation-psychology
  level: 5
  course: customer-support-escalation
  type: output
  description: "Apply behavioral psychology to escalation — understand the psychology of frustrated customers, design psychologically informed escalation experiences, and build agent resilience"
  tags: [support, escalation, psychology, behavioral, resilience, mastery]

state: {}

trigger: |
  Escalation is fundamentally a psychological event. The customer
  has reached a point where their expectations were violated and
  they need someone with more power or expertise. Understanding
  the psychology behind escalation — both the customer's and the
  agent's — transforms how we design and deliver the experience.

  Part 1: Customer psychology during escalation
  1. Expectation violation theory: the gap between expected and
     actual experience creates emotional intensity
  2. Loss aversion in escalation: customers feel the "loss" of
     time and effort more intensely than the potential "gain" of
     resolution (2.5x more intensely per Kahneman)
  3. The peak-end rule: customers remember the most intense moment
     and the final moment of the escalation experience
  4. Procedural justice: customers care as much about HOW their
     issue is handled as WHAT the outcome is
  5. The IKEA effect reversed: effort invested in trying to resolve
     makes the frustration worse when it fails

  Part 2: Apply psychological principles

  1. Design the psychologically optimal escalation flow:
     - Reduce perceived loss: acknowledge time invested, validate effort
     - Create positive peaks: surprise with speed, personalization,
       or exceeding expectations at a key moment
     - End on a high note: the final interaction shapes memory
     - Ensure procedural justice: explain the process, give the
       customer a voice, show effort
     Map the flow with specific psychological techniques at each stage.

  2. Rewrite these escalation communications using psychology:

     Standard: "Your issue has been escalated to our specialist team.
     They will respond within 24 hours."
     Rewrite using: loss aversion reduction, procedural justice,
     and certainty creation.

     Standard: "I'm sorry but I need to transfer you to another
     department. Please hold."
     Rewrite using: framing effect, anchoring, and social proof.

     Standard: "The issue has been resolved. Is there anything else?"
     Rewrite using: peak-end rule, reciprocity, and future pacing.

  3. Agent psychological resilience:
     - Emotional labor of escalation handling (the cost of empathy)
     - Compassion fatigue and secondary traumatic stress
     - Cognitive reframing techniques for difficult interactions
     - Mindfulness practices between escalation calls
     - Team support rituals (debrief, recognition, peer support)
     - When to step away: recognizing personal emotional limits
     Design a resilience program for escalation specialists.

  Part 3: Ethical boundaries
  1. When psychological techniques become manipulation
  2. Transparency obligations to customers
  3. Agent autonomy and psychological safety
  4. Using psychology to help vs. to prevent legitimate escalation

assertions:
  - type: llm_judge
    criteria: "The psychologically optimal flow applies specific techniques at each stage — loss aversion reduction, peak creation, and positive endings are mapped to specific moments"
    weight: 0.25
    description: "Stage-mapped psychological techniques"
  - type: llm_judge
    criteria: "The rewrites demonstrate real psychological improvement — the new versions feel genuinely different and better, not just reworded"
    weight: 0.25
    description: "Genuinely improved rewrites"
  - type: llm_judge
    criteria: "Agent resilience addresses emotional labor specifically — compassion fatigue, cognitive reframing, and team support are practical, not just 'take care of yourself'"
    weight: 0.25
    description: "Practical agent resilience"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly drawn — the line between helpful psychology and manipulation is explicitly defined"
    weight: 0.25
    description: "Clear ethical boundaries"
