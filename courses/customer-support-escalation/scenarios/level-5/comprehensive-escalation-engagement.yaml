meta:
  id: comprehensive-escalation-engagement
  level: 5
  course: customer-support-escalation
  type: output
  description: "Complete a comprehensive escalation management engagement — from discovery through strategy, implementation, and measurement for a complex multi-product organization"
  tags: [support, escalation, comprehensive, engagement, capstone, mastery]

state: {}

trigger: |
  This is the capstone scenario. You are leading a comprehensive
  escalation transformation for "OmniSoft" — a software holding
  company with 3 product lines:

  Product A: "DevTools" — developer tools SaaS ($40M ARR, highly
  technical customers, complex escalations to engineering)
  Product B: "BizApps" — business applications ($60M ARR, non-
  technical customers, emotional escalations about workflow)
  Product C: "DataVault" — data management ($30M ARR, regulated
  industry customers, compliance-sensitive escalations)

  Combined: $130M ARR, 400-person support org, 60 escalation staff
  Current: each product has independent escalation processes,
  different tools, and different quality standards.

  The CRO wants to determine: should escalation be unified across
  products or remain independent?

  Phase 1 — Discovery:
  For each product, assess:
  - Unique escalation challenges and requirements
  - Current escalation metrics and performance
  - Customer expectations specific to each product
  - Regulatory or compliance requirements
  - Synergies with other products (shared customers: 15%)

  Phase 2 — Options analysis:
  Model A: Full unification (one escalation team, process, tool)
  Model B: Independent (status quo with improvements)
  Model C: Federated (shared platform, specialized pods)
  For each: benefits, risks, cost estimate, implementation time,
  customer impact.

  Phase 3 — Recommendation:
  Based on your analysis, recommend the optimal model with:
  - Implementation plan (phases, timeline)
  - Organization design (structure, roles, reporting)
  - Technology architecture
  - Change management approach
  - Success metrics at 6, 12, 18 months

  Phase 4 — Executive presentation:
  Create a 7-slide board presentation covering the recommendation.

  Phase 5 — Risk management:
  - Customer experience risks during transition
  - Agent retention risks during restructuring
  - Compliance risks (DataVault's regulatory requirements)
  - Technology migration risks
  - Mitigation strategy for each

assertions:
  - type: llm_judge
    criteria: "The discovery phase recognizes fundamental differences — DevTools needs technical depth, BizApps needs emotional intelligence, DataVault needs compliance expertise"
    weight: 0.25
    description: "Product-specific needs recognition"
  - type: llm_judge
    criteria: "The options analysis is balanced — full unification benefits from efficiency but risks losing specialized expertise, and this trade-off is clearly presented"
    weight: 0.25
    description: "Balanced options analysis"
  - type: llm_judge
    criteria: "DataVault's compliance requirements constrain the recommendation — regulatory requirements for data management can't be compromised by unification"
    weight: 0.25
    description: "Compliance-constrained recommendation"
  - type: llm_judge
    criteria: "Risk management includes agent retention — restructuring 60 escalation staff across 3 products creates real retention risk that must be addressed"
    weight: 0.25
    description: "Agent retention risk addressed"
