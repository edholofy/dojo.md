meta:
  id: escalation-maturity-model
  level: 5
  course: customer-support-escalation
  type: output
  description: "Build an escalation maturity model — create a framework any organization can use to assess, benchmark, and improve their escalation capabilities"
  tags: [support, escalation, maturity-model, framework, assessment, mastery]

state: {}

trigger: |
  A maturity model provides a structured way for organizations
  to assess where they are, understand where they need to go,
  and plan the journey from one level to the next.

  Create a comprehensive Escalation Maturity Model:

  1. Define 5 maturity levels:

     Level 1 — Ad Hoc:
     - Characteristics (how escalation works at this level)
     - Typical metrics (escalation rate, resolution time, CSAT)
     - Common pain points
     - What it takes to advance to Level 2

     Level 2 — Defined:
     - Processes documented, roles clear
     - Basic metrics tracked
     - Standard escalation paths established
     - What it takes to advance to Level 3

     Level 3 — Managed:
     - Quality assurance in place
     - Cross-department SLAs established
     - Training and certification programs
     - What it takes to advance to Level 4

     Level 4 — Optimized:
     - Data-driven continuous improvement
     - Automation and AI assistance
     - Predictive escalation capabilities
     - What it takes to advance to Level 5

     Level 5 — Innovative:
     - Escalation as competitive advantage
     - Zero-friction customer experience
     - AI-first with human oversight
     - Industry thought leadership

  2. Create the assessment tool:
     For each maturity level, create a checklist of capabilities:
     - People (skills, training, structure)
     - Process (policies, workflows, documentation)
     - Technology (tools, automation, analytics)
     - Measurement (metrics, reporting, governance)
     - Culture (ownership, quality, continuous improvement)
     Total: 50+ assessment items across all dimensions.

  3. Design the advancement playbooks:
     For each level transition (1→2, 2→3, 3→4, 4→5):
     - Key initiatives required
     - Typical timeline
     - Investment range
     - Common pitfalls
     - Success indicators

  4. Industry benchmarks:
     - Where most organizations fall today
     - Level distribution by industry
     - What best-in-class looks like
     - The business impact of advancing one level

assertions:
  - type: llm_judge
    criteria: "The 5 levels are clearly differentiated — each level has distinct characteristics that make it easy to determine where an organization falls"
    weight: 0.25
    description: "Clearly differentiated levels"
  - type: llm_judge
    criteria: "The assessment tool is comprehensive — 50+ items across people, process, technology, measurement, and culture provide a thorough evaluation"
    weight: 0.25
    description: "Comprehensive assessment tool"
  - type: llm_judge
    criteria: "Advancement playbooks include common pitfalls — each transition identifies what typically goes wrong, not just what should go right"
    weight: 0.25
    description: "Pitfall-aware advancement playbooks"
  - type: llm_judge
    criteria: "Industry benchmarks provide realistic context — organizations can see where peers are and what business impact to expect from improvement"
    weight: 0.25
    description: "Realistic industry benchmarks"
