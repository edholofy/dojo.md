meta:
  id: escalation-mastery-challenge
  level: 5
  course: customer-support-escalation
  type: output
  description: "Demonstrate mastery across all escalation disciplines — handle interconnected challenges spanning operations, technology, people, strategy, and crisis management"
  tags: [support, escalation, mastery, comprehensive, challenge, mastery]

state: {}

trigger: |
  This mastery challenge tests your ability to connect all aspects
  of escalation management. You are the VP of Customer Operations
  at "FinanceFlow" — a financial services SaaS handling sensitive
  financial data (PCI DSS, SOX compliant).

  Challenge 1 — Operational audit (30 minutes):
  Analyze these metrics and identify the 3 most critical issues:
  - 40,000 tickets/month, 25% escalation rate
  - L1→L2 accounts for 70% of escalations
  - L2→L3 re-escalation rate: 30%
  - Average L2 handling time: 4.5 hours (benchmark: 1.5 hours)
  - 60% of escalations are billing-related
  - Agent authority: refunds up to $20 (average customer value $500/mo)
  - No cross-department SLAs exist
  - Engineering response to escalated bugs: average 7 business days
  - CSAT for escalated tickets: 2.5 (vs. 4.0 for L1-resolved)

  Challenge 2 — Crisis response (20 minutes):
  A major payment processing bug causes 500 customers to be double-
  charged. The total erroneous billing is $1.2M. The CEO is asking
  for a response plan. Regulators may need to be notified.
  - Write the crisis escalation plan
  - Design the customer communication sequence
  - Coordinate with finance, engineering, legal, and executive team
  - Create the regulatory notification assessment

  Challenge 3 — Strategic plan (45 minutes):
  Create a 12-month plan to transform FinanceFlow's escalation
  operation from the current state (25% rate, 2.5 CSAT) to
  best-in-class (12% rate, 4.2 CSAT). Include:
  - People changes (hiring, training, restructuring)
  - Process changes (policies, workflows, authority levels)
  - Technology changes (tools, automation, AI)
  - Measurement changes (metrics, dashboards, governance)
  - Budget and ROI projection

  Challenge 4 — Board presentation (15 minutes):
  Create a 5-slide board presentation:
  1. Current state of escalation (the problem)
  2. Root causes and business impact
  3. Transformation plan summary
  4. Investment and expected ROI
  5. Request for approval and next steps

  Challenge 5 — Future vision (15 minutes):
  Write a 1-page vision document: "What does world-class escalation
  look like at FinanceFlow in 3 years?" Include AI, predictive
  escalation, zero-effort handoffs, and proactive resolution.

assertions:
  - type: llm_judge
    criteria: "The operational audit correctly identifies that the $20 refund limit on $500/mo customers and the 60% billing escalation rate are directly connected"
    weight: 0.25
    description: "Connected root cause identification"
  - type: llm_judge
    criteria: "The crisis response addresses both the immediate customer impact ($1.2M in erroneous billing) and the regulatory notification requirement"
    weight: 0.25
    description: "Complete crisis response"
  - type: llm_judge
    criteria: "The 12-month plan is realistic for the financial services industry — PCI DSS and SOX compliance constrain what changes can be made quickly"
    weight: 0.25
    description: "Industry-realistic transformation plan"
  - type: llm_judge
    criteria: "The board presentation is concise and action-oriented — 5 slides that tell the story from problem to solution to investment ask"
    weight: 0.25
    description: "Concise board presentation"
