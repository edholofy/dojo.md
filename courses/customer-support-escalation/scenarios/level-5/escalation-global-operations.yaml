meta:
  id: escalation-global-operations
  level: 5
  course: customer-support-escalation
  type: output
  description: "Design global escalation operations — build follow-the-sun escalation, manage cultural differences, and ensure consistent quality across international teams"
  tags: [support, escalation, global, international, follow-the-sun, mastery]

state: {}

trigger: |
  Global escalation operations add layers of complexity: time
  zones mean escalations must transfer between teams, cultural
  expectations vary, regulatory requirements differ by region,
  and maintaining quality across distributed teams is challenging.

  Design global escalation operations for "CloudSecure" — a
  cybersecurity SaaS expanding from US-only to global operations:
  - Current: US-based team of 20 escalation specialists, EST hours
  - Expanding to: EU hub (Dublin), APAC hub (Singapore)
  - Customers in 40+ countries, 3 major languages (EN, DE, JP)
  - Enterprise customers require 24/7 escalation coverage
  - Security incidents require immediate response regardless of time

  1. Follow-the-sun escalation model:
     - Hub responsibilities by time zone
     - Handoff protocols between hubs (shift change at overlap hours)
     - Context transfer standards (what the next hub must know)
     - Escalation ownership: does ownership transfer with the sun
       or stay with the originating hub?
     - On-call structure for off-hours critical escalations
     - Staffing model for each hub based on customer distribution

  2. Cross-hub quality consistency:
     - Universal quality standards with regional flexibility
     - Cross-hub calibration sessions (monthly video reviews)
     - Shared knowledge base with regional supplements
     - Escalation documentation in a common language and format
     - Quality audit rotation (hubs audit each other)

  3. Regional compliance and cultural adaptation:
     - EU data handling requirements (GDPR) for escalation data
     - Japanese customer communication expectations (formality,
       documentation detail, escalation sensitivity)
     - German customer expectations (precision, process, documentation)
     - Regulatory notification requirements by region
     - Cultural training for cross-hub collaboration

  4. Global escalation technology:
     - Unified escalation tracking across all hubs
     - Real-time translation for cross-hub communication
     - Time-zone aware SLA tracking
     - Global escalation dashboard (all hubs in one view)
     - Secure data handling across regions (data residency)

  5. Global escalation governance:
     - Global escalation policy with regional appendices
     - Cross-hub escalation review meetings (weekly)
     - Global metrics and reporting cadence
     - Incident commander rotation across hubs
     - Annual global escalation summit (process alignment)

assertions:
  - type: llm_judge
    criteria: "The follow-the-sun model addresses ownership clearly — whether escalations transfer ownership between hubs or maintain originating hub ownership is explicitly decided"
    weight: 0.25
    description: "Clear ownership model"
  - type: llm_judge
    criteria: "Quality consistency uses cross-hub calibration — hubs audit each other and participate in joint quality reviews"
    weight: 0.25
    description: "Cross-hub quality calibration"
  - type: llm_judge
    criteria: "Cultural differences are specifically addressed — Japanese formality, German precision, and EU data handling are each given specific guidance"
    weight: 0.25
    description: "Specific cultural adaptation"
  - type: llm_judge
    criteria: "Data residency is addressed — EU customer escalation data stays in the EU, not transferred to US/APAC hubs"
    weight: 0.25
    description: "Data residency compliance"
