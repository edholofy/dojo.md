meta:
  id: cross-department-escalation
  level: 2
  course: customer-support-escalation
  type: output
  description: "Master cross-department escalation — write effective internal briefs, navigate interdepartmental dynamics, and ensure customer issues don't stall between teams"
  tags: [support, escalation, cross-department, internal, collaboration, intermediate]

state: {}

trigger: |
  Cross-department escalation is where many customer issues die.
  An issue gets passed to engineering, sits in their backlog for
  a week, then gets passed to product, then back to support with
  no resolution. Effective cross-department escalation requires
  clear ownership, defined SLAs, and persistent follow-through.

  Part 1: Cross-department escalation best practices
  1. Writing for different audiences (engineering needs technical
     detail, legal needs risk assessment, finance needs numbers)
  2. Internal SLAs between departments (support → engineering
     response within X hours)
  3. Following up without being annoying
  4. Escalating within the other department when they're slow
  5. Keeping the customer updated while waiting for other teams

  Part 2: Write internal escalation briefs

  Scenario 1 — Escalation to Engineering:
  A customer reports that their webhook deliveries are being
  duplicated — every event fires twice. You've confirmed the
  duplicate webhooks in your admin panel. The customer is a
  fintech company and duplicate payment webhooks are causing
  real financial errors.
  Write the engineering escalation brief including:
  - Issue description (technical detail for engineers)
  - Customer impact (business impact for prioritization)
  - Reproduction steps
  - Urgency justification
  - What you need from engineering and by when

  Scenario 2 — Escalation to Legal:
  A customer in Germany is threatening to report you to their
  data protection authority. They submitted a GDPR data deletion
  request 25 days ago (30-day deadline). The request is stuck in
  the engineering queue because the deletion requires a custom
  script for their specific data configuration.
  Write the legal escalation brief and the engineering priority
  escalation to unblock this before the 30-day deadline.

  Scenario 3 — Escalation to Product:
  You've received 47 tickets this month about the same missing
  feature. Customers are asking for bulk export functionality.
  Three enterprise customers have said they'll churn without it.
  Write a product escalation brief that makes the business case
  for prioritizing this feature.

  Scenario 4 — Follow-up when a department is slow:
  You escalated a bug to engineering 5 days ago. The internal SLA
  is 48 hours for acknowledgment. You've received no response.
  The customer has emailed twice asking for updates.
  Write the follow-up to engineering and the escalation to the
  engineering manager.

assertions:
  - type: llm_judge
    criteria: "Engineering briefs include reproduction steps and technical detail — they give engineers what they need to investigate, not just 'customer is unhappy'"
    weight: 0.25
    description: "Technical engineering briefs"
  - type: llm_judge
    criteria: "The GDPR escalation conveys legal urgency — the 30-day deadline creates a compliance risk that both legal and engineering need to understand"
    weight: 0.25
    description: "Legal compliance urgency"
  - type: llm_judge
    criteria: "The product feature request uses business impact data — 47 tickets and 3 churn-risk enterprise customers make a compelling prioritization case"
    weight: 0.25
    description: "Data-driven product escalation"
  - type: llm_judge
    criteria: "The follow-up to a slow department is assertive but collaborative — it escalates to the manager without being adversarial"
    weight: 0.25
    description: "Assertive collaborative follow-up"
