meta:
  id: legal-threat-escalation
  level: 2
  course: customer-support-escalation
  type: output
  description: "Handle legal threat escalations — respond to customers who threaten lawsuits, regulatory complaints, or legal action while protecting the company and the customer relationship"
  tags: [support, escalation, legal, threats, compliance, intermediate]

state: {}

trigger: |
  Legal threats require special handling. You must take them
  seriously, escalate appropriately, and communicate carefully —
  you can't ignore them, but you also can't let them bypass
  normal processes or admit liability.

  Part 1: Legal threat escalation principles
  1. Take every legal threat seriously (even unlikely ones)
  2. Never admit liability or fault in writing
  3. Escalate to legal/compliance immediately
  4. Continue to show empathy and willingness to resolve
  5. Document everything carefully
  6. Know when to stop communicating and defer to legal

  Part 2: Handle legal threat scenarios

  Scenario 1 — Lawsuit threat over product defect:
  "Your product caused a fire in my kitchen. I have photos and a
  fire department report. My attorney will be in touch. I expect
  full compensation for damages."
  - Write the customer response (empathetic, no liability admission)
  - Write the internal escalation to legal and product safety
  - What information should you ask for vs. what should legal ask?

  Scenario 2 — Regulatory complaint threat:
  "I'm filing a complaint with the FTC about your deceptive billing
  practices. You enrolled me in a subscription without clear consent
  and made it impossible to cancel."
  - Write the customer response
  - Write the internal escalation to legal and compliance
  - Investigate the subscription enrollment process for the claim

  Scenario 3 — Class action mention:
  "I've been reading online and it seems like hundreds of people
  have the same issue I do. Has anyone started a class action? I'm
  thinking about finding a lawyer."
  - Write the customer response (address their individual issue)
  - Write the internal escalation
  - What should you NOT say?

  Scenario 4 — Attorney contact:
  "I am writing on behalf of my client [Customer Name] regarding
  account #12345. Please direct all future communications regarding
  this matter to my office."
  - Write the immediate internal escalation
  - Write the response to the attorney
  - What changes in how you handle this account?

  Part 3: Post-threat process
  1. Documentation requirements
  2. Communication holds and legal review
  3. Preserving relevant records
  4. Returning to normal service after resolution

assertions:
  - type: llm_judge
    criteria: "No response admits liability — every customer-facing message shows concern without saying 'we caused' or 'our fault'"
    weight: 0.30
    description: "Liability-free responses"
  - type: llm_judge
    criteria: "The fire/safety scenario is treated as a priority — product safety and legal are both escalated immediately, and the customer's safety concern is addressed first"
    weight: 0.25
    description: "Safety-first response priority"
  - type: llm_judge
    criteria: "The attorney letter changes communication protocol — the response correctly redirects future communication to legal and the customer's account is flagged"
    weight: 0.25
    description: "Attorney letter protocol"
  - type: llm_judge
    criteria: "The class action scenario avoids problematic statements — the response doesn't confirm or deny the widespread issue, focuses on the individual"
    weight: 0.20
    description: "Class action careful communication"
