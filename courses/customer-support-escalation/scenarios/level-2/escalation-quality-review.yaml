meta:
  id: escalation-quality-review
  level: 2
  course: customer-support-escalation
  type: output
  description: "Review and improve escalation quality — evaluate escalation decisions, documentation quality, and outcomes to identify improvement opportunities"
  tags: [support, escalation, quality, review, improvement, intermediate]

state: {}

trigger: |
  Escalation quality assurance ensures that escalations are
  necessary, well-documented, and effectively resolved. Regular
  review identifies training needs, process gaps, and patterns
  that can reduce future escalations.

  Part 1: Escalation quality criteria
  1. Was the escalation necessary? (or could L1 have resolved it)
  2. Was it routed to the right team/person?
  3. Was the documentation complete and accurate?
  4. Was the customer communication appropriate?
  5. Was the resolution timely and satisfactory?
  6. Could this type of escalation be prevented in the future?

  Part 2: Review these escalation cases

  Case 1 — Unnecessary escalation:
  Agent escalated to billing team: "Customer wants a refund."
  Actual situation: Customer asked about a $15 charge. Agent's
  refund authority was $25. No refund was actually requested — the
  customer just wanted to understand what the charge was for.
  - Score this escalation (1-5 on each quality criterion)
  - Identify what went wrong
  - Write coaching feedback for the agent
  - Suggest a training improvement

  Case 2 — Good escalation, poor documentation:
  Agent correctly identified a bug causing data loss and escalated
  to engineering. However, the escalation note said: "Customer
  reports data missing. Please investigate." No reproduction steps,
  no customer context, no urgency level.
  - Score this escalation
  - Rewrite the escalation note as it should have been
  - Write coaching feedback

  Case 3 — Delayed escalation:
  Agent spent 45 minutes trying to resolve a complex billing
  discrepancy involving prorated charges across plan changes.
  Eventually escalated to billing specialist. The specialist
  resolved it in 5 minutes with tools the L1 agent didn't have.
  - Score this escalation
  - Identify the systemic issue (tool access, not skill)
  - Recommend a process improvement

  Case 4 — Perfect escalation:
  Agent identified a security vulnerability report from a customer,
  immediately escalated to security with full context (reproduction
  steps, affected endpoints, customer's security credentials),
  communicated with the customer about timeline, and followed up
  until resolution.
  - Score this escalation
  - Identify what made it excellent
  - How can this be used as a training example?

assertions:
  - type: llm_judge
    criteria: "The unnecessary escalation is correctly identified — the agent misread 'what is this charge' as 'I want a refund' and the coaching addresses listening skills"
    weight: 0.25
    description: "Correct unnecessary escalation diagnosis"
  - type: llm_judge
    criteria: "The rewritten escalation note includes reproduction steps, customer context, and urgency — it transforms a vague note into an actionable brief"
    weight: 0.25
    description: "Effective note rewrite"
  - type: llm_judge
    criteria: "The delayed escalation identifies a systemic tool access issue — the coaching focuses on recognizing when you lack the tools, not just the knowledge"
    weight: 0.25
    description: "Systemic issue identification"
  - type: llm_judge
    criteria: "The perfect escalation is analyzed for replicable elements — specific behaviors that other agents can learn from are identified"
    weight: 0.25
    description: "Replicable excellence analysis"
