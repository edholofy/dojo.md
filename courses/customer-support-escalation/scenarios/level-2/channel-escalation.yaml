meta:
  id: channel-escalation
  level: 2
  course: customer-support-escalation
  type: output
  description: "Manage channel escalation — move conversations between channels (chat→phone, email→video, social→private) while maintaining context and customer experience"
  tags: [support, escalation, channel, omnichannel, transfer, intermediate]

state: {}

trigger: |
  Sometimes the most effective escalation is moving to a different
  communication channel. Complex technical issues may need screen
  sharing. Emotional customers may need a voice call. Public
  complaints need to move to private channels.

  Part 1: When to change channels
  1. Chat → Phone: emotional customer, complex issue needing back-
     and-forth, customer explicitly requests
  2. Email → Video/Screen share: technical debugging, visual
     problem demonstration
  3. Social media → DM/Email: public complaint, private information
     needed, detailed troubleshooting
  4. Phone → Email: need written confirmation, complex instructions,
     documentation for records
  5. Any → Scheduled callback: customer is busy, complex issue
     needs preparation

  Part 2: Execute channel escalations

  Scenario 1 — Social to private:
  A customer posts on Twitter: "@YourCompany I've been charged
  $500 and no one will help me. Going on 2 weeks now. #badservice"
  - Write the public reply that moves to DM
  - Write the DM that starts the resolution process
  - Handle when the customer says "No, I want this resolved publicly"

  Scenario 2 — Chat to phone:
  A customer in live chat is increasingly frustrated. Messages
  are getting longer and more emotional. You've been going back
  and forth for 20 minutes and the issue isn't getting clearer.
  - Write the message suggesting a phone call
  - Handle when the customer says "No, I hate phone calls"
  - If they accept, prepare for the phone call transition

  Scenario 3 — Email to video call:
  A customer has been going back and forth over email for a week
  about a dashboard configuration issue. Screenshots aren't helping.
  You think a 15-minute screen share could resolve it instantly.
  - Write the email suggesting a video/screen share session
  - Provide scheduling options and tool instructions
  - Prepare an agenda for the call

  Scenario 4 — Phone to email follow-up:
  After a 30-minute phone call where multiple steps were discussed,
  you need to send a written summary with action items.
  - Write the follow-up email summarizing the call
  - Include: what was discussed, what was agreed, next steps, timeline
  - Make it scannable and actionable

assertions:
  - type: llm_judge
    criteria: "The social-to-private transition is handled smoothly — the public reply shows care while naturally moving the conversation to DM"
    weight: 0.25
    description: "Smooth social-to-private transition"
  - type: llm_judge
    criteria: "Customer preferences are respected — when customers refuse a channel change, alternatives are offered instead of insisting"
    weight: 0.25
    description: "Customer channel preference respect"
  - type: llm_judge
    criteria: "The video call suggestion includes practical details — scheduling options, tool instructions, and a brief agenda so the customer knows what to expect"
    weight: 0.25
    description: "Practical channel switch details"
  - type: llm_judge
    criteria: "The phone-to-email follow-up is thorough but scannable — it captures all key points from the call in a format the customer can reference later"
    weight: 0.25
    description: "Thorough scannable follow-up"
