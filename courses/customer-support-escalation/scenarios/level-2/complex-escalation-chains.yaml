meta:
  id: complex-escalation-chains
  level: 2
  course: customer-support-escalation
  type: output
  description: "Handle multi-step escalation chains — manage issues that require coordination across multiple teams and escalation tiers simultaneously"
  tags: [support, escalation, multi-step, coordination, chains, intermediate]

state: {}

trigger: |
  Some customer issues don't follow a clean escalation path — they
  require simultaneous escalation to multiple teams, sequential
  handoffs through several tiers, or parallel investigation tracks.

  Part 1: Multi-team escalation coordination
  1. When an issue spans multiple departments (billing + engineering)
  2. Parallel vs. sequential escalation strategies
  3. Designating an owner when multiple teams are involved
  4. Preventing the customer from falling through the cracks

  Part 2: Handle complex escalation scenarios

  Scenario 1 — Billing + Engineering + Legal:
  Enterprise customer reports they were billed for 500 seats but
  only have 200 active users. They believe it's a billing error
  caused by a platform bug. Their contract specifies billing for
  active users only. They want a refund of $30,000 and are
  threatening breach of contract.
  - Who needs to be involved? (billing, engineering, legal, account mgmt)
  - What's the escalation sequence?
  - Who owns the customer relationship during this?
  - Write the escalation notes for each team
  - Write the customer communication plan

  Scenario 2 — Security + PR + Engineering:
  A security researcher posts on Twitter that they found a
  vulnerability in your API. The tweet is gaining traction (500
  retweets in 2 hours). The researcher says they tried to report
  it through your website but got an auto-reply.
  - Map the escalation paths (security, PR, engineering, executive)
  - Prioritize the response sequence
  - Write the immediate actions for each team
  - Write the public and private responses

  Scenario 3 — Product + Sales + Support:
  A major customer (top 5 account, $200K ARR) is threatening to
  churn because a feature they were promised during the sales
  process was deprioritized from the product roadmap. Support has
  received 12 tickets from their team about this feature.
  - Map the stakeholders and their priorities
  - Design the escalation coordination plan
  - Write the internal escalation brief
  - Draft the customer response strategy

assertions:
  - type: llm_judge
    criteria: "Multi-team coordination designates a clear owner — one person or team owns the customer relationship even when multiple departments are involved"
    weight: 0.30
    description: "Clear ownership designation"
  - type: llm_judge
    criteria: "The security/PR scenario is sequenced correctly — security response comes first, then PR containment, not the other way around"
    weight: 0.25
    description: "Correct security priority sequence"
  - type: llm_judge
    criteria: "The churn-risk account gets strategic treatment — the response involves sales, product, and executive alignment, not just a support fix"
    weight: 0.25
    description: "Strategic churn-risk handling"
  - type: llm_judge
    criteria: "Each scenario includes a customer communication plan — the customer isn't left waiting while internal teams coordinate"
    weight: 0.20
    description: "Customer communication during coordination"
