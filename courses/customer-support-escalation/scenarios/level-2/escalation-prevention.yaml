meta:
  id: escalation-prevention
  level: 2
  course: customer-support-escalation
  type: output
  description: "Prevent unnecessary escalations — empower front-line agents with knowledge, authority, and tools to resolve more issues at the first tier"
  tags: [support, escalation, prevention, empowerment, first-contact-resolution, intermediate]

state: {}

trigger: |
  The best escalation is the one that doesn't need to happen.
  High escalation rates often indicate gaps in agent training,
  authority, tools, or knowledge — not complex customer issues.

  Part 1: Escalation prevention strategies
  1. Agent empowerment:
     - Expanding refund authority ($25 → $100 for experienced agents)
     - Decision frameworks (if X then you can do Y without approval)
     - "Good judgment" budgets (agents can comp up to $X per case)
  2. Knowledge gaps:
     - Knowledge base coverage analysis
     - Identifying top escalation reasons that could be self-served
     - Training on commonly escalated issue types
  3. Tool gaps:
     - What actions require escalation only because agents lack
       system access?
     - Audit of "escalate because I can't do this in the tool"
  4. Process gaps:
     - Unclear policies that force agents to escalate for certainty
     - Missing decision trees for common scenarios

  Part 2: Analyze and reduce escalations

  You have this escalation data for a SaaS support team:
  - Total tickets/month: 5,000
  - Escalation rate: 32% (industry benchmark: 15-20%)
  - Top escalation reasons:
    1. Refund requests over $50 (agent limit): 28%
    2. Technical issues agents can't reproduce: 22%
    3. Customer demands a manager: 18%
    4. Policy questions agents are unsure about: 15%
    5. Account modifications requiring admin access: 12%
    6. Other: 5%

  For each of the top 5 reasons:
  1. Analyze why this is being escalated
  2. Propose a specific prevention measure
  3. Estimate the impact on escalation rate
  4. Identify any risks of the prevention measure

  Part 3: Create an escalation reduction plan
  - 30-day quick wins (what can you change immediately)
  - 90-day structural changes (training, tools, policies)
  - Measurement framework (how to track improvement)
  - Target: reduce escalation rate from 32% to 18% in 90 days

assertions:
  - type: llm_judge
    criteria: "Prevention measures are specific to each cause — raising refund limits addresses reason 1, not a generic 'train agents better'"
    weight: 0.30
    description: "Cause-specific prevention measures"
  - type: llm_judge
    criteria: "The refund authority expansion includes guardrails — higher limits come with guidelines, not blanket permission to refund anything"
    weight: 0.25
    description: "Empowerment with guardrails"
  - type: llm_judge
    criteria: "Admin access gaps are addressed — escalating just because the agent can't press a button in the system is identified as a tool problem, not a skill problem"
    weight: 0.25
    description: "Tool gap identification"
  - type: llm_judge
    criteria: "The 90-day plan has realistic targets — going from 32% to 18% requires specific actions for each cause, not aspirational goals"
    weight: 0.20
    description: "Realistic reduction targets"
