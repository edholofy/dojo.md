meta:
  id: escalation-with-angry-customers
  level: 2
  course: customer-support-escalation
  type: output
  description: "Handle escalations involving angry and emotionally charged customers — balance empathy with process while protecting agent wellbeing"
  tags: [support, escalation, angry-customer, emotional, de-escalation, intermediate]

state: {}

trigger: |
  Angry customers are the most common trigger for escalation
  requests. The challenge is distinguishing between customers who
  need emotional validation (and can be de-escalated) versus those
  with legitimate grievances that require management intervention.

  Part 1: Emotional escalation framework
  1. Recognizing emotional escalation signals in text and voice
  2. The emotional escalation ladder:
     - Frustrated → Angry → Hostile → Abusive
  3. Response strategies for each rung
  4. When to persist with de-escalation vs. when to escalate
  5. The boundary: abusive behavior is always escalated to
     management (customer doesn't get to abuse agents)

  Part 2: Handle these angry customer scenarios

  Scenario 1 — Justified anger:
  "I have been on hold for 45 MINUTES. Then your agent told me
  they couldn't help and transferred me. Now I'm explaining this
  AGAIN. My account has been locked for 3 days and I can't run
  my business. Do you people even care? This is costing me real
  money. I need this fixed in the next 30 minutes or I'm switching
  to [competitor]."
  - Assess: de-escalate or escalate?
  - Write the response
  - If escalating, write the handoff

  Scenario 2 — Disproportionate anger:
  "THIS IS THE WORST COMPANY I'VE EVER DEALT WITH. ABSOLUTE TRASH.
  I want a FULL refund for EVERYTHING I've ever paid you. And I
  want the name of your CEO so I can tell them personally how
  INCOMPETENT your entire company is."
  Context: The issue is a $15 shipping delay of 2 days.
  - Assess: de-escalate or escalate?
  - Write the response
  - Handle the CEO request appropriately

  Scenario 3 — Crossing the line:
  "You're clearly an idiot who doesn't know how to do their job.
  I bet they pay you minimum wage because that's all you're worth.
  Put someone on who actually has a brain."
  - Identify this as abusive (not just angry)
  - Write the response that sets a boundary
  - Document and escalate appropriately

  Scenario 4 — Tears and desperation:
  "Please, I really need this to work. My business depends on this
  and my family depends on my business. I've been trying to fix
  this for a week and I don't know what else to do. I'm sorry for
  being emotional but I'm just so stressed."
  - Write a response that validates their emotion
  - Determine whether escalation helps or adds more delay
  - Provide a clear path forward

assertions:
  - type: llm_judge
    criteria: "Justified anger is validated — the locked account customer's frustration is acknowledged as legitimate and the response addresses both emotion and urgency"
    weight: 0.25
    description: "Justified anger validation"
  - type: llm_judge
    criteria: "Abusive behavior gets a clear boundary — the response is firm but professional, not retaliatory or passive-aggressive"
    weight: 0.25
    description: "Professional boundary setting"
  - type: llm_judge
    criteria: "The disproportionate anger is de-escalated — a $15/2-day shipping issue doesn't warrant a full historical refund, and the response redirects to resolution"
    weight: 0.25
    description: "Proportional de-escalation"
  - type: llm_judge
    criteria: "The emotional/desperate customer receives genuine empathy — the response is warm and supportive, not clinical, and provides a concrete path forward"
    weight: 0.25
    description: "Genuine empathy for distress"
