meta:
  id: sla-driven-escalation
  level: 2
  course: customer-support-escalation
  type: output
  description: "Manage SLA-driven escalations — handle tickets approaching or breaching SLA deadlines with appropriate urgency and communication"
  tags: [support, escalation, sla, deadline, urgency, intermediate]

state: {}

trigger: |
  SLA (Service Level Agreement) breaches are one of the most
  structured escalation triggers. They're often automated but
  require human judgment for effective resolution.

  Part 1: SLA escalation framework
  Company SLA structure:
  - Standard tier: 24-hour first response, 72-hour resolution
  - Professional tier: 8-hour first response, 24-hour resolution
  - Enterprise tier: 1-hour first response, 4-hour resolution
  - Critical (P1): 15-minute first response, 2-hour resolution

  Escalation thresholds:
  - Yellow alert: 75% of SLA time elapsed
  - Red alert: 90% of SLA time elapsed
  - Breach: SLA deadline passed
  - Severe breach: 2x SLA deadline passed

  Part 2: Handle SLA-driven escalation scenarios

  Scenario 1 — Yellow alert, Enterprise tier:
  An Enterprise customer submitted a ticket 45 minutes ago (1-hour
  SLA). The assigned agent is on lunch break. You see the ticket
  in the queue during a coverage check.
  - What do you do immediately?
  - Write the customer response
  - Write the internal escalation if needed

  Scenario 2 — SLA breach, Professional tier:
  A Professional customer's ticket has breached the 8-hour first
  response SLA. It's now 10 hours old. The original assigned agent
  called in sick and the ticket wasn't reassigned.
  - Write the customer communication acknowledging the delay
  - Write the internal escalation and process improvement note
  - Determine if the customer deserves any goodwill compensation

  Scenario 3 — Cascading SLA risk:
  It's Monday morning. Over the weekend, 15 Professional tier
  tickets accumulated. 8 are approaching SLA breach within the
  next 2 hours. You have 3 agents available.
  - Prioritize the 8 tickets (what criteria do you use?)
  - Write the internal escalation to management
  - Design the triage plan
  - Write a proactive message template for customers who will
    experience delayed responses

  Scenario 4 — SLA breach with contractual penalties:
  An Enterprise customer's contract includes financial penalties
  for SLA breaches: $500 per breach for first response, $2,000
  for resolution time. Their critical ticket has breached the
  resolution SLA by 3 hours.
  - Write the escalation to management and legal
  - Write the customer communication
  - Recommend proactive steps to prevent the penalty claim

assertions:
  - type: llm_judge
    criteria: "The yellow alert is handled proactively — the agent doesn't wait for the breach but acts immediately to prevent it"
    weight: 0.25
    description: "Proactive SLA management"
  - type: llm_judge
    criteria: "The SLA breach acknowledgment is honest — it doesn't make excuses but takes ownership and explains what's being done now"
    weight: 0.25
    description: "Honest breach acknowledgment"
  - type: llm_judge
    criteria: "The Monday triage plan is realistic — it prioritizes based on breach proximity, customer tier, and issue severity, not first-in-first-out"
    weight: 0.25
    description: "Realistic triage prioritization"
  - type: llm_judge
    criteria: "The contractual penalty scenario includes proactive mitigation — the response aims to prevent the penalty claim through exceptional service recovery"
    weight: 0.25
    description: "Penalty mitigation strategy"
