meta:
  id: vip-executive-escalation
  level: 2
  course: customer-support-escalation
  type: output
  description: "Handle VIP and executive escalation — manage high-value customer issues with appropriate urgency, personalization, and executive-level communication"
  tags: [support, escalation, vip, executive, high-value, intermediate]

state: {}

trigger: |
  VIP and executive escalations require a different approach than
  standard escalation. These customers often have direct access to
  your leadership, their issues carry disproportionate business
  impact, and the communication style must match their expectations.

  Part 1: VIP escalation framework
  1. Identifying VIP customers (revenue tier, strategic accounts,
     executive contacts, influencer/media)
  2. VIP escalation paths (dedicated queue, named account managers,
     executive sponsors)
  3. Communication tone for VIP escalations (executive-level
     language, no scripts, personalized)
  4. When VIP status doesn't change the right answer (policy
     is policy, but delivery changes)

  Part 2: Handle VIP escalation scenarios

  Scenario 1 — Executive email from a Fortune 500 CTO:
  "Your platform had 3 outages this quarter. Our SLA guarantees
  99.9% uptime and you've delivered 99.2%. I need a call with your
  VP of Engineering to discuss reliability improvements and our
  contract renewal terms. Please arrange this by Thursday."
  (Customer: $180K ARR, 2-year contract renewing in 60 days)
  - Write the internal escalation to your VP of Engineering
  - Write the response to the CTO
  - Prepare the briefing document for the VP's call

  Scenario 2 — Board member's personal account:
  Your CEO's assistant emails: "One of our board members, [Name],
  is having trouble with their personal account. Can you prioritize
  this?" The issue is a standard password reset.
  - Handle appropriately (VIP treatment without circumventing
    security)
  - Write the response to the CEO's assistant
  - Write the direct communication to the board member

  Scenario 3 — Social media influencer escalation:
  A tech influencer with 500K followers tweets: "Been trying to
  get @YourCompany to fix my account for 2 weeks. Starting to
  think they don't care about customers. Thread incoming..."
  (The ticket exists — it was assigned but fell through the cracks)
  - Write the escalation plan (support, PR, social media)
  - Write the public response (on Twitter)
  - Write the private outreach to the influencer
  - Write the internal post-mortem note

  Scenario 4 — The "I know your CEO" customer:
  "I play golf with your CEO, Tom. If this isn't resolved today,
  I'm calling him directly. You really don't want that to happen."
  Context: Standard customer, $50/month plan, issue is a legitimate
  billing error of $50. The claim may or may not be true.
  - Write the response that handles this professionally

assertions:
  - type: llm_judge
    criteria: "The CTO escalation includes a briefing document — the VP of Engineering gets customer history, SLA data, contract renewal context, and talking points"
    weight: 0.25
    description: "Executive briefing preparation"
  - type: llm_judge
    criteria: "The board member's password reset doesn't skip security — VIP treatment means priority and communication style, not bypassing identity verification"
    weight: 0.25
    description: "Security maintained for VIP"
  - type: llm_judge
    criteria: "The influencer response is both public and private — the public response shows responsiveness while the private outreach offers genuine resolution"
    weight: 0.25
    description: "Dual public-private influencer response"
  - type: llm_judge
    criteria: "The 'I know your CEO' customer is handled without intimidation — the response focuses on resolving the issue rather than being influenced by the name-drop"
    weight: 0.25
    description: "Name-drop handled professionally"
