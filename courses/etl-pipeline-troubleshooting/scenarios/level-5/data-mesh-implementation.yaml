meta:
  id: data-mesh-implementation
  level: 5
  course: etl-pipeline-troubleshooting
  type: output
  description: "Data mesh implementation — evaluate and implement data mesh principles for decentralized data ownership while maintaining quality and governance"
  tags: [data-mesh, decentralization, domain-ownership, platform, master]

state: {}

trigger: |
  A VP of Data says: "Our centralized data team of 40 engineers
  is the bottleneck for every data initiative. Business teams wait
  6-8 weeks for new pipelines. We're considering data mesh — moving
  pipeline ownership to domain teams (payments, lending, risk,
  customer, marketing).

  But I have concerns:
  1. Domain teams don't have data engineering expertise — how do
     they build and maintain pipelines?
  2. How do we maintain data quality standards across 5 independent
     teams building pipelines?
  3. How do we prevent the chaos of 5 teams choosing different
     tools and creating incompatible datasets?
  4. Our compliance team needs centralized governance for regulatory
     reporting — how does that work in a decentralized model?
  5. Who handles the cross-domain data products that span multiple
     teams (like a customer 360)?

  Is data mesh right for us, or is it organizational theater?"

  Task: Evaluate data mesh for this organization, design an
  implementation strategy that addresses all concerns, and provide
  an honest assessment of when data mesh works and when it doesn't.

assertions:
  - type: llm_judge
    criteria: "Response provides an honest evaluation of data mesh — addresses each concern: expertise gap (platform team provides self-service tools, templates, and guardrails so domain teams can build pipelines without deep infrastructure knowledge), quality standards (federated governance with centralized quality policies enforced by the platform), tool chaos (self-service platform constrains tool choices while providing flexibility within guardrails), regulatory compliance (centralized compliance layer that consumes domain data products with enforced contracts), cross-domain products (either a dedicated cross-domain team or collaborative ownership with clear interfaces). Honestly assesses whether data mesh is appropriate for this organization size and maturity"
    weight: 0.35
    description: "HonestEvaluation"
  - type: llm_judge
    criteria: "Response designs the implementation if data mesh is recommended — four principles: domain ownership (each domain owns its data products end-to-end), data as a product (published datasets have SLAs, documentation, quality guarantees), self-serve data platform (centralized platform team provides infrastructure-as-a-service), federated computational governance (centralized policies, decentralized execution). Implementation plan: start with 1-2 willing domains as pilots, build the self-service platform incrementally, define the data product specification (what must every data product include?), transition the central team to a platform team role"
    weight: 0.35
    description: "ImplementationDesign"
  - type: llm_judge
    criteria: "Response addresses when data mesh fails — organizations that are too small (under 50 data professionals, the overhead isn't worth it), domains that can't staff data engineering (you need at least 2-3 data engineers per domain), lack of platform investment (without a good self-service platform, decentralization creates chaos), culture that doesn't support ownership (if teams don't want to own data quality, mandating it doesn't work), and the common failure mode (declaring 'we're doing data mesh' without changing anything structural — just renaming teams). Provides alternative approaches for organizations where data mesh doesn't fit"
    weight: 0.30
    description: "WhenItFails"
