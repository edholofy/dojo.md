meta:
  id: master-etl-shift
  level: 5
  course: etl-pipeline-troubleshooting
  type: output
  description: "Master ETL troubleshooting shift — the ultimate assessment combining platform strategy, incident leadership, regulatory compliance, and organizational transformation"
  tags: [shift, combined, assessment, comprehensive, master]

state: {}

trigger: |
  You are the newly appointed VP of Data Engineering at a $2B
  fintech company that just went through a merger. The situation:

  Infrastructure: Two completely separate data platforms from the
  merged companies — Company A uses Snowflake + dbt + Airflow with
  200 pipelines, Company B uses Databricks + custom Spark + Luigi
  with 300 pipelines. Both platforms must be consolidated within
  18 months per the merger integration plan.

  Regulatory crisis: The merged entity now qualifies as a
  systemically important financial institution (SIFI), requiring
  BCBS 239 compliance for risk data aggregation within 12 months.
  Neither company's data platform meets these requirements.

  Reliability problem: The combined platform has a 25% pipeline
  failure rate (highest in the industry), costing an estimated
  $8M annually in engineering time, delayed decisions, and
  regulatory risk.

  Team: 45 data engineers from Company A (Snowflake expertise)
  and 35 from Company B (Databricks expertise), with cultural
  tension and duplicated roles. Morale is low.

  Board expectation: Present a unified data platform strategy
  at the next board meeting in 6 weeks.

  Task: Design the complete strategy covering platform consolidation,
  regulatory compliance, reliability transformation, team integration,
  and board presentation.

assertions:
  - type: llm_judge
    criteria: "Response addresses platform consolidation and regulatory compliance simultaneously — makes a clear recommendation on target platform (Snowflake or Databricks, with rationale tied to the team, requirements, and BCBS 239 needs), designs a phased migration that prioritizes regulatory-critical pipelines (risk data aggregation pipelines must meet BCBS 239 within 12 months), plans for the 18-month consolidation timeline (which pipelines migrate first, how to run dual platforms during transition, how to handle cross-platform dependencies), and shows how BCBS 239 requirements (data lineage, quality measurement, timeliness) inform the platform architecture decisions"
    weight: 0.35
    description: "PlatformAndRegulatory"
  - type: llm_judge
    criteria: "Response addresses reliability transformation and team integration — reliability improvement plan that targets the 25% failure rate (immediate: triage and fix the most frequently failing pipelines, medium-term: implement testing and observability, long-term: self-healing and SRE practices), team integration plan (combine the 80 engineers into a unified organization, cross-training program between Snowflake and Databricks teams, address cultural tension with clear roles and shared goals), and how to sequence reliability improvements alongside migration (don't just move broken pipelines to a new platform — fix them during migration)"
    weight: 0.35
    description: "ReliabilityAndTeam"
  - type: llm_judge
    criteria: "Response provides a board-ready strategy presentation — a clear narrative arc (merger created an opportunity to build a best-in-class data platform from two good but incompatible ones), investment case (estimated cost of consolidation + reliability improvement vs cost of maintaining dual platforms and continuing to absorb the $8M annual failure cost), risk framing (BCBS 239 non-compliance risk vs investment, regulatory timeline as a forcing function), timeline with milestones the board can track, and a confident but realistic assessment of what can be achieved in 6, 12, and 18 months"
    weight: 0.30
    description: "BoardStrategy"
