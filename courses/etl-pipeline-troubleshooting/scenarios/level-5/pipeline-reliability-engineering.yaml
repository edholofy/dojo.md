meta:
  id: pipeline-reliability-engineering
  level: 5
  course: etl-pipeline-troubleshooting
  type: output
  description: "Pipeline reliability engineering — apply SRE principles to data pipelines, designing for resilience, defining SLOs, and building a reliability culture"
  tags: [reliability, SRE, SLO, resilience, culture, master]

state: {}

trigger: |
  A VP of Engineering says: "We've applied SRE practices to our
  application services successfully — error budgets, SLOs, incident
  management, chaos engineering. But our data pipelines are still
  in the dark ages. They fail regularly, recovery is manual, and
  nobody treats data reliability with the same rigor as application
  uptime.

  Our data platform metrics are embarrassing:
  - Pipeline success rate: 87% (13% of runs fail)
  - Mean time to detect data issues: 4 hours
  - Mean time to recover: 6 hours
  - Percentage of incidents that recur within 30 days: 40%
  - Data SLA adherence: 72%

  These numbers would be unacceptable for our application services
  (which run at 99.9% availability). Why are data pipelines so much
  less reliable, and how do we apply SRE practices to fix this?"

  Task: Design a data reliability engineering program that applies
  SRE principles to data pipelines, sets meaningful SLOs, and builds
  a reliability culture in the data team.

assertions:
  - type: llm_judge
    criteria: "Response adapts SRE principles for data pipelines — defines data SLIs (service level indicators): freshness (time between data generation and availability), completeness (percentage of expected records present), accuracy (error rate in data values), and pipeline success rate. Sets data SLOs based on business criticality: Tier 1 pipelines (financial) at 99.5% freshness SLA compliance and 99.9% completeness, Tier 2 (operational) at 99% freshness and 99.5% completeness. Introduces data error budgets: when the budget is exhausted, prioritize reliability work over new features"
    weight: 0.35
    description: "SREAdaptation"
  - type: llm_judge
    criteria: "Response designs programs to improve each metric — reduce failure rate from 87% to 99%+ (idempotent pipelines, better testing, self-healing for known issues), reduce detection time from 4 hours to minutes (proactive monitoring, anomaly detection, freshness alerts), reduce recovery time from 6 hours to under 1 hour (automated runbooks, self-healing, better tooling), reduce recurrence from 40% to under 10% (mandatory postmortems with action items tracked to completion, systemic fixes not band-aids). Provides a realistic timeline for improvement"
    weight: 0.35
    description: "MetricImprovement"
  - type: llm_judge
    criteria: "Response addresses the cultural and organizational dimension — why data teams traditionally under-invest in reliability (data failures are often silent, business impact is delayed, data engineers focus on building new pipelines not maintaining old ones), how to build a reliability culture (on-call rotation for data engineers, blameless postmortems, reliability as a promotion criterion, visibility into reliability metrics), chaos engineering for data pipelines (inject failures, test recovery procedures, validate monitoring), and how to sustain reliability improvements (monthly reliability reviews, capacity planning, technical debt tracking)"
    weight: 0.30
    description: "CultureAndOrg"
