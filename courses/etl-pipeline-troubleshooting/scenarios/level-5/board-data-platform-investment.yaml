meta:
  id: board-data-platform-investment
  level: 5
  course: etl-pipeline-troubleshooting
  type: output
  description: "Board-level data platform investment — present the business case for data platform modernization to the board and secure multi-year investment approval"
  tags: [board, investment, business-case, executive, master]

state: {}

trigger: |
  A CDO says: "I have 20 minutes at the next board meeting to
  make the case for a $15M, 3-year data platform modernization.
  The board includes:

  - The CEO who cares about competitive advantage and time-to-market
  - The CFO who wants clear ROI and phased investment
  - The CRO who needs better sales analytics and customer insights
  - The CTO who understands technology but wants pragmatic choices
  - Two independent directors who are skeptical of large tech investments

  Our current situation: 500+ fragile pipelines, 30% monthly failure
  rate, data team spending 60% of time on maintenance instead of
  value creation, 8-week backlog for new data requests, and $4.8M
  annual platform costs growing 30% yearly.

  The $15M would fund: new cloud data platform ($5M), migration
  services ($4M), team expansion and training ($3M), and operational
  reserves ($3M).

  How do I make this compelling and win approval?"

  Task: Design a 20-minute board presentation that translates data
  platform issues into business impact, addresses each board member's
  priorities, and secures the $15M investment.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling presentation arc — opens with business impact (not technology): the 8-week data request backlog means the CRO can't get the analytics needed to close Q4 deals, the 30% failure rate means the CFO's financial reports are unreliable, the maintenance burden means the team can't build the competitive advantages the CEO wants. Translates technical problems into dollar amounts: 60% maintenance time = $X million in engineering waste, fragile pipelines = $X in delayed decisions and lost revenue, growing costs without growing capabilities = throwing money away"
    weight: 0.35
    description: "PresentationDesign"
  - type: llm_judge
    criteria: "Response tailors messages to each board member — CEO: modernized platform enables faster product iteration and data-driven competitive advantage, reducing time-to-insight from weeks to hours. CFO: $15M investment returns estimated $25-40M over 5 years through cost reduction (platform costs stop growing 30% annually), productivity gain (60% maintenance → 20%), and revenue enablement; phased investment with milestone-based releases. CRO: sales analytics available in real-time instead of 8-week backlog, customer 360 view enabling better targeting. CTO: pragmatic technology choices, proven modern stack, reduced technical debt. Independent directors: comparable companies have made similar investments with documented ROI, risk-mitigated phased approach"
    weight: 0.35
    description: "AudienceTailoring"
  - type: llm_judge
    criteria: "Response includes a clear ask and risk mitigation — phased investment: $5M Year 1 (foundation + quick wins), $6M Year 2 (migration + expansion), $4M Year 3 (optimization + innovation), with go/no-go gates between phases. Success metrics the board can track quarterly (pipeline success rate, time to deliver new data requests, platform cost per TB, engineering time on value-creation vs maintenance). Addresses the 'what if we don't invest' scenario (costs continue growing 30%/year, data team falls further behind, competitive disadvantage widens). Handles likely objections ('why so much?' — compare to the cost of not investing; 'why now?' — the problem compounds every quarter we delay)"
    weight: 0.30
    description: "AskAndRiskMitigation"
