meta:
  id: next-generation-etl
  level: 5
  course: etl-pipeline-troubleshooting
  type: output
  description: "Next-generation ETL — evaluate emerging approaches including AI-powered pipeline generation, declarative data pipelines, and the future of data integration"
  tags: [next-generation, AI-powered, declarative, future, master]

state: {}

trigger: |
  A CTO asks: "ETL has been fundamentally the same for 30 years —
  extract data from sources, transform it, load it somewhere else.
  The tools have evolved (Informatica → Airflow → dbt) but the
  paradigm hasn't.

  With advances in AI and cloud-native technologies, I see several
  potential disruptions:
  - LLMs generating pipeline code from natural language descriptions
  - Declarative pipelines where you define the desired end state
    and the system figures out the transformations
  - Zero-ETL architectures where source systems expose data
    directly without copying
  - AI-powered data quality that automatically detects and fixes
    issues without human rules

  We're a large enterprise with 500 data engineers. What should we
  invest in over the next 3-5 years? What's real and what's hype?"

  Task: Evaluate emerging ETL paradigms, separate hype from genuine
  advances, and provide a practical adoption roadmap for a large
  enterprise.

assertions:
  - type: llm_judge
    criteria: "Response honestly evaluates each emerging approach — LLM-generated pipelines: genuine value for boilerplate generation and documentation, but not ready for complex business logic (LLMs don't understand your specific data semantics). Declarative pipelines: real progress (dbt is already partly declarative), but complex transformations still need imperative logic. Zero-ETL: promising for specific use cases (Aurora zero-ETL to Redshift, Snowflake data sharing), but not a general solution (most data still needs transformation). AI-powered quality: useful for anomaly detection, but can't replace domain-specific business rules. Provides a maturity assessment for each (production-ready, early adoption, experimental, speculative)"
    weight: 0.35
    description: "HonestEvaluation"
  - type: llm_judge
    criteria: "Response provides a practical 3-5 year roadmap — Year 1-2: adopt AI-assisted development tools (Copilot for pipeline code, LLM-generated documentation, AI-powered anomaly detection), expand declarative patterns (more dbt, less custom Python), evaluate zero-ETL for compatible source-target pairs. Year 3-4: deploy self-healing capabilities for common failure patterns, build AI-powered data quality monitoring at scale, adopt event-driven architectures to reduce batch ETL footprint. Year 5+: move toward autonomous data management for routine tasks while keeping engineers focused on complex, judgment-intensive work. Realistic about what remains manual"
    weight: 0.35
    description: "AdoptionRoadmap"
  - type: llm_judge
    criteria: "Response addresses strategic implications — how the role of data engineers evolves (from writing pipelines to designing data products and governing quality), the 500-engineer workforce transition (reskilling, not replacing — engineers move from writing ETL code to designing data architectures and quality systems), investment prioritization (what to invest in now vs wait for maturity), risk management (don't bet everything on one paradigm — maintain flexibility to adopt what works and abandon what doesn't), and the competitive advantage of early adoption vs the risk of adopting immature technology"
    weight: 0.30
    description: "StrategicImplications"
