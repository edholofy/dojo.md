meta:
  id: kb-migration-project
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Plan and execute a knowledge base platform migration — from Zendesk Guide to a new platform — with content audit, URL redirects, SEO preservation, and zero-downtime cutover"
  tags: [platform-migration, content-migration, seo-preservation, zero-downtime, advanced]

state: {}

trigger: |
  You're the Knowledge Base Lead at a B2B SaaS
  company migrating from Zendesk Guide to Document360.
  The KB has 650 articles, 200K monthly page views,
  and contributes 25% ticket deflection. The
  migration cannot disrupt self-service — any
  downtime or broken links directly increases support
  ticket volume.

  Migration context:
  - 650 published articles + 80 draft articles
  - 12 content categories with subcategories
  - 3,200 images and screenshots
  - 45 embedded videos (YouTube)
  - Custom CSS styling in 30+ articles
  - 180 internal cross-links between articles
  - 2,500+ external backlinks from Google, community
    forums, and partner sites
  - Average 800 organic search visits/day
  - Zendesk API available for content export
  - Document360 has import API and bulk import

  Plan the complete migration:

  1. Pre-Migration Assessment
  - Content inventory (complete audit of all 650
    articles, drafts, media)
  - Content quality assessment (which articles to
    migrate as-is, rewrite, or retire)
  - URL mapping strategy (old URLs → new URLs)
  - SEO baseline (current rankings, traffic,
    backlinks)
  - Integration audit (what integrations connect
    to the KB: chatbot, in-product links, support
    widget)
  - Risk assessment

  2. Migration Architecture
  - Data export plan (articles, images, metadata,
    categories)
  - Content transformation rules (formatting,
    structure, media handling)
  - URL redirect strategy (301 redirects for every
    article)
  - Custom CSS migration approach
  - Cross-link updating methodology
  - Search configuration on new platform

  3. Execution Plan
  - Phase 1: Content export and staging (2 weeks)
  - Phase 2: Content review and cleanup (3 weeks)
  - Phase 3: Parallel running (both platforms live,
    2 weeks)
  - Phase 4: Cutover (DNS change, redirects active)
  - Phase 5: Post-migration validation (1 week)
  - Rollback plan (if migration fails)

  4. SEO Preservation
  - 301 redirect implementation for all URLs
  - Sitemap submission to Google
  - Search Console monitoring plan
  - Backlink notification strategy (inform sites
    linking to old URLs)
  - Organic traffic monitoring (expected dip and
    recovery timeline)
  - Schema markup migration

  5. Quality Assurance
  - Automated testing (broken links, missing images,
    formatting issues)
  - Manual review checklist (sample of 50 articles)
  - Accessibility verification
  - Search functionality testing
  - Mobile responsiveness check
  - Integration testing (chatbot, in-product links)

  6. Post-Migration
  - Monitoring dashboard (traffic, search rankings,
    broken links, support ticket impact)
  - Issue resolution process (30-day war room)
  - Success criteria and sign-off process
  - Lessons learned documentation

  Task: Write the complete migration plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete migration plan — pre-migration assessment with content inventory, URL mapping, and SEO baseline; migration architecture with export, transformation, and redirect strategy; 5-phase execution with timeline and rollback; SEO preservation with 301 redirects, sitemap, and monitoring; QA with automated and manual testing; post-migration with monitoring dashboard and war room."
    weight: 0.35
    description: "MigrationPlanCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates migration expertise — the URL redirect strategy accounts for all 2,500+ backlinks; the parallel running phase reduces risk; the SEO monitoring expects and plans for a traffic dip; the rollback plan is realistic; the QA process catches real migration issues (broken links, missing images); the content transformation handles custom CSS and cross-links; the integration audit prevents broken chatbot and widget connections."
    weight: 0.35
    description: "MigrationExpertise"
  - type: llm_judge
    criteria: "Response would achieve zero-disruption migration — the 25% ticket deflection would be maintained; organic search traffic would recover within 4-6 weeks; no broken links from external backlinks; the chatbot and in-product links would continue working; the 30-day war room would catch and resolve issues; the migration would be completed on time and on budget."
    weight: 0.30
    description: "ZeroDisruptionOutcome"
