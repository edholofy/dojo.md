meta:
  id: kb-content-operations
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Build a complete KB content operations system — editorial workflows, SME collaboration, content sprints, quality metrics, and team scaling plan for a growing knowledge base"
  tags: [content-operations, editorial-workflow, sme-collaboration, scaling, advanced]

state: {}

trigger: |
  You're the Head of Knowledge Management at a
  fast-growing SaaS company (growing from 500 to
  1,500 employees in 2 years). The KB needs to
  scale from 300 articles written by 2 people to
  1,000+ articles maintained by a team of 8. You
  need to build the operational infrastructure.

  Current problems:
  - 2 writers can't keep up with 4 product teams
    shipping features monthly
  - No process for SMEs to contribute content
  - Articles go stale within months (product changes)
  - No content review or approval workflow
  - Writers work reactively (support escalations)
    instead of proactively
  - No quality standards or metrics
  - KB coverage: about 60% of features documented

  Design the complete content operations system:

  1. Editorial Workflow
  - Content request intake process (who can request,
    how, prioritization criteria)
  - Content creation workflow: Request → Assign →
    Draft → SME Review → Edit → Compliance Check →
    Publish
  - Expedited workflow for urgent content (outages,
    critical bugs, security issues)
  - Content update workflow (triggered by product
    changes)
  - Workflow automation (which steps can be automated)

  2. SME Collaboration Model
  - SME identification and relationship building
  - Content contribution pathways (interview, draft
    review, co-authoring)
  - SME time commitment expectations (1-2 hours/week)
  - Recognition and incentive program for contributors
  - SME content briefing template
  - Quality control for SME-contributed content

  3. Content Sprint Methodology
  - "KB Sprint" format (2-week sprints aligned with
    product releases)
  - Sprint planning: Identifying what needs to be
    written/updated based on product roadmap
  - Sprint ceremonies: Planning, daily standups,
    review, retrospective
  - Definition of done for KB articles
  - Capacity planning (articles per writer per sprint)

  4. Quality Assurance System
  - Article quality scoring rubric (accuracy,
    completeness, readability, formatting, SEO)
  - Peer review process and standards
  - Content audit methodology (quarterly)
  - Freshness scoring (automated staleness detection)
  - Customer feedback integration
  - Quality dashboards and reporting

  5. Team Scaling Plan
  - Team structure (writers, editors, analysts, ops)
  - Hiring plan: 2 → 8 over 18 months
  - Skill matrix and role descriptions
  - Onboarding program for new KB writers
  - Knowledge sharing and cross-training
  - Career development paths

  6. Metrics and Reporting
  - Operational metrics (articles published, updated,
    retired per sprint)
  - Quality metrics (accuracy scores, readability,
    customer ratings)
  - Impact metrics (ticket deflection, search
    success, self-service rate)
  - Team productivity metrics (without micromanaging)
  - Executive reporting template (monthly/quarterly)

  Task: Write the complete content operations
  system.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete content ops system — editorial workflow with intake, creation, and expedited processes; SME collaboration with contribution pathways and incentives; content sprint methodology with ceremonies and capacity planning; QA with scoring rubric and freshness detection; team scaling from 2 to 8 with hiring plan and onboarding; metrics covering operational, quality, and impact dimensions."
    weight: 0.35
    description: "ContentOpsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content operations expertise — the editorial workflow handles both proactive and reactive content; SME engagement is realistic about time commitments; content sprints align with product release cycles; the quality rubric measures what matters; the scaling plan builds the right roles in the right order; metrics avoid micromanagement while ensuring accountability; the system is sustainable, not heroic."
    weight: 0.35
    description: "ContentOpsExpertise"
  - type: llm_judge
    criteria: "Response would scale the KB effectively — coverage would increase from 60% to 95%+; the 2-person bottleneck would be eliminated; product releases would ship with documentation; stale content would be caught and updated proactively; the team would grow smoothly; the CEO would see KB investment as strategic, not overhead."
    weight: 0.30
    description: "ScalingOutcome"
