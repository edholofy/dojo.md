meta:
  id: developer-documentation-hub
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Design and write the developer documentation hub for a platform API — architecture, getting started guide, authentication, 5 endpoint references, SDKs, webhooks, and error handling"
  tags: [developer-docs, api-documentation, sdk, webhooks, advanced]

state: {}

trigger: |
  You're the Developer Documentation Lead at
  EventStream, a real-time event processing platform.
  The platform's API is the primary way customers
  integrate with EventStream, but the current docs
  are scattered, incomplete, and written by engineers
  without writing experience. Developer NPS is -15
  (developers actively complain about the docs).

  API overview:
  - RESTful API with JSON responses
  - WebSocket API for real-time event streams
  - Authentication: API keys (basic) and OAuth 2.0
    (advanced)
  - Rate limits: 1,000 req/min (free), 10,000
    req/min (pro), custom (enterprise)
  - SDKs: Python, Node.js, Go, Java
  - Webhooks: Event-driven notifications to customer
    endpoints

  Design and write the developer documentation hub:

  1. Documentation Architecture
  - Site structure and navigation design
  - Content types: Concepts, Tutorials, References,
    Guides
  - API versioning documentation strategy
  - Changelog and migration guide approach
  - Interactive API explorer integration

  2. Getting Started Guide
  Write the complete "Getting Started in 5 Minutes"
  tutorial:
  - Create API key
  - Send first API request (with cURL)
  - Create an event stream
  - Send events to the stream
  - Read events from the stream
  - Include code examples in Python and Node.js

  3. Authentication Guide
  Write the complete authentication documentation:
  - API key authentication (simple)
  - OAuth 2.0 flow (with diagrams described in text)
  - Token refresh process
  - Scopes and permissions
  - Security best practices

  4. Five Endpoint Reference Articles
  Write complete reference docs for:
  a) POST /v2/streams (Create Stream)
  b) POST /v2/streams/{id}/events (Publish Event)
  c) GET /v2/streams/{id}/events (Read Events)
  d) POST /v2/webhooks (Create Webhook)
  e) GET /v2/streams (List Streams with filtering)

  Each with: Description, authentication, parameters,
  request/response examples, error codes, rate
  limits, and code samples.

  5. Webhook Documentation
  - Webhook concepts and architecture
  - Event types and payload schemas
  - Retry policy and failure handling
  - Webhook signature verification
  - Testing webhooks locally

  6. Error Handling Guide
  - Error response format
  - Error code reference (complete table)
  - Common error patterns and solutions
  - Rate limiting handling
  - Retry strategies with exponential backoff

  Task: Write the complete developer documentation
  hub.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete developer doc hub — documentation architecture with navigation and content types; getting started tutorial completing in 5 minutes with code in Python and Node.js; authentication guide with API keys and OAuth 2.0; 5 endpoint references with parameters, examples, and error codes; webhook documentation with verification and testing; error handling guide with retry strategies."
    weight: 0.35
    description: "DevDocHubCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates developer documentation expertise — the getting started guide achieves first success in 5 minutes; code examples are correct and follow language idioms; endpoint references include all necessary details for integration; webhook documentation covers real production concerns; error handling includes practical retry logic; the documentation follows API documentation best practices (Stripe/Twilio quality level)."
    weight: 0.35
    description: "DevDocExpertise"
  - type: llm_judge
    criteria: "Response would improve developer experience — developer NPS would move from -15 to positive; developers would integrate successfully using just the docs; the getting started guide would reduce time-to-first-API-call; support tickets about API usage would decrease; the documentation would be cited as an example of good API docs."
    weight: 0.30
    description: "DevExperienceOutcome"
