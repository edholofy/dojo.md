meta:
  id: ai-powered-kb-design
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Design an AI-powered knowledge base system with automated content generation, intelligent search, chatbot integration, and predictive content recommendations"
  tags: [ai-powered, intelligent-search, chatbot, content-generation, advanced]

state: {}

trigger: |
  You're the VP of Customer Experience at a
  mid-market SaaS company (800 employees, 5,000
  customers). The board has approved a $500K
  investment in "AI-powered self-service." Your
  job: design how AI will transform the knowledge
  base from a static article repository into an
  intelligent, proactive self-service system.

  Current state:
  - 500 KB articles, ticket deflection at 20%
  - 12,000 support tickets/month ($18 average
    cost per ticket)
  - Customer satisfaction with support: 3.8/5.0
  - 3 support tiers: chatbot (basic) → Level 1
    agents → Level 2 specialists
  - Platform: Zendesk Guide + Zendesk Chat

  Design the AI-powered KB system:

  1. AI-Assisted Content Creation
  - Auto-draft articles from resolved support
    tickets (how it works, quality control)
  - AI content freshness monitoring (detecting
    outdated content by comparing KB to product
    changelog)
  - Automatic screenshot detection (flagging
    screenshots that no longer match the current UI)
  - AI-generated article summaries and TL;DR sections
  - Content gap identification from failed searches
    and unresolved tickets
  - SME-friendly authoring (AI drafts, human reviews)

  2. Intelligent Search
  - Semantic search implementation (understanding
    intent, not just keywords)
  - Natural language query support ("how do I add
    a user" vs. "user management")
  - Personalized results (based on user's product
    plan, role, and history)
  - Federated search across KB, community forum,
    and product docs
  - Search analytics and continuous improvement

  3. AI Chatbot Integration
  - Conversational KB access (chat-based article
    delivery)
  - Multi-turn troubleshooting flows
  - Seamless handoff to human agents (with context)
  - Chatbot content quality measurement
  - Feedback loop: chatbot failures → content gaps
    → new articles

  4. Predictive and Proactive Content
  - Predicting what help users need based on their
    behavior (just enabled a feature → surface
    relevant article)
  - In-product contextual help powered by AI
  - Proactive email with relevant articles based
    on usage patterns
  - Onboarding content recommendations

  5. Implementation Plan
  - Phase 1 (Months 1-3): Intelligent search +
    content gap analysis
  - Phase 2 (Months 4-6): AI chatbot enhancement
  - Phase 3 (Months 7-9): AI content creation +
    freshness monitoring
  - Phase 4 (Months 10-12): Predictive and proactive
    features
  - Budget allocation across phases
  - Success metrics per phase
  - Risk mitigation (AI hallucination, content
    quality, customer trust)

  6. ROI Projection
  - Projected ticket deflection improvement
  - Cost savings calculation
  - Customer satisfaction impact
  - 3-year ROI model

  Task: Write the complete AI-powered KB system
  design.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete AI-powered KB design — AI content creation with auto-drafting, freshness monitoring, and gap identification; intelligent search with semantic understanding and personalization; chatbot integration with multi-turn flows and handoff; predictive content with behavior-based surfacing; 4-phase implementation plan with budget; ROI projection with 3-year model."
    weight: 0.35
    description: "AIKBDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI/KB expertise — the AI features are technically feasible with current technology; content quality controls prevent AI hallucination; the semantic search improvement is meaningful; chatbot-to-human handoff preserves context; predictive features are based on real behavioral signals; the implementation phases are ordered correctly (quick wins first); risk mitigation addresses real concerns."
    weight: 0.35
    description: "AIKBExpertise"
  - type: llm_judge
    criteria: "Response would deliver measurable ROI — ticket deflection would increase significantly from 20%; the $500K investment would pay for itself within 12-18 months; customer satisfaction would improve; the AI features would create a competitive advantage; the board would see clear results; the system would improve continuously through feedback loops."
    weight: 0.30
    description: "AIKBROIOutcome"
