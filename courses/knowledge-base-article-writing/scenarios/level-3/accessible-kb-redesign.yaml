meta:
  id: accessible-kb-redesign
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Redesign a knowledge base for WCAG 2.1 AA accessibility compliance — content structure, alt text strategy, screen reader optimization, and inclusive writing guidelines"
  tags: [accessibility, wcag, inclusive-design, screen-reader, advanced]

state: {}

trigger: |
  You're the Accessibility Lead at a government
  technology vendor. A federal contract requires
  WCAG 2.1 AA compliance for all customer-facing
  content, including the knowledge base. An audit
  found 47 accessibility violations across 400
  articles. You have 90 days to remediate and
  establish ongoing compliance.

  Audit findings:
  - 180 images missing alt text
  - 90 articles with improper heading hierarchy
    (skipping H2 to H4, or using H1 multiple times)
  - 45 articles with color-only status indicators
    (red/green with no text alternative)
  - 30 articles with tables lacking proper headers
    and scope attributes
  - 25 articles with links labeled "click here"
    (non-descriptive link text)
  - 20 videos without captions
  - 15 articles with keyboard navigation issues
    (expandable sections not keyboard-accessible)
  - 12 articles with insufficient color contrast
  - 10 interactive elements without ARIA labels
  - 5 PDF attachments that are not tagged for
    accessibility

  Design the accessible KB:

  1. Accessibility Remediation Plan
  - Prioritization of 47 findings by severity and
    impact
  - Remediation approach for each violation type
  - 90-day timeline with milestones
  - Resource allocation and responsibilities
  - Testing methodology (automated + manual +
    assistive technology)

  2. Accessible Content Guidelines
  - Alt text writing guide (with 20 examples for
    different image types: screenshots, diagrams,
    decorative images, charts, icons)
  - Heading structure rules (with before/after
    examples)
  - Accessible table formatting guide
  - Link text best practices
  - Color and contrast requirements
  - Writing for screen readers (content structure,
    reading order)

  3. Accessible Article Templates
  - Redesign 3 article templates (how-to,
    troubleshooting, reference) with accessibility
    built in
  - ARIA landmark and role specifications
  - Keyboard navigation patterns for interactive
    elements
  - Expandable/collapsible section implementation

  4. Multimedia Accessibility
  - Video captioning standards and workflow
  - Audio description requirements
  - Image alt text review process
  - PDF accessibility remediation guide
  - Alternative formats (text versions of visual
    content)

  5. Ongoing Compliance Program
  - Accessibility checklist for new articles
  - Automated testing integration (which tools,
    what they catch)
  - Manual testing protocol (keyboard, screen
    reader, magnification)
  - Accessibility training for KB writers
  - Quarterly accessibility audit process
  - Feedback mechanism for users with disabilities

  6. Write 3 Remediated Articles
  Take 3 types of non-compliant articles and rewrite
  them as fully accessible:
  a) A how-to article with screenshots (proper alt
    text, heading structure, step formatting)
  b) A comparison table article (accessible headers,
    scope, screen reader navigation)
  c) A troubleshooting article with a decision tree
    (accessible for keyboard and screen reader users)

  Task: Write the complete accessible KB redesign
  with remediated articles.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete accessible KB redesign — remediation plan for all 47 findings with 90-day timeline; content guidelines with 20 alt text examples, heading rules, and table formatting; 3 accessible article templates with ARIA specifications; multimedia accessibility with captioning and PDF remediation; ongoing compliance program with testing and training; 3 fully remediated sample articles."
    weight: 0.35
    description: "AccessibilityRedesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates accessibility expertise — alt text examples cover different image types appropriately; heading structure follows WCAG hierarchy; table accessibility includes proper scope and headers; the remediation prioritization considers user impact; the testing methodology combines automated and manual approaches; screen reader navigation considerations are specific and practical; the 3 remediated articles demonstrate best practices."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "Response would achieve WCAG 2.1 AA compliance — the 47 audit findings would be remediated within 90 days; new articles would be accessible by default through templates and checklists; users with disabilities would navigate the KB effectively; the ongoing compliance program would prevent regression; the federal contract requirement would be met; the KB would serve as a model for accessible documentation."
    weight: 0.30
    description: "WCAGComplianceOutcome"
