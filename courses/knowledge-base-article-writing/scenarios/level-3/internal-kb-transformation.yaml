meta:
  id: internal-kb-transformation
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Transform an internal company knowledge base from a chaotic document dump into a structured, searchable, and actively maintained resource for 2,000 employees"
  tags: [internal-kb, employee-knowledge, document-management, transformation, advanced]

state: {}

trigger: |
  You're the Knowledge Management Lead at a 2,000-
  person professional services firm. The internal KB
  (on Confluence) has become a graveyard — 5,000
  pages created over 8 years, most outdated, poorly
  organized, and undiscoverable. Employees have
  given up searching and just ask colleagues or
  recreate documents from scratch.

  Employee survey results:
  - "I can find what I need in the KB" — 15% agree
  - "The information in the KB is current" — 22% agree
  - "I contribute to the KB regularly" — 8% agree
  - Estimated 3 hours/week/employee lost to searching
    for or recreating information

  Current state:
  - 5,000 pages across 200+ spaces (many abandoned)
  - No naming conventions, no taxonomy, no templates
  - 40% of pages haven't been modified in 2+ years
  - Search is essentially useless (returns irrelevant
    results)
  - No content ownership (pages are orphaned)
  - No governance (anyone can create anything
    anywhere)
  - Critical knowledge lives in individuals' heads
    or personal drives

  Design the complete internal KB transformation:

  1. Assessment and Cleanup
  - Content audit methodology for 5,000 pages
  - Decision framework: Keep, Update, Archive,
    Delete
  - Content ownership assignment process
  - Space consolidation plan (200+ → target number)
  - Quick-win cleanup priorities

  2. Information Architecture
  - Space structure design for a professional
    services firm
  - Page hierarchy and naming conventions
  - Template library (10 templates for common
    internal content types: policy, process, project,
    meeting notes, decision record, how-to, etc.)
  - Taxonomy and labeling system
  - Cross-linking and navigation strategy

  3. Knowledge Capture Program
  - Identifying critical undocumented knowledge
  - Expert interview methodology
  - Process documentation sprint format
  - "Write what you know" contributor program
  - Tribal knowledge capture before employee
    departures

  4. Governance and Maintenance
  - Content steward model (who's responsible for
    what)
  - Page lifecycle management (creation → review →
    archive → delete)
  - Quarterly review process
  - Governance dashboard (page health metrics)
  - Escalation process for stale content

  5. Adoption and Change Management
  - Communication campaign ("the new KB is here")
  - Training program for content consumers and
    contributors
  - Incentive program for contributors
  - Executive sponsorship and role modeling
  - Integration into daily workflows (meeting notes
    go in KB, decisions go in KB, processes go in KB)

  6. Measurement
  - Adoption metrics (active users, contributions,
    search success)
  - Impact metrics (time saved, knowledge reuse,
    employee satisfaction)
  - Quality metrics (content freshness, accuracy)
  - ROI calculation (3 hours/week saved × 2,000
    employees)
  - Quarterly reporting template

  Task: Write the complete internal KB
  transformation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete internal KB transformation — assessment with 5,000-page audit methodology and decision framework; IA with space structure, 10 templates, and taxonomy; knowledge capture with expert interviews and tribal knowledge program; governance with steward model and lifecycle management; adoption with change management and incentives; measurement with adoption, impact, and quality metrics and ROI."
    weight: 0.35
    description: "InternalKBCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates internal knowledge management expertise — the content audit methodology is practical for 5,000 pages; the decision framework (Keep/Update/Archive/Delete) has clear criteria; the space consolidation is appropriate for a professional services firm; the knowledge capture program addresses the 'tribal knowledge' problem; the change management recognizes that the tool is not the problem — the culture is; the governance model is sustainable."
    weight: 0.35
    description: "InternalKMExpertise"
  - type: llm_judge
    criteria: "Response would transform internal knowledge — 'I can find what I need' would improve from 15% to 70%+; the 3 hours/week productivity loss would decrease significantly; critical knowledge would be documented and accessible; the KB would become the go-to resource instead of being bypassed; the ROI calculation would justify the investment; the firm would retain knowledge through employee departures."
    weight: 0.30
    description: "InternalTransformationOutcome"
