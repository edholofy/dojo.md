meta:
  id: advanced-kb-shift
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Shift simulation — three complex KB challenges: a healthcare patient portal KB requiring health literacy standards, a cybersecurity incident response knowledge base for a SOC team, and a SaaS product sunsetting communication and documentation"
  tags: [shift-simulation, health-literacy, cybersecurity, product-sunset, advanced]

state: {}

trigger: |
  You're a senior knowledge management consultant.
  Three clients need your expertise this month.

  === CLIENT 1: Healthcare Patient Portal KB ===
  A hospital network is launching a patient portal
  (MyHealth Online). Patients — many elderly, low
  digital literacy, non-native English speakers —
  need help navigating the portal to view test
  results, message doctors, schedule appointments,
  and manage prescriptions.

  Requirements:
  - Health literacy standards (6th-grade reading
    level, plain language, clear instructions)
  - HIPAA considerations (what can/can't be in
    public-facing content about accessing health
    data)
  - Bilingual (English and Spanish)
  - Large text, simple navigation, minimal jargon
  - Must address patient anxiety about using
    technology for health

  Write 5 patient portal KB articles:
  1. "How to Log In to MyHealth Online" (first-time
     and returning users)
  2. "Understanding Your Test Results" (what patients
     see, what it means, when to call the doctor)
  3. "How to Message Your Doctor" (composing, sending,
     expected response time, what's urgent vs. portal)
  4. "Managing Your Medications" (viewing prescriptions,
     requesting refills)
  5. "Scheduling an Appointment Online" (available
     slots, provider selection, cancellation)

  === CLIENT 2: Cybersecurity SOC KB ===
  A managed security services provider (MSSP) needs
  an internal KB for its Security Operations Center
  (SOC). Analysts need quick-reference runbooks for
  common security incidents.

  Write 3 SOC runbook articles:
  1. "Phishing Email Investigation Runbook" (triage
     criteria, analysis steps, containment actions,
     user notification template, escalation criteria)
  2. "Malware Detection Response Runbook" (alert
     validation, isolation procedures, forensic
     collection, eradication steps, recovery)
  3. "Suspicious Login Activity Runbook" (alert
     review, impossible travel detection, account
     lockout procedures, user verification, false
     positive handling)

  Each must include: Priority/severity classification,
  step-by-step response procedures, decision points,
  escalation criteria, evidence collection requirements,
  and communication templates.

  === CLIENT 3: Product Sunsetting Documentation ===
  A SaaS company is sunsetting one of its products
  (DataVault Classic) in 6 months. 2,000 customers
  need to migrate to DataVault Next or export their
  data. The KB needs articles to support this
  transition.

  Write 4 sunset-related KB articles:
  1. "DataVault Classic End-of-Life: What You Need
     to Know" (timeline, what happens at each stage,
     FAQs)
  2. "Migrating from DataVault Classic to DataVault
     Next" (step-by-step migration guide)
  3. "Exporting Your Data from DataVault Classic"
     (all export options, formats, and data retention)
  4. "DataVault Classic to DataVault Next: Feature
     Comparison" (what's the same, what's different,
     what's new, what's gone)

  Task: Write all articles for all three clients.

assertions:
  - type: llm_judge
    criteria: "Response creates articles for all three clients — 5 patient portal articles at 6th-grade reading level with HIPAA awareness; 3 SOC runbooks with triage, response procedures, decision points, and escalation; 4 product sunset articles with timeline, migration guide, data export, and feature comparison. Each set follows appropriate format and standards for its context."
    weight: 0.35
    description: "ThreeClientCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across contexts — patient portal articles use plain language and address technology anxiety; SOC runbooks follow incident response methodology with proper severity classification; sunset articles balance honesty about end-of-life with encouragement to migrate; each client's articles reflect deep understanding of the domain, audience, and regulatory context (HIPAA, cybersecurity, SaaS)."
    weight: 0.35
    description: "CrossContextExpertise"
  - type: llm_judge
    criteria: "Response would serve each client's users — patients would navigate the portal independently; SOC analysts would follow runbooks to resolve incidents efficiently; DataVault customers would migrate or export before the sunset deadline; each article set would reduce its respective support burden; the tone and complexity level matches each audience."
    weight: 0.30
    description: "ThreeClientOutcome"
