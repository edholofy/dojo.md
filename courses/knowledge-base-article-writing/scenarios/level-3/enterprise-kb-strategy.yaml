meta:
  id: enterprise-kb-strategy
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Design a complete enterprise knowledge base strategy for a multi-product company — content architecture, authoring workflows, governance, and self-service optimization across 3 products and 5 audience segments"
  tags: [enterprise-strategy, multi-product, governance, self-service, advanced]

state: {}

trigger: |
  You're the Director of Knowledge Management at
  TechSuite, a company with 3 B2B products (CRM,
  Marketing Automation, Customer Support platform),
  2,000 enterprise customers, and 50,000 end users.
  Currently each product has its own separate KB
  with different platforms, styles, and quality.
  The CEO wants a unified knowledge strategy.

  Current state:
  - CRM KB: 400 articles on Zendesk Guide, well-
    maintained, 4.1 avg rating
  - Marketing KB: 200 articles on Confluence (public),
    poorly maintained, 2.8 avg rating
  - Support KB: 150 articles on custom WordPress,
    outdated, 3.0 avg rating
  - No cross-product content (customers using
    multiple products can't find integration docs)
  - 5 audience segments: End users, Admins, Developers,
    Implementation partners, Internal support agents
  - Ticket deflection: 22% overall (CRM: 30%,
    Marketing: 15%, Support: 12%)

  Design the complete enterprise KB strategy:

  1. Vision and Architecture
  - Unified knowledge base vision
  - Platform consolidation recommendation (build
    vs. buy, platform selection criteria)
  - Information architecture spanning 3 products
  - Cross-product content strategy
  - Audience segmentation and personalization

  2. Content Strategy
  - Content audit methodology for 750 existing articles
  - Content gap analysis framework
  - Article templates by type (10 templates)
  - Style guide summary (unified across products)
  - Multimedia standards

  3. Authoring and Publishing Workflow
  - Content creation workflow (draft → review →
    approve → publish)
  - SME engagement model (getting product managers
    and engineers to contribute)
  - Editorial calendar and release coordination
  - Content update triggers (product changes,
    support ticket patterns)
  - Translation and localization workflow (5 languages)

  4. Governance
  - Content ownership model (who owns what)
  - Quality standards and audit cadence
  - Metrics and KPIs for each product KB
  - Escalation process for content disputes
  - Annual content review process

  5. Self-Service Optimization
  - Search experience redesign
  - Chatbot integration strategy
  - In-product help (contextual KB)
  - Community forum integration
  - Proactive content (surfacing articles before
    users need them)

  6. Implementation Roadmap
  - 12-month phased migration and improvement plan
  - Resource requirements (team, budget, tools)
  - Quick wins vs. long-term investments
  - Success metrics and quarterly targets

  Task: Write the complete enterprise KB strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise strategy — vision with platform recommendation and cross-product architecture; content strategy with audit methodology, gap analysis, and 10 templates; authoring workflow with SME engagement and localization; governance with ownership, quality standards, and metrics; self-service with search redesign, chatbot, and in-product help; 12-month roadmap with resources and targets."
    weight: 0.35
    description: "EnterpriseKBCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise knowledge management expertise — the platform consolidation addresses real trade-offs; cross-product content fills a genuine gap; audience segmentation enables personalized experiences; the SME engagement model gets busy experts to contribute; governance prevents quality degradation over time; the chatbot and in-product help increase self-service; the roadmap is realistic for migrating 750 articles."
    weight: 0.35
    description: "EnterpriseKMExpertise"
  - type: llm_judge
    criteria: "Response would transform the knowledge experience — ticket deflection would increase from 22% to 35%+; the unified KB would serve all 5 audience segments; cross-product content would support multi-product customers; the 12-month roadmap would show measurable improvement each quarter; the CEO would see clear ROI from the knowledge strategy investment."
    weight: 0.30
    description: "KBTransformationOutcome"
