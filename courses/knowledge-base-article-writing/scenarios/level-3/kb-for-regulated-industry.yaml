meta:
  id: kb-for-regulated-industry
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Create a knowledge base for a regulated financial services product — balancing compliance requirements, legal review workflows, and user-friendly content with audit trails and version control"
  tags: [regulated-industry, financial-services, compliance, audit-trail, advanced]

state: {}

trigger: |
  You're the Documentation Lead at a fintech company
  that offers investment accounts to retail customers.
  The SEC and FINRA regulate what you can and cannot
  say in customer-facing materials. Every KB article
  must be reviewed by compliance before publishing.
  Getting this wrong has real consequences — the
  company was fined $250K last year for a KB article
  that made performance claims without proper
  disclosures.

  Regulatory constraints:
  - Cannot guarantee returns or make performance
    projections
  - Must include risk disclosures for investment-
    related content
  - Fee disclosures must be accurate and prominently
    displayed
  - "Past performance is not indicative of future
    results" disclaimer required
  - Cannot use terms like "safe," "guaranteed," or
    "risk-free" for investments
  - Content must be "fair and balanced" (risks and
    rewards equally presented)
  - All customer-facing content must be retained
    for 6 years
  - Changes to published content must be tracked
    with full audit trail
  - Compliance must approve all content before
    publish and all updates

  Design and write the regulated KB:

  1. Compliance-Aware Content Framework
  - Content classification system (regulated vs.
    non-regulated articles)
  - Required disclosures by content type
  - Prohibited language list with alternatives
  - Compliance review workflow (draft → compliance
    review → legal sign-off → publish)
  - Emergency update process (when compliance
    requires immediate content changes)

  2. Write 5 Compliant KB Articles
  Write 5 complete articles that demonstrate
  compliance-aware writing:

  a) "Understanding Your Investment Account Types"
  (IRA, Roth IRA, taxable brokerage — with proper
  disclosures, risk language, and regulatory
  disclaimers)

  b) "How Fees Work at [Company]" (management fees,
  trading costs, account fees — with required
  disclosure format)

  c) "How to Transfer Your Account" (ACAT transfer
  process — operational article with minimal
  regulatory risk)

  d) "Understanding Market Risk" (educational
  content about risk — heavily regulated, must be
  balanced)

  e) "Tax Implications of Investing" (tax-lot
  methods, wash sales, 1099 — with "not tax advice"
  disclaimers)

  3. Version Control and Audit System
  - Content versioning requirements
  - Audit trail specifications
  - 6-year retention implementation
  - Compliance review documentation
  - Regulatory exam preparation guide

  4. Compliance Training for KB Writers
  - What writers need to know about SEC/FINRA rules
  - Common compliance mistakes in KB content
  - Self-review checklist before submitting to
    compliance
  - Examples of non-compliant vs. compliant language

  Task: Write the complete regulated KB framework
  with all 5 articles.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete regulated KB — content framework with classification, disclosures, prohibited language, and compliance workflow; 5 compliant articles covering account types, fees, transfers, market risk, and tax implications each with appropriate disclosures; version control with audit trail and 6-year retention; compliance training for writers with examples and checklist."
    weight: 0.35
    description: "RegulatedKBCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates regulatory compliance expertise — the 5 articles include appropriate SEC/FINRA disclosures; prohibited terms are avoided; risk and reward are presented in balanced fashion; fee disclosures are prominent and specific; the 'not tax/investment advice' disclaimers are properly placed; the compliance workflow prevents unauthorized publishing; the audit trail meets regulatory examination requirements."
    weight: 0.35
    description: "RegulatoryComplianceExpertise"
  - type: llm_judge
    criteria: "Response would satisfy regulators and users — SEC/FINRA examiners would find the content compliant; the articles are still user-friendly despite disclosures; the compliance framework would prevent future fines; the writer training would reduce compliance review cycles; users would understand their accounts, fees, and risks; the KB would serve as a model for regulated content."
    weight: 0.30
    description: "RegulatoryComplianceOutcome"
