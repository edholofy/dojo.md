meta:
  id: multilingual-kb-program
  level: 3
  course: knowledge-base-article-writing
  type: output
  description: "Design and implement a multilingual knowledge base program — translation workflow, cultural adaptation, quality assurance, and scalable content management for 8 languages"
  tags: [multilingual, localization, translation, cultural-adaptation, advanced]

state: {}

trigger: |
  You're the Localization Manager at GlobalPay, a
  payment processing platform expanding into 12 new
  markets. The English KB has 600 articles. You need
  to translate and culturally adapt the KB into 8
  languages: Spanish, Portuguese, French, German,
  Japanese, Korean, Mandarin Chinese, and Arabic.

  Challenges:
  - Budget: $150K for initial translation, $50K/year
    for ongoing maintenance
  - The KB gets 30-40 article updates per month
  - Technical terminology must be consistent across
    languages
  - Some content is market-specific (payment methods,
    regulations, currencies differ by country)
  - Right-to-left language support needed (Arabic)
  - Screenshots contain English UI text (product
    is being localized simultaneously)
  - Legal/compliance content requires certified
    translation
  - Machine translation quality varies by language
    pair

  Design the complete multilingual KB program:

  1. Translation Strategy
  - Prioritization framework (which articles to
    translate first, based on traffic, support
    volume, market importance)
  - Translation tiers: Tier 1 (human professional
    translation), Tier 2 (machine translation +
    human review), Tier 3 (machine translation only)
  - Which content goes in which tier
  - Vendor selection criteria (LSPs, freelancers,
    AI tools)
  - Translation memory and glossary management

  2. Cultural Adaptation
  - Content that needs cultural adaptation vs.
    straight translation
  - Market-specific content creation (payment
    methods, regulations, currencies)
  - Cultural sensitivity review process
  - Visual and layout adaptation (RTL for Arabic,
    character width for CJK languages)
  - Examples of cultural adaptation for 3 markets

  3. Quality Assurance
  - Linguistic quality assurance (LQA) process
  - In-country reviewer recruitment and management
  - Quality scoring methodology
  - Feedback loop from local support teams
  - Terminology consistency audits

  4. Workflow and Tools
  - End-to-end translation workflow (source change
    → translation → review → publish)
  - TMS (Translation Management System) requirements
  - Integration with KB platform
  - Continuous localization pipeline (automating
    ongoing updates)
  - Source content authoring best practices (writing
    for translation)

  5. Budget and Resource Plan
  - Cost breakdown by language and tier
  - Per-word vs. per-article cost analysis
  - Ongoing maintenance cost model
  - ROI calculation (reduced support costs in local
    markets)
  - Phased rollout (which languages first)

  6. Governance
  - Language-specific content ownership
  - Update synchronization (keeping translations
    in sync with English source)
  - Content retirement across languages
  - Quality metrics by language
  - Annual review process

  Task: Write the complete multilingual KB program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multilingual program — translation strategy with prioritization and 3-tier approach; cultural adaptation with market-specific content and RTL/CJK considerations; QA process with LQA, in-country review, and terminology audits; workflow with TMS integration and continuous pipeline; budget with cost breakdown and phased rollout; governance with sync and ownership models."
    weight: 0.35
    description: "MultilingualProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates localization expertise — the tiered approach balances quality and cost realistically; cultural adaptation goes beyond translation to market-specific content; the $150K budget is allocated strategically; CJK and RTL challenges are specifically addressed; the continuous localization pipeline handles 30-40 monthly updates; terminology management prevents inconsistency; the phased rollout prioritizes highest-impact languages."
    weight: 0.35
    description: "LocalizationExpertise"
  - type: llm_judge
    criteria: "Response would enable global self-service — customers in each market would find KB content in their language; cultural adaptation would make content feel native, not translated; the translation quality would be consistent; ongoing updates would stay synchronized; the program would reduce local-market support costs; the ROI would justify the investment."
    weight: 0.30
    description: "GlobalSelfServiceOutcome"
