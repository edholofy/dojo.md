meta:
  id: getting-started-guide
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a getting started guide that takes new users from account creation to their first successful action in an invoicing tool"
  tags: [getting-started, onboarding, first-success, beginner, invoicing]

state: {}

trigger: |
  You're a technical writer at InvoiceSimple, a
  small business invoicing tool. Analytics show that
  40% of new signups never send their first invoice.
  Your job: write a "Getting Started" guide that
  gets new users to their first successful invoice
  within 15 minutes of signing up.

  Product context:
  - InvoiceSimple is a web app for freelancers and
    small businesses
  - Key first actions: Set up business profile →
    Add first client → Create invoice → Send invoice
  - Users can customize invoice templates with their
    logo and colors
  - The product supports one-time and recurring
    invoices
  - Payment options: Stripe integration, bank
    transfer, PayPal
  - Free plan: 5 invoices/month; Pro plan: unlimited

  Write the getting started guide:
  - Welcoming title and introduction (congratulate
    on signing up, set expectations for what they'll
    accomplish)
  - Step 1: Complete your business profile (company
    name, logo, address, payment details)
  - Step 2: Add your first client (name, email,
    billing address)
  - Step 3: Create your first invoice (select client,
    add line items, set due date, preview)
  - Step 4: Send the invoice (email delivery, share
    link, PDF download options)
  - "What's next?" section (recurring invoices,
    expense tracking, payment reminders)
  - Pro tips sidebar (3-4 quick tips for getting
    the most out of InvoiceSimple)
  - Time estimate for each step

assertions:
  - type: llm_judge
    criteria: "Response creates a complete getting started guide — welcoming introduction; 4 clear steps from business profile to sending first invoice; each step has specific instructions; 'what's next' section with advanced features; pro tips; time estimates. The guide is designed to be completed in 15 minutes or less."
    weight: 0.35
    description: "GettingStartedCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding content expertise — the guide focuses on the single goal of sending a first invoice; steps are concise and avoid information overload; optional customization is mentioned but not required; the tone is encouraging and celebrates progress; the guide reduces cognitive load by deferring advanced features to 'what's next'; UI elements are clearly referenced."
    weight: 0.35
    description: "OnboardingContentQuality"
  - type: llm_judge
    criteria: "Response would improve activation rates — new users following this guide would successfully send their first invoice; the 15-minute timeframe is achievable; the guide would reduce the 40% drop-off rate; users would feel confident and capable; the 'what's next' section would drive continued engagement."
    weight: 0.30
    description: "ActivationImpactOutcome"
