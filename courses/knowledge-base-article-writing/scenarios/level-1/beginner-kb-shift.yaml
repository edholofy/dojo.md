meta:
  id: beginner-kb-shift
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Shift simulation — write three different KB articles for three different products: a mobile app setup guide, a hardware product warranty FAQ, and a SaaS data export how-to"
  tags: [shift-simulation, multi-product, mobile-app, hardware, saas, beginner]

state: {}

trigger: |
  You're a freelance technical writer working on
  three different KB projects this week. Each client
  needs a single article written for their knowledge
  base. Write all three.

  === ARTICLE 1: Mobile App Setup Guide ===
  Client: FitTrack, a fitness tracking mobile app
  Write a "Getting Started with FitTrack" article
  for users who just downloaded the app.

  Context:
  - Available on iOS and Android
  - Setup: Create account → Connect wearable device
    (optional, supports Fitbit, Apple Watch, Garmin)
    → Set fitness goals → Complete first workout
  - Key features: Step tracking, workout logging,
    meal tracking, sleep analysis
  - The app requests permissions for: Health data,
    location (for outdoor tracking), notifications
  - Common issue: Bluetooth pairing failures with
    wearables

  Include: Welcome message, permissions explanation,
  account setup steps, optional device pairing,
  goal setting, first workout guidance, and "explore
  more" section.

  === ARTICLE 2: Hardware Product Warranty FAQ ===
  Client: BrightHome, a smart home device company
  Write a warranty FAQ for their smart thermostat.

  Context:
  - Standard warranty: 2 years from purchase date
  - Extended warranty available: +1 year for $29.99
  - Covers: Manufacturing defects, hardware failure,
    display malfunction
  - Does NOT cover: Physical damage, water damage,
    improper installation, normal wear, unauthorized
    modifications
  - Claim process: Register product → Submit claim
    online → Receive prepaid shipping label → Send
    device → Replacement shipped within 5-7 business
    days
  - Proof of purchase required
  - Warranty is non-transferable

  Include: 10-12 FAQ questions covering coverage,
  claims, extended warranty, and what's not covered.

  === ARTICLE 3: SaaS Data Export How-To ===
  Client: DataPulse, a business analytics platform
  Write a "How to Export Your Data" article.

  Context:
  - Export formats: CSV, Excel (.xlsx), PDF, JSON
  - Export types: Dashboard export (visual), Raw
    data export, Scheduled exports (daily/weekly)
  - Data limits: Free plan (last 30 days), Pro
    (last 12 months), Enterprise (unlimited history)
  - Large exports (>100K rows) are processed in
    background and emailed when ready
  - GDPR: Users can request full data export of
    all personal data under "Privacy" settings
  - Export location: Reports → Export button (top
    right) → Select format and date range

  Include: Step-by-step for each export type, format
  comparison table, data limits by plan, scheduled
  exports setup, and GDPR data request process.

  Task: Write all three complete KB articles.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete KB articles — FitTrack mobile setup guide with permissions, account creation, device pairing, goals, and first workout; BrightHome warranty FAQ with 10-12 questions covering coverage, claims, and exclusions; DataPulse export how-to with steps for each export type, format comparison, limits, scheduling, and GDPR. Each article follows its appropriate format (guide, FAQ, how-to)."
    weight: 0.35
    description: "ThreeArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates versatility across KB formats — the mobile setup guide is encouraging and visual-friendly; the warranty FAQ uses clear question-answer format; the export how-to has detailed steps and comparison tables; each article matches the tone and format expectations of its product type (consumer app, hardware, B2B SaaS); all three are scannable and well-structured."
    weight: 0.35
    description: "FormatVersatility"
  - type: llm_judge
    criteria: "Response would serve each client's users — FitTrack users would complete setup and log their first workout; BrightHome customers would understand their warranty coverage and know how to file a claim; DataPulse users would export data in their preferred format; each article would deflect support tickets for its respective product."
    weight: 0.30
    description: "MultiProductOutcome"
