meta:
  id: feature-explanation-article
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write an article explaining a product feature — automated workflow rules — to help users understand and set up their first automation"
  tags: [feature-explanation, automation, workflows, beginner, product]

state: {}

trigger: |
  You're a technical writer at HelpDesk Pro, a
  customer support ticketing platform. The product
  team just launched "Workflow Rules" — an automation
  feature that lets users create if-then rules to
  automate repetitive tasks. Adoption is low because
  users don't understand what it does or how to
  set it up.

  Feature context:
  - Workflow Rules automate ticket actions based on
    conditions
  - Components: Trigger (when), Conditions (if),
    Actions (then)
  - Triggers: New ticket created, ticket updated,
    time-based (SLA approaching)
  - Conditions: Priority, category, assignee,
    customer type, keywords in subject
  - Actions: Assign to agent/team, change priority,
    add tags, send notification, send auto-reply
  - Users can create up to 25 rules on the Pro plan
  - Rules execute in order (first match wins)

  Write the feature explanation article:
  - Title and introduction (what workflow rules are
    and why they matter)
  - How workflow rules work (explain the trigger →
    condition → action model simply)
  - 5 practical examples with complete rule
    configurations:
    1. Auto-assign billing tickets to the billing
       team
    2. Escalate high-priority tickets that haven't
       been responded to in 1 hour
    3. Auto-tag tickets containing "refund" in the
       subject
    4. Send a welcome auto-reply to new customers
    5. Notify the manager when a VIP customer
       submits a ticket
  - Step-by-step: How to create your first rule
  - Tips for effective rules (order matters, test
    before enabling, start simple)
  - Limitations and things to know

assertions:
  - type: llm_judge
    criteria: "Response creates a complete feature explanation — title and introduction; clear explanation of trigger-condition-action model; 5 practical examples with specific configurations; step-by-step creation guide; tips for effective use; limitations section. Examples are realistic and immediately useful."
    weight: 0.35
    description: "FeatureExplanationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates feature writing expertise — the trigger-condition-action model is explained simply before diving into examples; examples progress from simple to complex; the step-by-step guide is specific enough to follow; tips prevent common mistakes; the article makes a potentially complex feature feel approachable; technical accuracy is maintained throughout."
    weight: 0.35
    description: "FeatureWritingQuality"
  - type: llm_judge
    criteria: "Response would drive feature adoption — users who read this article would understand what workflow rules are and feel confident creating their first rule; the 5 examples would inspire users to think about their own use cases; the article would increase adoption of the automation feature; users would set up at least one rule after reading."
    weight: 0.30
    description: "FeatureAdoptionOutcome"
