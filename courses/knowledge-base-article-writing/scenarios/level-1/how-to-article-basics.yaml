meta:
  id: how-to-article-basics
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a clear, step-by-step how-to article for a SaaS product's most common support request — resetting a password"
  tags: [how-to, step-by-step, beginner, password-reset, saas]

state: {}

trigger: |
  You're a technical writer at a project management
  SaaS company (TaskFlow). The support team says
  "How do I reset my password?" accounts for 15%
  of all tickets. Your job: write a knowledge base
  article that eliminates most of these tickets.

  Product context:
  - TaskFlow is a web-based project management tool
  - Users can reset passwords from the login page
    or from their account settings when logged in
  - The reset email comes from noreply@taskflow.com
  - The reset link expires after 24 hours
  - Passwords must be 8+ characters with at least
    one number and one special character
  - Users with SSO (Google, Microsoft) don't have
    TaskFlow passwords
  - Two-factor authentication users have an extra
    verification step

  Write the complete knowledge base article:
  - Clear, descriptive title
  - Brief introduction (when and why you'd need this)
  - Prerequisites or "before you begin" section
  - Step-by-step instructions with two methods:
    Method 1: From the login page (when locked out)
    Method 2: From account settings (when logged in)
  - Troubleshooting section (didn't receive email,
    link expired, SSO users)
  - Password requirements summary
  - Related articles section (suggest 3-4 related
    topics)

  The article should be scannable — use headers,
  numbered steps, notes/warnings, and bold for key
  UI elements.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete how-to article — clear title; brief introduction; two methods (login page and account settings) with numbered steps; troubleshooting section covering common issues; password requirements; related articles section. The article uses proper formatting with headers, numbered steps, bold for UI elements, and notes/warnings."
    weight: 0.35
    description: "HowToArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates KB writing best practices — steps are specific and actionable (click X, then Y); UI elements are clearly identified; screenshots would naturally fit at each step; the troubleshooting section anticipates real user problems; SSO users are addressed to prevent confusion; the tone is helpful and professional; the article is scannable without reading every word."
    weight: 0.35
    description: "KBWritingQuality"
  - type: llm_judge
    criteria: "Response would reduce support tickets — a user who finds this article would be able to reset their password without contacting support; edge cases (SSO, 2FA, expired links) are covered; the article is findable through common search terms; it would deflect the majority of the 15% of tickets about password resets."
    weight: 0.30
    description: "TicketDeflectionOutcome"
