meta:
  id: api-documentation-kb
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a knowledge base article explaining how to use an API endpoint for non-developer users who need to set up integrations"
  tags: [api-documentation, integrations, non-developer, beginner, technical]

state: {}

trigger: |
  You're a technical writer at FormStack, a form
  builder platform. Many users (small business owners,
  not developers) want to connect FormStack to their
  CRM using the webhook integration. The current
  API docs are too technical. Write a KB article that
  explains webhooks to non-developers.

  Feature context:
  - Webhooks send form submission data to an external
    URL when a form is submitted
  - Users need to: Enable webhooks on a form, enter
    a destination URL, choose which fields to send,
    and test the connection
  - Common destinations: Zapier, CRM systems,
    Google Sheets (via Apps Script), custom servers
  - The webhook sends JSON data via HTTP POST
  - Users can see webhook delivery logs in Settings
  - Failed webhooks retry 3 times over 24 hours

  Write the KB article:
  - Title and introduction (explain what webhooks
    are in plain language, using an analogy)
  - "What you'll need" section (prerequisites)
  - Step-by-step setup guide with clear instructions
  - Testing your webhook (how to verify it works)
  - Common destinations with specific setup tips:
    * Connecting to Zapier
    * Connecting to Google Sheets
    * Connecting to a custom URL
  - Troubleshooting (webhook not firing, data not
    appearing, authentication errors)
  - Glossary of terms (webhook, endpoint, payload,
    JSON, HTTP POST — all in plain language)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete integration KB article — title and introduction with plain-language analogy; prerequisites; step-by-step setup; testing instructions; destination-specific tips for Zapier, Google Sheets, and custom URLs; troubleshooting section; glossary of technical terms. Technical concepts are explained for non-developers."
    weight: 0.35
    description: "IntegrationArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates technical-for-non-technical writing expertise — the webhook analogy makes the concept intuitive; steps avoid assuming developer knowledge; technical terms are explained when first used and collected in a glossary; the article bridges the gap between technical capability and non-technical users; screenshots or visual indicators are suggested at appropriate points."
    weight: 0.35
    description: "TechnicalAccessibility"
  - type: llm_judge
    criteria: "Response would enable non-developers to set up webhooks — small business owners would successfully connect their forms to Zapier or Google Sheets; the testing section would confirm the setup works; the troubleshooting section would resolve common issues; users would feel empowered to use integrations they previously thought required a developer."
    weight: 0.30
    description: "NonDevEnablementOutcome"
