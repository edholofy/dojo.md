meta:
  id: error-message-guide
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a knowledge base article that explains common error messages and their solutions for a file-sharing application"
  tags: [error-messages, solutions, file-sharing, beginner, support]

state: {}

trigger: |
  You're a technical writer at ShareBox, a file-
  sharing and collaboration platform. Users frequently
  encounter error messages and submit tickets asking
  "what does this error mean?" Write an article that
  explains the 10 most common error messages, what
  causes them, and how to fix them.

  Error messages to cover:
  1. "Upload failed: File size exceeds limit"
    (Free: 100MB, Pro: 2GB, Business: 10GB)
  2. "Permission denied: You don't have access to
    this folder" (not shared with user or link expired)
  3. "Storage quota exceeded" (account full)
  4. "File type not supported" (executable files
    blocked: .exe, .bat, .sh)
  5. "Sync conflict: This file was modified by
    another user" (simultaneous editing)
  6. "Download failed: Network error" (connectivity
    or firewall issues)
  7. "Share link expired" (links expire after 30
    days by default)
  8. "Version limit reached" (max 100 versions per
    file on Pro, 25 on Free)
  9. "Account suspended: Unusual activity detected"
    (security hold, contact support)
  10. "Integration connection lost" (Google Drive/
    Dropbox sync disconnected)

  Write the article:
  - Title and introduction
  - For each error message:
    * The exact error text (in a code/quote block)
    * What it means (plain language explanation)
    * Why it happens (common causes)
    * How to fix it (step-by-step solution)
    * How to prevent it (if applicable)
  - General troubleshooting tips
  - "Error not listed?" section with escalation path

assertions:
  - type: llm_judge
    criteria: "Response creates a complete error guide — title and introduction; all 10 error messages covered with exact text, plain language explanation, causes, fix steps, and prevention; general troubleshooting tips; escalation path for unlisted errors. Each error section is self-contained and actionable."
    weight: 0.35
    description: "ErrorGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates error documentation expertise — error messages are displayed in distinguishable format; explanations translate technical jargon into plain language; fixes are step-by-step and specific; prevention tips help users avoid recurring issues; the article is organized so users can quickly find their specific error; the tone is helpful and non-blaming."
    weight: 0.35
    description: "ErrorDocQuality"
  - type: llm_judge
    criteria: "Response would resolve error-related tickets — users would find their error message, understand the cause, and fix it themselves; the article would be easily findable by searching the exact error text; support agents would link to specific sections; the article would significantly reduce 'what does this error mean' tickets."
    weight: 0.30
    description: "ErrorResolutionOutcome"
