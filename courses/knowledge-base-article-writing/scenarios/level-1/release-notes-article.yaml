meta:
  id: release-notes-article
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a release notes article announcing a major product update with new features, improvements, and breaking changes"
  tags: [release-notes, product-update, changelog, beginner, communication]

state: {}

trigger: |
  You're a technical writer at SchedulePro, an
  appointment scheduling platform. Version 3.0 is
  launching next week with significant changes.
  Write a release notes article that informs users
  about what's new, what's changed, and what they
  need to do.

  Changes in v3.0:
  New features:
  - Group bookings (customers can book for multiple
    people at once, e.g., family appointments)
  - Waitlist management (when a slot is full,
    customers can join a waitlist and get notified
    of cancellations)
  - Custom booking forms (add custom questions to
    the booking flow)

  Improvements:
  - Calendar sync now supports iCloud (previously
    only Google and Outlook)
  - Email notifications redesigned with new templates
    (cleaner design, mobile-responsive)
  - Booking page loads 40% faster
  - Search now finds appointments by customer phone
    number

  Breaking changes:
  - Old embed code deprecated (must update to new
    embed code by March 31)
  - API v1 sunset (v2 required, migration guide
    available)
  - Minimum browser requirement updated (Chrome 90+,
    Firefox 88+, Safari 14+)

  Bug fixes:
  - Fixed timezone display bug for UTC+13 timezones
  - Fixed double-booking race condition under high
    load
  - Fixed CSV export truncating notes over 500 chars

  Write the release notes article:
  - Version number, date, and overview
  - New features section (with brief descriptions
    and links to detailed docs)
  - Improvements section
  - Breaking changes section (with clear action
    items and deadlines)
  - Bug fixes section
  - "Action required" summary box (what users need
    to do and by when)

assertions:
  - type: llm_judge
    criteria: "Response creates complete release notes — version/date header; overview; new features with descriptions; improvements list; breaking changes with deadlines and action items; bug fixes; action required summary. Breaking changes are clearly distinguished from optional updates."
    weight: 0.35
    description: "ReleaseNotesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates release notes expertise — new features are described with user benefit, not just technical detail; breaking changes include specific deadlines and migration steps; the tone balances excitement about new features with urgency about required actions; the article is scannable so users can quickly find relevant changes; links to detailed docs are suggested where appropriate."
    weight: 0.35
    description: "ReleaseNotesQuality"
  - type: llm_judge
    criteria: "Response would inform and prepare users — users would understand what's new and be excited about new features; users with embed codes or API v1 would know they need to take action and by when; the article would reduce 'what changed?' support tickets; users would feel informed rather than surprised by changes."
    weight: 0.30
    description: "UserPreparationOutcome"
