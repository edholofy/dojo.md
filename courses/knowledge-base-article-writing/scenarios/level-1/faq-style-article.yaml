meta:
  id: faq-style-article
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a comprehensive FAQ article about a SaaS product's billing and subscription management"
  tags: [faq, billing, subscription, beginner, self-service]

state: {}

trigger: |
  You're a technical writer at CloudVault, a cloud
  storage platform. The billing support team is
  overwhelmed with repetitive questions. Write a
  comprehensive billing FAQ that covers the 15 most
  common billing questions.

  Product context:
  - Plans: Free (5GB), Personal ($9.99/mo or $99/yr),
    Business ($19.99/user/mo or $199/user/yr),
    Enterprise (custom pricing)
  - Payment methods: Credit card, debit card, PayPal
  - Billing cycle: Monthly or annual (annual saves 17%)
  - Upgrades take effect immediately; downgrades at
    end of billing cycle
  - Refund policy: 30-day money-back guarantee on
    first purchase; no refunds on renewals
  - Invoices available in Settings → Billing →
    Invoice History
  - Tax: Sales tax applied based on location; VAT
    for EU customers; tax-exempt organizations can
    submit documentation

  Write the FAQ article covering at least 15
  questions organized into categories:
  - Plans and Pricing (4-5 questions)
  - Payment and Billing (4-5 questions)
  - Upgrades and Downgrades (3-4 questions)
  - Cancellation and Refunds (3-4 questions)

  Each answer should be:
  - Concise (2-4 sentences for simple questions)
  - Include specific navigation paths where relevant
  - Link to more detailed articles where appropriate
  - Written in a friendly, reassuring tone

assertions:
  - type: llm_judge
    criteria: "Response creates a complete billing FAQ — at least 15 questions organized into 4 categories (Plans/Pricing, Payment/Billing, Upgrades/Downgrades, Cancellation/Refunds); each answer is concise and specific; answers include UI navigation paths; cross-references to related articles are suggested; the FAQ covers the product context details accurately."
    weight: 0.35
    description: "FAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates FAQ writing expertise — questions are phrased as users would actually ask them; answers get to the point quickly; complex topics are broken down clearly; the tone is friendly without being informal; pricing details are accurate; edge cases (tax-exempt, EU VAT) are addressed; the organization makes it easy to scan and find relevant questions."
    weight: 0.35
    description: "FAQWritingQuality"
  - type: llm_judge
    criteria: "Response would reduce billing support tickets — users would find answers to their billing questions without contacting support; the FAQ anticipates follow-up questions; the cancellation section is honest and clear without being pushy; the article builds trust through transparency about billing practices."
    weight: 0.30
    description: "SupportDeflectionOutcome"
