meta:
  id: reference-documentation
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a reference article documenting all user roles and permissions in a team collaboration tool"
  tags: [reference, permissions, roles, beginner, documentation]

state: {}

trigger: |
  You're a technical writer at TeamHub, a team
  collaboration platform. Admins frequently ask
  "what can each role do?" and support agents spend
  time explaining permissions. Write a reference
  article that clearly documents all roles and their
  permissions.

  Product context:
  - 5 roles: Owner, Admin, Manager, Member, Guest
  - Permission categories: Workspace Management,
    Channel Management, Member Management, Content,
    Integrations, Billing
  - Owner: Full access to everything, can transfer
    ownership, can delete workspace
  - Admin: Everything except ownership transfer and
    workspace deletion
  - Manager: Can manage channels and members within
    their channels, can't change workspace settings
  - Member: Can create content, join public channels,
    can't manage other members
  - Guest: Limited to specific channels they're
    invited to, can't see the member directory

  Write the reference article:
  - Title and introduction explaining the role
    system
  - Role overview table (quick-reference matrix
    showing all roles vs. key permissions)
  - Detailed description of each role (when to use
    it, what it can and can't do)
  - Common scenarios ("I want to let a contractor
    see one channel" → use Guest role)
  - How to assign and change roles
  - Best practices for role assignment (principle
    of least privilege)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete reference article — title and introduction; quick-reference permissions table/matrix; detailed descriptions of all 5 roles with capabilities and limitations; common scenarios with role recommendations; instructions for assigning/changing roles; best practices. The permissions table clearly shows which role can do what."
    weight: 0.35
    description: "ReferenceArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates reference documentation expertise — the permissions table is easy to scan; role descriptions include both what the role CAN and CANNOT do; common scenarios help admins choose the right role; the article serves both as a quick reference (table) and detailed guide (descriptions); formatting makes it easy to find specific information quickly."
    weight: 0.35
    description: "ReferenceDocQuality"
  - type: llm_judge
    criteria: "Response would answer permissions questions — admins would find the right role for their use case; the permissions table would be bookmarked and referenced regularly; support agents could link to this article instead of explaining permissions; the article would reduce 'what can X role do?' tickets significantly."
    weight: 0.30
    description: "ReferenceUtilityOutcome"
