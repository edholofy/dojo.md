meta:
  id: troubleshooting-article
  level: 1
  course: knowledge-base-article-writing
  type: output
  description: "Write a troubleshooting article that helps users diagnose and fix email delivery issues in a marketing automation platform"
  tags: [troubleshooting, diagnostic, email-delivery, beginner, support]

state: {}

trigger: |
  You're a technical writer at MailPulse, an email
  marketing platform. The #2 support ticket topic
  is "my emails aren't being delivered." The causes
  vary widely — it could be a sender reputation
  issue, authentication failure, content triggering
  spam filters, list quality problems, or a simple
  configuration error.

  Product context:
  - MailPulse sends marketing emails on behalf of
    customers
  - Users configure their sender domain with SPF,
    DKIM, and DMARC records
  - The platform has a deliverability dashboard
    showing bounce rates, spam complaints, and
    inbox placement
  - Users can send test emails to check deliverability
  - Common issues: unverified domain, high bounce
    rate (>5%), spam trigger words in subject lines,
    sending to purchased lists

  Write a troubleshooting article that guides users
  through diagnosing and fixing email delivery issues:
  - Title and introduction (empathize with the
    frustration)
  - Quick check: "Is it actually a delivery problem?"
    (how to check delivery stats vs. open tracking
    issues)
  - Diagnostic flowchart (in text form):
    Step 1: Check domain verification status
    Step 2: Review authentication records (SPF/DKIM)
    Step 3: Check bounce rate and clean list
    Step 4: Review spam complaint rate
    Step 5: Check content for spam triggers
    Step 6: Verify sending reputation score
  - For each step, provide:
    * How to check (where in the UI)
    * What "good" looks like
    * What to do if there's a problem
  - "Still not working?" escalation path
  - Prevention tips (how to maintain good
    deliverability)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete troubleshooting article — title; empathetic introduction; quick diagnostic check; 6 diagnostic steps each with where to check, what good looks like, and remediation actions; escalation path; prevention tips. The article follows a logical diagnostic flow from most common to least common causes."
    weight: 0.35
    description: "TroubleshootingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates troubleshooting article expertise — the diagnostic flow is logical and efficient; each step gives specific UI navigation instructions; the 'is it actually a problem' check prevents false troubleshooting; technical concepts (SPF, DKIM, DMARC) are explained accessibly; the tone acknowledges user frustration without being patronizing; the article helps users self-diagnose before escalating."
    weight: 0.35
    description: "TroubleshootingExpertise"
  - type: llm_judge
    criteria: "Response would resolve delivery issues — users would follow the diagnostic flow and identify their specific problem; the remediation steps are actionable; the prevention tips would reduce future issues; the article would deflect a significant portion of delivery-related tickets; users would feel empowered rather than overwhelmed."
    weight: 0.30
    description: "IssueResolutionOutcome"
