meta:
  id: expert-kb-shift
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Expert shift simulation — design knowledge bases for three extraordinary contexts: a space mission operations manual, an emergency disaster response knowledge system, and a cultural heritage preservation knowledge archive"
  tags: [shift-simulation, space-operations, disaster-response, cultural-heritage, expert]

state: {}

trigger: |
  You're a world-class knowledge architect. Three
  extraordinary clients need your expertise
  simultaneously.

  === CLIENT 1: Space Mission Operations KB ===
  A private space company needs a knowledge base
  for mission operations — the critical reference
  that flight controllers, astronauts, and ground
  crew use during missions. This isn't a corporate
  KB — errors can be fatal.

  Requirements:
  - Real-time accessible during missions (no loading
    delays, works with limited bandwidth)
  - Procedures for nominal operations and every
    known failure mode
  - Decision trees for emergency scenarios
  - Cross-referenced between systems (propulsion,
    life support, communications, navigation)
  - Version-controlled with mandatory review
  - Offline-capable for in-vehicle use
  - Tested and validated procedures (every procedure
    tested in simulation)

  Design:
  - KB architecture for mission-critical content
  - 3 sample articles: Normal docking procedure,
    loss of communication emergency procedure, and
    life support system reference
  - Validation and testing methodology
  - Update and version control procedures

  === CLIENT 2: Disaster Response Knowledge System ===
  An international disaster response organization
  (like FEMA or Red Cross) needs a knowledge system
  that deploys with response teams to disaster zones.
  Teams arrive in chaos and need instant access to
  operational procedures, local context, and
  coordination protocols.

  Requirements:
  - Works offline (infrastructure may be destroyed)
  - Rapidly customizable for each disaster type and
    location
  - Multilingual (6 languages minimum)
  - Accessible to volunteers with no prior training
  - Updates dynamically as the situation evolves
  - Integrates with coordination systems (UN OCHA,
    cluster system)

  Design:
  - Knowledge system architecture for disaster
    response
  - 3 sample articles: Initial area assessment
    checklist, water purification procedures, and
    mass casualty triage protocol
  - Rapid deployment methodology (how the KB is
    customized for each event within hours)
  - Field update process (capturing lessons learned
    in real-time)

  === CLIENT 3: Cultural Heritage Knowledge Archive ===
  A UNESCO-affiliated organization needs a knowledge
  archive to preserve and make accessible the
  cultural knowledge of 50 indigenous communities
  whose traditions are at risk of being lost. This
  is knowledge that exists only in oral tradition
  and lived practice.

  Requirements:
  - Culturally respectful and community-controlled
  - Preserves context, not just content (the story
    behind the knowledge matters)
  - Multimedia (oral recordings, video of practices,
    photographs, text)
  - Community governance (each community controls
    what's shared and with whom)
  - Access tiers: Community-only, researcher access,
    public educational)
  - Long-term preservation (100+ year horizon)
  - Accessible to community members with limited
    technology access

  Design:
  - Knowledge archive architecture and governance
  - Community engagement methodology
  - 3 sample knowledge entries: A traditional
    medicinal plant practice, a ceremonial craft
    technique, and an oral history narrative
  - Access control and community sovereignty model
  - Long-term digital preservation strategy

  Task: Write complete knowledge system designs
  for all three clients.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete designs — space mission KB with architecture, 3 mission-critical articles, and validation methodology; disaster response system with offline architecture, 3 operational articles, and rapid deployment methodology; cultural heritage archive with governance, 3 multimedia entries, and 100-year preservation strategy."
    weight: 0.35
    description: "ExtraordinaryKBCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across extraordinary contexts — the space KB addresses life-critical accuracy and real-time access; the disaster system works in infrastructure-destroyed environments; the cultural archive respects indigenous data sovereignty; each design reflects deep understanding of its domain's unique constraints, risks, and values."
    weight: 0.35
    description: "ExtraordinaryContextExpertise"
  - type: llm_judge
    criteria: "Response would succeed in each context — astronauts would find correct procedures instantly; disaster responders would operate effectively in chaos; indigenous communities would control and benefit from their knowledge preservation; each system is designed for its specific operating environment and user needs."
    weight: 0.30
    description: "ExtraordinaryKBOutcomes"
