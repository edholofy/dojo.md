meta:
  id: kb-governance-framework
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Design a comprehensive knowledge base governance framework for a regulated multinational — content policies, quality standards, compliance architecture, and audit methodology"
  tags: [governance-framework, compliance, quality-standards, multinational, expert]

state: {}

trigger: |
  You're the Global Knowledge Governance Lead at
  a multinational pharmaceutical company (20,000
  employees, 25 countries, 3 divisions: prescription
  drugs, consumer health, medical devices). After
  a regulatory audit found customer-facing KB
  articles making unapproved medical claims, you've
  been tasked with creating a governance framework
  that prevents compliance failures while enabling
  self-service at scale.

  Stakes: In pharma, a single non-compliant customer-
  facing article can trigger FDA enforcement actions,
  patient safety concerns, and multi-million dollar
  fines. The company has separate KBs for healthcare
  providers, patients, and internal employees.

  Design the complete governance framework:

  1. Knowledge Governance Policy
  - Governance principles and scope
  - Content classification (regulated medical claims
    vs. general product info vs. operational content)
  - Approval workflows by content type and risk level
  - Medical-legal-regulatory (MLR) review integration
  - Global vs. local content authority
  - Policy hierarchy and conflict resolution

  2. Content Standards
  - Medical accuracy review requirements
  - Regulatory compliance checklist by jurisdiction
    (FDA, EMA, TGA, PMDA)
  - Promotional vs. non-promotional content rules
  - Adverse event reporting language
  - Off-label use handling
  - Patient safety information requirements
  - Accessibility standards for patient-facing content

  3. Quality Assurance
  - Content quality scoring rubric
  - Automated compliance checking tools
  - Manual review sampling methodology
  - Quality metrics and dashboards
  - Corrective action procedures
  - Root cause analysis for compliance failures

  4. Audit Methodology
  - Annual audit plan
  - Audit criteria and evidence requirements
  - Audit report template
  - Remediation tracking
  - Regulatory exam preparation
  - Document retention requirements (21 CFR Part 11)

  5. Governance Bodies
  - Global Knowledge Governance Council (charter)
  - Division content committees
  - Country compliance reviewers
  - RACI matrix
  - Escalation procedures
  - Decision rights framework

  6. Technology and Tools
  - Content management system requirements
  - Automated compliance screening
  - Audit trail and version control
  - Digital asset management
  - Integration with regulatory submission systems

  Task: Write the complete knowledge governance
  framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — governance policy with content classification and MLR review; content standards with regulatory compliance across FDA/EMA/TGA/PMDA; QA with scoring rubric and automated checking; audit methodology with 21 CFR Part 11; governance bodies with council, committees, and RACI; technology requirements with compliance screening and audit trails."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates pharma content governance expertise — MLR review integration follows industry practice; content classification distinguishes promotional from non-promotional correctly; adverse event reporting language is handled appropriately; off-label use is addressed; 21 CFR Part 11 requirements for electronic records are incorporated; the governance model balances compliance with operational efficiency."
    weight: 0.35
    description: "PharmaGovernanceExpertise"
  - type: llm_judge
    criteria: "Response would protect the company and patients — non-compliant content would be caught before publication; the MLR review process would be efficient, not just thorough; the audit methodology would satisfy FDA/EMA inspections; patient safety information would be accurate and accessible; the governance framework would scale across 25 countries; compliance failures like the triggering incident would not recur."
    weight: 0.30
    description: "ComplianceProtectionOutcome"
