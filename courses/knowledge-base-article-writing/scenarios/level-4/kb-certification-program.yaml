meta:
  id: kb-certification-program
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Design a professional certification program for knowledge base writers and managers — competency model, curriculum, assessment methodology, and certification tiers"
  tags: [certification, professional-development, competency-model, assessment, expert]

state: {}

trigger: |
  You've been commissioned by the Knowledge-Centered
  Service (KCS) Consortium to design a professional
  certification program for KB professionals. Unlike
  the existing KCS certification (which focuses on
  methodology), this certification focuses on the
  craft of KB content — writing, architecture,
  analytics, and strategy.

  Design the complete certification program:

  1. Competency Framework
  - 8 core competency areas:
    1. Technical Writing for Self-Service
    2. Information Architecture and Taxonomy
    3. Search Optimization and Findability
    4. Content Analytics and Metrics
    5. Multimedia Content Creation
    6. Content Governance and Quality
    7. KB Technology and Tools
    8. KB Strategy and Business Impact
  - For each: define 4 proficiency levels (Foundation,
    Practitioner, Advanced, Expert)
  - Specific behavioral indicators at each level
  - Knowledge, skills, and abilities for each
    competency

  2. Certification Tiers
  - CKBP-F: Certified KB Professional — Foundation
    (entry-level, 1+ years experience)
  - CKBP-P: Certified KB Professional — Practitioner
    (mid-level, 3+ years experience)
  - CKBP-A: Certified KB Professional — Advanced
    (senior, 5+ years experience)
  - CKBM: Certified KB Manager (leadership track,
    7+ years experience)

  For each tier: prerequisites, exam format,
  portfolio requirements, renewal requirements.

  3. Curriculum Design
  - Foundation course (40 hours, covering competencies
    1-4 at Foundation level)
  - Practitioner course (60 hours, covering all 8
    competencies at Practitioner level)
  - Advanced workshops (4 specialized 16-hour
    workshops)
  - Manager program (40 hours, KB leadership and
    strategy)
  - Delivery: Online self-paced + live virtual
    workshops + in-person intensive

  4. Assessment Methodology
  - Written exam design (question types, passing
    scores)
  - Portfolio assessment (required artifacts, rubric)
  - Practical exercise (write/rewrite articles under
    timed conditions)
  - Peer evaluation component
  - Exam blueprint linking to competency framework

  5. Continuing Education
  - Annual CE requirements (20 hours for Foundation,
    30 for Practitioner, 40 for Advanced/Manager)
  - Approved CE activities
  - Specialization badges (API docs, healthcare,
    multilingual, AI)
  - Community of practice

  6. Business Plan
  - Pricing structure
  - Launch plan (Year 1 targets)
  - Partnership with KB platform vendors
  - Employer adoption strategy
  - 3-year growth projections

  Task: Write the complete certification program
  design.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — competency framework with 8 areas at 4 proficiency levels; 4 certification tiers with prerequisites and exam formats; curriculum design with courses for each tier; assessment methodology with exams, portfolio, and practical exercises; continuing education with CE requirements and specialization badges; business plan with pricing and 3-year projections."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification design expertise — competency areas cover the full KB professional scope; proficiency levels have clear behavioral indicators; assessment methods combine knowledge testing with practical demonstration; the portfolio requirement ensures real-world capability; the certification tiers create a genuine career path; the curriculum is appropriately scaled for each level; the business plan is financially viable."
    weight: 0.35
    description: "CertificationExpertise"
  - type: llm_judge
    criteria: "Response would establish a recognized credential — KB professionals would pursue the certification; employers would value it in hiring; the competency framework would become the professional standard; the certification would elevate KB work from 'anyone can write articles' to a recognized profession; platform vendors would partner; the program would be self-sustaining within 3 years."
    weight: 0.30
    description: "CredentialOutcome"
