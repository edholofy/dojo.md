meta:
  id: kb-community-integration
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Design a knowledge-community integration strategy — connecting knowledge base content with community forums, user-generated solutions, and expert networks to create a self-reinforcing support ecosystem"
  tags: [community-integration, user-generated, expert-network, ecosystem, expert]

state: {}

trigger: |
  You're the VP of Community and Knowledge at a
  developer tools company (DevForge, 200,000 users,
  freemium model). The company has two separate
  systems: a knowledge base (800 articles) and a
  community forum (50,000 posts, 15,000 active
  members). They operate in silos — the KB team
  doesn't know what the community discusses, and
  community members don't reference KB articles.

  The opportunity: Community forums contain thousands
  of user-generated solutions, workarounds, and
  use cases that are more practical than the official
  KB. But they're buried in threads, unverified,
  and hard to find. Meanwhile, the KB has authoritative
  content but lacks the real-world examples and edge
  cases that community members provide.

  Design the knowledge-community integration:

  1. Integration Architecture
  - Unified search across KB and community
  - Content relationship model (KB articles linked
    to community discussions)
  - Community-sourced content promotion pipeline
    (best community answers → official KB)
  - Expert verification system (marking community
    answers as "verified" or "official")
  - Taxonomy alignment (same categories, tags)
  - Single user identity across both systems

  2. Community-to-KB Pipeline
  - Identifying high-quality community content
    (signals: upvotes, views, accepted answers)
  - Curation workflow (community answer → staff
    review → KB article or addition)
  - Attribution model (giving credit to community
    contributors)
  - Quality control for community-sourced content
  - Version management (community solutions that
    become outdated)

  3. Expert Network Program
  - Community expert identification and recognition
  - Expert roles: Community Champions (volunteer),
    Technical MVPs (selected), Staff Engineers
    (official)
  - Expert contribution incentives (badges, early
    access, swag, conference tickets)
  - Expert review assignments (routing complex
    questions to experts)
  - Expert-authored KB articles (how experts can
    contribute directly)

  4. Content Strategy for the Integrated Ecosystem
  - When to create a KB article vs. let the community
    answer
  - How KB articles reference community discussions
  - "Community insights" sections in KB articles
  - Community-driven content gap identification
  - User-generated tutorials and guides program

  5. Gamification and Incentives
  - Reputation system design (points, levels, badges)
  - Leaderboards and recognition
  - Real-world rewards for top contributors
  - Company recognition program (Community MVPs)
  - Preventing gaming and abuse

  6. Measurement
  - Combined self-service metrics (KB + community
    resolution)
  - Community health metrics
  - Expert program effectiveness
  - Content pipeline metrics (community → KB
    conversion rate)
  - Cost per resolution comparison (KB vs. community
    vs. ticket)

  Task: Write the complete knowledge-community
  integration strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete integration strategy — architecture with unified search and content relationships; community-to-KB pipeline with curation and attribution; expert network with identification, roles, and incentives; content strategy for when KB vs. community answers; gamification with reputation system and abuse prevention; measurement with combined metrics and cost per resolution."
    weight: 0.35
    description: "CommunityIntegrationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates community-knowledge expertise — the integration creates a self-reinforcing ecosystem, not just a merged search; the community-to-KB pipeline captures real user value; expert incentives go beyond badges to meaningful recognition; the content strategy correctly identifies when community answers are better than official KB; gamification encourages quality contributions without gaming; the measurement captures the combined ecosystem value."
    weight: 0.35
    description: "CommunityKnowledgeExpertise"
  - type: llm_judge
    criteria: "Response would create a powerful support ecosystem — the combined KB+community would resolve more issues than either alone; community experts would feel valued and contribute more; official KB articles would be enriched by community insights; the 200,000-user base would increasingly self-serve; support costs would decrease; DevForge would have a competitive advantage through its community-knowledge ecosystem."
    weight: 0.30
    description: "EcosystemOutcome"
