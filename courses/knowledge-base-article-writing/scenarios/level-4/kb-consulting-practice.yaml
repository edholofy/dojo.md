meta:
  id: kb-consulting-practice
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Build a knowledge management consulting practice — service offerings, diagnostic framework, 3 client proposals, and pricing model for mid-market and enterprise clients"
  tags: [consulting-practice, diagnostic-framework, proposals, pricing, expert]

state: {}

trigger: |
  You're launching a knowledge management consulting
  practice after 12 years leading KB teams at SaaS
  companies. Your niche: helping B2B SaaS companies
  (500-10,000 employees) transform their knowledge
  bases from cost centers into strategic self-service
  assets that measurably reduce support costs.

  Build your complete consulting practice:

  1. Service Portfolio (6 services)
  - Knowledge Base Health Assessment (2-week diagnostic)
  - KB Strategy and Architecture Design (6-8 weeks)
  - Content Operations Setup (build the team and
    workflows)
  - KB Platform Migration (end-to-end migration)
  - AI-Powered Self-Service Implementation
  - Ongoing KB Optimization Retainer (quarterly)

  For each: description, deliverables, duration,
  pricing, ideal client profile.

  2. Diagnostic Framework: "KB Health Score"
  - 10 dimensions of KB health (content quality,
    coverage, findability, freshness, governance,
    self-service effectiveness, team capability,
    technology, analytics maturity, user satisfaction)
  - Scoring methodology (1-5 per dimension, with
    clear criteria at each level)
  - Data collection methods
  - Benchmarking approach
  - Report template with visualizations
  - Presentation format for stakeholders

  3. Three Client Proposals
  Proposal A: Series C SaaS company (600 employees,
  $40M ARR, scaling support, KB is an afterthought,
  no dedicated KB person)

  Proposal B: Enterprise software company (3,000
  employees, complex multi-product KB, migrating
  platforms, developer docs priority)

  Proposal C: Healthcare SaaS (1,200 employees,
  HIPAA compliance requirements, patient-facing and
  provider-facing KBs, health literacy standards)

  Each proposal: Executive summary, situation
  analysis, approach, scope, timeline, investment,
  expected ROI.

  4. Pricing Model
  - Value-based pricing framework
  - Rate card (day rates, project fees, retainers)
  - ROI calculator for clients
  - Competitive positioning

  Task: Write the complete consulting practice
  with all three proposals.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — 6 service offerings with descriptions and pricing; KB Health Score diagnostic with 10 dimensions and scoring methodology; 3 detailed proposals for SaaS, enterprise, and healthcare clients each with executive summary, approach, scope, timeline, and ROI; pricing model with rate card and ROI calculator."
    weight: 0.35
    description: "KBConsultingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates KB consulting expertise — the KB Health Score measures meaningful dimensions; the 10-dimension framework provides actionable insights; the three proposals address distinctly different challenges; pricing reflects market rates; the ROI calculations are credible; the service portfolio covers the full KB lifecycle; the diagnostic would reveal insights that clients can't see internally."
    weight: 0.35
    description: "KBConsultingExpertise"
  - type: llm_judge
    criteria: "Response would win consulting engagements — proposals would convince VP-level buyers; the KB Health Score would differentiate from generic consulting; clients would see clear ROI; the practice would be financially viable; the service portfolio would generate repeat business; the practice would become known for measurably improving self-service metrics."
    weight: 0.30
    description: "ConsultingViabilityOutcome"
