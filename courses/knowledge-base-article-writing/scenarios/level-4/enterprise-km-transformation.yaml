meta:
  id: enterprise-km-transformation
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Lead an enterprise-wide knowledge management transformation at a 15,000-person company — strategy, technology, governance, change management, and ROI across customer-facing and internal knowledge"
  tags: [enterprise-transformation, knowledge-management, governance, change-management, expert]

state: {}

trigger: |
  You've been hired as the VP of Knowledge
  Management at a 15,000-person global technology
  company. The CEO has made "knowledge as a strategic
  asset" a board-level initiative after calculating
  that poor knowledge management costs the company
  $45M annually (support inefficiency, duplicated
  work, knowledge loss from attrition, onboarding
  delays).

  Current state:
  - Customer-facing KB: 800 articles, 3 different
    platforms, 22% deflection rate
  - Internal wiki: 12,000 pages on Confluence, 85%
    outdated, employee satisfaction 2.1/5.0
  - Support agents: No internal KB for agents,
    tribal knowledge dominates
  - Engineering: Documentation scattered across
    GitHub wikis, Notion, and Google Docs
  - Sales: Competitive intelligence and product info
    in scattered Google Drives
  - 15 countries, 8 languages, 4 business units
  - $3M budget, 24-month transformation timeline
  - 2,500 new hires annually who need knowledge
    to be productive

  Design the complete transformation:

  1. Strategic Vision and Business Case
  - Enterprise knowledge vision
  - Knowledge audit methodology
  - Financial business case ($45M cost breakdown
    and ROI of investment)
  - Board presentation
  - Success metrics and 3-year targets

  2. Knowledge Architecture
  - Unified knowledge platform strategy (customer,
    internal, agent, engineering, sales)
  - Technology stack recommendation
  - Integration with existing systems
  - Data architecture
  - Content taxonomy spanning all knowledge types

  3. Customer Knowledge Strategy
  - External KB consolidation (3 platforms → 1)
  - Self-service optimization
  - AI-powered search and chatbot
  - Multilingual content strategy

  4. Internal Knowledge Strategy
  - Employee wiki transformation
  - Agent knowledge base creation
  - Engineering documentation standardization
  - Sales enablement knowledge hub
  - Onboarding knowledge integration

  5. Governance and Operations
  - Enterprise Knowledge Council
  - Content ownership across business units
  - Quality standards and auditing
  - Knowledge contribution culture
  - Continuous improvement methodology

  6. Change Management
  - Stakeholder analysis
  - Resistance management
  - Pilot strategy
  - Phased 24-month rollout
  - Communication campaign

  7. Measurement
  - Enterprise knowledge scorecard
  - Business unit dashboards
  - Executive reporting
  - ROI tracking

  Task: Write the complete enterprise knowledge
  management transformation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise KM plan — strategic vision with $45M business case and board presentation; knowledge architecture with unified platform and taxonomy; customer strategy with consolidation and AI; internal strategy covering wiki, agents, engineering, and sales; governance with council and quality standards; change management with stakeholder analysis and 24-month rollout; measurement with scorecard and ROI tracking."
    weight: 0.35
    description: "EnterpriseKMCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise KM expertise — the business case quantifies the $45M cost convincingly; the unified platform strategy balances consolidation with practical needs; the governance model is sustainable; change management addresses resistance from business units with existing solutions; the $3M budget is allocated strategically; the 24-month timeline is realistic for a 15,000-person company."
    weight: 0.35
    description: "EnterpriseKMExpertise"
  - type: llm_judge
    criteria: "Response would transform enterprise knowledge — customer deflection would increase from 22% to 40%+; internal satisfaction would improve from 2.1 to 4.0+; the $45M annual cost would be significantly reduced; knowledge would survive employee turnover; the board would see clear ROI; the transformation would be institutionalized, not dependent on one champion."
    weight: 0.30
    description: "EnterpriseKMOutcome"
