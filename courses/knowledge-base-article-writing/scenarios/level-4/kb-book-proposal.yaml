meta:
  id: kb-book-proposal
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Write a book proposal and two sample chapters for 'The Knowledge Base Blueprint' — a practitioner's guide to building self-service content that eliminates support tickets"
  tags: [book-proposal, practitioner-guide, self-service, thought-leadership, expert]

state: {}

trigger: |
  You're a veteran knowledge management leader
  (15+ years, former Head of KB at 3 SaaS unicorns)
  writing a book proposal for a business publisher.
  Your book: "The Knowledge Base Blueprint: How to
  Build Self-Service Content That Eliminates 50% of
  Support Tickets."

  Your thesis: Most KBs fail not because the content
  is bad, but because the strategy is wrong. Companies
  treat KBs as article repositories instead of
  engineering them as self-service systems. The
  difference between a 15% deflection rate and a
  50% deflection rate isn't better writing — it's
  better architecture, better analytics, and better
  integration into the customer journey.

  Write the complete book proposal:

  1. Book Proposal
  - Overview and elevator pitch
  - Target audience
  - Market analysis and competitive positioning
  - Author platform
  - Chapter-by-chapter outline (12 chapters)
  - Marketing plan

  2. Sample Chapter: "The Self-Service Architecture"
  (Chapter 3, ~5,000 words)
  Your proprietary framework for designing KBs as
  self-service systems:
  - The 4 Layers: Discovery → Comprehension →
    Application → Confirmation
  - Why most KBs fail at Layer 1 (users can't find
    the article) or Layer 4 (users aren't sure the
    answer worked)
  - The Self-Service Architecture diagnostic
  - Case study: Transforming a 15% to 48% deflection
    rate
  - Exercises and assessments

  3. Sample Chapter: "AI and the Future of the KB"
  (Chapter 11, ~5,000 words)
  How AI is transforming every aspect of knowledge
  management:
  - AI for content creation (promise and pitfalls)
  - AI for search (semantic, conversational, predictive)
  - AI for maintenance (freshness, accuracy, gap
    detection)
  - The human-AI partnership in knowledge work
  - What stays human and what gets automated
  - Case study: An AI-powered KB in practice

  Task: Write the complete book proposal with both
  sample chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — overview with elevator pitch; target audience and market analysis; author platform; 12-chapter outline with summaries; marketing plan; plus two complete sample chapters of approximately 5,000 words each covering the Self-Service Architecture framework (4 Layers, diagnostic, case study) and AI and the Future of the KB (content creation, search, maintenance, human-AI partnership, case study)."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates thought leadership — the Self-Service Architecture framework is original and actionable; the 4 Layers provide genuine diagnostic value; the case study demonstrates measurable transformation; the AI chapter distinguishes hype from reality; the human-AI partnership is nuanced; the writing is engaging, authoritative, and practical."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Response would get a publishing deal — a publisher would acquire it; KB managers would buy and implement it; the Self-Service Architecture would become an industry framework; the book would elevate the author's consulting practice; it would be cited in conference presentations; it would change how companies think about knowledge management."
    weight: 0.30
    description: "PublishingViabilityOutcome"
