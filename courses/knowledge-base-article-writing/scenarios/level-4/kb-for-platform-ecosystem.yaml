meta:
  id: kb-for-platform-ecosystem
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Design a knowledge base ecosystem for a platform company — documentation for end users, developers, partners, marketplace sellers, and internal teams with shared architecture"
  tags: [platform-ecosystem, multi-audience, marketplace, partner-docs, expert]

state: {}

trigger: |
  You're the Director of Documentation at a
  platform company (like Shopify, Salesforce, or
  HubSpot scale) with 5 distinct audiences, each
  needing their own documentation experience while
  sharing a common knowledge architecture.

  Platform context:
  - Core platform: AppCenter (an app marketplace
    platform)
  - 50,000 merchants use AppCenter to run their
    businesses
  - 3,000 app developers build and sell apps on the
    marketplace
  - 500 certified implementation partners help
    merchants set up
  - 200 marketplace reviewers evaluate apps for
    quality
  - 800 internal employees (support, sales,
    engineering, product)

  5 Documentation Properties:
  1. Merchant Help Center (50,000 users, how to use
     the platform and apps)
  2. Developer Documentation (3,000 developers, API
     reference, SDK guides, app building tutorials)
  3. Partner Portal Docs (500 partners, implementation
     guides, certification materials)
  4. Marketplace Standards (200 reviewers + 3,000
     developers, app review criteria, listing
     guidelines)
  5. Internal Knowledge Base (800 employees, product
     knowledge, support playbooks)

  Design the complete documentation ecosystem:

  1. Architecture
  - Shared content model (what's shared, what's
    audience-specific)
  - Single-source-of-truth for product features
    (used across all 5 properties)
  - Content relationships and cross-linking strategy
  - URL structure and navigation for each property
  - Unified search vs. property-specific search

  2. Content Strategy per Property
  For each of the 5 properties:
  - Content types and templates
  - Key user journeys
  - Content priority and coverage targets
  - Audience-specific tone and technical level
  - Integration with property-specific tools

  3. Developer Documentation Deep Dive
  - API reference architecture (OpenAPI spec
    integration)
  - SDK documentation for 4 languages
  - Tutorial progression (beginner → advanced)
  - App review process documentation
  - Sandbox and testing documentation
  - Community contribution model

  4. Content Operations
  - Authoring workflow across 5 properties
  - Content ownership model
  - Cross-property content synchronization
  - Quality standards per property
  - Metrics and KPIs per property

  5. Technology Platform
  - Documentation platform requirements
  - Build vs. buy analysis
  - Integration architecture
  - Scalability considerations

  Task: Write the complete platform documentation
  ecosystem design.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete platform doc ecosystem — shared architecture with single-source-of-truth; content strategy for all 5 properties with audience-specific templates and tone; developer documentation deep dive with API reference, SDKs, and tutorials; content operations with cross-property workflow and ownership; technology platform with requirements and build vs. buy analysis."
    weight: 0.35
    description: "PlatformEcosystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform documentation expertise — the shared content model enables efficiency without forcing uniformity; developer documentation follows industry best practices; the merchant help center addresses non-technical users; partner documentation supports certification; the marketplace standards bridge developers and reviewers; content operations can scale across 5 properties without chaos."
    weight: 0.35
    description: "PlatformDocExpertise"
  - type: llm_judge
    criteria: "Response would enable platform success — merchants would find help without calling support; developers would integrate successfully; partners would implement confidently; marketplace quality would improve through clear standards; internal teams would have the knowledge they need; the documentation ecosystem would be a competitive advantage for the platform."
    weight: 0.30
    description: "PlatformSuccessOutcome"
