meta:
  id: kb-technology-platform
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Write the complete product strategy for KnowledgeOS — an AI-native knowledge base platform that auto-generates, maintains, and optimizes self-service content from support conversations"
  tags: [technology-platform, ai-native, product-strategy, startup, expert]

state: {}

trigger: |
  You're the founder of KnowledgeOS, a venture-backed
  startup ($6M Series A) building an AI-native KB
  platform. Your thesis: knowledge bases are broken
  because content creation is manual, maintenance is
  reactive, and quality depends on individual writers.
  KnowledgeOS uses AI to automatically generate KB
  articles from resolved support tickets, keep content
  current by monitoring product changes, and optimize
  articles based on user behavior.

  Write the complete product strategy:

  1. Product Vision and Architecture
  - Problem statement with market sizing
  - Product vision (3-year)
  - Core platform modules:
    * Auto-Author: AI generates draft articles from
      resolved tickets, chat transcripts, and
      internal docs
    * Content Guardian: Monitors product changelog,
      UI changes, and API updates to flag stale
      content
    * Smart Search: Semantic search with intent
      understanding and personalized results
    * Analytics Brain: Predicts content gaps,
      measures deflection, and recommends optimizations
    * Collaboration Hub: SME review workflows with
      AI-assisted editing
    * Integration Layer: Connects to Zendesk,
      Intercom, Freshdesk, Salesforce, product repos
  - Technical architecture (AI pipeline, data flow)

  2. AI and ML Features
  - Article generation pipeline (ticket → draft →
    review → publish)
  - Content freshness scoring model
  - Search intent classification
  - Content gap prediction
  - Article quality scoring
  - Data requirements and model training

  3. Go-to-Market Strategy
  - Target customer segments
  - Pricing model (per-article, per-seat, usage)
  - PLG vs. enterprise sales
  - Competitive positioning
  - Customer success model

  4. Financial Model
  - Revenue projections (Years 1-5)
  - Key metrics (ARR, NDR, CAC, LTV)
  - Path to profitability

  Task: Write the complete product strategy for
  KnowledgeOS.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product strategy — product vision with market sizing; 6 core modules with architecture; AI features for auto-authoring, freshness monitoring, search, gap prediction, and quality scoring; GTM with segments, pricing, and competitive positioning; financial model with 5-year projections and key metrics."
    weight: 0.35
    description: "KBProductCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and AI expertise — Auto-Author solves a real content creation bottleneck; Content Guardian addresses the staleness problem; the AI pipeline is technically feasible; the pricing model is competitive; the competitive analysis identifies real threats and differentiators; the financial projections are credible for a Series A company."
    weight: 0.35
    description: "ProductAIExpertise"
  - type: llm_judge
    criteria: "Response would produce a fundable strategy — investors would see a compelling market; enterprises would adopt because the ROI is clear; the AI features would create a defensible moat; the platform would become the standard for AI-powered knowledge management; the financial projections justify the $6M Series A."
    weight: 0.30
    description: "ProductViabilityOutcome"
