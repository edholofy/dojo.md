meta:
  id: kb-research-study
  level: 4
  course: knowledge-base-article-writing
  type: output
  description: "Design and write a research study on the impact of knowledge base quality on customer self-service behavior, support costs, and customer satisfaction across 200 SaaS companies"
  tags: [research-study, self-service, impact-analysis, evidence-based, expert]

state: {}

trigger: |
  You're a professor of Information Science
  conducting a large-scale study funded by the
  Technology Services Industry Association (TSIA).
  Your research: "The Self-Service Equation: How
  Knowledge Base Quality Drives Customer Behavior,
  Support Economics, and Business Outcomes."

  Study design:
  - 200 B2B SaaS companies across 10 verticals
  - Metrics collected: KB quality scores, ticket
    deflection rates, CSAT, support cost per ticket,
    time to resolution, customer retention
  - Knowledge Base Quality Index (KBQI) — your
    measurement instrument (40 items across 8
    dimensions)
  - 3 data collection methods: KB audit, customer
    surveys, support operations data

  Research questions:
  1. Which KB quality dimensions most strongly
     predict ticket deflection?
  2. What is the relationship between KB quality
     and customer satisfaction?
  3. How does KB quality moderate the relationship
     between company growth and support cost scaling?
  4. What role do search experience and information
     architecture play vs. content quality?
  5. What is the ROI of KB investment?

  Write the complete research paper:

  1. Introduction and Literature Review
  - Self-service theory and knowledge management
  - Current state of KB research (gaps)
  - 6-8 specific hypotheses

  2. Method
  - Participants and company selection
  - KBQI instrument (40-item assessment)
  - Outcome measures
  - Data collection procedures
  - Statistical analysis plan

  3. Results (realistic fictional data)
  - Descriptive statistics
  - Main effects (which dimensions predict outcomes)
  - Moderation analyses (company size, vertical)
  - ROI analysis
  - Unexpected findings

  4. Discussion
  - Theoretical implications
  - Practical implications for KB managers
  - Limitations and future research
  - The KBQI as a diagnostic tool

  5. Appendix: Complete KBQI Instrument (40 items)

  Task: Write the complete research paper with
  the KBQI instrument.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete research paper — literature review with self-service theory; 6-8 hypotheses; method with KBQI instrument, outcome measures, and analysis plan; results with realistic data including main effects, moderations, and ROI; discussion with implications; complete 40-item KBQI instrument in appendix."
    weight: 0.35
    description: "KBResearchCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the KBQI measures meaningful dimensions; the study design accounts for confounding variables; the statistical analysis is appropriate for the data structure; the fictional results tell a nuanced story; the ROI analysis would convince finance teams; the KBQI could actually be used as a practical diagnostic."
    weight: 0.35
    description: "ResearchMethodExpertise"
  - type: llm_judge
    criteria: "Response would advance the KB field — the study would fill significant evidence gaps; the KBQI would become a standard measurement tool; KB managers would know which quality dimensions to prioritize; the ROI analysis would justify KB investment; the paper would be published in a top information science journal; findings would change how companies invest in self-service."
    weight: 0.30
    description: "FieldAdvancementOutcome"
