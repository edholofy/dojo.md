meta:
  id: kb-government-policy
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Draft national policy on digital public services documentation — citizen access standards, plain language requirements, multilingual mandates, and accessibility for government knowledge systems"
  tags: [government-policy, digital-services, plain-language, citizen-access, master]

state: {}

trigger: |
  You're the lead policy advisor to a bipartisan
  commission on "Digital Government Services." The
  commission has found that government websites and
  knowledge bases are the #1 barrier to citizens
  accessing public services — confusing, outdated,
  contradictory, inaccessible, and written in
  bureaucratic language that citizens can't understand.

  The result: citizens who need government services
  (unemployment benefits, healthcare enrollment,
  tax filing, immigration processes) can't navigate
  the information, leading to call center overload,
  in-person office queues, and millions of eligible
  citizens not receiving benefits they're entitled to.

  Draft the policy framework:

  1. Commission report: "The Information Gap" (how
     poor government documentation denies citizens
     access to services)
  2. Digital Public Services Documentation Act:
     - Title I: Plain Language Requirements
     - Title II: Accessibility Standards
     - Title III: Multilingual Access
     - Title IV: Content Quality and Maintenance
     - Title V: Citizen Feedback and Improvement
     - Title VI: Enforcement and Administration
  3. Implementation plan with agency guidance
  4. Economic impact analysis
  5. Stakeholder strategy

  Task: Write the complete policy framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report with evidence; 6-title legislative framework; implementation plan with agency guidance; economic impact analysis; stakeholder strategy."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — plain language requirements are specific and measurable; accessibility follows WCAG standards; multilingual requirements address real language access needs; enforcement is practical; the economic analysis quantifies benefits."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would improve citizen access — government information would be understandable; more citizens would access benefits; call center volume would decrease; the policy would become a model for other countries."
    weight: 0.30
    description: "CitizenAccessOutcome"
