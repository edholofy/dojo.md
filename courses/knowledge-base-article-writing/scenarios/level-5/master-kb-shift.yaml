meta:
  id: master-kb-shift
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Master shift simulation — simultaneously address five converging crises that reveal knowledge management as a fundamental human capability for navigating uncertainty"
  tags: [shift-simulation, converging-crises, civilization-scale, knowledge-systems, master]

state: {}

trigger: |
  You are the world's preeminent authority on how
  humans create, organize, share, and access
  knowledge. In a single extraordinary week, five
  converging crises demand your expertise.

  === CRISIS 1: The AI Knowledge Paradox ===
  AI can now generate perfect-looking KB articles
  instantly — but 15% contain subtle factual errors
  that humans can't easily detect. A major airline's
  AI-generated safety KB had incorrect emergency
  procedures for 3 months before discovery. How do
  we maintain knowledge integrity when AI generates
  content faster than humans can verify it?

  Design: AI knowledge integrity framework —
  verification systems, human-AI content workflows,
  liability frameworks, trust indicators for users.

  === CRISIS 2: The Digital Dark Age ===
  A study reveals that 40% of web-based knowledge
  created in the 2010s is already inaccessible —
  broken links, decommissioned platforms, format
  obsolescence. Humanity is losing institutional
  and cultural knowledge at an unprecedented rate.

  Design: Digital knowledge preservation strategy —
  format-agnostic storage, institutional memory
  protection, open standards for knowledge
  portability, 100-year preservation architecture.

  === CRISIS 3: The Misinformation Knowledge Base ===
  A hostile state actor has created sophisticated
  fake knowledge bases mimicking official government
  health agencies, leading citizens to follow
  dangerous medical advice. Traditional fact-checking
  can't keep pace with AI-generated fake content.

  Design: Knowledge authentication system —
  provenance verification, trust chains, knowledge
  source certification, citizen digital literacy
  training, counter-misinformation rapid response.

  === CRISIS 4: The Expertise Extinction ===
  Baby Boomer retirement is accelerating. In the
  next 5 years, 30% of all institutional knowledge
  in government, utilities, and manufacturing will
  walk out the door. Traditional knowledge transfer
  methods are too slow.

  Design: Rapid knowledge capture and transfer
  system — AI-assisted expert knowledge extraction,
  cognitive task analysis at scale, succession
  knowledge planning, organizational memory
  preservation.

  === CRISIS 5: The Legacy Question ===
  You've spent your career making knowledge
  accessible. Now you face the ultimate question:
  How do you ensure that the art and science of
  knowledge management itself is preserved and
  advanced? How do you "write the knowledge base
  for knowledge bases" — the meta-knowledge that
  guides future practitioners?

  Design: Your intellectual legacy — the principles
  that must survive, the institution you establish,
  the document that captures what 25 years taught
  you about making things clear.

  Task: Write complete responses to all five crises,
  revealing how they interconnect and expose
  knowledge management as humanity's most
  undervalued capability.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI integrity framework with verification and liability; digital preservation with 100-year architecture; misinformation defense with authentication and trust chains; expertise extinction with rapid knowledge capture; legacy with institutional design and principles document."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of knowledge as fundamental human capability — the AI crisis reveals trust as the core knowledge challenge; the digital dark age shows knowledge is more fragile than we assume; misinformation shows that bad knowledge systems can kill; expertise extinction is civilization-threatening; the legacy question turns the lens inward. Each crisis illuminates the others."
    weight: 0.35
    description: "UniversalKnowledgeMastery"
  - type: llm_judge
    criteria: "Response would define the future of knowledge management — the AI integrity framework would become the standard; the preservation architecture would prevent knowledge loss; the authentication system would combat misinformation; the knowledge transfer methodology would save institutional memory; the legacy would inspire the next generation; the interconnections would reveal knowledge management as one of humanity's most critical and underappreciated functions."
    weight: 0.30
    description: "CivilizationDefiningOutcome"
