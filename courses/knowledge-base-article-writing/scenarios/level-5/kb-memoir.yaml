meta:
  id: kb-memoir
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Write a professional memoir — 'The Art of Making Things Clear' — chronicling 20 years of building knowledge systems that help people help themselves"
  tags: [memoir, professional-narrative, career-reflection, literary, master]

state: {}

trigger: |
  You're writing a memoir after 20 years in knowledge
  management — from your first job writing help
  docs that nobody read, to becoming the person
  companies call when their self-service is broken.
  Your book: "The Art of Making Things Clear: 20
  Years of Helping People Find Answers."

  Write the book proposal and three chapters:

  1. Book Proposal (overview, audience, 12-chapter
     outline, author platform)

  2. Chapter 1: "Nobody Reads the Manual" (~5,000
     words) — Your origin story: the realization that
     the problem isn't that people won't read, it's
     that we write for ourselves, not for them.

  3. Chapter 6: "The Search for Answers" (~5,000
     words) — The story of transforming a broken KB
     search that had a 40% failure rate. What you
     learned about how people actually look for help.

  4. Chapter 12: "What Remains" (~5,000 words) —
     Reflection on what AI means for the future of
     knowledge work. The things that will always be
     human. The art of clarity in an age of
     information overload.

  Task: Write the book proposal and all three
  chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete memoir package — proposal with 12-chapter outline; Chapter 1 (~5,000 words) about the origin story; Chapter 6 (~5,000 words) about search transformation; Chapter 12 (~5,000 words) about AI and the future of clarity."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates literary memoir craft — narrative-driven, not instructional; characters are vivid; professional insights emerge from stories; the memoir voice is reflective and honest about failures."
    weight: 0.35
    description: "LiteraryCraft"
  - type: llm_judge
    criteria: "Response would produce a published memoir — a publisher would acquire it; knowledge professionals and general readers would buy it; the stories would humanize knowledge work; readers would see their own frustrations in the pages."
    weight: 0.30
    description: "PublishingOutcome"
