meta:
  id: kb-technology-unicorn
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Write the complete strategy for ClarityAI — a $100M Series D AI-native knowledge platform aiming to replace all static documentation with intelligent, contextual, real-time knowledge delivery"
  tags: [technology-unicorn, ai-native, category-creation, platform-strategy, master]

state: {}

trigger: |
  You're the CEO of ClarityAI, which just closed
  $100M Series D at a $1.2B valuation. Your investors
  believe you're building the platform that makes
  traditional knowledge bases, documentation tools,
  and help centers obsolete. ClarityAI doesn't
  organize existing content — it generates the right
  answer for each user, in context, in real-time.

  Current: 500 enterprise customers, $45M ARR, 180%
  NDR, 800 employees.

  Write the complete strategy:

  1. Category creation: "Intelligent Knowledge
     Delivery" ($25B TAM)
  2. Next-gen platform architecture with foundation
     model approach
  3. AI/ML strategy with 6+ models
  4. Enterprise GTM (Fortune 500 focus)
  5. 3-year financial plan ($45M → $200M ARR)
  6. IPO preparation strategy

  Task: Write the strategy that justifies the
  $1.2B valuation.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete unicorn strategy — category creation with narrative and analyst relations; platform architecture with foundation model; AI strategy with 6+ models; enterprise GTM with international expansion; 3-year financial plan with IPO readiness; organizational strategy."
    weight: 0.35
    description: "UnicornCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture strategy expertise — the category is genuinely larger than 'KB software'; the AI features are defensible; financial projections are credible for a Series D; the IPO preparation is realistic."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would satisfy investors — the path to $200M ARR is credible; enterprises would adopt; the platform would replace static documentation; the company could IPO successfully."
    weight: 0.30
    description: "InvestorConfidenceOutcome"
