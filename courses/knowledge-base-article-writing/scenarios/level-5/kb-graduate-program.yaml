meta:
  id: kb-graduate-program
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Design a graduate certificate program in Knowledge Engineering and Self-Service Design — curriculum, research center, and industry partnership model"
  tags: [graduate-program, curriculum, research-center, academia, master]

state: {}

trigger: |
  You've been hired as founding Program Director
  for a Graduate Certificate in Knowledge Engineering
  and Self-Service Design at a top information
  science school. Design the complete program:

  1. Program Design (4 courses, 12 credits, hybrid)
  2. Full syllabi for all 4 courses:
     - Knowledge Architecture and Information Design
     - Self-Service Content Strategy and Analytics
     - AI-Powered Knowledge Systems
     - Knowledge Management Leadership
  3. Center for Self-Service Excellence (research)
  4. Industry partnership model
  5. Financial model (3-year sustainability)

  Task: Write the complete graduate program design
  with full syllabi.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete program — design with learning outcomes and structure; 4 full syllabi with weekly topics, readings, and assignments; research center with agenda and conference; industry partnerships; financial model with projections."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic design expertise — theoretical foundations are rigorous; assignments combine academic and practical; the research center would advance the field; financial model is realistic."
    weight: 0.35
    description: "AcademicExpertise"
  - type: llm_judge
    criteria: "Response would produce a successful program — professionals would enroll; graduates would transform KB practices; the research center would become an authority; the program would be self-sustaining."
    weight: 0.30
    description: "ProgramOutcome"
