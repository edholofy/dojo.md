meta:
  id: kb-research-handbook
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Edit the Springer Handbook of Knowledge Management and Self-Service — 25-chapter outline, editorial introduction, and three key chapters synthesizing the field"
  tags: [research-handbook, academic-publishing, field-synthesis, handbook, master]

state: {}

trigger: |
  Springer has commissioned you to edit "The
  Handbook of Knowledge Management and Self-Service"
  — the definitive academic reference synthesizing
  research on knowledge bases, self-service systems,
  and organizational knowledge management.

  Design and write:

  1. Handbook architecture (25 chapters across 6
     parts with abstracts)
  2. Editorial introduction (~4,000 words)
  3. Chapter 1: Historical evolution of knowledge
     management systems (~6,000 words)
  4. Chapter 13: The Economics of Self-Service
     (~6,000 words)
  5. Chapter 25: Integrative model and research
     agenda (~6,000 words)

  Task: Write the complete handbook architecture,
  editorial introduction, and three chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — 25-chapter architecture with abstracts; editorial introduction covering field evolution; Chapter 1 historical review; Chapter 13 economics analysis; Chapter 25 integrative model with research agenda."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic expertise — the architecture covers the field comprehensively; theoretical foundations reference real research; the economics chapter includes meaningful analysis; the integrative model synthesizes across domains."
    weight: 0.35
    description: "AcademicExpertise"
  - type: llm_judge
    criteria: "Response would become the definitive reference — doctoral students would cite it; researchers would use the integrative model; the research agenda would guide funding; practitioners would ground their work in evidence."
    weight: 0.30
    description: "ReferenceOutcome"
