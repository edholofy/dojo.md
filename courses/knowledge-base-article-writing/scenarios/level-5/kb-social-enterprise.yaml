meta:
  id: kb-social-enterprise
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Design a social enterprise that provides free knowledge management and documentation services to nonprofits, community organizations, and underserved government agencies"
  tags: [social-enterprise, nonprofit, community, digital-equity, master]

state: {}

trigger: |
  You're launching "Knowledge for All," a social
  enterprise that provides free or subsidized
  knowledge base and documentation services to
  organizations that serve underserved populations
  but lack technical writing resources.

  Target organizations:
  - Small nonprofits (food banks, shelters, community
    health clinics) that need help documentation for
    their clients
  - Rural government agencies (DMV, courts, social
    services) with outdated, confusing public-facing
    information
  - Community organizations serving immigrant
    populations (legal aid, ESL, social services)
    needing multilingual documentation

  Design the complete social enterprise:

  1. Organizational design with theory of change
  2. Three program designs (nonprofit, government,
     immigrant services)
  3. Volunteer technical writer recruitment and
     training
  4. Pro bono corporate partnership model
  5. Content templates for underserved organizations
  6. Impact measurement framework
  7. Sustainability model (consulting revenue funds
     free services)

  Task: Write the complete social enterprise design
  with all three programs.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — organizational design with theory of change; three distinct programs for nonprofits, government, and immigrant-serving orgs; volunteer recruitment and training; corporate partnerships; content templates; impact measurement; sustainability model."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise with underserved organizations — each program addresses real documentation gaps; multilingual content serves immigrant populations; templates are designed for organizations without technical writers; the volunteer model is sustainable; the consulting revenue cross-subsidization works."
    weight: 0.35
    description: "UnderservedExpertise"
  - type: llm_judge
    criteria: "Response would create real impact — food bank clients would find clear instructions; rural residents would navigate government services; immigrant populations would access multilingual information; the enterprise would be financially sustainable; the model would be replicable."
    weight: 0.30
    description: "SocialImpactOutcome"
