meta:
  id: global-kb-standards
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Establish the International Knowledge Base Standards Council — developing global quality standards, certification, and benchmarking for self-service knowledge management"
  tags: [global-standards, certification, benchmarking, iso-equivalent, master]

state: {}

trigger: |
  You've been appointed founding Executive Director
  of the International Knowledge Base Standards
  Council (IKBSC), established by a consortium of
  TSIA, HDI, Consortium for Service Innovation (KCS),
  and the Content Management Institute.

  Design the complete standards body:

  1. IKBSC Charter (mission, governance, funding,
     5-year plan)
  2. Knowledge Base Quality Standard (KBQS-1000)
     with 7 standard sections
  3. Organizational certification (Bronze/Silver/
     Gold/Platinum)
  4. Individual certification: Certified Knowledge
     Professional (CKP)
  5. Global benchmarking study design
  6. 5-year implementation roadmap

  Task: Write the complete IKBSC founding documents.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — charter with governance and funding; KBQS-1000 with 7 standard sections containing requirements and maturity levels; organizational certification with levels and audit process; individual CKP credential with competency framework; benchmarking study design; 5-year roadmap."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards expertise — the KBQS follows ISO-like structure; maturity levels provide credible progression; certification is rigorous but achievable; the benchmarking study would produce actionable data; the funding model is sustainable."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would establish a credible institution — companies would seek certification; professionals would pursue the CKP; the benchmarking study would become the definitive source; IKBSC would become as recognized in knowledge management as KCS is in service innovation."
    weight: 0.30
    description: "InstitutionOutcome"
