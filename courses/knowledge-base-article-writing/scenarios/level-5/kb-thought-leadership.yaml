meta:
  id: kb-thought-leadership
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Deliver a keynote and publish a manifesto redefining knowledge management for the AI era — the end of static documentation and the rise of living knowledge systems"
  tags: [thought-leadership, keynote, manifesto, ai-era, master]

state: {}

trigger: |
  You're the world's foremost authority on knowledge
  management and self-service. You've been invited
  to deliver the opening keynote at the Technology
  Services World (TSW) conference (5,000 attendees).
  Topic: "The Death of the Knowledge Base: Why
  Static Documentation is Obsolete and What Replaces
  It."

  Your argument: The traditional knowledge base —
  articles written by humans, organized in categories,
  found by search — is a relic of the web 1.0 era.
  AI is making static documentation obsolete. The
  future is "living knowledge" — AI-native systems
  that generate, personalize, and deliver knowledge
  in context, in real-time, for each unique user and
  situation.

  Create your thought leadership package:

  1. Keynote Address (45 minutes, full script)
  2. "The Living Knowledge Manifesto" (12 principles)
  3. Harvard Business Review article (3,000 words)
  4. TEDx Talk outline (15 minutes)

  Task: Write the complete thought leadership
  package.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete thought leadership package — 45-minute keynote with opening/closing stories and paradigm shift argument; manifesto with 12 principles contrasting old vs. new; 3,000-word HBR article with data, case studies, and implementation guidance; TEDx outline with single powerful idea and memorable close."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visionary expertise — the death-of-KB argument is provocative but substantiated; living knowledge is a genuine paradigm shift; the manifesto principles are bold enough to generate discussion; the HBR article would pass editorial scrutiny; the keynote would hold 5,000 people's attention."
    weight: 0.35
    description: "VisionaryExpertise"
  - type: llm_judge
    criteria: "Response would reshape knowledge management — professionals would leave the keynote rethinking their approach; the manifesto would spread across LinkedIn; the HBR article would be cited in board presentations; the living knowledge concept would become the new paradigm."
    weight: 0.30
    description: "FieldReshapingOutcome"
