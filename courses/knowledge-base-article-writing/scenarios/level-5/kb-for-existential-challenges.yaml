meta:
  id: kb-for-existential-challenges
  level: 5
  course: knowledge-base-article-writing
  type: output
  description: "Design knowledge systems for three civilization-scale challenges — pandemic response public health knowledge, climate adaptation community guides, and AI literacy for the general public"
  tags: [existential-challenges, pandemic, climate, ai-literacy, master]

state: {}

trigger: |
  You're the Special Advisor on Public Knowledge
  Systems to the UN. Three simultaneous crises
  require knowledge systems that operate at
  population scale — not for companies, but for
  humanity.

  === SYSTEM 1: Pandemic Response Knowledge ===
  Design a global public health knowledge system
  for the next pandemic — real-time, multilingual,
  combating misinformation, accessible to 8 billion
  people. Lessons from COVID-19: official information
  was too slow, too technical, too scattered, and
  lost the narrative to misinformation.

  === SYSTEM 2: Climate Adaptation Guides ===
  Design community-level knowledge systems that
  help communities adapt to climate change — flood
  preparation, drought response, heat emergency
  protocols, wildfire evacuation, and climate
  migration planning. Information must reach people
  without internet access.

  === SYSTEM 3: AI Literacy for the Public ===
  Design a global AI literacy knowledge system
  that helps the general public understand AI —
  what it can and can't do, how to evaluate AI-
  generated content, how to use AI tools safely,
  and how to participate in AI governance decisions.
  Reaching all education levels, 50+ languages.

  Task: Write all three population-scale knowledge
  system designs.

assertions:
  - type: llm_judge
    criteria: "Response creates three population-scale systems — pandemic knowledge with real-time updates, misinformation countermeasures, and multilingual reach; climate adaptation with community guides, offline access, and migration planning; AI literacy with education-level-appropriate content, 50+ languages, and governance participation tools."
    weight: 0.35
    description: "PopulationScaleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates public knowledge expertise — the pandemic system learns from COVID-19 failures; the climate system reaches offline populations; the AI literacy system is accessible across education levels; all three address misinformation; each system operates at humanity scale."
    weight: 0.35
    description: "PublicKnowledgeExpertise"
  - type: llm_judge
    criteria: "Response would serve humanity — the pandemic system would save lives through faster, clearer information; communities would adapt to climate change more effectively; the public would make informed decisions about AI; each system would be adopted by UN member states; the collective work would represent the most important knowledge systems ever designed."
    weight: 0.30
    description: "HumanityOutcome"
