meta:
  id: video-kb-article
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a multimedia knowledge base article with video script, annotated screenshot descriptions, and interactive element specifications for a complex product feature"
  tags: [multimedia, video-script, screenshots, interactive, intermediate]

state: {}

trigger: |
  You're a technical writer at ReportBuilder, a
  business intelligence tool. The "Custom Dashboard"
  feature is powerful but has low adoption (only 12%
  of users have created one). User research shows
  the feature feels overwhelming. Your job: create
  a multimedia KB article that combines video, GIFs,
  annotated screenshots, and interactive elements
  to make dashboard creation approachable.

  Feature context:
  - Users can create custom dashboards with drag-
    and-drop widgets
  - Widget types: Chart (bar, line, pie, scatter),
    Table, KPI card, Text, Image, Filter
  - Data sources: Connect to SQL databases, Google
    Sheets, CSV uploads, API endpoints
  - Layout: 12-column responsive grid, widgets snap
    to grid
  - Sharing: Dashboards can be shared with team
    members, embedded in websites, or exported as PDF

  Create the multimedia KB article:

  1. Article Content
  - Title and introduction (emphasize "easier than
    you think" message)
  - Overview video script (2-minute walkthrough
    of creating a simple dashboard from scratch)
  - Step-by-step guide with annotated screenshot
    descriptions for each step:
    Step 1: Create new dashboard (screenshot: New
    Dashboard button highlighted)
    Step 2: Connect data source (screenshot: data
    source selector with annotations)
    Step 3: Add your first widget (GIF: dragging a
    chart widget onto the canvas)
    Step 4: Configure the widget (screenshot: widget
    configuration panel with callouts)
    Step 5: Add more widgets and arrange layout
    (GIF: rearranging widgets on grid)
    Step 6: Apply filters (screenshot: filter
    configuration)
    Step 7: Share your dashboard (screenshot: share
    dialog with options highlighted)

  2. Video Script
  - Write the complete 2-minute video narration
    script
  - Include scene descriptions (what's shown on
    screen at each point)
  - Include timing markers
  - Callout text overlays to highlight

  3. Screenshot and GIF Specifications
  - For each visual, describe:
    * What to capture (screen area, state)
    * Annotations to add (arrows, circles, callouts)
    * Alt text for accessibility
    * Caption text

  4. Interactive Element Specifications
  - Interactive tutorial concept (guided walkthrough
    within the product)
  - Tooltips and progress indicators
  - "Try it yourself" sandbox link description

  5. Article variants
  - Quick-start version (just the essentials)
  - Detailed version (every option explained)
  - Video-only version (for users who prefer
    watching)

  Task: Write the complete multimedia KB article
  with all specifications.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multimedia article — article content with 7 steps and visual specifications; 2-minute video script with scene descriptions and timing; screenshot and GIF specifications with annotations and alt text for each visual; interactive element specifications; 3 article variants (quick-start, detailed, video-only). Each visual element is precisely specified."
    weight: 0.35
    description: "MultimediaArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multimedia content expertise — the video script is natural and concise; screenshot specifications include enough detail for a designer to execute; GIF moments are chosen for steps where motion adds clarity; alt text is descriptive and accessible; the interactive elements would enhance the learning experience; the three variants serve different learning preferences."
    weight: 0.35
    description: "MultimediaExpertise"
  - type: llm_judge
    criteria: "Response would increase feature adoption — the multimedia approach would make dashboard creation feel approachable; users who watch the video would feel confident starting; the annotated screenshots would prevent users from getting lost; the 12% adoption rate would increase; users would successfully create their first custom dashboard."
    weight: 0.30
    description: "FeatureAdoptionOutcome"
