meta:
  id: kb-style-guide-creation
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Create a comprehensive knowledge base style guide that establishes writing standards, formatting rules, and tone guidelines for a growing SaaS company's support content team"
  tags: [style-guide, writing-standards, formatting, tone, intermediate]

state: {}

trigger: |
  You're the Knowledge Base Manager at a 200-person
  SaaS company (ProjectForge, a project management
  tool). The KB has grown to 300+ articles written
  by 8 different people over 3 years. The result:
  wildly inconsistent tone, formatting, terminology,
  and quality. Some articles say "click" while others
  say "select" or "tap." Some use screenshots, others
  don't. Some are formal, others are chatty.

  Create a comprehensive KB style guide that all
  writers must follow:

  1. Voice and Tone
  - Brand voice definition for support content
  - Tone variations by article type (how-to vs.
    troubleshooting vs. announcement)
  - Examples of do's and don'ts
  - How to handle sensitive topics (outages, price
    increases, feature removals)

  2. Writing Standards
  - Sentence and paragraph length guidelines
  - Active vs. passive voice rules
  - Readability target (Flesch-Kincaid grade level)
  - Jargon and technical terminology guidelines
  - Acronym and abbreviation rules
  - Inclusive language guidelines

  3. Formatting Standards
  - Heading hierarchy rules (H1, H2, H3 usage)
  - List formatting (when to use bullets vs. numbers)
  - Code and UI element formatting (bold for buttons,
    monospace for code, italics for field names)
  - Note, warning, and tip callout box usage
  - Image and screenshot standards (size, annotation,
    alt text)
  - Link formatting and cross-referencing rules

  4. Article Structure Templates
  - How-to article template
  - Troubleshooting article template
  - FAQ article template
  - Feature announcement template
  - Reference/glossary template
  - Each with required and optional sections

  5. Terminology Guide
  - Standard terms for UI elements (click, select,
    navigate to, etc.)
  - Product-specific terminology (feature names,
    plan names)
  - Words to avoid and their alternatives
  - 30+ term standardization decisions

  6. Review and Publishing Checklist
  - Pre-publish quality checklist
  - SEO checklist (title, meta description, keywords)
  - Accessibility checklist
  - Peer review process

  Task: Write the complete KB style guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete KB style guide — voice and tone with examples; writing standards with readability targets and inclusive language; formatting standards for headings, lists, UI elements, and images; 5 article structure templates; terminology guide with 30+ standardized terms; review and publishing checklist covering quality, SEO, and accessibility."
    weight: 0.35
    description: "StyleGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates KB management expertise — the voice definition is specific to support content; formatting rules address real consistency problems; the terminology guide makes concrete decisions (click vs. select vs. tap); templates are practical and include required vs. optional sections; the review checklist catches common quality issues; the guide would actually standardize writing across 8 contributors."
    weight: 0.35
    description: "StyleGuideExpertise"
  - type: llm_judge
    criteria: "Response would transform KB consistency — new and existing writers would produce consistent content; articles would have uniform formatting and tone; the terminology guide would eliminate inconsistencies; the style guide itself is clear enough that writers can follow it without extensive training; the result would be a professional, cohesive knowledge base."
    weight: 0.30
    description: "ConsistencyOutcome"
