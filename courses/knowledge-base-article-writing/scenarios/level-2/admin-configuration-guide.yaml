meta:
  id: admin-configuration-guide
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a comprehensive admin configuration guide for setting up a multi-team workspace with custom workflows, permissions, and integrations"
  tags: [admin-guide, configuration, multi-team, workflows, intermediate]

state: {}

trigger: |
  You're a technical writer at TaskBoard, a project
  management tool. New admin customers often take
  weeks to fully configure their workspace, and many
  never set up advanced features (custom workflows,
  automations, integrations). Write a comprehensive
  admin configuration guide that walks administrators
  through complete workspace setup.

  Configuration features:
  - Workspace settings (name, logo, timezone, default
    language)
  - Team structure (departments, teams, cross-
    functional groups)
  - Custom workflows (define stages for different
    project types: Kanban, Waterfall, Scrum, custom)
  - Custom fields (text, dropdown, date, number,
    checkbox, person, formula)
  - Permission templates (who can view, edit, delete,
    export by role)
  - Integrations (Slack, GitHub, Google Drive,
    Figma, Jira — each with specific setup steps)
  - Notification settings (per-team, per-project,
    per-user defaults)
  - Billing and user management (add/remove users,
    manage licenses)

  Write the admin guide:

  1. Planning Your Workspace
  - Pre-setup questionnaire (questions to answer
    before configuring)
  - Workspace structure recommendations by company
    size
  - Migration considerations (importing from other
    tools)

  2. Step-by-step Configuration
  - Phase 1: Basic setup (workspace settings, branding)
  - Phase 2: Team structure (creating teams, adding
    members, assigning roles)
  - Phase 3: Workflows (creating custom workflows
    for different project types, with 3 examples)
  - Phase 4: Custom fields (setting up project-
    level and task-level custom fields)
  - Phase 5: Permissions (configuring role-based
    access and permission templates)
  - Phase 6: Integrations (connecting top 5
    integrations)
  - Phase 7: Notifications (configuring defaults
    without overwhelming users)

  3. Best Practices
  - Workspace organization tips (flat vs. nested
    structure)
  - Naming conventions for projects and workflows
  - Permission philosophy (restrict vs. open by
    default)
  - Rollout strategy (how to onboard your team to
    the new workspace)

  4. Troubleshooting Configuration Issues
  - Common setup mistakes and how to fix them
  - "I set permissions wrong" recovery steps
  - Integration connection failures

  Task: Write the complete admin configuration guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete admin guide — pre-setup planning with questionnaire; 7-phase configuration walkthrough from basic setup through notifications; best practices for organization, naming, and permissions; troubleshooting for common mistakes and recovery. Each phase has specific, actionable steps."
    weight: 0.35
    description: "AdminGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates admin documentation expertise — the pre-setup questionnaire helps admins plan before clicking; the phased approach prevents overwhelm; workflow examples are realistic for different project types; permission recommendations follow security best practices; the rollout strategy ensures team adoption; troubleshooting addresses the real 'I messed up permissions' panic."
    weight: 0.35
    description: "AdminDocExpertise"
  - type: llm_judge
    criteria: "Response would accelerate workspace setup — admins would complete configuration in days instead of weeks; advanced features would be set up from the start instead of never; the pre-setup questionnaire would prevent rework; the rollout strategy would ensure team adoption; the troubleshooting section would prevent escalations to support."
    weight: 0.30
    description: "SetupAccelerationOutcome"
