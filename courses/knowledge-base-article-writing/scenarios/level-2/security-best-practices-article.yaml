meta:
  id: security-best-practices-article
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a security best practices article that helps non-technical users protect their accounts and data in a cloud-based business application"
  tags: [security, best-practices, non-technical, cloud, intermediate]

state: {}

trigger: |
  You're a technical writer at VaultCRM, a cloud
  CRM platform used by small businesses. After a
  wave of account compromises (phishing attacks
  targeting your users), the security team wants a
  comprehensive security best practices article
  that helps non-technical business users protect
  their accounts and customer data.

  Security features available:
  - Two-factor authentication (SMS, authenticator
    app, hardware key)
  - Single sign-on (SSO) via Google, Microsoft,
    Okta
  - IP allowlisting (restrict access to specific
    IPs)
  - Session management (view and revoke active
    sessions)
  - API key management (create, rotate, revoke)
  - Audit log (who did what, when)
  - Role-based access control (Admin, Manager,
    Sales Rep, Read-Only)
  - Data export controls (admin can restrict who
    can export)
  - Password policy settings (admin configures
    minimum requirements)

  Write the security best practices article:

  1. Why This Matters
  - Real-world scenarios of what happens when
    accounts are compromised (data theft, customer
    trust lost, regulatory fines)
  - Recent threat landscape (phishing, credential
    stuffing)

  2. Essential Security Steps (Everyone Should Do)
  - Enable two-factor authentication (step-by-step
    for each method)
  - Create a strong, unique password
  - Recognize phishing attempts (with examples of
    real-looking phishing emails)
  - Review active sessions regularly
  - Log out of shared computers

  3. Administrator Security Setup
  - Configure password policy
  - Enable SSO (if using Google/Microsoft/Okta)
  - Set up IP allowlisting for office access
  - Configure role-based access (principle of least
    privilege)
  - Restrict data export permissions
  - Set up audit log monitoring
  - API key rotation schedule

  4. Incident Response
  - "I think my account was compromised" — what to
    do immediately
  - How to revoke all active sessions
  - How to reset API keys
  - Who to contact and what information to provide
  - How to check the audit log for unauthorized
    activity

  5. Security Checklist
  - Printable security checklist for individuals
  - Printable security checklist for administrators

  Task: Write the complete security best practices
  article.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete security article — why it matters with real scenarios; essential steps for all users including 2FA setup, password guidance, and phishing recognition; administrator setup for SSO, IP allowlisting, RBAC, and audit logs; incident response with immediate actions; printable security checklists for individuals and admins."
    weight: 0.35
    description: "SecurityArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates security content expertise — phishing examples are realistic enough to educate; 2FA setup instructions cover all three methods; the tone creates urgency without causing panic; administrator steps follow defense-in-depth principles; incident response is actionable and specific; security concepts are explained for non-technical users; the principle of least privilege is made practical."
    weight: 0.35
    description: "SecurityContentExpertise"
  - type: llm_judge
    criteria: "Response would improve account security — users would enable 2FA after reading; admins would tighten access controls; users would recognize phishing attempts; compromised accounts would be detected faster; the article would reduce successful account compromises; the security checklists would be printed and posted near workstations."
    weight: 0.30
    description: "SecurityImprovementOutcome"
