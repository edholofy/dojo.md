meta:
  id: kb-taxonomy-design
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Design a complete information architecture and taxonomy for a knowledge base — categories, tags, navigation, and search optimization for a multi-product company"
  tags: [taxonomy, information-architecture, navigation, search, intermediate]

state: {}

trigger: |
  You're the Content Strategist at NexaCloud, a
  company with 3 products: NexaCloud Storage (file
  storage), NexaCloud Sync (file synchronization),
  and NexaCloud Share (file sharing and collaboration).
  The knowledge base has 450 articles dumped into a
  flat list with no categories, inconsistent tags,
  and poor search results. Users can't find what
  they need.

  Analytics show:
  - 35% of internal searches return zero results
  - Average of 3.2 searches before finding an article
  - 60% of users who search give up and submit a
    ticket
  - Top failed searches: "sync not working," "share
    link," "storage full," "cancel subscription,"
    "mobile app"

  Design the complete information architecture:

  1. Category Taxonomy
  - Top-level categories (6-8 max)
  - Second-level subcategories
  - Rules for which articles go where
  - Cross-product content organization (billing,
    account management span all products)
  - Category naming conventions

  2. Tagging System
  - Tag taxonomy (controlled vocabulary, not
    free-form)
  - Tag categories: Product, Feature, Article Type,
    Audience, Platform
  - Tagging rules (how many tags per article, when
    to create new tags)
  - Tag governance (who can create new tags)

  3. Navigation Design
  - Homepage layout (how categories are presented)
  - Browse experience (category → subcategory →
    article)
  - "Popular articles" and "Recently updated"
    sections
  - Contextual navigation (related articles, next
    steps)
  - Product-specific entry points

  4. Search Optimization
  - Search synonym configuration (mapping user
    language to article content)
  - Search keyword strategy for each article type
  - Article title optimization rules
  - Meta description standards
  - Search result ranking considerations

  5. Migration Plan
  - How to re-categorize 450 existing articles
  - Prioritization (which articles to migrate first)
  - Redirect strategy for changed URLs
  - Timeline and resource requirements
  - Validation methodology (how to verify the new
    IA works)

  Task: Write the complete information architecture
  design with taxonomy, tagging, navigation, and
  migration plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete IA design — category taxonomy with 6-8 top-level categories and subcategories; tagging system with controlled vocabulary across 5 tag categories; navigation design for homepage, browse, and contextual navigation; search optimization with synonyms and keyword strategy; migration plan for 450 articles with prioritization and redirects."
    weight: 0.35
    description: "IADesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates information architecture expertise — categories are user-task-oriented, not product-team-oriented; the tagging system is controlled and governed; search synonyms address the specific failed searches from analytics; cross-product content has a clear home; the taxonomy follows the 7±2 rule; the migration plan is realistic for 450 articles."
    weight: 0.35
    description: "IAExpertise"
  - type: llm_judge
    criteria: "Response would fix the findability problem — the zero-result search rate would drop significantly; users would find articles in fewer searches; the 60% abandonment rate would decrease; the new taxonomy would make browsing intuitive; the migration plan would get the existing 450 articles properly organized without losing traffic."
    weight: 0.30
    description: "FindabilityOutcome"
