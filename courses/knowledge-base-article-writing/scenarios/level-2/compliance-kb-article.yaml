meta:
  id: compliance-kb-article
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a compliance and data privacy knowledge base article explaining GDPR, CCPA, and data handling practices for a B2B SaaS product"
  tags: [compliance, gdpr, ccpa, data-privacy, intermediate]

state: {}

trigger: |
  You're a technical writer at AnalyticsPro, a
  customer analytics platform. Enterprise customers
  increasingly ask about data privacy compliance
  before purchasing. The sales and support teams
  need a comprehensive KB article that explains
  how AnalyticsPro handles data privacy, so they
  can share it with prospects and customers.

  Compliance context:
  - AnalyticsPro processes customer behavioral data
    (page views, clicks, events, user attributes)
  - Data is stored in AWS US-East and EU-West regions
  - AnalyticsPro is a data processor; the customer
    is the data controller
  - SOC 2 Type II certified
  - GDPR compliant (DPA available, EU data residency
    option, data deletion API)
  - CCPA compliant (do-not-sell flag, data export,
    deletion requests)
  - HIPAA: Not HIPAA compliant (healthcare customers
    must not send PHI)
  - Data retention: Configurable 30 days to 5 years;
    default 2 years
  - Encryption: AES-256 at rest, TLS 1.2+ in transit
  - Sub-processors: AWS, Snowflake, SendGrid (full
    list in DPA)

  Write the compliance KB article:

  1. Overview
  - AnalyticsPro's commitment to data privacy
  - Processor vs. controller clarification
  - Certifications and compliance summary

  2. GDPR Section
  - How AnalyticsPro supports GDPR compliance
  - Data Processing Agreement (how to obtain)
  - EU data residency option
  - Data subject rights (access, deletion, portability)
  - How to implement consent management
  - Data deletion and the right to be forgotten

  3. CCPA Section
  - How AnalyticsPro supports CCPA compliance
  - Do-not-sell implementation
  - Consumer data requests (access, deletion)
  - Categories of data collected

  4. Data Security
  - Encryption standards
  - Access controls and authentication
  - SOC 2 Type II overview (how to request report)
  - Sub-processor list and management
  - Incident response process

  5. Configuration Guide
  - How to enable EU data residency
  - How to configure data retention periods
  - How to use the data deletion API
  - How to set up consent tracking
  - How to respond to data subject requests

  6. FAQ
  - 10-12 compliance-specific FAQs
  - "Can I use AnalyticsPro for healthcare data?"
    (No — explain why and alternatives)

  Task: Write the complete compliance and data
  privacy KB article.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete compliance article — overview with processor/controller clarification; GDPR section with DPA, EU residency, data subject rights, and consent; CCPA section with do-not-sell and consumer requests; data security with encryption, SOC 2, and sub-processors; configuration guide with EU residency, retention, deletion API, and consent tracking; 10-12 compliance FAQs including HIPAA limitation."
    weight: 0.35
    description: "ComplianceArticleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance content expertise — the processor/controller distinction is clear and accurate; GDPR and CCPA requirements are differentiated correctly; the HIPAA limitation is stated clearly without burying it; the configuration guide makes compliance actionable; the DPA access process is streamlined; the article balances legal accuracy with readability for non-legal audiences."
    weight: 0.35
    description: "ComplianceContentExpertise"
  - type: llm_judge
    criteria: "Response would satisfy compliance inquiries — enterprise security teams would find the information they need; the article would accelerate sales by proactively answering compliance questions; the configuration guide would help customers implement compliance; the FAQ would address real procurement concerns; the article would build trust through transparency."
    weight: 0.30
    description: "ComplianceSatisfactionOutcome"
