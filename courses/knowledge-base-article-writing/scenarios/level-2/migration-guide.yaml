meta:
  id: migration-guide
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a comprehensive migration guide helping users move from a legacy product version to a completely redesigned new version"
  tags: [migration-guide, product-upgrade, legacy-to-new, intermediate, complex]

state: {}

trigger: |
  You're a technical writer at DesignStudio, a
  graphic design tool. The company is launching
  DesignStudio 2.0 — a complete rebuild with a new
  interface, new file format, and new features.
  Users on DesignStudio Classic need a migration
  guide to transition to 2.0.

  Migration context:
  - Classic files (.dsc) can be imported to 2.0
    (.ds2) but the conversion is one-way
  - The UI is completely redesigned (tools are in
    different places)
  - Some Classic features are not yet in 2.0
    (gradient mesh, 3D text)
  - New features in 2.0 not in Classic (AI background
    removal, real-time collaboration, vector
    auto-trace)
  - Keyboard shortcuts have changed (option to
    import Classic shortcuts exists)
  - Plugins from Classic are not compatible; most
    have 2.0 versions
  - Classic will receive security updates for 12
    months but no new features
  - Users can run Classic and 2.0 side-by-side
  - Team/enterprise users: admin controls migration
    for entire team

  Write the migration guide:

  1. Overview and Timeline
  - What's changing and why
  - Migration timeline and deadlines
  - What happens to Classic (support timeline)
  - Side-by-side running option

  2. Before You Migrate
  - Backup your Classic files
  - Check plugin compatibility
  - Review feature parity list
  - System requirements for 2.0
  - Team migration considerations (admin section)

  3. Migration Steps
  - Individual user migration (step-by-step)
  - File conversion process (single and batch)
  - Settings and preferences migration
  - Keyboard shortcut import
  - Workspace customization in 2.0

  4. Feature Mapping Guide
  - "Where did X go?" table (Classic feature →
    2.0 equivalent location)
  - Features temporarily unavailable (with timeline
    for adding them)
  - New features to explore

  5. Troubleshooting Migration Issues
  - File conversion errors
  - Missing fonts after migration
  - Performance issues
  - Plugin compatibility problems

  6. Resources
  - Video tutorials for 2.0 interface
  - Classic-to-2.0 keyboard shortcut cheat sheet
  - Community forum for migration help
  - Support contact for migration issues

  Task: Write the complete migration guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete migration guide — overview with timeline; pre-migration preparation with backups, plugin check, and system requirements; step-by-step migration for individuals and teams; feature mapping table showing Classic to 2.0 equivalents; troubleshooting for common migration issues; resources with video tutorials and cheat sheet."
    weight: 0.35
    description: "MigrationGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates migration content expertise — the guide reduces migration anxiety by being transparent about what works and what doesn't yet; the feature mapping table is the most useful section and is comprehensive; the one-way conversion is clearly warned about; the side-by-side option is presented as a safety net; the admin/team migration path is distinct from individual; troubleshooting addresses real migration pain points."
    weight: 0.35
    description: "MigrationExpertise"
  - type: llm_judge
    criteria: "Response would enable smooth migration — users would feel confident migrating because they know what to expect; the backup step prevents data loss; the feature mapping eliminates 'where did X go?' frustration; users with missing features would know the timeline; the troubleshooting section would resolve common blockers; migration-related support tickets would be minimal."
    weight: 0.30
    description: "SmoothMigrationOutcome"
