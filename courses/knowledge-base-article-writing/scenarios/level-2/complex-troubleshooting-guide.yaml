meta:
  id: complex-troubleshooting-guide
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Write a multi-path troubleshooting guide for a complex integration issue with decision-tree logic and platform-specific solutions"
  tags: [troubleshooting, decision-tree, integration, multi-platform, intermediate]

state: {}

trigger: |
  You're a technical writer at CalendarSync, a
  calendar integration platform that syncs events
  between Google Calendar, Outlook, Apple Calendar,
  and Zoom. The #1 support issue is "events aren't
  syncing." This is complex because the cause depends
  on which calendars are involved, the sync direction,
  the type of event, and the user's setup.

  Write a comprehensive multi-path troubleshooting
  guide:

  Context:
  - Sync can be one-way or two-way between any two
    calendars
  - Event types: Single events, recurring events,
    all-day events, events with attachments
  - Sync frequency: Real-time (Pro), every 15 min
    (Free)
  - Known issues: Recurring events with exceptions
    sometimes don't sync correctly; all-day events
    can shift by a day due to timezone handling;
    Zoom links in events sometimes get stripped

  The article should include:

  1. "Quick diagnosis" section
  - Is it a sync delay or a sync failure?
  - Is it affecting all events or specific types?
  - Which direction is failing?

  2. Decision tree troubleshooting
  Path A: Google Calendar → Outlook sync issues
  Path B: Outlook → Google Calendar sync issues
  Path C: Apple Calendar sync issues (either
  direction)
  Path D: Zoom integration issues
  Path E: Recurring event sync issues (any platform)

  3. For each path, cover:
  - Most common cause and quickfix
  - Permission and authentication checks
  - Calendar-specific settings to verify
  - Known limitations and workarounds
  - When to re-authorize the connection

  4. Advanced troubleshooting
  - How to read the sync log
  - How to force a full re-sync
  - Conflict resolution (what happens when an event
    is modified on both calendars)

  5. Known limitations table
  - What CalendarSync can and cannot sync by
    platform
  - Feature comparison matrix

  Task: Write the complete multi-path troubleshooting
  guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multi-path guide — quick diagnosis section; 5 decision-tree paths (Google→Outlook, Outlook→Google, Apple Calendar, Zoom, recurring events); each path with common causes, permission checks, platform settings, and workarounds; advanced troubleshooting with sync logs and force re-sync; known limitations table with platform comparison matrix."
    weight: 0.35
    description: "MultiPathCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates complex troubleshooting expertise — the decision tree efficiently narrows down the problem; platform-specific solutions reference actual calendar settings; the quick diagnosis prevents users from going down wrong paths; known limitations are honest and include workarounds; the sync log reading guide empowers advanced users; the conflict resolution explanation is clear."
    weight: 0.35
    description: "ComplexTroubleshootingExpertise"
  - type: llm_judge
    criteria: "Response would resolve sync issues — users would identify their specific problem path and find a solution; the quick diagnosis saves time by ruling out non-issues; the known limitations prevent frustration from unsupported scenarios; the article would significantly reduce 'events not syncing' tickets; users would understand CalendarSync's capabilities and limitations."
    weight: 0.30
    description: "SyncResolutionOutcome"
