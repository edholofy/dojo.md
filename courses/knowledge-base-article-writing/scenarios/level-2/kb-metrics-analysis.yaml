meta:
  id: kb-metrics-analysis
  level: 2
  course: knowledge-base-article-writing
  type: output
  description: "Analyze knowledge base performance metrics and write an improvement report with specific article rewrites, new article recommendations, and search optimization changes"
  tags: [metrics, analysis, improvement, optimization, intermediate]

state: {}

trigger: |
  You're the Knowledge Base Manager at CloudPay,
  a payroll processing platform. The VP of Customer
  Success has asked for a KB performance report with
  concrete improvement recommendations. You have
  the following data:

  Overall KB Metrics (Last Quarter):
  - Total articles: 180
  - Total views: 145,000
  - Unique visitors: 52,000
  - Ticket deflection rate: 18% (industry avg: 25%)
  - Average helpfulness rating: 3.2/5.0
  - Search success rate: 55% (industry avg: 70%)
  - Top 10 articles get 60% of all traffic

  Top 5 Viewed Articles:
  1. "How to run payroll" — 18,000 views, 4.1 rating
  2. "Tax filing deadlines" — 12,000 views, 2.8 rating
  3. "Adding new employees" — 9,500 views, 3.9 rating
  4. "Direct deposit setup" — 8,200 views, 2.5 rating
  5. "Generating pay stubs" — 7,100 views, 4.3 rating

  Bottom 5 Rated Articles:
  1. "Understanding tax jurisdictions" — 2.0 rating,
     340 views (confusing, too technical)
  2. "API webhook configuration" — 2.1 rating, 890
     views (outdated, screenshots wrong)
  3. "Year-end reporting" — 2.3 rating, 4,200 views
     (missing W-2 correction process)
  4. "Direct deposit setup" — 2.5 rating, 8,200
     views (steps don't match current UI)
  5. "Multi-state payroll" — 2.6 rating, 1,800
     views (incomplete, doesn't cover reciprocity)

  Top 10 Failed Searches (zero results):
  1. "garnishment" (850 searches)
  2. "W-4 form" (720 searches)
  3. "overtime calculation" (680 searches)
  4. "PTO accrual" (590 searches)
  5. "paycheck error" (540 searches)
  6. "contractor vs employee" (480 searches)
  7. "benefits deduction" (410 searches)
  8. "retroactive pay" (380 searches)
  9. "payroll tax penalty" (350 searches)
  10. "termination final paycheck" (320 searches)

  Write the improvement report:

  1. Executive Summary
  - Current state assessment
  - Key metrics vs. benchmarks
  - Priority recommendations

  2. Article Rewrite Priorities
  - For each of the 5 lowest-rated articles:
    * Current problems (why the rating is low)
    * Specific rewrite recommendations
    * Expected impact on rating and ticket volume
  - Rewrite one article completely as an example
    ("Direct deposit setup" — the highest-traffic
    low-rated article)

  3. New Article Recommendations
  - For each of the 10 failed searches:
    * Proposed article title
    * Outline of what it should cover
    * Priority level (based on search volume)
    * Expected ticket deflection impact

  4. Search Optimization Plan
  - Synonym additions for common terms
  - Title optimization for top articles
  - Tag and category improvements
  - Expected improvement in search success rate

  5. 90-Day Improvement Roadmap
  - Week-by-week priorities
  - Resource requirements
  - Target metrics for end of 90 days

  Task: Write the complete KB improvement report
  with the rewritten article.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete improvement report — executive summary with metrics vs. benchmarks; rewrite priorities for 5 lowest-rated articles with specific recommendations; complete rewrite of 'Direct deposit setup'; new article recommendations for all 10 failed searches with outlines; search optimization plan with synonyms and title changes; 90-day roadmap with weekly priorities and target metrics."
    weight: 0.35
    description: "ImprovementReportCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates KB analytics expertise — the analysis correctly identifies the highest-impact improvements; the rewrite recommendations address the specific problems cited; the new article priorities are ranked by search volume and business impact; the search optimization changes would improve the 55% success rate; the 90-day roadmap is realistic and prioritized; the rewritten article demonstrates quality improvement."
    weight: 0.35
    description: "KBAnalyticsExpertise"
  - type: llm_judge
    criteria: "Response would measurably improve the KB — deflection rate would increase from 18% toward 25%; search success rate would improve from 55% toward 70%; the rewritten 'direct deposit' article would see its rating improve from 2.5 to 4.0+; the 10 new articles would eliminate the top failed searches; the 90-day plan would show clear progress in monthly reviews."
    weight: 0.30
    description: "MeasurableImprovementOutcome"
