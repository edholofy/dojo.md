meta:
  id: content-governance
  level: 4
  course: uiux-microcopy
  type: output
  description: "Content governance — establish enterprise-level content governance processes including approval workflows, compliance review, and content lifecycle management"
  tags: [governance, compliance, approval, lifecycle, enterprise, expert]

state: {}

trigger: |
  You're the Director of Content Design at a regulated fintech
  company (banking + investing). Recent incidents:

  1. A promotional banner said "Guaranteed 5% returns" — the
     compliance team caught it after it was live for 6 hours.
     SEC regulations prohibit guaranteeing investment returns.

  2. An error message in the transfer flow said "Your transfer
     failed" with no explanation. 200+ users called support,
     costing the company $15K in a single day.

  3. A PM changed button copy from "Transfer funds" to "Send
     money now!" without review. The compliance team flagged it
     as potentially misleading urgency language.

  4. Three different screens show different versions of the
     risk disclaimer. Legal doesn't know which is current.

  The Chief Compliance Officer demands: "No copy ships without
  proper review. But I also don't want to slow product velocity
  to a crawl. Fix this."

  Task: Design a content governance framework that balances
  regulatory compliance with product development speed.

assertions:
  - type: llm_judge
    criteria: "Response designs a risk-tiered approval workflow — not all copy carries the same regulatory risk. High-risk (financial claims, disclaimers, legal terms, promotional language): requires compliance + legal + UX writer review before shipping. Medium-risk (transactional copy, error messages, account information): requires UX writer review, compliance spot-checks. Low-risk (UI labels, tooltips, help text without financial claims): self-service with patterns library, periodic audit. Defines clear criteria for each risk tier with specific examples from fintech context. Includes expedited review process for urgent changes"
    weight: 0.35
    description: "RiskTieredApproval"
  - type: llm_judge
    criteria: "Response creates content lifecycle management — version control for all regulated copy (single source of truth for disclaimers, terms, risk warnings), change tracking (who changed what, when, why), audit trail for compliance reporting, scheduled review cycles for regulated content (quarterly disclaimer review, annual terms update), and deprecation process for outdated copy. Includes a content registry or database that maps every piece of regulated copy to its approval status, reviewer, and next review date"
    weight: 0.35
    description: "ContentLifecycle"
  - type: llm_judge
    criteria: "Response balances speed with compliance — pre-approved content patterns that don't need individual review (compliant error message templates, pre-cleared button labels), compliance training for PMs and designers (what triggers compliance review, common pitfalls), automated compliance checks (flagging keywords like 'guaranteed,' 'risk-free,' 'no fees' for review), and escalation paths for edge cases. Addresses the cultural challenge: making compliance feel like a partner not a blocker, building a compliance-aware content culture"
    weight: 0.30
    description: "SpeedComplianceBalance"
