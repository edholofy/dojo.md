meta:
  id: measuring-copy-impact
  level: 4
  course: uiux-microcopy
  type: output
  description: "Measuring copy impact — design frameworks and methodologies for quantifying the business impact of UX writing changes"
  tags: [metrics, analytics, ROI, A/B-testing, business-impact, expert]

state: {}

trigger: |
  The CFO asks your UX writing team: "We spend $800K annually on
  UX writers. What's the ROI? Show me the business impact."

  You have access to:
  - Product analytics (conversion funnels, task completion rates)
  - A/B testing platform (Optimizely)
  - Support ticket data (Zendesk)
  - User research recordings (Maze, UserTesting)
  - NPS and CSAT survey data

  Recent copy changes you've made:
  1. Rewrote checkout error messages → support tickets about
     payment issues dropped (but you didn't measure before/after)
  2. Redesigned onboarding copy → completion rate went up (but
     the design also changed, so copy impact is unclear)
  3. Created a content style guide → inconsistency reports from
     QA dropped (anecdotally, no hard data)

  Task: Design a measurement framework for UX writing impact
  and build the case for the $800K investment.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-dimensional measurement framework — leading indicators (readability scores, time-on-task, form completion rates, error recovery rates, support ticket deflection) and lagging indicators (NPS/CSAT improvements, conversion rate changes, user retention). Maps copy metrics to business outcomes: copy clarity → fewer support tickets → reduced support cost, better error messages → higher recovery rate → more completed transactions → revenue. Creates a measurement plan for future copy changes: baseline metrics before changes, controlled A/B tests isolating copy variables, statistical significance requirements"
    weight: 0.35
    description: "MeasurementFramework"
  - type: llm_judge
    criteria: "Response builds the ROI case with the available data — retroactively estimates impact from existing changes (e.g., support ticket reduction × average ticket cost = savings), designs attribution methodology for mixed changes (multivariate testing to isolate copy impact, copy-only A/B tests), calculates total cost of bad copy (support burden, user abandonment, brand perception), and presents the data in executive-friendly format (revenue impact, cost savings, not just UX metrics). Includes a dashboard design showing ongoing copy impact tracking"
    weight: 0.35
    description: "ROICase"
  - type: llm_judge
    criteria: "Response addresses measurement challenges honestly — attribution is hard when copy changes alongside design/functionality, not all copy impact is quantifiable (brand voice, trust, delight), some improvements prevent problems rather than create measurable gains (good error message means the error path isn't frustrating, but users don't report 'I wasn't frustrated'), and proxy metrics can be misleading. Proposes a balanced scorecard approach: quantitative metrics + qualitative user feedback + operational efficiency + team capability growth. Suggests specific A/B tests to run for definitive proof of copy impact"
    weight: 0.30
    description: "MeasurementChallenges"
