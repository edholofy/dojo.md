meta:
  id: content-design-operations
  level: 4
  course: uiux-microcopy
  type: output
  description: "Content design operations — build scalable content operations processes for a multi-product organization including workflows, templates, and quality assurance"
  tags: [content-ops, scaling, workflows, quality-assurance, expert]

state: {}

trigger: |
  You're Head of Content Design at a SaaS company with 4 products,
  12 designers, but only 3 UX writers. The current state:

  - Writers are bottlenecks: designers wait 2-3 weeks for copy reviews
  - No standardized request process: copy requests come via Slack DMs,
    Jira tickets, Google Docs comments, and hallway conversations
  - No quality gate: some copy ships without any writer review
  - Writers spend 60% of their time on low-impact copy tweaks
    (changing 'Submit' to 'Save') instead of strategic work
  - No visibility into the copy pipeline: leadership doesn't know
    what writers are working on or what's waiting in queue

  The VP of Design asks: "How do we scale content design without
  hiring 9 more writers? I need a content operations plan."

  Task: Design a comprehensive content design operations plan
  that scales UX writing capacity across the organization.

assertions:
  - type: llm_judge
    criteria: "Response designs a tiered service model — not everything needs a UX writer. Tier 1 (self-service): designers use content patterns library and templates for standard components (buttons, labels, simple toasts). Tier 2 (async review): designers write first draft using guidelines, writers review asynchronously. Tier 3 (embedded partnership): writers join project teams for complex flows (onboarding, error systems, new features). Defines clear criteria for each tier and estimates what percentage of requests fall into each (e.g., 60% self-service, 25% async review, 15% embedded). Includes a request intake process with a single channel and triage system"
    weight: 0.35
    description: "TieredServiceModel"
  - type: llm_judge
    criteria: "Response creates operational infrastructure — request intake form (product area, deadline, scope, context), prioritization framework (business impact × urgency matrix), SLA for each tier (self-service: immediate, async review: 48 hours, embedded: sprint-based), capacity planning (how to allocate 3 writers across 4 products), and quality assurance process (what gets reviewed, spot-check cadence for self-service copy, pre-ship copy checklist). Includes a dashboard or reporting mechanism to track copy pipeline health"
    weight: 0.35
    description: "OperationalInfrastructure"
  - type: llm_judge
    criteria: "Response addresses scaling through enablement — training program for designers to write better copy (workshops, office hours, copy review sessions), content patterns library that reduces writer dependency, guidelines documentation that answers common copy questions, copy critique sessions that build organizational writing capability, and metrics to measure success (time-to-ship for copy, self-service adoption rate, quality scores, designer satisfaction). Addresses change management: how to get designers to adopt new processes"
    weight: 0.30
    description: "ScalingEnablement"
