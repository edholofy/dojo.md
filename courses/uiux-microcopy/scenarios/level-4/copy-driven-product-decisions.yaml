meta:
  id: copy-driven-product-decisions
  level: 4
  course: uiux-microcopy
  type: output
  description: "Copy-driven product decisions — use UX writing insights to identify product problems, influence product strategy, and drive feature improvements"
  tags: [product-strategy, influence, insights, advocacy, expert]

state: {}

trigger: |
  As a senior UX writer, you've noticed patterns in your copy
  work that reveal deeper product problems:

  1. NAMING CONFUSION: You've rewritten the "Workspace" tooltip
     12 times because users keep misunderstanding what a
     Workspace is. Support tickets about "Workspace vs Project
     vs Team" are the #3 most common category.

  2. ERROR MESSAGE OVERLOAD: You wrote 47 different error
     messages for the data import feature. This suggests the
     import flow is too fragile and needs engineering fixes,
     not more error messages.

  3. ONBOARDING COPY DEBT: The onboarding flow requires 800+
     words of explanation to walk users through setup. If the
     product needs that much explanation, the UI is too complex.

  4. HELP TEXT DEPENDENCY: The settings page has 23 tooltips
     explaining what settings do. Users shouldn't need a
     tooltip for every setting.

  Your product team respects your writing but doesn't see you
  as a product strategy voice.

  Task: Transform these copy observations into product
  recommendations and position UX writing as a product
  strategy input.

assertions:
  - type: llm_judge
    criteria: "Response transforms each copy observation into a product insight with actionable recommendations — Naming: the naming confusion reveals an information architecture problem, recommends user research to understand mental models and potentially restructuring the hierarchy. Error messages: 47 errors means the import system needs engineering investment to reduce failure modes, not more copy band-aids. Onboarding: 800 words of explanation means the setup flow needs simplification, proposes progressive disclosure or wizard redesign. Tooltips: 23 tooltips means the settings UI needs redesign with better defaults and clearer labels. Each recommendation includes data (support tickets, user research, analytics) to support the argument"
    weight: 0.35
    description: "ProductInsights"
  - type: llm_judge
    criteria: "Response designs a 'copy signals' framework — systematic way to identify product problems through copy patterns: 'copy smell' indicators (too many words needed to explain a feature, too many error states, high tooltip density, inconsistent terminology), methodology for tracking and reporting these signals (regular copy health reports, quarterly product insights from copy data), and integration into product planning (copy insights feed into product roadmap discussions, OKRs, and sprint planning). Creates templates for presenting copy-driven insights to product leadership"
    weight: 0.35
    description: "CopySignalsFramework"
  - type: llm_judge
    criteria: "Response addresses positioning and influence — how to shift from 'wordsmith' to 'product thinker' (present insights in product terms: retention, conversion, support cost, not writing terms), how to get invited to product strategy meetings (demonstrate value through copy-driven product wins), how to partner with product managers and designers as equals (shared vocabulary, data-driven arguments), and how to build a track record of product improvements that originated from copy insights. Includes a presentation or artifact for sharing these insights with leadership"
    weight: 0.30
    description: "PositioningInfluence"
