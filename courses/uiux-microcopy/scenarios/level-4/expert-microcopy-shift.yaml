meta:
  id: expert-microcopy-shift
  level: 4
  course: uiux-microcopy
  type: output
  description: "Expert microcopy shift — handle a complex day as a content design lead managing organizational, strategic, and tactical copy challenges simultaneously"
  tags: [shift, combined, assessment, leadership, expert]

state: {}

trigger: |
  You're the Content Design Lead. Here's your Monday morning:

  8:30 AM — URGENT: The CEO forwarded a tweet thread criticizing
  your product's error messages as "hostile and condescending."
  The tweet has 2,400 retweets. Example screenshot shows: "Error:
  Invalid input. Please try again." The CEO wants a response plan
  by noon.

  9:00 AM — STRATEGY: Your quarterly planning meeting is at 2 PM.
  You need to present the content design team's OKRs for Q2. The
  VP of Product wants to see how content design contributes to
  the company's goal of reducing support ticket volume by 30%.

  10:00 AM — PEOPLE: Your best UX writer just told you they're
  considering a job offer from a competitor. They feel stuck
  because there's no senior IC track (only management path).
  They want an answer by end of week.

  11:00 AM — OPERATIONS: The design systems team is presenting
  their Q2 roadmap and wants to add content patterns as a
  deliverable. They need your team's commitment for embedded
  support (1 writer, 50% time for 3 months). You're already
  understaffed.

  Task: Address all four challenges with strategic, actionable
  responses that demonstrate senior content design leadership.

assertions:
  - type: llm_judge
    criteria: "Response handles the viral criticism strategically — immediate actions: audit the specific error messages shown in the tweet, acknowledge the feedback publicly (transparent, not defensive response), create an error message improvement sprint. Presents a plan to the CEO: root cause analysis (why are error messages hostile — probably legacy copy nobody reviewed), remediation timeline, and how to turn negative PR into a positive story ('We heard you. Here's what we're changing.'). Doesn't just fix the specific tweet examples but addresses the systemic issue"
    weight: 0.35
    description: "CrisisAndStrategy"
  - type: llm_judge
    criteria: "Response creates compelling OKRs and addresses the retention challenge — OKRs that directly connect content design to business metrics: 'Reduce error-related support tickets by 40% through error message redesign' (measurable, tied to company goal), 'Increase onboarding completion rate by 15% through copy improvements' (revenue impact), 'Achieve 80% self-service copy coverage through content patterns library' (operational efficiency). For the writer retention: proposes a senior IC track (Senior → Staff → Principal Content Designer) with concrete differentiators at each level, presents to VP of Design for approval"
    weight: 0.35
    description: "OKRsAndRetention"
  - type: llm_judge
    criteria: "Response navigates the resource constraint creatively — the design systems request is strategically important but the team is understaffed. Options: negotiate scope (25% time instead of 50%), phase the work (start in month 2 after Q1 sprint work settles), tie it to the error message crisis (content patterns prevent future hostile copy, making it a priority), or propose it as a Q2 OKR to get headcount. Demonstrates the ability to say 'yes, and...' or 'not yet, but...' instead of just 'no.' Balances all four priorities into a coherent Monday action plan with clear next steps and delegation"
    weight: 0.30
    description: "ResourceNavigation"
