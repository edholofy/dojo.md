meta:
  id: stakeholder-copy-management
  level: 4
  course: uiux-microcopy
  type: output
  description: "Stakeholder copy management — navigate competing stakeholder demands on copy including legal, marketing, product, and executive requests"
  tags: [stakeholder-management, conflict-resolution, cross-functional, expert]

state: {}

trigger: |
  You're the senior UX writer for a B2B SaaS product launching
  a major new feature: AI-powered analytics. Four stakeholders
  have conflicting copy requirements:

  1. MARKETING wants: "Revolutionary AI-Powered Insights™ —
     Unlock the power of artificial intelligence to transform
     your data into actionable insights." (Excitement, buzz)

  2. LEGAL wants: "Automated data analysis (beta). Results
     are generated by machine learning models and should be
     independently verified. Not financial advice." (Risk)

  3. PRODUCT wants: "Smart Analytics — see trends and patterns
     in your data, automatically." (Simplicity, feature value)

  4. CEO wants: "We need to differentiate from competitors.
     Make it sound like we're the most advanced AI platform
     in the market." (Competitive positioning)

  All four expect their version to be the final copy. The
  feature launches in 2 weeks. Marketing has already used
  "Revolutionary AI-Powered Insights" in press releases.
  Legal says the current marketing copy violates FTC
  guidelines on AI claims.

  Task: Navigate this stakeholder conflict to produce copy
  that satisfies all parties, and design a process to
  prevent this from happening again.

assertions:
  - type: llm_judge
    criteria: "Response navigates the immediate conflict with a unified solution — proposes copy that threads the needle: feature name that's marketable but accurate (not 'Revolutionary' but not boring), in-product copy that emphasizes value without overclaiming, appropriate disclosures that don't kill the user experience, and competitive differentiation through clarity and trust rather than hype. Shows how to satisfy each stakeholder's core need: marketing gets excitement, legal gets compliance, product gets clarity, CEO gets differentiation. Includes a facilitation plan for the stakeholder meeting"
    weight: 0.35
    description: "ConflictResolution"
  - type: llm_judge
    criteria: "Response designs a preventive process — copy alignment meeting at feature kickoff (not at launch), RACI matrix for copy decisions (who is responsible, accountable, consulted, informed for different copy types), copy brief template that captures all stakeholder requirements upfront, escalation process for unresolved disagreements, and naming conventions process (product names, feature names, marketing terms decided early with all stakeholders). Includes timeline: when copy decisions should be made relative to launch"
    weight: 0.35
    description: "PreventiveProcess"
  - type: llm_judge
    criteria: "Response addresses the political dynamics — how to push back on the CEO diplomatically (data on user trust, competitor examples of overclaiming backfiring), how to partner with legal without becoming adversarial (copy that's compliant AND compelling), how to align with marketing on consistent messaging across channels (in-product copy and marketing copy shouldn't contradict), and how to position the UX writer as the neutral facilitator rather than another competing voice. Addresses the press release problem: marketing already using language that legal flags"
    weight: 0.30
    description: "PoliticalDynamics"
