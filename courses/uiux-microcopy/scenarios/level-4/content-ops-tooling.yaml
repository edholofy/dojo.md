meta:
  id: content-ops-tooling
  level: 4
  course: uiux-microcopy
  type: output
  description: "Content ops tooling — evaluate, select, and implement content management tools and workflows for a UX writing team"
  tags: [tooling, content-management, workflow, infrastructure, expert]

state: {}

trigger: |
  Your UX writing team of 6 has outgrown its current toolset.
  Current state:

  - Copy lives in: Figma annotations, Google Docs, Jira tickets,
    Slack messages, GitHub PRs, Notion pages, and engineers'
    heads (at least 7 different places)
  - No single source of truth: when a developer asks "what's
    the final copy for the error message on the payment page?"
    no one can answer quickly
  - No copy history: previous versions are lost when someone
    overwrites a Google Doc
  - No string management: each product team manages translations
    differently (some use i18n files, some hardcode strings)
  - Review workflow is manual: writers copy text from Figma,
    edit in Google Docs, paste back, then comment in Jira
  - Content reuse is impossible: the same disclaimer is written
    slightly differently in 15 places

  Budget: $50K/year for tooling. Team: 6 writers, 30 designers,
  80 engineers across 4 product teams.

  Task: Design the content operations toolstack and workflow,
  including tool evaluation, integration architecture, and
  migration plan.

assertions:
  - type: llm_judge
    criteria: "Response evaluates and recommends a toolstack — evaluates categories of tools: copy management platforms (Frontitude, Writer, Ditto), CMS options (Contentful, Strapi, headless CMS), string management for i18n (Phrase, Lokalise, Crowdin), and collaboration tools (Figma plugins, GitHub integrations). Recommends specific tool combinations with rationale: what criteria matter (Figma integration, API access, version control, translation workflow, pricing), how tools connect to each other, and how the total cost fits within $50K budget. Includes build-vs-buy analysis for custom solutions"
    weight: 0.35
    description: "ToolstackEvaluation"
  - type: llm_judge
    criteria: "Response designs the end-to-end workflow — from copy request to production: how a copy change flows through the system (request → draft → review → approve → translate → implement → QA → deploy), where each step happens (which tool), who is responsible at each stage, and how handoffs work. Single source of truth architecture: where the canonical copy lives, how it syncs to Figma for design, to code for implementation, and to translation systems for localization. Includes version control and change tracking for audit trail"
    weight: 0.35
    description: "WorkflowDesign"
  - type: llm_judge
    criteria: "Response addresses migration and adoption — migration plan from current 7-tool chaos to the new system (phased rollout, data migration strategy, what to migrate vs. start fresh), change management for 116 people (6 writers + 30 designers + 80 engineers), training plan by role (writers need deep training, designers need integration training, engineers need API/SDK training), success metrics for the new toolstack (time to find canonical copy, copy review cycle time, translation consistency), and fallback plan if a tool doesn't work out"
    weight: 0.30
    description: "MigrationAdoption"
