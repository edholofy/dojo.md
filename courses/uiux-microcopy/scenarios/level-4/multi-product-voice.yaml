meta:
  id: multi-product-voice
  level: 4
  course: uiux-microcopy
  type: output
  description: "Multi-product voice management — design and maintain consistent yet differentiated voice across a portfolio of products under one brand"
  tags: [voice, multi-product, brand, consistency, differentiation, expert]

state: {}

trigger: |
  You're the lead UX writer at a company with 4 products under
  one brand:

  1. Enterprise CRM (B2B, used by sales teams, formal context)
  2. Small business invoicing app (B2SMB, used by freelancers,
     casual context)
  3. Consumer personal finance app (B2C, used by individuals,
     friendly context)
  4. Developer API platform (B2D, used by engineers, technical
     context)

  Problem: Each product was built by a different team. The CRM
  says "Oops! Something went wrong," the invoicing app says
  "Error 500: Internal server error," the finance app says
  "We hit a bump in the road," and the API docs say
  "An unexpected error occurred. Please try again."

  The brand team wants "one voice" but the audiences are vastly
  different. The CRM team argues their enterprise clients would
  find casual language unprofessional. The consumer app team
  argues formal language would feel cold and corporate.

  Task: Design a voice architecture that maintains brand unity
  while allowing appropriate differentiation across products.

assertions:
  - type: llm_judge
    criteria: "Response designs a layered voice architecture — a brand voice foundation (core values, personality traits, principles that apply to ALL products — e.g., always clear, always respectful, always helpful) plus product-specific voice extensions (CRM: professional and confident, Invoicing: approachable and encouraging, Finance: warm and empowering, API: precise and efficient). Shows how the same brand value manifests differently: 'clarity' in the CRM means 'no jargon, direct language' while in the API docs it means 'precise technical terminology with examples.' Provides concrete examples of the same UI pattern (error message, empty state, success toast) written in each product's voice"
    weight: 0.35
    description: "VoiceArchitecture"
  - type: llm_judge
    criteria: "Response creates governance and consistency mechanisms — voice documentation for each product (voice chart with dimensions like formality, humor, technicality rated on a spectrum), decision framework for voice choices ('When in doubt, default to...' for each product), cross-product consistency checklist (what must be identical: legal terms, brand name usage, core value messaging; what can differ: tone, formality, humor level), and a review process to prevent voice drift. Includes voice audit methodology to periodically check consistency"
    weight: 0.35
    description: "VoiceGovernance"
  - type: llm_judge
    criteria: "Response addresses practical implementation challenges — how to handle shared components used across products (login, billing, account settings — whose voice wins?), how to manage voice when users switch between products (jarring transitions vs. smooth spectrum), how to train 4 different product teams on their specific voice, how to evolve voice as products mature (the startup-y consumer app may need to become more mature as users' finances grow), and how to resolve voice conflicts when stakeholders disagree"
    weight: 0.30
    description: "ImplementationChallenges"
