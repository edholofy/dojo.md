meta:
  id: ux-writing-team-building
  level: 4
  course: uiux-microcopy
  type: output
  description: "UX writing team building — design the structure, hiring strategy, and growth framework for a UX writing team from scratch"
  tags: [team-building, hiring, organizational-design, career-growth, expert]

state: {}

trigger: |
  You've been hired as the first Head of UX Writing at a
  Series C startup (400 employees, 60 in product/design).
  Currently, all copy is written by PMs and designers with
  no UX writing function.

  The VP of Product has approved budget for 5 UX writers over
  the next 18 months. Your mandate:

  1. Build the team from 0 to 5 writers
  2. Define the UX writing function and its place in the org
  3. Create career paths so writers don't leave after 2 years
  4. Demonstrate value quickly to justify continued investment

  Current product areas needing copy help:
  - Core platform (70% of revenue, most complex)
  - Mobile app (fastest growing, 40% of new users)
  - Enterprise features (highest revenue per user)
  - Onboarding/growth (highest impact on conversion)
  - Internal tools (lowest priority but poor usability)

  Task: Design a complete team building strategy including
  organizational structure, hiring plan, and career framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased hiring and organizational plan — Phase 1 (months 1-3): solo writer focuses on highest-impact area (onboarding/growth for visible wins), establishes foundational guidelines and patterns library. Phase 2 (months 4-9): hire writers 2-3, one for core platform and one for mobile, begin embedded model with product teams. Phase 3 (months 10-18): hire writers 4-5 for enterprise and remaining areas. Organizational model options: centralized (all writers report to Head of UX Writing), embedded (writers sit on product teams), or hybrid (dotted-line reporting). Recommends specific model with rationale"
    weight: 0.35
    description: "TeamBuildingPlan"
  - type: llm_judge
    criteria: "Response creates hiring and career frameworks — job descriptions for different levels (junior UX writer, mid UX writer, senior UX writer), interview process (portfolio review, writing exercise, cross-functional collaboration assessment), career ladder from IC track (Writer I → II → Senior → Staff → Principal) and management track (Lead → Manager → Director), skills matrix for each level (writing craft, strategic thinking, cross-functional influence, mentorship), and growth opportunities (specialization in accessibility, localization, content strategy, design systems)"
    weight: 0.35
    description: "HiringCareerFramework"
  - type: llm_judge
    criteria: "Response addresses the 'first writer' challenges — how to demonstrate value in the first 90 days (quick wins on high-visibility flows, before/after portfolio, metrics on improvements), how to build credibility with PMs and designers who've been writing copy themselves (collaborative approach, not 'you've been doing it wrong'), how to prioritize when everything needs help (impact/effort matrix for copy improvements), and how to build the case for hires 2-5 (document demand, track request volume, show coverage gaps). Includes stakeholder communication plan"
    weight: 0.30
    description: "FirstWriterChallenges"
