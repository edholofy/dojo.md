meta:
  id: content-culture-transformation
  level: 5
  course: uiux-microcopy
  type: output
  description: "Content culture transformation — transform an organization's relationship with content from afterthought to strategic priority through cultural change"
  tags: [culture, transformation, organizational-change, strategic, master]

state: {}

trigger: |
  You're a content design executive at a large enterprise
  software company (10,000 employees, $5B revenue). Content
  has historically been treated as an afterthought:

  - Engineers write user-facing copy and ship it directly
  - Product managers write marketing copy for feature launches
  - The legal team writes all compliance copy in legalese
  - Designers create "lorem ipsum" mockups and expect "someone"
    to fill in the words later
  - The CTO publicly said in an all-hands: "AI will write all
    our copy soon, we don't need more writers"
  - Customer satisfaction for "product clarity" is 2.3/5
  - 45% of support tickets are "how do I..." questions that
    good in-product guidance could prevent

  The new CPO (Chief Product Officer) believes content is
  critical and has hired you to "change the culture." You
  have executive sponsorship but no organizational authority
  over the 10,000 employees who write copy.

  Task: Design a multi-year cultural transformation strategy
  to make content-first thinking part of the company's DNA.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased cultural transformation strategy — Phase 1 (months 1-6, 'Prove It'): demonstrate value through 2-3 high-impact quick wins on the most visible product flows, quantify the cost of bad content ($X in support costs, Y% user abandonment), create a compelling 'before/after' portfolio. Phase 2 (months 7-18, 'Scale It'): launch Content Champion program (train advocates in each team), establish content quality standards, integrate content into the product development lifecycle. Phase 3 (months 19-36, 'Embed It'): content review is part of the definition of done, content thinking is in job descriptions across roles, content metrics are on product dashboards. Each phase has specific tactics, milestones, and success criteria"
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response addresses resistance and influence without authority — how to counter the CTO's 'AI will write our copy' narrative (demonstrate what AI can't do, partner rather than fight, use AI as a tool that amplifies human content design), how to change engineer behavior without mandating (make good content the easiest path: templates, linters, design system content), how to win over PMs who see content as 'just words' (show business impact data, co-create content strategy for their features), and how to elevate content from 'afterthought' to 'strategic input' (content insights that influence product decisions). Includes influence map and stakeholder strategy"
    weight: 0.35
    description: "InfluenceWithoutAuthority"
  - type: llm_judge
    criteria: "Response creates sustainable cultural mechanisms — not just training but structural change: content quality metrics in product scorecards, content review as a mandatory step in the design/dev workflow (like code review for engineers), content thinking as an interview criterion for PMs and designers, 'Content Champion' certification program with incentives, content design principles embedded in company values, and a content community of practice for knowledge sharing. Addresses measurement: how to track cultural change over time (annual content maturity assessment, employee surveys on content awareness, content quality benchmarks)"
    weight: 0.30
    description: "SustainableMechanisms"
