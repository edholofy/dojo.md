meta:
  id: master-microcopy-shift
  level: 5
  course: uiux-microcopy
  type: output
  description: "Master microcopy shift — handle a week of strategic content design leadership including board communication, crisis management, organizational transformation, and industry impact"
  tags: [shift, combined, assessment, executive-leadership, master]

state: {}

trigger: |
  You're the Chief Content Officer at a global tech company.
  This week presents simultaneous strategic challenges:

  MONDAY — BOARD CRISIS: A major data breach exposed 2 million
  users' personal information. You must lead the content response:
  breach notification emails (legally required within 72 hours
  under GDPR), in-app notifications, press statement, FAQ page,
  and support scripts. The legal team wants dry, protective
  language. The CEO wants empathetic, trust-preserving language.
  Users are furious on social media.

  WEDNESDAY — ACQUISITION ANNOUNCEMENT: The company is acquiring
  a competitor. You need to design the communication strategy
  for 3 audiences: your 8M users ("nothing changes"), the
  acquired company's 3M users ("welcome, here's what's coming"),
  and internal teams ("here's the content integration plan").

  FRIDAY — INDUSTRY KEYNOTE: You're delivering a keynote at
  Content Design Conference on "Content Design at the Speed of
  AI" to 1,000 practitioners who are anxious about their careers.

  Constraints: Each initiative has different stakeholders, timelines,
  and emotional stakes. Your content team of 30 must handle all
  three while maintaining daily product content operations.

  Task: Design your strategic response to all three challenges,
  including resource allocation, stakeholder management, and
  content strategy for each.

assertions:
  - type: llm_judge
    criteria: "Response handles the breach crisis with both legal precision and human empathy — breach notification that meets GDPR 72-hour requirement while being genuinely helpful (what happened, what data was exposed, what you're doing about it, what users should do, how to get help), multi-channel strategy (email, in-app, press, social, support), tone that balances legal protection with trust preservation (acknowledging the severity without corporate deflection, 'We failed to protect your data and we're sorry' not 'An unauthorized third party may have accessed certain information'). Addresses the legal/CEO tension: copy can be both legally sound and empathetic"
    weight: 0.35
    description: "BreachCrisis"
  - type: llm_judge
    criteria: "Response designs the acquisition communication strategy — three distinct audience strategies: existing users (reassurance, no disruption, what they gain from the acquisition), acquired users (welcome without condescension, transparent about changes, familiar feature mapping), internal teams (content integration timeline, team merger plan, unified style guide roadmap). Each communication has the right tone: confidence for existing users, warmth for acquired users, clarity for internal teams. Includes a content integration plan overview and FAQ for each audience"
    weight: 0.35
    description: "AcquisitionCommunication"
  - type: llm_judge
    criteria: "Response demonstrates executive-level resource management and thought leadership — resource allocation across 3 initiatives with a 30-person team (who leads each workstream, how to maintain BAU operations, when to bring in external support), stakeholder management across CEO/board/legal/PR/product for each initiative, and a compelling keynote outline that addresses practitioner anxiety about AI while drawing on the week's real-world examples (without disclosing confidential details). Shows the ability to operate at strategic altitude while ensuring tactical execution — the hallmark of a Chief Content Officer"
    weight: 0.30
    description: "ExecutiveLeadership"
