meta:
  id: ai-content-transformation
  level: 5
  course: uiux-microcopy
  type: output
  description: "AI content transformation — design the strategic vision for AI-augmented content design including AI writing assistants, automated content optimization, and the evolving role of human content designers"
  tags: [AI, transformation, future, strategy, automation, master]

state: {}

trigger: |
  The CEO says: "I just saw a demo where AI writes all the
  product copy in seconds. Why do we have 20 UX writers?
  Can't we use AI for everything and keep 3 writers to review?"

  You're the VP of Content Design. You need to present a
  strategic vision for AI in content design that is honest
  about AI's capabilities while defending the value of human
  content designers.

  Current reality:
  - AI can generate grammatically correct, on-brand copy
  - AI struggles with: nuanced tone shifts, cultural context,
    regulatory compliance judgment, novel metaphors, emotional
    intelligence in crisis copy, accessibility edge cases
  - Your team spends 40% of time on repetitive copy (status
    messages, form labels, standard notifications) and 60%
    on strategic/complex copy
  - Competitors are experimenting with AI-generated copy with
    mixed results (some embarrassing public failures)
  - Your writers are anxious about job security

  Task: Design the strategic vision for AI-augmented content
  design, including what AI handles, what humans handle, and
  how the team evolves.

assertions:
  - type: llm_judge
    criteria: "Response presents an honest, strategic AI vision — maps content work on a spectrum from 'AI can fully handle' to 'humans essential': AI handles: standard notifications, form labels, help text variations, translation drafts, content auditing, A/B test variant generation. AI assists: first drafts for standard flows, consistency checking, readability scoring, tone analysis. Humans lead: brand voice evolution, crisis communication, regulatory judgment, cultural adaptation, emotional design, product strategy, novel feature copy. Proposes a phased adoption plan: pilot AI on low-risk copy, measure quality, expand gradually. Addresses the CEO's question directly: reduction from 20 to 3 would lose strategic capability, but team can evolve to be 2-3x more productive with AI tools"
    weight: 0.35
    description: "AIVision"
  - type: llm_judge
    criteria: "Response designs the evolved content designer role — how the role shifts from 'writer' to 'content strategist and AI editor': new skills needed (prompt engineering, AI output quality assessment, content systems thinking, data literacy), new workflows (AI generates → human reviews/refines → AI optimizes), new team structure (content strategists who design systems and oversee AI, content engineers who build AI tools and templates, content quality managers who review AI output), and career path evolution. Includes a training and upskilling plan for current writers"
    weight: 0.35
    description: "EvolvedRole"
  - type: llm_judge
    criteria: "Response addresses risks and ethics — AI-generated copy risks (brand voice drift, subtle errors in regulated content, accessibility regression, bias in AI-generated language, loss of human empathy in error messages), quality assurance for AI output (automated checks, sampling review process, user feedback loops), ethical considerations (transparency about AI-generated vs. human-written copy, accountability for AI copy errors), and team morale management (honest communication about the future, involvement in the AI strategy, emphasis on growing skills rather than being replaced). Includes specific failure scenarios from competitors as cautionary examples"
    weight: 0.30
    description: "RisksAndEthics"
