meta:
  id: content-strategy-executive
  level: 5
  course: uiux-microcopy
  type: output
  description: "Content strategy executive — present content design strategy to C-suite executives and board members to secure investment and organizational commitment"
  tags: [executive, C-suite, strategy, investment, master]

state: {}

trigger: |
  You're the VP of Content Design at a public tech company
  ($2B revenue, 5,000 employees). The CEO has asked you to
  present to the board of directors on "why content design
  matters" after a competitor's rebrand with superior copy
  generated significant positive press coverage.

  Context:
  - Your team: 25 content designers across 6 product lines
  - Annual budget: $4.5M (headcount + tools)
  - Board is skeptical: "Writing is writing. Why do we need
    25 people for this?"
  - Your company's NPS is 32 (competitor with great copy: 67)
  - Support costs: $18M/year, 40% of tickets are "I don't
    understand how to do X" or "What does this mean?"
  - Onboarding completion rate: 34% (industry average: 52%)
  - Brand perception study: users describe your product as
    "powerful but confusing" vs. competitor's "intuitive"

  The board will decide whether to expand your team to 40 or
  cut to 15. Your presentation is 20 minutes with 10 minutes
  for questions.

  Task: Design the board presentation strategy, key arguments,
  and data narrative for securing content design investment.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling executive narrative — frames content design as a revenue and cost lever, not a creative function. Key arguments: 1) Cost reduction: 40% of $18M support costs ($7.2M) driven by confusing copy, content improvements could reduce this by 50% ($3.6M savings > $4.5M budget). 2) Revenue impact: 34% onboarding completion means 66% of new users don't activate, improving to industry average (52%) = 53% more activated users. 3) Competitive differentiation: NPS gap (32 vs 67) correlates with product clarity. 4) Brand value: 'powerful but confusing' is a solvable problem. Structures the 20-minute presentation with a clear arc: problem → evidence → strategy → investment ask → expected returns"
    weight: 0.35
    description: "ExecutiveNarrative"
  - type: llm_judge
    criteria: "Response presents data in board-appropriate format — translates UX metrics into financial language (not 'readability scores' but 'projected support cost reduction'), benchmarks against competitors and industry standards, shows ROI calculations (investment of $X in team expansion yields $Y in support savings + $Z in revenue from improved conversion), includes a 3-year roadmap with milestones and measurable outcomes, and anticipates board questions ('Why can't AI do this?', 'Why not outsource?', 'What's the competitive moat?'). Provides clear before/after examples that even non-product board members can understand"
    weight: 0.35
    description: "BoardDataPresentation"
  - type: llm_judge
    criteria: "Response addresses the political and strategic dimensions — how to handle the skepticism ('writing is writing'): demonstrate the difference between commodity writing and strategic content design with concrete examples, position content design alongside product design and engineering as a product quality function. Includes risk framing: what happens if the team is cut to 15 (regression in product quality, increased support costs, competitive disadvantage). Proposes a phased expansion plan with checkpoints rather than asking for all 40 headcount at once. Addresses the AI question proactively: how AI augments but doesn't replace content design"
    weight: 0.30
    description: "PoliticalStrategy"
