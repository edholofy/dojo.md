meta:
  id: content-acquisition-integration
  level: 5
  course: uiux-microcopy
  type: output
  description: "Content acquisition integration — lead content design through a major acquisition including brand unification, product consolidation, and team integration"
  tags: [M&A, acquisition, integration, brand-unification, master]

state: {}

trigger: |
  Your company (ProductA, 5M users, enterprise-focused, formal
  professional voice) just acquired a competitor (ProductB, 2M
  users, SMB-focused, casual friendly voice). The CEO announces:
  "We're merging both products into one unified platform within
  18 months."

  Content challenges:

  1. BRAND & VOICE: ProductA says "Configure your workspace
     preferences" while ProductB says "Set up your stuff the
     way you like it." Both user bases love their product's voice.

  2. TERMINOLOGY: The same concept has different names:
     - ProductA: "Organizations" / ProductB: "Teams"
     - ProductA: "Workflows" / ProductB: "Automations"
     - ProductA: "Enterprise Dashboard" / ProductB: "Home"

  3. USERS: ProductA users are enterprise IT admins who expect
     precision. ProductB users are small business owners who
     expect simplicity. Both will use the unified product.

  4. TEAMS: ProductA has 8 UX writers with detailed style
     guides. ProductB has 2 "content people" (one marketer,
     one PM who writes copy) with no documentation.

  5. MIGRATION: 2M ProductB users need to be migrated to the
     new platform without feeling like their product was killed.

  Task: Design the content integration strategy for the
  product merger.

assertions:
  - type: llm_judge
    criteria: "Response designs a content integration strategy — voice unification approach (not just picking one voice but creating a new unified voice that incorporates strengths of both: ProductA's clarity and precision + ProductB's warmth and approachability), terminology mapping and migration plan (which terms win, how to transition users from old terms to new ones, handling the period of dual terminology), and content audit of both products (inventory all copy, identify conflicts, plan resolution). Addresses the migration communication strategy: how to tell ProductB users their product is changing without it feeling like a hostile takeover ('You're joining ProductA' vs. 'We're building something new together')"
    weight: 0.35
    description: "IntegrationStrategy"
  - type: llm_judge
    criteria: "Response handles the user audience challenge — designing copy that works for both enterprise IT admins and small business owners (progressive disclosure, role-based copy adaptation, terminology options with learning curve support), migration onboarding for ProductB users (familiar feature mapping: 'Your Teams are now called Organizations — everything works the same way'), documentation for the transition period (glossary of changed terms, FAQ for common questions), and measurement of migration success (adoption metrics by user segment, support ticket monitoring, satisfaction tracking for both user bases)"
    weight: 0.35
    description: "AudienceUnification"
  - type: llm_judge
    criteria: "Response addresses team integration and organizational change — how to merge 8 writers + 2 content people into one team (skills assessment, role definition, knowledge transfer from both sides), how to preserve institutional knowledge from both products (documentation sprint, cross-training), how to handle the power dynamics (acquired team may feel subordinate), how to create a unified style guide that respects both legacies, and timeline with milestones for the 18-month content integration (Month 1-3: audit and strategy, Month 4-9: migration copy and unified guidelines, Month 10-18: full unification and optimization). Includes risk mitigation for user churn during migration"
    weight: 0.30
    description: "TeamIntegration"
