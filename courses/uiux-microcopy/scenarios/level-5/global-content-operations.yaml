meta:
  id: global-content-operations
  level: 5
  course: uiux-microcopy
  type: output
  description: "Global content operations — design and lead content operations for a multinational product serving 50+ markets with diverse languages, cultures, and regulatory requirements"
  tags: [global, operations, multinational, localization, regulatory, master]

state: {}

trigger: |
  You're the Global Head of Content Design at a fintech company
  operating in 52 countries with products in 31 languages. Your
  organization:

  - Central content team: 15 content designers (HQ in San Francisco)
  - Regional content leads: 4 (EMEA in London, APAC in Singapore,
    LATAM in São Paulo, MENA in Dubai)
  - Local content partners: 20+ freelancers and agency relationships
  - Total strings in the product: 45,000
  - Monthly string changes: ~800 new/modified strings
  - Regulatory requirements: different financial disclosures in
    each country, GDPR in EU, LGPD in Brazil, PDPA in Singapore

  Current crisis:
  - Japan launch failed because the copy was "too direct" —
    Japanese users found the tone rude (e.g., "Enter your
    information" should be more deferential)
  - Germany's BaFin regulator flagged 12 compliance violations
    in the German copy that didn't exist in the English source
  - LATAM team discovered that Mexican Spanish and Argentine
    Spanish users interpret the same financial terms differently
  - Arabic and Hebrew RTL layouts broke 30% of the UI copy

  The CEO says: "We can't have localization failures costing us
  market launches. Fix the global content operation."

  Task: Design the global content operations model that ensures
  quality, cultural appropriateness, and regulatory compliance
  across all 52 markets.

assertions:
  - type: llm_judge
    criteria: "Response designs a hub-and-spoke content operations model — central team owns: source content strategy, global voice and tone framework, content operations infrastructure, quality standards and metrics, regulatory content templates. Regional leads own: cultural adaptation strategy, local regulatory compliance, regional vendor management, market-specific style guides, in-market quality assurance. Defines clear RACI for content decisions: what's decided centrally (brand voice principles, product terminology) vs. regionally (tone adaptation, cultural references, regulatory wording). Addresses the specific failures: Japan (cultural tone calibration process), Germany (regulatory review workflow), LATAM (dialect management), RTL (technical content architecture)"
    weight: 0.35
    description: "GlobalOperationsModel"
  - type: llm_judge
    criteria: "Response creates a regulatory content compliance framework — maps regulatory requirements by region (financial disclosures, data privacy notices, consumer protection language), creates a regulatory content database (which copy is regulated in which market, who reviews it, update cadence), designs the review workflow (content change → regulatory impact assessment → local legal review → compliance sign-off → publish), and establishes a regulatory monitoring process (tracking regulation changes across 52 markets, proactive content updates). Addresses the BaFin incident: how translation introduced compliance violations and how to prevent it"
    weight: 0.35
    description: "RegulatoryCompliance"
  - type: llm_judge
    criteria: "Response addresses cultural content quality at scale — cultural calibration process (not just translation but cultural adaptation review by in-market experts), dialect management strategy (which Spanish, which Portuguese, which Chinese to use and when), tone calibration framework (how formality, directness, humor, and deference vary by culture), and quality metrics by market (cultural appropriateness scores, user satisfaction by market, regulatory compliance rates). Includes a crisis response playbook for when localization failures occur in new markets and a pre-launch cultural review checklist"
    weight: 0.30
    description: "CulturalQuality"
