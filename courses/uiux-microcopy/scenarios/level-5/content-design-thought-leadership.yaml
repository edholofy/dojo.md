meta:
  id: content-design-thought-leadership
  level: 5
  course: uiux-microcopy
  type: output
  description: "Content design thought leadership — establish industry thought leadership through publishing, speaking, and community building to advance the content design discipline"
  tags: [thought-leadership, publishing, speaking, community, master]

state: {}

trigger: |
  You're a recognized content design leader. A major UX
  conference has invited you to give a 45-minute keynote on
  "The Future of Content Design." The audience is 500 content
  designers, UX writers, and design leaders.

  The conference organizer says: "We want something provocative.
  The last 3 content design talks were all 'here's how to write
  better error messages.' Give us a vision for where the
  discipline is going and what content designers need to do
  to stay relevant."

  Context for your talk:
  - AI writing tools are getting better rapidly
  - Content design teams are being cut at some companies
  - The discipline is still young (most teams < 5 years old)
  - There's a gap between "UX writing" (tactical) and "content
    strategy" (strategic) with no clear career bridge
  - Most content designers can't quantify their impact
  - Design systems are maturing but content systems lag behind
  - Many content designers feel undervalued and misunderstood

  Task: Design the keynote talk including thesis, narrative
  arc, key arguments, and actionable takeaways for the audience.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling keynote with a clear thesis — provocative central argument (e.g., 'Content design must evolve from wordsmithing to systems thinking or it will be automated away'), structured narrative arc (opening hook → problem statement → evidence → vision → call to action), key arguments supported by industry data and trends, and memorable takeaways. The talk should be specific and opinionated, not generic platitudes. Includes speaker notes or talk structure with timing for the 45-minute format (opening: 5 min, sections: 30 min, Q&A prep: 10 min)"
    weight: 0.35
    description: "KeynoteDesign"
  - type: llm_judge
    criteria: "Response addresses the future of the discipline substantively — where content design is going (from individual screens to content systems, from writing to designing with words, from reactive to proactive, from craft to strategy), what new skills content designers need (data literacy, systems thinking, AI collaboration, business acumen, technical skills), how the relationship between content design and AI evolves (augmentation not replacement, new workflow models), and what organizational changes are needed (content design as a product function, not a support function). Addresses the career bridge between UX writing and content strategy"
    weight: 0.35
    description: "DisciplineFuture"
  - type: llm_judge
    criteria: "Response provides actionable guidance for the audience — not just 'think bigger' but specific actions: how to build a measurement practice (start with these 3 metrics), how to learn systems thinking (these resources and exercises), how to position yourself for the evolving role (skills to develop this year), how to advocate for content design within organizations (talking points for executive conversations), and how to contribute to the discipline's growth (open-source content systems, community teaching, publishing). Addresses the emotional dimension: many in the audience feel anxious about AI and undervalued — the talk should be empowering and forward-looking"
    weight: 0.30
    description: "ActionableGuidance"
