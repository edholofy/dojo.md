meta:
  id: regulatory-content-compliance
  level: 5
  course: uiux-microcopy
  type: output
  description: "Regulatory content compliance — design content strategy for heavily regulated industries where copy must satisfy both user experience and legal/regulatory requirements"
  tags: [regulatory, compliance, legal, healthcare, finance, master]

state: {}

trigger: |
  You're advising a digital health company that offers
  telemedicine, prescription management, and health tracking.
  They're expanding into the EU and need to comply with:

  - HIPAA (US health data privacy)
  - GDPR (EU data protection)
  - EU MDR (Medical Device Regulation — the health tracking
    features may classify as a medical device)
  - FDA digital health guidelines (US)
  - Accessibility: WCAG 2.2 AA + Section 508

  Current content problems:
  1. Consent flows: 47 different consent screens with
     inconsistent language. Users click through without reading.
     Regulators say consent must be "freely given, specific,
     informed, and unambiguous."

  2. Health disclaimers: "This is not medical advice" appears
     300+ times in the app, often in inappropriate contexts
     (e.g., on a page showing the user's own lab results).

  3. Data transparency: Users can't understand what health
     data is collected, how it's used, who sees it, and how
     to delete it. Current privacy policy is 14,000 words.

  4. Clinical content: Drug interaction warnings use medical
     jargon that 80% of users don't understand, but the
     FDA requires specific medical terminology.

  Task: Design a content strategy that satisfies all regulatory
  requirements while maintaining excellent user experience.

assertions:
  - type: llm_judge
    criteria: "Response designs a regulatory content architecture — layered consent model (contextual consent at point of data collection, not 47 separate screens), progressive disclosure for regulatory information (summary → details → full legal text), smart disclaimer placement (only where clinically/legally necessary, not blanket coverage), and plain language regulatory writing (GDPR requires 'clear and plain language' — this aligns with UX goals). Creates content templates for each regulatory requirement: consent requests, data collection notices, health disclaimers, privacy information. Shows how to consolidate 47 consent screens into a streamlined, compliant flow"
    weight: 0.35
    description: "RegulatoryArchitecture"
  - type: llm_judge
    criteria: "Response solves the clinical content challenge — how to communicate drug interaction warnings in plain language while satisfying FDA requirements (bilingual approach: plain language explanation + regulatory-required medical terminology, with contextual help for medical terms), how to make the 14,000-word privacy policy accessible (layered privacy design: one-page summary → section summaries → full legal text, with a 'How we use your health data' visual guide), and how to handle cross-jurisdictional conflicts (when HIPAA and GDPR requirements differ, how to create copy that satisfies both). Includes readability standards for health content (health literacy: grade 6-8 reading level per NIH guidelines)"
    weight: 0.35
    description: "ClinicalContentStrategy"
  - type: llm_judge
    criteria: "Response addresses governance and ongoing compliance — regulatory content review workflow (clinical content reviewed by medical professionals, legal content reviewed by legal team, UX team ensures readability), regulatory change monitoring (how to update content when regulations change), audit preparation (content registry mapping every regulated string to its regulatory requirement), accessibility compliance plan (WCAG 2.2 AA for all health content, screen reader compatibility for clinical information, cognitive accessibility for health-anxious users), and user testing plan for regulatory content (can users actually understand consent requests, do they know what data is collected). Includes a RACI matrix for regulatory content decisions"
    weight: 0.30
    description: "GovernanceCompliance"
