meta:
  id: content-maturity-model
  level: 5
  course: uiux-microcopy
  type: output
  description: "Content maturity model — assess and advance an organization's content design maturity from ad-hoc to strategic across people, process, and technology dimensions"
  tags: [maturity-model, organizational-assessment, transformation, master]

state: {}

trigger: |
  You're a content design consultant hired by a Fortune 500
  financial services company to assess their "content maturity"
  and create a transformation roadmap. Initial findings:

  People:
  - 8 UX writers scattered across 4 business units with no
    central leadership
  - Writers report to different VPs (Marketing, Product, Design,
    Engineering) with conflicting priorities
  - No career ladder: all writers are "Content Specialist" with
    no growth path
  - 200+ non-writers (PMs, designers, engineers) write customer-
    facing copy daily

  Process:
  - No content strategy or style guide
  - Each business unit has different terminology for the same
    concepts (one says "account," another says "portfolio")
  - Copy review is optional and inconsistent
  - Regulatory content (disclosures, terms) managed separately
    by legal with no UX input
  - No content metrics tracked

  Technology:
  - Copy lives in code repositories with no content layer
  - No translation management system (5 languages managed
    via spreadsheets)
  - No content analytics beyond page views

  Task: Create a content maturity assessment framework and
  a multi-year transformation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive maturity model — defines 5 maturity levels across dimensions (people, process, technology, strategy, measurement): Level 1 (Ad-hoc): no standards, copy by whoever's available. Level 2 (Emerging): basic guidelines exist, some dedicated writers. Level 3 (Defined): centralized team, style guide, consistent voice, content in design process. Level 4 (Managed): content operations, metrics-driven, localization program, design system integration. Level 5 (Optimizing): content as strategic differentiator, AI-augmented, predictive content optimization, industry leadership. Assesses the current company at each dimension with evidence from the findings"
    weight: 0.35
    description: "MaturityFramework"
  - type: llm_judge
    criteria: "Response designs a multi-year transformation roadmap — Year 1: foundation (centralize writers under one leader, create style guide, establish content review process, quick wins on highest-impact flows). Year 2: operationalize (content ops tooling, localization system, content patterns library, metrics dashboard, training program). Year 3: optimize (AI augmentation, predictive content, content as product differentiator, thought leadership). Each phase has specific milestones, resource requirements, dependencies, and success metrics. Includes a business case for each phase showing expected ROI"
    weight: 0.35
    description: "TransformationRoadmap"
  - type: llm_judge
    criteria: "Response addresses organizational change management — how to unify 8 writers under one leader across 4 business units (organizational design options, reporting structure), how to navigate the political dynamics of centralizing a distributed function (VP stakeholder management), how to change the culture from 'anyone can write' to 'content is a discipline' without alienating PMs and engineers, and how to handle the regulatory content gap (partnering with legal to improve disclosures without overstepping). Includes a stakeholder influence map and communication plan for the transformation"
    weight: 0.30
    description: "ChangeManagement"
