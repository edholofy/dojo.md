meta:
  id: onboarding-copy
  level: 1
  course: uiux-microcopy
  type: output
  description: "Onboarding copy — write welcome screens, setup flows, and progressive disclosure copy that guides new users to their first success"
  tags: [onboarding, welcome, setup, progressive-disclosure, basics]

state: {}

trigger: |
  A junior UX writer says: "Our SaaS app has a 5-step onboarding
  flow but only 30% of signups complete it. The current copy:

  Step 1: 'Welcome to AppName. Let's get started.'
  Step 2: 'Set up your profile' (15 required fields)
  Step 3: 'Configure your workspace settings'
  Step 4: 'Import your data'
  Step 5: 'Invite your team'

  Users drop off heavily at Step 2 (too many fields) and Step 4
  (data import is confusing). The copy doesn't explain why each
  step matters or what benefit the user gets.

  How do I rewrite the onboarding copy to improve completion?"

  Task: Rewrite the onboarding flow copy, address the drop-off
  points, and provide principles for effective onboarding copy.

assertions:
  - type: llm_judge
    criteria: "Response rewrites the onboarding copy with motivation and clarity — each step should explain the benefit: 'Set up your profile' → 'Tell us a bit about yourself so we can personalize your experience (takes 30 seconds)'. Addresses the Step 2 drop-off by suggesting reducing required fields (only ask what's essential now, get the rest later). Addresses Step 4 by breaking import into manageable chunks with clear instructions and a skip option. Each step should feel valuable, not like homework. Adds progress indicators ('Step 2 of 5') and estimated time"
    weight: 0.35
    description: "OnboardingRewrites"
  - type: llm_judge
    criteria: "Response provides onboarding copy principles — show the value before asking for effort (explain why before asking what), minimize friction (only collect what's absolutely necessary at each step, defer everything else), use progressive disclosure (don't overwhelm with information — reveal complexity gradually), always provide a skip/later option for non-essential steps, celebrate completion ('You're all set!' with what they can do now), and set expectations (how many steps, how long each takes)"
    weight: 0.35
    description: "OnboardingPrinciples"
  - type: llm_judge
    criteria: "Response addresses the psychology of onboarding — the 'aha moment' concept (get users to experience core value as fast as possible), reducing cognitive load (simple language, one task per screen, clear next action), building momentum (easy steps first to create a sense of progress), and handling the cold start problem (the app is empty and unfamiliar — use sample data, templates, or guided tours to show value before the user has created anything)"
    weight: 0.30
    description: "OnboardingPsychology"
