meta:
  id: tone-and-voice-basics
  level: 1
  course: uiux-microcopy
  type: output
  description: "Tone and voice basics — understand how brand voice applies to interface copy and how to adjust tone for different contexts"
  tags: [tone, voice, brand, personality, consistency, basics]

state: {}

trigger: |
  A junior UX writer says: "Our brand guidelines say we should be
  'friendly, professional, and empowering.' But I'm not sure how
  to apply that to interface copy. Is the error message supposed
  to be friendly? Is the legal consent text supposed to be
  empowering?

  Also, different parts of our app feel like they were written by
  different people — the marketing page is playful, the dashboard
  is robotic, the settings page is overly formal, and the help
  center uses different terminology than the app itself.

  How do I create consistency in our app's voice while adjusting
  tone for different contexts?"

  Task: Explain voice vs tone, show how to apply brand voice
  to different UI contexts, and provide guidelines for consistent
  but contextually appropriate copy.

assertions:
  - type: llm_judge
    criteria: "Response explains voice vs tone clearly — voice is the consistent personality (always friendly, professional, empowering), tone adjusts based on context (celebratory for success, empathetic for errors, neutral for system messages, reassuring for security). Uses a helpful analogy (voice is your personality, tone is how you express it depending on the situation — you're the same person at a party and a funeral, but your tone is different). Shows how 'friendly, professional, empowering' manifests differently: success message (warm and encouraging), error message (empathetic and helpful), settings (clear and efficient)"
    weight: 0.35
    description: "VoiceVsTone"
  - type: llm_judge
    criteria: "Response provides context-appropriate examples — shows the same brand voice applied across contexts: onboarding (warm, encouraging: 'Welcome! Let's set up your workspace in just a few steps.'), error state (empathetic, helpful: 'We hit a snag loading your data. Let's try refreshing the page.'), confirmation dialog (clear, respectful: 'This will remove Sarah from your team. She can be re-invited anytime.'), settings page (efficient, informative: 'Email notifications — Choose when you'd like to hear from us.'). Each example feels like the same brand but with appropriate emotional calibration"
    weight: 0.35
    description: "ContextualExamples"
  - type: llm_judge
    criteria: "Response addresses the consistency problem — create a terminology list (one word for each concept: 'project' not sometimes 'project' and sometimes 'workspace'), establish copy patterns (all error messages follow the same structure, all buttons use the same format), create a simple voice chart (columns: this, not this — 'friendly, not cutesy', 'professional, not stiff'), and explain that consistency comes from shared guidelines and review, not from one person writing everything"
    weight: 0.30
    description: "ConsistencyGuidelines"
