meta:
  id: button-and-cta-copy
  level: 1
  course: uiux-microcopy
  type: output
  description: "Button and CTA copy — write clear, action-oriented button labels that tell users exactly what will happen when they click"
  tags: [buttons, CTA, labels, action-copy, basics]

state: {}

trigger: |
  A junior UX writer says: "I'm reviewing our app and all the
  buttons say generic things like 'Submit', 'OK', 'Continue',
  'Click here', and 'Yes/No'. The product manager says our
  conversion rate on the signup flow is low, partly because users
  don't feel confident about what happens when they click buttons.

  Here are the specific screens:

  1. Signup form → button says 'Submit'
  2. Subscription upgrade page → button says 'Continue'
  3. Delete account confirmation → buttons say 'Yes' and 'No'
  4. File upload → button says 'OK'
  5. Newsletter signup → button says 'Click here'

  How do I write better button labels?"

  Task: Rewrite each button label and provide principles for
  writing effective CTA and button copy.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each button label with specific, action-oriented alternatives — 'Submit' → 'Create my account' or 'Sign up free' (describes the outcome), 'Continue' → 'Upgrade to Pro — $29/mo' or 'Start my Pro trial' (makes the action and commitment clear), 'Yes/No' → 'Delete my account' / 'Keep my account' (describes the specific consequences), 'OK' → 'Upload file' or 'Upload photo' (describes what happens), 'Click here' → 'Subscribe to weekly updates' (describes the value)"
    weight: 0.35
    description: "ButtonRewrites"
  - type: llm_judge
    criteria: "Response provides button copy principles — use verbs that describe the action (not 'Submit' but 'Send message'), match the button text to the user's intent (not what the system does but what the user wants to accomplish), be specific about consequences (especially for destructive or commitment actions), use first person for personal actions ('Create my account' vs 'Create account' — both work, explain the difference in feel), keep labels short (2-5 words), and use sentence case (not ALL CAPS unless it's brand style)"
    weight: 0.35
    description: "ButtonPrinciples"
  - type: llm_judge
    criteria: "Response covers CTA best practices — primary vs secondary button distinction (one clear primary action per screen), how button copy affects conversion (specific labels outperform generic ones in A/B tests), creating urgency without being manipulative ('Start free trial' vs 'Don't miss out!!!'), the importance of the button in the context of surrounding copy (the button completes a sentence or thought on the page), and common button copy anti-patterns to avoid (ambiguous labels, double negatives like 'Don't cancel', using 'Click here' which adds no meaning)"
    weight: 0.30
    description: "CTABestPractices"
