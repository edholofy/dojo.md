meta:
  id: success-and-feedback-messages
  level: 1
  course: uiux-microcopy
  type: output
  description: "Success and feedback messages — write confirmation, success, and progress feedback that reassures users and guides next steps"
  tags: [success-messages, feedback, notifications, loading-states, basics]

state: {}

trigger: |
  A junior UX writer says: "Our app gives almost no positive
  feedback. When users complete actions, they see either nothing
  (the page just refreshes) or a generic 'Success!' toast that
  disappears in 2 seconds.

  Specific issues:
  1. After creating a project: nothing happens, user wonders if
     it worked
  2. After sending an invoice: 'Success!' (but to whom? what now?)
  3. During file upload (5 minutes): no progress indication, just
     a spinner
  4. After completing a complex setup: 'Configuration saved' (but
     did they set it up correctly? what should they do next?)
  5. After deleting something: no confirmation that it was deleted

  How do I write feedback that reassures users and keeps them
  moving forward?"

  Task: Write success and feedback messages for each scenario,
  and provide principles for effective user feedback copy.

assertions:
  - type: llm_judge
    criteria: "Response writes effective feedback for each scenario — project created: 'Project [Name] created! Add your first task to get started.' with a CTA. Invoice sent: 'Invoice #1234 sent to [client name] at [email]. They'll receive it within a few minutes.' with 'View invoice' link. File upload: progress indicator with percentage, file name, and estimated time remaining ('Uploading report.pdf — 45% complete, about 2 minutes remaining'). Setup complete: 'Your workspace is ready! Here's what you can do now...' with guided next steps. Deletion: 'Project deleted. Undo' (with a brief undo window)"
    weight: 0.35
    description: "FeedbackMessages"
  - type: llm_judge
    criteria: "Response provides feedback principles — every significant user action deserves acknowledgment, success messages should confirm what happened (specific, not generic 'Success!'), suggest what to do next (keep the user moving forward), provide context (names, numbers, details that confirm the right thing happened), and match the tone to the significance of the action (completing onboarding deserves celebration, saving a setting is routine). Addresses timing: feedback should be immediate, persistent enough to read, but not blocking"
    weight: 0.35
    description: "FeedbackPrinciples"
  - type: llm_judge
    criteria: "Response covers different feedback types — immediate confirmation (toast/banner after action), progress feedback (upload/processing with percentage and estimated time), status updates (email sent, payment processing, order shipped), error recovery confirmation (item restored, password changed), and celebratory moments (onboarding complete, milestone reached). Explains when each type is appropriate and how long feedback should persist"
    weight: 0.30
    description: "FeedbackTypes"
