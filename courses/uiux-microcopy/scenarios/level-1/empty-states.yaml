meta:
  id: empty-states
  level: 1
  course: uiux-microcopy
  type: output
  description: "Empty states — write encouraging, helpful copy for zero-data screens that guide users toward their first action"
  tags: [empty-states, zero-data, onboarding, first-use, basics]

state: {}

trigger: |
  A junior UX writer says: "When new users open our project
  management app, they see a lot of empty screens with no
  guidance. Here are the current empty states:

  1. Dashboard: 'No projects'
  2. Task list: 'No tasks found'
  3. Team page: 'No team members'
  4. Messages: 'No messages'
  5. Search results: 'No results'

  New users open the app, see 'No projects', and don't know what
  to do next. Our Day-1 retention is only 20%.

  How do I write empty states that encourage users to take their
  first action?"

  Task: Rewrite each empty state with encouraging, actionable copy
  and explain the principles of effective empty state design.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each empty state to be encouraging and actionable — 'No projects' → something like 'Ready to get organized? Create your first project to start tracking tasks and deadlines.' with a prominent 'Create project' button. 'No tasks' → 'Your to-do list is clear! Add tasks to keep track of what needs to get done.' 'No team members' → 'Collaborate with your team — invite members to work on projects together.' 'No messages' → 'Start a conversation with your team. Messages keep everyone in the loop.' 'No results' → 'No results for \"xyz\". Try different keywords or browse categories.' Each rewrite includes a clear call-to-action"
    weight: 0.35
    description: "EmptyStateRewrites"
  - type: llm_judge
    criteria: "Response explains empty state design principles — every empty state should answer three questions: 1) What is this screen for? (explain the feature's value), 2) Why is it empty? (it's your first time, or you haven't added anything yet), 3) What should I do now? (clear CTA to take the first action). Distinguishes between first-use empty states (encouraging, educational) vs cleared empty states (congratulatory or action-oriented) vs no-results empty states (helpful alternatives)"
    weight: 0.35
    description: "EmptyStatePrinciples"
  - type: llm_judge
    criteria: "Response covers the strategic importance of empty states — empty states are the first impression for new users and directly impact activation and retention, they're a teaching opportunity (show users what the feature does before they've used it), they can incorporate visual design (illustrations, icons) alongside copy to create a welcoming experience, and they should avoid negative or discouraging language ('nothing here' → 'ready to get started')"
    weight: 0.30
    description: "StrategicImportance"
