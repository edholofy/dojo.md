meta:
  id: what-is-microcopy
  level: 1
  course: uiux-microcopy
  type: output
  description: "Microcopy fundamentals — understand what microcopy is, where it appears in interfaces, and why small words have outsized impact on user experience"
  tags: [microcopy, fundamentals, introduction, UX-writing, basics]

state: {}

trigger: |
  A junior product designer says: "My PM keeps saying our app needs
  'better microcopy' but I'm not sure what that means. I write the
  labels on buttons and the text in error messages — is that microcopy?

  Can you explain what microcopy is, where it appears in a typical
  app, and why it matters so much? I'd love to see examples of
  good vs bad microcopy."

  Task: Explain microcopy fundamentals, identify where it appears
  in interfaces, and provide before/after examples showing the
  impact of good microcopy on user experience.

assertions:
  - type: llm_judge
    criteria: "Response clearly defines microcopy — the small pieces of text throughout an interface that guide users, provide feedback, and reduce friction. Identifies key locations: button labels ('Submit' vs 'Create account'), error messages ('Error 422' vs 'That email is already registered'), empty states ('No data' vs 'No messages yet — start a conversation!'), tooltips, placeholder text, confirmation dialogs ('Are you sure?' vs 'Delete this project? This can't be undone'), loading states, success messages, navigation labels. Explains that microcopy is different from content/marketing copy — it's functional, contextual, and action-oriented"
    weight: 0.35
    description: "MicrocopyDefinition"
  - type: llm_judge
    criteria: "Response provides compelling before/after examples — at least 4-5 examples showing bad vs good microcopy with explanation of why the good version is better. Examples like: button 'Submit' → 'Place order' (specific action), error 'Invalid input' → 'Please enter a valid email address (e.g., name@example.com)' (helpful and specific), empty state 'No results' → 'No results for \"xyz\". Try different keywords or check for typos' (actionable), confirmation 'OK/Cancel' → 'Delete permanently / Keep project' (clear consequences)"
    weight: 0.35
    description: "BeforeAfterExamples"
  - type: llm_judge
    criteria: "Response explains why microcopy matters — reduces user errors (clear labels prevent mistakes), reduces support tickets (helpful error messages let users self-serve), increases conversion (better CTA copy drives more actions), builds trust (clear confirmation dialogs prevent anxiety), and shapes brand perception (even small words carry tone and personality). Mentions that microcopy is often the difference between a user completing a task or abandoning it"
    weight: 0.30
    description: "WhyItMatters"
