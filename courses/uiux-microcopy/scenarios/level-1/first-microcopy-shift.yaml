meta:
  id: first-microcopy-shift
  level: 1
  course: uiux-microcopy
  type: output
  description: "First microcopy shift — review and rewrite the copy for a complete user flow, applying all microcopy fundamentals"
  tags: [shift, combined, assessment, review, basics]

state: {}

trigger: |
  You're a junior UX writer on your first day. Your manager gives
  you a task: "Review and rewrite the copy for our password reset
  flow. Users are struggling with it — 35% abandon the flow and
  call support instead."

  The current flow:

  Screen 1: 'Forgot Password'
  - Label: 'Email'
  - Placeholder: 'Enter email'
  - Button: 'Submit'
  - Error: 'User not found'

  Screen 2: 'Check Your Email'
  - Body: 'An email has been sent.'

  Screen 3: 'Reset Password' (from email link)
  - Label: 'New Password'
  - Label: 'Confirm Password'
  - No requirements shown
  - Button: 'Submit'
  - Error: 'Passwords do not match'
  - Error: 'Password too weak'

  Screen 4: 'Success'
  - Body: 'Your password has been changed.'
  - No CTA

  Task: Rewrite the entire password reset flow with user-centered
  copy, addressing every label, message, and button across all
  four screens.

assertions:
  - type: llm_judge
    criteria: "Response rewrites every screen comprehensively — Screen 1: friendlier title ('Reset your password'), helpful label ('Email address'), meaningful placeholder ('you@example.com'), specific button ('Send reset link'), helpful error ('We couldn't find an account with that email. Check the address or create a new account.'). Screen 2: specific confirmation ('We sent a reset link to [email]. Check your inbox — it may take a minute to arrive. Didn't get it? [Resend]'). Screen 3: clear requirements shown upfront (8+ characters, etc.), helpful match error ('Passwords don't match — try re-entering your new password'). Screen 4: clear confirmation with CTA ('Password updated! Sign in with your new password.' [Sign in])"
    weight: 0.35
    description: "FlowRewrite"
  - type: llm_judge
    criteria: "Response addresses the user experience holistically — the flow should reduce anxiety (users are already frustrated when they've forgotten their password), provide clear progress (step indicators or reassuring copy), handle edge cases (what if the email takes a while? what if the link expires? what if they're on a different device?), and minimize friction (auto-focus on the email field, show password requirements before the user types, allow password visibility toggle). Considers the emotional state of the user at each step"
    weight: 0.35
    description: "HolisticUX"
  - type: llm_judge
    criteria: "Response applies microcopy fundamentals learned in this level — specific button labels (not 'Submit'), helpful error messages (what went wrong + how to fix), tone appropriate to context (empathetic and reassuring for a frustrated user), form copy best practices (clear labels, helpful placeholders, visible requirements), and feedback/success messages that guide the next step. Demonstrates understanding of how all the microcopy components work together in a complete flow"
    weight: 0.30
    description: "FundamentalsApplied"
