meta:
  id: form-copy-fundamentals
  level: 1
  course: uiux-microcopy
  type: output
  description: "Form copy fundamentals — write effective form labels, placeholder text, help text, and inline validation messages"
  tags: [forms, labels, placeholders, help-text, validation, basics]

state: {}

trigger: |
  A junior UX writer says: "Our checkout form has a 45% abandonment
  rate and users frequently enter wrong information. The form has:

  Label: 'Name' (but users put their full name, first name, or
  username — we need their legal first and last name)

  Placeholder: 'Enter your address' (disappears when they start
  typing, so they forget what format we need)

  No help text for the phone field (users from 12 countries enter
  phone numbers in different formats and many fail validation)

  Validation message: 'Invalid' (appears in red next to the CVV
  field with no explanation of what's wrong)

  How do I write form copy that reduces errors and abandonment?"

  Task: Rewrite the form copy for each field and provide best
  practices for labels, placeholders, help text, and validation.

assertions:
  - type: llm_judge
    criteria: "Response fixes each form copy issue — Name: split into 'First name' and 'Last name' with clear labels (or 'Legal first name' if that distinction matters), don't use a single 'Name' field for structured data. Address: use persistent help text instead of placeholder (e.g., 'Street address, apartment, suite, unit'), consider auto-complete. Phone: add help text showing expected format with country code example ('+1 (555) 123-4567'), or better yet use a phone input component with country selector. CVV: change 'Invalid' to 'Enter the 3-digit code on the back of your card' with a visual helper"
    weight: 0.35
    description: "FormFixes"
  - type: llm_judge
    criteria: "Response explains form copy components — labels: always visible, describe what to enter, be specific ('Email address' not 'Email'); placeholders: don't use for critical information (they disappear), use for examples or format hints ('e.g., jane@example.com'); help text: persistent text below the field for instructions, format requirements, or context ('We'll send your receipt to this address'); validation messages: appear near the error, explain what's wrong and how to fix it, don't blame the user. Explains why each component exists and when to use each"
    weight: 0.35
    description: "ComponentExplanation"
  - type: llm_judge
    criteria: "Response addresses form copy best practices — keep labels short and scannable, group related fields logically, explain why you're asking for sensitive information ('We need your phone number to send delivery updates'), show format requirements before the user types (not after they fail), use inline validation that confirms correct input (green checkmarks), and consider the international audience (don't assume US-format addresses, phone numbers, or name conventions)"
    weight: 0.30
    description: "BestPractices"
