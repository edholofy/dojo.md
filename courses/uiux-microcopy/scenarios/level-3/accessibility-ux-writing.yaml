meta:
  id: accessibility-ux-writing
  level: 3
  course: uiux-microcopy
  type: output
  description: "Accessible UX writing — write interface copy that works for screen readers, meets WCAG requirements, and reduces cognitive load for all users"
  tags: [accessibility, WCAG, screen-reader, cognitive-load, advanced]

state: {}

trigger: |
  A senior UX writer says: "We just got our WCAG 2.2 accessibility
  audit results and several copy-related issues were flagged:

  1. Link text: 'Click here to learn more' and 'Read more' appear
     20+ times — screen reader users hear 'click here, click here,
     click here' with no context.

  2. Image alt text: 90% of images have alt='image' or alt='photo'.
     Decorative icons have verbose alt text describing them.

  3. Form errors: Error messages appear at the top of the form in
     a red box. Screen readers don't announce them, and color-blind
     users can't distinguish the red from surrounding text.

  4. Button labels: 3 buttons all labeled 'Delete' on the same
     page — screen reader users can't distinguish which delete does
     what.

  5. Reading level: Our help documentation averages grade 14 reading
     level. We serve users with diverse literacy levels.

  How do I fix these accessibility issues?"

  Task: Fix each accessibility issue and provide comprehensive
  guidelines for writing accessible interface copy.

assertions:
  - type: llm_judge
    criteria: "Response fixes each accessibility issue — links: use descriptive link text that makes sense out of context ('View our pricing plans', 'Read the accessibility guide'), never 'click here' or bare 'read more'. Alt text: write descriptive alt text for meaningful images ('Bar chart showing Q3 revenue increased 23%'), use alt='' (empty) for decorative images. Form errors: use aria-live regions to announce errors, add error icons alongside color, associate errors with specific fields using aria-describedby. Buttons: make each unique ('Delete project', 'Delete comment', 'Remove team member'). Reading level: simplify to grade 6-8 using short sentences, common words, and active voice"
    weight: 0.35
    description: "AccessibilityFixes"
  - type: llm_judge
    criteria: "Response provides accessible writing guidelines — write link text that makes sense out of context (screen readers can navigate by links), write alt text that conveys the purpose of the image (not just what it looks like), keep labels unique and descriptive within a page, use ARIA attributes to connect related content (labels to inputs, errors to fields), never rely on color alone to convey meaning, write at a grade 6-8 reading level, use plain language (avoid jargon, idioms, and complex sentence structures), and structure content with proper heading hierarchy for screen reader navigation"
    weight: 0.35
    description: "AccessibilityGuidelines"
  - type: llm_judge
    criteria: "Response addresses the broader accessibility writing mindset — accessibility benefits everyone (plain language helps non-native speakers, clear labels help everyone, good alt text helps when images don't load), cognitive accessibility is as important as screen reader support (short sentences, consistent terminology, clear structure reduce cognitive load for users with ADHD, dyslexia, or cognitive disabilities), and how to test accessibility copy (test with screen readers like VoiceOver/NVDA, test with users who have disabilities, use readability scoring tools)"
    weight: 0.30
    description: "AccessibilityMindset"
