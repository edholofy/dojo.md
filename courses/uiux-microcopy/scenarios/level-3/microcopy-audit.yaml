meta:
  id: microcopy-audit
  level: 3
  course: uiux-microcopy
  type: output
  description: "Microcopy audit — conduct a systematic UX copy audit to identify and prioritize copy improvements across a product"
  tags: [audit, review, prioritization, systematic, advanced]

state: {}

trigger: |
  A senior UX writer says: "I just joined a company as their first
  UX writer. The product has 200+ screens and the copy was written
  by engineers and PMs over 5 years. Where do I start?

  Initial observations:
  - Inconsistent terminology (the same feature is called 'projects',
    'workspaces', and 'boards' in different places)
  - Many screens still have developer placeholder text ('TODO: add
    copy here', 'Lorem ipsum')
  - Error messages are raw technical errors from the API
  - Buttons are generic ('Submit', 'OK', 'Cancel' everywhere)
  - No voice or tone consistency
  - Some high-traffic flows have clearly been copywritten, others
    are obviously never reviewed

  I can't fix everything at once. How do I prioritize?"

  Task: Design a systematic UX copy audit methodology and
  prioritization framework for a 200+ screen product.

assertions:
  - type: llm_judge
    criteria: "Response designs a systematic audit methodology — how to inventory the copy: screen-by-screen documentation (screenshot every screen, catalog every piece of copy), categorize by type (errors, buttons, labels, help text, empty states, notifications), and score each against UX writing standards (clarity, conciseness, usefulness, consistency, tone, accessibility). Tools for auditing: spreadsheet or dedicated content audit tool, organized by feature area and user flow"
    weight: 0.35
    description: "AuditMethodology"
  - type: llm_judge
    criteria: "Response provides a prioritization framework — prioritize by: 1) business impact (high-traffic pages and revenue-critical flows first — login, checkout, onboarding), 2) user pain (screens with the most support tickets or abandonment), 3) severity (placeholder text and raw API errors are worse than slightly suboptimal button labels), 4) effort (quick wins first to build momentum and demonstrate value). Creates a priority matrix: high impact + low effort = do first, high impact + high effort = plan for, low impact + low effort = batch later, low impact + high effort = deprioritize"
    weight: 0.35
    description: "PrioritizationFramework"
  - type: llm_judge
    criteria: "Response addresses the 'first UX writer' situation — how to build credibility and demonstrate value early (start with a quick win on a high-visibility flow), how to get buy-in from engineering and product (show the business impact of bad copy — support ticket volume, abandonment rates), how to establish basic standards without boiling the ocean (terminology list, 3-5 core voice principles, error message template), and how to create a sustainable improvement plan (not a one-time audit but an ongoing process integrated into the product development workflow)"
    weight: 0.30
    description: "FirstUXWriter"
