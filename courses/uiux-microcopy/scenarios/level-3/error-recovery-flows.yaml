meta:
  id: error-recovery-flows
  level: 3
  course: uiux-microcopy
  type: output
  description: "Error recovery flows — design complete error recovery experiences for complex failure scenarios including system outages, data loss, and multi-step process failures"
  tags: [error-recovery, system-errors, outage, data-loss, advanced]

state: {}

trigger: |
  A senior UX writer says: "Beyond simple validation errors, we
  need copy for complex failure scenarios:

  1. Complete system outage: Our service is down and users see a
     blank page or generic browser error.

  2. Partial failure: The user submitted a multi-step form and it
     failed at step 4 of 5. Their progress in steps 1-3 is saved
     but the user doesn't know that.

  3. Data sync conflict: Two team members edited the same document
     simultaneously and now there are conflicting changes.

  4. Rate limiting: A user is hitting API limits because they're
     importing too many records at once.

  5. Expired session: The user was writing a long form post and
     their session expired. When they click 'Publish', they get
     redirected to the login page and their draft might be lost.

  These are scary moments for users. How do I write copy that
  calms them down and guides them to recovery?"

  Task: Write error recovery copy for each scenario and design
  patterns for handling complex failure experiences.

assertions:
  - type: llm_judge
    criteria: "Response writes empathetic, actionable recovery copy for each scenario — Outage: dedicated status page with clear messaging ('We're experiencing issues and our team is working on it. Last updated: 2:34 PM. Expected resolution: within 1 hour.'), not just 'Service unavailable'. Partial failure: 'We couldn't complete your submission. Your progress through step 3 has been saved — you can pick up where you left off.' Multi-step form state preservation. Conflict: 'Both you and Sarah edited this document. Here are the differences — choose which version to keep for each section.' Clear conflict resolution UI. Rate limiting: 'You're importing records faster than our system can process. We'll continue processing — your import will complete in approximately 15 minutes.' Expired session: save draft automatically, show 'Your session expired. Log in to continue — don't worry, your draft has been saved.'"
    weight: 0.35
    description: "RecoveryCopy"
  - type: llm_judge
    criteria: "Response provides error recovery design patterns — the golden rule: never lose user data (auto-save, local storage backups, draft preservation), communicate status clearly (is it being fixed? how long will it take? is my data safe?), provide alternatives when the primary path fails (offline mode, email export, manual retry), distinguish between user-recoverable and system-recoverable errors (user can retry vs system will auto-retry vs contact support), and escalation paths (self-service → knowledge base → support contact)"
    weight: 0.35
    description: "RecoveryPatterns"
  - type: llm_judge
    criteria: "Response addresses the emotional design of error recovery — users experiencing errors are frustrated, anxious, or scared (especially about data loss). Copy should: acknowledge the frustration without being patronizing, reassure about data safety first, provide clear next steps, avoid blame, and maintain trust. The tone should shift from the app's normal voice to be calmer, more empathetic, and more direct. Covers how to balance honesty ('we're having problems') with reassurance ('your data is safe')"
    weight: 0.30
    description: "EmotionalDesign"
