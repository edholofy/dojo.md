meta:
  id: voice-and-tone-guide
  level: 3
  course: uiux-microcopy
  type: output
  description: "Voice and tone guide — create a comprehensive voice and tone guide that scales consistent UX writing across a product team"
  tags: [voice, tone, guidelines, content-system, team-scaling, advanced]

state: {}

trigger: |
  A senior UX writer says: "I'm the only UX writer supporting 6
  product designers and 4 product managers who all write copy. The
  result is wildly inconsistent:

  - One PM writes super casual ('Yikes! Something broke 😅')
  - Another writes corporate ('We regret to inform you that an
    error has been encountered during your session')
  - A designer writes minimal ('Error') because they're focused on
    visual design
  - Marketing writes differently than the product ('Unlock the
    power of analytics!' vs the product's 'Analytics Dashboard')

  I need a voice and tone guide that anyone on the team can use
  to write consistent, on-brand copy without needing me to review
  everything.

  Our brand values: trustworthy, smart, approachable.

  Task: Create a voice and tone guide structure that enables
  consistent UX writing across the team."

  Task: Design a comprehensive voice and tone guide with practical
  examples, do/don't patterns, and templates that non-writers can
  use to write on-brand copy.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical voice and tone guide — defines the brand voice with clear principles (trustworthy: be honest and transparent, never mislead; smart: be knowledgeable without being condescending; approachable: be warm and helpful, never robotic). Includes a 'This, not that' comparison chart (Trustworthy: 'We couldn't process your payment' NOT 'Oops! Payment went bloop 😅', Smart: 'Your data is encrypted end-to-end' NOT 'We use advanced proprietary security algorithms', Approachable: 'Need help? We're here.' NOT 'Please submit a support request through the designated portal'). Shows how voice stays consistent while tone adapts to context"
    weight: 0.35
    description: "VoiceToneGuide"
  - type: llm_judge
    criteria: "Response includes practical tools for non-writers — copy patterns/templates for common scenarios (error message template: '[What happened]. [What to do next].' Success message template: '[What was accomplished]. [What you can do now].'), a terminology list (always say 'project' not 'workspace' or 'container'), grammar and style rules (sentence case for headings, Oxford comma yes/no, contractions yes/no), and a quick reference card that fits on one page (the 3 voice principles + key do/don'ts + common templates)"
    weight: 0.35
    description: "PracticalTools"
  - type: llm_judge
    criteria: "Response addresses adoption and maintenance — how to get the team to actually use the guide (make it accessible, link from design tools, integrate into design system), how to handle edge cases not covered by the guide (decision framework, escalation to the UX writer), how to update the guide as the product evolves (living document with version history), how to enforce consistency without being the copy police (design reviews include copy checks, templates reduce the need for review), and how to measure if the guide is working (consistency audits, reduction in copy-related support tickets)"
    weight: 0.30
    description: "AdoptionAndMaintenance"
