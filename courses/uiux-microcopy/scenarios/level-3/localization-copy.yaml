meta:
  id: localization-copy
  level: 3
  course: uiux-microcopy
  type: output
  description: "Localization-ready copy — write interface copy that translates well, handles text expansion, and avoids cultural assumptions"
  tags: [localization, internationalization, translation, i18n, advanced]

state: {}

trigger: |
  A senior UX writer says: "We're launching in 8 new markets
  (Japan, Germany, Brazil, France, Saudi Arabia, South Korea,
  Mexico, India) and our copy is breaking everywhere:

  1. The German translation of 'Settings' is 'Einstellungen' —
     14 characters vs 8, overflowing the tab bar.

  2. Our button 'Get started' translates awkwardly in Japanese
     because the concept of 'getting started' doesn't map directly.

  3. Date displays '03/04/2024' — is that March 4 or April 3?
     Users in different locales interpret it differently.

  4. Our chatbot says 'Hey there!' which sounds too casual for
     Japanese and Korean users who expect formal address.

  5. An error message uses the idiom 'Oops! Something went
     sideways' — translators don't know how to localize this.

  6. Right-to-left layout for Arabic breaks our UI — text alignment,
     icon placement, and reading flow are all wrong.

  How do I write copy that works across all these markets?"

  Task: Fix each localization issue and provide guidelines for
  writing localization-ready interface copy.

assertions:
  - type: llm_judge
    criteria: "Response fixes each localization issue — text expansion: design UI with 30-50% extra space for text expansion (German and Finnish are among the longest), use flexible layouts. Untranslatable concepts: use simple, universal concepts instead of culture-specific idioms ('Begin' or 'Start' instead of 'Get started'). Date formats: use locale-aware formatting (ISO 8601 for storage, locale format for display), or spell out the month. Formality: create locale-specific tone guidelines (formal for Japanese/Korean, casual-friendly for US/Brazil). Idioms: replace with plain language ('Something went wrong' instead of 'went sideways'). RTL: mirror the entire layout, not just text alignment"
    weight: 0.35
    description: "LocalizationFixes"
  - type: llm_judge
    criteria: "Response provides localization-ready writing guidelines — avoid idioms, slang, and cultural references that don't translate, avoid concatenating strings (different languages have different word orders), use simple sentence structures (complex grammar is harder to translate), avoid humor that relies on wordplay (it rarely translates), design for text expansion (allow 30-50% extra space), use locale-aware formatting for dates, numbers, currency, and addresses, and provide context for translators (where does this text appear? what does the user see? what action does it describe?)"
    weight: 0.35
    description: "LocalizationGuidelines"
  - type: llm_judge
    criteria: "Response addresses the localization workflow — provide translators with full UI context (screenshots, not just spreadsheets), create a terminology glossary (consistent translation of product-specific terms), establish locale-specific tone guidelines (formality levels, address conventions), test translations in the actual UI (not just in a document), and work with native speakers for cultural review (translation accuracy is necessary but not sufficient — cultural appropriateness matters)"
    weight: 0.30
    description: "LocalizationWorkflow"
