meta:
  id: copy-for-complex-features
  level: 3
  course: uiux-microcopy
  type: output
  description: "Copy for complex features — write interface copy that makes complex functionality understandable without oversimplifying"
  tags: [complex-features, simplification, technical-concepts, advanced]

state: {}

trigger: |
  A senior UX writer says: "I'm writing copy for a complex B2B
  analytics platform and the features are hard to explain:

  1. 'Attribution modeling' — users need to understand first-touch,
     last-touch, linear, and time-decay models to configure it.
     Current label: 'Attribution Model Configuration'

  2. 'Cohort analysis' — the setup wizard asks users to define
     cohorts, choose time granularity, and select metrics. The
     instructions say: 'Define your cohort based on the event
     that qualifies users for inclusion in the analysis window.'

  3. 'Webhooks' — developers understand them, but product managers
     also use our platform and don't know what a webhook is. The
     setup page title is 'Webhook Configuration' with no explanation.

  4. Permission settings: 'Role-Based Access Control (RBAC)' —
     users need to assign permissions but don't understand roles
     vs individual permissions.

  How do I explain complex features without talking down to
  technical users or losing non-technical ones?"

  Task: Rewrite the copy for each complex feature, making it
  accessible to mixed-expertise audiences.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each feature for mixed audiences — Attribution: rename or add subtitle ('How should we credit your marketing channels?'), explain each model in plain language with a use-case ('Last-touch: credits the final channel the customer interacted with before purchasing. Best when you want to know which channels close deals.'). Cohort analysis: rewrite wizard in plain language ('Group users by their first action — for example, everyone who signed up in January'). Webhooks: add a plain-language subtitle ('Send automatic notifications to other tools when events happen in your account'). RBAC: rename to 'Team permissions' with simple descriptions ('Admin: can change settings and manage billing', 'Member: can view and create reports')"
    weight: 0.35
    description: "ComplexFeatureRewrites"
  - type: llm_judge
    criteria: "Response provides strategies for explaining complexity — progressive disclosure (show the simple version first, reveal complexity as needed), use analogies and examples (not just definitions), lead with the user's goal (not the feature name), provide 'what this does' and 'when to use it' for each option, use comparison tables for multiple options ('which model is right for you?'), and layer information (1-sentence summary → detailed explanation → documentation link)"
    weight: 0.35
    description: "ComplexityStrategies"
  - type: llm_judge
    criteria: "Response addresses the audience calibration challenge — how to write for mixed expertise levels without alienating either group (don't use jargon without explanation, but also don't over-explain to experts — use progressive disclosure so experts can skip explanations), how to handle technical terminology (provide the technical term with a plain-language definition), and when to use different copy for different user roles (admin sees 'RBAC settings' while member sees 'Your permissions')"
    weight: 0.30
    description: "AudienceCalibration"
