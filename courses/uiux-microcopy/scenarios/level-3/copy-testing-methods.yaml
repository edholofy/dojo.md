meta:
  id: copy-testing-methods
  level: 3
  course: uiux-microcopy
  type: output
  description: "Copy testing methods — use research methods to validate and improve interface copy through user testing, A/B experiments, and comprehension studies"
  tags: [testing, research, A/B-testing, usability, comprehension, advanced]

state: {}

trigger: |
  A senior UX writer says: "Our team argues about copy choices
  based on personal preference. The PM likes casual copy, the
  designer prefers minimal copy, and engineering uses technical
  terms. Nobody tests anything with actual users.

  I want to introduce evidence-based copy decisions. But I'm not
  sure which testing methods to use for different situations:

  - We're deciding between two CTA labels for a high-traffic page
  - We rewrote all error messages and want to verify they're clearer
  - We're launching a new feature and need to test if users
    understand the copy before development starts
  - We want to check if our help documentation is actually helpful
  - We need to validate that our checkout copy builds trust

  What testing methods should I use for each situation?"

  Task: Recommend the right testing method for each situation,
  explain how to conduct each test, and provide a framework for
  choosing copy testing methods.

assertions:
  - type: llm_judge
    criteria: "Response recommends appropriate methods for each situation — CTA labels: A/B test (quantitative, measures actual click-through rates on live traffic). Error messages: usability testing with task scenarios (watch users encounter errors and observe comprehension), plus 5-second test for clarity. New feature copy: first-click test or comprehension test before development (cheap, fast, catches major issues early). Help documentation: cloze test (fill-in-the-blank to measure comprehension) or task-based testing (can users complete tasks using the docs?). Checkout trust: preference testing combined with mock checkout usability test, measuring anxiety indicators"
    weight: 0.35
    description: "MethodRecommendations"
  - type: llm_judge
    criteria: "Response explains each testing method — A/B testing: randomly show two versions to live traffic, measure conversion (needs significant traffic volume, shows what works but not why). 5-second test: show copy for 5 seconds, ask what they understood (tests first impression and clarity). First-click test: show a screen, ask users to click where they'd go to complete a task (tests navigation labels and CTA effectiveness). Cloze test: remove every Nth word and have users fill in blanks (measures comprehension). Highlighter test: ask users to highlight confusing text (identifies friction points). Usability testing: watch users complete tasks using the interface (holistic understanding of how copy affects behavior)"
    weight: 0.35
    description: "MethodExplanation"
  - type: llm_judge
    criteria: "Response provides a framework for choosing methods — when to use quantitative methods (high-traffic pages, binary choices, measuring conversion) vs qualitative (understanding why, early-stage validation, complex flows), when to test before development (guerrilla testing with prototypes) vs after launch (A/B testing with real data), how to get started with limited resources (5-second tests and first-click tests are fast and cheap), and how to build a culture of testing (share results with the team, let data settle debates, start small and build momentum)"
    weight: 0.30
    description: "TestingFramework"
