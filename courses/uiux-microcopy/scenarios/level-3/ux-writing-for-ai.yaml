meta:
  id: ux-writing-for-ai
  level: 3
  course: uiux-microcopy
  type: output
  description: "UX writing for AI interfaces — write copy for AI-powered features including chatbots, recommendations, and AI-generated content"
  tags: [AI, chatbot, conversational-UI, recommendations, advanced]

state: {}

trigger: |
  A senior UX writer says: "We're adding AI features to our
  product and the copy challenges are new:

  1. AI chatbot: When should it say 'I' vs 'we'? Should it admit
     when it doesn't know something? How do we set expectations
     about what it can and can't do?

  2. AI-generated suggestions: 'Based on AI analysis, we recommend
     increasing your ad budget by 30%' — users don't know how
     confident to be in this recommendation.

  3. AI content generation: Users generate marketing copy with AI.
     How do we frame the output? ('Here's your copy' vs 'Here's
     a suggestion to start with')

  4. AI error states: The AI generates a wrong or inappropriate
     response. How do we handle it? Current: no indication that
     the response might be wrong.

  5. Data transparency: Users ask 'How does the AI make these
     decisions?' and we have no explanation.

  How do I write copy for AI-powered features?"

  Task: Write copy guidelines for each AI feature and provide a
  framework for UX writing in AI-powered interfaces.

assertions:
  - type: llm_judge
    criteria: "Response provides AI-specific copy guidelines for each scenario — Chatbot identity: use 'I' if the bot has a name/persona, 'we' if representing the company, always be transparent that it's AI ('I'm an AI assistant — I can help with account questions but can't process refunds'). Confidence framing: indicate confidence levels ('Based on your last 6 months of data, increasing budget by 30% could improve results. This recommendation has worked for 72% of similar accounts.'). AI-generated content: frame as a starting point ('Here's a draft to work from. Review and edit before publishing.'). Error handling: add 'Was this helpful?' feedback, allow easy regeneration ('That doesn't look right? Try again or rephrase your question.'). Transparency: explain in plain language what data the AI uses and how ('This recommendation is based on your ad performance data from the last 90 days')"
    weight: 0.35
    description: "AIGuidelines"
  - type: llm_judge
    criteria: "Response addresses AI transparency and trust — be upfront about AI limitations (what it can't do, when it might be wrong), communicate confidence levels (not all AI outputs have equal confidence), let users verify and override AI suggestions (AI assists, humans decide), explain how the AI reached its conclusion (not the algorithm, but what data it used), and handle hallucinations/errors gracefully (make it easy to report and correct wrong AI outputs). Covers the balance between selling AI capabilities and setting realistic expectations"
    weight: 0.35
    description: "AITransparency"
  - type: llm_judge
    criteria: "Response provides a framework for AI UX writing — set expectations upfront (what the AI can do, how it works, what data it uses), frame AI output as suggestions not decisions (humans should remain in control), provide feedback mechanisms (thumbs up/down, 'this is wrong' button), handle uncertainty honestly (when the AI isn't confident, say so), and distinguish between AI-generated and human-created content. Addresses the ethical dimension: avoid anthropomorphizing AI to the point of deception, and be transparent when content is AI-generated"
    weight: 0.30
    description: "AIFramework"
