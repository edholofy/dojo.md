meta:
  id: content-patterns-library
  level: 3
  course: uiux-microcopy
  type: output
  description: "Content patterns library — create reusable copy patterns for common UI components that maintain consistency across a product"
  tags: [patterns, templates, components, design-system, consistency, advanced]

state: {}

trigger: |
  A senior UX writer says: "We have a design system for visual
  components (buttons, cards, modals) but no content system for
  the copy inside those components. Every designer writes different
  copy for the same patterns:

  - Deletion confirmations range from 'Delete?' to 3-paragraph
    explanations
  - Success toasts vary from 'Done!' to 'Your changes have been
    successfully saved to the database'
  - Empty states have no consistent structure
  - Error messages follow no pattern
  - Modal titles range from questions to statements to imperatives

  I need to create a content patterns library that integrates with
  our design system. Each pattern should give designers and PMs a
  template they can fill in without needing a UX writer.

  We have 15 UI component types that need copy guidelines."

  Task: Design a content patterns library for the most common UI
  components, with templates, examples, and usage guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates copy patterns for key UI components — at least 6-8 component patterns covering: modals/dialogs (title format, body structure, button labels), toasts/notifications (structure: icon + message + optional action, character limits), empty states (title + description + CTA template), error messages (inline validation template, system error template), forms (label conventions, help text placement, validation message format), and buttons (verb-first format, character limit, primary/secondary/destructive variants). Each pattern includes a template, 2-3 examples, and guidelines for when to use it"
    weight: 0.35
    description: "ComponentPatterns"
  - type: llm_judge
    criteria: "Response shows how patterns create consistency — demonstrates how the template system produces consistent output: all deletion confirmations follow the same structure (title: 'Delete [item type]?', body: '[Consequence]. [Reversibility].', buttons: '[Delete action] / Cancel'), all success toasts follow the same format ('[Item] [action]. [Optional next step].' e.g., 'Project created. Add your first task.'). Shows before (inconsistent) and after (pattern-based) comparisons"
    weight: 0.35
    description: "ConsistencyDemonstration"
  - type: llm_judge
    criteria: "Response addresses integration with the design system — how content patterns map to design system components (each visual component has corresponding copy guidelines), how to document patterns (in the same tool as the design system — Figma, Storybook, or dedicated documentation), how to handle edge cases that don't fit patterns (escalation process, pattern extension), and how to maintain the library as the product evolves (regular audits, contribution process for new patterns, deprecation of outdated patterns)"
    weight: 0.30
    description: "DesignSystemIntegration"
