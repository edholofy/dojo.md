meta:
  id: notification-copy
  level: 2
  course: uiux-microcopy
  type: output
  description: "Notification copy — write effective push notifications, in-app messages, and alert copy that informs without annoying users"
  tags: [notifications, push, in-app, alerts, intermediate]

state: {}

trigger: |
  A UX writer says: "Our notification system is annoying users. We
  have a 40% opt-out rate for push notifications and users say our
  in-app alerts are disruptive. Examples of current notifications:

  Push: 'Don't miss out! Check out what's new in the app today!'
  Push: 'You have 3 unread notifications'
  Push: 'Hi [Name], we noticed you haven't logged in for 7 days...'

  In-app banner: 'IMPORTANT: Your credit card on file will expire
  soon. Update your payment method immediately to avoid service
  disruption.'

  In-app toast: 'Action completed successfully!'

  Alert modal: 'Alert: System maintenance scheduled for tonight.
  Click OK to dismiss.'

  How do I write notifications that are helpful, not annoying?"

  Task: Rewrite each notification and provide a framework for
  writing effective notifications at different urgency levels.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each notification — generic push ('Don't miss out!') → specific value push with actual content preview. Notification count push → only send for actionable items, include preview of what they are. Re-engagement push → provide genuine value, not guilt. Credit card banner → reduce urgency language, give specific date and consequence, one clear CTA. Generic toast → specific confirmation ('Invoice sent to Alex Chen'). Maintenance modal → use a non-blocking banner, specify time and impact, provide action if needed. Each rewrite respects the user's attention"
    weight: 0.35
    description: "NotificationRewrites"
  - type: llm_judge
    criteria: "Response provides a notification urgency framework — categorizes notifications by urgency: urgent/blocking (security breach, payment failed — modal or prominent banner), important/non-blocking (credit card expiring soon, feature change — banner or in-app notification), informational (action completed, status update — toast that auto-dismisses), optional (new features, re-engagement — push notification, can be turned off). Each level has appropriate delivery mechanism, tone, and persistence"
    weight: 0.35
    description: "UrgencyFramework"
  - type: llm_judge
    criteria: "Response addresses notification best practices — send only when the user benefits (not when the company benefits), make every notification actionable (if there's nothing to do, don't send it), keep push notifications under 50 characters, respect user preferences and time zones, avoid manipulative language ('Don't miss out!', 'Hurry!'), personalize based on user behavior (not just inserting their name), and explain how to reduce opt-out rates (send fewer, better notifications — quality over quantity)"
    weight: 0.30
    description: "BestPractices"
