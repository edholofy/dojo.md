meta:
  id: intermediate-microcopy-shift
  level: 2
  course: uiux-microcopy
  type: output
  description: "Intermediate microcopy shift — audit and rewrite the copy for a complete checkout flow, applying intermediate UX writing skills"
  tags: [shift, combined, assessment, checkout, intermediate]

state: {}

trigger: |
  You're a UX writer asked to audit and rewrite the copy for an
  e-commerce checkout flow with a 55% abandonment rate. The current
  flow:

  Cart page:
  - Title: 'Your Cart'
  - Empty cart: 'Your cart is empty'
  - Promo code field: label 'Promo code', button 'Apply'
  - Checkout button: 'Proceed to Checkout'
  - No shipping estimate, no return policy info

  Shipping page:
  - Title: 'Shipping Information'
  - 15 form fields, all marked with red asterisks
  - Address validation error: 'Invalid address'
  - No shipping cost shown until the next step

  Payment page:
  - Title: 'Payment'
  - Credit card form with no security indicators
  - Button: 'Submit Order'
  - Terms checkbox: 'I agree to the Terms and Conditions'

  Confirmation page:
  - Title: 'Order Confirmed'
  - Body: 'Thank you for your order. Your order number is #12345.'
  - No estimated delivery, no next steps

  Task: Audit and rewrite every screen's copy to reduce the 55%
  abandonment rate, applying all intermediate UX writing skills.

assertions:
  - type: llm_judge
    criteria: "Response audits and rewrites every screen comprehensively — Cart: add item count and total prominently, improve empty cart with personalized recommendations, show shipping estimate and return policy to reduce anxiety, change CTA to specific ('Checkout — $124.50'). Shipping: reduce required fields, show shipping costs and delivery estimates early, fix validation error to be specific ('We couldn't verify this address. Check the ZIP code and try again.'). Payment: add security badges and trust indicators, change button to 'Place order — $134.50' (with amount), make terms clear and linkable. Confirmation: add estimated delivery date, tracking info, order summary, and suggested next actions"
    weight: 0.35
    description: "FullFlowRewrite"
  - type: llm_judge
    criteria: "Response identifies the conversion killers — hidden shipping costs (the #1 reason for checkout abandonment), too many required fields (reduce friction), no security indicators on payment (trust anxiety), vague error messages (confusion leads to abandonment), no return policy visible (risk anxiety), and 'Submit Order' doesn't confirm the amount (surprise anxiety). Each identified issue has a specific copy-based fix"
    weight: 0.35
    description: "ConversionKillers"
  - type: llm_judge
    criteria: "Response applies intermediate skills holistically — form copy best practices (clear labels, help text, inline validation), trust-building copy (security indicators, money-back guarantee, privacy assurance), progress indicators (step 1 of 3), friction-reducing microcopy (addressing objections at each step), appropriate tone (reassuring during payment, celebratory on confirmation), and mobile considerations (all copy should work on small screens)"
    weight: 0.30
    description: "SkillsApplied"
