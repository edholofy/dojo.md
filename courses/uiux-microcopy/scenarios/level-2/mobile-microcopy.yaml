meta:
  id: mobile-microcopy
  level: 2
  course: uiux-microcopy
  type: output
  description: "Mobile microcopy — write concise, thumb-friendly interface copy optimized for small screens and mobile interaction patterns"
  tags: [mobile, responsive, touch, small-screen, intermediate]

state: {}

trigger: |
  A UX writer says: "60% of our users are on mobile but all our
  copy was written for desktop. On mobile, things don't work:

  1. Button labels that fit on desktop ('Continue to Payment
     Information') overflow on mobile screens.

  2. Error messages that are helpful on desktop ('Your password
     must contain at least 8 characters, one uppercase letter,
     one number, and one special character') take up half the
     mobile screen and push the input field out of view.

  3. Our confirmation dialog is a full paragraph on desktop. On
     mobile, users have to scroll the dialog to find the buttons.

  4. Tooltips designed for hover don't work on touch screens.

  5. Our navigation menu has 12 items that work in a horizontal
     bar on desktop but become a cramped hamburger menu on mobile.

  How do I adapt our copy for mobile without losing meaning?"

  Task: Rewrite each example for mobile and provide guidelines
  for mobile-first UX writing.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each example for mobile — button: shorten to 'Continue' or 'Pay now' (2-3 words max for mobile buttons). Error: break into progressive inline validation (show one requirement at a time as user types, use checkmarks for met requirements). Confirmation: reduce to essential information (title + 1 sentence + 2 buttons, all visible without scrolling). Tooltips: replace with tap-to-reveal info icons or persistent help text. Navigation: prioritize top 5 items in bottom nav bar, move the rest to a settings/more menu. Each mobile version preserves the essential meaning in fewer words"
    weight: 0.35
    description: "MobileRewrites"
  - type: llm_judge
    criteria: "Response provides mobile-first writing principles — character limits are real constraints (buttons: 15-20 characters, push notifications: 40-50 characters, toast messages: 1 line), vertical space is precious (content that pushes interactive elements below the fold causes friction), progressive disclosure is essential (show the minimum, let users tap for more), touch targets need clear labels (no ambiguous icons without labels), and content should be scannable in seconds (mobile users are often multitasking or in poor lighting/noisy environments)"
    weight: 0.35
    description: "MobilePrinciples"
  - type: llm_judge
    criteria: "Response addresses the responsive copy challenge — the same content may need different versions for different screen sizes (not just responsive layout but responsive copy), how to implement responsive copy (shorter versions for mobile, longer for desktop, using CSS or component props), when to truncate vs rewrite (truncation with '...' is lazy — rewriting to be shorter is better), and platform-specific patterns (iOS vs Android voice guidelines, swipe actions labeling, gesture-based UI copy)"
    weight: 0.30
    description: "ResponsiveCopy"
