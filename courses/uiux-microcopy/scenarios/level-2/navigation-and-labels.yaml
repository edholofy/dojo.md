meta:
  id: navigation-and-labels
  level: 2
  course: uiux-microcopy
  type: output
  description: "Navigation and label copy — write clear menu items, page titles, breadcrumbs, and navigation labels that help users find what they need"
  tags: [navigation, labels, menu, wayfinding, information-architecture, intermediate]

state: {}

trigger: |
  A UX writer says: "Users can't find things in our app even though
  the features exist. Our navigation has these issues:

  1. Two menu items called 'Reports' and 'Analytics' — users don't
     know which one to click for what they need.

  2. A menu item called 'Workspace Administration' — users looking
     for settings don't think to look there.

  3. Page title says 'Dashboard' but there are 4 different dashboard
     views with no indication of which one they're viewing.

  4. Breadcrumbs: Home > Settings > Tab 2 > Subsection — 'Tab 2'
     is meaningless.

  5. A section called 'Resources' that contains help docs, API docs,
     community forums, and changelog — users look in 'Help' menu
     (which doesn't exist) instead.

  How do I write navigation labels that help users find things?"

  Task: Fix each navigation issue and provide guidelines for
  writing effective navigation labels.

assertions:
  - type: llm_judge
    criteria: "Response fixes each navigation issue — Reports vs Analytics: differentiate by making labels specific ('Sales Reports' and 'User Analytics', or combine into one with sub-navigation), or add descriptions below each label. Workspace Administration: rename to 'Settings' (the word users expect) or add 'Settings' as a secondary label. Dashboard title: add context ('Sales Dashboard', 'Q4 Performance Dashboard'). Breadcrumbs: use meaningful labels that match page titles. Resources: reorganize by user intent ('Help Center', 'Developer Docs', 'Community', 'What's New') or keep 'Resources' but add sub-labels visible on hover"
    weight: 0.35
    description: "NavigationFixes"
  - type: llm_judge
    criteria: "Response provides navigation label guidelines — use the words your users use (not internal jargon), make labels mutually exclusive (if two labels could mean the same thing, rename them), be specific (not 'Settings' and 'Preferences' and 'Configuration' — pick one), test labels with card sorting or tree testing to verify users understand them, keep labels short (1-3 words for main navigation), and ensure labels match the page they lead to (the nav label and the page title should be identical or clearly related)"
    weight: 0.35
    description: "LabelGuidelines"
  - type: llm_judge
    criteria: "Response covers the information architecture connection — navigation labels are the user-facing layer of information architecture, changing labels without changing structure may not solve findability problems, and when users can't find things it might be a label problem (wrong words) or a structure problem (wrong grouping). Mentions testing methods: card sorting (how do users group items?), tree testing (can users find items in the hierarchy?), and first-click testing (where do users look first?)"
    weight: 0.30
    description: "IAConnection"
