meta:
  id: tooltip-and-help-copy
  level: 2
  course: uiux-microcopy
  type: output
  description: "Tooltip and contextual help copy — write informative tooltips, info icons, and contextual help text that educates without overwhelming"
  tags: [tooltips, help-text, contextual-help, info-icons, intermediate]

state: {}

trigger: |
  A UX writer says: "Our app has tooltips and help text everywhere,
  but users still say the features are confusing. The problems:

  1. A tooltip on 'Engagement Score': 'The engagement score is
     calculated based on various factors and metrics.' — users
     still don't understand what it means.

  2. An info icon next to 'MRR' that shows: 'Monthly Recurring
     Revenue. Click here to learn more.' — but 'learn more' links
     to a 40-page documentation page.

  3. A tooltip that appears on every hover, including on obvious
     elements like the 'Save' button: 'Click to save your changes.'

  4. A help panel that contains 2000 words of instructions visible
     at all times beside a simple form.

  5. No help at all on a complex settings page where users regularly
     misconfigure their workspace and contact support.

  How do I write better contextual help?"

  Task: Fix each help copy issue and provide guidelines for when
  and how to use tooltips, help text, and contextual guidance.

assertions:
  - type: llm_judge
    criteria: "Response fixes each help copy issue — Engagement Score tooltip: replace with a specific explanation ('Score based on logins, feature usage, and session duration over the past 30 days. Higher is better. 80+ is excellent.'). MRR tooltip: define the term in the tooltip itself ('Monthly Recurring Revenue — your predictable monthly subscription income. Currently $45,230.'), link to a focused help article, not 40 pages. Save button: remove the unnecessary tooltip (obvious actions don't need tooltips). Long help panel: replace with progressive disclosure (show a 1-sentence summary, expandable details). Complex settings: add contextual help where it's most needed"
    weight: 0.35
    description: "HelpCopyFixes"
  - type: llm_judge
    criteria: "Response provides guidelines for when to use contextual help — use tooltips: when a term or concept may be unfamiliar, when an icon's meaning isn't obvious, when a setting has non-obvious consequences. Don't use tooltips: on obvious UI elements (Save, Close, Delete with clear labels), when the information is critical (tooltips are hidden by default and may not be discovered), or when the explanation requires more than 2-3 sentences (use a help panel or link instead). Covers the hierarchy: label first (make it self-explanatory), then help text (persistent subtitle), then tooltip (on hover/click for extra detail)"
    weight: 0.35
    description: "WhenToUseHelp"
  - type: llm_judge
    criteria: "Response addresses contextual help best practices — keep tooltips short (1-2 sentences max), include concrete examples or numbers when explaining metrics, link to specific help articles (not documentation home pages), use progressive disclosure (show summary, expand for details), place help where users need it (next to the confusing element, not in a separate help center), and consider the timing (inline help is better than tooltip for critical information that users must read)"
    weight: 0.30
    description: "HelpBestPractices"
