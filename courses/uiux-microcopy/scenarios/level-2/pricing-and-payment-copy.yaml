meta:
  id: pricing-and-payment-copy
  level: 2
  course: uiux-microcopy
  type: output
  description: "Pricing and payment copy — write transparent pricing pages, checkout flows, and subscription management copy that builds trust and reduces cart abandonment"
  tags: [pricing, payment, checkout, subscription, trust, intermediate]

state: {}

trigger: |
  A UX writer says: "Our SaaS checkout has a 60% abandonment rate.
  Users say they feel confused or tricked by the pricing copy:

  1. Pricing page shows '$9/mo' but the checkout shows '$108 billed
     annually' — users feel deceived.

  2. The 'Free Trial' button leads to a credit card form with no
     explanation. Users back out.

  3. Subscription cancellation is a 5-step flow that keeps asking
     'Are you sure?' with different guilt-trip messages at each step.

  4. The upgrade page says 'Unlock Premium Features' but doesn't
     explain what changes and what stays the same.

  5. Auto-renewal: buried in paragraph 17 of the Terms of Service.
     Users are surprised by charges.

  How do I write pricing and payment copy that's transparent and
  builds trust?"

  Task: Rewrite each pricing/payment touchpoint and provide
  guidelines for honest, trust-building pricing copy.

assertions:
  - type: llm_judge
    criteria: "Response fixes each pricing issue — price discrepancy: show both prices clearly on the pricing page ('$9/mo billed annually ($108/year) or $12 month-to-month'), never surprise users at checkout. Free trial CTA: explain what happens ('Start your 14-day free trial. No charge today — we'll remind you 3 days before your trial ends.'). Cancellation: streamline to 1-2 steps maximum, offer alternatives (pause, downgrade) without guilt-tripping, confirm clearly what happens after cancellation. Upgrade page: list what they get and what changes, show a comparison. Auto-renewal: state clearly on the signup page and in trial reminder emails"
    weight: 0.35
    description: "PricingFixes"
  - type: llm_judge
    criteria: "Response provides transparent pricing copy principles — no surprise charges (show the exact amount that will be charged, when, and how often), clear trial terms (what happens when the trial ends, how to cancel, when they'll be charged), honest upgrade/downgrade information (what they gain, what they lose, prorated billing explained), easy cancellation (if they want to leave, let them — a clean exit builds trust for potential return), and avoiding dark patterns (hidden fees, confusing plan names, pre-selected expensive plans, misleading comparisons)"
    weight: 0.35
    description: "TransparencyPrinciples"
  - type: llm_judge
    criteria: "Response addresses the business tension — acknowledges that clear pricing copy might reduce some short-term conversions (users who would have signed up without realizing the price) but increases long-term trust, reduces chargebacks and support tickets, and improves retention. Covers: how to frame pricing positively without being deceptive (emphasize value, not just cost), how to handle price increases transparently, and how regulatory trends (FTC dark pattern rules, EU consumer protection) make transparent pricing copy a legal requirement not just a UX best practice"
    weight: 0.30
    description: "BusinessTension"
