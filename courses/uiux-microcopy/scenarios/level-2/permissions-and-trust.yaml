meta:
  id: permissions-and-trust
  level: 2
  course: uiux-microcopy
  type: output
  description: "Permissions and trust copy — write permission requests, privacy explanations, and trust-building copy that gets user consent without creating anxiety"
  tags: [permissions, trust, privacy, consent, data-collection, intermediate]

state: {}

trigger: |
  A UX writer says: "Users are denying our permission requests and
  abandoning signup when they see our data collection notices. The
  current copy:

  1. Location permission (mobile): 'Allow AppName to access your
     location?' — with system default Yes/No buttons. 70% deny.

  2. Signup form asks for phone number with no explanation. 40% of
     users abandon at this field.

  3. Cookie consent: 'We use cookies to improve your experience.
     By continuing to use this site, you agree to our cookie
     policy.' — users see this and leave.

  4. Email permissions: 'Sign up for our newsletter' checkbox,
     pre-checked. Users complain about spam.

  5. Camera access: 'AppName wants to access your camera' — users
     are suspicious and deny.

  How do I write trust-building copy that gets consent?"

  Task: Rewrite each permission request with trust-building copy
  and provide a framework for permission and privacy UX writing.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each request with value-first framing — Location: add a pre-permission screen explaining the benefit ('Find restaurants near you — We'll use your location to show nearby options. You can change this anytime in Settings.'). Phone number: add help text explaining why ('We'll text you a verification code. We won't call or share your number.'). Cookie consent: be specific about what cookies do and offer real choices (not just 'accept all'). Email: don't pre-check, explain what they'll get and how often ('Weekly tips, no more than 1 email/week. Unsubscribe anytime.'). Camera: explain the specific use case ('Take a profile photo or scan documents')"
    weight: 0.35
    description: "TrustRewrites"
  - type: llm_judge
    criteria: "Response provides a permission request framework — the value exchange principle: before asking for access, explain what the user gets in return. The timing principle: ask for permissions at the moment of relevance, not at first launch (ask for camera when they try to take a photo, not on signup). The transparency principle: tell users exactly what you'll do with their data, how long you'll keep it, and how to revoke access. The control principle: let users change their mind easily (link to settings, clear opt-out)"
    weight: 0.35
    description: "PermissionFramework"
  - type: llm_judge
    criteria: "Response addresses trust-building patterns — use pre-permission screens (explain before triggering the system dialog), be specific about data use (not 'improve your experience' but specific benefits), avoid dark patterns (pre-checked boxes, confusing double negatives, making 'accept' prominent and 'decline' hidden), reference your privacy commitment ('Your data is encrypted and never sold'), and how the framing of the ask affects consent rates (positive framing: 'Get personalized recommendations' vs neutral: 'Allow data collection')"
    weight: 0.30
    description: "TrustPatterns"
