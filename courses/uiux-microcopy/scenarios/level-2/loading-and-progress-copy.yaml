meta:
  id: loading-and-progress-copy
  level: 2
  course: uiux-microcopy
  type: output
  description: "Loading and progress copy — write engaging loading states, progress indicators, and waiting screen copy that manages user expectations"
  tags: [loading, progress, waiting, skeleton-screens, intermediate]

state: {}

trigger: |
  A UX writer says: "Our app has several places where users have
  to wait, and the copy is either missing or unhelpful:

  1. File upload (takes 2-5 minutes): Shows a spinning icon with
     no text. Users don't know if it's working.

  2. Report generation (takes 30-60 seconds): Shows 'Loading...'
     the entire time.

  3. Payment processing (takes 5-10 seconds): Shows 'Processing...'
     Users get anxious and sometimes refresh, causing duplicate charges.

  4. Initial app load (takes 3-4 seconds): Shows blank white screen.

  5. Search (takes 2-3 seconds): Shows nothing until results appear.

  Users complain that the app feels slow and they can't tell if
  things are working. How do I improve these waiting experiences?"

  Task: Write copy and loading strategies for each scenario that
  manage expectations and reduce perceived wait time.

assertions:
  - type: llm_judge
    criteria: "Response provides specific loading copy for each scenario — file upload: progress bar with percentage, file name, and estimated time ('Uploading quarterly-report.pdf — 67% complete, about 1 minute remaining'), plus a 'what to do while you wait' or ability to navigate away. Report generation: multi-step progress ('Analyzing sales data... Generating charts... Formatting report...') that shows actual progress. Payment: reassuring sequence ('Verifying payment... Confirming with your bank... Almost done — please don't refresh'), plus explicit 'do not refresh' warning. App load: skeleton screens or branded loading animation. Search: subtle loading indicator (spinner near search bar, skeleton results)"
    weight: 0.35
    description: "LoadingCopy"
  - type: llm_judge
    criteria: "Response explains the psychology of waiting — perceived wait time is more important than actual wait time, users can tolerate longer waits when they know what's happening (progress information reduces anxiety), uncertain waits feel longer than known waits (show estimated time or steps remaining), occupied time feels shorter than idle time (show progress, fun facts, or tips), and explaining why the wait is happening increases patience ('We're generating your report from 50,000 records — this takes a moment')"
    weight: 0.35
    description: "WaitPsychology"
  - type: llm_judge
    criteria: "Response covers loading UI patterns — skeleton screens (show the shape of content before it loads), progress bars vs spinners (use progress bars when you know the duration, spinners for indeterminate waits), multi-step indicators (break a long process into visible stages), optimistic UI (show the result immediately and sync in the background for low-risk actions), and when copy adds value vs when visual indicators are sufficient (short waits < 2 seconds need minimal copy, longer waits need progress and explanation)"
    weight: 0.30
    description: "LoadingPatterns"
