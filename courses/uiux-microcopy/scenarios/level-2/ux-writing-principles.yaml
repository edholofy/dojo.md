meta:
  id: ux-writing-principles
  level: 2
  course: uiux-microcopy
  type: output
  description: "UX writing principles — apply clarity, conciseness, and usefulness to improve existing interface copy systematically"
  tags: [clarity, conciseness, usefulness, principles, intermediate]

state: {}

trigger: |
  A UX writer says: "I need to audit and improve the copy in our
  settings page. The current copy is wordy, unclear, and doesn't
  help users make decisions. Here are some examples:

  1. 'In order to be able to receive email notifications about
     updates to your account, you may wish to toggle this setting
     to the on position.'

  2. 'This feature allows you to enable or disable the automatic
     saving functionality which will periodically save your work
     at regular intervals throughout your session.'

  3. 'Please be advised that modifying this setting may result in
     changes to how your data is processed and stored by our system
     and its affiliated third-party service providers.'

  4. Toggle label: 'Enable/Disable Dark Mode Feature Preference'

  How do I apply UX writing principles to make this copy clear,
  concise, and useful?"

  Task: Rewrite each piece of copy applying clarity, conciseness,
  and usefulness principles, and explain the improvement methodology.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each example dramatically better — reduces the notification toggle copy from ~25 words to ~5-8 words (e.g., 'Email notifications' as a label with a brief helper: 'Get updates about your account activity'). Simplifies the auto-save copy (e.g., 'Auto-save' label, 'Saves your work every 5 minutes' helper). Clarifies the data processing warning (e.g., 'This affects how your data is stored. Learn more'). Shortens the toggle label ('Dark mode'). Shows the word count reduction and readability improvement for each"
    weight: 0.35
    description: "CopyRewrites"
  - type: llm_judge
    criteria: "Response explains the three principles in action — Clarity: remove ambiguity (don't say 'may wish to' when you mean 'turn on'), use everyday language (not 'toggle to the on position'), be specific about what happens. Conciseness: cut filler words ('in order to', 'please be advised', 'functionality which will'), use active voice, one idea per sentence. Usefulness: include only information that helps users make a decision (what does this setting do? what changes if I toggle it?), remove legal-speak that doesn't inform"
    weight: 0.35
    description: "PrincipleExplanation"
  - type: llm_judge
    criteria: "Response provides an editing methodology — a systematic approach to improving existing copy: 1) Identify the user's goal (what decision are they making?), 2) Cut everything that doesn't serve that goal, 3) Replace jargon with everyday words, 4) Test if it can be shorter without losing meaning, 5) Check if the remaining copy answers 'what does this do?' and 'should I turn it on?'. Provides a before/after comparison framework"
    weight: 0.30
    description: "EditingMethodology"
