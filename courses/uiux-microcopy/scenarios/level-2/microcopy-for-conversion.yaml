meta:
  id: microcopy-for-conversion
  level: 2
  course: uiux-microcopy
  type: output
  description: "Microcopy for conversion — write interface copy that reduces friction, builds confidence, and improves signup, checkout, and activation rates"
  tags: [conversion, friction, signup, checkout, activation, intermediate]

state: {}

trigger: |
  A UX writer says: "Product analytics shows three friction points
  where we're losing users:

  1. Signup page (65% conversion): The form asks for email, password,
     full name, company name, company size, and role — all required
     before they can see the product. No explanation of what happens
     after signup.

  2. First feature use (30% activation): Users sign up but never
     use the core feature. The feature has a complex UI with no
     guidance on what to do first.

  3. Upgrade prompt (2% conversion): After the trial, we show
     'Your trial has expired. Upgrade to Pro for $49/mo to continue
     using AppName.' with an 'Upgrade' button and a 'Maybe Later'
     button that logs them out.

  The PM wants me to improve conversion at each point. How do I
  write copy that reduces friction?"

  Task: Rewrite the copy at each friction point to improve
  conversion, and explain the psychology of friction-reducing copy.

assertions:
  - type: llm_judge
    criteria: "Response reduces friction at each point — Signup: ask only for email and password initially (get company info later during onboarding), add social proof ('Join 10,000+ teams'), show what they'll see after signup ('Create your first project in under 2 minutes'), and address objections inline ('No credit card required', 'Free 14-day trial'). Activation: add a guided first action ('Let's create your first [thing] — it takes 30 seconds'), use templates or examples to reduce blank-page anxiety. Upgrade: acknowledge what they've accomplished ('You've created 5 projects and invited 3 team members'), show specific value at risk, offer plan options not just one price, and don't log them out on 'Maybe Later'"
    weight: 0.35
    description: "FrictionReduction"
  - type: llm_judge
    criteria: "Response explains the psychology — friction comes from uncertainty (what happens next?), effort (too many fields), anxiety (will I be charged?), and lack of motivation (why should I bother?). Copy reduces friction by: answering objections before they form, reducing perceived effort ('takes 30 seconds'), building confidence with social proof and guarantees, making the value proposition specific and immediate, and creating momentum (each small commitment makes the next one easier — the foot-in-the-door effect)"
    weight: 0.35
    description: "FrictionPsychology"
  - type: llm_judge
    criteria: "Response provides conversion copy techniques — address the #1 objection next to the CTA, use microcopy to reduce form anxiety (lock icon + 'Your data is encrypted'), show progress to motivate completion ('2 of 3 steps complete'), provide social proof at decision points ('12,847 teams signed up this month'), use loss aversion carefully at upgrade ('Keep your 5 projects and 3 team members' vs 'Upgrade to Pro'), and the importance of A/B testing copy changes to validate assumptions"
    weight: 0.30
    description: "ConversionTechniques"
