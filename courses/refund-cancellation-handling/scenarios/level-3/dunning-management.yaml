meta:
  id: dunning-management
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Design and optimize dunning management — recover failed payments through strategic retry logic, customer communication sequences, and involuntary churn prevention"
  tags: [support, refund, dunning, payment-recovery, churn-prevention, advanced]

state: {}

trigger: |
  Dunning management is the process of recovering failed payments
  before they result in involuntary churn. 20-40% of all churn is
  involuntary (failed payments), and effective dunning can recover
  50-70% of these.

  Part 1: Dunning system design

  For "StreamPro" — a video streaming SaaS ($15/mo, 200K subscribers):
  Current failed payment data (monthly):
  - Total failed payments: 8,400 (4.2% of base)
  - Recovered automatically (retry): 3,200 (38%)
  - Recovered after email: 1,800 (21%)
  - Lost to involuntary churn: 3,400 (41%)
  - Revenue lost monthly: $51,000

  Current retry schedule: days 1, 3, 7 (3 attempts)
  Current email: single generic "payment failed" email on day 1

  1. Design an optimized retry strategy:
     - Smart retry timing based on failure reason codes
     - Decline code categorization (soft vs. hard declines)
     - Card updater integration strategy
     - Retry schedule optimization (which days/times work best)

  2. Build the dunning email sequence:
     - Pre-dunning: upcoming payment reminder (day -3)
     - Email 1: friendly "payment didn't go through" (day 0)
     - Email 2: "action needed" with update link (day 3)
     - Email 3: urgency — "service at risk" (day 7)
     - Email 4: final — "account will be paused" (day 12)
     - Post-grace: "we've paused your account" with reactivation
     Write all emails with subject lines and tone guidance.

  3. Design the in-app dunning experience:
     - Banner notifications for failed payments
     - Degraded access vs. full lockout strategy
     - One-click payment update flow
     - Grace period policy (how many days before action)

  4. Measure and optimize:
     - Recovery rate by decline code
     - Recovery rate by retry attempt number
     - Email open/click/recovery rates by sequence position
     - Optimal grace period length
     - Revenue recovered per dunning cycle

assertions:
  - type: llm_judge
    criteria: "Retry strategy differentiates by decline code — soft declines (insufficient funds) get more retries at strategic times, hard declines (stolen card) get fewer retries with card updater"
    weight: 0.25
    description: "Decline-code-aware retry"
  - type: llm_judge
    criteria: "Email sequence escalates appropriately — starts friendly, increases urgency gradually, and always provides a clear action path to update payment"
    weight: 0.25
    description: "Escalating dunning sequence"
  - type: llm_judge
    criteria: "Grace period strategy balances retention with revenue — too short loses recoverable customers, too long extends free service"
    weight: 0.25
    description: "Balanced grace period"
  - type: llm_judge
    criteria: "Measurement framework tracks recovery at each stage — identifies which retry attempts and emails actually drive recoveries"
    weight: 0.25
    description: "Stage-level recovery tracking"
