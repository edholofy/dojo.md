meta:
  id: refund-policy-optimization
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Optimize refund policies for business outcomes — design policies that balance customer trust, revenue protection, fraud prevention, and operational efficiency"
  tags: [support, refund, policy, optimization, strategy, advanced]

state: {}

trigger: |
  Refund policies directly impact conversion rates, customer
  trust, and return abuse. The right policy is a competitive
  advantage; the wrong one drives customers away or invites fraud.

  Part 1: Policy benchmarking and analysis

  "HomeStyle" — a home goods retailer ($50M annual revenue):

  Current policy:
  - 14-day return window
  - Original packaging required
  - Receipt required
  - 15% restocking fee on electronics
  - No returns on clearance items
  - Refund to original payment method only
  - Processing time: 5-7 business days

  Competitor landscape:
  - Competitor A: 30-day returns, no receipt needed, free shipping
  - Competitor B: 365-day returns, no questions asked
  - Competitor C: 14-day returns, store credit only
  - Industry average: 30-day window, free returns

  Customer feedback (last 6 months):
  - "Your return window is too short" — 42% of complaints
  - "Restocking fee is unfair" — 28%
  - "Takes too long to get my money back" — 18%
  - "Clearance items should be returnable" — 12%

  Conversion rate data:
  - Cart abandonment at checkout when viewing return policy: 23%
  - Competitor with 30-day policy has 15% higher conversion
  - Estimated revenue impact of restrictive policy: -$2.1M/year

  1. Analyze the policy gaps:
     - Where is HomeStyle losing customers to competitors?
     - What's the actual cost of a more generous policy?
     - What's the fraud/abuse risk of loosening the policy?

  2. Redesign the refund policy:
     Propose an optimized policy that:
     - Extends the return window (how far? justify with data)
     - Addresses the restocking fee concern
     - Speeds up processing time
     - Handles clearance items fairly
     - Includes fraud prevention guardrails
     Write the customer-facing policy page.

  3. Model the financial impact:
     Estimate:
     - Increased returns from looser policy (typically 5-15%)
     - Conversion rate improvement (estimate from competitor data)
     - Net revenue impact (more returns vs. more sales)
     - Fraud/abuse cost increase
     - Customer lifetime value impact

  4. Implement the policy change:
     - Phased rollout plan (A/B test or segment rollout)
     - Agent training requirements
     - System/tool changes needed
     - Communication plan (existing vs. new customers)
     - Measurement framework for the first 90 days

assertions:
  - type: llm_judge
    criteria: "Policy analysis quantifies the tradeoff — it estimates both the cost of increased returns and the revenue gain from higher conversion, not just one side"
    weight: 0.30
    description: "Quantified policy tradeoff"
  - type: llm_judge
    criteria: "Redesigned policy is competitive but not reckless — it addresses the main pain points without matching the most extreme competitor policies unnecessarily"
    weight: 0.25
    description: "Balanced competitive policy"
  - type: llm_judge
    criteria: "Financial model considers lifetime value — the analysis includes how a better refund experience affects repeat purchase behavior, not just the immediate return cost"
    weight: 0.25
    description: "LTV-inclusive financial model"
  - type: llm_judge
    criteria: "Rollout plan is phased and measurable — the policy change is tested before full deployment, with clear metrics to evaluate success"
    weight: 0.20
    description: "Phased measurable rollout"
