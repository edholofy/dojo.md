meta:
  id: subscription-billing-optimization
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Optimize subscription billing to reduce refunds and cancellations — handle proration, billing cycles, plan changes, and billing dispute prevention"
  tags: [support, billing, subscription, proration, optimization, advanced]

state: {}

trigger: |
  Billing complexity is a major driver of refund requests and
  cancellations. Clear, fair billing reduces support tickets and
  builds trust.

  Part 1: Proration scenarios

  For "ToolKit Pro" — a project management SaaS:
  Plans: Basic ($10/mo), Pro ($25/mo), Enterprise ($60/mo)
  Billing cycle: 1st of each month

  Handle these billing scenarios:

  1. Mid-cycle upgrade (Basic → Pro on the 15th):
     - Calculate the prorated charge
     - Explain the billing to the customer
     - Handle: "Why am I being charged twice this month?"

  2. Mid-cycle downgrade (Pro → Basic on the 10th):
     - Calculate credit or immediate change
     - Policy decision: credit now or apply at renewal?
     - Handle: "I want the price difference refunded immediately"

  3. Plan change with annual billing:
     Customer on Pro Annual ($250/year, paid 4 months ago) wants
     to upgrade to Enterprise Annual ($600/year).
     - Calculate the upgrade cost
     - Handle: "I already paid for the year, I shouldn't pay more"

  4. Failed renewal after plan change:
     Customer upgraded mid-cycle, payment failed on renewal, they
     want to go back to old plan at old price.
     - Determine the fair resolution
     - Write the customer communication

  Part 2: Billing dispute prevention

  Design a billing communication system:
  1. Pre-charge notifications (what, when, how much)
  2. Clear invoice design with line-item explanations
  3. Self-service billing portal features
  4. Proactive communication for price changes
  5. Billing FAQ that prevents common support tickets

  Part 3: Complex billing scenario

  Customer says: "I was on Basic, upgraded to Pro on March 15,
  then downgraded back to Basic on March 22. My invoice shows
  $18.50 and I have no idea why. I want a refund."

  Walk through the math, explain each charge, and determine
  whether a refund is warranted.

assertions:
  - type: llm_judge
    criteria: "Proration calculations are mathematically correct — the mid-cycle charges and credits are calculated accurately with clear day-count math"
    weight: 0.30
    description: "Correct proration math"
  - type: llm_judge
    criteria: "Customer explanations are clear — billing math is presented in simple terms the customer can verify, not just stated as a final number"
    weight: 0.25
    description: "Clear billing explanations"
  - type: llm_judge
    criteria: "The complex scenario walkthrough breaks down each charge step-by-step — Basic for 14 days, Pro for 7 days, back to Basic for remaining days"
    weight: 0.25
    description: "Step-by-step billing breakdown"
  - type: llm_judge
    criteria: "Billing dispute prevention is proactive — it addresses root causes of confusion rather than just handling complaints after they arise"
    weight: 0.20
    description: "Proactive dispute prevention"
