meta:
  id: chargeback-prevention-program
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Build a comprehensive chargeback prevention program — implement alerts, descriptor optimization, evidence collection, and proactive outreach to reduce dispute rates"
  tags: [support, chargeback, prevention, fraud, alerts, advanced]

state: {}

trigger: |
  Chargeback prevention is cheaper than representment. A
  comprehensive program combines technology, process, and
  communication to stop disputes before they happen.

  Part 1: Chargeback prevention audit

  "ShopNow" — an e-commerce platform:
  Monthly transaction volume: 150,000
  Current chargeback rate: 0.95% (approaching 1% danger zone)
  Chargeback breakdown by reason:
  - Fraud (unauthorized): 35%
  - Product not received: 25%
  - Product not as described: 20%
  - Duplicate/incorrect charge: 10%
  - Subscription not cancelled: 10%

  Monthly chargeback cost:
  - Disputed amount: $142,500
  - Chargeback fees: $37,500 ($25/chargeback)
  - Operational cost (evidence gathering): $22,500
  - Total monthly cost: $202,500

  1. For each chargeback category, design prevention measures:

     Fraud (unauthorized) — 35%:
     - 3D Secure implementation strategy
     - AVS/CVV verification requirements
     - Velocity checks and fraud scoring
     - Device fingerprinting considerations

     Product not received — 25%:
     - Shipping confirmation and tracking automation
     - Proactive delivery updates
     - Delivery signature requirements (threshold?)
     - "Where's my order" self-service portal

     Product not as described — 20%:
     - Product listing accuracy program
     - Customer expectation management
     - Photo/description quality standards
     - Pre-purchase information requirements

     Subscription not cancelled — 10%:
     - Clear cancellation process
     - Renewal reminders before charge
     - Easy self-service cancellation
     - Billing descriptor clarity

  2. Implement chargeback alert services:
     Design the workflow for Verifi/Ethoca alert integration:
     - Alert received → auto-refund threshold decision
     - Alert received → agent review workflow
     - Response time requirements (24-72 hours)
     - Cost-benefit analysis (alert fee vs. chargeback fee)

  3. Descriptor optimization:
     Current descriptor: "SHOPNOW*12345"
     Design an improved descriptor strategy that:
     - Is immediately recognizable on statements
     - Includes contact information
     - Reduces "I don't recognize this charge" disputes

  4. Build the prevention dashboard:
     Design monitoring for:
     - Real-time chargeback rate tracking
     - Early warning system (rate approaching thresholds)
     - Reason code trend analysis
     - Prevention measure effectiveness

assertions:
  - type: llm_judge
    criteria: "Prevention measures are category-specific — each chargeback reason gets targeted prevention strategies, not generic 'improve customer service' advice"
    weight: 0.30
    description: "Category-specific prevention"
  - type: llm_judge
    criteria: "Alert service workflow includes cost-benefit analysis — auto-refunding on alerts vs. fighting chargebacks is evaluated based on dispute amount and win probability"
    weight: 0.25
    description: "Cost-benefit alert workflow"
  - type: llm_judge
    criteria: "Descriptor optimization is practical — the improved descriptor helps customers recognize charges and includes a way to contact support before filing a dispute"
    weight: 0.25
    description: "Practical descriptor improvement"
  - type: llm_judge
    criteria: "The dashboard includes early warning thresholds — monitoring catches rate increases before they hit card network thresholds (1% Visa, 1.5% excessive)"
    weight: 0.20
    description: "Early warning monitoring"
