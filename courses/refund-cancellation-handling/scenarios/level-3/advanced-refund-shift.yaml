meta:
  id: advanced-refund-shift
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Simulate an advanced refund shift with complex edge cases — handle multi-system failures, policy conflicts, cross-border complications, and time-sensitive escalations"
  tags: [support, refund, simulation, shift, edge-cases, advanced]

state: {}

trigger: |
  You're a senior refund specialist at "OmniCommerce" — a global
  marketplace with both direct sales and third-party sellers.
  Your authority: refunds up to $500. Escalation required above.

  Today's shift brings a cascade of complex situations:

  Queue (handle in priority order):

  1. URGENT — Payment processor outage:
     Stripe webhook failures for the last 2 hours. 47 refunds
     approved but not processed. Customers are calling.
     - Triage: communicate to affected customers
     - Workaround: alternative processing method?
     - Escalation: who needs to know about this?

  2. Third-party seller dispute:
     Customer wants refund for $340 item from seller "TechDeals."
     Seller claims item was shipped correctly. Customer says
     wrong item received. Photos show a different product.
     - Marketplace liability: who is responsible?
     - Customer refund: process from marketplace guarantee?
     - Seller recovery: how to recoup from seller?

  3. Regulatory deadline:
     EU customer filed formal complaint with consumer protection
     authority 8 days ago. Response required within 10 business
     days. Original refund denied for "opened software."
     - Review: was the denial correct under EU law?
     - Action: what needs to happen before the deadline?
     - Documentation: what evidence to compile?

  4. VIP account review:
     Enterprise customer ($120K annual spend) has had 3 refund
     issues in the past month. Account manager is concerned
     they may churn. All 3 refund requests were denied per policy.
     - Review all 3 denials for correctness
     - Determine if goodwill exceptions are warranted
     - Write the account recovery plan

  5. Fraud ring detection:
     QA flagged 12 refunds processed yesterday that match a
     pattern: all shipped to the same forwarding address, purchased
     with different stolen credit cards, refunds requested before
     delivery with "changed mind" reason.
     - Assess the damage (how much was refunded?)
     - Determine if refunds can be reversed
     - Document the fraud pattern for prevention
     - Escalate to fraud team with evidence package

  6. Product recall refund batch:
     Safety team just notified: a kitchen appliance ($89) has
     been recalled for fire risk. 2,300 units sold. Need to
     proactively contact all customers and offer full refunds.
     - Design the communication plan
     - Set up the batch refund process
     - Estimate the financial impact
     - Coordinate with safety, legal, and finance teams

  Handle all 6 situations. End with a shift summary including
  all escalations, financial impact, and follow-up actions.

assertions:
  - type: llm_judge
    criteria: "Payment processor outage is handled with customer communication priority — affected customers are notified proactively with timeline, and an alternative processing method is identified or escalated"
    weight: 0.25
    description: "Outage crisis management"
  - type: llm_judge
    criteria: "EU regulatory deadline is treated with urgency — the response identifies that 'opened software' may not be valid grounds for denial under EU digital content rules and takes corrective action before the deadline"
    weight: 0.25
    description: "Regulatory deadline urgency"
  - type: llm_judge
    criteria: "Fraud ring evidence is packaged comprehensively — the pattern documentation includes all linked transactions, common attributes, and a clear fraud narrative for the investigation team"
    weight: 0.25
    description: "Comprehensive fraud evidence"
  - type: llm_judge
    criteria: "Product recall is handled proactively — all 2,300 customers are contacted (not waiting for them to find out), with clear safety messaging and frictionless refund process"
    weight: 0.25
    description: "Proactive recall handling"
