meta:
  id: international-refund-compliance
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Navigate international refund compliance — handle multi-jurisdiction refund laws, currency conversion, cross-border returns, and region-specific consumer protection requirements"
  tags: [support, refund, compliance, international, legal, advanced]

state: {}

trigger: |
  International refund compliance requires navigating different
  consumer protection laws, currencies, and return logistics across
  multiple jurisdictions simultaneously.

  Part 1: Jurisdiction-specific requirements

  For "GlobalGear" — an online retailer shipping to 40+ countries:

  Handle refund requests from each jurisdiction correctly:

  1. EU customer (Germany):
     Purchased online 12 days ago, wants to return. "I changed my mind."
     - Apply EU Consumer Rights Directive (14-day withdrawal)
     - Customer must bear return shipping costs (if stated in T&Cs)
     - Refund must be processed within 14 days of return receipt
     - Write the response with correct legal obligations

  2. Australian customer:
     Product (headphones, $89 AUD) stopped working after 3 months.
     "Your warranty says 1 year but I want a refund, not a repair."
     - Apply Australian Consumer Law (consumer guarantees)
     - Major vs. minor failure determines remedy choice
     - Customer chooses remedy for major failures
     - Determine if this qualifies and write the response

  3. UK customer (post-Brexit):
     Purchased from EU-based company, 16 days ago, wants to return.
     - Apply UK Consumer Contracts Regulations (14-day right)
     - Handle any customs/duties refund implications
     - Write the response noting UK-specific requirements

  4. Canadian customer (Quebec):
     Product doesn't match online description. Customer wants refund.
     - Apply Quebec Consumer Protection Act
     - Goods must conform to description — strict liability
     - Write the response acknowledging provincial law

  Part 2: Currency and cross-border complications

  Handle these scenarios:
  1. Customer paid $100 USD, exchange rate changed, refund in EUR
     is now worth more/less. Who bears the exchange rate risk?
  2. Customer paid import duties/taxes. Are you obligated to refund
     those as well? (Varies by jurisdiction)
  3. Customer wants refund to a different payment method than
     original purchase (different country bank account)
  4. Cross-border return shipping: who pays? How to handle
     returns that get stuck in customs?

  Part 3: Build a compliance matrix

  Create a reference matrix for the top 10 markets covering:
  - Cooling-off period (days)
  - Who bears return shipping cost
  - Refund processing deadline
  - Digital goods exceptions
  - Key statute/law reference

assertions:
  - type: llm_judge
    criteria: "EU withdrawal rights are applied correctly — 14-day cooling-off period from delivery, refund within 14 days of return, and return shipping cost allocation is correctly explained"
    weight: 0.30
    description: "Correct EU compliance"
  - type: llm_judge
    criteria: "Australian Consumer Law is applied correctly — consumer guarantees override manufacturer warranty, and major failure gives the customer choice of remedy"
    weight: 0.25
    description: "Correct Australian law application"
  - type: llm_judge
    criteria: "Currency and cross-border complications are handled fairly — exchange rate risk allocation is clear, and duties/taxes refund obligations are jurisdiction-aware"
    weight: 0.25
    description: "Fair cross-border handling"
  - type: llm_judge
    criteria: "The compliance matrix covers meaningful differences between jurisdictions — not just listing the same policy for every country"
    weight: 0.20
    description: "Differentiated compliance matrix"
