meta:
  id: advanced-fraud-detection
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Detect and prevent refund fraud at scale — identify wardrobing, serial returners, friendly fraud, and organized refund abuse using behavioral patterns and data analysis"
  tags: [support, refund, fraud, detection, abuse-prevention, advanced]

state: {}

trigger: |
  Refund fraud costs retailers $101 billion annually. Beyond
  obvious fraud, many losses come from "friendly fraud" — customers
  who abuse lenient return policies without technically lying.

  Part 1: Fraud pattern recognition

  For "MegaRetail" — a large e-commerce retailer:

  Analyze these customer profiles and identify fraud indicators:

  Profile A: "The Wardrobing Suspect"
  - 28 purchases in 6 months, average $85
  - 24 returns (86% return rate)
  - Most returns are clothing, returned on day 13 of 14-day window
  - Items returned in "like new" condition
  - All purchases made before weekends/events
  - No warranty claims, no complaints about quality

  Profile B: "The Friendly Fraud Pattern"
  - 12 purchases in 3 months, 3 chargebacks
  - Chargebacks filed as "unauthorized" but shipping address matches
  - All 3 chargebacks were for delivered items with tracking
  - Customer continued purchasing after filing chargebacks
  - Medium-value items ($50-150 range)

  Profile C: "The Serial Complainer"
  - 45 purchases in 12 months, 22 partial refunds
  - Always claims items "arrived damaged" or "not as described"
  - Never returns the item (keeps it with partial refund)
  - Escalates to supervisor for every refund request
  - Threatens negative reviews if refund isn't given

  Profile D: "The Policy Exploiter"
  - Uses multiple accounts to circumvent return limits
  - Ships to P.O. boxes and forwarding addresses
  - Buys with gift cards to avoid credit card linking
  - Returns using different shipping methods
  - Creates accounts with variations of same email

  For each profile:
  1. Identify the specific fraud pattern
  2. Assess the confidence level (definite, probable, possible)
  3. Recommend the appropriate response
  4. Design prevention rules

  Part 2: Build a fraud scoring model

  Design a refund fraud risk scoring system:
  - Input signals (return rate, timing patterns, value patterns,
    account age, complaint history, etc.)
  - Scoring methodology (point-based or tiered)
  - Threshold definitions (low, medium, high risk)
  - Actions per risk tier
  - False positive mitigation

  Part 3: Ethical considerations

  Address the balance between fraud prevention and customer trust:
  - When does fraud detection become customer harassment?
  - How to handle legitimate high-return customers (e.g., sizing
    issues, gifts buying) without flagging them as fraudsters
  - Bias considerations in fraud detection algorithms
  - Transparency obligations — should customers know they're scored?

assertions:
  - type: llm_judge
    criteria: "Each fraud profile is analyzed with specific pattern indicators — the analysis goes beyond 'high return rate' to identify behavioral signatures like timing patterns and escalation tactics"
    weight: 0.30
    description: "Specific behavioral indicators"
  - type: llm_judge
    criteria: "Fraud scoring model uses multiple signals — it combines return rate, timing, value, account behavior, and complaint patterns rather than relying on any single metric"
    weight: 0.25
    description: "Multi-signal fraud scoring"
  - type: llm_judge
    criteria: "Responses are proportional to confidence — definite fraud gets stronger action than possible fraud, with escalation paths for ambiguous cases"
    weight: 0.25
    description: "Proportional fraud responses"
  - type: llm_judge
    criteria: "Ethical considerations are substantive — the analysis addresses false positives, bias, and legitimate high-return customers, not just lip service to fairness"
    weight: 0.20
    description: "Substantive ethical analysis"
