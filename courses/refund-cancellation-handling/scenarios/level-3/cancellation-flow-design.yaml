meta:
  id: cancellation-flow-design
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Design effective cancellation flows — build retention-optimized cancellation experiences that balance ease of cancellation with meaningful save opportunities"
  tags: [support, cancellation, flow-design, retention, ux, advanced]

state: {}

trigger: |
  Cancellation flow design is a balance between making it easy
  enough to comply with regulations (FTC, EU) and creating
  meaningful touchpoints to understand why customers leave and
  offer relevant alternatives.

  Part 1: Cancellation flow audit

  "FitTrack" — a fitness app ($12.99/mo, 500K subscribers) has
  this current cancellation flow:
  1. Settings → Account → Cancel Subscription
  2. "Are you sure?" confirmation dialog
  3. Cancellation processed immediately
  4. Generic "We're sorry to see you go" email

  Current metrics:
  - Cancel page visits/month: 15,000
  - Cancellation completions: 12,500 (83% completion rate)
  - Save rate: 0% (no retention attempts)
  - Resubscription rate (90 days): 8%

  Audit this flow and identify missed opportunities.

  Part 2: Redesign the cancellation flow

  Design an optimized flow with these stages:

  1. Reason collection:
     - Design reason options (not too many, not too few)
     - Make it genuine research, not a barrier
     - Include free-text option
     Write the UI copy for this screen.

  2. Targeted save offers based on reason:
     - "Too expensive" → show lower tier or annual discount
     - "Not using enough" → show usage tips or pause option
     - "Missing features" → show roadmap or workaround
     - "Found alternative" → show competitive comparison
     - "Technical issues" → offer immediate support escalation
     Write the save offer copy for each reason.

  3. Pause option:
     - Offer 1-month or 3-month pause as alternative
     - Explain what happens during pause (data preserved, etc.)
     - Design the pause communication sequence

  4. Confirmation and offboarding:
     - Clear confirmation of what happens (data, billing, access)
     - Final save offer (limited — not dark pattern)
     - Graceful exit with door left open
     Write the confirmation screen and exit email.

  Part 3: Regulatory compliance check

  Ensure the redesigned flow complies with:
  - FTC "click-to-cancel" principles (easy as signing up)
  - EU consumer protection (no undue barriers)
  - California auto-renewal law (AB-390)
  - Dark pattern avoidance (no shame tactics, hidden buttons,
    or excessive friction)

  Identify any elements in your design that might cross the line
  from legitimate retention into dark patterns.

  Part 4: Measure the redesigned flow

  Define metrics to track:
  - Save rate by reason and offer type
  - Time to cancel (should not increase dramatically)
  - Customer satisfaction with cancellation experience
  - Resubscription rate comparison
  - Regulatory complaint rate

assertions:
  - type: llm_judge
    criteria: "Save offers are reason-specific — each cancellation reason gets a targeted offer that addresses the actual concern, not a generic discount"
    weight: 0.30
    description: "Reason-targeted save offers"
  - type: llm_judge
    criteria: "Regulatory compliance is genuinely addressed — the flow is easy to complete, doesn't use dark patterns, and cancellation is achievable in a comparable number of steps to signup"
    weight: 0.25
    description: "Genuine regulatory compliance"
  - type: llm_judge
    criteria: "The pause option is well-designed — it's presented as a genuine alternative with clear terms, not as a way to delay the inevitable"
    weight: 0.25
    description: "Well-designed pause option"
  - type: llm_judge
    criteria: "Dark pattern analysis is honest — the response identifies potential areas where retention tactics could cross the line and draws a clear boundary"
    weight: 0.20
    description: "Honest dark pattern analysis"
