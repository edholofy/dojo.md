meta:
  id: refund-automation-workflows
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Design and implement refund automation workflows — build rules engines, approval chains, exception handling, and self-service refund systems that scale"
  tags: [support, refund, automation, workflow, rules-engine, advanced]

state: {}

trigger: |
  Manual refund processing doesn't scale. Automating routine refunds
  while maintaining appropriate oversight for exceptions reduces
  processing time from days to minutes.

  Part 1: Refund rules engine design

  For "QuickMart" — an e-commerce platform processing 2,000
  refund requests per day:

  Current state: all refunds manually reviewed by agents
  - Average processing time: 2.3 days
  - Agent time per refund: 12 minutes
  - Customer satisfaction with refund process: 3.2/5
  - Cost per refund processed: $8.50

  Design the automation rules:

  1. Auto-approve rules (no human review needed):
     Define criteria for instant approval, considering:
     - Order value thresholds
     - Return window compliance
     - Customer history and trust score
     - Product category (digital vs. physical)
     - Reason code mapping
     - Fraud risk indicators

  2. Auto-approve with notification (agent informed, not blocking):
     Define the middle tier where refunds process but agents
     are notified for pattern monitoring.

  3. Manual review required:
     Define what always requires human judgment:
     - High-value refunds
     - Repeat refund patterns
     - Fraud flags
     - Policy exceptions
     - Partial refund calculations

  Part 2: Self-service refund portal

  Design the customer-facing self-service refund flow:
  1. Eligibility check (automated)
  2. Reason selection with guided troubleshooting
  3. Resolution options presented (refund, exchange, credit)
  4. Return label generation (if applicable)
  5. Instant refund processing for qualified requests
  6. Status tracking and communication

  Part 3: Exception handling

  Design the workflow for these exceptions:
  1. Customer requests refund but item hasn't been returned yet
  2. Auto-approved refund triggered fraud alert after processing
  3. Customer disputes the automated refund amount (partial vs. full)
  4. System auto-approved a refund that should have been denied
  5. Bulk refund needed due to product recall

  Part 4: Metrics and optimization
  Define KPIs for the automated system:
  - Automation rate (% processed without human touch)
  - False positive rate (auto-denied that should have been approved)
  - False negative rate (auto-approved that should have been denied)
  - Processing time (automated vs. manual)
  - Customer satisfaction by channel

assertions:
  - type: llm_judge
    criteria: "Auto-approve rules are specific and risk-aware — they combine multiple signals (value, history, reason, product type) rather than using a single threshold"
    weight: 0.30
    description: "Multi-signal automation rules"
  - type: llm_judge
    criteria: "The three-tier system (auto-approve, approve-with-notify, manual) appropriately segments by risk — routine low-risk refunds are automated, edge cases get human review"
    weight: 0.25
    description: "Risk-segmented approval tiers"
  - type: llm_judge
    criteria: "Exception handling covers post-approval issues — what happens when automation makes a wrong decision is addressed, not just the happy path"
    weight: 0.25
    description: "Post-approval exception handling"
  - type: llm_judge
    criteria: "Self-service portal design guides customers toward the right resolution — troubleshooting before refund, exchange offers, and clear status communication"
    weight: 0.20
    description: "Guided self-service design"
