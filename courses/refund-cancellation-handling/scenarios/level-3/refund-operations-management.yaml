meta:
  id: refund-operations-management
  level: 3
  course: refund-cancellation-handling
  type: output
  description: "Manage refund operations at scale — handle team training, quality assurance, process documentation, and operational efficiency for high-volume refund teams"
  tags: [support, refund, operations, management, training, advanced]

state: {}

trigger: |
  Running a refund operations team requires balancing speed,
  accuracy, customer satisfaction, and cost control — while
  ensuring consistent policy application across all agents.

  Part 1: Team structure and training

  "RetailPrime" has a 25-person refund team processing 800
  refund requests per day:

  Current performance:
  - Average handle time: 14 minutes per refund
  - First-contact resolution: 72%
  - Refund accuracy rate: 89% (11% errors)
  - Customer satisfaction: 3.8/5
  - Agent turnover: 35% annually

  1. Design the team structure:
     - Tiered agents (junior, senior, specialist) with clear
       escalation paths
     - Authority levels by tier (what can each level approve?)
     - Staffing model for daily volume patterns
     - Coverage for peak periods (holidays, sales events)

  2. Build the training program:
     Week 1: Policy fundamentals and system training
     Week 2: Common scenarios with shadowing
     Week 3: Supervised processing with feedback
     Week 4: Independent processing with QA review
     Design the curriculum with specific topics and exercises
     for each week.

  3. Quality assurance program:
     - Define QA criteria (policy compliance, communication quality,
       math accuracy, customer outcome)
     - Sampling methodology (random + targeted)
     - QA scorecard design
     - Feedback and coaching cadence
     - Calibration sessions (ensuring QA consistency)

  Part 2: Process documentation

  Write the standard operating procedure for:
  1. Standard refund processing (step-by-step)
  2. Refund denial with customer communication
  3. Exception request with manager approval
  4. Chargeback response with evidence gathering
  5. Bulk refund processing for product recalls

  Include decision trees for common scenarios.

  Part 3: Operational efficiency

  Analyze and improve:
  - Average handle time: identify what takes the most time
  - Refund accuracy: root cause analysis of the 11% error rate
  - First-contact resolution: why are 28% requiring follow-up?
  - Agent satisfaction: how to reduce 35% turnover

  Set improvement targets and specific actions for each metric.

assertions:
  - type: llm_judge
    criteria: "Team structure includes clear authority levels — junior agents handle routine refunds, senior agents handle exceptions, specialists handle fraud and chargebacks, with defined dollar thresholds"
    weight: 0.25
    description: "Clear authority tiers"
  - type: llm_judge
    criteria: "Training program is progressive — it builds skills week by week from observation to supervised to independent, with specific competency checks at each stage"
    weight: 0.25
    description: "Progressive training design"
  - type: llm_judge
    criteria: "QA program includes calibration — it ensures multiple QA reviewers grade consistently, not just that reviews happen"
    weight: 0.25
    description: "Calibrated QA program"
  - type: llm_judge
    criteria: "Operational efficiency analysis identifies root causes — the 11% error rate and 28% non-FCR are investigated for underlying issues, not just flagged as metrics to improve"
    weight: 0.25
    description: "Root cause efficiency analysis"
