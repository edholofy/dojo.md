meta:
  id: refund-communication
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Master refund communication — write clear, empathetic refund and cancellation messages that maintain customer trust"
  tags: [support, refund, communication, empathy, tone, beginner]

state: {}

trigger: |
  How you communicate a refund decision matters as much as the
  decision itself. A refund delivered with empathy strengthens
  the relationship; a refund delivered coldly feels transactional.

  Part 1: Communication principles
  1. Lead with empathy, not policy
  2. Confirm the specific amount and method
  3. Set clear expectations for timing
  4. Apologize for the inconvenience when appropriate
  5. Don't over-explain or justify policy excessively
  6. End with a forward-looking statement

  Part 2: Write refund communications

  1. Approval email — full refund:
  Customer ordered a laptop bag that arrived with a broken zipper.
  You're issuing a full refund of $89. The customer doesn't need
  to return the defective item.
  Write the refund confirmation email.

  2. Approval email — partial refund:
  Customer signed up for an annual SaaS plan ($480/year) and wants
  to cancel after 3 months. Per policy, they receive a prorated
  refund of $360 minus a $50 early cancellation fee = $310.
  Write the email explaining the calculation clearly.

  3. Denial with alternative:
  Customer wants a refund on a concert ticket purchased 2 days
  ago. Your policy clearly states "all ticket sales are final."
  However, you can offer a ticket exchange for a different date.
  Write the denial email that offers the alternative positively.

  4. Delayed refund update:
  A customer was promised their refund would process within 5
  business days. It's been 7 days and the refund hasn't appeared
  yet due to a payment processing delay.
  Write the proactive update email.

  5. Refund confirmation follow-up:
  A week after processing a refund, you want to check that the
  customer received it and ask if there's anything else you can
  help with.
  Write the follow-up email.

assertions:
  - type: llm_judge
    criteria: "The full refund email leads with empathy about the broken zipper — it doesn't start with 'per our policy' but acknowledges the frustrating experience"
    weight: 0.25
    description: "Empathy-first communication"
  - type: llm_judge
    criteria: "The partial refund calculation is transparent — the customer can verify $480 - (3 months × $40) - $50 fee = $310"
    weight: 0.25
    description: "Transparent calculation"
  - type: llm_judge
    criteria: "The ticket denial is positive — the exchange alternative is presented as a benefit, not a consolation prize"
    weight: 0.25
    description: "Positive denial with alternative"
  - type: llm_judge
    criteria: "The delayed refund update is proactive and honest — it acknowledges the delay before the customer has to chase it"
    weight: 0.25
    description: "Proactive delay communication"
