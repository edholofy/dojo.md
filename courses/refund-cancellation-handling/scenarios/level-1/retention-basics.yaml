meta:
  id: retention-basics
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Learn basic retention techniques — ethically offer alternatives to cancellation without pressuring customers or creating a negative experience"
  tags: [support, retention, cancellation, alternatives, beginner]

state: {}

trigger: |
  Retention during cancellation is a delicate balance. Offering
  genuine alternatives is helpful; pressuring customers to stay
  is harmful. The key is understanding WHY they're leaving and
  whether you have a real solution to their problem.

  Part 1: Ethical retention principles
  1. Always respect the customer's decision to cancel
  2. One genuine offer, maximum two — never more
  3. Match the offer to the cancellation reason
  4. Never make cancellation difficult to find or process
  5. A customer who leaves happy may return; one who leaves
     feeling trapped never will

  Part 2: Retention scenarios

  Scenario 1 — Price-sensitive cancellation:
  "I love your product but $49/month is too much right now. I'm
  cutting costs."
  Available retention offers:
  - Downgrade to basic plan ($19/month)
  - 3-month discount (50% off)
  - Pause subscription for up to 3 months
  Write the retention response offering appropriate alternatives.

  Scenario 2 — Feature gap:
  "I need [specific feature] and you don't have it. [Competitor]
  does."
  Available retention offers:
  - Feature is on the roadmap (shipping in ~2 months)
  - Can suggest a workaround for now
  Write the response that honestly shares the roadmap without
  making promises.

  Scenario 3 — Underutilization:
  "I just realized I haven't logged in for 3 months. I should
  cancel since I'm not using it."
  Available retention offers:
  - Free onboarding session to help them get value
  - Downgrade to a lower tier while they evaluate
  Write the response that addresses the underlying issue (not
  getting value) rather than just preventing cancellation.

  Scenario 4 — Made up their mind:
  "I've already switched to [Competitor]. Please just cancel
  my account."
  (No retention offers will help here.)
  Write the response that processes the cancellation gracefully
  without any retention attempt.

  Part 3: Know when NOT to retain
  1. Customer has already moved to a competitor
  2. Customer has expressed frustration with retention attempts
  3. The product genuinely doesn't fit their needs
  4. Customer is in financial distress
  5. Regulatory or legal requirement to process immediately

assertions:
  - type: llm_judge
    criteria: "Retention offers match the cancellation reason — price-sensitive gets discount/downgrade, feature gap gets roadmap info, underutilization gets onboarding help"
    weight: 0.30
    description: "Reason-matched retention offers"
  - type: llm_judge
    criteria: "The already-switched customer gets immediate cancellation — no retention attempt when the customer has clearly made their decision"
    weight: 0.25
    description: "Appropriate no-retention decision"
  - type: llm_judge
    criteria: "The roadmap response is honest — it shares the timeline without guaranteeing the feature, leaving the customer to decide"
    weight: 0.25
    description: "Honest roadmap communication"
  - type: llm_judge
    criteria: "Retention attempts are limited and genuine — maximum one or two offers, not a sales gauntlet"
    weight: 0.20
    description: "Limited genuine retention"
