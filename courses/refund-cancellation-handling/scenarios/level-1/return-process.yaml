meta:
  id: return-process
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Process product returns — handle return requests, issue RMA numbers, provide return instructions, and manage return-to-refund workflow"
  tags: [support, returns, rma, process, e-commerce, beginner]

state: {}

trigger: |
  Product returns are a critical touchpoint in e-commerce. A
  smooth return process builds trust and increases repeat purchases
  — 92% of customers say they'll buy again from a company with
  an easy return process.

  Part 1: Return process fundamentals
  1. Return eligibility check (timeframe, condition, category)
  2. RMA (Return Merchandise Authorization) generation
  3. Return shipping instructions and labels
  4. Return tracking and confirmation
  5. Refund processing after item received
  6. Quality inspection requirements

  Company return policy for "TechShop" (electronics retailer):
  - Standard returns: 30 days from delivery, original packaging
  - Electronics: 15 days, all accessories must be included
  - Opened software/games: exchange only (no refund)
  - Defective items: 90 days, free return shipping
  - Non-defective returns: customer pays return shipping
  - Restocking fee: 15% for opened electronics over $200

  Part 2: Handle return scenarios

  Scenario 1 — Standard return:
  "I bought a wireless keyboard 10 days ago. It works fine but
  I prefer a different brand. I have the box and everything."
  (Keyboard: $79, non-defective return.)
  Process the return with correct policy application.

  Scenario 2 — Defective product return:
  "The laptop I bought 2 months ago keeps overheating and shutting
  down. I've tried all the troubleshooting steps already."
  (Laptop: $899, defective, within 90-day window.)
  Process the return with free return shipping and no restocking fee.

  Scenario 3 — Opened software:
  "I bought this game but it won't run on my computer. The system
  requirements on the box don't match the actual requirements."
  (Game: $59.99, opened software — normally exchange only.)
  Determine if the misleading system requirements warrant an
  exception to the exchange-only policy.

  Scenario 4 — Missing accessories:
  "I want to return these wireless earbuds. I have the earbuds
  but I lost one of the ear tip sets."
  (Earbuds: $149, 12 days old, missing accessory.)
  Handle the missing accessory situation fairly.

  Write the customer response, internal processing steps, and
  return instructions for each scenario.

assertions:
  - type: llm_judge
    criteria: "Each return is processed per policy — the keyboard gets a standard return with customer-paid shipping, the laptop gets free defective return shipping"
    weight: 0.30
    description: "Policy-correct return processing"
  - type: llm_judge
    criteria: "The misleading system requirements case gets an exception — if the product was misrepresented, exchange-only policy doesn't apply"
    weight: 0.25
    description: "Justified policy exception"
  - type: llm_judge
    criteria: "The missing accessory is handled fairly — a small missing item doesn't void the entire return, but may result in a reduced refund"
    weight: 0.25
    description: "Fair missing accessory handling"
  - type: llm_judge
    criteria: "Return instructions are clear and complete — RMA number, shipping address, packaging requirements, and tracking are all included"
    weight: 0.20
    description: "Complete return instructions"
