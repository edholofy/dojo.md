meta:
  id: chargeback-basics
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Understand chargeback fundamentals — learn what chargebacks are, why they happen, and the basic response process"
  tags: [support, chargeback, basics, dispute, payment, beginner]

state: {}

trigger: |
  A chargeback is when a customer disputes a charge directly with
  their bank or credit card company, bypassing your support team.
  Chargebacks cost more than refunds (typically $20-50 in fees
  per chargeback plus the transaction amount), and high chargeback
  rates can result in losing your ability to process payments.

  Part 1: Chargeback fundamentals
  1. How chargebacks work:
     - Customer contacts their bank, not your company
     - Bank issues a provisional credit to the customer
     - You receive a chargeback notification
     - You can accept or dispute (representment)
     - If you dispute, you submit evidence
     - Bank makes a final decision
  2. Common chargeback reasons:
     - Fraud (unauthorized transaction)
     - Product not received
     - Product not as described
     - Duplicate charge
     - Subscription not cancelled
     - Unrecognized charge on statement
  3. Chargeback costs beyond the refund amount:
     - Chargeback fee ($20-50 per dispute)
     - Lost merchandise (if product was delivered)
     - Administrative time to respond
     - Chargeback ratio impact (over 1% risks account termination)

  Part 2: Handle chargeback scenarios

  Scenario 1 — Legitimate chargeback:
  A customer was charged for a subscription they cancelled 2 months
  ago due to a billing system error. They filed a chargeback.
  - Should you accept or dispute this?
  - Write the internal process note
  - Write the customer outreach (proactive apology)

  Scenario 2 — Friendly fraud:
  A customer ordered a product, received it (tracking shows
  delivered), and now filed a chargeback claiming "not received."
  - Should you accept or dispute?
  - What evidence would you gather for representment?
  - Write the representment evidence summary

  Scenario 3 — Unrecognized charge:
  A customer doesn't recognize the charge on their credit card
  statement because your company name appears differently than
  expected (billing descriptor issue).
  - Identify the root cause
  - How could this be prevented?
  - Write the customer response if they contact you first

  Part 3: Chargeback prevention
  1. Clear billing descriptors on statements
  2. Easy-to-find cancellation process
  3. Proactive communication about charges
  4. Responsive customer support (so customers contact you first)

assertions:
  - type: llm_judge
    criteria: "The legitimate chargeback is accepted — fighting a chargeback you caused wastes money and damages the customer relationship"
    weight: 0.30
    description: "Legitimate chargeback acceptance"
  - type: llm_judge
    criteria: "The friendly fraud chargeback is disputed with evidence — delivery tracking is gathered for representment"
    weight: 0.25
    description: "Friendly fraud representment"
  - type: llm_judge
    criteria: "The billing descriptor issue is identified as preventable — the root cause is a confusing statement name, not customer dishonesty"
    weight: 0.25
    description: "Preventable root cause identification"
  - type: llm_judge
    criteria: "Prevention strategies focus on reducing chargebacks at the source — clear descriptors, easy cancellation, and responsive support address root causes"
    weight: 0.20
    description: "Source-level prevention strategies"
