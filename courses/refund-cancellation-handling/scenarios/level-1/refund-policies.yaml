meta:
  id: refund-policies
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Understand and apply refund policies — interpret policy guidelines, handle edge cases, and communicate policy decisions with empathy"
  tags: [support, refund, policy, guidelines, communication, beginner]

state: {}

trigger: |
  Refund policies exist to set expectations, but they're guidelines
  — not scripts. Agents need to understand the spirit of the policy,
  not just the letter, and know when exceptions are appropriate.

  Company refund policy for "ShopSmart" (e-commerce):
  - Full refund: within 30 days, unused/unopened, with receipt
  - Partial refund (50%): within 30 days, opened/used but good
    condition, with receipt
  - Store credit: 31-60 days, any condition, with receipt
  - No refund: after 60 days, no receipt, clearance items
  - Electronics: 15-day return window, must include all accessories
  - Perishables: no returns, but full refund if quality issue
  - Agent authority: full refund up to $50, partial up to $100,
    above $100 requires manager approval

  Apply the policy to these customer requests:

  Scenario 1: "I bought this blender 25 days ago. It's still in
  the box, never opened. Here's my receipt. I'd like a refund."
  (Blender costs $45.)

  Scenario 2: "I bought these headphones 10 days ago. I opened
  them and used them for a week but they're not comfortable.
  I have my receipt." (Headphones cost $89, electronics category.)

  Scenario 3: "I ordered a birthday cake for my daughter and it
  arrived smashed. The party is in 2 hours."
  (Cake cost $65, perishable category.)

  Scenario 4: "I bought this sweater as a gift 50 days ago. My
  friend doesn't like the color. I have the receipt and it still
  has tags on."
  (Sweater costs $40.)

  Scenario 5: "I bought a TV 3 months ago. It just stopped working.
  I don't have the receipt but I paid with my credit card."
  (TV cost $399, electronics category, outside all windows.)

  For each: state the policy-based answer, explain your reasoning,
  and write the customer response. For Scenario 5, consider whether
  a policy exception is appropriate and why.

assertions:
  - type: llm_judge
    criteria: "Policy is applied correctly for standard cases — the blender gets a full refund, the headphones get a partial refund (electronics, opened), the cake gets a full refund (quality issue)"
    weight: 0.30
    description: "Correct standard policy application"
  - type: llm_judge
    criteria: "The smashed cake gets urgent treatment — the quality issue policy applies, and the urgency of the party in 2 hours is addressed"
    weight: 0.25
    description: "Urgent quality issue handling"
  - type: llm_judge
    criteria: "The TV outside warranty is handled thoughtfully — the response considers whether the product should have lasted longer and explores warranty or manufacturer options"
    weight: 0.25
    description: "Thoughtful out-of-policy handling"
  - type: llm_judge
    criteria: "Edge cases are reasoned through — the 50-day sweater with tags is technically store-credit-only, but the reasoning shows policy understanding"
    weight: 0.20
    description: "Reasoned edge case handling"
