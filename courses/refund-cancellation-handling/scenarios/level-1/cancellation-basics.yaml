meta:
  id: cancellation-basics
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Learn the fundamentals of cancellation handling — process cancellation requests professionally while understanding retention opportunities"
  tags: [support, cancellation, basics, subscription, beginner]

state: {}

trigger: |
  Every cancellation request is both a transaction to process and
  an opportunity to understand why a customer is leaving. The goal
  isn't to prevent every cancellation — it's to ensure the customer
  has a positive final experience and to learn from their feedback.

  Part 1: Cancellation fundamentals
  1. Types of cancellation:
     - Immediate cancellation (effective now)
     - End-of-period cancellation (use remaining time)
     - Pause/hold (temporary suspension)
  2. Processing cancellation vs. retention attempt
  3. When to offer alternatives vs. when to just cancel
  4. Making cancellation easy (ethical obligation + legal trend)
  5. The cancellation experience shapes word-of-mouth

  Part 2: Handle cancellation requests

  Scenario 1 — Simple cancellation:
  "I'd like to cancel my subscription please."
  (Monthly plan, $29/month, customer for 4 months.)
  Write the response: confirm the request, ask if there's anything
  you can help with (one gentle retention attempt), process if they
  confirm, provide cancellation details.

  Scenario 2 — Cancellation with reason:
  "I'm cancelling because I'm switching to [Competitor]. Their
  pricing is better and they have the feature I need."
  Write the response: acknowledge the reason, don't argue or
  disparage the competitor, process the cancellation, leave the
  door open for return.

  Scenario 3 — Frustrated cancellation:
  "Just cancel my account. Your product keeps crashing and nobody
  fixes it. I've been patient enough."
  Write the response: validate frustration, acknowledge the issue,
  offer to escalate the bug (without blocking cancellation),
  process if they insist.

  Scenario 4 — Cancellation with data concerns:
  "I want to cancel AND I want all my data deleted. I don't want
  you keeping anything."
  Write the response: process cancellation, explain data retention
  policies (what's kept for legal reasons), explain data export
  options, process deletion request where possible.

  Part 3: Post-cancellation best practices
  1. Confirmation email content
  2. Data export reminders
  3. Account reactivation information
  4. Brief exit survey (2-3 questions max)

assertions:
  - type: llm_judge
    criteria: "Cancellation is processed without making it difficult — the customer isn't guilt-tripped, excessively questioned, or forced through unnecessary steps"
    weight: 0.30
    description: "Friction-free cancellation"
  - type: llm_judge
    criteria: "The competitor mention is handled gracefully — no disparagement of the competitor, just acknowledgment and a positive farewell"
    weight: 0.25
    description: "Graceful competitor acknowledgment"
  - type: llm_judge
    criteria: "The data deletion request is handled with transparency — what can be deleted vs. what must be retained for legal reasons is clearly explained"
    weight: 0.25
    description: "Transparent data handling"
  - type: llm_judge
    criteria: "Each response leaves the door open for return — without being pushy, the customer knows they can come back"
    weight: 0.20
    description: "Open door for return"
