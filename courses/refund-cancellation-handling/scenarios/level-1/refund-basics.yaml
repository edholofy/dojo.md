meta:
  id: refund-basics
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Learn the fundamentals of refund processing — understand refund types, when each is appropriate, and how to communicate refund decisions clearly"
  tags: [support, refund, basics, fundamentals, beginner]

state: {}

trigger: |
  Refunds are one of the most common support interactions. How
  you handle them shapes customer perception of your brand.
  A well-handled refund can retain a customer; a poorly handled
  one guarantees they never return.

  Part 1: Refund types and when to use each
  1. Full refund: return the entire purchase price
     When: defective product, wrong item shipped, service failure
  2. Partial refund: return a portion of the purchase price
     When: partial service delivered, minor quality issues, partial
     use of subscription
  3. Store credit: issue credit for future purchases
     When: customer preference, policy for certain return types,
     exchange not available
  4. Exchange: replace with a different product
     When: wrong size/color, defective item, preference change
  5. Goodwill refund: refund beyond normal policy as gesture
     When: exceptional circumstances, customer loyalty, company error

  Part 2: Process refund requests

  Scenario 1 — Straightforward refund:
  "I ordered a blue sweater but received a green one. I want my
  money back."
  (Policy: full refund for wrong items, no questions asked.)
  Write the refund response including: acknowledgment, apology,
  refund confirmation, timeline, and return instructions.

  Scenario 2 — Partial refund request:
  "I signed up for your annual plan ($120) two months ago. I want
  to cancel and get a refund."
  (Policy: prorated refund for annual plans minus used months.)
  Calculate the refund amount and write the response.

  Scenario 3 — Store credit vs. refund:
  "I want to return this jacket. I bought it 45 days ago."
  (Policy: full refund within 30 days, store credit within 60 days.)
  Write the response explaining store credit and offering it
  positively.

  Scenario 4 — Goodwill consideration:
  "I've been a customer for 3 years. My subscription renewed
  yesterday but I meant to cancel last week. Can I get a refund?"
  (Policy: no refunds after renewal. You have $25 goodwill authority.)
  Write a response that uses good judgment about the goodwill refund.

  Part 3: Refund communication best practices
  1. Always confirm the refund amount and timeline
  2. Explain how the refund will appear (original payment method)
  3. Set expectations for processing time (3-5 business days typical)
  4. Offer to help with anything else
  5. Don't make the customer feel guilty for requesting a refund

assertions:
  - type: llm_judge
    criteria: "Each refund type is applied correctly — wrong item gets full refund, annual plan gets prorated, late return gets store credit, accidental renewal gets goodwill consideration"
    weight: 0.30
    description: "Correct refund type application"
  - type: llm_judge
    criteria: "The prorated calculation is correct — 10 months remaining of $120 annual plan means approximately $100 refund"
    weight: 0.25
    description: "Correct prorated calculation"
  - type: llm_judge
    criteria: "The goodwill refund shows good judgment — a 3-year customer who missed cancellation by one day deserves the goodwill gesture"
    weight: 0.25
    description: "Appropriate goodwill judgment"
  - type: llm_judge
    criteria: "Responses include processing timeline and method — the customer knows when and how they'll receive their refund"
    weight: 0.20
    description: "Clear processing expectations"
