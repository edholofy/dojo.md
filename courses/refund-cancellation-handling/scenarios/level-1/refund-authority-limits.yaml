meta:
  id: refund-authority-limits
  level: 1
  course: refund-cancellation-handling
  type: output
  description: "Work within refund authority limits — understand your approval level, when to escalate, and how to communicate when a refund exceeds your authority"
  tags: [support, refund, authority, limits, escalation, beginner]

state: {}

trigger: |
  Most support teams have tiered refund authority to control costs
  and ensure oversight for large amounts. Knowing your limits and
  how to handle requests that exceed them is essential.

  Your refund authority structure:
  - L1 agent (you): up to $50 immediate, up to $100 with reason
  - L2 senior: up to $250
  - Team lead: up to $500
  - Manager: up to $2,000
  - Director: unlimited

  Part 1: Handle refund requests at various levels

  Scenario 1 — Within your authority:
  "I need a refund for this $35 item that arrived damaged."
  Process immediately — this is within your $50 authority.
  Write the response confirming the refund.

  Scenario 2 — Within your extended authority:
  "I've been double-charged $89. I need both charges reversed."
  This is $89 (within your $100 with-reason authority). Document
  the reason (billing system double-charge) and process.
  Write the response.

  Scenario 3 — Needs escalation:
  "I want a refund for my entire last quarter of service — $450."
  This exceeds your authority. You need a team lead's approval.
  Write the customer response (don't promise the refund, but don't
  create unnecessary friction either). Write the escalation note.

  Scenario 4 — Urgent but above authority:
  "I was charged $1,200 for a product I returned 3 weeks ago. Your
  system shows the return was received but the refund never
  processed. I need this TODAY."
  This requires manager approval. But the customer is rightfully
  upset about a clear error.
  Write the response that addresses urgency while escalating
  appropriately. How do you get fast approval?

  Scenario 5 — Customer asks why you can't just refund:
  "Why do you need to ask someone? Just give me my money back.
  It's YOUR mistake."
  Write the response that explains the process without making
  the customer feel like they're being interrogated.

  Part 2: Best practices for authority limits
  1. Never tell the customer your exact limit ("I can only do $50")
  2. Frame escalation positively ("Let me get this approved")
  3. Provide timeline for escalated approvals
  4. Follow up proactively once approved

assertions:
  - type: llm_judge
    criteria: "Within-authority refunds are processed immediately — the $35 and $89 refunds don't get unnecessary escalation"
    weight: 0.25
    description: "Immediate within-authority processing"
  - type: llm_judge
    criteria: "The $1,200 error gets urgent escalation — a clear company error of this size shouldn't wait in a normal approval queue"
    weight: 0.25
    description: "Urgent error escalation"
  - type: llm_judge
    criteria: "Escalation is framed positively — 'I'm getting this approved quickly' rather than 'I don't have authority'"
    weight: 0.25
    description: "Positively framed escalation"
  - type: llm_judge
    criteria: "The customer questioning your authority gets a professional response — the explanation is brief and doesn't expose internal limits"
    weight: 0.25
    description: "Professional authority explanation"
