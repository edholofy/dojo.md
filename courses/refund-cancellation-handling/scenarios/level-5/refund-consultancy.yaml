meta:
  id: refund-consultancy
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Act as a refund operations consultant — diagnose systemic issues, design transformation programs, and deliver recommendations that fundamentally reshape how organizations handle refunds and cancellations"
  tags: [support, refund, consultancy, transformation, strategy, mastery]

state: {}

trigger: |
  You're a senior consultant specializing in refund and cancellation
  operations. A Fortune 500 retail company has engaged you for a
  comprehensive assessment.

  Client: "MegaStyle" — fashion retail ($4.2B annual revenue)
  - 180 stores + major e-commerce presence
  - 12M transactions annually, 2.8M returns (23% return rate)
  - Return processing cost: $58M annually
  - Lost revenue from returns: $840M annually
  - Customer satisfaction with returns: 2.9/5
  - Online return rate: 35% (vs 8% in-store)
  - Free returns policy (company pays shipping)
  - Average return processing time: 11 days (online)
  - Wardrobing/fraud estimated at 8% of returns
  - Chargeback rate: 1.1% (in Visa monitoring program)

  CEO's mandate: "Our return costs are eating our margins. But I
  don't want to make returns harder — I want to make them smarter.
  Fix this in 12 months."

  Deliverables:

  1. Diagnostic assessment (Week 1-3):
     - Root cause analysis: why is the return rate 23% (industry: 16%)?
     - Channel analysis: why is online 35% vs in-store 8%?
     - Cost breakdown: where are the $58M processing costs?
     - Fraud assessment: validate the 8% wardrobing estimate
     - Customer segmentation: who returns most and why?
     - Competitive benchmarking: how do top performers do it?
     Present findings with data-driven insights.

  2. Strategic recommendations (Week 4-6):
     Design a transformation program with 5-7 strategic initiatives:
     - Each initiative: description, expected impact, investment,
       timeline, risk, dependencies
     - Prioritize by impact vs. effort
     - Total program investment and expected ROI
     - Quick wins (0-3 months) vs structural changes (6-12 months)

  3. Implementation roadmap (Week 7-8):
     - Phase 1 (months 1-3): Foundation and quick wins
     - Phase 2 (months 4-6): Core transformation
     - Phase 3 (months 7-9): Technology and automation
     - Phase 4 (months 10-12): Optimization and measurement
     - Governance: steering committee, KPI tracking, risk management
     - Change management: stakeholder engagement, training, communication

  4. Financial model (throughout):
     - Current state cost model
     - Target state cost model
     - Investment required per phase
     - Expected savings per initiative
     - Breakeven analysis
     - 3-year NPV of the transformation

assertions:
  - type: llm_judge
    criteria: "Diagnostic identifies the online vs in-store gap driver — the analysis explains WHY online returns are 35% vs 8% in-store (sizing uncertainty, expectation gaps, bracketing behavior) with specific evidence"
    weight: 0.25
    description: "Channel gap root cause"
  - type: llm_judge
    criteria: "Strategic recommendations are prioritized by impact vs. effort — initiatives are plotted on a 2x2 matrix with clear rationale for sequencing, not just a list of good ideas"
    weight: 0.25
    description: "Impact-effort prioritization"
  - type: llm_judge
    criteria: "Financial model is rigorous — the 3-year NPV includes realistic assumptions, sensitivity analysis, and acknowledges that not all benefits are immediate"
    weight: 0.25
    description: "Rigorous financial model"
  - type: llm_judge
    criteria: "Implementation roadmap addresses change management — the plan acknowledges that policy and technology changes require people to adopt new behaviors, with training and communication plans"
    weight: 0.25
    description: "Change management inclusion"
