meta:
  id: refund-ecosystem-design
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Design the refund ecosystem — integrate returns logistics, payment processing, fraud prevention, customer experience, and analytics into a cohesive platform that creates competitive advantage"
  tags: [support, refund, ecosystem, platform, integration, mastery]

state: {}

trigger: |
  A refund ecosystem goes beyond processing individual returns. It's
  an integrated platform where logistics, payments, fraud detection,
  customer experience, and analytics work together to optimize every
  refund interaction.

  Part 1: Ecosystem architecture

  You're the Chief Customer Officer at "OmniMart" ($1.8B revenue),
  tasked with building a world-class refund ecosystem.

  Current fragmented state:
  - Returns logistics: outsourced to 3PL (poor visibility)
  - Payment processing: handled by finance (different system)
  - Fraud detection: manual review by security team
  - Customer experience: basic chatbot + call center
  - Analytics: monthly Excel reports from each team
  - No data sharing between systems
  - Each team optimizes their own metrics, often conflicting

  Design the integrated ecosystem:

  1. Platform architecture:
     - Core refund orchestration engine (central brain)
     - Returns logistics integration (real-time tracking)
     - Payment processing layer (multi-processor, multi-currency)
     - Fraud detection engine (ML-powered, real-time)
     - Customer experience layer (omnichannel)
     - Analytics and intelligence layer (unified data)
     - API layer for partner integration

     Draw the architecture with data flows and integration points.

  2. Data integration strategy:
     - Customer data: unified profile across all touchpoints
     - Transaction data: real-time event stream
     - Product data: return rates, defect patterns, quality signals
     - Operational data: processing times, queue depths, agent performance
     - Financial data: costs, refund amounts, recovered value
     - Fraud data: risk scores, patterns, confirmed fraud

     Design the data model that enables cross-system intelligence.

  3. Partner ecosystem:
     - Payment processors (Stripe, Adyen, PayPal, etc.)
     - Returns logistics partners (Happy Returns, Optoro, Loop)
     - Fraud prevention vendors (Signifyd, Riskified, Forter)
     - Customer experience platforms (Zendesk, Intercom)
     - Analytics providers (Looker, Tableau, custom BI)

     For each partner category:
     - Integration requirements
     - Data exchange protocols
     - SLA requirements
     - Vendor evaluation criteria
     - Build vs. buy vs. partner decision

  4. Competitive moat:
     How does this ecosystem create a sustainable competitive advantage?
     - Network effects (more data → better fraud detection → lower costs)
     - Customer experience differentiation
     - Operational efficiency at scale
     - Speed to adapt to new regulations or markets
     Present the strategic value story.

assertions:
  - type: llm_judge
    criteria: "Architecture resolves the fragmentation — the design creates a central orchestration layer that eliminates siloed metrics and conflicting optimization"
    weight: 0.25
    description: "Fragmentation-resolving architecture"
  - type: llm_judge
    criteria: "Data integration enables cross-system intelligence — the unified data model allows insights that no single system could provide (e.g., fraud patterns across customer + product + logistics data)"
    weight: 0.25
    description: "Cross-system intelligence"
  - type: llm_judge
    criteria: "Build vs. buy decisions are justified — each partner category has clear criteria for when to build internally vs. partner, based on strategic value and core competency"
    weight: 0.25
    description: "Justified build-buy decisions"
  - type: llm_judge
    criteria: "Competitive moat argument is concrete — the strategic value story shows how the ecosystem creates advantages that competitors can't easily replicate"
    weight: 0.25
    description: "Concrete competitive moat"
