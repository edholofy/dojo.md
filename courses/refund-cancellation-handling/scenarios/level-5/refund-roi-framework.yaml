meta:
  id: refund-roi-framework
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Build comprehensive ROI frameworks for refund operations — quantify the business value of refund excellence, justify investment, and measure return on every refund dollar spent"
  tags: [support, refund, roi, financial-modeling, investment, mastery]

state: {}

trigger: |
  Refund operations must justify their existence in financial terms.
  A robust ROI framework transforms refund from "cost of doing
  business" to "strategic investment with measurable returns."

  Part 1: Build the comprehensive ROI model

  "RetailGroup" — a multi-brand retail conglomerate:
  - 5 brands, $2.1B combined revenue
  - Combined refund operations: $42M annual cost
  - Refund volume: 3.2M annually ($310M in refund value)
  - Current save rate: 15%
  - Current customer retention after refund experience: 62%
  - NPS for refund experience: -8

  The CFO asks: "What's the ROI of our $42M refund operations
  investment? And what would happen if we invested another $8M?"

  1. Calculate current ROI:
     Revenue protected:
     - Saved cancellations (save rate × at-risk revenue)
     - Retained customers (post-refund retention × future revenue)
     - Avoided chargebacks (refund processing vs. chargeback costs)
     - Brand value protection (NPS impact on referrals)

     Costs:
     - Direct operations ($42M)
     - Indirect costs (returns processing, inventory impact)

     Present the ROI calculation with methodology.

  2. Model the incremental $8M investment:
     Proposed allocation:
     - $3M: AI automation (reduce processing cost by 40%)
     - $2M: Retention program (improve save rate to 25%)
     - $1.5M: Fraud prevention (reduce fraud loss by 50%)
     - $1M: Customer experience redesign (improve NPS to +20)
     - $0.5M: Analytics and measurement platform

     For each investment:
     - Expected financial return (annual)
     - Payback period
     - Risk-adjusted ROI
     - Dependencies and assumptions
     - Leading indicators of success

  3. Build the multi-year financial model:
     Year 1: Investment year (costs exceed savings)
     Year 2: Breakeven (savings match investment)
     Year 3: Return year (compounded benefits)
     Year 4-5: Mature state (optimized operations)

     Include:
     - Cash flow projection by year
     - Cumulative NPV at discount rate of 10%
     - Internal rate of return (IRR)
     - Sensitivity analysis (±20% on key assumptions)
     - Scenario planning (best case, base case, worst case)

  4. Create the executive dashboard:
     Design a single-page dashboard showing:
     - Refund operations ROI (current period)
     - Investment performance vs. plan
     - Key driver metrics (save rate, retention, fraud rate)
     - Leading indicators (trending up/down/flat)
     - Action items requiring executive attention

assertions:
  - type: llm_judge
    criteria: "ROI calculation includes indirect revenue — the model captures not just direct savings but retained customer lifetime value, avoided chargeback costs, and brand impact"
    weight: 0.25
    description: "Indirect revenue ROI"
  - type: llm_judge
    criteria: "Investment model is risk-adjusted — each component has realistic assumptions, and the sensitivity analysis shows what happens if key assumptions are wrong"
    weight: 0.25
    description: "Risk-adjusted investment model"
  - type: llm_judge
    criteria: "Multi-year model shows compound benefits — Year 3+ returns demonstrate how improved retention and reduced fraud compound over time, not just linear savings"
    weight: 0.25
    description: "Compounding multi-year model"
  - type: llm_judge
    criteria: "Executive dashboard is actionable — it tells executives what's working, what's not, and what decisions they need to make, not just what happened"
    weight: 0.25
    description: "Actionable executive dashboard"
