meta:
  id: refund-mastery-challenge
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Demonstrate mastery of refund and cancellation handling — solve interconnected scenarios that test every skill from policy design to fraud detection to executive communication"
  tags: [support, refund, mastery, comprehensive, challenge, mastery]

state: {}

trigger: |
  This mastery challenge tests your ability to handle interconnected
  refund and cancellation scenarios that span strategy, operations,
  compliance, and customer experience.

  Scenario universe: "NexGen Commerce" — a $800M DTC brand selling
  electronics, home goods, and a software subscription service.
  Markets: US, EU, UK, Australia. 4M customers. 200-person support team.

  Challenge 1: Policy contradiction resolution

  Your US policy says 30-day returns. Your EU policy says 14-day
  withdrawal (legally required). Your marketing team just launched
  a global campaign promising "60-day hassle-free returns" without
  consulting legal or operations.

  - Assess the legal, operational, and financial exposure
  - Determine which policy actually applies (and where)
  - Design the communication to correct the campaign
  - Handle the first 5 customer complaints about policy confusion
  - Recommend the go-forward global policy

  Challenge 2: Cascading system failure

  A payment processor update caused a bug: 4,200 customers were
  double-charged over the past 72 hours. The bug is now fixed, but:
  - 1,800 have already filed chargebacks
  - 900 have contacted support (tickets growing rapidly)
  - 1,500 haven't noticed yet (or haven't contacted)

  For each group:
  - Design the remediation approach
  - Write the customer communication
  - Handle the chargeback response strategy
  - Calculate the total financial impact (refunds + fees + goodwill)
  - Brief the board on the incident

  Challenge 3: Competitive threat response

  Your main competitor just announced "instant refunds — money back
  before you even ship the return." Your cancellation rate has
  spiked 40% in the past week with customers citing this as reason.

  - Assess the competitive threat (is it sustainable for them?)
  - Design NexGen's response (match, differentiate, or ignore?)
  - Model the financial impact of matching (instant refunds)
  - Build the retention offer for customers threatening to leave
  - Present the strategy to the executive team

  Challenge 4: Cross-border tax complication

  Australian tax authority is auditing your GST handling on refunds.
  They claim you've been incorrectly retaining GST on partial
  refunds for 18 months, affecting 12,000 transactions.

  - Assess the financial exposure
  - Design the remediation plan
  - Coordinate with tax, legal, and finance teams
  - Customer communication for affected customers
  - Process improvement to prevent recurrence

  End with a unified strategic brief that connects all 4 challenges
  and identifies systemic improvements.

assertions:
  - type: llm_judge
    criteria: "Policy contradiction is resolved with legal precision — the response correctly identifies that the 60-day campaign creates binding obligations in some jurisdictions and navigates the correction carefully"
    weight: 0.25
    description: "Legally precise policy resolution"
  - type: llm_judge
    criteria: "Double-charge remediation is proactive — all 4,200 customers are addressed (not just the ones who complained), with tailored approaches for each group"
    weight: 0.25
    description: "Proactive full remediation"
  - type: llm_judge
    criteria: "Competitive response is strategic — the analysis evaluates whether matching is sustainable and considers differentiation alternatives, not just a knee-jerk price match"
    weight: 0.25
    description: "Strategic competitive response"
  - type: llm_judge
    criteria: "Unified brief connects all challenges — the final summary identifies systemic issues (policy governance, system resilience, competitive positioning, compliance) that cut across all 4 scenarios"
    weight: 0.25
    description: "Connected systemic brief"
