meta:
  id: refund-global-operations
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Design and manage global refund operations — coordinate multi-region teams, harmonize policies across jurisdictions, and build follow-the-sun refund processing"
  tags: [support, refund, global, operations, multi-region, mastery]

state: {}

trigger: |
  Global refund operations add layers of complexity: different laws,
  currencies, customer expectations, and operational capabilities
  across regions. The challenge is delivering a consistent customer
  experience while respecting local requirements.

  Part 1: Global operating model design

  "WorldShop" — a global e-commerce company:
  - Revenue: $3.5B across 45 countries
  - Refund processing centers: US (Chicago), EU (Dublin), APAC (Singapore)
  - 450 refund agents across 3 centers
  - Languages supported: 12
  - Currencies processed: 18
  - Annual refund volume: 4.5M requests

  Current challenges:
  - Inconsistent policy application (same scenario, different outcome
    depending on which center handles it)
  - 6-hour coverage gap between APAC close and US open
  - EU center overloaded (GDPR + consumer rights complexity)
  - No standardized training across regions
  - Each region uses different tools and processes
  - Customer satisfaction varies: US 4.1, EU 3.4, APAC 3.8

  1. Design the global operating model:
     - Centralized vs. federated vs. hybrid decision
     - Global policies with local compliance layers
     - Follow-the-sun coverage model
     - Workload distribution and routing rules
     - Escalation paths (local vs. global)
     - Language and cultural considerations

  2. Build the policy harmonization framework:
     Create a tiered policy structure:
     - Global floor: minimum standards everywhere
     - Regional compliance: jurisdiction-specific requirements
     - Local preferences: cultural adaptations
     - Exception framework: when local can deviate from global

     Apply to 3 scenarios:
     a) 30-day return window (global) vs. 14-day EU withdrawal right
     b) Refund method (global: original method) vs. Australia (customer
        choice for major failure)
     c) Digital subscription cooling-off (varies by jurisdiction)

  3. Design the technology platform:
     - Unified refund management system across regions
     - Multi-currency processing and reconciliation
     - Compliance rules engine (auto-applies local law)
     - Real-time dashboards with regional views
     - Knowledge base with localized content
     - Quality assurance across regions

  4. Build the performance management framework:
     - Global KPIs (standard across regions)
     - Regional KPIs (adjusted for local factors)
     - Cross-regional benchmarking (fair comparison)
     - Best practice sharing (how to spread what works)
     - Quarterly global operations review

assertions:
  - type: llm_judge
    criteria: "Operating model addresses the consistency problem — the design ensures customers get equivalent outcomes regardless of which center processes their request"
    weight: 0.25
    description: "Cross-region consistency"
  - type: llm_judge
    criteria: "Policy harmonization respects legal differences — the tiered framework doesn't try to create one policy globally but layers local compliance on top of global standards"
    weight: 0.25
    description: "Legally compliant harmonization"
  - type: llm_judge
    criteria: "Follow-the-sun model eliminates the coverage gap — the 6-hour gap between APAC and US is addressed with clear handoff protocols"
    weight: 0.25
    description: "Coverage gap resolution"
  - type: llm_judge
    criteria: "Performance benchmarking is fair — regional KPIs account for different legal complexity, customer expectations, and operational maturity, not just raw metrics"
    weight: 0.25
    description: "Fair regional benchmarking"
