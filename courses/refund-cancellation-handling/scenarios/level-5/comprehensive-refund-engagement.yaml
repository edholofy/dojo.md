meta:
  id: comprehensive-refund-engagement
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Demonstrate complete mastery in a comprehensive engagement — advise a board of directors on transforming refund operations from cost center to strategic asset"
  tags: [support, refund, comprehensive, board-level, transformation, mastery]

state: {}

trigger: |
  You've been invited to present to the board of directors of
  "Apex Retail Group" — a $6B multi-channel retailer facing a
  refund crisis. The board wants a complete strategic assessment
  and transformation plan.

  Board context:
  - Refund costs increased 34% YoY (now $180M annually)
  - Return rate climbed from 18% to 26% in 2 years
  - Chargeback rate at 1.3% (in Visa and Mastercard monitoring)
  - Customer satisfaction with returns: 2.6/5 (declining)
  - Competitor "EasyShop" stealing market share with superior returns
  - Amazon-like return expectations spreading to all retail
  - Recent $2.4M regulatory fine for misleading return policy
  - Board divided: half want stricter policies, half want easier returns

  Deliverable 1: Board presentation (30-minute slot)

  Structure:
  1. Situation assessment (5 minutes):
     - The numbers: where are we and how did we get here?
     - Root causes: product issues, policy design, customer behavior
       shifts, competitive pressure, fraud growth
     - Risk assessment: regulatory, financial, brand

  2. Strategic framework (10 minutes):
     - The refund paradox: easier returns drive more sales (data)
     - Best-in-class benchmarking: what do leaders do differently?
     - The customer economics: LTV of great return experience
     - The fraud reality: cost of prevention vs. cost of fraud

  3. Transformation plan (10 minutes):
     - 5 strategic pillars with expected impact
     - Investment required: $25M over 3 years
     - Expected return: $65M in savings + $40M in revenue growth
     - Risk mitigation for each pillar
     - Quick wins to show momentum in 90 days

  4. Board decision request (5 minutes):
     - Approve the $25M investment
     - Establish a Refund Excellence Steering Committee
     - Authorize the regulatory remediation immediately
     - Set quarterly review cadence

  Deliverable 2: Handle board questions

  Prepare responses for likely board challenges:
  - "Why can't we just make our return policy stricter?"
  - "How do we know the $25M investment will pay off?"
  - "Our competitor offers free returns — should we match?"
  - "What about the fraud problem? Won't easier returns make it worse?"
  - "How long until we see results?"
  - "What happens if we do nothing?"

  Deliverable 3: 90-day action plan

  Detail the first 90 days:
  - Week 1-2: Immediate regulatory remediation
  - Week 3-4: Chargeback crisis response (exit monitoring programs)
  - Week 5-8: Quick win initiatives (automation, training, policy fixes)
  - Week 9-12: Foundation for transformation (technology, data, team)
  - Governance: weekly steering committee, monthly board update

  Deliverable 4: Success metrics

  Define the scorecard the board will track quarterly:
  - Financial metrics: refund costs, revenue impact, ROI
  - Operational metrics: processing time, automation rate, accuracy
  - Customer metrics: CSAT, NPS, retention, repeat purchase
  - Compliance metrics: chargeback rate, regulatory risk, audit readiness
  - Competitive metrics: market share, customer acquisition cost

assertions:
  - type: llm_judge
    criteria: "Board presentation balances both sides of the debate — it addresses the 'stricter policy' camp with data showing that easier returns drive revenue while satisfying the 'cost control' camp with fraud prevention and automation"
    weight: 0.25
    description: "Balanced board debate"
  - type: llm_judge
    criteria: "Investment case is compelling — the $25M request is justified with specific expected returns, risk mitigation, and a 'cost of inaction' scenario"
    weight: 0.25
    description: "Compelling investment case"
  - type: llm_judge
    criteria: "Board question responses are direct and data-driven — each potential challenge gets a concise, evidence-based answer that moves the conversation forward"
    weight: 0.25
    description: "Direct board Q&A responses"
  - type: llm_judge
    criteria: "90-day plan shows immediate action — regulatory remediation and chargeback crisis response start in Week 1, demonstrating urgency while building toward the longer-term transformation"
    weight: 0.25
    description: "Urgent 90-day action"
