meta:
  id: refund-psychology
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Apply behavioral psychology to refund and cancellation handling — use loss aversion, endowment effect, anchoring, and framing to ethically improve outcomes for both customers and businesses"
  tags: [support, refund, psychology, behavioral-science, persuasion, mastery]

state: {}

trigger: |
  Behavioral psychology profoundly influences how customers perceive
  refund experiences. Understanding these principles allows you to
  design fair processes that also improve business outcomes.

  Part 1: Psychological principles in refund handling

  Analyze how each principle applies to refund/cancellation scenarios:

  1. Loss aversion:
     People feel losses 2x more intensely than equivalent gains.
     - How does this affect customers requesting refunds?
     - How does this affect customers considering cancellation?
     - How can you frame alternatives to make them feel like gains?
     Apply to scenario: Customer wants to cancel $49/mo subscription.
     Write two approaches — one that triggers loss aversion poorly
     (what you'll lose) and one that frames alternatives as gains.

  2. Endowment effect:
     People value things more once they own them.
     - How does this apply to subscription cancellations?
     - How can you remind customers of what they've built?
     Apply to scenario: Customer cancelling a project management tool
     with 2 years of data. Write the retention approach that
     ethically leverages endowment effect.

  3. Anchoring:
     First numbers presented shape perception of subsequent numbers.
     - How does this affect refund amount negotiations?
     - How does it affect retention offer presentation?
     Apply to scenario: Customer wants full $200 refund. You can
     offer $50 credit. Design the conversation using anchoring
     principles ethically.

  4. Choice architecture:
     How options are presented affects decisions.
     - Design a cancellation flow with 3 options that makes the
       "best" option (for both parties) the most likely choice
     - Identify the line between helpful framing and manipulation
     Write the cancellation page options and explain the psychology.

  5. Reciprocity:
     People feel obligated to return favors.
     - How can goodwill gestures create reciprocity in refund scenarios?
     Apply to: Customer had a bad experience. You offer a genuine
     apology + $25 credit before they even ask. Write the message
     and explain the expected reciprocity effect.

  Part 2: Ethical boundaries

  For each principle above, define:
  - The ethical application (helpful framing, genuine options)
  - The dark pattern version (manipulation, coercion, deception)
  - The specific line between them
  - A test: "Would I be comfortable if a journalist reported on
    this tactic?"

  Part 3: Training program design

  Design a 2-hour training module for agents on "Psychology of
  Refund Conversations" covering:
  - Key principles (simplified for agents)
  - Ethical application guidelines
  - Scripts that apply psychology ethically
  - Red flags for when tactics become manipulation
  - Practice scenarios with feedback

assertions:
  - type: llm_judge
    criteria: "Loss aversion framing shows both ethical and unethical versions — the comparison makes it clear how the same principle can be used helpfully or manipulatively"
    weight: 0.25
    description: "Contrasted ethical/unethical framing"
  - type: llm_judge
    criteria: "Anchoring application is realistic — the scenario shows how anchoring works in a real refund negotiation without suggesting agents lie or deceive"
    weight: 0.25
    description: "Realistic anchoring application"
  - type: llm_judge
    criteria: "Dark pattern boundaries are specific — the line between helpful framing and manipulation is drawn with concrete examples, not abstract principles"
    weight: 0.25
    description: "Specific dark pattern boundaries"
  - type: llm_judge
    criteria: "Training module is practical — agents get scripts and practice scenarios they can use immediately, not just theory about cognitive biases"
    weight: 0.25
    description: "Practical agent training"
