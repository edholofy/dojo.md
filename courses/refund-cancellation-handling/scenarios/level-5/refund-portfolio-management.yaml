meta:
  id: refund-portfolio-management
  level: 5
  course: refund-cancellation-handling
  type: output
  description: "Manage the refund portfolio across a multi-brand, multi-product organization — optimize policies, costs, and customer experience across diverse business lines"
  tags: [support, refund, portfolio, multi-brand, management, mastery]

state: {}

trigger: |
  Managing refund operations across a portfolio of brands and
  products requires balancing standardization (efficiency) with
  customization (brand identity and customer needs).

  Part 1: Portfolio analysis

  "Constellation Holdings" — a consumer company with 5 brands:

  Brand A: "LuxeWear" (premium fashion, $400M revenue)
  - Return rate: 28%, avg refund: $185
  - Customer expects: white-glove service, instant refunds
  - Key challenge: wardrobing at premium prices
  - Current policy: 60-day returns, free shipping both ways

  Brand B: "TechDirect" (electronics, $600M revenue)
  - Return rate: 12%, avg refund: $245
  - Customer expects: hassle-free, quick exchange options
  - Key challenge: opened electronics restocking/resale
  - Current policy: 30-day returns, 15% restocking on opened

  Brand C: "HomeEasy" (home goods, $250M revenue)
  - Return rate: 18%, avg refund: $68
  - Customer expects: no-questions-asked returns
  - Key challenge: bulky item return logistics costs
  - Current policy: 30-day returns, customer pays return shipping

  Brand D: "CloudSuite" (B2B SaaS, $150M ARR)
  - Churn rate: 3.2% monthly, avg contract: $24K/year
  - Customer expects: negotiation, contract flexibility
  - Key challenge: enterprise contract cancellation complexity
  - Current policy: 30-day notice, early termination fee

  Brand E: "FitLife" (DTC fitness equipment, $100M revenue)
  - Return rate: 8%, avg refund: $340
  - Customer expects: trial period, assembly support
  - Key challenge: large/heavy item logistics
  - Current policy: 30-day trial, company arranges pickup

  1. Portfolio-level analysis:
     - Total refund operations cost across all brands
     - Shared vs. brand-specific operations identification
     - Synergy opportunities (shared tech, shared team, shared vendors)
     - Cross-brand customer behavior (do customers shop multiple brands?)

  2. Optimization strategy:
     For each brand, determine:
     - What to standardize (back-end processing, technology)
     - What to customize (customer-facing policy, communication tone)
     - Investment priority (where does $1 of improvement generate most value?)

  3. Shared services design:
     Design the shared refund operations center:
     - Which functions centralize (tech, fraud, analytics)
     - Which remain brand-specific (customer communication, policy)
     - Governance model (who decides what for shared vs. brand?)
     - Cost allocation methodology

  4. Portfolio performance scorecard:
     Design a scorecard that tracks:
     - Per-brand refund health metrics
     - Portfolio-level efficiency metrics
     - Synergy realization progress
     - Customer experience across brands
     - Financial impact and trends

assertions:
  - type: llm_judge
    criteria: "Portfolio analysis identifies genuine synergies — shared technology, fraud detection, and analytics make sense to centralize, while customer-facing policies need brand-specific customization"
    weight: 0.25
    description: "Genuine synergy identification"
  - type: llm_judge
    criteria: "Each brand's strategy reflects its unique needs — premium fashion gets different treatment than B2B SaaS, and the recommendations acknowledge different customer expectations"
    weight: 0.25
    description: "Brand-appropriate strategies"
  - type: llm_judge
    criteria: "Shared services governance is practical — the model clearly defines decision rights between corporate and brand teams, preventing either over-centralization or fragmentation"
    weight: 0.25
    description: "Practical governance model"
  - type: llm_judge
    criteria: "Investment prioritization uses data — the $1 improvement allocation is based on return on investment analysis, not equal distribution or loudest voice"
    weight: 0.25
    description: "Data-driven investment priority"
