meta:
  id: legal-compliance-refunds
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Navigate legal compliance in refunds and cancellations — handle consumer protection laws, cooling-off periods, and regulatory requirements"
  tags: [support, refund, legal, compliance, consumer-protection, intermediate]

state: {}

trigger: |
  Refund and cancellation handling is governed by a complex web of
  consumer protection laws. Violating these laws can result in
  penalties up to $53,088 per incident (FTC) and class action
  lawsuits.

  Part 1: Key legal requirements

  1. FTC Cooling-Off Rule (US):
     - 3-day cancellation right for purchases $25+ made away
       from seller's permanent location
     - Covers: door-to-door, temporary locations, trade shows
     - Does NOT cover: online purchases, purchases at stores

  2. EU 14-Day Right of Withdrawal:
     - 14 days from delivery to cancel without justification
     - Applies to all distance/online purchases
     - Full refund including original shipping within 14 days
     - From June 2026: "Cancel my contract" button required

  3. FTC Click-to-Cancel principle:
     - Cancellation must be as easy as signup
     - Online signup = must allow online cancellation
     - Enforced under ROSCA and FTC Act Section 5

  4. State auto-renewal laws (CA, NY, etc.):
     - Clear disclosure before charging
     - Easy-to-find cancellation mechanism
     - Confirmation of renewal terms

  Part 2: Handle compliance scenarios

  Scenario 1 — EU customer right of withdrawal:
  An EU customer purchased a product 12 days ago and wants to
  return it "because I changed my mind." Your policy says no
  returns without defect. EU law says they have 14 days.
  - Determine the correct action (law overrides policy)
  - Write the response
  - Calculate the refund (include original shipping)

  Scenario 2 — Difficult-to-cancel subscription:
  A customer complains: "I signed up online in 2 minutes but to
  cancel I have to call during business hours and wait 20 minutes."
  - Assess the compliance risk
  - Write the internal recommendation to fix the process
  - Write the customer response

  Scenario 3 — Auto-renewal without clear disclosure:
  A customer says: "I didn't know my trial would automatically
  convert to a paid subscription. I never agreed to be charged."
  Review records show the disclosure was in small text at the
  bottom of a long terms page with a pre-checked consent box.
  - Assess the legal risk
  - Determine the appropriate refund decision
  - Write the response
  - Write the internal recommendation for compliance fix

  Scenario 4 — Australian Consumer Law:
  An Australian customer wants a refund 60 days after purchase.
  Your policy says 30 days. The product doesn't match the website
  description. Australian Consumer Law guarantees refunds for
  products not matching their description regardless of store policy.
  - Apply the correct law
  - Process the refund
  - Write the response

assertions:
  - type: llm_judge
    criteria: "EU right of withdrawal is correctly applied — the 14-day period overrides the company's no-return policy, and original shipping is included in the refund"
    weight: 0.30
    description: "Correct EU law application"
  - type: llm_judge
    criteria: "The difficult cancellation process is flagged as a compliance risk — phone-only cancellation for online signup violates click-to-cancel principles"
    weight: 0.25
    description: "Cancellation compliance risk identification"
  - type: llm_judge
    criteria: "The pre-checked consent box is identified as problematic — small text with pre-checked consent doesn't constitute clear disclosure"
    weight: 0.25
    description: "Disclosure adequacy assessment"
  - type: llm_judge
    criteria: "Australian Consumer Law is correctly applied — the 60-day refund is processed because the product didn't match its description"
    weight: 0.20
    description: "Correct Australian law application"
