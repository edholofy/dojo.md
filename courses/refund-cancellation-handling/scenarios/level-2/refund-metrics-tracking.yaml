meta:
  id: refund-metrics-tracking
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Track refund and cancellation metrics — build dashboards, set benchmarks, and use data to improve refund operations and reduce unnecessary churn"
  tags: [support, refund, metrics, dashboard, analytics, intermediate]

state: {}

trigger: |
  Refund and cancellation metrics reveal the health of your
  product, pricing, and customer experience. Tracking the right
  metrics helps you distinguish between healthy refund rates and
  warning signs.

  Part 1: Core metrics framework

  For "CloudBase" — a B2B SaaS with 5,000 customers:
  Current metrics:
  - Monthly churn rate: 4.5% (benchmark: 3-5%)
  - Annual churn rate: 42% (benchmark: 25-35%)
  - Gross revenue retention: 82% (benchmark: 85-90%)
  - Net revenue retention: 95% (benchmark: 100-120%)
  - Refund rate: 8% of monthly revenue (benchmark: 2-5%)
  - Cancellation save rate: 12% (benchmark: 20-30%)
  - Chargeback rate: 0.8% (benchmark: under 1%, danger at 1.5%)
  - Time from cancellation request to processing: 3.2 days
  - Exit survey completion rate: 18% (benchmark: 25-35%)

  1. Analyze the metrics:
     - Which metrics are healthy vs. concerning?
     - What do the concerning metrics suggest?
     - How are these metrics connected? (high churn + low save rate
       + low NRR tells a story)
     - What additional data would you want?

  2. Build the refund operations dashboard:
     Design 3 dashboard views:
     a) Daily operations: refund volume, processing time, queue depth
     b) Weekly trends: churn rate, save rate, reason distribution
     c) Monthly executive: revenue impact, retention, benchmarks
     Specify visualizations, metrics, and refresh cadence.

  3. Set improvement targets:
     For each concerning metric, set:
     - 30-day target (quick wins)
     - 90-day target (structural improvements)
     - Specific actions to achieve each target
     - How to measure progress

  4. Chargeback rate warning:
     The 0.8% chargeback rate is approaching danger. Design an
     action plan to reduce it before hitting the 1% threshold,
     including:
     - Root cause analysis of current chargebacks
     - Prevention measures
     - Customer communication improvements
     - Monitoring and alert system

assertions:
  - type: llm_judge
    criteria: "The analysis connects metrics — high churn, low save rate, and low NRR together suggest a deeper product or value problem, not just a process issue"
    weight: 0.30
    description: "Connected metrics analysis"
  - type: llm_judge
    criteria: "Dashboard views serve different audiences — daily operations for team leads, weekly for managers, monthly for executives"
    weight: 0.25
    description: "Audience-appropriate dashboards"
  - type: llm_judge
    criteria: "The chargeback action plan is preventive — it addresses root causes before hitting the dangerous 1% threshold"
    weight: 0.25
    description: "Preventive chargeback plan"
  - type: llm_judge
    criteria: "Improvement targets are realistic and time-bound — 30-day quick wins and 90-day structural changes with specific actions"
    weight: 0.20
    description: "Realistic improvement targets"
