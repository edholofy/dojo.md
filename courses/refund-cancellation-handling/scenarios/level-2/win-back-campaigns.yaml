meta:
  id: win-back-campaigns
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Design and execute win-back campaigns — re-engage cancelled customers with personalized outreach that addresses their original reason for leaving"
  tags: [support, cancellation, win-back, re-engagement, campaign, intermediate]

state: {}

trigger: |
  Win-back campaigns can recover 15-30% of cancelled customers
  and deliver 3-5x ROI. The key is timing, personalization, and
  addressing the original cancellation reason.

  Part 1: Win-back campaign design

  For "StyleBox" — a fashion subscription box ($49/mo):
  Cancelled customers by reason (last 90 days, 1,200 cancellations):
  - Price: 30% (360 customers, avg LTV: $245)
  - Style not matching: 25% (300, avg LTV: $392)
  - Not wearing enough: 20% (240, avg LTV: $490)
  - Quality issues: 15% (180, avg LTV: $294)
  - Life change: 10% (120, avg LTV: $588)

  1. Design segment-specific win-back sequences:

     For "Price" cancellers (30-day trigger):
     - Email 1: Acknowledge budget concern, highlight new lower tier
     - Email 2: Customer testimonial about value received
     - Email 3: Limited-time offer ($10 off first box back)
     Write all 3 emails with subject lines.

     For "Style not matching" (45-day trigger):
     - Email 1: Share improved style quiz and algorithm updates
     - Email 2: "Your style profile has been updated" with preview
     - Email 3: Free styling session offer
     Write the email sequence.

  2. Design the multi-channel approach:
     - Email (primary): 3-email sequence per segment
     - SMS (high-LTV only): personalized text on day 30
     - Retargeting ads: segment-specific messaging
     - Direct mail (top 100 LTV customers): handwritten note concept
     Define timing, content, and budget for each channel.

  3. Measure campaign effectiveness:
     - Open rate, click rate by segment
     - Reactivation rate by segment and channel
     - Revenue recovered (reactivated customers × projected LTV)
     - Campaign ROI (revenue recovered vs. campaign cost)
     - 90-day retention of reactivated customers
     Design the reporting dashboard.

assertions:
  - type: llm_judge
    criteria: "Win-back emails address the original reason — price cancellers get lower-tier offers, style-mismatch gets algorithm improvements, not generic discounts"
    weight: 0.30
    description: "Reason-addressed win-back"
  - type: llm_judge
    criteria: "Timing is appropriate — 30-45 day triggers give enough space without losing the customer to permanent alternatives"
    weight: 0.25
    description: "Appropriate campaign timing"
  - type: llm_judge
    criteria: "Multi-channel approach is segmented by value — high-LTV gets SMS and direct mail, lower-LTV gets email only"
    weight: 0.25
    description: "Value-segmented multi-channel"
  - type: llm_judge
    criteria: "Measurement includes 90-day retention — reactivated customers who cancel again aren't counted as wins"
    weight: 0.20
    description: "Retention-inclusive measurement"
