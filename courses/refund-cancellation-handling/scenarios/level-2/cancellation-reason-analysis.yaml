meta:
  id: cancellation-reason-analysis
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Analyze cancellation reasons — use exit data to identify patterns, improve the product, and reduce future cancellations"
  tags: [support, cancellation, analysis, churn, data, intermediate]

state: {}

trigger: |
  Every cancellation contains valuable data. Systematically
  analyzing cancellation reasons transforms individual exits into
  strategic intelligence that reduces future churn.

  Part 1: Cancellation data analysis

  For "FitTrack" — a fitness subscription SaaS ($19/mo):
  Exit survey data from last quarter (800 cancellations):
  - Price too high: 28%
  - Not using enough: 22%
  - Missing features: 18%
  - Switched to competitor: 12%
  - Poor customer support: 8%
  - Technical issues: 7%
  - Other/life change: 5%

  Additional context:
  - "Price too high" cancellers: avg tenure 3 months, low usage
  - "Not using enough" cancellers: avg tenure 7 months, declining login frequency
  - "Missing features" top requests: meal planning, social features, Apple Watch sync
  - "Switched to competitor" primarily to: CompetitorA (60%), CompetitorB (40%)
  - NPS at cancellation: Price=15, Not using=32, Missing features=28, Competitor=20

  1. Analyze the data:
     - Which cancellation reasons represent the highest revenue impact?
     - Which reasons are preventable vs. unavoidable?
     - What patterns do you see in the "not using enough" segment?
     - What does the NPS data tell you about each segment?

  2. Create an action plan:
     For each top cancellation reason, recommend:
     - Prevention strategy (before they decide to cancel)
     - Retention strategy (at the point of cancellation)
     - Win-back strategy (after cancellation)
     - Product/process change to address root cause

  3. Design the exit survey:
     - Questions that produce actionable data (not just categories)
     - Optimal length and format (max 2-3 minutes)
     - How to increase response rates
     - How to analyze open-ended responses at scale
     - Monthly reporting template

  4. Segment-specific strategies:
     - For "not using enough": engagement campaigns, onboarding
       improvement, usage-based nudges
     - For "price too high": value communication, plan restructuring,
       annual discount
     - For "competitor": competitive intelligence, feature parity
       roadmap, differentiation messaging

assertions:
  - type: llm_judge
    criteria: "The analysis connects data points — 'price too high' customers with low usage and 3-month tenure suggests they never found value, not that the price is actually too high"
    weight: 0.30
    description: "Connected data insight"
  - type: llm_judge
    criteria: "Action plans address root causes — the 'not using enough' segment gets engagement campaigns, not just discounts"
    weight: 0.25
    description: "Root cause action plans"
  - type: llm_judge
    criteria: "The exit survey design is practical — 2-3 minute completion time with questions that produce actionable data, not just vanity metrics"
    weight: 0.25
    description: "Practical survey design"
  - type: llm_judge
    criteria: "NPS data is used strategically — the 'not using enough' segment with NPS 32 represents a recovery opportunity since they like the product"
    weight: 0.20
    description: "Strategic NPS interpretation"
