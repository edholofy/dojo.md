meta:
  id: chargeback-representment
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Handle chargeback representment — collect evidence, build compelling cases, and dispute fraudulent chargebacks to recover revenue"
  tags: [support, chargeback, representment, evidence, dispute, intermediate]

state: {}

trigger: |
  Chargeback representment is the process of disputing a chargeback
  by submitting evidence that the charge was legitimate. With $132B
  in annual chargeback losses (75% from friendly fraud), effective
  representment is a significant revenue recovery opportunity.

  Part 1: Representment process
  1. Review the chargeback reason code
  2. Gather relevant evidence for the specific reason
  3. Write a compelling rebuttal letter
  4. Submit within the deadline (typically 10-30 days)
  5. Track the outcome and learn from results

  Part 2: Handle representment cases

  Scenario 1 — "Item not received" (but delivered):
  Customer filed chargeback claiming item never arrived. Delivery
  tracking shows signed delivery 8 days ago. Amount: $189.
  - List the evidence to collect
  - Write the rebuttal letter
  - Include Visa Compelling Evidence 3.0 requirements

  Scenario 2 — "Not as described":
  Customer bought a refurbished laptop. Filed chargeback saying
  "product not as described." Your listing clearly stated
  "refurbished, may show minor cosmetic wear." Amount: $649.
  - Gather product listing screenshots, terms accepted at checkout
  - Write the rebuttal arguing the product matched the description
  - Include customer communication history

  Scenario 3 — "Unauthorized transaction" (friendly fraud):
  Customer's account shows login from their usual IP, delivery to
  their registered address, and they contacted support about the
  product before filing the chargeback. Amount: $95.
  - Build the evidence case (IP, address, communication history)
  - Write the rebuttal
  - Identify this pattern for future fraud prevention

  Scenario 4 — Accept or fight decision:
  Review these 3 chargebacks and decide which to fight and which
  to accept:
  a) $30 charge, no delivery tracking available
  b) $450 charge, clear delivery proof, customer previously
     threatened chargeback in support chat
  c) $120 charge, customer's first purchase, paid with guest
     checkout, delivery to different address than billing
  Explain your reasoning for each.

assertions:
  - type: llm_judge
    criteria: "Evidence collection is thorough — tracking data, communication logs, IP addresses, and screenshots of product listings are all gathered where relevant"
    weight: 0.30
    description: "Thorough evidence collection"
  - type: llm_judge
    criteria: "Rebuttal letters are professional and evidence-based — they present facts clearly without emotional language"
    weight: 0.25
    description: "Professional rebuttal writing"
  - type: llm_judge
    criteria: "The accept/fight decisions show good judgment — the $30 with no tracking is accepted (not worth fighting), the $450 with proof is fought"
    weight: 0.25
    description: "Strategic fight/accept decisions"
  - type: llm_judge
    criteria: "Friendly fraud patterns are identified — the scenario 3 evidence pattern is flagged for future prevention"
    weight: 0.20
    description: "Fraud pattern identification"
