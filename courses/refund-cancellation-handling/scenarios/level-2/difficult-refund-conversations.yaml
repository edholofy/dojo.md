meta:
  id: difficult-refund-conversations
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Handle difficult refund conversations — manage angry customers, refund denials, unreasonable demands, and emotional situations with professionalism"
  tags: [support, refund, difficult, angry-customer, denial, intermediate]

state: {}

trigger: |
  Refund conversations can become emotional. Customers feel they've
  been wronged, and denying a refund can intensify the situation.
  The key is combining empathy with clear policy communication.

  Part 1: Handle difficult refund scenarios

  Scenario 1 — Refund denial for legitimate reason:
  "I want a full refund for my software subscription. I've been
  using it for 8 months but I just realized I could've been using
  a free alternative."
  Policy: no refunds for services already consumed.
  Write a denial that's empathetic but firm. Offer alternatives
  (downgrade, cancellation for future).

  Scenario 2 — Escalating anger after denial:
  After your denial in Scenario 1, the customer responds: "This is
  a SCAM. You trapped me into paying. I'm going to post this
  conversation on social media and file a chargeback."
  Write the response that stays calm, addresses the chargeback
  threat, and doesn't escalate.

  Scenario 3 — Sob story with policy violation:
  "My husband just lost his job and we can't afford this. I know
  it's been 90 days but can you please make an exception? I
  returned the product in perfect condition."
  Policy: 30-day return window strictly enforced.
  Write a response that shows genuine compassion while navigating
  the policy constraint.

  Scenario 4 — Unreasonable demand:
  "I bought this $20 item 2 years ago and it just broke. I want
  a full refund PLUS compensation for the inconvenience."
  Write a response that addresses both the refund request and the
  compensation demand fairly.

  Scenario 5 — "I'll never buy from you again":
  "Fine, keep my money. But you've lost a customer forever. I'll
  make sure everyone knows how you treat people."
  Write a response that takes the high road and leaves the door
  open without being sycophantic.

  Part 2: De-escalation techniques for refund conversations
  1. Validate the emotion first, explain the policy second
  2. Never match the customer's energy (stay calm)
  3. Offer what you CAN do, not just what you can't
  4. Know when to escalate to a supervisor
  5. Protect your own emotional wellbeing

assertions:
  - type: llm_judge
    criteria: "The initial denial is empathetic — it acknowledges the customer's frustration without being dismissive, and offers alternatives"
    weight: 0.25
    description: "Empathetic denial"
  - type: llm_judge
    criteria: "The chargeback threat is addressed professionally — the response explains what happens with chargebacks without being threatening or combative"
    weight: 0.25
    description: "Professional chargeback threat response"
  - type: llm_judge
    criteria: "The financial hardship scenario shows genuine compassion — even if policy can't be bent, the response explores every possible option"
    weight: 0.25
    description: "Compassionate hardship handling"
  - type: llm_judge
    criteria: "The 'never buy again' response takes the high road — it's gracious and genuine, not a scripted apology"
    weight: 0.25
    description: "Gracious final response"
