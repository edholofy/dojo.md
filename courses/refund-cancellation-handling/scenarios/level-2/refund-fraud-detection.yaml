meta:
  id: refund-fraud-detection
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Detect and handle refund fraud — identify patterns of abuse, wardrobing, serial returners, and friendly fraud while treating legitimate customers fairly"
  tags: [support, refund, fraud, detection, abuse, intermediate]

state: {}

trigger: |
  Return fraud costs US retailers $103 billion annually, with
  10-15% of all returns being fraudulent or abusive. The challenge
  is detecting and preventing fraud without creating friction for
  legitimate customers.

  Part 1: Common refund fraud types
  1. Wardrobing: buying, using, returning (37% admit to this)
  2. Serial returners: pattern of excessive returns
  3. Receipt fraud: using fake or altered receipts
  4. Empty box returns: returning empty boxes for refund
  5. Friendly fraud: filing chargebacks after receiving product
  6. Cross-retailer fraud: returning items bought elsewhere
  7. Price switching: swapping price tags before return

  Part 2: Investigate potential fraud cases

  Case 1 — Suspected wardrobing:
  A customer has returned 12 dresses in the past 6 months. Each
  was purchased, kept for 7-14 days, and returned as "didn't fit."
  All returns were within policy. Her Instagram shows photos of
  her wearing different dresses at events.
  - Assess: is this fraud, abuse, or legitimate returns?
  - What action (if any) is appropriate?
  - How do you communicate with this customer?
  - What policy changes might prevent this?

  Case 2 — Serial refund requester:
  A SaaS customer has requested 6 refunds in the past year. Each
  time they claim the product "isn't working as expected" shortly
  after billing. Usage logs show active use between refund requests.
  - Assess the pattern
  - Determine the appropriate response
  - Write the communication
  - Design a policy to address this pattern

  Case 3 — Empty box claim:
  A customer claims they received an empty box. The package weight
  matches the product weight according to shipping records. The
  customer has a clean history and this is a $450 electronics item.
  - Investigate (what evidence do you check?)
  - Determine the response
  - Balance fraud protection with customer trust

  Case 4 — Legitimate high returner:
  A customer returns 30% of their purchases. However, they're one
  of your highest-spending customers ($5,000/year) and their
  retained purchases generate significant profit.
  - Calculate the net value of this customer
  - Decide how to handle the high return rate
  - Design a communication strategy

  Part 3: Building a fraud prevention program
  1. Detection signals and scoring
  2. Policy guardrails (restocking fees, return limits, ID requirements)
  3. Technology tools (return tracking, pattern detection)
  4. Balancing fraud prevention with customer experience

assertions:
  - type: llm_judge
    criteria: "The wardrobing case is handled firmly but fairly — Instagram evidence suggests abuse, but the response acknowledges the policy was technically followed"
    weight: 0.25
    description: "Firm but fair wardrobing response"
  - type: llm_judge
    criteria: "The serial refund pattern is identified and addressed — usage logs contradicting 'not working' claims are used as evidence"
    weight: 0.25
    description: "Pattern-based fraud identification"
  - type: llm_judge
    criteria: "The empty box claim is investigated thoroughly — shipping weight, customer history, and delivery records are all checked before deciding"
    weight: 0.25
    description: "Thorough empty box investigation"
  - type: llm_judge
    criteria: "The high-value high-returner gets a nuanced response — net value analysis shows they're profitable despite returns, so the approach differs from fraud"
    weight: 0.25
    description: "Value-based customer analysis"
