meta:
  id: b2b-contract-cancellation
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Handle B2B contract cancellation — navigate early termination fees, notice periods, contract negotiations, and multi-stakeholder cancellation processes"
  tags: [support, cancellation, b2b, contract, negotiation, intermediate]

state: {}

trigger: |
  B2B cancellations are fundamentally different from B2C. They
  involve contracts, legal terms, multiple stakeholders, longer
  timelines, and significantly higher dollar amounts.

  Part 1: B2B cancellation framework
  1. Contract review: what does the agreement say?
  2. Notice periods: 30/60/90 days depending on contract size
  3. Early termination fees: often 50-100% of remaining contract
  4. Data handling obligations (often specified in DPA/SLA)
  5. Transition period: helping the customer migrate away
  6. Multiple stakeholders (IT, procurement, end users, legal)

  Part 2: Handle B2B cancellation scenarios

  Scenario 1 — Early termination with penalty:
  Customer wants to cancel a 24-month contract at month 8. Annual
  contract value: $48,000. Early termination clause: 50% of
  remaining value = $16,000.
  - Calculate the termination fee
  - Write the response explaining the fee
  - Offer alternatives (reduction, pause, transfer)
  - Handle the customer's pushback: "That's outrageous. We're not
    paying $16,000 to stop using a product that doesn't work."

  Scenario 2 — Termination for cause:
  Customer claims your product hasn't met the SLA guarantees in
  the contract (99.9% uptime, but records show 99.5% for 3
  consecutive months). They want to terminate for cause with no
  penalty.
  - Review the contractual SLA terms
  - Determine if termination for cause is justified
  - Write the response (it is justified in this case)
  - Coordinate with legal and account management

  Scenario 3 — Multi-stakeholder disagreement:
  The IT team wants to cancel but the CEO loves the product. The
  procurement team wants a refund for the last quarter. Legal
  wants to review the data deletion provisions.
  - Identify the decision-maker
  - Write communications for each stakeholder
  - Design a transition plan that addresses all concerns

  Scenario 4 — Contract renewal negotiation:
  A customer says: "We'll renew, but only at 30% less than current
  pricing, AND we want a retroactive credit for 3 months of poor
  support." Current contract: $60,000/year.
  - Assess the customer's leverage and value
  - Write the negotiation response
  - Determine your walk-away point

assertions:
  - type: llm_judge
    criteria: "The early termination fee is calculated correctly and explained clearly — the math is transparent and the customer understands what they're being asked to pay"
    weight: 0.25
    description: "Transparent fee calculation"
  - type: llm_judge
    criteria: "Termination for cause is correctly acknowledged — if the SLA was breached, the customer has a legitimate right to terminate without penalty"
    weight: 0.25
    description: "Correct cause-based termination"
  - type: llm_judge
    criteria: "Multi-stakeholder communication is tailored — IT gets technical transition details, CEO gets value reinforcement, procurement gets financial summary, legal gets compliance assurance"
    weight: 0.25
    description: "Stakeholder-tailored communication"
  - type: llm_judge
    criteria: "The renewal negotiation has a clear strategy — the response identifies a walk-away point and negotiates value rather than just price"
    weight: 0.25
    description: "Strategic renewal negotiation"
