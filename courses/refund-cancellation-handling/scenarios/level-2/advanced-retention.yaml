meta:
  id: advanced-retention
  level: 2
  course: refund-cancellation-handling
  type: output
  description: "Execute advanced retention strategies — design save offers, downgrades, and pauses that match customer cancellation reasons and maximize save rate"
  tags: [support, retention, save-offers, downgrade, pause, intermediate]

state: {}

trigger: |
  Advanced retention goes beyond generic discounts. It analyzes
  the customer's specific situation and offers a tailored solution
  that addresses their actual reason for leaving.

  Part 1: Retention offer framework
  Match the offer to the reason:
  - Price: discount, downgrade, annual commitment discount
  - Feature gap: roadmap preview, beta access, workaround
  - Underutilization: onboarding session, use case guidance
  - Poor experience: dedicated support, service recovery
  - Life change: pause, seasonal plan, reduced usage tier
  - Competitor: competitive comparison, unique value highlighting

  Part 2: Handle retention scenarios

  For "ProjectPro" SaaS ($39/mo basic, $79/mo pro, $149/mo team):

  Scenario 1 — Price sensitivity:
  "We're a startup and just lost our funding round. We need to cut
  costs everywhere. We love ProjectPro but can't justify $149/mo."
  Customer: Team plan, 8 users, 14 months tenure, high usage.
  Available offers: downgrade to Pro, 50% off 3 months, custom
  smaller team plan.
  Design the retention conversation.

  Scenario 2 — Competitor switch:
  "We're moving to [Competitor]. They have native Slack integration
  and their pricing includes unlimited projects."
  Customer: Pro plan, 6 months tenure, moderate usage.
  Available: Slack integration shipping in 6 weeks, 3-month free
  trial of Team plan to compare features.
  Design the retention conversation without disparaging competitor.

  Scenario 3 — Poor experience recovery:
  "I've had 3 bugs in the last month that caused me to lose work.
  I can't trust your product anymore."
  Customer: Pro plan, 11 months tenure, was a power user.
  Available: personal engineering contact, priority bug fix queue,
  3-month credit, dedicated support channel.
  Design the service recovery retention plan.

  Scenario 4 — Multiple attempts already made:
  "Look, I've been offered discounts twice. I appreciate it but
  I've made my decision. Please just cancel."
  Handle the graceful exit — no more retention attempts.

  Part 3: Measuring retention success
  - Save rate by reason (target: 20-30% overall)
  - Saved customer retention at 90 days (are they still active?)
  - Revenue saved vs. discount cost
  - Customer satisfaction post-save attempt

assertions:
  - type: llm_judge
    criteria: "Offers match reasons — the startup gets financial flexibility, the competitor-switching customer gets feature roadmap, the frustrated user gets service recovery"
    weight: 0.30
    description: "Reason-matched retention offers"
  - type: llm_judge
    criteria: "The 'already offered discounts twice' customer gets a clean exit — no more retention attempts, just graceful cancellation"
    weight: 0.25
    description: "Respectful exit after multiple attempts"
  - type: llm_judge
    criteria: "The competitor conversation avoids disparagement — it highlights ProjectPro's unique value without attacking the competitor"
    weight: 0.25
    description: "Competition handled respectfully"
  - type: llm_judge
    criteria: "Retention success measurement includes 90-day check — saved customers who churn 2 months later aren't really saved"
    weight: 0.20
    description: "Long-term retention measurement"
