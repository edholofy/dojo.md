meta:
  id: refund-governance-compliance
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Build refund governance and compliance frameworks — navigate regulatory requirements, audit readiness, internal controls, and risk management for refund operations"
  tags: [support, refund, governance, compliance, audit, expert]

state: {}

trigger: |
  Refund governance ensures consistency, compliance, and
  accountability across the organization. Poor governance leads
  to regulatory fines, audit failures, and internal fraud.

  Part 1: Regulatory compliance framework

  "GlobalPay" operates in the US, EU, UK, Australia, and Canada.

  Build the compliance matrix:

  1. US regulations:
     - FTC Act (unfair/deceptive practices)
     - State-level consumer protection (California, New York, Texas)
     - ROSCA (Restore Online Shoppers' Confidence Act)
     - PCI DSS compliance for refund processing
     - State auto-renewal laws (vary by state)
     Identify key requirements for refund operations.

  2. EU regulations:
     - Consumer Rights Directive (14-day withdrawal)
     - GDPR implications (right to erasure with refund data)
     - Payment Services Directive 2 (refund processing timelines)
     - Digital Content Directive (digital goods refunds)
     - Omnibus Directive (price transparency in refund credits)
     Identify key requirements and differences from US.

  3. UK regulations:
     - Consumer Rights Act 2015
     - Consumer Contracts Regulations 2013
     - Post-Brexit divergence from EU requirements
     Identify key UK-specific requirements.

  4. Australia and Canada:
     - Australian Consumer Law (consumer guarantees)
     - Canadian provincial consumer protection (varies by province)
     Identify key differences from other jurisdictions.

  Part 2: Internal governance framework

  Design the governance structure:

  1. Policy governance:
     - Who owns refund policy? (committee structure)
     - Policy change approval process
     - Exception approval framework with escalation
     - Annual policy review cycle
     - Policy communication and training requirements

  2. Financial controls:
     - Segregation of duties (who requests vs. who approves)
     - Authorization limits by role and amount
     - Aggregate exposure monitoring (daily, weekly, monthly)
     - Reconciliation procedures and frequency
     - Suspicious activity reporting

  3. Audit readiness:
     - Required documentation per refund transaction
     - Audit trail requirements (what, how long, access controls)
     - Internal audit program (frequency, scope, methodology)
     - External audit preparation checklist
     - Remediation tracking for audit findings

  Part 3: Risk management

  Design the risk framework:
  1. Fraud risk: internal (employee) and external (customer)
  2. Regulatory risk: non-compliance with changing laws
  3. Operational risk: system failures, processing errors
  4. Financial risk: excessive refunds impacting cash flow
  5. Reputational risk: refund experience damaging brand

  For each risk:
  - Risk assessment (likelihood × impact)
  - Current controls
  - Control gaps
  - Mitigation plan
  - Key risk indicators (KRIs) to monitor

assertions:
  - type: llm_judge
    criteria: "Compliance matrix identifies actionable differences between jurisdictions — not just listing laws but highlighting where the same refund scenario gets different treatment"
    weight: 0.25
    description: "Actionable jurisdiction differences"
  - type: llm_judge
    criteria: "Internal controls include segregation of duties — the framework ensures no single person can both approve and process a refund, preventing internal fraud"
    weight: 0.25
    description: "Segregation of duties controls"
  - type: llm_judge
    criteria: "Audit readiness is comprehensive — the framework specifies what documentation is required per transaction, how long it's retained, and how to prepare for both internal and external audits"
    weight: 0.25
    description: "Comprehensive audit readiness"
  - type: llm_judge
    criteria: "Risk framework uses quantified assessment — each risk has likelihood × impact scoring with specific key risk indicators, not just qualitative descriptions"
    weight: 0.25
    description: "Quantified risk assessment"
