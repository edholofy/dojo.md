meta:
  id: complex-refund-simulation
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Simulate a complex refund operations day involving system failures, regulatory pressure, fraud detection, executive escalations, and strategic decision-making"
  tags: [support, refund, simulation, complex, crisis, expert]

state: {}

trigger: |
  You're the Director of Refund Operations at "OmniRetail" — a
  $500M global e-commerce platform with 3 million customers across
  20 countries. Today tests every aspect of your leadership.

  Morning (8:00 AM - 12:00 PM):

  8:00 AM — Overnight alert:
  Your fraud detection system flagged a potential organized fraud
  ring: 340 refund requests from 85 accounts, all for electronics
  ($45K total), filed between 2-4 AM. Accounts were created in
  the past 30 days. The auto-refund system processed 120 of them
  ($15.8K) before the alert triggered.

  - Assess the damage and stop further processing
  - Determine which of the 120 processed refunds can be reversed
  - Investigate whether this is actually fraud or a false positive
  - Brief your VP and legal team

  9:30 AM — Regulatory notice:
  Your German legal team forwards a letter from the German Federal
  Office of Consumer Protection. They've received 47 complaints
  about your company denying refunds for digital subscriptions
  within the 14-day withdrawal period. They're requesting a
  response within 15 business days.

  - Review your digital subscription refund policy for EU
  - Determine if the complaints are valid
  - Draft the response plan
  - Estimate remediation cost if policy change is needed

  11:00 AM — System degradation:
  The refund processing system is experiencing 60% slower response
  times. 2,300 refunds are queued and growing. Customer service
  tickets about refund delays are spiking.

  - Triage: which refunds need priority processing?
  - Customer communication: proactive vs. reactive?
  - Engineering escalation: severity and expected resolution?
  - Business impact assessment

  Afternoon (1:00 PM - 5:00 PM):

  1:00 PM — Executive escalation:
  The CEO forwards an email from a major enterprise client ($2M
  annual spend): "We're terminating our contract unless the 3
  disputed invoices ($180K total) are resolved by Friday."

  - Review the 3 disputed invoices
  - Coordinate with sales, finance, and legal
  - Develop the resolution proposal
  - Write the CEO's response

  3:00 PM — Board preparation:
  The CFO needs your input for tomorrow's board meeting:
  "What's our refund exposure for Q1, and what's the forecast
  for Q2? The board wants to understand why refund costs are
  up 18% YoY."

  - Prepare the board-ready analysis
  - Explain the 18% increase with root causes
  - Forecast Q2 with confidence intervals
  - Recommend actions to control costs

  4:30 PM — Team crisis:
  Your best senior analyst (the one managing the fraud investigation
  from this morning) just submitted their resignation effective in
  2 weeks. They hold critical institutional knowledge about fraud
  patterns and system configurations.

  - Knowledge transfer plan for the next 2 weeks
  - Impact assessment on the current fraud investigation
  - Succession plan for the role
  - Retention attempt (if appropriate)

  End the day with a comprehensive situation report covering all
  six incidents, their status, and required follow-ups.

assertions:
  - type: llm_judge
    criteria: "Fraud ring response is systematic — it stops further processing, assesses reversibility of processed refunds, investigates false positive possibility, and escalates appropriately"
    weight: 0.25
    description: "Systematic fraud response"
  - type: llm_judge
    criteria: "Regulatory response takes EU compliance seriously — the analysis correctly identifies whether the digital subscription refund denials violated the Consumer Rights Directive"
    weight: 0.25
    description: "EU compliance seriousness"
  - type: llm_judge
    criteria: "Board analysis explains the 18% increase with root causes — the explanation goes beyond 'more refunds' to identify specific drivers (mix shift, policy change, product issues, etc.)"
    weight: 0.25
    description: "Root-cause board analysis"
  - type: llm_judge
    criteria: "Situation report connects all six incidents — the end-of-day summary shows how the incidents relate, identifies systemic issues, and prioritizes follow-ups"
    weight: 0.25
    description: "Connected situation report"
