meta:
  id: subscription-lifecycle-optimization
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Optimize the full subscription lifecycle — from trial conversion through renewal and expansion to graceful offboarding, reducing involuntary and voluntary churn at every stage"
  tags: [support, subscription, lifecycle, churn-reduction, optimization, expert]

state: {}

trigger: |
  Subscription churn happens throughout the lifecycle, not just at
  cancellation. Optimizing each stage — trial, onboarding, adoption,
  renewal, expansion, and offboarding — creates compound retention
  improvement.

  Part 1: Lifecycle churn analysis

  "AppSuite" — a productivity SaaS:
  - 50,000 paying customers
  - Plans: Starter ($19/mo), Professional ($49/mo), Business ($99/mo)
  - Trial-to-paid conversion: 12% (benchmark: 15-25%)
  - Month 1-3 churn: 8% per month (early churn)
  - Month 4-12 churn: 3.5% per month (steady state)
  - Month 13+ churn: 2% per month (mature customers)
  - Annual renewal rate: 72% (for annual plans)
  - Expansion revenue: 8% of existing base (benchmark: 15-30%)

  1. Diagnose lifecycle-stage churn:

     Trial stage (12% conversion):
     - Why are 88% not converting?
     - What activation milestones predict conversion?
     - Design intervention strategy for trial users

     Early stage (months 1-3, 8% monthly churn):
     - Why is early churn so high?
     - What onboarding failures drive early exits?
     - Design the first-90-days retention program

     Steady state (months 4-12, 3.5% monthly):
     - What causes churn after initial adoption?
     - How to identify at-risk customers in this phase?
     - Design the engagement maintenance program

     Mature stage (13+ months, 2% monthly):
     - Why do long-term customers eventually leave?
     - How to drive expansion instead of churn?
     - Design the account growth playbook

     Annual renewal (72% renewal rate):
     - Why do 28% not renew?
     - What predicts non-renewal 60-90 days out?
     - Design the renewal campaign

  2. Build the lifecycle communication framework:
     Map the key touchpoints across the lifecycle:
     - Day 1, 3, 7, 14 (trial nurture)
     - Day 30, 60, 90 (early retention)
     - Quarterly business reviews (steady state)
     - Renewal campaign (60, 30, 15, 7 days before)
     - Expansion triggers (usage thresholds)
     Define message, channel, and goal for each touchpoint.

  3. Model the revenue impact:
     If you improve each stage by realistic amounts:
     - Trial conversion: 12% → 18%
     - Early churn: 8% → 5% monthly
     - Steady state churn: 3.5% → 2.5% monthly
     - Renewal rate: 72% → 82%
     - Expansion revenue: 8% → 15%

     Calculate:
     - Additional customers retained per year
     - Additional ARR from improved retention
     - Additional ARR from expansion
     - Total incremental ARR
     - Customer lifetime value improvement

assertions:
  - type: llm_judge
    criteria: "Lifecycle diagnosis identifies stage-specific root causes — trial non-conversion has different causes than early churn, which differs from mature churn, and each gets targeted analysis"
    weight: 0.30
    description: "Stage-specific root cause analysis"
  - type: llm_judge
    criteria: "Communication framework maps to lifecycle moments — touchpoints are triggered by customer behavior and lifecycle stage, not just arbitrary time intervals"
    weight: 0.25
    description: "Behavior-triggered touchpoints"
  - type: llm_judge
    criteria: "Revenue model shows compound impact — the analysis demonstrates how small improvements at each stage compound into significant ARR growth"
    weight: 0.25
    description: "Compound revenue impact"
  - type: llm_judge
    criteria: "Expansion strategy is concrete — it identifies specific usage thresholds and customer signals that trigger upsell conversations, not just 'try to upsell'"
    weight: 0.20
    description: "Concrete expansion triggers"
