meta:
  id: refund-leadership
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Lead refund and cancellation strategy at the organizational level — influence policy, drive cross-functional alignment, and build a culture where refund handling is a competitive advantage"
  tags: [support, refund, leadership, strategy, cross-functional, expert]

state: {}

trigger: |
  Refund leadership isn't about processing individual refunds —
  it's about shaping organizational policy, influencing product
  decisions, and making the refund experience a competitive
  advantage.

  Part 1: Cross-functional influence

  You're the VP of Customer Operations at "RetailNext" ($200M
  annual revenue). The CEO has asked you to present a "Refund
  Strategy 2026" to the executive team.

  Current state:
  - Refund rate: 12% (industry average: 8%)
  - Customer satisfaction with refund process: 3.2/5
  - Refund processing cost: $12M annually
  - Revenue lost to refunds: $24M annually
  - Chargebacks: 0.9% (approaching 1% threshold)
  - Return fraud estimated at: $4.2M annually
  - NPS among customers who experienced a refund: 12 (vs 42 overall)

  1. Build the executive presentation:
     - Current state analysis (where are we?)
     - Root cause analysis (WHY is our refund rate 50% above average?)
     - Competitive benchmarking (how do top performers handle this?)
     - Financial impact model (what's the total cost of poor refund
       experience, including lost customers?)
     - Strategic recommendations (3-5 key initiatives)
     - Investment ask and expected ROI
     - 12-month execution timeline

  2. Navigate the cross-functional politics:
     - Product team: "Our product quality is fine, customers just
       don't read the descriptions properly."
     - Finance team: "Every dollar refunded comes out of margin.
       We need stricter policies, not easier refunds."
     - Marketing team: "Our generous return policy is a selling
       point. Don't make it harder."
     - Legal team: "We need to comply with regulations but beyond
       that, minimize exposure."

     Write your response to each stakeholder that brings them
     along without alienating them. Use data to shift perspectives.

  3. Design the refund experience as differentiator:
     How can "RetailNext" turn their refund experience into a
     competitive advantage?
     - Instant refunds (before return received)
     - No-questions-asked policy (within guardrails)
     - Proactive refund offers (detected issues → automatic credit)
     - Refund experience as loyalty driver
     Quantify the expected impact of each initiative.

  4. Build the measurement framework:
     Define the "Refund Health Score" — a composite metric that
     tracks overall refund program health for board-level reporting.

assertions:
  - type: llm_judge
    criteria: "Executive presentation tells a data-driven story — the root cause analysis connects refund rate to specific product, process, and policy issues rather than blaming customers or agents"
    weight: 0.25
    description: "Data-driven executive story"
  - type: llm_judge
    criteria: "Cross-functional responses use data to persuade — each stakeholder gets evidence that addresses their specific concern rather than generic pushback"
    weight: 0.25
    description: "Data-driven stakeholder alignment"
  - type: llm_judge
    criteria: "Refund-as-differentiator initiatives are quantified — each proposed initiative has an estimated cost and expected revenue/retention impact"
    weight: 0.25
    description: "Quantified differentiator initiatives"
  - type: llm_judge
    criteria: "The Refund Health Score is a composite that executives can track — it combines operational metrics, financial impact, and customer experience into a single actionable number"
    weight: 0.25
    description: "Composite health score"
