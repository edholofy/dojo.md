meta:
  id: refund-customer-journey-impact
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Analyze and optimize the impact of refund experiences on the customer journey — turn refund moments into loyalty drivers through journey mapping, service recovery, and experience design"
  tags: [support, refund, customer-journey, service-recovery, experience, expert]

state: {}

trigger: |
  A refund experience is a critical moment of truth. Research shows
  customers who have a problem resolved well are actually MORE loyal
  than customers who never had a problem (the service recovery
  paradox). The refund moment can build or destroy the relationship.

  Part 1: Journey mapping the refund experience

  "LuxeGoods" — a premium online retailer:

  Map the customer refund journey with emotional states:

  1. Pre-request stage:
     - Customer realizes they need a refund
     - Searches for return policy (can they find it easily?)
     - Decides whether it's worth the effort
     Emotional state: uncertainty, potential frustration

  2. Request stage:
     - Initiates the return/refund request
     - Provides reason and details
     - Receives initial response
     Emotional state: anxiety, impatience

  3. Processing stage:
     - Waits for approval/denial
     - Ships return (if applicable)
     - Checks status
     Emotional state: limbo, potential frustration

  4. Resolution stage:
     - Receives refund or denial
     - Checks bank account
     - Decides about future relationship
     Emotional state: relief or anger

  For each stage:
  - Map the customer's actions, thoughts, and emotions
  - Identify pain points and friction
  - Design improvements
  - Define success metrics

  Part 2: Service recovery program

  Design the service recovery framework:

  1. Recovery levels by severity:
     - Level 1 (minor inconvenience): apology + swift resolution
     - Level 2 (moderate frustration): apology + resolution + goodwill
     - Level 3 (significant impact): personal outreach + resolution +
       meaningful compensation
     - Level 4 (major failure): executive involvement + full recovery +
       relationship restoration

     For each level, define:
     - Trigger criteria
     - Response time SLA
     - Communication template
     - Compensation framework (what, how much, limits)
     - Follow-up cadence

  2. The "surprise and delight" playbook:
     Design 5 unexpected positive moments within the refund journey:
     - Proactive refund before customer asks
     - Upgrade offer during return process
     - Personalized follow-up after resolution
     - Loyalty reward for handling the situation gracefully
     - Anniversary acknowledgment of the recovered relationship

  Part 3: Measuring journey impact

  Design the measurement framework:
  - NPS/CSAT at each journey stage (not just post-resolution)
  - Customer effort score (CES) for the refund process
  - Post-refund purchase behavior (do they come back?)
  - Revenue per customer: refund customers vs. no-refund customers
  - Service recovery paradox validation (are recovered customers
    actually more loyal?)

assertions:
  - type: llm_judge
    criteria: "Journey mapping includes emotional states — the analysis tracks not just what customers do but how they feel at each stage, identifying emotional pain points"
    weight: 0.25
    description: "Emotion-mapped journey"
  - type: llm_judge
    criteria: "Service recovery levels are proportional — the response escalates with severity, and compensation is meaningful without being wasteful"
    weight: 0.25
    description: "Proportional recovery levels"
  - type: llm_judge
    criteria: "Surprise and delight moments are genuine — they create real positive emotion, not just transactional gestures"
    weight: 0.25
    description: "Genuine delight moments"
  - type: llm_judge
    criteria: "Measurement validates the service recovery paradox — the framework tracks whether recovered customers actually become more loyal, with post-refund purchase behavior data"
    weight: 0.25
    description: "Paradox-validating measurement"
