meta:
  id: retention-as-revenue-strategy
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Transform retention from cost center to revenue driver — build data-driven retention programs that measurably increase customer lifetime value and reduce revenue leakage"
  tags: [support, retention, revenue, strategy, ltv, expert]

state: {}

trigger: |
  Retention isn't just preventing cancellations — it's a revenue
  strategy. Companies that invest in retention see 25-95% more
  profit than those focused solely on acquisition. Your retention
  function should demonstrate measurable ROI.

  Part 1: Retention economics

  "CloudStack" — a B2B SaaS platform:
  - ARR: $45M
  - Monthly churn rate: 3.8%
  - Annual churn rate: 37%
  - Customer acquisition cost (CAC): $2,800
  - Average contract value (ACV): $18,000
  - Current retention team: 8 people, $1.2M annual cost
  - Current save rate: 18%
  - Current saved revenue (annual): $3.1M

  1. Build the retention P&L:
     - Revenue at risk (cancellation requests × ACV)
     - Revenue saved (save rate × revenue at risk)
     - Cost of retention team and tools
     - ROI of retention function
     - Revenue saved per retention dollar spent
     - Comparison: cost of saving vs. cost of replacing (CAC)

  2. Design the predictive churn model:
     Identify leading indicators of churn:
     - Product usage decline (which metrics?)
     - Support ticket patterns (what signals trouble?)
     - Payment behavior changes
     - Engagement drop-offs (login frequency, feature adoption)
     - Sentiment signals (NPS, survey responses)
     - Contract/billing changes (downgrades, payment delays)

     For each indicator, define:
     - Data source and collection method
     - Signal strength (how predictive is it?)
     - Lead time (how early can you detect?)
     - Intervention point (when to act)

  3. Build the retention intervention playbook:
     For each churn risk level (low, medium, high, critical):
     - Trigger criteria (what score/signals)
     - Response time SLA
     - Intervention type (automated vs. human)
     - Offer framework (what to offer, escalation)
     - Success metrics (saved? downsell? delayed?)

     Design specific plays:
     - Usage decline play (re-engagement + training)
     - Price sensitivity play (value reinforcement + options)
     - Competitive threat play (differentiation + switching cost)
     - Product gap play (roadmap + workaround)
     - Relationship issue play (account manager change + recovery)

  4. Measure retention program maturity:
     - Level 1: Reactive (respond to cancellation requests)
     - Level 2: Proactive (reach out based on signals)
     - Level 3: Predictive (ML-driven risk scoring)
     - Level 4: Strategic (retention as growth lever)
     Assess CloudStack's current level and build the path to Level 4.

assertions:
  - type: llm_judge
    criteria: "Retention P&L demonstrates clear ROI — the analysis shows retention is cheaper than acquisition and quantifies the return on the $1.2M team investment"
    weight: 0.25
    description: "Clear retention ROI"
  - type: llm_judge
    criteria: "Predictive indicators are specific and actionable — each leading indicator has a defined data source, signal strength, and intervention point, not just a list of possible signals"
    weight: 0.25
    description: "Actionable predictive indicators"
  - type: llm_judge
    criteria: "Intervention playbook matches risk level to response — critical risks get immediate human outreach, low risks get automated nurturing, with appropriate offers for each"
    weight: 0.25
    description: "Risk-matched interventions"
  - type: llm_judge
    criteria: "Maturity model provides a clear upgrade path — the assessment identifies CloudStack's current level and specific actions needed to advance to the next level"
    weight: 0.25
    description: "Clear maturity upgrade path"
