meta:
  id: refund-operations-at-scale
  level: 4
  course: refund-cancellation-handling
  type: output
  description: "Scale refund operations for enterprise volume — design systems, processes, and organizational structures that handle millions of refund transactions while maintaining quality"
  tags: [support, refund, operations, scale, enterprise, expert]

state: {}

trigger: |
  At enterprise scale, refund operations become a strategic
  function. The difference between good and great operations at
  this scale can mean tens of millions in revenue impact.

  Part 1: Scale challenge assessment

  "MegaCommerce" — an enterprise marketplace:
  - Annual GMV: $2.8 billion
  - Monthly refund requests: 185,000
  - Current refund team: 120 agents across 3 time zones
  - Average refund value: $67
  - Total annual refund volume: $148M (5.3% of GMV)
  - Processing cost per refund: $4.20
  - Total annual processing cost: $9.3M

  Current pain points:
  - Inconsistent policy application across regions
  - 4-day average processing time (target: 24 hours)
  - 15% of refunds require re-work due to errors
  - No real-time fraud detection (batch review daily)
  - Third-party seller refund disputes take 2-3 weeks
  - Customer satisfaction with refund experience: 3.4/5

  1. Design the target operating model:
     - Organizational structure (centralized vs. distributed)
     - Technology architecture (automation, rules engine, ML)
     - Process standardization across regions
     - Quality framework at scale
     - Financial controls and authorization framework

  2. Build the automation strategy:
     Current automation rate: 22%
     Target: 75% within 12 months

     Categorize refund types by automation potential:
     - Tier 1: Full automation (no human, instant)
     - Tier 2: Auto-approve with human audit (sampled QA)
     - Tier 3: Human-assisted (AI drafts, human confirms)
     - Tier 4: Full human review (complex cases only)

     For each tier, define:
     - Criteria for classification
     - Expected volume percentage
     - Processing time target
     - Quality assurance approach
     - Exception handling

  3. Design the financial control framework:
     - Authorization matrix (who can approve what amounts)
     - Aggregate exposure monitoring (daily/weekly limits)
     - Fraud detection at scale (real-time vs. batch)
     - Financial reconciliation automation
     - Audit trail and compliance requirements

  4. Build the 12-month transformation roadmap:
     Quarter by quarter:
     - Q1: Foundation (systems, data, team restructure)
     - Q2: Automation deployment (Tier 1 and 2)
     - Q3: AI integration (Tier 3, fraud detection)
     - Q4: Optimization and expansion
     Include KPIs, milestones, and investment required.

assertions:
  - type: llm_judge
    criteria: "Operating model addresses regional consistency — the design ensures the same refund scenario gets the same outcome regardless of which region or agent handles it"
    weight: 0.25
    description: "Regional consistency model"
  - type: llm_judge
    criteria: "Automation tiers are realistic — the path from 22% to 75% automation is broken into concrete categories with clear criteria, not just aspirational targets"
    weight: 0.25
    description: "Realistic automation path"
  - type: llm_judge
    criteria: "Financial controls scale appropriately — authorization limits, aggregate monitoring, and fraud detection are designed for 185K monthly transactions, not a small business"
    weight: 0.25
    description: "Enterprise financial controls"
  - type: llm_judge
    criteria: "Transformation roadmap is sequenced correctly — foundational work (data, systems) comes before advanced automation, with dependencies between quarters acknowledged"
    weight: 0.25
    description: "Correctly sequenced roadmap"
