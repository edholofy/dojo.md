meta:
  id: gardening-starter-guide
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a beginner vegetable gardening tutorial for apartment dwellers with limited space, covering container selection, soil, planting, and harvest"
  tags: [gardening, container-gardening, beginner, outdoor]

state: {}

trigger: |
  You're a master gardener writing a tutorial called
  "Grow Your Own Food on a Balcony: Container
  Vegetable Gardening for Complete Beginners" for
  your local extension office website.

  Tutorial parameters:
  - Audience: Apartment dwellers who have never
    grown anything, with a balcony or sunny window
  - Space: 4x6 foot balcony or 2-3 sunny windowsills
  - Budget: Under $50 to start
  - Season: Spring planting (adaptable to zones 5-9)
  - Goal: Grow 5 edible plants and harvest something
    within 8 weeks

  Tutorial requirements:
  - Space assessment checklist (sunlight hours,
    wind exposure, weight limits, water access)
  - Container selection guide (what size for what
    plant, drainage requirements, budget options
    including upcycled containers)
  - Soil and fertilizer basics (potting mix vs.
    garden soil, why it matters, organic options)
  - 5 beginner-friendly plants to grow:
    - Herbs (basil, parsley)
    - Lettuce/salad greens
    - Cherry tomatoes
    - Green onions (from grocery store scraps)
    - Strawberries
  - For each plant: planting instructions, spacing,
    watering schedule, sunlight needs, days to
    harvest, common problems
  - Watering guide (how to tell when to water,
    overwatering vs. underwatering signs)
  - Weekly care calendar (what to do each week for
    8 weeks)
  - Troubleshooting (yellow leaves, leggy plants,
    pests in containers, wilting)
  - Harvest guidance (when and how to pick)
  - Photo placement notes for key steps

  Task: Write the complete container gardening
  tutorial with all sections and the 8-week care
  calendar.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete container gardening tutorial — includes space assessment, container guide, soil basics, all 5 plant profiles with specific instructions, watering guide, 8-week care calendar, troubleshooting, and harvest guidance; instructions are specific enough for someone who has never touched soil; the $50 budget constraint is respected with practical shopping guidance."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response is genuinely beginner-accessible — assumes no gardening knowledge; explains why steps matter (not just what to do); the 5 plant selections are truly forgiving for beginners; watering guidance uses sensory cues (not just schedules); troubleshooting covers real beginner problems; the overall tutorial would work in a small apartment space."
    weight: 0.35
    description: "BeginnerAccessibility"
  - type: llm_judge
    criteria: "Response would result in a successful first garden — the 8-week calendar provides structure; the plant selection ensures some quick wins (lettuce, green onions); the troubleshooting prevents common failures; the overall experience would be rewarding enough to continue gardening; the tutorial builds connection between growing food and eating it."
    weight: 0.30
    description: "GardeningSuccess"
