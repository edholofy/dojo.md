meta:
  id: public-speaking-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a public speaking tutorial for anxious beginners, covering preparation, delivery, and managing nervousness for workplace presentations"
  tags: [soft-skills, public-speaking, beginner, professional]

state: {}

trigger: |
  You're a communications coach writing a tutorial
  called "Your First Presentation: A Survival Guide
  for the Presentation-Phobic" for a corporate
  learning blog. Your readers have presentation
  anxiety and would rather do almost anything than
  speak in front of colleagues.

  Tutorial parameters:
  - Audience: Professionals who avoid presentations
    but can no longer escape them (promotion depends
    on it)
  - Context: 10-15 minute workplace presentations
    (team meetings, project updates, client pitches)
  - Goal: Deliver a competent presentation without
    panic, not become a TED speaker
  - Tone: Empathetic, practical, normalizes anxiety

  Tutorial requirements:
  - Section 1: Understanding presentation anxiety
    (why it happens, how common it is, reframing
    nervousness as energy)
  - Section 2: Preparing your content
    - The 3-part structure (opening hook, body with
      3 key points, closing with call to action)
    - How to decide what to include (and what to
      cut)
    - Creating speaker notes (not a script)
    - Slide design basics (if using slides)
  - Section 3: Rehearsal strategy
    - How to practice effectively (not just re-
      reading notes)
    - Recording yourself and what to notice
    - The "dry run" with a trusted colleague
    - Timing your presentation
  - Section 4: Managing nerves on the day
    - Pre-presentation routine (breathing exercises,
      power poses, arrival time)
    - What to do when your mind goes blank
    - Handling shaky voice, trembling hands, dry
      mouth
    - The "first 30 seconds" strategy (memorize
      your opening)
  - Section 5: During the presentation
    - Where to look (not at slides, not at the floor)
    - Pacing and pausing (the power of silence)
    - Handling Q&A (buying time, saying "I don't
      know," bridging)
    - Reading the room (basic audience cues)
  - Section 6: After the presentation
    - Self-assessment (what went well, not just what
      went wrong)
    - Asking for useful feedback
    - Building on each presentation experience
  - Include: Example presentation outline (5-minute
    project update)
  - Include: Checklist for presentation day

  Task: Write the complete public speaking tutorial
  with all 6 sections, the example outline, and the
  presentation day checklist.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete public speaking tutorial — covers all 6 sections with practical techniques; the 3-part content structure is clearly explained; rehearsal strategies are specific and actionable; nerve management techniques are evidence-based; during-presentation guidance covers eye contact, pacing, and Q&A; the example outline and checklist are included and usable."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response genuinely addresses presentation anxiety — normalizes nervousness without dismissing it; the techniques for managing physical symptoms are practical; the 'first 30 seconds' strategy addresses the hardest moment; the self-assessment section prevents negative spirals; the overall tone would make an anxious reader feel understood, not judged."
    weight: 0.35
    description: "AnxietyManagement"
  - type: llm_judge
    criteria: "Response would result in a competent first presentation — the preparation strategy prevents under-preparation; the rehearsal advice builds real confidence; the day-of checklist reduces last-minute panic; the 'what to do when your mind goes blank' section provides actual recovery strategies; the overall tutorial sets realistic expectations and achievable goals."
    weight: 0.30
    description: "PracticalOutcome"
