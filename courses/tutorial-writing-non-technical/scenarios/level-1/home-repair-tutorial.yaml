meta:
  id: home-repair-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a beginner home repair tutorial for a common household fix, with safety guidance, tool identification, and step-by-step instructions"
  tags: [diy, home-repair, beginner, practical]

state: {}

trigger: |
  You're a home maintenance educator writing a
  tutorial called "Fix It Yourself: How to Repair
  a Running Toilet (Save $150 in Plumber Fees)"
  for a homeowner education website. Your readers
  are first-time homeowners who have never done
  any plumbing work.

  Tutorial parameters:
  - Audience: Adults who own or rent a home and
    have never repaired anything plumbing-related
  - Skill level: Complete beginner (doesn't know
    what a flapper valve is)
  - Tools: Basic household tools (most already
    owned)
  - Time: 30-60 minutes
  - Cost: Under $15 in parts

  Tutorial requirements:
  - "Do I need a plumber?" decision guide (when to
    DIY vs. call a professional)
  - How a toilet works (simple explanation with
    diagram description — fill valve, flush valve,
    flapper, float, supply line)
  - Diagnosis section: 3 common causes of a running
    toilet and how to identify which one you have
    - Worn flapper
    - Float set too high
    - Fill valve malfunction
  - For each cause: step-by-step repair with:
    - Tools needed
    - Parts needed (with "bring this to the hardware
      store" description guidance)
    - Step-by-step instructions with checkpoint cues
    - "What to do if this doesn't fix it"
  - Safety section (water shut-off location, not
    electrical — just water safety)
  - Hardware store guidance (what to buy, how to
    find it, how to ask for help)
  - Testing procedure (how to verify the fix worked)
  - Maintenance tips (prevent future running toilets)
  - Photo/diagram placement notes for each major
    step
  - Cost savings calculation (DIY vs. plumber)

  Task: Write the complete toilet repair tutorial
  with diagnosis guide, all 3 repair procedures,
  and supplementary guidance.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete home repair tutorial — includes the decision guide, toilet anatomy explanation, diagnosis for 3 causes, step-by-step repair for each, safety section, hardware store guidance, testing procedure, maintenance tips, and photo notes; the anatomy explanation makes the mechanism understandable; each repair procedure is detailed enough for someone who has never opened a toilet tank."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response makes plumbing accessible to complete beginners — explains what every part is and does; uses everyday language (not just plumbing jargon); the diagnosis section helps identify the right problem before buying parts; hardware store guidance prevents embarrassment and wasted trips; the 'do I need a plumber?' section prevents dangerous DIY attempts."
    weight: 0.35
    description: "BeginnerAccessibility"
  - type: llm_judge
    criteria: "Response would result in a successful repair — the diagnosis process identifies the correct issue; the repair steps are in the right order; the testing procedure confirms the fix; the cost savings comparison motivates the reader; the overall tutorial would empower a homeowner to handle basic plumbing maintenance."
    weight: 0.30
    description: "RepairSuccess"
