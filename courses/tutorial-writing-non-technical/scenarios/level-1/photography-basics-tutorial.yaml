meta:
  id: photography-basics-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a smartphone photography tutorial that teaches composition, lighting, and editing fundamentals to help beginners take noticeably better photos"
  tags: [photography, smartphone, beginner, visual-arts]

state: {}

trigger: |
  You're a professional photographer creating a
  tutorial called "Better Photos Today: A Smartphone
  Photography Guide for Everyone" for a community
  arts center newsletter. Your readers take hundreds
  of phone photos but are never satisfied with the
  results.

  Tutorial parameters:
  - Audience: Adults who use smartphones daily but
    have never studied photography
  - Equipment: Any smartphone (iPhone or Android)
  - No expensive apps required (native camera app +
    one free editing app)
  - Goal: Immediate, noticeable improvement in
    everyday photos

  Tutorial requirements:
  - Section 1: Understanding light (golden hour, 
    window light, harsh midday sun, when to use
    flash — never)
  - Section 2: Composition basics (rule of thirds,
    leading lines, framing, negative space — with
    before/after examples described)
  - Section 3: Common subjects made better (food,
    pets, kids, landscapes, selfies/portraits —
    specific tips for each)
  - Section 4: Phone camera settings you should
    know (grid lines, HDR, portrait mode, exposure
    lock)
  - Section 5: Basic editing (crop, brightness,
    contrast, saturation — the "5-tap edit" routine)
  - Section 6: Organizing and sharing (album
    management, social media sizing)
  - Include: 10 practice assignments (one per day
    for two weeks, with rest days)
  - Include: "Common mistakes" for each section
  - Include: Photo placement notes describing
    before/after comparison images

  Task: Write the complete smartphone photography
  tutorial with all 6 sections, practice assignments,
  and before/after descriptions.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete photography tutorial — covers all 6 sections with practical advice; before/after examples are clearly described; phone camera settings are explained for both iPhone and Android; the 5-tap editing routine is specific and repeatable; 10 practice assignments give hands-on learning; common mistakes are addressed per section; the tutorial covers enough subjects to be immediately useful."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches photography principles accessibly — explains WHY each technique works (not just rules to follow); the composition section teaches the eye, not just the grid; lighting advice is practical for everyday situations; the editing section prevents over-editing; the common subjects tips are genuinely helpful; the overall tutorial builds visual literacy, not just phone skills."
    weight: 0.35
    description: "PhotographyTeaching"
  - type: llm_judge
    criteria: "Response would produce noticeably better photos — the practice assignments build skills progressively; the techniques are immediately applicable; the editing routine is quick enough to become a habit; the overall tutorial delivers on the promise of 'better photos today' without requiring expensive equipment or extensive study."
    weight: 0.30
    description: "ImmediateImprovement"
