meta:
  id: fitness-routine-guide
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a beginner fitness tutorial for a 4-week at-home workout program, covering proper form, progression, and safety for people who haven't exercised in years"
  tags: [fitness, workout, beginner, health]

state: {}

trigger: |
  You're a certified personal trainer creating a
  free guide called "Your First 4 Weeks: A Gentle
  Return to Fitness" for your website. Your target
  reader hasn't exercised regularly in 5+ years and
  feels intimidated by gym culture and fitness
  influencer content.

  Tutorial parameters:
  - Audience: Adults 30-55 who want to start
    exercising but feel out of shape and overwhelmed
  - Equipment: None required (bodyweight only)
  - Location: At home, small space
  - Duration: 4-week progressive program, 3 sessions
    per week, 20-30 minutes each
  - Goal: Build the habit and basic fitness, not
    dramatic transformation

  Tutorial requirements:
  - Week-by-week program with clear progression
  - Each exercise described with:
    - Starting position
    - Movement description (step by step)
    - Breathing cues
    - Common form mistakes and corrections
    - Modification options (easier AND harder)
    - What you should feel (and what means stop)
  - Warm-up and cool-down routines
  - Recovery guidance (rest days, soreness vs. pain)
  - Safety disclaimers (when to consult a doctor)
  - Motivation strategies (habit formation, tracking)
  - Photo/illustration placement notes for each
    exercise
  - Week 1 sample session written out completely
    (all exercises, sets, rest periods)
  - FAQ section addressing common beginner concerns
    (soreness, not seeing results, feeling silly)

  Task: Write the complete 4-week fitness tutorial
  with the full program, exercise descriptions,
  safety guidance, and motivation strategies.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete 4-week fitness tutorial — includes progressive weekly structure, exercise descriptions with form cues and modifications, warm-up/cool-down, recovery guidance, safety disclaimers, motivation strategies, and FAQ; Week 1 sample session is fully written out; the program progresses appropriately from week to week; exercises are described clearly enough to perform without a trainer."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response is genuinely beginner-appropriate — the exercises are achievable for deconditioned adults; modifications make every exercise accessible; the tone is encouraging without being patronizing; safety guidance is responsible (doctor consultation, pain vs. soreness distinction); the program doesn't promise unrealistic results; the overall approach would not intimidate the target audience."
    weight: 0.35
    description: "BeginnerSafety"
  - type: llm_judge
    criteria: "Response would build a sustainable exercise habit — the 4-week progression keeps motivation high; the habit formation strategies address real barriers; the FAQ section normalizes beginner concerns; the program is realistic for someone with a busy life; the overall tutorial treats fitness as a lifestyle change, not a quick fix."
    weight: 0.30
    description: "HabitBuilding"
