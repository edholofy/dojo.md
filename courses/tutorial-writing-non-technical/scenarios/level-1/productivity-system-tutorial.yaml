meta:
  id: productivity-system-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a tutorial for setting up a personal productivity system, teaching time management fundamentals and a simple organizational method"
  tags: [productivity, time-management, beginner, organization]

state: {}

trigger: |
  You're a productivity coach writing a tutorial
  called "Getting Organized in a Weekend: Build
  Your Personal Productivity System" for a career
  development blog. Your readers feel overwhelmed
  by competing priorities and have tried (and
  abandoned) multiple productivity apps.

  Tutorial parameters:
  - Audience: Working professionals who feel
    constantly behind and disorganized
  - Tools: Paper planner OR free digital tool
    (both paths provided)
  - Time investment: One weekend to set up, then
    15 minutes daily to maintain
  - Method: Simplified Getting Things Done (GTD)
    adapted for real life
  - Goal: Feel in control of tasks and commitments
    within one week

  Tutorial requirements:
  - Part 1: The Brain Dump (Saturday morning)
    - How to capture everything on your mind
    - Categories: work, personal, someday/maybe
    - Processing rules (2-minute rule, delegate,
      schedule, or project)
  - Part 2: Building Your System (Saturday afternoon)
    - Paper path: notebook setup with sections
    - Digital path: free app setup (describe the
      setup, not a specific app review)
    - Inbox, Next Actions, Waiting For, Projects,
      Someday/Maybe lists
    - Calendar vs. task list distinction
  - Part 3: The Weekly Review (Sunday)
    - 30-minute weekly review checklist
    - How to process the inbox
    - Planning the upcoming week
  - Part 4: Daily Habits (Monday onward)
    - Morning planning routine (5 minutes)
    - Capture habit (how to collect new inputs)
    - Evening review (5 minutes)
    - Dealing with interruptions and urgent requests
  - Include: Realistic example (follow "Alex" a
    marketing manager through the weekend setup)
  - Include: Common failure modes (over-engineering
    the system, perfectionism, abandoning after
    week 2)
  - Include: Adaptation guidance (for parents,
    students, freelancers)

  Task: Write the complete productivity tutorial
  with all 4 parts, the running example, and
  supplementary guidance.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete productivity tutorial — includes all 4 parts with clear instructions; both paper and digital paths are provided; the brain dump process is well-guided; the system setup is specific and actionable; the weekly and daily review routines are detailed with checklists; the 'Alex' example makes the abstract concrete; common failure modes are addressed; adaptation guidance covers different life situations."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches productivity principles, not just a system — the GTD concepts are simplified appropriately; the distinction between calendar and task list is clear; the processing rules help with decision-making; the system is flexible enough to adapt but structured enough to follow; the tutorial addresses the psychology of overwhelm, not just the mechanics of list-making."
    weight: 0.35
    description: "ProductivityTeaching"
  - type: llm_judge
    criteria: "Response would actually reduce overwhelm — the weekend timeline is realistic; the daily maintenance is truly 15 minutes; the system prevents over-engineering; the failure mode section helps readers stay on track; the overall tutorial would help someone feel in control within one week as promised."
    weight: 0.30
    description: "PracticalOutcome"
