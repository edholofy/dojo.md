meta:
  id: personal-budget-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a personal budgeting tutorial for people who have never tracked their spending, using simple tools and judgment-free guidance"
  tags: [personal-finance, budgeting, beginner, money]

state: {}

trigger: |
  You're a financial literacy educator creating a
  tutorial called "Your First Budget: A No-Shame
  Guide to Taking Control of Your Money" for a
  community financial wellness program. Many
  participants live paycheck to paycheck and feel
  anxious about looking at their finances.

  Tutorial parameters:
  - Audience: Adults with irregular or low income
    who have never budgeted formally
  - Tools: Paper/pencil + free spreadsheet template
    (no paid apps required)
  - Tone: Warm, judgment-free, acknowledges that
    budgeting with limited income is hard
  - Goal: Create their first monthly budget and
    understand where their money goes

  Tutorial requirements:
  - Step 1: Gather your financial information
    (income sources, bank statements, bills)
  - Step 2: Track current spending for one week
    (simple tracking method)
  - Step 3: Categorize expenses (needs vs. wants
    vs. savings — but without guilt about "wants")
  - Step 4: Create the budget (50/30/20 as a
    starting point, with realistic modifications
    for low income)
  - Step 5: Set up a simple tracking system
  - Step 6: Monthly review process
  - Include: Realistic example budget for a
    household earning $35,000/year
  - Include: Tips for irregular income (gig workers,
    freelancers, seasonal)
  - Include: Emergency fund guidance (starting with
    $50, not $10,000)
  - Include: Common budgeting mistakes and
    adjustments
  - Include: Resources for financial assistance
    (general categories, not specific programs)
  - Spreadsheet template description (columns,
    formulas, categories)

  Task: Write the complete budgeting tutorial with
  all steps, the example budget, and the
  supplementary guidance.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete budgeting tutorial — includes all 6 steps with clear instructions; the example budget for $35,000/year is realistic; irregular income guidance is practical; the spreadsheet template is described in usable detail; emergency fund advice starts small and is achievable; common mistakes are addressed; financial assistance resources are mentioned; the tutorial is thorough enough to follow independently."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response is genuinely judgment-free and accessible — acknowledges that budgeting with limited income is different from budgeting with surplus; doesn't shame spending on 'wants'; handles sensitive topics (debt, living paycheck to paycheck) with empathy; avoids assumptions about income stability or financial literacy; the tone would make someone anxious about money feel supported, not lectured."
    weight: 0.35
    description: "EmpatheticAccessibility"
  - type: llm_judge
    criteria: "Response would genuinely help someone take control of their finances — the steps are achievable (not overwhelming); the tracking system is simple enough to maintain; the monthly review prevents abandonment; the overall tutorial treats budgeting as empowerment, not restriction; a reader would finish feeling more confident about their financial situation."
    weight: 0.30
    description: "FinancialEmpowerment"
