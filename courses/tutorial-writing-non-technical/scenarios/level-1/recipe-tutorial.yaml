meta:
  id: recipe-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a beginner-friendly recipe tutorial that teaches both the dish and cooking fundamentals, with clear instructions, timing cues, and troubleshooting tips"
  tags: [cooking, recipe, beginner, fundamentals]

state: {}

trigger: |
  You're a food blogger starting a "Cooking
  Confidence" series for absolute beginners — people
  who can barely boil water. Your first tutorial is
  "Perfect Homemade Pasta Sauce from Scratch."

  Tutorial parameters:
  - Audience: Adults who rarely cook, intimidated
    by the kitchen
  - Skill level: True beginner (explain what
    "dice" and "sauté" mean)
  - Format: Written blog post with photo placement
    notes
  - Goal: Reader makes the sauce AND learns
    fundamental cooking skills along the way

  Tutorial requirements:
  - Equipment list (with budget alternatives)
  - Ingredient list with shopping guidance (what
    to look for, substitutions for dietary needs)
  - Step-by-step instructions with timing cues
    ("this should take about 3 minutes")
  - Skill callouts: teach foundational techniques
    inline (knife skills for dicing onions, how to
    know when oil is hot enough, how to adjust
    seasoning)
  - "What it should look/smell/sound like" sensory
    descriptions at each stage
  - Common mistakes section (burned garlic, watery
    sauce, bland flavor)
  - Scaling guidance (double batch, halving)
  - Storage and reheating instructions
  - 3 variation ideas (spicy, creamy, veggie-loaded)
  - Photo placement notes (describe what each photo
    should show)

  Task: Write the complete recipe tutorial with all
  sections, teaching cooking fundamentals alongside
  the recipe.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete recipe tutorial — includes equipment, ingredients with substitutions, step-by-step instructions with timing, skill callouts for fundamentals, sensory descriptions, common mistakes, scaling, storage, variations, and photo notes; the instructions are truly beginner-friendly (explains cooking terms, gives sensory cues for doneness); the tutorial teaches cooking skills, not just a recipe."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response is genuinely beginner-accessible — assumes no prior cooking knowledge; explains terminology inline; provides sensory cues instead of just time-based instructions; the common mistakes section addresses real beginner problems; substitutions accommodate dietary restrictions; the tone is encouraging, not condescending; a true beginner could follow this and succeed."
    weight: 0.35
    description: "BeginnerAccessibility"
  - type: llm_judge
    criteria: "Response would build cooking confidence — the tutorial teaches transferable skills (knife technique, heat control, seasoning); the variations encourage experimentation; the troubleshooting section prevents discouragement; the overall tutorial would leave the reader wanting to cook again; the writing is engaging and warm."
    weight: 0.30
    description: "ConfidenceBuilding"
