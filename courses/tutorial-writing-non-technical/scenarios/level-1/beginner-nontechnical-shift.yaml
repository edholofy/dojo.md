meta:
  id: beginner-nontechnical-shift
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write three beginner tutorials simultaneously across different domains: a meditation guide, a basic sewing repair tutorial, and a dog training basics guide"
  tags: [shift-simulation, multi-domain, beginner]

state: {}

trigger: |
  You're a freelance tutorial writer who creates
  content for multiple clients. Three tutorials are
  due this week, each for a different audience and
  domain.

  Tutorial 1: "5 Minutes to Calm: A Beginner's
  Guide to Meditation"
  Client: A wellness app blog
  - Audience: Stressed professionals who think
    meditation is "not for them"
  - Length: ~1,500 words
  - Must include: Debunking 5 meditation myths,
    3 simple techniques (breathing focus, body scan,
    guided visualization), a 7-day starter plan
    (5 min/day), tips for dealing with a wandering
    mind, how to create a meditation-friendly space
    with zero equipment
  - Tone: Casual, skeptic-friendly, no spiritual
    jargon

  Tutorial 2: "Save Your Clothes: 5 Basic Sewing
  Repairs Anyone Can Do"
  Client: A sustainable fashion blog
  - Audience: Young adults who have never held a
    needle and thread
  - Length: ~1,200 words
  - Must include: Threading a needle (it's harder
    than people think), sewing a button back on,
    fixing a fallen hem, patching a small hole,
    repairing a split seam — each with step-by-step
    instructions
  - Include: Materials list (under $10), common
    mistakes for each repair
  - Tone: Encouraging, sustainability-motivated

  Tutorial 3: "Your First Month with a New Dog:
  Essential Training Basics"
  Client: A pet adoption organization
  - Audience: First-time dog owners who just adopted
  - Length: ~1,800 words
  - Must include: House training basics, teaching
    "sit" and "come" (positive reinforcement only),
    leash walking introduction, crate training
    explanation, socialization basics, when to start
    vs. give the dog settling time
  - Include: Week-by-week training schedule for the
    first month, common mistakes, when to seek
    professional help
  - Tone: Patient, acknowledges the overwhelm of
    new pet ownership

  Task: Write all three tutorials. Each must match
  its client's voice and audience while maintaining
  professional tutorial quality.

assertions:
  - type: llm_judge
    criteria: "Response produces all three tutorials at appropriate length and quality — the meditation guide debunks myths and provides a 7-day plan; the sewing tutorial covers all 5 repairs with step-by-step instructions; the dog training guide includes the week-by-week schedule and positive-reinforcement-only techniques; each tutorial matches its specified tone and audience."
    weight: 0.35
    description: "MultiTutorialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates versatility across domains — the meditation guide is genuinely skeptic-friendly (not preachy); the sewing instructions are precise enough for someone who has never held a needle; the dog training advice is responsible (positive reinforcement, acknowledging settling time); each tutorial teaches the why alongside the how; the writing style adapts convincingly to each client's voice."
    weight: 0.35
    description: "DomainVersatility"
  - type: llm_judge
    criteria: "Response would succeed for each client — the wellness app blog gets engaging content that converts skeptics; the sustainable fashion blog gets practical repair instructions that reduce clothing waste; the pet adoption organization gets responsible guidance that sets up new owners for success; all three tutorials are publication-ready."
    weight: 0.30
    description: "ClientReadiness"
