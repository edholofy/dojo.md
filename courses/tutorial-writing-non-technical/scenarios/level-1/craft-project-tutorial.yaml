meta:
  id: craft-project-tutorial
  level: 1
  course: tutorial-writing-non-technical
  type: output
  description: "Write a beginner craft tutorial for a specific project, with materials list, step-by-step visual instructions, and tips for common mistakes"
  tags: [crafts, diy, beginner, hands-on]

state: {}

trigger: |
  You're a craft instructor creating a tutorial
  for your Etsy shop blog called "Make Your Own
  Hand-Poured Soy Candles: A Complete Beginner's
  Guide." The tutorial accompanies your candle-
  making supply kit but should work for anyone
  buying materials separately.

  Tutorial parameters:
  - Audience: Adults with no crafting experience,
    possibly making this as a gift
  - Difficulty: True beginner (first craft project)
  - Time: 2-3 hours including drying/cooling time
  - Makes: 3 candles (8oz each) in different
    containers

  Tutorial requirements:
  - Complete materials and tools list (with exact
    quantities and where to buy)
  - Safety section (hot wax handling, ventilation,
    fire safety, first aid for burns)
  - Workspace setup instructions
  - Step-by-step instructions with:
    - Numbered steps with estimated time per step
    - "Checkpoint" moments (what it should look
      like at this stage)
    - Temperature readings and why they matter
    - Fragrance and color addition timing
    - Wick centering technique
    - Curing time explanation
  - Troubleshooting section (sinkholes, wet spots,
    tunneling, uneven burning, poor scent throw)
  - Customization ideas (fragrance combinations,
    container options, layered colors)
  - Gift packaging suggestions
  - Photo/illustration placement notes for each
    major step
  - "Science behind it" sidebar (why wax behaves
    the way it does)

  Task: Write the complete candle-making tutorial
  with all sections, safety guidance, and
  troubleshooting tips.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete craft tutorial — includes materials list with quantities, safety section, workspace setup, step-by-step instructions with timing and checkpoints, troubleshooting for common problems, customization ideas, gift packaging, photo notes, and science sidebar; the instructions are detailed enough for someone who has never melted wax; temperature readings are specific and explained."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response prioritizes safety and success — the safety section covers real risks (hot wax burns, fire hazard, ventilation); the troubleshooting section addresses the most common candle-making failures; checkpoint moments prevent the reader from proceeding when something is wrong; the overall tutorial would result in functional, attractive candles on the first attempt."
    weight: 0.35
    description: "SafetyAndSuccess"
  - type: llm_judge
    criteria: "Response creates an enjoyable making experience — the tutorial encourages creativity through customization options; the science sidebar makes the process intellectually engaging; the gift packaging section adds purpose; the tone makes crafting feel accessible, not intimidating; the reader would want to make more candles after completing the tutorial."
    weight: 0.30
    description: "CraftingExperience"
