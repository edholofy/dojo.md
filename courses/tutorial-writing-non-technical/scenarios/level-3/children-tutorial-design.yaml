meta:
  id: children-tutorial-design
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Design an educational tutorial program for children ages 8-12 on environmental science, using age-appropriate language, hands-on activities, and storytelling"
  tags: [children, education, environmental-science, advanced]

state: {}

trigger: |
  You're an environmental education specialist
  creating a tutorial program called "Planet Protectors:
  Your Guide to Understanding and Helping Our Earth"
  for a children's museum. The program combines
  take-home tutorial booklets with in-museum
  interactive experiences.

  Program parameters:
  - Audience: Children ages 8-12 (grades 3-6)
  - Format: 6 tutorial booklets (one per topic) +
    activity sheets + museum exhibit connections
  - Reading level: Grade 4-5 reading level
  - Tone: Empowering but honest (climate change
    is real but kids can help, not apocalyptic)
  - Characters: 4 diverse "Planet Protector" kid
    characters who guide each booklet

  Topics (one booklet each):
  1. Water: Where it comes from, water cycle, water
     pollution, conservation at home
  2. Waste: Where trash goes, recycling realities
     (not all recycling is equal), composting,
     reducing waste
  3. Energy: Where electricity comes from, fossil
     fuels vs. renewables, energy conservation,
     carbon footprint
  4. Food: Where food comes from, food waste, local
     vs. shipped, growing your own
  5. Wildlife: Habitats, endangered species, human
     impact, what kids can actually do
  6. Your Community: Local environmental issues,
     environmental justice basics (age-appropriate),
     starting a school project

  For each booklet, provide:
  - Story opening (one Planet Protector character
    discovers the topic through personal experience)
  - 5-6 key facts (age-appropriate, sourced)
  - 2 hands-on experiments or activities (using
    household materials)
  - 1 "family challenge" (involves parents/guardians)
  - Quiz or puzzle (crossword, word search, matching)
  - "What you can do" action list (realistic for kids)
  - Museum exhibit connection (what to look for at
    the museum)
  - Vocabulary words with kid-friendly definitions
  - Illustration/design notes for each page

  Fully write Booklet 1 (Water) and Booklet 3
  (Energy). Provide detailed outlines for the
  other 4.

  Task: Write the complete tutorial program with
  character designs, 2 full booklets, 4 detailed
  outlines, and the program design framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete children's tutorial program — the 4 Planet Protector characters are diverse and relatable; Booklets 1 and 3 are fully written with stories, facts, experiments, family challenges, quizzes, and action lists; Booklets 2, 4, 5, 6 have detailed outlines; illustration notes guide the visual design; museum connections tie to physical exhibits; vocabulary is age-appropriate."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise in children's education — the reading level is appropriate for grades 3-6; scientific facts are accurate but simplified; the tone empowers without frightening; experiments use safe household materials; environmental justice is introduced age-appropriately; the characters model diverse perspectives; the overall program respects children's intelligence while meeting them at their level."
    weight: 0.35
    description: "ChildrenEducation"
  - type: llm_judge
    criteria: "Response would inspire environmental action — the 'what you can do' lists are genuinely achievable for children; family challenges engage the whole household; the program avoids eco-anxiety while building eco-literacy; the museum connections make the learning tangible; the overall program would produce knowledgeable, motivated 'Planet Protectors.'"
    weight: 0.30
    description: "EnvironmentalImpact"
