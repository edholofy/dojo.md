meta:
  id: health-behavior-change-program
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Design a behavior-change tutorial program for chronic disease self-management, using motivational interviewing principles and health literacy best practices"
  tags: [health-behavior, chronic-disease, behavior-change, advanced]

state: {}

trigger: |
  You're a health educator at a community health
  center designing a tutorial program called "Living
  Well with Type 2 Diabetes: Your Self-Management
  Guide" for newly diagnosed patients. Many patients
  are overwhelmed by the diagnosis and receive
  conflicting information from the internet.

  Program parameters:
  - Audience: Newly diagnosed Type 2 diabetes patients
    (diverse ages, education levels, cultural
    backgrounds)
  - Health literacy level: Write at 6th grade
    reading level (many patients have low health
    literacy)
  - Languages: Design for English with translation
    notes for Spanish and Mandarin
  - Format: Printed booklet + companion app content
    + 4 group classes (2 hours each)
  - Clinical partners: Endocrinologists, diabetes
    educators, nutritionists, social workers
  - Goal: Patients can manage daily blood sugar,
    make informed food choices, recognize warning
    signs, and communicate effectively with their
    care team

  Program content:
  1. Understanding Your Diagnosis (de-mystifying
     diabetes without fear)
     - What diabetes is (simple analogy)
     - What causes it (genetics + lifestyle — NOT
       blame)
     - How it affects your body
     - Your care team and their roles
  2. Blood Sugar Monitoring
     - How to use a glucose meter (step by step)
     - What the numbers mean
     - When to test and how to record
     - Recognizing highs and lows (symptoms + action)
     - When to call your doctor (decision guide)
  3. Eating with Diabetes
     - The plate method (simple, visual)
     - Understanding carbohydrates (not all are equal)
     - Reading food labels (the 3 numbers that matter)
     - Cultural food adaptations (soul food, Latin
       American, Asian, Mediterranean)
     - Meal planning on a budget
  4. Movement and Activity
     - Why exercise helps (insulin sensitivity)
     - Starting where you are (not gym-centric)
     - Safe exercise guidance (blood sugar and
       exercise interaction)
     - 3 levels of activity plans (chair-based,
       walking, active)
  5. Medications
     - Why medication is not failure
     - Common medications (metformin, insulin) in
       plain language
     - Managing side effects
     - Medication tracking system
  6. Emotional Health
     - "Diabetes distress" is normal
     - When feeling overwhelmed is more than stress
     - Family and social support
     - Support groups and resources

  For each section:
  - Plain-language explanations (6th grade level)
  - Visual aids descriptions (diagrams, charts)
  - Teach-back questions (verify understanding)
  - Action planning worksheets
  - Cultural considerations notes
  - Group class activity for this topic

  Task: Write the complete diabetes self-management
  program with all 6 sections, the printed booklet
  content, and the group class plans.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete diabetes self-management program — all 6 sections have plain-language content, visual aid descriptions, teach-back questions, action planning worksheets, cultural considerations, and group class activities; blood sugar monitoring instructions are step-by-step specific; the eating section includes cultural food adaptations; medication information is accurate and non-judgmental."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates health education expertise — the content is written at 6th grade reading level; medical information is accurate without being clinical; the program avoids blame and shame around diagnosis; cultural food adaptations are genuine (not tokenizing); the teach-back method correctly assesses understanding; the 'when to call your doctor' decision guide is clear and potentially life-saving."
    weight: 0.35
    description: "HealthEducationExpertise"
  - type: llm_judge
    criteria: "Response would improve patient outcomes — the self-management skills are practical and immediately applicable; the emotional health section normalizes diabetes distress; the program addresses real barriers (cost, cultural preferences, literacy); the overall program would improve A1C levels, reduce emergency visits, and improve quality of life for newly diagnosed patients."
    weight: 0.30
    description: "PatientOutcomes"
