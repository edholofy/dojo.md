meta:
  id: advanced-nontechnical-shift
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Write three advanced tutorials simultaneously: a parenting guide for new fathers, a financial literacy program for teens, and a mindfulness tutorial for healthcare workers"
  tags: [shift-simulation, multi-audience, advanced]

state: {}

trigger: |
  You're a senior instructional designer at an
  educational publishing company. Three high-priority
  projects need completion this sprint.

  Project 1: "Dad's Playbook: A New Father's Guide
  to the First Year"
  Client: Parenting magazine (digital edition)
  - Audience: First-time fathers (age 28-40) who
    feel excluded from baby-care resources
  - Format: Interactive digital magazine feature
    (~4,000 words with interactive element designs)
  - Must address: The "dad as secondary parent"
    myth, practical baby care (diaper changes,
    feeding support, sleep training participation),
    emotional adjustment (identity shift, partner
    relationship changes, postpartum depression
    awareness — including paternal PPD), work-life
    balance with a newborn
  - Month-by-month milestone guide (months 1-12)
  - "Ask the pediatrician" FAQ (10 questions dads
    are embarrassed to ask)
  - Tone: Peer-to-peer, humorous but substantive,
    no condescension

  Project 2: "Money Moves: A Teen's First Financial
  Literacy Guide"
  Client: High school career readiness program
  - Audience: High school juniors and seniors (16-18)
  - Format: 5-lesson printed workbook with digital
    companion
  - Lessons: (1) Income and taxes — your first
    paycheck decoded, (2) Banking and saving — where
    to put your money, (3) Spending smart — needs
    vs. wants, subscriptions, and impulse buying,
    (4) Credit and debt — the trap and the tool,
    (5) Planning ahead — saving for goals, investing
    basics, financial independence
  - Each lesson: real-world scenario, worksheet,
    mini-quiz, vocabulary, "adulting challenge"
  - Must use teen-relevant examples (streaming
    subscriptions, gaming purchases, car expenses)
  - Tone: Conversational, not preachy, acknowledges
    limited income reality

  Project 3: "Breathe Between Shifts: A Mindfulness
  Tutorial for Healthcare Workers"
  Client: Hospital system wellness program
  - Audience: Nurses, physicians, and allied health
    professionals experiencing burnout
  - Format: Pocket-sized printed guide + companion
    audio recordings (describe content)
  - Must cover: 2-minute techniques for break rooms,
    transitions between patients, end-of-shift
    decompression, compassion fatigue management,
    moral injury acknowledgment
  - Include: 8 micro-practices (each under 3 min)
  - Include: When mindfulness isn't enough (referral
    guidance for serious burnout/PTSD)
  - Must NOT feel like another "self-care" mandate
    from administration
  - Tone: Peer-written (by a nurse who gets it),
    evidence-based, no toxic positivity

  Task: Write all three tutorials. Each must match
  its audience, format, and tone perfectly.

assertions:
  - type: llm_judge
    criteria: "Response produces all three tutorials at appropriate depth — the fatherhood guide covers practical skills and emotional adjustment with month-by-month milestones; the financial literacy workbook has all 5 lessons with scenarios, worksheets, and teen-relevant examples; the mindfulness guide provides 8 micro-practices with healthcare-specific context and burnout referral guidance."
    weight: 0.35
    description: "MultiProjectCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates audience expertise across all three projects — the fatherhood guide avoids 'bumbling dad' stereotypes and addresses paternal PPD; the teen guide uses relevant examples without pandering; the healthcare mindfulness guide acknowledges moral injury and avoids toxic positivity; each tutorial's tone authentically matches its audience."
    weight: 0.35
    description: "AudienceExpertise"
  - type: llm_judge
    criteria: "Response is publication-ready for all three clients — the parenting magazine gets engaging interactive content; the school program gets a structured workbook; the hospital system gets a practical pocket guide; all three tutorials would be effective for their target audiences and satisfy their respective clients."
    weight: 0.30
    description: "PublicationReadiness"
