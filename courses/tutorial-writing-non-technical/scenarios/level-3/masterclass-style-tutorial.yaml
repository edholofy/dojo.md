meta:
  id: masterclass-style-tutorial
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Write a MasterClass-style premium tutorial on creative writing, with celebrity-instructor format, storytelling-driven lessons, and production-quality content design"
  tags: [masterclass, creative-writing, premium-content, advanced]

state: {}

trigger: |
  You're the head of content at an online learning
  platform competing with MasterClass. You're
  developing a premium creative writing course called
  "The Story Within: Finding Your Voice as a Writer"
  taught by a bestselling literary fiction author.

  Course parameters:
  - Instructor: "Elena Vasquez" — Pulitzer Prize-
    nominated author of 6 novels, MFA from Iowa
    Writers' Workshop, known for lyrical prose and
    immigrant narratives
  - Audience: Aspiring writers (age 25-55) who have
    stories to tell but struggle to start or finish
  - Format: 20 video lessons (10-15 min each) with
    companion workbook
  - Production: Cinematic quality, instructor in
    writing studio, illustrative B-roll, manuscript
    excerpts on screen
  - Price point: $180 (or $15/month subscription)

  Content to design:
  1. Complete course outline (20 lessons)
     - Lesson titles, descriptions, key takeaways
     - Skill progression across the course
     - Personal anecdotes from Elena's career (fictionalized
       but realistic)
  2. Write 3 full lessons (script + workbook):
     - Lesson 1: "The Spark" (where stories come from,
       mining your life for material, the difference
       between events and stories)
     - Lesson 8: "The Messy Middle" (dealing with act
       two problems, when your story loses momentum,
       techniques for re-finding the thread)
     - Lesson 15: "Voice and Style" (finding your
       unique voice, imitating then departing from
       influences, the sentence as a unit of beauty)
  3. Companion workbook design
     - Writing exercises for each lesson
     - Prompts that build on each other
     - Self-assessment rubrics for peer workshop
     - Recommended reading list with specific guidance
       on what to notice in each book
  4. Community features
     - Workshop format for peer feedback
     - Monthly live Q&A structure
     - Writing challenge series (tied to lessons)

  Each lesson script must include:
  - Opening hook (personal story from Elena)
  - Core teaching (concept + technique)
  - Demonstration (writing live or showing drafts)
  - Assignment connection (what to do after watching)
  - Production notes (B-roll, graphics, manuscript
    excerpts)

  Task: Write the complete course outline, 3 full
  lesson scripts, workbook design, and community
  features plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete premium course — the 20-lesson outline has logical progression; all 3 full lessons include scripts with personal anecdotes, core teaching, demonstrations, and production notes; the workbook has exercises for each lesson with self-assessment rubrics; community features include workshop format and live Q&A; the overall course justifies the $180 price point."
    weight: 0.35
    description: "CourseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates creative writing pedagogy and premium content design — Elena's voice is distinct and authentic; the personal anecdotes illuminate craft principles; the lesson on 'voice and style' goes beyond cliché advice; the writing exercises build genuine skill; the production notes create cinematic learning; the recommended reading list has specific study guidance; the course teaches craft, not just motivation."
    weight: 0.35
    description: "PremiumQuality"
  - type: llm_judge
    criteria: "Response would produce a competitive premium course — the lesson scripts are engaging enough to watch (not just informative); the workbook creates a structured writing practice; the community features prevent isolation; the overall course would help aspiring writers start and finish meaningful work; the content competes with actual MasterClass quality."
    weight: 0.30
    description: "CompetitiveQuality"
