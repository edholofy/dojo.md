meta:
  id: tutorial-for-neurodivergent-learners
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Design a tutorial system specifically for neurodivergent learners (ADHD, autism, dyslexia), with multiple learning paths, sensory considerations, and executive function supports"
  tags: [neurodivergent, learning-design, accessibility, advanced]

state: {}

trigger: |
  You're a neurodiversity-affirming instructional
  designer creating a tutorial program called "Learn
  Your Way: A Cooking Course Designed for How Your
  Brain Actually Works" for a neurodivergent
  community organization.

  The cooking topic is the vehicle, but the real
  innovation is the instructional design system
  that works for ADHD, autistic, and dyslexic
  learners (and benefits all learners).

  Program parameters:
  - Audience: Neurodivergent adults (primarily ADHD,
    autism spectrum, dyslexia) who want to cook but
    find conventional recipes and tutorials
    inaccessible
  - Format: Web-based with multiple presentation
    modes
  - Goal: Participants can cook 10 meals independently
    using the format that works for their brain

  Design requirements:
  1. Learning mode options (user selects their
     preference, can switch anytime):
     - Visual mode: Photo-per-step format, minimal
       text, color-coded categories
     - Audio mode: Podcast-style narration with
       timestamps and chapter marks
     - Video mode: Overhead camera, no background
       music, steady pacing
     - Text mode: Structured, scannable, with
       clear hierarchy
     - "Just tell me what to do" mode: Bare minimum
       steps, no explanation

  2. Executive function supports
     - Pre-cooking checklist (everything gathered
       before starting)
     - Timer integration (when to start, when to
       check, when it's done)
     - Sequential highlighting (current step
       highlighted, others dimmed)
     - "Pause point" markers (safe places to take
       a break mid-recipe)
     - Sensory warnings (hot, loud, strong smell —
       flagged before they happen)
     - Cleanup-as-you-go prompts integrated into
       the recipe

  3. Sensory considerations
     - Texture sensitivity notes for each recipe
     - Substitution guides for sensory-averse
       ingredients
     - Noise considerations (blender, mixer)
     - Lighting and environment setup suggestions
     - "Sensory profile" for each recipe (texture,
       smell intensity, cooking noise level)

  4. ADHD-specific features
     - Novelty and variety in recipe selection
     - Dopamine-reward structure (quick wins early)
     - Hyperfocus management (when to stop and eat)
     - "Good enough" permissions (perfect is the
       enemy of dinner)

  5. Autism-specific features
     - Predictability (exact measurements, specific
       brands, no ambiguity)
     - Routine integration (same prep sequence each
       time)
     - Change management (substitution anxiety
       addressed)
     - Social cooking scenarios (what to expect when
       cooking with others)

  6. Dyslexia-specific features
     - Font and layout specifications (OpenDyslexic
       option, spacing, contrast)
     - Icon-based navigation
     - Audio description for all written content
     - Reduced text density per screen

  7. Write 3 complete recipes in all 5 modes:
     - Recipe 1: "Impossible to Mess Up Pasta"
       (beginner)
     - Recipe 2: "Sheet Pan Chicken and Vegetables"
       (intermediate)
     - Recipe 3: "Build-Your-Own Stir Fry" (flexible)

  Task: Write the complete tutorial system design
  with all learning modes, accessibility features,
  and the 3 recipes in all formats.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete neurodivergent-friendly tutorial system — all 5 learning modes are designed with distinct presentations; executive function supports are specific and practical; sensory considerations address real sensory processing challenges; ADHD, autism, and dyslexia-specific features are thoughtfully distinct; all 3 recipes are presented in all 5 modes; the system is comprehensive and cohesive."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine neurodiversity expertise — the ADHD features address executive dysfunction specifically; the autism features address ambiguity intolerance and routine needs; the dyslexia features go beyond font choice to include information architecture; sensory profiles are practical and non-pathologizing; the overall design is affirming (not deficit-focused); a neurodivergent person would feel understood by this system."
    weight: 0.35
    description: "NeurodiversityExpertise"
  - type: llm_judge
    criteria: "Response would enable independent cooking for neurodivergent adults — the executive function supports actually reduce cognitive load; the pause points prevent overwhelm; the sensory warnings prevent meltdowns; the 'good enough' permissions reduce anxiety; the 3 recipes demonstrate increasing independence; the overall system would be genuinely life-changing for the target audience."
    weight: 0.30
    description: "IndependenceOutcome"
