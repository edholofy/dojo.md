meta:
  id: curriculum-for-vulnerable-populations
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Write a life skills tutorial curriculum for formerly incarcerated adults re-entering society, addressing practical needs with trauma-informed pedagogy"
  tags: [vulnerable-populations, reentry, trauma-informed, advanced]

state: {}

trigger: |
  You're an instructional designer contracted by a
  reentry nonprofit to create a tutorial curriculum
  called "Fresh Start: Life Skills for Successful
  Reentry" for adults leaving incarceration. Many
  participants have been incarcerated for 5-20 years
  and the world has changed dramatically — smartphones,
  online banking, digital job applications, social
  media, rideshare apps.

  Curriculum parameters:
  - Audience: Adults 25-55 leaving incarceration,
    mixed education levels (some GED, some college)
  - Duration: 8-week program, 3 sessions per week
    (90 minutes each)
  - Setting: In-person classroom at reentry center
  - Facilitators: Social workers and peer mentors
    (formerly incarcerated themselves)
  - Special considerations: Trauma-informed approach,
    varying literacy levels, no assumption of
    technology familiarity, address stigma directly

  Curriculum to design:
  - Week 1: Technology Basics
    - Using a smartphone (basic operations, apps,
      Wi-Fi, charging, security)
    - Setting up email
    - Internet safety (scams, phishing, passwords)
  - Week 2: Financial Foundation
    - Opening a bank account (with a record)
    - Understanding credit (rebuilding from nothing)
    - Budgeting on limited income
    - Avoiding predatory lending
  - Week 3: Housing
    - Finding housing with a criminal record
    - Understanding leases
    - Tenant rights
    - Resources and assistance programs
  - Week 4: Employment
    - Resume writing (addressing gaps)
    - Online job applications (Indeed, LinkedIn)
    - Interview preparation (disclosure decisions)
    - Workplace culture and norms
  - Week 5: Health and Wellness
    - Navigating healthcare (insurance, Medicaid,
      community health)
    - Mental health resources (normalizing therapy)
    - Substance abuse recovery support
    - Nutrition on a budget
  - Week 6: Relationships and Communication
    - Reconnecting with family
    - Healthy relationship skills
    - Conflict resolution without escalation
    - Building a support network
  - Week 7: Legal Obligations and Rights
    - Parole/probation requirements
    - Voting rights (varies by state)
    - Expungement and record clearing
    - Know your rights (housing, employment
      discrimination)
  - Week 8: Moving Forward
    - Goal setting (short-term and long-term)
    - Continuing education opportunities
    - Mentoring the next person
    - Celebration and completion ceremony

  For each week, provide:
  - Learning objectives
  - Detailed session plans (3 per week)
  - Facilitator notes (trauma-informed guidance,
    how to handle triggers, when to refer to
    professional support)
  - Participant handouts/worksheets description
  - Practice activities
  - Guest speaker suggestions and topics

  Task: Write the complete 8-week curriculum with
  all session plans, facilitator guidance, and
  participant materials.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete 8-week reentry curriculum — all 8 weeks have learning objectives, 3 session plans each, facilitator notes, handout descriptions, practice activities, and guest speaker suggestions; the content covers all specified topics; the curriculum addresses the technology gap for long-incarcerated individuals; the progression builds skills and confidence logically."
    weight: 0.35
    description: "CurriculumCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates trauma-informed instructional design — facilitator notes address triggers and emotional safety; the curriculum acknowledges stigma directly without shame; technology instruction starts at absolute zero; financial content addresses credit and banking with a record; employment content honestly addresses disclosure decisions; the overall approach treats participants with dignity and respect."
    weight: 0.35
    description: "TraumaInformedDesign"
  - type: llm_judge
    criteria: "Response would genuinely support successful reentry — the technology training addresses real digital literacy gaps; the employment section provides honest guidance about disclosure; the financial section prevents exploitation by predatory lenders; the relationships section acknowledges the complexity of family reconnection; the overall curriculum would measurably reduce recidivism through practical skill-building."
    weight: 0.30
    description: "ReentryImpact"
