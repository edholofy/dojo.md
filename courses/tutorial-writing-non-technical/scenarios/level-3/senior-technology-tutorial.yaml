meta:
  id: senior-technology-tutorial
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Write a technology tutorial program designed for adults 65+, addressing cognitive accessibility, digital confidence building, and online safety"
  tags: [seniors, technology, digital-literacy, advanced]

state: {}

trigger: |
  You're a digital literacy educator creating a
  tutorial program called "Connected at Any Age:
  A Technology Guide for Older Adults" for a
  senior center network serving 15,000 members
  across 40 locations.

  Program parameters:
  - Audience: Adults 65+ with little to no technology
    experience (some have never used a smartphone)
  - Cognitive accessibility: Larger text, simple
    navigation, repetition-based learning, no time
    pressure
  - Physical accessibility: Account for vision
    changes, motor skill challenges (arthritis),
    hearing loss
  - Emotional context: Many participants feel shame
    about not understanding technology, fear of
    "breaking something," or being scammed
  - Delivery: In-person classes (2 hours, weekly)
    with printed take-home guides
  - Goal: Participants can video call family,
    send text messages, use email, and browse the
    internet safely

  Tutorial modules (8 weeks):
  1. Getting Comfortable (what the device is, how
     to hold/use it, turning on/off, charging)
  2. The Screen (touchscreen basics, tapping, swiping,
     scrolling, adjusting text size and brightness)
  3. Staying in Touch (text messages, phone calls
     from the device, contacts)
  4. Video Calls (FaceTime/Zoom with family, setting
     up, troubleshooting audio/video)
  5. Email (setting up, sending, receiving, attachments,
     avoiding spam)
  6. The Internet (web browsing, searching, bookmarks,
     recognizing safe vs. unsafe websites)
  7. Staying Safe Online (passwords, scams, phishing,
     personal information protection, "when in doubt,
     ask")
  8. Apps and Beyond (downloading apps, health apps,
     ride-sharing, photo sharing with family)

  For each module:
  - Instructor guide (how to pace, where learners
    struggle, patience cues)
  - Printed take-home reference card (laminated,
    step-by-step with screenshots described)
  - In-class practice exercises (with a partner)
  - Common questions and gentle answers
  - "Practice homework" (one simple task per week)
  - Family involvement suggestions (how family can
    help reinforce at home)
  - Design specifications for the printed materials
    (font size, contrast, layout)

  Task: Write the complete 8-week program with all
  instructor guides, reference cards, and practice
  exercises.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 8-week senior technology program — all 8 modules have instructor guides, reference cards, practice exercises, common questions, homework, and family involvement suggestions; the progression from basic device handling to app usage is appropriate; printed material design specifications address vision and cognitive accessibility; each module builds on the previous one."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise in senior education — instructions account for motor challenges (arthritis, tremor); visual design addresses age-related vision changes; the pace is slow enough with built-in repetition; shame and fear are addressed with genuine empathy; the 'when in doubt, ask' safety philosophy prevents both scams and technology avoidance; the program respects older adults' intelligence while meeting accessibility needs."
    weight: 0.35
    description: "SeniorAccessibility"
  - type: llm_judge
    criteria: "Response would reduce senior digital isolation — by week 4, participants can video call family; the safety module prevents exploitation; family involvement suggestions create support systems; the overall program would measurably increase digital confidence and connection for the 15,000 senior center members."
    weight: 0.30
    description: "DigitalInclusion"
