meta:
  id: cross-platform-content-strategy
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Develop a cross-platform tutorial content strategy that adapts the same core content for YouTube, Instagram, TikTok, blog, and podcast, each optimized for its platform"
  tags: [cross-platform, content-strategy, multi-format, advanced]

state: {}

trigger: |
  You're the content strategist for a popular home
  organization expert ("The Clutter Coach") who has
  built a brand around decluttering and home
  organization. She wants to launch a signature
  tutorial series called "The 30-Day Declutter
  Challenge" across all her platforms simultaneously.

  Brand context:
  - Audience: Overwhelmed homeowners (primarily
    women 30-55) who feel buried by stuff
  - Platforms: YouTube (250K subs), Instagram (180K),
    TikTok (90K), blog (400K monthly visitors),
    podcast (weekly, 50K downloads)
  - Brand voice: Warm, no-judgment, practical,
    slightly humorous ("Marie Kondo meets your
    best friend")
  - Goal: Drive course enrollment ($97 full
    decluttering course)

  Design the complete cross-platform tutorial:

  1. Core content framework
     - 30-day challenge structure (what happens each
       day, which room/area)
     - 5 "phases" of the challenge (momentum
       building → deep dive → emotional → maintenance
       → celebration)
     - Core teaching concepts that appear across
       platforms
     - Engagement hooks for each phase

  2. YouTube content plan (primary platform)
     - 4 long-form videos (weekly, 15-20 min)
     - Video 1: Challenge kickoff + kitchen
     - Video 2: Living areas + the emotional stuff
     - Video 3: Bedrooms + closets (wardrobe method)
     - Video 4: Final push + maintaining results
     - Full script outline for Video 1
     - Thumbnail concepts, titles, descriptions

  3. Instagram content plan
     - 30 daily posts (one per challenge day)
     - Mix: carousel tutorials, Reels, Stories
     - 10 carousel designs described (teaching slides)
     - 10 Reels concepts (30-60 second technique
       demos)
     - 10 Story templates (daily check-in, polls,
       before/after)
     - Caption strategy and hashtag sets

  4. TikTok content plan
     - 15 TikToks (every other day)
     - Trend-aligned concepts (sounds, formats)
     - "Satisfying declutter" compilation concepts
     - Comment engagement strategy
     - Cross-promotion to YouTube

  5. Blog content plan
     - 4 blog posts (weekly companion to YouTube)
     - SEO-optimized titles and meta descriptions
     - Printable checklists and worksheets embedded
     - Email capture integration points

  6. Podcast content plan
     - 4 episodes (weekly)
     - Interview format: listener call-in stories
     - Audio-first content (what works without
       visuals)
     - Show notes and resource links

  7. Conversion strategy
     - How free challenge leads to paid course
     - Conversion touchpoints per platform
     - Email nurture sequence (3 emails during
       challenge)

  Task: Write the complete cross-platform content
  strategy with all platform plans and the Video 1
  script outline.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete cross-platform tutorial strategy — the 30-day challenge framework is well-structured; all 5 platforms have specific content plans with appropriate content types; YouTube has 4 video outlines with Video 1 fully scripted; Instagram covers 30 daily posts; TikTok has 15 concepts; blog has SEO-optimized posts; podcast has audio-first episodes; the conversion strategy connects free to paid content."
    weight: 0.35
    description: "StrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform-native content expertise — YouTube content is structured for watch time; Instagram carousels teach visually; TikTok concepts align with platform trends; blog posts target SEO keywords; podcast episodes work without visuals; each platform's content is native to that platform, not just repurposed; the cross-platform strategy creates a cohesive experience without redundancy."
    weight: 0.35
    description: "PlatformExpertise"
  - type: llm_judge
    criteria: "Response would drive engagement and conversion — the 30-day challenge creates community momentum; the phased approach prevents overwhelm; the conversion strategy naturally leads to the paid course; the overall campaign would grow followers across all platforms while driving meaningful course enrollment."
    weight: 0.30
    description: "EngagementAndConversion"
