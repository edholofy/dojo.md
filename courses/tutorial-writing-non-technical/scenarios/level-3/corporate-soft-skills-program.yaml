meta:
  id: corporate-soft-skills-program
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Design a comprehensive corporate soft skills training program covering emotional intelligence, conflict resolution, and leadership communication"
  tags: [corporate-training, soft-skills, leadership, advanced]

state: {}

trigger: |
  You're the Director of Learning and Development
  at a 3,000-person technology company. The annual
  engagement survey revealed that 68% of employees
  rate their manager's communication as "needs
  improvement" and exit interviews cite "poor
  management" as the #1 reason for leaving. The CHRO
  has asked you to create a comprehensive tutorial
  program.

  Program: "Leading with Impact: Essential Skills
  for People Managers"

  Program parameters:
  - Audience: 400 people managers (first-time
    managers to senior directors)
  - Format: Blended (self-paced tutorials + live
    workshops + peer coaching circles)
  - Duration: 6-month program with monthly modules
  - Budget: $200K (includes facilitation, platform,
    materials)
  - Success metrics: Manager effectiveness scores,
    direct report engagement, voluntary attrition

  Module design (6 months):
  1. Emotional Intelligence (self-awareness, empathy,
     self-regulation)
  2. Feedback and Coaching (giving feedback, coaching
     conversations, difficult conversations)
  3. Conflict Resolution (de-escalation, mediation
     basics, managing team dynamics)
  4. Inclusive Leadership (unconscious bias awareness,
     creating psychological safety, equitable
     practices)
  5. Communication Under Pressure (crisis communication,
     delivering bad news, managing up)
  6. Building High-Performing Teams (delegation,
     motivation, developing others, succession)

  For each module:
  - Learning objectives (3-4 per module)
  - Self-paced tutorial content (written + video,
    45-60 minutes total)
  - Live workshop plan (3-hour interactive session)
  - Role-play scenarios (3 per module with rubrics)
  - Peer coaching circle guide (structured discussion
    for groups of 5)
  - Assessment method (how skills are measured)
  - Manager toolkit (job aids, templates, checklists)
  - Facilitator guide (for workshop leaders)

  Additionally:
  - Program launch communication plan
  - Executive sponsor engagement strategy
  - ROI measurement framework
  - Continuous reinforcement strategy (post-program)

  Task: Write the complete 6-month leadership
  development program with all module designs,
  workshop plans, and program management elements.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 6-month leadership program — all 6 modules have learning objectives, self-paced content outlines, workshop plans, role-play scenarios with rubrics, peer coaching guides, assessments, and toolkits; the program launch plan addresses communication and buy-in; the ROI framework connects training to business outcomes; the reinforcement strategy prevents skill decay."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates L&D expertise — the role-play scenarios present realistic management challenges; the emotional intelligence module goes beyond self-assessment to actual skill building; the feedback module teaches specific frameworks; the inclusive leadership module avoids performative DEI; the assessments measure behavioral change, not just knowledge; the overall program addresses the root causes of the engagement survey results."
    weight: 0.35
    description: "LDExpertise"
  - type: llm_judge
    criteria: "Response would improve manager effectiveness — the blended format maximizes learning transfer; peer coaching circles create ongoing support; the toolkits provide in-the-moment resources; the program would measurably improve manager communication scores and reduce management-related attrition; the $200K budget is allocated effectively."
    weight: 0.30
    description: "ManagerImprovement"
