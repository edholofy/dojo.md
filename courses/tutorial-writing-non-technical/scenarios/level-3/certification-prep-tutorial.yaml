meta:
  id: certification-prep-tutorial
  level: 3
  course: tutorial-writing-non-technical
  type: output
  description: "Write a comprehensive certification preparation tutorial for a professional credential, with study guides, practice exams, and learning strategies"
  tags: [certification-prep, professional-development, study-guide, advanced]

state: {}

trigger: |
  You're an instructional designer creating a
  tutorial program called "Pass the PMP: Your
  Complete Project Management Certification Guide"
  for a professional development company. The PMP
  (Project Management Professional) exam has a 60%
  first-attempt pass rate, and your program needs
  to achieve 90%+.

  Program parameters:
  - Audience: Working professionals (5+ years
    experience) preparing for the PMP exam
  - Exam format: 180 questions, 230 minutes, mix of
    multiple choice and drag-and-drop
  - Content: PMBOK 7th Edition + Agile Practice
    Guide + predictive, agile, and hybrid approaches
  - Study time: 8-12 weeks, 10-15 hours per week
  - Format: Self-paced written tutorials + practice
    exams + study group guide

  Program to design:
  1. Study plan architecture
     - 12-week study schedule (with flexibility
       built in)
     - Pre-assessment diagnostic (identify weak areas)
     - Learning path customization (based on
       experience: waterfall-heavy vs. agile-heavy
       background)
     - Weekly milestones and self-assessment
     - Burnout prevention (study-life balance tips)

  2. Content tutorials (8 modules matching exam
     domains):
     - People domain (42% of exam)
     - Process domain (50% of exam)
     - Business Environment domain (8% of exam)
     - For each domain: concept summaries, real-world
       examples, mnemonics, common exam traps

  3. Practice exam system
     - 3 full-length practice exams (180 questions
       each)
     - Detailed answer explanations (why right
       answers are right AND why wrong answers are
       wrong)
     - Performance analytics (domain-level scoring,
       question-type analysis)
     - Adaptive difficulty (harder questions in
       strong areas, review in weak areas)
     - 20 "mini quizzes" (10 questions each,
       domain-specific)

  4. Exam-taking strategies
     - Time management (seconds per question, when
       to flag and move on)
     - Question interpretation techniques (PMP
       question anatomy, key words)
     - Elimination strategies
     - The "PMP mindset" (what PMI wants to hear vs.
       what you'd do in real life)
     - Day-before and day-of preparation

  5. Write 30 sample questions across all domains
     - 10 easy, 10 medium, 10 hard
     - Each with: question, 4 answer choices,
       correct answer, detailed explanation, domain
       tag, difficulty level

  6. Study group facilitation guide
     - How to form and run a study group
     - Weekly discussion questions
     - Group practice activities
     - Accountability structures

  Task: Write the complete PMP preparation program
  with study plan, content summaries, 30 sample
  questions, exam strategies, and study group guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete PMP preparation program — the 12-week study plan is structured with diagnostic and customization; all 3 exam domains are covered with appropriate weight; 30 sample questions span difficulty levels with detailed explanations; exam strategies address PMP-specific challenges; the study group guide provides community support; the overall program is comprehensive enough for exam readiness."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates PMP exam expertise — the domain weight distribution is accurate (42/50/8); sample questions reflect real PMP question style (situational, 'best' answer among good answers); the 'PMP mindset' section addresses the gap between exam answers and real-world practice; mnemonics and exam traps reflect actual exam challenges; the content aligns with PMBOK 7th Edition approach."
    weight: 0.35
    description: "ExamExpertise"
  - type: llm_judge
    criteria: "Response would achieve 90%+ pass rates — the diagnostic identifies weak areas early; the adaptive practice focuses study time effectively; exam strategies address common failure modes (time management, over-thinking); burnout prevention keeps learners engaged over 12 weeks; the overall program systematically prepares candidates rather than just providing content to memorize."
    weight: 0.30
    description: "PassRateOutcome"
