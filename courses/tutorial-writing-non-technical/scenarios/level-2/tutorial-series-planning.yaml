meta:
  id: tutorial-series-planning
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Plan and write the first three installments of a 10-part tutorial series on watercolor painting for beginners, with series arc and skill progression"
  tags: [series-planning, art, watercolor, intermediate]

state: {}

trigger: |
  You're a watercolor artist creating a 10-part
  YouTube tutorial series called "Watercolor
  Journeys: From First Brushstroke to Finished
  Painting." The series will be your flagship
  content and you want it to systematically build
  skills while keeping viewers engaged across all
  10 parts.

  Series parameters:
  - Audience: Adults who bought a watercolor set
    but don't know where to start
  - Format: YouTube videos (15-20 min each) with
    companion blog posts
  - Equipment: Student-grade supplies (specified in
    Part 1)
  - Progression: Each part builds on the previous
    and introduces 1-2 new concepts
  - Goal: By Part 10, the viewer can paint a
    complete landscape from reference

  Design requirements:
  1. Complete series arc (all 10 parts outlined)
     - Part titles and descriptions
     - Key concepts introduced per part
     - Skills practiced per part
     - Project for each part (small painting)
     - How each part connects to the next

  2. Write Part 1: "Getting Started — Your First
     Washes" (complete tutorial)
     - Supply list with specific product recommendations
       at 3 price points
     - Water control exercise (wet-on-wet, wet-on-dry)
     - Flat wash technique
     - Graded wash technique
     - Project: Simple sunset (3 colors)
     - Common first-day mistakes

  3. Write Part 2: "Color Mixing — Your Palette
     is Magic" (complete tutorial)
     - Color theory basics (primary, secondary, warm/
       cool)
     - Mixing exercises (color wheel, value scales)
     - Limiting your palette (why 6 colors is enough)
     - Project: Color study of fruit (apple, lemon,
       grape)
     - How to fix muddy colors

  4. Write Part 3: "Brush Control — Painting with
     Confidence" (complete tutorial)
     - Brush types and what each does
     - Pressure and angle exercises
     - Dry brush technique
     - Detail work with a round brush
     - Project: Botanical study (simple leaf with
       veins and shading)

  Task: Write the complete series plan and full
  tutorials for Parts 1-3 with companion blog post
  content.

assertions:
  - type: llm_judge
    criteria: "Response provides a complete series design — all 10 parts are outlined with titles, concepts, skills, and projects; the progression from basic washes to complete landscape is logical; Parts 1-3 are fully written with detailed instructions; each part introduces new concepts while reinforcing previous ones; companion blog post content supplements the video format."
    weight: 0.35
    description: "SeriesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates watercolor teaching expertise — the supply recommendations are appropriate for beginners at multiple price points; the exercises build real skills (water control before color mixing before brush control); the projects are achievable and satisfying; common mistakes are addressed with solutions; the overall approach follows sound art education methodology."
    weight: 0.35
    description: "ArtTeachingExpertise"
  - type: llm_judge
    criteria: "Response would keep viewers engaged across the series — each part delivers a satisfying project (not just exercises); the series arc creates anticipation for future parts; the skill progression prevents frustration; the overall series would build a loyal subscriber base and transform complete beginners into competent watercolor painters."
    weight: 0.30
    description: "ViewerEngagement"
