meta:
  id: interactive-tutorial-design
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Design an interactive online tutorial with branching paths, embedded quizzes, and personalized learning for a nutrition education program"
  tags: [interactive, branching, nutrition, intermediate]

state: {}

trigger: |
  You're an instructional designer creating an
  interactive tutorial called "Eating Well on Any
  Budget: A Personalized Nutrition Guide" for a
  public health department's website. The tutorial
  adapts to the user's situation using branching
  paths.

  Tutorial parameters:
  - Audience: General public (diverse income levels,
    dietary needs, cultural backgrounds)
  - Format: Interactive web-based tutorial (text +
    images + quizzes + branching)
  - Duration: 20-30 minutes (varies by path)
  - Goal: Each user leaves with a personalized
    meal planning strategy that fits their life
  - Platform: Web-based (describe the interactions,
    not the code)

  Tutorial requirements:
  - Opening assessment (5 questions that determine
    the user's path):
    - Budget level (tight / moderate / comfortable)
    - Household size (1 / 2-3 / 4+)
    - Dietary restrictions (none / vegetarian /
      vegan / gluten-free / religious dietary laws)
    - Cooking experience (none / basic / confident)
    - Time availability (minimal / moderate / plenty)

  - Core content (all users see):
    - The plate method (visual guide to balanced
      meals)
    - Reading nutrition labels (interactive "find
      the hidden sugar" exercise)
    - Hydration basics

  - Branching content (based on assessment):
    - Budget-tight path: grocery strategies, staple
      ingredients, batch cooking, food assistance
      resources
    - Budget-moderate path: meal planning templates,
      smart shopping, reducing food waste
    - Budget-comfortable path: quality ingredients,
      variety, specialty diets

  - For each path: 3 recipe examples that match
    the user's profile, shopping list template,
    weekly meal plan framework

  - Knowledge check quizzes (5 embedded throughout,
    with immediate feedback)
  - "Your Personal Plan" summary page (generated
    from their choices throughout)
  - Print-friendly takeaway document description
  - Accessibility requirements for the interactive
    elements

  Task: Write the complete interactive tutorial
  with all branching paths, quiz questions, and
  the personalization logic.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete interactive tutorial — includes the opening assessment with branching logic; core content covers plate method, nutrition labels, and hydration; all 3 budget paths have specific content with recipes and shopping guidance; 5 knowledge check quizzes are embedded with feedback; the personal plan summary aggregates user choices; print-friendly takeaway and accessibility requirements are addressed."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates instructional design expertise for interactive content — the branching logic creates genuinely different experiences; the assessment questions are relevant and non-judgmental; the interactive nutrition label exercise is well-designed; quizzes test understanding (not just recall); the personalization feels meaningful, not superficial; accessibility requirements cover real interactive content challenges."
    weight: 0.35
    description: "InteractiveDesign"
  - type: llm_judge
    criteria: "Response would improve nutrition outcomes — the budget-tight path provides genuinely useful strategies (not condescending advice); cultural dietary needs are respected; the recipes match the user's actual constraints; the personalized plan is actionable; the overall tutorial would help diverse users eat better within their real-life circumstances."
    weight: 0.30
    description: "NutritionOutcome"
