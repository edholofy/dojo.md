meta:
  id: accessibility-focused-tutorial
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Write a yoga tutorial specifically designed for people with physical disabilities, addressing adaptive poses, equipment modifications, and inclusive language"
  tags: [accessibility, adaptive, yoga, intermediate]

state: {}

trigger: |
  You're an adaptive yoga instructor writing a
  tutorial called "Yoga for Every Body: An Adaptive
  Practice for People with Physical Disabilities"
  for a disability advocacy organization's wellness
  program.

  Tutorial parameters:
  - Audience: Adults with physical disabilities
    (wheelchair users, limited mobility, chronic
    pain conditions, amputees, neurological conditions)
  - Setting: Home practice (chair or wheelchair)
  - Duration: 20-minute practice session
  - Equipment: Chair or wheelchair, optional strap/
    belt, optional towel
  - Goal: Reduce stress, improve flexibility within
    individual capacity, build a sustainable practice

  Tutorial requirements:
  - Introduction: Why yoga is for everyone (address
    common barriers and misconceptions)
  - Inclusive language guidelines used throughout
    (person-first language, avoiding ableist phrases,
    "invitation" not "instruction")
  - Body awareness and consent section (listening
    to your body, pain vs. discomfort, the right
    to skip any pose)
  - 10 adaptive poses, each with:
    - Name (traditional + accessible name)
    - Benefits
    - Base instruction
    - 3+ modification options for different
      abilities (seated, one-handed, limited range
      of motion)
    - Breathing cues
    - What to avoid / contraindications
    - Photo description showing diverse bodies
  - Complete 20-minute practice sequence (combining
    the poses into a flow)
  - Breathing exercises (3 techniques, fully adapted)
  - Meditation/relaxation closing (body scan adapted
    for different sensory experiences)
  - Caregiver guidance (how to assist safely)
  - FAQ: common concerns from people with disabilities
    about starting yoga

  Task: Write the complete adaptive yoga tutorial
  with all poses, modifications, the practice
  sequence, and supplementary guidance.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete adaptive yoga tutorial — includes inclusive introduction, body awareness section, all 10 poses with multiple modifications, the 20-minute practice sequence, breathing exercises, adapted meditation, caregiver guidance, and FAQ; each pose has meaningful modifications for different abilities; the practice sequence flows logically."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine disability inclusion expertise — uses person-first language throughout; avoids ableist assumptions; modifications address diverse disabilities (not just 'bad knees'); the consent framework respects autonomy; contraindications are medically responsible; the overall tutorial would be welcomed by the disability community, not tokenizing."
    weight: 0.35
    description: "InclusionExpertise"
  - type: llm_judge
    criteria: "Response would create a sustainable yoga practice — the 20-minute duration is realistic; the poses are genuinely beneficial; the breathing and meditation are fully adapted (not afterthoughts); the caregiver guidance reduces barriers to participation; the overall tutorial would help people with disabilities experience the real benefits of yoga."
    weight: 0.30
    description: "PracticeAccessibility"
