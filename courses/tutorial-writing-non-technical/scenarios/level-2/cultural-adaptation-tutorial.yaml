meta:
  id: cultural-adaptation-tutorial
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Adapt an existing tutorial for a different cultural context, addressing language, examples, sensitivities, and local relevance"
  tags: [cultural-adaptation, localization, sensitivity, intermediate]

state: {}

trigger: |
  You're a content localization specialist. A US-
  based personal finance company wants to adapt
  their popular tutorial "How to Start Investing
  with $100" for three international markets. The
  original tutorial assumes US financial systems,
  US dollar amounts, and American cultural norms
  around money.

  Target markets:
  1. India (Hindi-speaking, urban middle class)
  2. Germany (German-speaking, young professionals)
  3. Brazil (Portuguese-speaking, growing middle class)

  Original tutorial structure (US version):
  - Why investing matters (retirement savings gap)
  - Opening a brokerage account (Robinhood, Fidelity)
  - Understanding stocks, bonds, ETFs, index funds
  - Dollar-cost averaging explained
  - Your first investment (S&P 500 index fund)
  - Tax-advantaged accounts (401k, IRA, Roth IRA)
  - Common mistakes to avoid
  - Resources and next steps

  For each market adaptation, provide:
  1. Cultural context analysis
     - Financial norms and attitudes toward investing
     - Common investment vehicles in that market
     - Regulatory environment (brief overview)
     - Cultural sensitivities around money
     - Income/cost-of-living context for the
       "starting amount" (equivalent of $100)

  2. Adapted tutorial outline
     - Same core structure but with locally relevant
       content
     - Local financial institutions and platforms
     - Country-specific investment vehicles
     - Local tax-advantaged accounts
     - Currency and amount adjustments
     - Examples using local cultural context

  3. Language and tone considerations
     - Formality level (varies by culture)
     - Financial terminology in local language
     - Metaphors and analogies that resonate locally
     - Topics to handle carefully or avoid
     - Humor and communication style adjustments

  4. One fully adapted section (write the "Why
     Investing Matters" section for each market)

  Task: Write the complete cultural adaptation
  guide for all three markets with analysis,
  adapted outlines, and the fully written section.

assertions:
  - type: llm_judge
    criteria: "Response provides complete cultural adaptations for all three markets — each has cultural context analysis, adapted tutorial outline, language considerations, and a fully written section; the adaptations address local financial systems specifically (not generically); investment vehicles, platforms, and tax structures are locally accurate; starting amounts are contextually appropriate."
    weight: 0.35
    description: "AdaptationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine cultural competence — Indian adaptation addresses gold as traditional investment and SIP (Systematic Investment Plans); German adaptation addresses the German aversion to stock market risk and preference for savings; Brazilian adaptation addresses inflation history and CDI-indexed investments; each adaptation reflects real cultural attitudes toward money, not stereotypes."
    weight: 0.35
    description: "CulturalCompetence"
  - type: llm_judge
    criteria: "Response would produce effective localized tutorials — the fully written sections feel naturally written for each market (not translated from English); the tone matches cultural communication norms; the adapted outlines would resonate with local audiences; the overall adaptation guide would enable a local content team to complete the full tutorial."
    weight: 0.30
    description: "LocalResonance"
