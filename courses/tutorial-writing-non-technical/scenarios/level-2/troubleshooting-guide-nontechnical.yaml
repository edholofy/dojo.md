meta:
  id: troubleshooting-guide-nontechnical
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Write a troubleshooting guide for common sourdough bread failures, teaching diagnosis and correction through systematic problem-solving"
  tags: [troubleshooting, baking, diagnosis, intermediate]

state: {}

trigger: |
  You're a professional baker writing a
  troubleshooting guide called "Why Did My Sourdough
  Fail? A Diagnostic Guide for Every Problem" for
  your artisan bakery's website. Sourdough baking
  has a notoriously steep learning curve and your
  customers (who buy your starter culture) keep
  emailing you with failed loaves.

  Guide parameters:
  - Audience: Home bakers who have attempted sourdough
    1-5 times with mixed results
  - Format: Visual diagnostic guide (written, with
    photo descriptions)
  - Scope: Every common sourdough failure and its
    fix
  - Goal: The reader can diagnose their specific
    problem and know exactly what to adjust next time

  Guide requirements:
  - Diagnostic flowchart (text-based decision tree):
    "What went wrong?" → symptom → diagnosis → fix
  - 12 common problems, each with:
    - What it looks like (visual description)
    - Photo description (what to show)
    - Possible causes (ranked most to least likely)
    - The fix for each cause
    - Prevention for next time
    - "Quick check" test to identify the cause

  Problems to cover:
  1. Dense, heavy crumb (didn't rise)
  2. Flat loaf (spread sideways, no oven spring)
  3. Gummy interior (looks done but isn't)
  4. Too sour / not sour enough
  5. Large holes near crust, dense middle
  6. Crust too thick / too thin
  7. Starter not rising / dying
  8. Dough too sticky to shape
  9. Dough tears during shaping
  10. Burnt bottom
  11. Bland flavor (not enough complexity)
  12. Crumb separating from crust ("flying crust")

  Additional sections:
  - "The Sourdough Variables" reference chart
    (temperature, hydration, fermentation time,
    flour type — how each affects the result)
  - Seasonal adjustments (summer vs. winter baking)
  - Altitude adjustments
  - "When to start over vs. when to bake anyway"
    decision guide

  Task: Write the complete sourdough troubleshooting
  guide with the diagnostic flowchart, all 12
  problems, and the reference sections.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete troubleshooting guide — includes the diagnostic flowchart, all 12 problems with visual descriptions, causes, fixes, and prevention; the variables reference chart covers key baking science; seasonal and altitude adjustments are included; the 'start over vs. bake anyway' guide helps with real-time decisions; the guide is comprehensive enough to diagnose any common sourdough failure."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates baking science expertise — the causes for each problem are accurate (fermentation, hydration, shaping, oven temperature); the fixes address root causes, not just symptoms; the variables chart correctly explains relationships between inputs and outcomes; the diagnostic approach teaches the reader to think like a baker, not just follow recipes."
    weight: 0.35
    description: "BakingExpertise"
  - type: llm_judge
    criteria: "Response would rescue failed bakers — the diagnostic flowchart quickly narrows down the problem; the 'quick check' tests are practical; the prevention advice prevents repeat failures; the overall guide would significantly reduce the customer support emails while building better bakers."
    weight: 0.30
    description: "ProblemResolution"
