meta:
  id: intermediate-nontechnical-shift
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Write three different tutorial formats simultaneously: a written travel photography guide, a podcast script for relationship communication, and an infographic tutorial for meal prepping"
  tags: [shift-simulation, multi-format, intermediate]

state: {}

trigger: |
  You're a content agency writer handling three
  tutorial projects with different formats and
  audiences, all due this week.

  Project 1: Written Tutorial — "Travel Photography
  Without Expensive Gear"
  Client: Budget travel blog
  - Audience: Backpackers and budget travelers (20s-30s)
  - Format: Written blog post (~2,000 words) with
    photo placement notes
  - Must cover: Storytelling through photos, capturing
    culture respectfully (not "poverty tourism"),
    street photography etiquette, editing on your
    phone, creating a travel photo journal, golden
    hour in different latitudes, backing up photos
    while traveling
  - 5 specific composition techniques for travel
  - 8 practice challenges ("photograph a local
    market without showing faces")
  - Tone: Adventurous, respectful, practical

  Project 2: Podcast Script — "How to Have Hard
  Conversations with Your Partner"
  Client: Relationship wellness podcast (episode 47)
  - Audience: Couples in committed relationships
    experiencing communication difficulties
  - Format: 25-minute podcast script (host + expert
    guest dialogue format)
  - Must cover: The "I feel" framework, active
    listening technique, when to pause and revisit,
    the repair attempt (Gottman method), distinguishing
    criticism from complaint, body language awareness
  - Include: 3 role-play scenarios the host and
    guest walk through
  - Include: Listener homework assignment
  - Tone: Warm, non-judgmental, research-backed

  Project 3: Infographic Tutorial — "Meal Prep
  Sunday: One Hour, Five Days of Lunches"
  Client: Corporate wellness newsletter
  - Audience: Office workers who buy lunch daily
    and want to save money and eat healthier
  - Format: Infographic script (describe visual
    layout, text blocks, icons, and flow)
  - Must cover: Shopping list for the week, prep
    timeline (60 minutes broken into tasks), 5
    lunch combinations from the same base ingredients,
    storage guidance, reheating instructions
  - Include: Cost comparison (meal prep vs. buying)
  - Dimensions: Vertical scrollable (mobile-friendly)
  - Tone: Quick, motivating, visually-driven

  Task: Write all three tutorials in their respective
  formats. Each must match the client's voice and
  format requirements.

assertions:
  - type: llm_judge
    criteria: "Response produces all three tutorials in their correct formats — the travel photography tutorial is a complete blog post with composition techniques and challenges; the podcast script uses proper dialogue format with role-play scenarios; the infographic script describes visual layout, text blocks, and flow; each tutorial matches its specified length and covers all required topics."
    weight: 0.35
    description: "MultiFormatCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates versatility across formats and domains — the photography tutorial teaches cultural sensitivity alongside technique; the podcast script creates natural-sounding dialogue with research-backed relationship advice; the infographic script translates complex meal prep into visual flow; each format is used effectively for its content type."
    weight: 0.35
    description: "FormatVersatility"
  - type: llm_judge
    criteria: "Response is client-ready for all three projects — the travel blog gets engaging content that respects cultural photography ethics; the podcast script sounds like a real conversation (not a lecture); the corporate wellness newsletter gets a practical infographic that motivates meal prepping; all three tutorials would satisfy their respective clients."
    weight: 0.30
    description: "ClientSatisfaction"
