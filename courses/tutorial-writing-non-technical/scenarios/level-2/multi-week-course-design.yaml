meta:
  id: multi-week-course-design
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Design and write a 6-week online course on personal finance, with lesson plans, assignments, community activities, and learner progression"
  tags: [course-design, personal-finance, multi-week, intermediate]

state: {}

trigger: |
  You're a financial educator creating a 6-week
  online course called "Money Foundations: Build
  Financial Confidence in 6 Weeks" for a community
  education platform (similar to Skillshare or
  Coursera). This is a structured course, not a
  single tutorial.

  Course parameters:
  - Audience: Adults 25-45 with steady income but
    no financial training (school didn't teach this)
  - Format: Weekly video lessons (20-30 min) +
    written companion guide + weekly assignment
  - Engagement: Discussion prompts, peer accountability
    partners, weekly live Q&A
  - Goal: Participants emerge with an emergency
    fund started, debt payoff plan, and basic
    investment understanding

  Course structure to design:
  - Week 1: Your Money Story (understanding your
    relationship with money, financial baseline
    assessment)
  - Week 2: Budgeting That Actually Works (zero-
    based budgeting, envelope system, tracking tools)
  - Week 3: Destroying Debt (debt snowball vs.
    avalanche, negotiation tactics, student loans)
  - Week 4: Building Your Safety Net (emergency
    fund, insurance basics, protecting what you have)
  - Week 5: Investing for Beginners (compound
    interest, 401k/IRA basics, index funds, robo-
    advisors — no specific advice)
  - Week 6: Your Financial Plan (putting it all
    together, goal setting, accountability systems)

  For each week, provide:
  - Learning objectives (3-4 per week)
  - Lesson outline (key topics, talking points,
    analogies to use)
  - Written companion guide outline (what to include)
  - Assignment (practical, applied to their real
    finances)
  - Discussion prompt for community forum
  - Common questions/objections to address
  - Resource recommendations (books, tools, calculators)

  Additionally:
  - Course welcome email template
  - Pre-course assessment questionnaire
  - Certificate of completion criteria
  - Course evaluation survey questions

  Task: Write the complete 6-week course design
  with all weekly plans and supplementary materials.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete 6-week financial course — all 6 weeks have learning objectives, lesson outlines, companion guide outlines, assignments, discussion prompts, FAQs, and resources; the welcome email, pre-course assessment, certificate criteria, and evaluation survey are included; the weekly progression builds logically from foundation to planning."
    weight: 0.35
    description: "CourseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates financial literacy education expertise — the budgeting methods are practical and realistic; debt strategies are explained without judgment; investing basics avoid specific financial advice while building understanding; assignments apply to real finances; discussion prompts encourage vulnerability and peer support; the course handles money anxiety with empathy."
    weight: 0.35
    description: "FinancialEducation"
  - type: llm_judge
    criteria: "Response would produce measurable financial behavior change — participants would have an emergency fund started, debt payoff plan created, and investment basics understood by week 6; the accountability structures prevent dropout; the assignments create lasting habits; the overall course transforms financial anxiety into financial confidence."
    weight: 0.30
    description: "BehaviorChange"
