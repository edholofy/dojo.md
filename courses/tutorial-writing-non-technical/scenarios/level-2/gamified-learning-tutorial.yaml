meta:
  id: gamified-learning-tutorial
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Design a gamified tutorial experience for learning a musical instrument, with achievement systems, progress milestones, and engagement mechanics"
  tags: [gamification, music, learning-design, intermediate]

state: {}

trigger: |
  You're an instructional designer at a music
  education startup. You're designing a gamified
  tutorial experience called "Guitar Hero Journey:
  Learn Guitar in 90 Days" for a mobile app. The
  app uses gamification to keep adult learners
  motivated through the difficult early weeks when
  most people quit.

  App parameters:
  - Audience: Adults 25-45 who bought a guitar
    during quarantine and it's been collecting dust
  - Equipment: Acoustic or electric guitar (app
    works with both)
  - Duration: 90-day program, 15-20 min/day
  - Technology: Mobile app with audio recognition
    (can hear what the user plays)
  - Retention goal: 60% completion (industry average
    for music apps is 15%)

  Design requirements:
  - 90-day learning path
    - Week 1-2: Foundations (holding guitar, tuning,
      first chords: G, C, D)
    - Week 3-4: Rhythm and strumming patterns
    - Week 5-6: Adding chords (Em, Am, E), chord
      transitions
    - Week 7-8: Playing songs (3 beginner songs)
    - Week 9-10: Barre chords introduction, music
      theory basics
    - Week 11-12: Performance preparation, play a
      full song start to finish

  - Gamification system
    - XP (experience points) system with level names
    - Daily streak mechanics (with streak freeze
      for rest days)
    - Achievement badges (25 specific badges with
      names, criteria, and descriptions)
    - Skill tree visualization (chord mastery, rhythm,
      song repertoire branches)
    - Weekly challenges and community leaderboards
    - "Band" feature (accountability groups of 4-5
      learners)
    - Milestone celebrations (video performances,
      shareable certificates)

  - Lesson design for 5 sample lessons (fully written)
    - Lesson 1: "First Notes" (Day 1)
    - Lesson 10: "Your First Chord Change" (Day 10)
    - Lesson 30: "Strumming with Confidence" (Day 30)
    - Lesson 60: "Playing Your First Song" (Day 60)
    - Lesson 90: "Your First Performance" (Day 90)

  - Engagement mechanics
    - Onboarding flow (first 5 minutes in the app)
    - Push notification strategy (timing, content,
      frequency)
    - Re-engagement for lapsed users
    - Social features that motivate without
      discouraging

  Task: Write the complete gamified tutorial design
  with the 90-day path, gamification system, 5
  sample lessons, and engagement mechanics.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete gamified tutorial — the 90-day learning path has clear weekly progression; the gamification system includes XP, streaks, 25 badges, skill tree, and social features; all 5 sample lessons are fully written with specific exercises; the engagement mechanics cover onboarding, notifications, and re-engagement; the overall design addresses the 60% completion target."
    weight: 0.35
    description: "DesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates both music education and gamification expertise — the chord progression follows sound pedagogical order; the gamification enhances learning without replacing substance; the streak mechanic includes healthy rest provisions; the social features motivate without discouraging slower learners; the 5 sample lessons teach real guitar skills, not just app engagement."
    weight: 0.35
    description: "DualExpertise"
  - type: llm_judge
    criteria: "Response would achieve exceptional retention — the gamification mechanics address the specific moments when guitar learners quit (chord transitions, barre chords); the 'band' accountability feature creates social commitment; the push notification strategy is respectful and effective; the overall design would significantly exceed the 15% industry completion rate."
    weight: 0.30
    description: "RetentionDesign"
