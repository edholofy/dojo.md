meta:
  id: video-tutorial-production
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Write a complete video tutorial script and production plan for a cooking technique video, including shot list, narration, and editing notes"
  tags: [video-production, cooking, scripting, intermediate]

state: {}

trigger: |
  You're a food content creator scripting a YouTube
  tutorial video called "Knife Skills 101: The 5
  Cuts Every Home Cook Needs to Know." This is part
  of your "Kitchen Fundamentals" series that has
  grown to 50,000 subscribers.

  Video parameters:
  - Duration: 12-15 minutes
  - Style: Top-down (overhead) + front-facing camera
  - Audience: Home cooks who are self-taught and
    want to level up their prep speed and safety
  - Equipment: 2 cameras, good lighting, lapel mic
  - Editing style: Clean cuts, slow-motion for
    technique demos, text overlays for key points

  Script requirements:
  - Full two-column script (narration | visuals/
    actions) for the entire video
  - Hook (first 15 seconds — why knife skills
    matter, preview of what they'll learn)
  - 5 techniques to cover:
    1. The rock chop (basic cutting motion)
    2. Dicing an onion (3 sizes: large, medium, fine)
    3. Julienne (matchstick cuts for stir-fry)
    4. Chiffonade (for herbs and greens)
    5. Mincing garlic (smash and mince method)
  - For each technique: demonstration narration,
    slow-motion replay callout, common mistakes,
    practice exercise suggestion
  - Safety segment (claw grip, cutting board
    stability, knife sharpening basics)
  - B-roll shot list (close-ups needed, angles)
  - Text overlay specifications (timing and content)
  - End screen plan (subscribe CTA, related video
    link, comment question prompt)
  - Thumbnail concept description
  - Video description and tags for YouTube SEO

  Task: Write the complete video script with all
  production notes, shot list, and YouTube metadata.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete video tutorial script — includes two-column format with narration and visuals; hook captures attention in 15 seconds; all 5 knife techniques are scripted with demonstrations, slow-motion callouts, and common mistakes; safety segment is included; B-roll shot list is specific; text overlays are timed; end screen plan, thumbnail concept, and YouTube metadata are complete."
    weight: 0.35
    description: "ScriptCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates video production expertise — the script flows naturally when read aloud; visual directions are specific enough for a camera operator; slow-motion callouts enhance learning; the pacing balances instruction with entertainment; the editing notes would produce a professional video; the YouTube SEO strategy would help discoverability."
    weight: 0.35
    description: "ProductionExpertise"
  - type: llm_judge
    criteria: "Response would produce an effective teaching video — the 5 techniques are taught in a logical order; the narration explains WHY each technique works (not just how); practice exercises encourage viewer action; the overall video would measurably improve a home cook's knife skills and prep speed."
    weight: 0.30
    description: "TeachingEffectiveness"
