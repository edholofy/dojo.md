meta:
  id: workshop-facilitation-tutorial
  level: 2
  course: tutorial-writing-non-technical
  type: output
  description: "Write a tutorial on facilitating creative workshops, covering planning, facilitation techniques, group dynamics, and participant engagement"
  tags: [workshop, facilitation, creative, intermediate]

state: {}

trigger: |
  You're a workshop facilitator and artist writing
  a tutorial called "How to Run a Pottery Workshop:
  From Planning to Cleanup" for a community maker
  space blog. Local artists want to teach workshops
  but have no facilitation experience.

  Tutorial parameters:
  - Audience: Artists/crafters with strong skills
    but no teaching or group facilitation experience
  - Workshop type: 3-hour introductory pottery
    (hand-building, not wheel) for 8-12 adults
  - Setting: Community maker space with basic
    equipment
  - Goal: Plan, facilitate, and manage a successful
    first workshop

  Tutorial requirements:
  - Pre-workshop planning
    - Lesson plan template (objectives, timeline,
      materials)
    - Materials calculation and prep (clay amounts,
      tools per person)
    - Space setup (table arrangement, supply
      stations, demo visibility)
    - Registration and communication (what to tell
      participants beforehand)
    - Pricing strategy (materials cost + your time
      + space rental)
  - Facilitation techniques
    - The welcome and icebreaker (5 minutes)
    - Demonstration technique (show, then guide,
      then release)
    - Managing different skill levels in one group
    - When to help vs. when to let them struggle
    - Time management (keeping on schedule without
      rushing)
    - Handling the "I'm terrible at this" participant
  - During the workshop
    - Minute-by-minute timeline for 3 hours
    - Transitions between activities
    - Group energy management (when to add music,
      when to chat, when to focus)
    - Photo documentation (for marketing, with
      participant consent)
  - Post-workshop
    - Cleanup process and timeline
    - Follow-up communication (photos, next workshop,
      feedback request)
    - Feedback collection (what to ask)
    - Financial recap template
    - Iteration: improving for next time

  Task: Write the complete workshop facilitation
  tutorial with planning guides, the minute-by-
  minute timeline, and post-workshop processes.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete workshop facilitation tutorial — covers pre-workshop planning, facilitation techniques, the minute-by-minute timeline, and post-workshop processes; the lesson plan template is usable; materials calculations are specific; the pricing strategy helps artists value their time; the follow-up communication supports building a repeat workshop business."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches genuine facilitation skills — the demo/guide/release technique is well-explained; managing different skill levels gets real strategies; the 'I'm terrible at this' participant gets empathetic handling; time management advice is practical; the overall tutorial teaches facilitation, not just pottery instruction."
    weight: 0.35
    description: "FacilitationExpertise"
  - type: llm_judge
    criteria: "Response would enable a successful first workshop — the minute-by-minute timeline prevents pacing disasters; the materials prep prevents running out; the space setup ensures all participants can see demonstrations; the overall tutorial would give a skilled artist the confidence to teach their first group class."
    weight: 0.30
    description: "WorkshopSuccess"
