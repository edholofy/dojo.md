meta:
  id: creator-economy-training
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a comprehensive training program for tutorial creators, covering content strategy, production, audience building, monetization, and sustainable creative careers"
  tags: [creator-economy, business-building, training, expert]

state: {}

trigger: |
  You're the Director of Education at a creator
  economy platform (similar to Teachable + Patreon).
  You're creating "Creator Academy" — a comprehensive
  training program for people who want to build
  sustainable businesses around teaching non-technical
  skills online.

  Program parameters:
  - Audience: Subject-matter experts (chefs, fitness
    trainers, artists, musicians, coaches) who have
    deep skill but no content creation or business
    experience
  - Format: 12-week cohort-based program (live
    sessions + self-paced + community)
  - Cohort size: 50 creators per cohort
  - Goal: By graduation, each creator has launched
    their first paid tutorial product and has a
    growth strategy
  - Price: $2,000 per creator

  Curriculum design (12 weeks):

  1. Weeks 1-2: Finding Your Niche
     - Audience research methodology
     - Competitive landscape analysis
     - Unique value proposition development
     - Topic validation (before you create anything)

  2. Weeks 3-4: Content Strategy
     - Content pillar framework
     - Tutorial format selection (matching format to
       skill type)
     - Content calendar creation
     - Free vs. paid content strategy (the funnel)

  3. Weeks 5-6: Production Skills
     - Video production basics (lighting, audio,
       camera, editing)
     - Written content creation (blog, email,
       social)
     - Photography for tutorials
     - Production workflow and batch creation

  4. Weeks 7-8: Instructional Design
     - Learning objectives for non-technical skills
     - Curriculum mapping for tutorial series
     - Assessment without tests
     - Engagement and retention techniques

  5. Weeks 9-10: Building Your Audience
     - Platform strategy (YouTube, Instagram, TikTok,
       newsletter)
     - SEO for tutorial content
     - Community building
     - Collaboration and cross-promotion
     - Email list building

  6. Weeks 11-12: Monetization and Sustainability
     - Pricing strategy for tutorial products
     - Launch planning (pre-launch, launch week,
       post-launch)
     - Revenue diversification
     - Financial sustainability (when to go full-time)
     - Burnout prevention for creators
     - Legal basics (LLC, contracts, IP, taxes)

  For each 2-week block:
  - Learning objectives
  - Live session plans (2 per week, 90 min each)
  - Self-paced tutorial content outline
  - Homework assignments (building their actual
    business)
  - Peer feedback activities
  - Guest expert session plan
  - Milestone deliverable

  Additionally:
  - Cohort community design (Slack/Discord structure)
  - Graduation criteria and showcase event
  - Alumni program and ongoing support
  - Program marketing and enrollment strategy
  - Success metrics and ROI framework

  Task: Write the complete Creator Academy program
  with all 6 curriculum blocks, session plans,
  community design, and program operations.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete Creator Academy — all 6 two-week blocks have learning objectives, session plans, self-paced content, assignments, peer activities, guest sessions, and milestone deliverables; community design supports cohort bonding; graduation criteria create accountability; alumni program provides ongoing value; the curriculum builds a real creator business by graduation."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates creator economy expertise — the niche validation methodology prevents wasted effort; content strategy addresses the free-to-paid funnel; production skills are taught at the right level for non-professionals; monetization guidance is realistic (not 'get rich quick'); burnout prevention addresses real creator sustainability challenges; the overall curriculum reflects how successful tutorial creators actually build businesses."
    weight: 0.35
    description: "CreatorExpertise"
  - type: llm_judge
    criteria: "Response would produce successful creator graduates — by week 12, creators would have a launched paid product; the homework builds real business assets (not theoretical exercises); the cohort model creates peer accountability and network effects; the $2,000 price point is justified by outcomes; the overall program would establish the platform as the premier creator education resource."
    weight: 0.30
    description: "GraduateSuccess"
