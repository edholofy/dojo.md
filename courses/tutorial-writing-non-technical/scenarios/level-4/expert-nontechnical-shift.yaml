meta:
  id: expert-nontechnical-shift
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Handle three expert-level tutorial challenges simultaneously: a crisis response training program, a creator intellectual property guide, and a corporate wellness tutorial initiative"
  tags: [shift-simulation, multi-challenge, expert]

state: {}

trigger: |
  You're the Chief Learning Officer at a large
  educational content company. Three urgent projects
  need your expertise this quarter.

  Project 1: Crisis Response Training
  A wildfire season is approaching and your state
  emergency management agency has contracted you
  to create a rapid-deployment community training
  program. You have 6 weeks to design, produce, and
  deploy training for 200,000 residents across 15
  counties.
  - Must work in English, Spanish, and Hmong
  - Must reach elderly, disabled, and rural
    populations
  - Must cover: evacuation planning, go-bag
    preparation, defensible space, air quality
    protection, post-fire recovery resources
  - Must include: facilitator training for 500
    community volunteers
  - Must be producible with $400K budget
  - Deliverables: Complete program design, 2 fully
    written tutorial modules, facilitator training
    outline, deployment plan

  Project 2: Creator IP Protection Guide
  Your platform's tutorial creators are having their
  content stolen at alarming rates (courses re-
  uploaded on pirate sites, screenshots used without
  credit, entire curricula copied by competitors).
  Write a comprehensive intellectual property
  protection guide for non-lawyer tutorial creators.
  - Must cover: Copyright basics (what's automatically
    protected), trademark for tutorial brands, DMCA
    takedown process (with templates), licensing
    your content, contracts with platforms, when you
    need a lawyer, international considerations
  - Must include: 5 real-world scenarios with
    step-by-step responses
  - Must be written in plain language (no legalese)
  - Length: ~5,000 words with templates

  Project 3: Corporate Wellness Tutorial Initiative
  A Fortune 500 client (45,000 employees, 12
  countries) wants you to design a wellness tutorial
  program that addresses their 67% burnout rate.
  HR insists it "not feel like HR" — employees are
  cynical about corporate wellness programs.
  - Must cover: Stress management, sleep hygiene,
    nutrition basics, movement/exercise, mental
    health resources, work-life boundaries
  - Must work across cultures (US, UK, Germany,
    Japan, India, Brazil, plus 6 more)
  - Must feel genuinely helpful, not performative
  - Must measure actual wellness outcomes (not just
    participation)
  - Deliverables: Program design, 2 fully written
    tutorial modules, cultural adaptation notes for
    Japan and Brazil, measurement framework

  Task: Deliver all three projects with their
  specified deliverables. Each must demonstrate
  expert-level tutorial design for its specific
  context and constraints.

assertions:
  - type: llm_judge
    criteria: "Response delivers all three projects with specified deliverables — the crisis training has program design, 2 written modules, facilitator training, and deployment plan; the IP guide is ~5,000 words with 5 scenarios and templates; the corporate wellness has program design, 2 modules, Japan/Brazil adaptations, and measurement framework; each project addresses its unique constraints."
    weight: 0.35
    description: "MultiProjectCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expert versatility — the crisis training reaches 200,000 people across 3 languages within budget; the IP guide makes legal concepts accessible to non-lawyers; the corporate wellness program avoids performative wellness pitfalls; each project shows deep understanding of its specific domain challenges and audience needs."
    weight: 0.35
    description: "ExpertVersatility"
  - type: llm_judge
    criteria: "Response would succeed in all three contexts — the crisis training would improve community preparedness before wildfire season; the IP guide would help creators protect their livelihood; the wellness program would reduce burnout cynicism and measurably improve employee wellbeing; each project justifies CLO-level attention."
    weight: 0.30
    description: "ProjectSuccess"
