meta:
  id: tutorial-measurement-framework
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a comprehensive measurement framework for evaluating non-technical tutorial effectiveness, including skill assessment, behavior change tracking, and ROI calculation"
  tags: [measurement, evaluation, roi, expert]

state: {}

trigger: |
  You're the VP of Learning Analytics at a major
  online education company. The CEO has asked you
  to build a measurement framework that proves
  whether non-technical tutorials actually work.
  Currently, the company measures "completion rates"
  and "satisfaction scores" but can't demonstrate
  that learners actually gain skills.

  The challenge with non-technical tutorials:
  - Cooking skills can't be tested with a multiple-
    choice quiz
  - Fitness improvement requires weeks to manifest
  - Financial behavior change happens over months
  - Craft skills produce subjective quality outputs
  - Soft skills are context-dependent and nuanced
  - Self-reported skill improvement is unreliable

  Design the complete measurement framework:

  1. Skill assessment taxonomy
     - Assessment methods by domain:
       * Physical skills (cooking, fitness, crafts):
         performance rubrics, portfolio assessment,
         video submission evaluation
       * Knowledge-based (finance, safety): scenario-
         based assessment, decision simulations
       * Creative (art, music, photography): peer
         review calibration, expert panel rubrics
       * Behavioral (productivity, communication):
         self + peer + supervisor 360 assessment
     - Pre/post measurement protocols for each
     - Inter-rater reliability standards
     - Bias mitigation in subjective assessment

  2. Behavior change measurement
     - Theory of change models for non-technical
       domains
     - Leading indicators (what to measure early)
     - Lagging indicators (what to measure later)
     - Sustained behavior change (3-month, 6-month,
       12-month tracking)
     - Attribution methodology (did the tutorial
       cause the change?)
     - Control group design for real-world contexts

  3. Learning analytics architecture
     - Data collection points (engagement, completion,
       assessment, behavior)
     - Learning analytics dashboard design
     - Predictive models (who will succeed, who
       needs intervention)
     - Recommendation engine feedback loops
     - Privacy-preserving analytics
     - A/B testing framework for content optimization

  4. ROI calculation methodology
     - Direct ROI (tutorial cost vs. value of skill
       acquired)
     - Indirect ROI (career advancement, health
       outcomes, quality of life)
     - Employer ROI (for corporate training)
     - Social ROI (for community programs)
     - ROI calculation templates by domain
     - Communicating ROI to different stakeholders
       (CFO, board, grant funders)

  5. Quality assurance system
     - Tutorial quality score algorithm
     - Instructor effectiveness metrics
     - Content effectiveness by segment
     - Continuous improvement loops
     - Benchmarking methodology (internal + industry)

  6. Implementation guide
     - Measurement maturity model (5 levels)
     - Phased implementation plan
     - Team structure and skills needed
     - Technology stack recommendations
     - Change management for measurement culture
     - Annual measurement review process

  Task: Write the complete measurement framework
  with assessment taxonomy, behavior change tracking,
  analytics architecture, ROI methodology, and
  implementation guide.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete measurement framework — skill assessment covers all domain types with appropriate methods; behavior change measurement uses valid theory of change models; learning analytics architecture is technically specified; ROI calculation includes direct, indirect, and social ROI; quality assurance creates continuous improvement; the implementation guide provides a realistic adoption path."
    weight: 0.35
    description: "FrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates learning measurement expertise — assessment methods match domain characteristics (rubrics for physical skills, simulations for knowledge, peer review for creative); behavior change attribution methodology is sound; predictive models address real learning analytics challenges; ROI calculations are defensible; the overall framework goes beyond completion rates and satisfaction scores to genuine learning evidence."
    weight: 0.35
    description: "MeasurementExpertise"
  - type: llm_judge
    criteria: "Response would transform how tutorial effectiveness is measured — the framework provides evidence that tutorials actually work; the ROI methodology would justify investment in non-technical education; the implementation guide enables real organizations to adopt the framework; the overall contribution would advance the field of learning measurement for non-technical domains."
    weight: 0.30
    description: "FieldAdvancement"
