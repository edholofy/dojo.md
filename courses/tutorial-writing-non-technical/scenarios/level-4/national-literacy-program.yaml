meta:
  id: national-literacy-program
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a national adult literacy tutorial program serving 50,000 learners across diverse communities, with culturally responsive pedagogy and multi-format delivery"
  tags: [national-program, literacy, equity, expert]

state: {}

trigger: |
  You're the Chief Learning Officer for a national
  nonprofit launching "Read Forward" — a national
  adult literacy program aimed at the 54 million
  US adults who read below a 6th grade level. The
  program has $8M in foundation funding and
  partnerships with 200 community organizations
  across 35 states.

  Program parameters:
  - Target: 50,000 adult learners over 3 years
  - Literacy levels: Pre-literate to 6th grade
    (multiple entry points)
  - Demographics: Diverse (ESL learners, native
    English speakers, rural and urban, ages 18-75,
    multiple cultural backgrounds)
  - Delivery: Community centers, libraries, churches,
    workplaces, prisons, and online
  - Facilitators: Trained volunteers + professional
    literacy tutors
  - Languages: English with ESL pathways for Spanish,
    Mandarin, Arabic, Somali, and Haitian Creole

  Design the complete program:

  1. Assessment and placement system
     - Intake assessment design (non-threatening,
       accurate, administered by volunteers)
     - 5 learning levels with clear benchmarks
     - Progress tracking methodology
     - Placement appeal process

  2. Tutorial curriculum (5 levels)
     - Level 1: Pre-literate (letter recognition,
       basic phonics, name writing)
     - Level 2: Early reader (sight words, simple
       sentences, functional texts)
     - Level 3: Developing (paragraph reading,
       comprehension strategies, writing)
     - Level 4: Intermediate (multi-paragraph texts,
       inference, form completion)
     - Level 5: Functional (grade 5-6 reading,
       real-world documents, digital literacy)
     - For each level: learning objectives, sample
       lessons, practice activities, assessment criteria

  3. Culturally responsive pedagogy
     - Content that reflects learner life experiences
     - Materials featuring diverse cultural contexts
     - Community knowledge integration
     - Addressing shame and stigma around adult
       illiteracy
     - Family literacy component (parents reading
       with children)

  4. Multi-format delivery design
     - In-person tutoring guidelines (1:1 and small
       group)
     - Digital/mobile app specifications
     - Print materials design (large type, clear
       layout, low-cost production)
     - Audio companion design
     - Workplace literacy integration
     - Prison/institutional adaptations

  5. Volunteer facilitator training
     - 20-hour training curriculum
     - Cultural competency training
     - Trauma-informed teaching practices
     - When to refer to professional tutors
     - Ongoing support and community of practice

  6. Program evaluation and impact
     - Theory of change
     - Outcome metrics (reading level improvement,
       employment, civic participation)
     - Data collection methodology
     - Annual report framework
     - Funder reporting requirements
     - Longitudinal tracking (3-year outcomes)

  Task: Write the complete national literacy program
  with assessment system, curriculum for all 5 levels,
  training design, and evaluation framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete national literacy program — assessment and placement covers 5 levels; curriculum for each level has objectives, sample lessons, and activities; culturally responsive pedagogy is integrated throughout; multi-format delivery addresses diverse settings including prisons and workplaces; volunteer training is comprehensive; evaluation framework tracks meaningful outcomes over 3 years."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates adult literacy education expertise — the assessment is non-threatening for adults with literacy shame; curriculum uses adult-relevant content (not children's materials for adults); ESL pathways address language-specific challenges; culturally responsive approaches respect community knowledge; the family literacy component creates intergenerational impact; the program addresses root barriers to adult literacy."
    weight: 0.35
    description: "LiteracyExpertise"
  - type: llm_judge
    criteria: "Response would achieve national-scale impact — the program can scale to 50,000 learners across 200 organizations; volunteer training ensures quality despite decentralized delivery; the $8M budget is allocated effectively; the evaluation framework satisfies funder requirements; the overall program would measurably improve adult literacy outcomes at national scale."
    weight: 0.30
    description: "NationalImpact"
