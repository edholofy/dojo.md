meta:
  id: refugee-integration-program
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a comprehensive tutorial program for refugee resettlement, covering daily life skills, cultural orientation, and community integration with trauma-informed design"
  tags: [refugee-integration, cultural-orientation, trauma-informed, expert]

state: {}

trigger: |
  You're the Director of Education at an
  international refugee resettlement agency. You're
  creating "New Beginnings" — a comprehensive life
  skills tutorial program for newly arrived refugees
  in the United States.

  Program parameters:
  - Audience: Refugees from diverse countries
    (currently: Syria, Afghanistan, Ukraine, DRC,
    Myanmar, Venezuela, Haiti)
  - Languages: Arabic, Dari/Pashto, Ukrainian,
    Swahili/French, Burmese, Spanish, Haitian Creole
    — plus English as the learning target
  - Literacy: Ranges from non-literate to
    university-educated (within the same classroom)
  - Trauma: All participants have experienced
    displacement; many have experienced violence,
    persecution, or loss
  - Delivery: In-person at resettlement centers
    (first 90 days) + ongoing community support
  - Facilitators: Bilingual case workers + community
    mentors (former refugees)
  - Cultural complexity: Must serve Muslim, Christian,
    Buddhist, and Hindu families simultaneously

  Design the complete program:

  1. Cultural orientation curriculum (first 2 weeks)
     - US daily life (housing norms, trash/recycling,
       utilities, 911, neighborhood safety)
     - Transportation (public transit, driver's
       license pathway, ride-sharing)
     - Shopping and food (grocery stores, food
       assistance, halal/kosher/vegetarian finding)
     - Money and banking (US currency, bank accounts,
       building credit, avoiding scams targeting
       refugees)
     - Communication (phone, internet, mail, email)
     - Safety and rights (police interactions, tenant
       rights, religious freedom, hate crime reporting)

  2. Navigating systems (weeks 3-8)
     - Healthcare (insurance, appointments, pharmacy,
       mental health — destigmatizing therapy)
     - Education (school enrollment, homework help,
       parent-teacher conferences)
     - Employment (resume, interview, workplace
       culture, worker rights, tax basics)
     - Legal (immigration status maintenance, Social
       Security, voter registration if eligible)
     - Social services (SNAP, Medicaid, WIC,
       community resources)

  3. English language integration
     - Survival English (first 2 weeks — critical
       phrases, reading signs, calling 911)
     - Functional English (weeks 3-8 — medical
       appointments, job interviews, school
       communication)
     - Ongoing English pathways (ESL programs,
       community conversation groups)

  4. Trauma-informed design principles
     - Session structure (predictability, choice,
       safety signals)
     - Facilitator trauma-awareness training
     - Triggers to anticipate and manage
     - Mental health resource integration
     - Resilience-focused framing (strength-based,
       not deficit-based)
     - Self-care for facilitators

  5. Family and community integration
     - Youth-specific programming (school
       integration, identity navigation, bullying
       resources)
     - Elder care (isolation prevention, health
       navigation, intergenerational role reversal)
     - Community mentor matching program
     - Cultural celebration and identity preservation
     - Interfaith community building

  6. Program evaluation
     - Self-sufficiency benchmarks (90-day, 6-month,
       1-year)
     - Participant feedback (culturally appropriate
       methods)
     - Long-term outcome tracking
     - Program improvement cycle

  Task: Write the complete refugee integration
  program with all curriculum modules, trauma-
  informed design, and family support components.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete refugee integration program — all 6 sections are covered; cultural orientation addresses real daily life challenges; system navigation covers healthcare, education, employment, and legal; English integration has immediate survival phrases and ongoing pathways; trauma-informed principles are integrated throughout; family programming addresses youth, elders, and community; evaluation tracks self-sufficiency."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates refugee resettlement expertise — the curriculum addresses real challenges (scams targeting refugees, police interaction anxiety, destigmatizing mental health across cultures); multilingual delivery handles the literacy range; interfaith sensitivity serves diverse religious communities simultaneously; the strength-based framing respects refugee resilience; facilitator self-care prevents secondary trauma."
    weight: 0.35
    description: "ResettlementExpertise"
  - type: llm_judge
    criteria: "Response would accelerate successful integration — the 90-day intensive provides critical survival skills; system navigation prevents crises (missed appointments, benefit gaps); the community mentor program creates lasting connections; youth programming prevents isolation; the overall program would measurably improve refugee self-sufficiency and community belonging."
    weight: 0.30
    description: "IntegrationSuccess"
