meta:
  id: immersive-learning-design
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design an immersive VR/AR tutorial experience for hands-on skills like cooking and home repair, with spatial learning design and haptic feedback integration"
  tags: [vr-ar, immersive-learning, spatial-design, expert]

state: {}

trigger: |
  You're the Head of Immersive Learning at a VR
  education company that just raised $25M to build
  "SkillSpace" — a VR/AR platform for teaching
  hands-on, non-technical skills. Your thesis:
  video tutorials fail for physical skills because
  you can't practice while watching. SkillSpace
  lets learners practice in a safe, guided virtual
  environment before doing it for real.

  Platform parameters:
  - Hardware: Meta Quest 3 (VR), smartphone AR
    (for lower-cost option)
  - Target domains: Cooking, home repair, gardening,
    automotive maintenance, first aid
  - Users: 50,000 target in 18 months
  - Design philosophy: "Practice the hard parts
    safely, then do it for real with confidence"

  Design the complete platform:

  1. Spatial learning design principles
     - How spatial learning differs from flat-screen
       learning
     - Body-based knowledge (proprioception, muscle
       memory) in VR
     - Cognitive load management in immersive
       environments
     - Presence and its effect on learning transfer
     - When VR adds value vs. when flat video is
       sufficient

  2. Tutorial design system (VR-native format)
     - Instruction overlay system (3D annotations,
       floating guides, spatial audio cues)
     - "Ghost hands" technique (translucent guide
       hands showing the motion)
     - Progressive challenge system (guided →
       assisted → independent)
     - Mistake feedback (visual/haptic cues when
       doing something wrong)
     - Replay and slow-motion for complex motions
     - Assessment through performance capture

  3. Design 3 complete VR tutorial experiences:
     - Experience 1: "Kitchen Knife Skills" (VR)
       - 30-minute lesson on 3 cuts
       - Virtual cutting board with haptic resistance
       - Speed and precision scoring
       - Safety (finger position) monitoring
     - Experience 2: "Fix a Leaky Faucet" (VR)
       - 20-minute home repair tutorial
       - Tool identification and selection
       - Step-by-step disassembly/reassembly
       - "What if you turn the wrong thing" safety
     - Experience 3: "Herb Garden Setup" (AR)
       - AR overlay on real space
       - Spatial planning (sun exposure visualization)
       - Plant placement optimization
       - Care schedule in AR calendar

  4. AR companion for real-world practice
     - How AR guides transition from VR to reality
     - Step-by-step AR overlay for real tasks
     - Safety monitoring (e.g., "your knife angle
       is too steep" via camera)
     - Progress tracking from VR to real performance

  5. Accessibility in immersive environments
     - Motion sickness prevention
     - Seated experiences for mobility limitations
     - Audio-first options for vision impairments
     - Cognitive accessibility (reduced stimulation
       mode)
     - One-handed control schemes

  6. Product and business design
     - MVP feature set and launch domains
     - Content creation pipeline for VR tutorials
     - Pricing model
     - Hardware partnership strategy
     - 18-month roadmap

  Task: Write the complete immersive learning
  platform design with spatial learning principles,
  tutorial design system, 3 VR/AR experiences,
  accessibility design, and product strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete immersive learning platform — spatial learning principles are grounded in research; the tutorial design system leverages VR-specific affordances; all 3 experiences are fully designed with interaction details; AR companion bridges virtual to real-world practice; accessibility addresses VR-specific challenges; the product strategy is realistic for the $25M budget."
    weight: 0.35
    description: "PlatformCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates immersive learning design expertise — the 'ghost hands' and haptic feedback are pedagogically justified; cognitive load management addresses VR-specific challenges; the progressive challenge system enables real skill transfer; the AR companion solves the VR-to-reality gap; the overall design leverages spatial learning research, not just VR novelty."
    weight: 0.35
    description: "ImmersiveExpertise"
  - type: llm_judge
    criteria: "Response would create genuinely effective VR learning — skills practiced in VR would transfer to real-world performance; the knife skills tutorial would improve actual cutting technique; the faucet repair tutorial would build real repair confidence; the AR garden planner would optimize real growing space; the overall platform would demonstrate that VR tutorials outperform video for physical skills."
    weight: 0.30
    description: "SkillTransfer"
