meta:
  id: disaster-preparedness-program
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a community disaster preparedness tutorial program that works across languages, literacy levels, and accessibility needs for a multi-hazard region"
  tags: [disaster-preparedness, community-resilience, public-safety, expert]

state: {}

trigger: |
  You're the Community Resilience Director for a
  county emergency management agency in a multi-
  hazard region (earthquakes, wildfires, floods,
  extreme heat). After a recent disaster where 40%
  of residents reported "not knowing what to do,"
  you've been tasked with creating a comprehensive
  disaster preparedness tutorial program.

  Community demographics:
  - Population: 850,000 (metro area + rural)
  - Languages: English (60%), Spanish (25%), Vietnamese
    (8%), Tagalog (4%), ASL community (3%)
  - Literacy: 18% of adults below basic literacy
  - Age: Significant elderly population (22% over 65)
  - Housing: Mix of apartments, single-family homes,
    mobile homes, houseless encampments
  - Disabilities: 15% of residents have a disability
  - Income: 28% below poverty line

  Design the complete program:

  1. Tutorial content (4 hazard modules)
     - Earthquake preparedness (drop/cover/hold,
       kit building, structural assessment, aftershock
       planning)
     - Wildfire preparedness (evacuation zones, go-bag,
       defensible space, air quality protection)
     - Flood preparedness (evacuation routes, sandbag
       techniques, insurance basics, water safety)
     - Extreme heat preparedness (cooling centers,
       hydration, heat illness recognition, checking
       on neighbors)
     - For each: before/during/after guidance, supply
       checklists, decision trees

  2. Universal accessibility design
     - Low-literacy versions (icon-based, minimal text)
     - Multilingual production (5 languages + ASL)
     - Elderly-specific guidance (medication management,
       mobility considerations, social isolation risk)
     - Disability-specific guidance (wheelchair users,
       blind/deaf individuals, cognitive disabilities)
     - Houseless population guidance (shelter location,
       warning access, resource navigation)

  3. Multi-format delivery
     - Printed materials (door-hanger, fridge magnet,
       booklet)
     - Digital (web, app, SMS alerts)
     - Video (multilingual, captioned, ASL)
     - Audio (radio PSAs, podcast episodes)
     - In-person (community presentations, school
       programs, faith-based partnerships)
     - Emergency alert integration

  4. Community engagement strategy
     - Neighborhood preparedness team training
     - School-based programs (K-12)
     - Faith-based community partnerships
     - Employer engagement program
     - Annual preparedness drills
     - Community resilience hubs

  5. Evaluation and continuous improvement
     - Preparedness readiness assessment (pre/post)
     - Drill effectiveness measurement
     - After-action review process (following real
       events)
     - Annual community preparedness survey
     - Material revision cycle

  Task: Write the complete disaster preparedness
  program with all hazard modules, accessibility
  designs, delivery formats, and community
  engagement strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete disaster preparedness program — all 4 hazard modules have before/during/after guidance with checklists and decision trees; universal accessibility covers all identified populations; multi-format delivery spans print, digital, video, audio, and in-person; community engagement creates neighborhood-level resilience; evaluation tracks preparedness improvement over time."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates emergency management and accessibility expertise — the hazard guidance follows FEMA best practices; accessibility design genuinely addresses diverse needs (not just translations); the low-literacy icon-based approach works without reading; disability-specific guidance addresses real evacuation challenges; the houseless population guidance is practical and dignified; the overall program reaches the most vulnerable residents."
    weight: 0.35
    description: "EmergencyExpertise"
  - type: llm_judge
    criteria: "Response would reduce the 'didn't know what to do' rate — the multi-format strategy reaches residents through their preferred channels; the neighborhood preparedness teams create peer support; the school programs create family preparedness; the annual drills build muscle memory; the overall program would measurably improve community resilience in the next disaster event."
    weight: 0.30
    description: "CommunityResilience"
