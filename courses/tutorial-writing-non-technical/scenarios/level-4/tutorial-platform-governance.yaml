meta:
  id: tutorial-platform-governance
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a content governance system for a large tutorial marketplace (like Skillshare/Udemy), including quality standards, creator guidelines, and content moderation"
  tags: [platform-governance, content-standards, marketplace, expert]

state: {}

trigger: |
  You're the VP of Content Quality at "LearnFlow"
  — a tutorial marketplace with 50,000 tutorials
  from 15,000 creators across 200+ topics. The
  platform is growing rapidly but facing quality
  challenges that threaten user trust and retention.

  Current problems:
  - 30% of tutorials rated below 3.5 stars
  - Inconsistent quality across creators
  - Medical/financial tutorials with dangerous
    misinformation
  - Cultural insensitivity complaints (12/month)
  - Accessibility compliance gaps (no captions on
    60% of videos)
  - Creator burnout (average creator publishes for
    18 months then leaves)
  - Copycat content (same topic covered 50+ times
    with minimal differentiation)

  Design the complete content governance system:

  1. Quality standards framework
     - Tutorial quality rubric (scoring across
       dimensions: content accuracy, production
       quality, instructional design, engagement,
       accessibility)
     - Minimum quality thresholds for publication
     - Quality tier system (Standard, Verified,
       Premium)
     - Automated quality checks (audio quality,
       video resolution, caption availability)
     - Human review process and reviewer training

  2. Content safety and accuracy
     - Regulated topics policy (medical, financial,
       legal, nutrition — expert review requirements)
     - Misinformation detection and response
     - Cultural sensitivity review guidelines
     - Age-appropriateness standards
     - Copyright and IP compliance
     - Harmful content escalation procedures

  3. Creator guidelines and support
     - Creator handbook (complete document)
     - Onboarding program for new creators
     - Quality improvement program for struggling
       creators
     - Creator mentorship matching
     - Best practices library
     - Communication templates for quality feedback

  4. Accessibility standards
     - Caption requirements and quality standards
     - Audio description guidelines
     - Color contrast requirements for visual content
     - Cognitive accessibility guidelines
     - Compliance timeline and support resources
     - Accessibility score in quality rubric

  5. Content curation and discovery
     - Editorial curation criteria
     - Duplicate content management strategy
     - Featured content selection process
     - Topic gap analysis methodology
     - Commissioned content program (filling gaps)

  6. Creator ecosystem health
     - Creator satisfaction metrics
     - Revenue sharing model impact on quality
     - Creator retention strategies
     - Creator burnout prevention
     - Community governance (creator council)
     - Annual creator survey and action plan

  Task: Write the complete content governance system
  with quality standards, safety policies, creator
  handbook, accessibility requirements, and creator
  ecosystem strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete content governance system — quality rubric has specific dimensions and scoring; content safety addresses regulated topics with expert review; the creator handbook is comprehensive; accessibility standards have clear requirements and timeline; content curation manages duplication; creator ecosystem strategy addresses retention and burnout; the system handles 50,000 tutorials at scale."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform governance expertise — the quality tier system creates incentives for improvement; the misinformation policy for medical/financial content is responsible; cultural sensitivity guidelines prevent harm without over-censoring; accessibility compliance is phased realistically; the creator burnout prevention addresses real platform dynamics; the overall system balances quality with creator freedom."
    weight: 0.35
    description: "PlatformExpertise"
  - type: llm_judge
    criteria: "Response would improve platform quality metrics — the 30% below-3.5-stars rate would decrease; dangerous misinformation would be caught before publication; cultural insensitivity complaints would drop; accessibility compliance would reach 90%+; creator retention would improve; the overall system would build user trust and platform reputation."
    weight: 0.30
    description: "QualityImprovement"
