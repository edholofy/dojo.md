meta:
  id: ai-personalized-learning-system
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design an AI-powered personalized learning system for non-technical tutorials that adapts content, pacing, and format to individual learner profiles"
  tags: [ai-personalization, adaptive-learning, edtech, expert]

state: {}

trigger: |
  You're the CPO of an edtech startup building
  "AdaptLearn" — an AI-powered platform that
  personalizes non-technical tutorials in real time.
  Unlike existing platforms that offer the same
  content to everyone, AdaptLearn adjusts content
  depth, presentation format, pacing, examples,
  and difficulty based on each learner's profile,
  behavior, and goals. You've raised $10M Series A.

  Platform scope:
  - Domains: Cooking, fitness, personal finance,
    photography, crafts, music, gardening, and
    soft skills
  - Users: 100,000 target within 18 months
  - Core innovation: Content isn't just recommended
    — it's dynamically generated and adapted

  Design the complete system:

  1. Learner profile system
     - Initial assessment (5-minute onboarding)
     - Learning style detection (visual, auditory,
       kinesthetic, reading/writing)
     - Knowledge baseline measurement
     - Goal and motivation mapping
     - Accessibility needs and preferences
     - Cultural and language preferences
     - Schedule and time availability
     - Privacy framework for learner data

  2. Content adaptation engine
     - Adaptation dimensions (what can change):
       vocabulary level, example selection, depth
       of explanation, visual density, pacing, humor
       level, cultural context
     - Content template system (how base content
       transforms)
     - Real-time difficulty adjustment
     - Format switching triggers (when to offer
       video vs. text vs. interactive)
     - "Explanation depth" slider (just-the-steps
       ↔ deep-understanding)

  3. AI content generation
     - LLM integration architecture for tutorial
       generation
     - Quality guardrails (accuracy, safety,
       cultural sensitivity)
     - Human review pipeline for AI-generated content
     - Domain-specific safety nets (e.g., cooking
       safety, exercise safety, financial accuracy)
     - Hallucination prevention for educational
       content
     - Content verification against expert-reviewed
       source material

  4. Engagement and retention
     - Optimal challenge theory implementation
       (flow state targeting)
     - Adaptive spaced repetition for skill retention
     - Personalized encouragement (tone matching)
     - Social learning integration (connecting
       similar learners)
     - Streak and progress design (avoiding toxic
       engagement patterns)
     - Churn prediction and intervention

  5. Measurement and learning science
     - Skill assessment methodology (non-test-based
       for non-technical domains)
     - Learning effectiveness metrics
     - A/B testing framework for adaptation strategies
     - Research partnerships with learning science
       institutions
     - Ethical AI in education framework

  6. Product roadmap and go-to-market
     - MVP feature set (what to build first)
     - Domain launch sequence (which tutorials first)
     - Pricing model (freemium, subscription tiers)
     - Creator/expert partnership model
     - 18-month milestone plan

  Task: Write the complete AI personalized learning
  system design with all 6 sections, including
  technical architecture, content adaptation logic,
  and product strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete AI personalized learning system — learner profiles are comprehensive; the adaptation engine specifies what changes and when; AI content generation includes safety guardrails; engagement design avoids manipulative patterns; measurement methodology works for non-technical skills; the product roadmap is realistic for the $10M budget; all 6 sections are covered with technical specificity."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI education platform expertise — the adaptation dimensions are pedagogically sound; LLM integration addresses hallucination risks specific to educational content; domain-specific safety nets handle real dangers; the learning style detection avoids debunked models; the ethical framework addresses AI bias in education; the content template system enables meaningful personalization beyond surface-level changes."
    weight: 0.35
    description: "AIEducationExpertise"
  - type: llm_judge
    criteria: "Response would create a genuinely superior learning experience — personalization would measurably improve learning outcomes compared to static tutorials; the system avoids toxic engagement patterns while maintaining motivation; the platform scales to 100,000 users; the overall product would justify the $10M investment and attract users from Skillshare/Udemy."
    weight: 0.30
    description: "LearningOutcomes"
