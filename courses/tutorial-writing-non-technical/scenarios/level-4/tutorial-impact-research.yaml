meta:
  id: tutorial-impact-research
  level: 4
  course: tutorial-writing-non-technical
  type: output
  description: "Design a research study measuring the impact of different tutorial delivery methods on skill acquisition in non-technical domains, suitable for publication"
  tags: [research, impact-measurement, methodology, expert]

state: {}

trigger: |
  You're a researcher at a university education
  research center. You're designing a large-scale
  study titled "Does Format Matter? A Multi-Domain
  Study of Tutorial Delivery Methods and Skill
  Acquisition in Non-Technical Learning" for
  publication in the Journal of Educational Psychology.

  Research questions:
  1. How do tutorial delivery format (written,
     video, interactive, community-based) and domain
     (cooking, fitness, personal finance) interact
     to affect skill acquisition?
  2. Does learner self-efficacy moderate the
     relationship between format and outcomes?
  3. What role does social learning play in non-
     technical skill development?

  Study parameters:
  - Participants: 600 adults (balanced across
    demographics)
  - 4 delivery formats × 3 domains = 12 conditions
  - Identical core content across formats
  - Duration: 4-week tutorial engagement + 3-month
    follow-up
  - Outcome measures: skill performance, knowledge
    retention, self-efficacy, transfer, behavior
    change, satisfaction

  Write the complete research paper:

  1. Introduction and literature review
     - Theoretical frameworks (self-determination
       theory, social cognitive theory, multimedia
       learning theory)
     - Prior research on tutorial format effectiveness
     - Domain-specific learning research
     - Research gaps and hypotheses (6 specific)

  2. Methodology
     - 4×3 between-subjects design
     - Participant recruitment and screening
     - Tutorial development (ensuring content
       equivalence across formats)
     - Measurement instruments (validated scales +
       custom performance assessments)
     - Procedure (4-week protocol + follow-up)
     - Data analysis plan (MANOVA, moderation
       analysis, SEM)
     - Ethical considerations

  3. Tutorial content specifications
     - Cooking condition: knife skills curriculum
     - Fitness condition: bodyweight exercise program
     - Finance condition: budgeting fundamentals
     - How content equivalence was achieved across
       formats
     - Fidelity checks

  4. Expected results and discussion
     - Hypothesized interaction patterns
     - Simulated data with realistic effect sizes
     - Practical implications for tutorial designers
     - Limitations (internal/external validity)
     - Future research directions

  5. Practitioner guidelines
     - Decision framework for choosing tutorial format
       by domain
     - When social learning matters most
     - Self-efficacy building through tutorial design
     - Cost-effectiveness analysis by format

  Task: Write the complete research paper with
  literature review, methodology, tutorial
  specifications, and practical guidelines.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete research paper — all 5 sections are present with academic rigor; the literature review covers relevant theories; the 4×3 design is correctly specified; tutorial content specifications ensure equivalence; measurement instruments are appropriate; data analysis plan uses suitable statistical methods; practical guidelines translate findings for tutorial designers."
    weight: 0.35
    description: "ResearchCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the experimental design controls confounding variables; content equivalence across formats and domains is addressed; measurement instruments capture meaningful non-technical skill outcomes; the moderation analysis tests self-efficacy effects; simulated effect sizes are realistic; the overall study design would pass peer review at JEP."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "Response would advance the field — the research questions address genuine gaps in tutorial effectiveness research; the multi-domain design enables cross-domain generalization; the practitioner guidelines would help tutorial designers make evidence-based format decisions; the self-efficacy findings would inform motivational design; the overall study would be widely cited in educational technology literature."
    weight: 0.30
    description: "FieldContribution"
