meta:
  id: tutorial-platform-product-vision
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Design a next-generation tutorial platform that uses AI, community, and learning science to create the definitive platform for non-technical skill learning"
  tags: [product-vision, platform-design, edtech, master]

state: {}

trigger: |
  You're the co-founder and CEO of "SkillForge" —
  a startup building the next-generation platform
  for non-technical tutorial education. You've
  raised a $20M Series A with the thesis that
  existing platforms (Skillshare, Udemy, MasterClass)
  are content warehouses, not learning platforms.
  SkillForge will be the first platform designed
  around actual learning science for non-technical
  skills.

  Market analysis:
  - Online learning market: $350B by 2025
  - Non-technical skills: fastest growing segment
  - Current platforms: high churn (85% don't complete),
    low outcomes (most learners don't improve
    measurably), creator burnout
  - Opportunity: No platform optimizes for actual
    skill acquisition

  Create the complete product vision:

  1. Vision and differentiation
     - Mission statement and product thesis
     - 3 user personas (learner, creator, enterprise)
     - Jobs-to-be-done for each persona
     - Key differentiators from Skillshare/Udemy/
       MasterClass
     - Product principles

  2. Core platform features (v1.0)
     - Adaptive learning paths (AI-powered,
       personalized per learner)
     - Skill verification system (portfolio-based,
       peer-reviewed, expert-validated)
     - Creator studio (tutorial creation with built-in
       instructional design guidance)
     - Community practice groups (small groups
       learning together)
     - Progress dashboard with genuine skill metrics
       (not just completion)
     - Multi-format content (video, written, AR,
       interactive, audio)
     - AI tutor (conversational help within tutorials)

  3. Creator ecosystem
     - Revenue model that incentivizes quality over
       quantity
     - Creator analytics (what actually helps learners)
     - Creator education program
     - Co-creation tools (creator + AI)
     - IP protection and content licensing
     - Creator sustainability metrics

  4. Technical architecture
     - System design (services, data, AI infrastructure)
     - AI/ML pipeline (personalization, skill
       assessment, content matching)
     - Real-time collaborative features
     - Content delivery and device optimization
     - Data architecture for learning analytics
     - Privacy and compliance

  5. Go-to-market strategy
     - Launch domains (which tutorial categories
       first and why)
     - Pricing model (freemium → subscription →
       enterprise)
     - Creator acquisition strategy
     - Learner acquisition channels
     - Enterprise sales motion
     - Partnership strategy

  6. Competitive moats and 5-year vision
     - Sustainable competitive advantages
     - Network effects and data advantages
     - 5-year product trajectory
     - Market expansion plan
     - IPO/exit readiness criteria
     - Societal impact goals

  Task: Write the complete product vision document
  with all sections, technical architecture, and
  business strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product vision — mission and differentiation are compelling; all 3 personas have detailed JTBD; core features represent genuine innovation over incumbents; creator ecosystem incentivizes quality; technical architecture is buildable; go-to-market strategy is actionable; the 5-year vision is ambitious but credible."
    weight: 0.35
    description: "ProductVisionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and learning platform expertise — the skill verification system solves a real problem (proving you learned something); the creator analytics focus on learner outcomes, not vanity metrics; the AI personalization is technically feasible; the revenue model aligns creator and learner incentives; the overall product would genuinely improve learning outcomes compared to content warehouses."
    weight: 0.35
    description: "ProductExpertise"
  - type: llm_judge
    criteria: "Response would attract investors and users — the market analysis justifies the $20M investment; competitive moats are defensible; the go-to-market would achieve early traction; a learner would choose SkillForge over Skillshare/Udemy; a creator would prefer SkillForge's quality-focused model; the overall vision would generate excitement from Series B investors."
    weight: 0.30
    description: "MarketViability"
