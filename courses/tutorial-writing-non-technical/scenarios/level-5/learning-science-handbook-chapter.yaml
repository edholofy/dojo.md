meta:
  id: learning-science-handbook-chapter
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Write a handbook chapter on the psychology of self-directed learning from tutorials, covering motivation, self-regulation, and informal skill acquisition"
  tags: [learning-science, psychology, handbook, master]

state: {}

trigger: |
  You're writing a chapter for "The Cambridge
  Handbook of Self-Directed Learning" titled
  "Learning Without a Teacher: The Psychology of
  Skill Acquisition from Non-Technical Tutorials."

  This chapter examines how millions of people
  successfully teach themselves cooking, fitness,
  crafts, music, and other skills through tutorials
  — and why many others fail.

  Chapter structure:
  1. Introduction: The rise of self-directed non-
     technical learning
  2. Motivational frameworks for tutorial engagement
     - Self-determination theory (autonomy,
       competence, relatedness in tutorial contexts)
     - Flow theory (tutorial design for optimal
       challenge)
     - Expectancy-value theory (why people choose
       to learn informally)
     - The paradox of choice (too many tutorials,
       tutorial-hopping)
  3. Self-regulation in unstructured learning
     - Goal setting without a curriculum
     - Self-monitoring without assessment
     - Strategy selection (which tutorial to follow)
     - Persistence through the "valley of despair"
     - The role of community in self-regulation
  4. Skill acquisition from tutorials
     - Dreyfus model applied to tutorial learning
       (novice → expert)
     - Deliberate practice vs. tutorial following
     - Transfer from tutorial to independent practice
     - The "tutorial dependency" problem (can follow
       but can't create independently)
  5. Social learning in tutorial communities
     - Legitimate peripheral participation (Lave &
       Wenger in online communities)
     - Peer learning and feedback in tutorial
       comments
     - Identity development through tutorial
       communities
     - The instructor-parasocial relationship
  6. Individual differences
     - Prior knowledge effects on tutorial selection
       and comprehension
     - Self-efficacy as predictor and outcome
     - Personality factors (openness, conscientiousness)
     - Demographic patterns in informal learning
  7. Design implications
     - 12 evidence-based principles for tutorial
       designers
     - Scaffolding self-regulation within tutorials
     - Building transfer into tutorial design
     - Creating communities that support learning
  8. Future research directions

  Chapter requirements:
  - 8,000-10,000 words
  - Academic tone with practical implications
  - 50+ references to peer-reviewed research
  - Original framework connecting motivation, self-
    regulation, and skill acquisition
  - Suitable for both researchers and practitioners

  Task: Write the complete handbook chapter.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete handbook chapter — all 8 sections are present with scholarly depth; motivational frameworks are correctly applied to tutorial contexts; self-regulation analysis addresses real challenges of unstructured learning; skill acquisition research informs the 'tutorial dependency' problem; social learning connects communities of practice theory to tutorial platforms; the 12 design principles synthesize the research; references are relevant and properly integrated."
    weight: 0.35
    description: "ChapterCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates scholarly expertise — self-determination theory is applied correctly to informal learning contexts; the Dreyfus model analysis of tutorial learning is insightful; the 'tutorial dependency' problem is a genuine contribution to the field; the parasocial relationship analysis is nuanced; the original framework connecting the three constructs is theoretically sound; the overall chapter advances understanding of how people learn from tutorials."
    weight: 0.35
    description: "ScholarlyRigor"
  - type: llm_judge
    criteria: "Response would influence both research and practice — researchers would cite the framework; tutorial designers would apply the 12 principles; the 'tutorial dependency' concept would enter the professional vocabulary; the future research directions would inspire new studies; the chapter fills a genuine gap in the learning science literature."
    weight: 0.30
    description: "FieldInfluence"
