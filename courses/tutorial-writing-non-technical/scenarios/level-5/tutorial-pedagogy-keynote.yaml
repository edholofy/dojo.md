meta:
  id: tutorial-pedagogy-keynote
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Write a keynote address and white paper on the future of non-technical tutorials in the age of AI, addressing the creator economy, democratized education, and learning science"
  tags: [thought-leadership, keynote, future-of-learning, master]

state: {}

trigger: |
  You're delivering the opening keynote at the
  Global Learning Summit 2026 (2,500 attendees from
  education, edtech, creator economy, and policy).
  Your talk is titled "Everyone's a Teacher Now:
  How Non-Technical Tutorials Are Democratizing
  Knowledge (And What We Must Get Right)."

  The keynote explores how the explosion of
  non-technical tutorials (YouTube, TikTok,
  Skillshare, Udemy, Instagram) has created the
  largest educational system in human history —
  and the problems that come with it.

  Keynote structure:
  1. The scale of informal learning (data on how
     many people learn skills from tutorials vs.
     formal education)
  2. What the tutorial revolution got right
     (accessibility, diversity of topics, cultural
     representation, free access)
  3. What it got wrong (misinformation, no quality
     standards, accessibility gaps, exploitative
     monetization, burnout)
  4. The AI disruption (AI-generated tutorials,
     personalized learning, the trust question)
  5. Five principles for the next era of tutorial
     education
  6. Call to action for each stakeholder group
     (creators, platforms, educators, policymakers,
     learners)

  Additionally, write the companion white paper:
  - 6,000+ words
  - Data-driven (statistics on tutorial usage,
    learning outcomes, creator economy)
  - Case studies from different tutorial domains
  - Policy recommendations
  - Research agenda for tutorial effectiveness
  - Published by your institute

  Task: Write both the keynote (with speaker notes)
  and the full white paper.

assertions:
  - type: llm_judge
    criteria: "Response produces both a complete keynote and white paper — the keynote has all 6 sections with speaker notes and presentation timing; the white paper is comprehensive (6,000+ words) with data, case studies, and policy recommendations; both pieces address the democratization of knowledge through tutorials; the five principles for the next era are genuinely forward-looking; each stakeholder group gets specific action items."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep understanding of the tutorial landscape — the data on informal learning scale is realistic; the critique of quality standards is fair; the AI disruption analysis is nuanced (opportunity and risk); the case studies reflect real tutorial domain challenges; the policy recommendations are actionable; the overall content positions tutorial education as a serious field worthy of investment and study."
    weight: 0.35
    description: "FieldMastery"
  - type: llm_judge
    criteria: "Response would influence the field — the keynote would spark conversation among the 2,500 attendees; the white paper would be cited by researchers and policymakers; the five principles would be adopted by tutorial platforms and creators; the overall contribution would advance how society thinks about informal skill education."
    weight: 0.30
    description: "ProfessionalInfluence"
