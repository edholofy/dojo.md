meta:
  id: tutorial-ecosystem-book
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Write a book proposal and first two chapters of 'The Tutorial Revolution' — a definitive book on how informal tutorials are reshaping education, work, and culture"
  tags: [book-writing, cultural-analysis, publishing, master]

state: {}

trigger: |
  You're an author and education researcher writing
  a book proposal for "The Tutorial Revolution:
  How YouTube, TikTok, and the Creator Economy Are
  Replacing School (And Why That's Both Amazing and
  Terrifying)." Major publishers (Penguin Random
  House, HarperCollins) have expressed interest.

  Book concept:
  - Thesis: The largest educational revolution in
    history is happening outside classrooms, and
    almost no one is paying attention to its
    implications
  - Audience: General nonfiction readers (Malcolm
    Gladwell, Cal Newport readership)
  - Length: ~80,000 words
  - Tone: Narrative nonfiction with data and research
    (not academic)

  Write the book proposal and first 2 chapters:

  1. Book proposal (following publishing standards)
     - Title and subtitle
     - Author bio and platform
     - Market analysis (comp titles, audience size)
     - Marketing plan (media, speaking, partnerships)
     - Complete chapter outline (12 chapters)
     - Each chapter: title, 3-sentence summary,
       key characters/stories introduced, key
       arguments

  2. Chapter 1: "The Biggest Classroom in the World"
     (~6,000 words)
     - Open with a vivid scene (a specific person
       learning a specific skill from a tutorial)
     - The scale of informal learning (data)
     - Historical context (from apprenticeships to
       textbooks to YouTube)
     - Why traditional education can't teach
       everything (the skills gap)
     - The accidental education system (platforms
       didn't intend to become schools)
     - Chapter closes with: the question the book
       will answer

  3. Chapter 2: "The New Teachers" (~6,000 words)
     - Profile 3 tutorial creators (different domains,
       demographics, journeys — fictionalized but
       based on real patterns)
     - Creator 1: A professional chef turned YouTube
       cooking teacher (300K subscribers, making
       more than restaurant work)
     - Creator 2: A fitness trainer in rural India
       teaching in Hindi (10M TikTok followers,
       reaching people who can't afford gyms)
     - Creator 3: A retired accountant teaching
       personal finance to Gen Z (her grandkids
       convinced her to start)
     - The economics of tutorial creation
     - The emotional labor of public teaching
     - The quality spectrum (from terrible to
       transformative)
     - Chapter closes with: who decides what
       "quality" means?

  Task: Write the complete book proposal and full
  first two chapters.

assertions:
  - type: llm_judge
    criteria: "Response produces a complete book proposal and 2 chapters — the proposal follows publishing standards (comp titles, marketing plan, complete chapter outline); Chapter 1 is ~6,000 words with vivid opening, data, historical context, and a clear book question; Chapter 2 profiles 3 creators with narrative depth and connects their stories to broader themes; all 12 chapters are outlined with summaries."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates narrative nonfiction mastery — the opening scene draws the reader in; data is woven into narrative (not dumped); the 3 creator profiles feel like real people; the historical context provides fresh perspective; the writing quality matches general nonfiction expectations (Gladwell/Newport level); the chapters raise compelling questions that drive the reader forward."
    weight: 0.35
    description: "NarrativeQuality"
  - type: llm_judge
    criteria: "Response would attract a major publisher — the comp title analysis shows market understanding; the chapter outline reveals a complete, compelling argument; the first two chapters demonstrate the author can sustain narrative quality; the book would fill a genuine gap in the nonfiction market; a Penguin Random House editor would want to read the full manuscript."
    weight: 0.30
    description: "PublishingViability"
