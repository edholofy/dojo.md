meta:
  id: master-nontechnical-shift
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "As the newly appointed Global Director of Informal Education at UNESCO, manage five simultaneous crises and strategic initiatives across the tutorial education landscape"
  tags: [shift-simulation, multi-crisis, strategic, master]

state: {}

trigger: |
  You've been appointed the first-ever Global
  Director of Informal Education at UNESCO. In your
  first month, five critical situations demand your
  simultaneous attention.

  Crisis 1: Tutorial Misinformation Emergency
  A viral "home remedy" tutorial on TikTok
  (50M views across 30 countries) has led to 2,000+
  hospitalizations and 12 deaths from ingesting a
  toxic substance presented as a health cure. The
  WHO has issued an alert. You need to:
  - Write the UNESCO public statement
  - Design an emergency response protocol for future
    tutorial misinformation crises
  - Propose a framework for tutorial platform
    liability
  - Create a "critical safety information" rapid
    deployment system across platforms
  - Draft policy recommendations for the UN General
    Assembly

  Crisis 2: Creator Rights Movement
  Tutorial creators from 40 countries have organized
  a "Creator Fair Pay" movement, demanding:
  - Revenue transparency from platforms
  - Ownership rights for educational content
  - Fair compensation for content used to train AI
  - Protection from content theft
  - Representation in platform governance
  You need to write a position paper on creator
  rights in informal education, propose a "Creator
  Rights Charter," and design a mediation framework
  between creators and platforms.

  Crisis 3: Digital Divide in Tutorial Access
  New data shows that tutorial learning is
  dramatically worsening educational inequality:
  wealthy, urban, English-speaking populations
  benefit 4x more from tutorial education than
  rural, low-income, non-English-speaking
  populations. You need to:
  - Write a policy brief on the tutorial divide
  - Propose a "Global Tutorial Access Initiative"
  - Design a funding mechanism (who pays to close
    the gap)
  - Create a monitoring framework for tutorial equity

  Crisis 4: AI-Generated Tutorials Proliferation
  AI-generated tutorials are flooding platforms —
  60% of new tutorials on some platforms are now
  AI-generated, often with factual errors,
  fabricated credentials, and no accountability.
  You need to:
  - Write a position paper on AI-generated
    educational content
  - Propose labeling and disclosure requirements
  - Design quality verification standards for
    AI tutorials
  - Address the impact on human tutorial creators

  Crisis 5: Tutorial Credentialing Confusion
  15 countries are independently creating tutorial-
  based credentialing systems that are incompatible,
  creating a fragmented landscape. Learners who
  earn credentials in one country find them
  unrecognized elsewhere. You need to:
  - Write a framework for international tutorial
    credential recognition
  - Propose a UNESCO-backed "Global Skills Passport"
  - Design an interoperability standard
  - Create a pilot program connecting 5 countries

  Task: Address all five crises with appropriate
  documents. Produce: the emergency statement,
  Creator Rights Charter, policy brief on the
  tutorial divide, AI tutorial position paper, and
  Global Skills Passport framework. Additionally,
  write the strategic memo to the UNESCO Director-
  General tying all five together into a unified
  vision for informal education governance.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises substantively — the misinformation response includes both immediate action and systemic prevention; the Creator Rights Charter addresses real grievances; the tutorial divide policy brief proposes actionable solutions; the AI tutorial position paper is nuanced (not just prohibition); the credentialing framework enables interoperability; the Director-General memo connects all five into a coherent vision for informal education governance."
    weight: 0.35
    description: "CrisisManagementCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global education governance expertise — the misinformation response balances urgency with due process; the creator rights framework navigates competing interests; the digital divide analysis identifies structural causes; the AI position paper distinguishes beneficial from harmful uses; the credentialing interoperability standard is technically feasible; the overall response reflects UNESCO-appropriate diplomatic framing."
    weight: 0.35
    description: "GovernanceExpertise"
  - type: llm_judge
    criteria: "Response would establish UNESCO's leadership in informal education — each crisis response creates lasting institutional frameworks; the unified vision memo would convince the Director-General to invest; the Creator Rights Charter would gain industry adoption; the Global Skills Passport would become a landmark initiative; the overall response demonstrates why informal education needs global governance."
    weight: 0.30
    description: "InstitutionalLeadership"
