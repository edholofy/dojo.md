meta:
  id: tutorial-consulting-practice
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Launch a consulting practice specializing in non-technical tutorial design, with proprietary methodology, service offerings, and thought leadership strategy"
  tags: [consulting, business-building, methodology, master]

state: {}

trigger: |
  After 20 years in education — from classroom
  teaching to corporate L&D to leading content at
  a major tutorial platform — you're launching
  "SkillCraft Consulting" — a boutique consultancy
  helping organizations create world-class non-
  technical tutorial programs.

  Business context:
  - Target clients: Tutorial platforms (Skillshare,
    Udemy, MasterClass), corporations (L&D
    departments), nonprofits (community education),
    government agencies (public education campaigns)
  - Revenue target: $400K year 1 → $1.5M year 3
  - Differentiator: You blend learning science with
    creator economy expertise — most consultants
    know one but not both
  - Pricing: $15K-$100K per engagement

  Create the complete consulting practice:

  1. Proprietary methodology: "The Tutorial
     Effectiveness Framework" (TEF)
     - 6 effectiveness dimensions with rubrics
     - Assessment instrument (how to evaluate any
       non-technical tutorial)
     - Improvement playbooks for each dimension
     - Benchmark database concept (industry
       comparisons)
     - Visual framework description

  2. Service offerings (5 packages)
     - Tutorial Audit ($15K, 2 weeks)
     - Creator Training Program ($40K, 6 weeks)
     - Content Strategy ($60K, 8 weeks)
     - Full Program Design ($100K, 12 weeks)
     - Advisory Retainer ($8K/month)
     - Each with: scope, deliverables, process,
       team requirements, typical ROI

  3. Case studies (3 detailed)
     - Case 1: Tutorial platform that improved
       completion rates from 15% to 45%
     - Case 2: Corporate L&D that saved $2M by
       replacing classroom training with tutorials
     - Case 3: Government health agency that reached
       500,000 people with a nutrition tutorial
       campaign
     - Each with: challenge, approach (using TEF),
       results with metrics, client perspective

  4. Thought leadership and marketing
     - Book concept ("The Tutorial Revolution: How
       Everyone Became a Teacher")
     - Podcast concept (weekly, 30 min)
     - Conference speaking strategy (which events)
     - Newsletter strategy
     - Social media strategy by platform
     - 12-month content calendar

  5. Operations and delivery
     - Engagement process (from inquiry to delivery)
     - Project management templates
     - Quality assurance checklist
     - Client communication framework
     - Subcontractor network strategy
     - Professional development for the team

  Task: Write the complete consulting practice
  launch package with methodology, services, case
  studies, marketing strategy, and operations.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — the Tutorial Effectiveness Framework is a credible proprietary methodology; all 5 service offerings are detailed with deliverables and pricing; the 3 case studies have believable metrics and outcomes; the thought leadership strategy builds authority; operations enable consistent delivery; the practice would be credible to platform executives and L&D leaders."
    weight: 0.35
    description: "PracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep tutorial industry expertise — the TEF dimensions reflect genuine quality factors for non-technical tutorials; the case study metrics are realistic; the service pricing reflects market rates; the book and podcast concepts would attract the target audience; the overall practice leverages the unique learning-science-meets-creator-economy positioning."
    weight: 0.35
    description: "IndustryExpertise"
  - type: llm_judge
    criteria: "Response would launch a viable consulting business — the revenue targets are achievable for the pricing and market; the service ladder creates client progression; the thought leadership builds inbound pipeline; the operations enable solo → team scaling; the overall practice would attract and retain premium clients."
    weight: 0.30
    description: "BusinessViability"
