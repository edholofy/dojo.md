meta:
  id: tutorial-equity-audit
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Conduct a comprehensive equity audit of the non-technical tutorial ecosystem, examining who creates, who accesses, who benefits, and who is excluded"
  tags: [equity-audit, inclusion, systemic-analysis, master]

state: {}

trigger: |
  You're the lead researcher at the Brookings
  Institution's Center for Universal Education,
  commissioned to write "The Tutorial Gap: An Equity
  Audit of Non-Technical Online Learning in America."
  This report will inform federal policy on informal
  education equity.

  Research scope:
  - Platform analysis: YouTube, Skillshare, Udemy,
    MasterClass, TikTok, Coursera, Khan Academy
  - Domains: Cooking, fitness, personal finance,
    crafts, music, photography, home repair, soft
    skills
  - Populations: Examination by race/ethnicity,
    income, geography (urban/rural), age, disability
    status, English proficiency, education level,
    incarceration status

  Report structure:
  1. Executive summary (for policymakers)
  2. The tutorial ecosystem landscape
     - Scale and scope of non-technical tutorial
       consumption
     - Who creates tutorials (demographic analysis
       of creators)
     - Who consumes tutorials (usage patterns by
       demographic)
     - Revenue distribution in the creator economy
  3. Access barriers
     - Digital divide (broadband, device access)
     - Financial barriers (platform costs, materials
       costs)
     - Language barriers
     - Disability and accessibility gaps
     - Digital literacy prerequisites
     - Cultural relevance gaps
  4. Representation analysis
     - Creator diversity by domain
     - Cultural representation in tutorial content
     - Whose knowledge is valued (and monetized)
     - Missing perspectives (indigenous knowledge,
       non-Western traditions)
  5. Outcome disparities
     - Who benefits from tutorial learning (and who
       doesn't)
     - Skill acquisition gaps by demographic
     - Economic outcomes of tutorial learning
     - Health outcomes from health/fitness tutorials
  6. Platform accountability
     - Algorithm bias in content recommendation
     - Monetization equity (who earns, who doesn't)
     - Accessibility compliance by platform
     - Content moderation and cultural sensitivity
     - Data privacy across demographic groups
  7. Policy recommendations
     - Federal investment in tutorial infrastructure
     - Accessibility mandates for tutorial platforms
     - Creator equity programs
     - Public tutorial library concept
     - Research funding priorities
  8. Community-centered solutions
     - Models that work (case studies)
     - Community-owned tutorial programs
     - Library-based tutorial access
     - Employer-sponsored tutorial benefits
  9. Research agenda
     - What we don't know (identified gaps)
     - Recommended studies
     - Data collection improvements needed

  Deliverable: Complete research report (15,000+
  words) with data analysis, case studies, and
  policy recommendations.

assertions:
  - type: llm_judge
    criteria: "Response produces a complete equity audit report — all 9 sections are present with analytical depth; the landscape analysis covers the major platforms; access barriers are analyzed across all population dimensions; representation analysis examines creator and content diversity; outcome disparities connect tutorial access to real-world results; policy recommendations are specific and actionable; the research agenda identifies genuine knowledge gaps."
    weight: 0.35
    description: "ReportCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates equity research expertise — the analysis goes beyond surface diversity to examine systemic barriers; algorithm bias analysis is technically grounded; the 'whose knowledge is valued' section challenges power structures; the policy recommendations would survive political scrutiny; the overall report would be credible coming from Brookings; the analysis avoids both uncritical celebration and doom-saying about tutorials."
    weight: 0.35
    description: "EquityExpertise"
  - type: llm_judge
    criteria: "Response would influence education policy — the executive summary would inform Congressional committee discussions; the policy recommendations could become legislation; the platform accountability section would drive industry action; the public tutorial library concept is a genuine innovation; the overall report would shift how policymakers think about informal education equity."
    weight: 0.30
    description: "PolicyInfluence"
