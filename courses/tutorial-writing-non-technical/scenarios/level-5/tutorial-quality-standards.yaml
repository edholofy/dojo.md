meta:
  id: tutorial-quality-standards
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Develop industry-wide quality standards for non-technical tutorials, establishing certification criteria, assessment frameworks, and governance for tutorial platforms"
  tags: [quality-standards, industry-wide, certification, master]

state: {}

trigger: |
  You've been elected chair of the "Tutorial Quality
  Consortium" (TQC) — a new industry body formed by
  12 major tutorial platforms (Skillshare, Udemy,
  MasterClass, Coursera, Khan Academy, YouTube
  Learning, TikTok Education, LinkedIn Learning,
  Domestika, CreativeLive, Brilliant, and Codecademy)
  to establish quality standards for non-technical
  tutorials.

  The initiative was triggered by:
  - A viral news story about a fitness tutorial that
    caused 200+ injuries from unsafe exercise
    instructions
  - A financial literacy tutorial that promoted a
    predatory lending scheme
  - Growing regulatory pressure from the EU's
    proposed "Digital Education Quality Act"
  - Advertiser concerns about brand safety alongside
    low-quality educational content

  Design the complete standards framework:

  1. Tutorial Quality Standard (TQS 1.0)
     - Quality dimensions (8-10) with definitions
     - Scoring rubric (1-5 with behavioral anchors)
     - Domain-specific criteria for:
       * Physical skills (safety requirements,
         proper form, injury risk disclosure)
       * Financial topics (accuracy, bias disclosure,
         no promotional masquerading as education)
       * Health/nutrition (evidence-based requirements,
         medical disclaimer standards)
       * Creative skills (attribution, cultural
         respect, originality)
       * Soft skills (evidence-based techniques,
         honest limitations)
     - Minimum thresholds by domain
     - Assessment examples at each quality level

  2. Safety standards (mandatory)
     - Physical safety requirements (exercise, cooking,
       DIY, crafts)
     - Financial safety requirements (no hidden
       promotions, risk disclosure)
     - Health safety requirements (medical disclaimers,
       evidence standards)
     - Psychological safety (trauma warnings, mental
       health referrals)
     - Child safety (age-appropriate content,
       COPPA compliance)

  3. Creator certification program
     - Certification levels (Emerging, Verified,
       Master)
     - Assessment process
     - Domain-specific requirements
     - Continuing education requirements
     - Ethics training component
     - Decertification process (for violations)

  4. Platform compliance framework
     - Platform responsibilities vs. creator
       responsibilities
     - Minimum accessibility requirements
     - Algorithmic fairness requirements
     - Content moderation standards for educational
       content
     - Annual compliance audit process
     - Graduated enforcement (warning → restriction
       → removal)

  5. Governance and evolution
     - Consortium governance structure
     - Standard revision process
     - Public comment procedures
     - Research advisory board
     - Consumer advocacy board
     - Relationship with government regulators
     - Funding model for sustainability

  6. Implementation guide
     - Platform adoption toolkit
     - Creator onboarding to standards
     - Consumer awareness campaign ("TQC Certified")
     - Industry benchmarking program
     - Annual "State of Tutorial Quality" report

  Task: Write the complete standards framework with
  quality dimensions, safety standards, certification
  program, and governance structure.

assertions:
  - type: llm_judge
    criteria: "Response develops a complete industry standards framework — quality dimensions cover all tutorial domains; safety standards address real risks by domain; creator certification has credible levels and processes; platform compliance is enforceable; governance enables evolution without instability; the implementation guide supports adoption; the framework handles the diversity of non-technical tutorial domains."
    weight: 0.35
    description: "StandardsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards development expertise — safety requirements are proportionate to actual risk; the financial tutorial standards prevent promotional masquerading; the domain-specific criteria reflect genuine quality factors; the certification process would produce reliable quality signals; the governance model includes consumer advocacy; the overall framework would gain credibility with all 12 founding platforms."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would improve tutorial safety and quality industry-wide — the safety standards would prevent injury and exploitation; the 'TQC Certified' badge would guide consumers; platform compliance would raise the floor for quality; the annual report would create accountability; the overall initiative would pre-empt regulatory action while genuinely protecting learners."
    weight: 0.30
    description: "IndustryImpact"
