meta:
  id: global-skills-initiative
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Design a UNESCO-backed global practical skills initiative to teach essential life skills through tutorials across 100 countries, addressing inequality, cultural diversity, and sustainability"
  tags: [global-initiative, unesco, equity, master]

state: {}

trigger: |
  You've been appointed Director of the UNESCO
  "Essential Skills for All" Initiative — a 10-year
  global program to ensure every adult has access to
  quality tutorials for essential life skills.
  The program has $200M in funding from a coalition
  of governments, foundations, and technology
  companies.

  The challenge:
  - 2.7 billion adults worldwide lack basic
    financial literacy
  - 800 million adults are food insecure, many due
    to knowledge gaps about nutrition and food
    preparation with available ingredients
  - 1.4 billion adults have no digital literacy
  - Skills education is concentrated in wealthy,
    English-speaking countries
  - Existing tutorial platforms serve affluent
    populations; most of the world is excluded

  Initiative scope:
  - 100 countries across all continents
  - 50 languages (initial), expanding to 200
  - 500 million target learners over 10 years
  - 5 essential skill domains:
    1. Financial literacy (budgeting, saving, avoiding
       exploitation)
    2. Health and nutrition (cooking with local
       ingredients, hygiene, preventive health)
    3. Digital literacy (smartphones, internet,
       digital safety)
    4. Livelihood skills (local trade skills, micro-
       entrepreneurship)
    5. Civic participation (understanding rights,
       accessing services, community organizing)

  Design the complete initiative:

  1. Content architecture
     - Universal vs. localized content framework
     - Content creation model (global templates +
       local adaptation)
     - Local expert identification and training
     - Cultural advisory structure (per-region)
     - Content quality assurance across 100 countries
     - Open licensing and ownership model

  2. Technology platform
     - Offline-first architecture
     - Feature phone compatibility (SMS-based
       learning)
     - Low-bandwidth video optimization
     - Community wifi hub model
     - Local language voice interface
     - Data sovereignty and privacy by jurisdiction

  3. Delivery models (5 models for different contexts)
     - Urban community centers
     - Rural mobile learning units
     - Workplace integration
     - Faith-based community partnerships
     - Peer-to-peer (trained community educators)
     - Each model: design, staffing, costs, scale

  4. Governance and partnerships
     - Multi-stakeholder governance structure
     - Government ministry integration by country
     - NGO partnership framework
     - Private sector engagement model
     - Academic research partnerships
     - Accountability and anti-corruption measures

  5. Equity and inclusion
     - Gender equity strategy (women's access
       barriers)
     - Disability inclusion (across diverse contexts)
     - Indigenous and minority language inclusion
     - Refugee and displaced population pathways
     - Intergenerational learning model

  6. Impact measurement and learning
     - Theory of change (initiative-level)
     - Country-level outcome indicators
     - Randomized controlled trials for evidence
     - Annual impact report framework
     - Learning agenda (what we don't know and how
       to find out)
     - 10-year sustainability plan (beyond the grant)

  Task: Write the complete initiative design with
  content architecture, technology platform,
  delivery models, governance, equity strategy,
  and impact measurement.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete global skills initiative — content architecture handles universal vs. local tensions; technology works offline and on feature phones; all 5 delivery models are specified with costs; governance balances stakeholders across 100 countries; equity strategy addresses gender, disability, language, and displacement; impact measurement uses rigorous methods; the initiative is designed for 10-year sustainability."
    weight: 0.35
    description: "InitiativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global education expertise — the content creation model respects local knowledge; technology solutions match infrastructure realities (feature phones, no wifi); delivery models adapt to diverse contexts (urban, rural, displaced); governance includes anti-corruption measures; equity strategy addresses real barriers (not just stated intentions); the overall design avoids techno-solutionism and Western-centric assumptions."
    weight: 0.35
    description: "GlobalExpertise"
  - type: llm_judge
    criteria: "Response would achieve transformative global impact — the 500 million target is ambitious but planned realistically; the $200M budget is allocated across the initiative structure; the RCT evidence would demonstrate effectiveness; the sustainability plan extends beyond the grant; the initiative would meaningfully advance SDG 4 (Quality Education) and related development goals."
    weight: 0.30
    description: "TransformativeImpact"
