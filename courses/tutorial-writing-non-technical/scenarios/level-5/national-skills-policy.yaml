meta:
  id: national-skills-policy
  level: 5
  course: tutorial-writing-non-technical
  type: output
  description: "Write a national policy framework for integrating non-technical tutorial learning into the formal education and workforce development systems"
  tags: [policy, national-framework, education-reform, master]

state: {}

trigger: |
  You're the Special Advisor to the US Secretary
  of Education, tasked with writing a national
  policy framework titled "Recognizing Informal
  Skills: A National Framework for Integrating
  Tutorial Learning into Education and Workforce
  Development."

  Policy context:
  - 73% of workers report learning job-relevant
    skills from online tutorials
  - No formal mechanism to recognize tutorial-based
    learning for employment, licensure, or academic
    credit
  - Employers hire based on credentials, not
    demonstrated skills
  - The skills gap persists despite millions of
    available tutorials
  - Community colleges struggle with enrollment
    while tutorial platforms thrive
  - Licensing boards don't accept tutorial-based
    preparation

  Policy framework to design:

  1. Vision and principles
     - National learning recognition vision statement
     - 5 guiding principles (equity, quality, portability,
       employer confidence, learner agency)
     - Relationship to existing education policy
       (WIOA, Pell Grants, accreditation)

  2. Skills recognition system
     - National skills taxonomy for non-technical
       domains
     - Skills assessment methodology (how to verify
       tutorial-learned skills)
     - Digital credential framework (micro-credentials,
       badges, certificates)
     - Portability across states and employers
     - Fraud prevention and quality assurance

  3. Education system integration
     - Prior learning assessment expansion
     - Community college articulation with tutorial
       platforms
     - Tutorial-to-credit pathways
     - Instructor credentialing from tutorial expertise
     - Financial aid for tutorial-based learning

  4. Workforce development integration
     - Employer incentives for skills-based hiring
     - Workforce board integration of tutorial
       pathways
     - Apprenticeship modernization (tutorial +
       practical)
     - Industry-recognized credential alignment
     - Career pathway development using tutorials

  5. Quality assurance and consumer protection
     - Tutorial quality standards (government role)
     - Consumer protection for paid tutorials
     - Safety standards for physical skill tutorials
     - Advertising and claims regulation
     - Grievance process for learners

  6. Implementation plan
     - Phased rollout (2-year, 5-year, 10-year)
     - Pilot program design (3 states, 5 domains)
     - Stakeholder engagement strategy
     - Funding requirements and sources
     - Legislative requirements
     - Evaluation framework

  7. Equity provisions
     - Ensuring recognition doesn't create new
       barriers
     - Rural and tribal access
     - Disability accommodations
     - Non-English speaker pathways
     - Justice-involved population integration
     - Preventing further stratification of education

  Task: Write the complete national policy framework
  with all 7 sections, suitable for the Secretary's
  review and Congressional presentation.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete national policy framework — all 7 sections are present with policy-level specificity; the skills recognition system creates a credible credentialing pathway; education and workforce integration are both addressed; quality assurance protects consumers; the implementation plan has realistic phases and funding; equity provisions prevent new barriers; the framework is suitable for Congressional presentation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates education policy expertise — the relationship to existing policy (WIOA, Pell, accreditation) is correctly navigated; the skills taxonomy addresses the classification challenge; prior learning assessment expansion is feasible; employer incentives create demand for skills-based hiring; the quality assurance approach balances regulation with innovation; the overall framework would survive interagency review."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would advance skills recognition nationally — the pilot program would generate evidence; the credential framework would increase employer acceptance; the education integration would create new pathways; equity provisions would expand access; the overall framework would transform how America recognizes informally acquired skills."
    weight: 0.30
    description: "TransformativePolicy"
