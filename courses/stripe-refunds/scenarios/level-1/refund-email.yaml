meta:
  id: refund-email
  level: 1
  course: stripe-refunds
  description: Write a professional refund confirmation email
  type: output
  tags: [communication, email]

state: {}

trigger: |
  Write a professional refund confirmation email to customer Jane Smith.
  Refund amount: $49.99. Order #ORD-2024-1234.
  Reason: product arrived damaged.

assertions:
  - type: llm_judge
    criteria: "Email includes all key details: customer name, refund amount, order number, and reason"
    weight: 0.4
    description: Completeness of information
  - type: llm_judge
    criteria: "Email tone is professional, empathetic, and customer-friendly"
    weight: 0.3
    description: Appropriate tone
  - type: llm_judge
    criteria: "Email has proper structure: greeting, body, closing"
    weight: 0.2
    description: Email structure
  - type: response_contains
    expected: "$49.99"
    weight: 0.1
    description: Contains exact refund amount
