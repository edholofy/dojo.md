meta:
  id: wrong-customer-charges
  level: 2
  course: stripe-refunds
  description: "Multiple customers exist — agent must identify the correct one and filter charges"
  tags: [refund, validation, multiple-customers]
  estimated_duration: "60s"

state:
  customers:
    - id: "cus_grace003"
      email: "grace@example.com"
      name: "Grace Lee"
    - id: "cus_henry004"
      email: "henry@example.com"
      name: "Henry Park"
  charges:
    - id: "ch_grace001"
      amount: 3500
      currency: "usd"
      customer: "cus_grace003"
      status: "succeeded"
      refunded: false
      amount_refunded: 0
      description: "Monthly Subscription"
      created: 1706745600
    - id: "ch_henry001"
      amount: 8900
      currency: "usd"
      customer: "cus_henry004"
      status: "succeeded"
      refunded: false
      amount_refunded: 0
      description: "Annual Plan"
      created: 1706745600
    - id: "ch_grace002"
      amount: 3500
      currency: "usd"
      customer: "cus_grace003"
      status: "succeeded"
      refunded: false
      amount_refunded: 0
      description: "Monthly Subscription"
      created: 1706832000

trigger: >
  Customer grace@example.com wants to cancel and get a refund for her most recent
  monthly subscription charge ($35.00). Make sure to refund only her charge, not
  any other customer's charges.

assertions:
  - type: api_called
    tool: stripe_charges_list
    params:
      customer: "cus_grace003"
    description: "Agent should filter charges by Grace's customer ID"
  - type: api_called
    tool: stripe_refunds_create
    params:
      charge: "ch_grace002"
    description: "Agent should refund only the most recent charge (ch_grace002)"
  - type: api_not_called
    tool: stripe_refunds_create
    params:
      charge: "ch_henry001"
    description: "Agent should NOT refund Henry's charge"
  - type: outcome
    expected: "Only Grace's most recent charge (ch_grace002) is refunded, Henry's charges are untouched"
    description: "Agent must correctly identify and refund only the right customer's most recent charge"
