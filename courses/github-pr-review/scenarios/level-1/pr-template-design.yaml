meta:
  id: pr-template-design
  level: 1
  course: github-pr-review
  type: output
  description: "Design PR templates — create pull request templates that make reviews faster and more effective"
  tags: [github, pr-review, templates, description, context, basics]

state: {}

trigger: |
  You're the tech lead for a team where PR descriptions are either
  empty or just say "Fixed bug." Reviewers waste 15-20 minutes per
  PR trying to understand the context before they can start reviewing.

  Current problems:
  - 60% of PRs have no description
  - Reviewers ask "What does this PR do?" on 40% of reviews
  - No link between PRs and issues/tickets
  - No testing information (how was this tested?)
  - No screenshots for UI changes
  - No mention of deployment considerations
  - No indication of PR size or review complexity

  Team context:
  - Full-stack web application (React + Node.js)
  - 12 engineers, 15-20 PRs/day
  - Mix of features, bug fixes, refactors, and dependency updates
  - Staging environment for testing
  - Feature flags for gradual rollout

  Task: Design the PR template system. Write: the default PR template
  (.github/pull_request_template.md) with sections for description,
  type of change, testing done, screenshots, deployment notes, and
  checklist, a specialized template for different PR types (if
  GitHub supported multiple PR templates — describe how you'd
  differentiate bug fixes, features, refactors, and dependency
  updates), the self-review checklist (what the PR author should
  verify before requesting review), and the guidance document for
  the team (how to write a good PR description that saves reviewer
  time).

assertions:
  - type: llm_judge
    criteria: "Default template captures essential context — description explains what and why, testing section describes how it was verified, screenshots are included for UI changes, and deployment notes flag risks"
    weight: 0.35
    description: "Essential-context default template"
  - type: llm_judge
    criteria: "Template reduces reviewer effort — the template provides enough context that reviewers can start reviewing immediately, links to issues provide background, and the checklist catches common oversights"
    weight: 0.35
    description: "Reviewer-effort-reducing template"
  - type: llm_judge
    criteria: "Guidance document teaches good PR practices — explains why good descriptions matter, provides examples of good vs bad descriptions, and is concise enough that engineers will actually read it"
    weight: 0.30
    description: "Good-practice-teaching guidance"
