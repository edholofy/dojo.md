meta:
  id: b2b-multi-stakeholder-nps
  level: 2
  course: nps-survey-followup
  type: output
  description: "Handle NPS follow-up when multiple stakeholders at the same B2B account give conflicting scores"
  tags: [nps, b2b, multi-stakeholder, account-management, intermediate]

state: {}

trigger: |
  "SecureNet" (cybersecurity platform) just received NPS responses
  from multiple contacts at the same enterprise account, "FinanceFirst
  Bank" ($2,400/mo, 18-month customer, 200 users).

  Responses from FinanceFirst Bank:

  CISO (Chief Information Security Officer): Score 9
  Comment: "Excellent threat detection. Best in class."

  IT Manager: Score 4
  Comment: "Integration with our SIEM is painful. Too many manual
  workarounds."

  Security Analyst (daily user): Score 6
  Comment: "Dashboard is slow and the alert rules are hard to
  configure."

  VP of Compliance: Score 8
  Comment: "Good compliance reporting, but missing SOC 2 Type II
  templates."

  CFO: Score 3
  Comment: "We're spending $29K/year on this. Hard to justify the
  ROI to the board."

  Tasks:

  1. What is the account-level NPS for FinanceFirst Bank? How do
     you calculate it, and is it more useful than looking at
     individual scores?

  2. This account has a Promoter (CISO), Passives (VP Compliance),
     and Detractors (IT Manager, Security Analyst, CFO). How do you
     reconcile these conflicting views? Who should you prioritize?

  3. Design the follow-up strategy for this account:
     - Who do you contact first and why?
     - Do you address each stakeholder individually or have a
       single account conversation?
     - What's the risk if you only talk to the CISO (your champion)?

  4. Write the follow-up email to the CFO, who holds budget authority
     and is a Detractor.

assertions:
  - type: llm_judge
    criteria: "Account-level view is used — calculates overall account NPS and recognizes that despite a Promoter champion, the account is at risk due to Detractors in key roles"
    weight: 0.25
    description: "Account-level risk assessment"
  - type: llm_judge
    criteria: "CFO is prioritized appropriately — recognizes that the budget holder being a Detractor is the highest risk to renewal, even though the CISO is a champion"
    weight: 0.25
    description: "Budget holder prioritization"
  - type: llm_judge
    criteria: "Strategy addresses both individual and account concerns — plans for stakeholder-specific follow-ups plus an account-level strategy meeting, not just individual emails"
    weight: 0.25
    description: "Multi-level follow-up strategy"
  - type: llm_judge
    criteria: "CFO email focuses on ROI — addresses the $29K/year concern with value demonstration and business impact data, not feature-level responses"
    weight: 0.25
    description: "ROI-focused CFO email"
