meta:
  id: relationship-vs-transactional-nps
  level: 2
  course: nps-survey-followup
  type: output
  description: "Understand when to use relationship vs. transactional NPS and how follow-up strategies differ for each"
  tags: [nps, relationship, transactional, strategy, intermediate]

state: {}

trigger: |
  "TravelBooker" (travel management platform) currently only runs
  quarterly relationship NPS surveys. Their Head of CX wants to
  also implement transactional NPS at key touchpoints.

  Current state:
  - Quarterly relationship NPS: +38
  - No transactional NPS in place
  - Key touchpoints where issues occur:
    a) After booking a trip
    b) After modifying a reservation
    c) After a support interaction
    d) After expense report submission

  Recent customer complaints suggest the quarterly NPS is masking
  touchpoint-specific problems. For example:
  - Post-booking satisfaction seems high
  - Post-support satisfaction seems low
  - But the quarterly survey blends everything together

  Tasks:

  1. Explain the difference between relationship NPS and transactional
     NPS. When is each appropriate?

  2. Design a transactional NPS program for TravelBooker:
     - Which touchpoints should get transactional NPS surveys?
     - What's the ideal timing for each (immediately after? 24 hours?)
     - How do you prevent survey fatigue (one customer might book
       5 trips/month)?

  3. A customer scores a 3 on a post-support transactional NPS.
     Their quarterly relationship NPS was a 9. How do you follow up
     differently than if both scores were low?

  4. How do you report transactional NPS alongside relationship NPS
     to leadership without confusion?

assertions:
  - type: llm_judge
    criteria: "Clear distinction between types — relationship NPS measures overall loyalty, transactional measures specific interaction quality, and they serve different purposes"
    weight: 0.25
    description: "Clear type distinction"
  - type: llm_judge
    criteria: "Survey fatigue is addressed — includes frequency caps (max 1 per 90 days), sampling strategies, or touchpoint prioritization to prevent over-surveying"
    weight: 0.25
    description: "Survey fatigue prevention"
  - type: llm_judge
    criteria: "Mixed-score follow-up is nuanced — recognizes that a low transactional score from a relationship Promoter means the interaction was bad but the relationship is strong, requiring a different approach"
    weight: 0.25
    description: "Mixed-score nuance"
  - type: llm_judge
    criteria: "Reporting approach separates the two — suggests dashboard or reporting that shows relationship trend alongside touchpoint-specific scores without conflating them"
    weight: 0.25
    description: "Separated reporting"
