meta:
  id: nps-metrics-reporting
  level: 2
  course: nps-survey-followup
  type: output
  description: "Create NPS reports and dashboards that communicate insights effectively to different stakeholders"
  tags: [nps, metrics, reporting, dashboard, intermediate]

state: {}

trigger: |
  "LogisticsPro" (logistics management SaaS) has been running NPS
  surveys for a year. They have rich data but no clear reporting
  structure. Different stakeholders want different things:

  Data available:
  - 4 quarters of NPS data (Q1-Q4 2025)
  - Q1: NPS +22, Q2: +28, Q3: +25, Q4: +31
  - Segment breakdowns by plan type, industry, tenure
  - 2,400 total responses across 4 quarters
  - 800 open-ended comments
  - Detractor recovery data (45% recovered, avg 12 days)

  Stakeholder needs:
  - CEO: "Give me the one number and trend. Are we getting better?"
  - VP Product: "What are customers saying about our product? What
    should we build next?"
  - VP Customer Success: "How is my team performing on follow-ups?
    Where are we losing customers?"
  - Board of Directors: "How does our NPS compare to competitors?
    What's the business impact?"

  Tasks:

  1. Design 4 different NPS report formats — one for each stakeholder.
     What metrics, visualizations, and insights does each need?

  2. Create the CEO's quarterly NPS summary (keep it to one page):
     - Key metrics with trends
     - Top insight
     - Biggest risk
     - Recommended action

  3. What NPS metrics should be tracked monthly vs. quarterly vs.
     annually? Create the measurement cadence.

  4. How do you present a quarter where NPS dropped (Q2→Q3: +28→+25)
     honestly without causing panic?

assertions:
  - type: llm_judge
    criteria: "Reports are tailored to audiences — CEO gets a one-page summary, Product gets qualitative themes, CS gets operational metrics, Board gets competitive context and business impact"
    weight: 0.25
    description: "Audience-tailored reports"
  - type: llm_judge
    criteria: "CEO summary is genuinely concise — fits on one page with trend visualization, a clear top insight, and one recommended action, not a data dump"
    weight: 0.25
    description: "Concise CEO summary"
  - type: llm_judge
    criteria: "NPS drop is presented with context — explains the Q3 dip honestly with possible causes and whether it's within normal variance, not hidden or over-explained"
    weight: 0.25
    description: "Honest drop presentation"
  - type: llm_judge
    criteria: "Measurement cadence is logical — operational metrics (follow-up rate, response time) tracked monthly, NPS trends quarterly, strategic benchmarks annually"
    weight: 0.25
    description: "Logical measurement cadence"
