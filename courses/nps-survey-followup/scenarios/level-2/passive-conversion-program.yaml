meta:
  id: passive-conversion-program
  level: 2
  course: nps-survey-followup
  type: output
  description: "Design a systematic program to convert Passives into Promoters by addressing the gap between 'fine' and 'great'"
  tags: [nps, passive, conversion, engagement, intermediate]

state: {}

trigger: |
  "CloudDocs" (document management SaaS) has a Passive problem.
  Their NPS breakdown:
  - Promoters: 30%
  - Passives: 45% ← This is unusually high
  - Detractors: 25%
  - NPS Score: +5

  If they could convert just 15% of Passives to Promoters (moving
  from 30% to ~37% Promoters), their NPS would jump from +5 to +17.

  Passive feedback themes (from 180 Passive responses):
  - "It works but nothing special" (35%)
  - "Missing features that competitors have" (25%)
  - "Good product, too expensive" (20%)
  - "Hard to learn, but okay once you figure it out" (15%)
  - "Fine for basic needs" (5%)

  Tasks:

  1. For each feedback theme, design a specific conversion strategy:
     - What action would move these Passives to Promoter status?
     - What communication should they receive?
     - What's the realistic conversion timeline?

  2. Write a follow-up email for the "works but nothing special"
     segment (the largest group) that:
     - Doesn't make them feel bad for being lukewarm
     - Introduces a feature or capability they might not know about
     - Invites them to a personalized demo or success session

  3. How would you measure whether your Passive conversion program
     is working? What leading indicators would you track before the
     next NPS survey?

assertions:
  - type: llm_judge
    criteria: "Theme-specific strategies are distinct — pricing concerns get value demonstration, missing features get roadmap or workaround, learning curve gets training, not the same approach for all"
    weight: 0.25
    description: "Theme-specific strategies"
  - type: llm_judge
    criteria: "Follow-up email is non-judgmental — doesn't say or imply 'you gave us a 7, how can we get higher?' but instead focuses on adding value to their experience"
    weight: 0.25
    description: "Non-judgmental outreach"
  - type: llm_judge
    criteria: "Feature discovery is specific — introduces a concrete capability relevant to document management, not a generic 'check out our features' pitch"
    weight: 0.25
    description: "Specific feature discovery"
  - type: llm_judge
    criteria: "Leading indicators are defined — tracks engagement metrics (feature adoption, login frequency, support interactions) as predictors of conversion before next NPS survey"
    weight: 0.25
    description: "Leading indicator tracking"
