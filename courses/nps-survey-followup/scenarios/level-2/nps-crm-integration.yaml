meta:
  id: nps-crm-integration
  level: 2
  course: nps-survey-followup
  type: output
  description: "Design NPS integration with CRM and support tools to automate follow-up workflows and track closed-loop progress"
  tags: [nps, crm, integration, automation, intermediate]

state: {}

trigger: |
  "OrderFlow" (order management SaaS) currently manages NPS follow-ups
  manually using a spreadsheet. The team of 4 CSMs handles ~300 NPS
  responses per quarter, and they're falling behind on follow-ups.

  Current problems:
  - Only 40% of responses get a follow-up (target: 100%)
  - Average time to follow-up: 8 days (target: 48 hours)
  - No tracking of whether issues were resolved
  - Detractor recovery rate: unknown
  - NPS data isn't visible when handling support tickets

  Tools available:
  - CRM: HubSpot
  - Support: Zendesk
  - NPS survey tool: Delighted
  - Email: Gmail + HubSpot sequences

  Tasks:

  1. Design the integration architecture:
     - How should NPS data flow between Delighted, HubSpot, and Zendesk?
     - What data should sync (score, comment, segment, follow-up status)?
     - Should it be real-time or batched?

  2. Design 3 automated workflows:
     - Workflow A: Detractor alert and task creation
     - Workflow B: Promoter referral sequence
     - Workflow C: Passive engagement nurture

  3. What should each CSM's NPS dashboard show? Design the view that
     helps them manage their follow-up queue efficiently.

  4. How do you measure whether this integration improved follow-up
     performance? Define the KPIs.

assertions:
  - type: llm_judge
    criteria: "Integration is practical — uses the specific tools mentioned (Delighted, HubSpot, Zendesk) with realistic connection methods (Zapier, native integrations, or APIs)"
    weight: 0.25
    description: "Practical integration design"
  - type: llm_judge
    criteria: "Detractor workflow creates urgency — auto-creates tasks with deadlines, alerts the right CSM, and escalates if not addressed within the target timeframe"
    weight: 0.25
    description: "Urgent Detractor workflow"
  - type: llm_judge
    criteria: "CSM dashboard is actionable — shows prioritized queue, time since response, customer value, follow-up status, and overdue items, not just a list of scores"
    weight: 0.25
    description: "Actionable CSM dashboard"
  - type: llm_judge
    criteria: "KPIs address the current problems — measures follow-up rate (from 40% to target), response time (from 8 days to 48h), and Detractor recovery rate (from unknown to tracked)"
    weight: 0.25
    description: "Problem-targeted KPIs"
