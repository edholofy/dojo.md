meta:
  id: promoter-activation
  level: 2
  course: nps-survey-followup
  type: output
  description: "Convert Promoter enthusiasm into tangible business outcomes — referrals, reviews, case studies, and advocacy programs"
  tags: [nps, promoter, activation, referral, advocacy, intermediate]

state: {}

trigger: |
  "AnalyticsPro" (business intelligence SaaS) has 200 Promoters from
  last quarter's NPS survey. Currently, the team thanks Promoters
  but doesn't systematically activate them. Your VP wants to change
  that.

  Promoter data from last quarter:
  - 200 total Promoters (scores 9-10)
  - 120 left written comments (common themes: "easy to use,"
    "great visualizations," "saves us hours")
  - 80 gave score-only responses
  - Current referral rate from Promoters: 3% (6 referrals)
  - Current review rate: 1% (2 G2 reviews)

  Industry benchmarks:
  - Best-in-class Promoter referral rate: 15-20%
  - Best-in-class review rate: 8-12%

  Tasks:

  1. Design a Promoter activation program with 4 tiers:
     Tier 1: All Promoters (automated)
     Tier 2: Promoters with comments (semi-automated)
     Tier 3: High-value Promoters (personal outreach)
     Tier 4: Super Promoters (advocacy program)

  2. For each tier, specify:
     - Activation actions (referral, review, case study, etc.)
     - Communication approach
     - Expected conversion rate
     - Timeline

  3. Write the referral request email for Tier 2 Promoters
     (those who left positive comments).

  4. What metrics should you track to measure the program's success?

assertions:
  - type: llm_judge
    criteria: "Tiered approach matches effort to value — automated for all Promoters, personal outreach reserved for high-value accounts, with clear criteria for each tier"
    weight: 0.25
    description: "Effort-to-value tiering"
  - type: llm_judge
    criteria: "Referral email references the customer's own words — uses their positive comment to naturally transition into the referral ask"
    weight: 0.25
    description: "Comment-leveraged referral ask"
  - type: llm_judge
    criteria: "Expected conversion rates are realistic — targets are between current (3%) and best-in-class (15-20%), not immediately jumping to the top"
    weight: 0.25
    description: "Realistic conversion targets"
  - type: llm_judge
    criteria: "Success metrics go beyond count — includes referral rate, conversion from referral to customer, review volume, case study pipeline, and revenue attributed to Promoter activation"
    weight: 0.25
    description: "Comprehensive success metrics"
