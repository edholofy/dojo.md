meta:
  id: detractor-recovery-strategies
  level: 2
  course: nps-survey-followup
  type: output
  description: "Design multi-step recovery strategies for Detractors based on their specific complaint types and customer value"
  tags: [nps, detractor, recovery, strategy, intermediate]

state: {}

trigger: |
  You're a Customer Success Manager at "ProjectHub" (project
  management SaaS, $49-$299/mo). You've received 5 Detractor
  responses from last week's NPS survey. Each requires a different
  recovery approach.

  Detractor 1: Score 2
  Comment: "Your API has been down 3 times this month. We build our
  entire workflow on your API. This is costing us real money."
  Customer: TechBuild Corp, Enterprise plan ($299/mo), 50 users, 2 years

  Detractor 2: Score 4
  Comment: "Too expensive for what you offer. Competitor X does the
  same thing for half the price."
  Customer: DesignLab, Professional plan ($99/mo), 8 users, 6 months

  Detractor 3: Score 1
  Comment: "Your support team is useless. I've waited 5 days for a
  response to a critical billing issue."
  Customer: MarketFlow, Business plan ($199/mo), 20 users, 14 months

  Detractor 4: Score 5
  Comment: "Used to love it but the recent UI redesign made everything
  harder to find. My team is frustrated."
  Customer: BuildRight, Professional plan ($99/mo), 15 users, 18 months

  Detractor 5: Score 3
  Comment: "We've asked for Gantt charts for 2 years. Still nothing.
  Starting to look elsewhere."
  Customer: PlanCo, Business plan ($199/mo), 25 users, 24 months

  For each Detractor:
  1. Categorize the complaint type (reliability, pricing, support,
     UX, feature gap)
  2. Design a 3-step recovery plan with specific actions and timeline
  3. Write the initial follow-up message
  4. Define what "success" looks like for this recovery

assertions:
  - type: llm_judge
    criteria: "Recovery plans are complaint-specific — API reliability gets technical escalation, pricing gets value demonstration, support failure gets immediate resolution and process fix, not one-size-fits-all"
    weight: 0.25
    description: "Complaint-specific recovery"
  - type: llm_judge
    criteria: "Customer value influences urgency — the Enterprise 50-user account (#1) and long-tenured accounts (#5, 24 months) get more aggressive recovery timelines"
    weight: 0.25
    description: "Value-based urgency"
  - type: llm_judge
    criteria: "Feature request Detractor (#5) is handled honestly — acknowledges the gap without making false promises about roadmap, while showing the customer they're heard"
    weight: 0.25
    description: "Honest feature gap handling"
  - type: llm_judge
    criteria: "Success metrics are defined for each recovery — specifies what a successful outcome looks like (score improvement, continued renewal, specific issue resolution)"
    weight: 0.25
    description: "Defined success metrics"
