meta:
  id: nps-segmentation-analysis
  level: 2
  course: nps-survey-followup
  type: output
  description: "Analyze NPS data by customer segments to uncover hidden patterns and prioritize follow-up efforts"
  tags: [nps, segmentation, analysis, data, intermediate]

state: {}

trigger: |
  "SupportDesk" (help desk software) just completed their quarterly
  NPS survey. The overall NPS is +32, which looks healthy. But your
  VP suspects the aggregate number is hiding important patterns.

  Here's the segmented data:

  By plan type:
  - Enterprise ($500+/mo): NPS +52, 40 responses
  - Business ($200-499/mo): NPS +28, 120 responses
  - Professional ($50-199/mo): NPS +35, 200 responses
  - Starter ($0-49/mo): NPS +18, 150 responses

  By tenure:
  - <3 months: NPS +10, 80 responses
  - 3-12 months: NPS +25, 150 responses
  - 1-2 years: NPS +45, 180 responses
  - 2+ years: NPS +50, 100 responses

  By industry:
  - Technology: NPS +42, 180 responses
  - Healthcare: NPS +15, 90 responses
  - Finance: NPS +38, 120 responses
  - Retail: NPS +22, 80 responses
  - Education: NPS +48, 40 responses

  Tasks:

  1. Identify the 3 most concerning patterns in this data. What
     segments need immediate attention and why?

  2. The Healthcare segment (NPS +15) is significantly below average.
     Design a follow-up investigation plan:
     - What additional data would you need?
     - What questions would you ask Healthcare Detractors?
     - What's your hypothesis for why Healthcare scores low?

  3. New customers (<3 months, NPS +10) are also concerning. How
     does this relate to onboarding, and what follow-up should
     these customers receive?

  4. Create a one-page "NPS Insights" brief for the VP with findings,
     risks, and recommended actions.

assertions:
  - type: llm_judge
    criteria: "Identifies the right concerning patterns — new customers (NPS +10), Healthcare vertical (+15), and Starter plan (+18) are flagged as the key areas needing attention"
    weight: 0.25
    description: "Correct pattern identification"
  - type: llm_judge
    criteria: "Healthcare investigation is hypothesis-driven — offers possible explanations (compliance needs, integration issues, industry-specific workflows) and designs questions to validate"
    weight: 0.25
    description: "Hypothesis-driven investigation"
  - type: llm_judge
    criteria: "New customer issue is connected to onboarding — recognizes that low NPS in the first 3 months signals an onboarding problem, not just a product problem"
    weight: 0.25
    description: "Onboarding connection"
  - type: llm_judge
    criteria: "VP brief is executive-appropriate — concise, leads with risks and revenue implications, includes specific actions with owners and timelines"
    weight: 0.25
    description: "Executive-appropriate brief"
