meta:
  id: nps-response-rate-optimization
  level: 2
  course: nps-survey-followup
  type: output
  description: "Diagnose and improve low NPS survey response rates to ensure follow-up data is representative and actionable"
  tags: [nps, response-rate, optimization, survey, intermediate]

state: {}

trigger: |
  "EventPlatform" (event management SaaS, 3,000 active accounts)
  has a declining NPS response rate problem:

  Historical response rates:
  - Q1 2025: 35% (good)
  - Q2 2025: 28%
  - Q3 2025: 22%
  - Q4 2025: 16% (current, concerning)

  Current survey approach:
  - Quarterly email survey sent to all active accounts
  - Sent on Fridays at 4 PM
  - Subject line: "Quick survey about EventPlatform"
  - 1 question (NPS) + 1 open-ended follow-up
  - No incentive
  - No reminder for non-respondents
  - Same email template used since Q1 2025

  The declining rate means only 480 of 3,000 accounts responded
  last quarter, and your VP is questioning whether the data is
  representative enough to act on.

  Tasks:

  1. Diagnose the declining response rate. What are the most likely
     causes based on the information provided?

  2. Design a response rate improvement plan targeting 35%+ for
     next quarter. Include:
     - Timing changes
     - Subject line improvements
     - Incentive strategy (if appropriate)
     - Reminder sequence
     - Channel diversification

  3. At what response rate does NPS data become unreliable? Is the
     current 16% rate still actionable? What biases might exist
     in a 16% response rate?

  4. Write the improved survey invitation email (subject line + body)
     that you'd send next quarter.

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies key issues — Friday 4 PM timing, generic subject line, no reminders, survey fatigue from quarterly cadence, and stale template are all flagged"
    weight: 0.25
    description: "Accurate diagnosis"
  - type: llm_judge
    criteria: "Improvement plan includes timing fix — moves to Tuesday/Wednesday mid-morning and adds a reminder sequence for non-respondents"
    weight: 0.25
    description: "Timing and reminder fixes"
  - type: llm_judge
    criteria: "Response bias is addressed — explains that low response rates tend to over-represent extreme opinions (very happy or very unhappy), making the sample unrepresentative"
    weight: 0.25
    description: "Response bias awareness"
  - type: llm_judge
    criteria: "Improved email is compelling — has a better subject line, personalized sender, clear value proposition for responding, and respects the recipient's time"
    weight: 0.25
    description: "Compelling survey invitation"
