meta:
  id: nps-future-trends
  level: 5
  course: nps-survey-followup
  type: output
  description: "Anticipate the future of NPS and customer loyalty measurement — emerging technologies, evolving expectations, and the transformation of feedback programs"
  tags: [nps, future, trends, strategy, mastery]

state: {}

trigger: |
  The NPS landscape is being reshaped by AI, privacy regulations,
  changing customer expectations, and new measurement approaches.
  As a senior CX leader, you need to prepare for what's next.

  Part 1: Technology trends

  1. AI in NPS programs:
     - AI-generated personalized follow-ups at scale
     - Predictive NPS (behavioral data replaces survey data)
     - Real-time sentiment analysis replacing periodic surveys
     - AI-powered root cause detection
     For each: current state, 3-year outlook, implications for teams

  2. Privacy-first NPS:
     - Cookie deprecation impacts on customer tracking
     - Apple Mail Privacy Protection (open tracking dead)
     - GDPR enforcement tightening globally
     - Zero-party data strategies
     How does NPS adapt when you can't track behavior as easily
     and customers demand more control over their data?

  3. Beyond NPS:
     - Customer Effort Score (CES) gaining traction
     - Product-led growth metrics (PQLs) as satisfaction proxies
     - Emotion AI and sentiment detection
     - Continuous feedback replacing periodic surveys
     Is NPS still relevant in 2028? How does it evolve?

  Part 2: Customer expectation trends

  1. Hyper-personalization expectations:
     - Customers expect tailored follow-up, not templates
     - "We heard you" isn't enough — customers want proof
     - Speed of resolution expectations increasing

  2. Transparency expectations:
     - Customers want to see what happened with their feedback
     - Public roadmaps and feedback portals
     - "You asked, we built" communication

  3. Channel expectations:
     - Email response rates declining
     - In-app, chat, video follow-up rising
     - Multi-channel follow-up journeys

  Part 3: Write the "NPS Program 2028" strategy:
  1. Technology evolution plan
  2. Team and skills evolution
  3. Measurement framework evolution
  4. Follow-up approach evolution
  5. Investment roadmap

  Include executive summary, key recommendations, and timeline.

assertions:
  - type: llm_judge
    criteria: "AI outlook is balanced — acknowledges transformative potential of predictive NPS and automated follow-up while identifying real limitations and risks"
    weight: 0.25
    description: "Balanced AI outlook"
  - type: llm_judge
    criteria: "Privacy adaptation is practical — provides concrete alternatives to tracking-dependent approaches (zero-party data, explicit preference collection, behavioral signals with consent)"
    weight: 0.25
    description: "Practical privacy adaptation"
  - type: llm_judge
    criteria: "NPS relevance is nuanced — doesn't declare NPS dead or eternal, instead positions it within an evolving measurement ecosystem with clear role definition"
    weight: 0.25
    description: "Nuanced NPS relevance"
  - type: llm_judge
    criteria: "2028 strategy is investment-ready — includes specific technology investments, team skill evolution, timeline, and budget that an executive could approve"
    weight: 0.25
    description: "Investment-ready strategy"
