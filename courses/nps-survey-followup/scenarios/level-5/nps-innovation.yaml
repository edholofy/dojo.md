meta:
  id: nps-innovation
  level: 5
  course: nps-survey-followup
  type: output
  description: "Reimagine the NPS follow-up experience using emerging technologies and innovative approaches that go beyond traditional survey-response patterns"
  tags: [nps, innovation, future, technology, mastery]

state: {}

trigger: |
  "FutureSaaS" ($250M ARR) has asked you to redesign their NPS
  program from scratch, unconstrained by current approaches. The
  CCO says: "NPS was invented in 2003. It's 2026. What should a
  modern customer loyalty measurement and follow-up system look like?"

  Current limitations they want to overcome:
  - Survey fatigue (response rates declining industry-wide)
  - Lagging indicator (by the time you get NPS data, it's old)
  - Self-report bias (what people say vs. what they do)
  - One-dimensional (a single number doesn't capture complexity)
  - Follow-up feels transactional (automated emails feel hollow)

  Resources available:
  - AI/ML team with 5 data scientists
  - Modern tech stack (Snowflake, Segment, Braze, Intercom)
  - Product analytics (Amplitude, FullStory)
  - Customer data platform with rich behavioral data
  - Budget: $2M for program redesign

  Tasks:

  1. Design "NPS 2.0" — what does the next generation of customer
     loyalty measurement look like?
     - How do you measure loyalty without survey fatigue?
     - How do you make it a leading indicator, not lagging?
     - How do you reduce self-report bias?
     - How do you capture the complexity a single number misses?

  2. Design "Follow-Up 2.0" — what does modern, personalized
     follow-up look like?
     - Beyond email: What channels and formats?
     - AI-powered personalization: How far can you go?
     - Proactive vs. reactive: How do you follow up BEFORE the score?
     - Community-driven: How do peer connections replace corporate
       follow-up?

  3. Design the "Predictive NPS" system:
     - Using behavioral signals, predict each account's NPS before
       surveying
     - Use predictions to trigger proactive interventions
     - Only survey to validate predictions, not as primary data source
     - How does this change the follow-up model?

  4. Create the pitch for the CCO: "Here's the NPS program of the
     future and why it's worth the $2M investment."

assertions:
  - type: llm_judge
    criteria: "NPS 2.0 addresses all limitations — proposes solutions for survey fatigue, lagging data, self-report bias, and one-dimensionality, not just incremental improvements"
    weight: 0.25
    description: "All limitations addressed"
  - type: llm_judge
    criteria: "Behavioral signals replace some surveying — uses product usage, support interactions, and engagement patterns as leading indicators, reducing reliance on explicit surveys"
    weight: 0.25
    description: "Behavioral signal integration"
  - type: llm_judge
    criteria: "Follow-up innovations are concrete — proposes specific new approaches (conversational AI, in-app dialogue, video messages, community platforms) with use cases, not vague ideas"
    weight: 0.25
    description: "Concrete follow-up innovations"
  - type: llm_judge
    criteria: "Predictive NPS model is technically grounded — describes specific inputs, model types, accuracy requirements, and validation methods that a data science team could implement"
    weight: 0.25
    description: "Technically grounded prediction"
