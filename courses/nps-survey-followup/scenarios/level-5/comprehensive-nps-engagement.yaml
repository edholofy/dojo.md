meta:
  id: comprehensive-nps-engagement
  level: 5
  course: nps-survey-followup
  type: output
  description: "Demonstrate complete mastery — advise a CEO on transforming their NPS program from failing to world-class in a comprehensive engagement"
  tags: [nps, comprehensive, ceo-advisory, transformation, mastery]

state: {}

trigger: |
  You've been asked to advise the CEO of "Velocity" — a Series D
  SaaS company ($200M ARR, 30,000 accounts) on transforming their
  NPS program. The current program is in crisis.

  CEO brief:
  "Our NPS has dropped from +42 to +18 in 12 months. Churn is up
  from 8% to 14%. Our board is asking tough questions. I need to
  understand what happened and how to fix it. I'm giving you full
  access and authority."

  Context:
  - 4 products, 6 customer segments, 12 markets
  - NPS program: basic, quarterly survey, 20% response rate
  - Follow-up: inconsistent, no SLA, no automation
  - No dedicated NPS/CX team (CS handles it part-time)
  - Survey tool: basic Typeform, no integrations
  - No text analytics, no root cause analysis
  - No Detractor recovery process
  - Promoter activation: zero
  - Major platform outage 8 months ago (never addressed in NPS)
  - Price increase 6 months ago (15% across all plans)
  - 3 key engineering hires left 9 months ago (product quality declined)
  - 2 major competitors launched aggressive marketing campaigns

  Deliverable 1: Root cause diagnosis

  1. Why did NPS drop from +42 to +18?
     - Separate internal causes from external causes
     - Determine how much of the drop is addressable
     - What's the financial impact of the current state?
     Present findings with evidence-based reasoning.

  2. Competitive landscape assessment:
     - How much of the NPS decline is competitive?
     - What are competitors doing that Velocity isn't?
     - Quick wins vs. long-term competitive responses?

  Deliverable 2: Transformation plan

  Design the 12-month transformation:

  Month 1-2: Emergency stabilization
  - Fix the most critical issues
  - Quick wins that show immediate NPS improvement
  - Hire first dedicated NPS owner
  - Expected impact: +18 → +22

  Month 3-5: Foundation rebuild
  - Technology upgrade (Typeform → enterprise NPS platform)
  - Closed-loop program implementation
  - Automation and integration with CRM
  - Expected impact: +22 → +28

  Month 6-9: Scale and optimize
  - Full behavioral analysis and prediction
  - Multi-product, multi-market NPS coordination
  - AI-powered insights and follow-up assistance
  - Expected impact: +28 → +34

  Month 10-12: Excellence
  - Predictive NPS and proactive intervention
  - Advanced VoC integration
  - Industry-leading follow-up experience
  - Expected impact: +34 → +38

  Deliverable 3: Investment case

  Total investment ask: ___
  - Team (headcount, roles, compensation)
  - Technology (platforms, integrations, AI)
  - Services (consulting, training, localization)

  Expected return:
  - Churn reduction (from 14% to target)
  - Revenue protection (prevented churn ARR)
  - Revenue generation (referrals, expansion)
  - 3-year ROI and payback period

  Deliverable 4: CEO presentation

  Write the 10-slide executive presentation:
  1. Executive summary (1 slide)
  2. The NPS crisis — what happened (2 slides)
  3. Root cause analysis (2 slides)
  4. Transformation plan (3 slides)
  5. Investment and return (1 slide)
  6. Timeline and next steps (1 slide)

  Describe each slide's content and key message.

assertions:
  - type: llm_judge
    criteria: "Root cause separates internal from external — identifies platform outage, price increase, and engineering talent loss as internal, while competitive pressure is external, with evidence-based attribution"
    weight: 0.25
    description: "Internal-external cause separation"
  - type: llm_judge
    criteria: "Transformation milestones are realistic — each phase's expected NPS improvement is grounded in what's achievable given the actions planned, not arbitrary round numbers"
    weight: 0.25
    description: "Realistic transformation milestones"
  - type: llm_judge
    criteria: "Investment case is financially rigorous — includes specific dollar amounts for team, technology, and services, with ROI calculated against prevented churn and generated revenue"
    weight: 0.25
    description: "Financially rigorous investment case"
  - type: llm_judge
    criteria: "CEO presentation tells a compelling story — moves from crisis to diagnosis to solution to investment ask in a narrative that a Series D CEO and board can act on"
    weight: 0.25
    description: "Compelling CEO narrative"
