meta:
  id: nps-global-operations
  level: 5
  course: nps-survey-followup
  type: output
  description: "Design and manage NPS operations across 15+ countries with different cultures, regulations, and customer expectations"
  tags: [nps, global, operations, multi-market, mastery]

state: {}

trigger: |
  "WorldSaaS" ($600M ARR, 50,000 accounts across 18 countries) is
  unifying their NPS program globally. Each region currently runs
  its own program independently.

  Regional overview:

  North America (US, Canada): $250M ARR, 18,000 accounts
  - NPS +42, mature program, Qualtrics
  - Follow-up rate: 88%, dedicated team of 12

  Europe (UK, Germany, France, Netherlands, Nordics): $180M ARR, 15,000 accounts
  - NPS +28, moderate program, Medallia
  - Follow-up rate: 60%, team of 8
  - GDPR compliance in place

  Asia-Pacific (Japan, Australia, Singapore, India): $100M ARR, 10,000 accounts
  - NPS +8 (Japan drags average down), basic program, SurveyMonkey
  - Follow-up rate: 30%, team of 3
  - No standardized process

  Latin America (Brazil, Mexico, Colombia): $50M ARR, 5,000 accounts
  - NPS +55 (cultural scoring bias), no formal program
  - Follow-up rate: 15%, no dedicated team
  - Portuguese and Spanish language requirements

  Middle East & Africa (UAE, South Africa, Nigeria): $20M ARR, 2,000 accounts
  - No NPS program exists
  - Recently launched markets

  Challenges:
  - 3 different NPS platforms
  - 8 languages for survey and follow-up
  - Vastly different cultural scoring patterns
  - Different data privacy regulations per region
  - Time zones make real-time follow-up difficult
  - Regional teams resist centralized control

  Tasks:

  1. Design the global NPS operating model:
     - Central vs. regional ownership split
     - Technology consolidation strategy
     - Standardized vs. localized elements
     - Language and cultural adaptation approach

  2. Solve the cross-cultural comparison problem:
     - How do you report NPS globally without misleading leadership?
     - How do you set fair targets for Japan (+8) vs. Brazil (+55)?
     - What normalized metric allows cross-regional comparison?

  3. Build the global rollout plan:
     - Phase 1: Which regions first? Why?
     - Phase 2: How do you bring lagging regions up to standard?
     - Phase 3: How do you optimize the global program?
     Timeline and investment for each phase.

  4. Design the "Global NPS Dashboard" that the CEO sees monthly.

assertions:
  - type: llm_judge
    criteria: "Operating model balances central and local — standardizes methodology and technology while allowing regional teams to adapt language, tone, and cultural approach"
    weight: 0.25
    description: "Balanced central-local model"
  - type: llm_judge
    criteria: "Cross-cultural comparison uses normalization — proposes trend-based comparison, percentile ranking within region, or index scoring rather than comparing absolute NPS numbers"
    weight: 0.25
    description: "Normalized comparison method"
  - type: llm_judge
    criteria: "Rollout prioritizes high-impact regions — starts with regions that have the most accounts or revenue potential, not the easiest regions to implement"
    weight: 0.25
    description: "Impact-prioritized rollout"
  - type: llm_judge
    criteria: "Global dashboard avoids misleading aggregation — shows regional NPS with cultural context, trends within regions, and a normalized global metric, not a single blended number"
    weight: 0.25
    description: "Non-misleading global dashboard"
