meta:
  id: nps-portfolio-management
  level: 5
  course: nps-survey-followup
  type: output
  description: "Manage NPS programs across a multi-product portfolio, optimizing shared resources, cross-product insights, and portfolio-level performance"
  tags: [nps, portfolio, multi-product, management, mastery]

state: {}

trigger: |
  "SuiteGroup" — a company with 6 SaaS products — needs a unified
  NPS strategy across their portfolio. Each product has a different
  NPS maturity level and different challenges.

  Product A: "DataViz" (analytics, $99/mo, 4K accounts)
  - NPS +48, mature program, high follow-up rate
  - Challenge: Maintaining excellence, preventing complacency

  Product B: "FormFlow" (forms, $29/mo, 15K accounts)
  - NPS +15, basic program, low follow-up rate
  - Challenge: High volume, low ARPU, hard to justify investment

  Product C: "ChatBot" (AI chatbot, $149/mo, 3K accounts)
  - NPS +32, growing program, inconsistent execution
  - Challenge: Rapidly changing product, NPS feedback is quickly outdated

  Product D: "SecureVault" (security, $199/mo, 2K accounts)
  - NPS -5, struggling program, high Detractor rate
  - Challenge: Product reliability issues, angry customer base

  Product E: "TeamSpace" (collaboration, $19/user/mo, 8K accounts)
  - NPS +28, moderate program, good engagement
  - Challenge: Multi-user accounts make NPS ownership complex

  Product F: "APIGateway" (developer tools, $299/mo, 1K accounts)
  - NPS +22, no formal program, engineering runs it
  - Challenge: Developer audience dislikes surveys

  Cross-portfolio data:
  - 35% of customers use 2+ products
  - Cross-product customers have NPS +38 (higher than any single product)
  - Single-product customers at risk of churn: 22%
  - Cross-product customers at risk of churn: 8%

  Tasks:

  1. Portfolio NPS assessment:
     - Rank products by improvement opportunity
     - Calculate the revenue impact of bringing each to benchmark
     - Where should the next investment dollar go?

  2. Design the shared NPS services model:
     - What centralizes across all 6 products?
     - What stays product-specific?
     - How does the central team serve products at different maturity?

  3. Cross-product NPS strategy:
     - How do you use NPS insights to drive cross-sell?
     - When is it appropriate to introduce Product B to a Product A
       Promoter?
     - Design the cross-product introduction flow for NPS Promoters.

  4. Investment allocation: $800K additional budget for portfolio NPS.
     Allocate across 6 products with ROI justification.

assertions:
  - type: llm_judge
    criteria: "SecureVault (NPS -5) gets significant attention — the only product with negative NPS represents both the biggest risk and biggest improvement opportunity"
    weight: 0.25
    description: "Negative NPS product priority"
  - type: llm_judge
    criteria: "Shared services are correctly split — analytics, technology, methodology centralize well, while content, segment strategy, and product-specific follow-up stay local"
    weight: 0.25
    description: "Correct shared service split"
  - type: llm_judge
    criteria: "Cross-product timing is after activation — recommends introducing additional products to Promoters after they're established, not during initial onboarding"
    weight: 0.25
    description: "Post-activation cross-sell timing"
  - type: llm_judge
    criteria: "Budget allocation prioritizes ROI — invests more in low-maturity/high-opportunity products (FormFlow, SecureVault, APIGateway) over already-strong products"
    weight: 0.25
    description: "ROI-prioritized budget"
