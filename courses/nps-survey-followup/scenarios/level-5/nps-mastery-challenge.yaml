meta:
  id: nps-mastery-challenge
  level: 5
  course: nps-survey-followup
  type: output
  description: "Demonstrate complete NPS mastery by diagnosing a paradoxical situation where NPS is high but business outcomes are deteriorating"
  tags: [nps, mastery, paradox, diagnosis, advanced-analysis]

state: {}

trigger: |
  "ThriveBase" ($100M ARR) presents a puzzling situation: their NPS
  is at an all-time high of +52, yet business metrics are declining.

  The data:
  - NPS: +52 (up from +40 twelve months ago)
  - Gross revenue retention: 85% (down from 92%)
  - Net revenue retention: 95% (down from 110%)
  - Churn rate: 15% (up from 8%)
  - Customer acquisition cost: $2,400 (up from $1,800)
  - G2 rating: 3.8 stars (down from 4.3)
  - Support ticket volume: up 40% YoY
  - Employee NPS: +8 (down from +28)

  Additional context:
  - NPS survey response rate: 22% (down from 38%)
  - Survey sent to: All accounts
  - Accounts that churned in last 12 months: Did not receive exit NPS
  - NPS by account age:
    - <1 year: NPS +62 (new customers love it)
    - 1-2 years: NPS +45
    - 2-3 years: NPS +30
    - 3+ years: NPS +15 (long-term customers less satisfied)
  - NPS by account status:
    - Active, growing: NPS +58
    - Active, stable: NPS +40
    - Active, declining usage: NPS +12
    - Churned (exit survey): NPS -20 (only 30% responded)

  Tasks:

  1. Explain the paradox: How can NPS be +52 while the business is
     deteriorating? Identify every factor contributing to the
     misleading NPS.

  2. What is the "true" NPS if you corrected for the biases you've
     identified? How would you calculate a more accurate score?

  3. Design the corrective actions:
     - Survey methodology changes to get accurate data
     - Follow-up strategy changes based on the real situation
     - Metrics changes to prevent misleading dashboards

  4. Write the executive briefing that explains "Our NPS of +52 is
     misleading, and here's what we need to do about it." This
     requires courage — how do you tell leadership their favorite
     metric is wrong?

assertions:
  - type: llm_judge
    criteria: "Paradox is fully explained — identifies survivorship bias (churned customers don't respond), declining response rate over-representing happy customers, and tenure-based deterioration"
    weight: 0.30
    description: "Full paradox explanation"
  - type: llm_judge
    criteria: "True NPS calculation accounts for biases — proposes including exit survey data, weighting by account value or status, or adjusting for non-response bias"
    weight: 0.25
    description: "Bias-corrected NPS"
  - type: llm_judge
    criteria: "Corrective actions fix the methodology — includes mandatory exit surveys, improved response rate targeting, tenure-segmented analysis, and multi-metric dashboards"
    weight: 0.25
    description: "Methodology corrections"
  - type: llm_judge
    criteria: "Executive briefing is diplomatically honest — presents the findings without blaming anyone, focuses on 'how we improve' rather than 'we were wrong'"
    weight: 0.20
    description: "Diplomatically honest briefing"
