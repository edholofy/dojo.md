meta:
  id: nps-consultancy
  level: 5
  course: nps-survey-followup
  type: output
  description: "Act as an external NPS consultant hired to audit and transform a failing NPS program into a world-class Voice of Customer operation"
  tags: [nps, consultancy, audit, transformation, mastery]

state: {}

trigger: |
  You've been hired as an external consultant by "GlobalTech"
  ($350M ARR, 20,000 accounts, 4 products, 8 markets). Their CEO
  says: "We've been running NPS for 3 years. Our score hasn't moved.
  We're spending $1.2M/year on this program. Fix it or kill it."

  Your audit reveals:

  Program structure:
  - Survey: Annual email survey, sent to all accounts in January
  - Response rate: 18% (declining from 32% three years ago)
  - NPS: +24 (flat for 3 years, was +24 when they started)
  - Follow-up: 25% of Detractors get a follow-up (average 3 weeks)
  - No Passive or Promoter follow-up
  - No closed-loop tracking
  - Results presented to leadership once a year in March

  Team: 3 people (1 survey admin, 1 analyst, 1 part-time follow-up)
  Technology: SurveyMonkey (basic plan), Excel for analysis
  Budget: $1.2M (80% is team cost, 20% is technology)

  Organizational issues:
  - No executive sponsor (CEO assigned it to the VP of Operations)
  - Product team never sees NPS feedback
  - Sales team fears NPS will expose unhappy accounts mid-deal
  - CSMs have their own satisfaction tracking, ignore NPS
  - Legal flagged GDPR concerns 18 months ago (unresolved)

  Deliverable: The CEO wants your assessment and transformation plan.

  1. Diagnostic assessment:
     - What are the top 5 reasons this NPS program has failed?
     - Which problems are structural vs. executional?
     - Is the program salvageable or should they start over?

  2. Transformation plan (if salvageable):
     - Phase 1 (Month 1-3): Emergency fixes
     - Phase 2 (Month 4-6): Foundation rebuild
     - Phase 3 (Month 7-12): Scale and optimize
     Deliverables, success metrics, and budget for each phase.

  3. Organizational change requirements:
     - Who should be executive sponsor and why?
     - How do you get Product, Sales, and CS to participate?
     - What governance structure prevents regression?

  4. ROI projection: What NPS improvement is realistic, and what's
     the business impact if they achieve it?

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies structural issues — annual frequency, no executive sponsor, siloed teams, and no closed-loop are identified as root causes, not just tactical failures"
    weight: 0.25
    description: "Structural diagnosis"
  - type: llm_judge
    criteria: "Transformation plan is phased realistically — emergency fixes are quick wins like survey frequency and response time, foundation includes technology and process, scale adds prediction and optimization"
    weight: 0.25
    description: "Realistically phased transformation"
  - type: llm_judge
    criteria: "Organizational change addresses all stakeholders — proposes specific approaches for Product (feedback access), Sales (account health visibility), and CS (unified metrics)"
    weight: 0.25
    description: "Stakeholder-inclusive change"
  - type: llm_judge
    criteria: "ROI projection is grounded — projects realistic NPS improvement (e.g., +24 to +35 in 12 months) with specific revenue impact calculations based on retention and expansion"
    weight: 0.25
    description: "Grounded ROI projection"
