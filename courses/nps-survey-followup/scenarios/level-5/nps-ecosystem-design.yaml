meta:
  id: nps-ecosystem-design
  level: 5
  course: nps-survey-followup
  type: output
  description: "Design the complete NPS technology ecosystem including data architecture, integrations, analytics pipeline, and automation infrastructure"
  tags: [nps, ecosystem, technology, architecture, mastery]

state: {}

trigger: |
  "TechPlatform" ($300M ARR) is building a best-in-class NPS
  technology ecosystem from scratch. Their current tech stack is
  outdated and fragmented. They've allocated $3M for a 2-year
  technology transformation.

  Current state (to be replaced):
  - Survey: SurveyMonkey (basic, no API)
  - CRM: Salesforce (underutilized)
  - Support: Zendesk (no NPS integration)
  - Analytics: Excel spreadsheets
  - Follow-up: Manual emails from Gmail
  - Data warehouse: None
  - Customer data platform: None

  Requirements:
  - 15,000 NPS responses per quarter to process
  - Real-time alerting for critical Detractors
  - AI-powered text analytics on 5,000+ comments/quarter
  - Predictive churn scoring combining NPS + behavioral data
  - Automated follow-up workflows for all segments
  - Executive dashboards with drill-down capability
  - GDPR/CCPA compliant data handling
  - Integration with product analytics (Amplitude)
  - Support for 6 languages

  Tasks:

  1. Design the NPS technology architecture:
     - Data collection layer (survey platform, channels)
     - Data integration layer (how data flows between systems)
     - Analytics layer (storage, processing, ML)
     - Action layer (automation, workflows, routing)
     - Reporting layer (dashboards, alerts, exports)
     Include a system architecture diagram description.

  2. Evaluate and recommend the technology stack:
     - Survey platform: Compare 3 options with pros/cons
     - Analytics/BI: Compare 3 options
     - Automation: Compare 3 options
     - Justify final selections

  3. Design the data model:
     - Core entities (survey, response, customer, follow-up, outcome)
     - Relationships between entities
     - How historical data enables trend analysis
     - How real-time data enables immediate action

  4. Build the implementation roadmap:
     - Year 1 Q1-Q2: Foundation
     - Year 1 Q3-Q4: Intelligence
     - Year 2 Q1-Q2: Optimization
     - Year 2 Q3-Q4: Innovation
     Budget allocation per phase.

assertions:
  - type: llm_judge
    criteria: "Architecture has clear layers — separates data collection, integration, analytics, action, and reporting with defined responsibilities and data flows between layers"
    weight: 0.25
    description: "Clearly layered architecture"
  - type: llm_judge
    criteria: "Technology recommendations are specific and justified — compares real platforms (e.g., Delighted vs. Qualtrics vs. Medallia) with specific pros/cons relevant to the requirements"
    weight: 0.25
    description: "Specific justified recommendations"
  - type: llm_judge
    criteria: "Data model enables both real-time and historical analysis — supports immediate Detractor alerts while also enabling quarterly trend analysis and predictive modeling"
    weight: 0.25
    description: "Dual-mode data model"
  - type: llm_judge
    criteria: "Budget allocation matches priorities — more investment in foundation and intelligence phases, with later phases building on established infrastructure"
    weight: 0.25
    description: "Priority-matched budget"
