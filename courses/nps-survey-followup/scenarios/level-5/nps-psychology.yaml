meta:
  id: nps-psychology
  level: 5
  course: nps-survey-followup
  type: output
  description: "Apply behavioral psychology principles to NPS follow-up design — understanding what drives customer loyalty and how to influence it ethically"
  tags: [nps, psychology, behavioral, loyalty, mastery]

state: {}

trigger: |
  "BehaviorTech" (customer experience platform) wants to apply
  behavioral psychology to their NPS follow-up program. They've
  hired you as a behavioral design consultant.

  Their hypothesis: "Most NPS follow-up is designed logically but
  not psychologically. We fix the customer's problem, but we don't
  fix how they FEEL about us. That's why our Detractor recovery
  rate is only 25% — we solve the issue but don't rebuild the
  emotional connection."

  Current data:
  - Detractor recovery rate: 25% (solve the issue)
  - Detractor "emotional recovery" rate: 10% (customer feels good
    about the company again)
  - Promoter advocacy activation: 8%
  - Passive engagement: very low response to outreach

  Tasks:

  1. Apply these psychological principles to NPS follow-up design:

     a) Peak-End Rule: People judge experiences by the peak (most
        intense) moment and the end. How does this apply to
        Detractor recovery? What should the "end" of recovery
        feel like?

     b) Reciprocity: People feel obligated to return favors.
        How do you use this ethically with Promoters to increase
        advocacy? What about with Passives?

     c) Loss Aversion: People fear losing what they have more than
        gaining something new. How does this influence Detractor
        messaging? What about retention offers?

     d) Social Proof: People follow the actions of others. How
        can you use this in follow-up with all three segments?

     e) The IKEA Effect: People value things they helped create.
        How can you involve customers in building solutions to
        their own feedback?

  2. Redesign the Detractor recovery journey using psychological
     principles. For each step, identify the principle applied:
     - Step 1: Initial response
     - Step 2: Investigation and resolution
     - Step 3: Follow-up and verification
     - Step 4: Relationship restoration
     - Step 5: Long-term reengagement

  3. Design the "Promoter Psychology" program:
     How do you psychologically motivate Promoters to:
     - Leave reviews (without making them feel used)
     - Make referrals (without making them feel like unpaid salespeople)
     - Participate in case studies (without exploiting their goodwill)

  4. What are the ethical boundaries? Where does "applying psychology"
     cross into manipulation? Define the ethical framework.

assertions:
  - type: llm_judge
    criteria: "Psychological principles are correctly applied — Peak-End Rule, reciprocity, loss aversion, social proof, and IKEA Effect are used accurately and specifically for NPS scenarios"
    weight: 0.25
    description: "Correctly applied principles"
  - type: llm_judge
    criteria: "Detractor journey applies psychology at each step — each recovery step explicitly identifies which principle is being used and how it shapes the customer's emotional experience"
    weight: 0.25
    description: "Psychologically designed recovery"
  - type: llm_judge
    criteria: "Promoter motivation is intrinsic — focuses on identity, meaning, and belonging rather than external rewards, making advocacy feel like self-expression not obligation"
    weight: 0.25
    description: "Intrinsic Promoter motivation"
  - type: llm_judge
    criteria: "Ethical framework is clear — defines specific boundaries between influence and manipulation, with examples of what's acceptable vs. what crosses the line"
    weight: 0.25
    description: "Clear ethical framework"
