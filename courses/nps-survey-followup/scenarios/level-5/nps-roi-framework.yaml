meta:
  id: nps-roi-framework
  level: 5
  course: nps-survey-followup
  type: output
  description: "Build a comprehensive NPS ROI framework that ties every aspect of the NPS program to financial outcomes and makes the investment case irrefutable"
  tags: [nps, roi, financial, framework, mastery]

state: {}

trigger: |
  "FinanceFirst" ($400M ARR) is facing a board mandate: "Every
  program must demonstrate measurable ROI or be cut." The NPS
  program ($1.8M/year) is on the chopping block.

  The board's specific questions:
  1. "What is the dollar value of each NPS point improvement?"
  2. "What revenue does the NPS program directly protect?"
  3. "What revenue does it directly generate?"
  4. "What would happen to the business if we eliminated NPS?"

  Data available:
  - 5 years of NPS and revenue data (quarterly)
  - NPS currently +36
  - Revenue retention by NPS segment:
    Promoters: 130% NRR, 3% annual churn
    Passives: 100% NRR, 12% annual churn
    Detractors: 70% NRR, 35% annual churn
  - Customer distribution: 4,000 Promoters ($180M ARR),
    3,000 Passives ($120M ARR), 1,500 Detractors ($100M ARR)
  - Detractor recovery: 400 accounts/year recovered to Passive or above
  - Promoter referrals: 280 new accounts/year ($11.2M new ARR)
  - Average new customer acquisition cost: $8,000
  - NPS program has driven 3 major product changes in 3 years

  Tasks:

  1. Calculate the dollar value of each NPS point:
     - Model the revenue impact of moving 1% of customers from
       Detractor to Passive, or Passive to Promoter
     - What's a 1-point NPS improvement worth annually?
     - What's the cumulative 3-year value?

  2. Build the complete NPS program P&L:
     Revenue protected: (prevented churn from Detractor recovery)
     Revenue generated: (Promoter referrals + expansion)
     Revenue enabled: (product improvements from NPS insights)
     Costs: ($1.8M program cost)
     Net value: ___
     ROI: ___

  3. Model the "eliminate NPS" scenario:
     - What happens to Detractor recovery without follow-up?
     - What happens to Promoter referrals without activation?
     - What happens to product decisions without customer voice?
     - What's the 3-year revenue impact of shutting down the program?

  4. Present the irrefutable ROI case to the board (3 slides max).

assertions:
  - type: llm_judge
    criteria: "Per-point value is calculated — shows specific dollar value of each NPS point based on the retention and expansion data, not a generic industry average"
    weight: 0.25
    description: "Calculated per-point value"
  - type: llm_judge
    criteria: "P&L is complete — includes revenue protected (Detractor recovery), generated (referrals), and enabled (product improvements), not just one dimension"
    weight: 0.25
    description: "Complete program P&L"
  - type: llm_judge
    criteria: "Elimination scenario is compelling — models specific revenue decline from loss of recovery, referrals, and product intelligence, showing the program prevents millions in churn"
    weight: 0.25
    description: "Compelling elimination scenario"
  - type: llm_judge
    criteria: "Board presentation is irrefutable — uses financial language, specific numbers, and ROI multiple that makes cutting the program clearly more expensive than keeping it"
    weight: 0.25
    description: "Irrefutable board presentation"
