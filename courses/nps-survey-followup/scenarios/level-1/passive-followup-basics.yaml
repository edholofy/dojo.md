meta:
  id: passive-followup-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Write a basic follow-up response to a Passive who gave a 7-8 NPS score, exploring what would move them to Promoter status"
  tags: [nps, passive, follow-up, conversion, basics]

state: {}

trigger: |
  A customer at "MailStream" (email marketing platform) just completed
  an NPS survey:

  Score: 7
  Comment: "It works fine for what we need. Nothing special but gets
  the job done."

  Customer info:
  - Name: Jennifer Park
  - Role: Marketing Manager at GreenLeaf Retail
  - Customer for 11 months
  - Team of 3 users
  - On the Standard plan ($79/month)
  - Uses mainly the email campaign builder and basic analytics

  Write a follow-up email to Jennifer that:
  1. Thanks her for the feedback
  2. Acknowledges her "it works" sentiment without being pushy
  3. Gently explores what would make MailStream more than "fine" for her
  4. Introduces ONE feature she might not be using that could add value
     (e.g., advanced segmentation, A/B testing, or automation workflows)

  Also explain: Why are Passives often the most overlooked NPS segment,
  and why should teams prioritize following up with them?

assertions:
  - type: llm_judge
    criteria: "Tone is curious and helpful, not defensive — doesn't try to convince Jennifer she's wrong for scoring a 7, instead genuinely explores what would delight her"
    weight: 0.25
    description: "Curious non-defensive tone"
  - type: llm_judge
    criteria: "Feature suggestion is relevant — recommends something aligned with her marketing role and current usage patterns, not a random feature"
    weight: 0.25
    description: "Relevant feature suggestion"
  - type: llm_judge
    criteria: "Asks an open-ended question — includes a question that invites Jennifer to share what's missing, rather than just listing features"
    weight: 0.25
    description: "Open-ended exploration"
  - type: llm_judge
    criteria: "Explains why Passives are overlooked — mentions that Passives are at risk of switching to competitors, are vulnerable to competitive offers, and represent the easiest path to NPS improvement"
    weight: 0.25
    description: "Passive segment importance"
