meta:
  id: survey-design-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Understand how NPS survey design impacts the quality of follow-up responses you can provide"
  tags: [nps, survey-design, questions, follow-up-quality, basics]

state: {}

trigger: |
  "ShipFast" (shipping management SaaS) currently sends a bare-bones
  NPS survey that only asks the standard 0-10 question with no
  follow-up question. Many responses come back as just a score with
  no comment, making follow-up difficult.

  Current survey:
  - "How likely are you to recommend ShipFast to a colleague?" (0-10)
  - That's it. No follow-up question.

  Results from last month:
  - 300 surveys sent, 75 responses (25% response rate)
  - Of 75 responses, only 20 included a written comment
  - 55 responses are just a number with no context

  Tasks:

  1. Why does having only a score (no comment) make follow-up
     difficult? What information are you missing?

  2. Redesign the NPS survey to get better follow-up data. Include:
     - The standard NPS question
     - 1-2 follow-up questions that help you understand the "why"
     - Keep it short enough that response rates don't drop

  3. Here's a score-only response:
     Score: 4
     Comment: (none)
     Customer: MidSize Logistics, $399/mo, 2 years

     Write a follow-up email that works even without a comment.
     How do you acknowledge their score without putting words in
     their mouth?

  4. What response rate is considered good for NPS surveys, and
     what are 2-3 tactics to improve the current 25% rate?

assertions:
  - type: llm_judge
    criteria: "Survey redesign adds a follow-up question — includes a 'why did you give this score?' or similar open-ended question that provides actionable context for follow-up"
    weight: 0.25
    description: "Follow-up question added"
  - type: llm_judge
    criteria: "Score-only follow-up is tactful — acknowledges the low score without assuming the reason, and asks an open question to understand the customer's experience"
    weight: 0.25
    description: "Tactful score-only follow-up"
  - type: llm_judge
    criteria: "Survey stays concise — redesigned survey has 2-3 questions max, understanding that longer surveys reduce response rates"
    weight: 0.25
    description: "Concise survey design"
  - type: llm_judge
    criteria: "Response rate advice is practical — suggests tactics like timing optimization, shorter surveys, personalized sender, or in-app surveys rather than just 'send more reminders'"
    weight: 0.25
    description: "Practical response rate advice"
