meta:
  id: nps-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Understand the fundamentals of NPS scoring and what Promoters, Passives, and Detractors mean for follow-up strategy"
  tags: [nps, basics, scoring, segments, fundamentals]

state: {}

trigger: |
  You're a new customer success associate at "CloudBase," a B2B SaaS
  company. Your manager wants to make sure you understand NPS
  fundamentals before you start handling follow-up responses.

  Answer these questions:

  1. A customer scores your product a 7. What NPS category are they
     in, and what does this typically mean about their satisfaction?

  2. Another customer scores a 9. What category, and what does this
     suggest about their likelihood to recommend?

  3. A third customer scores a 3. What category, and what is the
     risk if you don't follow up?

  4. Your company's NPS breakdown is:
     - Promoters (9-10): 40%
     - Passives (7-8): 35%
     - Detractors (0-6): 25%
     Calculate the NPS score and explain whether this is good, average,
     or concerning for a B2B SaaS company.

  5. Why is it important to follow up with ALL three segments, not
     just Detractors? Give a specific reason for following up with
     each segment.

assertions:
  - type: llm_judge
    criteria: "Correctly identifies NPS segments — score of 7 is Passive, 9 is Promoter, 3 is Detractor, with accurate descriptions of what each segment represents"
    weight: 0.25
    description: "Correct segment identification"
  - type: llm_judge
    criteria: "NPS calculation is correct — 40% Promoters minus 25% Detractors equals +15, with reasonable assessment that this is average/moderate for B2B SaaS"
    weight: 0.25
    description: "Accurate NPS calculation"
  - type: llm_judge
    criteria: "Detractor risk is clearly explained — identifies churn risk, negative word-of-mouth, potential public complaints if not followed up promptly"
    weight: 0.25
    description: "Detractor risk understanding"
  - type: llm_judge
    criteria: "Follow-up rationale covers all three segments — Promoters for referrals/advocacy, Passives for conversion to Promoters, Detractors for retention/recovery"
    weight: 0.25
    description: "Three-segment follow-up rationale"
