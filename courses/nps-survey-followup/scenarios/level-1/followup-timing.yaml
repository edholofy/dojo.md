meta:
  id: followup-timing
  level: 1
  course: nps-survey-followup
  type: output
  description: "Understand the importance of follow-up timing and prioritization when handling NPS survey responses"
  tags: [nps, timing, prioritization, follow-up, basics]

state: {}

trigger: |
  It's Monday morning at "HelpDesk Pro" (customer support software).
  Over the weekend, 15 NPS survey responses came in. You need to
  prioritize your follow-ups for the day.

  Here are the responses (in order received):

  1. Score: 2, Comment: "Terrible. Tickets keep getting lost."
     Customer: Enterprise, $2,400/mo ARR, 18-month tenure
  2. Score: 9, Comment: "Great product!"
     Customer: Startup, $49/mo ARR, 3-month tenure
  3. Score: 5, Comment: "Too many bugs lately."
     Customer: Mid-market, $499/mo ARR, 12-month tenure
  4. Score: 10, Comment: "Best support tool we've ever used!"
     Customer: Enterprise, $1,800/mo ARR, 24-month tenure
  5. Score: 8, Comment: "Pretty good overall."
     Customer: SMB, $149/mo ARR, 6-month tenure
  6. Score: 1, Comment: "We're leaving next month."
     Customer: Mid-market, $699/mo ARR, 9-month tenure
  7. Score: 7, Comment: "Could use better reporting."
     Customer: SMB, $199/mo ARR, 15-month tenure

  Tasks:
  1. Rank these 7 responses in the order you would follow up with
     them. Explain your prioritization logic.
  2. For each, how quickly should the follow-up happen? (same hour,
     same day, within 48 hours, within a week)
  3. What's the general best practice for NPS follow-up timing?
     How quickly should follow-ups happen after a survey is submitted?

assertions:
  - type: llm_judge
    criteria: "Detractors are prioritized first — responses #1 and #6 (scores of 2 and 1) are at the top of the follow-up list, with the churning customer (#6) especially urgent"
    weight: 0.30
    description: "Detractor-first prioritization"
  - type: llm_judge
    criteria: "Revenue is factored into prioritization — higher-ARR customers within the same segment get higher priority, with the $2,400/mo enterprise Detractor being top priority"
    weight: 0.25
    description: "Revenue-aware prioritization"
  - type: llm_judge
    criteria: "Timing recommendations are realistic — Detractors within hours, Promoters within 24-48 hours, Passives within the week"
    weight: 0.25
    description: "Realistic timing recommendations"
  - type: llm_judge
    criteria: "General best practice mentions the 24-48 hour window — explains that follow-up effectiveness drops significantly after 48 hours"
    weight: 0.20
    description: "Best practice timing knowledge"
