meta:
  id: promoter-followup-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Write a basic follow-up response to a Promoter who gave a high NPS score, acknowledging their satisfaction and encouraging advocacy"
  tags: [nps, promoter, follow-up, advocacy, basics]

state: {}

trigger: |
  A customer at "TaskFlow" (project management SaaS) just completed
  an NPS survey:

  Score: 10
  Comment: "Love the new Gantt chart feature! It's saved our team
  so much time on project planning. Best PM tool we've used."

  Customer info:
  - Name: Sarah Chen
  - Role: Project Manager at DesignWorks Agency
  - Customer for 14 months
  - Team of 12 users
  - On the Professional plan ($49/user/month)

  Write a follow-up email to Sarah that:
  1. Thanks her for the feedback and score
  2. Acknowledges the specific feature she mentioned
  3. Asks if she'd be willing to share her experience (review, case
     study, or referral — pick the most appropriate ask)
  4. Keeps the tone warm and genuine, not transactional

  Also explain: Why is it important to follow up with Promoters
  quickly, and what's the risk of NOT following up with them?

assertions:
  - type: llm_judge
    criteria: "Email thanks Sarah personally and references the Gantt chart feature specifically — not a generic thank-you that could go to any customer"
    weight: 0.25
    description: "Personalized acknowledgment"
  - type: llm_judge
    criteria: "Advocacy ask is appropriate — requests a review, referral, or case study in a way that feels like a natural extension of her enthusiasm, not a sales pitch"
    weight: 0.25
    description: "Appropriate advocacy ask"
  - type: llm_judge
    criteria: "Tone is warm and genuine — reads like a real person who cares about the feedback, not a templated auto-response"
    weight: 0.25
    description: "Warm genuine tone"
  - type: llm_judge
    criteria: "Explains Promoter follow-up importance — mentions that Promoter enthusiasm is perishable, delayed follow-up reduces advocacy likelihood, and ignored Promoters can drift to Passive over time"
    weight: 0.25
    description: "Promoter follow-up importance"
