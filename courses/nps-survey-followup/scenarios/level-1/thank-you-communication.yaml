meta:
  id: thank-you-communication
  level: 1
  course: nps-survey-followup
  type: output
  description: "Craft appropriate thank-you messages for NPS respondents that acknowledge their time and set expectations for what happens next"
  tags: [nps, thank-you, acknowledgment, expectations, basics]

state: {}

trigger: |
  "CloudNote" (note-taking app, 50,000 users) is implementing
  automated thank-you messages that appear immediately after a
  user submits their NPS survey. These are the first touchpoint
  before a human follow-up.

  Design thank-you messages for each NPS segment:

  1. Promoter thank-you (score 9-10):
     - Should feel genuinely appreciative
     - Hint at how their feedback helps
     - Optional: plant a seed for advocacy without being pushy

  2. Passive thank-you (score 7-8):
     - Should acknowledge their feedback
     - Signal that you want to earn a higher score
     - Don't make them feel like they gave a "bad" score

  3. Detractor thank-you (score 0-6):
     - Should validate that their feedback matters
     - Set expectation that someone will reach out personally
     - Don't be overly cheerful or dismissive of their concerns

  Requirements for all three:
  - Keep each under 75 words
  - Include what happens next (expectation setting)
  - Be appropriate for an automated in-app message

  After writing all three, explain: What's the most common mistake
  companies make with post-survey thank-you messages?

assertions:
  - type: llm_judge
    criteria: "Segment-appropriate tone — Promoter message is warm and appreciative, Passive is encouraging without judgment, Detractor is empathetic and action-oriented"
    weight: 0.25
    description: "Segment-appropriate tone"
  - type: llm_judge
    criteria: "Messages are concise — each is under 75 words and works as an automated in-app message, not a lengthy email"
    weight: 0.25
    description: "Concise messages"
  - type: llm_judge
    criteria: "Expectation setting is included — each message tells the respondent what happens next (personal follow-up, feedback review, etc.)"
    weight: 0.25
    description: "Clear expectation setting"
  - type: llm_judge
    criteria: "Common mistake insight is relevant — identifies issues like generic one-size-fits-all messages, overly cheerful tone for Detractors, or failing to set follow-up expectations"
    weight: 0.25
    description: "Common mistake identification"
