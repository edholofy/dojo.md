meta:
  id: closed-loop-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Understand the basics of closed-loop feedback — ensuring every NPS response gets a follow-up and the loop is closed"
  tags: [nps, closed-loop, feedback, process, basics]

state: {}

trigger: |
  Your manager at "InvoicePro" (invoicing software) introduces the
  concept of "closed-loop feedback" for your NPS program.

  She explains: "Right now, we send NPS surveys but only follow up
  with about 30% of respondents, mostly Detractors. We need to close
  the loop on every response."

  Tasks:

  1. What does "closed-loop feedback" mean in the context of NPS?
     Define it in plain language.

  2. Why is it important to close the loop even with Promoters who
     scored 9 or 10? They're happy — why bother?

  3. Your team of 3 CSMs handles about 200 NPS responses per month.
     The breakdown is:
     - 80 Promoters (9-10)
     - 70 Passives (7-8)
     - 50 Detractors (0-6)

     Design a simple closed-loop process:
     - Who gets a personal follow-up vs. automated response?
     - What's the maximum acceptable time from survey to follow-up?
     - How do you track that every response has been addressed?

  4. Write a brief internal process document (bullet points are fine)
     that your team can follow for closing the loop on NPS responses.

assertions:
  - type: llm_judge
    criteria: "Closed-loop definition is clear — explains that it means every survey respondent receives a follow-up acknowledging their feedback and communicating what action was taken"
    weight: 0.25
    description: "Clear closed-loop definition"
  - type: llm_judge
    criteria: "Promoter follow-up value is explained — mentions referral opportunities, deepening loyalty, learning what works, and preventing Promoter drift"
    weight: 0.25
    description: "Promoter follow-up value"
  - type: llm_judge
    criteria: "Process is realistic for the team size — 3 CSMs handling 200 responses requires some automation, especially for Promoters, with personal outreach reserved for Detractors and high-value accounts"
    weight: 0.25
    description: "Realistic process design"
  - type: llm_judge
    criteria: "Internal process document is actionable — includes clear steps, ownership, timelines, and a tracking mechanism that a CSM could actually follow"
    weight: 0.25
    description: "Actionable process document"
