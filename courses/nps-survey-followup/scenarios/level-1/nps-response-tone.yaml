meta:
  id: nps-response-tone
  level: 1
  course: nps-survey-followup
  type: output
  description: "Learn to adjust your tone and approach when responding to different NPS segments and emotional states"
  tags: [nps, tone, communication, empathy, basics]

state: {}

trigger: |
  You're training new team members at "BookingEase" (event booking
  platform) on how to adjust their tone when following up on NPS
  surveys. Review these three responses and write appropriate
  follow-ups for each.

  Response A:
  Score: 2
  Comment: "I'm so frustrated. We had a major event booking fail
  because of your platform's downtime. We lost $15,000 in ticket
  sales. I've been a customer for 2 years and this is unacceptable."
  Customer: EventPro Solutions, $299/mo plan

  Response B:
  Score: 10
  Comment: "Absolutely love it! The new mobile check-in feature
  is a game changer. Our attendees are so impressed!"
  Customer: FestivalGroup Inc., $199/mo plan

  Response C:
  Score: 6
  Comment: "It's okay I guess. Pricing seems high for what you get."
  Customer: SmallVenue LLC, $99/mo plan

  For each response:
  1. Write the follow-up email
  2. Explain what tone you chose and why
  3. Identify the ONE thing you must NOT do in each response

  After writing all three, explain: How does the emotional intensity
  of the comment (not just the score) affect your response approach?

assertions:
  - type: llm_judge
    criteria: "Detractor response (A) leads with empathy — acknowledges the $15,000 loss and 2 years of loyalty before pivoting to solutions, never minimizes the impact"
    weight: 0.25
    description: "Empathy-first Detractor response"
  - type: llm_judge
    criteria: "Promoter response (B) matches the energy — enthusiastic and celebratory tone that mirrors the customer's excitement, not a flat corporate thank-you"
    weight: 0.25
    description: "Energy-matched Promoter response"
  - type: llm_judge
    criteria: "Passive/low Detractor response (C) doesn't dismiss the pricing concern — takes the value perception issue seriously without immediately offering discounts"
    weight: 0.25
    description: "Value-aware Passive response"
  - type: llm_judge
    criteria: "Emotional intensity insight is thoughtful — explains that a score of 2 with financial loss requires more urgency than a score of 2 with mild dissatisfaction"
    weight: 0.25
    description: "Emotional intensity awareness"
