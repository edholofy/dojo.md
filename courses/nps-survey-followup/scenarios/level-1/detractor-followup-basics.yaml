meta:
  id: detractor-followup-basics
  level: 1
  course: nps-survey-followup
  type: output
  description: "Write a basic follow-up response to a Detractor who gave a low NPS score, acknowledging their frustration and beginning the recovery process"
  tags: [nps, detractor, follow-up, recovery, basics]

state: {}

trigger: |
  A customer at "DataSync" (data integration platform) just completed
  an NPS survey:

  Score: 3
  Comment: "Constant sync errors. We've reported the same issue 4
  times and nothing has changed. Considering switching to a competitor."

  Customer info:
  - Name: Marcus Rivera
  - Role: Data Engineer at RetailCorp
  - Customer for 8 months
  - Team of 5 users
  - On the Business plan ($199/month)
  - Has had 4 support tickets about sync errors in the last 3 months

  Write a follow-up email to Marcus that:
  1. Acknowledges his frustration without being defensive
  2. Shows you've looked into his specific issue history
  3. Commits to a concrete next step (not vague promises)
  4. Gives him a reason to stay rather than switch

  Important: Do NOT offer discounts or credits in this first response.
  Focus on demonstrating that you're taking the problem seriously.

assertions:
  - type: llm_judge
    criteria: "Acknowledges frustration empathetically — validates that 4 unresolved tickets is unacceptable without making excuses or being defensive"
    weight: 0.25
    description: "Empathetic acknowledgment"
  - type: llm_judge
    criteria: "References specific issue history — mentions the sync errors and the 4 previous tickets, showing the response is informed not generic"
    weight: 0.25
    description: "Issue-specific response"
  - type: llm_judge
    criteria: "Commits to concrete next step — offers a specific action like scheduling a call, escalating to engineering, or providing a timeline, not just 'we'll look into it'"
    weight: 0.25
    description: "Concrete next step"
  - type: llm_judge
    criteria: "Does not offer discounts or credits — focuses on solving the problem rather than compensating for it, as instructed"
    weight: 0.25
    description: "No premature compensation"
