meta:
  id: first-nps-shift
  level: 1
  course: nps-survey-followup
  type: output
  description: "Handle your first day managing NPS follow-ups — prioritize responses, write follow-ups, and track your work"
  tags: [nps, simulation, first-day, follow-up, basics]

state: {}

trigger: |
  It's your first day handling NPS follow-ups at "LearnHub" (online
  learning platform, $29-$199/mo plans). Your manager hands you
  today's batch of 8 NPS responses and says: "Follow up with all
  of them by end of day. Prioritize wisely."

  Response 1: Score 9, "Love the course library!"
    Customer: Individual plan, $29/mo, 6 months
  Response 2: Score 4, "App crashes every time I try to download
    a course for offline use."
    Customer: Team plan (10 users), $149/mo, 3 months
  Response 3: Score: 7, "It's fine."
    Customer: Individual plan, $29/mo, 18 months
  Response 4: Score: 1, "Complete waste of money. Nothing works."
    Customer: Team plan (5 users), $99/mo, 1 month
  Response 5: Score: 10, "The best learning platform out there!
    Already recommended it to 3 colleagues."
    Customer: Enterprise, $199/mo, 12 months
  Response 6: Score: 8, "Good content, but navigation could be better."
    Customer: Individual plan, $49/mo, 9 months
  Response 7: Score: 3, "Customer support took 5 days to respond
    to my ticket."
    Customer: Team plan (8 users), $129/mo, 7 months
  Response 8: Score: 6, "Used to be better. Recent updates have
    been disappointing."
    Customer: Individual plan, $29/mo, 24 months

  Tasks:
  1. Rank all 8 in follow-up priority order with brief justification
  2. Write complete follow-up emails for your top 3 priority responses
  3. For the remaining 5, write a one-sentence summary of what each
     follow-up should focus on

assertions:
  - type: llm_judge
    criteria: "Prioritization puts Detractors first — responses 4, 2, and 7 are in the top positions, with the 1-month customer (response 4) especially urgent due to churn risk"
    weight: 0.25
    description: "Detractor-first prioritization"
  - type: llm_judge
    criteria: "Top 3 follow-up emails are personalized — each references the specific comment and customer situation, not generic templates"
    weight: 0.25
    description: "Personalized top-3 emails"
  - type: llm_judge
    criteria: "Revenue and tenure factor into priority — team/enterprise accounts get higher priority than individual plans at similar scores"
    weight: 0.25
    description: "Revenue-aware ranking"
  - type: llm_judge
    criteria: "Remaining 5 summaries are specific — each one-sentence summary identifies the key action needed for that customer, not vague 'follow up' statements"
    weight: 0.25
    description: "Specific remaining summaries"
