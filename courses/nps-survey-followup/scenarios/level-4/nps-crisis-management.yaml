meta:
  id: nps-crisis-management
  level: 4
  course: nps-survey-followup
  type: output
  description: "Manage NPS through a company crisis — product outage, PR incident, or competitive disruption that causes sudden NPS collapse"
  tags: [nps, crisis, management, recovery, expert]

state: {}

trigger: |
  "PayFlow" (payment processing SaaS, $90M ARR, NPS historically +38)
  just experienced a catastrophic 8-hour outage during Black Friday
  weekend. The outage affected 60% of customers and caused:
  - Estimated $12M in lost merchant sales collectively
  - 500+ angry social media posts
  - 3 major tech publications wrote articles about the outage
  - 200+ support tickets in 24 hours

  It's now 5 days after Black Friday. The emergency NPS survey
  (triggered for affected customers) shows:
  - Pre-crisis NPS: +38
  - Post-crisis NPS: -15 (53-point drop)
  - Detractors jumped from 20% to 65%
  - 400 responses with open comments, overwhelmingly negative
  - Common themes: "You cost us money," "We're evaluating Stripe,"
    "Unacceptable for a payment processor," "No communication
    during the outage was the worst part"

  The CEO has called an all-hands. You're presenting the NPS
  crisis response plan.

  Tasks:

  1. Triage the crisis response:
     - What's the immediate follow-up plan (this week)?
     - Who follows up with whom? (segment by impact severity)
     - What does the follow-up message say? (Write it)
     - What should NOT be said right now?

  2. Design the recovery roadmap:
     - Week 1-2: Damage control
     - Month 1: Trust rebuilding
     - Month 2-3: Recovery measurement
     - Month 4-6: Return to baseline
     What's realistic for NPS recovery timeline?

  3. The comment "No communication during the outage was the worst
     part" was the #1 theme. Design the crisis communication
     protocol for next time. What should have happened?

  4. When do you resume normal NPS surveying? Is it appropriate to
     send the next quarterly NPS survey on schedule (in 3 weeks)?
     Why or why not?

assertions:
  - type: llm_judge
    criteria: "Immediate response segments by impact — merchants who lost significant revenue get personal executive outreach, lower-impact customers get CSM follow-up, all get a transparency email"
    weight: 0.25
    description: "Impact-segmented response"
  - type: llm_judge
    criteria: "Recovery timeline is realistic — doesn't promise returning to +38 in a month, acknowledges that trust recovery takes 3-6 months with consistent action"
    weight: 0.25
    description: "Realistic recovery timeline"
  - type: llm_judge
    criteria: "Crisis communication protocol addresses the gap — designs a real-time status page, proactive notification system, and clear escalation chain for future incidents"
    weight: 0.25
    description: "Communication protocol design"
  - type: llm_judge
    criteria: "Survey timing recommendation is thoughtful — either delays the quarterly survey or adjusts it to account for crisis context, with reasoning"
    weight: 0.25
    description: "Thoughtful survey timing"
