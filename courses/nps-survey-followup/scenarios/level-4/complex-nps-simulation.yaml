meta:
  id: complex-nps-simulation
  level: 4
  course: nps-survey-followup
  type: output
  description: "Navigate a month-long NPS program challenge involving strategic decisions, cross-functional conflict, and competing priorities"
  tags: [nps, simulation, complex, strategy, expert]

state: {}

trigger: |
  You're the VP of Customer Experience at "SaaSSuite" ($180M ARR,
  15,000 accounts, NPS +30). This month brings a convergence of
  NPS-related challenges that test your strategic thinking.

  Week 1 — Strategic conflict:
  The VP of Sales wants to exclude accounts in active deal negotiations
  from NPS surveys. "A bad NPS score from a prospect we're upselling
  could kill the deal." This would exclude 2,000 accounts (13% of
  your survey population). The VP of Product says "Excluding accounts
  cherry-picks the data and makes NPS meaningless."

  Week 2 — Budget pressure:
  The CFO announces a 20% budget cut across all departments. Your
  NPS program budget ($600K/year) must be reduced to $480K. What
  do you cut without destroying the program?

  Week 3 — Acquisition integration:
  SaaSSuite is acquiring "MiniTool" (2,000 accounts, NPS +15). You
  need to integrate their customers into your NPS program. MiniTool
  has no formal NPS process. Their customers are nervous about the
  acquisition.

  Week 4 — Board presentation:
  The board wants to see NPS as a leading indicator for next year's
  revenue projection. "If NPS goes up 5 points, how much more
  revenue should we expect?"

  Tasks:
  1. Week 1: Resolve the Sales vs. Product conflict. What's your
     decision and how do you justify it to both sides?
  2. Week 2: Present your $120K budget cut plan with impact analysis.
  3. Week 3: Design the MiniTool NPS integration plan.
  4. Week 4: Can you credibly link NPS to revenue projections?
     What do you present to the board?

assertions:
  - type: llm_judge
    criteria: "Survey exclusion decision is principled — either refuses to exclude accounts (protecting data integrity) or proposes a compromise like timing surveys around deal stages, with clear reasoning"
    weight: 0.25
    description: "Principled exclusion decision"
  - type: llm_judge
    criteria: "Budget cut preserves core program — protects follow-up execution and analytics while cutting lower-priority items like advanced tools, conferences, or nice-to-haves"
    weight: 0.25
    description: "Core-preserving budget cut"
  - type: llm_judge
    criteria: "Acquisition integration is phased — doesn't immediately survey nervous MiniTool customers, instead baselines their experience first, then gradually integrates into the NPS program"
    weight: 0.25
    description: "Phased acquisition integration"
  - type: llm_judge
    criteria: "NPS-revenue link is presented honestly — uses correlation data to show directional relationship while acknowledging that NPS doesn't directly cause revenue, avoiding false precision"
    weight: 0.25
    description: "Honest NPS-revenue presentation"
