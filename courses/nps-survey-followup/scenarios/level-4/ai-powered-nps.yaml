meta:
  id: ai-powered-nps
  level: 4
  course: nps-survey-followup
  type: output
  description: "Design AI-powered NPS follow-up systems that use machine learning for prediction, personalization, and automated insights"
  tags: [nps, ai, machine-learning, prediction, expert]

state: {}

trigger: |
  "TechScale" ($150M ARR, 12,000 accounts) wants to apply AI to
  their NPS program. They've heard about AI-powered customer
  experience but don't know where to start.

  Current NPS program:
  - 4,000 responses per quarter with rich qualitative data
  - 8 years of historical NPS data
  - CRM with full customer lifecycle data
  - Support system with full ticket history
  - Product analytics with detailed usage data
  - 20 CSMs handling follow-ups manually

  The CTO is excited about AI. The CCO is cautious: "I don't want
  AI making our customers feel like they're talking to a robot."

  Tasks:

  1. Identify the 5 highest-value AI applications for NPS programs.
     For each:
     - What it does
     - Data required
     - Expected impact
     - Implementation complexity (1-5 scale)
     - Risk considerations

  2. Design an AI-powered NPS prediction system:
     - Using historical NPS data + behavioral data, predict each
       customer's likely NPS score BEFORE surveying them
     - How accurate does the prediction need to be to be useful?
     - What actions do you take based on predicted scores?
     - How do you validate the model?

  3. Design AI-assisted follow-up writing:
     - AI drafts personalized follow-ups using customer context
     - CSM reviews and sends (human-in-the-loop)
     - How do you ensure quality?
     - What guardrails prevent the "robot" problem?

  4. Build the implementation roadmap:
     - Quick wins (month 1-2): What AI can you deploy immediately?
     - Foundation (month 3-6): What infrastructure do you need?
     - Advanced (month 7-12): What's the sophisticated end state?

assertions:
  - type: llm_judge
    criteria: "AI applications are practical — includes text analytics, score prediction, response drafting, churn risk scoring, and driver analysis, not futuristic speculation"
    weight: 0.25
    description: "Practical AI applications"
  - type: llm_judge
    criteria: "Prediction system has validation — includes methods to validate model accuracy (holdout testing, A/B testing, accuracy thresholds) before deploying to production"
    weight: 0.25
    description: "Validated prediction system"
  - type: llm_judge
    criteria: "Human-in-the-loop is preserved — AI assists but doesn't replace CSMs, with clear review steps and quality checkpoints before customer-facing messages go out"
    weight: 0.25
    description: "Human-in-the-loop preservation"
  - type: llm_judge
    criteria: "Roadmap is phased realistically — quick wins use existing tools (text analytics), foundation builds data infrastructure, advanced deploys predictive models"
    weight: 0.25
    description: "Realistically phased roadmap"
