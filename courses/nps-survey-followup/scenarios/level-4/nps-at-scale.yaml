meta:
  id: nps-at-scale
  level: 4
  course: nps-survey-followup
  type: output
  description: "Manage NPS follow-up operations at massive scale — 10,000+ responses per quarter with limited team resources"
  tags: [nps, scale, operations, efficiency, expert]

state: {}

trigger: |
  "MegaPlatform" (enterprise SaaS, $500M ARR, 25,000 accounts)
  generates 10,000 NPS responses per quarter. Their NPS team of 8
  cannot manually handle this volume.

  Current state:
  - 10,000 responses/quarter (40,000/year)
  - Follow-up rate: 22% (limited by headcount)
  - Average follow-up time: 12 days
  - Detractor responses per quarter: 2,500
  - Team: 8 people (4 CSMs, 2 analysts, 1 program manager, 1 ops)
  - Budget: $800K/year (team + technology)
  - Tools: Qualtrics, Salesforce, Slack

  CEO directive: "I want 90% follow-up rate within 72 hours.
  Figure it out without tripling headcount."

  Tasks:

  1. Design the operating model that achieves 90% follow-up at 72h
     with the existing team of 8:
     - What percentage must be automated?
     - What's the decision tree for routing?
     - How do you maintain quality at automation scale?
     - What technology investments are needed?

  2. Build the response triage system:
     Priority 1 (personal, same day): Define criteria
     Priority 2 (personal, 48h): Define criteria
     Priority 3 (semi-automated, 72h): Define criteria
     Priority 4 (automated, 72h): Define criteria
     How many responses fall into each priority level?

  3. At 10,000 responses/quarter, you have rich data. Design the
     analytics pipeline:
     - Real-time monitoring (what triggers alerts?)
     - Weekly insights (what patterns should be reported?)
     - Quarterly deep-dive (what strategic analysis is performed?)
     - Annual trends (what long-term patterns matter?)

  4. How do you ensure the automated responses don't feel impersonal
     at this scale? Design the quality assurance framework.

assertions:
  - type: llm_judge
    criteria: "Operating model math works — 10,000 responses, 8 people, 90% follow-up rate requires ~80% automation, and the design achieves this with realistic automation tier allocation"
    weight: 0.25
    description: "Workable operating model"
  - type: llm_judge
    criteria: "Triage criteria use multiple signals — priority routing considers score, account value, comment presence, competitor mentions, churn signals, not just score alone"
    weight: 0.25
    description: "Multi-signal triage"
  - type: llm_judge
    criteria: "Analytics pipeline scales — real-time alerts for critical events, weekly pattern reports, quarterly strategic analysis, with increasing depth at each cadence"
    weight: 0.25
    description: "Scaled analytics pipeline"
  - type: llm_judge
    criteria: "Quality assurance is systematic — includes automated response auditing, customer satisfaction with follow-ups, escalation rate monitoring, and periodic manual review samples"
    weight: 0.25
    description: "Systematic quality assurance"
