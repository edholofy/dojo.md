meta:
  id: voice-of-customer-program
  level: 4
  course: nps-survey-followup
  type: output
  description: "Evolve NPS from a standalone survey into a comprehensive Voice of Customer program that integrates multiple feedback channels"
  tags: [nps, voc, voice-of-customer, program, expert]

state: {}

trigger: |
  "PlatformOne" ($120M ARR) has a mature NPS program but realizes
  NPS alone doesn't capture the full customer voice. The CCO wants
  to build a comprehensive Voice of Customer (VoC) program with
  NPS as one component.

  Current feedback channels (mostly disconnected):
  - NPS surveys: quarterly, 35% response rate, NPS +34
  - CSAT surveys: post-support, 4.2/5 average
  - In-app feedback: 200 submissions/month, unstructured
  - Support tickets: 3,000/month, coded by category
  - G2/Capterra reviews: 150 reviews, 4.1 stars
  - Social media mentions: ~500/month
  - Sales win/loss notes: documented in CRM
  - Customer advisory board: 20 members, quarterly meetings
  - Churn exit interviews: 60% completion rate

  Problem: Each channel tells a piece of the story, but no one
  has the complete picture. A customer might rate NPS 8 but leave
  a scathing G2 review. Another might submit 5 support tickets
  before becoming a Detractor.

  Tasks:

  1. Design the VoC program architecture:
     - How do you integrate all feedback channels into a unified view?
     - What's the data model? How do you link feedback to accounts?
     - What technology platform would you use?
     - How do you handle structured vs. unstructured feedback?

  2. Create the "Customer Voice Score" — a composite metric that
     combines NPS with other signals:
     - What inputs go into the composite score?
     - How do you weight each input?
     - How does this score differ from NPS alone?
     - When is the composite score more useful than NPS?

  3. Design the VoC insights distribution model:
     - What insights go to which teams?
     - Product team gets: ___
     - Engineering team gets: ___
     - Support team gets: ___
     - Executive team gets: ___
     - How often does each team receive insights?

  4. How do you measure the ROI of a VoC program vs. just NPS?

assertions:
  - type: llm_judge
    criteria: "Architecture integrates channels — proposes a central platform or data model that links all feedback types to customer accounts for a 360-degree view"
    weight: 0.25
    description: "Integrated channel architecture"
  - type: llm_judge
    criteria: "Composite score is well-designed — combines NPS with CSAT, support sentiment, usage health, and review scores with justified weights"
    weight: 0.25
    description: "Well-designed composite score"
  - type: llm_judge
    criteria: "Insights distribution is role-specific — product gets feature themes, engineering gets technical issues, support gets process gaps, executives get strategic trends"
    weight: 0.25
    description: "Role-specific insights"
  - type: llm_judge
    criteria: "VoC ROI goes beyond NPS ROI — includes benefits like faster issue detection, better product decisions, reduced support volume, and improved competitive intelligence"
    weight: 0.25
    description: "VoC-specific ROI"
