meta:
  id: nps-governance-compliance
  level: 4
  course: nps-survey-followup
  type: output
  description: "Establish NPS program governance including data privacy compliance, survey ethics, and organizational accountability"
  tags: [nps, governance, compliance, privacy, expert]

state: {}

trigger: |
  "HealthTech" (healthcare SaaS, operating in US, EU, and UK) is
  expanding their NPS program globally but faces governance and
  compliance challenges.

  Current issues:
  - GDPR requires explicit consent for survey data in EU
  - HIPAA restricts what health-related feedback can be stored
  - Some teams survey too frequently (customers complaining)
  - NPS data is stored in 4 different systems with no access controls
  - A customer requested deletion of their NPS feedback (GDPR right
    to be forgotten) and no one knows how to process it
  - Survey incentives in some regions may violate anti-kickback laws
  - No data retention policy for NPS responses
  - Employee access to NPS data is unrestricted

  Tasks:

  1. Design the NPS data governance framework:
     - Data collection: What consent is needed? How do you collect it?
     - Data storage: Where should NPS data live? Access controls?
     - Data retention: How long do you keep NPS responses?
     - Data deletion: Process for "right to be forgotten" requests
     - Data sharing: Who can access what NPS data?

  2. Create the survey ethics policy:
     - Frequency limits (prevent over-surveying)
     - Incentive guidelines (what's allowed where)
     - Opt-out process and respect
     - Transparency about how feedback is used
     - Avoidance of manipulative survey design

  3. GDPR-specific compliance:
     - Design the consent flow for EU NPS surveys
     - Process the "right to be forgotten" request:
       What data must be deleted? From which systems?
       What's the SLA for processing?
     - How do you maintain NPS analytics when individual data
       points can be deleted?

  4. Write the NPS Program Governance Policy document (executive
     summary + key sections) that can be approved by Legal and
     Compliance.

assertions:
  - type: llm_judge
    criteria: "Data governance covers the full lifecycle — addresses collection consent, storage security, retention periods, deletion processes, and sharing controls comprehensively"
    weight: 0.25
    description: "Full lifecycle governance"
  - type: llm_judge
    criteria: "GDPR compliance is practical — includes specific consent language, deletion workflow across all systems, and addresses the analytics continuity challenge when data is deleted"
    weight: 0.25
    description: "Practical GDPR compliance"
  - type: llm_judge
    criteria: "Survey ethics policy prevents abuse — includes frequency caps, opt-out respect, prohibited manipulation tactics, and appropriate incentive guidelines"
    weight: 0.25
    description: "Abuse-preventing ethics policy"
  - type: llm_judge
    criteria: "Governance policy is legally structured — organized in sections that Legal and Compliance can review, with clear definitions, responsibilities, and enforcement mechanisms"
    weight: 0.25
    description: "Legally structured policy"
