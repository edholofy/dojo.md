meta:
  id: nps-program-strategy
  level: 4
  course: nps-survey-followup
  type: output
  description: "Design the enterprise-wide NPS program strategy including governance, ownership, technology, and maturity roadmap"
  tags: [nps, strategy, program, enterprise, expert]

state: {}

trigger: |
  "EnterpriseSoft" ($200M ARR, 8,000 accounts, 15 products) has NPS
  programs scattered across different business units with no
  coordination. The Chief Customer Officer (CCO) has hired you to
  design a unified NPS strategy.

  Current state:
  - 6 different teams run separate NPS surveys
  - 3 different survey tools in use (Delighted, Qualtrics, SurveyMonkey)
  - No standardized scoring methodology
  - Response rates range from 12% to 48% across teams
  - Some teams follow up with 90% of respondents, others follow up
    with 10%
  - Executive team gets 6 different NPS reports with different formats
  - Total annual spend on NPS tools: $280K
  - No single source of truth for customer health
  - Some products survey quarterly, some annually, some never

  CCO mandate: "I want one unified NPS program. One methodology,
  one platform, one reporting framework. Build it."

  Tasks:

  1. Design the unified NPS program architecture:
     - Governance model (who owns what?)
     - Technology consolidation (which platform, why?)
     - Methodology standardization (survey design, timing, frequency)
     - Reporting framework (what goes to whom, when?)

  2. Create the maturity roadmap:
     - Phase 1 (Months 1-3): Stabilize and standardize
     - Phase 2 (Months 4-6): Optimize and automate
     - Phase 3 (Months 7-12): Predict and prevent
     Define deliverables, success metrics, and investment for each phase.

  3. The biggest political challenge: 6 teams currently "own" their
     NPS programs. How do you centralize without alienating them?
     Design the change management approach.

  4. What's the business case for consolidation? Calculate the ROI
     of moving from 6 fragmented programs to 1 unified program.

assertions:
  - type: llm_judge
    criteria: "Governance model has clear ownership — defines central NPS team with product-level liaisons, not full centralization or full autonomy, balancing consistency with local expertise"
    weight: 0.25
    description: "Balanced governance model"
  - type: llm_judge
    criteria: "Technology consolidation is justified — recommends one platform with specific reasons (cost, integration, capability) and addresses migration risks"
    weight: 0.25
    description: "Justified tech consolidation"
  - type: llm_judge
    criteria: "Change management is realistic — acknowledges team resistance, proposes collaborative approach (champions from each team, shared wins), and doesn't just mandate top-down change"
    weight: 0.25
    description: "Realistic change management"
  - type: llm_judge
    criteria: "ROI is calculated — shows savings from tool consolidation, improved retention from better follow-up, and revenue protection from unified customer health view"
    weight: 0.25
    description: "Calculated consolidation ROI"
