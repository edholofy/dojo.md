meta:
  id: nps-revenue-impact
  level: 4
  course: nps-survey-followup
  type: output
  description: "Quantify the revenue impact of NPS across the customer lifecycle — from acquisition to expansion to retention"
  tags: [nps, revenue, impact, financial, expert]

state: {}

trigger: |
  "GrowthSaaS" ($80M ARR) needs to justify their $500K annual
  investment in the NPS program to the CFO. The CFO is skeptical:
  "Show me the money. How does asking customers a survey question
  generate revenue?"

  Data available:

  Customer segment financials:
  - Promoters (400 accounts): Avg ARR $32K, Net retention 125%,
    Referral rate 14%, Avg lifetime 48 months
  - Passives (350 accounts): Avg ARR $24K, Net retention 98%,
    Referral rate 3%, Avg lifetime 30 months
  - Detractors (200 accounts): Avg ARR $18K, Net retention 68%,
    Referral rate 0%, Avg lifetime 16 months

  NPS program metrics:
  - Detractor recovery rate: 35% (70 of 200 recovered per year)
  - Recovered Detractor retention: 88% (vs. 68% unrecovered)
  - Passive-to-Promoter conversion: 15% (53 of 350 per year)
  - Promoter referral revenue: $1.8M new ARR per year
  - Cost of NPS program: $500K/year (tools, team, technology)

  Tasks:

  1. Build the complete NPS revenue model:
     - Revenue protected by Detractor recovery
     - Revenue grown by Passive-to-Promoter conversion
     - Revenue generated by Promoter referrals
     - Revenue at risk if the NPS program were discontinued

  2. Calculate the NPS program ROI:
     - Total revenue impact vs. $500K investment
     - Payback period
     - 3-year projected return

  3. The CFO asks: "What if we cut the NPS budget in half? What's
     the impact?" Model the scenario and present the tradeoffs.

  4. Write the CFO presentation (3 slides):
     - Slide 1: The NPS-Revenue Connection
     - Slide 2: Current Program ROI
     - Slide 3: Investment Recommendation

assertions:
  - type: llm_judge
    criteria: "Revenue model is comprehensive — calculates Detractor recovery value (70 accounts * $18K * retention improvement), Passive conversion value, and referral revenue separately"
    weight: 0.25
    description: "Comprehensive revenue model"
  - type: llm_judge
    criteria: "ROI calculation is specific — shows total revenue impact divided by $500K cost with a concrete multiple (e.g., 5x-10x ROI)"
    weight: 0.25
    description: "Specific ROI calculation"
  - type: llm_judge
    criteria: "Budget cut scenario is modeled — shows which programs would be cut, the resulting decrease in recovery/conversion rates, and the revenue impact of those reductions"
    weight: 0.25
    description: "Modeled budget cut scenario"
  - type: llm_judge
    criteria: "CFO presentation speaks finance language — uses financial terms (ROI, payback period, revenue protection, opportunity cost) not just customer success jargon"
    weight: 0.25
    description: "Finance-language presentation"
