meta:
  id: nps-competitive-intelligence
  level: 4
  course: nps-survey-followup
  type: output
  description: "Extract competitive intelligence from NPS feedback and use it to strengthen competitive positioning and reduce competitive churn"
  tags: [nps, competitive, intelligence, positioning, expert]

state: {}

trigger: |
  "DesignTool" (design collaboration SaaS, NPS +28) has noticed a
  troubling pattern in their Detractor feedback: competitors are
  increasingly mentioned by name.

  Competitor mentions in last quarter's NPS comments (400 responses):

  "Figma" mentioned 45 times:
  - "Figma's real-time collaboration is way better"
  - "Switching to Figma because your multiplayer editing lags"
  - "Figma's free tier is more generous"

  "Canva" mentioned 28 times:
  - "Canva is easier for our non-designers"
  - "Canva's template library is 10x bigger"
  - "Even our interns can use Canva"

  "Adobe" mentioned 15 times:
  - "Adobe's ecosystem integration is seamless"
  - "Adobe Creative Cloud gives us everything"
  - "Professional designers need Adobe-level features"

  Non-competitor Detractor themes (not mentioning competitors):
  - "Performance is too slow" (60 mentions)
  - "Pricing increased without added value" (35 mentions)
  - "Customer support takes too long" (25 mentions)

  Tasks:

  1. Analyze the competitive intelligence:
     - What specific capabilities is each competitor winning on?
     - Which competitor is the biggest threat and why?
     - What customer segments are most at risk to each competitor?

  2. Design a competitive response strategy:
     - For each competitor, what should DesignTool do?
     - What should be addressed in product? In positioning? In pricing?
     - What strengths should DesignTool double down on?

  3. How should the follow-up to competitor-mentioning Detractors
     differ from non-competitor Detractors? Write the follow-up
     for a Detractor who said "Switching to Figma because your
     multiplayer editing lags."

  4. Create a "Competitive NPS Intelligence" report format that
     product and marketing teams can use to track competitive threats
     from NPS data over time.

assertions:
  - type: llm_judge
    criteria: "Competitive analysis is segment-specific — identifies that Figma threatens technical users, Canva threatens casual users, and Adobe threatens enterprise, not treating all competition the same"
    weight: 0.25
    description: "Segment-specific competitive analysis"
  - type: llm_judge
    criteria: "Response strategy differentiates build vs. position — recommends building against the biggest feature gaps while positioning strengths against weaker competitors"
    weight: 0.25
    description: "Build vs. position strategy"
  - type: llm_judge
    criteria: "Competitor-mentioning Detractor follow-up doesn't badmouth competitors — acknowledges the customer's comparison, focuses on DesignTool's unique value, and commits to specific improvements"
    weight: 0.25
    description: "Respectful competitor response"
  - type: llm_judge
    criteria: "Intelligence report format is trackable — shows competitor mention trends over time, specific capability gaps, and at-risk customer segments for ongoing monitoring"
    weight: 0.25
    description: "Trackable intelligence format"
