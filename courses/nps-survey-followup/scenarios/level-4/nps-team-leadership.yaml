meta:
  id: nps-team-leadership
  level: 4
  course: nps-survey-followup
  type: output
  description: "Lead and coach a team responsible for NPS follow-up execution, building competency and accountability across the organization"
  tags: [nps, leadership, team, coaching, expert]

state: {}

trigger: |
  You've been promoted to Director of Customer Experience at
  "ConnectHub" ($60M ARR). You now lead a team of 15 responsible
  for the entire NPS program. The team is inconsistent — some are
  excellent at follow-ups, others struggle.

  Team composition:
  - 2 NPS Program Managers (strategy, reporting)
  - 10 Customer Success Managers (follow-up execution)
  - 2 Data Analysts (NPS analytics)
  - 1 CX Operations (tools, automation)

  Performance data:
  - Top performer: 98% follow-up rate, 45% Detractor recovery,
    NPS for their book: +48
  - Average performer: 75% follow-up rate, 25% Detractor recovery,
    NPS for their book: +30
  - Bottom performer: 40% follow-up rate, 10% Detractor recovery,
    NPS for their book: +12

  Issues to address:
  - Skill gap: Bottom performers lack empathy and problem-solving
    in Detractor conversations
  - Motivation gap: Some CSMs see NPS follow-up as "busywork" not
    core to their job
  - Process gap: No standardized playbooks or quality standards
  - Accountability gap: Follow-up quality isn't measured or reviewed

  Tasks:

  1. Design the NPS competency framework for your team:
     - What skills are required for excellent NPS follow-up?
     - How do you assess current skill levels?
     - What does the training program look like?

  2. Create the accountability system:
     - What KPIs does each CSM own?
     - How are KPIs reviewed (frequency, format)?
     - How do you handle consistently underperforming team members?
     - How do you recognize and reward top performers?

  3. Build the quality assurance program:
     - How do you review follow-up quality (not just quantity)?
     - Design a follow-up quality scorecard with criteria
     - How often do you do quality reviews?

  4. The CSM who says NPS follow-up is "busywork" — how do you
     change their mindset? Write the conversation you'd have.

assertions:
  - type: llm_judge
    criteria: "Competency framework covers both skills and mindset — includes empathy, problem-solving, business acumen, and communication alongside technical NPS knowledge"
    weight: 0.25
    description: "Skills-and-mindset framework"
  - type: llm_judge
    criteria: "Accountability system is balanced — measures follow-up rate, response time, recovery rate, and quality score, not just one dimension"
    weight: 0.25
    description: "Balanced accountability"
  - type: llm_judge
    criteria: "Quality scorecard has specific criteria — evaluates personalization, empathy, action orientation, follow-through, and customer outcome, with scoring rubric"
    weight: 0.25
    description: "Specific quality scorecard"
  - type: llm_judge
    criteria: "Busywork conversation reframes purpose — connects NPS follow-up to retention revenue, career growth, and customer impact rather than lecturing about compliance"
    weight: 0.25
    description: "Purpose-reframing conversation"
