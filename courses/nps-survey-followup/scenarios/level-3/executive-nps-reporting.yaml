meta:
  id: executive-nps-reporting
  level: 3
  course: nps-survey-followup
  type: output
  description: "Create executive-level NPS reports that connect customer loyalty metrics to business outcomes and drive strategic decisions"
  tags: [nps, executive, reporting, business-impact, advanced]

state: {}

trigger: |
  "ScaleUp" (HR tech SaaS, $45M ARR) is preparing for their
  quarterly board meeting. The board has started asking about
  customer health metrics, specifically NPS. The CEO needs a
  board-ready NPS presentation.

  Data available:

  NPS Trend (trailing 12 months):
  - Q1 2025: +28 (benchmark: +35)
  - Q2 2025: +31
  - Q3 2025: +34
  - Q4 2025: +38

  Revenue correlation:
  - Promoter accounts: 120% net revenue retention
  - Passive accounts: 95% net revenue retention
  - Detractor accounts: 72% net revenue retention

  Customer counts by segment:
  - Promoters: 320 accounts, $18M ARR
  - Passives: 280 accounts, $15M ARR
  - Detractors: 150 accounts, $12M ARR

  Closed-loop metrics:
  - Follow-up rate: 92%
  - Detractor recovery rate: 38%
  - Average resolution time: 3.2 days
  - Promoter referral rate: 12%

  Industry benchmark: +35 (ScaleUp crossed this in Q3)

  Tasks:

  1. Create the board presentation narrative:
     - What story does this data tell?
     - How do you connect NPS improvement (+28 → +38) to business
       outcomes (revenue retention, growth)?
     - What risks should the board know about?

  2. Calculate the financial impact of NPS:
     - Revenue at risk from Detractors (150 accounts, $12M ARR,
       72% retention = how much likely to churn?)
     - Revenue growth potential from Promoters (referrals, expansion)
     - Financial value of converting 10% of Passives to Promoters

  3. Write the 5-slide board presentation:
     Slide 1: NPS headline and trend
     Slide 2: Revenue impact by segment
     Slide 3: Closed-loop program performance
     Slide 4: Key risks and mitigation
     Slide 5: Next quarter priorities
     Describe each slide's content, key message, and visualization.

  4. The board will ask: "How does our NPS compare to competitors?"
     You don't have competitor data. How do you answer this honestly
     and still demonstrate progress?

assertions:
  - type: llm_judge
    criteria: "Financial impact is calculated — shows specific dollar amounts at risk from Detractors ($12M * 28% churn risk = ~$3.4M at risk) and growth potential from Promoter referrals"
    weight: 0.25
    description: "Calculated financial impact"
  - type: llm_judge
    criteria: "Board narrative connects NPS to revenue — tells a clear story of how improving from +28 to +38 correlates with improved retention and growth"
    weight: 0.25
    description: "NPS-to-revenue narrative"
  - type: llm_judge
    criteria: "Slides are board-appropriate — concise, visualization-focused, leads with insights not data, and each slide has one clear message"
    weight: 0.25
    description: "Board-appropriate slides"
  - type: llm_judge
    criteria: "Competitor question is handled honestly — uses industry benchmarks, acknowledges the gap in competitor-specific data, and redirects to internal progress and trends"
    weight: 0.25
    description: "Honest competitor response"
