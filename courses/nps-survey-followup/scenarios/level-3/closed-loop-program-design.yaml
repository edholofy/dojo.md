meta:
  id: closed-loop-program-design
  level: 3
  course: nps-survey-followup
  type: output
  description: "Design a comprehensive closed-loop feedback program that ensures every NPS response receives appropriate follow-up at scale"
  tags: [nps, closed-loop, program-design, scale, advanced]

state: {}

trigger: |
  "CloudServe" (cloud infrastructure SaaS, 5,000 accounts) is
  building a formal closed-loop NPS program. Currently, follow-up
  is inconsistent — some CSMs are great at it, others don't do it
  at all.

  Current state:
  - 1,200 NPS responses per quarter
  - Follow-up rate: 35% (varies from 10% to 80% by CSM)
  - No SLA for response time
  - No escalation process for critical Detractors
  - No measurement of closed-loop effectiveness
  - Detractor recovery rate: unknown
  - 12 CSMs manage accounts, each with ~400 accounts

  Leadership mandate: "100% of NPS responses must receive appropriate
  follow-up within defined SLAs. Build the program."

  Tasks:

  1. Design the closed-loop program framework:
     - Define SLAs by segment (Detractor: ?, Passive: ?, Promoter: ?)
     - Define what "closed loop" means for each segment (what actions
       constitute a complete follow-up?)
     - Design the escalation path when SLAs are missed
     - Define ownership model (who owns which follow-ups?)

  2. The biggest challenge is Detractors at Enterprise accounts.
     Design the escalation workflow:
     - Level 1: CSM follow-up (within ?)
     - Level 2: CSM Manager escalation (when?)
     - Level 3: VP involvement (when?)
     - Level 4: Executive sponsor activation (when?)
     What triggers each escalation level?

  3. How do you handle the volume challenge? 1,200 responses per
     quarter across 12 CSMs = 100 per CSM per quarter. That's
     roughly 1.5 follow-ups per CSM per business day. Design the
     efficiency model:
     - What's automated vs. personal?
     - What templates or tools help?
     - How do you ensure quality doesn't drop?

  4. Define the metrics that prove the program is working.

assertions:
  - type: llm_judge
    criteria: "SLAs are differentiated by segment and value — Detractors get tighter SLAs (24-48h) than Passives (1 week) and Promoters (2 weeks), with Enterprise accounts getting faster response"
    weight: 0.25
    description: "Differentiated SLAs"
  - type: llm_judge
    criteria: "Escalation triggers are specific — defines clear conditions for each level (e.g., SLA breach, revenue threshold, churn signal) not just time-based"
    weight: 0.25
    description: "Specific escalation triggers"
  - type: llm_judge
    criteria: "Volume solution is realistic — uses automation for Promoter thank-yous and Passive follow-ups, reserving personal outreach for Detractors and high-value accounts"
    weight: 0.25
    description: "Realistic volume solution"
  - type: llm_judge
    criteria: "Program metrics are comprehensive — includes follow-up rate, SLA compliance, Detractor recovery rate, NPS trend impact, and time-to-close"
    weight: 0.25
    description: "Comprehensive program metrics"
