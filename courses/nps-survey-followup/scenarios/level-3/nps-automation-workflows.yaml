meta:
  id: nps-automation-workflows
  level: 3
  course: nps-survey-followup
  type: output
  description: "Design sophisticated NPS follow-up automation workflows that personalize responses at scale without losing the human touch"
  tags: [nps, automation, workflows, personalization, advanced]

state: {}

trigger: |
  "RecruitFlow" (recruitment platform SaaS, 8,000 accounts) receives
  2,000 NPS responses per quarter. Their team of 6 CSMs cannot
  personally follow up with every response. They need smart
  automation.

  Current approach: Every response gets the same automated email.
  Result: Customers feel ignored. Detractors reply to the automated
  email with "Don't send me automated crap. I want a real person."

  Available technology:
  - NPS tool: Delighted (with API)
  - CRM: Salesforce
  - Marketing automation: HubSpot
  - Support: Intercom
  - Integrations: Zapier

  Customer data available for personalization:
  - NPS score and comment
  - Account plan and value
  - Tenure and renewal date
  - Feature usage data
  - Support ticket history
  - Previous NPS scores (trend)

  Tasks:

  1. Design a tiered automation strategy:
     Tier 1: Fully automated (which responses and what do they get?)
     Tier 2: Semi-automated (template + personal touch)
     Tier 3: Fully personal (CSM-written follow-up)
     Define the criteria that routes responses to each tier.

  2. Design the automation workflow for each NPS segment:
     - Promoter workflow: thank → ask → activate
     - Passive workflow: acknowledge → explore → engage
     - Detractor workflow: alert → respond → resolve → verify
     Include triggers, timing, and branching logic.

  3. Write the "semi-automated" follow-up templates for each segment
     that include personalization tokens but still feel human. Show
     what fields are automated vs. what the CSM fills in.

  4. How do you prevent the "automated crap" problem? What guardrails
     ensure automation enhances rather than replaces the human
     experience?

assertions:
  - type: llm_judge
    criteria: "Tier routing is data-driven — uses score, account value, trend direction, and comment presence to route, not just the NPS score alone"
    weight: 0.25
    description: "Data-driven tier routing"
  - type: llm_judge
    criteria: "Detractor workflow includes human checkpoint — ensures no Detractor follow-up is 100% automated, with CSM review before sending or phone call for high-value accounts"
    weight: 0.25
    description: "Human Detractor checkpoint"
  - type: llm_judge
    criteria: "Semi-automated templates feel human — uses personalization tokens effectively (name, specific feature mentioned, account context) and leaves room for CSM additions"
    weight: 0.25
    description: "Human-feeling templates"
  - type: llm_judge
    criteria: "Anti-automation guardrails are specific — includes measures like reply detection, sentiment-based escalation, frequency limits, and human override triggers"
    weight: 0.25
    description: "Specific anti-automation guardrails"
