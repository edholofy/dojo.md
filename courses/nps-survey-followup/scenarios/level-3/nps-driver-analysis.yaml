meta:
  id: nps-driver-analysis
  level: 3
  course: nps-survey-followup
  type: output
  description: "Identify the key drivers that most influence NPS scores and use driver analysis to prioritize improvement efforts"
  tags: [nps, driver-analysis, correlation, prioritization, advanced]

state: {}

trigger: |
  "WorkflowPro" (workflow automation SaaS, NPS +22) has been unable
  to move their NPS score despite 6 months of improvement efforts.
  They've been fixing bugs and adding features based on Detractor
  complaints, but the score isn't budging.

  You suspect they're fixing the wrong things. You have access to
  these data points for each customer alongside their NPS score:

  Customer attributes:
  - Onboarding completion rate (% of setup steps finished)
  - Monthly active usage (days/month)
  - Support ticket count (last 90 days)
  - Feature adoption depth (% of available features used)
  - Time since last product update affecting their workflows
  - Account age (months)
  - Contract value (ARR)

  Correlation data (you ran the analysis):
  - Onboarding completion vs. NPS: r=0.72 (strong positive)
  - Monthly active usage vs. NPS: r=0.65 (moderate positive)
  - Support ticket count vs. NPS: r=-0.58 (moderate negative)
  - Feature adoption depth vs. NPS: r=0.61 (moderate positive)
  - Time since disruptive update vs. NPS: r=-0.45 (weak negative)
  - Account age vs. NPS: r=0.38 (weak positive)
  - Contract value vs. NPS: r=0.15 (very weak positive)

  Tasks:

  1. Interpret the correlation data. What are the top 3 NPS drivers
     for WorkflowPro? What does each correlation tell you about
     what really matters to customers?

  2. Based on this analysis, why haven't their bug fixes and feature
     additions moved the NPS score? What should they focus on instead?

  3. Design an action plan based on the driver analysis:
     - For each top driver, what specific initiative would improve it?
     - What's the expected NPS impact?
     - What's the timeline?

  4. How would you present this driver analysis to the product team
     to redirect their improvement efforts? They've been working
     on bug fixes for 6 months — how do you make the case for a
     different approach without invalidating their work?

assertions:
  - type: llm_judge
    criteria: "Identifies onboarding as the top driver — recognizes that r=0.72 correlation with onboarding completion means improving onboarding will have the biggest NPS impact"
    weight: 0.25
    description: "Onboarding as top driver"
  - type: llm_judge
    criteria: "Explains why current efforts failed — connects that bug fixes (reactive) don't address the systemic drivers like onboarding and feature adoption (proactive)"
    weight: 0.25
    description: "Current failure explanation"
  - type: llm_judge
    criteria: "Action plan targets high-correlation drivers — prioritizes onboarding improvement and usage/adoption initiatives over continued bug-fixing"
    weight: 0.25
    description: "Driver-aligned action plan"
  - type: llm_judge
    criteria: "Product team communication is diplomatic — acknowledges their bug-fix work was valuable while making a data-backed case for redirecting efforts to onboarding and adoption"
    weight: 0.25
    description: "Diplomatic redirection"
