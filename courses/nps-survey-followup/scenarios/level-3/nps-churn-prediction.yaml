meta:
  id: nps-churn-prediction
  level: 3
  course: nps-survey-followup
  type: output
  description: "Use NPS data combined with behavioral signals to predict and prevent customer churn before it happens"
  tags: [nps, churn, prediction, retention, advanced]

state: {}

trigger: |
  "InventoryHub" (inventory management SaaS, $28M ARR) has a churn
  problem. Last quarter, 45 accounts churned representing $2.1M ARR.
  Post-mortem analysis revealed:

  Of the 45 churned accounts:
  - 30 (67%) were Detractors in their last NPS survey
  - 8 (18%) were Passives
  - 5 (11%) were Promoters who churned without warning
  - 2 (4%) never responded to NPS surveys

  The VP of CS says: "We need to predict churn BEFORE it happens,
  not find out after they cancel."

  Available signals:
  - NPS score and trend (current and historical)
  - Login frequency (declining logins = risk)
  - Feature usage depth (declining usage = risk)
  - Support ticket volume (increasing tickets = risk)
  - Payment behavior (late payments = risk)
  - Contract renewal date proximity
  - Champion contact engagement (stopped logging in?)

  Tasks:

  1. Design a churn risk scoring model that combines NPS with
     behavioral signals:
     - What weight does NPS get vs. other signals?
     - How do you score NPS trend (improving Detractor vs. declining
       Promoter)?
     - What's the formula or framework?

  2. The 5 Promoters who churned are the most surprising. What
     could cause a Promoter to churn? Design early warning indicators
     for "silent Promoter churn."

  3. Create 3 intervention playbooks based on churn risk level:
     - High risk (score 80-100): What actions, when, by whom?
     - Medium risk (score 50-79): What actions, when, by whom?
     - Low risk (score 0-49): What monitoring approach?

  4. How do you measure the effectiveness of your churn prevention
     program? What would convince the CFO that the investment in
     predictive analytics is worth it?

assertions:
  - type: llm_judge
    criteria: "Churn model combines NPS with behavior — NPS is one signal among many, weighted appropriately (not the only factor), with declining trends weighted more than static scores"
    weight: 0.25
    description: "Multi-signal churn model"
  - type: llm_judge
    criteria: "Silent Promoter churn is explained — identifies causes like champion departure, budget cuts, strategic changes, competitor poaching, or organizational restructuring"
    weight: 0.25
    description: "Silent Promoter churn causes"
  - type: llm_judge
    criteria: "Intervention playbooks are specific — high-risk gets executive involvement and save offers, medium-risk gets CSM outreach and success planning, low-risk gets automated monitoring"
    weight: 0.25
    description: "Specific intervention playbooks"
  - type: llm_judge
    criteria: "ROI case is financial — calculates prevented churn revenue vs. program cost, showing that preventing even a fraction of the $2.1M/quarter churn justifies the investment"
    weight: 0.25
    description: "Financial ROI case"
