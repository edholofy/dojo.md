meta:
  id: nps-text-analytics
  level: 3
  course: nps-survey-followup
  type: output
  description: "Apply text analytics and theme analysis to open-ended NPS comments to extract actionable insights at scale"
  tags: [nps, text-analytics, qualitative, themes, advanced]

state: {}

trigger: |
  "MarketPulse" (marketing analytics SaaS) has 2,000 open-ended
  NPS comments from the past year that have never been systematically
  analyzed. The Head of CX knows there's gold in this data but
  doesn't know how to mine it.

  Sample comments (representative of the full dataset):

  Promoter comments:
  - "The attribution modeling is best-in-class. Saves us hours."
  - "Customer support is amazing — Sarah on your team is the best!"
  - "Finally a tool that integrates well with our Google Ads stack."
  - "Dashboard customization is exactly what we needed."
  - "Love the new cohort analysis feature. Worth every penny."

  Passive comments:
  - "Good tool but reporting could be more flexible."
  - "Works for basic needs. Advanced analytics are lacking."
  - "Pricing is fair but competitors are catching up."
  - "The learning curve is steep. Took us 3 months to get value."
  - "Decent product. Nothing that makes me want to shout about it."

  Detractor comments:
  - "Data discrepancies between your reports and Google Analytics."
  - "We paid for enterprise but get startup-level support."
  - "Your API broke twice this month. We lost campaign data."
  - "The new pricing tier eliminated features we were using. Bait and switch."
  - "Too complex for our team size. We need something simpler."

  Tasks:

  1. Design a text analytics approach for 2,000 comments:
     - Manual coding framework (categories, subcategories, sentiment)
     - How would you structure the tagging taxonomy?
     - What tools or methods would you use?
     - How many comments would you need to manually review to validate
       the taxonomy before scaling?

  2. Apply your framework to the 15 sample comments above:
     - Tag each with category, subcategory, and sentiment
     - Identify the top themes across all three segments
     - Note where Promoter and Detractor themes directly conflict

  3. Create the "NPS Qualitative Insights" report from your analysis:
     - Top 5 themes driving Promoter loyalty
     - Top 5 themes driving Detractor frustration
     - Top 3 themes that could convert Passives
     - Unexpected insights or contradictions

  4. How do you present qualitative NPS insights alongside
     quantitative NPS scores without one overshadowing the other?

assertions:
  - type: llm_judge
    criteria: "Taxonomy is well-structured — categories are mutually exclusive and collectively exhaustive (product, support, pricing, UX, reliability, etc.) with meaningful subcategories"
    weight: 0.25
    description: "Well-structured taxonomy"
  - type: llm_judge
    criteria: "Conflicting themes are identified — notes that Promoters praise attribution modeling while Detractors cite data discrepancies, or Promoters love customization while Passives find it too complex"
    weight: 0.25
    description: "Conflicting theme identification"
  - type: llm_judge
    criteria: "Analysis approach is scalable — proposes a method that works for 2,000 comments (not just the 15 samples), whether manual coding with team, AI-assisted, or hybrid"
    weight: 0.25
    description: "Scalable analysis approach"
  - type: llm_judge
    criteria: "Qualitative-quantitative presentation is balanced — shows how to present themes alongside scores using frequency counts, word clouds, or theme-by-segment matrices"
    weight: 0.25
    description: "Balanced presentation approach"
