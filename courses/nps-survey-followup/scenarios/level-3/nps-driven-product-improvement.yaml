meta:
  id: nps-driven-product-improvement
  level: 3
  course: nps-survey-followup
  type: output
  description: "Use NPS feedback to drive product improvement decisions by translating customer voice into actionable product priorities"
  tags: [nps, product, improvement, feedback-loop, advanced]

state: {}

trigger: |
  "FormStack" (form builder SaaS) wants to use NPS feedback to
  directly influence their product roadmap. The VP of Product and
  VP of Customer Success need a framework.

  Last quarter's NPS data (600 responses, NPS +24):

  Promoter themes (what they love):
  - "Drag-and-drop builder is intuitive" (65% of Promoter comments)
  - "Template library saves time" (40%)
  - "Great integrations with Zapier/Slack" (35%)

  Passive themes (what's keeping them from being Promoters):
  - "Reporting and analytics are basic" (45% of Passive comments)
  - "Conditional logic is limited" (30%)
  - "Mobile forms look bad" (25%)

  Detractor themes (what's pushing them away):
  - "Can't handle complex multi-page forms" (40% of Detractor comments)
  - "No offline mode" (25%)
  - "API is too limited for our needs" (20%)
  - "Too many bugs in recent updates" (15%)

  Current product roadmap has 20 items. The VP of Product says
  "I can only fit 3 more items next quarter."

  Tasks:

  1. Create a feedback-to-product framework:
     - How do you translate NPS themes into product requirements?
     - How do you weight Promoter feedback vs. Detractor feedback
       vs. Passive feedback in roadmap decisions?
     - How do you avoid being reactive to every complaint?

  2. Recommend which 3 items from the NPS feedback should be added
     to next quarter's roadmap. Justify your choices with:
     - Expected impact on NPS
     - Number of customers affected
     - Strategic alignment
     - Effort estimate

  3. Design the "feedback-to-feature" communication loop:
     - How do you tell customers who requested a feature that it's
       being built?
     - How do you tell customers whose request WON'T be built this
       quarter?
     - How do you announce features that were built from NPS feedback?

  4. How do you measure whether NPS-driven product changes actually
     improved NPS?

assertions:
  - type: llm_judge
    criteria: "Framework balances all segments — doesn't only fix Detractor complaints, also considers Passive conversion opportunities and Promoter reinforcement"
    weight: 0.25
    description: "Balanced segment framework"
  - type: llm_judge
    criteria: "Roadmap recommendations are justified — picks 3 items with clear rationale based on customer count, NPS impact potential, and strategic fit, not just the loudest complaints"
    weight: 0.25
    description: "Justified roadmap picks"
  - type: llm_judge
    criteria: "Communication loop includes 'no' responses — addresses how to tell customers their request won't be built, not just the happy path of feature announcements"
    weight: 0.25
    description: "Complete communication loop"
  - type: llm_judge
    criteria: "Measurement approach is specific — tracks NPS change in the segment that complained about the issue, not just overall NPS, to attribute improvement to specific changes"
    weight: 0.25
    description: "Segment-specific measurement"
