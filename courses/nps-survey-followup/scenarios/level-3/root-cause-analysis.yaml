meta:
  id: root-cause-analysis
  level: 3
  course: nps-survey-followup
  type: output
  description: "Conduct deep root cause analysis on NPS Detractor feedback to identify systemic issues vs. one-off complaints"
  tags: [nps, root-cause, analysis, detractor, advanced]

state: {}

trigger: |
  "DataPipeline" (data integration platform) has seen their NPS
  drop from +35 to +18 over the past 2 quarters. The CEO wants
  to know WHY, not just that it dropped.

  Detractor feedback from the last 2 quarters (150 responses):

  Theme analysis of open-ended comments:
  - "Sync errors / data loss" — 45 mentions (30%)
  - "Slow customer support" — 38 mentions (25%)
  - "Price increase was too much" — 28 mentions (19%)
  - "Missing integrations" — 22 mentions (15%)
  - "UI is confusing" — 17 mentions (11%)

  Additional context:
  - Engineering released a major platform update 5 months ago
  - Support team lost 3 of 8 agents 4 months ago (not replaced)
  - Price increased 20% for all plans 6 months ago
  - 2 major competitors launched competing products at lower prices
  - Sync error rate increased 3x after the platform update

  Tasks:

  1. Conduct a "5 Whys" analysis on the top 3 complaint themes.
     For each, trace the root cause chain back to the systemic issue.

  2. Separate symptoms from root causes. Some complaints may share
     the same root cause. Create a root cause map showing:
     - Which complaints are symptoms of the same underlying issue
     - Which are independent problems
     - Which are most impactful to fix

  3. Prioritize the root causes using an impact/effort matrix:
     - High impact / Low effort (quick wins)
     - High impact / High effort (strategic investments)
     - Low impact / Low effort (nice to have)
     - Low impact / High effort (deprioritize)

  4. Write the root cause analysis report for the CEO that explains
     the NPS drop and recommends a recovery plan with timeline.

assertions:
  - type: llm_judge
    criteria: "5 Whys analysis reaches systemic causes — traces sync errors back to the platform update, support issues to staffing loss, and pricing to competitive positioning, not surface-level conclusions"
    weight: 0.25
    description: "Deep root cause tracing"
  - type: llm_judge
    criteria: "Connected root causes are identified — recognizes that sync errors and slow support may compound (sync errors create more tickets, understaffed support can't handle volume)"
    weight: 0.25
    description: "Connected cause identification"
  - type: llm_judge
    criteria: "Impact/effort prioritization is logical — fixing sync errors is likely highest impact, rehiring support is medium effort/high impact, price rollback is complex"
    weight: 0.25
    description: "Logical prioritization"
  - type: llm_judge
    criteria: "CEO report is actionable — presents findings clearly with specific recovery actions, owners, timelines, and expected NPS impact of each fix"
    weight: 0.25
    description: "Actionable CEO report"
