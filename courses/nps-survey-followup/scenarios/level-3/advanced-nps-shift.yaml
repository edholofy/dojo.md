meta:
  id: advanced-nps-shift
  level: 3
  course: nps-survey-followup
  type: output
  description: "Handle a week of complex NPS scenarios including cross-functional escalations, trend analysis, and program improvement"
  tags: [nps, simulation, advanced, cross-functional, week-management]

state: {}

trigger: |
  You're the NPS Program Manager at "CloudCommerce" (e-commerce
  platform SaaS, $35M ARR, 2,500 accounts). This week is unusually
  complex.

  Monday: Quarterly NPS results just came in.
  - Overall NPS dropped from +32 to +26 (first decline in 3 quarters)
  - Enterprise segment: +40 → +42 (improved)
  - Mid-market segment: +30 → +18 (significant drop)
  - SMB segment: +28 → +25 (slight drop)
  - Response rate: 42% (healthy)
  - 180 new Detractor responses to process

  Tuesday: You discover the mid-market drop correlates with a pricing
  change that affected mid-market plans 2 months ago (15% increase).
  35 of the 180 Detractor responses mention pricing.

  Wednesday: Your largest Enterprise account ($180K ARR) submitted
  a score of 2 with: "Your platform cost us $50K in lost sales during
  Black Friday due to downtime." The CEO is CC'd on their complaint.

  Thursday: The Product team pushes back on NPS-driven feature
  requests. Their PM says: "NPS feedback isn't representative. Only
  unhappy people respond. We should build what we think is right."

  Friday: Your VP asks for a plan to recover mid-market NPS by next
  quarter.

  Tasks:
  1. Monday: Write the internal NPS summary email to leadership
     highlighting the drop and initial analysis.
  2. Wednesday: Write the follow-up to the Enterprise account and
     design the escalation plan. The CEO is watching.
  3. Thursday: Respond to the Product team's pushback with data and
     logic. How do you make the case for NPS-driven development?
  4. Friday: Present your mid-market recovery plan (specific actions,
     timeline, expected NPS impact).

assertions:
  - type: llm_judge
    criteria: "Leadership email is honest about the drop — presents the decline from +32 to +26 with context (mid-market pricing impact) without hiding bad news or over-explaining"
    weight: 0.25
    description: "Honest leadership communication"
  - type: llm_judge
    criteria: "Enterprise escalation is CEO-aware — the follow-up and escalation plan accounts for the CEO's visibility, with executive-level response and financial remediation discussion"
    weight: 0.25
    description: "CEO-aware escalation"
  - type: llm_judge
    criteria: "Product pushback response is data-backed — addresses the 'only unhappy people respond' claim with response rate data and segment analysis, not just assertions"
    weight: 0.25
    description: "Data-backed product response"
  - type: llm_judge
    criteria: "Mid-market recovery plan addresses pricing — includes specific actions to address the pricing concern (value communication, grandfathering, or pricing adjustment) alongside other improvements"
    weight: 0.25
    description: "Pricing-aware recovery plan"
