meta:
  id: nps-cultural-adaptation
  level: 3
  course: nps-survey-followup
  type: output
  description: "Adapt NPS follow-up strategies for different cultural contexts where scoring patterns and communication norms vary significantly"
  tags: [nps, cultural, international, adaptation, advanced]

state: {}

trigger: |
  "GlobalSaaS" operates in 6 markets and has noticed significant
  NPS scoring differences that they suspect are cultural, not
  product-related.

  NPS by region (same product, same features):
  - United States: NPS +42
  - United Kingdom: NPS +28
  - Germany: NPS +15
  - Japan: NPS -8
  - Brazil: NPS +55
  - India: NPS +48

  Specific observations:
  - Japan: Almost no one scores 9-10. Most scores are 6-7. Comments
    are minimal and polite. "The product is satisfactory."
  - Germany: Scores cluster at 7-8. Comments are detailed and
    specific. "Feature X works well but Y needs improvement."
  - Brazil: Lots of 9s and 10s with enthusiastic comments. "Amazing!
    Love everything about it!"
  - India: High scores but open-ended comments often mention issues.
    Score 9 with comment "Good but support response time needs work."

  The Head of Global CX asks: "Is our product really terrible in
  Japan and amazing in Brazil? Or is something else going on?"

  Tasks:

  1. Explain the cultural factors behind these scoring differences:
     - Why do Japanese customers score lower?
     - Why do Brazilian customers score higher?
     - Why do German customers cluster in the middle?
     - Why do Indian customers give high scores with critical comments?

  2. Should GlobalSaaS use the same NPS benchmarks across all
     regions? If not, how should they set regional benchmarks?

  3. How should follow-up strategies differ by culture?
     - Japanese Passive (score 7) vs. American Passive (score 7)
     - Brazilian Promoter (score 10) vs. German Promoter (score 9)
     - How does communication tone and approach change?

  4. Design a "culturally calibrated" NPS reporting framework that
     allows meaningful comparison across regions without misleading
     the leadership team.

assertions:
  - type: llm_judge
    criteria: "Cultural explanations are nuanced — explains Japanese scoring in terms of cultural modesty and recommendation risk, not poor product performance"
    weight: 0.25
    description: "Nuanced cultural explanations"
  - type: llm_judge
    criteria: "Regional benchmarks are recommended — argues against using a single global benchmark and suggests tracking trends within regions rather than comparing absolute scores"
    weight: 0.25
    description: "Regional benchmark recommendation"
  - type: llm_judge
    criteria: "Follow-up strategies adapt to culture — Japanese follow-up is more formal and relationship-focused, Brazilian more expressive, German more direct and solution-oriented"
    weight: 0.25
    description: "Culturally adapted follow-ups"
  - type: llm_judge
    criteria: "Reporting framework prevents misleading comparisons — uses year-over-year trend within region, percentile ranking against regional peers, or score normalization"
    weight: 0.25
    description: "Non-misleading reporting framework"
