meta:
  id: government-contract-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review a government services contract and summarize compliance requirements, FAR clauses, and performance obligations for a first-time government contractor"
  tags: [government, far-clauses, compliance, intermediate]

state: {}

trigger: |
  You're the CEO of a 75-person IT services company
  that has never done government work before. Your company
  won a competitive bid for a $2.4M, 3-year IT support
  services contract with a federal civilian agency. The
  Contracting Officer has sent the contract for execution.
  Your CFO is concerned about the compliance burden, and
  your COO worries about the operational requirements.

  Key contract terms:
  - Contract type: Firm Fixed Price (FFP) with Time &
    Materials (T&M) for surge support
  - Base period: 1 year; two 1-year option periods
    (government's option to extend)
  - Base value: $800,000/year; option years at same rate
  - Surge T&M: "Ceiling of $150,000 per year for
    additional support at approved labor rates"
  - Performance location: Government facility; on-site
    Monday-Friday, 7AM-6PM
  - Key personnel: "Contract Manager and Lead Systems
    Engineer are designated Key Personnel. Contractor
    shall not substitute Key Personnel without prior
    written approval of the Contracting Officer"
  - Quality Assurance Surveillance Plan (QASP):
    Monthly performance evaluations; metrics include
    response times, resolution rates, customer
    satisfaction scores; minimum acceptable: 95%
  - Contractor Performance Assessment Reports (CPARs):
    Annual performance evaluations entered into federal
    database; ratings affect future contract eligibility
  - Security: All contractor personnel require background
    investigation (Public Trust clearance); Contractor
    bears all costs; process takes 3-6 months
  - FAR clauses incorporated by reference (selected):
    * 52.222-26: Equal Opportunity
    * 52.222-35: Equal Opportunity for Veterans
    * 52.222-36: Equal Opportunity for Workers with
      Disabilities
    * 52.222-41: Service Contract Labor Standards
      (formerly Service Contract Act)
    * 52.223-3: Hazardous Material Identification
    * 52.232-33: Payment by Electronic Funds Transfer
    * 52.244-6: Subcontracts for Commercial Products
    * 52.249-8: Default (Fixed-Price Supply and Service)
  - Invoicing: Monthly invoicing through government
    electronic system (IPP); Net 30 (Prompt Payment Act)
  - Termination for convenience: "Government may
    terminate the contract at any time for convenience
    with 30 days' notice. Contractor shall be paid for
    work performed plus reasonable termination costs"
  - Termination for default: "Government may terminate
    for failure to perform with 10 days' cure notice"
  - Organizational conflict of interest: "Contractor
    shall not provide services that create an actual or
    potential conflict of interest with other government
    contracts"
  - Data rights: "All deliverables, reports, and
    documentation are government property. Contractor
    retains rights to pre-existing IP but grants
    government unlimited rights to use within government"

  Task: Write a comprehensive briefing memo for your
  CFO and COO covering the compliance requirements,
  operational obligations, financial risks, and what
  infrastructure your company needs to build to
  successfully perform this contract.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains government contracting requirements — translates FAR clauses and government contract terms into plain language; explains what Service Contract Labor Standards (SCA) means for wage rates and benefits; explains the FFP vs T&M components; clarifies what 'termination for convenience' means (government can cancel without cause); explains CPARs and their long-term impact; the briefing is accessible to executives new to government contracting."
    weight: 0.35
    description: "ClearGovContractBriefing"
  - type: llm_judge
    criteria: "Response identifies compliance and operational risks — flags the security clearance timeline and cost (3-6 months for Public Trust, may delay contract start); identifies SCA compliance burden (prevailing wage determinations, health/welfare fringe benefits, paid holidays); flags the Key Personnel restriction (losing designated staff creates contract risk); evaluates the 95% QASP threshold; identifies the option year risk (government may not exercise options); flags the default termination impact on past performance record; identifies missing compliance infrastructure (accounting system, timekeeping, equal opportunity plan, subcontracting plan)."
    weight: 0.35
    description: "ComplianceRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical readiness recommendations — identifies specific infrastructure needs (DCAA-compliant accounting system, government invoicing system access, security clearance processing); recommends compliance training for staff; suggests timeline for readiness activities; estimates compliance costs that should be factored into profitability analysis; recommends consulting with a government contracts attorney; the recommendations are practical for a first-time government contractor and prioritized by urgency."
    weight: 0.30
    description: "ReadinessRecommendations"
