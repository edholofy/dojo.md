meta:
  id: franchise-agreement-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review a franchise disclosure document and agreement, summarizing financial obligations, operational controls, and termination risks for a prospective franchisee"
  tags: [franchise, fdd, disclosure, intermediate]

state: {}

trigger: |
  You're a prospective franchisee considering opening a
  fast-casual restaurant franchise. You've received the
  Franchise Disclosure Document (FDD) and Franchise
  Agreement. You have $350,000 in savings and are
  planning to invest your retirement funds. Your spouse
  is concerned about the level of commitment. You want
  to create a thorough summary before your meeting with
  a franchise attorney next week.

  Key terms from the FDD and Franchise Agreement:
  - Initial franchise fee: $45,000 (non-refundable)
  - Estimated initial investment: $380,000-$520,000
    (including franchise fee, build-out, equipment,
    initial inventory, working capital)
  - Royalty: 6% of gross sales, paid weekly
  - Marketing fund: 2% of gross sales to national
    marketing fund; additional 1% for local marketing
    at franchisee's expense
  - Term: 10 years with one 10-year renewal option
    (renewal fee: $15,000; must meet "then-current"
    standards which may require renovation)
  - Territory: "Protected territory within a 3-mile
    radius of the restaurant. Franchisor reserves the
    right to operate or franchise within the territory
    through non-traditional venues (airports, stadiums,
    food halls, ghost kitchens, delivery-only)"
  - Site selection: Franchisor must approve location;
    franchisee responsible for securing lease
  - Build-out: Must use Franchisor's approved architects,
    contractors, and equipment vendors
  - Operating standards: Detailed operations manual
    (400+ pages); "Franchisee must comply with all
    standards, which Franchisor may modify at any time"
  - Supplier restrictions: Must purchase from approved
    suppliers; Franchisor or its affiliates may be
    approved suppliers; "Franchisor may receive rebates
    or commissions from approved suppliers"
  - Hours: "Minimum operating hours: 11AM-10PM daily,
    7 days per week"
  - Staffing: Franchisee must complete 4-week training
    program; must employ a certified General Manager at
    all times; Franchisee or designated operator must
    devote full-time attention to the business
  - Financial reporting: Monthly P&L and quarterly
    financial statements to Franchisor; Franchisor may
    audit at any time
  - Transfer: Requires Franchisor's consent; Franchisor
    has right of first refusal; transfer fee of $15,000;
    buyer must complete training and meet standards
  - Termination by Franchisor: For cause — including
    failure to maintain standards, failure to pay fees,
    bankruptcy, felony conviction, abandonment; also for
    underperformance: "If Franchisee's gross sales fall
    below 75% of the system average for comparable
    restaurants for 2 consecutive quarters"
  - Post-termination: 2-year non-compete within 10 miles;
    Franchisee must de-identify the restaurant within
    30 days at Franchisee's expense; all proprietary
    recipes, manuals returned
  - Personal guarantee: Franchisee and spouse must
    personally guarantee all obligations
  - Item 19 (Financial Performance): Disclosed; median
    gross sales $1.1M; top quartile $1.6M; bottom
    quartile $740,000; no net income figures provided
  - Litigation history: 12 lawsuits in past 3 years (8
    by terminated franchisees)

  Task: Write a comprehensive investment analysis covering
  the financial obligations, operational restrictions,
  risk factors, and key questions to discuss with your
  franchise attorney.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive financial analysis — calculates total ongoing costs as percentage of gross sales (6% royalty + 2% marketing fund + 1% local marketing = 9% off the top); projects realistic financial scenarios using Item 19 data (median, top/bottom quartile); factors in the initial investment range vs available savings ($350K savings vs $380-520K required — likely needs financing); calculates what gross sales level is needed to make the investment viable; identifies hidden costs (approved vendor markups, supplier rebates to Franchisor, renovation at renewal)."
    weight: 0.35
    description: "ComprehensiveFinancialAnalysis"
  - type: llm_judge
    criteria: "Response identifies critical risks — flags the personal guarantee requirement for both franchisee and spouse (retirement funds at risk); identifies the territory carve-out for non-traditional venues (ghost kitchens, delivery could cannibalize sales within 'protected' territory); flags the 75% system average termination threshold (performance below median could trigger termination); evaluates the 8 lawsuits from terminated franchisees as a red flag; flags the unilateral right to change operating standards and approved suppliers; evaluates the operational restrictions (full-time commitment, minimum hours, staffing requirements)."
    weight: 0.35
    description: "CriticalRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical questions and recommendations — lists specific questions for the franchise attorney (territory protection, supplier rebate disclosure, system average calculation methodology, renewal renovation costs); recommends talking to existing and former franchisees; suggests specific due diligence steps; provides an honest assessment of whether this is a suitable investment given the family's financial situation; the advice is practical and considers the personal/family impact."
    weight: 0.30
    description: "PracticalQuestionsAndAdvice"
