meta:
  id: settlement-agreement-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review an employment dispute settlement agreement and summarize release scope, payment terms, and post-settlement obligations"
  tags: [settlement, employment-dispute, release, intermediate]

state: {}

trigger: |
  You're the HR Director at a 250-person technology
  company. A former senior product manager (Sarah Chen)
  filed an EEOC charge and state complaint alleging
  gender discrimination, hostile work environment, and
  retaliation after she was terminated during a
  reorganization. After 4 months of mediation, both
  sides have agreed in principle to settle. Outside
  counsel has drafted a settlement agreement for your
  review before presenting it to the Board for approval.

  Key settlement agreement terms:
  - Settlement amount: $185,000 total
    * $85,000 allocated to lost wages (subject to
      W-2 withholding)
    * $50,000 allocated to emotional distress (1099)
    * $50,000 allocated to attorney's fees (1099 to
      attorney)
  - Payment: Single lump sum within 14 days of execution
  - Release: "Claimant releases and forever discharges
    Company, its officers, directors, employees, agents,
    successors, and assigns from any and all claims,
    known or unknown, arising from or related to
    Claimant's employment or termination, including but
    not limited to claims under Title VII, ADA, ADEA,
    FMLA, state discrimination laws, wrongful
    termination, breach of contract, defamation, and
    intentional infliction of emotional distress"
  - ADEA waiver: "Claimant specifically waives all claims
    under the Age Discrimination in Employment Act. This
    waiver is knowing and voluntary. Claimant has 21
    days to consider this Agreement and 7 days to revoke
    after signing"
  - Covenant not to sue: "Claimant agrees not to file
    any lawsuit, charge, complaint, or claim against
    Company arising from matters released herein.
    Nothing in this Agreement prevents Claimant from
    filing a charge with the EEOC, but Claimant waives
    the right to recover any monetary relief"
  - Non-disparagement: Mutual — "Neither party shall
    make disparaging statements about the other.
    Company's obligation extends to current executives
    and HR personnel only"
  - Neutral reference: "Company shall provide a neutral
    employment verification confirming dates of
    employment and title only"
  - Confidentiality: "Claimant shall not disclose the
    terms or existence of this Agreement to any person
    other than Claimant's spouse, attorney, or tax
    advisor. Violation of this provision entitles
    Company to recover the full settlement amount as
    liquidated damages"
  - Non-admission: "This Agreement does not constitute
    an admission of wrongdoing by either party"
  - Social media: "Claimant shall remove any social media
    posts referencing the Company, the employment
    relationship, or the circumstances of separation
    within 7 days of execution"
  - Return of property: Claimant confirms return of all
    Company property; Company will ship personal items
    within 14 days
  - Cooperation: "Claimant shall cooperate with Company
    in any pending or future litigation relating to
    matters within Claimant's knowledge during
    employment, provided Company reimburses reasonable
    expenses"
  - Governing law: State of California
  - Integration: "This Agreement constitutes the entire
    agreement between the parties"

  Task: Write a review memo for your CEO and General
  Counsel evaluating the settlement agreement terms,
  identifying any provisions that may be problematic
  or unenforceable, and recommending any changes before
  presenting to the Board.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains the settlement structure — breaks down the payment allocation and tax implications ($85K wages/W-2 vs $50K emotional distress/1099 vs $50K attorney fees); explains the scope of the release and what claims are covered; clarifies the ADEA waiver requirements (21-day consideration, 7-day revocation); explains the covenant not to sue vs EEOC charge distinction; the review is structured for Board-level presentation."
    weight: 0.35
    description: "ClearSettlementReview"
  - type: llm_judge
    criteria: "Response identifies legal and practical risks — flags the confidentiality clawback provision (full repayment as liquidated damages may be unenforceable in California as a penalty); evaluates the non-disparagement scope (asymmetric — Claimant fully bound but Company only extends to current executives/HR); flags the social media removal provision (may be overly broad and potentially implicate free speech or NLRA Section 7 rights); evaluates whether the release language adequately covers all potential claims; identifies any recent legal developments affecting settlement confidentiality provisions (e.g., SPEAK OUT Act, state laws limiting NDAs in discrimination cases); evaluates the cooperation clause."
    weight: 0.35
    description: "LegalRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical recommendations — suggests modifications to improve enforceability (reasonable liquidated damages instead of full clawback, broadening Company non-disparagement obligation, modifying social media clause scope); recommends Board talking points (settlement cost vs litigation cost analysis, precedent implications); suggests compliance steps (preserve investigation file, update management training); the recommendations balance legal protection with practical enforcement concerns."
    weight: 0.30
    description: "PracticalRecommendations"
