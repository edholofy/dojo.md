meta:
  id: software-licensing-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review and compare enterprise software license agreements with different models and summarize implications for IT procurement"
  tags: [software-license, enterprise, procurement, intermediate]

state: {}

trigger: |
  You're the IT Director at a 300-person professional
  services firm. You're evaluating two enterprise CRM
  platforms and need to compare their licensing agreements
  before making a recommendation to the executive team.
  Both are 3-year commitments.

  VENDOR A — Perpetual License Model:
  - License: Perpetual license for up to 300 named users
  - Upfront cost: $185,000 for software licenses
  - Annual maintenance: $37,000/year (20% of license
    fee) — includes updates, patches, and phone support
  - Maintenance escalation: "Maintenance fees may increase
    by up to 7% annually upon renewal"
  - Hosting: On-premise; customer responsible for servers,
    security, backups
  - Customization: Full API access; customer owns all
    customizations
  - Data: All data stored on customer's servers; full
    control and ownership
  - Termination: License is perpetual but maintenance
    can be cancelled; "Reinstatement of lapsed
    maintenance requires payment of all missed fees
    plus 150% of current annual maintenance"
  - Audit rights: "Vendor may audit Customer's license
    usage once per year with 30 days' notice"
  - Warranty: 90 days; software will "substantially
    conform to documentation"
  - Liability cap: 1x the license fees paid
  - 3-year total cost: ~$296,000 + infrastructure

  VENDOR B — SaaS Subscription Model:
  - Subscription: 300 named user seats, monthly billing
  - Monthly cost: $85/user/month ($25,500/month)
  - Annual commitment: $306,000/year; 3-year term
  - Pricing: "Vendor may adjust pricing with 60 days'
    notice prior to each renewal year"
  - Seat minimum: "Customer commits to minimum of 250
    seats throughout the term"
  - Hosting: Cloud-hosted; Vendor responsible for
    infrastructure, security, SOC 2 Type II certified
  - Customization: Configuration only; no source code
    access; "Vendor is not responsible for maintaining
    compatibility with Customer's customizations through
    platform updates"
  - Data: Vendor hosts all data; "Customer retains
    ownership. Upon termination, data available for
    export in standard format for 60 days"
  - Termination: No early termination; annual payments
    non-refundable; auto-renews for 1-year periods
  - SLA: 99.9% uptime; service credits of 5% monthly
    fee per 0.1% below SLA
  - Integration: REST API with rate limits (1,000
    calls/minute)
  - Liability cap: Fees paid in prior 12 months
  - Consequential damages: Excluded entirely
  - 3-year total cost: $918,000

  Task: Write a comparative analysis memo for the executive
  team covering total cost of ownership, risk allocation,
  data control, operational implications, and a
  recommendation with reasoning.

assertions:
  - type: llm_judge
    criteria: "Response provides a thorough comparative analysis — calculates accurate total cost of ownership for both options (including hidden costs: Vendor A infrastructure, IT staff, security; Vendor B seat minimums, potential price increases); compares data control and ownership implications; evaluates operational differences (on-prem vs cloud management); presents the comparison in a format executives can quickly digest with clear side-by-side evaluation."
    weight: 0.35
    description: "ThoroughComparison"
  - type: llm_judge
    criteria: "Response identifies risks in both agreements — for Vendor A: maintenance reinstatement penalty (150% + back fees creates lock-in), audit rights risk, 90-day warranty limitation, infrastructure burden; for Vendor B: 3-year lock-in with no early termination, pricing uncertainty at renewal, seat minimum commitment, customization fragility, data portability limitations (60-day window, 'standard format'), rate limiting on integrations; evaluates which risks are more manageable for a 300-person professional services firm."
    weight: 0.35
    description: "RisksInBothAgreements"
  - type: llm_judge
    criteria: "Response provides a clear recommendation with reasoning — makes a definitive recommendation (not just 'it depends'); considers the firm's size, IT capabilities, growth trajectory, and industry context; suggests specific negotiation points for the recommended vendor; the recommendation accounts for both short-term and long-term implications; acknowledges trade-offs honestly."
    weight: 0.30
    description: "ClearRecommendation"
