meta:
  id: distribution-agreement-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review an exclusive distribution agreement and summarize territory rights, minimum purchase obligations, and termination risks"
  tags: [distribution, exclusive-territory, minimum-purchase, intermediate]

state: {}

trigger: |
  You're the VP of Sales at a consumer electronics
  company that manufactures premium Bluetooth speakers.
  A regional distributor wants exclusive distribution
  rights for the Southeast US (8 states). They've
  proposed a 3-year exclusive distribution agreement.
  Your CEO is excited about the deal but wants you to
  review the terms carefully — the company's last
  exclusive distribution deal ended in litigation.

  Key distribution agreement terms:
  - Territory: Exclusive distribution rights for AL, FL,
    GA, LA, MS, NC, SC, TN
  - Term: 3 years, auto-renewing for 1-year periods
  - Exclusivity: "Manufacturer shall not sell or
    authorize any other distributor to sell Products in
    the Territory during the Term. Manufacturer shall
    refer all Territory inquiries to Distributor"
  - Minimum purchase: Year 1: $400,000; Year 2: $550,000;
    Year 3: $700,000 — "Failure to meet minimum purchase
    obligations shall not constitute a breach but shall
    give Manufacturer the right to convert the agreement
    to non-exclusive"
  - Pricing: "Manufacturer shall sell Products to
    Distributor at 55% of MSRP. Manufacturer may adjust
    MSRP with 60 days' notice"
  - MAP policy: Distributor agrees to Minimum Advertised
    Price policy; violations subject to written warning,
    then termination
  - Payment: Net 30 from shipment; 2% discount for
    payment within 10 days
  - Returns: "Distributor may return defective Products
    within 30 days of delivery. No returns for non-
    defective Products"
  - Marketing: "Distributor shall spend a minimum of 3%
    of annual purchases on local marketing and provide
    quarterly marketing activity reports"
  - Warranty: Manufacturer provides 1-year product
    warranty; Distributor handles first-level warranty
    claims and is reimbursed for warranty labor at $45/hr
  - Intellectual property: "Distributor receives a limited
    license to use Manufacturer's trademarks solely for
    resale purposes. All trademark use must be pre-
    approved by Manufacturer"
  - Termination: Either party may terminate with 90 days'
    notice; Manufacturer may terminate immediately for:
    MAP violation (after warning), failure to meet
    minimums for 2 consecutive quarters, bankruptcy, or
    change of control
  - Post-termination: "Upon termination, Distributor may
    sell remaining inventory for 120 days. Manufacturer
    shall repurchase unsold inventory at original cost
    minus 15% restocking fee"
  - Non-compete: "During the Term and for 12 months
    after, Distributor shall not distribute competing
    products in the Territory"
  - Indemnification: Mutual; each party indemnifies for
    its own negligence and IP infringement
  - Governing law: State of Georgia

  Task: Write a comprehensive review for your CEO
  analyzing the deal structure, evaluating whether the
  terms are favorable for the manufacturer, identifying
  risks, and recommending negotiation positions.

assertions:
  - type: llm_judge
    criteria: "Response provides a clear deal structure analysis — explains the economics (45% margin to distributor, minimum purchase obligations creating $1.65M in committed revenue over 3 years, marketing spend requirements); evaluates the exclusivity trade-off (giving up direct sales and other distributor options in 8 states vs guaranteed minimum purchases); analyzes the auto-renewal implications; presents the financial picture clearly for CEO decision-making."
    weight: 0.35
    description: "ClearDealAnalysis"
  - type: llm_judge
    criteria: "Response identifies strategic and legal risks — evaluates whether minimum purchase amounts are realistic for the territory; flags the MSRP adjustment clause (Manufacturer could squeeze distributor margins by raising MSRP); assesses the exclusivity conversion mechanism (minimum not met = non-exclusive, not termination — is this enough leverage?); evaluates the post-termination inventory repurchase with 15% restocking fee; flags the non-compete enforceability; identifies channel conflict risks; evaluates whether the terms adequately protect against the prior litigation scenario."
    weight: 0.35
    description: "StrategicRisksIdentified"
  - type: llm_judge
    criteria: "Response provides CEO-level recommendations — recommends specific negotiation positions (minimum purchase thresholds, exclusivity protections, MSRP adjustment limitations, warranty reimbursement rates); suggests performance milestones beyond just purchase minimums; recommends specific contract protections based on prior litigation experience; balances protecting the manufacturer with creating a partnership that motivates the distributor to perform."
    weight: 0.30
    description: "CEOLevelRecommendations"
