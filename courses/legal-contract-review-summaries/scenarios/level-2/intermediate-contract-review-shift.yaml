meta:
  id: intermediate-contract-review-shift
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Handle an intermediate shift with interconnected contracts, regulatory considerations, and competing stakeholder priorities"
  tags: [shift-simulation, multi-contract, stakeholder, intermediate]

state: {}

trigger: |
  You're the in-house paralegal at a 500-person
  healthcare technology company. Your General Counsel
  is in trial all week and has left you three urgent
  contract matters, each involving different stakeholders
  with conflicting priorities:

  MATTER 1 — Hospital System Master Agreement:
  Your largest customer (a 12-hospital system, $4.2M
  annual contract) wants to renegotiate their master
  agreement before renewal next month. They've sent a
  redlined version with the following changes:
  - Reducing the liability cap from 2x annual fees to
    1x annual fees for the vendor (you)
  - Adding HIPAA Business Associate Agreement language
    requiring you to indemnify the hospital for ANY
    breach of PHI, regardless of fault
  - Adding a "most favored customer" clause: "Vendor
    shall not offer more favorable pricing to any
    similarly situated customer"
  - Reducing the auto-renewal notice period from 90 to
    30 days
  - Adding termination for convenience with 60 days'
    notice (currently requires 180 days)
  Your VP of Sales says: "Just sign it — we can't lose
  this account. They're 18% of our revenue."

  MATTER 2 — Series B Investment Documents:
  Your company is closing a $15M Series B round next
  week. The lead investor's counsel has flagged that
  your customer contracts contain "change of control"
  provisions that could allow customers to terminate if
  ownership changes. The investor wants:
  - A schedule of all customer contracts with change-of-
    control provisions
  - Confirmation that the Series B does not trigger any
    change-of-control provisions
  - A covenant that the company will not enter into new
    contracts with change-of-control termination rights
    without investor consent
  Your CFO says: "The investors need this by Wednesday
  or the round may fall apart."

  MATTER 3 — Employee Separation Agreement:
  Your VP of Engineering was terminated yesterday for
  performance issues. He's demanding a $400,000 severance
  package (12 months' salary), threatening to go to
  competitors with knowledge of your proprietary
  algorithms. His employment agreement has:
  - 6-month non-compete (but the company is in
    California)
  - Standard invention assignment clause
  - No specific severance provision
  - Confidentiality clause covering "proprietary
    information" but no specific mention of algorithms
  Your CEO says: "Pay whatever it takes to keep him quiet."

  Task: Write a prioritized action plan for your General
  Counsel covering all three matters — analysis of each
  issue, identification of interconnections between the
  matters, and recommended actions with a realistic
  timeline for the week.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive analysis of all three matters — evaluates the hospital system redlines against business impact and legal risk; analyzes the Series B change-of-control issue including its connection to Matter 1; assesses the separation agreement considering California non-compete enforceability, trade secret protections, and the CEO's instruction; each analysis is substantive and legally informed."
    weight: 0.35
    description: "ComprehensiveAnalysis"
  - type: llm_judge
    criteria: "Response identifies interconnections and hidden risks — connects Matter 1 (hospital redlines) to Matter 2 (does the hospital contract have a change-of-control provision? the redline could be an opportunity to remove it); connects Matter 3 (VP of Engineering departure) to Matter 2 (investor due diligence may surface the departure as a material risk); flags the CEO's instruction to 'pay whatever it takes' as creating potential precedent and board governance issues; flags that Matter 1's 'most favored customer' clause could affect all future customer negotiations; identifies the California non-compete unenforceability."
    weight: 0.35
    description: "InterconnectionsIdentified"
  - type: llm_judge
    criteria: "Response provides prioritized, realistic action plan — creates a day-by-day timeline for the week; prioritizes by deadline and business impact (Series B by Wednesday, hospital renewal next month, separation negotiation ongoing); suggests what can be handled by the paralegal vs what needs GC involvement; recommends specific positions for each matter; identifies which stakeholder instructions to follow and which to push back on; the plan is practical for a paralegal working without GC support for a week."
    weight: 0.30
    description: "PrioritizedActionPlan"
