meta:
  id: joint-venture-agreement-review
  level: 2
  course: legal-contract-review-summaries
  type: output
  description: "Review a joint venture agreement between two companies and summarize governance, capital obligations, IP contributions, and exit mechanisms"
  tags: [joint-venture, governance, ip-contribution, intermediate]

state: {}

trigger: |
  You're the General Counsel at a mid-size biotech
  company (200 employees, $85M revenue). Your company
  has developed a promising drug delivery technology
  platform. A large pharmaceutical company ($12B revenue)
  wants to form a joint venture to commercialize the
  technology for oncology applications. This is
  potentially transformative for your company, but the
  power imbalance is significant. The pharma company
  has sent a draft JV agreement.

  Key JV agreement terms:
  - Structure: New LLC jointly owned — Pharma Co 60%,
    Biotech (you) 40%
  - Capital: Pharma Co contributes $30M cash; Biotech
    contributes exclusive license to drug delivery
    technology platform (valued at $20M by mutual
    agreement)
  - Governance: 5-member Board — Pharma Co appoints 3,
    Biotech appoints 2
  - Major decisions requiring supermajority (4 of 5):
    Annual budget >$5M variance, new product development
    programs, licensing to third parties, hiring/firing
    CEO, amendments to JV agreement
  - Day-to-day management: CEO appointed by Pharma Co;
    CSO appointed by Biotech
  - Funding: "Additional capital requirements shall be
    funded pro rata (60/40). If either party fails to
    fund its share within 60 days, the non-defaulting
    party may fund the shortfall and the defaulting
    party's ownership percentage shall be diluted
    proportionally"
  - IP: "Background IP remains with each party. Foreground
    IP (developed within the JV) shall be owned by the
    JV. Upon dissolution, Foreground IP shall be owned
    by the party contributing the most relevant
    Background IP, as determined by independent expert"
  - Field of use: "JV shall operate exclusively in
    oncology drug delivery. Biotech shall not license
    its technology platform to any third party for
    oncology applications during the JV term"
  - Competing activities: "Neither party shall engage in
    activities that directly compete with the JV's
    business in the oncology drug delivery field"
  - Term: 10 years, renewable by mutual agreement
  - Exit: Either party may sell its interest — other
    party has right of first refusal at fair market
    value (determined by independent appraiser). Drag-
    along rights: If 60%+ owner finds a buyer for 100%
    of JV, minority must sell at same price per unit
  - Deadlock: "If the Board cannot reach supermajority on
    a major decision after 60 days, the matter shall be
    escalated to each party's CEO. If still unresolved
    after 30 days, either party may initiate buy-sell
    proceedings (Russian roulette clause)"
  - Non-solicitation: 2 years post-termination
  - Governing law: State of Delaware

  Task: Write a strategic assessment for your CEO and
  Board evaluating the JV terms, identifying provisions
  that disadvantage the minority partner, and recommending
  specific changes to protect the biotech's interests.

assertions:
  - type: llm_judge
    criteria: "Response provides a strategic assessment of the JV — evaluates the governance structure realistically (3-2 board gives Pharma Co majority; supermajority requirement for major decisions provides some protection but not for day-to-day operations; CEO appointed by Pharma Co controls operations); analyzes the IP contribution valuation ($20M for the technology platform — is this adequate?); evaluates the field-of-use restriction impact on Biotech's overall business; the analysis considers the power dynamics between a $85M biotech and a $12B pharma."
    weight: 0.35
    description: "StrategicJVAssessment"
  - type: llm_judge
    criteria: "Response identifies minority partner risks — flags the dilution risk (if Biotech can't fund pro-rata capital calls, ownership dilutes below protective thresholds); flags the drag-along rights (Pharma Co at 60% can force a sale); flags the Foreground IP ownership determination (subjective 'most relevant Background IP' standard); flags the oncology field-of-use restriction limiting Biotech's core technology; evaluates the Russian roulette deadlock mechanism (financially disadvantages the smaller party); flags the CEO appointment by majority owner; identifies the risk that Biotech contributes its core IP but loses control."
    weight: 0.35
    description: "MinorityPartnerRisks"
  - type: llm_judge
    criteria: "Response provides strategic recommendations — suggests specific governance protections (veto rights on key decisions, board observer rights, information rights); recommends IP protections (clear ownership provisions, license-back rights upon dissolution, field-of-use carve-outs for non-oncology); suggests anti-dilution protections; recommends modifying exit mechanisms to protect minority value; suggests performance milestones and funding commitments; the recommendations are sophisticated enough for a biotech board but practical given the negotiating dynamics."
    weight: 0.30
    description: "StrategicRecommendations"
