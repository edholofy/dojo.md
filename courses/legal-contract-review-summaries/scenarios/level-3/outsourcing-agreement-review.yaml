meta:
  id: outsourcing-agreement-review
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review a comprehensive IT outsourcing agreement with service levels, transition planning, and benchmarking provisions"
  tags: [outsourcing, it-services, sla-framework, advanced]

state: {}

trigger: |
  You're the CIO at a mid-size insurance company (1,200
  employees, $800M GWP). The company is outsourcing its
  IT infrastructure management (data center, network,
  end-user computing, service desk) to a Tier 1 IT
  services provider. The 7-year, $45M contract is the
  largest procurement your company has undertaken. Your
  CEO and Board want a comprehensive review before
  approval.

  Key outsourcing agreement terms:
  - Scope: IT infrastructure management — data center
    operations, network management, end-user computing
    (1,200 desktops/laptops), service desk (L1-L3),
    security operations, disaster recovery
  - Term: 7 years; two 2-year extension options at
    Customer's election
  - Fees: Base fees of $6.4M/year; annual adjustment
    per CPI (capped at 3%); "Resource Unit pricing"
    model — $185/desktop/month, $2,500/server/month,
    $45/service desk ticket
  - Transition: 6-month transition period; Provider
    absorbs 45 current IT staff via "rebadging"; Provider
    responsible for all transition costs; "Customer shall
    not be responsible for any service degradation during
    the transition period"
  - Service levels (selected):
    * System availability: 99.95% (critical), 99.9%
      (standard), measured monthly
    * Service desk: P1 response in 15 min, resolution
      in 4 hours; P2 response in 30 min, resolution in
      8 hours
    * Network uptime: 99.99%
    * Disaster recovery: RTO 4 hours, RPO 1 hour for
      critical systems
  - Service credits: Tiered — 2% of monthly fee per SLA
    miss; capped at 15% of monthly fee; "at-risk"
    amount of 10% of annual fees if multiple SLAs missed
    in a quarter
  - Benchmarking: "Beginning in Year 3, Customer may
    engage an independent benchmarker annually. If
    pricing is found to exceed market median by more
    than 10%, Provider shall adjust pricing to market
    median within 90 days or Customer may terminate the
    affected services"
  - Technology refresh: Provider responsible for
    refreshing hardware per agreed lifecycle (servers:
    5 years, desktops: 4 years, network: 7 years)
  - Governance: Joint Steering Committee (quarterly);
    Service Delivery Manager (Provider, dedicated);
    Customer retains a "Retained IT Organization" of
    8 positions
  - Change management: Change requests priced using
    rate card (Exhibit F); disputes escalated to
    Steering Committee
  - Key personnel: 5 positions designated; 90-day
    restriction on removal without Customer consent
  - Subcontracting: Provider may subcontract with
    Customer approval; Provider remains liable for
    sub performance
  - Intellectual property: "All IP developed specifically
    for Customer is Customer's property. Provider retains
    all rights to pre-existing IP, tools, and
    methodologies"
  - Data security: SOC 2 Type II annual report; NIST
    Cybersecurity Framework alignment; Customer data
    remains Customer property; "Provider shall not
    access, use, or disclose Customer data except as
    necessary to perform the Services"
  - Insurance: Provider carries $10M professional
    liability, $5M cyber liability
  - Liability cap: 2x annual fees for general liability;
    uncapped for: data breaches, willful misconduct,
    IP infringement, confidentiality violations
  - Termination:
    * For cause: 60-day cure period
    * For convenience: With 12 months' notice; early
      termination fee equal to 50% of remaining fees
    * Termination assistance: Provider shall provide
      up to 12 months of transition assistance at
      current rates
  - Governing law: State of Connecticut

  Task: Write a comprehensive Board-level briefing
  covering the strategic rationale, financial analysis,
  risk assessment (including operational, financial,
  legal, and regulatory risks), governance framework
  evaluation, and recommended modifications before
  Board approval.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive Board-level analysis — evaluates the strategic rationale for outsourcing (cost savings vs. control trade-off for an insurance company); analyzes the 7-year financial commitment ($45M+) against current IT spend; evaluates the resource unit pricing model for flexibility and predictability; assesses the transition plan (rebadging 45 staff, service continuity risk); evaluates the governance framework adequacy; the briefing is structured for Board decision-making with clear executive summary and supporting detail."
    weight: 0.35
    description: "BoardLevelAnalysis"
  - type: llm_judge
    criteria: "Response identifies outsourcing-specific risks — flags the 7-year lock-in with 50% early termination fee (potentially $15M+); evaluates the SLA credit cap (15% monthly is low — $80K cap on a $6.4M annual contract); identifies the service credit as sole remedy limitation; flags the retained IT organization sizing (8 positions may be inadequate to manage a $45M relationship); evaluates regulatory implications for an insurance company (state insurance department data security requirements, NAIC model laws); identifies the technology refresh risk (hardware cycles vs contract term); evaluates the rebadging impact (employee morale, knowledge transfer); flags the subcontracting risk."
    weight: 0.35
    description: "OutsourcingRisksIdentified"
  - type: llm_judge
    criteria: "Response provides sophisticated negotiation recommendations — suggests improved SLA framework (meaningful at-risk amounts, step-in rights for persistent failure, SLA ratchet mechanism); recommends benchmarking improvements (more frequent, lower threshold); suggests financial protections (volume discounts, gain-sharing, technology innovation credits); recommends enhanced termination rights (termination for persistent SLA failure without convenience fee); suggests data protection improvements specific to insurance industry; recommends governance enhancements; the recommendations reflect IT outsourcing best practices."
    weight: 0.30
    description: "SophisticatedRecommendations"
