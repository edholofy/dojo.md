meta:
  id: multi-jurisdiction-employment
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review employment agreements across multiple US states and international jurisdictions, identifying enforceability conflicts and harmonization challenges"
  tags: [employment, multi-jurisdiction, restrictive-covenants, advanced]

state: {}

trigger: |
  You're the VP of People at a 600-person enterprise
  SaaS company with employees in California, New York,
  Texas, Colorado, and the UK. The company uses a single
  employment agreement template for all US employees and
  a slightly modified version for UK employees. Following
  a competitor's successful raid of your sales team (4
  enterprise sales reps defected in one week), the CEO
  has asked you to review the employment agreements
  across all jurisdictions to identify gaps.

  Current US template key terms:
  - At-will employment (all US locations)
  - Non-compete: "For 12 months after termination,
    Employee shall not work for a Competing Business
    within the United States"
  - Non-solicitation of customers: "For 18 months after
    termination, Employee shall not solicit any customer
    Employee had contact with in the last 24 months"
  - Non-solicitation of employees: "For 12 months after
    termination, Employee shall not recruit or solicit
    any employee of the Company"
  - Confidentiality: Perpetual; broadly defined; includes
    customer lists, pricing, product roadmap, and "any
    information not generally known to the public"
  - Invention assignment: "All work product created
    during employment or using Company resources"
  - Garden leave: Not included
  - Severance: Not included
  - Choice of law: Delaware (regardless of employee
    location)
  - Arbitration: Mandatory individual arbitration in
    Wilmington, Delaware; class/collective action waiver

  UK template modifications:
  - Employment contract (not at-will); 3-month notice
    period
  - Non-compete: Same 12-month US clause
  - Garden leave: "Company may place Employee on garden
    leave during the notice period"
  - Governing law: England and Wales

  Recent events and concerns:
  - The 4 departed sales reps are in California (2),
    New York (1), and Colorado (1)
  - One California rep is already working for a competitor
    and was seen at a customer site
  - The New York rep posted on LinkedIn that she's "excited
    to join [competitor]" — several of your customers
    liked the post
  - The Colorado rep hasn't started yet but notified you
    he'll be joining a competitor in 30 days
  - You suspect the Texas sales director recruited all
    four (he left 6 months ago and is now VP Sales at
    the competitor)

  Task: Write a comprehensive legal analysis memo for
  your CEO and outside counsel covering the enforceability
  of your current agreements in each jurisdiction, the
  immediate actions available for the current departures,
  and recommended changes to the employment agreement
  template.

assertions:
  - type: llm_judge
    criteria: "Response provides jurisdiction-specific enforceability analysis — accurately identifies California's near-total ban on non-competes (Business and Professions Code 16600); explains New York's recent non-compete restrictions and reasonableness requirements; analyzes Colorado's 2022 non-compete law (HB 22-1317) limiting non-competes to certain high-earning employees; explains Texas enforceability requirements (must be ancillary to otherwise enforceable agreement); evaluates UK enforceability standards (restraint of trade, garden leave interaction); identifies the Delaware choice-of-law issue (may not override local employment law protections)."
    weight: 0.35
    description: "JurisdictionAnalysis"
  - type: llm_judge
    criteria: "Response identifies immediate enforcement options and risks — evaluates which restrictive covenants are enforceable against each departing employee given their jurisdiction; assesses non-solicitation and confidentiality claims as alternatives where non-competes fail; evaluates trade secret claims (DTSA federal and state remedies); analyzes the Texas sales director's potential liability for orchestrating the raid; identifies the LinkedIn post as potential evidence; evaluates injunctive relief prospects in each jurisdiction; flags the risk of pursuing California enforcement (potential fee-shifting under Cal. BPC 16600.5)."
    weight: 0.35
    description: "ImmediateEnforcement"
  - type: llm_judge
    criteria: "Response provides comprehensive template revision recommendations — recommends jurisdiction-specific agreement templates or addenda; suggests alternative protective mechanisms where non-competes are unenforceable (enhanced non-solicitation, PIIA improvements, garden leave, forfeiture-for-competition provisions, deferred compensation clawbacks); recommends practical retention strategies beyond legal restrictions; suggests trade secret protection program; the recommendations balance legal enforceability with employee relations and talent market realities."
    weight: 0.30
    description: "TemplateRecommendations"
