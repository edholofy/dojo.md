meta:
  id: technology-licensing-ip
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review a complex technology licensing agreement with patent cross-licenses, royalty structures, and grant-back provisions"
  tags: [technology-license, patents, royalties, advanced]

state: {}

trigger: |
  You're the VP of Legal at a mid-size semiconductor
  company (500 employees, $180M revenue) that holds 85
  patents in wireless communication technology. A major
  technology company ($50B revenue, 12,000+ patents) has
  approached you for a patent cross-licensing agreement
  after your company received a cease-and-desist letter
  alleging infringement of 3 of their patents in your
  latest chip design. You believe they also use your
  patented technology in their devices.

  Key technology licensing agreement terms:
  - License grant (Their patents to you):
    * Non-exclusive, worldwide license under their
      current patent portfolio (4,200 patents) for
      semiconductor products
    * "Licensed Products" defined as "any product that
      is manufactured, sold, or distributed by Licensee
      that would, absent this license, infringe one or
      more Licensed Patents"
    * Field of use: Limited to "semiconductor components
      for wireless communication"
    * Sublicensing: Not permitted without prior written
      consent
  - License grant (Your patents to them):
    * Non-exclusive, worldwide license under your
      current and future patents for "any product or
      service"
    * No field of use restriction
    * Sublicensing: "Licensor grants Licensee the right
      to sublicense to its affiliates and contract
      manufacturers"
  - Royalty structure:
    * You pay them: Running royalty of 2.5% of net
      selling price of Licensed Products, subject to
      $3M annual minimum
    * They pay you: Paid-up, one-time lump sum of $8M
      for the full term
  - Term: 7 years; no renewal option
  - Grant-back: "Any improvement patents developed by
    either party that are essential to practicing the
    Licensed Patents shall be automatically licensed to
    the other party under the same terms as this
    Agreement"
  - Patent challenges: "If either party challenges the
    validity of any Licensed Patent, the challenging
    party's license to the challenged patent shall
    immediately terminate"
  - Most favored licensee: "If Licensor grants more
    favorable terms to a third party for substantially
    similar rights, Licensee shall be entitled to
    equivalent terms"
  - Release: "Each party releases the other from all
    claims of patent infringement arising prior to the
    Effective Date"
  - Representations: Each party represents it has
    authority to grant licenses; no representation of
    non-infringement of third-party patents
  - Indemnification: None — each party bears its own
    risk of third-party infringement claims
  - Audit rights: Each party may audit the other's
    royalty calculations annually; discrepancy >5%
    triggers payment of audit costs
  - Governing law: State of California
  - Dispute resolution: JAMS arbitration; 3 arbitrators;
    San Jose, CA

  Task: Write a strategic assessment for your CEO and
  Board evaluating the deal structure, identifying the
  asymmetries, and recommending whether to accept,
  counter-offer, or reject the proposed terms.

assertions:
  - type: llm_judge
    criteria: "Response provides a strategic IP licensing analysis — identifies the fundamental asymmetries in the deal structure (they get: your current AND future patents, broad field of use, sublicensing rights, $8M one-time payment; you get: their current patents only, narrow field of use, no sublicensing, 2.5% running royalty + $3M minimum); calculates the economic imbalance (your running royalty at $180M revenue could be $4.5M/year vs their $8M one-time for 7 years); evaluates the patent portfolio value disparity (85 vs 4,200 patents); the analysis is sophisticated enough for Board deliberation."
    weight: 0.35
    description: "StrategicIPAnalysis"
  - type: llm_judge
    criteria: "Response identifies critical deal risks — flags the grant-back clause (your improvements automatically licensed to them — stifles R&D investment incentive); flags the 'current and future' patents asymmetry (you license everything you'll ever develop during the term); flags the patent challenge termination provision (cannot challenge validity without losing license); identifies the no-sublicensing restriction on your license (limits your ability to use contract manufacturers); evaluates the $3M annual minimum royalty risk (must pay even in a down year); flags the broad 'any product or service' field for their license vs your narrow field restriction."
    weight: 0.35
    description: "CriticalDealRisks"
  - type: llm_judge
    criteria: "Response provides actionable negotiation strategy — recommends specific counter-positions (symmetric scope for both licenses, eliminate or narrow grant-back, convert your royalty to paid-up license or reduce rate, add your future patents only with additional compensation, expand your field of use, obtain sublicensing rights); evaluates the litigation alternative (what happens if you don't sign — strength of their 3 patent claims vs your counter-claims); provides a BATNA analysis; the recommendations are realistic for a $180M company negotiating with a $50B company and account for the power dynamic."
    weight: 0.30
    description: "NegotiationStrategy"
