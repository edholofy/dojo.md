meta:
  id: advanced-contract-review-shift
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Handle an advanced shift with a corporate transaction creating cascading contract review obligations across business units"
  tags: [shift-simulation, corporate-transaction, cascading, advanced]

state: {}

trigger: |
  You're the Deputy General Counsel at a mid-size
  technology company ($350M revenue, 1,800 employees).
  Your company just announced it's being acquired by a
  larger competitor for $580M. The acquisition triggers
  a cascade of contract review obligations, and you have
  72 hours before the Board meeting where you must
  present a comprehensive contracts risk assessment.

  CRITICAL ISSUE 1 — Change of Control Provisions:
  Your preliminary review has identified change-of-
  control provisions in these contracts:
  - Top 5 customer contracts ($120M combined ARR): 3 of
    5 have "change of control" termination rights with
    30-60 day notice periods
  - Key technology license from a university: "License
    terminates automatically upon change of control of
    Licensee without Licensor's prior written consent"
  - Office leases in 4 cities: 2 require landlord consent
    for assignment; 1 has termination right on change
    of control
  - $15M credit facility: Triggers immediate repayment
    upon change of control
  - CEO employment agreement: Accelerates 100% equity
    vesting; triggers $2.5M change-of-control payment
  - 12 other executive agreements: Various acceleration
    and severance provisions totaling estimated $4.8M

  CRITICAL ISSUE 2 — Data Processing Agreements:
  The acquirer operates in China and Russia (your company
  does not). Customer DPAs contain provisions restricting
  data transfers and requiring notification of corporate
  changes:
  - 8 enterprise customers have DPAs with "change in
    sub-processor" notification requirements
  - 3 EU customers have DPAs with data localization
    requirements and explicit restrictions on transfer
    to countries without GDPR adequacy decisions
  - 2 US government contracts have ITAR restrictions on
    foreign ownership, control, or influence (FOCI)

  CRITICAL ISSUE 3 — Employee Retention:
  The announcement has created uncertainty. Key facts:
  - 15 critical engineers have 12-month non-competes
    (but the acquiring company is the competitor the
    non-competes were designed for)
  - 200 employees have unvested stock options that may
    be cashed out or converted in the acquisition
  - The acquirer plans to eliminate 300 positions post-
    close, triggering WARN Act obligations in 3 states
  - 8 employees are on H-1B visas requiring employer
    transfer processing

  Task: Write a comprehensive contracts risk assessment
  for the Board covering all three critical issues,
  quantifying the financial exposure, identifying deal-
  breaker risks, and recommending specific actions for
  the next 72 hours.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive risk assessment across all three issues — quantifies the financial exposure from change-of-control provisions (customer termination risk on $120M ARR, credit facility repayment, executive compensation triggers totaling $7.3M+); evaluates the university license termination as potential deal-breaker (if the technology is core to the product); analyzes the data processing restrictions against the acquirer's geographic footprint; addresses employee retention and WARN Act compliance; the assessment is organized for Board decision-making with clear materiality thresholds."
    weight: 0.35
    description: "ComprehensiveRiskAssessment"
  - type: llm_judge
    criteria: "Response identifies deal-breaker risks and interconnections — evaluates which customer termination rights could be exercised and the probability (losing $120M ARR would significantly impact the $580M valuation); flags the university license as potentially critical (could the product function without it?); identifies the ITAR/FOCI conflict as a deal-structural issue (acquirer with China/Russia operations + ITAR contracts = potential loss of government business); connects the non-compete issue (employees' non-competes were against the acquirer — do they become unenforceable or does the acquisition cure them?); identifies the data localization conflict cascading to the acquirer's Chinese operations."
    weight: 0.35
    description: "DealBreakerRisks"
  - type: llm_judge
    criteria: "Response provides actionable 72-hour plan — prioritizes actions by deal impact and urgency; recommends specific customer outreach strategy (which customers to call, what to say, consent vs notification); identifies which provisions require waivers/consents before closing; recommends specific provisions for the acquisition agreement (customer consent as closing condition, escrow for identified risks, R&W insurance coverage); suggests WARN Act compliance timeline; recommends employee retention and communication strategy; the plan is realistic for a 72-hour deadline with limited legal resources."
    weight: 0.30
    description: "Actionable72HourPlan"
