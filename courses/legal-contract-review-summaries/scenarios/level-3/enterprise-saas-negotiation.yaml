meta:
  id: enterprise-saas-negotiation
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review and negotiate an enterprise SaaS master agreement with complex data processing, SLA, and liability provisions for a large buyer"
  tags: [enterprise-saas, negotiation, data-processing, advanced]

state: {}

trigger: |
  You're the Associate General Counsel at a Fortune
  500 healthcare company (75,000 employees). Your
  company is evaluating a $4.8M annual enterprise SaaS
  contract with a workforce management platform that
  will process employee PII, health plan enrollment
  data, and payroll information for all US employees.
  The vendor is a mid-size company ($200M revenue)
  with no other healthcare customers of your size.

  Key master agreement terms:
  - Term: 3 years initial; auto-renewal for 1-year periods
  - Annual fee: $4.8M ($64/employee/month)
  - Payment: Annual upfront; no refund for early term
  - Implementation: 9-month timeline; vendor provides
    implementation services at no additional cost;
    "Customer shall make qualified personnel available
    for implementation"
  - SLA: 99.95% uptime measured monthly, excluding:
    scheduled maintenance (up to 4 hours/month, weekends
    only), force majeure, and "degradation caused by
    Customer's systems or third-party integrations"
  - SLA credits: 10% of monthly fee for each 0.1% below
    SLA, capped at 30% of monthly fee for any month;
    credits are sole remedy for downtime
  - Data processing:
    * Vendor processes data as "service provider" (not
      processor — using CCPA terminology)
    * Data categories: employee names, SSNs, DOBs,
      addresses, compensation, health plan elections,
      beneficiary information, bank account numbers
    * "Vendor shall not sell, share, or use Personal
      Information for any purpose other than providing
      the Services"
    * Sub-processors: 14 listed in Exhibit D; Vendor may
      add sub-processors with 30 days' notice
    * Data location: US data centers (AWS us-east-1 and
      us-west-2); no international transfer
    * Breach notification: 48 hours; Vendor responsible
      for breach costs including notification, credit
      monitoring, and regulatory fines "to the extent
      caused by Vendor's negligence"
  - Security: SOC 2 Type II certified; annual pen test;
    encryption at rest (AES-256) and in transit (TLS 1.3);
    HITRUST CSF certified
  - HIPAA: Vendor will execute BAA; "Vendor is not a
    covered entity and processes PHI solely as a
    business associate"
  - Indemnification:
    * Vendor indemnifies for: IP infringement, data
      breaches caused by Vendor's negligence, violation
      of data processing obligations
    * Customer indemnifies for: data accuracy, compliance
      with laws governing data provided to Vendor
    * Indemnification procedure requires prompt notice
      and sole control of defense
  - Liability:
    * General cap: 12 months' fees ($4.8M)
    * Elevated cap for data breaches: 24 months' fees
      ($9.6M)
    * Excluded from cap: IP indemnification, willful
      misconduct, confidentiality breaches involving
      more than 10,000 records
    * Consequential damages excluded except for data
      breaches and confidentiality violations
  - Termination:
    * For cause: 30-day cure period
    * For convenience: Customer may terminate with 180
      days' notice; early termination fee of 50% of
      remaining contract value
    * Data return: Vendor provides data export in
      standard format within 60 days; deletion within
      90 days with certification
  - Transition assistance: "Upon termination, Vendor
    shall provide transition assistance at Vendor's
    then-current professional services rates for up to
    6 months"
  - Dispute resolution: Escalation to executives, then
    mediation, then litigation in Delaware
  - Governing law: State of Delaware

  Task: Write a detailed negotiation memo for your
  Chief Legal Officer identifying provisions to accept,
  provisions requiring modification, and specific
  redlined positions with justification for a healthcare
  enterprise buyer of this size.

assertions:
  - type: llm_judge
    criteria: "Response provides a sophisticated contract analysis — evaluates the data processing provisions against both HIPAA and state privacy law requirements (CCPA, state breach notification laws); assesses the SLA structure realistically (99.95% for a workforce management system processing payroll — is the credit cap adequate?); evaluates the liability framework including the tiered cap structure; analyzes implementation risk (9 months, customer resource commitment); the analysis reflects enterprise procurement sophistication appropriate for a Fortune 500."
    weight: 0.35
    description: "SophisticatedContractAnalysis"
  - type: llm_judge
    criteria: "Response identifies healthcare-specific and enterprise-scale risks — flags that processing SSNs, health plan data, and bank account numbers creates elevated breach risk requiring more than $9.6M cap; evaluates the BAA adequacy for a 75,000-employee dataset; identifies the sub-processor risk (14 sub-processors with 30-day notice addition); flags the early termination fee at 50% of remaining value (high for enterprise); evaluates transition risk (6 months at vendor's rates = expensive and vendor-controlled); identifies the vendor's financial capacity to honor indemnification obligations ($200M company backing $9.6M cap); flags the data return timeline (60 days may disrupt payroll processing)."
    weight: 0.35
    description: "HealthcareEnterpriseRisks"
  - type: llm_judge
    criteria: "Response provides specific redlined positions — recommends specific alternative language for key provisions (higher data breach cap, shorter breach notification window, customer approval for sub-processors, improved termination rights, transition assistance at fixed rates); prioritizes negotiations (must-haves vs nice-to-haves); assesses vendor's likely positions and compromises; includes leverage analysis (vendor's first major healthcare customer creates leverage for buyer); the recommendations reflect enterprise negotiation sophistication."
    weight: 0.30
    description: "SpecificRedlinedPositions"
