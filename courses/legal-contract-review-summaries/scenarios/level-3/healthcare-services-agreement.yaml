meta:
  id: healthcare-services-agreement
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review a hospital-physician group management services agreement with regulatory compliance, Stark Law, and Anti-Kickback considerations"
  tags: [healthcare, mso, stark-law, advanced]

state: {}

trigger: |
  You're the Chief Administrative Officer at a 15-
  physician orthopedic surgery group. A hospital system
  (6 hospitals, $2.8B revenue) has proposed a Management
  Services Agreement (MSA) under which the hospital's
  Management Services Organization (MSO) would provide
  administrative, billing, IT, and practice management
  services to your group. In exchange, your physicians
  would refer patients to the hospital system for
  surgical procedures and imaging. Your physicians are
  concerned about maintaining clinical independence.

  Key MSA terms:
  - Services: MSO provides billing/collections, HR/
    payroll, IT systems (EHR, practice management),
    credentialing, marketing, compliance program, and
    financial management
  - Management fee: 15% of the group's collected revenue
    (net collections)
  - Term: 10 years with automatic 5-year renewals
  - Revenue cycle: MSO handles all billing, collections,
    and payer contracting; MSO has authority to negotiate
    payer contracts on behalf of the group
  - Office space: MSO provides office space at 3 clinic
    locations at "fair market value" rent (included in
    management fee) — FMV determined by MSO's appraiser
  - Equipment: MSO provides medical equipment, including
    in-office imaging equipment; equipment ownership
    remains with MSO
  - Staffing: MSO employs all non-physician staff; group
    retains clinical supervision; "MSO shall determine
    staffing levels in consultation with Practice"
  - Compensation: "Practice shall distribute physician
    compensation based on a productivity formula approved
    by MSO and consistent with fair market value as
    determined by an independent appraiser"
  - Non-compete: "During the term and for 2 years after,
    physicians shall not practice orthopedic surgery
    within 25 miles of any MSO or Hospital facility"
  - Exclusivity: "Practice shall refer all patients
    requiring hospital-based services, including
    surgical procedures and advanced imaging, to
    Hospital System facilities, subject to clinical
    judgment and patient preference"
  - Governance: MSO appoints a Practice Administrator
    who must approve all practice expenditures >$10,000;
    "Major decisions" (hiring physicians, expanding
    services, new locations) require MSO consent
  - Termination: Practice may terminate with 180 days'
    notice; "Upon termination, MSO retains ownership of
    all patient billing records, IT systems, and
    equipment. MSO shall transfer medical records per
    applicable law"
  - Insurance: MSO maintains malpractice insurance (per
    MSO's chosen carrier); Practice pays premium via
    management fee
  - Compliance: "Both parties shall comply with all
    applicable healthcare laws, including the Stark Law,
    Anti-Kickback Statute, and False Claims Act"
  - FMV attestation: "The management fee and all
    compensation arrangements are at fair market value
    and were determined without regard to the volume or
    value of referrals"
  - Dispute resolution: Mediation, then arbitration per
    AAA Healthcare Arbitration Rules
  - Governing law: State of Florida

  Task: Write a regulatory risk assessment and contract
  review for your physician partners, focusing on the
  Stark Law and Anti-Kickback implications, clinical
  independence concerns, and recommended modifications
  to protect the practice's interests.

assertions:
  - type: llm_judge
    criteria: "Response provides thorough regulatory analysis — evaluates the MSA against Stark Law requirements (personal services arrangement exception: must be fair market value, not vary with referrals, commercially reasonable); analyzes Anti-Kickback Statute implications (management fee tied to percentage of collections could be construed as remuneration for referrals); evaluates the FMV determination process (MSO's own appraiser — conflict of interest); identifies the referral exclusivity clause as a potential AKS violation; assesses False Claims Act exposure; the analysis demonstrates healthcare regulatory sophistication."
    weight: 0.35
    description: "RegulatoryAnalysis"
  - type: llm_judge
    criteria: "Response identifies clinical independence and business risks — flags MSO control over staffing levels, payer contracting, and expenditure approval as threatening clinical independence; identifies the non-compete breadth (25 miles from any hospital facility — effectively locks physicians in); flags MSO ownership of billing records and IT systems upon termination (practice can't easily leave); evaluates the 10-year term with auto-renewal (excessive for this type of arrangement); identifies the compensation formula approval by MSO (could influence physician behavior); flags the malpractice insurance control (physician group has no choice of carrier); evaluates the exclusive referral obligation against clinical judgment."
    weight: 0.35
    description: "IndependenceAndBusinessRisks"
  - type: llm_judge
    criteria: "Response provides physician-group-protective recommendations — recommends specific Stark Law safe harbor modifications (fixed management fee rather than percentage of collections, independent FMV appraisal, explicit documentation that fee doesn't vary with referrals); suggests clinical governance protections (physician committee oversight, staffing input rights, payer contract approval); recommends term and termination improvements (shorter initial term, transition assistance, data ownership); suggests non-compete modifications; the recommendations protect physician autonomy while acknowledging the benefits of MSO services."
    weight: 0.30
    description: "PhysicianProtectiveRecommendations"
