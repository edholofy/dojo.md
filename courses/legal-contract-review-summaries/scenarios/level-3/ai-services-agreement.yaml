meta:
  id: ai-services-agreement
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review an AI/ML services agreement addressing model ownership, training data rights, output IP, and algorithmic liability"
  tags: [ai-ml, model-ownership, data-rights, advanced]

state: {}

trigger: |
  You're the General Counsel at a mid-size insurance
  company ($1.5B GWP, 2,000 employees). Your company
  is contracting with an AI startup to develop custom
  machine learning models for claims processing
  automation and fraud detection. The 18-month project
  costs $2.8M. The AI startup has sent their standard
  services agreement. Your Chief Actuary and Chief
  Underwriting Officer have flagged concerns about
  model bias and regulatory compliance.

  Key AI services agreement terms:
  - Scope: Development and deployment of 3 custom ML
    models — (1) Claims triage and routing, (2) Fraud
    detection scoring, (3) Subrogation opportunity
    identification
  - Deliverables: Trained models, API endpoints,
    documentation, model cards, monitoring dashboards
  - Training data: "Customer shall provide training data.
    Provider shall have the right to use Customer's data
    to train, validate, and improve the Models. Provider
    may use anonymized and aggregated insights derived
    from Customer's data to improve Provider's products
    and services"
  - Model ownership: "Provider retains ownership of all
    Models, including architectures, weights, parameters,
    and training methodologies. Customer receives a non-
    exclusive, perpetual license to use the Models for
    Customer's internal business purposes"
  - Output IP: "Customer owns all outputs generated by
    the Models when applied to Customer's data"
  - Pre-existing IP: "Provider retains all rights to
    pre-existing algorithms, frameworks, libraries, and
    tools used in developing the Models"
  - Model performance: "Provider warrants that Models
    shall achieve the performance metrics specified in
    Exhibit B (accuracy, precision, recall, F1 score)
    measured against the validation dataset. Performance
    warranty expires 12 months after deployment"
  - Model updates: "Provider shall provide quarterly
    model updates for 24 months post-deployment at no
    additional cost. After 24 months, model maintenance
    available at Provider's then-current rates"
  - Bias and fairness: "Provider shall use commercially
    reasonable efforts to minimize bias in the Models.
    Provider does not guarantee compliance with any
    specific fairness criteria or regulatory requirements"
  - Explainability: "Provider shall deliver model
    documentation including feature importance rankings
    and summary model cards. Provider does not warrant
    that Models are fully interpretable or explainable"
  - Data security: SOC 2 Type II; data encryption;
    "Provider shall not store Customer data beyond the
    model training period plus 90 days"
  - Liability: Provider's liability capped at 1x fees
    paid; "Provider shall not be liable for decisions
    made using Model outputs, including claims adjudication
    decisions, fraud determinations, or their consequences"
  - Indemnification: Provider indemnifies for IP
    infringement of the Models; Customer indemnifies
    for training data quality and all decisions made
    using Model outputs
  - Regulatory compliance: "Customer is solely responsible
    for ensuring its use of the Models complies with all
    applicable laws and regulations, including insurance
    regulations, fair lending laws, and anti-discrimination
    requirements"
  - Audit: "Customer may audit Provider's data handling
    practices annually. Customer may not audit the
    Models' algorithms or training processes"
  - Termination: Either party with 90 days' notice;
    upon termination, Customer retains license to
    deployed Models but receives no further updates
  - Governing law: State of Delaware

  Task: Write a comprehensive review for your CEO,
  Chief Actuary, and Chief Underwriting Officer covering
  the IP and data rights issues, regulatory compliance
  gaps, model governance concerns, and recommended
  contract modifications before proceeding.

assertions:
  - type: llm_judge
    criteria: "Response addresses AI-specific IP and data concerns — clearly explains the ownership structure (Provider owns models but Customer licenses them; Customer's data used to train Provider's models which Provider can improve and sell to others); identifies the training data usage issue (Customer's claims data — including potentially sensitive policyholder information — used to 'improve Provider's products'); evaluates the model ownership vs license distinction for an insurance company (what happens when Provider raises maintenance prices after year 2 or goes bankrupt?); analyzes output IP ownership implications; evaluates whether Customer can switch vendors."
    weight: 0.35
    description: "AIIPAndDataAnalysis"
  - type: llm_judge
    criteria: "Response identifies regulatory and algorithmic risks — flags insurance regulatory compliance concerns (state DOI requirements for algorithmic underwriting/claims, NAIC model bulletin on AI, Colorado SB 21-169); evaluates the bias disclaimer against regulatory obligations (insurance companies can't disclaim responsibility for discriminatory outcomes); flags the fraud detection model's potential for disparate impact; identifies the explainability gap (insurance regulators may require model interpretability); evaluates the 'no audit of algorithms' restriction against regulatory examination requirements; flags the liability disclaimer for claims decisions made using model outputs."
    weight: 0.35
    description: "RegulatoryAlgorithmicRisks"
  - type: llm_judge
    criteria: "Response provides insurance-industry-appropriate recommendations — recommends model governance framework requirements (bias testing methodology, ongoing monitoring, human-in-the-loop requirements); suggests data rights modifications (restrict use of training data, require anonymization standards); recommends model ownership or escrow arrangements; suggests regulatory compliance obligations on Provider (documentation for regulatory examination, bias audit cooperation); recommends performance and fairness SLAs; suggests specific indemnification for regulatory penalties arising from model bias; the recommendations reflect both AI industry practices and insurance regulatory realities."
    weight: 0.30
    description: "InsuranceAIRecommendations"
