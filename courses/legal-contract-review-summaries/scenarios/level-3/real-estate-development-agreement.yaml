meta:
  id: real-estate-development-agreement
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review a commercial real estate development agreement with complex financing, entitlement conditions, and construction obligations"
  tags: [real-estate, development, financing, advanced]

state: {}

trigger: |
  You're the in-house counsel at a regional real estate
  development company. Your firm is negotiating a
  development agreement with a municipality for a
  mixed-use project: 180 residential units, 25,000 sq ft
  of retail, and a 150-space parking garage on a
  3.5-acre city-owned parcel. Total project cost: $62M.
  The city is contributing the land (appraised at $8M)
  and $5M in TIF (Tax Increment Financing) bonds. This
  is the most complex deal your company has undertaken.

  Key development agreement terms:
  - Project: Mixed-use development per approved site plan
    (Exhibit A) — 180 residential units (20% designated
    affordable at 80% AMI), 25,000 sq ft retail, 150-
    space parking garage
  - Land contribution: City conveys 3.5-acre parcel to
    Developer via ground lease (99 years, $1/year)
  - TIF financing: City issues $5M TIF bonds; proceeds
    disbursed as construction milestones are met;
    Developer responsible for any cost overruns beyond
    the TIF amount
  - Developer equity: Minimum $12M equity contribution;
    evidence of committed equity required before ground
    lease execution
  - Construction financing: Developer responsible for
    securing $45M construction loan; "Failure to secure
    financing within 180 days of agreement execution
    shall constitute a Developer default"
  - Entitlements: Developer responsible for obtaining all
    permits, approvals, and entitlements; "City shall
    cooperate in good faith but makes no guarantee of
    approval"
  - Affordable housing: 36 units (20%) at 80% AMI for
    minimum 30 years; compliance monitored annually;
    "Failure to maintain affordable units constitutes
    a material default"
  - Construction timeline:
    * Groundbreaking: Within 12 months of agreement
    * Substantial completion: Within 36 months of
      groundbreaking
    * Extensions: Up to 6 months for force majeure;
      additional extensions at City's sole discretion
  - Performance bond: Developer shall provide a
    performance bond equal to 100% of construction costs
  - Prevailing wage: "All construction workers shall be
    paid prevailing wages per the Davis-Bacon Act and
    applicable state requirements"
  - Local hiring: "Developer shall use commercially
    reasonable efforts to ensure 30% of construction
    labor hours are performed by residents of the City"
  - MWBE participation: "Developer shall use good faith
    efforts to achieve 25% MWBE participation in
    construction and 15% in ongoing operations"
  - Clawback: "If Developer fails to complete the
    project or maintain affordable units for the required
    period, Developer shall repay all TIF proceeds plus
    interest at the applicable federal rate, and the
    ground lease shall terminate"
  - Operating covenants: "Developer shall maintain the
    property in good condition, carry adequate insurance,
    pay all taxes, and operate the retail component with
    a minimum 80% occupancy for the first 10 years"
  - Profit participation: "City shall receive 15% of
    Developer's net profits from the project exceeding
    a 12% IRR, measured annually beginning in Year 5"
  - Transfer restrictions: No assignment without City
    approval for first 10 years; City has right of first
    refusal on any sale
  - Governing law: State of Illinois

  Task: Write a risk assessment memo for your company's
  partners evaluating the deal terms, identifying the
  most significant risks, modeling potential downside
  scenarios, and recommending specific negotiation
  positions.

assertions:
  - type: llm_judge
    criteria: "Response provides sophisticated deal analysis — evaluates the capital stack ($8M land + $5M TIF + $12M equity + $45M debt = $70M total but project cost is $62M — explains the gap); analyzes the affordable housing economics (20% at 80% AMI impact on project returns); evaluates the ground lease structure (99 years, $1/year — advantages and risks vs fee simple); assesses the construction timeline feasibility; analyzes the profit participation mechanism (15% above 12% IRR); the analysis demonstrates real estate development financial sophistication."
    weight: 0.35
    description: "SophisticatedDealAnalysis"
  - type: llm_judge
    criteria: "Response identifies development-specific risks — flags the clawback risk (failure to complete or maintain affordable housing triggers TIF repayment + ground lease termination); evaluates the financing contingency (180-day deadline for $45M construction loan); flags the 100% performance bond requirement (cost and availability for a mid-size developer); identifies the entitlement risk ('good faith cooperation' from City is not a guarantee); evaluates the 80% retail occupancy covenant for 10 years (market risk); flags the transfer restrictions limiting exit options; models downside scenarios (construction cost overruns, interest rate increases, absorption risk, retail market softness)."
    weight: 0.35
    description: "DevelopmentRisksIdentified"
  - type: llm_judge
    criteria: "Response provides developer-oriented recommendations — suggests specific modifications to the financing contingency (extend timeline, milestone-based evidence); recommends clawback limitations (proportional rather than full repayment); suggests construction cost escalation protection; recommends modifying the retail occupancy covenant (market-based adjustments, cure period); suggests profit participation modifications (waterfall structure, preferred return); recommends improved force majeure provisions; the recommendations reflect real estate development negotiation experience and acknowledge the public-private dynamic."
    weight: 0.30
    description: "DeveloperRecommendations"
