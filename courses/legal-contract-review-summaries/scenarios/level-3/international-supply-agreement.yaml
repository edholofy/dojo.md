meta:
  id: international-supply-agreement
  level: 3
  course: legal-contract-review-summaries
  type: output
  description: "Review an international supply agreement with cross-border trade terms, currency risk, and dispute resolution across jurisdictions"
  tags: [international, supply-agreement, incoterms, advanced]

state: {}

trigger: |
  You're the VP of Supply Chain at a US-based consumer
  electronics company ($450M revenue). Your company is
  negotiating a 3-year supply agreement with a Taiwanese
  semiconductor manufacturer for a critical component
  used in 60% of your product line. The current sole-
  source supplier has had quality and delivery issues.
  This new supplier would become your primary source.
  The manufacturer's counsel in Taipei has sent a draft
  supply agreement.

  Key supply agreement terms:
  - Products: Custom application-specific ICs (ASICs),
    2 SKUs per specifications in Exhibit A
  - Term: 3 years with annual renewal options
  - Volume commitment: Minimum annual purchase of $12M
    (Buyer); minimum allocation of 500,000 units/quarter
    (Supplier)
  - Pricing: Fixed for Year 1; "Subject to annual
    adjustment based on changes in raw material costs
    (silicon wafer, rare earth), labor, and exchange
    rate fluctuations exceeding 5%"
  - Currency: "All invoices in USD. If NTD/USD exchange
    rate varies more than 7% from the rate on the
    effective date, either party may request price
    renegotiation"
  - Delivery: CIP (Carriage and Insurance Paid To)
    Buyer's US warehouse per Incoterms 2020; "Supplier
    shall maintain 4-week buffer stock at Buyer's
    designated bonded warehouse in Taiwan"
  - Lead time: 12 weeks for standard orders; 8 weeks
    for orders within allocated capacity
  - Forecasting: "Buyer shall provide rolling 12-month
    forecasts quarterly. Months 1-3 are firm commitments;
    Months 4-6 are binding +/-20%; Months 7-12 are
    non-binding estimates"
  - Quality: "Products shall conform to specifications
    in Exhibit A. Defect rate not to exceed 50 PPM.
    Supplier shall maintain ISO 9001 and IATF 16949
    certifications"
  - Inspection: "Buyer may inspect Products within 30
    days of receipt. Failure to reject within 30 days
    constitutes acceptance"
  - Warranty: "Supplier warrants Products for 24 months
    from delivery or 18 months from end-customer sale,
    whichever comes first"
  - IP: "All IP in the ASIC design belongs to Buyer.
    Supplier receives a limited license to manufacture
    Products using Buyer's design. Supplier shall not
    manufacture Products for any third party"
  - Tooling: "Buyer pays for custom tooling ($1.8M).
    Tooling remains Buyer's property but is stored at
    Supplier's facility. Supplier responsible for
    maintenance; replacement at Buyer's cost"
  - Liability: "Supplier's total liability shall not
    exceed the aggregate purchase price paid in the
    preceding 12 months. Neither party liable for
    consequential damages except for IP infringement
    and confidentiality breaches"
  - Force majeure: Includes "natural disasters, war,
    government actions, pandemics, and semiconductor
    industry-wide shortages." FM period exceeding 90
    days triggers termination right
  - Termination: Either party with 12 months' notice;
    immediate for material breach (30-day cure);
    immediate for insolvency
  - Dispute resolution: SIAC (Singapore International
    Arbitration Centre) arbitration; 3 arbitrators;
    English language; Singapore law governs
  - Compliance: "Both parties shall comply with all
    applicable export control laws, including US EAR
    and Taiwan export regulations"

  Task: Write a comprehensive review for your CEO and
  Board covering the commercial terms, supply chain
  risks, cross-border legal considerations, and
  recommended negotiation positions for this critical
  supplier relationship.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive commercial analysis — evaluates the pricing mechanism including currency risk exposure (NTD/USD 7% threshold, raw material adjustments); analyzes the forecasting commitment structure (firm vs binding vs non-binding); assesses the volume commitment vs allocation balance; evaluates total cost including tooling ($1.8M), buffer stock financing, and CIP delivery terms; explains Incoterms 2020 CIP implications (risk transfer point, insurance obligations); the analysis is suitable for Board-level strategic decision-making."
    weight: 0.35
    description: "ComprehensiveCommercialAnalysis"
  - type: llm_judge
    criteria: "Response identifies supply chain and cross-border risks — flags sole-source concentration risk (60% of product line dependent on one supplier); evaluates the Taiwan geopolitical risk factor; identifies US export control implications (EAR compliance for semiconductor technology); flags the tooling ownership vs possession gap (Buyer owns but Supplier controls); evaluates the force majeure clause (semiconductor shortages as FM — could excuse performance in chip shortage); assesses the buffer stock arrangement; identifies quality control challenges across 12 time zones; evaluates the 30-day inspection acceptance window for complex ASICs; flags the IP protection risks for custom designs manufactured overseas."
    weight: 0.35
    description: "SupplyChainRisks"
  - type: llm_judge
    criteria: "Response provides strategic negotiation recommendations — suggests dual-source strategy provisions (capacity commitment that allows qualification of second source); recommends supply chain resilience terms (safety stock requirements, BCP obligations, alternative facility designation); suggests improved pricing mechanisms (cap on annual increases, transparent cost breakdown); recommends enhanced IP protections (audit rights, manufacturing restrictions, technology transfer limitations); evaluates the SIAC arbitration choice appropriately; the recommendations balance supply security with maintaining a productive supplier relationship."
    weight: 0.30
    description: "StrategicRecommendations"
