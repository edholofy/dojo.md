meta:
  id: insurance-policy-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a commercial general liability insurance policy and summarize coverage, exclusions, and gaps for a small business owner"
  tags: [insurance, liability, policy-review, beginner]

state: {}

trigger: |
  You're the owner of a 15-person landscaping and
  hardscaping company. Your insurance broker just sent
  the renewal documents for your commercial general
  liability (CGL) policy. Last year, a client's neighbor
  sued you after a retaining wall project caused drainage
  issues on their property. The claim was denied because
  of a "professional services" exclusion you didn't know
  about. You want to understand your coverage this time
  before signing.

  Key policy terms:
  - Named insured: GreenScape Pro LLC
  - Policy period: 12 months
  - Coverage A (Bodily Injury/Property Damage): $1M per
    occurrence, $2M general aggregate
  - Coverage B (Personal/Advertising Injury): $1M per
    occurrence
  - Medical payments: $10,000 per person
  - Damage to rented premises: $100,000
  - Products-completed operations aggregate: $2M
  - Deductible: $2,500 per occurrence
  - Additional insureds: Clients may be added by
    endorsement upon request
  - Key exclusions:
    * Professional services (design, consulting,
      engineering advice)
    * Pollution and environmental damage
    * Damage to your own work or product (faulty
      workmanship)
    * Expected or intended injury
    * Contractual liability (except for "insured
      contracts")
    * Employment practices (discrimination, harassment,
      wrongful termination)
    * Cyber/data breach
    * Damage to property in your care, custody, or
      control
  - Subcontractor coverage: "Coverage applies to work
    performed by subcontractors on behalf of the Named
    Insured, provided subcontractors carry their own
    insurance with limits not less than $1M/$2M"
  - Duties after occurrence: "Named Insured must notify
    Insurer as soon as practicable of any occurrence
    that may result in a claim"
  - Cancellation: Insurer may cancel with 30 days'
    written notice (10 days for non-payment); Named
    Insured may cancel at any time
  - Premium: $8,200 annually, payable in quarterly
    installments

  Task: Write a plain-language summary for yourself and
  your office manager explaining what the policy covers,
  what it doesn't cover, why last year's claim was denied,
  and what additional coverage you should discuss with
  your broker.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains coverage and exclusions — translates insurance language into plain English; explains each coverage section (A, B, medical payments, products-completed operations) in practical terms for a landscaping business; clearly explains the key exclusions, especially the professional services exclusion that caused last year's claim denial; explains the subcontractor coverage requirements; the summary helps a small business owner actually understand their policy."
    weight: 0.35
    description: "ClearCoverageSummary"
  - type: llm_judge
    criteria: "Response identifies coverage gaps and risks — explains why the retaining wall drainage claim was denied (professional services exclusion covers design/engineering advice, and a retaining wall involves design judgment); identifies the pollution exclusion risk for a landscaping company (herbicides, fertilizer runoff); flags the care/custody/control exclusion (damage to client's existing property while working); identifies the faulty workmanship exclusion; evaluates whether limits are adequate for a 15-person company; flags missing coverage types (professional liability/E&O, commercial auto, workers' comp, umbrella)."
    weight: 0.35
    description: "GapsAndRisksIdentified"
  - type: llm_judge
    criteria: "Response provides actionable insurance recommendations — recommends specific additional policies to discuss with broker (professional liability/E&O for the design component, inland marine for equipment, commercial auto, umbrella/excess liability); suggests endorsements to consider (waiver of subrogation, primary and non-contributory for clients); recommends reviewing subcontractor insurance requirements; the recommendations are practical and prioritized for a $8,200/year budget with a 15-person landscaping company."
    weight: 0.30
    description: "ActionableRecommendations"
