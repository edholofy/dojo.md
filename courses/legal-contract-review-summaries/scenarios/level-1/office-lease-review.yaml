meta:
  id: office-lease-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a commercial office lease and summarize key financial obligations, tenant rights, and potential pitfalls for a growing startup"
  tags: [lease, commercial-real-estate, office, beginner]

state: {}

trigger: |
  You're the COO of a 45-person tech startup moving from
  a coworking space to your first dedicated office. The
  landlord has sent a 28-page commercial lease agreement
  for 4,500 sq ft in a Class B office building. The CEO
  wants a summary before negotiating.

  Key lease terms:
  - Premises: Suite 300, 4,500 rentable sq ft (3,900 sq
    ft usable — load factor of 15%)
  - Term: 5 years with one 3-year renewal option
  - Base rent: $32/sq ft/year ($144,000/year = $12,000/
    month), with 3% annual escalation
  - Additional rent: Pro rata share (8.2%) of building
    operating expenses exceeding the base year (2026)
  - Security deposit: 3 months' rent ($36,000) held by
    landlord without interest
  - Tenant improvements: Landlord provides $25/sq ft TI
    allowance ($112,500); any excess is tenant's cost
  - Permitted use: "General office use consistent with a
    technology company"
  - Assignment/subletting: Requires landlord's prior
    written consent, "not to be unreasonably withheld";
    landlord entitled to 50% of any subletting profit
  - Personal guarantee: CEO must personally guarantee
    the first 24 months of rent ($288,000)
  - Early termination: No early termination clause
  - Default/cure: 10 days to cure monetary default, 30
    days to cure non-monetary default
  - Maintenance: Tenant responsible for interior
    maintenance; landlord responsible for structural,
    HVAC, common areas
  - Insurance: Tenant must carry $1M general liability,
    $3M umbrella
  - Signage: Tenant may have name on suite door; building
    directory listing included; exterior signage not
    permitted
  - Parking: 4 reserved spaces + 12 unreserved at $150/
    space/month ($2,400/month additional)
  - Hours of operation: HVAC available M-F 7AM-7PM, Sat
    8AM-1PM; after-hours HVAC at $75/hour
  - Holdover: If tenant remains after expiration, rent
    increases to 150% of the then-current rate

  Task: Write an executive summary of the lease for your
  CEO covering the total financial commitment over the
  5-year term, key obligations and restrictions, potential
  risks (especially the personal guarantee), and
  recommended negotiation points.

assertions:
  - type: llm_judge
    criteria: "Response calculates the full financial picture — correctly totals the 5-year financial commitment including base rent with 3% escalation, parking costs, estimated operating expense pass-throughs, TI allowance offset, and security deposit; presents monthly and annual costs clearly; explains the load factor (paying for 4,500 sq ft but using 3,900 sq ft); the financial analysis is accurate and comprehensive."
    weight: 0.35
    description: "FullFinancialPicture"
  - type: llm_judge
    criteria: "Response identifies key risks and concerns — flags the personal guarantee as a major risk for a startup CEO ($288,000 personal exposure); evaluates the no early termination clause impact on a growing startup; assesses the 50% subletting profit share; flags the 3-month security deposit without interest; evaluates the operating expense pass-through risk; flags the 150% holdover rate; identifies missing terms (ROFO/ROFR for adjacent space, co-tenancy, expansion rights)."
    weight: 0.35
    description: "KeyRisksIdentified"
  - type: llm_judge
    criteria: "Response provides specific negotiation recommendations — recommends negotiation points prioritized by importance (personal guarantee reduction/elimination, early termination option, TI allowance increase, operating expense cap, subletting profit share reduction); suggests specific counter-positions; the recommendations are realistic for a startup tenant in a Class B building; recognizes leverage dynamics (landlord may have more leverage in a tight market, or tenant may have leverage if building has vacancy)."
    weight: 0.30
    description: "NegotiationRecommendations"
