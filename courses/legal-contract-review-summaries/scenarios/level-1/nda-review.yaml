meta:
  id: nda-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a mutual NDA and write an executive summary highlighting key terms, obligations, and potential concerns for a small technology company"
  tags: [nda, confidentiality, review, beginner]

state: {}

trigger: |
  You're the Operations Manager at a 25-person software
  startup. A potential enterprise customer (Fortune 500
  financial services company) has sent over a Mutual
  Non-Disclosure Agreement as the first step in sales
  discussions. Your CEO has asked you to review it and
  provide a plain-language summary before she signs.

  Key terms of the NDA:
  - Mutual NDA (both parties have obligations)
  - Definition of "Confidential Information": "all
    information disclosed by either party, whether oral,
    written, or electronic, that is designated as
    confidential or that reasonably should be understood
    to be confidential"
  - Exclusions: publicly available info, independently
    developed, received from third party without
    restriction, required by law
  - Term: 3 years from effective date
  - Survival of confidentiality obligations: 5 years
    after termination
  - Permitted disclosure: employees, contractors, and
    advisors with need-to-know basis, provided they are
    bound by similar obligations
  - Return/destruction of materials: within 30 days of
    written request or termination
  - No license granted: "nothing in this Agreement grants
    any license to any trade secrets or intellectual
    property"
  - Residuals clause: "Neither party shall be restricted
    from using Residuals for any purpose. 'Residuals'
    means information retained in the unaided memory of
    persons who have had access to Confidential
    Information"
  - Injunctive relief: "The parties agree that monetary
    damages may be inadequate and that either party may
    seek injunctive relief"
  - Governing law: State of Delaware
  - Non-solicitation: "During the term and for 12 months
    after, neither party shall solicit for employment any
    employee of the other party who was involved in the
    discussions"
  - Assignment: Cannot be assigned without written consent
  - No obligation to proceed: "Nothing in this Agreement
    obligates either party to enter into any further
    agreement"

  Your concerns to evaluate:
  - Is this truly mutual or does it favor the larger
    company?
  - Is the definition of Confidential Information too
    broad or too narrow for your business?
  - Is the residuals clause a problem? (Can their team
    "remember" your proprietary algorithms?)
  - Is the non-solicitation clause standard or aggressive?
  - Are the time periods reasonable?
  - Anything missing that should be included?

  Task: Write an executive summary of the NDA for your
  CEO in plain language. Highlight the key obligations,
  flag any concerns or risks, note anything that's
  missing or unusual, and provide a recommendation
  (sign as-is, negotiate specific changes, or decline).

assertions:
  - type: llm_judge
    criteria: "Response provides a clear executive summary — translates legal language into plain English the CEO can understand; covers all key terms (definition, term, survival, residuals, non-solicitation, governing law); organized logically (overview, key obligations, concerns, recommendation); the summary is concise enough to read in 5 minutes while comprehensive enough to make an informed signing decision."
    weight: 0.35
    description: "ClearExecutiveSummary"
  - type: llm_judge
    criteria: "Response identifies key risks and concerns — flags the residuals clause as potentially problematic for a software company (their employees could 'remember' proprietary algorithms); evaluates whether the non-solicitation is standard or aggressive for a pre-sales NDA; assesses the 5-year survival period; considers Delaware governing law implications for a startup; identifies anything missing (e.g., data protection, specific carve-outs for regulated information); the risk assessment is relevant to a 25-person startup dealing with a Fortune 500."
    weight: 0.35
    description: "KeyRisksIdentified"
  - type: llm_judge
    criteria: "Response provides an actionable recommendation — clearly states whether to sign, negotiate, or decline with reasoning; if recommending negotiation, specifies which clauses to change and suggests alternative language; the recommendation balances protecting the startup with not over-lawyering a standard NDA (recognizing this is a sales opportunity, not litigation); practical for a small company without in-house counsel."
    weight: 0.30
    description: "ActionableRecommendation"
