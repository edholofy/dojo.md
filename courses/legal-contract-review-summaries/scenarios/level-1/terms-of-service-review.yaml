meta:
  id: terms-of-service-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a cloud storage provider's Terms of Service and summarize data rights, liability limitations, and compliance implications for a small business"
  tags: [terms-of-service, cloud, data-rights, beginner]

state: {}

trigger: |
  You're the IT Manager at a 30-person accounting firm.
  The firm is considering switching from a local file
  server to a cloud storage solution for all client
  documents, including tax returns, financial statements,
  and confidential business records. The managing partner
  has asked you to review the cloud provider's Terms of
  Service before migrating sensitive client data.

  Key Terms of Service provisions:
  - Service description: Cloud storage, file sharing,
    and collaboration platform
  - Account: "Customer is responsible for maintaining
    the confidentiality of account credentials and for
    all activity under the account"
  - Data ownership: "Customer retains all ownership
    rights to Customer Content. By uploading Customer
    Content, Customer grants Provider a non-exclusive,
    worldwide, royalty-free license to host, store,
    transfer, display, perform, reproduce, and modify
    Customer Content solely for the purpose of operating
    and improving the Service"
  - Data location: "Customer Content may be stored in
    any of Provider's global data centers. Provider may
    transfer Customer Content across regions as needed
    for operational purposes"
  - Privacy: "Provider may collect and use metadata,
    usage patterns, and anonymized/aggregated data
    derived from Customer Content for any purpose,
    including product improvement and marketing"
  - Security: "Provider implements industry-standard
    security measures. Provider does not guarantee that
    the Service will be free from unauthorized access"
  - Availability: "Provider targets 99.9% uptime but
    does not guarantee uninterrupted service. Provider
    shall not be liable for service interruptions"
  - Backup: "Customer is solely responsible for
    maintaining backup copies of Customer Content.
    Provider performs routine backups for operational
    purposes only and assumes no obligation to restore
    Customer Content"
  - Termination: "Provider may terminate the Service
    with 30 days' notice. Upon termination, Customer
    has 30 days to export data. After 30 days, Provider
    may delete all Customer Content"
  - Liability: "Provider's total liability shall not
    exceed the fees paid in the 3 months preceding the
    claim. Provider shall not be liable for any
    indirect, incidental, consequential, or special
    damages, including loss of data"
  - Indemnification: "Customer shall indemnify Provider
    against any claims arising from Customer Content or
    Customer's use of the Service"
  - Modifications: "Provider may modify these Terms at
    any time. Continued use after modification
    constitutes acceptance"
  - Governing law: State of Washington
  - Compliance: No specific mention of SOC 2, HIPAA,
    GDPR, or industry-specific compliance certifications

  Task: Write a risk assessment memo for the managing
  partner explaining what these terms mean for the firm,
  especially regarding client confidentiality obligations,
  regulatory compliance (accounting firms have specific
  data protection requirements), and business continuity
  risks.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains the terms — translates ToS language into plain English relevant to an accounting firm; explains the data license grant and what 'reproduce and modify' means for client tax returns; clarifies the data location implications (cross-border transfers of confidential financial data); explains the backup responsibility gap; the memo is structured for a managing partner to make an informed decision."
    weight: 0.35
    description: "ClearTermsExplanation"
  - type: llm_judge
    criteria: "Response identifies compliance and confidentiality risks — flags conflict between the data license and accounting firm confidentiality obligations (AICPA Code of Professional Conduct, state board rules); identifies cross-border data transfer issues for client data; flags the metadata/usage pattern collection risk (could reveal client relationships); flags missing compliance certifications (SOC 2, HIPAA if any healthcare clients); evaluates the liability cap against potential data breach costs; identifies the unilateral terms modification risk."
    weight: 0.35
    description: "ComplianceRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical recommendations — recommends specific terms to negotiate before migration (data processing agreement, data residency requirements, compliance certifications, modified data license); suggests requiring SOC 2 Type II report; recommends backup strategy independent of provider; suggests client notification or consent requirements; the recommendations are practical for a 30-person accounting firm and acknowledge that they may need to consider alternative providers if terms can't be modified."
    weight: 0.30
    description: "PracticalRecommendations"
