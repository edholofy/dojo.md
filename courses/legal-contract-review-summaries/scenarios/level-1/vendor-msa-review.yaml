meta:
  id: vendor-msa-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a vendor Master Services Agreement and summarize key obligations, liability allocation, and termination provisions for a mid-size company"
  tags: [msa, vendor, services, beginner]

state: {}

trigger: |
  You're the Procurement Manager at a 200-person
  manufacturing company. You're engaging a staffing
  agency to provide temporary workers for a warehouse
  expansion project. The agency has sent their Master
  Services Agreement (MSA) with a Statement of Work
  (SOW) for 25 temporary workers over 6 months. Total
  contract value: approximately $650,000.

  Key MSA terms:
  - Term: 1 year, auto-renewing annually
  - SOW: 25 temporary workers, various warehouse roles,
    $18-28/hour bill rate (markup estimated at 45-60%)
  - Employer of record: Staffing agency is employer of
    record for all temporary workers
  - Worker qualification: "Agency shall ensure all
    workers meet Client's stated qualifications and pass
    applicable background checks"
  - Performance: "Client may request replacement of any
    worker for any reason with 24 hours' notice"
  - Temp-to-hire: "If Client hires any Agency worker
    within 12 months of assignment end, Client shall pay
    a conversion fee of 25% of the worker's first-year
    annual salary"
  - Indemnification: "Agency indemnifies Client against
    claims arising from Agency's employment obligations
    (wages, benefits, taxes, workers' comp). Client
    indemnifies Agency against claims arising from
    workplace safety conditions"
  - Liability cap: "Each party's total liability shall
    not exceed the fees paid under the applicable SOW
    in the 12 months preceding the claim"
  - Insurance: Agency carries $2M GL, $1M workers' comp,
    $1M professional liability
  - Termination: Either party may terminate with 30 days'
    written notice; individual SOWs may be terminated
    with 14 days' notice
  - Non-solicitation: "Client shall not directly solicit
    or hire any Agency employee or candidate presented
    by Agency for 12 months following last presentation"
  - Governing law: State of Ohio

  Task: Write a summary for your VP of Operations
  covering the key obligations, the financial structure
  (including hidden costs like conversion fees), the
  liability allocation, and any clauses to negotiate.

assertions:
  - type: llm_judge
    criteria: "Response provides a clear MSA summary — explains the relationship structure (agency as employer of record, client controls workplace); calculates full financial picture including markup range and conversion fee implications; explains SOW vs MSA relationship; covers termination provisions clearly; the summary is accessible to a VP of Operations who isn't a lawyer."
    weight: 0.35
    description: "ClearMSASummary"
  - type: llm_judge
    criteria: "Response identifies key risks — flags the conversion fee scope (25% of salary for hiring any agency worker within 12 months); evaluates the non-solicitation breadth ('any candidate presented' — could this apply to candidates you didn't even interview?); assesses the workplace safety indemnification (company bears all workplace injury liability); evaluates auto-renewal terms; identifies missing terms (performance guarantees, SLA for replacement workers, quality metrics)."
    weight: 0.35
    description: "KeyRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical recommendations — suggests specific negotiations (conversion fee reduction/waiver after certain period, non-solicitation narrowing, performance SLAs, rate cap for renewal); the recommendations are informed by staffing industry norms; practical for a $650K engagement; balances risk mitigation with maintaining a good vendor relationship."
    weight: 0.30
    description: "PracticalRecommendations"
