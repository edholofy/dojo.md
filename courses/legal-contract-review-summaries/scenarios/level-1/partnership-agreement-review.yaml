meta:
  id: partnership-agreement-review
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a small business partnership agreement and summarize profit-sharing, decision-making authority, and exit provisions"
  tags: [partnership, operating-agreement, small-business, beginner]

state: {}

trigger: |
  You're one of three friends starting a craft brewery
  and taproom. You've been handling the business side
  while your partners focus on brewing and marketing.
  One partner's uncle, a semi-retired attorney, drafted
  a partnership agreement. Your partners want to sign
  it this weekend, but you want to review it first.
  Total startup investment: $280,000.

  Key terms of the partnership agreement:
  - Entity: General Partnership (not LLC)
  - Partners: Alex (you) 40%, Jordan 35%, Riley 25%
  - Capital contributions: Alex $120,000, Jordan $90,000,
    Riley $70,000 — "Additional capital contributions
    may be required upon majority vote of the partners"
  - Profit/loss allocation: Per ownership percentages
  - Distributions: "Net profits shall be distributed
    quarterly, provided the partnership maintains a
    minimum cash reserve of $50,000"
  - Management: "All partners shall have equal management
    authority regardless of ownership percentage. Major
    decisions require unanimous consent. 'Major decisions'
    include: any expenditure over $5,000, new hires,
    lease agreements, and changes to the business plan"
  - Compensation: "No partner shall receive a salary or
    guaranteed payment. Partners shall be compensated
    solely through profit distributions"
  - Non-compete: "During the partnership and for 2 years
    after departure, no partner shall engage in any
    business related to craft brewing or beverage
    production within 50 miles"
  - Transfer of interest: "No partner may transfer their
    interest without unanimous consent of all other
    partners"
  - Withdrawal: "A partner may withdraw with 90 days'
    written notice. The withdrawing partner's interest
    shall be purchased by the remaining partners at book
    value determined by the partnership's most recent
    tax return"
  - Death/disability: "Upon death or permanent disability,
    the deceased/disabled partner's interest shall pass
    to their estate or designee, subject to the remaining
    partners' right of first refusal at book value"
  - Dissolution: "The partnership shall dissolve upon
    unanimous vote or upon the withdrawal of any partner
    unless remaining partners elect to continue within
    30 days"
  - Dispute resolution: "Disputes shall be submitted to
    mediation, and if unresolved, to binding arbitration"
  - Liability: General partnership — "each partner is
    jointly and severally liable for all partnership
    obligations"
  - No provision for: buy-sell insurance, valuation
    method beyond book value, intellectual property
    ownership, spousal consent, deadlock resolution

  Task: Write a summary for your two partners explaining
  the agreement in plain language, flagging the most
  significant risks (especially personal liability and
  the book value buyout), and recommending changes before
  signing.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains the partnership terms — translates the agreement into plain language non-lawyers can understand; explains ownership vs management authority disconnect (40/35/25 ownership but equal management); clarifies profit distribution mechanics; explains what 'jointly and severally liable' means in practical terms (any partner's actions can make all partners personally liable); the summary is conversational but thorough."
    weight: 0.35
    description: "ClearPartnershipSummary"
  - type: llm_judge
    criteria: "Response identifies critical risks — flags general partnership vs LLC (unlimited personal liability); flags book value buyout (dramatically undervalues a growing business — ignores goodwill, brand value, equipment appreciation); flags the mandatory additional capital contribution provision; identifies the deadlock risk with unanimous consent requirement; flags no salary provision for partners doing daily work; evaluates the non-compete scope; identifies missing provisions (buy-sell insurance, IP ownership, spousal consent, deadlock mechanism)."
    weight: 0.35
    description: "CriticalRisksIdentified"
  - type: llm_judge
    criteria: "Response provides practical recommendations — recommends converting to LLC for liability protection; suggests fair market value appraisal instead of book value for buyouts; recommends buy-sell insurance; suggests salary or guaranteed payments for working partners; recommends deadlock resolution mechanism; the recommendations are practical for three friends starting a business (not overly legalistic); acknowledges the relationship dynamics."
    weight: 0.30
    description: "PracticalRecommendations"
