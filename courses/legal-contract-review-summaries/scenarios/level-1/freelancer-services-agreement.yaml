meta:
  id: freelancer-services-agreement
  level: 1
  course: legal-contract-review-summaries
  type: output
  description: "Review a freelancer/independent contractor services agreement and summarize IP ownership, payment terms, and classification risks"
  tags: [freelancer, contractor, ip-ownership, beginner]

state: {}

trigger: |
  You're the Marketing Director at a 35-person e-commerce
  company. You've hired a freelance graphic designer to
  create brand assets (logo, packaging design, website
  graphics) for a major product launch. The designer has
  sent their standard services agreement. The project
  budget is $15,000 over 6 weeks.

  Key terms of the services agreement:
  - Independent contractor relationship (not employee)
  - Scope of work: "Designer shall create brand identity
    assets as described in Exhibit A"
  - IP ownership: "All work product created by Designer
    shall be owned by Designer until full payment is
    received. Upon full payment, Designer grants Client
    a non-exclusive, perpetual license to use the work
    product for Client's business purposes"
  - Portfolio rights: "Designer retains the right to
    display the work product in Designer's portfolio and
    marketing materials"
  - Revisions: "Scope includes up to 3 rounds of
    revisions per deliverable. Additional revisions
    billed at $150/hour"
  - Payment: 50% upfront ($7,500), 50% upon final
    delivery; net 15 terms
  - Late payment: 1.5% monthly interest on overdue
    balances
  - Kill fee: "If Client cancels the project after
    commencement, Client shall pay a kill fee equal to
    25% of the remaining project balance plus payment
    for all work completed to date"
  - Non-compete: None
  - Confidentiality: "Designer shall not disclose Client's
    confidential business information to third parties"
  - Warranties: "Designer warrants that the work product
    is original and does not infringe any third-party
    intellectual property rights"
  - Limitation of liability: "Designer's total liability
    shall not exceed the total fees paid under this
    Agreement"
  - Termination: Either party may terminate with 10 days
    written notice; kill fee applies
  - Governing law: State of New York

  Your concerns:
  - Your company is paying $15,000 but doesn't own the
    designs? Just a license?
  - Can the designer use your brand assets in their
    portfolio (showing your unreleased product)?
  - Is the kill fee reasonable?
  - Are 3 revision rounds enough?
  - What about work-for-hire?

  Task: Write a summary for your CEO explaining the
  agreement terms, specifically focusing on the IP
  ownership issue (license vs ownership), the portfolio
  rights concern, and any recommended changes before
  signing.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains the IP issue — distinguishes between ownership and license in plain language; explains that under this agreement the company pays $15,000 but only gets a non-exclusive license (designer retains ownership and could theoretically license similar work to others); explains work-for-hire doctrine and why it may or may not apply; recommends whether to negotiate for full ownership (assignment) or accept the license with modifications."
    weight: 0.35
    description: "IPIssueExplained"
  - type: llm_judge
    criteria: "Response addresses practical business concerns — evaluates portfolio rights (risk of unreleased product being shown before launch); assesses the kill fee reasonableness (25% of remaining balance); evaluates 3 revision rounds for brand identity work; considers the independent contractor classification risk; flags any missing terms (e.g., no non-compete means designer could work for competitors simultaneously); the analysis is specific to brand asset creation, not generic."
    weight: 0.35
    description: "PracticalBusinessConcerns"
  - type: llm_judge
    criteria: "Response provides clear negotiation recommendations — suggests specific contract language changes (e.g., 'work made for hire' or 'assignment of all rights' clause); proposes portfolio rights limitation (e.g., delay portfolio use until after product launch); recommends practical changes a freelancer would likely accept; the recommendations protect the company's brand investment while maintaining a fair relationship with the designer."
    weight: 0.30
    description: "NegotiationRecommendations"
