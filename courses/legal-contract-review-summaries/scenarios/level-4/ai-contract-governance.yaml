meta:
  id: ai-contract-governance
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Design an enterprise AI contract governance framework addressing the EU AI Act, model risk, algorithmic accountability, and evolving regulatory landscape"
  tags: [ai-governance, eu-ai-act, algorithmic-accountability, expert]

state: {}

trigger: |
  You're the Global Head of Technology Law at a Fortune
  100 financial services company ($45B revenue, 85,000
  employees). Your company uses AI across multiple
  business functions and is both a buyer and builder
  of AI systems. The Board's Risk Committee has requested
  a comprehensive AI contract governance framework in
  response to the EU AI Act entering enforcement and
  growing US regulatory activity.

  Current AI contract landscape:
  - 85 active AI/ML vendor contracts across the enterprise
  - 12 AI model vendors classified as "high-risk" under
    EU AI Act (credit scoring, fraud detection, HR
    screening, insurance underwriting)
  - 28 contracts with generative AI providers (ChatGPT
    Enterprise, Claude, Gemini, Microsoft Copilot,
    custom fine-tuned models)
  - 15 contracts where the company licenses its
    proprietary AI models to customers
  - 8 co-development agreements where AI models are
    jointly developed with partners

  Identified contract gaps:
  - No standardized AI-specific contract provisions in
    procurement templates
  - GenAI contracts do not address: output ownership,
    hallucination liability, training data provenance,
    model versioning, or content filtering obligations
  - High-risk AI vendor contracts lack: transparency
    obligations per EU AI Act Art. 13, conformity
    assessment requirements, fundamental rights impact
    assessment cooperation, post-market monitoring
  - Customer-facing AI licenses do not disclaim
    liability for AI-generated outputs or allocate
    algorithmic bias risk
  - Co-development agreements have unclear IP ownership
    for model weights, training data contributions, and
    derivative models
  - No contractual framework for AI model risk management
    (SR 11-7 compliance for financial services)
  - Insurance coverage for AI-related claims is uncertain
    — existing E&O and cyber policies may not cover
    algorithmic discrimination claims

  Regulatory landscape:
  - EU AI Act: High-risk AI system requirements (Art.
    6-15), deployer obligations (Art. 26), general-
    purpose AI model obligations (Art. 51-56)
  - US: SEC AI-related regulations, CFPB adverse action
    requirements for AI credit decisions, state AI laws
    (Colorado SB 21-169, Illinois BIPA for biometric
    AI), NIST AI RMF
  - UK: Pro-innovation approach; ICO AI guidance
  - Global: Singapore PDPA AI provisions, Canada AIDA

  Task: Write a comprehensive AI contract governance
  framework for the Board Risk Committee covering
  standardized contract provisions for each AI
  relationship type, EU AI Act compliance requirements,
  risk allocation framework, and implementation strategy.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive AI contract framework — designs differentiated contract provisions for each relationship type (AI vendor procurement, GenAI services, customer-facing AI licenses, co-development agreements); addresses model ownership and IP rights (weights, architectures, training data contributions, fine-tuned models, derivative works); creates GenAI-specific provisions (output IP, hallucination disclaimers, content filtering, training data representations, model versioning and update notification, prompt injection protections); establishes model risk management contract requirements aligned with SR 11-7; the framework demonstrates deep understanding of AI technology and its legal implications."
    weight: 0.35
    description: "ComprehensiveAIFramework"
  - type: llm_judge
    criteria: "Response addresses EU AI Act compliance specifically — maps contract requirements to EU AI Act provisions (Art. 13 transparency, Art. 14 human oversight, Art. 15 accuracy/robustness, Art. 26 deployer obligations); addresses high-risk AI system documentation requirements in vendor contracts; creates conformity assessment cooperation provisions; addresses general-purpose AI model obligations for both buying from and licensing to providers; evaluates how deployer obligations flow through the contract chain; addresses fundamental rights impact assessment requirements; the analysis is legally accurate regarding EU AI Act requirements and reflects the enforcement timeline."
    weight: 0.35
    description: "EUAIActCompliance"
  - type: llm_judge
    criteria: "Response provides financial-services-specific recommendations — addresses SR 11-7 model risk management in vendor contracts (model validation rights, documentation standards, performance monitoring); creates algorithmic accountability framework for credit, insurance, and HR decisions; addresses CFPB adverse action requirements; evaluates insurance coverage gaps and recommends AI-specific coverage; creates an AI vendor risk assessment methodology; establishes governance structure (AI contract review committee, escalation procedures, periodic review cycle); provides realistic implementation roadmap with prioritization; the framework would satisfy regulatory examination in multiple jurisdictions."
    weight: 0.30
    description: "FinancialServicesRecommendations"
