meta:
  id: regulated-industry-vendor-framework
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Design a vendor contract framework for a heavily regulated financial institution incorporating OCC, FDIC, and CFPB requirements"
  tags: [vendor-management, banking-regulation, third-party-risk, expert]

state: {}

trigger: |
  You're the Chief Legal Officer at a top-25 US bank
  ($85B total assets, 8,000 employees). The OCC has
  issued a Matter Requiring Attention (MRA) following
  its examination, citing deficiencies in your bank's
  third-party risk management program, specifically:

  OCC MRA findings:
  1. "Insufficient contractual protections in critical
     vendor agreements — 40% of critical vendor contracts
     lack required provisions per OCC Bulletin 2023-17"
  2. "No standardized contract review process for
     third-party relationships — contracts with critical
     vendors executed without risk management review"
  3. "Inadequate subcontractor oversight provisions —
     bank cannot identify or assess fourth-party risks"
  4. "Business continuity requirements in vendor contracts
     do not meet safety and soundness standards"
  5. "Data security and incident response obligations
     in vendor contracts are inconsistent and, in some
     cases, insufficient to meet BSA/AML and GLBA
     requirements"

  Your bank has 2,400 active vendor contracts, of which
  320 are classified as "critical" activities. The Board
  has given you 120 days to remediate the MRA. The OCC
  examiner has indicated that failure to remediate will
  result in a formal enforcement action.

  Current state:
  - No standardized contract templates or playbooks
  - Legal review required only for contracts >$1M
    (many critical vendors are below threshold)
  - 4 attorneys handle all vendor contracts (alongside
    other responsibilities)
  - No integration between vendor management and
    contract management systems
  - Last contract inventory was completed 3 years ago

  Task: Write a comprehensive remediation plan for the
  Board and OCC covering the vendor contract framework
  design, remediation of existing contracts, ongoing
  governance, and measurable milestones for the 120-day
  timeline.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive vendor contract framework — designs standardized contract provisions addressing each OCC MRA finding (OCC 2023-17 required provisions: performance standards, audit rights, subcontractor management, BCP requirements, data security, compliance with laws, indemnification, insurance, default/termination, dispute resolution); creates tiered contract review requirements based on criticality and risk, not just dollar value; integrates with FFIEC guidance and FDIC FIL-44-2008; the framework is specific to banking regulation and demonstrates deep understanding of OCC expectations."
    weight: 0.35
    description: "ComprehensiveVendorFramework"
  - type: llm_judge
    criteria: "Response addresses each MRA finding specifically — for Finding 1: creates mandatory contract provisions checklist for critical vendors; for Finding 2: designs risk-based contract review process with appropriate thresholds; for Finding 3: requires subcontractor disclosure, approval rights, and flow-down of key provisions; for Finding 4: specifies BCP/DR requirements including RTOs, testing frequency, and notification obligations; for Finding 5: creates data security standards with BSA/AML-specific requirements, GLBA safeguards, and incident response timelines; each remediation element maps to specific OCC guidance."
    weight: 0.35
    description: "MRAFindingsAddressed"
  - type: llm_judge
    criteria: "Response provides realistic 120-day remediation plan — phases the work (0-30 days: framework design and critical vendor prioritization; 30-60 days: begin contract amendments with highest-risk vendors; 60-90 days: complete critical vendor amendments; 90-120 days: governance implementation and OCC reporting); addresses resource requirements (additional attorneys, contract management technology, vendor management staff); includes measurable milestones for OCC reporting; creates ongoing governance structure (third-party risk committee, periodic reviews, contract compliance monitoring); the plan is realistic for a $85B bank and acknowledges that 320 critical vendor contracts cannot all be renegotiated in 120 days — prioritization is key."
    weight: 0.30
    description: "Realistic120DayPlan"
