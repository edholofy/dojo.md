meta:
  id: expert-contract-review-shift
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Handle an expert shift with simultaneous regulatory enforcement, corporate transaction, and systemic contract failure creating enterprise-level crisis"
  tags: [shift-simulation, regulatory-enforcement, crisis, expert]

state: {}

trigger: |
  You're the General Counsel at a publicly traded
  healthcare technology company ($2.8B revenue, NYSE
  listed, 12,000 employees). It's 7:00 AM on a Monday
  and three critical matters have converged:

  CRISIS 1 — SEC Investigation (7:00 AM):
  Your outside counsel calls: the SEC has issued a formal
  order of investigation into revenue recognition
  practices. Specifically:
  - 23 customer contracts have "side letters" granting
    extended payment terms, return rights, or contingent
    pricing that were not disclosed to the finance team
  - These side letters may have resulted in premature
    revenue recognition under ASC 606
  - Estimated revenue at risk: $145M over the past 3
    fiscal years
  - You must issue a litigation hold immediately and
    assess whether an 8-K filing is required
  - The Audit Committee is meeting at 2:00 PM

  CRISIS 2 — Ransomware Attack (8:30 AM):
  Your CISO reports a ransomware attack has encrypted
  patient data in your cloud platform. Initial assessment:
  - 4.2 million patient records potentially compromised
    across 380 hospital customers
  - Your BAA (Business Associate Agreement) with each
    hospital requires breach notification within 24 hours
  - HIPAA requires notification to HHS within 60 days
    for breaches affecting 500+ individuals
  - Your cyber insurance policy has a $5M deductible and
    $25M coverage limit
  - Your MSA with the 3 largest hospital systems (45% of
    revenue) has unlimited liability for HIPAA breaches
    and grants the hospital systems termination rights
    for "any breach of PHI regardless of cause"
  - Your SLA guarantees 99.99% uptime; current downtime
    is triggering service credits across all customers

  CRISIS 3 — Hostile Acquisition Attempt (10:00 AM):
  Your Board Chair calls: a competitor has filed a 13D
  disclosing a 9.2% stake and is expected to launch an
  unsolicited tender offer this week.
  - Your contracts contain 85 change-of-control
    provisions that could be triggered
  - Your top 10 customer contracts (60% of revenue) all
    have CoC termination rights
  - Key employee agreements have change-of-control
    acceleration provisions ($42M aggregate)
  - Your poison pill expired last year and was not
    renewed
  - The competitor is a direct competitor of many of
    your hospital customers — customers may terminate
    regardless of contractual provisions if they perceive
    a conflict

  Task: Write a comprehensive crisis management and
  contracts triage memo for the Board covering all three
  crises, identifying the interconnections, quantifying
  the financial exposure, and providing a prioritized
  action plan for the next 48 hours.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive crisis analysis — addresses all three crises with appropriate depth and urgency; quantifies the combined financial exposure (SEC: $145M revenue risk + restatement costs; ransomware: $25M insurance limit vs potential unlimited liability, service credits, customer termination risk on 45% of revenue; hostile bid: $42M in acceleration payments, 60% revenue at CoC termination risk); identifies the cascading interactions between crises (ransomware weakens defense against hostile bid; SEC investigation affects stock price creating acquisition vulnerability; customer contracts are central to all three); the analysis is Board-quality."
    weight: 0.35
    description: "ComprehensiveCrisisAnalysis"
  - type: llm_judge
    criteria: "Response identifies interconnections and compound risks — connects the SEC investigation to the hostile bid (stock price decline from restatement creates acquisition opportunity); connects the ransomware attack to customer termination risk across both the breach and the potential acquisition (customers may use either as termination trigger); identifies that the side letter discovery may affect the cyber insurance claim (misrepresentation in policy application?); flags that the hostile bidder may use the crises as leverage; identifies the compound risk of disclosing the ransomware attack while defending against both the SEC investigation and hostile bid; evaluates whether any crisis triggers 8-K filing obligations."
    weight: 0.35
    description: "InterconnectionsIdentified"
  - type: llm_judge
    criteria: "Response provides a realistic 48-hour action plan — prioritizes by regulatory deadline and business impact; addresses immediate legal obligations (litigation hold, breach notification, 8-K assessment, insider trading restrictions); creates separate but coordinated workstreams; identifies required external resources (outside counsel for SEC, incident response for ransomware, M&A defense advisors); addresses customer communication strategy (what to say about the breach without triggering CoC concerns); recommends Board and committee actions; addresses privileged communication protocols; the plan is realistic for a 12,000-person company in genuine crisis."
    weight: 0.30
    description: "Realistic48HourPlan"
