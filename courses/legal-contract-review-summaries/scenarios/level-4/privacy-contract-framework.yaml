meta:
  id: privacy-contract-framework
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Design a global privacy contract framework addressing GDPR, CCPA, LGPD, PIPL, and emerging privacy regulations across vendor and customer agreements"
  tags: [privacy, global-framework, gdpr-ccpa, expert]

state: {}

trigger: |
  You're the Global Chief Privacy Officer at a Fortune
  200 technology company ($22B revenue, 55,000 employees,
  operating in 40 countries). Your company processes
  personal data of 180 million individuals worldwide.
  Following the EU's record GDPR fine against Meta and
  increasing enforcement actions globally, your Board
  has directed you to overhaul the company's privacy
  contract framework.

  Current state assessment:
  - 4,200 vendor contracts with data processing terms —
    most use a 2018 GDPR DPA template that has not been
    updated for Schrems II, the EU-US Data Privacy
    Framework, or new SCCs
  - 850 customer contracts with privacy obligations —
    templates vary by region and business unit
  - Company processes data in 22 countries; transfers
    data between 15 countries
  - 380 sub-processors across the vendor ecosystem —
    current contracts provide general sub-processor
    authorization with notification
  - Key regulatory environments:
    * EU: GDPR (controller and processor obligations,
      cross-border transfers, DPA requirements)
    * US: CCPA/CPRA (California), state privacy laws in
      14 additional states with varying requirements
    * Brazil: LGPD (similar to GDPR but with unique
      legal basis requirements)
    * China: PIPL (data localization, government access,
      cross-border transfer restrictions)
    * India: DPDP Act 2023 (consent-based, data principal
      rights, significant data fiduciary obligations)
    * Japan: APPI (adequacy decision with EU, unique
      cross-border rules)
  - Recent incidents:
    * Sub-processor data breach affecting 2.3M EU data
      subjects — DPA template didn't clearly allocate
      breach notification responsibility
    * Chinese subsidiary's vendor contract didn't include
      PIPL-required data localization provisions — PIPL
      enforcement notice received
    * Customer audit revealed inconsistent data retention
      periods across vendor contracts (ranging from 30
      days to "indefinite")

  Task: Write a comprehensive global privacy contract
  framework proposal for the Board covering standardized
  DPA templates by jurisdiction, cross-border transfer
  mechanisms, sub-processor management, vendor audit
  rights, breach allocation, and implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive global privacy framework — designs a modular DPA architecture (core DPA + jurisdiction-specific addenda for GDPR, CCPA/CPRA, LGPD, PIPL, DPDP, APPI); addresses cross-border transfer mechanisms for each data flow corridor (EU-US via DPF and SCCs, EU-China challenges, Brazil-EU, India transfers); creates sub-processor management framework (approval workflows, flow-down requirements, monitoring); standardizes breach notification allocation and timelines by jurisdiction; creates data retention standards; the framework demonstrates deep understanding of global privacy law landscape and practical implementation challenges at scale."
    weight: 0.35
    description: "ComprehensivePrivacyFramework"
  - type: llm_judge
    criteria: "Response addresses jurisdiction-specific challenges — accurately identifies PIPL data localization requirements and cross-border transfer assessment obligations; addresses CCPA/CPRA 'sale' and 'sharing' definitions and how they differ from GDPR processing concepts; evaluates LGPD legal basis requirements; addresses the EU-US Data Privacy Framework and contingency planning for potential invalidation; identifies conflicts between jurisdictions (PIPL government access requirements vs GDPR); evaluates the DPDP Act's consent and data principal rights requirements; the analysis is legally accurate and current."
    weight: 0.35
    description: "JurisdictionSpecificChallenges"
  - type: llm_judge
    criteria: "Response provides realistic implementation roadmap — phases the remediation of 4,200 vendor and 850 customer contracts; prioritizes by risk (highest-risk jurisdictions and data types first); estimates resource requirements (privacy attorneys, technology, vendor management staff); addresses the recent incidents specifically (breach allocation fix, PIPL remediation, retention standardization); includes governance structure (privacy contract review committee, escalation procedures, annual review cycle); creates metrics for Board reporting; the roadmap is achievable for a Fortune 200 company and reflects privacy program management best practices."
    weight: 0.30
    description: "RealisticImplementation"
