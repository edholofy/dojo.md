meta:
  id: contract-management-program
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Design and implement an enterprise contract lifecycle management program with standardized playbooks, risk assessment frameworks, and compliance integration"
  tags: [clm, enterprise-program, governance, expert]

state: {}

trigger: |
  You're the Chief Legal Officer at a Fortune 500
  diversified industrial company ($14B revenue, 45,000
  employees, 12 business units across manufacturing,
  services, and technology). An internal audit revealed
  critical contract management failures:

  Audit findings:
  - The company has an estimated 28,000 active contracts
    with no central repository
  - 340 contracts auto-renewed in the past year without
    review (estimated $45M in unwanted commitments)
  - 12 contracts with change-of-control provisions were
    discovered during a recent divestiture — after
    signing the divestiture agreement
  - 3 business units have conflicting indemnification
    standards (some accept unlimited liability)
  - No standardized contract review process — some BUs
    have paralegals review, others have no legal review
    for contracts under $500K
  - 18 contracts reference discontinued insurance
    policies
  - IP ownership clauses vary wildly across vendor
    contracts — some give vendors ownership of custom
    development
  - The legal department (22 attorneys, 8 paralegals)
    reviews approximately 4,200 contracts/year; average
    cycle time is 23 days; 40% of contracts are executed
    without legal review

  The CEO has tasked you with designing a comprehensive
  Contract Lifecycle Management (CLM) program.

  Task: Write a comprehensive CLM program proposal for
  the Board covering the program design (governance,
  processes, technology, people), implementation roadmap,
  risk prioritization framework, standardized contract
  playbooks, and success metrics.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive CLM program design — addresses governance structure (CLM committee, contract authority matrix, escalation procedures); designs standardized processes (intake, triage, review, negotiation, approval, execution, management, renewal/termination); recommends technology solutions (CLM platform requirements, AI-assisted review, obligation tracking, auto-renewal alerts); addresses people/organization (staffing model, training program, business unit contract managers); creates a risk-based contract classification framework (Tier 1-4 based on value, risk, complexity); the design is scaled appropriately for a $14B company with 28,000 contracts."
    weight: 0.35
    description: "ComprehensiveCLMDesign"
  - type: llm_judge
    criteria: "Response addresses the specific audit findings — provides remediation plan for the 340 auto-renewed contracts; designs change-of-control tracking system; standardizes indemnification and liability positions across BUs; creates IP ownership standards; addresses the insurance policy reference issue; tackles the 40% executed-without-review gap; proposes realistic solutions that balance risk reduction with business velocity (not every contract needs 23-day legal review); creates contract review thresholds and tiering that reduce cycle time while increasing coverage."
    weight: 0.35
    description: "AuditFindingsRemediation"
  - type: llm_judge
    criteria: "Response provides realistic implementation roadmap — phases the program (quick wins vs medium-term vs transformational); estimates budget and resource requirements; defines success metrics (cycle time reduction, coverage increase, auto-renewal capture rate, compliance scores); identifies change management challenges (business unit resistance, adoption hurdles); includes standardized playbook structure for key contract types; the roadmap is achievable for a $14B industrial company and reflects CLM implementation best practices."
    weight: 0.30
    description: "ImplementationRoadmap"
