meta:
  id: complex-project-finance
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Review an interconnected suite of project finance documents for a large infrastructure project with multiple parties and risk allocation"
  tags: [project-finance, infrastructure, risk-allocation, expert]

state: {}

trigger: |
  You're the lead transactional attorney at a major law
  firm representing the project company (SPV) in a $1.8B
  offshore wind farm project. The project involves 14
  separate but interconnected agreements. Your client
  (the sponsor, a renewable energy developer) needs a
  comprehensive risk matrix before financial close,
  which is scheduled in 45 days.

  Key project agreements:
  1. CONCESSION AGREEMENT (with Government):
     - 25-year concession for offshore wind development
     - Government provides seabed lease rights
     - Power purchase obligation: "Government guarantees
       purchase of 70% of output at fixed tariff for
       15 years; remaining 30% at market prices"
     - Performance milestones: COD within 48 months;
       failure triggers concession termination and
       performance bond forfeiture ($50M)
     - Force majeure: Excludes "changes in wind patterns
       or resource availability"

  2. EPC CONTRACT (with Construction Consortium):
     - Lump sum turnkey: $1.2B
     - Consortium: European turbine manufacturer + Asian
       marine contractor + local civil contractor
     - Completion guarantee: LDs of 0.5%/week for delay,
       capped at 20% of contract price ($240M)
     - Performance guarantee: Minimum energy output of
       95% of P50 estimate; LDs for underperformance
     - Defects liability: 2-year warranty; extended 5-year
       for major components (foundations, cables)
     - Consortium liability: Joint and several

  3. O&M AGREEMENT (with Turbine Manufacturer):
     - 15-year operations and maintenance
     - Availability guarantee: 95% annual availability
     - Service fee: Fixed + variable per MWh
     - Step-in rights: SPV can step in if O&M provider
       fails to maintain minimum availability for 2
       consecutive quarters

  4. FINANCING AGREEMENTS:
     - Senior debt: $1.1B from syndicate of 8 banks
     - Subordinated debt: $200M from development finance
       institutions
     - Equity: $500M from sponsor and co-investors
     - DSCR covenant: Minimum 1.20x; lock-up at 1.10x;
       default at 1.05x
     - Cash sweep: 75% of excess cash flow to debt
       service after DSCR exceeds 1.30x
     - Step-in rights: Lenders can step into project
       agreements upon event of default

  5. POWER PURCHASE AGREEMENT (with Government Utility):
     - Take-or-pay: 70% of nameplate capacity
     - Tariff: $0.085/kWh, escalated at CPI annually
     - Payment: Monthly; sovereign guarantee for utility
       payment obligations
     - Curtailment: "If Grid Operator curtails output,
       deemed energy compensation at contracted tariff"

  6. GRID CONNECTION AGREEMENT:
     - Transmission operator builds connection
     - SPV pays connection charges ($85M)
     - Completion risk: Shared — transmission operator
       LDs of $500K/week for delay, capped at $15M

  Key risk allocation questions:
  - Who bears wind resource risk?
  - What happens if the EPC consortium member defaults?
  - How does the DSCR covenant interact with tariff
    payments?
  - What are the lender step-in right triggers and
    consequences?
  - Is the curtailment compensation adequate?
  - What gaps exist between the interconnected agreements?

  Task: Write a comprehensive risk matrix and gap
  analysis covering all major project risks, how they
  are allocated across the agreement suite, identified
  gaps or mismatches between agreements, and recommended
  solutions for each gap.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive risk matrix — identifies and categorizes all major project risks (construction risk, technology risk, wind resource risk, counterparty risk, regulatory/political risk, financing risk, operational risk, environmental risk); maps each risk to the specific agreement that allocates it; evaluates the adequacy of risk mitigation in each agreement; identifies the risk bearer for each category; the analysis demonstrates sophisticated project finance understanding and covers the full risk spectrum for an offshore wind project."
    weight: 0.35
    description: "ComprehensiveRiskMatrix"
  - type: llm_judge
    criteria: "Response identifies gaps and mismatches between agreements — flags the wind resource exclusion from force majeure in the concession agreement (who bears wind variability risk if output is below P50?); identifies the grid connection completion risk mismatch (transmission operator LDs capped at $15M but SPV faces $50M concession bond forfeiture for delay); evaluates the EPC-O&M handoff risk (what if defects emerge after EPC warranty but before O&M guarantee kicks in?); identifies the DSCR covenant interaction with cash sweep mechanism; flags the curtailment risk allocation (is 'deemed energy' payment enforceable against the sovereign guarantee?); identifies the consortium member default scenario (joint and several helps but what if the turbine manufacturer fails?)."
    weight: 0.35
    description: "GapsAndMismatches"
  - type: llm_judge
    criteria: "Response provides bankable solutions — recommends specific contractual modifications or additional agreements to close identified gaps (political risk insurance, reserve accounts for DSCR cushion, back-to-back provisions between agreements, performance bond sizing, interface agreements between EPC and O&M); evaluates whether the project is bankable in its current form; recommends conditions precedent for financial close; the solutions are specific enough to implement and reflect project finance best practices; the analysis would satisfy a lender's legal due diligence requirements."
    weight: 0.30
    description: "BankableSolutions"
