meta:
  id: sanctions-export-control-contracts
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Review and redesign contract provisions for sanctions compliance, export controls, and anti-corruption across a multinational supply chain"
  tags: [sanctions, export-control, fcpa, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer at a US-based
  aerospace and defense company ($6.5B revenue, 22,000
  employees, operations in 18 countries). OFAC has
  issued a subpoena requesting documents related to
  your company's transactions with entities in Turkey,
  the UAE, and India that may have re-exported controlled
  technology to sanctioned end-users. Simultaneously,
  the DOJ has opened a preliminary inquiry into potential
  FCPA violations related to your company's use of
  sales agents in the Middle East.

  Contract review findings:

  EXPORT CONTROL ISSUES:
  - 45 distributor/reseller agreements in 12 countries —
    only 18 contain end-use/end-user verification
    provisions
  - Turkish distributor contract: Standard distribution
    terms with no restriction on re-export; OFAC has
    identified this distributor as having resold products
    to an entity in a sanctioned country
  - UAE agent agreement: Commission-based sales agent
    with authority to "negotiate on behalf of Company
    with any customer in the region" — no geographic
    limitation, no sanctioned party screening requirement
  - India technology transfer agreement: Licensed
    manufacturing to Indian partner under TAA (Technical
    Assistance Agreement) approved by DDTC; contract
    does not restrict Indian partner's re-export of
    articles containing US-origin controlled technology
  - 12 supply agreements with foreign suppliers who
    provide components that may be subject to deemed
    export rules

  FCPA/ANTI-CORRUPTION ISSUES:
  - 8 sales agent agreements in Middle East and Africa —
    commission rates range from 5% to 22%
  - 3 agents are connected to government officials
    (discovered during investigation)
  - Agent agreements contain standard anti-corruption
    representations but no audit rights, no termination
    for corruption, and no commission payment controls
  - Joint venture in Saudi Arabia — local partner has
    government contracts and the JV agreement contains
    no anti-corruption provisions

  SANCTIONS COMPLIANCE:
  - Customer contracts do not contain sanctions
    representations or compliance obligations
  - No contractual mechanism to screen end-users in
    distribution chain
  - Restricted party screening performed only at order
    entry, not at contract execution or periodic review

  Task: Write a comprehensive remediation plan for the
  Board and outside counsel covering the immediate OFAC
  subpoena response, FCPA investigation cooperation
  strategy, contract remediation program, and redesigned
  compliance contract framework.

assertions:
  - type: llm_judge
    criteria: "Response provides comprehensive trade compliance analysis — evaluates the export control violations across ITAR (DDTC/ITAR for defense articles), EAR (Commerce Department for dual-use), and OFAC sanctions; identifies the Turkish distributor re-export as a potential ITAR/EAR violation; analyzes the India TAA scope and re-export restriction gaps; evaluates the deemed export risks in supply agreements; assesses the sanctions screening gaps; identifies the UAE agent authority scope as a potential sanctions exposure; the analysis demonstrates deep understanding of US export control and sanctions law."
    weight: 0.35
    description: "TradeComplianceAnalysis"
  - type: llm_judge
    criteria: "Response addresses FCPA risks and investigation strategy — evaluates the sales agent commission rates against industry norms and FCPA red flags (22% commissions, connections to government officials); identifies the specific FCPA risk factors in each agent relationship; evaluates the Saudi JV anti-corruption gap; recommends investigation cooperation strategy (voluntary self-disclosure considerations under DOJ FCPA Corporate Enforcement Policy); identifies document preservation obligations; assesses the adequacy of existing anti-corruption contract provisions; recommends agent due diligence program; the FCPA analysis reflects current DOJ enforcement trends and guidance."
    weight: 0.35
    description: "FCPAAnalysisAndStrategy"
  - type: llm_judge
    criteria: "Response provides actionable remediation framework — designs standardized contract provisions for export control compliance (end-use/end-user restrictions, re-export prohibitions, cooperation with investigations, termination rights); creates FCPA-compliant agent agreement template (audit rights, payment controls, anti-corruption certifications, termination for corruption, commission payment through banking channels); recommends sanctions compliance contract provisions (representations, screening obligations, prohibited transaction restrictions); prioritizes contract remediation by risk level; provides realistic timeline; addresses the OFAC subpoena response strategy; the framework would satisfy a monitor if one were appointed."
    weight: 0.30
    description: "RemediationFramework"
