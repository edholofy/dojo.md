meta:
  id: dispute-resolution-program
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Design an enterprise dispute resolution program analyzing patterns in contract disputes to improve contract drafting and risk allocation"
  tags: [dispute-resolution, contract-disputes, lessons-learned, expert]

state: {}

trigger: |
  You're the Chief Legal Officer at a global professional
  services firm ($5.2B revenue, 28,000 employees, offices
  in 35 countries). Your firm is spending $18M annually
  on contract disputes (litigation, arbitration,
  mediation). The CEO has asked you to analyze the
  dispute portfolio and redesign the firm's contract
  framework to reduce dispute frequency and cost.

  Dispute portfolio analysis (last 3 years):

  BY CATEGORY (145 disputes):
  - Scope disputes: 42 (29%) — client claims deliverables
    were not completed or were out of scope
  - Fee disputes: 35 (24%) — client refuses to pay,
    claims overcharging, disputes change orders
  - Performance claims: 28 (19%) — client alleges
    negligence, missed deadlines, quality failures
  - IP ownership: 18 (12%) — disputes over who owns
    work product, derivative works, pre-existing IP
  - Confidentiality breaches: 12 (8%) — alleged
    information leakage, conflict of interest claims
  - Termination disputes: 10 (7%) — disputes over
    termination fees, work-in-progress, transition

  BY OUTCOME:
  - Settled pre-litigation: 52 (average cost: $45,000)
  - Mediated: 38 (average cost: $120,000)
  - Arbitrated: 32 (average cost: $380,000)
  - Litigated: 23 (average cost: $680,000)
  - Total recovery on counter-claims: $8.2M (45% of
    amounts claimed)

  PATTERN ANALYSIS:
  - 78% of scope disputes involve projects with no
    detailed SOW or vague acceptance criteria
  - 65% of fee disputes arise from time-and-materials
    engagements without fee caps or estimates
  - 82% of IP disputes involve custom software or data
    analytics deliverables
  - Average dispute involves a $1.2M engagement; average
    cost to resolve is $185,000 (15% of engagement value)
  - 60% of disputes are with clients who have master
    agreements older than 3 years
  - Disputes in EMEA are 2.3x more likely to reach
    arbitration than US disputes

  ROOT CAUSE ANALYSIS:
  - Partners have authority to modify contract terms
    without legal review for engagements under $2M
  - 40% of engagements begin before the contract is
    fully executed ("letter of intent" starts)
  - SOW templates lack specificity for digital/analytics
    engagements
  - Change order process is informal; 55% of scope
    changes are verbal
  - Client satisfaction surveys are not linked to
    contract risk indicators

  Task: Write a comprehensive program redesign proposal
  for the Management Committee covering dispute root
  cause analysis, contract framework improvements,
  governance changes, and projected cost reduction.

assertions:
  - type: llm_judge
    criteria: "Response provides sophisticated dispute analysis — analyzes the dispute data to identify systemic contract drafting failures; quantifies the cost of poor contract practices ($18M annually, 15% of dispute engagement values); identifies the correlation between contract deficiencies and dispute categories (vague SOWs → scope disputes, no fee caps → fee disputes, unclear IP provisions → IP disputes); evaluates the outcome data to identify optimization opportunities (early resolution saves $535K per dispute vs litigation); the analysis demonstrates data-driven legal operations thinking."
    weight: 0.35
    description: "SophisticatedDisputeAnalysis"
  - type: llm_judge
    criteria: "Response addresses root causes with specific contract improvements — designs improved SOW templates with detailed acceptance criteria and deliverable specifications; creates fee management provisions (caps, estimates, change order procedures, fee dispute escalation); designs IP ownership framework for different deliverable types (custom software, data analytics, consulting deliverables); addresses the pre-execution engagement risk (binding letter of engagement, interim risk allocation); creates change management procedures with written approval requirements; each improvement is mapped to specific dispute categories and projected to reduce dispute frequency."
    weight: 0.35
    description: "ContractImprovements"
  - type: llm_judge
    criteria: "Response provides governance and operational recommendations — recommends contract authority matrix changes (legal review thresholds, partner authority limitations); designs early warning system linking client satisfaction to contract risk; creates dispute resolution cascade (negotiation → mediation → arbitration → litigation with mandatory stages); addresses the EMEA arbitration frequency (evaluate local dispute resolution preferences); projects cost reduction with specific targets; designs measurement and reporting framework; addresses the cultural change required (partner behavior, legal department role); the recommendations are practical for a global professional services firm."
    weight: 0.30
    description: "GovernanceRecommendations"
