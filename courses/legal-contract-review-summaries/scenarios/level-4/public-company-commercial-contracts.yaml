meta:
  id: public-company-commercial-contracts
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Review commercial contracts through a public company lens — SEC disclosure obligations, revenue recognition impact, and material contract analysis"
  tags: [public-company, sec-disclosure, revenue-recognition, expert]

state: {}

trigger: |
  You're the Deputy General Counsel (Commercial) at a
  publicly traded enterprise software company ($3.2B
  revenue, NYSE listed). Your company is preparing for
  its annual 10-K filing and Q4 earnings call. The CFO
  has flagged several commercial contracts that may have
  SEC disclosure, revenue recognition (ASC 606), or
  materiality implications.

  CONTRACTS REQUIRING ANALYSIS:

  Contract 1 — Strategic Partnership with Cloud Provider:
  - 5-year co-sell and integration partnership
  - Your company commits to $180M minimum spend on cloud
    services over 5 years
  - Cloud provider commits to $50M in co-marketing funds
    and dedicated sales resources
  - Revenue share: Cloud provider receives 15% referral
    fee on sales through their marketplace
  - IP: Joint development of integration modules; joint
    ownership of developed IP
  - Exclusivity: You cannot build native integrations
    with the cloud provider's top 3 competitors for 3
    years
  - Most recent quarter: $12M in revenue through this
    partnership (unclear if gross or net under ASC 606)

  Contract 2 — Enterprise Customer Side Letter:
  - $45M, 3-year enterprise deal with a Fortune 100
    customer
  - Side letter grants: Unlimited liability for data
    breaches (overrides standard $45M cap); most favored
    customer pricing (MFC); 90-day termination for
    convenience right; "if Company's product is acquired
    by [specific competitor], Customer may terminate
    immediately and receive full refund of prepaid fees"
  - The side letter was not reviewed by legal before
    execution (signed by regional VP of Sales)
  - 4 other enterprise customers have asked for similar
    terms after learning about this deal

  Contract 3 — Pending Acquisition Target's Contracts:
  - Your company has signed an LOI to acquire a SaaS
    company for $420M
  - Target's top 3 customers (40% of revenue) have
    contracts with change-of-control termination rights
  - Target offers a "perpetual license" option that
    converts SaaS subscriptions to perpetual licenses
    with annual maintenance — 15% of target's customers
    have elected this option
  - Target's standard contract includes broad
    indemnification for "any damages arising from use
    of the software" without limitation

  Contract 4 — Government Contract Pricing:
  - GSA Schedule contract with MFN pricing obligation
  - Commercial Sales Practices (CSP) disclosure requires
    reporting your "best pricing" across all customers
  - The side letter in Contract 2 may have created a
    new pricing floor that must be disclosed to GSA
  - Failure to disclose could trigger False Claims Act
    liability

  Task: Write a comprehensive analysis for your CLO
  and CFO covering the SEC disclosure implications,
  ASC 606 revenue recognition impact, materiality
  assessment for each contract, and recommended actions
  to address the cascading issues.

assertions:
  - type: llm_judge
    criteria: "Response provides sophisticated public company analysis — evaluates each contract against SEC materiality thresholds and disclosure requirements (Regulation S-K Item 601 material contract filing, MD&A disclosure, risk factor disclosure); analyzes ASC 606 implications for Contract 1 (principal vs agent determination for marketplace revenue, consideration payable to customer from co-marketing funds); identifies the side letter's impact on revenue recognition and contract modification accounting; evaluates the acquisition target's perpetual license conversions under ASC 606; the analysis demonstrates public company commercial contract sophistication."
    weight: 0.35
    description: "PublicCompanyAnalysis"
  - type: llm_judge
    criteria: "Response identifies cascading risks — connects the side letter MFC pricing to the GSA pricing obligation (False Claims Act risk); identifies the precedent risk of the side letter (4 customers already asking for similar terms — potential revenue impact across the customer base); evaluates the acquisition target's contract risks against purchase price ($420M for a company where 40% of revenue has CoC termination rights); identifies the unauthorized side letter execution as an internal controls deficiency (SOX implications); flags the exclusivity clause in the cloud partnership as a potential competitive risk requiring disclosure; identifies the unlimited liability provision as an off-balance-sheet risk."
    weight: 0.35
    description: "CascadingRisksIdentified"
  - type: llm_judge
    criteria: "Response provides prioritized remediation recommendations — recommends specific actions for each contract (side letter: remediation strategy with customer, internal controls fix, disclosure assessment; cloud partnership: ASC 606 analysis with auditors, exclusivity risk disclosure; acquisition: contract renegotiation as closing condition, purchase price adjustment; GSA: CSP disclosure update, voluntary self-disclosure consideration); addresses the SOX internal controls implications; suggests contract authority governance improvements; creates a timeline aligned with the 10-K filing deadline; the recommendations balance legal risk mitigation with business relationship preservation."
    weight: 0.30
    description: "PrioritizedRemediation"
