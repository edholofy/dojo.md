meta:
  id: cross-border-ma-contracts
  level: 4
  course: legal-contract-review-summaries
  type: output
  description: "Review a cross-border acquisition involving multiple jurisdictions, regulatory approvals, and complex contract integration across target company's agreements"
  tags: [cross-border-ma, multi-jurisdiction, regulatory, expert]

state: {}

trigger: |
  You're the General Counsel at a US-based global
  pharmaceutical company ($8B revenue). Your company
  is acquiring a European biotech company headquartered
  in Switzerland with subsidiaries in Germany, France,
  the UK, and Japan. The acquisition price is EUR 1.2B.
  The target has 450 employees and 380 active contracts.

  Critical contract review findings from due diligence:

  REGULATORY CONTRACTS:
  - Marketing Authorization Holder (MAH) agreements in
    12 EU member states — some require regulatory
    notification or approval for change of control
  - Japanese PMDA manufacturing site approval tied to
    the Swiss parent entity
  - FDA IND application references manufacturing at the
    German subsidiary facility
  - EMA Orphan Drug designation for lead compound — may
    require notification of ownership change
  - 4 clinical trial agreements with European academic
    medical centers — 2 have change-of-control
    termination rights

  COMMERCIAL CONTRACTS:
  - 28 distribution agreements across 15 countries — 12
    have change-of-control provisions; 8 have exclusive
    territory rights
  - Co-development agreement with a Japanese pharma
    company for the Asia-Pacific market ($85M invested
    to date) — requires partner consent for change of
    control; partner has right of first refusal to
    acquire the licensed rights at "fair value"
  - Supply agreements with 6 contract manufacturers
    (CMOs) in India, China, and Ireland — quality
    agreements, GMP requirements, and API supply chains
  - IT services contracts with local providers in each
    country — GDPR data processing obligations

  EMPLOYMENT CONTRACTS:
  - Swiss employment contracts for 180 employees —
    Swiss law requires consultation with employee
    representatives before transfer
  - German employees (120) — works council consultation
    required; German Transfer of Undertakings Act
    (§ 613a BGB) applies
  - French employees (80) — comité social et économique
    must be consulted; French labor law restrictions on
    post-acquisition terminations
  - UK employees (45) — TUPE regulations apply
  - Japanese employees (25) — Japanese labor law
    restrictions on termination; consent requirements

  IP CONTRACTS:
  - University license from ETH Zurich for foundational
    technology — exclusive, worldwide, but requires
    licensor consent for assignment; licensee must
    maintain Swiss research operations
  - 22 patent licenses (in-bound) and 8 patent licenses
    (out-bound) — varying change-of-control provisions
  - Co-ownership of 12 patents with the Japanese partner

  The acquisition agreement requires a closing conditions
  assessment and a post-closing integration risk register.

  Task: Write a comprehensive contracts risk assessment
  for the Board covering the closing conditions
  implications, integration risks, jurisdiction-specific
  requirements, and a prioritized action plan for the
  90-day period between signing and anticipated closing.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive cross-border contracts risk assessment — categorizes and evaluates contracts by risk level and deal impact; identifies which change-of-control provisions are closing conditions vs post-closing risks; evaluates the ETH Zurich license as a potential deal-breaker (foundational technology, assignment consent required, Swiss operations maintenance requirement); assesses the Japanese co-development partner's ROFR at 'fair value' as a significant deal risk; quantifies the financial exposure from contract termination risks; the assessment reflects sophisticated cross-border M&A experience."
    weight: 0.35
    description: "CrossBorderRiskAssessment"
  - type: llm_judge
    criteria: "Response addresses jurisdiction-specific requirements — correctly identifies the employment law requirements in each jurisdiction (Swiss consultation, German works council/§613a, French CSE consultation and termination restrictions, UK TUPE, Japanese consent); evaluates the regulatory notification/approval requirements for MAH transfers in EU member states; identifies the PMDA site transfer implications; addresses GDPR data processing agreement updates needed; evaluates the distribution agreement change-of-control provisions across jurisdictions; identifies the IP assignment/transfer requirements by jurisdiction; demonstrates understanding of how these requirements interact with the acquisition timeline."
    weight: 0.35
    description: "JurisdictionSpecificRequirements"
  - type: llm_judge
    criteria: "Response provides a prioritized 90-day action plan — identifies critical path items (consents required before closing, regulatory notifications, employee consultation timelines); creates a workstream structure with responsible parties; identifies which consents to seek pre-closing vs post-closing; recommends specific provisions for the acquisition agreement (closing conditions, covenants, indemnification for contract losses); suggests interim operating arrangements; estimates resource requirements (local counsel in each jurisdiction, integration team); the plan is realistic for a 90-day signing-to-closing timeline."
    weight: 0.30
    description: "Prioritized90DayPlan"
