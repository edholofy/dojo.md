meta:
  id: contract-law-empirical-research
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Design and present empirical research on contract review practices, analyzing the gap between contract terms and actual enforcement outcomes"
  tags: [empirical-research, enforcement-outcomes, academic, master]

state: {}

trigger: |
  You're a tenured Professor of Law at Columbia Law
  School and Director of the Center for Contract
  Analytics. You've secured a $2.8M grant from the
  National Science Foundation (NSF) and the American
  Bar Foundation to conduct the most comprehensive
  empirical study of commercial contract practices ever
  undertaken. Your research question: "Do the provisions
  that lawyers spend the most time negotiating actually
  predict dispute outcomes?"

  Preliminary data (pilot study — 800 contracts):
  - Lawyers spend 42% of negotiation time on liability
    and indemnification provisions, but these provisions
    are invoked in only 3.2% of contract disputes
  - Limitation of liability caps are enforced as written
    in only 34% of litigation outcomes — courts modify
    or invalidate the cap 66% of the time
  - Non-compete provisions are found enforceable in only
    28% of litigation challenges (varies dramatically
    by state: 12% in California, 67% in Florida)
  - "Material adverse effect" definitions — despite
    extensive negotiation — have been interpreted by
    courts favorably for the party invoking MAE in only
    7% of reported decisions
  - Merger/integration clauses fail to prevent parol
    evidence admission in 41% of cases
  - The provisions most predictive of dispute outcome
    are: (1) dispute resolution mechanism, (2) governing
    law, and (3) notice provisions — collectively
    negotiated for only 8% of total negotiation time
  - AI analysis of 5,200 contracts found that 73% of
    "heavily negotiated" provisions use language that
    courts have previously found ambiguous

  Full study design:
  - Phase 1: Corpus building — 25,000 commercial
    contracts from 12 industries, paired with dispute
    outcomes (settlement and litigation)
  - Phase 2: Linguistic analysis — NLP analysis of
    contract language predictiveness of enforcement
    outcomes
  - Phase 3: Behavioral study — survey and interviews
    with 800 transactional lawyers on negotiation time
    allocation and risk perception
  - Phase 4: Economic analysis — cost-benefit analysis
    of contract negotiation practices against actual
    risk mitigation achieved

  You're presenting the research design and preliminary
  findings at the American Law and Economics Association
  (ALEA) annual meeting. The presentation must convince
  the audience of the research significance, methodology
  rigor, and potential impact on legal practice.

  Task: Write the complete ALEA presentation paper
  covering the research design, preliminary findings,
  theoretical framework, methodology, anticipated
  contributions to legal scholarship, and implications
  for contract drafting practice.

assertions:
  - type: llm_judge
    criteria: "Response provides rigorous research design — presents a theoretically grounded research question with clear hypotheses; justifies the methodology for each phase (corpus linguistics for Phase 2, empirical behavioral research for Phase 3, econometric analysis for Phase 4); addresses sample selection methodology for the 25,000-contract corpus; identifies potential biases and limitations (selection bias in litigated disputes, survivorship bias, confidential settlement data gaps); the research design would be credible at a top law and economics conference."
    weight: 0.35
    description: "RigorousResearchDesign"
  - type: llm_judge
    criteria: "Response engages with the provocative preliminary findings — develops the theoretical framework for why lawyers over-invest in provisions with low enforcement predictiveness (behavioral economics: availability bias, anchoring, loss aversion, status quo bias in contract templates); analyzes the liability cap enforcement data (34% enforcement rate) and its implications for risk allocation theory; explores the MAE enforcement gap (7% success rate despite extensive negotiation); addresses the dispute resolution mechanism finding (most predictive but least negotiated); the analysis challenges conventional transactional lawyering wisdom with empirical evidence."
    weight: 0.35
    description: "ProvocativeFindingsAnalysis"
  - type: llm_judge
    criteria: "Response articulates practical and scholarly impact — identifies contributions to contract theory (incomplete contracts, relational contracts, behavioral law and economics); proposes implications for legal education (how should law schools teach contract drafting if traditional emphasis areas are least predictive?); suggests implications for legal practice (reallocation of negotiation time, contract review priorities); addresses the AI contract review implications (can AI be trained on enforcement outcomes rather than provision identification?); proposes future research directions; the paper would generate scholarly discussion and practical re-evaluation of contract review methodology."
    weight: 0.30
    description: "ScholarlyAndPracticalImpact"
