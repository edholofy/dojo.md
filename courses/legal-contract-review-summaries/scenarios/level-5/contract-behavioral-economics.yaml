meta:
  id: contract-behavioral-economics
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Apply behavioral economics to contract review, designing interventions to improve negotiation outcomes and reduce cognitive biases in contract drafting"
  tags: [behavioral-economics, cognitive-bias, negotiation, master]

state: {}

trigger: |
  You're a Professor of Behavioral Law and Economics at
  the University of Chicago Law School, jointly appointed
  with the Booth School of Business. You've been awarded
  a $1.5M grant from the John D. and Catherine T.
  MacArthur Foundation to study cognitive biases in
  contract review and develop evidence-based interventions.
  Your research program, "The Cognitive Architecture of
  Contract Review," has completed its first major study.

  Study design and key findings:

  EXPERIMENT 1 — Anchoring in Liability Negotiations:
  - 240 experienced transactional lawyers reviewed
    identical contracts with different initial liability
    cap proposals
  - When the first draft proposed a $10M cap, lawyers
    negotiated to an average of $7.2M
  - When the first draft proposed a $50M cap, lawyers
    negotiated to an average of $28.4M
  - The anchor effect was present even when lawyers were
    warned about anchoring bias (effect reduced by only
    15%)
  - More experienced lawyers (20+ years) were MORE
    susceptible to anchoring than junior lawyers

  EXPERIMENT 2 — Framing Effects in Risk Allocation:
  - 180 lawyers reviewed indemnification clauses framed
    either as "protection" or "exposure"
  - When framed as "Company's protection against claims,"
    72% accepted broad indemnification
  - When framed as "Company's exposure to liability," only
    31% accepted the same provision
  - Lawyers who reviewed the provision in a "red flag
    report" format caught 40% more issues than those who
    reviewed it in standard contract format

  EXPERIMENT 3 — Status Quo Bias in Template Contracts:
  - 300 lawyers at 12 companies reviewed their company's
    standard template contracts
  - 85% made no substantive changes to provisions that
    had been in the template for 5+ years
  - When asked to draft the same provisions from scratch
    (without seeing the template), 62% produced
    materially different provisions
  - The status quo bias was strongest for "boilerplate"
    provisions (governing law, notices, assignments,
    severability)

  EXPERIMENT 4 — Overconfidence in Contract Interpretation:
  - 200 lawyers rated their confidence in contract
    provision interpretation
  - Average confidence: 82%; actual accuracy: 61%
  - Overconfidence was highest for ambiguous provisions
    (confidence: 76%, accuracy: 44%)
  - Lawyers with litigation experience were 25% more
    accurate than pure transactional lawyers (but showed
    similar overconfidence)

  EXPERIMENT 5 — Decision Fatigue in High-Volume Review:
  - 120 lawyers reviewed contracts sequentially over 8
    hours
  - Issue identification dropped 34% between the first
    and last contract reviewed
  - Critical risk provisions missed increased from 8%
    (first contract) to 31% (last contract)
  - 15-minute breaks every 90 minutes reduced the
    fatigue effect by 55%

  Your book, "Thinking, Fast and Slow About Contracts,"
  is under contract with Yale University Press and due
  in 6 months.

  Task: Write the complete book proposal and chapter
  outline for Yale University Press, synthesizing your
  research findings into a coherent framework that will
  appeal to both legal academics and practicing lawyers.

assertions:
  - type: llm_judge
    criteria: "Response provides a rigorous behavioral economics framework — synthesizes the experimental findings into a coherent theoretical framework (applying Kahneman/Tversky/Thaler concepts to contract law); explains why traditional contract theory (rational actors, complete information) fails to account for observed lawyer behavior; develops original theoretical contributions (e.g., 'contract cognition theory' or equivalent framework); engages with existing behavioral law and economics literature; the framework is novel, well-grounded in the experimental data, and extends existing theory in meaningful ways."
    weight: 0.35
    description: "RigorousBehavioralFramework"
  - type: llm_judge
    criteria: "Response develops practical interventions — proposes evidence-based debiasing interventions for each identified bias (structured review checklists for anchoring, 'consider the opposite' protocols for framing, template sunset requirements for status quo bias, calibration training for overconfidence, fatigue management protocols); designs these interventions as implementable programs for legal departments; addresses the paradox from Experiment 1 (experienced lawyers more susceptible to anchoring) and what it means for training; each intervention is grounded in the experimental evidence and behavioral science literature."
    weight: 0.35
    description: "PracticalInterventions"
  - type: llm_judge
    criteria: "Response creates a compelling book proposal — develops a clear chapter structure that builds from individual biases to systemic implications to interventions; identifies the target audience (legal academics, General Counsels, senior lawyers); positions the book within the existing literature (Sunstein, Thaler, Ariely, Korobkin in law); explains why this book is needed now (AI contract review tools may amplify or mitigate biases); includes a marketing strategy for reaching practicing lawyers; the proposal would be compelling to Yale University Press and would represent a significant contribution to legal scholarship."
    weight: 0.30
    description: "CompellingBookProposal"
