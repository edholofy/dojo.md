meta:
  id: contract-ethics-framework
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Develop an ethical framework for contract review addressing AI bias, access to justice, power asymmetry, and professional responsibility in the age of algorithmic contracting"
  tags: [ethics, professional-responsibility, ai-bias, master]

state: {}

trigger: |
  You're the Chair of the ABA Standing Committee on
  Ethics and Professional Responsibility. The Committee
  has been tasked with developing a comprehensive ethical
  framework for contract review in the age of AI. This
  is the most significant update to contract-related
  professional responsibility guidance since the Model
  Rules were adopted in 1983.

  The framework must address five critical ethical
  challenges:

  CHALLENGE 1 — AI-Assisted Contract Review:
  - When a lawyer uses AI to review a contract and the
    AI misses a critical provision, who bears ethical
    responsibility?
  - Can a lawyer ethically represent that they have
    "reviewed" a contract if AI did the primary analysis?
  - How does Model Rule 1.1 (Competence) apply to AI-
    augmented contract review?
  - Should lawyers be required to disclose AI use to
    clients? To opposing parties?

  CHALLENGE 2 — Access to Justice and Contracts:
  - Small businesses and individuals cannot afford
    professional contract review ($2,800 average cost)
  - "Contract deserts" exist: 89% of small businesses
    sign contracts without legal review
  - AI tools could democratize access but may also
    create new risks (reliance on inaccurate AI analysis)
  - Should non-lawyer contract review services be
    permitted under UPL rules?

  CHALLENGE 3 — Power Asymmetry in Contracting:
  - Large companies with AI-powered contract analysis
    tools negotiate against small companies with none
  - Standard form contracts (adhesion contracts) are
    drafted with AI optimization for the drafter's
    benefit
  - Companies train AI models on their own dispute
    outcomes, creating information asymmetry
  - Is there an ethical obligation to disclose AI-
    generated negotiation advantages?

  CHALLENGE 4 — Cross-Border Ethical Conflicts:
  - A US lawyer reviews a contract governed by EU law
    using an AI tool trained on US contracts
  - Jurisdictional competence requirements vary (some
    states require competence in AI, others don't)
  - International ethical frameworks for AI-assisted
    legal services are non-existent
  - Conflict of interest screening with AI tools creates
    data privacy issues

  CHALLENGE 5 — Smart Contract Ethics:
  - Self-executing smart contracts can cause irreversible
    harm before human review
  - Who is liable when a smart contract provision
    executes contrary to the parties' mutual intent?
  - How does the duty of loyalty apply when advising on
    smart contracts that remove human discretion?
  - Immutable smart contract provisions may violate
    unconscionability doctrines

  The Committee must produce formal guidance that will
  be submitted to the ABA House of Delegates for
  adoption as amendments to the Model Rules and
  Comments.

  Task: Write the Committee's formal report and proposed
  Model Rules amendments addressing all five challenges,
  with commentary and practical implementation guidance.

assertions:
  - type: llm_judge
    criteria: "Response provides substantive ethical framework — addresses each of the five challenges with specific proposed Model Rule amendments or commentary; grounds the analysis in existing professional responsibility principles (competence, diligence, communication, confidentiality, supervision); extends these principles to AI-assisted contract review in a principled way; addresses the AI competence question (what does 'competent' AI-assisted review require?); the framework is internally consistent and would be credible as an ABA Ethics Committee product."
    weight: 0.35
    description: "SubstantiveEthicalFramework"
  - type: llm_judge
    criteria: "Response addresses the most difficult tensions — navigates the access-to-justice vs UPL protection tension; addresses the power asymmetry issue without being anti-technology; evaluates the smart contract irreversibility challenge against existing ethical duties; addresses the cross-border competence issue practically; evaluates whether AI contract review creates new duties of care or modifies existing ones; addresses the disclosure question (AI use disclosure to clients vs opposing parties) with nuance; each tension is resolved with a defensible position, not avoided."
    weight: 0.35
    description: "DifficultTensions"
  - type: llm_judge
    criteria: "Response provides implementable guidance — drafts specific Model Rule amendments or new comments in proper ABA format; provides practical implementation guidance for lawyers and law firms; includes examples and illustrations; addresses the transition period (what should lawyers do now while standards are evolving?); considers enforcement mechanisms; addresses the impact on legal education and CLE requirements; the guidance would be practically useful for the 1.3 million US lawyers who would be subject to it; balances prescriptiveness with flexibility for a rapidly evolving technology landscape."
    weight: 0.30
    description: "ImplementableGuidance"
