meta:
  id: contract-review-thought-leadership
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Write a thought leadership article on the future of contract review — AI-assisted analysis, smart contracts, and the evolving role of legal professionals"
  tags: [thought-leadership, future-contracts, ai-legal, master]

state: {}

trigger: |
  You're a Professor of Law and Technology at Stanford
  Law School, and a former General Counsel at a Fortune
  100 technology company. The Harvard Law Review has
  invited you to write a lead article titled "The
  Contract Singularity: When AI Reads Better Than
  Lawyers." Your research over the past 3 years has
  produced provocative findings:

  Research findings:
  - Study of 12,000 contract reviews: AI-assisted review
    identified 31% more risk provisions than unassisted
    lawyer review; however, AI missed 18% of context-
    dependent risks that experienced lawyers caught
  - Analysis of 2,800 enterprise contracts: 67% contain
    at least one provision that conflicts with another
    provision in the same agreement; average contract
    has 2.3 internal inconsistencies
  - Survey of 450 General Counsels: 72% believe AI will
    fundamentally change contract review within 5 years;
    only 23% have deployed AI contract review tools;
    45% cite "trust" as the primary barrier
  - Longitudinal study of AI contract review accuracy:
    Improved from 74% to 91% precision over 3 years on
    standard clause identification; but accuracy on
    novel or unusual provisions remains at 62%
  - Economic analysis: AI-assisted contract review
    reduces review time by 60% and cost by 45%; but
    organizations using AI review without human oversight
    have 2.8x higher dispute rates
  - Smart contract adoption: 8% of enterprise contracts
    now include machine-executable provisions; primarily
    in supply chain (auto-ordering), insurance (parametric
    claims), and financial services (covenant monitoring)
  - Jurisdictional analysis: EU AI Act classifies
    "AI systems used to interpret and apply legal
    provisions" as high-risk, requiring conformity
    assessment; US has no equivalent regulation
  - Ethical concerns: AI contract review tools trained
    primarily on US/UK contracts create bias against
    civil law provisions; smaller companies using AI
    negotiate worse terms against larger companies with
    custom-trained models

  Your article must address: the current state of AI
  contract review, its limitations, the smart contract
  convergence, regulatory implications, ethical concerns,
  and a vision for the profession.

  Task: Write the full article for the Harvard Law Review,
  grounded in your research findings, providing both
  academic rigor and practical insight for the legal
  profession.

assertions:
  - type: llm_judge
    criteria: "Response provides academically rigorous analysis — integrates the research findings into a coherent argument about the transformation of contract review; addresses the AI accuracy gap (91% on standard clauses vs 62% on novel provisions) and its implications for professional responsibility; analyzes the 2.8x dispute rate increase for unsupervised AI review; explores the paradox of AI finding more risks but missing context-dependent ones; the article has a clear thesis, logical progression, and academic depth appropriate for the Harvard Law Review."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Response addresses systemic implications — explores the smart contract convergence and what it means for contract law (when contracts self-execute, what role does review play?); analyzes the EU AI Act high-risk classification and its impact on legal AI deployment; addresses the ethical dimension of AI bias in contract review (common law bias, power asymmetry between large and small companies); evaluates the access-to-justice implications (does AI contract review democratize legal services or create new inequities?); considers the professional responsibility implications (can a lawyer rely on AI review? what's the standard of care?); the analysis is forward-looking and addresses implications beyond incremental improvement."
    weight: 0.35
    description: "SystemicImplications"
  - type: llm_judge
    criteria: "Response provides a compelling vision for the profession — proposes a framework for human-AI collaboration in contract review (not replacement but augmentation); suggests regulatory and professional standards for AI-assisted legal services; addresses the workforce transformation (what skills do lawyers need in an AI-augmented world?); proposes solutions to the ethical concerns raised by the research; the vision is realistic, actionable, and balances optimism with appropriate caution; the article would generate discussion and advance the scholarly conversation."
    weight: 0.30
    description: "CompellingProfessionalVision"
