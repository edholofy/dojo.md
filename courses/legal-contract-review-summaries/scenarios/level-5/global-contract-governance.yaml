meta:
  id: global-contract-governance
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Design a global contract governance operating model for a Fortune 50 company, integrating AI, compliance, and multi-jurisdictional requirements"
  tags: [global-governance, fortune-50, operating-model, master]

state: {}

trigger: |
  You're the first-ever Global Chief Contracts Officer
  (CCO) at a Fortune 50 industrial conglomerate ($78B
  revenue, 220,000 employees, 95 countries, 8 business
  divisions spanning aerospace, healthcare equipment,
  energy systems, and financial services). The CEO
  created this role after three concurrent crises:

  Crisis 1: A $2.3B government contract in the Middle
  East was terminated due to FCPA violations embedded
  in subcontractor agreements that no one reviewed.

  Crisis 2: The healthcare division lost a $180M
  contract dispute because the German subsidiary used
  a non-standard indemnification clause that was
  unenforceable under German law — a clause that the
  US legal team had approved.

  Crisis 3: During a divestiture of the consumer
  products division, 1,200 contracts with change-of-
  control provisions were discovered 48 hours before
  closing, nearly killing the $4.2B deal.

  Current state:
  - Estimated 185,000 active contracts across all
    divisions and countries
  - 8 legal departments operating independently (one per
    division), plus corporate legal
  - 340 lawyers worldwide; only 45 focus on contract
    review
  - No central contract repository; 14 different CLM
    systems or spreadsheets in use
  - Contract templates: 2,800+ templates across divisions
    with no harmonization
  - Languages: Contracts in 28 languages; no translation
    or harmonization process
  - Review cycle time: Ranges from 4 days (financial
    services, standardized) to 68 days (aerospace,
    government contracts)
  - Annual contract spend under management: Estimated
    $42B across all categories
  - Current annual spend on contract-related disputes
    and losses: $340M

  The Board has given you a $45M budget over 3 years
  and full organizational authority to build a global
  contract governance function from scratch.

  Task: Write a comprehensive Global Contract Governance
  Operating Model proposal for the Board covering
  organizational design, technology strategy, process
  standardization (respecting local requirements),
  risk management framework, implementation roadmap,
  and projected ROI.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive global operating model — designs an organizational structure that balances global standards with divisional and local requirements (center of excellence model with regional hubs); addresses the 8 independent legal departments integration challenge; creates a contract authority matrix appropriate for a $78B company; designs a technology strategy (CLM platform consolidation, AI-assisted review, contract analytics); addresses the 28-language challenge; creates a risk-based contract classification and review framework; the operating model is scaled appropriately for 185,000 contracts and 95 countries."
    weight: 0.35
    description: "ComprehensiveOperatingModel"
  - type: llm_judge
    criteria: "Response addresses the three crises systemically — designs FCPA/compliance integration into contract review workflow (subcontractor screening, anti-corruption provisions, third-party risk assessment); creates cross-jurisdictional legal review process (German law example: local law review requirements, enforceability assessment protocols); designs change-of-control tracking and M&A readiness program; each crisis prevention mechanism is embedded in the operating model, not bolted on; demonstrates how the proposed model would have prevented each crisis."
    weight: 0.35
    description: "CrisisPreventionDesign"
  - type: llm_judge
    criteria: "Response provides realistic implementation plan with ROI — phases the 3-year implementation realistically (Year 1: foundation and quick wins; Year 2: technology deployment and process standardization; Year 3: AI integration and optimization); allocates the $45M budget credibly (technology, people, change management, external resources); projects ROI against the $340M annual dispute/loss figure; creates measurable milestones for Board reporting; addresses change management at scale (220,000 employees, cultural resistance, division autonomy); the implementation plan would be credible to a Fortune 50 Board and represents achievable transformation."
    weight: 0.30
    description: "RealisticImplementation"
