meta:
  id: contract-standards-body
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Lead the development of international contract standards for AI-era commercial agreements, balancing innovation with risk allocation"
  tags: [standards-development, international, ai-era, master]

state: {}

trigger: |
  You're the Chair of a newly formed UNCITRAL Working
  Group on "Smart and AI-Enabled Commercial Contracts."
  The UN Commission on International Trade Law has
  tasked your working group with developing model
  provisions and guidance for commercial contracts that
  involve AI systems, algorithmic decision-making, and
  self-executing smart contract provisions. The working
  group includes 45 delegates from 28 countries, plus
  observers from ICC, UNIDROIT, and the Hague Conference.

  Background and mandate:
  - The existing UNCITRAL Model Law on Electronic
    Commerce (1996) and Convention on Electronic
    Contracts (2005) do not address AI-generated or
    AI-interpreted contract provisions
  - The ICC reports that 35% of international commercial
    disputes now involve AI-related contractual issues
    (data processing, algorithmic decisions, automated
    performance)
  - No international standard exists for:
    * Allocating liability for AI-generated outputs in
      a contractual relationship
    * Defining "performance" when AI systems execute
      contract provisions autonomously
    * Addressing situations where AI interpretation of
      contract terms differs from human interpretation
    * Smart contract provisions that self-execute without
      human review
    * Cross-border recognition of AI-assisted contract
      formation

  Key working group tensions:
  - US/UK delegation: Favors principles-based approach;
    minimal prescription; let markets develop standards
  - EU delegation: Favors detailed provisions aligned
    with EU AI Act; mandatory transparency requirements;
    human oversight obligations
  - China delegation: Supports technology standards but
    opposes provisions that could require disclosure of
    AI training data or algorithms
  - Developing country bloc (15 nations): Concerned
    about technology gap creating contract asymmetry;
    wants provisions protecting parties without AI
    capabilities
  - ICC observer: Wants practical provisions that don't
    impede trade; concerned about complexity

  Your mandate: Develop a set of Model Provisions on
  AI-Enabled Commercial Contracts for consideration at
  the next UNCITRAL plenary session in 18 months.

  Task: Write the Working Group Report including proposed
  model provisions with commentary, addressing the key
  tensions, providing options where consensus is not
  possible, and recommending a path forward for the
  plenary session.

assertions:
  - type: llm_judge
    criteria: "Response provides credible model provisions — drafts substantive provisions covering: AI system disclosure obligations in contract formation, liability allocation for AI-generated performance, dispute resolution for algorithmic contract interpretation, smart contract execution standards, cross-border recognition, and human oversight requirements; the provisions are drafted in proper UNCITRAL model law style (neutral, technology-neutral language suitable for adoption across legal systems); the provisions address real contractual problems, not theoretical ones."
    weight: 0.35
    description: "CredibleModelProvisions"
  - type: llm_judge
    criteria: "Response navigates the geopolitical tensions — presents bracketed options where consensus is not possible (US/UK principles-based vs EU prescriptive approaches); addresses the developing country equity concern with practical provisions (disclosure requirements, capacity-building recommendations, asymmetric protection provisions); addresses Chinese concerns about algorithm/training data disclosure while maintaining transparency objectives; acknowledges ICC's commercial practicality concerns; the report demonstrates diplomatic skill in presenting competing positions while advancing the working group's mandate."
    weight: 0.35
    description: "GeopoliticalNavigation"
  - type: llm_judge
    criteria: "Response provides viable path to adoption — structures the model provisions for incremental adoption (core provisions with optional supplementary provisions); provides detailed commentary explaining each provision's purpose and interaction with existing UNCITRAL instruments; identifies areas requiring further study; proposes a realistic 18-month workplan; addresses the relationship to other international initiatives (EU AI Act, OECD AI Principles, ISO standards); the report would be a credible contribution to international trade law development and would advance the conversation at the UNCITRAL plenary."
    weight: 0.30
    description: "ViableAdoptionPath"
