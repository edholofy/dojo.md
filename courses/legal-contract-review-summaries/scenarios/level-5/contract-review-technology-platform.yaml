meta:
  id: contract-review-technology-platform
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Design an AI-powered contract review platform as a startup CEO, addressing product architecture, ML pipeline, and legal industry adoption challenges"
  tags: [legal-tech, ai-platform, startup, master]

state: {}

trigger: |
  You're the CEO and co-founder of "ClauseAI," a legal
  technology startup building an AI-powered contract
  review and risk assessment platform. You have $28M
  in Series B funding from Andreessen Horowitz and
  Bessemer Venture Partners. Your product competes with
  Ironclad, Icertis, and Agiloft on CLM, but your core
  differentiator is AI-powered contract risk analysis
  that goes beyond clause identification to predict
  enforcement outcomes and recommend optimal provisions.

  Company status:
  - 18 months post-founding; 45 employees (15 engineers,
    8 ML researchers, 6 legal domain experts, 5 sales,
    11 operations)
  - Current product: V1 CLM with basic AI clause
    extraction (85% accuracy on standard clauses)
  - 22 paying customers ($2.1M ARR); pipeline of 45
    enterprise prospects
  - Training corpus: 180,000 contracts (licensed from 3
    law firms and 2 legal publishers); 12,000 paired
    with dispute outcomes
  - ML pipeline: Fine-tuned LLMs for clause extraction;
    custom models for risk scoring; retrieval-augmented
    generation for provision recommendations
  - Key challenge: Enterprise GCs want accuracy >95% on
    risk identification before deployment; current
    accuracy is 88% on standard provisions, 71% on
    novel/unusual provisions
  - Regulatory: EU AI Act may classify your product as
    "high-risk AI system used to interpret legal
    provisions" — requiring conformity assessment
  - Competition: Ironclad ($6.1B CLM), Icertis ($5B
    CLM), Luminance (AI contract review), Harvey
    (GenAI legal), and every major LLM provider adding
    contract review features

  Your Board has requested a comprehensive strategic
  plan for the next 24 months covering product roadmap,
  go-to-market strategy, competitive moat, regulatory
  compliance, and path to $20M ARR.

  Task: Write the comprehensive strategic plan for the
  Board covering product architecture and ML roadmap,
  go-to-market strategy, competitive positioning, EU
  AI Act compliance plan, and financial projections to
  $20M ARR.

assertions:
  - type: llm_judge
    criteria: "Response provides a credible product and ML strategy — designs the product architecture for the next-generation platform (clause extraction → risk scoring → enforcement prediction → provision recommendation → contract generation); addresses the accuracy gap (88% to 95%+ on standard provisions, improving novel provision accuracy); proposes realistic ML approaches (domain-specific fine-tuning, retrieval-augmented generation, human-in-the-loop learning, active learning for edge cases); addresses the training data strategy (expanding corpus, securing outcome data partnerships); the product roadmap is technically credible and addresses the core enterprise adoption barrier."
    weight: 0.35
    description: "CredibleProductStrategy"
  - type: llm_judge
    criteria: "Response provides compelling go-to-market and competitive strategy — differentiates from established CLM players (risk prediction vs contract management), AI-native competitors (accuracy and domain expertise vs general-purpose LLMs), and law firms (scalability vs bespoke service); creates realistic customer acquisition strategy for $20M ARR (enterprise sales motion, pricing model, implementation approach); addresses the trust barrier (how to convince GCs to rely on AI risk assessment); identifies defensible competitive moats (training data, domain expertise, enforcement outcome data, customer feedback loops); the strategy would be credible to Series B investors."
    weight: 0.35
    description: "GoToMarketStrategy"
  - type: llm_judge
    criteria: "Response addresses regulatory and financial realities — develops an EU AI Act compliance plan (conformity assessment, transparency requirements, human oversight, technical documentation); projects realistic financials ($2.1M to $20M ARR in 24 months — shows the math on deal sizes, win rates, sales cycles, retention); identifies key hires and organizational scaling plan; addresses pricing strategy evolution; includes risk factors and contingency plans; evaluates potential M&A scenarios (acquirer interest, defensive positioning); the plan would pass Board and investor scrutiny."
    weight: 0.30
    description: "RegulatoryAndFinancial"
