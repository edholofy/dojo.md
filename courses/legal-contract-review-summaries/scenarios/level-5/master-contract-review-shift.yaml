meta:
  id: master-contract-review-shift
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Handle a master-level shift with a systemic contract failure creating simultaneous regulatory, financial, and reputational crises across a global enterprise"
  tags: [shift-simulation, systemic-failure, global-crisis, master]

state: {}

trigger: |
  You're the Global General Counsel at a Fortune 100
  technology company ($52B revenue, 145,000 employees,
  operations in 65 countries). It's 6:00 AM and you've
  been woken by three calls in rapid succession. What
  unfolds over the next 24 hours will define your career
  and potentially the company's survival.

  CRISIS 1 — Whistleblower Revelation (6:00 AM):
  A former VP of Sales has filed an SEC whistleblower
  complaint and simultaneously sent documents to the
  Financial Times. The allegations:
  - A "shadow contract" system exists: the official CLM
    contains standard terms, but sales VPs maintained
    separate side letters granting customers undisclosed
    concessions (unlimited liability, perpetual license
    rights, most-favored-customer pricing, free-of-
    charge product extensions)
  - The practice spans 3 divisions and 8 countries,
    involving an estimated 450 customer relationships
    and $8.2B in annual revenue
  - Side letters were deliberately kept outside the CLM
    to avoid legal review and audit detection
  - Revenue recognition may have been impacted: the CFO's
    team did not have visibility to these concessions
    when recognizing revenue under ASC 606
  - The whistleblower has provided documents to the SEC
    covering a 5-year period

  CRISIS 2 — Regulatory Cascade (8:00 AM):
  The FT article triggers a regulatory cascade:
  - SEC opens an informal inquiry (expected to become
    formal investigation)
  - EU GDPR regulators in 4 countries (Germany, France,
    Netherlands, Ireland) launch coordinated investigation
    into whether the side letters contained data
    processing commitments that were never implemented
  - OFAC contacts your compliance team: several side
    letters appear to have been used with entities that
    are now on the SDN list, and the concessions may
    have continued after sanctions designation
  - Your Japanese subsidiary's FSA (Financial Services
    Agency) requests an explanation: side letters with
    Japanese financial institutions may violate local
    disclosure requirements
  - The DOJ's Fraud Section requests a meeting

  CRISIS 3 — Customer and Market Fallout (10:00 AM):
  - Your stock drops 22% on the FT article
  - 3 of your top 10 customers (aggregate $3.8B ARR)
    issue public statements demanding compliance with
    the side letter terms and threatening litigation if
    the company attempts to repudiate them
  - 2 enterprise customers who did NOT receive side
    letters are threatening MFN claims based on the
    revelation that competitors received better terms
  - Your largest channel partner ($1.2B in annual
    referrals) suspends the partnership pending review
  - A class action lawsuit is filed by shareholders
    within hours
  - Your cyber insurance carrier issues a reservation
    of rights letter questioning coverage
  - Your Board's Lead Independent Director calls an
    emergency Board meeting for 6:00 PM today

  Additional context:
  - Your company has 42,000 active customer contracts,
    of which an unknown number may have associated side
    letters
  - The CFO is unable to confirm whether revenue was
    properly recognized without a complete side letter
    inventory
  - 3 key executives (including the Chief Revenue Officer)
    are implicated in the whistleblower complaint
  - Outside counsel (your primary law firm) also
    represented you in a related SEC matter 2 years
    ago — potential conflict

  Task: Write the comprehensive Board briefing memo for
  the 6:00 PM emergency meeting covering the crisis
  assessment, legal exposure quantification, regulatory
  response strategy, customer and market stabilization
  plan, internal investigation framework, and 30-day
  action plan.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive Board briefing — quantifies the total legal exposure across all dimensions (SEC enforcement: potential disgorgement of improperly recognized revenue + penalties; GDPR fines: up to 4% of global turnover per jurisdiction; OFAC penalties; DOJ criminal exposure; shareholder class action; customer litigation; MFN claims); evaluates the revenue restatement risk ($8.2B in affected revenue over 5 years); addresses the executive implication and potential need for administrative leave; identifies the outside counsel conflict and recommends alternative counsel; the briefing is honest, comprehensive, and gives the Board enough information to make informed decisions under extreme time pressure."
    weight: 0.35
    description: "ComprehensiveBoardBriefing"
  - type: llm_judge
    criteria: "Response develops a coherent multi-front response strategy — designs the SEC response (cooperation strategy, voluntary self-disclosure assessment, document preservation, potential restatement process); coordinates the GDPR response across 4 jurisdictions (coordinated response through lead supervisory authority, DPIA assessment, breach notification evaluation); addresses OFAC exposure (voluntary self-disclosure, sanctions compliance remediation); develops the DOJ strategy (cooperation credit, compliance program improvements, potential declination factors); manages the customer crisis (which side letter commitments to honor, MFN claims assessment, customer communication strategy); addresses the shareholder litigation (D&O insurance notice, litigation hold, special litigation committee consideration); each strategy is coordinated with the others, not siloed."
    weight: 0.35
    description: "CoherentMultiFrontStrategy"
  - type: llm_judge
    criteria: "Response provides a realistic 30-day action plan — prioritizes by legal obligation and business urgency; designs the internal investigation framework (scope, independence, privilege protection, executive interviews, forensic accounting); creates the side letter inventory and assessment methodology; addresses the governance response (Board committee structure, special committee consideration, potential management changes); develops the communications strategy (employees, customers, regulators, market, media); includes the contract remediation program design; addresses business continuity (maintaining operations while managing crisis); the plan acknowledges that full remediation will take years but creates an achievable 30-day stabilization roadmap; the plan would be credible to a Board facing an existential corporate crisis."
    weight: 0.30
    description: "Realistic30DayPlan"
