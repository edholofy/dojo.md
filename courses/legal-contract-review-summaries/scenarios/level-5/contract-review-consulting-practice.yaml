meta:
  id: contract-review-consulting-practice
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Design a contract review consulting practice from scratch, including methodology, service offerings, pricing, and go-to-market strategy"
  tags: [consulting-practice, methodology, go-to-market, master]

state: {}

trigger: |
  You're a former Chief Legal Officer at a Fortune 200
  company and a 25-year veteran of commercial contract
  law. You're launching "ContractIQ Advisory," a boutique
  consulting firm specializing in contract review
  optimization, CLM program design, and contract risk
  management. Your target clients are mid-to-large
  enterprises ($500M-$15B revenue) whose legal
  departments are overwhelmed by contract volume and
  complexity.

  Market research:
  - The CLM market is projected at $5.2B by 2028 (CAGR
    of 13.5%)
  - 65% of enterprises report that contract review is
    their legal department's biggest bottleneck
  - Average enterprise legal department reviews 3,800
    contracts/year with 18 days average cycle time
  - 43% of contracts are executed without legal review
  - The average enterprise has 24,000 active contracts
    with no central visibility
  - 72% of GCs say they need better contract analytics
    but lack the tools and methodology
  - Competitors: Big 4 consulting firms (broad but
    generic), legal process outsourcers (volume but not
    strategic), CLM technology vendors (tools but not
    expertise), law firms (expensive, transaction-focused)

  Your unique value propositions:
  - 25 years of in-house experience (you understand the
    business side, not just the legal side)
  - Proprietary Contract Risk Assessment Methodology
    (CRAM) — a framework you developed that maps
    contract provisions to business risks
  - Technology-agnostic (help clients select and
    implement the right CLM solution)
  - Focus on measurable outcomes (cycle time reduction,
    risk reduction, cost savings)
  - Team: You + 2 senior consultants (former in-house
    lawyers) + 1 data analyst

  Your investor (former colleague, angel investor) has
  committed $500K in seed funding and wants a
  comprehensive business plan before releasing funds.

  Task: Write the comprehensive business plan for
  ContractIQ Advisory covering the service methodology
  (including the CRAM framework), service offerings
  and pricing, go-to-market strategy, competitive
  positioning, financial projections, and growth roadmap.

assertions:
  - type: llm_judge
    criteria: "Response provides a credible consulting practice design — develops the CRAM framework in detail (risk categories, scoring methodology, contract classification, prioritization matrix); designs differentiated service offerings (contract risk assessment, CLM program design, contract playbook development, ongoing contract review optimization); creates a realistic pricing model (project-based, retainer, performance-based components); the practice design reflects deep understanding of how enterprise legal departments actually work and what value they would pay for."
    weight: 0.35
    description: "CrediblePracticeDesign"
  - type: llm_judge
    criteria: "Response provides compelling competitive positioning — differentiates from Big 4 (more specialized, lower cost, practitioner-led), LPOs (strategic not just operational), CLM vendors (methodology not just technology), and law firms (business outcomes not hourly billing); identifies the specific market gap (strategic contract risk consulting for mid-to-large enterprises); creates credible client personas and buying journey; develops thought leadership and content strategy; the positioning is realistic for a 4-person boutique competing against larger players."
    weight: 0.35
    description: "CompetitivePositioning"
  - type: llm_judge
    criteria: "Response provides realistic financial projections and growth plan — creates a credible revenue model with realistic assumptions (engagement sizes, win rates, utilization rates); projects 3-year P&L with investment requirements; identifies key hiring milestones; plans for scaling (from 4 people to a sustainable practice); addresses partnership and channel strategies; includes risk factors and contingency plans; the financial projections would be credible to an angel investor and reflect consulting industry economics."
    weight: 0.30
    description: "FinancialProjections"
