meta:
  id: cross-industry-contract-research
  level: 5
  course: legal-contract-review-summaries
  type: output
  description: "Write a comprehensive cross-industry research report on contract review practices, benchmarking performance and identifying best practices"
  tags: [cross-industry, benchmarking, research-report, master]

state: {}

trigger: |
  You're the Executive Director of the Association of
  Corporate Counsel (ACC) Foundation and the principal
  investigator on the "2026 Global Contract Management
  Benchmark Study." This is the most comprehensive study
  of corporate contract review practices ever conducted,
  surveying 3,200 legal departments across 15 industries
  and 42 countries.

  Survey data highlights:

  PERFORMANCE METRICS (median values):
  - Contract review cycle time: 18 days (range: 3-65
    days across industries)
  - Contracts reviewed per lawyer per year: 285
  - Percentage of contracts reviewed by legal: 58%
  - Contract dispute rate: 4.2 per 1,000 contracts
  - Average cost per contract review: $2,800
  - Average cost per contract dispute: $185,000
  - Contracts with identified but unresolved risk: 23%

  INDUSTRY VARIATIONS:
  - Financial services: Fastest cycle time (8 days),
    highest review rate (92%), most standardized
  - Technology: Most AI adoption (45%), shortest
    contracts, highest IP dispute rate
  - Healthcare: Longest cycle time (32 days), most
    regulatory provisions, most complex risk allocation
  - Manufacturing: Highest volume (avg 5,200/year),
    most supply chain provisions, lowest AI adoption
  - Energy: Most complex contracts (avg 85 pages),
    longest terms (avg 12 years), most force majeure
    disputes
  - Government contractors: Most compliance provisions,
    longest review cycle (28 days), lowest dispute rate

  TECHNOLOGY ADOPTION:
  - CLM platform: 42% of respondents use one; 78% of
    those report improved cycle time
  - AI contract review: 28% have deployed; 62% plan
    to within 2 years
  - AI accuracy satisfaction: 34% "very satisfied,"
    51% "somewhat satisfied," 15% "dissatisfied"
  - Top AI use cases: clause extraction (89%), risk
    flagging (72%), obligation tracking (58%), provision
    recommendation (31%), outcome prediction (8%)

  ORGANIZATIONAL MODELS:
  - Centralized legal review: 35% of companies
  - Decentralized (business unit-led): 25%
  - Hybrid (centralized standards, distributed review):
    40%
  - Self-service with legal escalation: Growing — 18%
    have implemented
  - Outsourced review (LPO/ALSP): 22% for routine
    contracts

  MATURITY MODEL FINDINGS:
  - Level 1 (Ad hoc): 18% — no standards, reactive review
  - Level 2 (Developing): 32% — basic templates, some
    process
  - Level 3 (Defined): 28% — standardized playbooks,
    risk tiering
  - Level 4 (Managed): 16% — data-driven, CLM deployed
  - Level 5 (Optimized): 6% — AI-augmented, predictive,
    integrated

  EMERGING TRENDS:
  - 67% report increasing contract complexity (AI,
    privacy, ESG provisions)
  - 54% expect to add AI-specific contract provisions
    within 12 months
  - 41% have adopted ESG-related contract provisions
  - 38% have updated force majeure provisions post-COVID
  - 72% cite "finding and retaining contract review
    talent" as a top challenge

  Task: Write the complete 2026 Global Contract
  Management Benchmark Study report for publication to
  ACC's 45,000-member network.

assertions:
  - type: llm_judge
    criteria: "Response provides a comprehensive benchmark report — presents the data in a structured, actionable format; provides meaningful industry comparisons with context (why financial services is faster, why healthcare takes longer); creates benchmark tiers (top quartile, median, bottom quartile) for key metrics; analyzes the correlation between technology adoption and performance metrics; explains the maturity model with concrete characteristics at each level; the report is suitable for publication to 45,000 in-house counsel and would be cited as an authoritative industry reference."
    weight: 0.35
    description: "ComprehensiveBenchmarkReport"
  - type: llm_judge
    criteria: "Response provides actionable insights beyond data presentation — identifies the ROI of contract review investment (cost per review vs cost per dispute avoidance); analyzes the 'review gap' (42% of contracts not reviewed by legal) and its risk implications; evaluates AI adoption trajectory and realistic expectations (accuracy satisfaction, use case maturity); identifies the talent challenge and proposes workforce evolution strategies; provides industry-specific recommendations; creates an actionable self-assessment tool; the insights go beyond describing what is to recommending what should be."
    weight: 0.35
    description: "ActionableInsights"
  - type: llm_judge
    criteria: "Response addresses emerging trends and future state — analyzes the AI contract provisions trend and what it means for contract review complexity; evaluates ESG contract provisions adoption and standardization; addresses the post-COVID force majeure evolution; projects the future state of contract review (2028-2030); evaluates how the maturity model should evolve; identifies the skills and capabilities legal departments need to develop; proposes industry-wide initiatives for standardization; the forward-looking analysis is grounded in the survey data and provides strategic value for GCs planning their contract review evolution."
    weight: 0.30
    description: "EmergingTrendsAnalysis"
