meta:
  id: content-calendar-mastery-challenge
  level: 5
  course: content-calendar-planning
  type: output
  description: "Complete the content calendar mastery challenge — solve a complex multi-constraint scenario requiring all calendar planning skills simultaneously"
  tags: [content-calendar, mastery, challenge, comprehensive, multi-constraint, mastery]

state: {}

trigger: |
  Mastery challenge: Solve a complex content calendar scenario
  that combines multiple constraints, competing priorities,
  and real-world complications.

  Scenario: You're the newly hired VP of Content at "Horizon
  Ventures" — a VC-backed marketplace startup that just
  acquired a competitor.

  Constraints and complications:
  - 2 brands to merge (Horizon + acquired "PathFinder Market")
  - Combined team: 5 content people (some redundant roles)
  - Platforms: Blog, Instagram, LinkedIn, TikTok, email, podcast
  - Budget cut: 20% reduction due to acquisition costs
  - Timeline pressure: Board wants results in 90 days
  - Existing audience: 50K combined followers expect continuity
  - Legal: Acquisition can't be discussed publicly for 30 days
  - Both brands have active campaigns that can't be stopped
  - Competitor launched aggressive content campaign this week
  - 1 team member has given notice (leaving in 3 weeks)

  Deliver a complete plan addressing ALL constraints:

  1. Brand integration content strategy:
     - How to merge two content brands
     - Audience communication plan (after 30-day embargo)
     - Unified brand voice development
     - Content pillar consolidation

  2. Team restructuring and workflow:
     - Roles for the 5-person team (minus 1 leaving)
     - Workload distribution across platforms
     - What to cut, keep, or pause
     - Hiring plan (if needed) with budget justification

  3. 90-day content calendar:
     - Days 1-30: Maintain both brands, secret planning
     - Days 31-60: Announce merger, begin integration
     - Days 61-90: Unified content engine running
     - Every week should have specific content planned

  4. Budget allocation:
     - How to do more with 20% less
     - Where to invest, where to cut
     - Efficiency gains to offset budget reduction

  5. Competitive response:
     - How to counter competitor's aggressive campaign
     - Content differentiation strategy
     - Quick-win content ideas

  6. Risk assessment:
     - Top 5 risks with mitigation strategies
     - Worst-case scenarios and contingencies

assertions:
  - type: llm_judge
    criteria: "All constraints are addressed — none of the 10+ complications are ignored or glossed over, and solutions don't contradict each other"
    weight: 0.30
    description: "All constraints addressed"
  - type: llm_judge
    criteria: "The 90-day calendar is practical given the constraints — a 4-person team with a 20% budget cut can realistically execute the plan"
    weight: 0.25
    description: "Realistic execution plan"
  - type: llm_judge
    criteria: "Brand integration is handled sensitively — the audience isn't alienated and both brand communities feel valued during the transition"
    weight: 0.25
    description: "Sensitive brand integration"
  - type: llm_judge
    criteria: "Risk assessment demonstrates mature strategic thinking — risks are real, mitigation is practical, and worst-case contingencies are prepared"
    weight: 0.20
    description: "Mature risk assessment"
