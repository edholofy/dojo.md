meta:
  id: content-calendar-portfolio
  level: 5
  course: content-calendar-planning
  type: output
  description: "Create a content calendar planning portfolio — assemble case studies, frameworks, and strategic deliverables that demonstrate mastery of content calendar planning"
  tags: [content-calendar, portfolio, case-studies, frameworks, professional, mastery]

state: {}

trigger: |
  Build a professional portfolio demonstrating comprehensive
  content calendar planning expertise. This portfolio should
  showcase strategic thinking, operational excellence, and
  measurable results.

  Create a complete portfolio with 5 components:

  Component 1: Content strategy case study
  Client: "Riverview Health System" — a regional hospital network
  Challenge: Rebuilding content operations after a merger
  - Background and situation analysis
  - Strategic approach and methodology
  - Content calendar redesign (before and after)
  - Organizational structure changes
  - Results achieved (6-month metrics)
  - Key lessons learned

  Component 2: Content calendar framework library
  Create 3 original frameworks:
  - Framework 1: "Content Velocity Matrix" — balancing
    speed and quality across content types
  - Framework 2: "Audience Resonance Mapping" — matching
    content to audience emotional states and needs
  - Framework 3: "Calendar Complexity Reducer" — simplifying
    multi-channel, multi-brand calendars
  Each with visual description, use cases, and application guide

  Component 3: Strategic planning deliverable
  A quarterly content plan for a DTC fashion brand:
  - Executive summary (1 page)
  - Strategic objectives and KPIs
  - Content pillar strategy with rationale
  - Channel strategy and resource allocation
  - Complete 13-week content calendar
  - Budget breakdown and ROI projections

  Component 4: Operational excellence example
  Design a content operations playbook table of contents
  covering every operational aspect:
  - 25+ sections covering all content operations
  - Brief description of each section's contents
  - How the playbook would be used by the team

  Component 5: Thought leadership piece
  Write a 500-word opinion article:
  "Why Most Content Calendars Fail (And How to Fix Yours)"
  - Provocative but evidence-based
  - Original insights, not generic advice
  - Actionable takeaways

assertions:
  - type: llm_judge
    criteria: "The case study tells a compelling story — it has a clear narrative arc from challenge through solution to measurable results"
    weight: 0.25
    description: "Compelling case study narrative"
  - type: llm_judge
    criteria: "The 3 original frameworks are genuinely original — they provide new ways of thinking about content calendar planning, not repackaged existing concepts"
    weight: 0.25
    description: "Genuinely original frameworks"
  - type: llm_judge
    criteria: "The strategic planning deliverable is executive-ready — it could be presented to a CMO as a professional consulting deliverable"
    weight: 0.25
    description: "Executive-ready strategic plan"
  - type: llm_judge
    criteria: "The thought leadership piece has a distinctive point of view — it says something meaningful that most content about calendars doesn't"
    weight: 0.25
    description: "Distinctive thought leadership"
