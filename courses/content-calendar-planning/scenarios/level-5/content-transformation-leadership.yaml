meta:
  id: content-transformation-leadership
  level: 5
  course: content-calendar-planning
  type: output
  description: "Lead a content transformation — drive organizational change from ad-hoc content creation to strategic, data-driven content operations with executive sponsorship and measurable impact"
  tags: [content-calendar, transformation, leadership, change-management, organizational, mastery]

state: {}

trigger: |
  Content transformation leadership goes beyond building calendars
  and processes. It requires driving organizational change,
  securing executive sponsorship, building cross-functional
  alignment, and proving the business value of strategic content
  operations to stakeholders who may not value content today.

  For "Atlas Manufacturing" — a $200M industrial manufacturer
  where content has historically been an afterthought:
  Current state: Sales-driven company, marketing seen as "arts and
  crafts," no content strategy, occasional brochures and trade show
  materials, CEO skeptical of digital content investment.

  Lead the complete content transformation:

  1. Executive sponsorship strategy:
     - Build the business case for content transformation
       (quantified opportunity cost of current approach)
     - CMO presentation: "The Revenue Case for Content"
       (including data, competitive gaps, projected ROI)
     - CEO objection handling (5 common objections with responses)
     - Board update framework (quarterly content impact reports)

  2. Organizational change management:
     - Stakeholder mapping (champions, supporters, neutral, resisters)
     - Change coalition building (who to win over first)
     - Quick wins strategy (prove value in 60 days)
     - Communication plan for the transformation
     - Training and enablement for non-marketing teams
     - Addressing "we've always done it this way" resistance

  3. Phased transformation plan (12 months):
     - Quarter 1: Foundation (audit, strategy, quick wins)
     - Quarter 2: Build (team, processes, calendar system)
     - Quarter 3: Scale (full content operations, measurement)
     - Quarter 4: Optimize (data-driven refinement, ROI proof)
     - Each quarter with specific milestones, budget, and KPIs
     - Content calendar design for each phase

  4. Measurement and proof framework:
     - Leading indicators (engagement, traffic, leads in pipeline)
     - Lagging indicators (revenue attribution, customer acquisition)
     - Competitive benchmarking (tracking vs. competitors)
     - Monthly scorecards for executive team
     - 12-month transformation impact report

  5. Sustainability plan:
     - Embedding content into organizational culture
     - Content governance that survives leadership changes
     - Continuous improvement framework
     - Future investment roadmap

assertions:
  - type: llm_judge
    criteria: "The business case is compelling — it speaks in manufacturing/revenue language that a CEO skeptical of digital content would find persuasive"
    weight: 0.30
    description: "Compelling business case"
  - type: llm_judge
    criteria: "Change management is sophisticated — it addresses organizational politics, resistance, and cultural change, not just process implementation"
    weight: 0.25
    description: "Sophisticated change management"
  - type: llm_judge
    criteria: "The 12-month plan is progressive and realistic — each quarter builds on the previous one, and timelines reflect the reality of organizational change"
    weight: 0.25
    description: "Progressive realistic transformation"
  - type: llm_judge
    criteria: "Sustainability planning ensures the transformation outlasts the leader — governance, culture embedding, and documentation prevent regression"
    weight: 0.20
    description: "Sustainable transformation design"
