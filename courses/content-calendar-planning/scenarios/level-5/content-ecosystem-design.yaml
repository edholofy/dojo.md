meta:
  id: content-ecosystem-design
  level: 5
  course: content-calendar-planning
  type: output
  description: "Design a content ecosystem — build interconnected content systems where each piece strengthens others, creating flywheel effects that compound audience growth and engagement"
  tags: [content-calendar, ecosystem, flywheel, interconnected, compounding, mastery]

state: {}

trigger: |
  A content ecosystem is an interconnected system where
  content pieces reinforce each other, creating compounding
  returns. Unlike linear content strategies where each piece
  stands alone, ecosystems create flywheel effects where
  audience, content, and business value grow exponentially.

  For "Catalyst Ventures" — a venture capital firm building
  thought leadership:

  1. Design the content ecosystem architecture:
     - Core hub: Weekly deep-dive newsletter (anchor)
     - Spoke 1: Podcast (interviews with portfolio founders)
     - Spoke 2: Blog (data-driven market analysis)
     - Spoke 3: LinkedIn (thought leadership, community)
     - Spoke 4: YouTube (educational content, deal breakdowns)
     - Spoke 5: Events (virtual roundtables, demo days)
     Show how each spoke feeds the others:
     - Newsletter → drives podcast listens
     - Podcast → generates blog content
     - Blog → feeds LinkedIn posts
     - LinkedIn → drives newsletter signups
     - YouTube → amplifies all channels
     - Events → create content for all channels

  2. Build a content flywheel model:
     - Stage 1: Create → Quality anchor content
     - Stage 2: Distribute → Multi-channel amplification
     - Stage 3: Engage → Community interaction
     - Stage 4: Learn → Performance insights
     - Stage 5: Improve → Better content, faster growth
     Show how each stage accelerates the next

  3. Create a 3-month ecosystem calendar:
     - Month 1: Launch the ecosystem (establish each spoke)
     - Month 2: Connect the spokes (cross-referencing begins)
     - Month 3: Flywheel acceleration (compounding effects)
     - Every content piece tagged with ecosystem connections
     - Show inter-content linking and cross-promotion strategy

  4. Ecosystem health metrics:
     - Cross-channel traffic flows
     - Content interconnection density
     - Flywheel velocity (time from publish to ecosystem impact)
     - Compounding growth indicators
     - Audience journey mapping across ecosystem

  5. Ecosystem sustainability:
     - Minimum viable content volume per spoke
     - When to add or remove spokes
     - Maintaining quality as volume grows
     - Team structure for ecosystem management

assertions:
  - type: llm_judge
    criteria: "The ecosystem architecture shows genuine interconnection — each spoke has specific, natural content flows to other spokes, not forced cross-promotion"
    weight: 0.30
    description: "Genuinely interconnected ecosystem"
  - type: llm_judge
    criteria: "The flywheel model demonstrates compounding effects — later months show accelerating returns from the interconnected system"
    weight: 0.25
    description: "Demonstrated compounding effects"
  - type: llm_judge
    criteria: "The 3-month calendar progressively builds ecosystem connections — it starts simple and adds complexity as the system matures"
    weight: 0.25
    description: "Progressive ecosystem building"
  - type: llm_judge
    criteria: "Ecosystem health metrics are measurable — cross-channel flows and compounding indicators can actually be tracked and monitored"
    weight: 0.20
    description: "Measurable ecosystem metrics"
