meta:
  id: content-calendar-psychology
  level: 5
  course: content-calendar-planning
  type: output
  description: "Apply behavioral psychology to content calendar planning — use cognitive biases, decision science, and behavioral design to create content calendars that drive consistent audience action"
  tags: [content-calendar, psychology, behavioral, cognitive-bias, engagement, mastery]

state: {}

trigger: |
  Content calendar planning can be enhanced by understanding
  the psychological principles that influence how audiences
  discover, consume, and act on content. Behavioral science
  informs not just what to create, but when, how, and in
  what sequence to publish for maximum impact.

  Part 1: Psychological principles for content planning
  1. Cognitive biases in content consumption:
     - Mere exposure effect (familiarity → preference)
     - Serial position effect (first and last remembered)
     - Zeigarnik effect (incomplete stories compel return)
     - Social proof (popularity signals drive engagement)
     - Loss aversion (fear of missing out on content)
     - Anchoring (first impression shapes perception)
  2. Behavioral design for content calendars:
     - Habit formation through consistent publishing
     - Variable reward schedules in content mix
     - The peak-end rule in content series
     - Choice architecture in content consumption paths
  3. Attention and memory principles:
     - Spacing effect (distributed learning is better)
     - Chunking (organizing content into digestible units)
     - Primacy and recency (what order to publish)
     - Cognitive load management

  Part 2: Apply psychology to a content calendar
  For "MindfulTech" — a digital wellness app:
  1. Design a psychologically-informed 1-month calendar:
     - Week 1: Apply mere exposure + anchoring
       (establish presence and set expectations)
     - Week 2: Apply Zeigarnik effect + serial position
       (create compelling content arcs)
     - Week 3: Apply social proof + variable rewards
       (build community and surprise)
     - Week 4: Apply loss aversion + peak-end rule
       (drive action and memorable close)
  2. For each week, create 5 content pieces showing:
     - The psychological principle being applied
     - How the content leverages the principle
     - Expected behavioral impact
     - Ethical boundaries (persuasion, not manipulation)
  3. Design a content sequence model:
     - How content order affects comprehension
     - Building narrative tension across the month
     - Payoff timing (when to deliver on promises)
     - Re-engagement triggers for lapsed followers

  Part 3: Ethical psychological content planning
  1. Persuasion vs. manipulation boundary
  2. Transparency in psychological content techniques
  3. Dark patterns to avoid in content planning
  4. Building trust through psychologically honest content

assertions:
  - type: llm_judge
    criteria: "Psychological principles are accurately applied — each cognitive bias is correctly understood and genuinely influences the content strategy"
    weight: 0.30
    description: "Accurately applied psychology"
  - type: llm_judge
    criteria: "The 20 content pieces demonstrate real psychological application — they aren't generic posts with a psychology label, but content designed with behavioral intent"
    weight: 0.25
    description: "Genuine psychological application"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly drawn — the response distinguishes between helpful persuasion and manipulative dark patterns"
    weight: 0.25
    description: "Clear ethical boundaries"
  - type: llm_judge
    criteria: "Content sequencing shows strategic narrative building — the month tells a story that builds engagement through intentional ordering"
    weight: 0.20
    description: "Strategic narrative sequencing"
