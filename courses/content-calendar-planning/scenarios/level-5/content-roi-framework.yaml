meta:
  id: content-roi-framework
  level: 5
  course: content-calendar-planning
  type: output
  description: "Build an enterprise content ROI framework — design comprehensive measurement systems that connect content calendar activities to business revenue across complex organizations"
  tags: [content-calendar, roi, enterprise, measurement, revenue-attribution, mastery]

state: {}

trigger: |
  Enterprise content ROI measurement requires connecting
  hundreds of content pieces across multiple channels to
  business revenue through complex customer journeys.
  Build a comprehensive framework that proves content's
  business value to executive stakeholders.

  For "Nexus Enterprise Software" — a B2B enterprise software
  company ($50M ARR) with a 15-person content team:

  1. Content ROI measurement architecture:
     - Define the measurement tech stack:
       CMS → Analytics → Attribution → CRM → Revenue
     - Data flow between systems
     - Attribution model selection and configuration
     - Cross-channel measurement framework
  2. Content value calculation models:
     - Direct revenue attribution:
       Content → Lead → Opportunity → Closed Deal
       With touch-point tracking at each stage
     - Indirect value metrics:
       SEO value (organic traffic × equivalent PPC cost)
       Brand lift measurement
       Customer retention impact
       Sales cycle acceleration
       Support ticket deflection
     - Calculate total content value for the quarter
       using hypothetical but realistic data
  3. Executive dashboard and reporting:
     - Board-level quarterly content ROI report
     - CMO monthly operational report
     - Content team weekly performance dashboard
     - Each report with different metrics, depth, and format
  4. Content calendar optimization based on ROI:
     - Content portfolio analysis (stars, cash cows, question marks, dogs)
     - Resource reallocation recommendations
     - Content investment thesis for next quarter
     - Business case template for budget increases
  5. Advanced measurement techniques:
     - Incrementality testing design
     - Content-driven pipeline acceleration analysis
     - Customer lifetime value impact of content engagement
     - Competitive content investment benchmarking

assertions:
  - type: llm_judge
    criteria: "The measurement architecture is enterprise-grade — it connects real B2B tech stack components and handles the complexity of multi-touch B2B customer journeys"
    weight: 0.30
    description: "Enterprise-grade measurement architecture"
  - type: llm_judge
    criteria: "Content value calculations are sophisticated — both direct revenue attribution and indirect value metrics are quantified with realistic methodologies"
    weight: 0.25
    description: "Sophisticated value calculations"
  - type: llm_judge
    criteria: "Three levels of reporting serve different audiences — the board sees strategic impact, the CMO sees operational results, the team sees tactical metrics"
    weight: 0.25
    description: "Audience-appropriate reporting levels"
  - type: llm_judge
    criteria: "The content portfolio analysis is strategic — it applies business strategy frameworks to content investment decisions with clear action recommendations"
    weight: 0.20
    description: "Strategic portfolio analysis"
