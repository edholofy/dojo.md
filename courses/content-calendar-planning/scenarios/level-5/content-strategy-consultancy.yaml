meta:
  id: content-strategy-consultancy
  level: 5
  course: content-calendar-planning
  type: output
  description: "Run a content strategy consultancy — deliver comprehensive content calendar audits, strategic transformations, and ongoing advisory services for enterprise clients"
  tags: [content-calendar, consultancy, advisory, transformation, enterprise, mastery]

state: {}

trigger: |
  As a content strategy consultant, you're hired by organizations
  to audit their content operations, redesign their calendar
  systems, and build sustainable content engines. This requires
  combining deep content expertise with business acumen and
  organizational change management.

  Complete consulting engagement:
  Client: "Meridian Hospitality Group" — a hotel chain with
  45 properties across 3 brands (luxury, business, boutique)

  Current state assessment reveals:
  - 3 separate marketing teams (1 per brand), no coordination
  - Content is reactive — no calendar beyond next week
  - Brand consistency issues (each property posts independently)
  - No performance measurement beyond follower counts
  - Annual content budget: $800,000 across all brands

  Deliverable 1: Content operations audit (assessment)
  - Current state analysis across all 3 brands
  - Content quality scorecard (audit 10 recent pieces per brand)
  - Competitive benchmarking (3 competitor hospitality brands)
  - SWOT analysis for content operations
  - Maturity level assessment (where they are vs. where they should be)

  Deliverable 2: Content strategy transformation plan
  - Recommended organizational structure
  - Unified content calendar framework (corporate + brand + property)
  - Technology stack recommendations with budget
  - Content pillar strategy per brand
  - 12-month implementation roadmap
  - Budget reallocation recommendations
  - Risk assessment and mitigation

  Deliverable 3: First 90-day execution plan
  - Month 1: Foundation (processes, tools, training)
  - Month 2: Pilot (1 brand, full system)
  - Month 3: Scale (roll out to all 3 brands)
  - Detailed calendar for month 1 showing every activity
  - KPIs and success metrics for each phase
  - Stakeholder communication plan

  Deliverable 4: Ongoing advisory framework
  - Monthly review structure
  - Quarterly strategy sessions
  - Annual planning workshop design
  - Knowledge transfer plan (consultant → internal team)

assertions:
  - type: llm_judge
    criteria: "The consulting engagement is comprehensive and professionally structured — deliverables are what a real strategy consultancy would provide to a hospitality group"
    weight: 0.30
    description: "Professional consulting deliverables"
  - type: llm_judge
    criteria: "The transformation plan addresses organizational complexity — coordinating 3 brands, 45 properties, and 3 marketing teams requires sophisticated change management"
    weight: 0.25
    description: "Organizationally sophisticated plan"
  - type: llm_judge
    criteria: "Budget recommendations are realistic — $800K allocation across 3 hotel brands is used strategically with clear ROI justification"
    weight: 0.25
    description: "Realistic budget recommendations"
  - type: llm_judge
    criteria: "Knowledge transfer is genuine — the consultant plans to make themselves unnecessary, not create permanent dependency"
    weight: 0.20
    description: "Genuine knowledge transfer"
