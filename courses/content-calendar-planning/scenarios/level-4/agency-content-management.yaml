meta:
  id: agency-content-management
  level: 4
  course: content-calendar-planning
  type: output
  description: "Manage content calendars for agency clients — design scalable multi-client systems, client communication frameworks, and agency-specific content operations"
  tags: [content-calendar, agency, multi-client, scalable, management, expert]

state: {}

trigger: |
  Agencies managing content for multiple clients face unique
  challenges: different brand voices, simultaneous deadlines,
  varied approval processes, and the need to maintain quality
  across all accounts while staying profitable.

  Part 1: Agency content management challenges
  1. Multi-client complexity:
     - 10+ clients with different brands, voices, and strategies
     - Overlapping deadlines and campaign launches
     - Client-specific approval processes
     - Varying content volume and budgets
  2. Team structure for agency content:
     - Account managers (client relationship)
     - Strategists (content direction per client)
     - Creators (writing, design, video)
     - Specialists (SEO, analytics, social)
     - How to balance generalists and specialists
  3. Profitability considerations:
     - Time tracking per client
     - Scope management (preventing scope creep)
     - Retainer vs. project-based content work
     - Pricing content services

  Part 2: Build an agency content system
  For "Amplify Digital" — a content marketing agency with:
  - 8 active clients across different industries
  - 12-person content team
  - Services: strategy, blog, social, email, video

  1. Design the agency content operations system:
     - Master calendar view (all clients at a glance)
     - Per-client calendar views
     - Team workload dashboard
     - Capacity planning template
  2. Create client onboarding for content services:
     - Content strategy discovery process
     - Calendar setup and approval workflow design
     - Brand voice documentation handoff
     - Communication cadence establishment
     - First 30-60-90 day plan
  3. Build client reporting framework:
     - Weekly status update template
     - Monthly performance report template
     - Quarterly strategy review presentation
     - Annual content audit and planning
  4. Design 3 client communication templates:
     - Content calendar presentation (monthly approval)
     - Performance highlight email (weekly)
     - Strategy pivot recommendation (when data says change)

  Part 3: Scaling agency content operations
  1. When to hire vs. when to use freelancers
  2. Building repeatable processes across clients
  3. Technology stack for multi-client management
  4. Client retention through content performance

assertions:
  - type: llm_judge
    criteria: "The multi-client system is genuinely scalable — a 12-person team can realistically manage 8 clients with the described processes"
    weight: 0.30
    description: "Genuinely scalable multi-client system"
  - type: llm_judge
    criteria: "Client onboarding is thorough yet efficient — it captures everything needed for great content without a 6-week discovery process for a social media retainer"
    weight: 0.25
    description: "Thorough efficient onboarding"
  - type: llm_judge
    criteria: "Reporting templates provide value — they demonstrate content impact and strategic thinking, not just activity logs"
    weight: 0.25
    description: "Value-driven reporting templates"
  - type: llm_judge
    criteria: "Communication templates are professional — they build client confidence while being honest about performance and recommendations"
    weight: 0.20
    description: "Professional client communication"
