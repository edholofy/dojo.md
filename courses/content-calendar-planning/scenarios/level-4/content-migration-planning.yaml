meta:
  id: content-migration-planning
  level: 4
  course: content-calendar-planning
  type: output
  description: "Plan content migrations — design calendar transitions for rebrands, platform changes, CMS migrations, and content strategy pivots without losing audience momentum"
  tags: [content-calendar, migration, transition, rebrand, platform-change, expert]

state: {}

trigger: |
  Content migrations — rebranding, platform switches, CMS
  changes, or strategy pivots — require careful calendar
  planning to maintain audience engagement during transition.
  A poorly planned migration can destroy months of audience-
  building momentum.

  Part 1: Content migration types
  1. Rebrand migrations:
     - New name, voice, or visual identity
     - Transitioning existing audience to new brand
     - Content that bridges old and new identity
  2. Platform migrations:
     - Moving primary platform (e.g., Facebook → Instagram)
     - Adding or dropping platforms
     - CMS migration (affecting content workflow)
  3. Strategy pivots:
     - Changing content pillars or target audience
     - Shifting from B2C to B2B (or vice versa)
     - Evolving content formats (blog → video-first)
  4. Organizational changes:
     - Merger/acquisition content integration
     - New leadership with different content vision
     - Agency-to-in-house transition (or reverse)

  Part 2: Plan a content migration
  For "Spark & Co." — a boutique design studio rebranding to
  "Studio Helix" while simultaneously pivoting from Instagram-
  primary to LinkedIn + YouTube primary:

  1. Create a 90-day migration calendar:
     Phase 1 (Days 1-30): Preparation
     - Audit existing content and audience data
     - Build content backlog for new platforms
     - Design transition messaging
     - Set up new accounts and tools
     - Plan existing audience communication

     Phase 2 (Days 31-60): Transition
     - Launch new brand on new primary platforms
     - Cross-promote from old to new platforms
     - Maintain old platform at reduced frequency
     - Communicate change to email subscribers
     - Daily calendar showing old and new platform content

     Phase 3 (Days 61-90): Consolidation
     - Full operation on new platforms
     - Wind down or repurpose old platform
     - Audience growth initiatives on new platforms
     - Performance comparison: old baseline vs. new metrics
  2. Design audience migration communication:
     - Announcement templates per platform
     - FAQ for confused followers
     - Incentives for following on new platforms
  3. Risk mitigation plan:
     - What to do if new platforms underperform
     - Rollback criteria and process
     - Audience sentiment monitoring

  Part 3: Migration best practices
  1. Content archival strategy (preserving old content)
  2. SEO considerations in content migration
  3. Maintaining team morale during uncertainty
  4. Measuring migration success (6-month benchmarks)

assertions:
  - type: llm_judge
    criteria: "The 90-day calendar is detailed and phased appropriately — each phase has clear objectives, milestones, and specific content activities"
    weight: 0.30
    description: "Detailed phased migration calendar"
  - type: llm_judge
    criteria: "Audience migration communication is empathetic and strategic — it explains the 'why' and makes following to new platforms easy and worthwhile"
    weight: 0.25
    description: "Empathetic audience communication"
  - type: llm_judge
    criteria: "Risk mitigation is realistic — it acknowledges that migrations can fail and provides genuine rollback criteria, not just optimistic planning"
    weight: 0.25
    description: "Realistic risk mitigation"
  - type: llm_judge
    criteria: "The dual-platform transition period is manageable — the calendar doesn't require double the output during the crossover period"
    weight: 0.20
    description: "Manageable transition period"
