meta:
  id: global-content-localization
  level: 4
  course: content-calendar-planning
  type: output
  description: "Plan global content calendars with localization — coordinate content across markets, languages, cultural contexts, and time zones while maintaining brand coherence"
  tags: [content-calendar, global, localization, international, cultural, expert]

state: {}

trigger: |
  Global content calendars must balance brand consistency with
  local relevance. Different markets have different holidays,
  cultural norms, platform preferences, and language needs.
  Effective global content planning requires a framework that
  enables local adaptation without losing brand coherence.

  Part 1: Global content planning framework
  1. Localization vs. translation:
     - Translation: Same content, different language
     - Localization: Adapted content for cultural relevance
     - Transcreation: Entirely new content inspired by original
  2. Cultural content considerations:
     - Color meanings across cultures
     - Humor that doesn't translate
     - Gestures and visual taboos
     - Religious and political sensitivities
     - Social media platform differences by market
  3. Global calendar coordination:
     - Time zone management for publishing
     - Seasonal differences (Northern vs. Southern hemisphere)
     - Local holidays and cultural events
     - Global campaigns with local execution

  Part 2: Build a global content calendar
  For "Elevate Skincare" — a beauty brand expanding to 5 markets:
  Markets: US, UK, Japan, Brazil, UAE

  1. For each market, define:
     - Primary platforms (may differ by market)
     - Cultural content considerations
     - Key local holidays and events (next quarter)
     - Content adaptation level (translate/localize/transcreate)
     - Legal and regulatory requirements
  2. Create a 2-week global content calendar showing:
     - Global content (same across all markets)
     - Localized content (adapted per market)
     - Local-only content (unique to specific markets)
     - Publishing times adjusted for time zones
     - Show one global campaign adapted across all 5 markets
  3. Design the localization workflow:
     - Content creation → Localization brief → Local adaptation
     - Review and approval per market
     - Centralized asset management
     - Quality assurance for translations

  Part 3: Global content operations
  1. Managing local content teams vs. central production
  2. Technology for global content management
  3. Measuring global content performance (standardized metrics)
  4. Handling cultural missteps (prevention and response)

assertions:
  - type: llm_judge
    criteria: "Market-specific considerations are culturally informed — differences between US, UK, Japan, Brazil, and UAE markets reflect genuine cultural knowledge, not stereotypes"
    weight: 0.30
    description: "Culturally informed market knowledge"
  - type: llm_judge
    criteria: "The 2-week calendar shows appropriate levels of adaptation — not everything is translated, and some content is created specifically for certain markets"
    weight: 0.25
    description: "Appropriate adaptation levels"
  - type: llm_judge
    criteria: "The global campaign adaptation shows how one concept works across culturally different markets — the core message is consistent but execution is locally relevant"
    weight: 0.25
    description: "Effective campaign adaptation"
  - type: llm_judge
    criteria: "Platform differences by market are accurate — the calendar reflects that platforms like LINE (Japan) or WhatsApp (Brazil) may be more relevant than Instagram in some markets"
    weight: 0.20
    description: "Accurate platform differences"
