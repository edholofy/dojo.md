meta:
  id: stakeholder-calendar-management
  level: 4
  course: content-calendar-planning
  type: output
  description: "Manage stakeholder relationships in content planning — navigate executive input, cross-departmental requests, and competing priorities while maintaining calendar integrity"
  tags: [content-calendar, stakeholders, executive, cross-departmental, politics, expert]

state: {}

trigger: |
  Content calendars don't exist in isolation — they're influenced
  by executives, sales teams, product managers, HR, and other
  stakeholders who all want "just one more piece of content."
  Managing these relationships while maintaining strategic focus
  is a critical skill for content leaders.

  Part 1: Stakeholder management fundamentals
  1. Common stakeholder types:
     - C-suite executives (vision, brand, high-stakes content)
     - Sales team (case studies, competitive content, enablement)
     - Product team (feature announcements, technical content)
     - HR/recruiting (employer brand, culture content)
     - Customer success (help content, training materials)
     - Legal/compliance (risk management, approvals)
  2. Common stakeholder challenges:
     - "We need this by Friday" emergency requests
     - Conflicting priorities between departments
     - Executives overriding content strategy
     - Scope creep from enthusiastic departments
     - No-shows for content reviews (delayed approvals)
  3. Stakeholder communication framework:
     - RACI matrix for content decisions
     - Communication cadence by stakeholder type
     - Escalation procedures

  Part 2: Build a stakeholder management system
  For "Apex Industries" — a mid-size manufacturing company
  where the content team serves 5 departments:

  1. Create a content request management system:
     - Request intake form (standardized submissions)
     - Prioritization matrix (urgency × impact × alignment)
     - Capacity dashboard (current workload visibility)
     - SLA by request type (turnaround commitments)
     - "No" template (declining requests diplomatically)
  2. Design stakeholder communication cadences:
     - Executive: Monthly content performance brief
     - Sales: Bi-weekly content planning sync
     - Product: Sprint-aligned content coordination
     - HR: Monthly employer brand content review
     - Show calendar views tailored to each stakeholder
  3. Build a content committee structure:
     - Charter: Purpose, membership, decision rights
     - Monthly meeting agenda template
     - Conflict resolution process
     - Annual content planning workshop design
  4. Create 3 stakeholder scenarios with responses:
     - CEO wants to pivot content strategy after a conference
     - Sales demands 10 case studies in 2 weeks
     - Product launches feature without marketing notice

  Part 3: Advanced stakeholder management
  1. Building executive content champions
  2. Content education for non-marketing stakeholders
  3. Protecting content strategy from political pressure
  4. Measuring stakeholder satisfaction with content services

assertions:
  - type: llm_judge
    criteria: "The request management system is practical and politically savvy — it provides structure without being bureaucratic and handles 'no' diplomatically"
    weight: 0.30
    description: "Practical politically savvy request system"
  - type: llm_judge
    criteria: "Stakeholder communication cadences are appropriate — executives get strategic summaries while sales gets tactical coordination"
    weight: 0.25
    description: "Appropriate communication cadences"
  - type: llm_judge
    criteria: "The 3 stakeholder scenarios have realistic, nuanced responses — they navigate organizational politics while maintaining content integrity"
    weight: 0.25
    description: "Realistic stakeholder scenario responses"
  - type: llm_judge
    criteria: "The content committee structure enables collaboration — it gives stakeholders voice without giving everyone veto power over the calendar"
    weight: 0.20
    description: "Collaborative committee structure"
