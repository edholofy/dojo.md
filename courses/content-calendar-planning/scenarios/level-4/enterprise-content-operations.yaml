meta:
  id: enterprise-content-operations
  level: 4
  course: content-calendar-planning
  type: output
  description: "Design enterprise-scale content operations — build content factories, global coordination systems, and cross-functional content infrastructure for large organizations"
  tags: [content-calendar, enterprise, scale, operations, global, expert]

state: {}

trigger: |
  Enterprise content operations serve organizations with hundreds
  of content creators, multiple business units, global markets,
  and complex approval chains. At this scale, content planning
  becomes organizational infrastructure requiring systematic
  approaches to governance, coordination, and measurement.

  Part 1: Enterprise content challenges
  1. Scale challenges:
     - 50+ content creators across departments
     - 10+ platforms and channels
     - Multiple languages and markets
     - Brand consistency across business units
  2. Organizational complexity:
     - Marketing, product, sales, HR all create content
     - Decentralized vs. centralized content teams
     - Agency and vendor management
     - Executive stakeholder management
  3. Technology infrastructure:
     - Content management systems (CMS)
     - Digital asset management (DAM)
     - Marketing automation platforms
     - Content intelligence platforms

  Part 2: Design enterprise content operations
  For "Pinnacle Corporation" — a Fortune 500 manufacturing company:
  - 4 business units, each with marketing teams
  - 12 countries, 8 languages
  - Corporate brand + 4 product brands
  - 200+ pieces of content published weekly

  1. Design the organizational model:
     - Central content strategy team (roles, responsibilities)
     - Business unit content teams (structure, reporting)
     - Shared services (design, video, translation)
     - Governance council (composition, charter)
  2. Create the operational calendar framework:
     - Corporate editorial calendar (themes, campaigns)
     - Business unit calendars (aligned with corporate)
     - Regional adaptation calendars
     - Show how content flows: corporate → business unit → regional
  3. Design the technology architecture:
     - Content planning and workflow tools
     - Asset management and storage
     - Publishing and distribution
     - Analytics and reporting
     - Integration map between systems
  4. Build a quarterly planning process:
     - Strategic planning cadence
     - Content demand management
     - Resource allocation across units
     - Performance review framework

  Part 3: Enterprise content excellence
  1. Change management for content operations transformation
  2. Building a content center of excellence (CoE)
  3. Vendor and agency management frameworks
  4. Content operations maturity assessment

assertions:
  - type: llm_judge
    criteria: "The organizational model is realistic for a Fortune 500 — it addresses the complexity of multiple business units, shared services, and governance without oversimplifying"
    weight: 0.30
    description: "Realistic enterprise organizational model"
  - type: llm_judge
    criteria: "Content flow from corporate to regional is well-designed — themes cascade logically while allowing local adaptation"
    weight: 0.25
    description: "Well-designed content cascade"
  - type: llm_judge
    criteria: "Technology architecture is enterprise-grade — recommended tools and integrations are appropriate for the scale described"
    weight: 0.25
    description: "Enterprise-grade technology architecture"
  - type: llm_judge
    criteria: "Change management guidance is thoughtful — transforming content operations at this scale faces real organizational resistance that's addressed"
    weight: 0.20
    description: "Thoughtful change management"
