meta:
  id: predictive-content-planning
  level: 4
  course: content-calendar-planning
  type: output
  description: "Use predictive analytics for content planning — forecast content performance, predict trending topics, and build data models that inform calendar decisions proactively"
  tags: [content-calendar, predictive, analytics, forecasting, data-models, expert]

state: {}

trigger: |
  Predictive content planning uses historical data, trend
  signals, and statistical models to forecast what content
  will perform before it's created. Instead of reacting to
  results, predictive planning proactively shapes the
  calendar based on data-driven forecasts.

  Part 1: Predictive content planning concepts
  1. Predictive analytics in content:
     - Historical performance pattern recognition
     - Topic trend forecasting
     - Audience behavior prediction
     - Seasonal performance modeling
  2. Data inputs for prediction:
     - Historical content performance data
     - Search trend data (Google Trends, keyword research)
     - Social listening and sentiment data
     - Competitor content performance signals
     - Industry event and news calendars
  3. Prediction models:
     - Topic performance scoring (likelihood of engagement)
     - Optimal timing models (when to publish what)
     - Content fatigue indicators (topic saturation)
     - Audience growth trajectory modeling

  Part 2: Build a predictive planning system
  For "DataDrive Analytics" — a data analytics consulting firm:
  1. Create a content performance prediction model:
     - Define 10 input variables that predict content success
       (historical engagement, topic search volume, competitor
       activity, format type, publishing time, etc.)
     - Create a scoring rubric (1-100) for predicting performance
     - Apply the model to 10 hypothetical content ideas
     - Show how scores inform calendar priority
  2. Build a trend forecasting dashboard:
     - 5 methods for identifying emerging topics
     - Early signal indicators (what to watch)
     - Lead time requirements (how far ahead to plan)
     - Risk assessment (trend vs. fad)
  3. Design a predictive content calendar:
     - 1-month calendar where every piece of content
       has a predicted performance score
     - High-confidence vs. experimental content balance
     - When to override predictions (strategic content)
     - Weekly prediction accuracy review

  Part 3: Advanced predictive techniques
  1. Machine learning for content performance prediction
  2. Combining qualitative and quantitative forecasting
  3. Building a feedback loop (predictions → actuals → improved predictions)
  4. Limitations of predictive content planning

assertions:
  - type: llm_judge
    criteria: "The prediction model has thoughtful input variables — the 10 variables genuinely influence content performance and are measurable"
    weight: 0.30
    description: "Thoughtful prediction variables"
  - type: llm_judge
    criteria: "Trend forecasting methods are practical — they use accessible tools and signals, not requiring a data science team"
    weight: 0.25
    description: "Practical trend forecasting"
  - type: llm_judge
    criteria: "The predictive calendar balances data with judgment — predictions inform but don't dictate, and strategic overrides are acknowledged"
    weight: 0.25
    description: "Balanced predictive calendar"
  - type: llm_judge
    criteria: "Limitations are honestly addressed — predictive planning isn't presented as a magic solution but as a probabilistic improvement"
    weight: 0.20
    description: "Honest limitation assessment"
