meta:
  id: content-personalization-calendar
  level: 4
  course: content-calendar-planning
  type: output
  description: "Plan personalized content calendars — design segment-specific content strategies, dynamic content delivery, and personalization frameworks at calendar scale"
  tags: [content-calendar, personalization, segmentation, dynamic-content, targeting, expert]

state: {}

trigger: |
  Personalized content calendars move beyond one-size-fits-all
  publishing to deliver the right content to the right audience
  at the right time. This requires segment-specific planning,
  dynamic content delivery, and calendar architecture that
  supports personalization at scale.

  Part 1: Content personalization framework
  1. Personalization levels:
     - Segment-based (content for audience groups)
     - Behavior-based (content triggered by actions)
     - Journey-based (content matched to stage)
     - Individual (1:1 personalized content)
  2. Personalization data:
     - Demographic data (who they are)
     - Behavioral data (what they do)
     - Engagement data (what content they consume)
     - Transaction data (what they've purchased)
  3. Calendar implications:
     - Multiple content tracks (parallel calendars per segment)
     - Content variants (same topic, different versions)
     - Dynamic delivery rules (if/then publishing logic)
     - Increased production volume requirements

  Part 2: Build a personalization calendar
  For "EduPath Online" — an online education platform with
  4 audience segments:
  - Segment 1: Career changers (25-35, learning for new career)
  - Segment 2: Skill upgraders (30-45, advancing current career)
  - Segment 3: Hobbyists (25-60, learning for personal interest)
  - Segment 4: Enterprise learners (HR managers, team training)

  1. Design segment-specific content strategies:
     - Content pillars per segment
     - Platform preferences per segment
     - Content format preferences per segment
     - Conversion path per segment
  2. Create a 1-month personalized calendar:
     - Universal content (serves all segments)
     - Segment-specific content (targeted)
     - Personalized email sequences per segment
     - Dynamic website content recommendations
     - Show total content volume vs. per-segment visibility
  3. Design the personalization workflow:
     - Content creation (base + variants)
     - Tagging and segmentation rules
     - Delivery logic (who sees what)
     - Performance measurement per segment

  Part 3: Scaling personalization
  1. Balancing personalization with production capacity
  2. AI-powered content personalization
  3. Privacy considerations (GDPR, consent) in personalized content
  4. Measuring personalization effectiveness vs. generic content

assertions:
  - type: llm_judge
    criteria: "The 4 segment strategies are genuinely distinct — career changers, skill upgraders, hobbyists, and enterprise learners receive meaningfully different content"
    weight: 0.30
    description: "Genuinely distinct segment strategies"
  - type: llm_judge
    criteria: "The personalized calendar balances volume with feasibility — it shows how personalization increases total content needs and how to manage that"
    weight: 0.25
    description: "Volume-feasibility balance"
  - type: llm_judge
    criteria: "Delivery logic is practical — the if/then rules for who sees what are clear and implementable with standard marketing tools"
    weight: 0.25
    description: "Practical delivery logic"
  - type: llm_judge
    criteria: "Privacy considerations are properly addressed — personalization respects user consent and data protection regulations"
    weight: 0.20
    description: "Privacy-respectful personalization"
