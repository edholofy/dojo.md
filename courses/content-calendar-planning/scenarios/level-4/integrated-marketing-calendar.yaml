meta:
  id: integrated-marketing-calendar
  level: 4
  course: content-calendar-planning
  type: output
  description: "Build integrated marketing calendars — align content, paid media, PR, events, and product marketing into a unified marketing calendar system"
  tags: [content-calendar, integrated-marketing, alignment, cross-functional, unified, expert]

state: {}

trigger: |
  An integrated marketing calendar aligns all marketing
  activities — content, paid media, PR, events, product
  launches, and partnerships — into a single coordinated
  system. This prevents conflicting messages, maximizes
  campaign impact, and ensures all teams work toward
  common goals.

  Part 1: Integrated marketing calendar components
  1. Marketing channels to coordinate:
     - Content marketing (blog, social, email)
     - Paid media (PPC, social ads, display)
     - Public relations (press releases, media outreach)
     - Events (webinars, conferences, trade shows)
     - Product marketing (launches, updates, announcements)
     - Partner and channel marketing
     - Sales enablement content
  2. Integration challenges:
     - Different teams, different timelines
     - Conflicting messages or competing campaigns
     - Resource competition between channels
     - Measurement across channels
  3. Integrated calendar architecture:
     - Master calendar (executive view)
     - Channel-specific calendars (tactical view)
     - Campaign calendars (cross-channel view)
     - How calendars sync and cascade

  Part 2: Build an integrated marketing calendar
  For "Quantum Cloud" — a B2B cloud services company preparing
  for a major product launch:
  Marketing team: Content (3), Paid (2), PR (1), Events (1),
  Product Marketing (2), Design (2)

  1. Create a 3-month integrated calendar:
     Month 1: Pre-launch (awareness building)
     - Content: Thought leadership, industry trend pieces
     - Paid: Awareness campaigns, retargeting setup
     - PR: Media relationship building, analyst briefings
     - Events: Webinar series on industry challenges
     - Product: Beta testimonials, case study development

     Month 2: Launch month
     - Content: Launch blog, social blitz, email sequences
     - Paid: Launch campaign, competitor conquesting
     - PR: Press release, media interviews, review copies
     - Events: Launch webinar, demo sessions
     - Product: Feature guides, comparison content

     Month 3: Post-launch (conversion and optimization)
     - Content: Customer stories, deep-dive tutorials
     - Paid: Retargeting, lead nurture ads
     - PR: Success stories, award submissions
     - Events: Customer workshops, partner sessions
     - Product: ROI calculator, implementation guides

  2. Show cross-channel dependencies and coordination points
  3. Design the weekly cross-functional sync process

  Part 3: Integrated calendar management
  1. Tools for cross-functional calendar management
  2. Resolving cross-team conflicts and priorities
  3. Measuring integrated campaign performance
  4. Scaling integration as the company grows

assertions:
  - type: llm_judge
    criteria: "The 3-month calendar shows genuine integration — channels support each other and build on shared messaging rather than operating independently"
    weight: 0.30
    description: "Genuine cross-channel integration"
  - type: llm_judge
    criteria: "Campaign phases build logically across channels — pre-launch, launch, and post-launch activities are coordinated to maximize collective impact"
    weight: 0.25
    description: "Logical cross-channel phasing"
  - type: llm_judge
    criteria: "Cross-channel dependencies are identified — the calendar shows where one channel's output feeds into another's activities"
    weight: 0.25
    description: "Identified cross-channel dependencies"
  - type: llm_judge
    criteria: "The cross-functional sync process is efficient — it enables coordination without requiring endless meetings"
    weight: 0.20
    description: "Efficient cross-functional sync"
