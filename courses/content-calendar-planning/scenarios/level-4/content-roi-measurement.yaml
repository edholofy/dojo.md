meta:
  id: content-roi-measurement
  level: 4
  course: content-calendar-planning
  type: output
  description: "Measure content ROI — build attribution models, calculate content cost per acquisition, and create executive-level content performance reporting frameworks"
  tags: [content-calendar, roi, measurement, attribution, executive-reporting, expert]

state: {}

trigger: |
  Proving content ROI is critical for securing and growing
  content budgets. Moving beyond vanity metrics to business
  impact measurement requires attribution models, cost
  tracking, and executive reporting that connects content
  activities to revenue outcomes.

  Part 1: Content ROI framework
  1. Content ROI formula:
     - (Revenue attributed to content - Content cost) / Content cost
     - Challenges of content attribution
     - Direct vs. assisted conversions
  2. Attribution models for content:
     - First-touch attribution
     - Last-touch attribution
     - Multi-touch attribution
     - Time-decay attribution
     - Which model suits different content strategies
  3. Beyond revenue ROI:
     - Brand awareness value
     - SEO value (organic traffic worth)
     - Customer retention value
     - Thought leadership equity
     - Cost avoidance (reducing support tickets)

  Part 2: Build a content ROI system
  For "Velocity SaaS" — a B2B software company ($5M ARR):
  1. Design a content attribution model:
     - Define conversion touchpoints in the customer journey
     - Map content types to journey stages
     - Create attribution rules for content's role
     - Show how a typical customer touches 8-12 pieces of
       content before converting
  2. Build a content ROI dashboard:
     - Cost tracking: Per-piece, per-campaign, per-quarter
     - Revenue attribution: Content-influenced pipeline
     - Efficiency metrics: Cost per lead by content type
     - Quality metrics: Lead-to-customer rate by entry content
     - Show 6 months of hypothetical data with trends
  3. Create an executive content report:
     - 1-page monthly executive summary
     - Key metrics with context (not just numbers)
     - Investment recommendations backed by data
     - Comparison to industry benchmarks
  4. Design content calendar optimization based on ROI:
     - How ROI data should change content mix
     - Doubling down on high-ROI content types
     - Retiring or reducing low-ROI activities
     - Budget reallocation proposals based on performance

  Part 3: Advanced ROI techniques
  1. Incrementality testing (would they have converted without content?)
  2. Content value modeling (what is a blog subscriber worth?)
  3. Cohort analysis (does content-engaged cohort retain better?)
  4. Presenting ROI to skeptical stakeholders

assertions:
  - type: llm_judge
    criteria: "The attribution model is sophisticated yet practical — it accounts for multi-touch customer journeys without requiring enterprise-grade analytics tools"
    weight: 0.30
    description: "Sophisticated practical attribution"
  - type: llm_judge
    criteria: "The executive report is genuinely executive-level — it tells a story with data, not a wall of metrics, and includes actionable investment recommendations"
    weight: 0.25
    description: "Genuine executive-level reporting"
  - type: llm_judge
    criteria: "6 months of hypothetical data is realistic — metrics are plausible for a $5M ARR B2B SaaS company and show realistic trends"
    weight: 0.25
    description: "Realistic B2B SaaS data"
  - type: llm_judge
    criteria: "ROI-based calendar optimization is actionable — specific content mix changes are recommended based on performance data"
    weight: 0.20
    description: "Actionable ROI optimization"
