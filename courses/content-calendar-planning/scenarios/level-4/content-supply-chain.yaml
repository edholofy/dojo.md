meta:
  id: content-supply-chain
  level: 4
  course: content-calendar-planning
  type: output
  description: "Design content supply chains — build end-to-end content production pipelines with capacity planning, bottleneck management, and throughput optimization"
  tags: [content-calendar, supply-chain, production, capacity, throughput, expert]

state: {}

trigger: |
  A content supply chain views content production as a
  manufacturing-inspired process with defined inputs,
  transformation stages, quality checkpoints, and outputs.
  This approach enables capacity planning, bottleneck
  identification, and throughput optimization at scale.

  Part 1: Content supply chain concepts
  1. Supply chain stages:
     - Ideation and research (raw materials)
     - Content creation (manufacturing)
     - Review and editing (quality control)
     - Design and formatting (packaging)
     - Approval and compliance (inspection)
     - Scheduling and publishing (distribution)
     - Performance and optimization (feedback loop)
  2. Supply chain metrics:
     - Throughput (content pieces per week)
     - Cycle time (idea to publication duration)
     - Work in progress (WIP) limits
     - Defect rate (content requiring rework)
     - Utilization rate (team capacity usage)
  3. Supply chain management principles:
     - Theory of Constraints (find the bottleneck)
     - Just-in-time production vs. inventory (batch)
     - Kanban for content flow management
     - Continuous improvement (Kaizen)

  Part 2: Build a content supply chain
  For "Spectrum Media" — a media company producing 50+ pieces
  of content per week across digital platforms:
  Team: 3 writers, 2 designers, 1 video editor, 2 social managers,
  1 editor, 1 content director

  1. Map the current content supply chain:
     - Process flow diagram (7 stages with owners)
     - Cycle time per content type (blog, social, video, email)
     - Bottleneck analysis (where content gets stuck)
     - Capacity analysis per role
  2. Design the optimized supply chain:
     - WIP limits per stage (prevent overloading)
     - Parallel processing (what can happen simultaneously)
     - Fast-track lane (urgent content bypass)
     - Quality gates (what gets checked at each stage)
  3. Create a supply chain calendar:
     - 2-week view showing content moving through stages
     - Visual pipeline with content at each stage
     - Capacity heat map (who's overloaded, who has bandwidth)
     - Lead time tracking (content type avg production time)
  4. Design improvement metrics:
     - Before optimization: Current throughput and cycle times
     - After optimization: Target improvements
     - Dashboard for ongoing monitoring

  Part 3: Advanced supply chain management
  1. Demand planning (forecasting content needs)
  2. Managing variable demand (campaign peaks)
  3. Quality vs. speed trade-offs
  4. Scaling the supply chain (adding capacity)

assertions:
  - type: llm_judge
    criteria: "Supply chain mapping is detailed and realistic — stage owners, cycle times, and capacity analysis reflect real content production dynamics"
    weight: 0.30
    description: "Realistic supply chain mapping"
  - type: llm_judge
    criteria: "Bottleneck analysis identifies genuine constraints — the identified bottleneck is the real limitation in content production for this team size"
    weight: 0.25
    description: "Genuine bottleneck identification"
  - type: llm_judge
    criteria: "WIP limits and parallel processing are practical — they improve flow without requiring team restructuring"
    weight: 0.25
    description: "Practical flow improvements"
  - type: llm_judge
    criteria: "Improvement metrics are measurable — before and after targets are specific and the monitoring dashboard tracks actionable indicators"
    weight: 0.20
    description: "Measurable improvement metrics"
