meta:
  id: team-collaboration-calendar
  level: 2
  course: content-calendar-planning
  type: output
  description: "Design collaborative content calendars — establish team workflows, approval processes, role assignments, and communication systems for multi-person content teams"
  tags: [content-calendar, collaboration, team, workflow, approval, intermediate]

state: {}

trigger: |
  Content calendars become collaboration tools when multiple people
  are involved. Clear role assignments, approval workflows, and
  communication protocols prevent bottlenecks, missed deadlines,
  and inconsistent quality.

  Part 1: Team collaboration fundamentals
  1. Content team roles and responsibilities:
     - Content strategist (planning, calendar oversight)
     - Content writer/creator (production)
     - Designer/visual creator (graphics, video)
     - Editor/reviewer (quality assurance)
     - Social media manager (scheduling, engagement)
     - Approver/stakeholder (sign-off)
  2. Collaboration models:
     - Centralized (one person manages calendar)
     - Distributed (team members own their platforms)
     - Hybrid (shared calendar with role-based access)
  3. Common collaboration pain points:
     - Bottlenecks at the approval stage
     - Last-minute content requests
     - Inconsistent quality across creators
     - Communication gaps between teams

  Part 2: Build a team content workflow
  For "Vantage Marketing Group" — a 6-person marketing team:
  Team: Content Director, 2 Content Writers, 1 Designer,
  1 Social Media Manager, 1 Email Specialist
  Platforms: Blog, Instagram, LinkedIn, email newsletter, podcast

  1. Design the content workflow:
     - From idea submission to published content
     - Each stage with owner, action, and timeline
     - Approval gates and review processes
     - Handoff procedures between roles
  2. Create a weekly team content calendar showing:
     - Each team member's assignments
     - Deadlines for each stage (draft, review, design, schedule)
     - Status tracking (draft, in review, approved, scheduled, live)
     - Dependencies between tasks
  3. Communication protocols:
     - Daily standup agenda for content team
     - Weekly planning meeting structure
     - How to handle urgent content requests

  Part 3: Scaling team collaboration
  1. When to add team members (capacity signals)
  2. Onboarding new team members to the calendar system
  3. Managing freelancers and external contributors
  4. Tools comparison for team content calendars

assertions:
  - type: llm_judge
    criteria: "The content workflow has clear stages with defined owners and timelines — every piece of content has a clear path from idea to publication"
    weight: 0.30
    description: "Clear workflow stages"
  - type: llm_judge
    criteria: "Role assignments are realistic for a 6-person team — workload is distributed appropriately without one person becoming a bottleneck"
    weight: 0.25
    description: "Realistic role distribution"
  - type: llm_judge
    criteria: "Approval processes balance quality control with speed — reviews don't create 5-day delays for a social media post"
    weight: 0.25
    description: "Efficient approval process"
  - type: llm_judge
    criteria: "Communication protocols are practical — standup and meeting structures are lean and focused, not bureaucratic"
    weight: 0.20
    description: "Practical communication protocols"
