meta:
  id: calendar-analytics
  level: 2
  course: content-calendar-planning
  type: output
  description: "Use analytics to optimize content calendars — track performance metrics, identify patterns, and adjust planning based on data-driven insights"
  tags: [content-calendar, analytics, metrics, optimization, data-driven, intermediate]

state: {}

trigger: |
  A content calendar should evolve based on performance data. By
  tracking what works and what doesn't, you can continuously
  optimize your posting schedule, content mix, and topics to
  improve results over time.

  Part 1: Content calendar metrics
  1. Core metrics by platform:
     - Instagram: reach, engagement rate, saves, shares, profile visits
     - Blog: page views, time on page, bounce rate, conversions
     - Email: open rate, click rate, unsubscribe rate
     - LinkedIn: impressions, engagement, click-through rate
     - Pinterest: impressions, saves, outbound clicks
  2. Calendar-specific metrics:
     - Publishing consistency rate (planned vs. actual)
     - Content pillar performance comparison
     - Best-performing posting times
     - Format performance comparison
  3. Leading vs. lagging indicators

  Part 2: Build a content performance dashboard
  For "Bloom Beauty" — a skincare brand:
  1. Design a monthly content performance report that tracks:
     - Overall metrics (total reach, engagement, website traffic)
     - Per-platform breakdown
     - Content pillar performance (which pillars drive results)
     - Top 5 and bottom 5 performing posts
     - Posting time analysis
     - Format comparison (carousel vs. reel vs. static)
  2. Include 3 months of hypothetical data showing trends
  3. Write 5 data-driven recommendations for next month's calendar

  Part 3: Analytics-driven calendar adjustments
  1. When to change posting frequency based on data
  2. When to retire or add content pillars
  3. How to run content experiments within the calendar
  4. Setting up A/B testing for content topics and formats
  5. Monthly calendar review process

assertions:
  - type: llm_judge
    criteria: "The performance dashboard is comprehensive and practical — it tracks meaningful metrics that inform calendar decisions, not vanity metrics"
    weight: 0.30
    description: "Comprehensive practical dashboard"
  - type: llm_judge
    criteria: "The 3 months of hypothetical data shows realistic trends — metrics are plausible and demonstrate how data reveals patterns"
    weight: 0.25
    description: "Realistic trend data"
  - type: llm_judge
    criteria: "The 5 recommendations are data-driven — each recommendation clearly connects to a specific metric or trend in the data"
    weight: 0.25
    description: "Data-driven recommendations"
  - type: llm_judge
    criteria: "A/B testing guidance is practical — it shows how to test within a content calendar without requiring complex tools"
    weight: 0.20
    description: "Practical A/B testing guidance"
