meta:
  id: content-testing-strategy
  level: 2
  course: content-calendar-planning
  type: output
  description: "Design content testing strategies — build A/B tests, content experiments, and hypothesis-driven approaches into your content calendar to continuously improve performance"
  tags: [content-calendar, testing, ab-testing, experiments, hypothesis, intermediate]

state: {}

trigger: |
  Content testing turns your calendar into a learning machine.
  By systematically testing topics, formats, posting times,
  and approaches, you build a data-driven understanding of
  what works for your audience.

  Part 1: Content testing fundamentals
  1. What to test in content:
     - Topics and themes
     - Content formats (carousel vs. reel vs. static)
     - Posting times and days
     - Captions and copy approaches
     - Visual styles and templates
     - CTAs and engagement hooks
  2. Testing methodology:
     - Hypothesis formation (what you expect and why)
     - Variable isolation (change one thing at a time)
     - Sample size (how long to run a test)
     - Statistical significance (when results are real)
  3. Types of content tests:
     - A/B tests (two versions of similar content)
     - Format experiments (trying new content types)
     - Timing tests (same content, different times)
     - Theme tests (measuring topic resonance)

  Part 2: Build a testing calendar
  For "FinSmart" — a personal finance education platform:
  1. Create 5 content experiments for the next month:
     Experiment 1: Carousel vs. Reel for financial tips
     - Hypothesis, test design, metrics, duration
     Experiment 2: Morning vs. evening posting for engagement
     - Hypothesis, test design, metrics, duration
     Experiment 3: Story-based vs. data-based blog posts
     - Hypothesis, test design, metrics, duration
     Experiment 4: Email subject line approaches (curiosity vs. benefit)
     - Hypothesis, test design, metrics, duration
     Experiment 5: User-generated content vs. branded content
     - Hypothesis, test design, metrics, duration
  2. Integrate all 5 experiments into a monthly calendar
     showing when each test runs alongside regular content
  3. Create a test results tracking template

  Part 3: Building a testing culture
  1. How to test without sacrificing consistency
  2. When test results should change your strategy
  3. Common testing mistakes (too many variables, too short)
  4. Building an institutional knowledge base from test results

assertions:
  - type: llm_judge
    criteria: "All 5 experiments have clear hypotheses — each states what is expected and why, not just 'let's try this and see'"
    weight: 0.30
    description: "Clear experiment hypotheses"
  - type: llm_judge
    criteria: "Test designs isolate variables properly — each experiment changes one thing and keeps other factors consistent"
    weight: 0.25
    description: "Properly isolated variables"
  - type: llm_judge
    criteria: "The testing calendar integrates experiments without disrupting regular content — tests supplement the schedule rather than replacing it"
    weight: 0.25
    description: "Integrated testing calendar"
  - type: llm_judge
    criteria: "The results tracking template captures actionable insights — not just numbers but learnings that inform future content decisions"
    weight: 0.20
    description: "Actionable results tracking"
