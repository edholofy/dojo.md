meta:
  id: multi-platform-coordination
  level: 2
  course: content-calendar-planning
  type: output
  description: "Coordinate content across multiple platforms — synchronize messaging, adapt formats, manage cross-posting, and maintain a unified content strategy across channels"
  tags: [content-calendar, multi-platform, cross-posting, coordination, channels, intermediate]

state: {}

trigger: |
  Managing content across multiple platforms requires coordination
  to maintain consistent messaging while respecting each platform's
  unique characteristics. Cross-platform content should be adapted,
  not copied — and the calendar needs to track what goes where.

  Part 1: Multi-platform coordination principles
  1. Platform ecosystem strategy:
     - Hub-and-spoke model (one primary, others support)
     - Distributed model (each platform serves unique purpose)
     - Mirroring model (same content everywhere — usually wrong)
  2. Platform-specific content rules:
     - Instagram: Visual-first, Stories for engagement, Reels for reach
     - LinkedIn: Professional, thought leadership, long-form
     - TikTok: Authentic, trend-driven, short-form video
     - Blog/website: SEO-focused, comprehensive, evergreen
     - Email: Personalized, direct, conversion-focused
     - YouTube: Educational, searchable, long-form video
     - Pinterest: Discovery, visual search, evergreen
  3. Cross-platform content flows:
     - What content to adapt vs. create natively
     - Timing coordination (stagger or simultaneous)
     - Cross-promotion between platforms

  Part 2: Build a multi-platform calendar
  For "Artisan Coffee Co." — a specialty coffee roaster:
  Platforms: Instagram (primary), TikTok, blog, email, YouTube

  1. Create a 1-week calendar showing:
     - All content across all 5 platforms
     - How themes carry across platforms with different formats
     - Which content is adapted vs. native to each platform
     - Posting times optimized per platform
     - Cross-promotion strategy (where each platform drives to)
  2. Show 3 examples of theme coordination:
     - Theme 1: "Single-origin spotlight" across all platforms
     - Theme 2: "Brewing tutorial" across all platforms
     - Theme 3: "Behind the roastery" across all platforms
  3. Platform priority matrix:
     - Where to publish first for each content type
     - How to stagger releases

  Part 3: Multi-platform management
  1. Tools for multi-platform scheduling
  2. Handling platform algorithm changes
  3. When to drop a platform (and how)
  4. Resource allocation across platforms

assertions:
  - type: llm_judge
    criteria: "The 1-week calendar shows genuine coordination — themes carry across platforms with appropriate format adaptations, not identical copy-paste"
    weight: 0.30
    description: "Genuine cross-platform coordination"
  - type: llm_judge
    criteria: "The 3 theme examples show distinct platform adaptations — each platform version plays to that platform's strengths"
    weight: 0.25
    description: "Distinct platform adaptations"
  - type: llm_judge
    criteria: "Posting times and frequencies are realistic per platform — not 5 YouTube videos a week alongside daily Instagram and TikTok"
    weight: 0.25
    description: "Realistic platform frequencies"
  - type: llm_judge
    criteria: "Cross-promotion strategy is natural — platforms refer to each other without every post saying 'check out our YouTube'"
    weight: 0.20
    description: "Natural cross-promotion"
