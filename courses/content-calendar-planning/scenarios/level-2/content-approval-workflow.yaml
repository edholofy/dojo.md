meta:
  id: content-approval-workflow
  level: 2
  course: content-calendar-planning
  type: output
  description: "Build content approval workflows — design review processes, stakeholder sign-off systems, and quality gates that maintain standards without creating bottlenecks"
  tags: [content-calendar, approval, workflow, review, quality, intermediate]

state: {}

trigger: |
  Content approval workflows ensure quality and brand consistency
  while keeping content flowing on schedule. Poorly designed
  approval processes create bottlenecks that delay publishing.
  Well-designed ones catch errors without slowing production.

  Part 1: Approval workflow design
  1. Types of content that need approval:
     - All content (micro-management approach)
     - High-risk content only (efficient approach)
     - Tiered approval based on content type and stakes
  2. Approval levels:
     - Self-publish (social posts, routine updates)
     - Peer review (blog posts, email newsletters)
     - Manager approval (campaigns, press releases)
     - Legal/compliance review (regulated industries)
  3. Approval workflow components:
     - Submission guidelines (what to include)
     - Review criteria (what reviewers check)
     - Feedback format (structured vs. ad hoc)
     - Timeline expectations (turnaround times)
     - Escalation procedures (when approvers are unavailable)

  Part 2: Build approval workflows
  For "MedWell Health" — a healthcare clinic with strict
  compliance requirements:
  1. Design 3 tiered approval workflows:
     - Tier 1 (Low risk): General wellness tips, behind-the-scenes
       → Creator self-publishes with post-review
     - Tier 2 (Medium risk): Health advice, patient stories
       → Content Manager review → Medical advisor check → Publish
     - Tier 3 (High risk): Medical claims, treatment info, testimonials
       → Content Manager → Medical Director → Legal → Publish
  2. For each tier, document:
     - What content falls in this tier (specific examples)
     - Who reviews and what they check
     - Turnaround time expectations
     - What happens if content is rejected
     - Emergency fast-track process
  3. Create approval checklists for each tier
  4. Design a content brief template for submissions

  Part 3: Optimizing approval processes
  1. Common approval bottlenecks and solutions
  2. Training approvers to give actionable feedback
  3. Pre-approved content frameworks (reducing approval needs)
  4. Measuring approval efficiency (time from submission to publish)

assertions:
  - type: llm_judge
    criteria: "The 3 tiered approval workflows are clearly differentiated — content is assigned to the right tier based on risk, and each tier has proportionate review effort"
    weight: 0.30
    description: "Clearly tiered workflows"
  - type: llm_judge
    criteria: "Healthcare compliance is taken seriously — medical claims content goes through appropriate review while routine posts aren't over-scrutinized"
    weight: 0.25
    description: "Appropriate compliance handling"
  - type: llm_judge
    criteria: "Approval checklists are specific and usable — reviewers know exactly what to check, not just 'review for quality'"
    weight: 0.25
    description: "Specific approval checklists"
  - type: llm_judge
    criteria: "Bottleneck solutions are practical — they address real delays like unavailable approvers and unclear feedback"
    weight: 0.20
    description: "Practical bottleneck solutions"
