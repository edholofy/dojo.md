meta:
  id: content-repurposing
  level: 2
  course: content-calendar-planning
  type: output
  description: "Master content repurposing — transform one piece of content into multiple formats across platforms to maximize reach, efficiency, and ROI"
  tags: [content-calendar, repurposing, efficiency, multi-platform, content-multiplication, intermediate]

state: {}

trigger: |
  Content repurposing is the practice of transforming one piece of
  content into multiple formats for different platforms. A single
  blog post can become social posts, email content, video scripts,
  infographics, and more — dramatically increasing output without
  proportionally increasing effort.

  Part 1: Repurposing strategy fundamentals
  1. The content multiplication framework:
     - Anchor content (long-form, high-effort pieces)
     - Derivative content (adapted from anchor)
     - Micro content (snippets and quotes)
  2. Platform-specific adaptation rules:
     - What changes (format, length, tone, visuals)
     - What stays the same (core message, key data)
  3. The repurposing workflow:
     - When to repurpose (immediately vs. time-delayed)
     - How to avoid content fatigue across platforms

  Part 2: Build a repurposing system
  For "Clarity Coaching" — a business coaching firm:
  1. Take 1 blog post (1,500 words on "5 Signs Your Business
     Needs a Strategic Pivot") and create:
     - 5 Instagram carousel slides
     - 3 LinkedIn posts (different angles)
     - 1 email newsletter section
     - 2 Twitter/X threads
     - 1 Pinterest infographic concept
     - 3 Instagram Stories
     - 1 short-form video script (60 seconds)
  2. Show the actual content for each derivative piece
  3. Map the timeline: when each piece publishes relative
     to the original

  Part 3: Repurposing calendar integration
  1. How to mark repurposing opportunities in the calendar
  2. Tracking which content has been repurposed and where
  3. The 1:10 rule — aim for 10 pieces from every anchor
  4. When NOT to repurpose (time-sensitive, controversial, poor-performing)
  5. Measuring repurposed content performance vs. original

assertions:
  - type: llm_judge
    criteria: "All derivative content pieces are complete with actual written content — not just descriptions of what they would contain"
    weight: 0.30
    description: "Complete derivative content"
  - type: llm_judge
    criteria: "Each platform adaptation respects platform norms — LinkedIn posts are professional, Instagram carousels are visual-first, Twitter threads are concise"
    weight: 0.25
    description: "Platform-appropriate adaptations"
  - type: llm_judge
    criteria: "The publishing timeline is strategic — derivative content is staggered to avoid audience fatigue while maintaining momentum"
    weight: 0.25
    description: "Strategic publishing timeline"
  - type: llm_judge
    criteria: "Repurposing guidance addresses when NOT to repurpose — showing strategic judgment, not just mechanical multiplication"
    weight: 0.20
    description: "Strategic repurposing judgment"
