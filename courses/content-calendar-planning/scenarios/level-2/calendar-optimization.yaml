meta:
  id: calendar-optimization
  level: 2
  course: content-calendar-planning
  type: output
  description: "Optimize content calendars — refine posting schedules, content mix, and workflows based on performance data, team feedback, and changing business priorities"
  tags: [content-calendar, optimization, refinement, iteration, improvement, intermediate]

state: {}

trigger: |
  Content calendars should be living documents that improve over
  time. Monthly reviews, quarterly adjustments, and ongoing
  optimization transform a static schedule into a high-performing
  content engine.

  Part 1: Calendar optimization framework
  1. The optimization cycle:
     - Plan → Execute → Measure → Analyze → Adjust → Repeat
  2. What to optimize:
     - Posting times (when engagement peaks)
     - Content mix (which types drive results)
     - Platform allocation (where to invest effort)
     - Team workflow (where bottlenecks occur)
     - Content pillars (which resonate, which don't)
  3. Optimization frequency:
     - Weekly: Minor timing and topic adjustments
     - Monthly: Content mix and format reviews
     - Quarterly: Strategy and pillar reassessment
     - Annually: Full calendar and strategy overhaul

  Part 2: Optimize a content calendar
  For "GreenLeaf Sustainability" — an eco-friendly products brand:
  Given their current calendar performance (provide data):
  - Blog posts: 2/week, avg 800 page views, 2% conversion
  - Instagram: 5/week, avg 3% engagement rate
  - Email: 1/week, 22% open rate, 3.5% click rate
  - LinkedIn: 3/week, avg 1.2% engagement rate
  - Pinterest: 7/week, avg 50 saves per pin

  1. Analyze the data and identify 5 optimization opportunities
  2. For each opportunity, provide:
     - The data point that signals the opportunity
     - The specific calendar change recommended
     - Expected impact of the change
     - How to test the change (A/B approach)
     - Success criteria (when the change is working)
  3. Create a "before and after" calendar comparison
     showing the optimized version vs. current

  Part 3: Continuous improvement practices
  1. Building a content performance database
  2. Setting up automated reporting
  3. Creating an optimization backlog
  4. When to make radical changes vs. incremental tweaks

assertions:
  - type: llm_judge
    criteria: "The 5 optimization opportunities are data-driven — each recommendation connects directly to a specific performance metric"
    weight: 0.30
    description: "Data-driven optimization opportunities"
  - type: llm_judge
    criteria: "A/B testing approaches are practical — they can be implemented within a normal content calendar without requiring a data science team"
    weight: 0.25
    description: "Practical A/B testing approaches"
  - type: llm_judge
    criteria: "The before-and-after comparison clearly shows improvements — changes are specific and measurable, not vague 'post better content'"
    weight: 0.25
    description: "Clear before-and-after comparison"
  - type: llm_judge
    criteria: "Success criteria are measurable — each optimization has a concrete metric to determine if it's working"
    weight: 0.20
    description: "Measurable success criteria"
