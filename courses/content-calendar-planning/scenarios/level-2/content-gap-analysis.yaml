meta:
  id: content-gap-analysis
  level: 2
  course: content-calendar-planning
  type: output
  description: "Conduct content gap analysis — identify missing topics, underserved audience segments, and competitor advantages to fill strategic gaps in your content calendar"
  tags: [content-calendar, gap-analysis, competitor, strategy, audience, intermediate]

state: {}

trigger: |
  Content gap analysis reveals what your audience needs but you're
  not providing. By examining competitor content, audience questions,
  search data, and your existing library, you can identify gaps
  that represent opportunities for growth.

  Part 1: Content gap analysis methods
  1. Audience gap analysis:
     - Questions your audience asks that you haven't answered
     - Stages of the buyer journey without content
     - Audience segments without targeted content
  2. Competitor gap analysis:
     - Topics competitors cover that you don't
     - Formats competitors use that you haven't tried
     - Keywords they rank for that you're missing
  3. Internal content audit:
     - Outdated content needing refresh
     - Topics covered superficially needing depth
     - Missing content types in your mix

  Part 2: Conduct a gap analysis
  For "NovaTech Solutions" — a B2B SaaS company selling project
  management tools:
  1. Audit their hypothetical existing content (provide 20
     existing blog titles across their content pillars)
  2. Identify 3 competitor content strategies (describe what
     competitors are doing well)
  3. Find 10 content gaps with:
     - The gap (what's missing)
     - Why it matters (audience need or business impact)
     - Priority level (high/medium/low)
     - Recommended format and platform
     - Suggested timeline for filling the gap
  4. Create a 60-day gap-filling content plan integrated
     with existing calendar commitments

  Part 3: Ongoing gap monitoring
  1. Setting up quarterly content audits
  2. Tools and methods for continuous gap detection
  3. Balancing gap-filling with planned content
  4. Measuring the impact of gap-filling content

assertions:
  - type: llm_judge
    criteria: "The 10 content gaps are specific, actionable, and genuinely represent missed opportunities — not vague suggestions like 'post more'"
    weight: 0.30
    description: "Specific actionable gaps"
  - type: llm_judge
    criteria: "The 60-day gap-filling plan integrates with existing content — it adds to the calendar without disrupting planned content"
    weight: 0.25
    description: "Integrated gap-filling plan"
  - type: llm_judge
    criteria: "Competitor analysis provides strategic insights — it shows what to learn from competitors without simply copying them"
    weight: 0.25
    description: "Strategic competitor insights"
  - type: llm_judge
    criteria: "Priority levels are justified — high-priority gaps clearly have more business impact than low-priority ones"
    weight: 0.20
    description: "Justified gap priorities"
