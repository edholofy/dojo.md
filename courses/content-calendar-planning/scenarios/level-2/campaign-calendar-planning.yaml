meta:
  id: campaign-calendar-planning
  level: 2
  course: content-calendar-planning
  type: output
  description: "Plan campaign-based content calendars — integrate product launches, promotions, and marketing campaigns into ongoing content schedules"
  tags: [content-calendar, campaigns, launches, promotions, integration, intermediate]

state: {}

trigger: |
  Campaigns require coordinated content across platforms with
  specific timelines, building anticipation before launch and
  maintaining momentum after. Integrating campaigns into an
  ongoing content calendar requires balancing promotional content
  with regular programming.

  Part 1: Campaign calendar fundamentals
  1. Types of campaigns that need calendar integration:
     - Product/service launches
     - Seasonal promotions and sales
     - Brand awareness campaigns
     - Partnership and collaboration launches
     - Event promotion (webinars, conferences, pop-ups)
  2. Campaign phases:
     - Pre-launch (teaser, build anticipation)
     - Launch (announcement, key messaging)
     - Sustain (ongoing promotion, testimonials)
     - Post-campaign (wrap-up, results, lessons)
  3. The promotional content ratio:
     - 80/20 rule (80% value, 20% promotional)
     - How campaigns temporarily shift the ratio
     - Audience fatigue management

  Part 2: Build a campaign calendar
  For "TrailBlaze Outdoor Gear" — an outdoor recreation company:
  1. Map a 6-week campaign for launching a new hiking boot line:
     - Week 1-2: Pre-launch (teaser content, behind-the-scenes)
     - Week 3: Launch week (announcement, features, reviews)
     - Week 4-5: Sustain (user testimonials, use cases, influencer)
     - Week 6: Post-launch (wrap-up, next steps)
  2. For each week, create the content calendar showing:
     - Every piece of content by platform (Instagram, blog, email, YouTube)
     - Content type and format
     - Key message for each piece
     - How campaign content integrates with regular posting
  3. Show how regular content pillars continue during the campaign

  Part 3: Campaign calendar best practices
  1. Managing multiple overlapping campaigns
  2. Emergency campaign adjustments (when things go wrong)
  3. Cross-functional collaboration during campaigns
  4. Post-campaign analysis template

assertions:
  - type: llm_judge
    criteria: "The 6-week campaign calendar is complete — every week has specific content pieces across all platforms with clear messaging"
    weight: 0.30
    description: "Complete campaign calendar"
  - type: llm_judge
    criteria: "Campaign content is balanced with regular content — the calendar shows ongoing value content alongside promotional pieces"
    weight: 0.25
    description: "Balanced campaign integration"
  - type: llm_judge
    criteria: "Campaign phases build logically — pre-launch creates anticipation, launch delivers, sustain maintains momentum"
    weight: 0.25
    description: "Logical campaign phases"
  - type: llm_judge
    criteria: "Post-campaign analysis template provides actionable review structure — not just celebration but genuine learning for future campaigns"
    weight: 0.20
    description: "Actionable post-campaign review"
