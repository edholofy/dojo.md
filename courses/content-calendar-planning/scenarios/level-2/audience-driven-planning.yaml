meta:
  id: audience-driven-planning
  level: 2
  course: content-calendar-planning
  type: output
  description: "Plan content calendars around audience behavior — use audience insights, engagement patterns, and persona mapping to create calendars that match how your audience consumes content"
  tags: [content-calendar, audience, personas, behavior, engagement-patterns, intermediate]

state: {}

trigger: |
  The best content calendars are built around audience behavior,
  not just brand priorities. Understanding when your audience is
  online, what formats they prefer, what topics resonate, and
  how they move through the buyer journey shapes every calendar
  decision.

  Part 1: Audience-driven planning fundamentals
  1. Audience research for calendar planning:
     - Demographics vs. psychographics for content decisions
     - Content consumption habits by platform
     - Peak engagement times by audience segment
     - Content format preferences by persona
  2. Buyer journey content mapping:
     - Awareness stage: What content attracts attention
     - Consideration stage: What content builds trust
     - Decision stage: What content drives action
     - Retention stage: What content keeps them engaged
  3. Audience segmentation for content:
     - Primary vs. secondary audiences
     - Content that serves multiple segments
     - Platform as audience filter

  Part 2: Build an audience-driven calendar
  For "Apex Fitness" — a gym chain targeting 3 audience segments:
  - Segment A: Beginners (25-35, intimidated, need guidance)
  - Segment B: Enthusiasts (30-45, consistent, want optimization)
  - Segment C: Athletes (20-35, competitive, performance-focused)

  1. For each segment, define:
     - Preferred platforms and content formats
     - Peak engagement times
     - Content topics that resonate
     - Buyer journey stage mix
  2. Create a 2-week content calendar that:
     - Serves all 3 segments without alienating any
     - Balances segment-specific and universal content
     - Schedules content at optimal times per segment
     - Shows which segment each piece targets
  3. Include an audience content matrix showing:
     - Segment × Content Pillar × Platform mapping

  Part 3: Evolving with your audience
  1. Using engagement data to refine audience understanding
  2. When audience behavior changes (and how to adapt)
  3. Growing into new audience segments
  4. Audience feedback loops in the content calendar

assertions:
  - type: llm_judge
    criteria: "The 3 audience segments are well-defined with distinct content needs — beginners, enthusiasts, and athletes genuinely need different content approaches"
    weight: 0.30
    description: "Well-defined audience segments"
  - type: llm_judge
    criteria: "The 2-week calendar serves all segments — no segment is ignored, and the balance reflects business priorities"
    weight: 0.25
    description: "Balanced multi-segment calendar"
  - type: llm_judge
    criteria: "Buyer journey mapping is practical — content at each stage has clear purpose and natural progression"
    weight: 0.25
    description: "Practical buyer journey mapping"
  - type: llm_judge
    criteria: "The audience content matrix is a useful planning tool — it clearly shows where content gaps exist and where opportunities lie"
    weight: 0.20
    description: "Useful audience content matrix"
