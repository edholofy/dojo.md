meta:
  id: posting-frequency
  level: 1
  course: content-calendar-planning
  type: output
  description: "Determine optimal posting frequency — platform-specific recommendations, quality vs. quantity trade-offs, and sustainable scheduling"
  tags: [content-calendar, frequency, scheduling, platforms, consistency, basics]

state: {}

trigger: |
  How often should you post? The answer depends on the platform,
  your resources, and your audience. Posting too little means
  losing momentum; posting too much risks burnout and quality
  decline. The right frequency balances consistency with capacity.

  Part 1: Platform-specific frequency guidelines
  Provide recommended posting frequencies for 7 platforms:
  1. Instagram (feed posts, Stories, Reels)
  2. TikTok
  3. LinkedIn
  4. X/Twitter
  5. YouTube (long-form, Shorts)
  6. Blog/website
  7. Email newsletter

  For each platform:
  - Minimum viable frequency (the least you can post and still grow)
  - Recommended frequency (optimal for most brands)
  - Maximum useful frequency (beyond this, diminishing returns)
  - Best posting times (general guidelines)
  - How the algorithm rewards consistency

  Part 2: Frequency planning exercise
  For "Bright Ideas Co." — a stationery and productivity brand
  (2-person marketing team, limited budget):
  1. Assess team capacity (hours available per week for content)
  2. Recommend a sustainable posting schedule across 4 platforms
  3. Prioritize platforms by impact potential
  4. Design a "minimum viable" schedule and an "ideal" schedule
  5. Show the time investment for each schedule

  Part 3: Quality vs. quantity framework
  1. When to post less (and invest in quality)
  2. When to post more (and what corners can be cut safely)
  3. How to recognize overposting vs. underposting symptoms
  4. Scaling frequency as your team grows
  5. The consistency rule: why regular beats frequent

assertions:
  - type: llm_judge
    criteria: "Platform frequency recommendations are current and reasonable — not outdated 2020 advice but reflecting current algorithm behavior"
    weight: 0.25
    description: "Current frequency recommendations"
  - type: llm_judge
    criteria: "The 2-person team schedule is genuinely sustainable — it doesn't prescribe 7 posts/day across 5 platforms for a tiny team"
    weight: 0.30
    description: "Realistically sustainable schedule"
  - type: llm_judge
    criteria: "Time investment estimates are specific — hours per week for content creation at different frequency levels are quantified"
    weight: 0.25
    description: "Specific time estimates"
  - type: llm_judge
    criteria: "Quality vs. quantity framework provides clear decision criteria — not just 'quality over quantity' but when each approach is appropriate"
    weight: 0.20
    description: "Clear quality-quantity framework"
