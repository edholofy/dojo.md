meta:
  id: content-calendar-basics
  level: 1
  course: content-calendar-planning
  type: output
  description: "Understand content calendar fundamentals — what a content calendar is, why it matters, and the essential components every calendar needs"
  tags: [content-calendar, fundamentals, components, planning, basics]

state: {}

trigger: |
  A content calendar is a planning tool that maps out what you'll
  publish, where you'll publish it, and when it goes live. Without
  one, content creation is reactive — with one, it's strategic.
  Content calendars prevent last-minute scrambling, ensure
  consistent posting, and align content to business goals.

  Part 1: Content calendar essentials
  Explain the fundamental concepts:
  1. What a content calendar is (and what it isn't)
  2. Why content calendars matter:
     - Consistency builds audience trust
     - Strategic alignment with business goals
     - Team coordination and accountability
     - Content quality improvement
  3. Types of content calendars:
     - Editorial calendar (blog/long-form)
     - Social media calendar (platform-specific)
     - Marketing campaign calendar (cross-channel)
     - Integrated content calendar (all-in-one)
  4. Essential calendar components:
     - Date and time
     - Content type and format
     - Platform/channel
     - Topic and headline
     - Status (draft, review, scheduled, published)
     - Assigned creator
     - Assets needed (images, video, links)
     - Notes and approval status

  Part 2: Build a basic content calendar
  For "Peak Performance Coaching" — a fitness coaching business
  (solo entrepreneur, 3 platforms: Instagram, blog, email):
  1. Create a 2-week content calendar with:
     - Instagram: 5 posts/week
     - Blog: 1 post/week
     - Email: 1 newsletter/week
  2. Include all essential components for each entry
  3. Show how entries connect (blog post → social promotion → email)

  Part 3: Common calendar mistakes
  List 5 common content calendar mistakes for beginners:
  1. Planning too far ahead without flexibility
  2. Not accounting for content creation time
  3. Posting without a strategy (filling calendar ≠ planning)
  4. Ignoring analytics to inform future planning
  5. Not leaving room for timely/reactive content

assertions:
  - type: llm_judge
    criteria: "Calendar fundamentals are clearly explained — a complete beginner could understand what a content calendar is and why they need one"
    weight: 0.25
    description: "Clear fundamental explanation"
  - type: llm_judge
    criteria: "The 2-week calendar is realistic and actionable — post topics, formats, and timing make sense for a solo fitness coaching business"
    weight: 0.30
    description: "Realistic actionable calendar"
  - type: llm_judge
    criteria: "Content connections between platforms are shown — the blog post feeds social content which feeds the newsletter"
    weight: 0.25
