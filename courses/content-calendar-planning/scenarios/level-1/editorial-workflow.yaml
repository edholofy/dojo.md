meta:
  id: editorial-workflow
  level: 1
  course: content-calendar-planning
  type: output
  description: "Design basic editorial workflows — content creation stages from ideation through publishing with roles, timelines, and quality checkpoints"
  tags: [content-calendar, workflow, editorial, process, creation, basics]

state: {}

trigger: |
  A content calendar tells you WHAT to publish WHEN. An editorial
  workflow tells you HOW content moves from idea to published
  piece. Without a workflow, content gets stuck — ideas pile up,
  drafts languish, and publishing becomes chaotic.

  Part 1: Editorial workflow stages
  Define the 6 standard stages of content creation:
  1. Ideation (where ideas come from and how to capture them)
  2. Planning (assigning topics, deadlines, and creators)
  3. Creation (writing, designing, filming)
  4. Review (editing, feedback, approval)
  5. Scheduling (loading into calendar and publishing tools)
  6. Publishing and promotion (go-live and distribution)

  For each stage:
  - What happens at this stage
  - Who's responsible
  - What the deliverable is
  - How long it typically takes
  - What can go wrong

  Part 2: Build an editorial workflow
  For "Clarity Finance" — a personal finance blog and social
  media brand (1 editor, 2 writers, 1 designer):
  1. Design the workflow from idea → published piece
  2. Define roles and responsibilities:
     - Editor: ideation, review, publishing
     - Writers: creation, revisions
     - Designer: visual assets
  3. Create a timeline:
     - Blog post workflow (idea to publish in how many days?)
     - Social media post workflow (faster cycle)
     - Email newsletter workflow
  4. Define handoff points (when does work pass from one person
     to another, and how?)

  Part 3: Workflow efficiency
  1. Common workflow bottlenecks and how to fix them
  2. Batch processing opportunities
  3. Templates and checklists that speed up each stage
  4. How to handle rush content without breaking the workflow

assertions:
  - type: llm_judge
    criteria: "Workflow stages are clearly defined with specific deliverables — each stage has a clear input, process, and output"
    weight: 0.25
    description: "Clearly defined workflow stages"
  - type: llm_judge
    criteria: "Roles and responsibilities are specific — the editor, writers, and designer each know exactly what they do at each stage"
    weight: 0.25
    description: "Specific role definitions"
  - type: llm_judge
    criteria: "Timelines are realistic for a 4-person team — blog post production time accounts for review cycles and designer handoffs"
    weight: 0.25
    description: "Realistic production timelines"
  - type: llm_judge
    criteria: "Efficiency tips address real bottlenecks — approval delays, unclear feedback, and scope creep are practical problems addressed"
    weight: 0.25
    description: "Practical efficiency solutions"
