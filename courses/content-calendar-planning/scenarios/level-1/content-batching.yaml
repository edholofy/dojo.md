meta:
  id: content-batching
  level: 1
  course: content-calendar-planning
  type: output
  description: "Master content batching — create multiple pieces of content in dedicated sessions for efficiency, consistency, and reduced creative fatigue"
  tags: [content-calendar, batching, efficiency, productivity, workflow, basics]

state: {}

trigger: |
  Content batching means creating multiple pieces of content
  in a single focused session instead of creating one piece at
  a time. It reduces context-switching, improves consistency,
  and makes content creation more efficient. Many content
  creators batch a week or month of content in just a few hours.

  Part 1: Content batching fundamentals
  1. What is content batching and why it works:
     - Reduced context-switching (flow state benefits)
     - Consistency in voice and quality
     - Time savings (setup once, create many)
     - Reduced daily pressure
  2. Batching vs. real-time content creation:
     - When batching works best
     - When real-time creation is necessary
     - The hybrid approach
  3. Types of batching:
     - Batching by task (all writing → all design → all scheduling)
     - Batching by platform (all Instagram → all blog)
     - Batching by pillar (all educational → all promotional)
     - Batching by time period (all of next week in one session)

  Part 2: Design a batching workflow
  For a content creator managing a food blog and social media:
  1. Weekly batching schedule:
     - Monday: Content planning and research (2 hours)
     - Tuesday: Writing and captions (3 hours)
     - Wednesday: Photo/video creation (3 hours)
     - Thursday: Editing and design (2 hours)
     - Friday: Scheduling and engagement (1.5 hours)
  2. Monthly batching alternative:
     - 2 full days per month for content creation
     - What to batch and what to leave for daily
  3. Tools and setup for efficient batching:
     - Workspace preparation
     - Templates and assets pre-loaded
     - Batch scheduling tools

  Part 3: Batching tips and troubleshooting
  1. How to batch without losing spontaneity
  2. Leaving gaps for timely content
  3. Dealing with creative blocks during batch sessions
  4. Quality control when producing in volume
  5. How far ahead to batch safely

assertions:
  - type: llm_judge
    criteria: "Batching workflows are realistic and time-specific — actual hours allocated to each task reflect real content creation effort"
    weight: 0.30
    description: "Realistic batching workflow"
  - type: llm_judge
    criteria: "Both weekly and monthly batching approaches are viable — each has clear advantages and the reader can choose what fits their style"
    weight: 0.25
    description: "Viable batching alternatives"
  - type: llm_judge
    criteria: "Spontaneity and timeliness are addressed — batching doesn't mean ignoring trending topics or real-time opportunities"
    weight: 0.25
    description: "Spontaneity preserved"
  - type: llm_judge
    criteria: "Creative block solutions are practical — not just 'take a break' but specific techniques for maintaining output during batch sessions"
    weight: 0.20
    description: "Practical creative block solutions"
