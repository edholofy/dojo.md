meta:
  id: first-content-calendar
  level: 1
  course: content-calendar-planning
  type: output
  description: "Create your first complete content calendar — a 30-day plan combining all foundational elements into a ready-to-execute content strategy"
  tags: [content-calendar, complete, capstone, 30-day, first-calendar, basics]

state: {}

trigger: |
  Bringing it all together — create a complete 30-day content
  calendar that combines content pillars, posting frequency,
  editorial workflow, seasonal planning, and batching into a
  single actionable plan.

  Build a complete 30-day content calendar for:
  Brand: "Mosaic Home Decor" — an online home decor store
  Team: 1 content manager (full-time) + 1 part-time social intern
  Platforms: Instagram (primary), Pinterest, blog, email newsletter
  Business goals: Drive website traffic and increase sales by 15%
  Current: 8,000 Instagram followers, 3,000 email subscribers

  The calendar should include:

  1. Content pillars (4 pillars defined with ratios)
  2. Posting schedule:
     - Instagram: 5 feed posts/week + daily Stories
     - Pinterest: 10 pins/week
     - Blog: 2 posts/month
     - Email: 1 newsletter/week
  3. 30-day calendar with every piece of content:
     - Date and time
     - Platform
     - Content pillar
     - Content type/format
     - Topic/headline
     - Brief caption or description
     - Visual needed
     - Status
  4. Seasonal content integrated:
     - At least 2 seasonal/timely posts included
  5. Batching plan:
     - When to create content (batch schedule)
     - Weekly time allocation
  6. One content repurposing example:
     - Show how 1 blog post becomes 3 Instagram posts,
       2 Pinterest pins, and 1 email section

  Include a "week 1 detailed view" showing every piece of
  content with full detail.

assertions:
  - type: llm_judge
    criteria: "The 30-day calendar is complete and realistic — all platforms have content assigned for every publishing slot with actual topics"
    weight: 0.30
    description: "Complete realistic 30-day calendar"
  - type: llm_judge
    criteria: "Content pillars are balanced across the month — not all promotional or all educational, with the defined ratios approximately maintained"
    weight: 0.25
    description: "Balanced pillar distribution"
  - type: llm_judge
    criteria: "The workload is sustainable for a content manager + part-time intern — the volume doesn't require a 10-person team"
    weight: 0.25
    description: "Sustainable team workload"
  - type: llm_judge
    criteria: "Content repurposing example shows efficient content multiplication — one blog post genuinely generates 6 additional pieces"
    weight: 0.20
    description: "Efficient content repurposing"
