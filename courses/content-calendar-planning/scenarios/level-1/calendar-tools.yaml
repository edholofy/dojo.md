meta:
  id: calendar-tools
  level: 1
  course: content-calendar-planning
  type: output
  description: "Choose content calendar tools — compare spreadsheets, project management tools, and dedicated platforms for content planning and scheduling"
  tags: [content-calendar, tools, platforms, software, comparison, basics]

state: {}

trigger: |
  Content calendars can live in a simple spreadsheet or a
  sophisticated platform. The right tool depends on team size,
  budget, workflow complexity, and publishing needs. Many
  teams start with spreadsheets and graduate to dedicated tools
  as they scale.

  Part 1: Tool categories
  Explain the 4 categories of content calendar tools:
  1. Spreadsheets (Google Sheets, Excel):
     - Pros: Free, flexible, familiar
     - Cons: No automation, manual updates, hard to scale
     - Best for: Solo creators, small budgets
  2. Project management tools (Notion, Trello, Asana, Monday):
     - Pros: Collaboration, workflows, customizable
     - Cons: Not built specifically for content, some learning curve
     - Best for: Small teams, content + project overlap
  3. Social media schedulers (Buffer, Later, Hootsuite, Sprout Social):
     - Pros: Direct publishing, analytics, content preview
     - Cons: Social-only, subscription cost
     - Best for: Social-heavy strategies
  4. Dedicated content platforms (CoSchedule, ContentCal, Planable):
     - Pros: Built for content workflow, approval features, analytics
     - Cons: Higher cost, potential feature overlap
     - Best for: Growing teams, agency workflows

  Part 2: Tool comparison matrix
  Create a comparison of 8 popular tools:
  - Google Sheets, Notion, Trello, Asana, Buffer, Later,
    CoSchedule, Sprout Social
  Compare on:
  1. Price (free tier, paid plans)
  2. Team collaboration features
  3. Platform integrations
  4. Calendar visualization
  5. Approval workflows
  6. Analytics and reporting
  7. Best use case
  8. Limitations

  Part 3: Tool selection framework
  For 3 different scenarios, recommend the best tool:
  1. Solo blogger on a budget
  2. 3-person social media team at a startup
  3. 10-person marketing team at a mid-size company

assertions:
  - type: llm_judge
    criteria: "Tool comparison is balanced and accurate — each tool's strengths and weaknesses are honestly assessed, not just marketing copy"
    weight: 0.30
    description: "Balanced accurate comparison"
  - type: llm_judge
    criteria: "Recommendations match the scenarios — the solo blogger doesn't get recommended enterprise software, and the mid-size team doesn't get told to use Google Sheets"
    weight: 0.30
    description: "Scenario-appropriate recommendations"
  - type: llm_judge
    criteria: "Pricing information is reasonable and current — free tiers and paid plan ranges are approximately accurate"
    weight: 0.20
    description: "Reasonable pricing information"
  - type: llm_judge
    criteria: "The framework helps readers make their own decision — it provides criteria for evaluation, not just opinions"
    weight: 0.20
    description: "Decision-enabling framework"
