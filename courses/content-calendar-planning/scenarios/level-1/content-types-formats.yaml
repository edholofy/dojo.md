meta:
  id: content-types-formats
  level: 1
  course: content-calendar-planning
  type: output
  description: "Understand content types and formats — map different content formats to platforms, goals, and audience preferences for effective calendar planning"
  tags: [content-calendar, content-types, formats, mapping, planning, basics]

state: {}

trigger: |
  Different content formats serve different purposes. Blog posts
  build SEO. Reels drive discovery. Carousels educate. Emails
  convert. Understanding which format works best for which goal
  is essential for effective calendar planning.

  Part 1: Content format guide
  Catalog 15 common content formats with their best uses:
  1. Blog posts (long-form, how-to, listicle, opinion)
  2. Social media feed posts (image + caption)
  3. Instagram/TikTok Reels (short-form video)
  4. YouTube videos (long-form educational/entertainment)
  5. Carousels (multi-image educational content)
  6. Stories (ephemeral, behind-the-scenes)
  7. Email newsletters (curated, original, mixed)
  8. Infographics (visual data/process)
  9. Podcasts/audio content
  10. Case studies (proof-based content)
  11. Whitepapers/ebooks (lead generation)
  12. Webinars and live streams
  13. User-generated content (reposts, features)
  14. Threads (X/Twitter, LinkedIn)
  15. Polls and interactive content

  For each format:
  - Best platform(s)
  - Primary goal (awareness, engagement, conversion, retention)
  - Production effort (low/medium/high)
  - Shelf life (ephemeral vs. evergreen)

  Part 2: Format-to-goal mapping
  For "Spark Creative Agency" — a design agency:
  1. Map content formats to 4 business goals:
     - Brand awareness: Which formats and why
     - Lead generation: Which formats and why
     - Client retention: Which formats and why
     - Talent recruitment: Which formats and why
  2. Create a format mix recommendation for their calendar
  3. Show how one topic becomes 5 different formats

  Part 3: Format planning in the calendar
  1. How to balance high-effort and low-effort content
  2. Batching similar formats for efficiency
  3. The 1:3:5 content pyramid (1 anchor piece, 3 medium,
     5 quick pieces per week)

assertions:
  - type: llm_judge
    criteria: "All 15 content formats are accurately described with appropriate platform, goal, and effort ratings"
    weight: 0.25
    description: "Accurate format descriptions"
  - type: llm_judge
    criteria: "Format-to-goal mapping is strategic — the recommended formats for lead generation differ from brand awareness formats with clear reasoning"
    weight: 0.25
    description: "Strategic format mapping"
  - type: llm_judge
    criteria: "The topic-to-5-formats example shows practical content repurposing — one idea genuinely translates into 5 distinct pieces"
    weight: 0.25
    description: "Practical repurposing example"
  - type: llm_judge
    criteria: "The content pyramid is practical — it balances production effort with publishing frequency in a manageable way"
    weight: 0.25
    description: "Practical content pyramid"
