meta:
  id: seasonal-planning
  level: 1
  course: content-calendar-planning
  type: output
  description: "Plan seasonal and event-based content — holidays, industry events, cultural moments, and awareness days integrated into the content calendar"
  tags: [content-calendar, seasonal, holidays, events, planning, basics]

state: {}

trigger: |
  Seasonal content planning ensures you're prepared for key dates
  instead of scrambling at the last minute. Holidays, industry
  events, awareness months, and cultural moments all create
  content opportunities — but only if planned in advance.

  Part 1: Seasonal content fundamentals
  1. Types of seasonal content:
     - Major holidays (Christmas, Thanksgiving, Easter)
     - Industry-specific events and trade shows
     - Awareness days/months (Mental Health Month, Earth Day)
     - Cultural moments (back-to-school, summer kickoff)
     - Trending moments (anticipated events, sports, awards)
  2. Lead time requirements:
     - How far in advance to plan different seasonal content
     - Production timeline for seasonal campaigns
  3. Evergreen vs. seasonal content balance

  Part 2: Build a seasonal content calendar
  For "Harmony Wellness" — a yoga studio and wellness center:
  1. Identify 20 key dates for the year:
     - Major holidays relevant to wellness
     - Wellness awareness months/days
     - Seasonal transitions (New Year's resolutions, summer fitness)
     - Industry events
  2. For 5 of these dates, create:
     - Content plan (what to post, which platform, format)
     - Lead time timeline (when to start creating)
     - Post-event follow-up content
  3. Show how seasonal content integrates with regular
     content pillars (it supplements, doesn't replace)

  Part 3: Seasonal planning best practices
  1. Creating a "seasonal content library" of reusable assets
  2. Adapting seasonal themes to your brand (not forced)
  3. Which seasonal moments to skip (and why)
  4. How to handle sensitive or controversial awareness days
  5. Post-event analysis (did seasonal content perform?)

assertions:
  - type: llm_judge
    criteria: "The 20 key dates are relevant to a wellness brand — not generic holidays but dates that connect to yoga, mindfulness, and health"
    weight: 0.30
    description: "Brand-relevant seasonal dates"
  - type: llm_judge
    criteria: "Lead time timelines are practical — seasonal content planning starts early enough for quality production without being unreasonably far in advance"
    weight: 0.25
    description: "Practical lead times"
  - type: llm_judge
    criteria: "Seasonal content integrates with regular pillars — it supplements the ongoing strategy rather than disrupting it"
    weight: 0.25
    description: "Integrated seasonal planning"
  - type: llm_judge
    criteria: "Guidance on which moments to skip demonstrates strategic thinking — not every awareness day deserves content"
    weight: 0.20
    description: "Strategic moment selection"
