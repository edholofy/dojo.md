meta:
  id: calendar-templates
  level: 1
  course: content-calendar-planning
  type: output
  description: "Create content calendar templates — design daily, weekly, monthly, and quarterly views with the right fields and structure for different needs"
  tags: [content-calendar, templates, structure, views, design, basics]

state: {}

trigger: |
  A good content calendar template is the backbone of content
  planning. Different views serve different purposes — daily
  for execution, weekly for coordination, monthly for strategy,
  quarterly for big-picture alignment. The right template makes
  planning faster and publishing consistent.

  Part 1: Calendar view types
  Explain when to use each view:
  1. Daily view: Execution focus (what's publishing today)
  2. Weekly view: Team coordination (who's doing what this week)
  3. Monthly view: Strategic overview (content mix and themes)
  4. Quarterly view: Goal alignment (campaigns and initiatives)

  Part 2: Build 4 calendar templates
  For "Pixel & Press" — a creative agency (4-person team, managing
  blog, email, and 3 social platforms):

  Template 1: Weekly content calendar
  - Design with columns for: date, platform, content type,
    topic, copy draft, visual status, assigned to, status,
    publish time, hashtags/tags, link/CTA, notes
  - Fill in 1 complete week as an example

  Template 2: Monthly overview calendar
  - Grid view showing each day of the month
  - Color-coded by content pillar or platform
  - Campaign periods highlighted
  - Key dates marked
  - Fill in 1 complete month as an example

  Template 3: Content pipeline tracker
  - Kanban-style: Ideas → In Progress → Review → Scheduled → Published
  - Each card includes: title, format, deadline, owner
  - Show 15 content pieces in various stages

  Template 4: Quarterly planning document
  - Goals for the quarter
  - Campaign timeline
  - Content themes by month
  - Resource allocation
  - KPI targets

  Part 3: Template customization
  1. How to adapt templates for different team sizes
  2. Essential vs. optional fields (don't over-complicate)
  3. How to maintain the template over time
  4. When to switch from spreadsheets to dedicated tools

assertions:
  - type: llm_judge
    criteria: "All 4 templates are complete with filled-in examples — not empty structures but usable references with real content entries"
    weight: 0.30
    description: "Complete filled-in templates"
  - type: llm_judge
    criteria: "Templates serve different purposes appropriately — the weekly view is detailed for execution, the quarterly view is high-level for strategy"
    weight: 0.25
    description: "Purpose-appropriate views"
  - type: llm_judge
    criteria: "The pipeline tracker shows content at various stages — it demonstrates how content moves through the workflow"
    weight: 0.25
    description: "Dynamic pipeline demonstration"
  - type: llm_judge
    criteria: "Customization guidance helps teams adapt — a solo creator and a 10-person team can both modify these templates"
    weight: 0.20
    description: "Adaptable template guidance"
