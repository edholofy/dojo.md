meta:
  id: content-pillars
  level: 1
  course: content-calendar-planning
  type: output
  description: "Define content pillars — identify 3-5 core topics that structure your content strategy and ensure balanced, purposeful content creation"
  tags: [content-calendar, pillars, strategy, topics, structure, basics]

state: {}

trigger: |
  Content pillars are the 3-5 core topics that form the foundation
  of your content strategy. They ensure every piece of content
  serves a purpose — educating, entertaining, inspiring, or
  converting. Without pillars, content becomes random. With them,
  it becomes strategic.

  Part 1: Understanding content pillars
  1. What content pillars are and why they matter
  2. How many pillars to have (3-5 is optimal, why)
  3. Types of pillars:
     - Educational (teach your audience something)
     - Inspirational (motivate and connect emotionally)
     - Promotional (showcase products/services)
     - Community (build relationships and engagement)
     - Entertainment (fun, relatable content)
  4. The content ratio:
     - 80/20 rule (80% value, 20% promotional)
     - 60/30/10 model (60% curated/educational, 30% original, 10% promotional)
     - How to find the right ratio for your brand

  Part 2: Build content pillars
  For "Greenleaf Gardens" — a sustainable gardening supply company:
  1. Identify 4 content pillars:
     - Name each pillar
     - Define what content falls under this pillar
     - Explain how this pillar serves the audience AND business
     - List 10 specific topic ideas per pillar
  2. Assign pillar ratios (what percentage of content each gets)
  3. Map pillars to the customer journey:
     - Which pillars drive awareness?
     - Which pillars build consideration?
     - Which pillars drive conversion?
     - Which pillars build retention?

  Part 3: Pillar-based calendar planning
  Show how content pillars translate into a weekly calendar:
  1. Assign pillar days or rotations
  2. Create a 1-week sample calendar using the pillars
  3. Demonstrate how pillars prevent content repetition
  4. How to evaluate if your pillar mix is working

assertions:
  - type: llm_judge
    criteria: "Content pillars are specific to Greenleaf Gardens — not generic 'educational, promotional' but gardening-specific themes"
    weight: 0.30
    description: "Brand-specific content pillars"
  - type: llm_judge
    criteria: "40 topic ideas (10 per pillar) are diverse and realistic — a content creator could actually use these ideas"
    weight: 0.25
    description: "Diverse realistic topic ideas"
  - type: llm_judge
    criteria: "Customer journey mapping connects pillars to business outcomes — awareness, consideration, conversion, and retention are addressed"
    weight: 0.25
    description: "Journey-connected pillars"
  - type: llm_judge
    criteria: "The weekly calendar demonstrates balanced pillar distribution — not everything is promotional, and the mix serves both audience and business"
    weight: 0.20
    description: "Balanced pillar distribution"
