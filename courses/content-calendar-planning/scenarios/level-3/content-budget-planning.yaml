meta:
  id: content-budget-planning
  level: 3
  course: content-calendar-planning
  type: output
  description: "Plan content budgets — allocate resources across content types, platforms, and campaigns with cost tracking, ROI measurement, and budget optimization"
  tags: [content-calendar, budget, resources, roi, allocation, advanced]

state: {}

trigger: |
  Content calendars need budgets. From freelancer costs and
  design tools to paid promotion and stock assets, every
  piece of content has a cost. Smart budget planning ensures
  maximum output and impact per dollar spent.

  Part 1: Content budget components
  1. Production costs:
     - In-house labor (salary allocation per content piece)
     - Freelance writers, designers, videographers
     - Stock photos, videos, music licensing
     - Tools and software subscriptions
     - Equipment (cameras, lighting, microphones)
  2. Distribution costs:
     - Paid promotion and boosting
     - Influencer partnerships
     - Sponsored content and native advertising
     - Platform-specific ad spend
  3. Operational costs:
     - Content management tools
     - Analytics and reporting tools
     - Training and development
     - Agency retainers

  Part 2: Build a content budget
  For "Catalyst Education" — an online learning platform:
  Annual content budget: $120,000
  Team: 1 content manager (in-house), freelance support
  Platforms: Blog, YouTube, Instagram, LinkedIn, email, podcast

  1. Create an annual content budget allocation:
     - Monthly breakdown across all cost categories
     - Per-platform budget allocation with rationale
     - Quarterly campaign budgets (4 major campaigns/year)
     - Contingency reserve (unexpected opportunities)
  2. Build a per-content-piece cost model:
     - Blog post: Total cost breakdown
     - YouTube video: Total cost breakdown
     - Instagram content (weekly): Total cost breakdown
     - Podcast episode: Total cost breakdown
     - Email newsletter: Total cost breakdown
  3. Design a budget tracking calendar:
     - Monthly planned vs. actual spend
     - ROI tracking per content type
     - Budget reallocation triggers (when to shift money)

  Part 3: Budget optimization
  1. Reducing content costs without sacrificing quality
  2. When to increase budget (ROI-positive signals)
  3. Making the business case for content budget increases
  4. Free and low-cost content strategies for tight budgets

assertions:
  - type: llm_judge
    criteria: "The $120,000 annual budget is allocated realistically — amounts per category and per platform reflect actual market costs for content production"
    weight: 0.30
    description: "Realistic budget allocation"
  - type: llm_judge
    criteria: "Per-content-piece costs are detailed and plausible — a blog post doesn't cost $5,000 and a YouTube video doesn't cost $50"
    weight: 0.25
    description: "Plausible per-piece costs"
  - type: llm_judge
    criteria: "Budget tracking integrates with the content calendar — spending is tracked alongside content production, not in a separate system"
    weight: 0.25
    description: "Integrated budget tracking"
  - type: llm_judge
    criteria: "Budget optimization advice is practical — cost-cutting suggestions maintain quality and tight-budget strategies are genuinely usable"
    weight: 0.20
    description: "Practical budget optimization"
