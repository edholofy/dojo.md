meta:
  id: editorial-strategy
  level: 3
  course: content-calendar-planning
  type: output
  description: "Develop editorial strategy — create thematic planning, editorial missions, content series, and narrative arcs that give your content calendar strategic direction"
  tags: [content-calendar, editorial, strategy, themes, narrative, advanced]

state: {}

trigger: |
  An editorial strategy transforms a content calendar from a
  random collection of posts into a cohesive narrative. Themes,
  series, editorial missions, and content arcs give audiences
  a reason to follow and return, while giving creators clear
  direction for what to produce.

  Part 1: Editorial strategy components
  1. Editorial mission statement:
     - What your content exists to do
     - Who it serves and how
     - What makes it different from competitors
  2. Thematic planning:
     - Monthly themes that create focus
     - Quarterly narratives that build over time
     - Annual editorial calendar with key storylines
  3. Content series and recurring features:
     - Weekly series (consistent audience expectations)
     - Monthly features (deeper dives)
     - Seasonal specials (annual traditions)
  4. Editorial voice and perspective:
     - Point of view on industry topics
     - Thought leadership positioning
     - Story types your brand tells

  Part 2: Build an editorial strategy
  For "Forge & Flourish" — a women's professional development brand:
  1. Craft an editorial mission statement (2-3 sentences)
  2. Design a 6-month editorial plan with:
     - Monthly themes (what each month focuses on)
     - 4 recurring content series:
       Series 1: Weekly "Career Catalyst" (actionable tips)
       Series 2: Bi-weekly "Behind the Breakthrough" (success stories)
       Series 3: Monthly "Leadership Lab" (deep-dive articles)
       Series 4: Quarterly "Industry Pulse" (trend analysis)
     - Show how themes and series intersect
  3. Create a 1-month editorial calendar showing:
     - Every content piece mapped to theme and series
     - Mix of series content and standalone pieces
     - How the month tells a cohesive story
     - Content hierarchy (anchor piece, supporting pieces)
  4. Design editorial guidelines for contributors:
     - What topics to cover (and avoid)
     - Story angles that align with the mission
     - Quality standards for each series

  Part 3: Editorial strategy maintenance
  1. Refreshing themes without losing identity
  2. Balancing planned editorial with timely content
  3. Measuring editorial strategy effectiveness
  4. When to retire a content series

assertions:
  - type: llm_judge
    criteria: "The editorial mission statement is distinctive — it clearly differentiates the brand's content from generic women's professional development advice"
    weight: 0.25
    description: "Distinctive editorial mission"
  - type: llm_judge
    criteria: "The 4 content series are complementary — each serves a different purpose and together they create a complete content ecosystem"
    weight: 0.25
    description: "Complementary content series"
  - type: llm_judge
    criteria: "Monthly themes create genuine editorial focus — they're specific enough to guide content creation, not vague like 'Growth Month'"
    weight: 0.25
    description: "Focused monthly themes"
  - type: llm_judge
    criteria: "The 1-month calendar tells a cohesive story — individual pieces connect to create a narrative progression throughout the month"
    weight: 0.25
    description: "Cohesive monthly narrative"
