meta:
  id: multi-brand-calendar
  level: 3
  course: content-calendar-planning
  type: output
  description: "Manage multi-brand content calendars — coordinate content across multiple brands, sub-brands, or product lines while maintaining distinct identities and avoiding audience confusion"
  tags: [content-calendar, multi-brand, portfolio, coordination, identity, advanced]

state: {}

trigger: |
  Managing content for multiple brands requires careful
  coordination. Each brand needs its own voice, audience,
  and strategy — but shared resources, campaigns, and
  operational efficiency demand coordination across the
  portfolio.

  Part 1: Multi-brand calendar challenges
  1. Brand identity management:
     - Maintaining distinct voices across brands
     - Avoiding content cannibalization
     - Cross-brand promotion vs. confusion
  2. Resource allocation:
     - Shared content teams across brands
     - Platform prioritization by brand
     - Budget allocation for content production
  3. Coordination models:
     - Centralized (one team, multiple brands)
     - Decentralized (dedicated teams per brand)
     - Hub-and-spoke (central strategy, brand execution)

  Part 2: Build a multi-brand calendar system
  For "Atlas Lifestyle Group" — parent company of 3 brands:
  - Brand A: "Summit Athletics" — premium sportswear
  - Brand B: "Basecamp Outdoor" — affordable outdoor gear
  - Brand C: "Peak Nutrition" — sports nutrition supplements

  1. Define each brand's content strategy:
     - Unique content pillars (3-4 per brand)
     - Platform prioritization
     - Voice and tone guidelines
     - Target audience distinctions
  2. Create a 2-week coordinated calendar showing:
     - All 3 brands' content side by side
     - Shared themes adapted per brand voice
     - Cross-promotion opportunities (where appropriate)
     - Resource allocation (who creates what)
  3. Design a coordination framework:
     - Monthly cross-brand planning meetings
     - Shared content asset library
     - Brand collision prevention (avoiding same-day competing posts)
     - Consolidated reporting dashboard

  Part 3: Multi-brand operational efficiency
  1. Content that works across brands (shared assets)
  2. Technology stack for multi-brand management
  3. Escalation protocols when brands conflict
  4. When to merge or separate brand content operations

assertions:
  - type: llm_judge
    criteria: "Each brand has a genuinely distinct content strategy — the 3 brands have different voices, audiences, and approaches that reflect their market position"
    weight: 0.30
    description: "Distinct brand strategies"
  - type: llm_judge
    criteria: "The 2-week calendar shows real coordination — shared themes are adapted per brand, not copy-pasted, and potential conflicts are managed"
    weight: 0.25
    description: "Genuine calendar coordination"
  - type: llm_judge
    criteria: "Resource allocation is practical — a shared team can realistically produce this volume of content for 3 brands"
    weight: 0.25
    description: "Practical resource allocation"
  - type: llm_judge
    criteria: "Cross-promotion is strategic — brands promote each other where it makes sense without confusing audiences or diluting identities"
    weight: 0.20
    description: "Strategic cross-promotion"
