meta:
  id: content-governance
  level: 3
  course: content-calendar-planning
  type: output
  description: "Establish content governance — create policies, standards, and oversight frameworks that ensure quality, consistency, and compliance across all content operations"
  tags: [content-calendar, governance, policies, standards, compliance, advanced]

state: {}

trigger: |
  Content governance ensures that every piece of content meets
  quality standards, brand guidelines, legal requirements, and
  strategic objectives. Without governance, content quality
  degrades as teams scale and more people create content.

  Part 1: Content governance framework
  1. Core governance components:
     - Content standards (quality, style, formatting)
     - Brand guidelines enforcement
     - Legal and compliance requirements
     - Accessibility standards (WCAG, ADA)
     - Data privacy (GDPR, CCPA) in content
  2. Governance roles:
     - Content owner (accountable for content quality)
     - Content steward (enforces standards day-to-day)
     - Subject matter experts (accuracy verification)
     - Legal/compliance reviewer (risk management)
  3. Governance documentation:
     - Content style guide
     - Editorial standards manual
     - Approval matrix (who approves what)
     - Content taxonomy and tagging standards
     - Archiving and retention policies

  Part 2: Build a governance system
  For "GlobalTrust Insurance" — a national insurance provider:
  1. Create a content governance policy document including:
     - Purpose and scope
     - Content quality standards (10 specific criteria)
     - Editorial guidelines (tone, accuracy, sourcing)
     - Compliance requirements for insurance content
     - Approval matrix: Content Type × Risk Level → Approver
     - Content lifecycle management rules
     - Non-compliance consequences
  2. Design a content audit scorecard:
     - 15 evaluation criteria with scoring rubric
     - Example audit of 5 hypothetical content pieces
     - Action items generated from audit findings
  3. Build a governance calendar:
     - Monthly quality spot-checks
     - Quarterly comprehensive audits
     - Annual governance policy reviews
     - Training schedule for content creators

  Part 3: Governance implementation
  1. Rolling out governance without killing creativity
  2. Getting buy-in from content creators
  3. Balancing speed with compliance
  4. Automating governance checks where possible

assertions:
  - type: llm_judge
    criteria: "The governance policy is comprehensive yet practical — it covers quality, compliance, and process without being a 100-page bureaucratic document"
    weight: 0.30
    description: "Comprehensive practical governance"
  - type: llm_judge
    criteria: "The content audit scorecard has specific, measurable criteria — reviewers know exactly how to score each item"
    weight: 0.25
    description: "Specific audit scorecard"
  - type: llm_judge
    criteria: "Insurance compliance is properly addressed — content about insurance products has appropriate disclaimers and accuracy requirements"
    weight: 0.25
    description: "Insurance compliance addressed"
  - type: llm_judge
    criteria: "Implementation guidance balances governance with creativity — standards are enforced without making content creation a miserable, bureaucratic process"
    weight: 0.20
    description: "Governance-creativity balance"
