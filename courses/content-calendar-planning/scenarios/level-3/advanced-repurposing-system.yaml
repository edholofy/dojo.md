meta:
  id: advanced-repurposing-system
  level: 3
  course: content-calendar-planning
  type: output
  description: "Build an advanced content repurposing system — create systematic content atomization, cross-format workflows, and content lifecycle management for maximum ROI per asset"
  tags: [content-calendar, repurposing, atomization, lifecycle, advanced-system, advanced]

state: {}

trigger: |
  Advanced content repurposing goes beyond simple reformatting.
  Content atomization systematically breaks down pillar content
  into dozens of derivative pieces, while lifecycle management
  ensures content is refreshed, updated, and retired strategically.

  Part 1: Content atomization framework
  1. The content atom model:
     - Pillar content (comprehensive, research-heavy)
     - Cluster content (focused subtopics)
     - Atomic content (individual insights, quotes, data points)
  2. Atomization workflow:
     - Deconstruction: Breaking pillar content into atoms
     - Reconstruction: Assembling atoms into new formats
     - Distribution: Platform-specific packaging
  3. Content lifecycle stages:
     - Creation → Distribution → Performance peak →
       Decline → Refresh → Redistribution → Retirement

  Part 2: Build an atomization system
  For "InnovateTech Academy" — a tech education platform:
  Take 1 comprehensive guide: "The Complete Guide to Cloud
  Computing for Small Businesses" (3,000-word pillar article)

  1. Atomize the guide into 25+ content pieces:
     - 5 blog posts (cluster topics extracted)
     - 8 social media posts (key statistics, quotes, tips)
     - 3 infographics (processes, comparisons, data)
     - 4 email newsletter sections
     - 2 video scripts (explainer, tutorial)
     - 1 podcast episode outline
     - 2 downloadable resources (checklist, template)
  2. For each piece, provide:
     - The source section from the pillar content
     - The derivative format and platform
     - The unique angle or hook
     - Publishing timeline (immediate to 90 days out)
  3. Create a content lifecycle calendar showing:
     - When each piece publishes
     - When to refresh the original
     - When to create "updated for 2026" versions
     - Retirement criteria

  Part 3: Scaling atomization
  1. Building an atomization template for recurring use
  2. Tracking derivative content performance vs. originals
  3. When atomization hurts (over-saturation signals)
  4. AI tools for automating content atomization

assertions:
  - type: llm_judge
    criteria: "The 25+ content pieces are genuinely distinct — each derivative offers a unique angle or value, not just the same content in different containers"
    weight: 0.30
    description: "Genuinely distinct derivatives"
  - type: llm_judge
    criteria: "The publishing timeline is strategic — content releases are staggered for maximum impact, not dumped all at once"
    weight: 0.25
    description: "Strategic publishing timeline"
  - type: llm_judge
    criteria: "Content lifecycle management is practical — refresh and retirement criteria are specific and actionable"
    weight: 0.25
    description: "Practical lifecycle management"
  - type: llm_judge
    criteria: "The atomization template is reusable — it provides a systematic approach that can be applied to any pillar content piece"
    weight: 0.20
    description: "Reusable atomization template"
