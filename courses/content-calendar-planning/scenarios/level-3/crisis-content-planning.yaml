meta:
  id: crisis-content-planning
  level: 3
  course: content-calendar-planning
  type: output
  description: "Plan for content during crises — build contingency calendars, rapid response frameworks, and content pause protocols for brand crises, PR issues, and external events"
  tags: [content-calendar, crisis, contingency, rapid-response, planning, advanced]

state: {}

trigger: |
  Every content calendar needs a crisis plan. Brand crises,
  global events, controversial incidents, and unexpected
  situations require rapid content adjustments — pausing
  scheduled content, crafting responses, and managing the
  return to normal programming.

  Part 1: Crisis content planning framework
  1. Types of content crises:
     - Brand-specific crises (product recall, executive scandal,
       data breach, customer backlash)
     - Industry crises (regulatory changes, competitor failures)
     - External crises (natural disasters, global events,
       political situations, pandemics)
     - Social media crises (viral complaint, canceled employee,
       tone-deaf post gone wrong)
  2. Crisis response levels:
     - Level 1: Monitor (no action needed, watch closely)
     - Level 2: Pause (stop scheduled content, assess)
     - Level 3: Respond (acknowledge, provide information)
     - Level 4: Full crisis mode (all content pivots)
  3. The content pause protocol:
     - What to pause immediately
     - What can continue publishing
     - How to review scheduled content for tone-deaf risk

  Part 2: Build a crisis content plan
  For "Solara Foods" — a national organic food brand:
  1. Create 3 crisis scenarios with full content response plans:

     Scenario A: Product contamination recall
     - Hour 1-4: Immediate actions
     - Day 1: Content response across all platforms
     - Week 1: Ongoing communication plan
     - Week 2-4: Recovery content strategy
     - What scheduled content to pause and for how long

     Scenario B: Viral social media backlash over
     environmental claims (greenwashing accusation)
     - Response timeline and content plan
     - Social media response strategy
     - Long-term trust rebuilding content

     Scenario C: Major external event (natural disaster
     affecting supply chain and communities)
     - Content tone adjustment
     - Community support messaging
     - Return-to-normal timeline

  2. Create a crisis content decision tree
  3. Template for rapid-response social posts

  Part 3: Post-crisis content recovery
  1. Transitioning back to normal content
  2. Content that rebuilds trust and credibility
  3. Updating the content calendar after a crisis
  4. Lessons learned documentation

assertions:
  - type: llm_judge
    criteria: "All 3 crisis scenarios have realistic, detailed response plans — timelines are specific and actions are appropriate for each crisis type"
    weight: 0.30
    description: "Realistic crisis response plans"
  - type: llm_judge
    criteria: "The content pause protocol is nuanced — it distinguishes between content that must stop and content that can continue during different crisis types"
    weight: 0.25
    description: "Nuanced content pause protocol"
  - type: llm_judge
    criteria: "Crisis response tone is appropriate — messaging is empathetic, transparent, and brand-appropriate without being defensive or dismissive"
    weight: 0.25
    description: "Appropriate crisis tone"
  - type: llm_judge
    criteria: "Post-crisis recovery strategy shows a thoughtful return to normal — not an abrupt switch back but a gradual transition with trust-building content"
    weight: 0.20
    description: "Thoughtful post-crisis recovery"
