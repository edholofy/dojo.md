meta:
  id: content-operations-system
  level: 3
  course: content-calendar-planning
  type: output
  description: "Build a content operations system — design scalable processes, governance frameworks, and operational infrastructure for consistent, high-volume content production"
  tags: [content-calendar, operations, systems, governance, scalable, advanced]

state: {}

trigger: |
  Content operations (ContentOps) is the system of people,
  processes, and technology that enables consistent content
  production at scale. Moving from ad-hoc creation to
  systematic operations transforms content from a cost
  center to a growth engine.

  Part 1: Content operations framework
  1. The three pillars of ContentOps:
     - People: Roles, skills, capacity planning
     - Process: Workflows, standards, governance
     - Technology: Tools, integrations, automation
  2. Maturity levels:
     - Level 1: Ad hoc (reactive, no system)
     - Level 2: Defined (basic calendar, some processes)
     - Level 3: Managed (clear workflows, metrics)
     - Level 4: Optimized (data-driven, automated)
     - Level 5: Innovative (predictive, AI-assisted)
  3. Common operational challenges:
     - Content debt (outdated, inconsistent content)
     - Resource constraints (more demand than capacity)
     - Quality inconsistency (varying standards)
     - Measurement gaps (can't prove ROI)

  Part 2: Design a content operations system
  For "Meridian Financial Services" — a mid-size financial
  advisory firm scaling their content:
  Current state: 2 marketers creating content reactively
  Target state: Systematic content engine supporting 5 platforms

  1. Content operations blueprint:
     - Organizational structure and roles needed
     - Content production workflow (8 stages)
     - Quality assurance standards
     - Content governance policies
     - Technology stack recommendations
  2. Create a 90-day implementation roadmap:
     - Month 1: Foundation (processes, templates, tools)
     - Month 2: Execution (pilot the system, refine)
     - Month 3: Optimization (scale, measure, adjust)
  3. Operational calendar showing:
     - Daily, weekly, monthly operational cadences
     - Meeting rhythms and review cycles
     - Reporting schedules

  Part 3: Scaling content operations
  1. When to hire vs. outsource
  2. Process documentation standards
  3. Compliance and regulatory considerations for financial content
  4. Measuring operational efficiency (content velocity, quality scores)

assertions:
  - type: llm_judge
    criteria: "The content operations blueprint is comprehensive — it covers people, process, and technology with specific recommendations for a financial services context"
    weight: 0.30
    description: "Comprehensive operations blueprint"
  - type: llm_judge
    criteria: "The 90-day roadmap is realistic for a 2-person team scaling up — it doesn't assume unlimited budget or instant hiring"
    weight: 0.25
    description: "Realistic scaling roadmap"
  - type: llm_judge
    criteria: "Financial services compliance is addressed — regulated industry content requires specific guardrails and approval processes"
    weight: 0.25
    description: "Compliance-aware operations"
  - type: llm_judge
    criteria: "Operational metrics are meaningful — content velocity, quality scores, and efficiency metrics provide real operational insight"
    weight: 0.20
    description: "Meaningful operational metrics"
