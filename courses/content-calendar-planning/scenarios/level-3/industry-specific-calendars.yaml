meta:
  id: industry-specific-calendars
  level: 3
  course: content-calendar-planning
  type: output
  description: "Design industry-specific content calendars — adapt calendar planning for unique industry requirements including compliance, seasonality, and audience behavior patterns"
  tags: [content-calendar, industry-specific, compliance, specialization, adaptation, advanced]

state: {}

trigger: |
  Content calendars must be adapted to industry-specific
  requirements. A healthcare provider's calendar looks very
  different from a fashion brand's — different compliance
  rules, seasonal patterns, audience behaviors, and content
  types shape the entire planning approach.

  Part 1: Industry calendar considerations
  1. Regulatory and compliance factors:
     - Healthcare: HIPAA, medical claims restrictions
     - Finance: SEC disclosure rules, fair lending
     - Legal: Advertising ethics, confidentiality
     - Education: FERPA, accessibility requirements
     - Real estate: Fair housing, truth in advertising
  2. Industry-specific seasonality:
     - Retail: Holiday shopping, back-to-school, seasonal sales
     - B2B tech: Conference season, budget cycles, fiscal year planning
     - Healthcare: Flu season, wellness months, open enrollment
     - Real estate: Spring/summer peak, school year timing
  3. Audience behavior by industry:
     - Decision timelines (impulse vs. considered purchase)
     - Content consumption patterns
     - Trust-building requirements

  Part 2: Create 3 industry-specific calendars
  Design a 1-month content calendar for each:

  Calendar 1: "MedFirst Urgent Care" — healthcare clinic
  - Compliance requirements: No diagnostic claims, patient consent
  - Platforms: Facebook, Instagram, Google Business, email
  - Show how health content is reviewed before publishing
  - Include awareness month tie-ins

  Calendar 2: "TechBridge Solutions" — B2B SaaS company
  - Long sales cycle content: Awareness → consideration → decision
  - Platforms: LinkedIn, blog, email, webinars
  - Quarter-end push content strategy
  - Thought leadership cadence

  Calendar 3: "Luxe Realty Group" — luxury real estate
  - Fair housing compliance in content
  - Platforms: Instagram, YouTube, Zillow, email
  - Market update cadence
  - Listing showcase workflow

  Part 3: Industry calendar best practices
  1. Finding your industry's content rhythms
  2. Competitive content analysis by industry
  3. Adapting general content advice to regulated industries
  4. Industry-specific content calendar tools

assertions:
  - type: llm_judge
    criteria: "All 3 industry calendars reflect genuine industry knowledge — healthcare respects compliance, B2B aligns with sales cycles, real estate addresses fair housing"
    weight: 0.30
    description: "Genuine industry knowledge"
  - type: llm_judge
    criteria: "Compliance is integrated naturally — it's part of the workflow, not an afterthought or separate section"
    weight: 0.25
    description: "Naturally integrated compliance"
  - type: llm_judge
    criteria: "Seasonal patterns are industry-appropriate — each calendar reflects the actual business cycles of its industry"
    weight: 0.25
    description: "Industry-appropriate seasonality"
  - type: llm_judge
    criteria: "Content types match industry norms — B2B includes thought leadership and case studies, healthcare includes wellness education, real estate includes virtual tours"
    weight: 0.20
    description: "Industry-appropriate content types"
