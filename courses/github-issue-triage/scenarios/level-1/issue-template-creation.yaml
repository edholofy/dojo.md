meta:
  id: issue-template-creation
  level: 1
  course: github-issue-triage
  type: output
  description: "Create issue templates — write GitHub issue templates that gather the right information for efficient triage"
  tags: [github, issue-triage, templates, issue-forms, bug-report, basics]

state: {}

trigger: |
  You're a maintainer of a Python CLI tool for data processing. 60%
  of new issues are missing critical information (Python version, OS,
  input data format, error messages). This forces maintainers to ask
  follow-up questions, delaying triage by 2-3 days on average.

  Common issue types:
  1. Bug reports (45% of issues) — need: version, OS, Python version,
     steps to reproduce, expected vs actual behavior, error output
  2. Feature requests (30%) — need: use case description, proposed
     solution, alternatives considered
  3. Documentation issues (15%) — need: which page, what's wrong or
     missing, suggested improvement
  4. Questions (10%) — need: what they're trying to do, what they've
     tried, relevant code

  GitHub supports two template formats:
  - Markdown templates (.github/ISSUE_TEMPLATE/bug_report.md)
  - YAML issue forms (.github/ISSUE_TEMPLATE/bug_report.yml) with
    structured fields (dropdowns, checkboxes, text areas)

  Task: Create the issue templates. Write: the bug report template
  (using YAML issue forms with required fields for version, OS, Python
  version, steps to reproduce, and error output), the feature request
  template (with use case, proposed solution, and alternatives), the
  config.yml file (that controls the template chooser and adds a link
  to discussions for questions), and a brief explanation of why you
  chose specific fields as required vs optional.

assertions:
  - type: llm_judge
    criteria: "Bug report template captures essential info — version, OS, Python version, reproduction steps, expected/actual behavior, and error output are all present; critical fields are marked required"
    weight: 0.35
    description: "Essential-info bug template"
  - type: llm_judge
    criteria: "Feature request template enables evaluation — use case explains the 'why', proposed solution provides direction, alternatives show thoughtfulness; template guides without being burdensome"
    weight: 0.35
    description: "Evaluation-enabling feature template"
  - type: llm_judge
    criteria: "Template system is well-configured — config.yml includes contact links for questions, required vs optional field choices are justified, and templates reduce the need for follow-up questions"
    weight: 0.30
    description: "Well-configured template system"
