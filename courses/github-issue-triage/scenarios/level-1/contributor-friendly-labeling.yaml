meta:
  id: contributor-friendly-labeling
  level: 1
  course: github-issue-triage
  type: output
  description: "Label issues for contributors — identify and label issues appropriate for first-time and community contributors"
  tags: [github, issue-triage, good-first-issue, help-wanted, contributors, basics]

state: {}

trigger: |
  You're preparing for Hacktoberfest. Your project needs to identify
  and label issues that are appropriate for new contributors. You have
  15 open issues to review for contributor-friendliness.

  Here are 5 of them (evaluate these):

  Issue #401: "Fix typo in README installation instructions"
  Current labels: docs
  Complexity: Change 1 line in README.md
  Context needed: None — typo is clearly identified

  Issue #402: "Add input validation for email field in signup form"
  Current labels: enhancement
  Complexity: Add regex validation to one function
  Context needed: Understanding the validation library already in use

  Issue #403: "Refactor database connection pooling"
  Current labels: performance, tech-debt
  Complexity: Changes across 8 files, requires understanding of
  connection lifecycle and concurrent request handling
  Context needed: Deep knowledge of database internals

  Issue #404: "Add unit tests for the User model"
  Current labels: testing
  Complexity: Write 10-15 test cases for existing functions
  Context needed: Understanding the test framework (Jest) and the
  User model API

  Issue #405: "Implement WebSocket support for real-time updates"
  Current labels: feature
  Complexity: New feature requiring architecture decisions, changes
  to 12+ files, new dependency evaluation
  Context needed: Understanding the event system, authentication,
  and deployment infrastructure

  Task: Evaluate each issue for contributor-friendliness. For each,
  write: whether to label it "good-first-issue", "help-wanted", or
  neither (with justification), the effort estimate (small/medium/
  large), what context a contributor would need, and the issue
  description improvements needed to make it contributor-ready
  (clear acceptance criteria, links to relevant files, setup
  instructions).

assertions:
  - type: llm_judge
    criteria: "Labeling decisions match complexity — simple, self-contained issues get good-first-issue, medium issues with clear scope get help-wanted, complex architecture issues get neither; justifications reference specific complexity factors"
    weight: 0.35
    description: "Complexity-matched labeling"
  - type: llm_judge
    criteria: "Effort estimates are realistic — small/medium/large ratings align with the described complexity, and context requirements are accurately assessed for each issue"
    weight: 0.35
    description: "Realistic effort estimates"
  - type: llm_judge
    criteria: "Description improvements make issues contributor-ready — suggestions include clear acceptance criteria, links to relevant code files, mention of required setup, and pointers to contributing guidelines"
    weight: 0.30
    description: "Contributor-ready improvements"
