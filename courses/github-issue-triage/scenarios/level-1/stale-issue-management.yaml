meta:
  id: stale-issue-management
  level: 1
  course: github-issue-triage
  type: output
  description: "Manage stale issues — review and close inactive issues while maintaining community trust"
  tags: [github, issue-triage, stale-issues, housekeeping, closing, basics]

state: {}

trigger: |
  You're doing quarterly issue housekeeping for a project with 340
  open issues. 120 of those haven't had any activity in over 90 days.
  The project uses the "stale" bot that automatically labels issues
  as "stale" after 60 days of inactivity and closes them after 7 more
  days unless someone comments.

  The stale bot just labeled 25 issues. Before they auto-close, you
  need to review them. Here are 5 representative issues:

  Issue #89 (opened 8 months ago, last activity 4 months ago):
  "Add TypeScript type definitions" — Feature request with 14 thumbs
  up. Originally declined because the project was JavaScript-only.
  Since then, the team decided to migrate to TypeScript (announced
  last month).

  Issue #112 (opened 6 months ago, last activity 3 months ago):
  "Memory leak when processing large files" — Bug with reproduction
  steps but no fix attempted. The reporter hasn't responded to a
  question about their Node version.

  Issue #134 (opened 5 months ago, last activity 5 months ago):
  "Support for Windows ARM64" — Feature request from a single user.
  No other users have requested this. Low effort to implement.

  Issue #156 (opened 4 months ago, last activity 3 months ago):
  "Documentation: Add examples for custom plugins" — Documentation
  gap that multiple users have hit. Has a comment from a contributor
  saying "I can work on this" but no PR was ever opened.

  Issue #167 (opened 3 months ago, last activity 3 months ago):
  "v2.0 compatibility issue with Express 5" — Bug affecting users
  upgrading to Express 5. Express 5 adoption is growing.

  Task: Review all 5 issues. For each, write: the decision (keep
  open, close, or close with specific action), the justification
  (why this issue should or shouldn't be closed), the comment to
  post (explaining the decision), and any label changes. Also write
  a brief stale issue policy that explains the project's approach
  to inactive issues.

assertions:
  - type: llm_judge
    criteria: "Decisions are contextually appropriate — issues with ongoing relevance (TypeScript migration, Express 5 compat, docs gap) are kept open; issues that are truly stale or low-impact are handled differently; community signals (thumbs up) are considered"
    weight: 0.35
    description: "Contextually appropriate decisions"
  - type: llm_judge
    criteria: "Comments explain decisions respectfully — closing comments explain why without dismissing the reporter's effort, kept-open comments re-engage the conversation, and all comments invite future participation"
    weight: 0.35
    description: "Respectfully explained decisions"
  - type: llm_judge
    criteria: "Stale issue policy is balanced — prevents issue backlog growth, respects community contributions, includes exceptions for high-impact issues, and explains the bot's behavior to contributors"
    weight: 0.30
    description: "Balanced stale issue policy"
