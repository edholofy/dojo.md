meta:
  id: label-taxonomy-setup
  level: 1
  course: github-issue-triage
  type: output
  description: "Design a label taxonomy — create an organized labeling system for a GitHub repository"
  tags: [github, issue-triage, labels, taxonomy, organization, basics]

state: {}

trigger: |
  You're setting up a new open source project — a React component
  library with 40+ components. The repository currently has GitHub's
  default labels (bug, documentation, duplicate, enhancement,
  good first issue, help wanted, invalid, question, wontfix). These
  defaults are too generic for your project's needs.

  Project context:
  - 40+ React components across 6 categories (forms, layout, data
    display, navigation, feedback, utilities)
  - 3 maintainers, 15 regular contributors
  - Semver versioning, monthly releases
  - Supports React 18 and 19
  - Issues come from: bug reports, feature requests, documentation
    gaps, styling issues, accessibility problems, TypeScript type
    errors, and performance complaints

  Requirements:
  - Labels should be visually organized (color-coded by category)
  - Easy for contributors to understand without documentation
  - Supports filtering for different workflows (release planning,
    contributor onboarding, triage meetings)
  - Scalable as the project grows

  Task: Design the label taxonomy. Write: the label categories (type,
  priority, component area, status, effort, and any others needed),
  the specific labels within each category (name, color hex code, and
  description), the naming convention (prefix:name format like
  "type:bug" vs flat names like "bug"), and the usage guidelines
  (which labels are required vs optional, who can apply them, and
  when labels should be updated).

assertions:
  - type: llm_judge
    criteria: "Taxonomy is organized and complete — categories cover types, priorities, areas, status, and effort; labels within each category are comprehensive without being excessive; naming convention is consistent"
    weight: 0.35
    description: "Organized complete taxonomy"
  - type: llm_judge
    criteria: "Labels are practical for workflows — supports release planning (priority + milestone filtering), contributor onboarding (good-first-issue + effort), and triage (type + status); color coding aids visual scanning"
    weight: 0.35
    description: "Workflow-practical labels"
  - type: llm_judge
    criteria: "Usage guidelines are clear — required vs optional labels are defined, who applies labels is specified, lifecycle of labels (when to add/remove/update) is documented"
    weight: 0.30
    description: "Clear usage guidelines"
