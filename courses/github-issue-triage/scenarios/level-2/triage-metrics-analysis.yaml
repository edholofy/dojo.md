meta:
  id: triage-metrics-analysis
  level: 2
  course: github-issue-triage
  type: output
  description: "Analyze triage metrics — measure and improve triage performance using issue data"
  tags: [github, issue-triage, metrics, analytics, time-to-response, intermediate]

state: {}

trigger: |
  You're the engineering manager reviewing your team's triage metrics
  for the past quarter. The data comes from the GitHub Issue Metrics
  Action that runs weekly.

  Quarterly metrics:
  - Total issues opened: 312
  - Total issues closed: 278
  - Open issue backlog: 186 (was 152 at quarter start)
  - Average time to first response: 3.2 days
  - Median time to first response: 1.8 days
  - Average time to close: 18.4 days
  - Median time to close: 9.2 days
  - Issues with no response after 7 days: 34 (11%)
  - Issues closed without resolution (wontfix/stale): 45 (16%)

  Breakdown by label:
  | Label    | Count | Avg Response | Avg Close | Win Rate |
  |----------|-------|-------------|-----------|----------|
  | bug      | 142   | 2.1 days    | 14.2 days | 82%      |
  | feature  | 89    | 5.8 days    | 28.3 days | 34%      |
  | question | 48    | 1.4 days    | 3.1 days  | 95%      |
  | docs     | 33    | 4.2 days    | 11.8 days | 73%      |

  Breakdown by triager:
  | Person  | Issues Triaged | Avg Response | Quality Score |
  |---------|---------------|-------------|---------------|
  | Alice   | 98            | 1.2 days    | 4.5/5         |
  | Bob     | 72            | 2.8 days    | 3.8/5         |
  | Carol   | 56            | 4.1 days    | 4.2/5         |
  | David   | 86            | 3.9 days    | 3.1/5         |

  Team target SLAs:
  - First response: <24 hours (currently met 62% of the time)
  - Bug fix: <7 days for P0-P1 (currently met 71% of the time)
  - Feature response: <3 days (currently met 45% of the time)

  Task: Analyze the metrics and create an improvement plan. Write:
  the performance analysis (what's working well, what's concerning,
  key trends), the SLA gap analysis (where are we failing and why),
  the per-triager coaching recommendations (strengths and improvement
  areas for each person), and the improvement plan (3 specific
  initiatives to improve metrics next quarter with measurable targets).

assertions:
  - type: llm_judge
    criteria: "Performance analysis identifies key patterns — growing backlog is flagged, response time gap between mean and median suggests outliers, feature request response lag is identified, and wontfix rate is analyzed"
    weight: 0.35
    description: "Pattern-identifying performance analysis"
  - type: llm_judge
    criteria: "SLA gap analysis is specific — identifies which issue types miss SLAs, quantifies the gap, and connects root causes to the data (e.g., feature requests have 5.8-day average vs 3-day target)"
    weight: 0.35
    description: "Specific SLA gap analysis"
  - type: llm_judge
    criteria: "Improvement plan is actionable — 3 initiatives are specific and measurable, triager coaching is constructive and uses data, and targets for next quarter are ambitious but realistic"
    weight: 0.30
    description: "Actionable improvement plan"
