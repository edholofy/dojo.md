meta:
  id: feature-request-evaluation
  level: 2
  course: github-issue-triage
  type: output
  description: "Evaluate feature requests — assess, prioritize, and respond to feature requests using a structured framework"
  tags: [github, issue-triage, feature-request, evaluation, prioritization, intermediate]

state: {}

trigger: |
  You're the product-minded maintainer of an open source file upload
  library. You received 5 feature requests this month. Your project
  has limited maintainer bandwidth (2 active maintainers, ~20 hours/
  week combined) and you need to decide which requests to accept,
  defer, or decline.

  Request #701: "Add support for drag-and-drop file upload"
  Votes: 34 thumbs up, 2 thumbs down
  Complexity: Medium (2-3 days of work)
  Alignment: Core use case — direct extension of file upload

  Request #702: "Integrate with cloud storage (S3, GCS, Azure Blob)"
  Votes: 22 thumbs up
  Complexity: High (1-2 weeks, plus ongoing maintenance for 3 providers)
  Alignment: Adjacent — useful but expands scope significantly

  Request #703: "Add image preview before upload"
  Votes: 18 thumbs up
  Complexity: Low (1 day of work)
  Alignment: Nice UX enhancement, focused scope

  Request #704: "Support video transcoding during upload"
  Votes: 5 thumbs up
  Complexity: Very high (requires ffmpeg dependency, weeks of work)
  Alignment: Out of scope — this is a video processing feature, not
  file upload

  Request #705: "Add TypeScript type definitions"
  Votes: 45 thumbs up
  Complexity: Medium (3-4 days to add types to existing code)
  Alignment: Developer experience improvement, highly requested

  Evaluation framework:
  - User demand (votes, unique requesters, paying users)
  - Strategic alignment (fits project vision and scope)
  - Maintenance burden (ongoing cost after implementation)
  - Implementation effort (time to build)
  - Opportunity cost (what else could be done instead)

  Task: Evaluate all 5 requests. For each, write: the evaluation
  score (1-5 for each framework dimension), the decision (accept,
  defer, decline, or accept as community contribution), the
  justification connecting the scores to the decision, and the
  response comment to post. Also write a prioritized roadmap for
  accepted items.

assertions:
  - type: llm_judge
    criteria: "Evaluation applies the framework consistently — each request is scored on all 5 dimensions, scores are justified with specific evidence, and the framework drives the decision rather than gut feeling"
    weight: 0.35
    description: "Consistently applied evaluation"
  - type: llm_judge
    criteria: "Decisions balance ambition with sustainability — accepts high-value aligned requests, declines out-of-scope items, defers high-effort items appropriately, and the roadmap is achievable with 20 hrs/week bandwidth"
    weight: 0.35
    description: "Sustainability-balanced decisions"
  - type: llm_judge
    criteria: "Response comments maintain community goodwill — accepted requests set expectations on timeline, declined requests explain why and suggest alternatives, and all responses thank the requester"
    weight: 0.30
    description: "Goodwill-maintaining responses"
