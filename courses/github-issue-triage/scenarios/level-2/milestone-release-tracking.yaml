meta:
  id: milestone-release-tracking
  level: 2
  course: github-issue-triage
  type: output
  description: "Track releases with milestones — use GitHub milestones to plan releases, track progress, and generate release notes"
  tags: [github, issue-triage, milestones, releases, release-notes, intermediate]

state: {}

trigger: |
  You're the release manager for a CLI tool preparing for v3.0.0 —
  a major release with breaking changes. The release is planned for
  6 weeks from now. Currently there's no structure for tracking what
  goes into the release.

  Planned for v3.0.0:
  - 3 breaking changes (API removals, config format change, minimum
    Node.js version bump from 16 to 18)
  - 5 new features (already partially developed)
  - 12 bug fixes (mix of confirmed and in-progress)
  - 2 documentation overhauls (migration guide, new API reference)
  - 1 performance improvement

  Current state:
  - 23 issues and PRs loosely tagged with "v3" label
  - No milestone exists yet
  - No clear view of what's done vs. remaining
  - No release notes drafted
  - The team isn't sure what the "must-have" vs "nice-to-have" items
    are for the release

  Post-v3.0.0 plans:
  - v3.0.1 patch release within 1 week of launch (expected bug fixes)
  - v3.1.0 minor release 4 weeks after launch (deferred features)

  Task: Set up the release tracking system. Write: the milestone
  structure (v3.0.0, v3.0.1, v3.1.0 milestones with descriptions and
  due dates), the issue organization (how to categorize the 23 items
  into must-have/nice-to-have and assign to the correct milestone),
  the progress tracking workflow (how to monitor release readiness in
  weekly checkpoints), and the release notes template (generated from
  milestone issues, organized by breaking changes, features, fixes,
  docs).

assertions:
  - type: llm_judge
    criteria: "Milestone structure supports the release plan — v3.0.0 has a due date and clear scope, v3.0.1 exists for post-launch patches, v3.1.0 captures deferred features, and descriptions explain the purpose of each"
    weight: 0.35
    description: "Release-supporting milestone structure"
  - type: llm_judge
    criteria: "Issue organization prioritizes effectively — must-have items are identified for v3.0.0, nice-to-have items have fallback milestones, and the criteria for must-have vs nice-to-have are explained"
    weight: 0.35
    description: "Effectively prioritized organization"
  - type: llm_judge
    criteria: "Release notes template is comprehensive — organized by breaking changes, features, fixes, and docs; includes migration guide references for breaking changes; and can be generated from milestone data"
    weight: 0.30
    description: "Comprehensive release notes template"
