meta:
  id: projects-board-setup
  level: 2
  course: github-issue-triage
  type: output
  description: "Set up GitHub Projects for triage — design a project board with custom fields, views, and workflows for issue management"
  tags: [github, issue-triage, Projects, board, custom-fields, views, intermediate]

state: {}

trigger: |
  You're setting up GitHub Projects (v2) to manage triage for a team
  of 6 engineers working on a SaaS application. Currently, triage
  is tracked in a spreadsheet that's always out of date.

  Team workflow:
  1. New issues arrive → triaged weekly on Monday
  2. Triaged issues → prioritized and assigned in sprint planning
  3. Assigned issues → worked on during 2-week sprints
  4. Completed issues → verified and closed

  Information to track per issue:
  - Status: Backlog, Triage, Ready, In Progress, In Review, Done
  - Priority: P0-P3
  - Sprint: Current, Next, Future
  - Team: Frontend, Backend, DevOps, Design
  - Effort: XS, S, M, L, XL (t-shirt sizing)
  - Due date (for deadline-driven items)

  Views needed:
  - Triage Board: Kanban board for Monday triage meeting
  - Sprint Board: Current sprint items by status
  - Team View: Issues grouped by team
  - Priority View: All issues sorted by priority
  - My Work: Filtered to current user's assigned issues

  Task: Design the GitHub Projects configuration. Write: the custom
  fields setup (field name, type, options for each), the view
  definitions (layout type, filters, grouping, sorting for each view),
  the built-in automation rules (auto-set status when issue is
  closed/reopened, auto-add from repository), and the workflow for
  Monday triage meetings (how to use the Triage Board view
  efficiently).

assertions:
  - type: llm_judge
    criteria: "Custom fields capture all needed information — status, priority, sprint, team, effort, and due date are properly typed, and the options for each field are complete and well-organized"
    weight: 0.35
    description: "Complete custom fields"
  - type: llm_judge
    criteria: "Views serve distinct workflows — each view has appropriate layout, filters, and grouping; the Triage Board, Sprint Board, and Team View serve different meeting and planning contexts"
    weight: 0.35
    description: "Workflow-serving views"
  - type: llm_judge
    criteria: "Automation reduces manual work — auto-status on close/reopen, auto-add from repo, and triage workflow instructions make the system low-maintenance and easy to keep current"
    weight: 0.30
    description: "Manual-work-reducing automation"
