meta:
  id: triage-platform-architecture
  level: 4
  course: github-issue-triage
  type: output
  description: "Architect a triage platform — design the technical infrastructure for an automated, intelligent issue management platform"
  tags: [github, issue-triage, platform, architecture, infrastructure, automation, expert]

state: {}

trigger: |
  You're the Staff Engineer leading the development of an internal
  "Issue Intelligence Platform" that will serve your 500-engineer
  organization. The platform must integrate with GitHub's API,
  provide intelligent automation, and give leadership visibility
  into issue health.

  Platform requirements:

  1. Real-time ingestion:
  - Process webhooks from 120 repositories
  - Handle 2,000+ issue events/week (creates, updates, comments,
    labels, assignments, closures)
  - Support GitHub Enterprise Server (on-prem) and GitHub.com

  2. Intelligent classification:
  - Auto-classify issue type, priority, and affected component
  - Detect duplicates across repositories
  - Identify customer sentiment and urgency
  - Route to the correct team with >95% accuracy

  3. Workflow automation:
  - Auto-label and auto-assign based on classification
  - SLA tracking with alerts before deadline breaches
  - Escalation triggers for unresponsive issues
  - Stale issue management with configurable policies per repo

  4. Analytics and reporting:
  - Real-time dashboard for triage operations
  - Team-level performance scorecards
  - Trend analysis and forecasting
  - Executive summary generation

  5. Integration layer:
  - Bi-directional sync with Jira (for teams using both)
  - Slack notifications for assignments and SLA warnings
  - PagerDuty integration for P0 issues
  - CRM integration for customer tier identification

  Technical constraints:
  - Must handle 10x growth (12,000 repos in 3 years)
  - 99.9% uptime for webhook processing
  - <5-second latency for classification
  - Must pass SOC 2 audit

  Task: Design the platform architecture. Write: the system
  architecture (components, data flows, technology choices), the
  ML pipeline (training data, model architecture, serving
  infrastructure, feedback loops), the integration architecture
  (how each external system connects, data synchronization strategy),
  the scalability design (how to handle 10x growth), and the
  reliability engineering (monitoring, alerting, disaster recovery).

assertions:
  - type: llm_judge
    criteria: "System architecture is production-grade — components are well-separated, data flows handle real-time and batch, technology choices are justified, and the design supports the 120-repo scale"
    weight: 0.35
    description: "Production-grade system architecture"
  - type: llm_judge
    criteria: "ML pipeline enables intelligent automation — training data is sourced from historical issues, model serves within latency requirements, feedback loops improve accuracy, and the >95% routing accuracy target is addressed"
    weight: 0.35
    description: "Intelligence-enabling ML pipeline"
  - type: llm_judge
    criteria: "Scalability and reliability meet enterprise needs — 10x growth is planned for, 99.9% uptime has supporting architecture, SOC 2 requirements are addressed, and disaster recovery is designed"
    weight: 0.30
    description: "Enterprise-meeting scalability"
