meta:
  id: triage-economics-roi
  level: 4
  course: github-issue-triage
  type: output
  description: "Analyze triage economics — quantify the ROI of issue triage, justify investment, and present to leadership"
  tags: [github, issue-triage, economics, ROI, cost-analysis, leadership, expert]

state: {}

trigger: |
  You're the Director of Engineering Operations presenting a business
  case to the CFO for a $500K investment in triage infrastructure
  and process improvement. The CFO wants hard numbers.

  Current triage costs (annual):
  - Engineer time on triage: 40 engineers × 4 hours/week × 48 weeks
    × $95/hour (fully loaded) = $729,600
  - Triage-related context switching: Estimated 15% productivity loss
    for triaging engineers = $1.8M across the org
  - Delayed bug fixes (slow triage → slow fix): Average 12-day delay,
    3 customer escalations/month costing $45K/each = $1.62M
  - Lost customers due to unresponsive issues: 8 enterprise customers
    cited "support responsiveness" in churn exit surveys = $960K ARR
  - OSS community friction: 3 key contributors left for competitor's
    project citing "issues being ignored" = unquantified impact

  Current triage state:
  - 2,000+ issues/week across 120 repositories
  - 40 engineers rotate through triage (each 4 hours/week)
  - Average time to first response: 3.2 days
  - 34% of issues get no response within 7 days
  - No standardized process, automation, or tooling

  Proposed investment ($500K over 2 years):
  - Year 1: $300K — Triage platform development (2 engineers × 6
    months), AI classification model, GitHub Projects setup, process
    standardization
  - Year 2: $200K — Platform maintenance (1 engineer), model
    retraining, expanded automation

  Expected outcomes:
  - Reduce triage time from 4 hours/week to 1 hour/week per engineer
  - Reduce first response time from 3.2 days to 4 hours
  - Reduce customer escalations by 60%
  - Improve OSS contributor retention by 40%

  Task: Build the business case. Write: the total cost of current
  triage (direct and indirect costs, quantified where possible), the
  ROI analysis for the $500K investment (payback period, 3-year NPV,
  sensitivity analysis), the risk-adjusted projection (what if
  outcomes are 50% of expected?), the non-financial benefits
  (community health, employer brand, developer satisfaction), and
  the CFO presentation summary (executive one-pager with the ask).

assertions:
  - type: llm_judge
    criteria: "Cost analysis is comprehensive — direct costs (engineer time), indirect costs (context switching, delayed fixes), revenue impact (customer churn), and community costs are all quantified or acknowledged"
    weight: 0.35
    description: "Comprehensive cost analysis"
  - type: llm_judge
    criteria: "ROI analysis is CFO-ready — payback period is calculated, 3-year NPV uses realistic discount rates, sensitivity analysis tests key assumptions, and the analysis is conservative enough to be credible"
    weight: 0.35
    description: "CFO-ready ROI analysis"
  - type: llm_judge
    criteria: "Presentation summary is compelling — one-page format, clear ask, key numbers highlighted, risk-adjusted projection provides confidence, and non-financial benefits add qualitative support"
    weight: 0.30
    description: "Compelling presentation summary"
