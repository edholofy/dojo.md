meta:
  id: triage-team-building
  level: 4
  course: github-issue-triage
  type: output
  description: "Build a dedicated triage team — design the hiring, training, and operating model for a specialized triage function"
  tags: [github, issue-triage, team-building, hiring, training, operating-model, expert]

state: {}

trigger: |
  You're the Senior Director of Engineering. The board approved
  funding for a dedicated triage team after the $2.3M security
  incident. You have budget for 6 FTEs and need to design the team
  from scratch.

  Context:
  - 500 engineers across 40 teams
  - 120 repositories, 2,000+ issues/week
  - Current state: Engineers rotate through triage grudgingly
  - Target: Dedicated team handles all initial triage, engineers only
    get pre-triaged, prioritized, verified issues

  Team design requirements:
  - Handle initial triage for all 2,000+ issues/week
  - Verify and reproduce bugs before assigning to engineering
  - Meet 4-hour response SLA for all customer-facing issues
  - Meet 1-hour response SLA for security issues
  - Provide 12-hour coverage (US business hours + partial APAC)
  - Manage relationship with OSS community (public repos)
  - Generate triage analytics and reporting

  Budget: 6 FTEs (mix of levels), $120K average fully loaded cost,
  $50K for tooling, training, and onboarding

  Questions to answer:
  - What roles and levels? (All same level vs. tiered?)
  - Where to hire? (Internal transfer vs. external?)
  - How to make triage a career? (Not a dead-end role)
  - How to maintain product knowledge across 120 repos?
  - On-call model for off-hours coverage?

  Task: Design the complete team. Write: the team structure (roles,
  levels, reporting line, on-call model), the hiring plan (job
  descriptions, interview process, internal vs external hiring
  for each role), the onboarding and training program (0-90 day
  plan for new triage team members, ongoing training for product
  knowledge), the career path (how triage experience leads to
  growth — SRE, product management, engineering management), and
  the operating model (daily workflow, team rituals, interaction
  with engineering teams, metrics and goals).

assertions:
  - type: llm_judge
    criteria: "Team structure matches the workload — 6 FTEs can handle 2,000+ issues/week with the coverage model, roles are differentiated appropriately, and the on-call model provides 12-hour coverage"
    weight: 0.35
    description: "Workload-matched team structure"
  - type: llm_judge
    criteria: "Career path makes triage attractive — the role isn't positioned as a dead end, growth paths are specific and achievable, and the team has progression from junior to senior"
    weight: 0.35
    description: "Attraction-creating career path"
  - type: llm_judge
    criteria: "Operating model enables quality triage — daily workflow is efficient, product knowledge maintenance is structured, interaction with engineering is collaborative, and metrics drive improvement"
    weight: 0.30
    description: "Quality-enabling operating model"
