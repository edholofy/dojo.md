meta:
  id: triage-executive-communication
  level: 4
  course: github-issue-triage
  type: output
  description: "Communicate triage health to executives — translate issue metrics into business impact and strategic recommendations"
  tags: [github, issue-triage, executive, communication, reporting, strategy, expert]

state: {}

trigger: |
  You're the VP of Engineering preparing three executive
  communications about issue triage:

  Communication 1 — Quarterly board presentation:
  The board wants to understand developer experience and community
  health. You need to present triage metrics that board members
  (non-technical, investor background) can understand. Key data:
  - Open issues: 1,847 (up 23% from last quarter)
  - First response time: 2.1 days (target: 4 hours, industry: 1 day)
  - OSS contributor churn: 15% (up from 8% last year)
  - Customer-reported issues: 340/month (up 45% with customer growth)
  - Engineering time on triage: 7,680 hours/quarter ($672K cost)

  Communication 2 — CEO weekly update:
  A viral Twitter thread by a developer criticized your project's
  issue management. It has 2,000 retweets. The developer showed
  screenshots of issues with no response for 60+ days and a
  maintainer closing valid issues with "wontfix" and no explanation.
  The CEO wants a response plan by end of day.

  Communication 3 — Engineering all-hands:
  You're rolling out the new triage process and dedicated triage team.
  Many engineers are skeptical ("another process that'll add overhead")
  and some are offended ("you're saying we triaged badly?"). You need
  to present the change positively while acknowledging past issues.

  Task: Create all three communications. Write: the board presentation
  (3-5 slides that translate triage metrics into business impact,
  with trends and improvement plan), the CEO response plan (immediate
  actions for the Twitter situation, public response strategy, and
  systemic fixes that address the valid criticisms), and the all-hands
  presentation (the case for change, what's changing and why, how it
  benefits engineers, and the rollout timeline with feedback channels).

assertions:
  - type: llm_judge
    criteria: "Board presentation translates metrics to business — triage health is connected to customer retention, developer community strength, and engineering efficiency; non-technical board members can understand the impact"
    weight: 0.35
    description: "Business-translating board presentation"
  - type: llm_judge
    criteria: "CEO response plan addresses both immediate and systemic issues — Twitter criticism is acknowledged (not dismissed), public response is authentic, and the plan fixes the underlying problems the developer highlighted"
    weight: 0.35
    description: "Dual-addressing CEO response"
  - type: llm_judge
    criteria: "All-hands builds buy-in — the change is framed as benefiting engineers (less triage burden), past issues are acknowledged without blame, skepticism is addressed, and the rollout invites participation"
    weight: 0.30
    description: "Buy-in-building all-hands"
