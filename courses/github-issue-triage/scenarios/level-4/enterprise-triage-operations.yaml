meta:
  id: enterprise-triage-operations
  level: 4
  course: github-issue-triage
  type: output
  description: "Design enterprise triage operations — build the organizational framework for issue management at scale across a 500-person engineering org"
  tags: [github, issue-triage, enterprise, operations, org-design, scale, expert]

state: {}

trigger: |
  You're the VP of Engineering Operations at a tech company with 500
  engineers, 120 repositories, and 2,000+ issues/week. The CEO
  mandated that every customer-facing issue must receive a response
  within 4 hours. Current average response time is 3.2 days.

  Organization structure:
  - 40 engineering teams across 5 divisions
  - 120 GitHub repositories (mix of public OSS and private)
  - 3 GitHub organizations (main product, internal tools, open source)
  - 12 product managers across 3 business units
  - 25-person support team handling 800 tickets/week
  - 5 QA engineers doing bug verification

  Current state:
  - No unified triage process (each team does their own thing)
  - 15 different label schemes across repos
  - No cross-team issue visibility
  - Enterprise customer issues take 5 days average response
  - OSS projects have 40% of issues with no response after 30 days
  - Triage is seen as "grunt work" — engineers resist rotation

  Budget: $200K/year for tooling and process improvement

  Task: Design the enterprise triage operating model. Write: the
  organizational structure (central triage team vs. distributed
  model, roles and responsibilities at each level), the standardized
  process (unified triage workflow across all 120 repos, standard
  label taxonomy, issue routing rules), the technology platform
  (GitHub Projects at org level, automation suite, monitoring
  dashboard, integration with support tooling), the change management
  plan (how to get 40 teams to adopt the new process without revolt),
  and the metrics and accountability framework (KPIs, team scorecards,
  executive reporting).

assertions:
  - type: llm_judge
    criteria: "Organizational structure scales to 500 engineers — the model balances central coordination with team autonomy, roles are clearly defined, and the structure achieves the 4-hour response mandate"
    weight: 0.35
    description: "500-engineer-scaling structure"
  - type: llm_judge
    criteria: "Standardized process respects team diversity — unified workflow handles different repo types (public/private, product/infra), label taxonomy is consistent without being oppressive, and routing works across 120 repos"
    weight: 0.35
    description: "Diversity-respecting standard process"
  - type: llm_judge
    criteria: "Change management addresses resistance — adoption plan is phased, triage is valued (not grunt work), teams see benefit, and the rollout avoids mandate fatigue"
    weight: 0.30
    description: "Resistance-addressing change management"
