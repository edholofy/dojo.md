meta:
  id: compliance-audit-triage
  level: 4
  course: github-issue-triage
  type: output
  description: "Audit triage compliance — evaluate and improve issue management practices for SOC 2, ISO 27001, and regulatory requirements"
  tags: [github, issue-triage, compliance, SOC2, ISO27001, audit, expert]

state: {}

trigger: |
  You're the Compliance Manager preparing for a SOC 2 Type II audit.
  The auditor will examine your issue management practices as part of
  the "Change Management" and "Incident Response" trust service
  criteria. Previous audit findings flagged weaknesses in how security
  vulnerabilities are tracked and resolved.

  Audit scope for issue management:
  1. CC6.8 (Change Management): All changes to production systems must
     be tracked, reviewed, and approved. GitHub Issues and PRs are the
     primary tracking mechanism.
  2. CC7.2 (Incident Response): Security incidents must be identified,
     reported, tracked, and resolved within defined timeframes.
  3. CC7.3 (Problem Management): Systematic issues must be tracked to
     root cause resolution.

  Current gaps identified in pre-audit:
  - No documented SLA for security vulnerability resolution
  - Security issues are mixed with regular bugs (no separate tracking)
  - 4 security issues from the past year have no resolution recorded
  - No evidence of triage review for 23% of issues
  - Issue labels are applied inconsistently (varies by engineer)
  - No audit trail for label changes or priority reassignments
  - GitHub's audit log only retains 90 days of data

  Auditor's expected evidence:
  - Written policy for issue triage and resolution
  - Evidence of consistent process execution (logs, screenshots)
  - Security vulnerability response times within SLA
  - Complete audit trail for production-impacting changes
  - Regular review meetings with documented decisions

  Task: Build the compliance-ready triage system. Write: the issue
  management policy document (scope, roles, SLAs, escalation
  procedures — suitable for auditor review), the security issue
  handling procedure (separate tracking, SLA enforcement, evidence
  preservation), the audit trail architecture (how to capture and
  retain label changes, priority updates, and resolution records
  beyond GitHub's 90-day limit), the evidence collection automation
  (GitHub Actions that generate compliance reports), and the gap
  remediation plan (how to fix the 4 unresolved security issues and
  the 23% untriaged issues before the audit).

assertions:
  - type: llm_judge
    criteria: "Policy document meets SOC 2 requirements — covers CC6.8, CC7.2, CC7.3 criteria; defines roles, SLAs, and escalation; and is formal enough for auditor review while remaining operationally useful"
    weight: 0.35
    description: "SOC2-meeting policy document"
  - type: llm_judge
    criteria: "Audit trail captures what auditors need — label changes, priority updates, and resolutions are recorded, retention exceeds 90 days, and the architecture handles GitHub's API limitations"
    weight: 0.35
    description: "Auditor-satisfying audit trail"
  - type: llm_judge
    criteria: "Gap remediation is actionable before audit — the 4 unresolved security issues have a fix timeline, the 23% untriaged issues are addressed, and evidence collection automation prevents future gaps"
    weight: 0.30
    description: "Pre-audit gap remediation"
