meta:
  id: expert-triage-shift
  level: 4
  course: github-issue-triage
  type: output
  description: "Expert triage shift — manage a zero-day vulnerability, OSS community crisis, and compliance audit simultaneously"
  tags: [github, issue-triage, shift-simulation, zero-day, community-crisis, audit, expert]

state: {}

trigger: |
  You're the Head of Developer Relations. Three crises converge:

  Crisis 1 — Zero-day in your OSS library:
  A critical RCE (Remote Code Execution) vulnerability was discovered
  in your most popular open source library (10M weekly downloads). A
  security researcher publicly tweeted the PoC exploit 2 hours ago
  (they didn't follow responsible disclosure). Hackers are already
  scanning for vulnerable installations. You need to:
  - Issue a fix
  - Publish a security advisory
  - Notify downstream projects
  - Coordinate with CVE/GHSA
  - Handle the flood of GitHub issues (50 in 2 hours)

  Crisis 2 — Community revolt over governance:
  Your project's governance committee rejected a widely-supported RFC
  (200+ approvals) for a major feature. The committee's reasoning
  was never made public. Three core maintainers resigned in protest,
  taking their triage responsibilities with them. The project's
  triage queue has 180 unprocessed issues from the past 2 weeks.

  Crisis 3 — SOC 2 audit in progress:
  Your SOC 2 auditor is on-site this week examining your issue
  management practices. They just found that your security issue
  response procedure (written 18 months ago) doesn't match your
  actual practice. They're watching how you handle Crisis 1 in
  real-time as evidence of your incident response capability.

  Task: Navigate all three crises. For each, write: the immediate
  actions (next 4 hours), the stakeholder communication, the
  resolution strategy, and the longer-term fix. Then write how the
  three crises interact (how the zero-day response is evidence for
  the audit, how the community revolt affects security response
  capacity, etc.) and the 30-day recovery plan.

assertions:
  - type: llm_judge
    criteria: "Zero-day response is textbook — fix is prioritized, advisory is published quickly, downstream notification happens, CVE is requested, and the issue flood is managed with a tracking issue"
    weight: 0.35
    description: "Textbook zero-day response"
  - type: llm_judge
    criteria: "Community and audit crises are managed alongside the zero-day — governance transparency is addressed, triage capacity gap from resigned maintainers is filled, and the auditor sees competent incident response"
    weight: 0.35
    description: "Parallel-managed community and audit"
  - type: llm_judge
    criteria: "Crisis interactions are recognized — reduced triage capacity from resignations impacts zero-day response, audit evidence is strengthened by handling the zero-day well, and the 30-day plan addresses all three root causes"
    weight: 0.30
    description: "Recognized crisis interactions"
