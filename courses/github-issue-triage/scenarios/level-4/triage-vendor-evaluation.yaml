meta:
  id: triage-vendor-evaluation
  level: 4
  course: github-issue-triage
  type: output
  description: "Evaluate issue management tooling — assess GitHub Projects, Linear, Jira, and custom solutions for organization-wide triage"
  tags: [github, issue-triage, vendor-evaluation, tooling, Linear, Jira, expert]

state: {}

trigger: |
  You're the Director of Developer Experience. The CTO asked you to
  evaluate whether the organization should stay with GitHub Issues +
  Projects or migrate to a dedicated project management tool. Three
  engineering teams have already independently adopted Linear, creating
  a split in the org.

  Current tool landscape:
  - 25 teams use GitHub Issues (some with Projects, some without)
  - 8 teams use Linear (migrated on their own)
  - 5 teams use Jira (legacy from pre-GitHub era)
  - 2 teams use Notion databases
  - No unified reporting across tools

  Evaluation candidates:

  GitHub Issues + Projects (current):
  - Pros: Tight code integration, free, familiar, PR linking, Actions
  - Cons: Limited workflow automation, no time tracking, basic views,
    no cross-org project management
  - Cost: $0 (included in GitHub plan)

  Linear:
  - Pros: Fast UI, cycles/sprints, triage queue, auto-assignment,
    GitHub sync, keyboard-first
  - Cons: Separate from code, sync can lag, limited custom fields,
    no public issue tracker for OSS
  - Cost: $8/user/month × 500 engineers = $48K/year

  Jira:
  - Pros: Highly customizable, enterprise features, compliance tools,
    extensive integration ecosystem
  - Cons: Complex, slow, engineers hate it, expensive, context
    switching from GitHub
  - Cost: $17.50/user/month × 500 = $105K/year

  Custom internal tool:
  - Pros: Exactly what you need, tight GitHub integration
  - Cons: Build and maintenance cost, 6+ months to build, ongoing
    engineering resources
  - Cost: $250K build + $100K/year maintenance

  Evaluation criteria:
  - Developer experience (speed, keyboard shortcuts, integration)
  - GitHub integration quality (bi-directional sync, PR linking)
  - Triage workflow support (auto-labeling, routing, SLA tracking)
  - Reporting and analytics (cross-team visibility, executive dashboards)
  - OSS support (public issues for open source repos)
  - Compliance (audit trail, access controls, data residency)
  - Migration effort (from current mixed state)

  Task: Conduct the evaluation. Write: the weighted scoring matrix
  (criteria with weights, score each option 1-5), the TCO analysis
  (3-year total cost including migration, training, productivity
  impact), the migration risk assessment (what breaks during each
  migration path), the recommendation (with justification and
  dissenting view), and the implementation roadmap (if migrating,
  how to do it without disrupting 500 engineers).

assertions:
  - type: llm_judge
    criteria: "Scoring matrix is rigorous — criteria are weighted based on organizational priorities, scores are justified with specific evidence, and the evaluation is fair to all options"
    weight: 0.35
    description: "Rigorous scoring matrix"
  - type: llm_judge
    criteria: "TCO analysis captures hidden costs — migration effort, training time, productivity dip during transition, ongoing maintenance, and opportunity cost of engineering time are all accounted for"
    weight: 0.35
    description: "Hidden-cost-capturing TCO analysis"
  - type: llm_judge
    criteria: "Recommendation is actionable — choice is justified with data, dissenting views are acknowledged, implementation roadmap is phased, and the plan handles the current multi-tool fragmentation"
    weight: 0.30
    description: "Actionable recommendation"
