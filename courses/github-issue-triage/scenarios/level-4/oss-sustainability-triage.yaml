meta:
  id: oss-sustainability-triage
  level: 4
  course: github-issue-triage
  type: output
  description: "Build sustainable OSS triage — design triage systems that prevent maintainer burnout while keeping the community healthy"
  tags: [github, issue-triage, open-source, sustainability, burnout, community, expert]

state: {}

trigger: |
  You're an open source sustainability consultant hired by a project
  with 50,000 stars and 3 burnt-out maintainers. The lead maintainer
  publicly posted about burnout, triggering a community discussion
  about project sustainability.

  Project statistics:
  - 50,000 GitHub stars
  - 2M weekly npm downloads
  - 80 issues/week (mostly from companies using it in production)
  - 40 PRs/week
  - 3 maintainers (all unpaid volunteers, each spending 15-20 hrs/week)
  - 1,200 open issues (growing by 20/week net)
  - 500+ open PRs (growing by 10/week net)

  Maintainer workload breakdown:
  - Issue triage: 8 hours/week (per person)
  - PR review: 6 hours/week (per person)
  - Code writing: 3 hours/week (per person)
  - Community management: 3 hours/week (per person)

  Sustainability challenges:
  1. Triage is the #1 time sink — most issues are from corporate
     users who could fund the project
  2. High-quality triage requires deep project knowledge (only the
     3 maintainers have it)
  3. Community triagers exist but lack authority to close/reject issues
  4. Corporate users expect enterprise-level support for free
  5. "Just hire maintainers" doesn't work — the project has $2K/month
     in GitHub Sponsors

  Task: Design the sustainable triage model. Write: the community
  triage program (how to train and empower non-maintainer triagers,
  what authority they get, how quality is maintained), the corporate
  engagement strategy (paid triage SLAs, GitHub Sponsors tiers with
  issue priority, consulting partnerships), the automation strategy
  (which triage tasks can be automated to reduce maintainer load from
  8 to 2 hours/week), the boundary-setting framework (issue policies
  that protect maintainer time — support vs. development, scope
  definition, "not a bug" clarity), and the succession planning
  (what happens if a maintainer leaves).

assertions:
  - type: llm_judge
    criteria: "Community triage program is empowering — non-maintainers gain real authority, training is structured, quality is maintained through review, and the program scales beyond the 3 maintainers"
    weight: 0.35
    description: "Empowering community triage"
  - type: llm_judge
    criteria: "Corporate engagement creates sustainability — paid tiers are fair and clearly differentiated, the value proposition for corporations is compelling, and the model generates enough revenue to fund at least 1 part-time maintainer"
    weight: 0.35
    description: "Sustainability-creating corporate engagement"
  - type: llm_judge
    criteria: "Automation and boundaries protect maintainer health — 8→2 hour/week goal is achievable with specific automation, boundaries are clear without being hostile, and succession planning prevents single-point-of-failure"
    weight: 0.30
    description: "Health-protecting automation and boundaries"
