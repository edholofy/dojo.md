meta:
  id: triage-ma-integration
  level: 5
  course: github-issue-triage
  type: output
  description: "Integrate triage systems in M&A — harmonize issue management across acquired companies with different tools, processes, and cultures"
  tags: [github, issue-triage, M&A, integration, harmonization, consolidation, master]

state: {}

trigger: |
  You're the VP of Engineering Integration at a holding company that
  acquired 3 developer tools companies in the past year. Each has
  different issue management practices. The CEO wants a unified
  "customer experience" across all products within 12 months.

  Acquired companies:

  Company A — API monitoring tool (acquired 8 months ago):
  - 150 engineers, GitHub Enterprise Server (on-prem)
  - 45 repos, Jira for issue tracking (2,500 Jira tickets/month)
  - No GitHub Issues (disabled)
  - Mature triage: Dedicated team of 6, 2-hour average response
  - Culture: Enterprise-first, process-heavy, documentation-rich

  Company B — Open source database (acquired 5 months ago):
  - 80 engineers, GitHub.com
  - 12 repos, GitHub Issues exclusively (800 issues/month)
  - OSS community: 35,000 stars, 500 contributors
  - Triage: Community-driven, 3 core maintainers rotate
  - Culture: Community-first, lightweight process, async-heavy

  Company C — Developer IDE plugin (acquired 2 months ago):
  - 30 engineers, GitHub.com
  - 8 repos, Linear for internal, GitHub Issues for external
  - Triage: Ad-hoc, no process, issues pile up
  - Culture: Move-fast, ship-first, fix-later

  Parent company:
  - 200 engineers, GitHub Enterprise Cloud
  - 60 repos, GitHub Issues + Projects
  - Triage: Rotating engineers, 3-day average response
  - Culture: Balanced, process-oriented but flexible

  Integration challenges:
  1. Different tools (Jira, GitHub Issues, Linear)
  2. Different processes (mature vs. ad-hoc)
  3. Different cultures (enterprise vs. community vs. startup)
  4. Company B's OSS community must not be disrupted
  5. Customers expect unified support across products
  6. Teams resist changes imposed by "the parent company"

  Task: Design the integration strategy. Write: the assessment
  framework (how to evaluate each company's triage maturity and
  identify best practices to adopt vs. standardize vs. preserve),
  the tool consolidation plan (which tools to keep, migrate, or
  bridge — with specific justification), the process harmonization
  roadmap (phased approach that respects each company's culture),
  the OSS community preservation plan (how Company B's community
  triage continues to thrive during integration), and the unified
  reporting framework (how to measure triage health across all 4
  entities for the CEO).

assertions:
  - type: llm_judge
    criteria: "Assessment framework identifies what to preserve vs. standardize — Company A's mature process is a source of best practices, Company B's community model must be preserved, Company C needs the most improvement, and specific practices are called out"
    weight: 0.35
    description: "Preserve-vs-standardize assessment"
  - type: llm_judge
    criteria: "Tool consolidation respects different needs — the plan doesn't force all companies onto one tool, bridges are built where needed, and migration is phased to minimize disruption"
    weight: 0.35
    description: "Need-respecting tool consolidation"
  - type: llm_judge
    criteria: "OSS community preservation is a first-class concern — Company B's contributor workflow is protected, community voice is maintained in governance, and the integration doesn't create a perception of corporate takeover"
    weight: 0.30
    description: "First-class OSS preservation"
