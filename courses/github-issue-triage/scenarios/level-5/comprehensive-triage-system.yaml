meta:
  id: comprehensive-triage-system
  level: 5
  course: github-issue-triage
  type: output
  description: "Design a comprehensive triage system — architect the end-to-end issue management platform for a 1,000-engineer organization with both OSS and enterprise products"
  tags: [github, issue-triage, comprehensive, system-design, end-to-end, architecture, master]

state: {}

trigger: |
  You're the CTO designing the issue management system for a 1,000-
  engineer organization with 300 repositories across public OSS
  projects, private enterprise products, and internal tooling. The
  system must handle 5,000+ issues/week while serving developers,
  product managers, support teams, customers, and the open source
  community.

  System requirements:

  1. Multi-channel intake:
  - GitHub Issues (public and private repos)
  - Support portal (customer-submitted bugs and requests)
  - Internal systems (auto-generated issues from monitoring, CI, errors)
  - Slack (developer ad-hoc issue creation)
  - Email (security@, abuse@, legal@)

  2. Intelligent triage:
  - Auto-classification by type, priority, affected system, team
  - Customer tier identification (free vs. paid vs. enterprise)
  - Duplicate and related issue detection across repos
  - Severity auto-assessment based on error logs and monitoring data
  - Routing to the correct team among 50 engineering teams

  3. Workflow management:
  - SLA tracking by customer tier and issue priority
  - Escalation automation
  - Progress tracking and status updates
  - Cross-team coordination for multi-system issues
  - Release-gating for blocking issues

  4. Community management:
  - OSS contributor experience (response time, recognition, onboarding)
  - Community triage program (empowered volunteers)
  - Public roadmap integration (feature requests → roadmap items)
  - Contributor analytics and retention tracking

  5. Analytics and governance:
  - Real-time operational dashboards
  - Executive reporting (board-level metrics)
  - Compliance audit trail (SOC 2, ISO 27001)
  - Cost allocation (triage cost per team, product, customer)
  - Predictive analytics (issue volume forecasting, team capacity)

  Task: Design the complete system. Write: the system architecture
  (all 5 layers with components and data flows), the data model
  (entities: issues, people, teams, customers, repos, SLAs, actions),
  the integration architecture (how all intake channels converge,
  how the system connects to GitHub API, CRM, monitoring, Slack),
  the team operating model (who operates the system, how teams
  interact with it, governance), and the implementation roadmap
  (18-month phased build with quarterly milestones).

assertions:
  - type: llm_judge
    criteria: "System architecture is complete — all 5 requirement areas are covered, components have clear responsibilities, data flows are traceable, and the architecture handles 5,000+ issues/week at scale"
    weight: 0.35
    description: "Complete system architecture"
  - type: llm_judge
    criteria: "Data model supports the complexity — entities and relationships handle multi-channel intake, customer tier SLAs, cross-team issues, and OSS community tracking; the model is extensible"
    weight: 0.35
    description: "Complexity-supporting data model"
  - type: llm_judge
    criteria: "Implementation roadmap is executable — phases deliver incremental value, quarterly milestones are measurable, team operating model is sustainable, and the 18-month timeline is realistic"
    weight: 0.30
    description: "Executable implementation roadmap"
