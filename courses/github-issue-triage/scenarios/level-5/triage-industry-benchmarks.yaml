meta:
  id: triage-industry-benchmarks
  level: 5
  course: github-issue-triage
  type: output
  description: "Develop issue triage industry benchmarks — create the definitive benchmarking methodology for issue management across software organizations"
  tags: [github, issue-triage, benchmarks, industry, methodology, research, master]

state: {}

trigger: |
  You're the Head of Research at a developer tools analytics company.
  You're publishing the annual "State of Issue Management" report
  based on data from 500 software organizations using GitHub.

  Aggregated data:

  By organization size:
  | Size       | Repos | Issues/Week | Avg Response | Close Rate |
  |------------|-------|-------------|-------------|-----------|
  | Startup    | 5     | 30          | 4.2 days    | 68%       |
  | Scaleup    | 25    | 150         | 2.8 days    | 72%       |
  | Mid-market | 80    | 400         | 1.9 days    | 75%       |
  | Enterprise | 200+  | 1,500+      | 1.2 days    | 78%       |

  By industry:
  | Industry   | Issues/Week | Response | Resolution | Satisfaction |
  |------------|-------------|----------|-----------|-------------|
  | FinTech    | 320         | 0.8 days | 8.2 days  | 4.1/5       |
  | HealthTech | 180         | 1.1 days | 12.4 days | 3.8/5       |
  | DevTools   | 450         | 0.5 days | 6.1 days  | 4.4/5       |
  | E-commerce | 280         | 1.4 days | 9.8 days  | 3.6/5       |
  | SaaS       | 350         | 0.9 days | 7.5 days  | 4.0/5       |

  By OSS project maturity:
  | Maturity    | Stars  | Issues/Week | Response | Contributor Retention |
  |-------------|--------|-------------|----------|---------------------|
  | Early       | <1K    | 5           | 8.5 days | 12%                 |
  | Growing     | 1-10K  | 25          | 3.2 days | 28%                 |
  | Established | 10-50K | 80          | 1.4 days | 45%                 |
  | Mega        | 50K+   | 200+        | 0.6 days | 62%                 |

  Automation adoption:
  - 78% use some form of label automation
  - 45% use stale bot / auto-close
  - 23% use AI-powered classification
  - 12% have dedicated triage teams
  - 8% use predictive triage (ML-based)

  Task: Write the report. Include: the benchmarking methodology (how
  organizations are categorized, how metrics are normalized for fair
  comparison, statistical significance), the key findings (3 headline
  insights with supporting data), the maturity model (5-level triage
  maturity framework with assessment criteria), the trend analysis
  (how issue management is evolving — automation adoption, AI impact,
  team structure changes), and the strategic recommendations (tailored
  by organization size and maturity).

assertions:
  - type: llm_judge
    criteria: "Benchmarking methodology is rigorous — categorization is justified, metrics normalization handles size/industry differences, and the methodology acknowledges limitations and biases in the data"
    weight: 0.35
    description: "Rigorous benchmarking methodology"
  - type: llm_judge
    criteria: "Key findings are insightful and supported — insights go beyond obvious correlations, data tells a story, and the findings are actionable for organizations of different sizes"
    weight: 0.35
    description: "Insightful supported findings"
  - type: llm_judge
    criteria: "Maturity model enables self-assessment — 5 levels have clear criteria, organizations can place themselves on the model, and the path from one level to the next is specific"
    weight: 0.30
    description: "Self-assessment-enabling maturity model"
