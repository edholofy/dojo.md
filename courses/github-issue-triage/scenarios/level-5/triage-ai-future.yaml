meta:
  id: triage-ai-future
  level: 5
  course: github-issue-triage
  type: output
  description: "Design the future of AI-powered triage — architect a next-generation autonomous triage system that handles 90%+ of issues without human intervention"
  tags: [github, issue-triage, AI, autonomous, future, architecture, master]

state: {}

trigger: |
  You're the VP of AI/ML at a developer platform company. Your CEO
  saw GitHub's Copilot for Issues announcement and wants your company
  to build "the most intelligent issue triage system in the industry."
  The goal: handle 90% of triage decisions autonomously, with human
  oversight only for the 10% that require judgment calls.

  Current capabilities (your existing system):
  - Auto-labeling: 85% accuracy on type classification
  - Auto-priority: 72% accuracy on priority prediction
  - Duplicate detection: 68% precision, 55% recall
  - Auto-response: Template-based only (no AI generation)
  - Human review: Required for 100% of issues

  Target capabilities (the 90% autonomous vision):
  1. Intelligent classification: Understand not just type/priority but
     context, nuance, and the reporter's actual need
  2. Deep duplicate detection: Semantic similarity, not just keyword
     matching — detecting duplicates even when described differently
  3. Auto-investigation: Reading the codebase to locate the relevant
     code, running tests, and providing a preliminary diagnosis
  4. Contextual response generation: Producing human-quality triage
     responses that ask the right follow-up questions
  5. Decision confidence: Knowing when the AI should act vs. defer to
     a human, with explainable reasoning
  6. Learning from outcomes: Continuously improving from how humans
     correct AI decisions

  Technical constraints:
  - Must work with GitHub's API (no custom UI required initially)
  - Must be explainable (engineers need to understand why the AI made
     a decision)
  - Must handle adversarial inputs (prompt injection in issue titles)
  - Must respect repository-specific conventions
  - Latency: <60 seconds per issue
  - Cost: <$0.50 per issue processed

  Task: Design the next-generation system. Write: the system
  architecture (LLM-powered pipeline with specialized models for
  each capability), the safety and quality framework (how to ensure
  AI decisions are trustworthy, how to detect and prevent errors,
  the human-in-the-loop escalation criteria), the training and
  evaluation methodology (how to train on organization-specific
  data, evaluation metrics for each capability, benchmark creation),
  the ethical considerations (bias in AI triage, fairness between
  OSS community members, transparency about AI involvement), and
  the phased rollout plan (from current 0% autonomy to target 90%
  over 18 months).

assertions:
  - type: llm_judge
    criteria: "Architecture handles the full triage pipeline — classification, dedup, investigation, response, and confidence scoring are all designed with appropriate technology choices (LLMs, embeddings, RAG, etc.)"
    weight: 0.35
    description: "Full-pipeline architecture"
  - type: llm_judge
    criteria: "Safety framework prevents AI harm — explainability, adversarial input handling, human escalation criteria, error detection, and rollback mechanisms are all designed"
    weight: 0.35
    description: "Harm-preventing safety framework"
  - type: llm_judge
    criteria: "Ethical considerations are substantive — bias in triage (AI may favor certain writing styles/languages), fairness between reporters, transparency about AI involvement, and the impact on human triagers' jobs are addressed"
    weight: 0.30
    description: "Substantive ethical considerations"
