meta:
  id: triage-fintech-product
  level: 5
  course: github-issue-triage
  type: output
  description: "Build a triage intelligence product — design, validate, and go-to-market for a SaaS platform that automates GitHub issue triage"
  tags: [github, issue-triage, product, SaaS, startup, go-to-market, master]

state: {}

trigger: |
  You're the co-founder/CPO of a startup building "TriageAI" — an
  intelligent GitHub issue management platform. You've raised a $3M
  seed round based on your thesis: "Issue management is the most
  under-tooled part of the software development lifecycle."

  Market research:
  - 100M+ GitHub repositories worldwide
  - ~40M active developers on GitHub
  - Average engineering time on triage: 4-6 hours/week per triaging
    engineer
  - Total addressable market for developer tools: $40B (growing 25% YoY)
  - Direct competitors: ZenHub (acquired), Linear (different focus),
    GitHub Projects (native, limited)
  - Gap: No AI-native issue triage tool for GitHub

  Product vision:
  - GitHub App that installs in 5 minutes
  - AI-powered auto-classification, routing, and response
  - Cross-repo intelligence (patterns across an org's repos)
  - Community health dashboard
  - Enterprise features (SLAs, compliance, reporting)

  Pricing research:
  - Free: 1 repo, basic auto-labeling, 100 issues/month
  - Team ($29/month): 10 repos, full AI triage, Projects integration
  - Business ($99/month): Unlimited repos, SLAs, analytics, Slack
  - Enterprise (custom): SSO, compliance, on-prem, dedicated support

  Technical approach:
  - GitHub App with OAuth and webhooks
  - LLM-based classification (fine-tuned on customer data)
  - Embedding-based duplicate detection
  - RAG-based code-aware investigation
  - Multi-tenant architecture

  Task: Build the product strategy. Write: the product differentiation
  (why TriageAI wins vs. GitHub Projects + Copilot, vs. Linear, vs.
  manual processes), the MVP feature set (what to build first and
  what to defer, with justification), the technical architecture
  (how to handle 10,000+ repos at scale, LLM cost management, data
  privacy), the go-to-market strategy (GitHub Marketplace, developer
  content marketing, OSS community seeding, enterprise sales), and
  the success metrics (what KPIs at 6 months, 12 months, 18 months
  prove product-market fit).

assertions:
  - type: llm_judge
    criteria: "Product differentiation is defensible — competitive advantages are specific and hard to replicate, the positioning against GitHub's native tools is realistic, and the value proposition is compelling"
    weight: 0.35
    description: "Defensible product differentiation"
  - type: llm_judge
    criteria: "Technical architecture handles scale and privacy — multi-tenant design serves 10K+ repos, LLM costs are managed within viable unit economics, and data privacy (customer code access) is addressed"
    weight: 0.35
    description: "Scale-handling technical architecture"
  - type: llm_judge
    criteria: "GTM strategy drives efficient adoption — GitHub Marketplace leverages distribution, content marketing targets the right audience, OSS seeding builds credibility, and success metrics indicate product-market fit"
    weight: 0.30
    description: "Adoption-driving GTM strategy"
