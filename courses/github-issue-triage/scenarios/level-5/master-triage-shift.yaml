meta:
  id: master-triage-shift
  level: 5
  course: github-issue-triage
  type: output
  description: "Master triage shift — navigate an OSS supply chain attack, community trust crisis, regulatory investigation, and IPO-readiness audit simultaneously"
  tags: [github, issue-triage, shift-simulation, supply-chain, trust-crisis, IPO, master]

state: {}

trigger: |
  You're the CTO of a developer platform company (1,000 engineers,
  $200M ARR, IPO in 6 months). Five crises converge on the same day:

  Crisis 1 — Supply chain attack via issue:
  An attacker used a GitHub issue comment to distribute a malicious
  package link. The issue (#9876) in your popular OSS repo contains a
  link to a typosquatted package that 400+ developers installed in the
  past 48 hours. The malicious package exfiltrates environment variables
  (including API keys). Your issue tracker was used as the attack vector.

  Crisis 2 — Community trust collapse:
  An ex-employee published a blog post alleging that your company
  secretly deprioritized OSS community issues to focus on enterprise
  features. They included internal Slack screenshots showing a manager
  saying "community issues are not worth our time." The post has 5,000
  HN upvotes and is trending on Twitter. Your top 5 community
  contributors are publicly considering leaving.

  Crisis 3 — GDPR enforcement action:
  A European data protection authority notified you that a complaint
  was filed by a user who found their full name, email, and company
  in a public GitHub issue that was supposed to be anonymized. The
  issue was filed by your support team who copy-pasted from a Zendesk
  ticket without redacting PII. You have 72 hours to respond.

  Crisis 4 — IPO underwriter concern:
  Your IPO underwriters flagged that your "open issue backlog" (3,200
  issues) represents an "undisclosed liability" in their risk
  assessment. They want documentation proving these are managed,
  tracked, and don't represent systemic product quality issues. They
  need this in 5 business days or the IPO timeline slips.

  Crisis 5 — AI triage system produces biased results:
  A contributor discovered and published that your AI triage system
  responds 2x faster to issues from users with Anglo-Saxon names vs.
  non-Anglo-Saxon names. The bias is real — it's in the training data
  (historical human triage had the same bias, and the AI learned it).

  Task: Navigate all five crises. For each, write: the immediate
  actions (next 4 hours), the stakeholder communication strategy, and
  the resolution plan. Then write: the crisis interaction analysis
  (how crises amplify each other), the unified narrative (one coherent
  story that addresses all concerns), and the 90-day recovery plan
  that turns these crises into catalysts for genuine improvement.

assertions:
  - type: llm_judge
    criteria: "Supply chain attack and GDPR are handled with technical precision — the malicious link is removed and affected developers are notified, GDPR response addresses the specific complaint with remediation, and both responses meet regulatory timelines"
    weight: 0.35
    description: "Technically precise attack and GDPR handling"
  - type: llm_judge
    criteria: "Community trust and AI bias are addressed with authenticity — the blog post allegations are addressed honestly, community contributors receive genuine commitment, AI bias is acknowledged and fixed, and responses don't feel like corporate damage control"
    weight: 0.35
    description: "Authentically addressed trust and bias"
  - type: llm_judge
    criteria: "IPO readiness is maintained — backlog documentation satisfies underwriters, the unified narrative positions crises as catalysts for improvement, and the 90-day plan demonstrates the maturity underwriters need to see"
    weight: 0.30
    description: "Maintained IPO readiness"
