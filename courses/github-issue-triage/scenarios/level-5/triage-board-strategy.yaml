meta:
  id: triage-board-strategy
  level: 5
  course: github-issue-triage
  type: output
  description: "Present triage strategy to the board — develop a board-level developer experience strategy with issue management as a core pillar"
  tags: [github, issue-triage, board, strategy, developer-experience, investment, master]

state: {}

trigger: |
  You're the CTO of a developer tools company ($200M ARR, IPO planned
  in 18 months). The board audit committee flagged two concerns that
  intersect with issue management:

  Concern 1 — Developer community health is a business risk:
  Your company's value is directly tied to the open source community.
  The product is built on 5 open source projects that your company
  maintains. If the community deteriorates, the product deteriorates.
  Board members want a governance and sustainability framework.

  Community metrics:
  - 250,000 combined GitHub stars across 5 projects
  - 2,000 external contributors
  - 500 issues/week across all projects
  - Contributor retention: 35% year-over-year (declining from 45%)
  - Issue response time: 2.1 days (was 0.8 days two years ago)
  - Community NPS: 62 (was 78 two years ago)

  Concern 2 — Customer satisfaction is tied to issue resolution:
  Enterprise customers ($50K+ ARR) report that issue resolution speed
  is the #1 factor in renewal decisions, ahead of features. 8 of the
  15 churned enterprise accounts cited "slow issue response" in exit
  interviews.

  Financial context:
  - $200M ARR with 85% from enterprise
  - Enterprise renewal rate: 88% (target: 95% for IPO)
  - Customer support costs: $8M/year (growing 30% YoY)
  - OSS program costs: $3M/year (5 full-time maintainers)
  - Developer relations: $2M/year (DevRel team of 8)

  IPO timeline: 18 months. The underwriters want to see community
  health metrics improving by the next quarterly review.

  Task: Build the board-level strategy. Write: the developer
  experience investment thesis (why issue management is a strategic
  asset, not a cost center, for an IPO-track company), the community
  health governance framework (metrics, accountability, board
  reporting cadence), the enterprise issue resolution strategy (how
  to achieve 95% renewal by improving issue management), the 18-month
  roadmap with quarterly milestones (what the underwriters will see
  improving), and the budget request (what investment is needed and
  the expected ROI for each initiative).

assertions:
  - type: llm_judge
    criteria: "Investment thesis connects issue management to enterprise value — community health is linked to product value, issue resolution is linked to enterprise retention, and both are quantified in terms the board and underwriters care about"
    weight: 0.35
    description: "Enterprise-value-connected thesis"
  - type: llm_judge
    criteria: "Community governance framework has board-level accountability — metrics are reported quarterly, community health is treated as a KPI alongside financial metrics, and the framework survives the IPO transition"
    weight: 0.35
    description: "Board-accountable governance"
  - type: llm_judge
    criteria: "18-month roadmap shows improving metrics — quarterly milestones demonstrate progress on response time, retention, and NPS; the trajectory supports IPO readiness; and the budget request is justified with ROI"
    weight: 0.30
    description: "IPO-supporting roadmap"
