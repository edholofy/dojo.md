meta:
  id: triage-regulatory-landscape
  level: 5
  course: github-issue-triage
  type: output
  description: "Navigate the regulatory landscape for issue management — address data privacy, accessibility, and compliance requirements in issue tracking systems"
  tags: [github, issue-triage, regulatory, GDPR, accessibility, compliance, master]

state: {}

trigger: |
  You're the Chief Compliance Officer at a global software company
  operating in 30 countries. Your issue management system (GitHub
  Enterprise) handles data that intersects with multiple regulatory
  frameworks. A recent compliance audit revealed gaps.

  Regulatory concerns:

  1. GDPR and data privacy:
  - Customer bug reports contain PII (names, emails, sometimes
    screenshots with personal data)
  - GitHub Issues are stored on GitHub's US servers — EU data transfer
    concerns post-Schrems II
  - Right to deletion: When a customer requests data deletion, their
    issue history must be purged
  - Data retention: Issues older than 7 years must be archived per
    policy, but some contain compliance evidence that must be retained
  - AI triage models are trained on issue data that may contain PII

  2. Accessibility requirements:
  - EU Accessibility Act (2025): Digital services must be accessible
  - Issue templates must be screen-reader compatible
  - Auto-generated responses must meet WCAG 2.2 guidelines
  - Community triage meetings must have accessibility accommodations

  3. Security regulations:
  - DORA (Digital Operational Resilience Act): IT incident tracking
    requirements for financial services clients
  - SEC cybersecurity disclosure rules: Material incidents tracked in
    issues must be disclosed within 4 business days
  - NIS2 Directive: Network and information security incident reporting
  - SOX: Change tracking for financially-impacting systems

  4. Open source compliance:
  - License compliance tracking through issues
  - Export control: Some repos can't accept contributions from
    sanctioned countries
  - SBOM (Software Bill of Materials): Tracking vulnerability issues
    across dependencies

  Task: Design the regulatory compliance strategy for issue management.
  Write: the data privacy framework (GDPR-compliant issue handling,
  PII detection and redaction, data transfer mechanisms, retention
  and deletion procedures), the accessibility compliance plan (template
  accessibility, AI response accessibility, meeting accommodations),
  the security regulation alignment (DORA incident tracking, SEC
  disclosure triggers from issues, NIS2 reporting, SOX change tracking),
  the open source compliance integration (license tracking, export
  control, SBOM-to-issue pipeline), and the compliance monitoring
  system (automated checks, audit readiness, regulatory change tracking).

assertions:
  - type: llm_judge
    criteria: "Data privacy framework is GDPR-complete — PII detection is automated, data transfer mechanisms are legally sound, right to deletion covers issue history, and AI training on PII is addressed"
    weight: 0.35
    description: "GDPR-complete data privacy"
  - type: llm_judge
    criteria: "Multi-regulation alignment is practical — DORA, SEC, NIS2, and SOX requirements are mapped to specific issue management processes, and the system satisfies multiple regulations without redundant controls"
    weight: 0.35
    description: "Practical multi-regulation alignment"
  - type: llm_judge
    criteria: "Compliance monitoring ensures ongoing adherence — automated checks catch violations, audit readiness is maintained continuously, and regulatory change tracking keeps the framework current"
    weight: 0.30
    description: "Ongoing-adherence compliance monitoring"
