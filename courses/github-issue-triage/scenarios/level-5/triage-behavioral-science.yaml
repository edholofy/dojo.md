meta:
  id: triage-behavioral-science
  level: 5
  course: github-issue-triage
  type: output
  description: "Apply behavioral science to triage — use psychological principles to design systems that improve issue quality, reduce maintainer burden, and increase community participation"
  tags: [github, issue-triage, behavioral-science, psychology, nudge, community, master]

state: {}

trigger: |
  You're a behavioral scientist consulting for a large open source
  foundation that oversees 50 major projects. They want to apply
  behavioral insights to improve the issue management experience for
  both reporters and triagers.

  Behavioral research findings from your study of 100,000 issues:

  1. Reporter behavior:
  - 62% of issues are filed within 5 minutes of encountering a
    problem (impulse reporting — often low-quality)
  - Issues filed with more context (screenshots, steps, version) are
    resolved 3x faster
  - Reporters who receive a response within 24 hours are 4x more
    likely to contribute again
  - 78% of reporters never check back after filing
  - Issue templates with >8 required fields have 45% abandonment rate

  2. Triager behavior:
  - Triagers process easy issues first (completion bias), leaving
    complex issues to age
  - Issues with polite language receive responses 2 days faster than
    neutral ones, and 5 days faster than angry ones
  - Triagers spend 40% more time on issues from known contributors
    vs. strangers (familiarity bias)
  - After 3 hours of triage, quality drops 35% (decision fatigue)
  - Triagers who see their metrics (win rate, response time) improve
    15% within a month

  3. Community behavior:
  - Projects where maintainers thank reporters have 2.5x contributor
    retention
  - "Good first issue" labels increase first-time PR rate by 3x
  - Public triage meetings increase community trust by 40%
  - Projects that close issues without explanation lose 20% more
    contributors

  Task: Design the behavioral intervention system. Write: the
  reporter nudge system (how to improve issue quality without adding
  friction — progressive disclosure templates, real-time quality
  feedback, cool-down suggestions for impulse reports), the triager
  support system (how to combat completion bias, familiarity bias,
  and decision fatigue — randomized queue ordering, blinded triage,
  time-boxed sessions), the community engagement framework (how to
  increase participation — recognition, public metrics, gratitude
  systems), and the A/B testing plan (how to measure the impact of
  each behavioral intervention).

assertions:
  - type: llm_judge
    criteria: "Reporter nudges improve quality without friction — progressive disclosure reduces abandonment, quality feedback is real-time and helpful, and cool-down suggestions reduce impulse reports while respecting urgency"
    weight: 0.35
    description: "Quality-improving reporter nudges"
  - type: llm_judge
    criteria: "Triager support addresses real biases — completion bias, familiarity bias, and decision fatigue are countered with specific mechanisms (randomization, blinding, session limits) that are practical to implement"
    weight: 0.35
    description: "Bias-addressing triager support"
  - type: llm_judge
    criteria: "A/B testing plan enables measurement — each intervention has a testable hypothesis, metrics are defined, sample sizes are considered, and the plan avoids confounding variables"
    weight: 0.30
    description: "Measurement-enabling A/B plan"
