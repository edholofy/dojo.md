meta:
  id: triage-consulting-engagement
  level: 5
  course: github-issue-triage
  type: output
  description: "Lead a triage transformation consulting engagement — diagnose a client's issue management dysfunction and design the solution"
  tags: [github, issue-triage, consulting, transformation, engagement, diagnostics, master]

state: {}

trigger: |
  You're a senior DevOps consultant hired by a Series C startup
  ($50M ARR, 200 engineers) that's "drowning in issues." The CTO
  says: "We can't ship features because we're constantly fighting
  fires from issues we didn't triage properly." The engagement is
  8 weeks, $120K budget.

  Week 1 diagnostic findings:
  - 4,200 open issues across 35 repos (2,800 are bugs)
  - Average time to first response: 6.8 days
  - 45% of issues have never received a response
  - No triage process exists — engineers self-assign what interests them
  - No label taxonomy — 15 repos have labels, 20 don't
  - No priority framework — everything is "urgent"
  - Support team files issues via a separate Zendesk system that
    nobody in engineering reads
  - 3 critical bugs sat for 4+ months, each affecting >$100K in ARR
  - Engineers spend Monday mornings "firefighting" the loudest customer
    issues surfaced by the CEO's inbox
  - No one owns triage — it's "everyone's responsibility" (which means
    no one's)
  - GitHub Projects is not used
  - CI/CD pipeline has 12-minute test suite that blocks PR merges

  Organizational culture:
  - Engineering is feature-focused (triage = distraction)
  - Support and engineering don't communicate well
  - CEO micromanages issue priority based on customer calls
  - No engineering manager owns developer experience

  Task: Deliver the consulting engagement. Write: the diagnostic
  report (root causes mapped to business impact, with specific data),
  the transformation roadmap (8-week phased plan with weekly
  milestones), the quick wins (changes in Week 1-2 that show
  immediate improvement), the sustainable system design (process,
  tooling, automation, and roles that outlast the engagement), and
  the client handoff package (runbooks, training materials, KPIs,
  and a 6-month self-assessment checklist).

assertions:
  - type: llm_judge
    criteria: "Diagnostic is brutally honest and data-driven — root causes include cultural issues (feature-focus, CEO micromanagement), process gaps (no ownership, no SLAs), and technical gaps (no tooling); business impact is quantified"
    weight: 0.35
    description: "Data-driven honest diagnostic"
  - type: llm_judge
    criteria: "Transformation roadmap is achievable in 8 weeks — phases build on each other, quick wins create momentum, and the plan accounts for the cultural resistance in an engineering-focused org"
    weight: 0.35
    description: "Achievable transformation roadmap"
  - type: llm_judge
    criteria: "Handoff ensures sustainability — the client can maintain the system without the consultant, training materials enable new team members, and the 6-month self-assessment catches backsliding"
    weight: 0.30
    description: "Sustainability-ensuring handoff"
