meta:
  id: open-source-governance-triage
  level: 3
  course: github-issue-triage
  type: output
  description: "Establish triage governance for open source — define roles, responsibilities, and decision-making for community-driven triage"
  tags: [github, issue-triage, governance, open-source, community, decision-making, advanced]

state: {}

trigger: |
  You're the BDFL (Benevolent Dictator For Life) of a popular open
  source project transitioning to community governance. The project
  has grown to:
  - 15,000 GitHub stars
  - 200+ contributors
  - 50 issues/week
  - 8 active maintainers across 3 time zones
  - 3 SIG (Special Interest Group) areas: Core, Ecosystem, Docs

  Current problems:
  1. You're the bottleneck — every significant triage decision goes
     through you because there's no delegation framework
  2. Maintainers disagree on priorities — without a decision framework,
     the loudest voice wins
  3. Community contributors feel excluded — they can't participate
     in triage or prioritization decisions
  4. SIGs operate independently — no coordination on cross-cutting
     issues
  5. Controversial decisions (closing popular feature requests,
     breaking changes) cause community drama

  Kubernetes-style governance elements to consider:
  - SIG ownership of issue domains
  - Triage rotation among maintainers
  - Community triage meetings (public)
  - RFC process for significant changes
  - Lazy consensus for routine decisions
  - Formal voting for controversial decisions

  Task: Design the triage governance model. Write: the role
  definitions (Triager, Maintainer, SIG Lead, Reviewer — who can do
  what in triage), the decision-making framework (lazy consensus for
  routine issues, RFC for major features, formal vote for breaking
  changes), the community participation model (how non-maintainers
  can contribute to triage — triage party events, issue voting, RFC
  comments), the cross-SIG coordination (how to handle issues that
  span multiple SIGs), and the conflict resolution process (what
  happens when maintainers disagree on a triage decision).

assertions:
  - type: llm_judge
    criteria: "Role definitions create clear authority — each role has specific triage permissions, the path from contributor to triager to maintainer is defined, and the BDFL's role transitions appropriately"
    weight: 0.35
    description: "Clear-authority role definitions"
  - type: llm_judge
    criteria: "Decision-making matches decision significance — routine decisions use lightweight process, significant decisions use RFCs, controversial decisions have formal resolution, and the framework prevents both bottlenecks and chaos"
    weight: 0.35
    description: "Significance-matched decision-making"
  - type: llm_judge
    criteria: "Community participation is genuine — non-maintainers have meaningful input, triage events are accessible, and the governance model builds community trust rather than concentrating power"
    weight: 0.30
    description: "Genuine community participation"
