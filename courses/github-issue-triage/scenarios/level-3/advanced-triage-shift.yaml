meta:
  id: advanced-triage-shift
  level: 3
  course: github-issue-triage
  type: output
  description: "Advanced triage shift — manage a production incident, community governance dispute, and release deadline simultaneously"
  tags: [github, issue-triage, shift-simulation, incident, governance, release, advanced]

state: {}

trigger: |
  You're the Lead Maintainer handling three simultaneous crises:

  Crisis 1 — Community governance dispute:
  A core contributor (150+ PRs merged) publicly accused the triage
  team of bias in an issue comment. They claim their feature request
  (#1234, 89 thumbs up) has been ignored for 6 months while a
  maintainer's personal feature request (#1289, 12 thumbs up) was
  merged in 2 weeks. The comment has 45 reactions and spawned a
  heated thread with 30+ comments. Some community members are
  threatening to fork the project.

  Crisis 2 — Release-blocking discovery:
  The v5.0 release candidate (RC1) was published 3 days ago. A user
  discovered that the database migration in RC1 silently drops a
  column that contains user data. This is not caught by existing
  tests because the test database doesn't have the column populated.
  The issue was filed 2 hours ago. The planned GA release is in
  4 days. 200+ users have already installed RC1.

  Crisis 3 — Triage automation failure:
  Your AI-powered triage bot has been mislabeling issues for the
  past week. It labeled 23 bug reports as "question" (causing them
  to be auto-redirected to Discussions) and 8 feature requests as
  "bug" (causing unnecessary engineering investigation). The bot's
  model drifted after a recent change to issue templates.

  Task: Handle all three crises. For each, write: the immediate
  actions (next 2 hours), the communication strategy (public vs
  private, tone, who speaks), the resolution plan, and the systemic
  fix to prevent recurrence. Then write the shift handoff notes.

assertions:
  - type: llm_judge
    criteria: "Governance dispute is handled with diplomacy — the contributor's concern is acknowledged publicly, bias is investigated honestly, the specific feature request comparison is addressed with data, and the response de-escalates without dismissing valid criticism"
    weight: 0.35
    description: "Diplomatically handled governance dispute"
  - type: llm_judge
    criteria: "Release-blocking issue is handled with appropriate urgency — RC1 data loss risk is communicated to affected users, GA release is delayed, a fix or migration path is provided, and the test gap is identified for closure"
    weight: 0.35
    description: "Urgently handled release blocker"
  - type: llm_judge
    criteria: "Automation failure is contained and corrected — mislabeled issues are identified and fixed, affected reporters are notified, the bot is disabled or rolled back, and the model monitoring prevents future drift"
    weight: 0.30
    description: "Contained corrected automation failure"
