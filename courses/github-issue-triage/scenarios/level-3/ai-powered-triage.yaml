meta:
  id: ai-powered-triage
  level: 3
  course: github-issue-triage
  type: output
  description: "Build AI-powered triage — design an intelligent triage system that automatically classifies, prioritizes, and routes issues"
  tags: [github, issue-triage, AI, automation, classification, NLP, advanced]

state: {}

trigger: |
  You're the Staff Engineer tasked with building an AI-powered triage
  system for your organization's 12 repositories (combined 200+
  issues/week). The current manual triage takes 15 hours/week across
  the organization. The CTO wants to reduce this to under 3 hours.

  Available training data:
  - 18,000 historical issues with labels (3 years of data)
  - 12,000 have resolution data (closed with linked PRs)
  - Labels are moderately consistent (85% correctly labeled by humans)
  - Issue bodies range from 1 sentence to 2,000 words

  Desired AI capabilities:
  1. Auto-classification: Predict issue type (bug, feature, question,
     docs) with >90% accuracy
  2. Auto-priority: Predict priority (P0-P3) based on content, reporter
     history, and affected component
  3. Auto-routing: Suggest the right engineering team based on affected
     code areas
  4. Duplicate detection: Flag potential duplicates with >80% precision
  5. Sentiment analysis: Detect frustrated or urgent reporters
  6. Auto-response: Generate initial triage comments for clear-cut cases

  Technical constraints:
  - Must run as a GitHub Action (triggered on issues.opened)
  - Response time: <30 seconds per issue
  - Must handle rate limits (200+ issues/week)
  - Must have a human-in-the-loop for uncertain classifications
  - Budget: $500/month for AI API costs

  Task: Design the AI triage system. Write: the classification model
  architecture (what ML approach, what features to extract from issue
  text, how to handle multi-label classification), the confidence
  threshold framework (when to auto-apply labels vs. suggest for
  human review), the GitHub Action workflow (event handling, API calls,
  label application, comment generation), the feedback loop (how human
  corrections improve the model over time), and the cost analysis
  ($500/month budget vs. expected usage).

assertions:
  - type: llm_judge
    criteria: "Classification architecture is practical — ML approach fits the data size and budget, features are well-chosen for issue text, multi-label handling is addressed, and >90% accuracy target is realistically assessed"
    weight: 0.35
    description: "Practical classification architecture"
  - type: llm_judge
    criteria: "Confidence thresholds enable safe automation — high-confidence cases are auto-labeled, low-confidence cases go to humans, the threshold is tunable, and false positive handling prevents damage"
    weight: 0.35
    description: "Safe-automation confidence thresholds"
  - type: llm_judge
    criteria: "System is operationally viable — GitHub Action fits within constraints, cost analysis works within budget, feedback loop improves accuracy, and the 15→3 hour goal is realistically addressed"
    weight: 0.30
    description: "Operationally viable system"
