meta:
  id: triage-runbook-creation
  level: 3
  course: github-issue-triage
  type: output
  description: "Create triage runbooks — write comprehensive playbooks for handling different issue categories and edge cases"
  tags: [github, issue-triage, runbook, playbook, documentation, edge-cases, advanced]

state: {}

trigger: |
  You're the Senior Engineering Manager at a company with 30 engineers
  rotating through triage duty. New engineers struggle with triage
  because institutional knowledge lives in the heads of senior
  maintainers. After a junior engineer accidentally closed a critical
  enterprise customer's issue as "wontfix" (causing a 6-figure
  contract escalation), the CTO mandated comprehensive triage runbooks.

  Runbook requirements:
  - Must cover the 8 most common triage scenarios
  - Must include decision trees for complex cases
  - Must be usable by engineers with 1 week of triage training
  - Must include "when in doubt" escalation guidance
  - Must be version-controlled in the repository

  The 8 scenarios to document:
  1. Standard bug report (complete info, reproducible)
  2. Incomplete bug report (missing critical info)
  3. Security vulnerability report
  4. Enterprise customer issue (identified by GitHub org or email)
  5. Feature request (evaluating scope and alignment)
  6. Regression report (something that worked before is broken)
  7. Performance issue (slow, memory leak, high CPU)
  8. Integration/compatibility issue (works with version A, not B)

  Additional context:
  - The project has 3 supported major versions (v3, v4, v5)
  - Enterprise customers are identified by a "customer:" label
  - Security issues must be handled within 24 hours
  - Regressions are automatically P1 or higher

  Task: Write the triage runbook. For each of the 8 scenarios,
  include: the identification criteria (how to recognize this type),
  the step-by-step triage procedure, the decision tree for edge
  cases, the label combination to apply, the response template, and
  the escalation triggers (when to ping a senior maintainer). Also
  write the "when in doubt" section and the runbook maintenance
  process.

assertions:
  - type: llm_judge
    criteria: "Runbook is comprehensive and usable — all 8 scenarios have clear procedures, decision trees handle edge cases, and a junior engineer could follow the steps without prior triage experience"
    weight: 0.35
    description: "Comprehensive usable runbook"
  - type: llm_judge
    criteria: "Critical scenarios have extra safeguards — enterprise customer issues have identification checks, security reports have time-bound procedures, and the escalation triggers prevent repeating the wontfix incident"
    weight: 0.35
    description: "Safeguarded critical scenarios"
  - type: llm_judge
    criteria: "Runbook is maintainable — version-controlled, has a review/update cadence, includes examples that can be updated, and the maintenance process ensures it stays current"
    weight: 0.30
    description: "Maintainable runbook"
