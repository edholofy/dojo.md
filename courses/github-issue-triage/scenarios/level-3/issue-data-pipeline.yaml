meta:
  id: issue-data-pipeline
  level: 3
  course: github-issue-triage
  type: output
  description: "Build an issue analytics pipeline — design the data infrastructure for tracking, analyzing, and reporting on issue triage performance"
  tags: [github, issue-triage, data-pipeline, analytics, reporting, dashboard, advanced]

state: {}

trigger: |
  You're the Data Engineer building the issue analytics platform
  for a development organization with 25 repositories and 1,500+
  issues/month. Leadership wants real-time visibility into triage
  health across all repos.

  Data sources:
  - GitHub Events API (issues, labels, comments, assignees, milestones)
  - GitHub Webhooks (real-time issue events)
  - GitHub Projects (status, custom fields, sprint data)
  - Internal systems (customer tier from CRM, team mappings from HR)

  Metrics to compute:
  - Time to first response (by repo, team, priority, customer tier)
  - Time to resolution (by issue type, complexity, team)
  - Issue throughput (opened vs. closed, net backlog change)
  - Label accuracy (how often labels are changed after initial triage)
  - Triager workload distribution (issues per person per week)
  - SLA compliance rate (by tier and issue type)
  - Duplicate detection rate (duplicates caught vs. total)
  - Issue aging distribution (histogram of open issue ages)

  Dashboard consumers:
  - Engineering managers: Team-level metrics, individual triager stats
  - Product managers: Feature request trends, customer-reported issues
  - VP of Engineering: Organization-level health, SLA compliance
  - Support team: Customer issue status, response time tracking

  Task: Design the issue analytics pipeline. Write: the data
  ingestion architecture (webhook consumer, event store, CDC from
  GitHub API), the data model (fact and dimension tables for issue
  events), the metric computation layer (how each metric is calculated,
  handling edge cases like re-opened issues), the dashboard design
  (views for each consumer with appropriate drill-down), and the
  alerting rules (what triggers automated alerts to whom).

assertions:
  - type: llm_judge
    criteria: "Data pipeline handles GitHub's complexity — webhook processing is idempotent, API rate limits are respected, event ordering is handled, and the system captures the full issue lifecycle including re-opens and transfers"
    weight: 0.35
    description: "Complexity-handling data pipeline"
  - type: llm_judge
    criteria: "Metrics are computed correctly — edge cases are handled (re-opened issues, transferred issues, bot comments excluded from response time), and each metric definition is precise and unambiguous"
    weight: 0.35
    description: "Correctly computed metrics"
  - type: llm_judge
    criteria: "Dashboards serve each audience — engineering managers see team detail, product sees trends, VP sees health overview, and support sees customer status; drill-down paths are logical"
    weight: 0.30
    description: "Audience-serving dashboards"
