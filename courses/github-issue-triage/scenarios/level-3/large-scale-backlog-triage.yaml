meta:
  id: large-scale-backlog-triage
  level: 3
  course: github-issue-triage
  type: output
  description: "Triage a massive backlog — develop a strategy to process 2,000+ open issues and reduce the backlog to a manageable level"
  tags: [github, issue-triage, backlog, large-scale, bulk-processing, advanced]

state: {}

trigger: |
  You're the new engineering manager for an open source project that
  has been neglected. The project has 2,347 open issues, some dating
  back 4 years. The community is frustrated by the lack of response,
  and the issue tracker has become a graveyard where reports go to die.

  Backlog analysis:
  - 2,347 open issues total
  - Age distribution: 800 (>2 years), 650 (1-2 years), 500 (6-12
    months), 397 (<6 months)
  - Labels: 40% unlabeled, 25% labeled "bug", 20% labeled "feature",
    15% other
  - Duplicates: Estimated 15-20% based on sampling
  - Outdated: Estimated 30% are for features/bugs already fixed
  - Actionable: Estimated 25-30% are valid and actionable

  Resources:
  - 3 maintainers (10 hours/week each)
  - 20 regular contributors willing to help
  - 2 months before the next major release
  - Budget for 1 month of contractor help if justified

  Community sentiment:
  - 15 comments in the last month about "issues being ignored"
  - 3 blog posts criticizing the project's issue management
  - Competitor project advertising "98% issue response rate"

  Task: Create the backlog reduction plan. Write: the triage strategy
  (how to process 2,347 issues efficiently — batch processing,
  automated sweeps, community triage events), the classification
  framework (how to quickly categorize issues into keep/close/merge
  buckets), the community communication plan (announcing the cleanup,
  inviting help, managing expectations), the execution timeline
  (week-by-week plan to reduce backlog to <500 in 2 months), and the
  sustainability plan (prevent re-accumulation after the cleanup).

assertions:
  - type: llm_judge
    criteria: "Triage strategy handles scale — batch processing uses automation for quick wins (age-based, duplicate detection), community triage events leverage contributors, and the approach is efficient enough for 2,347 issues"
    weight: 0.35
    description: "Scale-handling triage strategy"
  - type: llm_judge
    criteria: "Community communication builds trust — announces the cleanup proactively, acknowledges the neglect honestly, invites community participation, and sets realistic expectations for timelines"
    weight: 0.35
    description: "Trust-building communication"
  - type: llm_judge
    criteria: "Sustainability plan prevents re-accumulation — establishes ongoing triage cadence, defines response SLAs, implements automation for new issues, and includes accountability measures"
    weight: 0.30
    description: "Re-accumulation-preventing sustainability"
