meta:
  id: incident-issue-management
  level: 3
  course: github-issue-triage
  type: output
  description: "Manage issues during incidents — handle the flood of duplicate reports during a service outage or critical bug"
  tags: [github, issue-triage, incident, outage, duplicate-flood, communication, advanced]

state: {}

trigger: |
  You're the on-call triage engineer. At 2:15 PM, a breaking change
  was accidentally deployed to production. The change broke the
  authentication flow for 30% of users. Within 45 minutes:

  - 47 new issues were filed (and counting, ~2/minute)
  - Your team's Slack channel has 200+ messages
  - Twitter has #yourappdown trending locally
  - The support team has a 30-minute wait queue

  The 47 issues fall into categories:
  - 38 are duplicate reports of the auth failure ("can't log in")
  - 4 are related but different symptoms (API key auth works, OAuth
    doesn't; mobile app crashes, web app shows error)
  - 3 are unrelated bugs filed at the same time
  - 2 are feature requests filed during the outage (unrelated)

  Your tools:
  - GitHub Issues for the public repository
  - GitHub Discussions for community Q&A
  - Status page (status.yourapp.com)
  - Twitter/X account
  - In-app notification banner capability

  Task: Manage the incident from the triage perspective. Write: the
  immediate triage actions (first 15 minutes — create tracking issue,
  batch-handle duplicates, post status update), the duplicate
  management strategy (how to handle 38 duplicate reports efficiently
  without dismissing reporters), the communication plan (tracking
  issue updates, status page, Twitter, in-app banner — coordinated
  messaging), the post-incident cleanup (closing duplicates, linking
  to postmortem, thanking reporters), and the process improvement
  (how to handle the next incident faster — incident template, auto-
  lock new issues during incidents, status page automation).

assertions:
  - type: llm_judge
    criteria: "Immediate actions stop the bleeding — tracking issue is created quickly, status page is updated, and the strategy prevents continued duplicate filing"
    weight: 0.35
    description: "Bleeding-stopping immediate actions"
  - type: llm_judge
    criteria: "Duplicate management is efficient and respectful — batch closing is done with a clear explanation and link to tracking issue, reporters are thanked, and the different-symptom issues are preserved as valuable diagnostic data"
    weight: 0.35
    description: "Efficient respectful duplicate management"
  - type: llm_judge
    criteria: "Process improvement prevents future chaos — incident template exists for quick deployment, auto-responses redirect to tracking issues, and communication is coordinated across channels"
    weight: 0.30
    description: "Chaos-preventing process improvement"
