meta:
  id: sla-framework-design
  level: 3
  course: github-issue-triage
  type: output
  description: "Design issue SLA framework — create response and resolution SLAs for different issue types, priorities, and customer tiers"
  tags: [github, issue-triage, SLA, response-time, resolution, framework, advanced]

state: {}

trigger: |
  You're the VP of Engineering at a developer tools company with
  both open source and paid products. The CEO is frustrated that
  enterprise customers wait the same amount of time as free users
  for issue responses. You need to design an SLA framework that
  serves both communities fairly.

  Product tiers:
  - Open Source (free): Community-supported, best-effort response
  - Pro ($49/month): Email support, 48-hour response SLA
  - Enterprise ($499/month): Priority support, 4-hour response SLA
  - Strategic (custom pricing): Dedicated support, 1-hour response SLA

  Issue channels:
  - GitHub Issues (public): Used by all tiers
  - GitHub Issues (private security): Used by security researchers
  - Support portal (private): Used by Pro/Enterprise/Strategic
  - Slack channel (private): Used by Strategic customers only

  Current response times:
  - GitHub public issues: 4.2 days average (no SLA)
  - Support portal: 18 hours average (missing Pro SLA 30% of the time)
  - Slack: 2 hours average (meeting Strategic SLA 95% of the time)
  - Security reports: 72 hours average (no formal SLA)

  Team:
  - 3 community support engineers (GitHub public)
  - 4 customer support engineers (portal + Slack)
  - On-call engineering rotation for escalations

  Task: Design the comprehensive SLA framework. Write: the SLA
  definitions by tier and channel (response time, resolution time,
  and escalation triggers for each), the internal workflow to meet
  SLAs (how to identify customer tier from a GitHub issue, routing
  to the right queue, escalation when SLA is at risk), the monitoring
  and alerting system (how to track SLA compliance in real-time and
  alert before breaches), the public communication (what to publish
  about response times without over-promising for free tier), and
  the fairness consideration (how to ensure open source users still
  get reasonable attention despite not having SLAs).

assertions:
  - type: llm_judge
    criteria: "SLA definitions are tiered and realistic — each tier has appropriate response and resolution targets, SLAs are achievable with current team size, and definitions distinguish response from resolution"
    weight: 0.35
    description: "Tiered realistic SLA definitions"
  - type: llm_judge
    criteria: "Internal workflow enables SLA compliance — customer tier identification from GitHub issues is practical, routing puts high-tier issues in front of the right team, and escalation triggers prevent breaches"
    weight: 0.35
    description: "Compliance-enabling internal workflow"
  - type: llm_judge
    criteria: "Framework balances paid and free users — open source community gets reasonable expectations, enterprise customers get faster service, and the system doesn't create a perception of neglecting free users"
    weight: 0.30
    description: "Paid-free balanced framework"
