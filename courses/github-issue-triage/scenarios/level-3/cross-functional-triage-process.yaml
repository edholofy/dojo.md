meta:
  id: cross-functional-triage-process
  level: 3
  course: github-issue-triage
  type: output
  description: "Design cross-functional triage — build a triage process involving engineering, product, design, and support teams"
  tags: [github, issue-triage, cross-functional, product, design, support, advanced]

state: {}

trigger: |
  You're the Director of Engineering at a SaaS startup with 50
  engineers across 6 teams. Issues are filed by customers (via
  support), the product team, engineers, and external users.
  Currently, only engineering triages issues, which leads to:

  Problems:
  1. Product impact is missed — engineers prioritize technical
     severity but miss business impact (e.g., a P3 bug affects the
     top customer's critical workflow)
  2. Design implications are discovered late — issues get assigned to
     engineers, who then realize it needs design work, adding 2 weeks
  3. Support context is lost — customer urgency and frequency aren't
     communicated to the triaging engineers
  4. Duplicate effort — product creates Jira tickets for the same
     issues in GitHub, causing confusion
  5. No escalation path — when customer support marks something as
     urgent, engineering doesn't see it until the weekly triage

  Stakeholders:
  - Engineering: 6 team leads, each owns a domain (auth, billing,
    API, dashboard, integrations, infrastructure)
  - Product: 3 product managers aligned to customer segments
  - Design: 2 designers supporting all 6 engineering teams
  - Support: 4 support engineers handling 200 tickets/week
  - QA: 2 QA engineers doing verification and testing

  Task: Design the cross-functional triage process. Write: the triage
  meeting structure (who attends, frequency, agenda, decision-making
  framework), the issue enrichment workflow (how support adds customer
  context, how product adds business impact, how design flags UX
  implications — all before engineering evaluates), the routing rules
  (which issues go to which engineering team, how to handle cross-team
  issues), the escalation framework (how urgent customer issues get
  fast-tracked without skipping triage), and the tool integration
  (how to use GitHub Issues as the single source of truth instead of
  maintaining parallel tracking in Jira).

assertions:
  - type: llm_judge
    criteria: "Triage meeting is efficient and inclusive — appropriate stakeholders attend, frequency matches issue volume, agenda enables decisions, and the meeting doesn't become a 2-hour bottleneck"
    weight: 0.35
    description: "Efficient inclusive triage meeting"
  - type: llm_judge
    criteria: "Issue enrichment captures all perspectives — support adds customer context before triage, product adds business impact, design flags UX needs, and this enrichment happens asynchronously to not block the process"
    weight: 0.35
    description: "All-perspective issue enrichment"
  - type: llm_judge
    criteria: "Routing and escalation prevent bottlenecks — issues reach the right team quickly, cross-team issues have clear ownership, urgent escalation has a fast path, and GitHub is the single source of truth"
    weight: 0.30
    description: "Bottleneck-preventing routing"
