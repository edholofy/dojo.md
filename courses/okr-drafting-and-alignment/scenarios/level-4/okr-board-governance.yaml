meta:
  id: okr-board-governance
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR board-level governance — design the OKR governance framework for a public company board, connecting OKRs to fiduciary duties and strategic oversight"
  tags: [board, governance, public-company, fiduciary, expert]

state: {}

trigger: |
  You're the Chief Strategy Officer at a publicly traded
  technology company ($5B revenue, 15,000 employees). The board
  chair has asked you to design how OKRs connect to board-level
  governance after a proxy advisory firm flagged concerns about
  "lack of clear strategic execution metrics" in the company's
  proxy statement.

  ISS (Institutional Shareholder Services) concern:
  "The company's proxy statement references strategic initiatives
  but provides no measurable execution metrics or progress
  indicators. Shareholders cannot assess whether management is
  executing on stated strategy. Recommend the board adopt
  a structured strategic execution framework with quarterly
  reporting."

  Board structure:
  - 11 directors (3 insiders, 8 independent)
  - Strategy Committee (4 directors, meets quarterly)
  - Compensation Committee (3 directors, ties exec comp to
    strategic objectives)
  - CEO's performance is evaluated on strategic execution
    (40% of variable comp)

  Current problems:
  1. The board sees annual strategic plans but no quarterly
     execution metrics
  2. CEO's strategic objectives are vague ("drive digital
     transformation") with no measurable outcomes
  3. Compensation Committee can't objectively assess strategic
     execution for CEO pay decisions
  4. Proxy statement has no strategic execution disclosure
  5. Strategy Committee meetings are presentation-heavy with
     no structured framework for assessing progress

  Company OKR state:
  - OKRs used internally by product and engineering for 2 years
  - Not used at executive or board level
  - Internal OKRs are good quality but not connected to
     board-level strategy

  Task: Design the board-level OKR governance framework that
  connects internal OKRs to board oversight, addresses the ISS
  concern, and integrates with the compensation framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive board OKR governance framework — creates a multi-tier connection from internal OKRs to board reporting (team OKRs → executive OKRs → board strategy metrics); designs the Strategy Committee's OKR review process (quarterly assessment format, progress indicators, escalation triggers); addresses the ISS concern with a proxy statement disclosure framework for strategic execution metrics; integrates with the Compensation Committee's evaluation of CEO performance."
    weight: 0.35
    description: "GovernanceFramework"
  - type: llm_judge
    criteria: "Response addresses each of the 5 current problems — provides quarterly execution metrics for the board (not just annual plans); transforms vague CEO objectives into measurable OKRs; creates an objective framework for Compensation Committee assessment; proposes proxy statement strategic execution disclosures; designs a structured Strategy Committee meeting format; the solutions are appropriate for a public company board (not overly detailed, strategic-level focus, fiduciary-duty aware)."
    weight: 0.35
    description: "ProblemResolution"
  - type: llm_judge
    criteria: "Response handles the public company complexity — addresses SEC disclosure considerations for publishing strategic execution metrics (balance between transparency and competitive sensitivity); designs the CEO compensation linkage carefully (committed OKRs for comp evaluation, aspirational OKRs for strategic stretch without comp penalty); addresses how much detail reaches the proxy statement vs stays in board materials; considers the ISS/Glass Lewis perspective on what 'good' strategic execution disclosure looks like."
    weight: 0.30
    description: "PublicCompanyComplexity"
