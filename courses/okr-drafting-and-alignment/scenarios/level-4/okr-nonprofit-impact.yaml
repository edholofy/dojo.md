meta:
  id: okr-nonprofit-impact
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for nonprofit impact — adapt OKRs for a large nonprofit where success is measured in social impact, not revenue, and stakeholders include donors, beneficiaries, and regulators"
  tags: [nonprofit, social-impact, donors, beneficiaries, expert]

state: {}

trigger: |
  You're the Executive Director of a large international
  humanitarian nonprofit ($500M annual budget, 5,000 staff,
  operations in 40 countries). Your board of governors wants
  you to implement OKRs to improve strategic execution and
  demonstrate impact to donors.

  Context:
  - Mission: "Reduce extreme poverty and its effects on
    children in the world's most vulnerable communities"
  - Programs: Education (30%), Healthcare (25%), Water/Sanitation
    (20%), Economic Development (15%), Emergency Response (10%)
  - Funding: Individual donors (40%), foundations (30%),
    government grants (20%), corporate partnerships (10%)
  - Major donors increasingly demand "outcomes, not outputs"
    ("Don't tell me you built 500 wells — tell me how many
    people have sustainable access to clean water")

  Challenges unique to nonprofits:
  1. Revenue ≠ success: More donations doesn't mean more impact.
     A program can be well-funded but ineffective.
  2. Attribution is complex: If child mortality drops, is it
     your healthcare program or the government's vaccination
     campaign?
  3. Time horizons vary: Emergency response is weeks; education
     impact is decades.
  4. Donors want different metrics than beneficiaries need:
     Donors want stories and numbers. Field workers need
     operational data. Governments want compliance reports.
  5. "Stretch goals" in humanitarian work have ethical
     implications — you can't fail to deliver clean water to
     a community and call it a "learning opportunity."
  6. Cultural sensitivity: Imposing Western management frameworks
     on field operations in 40 countries requires adaptation.

  Recent criticism:
  - Charity Navigator flagged "high administrative costs relative
    to program spend"
  - A major foundation reduced funding, saying "We can't
    determine the impact of our investment"
  - Field staff complain that HQ metrics don't reflect the
    reality on the ground

  Task: Design the OKR framework adapted for a large
  international nonprofit. Address the unique challenges of
  measuring social impact, managing diverse stakeholders, and
  balancing ambitious goals with ethical obligations.

assertions:
  - type: llm_judge
    criteria: "Response designs an impact-oriented OKR framework — creates OKRs that measure social impact outcomes (not just outputs: not 'build 500 wells' but 'increase sustainable clean water access for 200,000 people with >90% systems still functioning after 2 years'); addresses all 5 program areas with outcome-focused objectives; distinguishes between committed OKRs (ethically mandatory — you will deliver clean water to this community) and aspirational OKRs (stretch goals where failure is acceptable — innovative program models); the framework serves the mission, not just organizational management."
    weight: 0.35
    description: "ImpactOKRFramework"
  - type: llm_judge
    criteria: "Response addresses the nonprofit-specific challenges — handles the revenue≠success distinction (donor acquisition OKRs are separate from program impact OKRs); addresses attribution complexity with measurable but honest approaches; handles variable time horizons (emergency response OKRs are monthly, education impact OKRs are multi-year with quarterly milestones); addresses the multi-stakeholder reporting challenge (donor-facing OKRs, operational OKRs, government compliance OKRs); addresses the ethical dimension of stretch goals in humanitarian contexts."
    weight: 0.35
    description: "NonprofitChallenges"
  - type: llm_judge
    criteria: "Response addresses the recent criticisms and operational concerns — proposes how OKRs address the administrative cost concern (operational efficiency OKRs); responds to the foundation's impact measurement demand with demonstrable outcome metrics; addresses field staff's concern about HQ metrics not reflecting reality (locally adapted OKRs, field-level input into goal setting); proposes how OKRs work across 40 countries with diverse contexts; the framework is practical for 5,000 staff working in challenging environments."
    weight: 0.30
    description: "CriticismResponse"
