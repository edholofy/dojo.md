meta:
  id: okr-consulting-engagement
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR consulting engagement — design and deliver an OKR consulting engagement for a Fortune 500 client transitioning from balanced scorecard to OKRs"
  tags: [consulting, fortune-500, balanced-scorecard, transition, expert]

state: {}

trigger: |
  You're a partner at a management consulting firm specializing
  in organizational performance. A Fortune 500 manufacturing
  company ($15B revenue, 45,000 employees, 30 countries) has
  engaged your firm to transition from Balanced Scorecard (BSC)
  to OKRs. The engagement is $3M over 12 months.

  Client context:
  - Used Balanced Scorecard for 12 years across all divisions
  - BSC has become bureaucratic — 200+ KPIs tracked, quarterly
    reviews are 3-day events, nobody reads the scorecards
  - CEO (new, joined 6 months ago from a tech company): "BSC
    tells me what we're measuring. OKRs tell me what we're
    changing. I want to shift from measurement to transformation."
  - CFO (BSC champion for 10 years): "Over my dead body. BSC
    has served us well. This is a vanity project by a new CEO."
  - CHRO: "Our entire performance management system is built on
    BSC cascaded objectives. Changing it affects 45,000 people."
  - Division President (Automotive, 12,000 people): "My division
    is profitable. Don't fix what isn't broken."
  - Division President (Aerospace, 8,000 people): "I've been
    asking for this for years. BSC is too rigid for our fast-
    moving defense contracts."

  Current BSC architecture:
  - 4 perspectives: Financial, Customer, Internal Process,
    Learning & Growth
  - Company scorecard → Division scorecards → Department
    scorecards → Individual scorecards
  - 200+ KPIs across the company
  - Strategy map linking perspectives
  - Tied to annual bonus (50% individual scorecard, 50% company)

  Your engagement scope:
  - Phase 1 (3 months): Assessment and design
  - Phase 2 (6 months): Pilot in 2 divisions
  - Phase 3 (3 months): Enterprise rollout plan
  - Deliverables: OKR framework, transition plan, pilot results,
    rollout recommendation

  Task: Design the consulting engagement — your assessment
  methodology, the BSC-to-OKR transition framework, the pilot
  strategy, and how you handle the executive politics.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible consulting engagement — includes a structured assessment methodology (BSC maturity assessment, stakeholder interviews, KPI rationalization analysis, culture readiness evaluation); designs the BSC-to-OKR transition framework (what BSC elements to preserve, what to replace, what to enhance with OKRs); proposes a pilot strategy for 2 divisions (likely Aerospace as willing and one other for balance); provides phased deliverables across the 12-month engagement; the approach is appropriate for a $3M Fortune 500 engagement."
    weight: 0.35
    description: "ConsultingEngagement"
  - type: llm_judge
    criteria: "Response addresses the BSC-to-OKR transition thoughtfully — doesn't position OKRs as universally superior to BSC (acknowledges BSC strengths: financial discipline, balanced perspectives, strategy maps); designs a hybrid approach that preserves BSC's financial and compliance measurement while adding OKR's outcome-focus and agility; addresses the 200+ KPI rationalization (which become OKR key results, which remain as KPIs, which are retired); proposes how the 4 BSC perspectives translate to OKR themes; the transition respects 12 years of BSC investment."
    weight: 0.35
    description: "BSCToOKRTransition"
  - type: llm_judge
    criteria: "Response navigates the executive politics skillfully — addresses CFO's resistance with respect and data (doesn't dismiss BSC, shows what OKRs add); leverages Aerospace's enthusiasm for the pilot; handles Automotive's 'don't fix what works' concern with a voluntary participation approach; supports the CEO's vision without alienating the CFO; addresses the CHRO's performance management concern with a transition plan for 45,000 people; the approach demonstrates political savvy appropriate for Fortune 500 consulting."
    weight: 0.30
    description: "ExecutivePolitics"
