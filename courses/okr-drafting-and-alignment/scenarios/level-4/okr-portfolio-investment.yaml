meta:
  id: okr-portfolio-investment
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for portfolio investment decisions — use OKRs as a framework for capital allocation and investment prioritization across a diversified portfolio"
  tags: [portfolio, investment, capital-allocation, prioritization, expert]

state: {}

trigger: |
  You're the Chief Investment Officer at a private equity firm
  that manages a portfolio of 12 companies across different
  industries. The fund is $2B with a 5-year hold period. You're
  implementing OKRs across all portfolio companies to create
  consistent strategic visibility and drive value creation.

  Portfolio overview:
  - 12 companies, $150M-$400M revenue each
  - Industries: healthcare (3), technology (4), industrial (3),
    consumer (2)
  - Vintage: Year 1 companies (3), Year 2 (4), Year 3 (3),
    Year 4 (2)
  - Performance: 4 ahead of plan, 5 on plan, 3 behind plan

  Your fund's thesis: "Operational improvement through
  disciplined strategic execution"

  The challenge: Each portfolio company has a different:
  - Management team maturity
  - Goal-setting culture (2 use OKRs, 3 use BSC, 5 use ad-hoc
    goals, 2 use nothing)
  - Business model and competitive dynamics
  - Stage in the hold period (early = growth, late = exit prep)

  What you want OKRs to do:
  1. Provide consistent strategic visibility across 12 companies
  2. Enable board-level comparison of strategic execution quality
  3. Connect portfolio company execution to fund-level returns
  4. Drive value creation plans specific to each company's stage
  5. Create a common language between your operating partners
     and portfolio company CEOs
  6. Accelerate identification of underperforming companies

  Fund-level OKR (your own):
  Objective: "Maximize fund returns through superior operational
  execution across the portfolio"
  - KR1: Achieve 25%+ IRR net of fees
  - KR2: 10 of 12 companies executing at or above value
    creation plan
  - KR3: Average EBITDA growth of 20%+ across portfolio
  - KR4: 3 companies exit-ready within 18 months

  Task: Design the OKR framework for the portfolio — the
  standard OKR architecture for portfolio companies, how it
  connects to your fund-level OKRs, and how you handle the
  different maturity levels and stages.

assertions:
  - type: llm_judge
    criteria: "Response designs a portfolio-level OKR framework — creates a standard OKR architecture that all 12 companies adopt (common structure while allowing industry-specific content); connects portfolio company OKRs to fund-level OKRs (company strategic execution → fund returns); addresses how to create consistent visibility across 12 different companies without making OKRs overly generic; includes a portfolio dashboard showing strategic execution health across all companies; the framework enables cross-company comparison."
    weight: 0.35
    description: "PortfolioFramework"
  - type: llm_judge
    criteria: "Response adapts for different stages and maturity — proposes different OKR emphasis by hold period stage (Year 1: growth and market positioning; Year 2-3: operational improvement and EBITDA expansion; Year 4+: exit preparation and value maximization); handles the maturity gap (2 companies use OKRs, 5 have no goal framework — different adoption paths); creates stage-specific OKR templates that guide CEOs; addresses the 3 underperforming companies with targeted recovery OKRs."
    weight: 0.35
    description: "StageMaturityAdaptation"
  - type: llm_judge
    criteria: "Response addresses the PE-specific dynamics — designs the operating partner/CEO relationship within the OKR framework (OKRs as shared accountability, not top-down mandate); includes board-level OKR reporting for each company; connects OKRs to value creation plans and exit multiples; addresses how OKRs surface problems early (accelerating identification of underperformance); proposes how OKR quality and execution track record affects exit valuation narrative; the framework is practical for a PE operating context."
    weight: 0.30
    description: "PEDynamics"
