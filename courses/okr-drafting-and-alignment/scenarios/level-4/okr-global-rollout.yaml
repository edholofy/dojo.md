meta:
  id: okr-global-rollout
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR global rollout — roll out OKRs across a 20,000-person multinational company operating in 25 countries with diverse management cultures"
  tags: [global, rollout, multinational, cultural-adaptation, expert]

state: {}

trigger: |
  You're the Global Head of Strategy Execution at a multinational
  consumer goods company (20,000 employees, 25 countries, $8B
  revenue). The CEO wants OKRs deployed globally within 18
  months. The company currently has no standardized goal-setting
  framework — each country operates independently.

  Regional landscape:

  North America (HQ, 6,000 people):
  - Most receptive — CEO is here, culture is familiar with OKRs
  - Already uses informal quarterly goals in some teams
  - Risk: "HQ is imposing this on everyone else"

  Western Europe (5,000 people — UK, Germany, France, Benelux):
  - Works councils in Germany and France have authority over
    performance management processes
  - UK is pragmatic but skeptical of "American management fads"
  - Strong labor law protections affect how goals can be used
  - Risk: Legal and labor relations complications

  Asia-Pacific (4,000 people — Japan, China, India, Australia):
  - Japan: Consensus-based decision making; public goal failure
    causes loss of face; nemawashi (building consensus before
    formal meetings) is essential
  - China: Goal-setting is top-down by tradition; local
    competition for metrics gaming is intense
  - India: Very capable teams but tendency toward overcommitment
  - Australia: Egalitarian culture; push back on hierarchy

  Latin America (3,000 people — Brazil, Mexico, Colombia):
  - Relationship-driven culture; process compliance lower
  - Economic volatility makes annual goal-setting challenging
  - Time horizons are shorter — quarterly makes more sense
  - Strong union presence in manufacturing

  Middle East & Africa (2,000 people — UAE, Saudi, South Africa, Nigeria):
  - Rapidly growing markets; execution focus
  - Leadership style varies dramatically by country
  - Workforce mix: local + expatriate with different expectations
  - Government relationships affect business priorities

  Budget: $5M over 18 months for the global rollout
  Constraint: Must maintain local autonomy while achieving
  global alignment

  Task: Design the global OKR rollout strategy — the phasing,
  the cultural adaptation approach, the governance model, and
  the change management plan for each region.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased global rollout — proposes a realistic 18-month phasing (likely NA first as pilot, then regions in sequence based on readiness); creates a federated governance model (global OKR standards with local adaptation); addresses the $5M budget allocation across regions and phases; includes a global OKR architecture (company OKRs → regional OKRs → country OKRs → team OKRs) that maintains alignment while allowing local autonomy; the rollout doesn't try to do everything at once."
    weight: 0.35
    description: "GlobalRolloutPlan"
  - type: llm_judge
    criteria: "Response addresses cultural adaptation for each region — provides specific strategies for Japan (nemawashi-compatible planning, private scoring with aggregated reporting), Germany/France (works council engagement strategy, labor law compliance), China (top-down adoption with accountability mechanisms for gaming), India (calibration of stretch targets), Brazil/Mexico (relationship-based adoption, shorter cadence adaptation), Middle East (leadership style accommodation); the approach respects cultural differences without stereotyping; doesn't impose Western OKR practices uniformly."
    weight: 0.35
    description: "CulturalAdaptation"
  - type: llm_judge
    criteria: "Response includes governance and sustainability — defines the global OKR governance structure (global OKR council, regional champions, local coaches); addresses how global alignment is maintained when regions adapt practices; includes change management for 20,000 people (can't train everyone individually — train-the-trainer, regional workshops, digital learning); addresses sustainability after the 18-month rollout (how to prevent decay); includes success metrics for each region; addresses the 'HQ imposing on everyone' perception proactively."
    weight: 0.30
    description: "GovernanceSustainability"
