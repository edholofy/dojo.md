meta:
  id: okr-platform-design
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR platform design — architect an enterprise OKR management platform that automates alignment visualization, progress tracking, and intelligent recommendations"
  tags: [platform, technology, automation, enterprise, expert]

state: {}

trigger: |
  You're the VP of Product at an HR tech company. Your CEO
  wants to build an "AI-powered OKR platform" that solves the
  problems existing tools don't:

  "Lattice, 15Five, Betterworks — they're all glorified
  spreadsheets with alignment arrows. Nobody has built the
  intelligent OKR system. I want a platform that actually
  makes OKRs work, not just tracks them."

  Market problems your platform will solve:
  1. Bad OKR writing: 60% of OKRs are poorly written (vague
     objectives, unmeasurable KRs, tasks disguised as outcomes)
  2. Alignment theater: Companies draw alignment arrows but
     OKRs don't actually align (team KRs don't add up to
     company KRs)
  3. Dead check-ins: Weekly updates become "nothing changed"
     or copy-paste from last week
  4. Scoring fiction: End-of-quarter scoring is subjective
     and inconsistent across teams
  5. No learning: Companies repeat the same OKR mistakes
     quarter after quarter with no improvement
  6. Disconnected from work: OKRs live in the OKR tool while
     work happens in Jira, Salesforce, HubSpot, etc.

  Target market: Mid-market and enterprise (500-10,000 employees)
  Competitive landscape: Lattice, 15Five, Betterworks, Weekdone,
  Profit.co, Quantive
  Budget for MVP: $3M, 12-month timeline

  Task: Design the product — the AI-powered features that
  differentiate from competitors, the integration architecture,
  the user experience, and the go-to-market strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs differentiated AI-powered features — proposes specific AI capabilities that solve each of the 6 market problems (OKR quality scoring with improvement suggestions, alignment gap detection and remediation recommendations, intelligent check-in prompts based on data changes, automated scoring from integrated data sources, pattern recognition for repeated OKR mistakes, bi-directional integration with work tools); the AI features are specific and technically feasible, not vague 'AI magic'; each feature clearly differentiates from existing competitors."
    weight: 0.35
    description: "AIFeatures"
  - type: llm_judge
    criteria: "Response designs the integration architecture — proposes bi-directional connectors to major work tools (Jira for engineering OKR progress, Salesforce for sales OKR metrics, HubSpot for marketing OKRs, financial systems for revenue OKRs); the integrations enable automated KR progress updates (not manual check-ins); addresses the data architecture for aggregating metrics across integrations; includes the alignment visualization engine that detects real misalignment (not just drawing arrows); the architecture is scalable for enterprise customers."
    weight: 0.35
    description: "IntegrationArchitecture"
  - type: llm_judge
    criteria: "Response includes UX design and go-to-market strategy — proposes a user experience that makes OKR management effortless (not another admin burden); includes the go-to-market positioning against established competitors; addresses the $3M MVP budget with a realistic feature prioritization (what's in MVP vs v2 vs v3); includes a pricing model appropriate for mid-market and enterprise; addresses the adoption challenge (new OKR tools have high churn if OKR process itself fails — how does the platform ensure OKR process success, not just tool adoption?)."
    weight: 0.30
    description: "UXAndGTM"
