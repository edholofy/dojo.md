meta:
  id: okr-moonshot-innovation
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR moonshot and innovation — design OKRs that drive breakthrough innovation alongside operational execution, balancing moonshot ambition with quarterly accountability"
  tags: [moonshot, innovation, breakthrough, 10x, expert]

state: {}

trigger: |
  You're the Chief Innovation Officer at a $10B industrial
  conglomerate. The CEO has challenged you: "Google uses OKRs
  for moonshots. We're an industrial company — our version of
  a moonshot is creating entirely new business lines, not
  incremental product improvements. Design an OKR framework
  that drives 10x thinking alongside our core business."

  Company context:
  - 4 mature business lines ($2-3B each): Industrial Equipment,
    Building Automation, Power Distribution, Safety Systems
  - Growing slowly (3% organic), profitable (18% margin)
  - Innovation track record: Last new business line launched
    15 years ago. All growth has been acquisition-based.
  - R&D spend: $400M/year but 95% goes to incremental
    improvements of existing products
  - Employee population: 40,000, average tenure 12 years
  - Culture: Engineering-driven, risk-averse, process-heavy

  The CEO's mandate:
  - Allocate $100M over 3 years for moonshot initiatives
  - Target: Create 2-3 new business lines worth $500M+ revenue
    each within 7 years
  - Focus areas: Sustainability/clean energy, industrial IoT/AI,
    autonomous systems
  - "I don't want 10% improvements. I want someone to tell me
    we're going to do something that's never been done in our
    industry."

  Current challenges:
  1. Operational BU leaders resist moonshots — "That money
     should go to my proven products"
  2. Moonshot OKRs can't be scored the same as operational OKRs
     (you can't predict breakthrough timelines)
  3. The company's performance management rewards predictability,
     not experimentation
  4. Engineers want to work on moonshots but their managers
     won't release them
  5. Previous innovation attempts died because they were measured
     by operational standards

  Task: Design the moonshot OKR framework — how moonshot teams
  set goals, how they're measured, how they coexist with
  operational OKRs, and how you protect them from the
  antibodies of a mature organization.

assertions:
  - type: llm_judge
    criteria: "Response designs a moonshot OKR framework distinct from operational OKRs — creates a separate goal-setting and measurement approach for moonshot initiatives (longer time horizons, hypothesis-based OKRs, learning milestones instead of delivery milestones, kill criteria for failed experiments); defines how moonshot OKRs differ from operational OKRs in structure, scoring, and cadence; addresses the 3 focus areas (sustainability, IoT/AI, autonomous) with specific moonshot-style objectives; the framework enables 10x thinking without applying quarterly operational standards."
    weight: 0.35
    description: "MoonshotFramework"
  - type: llm_judge
    criteria: "Response addresses organizational protection for moonshots — proposes mechanisms to protect moonshot teams from operational antibodies (separate reporting structure, dedicated budget with firewall, innovation-specific performance reviews, CEO sponsorship governance); addresses the engineering talent access problem (how to staff moonshot teams without gutting operational BUs); handles BU leaders' resistance with a clear narrative (moonshots are funded from corporate, not taken from BU budgets); addresses how to create a safe-to-fail culture within a risk-averse organization."
    weight: 0.35
    description: "OrganizationalProtection"
  - type: llm_judge
    criteria: "Response balances moonshot ambition with accountability — proposes a governance structure that gives moonshots freedom but not unlimited runway ($100M over 3 years with stage-gate funding); includes kill criteria (when to stop a moonshot that's not working); addresses how to report moonshot progress to the board (different metrics than operational reporting — learning velocity, experiment throughput, market validation signals); provides a portfolio approach across the 3 focus areas; includes examples of well-structured moonshot OKRs with learning-based key results."
    weight: 0.30
    description: "AmbitionAccountability"
