meta:
  id: okr-digital-transformation
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for digital transformation — use OKRs to drive and measure a 3-year digital transformation across a traditional enterprise"
  tags: [digital-transformation, enterprise, multi-year, measurement, expert]

state: {}

trigger: |
  You're the Chief Digital Officer at a $4B regional bank
  (8,000 employees, 200 branches). The board has approved a
  $200M, 3-year digital transformation program. The previous CDO
  was fired because the transformation had "no measurable
  progress after 18 months and $80M spent." You're implementing
  OKRs as the execution framework.

  The failed first attempt:
  - KPIs used: "% of digital initiatives completed" (100% of
    easy ones done, none of the important ones)
  - No connection between digital projects and business outcomes
  - "Digital" was a separate department doing projects — the
    core business didn't transform
  - The board couldn't tell if the transformation was working
  - Technology was deployed but adoption was 15%

  Transformation priorities:
  1. Customer experience: From branch-first to digital-first
     (currently 20% of transactions are digital, target 70%)
  2. Operational efficiency: Automate back-office processes
     (currently 40% manual, target 10%)
  3. Data-driven decisions: Build analytics capability across
     the bank (currently no enterprise data platform)
  4. Employee capability: Transform 8,000 employees' digital
     skills (currently digital literacy is 30%)
  5. New revenue: Launch digital-only products (mobile-first
     lending, robo-advisory)

  Constraints:
  - Regulatory: OCC, Federal Reserve, FDIC oversight — all
    technology changes require regulatory compliance review
  - Legacy: 3 core banking systems (oldest from 1995)
  - Culture: Average employee tenure 14 years, resistant to
    change
  - Competition: Neobanks taking millennial market share

  Task: Design the OKR framework for the digital transformation
  — Year 1 annual OKRs, Q1 quarterly OKRs, and the governance
  structure that connects OKR execution to board oversight.

assertions:
  - type: llm_judge
    criteria: "Response designs outcome-based transformation OKRs — creates Year 1 annual OKRs and Q1 quarterly OKRs that measure business outcomes, not project completion (not '% of initiatives completed' but 'digital transaction share increased from 20% to 35%'); addresses all 5 transformation priorities with measurable outcomes; the OKRs connect digital investments to business results (revenue, cost reduction, customer satisfaction, employee capability); the framework directly addresses why the previous attempt failed."
    weight: 0.35
    description: "OutcomeBasedOKRs"
  - type: llm_judge
    criteria: "Response addresses the transformation governance challenge — proposes how OKRs create board-level visibility into transformation progress (quarterly board reporting format); designs the governance structure (transformation steering committee, OKR review cadence, investment gate decisions based on OKR results); addresses the $200M investment allocation using OKR-based prioritization; includes adoption metrics as first-class OKR components (technology deployed means nothing without adoption); connects OKR performance to continued funding decisions."
    weight: 0.35
    description: "TransformationGovernance"
  - type: llm_judge
    criteria: "Response handles the banking-specific constraints — addresses regulatory compliance requirements in the OKR framework (compliance as committed OKRs, not stretch goals); addresses legacy system reality (Year 1 can't achieve full digital transformation on 1995 systems); addresses cultural resistance with change management OKRs; addresses the employee capability gap (digital literacy from 30% needs systematic upskilling); the OKRs are realistic for a regulated bank with legacy constraints, not a Silicon Valley fantasy."
    weight: 0.30
    description: "BankingConstraints"
