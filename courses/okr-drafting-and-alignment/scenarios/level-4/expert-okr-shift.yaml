meta:
  id: expert-okr-shift
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "Expert OKR shift — navigate a situation where a company's OKR system has become an instrument of organizational politics rather than strategic alignment"
  tags: [shift, politics, dysfunction, organizational, expert]

state: {}

trigger: |
  You're an external advisor brought in by the board of a
  1,500-person technology company ($200M ARR). The company has
  been using OKRs for 5 years, but the system has become
  deeply dysfunctional. The board chair told you: "OKRs were
  supposed to align the company. Instead, they've become
  weapons in an internal political war."

  The dysfunction:

  1. "OKR Wars": VPs fight over whose OKRs get priority. The
     VP of Product and VP of Sales haven't spoken in 3 months
     because Sales wants revenue OKRs and Product wants
     innovation OKRs. Each lobbies the CEO to make their OKRs
     the company priority.

  2. "Metric Gaming": Teams have learned to game OKR scoring.
     Engineering reports "key results achieved" by defining
     success so narrowly that hitting the number is meaningless.
     Example: KR was "launch feature to customers" — they
     launched it behind a feature flag to 3 beta customers and
     scored 1.0.

  3. "OKR Inflation": Every team has 5-7 objectives with 4-5
     key results each. A 1,500-person company has 500+ objectives
     tracked. Nobody can find their own OKRs, let alone
     understand alignment.

  4. "Check-in Theater": Weekly OKR check-ins have become
     political performances where teams present favorable
     narratives. Real problems are discussed in back-channel
     1:1s, not in OKR reviews.

  5. "Blame Attribution": When things go wrong, VPs use OKR
     miss data to blame other teams ("Sales missed their
     number because Product didn't ship on time").

  6. "Shadow Priorities": The real priorities are communicated
     through Slack DMs and hallway conversations. OKRs are
     the official fiction.

  The CEO's perspective: "I still believe in OKRs. But something
  went wrong. The tool became a toy. Fix it without throwing out
  the framework."

  Task: Diagnose the OKR dysfunction, design the intervention,
  and propose the rehabilitated OKR system. Address each of the
  6 dysfunctions with specific remedies.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses the root causes — goes beyond the 6 symptoms to identify underlying causes (trust deficit between VPs, lack of executive alignment before OKR-setting, incentive structures that reward gaming, OKR process complexity that's outgrown the organization, absence of OKR governance/quality standards, CEO not resolving VP conflicts); the diagnosis explains how a well-intentioned OKR system devolved over 5 years; identifies which dysfunctions are process problems vs culture problems vs leadership problems."
    weight: 0.35
    description: "RootCauseDiagnosis"
  - type: llm_judge
    criteria: "Response designs specific remedies for each dysfunction — proposes solutions for: OKR Wars (executive alignment session before OKR-setting, CEO resolves priority conflicts before they cascade), Metric Gaming (OKR quality review, outcome-based not output-based KRs, independent verification), OKR Inflation (strict limit of 3 objectives per team, 3 KRs each), Check-in Theater (restructured check-ins focused on blockers and decisions, not performance theater), Blame Attribution (shared OKRs for cross-functional outcomes, post-mortem culture), Shadow Priorities (OKR-strategy gap analysis, CEO accountability for alignment); each remedy is specific and implementable."
    weight: 0.35
    description: "SpecificRemedies"
  - type: llm_judge
    criteria: "Response proposes a rehabilitation plan, not a replacement — preserves the OKR framework (as the CEO requested) while fundamentally reforming how it's used; includes a transition plan (you can't fix 5 years of dysfunction in one quarter); proposes a 'reset quarter' approach; addresses the interpersonal dynamics (VPs not speaking, political warfare) as prerequisites to OKR reform; includes governance mechanisms to prevent re-degradation; the plan acknowledges that OKR dysfunction is usually a symptom of organizational dysfunction, not the cause."
    weight: 0.30
    description: "RehabilitationPlan"
