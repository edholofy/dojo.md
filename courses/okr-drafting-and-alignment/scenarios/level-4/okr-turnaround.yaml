meta:
  id: okr-turnaround
  level: 4
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for company turnaround — use OKRs to drive a 90-day turnaround plan for a company on the verge of running out of cash"
  tags: [turnaround, survival, 90-day, cash-crisis, expert]

state: {}

trigger: |
  You're the newly appointed CEO of a struggling SaaS company
  brought in by the board to execute a 90-day turnaround. The
  company is burning $2M/month with only $3.5M in the bank —
  less than 2 months of runway without changes.

  Company: $12M ARR, 150 employees, Series B ($30M raised)
  Problem: Company tried to be everything to everyone — 4
  products, 3 verticals, 2 geographies, all understaffed.

  Current state:
  - Revenue: $12M ARR, declining (-5% QoQ due to churn)
  - Burn: $2M/month ($24M annualized)
  - Cash: $3.5M (1.75 months at current burn)
  - Team: 150 people across 4 product lines
  - Products: Core Platform (profitable, $8M ARR, 65% of
    revenue), Product B ($2M ARR, -40% margin), Product C
    ($1.5M ARR, -60% margin), Product D ($0.5M ARR, pre-revenue
    essentially)
  - Churn: Core Platform 8% annually (healthy), Products B/C/D
    combined 35% annually (bleeding)
  - Engineering: Split across 4 products, none has enough
    resources

  Board mandate: "Survive. Then grow. In that order. You have
  90 days to show a path to break-even or we're shutting down."

  Your turnaround assessment:
  - Core Platform alone can be profitable at 60 employees
  - Products B, C, D should be sunset (save $1.2M/month)
  - Need to reduce headcount from 150 to ~80 (painful but
    necessary)
  - Customer migration from Products B/C to Core Platform
    features where possible
  - After restructuring: break-even at $8M ARR with 80 employees

  Task: Write the 90-day turnaround OKRs. These aren't normal
  "aspirational" OKRs — they're survival-mode OKRs where every
  key result is committed and non-negotiable. Design the OKR
  framework for crisis mode.

assertions:
  - type: llm_judge
    criteria: "Response creates crisis-appropriate OKRs — writes 2-3 objectives focused on survival (cash preservation, restructuring, customer retention of core product); all key results are committed (scored at 1.0, non-negotiable); the OKR targets are precise and time-bounded within the 90-day window (Day 30: reduce burn to $1.2M, Day 60: customer migration complete, Day 90: path to break-even demonstrated); addresses the product sunset, headcount reduction, and customer migration as specific KRs; the OKRs reflect the urgency of 1.75 months of cash."
    weight: 0.35
    description: "CrisisOKRs"
  - type: llm_judge
    criteria: "Response addresses the human and operational dimensions — proposes how to communicate and execute the headcount reduction (from 150 to ~80) with dignity and legal compliance; addresses customer communication for Products B/C/D sunset; includes retention OKRs for the critical 80 people who will remain; addresses the morale challenge of survival-mode work; proposes 30/60/90 day milestone checkpoints that the board can verify; the turnaround plan is operationally detailed, not just financial arithmetic."
    weight: 0.35
    description: "HumanOperational"
  - type: llm_judge
    criteria: "Response distinguishes crisis OKRs from normal OKRs — explains how OKRs in crisis mode differ from normal operation (shorter cadence, 100% committed with no aspirational, tighter check-in frequency, CEO-directed not team-collaborative, fewer objectives with more focus); proposes how to transition from crisis OKRs back to normal OKRs once survival is secured; addresses the post-turnaround growth OKRs (Day 91+: from surviving to thriving); the framework shows OKR flexibility across organizational contexts."
    weight: 0.30
    description: "CrisisVsNormalOKRs"
