meta:
  id: advanced-okr-shift
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "Advanced OKR shift — navigate a crisis where the company's OKRs become irrelevant overnight due to a market disruption, requiring rapid strategic reorientation"
  tags: [shift, crisis, market-disruption, reorientation, advanced]

state: {}

trigger: |
  You're the CEO of a 400-person B2B software company ($40M ARR)
  that sells workforce management software to the hospitality
  industry. It's Week 3 of Q1 and your OKRs have just become
  irrelevant.

  What happened: Your largest competitor (3x your size) just
  announced they're making their basic product FREE for companies
  under 500 employees. 70% of your customer base is under 500
  employees. This is an existential threat.

  Your Q1 OKRs (set 3 weeks ago, now obsolete):

  Company Objective 1: "Win the mid-market hospitality segment"
  - KR1: Close 50 new mid-market logos (100-500 employees)
  - KR2: Grow mid-market ARR from $15M to $20M
  - KR3: Launch mid-market-specific features (shift swapping,
    tip pooling, multi-location)
  - KR4: Achieve NPS of 60+ in mid-market segment

  Company Objective 2: "Build the platform for scale"
  - KR1: Migrate to microservices architecture (Phase 1)
  - KR2: Launch API marketplace with 10 integration partners
  - KR3: Reduce infrastructure cost per customer by 25%
  - KR4: Achieve SOC 2 Type II certification

  The crisis reveals:
  - 40% of your pipeline just went cold (prospects choosing free)
  - 5 existing customers have already asked about cancellation
  - Your mid-market value proposition is commoditized
  - Your enterprise features (500+ employees) are actually
    differentiated — the competitor's free product doesn't
    touch enterprise complexity
  - Your team is panicking — engineers are updating LinkedIn,
    salespeople are asking about commission guarantees

  Board meeting in 48 hours. The lead investor says: "This
  is either the end of the company or the beginning of the next
  chapter. It depends on how fast you pivot."

  Task: Rewrite the company's OKRs to respond to the crisis.
  Include the strategic reasoning, the new OKRs, and the
  communication plan for the team, customers, and board.

assertions:
  - type: llm_judge
    criteria: "Response creates crisis-responsive OKRs — rewrites company OKRs to address the competitive threat (likely pivoting upmarket to enterprise where the company has differentiation); the new OKRs are actionable within Q1 (8 remaining weeks); includes retention OKRs for at-risk mid-market customers; includes rapid enterprise acceleration OKRs; addresses the pipeline crisis with specific recovery targets; the OKRs reflect strategic clarity under pressure — choosing what to fight for and what to concede."
    weight: 0.35
    description: "CrisisOKRs"
  - type: llm_judge
    criteria: "Response includes strategic reasoning and board communication — explains the strategic logic for the pivot (enterprise differentiation, mid-market commoditization, competitive dynamics); prepares the board communication with an honest assessment of the threat and a credible response plan; the OKRs support a narrative the board can believe in; addresses the financial impact (what happens to the $15M mid-market ARR?) with scenario analysis; the 48-hour board meeting preparation is specific and actionable."
    weight: 0.35
    description: "StrategicReasoning"
  - type: llm_judge
    criteria: "Response addresses team communication and morale — proposes how to communicate the crisis and pivot to the 400-person team (honest about the threat, confident about the response, specific about what changes and what doesn't); addresses engineers' job security fears; addresses salespeople's commission concerns; addresses which of the original OKR work continues (SOC 2, microservices may still be relevant for enterprise push) and which is paused; the tone balances urgency with stability."
    weight: 0.30
    description: "TeamCommunication"
