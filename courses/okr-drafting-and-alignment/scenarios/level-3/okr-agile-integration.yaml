meta:
  id: okr-agile-integration
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR and agile integration — design how OKRs and agile sprints work together for a product organization that struggles with the quarterly-sprint tension"
  tags: [agile, sprint, integration, product-org, advanced]

state: {}

trigger: |
  You're the VP of Product at a SaaS company (80 engineers,
  12 product teams). Your organization uses both OKRs (quarterly)
  and agile (2-week sprints), but they're not connected. Teams
  treat them as separate systems:

  Current problems:
  1. Sprint planning happens without referencing OKRs — teams
     prioritize based on the loudest stakeholder, not strategic
     alignment
  2. OKR check-ins happen monthly but sprint demos happen bi-weekly
     — the cadences don't sync
  3. Teams complete sprints successfully (velocity is consistent)
     but miss their OKRs — "We shipped everything we planned but
     didn't move the needle on our key results"
  4. Product managers write OKRs in January and sprint tickets in
     Jira — the two never reference each other
  5. Engineering managers say: "OKRs are product's thing. We focus
     on sprint commitments and technical debt."
  6. When priorities change mid-quarter (customer escalation, CEO
     request), there's no framework for deciding whether to adjust
     OKRs or protect them

  Team structure:
  - 12 product teams, each with: 1 PM, 1 designer, 5-7 engineers
  - Using SAFe-inspired PI planning (quarterly)
  - 2-week sprints with planning, standup, demo, retro
  - Tools: Jira for sprints, Lattice for OKRs (not integrated)

  The CEO's question: "Why do we hit 90% of our sprint goals
  but only 60% of our OKRs? Are we doing the wrong work?"

  Task: Design the integrated OKR-Agile framework that connects
  quarterly OKRs to sprint execution. Include how PI planning
  connects to OKR setting, how sprint planning references OKRs,
  and how to handle mid-quarter priority changes.

assertions:
  - type: llm_judge
    criteria: "Response designs a coherent integrated framework — connects OKRs to sprints through a clear hierarchy (OKR → Epic/Initiative → User Stories → Sprint Tasks); aligns PI planning with OKR setting (PI objectives should map to quarterly OKRs); proposes how sprint planning references OKRs (every sprint has an OKR allocation target, e.g., 70% of sprint capacity tied to OKR-linked work); addresses the Jira-Lattice integration gap with practical linking mechanisms; the framework addresses all 6 listed problems."
    weight: 0.35
    description: "IntegratedFramework"
  - type: llm_judge
    criteria: "Response explains the output-outcome gap — addresses the CEO's question about why sprint goals are hit but OKRs are missed; explains the difference between output (shipping features) and outcome (moving key results); proposes mechanisms to ensure sprints are measured by OKR contribution, not just velocity; addresses how to link sprint demo content to OKR progress; includes outcome-based sprint reviews that assess 'did this sprint move our KRs?' not just 'did we complete the tickets?'"
    weight: 0.35
    description: "OutputOutcomeGap"
  - type: llm_judge
    criteria: "Response handles mid-quarter changes and engineering engagement — proposes a framework for handling priority changes (decision tree: does this affect an OKR? if yes, do we adjust the OKR or absorb it? who decides?); addresses engineering managers' disengagement from OKRs by making the connection between technical work and outcomes visible; includes roles and responsibilities for PMs and engineering managers in the integrated system; the framework is practical for 12 product teams."
    weight: 0.30
    description: "ChangeAndEngagement"
