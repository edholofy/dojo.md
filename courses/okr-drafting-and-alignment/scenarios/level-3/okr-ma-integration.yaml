meta:
  id: okr-ma-integration
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR in M&A integration — design OKRs for integrating an acquired company when both organizations have different goal-setting cultures"
  tags: [mergers-acquisitions, integration, culture-clash, advanced]

state: {}

trigger: |
  You're the VP of Integration at a mid-market software company
  ($200M ARR, 800 people) that just acquired a smaller competitor
  ($30M ARR, 120 people). The deal closed 2 weeks ago, and you
  need to set integration OKRs for Q1.

  The challenge: The two companies have fundamentally different
  approaches to goal-setting.

  Your company (acquirer):
  - Uses OKRs for 3 years, mature process
  - Quarterly cadence with weekly check-ins
  - Ambitious stretch goals (average score: 0.65)
  - Transparent — all OKRs visible to everyone
  - OKRs decoupled from compensation

  Acquired company:
  - Uses annual KPIs tied directly to bonuses
  - Goals set by managers, not collaboratively
  - Conservative targets (everyone hits 100%)
  - Private — goals visible only to employee and manager
  - Performance review based entirely on KPI achievement

  Acquired team's concerns:
  1. CEO (staying as GM): "If you force OKRs on my team, they'll
     see it as a power grab. Let us keep our process."
  2. VP Sales: "My team's comp is tied to KPIs. Changing to OKRs
     without changing comp means my team revolts."
  3. Engineers: "We heard OKR scores are public. In our old
     company, only our manager saw our ratings. This feels like
     surveillance."
  4. Top performer who was offered retention bonus: "If the goals
     change and I can't hit my targets, I'm leaving."

  Integration priorities:
  - Customer migration to unified platform (6 months)
  - Product roadmap integration (3 months to plan)
  - Sales team alignment (prevent customer confusion)
  - Engineering team merge (shared codebase by Q3)
  - Finance and ops consolidation (90 days)

  Task: Design the integration OKRs and the approach for merging
  two different goal-setting cultures without losing key talent
  from the acquired company.

assertions:
  - type: llm_judge
    criteria: "Response designs thoughtful integration OKRs — creates OKRs for the key integration priorities (customer migration, product roadmap, sales alignment, engineering merge, finance consolidation); the OKRs have measurable key results with realistic timelines; the OKR structure considers that two teams with different cultures are working together; integration OKRs are shared across both companies' teams where appropriate."
    weight: 0.35
    description: "IntegrationOKRs"
  - type: llm_judge
    criteria: "Response addresses each of the 4 acquired team concerns — proposes a gradual transition from KPIs to OKRs (not day-one forced adoption); addresses the comp structure concern (maintains existing comp structure for at least 2 quarters while introducing OKR exposure); addresses transparency fears with appropriate privacy during transition; addresses the top performer's retention concern with clear goal continuity; the approach prioritizes talent retention over process uniformity."
    weight: 0.35
    description: "ConcernAddressing"
  - type: llm_judge
    criteria: "Response proposes a cultural integration approach — designs a phased transition from KPIs to OKRs for the acquired team (Phase 1: maintain KPIs with OKR education; Phase 2: parallel running — KPIs for comp, OKRs for strategic alignment; Phase 3: full OKR adoption with revised comp); addresses the acquired CEO/GM's authority concern with respectful autonomy boundaries; acknowledges that the best elements of both systems might inform an improved unified approach; provides a timeline for full goal-setting integration."
    weight: 0.30
    description: "CulturalIntegration"
