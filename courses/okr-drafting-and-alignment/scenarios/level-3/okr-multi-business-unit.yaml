meta:
  id: okr-multi-business-unit
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "Multi-business-unit OKR alignment — align OKRs across 3 business units with different business models, maturity levels, and competitive dynamics"
  tags: [multi-bu, alignment, diverse-business, advanced]

state: {}

trigger: |
  You're the Chief Strategy Officer at a diversified technology
  company ($500M revenue, 2,000 employees) with 3 very different
  business units. The CEO wants unified company OKRs that all
  3 BUs contribute to, but the BU heads argue their businesses
  are too different for shared objectives.

  Business Unit 1 — Enterprise SaaS ($200M ARR, 800 people):
  - Mature, profitable (25% margin), growing 15% YoY
  - Market leader in their niche, defending position
  - OKR maturity: High (using OKRs for 4 years)
  - BU head says: "Our OKRs should focus on retention and
    expansion, not acquisition. Don't force growth metrics on us."

  Business Unit 2 — AI/ML Platform ($50M ARR, 500 people):
  - High growth (80% YoY), not yet profitable (-20% margin)
  - Market disruptor, competing with well-funded startups
  - OKR maturity: Medium (using OKRs for 1 year)
  - BU head says: "We need to move fast and break things. Don't
    slow us down with corporate OKR bureaucracy."

  Business Unit 3 — Professional Services ($250M revenue, 700 people):
  - Stable, profitable (15% margin), growing 5% YoY
  - People-dependent business, utilization-driven
  - OKR maturity: Low (just starting OKRs this year)
  - BU head says: "OKRs don't work for services. Our business is
    about utilization rates and client satisfaction, not product
    launches."

  Company-level strategic priorities:
  1. Cross-sell AI/ML platform to Enterprise SaaS customers
  2. Use Professional Services to drive implementation of both
     product BUs
  3. Achieve $650M total revenue next year (30% growth)
  4. Improve overall company margin from 12% to 18%

  Task: Write company-level OKRs and show how each BU's OKRs
  align to them while respecting their different business models
  and maturity levels.

assertions:
  - type: llm_judge
    criteria: "Response creates company OKRs that unite diverse BUs — writes 2-3 company-level objectives that all 3 BUs can contribute to meaningfully (not just revenue targets that favor one BU); addresses all 4 strategic priorities (cross-sell, services integration, revenue growth, margin improvement); then shows how each BU's OKRs ladder up to the company OKRs in ways that respect their business model (SaaS: retention and expansion, AI/ML: growth and product-market fit, Services: utilization and capability building); the alignment is genuine, not forced."
    weight: 0.35
    description: "UnifiedAlignment"
  - type: llm_judge
    criteria: "Response addresses each BU head's concern directly — shows Enterprise SaaS how company OKRs can include retention/expansion focus; shows AI/ML how OKRs provide strategic alignment without bureaucratic overhead; shows Services how OKRs can capture their unique metrics (utilization, client satisfaction, revenue per consultant) while connecting to company strategy; the response validates their concerns while demonstrating why alignment matters (especially for cross-sell and integration priorities that require BU coordination)."
    weight: 0.35
    description: "BUConcerns"
  - type: llm_judge
    criteria: "Response handles different OKR maturity levels — proposes different OKR complexity for each BU (Enterprise SaaS: full OKR cascade, AI/ML: streamlined team-level OKRs, Services: starter set with coaching); addresses the cross-BU OKR opportunities (shared OKRs for cross-sell initiative between Enterprise SaaS and AI/ML, shared OKRs for implementation excellence between Services and product BUs); provides a maturity roadmap to get all BUs to similar OKR capability within 2 years."
    weight: 0.30
    description: "MaturityAdaptation"
