meta:
  id: okr-remote-distributed
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for distributed teams — adapt OKR practices for a fully remote company across 12 time zones with asynchronous work culture"
  tags: [remote, distributed, async, time-zones, advanced]

state: {}

trigger: |
  You're the Head of Operations at a fully remote company
  (400 employees across 28 countries, 12 time zones). The
  company has been remote-first since founding and has a strong
  asynchronous work culture. You're redesigning the OKR process
  because the current approach (copied from in-office companies)
  isn't working.

  Current problems:
  1. OKR planning workshops require synchronous meetings, but
     there's no time when all teams can meet. Teams in APAC feel
     excluded from planning that happens during US business hours.
  2. Weekly OKR check-ins are video calls that require 4 AM or
     10 PM attendance for some team members.
  3. Cross-functional OKR alignment requires real-time discussion,
     but teams are rarely online simultaneously.
  4. Mid-quarter OKR adjustments are slow because getting
     consensus across time zones takes days.
  5. OKR scoring at end-of-quarter becomes a 3-week process as
     different regions respond at different speeds.
  6. Cultural differences affect OKR engagement: US teams are
     vocal about stretch goals, Asian teams prefer conservative
     commitments, European teams focus on work-life balance
     implications.

  Company principles:
  - Async-first: If it can be done async, it should be
  - Documentation over meetings: Write it down, don't call
  - Trust over surveillance: Focus on outcomes, not hours
  - Inclusive by design: No time zone should be disadvantaged

  Tools: Notion (docs), Linear (project management), Slack
  (communication), Loom (async video), Donut (virtual coffee)

  Task: Redesign the OKR process for a fully async, distributed
  company. Include the planning process, check-in rhythm,
  alignment mechanisms, and scoring approach — all optimized
  for async-first work.

assertions:
  - type: llm_judge
    criteria: "Response designs an async-first OKR process — replaces synchronous planning workshops with async alternatives (written proposals, async feedback rounds, structured Notion templates, Loom video pitches); replaces weekly check-in calls with async check-in mechanisms (automated progress updates, written reflections, dashboard updates); proposes async cross-functional alignment (shared Notion OKR pages, async commentary periods, escalation protocols for disagreements); addresses all 6 current problems with specific async solutions."
    weight: 0.35
    description: "AsyncOKRProcess"
  - type: llm_judge
    criteria: "Response addresses cultural and time-zone inclusivity — proposes mechanisms that ensure APAC, EMEA, and Americas teams have equal voice in OKR planning (rotating review windows, overlapping feedback periods); addresses cultural differences in goal-setting (provides frameworks for stretch vs conservative approaches that don't favor one culture); the OKR cadence doesn't create 4 AM obligations for any time zone; includes inclusive scoring processes that don't disadvantage slower-responding regions."
    weight: 0.35
    description: "InclusiveDesign"
  - type: llm_judge
    criteria: "Response leverages the company's existing tools effectively — uses Notion for OKR documentation and alignment views, Linear for connecting OKRs to project execution, Slack for automated check-in reminders and progress notifications, Loom for async video explanations of OKR rationale; the solution integrates into the existing tool ecosystem rather than adding new tools; includes specific templates or workflows for each phase of the OKR cycle; the process embodies the company's principles (async-first, documentation over meetings, trust over surveillance)."
    weight: 0.30
    description: "ToolIntegration"
