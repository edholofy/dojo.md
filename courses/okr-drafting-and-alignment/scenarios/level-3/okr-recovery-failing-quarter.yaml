meta:
  id: okr-recovery-failing-quarter
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR recovery from a failing quarter — assess a badly missed set of OKRs, conduct a retrospective, and design corrective actions for the next quarter"
  tags: [recovery, retrospective, failure-analysis, corrective, advanced]

state: {}

trigger: |
  You're the COO of a 300-person B2B SaaS company. Q2 just
  ended and the OKR results are the worst in company history.
  The average score across all teams was 0.35 (target: 0.7).
  The CEO is furious and wants to understand what went wrong.

  Q2 Results by department:

  Product (Score: 0.25):
  Objective: "Launch the next-generation platform"
  - KR1: Ship Platform v3 to all customers → Score: 0.0
    (not shipped — delayed to Q3)
  - KR2: Achieve 90% migration of customers to v3 → Score: 0.0
    (can't migrate if not shipped)
  - KR3: Reduce platform load time to <1s → Score: 0.5
    (improved from 3s to 1.5s but didn't hit target)
  - KR4: Zero critical bugs in production → Score: 0.5
    (reduced from 12 to 6 but didn't eliminate)

  Sales (Score: 0.45):
  Objective: "Become the market leader in financial services"
  - KR1: Close $2M in financial services ARR → Score: 0.5
    (closed $1M — pipeline was there but deals slipped)
  - KR2: Sign 10 financial services logos → Score: 0.3
    (signed 3 — longer sales cycle than expected)
  - KR3: Build $5M pipeline in financial services → Score: 0.6
    (built $3M — but leads came in late Q2)

  Marketing (Score: 0.30):
  Objective: "Dominate the financial services content landscape"
  - KR1: Publish 12 financial services case studies → Score: 0.25
    (published 3 — couldn't get customer permission)
  - KR2: Generate 500 financial services MQLs → Score: 0.3
    (generated 150 — new vertical, hard to reach)
  - KR3: Achieve 50% awareness among target buyers → Score: 0.35
    (achieved ~18% — brand awareness takes time)

  Engineering (Score: 0.40):
  Objective: "Build the most reliable platform in our market"
  - KR1: Achieve 99.99% uptime → Score: 0.5
    (achieved 99.8% — 3 major incidents)
  - KR2: Reduce MTTR to <15 min → Score: 0.3
    (MTTR was 40 min — incidents were complex)
  - KR3: Complete SOC 2 Type II audit → Score: 0.4
    (audit started but auditor found gaps, delayed)

  Task: Conduct the quarterly OKR retrospective. Identify root
  causes (not just symptoms), determine whether the problem was
  bad OKRs or bad execution, and design the Q3 OKR approach
  that learns from these failures.

assertions:
  - type: llm_judge
    criteria: "Response conducts a thorough root cause analysis — goes beyond 'we missed our targets' to identify systemic issues (were OKRs too ambitious for a company entering a new vertical? was Platform v3 a dependency that cascaded failures? did departments set OKRs independently without checking cross-functional dependencies?); identifies the key pattern: the company attempted a major platform migration AND a new vertical entry simultaneously — likely overcommitted; distinguishes between 'bad OKRs' problems (too ambitious, wrong targets, missing dependencies) and 'bad execution' problems (lack of resources, unexpected complexity)."
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Response provides actionable Q3 corrections — proposes how to set Q3 OKRs that learn from Q2's failures; addresses whether to continue the financial services strategy (with adjusted expectations) or pivot; proposes how to handle the Platform v3 delay's cascading impact; includes mechanisms to prevent multi-departmental OKR failures (dependency mapping, feasibility checks, mid-quarter course correction triggers); the Q3 approach is realistic and grounded in what actually went wrong in Q2."
    weight: 0.35
    description: "Q3Corrections"
  - type: llm_judge
    criteria: "Response addresses the cultural and process dimensions — addresses the CEO's frustration constructively (a 0.35 average is a learning opportunity, not a punishment trigger); proposes how to discuss the results with teams without destroying morale; examines the OKR process itself (were planning workshops effective? was cross-functional alignment checked? were check-ins conducted mid-quarter?); provides recommendations for improving the OKR-setting process, not just the OKR content; the retrospective is structured as a learning exercise, not a blame exercise."
    weight: 0.30
    description: "CulturalProcess"
