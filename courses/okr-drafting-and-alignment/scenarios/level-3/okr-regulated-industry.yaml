meta:
  id: okr-regulated-industry
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR in regulated industries — adapt OKRs for a pharmaceutical company where many objectives are mandated by regulators and compliance is non-negotiable"
  tags: [regulated, pharmaceutical, compliance, mandatory, advanced]

state: {}

trigger: |
  You're the VP of Operations at a mid-size pharmaceutical
  company (2,000 employees, $800M revenue). The CEO wants to
  implement OKRs, but the leadership team pushes back: "We're
  a pharma company. 60% of our 'objectives' are mandated by
  FDA, EMA, and other regulators. We can't set stretch goals
  on compliance — you either comply or you don't. OKRs seem
  designed for tech companies, not regulated industries."

  Specific challenges:

  1. Manufacturing: GMP (Good Manufacturing Practice) compliance
     is binary — you're compliant or you're not. A "stretch goal"
     on GMP makes no sense. But manufacturing DOES have improvement
     opportunities (yield, efficiency, waste reduction).

  2. R&D: Drug development timelines are set by clinical trial
     protocols and regulatory review. You can't set a "stretch
     goal" for FDA approval — the timeline is what it is. But
     R&D CAN improve clinical trial recruitment, data quality,
     and collaboration with CROs.

  3. Quality Assurance: Deviation rates, CAPA closure times, and
     audit readiness are compliance requirements. But QA CAN
     improve investigation efficiency, trend analysis, and
     preventive action effectiveness.

  4. Commercial: Sales and marketing in pharma are heavily
     regulated (can't make unapproved claims, HCP engagement
     rules). But commercial CAN innovate in digital engagement,
     patient support programs, and market access.

  5. Regulatory Affairs: Filing timelines and document quality
     are non-negotiable. But regulatory CAN improve submission
     strategy, health authority engagement, and label
     optimization.

  Context:
  - Recent FDA warning letter on manufacturing quality (resolved
    but still under heightened scrutiny)
  - 3 drugs in late-stage clinical trials (Phase III)
  - Biosimilar competition reducing revenue on lead product
  - Digital transformation initiative underway
  - Employee engagement: 58% (well below industry average of 68%)

  Task: Design an OKR framework specifically adapted for a
  regulated pharmaceutical company. Show how OKRs work when
  many objectives are mandated, and how to find the innovation
  and improvement space within regulatory constraints.

assertions:
  - type: llm_judge
    criteria: "Response designs a pharma-specific OKR framework — creates a two-tier OKR approach that separates compliance-mandatory objectives (committed OKRs scored pass/fail: GMP compliance, FDA filing timelines, audit readiness) from improvement/innovation objectives (aspirational OKRs scored on 0-1 scale: manufacturing efficiency, trial recruitment optimization, digital engagement innovation); addresses all 5 department challenges with specific OKR examples that work within their regulatory constraints; the framework respects regulatory reality while finding genuine stretch opportunities."
    weight: 0.35
    description: "PharmaOKRFramework"
  - type: llm_judge
    criteria: "Response shows where innovation exists within regulation — for each of the 5 departments, identifies the non-negotiable compliance baseline AND the improvement frontier; demonstrates that even in highly regulated environments, there's significant room for OKR-driven improvement (manufacturing yield from 85% to 92%, clinical trial recruitment time reduced by 30%, CAPA closure time from 45 to 20 days); the OKRs don't trivialize compliance or make it a stretch goal, but they don't let compliance be an excuse for not improving either."
    weight: 0.35
    description: "InnovationWithinRegulation"
  - type: llm_judge
    criteria: "Response addresses the company's specific context — incorporates the FDA warning letter (heightened compliance OKRs for manufacturing), the Phase III trials (R&D milestones as committed OKRs), biosimilar competition (commercial innovation as aspirational OKRs), low engagement (people-focused OKRs), and digital transformation (cross-functional OKRs); proposes how OKRs can help the company navigate its specific competitive and regulatory challenges; the framework is practical for 2,000 employees in a pharma culture."
    weight: 0.30
    description: "ContextualApplication"
