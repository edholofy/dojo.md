meta:
  id: okr-strategy-execution-bridge
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR as strategy-execution bridge — translate a 3-year strategic plan into actionable OKRs that connect vision to daily work"
  tags: [strategy, execution, bridge, long-term, advanced]

state: {}

trigger: |
  You're the Chief Strategy Officer at a mid-market insurance
  company ($2B in premiums, 3,000 employees). The board just
  approved a 3-year strategic plan, and the CEO wants you to
  translate it into OKRs that connect board-level strategy to
  daily execution.

  The 3-Year Strategic Plan:

  Strategic Pillar 1: "Digital-First Customer Experience"
  - Transform from agent-dependent to omnichannel model
  - Target: 50% of policies purchased online by Year 3
    (currently 8%)
  - Invest $50M in digital platforms over 3 years
  - Reduce policy issuance from 5 days to instant

  Strategic Pillar 2: "Data-Driven Underwriting"
  - Implement AI/ML-powered risk assessment
  - Target: 40% improvement in loss ratio
  - Reduce underwriting cycle from 2 weeks to 2 hours
  - Real-time pricing for personal lines

  Strategic Pillar 3: "Operational Excellence"
  - Automate 60% of claims processing
  - Reduce combined ratio from 98% to 92%
  - Consolidate from 4 legacy systems to 1 modern platform
  - Reduce operational headcount by 20% through automation
    (natural attrition, not layoffs)

  Strategic Pillar 4: "Talent & Culture"
  - Transform workforce from paper-pushers to digital experts
  - 100% of employees complete digital skills certification
  - Attract top tech talent (compete with insurtech startups)
  - Improve employee engagement from 55% to 80%

  The board's concern: "We've had 3-year plans before that
  died because nobody translated them into quarterly action.
  We want OKRs as the execution mechanism — show us how the
  3-year vision becomes next quarter's work."

  Task: Translate the 3-year strategic plan into Year 1 annual
  OKRs and Q1 quarterly OKRs. Show the clear connection from
  3-year pillars → annual OKRs → quarterly OKRs.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear strategy-to-OKR cascade — translates all 4 strategic pillars into Year 1 annual OKRs with appropriate first-year milestones (not trying to achieve 3-year targets in Year 1); then breaks Year 1 OKRs into Q1 quarterly OKRs that represent the first concrete steps; the traceability is clear (can follow any Q1 KR up through Year 1 KR to 3-year strategic target); Year 1 targets are appropriately calibrated (foundational work, not end-state outcomes)."
    weight: 0.35
    description: "StrategyCascade"
  - type: llm_judge
    criteria: "Response demonstrates the strategy-execution bridge concept — shows how abstract strategic goals ('digital-first customer experience') become concrete quarterly actions ('launch self-service quoting for auto insurance, achieve 5% online quote-to-bind rate'); addresses the board's concern about plans dying (quarterly OKRs create accountability checkpoints); explains how the OKR cadence creates a rhythm of strategy review and execution; includes the mechanism for Year 1 OKRs informing Year 2 planning."
    weight: 0.35
    description: "BridgeConcept"
  - type: llm_judge
    criteria: "Response is realistic for an insurance company — Q1 OKRs reflect the reality of insurance industry transformation (legacy system complexity, regulatory requirements, agent channel sensitivity, claims process constraints); the targets acknowledge that insurance transformation is slower than tech (you can't go from 8% to 50% online in Q1); the talent pillar recognizes the cultural challenge of transforming a traditional workforce; key results use insurance-specific metrics where appropriate (loss ratio, combined ratio, policy issuance time)."
    weight: 0.30
    description: "IndustryRealism"
