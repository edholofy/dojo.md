meta:
  id: okr-transformation-change-management
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR transformation change management — design the change management program for rolling out OKRs across a 1,000-person organization that has never used them"
  tags: [transformation, change-management, rollout, adoption, advanced]

state: {}

trigger: |
  You're the VP of Strategy at a 1,000-person financial services
  firm. The CEO has decided to implement OKRs company-wide after
  attending a conference. You've been tasked with the rollout.

  Current state:
  - Goal-setting: Annual MBO (Management by Objectives) process
    tied to year-end bonuses. Goals set in January, reviewed in
    December. Nobody looks at them in between.
  - Culture: Hierarchical, risk-averse, compliance-focused
  - Typical employee reaction: "Another corporate initiative
    that'll be gone in 6 months"
  - Middle management: Protective of their authority; concerned
    OKR transparency will expose their teams
  - Senior leadership: Mixed — CFO is skeptical ("We already
    have MBOs"), CPO is supportive, COO is neutral
  - Tools: SAP SuccessFactors for MBOs (expensive, nobody likes
    it, contractually locked for 2 more years)
  - Previous change attempts: The last 3 company-wide initiatives
    (lean, design thinking, agile) all died within 12 months

  Specific resistance signals:
  1. Sales VP: "My team hits quota or they don't. OKRs are
     overhead for something we already measure."
  2. Compliance head: "Our objectives are set by regulators,
     not by us. How do OKRs work when objectives are mandatory?"
  3. IT director: "We tried agile 2 years ago. Leadership got
     bored after 6 months and we went back to waterfall.
     Why would OKRs be different?"
  4. HR VP: "If OKRs replace MBOs, what happens to our bonus
     structure? The union will want to renegotiate."
  5. A senior director (privately): "My team looks great on
     paper right now. Transparent OKRs will show everyone we're
     actually struggling."

  Budget: $200K for the first year
  Timeline: CEO wants OKRs in place by Q1 of next year (4 months)

  Task: Design the OKR rollout and change management program.
  Address each resistance signal with specific strategies.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive change management program — includes a phased rollout (not big-bang for 1,000 people in 4 months); identifies pilot groups and success criteria; includes communication strategy (why OKRs, what's different from MBOs, what happens to bonuses); includes training at multiple levels (executives, middle managers, individual contributors); addresses the tool constraint (SAP SuccessFactors locked for 2 years — how to work within it or alongside it); the $200K budget is allocated realistically across the program."
    weight: 0.35
    description: "ChangeManagementProgram"
  - type: llm_judge
    criteria: "Response addresses each of the 5 resistance signals specifically — Sales VP: shows how OKRs complement quota tracking with strategic selling behavior; Compliance: demonstrates how regulatory objectives can be framed as OKRs with compliance as a committed objective; IT director: explains how OKR rollout will be different from failed agile attempt (sustained leadership commitment, different scope); HR VP: proposes MBO-to-OKR transition plan that addresses bonus structure and union concerns; Senior director: addresses transparency fear with psychological safety approach; each response is empathetic and specific, not generic change management platitudes."
    weight: 0.35
    description: "ResistanceStrategies"
  - type: llm_judge
    criteria: "Response addresses sustainability and the 'initiative fatigue' problem — directly addresses the history of failed corporate initiatives (lean, design thinking, agile all died); proposes specific mechanisms to prevent OKRs from the same fate (executive accountability, embedding in existing rhythms, demonstrating value within 90 days, not adding overhead); includes success metrics for the rollout itself (adoption rate, quality of OKRs written, check-in compliance, employee sentiment); provides a 12-month sustainability plan beyond the initial rollout."
    weight: 0.30
    description: "SustainabilityPlan"
