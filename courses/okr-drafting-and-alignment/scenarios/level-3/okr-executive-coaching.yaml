meta:
  id: okr-executive-coaching
  level: 3
  course: okr-drafting-and-alignment
  type: output
  description: "OKR executive coaching — coach a skeptical executive team through their first OKR-setting session, handling resistance and teaching by doing"
  tags: [coaching, executive, skepticism, teaching, advanced]

state: {}

trigger: |
  You're an external OKR coach hired to facilitate the executive
  team's first OKR-setting session at a 500-person logistics
  company. The CEO is enthusiastic about OKRs but the rest of
  the C-suite ranges from skeptical to hostile.

  The executives and their positions:

  CEO (sponsor): "I read 'Measure What Matters.' OKRs will
  transform us." (Danger: Overselling the methodology.)

  CFO (skeptic): "We already have budgets with targets. What does
  this add that P&L accountability doesn't?" Has been at the
  company 15 years. Controls the purse strings.

  CTO (hostile): "I've seen OKRs at 3 previous companies. Each
  time they became bureaucratic exercises in creative writing
  that added zero value to engineering." Technically brilliant,
  politically influential.

  CMO (enthusiastic but misguided): "Great! I'll set our OKR as
  'increase brand awareness by 500%!' Love stretch goals!"
  Doesn't understand the difference between aspirational and
  unrealistic.

  CHRO (cautious): "How do OKRs affect our performance
  management system? Our union contracts specify goal-setting
  processes. We can't just change them." Has a valid concern
  about legal/contractual implications.

  COO (pragmatic): "I'm fine with OKRs if they don't add more
  meetings to my calendar. Show me the ROI." Most likely ally
  if you can demonstrate practical value.

  Session parameters:
  - 4-hour offsite workshop
  - Goal: Walk out with 2-3 company-level OKRs drafted
  - Company context: $300M revenue, 500 employees, 15 warehouses
    across the US, margin pressure from Amazon logistics
  - Recent issues: 2 warehouse safety incidents, driver shortage,
    customer satisfaction declining

  Task: Design and script the 4-hour workshop. Include how you
  handle each executive's resistance, the exercises you use,
  and the OKRs you guide them to draft.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 4-hour workshop — includes a clear agenda with time allocations; starts with context-setting (why OKRs, what problem they solve, what they don't replace); includes interactive exercises (not just lecture); builds toward drafting 2-3 company OKRs by the end; the workshop design is realistic for a 4-hour block with 6 executives; includes breaks, discussion time, and drafting time; the pacing moves from education to application."
    weight: 0.35
    description: "WorkshopDesign"
  - type: llm_judge
    criteria: "Response handles each executive's resistance with specific tactics — addresses CFO's budget concern (OKRs complement financial targets with strategic direction); addresses CTO's negative experience (acknowledges past failures, explains what will be different); coaches CMO away from unrealistic targets toward proper stretch goals; addresses CHRO's union concern with a practical path (OKRs for leadership first, separate from union-contracted processes); leverages COO as ally by demonstrating efficiency; manages CEO's over-enthusiasm without undermining their sponsorship."
    weight: 0.35
    description: "ResistanceHandling"
  - type: llm_judge
    criteria: "Response produces credible company OKRs — guides the team to draft 2-3 objectives that address the company's real challenges (Amazon competition, warehouse safety, driver shortage, customer satisfaction); the OKRs feel like they came from the executive discussion, not imposed by the coach; key results are measurable and connected to the logistics business; the exercise demonstrates OKR value by producing something useful in the session itself — the executives leave with something concrete, not just training."
    weight: 0.30
    description: "CredibleOutput"
