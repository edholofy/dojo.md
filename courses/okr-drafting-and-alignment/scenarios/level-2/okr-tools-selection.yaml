meta:
  id: okr-tools-selection
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "OKR tools and tracking — evaluate OKR tracking tools and design a tracking system for a mid-size company transitioning from spreadsheets"
  tags: [tools, tracking, evaluation, spreadsheets, intermediate]

state: {}

trigger: |
  You're the Director of Business Operations at a 250-person
  company. The company has been tracking OKRs in Google Sheets
  for 2 years, and it's breaking down:

  Current problems with spreadsheet tracking:
  1. 30 teams × 3 objectives × 4 key results = 360 KRs tracked
     across 15 different spreadsheets
  2. Nobody updates their progress — check-in compliance is 30%
  3. No way to see alignment (can't trace team KR to company KR)
  4. Historical data is lost when sheets are copied for new quarters
  5. The CEO's "portfolio view" is manually assembled by an
     analyst every Monday (takes 4 hours)
  6. No notifications or reminders for check-ins
  7. Scoring at end of quarter takes 2 weeks because teams can't
     find their old targets

  The CEO has approved $30K/year for an OKR tool. You've
  shortlisted 3 options:

  Option A: Lattice ($12/user/month = $36K/year)
  - Full OKR + performance management integration
  - Alignment views, progress tracking, 1:1 agendas
  - Heavy — also includes reviews, compensation, engagement
  - 6-week implementation with dedicated CSM
  - Pro: Replaces 3 tools. Con: Overkill if you just need OKRs

  Option B: Weekdone ($9/user/month = $27K/year)
  - Purpose-built for OKRs + weekly check-ins
  - Lightweight, easy to adopt, good Slack integration
  - Limited reporting and analytics
  - 2-week implementation, self-service
  - Pro: Simple and fast. Con: May outgrow it in 2 years

  Option C: Custom Notion setup ($8/user/month = $24K/year)
  - Build OKR tracking in Notion (already used by 60% of company)
  - Flexible, customizable, familiar to many users
  - No native OKR features — requires manual configuration
  - Ongoing maintenance by ops team
  - Pro: Cheapest, familiar. Con: Not purpose-built, fragile

  Task: Write the evaluation and recommendation. Include
  selection criteria, analysis of each option, your
  recommendation, and an implementation plan for the chosen tool.

assertions:
  - type: llm_judge
    criteria: "Response provides a structured evaluation — defines clear selection criteria (ease of adoption, alignment visibility, check-in automation, reporting/analytics, integration with existing tools, scalability, cost, implementation time); evaluates all 3 options against the criteria systematically; addresses all 7 current problems and how each option solves them; the analysis is balanced and acknowledges trade-offs rather than just advocating for one option."
    weight: 0.35
    description: "StructuredEvaluation"
  - type: llm_judge
    criteria: "Response makes a clear recommendation with rationale — selects one option with specific reasons tied to the company's context (250 people, 30 teams, 360 KRs, $30K budget, current pain points); explains why the alternatives weren't chosen without dismissing them; the recommendation considers both short-term needs (solve the spreadsheet problems) and long-term needs (scalability as company grows); addresses the budget constraint realistically."
    weight: 0.35
    description: "ClearRecommendation"
  - type: llm_judge
    criteria: "Response includes a practical implementation plan — provides a rollout timeline (pilot with 3-5 teams, then company-wide); addresses change management (moving from spreadsheets to a new tool requires adoption effort); includes training plan; defines success metrics for the tool (check-in compliance target, time saved on portfolio reporting, alignment visibility); addresses data migration from existing spreadsheets; the plan is realistic for a 250-person company."
    weight: 0.30
    description: "ImplementationPlan"
