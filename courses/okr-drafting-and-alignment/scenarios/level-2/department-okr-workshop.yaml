meta:
  id: department-okr-workshop
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "Department OKR workshop — facilitate an OKR-setting workshop for a department, managing conflicting priorities and limited resources"
  tags: [workshop, facilitation, department, priorities, intermediate]

state: {}

trigger: |
  You're the Director of Customer Success at a SaaS company.
  You're facilitating your department's Q1 OKR-setting workshop
  with your 4 team leads. The workshop is getting contentious
  because everyone wants different priorities.

  Department: Customer Success (20 people total)
  - Onboarding Team (5 people, lead: Sarah): Gets new customers
    to first value
  - Retention Team (6 people, lead: Marcus): Prevents churn,
    manages renewals
  - Expansion Team (4 people, lead: Aisha): Drives upsells and
    cross-sells
  - Support Team (5 people, lead: Derek): Technical support
    and troubleshooting

  Company Q1 priority (from CEO): "Reduce churn and grow revenue
  from existing customers — new sales are slowing, so our
  existing customer base is everything."

  Each team lead's proposed priority:

  Sarah (Onboarding): "We need to overhaul our onboarding. Time
  to value is 30 days — competitors are at 14. If we don't fix
  this, we'll keep losing customers in the first 90 days. I need
  2 engineers from Product to rebuild the onboarding flow."

  Marcus (Retention): "Churn is at 12% annually — it should be
  under 8%. I need a health scoring model and an early warning
  system. But I also need headcount — my team is overwhelmed
  managing 500 accounts with 6 people."

  Aisha (Expansion): "We're leaving $2M on the table in upsell
  opportunities. But I only have 4 people and no sales tools
  optimized for expansion. If churn is the priority, shouldn't
  we be investing in expansion to offset losses?"

  Derek (Support): "Ticket resolution time is 4 hours. Our SLA
  is 2 hours. We're violating our contracts. If we don't fix
  support, nothing else matters — customers will leave regardless
  of onboarding or health scores."

  Constraints:
  - No new headcount approved for Q1
  - Limited engineering support (can request 1 engineer part-time)
  - $50K discretionary budget for tools/resources
  - Must show churn improvement by end of Q1

  Task: Facilitate the workshop outcome. Write the department's
  Q1 OKRs that balance the 4 teams' competing priorities within
  the constraints. Explain your prioritization rationale.

assertions:
  - type: llm_judge
    criteria: "Response creates balanced department OKRs — produces 2-3 department-level objectives with 3-4 key results each that address the CEO's churn priority while acknowledging all 4 teams' concerns; the OKRs don't just favor one team — they find synergies (onboarding improvements reduce early churn, health scoring helps retention, support improvements prevent escalation-driven churn); key results are measurable with specific targets tied to the provided metrics."
    weight: 0.35
    description: "BalancedOKRs"
  - type: llm_judge
    criteria: "Response demonstrates effective facilitation and prioritization — explains the prioritization rationale (why some initiatives get priority over others this quarter); addresses each team lead's concern directly (not dismissively); finds creative solutions within constraints (no headcount, limited engineering, $50K budget); proposes how the team with lower Q1 priority gets attention in Q2; the approach would resolve the workshop contention, not create more of it."
    weight: 0.35
    description: "FacilitationQuality"
  - type: llm_judge
    criteria: "Response connects OKRs to the constraint reality — the OKR targets are achievable without new headcount; the $50K budget is allocated to the highest-leverage tools; the part-time engineer is assigned to the most impactful technical work; the OKRs don't promise outcomes that require resources the department doesn't have; the plan addresses the support SLA violation as urgent while still investing in strategic churn reduction."
    weight: 0.30
    description: "ConstraintAwareness"
