meta:
  id: committed-vs-aspirational
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "Committed vs aspirational OKRs — create a balanced set of OKRs that distinguishes between must-hit commitments and stretch moonshots"
  tags: [committed, aspirational, moonshot, balance, intermediate]

state: {}

trigger: |
  You're the VP of Sales at a Series C SaaS company ($30M ARR,
  300 employees). Your CEO has asked you to implement the
  Google-style distinction between "committed" and "aspirational"
  OKRs for the sales org.

  The CEO's directive: "I want to know which OKRs are commitments
  we WILL hit (scored pass/fail at 1.0) and which are moonshots
  we're stretching for (scored at 0.7 as success). Last quarter,
  we couldn't tell the difference — some teams played it safe
  with easy goals and scored 1.0 everywhere, while others set
  aggressive targets and scored 0.5 looking like failures. We
  need a system."

  Sales org context:
  - 25 account executives (10 enterprise, 15 mid-market)
  - Q4 target: $12M in new ARR (committed by the board)
  - Current pipeline: $35M (2.9x coverage — healthy)
  - Win rate: 28% enterprise, 35% mid-market
  - Average deal size: $180K enterprise, $45K mid-market
  - New products launching: AI add-on ($50K ACV uplift)
  - Expansion revenue target: $4M from existing customers
  - Sales cycle: 90 days enterprise, 45 days mid-market
  - Challenge: Net new logo acquisition has plateaued

  Board commitments (non-negotiable):
  - $12M new ARR
  - Maintain CAC payback period under 18 months
  - Keep sales team retention above 85%

  Task: Write Q4 OKRs for the sales org that clearly distinguish
  between committed OKRs (must-hit, scored at 1.0) and
  aspirational OKRs (stretch, scored at 0.7). Explain the
  scoring criteria for each type.

assertions:
  - type: llm_judge
    criteria: "Response clearly distinguishes committed and aspirational OKRs — creates separate, clearly labeled committed OKRs (tied to board commitments: $12M ARR, CAC payback, team retention) and aspirational OKRs (stretch goals: new market segments, AI add-on adoption, net new logo growth); committed OKRs have targets that must be achieved at 1.0; aspirational OKRs have aggressive stretch targets where 0.6-0.7 achievement is considered success; the distinction is clear and explained."
    weight: 0.35
    description: "CommittedVsAspirational"
  - type: llm_judge
    criteria: "Response creates a balanced portfolio of OKRs — includes both committed and aspirational types; committed OKRs cover the non-negotiable board commitments without padding; aspirational OKRs push the org beyond comfort zone (new logo growth plateau, AI product adoption, enterprise deal size expansion); the total set doesn't overwhelm the 25-person sales org; each OKR has measurable key results with specific numbers derived from the provided context."
    weight: 0.35
    description: "BalancedPortfolio"
  - type: llm_judge
    criteria: "Response explains scoring philosophy and addresses the cultural problem — explains how committed OKRs are scored (binary: hit or miss, 1.0 expected) vs aspirational (0.7 is great, 0.4-0.6 is learning, under 0.3 was wrong target); addresses the CEO's concern about teams gaming the system (safe teams scoring 1.0, ambitious teams looking like failures); proposes how to evaluate teams fairly when they have different mixes of committed and aspirational OKRs; the scoring system incentivizes appropriate ambition."
    weight: 0.30
    description: "ScoringPhilosophy"
