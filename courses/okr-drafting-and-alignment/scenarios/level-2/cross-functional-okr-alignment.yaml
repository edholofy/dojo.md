meta:
  id: cross-functional-okr-alignment
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "Cross-functional OKR alignment — align OKRs across product, engineering, and design teams working on a shared initiative"
  tags: [cross-functional, alignment, collaboration, intermediate]

state: {}

trigger: |
  You're the VP of Product at a B2B SaaS company (300 employees).
  Three teams — Product, Engineering, and Design — are working
  on a shared initiative: launching a new analytics dashboard
  for enterprise customers by end of Q2.

  The problem: Each team wrote their Q2 OKRs independently and
  they don't align. There are gaps, overlaps, and conflicts:

  Product Team OKRs:
  Objective: "Launch the most powerful analytics dashboard
  in our market"
  - KR1: Ship analytics dashboard v1 to 100 enterprise customers
  - KR2: Achieve 60% weekly active usage among dashboard users
  - KR3: Generate $200K in upsell revenue from analytics tier
  - KR4: Achieve NPS of 50+ from dashboard beta users

  Engineering Team OKRs:
  Objective: "Build a scalable, high-performance data platform"
  - KR1: Process 10M events/day with <500ms query response
  - KR2: Achieve 99.99% uptime for the analytics service
  - KR3: Reduce infrastructure cost per customer by 30%
  - KR4: Complete SOC 2 compliance for the analytics module

  Design Team OKRs:
  Objective: "Create an intuitive, beautiful analytics experience"
  - KR1: Conduct 20 user research sessions with enterprise users
  - KR2: Achieve SUS (System Usability Scale) score of 80+
  - KR3: Design and test 5 interactive chart components
  - KR4: Create a comprehensive design system for data visualization

  Conflicts and gaps:
  1. Product wants to ship to 100 customers in Q2, but Engineering
     is focused on scalability — are they planning for the same
     timeline?
  2. Design wants 20 user research sessions, but Product hasn't
     allocated time for customers to participate in research
  3. Engineering's SOC 2 compliance could delay the launch
  4. Nobody owns the data pipeline that connects to customer data
  5. Product's revenue KR depends on pricing that hasn't been set
  6. Design's SUS score depends on a shipped product, but
     Engineering's timeline is unclear

  Task: Facilitate the alignment. Rewrite or adjust the OKRs
  so all three teams are aligned on the shared initiative.
  Identify dependencies, resolve conflicts, and create a
  coherent cross-functional OKR set.

assertions:
  - type: llm_judge
    criteria: "Response identifies and resolves all 6 conflicts — addresses the timeline misalignment between Product shipping and Engineering scalability work; resolves the user research access gap; handles the SOC 2 timeline conflict with the launch; assigns data pipeline ownership; addresses the pricing dependency for the revenue KR; resolves the SUS score timing issue; the resolution approach is practical and considers trade-offs."
    weight: 0.35
    description: "ConflictResolution"
  - type: llm_judge
    criteria: "Response creates aligned cross-functional OKRs — rewrites or adjusts the three teams' OKRs so they work together coherently; creates shared milestones or dependencies that are explicitly tracked; each team's OKRs support the shared initiative while preserving their domain expertise; the combined OKR set tells a coherent story about launching the analytics dashboard; includes a mechanism for cross-team coordination (shared check-ins, dependency tracking)."
    weight: 0.35
    description: "AlignedOKRs"
  - type: llm_judge
    criteria: "Response demonstrates sophisticated alignment thinking — goes beyond just fixing the 6 listed conflicts to identify the structural issue (teams wrote OKRs independently without coordination); proposes a process improvement for future OKR cycles (joint planning sessions, dependency workshops); the aligned OKRs maintain each team's autonomy while ensuring shared accountability; suggests a shared dashboard-level objective that all three teams contribute to."
    weight: 0.30
    description: "AlignmentProcess"
