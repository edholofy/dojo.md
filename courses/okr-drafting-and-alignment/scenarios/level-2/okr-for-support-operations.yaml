meta:
  id: okr-for-support-operations
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for support and operations — write OKRs for teams whose work is primarily reactive and operational, not project-based"
  tags: [operations, support, reactive-work, intermediate]

state: {}

trigger: |
  You're the VP of Customer Operations at an e-commerce company.
  Your org includes 3 teams that struggle with OKRs because their
  work is primarily reactive (responding to customer issues,
  maintaining systems, processing orders) rather than proactive
  (building new features, launching campaigns).

  Teams and their challenges:

  Customer Support (25 agents, 3 team leads):
  - Handle 500 tickets/day across email, chat, phone
  - Current metrics: CSAT 82%, first response time 45 min,
    resolution time 4 hours, first contact resolution 68%
  - Team lead's frustration: "Our work is answering tickets.
    How do we write OKRs that aren't just 'keep doing our job
    but better'? That's a KPI, not an OKR."

  IT Operations (8 engineers):
  - Maintain uptime, respond to incidents, manage infrastructure
  - Current: 99.7% uptime, MTTR 45 minutes, 3 P1 incidents/month
  - Team lead: "We can't predict what breaks. Our 'objectives'
    are just 'keep things running.' OKRs feel designed for product
    teams, not ops."

  Order Fulfillment (15 staff):
  - Process 2,000 orders/day, manage warehouse, handle returns
  - Current: 97% order accuracy, 2.1 day average shipping time,
    12% return rate
  - Manager: "We process orders. That's the job. What's our
    'aspirational objective' — process orders faster? That's
    already a KPI."

  The CEO insists all departments use OKRs: "Everyone can
  improve. Operational excellence is a strategy, not a baseline."

  Task: Write Q2 OKRs for each of the 3 operational teams
  (1-2 objectives with 3-4 key results each). Show how
  reactive/operational teams can use OKRs to drive improvement,
  not just maintain the status quo.

assertions:
  - type: llm_judge
    criteria: "Response writes OKRs that go beyond KPI maintenance — each team's OKRs focus on strategic improvement, not just incrementally better metrics; identifies transformation opportunities for each team (support: self-service to reduce ticket volume, proactive outreach; IT ops: reliability engineering to prevent incidents, automation; fulfillment: process innovation, waste reduction, customer experience); the OKRs are genuinely about change and improvement, not just 'do your job 5% better.'"
    weight: 0.35
    description: "BeyondKPIs"
  - type: llm_judge
    criteria: "Response addresses each team lead's specific objection — responds to support's concern about OKRs being KPIs by showing the difference (KPI: maintain CSAT at 82%; OKR: transform support so 40% of issues are self-resolved); responds to IT ops' unpredictability concern with proactive engineering goals; responds to fulfillment's 'we just process orders' mindset with operational excellence as strategy; the arguments are persuasive and specific to each team's context."
    weight: 0.35
    description: "ObjectionHandling"
  - type: llm_judge
    criteria: "Response produces practical OKRs for operational teams — key results are measurable and achievable within one quarter; the targets account for the reality that these teams still need to maintain day-to-day operations while pursuing improvements; proposes how to allocate improvement work alongside reactive workload (e.g., 20% time for projects, dedicated improvement sprints); each team's OKRs use the provided baseline metrics as starting points."
    weight: 0.30
    description: "PracticalOps"
