meta:
  id: okr-annual-planning
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "OKR annual planning — set annual company OKRs that provide strategic direction while remaining adaptable across 4 quarters"
  tags: [annual, company-level, strategic-planning, intermediate]

state: {}

trigger: |
  You're the CEO of a 150-person EdTech company ($15M ARR).
  It's November and you're setting the company's annual OKRs for
  next year at your leadership offsite. Your 5 VPs are in the
  room: Product, Engineering, Sales, Marketing, and People.

  Strategic context for next year:
  - Goal: Reach $25M ARR (67% growth) to position for Series B
  - Current customers: 500 school districts, primarily K-8
  - Opportunity: Expand to high school market (9-12) — zero
    presence today but $200M TAM
  - Threat: Two well-funded competitors entering the K-8 space
  - Product: Core platform is solid but aging; needs AI features
    to stay competitive
  - Team: Need to hire 50 people next year (33% headcount growth)
  - Financials: 18 months of runway; Series B needed by Q3

  VP input from the offsite discussion:

  VP Product: "We need annual OKRs that give us direction but
  don't lock us into specific features for Q3 and Q4. The
  market changes too fast."

  VP Sales: "I need clarity on whether we're going after high
  school or defending K-8. I can't hire for both."

  VP Engineering: "If we're doing AI and high school expansion
  simultaneously, we need to sequence them. We can't do both
  in Q1."

  VP Marketing: "Annual OKRs are useless for marketing — our
  campaigns change quarterly. Give me the strategic themes and
  I'll set quarterly OKRs."

  VP People: "Hiring 50 people requires different OKRs than
  maintaining a team. This is a transformation year for HR."

  Task: Write the company's annual OKRs (2-3 objectives with
  3-5 key results each). Address the VPs' concerns and explain
  how annual OKRs translate to quarterly focus areas.

assertions:
  - type: llm_judge
    criteria: "Response writes strategic annual OKRs — includes 2-3 objectives that capture the year's strategic priorities (growth to $25M ARR, market expansion, competitive defense, team scaling); each has 3-5 measurable key results with annual targets; the OKRs balance competing priorities (K-8 defense vs high school expansion, AI features vs platform stability, growth vs runway); the objectives are high-level enough to remain relevant all year while being specific enough to guide decisions."
    weight: 0.35
    description: "AnnualOKRs"
  - type: llm_judge
    criteria: "Response addresses each VP's concern — responds to Product's flexibility concern by showing how annual OKRs set direction without specifying features; addresses Sales' focus question with clear market priority guidance; addresses Engineering's sequencing need by suggesting quarterly phasing; responds to Marketing's preference for quarterly OKRs by explaining how annual themes translate to quarterly campaigns; addresses People's transformation year needs; the response demonstrates that annual OKRs are strategic direction, not tactical plans."
    weight: 0.35
    description: "VPConcerns"
  - type: llm_judge
    criteria: "Response shows how annual OKRs translate to quarterly focus — includes a quarterly phasing suggestion (e.g., Q1: foundation and K-8 defense, Q2: AI features launch, Q3: high school market entry, Q4: Series B positioning); explains the relationship between annual KRs and quarterly KRs (annual KR is the destination, quarterly KRs are milestones along the way); addresses the Series B timeline as a forcing function; the plan is realistic for a 150-person company growing to 200."
    weight: 0.30
    description: "QuarterlyTranslation"
