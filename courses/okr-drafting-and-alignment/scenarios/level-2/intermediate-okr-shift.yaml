meta:
  id: intermediate-okr-shift
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "Intermediate OKR shift — handle a situation where a team's OKRs are technically well-written but strategically misaligned with changing company priorities"
  tags: [shift, misalignment, strategic, intermediate]

state: {}

trigger: |
  You're the COO of a 200-person fintech company. It's the
  start of Q3 and you've discovered a significant alignment
  problem across the organization.

  Background: In Q2, the company's strategy was "grow at all
  costs." The Q3 strategy has shifted to "efficient growth" after
  investors demanded a path to profitability. The CEO announced
  this shift at the all-hands 2 weeks ago.

  The problem: You've reviewed the Q3 OKRs from all departments
  and most of them still reflect the "grow at all costs" mindset.
  The OKRs are well-written (specific, measurable, ambitious),
  but they're driving the WRONG behavior.

  Examples of misaligned OKRs:

  Marketing:
  Objective: "Flood the top of funnel with qualified leads"
  - KR1: Generate 10,000 MQLs (50% increase over Q2)
  - KR2: Launch 5 new paid acquisition channels
  - KR3: Increase marketing spend by 40% to $800K/month
  Problem: Increasing spend by 40% contradicts efficient growth

  Sales:
  Objective: "Close deals at unprecedented velocity"
  - KR1: Reduce average discount from 25% to 15%
  - KR2: Close 50 new logos (40% increase)
  - KR3: Hire 8 new AEs to expand capacity
  Problem: Hiring 8 AEs increases burn significantly

  Product:
  Objective: "Build the features that win every competitive deal"
  - KR1: Ship 15 new features this quarter
  - KR2: Reduce feature request backlog by 50%
  - KR3: Launch in 2 new verticals simultaneously
  Problem: Shipping 15 features = high engineering cost,
  likely low quality; 2 new verticals = resource spread

  Engineering:
  Objective: "Scale our infrastructure for hypergrowth"
  - KR1: Triple server capacity to handle 10x user growth
  - KR2: Hire 12 engineers (bringing team from 30 to 42)
  - KR3: Migrate to microservices architecture
  Problem: Tripling capacity and hiring 12 people is
  expensive and speculative

  Only Finance got it right:
  Objective: "Build a sustainable financial engine"
  - KR1: Reduce cash burn from $1.5M to $800K/month
  - KR2: Improve gross margin from 60% to 72%
  - KR3: Achieve CAC payback under 12 months (currently 22)
  - KR4: Extend runway from 14 to 20 months

  Task: Rewrite the misaligned OKRs for Marketing, Sales,
  Product, and Engineering to reflect the "efficient growth"
  strategy. Explain to each department what changed and why.

assertions:
  - type: llm_judge
    criteria: "Response rewrites all 4 departments' OKRs — each department gets revised OKRs that align with 'efficient growth' (Marketing: focus on CAC efficiency and high-quality leads over volume; Sales: focus on deal quality, upselling, and efficiency over hiring; Product: focus on core product excellence over feature quantity; Engineering: focus on efficiency, automation, and cost optimization over scaling for hypothetical growth); the rewritten OKRs maintain ambitious improvement targets while driving efficient behavior."
    weight: 0.35
    description: "RewrittenOKRs"
  - type: llm_judge
    criteria: "Response explains the strategic shift clearly to each department — each department gets a specific explanation of what was wrong with their original OKRs and why (not just 'these don't align' but 'generating 10,000 MQLs while increasing spend by 40% means you're optimizing for volume at any cost, which is exactly what we're moving away from'); the explanations are empathetic (acknowledging the OKRs were well-written for the old strategy) and constructive (here's how to channel that energy toward the new strategy)."
    weight: 0.35
    description: "StrategicExplanation"
  - type: llm_judge
    criteria: "Response demonstrates systemic thinking — identifies why this misalignment happened (the strategy shifted but OKR-setting didn't incorporate the shift); proposes process improvements to prevent future misalignment (strategy review before OKR-setting, alignment checkpoints, executive review of OKRs against strategic priorities); uses Finance's correctly aligned OKRs as a positive example; the revised OKRs across all 4 departments work together coherently and support Finance's sustainability goals."
    weight: 0.30
    description: "SystemicThinking"
