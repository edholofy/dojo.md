meta:
  id: okr-performance-decoupling
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "OKR and performance review decoupling — design a system where OKRs inform but don't directly determine compensation and performance reviews"
  tags: [performance-review, compensation, decoupling, intermediate]

state: {}

trigger: |
  You're the VP of People at a 400-person tech company. The
  company has been using OKRs for 2 years, but there's a
  growing problem: OKRs are directly tied to performance
  reviews and bonuses. The result is predictable — everyone
  is sandbagging.

  Evidence of sandbagging:
  - Average OKR score across the company: 0.92 (should be ~0.7
    if goals are appropriately ambitious)
  - A VP privately admitted: "I tell my team to set goals they
    know they can hit. Why would I let them set stretch goals
    when their bonus depends on the score?"
  - Engineering team scored 0.95 last quarter — but shipped
    fewer features than any quarter in the past year
  - Sales team's OKR was "hit $3M in new ARR" — they hit $3.1M.
    The quarter before (without OKRs), they closed $3.5M.
  - The top-performing PM quit, saying: "I'm penalized for
    being ambitious. My OKR score was 0.6 because I aimed high,
    while my colleague scored 0.9 by aiming low. She got a
    bigger bonus."

  The CEO acknowledges the problem: "We need to separate OKRs
  from compensation. But I also need some way to evaluate
  performance. If OKRs don't count, what does? And how do I
  prevent people from not taking OKRs seriously if there's no
  financial consequence?"

  Current compensation structure:
  - Base salary + 15-20% target bonus
  - Bonus calculation: 50% company performance, 30% OKR score,
    20% manager discretion
  - Performance reviews: twice yearly, heavily weighted on OKR
    achievement

  Task: Design the new system that decouples OKRs from
  compensation while maintaining accountability. Include the
  revised performance review framework, the new bonus structure,
  and how OKRs fit into the picture without being directly tied
  to pay.

assertions:
  - type: llm_judge
    criteria: "Response designs a clear decoupled system — separates OKRs from direct compensation calculation; creates a new performance evaluation framework that considers competencies, impact, collaboration, and growth alongside (but separate from) OKR achievement; redesigns the bonus structure to remove the direct OKR score → bonus link; explains how OKRs inform performance conversations without determining pay; the system maintains accountability for OKR outcomes without incentivizing sandbagging."
    weight: 0.35
    description: "DecoupledSystem"
  - type: llm_judge
    criteria: "Response addresses the CEO's concerns — explains how people will take OKRs seriously without financial consequences (public visibility, strategic alignment, team coordination value, professional reputation); addresses the accountability gap (what happens if someone ignores their OKRs entirely?); provides a framework for evaluating performance that captures what the OKR score was trying to measure (impact, execution, ambition) without the perverse incentives; uses the specific examples (sandbagging VP, top PM quitting) to illustrate how the new system would handle each case differently."
    weight: 0.35
    description: "AccountabilityConcerns"
  - type: llm_judge
    criteria: "Response provides practical implementation — includes a transition plan from the current system to the new one (can't just remove the bonus link overnight); addresses communication to employees about the change; proposes a new performance review format that includes OKR reflection without OKR scoring driving the rating; the new bonus structure is specific (not just 'remove OKRs from the formula' but proposes what replaces that 30%); addresses how to calibrate performance across teams when OKR scores are no longer comparable."
    weight: 0.30
    description: "PracticalImplementation"
