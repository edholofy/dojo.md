meta:
  id: multi-level-okr-cascade
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "Multi-level OKR cascade — design OKRs that cascade from company to VP to director to team level, maintaining alignment at every layer"
  tags: [cascade, multi-level, hierarchy, alignment, intermediate]

state: {}

trigger: |
  You're the Chief of Staff at a 1,000-person healthcare
  technology company. The CEO has set the company's annual OKRs
  and wants you to design the cascade to all levels. The company
  has 4 levels of OKRs: Company → VP → Director → Team.

  Company Annual OKRs (set by CEO):

  Objective 1: "Become the trusted technology partner for
  hospital systems nationwide"
  - KR1: Grow from 200 to 350 hospital system customers
  - KR2: Achieve Net Revenue Retention of 130%+
  - KR3: Win "Best Healthcare IT Solution" from KLAS Research
  - KR4: Reduce customer implementation time from 9 months
    to 4 months

  Objective 2: "Build a world-class organization that attracts
  and retains the best talent in healthcare tech"
  - KR1: Improve employee engagement score from 72 to 85
  - KR2: Reduce voluntary turnover from 18% to 12%
  - KR3: Fill 100% of VP+ positions within 60 days
  - KR4: Achieve Glassdoor rating of 4.5+ (currently 3.8)

  Your focus: Cascade Objective 1 through the Sales VP
  organization:

  VP of Sales: reports to CEO, owns revenue growth
  - Director of Enterprise Sales: 8 enterprise AEs
  - Director of Mid-Market Sales: 12 mid-market AEs
  - Director of Sales Operations: 4 ops analysts
  - Director of Partnerships: 3 partnership managers

  Task: Write the cascade for Q1 — VP-level OKRs, then each
  Director's OKRs, showing how each level connects to the one
  above. Each level should have 1-2 objectives with 3-4 key
  results.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 3-level cascade — VP of Sales has 1-2 objectives with 3-4 KRs that directly support the company objective; each of the 4 Directors has 1-2 objectives with 3-4 KRs that support the VP's OKRs; the cascade is traceable (can draw a line from any Director KR up through VP KR to Company KR); each level adds specificity appropriate to its scope (VP: strategic revenue targets, Directors: tactical execution within their domain)."
    weight: 0.35
    description: "CompleteCascade"
  - type: llm_judge
    criteria: "Response maintains alignment without duplication — each level's OKRs add unique value rather than just restating the level above with smaller numbers; the VP's OKRs aren't just the company OKRs with 'Sales' prepended; Directors' OKRs reflect their specific domains (Enterprise vs Mid-Market vs Ops vs Partnerships); key results at lower levels are more operational and actionable than higher levels; the cascade shows how different functions contribute to the same top-level goal."
    weight: 0.35
    description: "AlignmentWithoutDuplication"
  - type: llm_judge
    criteria: "Response addresses the quarterly vs annual challenge — the company OKRs are annual, but the cascade produces Q1 OKRs; the Q1 targets represent reasonable first-quarter contributions toward annual targets (not just dividing annual targets by 4 — some KRs front-load, some ramp); includes consideration for what changes in Q2-Q4; the Sales Ops and Partnerships directors' OKRs enable the revenue-generating directors' success."
    weight: 0.30
    description: "QuarterlyAnnualBalance"
