meta:
  id: okr-cadence-design
  level: 2
  course: okr-drafting-and-alignment
  type: output
  description: "OKR cadence design — design the annual and quarterly OKR cadence including planning, check-ins, and reviews for a growing company"
  tags: [cadence, annual, quarterly, check-ins, intermediate]

state: {}

trigger: |
  You're the Chief of Staff at a fast-growing e-commerce company
  (500 employees, $100M revenue). The company adopted OKRs a
  year ago, but the cadence is chaotic. Here's what happened
  last year:

  Problems with current cadence:
  1. Q1 OKRs weren't finalized until Week 4 (lost a month)
  2. Mid-quarter check-ins were cancelled "because everyone is
     too busy working on their OKRs"
  3. Q2 OKRs were just Q1 OKRs copy-pasted with new dates
  4. End-of-quarter scoring took 3 weeks because teams didn't
     track progress
  5. Annual planning happened in December but OKRs weren't
     connected to the annual plan
  6. The CEO set company OKRs without consulting VPs, leading
     to team OKRs that didn't align
  7. No one reviewed annual OKRs mid-year — they were forgotten

  The CEO wants you to design a proper OKR cadence for next year.
  "I want a calendar. Who does what, when. Planning, check-ins,
  scoring, reviews. Make it run like clockwork."

  Company structure:
  - CEO + 6 VPs (Product, Engineering, Marketing, Sales,
    Operations, Finance)
  - 35 teams across the 6 functions
  - Fiscal year: January-December
  - Board meetings: quarterly (February, May, August, November)
  - Planning retreat: annually in November
  - All-hands: monthly

  Task: Design the complete OKR cadence — annual cycle, quarterly
  cycle, and weekly/bi-weekly rhythms. Include who's responsible
  for what at each stage.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete annual OKR cadence — includes annual planning timeline (connects to November retreat), quarterly cycle with specific dates/weeks for planning, mid-quarter check-ins, and end-of-quarter scoring; includes weekly or bi-weekly check-in rhythms; addresses all 7 problems from the current state (late finalization, cancelled check-ins, copy-paste OKRs, slow scoring, disconnected annual plan, top-down-only setting, forgotten annual OKRs); the calendar is specific enough to implement."
    weight: 0.35
    description: "CompleteCadence"
  - type: llm_judge
    criteria: "Response specifies responsibilities clearly — defines who does what at each stage (CEO sets company OKRs with VP input, VPs set function OKRs with team lead input, teams set team OKRs aligned to function); includes RACI or equivalent for each OKR phase (planning, setting, check-in, scoring, review); addresses the coordination between company, function, and team-level OKR cycles; includes the Chief of Staff's role in driving the cadence."
    weight: 0.35
    description: "ClearResponsibilities"
  - type: llm_judge
    criteria: "Response is practical and addresses the cultural issues — the cadence is realistic for a 500-person company with 35 teams; check-ins are designed to be efficient (not another meeting that gets cancelled); scoring is streamlined (not a 3-week ordeal); includes mechanisms to prevent copy-paste OKRs (reflection on previous quarter informs new OKRs); connects OKR cycle to board meetings for executive accountability; the cadence would work in practice, not just in theory."
    weight: 0.30
    description: "PracticalDesign"
