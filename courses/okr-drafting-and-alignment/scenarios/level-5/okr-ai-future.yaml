meta:
  id: okr-ai-future
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR and AI future — design the next generation of AI-augmented goal-setting that fundamentally reimagines how organizations set, track, and achieve objectives"
  tags: [ai, future, augmented, next-generation, master]

state: {}

trigger: |
  You're the Chief Product Officer at a venture-backed startup
  that's building "the AI-native goal-setting platform." Your
  thesis: OKRs were designed for a world where humans set goals,
  track progress manually, and review quarterly. AI changes
  everything.

  Your vision (from the Series B pitch):

  "In 5 years, no human will manually write an OKR, manually
  update progress, or manually score a key result. AI will
  generate goal recommendations based on market data, company
  strategy, and historical performance. AI will continuously
  track progress by ingesting data from every business system.
  AI will predict which goals will be missed weeks before humans
  notice. And AI will recommend goal adjustments in real-time
  based on changing conditions.

  But here's the critical insight: the human role doesn't
  disappear — it elevates. Humans shift from goal administration
  to strategic judgment. Instead of spending time writing and
  tracking OKRs, leaders spend time deciding WHAT to pursue
  and WHY. The AI handles the what, when, and how much."

  Product capabilities to design:
  1. AI Goal Generation: Recommend objectives and key results
     based on company strategy, market signals, competitive
     intelligence, and historical performance data
  2. Continuous Progress Inference: Automatically infer KR
     progress from integrated business systems (no manual
     check-ins needed)
  3. Predictive Goal Intelligence: Forecast which KRs will be
     missed and why, with 85%+ accuracy, 4+ weeks in advance
  4. Dynamic Goal Adjustment: Recommend real-time OKR
     adjustments when market conditions, competitive dynamics,
     or internal capabilities change
  5. Strategic Coherence Engine: Automatically detect alignment
     gaps, conflicting goals, and missing dependencies across
     the organization
  6. Outcome Learning: Analyze completed OKR cycles to identify
     what predicts success vs failure and improve future
     recommendations

  Constraints:
  - Ethical AI: Goal-setting affects people's careers and
    compensation. AI recommendations must be explainable,
    unbiased, and auditable.
  - Human override: AI recommends, humans decide. No autonomous
    goal-setting.
  - Privacy: Behavioral data from communication tools raises
    surveillance concerns.
  - Adoption: If it feels like AI surveillance, employees will
    reject it.

  Task: Design the AI-native goal-setting platform — the
  product architecture, the AI models, the ethical framework,
  and the vision for how organizations will set goals in 2030.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive AI-native platform — addresses all 6 product capabilities with specific technical approaches; proposes the data architecture for continuous progress inference (what data sources, how to map business metrics to KRs automatically); designs the predictive intelligence model (what signals predict KR failure, training data strategy, accuracy targets); includes the strategic coherence engine that detects misalignment automatically; the architecture is technically credible and represents a genuine advancement over current OKR tools."
    weight: 0.35
    description: "AIArchitecture"
  - type: llm_judge
    criteria: "Response addresses the ethical framework seriously — designs explainable AI recommendations (not black-box goal suggestions); addresses bias in goal-setting AI (does the model recommend more ambitious goals for some demographics?); handles the surveillance concern with specific privacy-preserving approaches; maintains human override at every decision point; addresses how AI goal suggestions affect compensation and career outcomes; proposes an ethical review board or audit mechanism; the ethical framework would withstand scrutiny from employees, regulators, and media."
    weight: 0.35
    description: "EthicalFramework"
  - type: llm_judge
    criteria: "Response presents a compelling vision for organizational goal-setting in 2030 — describes how the human role elevates from goal administration to strategic judgment; proposes how continuous AI-augmented goal management replaces the quarterly OKR cycle; addresses what happens to the OKR coach, the OKR champion, the quarterly planning workshop in an AI-native world; considers how AI changes organizational decision-making speed and quality; the vision is ambitious but grounded in realistic technological trends; the product would genuinely transform how organizations operate."
    weight: 0.30
    description: "FutureVision"
