meta:
  id: okr-national-strategy
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR for national strategy — adapt OKRs for a national government's strategic execution framework, connecting policy objectives to measurable citizen outcomes"
  tags: [government, national-strategy, policy, public-sector, master]

state: {}

trigger: |
  You're a senior advisor to a national government's Cabinet
  Office. The Prime Minister has directed you to design a
  strategic execution framework based on OKR principles for
  the entire government. The mandate:

  "Every democracy has a strategic plan. Very few execute it.
  We announce ambitious goals at election time and then can't
  tell citizens whether we delivered. I want an OKR-like system
  that connects our policy objectives to measurable outcomes
  that citizens can see and evaluate."

  Government context:
  - 20 government departments (ministries)
  - 500,000 civil servants
  - Annual budget: $500B
  - Strategic priorities: Economy, Healthcare, Education, Climate,
    Security, Digital Government, Housing, Infrastructure
  - Political cycle: 4-year term (currently Year 1)

  Unique challenges of government OKRs:
  1. Political objectives vs policy objectives: Politicians
     want re-election metrics; civil servants want effective
     policy. These sometimes conflict.
  2. Attribution complexity: If GDP grows, is it government
     policy or global economic trends? If crime drops, is it
     policing policy or demographics?
  3. Multi-decade outcomes: Climate goals, education outcomes,
     and infrastructure benefits span decades, not quarters.
  4. Democratic accountability: Progress must be publicly
     visible and independently verifiable.
  5. Cross-departmental coordination: Most important outcomes
     (reducing homelessness, improving public health) require
     multiple departments to collaborate.
  6. Civil service culture: Risk-averse, process-oriented,
     resistant to private-sector management frameworks.
  7. Budget cycles: Annual budget process doesn't align with
     quarterly OKR cadence.
  8. Changing priorities: Crises (pandemic, economic shock,
     natural disaster) require rapid OKR adjustment.

  Examples of what needs to change:
  - Current: "We'll build 100,000 new homes" (output metric)
  - Better: "Reduce average time to homeownership from 12 years
    to 8 years for first-time buyers" (outcome metric)
  - Current: "We'll hire 10,000 more teachers" (input metric)
  - Better: "Improve average student reading proficiency by
    Year 6 from 72% to 85%" (outcome metric)

  Task: Design the national strategic execution framework based
  on OKR principles. Address the unique challenges of government
  and propose how to make national OKRs publicly visible,
  independently verifiable, and politically durable.

assertions:
  - type: llm_judge
    criteria: "Response designs a national OKR framework adapted for government — creates a multi-tier system (national strategic objectives → departmental OKRs → program/agency OKRs) that connects policy ambitions to measurable citizen outcomes; addresses all 8 unique challenges with specific design choices; proposes outcome-focused objectives rather than input/output metrics; includes cross-departmental shared OKRs for complex outcomes like homelessness; the framework is politically durable (survives government changes because outcomes transcend politics)."
    weight: 0.35
    description: "NationalOKRFramework"
  - type: llm_judge
    criteria: "Response addresses democratic accountability and transparency — proposes a public dashboard for national OKR progress that citizens can access; includes independent verification mechanisms (national statistics office, independent auditor); addresses the political vs policy objective tension (national OKRs are policy outcomes, not political promises); handles the attribution challenge with measured and contextual reporting; addresses the multi-decade outcome challenge with leading indicators and milestone-based tracking; the framework enhances democratic accountability."
    weight: 0.35
    description: "DemocraticAccountability"
  - type: llm_judge
    criteria: "Response is practical for government implementation — addresses the civil service culture challenge with change management appropriate for 500,000 people; proposes cadence that works with annual budget cycles; includes crisis response mechanisms for rapid priority adjustment; addresses the cross-departmental coordination challenge with governance structures; provides international examples or benchmarks (other countries' experience with outcome-based government); the framework is implementable within the political constraints of a democratic government."
    weight: 0.30
    description: "GovernmentPracticality"
