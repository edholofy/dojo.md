meta:
  id: okr-behavioral-science
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR and behavioral science — redesign OKR practices using behavioral science insights to counteract cognitive biases and improve goal-setting effectiveness"
  tags: [behavioral-science, cognitive-bias, psychology, redesign, master]

state: {}

trigger: |
  You're a behavioral scientist who specializes in organizational
  decision-making. A large technology company (10,000 employees)
  has hired you to redesign their OKR process using behavioral
  science principles. Their OKRs consistently underperform and
  the CEO suspects systematic cognitive biases are the cause.

  Evidence of cognitive biases in the company's OKR process:

  1. Anchoring Bias: Teams anchor to last quarter's numbers
     when setting new targets. If Q1 revenue was $10M, Q2
     target is always $10M ± 10%. Nobody thinks from first
     principles about what's possible.

  2. Optimism Bias: 80% of teams set overly optimistic KRs
     at the start of the quarter. By Week 6, 60% are behind.
     The same pattern repeats every quarter — nobody learns
     from past overcommitment.

  3. Groupthink: OKR planning sessions produce consensus
     OKRs where nobody disagrees. The most politically
     powerful person's preference becomes the objective.
     Dissenting views are suppressed.

  4. Status Quo Bias: Teams default to maintaining existing
     metrics rather than pursuing transformative change.
     70% of OKRs are incremental improvements to current
     processes, not strategic shifts.

  5. Sunk Cost Fallacy: Teams refuse to abandon OKRs that
     are clearly failing because "we've already invested 6
     weeks of work." Mid-quarter OKR adjustments are resisted
     even when the market has changed.

  6. Confirmation Bias: During check-ins, teams cherry-pick
     data that supports their narrative. Negative signals are
     rationalized or ignored until the end-of-quarter scoring
     forces acknowledgment.

  7. Dunning-Kruger Effect: Less experienced teams score
     themselves higher on OKR achievement than more experienced
     teams, despite worse actual performance. Self-assessment
     is unreliable.

  8. Loss Aversion: Teams prefer OKRs that protect current
     performance over OKRs that pursue gains. "Don't let churn
     exceed 5%" is preferred over "grow new customer acquisition
     by 40%" even when the company needs growth.

  Task: Redesign the OKR process using behavioral science
  interventions to counteract each of the 8 biases. Include
  specific debiasing techniques, nudges, and process changes.

assertions:
  - type: llm_judge
    criteria: "Response provides specific behavioral interventions for each of the 8 biases — for anchoring: proposes zero-based OKR setting (start from strategic intent, not last quarter's numbers); for optimism: introduces reference class forecasting and pre-mortem exercises; for groupthink: proposes structured dissent mechanisms (red team, anonymous input before discussion); for status quo: introduces mandatory 'transformation allocation' in OKR portfolio; addresses all 8 with specific, evidence-based behavioral interventions."
    weight: 0.35
    description: "BehavioralInterventions"
  - type: llm_judge
    criteria: "Response redesigns the OKR process holistically — doesn't just add debiasing patches but redesigns the end-to-end OKR process (planning, setting, check-ins, scoring, review) with behavioral science built in; proposes nudge architecture (default settings, choice architecture, framing effects) that makes better OKR practices the path of least resistance; includes the scoring process redesign to address Dunning-Kruger and confirmation bias; the redesigned process is practical and implementable, not academically theoretical."
    weight: 0.35
    description: "ProcessRedesign"
  - type: llm_judge
    criteria: "Response demonstrates deep behavioral science expertise — uses established behavioral science frameworks (Kahneman's System 1/System 2, Thaler's nudge theory, Klein's pre-mortem technique, Sunstein's choice architecture); the interventions are evidence-based, not intuitive; acknowledges the limits of debiasing (some biases can be reduced but not eliminated); proposes measurement of debiasing effectiveness (before/after comparison of OKR quality and prediction accuracy); the work would be credible in an academic behavioral science context."
    weight: 0.30
    description: "ScientificRigor"
