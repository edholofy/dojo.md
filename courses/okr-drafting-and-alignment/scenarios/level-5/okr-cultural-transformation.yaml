meta:
  id: okr-cultural-transformation
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR cultural transformation — use OKRs as the catalyst for a fundamental cultural transformation at a 50,000-person traditional enterprise"
  tags: [cultural-transformation, enterprise, 50k-employees, catalyst, master]

state: {}

trigger: |
  You're the Chief Transformation Officer at a 50,000-person
  global manufacturing conglomerate ($20B revenue). The CEO has
  asked you to use OKRs as the primary vehicle for cultural
  transformation. The company's culture is holding back its
  strategy.

  Current culture (diagnosed by external consultants):
  - "Command and control": Strategy set at top, executed below
    without question. Middle managers transmit orders, don't
    make decisions.
  - "Risk avoidance": Nobody takes risks because failure is
    punished. Innovation has stagnated for a decade.
  - "Information hoarding": Knowledge is power. Leaders don't
    share information downward. Teams don't share cross-
    functionally.
  - "Short-termism": Quarterly earnings drive all decisions.
    Long-term investments are systematically underfunded.
  - "Silo mentality": 8 business units operate as independent
    kingdoms. No cross-BU collaboration on shared customers
    or technologies.

  Target culture (defined by the CEO):
  - "Empowered execution": Teams at all levels set goals and
    make decisions within strategic guardrails.
  - "Safe to fail": Experimentation is encouraged. Learning
    from failure is celebrated.
  - "Radical transparency": All goals, progress, and challenges
    are visible across the organization.
  - "Long-term value creation": Balance quarterly results with
    multi-year strategic investments.
  - "One company": Cross-BU collaboration on shared opportunities.

  The CEO's thesis: "OKRs are not just a goal-setting tool —
  they're a culture change mechanism. When you make goals
  transparent, you break information hoarding. When you
  encourage stretch goals, you break risk avoidance. When you
  cascade from strategy, you break silo mentality. OKRs are
  the Trojan horse for the culture I want."

  Challenges:
  - 50,000 employees with an average tenure of 16 years
  - 8 BU presidents who resist centralized frameworks
  - Unionized workforce in 3 BUs (35% of employees)
  - Previous culture change attempts failed (3 in 10 years)
  - Board wants measurable culture change within 2 years

  Budget: $30M over 3 years for the transformation

  Task: Design the OKR-as-culture-change program. Include the
  transformation architecture, the phased rollout strategy,
  the measurement framework for culture change, and how you
  handle resistance from entrenched leadership.

assertions:
  - type: llm_judge
    criteria: "Response designs OKRs as a culture change mechanism — shows how each OKR practice element drives the desired culture shift (transparency of OKRs breaks information hoarding, stretch goals normalize failure acceptance, cross-BU shared OKRs break silo mentality, bottom-up OKR input empowers execution, annual+quarterly cadence enables long-term thinking); the program is designed as a cultural intervention, not just a goal-setting rollout; includes specific mechanisms for each of the 5 cultural shifts the CEO wants."
    weight: 0.35
    description: "OKRAsCultureChange"
  - type: llm_judge
    criteria: "Response addresses the massive scale and resistance — proposes a phased approach for 50,000 people across 8 BUs (can't do big-bang); addresses BU president resistance with a politically sophisticated approach (coalition of willing, early wins, CEO mandate backed by results); handles unionized workforce implications (OKR transparency can't be used for punitive purposes — union agreement needed); addresses the failed previous attempts (why will this be different?); allocates the $30M budget across technology, change management, training, and measurement."
    weight: 0.35
    description: "ScaleAndResistance"
  - type: llm_judge
    criteria: "Response includes culture measurement and board accountability — proposes measurable culture change metrics (engagement survey dimensions mapped to target culture, OKR transparency adoption rates, cross-BU initiative creation, experimentation frequency, bottom-up OKR contribution percentage); designs a board reporting format for culture transformation progress; provides 2-year milestones the board can assess; addresses the sustainability question (how to prevent culture reverting after initial enthusiasm fades); includes leading indicators of cultural shift, not just lagging survey data."
    weight: 0.30
    description: "CultureMeasurement"
