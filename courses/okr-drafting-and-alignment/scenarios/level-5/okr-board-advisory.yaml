meta:
  id: okr-board-advisory
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR board advisory — advise a board of directors on implementing OKR-based strategic oversight, connecting goal-setting to fiduciary duties and shareholder value"
  tags: [board-advisory, directors, fiduciary, shareholder-value, master]

state: {}

trigger: |
  You're an independent board advisor specializing in corporate
  governance. Three different boards have asked you the same
  question this quarter: "How should the board use OKRs for
  strategic oversight?" Each situation is different.

  Board 1 — Pre-IPO Unicorn ($2B valuation, 2,000 employees):
  The founder/CEO uses OKRs aggressively internally. The board
  (4 VCs, 2 independents) wants to understand: "If we're going
  public in 12 months, how do OKRs connect to our S-1 strategy
  narrative? Can we use OKR performance data to demonstrate
  management execution capability to public market investors?"
  - Key tension: VC board members want growth OKRs; independents
    want governance OKRs for IPO readiness.

  Board 2 — Mature Public Company ($8B market cap, 20,000 employees):
  The board's Compensation Committee is rethinking executive
  compensation. Currently, 100% of variable pay is tied to
  financial metrics (revenue, EBITDA, TSR). They want to add
  strategic execution metrics. "Can OKRs replace or complement
  our financial metric-based comp structure?"
  - Key tension: Proxy advisory firms want quantifiable,
    auditable metrics. OKR scores are inherently subjective.

  Board 3 — Family-Owned Enterprise ($5B revenue, 15,000 employees):
  The second-generation family members are professionalizing
  governance. They have no board-level strategic framework.
  "We've always run on intuition and family consensus. Our
  new independent directors say we need structured strategic
  execution oversight. Is OKR the right framework?"
  - Key tension: Family members fear OKRs will make their
    management style look unprofessional. Independent directors
    want governance rigor.

  Task: Provide tailored board advisory recommendations for
  each of the 3 boards. For each, design the OKR-board
  governance framework appropriate to their context, addressing
  their specific tensions and needs.

assertions:
  - type: llm_judge
    criteria: "Response provides differentiated advice for all 3 boards — each board gets a tailored OKR governance framework appropriate to its context (Pre-IPO: S-1 narrative connection and investor communication; Public Company: compensation integration with proxy advisory compliance; Family Enterprise: professionalization without intimidation); the advice addresses each board's specific tension; the recommendations reflect deep understanding of different governance contexts; the advice would be credible from an independent board advisor."
    weight: 0.35
    description: "DifferentiatedAdvice"
  - type: llm_judge
    criteria: "Response addresses the governance-OKR intersection deeply — for Board 1, shows how OKR execution data supports the S-1 management credibility narrative; for Board 2, proposes how OKR-based strategic metrics complement financial comp metrics while satisfying ISS/Glass Lewis scrutiny (auditability, objectivity, comparability); for Board 3, proposes a governance framework that respects family dynamics while meeting independent director expectations; the advice demonstrates sophisticated corporate governance knowledge combined with OKR expertise."
    weight: 0.35
    description: "GovernanceOKRIntersection"
  - type: llm_judge
    criteria: "Response includes practical implementation for each board — proposes specific meeting formats, reporting templates, and oversight mechanisms for each board; addresses how board-level OKR oversight connects to management-level OKR execution; includes director education on OKR principles (most directors are not OKR-fluent); proposes committee structures for OKR oversight (Strategy Committee, Compensation Committee integration); the recommendations are actionable, not theoretical; each board could implement the recommendations within one quarter."
    weight: 0.30
    description: "PracticalImplementation"
