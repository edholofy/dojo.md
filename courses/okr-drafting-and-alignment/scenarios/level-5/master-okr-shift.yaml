meta:
  id: master-okr-shift
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "Master OKR shift — navigate a situation where the entire OKR framework must be rethought because the organization has outgrown it, and design the successor system"
  tags: [shift, master, post-okr, successor-system, evolution]

state: {}

trigger: |
  You're the Chief Strategy Officer of a $100B technology
  conglomerate. The company adopted OKRs 8 years ago, scaled
  them to 80,000 employees, and they worked brilliantly for
  the first 5 years. But for the last 3 years, the system has
  been deteriorating. The CEO called you in:

  "OKRs served us well, but we've outgrown them. I don't want
  to patch the system anymore — I want you to design what comes
  after OKRs. Keep what works, fix what doesn't, and create the
  strategic execution system for the next decade."

  Evidence the current OKR system is failing:

  1. "Cascade Collapse": At 80,000 people with 5 organizational
     layers, OKR cascade takes 6 weeks from CEO to teams. By
     the time team OKRs are set, 40% of the quarter is gone.
     Teams are executing on OKRs for a strategy that's already
     8 weeks old.

  2. "Alignment Theater": Company has 8,000 objectives and
     25,000 key results. Nobody can verify whether a team-level
     KR actually contributes to a company KR. The alignment
     arrows are drawn but unmaintained.

  3. "Quarterly Tyranny": The 13-week cycle forces everything
     into quarterly boxes. Strategic initiatives that need 18
     months are artificially chunked into quarters and lose
     coherence. Short-term wins are prioritized over long-term
     bets because quarterly scoring rewards completion.

  4. "Scoring Theater": End-of-quarter scoring has become
     performative. Teams spend days preparing scoring narratives.
     Scores are negotiated, not measured. The company spends
     the equivalent of 200,000 person-hours per year on OKR
     administration.

  5. "Innovation Starvation": OKRs measure predetermined
     outcomes. But the company's most valuable innovations came
     from undirected exploration — exactly the kind of work
     OKRs don't capture. Senior engineers say: "OKRs killed
     our 20% time."

  6. "AI Disruption": The company's AI systems can now predict
     business outcomes better than human-set OKRs. The AI
     recommends portfolio adjustments in real-time, but OKRs
     are set quarterly. The system is slower than the available
     intelligence.

  7. "Generational Shift": Employees under 30 (40% of workforce)
     find quarterly OKRs bureaucratic. They want continuous
     alignment, not periodic goal-setting ceremonies.

  What still works:
  - Strategic direction setting (company-level objectives)
  - Cross-functional alignment on shared outcomes
  - Transparency and visibility of goals
  - Outcome orientation (vs activity orientation)

  Task: Design the successor system to OKRs for this
  organization. Keep what works, redesign what doesn't, and
  create a strategic execution framework appropriate for an
  80,000-person company in 2026 and beyond.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible successor system — proposes a post-OKR strategic execution framework that addresses all 7 failure modes while preserving the 4 elements that work; the successor system is not just 'OKRs with tweaks' but a fundamentally reimagined approach (potentially continuous alignment, AI-augmented, flexible cadence, reduced administrative burden); the system is appropriate for 80,000 people and the complexity of a $100B technology conglomerate; the design shows original thinking about the future of organizational goal-setting."
    weight: 0.35
    description: "SuccessorSystem"
  - type: llm_judge
    criteria: "Response addresses each of the 7 failure modes specifically — proposes solutions for Cascade Collapse (perhaps eliminate cascade in favor of alignment networks), Alignment Theater (technology-enabled alignment verification), Quarterly Tyranny (flexible cadence matched to work type), Scoring Theater (automated measurement, eliminate manual scoring), Innovation Starvation (exploration budgets separate from execution goals), AI Disruption (AI-native goal management), Generational Shift (continuous alignment, mobile-first, lightweight); each solution is specific and implementable."
    weight: 0.35
    description: "FailureModeResolution"
  - type: llm_judge
    criteria: "Response addresses the transition and organizational implications — proposes how to transition 80,000 people from a system they've used for 8 years to the successor system; addresses the change management challenge (people will resist losing the familiar framework); includes a phased implementation; considers the political dynamics (some leaders built their power on the OKR system); proposes how to measure whether the new system is working better than OKRs; the transition plan is realistic and addresses the risk of system change at massive scale."
    weight: 0.30
    description: "TransitionPlan"
