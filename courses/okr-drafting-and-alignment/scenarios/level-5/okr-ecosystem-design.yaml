meta:
  id: okr-ecosystem-design
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR ecosystem design — design an OKR ecosystem that spans a company and its partners, suppliers, and customers, creating aligned value chains"
  tags: [ecosystem, value-chain, partners, suppliers, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at a $50B automotive OEM.
  The CEO wants to extend OKRs beyond company boundaries to
  create aligned strategic execution across the entire value
  chain — from raw material suppliers through manufacturing
  partners to dealership networks.

  "Our strategic objectives can't be achieved by us alone.
  When we set an OKR to reduce vehicle delivery time from
  12 weeks to 4 weeks, that requires our 500 suppliers, 30
  manufacturing partners, and 3,000 dealers to all execute
  in alignment. If our OKRs stop at our company boundary,
  we're planning in a vacuum."

  Value chain:
  - Tier 1 suppliers: 200 companies (semiconductor, battery,
    steel, electronics)
  - Tier 2 suppliers: 300+ companies (raw materials, components)
  - Manufacturing partners: 30 (contract manufacturing,
    assembly, logistics)
  - Dealer network: 3,000 dealerships (independently owned)
  - Technology partners: 15 (software, autonomous driving,
    connectivity)
  - After-sales service: 5,000 authorized service centers

  Strategic objectives that require ecosystem alignment:
  1. "Launch 5 new EV models in 18 months" — requires battery
     supplier alignment, charging infrastructure partnerships,
     dealer EV readiness
  2. "Achieve carbon-neutral manufacturing by 2030" — requires
     supplier sustainability alignment across the entire chain
  3. "Reduce vehicle delivery time from 12 weeks to 4 weeks" —
     requires supply chain synchronization
  4. "Achieve J.D. Power #1 quality ranking" — requires quality
     alignment from component suppliers through dealer delivery
  5. "Build a connected vehicle ecosystem with 10M active
     subscribers" — requires technology partner alignment

  Challenges:
  - Suppliers are independent companies with their own priorities
  - Dealers are independently owned — can't mandate their OKRs
  - Competitive sensitivity — can't share full strategy with
    suppliers who also work with competitors
  - Cultural diversity — suppliers in 20+ countries
  - Power dynamics — large suppliers (semiconductor companies)
    have more leverage than the OEM

  Task: Design the ecosystem OKR framework that extends
  strategic alignment beyond company boundaries while respecting
  the independence and competitive dynamics of ecosystem partners.

assertions:
  - type: llm_judge
    criteria: "Response designs an ecosystem OKR framework — proposes a multi-tier alignment model (OEM strategic OKRs → shared partner OKRs → partner-specific OKRs); addresses all 5 strategic objectives with specific ecosystem alignment requirements; creates mechanisms for shared goal-setting with different partner types (suppliers, dealers, technology partners); the framework respects partner independence while creating strategic alignment; includes governance structures for cross-company OKR coordination."
    weight: 0.35
    description: "EcosystemFramework"
  - type: llm_judge
    criteria: "Response handles the competitive and power dynamics — addresses competitive sensitivity (how to share enough strategic direction without exposing competitive plans to suppliers who work with competitors); handles the power imbalance (semiconductor suppliers have leverage — you can't mandate their OKRs); addresses the independently-owned dealer network (incentive-based alignment, not mandated OKRs); proposes how to handle non-compliance (what happens when a key supplier doesn't align?); the approach is politically sophisticated."
    weight: 0.35
    description: "CompetitiveDynamics"
  - type: llm_judge
    criteria: "Response includes practical implementation mechanisms — proposes technology platforms for ecosystem OKR visibility (supplier portals, dealer dashboards); addresses how shared OKR progress is tracked across company boundaries; includes incentive mechanisms for partner alignment (preferred supplier status, volume commitments, co-investment); addresses the cultural diversity across 20+ countries; provides examples of shared OKRs between OEM and specific partner types; the framework is implementable in the automotive industry context."
    weight: 0.30
    description: "PracticalMechanisms"
