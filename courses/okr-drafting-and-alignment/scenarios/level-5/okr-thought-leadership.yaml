meta:
  id: okr-thought-leadership
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR thought leadership — write a definitive industry report on the evolution and future of OKRs, establishing new paradigms for organizational goal-setting"
  tags: [thought-leadership, industry-report, future, paradigm, master]

state: {}

trigger: |
  You're a senior research fellow at a leading management
  institute. You've been commissioned to write the definitive
  report on "The Next Evolution of OKRs" — a report that will
  be presented at the World Economic Forum and is expected to
  influence how organizations globally approach goal-setting
  for the next decade.

  Your 5-year research basis:
  - Studied OKR implementations at 1,000 organizations across
    50 countries
  - 500 executive interviews (CEOs, CHROs, strategy officers)
  - Analysis of 10,000 quarterly OKR cycles (success patterns
    and failure patterns)
  - Academic partnerships with Stanford, INSEAD, and Tsinghua
  - Industry data from McKinsey, BCG, PMI, and Gartner

  Key research findings:

  1. "The Adoption Paradox": OKR adoption grew 300% in 5 years,
     but effectiveness declined 20%. More companies use OKRs,
     but fewer do them well. The framework is being diluted by
     mass adoption without depth of understanding.

  2. "The Culture Prerequisite": Organizations with high
     psychological safety score 3x better on OKR effectiveness.
     OKRs fail not because the framework is wrong, but because
     the culture can't support honest goal-setting.

  3. "The AI Inflection": AI-augmented OKR systems (automated
     progress tracking, intelligent recommendations, predictive
     goal adjustment) improve OKR outcomes by 40%. But they also
     create new risks: algorithmic bias in goal-setting, loss of
     human judgment, and surveillance concerns.

  4. "The Measurement Trap": Companies that obsess over OKR
     scores perform worse than companies that treat OKRs as
     alignment tools. The act of scoring has become more
     important than the act of aligning.

  5. "The Scale Boundary": OKRs work well up to ~5,000 people.
     Beyond that, cascade complexity creates more overhead than
     value. The largest successful OKR implementations use
     modified approaches that bear little resemblance to the
     original Intel/Google model.

  6. "The Post-OKR Horizon": Leading organizations are evolving
     beyond traditional OKRs toward continuous strategic
     alignment models that blend OKRs with other frameworks
     (balanced scorecard, hoshin kanri, strategy deployment).

  Task: Write the executive summary and recommendations chapter
  of the industry report. Propose the next evolution of OKRs
  based on your research findings.

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling thought leadership piece — presents the 6 research findings as a narrative that challenges conventional OKR wisdom; proposes a 'next evolution' model that addresses the findings (post-traditional OKR framework, continuous strategic alignment, culture-first implementation); uses data from the 1,000-organization study to support arguments; the tone is authoritative and forward-looking; includes specific, quotable insights appropriate for a WEF audience; the piece would be credible as a real management institute publication."
    weight: 0.35
    description: "ThoughtLeadership"
  - type: llm_judge
    criteria: "Response provides actionable recommendations for the next evolution — addresses the Adoption Paradox with quality-focused recommendations; proposes how to build cultural prerequisites before OKR implementation; designs guardrails for AI-augmented OKRs; addresses the Measurement Trap by proposing alternative scoring approaches; addresses the Scale Boundary with architecture recommendations for large organizations; proposes the post-OKR evolution that integrates OKRs with other frameworks; includes a maturity model for organizational readiness."
    weight: 0.35
    description: "ActionableRecommendations"
  - type: llm_judge
    criteria: "Response demonstrates intellectual depth and foresight — goes beyond incremental OKR improvements to propose fundamental rethinking; considers how AI, remote work, and generational changes affect goal-setting; addresses the tension between standardization (OKR framework) and adaptation (every organization is different); proposes how the goal-setting profession should evolve; includes a vision for organizational goal-setting in 2035; acknowledges limitations and areas for further research; the piece would influence actual management practice."
    weight: 0.30
    description: "IntellectualDepth"
