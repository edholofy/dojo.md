meta:
  id: okr-consulting-practice
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR consulting practice — build a world-class OKR consulting practice within a management consulting firm, including methodology, IP, and go-to-market"
  tags: [consulting-practice, methodology, intellectual-property, master]

state: {}

trigger: |
  You're a senior partner at a top-tier management consulting
  firm. The firm has asked you to build an OKR consulting
  practice — a dedicated practice area that will serve Fortune
  500 clients with OKR implementation, transformation, and
  optimization engagements.

  The firm's thesis: "Every major consulting firm has a strategy
  practice. Few have an execution practice. OKRs are the bridge
  between strategy and execution. If we own that bridge, we own
  the most valuable real estate in management consulting."

  Practice requirements:
  1. Develop proprietary OKR methodology (your firm's
     differentiated approach — not just 'do what Google does')
  2. Create the intellectual property (frameworks, assessments,
     maturity models, benchmarks, tools) that justify premium
     consulting fees
  3. Build the team (recruit and train consultants in OKR
     expertise across industries)
  4. Design engagement models (advisory, implementation,
     transformation, optimization)
  5. Develop the go-to-market strategy (how to sell OKR
     consulting to Fortune 500 CEOs)
  6. Create the thought leadership pipeline (research, books,
     speaking, case studies)
  7. Build the partner ecosystem (OKR technology vendors,
     academic partners, certification bodies)

  Market context:
  - Global OKR consulting market: estimated $500M and growing
    25% annually
  - Competitors: Specialized OKR consultancies (What Matters,
    Gtmhub advisory), Big Four (general performance management),
    freelance OKR coaches
  - Your firm's advantage: Fortune 500 relationships, industry
    depth, global delivery capability
  - Client demand patterns: Post-pandemic acceleration of
    strategic execution frameworks

  Revenue target: $50M in practice revenue within 3 years
  Investment: $10M for practice build-out

  Task: Design the OKR consulting practice — the proprietary
  methodology, the engagement models, the IP portfolio, and
  the 3-year growth strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a proprietary OKR methodology — creates a differentiated consulting approach that goes beyond standard OKR implementation (not just 'here's how to write OKRs'); includes unique frameworks (OKR maturity model, strategic execution assessment, alignment diagnostic, culture readiness scorecard); the methodology reflects Fortune 500 complexity (multi-BU alignment, board governance, global rollout); the IP portfolio justifies premium consulting fees over specialized OKR coaches; the methodology is credible for a top-tier firm."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Response designs engagement models and go-to-market — proposes multiple engagement types (diagnostic assessment, implementation, transformation, optimization, advisory retainer) with pricing guidance; designs the go-to-market strategy for Fortune 500 CEOs (what problem resonates: strategy-execution gap, not 'you need OKRs'); includes the thought leadership pipeline (research reports, books, speaking circuit, case studies); addresses how to sell OKR consulting as strategic, not operational; the revenue path to $50M in 3 years is credible."
    weight: 0.35
    description: "EngagementAndGTM"
  - type: llm_judge
    criteria: "Response includes team building and partner ecosystem — proposes the consulting team structure (partners, principals, senior consultants, analysts with industry specialization); includes the training and certification program for consultants; designs the partner ecosystem (technology vendors, academic partners, OKR certification alignment); addresses how to build credibility in a market dominated by practitioners (the firm needs 'been there, done that' credibility, not just methodology); the $10M investment is allocated across methodology development, team building, thought leadership, and technology."
    weight: 0.30
    description: "TeamAndEcosystem"
