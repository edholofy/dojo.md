meta:
  id: okr-enterprise-architecture
  level: 5
  course: okr-drafting-and-alignment
  type: output
  description: "OKR enterprise architecture — design the OKR architecture for a 100,000-person conglomerate spanning 12 industries and 80 countries"
  tags: [enterprise-architecture, conglomerate, 100k-employees, master]

state: {}

trigger: |
  You're the Group Chief Strategy Officer at a $200B
  conglomerate with 100,000 employees across 12 industries
  and 80 countries. The Group CEO has mandated OKRs as the
  strategic execution framework for the entire enterprise.

  "We are one company with 12 businesses. Today, we operate
  as 12 independent companies that happen to share a name.
  I want OKRs to create strategic coherence without destroying
  the entrepreneurial energy that makes each business unit
  successful."

  Enterprise structure:
  - Holding company → 12 Business Groups → 60+ Operating
    Companies → 400+ Business Units
  - Industries: Aerospace, Automotive, Chemicals, Consumer
    Goods, Defense, Energy, Financial Services, Healthcare,
    Industrial Equipment, Technology, Telecommunications,
    Transportation
  - Revenue: $200B aggregate ($5B-30B per business group)
  - Employees: 100,000 (3,000-15,000 per business group)
  - Countries: 80
  - OKR maturity: 3 business groups have OKRs, 5 have BSC,
    4 have no structured goal framework

  Enterprise strategic priorities:
  1. Sustainability: Carbon neutral by 2040 across all 12
     industries (currently varies from 20% to 80% progress)
  2. Digital: Every business group must be "digitally native"
     by 2028 (currently 3 of 12 are)
  3. Synergies: $2B in cross-BG synergies from shared
     customers, technologies, and capabilities
  4. Talent: Build a unified leadership pipeline across the
     conglomerate
  5. Portfolio: Divest 2 underperforming business groups,
     acquire in 2 new industries

  Design constraints:
  - Business Group CEOs report to Group CEO but have high
    autonomy — they will resist corporate mandates
  - 3 different OKR maturity levels across the enterprise
  - 25+ languages, 80 regulatory environments
  - No common technology platform across business groups
  - Previous corporate mandates have been largely ignored

  Task: Design the enterprise OKR architecture — the governance
  model, the alignment framework, the technology platform
  strategy, and the 5-year implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response designs an enterprise OKR architecture at unprecedented scale — creates a federated governance model appropriate for 100,000 people across 12 industries (Group OKRs → Business Group OKRs → Operating Company OKRs → BU OKRs); the architecture preserves entrepreneurial autonomy while creating strategic coherence; addresses all 5 enterprise strategic priorities with cross-BG OKRs; proposes a common OKR language/taxonomy while respecting industry-specific metrics; the architecture is realistic for a $200B conglomerate."
    weight: 0.35
    description: "EnterpriseArchitecture"
  - type: llm_judge
    criteria: "Response handles the diversity and scale challenges — addresses the 12 different industries with industry-appropriate OKR adaptations; handles the 3 different OKR maturity levels with differentiated implementation approaches; addresses the 80-country, 25-language challenge; proposes technology platform strategy (common OKR layer vs business group-specific implementations); addresses the Business Group CEO autonomy concern with a governance model that balances corporate alignment with local freedom; the solution doesn't try to homogenize 12 fundamentally different businesses."
    weight: 0.35
    description: "DiversityAndScale"
  - type: llm_judge
    criteria: "Response includes a 5-year implementation roadmap — provides a realistic phased approach (can't implement across 100,000 people simultaneously); addresses which business groups pilot first (based on maturity and willingness); includes change management at conglomerate scale; proposes how to handle the portfolio changes (divesting 2 BGs, acquiring in 2 new industries) within the OKR framework; addresses the sustainability cross-BG OKR as a unifying initiative; includes success metrics and governance for the implementation program itself; the roadmap acknowledges that previous corporate mandates were ignored."
    weight: 0.30
    description: "ImplementationRoadmap"
