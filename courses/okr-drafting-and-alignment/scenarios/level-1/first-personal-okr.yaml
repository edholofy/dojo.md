meta:
  id: first-personal-okr
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "First personal OKR — write your first set of individual OKRs for the upcoming quarter as a software engineer"
  tags: [individual, beginner, quarterly, software-engineer]

state: {}

trigger: |
  You're a mid-level software engineer at a SaaS company. Your
  manager has asked everyone on the team to write their individual
  OKRs for Q2. This is the first time the company is using OKRs
  (they previously used annual goals).

  Your manager's guidance:
  "Write 2-3 objectives with 3-5 key results each. Objectives
  should be qualitative and inspirational — what do you want to
  achieve? Key results should be measurable — how will we know
  you achieved it? Remember, OKRs aren't a task list. They're
  about outcomes, not outputs."

  Context about your role:
  - You work on the payments team (4 engineers, 1 PM, 1 designer)
  - The team's main Q2 goal is launching a new billing system
  - You personally own the invoice generation module
  - You've been wanting to improve your technical leadership skills
  - Code review turnaround on the team averages 3 days (too slow)
  - You have 2 junior engineers you informally mentor

  Task: Write your individual Q2 OKRs. Include 2-3 objectives
  with 3-5 key results each.

assertions:
  - type: llm_judge
    criteria: "Response writes well-structured individual OKRs — includes 2-3 objectives that are qualitative, inspirational, and outcome-focused (not task-focused); each objective has 3-5 measurable key results with specific numbers, percentages, or deadlines; key results follow the format of measurable outcomes (not activities like 'work on X' or 'attend training'); objectives relate to both the team's billing system goal and personal development (technical leadership); the OKRs are ambitious but achievable for a mid-level engineer in one quarter."
    weight: 0.35
    description: "OKRStructure"
  - type: llm_judge
    criteria: "Response demonstrates understanding of OKR principles — objectives are qualitative and inspirational (not 'finish the invoice module' but something like 'deliver a world-class invoicing experience' or 'become a trusted technical leader'); key results are measurable with specific metrics (not 'improve code review speed' but 'reduce average code review turnaround from 3 days to 1 day'); avoids common mistakes like listing tasks as key results, having too many OKRs, or writing key results that aren't measurable; distinguishes between OKRs and a to-do list."
    weight: 0.35
    description: "OKRPrinciples"
  - type: llm_judge
    criteria: "Response is contextually appropriate — OKRs reflect the specific context (payments team, invoice module, billing system launch, mentoring juniors, code review improvement); includes a mix of delivery OKRs (billing system contribution) and growth OKRs (technical leadership, mentoring); the key results are realistic for one quarter; the overall set tells a coherent story about what this engineer wants to accomplish and how they'll measure success."
    weight: 0.30
    description: "ContextualRelevance"
