meta:
  id: okr-check-in-update
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "OKR check-in update — write a mid-quarter OKR check-in that tracks progress and identifies risks"
  tags: [check-in, mid-quarter, progress, tracking, beginner]

state: {}

trigger: |
  It's Week 6 of Q2 (halfway through the quarter). You're a
  sales team lead at a SaaS company and need to write your
  mid-quarter OKR check-in for the weekly leadership meeting.

  Your team's Q2 OKRs and current progress:

  Objective 1: "Dominate the mid-market segment and make it
  our primary growth engine"

  KR1: Close $500K in new mid-market ARR (currently at $180K)
  - Status: Behind — only 36% of target at 50% of quarter
  - Context: Lost 2 large deals to competitor in Week 4.
    Pipeline has $400K in late-stage opportunities.

  KR2: Reduce average sales cycle from 45 days to 30 days
  - Status: On track — current average is 35 days
  - Context: New demo format is working well. Procurement
    still a bottleneck at some accounts.

  KR3: Achieve 80% win rate on deals over $50K (currently 55%)
  - Status: Behind — win rate is at 50%
  - Context: Losing on enterprise security features. Product
    team is working on SSO but won't ship until Q3.

  KR4: Build pipeline of $1.5M in qualified mid-market
  opportunities
  - Status: Ahead — pipeline at $1.1M (73% at 50% of quarter)
  - Context: New outbound strategy generating quality leads.

  Objective 2: "Build a world-class sales team that retains
  top talent"

  KR1: Hire 3 account executives (2 mid-market, 1 enterprise)
  - Status: Behind — 1 hired, 1 in final interviews, 1 no
    candidates yet
  - Context: Enterprise AE hiring is competitive. May need
    to increase comp or use recruiter.

  KR2: Every AE completes the new sales methodology certification
  - Status: On track — 5 of 8 AEs certified
  - Context: Remaining 3 scheduled for Weeks 7-8

  KR3: Reduce ramp time for new AEs from 6 months to 4 months
  - Status: Too early to measure — new hire started Week 3

  Task: Write the mid-quarter OKR check-in report. Include
  confidence levels, risk identification, and proposed actions
  for any at-risk key results.

assertions:
  - type: llm_judge
    criteria: "Response writes a clear mid-quarter check-in — includes status for each key result with confidence level (on-track, at-risk, behind); uses the provided data to calculate progress percentages accurately; identifies the at-risk KRs (new ARR at 36% vs 50% timeline, win rate declining, enterprise AE hiring) and explains why; the format is concise enough for a leadership meeting (scannable, not a wall of text)."
    weight: 0.35
    description: "CheckInClarity"
  - type: llm_judge
    criteria: "Response identifies risks and proposes actions — for each behind/at-risk KR, proposes specific corrective actions (ARR shortfall: focus on the $400K late-stage pipeline, accelerate deal velocity; win rate: address security feature gap with workarounds or positioning; hiring: increase comp package or engage external recruiter); actions are practical and achievable in the remaining 6 weeks; distinguishes between KRs that are recoverable and KRs that may need to be acknowledged as misses."
    weight: 0.35
    description: "RiskMitigation"
  - type: llm_judge
    criteria: "Response demonstrates good check-in practices — balances honesty about shortfalls with constructive forward-looking actions; celebrates wins (pipeline ahead, sales cycle improvement, methodology certification progress); uses the check-in as a decision-making tool (not just status reporting); proposes any OKR adjustments if warranted; the overall tone is transparent and action-oriented."
    weight: 0.30
    description: "CheckInPractices"
