meta:
  id: startup-okrs
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "Startup OKRs — write company-level OKRs for an early-stage startup where resources are limited and focus is critical"
  tags: [startup, company-level, focus, resource-constrained, beginner]

state: {}

trigger: |
  You're the co-founder/CEO of a seed-stage startup (8 people,
  $1.5M in funding, 12 months of runway). You've been advised
  by your lead investor to implement OKRs to maintain focus.

  "You have 8 people and 12 months of money. You can't afford
  to work on the wrong things. OKRs will force you to decide
  what matters most this quarter."

  Your startup:
  - Product: AI-powered customer feedback analysis tool
  - Stage: Post-MVP, 15 paying customers, $8K MRR
  - Team: 2 founders, 3 engineers, 1 designer, 1 sales rep,
    1 customer success
  - Monthly burn: $120K
  - Key metrics: 15 customers, $8K MRR, 85% retention,
    30-day average sales cycle
  - Challenge: Customers love the product but you're not growing
    fast enough to raise Series A (need $50K+ MRR)
  - Next milestone: Series A fundraise in 9 months

  Your investor's advice: "Pick 2 objectives maximum. A seed
  startup with 3+ objectives is unfocused. Every person on your
  team should be able to tell me your OKRs from memory."

  Task: Write your company's Q3 OKRs. Maximum 2 objectives with
  3-4 key results each. Explain your prioritization decisions.

assertions:
  - type: llm_judge
    criteria: "Response writes focused startup OKRs — includes exactly 2 objectives (not more) with 3-4 key results each; objectives are tightly focused on what matters most for the startup's survival and growth (likely: growth/revenue to reach Series A metrics, and product/retention to maintain customer love); key results are specific and measurable with numbers; the total OKR set is memorable and could be recited by any team member."
    weight: 0.35
    description: "FocusedOKRs"
  - type: llm_judge
    criteria: "Response demonstrates startup-appropriate prioritization — explains why these 2 objectives were chosen over alternatives; connects OKRs to the Series A fundraise milestone ($50K+ MRR target); acknowledges what's being deliberately NOT prioritized (and why); the OKRs reflect the reality of 8 people and $120K/month burn; key results are calibrated for a 12-week quarter with limited resources; the explanation shows strategic thinking about what moves the needle most."
    weight: 0.35
    description: "PrioritizationReasoning"
  - type: llm_judge
    criteria: "Response is practical for an 8-person startup — OKRs don't require more capacity than the team has; the growth targets are ambitious but not delusional (can't go from $8K to $100K MRR in one quarter with 1 sales rep); addresses the core challenge (not growing fast enough for Series A); considers the team's constraint (small team means every person's focus matters); the OKRs would actually help this startup make better daily decisions about where to spend their time."
    weight: 0.30
    description: "StartupRealism"
