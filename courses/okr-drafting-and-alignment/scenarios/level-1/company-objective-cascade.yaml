meta:
  id: company-objective-cascade
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "Company objective cascade — write team OKRs that cascade from a company-level objective, demonstrating basic alignment"
  tags: [cascade, alignment, company-to-team, beginner]

state: {}

trigger: |
  You're the engineering director at a fintech startup
  (200 employees). The CEO has set the company's Q4 OKR:

  Company Objective: "Win the enterprise market and become the
  #1 choice for mid-market financial services companies"

  Company Key Results:
  - KR1: Close 15 new enterprise deals (>$100K ACV) this quarter
  - KR2: Achieve SOC 2 Type II certification by December
  - KR3: Launch enterprise-tier product with SSO, audit logging,
    and custom reporting by November
  - KR4: Reach $2M in enterprise ARR (currently $800K)

  Your engineering org has 3 teams:
  - Platform team (8 engineers): Infrastructure, security, DevOps
  - Product team (10 engineers): Core product features
  - Data team (5 engineers): Analytics, reporting, data pipeline

  Task: Write Q4 OKRs for each of your 3 engineering teams that
  cascade from and support the company objective. Each team
  should have 1-2 objectives with 3-4 key results each.

assertions:
  - type: llm_judge
    criteria: "Response writes well-structured OKRs for all 3 teams — each team has 1-2 objectives with 3-4 measurable key results; Platform team OKRs align with SOC 2 certification and enterprise infrastructure needs (SSO, audit logging); Product team OKRs align with enterprise-tier product launch; Data team OKRs align with custom reporting and analytics capabilities; the OKRs are specific, measurable, and achievable within one quarter."
    weight: 0.35
    description: "TeamOKRStructure"
  - type: llm_judge
    criteria: "Response demonstrates proper cascade/alignment — each team's OKRs clearly connect to the company objective without just copying it; the teams' combined OKRs cover all 4 company key results (enterprise deals supported through product readiness, SOC 2 through platform security, enterprise features through product team, enterprise ARR through collective capability); the cascade shows how team-level outcomes contribute to company-level outcomes; no important company KR is left unaddressed by the engineering teams."
    weight: 0.35
    description: "CascadeAlignment"
  - type: llm_judge
    criteria: "Response considers inter-team dependencies — acknowledges where teams depend on each other (e.g., product team needs platform team's SSO implementation; data team needs platform team's audit logging infrastructure); team OKRs don't conflict or create impossible resource contention; the combined set is coherent and achievable across the 23-person engineering org; the objectives reflect each team's specific domain while serving the shared company goal."
    weight: 0.30
    description: "InterTeamCoherence"
