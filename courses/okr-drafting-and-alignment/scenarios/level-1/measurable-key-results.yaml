meta:
  id: measurable-key-results
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "Measurable key results — fix poorly written key results by making them specific, measurable, and outcome-oriented"
  tags: [key-results, measurable, fixing, beginner]

state: {}

trigger: |
  You're an OKR coach at a mid-size company. A product team has
  submitted their Q1 OKRs for review, but the key results are
  poorly written — they're vague, activity-based, or not
  measurable. Your job is to fix them.

  The team's submitted OKRs:

  Objective 1: "Improve our product"
  - KR1: "Make the app faster"
  - KR2: "Fix bugs"
  - KR3: "Add new features customers want"
  - KR4: "Have more users"

  Objective 2: "Be better at customer support"
  - KR1: "Respond to tickets faster"
  - KR2: "Make customers happier"
  - KR3: "Reduce complaints"

  Objective 3: "Improve team processes"
  - KR1: "Have better sprint planning"
  - KR2: "Do more code reviews"
  - KR3: "Write documentation"

  Context for rewriting:
  - App currently loads in 4.2 seconds (target: under 2 seconds)
  - 150 open bugs, 23 are P1/P2
  - NPS score: 32 (industry average: 45)
  - 10,000 monthly active users
  - Average support response time: 8 hours
  - CSAT score: 3.2/5
  - Sprint velocity is inconsistent (varies 40-80 points)
  - Code review coverage: 60% of PRs reviewed

  Task: Rewrite all three OKRs with proper objectives and
  measurable key results. Explain what was wrong with each
  original and why your version is better.

assertions:
  - type: llm_judge
    criteria: "Response rewrites all 3 OKRs with proper structure — transforms vague objectives into qualitative, inspirational statements; transforms all 10 key results into specific, measurable outcomes with numbers (load time from 4.2s to under 2s, reduce P1/P2 bugs from 23 to 5, increase NPS from 32 to 45, etc.); uses the provided context metrics as baselines and sets improvement targets; the rewritten OKRs follow proper Objectives and Key Results format."
    weight: 0.35
    description: "RewrittenOKRs"
  - type: llm_judge
    criteria: "Response explains what was wrong with each original — identifies specific problems: objectives are too vague ('improve our product' tells you nothing), key results are activities not outcomes ('fix bugs' vs 'reduce P1/P2 bugs to under 5'), key results lack baselines and targets ('make the app faster' vs 'reduce page load from 4.2s to under 2s'), some key results are binary tasks not measurable outcomes ('write documentation'); the explanations teach OKR principles through the corrections."
    weight: 0.35
    description: "ExplanationQuality"
  - type: llm_judge
    criteria: "Response demonstrates OKR best practices in rewrites — rewritten key results use the format 'Increase/Decrease/Achieve [metric] from [baseline] to [target]'; objectives are ambitious and qualitative; key results are outcomes not outputs; each objective has 3-4 key results (not too many, not too few); the overall set is achievable in one quarter; the teaching tone is constructive and educational."
    weight: 0.30
    description: "BestPractices"
