meta:
  id: okr-scoring-basics
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "OKR scoring basics — score a set of completed OKRs at the end of a quarter and write a reflection on what worked and what didn't"
  tags: [scoring, grading, reflection, quarterly-review, beginner]

state: {}

trigger: |
  It's the end of Q1 and you're a product manager who needs to
  score your OKRs. Your company uses a 0.0-1.0 scoring scale
  where 0.7 is considered a good score (OKRs should be
  stretch goals — achieving 100% means they weren't ambitious
  enough).

  Your Q1 OKRs and results:

  Objective 1: "Make our onboarding experience delightful for
  new users"
  - KR1: Increase day-7 retention from 35% to 50%
    Result: Achieved 44%
  - KR2: Reduce time-to-first-value from 15 minutes to 5 minutes
    Result: Achieved 8 minutes
  - KR3: Achieve onboarding NPS of 50+ (currently 28)
    Result: Achieved 52
  - KR4: Reduce support tickets from new users by 40%
    Result: Reduced by 25%

  Objective 2: "Build a data-driven product culture"
  - KR1: Instrument 100% of core user flows with analytics
    Result: 78% instrumented
  - KR2: Launch A/B testing framework and run 5 experiments
    Result: Framework launched, 3 experiments run
  - KR3: Every product decision has a supporting data analysis
    Result: Estimated 60% of decisions had data support

  Objective 3: "Strengthen our competitive position in the
  SMB segment"
  - KR1: Launch 3 features from the top-10 competitive gap list
    Result: 2 features launched, 1 in beta
  - KR2: Win 5 competitive deals where we previously lost
    Result: Won 7 competitive deals
  - KR3: Reduce feature parity gap with top competitor from
    30 features to 15
    Result: Gap reduced to 20 features

  Task: Score each key result and each objective (0.0-1.0
  scale). Write a quarterly OKR reflection that analyzes what
  worked, what didn't, and what you'd change for Q2.

assertions:
  - type: llm_judge
    criteria: "Response scores each key result and objective correctly — uses the 0.0-1.0 scale consistently; scores reflect proportional achievement (e.g., day-7 retention: target was 35→50, achieved 44, so progress was 9/15 = 0.6; onboarding NPS exceeded target: 1.0; competitive deals exceeded target: 1.0); objective scores are reasonable averages or weighted combinations of their key results; scoring methodology is transparent and explained."
    weight: 0.35
    description: "ScoringAccuracy"
  - type: llm_judge
    criteria: "Response writes a thoughtful quarterly reflection — analyzes why certain KRs scored high (NPS exceeded target, competitive deals exceeded) and why others fell short (analytics instrumentation incomplete, support ticket reduction below target); identifies patterns (e.g., customer-facing metrics improved more than internal process metrics); draws actionable lessons for Q2 planning; the reflection goes beyond just stating scores to analyzing root causes and implications."
    weight: 0.35
    description: "ReflectionQuality"
  - type: llm_judge
    criteria: "Response demonstrates understanding of OKR scoring philosophy — explains the 0.7 sweet spot concept (scoring 1.0 on everything means OKRs weren't ambitious enough); correctly interprets scores in context (a 0.6 isn't failure, it's healthy stretch); identifies which KRs might have been under-ambitious (competitive deals: 7 vs target 5 — was the target too easy?); proposes adjustments for Q2 based on learnings; the analysis shows OKR maturity, not just arithmetic."
    weight: 0.30
    description: "ScoringPhilosophy"
