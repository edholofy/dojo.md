meta:
  id: okr-vs-tasks
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "OKR vs tasks — distinguish between OKRs, KPIs, and task lists by properly categorizing and reframing a mixed set of goals"
  tags: [fundamentals, okr-vs-tasks, kpi, beginner]

state: {}

trigger: |
  You're leading an OKR workshop for a customer success team
  that's new to OKRs. The team lead submitted a "goals document"
  that mixes OKRs, KPIs, tasks, and projects together. Your job
  is to sort them out and teach the team the difference.

  The team lead's submitted "goals" for Q2:

  1. "Reduce churn rate from 8% to 5%"
  2. "Send onboarding emails to all new customers within 24 hours"
  3. "Become the most trusted partner for our enterprise clients"
  4. "Maintain 99.5% uptime SLA"
  5. "Conduct quarterly business reviews with top 50 accounts"
  6. "Achieve NPS score of 60+ (currently 42)"
  7. "Hire 2 additional CSMs by end of Q2"
  8. "Increase expansion revenue from existing customers by 25%"
  9. "Update the customer health scoring model"
  10. "Deliver exceptional customer experiences that drive loyalty"
  11. "Respond to all critical tickets within 1 hour"
  12. "Build a customer advisory board with 10 members"
  13. "Reduce time-to-value for new customers from 45 days to 21 days"
  14. "Track customer health scores weekly"
  15. "Increase customer lifetime value by 20%"

  Task: Categorize each item as an Objective, a Key Result, a
  KPI/health metric, or a Task/project. Then assemble the
  legitimate OKR components into 2-3 properly structured OKRs
  for the team. Explain the difference between each category.

assertions:
  - type: llm_judge
    criteria: "Response correctly categorizes each of the 15 items — identifies objectives (qualitative, inspirational: items like 'Become the most trusted partner' and 'Deliver exceptional customer experiences'), key results (measurable outcomes: 'reduce churn from 8% to 5%', 'achieve NPS 60+', 'increase expansion revenue by 25%'), KPIs/health metrics (ongoing measurements not tied to quarterly change: '99.5% uptime SLA', 'respond to critical tickets within 1 hour', 'track health scores weekly'), and tasks/projects (activities: 'send onboarding emails', 'hire 2 CSMs', 'update health scoring model', 'build advisory board', 'conduct QBRs'); categorizations are accurate and well-explained."
    weight: 0.35
    description: "CorrectCategorization"
  - type: llm_judge
    criteria: "Response assembles 2-3 properly structured OKRs — takes the categorized components and combines objectives with relevant key results (e.g., 'Become the most trusted partner' with key results about NPS, churn, expansion revenue); each assembled OKR has 3-4 key results; the assembled OKRs are coherent and tell a clear story about what the team is trying to achieve; tasks and KPIs are acknowledged as important but placed in their proper context (KPIs are monitored, tasks support OKR achievement, but neither is an OKR itself)."
    weight: 0.35
    description: "AssembledOKRs"
  - type: llm_judge
    criteria: "Response clearly explains the conceptual differences — teaches the distinction between objectives (qualitative direction), key results (measurable outcomes), KPIs (ongoing health metrics), and tasks (activities/projects); explains why confusing them weakens the OKR framework (tasks as KRs means you celebrate activity not impact; KPIs as KRs means you're measuring business-as-usual not stretch improvement); the explanation is accessible to OKR beginners and uses the team's own examples to illustrate concepts."
    weight: 0.30
    description: "ConceptualClarity"
