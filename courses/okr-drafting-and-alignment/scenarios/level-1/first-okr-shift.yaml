meta:
  id: first-okr-shift
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "First OKR shift — handle a mid-quarter situation where a major company pivot requires rewriting OKRs while maintaining team confidence"
  tags: [shift, pivot, mid-quarter, beginner]

state: {}

trigger: |
  You're the head of product at a 60-person B2B SaaS company.
  It's Week 4 of Q3, and the CEO just announced a major
  strategic pivot: the company is shifting from selling to
  small businesses to targeting mid-market enterprises. This
  was triggered by losing a key funding round — the new
  investor wants to see an enterprise strategy.

  The problem: Your product team's Q3 OKRs are entirely focused
  on the SMB market:

  Current OKRs (now obsolete):

  Objective 1: "Become the #1 self-serve product for small
  business accounting"
  - KR1: Launch self-serve signup with credit card payment
  - KR2: Reduce onboarding time to under 5 minutes
  - KR3: Achieve 500 new self-serve signups per month
  - KR4: Hit $50K in self-serve MRR

  Objective 2: "Build features small businesses love"
  - KR1: Launch invoice templates library (50+ templates)
  - KR2: Add QuickBooks import for easy migration
  - KR3: Achieve feature NPS of 60+ on new SMB features

  Your team's reaction to the pivot:
  - Product designer: "We just spent 3 weeks on the self-serve
    flow. All that work is wasted?"
  - Lead engineer: "Enterprise means SSO, audit logs, role-based
    access. That's 6 months of work, not 8 weeks."
  - Junior PM: "How do I write OKRs when everything changes
    every month? What's the point?"

  Task: Write revised Q3 OKRs that reflect the enterprise pivot
  (you have 8 weeks remaining). Address your team's concerns
  about the mid-quarter change and explain how to handle OKR
  resets gracefully.

assertions:
  - type: llm_judge
    criteria: "Response writes revised OKRs appropriate for an 8-week enterprise pivot — includes 2-3 objectives focused on enterprise readiness; key results are achievable in the remaining 8 weeks (not a full quarter's ambition); the OKRs reflect the enterprise strategy (SSO, security, enterprise pricing, pilot customers) while being realistic about what can be accomplished; identifies which elements of the original OKRs might still be partially relevant (some work may carry over)."
    weight: 0.35
    description: "RevisedOKRs"
  - type: llm_judge
    criteria: "Response addresses the team's emotional and practical concerns — responds to the designer's frustration about wasted work (acknowledge the work, explain what carries forward); responds to the engineer's scope concern (8 weeks isn't enough for everything — prioritize the minimum enterprise features); responds to the junior PM's existential question about OKRs changing (explain that pivots are rare and OKRs should be stable, but when strategy changes, OKRs must follow — the alternative is working on the wrong things); the tone is empathetic but decisive."
    weight: 0.35
    description: "TeamConcerns"
  - type: llm_judge
    criteria: "Response explains how to handle OKR resets — provides guidance on when mid-quarter OKR changes are appropriate (major strategic pivot, not minor reprioritization); explains how to score the abandoned OKRs (acknowledge them, don't pretend they didn't exist); discusses the risk of too-frequent changes (if OKRs change every quarter, the process loses credibility); the overall approach demonstrates that OKRs are tools for focus, not bureaucratic constraints."
    weight: 0.30
    description: "OKRResetGuidance"
