meta:
  id: team-okr-basics
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "Team OKR basics — draft quarterly OKRs for a small marketing team focusing on lead generation"
  tags: [team, beginner, marketing, quarterly]

state: {}

trigger: |
  You're the marketing manager for a B2B software startup
  (50 employees). Your team of 5 (2 content writers, 1 designer,
  1 demand gen specialist, 1 social media manager) needs to set
  Q3 OKRs. The company just adopted OKRs this year.

  Company context:
  - Annual revenue: $5M ARR, targeting $8M by year end
  - The CEO's company-level objective: "Accelerate growth to
    reach $8M ARR by December"
  - Sales team is complaining about lead quality — "Marketing
    sends us leads that aren't ready to buy"
  - Website traffic: 50,000 monthly visitors
  - Current MQL to SQL conversion: 15% (industry avg: 20%)
  - Content output: 8 blog posts/month, 1 webinar/quarter
  - Marketing budget: $200K for Q3

  Your VP's guidance: "I want 2-3 team objectives that align
  with the company growth goal. Focus on quality over quantity —
  the sales team's feedback is valid."

  Task: Write your marketing team's Q3 OKRs. Include 2-3
  objectives with 3-4 key results each.

assertions:
  - type: llm_judge
    criteria: "Response writes well-structured team OKRs — includes 2-3 team-level objectives that align with the company's growth goal ($8M ARR); each objective has 3-4 measurable key results with specific metrics; at least one objective addresses the lead quality issue raised by sales; key results include specific numbers (MQL to SQL conversion improvement, traffic growth targets, pipeline contribution); the OKRs are ambitious but achievable for a 5-person team with $200K quarterly budget."
    weight: 0.35
    description: "TeamOKRStructure"
  - type: llm_judge
    criteria: "Response demonstrates proper OKR principles at team level — objectives are outcome-focused, not activity-focused (not 'publish more content' but 'become the go-to resource for [industry topic]'); key results measure outcomes (pipeline generated, conversion rates improved, qualified leads delivered) not activities (posts published, emails sent); shows alignment to company objective without just repeating it; balances quantity metrics (leads, traffic) with quality metrics (conversion rates, lead quality scores)."
    weight: 0.35
    description: "OKRPrinciples"
  - type: llm_judge
    criteria: "Response uses the provided context appropriately — addresses the specific starting metrics (50K visitors, 15% MQL-SQL, 8 posts/month) with improvement targets; addresses the sales team's lead quality complaint as a key focus; key results are calibrated to a 5-person team and $200K budget; the OKRs tell a coherent story about improving marketing's contribution to revenue growth."
    weight: 0.30
    description: "ContextualFit"
