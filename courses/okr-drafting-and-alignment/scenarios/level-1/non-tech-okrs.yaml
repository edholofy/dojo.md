meta:
  id: non-tech-okrs
  level: 1
  course: okr-drafting-and-alignment
  type: output
  description: "Non-tech OKRs — write OKRs for a non-technology role where outcomes are harder to quantify"
  tags: [non-tech, hr, people-ops, qualitative, beginner]

state: {}

trigger: |
  You're the HR manager at a 300-person manufacturing company.
  The company recently adopted OKRs, and the HR team is
  struggling because "our work isn't as easily measurable as
  sales or engineering."

  Your CEO's company objective for the year:
  "Build a world-class workforce that drives operational
  excellence"

  HR team context:
  - Team: 4 people (you, recruiter, benefits admin, L&D specialist)
  - Current employee engagement score: 62% (target: 75%)
  - Turnover rate: 22% (industry average: 18%)
  - Average time-to-fill open positions: 52 days
  - Training hours per employee per year: 8 (target: 24)
  - No formal performance review process exists
  - Diversity: 15% underrepresented groups in leadership
    (industry benchmark: 25%)
  - Employee complaints about unclear career paths

  The recruiter says: "I can't write OKRs — I either fill the
  position or I don't. That's a task, not an OKR."
  The L&D specialist says: "How do I measure 'better training'?
  Attendance? That doesn't mean people actually learned anything."

  Task: Write Q2 OKRs for the HR team (2-3 objectives with
  3-4 key results each). Demonstrate how to make traditionally
  "soft" HR outcomes measurable without reducing them to
  meaningless vanity metrics.

assertions:
  - type: llm_judge
    criteria: "Response writes measurable HR OKRs — includes 2-3 objectives with 3-4 key results each; key results find meaningful ways to measure HR outcomes (engagement scores, retention rates, time-to-productivity for new hires, training effectiveness via skill assessments or manager ratings, career path satisfaction scores, diversity metrics); avoids vanity metrics (training attendance alone) in favor of impact metrics (skill application rates, promotion readiness scores); addresses the CEO's workforce excellence objective."
    weight: 0.35
    description: "MeasurableHROKRs"
  - type: llm_judge
    criteria: "Response addresses the team's measurement concerns — directly responds to the recruiter's concern ('I either fill the position or I don't') by showing how recruitment OKRs focus on outcomes beyond just filling roles (quality of hire, time-to-productivity, hiring manager satisfaction, offer acceptance rate); addresses the L&D specialist's concern about measuring learning by proposing impact-based metrics (skill assessment improvements, manager-rated capability growth, application of training on the job); makes the case that HR outcomes ARE measurable when you focus on the right things."
    weight: 0.35
    description: "MeasurementGuidance"
  - type: llm_judge
    criteria: "Response uses baseline data appropriately — incorporates the provided metrics as baselines (engagement 62%→target, turnover 22%→target, time-to-fill 52 days→target, training 8hrs→target, diversity 15%→target); sets improvement targets that are ambitious but achievable in one quarter; addresses the career path complaint and performance review gap as OKR opportunities; the OKRs are practical for a 4-person HR team at a 300-person manufacturing company."
    weight: 0.30
    description: "PracticalApplication"
