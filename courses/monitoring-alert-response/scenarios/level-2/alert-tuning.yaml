meta:
  id: alert-tuning
  level: 2
  course: monitoring-alert-response
  type: output
  description: "Tune alert thresholds and conditions — adjust alerts to reduce noise while maintaining detection of real problems"
  tags: [monitoring, alert-tuning, thresholds, noise-reduction, intermediate]

state: {}

trigger: |
  Your team reviewed last month's on-call data and found:

  - Total alerts: 342
  - Alerts that required action: 87 (25%)
  - Alerts that resolved without action: 198 (58%)
  - False positives: 57 (17%)

  The worst offenders:
  1. "CPU > 80% on any host" — fired 89 times, required action 3
     times (3.4% actionable rate)
  2. "Response time p99 > 1s on API" — fired 67 times, required
     action 12 times (18% actionable rate)
  3. "Disk usage > 70% on database volumes" — fired 43 times,
     required action 0 times (volumes grow predictably and are
     expanded weekly)
  4. "Error rate > 0.5% on any service" — fired 31 times, required
     action 22 times (71% actionable rate)

  Task: Propose specific tuning changes for each alert. Explain the
  tuning rationale, what you would change, and how to verify the
  tuning is working without missing real incidents.

assertions:
  - type: llm_judge
    criteria: "Each alert is tuned with specific, justified changes — alert 1 (CPU > 80%): 'Current: fires at 80% on any host. Problem: 3.4% actionable rate means 96.6% of pages are wasted. Modern applications routinely run at 80% CPU during traffic spikes without customer impact. Tuning: (a) Raise threshold to 95% sustained for 10 minutes (brief spikes are normal, sustained saturation is not). (b) Add condition: AND (response latency > SLA threshold OR error rate > 1%). This means CPU alerts only fire when high CPU is actually causing customer impact. (c) Different thresholds per service: a compute-heavy service running at 85% is normal; a lightweight API at 85% is unexpected. Expected result: reduce from 89 alerts to approximately 5-10 alerts, all actionable.' Alert 2 (response time p99 > 1s): 'Current: fires at 1 second p99. Problem: 18% actionable rate is better than CPU but still noisy. p99 captures the slowest 1% of requests, which naturally varies. Tuning: (a) Use p95 instead of p99 (less susceptible to outlier spikes). (b) Raise threshold to 2s and require sustained for 5 minutes (brief spikes from cold starts or garbage collection are normal). (c) Alternatively: alert on p99 change from baseline rather than absolute value — a service that normally has p99 of 800ms jumping to 1.5s is significant; a service normally at 950ms touching 1.1s is not. Expected: reduce from 67 to approximately 15 alerts.' Alert 3 (disk > 70%): 'Current: fires at 70% on database volumes. Problem: 0% actionable rate. Volumes grow predictably and are expanded weekly. This alert is completely useless in its current form. Tuning: (a) Change to a predictive alert: alert when the disk is projected to fill to 100% within 7 days based on current growth rate. This gives the team time to expand the volume before it becomes a problem. (b) If keeping a threshold alert: raise to 90% as an emergency backup for the predictive alert. (c) Remove the 70% threshold entirely for volumes that are managed on a weekly schedule. Expected: reduce from 43 to approximately 2-4 alerts, all genuinely indicating upcoming capacity issues.' Alert 4 (error rate > 0.5%): 'Current: fires at 0.5% on any service. This is actually well-tuned — 71% actionable rate is good. Minor tuning: (a) Add a minimum request volume condition — 0.5% of 100 requests is just 1 error (likely noise). 0.5% of 10,000 requests is 50 errors (likely real). Require minimum 500 requests in the window before evaluating the error rate. (b) Keep the threshold but differentiate by severity: for critical services (payment, auth), keep 0.5%. For non-critical services, raise to 1% or 2%. Expected: reduce from 31 to approximately 25 alerts while improving precision'"
    weight: 0.35
    description: "Specific tuning changes"
  - type: llm_judge
    criteria: "Verification strategy ensures tuning does not miss real incidents — verification approach: 'The risk of tuning alerts is creating blind spots — raising thresholds too high and missing real incidents. Verification strategy: (1) Shadow mode: keep the old alert active but downgraded to logging-only (no page). If the old alert fires and the new alert does not, check whether the old alert was actionable. If it was, the new threshold is too high. Run shadow mode for 2 weeks before decommissioning the old alert. (2) Compare with incident history: review the 87 alerts from last month that required action. Would the new thresholds have detected all of them? If any would have been missed, adjust. (3) Progressive tuning: do not change all alerts at once. Tune one alert at a time, monitor for 1 week, then tune the next. This lets you isolate the impact of each change. (4) Metrics tracking: after tuning, track: total alert volume (should decrease), actionable rate (should increase), incidents detected by monitoring (should stay the same or improve), incidents detected by other means (should not increase — this would indicate missed alerts). Target: overall actionable rate should increase from 25% to 60%+ within 8 weeks of tuning'"
    weight: 0.35
    description: "Verification strategy"
  - type: llm_judge
    criteria: "Response addresses the broader alert hygiene practice — ongoing alert hygiene: 'Alert tuning is not a one-time project — it is a continuous practice. Recommended process: (1) Monthly alert review: every month, review the top 5 noisiest alerts (by volume or lowest actionable rate). Tune or remove them. This prevents alert debt from accumulating. (2) Every alert must have an owner: when an alert fires, someone should be accountable for its quality. If an alert fires 50 times with no action taken, the alert owner should be asked to tune or justify it. (3) Alert deletion is healthy: it is better to remove a noisy alert than to let it contribute to alert fatigue. A removed alert that is needed will be noticed (something breaks and no one is alerted) — but alert fatigue from noisy alerts causes people to ignore real alerts, which is more dangerous. (4) Actionable rate as a team metric: track the overall percentage of alerts that result in human action. Set a team goal (for example: 60% or higher actionable rate). Report it in team retrospectives.' The goal: 'Every alert that wakes someone up at 3 AM should represent a real problem that needs human intervention right now. If it can wait until morning, it should not be a page. If it resolves on its own, it should not be a page. If it happens every day without action, it should not be a page'"
    weight: 0.30
    description: "Alert hygiene practice"
