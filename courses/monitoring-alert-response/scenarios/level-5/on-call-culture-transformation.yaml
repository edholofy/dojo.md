meta:
  id: on-call-culture-transformation
  level: 5
  course: monitoring-alert-response
  type: output
  description: "Transform on-call culture — redesign the on-call program to be sustainable, equitable, and valued, addressing burnout and making on-call a positive engineering experience"
  tags: [monitoring, on-call, culture, burnout, sustainability, organizational-design, master]

state: {}

trigger: |
  Your company's on-call program is in crisis. An anonymous
  engineering survey revealed:

  - 45% of engineers say on-call is the worst part of their job
  - 30% say on-call negatively impacts their personal life
  - 25% would consider leaving for a company with no on-call
  - On-call compensation is inconsistent: some teams get extra pay,
    others get comp time, some get nothing
  - Senior engineers avoid on-call by moving to teams without
    production services
  - Junior engineers bear a disproportionate on-call burden
  - 3 engineers left in the last quarter citing on-call as the
    primary reason
  - The VP of Engineering says: "On-call is essential but our
    program is broken. Fix it without eliminating on-call."

  Current on-call structure:
  - 40 teams with production services
  - On-call rotations vary: some teams have 4-person rotations
    (1 week in 4), others have 8-person rotations (1 week in 8)
  - Pages per week vary wildly: 2 per week (best team) to 45 per
    week (worst team)
  - No on-call training program
  - No on-call quality standards
  - On-call handoff is ad-hoc (some teams do it well, most do not)

  Task: Design the on-call transformation program. Include: fair
  compensation, quality standards, training, and the cultural changes
  needed to make on-call sustainable and valued.

assertions:
  - type: llm_judge
    criteria: "On-call standards and equity framework established — standards and equity: 'On-call quality standards (mandatory for all 40 teams): (1) Page volume ceiling: no team should exceed 10 pages per week in a 4-week trailing average. Teams exceeding this threshold enter a mandatory noise reduction program. The team with 45 pages per week is in crisis — their on-call is not on-call, it is firefighting. They need immediate intervention: leadership-supported investment in fixing the underlying issues causing alerts, temporary supplemental on-call support from SRE while the team stabilizes, a 30-day goal to reduce to under 20 pages per week and a 90-day goal to reach under 10. (2) Rotation minimum: every rotation must have at least 6 engineers. This means no one is on-call more than 1 week in 6. Teams with fewer than 6 engineers either combine rotations with related teams or receive SRE support rotation coverage. The 4-person rotations (1 week in 4) are unsustainable — the on-call frequency is too high for those teams. (3) Actionable rate minimum: at least 60% of pages must be actionable (require human intervention). Below 60%: the team must tune their alerts before their next rotation begins. (4) Runbook coverage: 100% of paging alerts must have linked runbooks. No runbook = no page. The alert is downgraded to a notification. Equity framework: (1) Fair distribution across seniority. On-call is not junior work. Every engineer at every level participates. Senior engineers and managers are included in rotations. This prevents the pattern where senior engineers avoid on-call by moving to non-production teams. Exception: first 90 days for new hires — they shadow on-call before being added to the rotation. (2) Workload equity across teams. Some services are inherently noisier than others. Teams with higher page volumes get additional support: investment priority for noise reduction, temporary SRE rotation support, and recognition that their on-call burden is higher. The goal is not equal pages per team — it is equal burden per engineer. If one team's on-call is harder, they should have a larger rotation or additional support'"
    weight: 0.35
    description: "Standards and equity"
  - type: llm_judge
    criteria: "Compensation and recognition program is fair and comprehensive — compensation and recognition: 'Compensation model: (1) Base on-call compensation (all engineers on rotation). Flat stipend per on-call week: $500 for weekday primary, $750 for weekend primary (higher rate recognizes personal life impact). This is paid regardless of whether pages are received — being available and ready has value. (2) Page compensation. Per-page compensation for after-hours pages (outside business hours): $50 per page acknowledged and resolved. This compensates for the specific disruption, not just availability. Cap: if a team consistently generates high page compensation, the investment should go to noise reduction, not to paying engineers to suffer through bad alerts. (3) Incident compensation. Extended incident work (incidents lasting more than 2 hours after hours): additional $200 per incident. Next-day recovery: if an engineer is paged between midnight and 6am, they are expected to start late the next day (at least 4 hours later). This is policy, not optional — managers must enforce it. (4) Compensation equity audit. Quarterly audit: are all teams compensated consistently? Are there teams where on-call compensation is significantly lower for equivalent burden? The current inconsistency (some teams get extra pay, some comp time, some nothing) is eliminated. One company-wide policy. Recognition program: (1) On-call excellence awards (quarterly). Recognize: the on-call engineer who resolved the most impactful incident, the team that achieved the largest noise reduction, the engineer who wrote the best runbook or automation. (2) On-call improvement metrics (visible to leadership). Track and report: page volume trends per team, on-call satisfaction scores, MTTR improvements. Teams that improve their on-call experience are recognized in engineering all-hands. (3) Career impact. On-call performance is part of performance reviews. Being an excellent on-call engineer (fast response, good judgment, thorough postmortems) is valued in promotion decisions. This counteracts the incentive to avoid on-call — instead, excelling at on-call advances your career'"
    weight: 0.35
    description: "Compensation and recognition"
  - type: llm_judge
    criteria: "Training and cultural transformation addressed — training and culture: 'On-call training program: (1) On-call bootcamp (required before first rotation). 4-hour workshop covering: how to read and triage alerts, how to use monitoring tools (dashboards, log queries, trace investigation), incident response process (when to escalate, how to communicate), common failure modes for the specific service. Bootcamp ends with a simulated incident: the trainee walks through an actual past incident using production tools and runbooks. (2) Shadow rotation (required for first rotation). New on-call engineers shadow an experienced engineer for one full rotation. They receive pages and triage them, but the experienced engineer is the actual responder. After the shadow rotation: debrief with the experienced engineer. Am I ready? Both parties agree before the new engineer goes on primary rotation. (3) Ongoing skill development. Monthly incident review sessions (1 hour): review interesting incidents from the past month, share investigation techniques, discuss what went well and what could improve. These sessions are not postmortems — they are educational. Quarterly game days: simulated incidents in staging environments. Teams practice incident response without production risk. These build confidence and muscle memory. Cultural transformation: (1) Leadership commitment. The VP of Engineering and all engineering directors go on-call for one week per quarter. This accomplishes two things: they experience the on-call burden firsthand, and it signals that on-call is valued, not beneath leadership. (2) From burden to ownership. Reframe on-call from you have to be on-call to you own your service in production. Teams that own their on-call are empowered to: make changes that improve their on-call experience (reduce noise, improve tooling), invest sprint time in operational improvements (this requires product management buy-in — on-call improvement work is prioritized alongside feature work), and reject alerts that are not actionable (with the quality standards as backing). (3) Feedback loops. Monthly on-call retrospective per team: what was the worst page this rotation? How do we prevent it? This makes on-call improvement a continuous process, not a one-time project. Quarterly company-wide on-call satisfaction survey. Results are reported to the VP of Engineering and shared with all teams. Teams with declining satisfaction get immediate attention. (4) Measuring transformation success. 6-month targets: on-call satisfaction score: from current (estimated 2.5/5) to 3.5/5. Engineers considering leaving due to on-call: from 25% to under 10%. Pages per week company average: under 10 per team. All teams meeting quality standards (runbook coverage, actionable rate, rotation size). Zero attrition attributed to on-call in the next 2 quarters'"
    weight: 0.30
    description: "Training and culture"
