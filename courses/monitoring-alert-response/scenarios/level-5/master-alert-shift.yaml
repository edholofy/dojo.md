meta:
  id: master-alert-shift
  level: 5
  course: monitoring-alert-response
  type: output
  description: "Master alert shift — lead monitoring strategy through an existential crisis combining a major outage, board pressure, regulatory audit, and organizational transformation"
  tags: [monitoring, shift-simulation, master, crisis, comprehensive, leadership]

state: {}

trigger: |
  You are the SVP of Engineering at a public SaaS company ($800M ARR).
  It is Monday morning and everything is converging:

  1. OUTAGE: Your platform has been experiencing intermittent
     degradation since Friday night. The on-call team has been
     firefighting all weekend. 3 P1 incidents were declared and
     resolved, but the root cause has not been found. Customer
     complaints are escalating. Your largest customer ($30M ARR)
     has scheduled an emergency call with their CTO for Tuesday.

  2. BOARD: The board meeting is Wednesday. The CEO has told you:
     "The board is going to ask about reliability. After last
     quarter's outages ($2M in SLA credits), they want a clear
     plan. Make it concrete and credible."

  3. REGULATORY: SOC 2 auditors arrive next Monday for a Type II
     audit. They will examine your monitoring and incident response
     practices for the past 12 months. Your compliance team has
     flagged 3 gaps: incomplete alert change audit trails, missing
     documentation for 40% of alert rules, and no evidence of
     regular monitoring reviews.

  4. ORGANIZATIONAL: The VP of SRE resigned last Friday (effective
     immediately — they went to a competitor). They managed the
     20-person SRE team and were the primary owner of the monitoring
     platform. The team is demoralized and leaderless.

  Task: Write your action plan for the next 7 days. Prioritize
  ruthlessly — you cannot do everything. Address: the immediate
  crisis, the board, the audit, and the organizational gap.

assertions:
  - type: llm_judge
    criteria: "Priorities are ruthlessly triaged across the four crises — triage and prioritization: 'Priority framework: life safety → revenue protection → compliance → organizational. In business terms: stop the bleeding → protect the largest customer → pass the audit → stabilize the team. Day 1 (Monday): the outage is priority zero. Morning: establish an incident commander for the ongoing degradation. This cannot be the SVP — you need to lead across all four crises. Appoint the most senior SRE as acting IC. Mandate: find and fix the root cause today. Resources: any engineer needed, no questions asked. If the root cause requires expertise that the team lacks (database specialist, network engineer), authorize external consulting support immediately. Afternoon: prepare for the $30M customer call (Tuesday). Draft talking points: what we know, what we have done, what we are doing, and our commitment. The customer call must convey: we understand the impact, we have our best people on it, and we will provide a detailed incident report within 48 hours. Do NOT promise a root cause on the call — promise transparency and regular updates. End of day 1: the outage is either resolved or you have a containment strategy that prevents further customer impact while investigation continues. Day 2 (Tuesday): customer and board preparation. Morning: $30M customer call. Be transparent: describe the incidents, the impact, and the investigation. Commit to: daily status updates until resolved, a comprehensive incident report within 5 business days, and a remediation plan to prevent recurrence. Afternoon: begin board presentation preparation. The board needs: a clear explanation of what happened and why, a concrete plan with metrics and milestones, confidence that this is being taken seriously. The board does not need: technical deep dives, excuses, or vague promises. Draft the board deck: 5 slides maximum. Days 3-4 (Wednesday-Thursday): board meeting and audit preparation. Wednesday: board meeting. Present the reliability plan with honesty and specificity. After the board meeting: shift focus to SOC 2 preparation. For the 3 audit gaps: (1) incomplete alert change audit trails — pull Git history for alert configuration changes (all alert configs should be in Git, and most likely are — the audit trail exists, it just needs to be compiled into the format auditors expect). (2) Missing documentation for 40% of alert rules — this cannot be fully remediated in 4 days. Priority: document the most critical 50% of undocumented alerts (covering the highest-severity alert rules). For the remainder: present the auditors with a remediation plan and timeline. (3) No evidence of regular monitoring reviews — compile any meeting notes, Slack discussions, or postmortem references that demonstrate informal review. Schedule a formal monitoring review for Thursday or Friday that the auditors can reference as evidence of current practice. Days 5-7 (Friday-Sunday): organizational stabilization. Friday: meet with the SRE team. Acknowledge the VP departure. Communicate: we are not leaderless — I am personally accountable for this team until we have a new leader. Appoint an acting SRE lead (the most senior and respected SRE). Define immediate expectations: maintain the monitoring platform, support the audit, and continue incident response. Begin the VP SRE search immediately (engage recruiting, identify internal candidates). Weekend: personal preparation for audit week. Review all compiled evidence. Brief the acting SRE lead on audit expectations'"
    weight: 0.35
    description: "Ruthless prioritization"
  - type: llm_judge
    criteria: "Board presentation is concrete and credible — board presentation: 'Slide 1: State of reliability (honest assessment). Last quarter: 5 P1 incidents, 2 resulting in SLA credits totaling $2M. Customer impact: measurable NPS decline among enterprise accounts. Root cause: our monitoring investment has not kept pace with our growth. We grew from 100 to 200 services in 18 months. Our monitoring maturity did not scale proportionally. This weekend: ongoing intermittent degradation affecting multiple customers. We have our best engineers on it and will resolve it within 48 hours. Slide 2: What we are doing about it (the plan). 30-day actions: resolve the current incident and publish a comprehensive postmortem. Complete SLO definition for all Tier 1 customer-facing services. Reduce alert noise by 50% (currently 30% of pages are non-actionable). 90-day actions: deploy customer-experience monitoring (synthetic checks, real user monitoring) to detect customer-facing issues before customers do. Implement automated incident response for the top 10 most common incident types. Hire VP of SRE (our previous VP departed — we are actively recruiting). 12-month targets: MTTD under 2 minutes (currently 8 minutes). Customer-detected incidents: under 5% (currently estimated at 25%). Zero SLA credit events (current: 5 per year). On-call engineer satisfaction above 4/5. Slide 3: Investment required. Incremental ask: $1.5M over 12 months ($800K for tooling and platform improvements, $500K for 3 additional SRE hires, $200K for external consulting during transition). Expected return: $2M+ in avoided SLA credits, reduced churn risk for $50M+ in at-risk enterprise ARR, compliance readiness for healthcare and financial services expansion. Slide 4: How we will track progress. Monthly: reliability metrics dashboard shared with the board (availability, MTTD, MTTR, SLA compliance). Quarterly: comprehensive reliability review at board meetings. Accountability: I am personally accountable for these targets. Slide 5: Ask. Approve the $1.5M investment. Support expedited VP SRE hiring. Hold me accountable at the next board meeting for 30-day progress'"
    weight: 0.35
    description: "Board presentation"
  - type: llm_judge
    criteria: "Audit preparation and organizational response are addressed — audit and org: 'SOC 2 audit preparation (4 days to prepare): Realistic assessment: we cannot fully remediate 3 gaps in 4 days. The strategy is: show auditors what we have, demonstrate awareness of gaps, and present a credible remediation plan. Auditors assess whether the organization takes controls seriously — a known gap with a remediation plan is better than an unknown gap. Gap 1 (alert change audit trails): immediate action: export Git commit history for all alert configuration files for the past 12 months. Format into an audit-friendly log: date, who changed what, commit message explaining why. This likely covers 60-80% of changes (those made through proper Git workflow). For changes made outside Git (direct UI edits in Grafana/PagerDuty): pull platform audit logs. Present to auditors: we have audit trails through our version control system and platform logs. We are implementing a policy that all alert changes must go through version control. Gap 2 (undocumented alerts): immediate action: in 4 days, document the top 120 undocumented alerts (approximately 50% of the 240 undocumented rules, prioritizing by severity). For each: add description, threshold rationale, owning team, and linked runbook. Present to auditors: here are our documented alerts (now 80% documented). Here is our plan to reach 100% within 60 days. Gap 3 (no regular monitoring reviews): immediate action: schedule and conduct a formal monitoring review on Thursday or Friday. Document it with meeting notes, attendees, topics discussed, and action items. Pull any informal evidence of past reviews (postmortem references, Slack discussions about alert tuning). Present to auditors: we conduct monitoring reviews (here is this week's). We are formalizing the cadence to monthly going forward. With the auditors: be transparent. Auditors respect organizations that identify and address gaps proactively. Do not hide or minimize the gaps. Organizational response: (1) SRE team stabilization. The VP departure is the longest-term problem. Immediate: appoint acting SRE lead with authority to make day-to-day decisions. Short-term (2-4 weeks): identify VP SRE candidates (internal promotion or external hire). Long-term (2-3 months): new VP SRE in place, team restructured if needed. (2) Team morale. The SRE team just lost their leader during a crisis. They are demoralized and overworked (weekend firefighting). Actions: personal 1:1 with each SRE this week (15 minutes each, listen more than talk). Acknowledge the difficulty of the situation. Commitment: no one on this team is at risk. Your roles are secure and valued. Extra support: if any SRE needs a day off after the weekend firefighting, approve it immediately. Bring in contract SREs if needed for the next 30 days to reduce the burden while we hire. (3) Personal leadership. As SVP, you are now the most visible engineering leader on reliability. This week requires: being visibly present (in the incident channel, in the war room, at the audit). Making decisions quickly (teams need direction, not deliberation). Communicating constantly (the CEO, the board, the customer, the SRE team, and the auditors all need updates). Delegating effectively (you cannot do all four things yourself — appoint owners for each workstream and hold them accountable)'"
    weight: 0.30
    description: "Audit and organization"
