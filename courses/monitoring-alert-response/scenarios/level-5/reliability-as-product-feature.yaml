meta:
  id: reliability-as-product-feature
  level: 5
  course: monitoring-alert-response
  type: output
  description: "Position reliability as a product feature — build customer-facing reliability capabilities that turn observability into a competitive advantage and revenue driver"
  tags: [monitoring, product, reliability, competitive-advantage, customer-facing, master]

state: {}

trigger: |
  Your company's sales team reports that in 60% of enterprise deals,
  prospects ask about reliability, uptime guarantees, and incident
  transparency. Your largest competitor recently launched a public
  status page with real-time SLO dashboards and a reliability blog.
  Your company has none of this.

  The CPO (Chief Product Officer) has asked: "Can we turn our
  reliability investment into something customers see and value?
  Our sales team needs proof that we are reliable, not just promises."

  Current state:
  - Internal monitoring is mature (MTTD < 3 minutes, 99.97% uptime)
  - No public-facing reliability data
  - Status page exists but is manually updated (last incident update
    was 4 hours after the incident started)
  - Enterprise customers have no visibility into their specific
    service health
  - Contractual SLAs are 99.9% but actual performance exceeds this
  - No reliability reporting for customer success or sales teams

  Task: Design a customer-facing reliability program that turns your
  internal observability into a competitive advantage. Include: what
  to expose to customers, how to position it in sales, and the risks
  of transparency.

assertions:
  - type: llm_judge
    criteria: "Customer-facing reliability capabilities are designed — capability design: 'Tier 1: Public reliability (available to all customers). (1) Automated status page: real-time status page that updates automatically from internal monitoring. When an internal P1/P2 incident is declared, the status page updates within 2 minutes (automated, not manual). Components shown: major product areas (API, Dashboard, Integrations, Data Processing) with real-time status (operational, degraded, outage). Historical uptime: trailing 90-day uptime percentage per component. Incident history: last 90 days of incidents with timelines and postmortems. This replaces the manual status page that was updated 4 hours late. (2) Public SLA dashboard: monthly uptime percentage for the overall platform. SLA compliance status: green (exceeding SLA), yellow (approaching SLA limit), red (SLA breached). Historical trend: 12-month rolling uptime graph. Our current 99.97% significantly exceeds the 99.9% SLA — showing this publicly turns our reliability investment into visible proof. (3) Reliability blog: quarterly reliability reports (written for a non-technical audience). Public postmortems for major incidents (what happened, what we learned, what we changed). These demonstrate transparency and a culture of continuous improvement. Companies like Cloudflare and Atlassian publish these — our customers expect it from enterprise SaaS. Tier 2: Enterprise reliability (for enterprise plan customers). (1) Tenant-specific health dashboard: each enterprise customer gets a dashboard showing their specific service health. Availability of the specific endpoints and features they use. Latency percentiles for their API calls. Error rates for their requests. This is more valuable than a generic status page because it answers: is the platform working for me? (2) Proactive incident notification: when an incident affects an enterprise customer, notify their designated contact before they notice. Notification includes: what is affected, estimated impact, and expected resolution time. This is the difference between the customer calling you in a panic and you calling them with a plan. (3) Custom SLA reporting: monthly SLA compliance report delivered to each enterprise customer. Shows: their specific uptime, latency against SLA targets, any SLA breaches and credit calculations. Eliminates the manual SLA disputes — the data is transparent and agreed upon'"
    weight: 0.35
    description: "Customer-facing capabilities"
  - type: llm_judge
    criteria: "Sales enablement and competitive positioning addressed — sales and positioning: 'Sales enablement: (1) Reliability as a differentiator in sales cycles. For the 60% of enterprise deals where reliability is discussed: the sales team can show the public SLA dashboard with our trailing 99.97% uptime (exceeding our 99.9% SLA). They can reference specific public postmortems demonstrating our transparency and learning culture. They can offer a demo of the tenant-specific health dashboard the customer will receive. Competitive comparison: our competitor launched a public status page — we match and exceed with tenant-specific dashboards and proactive notifications. (2) Sales collateral. Reliability one-pager: our architecture, our SLAs, our actual performance, and our incident response process. Case study: how our proactive notification during an incident retained a $10M customer who would have churned if they found the outage themselves. Trust center: a dedicated page with security certifications, compliance status, and reliability data. (3) Pricing. Tier the reliability features: public status page and reliability blog: available to all customers (trust building). Tenant-specific dashboards and proactive notification: enterprise plan feature (upsell driver). Custom SLA reporting and dedicated reliability contact: premium enterprise feature. Estimated revenue impact: if reliability features help close 3 additional enterprise deals per year at average $500K ARR, that is $1.5M incremental revenue. If they reduce churn by 5% among enterprise customers, that saves $2-5M in retained ARR. (4) Customer success enablement. Customer success managers receive weekly reliability reports for their accounts. They proactively discuss reliability in QBRs (quarterly business reviews): your service availability was 99.99% this quarter, exceeding your SLA. Here are the improvements we made to your specific services. This turns reliability from a reactive conversation (something went wrong) to a proactive one (look how well things are going)'"
    weight: 0.35
    description: "Sales enablement"
  - type: llm_judge
    criteria: "Risks of transparency and mitigation strategies addressed — risks and mitigations: '(1) Risk: public data used against us. Concern: competitors or unhappy customers use our public uptime data or incident reports against us in sales situations or contract negotiations. Mitigation: the alternative — hiding reliability data — is worse. Prospects assume the worst when they cannot verify. Publishing data that shows 99.97% uptime is better than prospects assuming we are at 99.5% because they heard about one outage on social media. Frame it as confidence: we publish our reliability data because we are proud of it. Companies that hide their reliability data usually have something to hide. (2) Risk: setting expectations too high. Concern: showing 99.97% uptime sets the expectation that we will always be at 99.97% or better. When we inevitably have a bad month (99.95%), customers are disappointed. Mitigation: our SLA is 99.9%, not 99.97%. The dashboard shows we exceed our commitment, not that we guarantee perfection. Framing matters: we consistently exceed our SLA is the message, not we guarantee 99.97%. Include a disclaimer: historical performance is not a guarantee of future performance. SLAs define our contractual commitment. (3) Risk: incident postmortems revealing too much. Concern: public postmortems might reveal architectural details that competitors or attackers could exploit. Mitigation: public postmortems are written for a general audience. They explain what happened and what we learned, not the specific technical vulnerabilities or architectural details. Internal postmortems contain full technical detail — public versions are summarized. Security incidents are NOT published publicly (only a general statement if needed). Have legal and security review all public postmortems before publication. (4) Risk: operational burden. Concern: maintaining customer-facing reliability features adds work for the engineering team. Mitigation: automate everything possible. The status page updates from internal monitoring automatically. Tenant dashboards are generated from existing observability data. SLA reports are computed automatically. The only manual work: writing public postmortems (quarterly) and maintaining the reliability blog. Estimated ongoing effort: 0.5 FTE for the reliability communications program. (5) Risk: data accuracy. Concern: if the public-facing data shows an outage that did not actually affect customers, it damages trust. If it misses an outage that did affect customers, it damages credibility. Mitigation: the status page is driven by customer-experience monitoring (synthetic checks, real user monitoring), not infrastructure metrics. This means it reflects what customers actually experience. Validate: regularly compare status page data with customer support tickets. If customers report issues that the status page shows as operational, fix the monitoring, not the status page'"
    weight: 0.30
    description: "Transparency risks"
