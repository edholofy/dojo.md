meta:
  id: enterprise-observability-strategy
  level: 5
  course: monitoring-alert-response
  type: output
  description: "Define enterprise observability strategy — create a multi-year observability vision that aligns monitoring investments with business outcomes and organizational growth"
  tags: [monitoring, enterprise, strategy, observability, business-alignment, master]

state: {}

trigger: |
  You are the VP of Platform Engineering at a publicly traded SaaS
  company. The board has asked for a 3-year technology strategy, and
  the CTO wants your observability strategy as a key component. Context:

  - 500 engineers across 60 teams
  - 200+ microservices across 4 cloud regions
  - Revenue: $300M ARR, growing 40% year-over-year
  - Current observability spend: $2.5M/year (0.8% of revenue)
  - Enterprise customers (Fortune 500) require 99.99% availability
    SLAs in contracts
  - Two major outages in the last year resulted in $4M in SLA credits
    and one churned enterprise customer ($2M ARR)
  - The company is expanding into regulated industries (healthcare,
    financial services) requiring compliance-grade monitoring
  - Current monitoring: adequate for current scale but will not
    survive 3x growth without significant investment
  - The CFO wants to understand the ROI of observability investment

  Task: Write the 3-year enterprise observability strategy. Include
  the business case, capability roadmap, investment plan, and how
  observability directly supports revenue protection and growth.

assertions:
  - type: llm_judge
    criteria: "Business case quantifies observability ROI — business case: 'The business case for observability investment: (1) Revenue protection. Current cost of inadequate observability: $4M in SLA credits from 2 major outages, $2M ARR lost from churned enterprise customer, estimated $1M in engineering time spent on reactive firefighting (500 engineers × 2% time on incident response = 10 FTE equivalent × $200K loaded cost / 2 for partial attribution = $1M). Total quantifiable cost: $7M/year from inadequate observability. Our observability spend of $2.5M/year is failing to prevent $7M in losses. The ROI question is not whether to invest more — it is how much of the $7M we can prevent. (2) Revenue enablement. Enterprise customers requiring 99.99% SLA: achieving and demonstrating 99.99% requires observability that can detect and resolve issues within the 4.3 minutes of monthly downtime budget. Without investment: we cannot credibly commit to 99.99%, limiting enterprise deal sizes. With investment: each enterprise customer is worth $500K-5M ARR. If improved observability enables closing 3 additional enterprise deals per year, that is $1.5-15M incremental revenue. Regulated industry expansion (healthcare, financial services): compliance-grade monitoring with audit trails, data residency, and regulatory reporting is a prerequisite. Without it: these markets are inaccessible. Market opportunity: $50M+ in addressable revenue. (3) Engineering efficiency. Engineers currently spend 15-20% of time on operational toil (incident response, alert noise, manual investigation). With mature observability: reduce to 5-10%, recovering 25-50 FTE equivalent of engineering capacity. At $200K loaded cost: $5-10M/year in recovered productivity. (4) Investment ask and ROI summary. Year 1 investment: $4M (increase from $2.5M to $4M). Year 2: $4.5M. Year 3: $5M. 3-year total investment: $13.5M. 3-year expected return: $21-42M (prevented revenue loss + enabled revenue + engineering efficiency). ROI: 55-210% over 3 years. Break-even: within 12 months of year 1'"
    weight: 0.35
    description: "Business case and ROI"
  - type: llm_judge
    criteria: "Capability roadmap addresses scale, compliance, and enterprise requirements — capability roadmap: 'Year 1: Foundation for scale. Q1-Q2: Unified observability platform. Consolidate tooling onto a single platform capable of handling 3x current scale. Implement OpenTelemetry as the instrumentation standard across all services. Deploy centralized metrics, logs, and traces with full correlation. Establish SLOs for all customer-facing services with burn-rate alerting. Q3-Q4: Enterprise-grade reliability. Implement multi-region monitoring (monitoring infrastructure in each of 4 cloud regions, with cross-region correlation). Achieve and sustain 99.99% availability across all enterprise SLA services. Deploy automated incident detection and response for the top 20 failure modes. Create executive reliability dashboard showing SLA compliance in real-time. Year 1 milestone: zero SLA credit events, MTTD under 2 minutes, all services instrumented. Year 2: Compliance and intelligence. Q1-Q2: Compliance-grade monitoring. Implement audit trail for all monitoring configuration changes. Deploy data residency controls (healthcare data stays in US regions, financial data meets regional requirements). Build compliance reporting for HIPAA, SOC 2, and financial regulations. Implement monitoring data retention policies meeting regulatory requirements. Q3-Q4: Intelligent operations. Deploy AIOps for anomaly detection (baseline-aware alerting that adapts to patterns). Implement predictive alerting for capacity and performance degradation. Build automated root cause analysis using correlated metrics, logs, and traces. Reduce MTTR by 50% through automation and intelligent investigation tools. Year 2 milestone: compliance certifications for healthcare and financial services, MTTR under 20 minutes. Year 3: Competitive advantage. Q1-Q2: Customer-facing observability. Build customer-facing status pages with real-time SLA reporting. Provide enterprise customers with their own observability dashboards showing their service health. Implement proactive customer notification (detect and notify before customers report issues). Q3-Q4: Observability as a platform. Enable internal teams to self-serve observability (monitoring-as-code, self-service dashboards, alert configuration). Build observability data lake for long-term trend analysis and capacity planning. Integrate observability data with business intelligence for product-level insights. Year 3 milestone: observability is a competitive differentiator in enterprise sales, engineering operational toil below 5%'"
    weight: 0.35
    description: "Capability roadmap"
  - type: llm_judge
    criteria: "Organizational model and governance support execution — organization and governance: 'Team structure: Observability Platform Team (year 1: 8 engineers, year 3: 12 engineers). Mission: build and maintain the observability platform that all 60 teams use. Responsibilities: platform selection and operation, instrumentation libraries and SDKs, SLO framework and tooling, alerting infrastructure and routing, compliance and audit capabilities. This is a platform team — they build tools, not monitor services. Service teams own their own observability. Governance model: (1) Observability standards board: meets quarterly. Members: VP Platform Engineering (chair), 3 senior SREs, 2 service team leads (rotating), security representative, compliance representative. Responsibilities: approve platform changes, set instrumentation standards, review observability investment and spending, assess maturity across the organization. (2) Service observability requirements: every service must meet minimum observability standards: SLOs defined and burn-rate alerts configured, structured logging with correlation IDs, distributed tracing integrated, runbooks linked to all paging alerts, monitoring profile documented and reviewed annually. New services cannot go to production without meeting these requirements (enforced via deployment pipeline). (3) Cost governance: observability spend tracked per team (cost attribution). Quarterly cost review: identify optimization opportunities. Budget model: observability cost as percentage of infrastructure cost (target: under 15%). Teams that generate disproportionate observability costs are identified and work with the platform team to optimize. (4) Executive reporting: monthly reliability report to CTO: SLA compliance, major incidents, MTTD/MTTR trends, cost efficiency. Quarterly board update: reliability metrics, SLA credit exposure, customer satisfaction metrics, observability investment ROI. Annual strategy review: assess progress against 3-year roadmap, adjust priorities based on business changes'"
    weight: 0.30
    description: "Organization and governance"
