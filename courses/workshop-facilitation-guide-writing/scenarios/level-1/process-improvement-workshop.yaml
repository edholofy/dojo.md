meta:
  id: process-improvement-workshop
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a Lean process improvement workshop to reduce customer onboarding time from 14 days to 7 days"
  tags: [process-improvement, lean, kaizen, operations, beginner]

state: {}

trigger: |
  You're an operations analyst at a B2B SaaS
  company. Customer onboarding currently takes 14
  days on average, but the target is 7 days. The
  VP of Customer Success wants a workshop to map
  the current process, identify waste, and design
  the improved process — all in one session.

  Workshop details:
  - Duration: 3 hours
  - Participants: 8 people (onboarding specialists,
    implementation engineers, account managers,
    customer support rep, product manager)
  - Location: Large room with wall space for process
    mapping
  - Materials: Large paper rolls, sticky notes (5
    colors), markers, red dot stickers for "pain
    points"

  Workshop structure:
  1. Opening: State the goal and ground rules (10 min)
  2. Current state mapping (45 min): Map the
     entire onboarding process step by step on the
     wall (swim lanes by role)
  3. Pain point identification (15 min): Red dot
     stickers on steps that cause delays, errors,
     or frustration
  4. Break (10 min)
  5. Waste analysis (20 min): Categorize waste
     using Lean categories (waiting, overprocessing,
     defects, motion, etc.)
  6. Root cause analysis (20 min): "5 Whys" on the
     top 3 waste sources
  7. Future state design (30 min): Redesign the
     process to eliminate identified waste
  8. Action plan (15 min): What changes to implement
     first, owners, timeline
  9. Close (5 min)

  Facilitation guide must include:
  - Facilitator script for each section
  - How to run a swim-lane process mapping exercise
    (step by step)
  - Lean waste categories explained simply (not
    everyone knows Lean)
  - "5 Whys" facilitation technique
  - How to keep the group focused on the process
    (not blaming people)
  - How to handle "but we've always done it this
    way" resistance
  - Post-workshop: process document template

  Task: Write the complete facilitation guide with
  process mapping instructions, Lean tools, and
  follow-up template.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete process improvement guide — facilitator scripts for all 9 sections within 3 hours; swim-lane process mapping instructions; Lean waste categories explained accessibly; 5 Whys technique guide; focus on process not blame; resistance handling; post-workshop process document template."
    weight: 0.35
    description: "ProcessGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Lean facilitation expertise — swim-lane mapping correctly shows handoffs between roles; Lean waste categories are explained in plain language; the 5 Whys technique goes deep enough to find root causes; the future state design builds logically from the analysis; the action plan prioritizes quick wins; the facilitator keeps energy up across 3 hours."
    weight: 0.35
    description: "LeanExpertise"
  - type: llm_judge
    criteria: "Response would produce real process improvement — the current state map would reveal previously invisible waste; the root cause analysis would find systemic issues; the future state would be achievable (not just aspirational); the action plan would start reducing onboarding time within weeks; the team would feel ownership of the improvement."
    weight: 0.30
    description: "ImprovementOutcome"
