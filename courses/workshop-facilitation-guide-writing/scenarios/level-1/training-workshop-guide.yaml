meta:
  id: training-workshop-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a hands-on software training workshop teaching a non-technical team to use a new CRM system"
  tags: [training, software, crm, hands-on, beginner]

state: {}

trigger: |
  You're a training specialist at a company that
  just purchased Salesforce for its 15-person sales
  team. Most team members have been using
  spreadsheets to track leads and are anxious about
  the new system. You need to facilitate a hands-on
  training workshop.

  Workshop details:
  - Duration: 2 hours
  - Participants: 15 sales reps (non-technical,
    varying comfort with technology)
  - Location: Training room with individual laptops
  - Each participant has a Salesforce sandbox account
  - 3 "power users" have been pre-trained and will
    assist

  Workshop structure:
  1. Welcome and "why the change" (10 min): Address
     anxiety and explain benefits
  2. Demo: Tour of the interface (10 min): Show
     don't tell — facilitator demos key screens
  3. Hands-on exercise 1: Create a new lead (15 min)
     - Step-by-step walkthrough with the group
     - Practice independently
  4. Hands-on exercise 2: Log a customer interaction
     (15 min)
  5. Hands-on exercise 3: Move a lead through the
     pipeline (15 min)
  6. Hands-on exercise 4: Run a basic report (15 min)
  7. Q&A and troubleshooting (15 min)
  8. "Cheat sheet" distribution and next steps (5 min)
  9. Buffer: 10 min (for technical issues)

  Facilitation guide must include:
  - Facilitator script for each section
  - Step-by-step exercise instructions (exact clicks
    and fields to fill)
  - Screenshots or screen description references
  - How to handle varying speeds (fast finishers
    vs. struggling participants)
  - Role of the 3 power users during exercises
  - Common technical issues and fixes (login
    problems, browser issues)
  - The one-page "cheat sheet" to distribute
  - How to measure if the training worked (follow-up
    evaluation)

  Task: Write the complete training workshop
  facilitation guide with exercises, cheat sheet,
  and evaluation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete training workshop guide — facilitator scripts for all 9 sections within 2 hours; 4 step-by-step hands-on exercises with specific instructions; guidance for varying speeds; power user roles defined; technical troubleshooting guide; a one-page cheat sheet; follow-up evaluation plan."
    weight: 0.35
    description: "TrainingGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates software training expertise — the opening addresses anxiety about change; exercises progress logically from simple to complex; step-by-step instructions are specific enough for non-technical users; the pacing accounts for varying tech comfort levels; the cheat sheet covers essential daily tasks; the power user role prevents bottlenecks."
    weight: 0.35
    description: "TrainingExpertise"
  - type: llm_judge
    criteria: "Response would produce CRM adoption — participants would leave able to perform basic Salesforce tasks independently; the cheat sheet would prevent 'forgetting everything by Monday'; the exercises build muscle memory for daily workflows; the evaluation plan would catch participants who need additional support; the team would transition from spreadsheets to Salesforce."
    weight: 0.30
    description: "AdoptionOutcome"
