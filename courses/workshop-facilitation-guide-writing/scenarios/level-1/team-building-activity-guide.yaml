meta:
  id: team-building-activity-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a half-day team building workshop for a newly formed cross-departmental project team"
  tags: [team-building, new-team, cross-departmental, facilitation, beginner]

state: {}

trigger: |
  You're an HR business partner. A new cross-
  departmental project team has been assembled to
  lead a major company initiative. The 10 team
  members come from 5 different departments and
  most haven't worked together before. The project
  sponsor wants a half-day team building session
  to build trust and establish working norms before
  the project kicks off.

  Workshop details:
  - Duration: 3.5 hours (with 15-min break)
  - Participants: 10 team members + project sponsor
    (observing, not participating in activities)
  - Location: Off-site meeting space with movable
    furniture
  - No alcohol, no trust falls, no forced fun
  - Mix of introverts and extroverts
  - Age range: 25-58

  Workshop agenda to facilitate:
  1. Welcome and purpose (10 min)
  2. "Getting to Know You" activity (25 min):
     Structured sharing that reveals working styles,
     not just hobbies
  3. Team charter creation (45 min):
     - How we communicate (channels, response times)
     - How we make decisions (consensus, vote, defer)
     - How we handle disagreements
     - How we run meetings
  4. Break (15 min)
  5. Collaborative problem-solving activity (30 min):
     A non-work challenge that requires teamwork
  6. Debrief on the activity (15 min): Connect the
     experience to how the team will work together
  7. "User manual for me" exercise (30 min): Each
     person creates a one-pager about their working
     preferences
  8. Commitments and close (10 min)

  Facilitation guide must include:
  - Facilitator script for each section
  - Detailed activity instructions for each exercise
  - Materials list and room setup diagram
  - Contingency plan if an activity falls flat
  - How to manage the power dynamic with the sponsor
    in the room
  - Follow-up plan (what happens after the workshop)

  Task: Write the complete facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete team building guide — facilitator scripts for all 8 sections within 3.5 hours; detailed activity instructions; materials list and room setup diagram; contingency plans; sponsor power dynamic management; follow-up plan; the exercises build logically from introduction to deeper team norms."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates team building expertise — activities reveal working styles (not just hobbies); the team charter covers essential operating norms; the collaborative challenge connects to real teamwork; the 'user manual' exercise is practical; activities work for introverts and extroverts; the facilitator manages the sponsor's presence appropriately; no forced fun or cringeworthy activities."
    weight: 0.35
    description: "TeamBuildingExpertise"
  - type: llm_judge
    criteria: "Response would produce a functioning team — participants would leave knowing how to work together; the team charter would be referenced throughout the project; the 'user manual' exercise would prevent communication misunderstandings; the cross-departmental barriers would begin breaking down; the team would be ready to start the project."
    weight: 0.30
    description: "TeamFormationOutcome"
