meta:
  id: strategic-planning-session
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for an annual strategic planning session for a small business leadership team"
  tags: [strategic-planning, leadership, annual-planning, small-business, beginner]

state: {}

trigger: |
  You're the operations manager at a 40-person
  marketing agency. The founder/CEO wants to
  facilitate the annual strategic planning session
  but doesn't know how to structure it. You've
  been asked to write the facilitation guide that
  the CEO will follow.

  Session details:
  - Duration: 4 hours (full morning, 9 AM - 1 PM)
  - Participants: 6-person leadership team (CEO,
    COO, Creative Director, Head of Sales, Head of
    Client Services, Finance Director)
  - Location: Off-site (rented meeting room)
  - Lunch will be brought in at noon
  - Goal: Walk out with a clear strategic plan
    for the next 12 months

  Session structure:
  1. Year in review (30 min): What happened this
     year — wins, losses, key metrics
  2. External landscape (20 min): Market trends,
     competitive threats, client feedback themes
  3. SWOT analysis (30 min): Structured SWOT
     exercise
  4. Break (15 min)
  5. Vision check (15 min): Is the 3-year vision
     still right? Adjust if needed
  6. Strategic priorities brainstorm (30 min):
     What are the 3-5 biggest priorities for next
     year?
  7. Priority deep-dive (45 min): For each priority,
     define success metrics, owner, timeline, and
     resources needed
  8. Working lunch + Q&A (30 min)
  9. Action planning (15 min): First 90-day actions
     for each priority
  10. Commitments and close (10 min)

  Facilitation guide must include:
  - Pre-session preparation (data to gather, pre-
    reads to send, questions to ask in advance)
  - Facilitator script for the CEO to follow
  - Templates for SWOT analysis and priority
    planning
  - How to keep discussions strategic (not tactical)
  - How to handle disagreements among leaders
  - How to ensure quieter leaders contribute
  - Post-session deliverable: strategic plan
    summary template

  Task: Write the complete facilitation guide with
  scripts, templates, and post-session deliverable.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete strategic planning guide — pre-session preparation list; facilitator scripts for all 10 sections within 4 hours; SWOT template; priority planning template; guidance for keeping strategic vs. tactical; disagreement handling; post-session strategic plan summary template."
    weight: 0.35
    description: "PlanningGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates strategic planning facilitation expertise — the year-in-review structure captures key data; SWOT exercise is properly structured; priority brainstorming avoids analysis paralysis; the deep-dive template produces actionable plans; the 90-day action planning creates immediate momentum; the CEO can follow the guide as a non-facilitator."
    weight: 0.35
    description: "StrategicPlanningExpertise"
  - type: llm_judge
    criteria: "Response would produce a real strategic plan — the leadership team would leave with 3-5 clear priorities, owners, and metrics; the 90-day actions would prevent the plan from gathering dust; the strategic plan summary would be a usable document; the session would align the leadership team on direction for the next year."
    weight: 0.30
    description: "PlanningOutcome"
