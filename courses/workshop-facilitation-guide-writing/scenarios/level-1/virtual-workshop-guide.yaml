meta:
  id: virtual-workshop-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a virtual design thinking workshop using Zoom and Miro, adapted for remote participants across time zones"
  tags: [virtual, remote, design-thinking, zoom-miro, beginner]

state: {}

trigger: |
  You're a UX researcher at a remote-first company.
  Your team needs to run a design thinking workshop
  to explore solutions for a customer onboarding
  problem, but participants are spread across 3 time
  zones (US East, US West, and Europe). The workshop
  must be fully virtual.

  Workshop details:
  - Duration: 2 hours (the overlap window)
  - Participants: 10 people (product, design,
    engineering, customer success)
  - Platform: Zoom for video + Miro for
    collaboration
  - Time: 9 AM ET / 6 AM PT / 3 PM CET

  Design thinking stages to cover:
  1. Empathize (20 min): Share customer journey
     pain points using pre-prepared persona cards
  2. Define (15 min): Craft "How might we" problem
     statements
  3. Ideate (25 min): Silent brainstorming on Miro
     + group sharing
  4. Break (10 min)
  5. Prototype (25 min): Sketch rough solutions
     using Miro templates
  6. Plan to test (15 min): Define experiment to
     test the top idea
  7. Close (10 min)

  Virtual facilitation guide must include:
  - Pre-workshop setup: Miro board layout with
    templates, areas, and pre-populated content
  - Zoom settings recommendations (gallery view,
    breakout rooms, annotation)
  - Facilitator script for each section (including
    how to manage Miro instructions)
  - Engagement tactics for virtual (polls, reactions,
    timed activities, chat prompts)
  - How to handle: bad internet, camera-off
    participants, someone multitasking
  - Backup plan if Miro goes down
  - Post-workshop async follow-up for the person
    on Pacific Time (6 AM is brutal)

  Task: Write the complete virtual facilitation
  guide with Miro board layout, Zoom configurations,
  and engagement tactics.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete virtual workshop guide — Miro board layout description with templates; Zoom configuration recommendations; facilitator scripts for all 7 sections within 2 hours; engagement tactics for virtual format; troubleshooting for bad internet, camera-off, and multitasking; Miro backup plan; async follow-up plan."
    weight: 0.35
    description: "VirtualGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates virtual facilitation expertise — Miro board layout is thoughtfully organized for the workflow; Zoom features are used effectively; engagement tactics are specific to virtual (not just in-person adapted); the time zone consideration is handled empathetically; silent brainstorming works well in Miro; the facilitator manages both Zoom and Miro simultaneously."
    weight: 0.35
    description: "VirtualFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would produce a productive virtual workshop — remote participants would be as engaged as in-person; the design thinking process would yield actionable solutions; the Miro board would capture and organize all outputs; the async follow-up respects the Pacific Time participant; the team would have a clear experiment to test."
    weight: 0.30
    description: "VirtualProductivity"
