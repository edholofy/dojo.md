meta:
  id: feedback-workshop-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 'giving and receiving feedback' skills workshop for managers"
  tags: [feedback, management-skills, soft-skills, training, beginner]

state: {}

trigger: |
  You're an L&D specialist at a company where
  employee engagement surveys consistently show
  "my manager gives me useful feedback" as the
  lowest-scoring item (2.8/5). The CHRO wants a
  workshop that teaches managers the actual skill
  of giving feedback — not just lecturing them
  about why feedback matters.

  Workshop details:
  - Duration: 2 hours
  - Participants: 15 managers (mixed experience,
    some new managers, some 10+ year veterans)
  - Location: Training room with breakout space
  - Approach: 80% practice, 20% instruction

  Workshop structure:
  1. Opening: Why we're here + the feedback gap
     data (5 min)
  2. Mini-lecture: The SBI model (Situation-
     Behavior-Impact) (10 min)
  3. Demo: Facilitator models a good and bad
     feedback conversation (5 min)
  4. Practice round 1 — pairs (15 min): Give
     feedback using a provided scenario card
  5. Debrief round 1: What was hard? (5 min)
  6. Mini-lecture: Receiving feedback gracefully +
     asking for feedback (10 min)
  7. Practice round 2 — pairs (15 min): Receive
     feedback using a different scenario card
  8. Debrief round 2 (5 min)
  9. Break (10 min)
  10. Practice round 3 — triads (20 min): Observer
      gives feedback on the feedback (meta!)
  11. Group discussion: "What will you do differently
      starting Monday?" (10 min)
  12. Personal commitment card + close (10 min)

  Facilitation guide must include:
  - Facilitator scripts for each section
  - The SBI model explanation (clear, memorable)
  - 6 scenario cards for practice (realistic
    workplace situations — not extreme or obvious)
  - Demo script for the good and bad feedback
    conversation
  - Observer checklist for the triad practice
  - Tips for creating psychological safety during
    practice
  - Personal commitment card template
  - 30-day follow-up plan (how to reinforce the
    skill)

  Task: Write the complete facilitation guide with
  all scripts, scenario cards, and supporting
  materials.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete feedback workshop guide — facilitator scripts for all 12 sections within 2 hours; clear SBI model explanation; demo script for good and bad conversations; 6 realistic scenario cards; observer checklist for triads; psychological safety guidance; commitment card template; 30-day follow-up plan."
    weight: 0.35
    description: "FeedbackGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates feedback training expertise — the SBI model is explained memorably; scenario cards present nuanced situations (not black-and-white); the triad structure with observer is a proven practice technique; the demo shows clear contrast between good and bad; psychological safety is prioritized; the 80/20 practice-to-lecture ratio is maintained."
    weight: 0.35
    description: "FeedbackTrainingExpertise"
  - type: llm_judge
    criteria: "Response would improve feedback culture — managers would leave with a practical framework they can use Monday; the practice rounds build genuine skill (not just knowledge); the commitment cards create accountability; the 30-day follow-up would reinforce behavior change; the engagement survey score would improve."
    weight: 0.30
    description: "BehaviorChangeOutcome"
