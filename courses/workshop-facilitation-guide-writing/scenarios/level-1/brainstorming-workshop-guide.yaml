meta:
  id: brainstorming-workshop-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a product brainstorming workshop to generate feature ideas for a mobile app redesign"
  tags: [brainstorming, product, ideation, facilitation, beginner]

state: {}

trigger: |
  You're a product manager at a fintech startup.
  The CEO wants fresh ideas for the mobile app
  redesign launching in Q3. You need to facilitate
  a brainstorming workshop with a cross-functional
  group that includes designers, engineers, customer
  support, and marketing.

  Workshop details:
  - Duration: 90 minutes
  - Participants: 12 people from 4 departments
  - Location: Large meeting room with wall space
  - Tools: Sticky notes (3 colors), markers,
    whiteboard, printed customer feedback summaries

  Workshop structure to facilitate:
  1. Context setting (10 min): Share customer
     feedback data and redesign goals
  2. Warm-up activity (5 min): Quick creative
     exercise to shift mindset
  3. Individual brainstorming — silent (10 min):
     Everyone writes ideas on sticky notes
  4. Round-robin sharing (15 min): Each person
     presents their top 3 ideas
  5. Affinity grouping (10 min): Cluster related
     ideas together
  6. "How might we" reframing (10 min): Turn
     clusters into actionable questions
  7. Rapid concept sketching (15 min): Quick
     sketches of top concepts
  8. Dot voting for top priorities (5 min)
  9. Next steps and ownership (5 min)
  10. Buffer: 5 min

  Facilitation guide must include:
  - Pre-workshop preparation checklist (room setup,
    materials, pre-reads to send)
  - Facilitator script for each section
  - Rules for brainstorming (defer judgment, build
    on others' ideas, etc.)
  - How to keep the energy up across 90 minutes
  - Strategies for getting quieter participants
    (especially engineers) to contribute
  - How to handle the "idea killer" — someone who
    immediately critiques every idea
  - Post-workshop follow-up template

  Task: Write the complete facilitation guide with
  all sections, scripts, and supporting materials.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete brainstorming workshop guide — pre-workshop checklist; facilitator scripts for all 10 sections with timing; brainstorming rules; energy management strategies; techniques for quiet participants; 'idea killer' management approach; post-workshop follow-up template; total timing fits 90 minutes."
    weight: 0.35
    description: "WorkshopCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates brainstorming facilitation expertise — silent brainstorming before sharing prevents anchoring; affinity grouping technique is clearly explained; 'How might we' reframing is properly used; dot voting is structured fairly; strategies for quiet participants are practical; the warm-up activity shifts mindset effectively."
    weight: 0.35
    description: "BrainstormingExpertise"
  - type: llm_judge
    criteria: "Response would produce a productive brainstorming session — the cross-functional group would generate diverse ideas; the structure prevents any one department from dominating; the output (prioritized concepts with sketches) would be actionable for the redesign; participants would feel their contributions were valued."
    weight: 0.30
    description: "SessionProductivity"
