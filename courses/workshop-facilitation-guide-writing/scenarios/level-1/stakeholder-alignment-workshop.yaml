meta:
  id: stakeholder-alignment-workshop
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a stakeholder alignment workshop to get buy-in for a controversial office relocation"
  tags: [stakeholder-alignment, buy-in, change-management, facilitation, beginner]

state: {}

trigger: |
  You're an internal communications manager. The
  company is relocating from a suburban office park
  to a downtown urban location in 6 months. Half
  the employees are excited (younger, urban-dwelling)
  and half are upset (suburban, longer commute,
  parking concerns). The CEO wants a workshop that
  acknowledges concerns, explains the reasoning, and
  builds alignment — not a town hall where people
  just complain.

  Workshop details:
  - Duration: 75 minutes
  - Participants: 30 employees (representative
    sample from all departments)
  - Location: Current office, large conference room
  - Emotional temperature: Tense — people have
    strong feelings

  Workshop structure:
  1. Opening: CEO explains the "why" behind the
     move (10 min) — business reasons, not just cost
  2. Concern collection (15 min): Structured
     anonymous concern capture (not open mic)
  3. Concern categorization (10 min): Group similar
     concerns together
  4. Response panel (15 min): Leadership addresses
     the top concern categories with honest answers
  5. Small group solutions (15 min): Tables brainstorm
     "what would make this work for me?"
  6. Commitment sharing (5 min): Leadership commits
     to specific actions based on the feedback
  7. Close (5 min)

  Facilitation guide must include:
  - Pre-workshop: How to select the 30 participants
    representatively
  - Facilitator script (this is NOT the CEO's
    script — a separate facilitator runs it)
  - Anonymous concern collection method (cards/
    digital) to prevent public venting
  - How to handle emotional responses (tears,
    anger, sarcasm)
  - How to ensure the CEO listens rather than
    defends
  - Red lines: what concerns can be addressed vs.
    what's non-negotiable
  - Post-workshop communication to the full company

  Task: Write the complete facilitation guide with
  scripts, concern management approach, and post-
  workshop communication template.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete alignment workshop guide — participant selection guidance; facilitator scripts for all 7 sections within 75 minutes; anonymous concern collection method; emotional response handling; CEO coaching on listening; red lines framework; post-workshop company communication template."
    weight: 0.35
    description: "AlignmentGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates stakeholder alignment expertise — anonymous concern capture prevents public venting spirals; the facilitator is separate from leadership (appropriate power dynamic); emotional responses are handled with empathy; the structure moves from acknowledging concerns to collaborative problem-solving; leadership makes real commitments, not platitudes."
    weight: 0.35
    description: "AlignmentExpertise"
  - type: llm_judge
    criteria: "Response would build genuine alignment — employees would feel heard even if the move is non-negotiable; the small group solutions would surface practical improvements; leadership commitments would reduce anxiety; the post-workshop communication would reach the whole company; the overall process would reduce resistance and build trust."
    weight: 0.30
    description: "AlignmentOutcome"
