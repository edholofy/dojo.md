meta:
  id: beginner-facilitation-shift
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write three facilitation guides in one day — a 30-minute standup redesign, a lunch-and-learn session, and a project kickoff meeting"
  tags: [shift-simulation, multi-workshop, variety, beginner]

state: {}

trigger: |
  You're a junior project manager at a consulting
  firm. Three facilitator requests landed on your
  desk this morning, all needed by end of day.

  Request 1: Standup Meeting Redesign (30 min guide)
  A team of 6 has complained their daily standup
  takes 45 minutes instead of 15 and nothing gets
  decided. Write a facilitation guide for a
  redesigned standup that:
  - Runs in exactly 15 minutes
  - Uses a structured format (not just "what did
    you do yesterday?")
  - Includes a visual board (physical or digital)
  - Has a "parking lot" for topics that need longer
    discussion
  - Includes the facilitator script, timing per
    person, and rules

  Request 2: Lunch-and-Learn Facilitation (45 min)
  A senior data scientist wants to present "Intro
  to Machine Learning for Non-Technical Staff" as
  a lunch-and-learn. She's brilliant but tends to
  go deep into math and lose her audience. Write
  a facilitation guide that:
  - Opens with an interactive hook (not just a
    slide deck)
  - Includes 2 audience engagement moments
    (questions, polls, demonstrations)
  - Has a "complexity check" mechanism (signal when
    it's too technical)
  - Manages the Q&A so it doesn't derail
  - Closes with 3 key takeaways
  - Includes facilitator notes for the host (you)
    who introduces and manages the session

  Request 3: Project Kickoff Meeting (60 min)
  A new client project is starting next week. Write
  a facilitation guide for the internal kickoff
  (before the client kickoff) that covers:
  - Project overview and client context (10 min)
  - Team roles and responsibilities (10 min)
  - Timeline and milestones review (10 min)
  - Risk brainstorm (10 min)
  - Communication plan (10 min)
  - Questions and action items (10 min)
  - Includes pre-meeting prep, facilitator script,
    and meeting notes template

  Task: Write all three facilitation guides.

assertions:
  - type: llm_judge
    criteria: "Response creates all three guides — the standup redesign runs in 15 minutes with structured format, visual board, and parking lot; the lunch-and-learn has an interactive hook, 2 engagement moments, complexity check, and Q&A management; the project kickoff covers all 6 sections in 60 minutes with pre-meeting prep and notes template."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation versatility across different meeting types — the standup format is genuinely better than 'what did you do yesterday'; the lunch-and-learn adapts for a technical speaker with non-technical audience; the project kickoff creates alignment efficiently; each guide has a facilitator script appropriate for its context."
    weight: 0.35
    description: "FacilitationVersatility"
  - type: llm_judge
    criteria: "Response would improve each meeting — the standup would actually run in 15 minutes; the lunch-and-learn audience would stay engaged; the project team would leave the kickoff aligned; a junior PM could follow each guide independently."
    weight: 0.30
    description: "MeetingImprovement"
