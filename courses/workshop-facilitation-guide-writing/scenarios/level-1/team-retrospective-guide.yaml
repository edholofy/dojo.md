meta:
  id: team-retrospective-guide
  level: 1
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a sprint retrospective meeting, with icebreaker, structured activities, and action item capture"
  tags: [retrospective, agile, scrum, facilitation, beginner]

state: {}

trigger: |
  You're a new Scrum Master at a software company.
  Your team of 8 developers just finished their
  first 2-week sprint and you need to facilitate
  the sprint retrospective. The team hasn't done
  formal retros before and some members are
  skeptical ("just another meeting").

  Meeting details:
  - Duration: 60 minutes
  - Participants: 8 developers + Product Owner
  - Location: Conference room with whiteboard
  - Tools: Sticky notes, markers, timer

  Facilitation guide requirements:
  - Complete run-of-show with timing for each
    section
  - Opening: icebreaker activity (5 min) that
    sets a reflective tone
  - Activity 1: "What went well" — structured
    brainstorming (10 min)
  - Activity 2: "What didn't go well" — structured
    brainstorming (10 min)
  - Activity 3: "What should we try next" — idea
    generation (10 min)
  - Dot voting to prioritize improvements (5 min)
  - Action item capture with owners and deadlines
    (10 min)
  - Closing: quick checkout activity (5 min)
  - Buffer time: 5 min

  For each section, include:
  - Exact facilitator script (what to say)
  - Materials needed
  - Common pitfalls and how to handle them
  - What to do if the group goes silent
  - What to do if someone dominates the
    conversation
  - Visual layout suggestion (how to arrange
    sticky notes on the whiteboard)

  Task: Write the complete facilitation guide for
  the sprint retrospective.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete retrospective facilitation guide — run-of-show with timing totaling 60 minutes; icebreaker activity; 3 structured brainstorming activities with facilitator scripts; dot voting process; action item capture with owner/deadline format; closing activity; each section includes materials, pitfalls, and guidance for silent or dominant participants."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation expertise — the icebreaker sets an appropriate reflective tone; the brainstorming structure encourages equal participation; the dot voting process is clearly explained; facilitator scripts sound natural (not robotic); the pitfall guidance addresses real challenges new facilitators face; the visual layout suggestions are practical."
    weight: 0.35
    description: "FacilitationQuality"
  - type: llm_judge
    criteria: "Response would produce a successful retrospective — a new Scrum Master could follow this guide and lead an effective meeting; skeptical team members would find value in the structured approach; the meeting would produce concrete action items; the team would want to do retros again."
    weight: 0.30
    description: "MeetingEffectiveness"
