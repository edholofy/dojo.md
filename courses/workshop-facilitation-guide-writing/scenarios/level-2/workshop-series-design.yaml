meta:
  id: workshop-series-design
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a 6-session leadership development workshop series for new managers, with facilitation guides for each session and a progression framework"
  tags: [workshop-series, leadership, new-managers, multi-session, intermediate]

state: {}

trigger: |
  You're the L&D director at a growing company
  that promoted 20 individual contributors to
  manager roles in the past year. None received
  management training. The CHRO wants a 6-session
  workshop series (one per month) to develop their
  management skills. Each session must be standalone
  but build on previous ones.

  Series details:
  - 6 workshops, monthly, 3 hours each
  - Participants: 20 new managers
  - Location: Company training room
  - Approach: Experiential learning (not lectures)

  Session topics:
  1. "The Transition" — From IC to manager: mindset
     shift, letting go of doing, managing former
     peers
  2. "The 1:1" — Running effective one-on-ones:
     structure, coaching questions, career development
     conversations
  3. "The Feedback" — Giving constructive feedback,
     receiving it, building feedback culture
  4. "The Team" — Building team dynamics, running
     effective meetings, delegation
  5. "The Difficult Conversation" — Performance
     issues, conflict, emotional situations
  6. "The Leader" — Finding your leadership style,
     managing up, planning your growth

  For the SERIES overall:
  - Progression framework showing how skills build
  - Pre-series skills assessment (baseline)
  - Between-session "practice assignments"
  - Peer coaching pairs structure
  - Post-series skills assessment (growth)
  - Graduation / completion recognition

  For EACH SESSION provide:
  - Learning objectives
  - Detailed agenda with timing
  - 2-3 experiential activities (role-plays,
    simulations, case studies — not lectures)
  - Facilitator script for key moments
  - Take-home worksheet or tool
  - Practice assignment for the following month
  - Materials list

  Task: Write the complete series design with
  progression framework and full facilitation
  guides for all 6 sessions.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 6-session series — progression framework; pre/post skills assessment; between-session practice assignments; peer coaching structure; each session has learning objectives, detailed agenda, 2-3 experiential activities, facilitator scripts, take-home tools, and practice assignments; graduation recognition."
    weight: 0.35
    description: "SeriesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates leadership development expertise — session topics address real new-manager challenges; experiential activities build genuine skills (not just awareness); the progression from mindset through skills to leadership identity makes sense; practice assignments bridge sessions; peer coaching deepens learning; the overall arc produces capable managers."
    weight: 0.35
    description: "LeadershipDevelopmentExpertise"
  - type: llm_judge
    criteria: "Response would transform new managers — participants would build real management skills over 6 months; the experiential approach creates behavior change (not just knowledge); the practice assignments ensure transfer to the job; the peer coaching creates lasting support networks; the 20 new managers would be noticeably more effective by the end."
    weight: 0.30
    description: "ManagerDevelopmentOutcome"
