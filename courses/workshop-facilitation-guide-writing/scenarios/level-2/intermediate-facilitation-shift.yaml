meta:
  id: intermediate-facilitation-shift
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write facilitation guides for three distinct intermediate workshops: a Future Search conference, an after-action review, and a customer journey mapping session"
  tags: [multi-format, future-search, after-action-review, journey-mapping, intermediate]

state: {}

trigger: |
  You're a senior facilitator at a consulting firm.
  Three clients need facilitation guides this week,
  each using a different methodology. Write complete
  guides for all three.

  === WORKSHOP 1: Future Search Conference ===
  Client: Regional hospital network (4 hospitals)
  planning 10-year healthcare delivery strategy.
  - Duration: 2.5 days (Thursday PM, Friday, Saturday AM)
  - Participants: 64 people in 8 stakeholder groups
    (physicians, nurses, administrators, patients,
    community health workers, insurance reps, local
    government, technology vendors)
  - Location: Hotel ballroom with round tables
  - Future Search format:
    Day 1 PM: Focus on the Past (timeline of
    healthcare in the region), Focus on the Present
    (external trends affecting healthcare)
    Day 2: Focus on the Present (what we're proud
    of and sorry about), Focus on the Future (ideal
    scenarios), Identify Common Ground
    Day 3 AM: Action Planning (self-managed groups)

  Guide must include:
  - Stakeholder group selection rationale
  - Timeline activity facilitation (shared history)
  - Mind-map of external trends methodology
  - "Prouds and Sorries" exercise protocol
  - Future scenario creation process
  - Common ground identification technique
  - Action planning for self-managed groups
  - How to manage 64 people across 3 days

  === WORKSHOP 2: After-Action Review (AAR) ===
  Client: Software company that just had a major
  production outage (e-commerce platform down for
  6 hours on Black Friday, $2.3M revenue lost).
  - Duration: 2 hours
  - Participants: 12 people (incident commander,
    3 SREs, 2 backend devs, 1 DBA, product manager,
    VP Engineering, customer support lead, 2 on-call
    engineers who responded)
  - Location: Large conference room with whiteboard
  - AAR format: Blameless post-incident review
    following the military AAR structure

  Guide must include:
  - Ground rules for blameless review (specific
    language guidelines)
  - Timeline reconstruction methodology
  - "What was supposed to happen vs. what actually
    happened" framework
  - Root cause analysis technique (5 Whys or
    similar)
  - Contributing factors categorization (people,
    process, technology)
  - Action item prioritization
  - How to prevent finger-pointing when VP
    Engineering is in the room
  - Follow-up tracking mechanism

  === WORKSHOP 3: Customer Journey Mapping ===
  Client: SaaS company (B2B project management
  tool) with rising churn. Need to map the customer
  journey from awareness to renewal to find pain
  points.
  - Duration: 4 hours
  - Participants: 15 people (sales, marketing,
    customer success, product, support, plus 3
    actual customers invited as guests)
  - Location: Office with large wall space for
    journey map
  - Approach: Collaborative journey mapping with
    real customer voices in the room

  Guide must include:
  - Pre-workshop customer data preparation
  - Persona selection for journey mapping
  - Journey stages definition exercise
  - Touchpoint identification methodology
  - Emotion mapping technique (customer feelings
    at each stage)
  - "Moments of truth" identification
  - Pain point prioritization (impact vs. fixability)
  - How to incorporate real customer feedback
    without making them uncomfortable
  - Journey map template and documentation method
  - Post-workshop: Turning map into action plan

  Task: Write all three complete facilitation guides.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete guides — Future Search with stakeholder groups, timeline, trends, prouds/sorries, scenarios, common ground, and action planning for 64 people over 2.5 days; AAR with blameless ground rules, timeline reconstruction, root cause analysis, contributing factors, and follow-up tracking; Customer Journey Mapping with persona selection, journey stages, touchpoints, emotion mapping, moments of truth, pain point prioritization, and real customer integration."
    weight: 0.35
    description: "ThreeGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise in all three methodologies — Future Search follows the Weisbord/Janoff structure faithfully; the AAR adapts military methodology for tech incident review with genuine blamelessness; the journey mapping integrates quantitative data with qualitative customer input; each guide shows deep understanding of its methodology, not just surface knowledge."
    weight: 0.35
    description: "MultiMethodologyExpertise"
  - type: llm_judge
    criteria: "Response would produce successful outcomes for all three clients — the hospital network would have an actionable 10-year strategy; the software company would prevent future outages without blame culture; the SaaS company would identify specific churn-causing pain points; each workshop's outputs would be immediately actionable; all three demonstrate facilitator skill in managing complex group dynamics."
    weight: 0.30
    description: "ThreeWorkshopOutcomes"
