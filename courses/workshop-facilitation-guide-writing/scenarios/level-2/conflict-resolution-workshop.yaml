meta:
  id: conflict-resolution-workshop
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a conflict resolution workshop between two department heads whose teams are in open conflict over resource allocation"
  tags: [conflict-resolution, mediation, leadership, high-stakes, intermediate]

state: {}

trigger: |
  You're an organizational development consultant
  hired to facilitate a conflict resolution between
  the VP of Engineering and the VP of Sales at a
  SaaS company. Their teams are in open conflict:
  Sales promises features to close deals, Engineering
  says they're overcommitted. Both VPs have
  complained to the CEO. Engineers are threatening
  to quit. Sales is losing deals because promised
  features aren't delivered.

  Workshop details:
  - Duration: 3 hours
  - Participants: The 2 VPs + 3 senior people from
    each team (8 total) + you as neutral facilitator
  - Location: Neutral space (not either team's
    conference room)
  - Stakes: CEO has said "fix this or I'll make
    changes neither of you will like"

  Workshop structure (you design this):
  Must include:
  1. Ground rules and psychological safety setup
  2. Each side's perspective sharing (structured,
     timed, no interruptions)
  3. Identifying shared goals (what both teams
     actually want)
  4. Root cause analysis (not who's to blame, but
     what's broken in the process)
  5. Solution co-creation (both sides design the
     fix together)
  6. Agreement documentation and accountability
     mechanisms
  7. Follow-up plan

  Facilitation guide must include:
  - Detailed run-of-show with timing
  - Pre-workshop: individual conversations with
     each VP (what to ask, what to listen for)
  - Facilitator script and key phrases for
    de-escalation
  - How to handle: blame-shifting, bringing up
    old grievances, someone shutting down, tears,
    raised voices
  - When to call a break vs. push through discomfort
  - How to prevent the agreement from being
    superficial
  - The signed agreement template
  - 30/60/90-day follow-up plan

  Task: Write the complete conflict resolution
  facilitation guide with all supporting materials.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete conflict resolution guide — pre-workshop individual conversations with both VPs; run-of-show with 7 sections within 3 hours; facilitator script with de-escalation phrases; handling guidance for blame, grievances, shutdown, tears, and raised voices; break vs. push-through decision framework; signed agreement template; 30/60/90 follow-up plan."
    weight: 0.35
    description: "ConflictGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates conflict resolution expertise — pre-workshop conversations surface positions and interests; the session structure moves from understanding to shared goals to solutions; de-escalation techniques are specific and actionable; the root cause analysis focuses on process (not people); the agreement is concrete enough to be enforceable; the facilitator maintains neutrality."
    weight: 0.35
    description: "ConflictResolutionExpertise"
  - type: llm_judge
    criteria: "Response would resolve the conflict — both VPs would feel heard; the root cause (likely a broken feature request/prioritization process) would be addressed; the agreement would change actual behavior; the follow-up plan would catch slippage; the teams would start collaborating instead of fighting; the CEO would see improvement."
    weight: 0.30
    description: "ConflictResolutionOutcome"
