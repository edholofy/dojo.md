meta:
  id: world-cafe-facilitation
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a World Café session exploring how a hospital can improve patient experience across departments"
  tags: [world-cafe, healthcare, patient-experience, large-group, intermediate]

state: {}

trigger: |
  You're an external facilitator hired by a hospital
  system to run a "World Café" style workshop on
  improving patient experience. The hospital's HCAHPS
  scores are below the national average in nurse
  communication, responsiveness, and discharge
  planning. The CEO wants frontline staff involved
  in generating solutions.

  Workshop details:
  - Duration: 2.5 hours
  - Participants: 40 people (nurses, physicians,
    patient advocates, housekeeping staff, admin,
    department managers)
  - Location: Hospital auditorium with round tables
    (8 tables, 5 people each)
  - Special consideration: Some participants are
    coming off shifts and may be tired

  World Café structure:
  - 4 rounds of 20 minutes each
  - Table questions (one per round):
    1. "What does an exceptional patient experience
       look like from the moment someone walks in?"
    2. "What are the biggest barriers we face in
       delivering great patient care?"
    3. "What small changes could we make tomorrow
       that would make the biggest difference?"
    4. "How can different departments work together
       better to improve the patient journey?"
  - Between rounds: participants move to new tables,
    one "host" stays to share previous insights
  - Final harvest: Each table shares their top
    insight with the full group

  Facilitation guide must include:
  - World Café methodology explanation (for the
    client who hasn't done one before)
  - Pre-event: Room setup with table supplies
    (butcher paper, markers, snacks)
  - Facilitator script for opening, transitions,
    and closing
  - Table host training script (what they do)
  - How to manage the rotation (avoid chaos)
  - Harvest technique (how to synthesize 40 people's
    ideas into themes)
  - How to handle hierarchy (doctors and
    housekeeping at the same table)
  - Energy management (tired participants)
  - Post-event: Summary report template and action
    planning process

  Task: Write the complete World Café facilitation
  guide with methodology explanation, scripts,
  table host training, and summary template.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete World Café guide — methodology explanation; room setup with supplies; facilitator script for opening, transitions, and closing; table host training; rotation management; harvest technique for synthesizing themes; hierarchy management guidance; energy management; post-event summary template and action planning."
    weight: 0.35
    description: "WorldCafeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates World Café facilitation expertise — the 4 questions build logically from vision to barriers to solutions to collaboration; the table host role is clearly defined; the rotation prevents cliques and ensures cross-pollination; the harvest technique captures themes rather than just lists; hierarchy is managed so all voices are equal."
    weight: 0.35
    description: "WorldCafeExpertise"
  - type: llm_judge
    criteria: "Response would produce actionable patient experience improvements — frontline staff would feel heard; the themes from 40 participants would reveal real opportunities; the action planning process would turn insights into changes; HCAHPS scores would improve; the hospital could repeat this format for other challenges."
    weight: 0.30
    description: "PatientExperienceOutcome"
