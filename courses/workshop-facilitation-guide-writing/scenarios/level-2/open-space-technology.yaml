meta:
  id: open-space-technology
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for an Open Space Technology conference session where 60 employees self-organize around company culture topics"
  tags: [open-space, self-organizing, culture, large-group, intermediate]

state: {}

trigger: |
  You're the Head of People at a 200-person tech
  company. Employee survey results show culture
  concerns: silos between teams, unclear career
  paths, meeting overload, and remote vs. in-office
  tensions. Instead of top-down solutions, you want
  to use Open Space Technology — a self-organizing
  meeting format where participants create and
  manage their own agenda.

  Event details:
  - Duration: 4 hours (afternoon)
  - Participants: 60 employees (voluntary sign-up,
    all levels)
  - Location: Open floor plan office space (can
    create 8 breakout areas)
  - Theme: "Building the Culture We Want"

  Open Space Technology format:
  1. Opening circle (20 min): Explain the format,
     the theme, and the principles
  2. Marketplace creation (15 min): Anyone can
     propose a session topic, write it on paper,
     announce it, and post it on the schedule
  3. Session Round 1 (45 min): 8 simultaneous
     breakout sessions on proposed topics
  4. Break (15 min)
  5. Session Round 2 (45 min): 8 more sessions
     (new or continued)
  6. Break (10 min)
  7. Session Round 3 (30 min): Final round
  8. Closing circle (20 min): Harvest key themes
     and commitments

  Open Space principles to explain:
  - "Whoever comes is the right people"
  - "Whatever happens is the only thing that could
    have happened"
  - "When it starts is the right time"
  - "When it's over, it's over"
  - The Law of Two Feet: If you're not contributing
    or learning, move to another session

  Facilitation guide must include:
  - Pre-event communication (explaining this unusual
    format to skeptical employees)
  - Room setup and materials for marketplace and
    breakout sessions
  - Facilitator script for opening circle
    (including explaining the principles in plain
    language)
  - How to manage the marketplace (avoid awkwardness
    when proposing topics publicly)
  - Session host instructions (what each topic
    proposer needs to do)
  - Proceedings capture method (documenting all
    session outcomes)
  - How to handle: no one proposes topics, too many
    topics for available spaces, sessions that turn
    into complaint sessions
  - Closing circle script and harvest technique
  - Post-event: Proceedings document and action
    follow-up

  Task: Write the complete Open Space Technology
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete Open Space guide — pre-event communication; room setup and materials; opening circle script explaining principles; marketplace management; session host instructions; proceedings capture method; troubleshooting for no topics, too many topics, and complaint sessions; closing circle and harvest; post-event proceedings document."
    weight: 0.35
    description: "OpenSpaceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Open Space Technology expertise — the 4 principles are explained accessibly; the Law of Two Feet is positioned positively; the marketplace creation process reduces anxiety; the facilitator's role is appropriately minimal (hold space, not control); the proceedings capture respects the self-organizing nature; the format is true to OST methodology."
    weight: 0.35
    description: "OpenSpaceExpertise"
  - type: llm_judge
    criteria: "Response would produce genuine culture engagement — employees would feel ownership of culture topics; the self-organizing format would surface issues leadership hasn't considered; the proceedings would be actionable; the experience would demonstrate the collaborative culture the company wants to build; skeptics would be won over by the process."
    weight: 0.30
    description: "CultureEngagementOutcome"
