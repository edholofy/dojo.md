meta:
  id: hybrid-workshop-facilitation
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a hybrid workshop with in-room and remote participants collaborating equally on a product roadmap"
  tags: [hybrid, remote-in-person, product-roadmap, technology, intermediate]

state: {}

trigger: |
  You're a product operations manager. Your company
  is planning its Q3 product roadmap and needs a
  workshop with the full product team. Problem:
  12 people are at HQ and 8 are remote (including
  2 key engineers in different time zones). The CEO
  insists on a hybrid format, but past hybrid
  meetings have been terrible — remote people are
  ignored while the room has side conversations.

  Workshop details:
  - Duration: 3 hours
  - Participants: 12 in-room + 8 remote (Zoom) =
    20 total
  - In-room: Large conference room with big screen,
    360-degree camera, multiple microphones
  - Remote: Individual home offices, varying internet
    quality
  - Collaboration tool: Miro (shared canvas)

  Workshop agenda:
  1. Context setting (15 min): Q2 results, Q3 goals
  2. Customer insight sharing (20 min): 5 customer
     pain points to address
  3. Opportunity prioritization (30 min): Map
     opportunities on effort vs. impact matrix
  4. Break (10 min)
  5. Feature brainstorming in small groups (30 min):
     Mixed in-room/remote breakout groups
  6. Group share-back (20 min): Each group presents
     their top features
  7. Dot voting on roadmap items (10 min)
  8. Capacity discussion (15 min): What can we
     actually ship in Q3?
  9. Close with commitments (10 min)

  Hybrid facilitation challenges to address:
  - How to ensure remote participants are heard
    equally
  - Technology setup for in-room (camera placement,
    microphone strategy)
  - How to run breakout groups with mixed in-room
    and remote participants
  - Using Miro as the "single source of truth"
    (even for in-room participants)
  - Managing the "two rooms" problem (side
    conversations in the physical room)
  - Role of the "remote champion" (someone in the
    room who advocates for remote participants)
  - Backup plan for tech failures

  Facilitation guide must include:
  - Pre-workshop tech check process
  - Room setup diagram and technology requirements
  - Facilitator scripts with specific hybrid
    management cues
  - Miro board layout for all activities
  - Breakout group configuration
  - Remote champion role description
  - Tech failure contingency plans
  - Post-workshop: async follow-up for different
    time zones

  Task: Write the complete hybrid facilitation
  guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete hybrid workshop guide — tech check process; room setup with camera/mic placement; facilitator scripts with hybrid management cues; Miro board layout for all activities; breakout group configuration for mixed in-room/remote; remote champion role; tech failure contingencies; async follow-up for time zones."
    weight: 0.35
    description: "HybridGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates hybrid facilitation expertise — the technology setup addresses real audio/video challenges; Miro as single source of truth equalizes participation; breakout group configuration genuinely mixes in-room and remote; the remote champion role has specific responsibilities; the facilitator actively manages the two-room dynamic; the approach would actually make hybrid work."
    weight: 0.35
    description: "HybridExpertise"
  - type: llm_judge
    criteria: "Response would produce an equitable hybrid workshop — remote participants would contribute equally; the product roadmap would reflect input from all 20 participants; no one would feel like a second-class participant; the Miro board would capture the complete output; the roadmap decisions would stick because everyone was involved."
    weight: 0.30
    description: "HybridEquityOutcome"
