meta:
  id: design-sprint-guide
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a comprehensive 5-day design sprint facilitation guide based on the Google Ventures methodology, adapted for a product team solving a checkout conversion problem"
  tags: [design-sprint, google-ventures, product, multi-day, intermediate]

state: {}

trigger: |
  You're a senior product designer at an e-commerce
  company. The checkout flow has a 68% abandonment
  rate (industry average is 70%, but your CEO wants
  to get to 55%). You've convinced leadership to run
  a Google Ventures-style design sprint to prototype
  and test solutions in one week.

  Sprint details:
  - Duration: 5 days (Monday-Friday), 10 AM - 5 PM
    each day with lunch break
  - Participants: 7 people (PM, 2 designers, 2
    engineers, customer support lead, data analyst)
  - Decider: VP of Product (available for key
    decisions but not full-time)
  - Room: Dedicated war room for the week with
    whiteboard walls
  - User testing: Friday with 5 recruited customers

  Day-by-day facilitation guide needed:

  Monday — Map & Target:
  - Expert interviews (internal stakeholders)
  - Customer journey mapping of current checkout
  - "How Might We" notes
  - Choose the target area

  Tuesday — Sketch:
  - Lightning demos (competitive analysis)
  - 4-step sketching process (notes, ideas, Crazy
    8s, solution sketch)
  - Recruit for Friday's user tests

  Wednesday — Decide:
  - Art museum (silent review of sketches)
  - Heat map voting
  - Speed critique
  - Storyboard the prototype plan

  Thursday — Prototype:
  - Divide and conquer (who builds what)
  - High-fidelity prototype for user testing
  - Prepare the interview guide for Friday

  Friday — Test:
  - 5 user interviews (1 hour each)
  - Team watches and takes notes
  - Debrief and pattern identification
  - Next steps decision

  For each day, provide:
  - Detailed schedule with timing
  - Facilitator script for each activity
  - Materials and room setup
  - Common problems and solutions
  - End-of-day wrap-up checklist

  Also include:
  - Pre-sprint preparation (2 weeks before)
  - The Decider's role and when to involve them
  - How to handle "this won't work" skepticism
  - Post-sprint report template

  Task: Write the complete 5-day design sprint
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 5-day guide — detailed schedule for each day with timing; facilitator scripts for all major activities; materials and room setup per day; common problems and solutions; end-of-day checklists; pre-sprint preparation; Decider role guidance; skepticism handling; post-sprint report template."
    weight: 0.35
    description: "SprintGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates design sprint expertise — follows the GV methodology authentically; the 4-step sketching process is correctly structured; Wednesday's decision process prevents groupthink; the prototype plan is realistic for one day; Friday's user testing follows proper UX research methodology; the Decider role is properly bounded."
    weight: 0.35
    description: "DesignSprintExpertise"
  - type: llm_judge
    criteria: "Response would produce a successful sprint — the team would generate and test real solutions for checkout abandonment; the prototype would be testable with real users; Friday's insights would be actionable; the post-sprint report would guide next steps; a first-time sprint facilitator could follow this guide."
    weight: 0.30
    description: "SprintOutcome"
