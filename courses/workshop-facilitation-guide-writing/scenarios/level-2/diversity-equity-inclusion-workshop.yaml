meta:
  id: diversity-equity-inclusion-workshop
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a DEI workshop that moves beyond awareness to concrete action planning, handling emotional topics with psychological safety"
  tags: [dei, psychological-safety, action-planning, sensitive-topics, intermediate]

state: {}

trigger: |
  You're an external DEI consultant hired by a
  150-person marketing agency. Recent events: a
  Black employee's viral LinkedIn post about
  microaggressions at the company, 3 BIPOC employees
  left in 6 months, and the annual engagement survey
  shows a 30-point gap in belonging scores between
  white and non-white employees. The CEO wants to
  "do something meaningful, not performative."

  Workshop details:
  - Duration: 3 hours
  - Participants: 25 employees (mixed levels,
    voluntary attendance — but strongly encouraged)
  - Location: Off-site retreat center
  - Context: First of a planned quarterly series
  - Sensitivity: The LinkedIn post is the elephant
    in the room — everyone knows about it

  Workshop structure:
  1. Grounding and agreements (20 min): Establish
     brave space, community agreements, intention
  2. Shared language exercise (20 min): Align on
     key terms (equity vs. equality, microaggressions,
     allyship, intersectionality) without lecturing
  3. Storytelling circle (30 min): Structured
     personal experience sharing in small groups
  4. Break (15 min)
  5. Systems mapping (25 min): Map how agency
     processes (hiring, assignments, promotions,
     feedback) create inequitable outcomes
  6. Commitment workshop (20 min): Individual and
     team-level concrete commitments
  7. Closing circle (10 min): One word + one
     commitment

  Facilitation guide must include:
  - Pre-workshop: Participant communication that
    builds trust and reduces anxiety
  - Brave space agreements (not "safe space" — why
    the distinction matters)
  - Facilitator script for opening that acknowledges
    the LinkedIn post and company context honestly
  - Storytelling circle protocol with specific
    prompts and listener guidelines
  - How to handle: tears, anger, defensiveness,
    denial, whataboutism, silence
  - Systems mapping methodology that depersonalizes
    critique (focus on systems, not individuals)
  - Commitment framework that goes beyond "I'll
    try to be more aware"
  - How to manage power dynamics (CEO is in the
    room with junior employees)
  - Self-care resources and follow-up support
  - Post-workshop: Accountability structure for
    commitments

  Task: Write the complete DEI workshop facilitation
  guide with all scripts and protocols.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete DEI workshop guide — pre-workshop communication; brave space agreements with rationale; opening script acknowledging company context; shared language exercise; storytelling circle protocol with prompts and listener guidelines; handling emotional reactions (tears, anger, defensiveness, denial, whataboutism, silence); systems mapping methodology; commitment framework; power dynamics management; self-care resources; post-workshop accountability."
    weight: 0.35
    description: "DEIGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates DEI facilitation expertise — brave space is distinguished from safe space; the storytelling protocol protects vulnerable participants; systems mapping depersonalizes critique effectively; the commitment framework produces specific, measurable actions; power dynamics are actively managed; emotional reactions are handled with skill and compassion; the approach avoids common DEI workshop pitfalls (shame-based, performative, one-and-done)."
    weight: 0.35
    description: "DEIFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would produce meaningful change — participants would leave with concrete commitments, not just awareness; the systems mapping would reveal actionable process changes; the accountability structure would ensure follow-through; BIPOC employees would feel heard without being tokenized; the workshop would begin healing, not performative allyship; it would be the first step in genuine cultural transformation."
    weight: 0.30
    description: "DEIOutcome"
