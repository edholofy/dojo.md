meta:
  id: hackathon-facilitation-guide
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 2-day internal hackathon focused on AI/ML innovations, including team formation, judging criteria, and demo day"
  tags: [hackathon, innovation, ai-ml, multi-day, intermediate]

state: {}

trigger: |
  You're the innovation program manager at a
  mid-size insurance company. The CTO wants to run
  the company's first internal hackathon focused on
  "AI/ML for Insurance" — exploring how AI could
  improve claims processing, underwriting, customer
  service, and fraud detection. Engineers are
  excited; non-technical staff are worried they
  can't participate.

  Hackathon details:
  - Duration: 2 days (Friday 9 AM to Saturday 5 PM)
  - Participants: 50 employees (engineers, data
    scientists, actuaries, claims adjusters, customer
    service, product managers)
  - Location: Company cafeteria converted to hack
    space
  - Budget: $15K (food, prizes, supplies)
  - Judge panel: CTO, Head of Claims, Chief Actuary

  Hackathon structure:
  Day 1 (Friday):
  - 9:00 - Opening ceremony + rules + theme reveal
  - 9:30 - Idea pitches (anyone can pitch, 2 min
    each)
  - 10:00 - Team formation (self-organize around
    ideas, 4-6 per team)
  - 10:30 - Hacking begins
  - 12:30 - Lunch + mentor office hours
  - 1:30 - Continue hacking
  - 3:00 - Progress check-in (30 sec per team)
  - 3:30 - Continue hacking
  - 6:00 - Day 1 ends (optional evening hacking)

  Day 2 (Saturday):
  - 9:00 - Hacking continues
  - 12:00 - Lunch + prep presentations
  - 1:00 - Presentation prep deadline
  - 2:00 - Demo day (5 min per team + 3 min Q&A)
  - 4:00 - Judging deliberation
  - 4:30 - Awards ceremony
  - 5:00 - Close

  Facilitation guide must include:
  - Pre-hackathon: Registration, team formation
    guidance, technology setup, data availability
  - Detailed facilitator scripts for opening,
    transitions, check-ins, and closing
  - Idea pitch format and coaching
  - Team formation facilitation (ensuring non-
    technical people are included)
  - Mentorship program structure
  - Judging criteria and rubric
  - Demo day presentation template
  - How to handle: teams falling apart, scope creep,
    technical problems, fairness concerns
  - Awards structure (not just "best overall")
  - Post-hackathon: How to follow through on winning
    ideas

  Task: Write the complete hackathon facilitation
  guide with all supporting materials.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete hackathon guide — pre-hackathon preparation; facilitator scripts for both days; idea pitch format; team formation process including non-technical staff; mentorship structure; judging criteria and rubric; demo day presentation template; troubleshooting for team, scope, tech, and fairness issues; awards structure; post-hackathon follow-through plan."
    weight: 0.35
    description: "HackathonCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates hackathon facilitation expertise — team formation ensures diverse skill sets; idea pitches are structured to be inclusive; the judging rubric is fair across technical and business-focused projects; the demo day format is efficient for 8-10 teams; non-technical participation is genuinely valued; the $15K budget is allocated effectively."
    weight: 0.35
    description: "HackathonExpertise"
  - type: llm_judge
    criteria: "Response would produce a successful hackathon — teams would produce viable AI/ML prototypes; non-technical staff would contribute meaningfully; the winning ideas would have real business potential; the post-hackathon follow-through would turn prototypes into pilots; the company would want to run another hackathon."
    weight: 0.30
    description: "InnovationOutcome"
