meta:
  id: appreciative-inquiry-summit
  level: 2
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 2-day Appreciative Inquiry summit to redesign a nonprofit's volunteer program using the 4-D cycle"
  tags: [appreciative-inquiry, nonprofit, volunteer-program, strength-based, intermediate]

state: {}

trigger: |
  You're the executive director of a mid-size
  environmental nonprofit (50 staff, 300 active
  volunteers). Volunteer retention has dropped 40%
  in 2 years. Exit surveys cite "feeling like free
  labor" and "no meaningful connection to mission."
  Rather than a deficit-focused problem-solving
  approach, you want to use Appreciative Inquiry —
  a strength-based change methodology — to redesign
  the volunteer program around what works best.

  Summit details:
  - Duration: 2 days (9 AM - 4 PM each day)
  - Participants: 40 people (15 staff, 20 current
    volunteers, 5 former volunteers who left on
    good terms)
  - Location: Community center with flexible
    seating
  - Approach: Appreciative Inquiry 4-D Cycle
    (Discovery, Dream, Design, Destiny)

  Day 1 structure:
  - Opening: Welcome + AI methodology explanation
    (30 min)
  - Discovery phase (3 hours): Paired interviews
    exploring peak volunteer experiences, what
    gives life to the organization, best moments
    of volunteer-staff partnership
  - Lunch (1 hour)
  - Dream phase (2.5 hours): Creative envisioning
    of the ideal volunteer program — provocative
    propositions, visual representations, skits
    or presentations of the dream

  Day 2 structure:
  - Energizer + Day 1 recap (30 min)
  - Design phase (3 hours): Working groups design
    specific elements of the new volunteer program
    (recruitment, onboarding, recognition, career
    paths, communication, community building)
  - Lunch (1 hour)
  - Destiny phase (2 hours): Action planning,
    volunteer-led initiative teams, 90-day
    commitments, accountability structure
  - Closing ceremony (30 min): Appreciations,
    celebration, next steps

  Facilitation guide must include:
  - Pre-summit: Participant selection, invitation
    (explaining AI methodology to skeptics),
    pre-work appreciative interviews
  - AI methodology explanation script (accessible,
    not academic)
  - Discovery interview protocol with 8-10
    appreciative questions
  - How to synthesize interview themes in real time
  - Dream phase creative activities (not just
    discussion)
  - Provocative proposition writing guide
  - Design phase working group structure and
    deliverable templates
  - Destiny phase action planning format
  - How to handle: cynics who want to focus on
    problems, power imbalances between staff and
    volunteers, emotional stories during discovery
  - Post-summit: Follow-up cadence, initiative
    team support, 90-day check-in

  Task: Write the complete Appreciative Inquiry
  summit facilitation guide for both days.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete AI summit guide — pre-summit preparation and invitations; AI methodology explanation; discovery interview protocol with 8-10 appreciative questions; theme synthesis method; dream phase creative activities and provocative propositions; design phase working groups with deliverable templates; destiny phase action planning; handling cynics, power imbalances, and emotional stories; post-summit follow-up and 90-day check-in."
    weight: 0.35
    description: "AIMethodCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Appreciative Inquiry expertise — the 4-D cycle is faithfully followed; discovery questions are genuinely appreciative (not deficit-focused in disguise); provocative propositions are grounded in discovery data; the design phase builds on dreams rather than jumping to solutions; the destiny phase creates self-organizing initiative teams; the approach honors AI principles of constructionist, simultaneity, poetic, anticipatory, and positive."
    weight: 0.35
    description: "AIMethodExpertise"
  - type: llm_judge
    criteria: "Response would transform the volunteer program — participants would feel energized, not drained; the strength-based approach would surface what already works; volunteers and staff would co-create the new program; the design deliverables would be implementable; the 90-day action plans would produce tangible changes; volunteer retention would improve because the program was built on authentic peak experiences."
    weight: 0.30
    description: "VolunteerTransformationOutcome"
