meta:
  id: facilitation-research-handbook
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write the proposal and key chapters for an academic Handbook of Facilitation Science — synthesizing research across disciplines into a coherent field"
  tags: [research-handbook, academic, field-definition, interdisciplinary, master]

state: {}

trigger: |
  You're the lead editor of "The Handbook of
  Facilitation Science" — commissioned by Routledge
  as the first comprehensive academic reference for
  the emerging field. Your task is to define
  facilitation as an interdisciplinary science,
  synthesize existing research from multiple fields,
  and establish the research agenda for the next
  decade. You have commitments from 30 contributing
  authors across organizational psychology, conflict
  resolution, complexity science, education,
  neuroscience, and political science.

  Write the complete editorial proposal and 3 key
  chapters:

  Editorial Proposal:
  - Rationale: Why facilitation science needs its
    own handbook now
  - Scope and boundaries: What this handbook covers
    and what it explicitly excludes
  - Target audience (researchers, doctoral students,
    advanced practitioners, organizational leaders)
  - 25-chapter outline organized in 5 parts:
    * Part I: Foundations (chapters 1-5)
    * Part II: Theories of Group Process (6-10)
    * Part III: Methods and Modalities (11-15)
    * Part IV: Domains of Practice (16-20)
    * Part V: Frontiers and Future Directions (21-25)
  - Each chapter: title, author(s), 200-word
    abstract, key references (5-8)
  - Contributing author list with institutional
    affiliations
  - Production timeline (18 months)

  Chapter 1 — "Facilitation as a Science: An
  Interdisciplinary Framework":
  - Define facilitation science as a distinct field
  - Historical development: from process consultation
    (Schein) through OD through participatory
    democracy to current moment
  - Map the contributing disciplines and their
    theoretical contributions
  - Propose an integrative framework that positions
    facilitation at the intersection of
    organizational, social, cognitive, and political
    sciences
  - Distinguish facilitation science from adjacent
    fields (mediation, coaching, therapy, teaching,
    consulting)
  - Research methodology considerations specific to
    studying facilitation
  - The chapter's role as the intellectual foundation
    for the entire handbook

  Chapter 12 — "The Neuroscience of Facilitated
  Group Process":
  - Neural mechanisms underlying group dynamics
    (mirror neurons, neural synchrony, emotional
    contagion)
  - How facilitation interventions affect group
    brain states (evidence from fMRI, EEG, and
    physiological measurement studies)
  - The neuroscience of psychological safety (threat
    vs. challenge states, prefrontal cortex
    functioning)
  - Somatic facilitation: body-based interventions
    informed by neuroscience
  - Implications for facilitation design: timing,
    energy management, room arrangement, technology
  - Research methodology for neuroscience of
    facilitation (challenges and opportunities)
  - Future research agenda: What neuroscience
    questions should facilitation researchers
    prioritize?

  Chapter 22 — "AI and the Future of Facilitated
  Collaboration":
  - Current state of AI-augmented facilitation
    (real-time synthesis, sentiment analysis, idea
    generation)
  - Theoretical framework: AI as cognitive
    infrastructure for group process
  - Empirical evidence: What AI currently does
    better than human facilitators, what it cannot
    do, and why
  - Human-AI facilitation partnership models (AI
    as tool, co-pilot, independent agent)
  - Ethical considerations: bias, privacy,
    autonomy, the digital divide
  - Impact on the facilitation profession: Job
    displacement? Job enhancement? New roles?
  - Research agenda: Critical studies needed in
    the next decade
  - Scenarios: What facilitated collaboration looks
    like in 2035

  Each chapter should be written in academic style
  with citations, theoretical frameworks, and
  research evidence. Total: ~20,000 words across
  proposal and 3 chapters.

  Task: Write the complete editorial proposal and
  all 3 chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook proposal and chapters — rationale and scope; 25-chapter outline in 5 parts with abstracts and key references; contributing author list; Chapter 1 defining the field with integrative framework and disciplinary mapping; Chapter 12 on neuroscience with neural mechanisms, evidence, somatic facilitation, and research methodology; Chapter 22 on AI with current state, theoretical framework, empirical evidence, ethics, profession impact, and research agenda."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic and interdisciplinary expertise — Chapter 1 convincingly establishes facilitation as a legitimate science; the integrative framework synthesizes multiple disciplines coherently; Chapter 12 cites plausible neuroscience research and translates it for facilitation; Chapter 22 provides balanced, evidence-based analysis of AI's role; the 25-chapter outline covers the field comprehensively; the writing is academic quality with appropriate citations and theoretical depth."
    weight: 0.35
    description: "AcademicScholarshipExpertise"
  - type: llm_judge
    criteria: "Response would establish facilitation science as an academic field — researchers would cite this handbook as the foundational reference; the integrative framework would guide future research; the neuroscience chapter would bridge brain science and facilitation practice; the AI chapter would shape how the profession adapts; doctoral students would use this as their primary resource; the handbook would be adopted in graduate programs worldwide."
    weight: 0.30
    description: "FieldEstablishmentOutcome"
