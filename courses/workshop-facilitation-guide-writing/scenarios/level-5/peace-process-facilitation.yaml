meta:
  id: peace-process-facilitation
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a multi-track peace process dialogue between communities in a post-conflict society, integrating Track I and Track II diplomacy"
  tags: [peace-process, post-conflict, multi-track-diplomacy, reconciliation, master]

state: {}

trigger: |
  You're a senior peace process facilitator with
  the UN Mediation Support Unit. You've been asked
  to design the facilitation framework for a
  national dialogue in a post-conflict country
  (fictional, but modeled on realistic dynamics).

  Context:
  - Country: Verdania (pop. 8 million), emerging
    from a 12-year civil conflict between the
    majority Verdani and minority Keshani ethnic
    groups
  - Ceasefire signed 18 months ago, but no peace
    agreement yet
  - Key issues: power-sharing governance, land
    restitution for displaced Keshani, security
    sector reform, transitional justice (truth
    commission vs. amnesty), return of refugees
  - Parties: Government (Verdani-dominated),
    Keshani Liberation Front (KLF, armed group
    now in political transition), civil society,
    women's groups, youth, diaspora, religious
    leaders
  - International actors: UN mission, regional
    body (African Union equivalent), donor countries

  Multi-track dialogue design:

  Track I — Official Negotiations (your primary
  facilitation):
  - Participants: 5 government negotiators + 5 KLF
    negotiators + 2 UN mediators
  - Location: Neutral venue in neighboring country
  - Structure: 3 rounds of 5-day negotiations over
    3 months, targeting a framework peace agreement
  - Issues per round:
    * Round 1: Governance and power-sharing
    * Round 2: Land, security, and DDR
      (Disarmament, Demobilization, Reintegration)
    * Round 3: Transitional justice and
      reconciliation

  Track II — Civil Society Dialogue (parallel):
  - Participants: 100 civil society leaders in
    5 thematic working groups (governance, land,
    security, justice, social cohesion)
  - Structure: 2-day working sessions for each
    group, producing recommendation papers for
    Track I negotiators
  - How Track II feeds into Track I (formal linkage
    mechanism)

  Track III — Community-Level Reconciliation:
  - 20 community dialogues across the country in
    mixed Verdani-Keshani communities
  - Traditional and cultural reconciliation
    practices adapted for the process
  - Community peace agreements feeding into the
    national process

  Facilitation guide must include:
  - Pre-process: Conflict analysis, stakeholder
    mapping, trust-building bilateral meetings,
    ground rules negotiation, venue and logistics
  - Track I facilitation methodology (shuttle
    diplomacy, plenary sessions, drafting committees,
    sidebar conversations, package deals)
  - Track II design and facilitation for civil
    society working groups
  - Track III community dialogue design with
    cultural adaptation
  - Linkage mechanisms between all three tracks
  - Gender-inclusive process design (women's
    meaningful participation at all tracks)
  - How to handle: walkouts, spoilers (parties
    who benefit from no agreement), media leaks,
    international pressure, deadline pressure,
    the justice vs. peace dilemma (amnesty demands
    vs. victim rights), emotional testimony about
    atrocities
  - Facilitator impartiality management (when both
    sides accuse you of bias)
  - Verification and implementation framework
  - Post-agreement: Ongoing dialogue structures
    for implementation disputes

  Task: Write the complete multi-track peace
  process facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete peace process guide — conflict analysis and stakeholder mapping; trust-building bilateral meetings; Track I facilitation methodology with shuttle diplomacy, plenaries, drafting committees, and package deals; Track II civil society working groups with recommendation papers; Track III community dialogues with cultural adaptation; linkage mechanisms; gender-inclusive design; handling walkouts, spoilers, media leaks, pressure, justice vs. peace, and atrocity testimony; impartiality management; verification framework; post-agreement structures."
    weight: 0.35
    description: "PeaceProcessCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates peace process facilitation expertise — the multi-track architecture is coherent and interconnected; Track I methodology reflects real negotiation dynamics; the justice vs. peace dilemma is handled with genuine depth; spoiler management is sophisticated; gender inclusion is substantive, not tokenistic; community dialogues incorporate cultural reconciliation practices; the facilitator's impartiality is maintained while building trust with both sides."
    weight: 0.35
    description: "PeaceFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would contribute to a viable peace agreement — the multi-track approach ensures broad ownership; Track II recommendations would genuinely inform Track I; community dialogues would build grassroots support; the framework peace agreement would address core grievances; implementation would be monitored; the process would be seen as legitimate by all parties; Verdania would have a genuine path from ceasefire to lasting peace."
    weight: 0.30
    description: "PeaceOutcome"
