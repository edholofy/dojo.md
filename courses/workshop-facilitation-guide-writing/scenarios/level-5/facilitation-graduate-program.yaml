meta:
  id: facilitation-graduate-program
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a Master's degree program in Applied Facilitation Science for a top university — curriculum, pedagogy, research agenda, and industry partnerships"
  tags: [graduate-program, academic-design, facilitation-science, university, master]

state: {}

trigger: |
  You've been recruited as the founding director
  of a new Master of Science in Applied Facilitation
  Science at a top-20 university. This will be the
  world's first graduate program that treats
  facilitation as an applied science — drawing on
  organizational psychology, complexity science,
  dialogue theory, neuroscience of group dynamics,
  and design thinking. The provost has approved a
  $3M launch budget and expects first cohort
  enrollment in 18 months.

  Program design requirements:

  1. Academic Framework
  - Program mission and learning outcomes
  - Theoretical foundations (what makes this a
    "science" of facilitation, not just skills
    training)
  - Relationship to adjacent fields (OD, conflict
    resolution, public engagement, design thinking,
    social psychology)
  - Research paradigm: How facilitation can be
    studied rigorously (mixed methods, action
    research, ethnography, experimental designs)

  2. Curriculum Design (36 credits, 2 years)
  Semester 1 — Foundations:
  - Theories of Group Process (3 cr)
  - Facilitation Methodology I: Structured
    Approaches (3 cr)
  - Research Methods for Facilitation Science (3 cr)
  - Practicum I: Observation and Apprenticeship (3 cr)

  Semester 2 — Advanced Methods:
  - Neuroscience of Group Dynamics (3 cr)
  - Facilitation Methodology II: Emergent and
    Adaptive Approaches (3 cr)
  - Cross-Cultural Facilitation (3 cr)
  - Practicum II: Co-Facilitation (3 cr)

  Semester 3 — Specialization:
  - Elective I: Choose from specialization tracks (3 cr)
  - Elective II: Choose from specialization tracks (3 cr)
  - Facilitation Ethics and Professional Practice (3 cr)
  - Practicum III: Solo Facilitation (3 cr)

  Semester 4 — Integration:
  - Capstone Thesis or Applied Project (6 cr)
  - Facilitation Leadership Seminar (3 cr)
  - Practicum IV: Complex Engagement (3 cr)

  Specialization tracks:
  - Organizational Transformation Facilitation
  - Democratic and Civic Facilitation
  - Innovation and Design Facilitation
  - Conflict and Peace Facilitation

  For each course: complete syllabus with learning
  objectives, weekly topics, readings, assignments,
  and assessment methods

  3. Pedagogy
  - Experiential learning model (minimum 50% of
    instruction is experiential)
  - Reflective practice framework (journaling,
    supervision, peer feedback)
  - Simulation lab (how to create realistic
    facilitation scenarios for practice)
  - Client-based practicum partnerships
  - Online/hybrid delivery model for working
    professionals

  4. Faculty and Research
  - 5 faculty position descriptions (specializations,
    research areas, teaching loads)
  - Research center design: "Center for Facilitation
    Science" with research agenda
  - 3 detailed research proposals that faculty
    could pursue
  - Publication strategy (new journal? Special
    issues? Conference?)
  - Industry advisory board composition

  5. Student Experience
  - Admissions criteria and ideal student profile
  - Cohort model and learning community design
  - Career pathways and placement strategy
  - Alumni network and continuing education
  - Scholarship and financial aid model

  6. Launch Plan
  - 18-month timeline to first cohort
  - Marketing and recruitment strategy
  - Accreditation pathway
  - Budget allocation of $3M launch funding
  - Success metrics for years 1-5

  Task: Write the complete program design document
  including curriculum, syllabi, research agenda,
  and launch plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete graduate program — academic framework with theoretical foundations; 36-credit curriculum across 4 semesters with 4 specialization tracks; course syllabi with objectives, topics, readings, and assessments; experiential pedagogy with simulation lab and practicum; 5 faculty positions and research center design; 3 research proposals; admissions, cohort model, career pathways; 18-month launch timeline with budget and accreditation; success metrics."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic program design expertise — the theoretical foundations establish facilitation as a legitimate science; the curriculum balances theory and practice; the 50% experiential requirement is genuinely implemented; the neuroscience course connects brain science to facilitation practice; the research proposals would advance knowledge; the capstone produces applied scholarship; the program would earn accreditation; the syllabi reflect graduate-level rigor."
    weight: 0.35
    description: "AcademicDesignExpertise"
  - type: llm_judge
    criteria: "Response would create a world-class facilitation program — graduates would be highly skilled facilitators AND rigorous thinkers about group process; the research center would produce actionable knowledge; the industry partnerships would ensure practical relevance; the program would attract top students; graduates would advance the profession; the university would become the global center for facilitation science."
    weight: 0.30
    description: "AcademicExcellenceOutcome"
