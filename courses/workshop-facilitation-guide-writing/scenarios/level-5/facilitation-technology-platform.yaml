meta:
  id: facilitation-technology-platform
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a SaaS platform for professional facilitators — AI-assisted session design, real-time collaboration, impact analytics, and marketplace for facilitation services"
  tags: [saas-platform, product-design, ai-assisted, marketplace, master]

state: {}

trigger: |
  You're the founder and CEO of "FacilitateOS" —
  a venture-backed startup ($12M Series A) building
  the operating system for professional facilitation.
  Your vision: every professional facilitator uses
  FacilitateOS to design, deliver, and measure
  workshops, while organizations use it to find
  and book facilitators. Think "Figma meets Calendly
  meets Salesforce" for facilitation.

  Write the complete product strategy and design
  document:

  1. Product Vision and Strategy
  - Problem statement: Why facilitation needs a
    purpose-built platform (current tools are
    generic — Miro for collaboration, Google Docs
    for guides, SurveyMonkey for feedback)
  - Product vision (3-year)
  - Competitive landscape analysis
  - Go-to-market strategy (PLG vs. sales-led,
    freemium vs. premium)
  - Target user personas: Independent facilitator,
    internal corporate facilitator, facilitation
    consulting firm, organizations seeking
    facilitators

  2. Core Product — Workshop Design Studio
  - AI-assisted session design: Describe your
    workshop goals and constraints, AI suggests
    agenda, activities, and timing
  - Template marketplace: Facilitators share and
    sell workshop templates
  - Participant workbook generator: Auto-generate
    participant materials from facilitator guide
  - Collaboration: Co-design workshops with clients
    or co-facilitators
  - Version control for workshop designs (track
    iterations)
  - Write detailed user stories and wireframe
    descriptions for 5 key screens

  3. Delivery Module
  - Live facilitation dashboard: Timer, agenda
    tracker, energy pulse polling, parking lot,
    participant check-ins
  - Real-time documentation: AI transcribes and
    captures key themes
  - Audience response tools: Polls, word clouds,
    dot voting, prioritization matrices
  - Breakout group management: Assignment,
    instructions, timer, synthesis
  - Works for in-person (projected dashboard),
    virtual (integrated with Zoom/Teams), and
    hybrid

  4. Impact Analytics
  - Post-session surveys (auto-generated based on
    session design)
  - Longitudinal impact tracking (did commitments
    stick? Did decisions get implemented?)
  - Facilitator effectiveness dashboard (NPS,
    rebook rate, outcome ratings)
  - Client ROI calculator (connect workshop
    outcomes to business metrics)
  - Benchmarking (how does this facilitator/
    workshop compare to platform averages?)

  5. Facilitator Marketplace
  - Facilitator profiles with specializations,
    ratings, case studies
  - Client search and matching algorithm
  - Booking and scheduling
  - Proposal generation tools
  - Payment processing and invoicing
  - Review and reputation system

  6. Business Model and Financial Projections
  - Pricing tiers (free, professional, enterprise)
  - Feature allocation per tier
  - Revenue model: subscription + marketplace
    commission + premium template sales
  - 5-year financial projections (ARR, users,
    marketplace GMV)
  - Key metrics and board reporting dashboard

  7. Product Roadmap
  - Phase 1 (Months 1-6): MVP — Workshop Design
    Studio + basic templates
  - Phase 2 (Months 7-12): Delivery Module +
    analytics
  - Phase 3 (Months 13-18): Marketplace launch
  - Phase 4 (Months 19-24): AI features, API,
    enterprise integrations
  - Technical architecture overview

  Task: Write the complete product strategy and
  design document for FacilitateOS.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product strategy — vision with problem statement, competitive analysis, and go-to-market; Workshop Design Studio with AI-assisted design, template marketplace, participant materials, collaboration, version control, and 5 key screen descriptions; Delivery Module with dashboard, real-time documentation, audience response, and breakout management; Impact Analytics with surveys, longitudinal tracking, facilitator dashboard, ROI calculator, and benchmarking; Marketplace with profiles, matching, booking, and reputation; business model with pricing tiers and 5-year projections; 4-phase product roadmap."
    weight: 0.35
    description: "ProductStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product design and facilitation expertise — the Workshop Design Studio genuinely improves facilitator workflow; AI-assisted design is helpful without replacing facilitator judgment; the Delivery Module works across in-person, virtual, and hybrid; Impact Analytics captures meaningful outcomes beyond satisfaction surveys; the Marketplace matching algorithm considers specialization and fit; the business model is viable for a VC-backed SaaS; the product roadmap is realistic for a 30-person startup."
    weight: 0.35
    description: "ProductDesignExpertise"
  - type: llm_judge
    criteria: "Response would produce a fundable product strategy — investors would see a compelling market opportunity; facilitators would adopt the tool because it genuinely improves their practice; organizations would use the marketplace to find quality facilitators; the platform would become the industry standard; the 5-year projections would be credible; FacilitateOS would transform how facilitation is designed, delivered, and measured."
    weight: 0.30
    description: "ProductViabilityOutcome"
