meta:
  id: facilitation-thought-leadership
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a keynote address and manifesto on the future of facilitation in an AI-disrupted, politically polarized world"
  tags: [thought-leadership, keynote, manifesto, future-of-facilitation, master]

state: {}

trigger: |
  You're delivering the opening keynote at the IAF
  World Conference 2026 in Barcelona. Theme: "The
  Facilitator's Moment: Why the World Needs Us More
  Than Ever." Your audience: 800 professional
  facilitators from 60 countries, feeling anxious
  about AI replacing their role, exhausted from
  facilitating in increasingly polarized contexts,
  and questioning whether facilitation can still
  make a difference.

  Write your complete keynote address (40 minutes)
  PLUS a companion "Facilitation Manifesto" that
  you'll distribute at the conference.

  Keynote must address:
  1. The Facilitation Paradox: In a world that
     needs dialogue more than ever, genuine dialogue
     is harder than ever. Polarization, information
     overload, attention fragmentation, and distrust
     in institutions create unprecedented challenges.

  2. The AI Question Honestly: AI will transform
     facilitation — some tasks will be automated,
     new capabilities will emerge, and the facilitator's
     role will evolve. What becomes MORE valuable
     when AI can synthesize, summarize, and analyze?
     The irreducibly human elements: presence,
     emotional attunement, moral courage, and the
     ability to sit with complexity without premature
     resolution.

  3. Three Frontiers for Facilitation:
     - Frontier 1: Democratic Renewal — Facilitation
       as infrastructure for democracy when
       representative systems are strained
     - Frontier 2: Organizational Transformation —
       Facilitation as the operating system for
       adaptive organizations
     - Frontier 3: Collective Trauma and Healing —
       Facilitation as community medicine in a
       fragmented world

  4. The Facilitator's Inner Journey: Why the most
     important development is not technique but
     the facilitator's own capacity to hold
     complexity, tolerate uncertainty, and remain
     present when everything pushes toward reactivity.

  5. A Call to Action: What each facilitator in the
     room can do in the next 12 months to advance
     the profession and serve the world.

  Facilitation Manifesto (2-3 pages):
  - 10 declarations about what facilitation is and
    what it is not
  - The facilitator's ethical commitments
  - What we believe about groups, dialogue, and
    human potential
  - What we refuse to do (even under client
    pressure)
  - Our vision for facilitation in 2035

  The keynote should be written as a complete speech
  with narrative arc, stories, provocations, and
  moments of reflection — not an outline or bullet
  points.

  Task: Write the complete keynote address and
  facilitation manifesto.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete keynote and manifesto — 40-minute keynote addressing the facilitation paradox, AI question, 3 frontiers (democracy, organizations, healing), inner journey, and call to action; manifesto with 10 declarations, ethical commitments, beliefs about groups and dialogue, what facilitators refuse to do, and 2035 vision; the keynote is a complete speech with narrative arc, not an outline."
    weight: 0.35
    description: "KeynoteManifestoCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation thought leadership — the AI analysis is nuanced (neither dismissive nor apocalyptic); the 3 frontiers are genuinely important for the profession; the inner journey section draws on developmental psychology or contemplative practice; the manifesto's 10 declarations are specific and provocative; the call to action is concrete; the speech would generate standing ovation, not polite applause."
    weight: 0.35
    description: "ThoughtLeadershipExpertise"
  - type: llm_judge
    criteria: "Response would inspire and redirect the facilitation profession — 800 facilitators would leave the keynote energized and clear about their purpose; the manifesto would be shared widely beyond the conference; the 3 frontiers would spark new programs and initiatives; the AI discussion would reduce anxiety while promoting adaptation; the profession would coalesce around a renewed sense of purpose."
    weight: 0.30
    description: "ProfessionInspirationOutcome"
