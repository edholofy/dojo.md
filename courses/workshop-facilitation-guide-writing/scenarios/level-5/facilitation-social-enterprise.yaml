meta:
  id: facilitation-social-enterprise
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a social enterprise that democratizes access to professional facilitation — training community facilitators in underserved communities worldwide"
  tags: [social-enterprise, democratization, community-facilitators, global-impact, master]

state: {}

trigger: |
  You're launching a social enterprise called
  "Voices Unheard" — an organization dedicated to
  democratizing access to professional facilitation.
  Your premise: communities that most need
  facilitated dialogue (marginalized communities,
  post-conflict zones, immigrant communities, rural
  areas) are the least likely to have access to
  professional facilitators. Rather than sending
  outside facilitators in, you'll train community
  members to facilitate their own dialogues.

  Design the complete social enterprise:

  1. Theory of Change
  - Problem statement: access to facilitation as
    a social justice issue
  - How community facilitation capacity creates
    systemic change
  - Logical framework: inputs → activities →
    outputs → outcomes → impact
  - 5-year impact targets with measurement
    methodology
  - Evidence base: research on community-led
    facilitation effectiveness

  2. Community Facilitator Training Program
  - "Train the Community" model: 8-week program
    (2 hours/week + weekend intensive)
  - Curriculum designed for non-professional
    facilitators (accessible language, no assumed
    education level)
  - 5 core modules:
    * Listening and creating safe space
    * Managing difficult conversations
    * Decision-making in community settings
    * Connecting dialogue to action
    * Self-care and sustainability for facilitators
  - Write the complete facilitator training manual
    for Module 1 (Listening and Creating Safe Space)
  - Cultural adaptation framework: how to adapt
    the training for different cultural contexts
    (Indigenous communities, immigrant communities,
    faith communities, rural areas)
  - Quality without gatekeeping: How to maintain
    facilitation quality without creating
    credentialing barriers

  3. Community Dialogue Toolkit
  - 10 dialogue guides for common community issues:
    * Housing and displacement
    * Policing and community safety
    * School quality and equity
    * Environmental justice
    * Healthcare access
    * Immigration and integration
    * Youth voice and engagement
    * Economic development and gentrification
    * Mental health and community wellness
    * Intergenerational dialogue
  - Each guide: simplified facilitation guide that
    a trained community member can lead
  - Technology-light approach (works without
    internet or projectors)

  4. Organizational Design
  - Social enterprise structure (revenue model
    that sustains the mission)
  - Revenue streams: foundation grants, government
    contracts, pay-what-you-can community
    contributions, corporate social responsibility
    partnerships, training licensing
  - Geographic expansion strategy (start local,
    scale globally)
  - 3-year financial model with sustainability
    milestones
  - Governance: community representation on board
  - Staff roles and organizational chart

  5. Impact Measurement
  - Community-level impact metrics (dialogue
    participation, community decision quality,
    civic engagement, social cohesion)
  - Individual facilitator development tracking
  - Stories of Change methodology (qualitative
    impact documentation)
  - Annual impact report template
  - Research partnerships with universities

  6. Pilot Design
  - 3 pilot communities with different contexts:
    * Urban: Public housing community in a major
      US city facing redevelopment
    * Rural: Appalachian community dealing with
      economic transition post-coal
    * Immigrant: Refugee community in a mid-size
      city navigating integration
  - Pilot timeline, success criteria, and
    evaluation plan
  - How to enter each community respectfully as
    an outside organization

  Task: Write the complete social enterprise
  design document.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — theory of change with logical framework and 5-year impact targets; 8-week training program with 5 modules and complete Module 1 manual; cultural adaptation framework; quality without gatekeeping; 10 community dialogue guides; social enterprise structure with revenue model and 3-year financials; impact measurement with metrics, stories of change, and research partnerships; 3 pilot community designs with entry strategies."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social enterprise and facilitation democratization expertise — the theory of change connects facilitation access to systemic change; the training is genuinely accessible to non-professionals; cultural adaptation goes beyond translation to structural adaptation; quality is maintained without elitist gatekeeping; the revenue model is realistic for a social enterprise; the community entry strategy respects community sovereignty; the 10 dialogue guides are usable by trained community members."
    weight: 0.35
    description: "DemocratizationExpertise"
  - type: llm_judge
    criteria: "Response would create meaningful social impact — communities would gain lasting facilitation capacity; trained community facilitators would lead their own dialogues; the 3 pilot communities would demonstrate the model's adaptability; the social enterprise would be financially sustainable; impact measurement would demonstrate real community change; the model would be replicated globally; facilitation would become a community resource, not a professional service only the privileged access."
    weight: 0.30
    description: "SocialImpactOutcome"
