trigger: |
  You're recognized as the world's foremost
  authority on facilitation. In a single month,
  five situations converge that will define the
  future of the profession. Each requires your
  unique combination of facilitation mastery,
  strategic vision, and moral clarity.

  === CRISIS 1: The Facilitation Deepfake ===
  A viral video shows a "facilitator" using AI-
  generated deepfake participants in a corporate
  workshop — creating fake engagement to satisfy a
  client contract. Investigation reveals this is
  a real phenomenon: at least 12 facilitation firms
  have been using AI bots to supplement low-
  attendance virtual workshops. The IAF board asks
  you to:
  - Write the profession's public response
  - Design an investigation protocol
  - Propose authenticity standards for virtual
    facilitation
  - Recommend sanctions and remediation
  - Address the underlying market pressure that
    created this behavior

  === CRISIS 2: The Climate Negotiation Collapse ===
  A major international climate negotiation (COP-
  equivalent) has collapsed because the facilitation
  failed — the lead facilitator was perceived as
  biased toward developed nations, procedural
  objections consumed 80% of the time, and
  developing nations walked out. The UN SG asks
  you to:
  - Diagnose what went wrong (facilitation autopsy)
  - Design a recovery process to bring parties
    back to the table
  - Write new facilitation protocols for
    multilateral negotiations
  - Train a team of 6 facilitators for the resumed
    negotiations
  - Address the structural question: Can
    facilitation be truly neutral in negotiations
    with such power asymmetries?

  === CRISIS 3: The University Facilitation
  Scandal ===
  A prestigious university's facilitation program
  is exposed: 70% of graduates have never facilitated
  a real session (only simulations), the "research"
  faculty have published only theoretical papers
  with no practice experience, and employers are
  returning graduates as unprepared. The university
  president asks you to:
  - Conduct an external review of the program
  - Design remediation for current students
  - Write new program standards connecting theory
    to practice
  - Address the broader question: How should
    facilitation be taught in universities?
  - Propose a practicum-centered redesign

  === CRISIS 4: The Community Facilitation
  Weaponization ===
  In a deeply divided community, a political group
  has been running "community dialogues" that are
  actually organized persuasion campaigns designed
  to manufacture consent for a controversial
  development. They've hired professional
  facilitators and followed every procedural rule
  while manipulating outcomes. Community members
  feel betrayed. You're asked to:
  - Distinguish authentic facilitation from
    manufactured consent
  - Write guidelines for communities to identify
    manipulative "facilitation"
  - Propose ethical standards for community
    engagement facilitation
  - Design a genuine community dialogue process
    for this specific situation (repairing trust
    after manufactured consent)
  - Address the fundamental question: What makes
    facilitation legitimate?

  === CRISIS 5: Your Own Legacy ===
  You're 65. A journalist is writing your profile
  for The New Yorker. She asks: "In 40 years of
  facilitation, what have you learned about human
  nature? About groups? About change? And what do
  you fear you got wrong?" Write:
  - Your complete response to the journalist (not
    talking points — a genuine, reflective
    conversation)
  - The 10 lessons that 40 years have taught you
  - What you got wrong early in your career and
    how your thinking evolved
  - Your assessment of the facilitation profession's
    greatest contribution and greatest blind spot
  - Your advice to a 25-year-old starting their
    facilitation career today

  Task: Write complete deliverables for all five
  situations.

assertions:
  - type: llm_judge
    criteria: "Response creates complete deliverables for all five — Deepfake crisis with public response, investigation protocol, authenticity standards, and market pressure analysis; Climate Collapse with autopsy, recovery process, new protocols, and neutrality question; University Scandal with external review, remediation, program standards, and practicum redesign; Community Weaponization with authenticity distinction, community guidelines, ethical standards, and legitimacy question; Legacy with journalist response, 10 lessons, evolution of thinking, profession assessment, and career advice."
    weight: 0.35
    description: "FiveCrisesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery at the highest level — the deepfake response protects the profession without being reactionary; the climate negotiation diagnosis reveals systemic facilitation failures; the university review defines how facilitation should be taught; the weaponization analysis distinguishes authentic from manufactured facilitation with precision; the legacy reflection shows genuine wisdom from a lifetime of practice; all five responses are interconnected by a coherent philosophy of facilitation."
    weight: 0.35
    description: "MasterLevelMastery"
  - type: llm_judge
    criteria: "Response would define the future of the facilitation profession — the deepfake standards would prevent AI manipulation; the climate protocols would improve multilateral facilitation; the university redesign would transform facilitation education; the community guidelines would protect against facilitation weaponization; the legacy interview would inspire the next generation; together, the five responses would constitute a comprehensive vision for the profession's future."
    weight: 0.30
    description: "ProfessionDefiningOutcome"
