meta:
  id: global-facilitation-standards
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Lead the creation of an ISO-equivalent global facilitation standard — convening international experts, defining competencies, and building a self-sustaining standards body"
  tags: [global-standards, iso-equivalent, international-consortium, profession-building, master]

state: {}

trigger: |
  You've been appointed chair of the newly formed
  International Facilitation Standards Consortium
  (IFSC) — a coalition of 15 national facilitation
  associations, 5 university programs, and 10
  global consulting firms. Your mandate: create
  the world's first comprehensive international
  standard for professional facilitation, equivalent
  in rigor to ISO management standards.

  The standard must cover:

  1. Facilitation Competency Standard (IFS-100)
  - Scope and applicability (what types of
    facilitation this standard covers)
  - Core competencies with performance criteria
  - Specialization domains (organizational,
    community, educational, therapeutic, conflict)
  - Cultural adaptability requirements (the
    standard must work across cultures)
  - Competency assessment methodology
  - Cross-reference with existing frameworks (IAF,
    ICF, PMI, ISO 10015)

  2. Facilitation Process Standard (IFS-200)
  - Facilitation engagement lifecycle (from inquiry
    to follow-up)
  - Workshop design standards (minimum requirements
    for professional facilitation design)
  - Facilitation delivery standards (what
    constitutes competent delivery)
  - Documentation and output standards
  - Quality management requirements
  - Continuous improvement methodology

  3. Facilitation Ethics Standard (IFS-300)
  - Ethical principles and code of conduct
  - Informed consent requirements
  - Confidentiality and data protection
  - Conflict of interest management
  - Power dynamics and participant protection
  - Complaints and disciplinary procedures
  - Whistleblower protections

  4. Facilitation Training and Education
  Standard (IFS-400)
  - Facilitation education program requirements
  - Trainer/educator qualifications
  - Curriculum framework (minimum content areas)
  - Assessment and examination standards
  - Continuing professional development requirements
  - Training program accreditation process

  5. Standards Governance and Maintenance
  - IFSC organizational structure
  - Standards development process (drafting,
    public comment, revision, approval)
  - 5-year review and update cycle
  - National adaptation guidelines (how countries
    can adapt the international standard)
  - Stakeholder engagement in standards development
  - Funding model for the consortium

  6. Implementation Roadmap
  - Phase 1 (Year 1): Draft standards, expert
    review, public comment
  - Phase 2 (Year 2): Pilot certification in 5
    countries
  - Phase 3 (Year 3): Full launch with national
    adoptions
  - Phase 4 (Years 4-5): Expansion, refinement,
    and mutual recognition agreements
  - Marketing and adoption strategy
  - Handling resistance from established
    certification bodies

  Task: Write the complete standards framework
  document including all 4 standards (IFS-100
  through IFS-400), governance model, and
  implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards framework — IFS-100 competency standard with core competencies, specializations, cultural adaptability, and cross-references; IFS-200 process standard with lifecycle, design, delivery, documentation, and quality; IFS-300 ethics standard with principles, consent, confidentiality, conflicts, and complaints; IFS-400 training standard with program requirements, curriculum, assessment, CPD, and accreditation; governance with organizational structure, development process, review cycle, and funding; implementation roadmap with 4 phases over 5 years."
    weight: 0.35
    description: "GlobalStandardsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards development expertise — the 4 standards are interconnected and internally consistent; competency criteria are measurable and culturally adaptable; the process standard reflects real facilitation practice; the ethics standard addresses genuine dilemmas; the training standard ensures quality without limiting innovation; the governance model balances rigor with inclusivity; the implementation roadmap is realistic about political and practical challenges."
    weight: 0.35
    description: "StandardsDevelopmentExpertise"
  - type: llm_judge
    criteria: "Response would create a credible global standard — 15 national associations would adopt it; the standards would improve facilitation quality worldwide; cultural adaptability would make it genuinely international; the certification would be meaningful to clients and employers; resistance from existing bodies would be managed diplomatically; the facilitation profession would be elevated to the rigor of established professions; the standards would be self-sustaining beyond initial funding."
    weight: 0.30
    description: "ProfessionElevationOutcome"
