meta:
  id: facilitation-memoir
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a professional memoir that captures 30 years of facilitation practice — the moments that defined your methodology, the failures that taught you most, and the invisible art of holding space"
  tags: [memoir, professional-narrative, facilitation-wisdom, reflective-practice, master]

state: {}

trigger: |
  You're a master facilitator reflecting on 30
  years of practice. Your publisher wants a
  professional memoir — not a how-to book, but the
  human story of facilitation. The working title is
  "The Space Between: A Facilitator's Life in the
  Rooms Where It Happens."

  Write the book proposal and 3 complete chapters
  (total ~15,000 words across all three).

  Book proposal:
  - Author positioning (30 years, 2,000+ sessions,
    5 continents)
  - Market analysis (why a facilitation memoir now)
  - Target audience (facilitators, leaders,
    organizational psychologists, social change
    practitioners)
  - Chapter outline (15 chapters) with brief
    descriptions
  - The narrative arc: from idealistic young
    facilitator through crisis of purpose to
    hard-won wisdom

  Chapter 3 — "The Room I Almost Destroyed":
  - Your biggest facilitation failure — a post-
    merger workshop where your interventions made
    everything worse
  - What you did wrong (tried to force resolution
    instead of allowing conflict)
  - The moment you realized you'd lost the room
  - What you learned about the difference between
    managing and holding space
  - How this failure shaped every session that came
    after
  - Reflections on facilitation ego and humility

  Chapter 9 — "The Invisible Work":
  - The aspects of facilitation no training
    teaches: reading the air in a room, sensing
    the unspoken, knowing when to wait and when
    to push
  - 3 stories that illustrate the invisible art:
    * A boardroom where the real conflict was
      between two people who had never spoken
      their truth
    * A community meeting where silence said more
      than words
    * A multi-day retreat where the breakthrough
      happened during a walk, not during a session
  - Somatic awareness: how your body tells you
    what the room needs before your mind catches up
  - The cost of invisible work: emotional labor,
    facilitator burnout, boundaries

  Chapter 14 — "Passing the Torch":
  - Mentoring the next generation of facilitators
  - What can be taught vs. what must be experienced
  - A conversation with your most promising mentee
    who is about to facilitate their hardest session
  - What you wish someone had told you 30 years ago
  - The paradox: the best facilitator is the one
    the room doesn't need
  - Your letter to future facilitators

  Each chapter should read as literary nonfiction
  — vivid scenes, emotional depth, dialogue, and
  reflection. Not a textbook.

  Task: Write the complete book proposal and all 3
  chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete memoir proposal and chapters — proposal with positioning, market analysis, audience, 15-chapter outline, and narrative arc; Chapter 3 with vivid failure story, self-awareness, and lessons about holding space; Chapter 9 with 3 stories of invisible facilitation work, somatic awareness, and emotional labor; Chapter 14 with mentoring narrative, teaching paradox, and letter to future facilitators; all chapters written as literary nonfiction with scenes, dialogue, and reflection."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates literary and facilitation mastery — the failure story in Chapter 3 is genuinely vulnerable, not humblebrag; the invisible work in Chapter 9 captures what only experienced facilitators understand; the mentoring in Chapter 14 is tender and wise; the writing quality is literary, not didactic; the 3 chapters together reveal a coherent facilitation philosophy forged through experience; the voice is authentic and distinctive."
    weight: 0.35
    description: "LiteraryFacilitationMastery"
  - type: llm_judge
    criteria: "Response would produce a meaningful professional memoir — readers would feel they've spent time with a master practitioner; the failure story would normalize vulnerability in the profession; the invisible work chapter would validate every facilitator's unrecognized labor; the mentoring chapter would inspire passing knowledge forward; the memoir would become essential reading in facilitation training programs; it would elevate the profession's self-understanding."
    weight: 0.30
    description: "MemoirImpactOutcome"
