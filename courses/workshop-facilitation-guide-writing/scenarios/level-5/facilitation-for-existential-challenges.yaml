meta:
  id: facilitation-for-existential-challenges
  level: 5
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design facilitation frameworks for addressing existential challenges — climate change multi-stakeholder negotiations, AI governance global dialogue, and pandemic preparedness summits"
  tags: [existential-challenges, climate, ai-governance, pandemic, master]

state: {}

trigger: |
  You're a senior advisor to the UN Secretary-
  General's office on participatory governance.
  The SG has tasked you with designing facilitation
  frameworks for three existential challenges that
  require unprecedented global collaboration. Each
  framework must enable diverse stakeholders to make
  collective decisions at a scale and complexity
  never before attempted.

  === FRAMEWORK 1: Climate Transition Dialogue ===
  Design a facilitation framework for a national
  "Just Transition" dialogue in a country heavily
  dependent on fossil fuels (coal provides 40% of
  electricity, 80,000 mining jobs, 3 provinces
  economically dependent on coal).

  Stakeholders: National government, provincial
  governments, coal mining unions (militant,
  resistant), environmental organizations,
  Indigenous communities (land rights affected),
  energy companies (both fossil and renewable),
  financial institutions, affected community
  residents, youth climate activists

  Design requirements:
  - Multi-level dialogue architecture (national,
    provincial, community)
  - 18-month facilitation timeline with milestones
  - Economic transition modeling workshops (not
    just talk — actual economic planning)
  - Worker retraining and community reinvestment
    dialogue
  - Environmental justice integration (who bears
    the costs of transition?)
  - How to facilitate when some stakeholders deny
    the premise (climate change itself)
  - Binding vs. advisory outputs (what has force,
    what is recommendation)
  - Facilitating with extreme power imbalances
    (energy companies vs. Indigenous communities)

  === FRAMEWORK 2: Global AI Governance Dialogue ===
  Design a facilitation framework for a UN-level
  global dialogue on AI governance — bringing
  together 193 member states plus tech companies,
  civil society, and AI researchers.

  Design requirements:
  - Multi-round dialogue architecture over 2 years
  - Regional consultation process (5 regions, each
    with different AI maturity and concerns)
  - Technical experts + diplomats + civil society
    integration (very different languages and
    priorities)
  - How to facilitate between tech companies with
    more AI capability than most governments
  - Addressing the North-South divide (developed
    nations set standards that developing nations
    must follow)
  - Facilitating urgency (AI advances faster than
    governance processes)
  - Managing geopolitical tensions (US-China-EU
    AI competition)
  - Output: Framework convention with implementation
    mechanisms

  === FRAMEWORK 3: Pandemic Preparedness Summit ===
  Design the facilitation framework for a 3-day
  Global Pandemic Preparedness Summit bringing
  together 150 participants (health ministers,
  WHO officials, pharmaceutical companies, Global
  South health advocates, epidemiologists, and
  pandemic survivors/families).

  Design requirements:
  - Summit architecture (plenary + working groups)
  - Scenario-based simulation exercise (next
    pandemic hits during the summit — participants
    must respond in real time)
  - Equity framework facilitation (ensuring Global
    South isn't last in line for vaccines/treatments
    again)
  - How to facilitate between pharma companies
    and public health advocates on IP/access issues
  - Survivor testimony integration (powerful but
    must not hijack technical discussions)
  - Output: Binding commitments with accountability
    mechanisms
  - Post-summit: Implementation monitoring and
    review process

  For each framework, provide:
  - Complete facilitation architecture
  - Stakeholder engagement strategy
  - Detailed facilitation methodology
  - How to handle the hardest dynamics
  - Output and implementation design
  - Quality assurance for the process

  Task: Write all three facilitation frameworks.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete frameworks — Climate Transition with multi-level architecture, 18-month timeline, economic modeling, worker retraining, environmental justice, and climate denial management; AI Governance with multi-round architecture, regional consultations, tech-diplomat integration, North-South dynamics, urgency management, and framework convention; Pandemic Summit with architecture, scenario simulation, equity framework, IP/access facilitation, survivor testimony, binding commitments, and implementation monitoring."
    weight: 0.35
    description: "ExistentialFrameworksCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation expertise at civilizational scale — each framework addresses genuine power asymmetries; the climate dialogue integrates economic planning with participatory process; the AI governance framework bridges technical and diplomatic worlds; the pandemic summit's simulation exercise creates urgency; each framework produces actionable outputs, not just dialogue; the facilitation methodologies are appropriate for the stakes and complexity."
    weight: 0.35
    description: "CivilizationalFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would contribute to addressing existential challenges — the climate transition would be socially viable because communities co-created it; the AI governance framework would produce a credible convention; the pandemic preparedness commitments would be honored because they were collectively made; the facilitation design would demonstrate that collective decision-making works even for the hardest problems."
    weight: 0.30
    description: "ExistentialChallengeOutcome"
