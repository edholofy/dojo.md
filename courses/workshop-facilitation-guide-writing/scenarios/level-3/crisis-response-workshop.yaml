meta:
  id: crisis-response-workshop
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a crisis simulation workshop preparing a hospital leadership team for pandemic, cyberattack, and mass casualty scenarios"
  tags: [crisis-simulation, healthcare, tabletop-exercise, scenario-planning, advanced]

state: {}

trigger: |
  You're an emergency preparedness consultant hired
  by a 500-bed hospital system. Their last crisis
  (a ransomware attack) exposed critical gaps in
  leadership coordination, communication, and
  decision-making under pressure. The CMO wants a
  tabletop exercise that tests the leadership team's
  crisis response capabilities across multiple
  scenario types.

  Workshop details:
  - Duration: 6 hours (full day with breaks)
  - Participants: 18 hospital leaders (CMO, CNO,
    CFO, CIO, COO, department heads for ED, ICU,
    Surgery, Pharmacy, Lab, Radiology, plus
    communications director, legal counsel, safety
    officer, infection control, supply chain, and
    HR director)
  - Location: Hospital conference center (not
    the actual command center — this is training)
  - Approach: Progressive tabletop exercise with
    3 escalating scenarios and real-time injects

  Exercise structure:
  Scenario 1 — Cyberattack (90 min):
  - Initial inject: EHR system goes down at 2 AM
  - Progressive injects every 15 min: ransomware
    confirmed, lab systems affected, medication
    dispensing offline, media calls, patient data
    may be compromised, FBI contacts hospital
  - Focus: IT downtime procedures, communication
    chains, patient safety without electronic records

  Break (15 min)

  Scenario 2 — Pandemic Surge (90 min):
  - Initial inject: 40 COVID-like patients in 24
    hours, 3 staff positive
  - Progressive injects: ICU at 95% capacity,
    ventilator shortage, staff calling out sick,
    elective surgeries question, PPE supply chain
    disruption, neighboring hospital diverts to you
  - Focus: Surge capacity, staff deployment, ethical
    resource allocation, communication with public

  Lunch (45 min)

  Scenario 3 — Mass Casualty Incident (90 min):
  - Initial inject: Factory explosion, 30 casualties
    incoming, mix of burn and blast injuries
  - Progressive injects: Second explosion possible,
    contamination concern, overwhelmed blood bank,
    family staging area overflow, media helicopters,
    VIP victim (mayor's spouse)
  - Focus: Triage, resource allocation, inter-agency
    coordination, family reunification

  Hot wash / After-Action Review (45 min):
  - Facilitated debrief across all 3 scenarios
  - Gap identification and improvement planning

  Facilitation guide must include:
  - Pre-workshop: Participant preparation without
    revealing scenarios, current plans review,
    observer briefing
  - Exercise controller guide (managing injects,
    timing, escalation)
  - Detailed inject schedule with decision points
    for each scenario
  - Facilitator observation checklist (what to
    watch for during each scenario)
  - Role-specific expectations (who should do what
    in each scenario)
  - How to manage: participants who "game" the
    exercise, real emergencies interrupting the
    exercise, emotional reactions (especially from
    those who lived through the ransomware attack),
    dominant personalities taking over
  - Psychological safety for leaders admitting gaps
  - Hot wash facilitation script with specific
    debrief questions
  - Scoring rubric for organizational readiness
  - Post-workshop: Improvement plan template,
    follow-up drill schedule, gap remediation
    tracking

  Task: Write the complete crisis simulation
  facilitation guide with all injects and
  observation tools.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete crisis simulation guide — pre-workshop preparation; exercise controller guide; detailed inject schedules for all 3 scenarios with decision points; facilitator observation checklist; role-specific expectations; managing gaming, real emergencies, emotional reactions, and dominant personalities; psychological safety; hot wash script; scoring rubric; post-workshop improvement plan and drill schedule."
    weight: 0.35
    description: "CrisisSimCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates crisis exercise expertise — the progressive inject model creates realistic escalation pressure; injects force genuine leadership decisions (not just procedural responses); the 3 scenarios test different competencies; the observation checklist captures decision quality and team dynamics; the hot wash extracts systemic lessons rather than individual blame; the scoring rubric measures organizational readiness meaningfully."
    weight: 0.35
    description: "CrisisExerciseExpertise"
  - type: llm_judge
    criteria: "Response would improve hospital crisis readiness — leadership would discover gaps before a real crisis; the exercise would test communication chains, decision-making, and resource allocation under pressure; the improvement plan would address systemic weaknesses; the hospital would be measurably better prepared for cyberattacks, pandemics, and mass casualties; the exercise design could be repeated annually with new scenarios."
    weight: 0.30
    description: "CrisisReadinessOutcome"
