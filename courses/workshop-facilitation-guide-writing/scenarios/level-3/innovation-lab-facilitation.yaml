meta:
  id: innovation-lab-facilitation
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 5-day corporate innovation lab where cross-functional teams develop and validate new business concepts through rapid prototyping and customer testing"
  tags: [innovation-lab, rapid-prototyping, customer-validation, business-concepts, advanced]

state: {}

trigger: |
  You're the innovation director at a $3B consumer
  packaged goods company. The CEO has funded a
  "New Ventures Lab" — a 5-day intensive where
  cross-functional teams develop concepts for
  entirely new product categories (beyond the
  company's current portfolio). Previous innovation
  efforts produced safe, incremental ideas. The
  CEO wants "ventures that could become $100M
  businesses in 5 years."

  Lab details:
  - Duration: 5 days (Monday-Friday, 8 AM - 6 PM)
  - Participants: 30 employees in 6 teams of 5
    (each team has: brand manager, R&D scientist,
    supply chain, finance, and either a designer
    or data scientist)
  - Location: Innovation space (open floor plan,
    prototyping materials, video conferencing for
    customer calls)
  - External resources: 2 innovation coaches
    (rotating between teams), access to 20 target
    consumers for interviews/testing (scheduled
    throughout the week), rapid prototyping tools
    (3D printers, packaging samples, digital
    mockup tools)
  - Judging: Friday afternoon pitch to the
    Innovation Board (CEO, CMO, VP R&D, VP Strategy,
    external venture investor)

  5-day structure:
  Monday — Discover:
  - Opening + challenge brief (60 min)
  - Consumer immersion: Each team conducts 3
    in-person consumer interviews using design
    research techniques (3 hours)
  - Insight synthesis and opportunity framing (2 hr)
  - End of day: Each team presents their top
    opportunity area (5 min each)

  Tuesday — Define:
  - "How Might We" workshop on opportunity areas
    (90 min)
  - Business model canvas for top 3 concepts per
    team (2 hours)
  - Feasibility checkpoint with R&D and supply
    chain advisors (90 min)
  - End of day: Each team selects one concept to
    pursue

  Wednesday — Develop:
  - Rapid prototyping sprint (full day)
  - Teams create physical/digital prototypes,
    value propositions, and preliminary financials
  - Innovation coaches provide structured feedback
    at 3 checkpoints
  - End of day: Prototype show-and-tell (informal)

  Thursday — Validate:
  - Morning: Refine prototypes based on team
    discussions (2 hours)
  - Consumer testing: Each team tests prototype
    with 3-4 target consumers (3 hours)
  - Afternoon: Iterate based on consumer feedback,
    build financial model, prepare pitch
  - End of day: Practice pitch to peer teams
    (feedback round)

  Friday — Deliver:
  - Morning: Final pitch preparation (3 hours)
  - Lunch
  - Pitch day: Each team presents to Innovation
    Board (10 min pitch + 10 min Q&A)
  - Board deliberation (45 min)
  - Awards and next steps (30 min): Which concepts
    get "seed funding" for further development

  Facilitation guide must include:
  - Pre-lab: Team composition strategy, participant
    preparation (consumer research training),
    consumer recruitment for interviews/testing,
    physical space setup and materials
  - Daily facilitator scripts with learning
    objectives for each day
  - Consumer interview guide and synthesis framework
  - "How Might We" facilitation methodology
  - Business model canvas coaching guide
  - Rapid prototyping facilitation (keeping teams
    focused on learning, not polish)
  - Consumer testing protocol (what to test, how
    to capture feedback, how to iterate)
  - Innovation coach role description and rotation
    schedule
  - Pitch template and coaching guide
  - How to handle: teams falling in love with bad
    ideas, R&D saying "that's impossible," finance
    killing creativity, team conflict under
    pressure, concept overlap between teams
  - Innovation Board judging rubric
  - Post-lab: Concept incubation process, team
    follow-up, IP considerations

  Task: Write the complete 5-day innovation lab
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 5-day lab guide — pre-lab preparation and team composition; daily scripts with learning objectives; consumer interview guide and synthesis; HMW facilitation; business model canvas coaching; rapid prototyping facilitation; consumer testing protocol; innovation coach role and rotation; pitch template and coaching; handling bad ideas, R&D pushback, finance killing creativity, team conflict, and concept overlap; judging rubric; post-lab incubation process."
    weight: 0.35
    description: "InnovationLabCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates innovation lab facilitation expertise — the 5-day arc follows discover-define-develop-validate-deliver rigorously; consumer interviews use design research techniques; prototyping focuses on learning hypotheses, not polish; consumer testing captures genuine insight; the business model canvas is adapted for intrapreneurship; the pitch coaching prepares teams for tough board questions; the facilitation pushes teams beyond incremental thinking toward venture-scale concepts."
    weight: 0.35
    description: "InnovationFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would produce viable new venture concepts — teams would generate concepts genuinely beyond the current portfolio; consumer validation would de-risk the concepts; financial models would be credible enough for seed funding decisions; the Innovation Board would have a clear basis for investment; at least 2-3 concepts would merit further development; the company would build innovation muscle beyond this single lab."
    weight: 0.30
    description: "VentureConceptOutcome"
