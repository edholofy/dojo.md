meta:
  id: community-engagement-workshop
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a community town hall workshop on a controversial development project, managing heated public debate and NIMBYism"
  tags: [community-engagement, town-hall, controversial, public-debate, advanced]

state: {}

trigger: |
  You're a community engagement facilitator hired
  by a city planning department. A developer has
  proposed building a 200-unit affordable housing
  complex on a vacant lot in a middle-class
  residential neighborhood. The project requires
  a zoning variance. The community is deeply divided:
  affordable housing advocates strongly support it,
  neighboring homeowners fear property value decline,
  environmentalists want the lot kept as green
  space, and small business owners see potential
  customers. Social media has been toxic. The city
  council requires a structured community input
  session before voting.

  Workshop details:
  - Duration: 3 hours (evening, 6-9 PM)
  - Participants: ~100 community members (open to
    public, no registration required), plus city
    council members (observing), the developer's
    representatives, city planning staff
  - Location: High school gymnasium with chairs
    and tables
  - Emotional temperature: Very high. A previous
    unstructured town hall on this topic devolved
    into shouting.

  Structured format:
  1. Opening and ground rules (15 min): Establish
     respectful dialogue framework
  2. Project presentation (20 min): Developer
     presents plans with planning staff commentary
  3. Clarifying questions only (15 min): Questions
     about facts, not opinions
  4. Small group discussions (45 min): Tables of
     8-10, each with a trained table facilitator,
     discussing structured questions
  5. Break (15 min)
  6. Table report-backs (20 min): Each table shares
     top 3 themes
  7. Open microphone (20 min): Individual statements
     (2 min each, timed)
  8. City council response (10 min): Council members
     reflect on what they heard
  9. Next steps and closing (10 min): What happens
     with this input

  Facilitation guide must include:
  - Pre-workshop: Publicity in multiple languages,
    childcare arrangements, accessibility, training
    for 12 table facilitators, developer briefing
    on presentation tone
  - Room layout for 100+ people with table
    facilitator stations
  - Ground rules that de-escalate without silencing
  - Structured questions for small group discussions
    (balanced, not leading)
  - Table facilitator training script (2-hour
    pre-session training)
  - Comment capture methodology (every voice
    documented for city council)
  - Open microphone management protocol (timer,
    queue, preventing repeat speakers)
  - How to handle: organized protest groups,
    speakers who refuse time limits, personal
    attacks on the developer, racial undertones
    in "neighborhood character" arguments, city
    council members who break observer role,
    media coverage affecting behavior
  - De-escalation techniques for heated moments
  - Accessibility: language interpretation, ADA
    compliance, materials in multiple formats
  - Post-workshop: Comprehensive input report
    for city council, public summary document,
    how input will be weighted in the decision

  Task: Write the complete community engagement
  facilitation guide with table facilitator
  training and input documentation methods.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete community engagement guide — multilingual publicity and accessibility; room layout for 100+; ground rules that de-escalate; table facilitator training script; structured discussion questions; comment capture methodology; open mic management protocol; handling protest groups, time limit refusal, personal attacks, racial undertones, council overstepping, and media influence; de-escalation techniques; language interpretation and ADA compliance; comprehensive input report for council."
    weight: 0.35
    description: "CommunityEngagementCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates public engagement facilitation expertise — the structured format prevents the shouting of the previous meeting; ground rules balance free expression with productive dialogue; small group discussions capture nuanced views that microphones miss; the table facilitator training prepares for real conflict scenarios; the racial undertones in NIMBY arguments are addressed without shutting down legitimate concerns; the comment capture gives every voice equal weight in the record."
    weight: 0.35
    description: "PublicEngagementExpertise"
  - type: llm_judge
    criteria: "Response would produce a legitimate community input process — all stakeholder perspectives would be documented; the city council would have a comprehensive, balanced input report; no group would feel silenced or marginalized; the input would meaningfully inform the zoning decision; the process would be seen as fair even by those who disagree with the outcome; the community's trust in public process would increase."
    weight: 0.30
    description: "DemocraticProcessOutcome"
