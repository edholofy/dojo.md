meta:
  id: advanced-facilitation-shift
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write facilitation guides for three complex workshops: a union-management negotiation session, a trauma-informed community healing circle, and a board governance retreat"
  tags: [multi-context, union-negotiation, trauma-informed, board-governance, advanced]

state: {}

trigger: |
  You're a master facilitator with expertise across
  contexts. Three high-stakes engagements need
  complete facilitation guides this week.

  === WORKSHOP 1: Union-Management Joint Problem-Solving ===
  A school district (2,500 teachers) faces budget
  cuts requiring either layoffs or salary freezes.
  The teachers' union and district administration
  have agreed to a facilitated joint problem-solving
  session instead of adversarial bargaining.
  - Duration: Full day
  - Participants: 16 (8 union representatives
    including union president and building reps,
    8 district administrators including superintendent,
    CFO, HR director, and principals)
  - Location: Neutral community center
  - Context: 3-year history of contentious
    negotiations. Trust is low but both sides
    recognize adversarial bargaining won't solve
    a budget crisis. Media is covering the situation.

  Guide must include:
  - Pre-session: Separate caucus meetings with each
    side, ground rules negotiation, data packet
    (agreed-upon financial facts)
  - Interest-based bargaining methodology
    (positions vs. interests)
  - Joint fact-finding process (agreeing on the
    budget reality before solution-finding)
  - Option generation protocol (no commitment
    brainstorming)
  - Evaluation criteria development (how to assess
    options fairly)
  - Caucus management (when and how sides can
    consult privately)
  - How to handle: emotional testimony about
    teacher impact, power plays, walking-out
    threats, media leaks, bad-faith tactics
  - Documentation of agreements and tentative
    proposals
  - Post-session: Ratification process, communication
    to 2,500 teachers and community

  === WORKSHOP 2: Trauma-Informed Community Healing Circle ===
  A small town (pop. 8,000) experienced a mass
  shooting at the local grocery store 6 months ago
  (4 killed, 9 injured). The community healing
  process has stalled — grief, anger, political
  divisions over gun policy, and survivor guilt are
  festering. A community coalition has asked you to
  facilitate a healing circle.
  - Duration: 3 hours
  - Participants: 30-40 community members
    (survivors, families of victims, first
    responders, clergy, teachers, grief counselors,
    and general community members)
  - Location: Community recreation center
  - Context: Deeply divided politically. Some want
    to focus on gun policy, others want pure grief
    processing. Licensed therapists will be present
    as support (not participants).

  Guide must include:
  - Pre-event: Trauma-informed invitation language,
    mental health screening considerations, therapist
    briefing, room environment (lighting, seating,
    comfort objects)
  - Trauma-informed facilitation principles (safety,
    trustworthiness, choice, collaboration,
    empowerment)
  - Opening ritual/ceremony that creates sacred
    space
  - Circle protocol with talking piece tradition
  - Structured sharing prompts that don't
    re-traumatize
  - How to hold space for: acute grief, anger,
    political statements in a healing context,
    survivor guilt, first responder trauma (often
    unacknowledged), children's grief expressed
    through parents
  - Boundary between facilitation and therapy
    (when to refer to the therapists present)
  - Closing ritual and resource distribution
  - Self-care plan for the facilitator
  - Post-circle: Follow-up resources, ongoing
    healing circle schedule, connection to long-term
    mental health services

  === WORKSHOP 3: Nonprofit Board Governance Retreat ===
  A $15M human services nonprofit has governance
  dysfunction: the founder/CEO has been in role
  for 20 years and treats the board as a rubber
  stamp, 3 new board members want real oversight,
  the board chair is the founder's college friend,
  and the organization just failed a financial audit.
  The board has hired you to facilitate a governance
  retreat.
  - Duration: 1.5 days (Friday afternoon + Saturday)
  - Participants: 12 board members + the CEO (who
    will participate in some sessions and step out
    for others)
  - Location: Board member's lake house (informal
    setting)
  - Context: If governance doesn't improve, the
    organization risks losing its largest funder
    ($4M government contract requiring governance
    standards).

  Guide must include:
  - Pre-retreat: Individual board member interviews
    (confidential), governance self-assessment tool,
    compilation of governance benchmarks
  - Governance fundamentals refresher (fiduciary,
    strategic, generative modes)
  - Board self-assessment debrief (sharing aggregated
    results without attribution)
  - Role clarity exercise: Board vs. CEO
    responsibilities (the core issue)
  - Financial oversight training tied to audit
    findings
  - Board committee structure redesign
  - CEO evaluation framework development (diplomatic
    but direct)
  - How to handle: founder defensiveness, the board
    chair's conflict of interest, new members being
    dismissed as "not understanding the culture,"
    emotional attachment to the founder's legacy,
    the power imbalance between long-tenured and
    new members
  - Governance action plan with accountability
  - Post-retreat: Board policy manual outline,
    implementation timeline, funder communication

  Task: Write complete facilitation guides for all
  three workshops.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete guides — Union-Management with interest-based bargaining, joint fact-finding, option generation, caucus management, and ratification process; Healing Circle with trauma-informed principles, circle protocol, sharing prompts, therapist coordination, and facilitator self-care; Board Retreat with governance assessment, role clarity, financial oversight training, CEO evaluation framework, and governance action plan."
    weight: 0.35
    description: "ThreeAdvancedCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery across three distinct facilitation contexts — the union-management session uses genuine interest-based bargaining methodology; the healing circle is authentically trauma-informed (not just labeled as such); the board retreat addresses governance dysfunction directly without alienating the founder; each guide shows deep expertise in its specific domain."
    weight: 0.35
    description: "CrossContextMastery"
  - type: llm_judge
    criteria: "Response would produce meaningful outcomes — the school district would find creative budget solutions without adversarial warfare; the community would begin genuine healing while respecting political diversity; the nonprofit board would establish real governance without destroying the organization; all three workshops handle extreme emotional and political complexity with facilitation skill."
    weight: 0.30
    description: "HighStakesOutcomes"
