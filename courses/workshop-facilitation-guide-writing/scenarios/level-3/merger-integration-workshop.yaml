meta:
  id: merger-integration-workshop
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a post-merger integration workshop bringing together two competing company cultures to build a unified operating model"
  tags: [merger-integration, culture-clash, operating-model, change-management, advanced]

state: {}

trigger: |
  You're an integration consultant for a $2B
  merger between two mid-size software companies.
  Company A (acquirer, 800 employees) is process-
  driven, enterprise-focused, with a formal
  hierarchy and waterfall development. Company B
  (acquired, 400 employees) is startup-cultured,
  SMB-focused, with flat structure and agile
  development. Six months post-close, integration
  is stalling — teams refuse to adopt each other's
  tools, finger-pointing is constant, and 15% of
  Company B's engineering talent has left.

  Workshop details:
  - Duration: 2 days
  - Participants: 40 people (20 from each company,
    mix of directors and senior managers from
    product, engineering, sales, operations, and HR)
  - Location: Neutral venue (neither company's
    office)
  - Political context: Company A leaders expect
    Company B to adopt their processes. Company B
    leaders feel acquired and devalued. The merged
    company CEO (from Company A) has publicly said
    "best of both" but actions favor Company A.

  Day 1 — "Seeing Each Other Clearly":
  - Opening: CEO frames the integration challenge
    honestly (30 min)
  - Culture mapping exercise (90 min): Each company
    maps their culture using a structured framework
    (values, decision-making, communication, risk
    tolerance, customer orientation)
  - Culture exchange (60 min): Mixed tables explore
    "What's valuable about their culture that we're
    at risk of losing?"
  - Lunch (60 min)
  - Integration pain points (90 min): Anonymous
    submission, themed clustering, prioritized
    discussion of the top 5 pain points
  - "Best of Both" working sessions (90 min):
    Mixed groups identify specific practices from
    each company worth preserving

  Day 2 — "Building Together":
  - Unified operating model design (120 min):
    Working groups design approaches for 4
    integration areas (product development process,
    sales and go-to-market, people processes,
    technology stack)
  - Working group presentations + challenge
    sessions (60 min)
  - Lunch (60 min)
  - Decision-making framework (60 min): Establish
    how integration decisions will be made going
    forward (who decides what, how to escalate)
  - Quick wins identification (45 min): What can
    we fix in the next 30 days?
  - Commitment wall (30 min): Each participant
    writes their personal integration commitment
  - Closing: CEO response to the workshop output
    (15 min)

  Facilitation guide must include:
  - Pre-workshop: Individual interviews revealing
    real integration frustrations, seating strategy
    (mixed company tables), CEO coaching for honest
    opening
  - Culture mapping framework and exercise design
  - Anonymous pain point submission method (digital
    or physical)
  - "Best of Both" structured exploration that
    validates Company B's contributions
  - Operating model design templates for each
    integration area
  - Decision-making framework template (RACI or
    similar, adapted for integration)
  - How to handle: "us vs. them" dynamics, Company
    A arrogance, Company B victimhood, the CEO's
    credibility gap on "best of both," grief for
    lost culture, power plays over tool/process
    decisions
  - Psychological safety for Company B participants
    who fear retaliation
  - Quick wins that demonstrate good faith
  - Post-workshop: Integration governance model,
    30/60/90 day milestones, retention risk
    monitoring

  Task: Write the complete merger integration
  workshop facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete merger integration guide — pre-workshop interviews and CEO coaching; culture mapping framework; culture exchange exercise; anonymous pain point submission; best-of-both exploration; operating model design templates for 4 areas; decision-making framework; handling us-vs-them, arrogance, victimhood, CEO credibility, grief, and power plays; psychological safety for acquired company; quick wins; integration governance and milestones."
    weight: 0.35
    description: "MergerWorkshopCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates merger integration facilitation expertise — the culture mapping reveals real differences without judgment; the exchange exercise validates Company B's culture; anonymous submission surfaces issues people wouldn't say publicly; the operating model design genuinely draws from both companies; the decision framework prevents default-to-acquirer; the facilitator manages the power asymmetry inherent in acquirer/acquired dynamics; the CEO is coached to be authentic."
    weight: 0.35
    description: "MergerIntegrationExpertise"
  - type: llm_judge
    criteria: "Response would improve the merger integration — the 40 participants would leave with reduced us-vs-them mentality; Company B employees would feel their culture is valued; specific operating model decisions would be made; the quick wins would demonstrate good faith within 30 days; talent attrition from Company B would slow; the integration would shift from stalling to progressing."
    weight: 0.30
    description: "IntegrationOutcome"
