meta:
  id: train-the-trainer-program
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a train-the-trainer facilitation guide that prepares 30 internal facilitators to deliver a standardized innovation workshop across a global company"
  tags: [train-the-trainer, internal-facilitators, scaling, standardization, advanced]

state: {}

trigger: |
  You're the head of organizational development at
  a global pharmaceutical company (15,000 employees,
  20 sites worldwide). You designed a successful
  2-day innovation workshop that has been piloted
  at HQ with great results. The CEO wants it
  delivered at all 20 sites within 6 months. You
  can't facilitate all of them yourself, so you
  need to train 30 internal facilitators (2 per
  site, with 10 backups) to deliver the workshop
  with consistent quality.

  Train-the-trainer program:
  - Duration: 3 days intensive + 2 follow-up
    virtual sessions
  - Participants: 30 internal facilitators (mix of
    HR, L&D, project managers, and high-potential
    leaders — most have limited facilitation
    experience)
  - Location: Corporate training center

  Day 1 — "Experience the Workshop":
  - Participants go through the actual 2-day
    innovation workshop in compressed form (full
    day), experiencing it as participants
  - Evening: Reflective journaling on what they
    noticed about the facilitation

  Day 2 — "Understand the Facilitation":
  - Session 1: Facilitation fundamentals (90 min):
    Presence, reading the room, time management,
    energy management, dealing with difficult
    participants
  - Session 2: The innovation workshop dissected
    (90 min): Why each activity is sequenced as
    it is, the learning theory behind the design,
    common failure points
  - Lunch
  - Session 3: Practice round 1 (120 min): Each
    participant facilitates one 15-minute segment,
    receives peer and expert feedback
  - Session 4: Adaptation guidelines (60 min):
    What can be customized vs. what must stay
    consistent across sites

  Day 3 — "Build Confidence":
  - Session 5: Practice round 2 (120 min): More
    complex segments, handling difficult moments
  - Session 6: Co-facilitation skills (60 min):
    Working in pairs, handoffs, supporting each
    other
  - Lunch
  - Session 7: Logistics and materials (60 min):
    Room setup, materials ordering, technology
    requirements, participant communication
  - Session 8: Certification assessment (60 min):
    Each pair delivers a 20-minute mock session,
    evaluated against rubric
  - Closing: Certification, buddy assignments,
    support structure

  Follow-up virtual sessions:
  - Week 4: After first delivery — debrief, share
    challenges, collective problem-solving
  - Week 8: After second delivery — refine, share
    adaptations, advanced facilitation techniques

  Facilitation guide must include:
  - The actual innovation workshop design (what
    participants will learn to deliver)
  - Detailed train-the-trainer scripts for all 3
    days
  - Facilitation fundamentals teaching module
  - Practice round structure with feedback rubric
  - Certification assessment rubric
  - Co-facilitation pairing strategy
  - Facilitator toolkit (scripts, materials list,
    room setup guide, participant handouts)
  - Adaptation guidelines (what's flexible, what's
    not, and why)
  - Quality assurance mechanism for ongoing delivery
  - How to handle: facilitators who aren't ready
    to certify, cultural adaptation across 20 sites,
    resistance from site leaders, maintaining
    quality over time
  - Virtual follow-up session agendas

  Task: Write the complete train-the-trainer
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete TtT program — the innovation workshop design; detailed 3-day scripts; facilitation fundamentals module; practice round structure with feedback rubric; certification assessment rubric; co-facilitation pairing; facilitator toolkit; adaptation guidelines; quality assurance mechanism; handling non-ready facilitators, cultural adaptation, site resistance, and quality maintenance; virtual follow-up agendas."
    weight: 0.35
    description: "TrainTheTrainerCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates train-the-trainer expertise — the experience-first approach (Day 1) builds empathy; facilitation fundamentals are taught through practice, not lecture; the practice rounds escalate in complexity; the feedback rubric develops facilitation skill, not just content delivery; the certification standard is clear and fair; the adaptation guidelines balance consistency with local relevance; the quality assurance mechanism sustains quality across 20 sites."
    weight: 0.35
    description: "TtTDesignExpertise"
  - type: llm_judge
    criteria: "Response would produce 30 capable facilitators — participants would go from limited experience to confidently delivering the innovation workshop; the certification ensures quality; the buddy system provides ongoing support; the virtual follow-ups address real challenges; the innovation workshop would be delivered consistently at all 20 sites; the company would build lasting internal facilitation capability."
    weight: 0.30
    description: "FacilitatorDevelopmentOutcome"
