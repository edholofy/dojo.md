meta:
  id: multi-stakeholder-policy-workshop
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a multi-stakeholder policy workshop bringing together government, industry, academia, and community to develop AI governance guidelines"
  tags: [multi-stakeholder, policy, ai-governance, consensus-building, advanced]

state: {}

trigger: |
  You're the lead facilitator for a state government's
  AI governance task force. The governor has mandated
  the creation of AI governance guidelines for state
  agencies within 6 months. This kickoff workshop
  brings together stakeholders who rarely agree on
  anything — and some actively distrust each other.

  Workshop details:
  - Duration: Full day (8:30 AM - 5:00 PM)
  - Participants: 35 people representing 5 sectors:
    * Government (8): State CTO, agency directors,
      procurement officers, legislators
    * Industry (7): Tech companies, AI vendors,
      consulting firms
    * Academia (6): AI researchers, ethicists,
      law professors
    * Community (8): Civil rights orgs, disability
      advocates, public defenders, labor unions
    * Media (2): Tech journalists (observing +
      limited participation)
    * Facilitation team (4): Not counted in 35

  Political dynamics:
  - Industry wants light-touch regulation
  - Community advocates want strict oversight
  - Government wants something implementable
  - Academia wants evidence-based rigor
  - Media presence makes people cautious
  - Two participants previously clashed publicly
    about facial recognition policy

  Agenda:
  1. Opening + ground rules (30 min)
  2. Landscape briefing: Current AI use in state
     agencies (30 min)
  3. Stakeholder perspectives round (45 min): Each
     sector presents their top priorities (5 min
     each + 20 min discussion)
  4. Break (15 min)
  5. Issue mapping (60 min): Identify all AI
     governance issues, cluster into themes
  6. Working groups on priority themes (75 min):
     Groups draft principle statements for each
     theme area
  7. Lunch (45 min)
  8. Working group reports + plenary discussion
     (60 min)
  9. Consensus building (45 min): Modified
     Gradients of Agreement on key principles
  10. Break (15 min)
  11. Implementation pathways (45 min): What's
      needed to turn principles into guidelines
  12. Closing: Next steps and task force structure
      (30 min)

  Facilitation guide must include:
  - Pre-workshop: Stakeholder analysis, bilateral
    pre-meetings with hostile parties, background
    packet, Chatham House Rule considerations
  - Ground rules that manage media presence and
    political dynamics
  - Stakeholder perspectives round protocol that
    prevents grandstanding
  - Issue mapping methodology for politically
    charged topics
  - Working group composition (strategic mixing
    across sectors)
  - Principle drafting template (specific enough
    to be useful, broad enough for consensus)
  - Gradients of Agreement methodology (not binary
    yes/no but spectrum of support)
  - How to handle: industry capture, community
    frustration, academic perfectionism, political
    posturing, media-conscious behavior, the two
    hostile participants
  - Facilitator neutrality when you personally
    have views on AI governance
  - Post-workshop: Proceedings document, task force
    work plan, public summary vs. internal notes

  Task: Write the complete multi-stakeholder policy
  workshop facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multi-stakeholder guide — stakeholder analysis and bilateral pre-meetings; ground rules for media and politics; stakeholder perspectives protocol; issue mapping methodology; working group composition strategy; principle drafting template; Gradients of Agreement methodology; handling industry capture, community frustration, academic perfectionism, political posturing, media dynamics, and hostile participants; facilitator neutrality; post-workshop proceedings and work plan."
    weight: 0.35
    description: "PolicyWorkshopCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multi-stakeholder facilitation expertise — the pre-work bilateral meetings defuse potential conflicts; ground rules balance transparency with productive dialogue; the stakeholder perspectives round prevents grandstanding while ensuring all voices are heard; working groups are strategically mixed to prevent sector-based silos; the Gradients of Agreement technique avoids false consensus; the facilitator manages their own biases on AI governance."
    weight: 0.35
    description: "MultiStakeholderExpertise"
  - type: llm_judge
    criteria: "Response would produce viable AI governance guidelines — the principles would reflect genuine multi-stakeholder input; industry wouldn't dominate the outcome; community concerns would be substantively addressed; the guidelines would be implementable by state agencies; the task force structure would sustain momentum after the workshop; the governor would receive a credible framework that could become policy."
    weight: 0.30
    description: "PolicyOutcome"
