meta:
  id: cross-cultural-facilitation-guide
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a cross-cultural workshop bringing together teams from Japan, Germany, Brazil, and the US to co-create a global product launch strategy"
  tags: [cross-cultural, global-teams, product-launch, cultural-intelligence, advanced]

state: {}

trigger: |
  You're the global program manager at a consumer
  electronics company launching a flagship product
  simultaneously in 4 markets (Japan, Germany,
  Brazil, US). Each regional team has developed its
  own launch plan independently, but the CEO wants
  one unified global strategy with regional
  adaptations. The problem: these teams have never
  worked together, have different working styles,
  and past "global alignment" meetings were
  dominated by the US team.

  Workshop details:
  - Duration: 2 days
  - Participants: 24 people (6 per region — product
    manager, marketing lead, sales lead, operations
    lead, creative director, country GM)
  - Location: Singapore (neutral territory)
  - Languages: English is the working language, but
    fluency varies significantly (Japan team needs
    occasional translation support)
  - Time zone consideration: All in-person, but
    jet lag affects participants differently

  Cultural dynamics to address:
  - Japan: Consensus-driven, indirect communication,
    uncomfortable with public brainstorming, prefer
    to prepare positions in advance
  - Germany: Direct communication, data-driven,
    structured process orientation, uncomfortable
    with ambiguity
  - Brazil: Relationship-first, expressive, flexible
    with time and agenda, collaborative and verbal
  - US: Fast-paced, action-oriented, comfortable
    with conflict, may inadvertently dominate

  Day 1 — "Understanding Our Markets":
  - Cross-cultural icebreaker (45 min)
  - Regional market presentations (90 min): Each
    team presents their market insights (15 min
    each + Q&A)
  - Customer persona comparison (60 min): Find
    universal vs. regional customer needs
  - Lunch (90 min — extended for relationship
    building)
  - Global brand positioning workshop (90 min):
    What's consistent across markets?
  - Evening: Cultural exchange dinner (each team
    shares a cultural tradition)

  Day 2 — "Building the Unified Strategy":
  - Mixed-region working groups (120 min): 4 groups
    tackle messaging, channel strategy, launch
    timeline, and success metrics
  - Working group presentations (60 min)
  - Lunch (60 min)
  - Regional adaptation framework (90 min): How
    each market adapts the global strategy
  - Commitment and governance (45 min): Decision
    rights, escalation paths, communication cadence
  - Closing (30 min)

  Facilitation guide must include:
  - Pre-workshop: Cultural briefing for facilitator,
    pre-work for each regional team, translation
    support arrangements, seating strategy
  - Cross-cultural icebreaker that doesn't
    embarrass introverted cultures
  - Facilitation techniques adapted for each
    culture's communication style (silent
    brainstorming for Japan, structured data for
    Germany, verbal processing for Brazil, action
    focus for US)
  - How to ensure equal airtime across cultures
  - Mixed-region group facilitation (preventing
    US/Brazil domination of discussions)
  - How to handle: language barriers, cultural
    misunderstandings, the Japan team appearing
    to agree but not committing, the Germany team
    requesting more data than available, the Brazil
    team's fluid relationship with the agenda
  - Decision-making methodology that respects
    consensus cultures and decisive cultures
  - Regional adaptation framework template
  - Post-workshop: Follow-up adapted to each
    culture's working rhythm, governance model

  Task: Write the complete cross-cultural workshop
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete cross-cultural guide — cultural briefing and pre-work; adapted icebreaker; facilitation techniques for each culture's style; equal airtime strategies; mixed-group facilitation; handling language barriers, cultural misunderstandings, false agreement, data demands, and agenda fluidity; cross-cultural decision-making methodology; regional adaptation template; culture-specific follow-up."
    weight: 0.35
    description: "CrossCulturalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates cross-cultural facilitation expertise — the cultural dynamics are nuanced (not stereotypical); facilitation techniques genuinely adapt to different communication styles; silent brainstorming creates space for Japanese participants; the extended lunch serves a purpose; the decision-making method bridges consensus and decisive cultures; the facilitator manages power dynamics between dominant and non-dominant cultures; language support is practical and dignified."
    weight: 0.35
    description: "CulturalIntelligenceExpertise"
  - type: llm_judge
    criteria: "Response would produce a viable global launch strategy — all 4 regional teams would feel their market needs are reflected; the unified strategy would have genuine global coherence; the regional adaptations would be substantive, not just translation; the governance model would prevent the US team from overriding others post-workshop; the product launch would be stronger because of the cross-cultural collaboration."
    weight: 0.30
    description: "GlobalStrategyOutcome"
