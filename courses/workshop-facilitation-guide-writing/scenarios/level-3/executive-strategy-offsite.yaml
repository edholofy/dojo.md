meta:
  id: executive-strategy-offsite
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 3-day C-suite strategy offsite navigating a pivot from hardware to SaaS, managing ego dynamics and board pressure"
  tags: [executive, strategy, c-suite, pivot, advanced]

state: {}

trigger: |
  You're a senior strategy facilitator hired by
  the board of a $500M industrial equipment company.
  The board has mandated a pivot from one-time
  hardware sales to a SaaS-enabled IoT model
  (equipment-as-a-service). The 8-person C-suite is
  divided: CEO and CTO are enthusiastic, CFO is
  concerned about 3-year revenue dip, COO fears
  operational chaos, CMO sees opportunity, CHRO
  worries about layoffs, and the two divisional
  presidents see it as an existential threat to
  their P&Ls.

  Offsite details:
  - Duration: 3 days (Thursday-Saturday)
  - Participants: 8 C-suite executives + board
    observer (non-participating)
  - Location: Mountain resort (deliberately away
    from office)
  - Stakes: Board will review the output Monday
    and decide whether to fund the pivot ($50M
    investment)

  Day 1 — "Understanding Reality":
  - Arrival dinner (informal, no agenda)
  - Session 1: Market forces briefing from external
    expert (60 min)
  - Session 2: Competitor landscape and customer
    interviews playback (60 min)
  - Session 3: Financial modeling scenarios —
    status quo vs. pivot (90 min)
  - Session 4: "What are we really afraid of?"
    Honest conversation about fears (60 min)
  - Working dinner with scenario discussions

  Day 2 — "Designing the Future":
  - Session 5: Vision and strategic intent — what
    does the SaaS company look like in 5 years?
    (90 min)
  - Session 6: Business model canvas workshop (90 min)
  - Lunch
  - Session 7: Organizational implications — what
    changes in structure, talent, culture? (90 min)
  - Session 8: Risk mitigation — addressing each
    executive's specific concerns (60 min)
  - Free afternoon (golf, hikes — informal
    processing time)
  - Dinner: Guest speaker (CEO who successfully
    pivoted a similar company)

  Day 3 — "Committing to Action":
  - Session 9: 18-month implementation roadmap
    co-creation (120 min)
  - Session 10: Governance and decision rights for
    the pivot (60 min)
  - Session 11: Board presentation dry run (60 min)
  - Session 12: Personal commitments — "What I will
    champion, what I need support on" (45 min)
  - Closing: Alignment check and next steps (30 min)

  Facilitation guide must include:
  - Pre-offsite: Individual 1:1 interviews with
    each executive (interview guide), board chair
    briefing, pre-read materials
  - Managing the board observer dynamic (present
    but not participating — how this changes behavior)
  - Facilitator scripts for each of the 12 sessions
  - Financial modeling workshop methodology
    (not just presenting numbers — co-creating
    scenarios)
  - How to surface and address the "fears"
    conversation authentically at this level
  - Business model canvas adaptation for B2B
    hardware-to-SaaS pivot
  - Organizational design exercise for C-suite
  - How to handle: dominant CEO, defensive
    divisional presidents, the CFO's legitimate
    financial concerns, the CHRO's workforce
    concerns, and the board observer's chilling
    effect
  - Alignment checkpoint methodology (not false
    consensus)
  - Board presentation template and coaching guide
  - Post-offsite: Monday board meeting preparation,
    communication plan for the organization

  Task: Write the complete executive strategy offsite
  facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete executive offsite guide — pre-offsite 1:1 interview guide; board observer management; scripts for all 12 sessions across 3 days; financial modeling methodology; fears conversation facilitation; business model canvas adaptation; organizational design exercise; handling dominant CEO, defensive presidents, CFO concerns, CHRO workforce concerns, and board observer chilling effect; alignment checkpoint; board presentation template; post-offsite preparation."
    weight: 0.35
    description: "ExecutiveOffsiteCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates executive facilitation expertise — the pre-work 1:1 interviews reveal the real dynamics; the 3-day arc moves from understanding through design to commitment; the fears conversation is handled with the sophistication required at C-suite level; the financial modeling is collaborative not presentational; the business model canvas is adapted for hardware-to-SaaS specifically; the alignment checkpoint detects false consensus; the facilitator manages ego dynamics skillfully."
    weight: 0.35
    description: "ExecutiveFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would produce a fundable pivot plan — the board would receive a compelling, unified strategy presentation Monday; all 8 executives would be genuinely aligned (not just acquiescing); the 18-month roadmap would be realistic; the risk mitigation plan would address the CFO's and CHRO's concerns; the divisional presidents would see their role in the new structure; the $50M investment would be approved because the plan is credible."
    weight: 0.30
    description: "StrategyPivotOutcome"
