meta:
  id: large-scale-transformation-workshop
  level: 3
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write a facilitation guide for a 200-person organizational transformation workshop using a whole-system-in-the-room approach for a company restructuring"
  tags: [large-scale, transformation, restructuring, whole-system, advanced]

state: {}

trigger: |
  You're the lead facilitator for a Fortune 500
  manufacturing company undergoing a major
  restructuring. The company is shifting from a
  regional structure (4 regions, each a mini-company)
  to a functional structure (global operations,
  global sales, global R&D, global supply chain).
  This affects reporting lines, office locations,
  and team compositions for 3,000 employees. The
  CEO wants the top 200 leaders to co-create the
  implementation plan rather than having it imposed.

  Workshop details:
  - Duration: 2 full days
  - Participants: 200 leaders (VPs, directors,
    senior managers from all 4 regions)
  - Location: Hotel ballroom with 25 round tables
    (8 per table)
  - Context: Announcement was made 3 weeks ago.
    Anxiety is high. Some attendees will lose
    authority in the new structure. Regional VPs
    are particularly threatened.

  Day 1 agenda:
  - Opening: CEO presents the "why" (45 min)
  - Current state mapping (90 min): Tables map
    their region's strengths, challenges, and
    cross-regional pain points
  - Gallery walk + theme synthesis (45 min)
  - Lunch (75 min)
  - Future state design (90 min): Mixed-region
    tables design how functional teams will work
    across geographies
  - Leadership implications panel (45 min): 4
    new functional leaders take questions from floor

  Day 2 agenda:
  - Energizer + Day 1 recap (30 min)
  - Implementation planning (120 min): Self-
    selected working groups tackle transition
    workstreams (talent mapping, knowledge transfer,
    governance, communication, quick wins)
  - Working group presentations (60 min)
  - Lunch (60 min)
  - Commitment ceremony (45 min): Each table writes
    a letter to their teams about what they'll do
    differently starting Monday
  - CEO closing + Q&A (45 min)

  Facilitation guide must include:
  - Pre-workshop: Stakeholder interviews, table
    assignments (strategic mixing), pre-read
    materials, facilitator team briefing (you'll
    need 8 table facilitators)
  - Room layout for 200 people (tables, AV, gallery
    walk walls, breakout spaces)
  - Facilitation team structure (lead + 8 table
    facilitators + 2 producers)
  - Detailed facilitator scripts for all sessions
  - Table activity instructions for each segment
  - Large group synthesis techniques (how to harvest
    insights from 25 tables)
  - How to handle: regional VPs sabotaging, grief
    about the old structure, political maneuvering,
    dominant voices, cross-cultural communication
    (4 regions = 4 cultures)
  - Real-time adaptation plan (what if Day 1
    reveals the design is flawed?)
  - Technology requirements (polling, digital
    capture, live dashboards)
  - Post-workshop: 30/60/90 day follow-up,
    communication cascade to 3,000 employees

  Task: Write the complete large-scale transformation
  workshop facilitation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete large-scale guide — pre-workshop stakeholder work and table assignments; room layout for 200; facilitation team structure with roles; detailed scripts for all Day 1 and Day 2 sessions; table activity instructions; large-group synthesis techniques; handling sabotage, grief, politics, dominant voices, and cross-cultural issues; real-time adaptation plan; technology requirements; post-workshop 30/60/90 day cascade."
    weight: 0.35
    description: "LargeScaleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates large-scale facilitation expertise — the whole-system approach genuinely includes diverse voices; table mixing strategy creates productive tension without conflict; synthesis techniques actually work at scale (25 tables); the facilitation team model distributes leadership; real-time adaptation doesn't derail the agenda; the commitment ceremony creates genuine accountability; the approach handles the political complexity of restructuring."
    weight: 0.35
    description: "LargeScaleExpertise"
  - type: llm_judge
    criteria: "Response would produce a successful restructuring launch — 200 leaders would leave aligned on the path forward; implementation workstreams would have owners and plans; the communication cascade would reach 3,000 employees authentically; regional VPs would shift from resistance to ownership; the restructuring would succeed because people co-created the plan; the workshop would be cited as a model for large-scale change."
    weight: 0.30
    description: "TransformationOutcome"
