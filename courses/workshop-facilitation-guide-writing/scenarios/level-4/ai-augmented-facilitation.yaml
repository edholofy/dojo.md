meta:
  id: ai-augmented-facilitation
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a facilitation guide for AI-augmented workshops where AI tools assist with real-time synthesis, idea generation, and decision support during facilitated sessions"
  tags: [ai-augmented, technology-enhanced, real-time-synthesis, future-of-facilitation, expert]

state: {}

trigger: |
  You're the innovation lead at a facilitation
  consulting firm. Clients are asking: "How can AI
  make our workshops more productive?" You need to
  design a comprehensive framework for AI-augmented
  facilitation — not AI replacing the facilitator,
  but AI as a powerful co-pilot during live
  workshops.

  Design the complete AI-Augmented Facilitation
  Framework:

  1. AI-Augmented Workshop Design Guide
  - Where AI adds value in the facilitation cycle:
    * Pre-workshop: AI-assisted stakeholder analysis,
      agenda optimization, participant profiling,
      pre-read synthesis
    * During workshop: Real-time transcription and
      theme extraction, sentiment monitoring, idea
      clustering and gap identification, decision
      support (surfacing relevant data), meeting
      energy tracking
    * Post-workshop: Automated summary generation,
      action item extraction, theme analysis across
      multiple workshops, personalized follow-up
  - Where AI should NOT be used (and why): emotional
    facilitation, conflict mediation, reading
    non-verbal cues, building trust, managing power
    dynamics

  2. Three Complete AI-Augmented Workshop Designs
  Design A — "AI-Enhanced Strategy Workshop" (1 day):
  - AI pre-analyzes market data and surfaces trends
  - During: AI clusters brainstormed ideas in real
    time, identifies gaps, suggests analogies from
    other industries
  - Post: AI generates strategy document draft from
    workshop output

  Design B — "AI-Assisted Innovation Sprint" (2 days):
  - AI generates initial "How Might We" prompts
    from customer feedback data
  - During: AI evaluates concepts against feasibility
    criteria, surfaces relevant patents/prior art,
    suggests unexpected combinations
  - Post: AI creates concept sheets with market
    sizing estimates

  Design C — "AI-Supported Retrospective at Scale"
  (2 hours, 100 participants):
  - AI pre-analyzes engagement surveys and project
    data
  - During: AI processes 100 simultaneous inputs,
    identifies themes across breakout groups in
    real time, surfaces contradictions and blind
    spots
  - Post: AI generates improvement recommendations
    with priority ranking

  3. Technology Architecture
  - AI tool stack recommendation (LLMs, real-time
    transcription, sentiment analysis, visualization)
  - Integration with collaboration tools (Miro,
    Mural, Zoom, Teams)
  - Data privacy and consent framework (participant
    data, recording consent, data retention)
  - Fallback procedures when AI tools fail

  4. Facilitator Training for AI-Augmented Sessions
  - New competencies facilitators need (prompt
    engineering, AI output interpretation, managing
    participant trust in AI)
  - How to introduce AI tools to skeptical
    participants
  - Ethics of AI-augmented facilitation (bias in
    AI outputs, over-reliance, transparency)
  - Practice scenarios for facilitators learning
    the tools

  5. Client Communication
  - How to propose AI-augmented workshops to clients
  - Addressing concerns about privacy, recording,
    and AI bias
  - Pricing model for AI-augmented vs. traditional
  - Case studies demonstrating value (with metrics)

  Task: Write the complete AI-Augmented Facilitation
  Framework with all workshop designs, technology
  architecture, training materials, and client
  communication.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete AI-augmented framework — design guide with pre/during/post AI applications and clear boundaries; 3 complete AI-augmented workshop designs (strategy, innovation, retrospective); technology architecture with tool stack, integrations, privacy framework, and fallbacks; facilitator training with new competencies, participant introduction, ethics, and practice scenarios; client communication with proposal approach, concern management, pricing, and case studies."
    weight: 0.35
    description: "AIAugmentedCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise in both AI and facilitation — the AI applications are technically feasible with current tools; the boundaries between AI and human facilitation are thoughtfully drawn; the 3 workshop designs genuinely leverage AI for better outcomes (not just novelty); the privacy framework addresses real concerns; the facilitator training builds genuine competency; the ethics section addresses AI bias, over-reliance, and transparency substantively."
    weight: 0.35
    description: "AIFacilitationExpertise"
  - type: llm_judge
    criteria: "Response would position the firm as an AI-augmented facilitation leader — clients would see clear value over traditional workshops; the framework would be implementable with existing AI tools; participant trust would be maintained; workshop outcomes would measurably improve; the firm would attract clients specifically for AI-augmented facilitation; the approach would be responsible and sustainable, not just hype."
    weight: 0.30
    description: "AIFacilitationOutcome"
