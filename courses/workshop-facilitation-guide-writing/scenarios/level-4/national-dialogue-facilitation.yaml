meta:
  id: national-dialogue-facilitation
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design and write a facilitation guide for a national dialogue on education reform, with 500+ simultaneous community conversations feeding into a national synthesis"
  tags: [national-dialogue, education-reform, large-scale-deliberation, civic-engagement, expert]

state: {}

trigger: |
  You're the lead design facilitator for a national
  nonprofit that has been contracted by the
  Department of Education to run "The Great
  Conversation" — a national dialogue on education
  reform. The goal is 500+ simultaneous community
  conversations across all 50 states in a single
  month, with results synthesized into a report
  for the Secretary of Education.

  Program design requirements:

  1. Conversation Design (what happens in each
     community dialogue)
  - Duration: 3 hours per conversation
  - Participants: 20-30 community members per
    conversation (parents, teachers, students,
    administrators, business leaders, community
    members)
  - Topics: 4 key questions on education reform
    * "What does a great education look like in
      2030?"
    * "What's working well that we should protect?"
    * "What's not working and why?"
    * "What bold changes would you support?"
  - Format must be replicable by volunteer
    facilitators with minimal training

  2. Facilitator Recruitment and Training
  - Recruit 750 volunteer facilitators (500 primary
    + 250 backup) across all 50 states
  - Design a self-paced online training (2 hours)
    + a live virtual practice session (1 hour)
  - Create facilitator guide that anyone with basic
    meeting skills can follow
  - Quality control: how to ensure consistency
    across 500 conversations with volunteer
    facilitators

  3. Data Collection and Synthesis
  - Design the data capture method (how each
    conversation's output is documented)
  - Create the coding framework for qualitative
    analysis of 500+ conversation reports
  - Design the synthesis methodology (how 500
    conversations become one coherent report)
  - Dashboard design for real-time tracking of
    conversations and themes
  - Statistical representation: ensuring the
    conversations collectively represent America's
    demographic diversity

  4. Logistics and Technology
  - Venue sourcing guidance for local organizers
  - Materials kit (what each conversation needs)
  - Digital platform for reporting and real-time
    aggregation
  - Communication campaign to recruit participants
  - Accessibility: language access, disability
    accommodations, rural vs. urban considerations

  5. The Report
  - Outline the national synthesis report structure
  - Design the "Community Voice" presentation
    approach (not just statistics — authentic
    community voices)
  - Create the Secretary of Education briefing
    format

  Task: Write the complete national dialogue design
  and facilitation guide, including conversation
  design, facilitator training, data methodology,
  logistics, and report framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete national dialogue design — replicable 3-hour conversation design with 4 questions; facilitator recruitment strategy for 750 volunteers across 50 states; online training and virtual practice session; facilitator guide for volunteer facilitators; quality control mechanism; data capture method and coding framework; synthesis methodology for 500+ conversations; tracking dashboard; demographic representation plan; logistics and materials kit; communication campaign; accessibility plan; report outline and Secretary briefing format."
    weight: 0.35
    description: "NationalDialogueCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates large-scale deliberation expertise — the conversation design is truly replicable by volunteers; the training prepares facilitators without overwhelming them; the data collection captures nuance, not just tallies; the synthesis methodology preserves community voices while identifying themes; demographic representation is intentionally designed; the quality control maintains consistency without rigidity; the report balances authentic voices with actionable policy insights."
    weight: 0.35
    description: "LargeScaleDeliberationExpertise"
  - type: llm_judge
    criteria: "Response would produce a credible national dialogue — 500+ conversations would actually happen with diverse participation; volunteer facilitators would deliver quality conversations; the synthesis would authentically represent community input; the Secretary of Education would receive actionable insights; participants would feel their voices matter; the dialogue would be seen as legitimate democratic engagement, not performative consultation."
    weight: 0.30
    description: "CivicEngagementOutcome"
