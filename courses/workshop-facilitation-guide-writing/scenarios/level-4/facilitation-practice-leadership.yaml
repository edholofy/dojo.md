meta:
  id: facilitation-practice-leadership
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Build and lead an internal facilitation practice at a Fortune 500 company — standards, certification, quality assurance, and community of practice for 50 facilitators"
  tags: [practice-leadership, facilitation-standards, certification, community-of-practice, expert]

state: {}

trigger: |
  You've been hired as the first Director of
  Facilitation Practice at a Fortune 500 financial
  services company (45,000 employees, 30 offices
  globally). Currently, workshops are facilitated
  ad hoc by anyone who volunteers — quality varies
  wildly, some "facilitators" just lecture, and
  there's no shared methodology. The CHRO wants
  you to build a professional facilitation practice
  from scratch: identify and develop 50 internal
  facilitators, create standards, establish a
  certification program, and build a sustainable
  community of practice.

  Your mandate:
  1. Facilitation Standards Framework
     - Define facilitation competencies (knowledge,
       skills, behaviors) at 3 levels (foundational,
       advanced, master)
     - Create facilitation guide templates and
       quality standards
     - Establish methodology guidelines (when to use
       which facilitation approach)
     - Define ethical guidelines for internal
       facilitators
     - Create a facilitation request and intake
       process

  2. Certification Program Design
     - 3-tier certification (foundational, advanced,
       master) with clear criteria for each
     - Assessment methods: portfolio, observed
       facilitation, peer review, participant feedback
     - Recertification requirements (annual)
     - Certification panel composition and processes
     - How to handle the 20+ existing "facilitators"
       who may not meet the new standards

  3. Facilitator Development Curriculum
     - Foundational training (3 days)
     - Advanced training (2 days + practicum)
     - Master facilitator development (mentorship +
       complex engagements)
     - Ongoing skill development workshops (monthly)
     - Facilitation supervision model (like clinical
       supervision for therapists)

  4. Community of Practice
     - Monthly gatherings structure and programming
     - Peer learning circles
     - Case consultation process (facilitators
       helping each other with tricky situations)
     - Facilitation resource library (guides, tools,
       templates)
     - Annual facilitation conference (internal)
     - Recognition and celebration mechanisms

  5. Quality Assurance
     - Post-workshop evaluation framework
     - Observation and feedback process
     - Continuous improvement methodology
     - Client satisfaction measurement
     - Annual practice health assessment

  6. Business Case and Metrics
     - ROI model for the facilitation practice
     - Key performance indicators
     - Quarterly reporting template
     - Executive stakeholder communication plan

  Task: Write the complete facilitation practice
  design document including all frameworks,
  curricula, certification criteria, and operating
  model.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete practice design — competency framework at 3 levels; facilitation guide templates and quality standards; methodology guidelines; ethical guidelines; intake process; 3-tier certification with assessment methods and recertification; development curriculum for all 3 tiers; facilitation supervision model; CoP structure with monthly gatherings, peer circles, case consultation, resource library, conference, and recognition; QA framework; ROI model and KPIs."
    weight: 0.35
    description: "PracticeDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation practice leadership expertise — the competency framework reflects real facilitation mastery; certification criteria are rigorous but achievable; the supervision model adapts clinical supervision for facilitation; the CoP design sustains engagement over time; the strategy for existing facilitators is diplomatic yet maintains standards; the methodology guidelines help facilitators choose the right approach; the business case is compelling for financial services leadership."
    weight: 0.35
    description: "PracticeLeadershipExpertise"
  - type: llm_judge
    criteria: "Response would build a world-class facilitation practice — 50 facilitators would develop genuine mastery over time; workshop quality would measurably improve; the practice would become a competitive advantage; the certification would be meaningful, not bureaucratic; the CoP would be a vibrant learning community; the CHRO would see clear ROI; the practice would be self-sustaining and continuously improving."
    weight: 0.30
    description: "PracticeBuildingOutcome"
