meta:
  id: enterprise-workshop-platform
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a comprehensive enterprise workshop platform — standardized templates, digital tools, analytics, and governance for scaling facilitation across a global organization"
  tags: [enterprise-platform, digital-tools, analytics, governance, expert]

state: {}

trigger: |
  You're the VP of Organizational Effectiveness at
  a global consulting firm (12,000 consultants, 40
  offices, 25 countries). Consultants facilitate
  thousands of client workshops annually, but there's
  no standardized approach — each office has its own
  templates, tools, and quality standards. The CEO
  wants a unified "Workshop Excellence Platform"
  that maintains quality while allowing regional
  adaptation.

  Design the complete platform:

  1. Workshop Template Library (20+ templates)
     - Categorized by purpose: strategy, innovation,
       problem-solving, team development, change
       management, decision-making
     - Each template includes: facilitator guide,
       participant workbook, digital collaboration
       board, evaluation form
     - 3 complexity levels per category (half-day,
       full-day, multi-day)
     - Regional adaptation guidelines for each
       template
     - Write 3 complete templates as examples (one
       per complexity level)

  2. Digital Facilitation Toolkit
     - Pre-workshop: Intake form, stakeholder
       analysis tool, design canvas, logistics
       checklist, participant communication templates
     - During workshop: Digital facilitation
       dashboard (timer, agenda tracker, energy
       pulse, parking lot), collaboration tool
       integrations (Miro, Mural, Mentimeter),
       real-time documentation templates
     - Post-workshop: Evaluation survey, output
       compilation template, client report template,
       follow-up action tracker
     - Specify technology requirements and
       integrations

  3. Workshop Analytics Framework
     - Participant satisfaction metrics (NPS,
       specific dimensions)
     - Facilitator effectiveness metrics
     - Business impact metrics (how to connect
       workshops to client outcomes)
     - Quality dashboard design (what metrics to
       display, for whom)
     - Quarterly and annual reporting templates
     - Benchmarking methodology (comparing across
       offices and regions)

  4. Governance Model
     - Workshop design review process (who approves
       new or modified templates)
     - Quality assurance audits (how, how often,
       by whom)
     - Client escalation process (when a workshop
       goes wrong)
     - IP management (who owns workshop designs)
     - Pricing model for workshop facilitation
       services
     - Compliance and risk management (client data,
       participant privacy, cultural sensitivity)

  5. Change Management Plan
     - Stakeholder analysis for the 40-office rollout
     - Pilot strategy (which offices first, success
       criteria)
     - Training plan for 12,000 consultants
     - Communication campaign
     - Resistance management (offices with strong
       existing practices)
     - 18-month implementation timeline

  Task: Write the complete Workshop Excellence
  Platform design document.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete platform design — template library with categorization, 3 complete example templates, and adaptation guidelines; digital toolkit for pre/during/post with technology specifications; analytics framework with satisfaction, effectiveness, impact metrics, dashboard design, and benchmarking; governance with design review, QA audits, escalation, IP, pricing, and compliance; change management with stakeholder analysis, pilot, training, communication, resistance, and timeline."
    weight: 0.35
    description: "PlatformDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise facilitation platform expertise — the template library balances standardization with flexibility; the 3 example templates are genuinely usable; the digital toolkit integrates modern collaboration tools; the analytics framework connects workshop quality to business outcomes; the governance model maintains quality without creating bureaucracy; the change management plan accounts for regional resistance and existing strong practices."
    weight: 0.35
    description: "EnterprisePlatformExpertise"
  - type: llm_judge
    criteria: "Response would produce a viable enterprise platform — 12,000 consultants could adopt it progressively; workshop quality would measurably improve across 40 offices; regional adaptation would be possible without undermining consistency; the analytics would demonstrate ROI to clients; the governance would sustain quality over time; the firm would gain a competitive advantage in facilitation capability."
    weight: 0.30
    description: "PlatformViabilityOutcome"
