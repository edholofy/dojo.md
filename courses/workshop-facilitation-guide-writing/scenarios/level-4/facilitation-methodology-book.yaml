meta:
  id: facilitation-methodology-book
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Write the proposal and key chapters for a facilitation methodology book that codifies your unique approach into a teachable framework"
  tags: [methodology-book, thought-leadership, framework-design, publishing, expert]

state: {}

trigger: |
  You're a master facilitator with 20 years of
  experience. You've developed a distinctive
  facilitation methodology called "Emergent
  Facilitation" — an approach that integrates
  complexity science, embodied cognition, and
  participatory design. Your publisher (Berrett-
  Koehler) has offered a book contract based on
  a detailed proposal. You need to write the
  proposal and two complete sample chapters.

  Your methodology — Emergent Facilitation — is
  built on 5 principles:
  1. "The Room is the Teacher": Collective
     intelligence exceeds individual expertise.
     The facilitator's job is to create conditions
     for collective intelligence to emerge, not to
     extract it.
  2. "Follow the Energy": Groups have natural
     energy patterns. Effective facilitation reads
     and follows these patterns rather than imposing
     a rigid agenda.
  3. "Hold the Tension": The most productive moments
     happen in the creative tension between opposing
     views. Don't resolve tension prematurely.
  4. "Make the Invisible Visible": Groups have
     hidden dynamics (power, emotion, assumptions).
     Surface these gently but directly.
  5. "Design for Emergence": Structure the
     container but not the content. The best
     outcomes are ones no one predicted.

  Book proposal must include:
  - Title and subtitle
  - Author positioning (why you, why now)
  - Market analysis (competing books, gap in
    market)
  - Target audience (primary and secondary)
  - Book overview (250 words)
  - Chapter-by-chapter outline (12 chapters) with
    2-3 sentence descriptions
  - Marketing and platform information
  - Comparable titles analysis

  Sample Chapter 1 — "The Architecture of
  Emergence" (Introduction/Framework chapter):
  - Explain the 5 principles with origin stories
  - Position Emergent Facilitation against
    traditional facilitation approaches
  - Include 2-3 case studies from your practice
  - Provide the theoretical foundations (complexity
    science, embodied cognition, participatory
    design) accessibly
  - End with a self-assessment: "Where are you on
    the emergence spectrum?"

  Sample Chapter 7 — "When Everything Falls Apart:
  Facilitating in Crisis" (Applied chapter):
  - When the agenda collapses, the group is in
    conflict, or emotions overwhelm the process
  - The Emergent Facilitation approach to crisis
    moments
  - 4-5 detailed case studies of crisis facilitation
  - Practical tools and techniques for each type
    of crisis
  - The facilitator's inner game during crisis
    (managing your own nervous system)
  - Practice exercises for building crisis
    facilitation capacity

  Task: Write the complete book proposal and both
  full sample chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal and chapters — proposal with title, positioning, market analysis, audience, overview, 12-chapter outline, marketing info, and comparable titles; Chapter 1 with 5 principles explained through origin stories, positioning against traditional approaches, 2-3 case studies, theoretical foundations, and self-assessment; Chapter 7 with crisis types, Emergent Facilitation approach, 4-5 case studies, practical tools, inner game guidance, and practice exercises."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation thought leadership — the Emergent Facilitation methodology is coherent, distinctive, and genuinely builds on complexity science; the 5 principles are interconnected, not just a list; the case studies illustrate the methodology in action convincingly; the theoretical foundations are rigorous but accessible; the positioning against traditional facilitation is fair and compelling; the voice is that of a practitioner, not just a theorist."
    weight: 0.35
    description: "ThoughtLeadershipExpertise"
  - type: llm_judge
    criteria: "Response would produce a publishable facilitation book — Berrett-Koehler would approve the proposal; practitioners would find the methodology practical and transformative; the sample chapters demonstrate the quality and voice of the full book; the market positioning is realistic; the book would advance the facilitation field; readers would immediately apply the 5 principles to their practice."
    weight: 0.30
    description: "PublishingOutcome"
