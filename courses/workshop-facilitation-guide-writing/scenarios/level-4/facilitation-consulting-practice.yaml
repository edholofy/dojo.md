meta:
  id: facilitation-consulting-practice
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Build a facilitation consulting practice from scratch — service offerings, pricing, proposals, client management, and business development for an independent facilitator"
  tags: [consulting-practice, business-development, pricing, proposals, expert]

state: {}

trigger: |
  You're a highly experienced facilitator (15+
  years in corporate and nonprofit settings) who
  just left a large consulting firm to start your
  own facilitation consulting practice. You need
  to build everything from scratch: service
  offerings, pricing model, proposal templates,
  client management systems, and business
  development strategy.

  Practice design requirements:

  1. Service Portfolio
  - Define 5-7 distinct service offerings, each
    with:
    * Service description and deliverables
    * Target client profile
    * Typical engagement scope and duration
    * Pricing model (day rate, project fee, retainer)
    * Sample facilitation guide excerpt showing
      your approach
  - Services should span: strategic facilitation,
    team development, change management, innovation,
    conflict resolution, and executive coaching
    through facilitation

  2. Proposal System
  - Write 3 complete sample proposals for different
    service types:
    * Proposal A: 2-day strategic planning retreat
      for a 50-person nonprofit board and staff
    * Proposal B: 6-month team development program
      for a Fortune 500 division (200 people)
    * Proposal C: Post-merger culture integration
      for a PE-backed roll-up (3 acquired companies)
  - Each proposal includes: understanding of needs,
    proposed approach, agenda outline, facilitator
    qualifications, deliverables, timeline, pricing,
    terms and conditions

  3. Pricing Strategy
  - Day rate vs. project fee analysis for each
    service type
  - Value-based pricing methodology
  - How to handle: scope creep, client price
    pushback, nonprofit discounts, long-term
    retainer arrangements
  - Revenue model and financial projections
    (Year 1-3)

  4. Client Management
  - Client intake process (discovery call script,
    needs assessment questionnaire)
  - Engagement management workflow (from inquiry
    to final deliverable)
  - Client feedback and relationship management
  - How to fire a client (when and how)
  - Case study development process (turning
    engagements into marketing)

  5. Business Development
  - Marketing strategy for a solo facilitator
  - Content marketing plan (what to write, where)
  - Speaking and thought leadership strategy
  - Referral network building
  - LinkedIn and professional presence strategy
  - Partnership opportunities (consulting firms,
    coaching practices, L&D companies)

  6. Operations
  - Legal considerations (contracts, liability
    insurance, LLC vs. S-Corp)
  - Technology stack for a solo consulting practice
  - Subcontractor strategy (when to bring in
    associates)
  - Professional development plan (maintaining
    your own facilitation edge)

  Task: Write the complete practice design document
  with all service offerings, proposals, pricing,
  and business systems.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete practice design — 5-7 service offerings with descriptions, pricing, and sample guide excerpts; 3 complete proposals (nonprofit retreat, Fortune 500 program, post-merger integration); pricing strategy with day rate analysis, value-based methodology, and 3-year projections; client intake process and management workflow; business development strategy with marketing, content, speaking, referral, and LinkedIn plans; operations with legal, technology, and subcontractor strategy."
    weight: 0.35
    description: "PracticeDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation business expertise — service offerings are clearly differentiated and market-relevant; proposals are professional and persuasive; pricing reflects the value facilitation delivers; the business development strategy is realistic for a solo practitioner; the client management process prevents scope creep and manages relationships; the 3-year projections are financially sound; the subcontractor strategy enables scaling."
    weight: 0.35
    description: "ConsultingBusinessExpertise"
  - type: llm_judge
    criteria: "Response would build a viable facilitation practice — a facilitator could follow this blueprint to launch and grow; the service portfolio would attract diverse clients; the proposals would win business; the pricing would be sustainable; the marketing would generate leads; the practice would grow from solo to small firm within 3 years; the facilitator would maintain professional growth while building a business."
    weight: 0.30
    description: "PracticeViabilityOutcome"
