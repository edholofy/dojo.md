meta:
  id: facilitation-ethics-framework
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Develop a comprehensive facilitation ethics framework addressing power dynamics, consent, emotional safety, and facilitator accountability"
  tags: [ethics-framework, power-dynamics, consent, emotional-safety, expert]

state: {}

trigger: |
  You're the ethics committee chair for the
  International Association of Facilitators (IAF).
  A series of incidents has prompted an urgent
  review of facilitation ethics:
  - A corporate facilitator used emotionally
    manipulative techniques to push participants
    toward a CEO's preferred decision
  - A DEI facilitator's "privilege walk" exercise
    caused lasting harm to a participant who later
    filed a lawsuit
  - A team-building facilitator disclosed personal
    information shared in a "trust circle" to the
    hiring manager
  - An innovation facilitator claimed intellectual
    property rights over ideas generated in a
    client workshop
  - A community facilitator was later revealed to
    have financial ties to a developer whose project
    was the topic of the facilitated dialogue

  The IAF board has asked you to develop a
  comprehensive ethics framework that goes beyond
  the current brief code of ethics.

  Framework requirements:

  1. Ethical Principles (expanded from current IAF)
  - Informed consent in facilitated sessions (what
    participants should know before, during, and
    after)
  - Power dynamics management (facilitator power,
    client power over participants, organizational
    hierarchy)
  - Emotional safety and duty of care (what
    facilitators owe participants)
  - Confidentiality (what is shared, with whom,
    under what circumstances)
  - Intellectual property (who owns workshop
    outputs)
  - Conflicts of interest (financial, personal,
    ideological)
  - Cultural competence and harm (avoiding
    culturally harmful practices)
  - Scope of practice (where facilitation ends
    and therapy/consulting/advocacy begins)

  2. Decision-Making Framework
  - Ethical decision-making model for facilitators
    facing dilemmas
  - 10 detailed ethical dilemma scenarios with
    analysis
  - Stakeholder impact assessment template
  - "Red lines" — what a facilitator should never do

  3. Case Analysis Standards
  - Analyze each of the 5 incidents described above:
    What went wrong? Which principles were violated?
    What should have happened? What are the
    consequences?
  - Systemic factors that enabled each incident

  4. Implementation Mechanisms
  - Ethics training curriculum for IAF members
  - Ethics review board structure and processes
  - Complaint and investigation procedures
  - Sanctions and remediation options
  - Whistleblower protections
  - Annual ethics self-assessment for facilitators

  5. Practical Tools
  - Pre-engagement ethics checklist
  - Participant consent template
  - Confidentiality agreement template
  - Power dynamics assessment tool
  - Post-workshop ethical reflection guide

  Task: Write the complete facilitation ethics
  framework with all principles, case analyses,
  implementation mechanisms, and practical tools.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete ethics framework — expanded principles covering consent, power, safety, confidentiality, IP, conflicts, cultural competence, and scope; decision-making model with 10 dilemma scenarios; analysis of all 5 incidents; red lines; ethics training curriculum; review board structure; complaint procedures; sanctions; whistleblower protections; annual self-assessment; pre-engagement checklist; consent template; confidentiality agreement; power dynamics assessment; reflection guide."
    weight: 0.35
    description: "EthicsFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates facilitation ethics expertise — the principles address real ethical challenges in facilitation practice; the 5 incident analyses reveal systemic, not just individual, failures; the decision-making model handles genuine gray areas; the dilemma scenarios are realistic and nuanced; the scope of practice boundaries are clearly drawn; the framework protects participants without paralyzing facilitators; the cultural competence section goes beyond surface-level guidance."
    weight: 0.35
    description: "EthicsExpertise"
  - type: llm_judge
    criteria: "Response would elevate facilitation ethics globally — IAF members would have clear guidance for ethical practice; the framework would prevent incidents like the 5 described; the practical tools would be used in daily practice; the complaint process would be fair and effective; the framework would set an industry standard; facilitators would see ethics as integral to professionalism, not burdensome compliance."
    weight: 0.30
    description: "EthicsElevationOutcome"
