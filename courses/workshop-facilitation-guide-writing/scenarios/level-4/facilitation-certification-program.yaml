meta:
  id: facilitation-certification-program
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design a professional facilitation certification program for a national training organization — competency model, curriculum, assessment, and accreditation pathway"
  tags: [certification-program, competency-model, accreditation, professional-development, expert]

state: {}

trigger: |
  You're the program director at a national
  professional development organization. The board
  has approved creating a "Certified Professional
  Facilitator" (CPF) program to rival the IAF's
  existing certification. Your program will
  differentiate through a more rigorous competency
  model, practical assessment focus, and
  specialization tracks. You've benchmarked IAF CPF,
  ICF coaching credentials, and PMI's PMP as
  reference programs.

  Design requirements:

  1. Competency Model
  - Core competencies (required of all candidates):
    * Session design and planning
    * Group process facilitation
    * Participatory methods expertise
    * Stakeholder management
    * Conflict and emotional intelligence
    * Cultural competence
    * Ethics and professional boundaries
    * Business of facilitation (contracting,
      proposals, client management)
  - Each competency defined at 4 proficiency levels
    (foundational, competent, proficient, expert)
    with behavioral indicators
  - Evidence requirements for each competency

  2. Specialization Tracks (candidates choose 1)
  - Strategic Facilitation (corporate strategy,
    leadership, change management)
  - Innovation Facilitation (design thinking,
    ideation, prototyping workshops)
  - Community Facilitation (public engagement,
    civic dialogue, conflict resolution)
  - Learning Facilitation (training design,
    experiential learning, adult education)
  - Each track: additional competencies, assessment
    requirements, and recommended experience

  3. Certification Process
  - Eligibility requirements (education + experience)
  - Application and portfolio submission
  - Written examination (100 questions covering
    facilitation theory, methodology, ethics)
  - Practical assessment: Candidates facilitate a
    live 90-minute session with real participants,
    observed and evaluated by 2 assessors
  - Panel interview (30 min): Assessors ask about
    facilitation philosophy, ethical dilemmas,
    difficult situations
  - Scoring rubric for practical assessment and
    panel interview
  - Pass/fail criteria and borderline candidate
    process
  - Recertification requirements (every 3 years)

  4. Assessor Program
  - Assessor qualifications and selection
  - Assessor training program (how to evaluate
    facilitation reliably)
  - Inter-rater reliability protocols
  - Assessor calibration sessions (ensuring
    consistency)
  - Managing assessor bias

  5. Curriculum (recommended, not required)
  - Foundation course outline (5 days)
  - Specialization course outlines (3 days each)
  - Mentorship program structure
  - Continuing education requirements and approved
    activities

  6. Program Operations
  - Application processing workflow
  - Assessment scheduling and logistics
  - Quality assurance and program evaluation
  - Marketing and candidate recruitment
  - Pricing strategy and accessibility (scholarships)
  - Technology platform for application management
  - Advisory board composition and governance

  Task: Write the complete CPF certification program
  design document.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — competency model with 8 core competencies at 4 proficiency levels; 4 specialization tracks with additional competencies; certification process with eligibility, portfolio, written exam, practical assessment, panel interview, scoring rubric, and recertification; assessor program with training, inter-rater reliability, and calibration; curriculum outlines for foundation and specializations; program operations with workflow, QA, marketing, pricing, and governance."
    weight: 0.35
    description: "CertificationProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification design expertise — the competency model reflects real facilitation mastery; proficiency level definitions enable reliable assessment; the practical assessment design captures live facilitation skill; the written exam tests theory meaningfully; the assessor program ensures reliable evaluation; inter-rater reliability protocols maintain standards; the specialization tracks address distinct facilitation domains; the program differentiates from IAF CPF convincingly."
    weight: 0.35
    description: "CertificationDesignExpertise"
  - type: llm_judge
    criteria: "Response would produce a credible professional certification — candidates would demonstrate genuine facilitation competence; the certification would be recognized by employers; the assessment process would be fair, rigorous, and consistent; the specialization tracks would develop real expertise; the program would attract serious facilitation professionals; it would become a respected credential in the field."
    weight: 0.30
    description: "CertificationCredibilityOutcome"
