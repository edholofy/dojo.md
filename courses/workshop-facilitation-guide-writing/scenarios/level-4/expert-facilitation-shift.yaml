  - type: llm_judge
    criteria: "Response demonstrates expert-level mastery — the town hall navigates SEC regulations and facilitation simultaneously; the malpractice investigation defines facilitation professional standards; the expert report distinguishes malpractice from judgment; the crisis network design addresses trauma-informed, cross-cultural facilitation in austere conditions; each situation requires a different type of expertise and the response delivers all three."
    weight: 0.35
    description: "ExpertMasteryDemonstrated"
  - type: llm_judge
