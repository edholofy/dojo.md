meta:
  id: expert-facilitation-shift
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Navigate three expert-level facilitation challenges: a hostile corporate takeover town hall, a facilitation malpractice investigation, and designing a national facilitator crisis response network"
  tags: [multi-crisis, hostile-takeover, malpractice, crisis-response-network, expert]

state: {}

trigger: |
  You're a master facilitator and facilitation
  industry leader. Three urgent, high-stakes
  situations require your expertise simultaneously.

  === SITUATION 1: Hostile Takeover Town Hall ===
  A $2B tech company has just received a hostile
  takeover bid from a larger competitor. The board
  is divided (4 for accepting, 3 against, 2
  undecided). The CEO (against the takeover) needs
  a facilitated town hall for 500 employees who are
  panicking about layoffs, stock options, and their
  futures. The acquiring company has offered to send
  a representative to the town hall.

  Write the complete facilitation guide:
  - Pre-event: CEO coaching on what can/cannot be
    said (SEC regulations, material non-public
    information), legal review of facilitator role,
    communication to employees
  - Town hall design for 500 people (in-person +
    livestream for remote)
  - How to handle the acquiring company's
    representative (if they attend)
  - Employee Q&A management (anonymous question
    submission, live questions, emotional responses)
  - Information vs. speculation boundary management
  - How to facilitate when YOU don't know the
    outcome either
  - Legal risk mitigation throughout the session
  - Post-event: Employee communication follow-up,
    ongoing information cadence, mental health
    support

  === SITUATION 2: Facilitation Malpractice
  Investigation ===
  A major corporate client is suing your facilitation
  firm for $5M, alleging that a strategic planning
  workshop your team facilitated led to a disastrous
  business decision. The client claims your
  facilitator:
  - Used manipulative consensus techniques that
    suppressed dissenting views
  - Failed to surface critical market data that
    contradicted the chosen strategy
  - Had an undisclosed relationship with a vendor
    recommended during the workshop
  - Destroyed workshop notes after the engagement

  As the firm's managing director, write:
  - Internal investigation protocol (document
    review, facilitator interview, participant
    interviews, evidence preservation)
  - Facilitation standards against which the
    engagement should be evaluated
  - Expert report outline for legal proceedings
    (what constitutes facilitation malpractice vs.
    normal professional judgment)
  - Root cause analysis: What systemic failures in
    your firm allowed this to happen?
  - Preventive measures: Changes to your firm's
    quality assurance, ethics, and documentation
    practices
  - Client communication strategy during litigation
  - Insurance and risk management review

  === SITUATION 3: National Facilitator Crisis
  Response Network ===
  After a series of natural disasters and community
  crises, FEMA has asked you to design a national
  network of trained crisis facilitators who can
  be deployed to communities within 48 hours of a
  disaster. These facilitators would help communities
  make collective decisions during recovery:
  resource allocation, rebuilding priorities,
  temporary governance, and community healing.

  Write the complete network design:
  - Network structure: 200 trained crisis facilitators
    across 10 regions, activation protocols, deployment
    logistics
  - Crisis facilitation competency model (different
    from normal facilitation — trauma awareness,
    austere environments, cross-cultural, multi-
    lingual)
  - Training program: 40-hour crisis facilitation
    certification covering community decision-making
    under crisis conditions
  - Deployment scenarios and facilitation playbooks
    for: natural disaster recovery, industrial
    accident response, public health emergency,
    civil unrest aftermath
  - Community engagement protocols (how to enter
    a community in crisis as an outside facilitator)
  - Self-care and resilience program for crisis
    facilitators (preventing secondary traumatization)
  - Coordination with FEMA, Red Cross, local
    government, and community organizations
  - Funding model and sustainability plan
  - Quality assurance and after-action review process

  Task: Write complete deliverables for all three
  situations.

assertions:
