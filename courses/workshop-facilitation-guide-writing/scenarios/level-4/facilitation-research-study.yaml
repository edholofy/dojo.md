meta:
  id: facilitation-research-study
  level: 4
  course: workshop-facilitation-guide-writing
  type: output
  description: "Design and write up a research study comparing facilitation methodologies' impact on organizational decision-making quality and implementation success"
  tags: [research-study, facilitation-effectiveness, methodology-comparison, evidence-based, expert]

state: {}

trigger: |
  You're a professor of organizational behavior at
  a top business school. You've received a $350K
  research grant to study "Does Facilitation
  Methodology Matter? Comparing the Impact of
  Structured, Emergent, and Directive Approaches
  on Decision Quality and Implementation Success."
  This fills a critical gap — organizations spend
  billions on facilitated workshops but there's
  almost no rigorous evidence on which approaches
  work best for which contexts.

  Study design requirements:
  - Research questions: (1) How do different
    facilitation approaches affect decision quality?
    (2) How do they affect implementation success
    at 6 months? (3) What contextual factors moderate
    the relationship?
  - Methodology: Quasi-experimental field study
    with 3 conditions
  - Participants: 45 real organizational teams
    (15 per condition) conducting strategic planning
    workshops
  - Conditions:
    * Structured: Detailed agenda, timed activities,
      predetermined tools (e.g., SWOT, decision
      matrix)
    * Emergent: Flexible agenda, facilitator follows
      group energy, tools selected in the moment
    * Directive: Facilitator acts as expert advisor,
      guiding the group toward specific frameworks
  - Measures:
    * Decision quality (expert panel rating of
      strategic plans)
    * Participant satisfaction (post-workshop survey)
    * Decision commitment (team commitment scale)
    * Implementation success (6-month follow-up:
      actions taken, milestones achieved)
    * Contextual moderators: team size, trust level,
      problem complexity, organizational culture

  Write the complete research paper:
  1. Introduction (literature review on facilitation
     effectiveness, the evidence gap, theoretical
     framework)
  2. Method (participants, design, procedures,
     facilitator training and fidelity checks,
     measures, analysis plan)
  3. Results (present findings for each research
     question, including moderator analyses)
  4. Discussion (implications for theory and
     practice, limitations, future research)
  5. Practical implications section (translate
     findings into facilitator guidance)
  6. Appendices: Workshop observation protocol,
     fidelity checklist, participant survey
     instruments, expert panel rating rubric

  Provide realistic but fictional data that tells
  a nuanced story (not "one approach wins
  everything" — context matters).

  Task: Write the complete research paper with all
  sections, instruments, and appendices.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete research paper — introduction with literature review and theoretical framework; method with design, participants, procedures, fidelity checks, measures, and analysis plan; results for all 3 research questions including moderator analyses with realistic data; discussion with theoretical and practical implications; practical guidance section; appendices with observation protocol, fidelity checklist, surveys, and rating rubric."
    weight: 0.35
    description: "ResearchPaperCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the quasi-experimental design is rigorous and realistic; facilitator fidelity checks ensure condition integrity; the measures capture both immediate and long-term outcomes; the moderator analysis reveals when each approach works best; the data tells a nuanced story (context-dependent effectiveness); the limitations are honestly addressed; the paper would pass peer review at a strong management journal."
    weight: 0.35
    description: "ResearchMethodologyExpertise"
  - type: llm_judge
    criteria: "Response would advance the facilitation field — the study fills a genuine evidence gap; the findings would help practitioners choose the right approach for each context; the instruments could be used by other researchers; the practical implications section would directly improve facilitation practice; the paper would be cited in facilitation training programs; it would elevate facilitation from art to evidence-based practice."
    weight: 0.30
    description: "FieldAdvancementOutcome"
