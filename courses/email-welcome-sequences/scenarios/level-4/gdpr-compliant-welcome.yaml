meta:
  id: gdpr-compliant-welcome
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design a GDPR-compliant welcome sequence for an EU audience"
  tags: [email, gdpr, compliance, eu, privacy]

state: {}

trigger: |
  "StyleHaus" is a Berlin-based fashion e-commerce brand expanding across the EU.
  They need a GDPR-compliant welcome sequence.

  Context:
  - Target markets: Germany, France, Netherlands, Spain
  - Subscribers opt in via a double opt-in form (required in Germany)
  - They collect: email, first name, country, and preferred fashion style
  - Current issue: their US-designed welcome sequence has been flagged by their
    legal team for GDPR violations
  - They use Klaviyo for email automation

  Design a 4-email welcome sequence that is:
  1. Fully GDPR-compliant (document every compliance element)
  2. Still engaging and conversion-focused (compliance shouldn't kill creativity)
  3. Adapted for multi-country EU audience

  For each email, annotate every GDPR-relevant element with [GDPR: reason].

assertions:
  - type: llm_judge
    criteria: "Every GDPR requirement is addressed and annotated — double opt-in confirmation, explicit consent language, unsubscribe mechanisms, data processing disclosures, and right to erasure information"
    weight: 0.30
    description: "Comprehensive GDPR compliance annotations"
  - type: llm_judge
    criteria: "The compliance elements don't kill the email's effectiveness — the emails are still engaging, on-brand, and conversion-focused despite the required legal language"
    weight: 0.25
    description: "Engaging despite compliance requirements"
  - type: llm_judge
    criteria: "Multi-country considerations are addressed — language preferences, country-specific legal requirements (German double opt-in is stricter), and cultural tone differences"
    weight: 0.25
    description: "Multi-country EU considerations addressed"
  - type: llm_judge
    criteria: "The double opt-in confirmation email is included and handled well — it's not just a boring confirmation link but an engaging first touchpoint that sets the tone"
    weight: 0.20
    description: "Engaging double opt-in confirmation"
