meta:
  id: ab-test-subject-lines
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design an A/B testing plan for welcome email subject lines"
  tags: [email, ab-testing, subject-lines, optimization]

state: {}

trigger: |
  A DTC supplements brand "VitalBoost" wants to A/B test their welcome email.
  Current subject line: "Welcome to VitalBoost! Here's Your 20% Off Code"
  Current open rate: 52% (below the 83% welcome email benchmark)

  Design a comprehensive A/B testing plan:

  1. Generate 6 challenger subject lines using different psychological approaches
  2. For each, explain the hypothesis and psychology behind it
  3. Define the testing methodology (sample size, duration, confidence level)
  4. Outline what to measure beyond open rate
  5. Provide a decision framework for picking the winner
  6. Plan for the next round of testing after the winner is found

  Current list size: 8,000 new subscribers per month.

assertions:
  - type: llm_judge
    criteria: "Six challenger subject lines represent genuinely different psychological approaches — curiosity, urgency, benefit-first, social proof, personalization, and question-based. Not just minor variations"
    weight: 0.25
    description: "Six distinct psychological approaches"
  - type: llm_judge
    criteria: "The testing methodology is statistically sound — specifies appropriate sample sizes for an 8K/month list, required confidence levels (95%), test duration, and how to handle multiple variants"
    weight: 0.25
    description: "Statistically sound methodology"
  - type: llm_judge
    criteria: "Metrics beyond open rate are identified — click-through rate, conversion rate, and downstream revenue are considered, because the best open rate doesn't always mean the best overall performance"
    weight: 0.25
    description: "Metrics beyond open rate considered"
  - type: llm_judge
    criteria: "The iterative testing plan is practical — after finding a winner, the next round of testing is defined (testing preview text, send time, or further subject line refinement)"
    weight: 0.25
    description: "Practical iterative testing plan"
