meta:
  id: deliverability-optimization
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Optimize a welcome sequence for email deliverability"
  tags: [email, deliverability, spam, inbox-placement, technical]

state: {}

trigger: |
  "ShopLocal" (a marketplace for local artisans) has a deliverability crisis
  with their welcome emails:

  Current metrics:
  - Welcome email delivery rate: 82% (should be 98%+)
  - Inbox placement rate: 61% (rest goes to Promotions/Spam)
  - Spam complaint rate: 0.28% (Gmail threshold is 0.10%)
  - Bounce rate: 4.1% (healthy is under 2%)
  - They send from: noreply@shoplocal.com
  - SPF: configured, DKIM: configured, DMARC: not set up
  - They purchased a list of 10K emails 6 months ago and mixed it with organic

  Provide:
  1. Root cause analysis of each deliverability problem
  2. A technical fix plan (authentication, sending practices, list hygiene)
  3. A content fix plan (what in their emails might trigger spam filters)
  4. A 30-day recovery roadmap to restore deliverability
  5. Ongoing monitoring checklist

assertions:
  - type: llm_judge
    criteria: "The purchased list is identified as a critical problem — mixing purchased contacts with organic subscribers is a deliverability disaster, and the plan addresses list cleaning and separation"
    weight: 0.25
    description: "Purchased list identified as root cause"
  - type: llm_judge
    criteria: "Technical fixes are comprehensive — DMARC setup, warm-up plan for the sending domain, noreply@ address change, bounce handling, and complaint feedback loop setup"
    weight: 0.25
    description: "Comprehensive technical fix plan"
  - type: llm_judge
    criteria: "Content fixes address spam trigger patterns — subject line practices, image-to-text ratio, link quantity, sender name, and language that triggers filters"
    weight: 0.25
    description: "Content spam trigger analysis"
  - type: llm_judge
    criteria: "The 30-day recovery roadmap is realistic and phased — doesn't try to fix everything at once but prioritizes the highest-impact fixes first (list cleaning, DMARC, reduce complaints)"
    weight: 0.25
    description: "Realistic phased recovery roadmap"
