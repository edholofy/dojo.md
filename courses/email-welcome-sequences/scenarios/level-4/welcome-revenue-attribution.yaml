meta:
  id: welcome-revenue-attribution
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Build a measurement and revenue attribution framework for welcome sequences"
  tags: [email, analytics, attribution, measurement, revenue]

state: {}

trigger: |
  "StyleDrop" (a fashion e-commerce brand, $4M annual revenue, 120K email
  subscribers) wants to understand the true ROI of their welcome sequence.

  Current data available:
  - Welcome email open/click rates per email
  - Klaviyo flow analytics (per-email revenue attribution)
  - Google Analytics e-commerce data
  - Shopify order data

  The CMO is asking: "Is our welcome sequence worth the time we invest in it?
  What's the actual revenue impact? How do we know it's working?"

  Create:
  1. A measurement framework defining which KPIs to track at each stage
  2. A revenue attribution model (how to attribute purchases to the welcome sequence
     vs. other channels)
  3. A dashboard mockup (describe the visualizations and metrics)
  4. Benchmarks to evaluate performance against
  5. A testing roadmap for continuous optimization

assertions:
  - type: llm_judge
    criteria: "The measurement framework includes both leading indicators (open rates, click rates) and lagging indicators (revenue, LTV) — organized by sequence stage, not just aggregate metrics"
    weight: 0.25
    description: "Leading and lagging indicators by stage"
  - type: llm_judge
    criteria: "The attribution model addresses the multi-touch problem — how to attribute a purchase when someone received a welcome email AND saw a retargeting ad AND searched on Google"
    weight: 0.25
    description: "Multi-touch attribution addressed"
  - type: llm_judge
    criteria: "The dashboard description is specific and actionable — describes actual charts, metric placements, and what decisions each visualization enables the CMO to make"
    weight: 0.25
    description: "Specific actionable dashboard design"
  - type: llm_judge
    criteria: "Benchmarks are realistic for a $4M fashion e-commerce brand — not generic 'industry averages' but specific to their scale and vertical"
    weight: 0.25
    description: "Scale-appropriate benchmarks"
