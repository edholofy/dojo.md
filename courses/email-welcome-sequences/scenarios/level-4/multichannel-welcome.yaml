meta:
  id: multichannel-welcome
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design a multi-channel welcome experience (email + SMS + push)"
  tags: [email, sms, push-notification, multichannel, orchestration]

state: {}

trigger: |
  "QuickFit" is a fitness app that collects email AND phone number during signup.
  Design a coordinated multi-channel welcome experience across email, SMS, and
  push notifications.

  Context:
  - User downloaded the app and created an account
  - They opted in to email AND SMS marketing
  - The app can send push notifications (if enabled on their device)
  - Goal: complete first workout within 48 hours
  - Current first-workout completion rate: 28% (goal: 50%)
  - Budget: SMS costs $0.01 per message (must be used strategically)

  Design a 48-hour multi-channel welcome journey:
  1. Which messages go via email vs. SMS vs. push notification and WHY
  2. The content and timing of each touchpoint
  3. Rules to prevent over-messaging (no more than 3 total touches per day)
  4. Channel suppression logic (if they complete the workout, stop nudging)

assertions:
  - type: llm_judge
    criteria: "Channel selection is strategic — SMS is used for time-sensitive, short messages; email for detailed content; push for in-moment reminders. Each channel plays to its strengths"
    weight: 0.30
    description: "Strategic channel selection"
  - type: llm_judge
    criteria: "Over-messaging prevention is built in — no more than 3 total touches per day across all channels, with specific rules about minimum time between messages"
    weight: 0.20
    description: "Over-messaging prevention rules"
  - type: llm_judge
    criteria: "Suppression logic is defined — if the user completes their first workout, all nudging stops and they transition to a celebration/engagement sequence instead"
    weight: 0.25
    description: "Goal-completion suppression logic"
  - type: llm_judge
    criteria: "The 48-hour journey is cohesive — messages build on each other across channels rather than repeating the same content. Each touchpoint adds new value or motivation"
    weight: 0.25
    description: "Cohesive cross-channel journey"
