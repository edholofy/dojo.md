meta:
  id: winback-sequence-dropoffs
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design a win-back sequence for welcome flow drop-offs"
  tags: [email, winback, re-engagement, drop-off, recovery]

state: {}

trigger: |
  "CraftBeer Box" (monthly craft beer subscription, $45/month) has data showing
  that 40% of their welcome sequence subscribers disengage after Email #2.

  Current sequence performance:
  - Email 1 (Day 0): 78% open, 15% click — "Welcome + first box preview"
  - Email 2 (Day 3): 42% open, 8% click — "Meet our brewers"
  - Email 3 (Day 7): 19% open, 2% click — "This month's featured beer"
  - Email 4 (Day 10): 11% open, 1% click — "Your box ships Friday"

  The massive drop between Email 2 and 3 suggests the "meet our brewers" email
  isn't compelling enough to maintain engagement.

  Design:
  1. A diagnosis of why engagement drops after Email 2
  2. A 3-email win-back sequence triggered when someone opens Email 2 but doesn't
     open Email 3 or 4
  3. A rewritten Email 3 and 4 for the main sequence to prevent the drop-off
  4. Criteria for when to stop emailing disengaged subscribers

assertions:
  - type: llm_judge
    criteria: "The diagnosis is insightful — identifies that 'meet our brewers' may be self-indulgent content that doesn't serve the subscriber's interests, and the 4-day gap between Email 2 and 3 is too long"
    weight: 0.25
    description: "Insightful drop-off diagnosis"
  - type: llm_judge
    criteria: "The win-back sequence uses different tactics than the main sequence — new subject line approaches, different value propositions, perhaps an exclusive offer to re-engage"
    weight: 0.25
    description: "Win-back uses distinct re-engagement tactics"
  - type: llm_judge
    criteria: "The rewritten Email 3 and 4 address the original problems — they lead with subscriber value (what's in their box, tasting notes, pairings) rather than brand-centric content"
    weight: 0.25
    description: "Rewrites prioritize subscriber value"
  - type: llm_judge
    criteria: "Clear sunset criteria are provided — specific rules for when to stop emailing (e.g., no opens in X days) and what to do with disengaged subscribers (suppress, re-permission, or remove)"
    weight: 0.25
    description: "Clear disengagement sunset criteria"
