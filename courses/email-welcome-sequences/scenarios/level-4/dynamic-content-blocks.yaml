meta:
  id: dynamic-content-blocks
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design dynamic content blocks for personalized welcome emails"
  tags: [email, dynamic-content, personalization, advanced]

state: {}

trigger: |
  "TechStack" is a B2B software review platform. They want to create one welcome
  email template with dynamic content blocks that adapts to subscriber data.

  Subscriber data points available:
  - Company size: Startup (1-50), SMB (51-500), Enterprise (500+)
  - Role: Developer, Product Manager, CTO/VP Engineering, Marketing
  - Interest area: DevOps, Frontend, Backend, Data, Security
  - Signup source: organic search, Product Hunt, LinkedIn ad, referral

  Design:
  1. The email template structure with all dynamic blocks labeled
  2. Content variations for EACH dynamic block
  3. Show 3 fully-rendered example emails for these subscribers:
     - Subscriber A: Startup, Developer, Backend, Product Hunt
     - Subscriber B: Enterprise, CTO, Security, LinkedIn ad
     - Subscriber C: SMB, Product Manager, Data, referral
  4. A prioritization matrix for when data is missing (fallback logic)

assertions:
  - type: llm_judge
    criteria: "The template clearly identifies multiple dynamic content blocks — hero message, product recommendations, social proof, CTA, and tone all adapt based on subscriber data"
    weight: 0.25
    description: "Multiple dynamic content blocks identified"
  - type: llm_judge
    criteria: "The three rendered examples feel dramatically different — a Startup Developer from Product Hunt gets a completely different experience than an Enterprise CTO from LinkedIn"
    weight: 0.30
    description: "Three dramatically different rendered versions"
  - type: llm_judge
    criteria: "Content variations are meaningful — they don't just swap company names but adjust messaging depth, technical level, proof points, and CTAs based on the subscriber's context"
    weight: 0.25
    description: "Meaningful content variations per segment"
  - type: llm_judge
    criteria: "Fallback logic is defined — when data is missing (e.g., unknown company size), there's a sensible default that works for any subscriber"
    weight: 0.20
    description: "Fallback logic for missing data"
