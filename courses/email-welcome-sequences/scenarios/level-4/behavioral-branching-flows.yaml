meta:
  id: behavioral-branching-flows
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence with behavioral branching logic"
  tags: [email, behavioral, branching, automation, advanced]

state: {}

trigger: |
  Design a behavioral welcome flow for "LearnLingo," a language learning app.

  Context:
  - User signed up for a 7-day free trial
  - During onboarding, they selected: Spanish, Intermediate level
  - Key activation events the app tracks:
    A) Completed first lesson (within 24 hours)
    B) Completed 3 lessons (within 3 days)
    C) Set a daily reminder
    D) Invited a friend to practice with
  - Trial-to-paid conversion: 12% (goal: 20%)
  - Users who complete 5+ lessons convert at 38%

  Design a branching welcome flow with:
  1. The "happy path" (user completes activation events on schedule)
  2. The "nudge path" (user falls behind or stalls)
  3. The "at-risk path" (user hasn't opened the app in 48+ hours)

  Include a visual flow diagram (ASCII) showing decision points and branches.

assertions:
  - type: llm_judge
    criteria: "Three distinct paths are clearly defined — happy path celebrates progress and introduces features, nudge path provides motivation and removes friction, at-risk path creates urgency and re-engages"
    weight: 0.25
    description: "Three distinct behavioral paths"
  - type: llm_judge
    criteria: "An ASCII flow diagram is provided showing decision points — it's clear when users branch into different paths and what triggers each branch"
    weight: 0.20
    description: "Clear ASCII flow diagram with decision points"
  - type: llm_judge
    criteria: "The nudge and at-risk emails address specific friction points — they don't just say 'come back' but identify why users might have stalled (lesson too hard, no time, forgot) and offer solutions"
    weight: 0.30
    description: "Friction-specific nudge and at-risk emails"
  - type: llm_judge
    criteria: "The emails are personalized to Spanish/Intermediate — content references their chosen language and acknowledges their existing skill level rather than treating them as a beginner"
    weight: 0.25
    description: "Personalized to language and level"
