meta:
  id: sequence-audit-fix
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Audit and fix a poorly performing welcome sequence"
  tags: [email, audit, optimization, diagnosis, fix]

state: {}

trigger: |
  Audit this underperforming welcome sequence for "GreenThumb," a plant
  subscription service ($39/month):

  Email 1 (Day 0) — "Welcome to the GreenThumb Family!"
  Open rate: 71% | CTR: 3.2% | Unsub: 0.8%
  Content: Long brand story (400 words), company mission, team photos, 5 links to
  different sections of the website, discount code buried in the third paragraph.

  Email 2 (Day 1) — "Meet Your First Plant!"
  Open rate: 32% | CTR: 1.1% | Unsub: 2.1%
  Content: Product care guide for a generic houseplant, very long (600 words),
  lots of botanical terminology, no images, link to 45-minute YouTube video.

  Email 3 (Day 2) — "Don't Miss Out! 🌿🌿🌿"
  Open rate: 18% | CTR: 0.5% | Unsub: 3.4%
  Content: Urgent push to refer friends for a free plant, heavy use of emojis,
  three pop-up-style CTAs, FOMO-driven language, no value content.

  Email 4 (Day 3) — "Your GreenThumb Journey Continues"
  Open rate: 12% | CTR: 0.3% | Unsub: 4.2%
  Content: Another hard sell — upgrade to premium plan, cross-sell accessories,
  bundle offers, no acknowledgment that they haven't even received their first box.

  Provide:
  1. Diagnosis of each email's problems
  2. Rewritten version of each email (subject, body, CTA)
  3. Revised timing and sequence order
  4. Projected metric improvements

assertions:
  - type: llm_judge
    criteria: "The diagnosis identifies specific, actionable problems for each email — Email 1's buried discount, Email 2's botanical jargon and length, Email 3's aggressive referral push, Email 4's premature upsell"
    weight: 0.25
    description: "Specific diagnosis for each email"
  - type: llm_judge
    criteria: "The rewritten emails fix the identified problems — shorter copy, prominent discounts, plain language, value-first approach, appropriate timing for sales asks"
    weight: 0.30
    description: "Rewrites fix identified problems"
  - type: llm_judge
    criteria: "The revised timing is more appropriate — daily emails were causing fatigue, and sales emails shouldn't come before the subscriber has received their first plant"
    weight: 0.25
    description: "Revised timing addresses fatigue and premature selling"
  - type: llm_judge
    criteria: "Metric projections are reasonable — doesn't promise 10x improvements but identifies realistic gains based on the specific fixes made"
    weight: 0.20
    description: "Reasonable metric improvement projections"
