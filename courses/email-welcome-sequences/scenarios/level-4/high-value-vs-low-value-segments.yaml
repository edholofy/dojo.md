meta:
  id: high-value-vs-low-value-segments
  level: 4
  course: email-welcome-sequences
  type: output
  description: "Design different welcome paths for high-value and low-value segments"
  tags: [email, segmentation, high-value, low-value, differentiation]

state: {}

trigger: |
  "LuxeTravel" is a travel booking platform. Their data shows vastly different
  behavior between two subscriber segments:

  Segment A — "Big Spenders" (15% of new subscribers):
  - Browsed luxury resorts ($500+/night)
  - Average booking value: $3,200
  - Conversion window: 30-60 days (research extensively)
  - Value long-form content, detailed hotel reviews, concierge service info

  Segment B — "Deal Seekers" (85% of new subscribers):
  - Browsed budget deals and flash sales
  - Average booking value: $340
  - Conversion window: 1-7 days (impulse-driven)
  - Value discounts, limited-time offers, price drops

  Currently both segments get the same welcome sequence. Design differentiated
  4-email sequences for each segment.

  Include: how to identify which segment a subscriber belongs to, and how the
  email strategy fundamentally differs between them.

assertions:
  - type: llm_judge
    criteria: "The identification criteria are clear — browse behavior (price range viewed, destination types, time on page) is used to segment subscribers into Big Spenders vs. Deal Seekers"
    weight: 0.20
    description: "Clear segment identification criteria"
  - type: llm_judge
    criteria: "The Big Spender sequence is fundamentally different — longer nurture cycle, aspirational imagery, detailed property features, personal concierge positioning. No discount-driven urgency"
    weight: 0.25
    description: "Big Spender sequence is premium-appropriate"
  - type: llm_judge
    criteria: "The Deal Seeker sequence matches their behavior — shorter cycle, time-limited offers, price-focused messaging, flash sale alerts, and urgency-driven CTAs"
    weight: 0.25
    description: "Deal Seeker sequence matches urgency behavior"
  - type: llm_judge
    criteria: "The revenue math is addressed — even though Big Spenders are 15% of subscribers, their 10x higher AOV means each is worth ~6x more, justifying the longer, more expensive nurture"
    weight: 0.15
    description: "Revenue math justifies differentiation"
  - type: llm_judge
    criteria: "Edge cases are handled — what about subscribers who browse both luxury and budget? The plan includes logic for mixed-signal subscribers"
    weight: 0.15
    description: "Mixed-signal edge cases handled"
