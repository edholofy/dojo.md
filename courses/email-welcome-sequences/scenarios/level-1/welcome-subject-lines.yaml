meta:
  id: welcome-subject-lines
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Generate subject line variations for a welcome email"
  tags: [email, subject-line, welcome, copywriting]

state: {}

trigger: |
  Write 8 subject line options for the first welcome email of an online fitness coaching platform called "FitPath."

  Context:
  - New subscribers signed up for a free 7-day workout plan
  - Target audience: beginners who are intimidated by fitness
  - Brand voice: encouraging, non-judgmental, motivating

  For each subject line:
  1. The subject line text (keep under 50 characters)
  2. Matching preview text (under 90 characters)
  3. The psychology behind why it works

assertions:
  - type: llm_judge
    criteria: "Eight distinct subject lines are provided, each under 50 characters with matching preview text — they represent genuinely different approaches, not minor rewording of the same idea"
    weight: 0.30
    description: "Eight distinct, concise subject lines"
  - type: llm_judge
    criteria: "The subject lines use varied psychological hooks — at least 3 different approaches such as curiosity, benefit-driven, urgency, personalization, social proof, or value delivery"
    weight: 0.35
    description: "Varied psychological approaches"
  - type: llm_judge
    criteria: "The tone is encouraging and non-intimidating throughout — none of the subject lines use aggressive fitness language that would scare away beginners"
    weight: 0.35
    description: "Encouraging non-intimidating tone"
