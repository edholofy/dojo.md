meta:
  id: basic-ecommerce-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a single welcome email for a new e-commerce subscriber"
  tags: [email, welcome, ecommerce, basics]

state: {}

trigger: |
  Write a welcome email for a new subscriber to an online pet supply store called "PawsFirst."

  Context:
  - The subscriber signed up via a homepage popup offering 15% off their first order
  - The store sells premium dog and cat food, toys, and accessories
  - Brand voice: friendly, warm, knowledgeable about pet care

  Write the complete email including:
  1. Subject line
  2. Preview text
  3. Email body
  4. CTA

assertions:
  - type: llm_judge
    criteria: "The email includes a clear subject line and preview text that would compel opens — the subject line is concise (under 10 words) and mentions either the discount or a welcoming message"
    weight: 0.25
    description: "Compelling subject line and preview text"
  - type: llm_judge
    criteria: "The 15% discount code is prominently featured and easy to find — it's not buried in a wall of text but clearly highlighted"
    weight: 0.25
    description: "Discount code prominently displayed"
  - type: llm_judge
    criteria: "The email body has a warm, friendly tone consistent with a pet brand — it feels welcoming, not corporate, and connects emotionally with pet owners"
    weight: 0.25
    description: "Warm pet-brand tone"
  - type: llm_judge
    criteria: "There is a single, clear CTA that directs the subscriber to shop — not multiple competing actions"
    weight: 0.25
    description: "Single clear CTA"
