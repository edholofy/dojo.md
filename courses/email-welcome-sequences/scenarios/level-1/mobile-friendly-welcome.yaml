meta:
  id: mobile-friendly-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a mobile-optimized welcome email"
  tags: [email, welcome, mobile, optimization]

state: {}

trigger: |
  Rewrite the following welcome email to be mobile-optimized. The original email
  performs well on desktop but has a 65% mobile open rate with poor mobile engagement.

  Original email:
  ---
  Subject: Welcome to BookWorm — Your Literary Adventure Begins!
  Preview: Discover your next favorite book with our curated recommendations

  Dear Reader,

  Thank you so much for joining the BookWorm community! We're absolutely thrilled to have you as part of our family of 50,000+ passionate readers who love discovering new books.

  At BookWorm, we believe that every person has a perfect book waiting for them — they just need help finding it. That's why we created our proprietary AI recommendation engine that analyzes your reading preferences across 47 different dimensions to find books you'll absolutely love.

  Here's how to get started with your personalized experience:
  Step 1: Complete your reading profile by telling us about your favorite genres, authors, and recent reads
  Step 2: Browse our curated "Staff Picks" collection featuring hand-selected titles from our team of literary experts
  Step 3: Check out this week's "Hidden Gems" — under-the-radar books that our community has rated 4.5+ stars
  Step 4: Join our monthly virtual book club where we discuss the latest releases

  As a welcome gift, here's 25% off your first book purchase: WELCOME25

  Happy reading!
  The BookWorm Team
  ---

  Explain what changes you made and why.

assertions:
  - type: llm_judge
    criteria: "The rewritten email is significantly shorter — ideally under 100 words in the body — with short paragraphs of 1-2 sentences max, easily scannable on a phone screen"
    weight: 0.30
    description: "Dramatically shorter and scannable"
  - type: llm_judge
    criteria: "The 4-step getting-started process is simplified — on mobile, a 4-step list is overwhelming. The rewrite focuses on one key action rather than four competing steps"
    weight: 0.25
    description: "Simplified to single key action"
  - type: llm_judge
    criteria: "The discount code is easy to find and tap — it's not buried in a paragraph but prominently displayed, ideally in a tappable button format"
    weight: 0.25
    description: "Discount code prominently displayed"
  - type: llm_judge
    criteria: "Clear explanation of what was changed and why — identifies the specific mobile UX problems in the original (length, multiple CTAs, dense paragraphs) and explains the principles behind each fix"
    weight: 0.20
    description: "Clear explanation of changes"
