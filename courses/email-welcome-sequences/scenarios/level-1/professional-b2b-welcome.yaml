meta:
  id: professional-b2b-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email with a professional B2B brand voice"
  tags: [email, welcome, brand-voice, b2b, professional]

state: {}

trigger: |
  Write a welcome email for "DataVault," a B2B data analytics platform.

  Context:
  - The subscriber downloaded a whitepaper: "The 2026 State of Enterprise Data Analytics"
  - Company targets VP-level decision makers at mid-market companies (500-5000 employees)
  - Brand voice: authoritative, data-driven, concise
  - Goal: position DataVault as a thought leader and begin a nurture sequence
  - Do NOT try to sell the product in this first email

  Write the complete email including subject line, preview text, body, and CTA.

assertions:
  - type: llm_judge
    criteria: "The email delivers the whitepaper immediately and prominently — the download link is the first thing the reader encounters, respecting their time"
    weight: 0.25
    description: "Immediate whitepaper delivery"
  - type: llm_judge
    criteria: "The tone is authoritative and professional without being stiff or boring — it reads like communication from a respected industry peer, not a sales pitch"
    weight: 0.25
    description: "Authoritative professional tone"
  - type: llm_judge
    criteria: "The email does NOT try to sell the product — it focuses on delivering value and establishing credibility, trusting that the sales conversation will come later"
    weight: 0.25
    description: "No premature sales pitch"
  - type: llm_judge
    criteria: "There is a soft next step that continues the relationship — such as inviting to read a related blog post, follow on LinkedIn, or attend a webinar — not a demo request"
    weight: 0.25
    description: "Soft relationship-building next step"
