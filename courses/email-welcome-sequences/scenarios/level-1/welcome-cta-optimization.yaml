meta:
  id: welcome-cta-optimization
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Craft effective CTAs for different welcome email goals"
  tags: [email, cta, welcome, optimization]

state: {}

trigger: |
  Write CTA button text and surrounding copy for 5 different welcome email scenarios.

  For each scenario, provide:
  1. The CTA button text (max 5 words)
  2. The 1-2 sentence lead-in copy above the button
  3. Why this CTA works for this specific context

  Scenarios:
  A) E-commerce: subscriber received a 20% discount code
  B) SaaS: user started a free trial and needs to set up their workspace
  C) Newsletter: reader subscribed to a weekly tech digest
  D) Online course: student enrolled in a free mini-course
  E) Community: member just joined a Slack community for designers

assertions:
  - type: llm_judge
    criteria: "All five CTA button texts are concise (max 5 words), action-oriented, and specific to each scenario — they avoid generic text like 'Click Here' or 'Learn More'"
    weight: 0.30
    description: "Five specific action-oriented CTAs"
  - type: llm_judge
    criteria: "The lead-in copy creates a bridge between the email content and the CTA — it builds enough motivation that clicking feels natural, not forced"
    weight: 0.35
    description: "Lead-in copy motivates clicking"
  - type: llm_judge
    criteria: "Each CTA is contextually appropriate — an e-commerce CTA focuses on shopping, a SaaS CTA focuses on setup, a community CTA focuses on joining the conversation"
    weight: 0.35
    description: "CTAs match their specific context"
