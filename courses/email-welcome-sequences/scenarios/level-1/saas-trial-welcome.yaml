meta:
  id: saas-trial-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email for a SaaS free trial signup"
  tags: [email, welcome, saas, free-trial]

state: {}

trigger: |
  Write a welcome email for someone who just started a 14-day free trial of "TaskFlow," a project management tool for small teams.

  Context:
  - User signed up with their work email
  - The tool is a Trello/Asana alternative focused on simplicity
  - The #1 goal is to get them to create their first project within 24 hours
  - Brand voice: professional but approachable, no jargon

  Write the complete email including:
  1. Subject line
  2. Preview text
  3. Email body (keep concise — under 150 words)
  4. One primary CTA

assertions:
  - type: llm_judge
    criteria: "The email is concise (body under 150 words) and focused on a single action — creating their first project. It does not try to explain every feature"
    weight: 0.30
    description: "Concise and action-focused"
  - type: llm_judge
    criteria: "The CTA clearly directs to creating a first project — it's specific (not generic 'Get Started') and reduces friction by telling them exactly what to do next"
    weight: 0.30
    description: "Specific first-action CTA"
  - type: llm_judge
    criteria: "The email sets appropriate expectations — mentions the 14-day trial period and hints at what value they'll get, without being pushy about conversion"
    weight: 0.20
    description: "Sets trial expectations"
  - type: llm_judge
    criteria: "The tone is professional but approachable — reads like a helpful colleague, not a corporate robot or an over-enthusiastic marketer"
    weight: 0.20
    description: "Professional approachable tone"
