meta:
  id: expectation-setting-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email that sets clear subscriber expectations"
  tags: [email, welcome, expectations, onboarding]

state: {}

trigger: |
  Write a welcome email for "The Morning Briefing," a daily business news newsletter.

  Context:
  - Published every weekday at 6:30 AM
  - 5-minute read covering top business stories, one market insight, one tool recommendation
  - 200K subscribers, growing fast
  - Brand voice: sharp, witty, no-nonsense
  - Subscribers frequently complain about not knowing what to expect

  The primary goal of this email is to set crystal-clear expectations so subscribers
  know exactly what they signed up for and look forward to tomorrow's edition.

assertions:
  - type: llm_judge
    criteria: "The email clearly communicates the what, when, and how — subscribers know the newsletter arrives weekdays at 6:30 AM, takes 5 minutes to read, and covers business news, market insights, and tool picks"
    weight: 0.35
    description: "Crystal clear what/when/how"
  - type: llm_judge
    criteria: "The tone is sharp and witty — it reads like the newsletter itself, giving subscribers a preview of the voice they'll experience daily"
    weight: 0.25
    description: "Sharp witty tone matching newsletter voice"
  - type: llm_judge
    criteria: "The email builds anticipation for the next edition — the subscriber should feel excited to open tomorrow's email, not just informed about it"
    weight: 0.25
    description: "Builds anticipation for next edition"
  - type: llm_judge
    criteria: "The email includes a practical 'add us to contacts' or 'move to primary inbox' request — framed in a way that's natural, not desperate"
    weight: 0.15
    description: "Natural deliverability request"
