meta:
  id: casual-brand-voice-welcome
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email with a casual conversational brand voice"
  tags: [email, welcome, brand-voice, casual]

state: {}

trigger: |
  Write a welcome email for "Brew & Beans," a specialty coffee subscription service.

  Context:
  - Subscriber just signed up for a monthly coffee subscription ($29/month)
  - Their first box ships in 3 days
  - Brand personality: like your cool friend who knows everything about coffee
  - Target: millennials who want better coffee but don't want to be coffee snobs
  - Include a "What's in your first box" teaser

  The voice should be ultra-casual — think text message from a friend, not a corporation.

assertions:
  - type: llm_judge
    criteria: "The voice is genuinely casual and conversational — uses contractions, informal language, and reads like a message from a friend. Not 'corporate trying to be casual' with forced slang"
    weight: 0.30
    description: "Genuinely casual conversational voice"
  - type: llm_judge
    criteria: "The email creates excitement about the first box — the teaser reveals enough to build anticipation without spoiling the surprise completely"
    weight: 0.25
    description: "Exciting first-box teaser"
  - type: llm_judge
    criteria: "Key logistical information is communicated (shipping in 3 days, what to expect) despite the casual tone — being casual doesn't mean being vague"
    weight: 0.25
    description: "Clear logistics despite casual tone"
  - type: llm_judge
    criteria: "The email avoids coffee snobbery — it's enthusiastic about quality coffee without being pretentious or gatekeeping"
    weight: 0.20
    description: "Enthusiastic without snobbery"
