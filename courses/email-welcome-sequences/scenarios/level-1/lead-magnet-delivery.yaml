meta:
  id: lead-magnet-delivery
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email that delivers a lead magnet"
  tags: [email, welcome, lead-magnet, delivery]

state: {}

trigger: |
  Write a welcome email that delivers a free PDF guide to a new subscriber.

  Context:
  - Guide title: "The 2026 Remote Work Toolkit: 25 Tools Every Remote Team Needs"
  - Company: "RemoteReady" — a blog/resource site for remote work best practices
  - The subscriber found them through a Google search for "best remote work tools"
  - Brand voice: knowledgeable, practical, no-fluff

  The email must:
  1. Deliver the guide (include a download link placeholder)
  2. Set expectations for future emails
  3. Provide one quick win from the guide (a teaser)

assertions:
  - type: llm_judge
    criteria: "The download link for the guide is prominently placed near the top — the subscriber can find and access their guide within 5 seconds of opening the email"
    weight: 0.30
    description: "Guide delivery is immediate and prominent"
  - type: llm_judge
    criteria: "The email includes a teaser or quick win from the guide — one specific tool recommendation that demonstrates the guide's value and hooks the reader"
    weight: 0.25
    description: "Quick win teaser included"
  - type: llm_judge
    criteria: "Future email expectations are clearly set — the subscriber knows what kind of content they'll receive and roughly how often"
    weight: 0.25
    description: "Clear expectations for future emails"
  - type: llm_judge
    criteria: "The tone is practical and no-fluff — gets to the point quickly without excessive welcome pleasantries or brand storytelling"
    weight: 0.20
    description: "Practical no-fluff tone"
