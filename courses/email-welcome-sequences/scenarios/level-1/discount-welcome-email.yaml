meta:
  id: discount-welcome-email
  level: 1
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email centered around a discount offer"
  tags: [email, welcome, discount, ecommerce]

state: {}

trigger: |
  Write a welcome email for "GlowUp Skincare," an online skincare brand.

  Context:
  - New subscriber signed up for 10% off their first order
  - Discount code: GLOW10
  - The brand specializes in Korean skincare for sensitive skin
  - Target: women 25-40 who are overwhelmed by skincare options
  - Brand voice: educational, gentle, reassuring

  The email must make the subscriber feel confident about choosing GlowUp,
  not just hand them a discount code. Balance promotion with trust-building.

assertions:
  - type: llm_judge
    criteria: "The discount code GLOW10 is clearly presented but the email is not purely transactional — it builds trust and brand connection beyond just delivering a coupon"
    weight: 0.30
    description: "Balance between discount and trust-building"
  - type: llm_judge
    criteria: "The email addresses the subscriber's pain point of being overwhelmed by skincare options — it positions GlowUp as the simplifying, guiding solution"
    weight: 0.30
    description: "Addresses overwhelm pain point"
  - type: llm_judge
    criteria: "The tone is educational, gentle, and reassuring — consistent with a sensitive skincare brand that doesn't pressure or create anxiety"
    weight: 0.20
    description: "Educational gentle tone"
  - type: llm_judge
    criteria: "The email includes a subject line, preview text, body, and CTA — all elements work together cohesively"
    weight: 0.20
    description: "Complete cohesive email structure"
