meta:
  id: post-acquisition-rebrand
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for subscribers migrating after an acquisition"
  tags: [email, acquisition, rebrand, migration, change-management]

state: {}

trigger: |
  "TaskMaster" (a project management tool with 500K users) has been acquired by
  "WorkHub" (a larger productivity suite). TaskMaster will be sunset in 90 days
  and all users must migrate to WorkHub.

  Context:
  - TaskMaster users are loyal — 72 NPS, active community, many have used it for 3+ years
  - WorkHub is seen as "corporate" and "bloated" by TaskMaster's audience
  - TaskMaster's pricing: $8/month. WorkHub's pricing: $15/month (but TaskMaster
    users get $10/month for the first year)
  - 30% of TaskMaster users have already expressed anger about the acquisition on Twitter
  - WorkHub has features TaskMaster doesn't (calendar, docs, video calls) but also
    lacks some beloved TaskMaster features (custom workflows, kanban board)
  - Data migration tool exists but is imperfect — some custom fields may not transfer

  Design a 6-email "migration welcome" sequence that:
  1. Acknowledges the disruption honestly
  2. Builds excitement for WorkHub's additional capabilities
  3. Addresses the missing features directly
  4. Guides them through the migration process step-by-step
  5. Converts angry TaskMaster loyalists into WorkHub advocates

assertions:
  - type: llm_judge
    criteria: "The sequence acknowledges the disruption honestly — it doesn't pretend the acquisition is purely good news but validates user feelings while building a case for the transition"
    weight: 0.25
    description: "Honest disruption acknowledgment"
  - type: llm_judge
    criteria: "Missing features are addressed directly — the sequence doesn't ignore the kanban board and custom workflows gaps but explains what's being done (feature roadmap, workarounds, feedback channel)"
    weight: 0.25
    description: "Missing features addressed directly"
  - type: llm_judge
    criteria: "The migration guide is step-by-step and friction-reducing — it breaks the migration into manageable steps with clear timelines, and offers support for data migration issues"
    weight: 0.25
    description: "Step-by-step migration guidance"
  - type: llm_judge
    criteria: "The price increase is handled sensitively — the $8 to $10 (to $15 after year one) increase is framed with the value of additional WorkHub features and the loyalty discount"
    weight: 0.25
    description: "Sensitive price increase handling"
