meta:
  id: ai-personalization-strategy
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design an AI-driven personalization strategy for welcome sequences"
  tags: [email, ai, personalization, machine-learning, strategy]

state: {}

trigger: |
  "StreamWave" is a music streaming platform with 2M free users and 400K paid
  subscribers ($9.99/month). They want to use AI to hyper-personalize their
  welcome sequence.

  Available data signals:
  - Music preferences from onboarding quiz (genres, artists, moods)
  - Listening behavior in the first 24 hours (if they start listening immediately)
  - Device type (mobile, desktop, smart speaker)
  - Signup source (app store, web, smart TV, social ad)
  - Time zone and listening patterns (morning commute, late night, etc.)
  - Social connections (friends already on the platform)

  Current state: one generic welcome sequence for all 2M users.
  Target: personalized experience that increases free-to-paid conversion from 8% to 14%.

  Design:
  1. An AI personalization architecture for welcome emails
  2. Which data signals matter most and how to use each one
  3. Example welcome emails for 3 very different user personas
  4. How to handle cold-start problem (new users with no listening data yet)
  5. Ethical guardrails for AI-driven personalization
  6. Measurement framework for personalization effectiveness

assertions:
  - type: llm_judge
    criteria: "The AI architecture is well-designed — it explains how data signals are ingested, how personalization models work, how content is dynamically generated, and how the system learns over time"
    weight: 0.25
    description: "Well-designed AI personalization architecture"
  - type: llm_judge
    criteria: "The three persona examples are dramatically different — a hip-hop fan on mobile, a classical listener on desktop, and a casual listener via smart speaker should get vastly different welcome experiences"
    weight: 0.25
    description: "Dramatically different persona experiences"
  - type: llm_judge
    criteria: "The cold-start problem is addressed — clear strategy for personalizing when limited data is available (quiz results, signup source, and device type as initial signals)"
    weight: 0.25
    description: "Cold-start problem addressed"
  - type: llm_judge
    criteria: "Ethical guardrails are defined — limits on data usage, transparency about personalization, opt-out options, and avoiding filter bubbles or manipulative patterns"
    weight: 0.25
    description: "Ethical AI personalization guardrails"
