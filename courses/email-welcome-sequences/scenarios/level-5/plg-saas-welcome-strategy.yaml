meta:
  id: plg-saas-welcome-strategy
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design a welcome strategy for a product-led growth SaaS"
  tags: [email, plg, saas, product-led-growth, strategy]

state: {}

trigger: |
  "CanvasAI" is a product-led growth design tool (think Figma meets AI). They have
  a freemium model with the following tiers:

  Free: Unlimited personal projects, basic AI features
  Pro ($15/month): Team collaboration, advanced AI, custom fonts
  Team ($12/user/month, min 5): Admin controls, shared libraries, SSO
  Enterprise: Custom pricing, dedicated support, SLA

  Growth data:
  - 50K new free signups/month
  - Free-to-Pro conversion: 4.2% (industry avg: 5-7%)
  - Free-to-Team conversion: 1.8% (but Team is 10x more revenue per account)
  - Time to first design created: median 6 hours (competitors: 2 hours)
  - Users who create 3+ designs convert at 22%

  Design a complete welcome email strategy that:
  1. Accelerates time to first design (reduce from 6 hours to under 2)
  2. Identifies and nurtures potential Team plan users (different from Pro users)
  3. Handles the tension between "let users explore freely" (PLG philosophy) and
     "actively guide them" (email marketing instinct)
  4. Includes the full email flow with behavioral triggers and segments

assertions:
  - type: llm_judge
    criteria: "The strategy addresses the PLG tension — emails guide without being pushy, respecting that PLG users expect to self-serve while nudging them toward activation milestones"
    weight: 0.25
    description: "PLG tension between guidance and self-service"
  - type: llm_judge
    criteria: "Team plan identification signals are defined — company email domain, multiple signups from same domain, collaboration feature exploration, and other signals that distinguish Team prospects from Pro prospects"
    weight: 0.25
    description: "Team plan prospect identification signals"
  - type: llm_judge
    criteria: "The time-to-first-design acceleration strategy is specific — includes template suggestions, onboarding tutorials, AI feature highlights, and friction removers, not just 'send more emails'"
    weight: 0.25
    description: "Specific activation acceleration tactics"
  - type: llm_judge
    criteria: "The full email flow is comprehensive — includes timing, behavioral triggers, segment-specific paths, upgrade nudges at the right moments, and suppression rules"
    weight: 0.25
    description: "Comprehensive flow with triggers and segments"
