meta:
  id: freemium-vs-premium-tiers
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design differentiated welcome sequences for free and premium tier users"
  tags: [email, freemium, premium, tier-differentiation, strategy]

state: {}

trigger: |
  "NotionPlus" is a productivity tool with two tiers:

  Free tier: Basic features, 5 workspaces, community support
  Premium ($20/month): Unlimited workspaces, AI assistant, priority support,
  advanced integrations, team features

  They've noticed a problem: free users who upgrade to Premium within the first
  week have 2x the LTV of users who upgrade later. But their welcome sequence
  is the same for everyone.

  Current metrics:
  - Free tier welcome: 5 emails, 4.5% upgrade rate
  - No separate Premium welcome: they just add Premium users to the free sequence
  - Premium users who onboard poorly churn at 45% in the first month

  Design:
  1. An optimized free-tier welcome sequence that identifies and fast-tracks
     high-intent upgraders
  2. A dedicated Premium welcome sequence that justifies the $20/month from Day 1
  3. The handoff experience when a free user upgrades mid-sequence
  4. Win-back strategy for Premium users showing early churn signals

assertions:
  - type: llm_judge
    criteria: "The free-tier sequence includes upgrade-intent signals — identifies which behaviors (hitting limits, exploring Premium features, team usage) indicate readiness to upgrade, and adapts accordingly"
    weight: 0.25
    description: "Upgrade-intent signal identification"
  - type: llm_judge
    criteria: "The Premium welcome sequence is distinctly premium — it feels worth $20/month from the first email, highlighting exclusive features, priority support, and the AI assistant immediately"
    weight: 0.25
    description: "Premium sequence justifies the price"
  - type: llm_judge
    criteria: "The mid-sequence upgrade handoff is seamless — the user doesn't get duplicate emails or miss important Premium onboarding because they were already in the free flow"
    weight: 0.25
    description: "Seamless mid-sequence upgrade handoff"
  - type: llm_judge
    criteria: "The churn prevention strategy uses specific behavioral signals — reduced login frequency, unused Premium features, support ticket patterns — to trigger intervention emails before the user cancels"
    weight: 0.25
    description: "Behavioral churn signal intervention"
