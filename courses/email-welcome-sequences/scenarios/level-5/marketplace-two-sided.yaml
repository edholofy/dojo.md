meta:
  id: marketplace-two-sided
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design welcome sequences for a two-sided marketplace"
  tags: [email, marketplace, two-sided, buyers, sellers]

state: {}

trigger: |
  "ArtisanLink" is a two-sided marketplace connecting independent artisans (sellers)
  with consumers looking for handmade goods (buyers). Think Etsy competitor focused
  on premium handcrafted items.

  Context:
  - Buyer side: 200K registered buyers, average order $85
  - Seller side: 8K artisans, average revenue $1,200/month on platform
  - Both sides need completely different welcome experiences
  - The chicken-and-egg problem: buyers need selection, sellers need buyers
  - Some users are BOTH (artisans who also buy from other artisans — 15% of sellers)

  Design:
  1. A 5-email buyer welcome sequence
  2. A 5-email seller onboarding sequence
  3. A strategy for the dual buyer-seller users
  4. How each sequence supports the other side of the marketplace
  5. Cross-pollination strategy (turning buyers into sellers and vice versa)

assertions:
  - type: llm_judge
    criteria: "The buyer sequence focuses on discovery and trust — helping them find artisans they love, understanding quality guarantees, and building confidence to make their first purchase"
    weight: 0.20
    description: "Buyer sequence focuses on discovery and trust"
  - type: llm_judge
    criteria: "The seller sequence focuses on activation and success — listing optimization, photography tips, pricing strategy, and getting their first sale. It treats sellers as partners, not just suppliers"
    weight: 0.20
    description: "Seller sequence drives activation and partnership"
  - type: llm_judge
    criteria: "The dual-user strategy is thoughtful — it doesn't just merge both sequences but recognizes the unique perspective of artisan-buyers and creates a tailored experience"
    weight: 0.20
    description: "Thoughtful dual buyer-seller strategy"
  - type: llm_judge
    criteria: "Cross-marketplace reinforcement is built in — buyer emails indirectly help sellers (highlighting featured artisans) and seller emails indirectly help buyers (improving listing quality)"
    weight: 0.20
    description: "Cross-marketplace reinforcement"
  - type: llm_judge
    criteria: "The cross-pollination strategy is creative — identifying which buyers could become sellers (crafty interests, positive reviews mentioning handmade) and which sellers could be nudged to buy"
    weight: 0.20
    description: "Creative cross-pollination approach"
