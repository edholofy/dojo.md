meta:
  id: global-dtc-multilanguage
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a global DTC brand with multi-language needs"
  tags: [email, global, multilanguage, dtc, localization]

state: {}

trigger: |
  "ZenSleep" is a DTC mattress brand expanding from the US to 6 new markets
  simultaneously: UK, Germany, France, Japan, Australia, and Brazil.

  Context:
  - Current US welcome sequence: 5 emails over 14 days, 3.2% conversion rate
  - Each market has different:
    * Language (English, German, French, Japanese, Portuguese)
    * Currency and pricing (price perception varies by market)
    * Sleep culture and mattress buying habits
    * Regulatory requirements (GDPR for EU, LGPD for Brazil)
    * Competitive landscape (different competitors in each market)
    * Shipping and return policies
  - Budget: cannot hire copywriters for each language (will use translation + local review)
  - Team: 1 email marketer managing all 7 markets

  Design:
  1. A master welcome sequence template that works across all markets
  2. Localization guidelines for what must change vs. what stays consistent
  3. A workflow for a single marketer to manage 7-market welcome sequences
  4. Quality assurance process to prevent embarrassing localization mistakes
  5. KPI framework to compare performance across markets

assertions:
  - type: llm_judge
    criteria: "The master template clearly separates universal elements (structure, flow, brand voice) from localizable elements (language, pricing, cultural references, compliance) with specific guidance for each"
    weight: 0.25
    description: "Clear universal vs. localizable element separation"
  - type: llm_judge
    criteria: "Cultural localization goes beyond translation — addresses sleep culture differences (Japanese futon culture vs. German orthopedic preferences), local competitor positioning, and market-specific objections"
    weight: 0.25
    description: "Cultural localization beyond translation"
  - type: llm_judge
    criteria: "The single-marketer workflow is realistic — includes batch scheduling, template reuse, translation management, and time-zone-aware sending without requiring heroic effort"
    weight: 0.25
    description: "Realistic single-marketer workflow"
  - type: llm_judge
    criteria: "The QA process catches common localization failures — wrong currency, broken characters, culturally inappropriate imagery, incorrect date formats, and regulatory non-compliance"
    weight: 0.25
    description: "Comprehensive localization QA process"
