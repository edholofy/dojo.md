meta:
  id: revenue-vs-brand-balance
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence balancing short-term revenue with long-term brand"
  tags: [email, brand, revenue, strategy, balance]

state: {}

trigger: |
  "Aura Wellness" is a premium meditation and wellness app ($14.99/month or
  $99.99/year). The CEO and CMO disagree on welcome sequence strategy:

  CEO's position: "We need revenue NOW. The welcome sequence should push for
  paid conversion as aggressively as possible. Every email should have a clear
  path to purchase. We're losing money on free users."

  CMO's position: "Our brand is about calm, mindfulness, and patience. An
  aggressive welcome sequence contradicts our brand values. Users need to
  experience the product and build a meditation habit before we ask them to pay."

  Data:
  - Free-to-paid conversion: 6.8%
  - Users who meditate 7+ days before paywall: 18% conversion
  - Users who hit the paywall on Day 1: 3.1% conversion but higher volume
  - Net Promoter Score: 72 (dropping from 78 six months ago)
  - 30-day churn on paid: 22% (up from 15%)

  Design a welcome sequence that resolves this strategic tension. Present both
  sides' merits, then propose a data-informed approach that serves both goals.

assertions:
  - type: llm_judge
    criteria: "Both the CEO and CMO positions are analyzed fairly — the response doesn't dismiss either perspective but identifies the valid business logic behind each"
    weight: 0.20
    description: "Fair analysis of both positions"
  - type: llm_judge
    criteria: "The data is used to support the recommendation — the 18% vs. 3.1% conversion gap, dropping NPS, and rising churn are all woven into the strategic argument"
    weight: 0.25
    description: "Data-driven strategic recommendation"
  - type: llm_judge
    criteria: "The proposed sequence finds a genuine middle ground — it's not just a compromise but a strategy that serves both short-term revenue and long-term brand health"
    weight: 0.30
    description: "Genuine middle ground strategy"
  - type: llm_judge
    criteria: "The sequence design reflects the wellness brand — emails embody mindfulness and calm while still moving users toward paid conversion, proving these aren't mutually exclusive"
    weight: 0.25
    description: "Brand-consistent conversion approach"
