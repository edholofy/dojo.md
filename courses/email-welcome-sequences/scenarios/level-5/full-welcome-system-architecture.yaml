meta:
  id: full-welcome-system-architecture
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Architect a complete welcome email system with automation rules"
  tags: [email, architecture, automation, system-design, comprehensive]

state: {}

trigger: |
  "ShopStream" is an e-commerce platform (like Shopify but for niche markets)
  with 50K merchants and 12M end consumers. They need a complete welcome email
  infrastructure.

  The challenge: they need FOUR different welcome systems running simultaneously:

  1. Merchant welcome: when a new merchant signs up for ShopStream (B2B SaaS onboarding)
  2. Consumer welcome: when a shopper creates an account on ANY ShopStream store
  3. Merchant-to-consumer: each merchant's own welcome sequence for THEIR customers
     (ShopStream provides templates; merchants customize)
  4. Marketplace welcome: when someone signs up for the ShopStream marketplace
     (browse all merchants)

  Each system has different goals, audiences, senders, and compliance requirements.

  Design the complete architecture:
  1. System diagram showing how all four welcome systems coexist
  2. Data flow: who triggers what, when, with what data
  3. Conflict resolution: what happens when a consumer triggers multiple welcomes
  4. Template system for merchant-customizable welcome sequences
  5. Deliverability strategy (separate sending domains, reputation management)
  6. Reporting dashboard that gives ShopStream visibility into all four systems

assertions:
  - type: llm_judge
    criteria: "All four welcome systems are clearly defined — each has distinct goals, audiences, email content, and success metrics. The architecture shows how they coexist without conflict"
    weight: 0.25
    description: "Four distinct welcome systems clearly architected"
  - type: llm_judge
    criteria: "Conflict resolution is addressed — if a consumer creates an account on a merchant store AND the marketplace, the system prevents duplicate or conflicting welcome emails"
    weight: 0.25
    description: "Multi-system conflict resolution"
  - type: llm_judge
    criteria: "The merchant template system is practical — merchants can customize their welcome sequences within guardrails that maintain deliverability and compliance"
    weight: 0.25
    description: "Practical merchant template system"
  - type: llm_judge
    criteria: "The deliverability strategy addresses multi-tenant sending — separate domains, IP warm-up, reputation isolation so one bad merchant doesn't tank everyone's deliverability"
    weight: 0.25
    description: "Multi-tenant deliverability strategy"
