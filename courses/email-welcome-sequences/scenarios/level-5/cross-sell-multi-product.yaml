meta:
  id: cross-sell-multi-product
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Design welcome sequences for a multi-product company with cross-sell goals"
  tags: [email, cross-sell, multi-product, upsell, portfolio]

state: {}

trigger: |
  "CreatorSuite" offers 4 products for content creators:
  1. VideoEdit Pro — video editing software ($19/month)
  2. ThumbnailMaker — thumbnail design tool ($9/month)
  3. AnalyticsDash — YouTube/social analytics ($14/month)
  4. MusicLib — royalty-free music library ($12/month)

  Bundle: All 4 for $39/month (28% savings)

  Problem: Each product has its own welcome sequence, but they don't cross-sell.
  A user who signs up for VideoEdit never hears about ThumbnailMaker, even though
  74% of video editors also need thumbnail tools.

  Cross-sell data:
  - VideoEdit → ThumbnailMaker: 74% overlap in needs
  - VideoEdit → MusicLib: 68% overlap
  - AnalyticsDash → VideoEdit: 45% overlap
  - ThumbnailMaker → VideoEdit: 82% overlap
  - Any 2 products → Bundle: 55% conversion when presented

  Design:
  1. How to integrate cross-sell into each product's welcome sequence
  2. Timing: when to introduce other products without distracting from onboarding
  3. Bundle promotion strategy within the welcome flow
  4. Suppression rules: don't cross-sell products they already own
  5. Example: full welcome flow for a VideoEdit signup including cross-sell touchpoints

assertions:
  - type: llm_judge
    criteria: "Cross-sell timing is strategic — products are introduced AFTER the user has activated on their primary product, not before. Onboarding success comes first, cross-sell second"
    weight: 0.25
    description: "Cross-sell after primary activation"
  - type: llm_judge
    criteria: "Cross-sell is natural, not forced — other products are introduced as solutions to problems the user likely has (editing video? you probably need thumbnails too) rather than generic promotions"
    weight: 0.25
    description: "Natural problem-solution cross-sell framing"
  - type: llm_judge
    criteria: "The bundle is positioned as a value upgrade — presented when a user shows interest in 2+ products, with clear savings math that makes the bundle obviously better than individual subscriptions"
    weight: 0.25
    description: "Strategic bundle positioning"
  - type: llm_judge
    criteria: "Suppression rules are comprehensive — no cross-selling products already owned, no bundle promotion to users who already have it, and proper handling of users who own 3 products (promote adding the 4th, not the bundle)"
    weight: 0.25
    description: "Comprehensive suppression rules"
