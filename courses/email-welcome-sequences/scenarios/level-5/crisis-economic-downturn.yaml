meta:
  id: crisis-economic-downturn
  level: 5
  course: email-welcome-sequences
  type: output
  description: "Adapt a welcome sequence for an economic downturn context"
  tags: [email, crisis, economic-downturn, sensitivity, adaptation]

state: {}

trigger: |
  It's Q3 2026 and the economy is in a recession. "SkillBridge" is an online
  professional development platform ($29/month) that helps people upskill for
  career advancement.

  Context:
  - Unemployment has risen from 3.8% to 6.2%
  - Their subscriber mix has shifted: 40% are now unemployed job seekers (up from 10%)
  - Current welcome sequence was written during a bull market and focuses on
    "advance your career" and "get promoted faster" messaging
  - Revenue is down 25% but new signups are up 15% (more people seeking skills)
  - They've introduced a hardship discount (50% off for unemployed subscribers)
  - Competitors are raising prices; SkillBridge is holding steady

  Redesign the welcome sequence to:
  1. Acknowledge the economic reality without being depressing
  2. Serve BOTH audiences (employed upskilling AND unemployed job seeking)
  3. Position the $29/month investment as worthwhile during budget-conscious times
  4. Introduce the hardship discount sensitively to those who need it
  5. Avoid tone-deaf messaging that ignores the economic context

assertions:
  - type: llm_judge
    criteria: "The tone acknowledges the recession without being doom-and-gloom — it's empathetic and realistic while maintaining hope and agency. 'The market is tough, and here's how we can help'"
    weight: 0.25
    description: "Empathetic recession-aware tone"
  - type: llm_judge
    criteria: "Both audience segments are served — employed subscribers get career-advancement messaging while unemployed subscribers get job-search and reskilling messaging, possibly via segmented paths"
    weight: 0.25
    description: "Both employed and unemployed segments served"
  - type: llm_judge
    criteria: "The hardship discount is introduced with dignity — it's not patronizing or pity-driven but presented as a matter-of-fact option that respects the subscriber's situation"
    weight: 0.25
    description: "Dignified hardship discount introduction"
  - type: llm_judge
    criteria: "The value justification is recession-appropriate — $29/month is positioned as an investment in future earning potential, with ROI framing that makes sense when budgets are tight"
    weight: 0.25
    description: "Recession-appropriate value justification"
