meta:
  id: b2b-saas-trial-to-paid
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a B2B SaaS welcome sequence driving trial to paid conversion"
  tags: [email, b2b, saas, trial-conversion, onboarding]

state: {}

trigger: |
  Design a 5-email welcome/onboarding sequence for "CloudMetrics," a B2B analytics
  dashboard platform for marketing teams.

  Context:
  - 14-day free trial, no credit card required
  - Pricing: $199/month (Team plan, up to 10 users)
  - Trial-to-paid conversion rate: 8% (industry avg: 15-20%)
  - Key activation metrics (from data):
    * Users who connect 1+ data source convert at 35%
    * Users who create a custom dashboard convert at 42%
    * Users who invite a teammate convert at 55%
  - The product requires technical setup (API connections)
  - Target: Marketing Directors at companies with 50-500 employees
  - Average time to first value: currently 4 days (too long)

  For each email, provide subject line, body, CTA, timing, and the behavioral
  trigger/condition for sending. The sequence should systematically drive users
  through the activation metrics identified above.

assertions:
  - type: llm_judge
    criteria: "The sequence is designed around the three activation metrics — connecting a data source, creating a dashboard, and inviting a teammate. Each email targets one of these milestones"
    weight: 0.25
    description: "Sequence targets activation metrics"
  - type: llm_judge
    criteria: "Behavioral triggers are specified — emails are sent based on what the user has/hasn't done in the product, not just on a fixed time schedule"
    weight: 0.25
    description: "Behavioral triggers drive send logic"
  - type: llm_judge
    criteria: "Technical setup friction is addressed — the emails provide clear instructions, link to docs, or offer setup assistance for the API connection step"
    weight: 0.25
    description: "Technical setup friction addressed"
  - type: llm_judge
    criteria: "The sequence appropriately builds toward a conversion ask — it doesn't ask for the sale until value has been demonstrated, and the conversion email references the specific value the user has experienced"
    weight: 0.25
    description: "Conversion ask follows demonstrated value"
