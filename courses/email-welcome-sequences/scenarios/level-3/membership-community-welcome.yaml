meta:
  id: membership-community-welcome
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a paid membership community"
  tags: [email, community, membership, onboarding, retention]

state: {}

trigger: |
  Design a 5-email welcome sequence for "IndieFounders Club," a paid community
  for bootstrapped SaaS founders ($49/month).

  Context:
  - New member just paid and received access to the community platform (Circle)
  - Community features: weekly expert AMAs, peer mastermind groups, resource library,
    accountability partners, deal board (discounts on SaaS tools)
  - 60-day churn rate: 35% (most churners never participated beyond reading)
  - The #1 predictor of retention: members who post in their first week stay 4x longer
  - There are 850 active members
  - Brand voice: founder-to-founder, honest, no-hype

  The sequence must get new members to POST (not just lurk) within their first week.

assertions:
  - type: llm_judge
    criteria: "The sequence is laser-focused on driving first-week participation — each email provides a specific, low-friction reason to post or engage in the community"
    weight: 0.30
    description: "Drives first-week posting specifically"
  - type: llm_judge
    criteria: "The suggested first actions are progressively easier — starting with something simple like an introduction post, then building to more engaged activities like joining a mastermind group"
    weight: 0.25
    description: "Progressive action difficulty"
  - type: llm_judge
    criteria: "The emails highlight specific community features that deliver immediate value — not a generic tour, but 'here's an AMA happening tomorrow you should join' or 'here's a deal board saving members $X/month'"
    weight: 0.25
    description: "Specific high-value features highlighted"
  - type: llm_judge
    criteria: "The tone is founder-to-founder — it speaks as a peer, not a platform. It acknowledges the challenges of building a bootstrapped business and frames the community as a support system"
    weight: 0.20
    description: "Authentic founder-to-founder tone"
