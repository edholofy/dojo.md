meta:
  id: fitness-subscription-welcome
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a fitness subscription box"
  tags: [email, fitness, subscription, retention, onboarding]

state: {}

trigger: |
  Design a 4-email welcome sequence for "FuelBox," a monthly fitness nutrition
  subscription box ($49/month).

  Context:
  - New subscriber just placed their first order (ships in 5 days)
  - Box contents: protein bars, supplements, healthy snacks (personalized to goals)
  - During signup they selected a goal: weight loss, muscle gain, or general wellness
  - This subscriber selected: "muscle gain"
  - 30-day churn rate is 22% (industry average: 12%) — the biggest drop-off happens
    BEFORE the first box arrives
  - Brand voice: energetic, motivational, gym-bro-adjacent but inclusive

  The sequence must keep the subscriber excited and reduce churn BEFORE
  their first box even arrives.

assertions:
  - type: llm_judge
    criteria: "The sequence addresses the pre-arrival churn problem — emails are specifically designed to maintain excitement and build anticipation during the 5-day wait before the first box ships"
    weight: 0.30
    description: "Addresses pre-arrival churn specifically"
  - type: llm_judge
    criteria: "Content is personalized to the muscle gain goal — workout tips, nutrition advice, and product highlights are all framed around building muscle, not generic fitness content"
    weight: 0.25
    description: "Personalized to muscle gain goal"
  - type: llm_judge
    criteria: "The emails provide value before the box arrives — perhaps a workout plan, a nutrition guide, or a community invitation that makes them feel like the subscription has already started delivering"
    weight: 0.25
    description: "Value delivered before physical box arrives"
  - type: llm_judge
    criteria: "The tone is energetic and motivational without being exclusionary — it uses fitness enthusiasm that welcomes beginners, not just gym veterans"
    weight: 0.20
    description: "Energetic motivational inclusive tone"
