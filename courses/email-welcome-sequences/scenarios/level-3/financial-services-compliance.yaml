meta:
  id: financial-services-compliance
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Write a compliance-aware welcome sequence for a financial services company"
  tags: [email, finance, compliance, regulated, welcome]

state: {}

trigger: |
  Design a 4-email welcome sequence for "WealthPath," a robo-advisor investment
  platform for first-time investors.

  Context:
  - New user created an account but hasn't deposited funds yet
  - Minimum investment: $500
  - Target: young professionals (25-35) who are intimidated by investing
  - The platform is SEC-registered and must comply with financial regulations
  - ALL emails must include required disclaimers without killing engagement
  - Competitor advantage: simpler than Betterment, more educational than Wealthfront
  - Brand voice: trustworthy, educational, patient

  Regulatory requirements that MUST be in every email:
  - "Investing involves risk, including possible loss of principal"
  - Link to ADV Part 2 brochure
  - "Past performance does not guarantee future results"
  - SIPC membership disclosure

  The challenge: be engaging and approachable while meeting compliance requirements.

assertions:
  - type: llm_judge
    criteria: "All four required disclaimers are present in every email — risk disclosure, ADV brochure link, past performance disclaimer, and SIPC disclosure"
    weight: 0.25
    description: "All required disclaimers in every email"
  - type: llm_judge
    criteria: "The disclaimers are handled gracefully — they don't dominate the email or kill the engaging tone. They're placed appropriately (likely in footers) and formatted to be compliant without being the first thing a reader sees"
    weight: 0.25
    description: "Disclaimers handled gracefully"
  - type: llm_judge
    criteria: "The sequence addresses investing intimidation — it systematically reduces fear through education, showing that investing isn't just for Wall Street experts"
    weight: 0.25
    description: "Addresses investing intimidation"
  - type: llm_judge
    criteria: "No email makes promises about returns or uses language that could be construed as financial advice — the copy is carefully worded to educate and inform without crossing regulatory lines"
    weight: 0.25
    description: "No promises or implied financial advice"
