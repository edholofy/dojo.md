meta:
  id: online-course-creator-funnel
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a welcome funnel for an online course creator"
  tags: [email, course-creator, funnel, education]

state: {}

trigger: |
  Design a 6-email welcome-to-enrollment funnel for "PhotoPro Academy," an online
  photography course by a professional photographer with 100K Instagram followers.

  Context:
  - Lead magnet: "5 Camera Settings That Instantly Improve Your Photos" (free PDF)
  - Main offer: "Master Manual Mode" 8-week online course ($297 or 3 payments of $109)
  - Target audience: hobby photographers who rely on Auto mode and want to go manual
  - Pain point: they know their photos could be better but don't understand settings
  - The photographer has a personal, mentor-like brand (first-name basis)
  - Open rate from lead magnet: 68%, but enrollment rate is only 0.8%

  Design the full 6-email funnel from lead magnet delivery to enrollment.
  The funnel needs to 7x the enrollment rate from 0.8% to at least 5%.

assertions:
  - type: llm_judge
    criteria: "The 6-email funnel follows a strategic arc — deliver lead magnet, demonstrate expertise, provide quick wins, build trust through social proof, handle objections, and close with urgency"
    weight: 0.25
    description: "Strategic 6-email funnel arc"
  - type: llm_judge
    criteria: "The quick-win emails demonstrate the instructor's teaching ability — by giving genuinely useful photography tips, the subscriber experiences the teaching style before buying"
    weight: 0.25
    description: "Quick wins demonstrate teaching ability"
  - type: llm_judge
    criteria: "The payment plan option is presented strategically — $109/month is positioned as an accessible alternative to the full $297, reducing price objection without cheapening the offer"
    weight: 0.20
    description: "Payment plan positioned strategically"
  - type: llm_judge
    criteria: "The personal, mentor-like tone is maintained throughout — emails read like they're from a real person who cares about the subscriber's photography growth, not a marketing funnel"
    weight: 0.30
    description: "Authentic mentor-like tone throughout"
