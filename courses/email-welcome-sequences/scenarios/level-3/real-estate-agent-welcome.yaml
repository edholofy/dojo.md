meta:
  id: real-estate-agent-welcome
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a real estate agent's lead nurture"
  tags: [email, real-estate, lead-nurture, agent]

state: {}

trigger: |
  Design a 5-email welcome sequence for Sarah Chen, a real estate agent in Austin, TX.

  Context:
  - Lead source: subscriber downloaded "Austin Neighborhood Guide 2026" from her website
  - Sarah specializes in helping first-time homebuyers in the $350K-$550K range
  - Austin market: competitive, median price $475K, inventory improving but still tight
  - Most leads are 6-12 months from buying
  - Sarah's differentiator: she's also a licensed home inspector (unique expertise)
  - Goal: nurture leads until they're ready to tour homes, then schedule a call
  - Brand voice: knowledgeable local expert, friendly neighbor, not pushy salesperson

  The sequence should build trust over time and position Sarah as the obvious
  choice when the subscriber is ready to buy.

assertions:
  - type: llm_judge
    criteria: "The sequence is patient — it respects that most leads are 6-12 months from buying and doesn't push for appointments too early. The first few emails deliver value without asking for anything"
    weight: 0.25
    description: "Patient approach for long-timeline leads"
  - type: llm_judge
    criteria: "Sarah's unique inspection expertise is highlighted strategically — it differentiates her from other agents and provides unique value that subscribers can't get elsewhere"
    weight: 0.25
    description: "Inspection expertise used as differentiator"
  - type: llm_judge
    criteria: "Local Austin market knowledge is demonstrated — specific neighborhoods, price trends, and market conditions are referenced to establish Sarah as a knowledgeable local expert"
    weight: 0.25
    description: "Demonstrates Austin market expertise"
  - type: llm_judge
    criteria: "The tone is friendly neighbor, not pushy agent — Sarah feels like a helpful local expert who genuinely wants to help, not someone trying to close a deal"
    weight: 0.25
    description: "Friendly expert tone, not pushy sales"
