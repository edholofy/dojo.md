meta:
  id: b2b-enterprise-nurture
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a B2B enterprise welcome nurture sequence"
  tags: [email, b2b, enterprise, nurture, long-cycle]

state: {}

trigger: |
  Design a 6-email welcome nurture sequence for "SecureShield," a cybersecurity
  platform for enterprises (1000+ employees).

  Context:
  - Lead source: subscriber downloaded "2026 Cybersecurity Threat Report" at a conference
  - Deal size: $50K-$500K annual contracts
  - Sales cycle: 6-12 months
  - Decision makers: CISO, CTO, VP of IT
  - The welcome sequence's goal is NOT to sell — it's to warm leads for sales handoff
  - Handoff criteria: lead engages with 3+ emails AND visits the pricing page
  - Competitors: CrowdStrike, Palo Alto Networks, SentinelOne
  - Key differentiator: AI-powered threat detection with 99.7% accuracy

  For each email, include: timing, subject line, content summary, CTA, and the
  strategic goal of that email in the nurture journey.

assertions:
  - type: llm_judge
    criteria: "The sequence is designed for a long sales cycle — emails are spaced appropriately (weekly or bi-weekly) and don't rush toward a sale. The tone is consultative and educational"
    weight: 0.25
    description: "Pacing matches long enterprise sales cycle"
  - type: llm_judge
    criteria: "Content is executive-appropriate — it speaks to CISOs and CTOs with data, research, and strategic insights. No fluffy marketing language or entry-level explanations"
    weight: 0.25
    description: "Executive-level content and tone"
  - type: llm_judge
    criteria: "The sequence systematically builds the case for SecureShield's differentiation — the AI accuracy claim is supported with evidence across multiple emails rather than stated once"
    weight: 0.25
    description: "Systematic differentiation building"
  - type: llm_judge
    criteria: "The sales handoff criteria (3+ engagements + pricing page visit) is supported by the sequence design — emails strategically include pricing-page links at appropriate moments"
    weight: 0.25
    description: "Sequence supports handoff criteria"
