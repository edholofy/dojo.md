meta:
  id: nonprofit-donor-cultivation
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a nonprofit welcome sequence for new donor cultivation"
  tags: [email, nonprofit, donor, cultivation, mission]

state: {}

trigger: |
  Design a 4-email welcome sequence for "OceanHope," a marine conservation nonprofit.

  Context:
  - New subscriber signed up after reading a viral article about coral reef decline
  - They have NOT donated yet — this is an email subscriber, not a donor
  - OceanHope's programs: reef restoration, ocean cleanup, marine education
  - Annual fundraising goal: $2.5M (currently at $1.8M)
  - Average first-time donation: $35
  - Brand voice: hopeful and action-oriented, not doom-and-gloom
  - The founder is a former marine biologist turned activist (compelling story)

  The sequence should cultivate the subscriber from "interested reader" to
  "first-time donor" without feeling manipulative or guilt-driven.

assertions:
  - type: llm_judge
    criteria: "The sequence inspires action through hope, not guilt — it shows progress being made, not just problems. The subscriber feels that donating is joining a winning movement, not feeding a bottomless crisis"
    weight: 0.30
    description: "Hope-driven not guilt-driven approach"
  - type: llm_judge
    criteria: "The founder's story is used effectively — the marine biologist-to-activist narrative adds authenticity and creates personal connection without dominating every email"
    weight: 0.20
    description: "Effective use of founder story"
  - type: llm_judge
    criteria: "The donation ask comes at the right time — not in Email #1 (too soon) but after establishing emotional connection and demonstrating impact. The ask is specific ($35) and tied to a tangible outcome"
    weight: 0.30
    description: "Well-timed donation ask with tangible outcome"
  - type: llm_judge
    criteria: "Impact metrics are concrete — the email shows exactly what donations achieve (e.g., '$35 restores 10 square feet of coral reef') rather than vague claims about 'making a difference'"
    weight: 0.20
    description: "Concrete impact metrics"
