meta:
  id: restaurant-food-delivery-welcome
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a local restaurant's online ordering"
  tags: [email, restaurant, food-delivery, local-business]

state: {}

trigger: |
  Design a 3-email welcome sequence for "Nana's Kitchen," a family-owned Italian
  restaurant that recently launched online ordering and delivery.

  Context:
  - New customer just placed their first online order (arriving in 45 minutes)
  - Restaurant has been in the neighborhood for 25 years, loved by locals
  - They launched online ordering 3 months ago and struggle with repeat orders
  - Repeat order rate: 15% (goal: 40%)
  - Menu: traditional Italian, made from family recipes, uses local ingredients
  - They have a loyalty program (10th order free) but nobody's signing up
  - Brand voice: warm, familial, like getting an email from an Italian grandmother

  The sequence should turn a first-time online orderer into a regular.

assertions:
  - type: llm_judge
    criteria: "The sequence captures the warmth and personality of a 25-year family restaurant — it doesn't read like corporate restaurant chain marketing but like a genuine family business"
    weight: 0.30
    description: "Warm family restaurant personality"
  - type: llm_judge
    criteria: "Email timing accounts for the food delivery context — Email #1 is sent at the right moment (with order confirmation or after delivery), not while they're waiting for food"
    weight: 0.20
    description: "Timing respects food delivery context"
  - type: llm_judge
    criteria: "The loyalty program is introduced naturally — it feels like an invitation to the family, not a corporate rewards scheme. The value proposition is clear and motivating"
    weight: 0.25
    description: "Natural loyalty program introduction"
  - type: llm_judge
    criteria: "The sequence gives specific reasons to order again — perhaps a signature dish recommendation, a chef's special preview, or a 'dishes you haven't tried yet' angle"
    weight: 0.25
    description: "Specific reasons for repeat orders"
