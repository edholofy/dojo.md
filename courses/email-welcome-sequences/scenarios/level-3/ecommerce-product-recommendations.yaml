meta:
  id: ecommerce-product-recommendations
  level: 3
  course: email-welcome-sequences
  type: output
  description: "Write an e-commerce welcome sequence with personalized product recommendations"
  tags: [email, ecommerce, recommendations, personalization]

state: {}

trigger: |
  Design a 4-email welcome sequence for "HomeNest," an online furniture and home
  décor store. The sequence must incorporate product recommendations based on
  browse behavior.

  Context:
  - New subscriber: browsed 3 product categories before signing up
    (living room sofas, coffee tables, and throw pillows)
  - Signed up via exit-intent popup offering free shipping on first order
  - Average order value: $340
  - Brand voice: sophisticated but accessible, design-forward
  - Key differentiator: 3D room visualization tool on website

  For each email:
  1. Full email with subject line and body
  2. Which product recommendations to include and why
  3. How browse history data informs the content

  The recommendations should feel helpful, not creepy — like a friend who noticed
  what they were looking at, not surveillance.

assertions:
  - type: llm_judge
    criteria: "Product recommendations are clearly informed by browse behavior — sofas, coffee tables, and throw pillows are featured, with complementary items that make sense as a living room ensemble"
    weight: 0.25
    description: "Browse-informed product recommendations"
  - type: llm_judge
    criteria: "The recommendations feel helpful, not invasive — the email doesn't say 'We noticed you looked at...' in a surveillance-like way, but presents curated picks that happen to match their interests"
    weight: 0.25
    description: "Helpful not creepy recommendation tone"
  - type: llm_judge
    criteria: "The 3D room visualization tool is strategically introduced — it's positioned as a value-add that helps the subscriber envision the products in their space, reducing purchase anxiety"
    weight: 0.25
    description: "Strategic 3D tool introduction"
  - type: llm_judge
    criteria: "The sequence builds toward a high-AOV first purchase — it doesn't just push individual items but cross-sells a coordinated set (sofa + table + pillows) that increases cart value"
    weight: 0.25
    description: "Builds toward high-AOV purchase"
