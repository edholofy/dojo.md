meta:
  id: two-path-segmentation
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence with two segmented paths"
  tags: [email, segmentation, paths, personalization]

state: {}

trigger: |
  "StyleBox" is a clothing subscription service with two customer types who
  sign up through different forms:

  Path A: "Dress Me" subscribers — want a stylist to pick everything
  Path B: "My Picks" subscribers — want to browse and choose their own items

  Both paths start with the same welcome email, but Email #2 and #3 diverge.

  Design:
  1. The shared Email #1 (works for both segments)
  2. Email #2 for Path A (Dress Me)
  3. Email #2 for Path B (My Picks)
  4. Email #3 for Path A (Dress Me)
  5. Email #3 for Path B (My Picks)

  Include send timing and subject lines for each email.

assertions:
  - type: llm_judge
    criteria: "Email #1 successfully serves both segments — it welcomes all subscribers without assuming which path they chose, while still being specific enough to feel personal"
    weight: 0.20
    description: "Shared Email #1 works for both segments"
  - type: llm_judge
    criteria: "Path A emails focus on building trust in the stylist service — addressing the fear of losing control, showing stylist credentials, explaining the preference quiz"
    weight: 0.20
    description: "Path A builds stylist trust"
  - type: llm_judge
    criteria: "Path B emails focus on empowering self-selection — showcasing the catalog, teaching how to filter/browse, and highlighting the variety available"
    weight: 0.20
    description: "Path B empowers self-selection"
  - type: llm_judge
    criteria: "The two paths feel genuinely different — they address different motivations, fears, and desired outcomes, not just minor copy variations"
    weight: 0.20
    description: "Paths are genuinely differentiated"
  - type: llm_judge
    criteria: "Each email has appropriate timing and compelling subject lines — timing reflects the different decision processes of each segment"
    weight: 0.20
    description: "Appropriate timing and subject lines per path"
