meta:
  id: brand-story-email
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Write Email #2 (brand story) for a DTC brand's welcome sequence"
  tags: [email, brand-story, dtc, sequence]

state: {}

trigger: |
  Write Email #2 (the brand story email) for "Solara," a DTC sustainable sunglasses brand.

  Context:
  - Email #1 (sent yesterday) delivered a 20% discount code and welcomed them
  - This is Day 2 of the welcome sequence
  - Brand backstory: founded by two marine biologists who saw ocean plastic firsthand.
    Each pair of Solara sunglasses is made from 5 recycled ocean plastic bottles.
  - Price range: $85-$145 (premium but justifiable)
  - Target: environmentally-conscious millennials and Gen Z

  The email should make the subscriber feel emotionally connected to the brand's
  mission WITHOUT being preachy. The story should make them feel good about
  choosing Solara, not guilty about plastic.

assertions:
  - type: llm_judge
    criteria: "The brand story is emotionally compelling — the founding story of marine biologists encountering ocean plastic is told in a way that creates connection, not a press release"
    weight: 0.30
    description: "Emotionally compelling brand story"
  - type: llm_judge
    criteria: "The tone inspires rather than guilt-trips — the subscriber should feel excited about being part of the solution, not ashamed about the problem. Positive framing throughout"
    weight: 0.30
    description: "Inspiring not guilt-tripping"
  - type: llm_judge
    criteria: "The '5 recycled bottles per pair' statistic is woven in naturally — it's concrete proof of impact without feeling like a marketing claim or greenwashing"
    weight: 0.20
    description: "Concrete impact stats woven naturally"
  - type: llm_judge
    criteria: "There is a soft CTA that moves them toward purchase — perhaps 'See the collection' or 'Meet our bestsellers' — without hard-selling. This is a trust-building email, not a conversion email"
    weight: 0.20
    description: "Soft CTA moves toward purchase"
