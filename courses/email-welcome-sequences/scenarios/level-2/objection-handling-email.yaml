meta:
  id: objection-handling-email
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Write Email #4 (objection handling) for an online course welcome sequence"
  tags: [email, objection-handling, course, conversion]

state: {}

trigger: |
  Write Email #4 (objection handling) for "DesignMastery," an online UI/UX design
  course priced at $497.

  Context:
  - Email #1 (Day 0): Welcome + free lesson preview
  - Email #2 (Day 2): Instructor bio + course curriculum overview
  - Email #3 (Day 5): Student success stories
  - Email #4 (Day 7): THIS EMAIL — Address objections before the enrollment push
  - Email #5 (Day 10): Final enrollment CTA with urgency
  - Target: junior developers who want to transition into design
  - Enrollment rate from email: currently 1.2% (goal: 3%)

  Known objections from customer research:
  1. "I don't have a design background — is this for me?"
  2. "$497 is a lot — will I actually finish it?"
  3. "Can't I just learn this from free YouTube tutorials?"
  4. "I don't have time — I work full-time"

  Address all four objections naturally within a single email.

assertions:
  - type: llm_judge
    criteria: "All four objections are addressed — each one is acknowledged honestly (not dismissed) and reframed with compelling counter-arguments and evidence"
    weight: 0.30
    description: "All four objections addressed honestly"
  - type: llm_judge
    criteria: "The objections flow naturally within the email — they don't read like an FAQ list but are woven into a cohesive narrative that anticipates and resolves doubt"
    weight: 0.25
    description: "Objections woven naturally, not FAQ-style"
  - type: llm_judge
    criteria: "The 'free YouTube' objection is handled with particular nuance — acknowledging that free resources exist while explaining the value of structured, curated learning with feedback"
    weight: 0.25
    description: "Nuanced handling of free-alternative objection"
  - type: llm_judge
    criteria: "The email ends by setting up Email #5 (enrollment push) — it plants the seed that action is coming soon without being the hard-sell email itself"
    weight: 0.20
    description: "Sets up next email's enrollment push"
