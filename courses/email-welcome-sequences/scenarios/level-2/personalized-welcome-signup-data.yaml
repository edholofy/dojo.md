meta:
  id: personalized-welcome-signup-data
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Write a welcome email using signup form data for personalization"
  tags: [email, personalization, signup-data, dynamic-content]

state: {}

trigger: |
  "MealPrep Pro" is a meal planning app. During signup, users answer 3 questions:
  1. Diet type: Keto, Vegan, Mediterranean, or No preference
  2. Cooking skill: Beginner, Intermediate, Advanced
  3. Household size: 1, 2, 3-4, 5+

  Write a welcome email template that dynamically adapts based on these answers.
  Show how the email changes for these two example subscribers:

  Subscriber A: Keto diet, Beginner cook, Household of 2
  Subscriber B: Vegan diet, Advanced cook, Household of 5+

  Provide:
  1. The email template with dynamic content blocks marked
  2. The fully rendered version for Subscriber A
  3. The fully rendered version for Subscriber B

assertions:
  - type: llm_judge
    criteria: "The template clearly marks which sections are dynamic — it's obvious which content blocks swap based on diet type, skill level, and household size"
    weight: 0.25
    description: "Clear dynamic content block marking"
  - type: llm_judge
    criteria: "The two rendered emails feel genuinely personalized — they don't just swap one word; the recipes, tips, and messaging adapt meaningfully to each subscriber's profile"
    weight: 0.30
    description: "Meaningful personalization in both versions"
  - type: llm_judge
    criteria: "The personalization adds value — a Keto beginner gets different starter recipes and simpler instructions than a Vegan advanced cook who gets more complex, creative recipes"
    weight: 0.25
    description: "Personalization adds genuine value"
  - type: llm_judge
    criteria: "The static elements (brand voice, structure, CTA) remain consistent across both versions — the email is recognizably from the same brand regardless of personalization"
    weight: 0.20
    description: "Consistent brand across personalized versions"
