meta:
  id: four-email-saas-sequence
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Design a 4-email welcome sequence for a SaaS trial"
  tags: [email, sequence, saas, trial, onboarding]

state: {}

trigger: |
  Design a 4-email onboarding welcome sequence for "InvoiceSnap," a simple
  invoicing tool for freelancers.

  Context:
  - User started a 14-day free trial
  - The tool's "aha moment" is sending their first invoice (takes 3 minutes)
  - Competitor: FreshBooks (InvoiceSnap is simpler and cheaper at $9/month)
  - 40% of trial users never send their first invoice
  - Brand voice: helpful, no-nonsense, respects that freelancers are busy

  For each email provide:
  1. Send timing
  2. Subject line and preview text
  3. Full email body
  4. CTA
  5. What happens if the user already took the target action (branching note)

  The sequence goal: get trial users to send their first invoice within 3 days.

assertions:
  - type: llm_judge
    criteria: "The sequence is strategically designed to drive the aha moment (sending first invoice) — Email 1 introduces it, Email 2 provides a walkthrough, Email 3 addresses friction, Email 4 creates urgency"
    weight: 0.25
    description: "Sequence drives aha moment strategically"
  - type: llm_judge
    criteria: "Each email includes branching logic notes — what happens if the user already sent an invoice (skip to next stage), preventing irrelevant emails from being sent"
    weight: 0.25
    description: "Branching logic for completed actions"
  - type: llm_judge
    criteria: "The copy respects that freelancers are busy — emails are concise, focused, and every sentence earns its place. No fluff or unnecessary brand storytelling"
    weight: 0.25
    description: "Concise copy respecting busy freelancers"
  - type: llm_judge
    criteria: "The sequence addresses common friction points — such as not knowing how to start, importing client data, customizing invoice templates — and removes them proactively"
    weight: 0.25
    description: "Proactively addresses friction points"
