meta:
  id: sequence-timing-cadence
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Plan optimal timing and cadence for a welcome sequence"
  tags: [email, timing, cadence, strategy]

state: {}

trigger: |
  A DTC candle brand "WickCraft" currently sends this welcome sequence:
  - Email 1 (Day 0): Welcome + 10% off
  - Email 2 (Day 1): Brand story
  - Email 3 (Day 2): Bestsellers
  - Email 4 (Day 3): Customer reviews
  - Email 5 (Day 4): Discount reminder

  Their data shows:
  - Email 1: 72% open rate, 12% click rate
  - Email 2: 45% open rate, 3% click rate
  - Email 3: 38% open rate, 5% click rate
  - Email 4: 22% open rate, 2% click rate
  - Email 5: 18% open rate, 4% click rate
  - Unsubscribe spike after Email 3

  Diagnose the timing problem and redesign the cadence. Provide:
  1. What's wrong with the current cadence
  2. Recommended new timing for each email
  3. Whether any emails should be reordered, combined, or removed
  4. Expected impact on engagement metrics

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly identifies that 5 emails in 5 days is too aggressive — the engagement drop and unsubscribe spike are symptoms of fatigue from daily emails"
    weight: 0.30
    description: "Correctly diagnoses cadence fatigue"
  - type: llm_judge
    criteria: "The recommended cadence spaces emails further apart — moving from daily to every 2-3 days, with the full sequence spanning 10-14 days instead of 5"
    weight: 0.25
    description: "Recommends appropriately spaced cadence"
  - type: llm_judge
    criteria: "Strategic reordering is suggested — for example, moving bestsellers before brand story (subscribers care about products before the founder's journey)"
    weight: 0.25
    description: "Smart reordering recommendations"
  - type: llm_judge
    criteria: "Expected impact predictions are reasonable and specific — doesn't promise unrealistic improvements, but identifies which metrics should improve and why"
    weight: 0.20
    description: "Reasonable impact predictions"
