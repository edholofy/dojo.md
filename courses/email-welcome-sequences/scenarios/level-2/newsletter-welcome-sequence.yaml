meta:
  id: newsletter-welcome-sequence
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Design a welcome sequence for a newsletter subscriber"
  tags: [email, newsletter, welcome, sequence]

state: {}

trigger: |
  Design a 3-email welcome sequence for "The Product Brief," a weekly product
  management newsletter with 45K subscribers.

  Context:
  - Published every Tuesday morning
  - Format: one deep-dive on a PM topic + 3 quick links + one tool recommendation
  - Monetized via sponsorships (no paid tier)
  - New subscriber just signed up on a Thursday
  - The biggest challenge: keeping subscribers engaged until the first real issue
    arrives (could be up to 6 days away)

  The sequence must bridge the gap between signup and the first real newsletter
  delivery. The subscriber shouldn't forget about the newsletter by Tuesday.

assertions:
  - type: llm_judge
    criteria: "The sequence addresses the gap between signup and first delivery — it proactively solves the problem of subscribers forgetting about the newsletter during the wait"
    weight: 0.30
    description: "Bridges gap to first newsletter delivery"
  - type: llm_judge
    criteria: "The emails provide genuine value during the wait — perhaps sharing best-of past issues, a popular deep-dive, or curated resources. Not just filler emails"
    weight: 0.30
    description: "Genuine value during waiting period"
  - type: llm_judge
    criteria: "The sequence builds anticipation for the first real issue — by the time Tuesday arrives, the subscriber is actively looking for it in their inbox"
    weight: 0.20
    description: "Builds anticipation for first real issue"
  - type: llm_judge
    criteria: "The timing makes sense — emails are spaced appropriately between signup (Thursday) and first newsletter (Tuesday), not bunched up"
    weight: 0.20
    description: "Logical timing between signup and first issue"
