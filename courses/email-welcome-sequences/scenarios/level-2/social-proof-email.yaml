meta:
  id: social-proof-email
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Write Email #3 (social proof) for a fitness app's welcome sequence"
  tags: [email, social-proof, testimonials, sequence]

state: {}

trigger: |
  Write Email #3 (social proof email) for "FlexFit," a home workout app.

  Context:
  - Email #1 (Day 0): Welcome + app download link
  - Email #2 (Day 2): First workout guide + how-to
  - This is Email #3 (Day 4): Social proof to reinforce their decision
  - The app costs $12.99/month after a 7-day free trial
  - 65% of trial users cancel before Day 7
  - Target: people who have tried and failed at fitness before

  Available social proof:
  - 4.8 star rating on App Store (23K reviews)
  - "I lost 15 lbs in 3 months doing just 20-minute workouts" — Sarah M.
  - "As a dad of 3, I never thought I'd have time to work out. FlexFit changed that" — James R.
  - "I've tried Peloton, Nike Training, everything. FlexFit is the first one that stuck" — Maya L.
  - 850K+ users have completed a workout streak of 30+ days

  Use this social proof effectively to combat trial cancellation.

assertions:
  - type: llm_judge
    criteria: "The social proof is strategically selected and arranged — testimonials are chosen and ordered to address the specific fear of failure that the target audience has"
    weight: 0.30
    description: "Strategic social proof selection and arrangement"
  - type: llm_judge
    criteria: "The email acknowledges that the subscriber might be doubting their decision by Day 4 — it meets them where they are emotionally, not just dumping testimonials"
    weight: 0.25
    description: "Addresses Day 4 doubt empathetically"
  - type: llm_judge
    criteria: "Statistics and testimonials are balanced — the email uses both quantitative proof (4.8 stars, 850K users) and qualitative stories (individual testimonials) for maximum persuasion"
    weight: 0.25
    description: "Balanced quantitative and qualitative proof"
  - type: llm_judge
    criteria: "The CTA connects social proof to action — it doesn't just end with 'look at these happy users' but bridges to 'you could be next, here's how'"
    weight: 0.20
    description: "CTA bridges from proof to action"
