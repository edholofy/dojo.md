meta:
  id: three-email-ecommerce-sequence
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Design a 3-email welcome sequence for an e-commerce brand"
  tags: [email, sequence, ecommerce, multi-email]

state: {}

trigger: |
  Design a 3-email welcome sequence for "NomadGear," an outdoor adventure gear brand.

  Context:
  - Subscriber signed up for 15% off their first order
  - Average order value: $120
  - Target audience: weekend hikers and casual campers (not extreme athletes)
  - Brand voice: adventurous but approachable, encouraging
  - Top-selling categories: backpacks, hiking boots, camp cookware

  For each email provide:
  1. Send timing (relative to signup)
  2. Subject line and preview text
  3. Email purpose and key message
  4. Full email body copy
  5. CTA

  The sequence should move from welcome → trust-building → purchase motivation.

assertions:
  - type: llm_judge
    criteria: "Three distinct emails are provided with appropriate timing — Email 1 is immediate, Email 2 is 1-3 days later, Email 3 is 5-7 days later. Each has a clear, different purpose"
    weight: 0.25
    description: "Three emails with proper timing and distinct purposes"
  - type: llm_judge
    criteria: "The sequence has a logical progression — welcome/deliver discount, then build trust/brand story, then motivate purchase. Each email builds on the previous one"
    weight: 0.25
    description: "Logical welcome-to-purchase progression"
  - type: llm_judge
    criteria: "The tone is consistently adventurous but approachable throughout — it speaks to casual outdoor enthusiasts, not extreme athletes. No gatekeeping language"
    weight: 0.25
    description: "Consistent approachable adventure tone"
  - type: llm_judge
    criteria: "The final email creates enough urgency to drive purchase without being pushy — the discount expiration or product scarcity feels natural, not manufactured"
    weight: 0.25
    description: "Natural urgency in final email"
