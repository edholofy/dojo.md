meta:
  id: re-engagement-non-openers
  level: 2
  course: email-welcome-sequences
  type: output
  description: "Write a re-engagement email for subscribers who didn't open the welcome email"
  tags: [email, re-engagement, non-openers, recovery]

state: {}

trigger: |
  30% of new subscribers to "LearnStack" (an online coding education platform) never
  open their welcome email. Write a follow-up re-engagement email.

  Context:
  - Welcome email was sent 48 hours ago (not opened)
  - Welcome email subject was: "Welcome to LearnStack — Start Your Coding Journey!"
  - The welcome email contained a link to their free Python fundamentals course
  - Target audience: career changers in their 30s-40s wanting to learn coding
  - Common reasons for not opening: went to spam/promotions, subject line didn't
    stand out, signed up impulsively and forgot

  Write:
  1. A completely different subject line approach (since the first one failed)
  2. Preview text
  3. A short, punchy email body
  4. Explanation of the subject line strategy change

assertions:
  - type: llm_judge
    criteria: "The new subject line takes a fundamentally different approach from the original — if the original was warm/welcoming, the new one uses curiosity, urgency, or a question. It's not just a rewording"
    weight: 0.30
    description: "Fundamentally different subject line approach"
  - type: llm_judge
    criteria: "The email is notably shorter than a typical welcome email — it acknowledges that the subscriber may have limited attention and gets to the point immediately"
    weight: 0.25
    description: "Short punchy re-engagement copy"
  - type: llm_judge
    criteria: "The email doesn't shame or guilt the subscriber for not opening — it's positive, creates a fresh start, and makes clicking feel easy and rewarding"
    weight: 0.25
    description: "Positive tone without guilt"
  - type: llm_judge
    criteria: "The explanation of the subject line strategy change shows understanding of email psychology — why the original may have failed and what behavioral principle the new approach leverages"
    weight: 0.20
    description: "Sound subject line psychology explanation"
