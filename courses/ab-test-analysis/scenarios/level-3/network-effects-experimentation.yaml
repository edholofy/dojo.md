meta:
  id: network-effects-experimentation
  level: 3
  course: ab-test-analysis
  type: output
  description: "Handle network effects in experimentation — identify when standard A/B testing assumptions break down due to user interactions, and apply cluster randomization and other methods"
  tags: [network-effects, SUTVA, cluster-randomization, interference, marketplace, advanced]

state: {}

trigger: |
  A two-sided marketplace (like Uber or Airbnb) wants to test a new
  matching algorithm. The data scientist says: "We can't just randomly
  assign individual users to control and treatment because the treatment
  changes matching for everyone in the market. If a rider in the
  treatment group gets matched faster, that means a driver is now
  unavailable for a rider in the control group. The groups contaminate
  each other."

  Task: Explain how network effects and interference violate standard
  A/B testing assumptions, and describe methods for running valid
  experiments in interconnected systems.

assertions:
  - type: llm_judge
    criteria: "Response explains SUTVA violations and interference — sutva: 'SUTVA violations in networked systems: The Stable Unit Treatment Value Assumption (SUTVA): a user's outcome depends ONLY on their own treatment assignment, not on the treatment assignment of other users. In a standard A/B test (e.g., testing a button color): if User A sees the green button and User B sees the blue button, User A's behavior is unaffected by User B's assignment. SUTVA holds. In a marketplace or social network: if Rider A gets the new matching algorithm and gets matched to Driver X 30 seconds faster, Driver X is no longer available for Rider B (who is in the control group). Rider B's experience is degraded because of Rider A's treatment. SUTVA is violated — treatment assignment of one user affects the outcomes of other users. This is called interference or spillover. Types of interference: 1. Direct interference (marketplace): supply-demand competition. Treatment users consume shared resources (drivers, listings, inventory), degrading the control experience. 2. Social interference (social networks): if treatment users share content differently, their friends in the control group are exposed to the treatment through the social feed. 3. Information spillover: treatment users tell control users about the new feature (word of mouth). 4. General equilibrium effects: the treatment changes the overall market dynamics (prices, supply, demand) affecting everyone. Why interference biases results: in a marketplace matching test: the treatment improves matching time by 10% for treatment riders. But the control group's matching time gets 3% worse (treatment riders are taking their drivers). Measured effect: treatment vs control = 10% + 3% = 13% improvement. True effect (if deployed to everyone): approximately 10% improvement. The A/B test overestimates the effect by 30% because the control group was artificially degraded'"
    weight: 0.35
    description: "SUTVA"
  - type: llm_judge
    criteria: "Response covers experimental methods for network effects — methods: 'Methods for experimentation with network effects: Method 1 — Cluster (geo) randomization: instead of randomizing individual users, randomize entire clusters (geographic markets, cities, time slots). Example: 20 cities in the marketplace. Randomly assign 10 cities to treatment (new matching algorithm) and 10 cities to control. Within each city, all users get the same assignment. Interference within a cluster is allowed (and expected). Interference between clusters is minimal (riders in Chicago do not affect drivers in Boston). Analysis: the unit of analysis is the cluster (city), not the individual user. With 20 clusters, you have only 20 data points (10 treatment, 10 control). This dramatically reduces statistical power compared to user-level randomization. Power considerations: user-level test with 100,000 users: very high power. Cluster-level test with 20 clusters: much lower power. Need larger effect sizes or more clusters. Method 2 — Switchback experiments (time-based randomization): alternate the treatment and control in the SAME market over time periods. Hour 1: treatment algorithm. Hour 2: control algorithm. Hour 3: treatment. Hour 4: control. Each time slot is a unit of randomization. Advantages: same market serves as its own control (removes between-market confounders). More randomization units (168 hours per week vs 20 cities). Disadvantages: carryover effects — the treatment in hour 1 may affect outcomes in hour 2 (drivers repositioned, demand patterns changed). Mitigation: use longer time blocks (4-6 hours) with buffer periods between switches. Method 3 — Ego-cluster randomization (for social networks): randomize clusters of connected users (ego networks). User A and all of A's friends get the same treatment. Limits social interference within the cluster. Requires knowledge of the social graph'"
    weight: 0.35
    description: "Methods"
  - type: llm_judge
    criteria: "Response covers practical design and analysis guidance — practical: 'Practical guidance for marketplace and network experiments: Designing a geo-randomized experiment: 1. Choose clusters that minimize between-cluster interference: geographic markets work well for ride-sharing (riders and drivers rarely cross city boundaries). Product categories work for e-commerce marketplaces. Smaller clusters reduce interference but increase the number of randomization units. 2. Stratify clusters before randomization: match cities by size, market maturity, and seasonality. Pair similar cities: New York with Los Angeles (large markets), Austin with Portland (medium markets). Randomly assign one from each pair to treatment, one to control. This reduces variance from between-cluster differences. 3. Calculate power with cluster-level analysis: effective sample size = number of clusters, not number of users. The intracluster correlation coefficient (ICC) quantifies how much outcomes within a cluster are correlated. Higher ICC = less effective sample size = need more clusters. Rule of thumb: if ICC = 0.01, you need 2-3x more total users than a non-clustered design. If ICC = 0.1, you need 10-20x more total users. 4. Analyze with cluster-robust methods: cluster-robust standard errors account for correlation within clusters. Mixed-effects models with random intercepts for clusters. Permutation tests that permute cluster assignments (valid with as few as 10-20 clusters). Measuring and adjusting for interference: if you must run a user-level experiment in a networked system: measure the treatment exposure of each control user (how many of their neighbors are in treatment). Model the outcome as a function of both direct assignment and neighbor exposure. Use this to estimate the direct treatment effect (on the treated user) and the indirect effect (spillover to neighbors). The total treatment effect = direct + indirect. This is more complex but gives a richer understanding of how the treatment propagates through the network. For the marketplace team: use geo-randomization across cities for the matching algorithm test. Stratify cities by size and maturity. Plan for lower power — expect to detect only effects of 5%+ (not the 1-2% detectable in user-level tests). Run for 4-8 weeks to capture variation across time. Supplement with switchback experiments within a single city for faster signal on secondary metrics'"
    weight: 0.30
    description: "Practical"
