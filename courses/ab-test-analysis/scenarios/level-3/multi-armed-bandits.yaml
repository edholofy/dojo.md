meta:
  id: multi-armed-bandits
  level: 3
  course: ab-test-analysis
  type: output
  description: "Apply multi-armed bandit algorithms — understand Thompson Sampling, epsilon-greedy, and UCB strategies for adaptive traffic allocation that balances exploration and exploitation"
  tags: [multi-armed-bandit, Thompson-Sampling, epsilon-greedy, UCB, advanced]

state: {}

trigger: |
  The Head of Growth says: "We run 20+ A/B tests a month. While tests
  run, half our traffic goes to the losing variant — that's wasted
  conversions. I want to automatically shift traffic toward the winning
  variant as the test runs. I've heard multi-armed bandits can do this.
  Should we replace all our A/B tests with bandits?"

  Task: Explain multi-armed bandit algorithms, compare them to
  traditional A/B testing, and advise when each approach is appropriate.

assertions:
  - type: llm_judge
    criteria: "Response explains multi-armed bandit algorithms — bandits: 'Multi-armed bandit (MAB) algorithms: The core idea: instead of splitting traffic 50/50 for the entire test, dynamically allocate more traffic to better-performing variants. The name comes from slot machines (one-armed bandits) — if you have multiple slot machines with unknown payout rates, how do you maximize your total winnings? Algorithm 1 — Epsilon-Greedy: with probability epsilon (e.g., 10%), send traffic to a random variant (exploration). With probability 1-epsilon (90%), send traffic to the current best variant (exploitation). Simple and effective. Epsilon = 0 means pure exploitation (no exploration — risky if the initial estimate is wrong). Epsilon = 1 means pure exploration (random allocation — equivalent to an A/B test). Typical epsilon: 5-10%. Variant: decaying epsilon — start with high exploration (epsilon = 0.3) and gradually reduce to near zero as confidence increases. Algorithm 2 — Thompson Sampling (most popular for A/B testing): maintain a Beta distribution for each variant's conversion rate. For each incoming user: sample a conversion rate from each variant's Beta distribution. Send the user to the variant with the highest sampled rate. As data accumulates, the distributions narrow and traffic naturally shifts to the best variant. Example: after 1,000 users: variant A posterior: Beta(52, 948) — mean 5.2%. Variant B posterior: Beta(68, 932) — mean 6.8%. Thompson Sampling sends approximately 90% of traffic to B because B's distribution almost always samples higher than A's. Algorithm 3 — Upper Confidence Bound (UCB): for each variant, calculate: mean reward + exploration bonus. The exploration bonus is larger for variants with less data (incentivizes trying under-explored options). Send traffic to the variant with the highest UCB score. More deterministic than Thompson Sampling — less random exploration'"
    weight: 0.35
    description: "Bandits"
  - type: llm_judge
    criteria: "Response compares bandits to A/B tests with trade-offs — comparison: 'Bandits vs A/B tests — trade-offs: Advantage 1 — Reduced opportunity cost: A/B test: 50% of traffic goes to the worse variant for the entire test. If the test runs 4 weeks and variant B is 2pp better: lost conversions = 0.5 × traffic × 0.02 × 28 days. Bandit (Thompson Sampling): after a few days, 80-90% of traffic shifts to B. Total lost conversions much lower. Regret (cumulative lost conversions) is minimized. Advantage 2 — Handles many variants efficiently: A/B/n with 10 variants: each gets 10% of traffic. Bandit with 10 variants: quickly identifies the top 2-3, sends most traffic there, and starves poor performers. Converges faster with many variants. Disadvantage 1 — Weaker statistical inference: bandits optimize for total reward, not for measuring precise effect sizes. The unequal traffic allocation makes it harder to calculate confidence intervals and p-values. You know which variant won but not by exactly how much. If you need to report the lift is 2.3pp with a 95% CI of [1.1pp, 3.5pp], use A/B testing. Disadvantage 2 — Sensitive to non-stationarity: if user behavior changes over time (seasonality, marketing campaigns), the bandit may lock onto a variant that was best last week but is not best this week. A/B tests with balanced traffic are more robust to temporal changes. Disadvantage 3 — Novelty and primacy effects amplified: a bandit that shifts traffic to a new variant early (when novelty inflates the effect) will over-allocate to that variant. The early novelty gets baked into the allocation before it can be detected. When to use bandits: optimizing headlines, email subject lines, ad creatives (low-stakes, many variants, short-lived). Personalization — showing the best variant to each user segment. When opportunity cost of showing the losing variant is high. When you do not need precise effect size estimates. When to use A/B tests: measuring exact treatment effects for business planning. Regulatory or scientific contexts requiring formal statistical testing. When novelty and primacy effects are likely (major redesigns). When you need to report confidence intervals and p-values'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response covers practical implementation and hybrid approaches — practical: 'Practical implementation: Hybrid approach — best of both worlds: Phase 1 (pure A/B, week 1-2): equal traffic split. Collect unbiased data. Calculate confidence intervals and effect sizes. Detect novelty effects (constant allocation avoids biased early estimates). Phase 2 (bandit, week 3+): switch to Thompson Sampling. Shift traffic toward the winner while continuing to collect data. Minimize opportunity cost during the remaining test period. This gives you both statistical rigor (from Phase 1) and reduced regret (from Phase 2). Implementation checklist: 1. Choose the algorithm: Thompson Sampling for most cases (well-understood, robust, easy to implement for conversion metrics). Epsilon-greedy for simplicity (works well with decaying epsilon). UCB for deterministic allocation preferences. 2. Define the reward metric: for conversion: binary (0 or 1). For revenue: continuous (use a Normal-Gamma prior instead of Beta). 3. Set the update frequency: real-time (every user): most responsive but computationally expensive. Hourly batches: good balance. Daily batches: less responsive but simpler. 4. Set a minimum exploration floor: never allocate less than 5% of traffic to any active variant. This prevents premature convergence and ensures you can detect if the losing variant improves. 5. Define a stopping rule: stop when one variant has greater than 95% probability of being the best (Thompson Sampling) or when the expected remaining regret is less than a threshold. For the Head of Growth: do not replace all A/B tests with bandits. Use bandits for the high-volume, low-stakes optimization tests (ad creatives, subject lines, UI micro-optimizations). Keep traditional A/B tests for strategic decisions where you need precise measurement (pricing, core product changes, onboarding flows). A reasonable split: 70% of tests as A/B tests (where measurement matters), 30% as bandits (where speed matters)'"
    weight: 0.30
    description: "Practical"
