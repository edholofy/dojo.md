meta:
  id: switchback-experiments
  level: 3
  course: ab-test-analysis
  type: output
  description: "Design and analyze switchback experiments — use time-based randomization for scenarios where user-level randomization is impossible, handling carryover effects and temporal confounds"
  tags: [switchback, time-randomization, carryover, marketplace, advanced]

state: {}

trigger: |
  A food delivery platform wants to test a new surge pricing algorithm.
  The pricing team says: "We can't randomize at the user level because
  the price affects supply — if we show different prices to different
  customers in the same area at the same time, the supply of drivers
  responds to the blended demand, not to either price independently.
  We need to change the price for everyone in a market at once."

  Task: Design a switchback experiment for the surge pricing algorithm,
  addressing carryover effects and proper analysis.

assertions:
  - type: llm_judge
    criteria: "Response explains switchback design and rationale — design: 'Switchback experiment design for surge pricing: Why switchback: the pricing algorithm must be applied to ALL users in a market simultaneously because price changes affect supply-side behavior (driver availability). User-level randomization would show different prices to riders in the same area — drivers respond to aggregate demand, not individual rider prices, creating interference. Switchback design: randomly assign the treatment (new pricing) or control (current pricing) to entire time blocks within the same market. Design parameters: time block duration: 2 hours (long enough for supply/demand to adjust, short enough for many blocks). Randomization: each 2-hour block is independently randomized to treatment or control with 50/50 probability. Markets: run in 5 comparable markets simultaneously. Timeline: 4 weeks (24 hours / 2 hours × 28 days = 336 blocks per market). Example schedule for one market: Monday 8-10am: treatment. Monday 10am-12pm: control. Monday 12-2pm: treatment. Monday 2-4pm: control. And so on, with random assignment for each block. Why 2-hour blocks: too short (15 minutes): the market does not have time to equilibrate to the new price. Drivers are still responding to the previous pricing. Carryover effects dominate. Too long (12 hours): few randomization units, low statistical power. Seasonal confounds (morning vs evening) are hard to separate from treatment effects. 2 hours: reasonable equilibration time, 12 blocks per day, 336 per month per market. Combined with 5 markets: 1,680 total blocks. Unit of analysis: each time-block × market combination is one observation'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers carryover effects and mitigation — carryover: 'Carryover effects: The biggest challenge in switchback experiments: the treatment in one time block affects outcomes in the next block. Pricing carryover: if the treatment raises prices in block 1, some riders delay their orders. These delayed orders appear in block 2 (control), inflating control metrics. Driver carryover: if the treatment incentivizes more drivers to come online in block 1, those drivers are still online at the start of block 2 (control), improving control supply metrics. Demand carryover: users who had a bad experience in a treatment block (high prices) may avoid the platform in subsequent blocks. Types of carryover: immediate carryover: the effect of the previous block carries into the first 15-30 minutes of the next block. Cumulative carryover: after multiple consecutive treatment blocks, the carryover is larger than after a single treatment block. Asymmetric carryover: switching from treatment to control may have different carryover than switching from control to treatment. Mitigation strategies: Strategy 1 — Buffer periods: exclude the first 30 minutes of each block from analysis. This washout period allows the market to adjust. Trade-off: lose 25% of data (30 min of each 2-hour block). But the remaining data is less contaminated. Strategy 2 — Analyze only steady-state periods: use only the middle portion of each block (minutes 30-90). Exclude both the transition period and the end (where anticipatory effects might occur). Strategy 3 — Model the carryover explicitly: include a covariate for the previous block's assignment: Y_t = β₀ + β₁ × Treatment_t + β₂ × Treatment_{t-1} + ε_t. β₁ is the direct treatment effect. β₂ is the carryover effect. The direct effect β₁ is the quantity of interest. Strategy 4 — Balanced randomization: ensure that the number of treatment-to-control transitions equals control-to-treatment transitions. This balances carryover effects across conditions. Use block randomization: within each day, ensure equal numbers of treatment and control blocks'"
    weight: 0.35
    description: "Carryover"
  - type: llm_judge
    criteria: "Response covers analysis methodology — analysis: 'Switchback experiment analysis: Step 1 — Define the outcome metric per block: for each 2-hour block in each market: revenue per order, orders per hour, driver utilization, customer wait time, cancellation rate. Aggregate to the block level: mean revenue per order in this block. Step 2 — Account for temporal confounds: time-of-day effects: lunch rush and dinner rush have different baseline metrics. Day-of-week effects: weekdays vs weekends. Seasonal trends: demand changes over the 4-week period. Fixed effects model: Y_{mt} = β₁ × Treatment_{mt} + γ_m (market fixed effects) + δ_h (hour-of-day fixed effects) + ζ_d (day-of-week fixed effects) + η_w (week fixed effects) + ε_{mt}. Market fixed effects (γ_m) absorb baseline differences between cities. Hour-of-day effects (δ_h) absorb the lunch and dinner patterns. Day-of-week effects (ζ_d) absorb weekend vs weekday differences. Week effects (η_w) absorb trends over time. β₁ is the treatment effect, cleaned of all temporal confounds. Step 3 — Cluster standard errors: observations within the same market and adjacent time blocks are correlated. Use cluster-robust standard errors clustered at the market-day level. Alternative: block bootstrap — resample entire days within each market. Step 4 — Sensitivity analysis: vary the buffer period (15, 30, 45 minutes) and check that the treatment effect is stable. Exclude blocks where the randomization resulted in long runs of the same treatment (3+ consecutive treatment blocks may have different carryover dynamics). Test for carryover by comparing: blocks preceded by treatment vs blocks preceded by control. If the treatment effect differs, carryover is present and must be modeled. Expected results for the pricing test: new pricing algorithm increases revenue per order by 4% (p = 0.02). Customer wait time unchanged (guardrail: no degradation in service quality). Driver earnings per hour increase by 2% (the new pricing better matches supply and demand). Recommendation: ship the new pricing algorithm. The switchback experiment confirms a genuine improvement in pricing efficiency that benefits both the platform (revenue) and drivers (earnings) without harming customer experience'"
    weight: 0.30
    description: "Analysis"
