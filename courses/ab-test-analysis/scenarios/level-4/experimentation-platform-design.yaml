meta:
  id: experimentation-platform-design
  level: 4
  course: ab-test-analysis
  type: output
  description: "Design an experimentation platform — evaluate build vs buy decisions, architect the core components of an experiment management system, and define platform requirements for scale"
  tags: [experimentation-platform, architecture, build-vs-buy, Statsig, Optimizely, expert]

state: {}

trigger: |
  The CTO of a Series C startup (200 engineers, 10M MAU) says: "We've
  been using feature flags with manual analysis for A/B tests. It works
  for 5 tests per month, but we want to scale to 50+ concurrent tests.
  Should we build an in-house platform or buy one? What capabilities
  do we need?"

  Task: Evaluate the build vs buy decision for an experimentation
  platform and design the core architecture.

assertions:
  - type: llm_judge
    criteria: "Response evaluates build vs buy with concrete criteria — buildvsbuy: 'Build vs buy evaluation: Buy (third-party platform): Top options: Statsig, Optimizely, LaunchDarkly, Eppo, GrowthBook. Pros: launch in 2-4 weeks. Battle-tested statistical methods (CUPED, sequential testing). Built-in guardrail metrics and alerting. Support for multi-armed bandits, mutual exclusion layers, and interaction detection. Automatic sample size calculation and power analysis. Costs $50K-$300K/year depending on MAU and features. Cons: limited customization (must adapt your workflow to the platform). Vendor lock-in (migrating experimentation data and configurations is painful). Data leaves your infrastructure (privacy concerns for PII). May not support domain-specific requirements (marketplace experiments, pricing tests). Build (in-house platform): Pros: full customization for your specific use cases. Data stays on your infrastructure. No per-MAU vendor fees (significant savings at 10M+ MAU). Deep integration with your internal data stack. Cons: 6-12 months of engineering effort (2-4 full-time engineers). Ongoing maintenance burden (statistical methods evolve). Must implement CUPED, sequential testing, and interaction detection from scratch. Recommendation for Series C, 200 engineers, 10M MAU: Buy a platform now. The opportunity cost of 2-4 engineers for 12 months is approximately $800K-$1.6M in engineering time. A vendor costs $100K-$200K/year and is running in weeks. Re-evaluate building in-house when you reach 500+ engineers and 50M+ MAU, where vendor costs exceed $500K/year and your experimentation needs are highly specialized'"
    weight: 0.35
    description: "BuildVsBuy"
  - type: llm_judge
    criteria: "Response covers platform architecture components — architecture: 'Experimentation platform architecture: Core components: 1. Assignment service: randomly assigns users to experiment variants. Must be deterministic (same user always gets the same variant) using consistent hashing (hash(user_id + experiment_id) mod 100). Must support: mutual exclusion layers (user in at most one experiment per layer). Traffic allocation (10% of users in the experiment, 90% not). Holdout groups (2% of users excluded from all experiments). Low latency (<10ms for assignment decisions). 2. Feature flag integration: the assignment service controls feature flags that gate the treatment experience. Code pattern: if (experiment.getVariant(userId) == treatment) then showNewFeature(). Flags must be server-side and client-side (mobile, web). 3. Event logging pipeline: capture all user events with experiment assignment metadata. Every event includes: user_id, experiment_assignments (list of active experiments and variants), event_type, timestamp, properties. This enables post-hoc analysis of any metric for any experiment. Pipeline: events → Kafka/Kinesis → data warehouse (BigQuery/Snowflake/Databricks). 4. Analysis engine: automatically computes: point estimates with confidence intervals. P-values (frequentist) and probability-to-beat (Bayesian). CUPED-adjusted metrics. Sequential monitoring boundaries. Guardrail metric checks. Runs daily or on-demand for each active experiment. 5. Experiment management UI: create and configure experiments (metrics, variants, traffic allocation, duration). Dashboard showing real-time results with statistical significance. Guardrail alerts (email/Slack when a guardrail metric degrades). Experiment history and audit log. 6. Governance layer: experiment review before launch (required fields: hypothesis, primary metric, guardrails, expected duration). Approval workflow for high-risk experiments (pricing, core product). Automated checks: sufficient power for the expected MDE, no conflicting experiments in the same layer'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers implementation roadmap and scaling considerations — roadmap: 'Implementation roadmap: If buying a platform: Week 1-2: evaluate Statsig, Eppo, GrowthBook, Optimizely. Key criteria: statistical rigor (CUPED, sequential testing), data warehouse integration, pricing at 10M MAU, API flexibility. Week 3-4: integrate the SDK into the product codebase. Replace existing feature flag system with the platform's assignment service. Week 5-6: connect the event pipeline to the platform. Ensure all key events flow through with experiment assignments. Week 7-8: migrate existing experiments to the platform. Train the team on the new workflow. Month 3: establish experiment review process and governance. If building in-house (not recommended at this stage, but architecture for reference): Phase 1 (months 1-3) — MVP: assignment service with consistent hashing and basic traffic allocation. Feature flag integration. Basic analysis: two-proportion z-test, confidence intervals. Simple dashboard showing results. Phase 2 (months 4-6) — statistical rigor: CUPED variance reduction. Sequential testing with O'Brien-Fleming boundaries. Guardrail metrics with automated alerting. Multiple testing correction. Phase 3 (months 7-9) — scale: mutual exclusion layers for 50+ concurrent experiments. Automated interaction detection across experiment pairs. Multi-armed bandits for appropriate use cases. Bayesian analysis alongside frequentist. Phase 4 (months 10-12) — governance: experiment review workflow. Automated power checks before launch. Experiment calendar and collision prevention. Long-term holdout management. Scaling considerations: at 50+ concurrent experiments: automated guardrail monitoring is essential (humans cannot manually check 50 dashboards). Experiment layers prevent most collisions but interaction detection catches cross-layer issues. Standardized metric definitions prevent teams from cherry-picking metrics post-hoc. An experimentation review board (2-3 senior data scientists) should approve high-risk experiments and resolve disputes when primary metrics and guardrails conflict'"
    weight: 0.30
    description: "Roadmap"
