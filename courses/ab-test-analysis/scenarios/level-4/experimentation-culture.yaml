meta:
  id: experimentation-culture
  level: 4
  course: ab-test-analysis
  type: output
  description: "Build experimentation culture — drive organizational adoption of data-driven experimentation, overcome resistance to testing, and establish experimentation as a core product development practice"
  tags: [culture, adoption, organizational-change, data-driven, expert]

state: {}

trigger: |
  The new VP of Product at a mid-size SaaS company (500 employees)
  discovers that only 2 of 12 product teams run A/B tests regularly.
  Most teams ship features based on intuition and stakeholder opinions.
  The VP says: "I want every product decision backed by experimentation
  within 12 months. How do I make this happen?"

  Task: Design a 12-month plan to build experimentation culture across
  the organization, addressing common resistance patterns.

assertions:
  - type: llm_judge
    criteria: "Response covers common resistance patterns and how to overcome them — resistance: 'Common resistance to experimentation and solutions: Resistance 1 — We already know what works (HiPPO problem): the Highest Paid Person's Opinion drives decisions. Senior leaders believe their experience makes testing unnecessary. Solution: find a case where intuition was wrong. Run a test where the HiPPO-preferred option loses. Share the results widely (anonymize the person). At Booking.com, leaders publicly celebrate experiments where their preferred option lost — it demonstrates the value of testing over intuition. Resistance 2 — Testing slows us down: teams see experimentation as overhead that delays shipping. Solution: demonstrate that experimentation accelerates learning. A team that ships without testing and discovers the feature does not work 3 months later wasted 3 months of development time. A team that tests first learns in 2-3 weeks and can redirect effort. Calculate: average experiment duration (2 weeks) vs average time to discover a bad feature through user feedback (3+ months). Resistance 3 — Our sample size is too small: teams with niche products or small user bases believe they cannot run valid experiments. Solution: teach techniques for low-traffic experimentation: longer test durations, Bayesian methods (work with smaller samples), composite metrics (more sensitive), sequential testing (stop earlier when effects are large). If the sample is truly too small for any method, use qualitative user testing instead — experimentation culture includes non-A/B forms of evidence. Resistance 4 — Our features are too complex to test: teams building enterprise features, infrastructure, or platform capabilities argue that A/B testing does not apply. Solution: redefine experimentation beyond A/B tests. Experimentation includes: A/B tests for user-facing features. Canary deployments for infrastructure changes. Staged rollouts with monitoring for platform changes. Customer interviews and usability studies for enterprise features. The principle is the same: validate before committing fully'"
    weight: 0.35
    description: "Resistance"
  - type: llm_judge
    criteria: "Response covers a phased 12-month adoption plan — plan: 'Twelve-month experimentation culture plan: Phase 1 — Foundation (months 1-3): Month 1: hire or designate an experimentation lead (data scientist with strong communication skills). Implement or procure an experimentation platform (if not already in place). Identify 2-3 champion teams (the teams already running tests) — they will be the early adopters and case studies. Month 2: run 3-5 high-visibility experiments with the champion teams. Choose experiments where the result is likely to surprise (tests where the team is split on the expected outcome). Document the results as case studies with business impact in dollars. Month 3: present the case studies to all product teams at a company all-hands. Key message: these experiments saved us $X by catching bad ideas early and identified $Y in unexpected wins. Announce the experimentation goal: every product team will run at least 1 experiment per quarter by month 6. Phase 2 — Scaling (months 4-6): Month 4: embed data scientists into 4-6 product teams (the next wave of adopters). These DS partners own the experimentation workflow for their team. Provide a 2-day experimentation bootcamp for PMs and engineers: hypothesis formation, sample size calculation, reading results, guardrail metrics. Month 5: launch an internal experimentation newsletter (bi-weekly): highlight interesting experiment results across the company. Feature experiments where intuition was wrong (humility is contagious). Share tips and best practices. Month 6: checkpoint — target: 8 of 12 teams have run at least 1 experiment. Address holdout teams individually (understand their specific resistance). Phase 3 — Institutionalization (months 7-12): Month 7-8: integrate experimentation into the product development lifecycle. Product spec template includes a testing plan section. Feature launches require either experiment results or an explicit justification for why testing was not possible. Quarterly OKRs include experimentation metrics. Month 9-10: launch an experimentation review board for high-risk decisions. Implement long-term holdouts to measure cumulative experimentation impact. Month 11-12: annual experimentation report: total experiments run (target: 100+ per quarter), win rate, cumulative business impact. Recognize top experimenters (teams and individuals) at the company all-hands'"
    weight: 0.35
    description: "Plan"
  - type: llm_judge
    criteria: "Response covers metrics for measuring culture adoption — metrics: 'Measuring experimentation culture adoption: Leading indicators (track monthly): experiment volume: total experiments launched per month (target: 3-5 per team per quarter by month 12). Experiment coverage: percentage of product teams running experiments (target: 100% by month 9). Pre-registration compliance: percentage of experiments with pre-registered hypotheses and metrics (target: 90% by month 6). Time to first experiment: how quickly new teams launch their first experiment after onboarding (target: < 30 days). Lagging indicators (track quarterly): experiment-informed decisions: percentage of major product decisions backed by experiment data (target: 70% by month 12). Win rate: percentage of experiments that show a statistically significant positive result (healthy range: 15-35%). A win rate above 50% suggests teams are only testing safe bets. A win rate below 10% suggests poor hypothesis formation or underpowered tests. Cumulative impact: total dollar value of shipped experiment wins (tracked via long-term holdout). Iteration speed: average time from feature idea to validated experiment result (target: < 4 weeks). Cultural health indicators: do teams voluntarily run experiments (not just because it is required)? Do leaders reference experiment results in strategic decisions? Do teams celebrate learning from failed experiments (not just wins)? Do PMs push back on shipping without data (rather than data scientists being the only advocates)? The ultimate measure of experimentation culture: when someone proposes a major product change, the natural response from the room is can we test this? rather than lets just do it. The VP should aim for this inflection point by month 9-12'"
    weight: 0.30
    description: "Metrics"
