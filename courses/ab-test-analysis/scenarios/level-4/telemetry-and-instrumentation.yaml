meta:
  id: telemetry-and-instrumentation
  level: 4
  course: ab-test-analysis
  type: output
  description: "Design telemetry and instrumentation for experimentation — build the data collection infrastructure that enables reliable A/B test measurement at scale"
  tags: [telemetry, instrumentation, data-quality, event-tracking, SRM, expert]

state: {}

trigger: |
  The experimentation platform team discovers that 15% of experiments
  have sample ratio mismatches (SRM) — the actual traffic split differs
  significantly from the planned split. The platform lead says: "SRM
  means our randomization or data collection is broken. We can't trust
  the results of these experiments. We need to fix our instrumentation."

  Task: Diagnose common causes of SRM, design robust telemetry for
  experimentation, and establish data quality checks.

assertions:
  - type: llm_judge
    criteria: "Response covers SRM causes and diagnosis — srm: 'Sample Ratio Mismatch (SRM) — causes and diagnosis: SRM occurs when the observed sample sizes in treatment and control deviate significantly from the expected ratio. Expected: 50/50 split → 50,000 treatment, 50,000 control. Observed: 50,000 treatment, 48,200 control. Chi-squared test: p < 0.001 → statistically significant SRM. Even a 2% deviation (48,200 vs 50,000) can indicate a serious problem because the large sample size makes even small deviations detectable. Common causes: 1. Bot filtering asymmetry: if bot detection removes users differently across variants (e.g., the treatment page has different JavaScript that bots cannot execute), one group loses more bots than the other. Diagnosis: compare bot rates between treatment and control. Fix: apply bot filtering BEFORE randomization, or use consistent bot detection across variants. 2. Redirect-based assignment: if assignment requires a redirect (user hits page A, then is redirected to treatment or control), some redirects fail (network errors, user navigates away). If treatment redirects fail more often (e.g., to a slower-loading page), treatment loses more users. Diagnosis: compare redirect failure rates. Fix: use server-side assignment that does not require redirects. 3. Caching issues: if the treatment and control pages have different caching behavior, cached responses may not include the experiment assignment tracking pixel. One group's events are undercounted, not because users left but because events were not recorded. Diagnosis: compare event logging rates (page views vs assignment events) between groups. Fix: ensure experiment assignment is logged server-side, not client-side. 4. Triggering differences: if the treatment code crashes or takes longer to load, some treatment users never trigger the assignment event. The user was assigned but the event was lost. Diagnosis: compare client-side error rates between groups. Fix: log assignment on the server before the user sees the variant. 5. Interaction with other experiments: if two experiments share the same traffic and one experiment removes users (e.g., a paywall that blocks 20% of users), the surviving population in the overlapping experiment is biased'"
    weight: 0.35
    description: "SRM"
  - type: llm_judge
    criteria: "Response covers telemetry architecture for experimentation — telemetry: 'Telemetry architecture for reliable experimentation: Principle: every event must be attributable to an experiment variant with minimal data loss. Layer 1 — Assignment logging (server-side, mandatory): when a user is assigned to an experiment variant, log the assignment event SERVER-SIDE immediately. Do not rely on the client to log the assignment — client-side logging loses events due to: ad blockers (block tracking scripts), page load failures, JavaScript errors, user navigating away before the script executes. Assignment event schema: user_id (stable, hashed identifier). experiment_id. variant (control, treatment_1, treatment_2). timestamp. assignment_source (server, edge, CDN). This is the source of truth for who was in the experiment. Layer 2 — Exposure logging (client or server-side): log when the user actually SAW the treatment (not just was assigned). Exposure event: user_id, experiment_id, variant, page or feature exposed, timestamp. Exposure logging enables triggered analysis (analyzing only exposed users). Layer 3 — Outcome event logging: standard event tracking for all user actions: page views, clicks, form submissions, purchases, errors. Every event includes the user's current experiment assignments as metadata. Event schema: user_id, event_type, event_properties, experiment_assignments (array of {experiment_id, variant}), timestamp, session_id, device_info. Pipeline: events → message queue (Kafka) → stream processing → data warehouse. The message queue provides durability — events are not lost if the warehouse is temporarily unavailable. Layer 4 — Data quality monitoring: automated checks run hourly: event volume check: is the event volume within expected range? A sudden drop indicates a logging failure. SRM check: for each active experiment, run a chi-squared test on the sample ratio. Alert if p < 0.001. Metric coverage: are all expected metrics being logged for all experiment variants? Latency check: is the event pipeline delivering events within the expected latency (e.g., < 1 hour from event to warehouse)?'"
    weight: 0.35
    description: "Telemetry"
  - type: llm_judge
    criteria: "Response covers data quality framework and debugging guide — quality: 'Data quality framework for experimentation: Pre-experiment quality checks: 1. A/A test validation: before trusting the experimentation platform, run A/A tests (both groups see the identical experience). If the A/A test shows a significant difference (p < 0.05 for 5%+ of metrics), the instrumentation is broken. Run A/A tests quarterly on the most-used metrics. 2. Assignment validation: verify that the assignment distribution matches the expected ratio within statistical tolerance. Check that assignments are stable (the same user always gets the same variant). Check that assignments are independent (knowing user A's assignment does not predict user B's). 3. Event completeness: for each metric used in experiments, verify: the event fires on all platforms (web, iOS, Android). The event includes all required fields (user_id, timestamp, experiment assignments). The event volume matches expected baseline. During-experiment monitoring dashboard: live SRM check with traffic light: green (p > 0.05), yellow (0.01 < p < 0.05), red (p < 0.01). Metric computation health: are all metrics computing correctly? Are there null values or unexpected zeros? Variant-level error rates: does one variant have significantly more client-side errors or API failures? Event volume by variant: should be proportional to the traffic split. Debugging an SRM — step-by-step: 1. Check the timing: did the SRM appear from day 1 or develop over time? Day 1 SRM → assignment or logging issue. Gradual SRM → differential attrition or crawl bots. 2. Check by platform: is the SRM only on web, only on iOS, or across all platforms? Platform-specific SRM → client-side logging issue on that platform. 3. Check by user type: is the SRM only for new users, only for returning users, or both? New-user-only SRM → redirect or onboarding flow issue. Returning-user-only SRM → caching issue. 4. Check event completeness: compare the number of assignment events to the number of exposure events by variant. If treatment has 50,000 assignments but only 45,000 exposure events (10% loss), while control has 50,000 assignments and 49,500 exposures (1% loss), the treatment variant has a logging failure. 5. If no cause is found: quarantine the experiment results — do not use them for decisions. Fix the underlying issue and re-run the experiment. An SRM experiment is untrustworthy regardless of the results'"
    weight: 0.30
    description: "Quality"
