meta:
  id: pricing-experiments
  level: 4
  course: ab-test-analysis
  type: output
  description: "Design and analyze pricing experiments — handle the unique challenges of testing price changes including ethical considerations, long-term effects, and revenue-sensitive decision frameworks"
  tags: [pricing, revenue, elasticity, ethical-considerations, expert]

state: {}

trigger: |
  The Head of Revenue says: "We think our product is underpriced.
  We want to test raising prices by 20% for new customers. But the
  CEO is nervous — what if we lose customers? And is it even ethical
  to charge different customers different prices? How do we design
  a pricing experiment that gives us confidence without destroying
  the business?"

  Task: Design a pricing experiment that addresses the business,
  statistical, and ethical challenges of testing price changes.

assertions:
  - type: llm_judge
    criteria: "Response covers pricing experiment design — design: 'Pricing experiment design: Why pricing experiments are uniquely challenging: 1. High stakes: pricing directly affects revenue and customer acquisition. A bad price increase can cause immediate revenue loss. 2. Long-term effects: a price change affects not just conversion today but lifetime value, churn, and word-of-mouth over months. 3. Ethical and legal concerns: showing different prices to different users can damage trust and may violate consumer protection laws in some jurisdictions. 4. Irreversibility: users who see a higher price and convert have been anchored to that price. You cannot easily revert their price without complications. Design for the 20% price increase test: approach — new customers only: only test on users who have never seen the current price. This avoids the fairness issue of existing customers seeing different prices. Cohort design: control: new signups see current price ($50/month). Treatment: new signups see increased price ($60/month). Both groups are new customers who have no prior price anchor. Traffic allocation: 80% control / 20% treatment (not 50/50). Why: minimize revenue risk. If the price increase dramatically hurts conversion, only 20% of new traffic is affected. This is a conservative allocation — you trade statistical power for risk reduction. Duration: 6-8 weeks minimum. Pricing effects unfold slowly: week 1-2: immediate conversion rate impact. Week 3-4: trial-to-paid conversion impact (for freemium/trial models). Week 5-8: early retention and churn signals. 3-6 months (via holdout): true lifetime value comparison. Primary metric: revenue per visitor (not conversion rate alone). A 20% price increase that drops conversion by 10% still increases revenue per visitor by approximately 8%. Revenue per visitor = conversion rate × price. Control: 5% × $50 = $2.50 per visitor. Treatment: 4.5% × $60 = $2.70 per visitor (+8%). The price increase is revenue-positive even though conversion dropped'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers analysis and decision framework for pricing — analysis: 'Pricing experiment analysis framework: Metric hierarchy: Tier 1 — Revenue per visitor (primary decision metric): captures the trade-off between conversion and price. Must be significantly positive to justify the price increase. Tier 2 — Conversion rate (guardrail): a conversion drop is expected. But how much is too much? Set a guardrail: conversion must not drop more than 25% (if price increases 20%, up to 20% conversion drop is roughly revenue-neutral). Tier 3 — Customer quality metrics: average order value (do higher-price customers spend more on add-ons?). Support ticket rate (do higher-price customers demand more?). Trial-to-paid rate (does the higher price affect commitment?). Tier 4 — Long-term metrics (measured via holdout): 30/60/90-day retention. Lifetime value (LTV). Net Promoter Score. Churn rate. Analysis approach: short-term (week 2-4): report revenue per visitor with confidence interval. If CI is entirely above the control: strong positive signal. If CI includes zero: inconclusive, extend. If CI is entirely below control: stop, the price increase is destructive. Medium-term (week 6-8): combine short-term revenue with early retention data. Calculate projected LTV: LTV = ARPU × (1 / churn rate). Control LTV: $50 × (1 / 0.05) = $1,000. Treatment LTV: $60 × (1 / 0.07) = $857. In this scenario, even though ARPU is higher, increased churn makes the price increase LTV-negative. This is why long-term measurement is critical for pricing. Decision matrix: revenue per visitor up + retention stable → raise prices. Revenue per visitor up + retention drops → calculate LTV. If LTV still higher, raise prices cautiously. Revenue per visitor down → do not raise prices. LTV significantly lower despite higher ARPU → do not raise prices'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response covers ethical considerations and alternatives — ethics: 'Ethical and practical considerations: Ethical principles: 1. Transparency: do not show different prices to users who can compare (e.g., in the same household, on shared screens). New-customer-only testing minimizes this risk. 2. No retroactive changes: users who converted at the higher price should keep that price. Do not bait-and-switch by lowering the price after they commit. If you decide not to raise prices after the test, grandfather treatment users at the lower price on their next renewal. 3. Legal compliance: in some jurisdictions (especially the EU), personalized pricing based on user attributes (location, device, browsing history) may violate consumer protection laws. Testing on new cohorts with a single higher price (not personalized) is generally acceptable. Consult legal counsel before launching. 4. Fairness: avoid targeting price increases to price-insensitive segments (e.g., enterprise customers) without disclosure. This is discriminatory pricing and damages trust. Alternative approaches to price testing: Van Westendorp survey: ask users at what price this product would be too expensive, a bargain, too cheap, and expensive but still worth it. This gives a price sensitivity range without showing different prices in production. Conjoint analysis: present users with bundles (features + prices) and ask for preferences. Statistical analysis reveals the implicit price elasticity. No one sees a real price they cannot access. Feature-based pricing tiers: instead of testing a flat price increase, test adding a premium tier at $60/month with additional features. Users self-select into the tier that matches their willingness to pay. This is perceived as fair (more features for more money) rather than discriminatory (same product, different prices). Staged rollout: after the experiment confirms a positive result, do not jump from $50 to $60 overnight. Stage 1: increase to $55 for new customers. Monitor for 2 months. Stage 2: increase to $60 for new customers. Monitor for 2 months. Stage 3: communicate the price change to existing customers with 90 days notice. This gradual approach reduces risk and gives the team time to observe long-term effects at each price point'"
    weight: 0.30
    description: "Ethics"
