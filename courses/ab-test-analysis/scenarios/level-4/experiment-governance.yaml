meta:
  id: experiment-governance
  level: 4
  course: ab-test-analysis
  type: output
  description: "Establish experiment governance — create review processes, quality standards, and organizational structures that ensure experimentation rigor at scale without slowing teams down"
  tags: [governance, review-process, quality, standards, organizational, expert]

state: {}

trigger: |
  The Chief Data Officer reviews the company's experimentation program:
  "We run 200 experiments per quarter across 15 product teams. I've
  found that 30% of shipped experiments had methodological issues —
  peeked results, missing guardrails, post-hoc metric selection. We
  need governance without creating a bureaucratic bottleneck."

  Task: Design an experimentation governance framework that maintains
  quality standards at scale while keeping teams autonomous and fast.

assertions:
  - type: llm_judge
    criteria: "Response covers governance framework structure — framework: 'Experimentation governance framework: Principle: governance should be embedded in the workflow, not imposed as a separate approval step. Most quality checks should be automated; human review reserved for high-risk decisions. Tier-based governance (risk-proportionate): Tier 1 — Low risk (80% of experiments): UI tweaks, copy changes, minor optimizations. Automated checks only, no human review required. Launch immediately after passing automated validation. Examples: button color, headline copy, image variants, sort order changes. Tier 2 — Medium risk (15% of experiments): feature launches, workflow changes, algorithm updates. Automated checks + peer review from another data scientist. 24-hour review SLA. Examples: new onboarding flow, search ranking change, notification frequency. Tier 3 — High risk (5% of experiments): pricing changes, core product changes, changes affecting revenue or retention significantly. Automated checks + peer review + experiment review board approval. 48-hour review SLA. Examples: pricing page redesign, subscription model change, payment flow modification. Automated checks (applied to ALL experiments): 1. Pre-launch validation: hypothesis documented (not blank). Primary metric defined. At least 2 guardrail metrics specified. Power analysis confirms sufficient sample size for the MDE. Traffic allocation is valid (sums to 100%). No conflicting experiments in the same layer. Duration is at least 1 full business cycle (7 days minimum). 2. During-test monitoring: guardrail metric alerts (automated Slack/email if a guardrail degrades beyond threshold). Sample ratio mismatch (SRM) detection: if the actual traffic split deviates from the planned split by more than expected, the experiment is flagged. 3. Post-test validation: results must include all guardrail metrics (not just the primary). Effect size and confidence intervals must be reported (not just p-values). Novelty effect check: is the treatment effect stable over time?'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers experiment review process and standards — review: 'Experiment review process: Pre-registration template (required for all experiments): Title: descriptive name. Owner: data scientist and PM responsible. Hypothesis: specific, falsifiable statement (if we change X, then Y will improve by at least Z because of reason). Primary metric: one metric, pre-specified. Secondary metrics: 2-3 additional metrics of interest. Guardrail metrics: 3-5 metrics that must not degrade. Expected MDE: minimum effect worth detecting. Sample size and duration: calculated from the MDE. Analysis plan: statistical method (frequentist, Bayesian, sequential), correction method for multiple comparisons if applicable. Traffic allocation: percentage of users, variant split. Risk tier: self-assessed, validated by automated rules. Peer review checklist (for Tier 2 and 3): is the hypothesis specific and testable? Is the primary metric the right one for this hypothesis? Are guardrail metrics comprehensive (user experience, business, technical)? Is the sample size calculation correct? Is the test duration sufficient (at least one full week, accounts for day-of-week effects)? Are there concurrent experiments that might interact? Is the analysis plan pre-specified (no room for post-hoc metric shopping)? Experiment review board (for Tier 3 only): 3-5 senior data scientists who rotate quarterly. Meet weekly (30-minute slots). Review 2-3 high-risk experiments per session. Focus on: is the design sound? Are the risks identified? Is the decision framework clear (what result leads to what action)? Ship/no-ship decision criteria: primary metric significant AND above practical significance threshold? All guardrail metrics within acceptable bounds? Effect stable over time (no novelty decay)? Guardrail trade-offs explicitly acknowledged and accepted by stakeholders?'"
    weight: 0.35
    description: "Review"
  - type: llm_judge
    criteria: "Response covers scaling governance and cultural integration — scaling: 'Scaling governance without bureaucracy: Principle 1 — Automate everything possible: 90% of governance should be automated checks in the experimentation platform. The platform should block experiments that fail pre-launch validation (missing hypothesis, no guardrails, insufficient power). This is not bureaucracy — it is a quality gate, like a CI pipeline for code. Principle 2 — Invest in training, not policing: quarterly experimentation workshops for all PMs and engineers. Document common mistakes with real examples (anonymized) from your own experiments. Create a best practices playbook that teams can reference. When teams understand WHY the standards exist, compliance becomes natural rather than coerced. Principle 3 — Make the right thing the easy thing: experiment templates pre-fill guardrail metrics based on the product area. Power calculators are built into the experiment creation workflow. The dashboard automatically shows guardrail metrics alongside the primary metric (no extra work to check them). Principle 4 — Experimentation quality metrics: track governance health across the organization. Percent of experiments with pre-registered hypotheses (target: 100%). Percent of experiments with adequate power (target: 90%+). Percent of shipped experiments where guardrails were clean (target: 95%+). Average time from experiment idea to launch (target: < 3 days for Tier 1). SRM detection rate (should be near zero for a well-functioning randomization system). Review these metrics quarterly with the CDO. Organizational structure: do not create a central experimentation gatekeeping team. Instead: embed data scientists in product teams (they own the experimentation quality for their team). Central experimentation platform team (4-6 engineers) builds and maintains the platform. Experimentation council (monthly meeting of senior data scientists) sets standards, reviews the quality metrics, and updates the playbook. This structure gives teams autonomy while maintaining consistent standards. The CDO should see governance as enabling faster experimentation (teams launch confidently because quality is built in) rather than slowing it down'"
    weight: 0.30
    description: "Scaling"
