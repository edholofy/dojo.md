meta:
  id: ml-model-ab-testing
  level: 4
  course: ab-test-analysis
  type: output
  description: "A/B test ML models — design experiments to evaluate machine learning model changes including ranking algorithms, recommendation systems, and prediction models in production"
  tags: [ML-testing, model-evaluation, ranking, recommendations, interleaving, expert]

state: {}

trigger: |
  The ML team wants to test a new recommendation model. "We've improved
  offline metrics — precision@10 is up 15% and NDCG is up 8% on the
  holdout set. But last time our offline metrics improved and the A/B
  test showed no change in user engagement. How do we properly test
  ML models in production?"

  Task: Explain why offline and online metrics diverge and design an
  A/B testing framework for ML model evaluation.

assertions:
  - type: llm_judge
    criteria: "Response explains offline/online metric divergence — divergence: 'Why offline and online metrics diverge: The offline-online gap is one of the most common problems in ML experimentation. Causes: 1. Training data bias: offline evaluation uses historical data where users only interacted with items the OLD model recommended. The new model may recommend different items, but we have no ground truth for how users would have interacted with those items. This is the missing counterfactual problem. Precision@10 on historical data measures: how well does the new model predict what users did when shown old model recommendations. This is NOT the same as: how well would users engage with new model recommendations. 2. Position bias: in the historical data, items shown in position 1 got clicked more than items in position 10. The offline evaluation treats all positions equally. A new model that puts slightly different items in position 1 may see very different click-through rates due to position, not relevance. 3. Feedback loops: the old model shaped user behavior over time. Users learned to find certain types of items because the old model surfaced them. The new model's recommendations may be objectively better but unfamiliar — users need time to adapt. 4. Proxy metric mismatch: offline: precision@10, NDCG (information retrieval metrics). Online: user engagement, conversion, session duration, revenue. These are correlated but not identical. A model with 15% higher precision might recommend more obscure but relevant items that users are less likely to click (lower engagement) even though they are technically more relevant. 5. Ecosystem effects: offline evaluation treats each recommendation independently. In production, the recommendations interact: if item A and item B are both recommended, showing A might cannibalize clicks on B. The offline evaluation does not account for these within-list interactions'"
    weight: 0.35
    description: "Divergence"
  - type: llm_judge
    criteria: "Response covers ML A/B test design and interleaving — design: 'ML model A/B test design: Standard A/B test for ML models: control: current recommendation model serves 50% of users. Treatment: new model serves 50% of users. Primary metrics: click-through rate on recommendations. Conversion rate from recommendation clicks. Revenue per session. Guardrail metrics: diversity of recommendations (new model should not just recommend the same popular items). Coverage (percentage of catalog surfaced in recommendations). User satisfaction (survey scores, if available). Key consideration — ramp-up strategy: do not expose 50% of users to an untested model on day 1. Day 1-3: 1% treatment (canary — check for errors, latency, crashes). Day 4-7: 5% treatment (early signal on key metrics). Week 2: 20% treatment (sufficient for power analysis on most metrics). Week 3-4: 50% treatment (full A/B test power). This protects against catastrophic model failures (bugs, degenerate recommendations). Interleaving experiments (more sensitive): instead of showing each user only one model's recommendations, interleave the results: take top-5 from the old model and top-5 from the new model. Merge them into a single list of 10, alternating between models. Track which model's items get clicked. The model whose items get clicked more often is better. Why interleaving is more sensitive: in a standard A/B test, you compare average engagement between two groups of users (high variance because users differ). In interleaving, you compare two models' items within the SAME user session (much lower variance because user-level noise is eliminated). Interleaving can detect differences 10-100x smaller than A/B tests, or equivalently, reach the same conclusion with 10-100x fewer users. Limitation: interleaving only works for ranking and recommendation systems. It does not work for testing fundamentally different UIs or features'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers long-term evaluation and model-specific challenges — longterm: 'Long-term ML model evaluation: Short-term A/B test pitfalls for ML: 1. Novelty effects: a new recommendation model surfaces different items. Users click on them out of curiosity (novelty), inflating short-term engagement. After 2-3 weeks, the novelty fades and the true engagement level appears. Solution: run ML model tests for at least 4 weeks. Analyze the treatment effect over time — if it declines, the model change was driven by novelty, not genuine improvement. 2. Learning effects: the new model may take time to learn user preferences if it uses real-time features. During the test, the treatment model has less personalization data than the control model (which has been learning for months). Solution: use a burn-in period of 1-2 weeks where the new model collects data before starting to measure the primary metric. 3. Feedback loop effects: the new model's recommendations shape what users see and click. Over time, these clicks become training data for both models. If the new model surfaces different content, it creates training data that is more aligned with its own predictions. This can create divergent model behavior over months that a 2-week test cannot capture. Solution: maintain a long-term holdout (5% of users on the old model for 3-6 months). Model-specific guardrails: latency: the new model must serve recommendations within the same p99 latency as the current model (e.g., < 50ms). Diversity: Gini coefficient or entropy of recommended items should not decrease. Coverage: percentage of catalog items recommended at least once should not decrease significantly. Freshness: if applicable, the average age of recommended items should not increase (users want recent content). Bias: check for disparate impact across user segments (gender, geography, age). A model that improves aggregate metrics but serves worse recommendations to minority segments is problematic. Decision framework: offline metrics improved AND online metrics improved → ship. Offline metrics improved AND online metrics flat → investigate the divergence (likely one of the causes above). The improvement may still be real — extend the test or use interleaving for more sensitivity. Offline metrics improved AND online metrics declined → do not ship. The offline evaluation is misleading. Investigate why. Online metrics improved AND guardrails clean → ship. Online metrics improved AND guardrails degraded → investigate trade-offs before shipping'"
    weight: 0.30
    description: "LongTerm"
