meta:
  id: experiment-driven-development
  level: 4
  course: ab-test-analysis
  type: output
  description: "Implement experiment-driven product development — integrate experimentation into every phase of the product lifecycle from ideation through launch and iteration"
  tags: [experiment-driven, product-development, lifecycle, iteration, expert]

state: {}

trigger: |
  The CPO of a growth-stage company says: "We ship features on
  quarterly roadmaps based on customer requests and competitive
  analysis. Then we A/B test them after they're built. But by that
  point, we've invested months of engineering time — we can't really
  kill a feature even if the test is negative. How do we move
  experimentation earlier in the process?"

  Task: Redesign the product development lifecycle to be experiment-
  driven, moving validation earlier and making experimentation a
  continuous part of product development.

assertions:
  - type: llm_judge
    criteria: "Response covers the experiment-driven product development framework — framework: 'Experiment-driven product development: The current problem: the CPO's process tests features AFTER they are fully built. At that point, sunk cost fallacy kicks in — no one wants to kill a feature that took 3 months to build. Experiment-driven development flips this: test assumptions BEFORE building, validate incrementally during development, and use A/B tests as the final confirmation, not the first test. The experiment-driven lifecycle: Phase 1 — Problem validation (before any code): question: does this problem actually matter to users? Methods: user interviews (5-10 conversations). Survey of target users. Analysis of support tickets, churn reasons, and feature requests. Exit criterion: qualitative evidence that the problem is real and important enough to solve. Investment: 1-2 weeks of research. Phase 2 — Solution validation (before full implementation): question: does our proposed solution resonate with users? Methods: prototype testing (Figma mockups, clickable prototypes). Fake door test: add a button or menu item for the feature. Measure how many users click it. They see a coming soon message. Concierge MVP: manually provide the service the feature would automate for 10-20 users. Measure satisfaction and retention impact. Painted door test: describe the feature on the landing page and measure click-through to learn more or sign up for early access. Exit criterion: quantitative evidence of demand. If 15% of users click the fake door, the feature has strong demand. If only 0.5% click, reconsider. Investment: 1-3 weeks. Phase 3 — MVP A/B test (minimal implementation): question: does a minimal version of the feature improve our metrics? Methods: build the simplest version that delivers the core value. A/B test the MVP against the current experience. Measure the primary metric and guardrails. Exit criterion: statistically significant improvement in the primary metric. If positive: invest in the full feature. If flat: iterate on the design. If negative: kill the feature before full investment. Investment: 2-4 weeks of development + 2-3 weeks of testing. Phase 4 — Full feature with iteration (after validation): build the complete feature with polish and edge cases. A/B test the full version against the MVP (incremental improvement). Iterate based on results. Investment: 4-12 weeks of development'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers practical implementation of fake doors and MVPs — practical: 'Practical implementation of early-stage experiments: Fake door test example: the team wants to build a collaboration feature. Implementation: add a Share Project button to the project dashboard. When clicked, show a modal: Collaboration is coming soon. Enter your email to be notified. Track: click rate on the Share Project button. Email submission rate. Results: 12% of active users clicked the Share Project button. 8% submitted their email. Interpretation: strong demand signal. Proceed to solution validation. Comparison: if only 1% clicked and 0.3% submitted, demand is weak — deprioritize. Cost: 2 hours of engineering (add a button, a modal, and an event). Value: avoid building a 3-month feature that nobody wants. MVP A/B test example: the team wants to build AI-powered product recommendations. Full feature: personalized ML model trained on user behavior, real-time inference, A/B tested recommendation placements. MVP: rule-based recommendations (users who bought X also bought Y) using simple co-purchase frequency. No ML model, no real-time inference. A/B test the rule-based MVP: if it improves conversion by 2% (p = 0.01), the feature category is validated. Invest in the ML model for incremental improvement. If it shows no effect: the recommendation concept may not work for your product. You saved 3 months of ML engineering. The MVP test principle: the first experiment should test the VALUE HYPOTHESIS (do users want this?), not the IMPLEMENTATION HYPOTHESIS (is our ML model better than rules?). Build the simplest thing that delivers the core value proposition. Test if users respond. Then optimize the implementation. Kill criteria: at each phase, define explicit kill criteria BEFORE starting: fake door: < 2% click rate → do not proceed. MVP A/B test: < 0.5% conversion improvement → do not proceed. Full feature A/B test: fails guardrail metrics → do not ship. Teams must commit to these criteria upfront. The CPO should enforce them — even for features on the roadmap that stakeholders are excited about'"
    weight: 0.35
    description: "Practical"
  - type: llm_judge
    criteria: "Response covers organizational integration and roadmap changes — organizational: 'Integrating experimentation into the roadmap: Roadmap restructuring: replace fixed quarterly roadmaps with a continuous validation pipeline. Input queue: customer requests, competitive insights, data-driven hypotheses. Stage 1 (problem validation): 5-10 ideas in parallel. 1-2 weeks each. Pass/fail rate: approximately 50%. Stage 2 (solution validation): 3-5 validated problems in parallel. 1-3 weeks each. Pass/fail rate: approximately 60%. Stage 3 (MVP A/B test): 2-3 validated solutions. 4-6 weeks each. Pass/fail rate: approximately 40%. Stage 4 (full build): 1-2 validated MVPs. 6-12 weeks each. At any given time, the team has ideas at every stage. This creates a continuous flow of validated features rather than quarterly batches of unvalidated features. Resource allocation: allocate engineering capacity: 20% for early validation (fake doors, prototypes, MVPs). 60% for full feature development (already validated). 20% for iteration and optimization of shipped features. The 20% early validation investment prevents wasting the 60% on features that users do not want. Expected outcomes: feature success rate: increases from approximately 30% (typical for opinion-driven roadmaps) to approximately 60-70% (validated features). Time to kill bad ideas: decreases from 3-6 months (built, launched, failed) to 2-4 weeks (failed at fake door or MVP stage). Engineering efficiency: more time building features that work, less time building features that get killed. Stakeholder alignment: data from experiments replaces opinion-driven debates about what to build next. For the CPO: start by piloting the experiment-driven approach with one product team for one quarter. Compare their feature success rate and impact per engineering hour to teams using the traditional roadmap. Use the results to make the case for company-wide adoption'"
    weight: 0.30
    description: "Organizational"
