meta:
  id: triggering-and-intent-to-treat
  level: 4
  course: ab-test-analysis
  type: output
  description: "Apply triggering and intent-to-treat analysis — correctly handle experiments where not all assigned users are exposed to the treatment, and avoid selection bias in triggered analyses"
  tags: [triggering, ITT, CACE, dilution, exposure, expert]

state: {}

trigger: |
  A product team tested a new checkout redesign. 100,000 users were
  assigned to the treatment group, but only 30,000 actually reached
  the checkout page and saw the redesign. The team asks: "Should we
  analyze all 100,000 users (most never saw the change) or just the
  30,000 who were exposed? Analyzing all 100,000 dilutes the effect.
  But the data scientist says analyzing only the 30,000 introduces bias."

  Task: Explain the difference between intent-to-treat and triggered
  (per-protocol) analysis, when each is appropriate, and how to avoid
  bias.

assertions:
  - type: llm_judge
    criteria: "Response explains ITT vs triggered analysis and the dilution vs bias trade-off — itt: 'Intent-to-treat (ITT) vs triggered analysis: Intent-to-treat (ITT) analysis: analyze ALL users who were ASSIGNED to the treatment, whether or not they saw the treatment. Population: all 100,000 treatment users vs all 100,000 control users. Advantage: unbiased. Randomization is preserved. Since assignment is random, the treatment and control groups are comparable on all observed and unobserved characteristics. Disadvantage: the measured effect is diluted. 70,000 treatment users never saw the checkout redesign — their behavior is identical to control. The true effect on exposed users is spread across the entire group. If the redesign improves checkout conversion by 10% for the 30,000 who saw it: ITT effect = 10% × (30,000/100,000) = 3%. The ITT effect (3%) is smaller than the actual treatment effect (10%). Triggered (per-protocol) analysis: analyze only users who were EXPOSED to the treatment (reached the checkout page). Population: 30,000 treatment users who reached checkout vs control users who reached checkout. Advantage: measures the actual treatment effect without dilution. Closer to the true effect of the redesign on users who experience it. Disadvantage: potentially biased. The 30,000 users who reached checkout are a self-selected group — they are already more engaged and more likely to convert. If the treatment changes WHO reaches checkout (e.g., the new checkout button on the product page is more prominent, attracting more users to checkout), then the exposed treatment group and the exposed control group are different populations. Any comparison is confounded by selection bias. The dilution-bias trade-off: ITT is conservative (smaller effect but unbiased). Triggered is aggressive (larger effect but potentially biased). Both are useful — the key is understanding when triggered analysis is safe'"
    weight: 0.35
    description: "ITT"
  - type: llm_judge
    criteria: "Response covers when triggered analysis is safe and CACE estimation — triggered: 'When triggered analysis is safe: Triggered analysis is valid when the trigger event is NOT affected by the treatment assignment. Safe trigger: user reaches the checkout page AND the treatment only changes the checkout page design. If the treatment does not affect whether users reach checkout (the product page, navigation, and everything before checkout is identical), then reaching checkout is independent of treatment assignment. The 30% who reached checkout in treatment and the 30% who reached checkout in control are comparable groups (assuming the reach-checkout rate is similar in both groups). Check: compare the trigger rate between treatment and control. If approximately 30% of control users also reached checkout, the trigger is safe. If 30% of treatment users reached checkout but only 25% of control users did, the treatment IS affecting the trigger — triggered analysis is biased. Unsafe trigger: user clicks on the new recommendation widget. The treatment IS the recommendation widget — it does not exist for control users. 100% of triggered treatment users clicked the widget. 0% of control users have an equivalent trigger. There is no valid comparison group for triggered analysis. CACE (Complier Average Causal Effect): when triggered analysis is unsafe, use CACE to estimate the effect on exposed users without bias. CACE = ITT effect / compliance rate. ITT effect = 3% (measured from the full-population analysis). Compliance rate = proportion of treatment users who were exposed = 30,000 / 100,000 = 30%. CACE = 3% / 0.30 = 10%. Interpretation: the checkout redesign causes a 10% improvement in conversion for users who see it. This is an unbiased estimate of the causal effect on the exposed subgroup, derived from the ITT effect (which is unbiased) divided by the exposure rate. Assumptions: the treatment has no effect on users who are not exposed (exclusion restriction). The treatment can only increase exposure, not decrease it (monotonicity). These assumptions are reasonable for most product experiments'"
    weight: 0.35
    description: "Triggered"
  - type: llm_judge
    criteria: "Response covers practical implementation guidance — practical: 'Practical implementation: Decision tree for analyzing partially-exposed experiments: Step 1: compare trigger rates between treatment and control. Treatment trigger rate: 30%. Control trigger rate: 30%. Rates are equal → triggered analysis is safe. Proceed with triggered analysis for the primary result and report ITT as a robustness check. Treatment trigger rate: 30%. Control trigger rate: 25%. Rates differ → triggered analysis is biased. Use ITT as the primary analysis. Report CACE (ITT / trigger rate) as the estimated per-exposed effect. Investigate why trigger rates differ (the treatment is affecting upstream behavior). Step 2: for the triggered analysis (when safe): define the trigger event precisely and consistently for both treatment and control. Treatment trigger: user loads the checkout page (which shows the new design). Control trigger: user loads the checkout page (which shows the old design). The trigger must be the SAME event in both groups — only the experience after the trigger differs. Step 3: pre-register the analysis approach: in the experiment plan, specify: primary analysis: ITT (all assigned users). Secondary analysis: triggered (users who reached checkout). Trigger definition: checkout page load event. Expected trigger rate: approximately 30% based on historical data. CACE estimation: if trigger rates differ, report CACE = ITT / compliance rate. Common mistakes: 1. Post-hoc triggering: defining the trigger after seeing the data to maximize the measured effect. This is p-hacking. Always pre-specify the trigger. 2. Conditioning on post-treatment behavior: analyzing only users who made a purchase to see if the treatment increased average order value. Users who purchased in treatment vs control are different populations — the treatment affected who purchased. 3. Ignoring dilution in business impact estimation: the ITT effect (3%) represents the effect on the entire user base. For revenue projections, use the ITT effect (3% × 100,000 users). The CACE (10%) applies only to users who reach checkout (30,000 users). Both give the same total impact: 3% × 100,000 = 10% × 30,000 = 3,000 additional conversions. For the product team: use ITT as the primary decision metric. It tells you the overall business impact of shipping the feature. Use CACE to understand the magnitude of the design change's effect on users who experience it. Report both in the experiment summary'"
    weight: 0.30
    description: "Practical"
