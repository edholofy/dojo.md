meta:
  id: power-analysis
  level: 2
  course: ab-test-analysis
  type: output
  description: "Perform power analysis — calculate the probability of detecting a real effect, understand the trade-offs between power, sample size, and minimum detectable effect"
  tags: [power, sample-size, MDE, type-II-error, intermediate]

state: {}

trigger: |
  A product team ran an A/B test for 2 weeks and the result was not
  statistically significant (p = 0.18). They concluded: "The new
  feature doesn't work." The data scientist asks: "Did you calculate
  the power of this test? With only 3,000 users per group, you had
  a 35% chance of detecting a true 1 percentage point improvement.
  You probably just missed it."

  Task: Explain statistical power, perform a power analysis, and
  show how underpowered tests lead to missed opportunities.

assertions:
  - type: llm_judge
    criteria: "Response explains statistical power and Type II errors — power: 'Statistical power explained: Power is the probability of detecting a real effect when it exists. Power = 1 - β, where β is the Type II error rate (false negative rate). At 80% power (the standard): if the treatment truly improves the metric, you will detect it 80% of the time. 20% of the time, you will miss the effect and incorrectly conclude no difference. At 35% power (this team's test): if the treatment truly works, you will detect it only 35% of the time. 65% of the time, you will miss the effect. Running a test with 35% power is like flipping a biased coin — you are more likely to miss the effect than to find it. The team concluded the feature does not work, but they ran a test designed to miss real effects most of the time. This is a Type II error — failing to detect a real effect because the test lacked sufficient power. Power depends on four factors: 1. Sample size (n): larger samples → higher power. 2. Effect size: larger effects are easier to detect → higher power. 3. Significance level (α): less strict α (e.g., 0.10 instead of 0.05) → higher power (but more false positives). 4. Variance in the data: less noisy data → higher power'"
    weight: 0.35
    description: "Power"
  - type: llm_judge
    criteria: "Response performs a concrete power analysis with calculations — analysis: 'Power analysis for the current test: The team had 3,000 users per group and the baseline conversion was 8%. Power calculation for different true effects: If true effect = 1pp (8% → 9%): required n = 12,800 per group at 80% power. They had 3,000 → power = 35%. They were very unlikely to detect this effect. If true effect = 2pp (8% → 10%): required n = 3,400 per group at 80% power. They had 3,000 → power = 72%. Still underpowered but close. If true effect = 3pp (8% → 11%): required n = 1,600 per group at 80% power. They had 3,000 → power = 98%. Would almost certainly detect this. Power table for 3,000 per group at baseline 8%: True effect 0.5pp: power = 14%. True effect 1.0pp: power = 35%. True effect 1.5pp: power = 58%. True effect 2.0pp: power = 72%. True effect 2.5pp: power = 87%. True effect 3.0pp: power = 98%. The team's test was only able to reliably detect effects of 2.5pp or larger. For the expected 1pp improvement, they needed 4x more data. Recommendation: if the team expects a 1pp improvement and the site gets 500 visitors per day, they need: 12,800 × 2 = 25,600 total visitors. 25,600 / 500 = 51 days (approximately 7 weeks). A 2-week test with 500 visitors per day captures only 7,000 total visitors — far short of the 25,600 needed'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response covers practical trade-offs and when to adjust power parameters — tradeoffs: 'Practical power trade-offs: Trade-off 1 — MDE vs duration: the team wants a 2-week test. What MDE can they detect? With 3,000 per group in 2 weeks: detectable MDE = approximately 2.5pp at 80% power. If a 2.5pp improvement is meaningful, a 2-week test is sufficient. If the team needs to detect a 1pp effect, they must run for 7+ weeks. Decision: is a 2.5pp improvement the minimum that justifies the engineering effort? If yes, the test duration is adequate. If 1pp is meaningful, extend the test. Trade-off 2 — Power vs false positive rate: increasing power from 80% to 90% requires 30% more sample. 80% power at 1pp MDE: 12,800 per group. 90% power at 1pp MDE: 17,100 per group. The additional 4,300 users per group costs 9 extra days. Is the reduced false negative risk worth the extra time? For high-stakes decisions (pricing changes, major redesigns): use 90% power. For routine optimizations (button colors, copy changes): 80% is sufficient. Trade-off 3 — One-tailed vs two-tailed: a one-tailed test (only testing if treatment is better, not worse) has more power than a two-tailed test. 80% power two-tailed: 12,800 per group. 80% power one-tailed: 10,200 per group (20% smaller). But one-tailed tests cannot detect if the treatment is significantly worse. Use one-tailed only when you are certain the treatment cannot harm the metric. When to accept lower power: if the cost of extending the test exceeds the value of detecting the effect, accept lower power. If a 1pp improvement is worth $20K annually and extending the test costs $50K in delayed launch, running a shorter underpowered test and accepting the risk of a false negative may be the rational choice'"
    weight: 0.30
    description: "TradeOffs"
