meta:
  id: intermediate-experiment-shift
  level: 2
  course: ab-test-analysis
  type: output
  description: "Intermediate experiment shift — handle multiple A/B testing challenges requiring power analysis, Bayesian reasoning, sequential monitoring, and proper segmentation in a single day"
  tags: [shift-simulation, intermediate, multi-request, end-to-end]

state: {}

trigger: |
  Three requests arrive from different teams:

  Request 1 (VP of Product): "We launched a pricing page test 5 days
  ago. The dashboard shows p = 0.02 with an 8% lift in purchases. The
  CEO wants to ship it today — revenue is the top priority. But we
  planned a 3-week test. What should we do?"

  Request 2 (Growth Analyst): "I ran an A/B test on the email welcome
  sequence. Overall result: 1% lift, p = 0.42. But when I break it down,
  returning users show a 12% lift (p = 0.03) and new users show -2%
  (p = 0.45). Should we ship to returning users only?"

  Request 3 (Product Analyst): "We want to test 5 different onboarding
  flows plus the control (6 variants total). We get 500 new users per
  day. The PM wants results in 2 weeks. How should we design this?"

  Task: Handle all three requests with proper statistical reasoning.

assertions:
  - type: llm_judge
    criteria: "Response handles Request 1 with peeking and sequential testing reasoning — peeking: 'Request 1 — Pricing page test peeking dilemma: The problem: the test was designed for 3 weeks but results look significant at day 5. Shipping now is tempting but risky. Why you should not ship based on day 5 results: 1. Peeking inflates false positives. A fixed-sample test checked at day 5 of a 21-day plan is an unscheduled interim look. The real false positive rate with daily checking could be 15-25%, not 5%. The p = 0.02 may be a random fluctuation. 2. Novelty effect. Pricing page changes often trigger novelty — users may click explore the new pricing. The 8% lift could shrink substantially over 3 weeks. 3. Small sample. After 5 days you have roughly 1/4 of the planned sample. Confidence intervals are wide: likely [1%, 15%] lift. The true effect could be as low as 1%. Options for the CEO: Option A — Wait the full 3 weeks. Safest. The result will be reliable. If the effect is real, it will still be there in 2 weeks. Revenue lost by waiting 2 more weeks is small compared to the risk of shipping a false positive on the pricing page (pricing mistakes are costly and highly visible). Option B — Use sequential testing (if it was planned). If the team pre-specified a group sequential design with interim analyses: check the O'Brien-Fleming boundary for 25% information fraction (day 5 of 21). The boundary at 25% is approximately z = 4.05 (p < 0.0001). The observed p = 0.02 (z ≈ 2.3) does not cross the sequential boundary. You cannot stop early under the sequential design. Option C — If the CEO insists on speed: switch to a Bayesian framework. Calculate the probability that the treatment is better: likely around 92-95% based on current data. Present this honestly: there is about a 5-8% chance we are making a mistake. For a pricing change, this risk may be unacceptable. Recommendation: wait the full 3 weeks. For future pricing tests, plan sequential monitoring from the start'"
    weight: 0.35
    description: "Peeking"
  - type: llm_judge
    criteria: "Response handles Request 2 with proper segmentation reasoning — segmentation: 'Request 2 — Email welcome sequence segmentation: The overall result is clear: 1% lift, p = 0.42 — not significant. The treatment does not work on average. The segment finding is suspect: returning users 12% lift (p = 0.03) was not pre-specified as a primary analysis. This is a post-hoc discovery from exploring the data. Multiple comparison issue: testing 2 segments (new vs returning) at α = 0.05 gives a family-wise error rate of 1 - (0.95)^2 = 9.75%. With Bonferroni correction, the threshold becomes 0.05/2 = 0.025. The returning user result (p = 0.03) does not survive Bonferroni correction. Interaction test: is the difference in treatment effect between returning users (12%) and new users (-2%) statistically significant? Given the overall non-significant result and the relatively small sample sizes per segment, the interaction is likely not significant. Do NOT ship to returning users only based on this analysis. The reasons: 1. Post-hoc segment discovery has high false positive risk. 2. The segment result does not survive multiple testing correction. 3. The overall result is null — a strong signal against a real effect. 4. The negative effect on new users (-2%) would need investigation before any rollout. What to do instead: if the team genuinely believes the welcome sequence should differ by user type, run a new test specifically designed for returning users with returning user engagement as the primary metric and adequate sample size. This becomes a confirmatory test of the hypothesis generated by this exploratory finding'"
    weight: 0.35
    description: "Segmentation"
  - type: llm_judge
    criteria: "Response handles Request 3 with proper A/B/n test design — design: 'Request 3 — Six-variant onboarding test design: Feasibility check: 6 variants with 500 new users per day = approximately 83 users per variant per day. In 2 weeks: 83 × 14 = 1,162 users per variant. Is 1,162 per variant enough? For baseline conversion 10%, MDE 3pp, α = 0.05, power 80%: need approximately 2,200 per group for a 2-group test. With 5 treatment-vs-control comparisons and Bonferroni correction (α = 0.05/5 = 0.01): need approximately 3,200 per group. At 83 per variant per day: 3,200 / 83 = 39 days (5.5 weeks). The 2-week deadline is impossible for detecting a 3pp effect with 6 variants. Options: Option A — Reduce the number of variants. Test 3 variants (control + 2 treatments): 167 users per variant per day. Need 2,200 per group: 2,200 / 167 = 13 days. This fits in 2 weeks if the MDE is 3pp or larger. Pick the 2 most promising onboarding flows based on qualitative assessment. Test the others in a follow-up experiment. Option B — Accept a larger MDE. With 1,162 per group (6 variants, 2 weeks): detectable MDE ≈ 5-6pp with Bonferroni correction. Only useful if the team expects large differences between onboarding flows. This is plausible for onboarding (fundamentally different experiences). Option C — Run a longer test. Extend to 6 weeks: 83 × 42 = 3,486 per variant. Sufficient for 3pp MDE with Bonferroni correction. But the PM wants results in 2 weeks. Option D — Use a multi-armed bandit (MAB). Allocate more traffic to better-performing variants over time. Faster convergence to the best variant but no formal statistical test. Appropriate if the goal is to quickly identify the best variant rather than measure exact effect sizes. Recommendation: Option A — reduce to 3 variants. Run for 2 weeks. Achieve 80% power for 3pp MDE. Test remaining variants in a second round. This gives the PM results on time while maintaining statistical rigor'"
    weight: 0.30
    description: "Design"
