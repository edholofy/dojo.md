meta:
  id: experimentation-ethics
  level: 5
  course: ab-test-analysis
  type: output
  description: "Navigate experimentation ethics — address ethical dilemmas in user experimentation including informed consent, harm minimization, vulnerable populations, and responsible data practices"
  tags: [ethics, consent, harm, privacy, responsible-experimentation, master]

state: {}

trigger: |
  A journalist publishes an article: "Tech Company X Secretly
  Experiments on Millions of Users Without Consent." The article
  references a leaked experiment that tested emotionally manipulative
  push notifications to increase engagement. The CPO asks: "Where
  is the line? We run hundreds of experiments — are we doing this
  ethically? Do we need user consent for every A/B test?"

  Task: Develop an ethical framework for experimentation that protects
  users while enabling innovation, addressing consent, harm, and
  transparency.

assertions:
  - type: llm_judge
    criteria: "Response covers ethical principles and consent framework — principles: 'Ethical principles for experimentation: Principle 1 — Minimal risk standard: most A/B tests fall under minimal risk — the risk to participants is no greater than what they encounter in their normal use of the product. Testing button colors, layout changes, copy variations, and minor feature adjustments are minimal risk. These do not require individual consent because: users already experience frequent product changes (updates, bug fixes, feature additions). The risk is equivalent to normal product usage. Every product change is implicitly an experiment (we just choose not to measure most of them). Principle 2 — The consent threshold: consent is required when experiments: introduce ABOVE-NORMAL risk to users. Involve sensitive areas (health, finances, emotional well-being). Collect new categories of personal data. Could cause actual harm if the treatment is ineffective or negative. The emotionally manipulative push notification experiment crossed this threshold — it deliberately targeted emotional states to change behavior. This is above-normal risk and requires explicit consent or should not be conducted at all. Consent framework by risk level: minimal risk (no additional consent needed): UI changes, copy variations, feature flag rollouts, algorithm adjustments. Users consent to these through the terms of service and product usage. Medium risk (internal ethics review required): experiments that may affect purchasing decisions (pricing, recommendations). Experiments that change communication frequency (emails, notifications). Experiments involving personalization that uses sensitive attributes. High risk (explicit consent or ethics board review): experiments involving emotional manipulation. Experiments on vulnerable populations (children, people in crisis). Experiments that could cause financial harm (credit decisions, insurance). Experiments involving health-related recommendations or interventions. Prohibited: experiments designed to exploit cognitive biases for company benefit at user expense. Experiments on users who have opted out of experimentation (if opt-out exists). Experiments that violate laws or regulations (GDPR, consumer protection)'"
    weight: 0.35
    description: "Principles"
  - type: llm_judge
    criteria: "Response covers harm minimization and vulnerable populations — harm: 'Harm minimization framework: Types of harm in experimentation: 1. Direct harm: the treatment causes a negative experience. Example: a slower page load in the treatment group wastes users' time. Example: a confusing checkout flow causes users to accidentally purchase the wrong item. 2. Opportunity cost harm: the control group is denied a beneficial treatment. Example: a medical information feature that helps users make better health decisions — users in the control group do not receive this benefit during the test. 3. Psychological harm: the experiment manipulates emotional states or exploits psychological vulnerabilities. The leaked push notification experiment falls here. 4. Economic harm: the experiment affects users' financial outcomes (pricing experiments, credit decisions). 5. Privacy harm: the experiment requires collecting or using data in ways users would not expect. Harm minimization strategies: 1. Staged rollout with guardrails: start with small treatment groups (1-5%). Monitor for harm signals before expanding. Automated stopping rules: if harm metrics exceed thresholds, stop the experiment immediately. 2. Asymmetric risk mitigation: if the treatment could cause harm, allocate less traffic to treatment (80/20 or 90/10 split). The expected value calculation: small chance of harm × small exposed population = minimal total harm. 3. Reversibility: prefer experiments where the treatment can be instantly reversed. If a user has a bad experience, they return to normal on their next visit. For irreversible actions (purchasing decisions, account deletions), extra caution is required. 4. Vulnerable population protections: children (under 18): require parental consent for above-minimal-risk experiments. No emotional manipulation experiments. Users in crisis (support ticket, cancellation flow): do not experiment on users who are frustrated or seeking help. The control experience should be the best available, not a degraded version. New users (first-time visitors): more vulnerable to bad first impressions. Use conservative treatment allocations and shorter test durations. Financial vulnerability: do not test higher prices or reduced benefits on users identified as financially stressed'"
    weight: 0.35
    description: "Harm"
  - type: llm_judge
    criteria: "Response covers organizational ethics structure and transparency — organization: 'Organizational ethics structure: Internal Experimentation Ethics Board: composition: 1 senior data scientist, 1 product leader, 1 legal/compliance representative, 1 user research/UX representative, 1 external advisor (rotates annually). Responsibilities: review all high-risk experiments before launch. Set and update the ethical framework annually. Investigate ethical concerns raised by any employee. Publish an annual experimentation ethics report (internal). Review process: experiment owner submits the pre-registration with a risk assessment. For Tier 1 (minimal risk): automated approval based on risk scoring. For Tier 2 (medium risk): peer review with ethics checklist. For Tier 3 (high risk): ethics board review within 48 hours. The ethics board can: approve, approve with conditions (e.g., reduced sample size, additional monitoring), require modifications, or reject. Transparency practices: 1. Internal transparency: all experiments are documented in a shared repository. Any employee can view any experiment's design, results, and risk assessment. Quarterly experimentation ethics report shared with all employees. 2. External transparency: publish an annual experimentation transparency report: number of experiments run. Categories of experiments (UI, features, algorithms, pricing). Ethical review statistics (how many experiments were modified or rejected). What data is used in experimentation. Provide users with an experimentation information page explaining: that the company runs experiments to improve the product. What types of experiments are conducted. How user privacy is protected. How users can raise concerns. 3. Regulatory compliance: GDPR: experimentation is covered under legitimate interest for minimal-risk tests. Above-minimal-risk tests may require a data protection impact assessment. Maintain records of all experiments involving personal data. User opt-out (considered but not always practical): allowing users to opt out of all experiments creates selection bias (opted-out users differ systematically from opted-in users). Alternative: offer opt-out from above-minimal-risk experiments only. Minimal-risk experiments are part of normal product development and do not require individual opt-out. For the CPO: the leaked experiment was ethically wrong — emotionally manipulative push notifications cross the harm threshold. Implement the ethics framework immediately. Most of your 200+ experiments are likely minimal risk and ethically sound. The framework exists to catch the 2-5% that require careful review'"
    weight: 0.30
    description: "Organization"
