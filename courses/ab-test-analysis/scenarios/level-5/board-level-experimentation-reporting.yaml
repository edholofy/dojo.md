meta:
  id: board-level-experimentation-reporting
  level: 5
  course: ab-test-analysis
  type: output
  description: "Communicate experimentation results to the board — translate complex statistical findings into strategic narratives that inform board-level decisions and investment priorities"
  tags: [board-communication, executive-reporting, strategic-narrative, ROI, master]

state: {}

trigger: |
  The CEO is preparing for the quarterly board meeting: "The board
  wants to understand our experimentation program. They're not
  statisticians — they want to know: Is our experimentation investment
  paying off? What did we learn? How should it influence our strategy?
  I need a 10-minute presentation that justifies our $3M annual
  experimentation investment."

  Task: Create a board-level experimentation report framework that
  communicates the program's value, key learnings, and strategic
  implications.

assertions:
  - type: llm_judge
    criteria: "Response covers board-level reporting framework — framework: 'Board-level experimentation report framework: The 10-minute structure: Slide 1 — Experimentation program ROI (2 minutes): the single most important slide. Direct impact: experiments that shipped and generated measurable revenue or cost savings. Q3 experiments shipped: 45. Revenue impact of shipped experiments: +$8.2M annualized (measured via long-term holdout). Cost savings from killed experiments: $4.5M in engineering time NOT spent on features that tested negative. Total program value: $12.7M. Program cost: $3M (platform, team, tools). ROI: 4.2x return on investment. Present this as a simple equation the board can remember: for every $1 invested in experimentation, we generated $4.20 in validated value. Slide 2 — Key learnings that inform strategy (3 minutes): translate experiment results into strategic insights: Learning 1: our mobile conversion rate responds 3x more strongly to UX improvements than desktop. Implication: shift 60% of product investment to mobile optimization. Supported by: 12 experiments consistently showing stronger mobile effects. Learning 2: price sensitivity is concentrated in the first 90 days. After 90 days, users are significantly less price-sensitive. Implication: offer aggressive introductory pricing and increase prices after the retention threshold. Supported by: pricing experiment across 5 markets showing 2.3x higher price elasticity in the first 90 days. Learning 3: our recommendation algorithm improvements have plateaued — the last 3 algorithm experiments showed no significant improvement. Implication: reallocate ML engineering from recommendation improvements to other high-impact areas (search, personalization, fraud detection). Supported by: 3 consecutive algorithm tests with p > 0.3 (null results). Frame each learning as: what we found → what it means for the business → what we should do differently'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers experimentation health metrics for the board — health: 'Experimentation health metrics: Slide 3 — Program health dashboard (2 minutes): present 4-5 metrics that the board can track quarter-over-quarter: Metric 1 — Experiment velocity: Q3: 180 experiments launched (up from 120 in Q2). Target: 250 by Q4. Trend: ↑ 50% QoQ — teams are adopting experimentation faster. Metric 2 — Coverage: 78% of product launches were tested before shipping (up from 55% in Q2). Target: 90% by end of year. Remaining gap: infrastructure and enterprise features (harder to test). Metric 3 — Win rate: 28% of experiments showed a statistically significant positive result. This is healthy — if the win rate were 60%+, it would mean we are only testing safe bets and not taking enough risks. A 28% win rate means we are testing bold hypotheses. The 72% that did not win are not failures — they saved us from shipping changes that do not work. Metric 4 — Time to decision: average experiment duration decreased from 4.2 weeks (Q2) to 2.8 weeks (Q3). Driven by: CUPED implementation (40% variance reduction), sequential testing adoption. Faster decisions = faster iteration = more experiments per quarter. Metric 5 — Cumulative impact (from long-term holdout): users in the holdout group (no shipped experiments) show 12% lower conversion than users receiving all shipped experiments. This confirms that the experimentation program is delivering real cumulative value. Present these as a simple dashboard with trend arrows — the board should be able to see at a glance whether the program is improving'"
    weight: 0.35
    description: "Health"
  - type: llm_judge
    criteria: "Response covers strategic recommendations and forward-looking view — strategic: 'Strategic recommendations and forward look: Slide 4 — What experiments tell us about strategic bets (2 minutes): connect experiment results to the company's strategic priorities: Strategic priority 1 — International expansion: experiments in new markets show 40% lower conversion than established markets. Root cause identified: payment method coverage (only 2 payment methods in new markets vs 8 in established markets). Recommendation: prioritize local payment method integration before heavy marketing spend in new markets. Validated by: A/B test of adding local payment methods in Brazil — conversion increased 65%. Strategic priority 2 — Enterprise segment: enterprise customer onboarding experiment showed that guided setup (with dedicated CSM) increases 90-day retention by 35% vs self-serve setup. Recommendation: invest in scaling the CSM-assisted onboarding for enterprise, despite the higher CAC. The LTV improvement more than justifies the investment. Strategic priority 3 — AI features: our AI-powered feature experiments show a consistent pattern — high initial engagement (novelty) followed by 50-60% drop-off after 2 weeks. Recommendation: invest in AI features that provide sustained value (not just novelty). Current AI features may not justify the compute costs. Slide 5 — Next quarter priorities (1 minute): Planned high-impact experiments: pricing restructuring test (estimated $5-15M annual impact). New onboarding flow for mobile (addressing the 40% mobile conversion gap). Enterprise self-serve tier experiment (could unlock $20M segment). Investment request: maintain $3M annual budget. Request additional $500K for international experimentation infrastructure (multi-market testing, geo-randomization capability). Expected Q4 program value: $15M+ (based on pipeline of validated experiment ideas). Close with the CEO's message: experimentation is not a cost center — it is our most reliable method for de-risking the $50M we spend on product development. Every dollar invested in experimentation saves us from wasting $4 on features that do not work'"
    weight: 0.30
    description: "Strategic"
