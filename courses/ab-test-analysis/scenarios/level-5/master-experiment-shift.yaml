meta:
  id: master-experiment-shift
  level: 5
  course: ab-test-analysis
  type: output
  description: "Master experiment shift — handle executive-level experimentation challenges requiring causal inference, ethical reasoning, strategic portfolio management, and board-level communication in a single day"
  tags: [shift-simulation, master, multi-request, end-to-end]

state: {}

trigger: |
  Three critical escalations reach the Chief Data Scientist:

  Request 1 (CEO): "The board meeting is in 3 days. I need to present
  the ROI of our experimentation program AND explain why we can't
  measure the impact of our new EU privacy feature (we launched it
  to all EU users simultaneously — no A/B test was possible). Can
  you give me something compelling for both?"

  Request 2 (Chief Compliance Officer): "Our health insurance division
  wants to experiment with plan recommendation algorithms. The
  regulations say we can't show different plan options to different
  users. But the product team says they need to test 3 different
  recommendation approaches. Is there any way to do this compliantly?"

  Request 3 (Board Member): "I invested in a competitor and their
  experimentation program is 5 years ahead of ours. They run 1,000
  experiments per quarter and claim it's their primary competitive
  advantage. How do we close this gap and what will it cost?"

  Task: Address all three requests with master-level reasoning.

assertions:
  - type: llm_judge
    criteria: "Response handles Request 1 with program ROI and causal inference for the EU feature — board: 'Request 1 — Board presentation: experimentation ROI and EU privacy feature: Part A — Experimentation program ROI: prepare a board-ready 3-slide summary: Slide 1: headline ROI. Program investment: $4M. Validated annual value: $26M (6.5x return). Components: $12M revenue from shipped experiments, $10M saved from killed experiments, $4M from speed improvements. Evidence: long-term holdout shows users who receive shipped experiments generate 12% more revenue than holdout users. Slide 2: strategic learnings. Top 3 experiment-driven strategic insights (e.g., mobile optimization 3x more effective, enterprise tier validated, pricing elasticity mapped). Slide 3: program health. 180 experiments per quarter (up 50% YoY). 78% coverage of product launches. 28% win rate (healthy — testing bold hypotheses). Part B — Measuring the EU privacy feature without an A/B test: the feature launched to all EU users simultaneously — no randomization possible. Method 1 — Synthetic controls: construct a synthetic EU from non-EU markets weighted to match EU's pre-launch engagement trends. Compare actual EU post-launch to synthetic EU. If synthetic EU predicts 50 sessions/user/month and actual EU shows 47: estimated impact of privacy feature = -3 sessions (6% decline). Confidence: depends on pre-treatment fit quality. If the synthetic EU closely matched actual EU for 12+ months pre-launch, the estimate is credible. Method 2 — Difference-in-differences: compare EU (treated) to a carefully selected comparison region (e.g., UK post-Brexit, or non-EU European countries). Check parallel trends in the pre-launch period. If trends were parallel, DiD estimates the causal impact. Present both methods to the board with appropriate caveats: these are our best estimates of the causal impact, based on quasi-experimental methods. They are not as precise as an A/B test, but they provide credible evidence of the feature's effect. For the CEO: present the ROI slide as the anchor. Then frame the EU analysis as an example of the experimentation team's ability to generate insights even when A/B testing is not possible'"
    weight: 0.35
    description: "Board"
  - type: llm_judge
    criteria: "Response handles Request 2 with compliant experimentation in health insurance — compliance: 'Request 2 — Compliant experimentation for health insurance recommendations: The regulatory constraint: all users must see all available compliant plan options. You cannot hide plans or show different plans to different users. Compliant experimentation approaches: Approach 1 — Test the presentation, not the options: all three recommendation algorithms produce a ranking of the SAME set of compliant plans. The experiment tests which ranking users see first. All users can scroll to see all plans. All plans meet ACA requirements. The experiment only changes the DEFAULT sort order and highlighted recommendation. Algorithm A: ranks by lowest premium. Algorithm B: ranks by total estimated cost (premium + deductibles). Algorithm C: ranks by coverage match (best match to user's health needs). Compliance review: each algorithm only reorders existing compliant plans. No plan is hidden or removed. Users can always access all options. The default recommendation in each variant is compliant and in the user's interest. This is analogous to testing which book a bookstore puts in the front display — all books are available, only the prominence differs. Approach 2 — Shadow testing: run all 3 algorithms simultaneously in the background. All users see the current algorithm's recommendations. The other 2 algorithms' recommendations are logged but never shown. Offline analysis: compare which algorithm would have recommended plans that users actually chose. The algorithm whose recommendations most closely match user preferences (revealed by their actual choices) is likely the best. Limitation: does not measure the effect of changing the recommendation (users may have chosen differently if they saw a different default). But it is fully compliant since no user sees anything different. Approach 3 — Temporal testing (switchback within markets): week 1: all users see Algorithm A's recommendations. Week 2: all users see Algorithm B's recommendations. Week 3: all users see Algorithm C's recommendations. All users in a given week see the same thing — no individual-level randomization. Analyze: which week had the highest user satisfaction and plan match quality. Compliance: all users received the same treatment at any given time. Carryover effects: users who browsed in week 1 may return in week 2 with different expectations. Use buffer periods. Recommended approach: start with shadow testing (Approach 2) to narrow from 3 algorithms to 2. Then use presentation testing (Approach 1) for the final 2 candidates with compliance review and sign-off'"
    weight: 0.35
    description: "Compliance"
  - type: llm_judge
    criteria: "Response handles Request 3 with gap analysis and acceleration plan — gap: 'Request 3 — Closing a 5-year experimentation gap: Current state assessment: our program: approximately 180 experiments per quarter, Stage 3 maturity. Competitor: approximately 1,000 experiments per quarter, Stage 5 maturity. The gap: 5.5x in volume and 2 maturity stages. Can we close this gap? Not in 1 year — but we can make significant progress in 2-3 years. Reality check: the competitor had 5 years of compounding experimentation knowledge. We cannot buy that knowledge — we must build it. But we can accelerate by: learning from their public practices (blog posts, conference talks, papers). Hiring experienced experimentation practitioners from mature programs. Investing aggressively in platform and culture. Acceleration plan: Year 1 — Foundation sprint ($6M investment): hire 5 additional experimentation data scientists ($1.5M). Upgrade or replace experimentation platform with best-in-class tooling ($1M). Deploy CUPED, sequential testing, and automated guardrails (platform team, $500K). Experimentation culture program: bootcamps, embedded DS partners, incentives ($500K). Fund 10 strategic experiments aligned with business priorities ($2.5M in engineering time). Target: 400 experiments per quarter by year-end (2.2x growth). Year 2 — Scaling ($5M investment): advanced methods: HTE, causal inference, interleaving, switchback experiments. Cross-divisional CoE structure. Long-term holdout program to measure cumulative value. Automated interaction detection for concurrent experiments. Target: 700 experiments per quarter by year-end. Year 3 — Excellence ($4M investment): experimentation embedded in every product development process. Automated experiment-driven feature flags. Portfolio management (60/30/10 core/strategic/exploratory). Target: 1,000+ experiments per quarter. Total 3-year investment: $15M. Expected 3-year cumulative value: $75-100M (based on industry benchmarks of 6-8x ROI for mature programs). For the board member: the competitor's 5-year head start is real but not insurmountable. With aggressive investment ($15M over 3 years), we can reach parity in experiment volume by year 3. The knowledge gap (institutional learnings from 5 years of experiments) takes longer to close but each experiment we run adds to our own knowledge base. The cost of NOT closing this gap: the competitor's compounding advantage will widen every quarter. In 3 years, they will be at 10 years of experimentation maturity while we remain at 3. Starting now is not optional — it is existential'"
    weight: 0.30
    description: "Gap"
