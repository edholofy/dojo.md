meta:
  id: experimentation-in-regulated-industries
  level: 5
  course: ab-test-analysis
  type: output
  description: "Navigate experimentation in regulated industries — design compliant A/B testing programs in healthcare, finance, insurance, and other regulated sectors while maintaining scientific rigor"
  tags: [regulated-industries, compliance, healthcare, finance, legal, master]

state: {}

trigger: |
  A fintech company's Chief Compliance Officer pushes back on the
  experimentation program: "You can't A/B test financial products.
  Showing different interest rates or credit limits to different
  customers could violate fair lending laws. And in our health
  insurance division, experimenting with plan recommendations could
  harm patients. How do you propose we experiment responsibly in
  a regulated environment?"

  Task: Design an experimentation framework for regulated industries
  that maintains compliance while enabling data-driven decisions.

assertions:
  - type: llm_judge
    criteria: "Response covers regulatory landscape and constraints — regulatory: 'Regulatory constraints on experimentation: Finance and lending: fair lending laws (Equal Credit Opportunity Act, Fair Housing Act): cannot discriminate in credit decisions based on protected characteristics (race, gender, age, national origin). Disparate impact: even if the experiment does not intentionally discriminate, if the treatment disproportionately affects a protected group, it may violate fair lending laws. Example risk: testing a new credit scoring algorithm that coincidentally approves fewer minority applicants — even if race is not a variable in the model. Truth in Lending Act (TILA): requires consistent disclosure of terms (APR, fees) to all applicants. Showing different APRs to different users in an A/B test may violate disclosure requirements. UDAAP (Unfair, Deceptive, or Abusive Acts or Practices): experiments that could be perceived as deceptive (showing different terms to different users without disclosure) may violate consumer protection. Healthcare and insurance: HIPAA: any experiment involving health data must comply with privacy requirements. De-identification required for experiment analytics. Minimum necessary standard — use only the data needed for the experiment. ACA and state insurance regulations: health plan recommendations must be actuarially sound and compliant. Cannot steer users toward plans that are worse for them (even in an experiment). Cannot deny or delay access to care as part of an experiment. IRB (Institutional Review Board) requirements: experiments involving health outcomes may require IRB approval. The Common Rule (45 CFR 46) governs research involving human subjects. General regulation: GDPR (EU): experimentation may require a legitimate interest assessment or DPIA (Data Protection Impact Assessment). Right to explanation: automated decisions affecting users must be explainable. Users have the right to not be subject to solely automated decision-making'"
    weight: 0.35
    description: "Regulatory"
  - type: llm_judge
    criteria: "Response covers compliant experimentation approaches — compliant: 'Compliant experimentation approaches: Approach 1 — Test the experience, not the outcome: instead of testing different interest rates (which may violate fair lending), test: how rates are presented (visual layout, explanation clarity). The application process (shorter forms, progress indicators, video explanations). Customer support experience (chatbot vs human, response time). The financial terms remain identical for all users — only the user experience differs. This is analogous to testing button colors and copy — the underlying product is the same. Example: A/B test two credit application experiences. Control: standard multi-page form. Treatment: streamlined single-page form with real-time eligibility feedback. Both groups receive the same credit evaluation, same rates, same terms. The experiment measures application completion rate, not credit outcomes. Approach 2 — Within-policy variation: most regulated products have a range of compliant options. Test within the range, not outside it. Example: insurance plan recommendation algorithm. All plans recommended must be ACA-compliant. The experiment tests which COMPLIANT plan is recommended first (the order of presentation, not the available plans). Users can always see all plans — the experiment changes the default sort order or highlighted option. Compliance review: before launch, the compliance team confirms that all variants show only compliant options and that the default recommendation in each variant meets regulatory requirements. Approach 3 — Quasi-experimental methods: when you cannot randomize: use natural experiments (policy changes, market-level rollouts). Difference-in-differences to measure the effect of a regulatory change. Regression discontinuity around eligibility thresholds (e.g., credit score cutoffs). These methods do not require showing different offers to different customers — they exploit existing variation. Approach 4 — Shadow testing: deploy the new algorithm in parallel with the existing one. All users see the results from the CURRENT algorithm. The new algorithm runs in the background, producing recommendations that are logged but never shown. Compare the two algorithms' recommendations offline. If the new algorithm recommends different products: check for disparate impact across protected groups. Check that all recommendations are compliant. Only after passing compliance review, run a live A/B test with the new algorithm'"
    weight: 0.35
    description: "Compliant"
  - type: llm_judge
    criteria: "Response covers organizational integration of compliance and experimentation — integration: 'Organizational integration: Compliance-experimentation partnership: 1. Embed compliance in the experiment review process: every experiment in a regulated product area must include a compliance review before launch. Create a streamlined compliance checklist (not full legal review for every test): does the experiment change financial terms or outcomes? (If yes, full legal review.) Does the experiment affect protected characteristics differently? (If yes, disparate impact analysis required.) Does the experiment involve health data or health recommendations? (If yes, HIPAA review and possible IRB.) Does the experiment change disclosures or terms shown to users? (If yes, TILA/UDAAP review.) If all answers are no (experience-only changes), the experiment proceeds with standard governance. 2. Pre-approved experiment categories: work with legal and compliance to pre-approve categories of experiments that are always compliant. Pre-approved: UX layout changes (button placement, colors, copy). Application flow optimizations (form design, progress indicators, help text). Communication channel testing (email vs SMS vs in-app for non-regulated communications). Content and educational material presentation. Requires review: algorithm changes (recommendation, scoring, pricing). New data usage in decision-making. Changes to terms presentation or disclosures. Experiments involving vulnerable populations. 3. Disparate impact monitoring: for every experiment in a regulated area, automatically compute treatment effects by protected group. If the treatment effect differs significantly across groups (e.g., white applicants benefit but Black applicants do not), flag the experiment for compliance review. This monitoring should be automated in the experimentation platform — do not rely on analysts to remember to check. 4. Documentation and audit trail: regulated industries require thorough documentation. Every experiment should have: pre-registration with compliance sign-off. Complete data lineage (what data was used, how it was processed). Results with subgroup analysis by protected characteristics. Decision rationale (why the experiment was shipped or not). This audit trail protects the company in regulatory examinations. For the CCO: experimentation IS possible in regulated industries — it just requires a thoughtful framework that distinguishes between experience experiments (low regulatory risk) and outcome experiments (high regulatory risk). The compliance team should be a partner in the experimentation program, not a blocker. Their involvement protects the company while enabling data-driven decisions'"
    weight: 0.30
    description: "Integration"
