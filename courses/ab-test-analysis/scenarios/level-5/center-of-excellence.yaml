meta:
  id: center-of-excellence
  level: 5
  course: ab-test-analysis
  type: output
  description: "Build an experimentation center of excellence — create the organizational structure, processes, and capabilities that enable world-class experimentation across a large enterprise"
  tags: [center-of-excellence, CoE, organizational-design, capability-building, master]

state: {}

trigger: |
  The Chief Data Officer of a 5,000-person company (technology, media,
  and e-commerce divisions) is tasked by the board: "Create a Center
  of Excellence for experimentation that serves all three divisions.
  Each division has different experimentation maturity — technology is
  advanced, media is just starting, e-commerce has some capability.
  How should we structure this?"

  Task: Design the organizational structure, staffing model, and
  operating model for a cross-divisional experimentation center of
  excellence.

assertions:
  - type: llm_judge
    criteria: "Response covers CoE organizational structure — structure: 'Center of Excellence organizational structure: Model selection — hub-and-spoke (recommended for this company): Central hub (CoE): 8-12 people who own the platform, methodology, and standards. Division spokes: embedded experimentation partners within each division. Why hub-and-spoke: the hub provides: unified platform and tools (one investment, shared across divisions). Consistent methodology and quality standards. Advanced methods expertise (causal inference, HTE, bandits). Cross-divisional knowledge sharing (experiment learnings from e-commerce inform media). The spokes provide: deep domain expertise (media experiments are fundamentally different from e-commerce). Fast response time (embedded in the team, available immediately). Cultural alignment with the division's workflow. Central hub team structure (10 FTE): Head of Experimentation (1): reports to CDO. Sets strategy, manages stakeholders, represents the CoE at executive level. Platform engineering (3): build and maintain the experimentation platform. Handle SDK integration, data pipeline, analysis engine. Methodology and research (2): develop new statistical methods (CUPED, sequential testing, causal inference). Review complex experiment designs. Publish internal research and best practices. Enablement and training (2): onboard new teams. Run workshops and bootcamps. Create documentation and self-serve resources. Analytics and reporting (2): program-level reporting (quarterly board reports). Cross-divisional experiment analysis. Long-term holdout management and cumulative impact measurement. Division spoke teams: Technology division (advanced maturity, 2,000 employees): 4 embedded experimentation data scientists. Already running 200+ experiments/quarter. Need: advanced methods support, not basic enablement. E-commerce division (moderate maturity, 1,500 employees): 3 embedded experimentation data scientists. Running 50-80 experiments/quarter. Need: methodology improvement, governance, cultural adoption. Media division (early maturity, 1,500 employees): 2 embedded experimentation data scientists + 1 experimentation PM. Running fewer than 20 experiments/quarter. Need: foundational capability building, platform onboarding, extensive training'"
    weight: 0.35
    description: "Structure"
  - type: llm_judge
    criteria: "Response covers operating model and service delivery — operating: 'CoE operating model: Service tiers (what the CoE provides to divisions): Tier 1 — Self-serve (all divisions): experimentation platform access (experiment creation, results dashboard). Automated analysis (CUPED, sequential testing, guardrail checks). Documentation and best practices library. Power calculator and sample size estimator. Tier 2 — Guided (e-commerce and media): experiment design review (methodology check before launch). Analysis support for complex experiments. Monthly office hours with CoE methodology team. Quarterly experimentation maturity assessment. Tier 3 — Full-service (media and new teams): end-to-end experiment design and analysis. Embedded CoE partner sits in team meetings and product reviews. Hands-on training and mentoring. Goal: graduate teams from Tier 3 to Tier 2 within 6 months, and from Tier 2 to Tier 1 within 12 months. Funding model: shared services cost allocation: 60% of CoE cost funded centrally (CDO budget) — covers platform, methodology, reporting. 40% allocated to divisions based on usage (experiment volume). This ensures divisions have skin in the game (they pay for what they use) while keeping the core capability centrally funded. Operating cadence: weekly: CoE team standup (alignment across hub and spokes). Division experimentation reviews (spoke-led). Monthly: cross-divisional knowledge sharing (30-minute presentations of interesting experiment results). CoE metrics dashboard review. Quarterly: experimentation maturity assessment per division. Board-level experimentation report. CoE strategy review (are we serving divisions effectively?). Annually: experimentation program ROI assessment. CoE staffing and budget review. External benchmarking (how do we compare to industry best practice?)'"
    weight: 0.35
    description: "Operating"
  - type: llm_judge
    criteria: "Response covers success metrics and scaling strategy — success: 'CoE success metrics and scaling: Success metrics (track quarterly): Platform metrics: platform uptime (target: 99.9%). SRM rate across all experiments (target: less than 2%). Average time from experiment creation to first results (target: less than 3 days). Adoption metrics: experiment volume per division (target growth: 20% QoQ for emerging divisions). Coverage: percentage of product launches tested (target: 80% company-wide within 18 months). Self-serve adoption: percentage of experiments run without CoE assistance (target: 70% for mature divisions). Impact metrics: cumulative experimentation value (from long-term holdouts): target $50M+ annually across all divisions. Cost of experiments killed (engineering time saved on features that tested negative): track and report quarterly. Win rate by division: healthy range 20-35%. Quality metrics: pre-registration compliance (target: 95%). Guardrail check compliance (target: 100%). Post-launch validation rate: percentage of shipped experiments where the effect persisted in production (target: 85%). Scaling strategy: Year 1 — Foundation: establish the central hub. Onboard the technology division (already advanced — minimal effort). Begin onboarding e-commerce division. Scout and begin engaging media division. Target: 300+ experiments per quarter company-wide. Year 2 — Scale: all three divisions actively experimenting. Media division graduates from Tier 3 to Tier 2 service. Launch cross-divisional experiments (e.g., testing a feature across e-commerce and media properties simultaneously). Introduce advanced methods: causal inference, heterogeneous treatment effects. Target: 600+ experiments per quarter. Year 3 — Excellence: all divisions at self-serve (Tier 1) for standard experiments. CoE focuses on: advanced methods innovation, cross-divisional insights, and strategic experimentation consulting. The CoE becomes a profit center — its insights directly inform $200M+ in annual product investment decisions. Target: 1,000+ experiments per quarter, $100M+ in validated annual value. For the CDO: the CoE investment is approximately $3-4M annually (10 central FTE + 9 embedded FTE). At the target $50M+ annual validated value, the ROI exceeds 10x. Present this to the board as: building the organizational capability to make our $200M product investment 2-3x more effective'"
    weight: 0.30
    description: "Success"
