meta:
  id: experimentation-program-roi
  level: 5
  course: ab-test-analysis
  type: output
  description: "Measure experimentation program ROI — quantify the total value of the experimentation program including shipped wins, killed features, learning value, and speed improvements"
  tags: [ROI, program-value, measurement, justification, master]

state: {}

trigger: |
  During budget season, the CFO challenges the experimentation team:
  "You're asking for $4M next year — $2M for the platform and $2M
  for the team. Show me the return. I need to compare this investment
  against hiring more engineers, increasing marketing spend, or
  expanding to new markets. What's the ROI of experimentation?"

  Task: Build a comprehensive ROI model for the experimentation
  program that captures all value streams and makes a compelling
  case for continued investment.

assertions:
  - type: llm_judge
    criteria: "Response covers comprehensive ROI model with all value streams — roi: 'Experimentation program ROI model: Value stream 1 — Revenue from shipped experiment wins: direct measurement: sum the annualized revenue impact of all experiments shipped in the past 12 months. Calculation: for each shipped experiment: incremental revenue = (treatment conversion rate - control conversion rate) × annual traffic × revenue per conversion. This year: 45 experiments shipped with positive results. Total incremental annualized revenue: $12.4M. Note: this is measured via the long-term holdout. Users in the holdout (no shipped experiments) generate 12% less revenue per user than users who received all shipped experiments. Holdout-validated revenue impact: $11.8M (slightly lower than the sum of individual experiments due to interaction effects). Use the holdout figure ($11.8M) as the most reliable estimate. Value stream 2 — Cost savings from killed experiments: measurement: for each experiment that showed no improvement or negative results and was NOT shipped, estimate the engineering cost of building and maintaining the full feature. This year: 130 experiments showed no significant improvement. Of these, approximately 65 would have been shipped without testing (based on stakeholder confidence scores pre-test). Average engineering cost per feature: $150K (3 engineer-months × $50K loaded cost per month). Cost savings from killed features: 65 × $150K = $9.75M in engineering time redirected to more productive work. This is conservative — it does not include ongoing maintenance costs of features that would have been shipped but do not work. Value stream 3 — Speed and iteration value: CUPED and sequential testing reduced average test duration from 4.2 weeks to 2.8 weeks. This 33% time savings allows teams to run 1.5x more experiments per quarter. Additional experiments per year: approximately 60 (compared to without speed improvements). Estimated additional value from these experiments: 60 × 28% win rate × $275K average win value = $4.6M. Value stream 4 — Learning and institutional knowledge: harder to quantify directly but measurable through: hypothesis success rate improvement: teams with more experiment history form better hypotheses. Year 1 win rate: 22%. Year 3 win rate: 31%. This 9pp improvement means fewer wasted experiments and faster convergence on winning features'"
    weight: 0.35
    description: "ROI"
  - type: llm_judge
    criteria: "Response covers ROI comparison framework and sensitivity analysis — comparison: 'ROI comparison with alternative investments: The CFO wants to compare $4M in experimentation vs alternatives. Alternative 1 — Hire 8 more engineers ($4M): 8 engineers produce approximately 16 features per year (2 per engineer). Without experimentation, approximately 30% will improve metrics: 5 successful features. With experimentation (existing capacity), these features would be tested: 16 features tested, approximately 5 win (31%), 11 are killed or iterated. ROI of engineers WITHOUT experimentation: 5 × $275K average value = $1.375M. ROI of engineers WITH experimentation: same $1.375M from wins + $1.65M saved from not maintaining 11 failed features. Experimentation makes engineering investment 2.2x more effective. Alternative 2 — Increase marketing spend ($4M): expected marketing ROI: 3-5x ($12-20M in revenue). But this revenue is not compounding — it requires continued marketing spend. Experimentation improvements compound — a 2% conversion lift from an experiment generates value every year without additional spend. Over 3 years: marketing $4M/year × 4x ROI = $48M cumulative (requires $12M total investment). Experimentation: year 1 value $28M, year 2 value $32M (compounding improvements), year 3 value $38M = $98M cumulative (requires $12M total investment). Experimentation generates 2x the 3-year value of equivalent marketing spend. Sensitivity analysis: pessimistic scenario (assumptions reduced by 40%): shipped win value: $7.1M (vs $11.8M). Killed feature savings: $5.9M (vs $9.75M). Speed value: $2.8M (vs $4.6M). Total value: $15.8M. ROI: 3.9x. Base scenario: total value: $26.2M. ROI: 6.5x. Optimistic scenario (assumptions increased by 25%): total value: $32.7M. ROI: 8.2x. Even in the pessimistic scenario, the experimentation program returns nearly 4x its cost'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response covers presenting the case to the CFO and ongoing measurement — presentation: 'Presenting the ROI case to the CFO: The one-page summary: the experimentation program costs $4M annually and generates $26M in validated value (6.5x ROI). This value comes from: $11.8M in shipped experiment revenue (measured via long-term holdout — not estimates). $9.75M in engineering time saved by killing features that do not work. $4.6M in additional value from faster experimentation (CUPED, sequential testing). Without experimentation: we would waste approximately $10M annually on features that do not improve metrics. We would have no evidence that our $50M product investment is generating returns. We would make strategic decisions based on opinion rather than data. The $4M investment is not optional infrastructure — it is the measurement system that tells us whether the other $50M is well spent. Ongoing ROI measurement: quarterly ROI report: shipped experiment value (from holdout comparison). Killed experiment cost savings (estimated engineering cost of features not built). Program cost (platform, team, tools). Running ROI ratio (should stay above 3x to justify investment). Holdout refresh: reset the long-term holdout annually. Each year's holdout measures the incremental value of that year's experiments. Year-over-year comparison shows whether the experimentation program's ROI is improving, stable, or declining. Leading indicators that ROI will increase: experiment velocity is increasing (more experiments → more value). Win rate is improving (better hypotheses → more wins per experiment). Average win value is increasing (targeting higher-impact opportunities). Test duration is decreasing (faster iteration → more experiments per quarter). Leading indicators that ROI will decline: experiment velocity plateauing (teams have tested the obvious opportunities). Win rate declining without increased ambition (running out of low-hanging fruit). Average win value declining (smaller and smaller improvements). If declining indicators appear, shift the portfolio toward strategic experiments (higher risk, higher potential impact) and explore new product areas. For the CFO: approve the $4M budget. The experimentation program is the highest-ROI investment in the product organization at 6.5x return. Reducing or eliminating it would not save $4M — it would cost $26M in lost value and blind decision-making. The question is not can we afford experimentation — it is can we afford not to experiment'"
    weight: 0.30
    description: "Presentation"
