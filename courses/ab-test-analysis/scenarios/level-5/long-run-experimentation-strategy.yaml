meta:
  id: long-run-experimentation-strategy
  level: 5
  course: ab-test-analysis
  type: output
  description: "Design a long-run experimentation strategy — align experimentation priorities with multi-year business goals, manage the experimentation portfolio, and evolve capabilities over time"
  tags: [strategy, portfolio-management, long-term, capability-evolution, master]

state: {}

trigger: |
  The CEO of a public company is developing the 3-year strategic plan:
  "Experimentation has been tactical — we test whatever the product team
  is building. I want experimentation to be strategic — deliberately
  designed to answer the biggest questions facing the business over
  the next 3 years. What should our experimentation strategy look like?"

  Task: Develop a strategic experimentation framework that aligns
  experiments with long-term business objectives and manages the
  experiment portfolio like an investment portfolio.

assertions:
  - type: llm_judge
    criteria: "Response covers strategic experimentation portfolio management — portfolio: 'Strategic experimentation portfolio: The problem with tactical experimentation: the current approach (test whatever product is building) optimizes individual features but misses strategic questions: should we expand into enterprise? Is our pricing model optimal? Will our product work in new markets? These questions require deliberate experimentation strategy, not just testing the next feature. Experiment portfolio framework (analogous to an investment portfolio): 1. Core optimization experiments (60% of experimentation capacity): incremental improvements to existing product and features. Low risk, reliable returns. Examples: conversion funnel optimization, onboarding improvements, checkout streamlining. Expected win rate: 25-35%. Expected per-experiment impact: 1-5% metric improvement. 2. Strategic experiments (30% of capacity): large-scale experiments that answer fundamental business questions. Medium risk, high potential impact. Each strategic experiment is designed to inform a major business decision. Examples: new market entry viability (launch MVP in 3 test markets), pricing model restructuring (flat vs usage-based pricing), enterprise tier validation (can our product serve 1,000+ seat customers?). Expected win rate: 15-25%. Expected per-experiment impact: 10-50% improvement or a go/no-go decision on a major investment. 3. Exploratory experiments (10% of capacity): moon-shot experiments testing radical hypotheses. High risk, potentially transformative. Examples: completely new product concept, fundamentally different business model, novel technology application. Expected win rate: 5-10%. Expected per-experiment impact: if successful, could define a new product line or market. Portfolio balance: just like an investment portfolio, rebalance quarterly. If core experiments are crowding out strategic experiments, reallocate. If strategic experiments are consuming too much capacity without results, shift back to core'"
    weight: 0.35
    description: "Portfolio"
  - type: llm_judge
    criteria: "Response covers strategic experiment design for major business questions — strategic: 'Designing strategic experiments for major business questions: Strategic question 1 — Should we expand into enterprise? (year 1-2): The traditional approach: build a full enterprise product, hire a sales team, launch, and hope. The experiment-driven approach: Phase 1 (month 1-2) — Demand validation: fake door test: add an Enterprise badge and Contact Sales button on the pricing page. Measure: how many visitors click? What are their company sizes? What questions do they ask? Expected signal: if more than 5% of pricing page visitors click Contact Sales, demand exists. Phase 2 (month 3-4) — Concierge MVP: manually onboard 5-10 enterprise prospects. Provide white-glove service (manual provisioning, dedicated support). Measure: will they pay 5x the individual price? What features do they need? Expected signal: if 3+ prospects convert at the enterprise price, the unit economics work. Phase 3 (month 5-8) — Scaled MVP: build the minimum enterprise features (SSO, admin console, basic reporting). Launch to 50 prospects. A/B test the enterprise pricing page (pricing tiers, contract length options). Expected signal: conversion rate and contract value validate the business case. Decision: invest $5M in full enterprise product (if validated) or redirect investment to other opportunities (if not). Total experiment cost: approximately $300K (a fraction of the $5M full build). Strategic question 2 — Is our pricing model optimal? (year 1): The challenge: cannot easily A/B test pricing for existing customers. Experiment sequence: Step 1 — Survey (Van Westendorp and conjoint): assess price sensitivity across customer segments. Identify the optimal price range without showing real prices. Step 2 — New customer A/B test: test 3 pricing structures for new customers only (flat rate, usage-based, tiered). Run for 3 months to capture retention and LTV differences. Step 3 — Market-level test: if usage-based pricing wins for new customers, test the transition for existing customers in 2 smaller markets. Use synthetic controls to measure the causal impact of the pricing model change. Step 4 — Decision: based on 6 months of data across new customers and test markets, decide whether to migrate the entire customer base to the new pricing model'"
    weight: 0.35
    description: "Strategic"
  - type: llm_judge
    criteria: "Response covers capability evolution and 3-year roadmap — evolution: 'Experimentation capability evolution — 3-year roadmap: Year 1 — Strategic alignment: Q1: identify the 5-7 biggest business questions for the next 3 years. For each question, design an experimentation roadmap: what experiments need to run, in what sequence, to answer the question? Assign an executive sponsor for each strategic experiment stream. Q2-Q3: launch the first strategic experiments while continuing core optimization. Implement the experiment portfolio framework (60/30/10 allocation). Q4: first portfolio review. Assess which strategic experiments generated actionable insights. Reallocate capacity based on early results. Year 2 — Advanced methods: expand experimentation methods to match strategic needs: causal inference: for markets and decisions where A/B testing is not possible (regulatory changes, market-level decisions). Heterogeneous treatment effects: to personalize based on experiment results (which customers benefit most from the enterprise product?). Long-term holdouts: to measure whether 2 years of experimentation have genuinely improved the product (cumulative impact). Build cross-functional experimentation teams for strategic experiments: product manager + data scientist + engineer + domain expert (e.g., enterprise sales lead for the enterprise experiment stream). Year 3 — Competitive moat: the experimentation program has answered (or significantly de-risked) the 5-7 strategic questions from Year 1. New strategic questions emerge from Year 1-2 learnings. The experiment portfolio becomes the primary input to annual strategic planning. Board materials routinely reference experiment results: we tested X and learned Y, which informed our decision to invest $Z in this market. The experimentation capability is now a core competency: faster learning than competitors. Higher confidence in strategic bets. Lower waste in product development. Quantifiable ROI on the experimentation investment. For the CEO: the 3-year strategic plan should not just describe what we will build — it should describe what we will learn and how we will learn it. Each strategic bet should have an experimentation roadmap that validates assumptions before committing major resources. This is not cautious or slow — it is disciplined. The fastest-growing companies in the world (Google, Amazon, Netflix) are also the most prolific experimenters. Speed and rigor are not in tension — experimentation enables both'"
    weight: 0.30
    description: "Evolution"
