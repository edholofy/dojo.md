meta:
  id: experimentation-maturity-model
  level: 5
  course: ab-test-analysis
  type: output
  description: "Assess and advance organizational experimentation maturity — evaluate where a company stands on the experimentation maturity curve and design a roadmap to reach world-class experimentation"
  tags: [maturity-model, organizational-assessment, roadmap, transformation, master]

state: {}

trigger: |
  A consulting firm is engaged by a Fortune 500 company's CEO: "We
  spend $50M annually on product development. I have no idea what
  percentage of that spend is validated by experimentation. Some teams
  test everything, others test nothing. I need an honest assessment
  of our experimentation maturity and a plan to reach best-in-class."

  Task: Create an experimentation maturity assessment framework, evaluate
  the organization, and design a multi-year roadmap to reach maturity.

assertions:
  - type: llm_judge
    criteria: "Response defines the experimentation maturity model — model: 'Experimentation maturity model — five stages: Stage 1 — Ad hoc (most companies start here): characteristics: experimentation is optional and inconsistent. Individual data scientists run occasional tests with custom scripts. No shared platform, no standardized methodology. Most product decisions are made by HiPPO (Highest Paid Person's Opinion). Typical metrics: fewer than 10 experiments per quarter. Less than 10% of product launches are tested. No shared experiment tracking or documentation. Stage 2 — Emerging: characteristics: a small experimentation team or platform exists. 2-3 teams run experiments regularly. Basic A/B testing with fixed-sample methodology. Manual analysis in notebooks or spreadsheets. Typical metrics: 20-50 experiments per quarter. 20-30% of product launches are tested. Basic experiment documentation but inconsistent quality. Stage 3 — Established: characteristics: a dedicated experimentation platform (built or purchased). Most product teams run experiments. Standardized methodology (CUPED, sequential testing, guardrails). Governance framework exists with pre-registration requirements. Typical metrics: 100-200 experiments per quarter. 50-70% of product launches are tested. Experiment results inform quarterly planning. Stage 4 — Advanced: characteristics: experimentation is embedded in the product development lifecycle. Experiment-driven development: features are validated before full build. Sophisticated methods: causal inference, heterogeneous treatment effects, interleaving. Long-term holdouts measure cumulative experimentation ROI. Typical metrics: 500+ experiments per quarter. 80-90% of product launches are tested. Experimentation velocity is a competitive advantage. Stage 5 — World-class (Google, Booking.com, Netflix, Microsoft): characteristics: experimentation is a core organizational capability. Every user-facing change is tested. Culture of intellectual humility — leaders celebrate experiments that disprove their hypotheses. Causal inference methods extend experimentation beyond A/B tests to natural experiments and quasi-experiments. Typical metrics: 1,000+ experiments per quarter. 95%+ of changes are tested. Experimentation program demonstrably drives billions in annual value'"
    weight: 0.35
    description: "Model"
  - type: llm_judge
    criteria: "Response covers assessment methodology and Fortune 500 evaluation — assessment: 'Assessment methodology: Assess across 6 dimensions: Dimension 1 — Platform and tools: Stage 1: no platform, ad hoc scripts. Stage 3: shared platform with automated analysis. Stage 5: world-class platform with real-time monitoring, automated guardrails, interaction detection. Assessment for this Fortune 500: some teams use Optimizely (Stage 3). Others use manual scripts (Stage 1). No unified platform. Score: Stage 2. Dimension 2 — Methodology: Stage 1: basic t-tests, no correction for multiple comparisons. Stage 3: CUPED, sequential testing, Bonferroni correction. Stage 5: causal forests, heterogeneous treatment effects, switchback experiments, synthetic controls. Assessment: the data science team knows CUPED but it is not implemented in the platform. Sequential testing is not used — teams peek at results without adjustment. Score: Stage 2. Dimension 3 — Coverage: Stage 1: less than 10% of launches tested. Stage 3: 50-70% tested. Stage 5: 95%+ tested. Assessment: 3 of 15 product teams test regularly. Estimated 25% of launches are tested. Score: Stage 2. Dimension 4 — Governance: Stage 1: no standards, no review process. Stage 3: pre-registration, peer review, guardrail framework. Stage 5: automated governance, experiment review board, full audit trail. Assessment: no formal governance. Some teams pre-register, most do not. No guardrail framework. Score: Stage 1. Dimension 5 — Culture: Stage 1: experimentation is optional, seen as overhead. Stage 3: experimentation is expected for major launches. Stage 5: experimentation is instinctive — everyone's first reaction is let's test it. Assessment: some teams value experimentation, most see it as slowing them down. Leadership occasionally asks for test results but does not require them. Score: Stage 2. Dimension 6 — Impact measurement: Stage 1: no tracking of experimentation ROI. Stage 3: individual experiment impact tracked. Stage 5: long-term holdouts, cumulative impact reports, ROI of the experimentation program itself. Assessment: individual experiment results exist but no cumulative tracking. No holdout groups. Score: Stage 1. Overall assessment: Stage 2 (Emerging) — the company has pockets of experimentation excellence but no unified capability'"
    weight: 0.35
    description: "Assessment"
  - type: llm_judge
    criteria: "Response covers multi-year roadmap to advance maturity — roadmap: 'Multi-year roadmap from Stage 2 to Stage 4: Year 1 — Foundation (Stage 2 → Stage 3): Q1: select and deploy a unified experimentation platform. Migrate all teams from ad hoc tools to the shared platform. Q2: establish governance framework. Pre-registration template, guardrail requirements, tier-based review process. Train all PMs and data scientists (2-day experimentation bootcamp). Q3: implement CUPED and sequential testing in the platform. Launch automated SRM detection and guardrail monitoring. Set target: every team runs at least 2 experiments per quarter. Q4: launch first long-term holdout (2% of users). Begin tracking cumulative experimentation impact. Publish Q4 experimentation report: total experiments, win rate, cumulative value. Investment: $2M (platform licensing/build, 3-4 FTE for experimentation team). Expected outcome: 100+ experiments per quarter, 50% of launches tested. Year 2 — Scaling (Stage 3 → Stage 4): Q1-Q2: embed data scientists in all product teams as experimentation partners. Implement experiment-driven development: fake doors, MVP tests, staged validation. Launch interaction detection for concurrent experiments. Q3-Q4: advanced methods: heterogeneous treatment effects, causal forests for personalization. Cluster randomization and switchback capabilities for marketplace and network products. Quarterly experimentation maturity reviews per team. Investment: $1.5M (additional DS headcount, platform enhancements). Expected outcome: 300+ experiments per quarter, 70-80% of launches tested. Year 3 — Excellence (Stage 4 → approaching Stage 5): expand experimentation beyond A/B tests: natural experiments, regression discontinuity, instrumental variables. Automated experiment-driven feature flags: features auto-enabled/disabled based on real-time experiment results. Experimentation center of excellence advising all product areas. Annual experimentation impact: demonstrable $100M+ in validated value. For the CEO: the $50M product development spend is currently generating uncertain value. A $3.5M investment over 2 years in experimentation infrastructure and culture will provide clear visibility into what works. At maturity, experimentation typically validates 60-70% of launched features (vs approximately 30% without testing) — effectively doubling the ROI of product development spend'"
    weight: 0.30
    description: "Roadmap"
