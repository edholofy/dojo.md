meta:
  id: causal-inference-beyond-ab
  level: 5
  course: ab-test-analysis
  type: output
  description: "Apply causal inference methods beyond A/B tests — use difference-in-differences, regression discontinuity, instrumental variables, and synthetic controls when randomized experiments are impossible"
  tags: [causal-inference, DiD, RDD, IV, synthetic-controls, quasi-experiment, master]

state: {}

trigger: |
  The Chief Economist at a large platform company says: "We can't always
  run A/B tests. Last month we launched a mandatory policy change in
  Germany due to regulation — no A/B test possible. The CEO asks if the
  policy hurt engagement. We also changed our pricing in 5 markets but
  didn't randomize — we chose markets based on readiness. How do we
  measure causal effects when we can't randomize?"

  Task: Explain the major causal inference methods that work without
  randomization, demonstrate their application, and clarify assumptions.

assertions:
  - type: llm_judge
    criteria: "Response covers difference-in-differences and synthetic controls — did: 'Difference-in-Differences (DiD): Use case: the Germany policy change. We cannot randomize (all German users got the policy). But users in other EU countries did not get the policy. DiD compares: the change in engagement in Germany (before vs after policy) MINUS the change in engagement in similar countries (before vs after, without the policy). Before policy: Germany engagement: 50 sessions/user/month. France engagement: 48 sessions/user/month. After policy: Germany engagement: 44 sessions/user/month. France engagement: 46 sessions/user/month. Germany change: -6 sessions. France change: -2 sessions (general seasonal trend). DiD estimate: -6 - (-2) = -4 sessions. The policy caused a 4 session/user/month decline in engagement, after removing the general trend that affected both countries. Key assumption — parallel trends: in the absence of the policy, Germany and France would have followed the same engagement trend. Check by examining pre-policy trends: if Germany and France had parallel engagement trends for the 6 months before the policy, the assumption is plausible. If their trends diverged before the policy, DiD is unreliable. Synthetic Controls: when no single country is a good comparison, construct a synthetic Germany from a weighted combination of other countries. Synthetic Germany = 0.4 × France + 0.3 × Netherlands + 0.2 × Austria + 0.1 × Belgium. Weights chosen to match Germany's pre-policy engagement trend as closely as possible. After the policy: compare actual Germany to synthetic Germany. If synthetic Germany shows 47 sessions and actual Germany shows 44: causal effect = -3 sessions. Advantage over DiD: does not assume parallel trends with any single country. The synthetic control is constructed to match the pre-treatment trajectory exactly. Works well when there is one treated unit (Germany) and multiple potential donors'"
    weight: 0.35
    description: "DiD"
  - type: llm_judge
    criteria: "Response covers regression discontinuity and instrumental variables — rdd: 'Regression Discontinuity Design (RDD): Use case: measuring the effect of a loyalty program tier upgrade. Users who reach 1,000 points get upgraded to Gold tier (benefits: free shipping, priority support). Users at 990 points are nearly identical to users at 1,010 points — the only difference is the Gold tier assignment. RDD compares outcomes just above and just below the 1,000-point threshold. Users at 1,010 points (Gold): 30-day spend = $85. Users at 990 points (non-Gold): 30-day spend = $70. Estimated causal effect of Gold tier: $85 - $70 = $15 increase in 30-day spend. Key assumption — no manipulation: users should not be able to precisely control their point total to land just above or just below the threshold. If users can game the system (making extra purchases to hit 1,000), those who just pass the threshold are systematically different from those who just miss it — they are more motivated buyers. Check: plot the density of users around the threshold. A smooth density suggests no manipulation. A spike just above 1,000 suggests gaming. Bandwidth choice: how close to the threshold should we look? Narrow bandwidth (995-1,005 points): users are very similar, strong internal validity, but small sample size. Wide bandwidth (950-1,050 points): more data, but users at 950 are less comparable to users at 1,050. Optimal bandwidth can be calculated using algorithms (Imbens-Kalyanaraman, Calonico-Cattaneo-Titiunik). Instrumental Variables (IV): Use case: measuring the effect of pricing on demand when price was set non-randomly (chosen based on market readiness). The problem: if we compare markets where we raised prices to markets where we did not, the comparison is confounded — we chose markets that were ready (likely higher demand, more mature). An instrument is a variable that: affects the pricing decision (relevance), affects demand ONLY through pricing (exclusion restriction). Example instrument: regulatory approval timing. Some markets got regulatory approval earlier (allowing the price change), while others got approval later. Approval timing is determined by bureaucratic processes, not market demand. Stage 1: regulatory approval timing predicts pricing (markets with earlier approval changed prices first). Stage 2: use the predicted pricing (from Stage 1) to estimate the effect on demand. If approval timing is truly exogenous (unrelated to market demand), the IV estimate is the causal effect of pricing on demand. Caution: IV assumptions are strong and untestable. The exclusion restriction (the instrument affects demand only through pricing) must be argued on domain knowledge, not data'"
    weight: 0.35
    description: "RDD"
  - type: llm_judge
    criteria: "Response covers practical guidance on method selection and limitations — practical: 'Practical method selection guide: Decision tree for choosing a causal inference method: 1. Can you randomize? Yes → A/B test (gold standard). No → proceed to quasi-experimental methods. 2. Is there a clear threshold or cutoff? Yes (e.g., loyalty points, credit score, age) → Regression Discontinuity. No → proceed. 3. Did the treatment happen at a specific time to a specific group? Yes (e.g., policy change in one country) → Difference-in-Differences or Synthetic Controls. DiD if you have a good comparison group with parallel pre-trends. Synthetic controls if no single comparison group works but multiple donors are available. No → proceed. 4. Is there a plausible instrument (exogenous source of variation)? Yes → Instrumental Variables. No → consider observational methods with strong controls (propensity score matching, but with much weaker causal claims). Limitations and honesty: all quasi-experimental methods require UNTESTABLE assumptions: DiD: parallel trends assumption. RDD: no manipulation around the threshold. IV: exclusion restriction (instrument affects outcome only through treatment). Synthetic controls: the donor pool adequately spans the treated unit's behavior. These assumptions cannot be verified from the data — they must be argued from domain knowledge. Be transparent with stakeholders: an A/B test says this treatment caused a 5% lift with 95% confidence. A DiD study says under the assumption that Germany and France would have trended similarly, the policy caused a 4 session decline. The caveat matters — quasi-experimental evidence is weaker than experimental evidence. Hierarchy of evidence (strongest to weakest): 1. Randomized experiment (A/B test). 2. Regression discontinuity (strong local causal inference). 3. Difference-in-differences / synthetic controls (relies on parallel trends). 4. Instrumental variables (relies on exclusion restriction). 5. Propensity score matching (relies on no unobserved confounders). For the Chief Economist: use DiD or synthetic controls for the Germany policy change. Use IV for the pricing analysis if a valid instrument exists. Be transparent about the limitations — present results with explicit assumptions and sensitivity analyses showing how the conclusions change if the assumptions are violated'"
    weight: 0.30
    description: "Practical"
