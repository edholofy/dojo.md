meta:
  id: advanced-annotation-shift
  level: 3
  course: wireframe-annotation-specification
  type: output
  description: "Advanced annotation shift — handle a week of complex specification work including accessibility audit, real-time features, and cross-platform specs"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You're a senior designer doing specification work. Your week:

  MONDAY — Write accessibility annotations for a complex data
  table with sortable columns, expandable rows, row selection,
  and inline editing. The table must be fully keyboard navigable
  and screen-reader compatible.

  WEDNESDAY — Specify a real-time notification system: push
  notifications, in-app notification center, notification
  preferences, badge counts, and do-not-disturb mode. Cover
  all platforms (web, iOS, Android) with platform-specific
  behavior.

  FRIDAY — The engineering team rejects your spec for a
  drag-and-drop page builder because it's "too vague."
  They list 15 unanswered questions about drop zones, snap
  points, undo/redo, responsive preview, and component
  nesting rules. Address all 15 questions with precise specs.

  Task: Handle all three specification challenges.

assertions:
  - type: llm_judge
    criteria: "Response writes comprehensive table accessibility — keyboard navigation grid pattern (arrow keys move between cells, Enter activates cell action, Space selects row, Tab moves to next interactive element, Escape exits cell editing), ARIA for data table (role=grid on table, role=row, role=columnheader with aria-sort, role=gridcell, aria-expanded for expandable rows, aria-selected for selected rows), screen reader announcements (sort change: 'Name column, sorted ascending', row expansion: 'Row expanded, showing 3 child items', inline edit: 'Editing cell, Name field, current value: John Smith'), and focus management (focus visible on current cell, tab order within expanded row content, focus returns to row after collapsing)"
    weight: 0.35
    description: "TableAccessibility"
  - type: llm_judge
    criteria: "Response specifies the cross-platform notification system — web: browser notification permission request (timing: after first meaningful action, not on page load), notification center (bell icon with unread count badge, dropdown panel with notification list, mark all as read), in-app toasts for real-time events. iOS: push notification format (title, body, action buttons), notification grouping by type, badge count on app icon, notification center integration. Android: notification channels (separate for messages, updates, marketing), notification style (expandable for long content), ongoing notification for active tasks. Platform-specific: do-not-disturb respects OS settings, notification preferences sync across platforms. Covers: notification types, delivery rules, grouping, and user control"
    weight: 0.35
    description: "CrossPlatformNotifications"
  - type: llm_judge
    criteria: "Response addresses the 15 page builder questions with precise specs — covers drop zones (highlighted area where components can be placed, snap to grid: 12-column, 8px vertical), snap points (components snap to grid lines and adjacent component edges), undo/redo (Cmd+Z/Cmd+Shift+Z, unlimited undo stack, undo covers add/remove/move/resize), responsive preview (toggle between desktop/tablet/mobile viewport widths, layout adjusts in real-time), component nesting (max 3 levels deep, containers can hold any component except other containers of the same type, visual indicator showing nesting depth). Each answer is specific enough to implement, not another vague description. Demonstrates how to handle developer pushback constructively"
    weight: 0.30
    description: "PageBuilderSpecs"
