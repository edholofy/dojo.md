meta:
  id: accessibility-annotations
  level: 3
  course: wireframe-annotation-specification
  type: output
  description: "Accessibility annotations — write WCAG-compliant accessibility specifications including semantic structure, ARIA, keyboard navigation, and screen reader behavior"
  tags: [accessibility, WCAG, ARIA, keyboard, screen-reader, advanced]

state: {}

trigger: |
  A senior designer says: "Our company needs WCAG 2.2 AA
  compliance within 6 months. I need to add accessibility
  annotations to all wireframes. The accessibility consultant
  reviewed my latest wireframe and said:

  - 'Where's the heading hierarchy? I see visual headings
    but no semantic structure annotation.'
  - 'The tab navigation order isn't documented.'
  - 'Custom components need ARIA roles and states specified.'
  - 'What does the screen reader announce for each interaction?'
  - 'Error messages need to be linked to their fields.'
  - 'Focus indicators aren't specified.'

  I know about WCAG but I don't know how to annotate
  accessibility in wireframes. How do I create accessibility
  annotations that developers can implement?"

  Task: Create an accessibility annotation system and
  demonstrate it on a complex page.

assertions:
  - type: llm_judge
    criteria: "Response creates an accessibility annotation system — annotation categories with visual notation: heading structure (H1, H2, H3 labels showing semantic hierarchy, not just visual size), landmark regions (banner, navigation, main, complementary, contentinfo annotated on the wireframe), tab order (numbered sequence showing keyboard focus path through all interactive elements), ARIA specifications (role, state, and property annotations for custom components: role=dialog, aria-modal=true, aria-expanded, aria-controls), and focus indicators (visible focus ring style specified: 2px solid blue, 2px offset, on all interactive elements). Uses a color-coded annotation system (e.g., purple for a11y annotations, distinct from interaction annotations)"
    weight: 0.35
    description: "AnnotationSystem"
  - type: llm_judge
    criteria: "Response demonstrates accessibility annotations on a complex page — applies the system to a concrete example: dashboard page with navigation, search, data table, and interactive widgets. Documents: heading hierarchy (H1: Dashboard, H2: Recent Activity, H2: Quick Stats, H3 for widget titles), tab order through all interactive elements (skip links → nav items → search → table headers → table rows → pagination → sidebar widgets), screen reader announcements (live region for real-time data updates: aria-live=polite, status message after search: 'Showing 15 results for shoes'), and error accessibility (aria-describedby linking error message to input, aria-invalid=true on errored fields, role=alert for error summaries)"
    weight: 0.35
    description: "DemonstratedAnnotations"
  - type: llm_judge
    criteria: "Response covers screen reader behavior and testing — specifies what screen readers should announce for key interactions: button press ('Saving...'), modal open ('Delete item dialog'), toggle change ('Dark mode, on'), error ('First name is required'), loading completion ('Dashboard loaded, 5 widgets'), and navigation ('Page 2 of 10, showing items 11 to 20'). Provides an accessibility annotation checklist for every wireframe: heading hierarchy, landmarks, tab order, ARIA for custom controls, focus management for dynamic content, alt text for images, error association, live regions for updates. Includes testing recommendation: annotate in Figma, verify with axe-core and manual screen reader testing"
    weight: 0.30
    description: "ScreenReaderTesting"
