meta:
  id: animation-transition-specs
  level: 3
  course: wireframe-annotation-specification
  type: output
  description: "Animation and transition specifications — write detailed motion specs including timing, easing, choreography, and performance requirements"
  tags: [animation, transitions, motion, easing, choreography, advanced]

state: {}

trigger: |
  A senior designer says: "I'm handing off a feature with
  complex animations. My developer says: 'I can see the
  animation in your Figma prototype but I need exact specs
  to implement it.'

  Animations to specify:
  1. Page transition: content slides left, new page slides
     in from right
  2. Card expand: product card expands into a full detail
     view (shared element transition)
  3. List reorder: items animate to new positions when sorted
  4. Notification entrance: slides down from top, bounces
     slightly, auto-dismisses with fade
  5. Loading skeleton: pulse animation on placeholder elements
  6. Micro-interaction: like button heart pulses when tapped

  How do I write animation specs that give developers
  everything they need to implement accurate motion?"

  Task: Write precise animation specifications for all 6
  animations.

assertions:
  - type: llm_judge
    criteria: "Response writes precise motion specs for each animation — Page transition: property (transform: translateX), duration (300ms), easing (ease-in-out or cubic-bezier(0.4, 0, 0.2, 1)), choreography (current page slides left and fades, new page slides in from right, stagger: new page starts 50ms after current page begins exit). Card expand: shared element (card image stays in place and scales, card content cross-fades to detail content), duration (350ms), easing (ease-out), properties animated (transform: scale, position; opacity for content swap). Each animation has: property, duration, easing curve (with exact values), delay/stagger, and what triggers it"
    weight: 0.35
    description: "PreciseMotionSpecs"
  - type: llm_judge
    criteria: "Response covers the remaining animations with equal precision — List reorder: items animate to new positions (transform: translateY, 250ms, ease-in-out, stagger: 30ms between items), items being moved are briefly elevated (box-shadow increases). Notification: slide down (transform: translateY from -100% to 0, 300ms, cubic-bezier(0.34, 1.56, 0.64, 1) for bounce), auto-dismiss after 5 seconds (fade out: opacity 1→0, 200ms, linear). Loading skeleton: pulse (opacity oscillates 0.4→1→0.4, 1.5s, ease-in-out, infinite loop). Heart micro-interaction: scale 1→1.3→1 (200ms, ease-out), color change (gray→red, instant), particle burst (6 small circles expand outward, 400ms, ease-out, fade). Performance notes: use transform and opacity only (GPU-accelerated), avoid animating layout properties"
    weight: 0.35
    description: "RemainingAnimations"
  - type: llm_judge
    criteria: "Response addresses accessibility and implementation guidance — reduced motion: specify behavior when prefers-reduced-motion is enabled (replace motion with instant transitions or simple fade, never remove the state change), spring animations (optional: provide spring constants for physics-based motion: tension, friction, mass), implementation format (CSS custom properties for reuse: --transition-page: 300ms ease-in-out, or reference animation library: Framer Motion, GSAP), and how to communicate motion specs without video (timing diagram showing property values over time, or reference to prototype with 0.25x playback speed for developer observation). Include fallback for browsers that don't support specific animation features"
    weight: 0.30
    description: "AccessibilityImplementation"
