meta:
  id: specification-documentation
  level: 3
  course: wireframe-annotation-specification
  type: output
  description: "Specification documentation — write a comprehensive Product Requirements Document (PRD) with wireframe specifications for a complete feature"
  tags: [PRD, documentation, comprehensive, feature-spec, advanced]

state: {}

trigger: |
  A senior designer says: "I need to write a complete
  specification document for a new feature: In-App Messaging.
  The PM wrote a brief product brief, but now engineering
  needs a detailed spec before sprint planning.

  Feature scope:
  - Conversation list (inbox)
  - Individual conversation thread
  - New message composer
  - Message types: text, image, file attachment
  - Read receipts and typing indicators
  - Push notifications for new messages
  - Search within messages

  The engineering lead says: 'I need a spec doc I can break
  into user stories and estimate. Each interaction should be
  specified enough to implement without ambiguity.'

  How do I write a spec document that serves as the single
  source of truth for this feature?"

  Task: Create the specification document structure and
  write detailed specs for the In-App Messaging feature.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive spec document structure — document sections: Executive summary (what and why), User stories (who does what for what reason), Screen inventory (list of all screens and states), Detailed screen specifications (per-screen annotations), Interaction flows (wireflows showing user journeys), Technical requirements (data models, API interactions, performance), Accessibility requirements (WCAG compliance per screen), Analytics requirements (events to track), Edge cases and error handling, Open questions and decisions needed. Each section has enough detail for sprint planning while remaining readable. Includes a version history header for spec revisions"
    weight: 0.35
    description: "DocumentStructure"
  - type: llm_judge
    criteria: "Response writes detailed specs for key screens — Conversation list: sort order (newest message first), conversation item content (avatar, name, last message preview truncated to 1 line, timestamp, unread badge with count), swipe actions (mobile: swipe left to archive, swipe right to pin), long-press menu (desktop: right-click for mute, archive, delete). Conversation thread: message bubbles (sent: right-aligned blue, received: left-aligned gray), message status (sent, delivered, read with checkmark icons), timestamp grouping (show date separators, show time on individual messages only on tap), typing indicator ('Sarah is typing...' with animated dots), scroll behavior (load older messages on scroll up, new messages auto-scroll only if user is at bottom). Each screen spec is implementation-ready"
    weight: 0.35
    description: "DetailedScreenSpecs"
  - type: llm_judge
    criteria: "Response covers the composer, notifications, and cross-cutting concerns — Composer: text input (multi-line, max 5,000 characters, character count at 4,500+), attachment flow (tap + icon → photo library or file picker, inline preview before send, max 25MB, progress indicator for upload), send behavior (Enter sends on desktop, Shift+Enter for new line, Send button on mobile). Push notifications: notification content ('Sarah: Hey, are you available?'), tap behavior (open conversation), badge count (unread message total on app icon). Cross-cutting: offline behavior (queue messages, send when online, show 'Sending...' status), data privacy (messages encrypted, no caching of images after conversation delete), performance (conversation list loads in < 1 second, supports 1000+ conversations with virtual scrolling)"
    weight: 0.30
    description: "ComposerNotifications"
