meta:
  id: design-system-spec-integration
  level: 3
  course: wireframe-annotation-specification
  type: output
  description: "Design system spec integration — write specifications that reference design system components and tokens instead of raw visual specs"
  tags: [design-system, components, tokens, integration, advanced]

state: {}

trigger: |
  A senior designer says: "We have a mature design system
  with 80+ documented components. But our wireframe
  annotations still specify visual properties directly:
  'Background: #2563EB, Border-radius: 8px, Font: Inter
  16px Medium.'

  This is redundant (the design system already defines these)
  and error-prone (if the design system updates, the specs
  are wrong). My lead says: 'Reference the design system in
  your specs. Don't re-specify what the DS already defines.
  Focus on what's unique to this feature.'

  How do I write specs that leverage the design system and
  only specify what's new?"

  Task: Demonstrate specification writing that integrates
  with a design system, showing what to reference vs what
  to specify uniquely.

assertions:
  - type: llm_judge
    criteria: "Response shows design-system-aware specification format — instead of specifying raw visual properties, references design system elements: 'Use Button/Primary/Medium' instead of 'Blue button, 40px height, 16px font, 8px radius', 'Use Card/Elevated' instead of specifying shadow and padding, 'Use color-text-primary token' instead of '#111827'. Specifications focus on: which DS component to use, which variant/size, component composition (how DS components are arranged), and feature-specific behavior that the DS doesn't define. Shows a before (over-specified) and after (DS-referenced) comparison that makes the difference clear"
    weight: 0.35
    description: "DSAwareSpecs"
  - type: llm_judge
    criteria: "Response clearly separates what the DS defines from what needs unique specification — DS-defined (don't re-specify): visual styling, component states (hover, focus, disabled appearances), spacing tokens, typography styles, interaction patterns for standard components (button click, input focus, modal open/close). Feature-specific (must specify): business logic (when to show/hide elements, conditional behavior), content (what text goes in each component, character limits, data sources), composition (how components are arranged in the layout, which components are used where), and unique interactions (feature-specific flows, drag-and-drop behavior, custom animations). Template: Component Reference → Configuration (variant, size, props) → Content Specification → Behavior Specification"
    weight: 0.35
    description: "DSvsUnique"
  - type: llm_judge
    criteria: "Response addresses practical integration workflow — how to reference DS components in Figma annotations (link to Storybook page, reference component name and variant), how to handle cases where no DS component exists (custom component specification with note: 'Not in DS — candidate for inclusion?'), how to specify compositions of DS components (layout spec showing how Card + Avatar + Badge + Text compose into a team member row), and how to handle DS component customization (when to use the component as-is vs when to request a new variant vs when to build custom). Includes a spec template that integrates DS references naturally"
    weight: 0.30
    description: "IntegrationWorkflow"
