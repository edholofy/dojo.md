meta:
  id: specification-metrics
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Specification metrics — measure specification quality, effectiveness, and impact through quantitative and qualitative metrics"
  tags: [metrics, measurement, quality, effectiveness, expert]

state: {}

trigger: |
  A VP of Design says: "I believe our specification
  quality directly impacts development velocity, but
  I can't prove it. Leadership asks: 'How do you know
  your specs are good enough? How do you know investing
  more in specs would speed up development?'

  I need metrics that:
  - Measure spec quality objectively
  - Correlate spec quality with development outcomes
  - Help me justify investing in better spec practices
  - Don't create perverse incentives (like rewarding
    longer specs over clearer specs)

  What should I measure, how, and what targets should
  I set?"

  Task: Design a specification metrics framework that
  measures quality, effectiveness, and business impact
  of wireframe specifications.

assertions:
  - type: llm_judge
    criteria: "Response defines quality metrics for specifications — leading indicators (measured before development): spec completeness score (% of required annotations present per checklist — target: >90%), spec clarity score (peer review rating 1-5 — target: >4.0), spec review cycle time (time from 'ready for review' to 'approved' — target: <2 business days), spec questions count (engineering questions during review — target: <5 per feature spec). Lagging indicators (measured during/after development): implementation deviation rate (% of features shipped differently than specified — target: <10%), spec-related bug rate (bugs traced to spec gaps vs implementation errors — track ratio over time), development re-work caused by spec changes (hours spent on spec-related changes mid-sprint — target: decreasing quarter over quarter). Each metric includes: what to measure, how to collect it, target range, and what it indicates about spec health"
    weight: 0.35
    description: "QualityMetrics"
  - type: llm_judge
    criteria: "Response connects spec quality to business outcomes — velocity correlation (track story points completed per sprint for teams with high vs low spec quality scores — hypothesis: better specs = more predictable velocity), bug cost analysis (categorize production bugs by root cause: spec gap, implementation error, requirement change — calculate cost per bug category to show ROI of spec investment), time-to-market impact (measure time from spec completion to feature ship — well-specified features should ship faster with fewer rounds of feedback), developer satisfaction (quarterly survey: 'How often do you need to ask clarifying questions about specs?' 'How confident are you that you understand the spec before coding?' — 1-5 scale, target: >4.0), and design-engineering relationship health (track async vs sync communication ratio — better specs should reduce sync meetings needed for clarification)"
    weight: 0.35
    description: "BusinessImpact"
  - type: llm_judge
    criteria: "Response addresses metric pitfalls and implementation — perverse incentive prevention (don't measure spec length — rewards verbosity over clarity, don't measure annotation count — rewards over-specification, don't measure time-to-spec — rewards rushing, DO measure spec effectiveness: did the engineer understand it without asking?), gaming prevention (blind spot check: periodically have someone unfamiliar with the feature read the spec and report comprehension — prevents tribal knowledge masking spec gaps), implementation approach (start simple: track just 3 metrics for first quarter — spec questions count, implementation deviation rate, developer satisfaction — add more only if needed), dashboard and reporting (monthly spec quality report: trend lines for key metrics, spotlight on best and worst specs for learning, team-level comparisons without shaming — frame as 'Team A found a great pattern for X, let's share it'). Emphasizes that metrics inform improvement, not punishment"
    weight: 0.30
    description: "PitfallsImplementation"
