meta:
  id: expert-annotation-shift
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Expert annotation shift — handle a week of enterprise specification challenges including standardization, cross-team conflict, and specification debt"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're a design lead managing specification practices.
  Your week:

  MONDAY — The CTO presents data showing that features
  with detailed specs ship 40% faster, but only 3 of 8
  teams produce quality specs. You need to present a
  plan to the design directors: how to bring all teams
  to a high standard within 2 quarters without slowing
  anyone down.

  WEDNESDAY — Two teams are building features that
  interact (Team A: checkout flow, Team B: payment
  processing). Their specs contradict each other on
  error handling: Team A's spec says "show retry button
  on payment failure" while Team B's spec says "redirect
  to alternative payment on failure." Neither team
  talked to the other. Resolve the conflict and prevent
  future cross-team spec contradictions.

  FRIDAY — You discover 200+ wireframes from the last
  year with outdated specifications. Some specs reference
  old design system components, deprecated APIs, or
  removed features. Engineering occasionally builds
  from these outdated specs by mistake. Create a
  specification maintenance strategy.

  Task: Handle all three enterprise specification
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses the standardization plan — assessment (audit current spec quality across all 8 teams using spec completeness checklist, identify the 3 high-performing teams' best practices, interview engineers on which specs they find most useful), rollout strategy (don't mandate everything at once: Month 1 — shared templates and annotation checklist adopted by all teams, Month 2 — peer review process introduced with spec buddies from high-performing teams coaching others, Month 3 — automated spec completeness linter catches gaps before handoff, Month 4-6 — refinement based on metrics), success metrics (spec questions per feature decreasing, engineering satisfaction with specs increasing, spec completeness scores across teams converging), and change management (position as 'efficiency improvement' not 'compliance requirement', celebrate early wins from adopting teams, share before/after examples showing how better specs reduced development time)"
    weight: 0.35
    description: "StandardizationPlan"
  - type: llm_judge
    criteria: "Response resolves the cross-team spec conflict — immediate resolution (bring both teams together: map the payment failure flow end-to-end across both specs, identify the user's actual need: 'payment failed, I want to complete my purchase', agree on unified behavior: first attempt retry, then offer alternative payment method if retry fails — document in both specs with cross-reference), prevention strategy (cross-team spec dependencies identified during planning: maintain a 'spec dependency map' listing features that span multiple teams, mandatory cross-team spec review for overlapping features, shared specification for integration points: where Team A's feature ends and Team B's begins — explicitly documented, single owner for cross-cutting flows who ensures consistency across team specs)"
    weight: 0.35
    description: "ConflictResolution"
  - type: llm_judge
    criteria: "Response creates specification maintenance strategy — immediate triage (tag all 200+ wireframes: Active — spec is current and referenced, Stale — spec exists but may be outdated, Archived — feature shipped, spec is historical reference only, Deprecated — feature removed, spec should be clearly marked 'DO NOT USE'), maintenance process (active specs reviewed every quarter with feature updates, stale specs get 'Spec last verified: [date]' header — if unverified for 6+ months automatically tagged as stale, archived specs moved to archive folder with 'Historical — do not implement' watermark), prevention (link specs to Jira epics — when epic is closed, spec automatically tagged for review, design system updates trigger automated check for specs referencing changed components, onboarding training includes 'always check spec date before implementing'). Creates a sustainable system, not a one-time cleanup"
    weight: 0.30
    description: "MaintenanceStrategy"
