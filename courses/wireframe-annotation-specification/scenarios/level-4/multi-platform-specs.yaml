meta:
  id: multi-platform-specs
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Multi-platform specifications — write specs that address web, iOS, Android, and desktop differences while maintaining a single source of truth"
  tags: [multi-platform, cross-platform, iOS, Android, web, expert]

state: {}

trigger: |
  A senior designer says: "Our product ships on web,
  iOS, and Android simultaneously. Currently we
  maintain 3 separate spec documents — one per
  platform. This causes problems:

  - Specs drift: web spec gets updated but mobile
    specs don't
  - Platform differences aren't intentional — they're
    spec oversights
  - Engineers waste time asking 'should this work the
    same as web?'
  - Some differences SHOULD exist (platform conventions)
    but we don't document which ones are intentional

  How do I create a single specification that covers
  all platforms while clearly documenting intentional
  platform differences?"

  Task: Design a multi-platform specification approach
  with shared specs and platform-specific overrides.

assertions:
  - type: llm_judge
    criteria: "Response creates a single-source multi-platform spec structure — base specification (shared across all platforms): component behavior, business logic, content, data requirements, user flows, accessibility requirements — these are the same everywhere. Platform override layer (documents intentional differences only): navigation patterns (web: top nav with breadcrumbs, iOS: tab bar with push navigation, Android: bottom navigation with back button), input methods (web: mouse hover states, iOS: long press for context menus, Android: long press for context menus with haptic feedback), gestures (web: no swipe, iOS: swipe-to-delete native pattern, Android: swipe with Material Design dismiss), system integration (web: browser notifications, iOS: push with notification center, Android: push with notification channels). Format: base spec document + platform delta document listing only differences from base"
    weight: 0.35
    description: "SingleSourceStructure"
  - type: llm_judge
    criteria: "Response addresses platform-specific design conventions — iOS specifications: use SF Symbols for icons, respect safe areas (notch, home indicator), haptic feedback types (light for toggle, medium for selection, heavy for destructive action), dynamic type support (text scales with user's accessibility settings), swipe back gesture for navigation. Android specifications: Material Design 3 components where appropriate, edge-to-edge display with system bar insets, predictive back gesture support, notification channels configuration (separate channels for messages, updates, marketing), widget specifications if applicable. Web specifications: responsive breakpoints (mobile, tablet, desktop), keyboard shortcuts for power users, browser-specific handling (tab focus styles, print stylesheet). Each platform section notes: 'follows platform conventions' for standard patterns and 'custom behavior' for deviations from platform norms"
    weight: 0.35
    description: "PlatformConventions"
  - type: llm_judge
    criteria: "Response provides practical spec management workflow — version control (single spec document with platform sections clearly labeled, changelog tracks which platform was affected by each change), review process (platform leads review relevant sections, cross-platform review catches unintentional drift), parity tracking (feature parity matrix: table showing feature × platform with status: implemented, in progress, not planned, platform-specific — at a glance shows what's aligned and what diverges intentionally), decision documentation (for each platform difference: 'Why different?' — documents whether difference is intentional with rationale like 'follows iOS human interface guidelines' or unintentional 'TODO: align in next sprint'), and template (shared spec template with collapsible platform-specific sections — defaults to base behavior, designer only expands platform sections when an override is needed)"
    weight: 0.30
    description: "SpecManagement"
