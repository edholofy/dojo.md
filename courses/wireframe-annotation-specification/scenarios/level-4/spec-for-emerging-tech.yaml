meta:
  id: spec-for-emerging-tech
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Specifications for emerging technology — annotate wireframes for voice UI, AR overlays, wearable interfaces, and conversational AI"
  tags: [emerging-tech, voice, AR, wearable, conversational, expert]

state: {}

trigger: |
  A design lead says: "We're adding new modalities
  to our product:

  1. Voice commands ('Hey app, show my schedule')
  2. AR overlay for our retail product (try furniture
     in your room)
  3. Watch companion app (quick actions on wrist)
  4. AI chatbot integrated into the product

  Our wireframe annotation skills are built for
  screen-based 2D interfaces. None of our templates
  or conventions work for voice flows, spatial
  interfaces, or conversational UI.

  How do I specify interactions that don't have
  traditional screens?"

  Task: Write specification approaches for voice UI,
  AR, wearable, and conversational interfaces.

assertions:
  - type: llm_judge
    criteria: "Response specifies voice UI annotations — voice command specification format (trigger phrase: 'Show my schedule', intent: display_calendar, required parameters: date_range, optional parameters: filter_by_type, system response: 'Here's your schedule for [date]. You have [count] events.', follow-up prompts: 'Would you like to hear the details?'), error handling (no match: 'I didn't understand that. Try saying Show my schedule or Add an event', ambiguous: 'Did you mean your work schedule or personal calendar?', timeout: 'Are you still there? Say help for available commands'), multimodal coordination (voice + screen: when voice command triggers, screen updates simultaneously — specify what appears on screen during voice interaction, highlight which visual element corresponds to voice response), and conversation flow diagrams (state machine showing voice interaction paths: listening → processing → responding → waiting for follow-up → timeout → idle)"
    weight: 0.35
    description: "VoiceUISpecs"
  - type: llm_judge
    criteria: "Response specifies AR and wearable annotations — AR specification format: spatial placement rules (furniture anchors to detected floor plane, minimum 1m from walls, snaps to 0.5m grid), interaction model (tap to place, pinch to resize with min/max scale 50-200%, rotate with two-finger twist, drag to reposition), visual overlay specs (semi-transparent product model at 80% opacity until placed, shadow projection on detected surfaces, measurement lines showing real-world dimensions, 'Placed!' confirmation animation), environment adaptation (low light: increase model brightness, no surface detected: 'Point camera at a flat surface' prompt, tracking lost: freeze last position with 'Tracking lost' indicator). Wearable specification: complication specs (small: icon + number, medium: icon + label + number, large: mini chart), notification format (haptic: 2 taps for message, 1 tap for reminder, headline + 30-char preview), quick actions (swipe for predefined responses, force press for full action menu)"
    weight: 0.35
    description: "ARWearableSpecs"
  - type: llm_judge
    criteria: "Response covers conversational AI specification — chatbot behavior spec: personality definition (tone: helpful and concise, never sarcastic, uses user's name, formal for financial topics, casual for general), conversation patterns (greeting: context-aware 'Good morning, [Name]. How can I help with your project?' — not generic), response formats (text-only for simple answers, card UI for product recommendations, list UI for multiple options, action buttons for next steps), fallback strategy (1st confusion: rephrase and ask again, 2nd confusion: offer top 3 most likely intents as buttons, 3rd confusion: 'Let me connect you with a human' with handoff to support), and specification format (conversation script with branches: user says X → bot responds with Y → if user says A then path 1, if user says B then path 2 — each path annotated with intent, entities, and response template). Addresses how to spec non-visual and multi-modal interactions"
    weight: 0.30
    description: "ConversationalAISpecs"
