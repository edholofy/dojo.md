meta:
  id: enterprise-spec-standards
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Enterprise specification standards — establish organization-wide wireframe annotation standards, templates, and quality criteria"
  tags: [enterprise, standards, templates, governance, expert]

state: {}

trigger: |
  A design director says: "We have 40 designers across
  8 product teams. Every team annotates wireframes
  differently — some write novels, others write nothing.
  Engineering complains about inconsistency: 'Team A's
  specs are great, Team B's are useless.'

  I need to create an enterprise specification standard
  that:
  - Defines mandatory vs optional annotation types
  - Provides templates for common screen patterns
  - Sets quality criteria for spec reviews
  - Scales across teams without being bureaucratic
  - Includes an onboarding guide for new designers

  How do I build a specification standard that brings
  consistency without killing productivity?"

  Task: Create an enterprise wireframe annotation
  standard with templates, quality criteria, and
  governance process.

assertions:
  - type: llm_judge
    criteria: "Response creates a tiered annotation standard — mandatory annotations (required on every wireframe): component identification (name, variant, state), interaction behavior (tap/click/hover actions), content specifications (character limits, data source, placeholder text), navigation flows (where each action leads), error states (validation messages, error recovery). Recommended annotations (expected for complex features): accessibility notes (ARIA roles, keyboard navigation), responsive behavior (breakpoints, layout changes), loading states (skeleton, spinner, progressive), edge cases (empty states, overflow, permissions). Optional annotations (for complex or novel interactions): animation specifications, performance requirements, API integration notes. Includes a checklist template designers can use per wireframe, and a quality scoring rubric (1-5 scale per category)"
    weight: 0.35
    description: "TieredStandard"
  - type: llm_judge
    criteria: "Response provides reusable specification templates — screen-level template (header: screen name, user story reference, screen purpose; body: component inventory table, interaction map, state diagram reference, content specifications, responsive notes; footer: open questions, revision history), component-level template (component name, DS reference, variant/size, content rules, interaction behavior, states, accessibility), flow-level template (entry points, decision points with conditions, exit points, error paths, analytics events). Templates are structured enough to ensure consistency but flexible enough that designers fill in what's relevant rather than padding empty fields. Includes 'quick spec' template for simple screens and 'full spec' template for complex features"
    weight: 0.35
    description: "SpecTemplates"
  - type: llm_judge
    criteria: "Response addresses governance and adoption — spec review process (peer review checklist before handoff, engineering review during sprint planning, feedback loop for improving specs), onboarding program (new designer spec training: 2-hour workshop with before/after examples, buddy system pairing with experienced spec writer, first 3 specs reviewed by lead), quality metrics (spec completeness score, engineering questions per spec — target: fewer than 3 clarification questions, spec revision rate after handoff), anti-bureaucracy measures (templates auto-populated from Figma component data, spec-by-exception: only annotate what differs from DS defaults, time budget: specs should take no more than 20% of design time). Balances standardization with designer autonomy"
    weight: 0.30
    description: "GovernanceAdoption"
