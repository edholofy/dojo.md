meta:
  id: design-engineering-alignment
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Design-engineering alignment — build shared understanding between design and engineering through specification practices, shared vocabulary, and collaborative annotation"
  tags: [alignment, collaboration, engineering, vocabulary, expert]

state: {}

trigger: |
  A design director says: "Our biggest problem isn't
  spec quality — it's that designers and engineers
  speak different languages. Examples:

  - Designer says 'card' → engineer thinks div with
    border. Designer meant specific DS component with
    hover state, shadow, and click handler.
  - Designer writes 'smooth transition' → engineer
    asks 'what easing? what duration? what property?'
  - Designer says 'responsive' → engineer asks
    'which breakpoints? reflow or rescale? hide or
    stack?'

  We need a shared vocabulary and specification
  language that both sides understand. How do I
  bridge the designer-engineer communication gap
  through better specification practices?"

  Task: Create a shared specification vocabulary and
  collaborative annotation practices that align
  design and engineering understanding.

assertions:
  - type: llm_judge
    criteria: "Response creates a shared specification glossary — maps design terms to engineering terms: 'card' → 'DS component: Card/Elevated — includes hover elevation change, click handler, and content slot' (with Storybook link), 'smooth transition' → 'CSS transition: property opacity, duration 200ms, easing ease-in-out' (with specific values), 'responsive' → 'breakpoints: mobile <768px, tablet 768-1024px, desktop >1024px — behavior per breakpoint specified separately', 'subtle animation' → 'transform: scale(1.02), duration 150ms, trigger: hover', 'loading state' → 'skeleton variant of component, shimmer animation, displayed while API response pending'. Glossary format: Design Term | Engineering Translation | Default Values | DS Reference. Recommends maintaining this glossary as a living document accessible to both teams"
    weight: 0.35
    description: "SharedVocabulary"
  - type: llm_judge
    criteria: "Response establishes collaborative annotation practices — collaborative specification sessions (designer and engineer pair on complex specs: designer describes intent, engineer asks implementation questions in real-time, both contribute to annotations — 30 minutes saves hours of async back-and-forth), engineering annotation layer (engineers add technical annotations to designer wireframes: API endpoints, data model references, performance constraints, technical limitations — visible as a separate layer), spec negotiation protocol (when engineering says 'we can't do that': designer provides intent and priority, engineer proposes alternatives with trade-offs, both agree on implementation approach documented in spec — not in Slack), and specification workshops (quarterly cross-functional session where teams review past specs, identify common misunderstandings, update shared glossary, and improve templates)"
    weight: 0.35
    description: "CollaborativePractices"
  - type: llm_judge
    criteria: "Response addresses specification precision levels — when to be precise (interaction behavior: always specify exact trigger, action, and result — 'On hover: card elevates 4px with shadow-lg, cursor changes to pointer'), when to be flexible (visual polish: 'transition should feel responsive' is OK for motion polish — engineer can choose appropriate easing), when to defer to engineering (performance optimization: specify the desired UX outcome 'list scrolls smoothly with 1000 items' rather than the implementation 'use virtual scrolling' — let engineers choose the approach), when to specify constraints (accessibility: always precise — 'focus order: search input → filter buttons → result list', never leave to interpretation). Framework: specify the 'what' and 'why' precisely, specify the 'how' only when the UX depends on specific implementation details, defer implementation details when multiple approaches achieve the same UX"
    weight: 0.30
    description: "PrecisionLevels"
