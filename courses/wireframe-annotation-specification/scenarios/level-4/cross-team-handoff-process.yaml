meta:
  id: cross-team-handoff-process
  level: 4
  course: wireframe-annotation-specification
  type: output
  description: "Cross-team handoff process — design specification handoff workflows between design, engineering, QA, and product teams"
  tags: [handoff, cross-team, workflow, process, expert]

state: {}

trigger: |
  A design manager says: "Our handoff process is broken.
  Here's what happens:

  1. Designers finish wireframes and 'throw them over
     the wall' to engineering
  2. Engineers ask 20 questions in Slack, half get lost
  3. QA tests against the wireframes but they're outdated
  4. PM realizes the spec doesn't match the PRD
  5. Everyone blames everyone else

  We need a structured handoff process. But the last
  attempt at 'process' added 3 meetings per feature
  and everyone hated it. How do I create an efficient
  handoff that ensures specs are complete, understood,
  and maintained — without drowning in meetings?"

  Task: Design a specification handoff workflow that
  connects design, engineering, QA, and product with
  clear responsibilities and minimal overhead.

assertions:
  - type: llm_judge
    criteria: "Response designs an efficient handoff workflow — phased handoff (not a single moment): Phase 1 — Early alignment (designer shares rough wireframes with tech lead for feasibility check, 15-minute sync, catches impossible specs early), Phase 2 — Spec completion (designer completes annotations using standard template, self-review against checklist, marks spec as 'Ready for review'), Phase 3 — Async review (engineering has 2 business days to review and leave questions as comments directly on wireframes, not in Slack — questions are tracked and answered in context), Phase 4 — Handoff sync (30-minute walkthrough only for complex features, skip for straightforward screens — designer walks through key interactions and edge cases), Phase 5 — Living spec (spec stays updated during implementation, changes tracked with version notes). Eliminates unnecessary meetings while ensuring clarity"
    weight: 0.35
    description: "HandoffWorkflow"
  - type: llm_judge
    criteria: "Response defines clear RACI for specifications — Designer: responsible for creating complete specs, answering engineering questions within 24 hours, updating specs when requirements change. Engineering: responsible for reviewing specs before sprint planning, flagging technical constraints, documenting deviations from spec during implementation. QA: responsible for creating test cases from specs, flagging untestable or ambiguous specs, verifying implementation matches spec. PM: responsible for ensuring specs align with PRD, prioritizing which specs need more detail based on risk, resolving conflicts between design intent and technical constraints. Shared: all parties responsible for flagging spec gaps early rather than discovering them during QA. Includes escalation path for unresolved spec disagreements"
    weight: 0.35
    description: "RACIResponsibilities"
  - type: llm_judge
    criteria: "Response addresses spec maintenance and anti-patterns — living document strategy (specs updated when requirements change mid-sprint, change log section tracks what changed and why, engineering notified of spec changes via automated alerts), anti-patterns to avoid (Slack-based specs: specifications discussed in Slack get lost — all decisions must be recorded on the wireframe or spec doc, meeting-heavy process: default to async review, sync only when async fails, perfect spec syndrome: specs should be 'good enough to implement' not 'perfect' — diminishing returns after 80% completeness, spec rot: schedule quarterly spec audits to archive outdated specs), and tooling recommendations (Figma comments for contextual questions, spec status labels: Draft → Ready for Review → Approved → In Development → Implemented, link specs to Jira tickets for traceability)"
    weight: 0.30
    description: "MaintenanceAntiPatterns"
