meta:
  id: media-and-upload-specs
  level: 2
  course: wireframe-annotation-specification
  type: output
  description: "Media and upload specifications — annotate file upload flows, image galleries, video players, and media-heavy interfaces"
  tags: [media, upload, gallery, video, intermediate]

state: {}

trigger: |
  A mid-level designer says: "I'm working on a project
  management tool that has a lot of media functionality:
  users can upload files to tasks, view image galleries
  in project albums, and embed video updates. My current
  wireframes just show placeholder boxes labeled 'upload
  area' and 'gallery.'

  The developer says they need way more detail: 'What
  file types are allowed? What happens during upload?
  How does the gallery paginate? What about video
  controls?'

  How do I properly specify media and upload interactions
  in my wireframes?"

  Task: Write detailed wireframe annotations for file
  upload, image gallery, and video player components.

assertions:
  - type: llm_judge
    criteria: "Response specifies file upload annotations — upload zone behavior (drag-and-drop area with dashed border, hover state highlights zone, click opens file picker), accepted file types (images: JPG, PNG, GIF, WebP; documents: PDF, DOC, XLSX; video: MP4, MOV — max 100MB), upload progress (progress bar per file, percentage indicator, cancel button per upload, filename and file size displayed), upload states (idle: 'Drag files here or click to browse', uploading: progress bar with cancel, success: checkmark with file thumbnail, error: red indicator with 'Upload failed — retry' link), multiple file handling (queue display showing all files, sequential upload, total progress indicator), and validation (file too large: 'File exceeds 100MB limit', wrong type: 'File type not supported. Accepted: JPG, PNG, PDF')"
    weight: 0.35
    description: "FileUploadSpecs"
  - type: llm_judge
    criteria: "Response specifies image gallery annotations — gallery grid layout (3 columns on desktop, 2 on tablet, 1 on mobile, images cropped to square aspect ratio in grid), lightbox behavior (click image opens full-screen overlay, dark backdrop at 90% opacity, close with X button or click outside or Escape key, left/right arrows for navigation, swipe on mobile), image loading (thumbnail loads first at grid size, full resolution loads in lightbox, blur-up placeholder while loading), gallery pagination (show 12 images per page, 'Load more' button or infinite scroll, total count displayed: 'Showing 12 of 47 photos'), image actions (hover reveals action bar: download, delete, set as cover, share), and empty state ('No images yet. Upload photos to get started' with upload button)"
    weight: 0.35
    description: "ImageGallerySpecs"
  - type: llm_judge
    criteria: "Response specifies video player annotations — player controls (play/pause toggle, progress scrubber bar, current time/total duration display, volume slider with mute toggle, fullscreen button, playback speed selector: 0.5x, 1x, 1.5x, 2x), video states (loading: skeleton with spinner, ready: thumbnail with centered play button overlay, playing: controls auto-hide after 3 seconds of inactivity — reappear on mouse move, paused: controls visible, error: 'Video unavailable' with retry option), thumbnail generation (auto-generated from first frame or at 25% mark, custom thumbnail upload option), and responsive behavior (player maintains 16:9 aspect ratio, controls scale for touch targets on mobile — minimum 44px tap area). Specifies both the visual layout and the interaction behavior for each media component"
    weight: 0.30
    description: "VideoPlayerSpecs"
