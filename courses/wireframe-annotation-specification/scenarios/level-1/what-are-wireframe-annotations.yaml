meta:
  id: what-are-wireframe-annotations
  level: 1
  course: wireframe-annotation-specification
  type: output
  description: "What are wireframe annotations — understand the purpose, types, and audience of wireframe annotations in the design-to-development workflow"
  tags: [fundamentals, introduction, purpose, beginner]

state: {}

trigger: |
  A junior designer says: "My lead asked me to 'annotate the
  wireframes before sending to dev.' I've never done this. I
  have Figma wireframes for a settings page but I don't know
  what to annotate. The wireframe shows the visual layout —
  isn't that enough? What information do developers need that
  the wireframe doesn't already show?"

  Task: Explain what wireframe annotations are, why they're
  needed, and what types of information they should convey.

assertions:
  - type: llm_judge
    criteria: "Response explains why wireframes alone aren't enough — wireframes show WHAT the screen looks like but not HOW it behaves. Developers need: interaction behavior (what happens when the user clicks this?), content specifications (what's the character limit? is this dynamic or static?), conditional logic (does this element show/hide based on user state?), data sources (where does this data come from?), edge cases (what if the list is empty? what if the name is 100 characters?), and accessibility requirements (tab order, screen reader announcements). Provides concrete examples from the settings page scenario"
    weight: 0.35
    description: "WhyAnnotationsNeeded"
  - type: llm_judge
    criteria: "Response categorizes annotation types clearly — functional annotations (click behavior, navigation targets, form validation rules), content annotations (character limits, dynamic vs static text, data source), visual annotations (spacing values, responsive behavior, states like hover/active/disabled), interaction annotations (animations, transitions, loading states), and technical annotations (API endpoints, data format, error handling). Each type includes a simple example that a beginner can understand"
    weight: 0.35
    description: "AnnotationTypes"
  - type: llm_judge
    criteria: "Response addresses the audience and format — who reads annotations (developers implementing the UI, QA engineers writing test cases, product managers verifying requirements), how to format annotations (numbered callouts pointing to specific elements, separate specification document, or inline Figma annotations), and common mistakes beginners make (over-annotating obvious things like 'this is a button', under-annotating interaction behavior, assuming developers will 'figure it out'). Keeps the explanation practical and approachable"
    weight: 0.30
    description: "AudienceAndFormat"
