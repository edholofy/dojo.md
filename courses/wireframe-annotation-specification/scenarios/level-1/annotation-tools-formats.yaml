meta:
  id: annotation-tools-formats
  level: 1
  course: wireframe-annotation-specification
  type: output
  description: "Annotation tools and formats — understand different tools and formats for creating wireframe annotations and choose the right approach"
  tags: [tools, Figma, formats, documentation, beginner]

state: {}

trigger: |
  A junior designer says: "My team argues about how to
  annotate wireframes. Different people do it differently:

  - Designer A puts numbered sticky notes on Figma frames
    with a key below
  - Designer B writes a separate Google Doc with screenshots
    and descriptions
  - Designer C uses Figma's built-in commenting feature
  - Designer D uses red text directly on the wireframe
  - The developer says they prefer Zeplin or Figma Dev Mode

  Which approach is best? How should I format annotations
  so they're useful for developers?"

  Task: Compare annotation approaches and recommend a
  practical annotation format for a small team.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each annotation approach honestly — Figma numbered callouts (pros: visual, tied to specific elements, lives with the design; cons: clutters the wireframe, hard to maintain, can be missed), separate doc (pros: detailed, searchable, version-controlled; cons: gets out of sync with wireframes, extra document to maintain), Figma comments (pros: easy, collaborative; cons: ephemeral, buried in threads, hard to track completeness), red text on wireframe (pros: obvious; cons: messy, not scalable, confuses visual design), Figma Dev Mode/Zeplin (pros: auto-generates specs; cons: doesn't capture behavior, only visual properties). Each approach has clear pros and cons"
    weight: 0.35
    description: "ApproachEvaluation"
  - type: llm_judge
    criteria: "Response recommends a practical approach with format template — recommended hybrid approach: Figma annotation page alongside the wireframe (numbered callouts on a copy of the wireframe, with a specification panel below), supplemented by Figma Dev Mode for visual specs (spacing, colors, typography auto-extracted). Provides a template structure: Screen title, Screen purpose, numbered element list with [Element Name]: [Specification], Interaction table (Trigger → Action → Result), States section (loading, empty, error), and Navigation notes. Format is scannable, consistent, and maintainable"
    weight: 0.35
    description: "RecommendedApproach"
  - type: llm_judge
    criteria: "Response addresses team alignment and practical tips — how to get the team on the same approach (agree on one format, create a template, review together until it's habit), naming convention for annotation pages in Figma (e.g., 'Screen Name — Annotations'), how to handle updates (when the wireframe changes, update annotations before sharing with dev), and common annotation mistakes to avoid (annotating visual properties that dev tools extract automatically, not annotating behavior that only exists in the designer's head, writing annotations so vague they're useless: 'this should look nice')"
    weight: 0.30
    description: "TeamAlignment"
