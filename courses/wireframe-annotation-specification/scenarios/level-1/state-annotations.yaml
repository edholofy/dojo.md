meta:
  id: state-annotations
  level: 1
  course: wireframe-annotation-specification
  type: output
  description: "State annotations — annotate different states of a component or screen including empty, loading, error, and success states"
  tags: [states, empty-state, loading, error, success, beginner]

state: {}

trigger: |
  A junior designer says: "I designed a notifications page
  showing a list of notifications. But my developer pointed
  out I only designed the 'happy path' — a page with
  notifications. They need to know:

  - What does the page look like with 0 notifications?
  - What does it look like while loading?
  - What if the notifications fail to load?
  - What happens when a notification is marked as read?
  - What does the page look like with 100+ notifications?

  I've heard about 'designing for states' but I don't know
  which states to consider. How do I annotate all the states?"

  Task: Annotate all states for a notifications page including
  the wireframe specification for each state.

assertions:
  - type: llm_judge
    criteria: "Response identifies and annotates all UI states — Loading state: skeleton placeholder showing 3-5 notification-shaped placeholders with shimmer animation, no real content visible. Empty state: illustration + 'No notifications yet' heading + 'When you receive notifications, they'll appear here' description. Error state: error icon + 'Unable to load notifications' + 'Try again' button. Populated state: list of notifications with unread indicator (blue dot), timestamp, read/unread visual difference. Partial state: what if some notifications load but the count badge shows a different number? Each state has a complete wireframe description"
    weight: 0.35
    description: "StateIdentification"
  - type: llm_judge
    criteria: "Response annotates state transitions and interactions — mark as read: tap notification → visual change (blue dot disappears, text changes from bold to regular), batch action ('Mark all as read' button behavior). Pagination/infinite scroll: initial load (20 notifications), scroll to bottom triggers load more (show loading indicator at bottom), end of list ('You're all caught up'). New notification arrives: if page is open, new notification appears at top with subtle animation, badge count updates. Delete/dismiss: swipe or dismiss button, confirmation needed? Undo available? Each transition specifies trigger, animation, and result"
    weight: 0.35
    description: "StateTransitions"
  - type: llm_judge
    criteria: "Response provides a state checklist framework — reusable checklist for any screen: 1) Loading (first load and subsequent loads), 2) Empty (first-time empty vs filtered-to-empty vs cleared), 3) Error (network error vs server error vs permission denied), 4) Partial (some data loaded, some failed), 5) Populated (normal content), 6) Overflow (too much content — pagination, truncation, scrolling), 7) Stale (data might be outdated — refresh behavior). Explains that every screen and every component has these states and designers should annotate each one. Provides the notifications page as a worked example"
    weight: 0.30
    description: "StateChecklist"
