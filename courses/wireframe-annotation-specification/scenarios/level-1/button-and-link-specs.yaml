meta:
  id: button-and-link-specs
  level: 1
  course: wireframe-annotation-specification
  type: output
  description: "Button and link specifications — write clear specifications for interactive elements including click behavior, states, and navigation targets"
  tags: [buttons, links, interactions, navigation, beginner]

state: {}

trigger: |
  A junior designer says: "I have a page with 8 different
  buttons and links. My developer asked: 'What does each
  button do? Where do the links go? What happens after I
  click?' I realized I only labeled the buttons with their
  text ('Save', 'Cancel', 'Delete') but didn't specify the
  behavior. What information does each button/link need?"

  The elements:
  1. 'Save Changes' button (primary)
  2. 'Cancel' button (secondary)
  3. 'Delete Account' button (destructive)
  4. 'Learn More' link (inline text)
  5. 'Upgrade Plan' button (promotional banner)
  6. 'Help' icon button (question mark icon)
  7. 'Back' link (top of page)
  8. 'Terms of Service' link (footer)

  Task: Write complete specifications for all 8 interactive
  elements showing what developers need to know.

assertions:
  - type: llm_judge
    criteria: "Response specifies complete behavior for each element — Save Changes: action (POST to /api/settings with form data), success (show toast 'Changes saved', stay on page), error (show inline error message, highlight failed fields), loading state (button shows spinner, disable to prevent double-submit), disabled state (when no changes have been made). Cancel: behavior (discard unsaved changes, if changes exist show 'Discard changes?' confirmation), navigation (return to previous page). Delete Account: behavior (show confirmation modal with 'Type DELETE to confirm' pattern), consequences clearly stated in the spec. Each button has: action, success state, error state, loading state, and edge cases"
    weight: 0.35
    description: "ButtonBehavior"
  - type: llm_judge
    criteria: "Response specifies navigation and link behavior — Learn More: opens in new tab or inline expansion? URL target. Upgrade Plan: navigates to /pricing or opens modal? Tracks analytics event? Help: opens help panel, tooltip, or navigates to help center? Back: browser back or specific route? Behavior if there's no browser history. Terms of Service: opens in new tab (external link behavior), URL. Each link specifies: destination, opening behavior (same tab/new tab/modal), and any side effects (analytics tracking, state changes). Demonstrates the difference between links that navigate and buttons that perform actions"
    weight: 0.35
    description: "LinkNavigation"
  - type: llm_judge
    criteria: "Response covers states and accessibility for interactive elements — visual states for buttons (default, hover, active/pressed, focus, disabled, loading), keyboard accessibility (all buttons/links focusable with Tab, activated with Enter/Space), screen reader labels (icon-only Help button needs aria-label='Help'), and focus management (after Save success, where does focus go? After modal closes, focus returns to trigger). Provides a template or checklist for specifying interactive elements that the designer can reuse"
    weight: 0.30
    description: "StatesAccessibility"
