meta:
  id: ai-assisted-specification
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "AI-assisted specification — leverage AI tools for specification generation, review, and completeness checking while maintaining human judgment"
  tags: [AI, automation, generation, review, master]

state: {}

trigger: |
  A Chief Design Officer says: "AI is transforming how
  we work. I want to explore how AI can help with
  specification work:

  1. Can AI generate first-draft specs from wireframes?
  2. Can AI review specs for completeness and
     consistency?
  3. Can AI predict which specs will cause engineering
     confusion?
  4. Can AI translate specs into test cases
     automatically?
  5. What are the risks of AI-generated specs?

  I don't want AI replacing designer judgment, but I
  want it handling the tedious parts. What's our
  AI specification strategy?"

  Task: Design an AI-assisted specification strategy
  covering generation, review, prediction, and risk
  management.

assertions:
  - type: llm_judge
    criteria: "Response designs AI-assisted spec generation — first-draft generation (AI analyzes wireframe screenshot + component metadata: identifies components used, generates component inventory, suggests standard interactions based on component type — e.g., button → click action, form → validation rules, list → pagination — designer reviews and refines, adding business logic AI can't infer), pattern-based suggestion (AI trained on team's historical specs: when designer annotates a search bar, AI suggests: 'Based on your team's patterns: debounce 300ms, minimum 2 characters, results appear in dropdown, clear button on right — apply this pattern?' — designer accepts, modifies, or dismisses), and content generation (AI suggests placeholder text, error messages, and empty states based on context: 'For this 404 page, similar products use: Page not found. The page you're looking for doesn't exist or has been moved. Go to homepage.'). Each AI capability has clear human-in-the-loop checkpoint"
    weight: 0.35
    description: "AIGeneration"
  - type: llm_judge
    criteria: "Response covers AI-powered review and prediction — automated review (AI checks specs against team standards: missing required annotations flagged as warnings, inconsistent terminology highlighted, design system component misuse detected — like using Button/Danger for a non-destructive action, accessibility gaps identified: interactive element without keyboard annotation, image without alt text specification), predictive analytics (AI analyzes historical data: specs that caused the most engineering questions share patterns — ambiguous interaction verbs like 'handle' or 'manage' instead of specific actions, specs for features with many states but few state annotations, specs referencing deprecated components — AI predicts spec quality score and flags at-risk specs before review), and spec-to-test generation (AI transforms each annotation into a testable statement: spec says 'Button disabled when form invalid' → test case: 'Given form with empty required field, When user views submit button, Then button appears disabled with aria-disabled=true' — QA reviews and adjusts generated test cases)"
    weight: 0.35
    description: "AIReviewPrediction"
  - type: llm_judge
    criteria: "Response addresses risks and governance of AI specs — accuracy risks (AI generates plausible-looking specs that are subtly wrong: invents interactions that don't match business requirements, assumes standard patterns when custom behavior is needed — mitigation: mandatory human review of all AI-generated content, AI suggestions clearly marked as 'suggested' not 'specified'), over-reliance risk (designers stop thinking critically about specs because AI 'handles it' — mitigation: AI generates drafts not final specs, designers must approve each section, random audit of AI-assisted specs vs fully human specs to compare quality), bias risk (AI trained on historical specs perpetuates past mistakes and biases — mitigation: regularly update training data, exclude specs from failed projects, include diverse team input in training examples), and governance framework (AI-assisted specs labeled as such in metadata, human designer always accountable for final spec quality, quarterly review of AI accuracy metrics, kill switch: if AI spec quality drops below threshold, revert to fully human process)"
    weight: 0.30
    description: "RisksGovernance"
