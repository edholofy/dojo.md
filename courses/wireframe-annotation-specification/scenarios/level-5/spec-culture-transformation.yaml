meta:
  id: spec-culture-transformation
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification culture transformation — transform organizational culture from ad-hoc specification to specification-driven development"
  tags: [culture, transformation, organizational-change, leadership, master]

state: {}

trigger: |
  A VP of Product Design says: "We've been trying to
  improve spec quality for 2 years. We've introduced
  templates, training, and tools. But adoption is at
  30%. The problem isn't knowledge — it's culture.

  What I hear from designers:
  - 'Specs slow me down. I'd rather just talk to the
    engineer.'
  - 'Nobody reads my specs anyway. Why bother?'
  - 'The best designers don't need specs. They can
    explain their designs.'
  - 'Specs are busywork. Real design happens in Figma.'

  Engineering tells a different story:
  - 'We build what we think the designer wants because
    the spec doesn't cover our questions.'
  - 'We'd love detailed specs but designers resist.'

  How do I change the culture around specifications?"

  Task: Design a cultural transformation strategy
  that shifts the organization from viewing specs as
  overhead to viewing specs as essential design craft.

assertions:
  - type: llm_judge
    criteria: "Response addresses root causes of resistance — reframes specifications: from 'documentation burden' to 'design thinking made visible' (the spec IS the design, not paperwork about the design — if you can't specify it, you haven't fully designed it), from 'slowing me down' to 'investing 1 hour now to save 5 hours of back-and-forth later' (with data from actual team experience showing spec time vs clarification time), from 'nobody reads them' to accountability shift (engineers commit to reading specs before coding, QA commits to testing against specs — if no one reads them, that's a process problem not a spec problem), from 'best designers don't need specs' to 'best designers write the clearest specs' (reposition spec quality as a senior design skill, not junior busywork — include in promotion criteria). Each reframe includes specific tactics, not just slogans"
    weight: 0.35
    description: "ResistanceReframing"
  - type: llm_judge
    criteria: "Response designs a multi-phase cultural change program — Phase 1 — Show don't tell (4 weeks: identify 2-3 spec champions who already write great specs, have them present at team meetings showing how their specs prevented problems, pair them with skeptics for 1-2 features, collect before/after data on engineering questions and rework), Phase 2 — Make it easy (4 weeks: remove friction from spec writing — better templates, automated component detection, one-click annotation tools, embed spec creation into existing Figma workflow instead of separate documents), Phase 3 — Make it visible (4 weeks: spec quality becomes visible — dashboard showing spec completeness per team, 'Spec of the Sprint' recognition for particularly clear specs, engineering team publicly thanks designers for specs that made their work easier), Phase 4 — Make it expected (ongoing: spec review is part of design review, spec quality is in performance conversations, leadership models behavior by asking 'what does the spec say?' in every feature discussion). Change happens through environment design, not mandates"
    weight: 0.35
    description: "ChangeProgram"
  - type: llm_judge
    criteria: "Response includes sustainability mechanisms — feedback loops (monthly retrospective: what spec practices are working? what's still painful? what should we change? — ensures the process evolves with the team, not imposed from above), leadership modeling (design directors and VPs write specs for their own features — 'do as I do' not just 'do as I say', engineering leadership asks for specs in planning meetings — demand creates supply), measurement without punishment (track spec quality trends positively: 'Team X improved spec completeness from 60% to 85% this quarter' not 'Team Y only has 40% completeness', celebrate improvement over absolute numbers), and long-term embedding (spec practices included in new hire onboarding, spec quality in job descriptions and interview rubrics for senior roles, spec case studies in internal design community of practice, annual 'State of Specs' report to leadership showing organizational progress)"
    weight: 0.30
    description: "Sustainability"
