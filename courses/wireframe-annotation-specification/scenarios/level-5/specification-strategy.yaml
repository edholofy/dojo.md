meta:
  id: specification-strategy
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification strategy — develop an organization-wide specification vision that aligns design, engineering, and product leadership"
  tags: [strategy, vision, organizational, leadership, master]

state: {}

trigger: |
  A Chief Design Officer says: "I'm presenting to the
  CEO and CTO next week. They want to understand why
  we should invest $500K annually in specification
  practices (dedicated spec tooling, training program,
  spec operations team).

  The CTO is skeptical: 'Designers should just talk to
  engineers. We don't need a formal spec process.'

  The CEO wants ROI: 'How does this investment reduce
  time-to-market and defects?'

  I need a specification strategy that:
  - Justifies the investment with data
  - Shows the cost of NOT investing (current state)
  - Presents a 3-year vision with milestones
  - Addresses the CTO's concern about over-process
  - Includes specific ROI projections

  Help me build this presentation."

  Task: Create a comprehensive specification strategy
  with business justification, ROI model, and
  implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response builds a compelling business case — cost of current state (quantify: average 3 engineering questions per spec × 30 minutes per question × 50 features per quarter = 2,250 hours of clarification time annually, implementation deviation rate of 25% means 1 in 4 features needs rework costing $X per rework cycle, spec-related bugs reaching production: Y per quarter at $Z cost per bug), investment breakdown ($500K: $200K tooling and infrastructure, $150K training and onboarding, $100K spec operations headcount, $50K ongoing iteration), ROI projection (Year 1: 30% reduction in clarification time, 20% reduction in spec-related rework — saves $X, Year 2: 50% reduction in both — saves $Y, Year 3: mature practice — saves $Z — payback period: 18 months). Uses specific numbers and formulas, not vague claims"
    weight: 0.35
    description: "BusinessCase"
  - type: llm_judge
    criteria: "Response presents a 3-year strategic roadmap — Year 1 Foundation (Q1: audit current spec practices across all teams, establish baseline metrics, Q2: deploy standardized templates and annotation tooling, begin training program, Q3: implement peer review process and spec completeness automation, Q4: first ROI measurement and course correction), Year 2 Optimization (automated spec generation from design system, spec-to-test-case pipeline operational, cross-team spec dependency management, engineering co-authorship of technical specs), Year 3 Innovation (AI-assisted spec generation for standard patterns, predictive spec quality scoring, spec analytics dashboard for leadership, specification as competitive advantage in hiring and vendor relationships). Each phase has measurable outcomes and decision gates: proceed, adjust, or pivot based on metrics"
    weight: 0.35
    description: "StrategicRoadmap"
  - type: llm_judge
    criteria: "Response addresses stakeholder concerns directly — CTO's 'just talk to engineers' concern (talking works for 5 engineers, not 50 — verbal specs create knowledge silos, introduce inconsistency, and don't scale with team growth; specs complement conversation, they don't replace it — the spec is the artifact that captures what was agreed in conversation, preventing 'that's not what we discussed' conflicts), CEO's ROI concern (frame specs as 'engineering enablement' not 'design documentation' — every dollar spent on specs saves $3-5 in development efficiency by reducing ambiguity, rework, and cross-team miscommunication — cite industry data on cost of fixing defects at each stage), anti-bureaucracy safeguards (specification level scales with feature risk: simple features get lightweight specs, complex features get comprehensive specs — not everything gets the full treatment, time-box spec effort at 20% of design time maximum, spec process reviewed quarterly and simplified if it's not providing value). Persuasive executive communication"
    weight: 0.30
    description: "StakeholderAlignment"
