meta:
  id: spec-maturity-model
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification maturity model — develop a maturity framework for assessing and advancing an organization's specification practices"
  tags: [maturity-model, assessment, advancement, framework, master]

state: {}

trigger: |
  A design operations director says: "I've been asked
  to create a specification maturity model for our
  organization — similar to CMMI but for design specs.
  We have teams at wildly different levels:

  - Team A: No specs. Engineers build from screenshots.
  - Team B: Basic annotations on Figma frames.
  - Team C: Structured spec documents with templates.
  - Team D: Automated spec generation with QA
    integration.

  I need a maturity model that:
  - Defines clear levels (what does 'good' look like?)
  - Provides an assessment tool
  - Creates a progression path for each level
  - Avoids 'one size fits all' — not every team needs
    to be at Level 5
  - Includes benchmarks for each level

  How do I build this maturity model?"

  Task: Create a comprehensive specification maturity
  model with levels, assessment criteria, progression
  paths, and appropriate target levels.

assertions:
  - type: llm_judge
    criteria: "Response defines 5 maturity levels with clear criteria — Level 1 Ad Hoc (no standard spec process: specs are verbal, screenshots, or informal notes — engineering interprets designer intent, high ambiguity, frequent rework), Level 2 Defined (basic spec templates in use: consistent format across team, standard annotations for common patterns, but quality varies by designer, no review process), Level 3 Managed (spec quality is measured and reviewed: peer review process, completeness checklists, specs linked to user stories, engineering feedback loop, consistent quality across team), Level 4 Optimized (spec process is continuously improved: automated completeness checking, spec-to-test pipeline, design system integration, metrics-driven improvement, cross-team consistency), Level 5 Innovative (spec practices drive organizational advantage: AI-assisted generation, predictive quality scoring, specs as engineering enablement infrastructure, spec practices influence product strategy). Each level has: description, characteristics, typical artifacts, tools used, team behaviors, and example organization profile"
    weight: 0.35
    description: "MaturityLevels"
  - type: llm_judge
    criteria: "Response provides assessment tool and scoring — assessment dimensions (scored 1-5 per dimension): Process (is there a defined spec workflow?), Quality (do specs meet completeness standards?), Consistency (do all designers produce similar quality specs?), Integration (are specs integrated with engineering workflow?), Measurement (are spec outcomes tracked?), Automation (are repetitive spec tasks automated?), Culture (does the team value specification work?). Assessment method: 20-question survey with behavioral indicators (not opinion-based: 'In the last sprint, how many features had specs reviewed before development?' not 'Do you think your specs are good?'), scoring rubric maps answers to maturity level, radar chart visualization showing strengths and gaps per dimension, overall maturity level is the lowest dimension score (weakest link determines ceiling). Assessment takes 30 minutes per team and produces actionable results"
    weight: 0.35
    description: "AssessmentTool"
  - type: llm_judge
    criteria: "Response includes progression paths and appropriate targets — progression playbook (Level 1→2: introduce templates and basic annotation standards, expected timeline 1-2 months, key action: designate spec champion per team; Level 2→3: add review process and metrics, expected timeline 2-3 months, key action: implement peer review and completeness checklist; Level 3→4: automate and integrate, expected timeline 3-6 months, key action: deploy spec tooling and QA integration; Level 4→5: innovate and lead, expected timeline 6-12 months, key action: explore AI assistance and predictive analytics), appropriate target levels (not every team needs Level 5: internal tools team may target Level 3, customer-facing product teams should target Level 4, platform teams with many consumers should target Level 4-5 — target level based on team size, product complexity, user impact, and compliance requirements), and anti-patterns (level-chasing: teams focus on advancing levels instead of improving outcomes, certification theater: teams game the assessment to score higher without real improvement — mitigate by focusing on outcome metrics not level labels)"
    weight: 0.30
    description: "ProgressionPaths"
