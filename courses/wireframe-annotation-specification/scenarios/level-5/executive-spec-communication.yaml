meta:
  id: executive-spec-communication
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Executive specification communication — translate specification practices into business value narratives for C-suite, board, and investor audiences"
  tags: [executive, communication, business-value, C-suite, master]

state: {}

trigger: |
  A Chief Design Officer says: "Our board meeting is
  next week. The CEO asked me to present on 'design
  operational efficiency' — specifically how our
  specification practices impact product quality and
  delivery speed.

  The board includes:
  - A former CTO who understands technical specs
  - A former CMO who cares about customer experience
  - Two investors who care about ARR growth and margins
  - The CEO who wants to understand design's impact on
    the P&L

  I need to translate 'better wireframe specifications'
  into language each board member understands. How do
  I make the case that spec quality is a business
  lever, not just a design process?"

  Task: Create an executive communication framework
  that translates specification practices into
  business value for diverse board audiences.

assertions:
  - type: llm_judge
    criteria: "Response creates audience-specific narratives — for the former CTO (technical translation): specification quality as code quality upstream — defects caught in specs cost 10x less to fix than defects caught in QA and 100x less than production — spec coverage metrics analogous to test coverage metrics, spec quality score correlates with deployment success rate. For the former CMO (customer experience): spec completeness directly impacts UX consistency — features with comprehensive specs have 35% fewer UX inconsistencies reported by users, spec-driven development ensures design intent survives implementation, customer satisfaction scores higher for well-specified features. For investors (financial impact): spec ROI — every $1 invested in spec practices saves $3-5 in development efficiency, spec-driven development reduces time-to-market by 20-30% improving competitive positioning, predictable delivery (fewer surprises, more accurate estimates) reduces burn rate variance. For the CEO (P&L impact): spec practices as operational leverage — fixed investment that pays dividends on every feature shipped"
    weight: 0.35
    description: "AudienceNarratives"
  - type: llm_judge
    criteria: "Response provides data visualization and metrics framework — dashboard for the board (3 slides maximum): Slide 1 — Spec Quality Trend (line chart: spec completeness score trending upward over 6 quarters, overlaid with engineering questions per feature trending downward — shows correlation), Slide 2 — Business Impact (before/after comparison: features specified under old process vs new process — show difference in development time, bug rate, customer-reported issues — use actual numbers from the org), Slide 3 — Investment and ROI (waterfall chart showing: spec investment → reduced rework costs → reduced QA cycle time → faster time-to-market → revenue impact from earlier feature launch). Metrics are specific, measurable, and tied to business outcomes — not just design process metrics. Includes benchmarks: 'Our spec completeness is at 85% vs industry benchmark of 60%' type framing"
    weight: 0.35
    description: "DataVisualization"
  - type: llm_judge
    criteria: "Response addresses strategic positioning of specification practices — competitive advantage framing (specification maturity as a moat: competitors who don't invest in specs build slower, ship buggier products, and have higher developer turnover — position spec investment as R&D infrastructure, not overhead), talent attraction (top designers and engineers want to work with clear processes — spec quality is a recruiting differentiator, reduces onboarding time for new engineers by 30% as specs document institutional knowledge), scalability narrative (spec practices enable the organization to grow: adding engineers becomes faster because specs reduce dependency on designer availability, adding products becomes cheaper because spec templates and standards transfer to new product lines), and forward-looking vision (connect spec investment to AI-assisted development: well-structured specs become training data for AI code generation, spec-driven development positions the company to adopt AI development tools faster than competitors without structured specs)"
    weight: 0.30
    description: "StrategicPositioning"
