meta:
  id: specification-at-scale
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification at scale — manage specification practices across 100+ designers, multiple products, and distributed teams"
  tags: [scale, enterprise, distributed, multi-product, master]

state: {}

trigger: |
  A Chief Design Officer at a Fortune 500 company says:
  "We have 150 designers across 20 product teams in
  5 countries. Each team has different spec practices,
  tools, and quality levels. We're acquiring a company
  with 30 more designers who use completely different
  spec tooling.

  Challenges:
  - No single source of truth for spec standards
  - 3 different annotation tools in use (Figma
    annotations, Zeplin, custom Confluence templates)
  - Timezone gaps mean specs must be self-explanatory
    (no real-time clarification available)
  - Acquired company's designers use Sketch, not Figma
  - Cultural differences in spec detail level (US teams
    write brief specs, German team writes exhaustive
    specs, Japanese team uses visual diagrams)

  How do I unify specification practices at this scale?"

  Task: Create a specification unification strategy
  for a large, distributed, multi-cultural design
  organization including acquisition integration.

assertions:
  - type: llm_judge
    criteria: "Response creates a federated specification model — central spec governance (global spec standards team sets minimum requirements, annotation vocabulary, and quality benchmarks — but doesn't mandate specific tools or exact format), regional/team autonomy (each team can use their preferred tools and add detail beyond the minimum — German team can write exhaustive specs as long as they meet the minimum, US team can write brief specs as long as they meet the minimum), interoperability requirements (regardless of tool: specs must be exportable to a common format — structured JSON or markdown with standardized fields, Figma annotations sync to shared spec platform, Zeplin specs sync to same platform, Confluence specs use standardized template mapping to same fields), and governance structure (Global Spec Council: 1 rep per region, meets monthly, owns the standard; Regional Spec Leads: adapt global standard to local practices; Team Spec Champions: ensure team compliance and provide feedback upward). Balances global consistency with local autonomy"
    weight: 0.35
    description: "FederatedModel"
  - type: llm_judge
    criteria: "Response addresses distributed and cross-cultural challenges — timezone-proof specs (specs must answer the '3am test': if an engineer in a different timezone reads this spec at 3am with no designer available, can they implement it without guessing? — this means: explicit over implicit, no 'obvious' assumptions, no verbal tribal knowledge), cultural adaptation (US teams: may need to add more detail to meet minimum bar, frame as 'engineering enablement' not 'bureaucracy'; German teams: may need to focus on essentials rather than exhaustive documentation, frame as 'prioritization' not 'reduction'; Japanese teams: visual diagrams are valid spec format, ensure they include required fields as annotations on diagrams), language considerations (specs in English as lingua franca for cross-team features, local language specs acceptable for single-team features, key terminology glossary maintained in all team languages), and async collaboration (spec comments have 24-hour SLA for responses, time-zone-aware review assignments, recorded video walkthroughs for complex specs — designer records 5-minute Loom explaining key decisions)"
    weight: 0.35
    description: "DistributedCultural"
  - type: llm_judge
    criteria: "Response handles acquisition integration — tool migration plan (don't force immediate Sketch-to-Figma migration for specs: Phase 1 — acquired team continues in Sketch with output mapped to shared spec format, Phase 2 — parallel tooling for 6 months while team learns Figma, Phase 3 — full migration with spec templates pre-built in Figma — 9-month timeline), knowledge transfer (acquired team's spec best practices evaluated and integrated into global standard where superior, not just overwritten — they may have better approaches for certain spec types), cultural integration (acquired team introduced to spec standards through partnership not mandate: buddy system pairing acquired designers with existing team members, joint spec sessions where both sides learn from each other, acquired team's feedback incorporated into standard within first quarter), and success metrics (acquired team's spec quality reaches organizational average within 6 months, integration doesn't disrupt acquired team's existing delivery velocity, cross-team collaboration on specs begins within 3 months)"
    weight: 0.30
    description: "AcquisitionIntegration"
