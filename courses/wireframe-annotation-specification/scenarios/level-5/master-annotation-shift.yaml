meta:
  id: master-annotation-shift
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Master annotation shift — handle a week of strategic specification challenges including board presentation, acquisition crisis, and industry transformation"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Chief Design Officer. Your week:

  MONDAY — The board requests an emergency presentation.
  A competitor just launched a product that's getting
  rave reviews for "attention to detail" and "polished
  experience." The CEO asks: "Why does their product
  feel so much more polished than ours? What are we
  missing?" You suspect the answer is specification
  quality — their specs cover micro-interactions,
  edge cases, and accessibility that yours don't.
  Build the case and present a remediation plan.

  WEDNESDAY — During acquisition due diligence for a
  $50M target company, you discover their engineering
  team has zero specification documentation. All
  product knowledge lives in 3 senior engineers' heads.
  The CEO asks: "Is this a deal-breaker? What's the
  risk, and what would it cost to remediate?" Advise
  the CEO with a specification risk assessment.

  FRIDAY — You're invited to join an industry working
  group creating the first "Design Specification
  Standard" — similar to W3C standards for the web.
  The group wants to define: universal spec vocabulary,
  minimum spec requirements for different product
  categories, and spec interoperability between design
  tools. Lead the first working session.

  Task: Handle all three strategic specification
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses the competitive polish gap — root cause analysis (competitor's 'attention to detail' likely stems from: micro-interaction specs covering every state transition, edge case specifications preventing jarring experiences, accessibility specs ensuring consistent behavior for all users, performance specs ensuring smooth animations and fast loads — our specs likely cover the happy path but miss the details that create 'polish'), competitive spec audit (analyze competitor's product for specification signals: count the number of distinct states per screen, identify micro-interactions that suggest detailed specs, note accessibility features that indicate thorough annotation), remediation plan (30-60-90 day plan: Day 30 — identify the 10 highest-impact user journeys and re-specify them with micro-interaction detail, Day 60 — establish 'polish spec' standard for all new features, Day 90 — spec quality review integrated into design review process with polish checklist), and board presentation (frame as 'specification debt' analogous to technical debt — quantify the cost of remediation and the ongoing cost of not addressing it)"
    weight: 0.35
    description: "CompetitiveResponse"
  - type: llm_judge
    criteria: "Response provides acquisition specification risk assessment — risk quantification (3 senior engineers as sole knowledge holders = extreme bus factor risk, estimate knowledge documentation cost: 3 engineers × 2 weeks full-time to document core flows = 6 person-weeks minimum, ongoing risk: any engineer departure causes knowledge loss affecting product stability — quantify impact: $X in potential development delays per engineer departure), deal impact (not a deal-breaker but a significant remediation cost: add $200-500K to integration budget for specification and documentation work, extend integration timeline by 3 months for knowledge capture, negotiate acquisition price reduction based on documentation debt), remediation approach (immediate: pair each senior engineer with a technical writer for knowledge extraction sessions — 2 hours daily for 4 weeks, medium-term: create specification documentation for all critical product flows, long-term: establish spec practices in the acquired team aligned with parent company standards), and CEO advisory (clear recommendation: proceed with acquisition but factor documentation risk into price negotiation, include spec remediation milestones in integration plan, retain all 3 senior engineers with retention bonuses during knowledge transfer period)"
    weight: 0.35
    description: "AcquisitionRisk"
  - type: llm_judge
    criteria: "Response leads the industry specification standard working session — session structure (define scope: this standard should enable interoperability not mandate process — similar to how HTML defines structure but not design), standard components to define (universal spec vocabulary: 30 core terms with unambiguous definitions — 'state', 'transition', 'trigger', 'condition', 'target', 'variant', minimum spec requirements by product category: safety-critical products need exhaustive specs, internal tools need basic specs, consumer products fall in between, spec interchange format: structured data schema that all design tools can export/import — like SVG for vector graphics but for specifications), working group process (RFC process for proposing standard elements, reference implementations in major design tools, compliance levels: Level A — basic vocabulary, Level AA — structured format, Level AAA — full interoperability, timeline: 12-month standard development, 6-month pilot, 12-month adoption period). Demonstrates thought leadership in advancing the specification discipline"
    weight: 0.30
    description: "IndustryStandard"
