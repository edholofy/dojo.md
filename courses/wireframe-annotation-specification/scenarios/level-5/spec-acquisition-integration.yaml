meta:
  id: spec-acquisition-integration
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification acquisition integration — harmonize specification practices across merged organizations while preserving velocity"
  tags: [M&A, acquisition, integration, harmonization, master]

state: {}

trigger: |
  A Chief Design Officer says: "We just completed a
  major acquisition. The combined organization now has:

  - Our company: 100 designers, Figma-based, strong
    spec culture, design system with 200+ components
  - Acquired company: 60 designers, Sketch-based, no
    formal spec process, component library but no
    design system documentation

  The CEO wants 'one unified design organization'
  within 12 months. Product integration means features
  will span both legacy products.

  Challenges:
  - Acquired designers resist our 'bureaucratic' spec
    process
  - Our designers think acquired company's work is
    'sloppy' without specs
  - Two different design systems that need to merge
  - Cross-product features need unified specs
  - We can't slow down either product's roadmap during
    integration

  How do I integrate specification practices without
  destroying either team's productivity?"

  Task: Create a specification integration strategy
  for the merged organization that harmonizes practices
  while maintaining delivery velocity.

assertions:
  - type: llm_judge
    criteria: "Response creates a phased integration strategy — Phase 1 Listen and Learn (Month 1-2: understand acquired team's actual practices — they may have informal but effective spec practices that look different from formal specs, identify what works in both organizations, establish mutual respect: our specs have value AND their speed has value), Phase 2 Bridge (Month 3-4: create interoperability: both teams can read each other's specs even if created in different tools, shared spec vocabulary glossary, cross-team spec translators who help teams understand each other's output), Phase 3 Converge (Month 5-8: agree on unified minimum spec standard that both teams can meet, shared templates available in both Figma and Sketch, unified spec review process with flexibility for tool differences), Phase 4 Unify (Month 9-12: single toolchain migration completed, unified design system with spec standards embedded, integrated teams producing consistent specs). Each phase has measurable outcomes and checkpoint criteria before advancing"
    weight: 0.35
    description: "PhasedIntegration"
  - type: llm_judge
    criteria: "Response addresses cultural integration and resistance — overcoming resistance from acquired team ('bureaucratic'): show them the spec ROI data, let them experience how specs prevent rework rather than mandating compliance, identify spec champions within acquired team who see the value, frame as 'we're adopting best practices from both organizations' not 'you need to do it our way'. Overcoming resistance from existing team ('sloppy'): acquired team may produce higher velocity and their informal communication works for smaller team size — acknowledge that our process is optimized for our scale not inherently superior, pair designers from both teams on cross-product features so they learn from each other's strengths. Integration team structure: joint spec working group with equal representation from both organizations, co-chairs from each side, decisions require consensus not majority vote, shared outcomes measured by delivery velocity not spec compliance score. Psychological safety: no blame for spec gaps during transition, learning curve acknowledged and supported"
    weight: 0.35
    description: "CulturalIntegration"
  - type: llm_judge
    criteria: "Response covers design system and cross-product specification — design system merge strategy for specs (audit both component libraries: identify equivalent components, create mapping table — 'their Card = our ContentTile with different padding', during transition period specs can reference either system with cross-reference, unified system components carry unified spec standards when merged), cross-product feature specs (features spanning both legacy products: single spec document owned by feature lead from either team, spec includes platform-specific sections for each legacy product, shared integration points explicitly documented with both teams' sign-off), and velocity protection (no-slowdown guarantees: during Phase 1-2 neither team required to change their current spec process, new unified processes introduced alongside existing ones not replacing them, teams opt-in to unified processes as they see value, velocity metrics monitored weekly — if either product's delivery slows by >10% during integration, pause and diagnose before continuing)"
    weight: 0.30
    description: "DSCrossProduct"
