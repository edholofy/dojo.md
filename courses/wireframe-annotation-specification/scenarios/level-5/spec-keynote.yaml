meta:
  id: spec-keynote
  level: 5
  course: wireframe-annotation-specification
  type: output
  description: "Specification keynote — deliver a thought leadership keynote on the future of design specification and its impact on product development"
  tags: [keynote, thought-leadership, conference, future, master]

state: {}

trigger: |
  You've been invited to give the closing keynote at
  a major design conference. The title: "The Invisible
  Craft: How Specification Quality Shapes Product
  Quality."

  The audience is 2,000 design professionals ranging
  from junior designers to CDOs. Your talk should:

  1. Make the case that specification is an undervalued
     core design skill
  2. Show the direct link between spec quality and
     product quality with compelling examples
  3. Present a vision for the future of specification
  4. Inspire the audience to invest in their spec craft
  5. Be memorable — not a dry process talk

  Conference organizers want a keynote that will be
  talked about afterwards. Previous year's best talk
  was about "design as storytelling" and was shared
  10,000+ times.

  Task: Outline and write the keynote, including key
  stories, frameworks, and the memorable closing.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling keynote structure — opening hook (not 'today I'll talk about specifications' — instead: a story about a product disaster caused by a spec gap: 'In 2024, a major bank launched a transfer feature. The spec said Transfer button confirms the action. It didn't specify what happens when the user taps Transfer twice in 300 milliseconds. $2.3 million in duplicate transfers later, a 6-word annotation would have prevented it.' — makes the audience feel the stakes), narrative arc (problem: specs are treated as paperwork, evidence: what happens when specs fail, reframe: specs ARE the design — the wireframe is just a picture, the spec is the product, solution: how to elevate spec craft, vision: the future of specifications, call to action: specific next steps for every level of the audience), and pacing (alternate between stories, frameworks, and practical takeaways — every 5 minutes, the audience gets something they can use Monday morning)"
    weight: 0.35
    description: "KeynoteStructure"
  - type: llm_judge
    criteria: "Response includes powerful frameworks and examples — core framework ('The Specification Iceberg': what users see — the UI — is the tip; what makes it work — the spec — is the 90% below the surface: states, errors, edge cases, accessibility, performance, platform differences — when we under-specify, we're designing icebergs that sink), before/after examples (show 3 real-world patterns: the vague spec vs the precise spec, and the different products they produce — Example 1: 'Show error message' vs 'After 3 failed login attempts, show error: Too many attempts. Try again in 5 minutes. Timer counts down. After timeout, clear error and refocus on email field.' — the precise spec produces a humane error experience, the vague spec produces a hostile one), skill progression framework (junior: annotate what's visible, mid: annotate what's invisible — edge cases and errors and states, senior: annotate what's impactful — accessibility and performance and cross-platform, lead: annotate what's organizational — standards and culture and scale)"
    weight: 0.35
    description: "FrameworksExamples"
  - type: llm_judge
    criteria: "Response delivers a memorable closing and actionable takeaways — future vision (in 5 years: specs will be executable prototypes, living documents that update with the design system, and the source of truth that generates both code and tests — the spec will be the product, and the designer who writes specs will be the architect of the user experience), level-appropriate calls to action (juniors: this week, annotate one screen completely — every state, every error, every edge case — feel how deep design really goes; mid-level: this month, have your engineer review your spec before you finalize it — their questions will make you a better designer; seniors: this quarter, establish a spec quality standard for your team — define what 'good enough' looks like; leaders: this year, measure the correlation between spec quality and development velocity in your org — the data will justify the investment), closing line (memorable and quotable: something that reframes specifications as design craft, not bureaucracy — e.g., 'The best design you'll ever do is the design no one sees — the specification that makes everything else possible. Start making it visible.')"
    weight: 0.30
    description: "ClosingCTA"
