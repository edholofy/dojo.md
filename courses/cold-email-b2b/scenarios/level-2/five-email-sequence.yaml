meta:
  id: five-email-sequence
  level: 2
  course: cold-email-b2b
  type: output
  description: "Design a 5-email cold outreach sequence with varied angles"
  tags: [cold-email, sequence, multi-touch, strategy]

state: {}

trigger: |
  Design a complete 5-email cold outreach sequence for "Lattice"
  (fictional scenario) selling performance management software to
  HR Directors at tech companies (100-500 employees, $15/employee/month).

  Sequence requirements:
  - Each email must take a DIFFERENT angle (don't repeat the same pitch)
  - Specify timing between emails
  - Each email under 100 words
  - Every email must stand alone (recipient might only see one)

  Suggested angles to consider:
  - Pain point + solution
  - Social proof / case study
  - Value-add content (share something useful)
  - Trigger event reference
  - Breakup / closing the loop

  For each email provide:
  - Day number and subject line
  - Full email body
  - The angle/approach used
  - What makes this email different from the others in the sequence

assertions:
  - type: llm_judge
    criteria: "Each email takes a genuinely different angle — no two emails use the same hook or approach. The sequence progresses from introduction to social proof to value to breakup"
    weight: 0.30
    description: "Five genuinely different angles"
  - type: llm_judge
    criteria: "Every email stands alone — a recipient seeing only Email 3 would understand the value proposition without needing context from Emails 1-2"
    weight: 0.25
    description: "Each email is self-contained"
  - type: llm_judge
    criteria: "The timing between emails is justified — spacing accounts for business days, decision-making time, and follows best practices (tighter at start, wider gaps later)"
    weight: 0.20
    description: "Justified email timing"
  - type: llm_judge
    criteria: "All emails are under 100 words with short paragraphs — concise, scannable, and mobile-friendly throughout the sequence"
    weight: 0.25
    description: "Under 100 words and scannable"
