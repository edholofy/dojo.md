meta:
  id: multichannel-sequence
  level: 2
  course: cold-email-b2b
  type: output
  description: "Design a multi-channel cold outreach sequence"
  tags: [cold-email, multichannel, linkedin, phone, sequence]

state: {}

trigger: |
  Design a 14-day multi-channel cold outreach sequence combining email,
  LinkedIn, and phone for reaching enterprise prospects.

  Product: "Gong" (fictional scenario) — revenue intelligence platform
  ($100/user/month, minimum 10 seats)
  Target: VP of Sales at companies with 50+ salespeople
  Average deal size: $60,000 ARR

  Channels available:
  - Email (primary, can send daily)
  - LinkedIn (connection request + InMail, limited to 100 requests/week)
  - Phone (cold calling, 2 attempts per prospect)

  Design:
  1. A day-by-day sequence map showing which channel fires when
  2. Write the copy for: Email 1, LinkedIn connection request note,
     Email 2, and the phone call script opener (30 seconds)
  3. Explain why you chose this channel order
  4. Define the rules: when to skip a channel, when to accelerate,
     when to pause

  The sequence should feel like a coordinated conversation, not
  three separate campaigns hitting the same person.

assertions:
  - type: llm_judge
    criteria: "The channel sequence is strategically ordered — not just alternating randomly but building from low-commitment (LinkedIn view/email) to high-commitment (phone) with clear reasoning"
    weight: 0.25
    description: "Strategically ordered channel sequence"
  - type: llm_judge
    criteria: "All four copy pieces are written and channel-appropriate — emails are scannable, LinkedIn note is conversational and under 300 characters, phone opener is 30 seconds and hooks immediately"
    weight: 0.25
    description: "Channel-appropriate copy for all pieces"
  - type: llm_judge
    criteria: "The sequence feels cohesive — later touchpoints reference or build on earlier ones (e.g., 'I sent you an email about...' on the call) creating continuity"
    weight: 0.25
    description: "Cohesive cross-channel narrative"
  - type: llm_judge
    criteria: "Rules for acceleration, skipping, and pausing are specific — engagement signals trigger next steps, and the sequence adapts to prospect behavior rather than running on autopilot"
    weight: 0.25
    description: "Specific behavioral trigger rules"
