meta:
  id: deliverability-troubleshooting
  level: 2
  course: cold-email-b2b
  type: output
  description: "Diagnose and fix cold email deliverability problems"
  tags: [cold-email, deliverability, troubleshooting, inbox-placement]

state: {}

trigger: |
  Your cold email campaign is in trouble. Diagnose the problems and
  provide a fix plan.

  Campaign stats (last 30 days):
  - Sent: 4,200 emails
  - Bounced: 340 (8.1% bounce rate)
  - Delivered: 3,860
  - Opens: 385 (10% open rate — was 28% a month ago)
  - Replies: 12 (0.3% reply rate — was 3.2% a month ago)
  - Spam complaints: 47 (1.2%)
  - Unsubscribes: 89

  Technical setup:
  - Domain: outreach.growthsaas.com (3 months old)
  - SPF: configured
  - DKIM: configured
  - DMARC: not configured
  - Sending volume: 200/day from a single mailbox
  - ESP: Generic SMTP (not a dedicated cold email tool)
  - No email warm-up was done (jumped straight to 200/day)

  Content patterns:
  - Same subject line for all 4,200 emails
  - Emails contain 3 links each (website, calendar, LinkedIn)
  - HTML email with images
  - No plain text version

  Provide:
  1. Root cause diagnosis (rank problems by severity)
  2. Immediate actions (what to do TODAY)
  3. 30-day recovery plan
  4. Long-term infrastructure changes
  5. Realistic timeline for returning to previous performance

assertions:
  - type: llm_judge
    criteria: "Root causes are ranked by severity — missing DMARC, no warm-up, 8.1% bounce rate, 1.2% spam complaint rate, single mailbox at 200/day, and same subject line are all identified and prioritized"
    weight: 0.25
    description: "Root causes identified and severity-ranked"
  - type: llm_judge
    criteria: "Immediate actions are specific — pause sending, set up DMARC, clean the list, reduce volume, and rotate subject lines. Not vague 'improve deliverability' advice"
    weight: 0.25
    description: "Specific immediate actions"
  - type: llm_judge
    criteria: "The 30-day recovery plan is realistic — acknowledges that domain reputation recovery takes weeks, includes gradual volume ramp-back, and sets measurable milestones"
    weight: 0.25
    description: "Realistic 30-day recovery plan"
  - type: llm_judge
    criteria: "Infrastructure changes address the root — multiple mailboxes, dedicated cold email ESP, warm-up protocol, DMARC enforcement, and plain text versions are recommended"
    weight: 0.25
    description: "Root-addressing infrastructure changes"
