meta:
  id: industry-specific-messaging
  level: 2
  course: cold-email-b2b
  type: output
  description: "Adapt cold email messaging for 4 different industries"
  tags: [cold-email, industry-specific, messaging, segmentation]

state: {}

trigger: |
  You're selling "Calendly" (fictional scenario) — a scheduling automation
  tool ($12/user/month). Write industry-specific cold emails for 4
  different verticals.

  Core value: Eliminates scheduling back-and-forth, automates meeting
  booking, integrates with all major calendars and CRMs.

  Write a cold email for each industry:

  1. Real Estate (target: real estate agents, 50+ showings/month)
     - Pain: scheduling showings with multiple buyers and sellers
     - Proof: agents using Calendly book 40% more showings

  2. Recruiting (target: talent acquisition managers, 100+ interviews/month)
     - Pain: coordinating interviews across hiring managers and candidates
     - Proof: reduces time-to-schedule by 75%

  3. Financial Advisory (target: financial advisors, client-facing)
     - Pain: manual scheduling of client reviews and consultations
     - Proof: advisors see 25% more clients per week

  4. Healthcare (target: clinic managers, multi-provider practices)
     - Pain: patient scheduling and provider coordination
     - Proof: reduces no-shows by 35% with automated reminders

  Each email must use industry-specific language, reference realistic
  pain points, and include relevant social proof.

assertions:
  - type: llm_judge
    criteria: "Each email uses industry-specific language — real estate talks about 'showings' and 'listings,' recruiting talks about 'candidate experience,' financial uses 'client reviews,' healthcare uses 'patient scheduling'"
    weight: 0.25
    description: "Industry-specific language in each email"
  - type: llm_judge
    criteria: "Pain points are specific to each industry — not generic 'scheduling is hard' but industry-specific workflow problems that each role actually experiences"
    weight: 0.25
    description: "Industry-specific pain points"
  - type: llm_judge
    criteria: "Social proof is relevant to the audience — agents care about more showings, recruiters care about time-to-schedule, advisors care about client volume, clinics care about no-shows"
    weight: 0.25
    description: "Relevant industry social proof"
  - type: llm_judge
    criteria: "The core product is the same but the framing changes completely — same tool, four different stories about why it matters. This demonstrates message-market fit"
    weight: 0.25
    description: "Same product four different framings"
