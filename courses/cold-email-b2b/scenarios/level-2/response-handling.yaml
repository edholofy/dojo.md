meta:
  id: response-handling
  level: 2
  course: cold-email-b2b
  type: output
  description: "Write responses to different types of cold email replies"
  tags: [cold-email, response, objection, reply-handling]

state: {}

trigger: |
  You sent a cold email selling "Zendesk" (fictional scenario) — a
  customer support platform ($55/agent/month) to a Head of Support.

  You've received 6 different types of replies. Write the optimal
  response to each within 24 hours.

  Reply 1 — Positive interest:
  "Thanks for reaching out. We're actually evaluating support tools
  right now. Can you send more info?"

  Reply 2 — Soft objection:
  "We're using Freshdesk and it works fine for us."

  Reply 3 — Timing objection:
  "Not a good time. We're in the middle of a product launch. Maybe
  reach out in Q2?"

  Reply 4 — Price objection:
  "We looked at Zendesk before. Too expensive for a 15-person team."

  Reply 5 — Referral:
  "I'm not the right person for this. Try reaching out to our CTO,
  David Park."

  Reply 6 — Hostile:
  "Please remove me from your list. I don't appreciate unsolicited
  emails."

  For each reply: write the response and explain your strategy.

assertions:
  - type: llm_judge
    criteria: "The positive interest reply strikes while hot — provides value immediately (case study, link, or specific info) and books a meeting in the same response, not in a separate follow-up"
    weight: 0.20
    description: "Hot lead response strikes immediately"
  - type: llm_judge
    criteria: "The Freshdesk objection is handled with curiosity, not confrontation — asks about their experience, finds pain points, and differentiates without bashing the competitor"
    weight: 0.20
    description: "Curious non-confrontational competitor handling"
  - type: llm_judge
    criteria: "The timing objection response respects the timeline AND keeps the door open — acknowledges the launch, offers to reconnect in Q2, and provides value in the meantime"
    weight: 0.15
    description: "Respectful timing objection handling"
  - type: llm_judge
    criteria: "The referral response thanks the original contact, asks for a warm introduction, and includes context for the new person — not just emailing David cold"
    weight: 0.15
    description: "Smart referral follow-through"
  - type: llm_judge
    criteria: "The hostile reply is handled professionally — immediate removal confirmation, brief apology, no defensiveness, and no attempt to salvage the relationship"
    weight: 0.15
    description: "Professional hostile reply handling"
  - type: llm_judge
    criteria: "The price objection is reframed around ROI — not defending the price but showing the value per agent, time saved, or revenue impact that makes $55/agent worth it"
    weight: 0.15
    description: "ROI-based price objection reframe"
