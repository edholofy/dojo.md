meta:
  id: domain-warming-plan
  level: 2
  course: cold-email-b2b
  type: output
  description: "Design a domain warming strategy for cold email outreach"
  tags: [cold-email, deliverability, domain-warming, technical]

state: {}

trigger: |
  You just registered a new domain (outreach.acmesaas.com) for cold email
  outreach. Design a complete 45-day domain warming plan.

  Context:
  - Main domain: acmesaas.com (established, good reputation)
  - New outreach domain: outreach.acmesaas.com
  - ESP: Instantly.io
  - Target volume: 200 cold emails per day by Day 45
  - List: 8,000 verified B2B contacts
  - Team: 2 SDRs who will be sending

  Design:
  1. Pre-launch technical setup checklist (DNS records, authentication)
  2. Day-by-day sending volume ramp for the first 45 days
  3. Content strategy during warm-up (what to send to build reputation)
  4. Monitoring metrics and red flags to watch for
  5. What to do if deliverability drops during warm-up
  6. Mailbox setup best practices (how many inboxes, rotation)

  Be specific with numbers — volume per day, per inbox, per SDR.

assertions:
  - type: llm_judge
    criteria: "The technical setup covers SPF, DKIM, DMARC, custom tracking domain, and MX records — all are explained with specific configuration steps, not just listed"
    weight: 0.25
    description: "Complete technical DNS setup"
  - type: llm_judge
    criteria: "The volume ramp is gradual and specific — starting at 5-10 emails/day and scaling to 200 over 45 days, with clear daily or weekly targets and reasoning for the pace"
    weight: 0.25
    description: "Specific gradual volume ramp"
  - type: llm_judge
    criteria: "The warm-up content strategy is practical — early emails to engaged contacts or warm lists to build positive signals, not jumping straight into cold outreach"
    weight: 0.25
    description: "Practical warm-up content strategy"
  - type: llm_judge
    criteria: "Red flags and recovery steps are specific — bounce rate thresholds, spam complaint rates, inbox placement monitoring, and exact actions to take if metrics deteriorate"
    weight: 0.25
    description: "Specific monitoring and recovery protocols"
