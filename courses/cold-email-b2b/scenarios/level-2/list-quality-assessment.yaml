meta:
  id: list-quality-assessment
  level: 2
  course: cold-email-b2b
  type: output
  description: "Assess and clean a prospect list for cold outreach"
  tags: [cold-email, list-quality, hygiene, prospecting]

state: {}

trigger: |
  You've been given a prospect list of 5,000 contacts for a cold email
  campaign. The list was purchased from a data vendor 4 months ago.
  Your product is an HR analytics platform ($200/month) for companies
  with 100+ employees.

  Here's what the data looks like (sample of 10 records):

  | Name | Email | Title | Company | Size | Industry | Last Verified |
  |------|-------|-------|---------|------|----------|---------------|
  | John Smith | john@company.com | CEO | Acme Corp | 15 | Retail | 8 months ago |
  | Sarah Lee | sarah.lee@bigcorp.com | VP HR | BigCorp | 800 | Tech | 2 months ago |
  | info@ | info@startup.io | — | StartupIO | 50 | SaaS | 4 months ago |
  | Mike R. | mike@techfirm.co | Director of People | TechFirm | 300 | Tech | 1 month ago |
  | — | bounce@invalid.xyz | CFO | Unknown | — | — | Never |
  | Lisa Wang | lisa.w@enterprise.com | CHRO | Enterprise Inc | 2000 | Finance | 3 months ago |
  | Bob | bob123@gmail.com | HR Manager | Freelance | 1 | Consulting | 6 months ago |
  | Amy Torres | amy@healthco.org | Head of Talent | HealthCo | 450 | Healthcare | 2 weeks ago |
  | dave_old@yahoo.com | dave_old@yahoo.com | — | — | — | — | 1 year ago |
  | Chen Wei | c.wei@manufact.com | VP Operations | ManufactCo | 600 | Manufacturing | 3 months ago |

  Analyze this list:
  1. Flag every problematic record and explain why
  2. Define your list cleaning criteria (what to remove, what to keep)
  3. Estimate the percentage of the full 5,000 list that's likely usable
  4. Recommend a re-verification process
  5. Calculate the risk if you send to the uncleaned list (bounce rate,
     spam complaints, reputation damage)

assertions:
  - type: llm_judge
    criteria: "Every problematic record is correctly flagged — info@ generic addresses, personal gmail/yahoo, missing data fields, too-small companies, wrong titles, and stale verification dates"
    weight: 0.30
    description: "All problematic records correctly flagged"
  - type: llm_judge
    criteria: "The cleaning criteria are systematic — clear rules for removal based on company size (under 100), role relevance, email validity, verification age, and data completeness"
    weight: 0.25
    description: "Systematic cleaning criteria"
  - type: llm_judge
    criteria: "The risk calculation is specific — estimated bounce rates, spam complaint rates, and the impact on sender reputation if sending to an uncleaned 4-month-old purchased list"
    weight: 0.25
    description: "Specific risk calculation"
  - type: llm_judge
    criteria: "The re-verification process is practical — recommends specific tools or methods (email verification services, LinkedIn cross-reference) with expected cost and timeline"
    weight: 0.20
    description: "Practical re-verification process"
