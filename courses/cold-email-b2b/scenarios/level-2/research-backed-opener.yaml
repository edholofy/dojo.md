meta:
  id: research-backed-opener
  level: 2
  course: cold-email-b2b
  type: output
  description: "Write research-backed cold email openers"
  tags: [cold-email, opener, research, personalization]

state: {}

trigger: |
  Write personalized cold email openers for 5 prospects. For each, you
  have specific research — use it to create a compelling first 2 sentences
  that make them want to keep reading.

  You're selling "PipelineIQ," a revenue intelligence platform ($399/month).

  Prospect 1 — Trigger event: Funding
  - Name: Alex Rivera, VP Sales at NovaTech
  - Just raised $25M Series B (announced yesterday)
  - Posted on LinkedIn: "Excited to scale our sales team from 10 to 40"

  Prospect 2 — Trigger event: Hiring
  - Name: Kim Nguyen, Director of Sales at BrightPath
  - Posted 6 new SDR positions on LinkedIn this week
  - Company blog: "Our 2026 goal is 3x pipeline growth"

  Prospect 3 — Trigger event: Content engagement
  - Name: Tom Barrett, Head of Revenue at Cascade
  - Commented on a LinkedIn post about "sales forecasting challenges"
  - His comment: "We're struggling with this exact problem"

  Prospect 4 — Trigger event: Competitive
  - Name: Priya Sharma, CRO at DataFlow
  - Company recently switched from Salesforce to HubSpot CRM
  - DataFlow's competitor just announced a major product launch

  Prospect 5 — Trigger event: Leadership change
  - Name: Marcus Johnson, newly appointed VP Sales at Vertex
  - Started 3 weeks ago (previously VP Sales at a competitor)
  - Posted: "Excited to bring a data-driven approach to Vertex"

  Write the first 2 sentences (opener only) for each, plus explain
  why this trigger event makes NOW the right time to reach out.

assertions:
  - type: llm_judge
    criteria: "Each opener references the specific trigger event naturally — funding, hiring, content engagement, tech migration, or new role are woven in without feeling stalkerish"
    weight: 0.30
    description: "Natural trigger event integration"
  - type: llm_judge
    criteria: "The openers create a bridge from the trigger to PipelineIQ's value — each transition from 'I noticed X about you' to 'which is relevant because...' is smooth and logical"
    weight: 0.25
    description: "Smooth trigger-to-value bridge"
  - type: llm_judge
    criteria: "The timing explanations are specific — they explain why THIS WEEK is better than last month or next quarter for reaching out, based on the prospect's current situation"
    weight: 0.25
    description: "Specific timing justification"
  - type: llm_judge
    criteria: "None of the openers use generic phrases like 'I came across your profile' or 'I hope this email finds you well' — each is specific to the individual prospect"
    weight: 0.20
    description: "Zero generic opener phrases"
