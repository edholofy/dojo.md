meta:
  id: ab-test-cold-email
  level: 2
  course: cold-email-b2b
  type: output
  description: "Design A/B tests for a cold email campaign"
  tags: [cold-email, ab-testing, optimization, metrics]

state: {}

trigger: |
  Design 4 A/B tests for a cold email campaign selling "Mixpanel"
  (fictional scenario) — a product analytics tool ($89/month) to
  Product Managers at B2B SaaS companies.

  List: 6,000 verified contacts
  Current baseline: 22% open rate, 2.8% reply rate, 0.4% meeting rate

  For each test:
  1. State the hypothesis clearly
  2. Write both Variant A and Variant B (full copy for the element tested)
  3. Define the primary metric to measure
  4. Calculate minimum sample size needed (assume 95% confidence, 80% power)
  5. State how long to run the test
  6. Define the decision criteria (what result means which variant wins)

  Tests to design:
  - Test 1: Subject line (question vs. statement)
  - Test 2: Opening line (pain point vs. achievement reference)
  - Test 3: Social proof placement (beginning vs. end of email)
  - Test 4: CTA type (meeting request vs. resource share)

assertions:
  - type: llm_judge
    criteria: "Hypotheses are specific and testable — each states the expected outcome and reasoning, not just 'variant A will beat variant B'"
    weight: 0.25
    description: "Specific testable hypotheses"
  - type: llm_judge
    criteria: "Both variants for each test change ONLY the tested variable — everything else remains constant, ensuring the test is valid and results are attributable"
    weight: 0.25
    description: "Properly isolated test variables"
  - type: llm_judge
    criteria: "Sample size calculations are reasonable — based on the 6,000 list, baseline metrics, and expected minimum detectable effect. Shows understanding of statistical significance"
    weight: 0.25
    description: "Reasonable sample size calculations"
  - type: llm_judge
    criteria: "Decision criteria are clear — specific thresholds for declaring a winner, accounting for statistical significance and practical significance (meaningful improvement, not just p < 0.05)"
    weight: 0.25
    description: "Clear specific decision criteria"
