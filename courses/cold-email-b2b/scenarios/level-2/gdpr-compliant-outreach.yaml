meta:
  id: gdpr-compliant-outreach
  level: 2
  course: cold-email-b2b
  type: output
  description: "Design a GDPR-compliant cold email campaign for EU prospects"
  tags: [cold-email, gdpr, compliance, eu, legal]

state: {}

trigger: |
  You're a US-based SaaS company expanding cold outreach to the EU market
  for the first time. Your legal team needs a compliant cold email strategy.

  Product: "BuildTrack," a construction project management tool ($49/user/month)
  Target: Construction company owners and project managers in Germany, France, and UK
  List source: 3,000 contacts from a trade show in Munich

  Design a GDPR-compliant cold email strategy:

  1. Legitimate basis for contact: Which GDPR legal basis applies to
     cold B2B email? Explain "legitimate interest" and how to document it.

  2. Required email elements: What must every cold email to EU prospects
     include to be GDPR-compliant?

  3. Data handling: How should you store, process, and eventually delete
     prospect data? What rights must you provide?

  4. Write 2 versions of the cold email:
     - Version A: Fully GDPR-compliant (includes all required elements)
     - Version B: Common "almost compliant" version with 5 subtle violations

  5. Identify the 5 violations in Version B and explain the risk of each.

  Note: The UK post-Brexit has its own data protection regime (UK GDPR)
  that's similar but distinct. Address any differences.

assertions:
  - type: llm_judge
    criteria: "Legitimate interest is correctly explained — it's the most common basis for B2B cold email in the EU, but requires a documented legitimate interest assessment (LIA) and balancing test"
    weight: 0.25
    description: "Correct legitimate interest explanation"
  - type: llm_judge
    criteria: "Version A includes all required GDPR elements — data controller identity, purpose of processing, right to object, right to access/delete, data retention period, and privacy policy link"
    weight: 0.25
    description: "Complete GDPR-compliant version"
  - type: llm_judge
    criteria: "Version B's 5 violations are subtle and realistic — not obvious mistakes but common oversights like missing data retention info, vague purpose, or inadequate opt-out mechanism"
    weight: 0.25
    description: "Subtle realistic GDPR violations"
  - type: llm_judge
    criteria: "UK GDPR differences are addressed — post-Brexit distinctions like the ICO as regulator, UK adequacy decision status, and any practical differences in cold email requirements"
    weight: 0.25
    description: "UK GDPR differences addressed"
