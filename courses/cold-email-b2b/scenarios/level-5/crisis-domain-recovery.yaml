meta:
  id: crisis-domain-recovery
  level: 5
  course: cold-email-b2b
  type: output
  description: "Full crisis management for catastrophic cold email failure"
  tags: [cold-email, crisis, domain-recovery, reputation, management]

state: {}

trigger: |
  Catastrophic scenario: Your entire cold email infrastructure has
  collapsed. Manage the crisis and rebuild.

  What happened (in order):
  1. Your primary outreach domain was blacklisted on Spamhaus
  2. Google flagged your main brand domain as associated with spam
     (despite using a separate outreach domain)
  3. Existing customer emails from the main domain are now landing in spam
  4. Your Salesforce ESP account was suspended for policy violations
  5. The CEO's personal emails from the brand domain are being filtered
  6. A tech journalist tweeted: "[YourCompany]'s spam campaign is out
     of control — blacklisted for good reason"
  7. 3 prospects on your cold list work at existing customer companies
     and complained internally

  Impact:
  - Cold email pipeline: $0 (completely stopped)
  - Customer communications: degraded (40% inbox placement vs. 95%)
  - Brand reputation: actively being damaged
  - CEO involvement: this is now a board-level conversation
  - Revenue at risk: $2M in renewal pipeline from affected customers

  Design the complete crisis response:

  1. HOUR 1 — Immediate triage
  2. DAY 1 — Damage assessment and stakeholder communication
  3. WEEK 1 — Technical recovery and brand repair
  4. MONTH 1 — Infrastructure rebuild
  5. QUARTER 1 — Relaunch with safeguards
  6. Post-crisis — What to tell the board
  7. Prevention — Systems that prevent this from ever happening again

  Write the actual emails/communications for:
  - Internal all-hands update
  - Customer communication about email delivery issues
  - Response to the journalist's tweet
  - Board update memo

assertions:
  - type: llm_judge
    criteria: "Hour 1 triage prioritizes correctly — customer communications > brand damage > cold email recovery. The existing customer email degradation is the most urgent business risk"
    weight: 0.20
    description: "Correctly prioritized triage"
  - type: llm_judge
    criteria: "The customer communication is honest without creating panic — acknowledges delivery issues, explains the fix is underway, provides alternative contact methods, and doesn't mention 'spam' or 'blacklist'"
    weight: 0.20
    description: "Honest non-alarming customer communication"
  - type: llm_judge
    criteria: "The journalist response is professional and factual — acknowledges the issue, explains corrective actions, doesn't get defensive or make excuses. Could potentially turn negative coverage into a positive story"
    weight: 0.20
    description: "Professional journalist response"
  - type: llm_judge
    criteria: "The board memo is executive-appropriate — covers impact (revenue at risk), root cause, remediation timeline, and preventive measures in language a non-technical board understands"
    weight: 0.20
    description: "Executive-appropriate board memo"
  - type: llm_judge
    criteria: "Prevention systems are comprehensive — technical controls (domain isolation, sending limits, approval workflows), organizational changes (training, oversight), and monitoring (automated alerts, regular audits)"
    weight: 0.20
    description: "Comprehensive prevention systems"
