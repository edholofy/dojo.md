meta:
  id: algorithm-optimization
  level: 5
  course: cold-email-b2b
  type: output
  description: "Optimize cold emails for email provider algorithms"
  tags: [cold-email, algorithm, gmail, outlook, deliverability, advanced]

state: {}

trigger: |
  Design a cold email strategy optimized for how Gmail and Outlook's
  spam filtering algorithms actually work in 2026.

  Context: Both Google and Microsoft have significantly tightened their
  spam filtering since 2024. Your deliverability has been declining
  despite good list hygiene. You need to understand and optimize for
  the algorithms.

  Current metrics:
  - Gmail recipients (60% of list): 68% inbox placement (was 85%)
  - Outlook/O365 recipients (30%): 55% inbox placement (was 78%)
  - Other (10%): 82% inbox placement

  Research and address:

  1. GMAIL ALGORITHM FACTORS (2025-2026)
  - Sender reputation signals Gmail uses
  - Content analysis patterns (what triggers filtering)
  - Engagement signals that help or hurt
  - The role of BIMI (Brand Indicators for Message Identification)
  - Google's new "one-click unsubscribe" enforcement

  2. OUTLOOK/O365 ALGORITHM FACTORS (2025-2026)
  - Microsoft's SmartScreen filter behavior
  - How O365 handles B2B cold email differently than consumer Outlook
  - The EOP (Exchange Online Protection) scoring system
  - Why Outlook is harder for cold email than Gmail

  3. TACTICAL OPTIMIZATIONS
  - Email content patterns that avoid both filters
  - HTML vs. plain text analysis
  - Link and image optimization
  - Sending pattern analysis (volume, timing, consistency)
  - Write an example email optimized for both algorithms

  4. TESTING FRAMEWORK
  - How to seed-test inbox placement before every campaign
  - Tools for monitoring algorithm changes
  - How to A/B test deliverability (not just content)

assertions:
  - type: llm_judge
    criteria: "Gmail algorithm factors are accurately described — sender reputation based on domain age, engagement history, authentication (SPF/DKIM/DMARC), and the one-click unsubscribe enforcement"
    weight: 0.25
    description: "Accurate Gmail algorithm description"
  - type: llm_judge
    criteria: "Outlook/O365 challenges are specifically addressed — SmartScreen filtering, EOP scoring, the distinction between consumer and business O365, and why B2B cold email struggles on Microsoft"
    weight: 0.25
    description: "Specific Outlook/O365 challenge analysis"
  - type: llm_judge
    criteria: "Tactical optimizations are specific enough to implement — not just 'avoid spam words' but specific HTML-to-text ratios, link count limits, image handling, and sending patterns that work"
    weight: 0.25
    description: "Implementable tactical optimizations"
  - type: llm_judge
    criteria: "The testing framework uses real tools — seed testing with GlockApps or Mail-Tester, monitoring via Google Postmaster Tools, and a systematic pre-campaign testing workflow"
    weight: 0.25
    description: "Real-tool testing framework"
