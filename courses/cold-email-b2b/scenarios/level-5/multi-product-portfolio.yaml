meta:
  id: multi-product-portfolio
  level: 5
  course: cold-email-b2b
  type: output
  description: "Manage cold email across a multi-product portfolio"
  tags: [cold-email, multi-product, portfolio, strategy, coordination]

state: {}

trigger: |
  You're Head of Sales Development at a company with 4 different products
  that often target the same companies. Design a coordinated cold email
  strategy that prevents chaos.

  Products:
  1. "SecureID" — identity management ($5K/year) → Target: CISO
  2. "CloudOps" — infrastructure monitoring ($12K/year) → Target: VP Eng
  3. "DataFlow" — data pipeline tool ($8K/year) → Target: Head of Data
  4. "DevKit" — developer platform ($3K/year) → Target: Engineering Manager

  The problem:
  - All 4 product teams want to cold email the same 5,000 target companies
  - Without coordination, a company gets 4 separate cold outreach sequences
     simultaneously from the same brand
  - This has already caused complaints and damaged brand reputation
  - Some companies are good fits for multiple products

  Design:
  1. ACCOUNT COORDINATION SYSTEM
  - How to prevent multiple products from bombarding the same company
  - Account ownership rules (which product "owns" which account)
  - Cooling periods between different product touches

  2. MULTI-PRODUCT SEQUENCING
  - When to lead with one product and cross-sell others later
  - How to identify which product a company needs most (signal mapping)
  - Write a "platform intro" email that covers all 4 products
  - Write a single-product email for SecureID

  3. CROSS-SELL VIA COLD EMAIL
  - How to cold email a different buyer at a company where one product
     is already being evaluated
  - Referencing internal champions without being presumptuous
  - Write the cross-sell email from DataFlow to a company evaluating SecureID

  4. GOVERNANCE
  - Approval workflow for overlapping accounts
  - Escalation process for conflicts between product teams
  - Metrics that incentivize collaboration, not competition

assertions:
  - type: llm_judge
    criteria: "The coordination system prevents bombarding — clear account ownership rules, cooling periods between product touches, and a centralized system for managing overlapping targets"
    weight: 0.25
    description: "Effective coordination preventing bombarding"
  - type: llm_judge
    criteria: "Signal mapping determines product priority — specific data points (CISO hiring = SecureID, cloud spend increase = CloudOps) determine which product leads for each account"
    weight: 0.25
    description: "Signal-based product priority mapping"
  - type: llm_judge
    criteria: "The cross-sell email is contextual and helpful — it references the existing SecureID evaluation naturally, positioning DataFlow as a complement rather than an unrelated pitch"
    weight: 0.25
    description: "Contextual helpful cross-sell email"
  - type: llm_judge
    criteria: "Governance metrics incentivize collaboration — account-level revenue attribution, shared pipeline credit, and team-level metrics prevent internal competition for the same accounts"
    weight: 0.25
    description: "Collaboration-incentivizing governance"
