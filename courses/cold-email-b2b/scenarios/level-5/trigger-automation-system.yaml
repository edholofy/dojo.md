meta:
  id: trigger-automation-system
  level: 5
  course: cold-email-b2b
  type: output
  description: "Design a real-time trigger-based outreach automation system"
  tags: [cold-email, automation, triggers, real-time, system]

state: {}

trigger: |
  Design a real-time trigger-based outreach automation system that sends
  the right email to the right person at the exact right moment.

  Product: "AWS" (fictional scenario) — cloud computing services
  ($10K-$1M+/year contracts)
  Target: CTOs and VP Engineering at companies with 50-5000 employees

  Available trigger sources:
  1. Job postings (company hiring cloud engineers = growth signal)
  2. Funding announcements (Series A/B = infrastructure investment)
  3. Technology changes (adopting Kubernetes, migrating from on-premise)
  4. Competitor churn signals (cancellation reviews, support complaints)
  5. Content consumption (downloading cloud migration whitepapers)
  6. Social signals (CTO posts about scaling challenges on LinkedIn)
  7. Financial signals (quarterly earnings mentioning "cloud investment")
  8. Leadership changes (new CTO hired from a cloud-native company)

  Design:
  1. TRIGGER DETECTION PIPELINE
  - How to monitor each trigger source in real-time
  - Tools and APIs needed
  - Data processing workflow (raw signal → qualified trigger → outreach)

  2. TRIGGER-TO-EMAIL MAPPING
  - Which email template fires for each trigger
  - Write 4 trigger-specific emails (one per your strongest trigger)
  - Timing: how quickly each trigger type should be acted on

  3. AUTOMATION ARCHITECTURE
  - System diagram showing data flow from trigger to sent email
  - Quality gates (human review points)
  - Deduplication logic (what if a company fires multiple triggers)
  - Rate limiting (max touches per account per month)

  4. MEASUREMENT
  - How to measure if trigger-based outreach outperforms regular cadence
  - A/B test design: triggered vs. scheduled sends
  - Expected performance differential

assertions:
  - type: llm_judge
    criteria: "The trigger detection pipeline is technically feasible — monitoring sources, tools, and APIs are real and implementable, not theoretical. Shows understanding of data engineering"
    weight: 0.25
    description: "Technically feasible trigger pipeline"
  - type: llm_judge
    criteria: "The 4 trigger-specific emails are genuinely different — each references the specific trigger naturally and creates urgency appropriate to the signal (funding = fast, hiring = moderate)"
    weight: 0.25
    description: "Genuinely trigger-specific emails"
  - type: llm_judge
    criteria: "The automation architecture includes necessary safeguards — human review gates, deduplication to prevent multiple emails from overlapping triggers, and rate limiting per account"
    weight: 0.25
    description: "Safeguarded automation architecture"
  - type: llm_judge
    criteria: "The measurement approach is scientifically valid — triggered vs. scheduled A/B test design with proper holdout groups, controlling for signal strength, and expected performance uplift"
    weight: 0.25
    description: "Scientifically valid measurement approach"
