meta:
  id: repeatable-scalable-system
  level: 5
  course: cold-email-b2b
  type: output
  description: "Build a repeatable, scalable cold email operating system"
  tags: [cold-email, operating-system, playbook, scalable, repeatable]

state: {}

trigger: |
  You've been hired as VP of Growth at a PE-backed company that just
  acquired 3 different SaaS companies. Each has its own ad-hoc cold
  email approach. Build a unified, repeatable cold email operating system.

  Acquired companies:
  1. "FormStack" — form building tool ($100/month, 50K customers)
     - Current: 1 SDR, sporadic cold email, no process
  2. "ChartMogul" — subscription analytics ($200/month, 20K customers)
     - Current: 2 SDRs, good process but not documented
  3. "Typeform" — survey tool ($50/month, 100K customers)
     - Current: 3 SDRs, aggressive cold email, deliverability issues

  PE firm expectations:
  - Unified outbound engine across all 3 products within 6 months
  - 40% reduction in cost-per-meeting through shared infrastructure
  - Pipeline contribution: $15M combined from cold email in Year 1
  - Monthly reporting to the PE operating partner

  Build the complete operating system:

  1. UNIFIED INFRASTRUCTURE
  - Shared technology stack vs. product-specific tools
  - Domain strategy across 3 brands
  - Centralized data and enrichment

  2. OPERATING PLAYBOOK
  - Standardized sequence frameworks adaptable per product
  - Quality standards and compliance requirements
  - SDR training curriculum (new hire → productive in X weeks)

  3. CROSS-PRODUCT INTELLIGENCE
  - How insights from one product's outreach improve the others
  - Shared ICP learnings and prospect data
  - Cross-sell pipeline between the 3 products

  4. MEASUREMENT FRAMEWORK
  - Unified KPIs across all 3 products
  - PE-ready dashboard specification
  - Monthly operating review agenda

  5. ORGANIZATIONAL DESIGN
  - Centralized SDR team vs. embedded per product (pros/cons, recommendation)
  - Management structure and reporting lines
  - Compensation design that incentivizes unified goals

assertions:
  - type: llm_judge
    criteria: "Infrastructure consolidation is specific — shared ESP, unified domain management strategy, centralized enrichment subscriptions with calculated savings vs. separate tools"
    weight: 0.20
    description: "Specific infrastructure consolidation plan"
  - type: llm_judge
    criteria: "The operating playbook is standardized yet flexible — core frameworks are shared but product-specific messaging, ICP criteria, and sequences are customizable within the system"
    weight: 0.20
    description: "Standardized yet flexible operating playbook"
  - type: llm_judge
    criteria: "Cross-product intelligence is actionable — specific examples of how a winning subject line for FormStack informs Typeform outreach, or how ICP insights transfer between products"
    weight: 0.20
    description: "Actionable cross-product intelligence"
  - type: llm_judge
    criteria: "The PE-ready dashboard has the right metrics — pipeline contribution, cost-per-meeting, CAC, unit economics, and trend lines that an operating partner can use for portfolio review"
    weight: 0.20
    description: "PE-ready dashboard specification"
  - type: llm_judge
    criteria: "Org design recommendation is well-reasoned — centralized vs. embedded is evaluated with specific pros/cons for a 3-product portfolio, with a clear recommendation and transition plan"
    weight: 0.20
    description: "Well-reasoned org design recommendation"
