meta:
  id: roi-modeling-forecasting
  level: 5
  course: cold-email-b2b
  type: output
  description: "Build an ROI model and forecast for cold email operations"
  tags: [cold-email, roi, forecasting, financial-modeling, mastery]

state: {}

trigger: |
  Build a comprehensive ROI model for a cold email program to justify
  continued investment to the board of directors.

  Current cold email program:
  - 8 SDRs, each sending 100 emails/day (16,000/month total)
  - Fully loaded SDR cost: $85K/year per SDR ($680K total)
  - Technology stack cost: $4,500/month ($54K/year)
  - Data/enrichment cost: $3,000/month ($36K/year)
  - Total annual investment: $770K

  Performance (last 12 months):
  - Emails sent: 192,000
  - Reply rate: 3.8% (7,296 replies)
  - Meeting rate: 0.9% (1,728 meetings)
  - Pipeline generated: $8.2M
  - Closed revenue: $2.1M (25.6% close rate on pipeline)
  - Average deal: $28K ARR

  Build:
  1. Current ROI calculation with full cost accounting
  2. Unit economics: cost per email, per reply, per meeting, per deal
  3. Comparison to other pipeline channels (paid ads, content, events)
  4. Forecast: what happens if you improve reply rate from 3.8% to 5.2%
     (through better targeting and personalization)
  5. Forecast: what happens if you add 4 more SDRs
  6. Sensitivity analysis: which variables have the biggest impact on ROI
  7. Board-ready executive summary (1 page)

assertions:
  - type: llm_judge
    criteria: "The ROI calculation is comprehensive — includes fully loaded SDR costs, technology, data, management overhead, and calculates true cost per dollar of revenue generated"
    weight: 0.20
    description: "Comprehensive ROI calculation"
  - type: llm_judge
    criteria: "Unit economics are precise — cost per email ($0.04), per reply ($0.11), per meeting ($0.45), per deal ($10.27) or similar precise calculations that show the funnel economics"
    weight: 0.20
    description: "Precise unit economics"
  - type: llm_judge
    criteria: "The sensitivity analysis identifies the highest-leverage variables — reply rate and close rate likely have the biggest impact on ROI, with specific modeling showing the dollar impact of each 1% improvement"
    weight: 0.20
    description: "Highest-leverage variable identification"
  - type: llm_judge
    criteria: "Channel comparison is fair — cold email is compared to paid ads, content marketing, and events on a cost-per-meeting and cost-per-deal basis, acknowledging strengths and weaknesses of each"
    weight: 0.20
    description: "Fair cross-channel comparison"
  - type: llm_judge
    criteria: "The executive summary is board-ready — one page, leads with ROI, includes key metrics and growth projections, and makes a clear ask (maintain, expand, or optimize the program)"
    weight: 0.20
    description: "Board-ready executive summary"
