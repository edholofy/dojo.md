meta:
  id: privacy-era-cold-email
  level: 5
  course: cold-email-b2b
  type: output
  description: "Future-proof cold email strategy for the privacy-first era"
  tags: [cold-email, privacy, future-proofing, strategy, compliance]

state: {}

trigger: |
  Design a cold email strategy that's future-proof for the privacy-first
  era. Multiple trends are converging to make traditional cold email
  harder:

  Trends to address:
  1. Apple Mail Privacy Protection hides opens (adopted by 50%+ of users)
  2. Google's spam filter updates require < 0.3% complaint rate
  3. GDPR enforcement is increasing (€2.9B in fines issued in 2025)
  4. US states are passing stricter privacy laws (12 new laws since 2024)
  5. AI-generated emails are being detected and filtered
  6. Buyer fatigue: average B2B buyer receives 120+ vendor emails/month
  7. Zero-click content: prospects can find everything without visiting sites
  8. Cookie deprecation reducing third-party tracking data

  Your product: "Salesforce" (fictional scenario) — CRM platform
  ($25-$300/user/month)
  Current cold email program: 50,000 emails/month, 3.2% reply rate
  SDR team: 12 people

  Design:
  1. How each trend specifically impacts cold email operations
  2. Tactical adaptations for each trend
  3. A "privacy-first" cold email framework that works without:
     - Open tracking (can't rely on it anymore)
     - Click tracking (diminishing reliability)
     - Third-party data enrichment (privacy risk)
  4. Alternative metrics to replace open rate and click rate
  5. How to build a permission-based pipeline alongside cold outreach
  6. A 2-year roadmap for evolving the cold email program
  7. Write a "privacy-first" cold email that works under all constraints

assertions:
  - type: llm_judge
    criteria: "Each trend's impact is specifically analyzed — not generic 'privacy is getting harder' but exactly how Apple MPP breaks open tracking, how AI detection works, and how buyer fatigue changes response patterns"
    weight: 0.25
    description: "Specific trend impact analysis"
  - type: llm_judge
    criteria: "Alternative metrics are practical — reply rate as primary metric, meeting-to-send ratio, pipeline per 1000 emails, and other metrics that don't rely on unreliable open/click tracking"
    weight: 0.25
    description: "Practical alternative metrics"
  - type: llm_judge
    criteria: "The 2-year roadmap shows progressive adaptation — Year 1 shifts metrics and reduces third-party data dependence, Year 2 builds permission-based channels alongside outbound"
    weight: 0.25
    description: "Progressive 2-year adaptation roadmap"
  - type: llm_judge
    criteria: "The privacy-first email is genuinely effective — works without tracking, feels human (not AI-generated), provides value, and includes proper compliance elements"
    weight: 0.25
    description: "Effective privacy-first email example"
