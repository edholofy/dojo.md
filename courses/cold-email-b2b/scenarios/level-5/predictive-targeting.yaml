meta:
  id: predictive-targeting
  level: 5
  course: cold-email-b2b
  type: output
  description: "Design a predictive targeting model for cold outreach"
  tags: [cold-email, predictive, machine-learning, targeting, advanced]

state: {}

trigger: |
  Design a predictive targeting model that identifies which prospects
  are most likely to convert from cold email.

  Company: "HubSpot" (fictional scenario) — CRM and marketing platform
  ($50-$3,200/month depending on tier)

  Historical data available (12 months):
  - 120,000 cold emails sent
  - 4,800 replies received (4% overall reply rate)
  - 960 meetings booked (0.8% meeting rate)
  - 192 deals closed (0.16% close rate, 20% of meetings)
  - Average deal: $14,400/year

  For each closed deal, you have:
  - Company size, industry, revenue, growth rate
  - Contact title, seniority, department
  - Technology stack (from BuiltWith)
  - Funding history (from Crunchbase)
  - Hiring velocity (from LinkedIn)
  - Website traffic trends (from SimilarWeb)
  - Email engagement (opens, clicks, replies across sequence)

  Design:
  1. FEATURE ENGINEERING
  - Which prospect attributes best predict conversion?
  - How to score each attribute (create a weighted model)
  - What data signals are most predictive at each funnel stage?

  2. LEAD SCORING MODEL
  - Scoring methodology (simple points-based to start, explain when ML is warranted)
  - Score thresholds: what score = Gold/Silver/Bronze prospect
  - How to validate the model (backtesting against historical data)

  3. APPLICATION TO OUTREACH
  - How scores change outreach strategy (messaging, cadence, channels)
  - How to route high-score leads to immediate human follow-up
  - When to override the model (edge cases)

  4. Write outreach emails for a 95-score prospect vs. a 40-score prospect
  5. Model maintenance: how to retrain as you get more data

assertions:
  - type: llm_judge
    criteria: "Feature engineering is thoughtful — identifies which attributes (like company growth rate + technology adoption + hiring velocity) are likely most predictive, with reasoning backed by sales intuition"
    weight: 0.25
    description: "Thoughtful predictive feature engineering"
  - type: llm_judge
    criteria: "The scoring model starts simple and can evolve — a points-based system with clear weights is practical for early-stage, with a path to ML when data volume justifies it"
    weight: 0.25
    description: "Pragmatic scoring model evolution"
  - type: llm_judge
    criteria: "The two emails (95-score vs. 40-score) are appropriately different — high-score gets deeper personalization and more aggressive CTA; low-score gets lighter touch with value-first approach"
    weight: 0.25
    description: "Score-appropriate email differentiation"
  - type: llm_judge
    criteria: "Model validation is rigorous — backtesting methodology is explained, overfitting risks are acknowledged, and holdout groups are recommended for ongoing validation"
    weight: 0.25
    description: "Rigorous model validation approach"
