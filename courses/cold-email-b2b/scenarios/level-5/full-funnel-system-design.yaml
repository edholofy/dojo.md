meta:
  id: full-funnel-system-design
  level: 5
  course: cold-email-b2b
  type: output
  description: "Design a complete cold email system from ICP to closed deal"
  tags: [cold-email, system-design, full-funnel, architecture, mastery]

state: {}

trigger: |
  You're building a cold email engine from scratch for a Series B SaaS
  company. Design the entire system.

  Company: "Segment" (fictional scenario) — customer data platform
  ($120/month to $120K/year depending on tier)
  Stage: Series B, $40M raised, 80 employees
  Current revenue: $8M ARR, targeting $20M
  Sales team: 1 Head of Sales, 4 AEs, 0 SDRs (you're building the SDR function)

  You need to design:

  1. SDR TEAM STRUCTURE
  - How many SDRs to hire (with productivity math)
  - Inbound vs. outbound split
  - SDR compensation and quota structure

  2. TECHNOLOGY STACK
  - Tools needed (prospecting, sequencing, CRM, enrichment, analytics)
  - Budget allocation across tools
  - Integration architecture (how tools talk to each other)

  3. PROSPECTING FRAMEWORK
  - ICP definition and tier structure
  - List building process and data sources
  - Monthly prospecting volume targets

  4. OUTREACH PLAYBOOK
  - Sequence templates per ICP tier
  - Personalization standards per tier
  - Multi-channel integration rules
  - Write one complete sequence for the highest-value tier

  5. MEASUREMENT & OPTIMIZATION
  - KPI framework (leading and lagging indicators)
  - SDR scorecard
  - Weekly optimization rhythm
  - Monthly retrospective process

  6. SCALING PLAN
  - How to go from 0 to $12M in pipeline from cold email in 12 months
  - Key hiring milestones
  - Technology evolution as you scale

assertions:
  - type: llm_judge
    criteria: "SDR hiring math is grounded in reality — number of SDRs derived from pipeline targets, average meeting rates, AE capacity, and close rates. The math works backward from the $20M ARR goal"
    weight: 0.20
    description: "Math-backed SDR hiring plan"
  - type: llm_judge
    criteria: "The technology stack is cohesive — tools are selected for integration capability, not just feature checklists. The architecture diagram shows how data flows from prospecting to CRM to analytics"
    weight: 0.20
    description: "Cohesive integrated technology stack"
  - type: llm_judge
    criteria: "The outreach playbook is detailed enough to hand to a new SDR — sequence templates, personalization guidelines, and multi-channel rules are specific and actionable"
    weight: 0.20
    description: "SDR-ready outreach playbook"
  - type: llm_judge
    criteria: "The KPI framework covers both activity metrics (emails sent, calls made) and outcome metrics (meetings booked, pipeline generated) with clear targets for each"
    weight: 0.20
    description: "Balanced activity and outcome KPIs"
  - type: llm_judge
    criteria: "The 12-month scaling plan has clear phases — crawl (months 1-3), walk (months 4-6), run (months 7-12) with specific milestones, hiring triggers, and technology upgrades at each phase"
    weight: 0.20
    description: "Phased 12-month scaling plan"
