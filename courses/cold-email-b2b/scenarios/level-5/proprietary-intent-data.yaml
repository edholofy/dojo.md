meta:
  id: proprietary-intent-data
  level: 5
  course: cold-email-b2b
  type: output
  description: "Build proprietary intent data for cold email targeting"
  tags: [cold-email, intent-data, proprietary, competitive-advantage, mastery]

state: {}

trigger: |
  Instead of relying on third-party intent data (Bombora, 6sense), design
  a system to build your own proprietary intent data for cold email targeting.

  Company: "Cloudflare" (fictional scenario) — web security and performance
  ($20/month to $200K+/year)
  Target: CTOs and VP Engineering at companies with significant web traffic

  Third-party intent data costs $2,500-$10,000/month and everyone has
  access to the same signals. Build something competitors can't buy.

  Design proprietary intent signals from:

  1. CONTENT-BASED SIGNALS
  - Blog content (200K monthly visitors) that indicates buying intent
  - Which blog topics correlate with highest conversion to sales?
  - How to track content consumption without cookies
  - Webinar/event registration patterns

  2. COMMUNITY-BASED SIGNALS
  - Open-source project contributions (Cloudflare Workers ecosystem)
  - Developer forum questions that indicate scaling challenges
  - GitHub activity indicating technology stack changes
  - Stack Overflow questions about web performance

  3. COMPETITIVE SIGNALS YOU CAN BUILD
  - Monitoring competitor customer reviews for churn signals
  - Job posting analysis (what companies are hiring security engineers?)
  - Technology migration patterns (detected via DNS/header analysis)
  - Website performance monitoring (slow sites = opportunity)

  4. SYNTHESIS
  - How to combine signals into a proprietary scoring model
  - Data pipeline architecture
  - How this outperforms purchased intent data (with ROI comparison)
  - Write 3 cold emails triggered by proprietary signals

  5. MOAT ANALYSIS
  - Why competitors can't easily replicate this data advantage
  - How the data gets better over time (network effects)
  - Ethical and legal considerations of building proprietary signals

assertions:
  - type: llm_judge
    criteria: "Content-based signals are creative and defensible — specific blog topics correlated with buying intent, content consumption scoring without cookies, and webinar attendance patterns"
    weight: 0.25
    description: "Creative defensible content signals"
  - type: llm_judge
    criteria: "Community signals leverage unique company assets — open-source ecosystem activity, developer forum patterns, and GitHub signals that only a company with Cloudflare's community can access"
    weight: 0.25
    description: "Unique community-based signals"
  - type: llm_judge
    criteria: "The 3 trigger-specific emails demonstrate the advantage — each email is informed by a proprietary signal that competitors using Bombora wouldn't have, making outreach more relevant and timely"
    weight: 0.25
    description: "Proprietary-signal-powered emails"
  - type: llm_judge
    criteria: "The moat analysis is compelling — explains why this data advantage compounds over time and can't be purchased by competitors, creating a sustainable competitive edge in outreach"
    weight: 0.25
    description: "Compelling competitive moat analysis"
