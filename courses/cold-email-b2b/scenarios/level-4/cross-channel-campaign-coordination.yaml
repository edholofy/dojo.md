meta:
  id: cross-channel-campaign-coordination
  level: 4
  course: cold-email-b2b
  type: output
  description: "Design cross-channel coordination between email, LinkedIn, and events"
  tags: [cold-email, cross-channel, linkedin, events, coordination]

state: {}

trigger: |
  Design a cross-channel outreach strategy for "Snowflake" (fictional
  scenario) — a cloud data platform ($50K+ annual contracts) targeting
  100 named enterprise accounts.

  Channels:
  - Cold email (primary)
  - LinkedIn (Sales Navigator + InMail)
  - Conference attendance (attending 2 industry conferences in next 3 months)
  - Direct mail (can send physical items to 20 high-value targets)
  - Webinar (hosting a quarterly data strategy webinar)

  Target accounts:
  - Tier 1 (20 accounts): Fortune 500, $5B+ revenue, known data challenges
  - Tier 2 (30 accounts): Enterprise, $500M-$5B, growing data teams
  - Tier 3 (50 accounts): Mid-market, $100M-$500M, early cloud adoption

  Design:
  1. Channel allocation by tier (which channels for which tier)
  2. 90-day cross-channel orchestration calendar
  3. Write the email + LinkedIn InMail for Tier 1 (different messaging)
  4. How conference attendance integrates with outreach
     (pre-event, during-event, post-event emails)
  5. Direct mail strategy for Tier 1 (what to send, when, and how
     it connects to the digital touchpoints)
  6. Measurement: how to attribute pipeline to each channel

assertions:
  - type: llm_judge
    criteria: "Channel allocation matches account value — Tier 1 gets all channels (email + LinkedIn + direct mail + conference), Tier 2 gets email + LinkedIn, Tier 3 gets primarily email with scalable touches"
    weight: 0.25
    description: "Value-aligned channel allocation"
  - type: llm_judge
    criteria: "The 90-day calendar shows coordinated touchpoints — channels reinforce each other rather than competing, with clear sequencing (LinkedIn before email, direct mail before conference, etc.)"
    weight: 0.25
    description: "Coordinated 90-day channel calendar"
  - type: llm_judge
    criteria: "Conference integration is well-planned — pre-event outreach to book meetings, during-event follow-up, and post-event nurture that references specific sessions or conversations"
    weight: 0.25
    description: "Well-planned conference integration"
  - type: llm_judge
    criteria: "Multi-touch attribution is addressed — clear framework for tracking which channel influenced which deal, acknowledging the complexity of multi-touch enterprise sales"
    weight: 0.25
    description: "Multi-touch attribution framework"
