meta:
  id: reputation-management
  level: 4
  course: cold-email-b2b
  type: output
  description: "Design a proactive sender reputation management system"
  tags: [cold-email, reputation, monitoring, infrastructure, advanced]

state: {}

trigger: |
  Design a proactive sender reputation management system for a company
  that sends 50,000 cold emails per month across 5 domains and 20 mailboxes.

  Current infrastructure:
  - 5 sending domains (all subdomains of the main brand)
  - 4 mailboxes per domain (20 total)
  - 4 SDRs, each using 5 mailboxes
  - ESP: Instantly.io + Smartlead.ai
  - Average daily send per mailbox: 50-75 emails
  - Current deliverability: 78% inbox placement (needs to be 85%+)

  Design:
  1. MONITORING DASHBOARD
  - What metrics to track per domain, per mailbox, and overall
  - Alert thresholds for each metric
  - Daily, weekly, and monthly review cadences

  2. DOMAIN ROTATION STRATEGY
  - When to rest a domain
  - When to retire and replace a domain
  - Domain naming conventions and how to avoid pattern detection
  - How to maintain domain diversity

  3. MAILBOX HEALTH PROTOCOL
  - Per-mailbox sending limits
  - Warm-up and cool-down procedures
  - Signs a mailbox is compromised
  - Mailbox rotation schedule

  4. EMERGENCY PROTOCOLS
  - What to do when a domain gets listed on a blacklist
  - What to do when inbox placement drops below 60%
  - Escalation procedures
  - Communication template for the sales team

  5. PROACTIVE REPUTATION BUILDING
  - Strategies to build positive sending signals
  - List hygiene automation
  - Content rotation to avoid spam filter patterns

assertions:
  - type: llm_judge
    criteria: "The monitoring dashboard covers the right metrics — deliverability rate, bounce rate, spam complaint rate, open rate by domain, reply rate, and blacklist status per domain"
    weight: 0.25
    description: "Comprehensive monitoring metrics"
  - type: llm_judge
    criteria: "Domain rotation strategy is specific — rest periods (e.g., 1 week off after 3 weeks on), retirement triggers, and naming conventions that avoid ISP pattern detection"
    weight: 0.25
    description: "Specific domain rotation strategy"
  - type: llm_judge
    criteria: "Emergency protocols are actionable — not just 'investigate the issue' but specific steps (pause sending, run diagnostics, submit blacklist removal, switch to backup domain)"
    weight: 0.25
    description: "Actionable emergency protocols"
  - type: llm_judge
    criteria: "Proactive reputation building goes beyond basics — content fingerprint rotation, positive engagement seeding, and automated list hygiene that runs before every campaign"
    weight: 0.25
    description: "Advanced proactive reputation strategies"
