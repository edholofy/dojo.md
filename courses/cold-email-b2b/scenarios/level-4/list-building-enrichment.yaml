meta:
  id: list-building-enrichment
  level: 4
  course: cold-email-b2b
  type: output
  description: "Design a prospect list building and enrichment strategy"
  tags: [cold-email, list-building, enrichment, data, prospecting]

state: {}

trigger: |
  Design a prospect list building and enrichment strategy from scratch
  for a new cold email program.

  Product: "Stripe" (fictional scenario) — payment processing for online
  businesses (2.9% + $0.30 per transaction)
  Target: Founders and CTOs at e-commerce startups that are currently
  using PayPal or Square and doing $50K-$500K monthly transaction volume

  Goal: Build a list of 10,000 qualified prospects in 30 days

  Available tools and budgets:
  - LinkedIn Sales Navigator ($100/month)
  - Apollo.io ($99/month)
  - ZoomInfo ($500/month trial)
  - BuiltWith ($299/month) — technographic data
  - Hunter.io ($49/month) — email finding
  - Clearbit ($99/month) — company enrichment
  - Total data budget: $1,200/month

  Design:
  1. Tool selection — which tools to use for what (not all are needed)
  2. ICP-to-list translation — how to turn ICP criteria into search filters
  3. Multi-source list building workflow (step by step)
  4. Enrichment pipeline — what data to add to each contact and how
  5. Verification and cleaning process
  6. Data maintenance plan (how to keep the list fresh)
  7. Expected list quality metrics at each stage
  8. Cost analysis — cost per verified, enriched contact

assertions:
  - type: llm_judge
    criteria: "Tool selection is strategic — not all tools are recommended, with clear reasoning for which tools provide the best data for THIS specific ICP (BuiltWith for tech stack identification is key)"
    weight: 0.25
    description: "Strategic tool selection with reasoning"
  - type: llm_judge
    criteria: "ICP-to-filter translation is specific — shows exactly which LinkedIn Sales Navigator filters, Apollo.io criteria, or BuiltWith technology filters identify companies using PayPal/Square"
    weight: 0.25
    description: "Specific ICP-to-filter translation"
  - type: llm_judge
    criteria: "The enrichment pipeline adds genuine value — beyond basic contact info, it adds tech stack, company revenue signals, funding stage, and recent growth indicators that inform email personalization"
    weight: 0.25
    description: "Genuinely valuable enrichment pipeline"
  - type: llm_judge
    criteria: "Cost per contact is calculated — total monthly tool cost divided by expected verified contacts, with realistic expectations for match rates and verification pass rates at each stage"
    weight: 0.25
    description: "Calculated cost per verified contact"
