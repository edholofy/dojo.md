meta:
  id: regulatory-edge-cases
  level: 4
  course: cold-email-b2b
  type: output
  description: "Handle regulatory edge cases in multi-jurisdiction cold email"
  tags: [cold-email, regulatory, compliance, multi-jurisdiction, legal]

state: {}

trigger: |
  You're launching global cold email outreach for a cybersecurity
  product ($200/month). Your list has contacts across 6 jurisdictions,
  each with different cold email regulations.

  Jurisdictions:
  1. United States — CAN-SPAM (opt-out model)
  2. European Union — GDPR + ePrivacy Directive (opt-in for most)
  3. United Kingdom — UK GDPR + PECR (post-Brexit, similar to EU)
  4. Canada — CASL (explicit or implied consent required)
  5. Australia — Spam Act 2003 (consent required, inferred consent for B2B)
  6. Brazil — LGPD (legitimate interest basis possible for B2B)

  For each jurisdiction:
  1. Can you legally send cold B2B emails? (Yes/No/It depends)
  2. What legal basis applies?
  3. What must be included in the email?
  4. What are the penalties for non-compliance?
  5. Write the jurisdiction-specific footer/disclaimer text

  Then:
  6. Design a "universal" cold email template that's compliant in ALL
     6 jurisdictions simultaneously
  7. Identify which jurisdictions are impossible to cover with a single
     template and need separate versions
  8. Risk assessment: rank jurisdictions from most to least risky for
     cold outreach

assertions:
  - type: llm_judge
    criteria: "Each jurisdiction is accurately assessed — CAN-SPAM's opt-out model, GDPR's legitimate interest basis for B2B, CASL's implied consent rules, and Australian inferred consent are correctly described"
    weight: 0.25
    description: "Accurate jurisdiction assessments"
  - type: llm_judge
    criteria: "The universal template is genuinely compliant everywhere — includes opt-out mechanism, physical address, sender identity, privacy policy link, and legitimate interest statement"
    weight: 0.25
    description: "Genuinely universally compliant template"
  - type: llm_judge
    criteria: "Penalty information is specific — actual fine amounts or ranges per jurisdiction, not just 'there are penalties.' GDPR's 4% of global revenue, CASL's $10M per violation, etc."
    weight: 0.25
    description: "Specific penalty information"
  - type: llm_judge
    criteria: "The risk ranking is nuanced — considers both penalty severity and enforcement likelihood. Canada (CASL) is often ranked most risky due to active enforcement, while some jurisdictions have high penalties but low enforcement"
    weight: 0.25
    description: "Nuanced risk ranking"
