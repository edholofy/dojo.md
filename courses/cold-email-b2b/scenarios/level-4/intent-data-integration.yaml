meta:
  id: intent-data-integration
  level: 4
  course: cold-email-b2b
  type: output
  description: "Integrate intent data into cold email strategy"
  tags: [cold-email, intent-data, buyer-signals, advanced]

state: {}

trigger: |
  You've just subscribed to Bombora intent data for your cold email
  program. Design how to integrate it into your outreach workflow.

  Product: "Okta" (fictional scenario) — identity management platform
  ($5/user/month for SSO, enterprise pricing for full suite)
  Target: IT Directors and CISOs at companies with 500+ employees
  Current list: 12,000 prospects (2% reply rate without intent data)

  Bombora data available:
  - Company Surge scores (0-100) showing which companies are actively
    researching identity management topics
  - Topic clusters: SSO, MFA, zero trust, IAM, compliance
  - Weekly updates on surging companies
  - Historical trend data (is interest rising or falling)

  This week's data shows:
  - 180 companies surging on "SSO" topics (score 70+)
  - 95 companies surging on "zero trust" topics (score 80+)
  - 45 companies surging on both SSO AND zero trust (highest intent)
  - 12 of those 45 are already on your prospect list

  Design:
  1. How to score and prioritize prospects using intent data
  2. Different email messaging for each intent cluster
  3. Write emails for: SSO-surging company, zero-trust-surging company,
     and dual-surging company
  4. How to combine intent data with other signals (hiring, funding, tech stack)
  5. ROI model: what improvement in reply/meeting rates justifies the
     Bombora subscription cost ($2,500/month)

assertions:
  - type: llm_judge
    criteria: "The scoring model combines intent with other data — not just Bombora score alone but layered with company size, role match, tech stack, and other signals for a composite score"
    weight: 0.25
    description: "Composite intent scoring model"
  - type: llm_judge
    criteria: "The three emails reference the intent topic naturally — SSO email talks about identity sprawl, zero trust email talks about security posture, dual-surge email talks about comprehensive IAM strategy"
    weight: 0.25
    description: "Intent-topic-aligned email messaging"
  - type: llm_judge
    criteria: "The emails don't reveal that you're using intent data — no 'we noticed you're researching...' which feels creepy. Instead, the messaging aligns with their interest organically"
    weight: 0.25
    description: "Non-creepy intent data usage"
  - type: llm_judge
    criteria: "The ROI model is quantified — at $2,500/month, specific improvement in reply rates (e.g., 2% to 6%) and meetings per month needed to justify the investment based on deal size"
    weight: 0.25
    description: "Quantified intent data ROI model"
