meta:
  id: saas-vs-services-strategy
  level: 4
  course: cold-email-b2b
  type: output
  description: "Compare cold email strategies for SaaS vs professional services"
  tags: [cold-email, saas, services, strategy-comparison, advanced]

state: {}

trigger: |
  Design parallel cold email strategies for two different business models
  selling to the same buyer persona. Show how the business model fundamentally
  changes the outreach approach.

  Buyer persona: CFOs at mid-market companies ($20M-$200M revenue)

  Business A — SaaS:
  "ForecastIQ" — AI financial forecasting software ($499/month)
  - Self-serve trial available
  - 14-day free trial
  - Average deal close: 21 days
  - Average contract: $6,000/year

  Business B — Professional services:
  "Meridian Advisors" — fractional CFO consulting firm ($15K/month)
  - Requires discovery call to scope engagement
  - Proposal process: 2-3 weeks
  - Average engagement: 6 months ($90K)

  For each business:
  1. Write a 4-email cold sequence
  2. Define the ideal CTA (very different for each)
  3. Explain how the sales cycle length affects sequence design
  4. Show how social proof differs (SaaS: logos/metrics vs. Services: relationships/outcomes)
  5. Handle the most common objection for each

  Then:
  6. Compare the two strategies side-by-side — what fundamentally changes?
  7. What mistakes happen when people use a SaaS playbook for services (or vice versa)?

assertions:
  - type: llm_judge
    criteria: "SaaS sequences drive to low-friction CTAs (free trial, demo) while services sequences drive to high-value conversations (discovery call, consultation). The CTA strategy is fundamentally different"
    weight: 0.25
    description: "Fundamentally different CTA strategies"
  - type: llm_judge
    criteria: "Social proof is adapted correctly — SaaS uses logos, user counts, and metrics; services use specific client outcomes, named relationships, and thought leadership credibility"
    weight: 0.25
    description: "Correctly adapted social proof types"
  - type: llm_judge
    criteria: "The side-by-side comparison reveals non-obvious differences — not just 'services takes longer' but differences in trust-building, authority positioning, and the role of content"
    weight: 0.25
    description: "Non-obvious strategic differences revealed"
  - type: llm_judge
    criteria: "Common crossover mistakes are specific — like services companies using 'free trial' language or SaaS companies writing long thought-leadership emails instead of driving to product"
    weight: 0.25
    description: "Specific crossover mistakes identified"
