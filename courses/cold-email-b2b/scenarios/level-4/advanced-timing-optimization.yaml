meta:
  id: advanced-timing-optimization
  level: 4
  course: cold-email-b2b
  type: output
  description: "Optimize cold email send timing using data analysis"
  tags: [cold-email, timing, optimization, data-analysis, advanced]

state: {}

trigger: |
  Analyze 6 months of cold email data and design an optimized send
  timing strategy.

  Historical data (30,000 emails sent over 6 months):

  | Day      | Sent  | Opens | Replies | Meetings |
  |----------|-------|-------|---------|----------|
  | Monday   | 5,200 | 1,248 | 156     | 21       |
  | Tuesday  | 5,800 | 1,624 | 232     | 38       |
  | Wednesday| 5,600 | 1,512 | 209     | 31       |
  | Thursday | 5,400 | 1,350 | 189     | 28       |
  | Friday   | 4,800 | 912   | 96      | 12       |
  | Saturday | 1,600 | 192   | 16      | 2        |
  | Sunday   | 1,600 | 176   | 24      | 5        |

  | Time Slot   | Sent  | Opens | Replies | Meetings |
  |-------------|-------|-------|---------|----------|
  | 6-8 AM      | 3,000 | 840   | 120     | 22       |
  | 8-10 AM     | 8,000 | 2,400 | 360     | 58       |
  | 10 AM-12 PM | 7,000 | 1,820 | 224     | 32       |
  | 12-2 PM     | 5,000 | 1,100 | 110     | 14       |
  | 2-4 PM      | 4,000 | 720   | 80      | 8        |
  | 4-6 PM      | 3,000 | 540   | 54      | 6        |

  Additional data:
  - C-level prospects open earlier (6-8 AM peak)
  - Mid-level managers open 9-11 AM
  - Replies peak 15-60 minutes after open
  - Time zone breakdown: 50% EST, 25% CST, 15% PST, 10% international

  Analyze this data and provide:
  1. Optimal send time by day and hour (with math showing your reasoning)
  2. Role-based timing recommendations
  3. Time zone handling strategy
  4. Weekend sending analysis (is it worth it?)
  5. A weekly sending calendar with specific time slots
  6. How to A/B test timing improvements going forward

assertions:
  - type: llm_judge
    criteria: "The analysis uses the actual data — conversion rates are calculated (replies/sent, meetings/replies) not just raw numbers. Tuesday 8-10 AM should emerge as the strongest slot"
    weight: 0.25
    description: "Data-driven analysis with calculated rates"
  - type: llm_judge
    criteria: "Role-based timing is data-supported — the C-level early morning pattern and mid-level mid-morning pattern are used to create distinct sending schedules per prospect role"
    weight: 0.25
    description: "Data-supported role-based timing"
  - type: llm_judge
    criteria: "The weekly calendar is specific and actionable — exact time slots per day, adjusted for time zones, with specific volumes allocated to each slot"
    weight: 0.25
    description: "Specific actionable weekly calendar"
  - type: llm_judge
    criteria: "Weekend analysis is nuanced — Sunday has a surprisingly high reply-to-open ratio (24/176 = 13.6% vs. Tuesday's 14.3%) which suggests Sunday senders face less competition, worth testing"
    weight: 0.25
    description: "Nuanced weekend timing analysis"
