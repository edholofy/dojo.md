meta:
  id: competitive-intelligence-outreach
  level: 4
  course: cold-email-b2b
  type: output
  description: "Use competitive intelligence to craft cold emails"
  tags: [cold-email, competitive-intelligence, displacement, strategy]

state: {}

trigger: |
  Use competitive intelligence to craft targeted displacement campaigns
  (getting prospects to switch from a competitor to your product).

  Your product: "Intercom" (fictional scenario) — customer messaging
  platform ($89/month starter, enterprise custom)

  Target competitors and their known weaknesses:
  1. Zendesk users (12,000 on your list)
     - Known weakness: complex setup, expensive at scale, poor chat UX
     - G2 complaints: "Overcomplicated for what we need"
     - Recent: raised prices 15% in January

  2. Drift users (5,000 on your list)
     - Known weakness: expensive, chatbot-heavy approach frustrates buyers
     - G2 complaints: "Bots before humans doesn't work for us"
     - Recent: acquired by Salesloft, product direction uncertain

  3. Freshdesk users (8,000 on your list)
     - Known weakness: basic analytics, limited automation
     - G2 complaints: "Outgrew it as we scaled"
     - Recent: no major updates in 6 months

  For each competitor segment:
  1. Write a targeted cold email that addresses their specific pain
     (without mentioning the competitor by name in the email)
  2. Write a version that DOES reference the competitor directly
     (for comparison landing pages)
  3. Define the trigger events that signal a company is ready to switch
  4. Ethical guidelines: what's fair game vs. what crosses the line

assertions:
  - type: llm_judge
    criteria: "The 'no name' versions address competitor weaknesses without naming them — 'if your current tool feels overly complex' rather than 'Zendesk is too complicated'"
    weight: 0.25
    description: "Subtle competitor-aware messaging"
  - type: llm_judge
    criteria: "The 'named' versions are factual and fair — they reference real weaknesses (pricing, complexity) without being dishonest or disparaging. Comparison is professional"
    weight: 0.25
    description: "Factual professional competitor naming"
  - type: llm_judge
    criteria: "Switching triggers are specific per competitor — Zendesk users triggered by price increases, Drift users by acquisition uncertainty, Freshdesk users by growth needs. Each is actionable"
    weight: 0.25
    description: "Competitor-specific switching triggers"
  - type: llm_judge
    criteria: "Ethical guidelines are clear — distinguishes between using public G2 reviews (fair) vs. accessing confidential competitor data (not fair), and addresses FTC guidelines on comparative advertising"
    weight: 0.25
    description: "Clear competitive ethics guidelines"
