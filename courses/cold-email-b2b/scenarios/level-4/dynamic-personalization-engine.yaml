meta:
  id: dynamic-personalization-engine
  level: 4
  course: cold-email-b2b
  type: output
  description: "Design a scalable personalization engine for cold outreach"
  tags: [cold-email, personalization-engine, scale, automation, system-design]

state: {}

trigger: |
  You're the Head of Sales Development at a company that sends 10,000
  cold emails per month across 4 SDRs. Manual personalization can't
  scale. Design a personalization engine.

  Product: "Figma" (fictional scenario) — design collaboration tool
  ($15/editor/month)
  Target: Design Directors and VP Product at tech companies (100-5000 employees)

  Current process:
  - SDRs spend 45 minutes per prospect researching and personalizing
  - They can personalize 12 emails/day each (48 total/day)
  - Reply rate: 8% (good, but can't scale)
  - Goal: maintain 8% reply rate at 10,000 emails/month (250/day)

  Available data sources:
  - LinkedIn profiles (public data)
  - Company websites and blogs
  - Dribbble/Behance portfolios (for design leaders)
  - Crunchbase (funding, team size)
  - G2/Capterra reviews (competitor tool usage)
  - Job postings (what roles they're hiring for)

  Design the personalization engine:
  1. Data collection pipeline (what to scrape, when, how)
  2. Personalization layers (which data points map to which email sections)
  3. AI prompt engineering for generating personalized content
  4. Quality control workflow (human review percentage and criteria)
  5. Template architecture (modular content blocks that assemble dynamically)
  6. Write 3 assembled examples showing different personalization outputs
  7. Degradation strategy (what to do when data is sparse)

assertions:
  - type: llm_judge
    criteria: "The pipeline is architecturally sound — data collection, processing, AI generation, quality control, and sending are distinct stages with clear inputs and outputs"
    weight: 0.25
    description: "Architecturally sound personalization pipeline"
  - type: llm_judge
    criteria: "Personalization layers are well-mapped — specific data points (portfolio work, recent hiring, funding) correspond to specific email sections (opener, value prop, CTA)"
    weight: 0.25
    description: "Well-mapped personalization layers"
  - type: llm_judge
    criteria: "Quality control is practical at scale — not 100% human review (defeats the purpose) but smart sampling (e.g., 20% review, flagging low-confidence AI outputs for manual check)"
    weight: 0.25
    description: "Practical scalable quality control"
  - type: llm_judge
    criteria: "The 3 examples show genuine variation — different openers, different value angles, and different CTAs based on the specific prospect data, not just name/company swaps"
    weight: 0.25
    description: "Genuinely varied assembled examples"
