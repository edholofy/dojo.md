meta:
  id: enterprise-deal-complexity
  level: 4
  course: cold-email-b2b
  type: output
  description: "Navigate complex enterprise procurement via cold email"
  tags: [cold-email, enterprise, procurement, complexity, strategy]

state: {}

trigger: |
  You're trying to land a $500K annual contract with a Fortune 500
  bank. The enterprise procurement process is brutally complex.
  Design a cold email strategy that navigates it.

  Product: "Palantir" (fictional scenario) — data analytics platform
  for financial services ($500K+/year)

  Target: JPMorgan Chase (fictional scenario)
  - 250,000 employees, $130B revenue
  - Known for: lengthy procurement, strict security requirements,
    regulatory compliance mandates

  Procurement reality:
  - 15+ stakeholders in buying decisions
  - Security review: 3-6 months
  - Legal review: 2-4 months
  - Procurement: 1-3 months
  - Budget approval: Q4 for next year
  - Total cycle: 12-18 months from first contact to signed contract
  - They receive 200+ vendor emails per week

  Key stakeholders to engage:
  1. Head of Data Analytics (champion, technical evaluator)
  2. CISO (security gate)
  3. Head of Compliance (regulatory gate)
  4. CFO's office (budget gate)
  5. Procurement lead (process gate)

  Design:
  1. 18-month outreach strategy with quarterly milestones
  2. Stakeholder engagement sequence (who, when, why)
  3. Write the initial cold email to the Head of Data Analytics
  4. Write the email to the CISO (when the champion refers you)
  5. How to navigate procurement without losing momentum
  6. Competitive defense (when other vendors are being evaluated)

assertions:
  - type: llm_judge
    criteria: "The 18-month strategy has clear quarterly milestones — Q1 for champion engagement, Q2 for technical validation, Q3 for security/compliance, Q4 for budget/procurement"
    weight: 0.25
    description: "Clear quarterly milestones"
  - type: llm_judge
    criteria: "The champion email is peer-level and technical — speaks to data analytics challenges in financial services, references specific regulatory data requirements, not generic software benefits"
    weight: 0.25
    description: "Technical peer-level champion email"
  - type: llm_judge
    criteria: "The CISO email addresses security proactively — leads with compliance certifications, data encryption, SOC 2, and specifically financial services security requirements"
    weight: 0.25
    description: "Security-forward CISO email"
  - type: llm_judge
    criteria: "Procurement navigation advice is practical — specific tactics for staying visible during long review cycles, maintaining champion engagement, and handling competitive evaluations"
    weight: 0.25
    description: "Practical procurement navigation"
