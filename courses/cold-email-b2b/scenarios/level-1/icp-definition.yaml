meta:
  id: icp-definition
  level: 1
  course: cold-email-b2b
  type: output
  description: "Define an Ideal Customer Profile for cold outreach"
  tags: [cold-email, icp, targeting, prospecting]

state: {}

trigger: |
  You're launching cold email outreach for "HireRight," a recruitment
  automation platform that helps companies screen and hire faster.

  Product info:
  - AI-powered resume screening (reduces time-to-hire by 40%)
  - Automated interview scheduling
  - Background check integration
  - Price: $2,000/month for teams hiring 10+ roles/month
  - Best for companies that are actively scaling

  Build a detailed Ideal Customer Profile (ICP) including:
  1. Firmographics (company size, revenue, industry, growth stage)
  2. Key decision-maker persona (title, responsibilities, pain points)
  3. Buying triggers (what events signal they need this NOW)
  4. Disqualifying criteria (who should NOT be contacted)
  5. Three example companies that fit the ICP (real or realistic)
  6. How each ICP element should inform the cold email messaging

assertions:
  - type: llm_judge
    criteria: "Firmographics are specific and justified — company size, revenue range, industries, and growth stage are defined with reasoning for why each parameter matters for HireRight"
    weight: 0.25
    description: "Specific justified firmographics"
  - type: llm_judge
    criteria: "The decision-maker persona is detailed — title, daily responsibilities, specific pain points, and what success looks like for them. It feels like a real person, not a demographic"
    weight: 0.25
    description: "Detailed decision-maker persona"
  - type: llm_judge
    criteria: "Buying triggers are actionable — specific events (funding rounds, hiring sprees, new leadership) that signal buying intent, not vague 'needs improvement'"
    weight: 0.25
    description: "Actionable buying triggers"
  - type: llm_judge
    criteria: "Each ICP element connects to messaging — the profile explains HOW each attribute changes what you'd say in the cold email, making it practical for outreach"
    weight: 0.25
    description: "ICP elements connected to messaging"
