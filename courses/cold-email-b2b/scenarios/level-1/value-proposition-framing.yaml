meta:
  id: value-proposition-framing
  level: 1
  course: cold-email-b2b
  type: output
  description: "Frame a product's value proposition for cold email"
  tags: [cold-email, value-proposition, messaging, framing]

state: {}

trigger: |
  You have a product with many features. Frame it as a compelling
  one-sentence value proposition for a cold email.

  Product: "SecureAudit" — a cybersecurity compliance platform
  Features:
  - Automated SOC 2 compliance monitoring
  - HIPAA audit trail generation
  - GDPR data mapping
  - Vulnerability scanning (1000+ checks)
  - Employee security training modules
  - Incident response playbooks
  - Third-party vendor risk assessments
  - Real-time compliance dashboards
  - Automated evidence collection
  - Auditor-ready report generation

  Write:
  1. Five different one-sentence value propositions (each under 25 words)
  2. For each, identify the angle: time-saving, cost-reduction,
     risk-reduction, competitive advantage, or simplification
  3. Identify which prospect role each VP would resonate with most
     (CTO, CISO, CFO, Head of Compliance, CEO)
  4. Write a cold email using your best value proposition

assertions:
  - type: llm_judge
    criteria: "All five value propositions are under 25 words and each takes a genuinely different angle — not five ways of saying 'we make compliance easier'"
    weight: 0.25
    description: "Five distinct concise value propositions"
  - type: llm_judge
    criteria: "The role matching is specific — each value proposition resonates with a different buyer persona based on their priorities (CTO cares about engineering time, CFO cares about audit costs, etc.)"
    weight: 0.25
    description: "Specific role-based resonance"
  - type: llm_judge
    criteria: "The 10-feature list is distilled, not dumped — the value propositions abstract away the features into outcomes that matter to the prospect"
    weight: 0.25
    description: "Features distilled to outcomes"
  - type: llm_judge
    criteria: "The final cold email effectively uses the chosen value proposition — it's woven naturally into the email, not just pasted in as a tagline"
    weight: 0.25
    description: "Value proposition naturally integrated in email"
