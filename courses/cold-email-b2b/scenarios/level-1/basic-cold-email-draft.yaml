meta:
  id: basic-cold-email-draft
  level: 1
  course: cold-email-b2b
  type: output
  description: "Write a basic cold email to a B2B prospect"
  tags: [cold-email, fundamentals, draft, b2b]

state: {}

trigger: |
  Write a cold email to a VP of Marketing at a mid-size e-commerce company
  (200 employees, $50M revenue).

  You're selling "LeadPulse," a lead scoring tool that helps marketing
  teams prioritize their best leads using behavioral data.

  Key product details:
  - Integrates with HubSpot, Salesforce, Marketo
  - Average customer sees 34% improvement in lead-to-close rate
  - Price: $499/month for teams up to 10
  - Free 14-day trial

  The prospect:
  - Name: Sarah Chen
  - Company: StyleVault (online fashion retailer)
  - Recent: Just hired 3 new SDRs (found on LinkedIn)

  Write one cold email. Keep it under 150 words.

assertions:
  - type: llm_judge
    criteria: "The email is under 150 words, uses short paragraphs, and is scannable on mobile — no walls of text or long sentences"
    weight: 0.25
    description: "Concise and scannable format"
  - type: llm_judge
    criteria: "The opening references something specific about Sarah or StyleVault — the new SDR hires, their growth, or their industry. Not a generic 'I came across your profile'"
    weight: 0.30
    description: "Specific personalized opening"
  - type: llm_judge
    criteria: "The value proposition focuses on Sarah's benefit (better lead conversion) not product features (integrations, behavioral data)"
    weight: 0.25
    description: "Benefit-focused value proposition"
  - type: llm_judge
    criteria: "The CTA is specific and low-friction — asks for one thing (a 15-minute call, a reply, etc.) rather than multiple options or a vague 'let's connect'"
    weight: 0.20
    description: "Single specific low-friction CTA"
