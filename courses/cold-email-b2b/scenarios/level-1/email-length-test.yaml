meta:
  id: email-length-test
  level: 1
  course: cold-email-b2b
  type: output
  description: "Write the same cold email in 3 different lengths"
  tags: [cold-email, length, format, optimization]

state: {}

trigger: |
  Write the same cold email pitch in 3 different lengths to test which
  performs best. You're selling "DataClean," a data quality tool for
  Salesforce ($99/month).

  Target: Sales Operations Managers at companies using Salesforce
  Key benefit: Automatically finds and merges duplicate records, saving
  10+ hours per week of manual data cleaning

  Write:
  1. Ultra-short version (under 50 words, 2-3 sentences)
  2. Standard version (75-125 words, 3-4 short paragraphs)
  3. Detailed version (150-200 words, includes a mini case study)

  For each version:
  - Include subject line and full email body
  - Explain what gets sacrificed and what gets gained at this length
  - Predict which prospect type responds best to this length

  Then recommend which version to use as the default and why.

assertions:
  - type: llm_judge
    criteria: "All three versions hit their word count targets — the ultra-short is truly under 50 words, the standard is 75-125, and the detailed is 150-200. Each feels complete at its length"
    weight: 0.25
    description: "Accurate word count targets"
  - type: llm_judge
    criteria: "The trade-off analysis is insightful — shorter versions sacrifice proof/credibility but gain readability; longer versions add evidence but risk losing attention. The analysis goes beyond obvious observations"
    weight: 0.25
    description: "Insightful length trade-off analysis"
  - type: llm_judge
    criteria: "Prospect type matching is logical — busy executives prefer ultra-short, mid-level managers accept standard, technical evaluators appreciate detailed. The reasoning is specific to sales ops personas"
    weight: 0.25
    description: "Logical prospect type matching"
  - type: llm_judge
    criteria: "The recommendation is well-reasoned — the default choice considers cold email benchmarks (shorter generally wins for first touch) with nuance about when to use longer formats"
    weight: 0.25
    description: "Well-reasoned default recommendation"
