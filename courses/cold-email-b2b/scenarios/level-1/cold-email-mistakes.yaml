meta:
  id: cold-email-mistakes
  level: 1
  course: cold-email-b2b
  type: output
  description: "Identify and fix mistakes in a cold email"
  tags: [cold-email, mistakes, diagnosis, rewrite]

state: {}

trigger: |
  This cold email is performing terribly (0.3% reply rate). Identify every
  mistake and rewrite it.

  ---
  Subject: AMAZING Opportunity For Your Business!!!
  Preview: Don't miss out on this incredible offer

  Dear Sir/Madam,

  My name is Jake from GrowthEngine, and we are the leading provider of
  AI-powered marketing automation solutions trusted by over 500 companies
  worldwide. Our revolutionary platform combines cutting-edge machine
  learning with intuitive user interfaces to deliver unprecedented results.

  We offer:
  - Email automation
  - Social media scheduling
  - Lead scoring
  - CRM integration
  - Analytics dashboards
  - A/B testing
  - Landing page builder
  - Chatbot creation
  - SMS marketing
  - Webinar hosting

  All of this for just $199/month! That's less than $7/day!

  I'd love to schedule a quick call to discuss how we can transform your
  marketing. Are you free Monday, Tuesday, or Wednesday of next week?
  Or would Thursday or Friday work better? We could also do a video call
  if that's easier. Or I could send you a demo video first?

  Looking forward to revolutionizing your marketing!

  Best regards,
  Jake Thompson
  Sales Representative
  GrowthEngine Inc.
  ---

  List every problem, then rewrite the email properly.

assertions:
  - type: llm_judge
    criteria: "At least 8 specific problems are identified — spam trigger subject line, generic greeting, self-focused opening, feature dump, no personalization, multiple CTAs, promotional language, and missing value proposition"
    weight: 0.30
    description: "Comprehensive problem identification"
  - type: llm_judge
    criteria: "The rewrite fixes ALL identified problems — personalized greeting, prospect-focused opening, benefit over features, single clear CTA, professional tone, and under 150 words"
    weight: 0.35
    description: "Rewrite fixes all problems"
  - type: llm_judge
    criteria: "The rewrite transforms the feature dump into 1-2 key benefits — focuses on what the prospect GETS, not what the product HAS"
    weight: 0.20
    description: "Feature dump to benefits transformation"
  - type: llm_judge
    criteria: "The explanation connects each fix to an email marketing principle — why each change improves reply rates, not just what changed"
    weight: 0.15
    description: "Fixes connected to principles"
