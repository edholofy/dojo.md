meta:
  id: simple-follow-up-sequence
  level: 1
  course: cold-email-b2b
  type: output
  description: "Write a 3-email cold outreach follow-up sequence"
  tags: [cold-email, sequence, follow-up, cadence]

state: {}

trigger: |
  Write a 3-email cold outreach sequence for "DocuSign" (fictional
  scenario) selling e-signature software to law firm partners.

  Product: E-signature platform, $25/user/month
  Target: Managing partners at law firms with 10-50 attorneys
  Key benefit: Reduces document turnaround from 5 days to 4 hours
  Social proof: Used by 1,200+ law firms

  Write all 3 emails with:
  - Email 1 (Day 0): Initial outreach
  - Email 2 (Day 3): Follow-up if no reply
  - Email 3 (Day 10): Breakup email

  For each email specify: subject line, body, and CTA.

  Each follow-up must add new value — not just "bumping this to the top
  of your inbox."

assertions:
  - type: llm_judge
    criteria: "Each email adds new value — Email 2 introduces a new angle (case study, stat, or insight) not mentioned in Email 1. Email 3 provides a final value-add, not just a guilt trip"
    weight: 0.30
    description: "Each email adds new value"
  - type: llm_judge
    criteria: "The timing makes sense — Day 0, Day 3, Day 10 spacing gives breathing room. The emails reference the passage of time naturally without being passive-aggressive"
    weight: 0.20
    description: "Natural timing references"
  - type: llm_judge
    criteria: "The breakup email is effective — it creates loss aversion or curiosity without being manipulative. The 'closing the loop' framing often gets the highest response rates"
    weight: 0.25
    description: "Effective breakup email"
  - type: llm_judge
    criteria: "All emails target law firm partners specifically — the language, pain points, and examples are legal industry-specific, not generic B2B messaging"
    weight: 0.25
    description: "Legal industry-specific messaging"
