meta:
  id: cta-variations
  level: 1
  course: cold-email-b2b
  type: output
  description: "Write different CTA variations for cold emails"
  tags: [cold-email, cta, call-to-action, conversion]

state: {}

trigger: |
  Write 8 different CTA (call-to-action) variations for a cold email
  selling "TeamPulse," an employee engagement survey tool ($5/employee/month)
  to HR Directors.

  For each CTA:
  1. Write the full closing paragraph + CTA (2-3 sentences max)
  2. Label the approach: direct ask, soft ask, value offer, curiosity,
     social proof, or permission-based
  3. Rate it: best for cold (first touch), warm (follow-up), or hot
     (showed interest) prospects
  4. Explain why this CTA works for its intended stage

  Then rank all 8 from most to least effective for a FIRST cold email
  and explain your ranking logic.

assertions:
  - type: llm_judge
    criteria: "All 8 CTAs are genuinely different approaches — not variations of 'would you be open to a call.' Each uses a distinct psychological trigger or framing"
    weight: 0.25
    description: "Eight genuinely different CTA approaches"
  - type: llm_judge
    criteria: "The stage matching is logical — direct asks are tagged for warmer prospects, softer asks for cold prospects. The reasoning shows understanding of prospect awareness stages"
    weight: 0.25
    description: "Logical stage matching"
  - type: llm_judge
    criteria: "The ranking for first cold emails prioritizes low-friction CTAs — permission-based and value-offer approaches ranked higher than direct meeting requests for cold outreach"
    weight: 0.25
    description: "Low-friction CTAs ranked higher for cold"
  - type: llm_judge
    criteria: "Each CTA is concise — 2-3 sentences maximum, and each asks for exactly one thing. No CTA offers multiple options or hedges with backup asks"
    weight: 0.25
    description: "Concise single-ask CTAs"
