meta:
  id: personalization-basics
  level: 1
  course: cold-email-b2b
  type: output
  description: "Personalize a cold email template for 3 different prospects"
  tags: [cold-email, personalization, merge-fields, fundamentals]

state: {}

trigger: |
  Here's a generic cold email template. Personalize it for 3 different
  prospects using the information provided.

  Generic template:
  "Hi [Name], I help companies like yours improve [outcome]. Would you
  be open to a quick chat?"

  Prospect 1:
  - Name: David Park, Head of Growth at Finley (fintech startup)
  - Company: 45 employees, Series A ($8M), launched 6 months ago
  - LinkedIn: Posted about struggling with CAC last week
  - Hiring: 2 growth marketing roles open

  Prospect 2:
  - Name: Rachel Torres, CMO at GreenLeaf (sustainable packaging)
  - Company: 200 employees, $30M revenue, B2B
  - Recent news: Just won "Most Innovative Packaging" award
  - LinkedIn: Shared article about sustainability in supply chains

  Prospect 3:
  - Name: James Liu, VP Sales at CloudFirst (enterprise SaaS)
  - Company: 500 employees, expanding to EMEA
  - Recent: Opened London office last month
  - LinkedIn: Commented about challenges of international sales hiring

  You're selling "OutreachPro," a sales engagement platform ($199/month).

  For each prospect, write a fully personalized email (not just name-swaps).
  Then explain what research informed each personalization decision.

assertions:
  - type: llm_judge
    criteria: "Each email is genuinely different — not just the name and company swapped in a template. The opening, pain point, value proposition, and CTA are tailored to each prospect's situation"
    weight: 0.30
    description: "Genuinely different personalizations"
  - type: llm_judge
    criteria: "Research is visibly used — David's CAC struggles, Rachel's award, and James's EMEA expansion are woven naturally into the email openings, not just mentioned as afterthoughts"
    weight: 0.30
    description: "Research visibly woven into emails"
  - type: llm_judge
    criteria: "The product's value proposition is reframed for each prospect — OutreachPro solves a different problem for each person (CAC reduction, scaling outreach, international expansion)"
    weight: 0.25
    description: "Reframed value proposition per prospect"
  - type: llm_judge
    criteria: "The explanation of research decisions is thoughtful — it shows WHY each piece of information was chosen and how it connects to the prospect's likely priorities"
    weight: 0.15
    description: "Thoughtful research decision explanation"
