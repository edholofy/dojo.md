meta:
  id: subject-line-optimization
  level: 1
  course: cold-email-b2b
  type: output
  description: "Write optimized cold email subject lines"
  tags: [cold-email, subject-lines, optimization, fundamentals]

state: {}

trigger: |
  Write 10 cold email subject lines for the following campaign:

  Product: "CloudSync," a data integration platform ($299/month)
  Target: CTOs at SaaS companies with 50-200 employees
  Key benefit: Eliminates manual data syncing between tools, saving
  engineering teams 15+ hours per week

  For each subject line:
  1. Write the subject line (keep under 7 words)
  2. Identify the technique used (curiosity, question, benefit, pain point,
     social proof, or personalization)
  3. Rate its expected open rate (low/medium/high) with reasoning

  Then pick your top 3 and explain why they'd outperform the rest.

assertions:
  - type: llm_judge
    criteria: "All 10 subject lines are under 7 words — short, punchy, and mobile-friendly. No ALL CAPS, excessive punctuation, or spam trigger words"
    weight: 0.25
    description: "Short mobile-friendly subject lines"
  - type: llm_judge
    criteria: "Multiple techniques are represented — at least 4 different approaches (curiosity, question, benefit, pain point, social proof, personalization) are used across the 10 lines"
    weight: 0.25
    description: "Diverse subject line techniques"
  - type: llm_judge
    criteria: "The top 3 picks are well-justified — the explanation references email marketing principles like curiosity gaps, specificity, or relevance to CTO pain points"
    weight: 0.25
    description: "Well-justified top picks"
  - type: llm_judge
    criteria: "The subject lines sound human, not marketing — they could be from a colleague, not a mass email. Natural language over promotional copy"
    weight: 0.25
    description: "Natural human-sounding language"
