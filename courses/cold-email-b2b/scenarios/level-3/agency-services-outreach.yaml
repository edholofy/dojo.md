meta:
  id: agency-services-outreach
  level: 3
  course: cold-email-b2b
  type: output
  description: "Write cold outreach for a services/agency business"
  tags: [cold-email, agency, services, consulting, b2b]

state: {}

trigger: |
  Write cold outreach emails for "Compound Growth," a B2B content
  marketing agency that helps SaaS companies generate leads through
  SEO content. This is services (not SaaS), which changes the dynamic.

  Agency details:
  - Service: SEO content strategy + production for B2B SaaS
  - Pricing: $8,000-$15,000/month retainer
  - Results: average client sees 3x organic traffic in 6 months
  - Portfolio: 12 SaaS clients, 3 case studies with named companies
  - Differentiator: writers with SaaS industry expertise (not generalists)

  Target: VP Marketing or Head of Content at B2B SaaS companies
  ($5M-$50M ARR) that are currently underperforming in organic search.

  Challenges unique to agency cold outreach:
  - "We have an in-house team" is the #1 objection
  - Agencies are often seen as interchangeable
  - Trust is harder to build (they're hiring people, not software)
  - The buyer needs to believe in YOUR team specifically

  Write:
  1. A 4-email sequence with full copy
  2. A "portfolio intro" email that showcases results without being braggy
  3. How to differentiate from the hundreds of other agencies emailing them

assertions:
  - type: llm_judge
    criteria: "The emails differentiate from generic agencies — SaaS-specific expertise, named case studies, and a clear methodology make Compound Growth feel like specialists, not generalists"
    weight: 0.25
    description: "Clear agency differentiation"
  - type: llm_judge
    criteria: "The in-house team objection is pre-handled — the emails position the agency as a complement to (not replacement for) in-house teams, or show how they outperform in-house on specific metrics"
    weight: 0.25
    description: "In-house team objection pre-handled"
  - type: llm_judge
    criteria: "The portfolio email shows results without being self-congratulatory — specific metrics (3x traffic, lead numbers) for named clients, presented as relevant proof points"
    weight: 0.25
    description: "Results-driven non-braggy portfolio"
  - type: llm_judge
    criteria: "The emails build trust in the TEAM, not just the service — specific writers or strategists are referenced, the human element is present, because agencies sell people"
    weight: 0.25
    description: "People-focused trust building"
