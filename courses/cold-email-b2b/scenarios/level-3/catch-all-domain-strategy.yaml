meta:
  id: catch-all-domain-strategy
  level: 3
  course: cold-email-b2b
  type: output
  description: "Handle catch-all domains in cold email campaigns"
  tags: [cold-email, catch-all, deliverability, list-management]

state: {}

trigger: |
  Your prospect list of 5,000 contacts has been verified by an email
  verification service. The results:

  - Valid: 3,200 (64%)
  - Invalid: 400 (8%)
  - Catch-all: 1,100 (22%)
  - Unknown: 300 (6%)

  The 1,100 catch-all addresses are a problem. These domains accept
  all incoming email (even to non-existent addresses), so the verification
  tool can't confirm if the specific address exists.

  Many of these are enterprise prospects at companies like:
  - Large enterprises with custom email configurations
  - Government agencies
  - Educational institutions

  You can't afford to skip them (they include your best prospects),
  but sending blindly risks high bounce rates.

  Provide:
  1. Explain what catch-all domains are and why they matter for cold email
  2. A strategy for handling the 1,100 catch-all contacts safely
  3. A phased sending approach with specific daily volume limits
  4. Bounce monitoring thresholds and automatic pause rules
  5. Alternative verification methods for catch-all addresses
  6. When to give up on a catch-all segment

assertions:
  - type: llm_judge
    criteria: "The catch-all explanation is accurate — describes how catch-all servers accept all mail, why verification tools can't validate specific addresses, and the risk of hidden bounces"
    weight: 0.20
    description: "Accurate catch-all explanation"
  - type: llm_judge
    criteria: "The phased sending approach is specific — daily volumes, ramp schedule, and how catch-all sends are mixed with verified sends to protect overall sender reputation"
    weight: 0.25
    description: "Specific phased sending approach"
  - type: llm_judge
    criteria: "Bounce monitoring thresholds are precise — specific percentages that trigger pausing (e.g., >3% bounce rate triggers immediate stop), with automatic rules not relying on manual checking"
    weight: 0.25
    description: "Precise bounce monitoring thresholds"
  - type: llm_judge
    criteria: "Alternative verification methods are practical — LinkedIn cross-referencing, SMTP ping variations, Google search validation, or sending a pre-campaign test email to check for hard bounces"
    weight: 0.30
    description: "Practical alternative verification methods"
