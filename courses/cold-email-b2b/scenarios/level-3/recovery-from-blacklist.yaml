meta:
  id: recovery-from-blacklist
  level: 3
  course: cold-email-b2b
  type: output
  description: "Recover cold email operations after domain blacklisting"
  tags: [cold-email, blacklist, recovery, deliverability, crisis]

state: {}

trigger: |
  Your primary cold email domain has been blacklisted. Your outreach
  operations are dead. Create a recovery plan.

  Situation:
  - Domain: reach.growthtools.com (used for cold outreach for 8 months)
  - Listed on: Spamhaus SBL and Barracuda BRBL
  - Current inbox placement: 5% (was 82% last month)
  - What happened: An intern accidentally uploaded a purchased list of
    50,000 unverified contacts and sent a campaign. Bounce rate hit 15%,
    spam complaints hit 4%.
  - The main brand domain (growthtools.com) is NOT affected (yet)
  - 3 SDRs are completely unable to do outreach
  - Pipeline generation has stopped

  Provide:
  1. Immediate triage (first 24 hours)
  2. Blacklist removal process (step-by-step for each blacklist)
  3. Alternative outreach while the domain recovers
  4. New domain setup strategy (how many, what naming convention)
  5. Process safeguards to prevent this from happening again
  6. Realistic timeline for full recovery
  7. Communication plan for sales leadership (what to tell the VP of Sales)

assertions:
  - type: llm_judge
    criteria: "Immediate triage is comprehensive — stop all sending, audit the damage, check if main domain is affected, preserve evidence, and notify relevant stakeholders"
    weight: 0.20
    description: "Comprehensive immediate triage"
  - type: llm_judge
    criteria: "Blacklist removal steps are specific to each list — Spamhaus SBL removal requires different steps than Barracuda BRBL, including waiting periods, evidence submission, and verification"
    weight: 0.25
    description: "List-specific blacklist removal steps"
  - type: llm_judge
    criteria: "The new domain strategy is well-designed — multiple domains (3-5), varied naming conventions to avoid patterns, proper warm-up timeline, and load distribution across domains"
    weight: 0.25
    description: "Well-designed multi-domain strategy"
  - type: llm_judge
    criteria: "Process safeguards address the root cause — approval workflows for list uploads, maximum send limits, automated quality gates, and separated permissions prevent future incidents"
    weight: 0.15
    description: "Root-cause prevention safeguards"
  - type: llm_judge
    criteria: "The VP of Sales communication is honest and solution-oriented — acknowledges the impact on pipeline, provides a realistic recovery timeline, and offers alternative outreach in the interim"
    weight: 0.15
    description: "Honest solution-oriented executive communication"
