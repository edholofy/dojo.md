meta:
  id: segmented-icp-campaigns
  level: 3
  course: cold-email-b2b
  type: output
  description: "Build segmented campaigns for different ICP tiers"
  tags: [cold-email, segmentation, icp-tiers, targeting]

state: {}

trigger: |
  Segment your prospect list into ICP tiers and design different outreach
  strategies for each.

  Product: "Notion for Teams" (fictional scenario) — collaborative workspace
  ($10/user/month)
  Total list: 15,000 prospects

  Segment the list into 3 tiers based on these data points:

  Available data per prospect:
  - Company size (employees)
  - Current tools used (from technographic data)
  - Recent funding or growth signals
  - Role/title of contact
  - Industry

  Define:
  1. Tier 1 (Gold) — highest conversion potential
     - Criteria for inclusion
     - Expected list size and conversion rate
     - Personalization depth and time investment per email
     - Write one example email

  2. Tier 2 (Silver) — moderate potential
     - Criteria for inclusion
     - Expected list size and conversion rate
     - Personalization approach (scalable but relevant)
     - Write one example email

  3. Tier 3 (Bronze) — lowest priority but highest volume
     - Criteria for inclusion
     - Expected list size and conversion rate
     - Template-based approach with light personalization
     - Write one example email

  4. Disqualified — who gets removed entirely and why

  Include the expected ROI calculation: how many deals each tier generates
  given typical cold email conversion rates.

assertions:
  - type: llm_judge
    criteria: "Tier criteria are data-driven — Gold uses specific signals (recent funding + right tools + decision-maker title), Silver uses partial matches, Bronze uses basic demographic fit"
    weight: 0.25
    description: "Data-driven tier segmentation criteria"
  - type: llm_judge
    criteria: "The three example emails demonstrate descending personalization — Gold is deeply researched, Silver uses scalable personalization, Bronze is a smart template. Each feels appropriate for its tier"
    weight: 0.25
    description: "Appropriate personalization per tier"
  - type: llm_judge
    criteria: "ROI calculations are realistic — conversion rates decrease by tier (Gold: 3-5%, Silver: 1-2%, Bronze: 0.3-0.5%) but volume increases, and the total pipeline contribution per tier is calculated"
    weight: 0.25
    description: "Realistic ROI calculations per tier"
  - type: llm_judge
    criteria: "Disqualification criteria are clear — contacts removed for being too small, wrong industry, no budget authority, or already using a competing product are explicitly defined"
    weight: 0.25
    description: "Clear disqualification criteria"
