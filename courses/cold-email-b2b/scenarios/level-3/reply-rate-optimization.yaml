meta:
  id: reply-rate-optimization
  level: 3
  course: cold-email-b2b
  type: output
  description: "Optimize a cold email campaign with below-average reply rates"
  tags: [cold-email, optimization, reply-rate, diagnosis]

state: {}

trigger: |
  Your cold email campaign has acceptable open rates but terrible
  reply rates. Diagnose and fix the problem.

  Campaign data (last 60 days, 3 sequence variants):

  Variant A — "Problem-focused":
  Subject: "Struggling with [pain point]?"
  Open rate: 32% | Reply rate: 1.2% | Meeting rate: 0.1%

  Variant B — "Social proof":
  Subject: "[Competitor] cut costs 40% — here's how"
  Open rate: 28% | Reply rate: 1.8% | Meeting rate: 0.3%

  Variant C — "Direct ask":
  Subject: "Quick question about [company] marketing"
  Open rate: 38% | Reply rate: 0.9% | Meeting rate: 0.05%

  Target: Marketing Directors at mid-market companies ($10M-$100M revenue)
  Product: Marketing attribution platform ($499/month)
  List size per variant: 2,000 contacts

  Industry benchmarks: 3-5% reply rate, 0.5-1% meeting rate

  Analyze:
  1. Why are open rates decent but reply rates low? (The disconnect)
  2. Which variant is performing best and why?
  3. What's killing replies in each variant?
  4. Rewrite the worst performer (Variant C) to fix the reply gap
  5. Design a new Variant D that combines the best elements of A, B, and C
  6. Predict Variant D's expected performance with reasoning

assertions:
  - type: llm_judge
    criteria: "The open-reply disconnect is correctly diagnosed — high opens + low replies typically indicates the email body doesn't deliver on the subject line's promise or lacks a compelling CTA"
    weight: 0.25
    description: "Correct open-reply disconnect diagnosis"
  - type: llm_judge
    criteria: "Per-variant analysis is specific — each variant's weakness is identified (A: too generic pain point, B: competitor reference might feel aggressive, C: high opens but vague ask)"
    weight: 0.25
    description: "Specific per-variant weakness analysis"
  - type: llm_judge
    criteria: "The Variant C rewrite substantially improves the reply mechanism — the high open rate is preserved while adding a compelling reason to reply and a specific, frictionless CTA"
    weight: 0.25
    description: "Substantial Variant C rewrite"
  - type: llm_judge
    criteria: "Variant D combines insights intelligently — it doesn't just splice elements together but creates a cohesive new approach informed by what worked and failed in A, B, and C"
    weight: 0.25
    description: "Intelligent Variant D synthesis"
