meta:
  id: ai-personalization-at-scale
  level: 3
  course: cold-email-b2b
  type: output
  description: "Design AI-powered personalization for cold emails at scale"
  tags: [cold-email, ai-personalization, scale, automation]

state: {}

trigger: |
  You need to send 2,000 personalized cold emails per month. Manual
  research takes 10 minutes per prospect — that's 333 hours/month
  (impossible). Design an AI-powered personalization system.

  Product: "Amplitude" (fictional scenario) — product analytics ($149/month)
  Target: Product Managers at B2B SaaS companies

  Available data per prospect:
  - Name, title, company, email (from list)
  - Company website (can be scraped)
  - LinkedIn profile URL (public data)
  - Company size and industry
  - Recent blog posts or press releases
  - Tech stack (from BuiltWith or similar)

  Design:
  1. The AI personalization pipeline:
     - What data to collect per prospect
     - How to process it (prompts, AI tools, automation)
     - Quality control steps before sending
     - Fallback for when data is insufficient

  2. Write the AI prompt template that generates personalized openers
     from prospect data

  3. Show 4 example outputs (the AI-generated opener + the data it used)

  4. Identify the risks of AI personalization:
     - Accuracy errors (wrong company info)
     - Tone inconsistency
     - GDPR/compliance concerns with AI-processed data
     - How prospects detect AI-generated emails

assertions:
  - type: llm_judge
    criteria: "The pipeline is specific and implementable — data collection, AI processing, quality control, and sending steps are defined with tools, timing, and human checkpoints"
    weight: 0.25
    description: "Specific implementable pipeline"
  - type: llm_judge
    criteria: "The AI prompt template is well-crafted — it produces natural-sounding openers that reference specific data points without feeling templated or robotic"
    weight: 0.25
    description: "Well-crafted AI prompt template"
  - type: llm_judge
    criteria: "The 4 example outputs are realistic — they show genuine variation in AI output quality, including one example where the AI might produce a mediocre result that needs editing"
    weight: 0.25
    description: "Realistic varied AI output examples"
  - type: llm_judge
    criteria: "Risks are honestly assessed — AI accuracy errors, the compliance implications of processing public data through AI, and specific tells that reveal AI-generated emails"
    weight: 0.25
    description: "Honest AI risk assessment"
