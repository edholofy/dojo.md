meta:
  id: abm-email-orchestration
  level: 3
  course: cold-email-b2b
  type: output
  description: "Design an ABM email campaign targeting multiple stakeholders"
  tags: [cold-email, abm, enterprise, multi-stakeholder, orchestration]

state: {}

trigger: |
  Design an account-based marketing (ABM) cold email campaign targeting
  a single enterprise account: "GlobalRetail Inc." (fictional) — a $2B
  retail company with 15,000 employees and 200 stores.

  You're selling "RetailOS," an AI-powered inventory management platform
  ($50K/year enterprise license).

  Target buying committee at GlobalRetail:
  1. Jennifer Walsh — CTO (final decision maker)
     - Priorities: digital transformation, reducing technical debt
     - LinkedIn: Posts about AI in retail
  2. Marcus Chen — VP Supply Chain (key influencer)
     - Priorities: reducing stockouts, improving demand forecasting
     - Recent: Spoke at NRF conference about supply chain challenges
  3. Sarah Kim — Director of IT (technical evaluator)
     - Priorities: integration with existing systems, security
     - Recent: Wrote a blog post about ERP modernization
  4. David Park — CFO (budget holder)
     - Priorities: margin improvement, ROI, cost reduction
     - Recent: Earnings call mentioned "investing in operational efficiency"

  Design:
  1. An orchestrated email sequence for all 4 stakeholders over 21 days
  2. Write the first email to each person (4 emails total)
  3. Timing and sequencing rules (who gets emailed first, why)
  4. How references to other stakeholders can create internal urgency

assertions:
  - type: llm_judge
    criteria: "Each stakeholder gets a role-specific email — the CTO email talks digital transformation, VP Supply Chain talks forecasting, IT Director talks integration, CFO talks ROI. No generic pitches"
    weight: 0.25
    description: "Role-specific stakeholder emails"
  - type: llm_judge
    criteria: "The sequencing is strategic — there's a clear rationale for who gets contacted first (likely the influencer or champion, not the CFO) and how each contact primes the next"
    weight: 0.25
    description: "Strategic contact sequencing"
  - type: llm_judge
    criteria: "Internal urgency tactics are used ethically — mentioning 'we're also speaking with your supply chain team' can create FOMO without being manipulative"
    weight: 0.25
    description: "Ethical internal urgency creation"
  - type: llm_judge
    criteria: "Each email references specific research about the individual — Jennifer's AI posts, Marcus's NRF talk, Sarah's blog, David's earnings call. Deep personalization, not just name/title"
    weight: 0.25
    description: "Deep individual-specific personalization"
