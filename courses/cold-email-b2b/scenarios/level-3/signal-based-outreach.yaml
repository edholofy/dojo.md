meta:
  id: signal-based-outreach
  level: 3
  course: cold-email-b2b
  type: output
  description: "Design signal-based cold email campaigns using intent data"
  tags: [cold-email, signal-based, intent-data, trigger-events]

state: {}

trigger: |
  Design signal-based cold email campaigns for "Datadog" (fictional
  scenario) — an infrastructure monitoring platform ($23/host/month).
  Target: DevOps engineers and engineering managers at companies with
  100+ servers.

  You have access to these buyer signals:

  Signal 1 — Technology adoption:
  Companies that recently adopted Kubernetes (detected via job postings
  and GitHub activity). 200 companies identified.

  Signal 2 — Competitor dissatisfaction:
  Companies posting on Reddit/HackerNews about "New Relic pricing" or
  "Splunk alternatives." 80 companies identified.

  Signal 3 — Scaling indicators:
  Companies whose cloud spending increased 40%+ in the last quarter
  (detected via AWS Marketplace data). 150 companies identified.

  Signal 4 — Incident signals:
  Companies that had a public outage or incident in the last 30 days
  (detected via status page monitoring). 40 companies identified.

  For each signal:
  1. Write the cold email (tailored to the signal)
  2. Explain why this signal indicates buying intent
  3. Recommend the timing (how quickly to reach out after the signal)
  4. Predict the expected response rate vs. generic cold outreach

assertions:
  - type: llm_judge
    criteria: "Each email is specifically tailored to its signal — the Kubernetes email talks about observability complexity, the competitor email references pricing frustration, the scaling email focuses on growth, and the incident email addresses reliability needs"
    weight: 0.30
    description: "Signal-specific email tailoring"
  - type: llm_judge
    criteria: "Timing recommendations are signal-appropriate — incidents need fast outreach (24-48 hours), scaling is less urgent (1-2 weeks), and the reasoning connects signal freshness to response rates"
    weight: 0.25
    description: "Signal-appropriate timing"
  - type: llm_judge
    criteria: "The incident signal email is sensitive — it acknowledges the pain without being opportunistic or celebrating their failure. The tone helps rather than sells"
    weight: 0.25
    description: "Sensitive incident signal handling"
  - type: llm_judge
    criteria: "Response rate predictions are realistic and differentiated — signal-based emails should be estimated at 5-15% (vs. 1-3% generic), with reasoning for why each signal has different response potential"
    weight: 0.20
    description: "Realistic differentiated response predictions"
