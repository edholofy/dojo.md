meta:
  id: saas-vertical-campaign
  level: 3
  course: cold-email-b2b
  type: output
  description: "Build a vertical-specific cold email campaign for SaaS"
  tags: [cold-email, saas, vertical, niche, campaign]

state: {}

trigger: |
  Build a complete vertical-specific cold email campaign for "Clio"
  (fictional scenario) — a practice management SaaS for law firms
  ($79/user/month).

  You're targeting a specific niche: personal injury law firms with
  5-20 attorneys in Texas, California, and Florida (the three largest
  PI markets).

  Niche intelligence:
  - PI firms handle 50-200 active cases simultaneously
  - Average case value: $50,000-$500,000
  - Biggest pain: case tracking across multiple stages (intake → investigation
    → litigation → settlement)
  - Current tools: most use spreadsheets, Outlook, or outdated on-premise
    software
  - Decision maker: managing partner (usually a senior attorney)
  - Buying trigger: lost a case due to missed deadline or statute of limitations
  - Industry stat: 67% of PI firms say case management is their #1 operational challenge

  Build:
  1. A 5-email sequence with full copy for all emails
  2. Subject line A/B tests for Email 1
  3. Industry-specific language that shows you understand PI law
  4. Social proof framework (what types of proof resonate with attorneys)
  5. Objection pre-handling for: "We've always done it this way"

assertions:
  - type: llm_judge
    criteria: "The emails use genuine PI law terminology — 'case intake,' 'litigation hold,' 'statute of limitations,' 'discovery,' 'settlement negotiations' are used naturally, not forced"
    weight: 0.25
    description: "Genuine PI law terminology"
  - type: llm_judge
    criteria: "The pain point of missed deadlines is leveraged effectively — the risk of a statute of limitations miss is the nightmare scenario for PI attorneys and drives urgency"
    weight: 0.25
    description: "Missed deadline pain point leveraged"
  - type: llm_judge
    criteria: "Social proof is attorney-appropriate — peer firm adoption, bar association endorsements, or case outcome improvements. Attorneys trust other attorneys, not marketing claims"
    weight: 0.25
    description: "Attorney-appropriate social proof"
  - type: llm_judge
    criteria: "The 'we've always done it this way' objection is handled through risk framing — the cost of NOT changing (missed deadlines, lost cases) outweighs the comfort of the status quo"
    weight: 0.25
    description: "Risk-framed status quo objection handling"
