meta:
  id: enterprise-long-cycle
  level: 3
  course: cold-email-b2b
  type: output
  description: "Design a cold email sequence for enterprise 6-month sales cycles"
  tags: [cold-email, enterprise, long-cycle, nurture, patience]

state: {}

trigger: |
  Design a cold email nurture sequence for a 6-month enterprise sales
  cycle. You're selling "Workday" (fictional scenario) — an enterprise
  HR platform ($150K+ annual contracts) to CHRO-level prospects at
  Fortune 1000 companies.

  Constraints:
  - Enterprise buyers don't respond to aggressive sequences
  - Average decision involves 11.4 stakeholders
  - Budget cycles are annual (most decisions in Q4 for next year)
  - Prospects receive 50+ vendor emails per week
  - Your sequence must span 6 months without being annoying

  Design:
  1. A 6-month email sequence (specify every touchpoint and timing)
  2. Write emails for: Month 1 (introduction), Month 3 (value-add),
     and Month 6 (re-engagement)
  3. Define what content/value to share at each stage:
     - Early: thought leadership, industry insights
     - Middle: case studies, ROI calculators
     - Late: peer references, executive briefings
  4. Rules for when to accelerate, pause, or exit the sequence
  5. How to stay top-of-mind without being a pest

assertions:
  - type: llm_judge
    criteria: "The 6-month cadence is appropriately spaced — monthly or bi-monthly touches that respect enterprise buyer pace, not aggressive weekly emails that get blacklisted"
    weight: 0.25
    description: "Appropriately spaced enterprise cadence"
  - type: llm_judge
    criteria: "Content progression matches the buying journey — thought leadership early, proof points in the middle, peer references and urgency late. Each email adds cumulative value"
    weight: 0.25
    description: "Content matches buying journey stage"
  - type: llm_judge
    criteria: "The three written emails demonstrate evolving familiarity — Month 1 is formal introduction, Month 3 assumes some awareness, Month 6 references the relationship built"
    weight: 0.25
    description: "Evolving familiarity across emails"
  - type: llm_judge
    criteria: "Acceleration and exit rules are specific — engagement signals (opens, clicks, replies, content downloads) trigger faster cadence; silence after 6 touches triggers graceful exit"
    weight: 0.25
    description: "Specific acceleration and exit rules"
