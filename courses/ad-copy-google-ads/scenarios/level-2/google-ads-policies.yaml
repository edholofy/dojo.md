meta:
  id: google-ads-policies
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write Google Ads copy that complies with advertising policies and avoids disapprovals"
  tags: [google-ads, policies, compliance, disapprovals, intermediate]

state: {}

trigger: |
  Google Ads has strict advertising policies. Disapproved ads
  waste time, reduce account health, and can lead to account
  suspension. Key policy areas include: misleading claims,
  restricted content (healthcare, finance, gambling), trademark
  usage, editorial standards, and destination requirements.

  Review and fix 6 ads with policy violations:

  Ad 1: Healthcare claim violation
  Business: Supplement company (vitamin D supplement)
  Current ad: "Cure Your Depression with Vitamin D - Clinically
  Proven to Eliminate Anxiety. Buy Now & Feel Better Tomorrow."
  Policy violated: Healthcare claims
  Task: Rewrite to comply with supplement advertising rules

  Ad 2: Financial promise violation
  Business: Investment platform
  Current ad: "Guaranteed 30% Returns - Make $10,000/Month From
  Home. No Experience Needed. Start Now."
  Policy violated: Misleading financial claims
  Task: Rewrite with compliant financial language

  Ad 3: Trademark violation
  Business: Third-party phone repair shop
  Current ad: "iPhone Repair - Official Apple Service. Samsung
  Galaxy Fix - Authorized Dealer."
  Policy violated: Unauthorized trademark use / implied affiliation
  Task: Rewrite to reference brands without implying authorization

  Ad 4: Editorial violation
  Business: E-commerce store
  Current ad: "BEST DEALS EVER!!! *** FREE SHIPPING *** Click
  Here NOW!!!! $$$SAVE BIG$$$ >>>>"
  Policy violated: Editorial standards (excessive punctuation,
  symbols, capitalization)
  Task: Rewrite following Google's editorial guidelines

  Ad 5: Alcohol advertising
  Business: Online wine subscription
  Current ad: "Get Drunk on Great Wine - Unlimited Wine Delivered.
  Perfect for Parties. Everyone Loves Wine!"
  Policy violated: Alcohol advertising restrictions
  Task: Rewrite complying with alcohol ad requirements

  Ad 6: Destination mismatch
  Business: Software company
  Ad headline: "Free Project Management Tool"
  Landing page: Immediately asks for credit card with $49/month plan
  Policy violated: Destination experience / misleading ad
  Task: Rewrite ad to accurately reflect landing page OR recommend
  landing page changes

  For each violation:
  1. Cite the specific Google Ads policy being violated
  2. Explain why Google restricts this type of content
  3. Rewrite the complete ad to comply
  4. Identify the line between compliant and non-compliant copy
  5. Provide a pre-publication checklist for that industry

assertions:
  - type: llm_judge
    criteria: "Policy violations are correctly identified — cites the specific Google Ads policy category (healthcare claims, financial services, trademark, editorial standards, alcohol, destination)"
    weight: 0.30
    description: "Correct policy violation identification"
  - type: llm_judge
    criteria: "Rewrites fully comply — the fixed ads would pass Google's automated and manual review without triggering disapproval"
    weight: 0.30
    description: "Fully compliant rewrites"
  - type: llm_judge
    criteria: "Compliance boundaries are clear — explains exactly where the line is between acceptable and policy-violating copy for each industry"
    weight: 0.20
    description: "Clear compliance boundaries"
  - type: llm_judge
    criteria: "Pre-publication checklists are practical — provide actionable steps that prevent policy violations before submission"
    weight: 0.20
    description: "Practical pre-publication checklists"
