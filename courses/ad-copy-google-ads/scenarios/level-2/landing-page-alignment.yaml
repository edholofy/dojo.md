meta:
  id: landing-page-alignment
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Align Google Ads copy with landing pages for Quality Score and conversion optimization"
  tags: [google-ads, landing-page, message-match, quality-score, intermediate]

state: {}

trigger: |
  Landing page experience is one of three Quality Score components.
  Message match between ad copy and landing page can improve
  conversion rates by 30% or more. Mismatches increase bounce
  rates and waste ad spend.

  Optimize ad-to-landing-page alignment for 4 scenarios:

  Scenario 1: Perfect match needed
  Ad keyword: "affordable web design for small business"
  Current ad headline: "Professional Web Design"
  Current landing page headline: "Enterprise Digital Solutions"
  Problem: Keyword says "affordable" + "small business," ad says
  "professional," page says "enterprise"
  Task: Rewrite ad copy AND recommend landing page headline changes

  Scenario 2: Offer consistency
  Ad keyword: "free trial CRM software"
  Ad copy: "Start Your Free 30-Day Trial Today"
  Landing page: Shows pricing page with no visible free trial option
  (free trial link is buried in footer)
  Task: Rewrite the ad OR recommend landing page restructuring

  Scenario 3: Feature-to-benefit translation
  Ad keyword: "best email marketing automation"
  Ad copy: "Automated Email Sequences - AI-Powered Personalization"
  Landing page: Lists 47 features in bullet points with no
  benefit-focused headline
  Task: Recommend both ad and landing page copy for alignment

  Scenario 4: Local service match
  Ad keyword: "plumber in Brooklyn"
  Ad copy: "Licensed Plumber - 24/7 Service"
  Landing page: Generic nationwide plumbing company page with no
  Brooklyn-specific content
  Task: Write ad copy with local signals AND recommend landing
  page localization

  For each scenario:
  1. Diagnose the specific alignment gap
  2. Write improved ad copy (5 headlines, 4 descriptions)
  3. Write the recommended landing page headline and subheadline
  4. Explain the "message match" principle for this case
  5. Predict the Quality Score and conversion rate impact

assertions:
  - type: llm_judge
    criteria: "Alignment gaps are accurately diagnosed — identifies the specific disconnect between keyword intent, ad promise, and landing page delivery"
    weight: 0.25
    description: "Accurate alignment gap diagnosis"
  - type: llm_judge
    criteria: "Ad and landing page recommendations are consistent — the revised ad copy and landing page copy tell the same story with the same language"
    weight: 0.30
    description: "Consistent ad-to-page messaging"
  - type: llm_judge
    criteria: "Message match principles are clearly explained — describes how keyword intent should flow through ad copy to landing page experience"
    weight: 0.25
    description: "Clear message match principles"
  - type: llm_judge
    criteria: "Impact predictions are reasonable — Quality Score and conversion improvements are grounded in advertising benchmarks"
    weight: 0.20
    description: "Reasonable impact predictions"
