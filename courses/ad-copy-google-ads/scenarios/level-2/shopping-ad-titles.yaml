meta:
  id: shopping-ad-titles
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Optimize Google Shopping ad product titles and descriptions for maximum visibility"
  tags: [google-ads, shopping, product-titles, ecommerce, intermediate]

state: {}

trigger: |
  Google Shopping ads pull copy from your product feed — primarily
  the product title (150 chars max, ~70 before mobile cutoff) and
  description. Unlike search ads, you can't write custom ad copy;
  optimization happens in the product feed.

  Optimize product titles for 5 product categories:

  Category 1: Running shoes
  Current title: "Men's Running Shoes"
  Brand: Nike | Model: Air Zoom Pegasus 41 | Color: Black/White
  Size range: 7-14 | Price: $129.99
  Task: Rewrite title following [Brand] + [Product] + [Key Attributes]
  format, prioritizing info within 70-char mobile cutoff

  Category 2: Laptop
  Current title: "New Laptop Computer"
  Brand: Dell | Model: XPS 15 | Specs: 16GB RAM, 512GB SSD,
  15.6" OLED, Intel i7-14700H
  Task: Rewrite title prioritizing specs that shoppers search for

  Category 3: Skincare
  Current title: "Face Cream"
  Brand: CeraVe | Product: Moisturizing Cream | Size: 16oz
  Key ingredient: Ceramides + Hyaluronic Acid | Skin type: Dry/Normal
  Task: Rewrite title with ingredient and skin-type targeting

  Category 4: Kitchen appliance
  Current title: "Coffee Maker"
  Brand: Breville | Model: Barista Express Impress | Type: Espresso
  Features: Built-in grinder, digital temperature control, 2L tank
  Task: Rewrite title with model specificity and feature keywords

  Category 5: Pet supplies
  Current title: "Dog Bed"
  Brand: FurHaven | Type: Orthopedic Sofa Bed | Size: Large (36x27")
  Material: Memory foam | Best for: Dogs with joint issues
  Task: Rewrite title targeting long-tail pet-specific searches

  For each product:
  1. Write the optimized title (within 150 chars, critical info
     within 70 chars)
  2. Write the product description (optimize for search terms)
  3. Explain your keyword prioritization within the title
  4. Identify which attributes matter most for this product category
  5. Show how the title would appear on mobile vs desktop

assertions:
  - type: llm_judge
    criteria: "Titles follow the [Brand] + [Product Type] + [Key Attributes] structure with the most important information within the 70-character mobile cutoff"
    weight: 0.30
    description: "Structured titles with mobile priority"
  - type: llm_judge
    criteria: "Attribute prioritization is category-appropriate — shoes prioritize brand/model/size, laptops prioritize specs, skincare prioritizes ingredients"
    weight: 0.30
    description: "Category-appropriate attribute priority"
  - type: llm_judge
    criteria: "Titles are search-optimized — include terms that real shoppers would search for rather than marketing language or vague descriptors"
    weight: 0.20
    description: "Search-optimized title language"
  - type: llm_judge
    criteria: "Product descriptions complement titles — add searchable details not in the title without keyword stuffing"
    weight: 0.20
    description: "Complementary product descriptions"
