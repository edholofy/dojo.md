meta:
  id: remarketing-ad-copy
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write remarketing ad copy that re-engages visitors at different funnel stages"
  tags: [google-ads, remarketing, retargeting, funnel, intermediate]

state: {}

trigger: |
  Remarketing ads target users who have already interacted with
  your website or app. Copy must acknowledge the prior interaction
  and provide a reason to return — whether they browsed, added
  to cart, or started a signup.

  Write remarketing ad copy for 4 audience segments:

  Segment 1: Homepage bouncers (visited homepage, left within 10s)
  Business: SaaS project management tool
  What they know: Almost nothing — they bounced before learning
  Task: Write search + display remarketing ads that provide the
  value proposition they missed

  Segment 2: Product page viewers (viewed specific products, no cart)
  Business: E-commerce furniture store
  What they know: They looked at specific items but didn't add
  Task: Write dynamic remarketing ads referencing viewed products
  with incentives to return

  Segment 3: Cart abandoners (added items, didn't purchase)
  Business: Online fashion retailer
  What they know: They chose items, entered checkout, but left
  Task: Write remarketing ads with escalating incentives over time
  (Day 1, Day 3, Day 7)

  Segment 4: Trial expirers (completed free trial, didn't convert)
  Business: Cloud storage platform ($9.99/month)
  What they know: They used the product for 14 days
  Task: Write remarketing ads that address likely objections
  (price, need, timing)

  For each segment:
  1. Write search remarketing RSAs (5 headlines, 4 descriptions)
  2. Write display remarketing copy (5 headlines, 5 descriptions,
     long headline)
  3. Define the frequency cap and duration window
  4. Explain the escalation strategy (how messaging changes over time)
  5. Write the "final attempt" ad before removing from audience
  6. Address privacy considerations in remarketing copy

assertions:
  - type: llm_judge
    criteria: "Copy acknowledges prior interaction appropriately — messaging reflects what the user already knows and builds from there rather than starting from scratch"
    weight: 0.30
    description: "Prior-interaction-aware messaging"
  - type: llm_judge
    criteria: "Escalation strategy is logical — messaging and incentives progressively increase over time without starting with the strongest offer"
    weight: 0.25
    description: "Logical escalation strategy"
  - type: llm_judge
    criteria: "Objection handling matches the segment — cart abandoners get price/urgency treatment, trial expirers get value/need treatment, bouncers get education"
    weight: 0.25
    description: "Segment-appropriate objection handling"
  - type: llm_judge
    criteria: "Privacy considerations are addressed — remarketing copy doesn't feel surveillance-like or reference specific browsing behavior in creepy ways"
    weight: 0.20
    description: "Privacy-conscious remarketing"
