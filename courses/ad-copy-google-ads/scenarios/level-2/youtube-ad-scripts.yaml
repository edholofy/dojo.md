meta:
  id: youtube-ad-scripts
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write scripts and companion text for YouTube ad formats within Google Ads"
  tags: [google-ads, youtube, video-ads, scripts, intermediate]

state: {}

trigger: |
  YouTube ads within Google Ads include bumper ads (6 seconds),
  skippable in-stream (15-30 seconds, skippable after 5), and
  non-skippable in-stream (7-15 seconds). Each requires different
  scripting approaches.

  Write YouTube ad scripts for 4 businesses:

  Business 1: Fitness app ($9.99/month)
  Format: Bumper ad (6 seconds)
  Task: Write 3 bumper ad scripts that deliver a single message
  each — hook, brand, CTA in 6 seconds
  Include: Companion banner headline (15 chars) and description

  Business 2: Online course platform ($199 course)
  Format: Skippable in-stream (25 seconds)
  Task: Write a script that hooks in the first 5 seconds (before
  skip), delivers value in seconds 5-20, and closes with CTA
  Include: Companion banner and CTA overlay text

  Business 3: B2B software ($299/month)
  Format: Non-skippable in-stream (15 seconds)
  Task: Write a script that respects the captive audience by
  providing value rather than hard-selling
  Include: CTA overlay and end screen copy

  Business 4: Local restaurant chain (3 locations)
  Format: Skippable in-stream (20 seconds)
  Task: Write a script focused on visual appeal and locality,
  with strong first-5-second hook
  Include: Location extension copy and CTA overlay

  For each script:
  1. Time-stamp every line (e.g., 0:00-0:02: "Opening hook")
  2. Mark the "skip threshold" moment for skippable ads
  3. Write the on-screen text overlays
  4. Write the companion banner copy
  5. Explain the creative strategy and target audience

assertions:
  - type: llm_judge
    criteria: "Scripts respect format constraints — bumper scripts fit 6 seconds, skippable ads front-load the hook before the 5-second skip point"
    weight: 0.30
    description: "Format-appropriate script timing"
  - type: llm_judge
    criteria: "First 5 seconds are compelling — skippable ad scripts deliver the strongest hook, curiosity, or value proposition before viewers can skip"
    weight: 0.30
    description: "Compelling pre-skip hook"
  - type: llm_judge
    criteria: "Companion text complements video — banner headlines, CTA overlays, and end screen copy reinforce the video message without redundancy"
    weight: 0.20
    description: "Complementary companion text"
  - type: llm_judge
    criteria: "Scripts are production-ready — include enough direction for timing, visual, and copy elements that a production team could execute them"
    weight: 0.20
    description: "Production-ready script detail"
