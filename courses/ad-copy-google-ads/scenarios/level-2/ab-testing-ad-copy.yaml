meta:
  id: ab-testing-ad-copy
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Design and execute A/B tests for Google Ads copy with proper methodology"
  tags: [google-ads, ab-testing, optimization, methodology, intermediate]

state: {}

trigger: |
  A/B testing Google Ads copy requires proper methodology: test
  one variable at a time, reach statistical significance (30+
  conversions per variant, 2-4 weeks minimum), and measure the
  right metrics.

  Design A/B tests for 5 scenarios:

  Scenario 1: Headline emotional tone
  Business: Online therapy platform ($65/session)
  Test: Empathetic tone ("Feeling Overwhelmed?") vs Professional
  tone ("Licensed Therapists Online")
  Task: Write both complete RSAs and the test plan

  Scenario 2: CTA specificity
  Business: SaaS analytics tool (free trial)
  Test: Generic CTA ("Get Started") vs Specific CTA ("Start Your
  14-Day Free Trial")
  Task: Write both RSAs with only CTA elements changed

  Scenario 3: Social proof type
  Business: E-commerce skincare ($45 product)
  Test: Star rating proof ("Rated 4.8/5 Stars") vs Volume proof
  ("50,000+ Happy Customers")
  Task: Write both RSAs with only social proof elements changed

  Scenario 4: Benefit framing
  Business: Cloud storage ($9.99/month)
  Test: Positive framing ("Access Files Anywhere") vs Negative
  framing ("Never Lose a File Again")
  Task: Write both RSAs with only benefit framing changed

  Scenario 5: Price positioning
  Business: Online course ($299)
  Test: Price in ad ("Only $299 - Enroll Now") vs No price
  ("Enroll Now - Transform Your Career")
  Task: Write both RSAs and predict which approach generates
  higher-quality leads

  For each test:
  1. Write both A and B versions (complete RSAs)
  2. Define the primary metric (CTR, conversion rate, or CPA)
  3. Calculate the required sample size and test duration
  4. Predict the winner with reasoning
  5. Explain what you'd test next based on results

assertions:
  - type: llm_judge
    criteria: "Tests isolate a single variable — each A/B pair differs only in the tested element, making results attributable to that specific change"
    weight: 0.30
    description: "Single-variable test isolation"
  - type: llm_judge
    criteria: "Methodology is sound — includes statistical significance requirements, sample size considerations, and appropriate test duration"
    weight: 0.25
    description: "Sound testing methodology"
  - type: llm_judge
    criteria: "Predictions are reasoned — winner predictions are based on advertising principles and audience psychology, not random guesses"
    weight: 0.25
    description: "Reasoned winner predictions"
  - type: llm_judge
    criteria: "Follow-up tests build logically — the next test recommendation builds on the current test's insights to create iterative optimization"
    weight: 0.20
    description: "Logical follow-up test design"
