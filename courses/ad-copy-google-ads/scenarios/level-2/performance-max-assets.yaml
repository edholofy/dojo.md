meta:
  id: performance-max-assets
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write Performance Max asset group copy for multi-channel Google Ads campaigns"
  tags: [google-ads, performance-max, asset-groups, intermediate]

state: {}

trigger: |
  Performance Max campaigns serve ads across Search, Display,
  YouTube, Gmail, Discover, and Maps — using a single set of
  assets. Google's AI combines your text, images, and videos into
  the best-performing combinations.

  Asset requirements:
  - Headlines: up to 5 (30 chars each)
  - Long headlines: up to 5 (90 chars each)
  - Descriptions: up to 5 (90 chars each, first can be 60)
  - Business name: 25 chars
  - Call to action: selected from Google's list

  Create Performance Max asset groups for 3 businesses:

  Business 1: D2C mattress brand ($799-$1,499)
  Goal: Online purchases
  Audience signals: In-market for mattresses, 25-55 age,
  homeowners, health-conscious
  Task: Write a complete asset group optimized for conversion

  Business 2: Local dental practice
  Goal: Appointment bookings
  Audience signals: Local area (10-mile radius), in-market for
  dental services, 18-65 age
  Task: Write a complete asset group optimized for local leads

  Business 3: B2B cybersecurity company ($500+/month)
  Goal: Demo requests
  Audience signals: IT decision-makers, company size 50-500,
  in-market for security software
  Task: Write a complete asset group optimized for B2B leads

  For each asset group:
  1. Write 5 headlines (30 chars each)
  2. Write 5 long headlines (90 chars each)
  3. Write 5 descriptions (90 chars each)
  4. Recommend the CTA button from Google's list
  5. Write the business name (25 chars)
  6. Explain how each asset is designed to work across multiple
     channels (Search, Display, YouTube, Gmail)
  7. Describe the audience signals and why they matter

assertions:
  - type: llm_judge
    criteria: "Assets work across channels — headlines that make sense in Search results also work as Display ad overlays and YouTube companion text"
    weight: 0.30
    description: "Cross-channel asset versatility"
  - type: llm_judge
    criteria: "Character limits are respected — all headlines at 30 chars, long headlines at 90, descriptions at 90, business name at 25"
    weight: 0.25
    description: "Character limit compliance"
  - type: llm_judge
    criteria: "Asset variety enables AI optimization — headlines and descriptions cover different angles, benefits, and tones rather than repetitive messaging"
    weight: 0.25
    description: "Diversity for AI optimization"
  - type: llm_judge
    criteria: "Audience signals are well-chosen — targeting recommendations match the business type and conversion goal"
    weight: 0.20
    description: "Well-chosen audience signals"
