meta:
  id: competitor-bidding-copy
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write Google Ads copy for competitor keyword bidding campaigns"
  tags: [google-ads, competitor, bidding, conquesting, intermediate]

state: {}

trigger: |
  Competitor keyword bidding means bidding on a competitor's brand
  name as a keyword. Google allows this, but you CANNOT use
  competitor trademarks in your ad copy (headlines or descriptions).
  You must differentiate without directly naming competitors.

  Write competitor bidding campaigns for 5 scenarios:

  Scenario 1: CRM challenger vs Salesforce
  Your product: Simpler CRM for SMBs ($29/month vs Salesforce's
  $300+/month)
  Competitor keyword: "Salesforce CRM"
  Task: Write ads that capture Salesforce searchers without using
  the word "Salesforce"

  Scenario 2: Email marketing tool vs Mailchimp
  Your product: Better automation, lower price ($19/month)
  Competitor keyword: "Mailchimp email marketing"
  Task: Write ads positioning as the better alternative

  Scenario 3: Fitness tracker vs Fitbit
  Your product: Superior health metrics, longer battery ($149)
  Competitor keyword: "Fitbit fitness tracker"
  Task: Write ads that appeal to Fitbit shoppers comparing options

  Scenario 4: Accounting software vs QuickBooks
  Your product: Built for freelancers ($12/month vs $30/month)
  Competitor keyword: "QuickBooks for freelancers"
  Task: Write ads targeting users frustrated with QuickBooks complexity

  Scenario 5: Hotel booking vs Booking.com
  Your product: Direct hotel booking with loyalty rewards
  Competitor keyword: "Booking.com hotels"
  Task: Write ads emphasizing direct booking benefits

  For each scenario:
  1. Write the complete RSA (8 headlines, 4 descriptions) — NO
     competitor name in any copy
  2. Use comparison language that implies superiority without naming
  3. Address likely switching objections
  4. Include a compelling differentiation hook
  5. Explain the legal boundaries of competitor bidding
  6. Recommend the landing page strategy (comparison page, feature
     page, or standard landing page)

assertions:
  - type: llm_judge
    criteria: "No competitor trademarks appear in ad copy — strictly avoids using any competitor brand name in headlines, descriptions, or display URLs"
    weight: 0.30
    description: "Trademark-free competitor copy"
  - type: llm_judge
    criteria: "Differentiation is clear and compelling — ads communicate why searchers should consider the alternative without relying on competitor name recognition"
    weight: 0.30
    description: "Clear compelling differentiation"
  - type: llm_judge
    criteria: "Switching objections are addressed — copy handles the 'why switch' barrier that competitor-keyword searchers naturally have"
    weight: 0.20
    description: "Switching objection handling"
  - type: llm_judge
    criteria: "Legal boundaries are correctly explained — accurately describes what's allowed (bidding on competitor keywords) vs prohibited (using trademarks in copy)"
    weight: 0.20
    description: "Correct legal boundary explanation"
