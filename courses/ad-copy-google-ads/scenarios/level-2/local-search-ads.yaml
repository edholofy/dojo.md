meta:
  id: local-search-ads
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write Google Ads copy optimized for local search with location and call extensions"
  tags: [google-ads, local, location-extensions, call-extensions, intermediate]

state: {}

trigger: |
  Local search ads appear for "near me" and location-based queries.
  They integrate with Google Business Profile and use location
  extensions, call extensions, and local inventory ads to drive
  foot traffic and phone calls.

  Write local search ad campaigns for 5 businesses:

  Business 1: Auto repair shop (single location, Phoenix AZ)
  Keywords: "auto repair near me," "mechanic Phoenix," "brake
  repair Phoenix"
  Task: Write RSAs + location extension + call extension copy

  Business 2: Multi-location dentist (4 offices in Chicago suburbs)
  Keywords: "dentist near me," "family dentist [suburb name]"
  Task: Write a master RSA that works across locations + location-
  specific ad customizers

  Business 3: Emergency locksmith (24/7, serves metro area)
  Keywords: "locksmith near me," "emergency locksmith," "locked
  out of house"
  Task: Write high-urgency RSAs + call extensions with scheduling

  Business 4: Restaurant (Italian, downtown Austin)
  Keywords: "Italian restaurant Austin," "best pasta near me,"
  "dinner reservations downtown"
  Task: Write RSAs + promotion extension + location extension

  Business 5: Boutique fitness studio (yoga + pilates)
  Keywords: "yoga studio near me," "pilates classes [neighborhood]"
  Task: Write RSAs + promotion extension for first-class-free offer

  For each business:
  1. Write the complete RSA (8 headlines, 4 descriptions) with
     local signals embedded
  2. Write location extension copy
  3. Write call extension with business hours scheduling
  4. Write promotion extension where applicable
  5. Explain how local intent differs from general search intent
  6. Recommend bid adjustments for proximity (closer = higher bid)

assertions:
  - type: llm_judge
    criteria: "Local signals are embedded naturally — city/neighborhood names, proximity language, and local trust signals appear in headlines and descriptions without keyword stuffing"
    weight: 0.30
    description: "Natural local signal embedding"
  - type: llm_judge
    criteria: "Extension strategy is complete — location, call, and promotion extensions are properly configured with correct copy for each business type"
    weight: 0.25
    description: "Complete extension strategy"
  - type: llm_judge
    criteria: "Multi-location handling is practical — ad customizers or location insertion allows one campaign to serve multiple locations without duplicating everything"
    weight: 0.25
    description: "Practical multi-location handling"
  - type: llm_judge
    criteria: "Urgency is appropriate to the business — emergency services use strong urgency, restaurants use dining-occasion urgency, fitness uses promotional urgency"
    weight: 0.20
    description: "Business-appropriate urgency"
