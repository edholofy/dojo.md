meta:
  id: display-ad-copy
  level: 2
  course: ad-copy-google-ads
  type: output
  description: "Write responsive display ad copy optimized for the Google Display Network"
  tags: [google-ads, display, responsive-display, gdn, intermediate]

state: {}

trigger: |
  Responsive Display Ads serve across the Google Display Network
  (GDN) — reaching 90%+ of internet users. They use up to 5
  headlines (30 chars), 5 descriptions (90 chars), a long headline
  (90 chars), and a business name (25 chars). Google combines
  these with your images for different placements.

  Unlike search ads, display ads interrupt users who aren't
  actively searching — requiring different copywriting approaches.

  Write responsive display ad copy for 4 campaigns:

  Campaign 1: Brand awareness for a new fintech app
  Audience: 25-40, tech-savvy, interested in personal finance
  Goal: App downloads
  Task: Write 5 headlines, 1 long headline, 5 descriptions,
  business name. Focus on curiosity and value proposition.

  Campaign 2: Retargeting for e-commerce (cart abandoners)
  Audience: Users who added items but didn't purchase
  Goal: Return to complete purchase
  Task: Write display ad copy that reminds without being creepy,
  using urgency and incentives

  Campaign 3: B2B thought leadership
  Audience: Marketing directors, VP-level at mid-market companies
  Goal: Whitepaper downloads
  Task: Write display copy that positions the brand as an expert
  and makes the content offer irresistible

  Campaign 4: Local service promotion
  Audience: Homeowners within 15 miles
  Goal: Request a quote
  Task: Write display copy with strong local relevance and
  trust signals

  For each campaign:
  1. Write all required text assets within character limits
  2. Explain how display copy differs from search copy
  3. Describe the visual context (what type of images would pair
     with this copy)
  4. Address the "interruption" challenge — how do you earn attention
     from someone who wasn't searching?
  5. Recommend placement targeting (topics, sites, audiences)

assertions:
  - type: llm_judge
    criteria: "Copy acknowledges the display context — uses attention-grabbing, curiosity-driven language appropriate for interrupting non-searching users"
    weight: 0.30
    description: "Display-context-appropriate copy"
  - type: llm_judge
    criteria: "All character limits respected — headlines at 30 chars, long headline at 90, descriptions at 90, business name at 25"
    weight: 0.25
    description: "Character limit compliance"
  - type: llm_judge
    criteria: "Copy-to-visual pairing is thoughtful — image recommendations complement the text rather than duplicating the same message"
    weight: 0.25
    description: "Thoughtful copy-visual pairing"
  - type: llm_judge
    criteria: "Retargeting copy is effective but respectful — reminds users of their interest without surveillance-feeling language"
    weight: 0.20
    description: "Effective respectful retargeting"
