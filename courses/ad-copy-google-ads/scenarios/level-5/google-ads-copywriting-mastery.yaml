meta:
  id: google-ads-copywriting-mastery
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Demonstrate mastery of all Google Ads copywriting skills through an integrated client engagement"
  tags: [google-ads, mastery, integration, client-engagement, portfolio]

state: {}

trigger: |
  Demonstrate Google Ads copywriting mastery through a complete
  client engagement simulation. This scenario requires integrating
  every skill from Levels 1-4 into a single, cohesive deliverable.

  Client: "Atlas Financial" — Online personal finance platform
  Products: Budgeting app (free), Investment advisory ($29/month),
  Tax preparation ($49/filing), Financial planning ($199/session)
  Markets: US nationwide, expanding to Canada and UK
  Monthly ad spend: $200,000
  Current state: Basic Search campaigns, 2.5x ROAS, declining CTR
  Competition: Mint, Personal Capital, TurboTax, Wealthfront

  Engagement scope (deliver all of the following):

  Deliverable 1: Audit and diagnosis
  - Review the current ad copy (provided examples below) and
    diagnose all issues
  - Current search ad: "Financial Tools Online | Manage Your Money
    Better | #1 Finance App"
  - Current display ad: "Try Atlas Financial Today"
  - Current YouTube: No video ads running
  - Quality Score: Average 4.2/10
  - CTR: 1.8% (industry avg: 3.5%)

  Deliverable 2: Strategy document
  - Campaign architecture across all Google Ads formats
  - Audience strategy with segment-specific messaging
  - Budget allocation across channels and funnel stages
  - Competitive positioning strategy
  - International expansion copy plan (Canada, UK)

  Deliverable 3: Complete copy deck
  - Search RSAs for 8 ad groups (10 headlines + 4 descriptions each)
  - Performance Max asset groups (4 product lines)
  - YouTube scripts (2 bumper, 2 skippable, 1 non-skippable)
  - Display remarketing ads (4 audience segments)
  - Demand Gen campaigns (2 audience targets)
  - All extensions (sitelinks, callouts, structured snippets)
  - DKI headlines where appropriate
  - Ad customizers for seasonal campaigns

  Deliverable 4: Testing and optimization plan
  - 6-month testing roadmap with prioritized hypotheses
  - A/B test designs for top 5 experiments
  - Performance benchmarks and success criteria
  - Copy refresh cadence and creative rotation plan

  Deliverable 5: Reporting framework
  - Monthly performance report template
  - Quarterly creative review structure
  - Annual strategy review format
  - ROI measurement methodology

assertions:
  - type: llm_judge
    criteria: "Audit diagnosis is thorough — identifies specific copy, structural, and strategic issues with the current account and provides data-backed reasoning"
    weight: 0.25
    description: "Thorough audit diagnosis"
  - type: llm_judge
    criteria: "Strategy and copy are integrated — the copy deck directly executes the strategy document, with clear connections between strategic decisions and ad copy"
    weight: 0.25
    description: "Integrated strategy and copy"
  - type: llm_judge
    criteria: "All deliverables are complete and high-quality — every section from audit through reporting is fully developed, not just outlined"
    weight: 0.25
    description: "Complete high-quality deliverables"
  - type: llm_judge
    criteria: "International expansion is well-planned — Canada and UK copy adaptations go beyond superficial changes to address market-specific opportunities"
    weight: 0.25
    description: "Well-planned international expansion"
