meta:
  id: google-ads-roi-measurement
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Measure and prove the ROI of Google Ads copywriting through advanced attribution and testing"
  tags: [google-ads, roi, measurement, attribution, value-proof, mastery]

state: {}

trigger: |
  Proving the ROI of ad copy improvement is one of the hardest
  challenges in digital advertising. How do you isolate the impact
  of better headlines from other variables (bidding, targeting,
  seasonality, landing pages)?

  Build comprehensive ROI measurement frameworks:

  Part 1: Isolating copy impact
  Design controlled experiments for 3 scenarios:

  Scenario A: Headline optimization impact
  Business: B2B SaaS ($199/month)
  Experiment: Run identical campaigns with only headline variations
  for 4 weeks across matched geographic regions
  Task: Design the experiment, write the control and test copy,
  define the measurement methodology, and write the results
  interpretation framework

  Scenario B: Full creative refresh impact
  Business: E-commerce ($80 avg AOV)
  Experiment: Refresh all ad copy simultaneously vs incremental
  refresh, measuring total revenue impact
  Task: Design A/B/C test (full refresh vs incremental vs control)
  with copy for all three groups

  Scenario C: Extension copy optimization impact
  Business: Local service company
  Experiment: Test the impact of optimized sitelinks, callouts,
  and structured snippets on overall campaign performance
  Task: Design the isolation test and write optimized extensions

  Part 2: Attribution modeling for copy
  1. Explain how different attribution models (last-click,
     data-driven, linear, time-decay) affect copy performance
     assessment
  2. Design a copy-specific attribution approach
  3. Calculate the lifetime value of a "great headline" using
     compound CTR and conversion improvements

  Part 3: Financial modeling
  1. Build a Google Ads copy ROI calculator:
     Input: Current CTR, conversion rate, CPC, monthly spend
     Output: Revenue impact of each 0.5% CTR improvement
  2. Calculate the value of a 1-point Quality Score improvement
  3. Model the compound effect of copy improvements over 12 months

  Part 4: Presenting ROI to stakeholders
  1. Write the "copy optimization value" presentation for C-suite
  2. Create the monthly ROI dashboard structure
  3. Design the annual copy investment justification

assertions:
  - type: llm_judge
    criteria: "Experiments are well-designed — properly isolate copy variables from other factors (bidding, targeting, seasonality) to measure true copy impact"
    weight: 0.30
    description: "Well-designed isolation experiments"
  - type: llm_judge
    criteria: "Financial modeling is rigorous — ROI calculations use realistic assumptions, compound effects, and sensitivity analysis"
    weight: 0.25
    description: "Rigorous financial modeling"
  - type: llm_judge
    criteria: "Attribution approach is sophisticated — goes beyond simple last-click to consider how copy influences users at different touchpoints"
    weight: 0.25
    description: "Sophisticated attribution approach"
  - type: llm_judge
    criteria: "Stakeholder presentation is compelling — translates technical copy metrics into business impact language that executives understand"
    weight: 0.20
    description: "Compelling stakeholder presentation"
