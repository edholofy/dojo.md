meta:
  id: google-ads-creative-strategy
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Develop a comprehensive creative strategy that connects Google Ads copy to broader marketing narratives"
  tags: [google-ads, creative-strategy, brand-narrative, marketing, mastery]

state: {}

trigger: |
  Creative strategy connects Google Ads copy to the broader brand
  narrative and marketing mix. It ensures that every ad — across
  Search, Display, YouTube, and PMax — tells a consistent story
  while adapting to channel and audience.

  Develop a comprehensive creative strategy:

  Brand: "Meridian Health" — Digital health platform
  Products:
  1. Telehealth consultations ($49/visit)
  2. Mental wellness app ($12.99/month)
  3. Health coaching ($199/month)
  4. Corporate wellness program ($5/employee/month)

  Brand positioning: "Healthcare that fits your life" — accessible,
  modern, judgment-free healthcare

  Target audiences:
  - Young professionals (25-35) — time-poor, health-conscious
  - Parents (30-45) — need convenient family healthcare
  - HR leaders — seeking employee wellness solutions
  - Seniors (60+) — need technology-assisted healthcare

  Part 1: Creative platform
  1. Define the core creative idea that unifies all advertising
  2. Write the creative brief for each product line
  3. Develop 3 campaign concepts with working titles:
     - A rational/benefit-focused concept
     - An emotional/story-focused concept
     - A social proof/community-focused concept
  4. Write example ads for each concept across all Google Ads formats

  Part 2: Audience-specific creative
  1. Write the creative adaptation for each target audience:
     - Young professionals: Search, YouTube, Demand Gen
     - Parents: Search, Display, YouTube
     - HR leaders: Search, LinkedIn (for reference), Display
     - Seniors: Search, Display, YouTube non-skippable
  2. Explain how the core creative idea adapts for each audience
     while maintaining brand consistency

  Part 3: Cross-channel narrative
  1. Map the customer journey through Google Ads channels:
     Awareness (YouTube/Display) → Consideration (Search/Demand Gen)
     → Conversion (Search/PMax) → Retention (Display/Gmail)
  2. Write the narrative thread that connects each touchpoint
  3. Define the visual and verbal identity across channels

  Part 4: Creative testing roadmap
  1. Design a 6-month creative testing plan
  2. Prioritize which creative elements to test first
  3. Define the creative refresh cadence by channel
  4. Build the creative performance scorecard

assertions:
  - type: llm_judge
    criteria: "Creative platform is unifying — the core creative idea ties together all products, audiences, and channels into a coherent brand story"
    weight: 0.30
    description: "Unifying creative platform"
  - type: llm_judge
    criteria: "Audience adaptations maintain brand consistency — each audience version feels like the same brand while addressing genuinely different needs"
    weight: 0.25
    description: "Consistent audience adaptations"
  - type: llm_judge
    criteria: "Cross-channel narrative is seamless — the customer journey across Google Ads channels tells a progressive story"
    weight: 0.25
    description: "Seamless cross-channel narrative"
  - type: llm_judge
    criteria: "Creative testing roadmap is strategic — prioritizes high-impact tests and defines clear success criteria"
    weight: 0.20
    description: "Strategic creative testing roadmap"
