meta:
  id: enterprise-google-ads-governance
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Design enterprise governance for Google Ads copy across brands, markets, and agencies"
  tags: [google-ads, enterprise, governance, multi-brand, multi-market, mastery]

state: {}

trigger: |
  Enterprise organizations with multiple brands, markets, and
  agency partners face unique Google Ads governance challenges.
  Without centralized copy standards, brand voice fractures,
  compliance risks multiply, and optimization learnings stay siloed.

  Design an enterprise Google Ads copy governance system:

  Organization: Global technology company
  - 4 product brands (Cloud, Security, AI Platform, Developer Tools)
  - 15 markets (NA, EMEA, APAC, LATAM regions)
  - 2 global agencies + 5 regional agencies
  - Total monthly Google Ads spend: $3M
  - 1,500+ active campaigns across all brands and markets

  Part 1: Governance framework
  1. Create centralized copy guidelines:
     - Brand voice parameters for each product brand
     - Shared compliance standards (legal, regulatory, trademark)
     - Quality scoring rubric for copy review
     - Approval workflow tiers (self-service, manager review,
       legal review, brand review)
  2. Design the role structure:
     - Global PPC copy director
     - Regional copy leads
     - Brand copy managers
     - Agency copy teams
  3. Build the compliance management system:
     - Pre-publication checklist by market
     - Automated compliance scanning rules
     - Issue escalation and resolution process

  Part 2: Cross-brand and cross-market coordination
  1. Design the learning sharing system:
     - Winning copy patterns that transfer across brands
     - Market-specific insights (what works in APAC vs EMEA)
     - Testing learnings database and metadata tagging
  2. Create the copy asset library:
     - Shared headline templates by product category
     - Market-specific description modules
     - Brand-specific CTA and extension libraries
  3. Build the agency onboarding program:
     - Training curriculum for new agency teams
     - Brand immersion materials
     - Copy production standards document

  Part 3: Performance and quality standards
  1. Define copy KPIs across the organization
  2. Create the monthly copy performance review process
  3. Design the quarterly brand voice audit
  4. Build the annual copy strategy planning framework

  Part 4: Technology stack
  1. Recommend the copy management platform
  2. Design the approval workflow in project management tools
  3. Set up automated quality checks
  4. Integration with Google Ads editor and API

assertions:
  - type: llm_judge
    criteria: "Governance balances control with agility — provides guardrails without creating bureaucratic bottlenecks that slow down campaign launches"
    weight: 0.30
    description: "Control-agility balanced governance"
  - type: llm_judge
    criteria: "Cross-brand learning system captures value — shows how Cloud brand copy insights can inform Security brand strategy through abstracted principles"
    weight: 0.25
    description: "Value-capturing cross-brand learning"
  - type: llm_judge
    criteria: "Multi-market compliance is thorough — addresses regulatory differences across NA, EMEA, and APAC without oversimplifying"
    weight: 0.25
    description: "Thorough multi-market compliance"
  - type: llm_judge
    criteria: "Agency management is realistic — onboarding, quality control, and communication processes reflect real agency relationship dynamics"
    weight: 0.20
    description: "Realistic agency management"
