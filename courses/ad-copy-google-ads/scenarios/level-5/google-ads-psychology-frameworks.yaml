meta:
  id: google-ads-psychology-frameworks
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Apply advanced persuasion psychology to Google Ads copy across search and display formats"
  tags: [google-ads, psychology, persuasion, behavioral-science, mastery]

state: {}

trigger: |
  Master-level Google Ads copywriters understand the cognitive
  science behind search behavior, click decisions, and conversion
  psychology. Search ads have unique psychological dynamics:
  users are in active search mode, comparing options, and making
  decisions under time pressure.

  Apply 6 psychological frameworks to Google Ads copy:

  Framework 1: Processing fluency
  Product: Cloud storage service ($9.99/month)
  Principle: People prefer things that are easy to process mentally
  Challenge: Simplify a technical product into instantly
  understandable ad copy
  Task: Write 3 RSA variations — one with high fluency (simple),
  one with medium, one with low (technical). Predict click behavior.

  Framework 2: Serial position effect
  Product: E-commerce fashion ($50-$200 items)
  Principle: People remember the first and last items in a list best
  Challenge: Arrange RSA headlines so the most important messages
  appear in position 1 and 3 (last shown)
  Task: Write pinned RSAs exploiting the primacy and recency effects

  Framework 3: Paradox of choice
  Product: Insurance comparison website (auto, home, life, health,
  pet, travel, renters, umbrella)
  Principle: Too many options paralyze decision-making
  Challenge: Write ads that focus on one insurance type per ad group
  vs one ad that lists all types. Compare expected performance.

  Framework 4: Prospect theory and loss aversion
  Product: Cybersecurity for SMBs ($149/month)
  Principle: Losses feel 2x more painful than equivalent gains
  Challenge: Write gain-framed ads ("Protect your business") vs
  loss-framed ads ("Don't lose $50K to a data breach"). Test both.

  Framework 5: Authority bias
  Product: Online learning platform ($99/course)
  Principle: People defer to recognized authorities
  Challenge: Write ads emphasizing instructor credentials,
  university partnerships, and industry certifications
  Task: Write authority-heavy vs peer-proof-heavy ad versions

  Framework 6: Commitment and consistency
  Product: B2B consulting ($10,000+ engagements)
  Principle: Once someone takes a small step, they're more likely
  to take larger steps
  Challenge: Write a progressive commitment sequence —
  free guide → free consultation → paid engagement
  Task: Write ads for each commitment stage

  For each framework:
  1. Explain the psychological principle in 2-3 sentences
  2. Write complete Google Ads applying the framework
  3. Write a control version without the framework
  4. Predict the performance difference with reasoning
  5. Identify the ethical boundary
  6. Explain how the search context (active decision-making)
     amplifies or moderates the psychological effect

assertions:
  - type: llm_judge
    criteria: "Psychological frameworks are correctly applied to search context — accounts for how active search behavior interacts with each cognitive bias"
    weight: 0.30
    description: "Context-correct framework application"
  - type: llm_judge
    criteria: "Control versions provide meaningful contrast — the version without the framework is noticeably less effective, validating the principle"
    weight: 0.25
    description: "Meaningful control contrast"
  - type: llm_judge
    criteria: "Ethical boundaries are honestly assessed — each framework includes where persuasion ends and manipulation begins"
    weight: 0.25
    description: "Honest ethical assessment"
  - type: llm_judge
    criteria: "Search-specific dynamics are addressed — explains why some psychological effects are stronger or weaker in search vs other channels"
    weight: 0.20
    description: "Search-specific dynamics"
