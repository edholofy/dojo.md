meta:
  id: google-ads-agency-system
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Build a complete agency-level Google Ads copy production system for managing multiple clients"
  tags: [google-ads, agency, production-system, scalability, mastery]

state: {}

trigger: |
  A Google Ads agency managing 20+ clients needs a systematic
  approach to copy production, quality control, client communication,
  and continuous optimization. Without systems, quality degrades
  as the agency scales.

  Design a complete agency copy production system:

  Agency profile: "PPC Mastery Agency"
  - 25 active clients across 8 industries
  - 4 account managers, 2 copywriters, 1 creative director
  - Total monthly ad spend managed: $750,000
  - Monthly deliverable: 100+ new RSAs, 50+ display ads,
    20+ YouTube scripts across all clients

  Part 1: Copy production workflow
  1. Design the client onboarding copy process:
     - Brand voice intake questionnaire
     - Competitive analysis template
     - Copy brief template
     - Initial campaign copy deck structure
  2. Create the ongoing copy production process:
     - Monthly copy refresh cadence
     - Creative brief to final copy workflow
     - Review and approval chain
     - Quality scoring rubric (1-5 scale)

  Part 2: Copy templates and frameworks
  1. Create RSA templates by industry:
     - E-commerce, SaaS, Local Services, Professional Services
  2. Design the headline library system (categorized, searchable)
  3. Build description templates with variable slots
  4. Create extension copy libraries by business type

  Part 3: Quality assurance
  1. Design the copy QA checklist (pre-publication)
  2. Create the monthly copy audit process
  3. Build the performance benchmark database
  4. Define the escalation process for underperforming copy

  Part 4: Client communication
  1. Write the monthly copy performance report template
  2. Create the quarterly strategy review deck outline
  3. Design the copy recommendation presentation format
  4. Write the "why we changed your ads" communication template

  Part 5: Team development
  1. Create the copywriter training curriculum
  2. Design the copy review feedback framework
  3. Build the knowledge-sharing system for cross-client learnings

assertions:
  - type: llm_judge
    criteria: "Production system is scalable — can handle 25+ clients without quality degradation, with clear workflows that any trained team member can follow"
    weight: 0.30
    description: "Scalable production system"
  - type: llm_judge
    criteria: "Templates are practical — RSA templates, headline libraries, and description frameworks save real time while maintaining quality"
    weight: 0.25
    description: "Practical time-saving templates"
  - type: llm_judge
    criteria: "Quality assurance is rigorous — QA checklists and audit processes catch errors before publication and identify optimization opportunities"
    weight: 0.25
    description: "Rigorous quality assurance"
  - type: llm_judge
    criteria: "Client communication is professional — reports, strategy decks, and change explanations build client trust and demonstrate value"
    weight: 0.20
    description: "Professional client communication"
