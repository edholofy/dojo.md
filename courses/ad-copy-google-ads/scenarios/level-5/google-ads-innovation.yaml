meta:
  id: google-ads-innovation
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Pioneer innovative Google Ads copy approaches using emerging formats and creative techniques"
  tags: [google-ads, innovation, emerging-formats, creative, mastery]

state: {}

trigger: |
  Innovation in Google Ads copy means pushing beyond conventional
  best practices to discover new approaches that create competitive
  advantage. This requires understanding emerging formats, testing
  unconventional copy strategies, and anticipating where Google Ads
  is heading.

  Pioneer innovative approaches across 5 areas:

  Area 1: Conversational ad copy
  Traditional search ads use formal, benefit-driven language.
  Test a conversational approach that mirrors how people actually talk.
  Business: Online therapy platform ($65/session)
  Task: Write RSAs in a conversational, first-person tone that
  feels like a friend's recommendation rather than an advertisement.
  Compare with traditional benefit-driven copy.

  Area 2: Story-driven search ads
  Search ads typically focus on features and CTAs. Test a
  micro-storytelling approach within character limits.
  Business: Career coaching service ($500/package)
  Task: Write RSAs that tell a miniature story arc (problem →
  turning point → outcome) entirely within 30-char headlines
  and 90-char descriptions.

  Area 3: Question-based ad copy
  Instead of statements, test ads that are entirely questions.
  Business: Home renovation service
  Task: Write RSAs where every headline is a question. Compare
  engagement predictions with statement-based ads.

  Area 4: Anti-advertising copy
  Break conventional ad patterns with radical honesty and
  transparency that stands out in a sea of optimized copy.
  Business: Budget accounting software ($9/month)
  Task: Write ads that use radical honesty ("We're not the best,
  but we're the simplest") and predict whether authenticity
  outperforms polished marketing copy.

  Area 5: Interactive ad experiences
  Design Google Ads copy that creates engagement beyond the click —
  using lead form extensions, call extensions, and messaging
  extensions as interactive entry points.
  Business: Custom furniture maker ($2,000-$10,000 pieces)
  Task: Write ad copy that creates a conversational funnel
  through lead form questions, turning the ad itself into a
  qualifying experience.

  For each area:
  1. Write the innovative ad copy
  2. Write the conventional comparison version
  3. Predict which performs better and for which metrics (CTR vs
     conversion rate vs CPA)
  4. Identify the risks of the innovative approach
  5. Design the test methodology to validate the innovation
  6. Explain when this approach would and wouldn't work

assertions:
  - type: llm_judge
    criteria: "Innovations are genuinely creative — each approach represents a meaningful departure from conventional Google Ads copy rather than superficial changes"
    weight: 0.30
    description: "Genuinely creative innovations"
  - type: llm_judge
    criteria: "Risk assessment is honest — acknowledges that innovations may underperform conventional approaches and identifies specific failure scenarios"
    weight: 0.25
    description: "Honest risk assessment"
  - type: llm_judge
    criteria: "Testing methodology is rigorous — provides proper experiment design to validate each innovation rather than just implementing and hoping"
    weight: 0.25
    description: "Rigorous testing methodology"
  - type: llm_judge
    criteria: "Contextual recommendations are clear — specifies which business types, audiences, and situations each innovative approach suits best"
    weight: 0.20
    description: "Clear contextual recommendations"
