meta:
  id: google-ads-mastery-challenge
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Complete a comprehensive Google Ads mastery challenge testing all skills across formats and strategies"
  tags: [google-ads, mastery, comprehensive, challenge, assessment]

state: {}

trigger: |
  This mastery challenge tests all Google Ads copywriting skills
  in a single, complex scenario that mirrors real-world agency work.

  Client brief: "GreenBuild Construction"
  - Services: Residential solar installation, energy-efficient
    windows, insulation, HVAC systems, EV charger installation
  - Service area: 3 states (California, Texas, Florida)
  - Target: Homeowners, property managers, commercial buildings
  - Budget: $120,000/month across all channels
  - Current state: Running basic search campaigns only, ROAS 2.1x
  - Goal: Expand to all Google Ads channels, achieve 4x ROAS,
    and become the dominant player in green home improvement

  Complete all of the following:

  Challenge 1: Campaign architecture (15 min)
  Design the full campaign structure: Search, Shopping (for products
  like solar panels), Performance Max, YouTube, Display, and
  Demand Gen. Define each campaign's role, budget, and audience.

  Challenge 2: Search copy (20 min)
  Write RSAs for 6 ad groups:
  1. Solar installation (branded)
  2. Solar installation (non-branded)
  3. Energy-efficient windows
  4. EV charger installation
  5. Competitor terms
  6. Emergency HVAC repair

  Challenge 3: Performance Max (10 min)
  Write 3 asset groups: Solar, Windows/Insulation, HVAC

  Challenge 4: YouTube (10 min)
  Write scripts for: 1 bumper ad (brand), 1 skippable ad (solar),
  1 non-skippable ad (seasonal HVAC)

  Challenge 5: Remarketing (10 min)
  Write remarketing sequences for: Quote requesters who didn't
  close, past customers for cross-sell, website browsers

  Challenge 6: Seasonal strategy (10 min)
  Write summer (AC/solar peak) and winter (insulation/heating)
  campaign transitions

  Challenge 7: Reporting (5 min)
  Write the executive summary for a monthly performance report

  Submit all deliverables with character count verification.

assertions:
  - type: llm_judge
    criteria: "All deliverables are complete — every challenge section is addressed with full, character-compliant ad copy across all required formats"
    weight: 0.25
    description: "Complete deliverable coverage"
  - type: llm_judge
    criteria: "Campaign architecture is cohesive — all channels work together as a unified strategy rather than disconnected campaigns"
    weight: 0.25
    description: "Cohesive campaign architecture"
  - type: llm_judge
    criteria: "Copy quality is consistently high — even under time pressure simulation, every ad is compelling, specific, and differentiated"
    weight: 0.25
    description: "Consistently high copy quality"
  - type: llm_judge
    criteria: "Strategic thinking is demonstrated — budget allocation, seasonal transitions, and remarketing sequences show sophisticated strategic reasoning"
    weight: 0.25
    description: "Demonstrated strategic thinking"
