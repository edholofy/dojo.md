meta:
  id: google-ads-cross-platform
  level: 5
  course: ad-copy-google-ads
  type: output
  description: "Design cross-platform ad copy strategy integrating Google Ads with Meta, LinkedIn, and Microsoft Ads"
  tags: [google-ads, cross-platform, meta, linkedin, microsoft, mastery]

state: {}

trigger: |
  Most businesses don't run Google Ads in isolation — they
  coordinate across Google, Meta, LinkedIn, and Microsoft Ads.
  Mastery-level copywriters understand how ad copy should adapt
  across platforms while maintaining brand consistency.

  Design a cross-platform ad copy strategy:

  Business: "DataPulse" — B2B analytics SaaS ($99-$499/month)
  Total monthly ad budget: $80,000 across all platforms
  - Google Ads: $35,000 (Search + PMax + YouTube)
  - Meta Ads: $20,000 (Feed + Reels + Stories)
  - LinkedIn Ads: $15,000 (Sponsored Content + InMail)
  - Microsoft Ads: $10,000 (Search + Audience Network)

  Part 1: Platform-specific copy adaptation
  Write the same campaign across all 4 platforms:
  Campaign: "Free Trial Launch — Business Analytics Tool"

  Google Search RSA: 10 headlines (30 chars), 4 descriptions (90 chars)
  Google YouTube: 1 skippable in-stream script (25 seconds)
  Meta Feed Ad: Primary text (125 visible), headline (40 chars),
  description (30 chars)
  LinkedIn Sponsored Content: Intro text (150 chars visible),
  headline (70 chars)
  Microsoft Search Ad: 15 headlines (30 chars), 4 descriptions
  (90 chars)

  For each platform version:
  - Adapt tone and style to platform norms
  - Adjust CTA to platform user behavior
  - Optimize for platform-specific character limits

  Part 2: Cross-platform messaging consistency
  1. Define the unified brand message
  2. Identify what stays the same across platforms (core value prop)
  3. Identify what adapts per platform (tone, CTA, format)
  4. Create the cross-platform messaging matrix

  Part 3: Attribution and measurement
  1. Design the cross-platform attribution model
  2. Explain how to measure incremental lift from each platform
  3. Define when to shift budget between platforms
  4. Create the unified reporting dashboard

  Part 4: Cross-platform remarketing
  1. Write remarketing ads for users who:
     - Saw YouTube ad → Target on Google Search
     - Clicked LinkedIn ad → Retarget on Meta
     - Visited from Google → Retarget on Microsoft Audience Network
  2. Explain the cross-platform remarketing copy strategy

assertions:
  - type: llm_judge
    criteria: "Platform adaptations are authentic — copy feels native to each platform's user experience rather than the same ad forced into different character limits"
    weight: 0.30
    description: "Authentic platform adaptations"
  - type: llm_judge
    criteria: "Brand consistency is maintained — despite platform-specific adaptations, the core brand message and positioning remain recognizable across all platforms"
    weight: 0.25
    description: "Cross-platform brand consistency"
  - type: llm_judge
    criteria: "Cross-platform remarketing strategy is sophisticated — leverages user data from one platform to inform messaging on another"
    weight: 0.25
    description: "Sophisticated cross-platform remarketing"
  - type: llm_judge
    criteria: "Budget allocation is data-informed — distributes spend based on platform strengths and the B2B SaaS buyer journey"
    weight: 0.20
    description: "Data-informed budget allocation"
