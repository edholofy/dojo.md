meta:
  id: pmax-vs-search-strategy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Design complementary Performance Max and Search campaign copy strategies"
  tags: [google-ads, performance-max, search, campaign-strategy, expert]

state: {}

trigger: |
  Performance Max and Search campaigns can complement or
  cannibalize each other. When both are running, Search campaigns
  take priority for exact keyword matches, but PMax can still
  capture related search traffic. The copy strategy must ensure
  they work together.

  Design complementary PMax + Search strategies for 3 businesses:

  Business 1: Multi-category e-commerce (clothing, accessories, home)
  Search campaigns: Brand terms, top product categories,
  competitor terms
  Performance Max: Product feed + creative assets
  Problem: PMax is cannibalizing brand search traffic and
  converting at lower efficiency
  Task: Redesign copy for both campaign types to prevent overlap
  while maximizing coverage

  Business 2: B2B SaaS with multiple products
  Products: CRM ($49/month), Email Marketing ($29/month),
  Analytics ($39/month), Bundle ($99/month)
  Search campaigns: Product-specific terms, competitor terms
  Performance Max: Brand awareness + lead generation
  Problem: PMax shows CRM ads to people searching for analytics,
  confusing the messaging
  Task: Design asset group segmentation in PMax that aligns
  with Search campaign ad groups

  Business 3: Local service business with national ambitions
  Current: 5 locations, expanding to 10
  Search campaigns: Local keywords per location
  Performance Max: Lead generation across all service areas
  Problem: PMax is spending in areas where the business doesn't
  yet serve, generating waste
  Task: Write location-specific PMax asset groups that complement
  existing Search campaigns

  For each business:
  1. Write Search RSAs (8 headlines, 4 descriptions per ad group)
  2. Write PMax asset groups (5 headlines, 5 long headlines,
     5 descriptions per asset group)
  3. Define the boundary between Search and PMax responsibility
  4. Set up brand exclusion rules for PMax
  5. Create the shared negative keyword lists
  6. Design the performance comparison framework
  7. Recommend budget allocation between Search and PMax

assertions:
  - type: llm_judge
    criteria: "Campaign boundaries are clear — each campaign type has a defined role with copy that serves that specific purpose without stepping on the other"
    weight: 0.30
    description: "Clear campaign boundaries"
  - type: llm_judge
    criteria: "Cannibalization prevention is specific — brand exclusions, negative keywords, and copy differentiation prevent wasteful overlap"
    weight: 0.25
    description: "Specific cannibalization prevention"
  - type: llm_judge
    criteria: "PMax asset groups are properly segmented — different product lines or service areas have distinct asset groups rather than one generic set"
    weight: 0.25
    description: "Properly segmented PMax assets"
  - type: llm_judge
    criteria: "Budget allocation reflects complementary strategy — spending is distributed based on each campaign type's strengths and the business's needs"
    weight: 0.20
    description: "Complementary budget allocation"
