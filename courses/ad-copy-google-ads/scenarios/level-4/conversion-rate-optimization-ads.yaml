meta:
  id: conversion-rate-optimization-ads
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Optimize Google Ads copy specifically for conversion rate improvement using behavioral science"
  tags: [google-ads, cro, conversion-rate, behavioral-science, expert]

state: {}

trigger: |
  Conversion rate optimization in Google Ads goes beyond basic
  copy improvements. Expert-level CRO applies behavioral science
  principles to ad copy: anchoring, social proof hierarchy,
  loss aversion, choice architecture, and commitment devices.

  Apply CRO techniques to 5 campaigns with below-average
  conversion rates:

  Campaign 1: Anchoring effect
  Business: SaaS project tool ($29/month)
  Current conversion rate: 2.1% (industry avg: 3.5%)
  Current ad: Lists price as "$29/month"
  Task: Apply anchoring — show original price, competitor price,
  or per-day pricing to make $29 feel smaller. Write 3 ad
  variations using different anchoring techniques.

  Campaign 2: Social proof hierarchy
  Business: Online course platform ($199 course)
  Current conversion rate: 1.8%
  Current ad: "Thousands of students enrolled"
  Task: Apply social proof hierarchy — expert endorsement >
  specific numbers > vague claims. Write 3 versions escalating
  proof strength.

  Campaign 3: Loss aversion
  Business: Cybersecurity service ($99/month)
  Current conversion rate: 1.5%
  Current ad: Focuses on features of protection
  Task: Apply loss aversion — frame messaging around what users
  LOSE without protection rather than what they GAIN with it.
  Write gain-framed vs loss-framed versions.

  Campaign 4: Choice reduction
  Business: Insurance comparison site (multiple products)
  Current conversion rate: 0.8%
  Current ad: "Compare Auto, Home, Life, Health, Pet, Travel,
  Renters Insurance"
  Task: Apply choice reduction — reduce cognitive overload by
  focusing on one insurance type per ad group. Write single-
  product-focused ads.

  Campaign 5: Commitment devices
  Business: Weight loss program ($49/month)
  Current conversion rate: 2.0%
  Current ad: "Start your weight loss journey today"
  Task: Apply foot-in-the-door technique — free assessment →
  free week → paid subscription. Write ads for each commitment step.

  For each campaign:
  1. Explain the behavioral science principle in 2-3 sentences
  2. Write the before (current) and after (optimized) ads
  3. Predict the conversion rate lift with reasoning
  4. Identify the ethical boundary for each technique
  5. Design the A/B test to validate the approach

assertions:
  - type: llm_judge
    criteria: "Behavioral science principles are correctly applied — anchoring, social proof hierarchy, loss aversion, and choice architecture are accurately implemented"
    weight: 0.30
    description: "Correctly applied behavioral science"
  - type: llm_judge
    criteria: "Before/after contrast is compelling — optimized versions clearly demonstrate the behavioral principle's impact compared to the current copy"
    weight: 0.25
    description: "Compelling before-after contrast"
  - type: llm_judge
    criteria: "Ethical boundaries are thoughtfully addressed — each technique includes an honest assessment of where optimization becomes manipulation"
    weight: 0.25
    description: "Thoughtful ethical boundaries"
  - type: llm_judge
    criteria: "A/B test designs are rigorous — testing methodology isolates the behavioral variable and defines success criteria"
    weight: 0.20
    description: "Rigorous A/B test designs"
