meta:
  id: full-funnel-campaign-copy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Design end-to-end full-funnel Google Ads copy across all campaign types and formats"
  tags: [google-ads, full-funnel, campaign-architecture, expert]

state: {}

trigger: |
  A full-funnel Google Ads strategy coordinates copy across Search,
  Display, YouTube, Shopping, Performance Max, and Demand Gen to
  guide users from awareness through conversion and retention.

  Design a complete full-funnel campaign for:

  Business: "TechFlow" — Project management SaaS
  Price: Free plan, Pro $15/user/month, Enterprise $35/user/month
  Target: Teams of 5-100 at SMBs and mid-market companies
  Industry: Technology, marketing agencies, professional services
  Monthly ad budget: $50,000
  Current state: Good brand recognition in tech, low awareness
  in other industries

  Funnel stage 1: Awareness ($10K budget)
  Formats: YouTube bumper ads, Demand Gen, Display prospecting
  Audience: In-market for project management, affinity for business
  technology, custom segments (competitor website visitors)
  Task: Write copy for all 3 formats that introduces TechFlow
  to cold audiences

  Funnel stage 2: Consideration ($15K budget)
  Formats: Search RSAs (non-brand), YouTube skippable, Demand Gen
  Audience: Searched "project management tools," "team collaboration
  software," "Slack alternatives," competitor brand terms
  Task: Write copy that differentiates TechFlow and drives
  website visits

  Funnel stage 3: Conversion ($20K budget)
  Formats: Search RSAs (brand + high-intent), Performance Max,
  remarketing (search + display)
  Audience: Website visitors, free trial users, pricing page viewers,
  brand searchers
  Task: Write copy that drives free trial signups and demo requests

  Funnel stage 4: Expansion ($5K budget)
  Formats: Display remarketing, Gmail, Search (branded upgrade terms)
  Audience: Free users, expired trial users, Pro users (for Enterprise
  upgrade), churned users
  Task: Write copy that drives upgrades, prevents churn, and
  wins back lost users

  For the complete funnel:
  1. Write all ad copy for every format at every stage
  2. Define audience flow — how users move between stages
  3. Map the attribution model (what gets credit at each stage)
  4. Create the exclusion rules (prevent cannibalization)
  5. Design the budget reallocation triggers (when to shift spend)
  6. Build the reporting dashboard structure

assertions:
  - type: llm_judge
    criteria: "Funnel stages are cohesive — messaging at each stage builds on the previous one, creating a continuous narrative from awareness to expansion"
    weight: 0.30
    description: "Cohesive funnel stage progression"
  - type: llm_judge
    criteria: "Format-specific copy is optimized — YouTube scripts differ from Search RSAs which differ from Display copy, each leveraging the format's strengths"
    weight: 0.25
    description: "Format-optimized copy"
  - type: llm_judge
    criteria: "Budget allocation is strategic — distributes spend based on funnel economics, not equal splits, with clear reallocation triggers"
    weight: 0.25
    description: "Strategic budget allocation"
  - type: llm_judge
    criteria: "Exclusion rules prevent cannibalization — clearly defines how to prevent ads from competing with each other across funnel stages"
    weight: 0.20
    description: "Cannibalization-preventing exclusions"
