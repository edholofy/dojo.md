meta:
  id: high-ticket-google-ads
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Write Google Ads copy for high-ticket products and services with long sales cycles"
  tags: [google-ads, high-ticket, enterprise, long-sales-cycle, expert]

state: {}

trigger: |
  High-ticket products ($5,000+) and long sales cycles require
  fundamentally different ad copy than e-commerce or SaaS free
  trials. Buyers need education, trust, and multiple touchpoints
  before committing.

  Write Google Ads campaigns for 5 high-ticket businesses:

  Business 1: Enterprise ERP software ($50,000-$500,000 implementation)
  Sales cycle: 6-12 months, 4-8 stakeholders involved
  Entry point: Whitepaper download or demo request
  Task: Write search ads that attract decision-makers, not researchers

  Business 2: Luxury real estate ($1M+ properties)
  Sales cycle: 3-18 months
  Entry point: Property tour scheduling or brochure request
  Task: Write ads that qualify serious buyers without alienating
  aspiring ones

  Business 3: Executive coaching program ($25,000 for 6 months)
  Sales cycle: 1-3 months
  Entry point: Discovery call booking
  Task: Write ads that convey premium value and attract C-suite buyers

  Business 4: Commercial solar installation ($100,000-$1M projects)
  Sales cycle: 3-12 months, involves CFO, facilities, and operations
  Entry point: Site assessment or ROI consultation
  Task: Write ads focused on financial return and energy independence

  Business 5: Custom home builder ($500,000-$2M homes)
  Sales cycle: 6-24 months
  Entry point: Consultation or portfolio viewing
  Task: Write ads that attract qualified buyers building custom homes

  For each business:
  1. Write the search RSA (10 headlines, 4 descriptions) focused on
     the appropriate entry point — NOT direct sale
  2. Write display remarketing ads for each stage of the long sales cycle
  3. Define the multi-touch ad sequence (first touch through close)
  4. Explain how copy changes for different stakeholders
  5. Write the qualification signals in ad copy (how to attract
     the right prospect)
  6. Recommend the attribution model for long sales cycles

assertions:
  - type: llm_judge
    criteria: "Entry points match the sales cycle — ads drive appropriate micro-conversions (demos, consultations, assessments) rather than premature purchase CTAs"
    weight: 0.30
    description: "Sales-cycle-appropriate entry points"
  - type: llm_judge
    criteria: "Qualification signals are effective — ad copy naturally filters for qualified prospects (budget, authority, need, timeline) without being exclusionary"
    weight: 0.25
    description: "Effective qualification signals"
  - type: llm_judge
    criteria: "Multi-touch sequence is logical — remarketing copy evolves across the long sales cycle, providing new value at each touchpoint"
    weight: 0.25
    description: "Logical multi-touch sequence"
  - type: llm_judge
    criteria: "Stakeholder-specific copy is differentiated — CFO messaging differs from operations messaging, which differs from end-user messaging"
    weight: 0.20
    description: "Differentiated stakeholder copy"
