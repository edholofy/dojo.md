meta:
  id: ecommerce-shopping-strategy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Design comprehensive e-commerce Google Ads copy across Shopping, Search, PMax, and remarketing"
  tags: [google-ads, ecommerce, shopping, pmax, multi-campaign, expert]

state: {}

trigger: |
  E-commerce Google Ads requires coordinating copy across Shopping
  (product feed), Search (RSAs), Performance Max (asset groups),
  Display (remarketing), and YouTube (product demos). Each channel
  serves a different role in the purchase journey.

  Design a comprehensive e-commerce strategy:

  Business: "NordHome" — Scandinavian home goods D2C
  Product lines: Furniture (avg $450), Lighting ($80-$300),
  Textiles ($30-$120), Kitchen ($40-$200), Decor ($20-$100)
  Monthly ad budget: $40,000
  Current ROAS: 3.2x (target: 5x)
  Competitors: West Elm, CB2, IKEA, Wayfair

  Part 1: Product feed optimization
  Write optimized product titles and descriptions for 5 products:
  1. Walnut dining table (6-seat, $899)
  2. Pendant light (brass, adjustable, $189)
  3. Linen bedding set (queen, $149)
  4. Ceramic vase set (3 pieces, $65)
  5. Chef's knife set (5 pieces, Japanese steel, $199)

  Part 2: Search campaign copy
  Write RSAs for 4 ad groups:
  1. Brand terms ("NordHome furniture")
  2. Category terms ("Scandinavian dining table")
  3. Competitor terms ("West Elm alternative")
  4. Long-tail terms ("mid-century modern walnut table 6 seat")

  Part 3: Performance Max
  Write asset groups for each product line (5 asset groups)
  with headlines, long headlines, descriptions

  Part 4: Remarketing strategy
  Write display ads for:
  1. Product viewers (saw specific products)
  2. Cart abandoners (started checkout)
  3. Past purchasers (cross-sell opportunity)
  4. Lapsed customers (180+ days since last purchase)

  Part 5: Campaign coordination
  1. Budget allocation across channels
  2. Audience exclusion rules
  3. Cross-channel messaging consistency
  4. ROAS improvement plan from 3.2x to 5x

assertions:
  - type: llm_judge
    criteria: "Product feed copy is search-optimized — titles follow category best practices and descriptions include relevant search terms naturally"
    weight: 0.25
    description: "Search-optimized product feed"
  - type: llm_judge
    criteria: "Multi-channel coordination is tight — Shopping, Search, PMax, and remarketing copy complement each other without redundancy or contradiction"
    weight: 0.30
    description: "Tight multi-channel coordination"
  - type: llm_judge
    criteria: "Remarketing strategy is segmented — each audience stage gets genuinely different messaging and offers"
    weight: 0.25
    description: "Segmented remarketing strategy"
  - type: llm_judge
    criteria: "ROAS improvement plan is concrete — provides specific copy and strategic changes expected to drive ROAS from 3.2x to 5x"
    weight: 0.20
    description: "Concrete ROAS improvement plan"
