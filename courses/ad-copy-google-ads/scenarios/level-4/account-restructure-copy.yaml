meta:
  id: account-restructure-copy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Restructure Google Ads account copy architecture for improved performance"
  tags: [google-ads, account-structure, restructure, migration, expert]

state: {}

trigger: |
  Account restructuring is one of the highest-impact optimizations
  in Google Ads. When ad groups are too broad, copy can't be
  relevant. When campaigns are poorly organized, budget allocation
  is suboptimal.

  Restructure the ad copy architecture for 2 accounts:

  Account 1: Overly broad account
  Business: Multi-service marketing agency
  Current structure: 1 campaign with 3 ad groups:
  - "Marketing Services" (50+ keywords from SEO to social to email)
  - "Web Design" (30 keywords mixing design and development)
  - "Consulting" (25 keywords from strategy to implementation)
  Current RSAs: Generic copy across all ad groups
  Problem: Low Quality Scores (avg 4), high CPA, low CTR
  Task: Redesign into tightly themed campaigns and ad groups
  with highly relevant copy for each

  Account 2: Over-segmented account
  Business: National insurance brokerage
  Current structure: 200+ ad groups with 1-2 keywords each
  Separate campaigns for every insurance type × state × intent
  Current RSAs: Hyper-specific but insufficient volume for
  optimization, and management is unsustainable
  Problem: Campaigns never exit learning phase, management takes
  40+ hours/month
  Task: Consolidate into manageable campaigns using broad match
  + Smart Bidding while maintaining copy relevance

  For each account:
  1. Map the current structure and identify problems
  2. Design the new campaign and ad group architecture
  3. Write RSAs for every new ad group (5 headlines + 4 descriptions)
  4. Create the keyword-to-ad-group mapping logic
  5. Plan the migration strategy (how to transition without
     losing performance history)
  6. Define the success metrics for the restructure (30/60/90 day)
  7. Write the client communication explaining the restructure

assertions:
  - type: llm_judge
    criteria: "Restructure logic is sound — new campaign/ad group architecture is properly themed with clear boundaries between ad groups"
    weight: 0.30
    description: "Sound restructure logic"
  - type: llm_judge
    criteria: "Copy relevance improves dramatically — new RSAs are tightly aligned with their ad group themes versus the original generic or hyper-specific copy"
    weight: 0.25
    description: "Dramatically improved copy relevance"
  - type: llm_judge
    criteria: "Migration strategy is safe — preserves performance history, avoids sudden budget disruptions, and includes rollback plans"
    weight: 0.25
    description: "Safe migration strategy"
  - type: llm_judge
    criteria: "Client communication is clear — explains the restructure rationale, expected outcomes, and timeline in non-technical language"
    weight: 0.20
    description: "Clear client communication"
