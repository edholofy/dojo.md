meta:
  id: app-campaign-copy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Write Google App Campaign copy that drives installs and in-app actions"
  tags: [google-ads, app-campaigns, app-install, in-app-actions, expert]

state: {}

trigger: |
  Google App Campaigns (formerly Universal App Campaigns) use AI
  to serve ads across Search, Play Store, YouTube, Display, and
  Discover. You provide text assets (30-char headlines, 90-char
  descriptions), and Google assembles combinations automatically.

  The challenge: limited text assets must work across very
  different placements.

  Write App Campaign copy for 4 apps:

  App 1: Fitness tracking app (freemium, $9.99/month premium)
  Category: Health & Fitness
  Goal 1: Install volume (broad audience)
  Goal 2: In-app purchase (premium subscription)
  Differentiator: AI-powered workout recommendations, social features
  Task: Write asset sets for both install and in-app-action campaigns

  App 2: Personal finance app (free with premium $4.99/month)
  Category: Finance
  Goal 1: Installs from budget-conscious millennials
  Goal 2: Premium upgrade from existing free users
  Differentiator: Automatic categorization, investment tracking
  Task: Write asset sets optimized for the finance-cautious audience

  App 3: Language learning app ($14.99/month or $99.99/year)
  Category: Education
  Goal 1: Installs from career-motivated professionals
  Goal 2: Annual subscription conversions
  Differentiator: Live tutoring sessions, business language focus
  Task: Write asset sets targeting career advancement motivation

  App 4: Food delivery marketplace (free app, commission model)
  Category: Food & Drink
  Goal 1: New user installs in expansion city
  Goal 2: First order completion (in-app event)
  Differentiator: 30-min delivery, local restaurant focus
  Task: Write asset sets for market launch with first-order incentive

  For each app:
  1. Write 5 headlines (30 chars each) for install campaigns
  2. Write 5 headlines (30 chars each) for in-app action campaigns
  3. Write 4 descriptions (90 chars each) for each goal
  4. Explain how copy adapts across Search, Play Store, YouTube,
     and Display placements
  5. Write the Play Store listing copy that aligns with ad messaging
  6. Define the creative asset strategy (image/video direction)

assertions:
  - type: llm_judge
    criteria: "Install vs in-app-action copy is distinct — install campaigns focus on app discovery and download motivation, while in-app campaigns focus on feature value and upgrade benefits"
    weight: 0.30
    description: "Distinct install vs in-app copy"
  - type: llm_judge
    criteria: "Cross-placement adaptability — the same text assets make sense in Search results, Play Store listings, YouTube overlays, and Display placements"
    weight: 0.25
    description: "Cross-placement text adaptability"
  - type: llm_judge
    criteria: "Play Store alignment is consistent — the app listing copy reinforces the ad messaging, creating continuity from ad to download"
    weight: 0.25
    description: "Play Store copy alignment"
  - type: llm_judge
    criteria: "Category-specific sensitivities are addressed — finance app copy handles trust concerns, health app addresses data privacy"
    weight: 0.20
    description: "Category-specific sensitivities"
