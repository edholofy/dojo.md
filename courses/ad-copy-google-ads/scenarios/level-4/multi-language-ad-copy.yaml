meta:
  id: multi-language-ad-copy
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Adapt Google Ads copy for international markets with cultural and linguistic precision"
  tags: [google-ads, international, localization, multilingual, expert]

state: {}

trigger: |
  International Google Ads require more than translation — they
  need cultural adaptation, market-specific value propositions,
  local regulatory compliance, and character limit awareness for
  different languages (double-width characters in CJK = 2 chars).

  Adapt a campaign for 5 international markets:

  Business: "SmartLearn" — Online education platform
  Product: Business skills courses ($29-$199/course)
  Source market: US English
  Source ad: "Master Business Skills Online | Learn at Your Own Pace
  | 10,000+ Students Enrolled | Start Free Today"

  Market 1: Japan
  Language: Japanese
  Considerations: Double-width characters (30 chars = 15 Japanese
  chars for headlines), formal language expected, emphasis on
  group harmony and organizational benefit over individual gain
  Task: Adapt the campaign for Japanese market with culturally
  appropriate messaging

  Market 2: Brazil
  Language: Portuguese (Brazilian)
  Considerations: Informal tone preferred, strong social proof
  culture, emphasis on career advancement, price sensitivity
  Task: Adapt for Brazilian market with local pricing and cultural hooks

  Market 3: Germany
  Language: German
  Considerations: Long compound words reduce effective character
  count, precision and quality valued over hype, GDPR compliance,
  formal language for B2B
  Task: Adapt for German market with privacy-conscious, precise copy

  Market 4: India
  Language: English (Indian market)
  Considerations: Price-conscious market, career advancement focus,
  mobile-first audience (95%+), English with local idioms
  Task: Adapt for Indian market with mobile-optimized, value-focused copy

  Market 5: UAE
  Language: Arabic + English (bilingual campaign)
  Considerations: Right-to-left script for Arabic, luxury/premium
  positioning valued, Ramadan and cultural event sensitivity,
  government-regulated industries
  Task: Create bilingual campaign with Arabic and English versions

  For each market:
  1. Write the complete RSA adapted for the market (8 headlines,
     4 descriptions)
  2. Verify character limits accounting for language differences
  3. Explain cultural adaptation decisions (not just translation)
  4. Identify market-specific compliance requirements
  5. Recommend the bidding strategy based on market maturity
  6. Write the market-specific ad extensions

assertions:
  - type: llm_judge
    criteria: "Cultural adaptation goes beyond translation — messaging reflects local values, communication styles, and market expectations rather than literal word substitution"
    weight: 0.30
    description: "Deep cultural adaptation"
  - type: llm_judge
    criteria: "Character limits account for language differences — Japanese double-width characters, German compound words, and Arabic script are properly handled"
    weight: 0.25
    description: "Language-aware character limits"
  - type: llm_judge
    criteria: "Market-specific compliance is addressed — GDPR for Germany, cultural sensitivity for UAE, regulatory requirements for each market"
    weight: 0.25
    description: "Market-specific compliance"
  - type: llm_judge
    criteria: "Value propositions are market-appropriate — career advancement for India, organizational benefit for Japan, precision for Germany"
    weight: 0.20
    description: "Market-appropriate value propositions"
