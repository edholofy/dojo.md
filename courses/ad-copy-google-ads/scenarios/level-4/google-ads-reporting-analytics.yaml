meta:
  id: google-ads-reporting-analytics
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Build Google Ads copy performance reporting frameworks with actionable insights"
  tags: [google-ads, reporting, analytics, performance, dashboards, expert]

state: {}

trigger: |
  Expert Google Ads managers don't just report metrics — they
  connect copy performance data to actionable creative decisions.
  A strong reporting framework turns data into copy briefs.

  Build reporting frameworks for 4 scenarios:

  Scenario 1: Monthly copy performance report for a B2B SaaS
  Metrics to include: CTR by headline, conversion rate by
  description, Quality Score trends, ad strength distribution,
  impression share, CPA by ad variation
  Stakeholder: Marketing VP (wants strategic insights)
  Task: Design the report structure, write sample insights,
  and translate each data point into a copy recommendation

  Scenario 2: Quarterly creative review for e-commerce
  100 active ad groups, 300 RSAs, $200K monthly spend
  Metrics to include: Top/bottom performing headlines, description
  conversion rates, seasonal performance patterns, ad fatigue
  indicators, extension click-through rates
  Task: Design the creative audit process and write the
  recommendation framework

  Scenario 3: Competitive copy analysis report
  3 main competitors in the auction
  Metrics to include: Auction insights, impression share overlap,
  competitor ad copy analysis (via Ad Preview tool), quality
  positioning
  Task: Design the competitive intelligence framework and write
  sample competitive response recommendations

  Scenario 4: A/B test results report
  5 simultaneous copy tests across campaigns
  Metrics to include: Statistical significance, lift measurement,
  confidence intervals, secondary metric impact, segment-level
  performance
  Task: Design the test results template and write the decision
  framework (implement, iterate, or abandon)

  For each scenario:
  1. Design the report structure (sections, metrics, visualizations)
  2. Write 3 sample insights with copy recommendations
  3. Create the "data-to-action" translation framework
  4. Define the escalation triggers (when to act immediately)
  5. Write the executive summary template
  6. Recommend the reporting cadence and distribution

assertions:
  - type: llm_judge
    criteria: "Reports connect data to action — every metric is paired with a specific copy recommendation rather than just presenting numbers"
    weight: 0.30
    description: "Data-to-action connection"
  - type: llm_judge
    criteria: "Insights are genuinely actionable — sample insights provide specific copy changes, not generic advice like 'improve headlines'"
    weight: 0.25
    description: "Genuinely actionable insights"
  - type: llm_judge
    criteria: "Report structures are audience-appropriate — VP-level reports focus on strategy, analyst-level reports focus on tactics"
    weight: 0.25
    description: "Audience-appropriate reporting"
  - type: llm_judge
    criteria: "Decision frameworks are clear — A/B test reports include unambiguous criteria for implement, iterate, or abandon decisions"
    weight: 0.20
    description: "Clear decision frameworks"
