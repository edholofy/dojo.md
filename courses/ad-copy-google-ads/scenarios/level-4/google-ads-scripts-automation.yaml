meta:
  id: google-ads-scripts-automation
  level: 4
  course: ad-copy-google-ads
  type: output
  description: "Design automated ad copy management systems using Google Ads scripts and rules"
  tags: [google-ads, automation, scripts, rules, ad-management, expert]

state: {}

trigger: |
  At scale, manual ad copy management becomes impossible. Google
  Ads offers automated rules, scripts (JavaScript), and
  third-party tool integrations to manage copy at scale.

  Design automated ad copy management for 4 scenarios:

  Scenario 1: Automatic ad pause and rotation
  Business: E-commerce with 50 product categories
  Problem: Ads become stale after 4-6 weeks (CTR decline)
  Task: Design an automated system that:
  - Monitors ad performance weekly
  - Pauses ads when CTR drops 30%+ below ad group average
  - Activates pre-written replacement ads
  - Alerts the team when replacement ads are running low
  Write: The rule logic, replacement ad templates, and alert copy

  Scenario 2: Dynamic price and inventory updates
  Business: Travel agency with 200+ destination packages
  Problem: Prices and availability change daily
  Task: Design a system that:
  - Updates ad copy with current pricing from a feed
  - Pauses ads for sold-out packages
  - Activates waitlist messaging when inventory is low
  Write: Ad templates with price placeholders, feed structure,
  and fallback copy for each inventory state

  Scenario 3: Weather-triggered ad copy
  Business: Home services (HVAC, plumbing, roofing)
  Problem: Demand spikes with weather events
  Task: Design a system that:
  - Activates AC repair ads when temperature exceeds 90°F
  - Activates heating ads when temperature drops below 35°F
  - Activates emergency roofing ads during storm forecasts
  Write: Weather-triggered ad sets and the trigger logic

  Scenario 4: Performance-based copy optimization
  Business: Multi-location service franchise (30 locations)
  Problem: Each location needs localized copy, but manual management
  doesn't scale
  Task: Design a system that:
  - Generates location-specific ads from templates
  - Tests copy variations per location
  - Promotes winning copy and pauses losers automatically
  Write: The template structure, variation logic, and promotion rules

  For each scenario:
  1. Describe the automation logic in pseudocode
  2. Write all ad copy templates with dynamic placeholders
  3. Define the trigger conditions and thresholds
  4. Write the fallback copy for when automation fails
  5. Design the monitoring and alerting system
  6. Identify the risks of over-automation

assertions:
  - type: llm_judge
    criteria: "Automation logic is sound — trigger conditions, thresholds, and action sequences are realistic and would work in a production Google Ads environment"
    weight: 0.30
    description: "Sound automation logic"
  - type: llm_judge
    criteria: "Ad templates are well-designed — dynamic placeholders are properly structured, and every template produces a compliant, compelling ad when populated"
    weight: 0.25
    description: "Well-designed ad templates"
  - type: llm_judge
    criteria: "Fallback strategies are robust — the system degrades gracefully when automation fails, ensuring ads always show something reasonable"
    weight: 0.25
    description: "Robust fallback strategies"
  - type: llm_judge
    criteria: "Over-automation risks are addressed — acknowledges scenarios where automated decisions could hurt performance and recommends human checkpoints"
    weight: 0.20
    description: "Over-automation risk awareness"
