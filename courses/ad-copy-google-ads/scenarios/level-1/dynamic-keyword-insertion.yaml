meta:
  id: dynamic-keyword-insertion
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Use Dynamic Keyword Insertion (DKI) correctly in Google Ads copy"
  tags: [google-ads, dki, keyword-insertion, beginner]

state: {}

trigger: |
  Dynamic Keyword Insertion (DKI) replaces a placeholder in your
  ad copy with the keyword that triggered the ad. Syntax:
  {KeyWord:Default Text}

  Capitalization options:
  - {KeyWord:Default} — Title Case
  - {keyword:default} — lowercase
  - {Keyword:Default} — Sentence case

  DKI can boost CTR by 15-25% when used correctly, but can cause
  embarrassing or irrelevant ads when misused.

  Apply DKI strategy to 5 ad groups:

  Ad group 1: Dental services
  Keywords: dental implants, teeth whitening, emergency dentist,
  dental cleaning, cosmetic dentistry
  Task: Write headlines with DKI that work for all keywords, plus
  a strong default fallback

  Ad group 2: IT support services
  Keywords: managed IT services, IT help desk, network security,
  cloud migration, IT consulting
  Task: Write DKI headlines with appropriate capitalization

  Ad group 3: Pet grooming
  Keywords: dog grooming, cat grooming, pet grooming near me,
  mobile pet grooming, puppy grooming
  Task: Write DKI headlines and identify which keywords might
  create awkward ad copy

  Ad group 4: Financial planning
  Keywords: retirement planning, wealth management, financial
  advisor, 401k rollover, estate planning
  Task: Write DKI headlines and explain when DKI should NOT
  be used in this category

  Ad group 5: E-commerce (electronics)
  Keywords: wireless headphones, bluetooth speakers, smart watch,
  noise canceling earbuds, portable charger
  Task: Write DKI headlines and test character limit compliance
  for the longest keyword

  For each ad group:
  1. Write 3 headlines using DKI with appropriate defaults
  2. Write 2 headlines without DKI as safety variants
  3. Test every keyword against the DKI template for character fit
  4. Flag any keyword that would create an awkward or misleading ad
  5. Recommend when to use DKI vs static copy for that ad group

assertions:
  - type: llm_judge
    criteria: "DKI syntax is correct — uses proper {KeyWord:Default} format with appropriate capitalization and meaningful default text"
    weight: 0.25
    description: "Correct DKI syntax usage"
  - type: llm_judge
    criteria: "Character limit awareness — tests whether the longest keyword fits within 30-character headline limit and flags potential overflow issues"
    weight: 0.25
    description: "Character limit testing for DKI"
  - type: llm_judge
    criteria: "Identifies DKI risks — flags keywords that would create awkward, misleading, or grammatically incorrect ad copy when inserted"
    weight: 0.25
    description: "DKI risk identification"
  - type: llm_judge
    criteria: "Includes non-DKI safety variants — provides static headline alternatives for situations where DKI would be inappropriate or risky"
    weight: 0.25
    description: "Non-DKI safety alternatives"
