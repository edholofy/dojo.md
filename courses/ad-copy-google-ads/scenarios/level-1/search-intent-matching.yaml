meta:
  id: search-intent-matching
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Align Google Ads copy with search intent types for maximum relevance and CTR"
  tags: [google-ads, search-intent, relevance, keyword-alignment, beginner]

state: {}

trigger: |
  Google Ads success depends on matching ad copy to the user's
  search intent. The four intent types are:
  - Informational: "how to," "what is," "guide to"
  - Commercial investigation: "best," "review," "vs," "top"
  - Transactional: "buy," "price," "discount," "order"
  - Navigational: brand names, specific products

  Write intent-matched ads for 5 keyword sets:

  Keyword set 1 (Informational): "how to fix a leaky faucet"
  Business: Plumbing service company
  Task: Write an ad that meets the informational need while
  positioning the business as the solution

  Keyword set 2 (Commercial): "best project management tools 2026"
  Business: SaaS project management platform
  Task: Write an ad that acknowledges the comparison mindset while
  positioning as the top choice

  Keyword set 3 (Transactional): "buy standing desk under $500"
  Business: Online furniture retailer
  Task: Write an ad that matches the ready-to-buy intent with
  price, availability, and urgency signals

  Keyword set 4 (Navigational): "Salesforce alternatives"
  Business: Competing CRM platform
  Task: Write an ad that captures brand-adjacent traffic without
  trademark violations

  Keyword set 5 (Mixed): "wedding photographer"
  Business: Local wedding photography studio
  Task: Write an ad that works for both informational (researching)
  and transactional (ready to book) searchers

  For each keyword set:
  1. Identify the primary search intent
  2. Write the complete RSA (5 headlines, 4 descriptions)
  3. Explain how the copy matches the identified intent
  4. Write a version that MISMATCHES intent (as a contrast example)
  5. Predict the CTR difference between matched vs mismatched

assertions:
  - type: llm_judge
    criteria: "Intent identification is accurate — correctly classifies each keyword set's primary search intent and acknowledges mixed-intent scenarios"
    weight: 0.25
    description: "Accurate search intent identification"
  - type: llm_judge
    criteria: "Intent-matched ads align messaging to user mindset — informational ads educate, commercial ads compare, transactional ads sell, navigational ads redirect"
    weight: 0.30
    description: "Messaging aligned to user mindset"
  - type: llm_judge
    criteria: "Mismatched examples clearly demonstrate the problem — the contrast version shows how wrong intent targeting wastes spend and reduces CTR"
    weight: 0.25
    description: "Clear mismatch contrast examples"
  - type: llm_judge
    criteria: "Mixed-intent handling is practical — provides copy that accommodates multiple intents without being too generic to convert anyone"
    weight: 0.20
    description: "Practical mixed-intent handling"
