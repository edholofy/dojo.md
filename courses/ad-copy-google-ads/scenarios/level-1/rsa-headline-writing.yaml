meta:
  id: rsa-headline-writing
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Write effective RSA headlines within Google Ads character limits and best practices"
  tags: [google-ads, rsa, headlines, beginner]

state: {}

trigger: |
  Responsive Search Ads (RSAs) are now the standard Google Ads
  search format. Each RSA allows up to 15 headlines (30 characters
  each) and 4 descriptions (90 characters each). Google's AI tests
  different combinations to find the best performers.

  Write RSA headlines for 5 businesses:

  Business 1: Online accounting software ($29/month)
  Target keyword: "small business accounting software"
  Task: Write 10 headlines covering value prop, benefit, CTA,
  social proof, and keyword variations

  Business 2: Emergency plumber (serves metro area)
  Target keyword: "emergency plumber near me"
  Task: Write 10 headlines emphasizing urgency, availability,
  trust signals, and local relevance

  Business 3: Online MBA program ($15,000 total)
  Target keyword: "online MBA program"
  Task: Write 10 headlines covering accreditation, flexibility,
  career outcomes, and affordability

  Business 4: Organic dog food subscription ($45/month)
  Target keyword: "organic dog food delivery"
  Task: Write 10 headlines mixing health benefits, convenience,
  quality ingredients, and pet-specific emotional appeals

  Business 5: Commercial cleaning service (B2B)
  Target keyword: "office cleaning service"
  Task: Write 10 headlines covering reliability, health/safety,
  professionalism, and business benefits

  For each set of 10 headlines:
  1. Confirm every headline is 30 characters or fewer
  2. Include the target keyword naturally in at least 2 headlines
  3. Vary headline types: benefit, feature, CTA, social proof,
     urgency, question, and problem-solution
  4. Explain which headlines you would pin to Position 1, 2, or 3
     and why
  5. Identify which headlines should NOT be pinned for maximum
     AI optimization

assertions:
  - type: llm_judge
    criteria: "All headlines respect the 30-character limit — no headline exceeds this constraint, and most use close to the full character count for maximum impact"
    weight: 0.30
    description: "Character limit compliance"
  - type: llm_judge
    criteria: "Headlines show genuine variety — includes benefit-focused, CTA-driven, social proof, urgency, and keyword-rich variations rather than repetitive messaging"
    weight: 0.30
    description: "Headline variety and diversity"
  - type: llm_judge
    criteria: "Pinning strategy is sound — explains why specific headlines are pinned to specific positions and acknowledges the tradeoff between control and AI optimization"
    weight: 0.20
    description: "Strategic pinning recommendations"
  - type: llm_judge
    criteria: "Headlines are compelling and specific — uses concrete numbers, specific benefits, and clear language rather than vague or generic claims"
    weight: 0.20
    description: "Compelling specific headlines"
