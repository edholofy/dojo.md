meta:
  id: google-ads-copy-mistakes
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Identify and fix the most common Google Ads copywriting mistakes"
  tags: [google-ads, mistakes, diagnosis, beginner]

state: {}

trigger: |
  Poor Google Ads copy wastes budget and reduces Quality Score.
  Review and fix 8 problematic ads:

  Ad 1: Generic headline problem
  Keyword: "custom kitchen cabinets"
  Headline: "Home Improvement Services"
  Description: "We offer many home improvement solutions. Contact
  us today to learn more about what we can do."
  Issue to identify and fix: ___

  Ad 2: Feature dumping
  Keyword: "email marketing software"
  Headline: "Email Tool - SMTP, API, Templates"
  Description: "Drag and drop editor. A/B testing. Automation
  workflows. Segmentation. Analytics. Reports."
  Issue to identify and fix: ___

  Ad 3: No differentiation
  Keyword: "web hosting"
  Headline: "Best Web Hosting Service"
  Description: "Fast and reliable web hosting. Great customer
  support. Affordable prices."
  Issue to identify and fix: ___

  Ad 4: Missing CTA
  Keyword: "accounting services small business"
  Headline: "Expert Accounting Services"
  Description: "Professional accountants with 20 years of
  experience helping small businesses succeed."
  Issue to identify and fix: ___

  Ad 5: Keyword stuffing
  Keyword: "cheap car insurance"
  Headline: "Cheap Car Insurance - Cheap"
  Description: "Get cheap car insurance quotes. Our cheap car
  insurance is the cheapest car insurance."
  Issue to identify and fix: ___

  Ad 6: Wrong audience tone
  Keyword: "enterprise data analytics platform"
  Headline: "OMG Best Analytics Tool Ever!!!"
  Description: "You won't BELIEVE how amazing our data tool is!
  Try it now and be BLOWN AWAY!"
  Issue to identify and fix: ___

  Ad 7: Wasted character space
  Keyword: "yoga classes downtown"
  Headline: "Yoga"
  Description: "Classes available."
  Issue to identify and fix: ___

  Ad 8: False urgency/misleading
  Keyword: "mattress sale"
  Headline: "90% OFF - Today Only!!!"
  Description: "Biggest sale of the year ends tonight! Once in a
  lifetime deal you can't miss!"
  Issue to identify and fix: ___

  For each ad:
  1. Name the specific mistake
  2. Explain why it hurts performance (CTR, Quality Score, conversion)
  3. Rewrite the complete ad (5 headlines, 4 descriptions)
  4. Explain the principle behind your fix

assertions:
  - type: llm_judge
    criteria: "Mistakes are correctly identified — each diagnosis pinpoints the specific copywriting error (generic copy, feature dumping, keyword stuffing, etc.) rather than vague critiques"
    weight: 0.30
    description: "Accurate mistake identification"
  - type: llm_judge
    criteria: "Rewrites directly address the identified mistake — the fixed version clearly demonstrates the opposite of the error while maintaining proper RSA format"
    weight: 0.30
    description: "Mistake-correcting rewrites"
  - type: llm_judge
    criteria: "Performance impact is explained — connects each mistake to concrete consequences like lower CTR, poor Quality Score, wasted spend, or policy violations"
    weight: 0.20
    description: "Performance impact explanation"
  - type: llm_judge
    criteria: "Principles behind fixes are transferable — the explanation teaches a general copywriting principle that applies beyond the specific example"
    weight: 0.20
    description: "Transferable copywriting principles"
