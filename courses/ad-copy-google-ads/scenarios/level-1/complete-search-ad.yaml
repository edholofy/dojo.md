meta:
  id: complete-search-ad
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Build a complete Google Search ad from keyword research through final copy with extensions"
  tags: [google-ads, search-ads, complete-ad, beginner]

state: {}

trigger: |
  Build a complete Google Search ad campaign from scratch for a
  real business scenario. This integrates all Level 1 skills:
  headlines, descriptions, extensions, DKI, intent matching,
  and Quality Score optimization.

  Business: "FreshMeal Prep" — Meal prep delivery service
  - Price: $89/week for 12 meals, $149/week for 21 meals
  - USP: Chef-prepared, macro-counted, delivered fresh (not frozen)
  - Audience: Busy professionals, fitness enthusiasts, new parents
  - Service area: Metropolitan area (Austin, TX)
  - Competitor: HelloFresh, Factor, Trifecta
  - Current website: Has pricing page, menu page, how-it-works page,
    testimonials page, and local delivery FAQ

  Task: Build the complete ad for 3 ad groups:

  Ad group 1: "meal prep delivery Austin"
  1. Write a full RSA (10 headlines, 4 descriptions)
  2. Write sitelinks (4 with descriptions)
  3. Write callouts (6)
  4. Write structured snippets (1 set)
  5. Include 2 DKI headlines where appropriate

  Ad group 2: "healthy meal delivery service"
  1. Write a full RSA (10 headlines, 4 descriptions)
  2. Write sitelinks (4 with descriptions)
  3. Write callouts (6)
  4. Write structured snippets (1 set)
  5. Include 2 DKI headlines where appropriate

  Ad group 3: "meal prep for weight loss"
  1. Write a full RSA (10 headlines, 4 descriptions)
  2. Write sitelinks (4 with descriptions)
  3. Write callouts (6)
  4. Write structured snippets (1 set)
  5. Include 2 DKI headlines where appropriate

  For the complete campaign:
  - Explain your keyword-to-ad group organization strategy
  - Identify which headlines to pin and why
  - Predict Quality Score for each ad group with reasoning
  - Describe how you differentiated messaging across ad groups
  - Recommend the landing page each ad group should link to

assertions:
  - type: llm_judge
    criteria: "Complete ads are well-structured — each ad group has full RSAs, extensions, and DKI that work together as a cohesive unit"
    weight: 0.25
    description: "Well-structured complete ads"
  - type: llm_judge
    criteria: "Ad groups are properly differentiated — each targets a distinct search intent with messaging tailored to that specific audience need"
    weight: 0.25
    description: "Properly differentiated ad groups"
  - type: llm_judge
    criteria: "All character limits are respected — headlines at 30 chars, descriptions at 90 chars, sitelinks at 25 chars, callouts at 25 chars"
    weight: 0.25
    description: "Character limit compliance throughout"
  - type: llm_judge
    criteria: "Campaign strategy is sound — keyword organization, pinning strategy, landing page matching, and Quality Score predictions show understanding of how components work together"
    weight: 0.25
    description: "Sound campaign strategy"
