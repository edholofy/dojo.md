meta:
  id: cta-and-urgency
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Write effective CTAs and urgency triggers in Google Ads without being misleading"
  tags: [google-ads, cta, urgency, conversion, beginner]

state: {}

trigger: |
  Strong calls-to-action and appropriate urgency signals drive
  clicks and conversions in Google Ads. But Google's policies
  prohibit misleading urgency claims.

  Write CTAs and urgency copy for 5 scenarios:

  Scenario 1: SaaS free trial (14-day, no credit card)
  Goal: Trial signups
  Task: Write 5 CTA-focused headlines and 2 descriptions with
  urgency that highlights the trial's value without false scarcity

  Scenario 2: Seasonal sale (genuine 30% off, ends Sunday)
  Goal: E-commerce purchases
  Task: Write 5 CTA headlines and 2 descriptions with real
  time-bound urgency

  Scenario 3: B2B consultation booking
  Goal: Scheduled calls
  Task: Write 5 CTA headlines and 2 descriptions that create
  urgency through value rather than artificial deadlines

  Scenario 4: Event registration (limited to 200 seats, 140 sold)
  Goal: Event signups
  Task: Write 5 CTA headlines and 2 descriptions using legitimate
  scarcity (real seat count)

  Scenario 5: Lead magnet download (free guide)
  Goal: Email captures
  Task: Write 5 CTA headlines and 2 descriptions that make a free
  offer feel valuable and urgent

  For each scenario:
  1. Identify the strongest CTA verb for this action type
  2. Distinguish between legitimate and manufactured urgency
  3. Write the urgency copy that would pass Google's ad review
  4. Write an example of urgency copy that would be rejected
  5. Explain the psychology behind your urgency approach

assertions:
  - type: llm_judge
    criteria: "CTAs use strong, specific action verbs appropriate to the conversion goal — 'Start Free Trial' vs 'Submit,' 'Book Your Call' vs 'Click Here'"
    weight: 0.25
    description: "Strong specific CTA verbs"
  - type: llm_judge
    criteria: "Urgency is legitimate — uses real deadlines, genuine scarcity, or value-based urgency rather than manufactured pressure tactics"
    weight: 0.30
    description: "Legitimate urgency techniques"
  - type: llm_judge
    criteria: "Rejected examples clearly violate Google policies — demonstrates understanding of what crosses the line (fake countdowns, perpetual 'last chance' claims)"
    weight: 0.25
    description: "Policy-violating contrast examples"
  - type: llm_judge
    criteria: "Psychology explanations are accurate — correctly describes why each urgency technique works (loss aversion, FOMO, commitment bias)"
    weight: 0.20
    description: "Accurate urgency psychology"
