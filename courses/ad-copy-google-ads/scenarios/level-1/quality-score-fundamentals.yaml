meta:
  id: quality-score-fundamentals
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Understand Quality Score components and write ad copy that improves all three factors"
  tags: [google-ads, quality-score, optimization, beginner]

state: {}

trigger: |
  Quality Score (1-10) determines your ad rank and cost-per-click.
  Its three components are:
  1. Expected Click-Through Rate (Exp. CTR)
  2. Ad Relevance (keyword-to-ad alignment)
  3. Landing Page Experience

  Each 1-point increase reduces CPC by approximately 13%.

  Optimize ad copy for Quality Score across 4 ad groups:

  Ad group 1: "running shoes for flat feet"
  Current Quality Score: 4/10 (Below Average CTR, Below Average
  Ad Relevance, Average Landing Page)
  Current headline: "Buy Running Shoes Online"
  Current description: "Great selection of shoes. Shop now for
  the best deals on footwear."
  Task: Rewrite the ad to improve CTR and relevance scores

  Ad group 2: "best CRM for real estate agents"
  Current Quality Score: 5/10 (Average CTR, Below Average
  Ad Relevance, Average Landing Page)
  Current headline: "CRM Software - Try Free"
  Current description: "Manage your business contacts with our
  powerful CRM platform."
  Task: Rewrite with real-estate-specific copy to improve relevance

  Ad group 3: "emergency roof repair"
  Current Quality Score: 3/10 (Below Average across all three)
  Current headline: "Roofing Company"
  Current description: "We do all types of roofing work. Call us
  today for an estimate."
  Task: Rewrite with urgency, specificity, and keyword alignment

  Ad group 4: "organic baby formula"
  Current Quality Score: 6/10 (Average CTR, Average Relevance,
  Above Average Landing Page)
  Current headline: "Organic Baby Formula"
  Current description: "Organic formula for your baby. Free
  shipping available on orders."
  Task: Push from 6 to 8+ by improving CTR and ad copy

  For each rewrite:
  1. Diagnose why the current copy scores poorly
  2. Write the improved RSA (5 headlines, 4 descriptions)
  3. Explain which Quality Score component each change targets
  4. Predict the Quality Score improvement
  5. Provide landing page copy recommendations that align with ads

assertions:
  - type: llm_judge
    criteria: "Diagnoses are accurate — correctly identifies why each current ad scores poorly on specific Quality Score components (CTR, relevance, or landing page)"
    weight: 0.25
    description: "Accurate Quality Score diagnosis"
  - type: llm_judge
    criteria: "Rewrites clearly improve keyword-to-ad relevance — the improved copy directly addresses the target keyword intent rather than using generic language"
    weight: 0.30
    description: "Improved keyword-ad relevance"
  - type: llm_judge
    criteria: "Each change is mapped to a specific Quality Score component — the response explains whether a change targets CTR, relevance, or landing page experience"
    weight: 0.25
    description: "Component-mapped improvements"
  - type: llm_judge
    criteria: "Landing page recommendations align with ad promises — ensures consistency between what the ad says and what the user sees on the page"
    weight: 0.20
    description: "Ad-to-landing page alignment"
