meta:
  id: ad-extensions-copy
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Write compelling copy for Google Ads extensions — sitelinks, callouts, and structured snippets"
  tags: [google-ads, extensions, sitelinks, callouts, beginner]

state: {}

trigger: |
  Ad extensions expand your ad with additional information at no
  extra cost. They increase CTR by 20-30% and improve Ad Rank.

  Key extension types:
  - Sitelinks: 25-char link text + two 35-char descriptions
  - Callouts: 25-char highlights (no links)
  - Structured Snippets: 25-char values under a category header

  Write extension copy for 4 businesses:

  Business 1: E-commerce clothing store
  Task: Write 6 sitelinks with descriptions, 8 callouts, and
  2 structured snippet sets (Styles, Brands)

  Business 2: SaaS marketing platform ($99-$499/month)
  Task: Write 6 sitelinks with descriptions, 8 callouts, and
  2 structured snippet sets (Features, Integrations)

  Business 3: Local restaurant chain (5 locations)
  Task: Write 6 sitelinks with descriptions, 8 callouts, and
  2 structured snippet sets (Cuisines, Amenities)

  Business 4: Insurance company (auto, home, life)
  Task: Write 6 sitelinks with descriptions, 8 callouts, and
  2 structured snippet sets (Insurance Types, Coverage Options)

  For each business:
  1. Verify all character limits are respected
  2. Ensure sitelinks point to distinct, high-value pages
  3. Write callouts that add information NOT already in the ad
  4. Choose structured snippet headers from Google's approved list
  5. Explain how extensions complement the main ad messaging

assertions:
  - type: llm_judge
    criteria: "All extension copy respects character limits — sitelinks at 25 chars, descriptions at 35 chars, callouts at 25 chars, snippet values at 25 chars"
    weight: 0.25
    description: "Character limit compliance for extensions"
  - type: llm_judge
    criteria: "Sitelinks direct to distinct, valuable pages — each sitelink represents a genuinely different destination rather than variations of the same page"
    weight: 0.25
    description: "Distinct valuable sitelink destinations"
  - type: llm_judge
    criteria: "Callouts add unique value — each callout communicates a distinct benefit or feature that would not already appear in a typical headline or description"
    weight: 0.25
    description: "Unique value-adding callouts"
  - type: llm_judge
    criteria: "Structured snippets use appropriate Google-approved headers and contain relevant, specific values that help users understand the business offering"
    weight: 0.25
    description: "Appropriate structured snippet design"
