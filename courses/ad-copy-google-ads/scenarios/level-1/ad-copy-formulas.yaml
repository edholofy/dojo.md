meta:
  id: ad-copy-formulas
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Apply proven headline and description formulas to Google Ads copy"
  tags: [google-ads, formulas, copywriting, frameworks, beginner]

state: {}

trigger: |
  Proven ad copy formulas help structure effective Google Ads.
  The key formulas for search ads are:

  1. Problem-Solution-Result: Pain → Fix → Outcome
  2. Benefit-Feature-CTA: What you get → How it works → Act now
  3. Authority-Trust-Action: Credibility → Proof → Next step
  4. Emotional Appeal: Feeling → Value → Urgency
  5. Specificity: Number → Benefit → Offer

  Apply each formula to the same business:

  Business: Online fitness coaching platform ($79/month)
  Target keyword: "online personal trainer"

  Task 1: Write a complete RSA using the Problem-Solution-Result
  formula (5 headlines + 4 descriptions)

  Task 2: Write a complete RSA using the Benefit-Feature-CTA
  formula (5 headlines + 4 descriptions)

  Task 3: Write a complete RSA using the Authority-Trust-Action
  formula (5 headlines + 4 descriptions)

  Task 4: Write a complete RSA using the Emotional Appeal
  formula (5 headlines + 4 descriptions)

  Task 5: Write a complete RSA using the Specificity formula
  (5 headlines + 4 descriptions)

  For each formula application:
  1. Label which headline and description maps to which formula element
  2. Explain why this formula works for this particular audience
  3. Identify which audience segment would respond best to this formula
  4. Rate the formula's fit for this business (1-5) with reasoning

  Then compare:
  - Which formula would likely produce the highest CTR and why
  - Which formula would produce the highest conversion rate and why
  - When to use each formula based on funnel stage and audience

assertions:
  - type: llm_judge
    criteria: "Each formula is correctly applied — headline and description elements map clearly to the formula structure (problem then solution then result, etc.)"
    weight: 0.30
    description: "Correct formula application"
  - type: llm_judge
    criteria: "Five distinct ads are produced — each formula version is genuinely different in tone, structure, and messaging rather than superficial rewording"
    weight: 0.25
    description: "Genuinely distinct formula variations"
  - type: llm_judge
    criteria: "Audience mapping is thoughtful — correctly identifies which audience segments would respond to authority vs emotional vs specificity approaches"
    weight: 0.25
    description: "Thoughtful audience-formula mapping"
  - type: llm_judge
    criteria: "Comparative analysis is data-informed — CTR and conversion predictions are grounded in advertising principles rather than arbitrary guesses"
    weight: 0.20
    description: "Data-informed comparative analysis"
