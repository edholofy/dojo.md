meta:
  id: rsa-description-writing
  level: 1
  course: ad-copy-google-ads
  type: output
  description: "Write compelling RSA descriptions that complement headlines and drive conversions"
  tags: [google-ads, rsa, descriptions, beginner]

state: {}

trigger: |
  RSA descriptions (90 characters each, up to 4) must work with
  ANY headline combination Google selects. Each description should
  stand alone while adding unique value.

  Write RSA descriptions for 5 ad groups:

  Ad group 1: CRM software for small businesses ($49/month)
  Keywords: "CRM software," "customer management tool," "sales CRM"
  Task: Write 4 descriptions covering benefits, features, social
  proof, and CTA

  Ad group 2: Personal injury lawyer (contingency fee)
  Keywords: "personal injury lawyer," "accident attorney"
  Task: Write 4 descriptions covering no-fee promise, track record,
  urgency, and consultation offer

  Ad group 3: Home security system ($199 + $29/month monitoring)
  Keywords: "home security system," "smart home security"
  Task: Write 4 descriptions covering protection, technology,
  ease of install, and value proposition

  Ad group 4: Online grocery delivery (same-day)
  Keywords: "grocery delivery," "online grocery shopping"
  Task: Write 4 descriptions covering speed, selection, savings,
  and convenience

  Ad group 5: SaaS project management tool (freemium)
  Keywords: "project management software," "team collaboration tool"
  Task: Write 4 descriptions covering free tier, team features,
  integration, and productivity gains

  For each set of 4 descriptions:
  1. Verify each is 90 characters or fewer
  2. Ensure each description works independently with any headline
  3. Include a CTA in at least 2 descriptions
  4. Avoid repeating information already covered in typical headlines
  5. Explain the strategic purpose of each description

assertions:
  - type: llm_judge
    criteria: "Descriptions respect the 90-character limit and use most of the available space — not too short to waste opportunity, not exceeding the constraint"
    weight: 0.25
    description: "Character limit compliance and utilization"
  - type: llm_judge
    criteria: "Each description works independently — any single description paired with any headline creates a coherent, compelling ad without redundancy or contradiction"
    weight: 0.30
    description: "Independent description functionality"
  - type: llm_judge
    criteria: "Descriptions cover diverse angles — benefits, features, social proof, CTAs, and objection handling rather than repeating the same message four times"
    weight: 0.25
    description: "Strategic diversity across descriptions"
  - type: llm_judge
    criteria: "CTAs are specific and action-oriented — use concrete verbs and clear next steps rather than generic phrases"
    weight: 0.20
    description: "Specific action-oriented CTAs"
