meta:
  id: demand-gen-campaigns
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Write copy for Google Demand Gen campaigns across Discover, Gmail, and YouTube"
  tags: [google-ads, demand-gen, discovery, gmail, youtube, advanced]

state: {}

trigger: |
  Demand Gen campaigns (formerly Discovery campaigns) serve ads
  across YouTube (in-feed, Shorts, in-stream), Discover feed,
  and Gmail. They reach users in browsing/discovery mode rather
  than active search. Key specs:
  - Carousel headline: 40 chars
  - Standard headlines: 5 (40 chars each)
  - Descriptions: 5 (90 chars each)
  - Video: 15+ seconds recommended
  - 9:16 vertical image ads for YouTube Shorts
  - Advertisers using 3+ best practices see 40%+ more conversions

  Write Demand Gen campaigns for 3 businesses:

  Business 1: D2C premium coffee subscription ($35/month)
  Goal: Subscription signups
  Audience: Coffee enthusiasts, 25-45, urban, premium lifestyle
  Task: Write complete Demand Gen asset set including single image
  ads, carousel ads, and video companion text. Make copy work
  across YouTube feed, Discover, and Gmail placements.

  Business 2: SaaS HR platform targeting mid-market ($299/month)
  Goal: Demo requests
  Audience: HR directors, people ops managers, 100-1,000 employees
  Task: Write Demand Gen copy that generates B2B leads from
  non-search placements. Address the challenge of B2B selling
  in a consumer-focused discovery environment.

  Business 3: Travel booking platform (flights + hotels)
  Goal: App installs and bookings
  Audience: Frequent travelers, deal seekers, 25-55
  Task: Write Demand Gen copy with seasonal hooks, destination
  inspiration, and deal-focused messaging across all placements.

  For each business:
  1. Write 5 headlines (40 chars each)
  2. Write 5 descriptions (90 chars each)
  3. Write carousel card headlines (40 chars each, 4-8 cards)
  4. Write carousel card descriptions
  5. Write video companion headline and description
  6. Explain how copy adapts per placement (YouTube vs Discover
     vs Gmail)
  7. Define the audience signals and lookalike strategy

assertions:
  - type: llm_judge
    criteria: "Copy is discovery-mode appropriate — uses curiosity, inspiration, and visual storytelling language suited for browsing users rather than search-intent copy"
    weight: 0.30
    description: "Discovery-mode-appropriate copy"
  - type: llm_judge
    criteria: "Carousel storytelling is sequential — each card builds on the previous one to create a narrative that guides users toward the CTA"
    weight: 0.25
    description: "Sequential carousel storytelling"
  - type: llm_judge
    criteria: "Cross-placement adaptation is clear — explains how the same assets render differently on YouTube feed, Discover, and Gmail"
    weight: 0.25
    description: "Clear cross-placement adaptation"
  - type: llm_judge
    criteria: "B2B copy works in consumer context — the HR platform campaign successfully generates professional interest from casual browsing environments"
    weight: 0.20
    description: "B2B copy in consumer context"
