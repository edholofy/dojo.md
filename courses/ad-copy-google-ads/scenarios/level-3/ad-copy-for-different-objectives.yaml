meta:
  id: ad-copy-for-different-objectives
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Tailor Google Ads copy for different campaign objectives — awareness, consideration, and conversion"
  tags: [google-ads, objectives, funnel-stages, campaign-strategy, advanced]

state: {}

trigger: |
  Different Google Ads campaign objectives require fundamentally
  different copy approaches. The same business needs different
  messaging for awareness, consideration, and conversion campaigns.

  Write objective-specific campaigns for one business across all
  funnel stages:

  Business: "CloudSync" — Cloud-based team collaboration platform
  Price: Free plan, Pro $12/user/month, Business $25/user/month
  Competitors: Slack, Microsoft Teams, Notion
  USP: Combines chat, docs, and project management in one tool

  Stage 1: Awareness (top of funnel)
  Objective: Brand awareness and reach
  Target: Tech-savvy professionals who haven't heard of CloudSync
  Formats: Display, YouTube bumper ads, Demand Gen
  Task: Write copy that introduces the brand and creates recognition
  — NOT asking for signups

  Stage 2: Consideration (middle of funnel)
  Objective: Website visits and engagement
  Target: Users who searched for "team collaboration tools" or
  "Slack alternatives"
  Formats: Search RSAs, Demand Gen, YouTube skippable
  Task: Write copy that educates on features and differentiators
  — positioning CloudSync as a top contender

  Stage 3: Conversion (bottom of funnel)
  Objective: Free trial signups
  Target: Users who visited CloudSync website, comparison shoppers
  Formats: Search RSAs, remarketing display, remarketing search
  Task: Write copy that drives the trial signup with urgency,
  social proof, and friction removal

  Stage 4: Retention/expansion
  Objective: Upgrade free users to paid plans
  Target: Free plan users, trial users nearing expiry
  Formats: Display remarketing, Gmail, Search (branded)
  Task: Write copy that communicates upgrade value and creates
  FOMO around free plan limitations

  For each stage:
  1. Write complete ad sets for all relevant formats
  2. Explain how tone, CTA, and messaging differ by objective
  3. Define the success metrics for each stage
  4. Show how each stage feeds the next
  5. Recommend budget allocation across stages (percentage)

assertions:
  - type: llm_judge
    criteria: "Copy tone shifts appropriately — awareness copy is educational and brand-focused, consideration copy is comparative, conversion copy is action-driven"
    weight: 0.30
    description: "Appropriate tone shifts by stage"
  - type: llm_judge
    criteria: "CTAs match the funnel stage — awareness uses soft CTAs (Learn More), consideration uses medium CTAs (Compare Plans), conversion uses strong CTAs (Start Free Trial)"
    weight: 0.25
    description: "Funnel-appropriate CTAs"
  - type: llm_judge
    criteria: "Stage progression is logical — each campaign layer builds on the previous one's messaging and audience development"
    weight: 0.25
    description: "Logical stage progression"
  - type: llm_judge
    criteria: "Budget allocation is strategic — distributes spend based on funnel economics rather than equal splits"
    weight: 0.20
    description: "Strategic budget allocation"
