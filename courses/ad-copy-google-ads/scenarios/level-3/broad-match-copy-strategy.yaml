meta:
  id: broad-match-copy-strategy
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Write ad copy optimized for broad match keyword strategy with Smart Bidding"
  tags: [google-ads, broad-match, keyword-strategy, smart-bidding, advanced]

state: {}

trigger: |
  Google's 2025-2026 recommended strategy pairs broad match
  keywords with Smart Bidding — the "barbell approach." Broad match
  captures semantically related searches that exact match misses,
  while Smart Bidding prevents irrelevant spend.

  This creates a unique copy challenge: your ads must work for
  a wider range of search queries than traditional exact-match
  campaigns.

  Design broad match copy strategies for 4 campaigns:

  Campaign 1: B2B cybersecurity
  Broad match keyword: "business security software"
  Potential queries this could match: "endpoint protection for
  companies," "corporate cybersecurity tools," "small business
  antivirus," "network security solutions," "SIEM platforms"
  Task: Write RSAs that are specific enough to convert but broad
  enough to be relevant across all matched queries

  Campaign 2: Home services — HVAC
  Broad match keyword: "AC repair service"
  Potential queries: "fix air conditioner," "HVAC technician
  near me," "AC not cooling," "central air repair cost,"
  "emergency AC service"
  Task: Write ads covering the semantic range without being generic

  Campaign 3: Online education
  Broad match keyword: "learn data science"
  Potential queries: "data science course online," "python for
  data analysis," "machine learning bootcamp," "data analytics
  certification," "statistics for beginners"
  Task: Write ads with enough variety in headlines to match
  the query range

  Campaign 4: Financial services
  Broad match keyword: "retirement planning help"
  Potential queries: "financial advisor for retirement," "401k
  planning," "when to retire calculator," "retirement savings
  strategy," "pension vs 401k"
  Task: Write ads that handle both informational and transactional
  queries in the same RSA

  For each campaign:
  1. Map the semantic range of potential matched queries
  2. Write RSAs (10 headlines, 4 descriptions) with enough
     diversity to cover the range
  3. Identify which headlines would be served for which query types
  4. Write negative keywords to exclude from the broad match
  5. Explain the tradeoff between reach and relevance
  6. Define the search term review cadence for copy refinement

assertions:
  - type: llm_judge
    criteria: "Semantic range mapping is thorough — identifies the realistic range of queries that broad match would trigger, including edge cases"
    weight: 0.25
    description: "Thorough semantic range mapping"
  - type: llm_judge
    criteria: "Headline diversity covers the query range — provides enough variety that Google's AI can assemble a relevant combination for diverse search queries"
    weight: 0.30
    description: "Query-range-covering headline diversity"
  - type: llm_judge
    criteria: "Negative keywords are well-chosen — correctly identifies queries within the broad match range that would waste spend due to poor intent match"
    weight: 0.25
    description: "Well-chosen negative keywords"
  - type: llm_judge
    criteria: "Reach-relevance tradeoff is honest — acknowledges the genuine tension and provides practical guidance rather than pretending broad match has no downsides"
    weight: 0.20
    description: "Honest reach-relevance tradeoff"
