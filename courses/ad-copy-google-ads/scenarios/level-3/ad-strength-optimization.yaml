meta:
  id: ad-strength-optimization
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Achieve 'Excellent' Ad Strength rating by optimizing RSA headline and description diversity"
  tags: [google-ads, ad-strength, rsa-optimization, diversity, advanced]

state: {}

trigger: |
  Google's Ad Strength indicator rates RSAs from "Poor" to
  "Excellent" based on relevance, quantity, and diversity of assets.
  Ads rated "Excellent" get up to 12% more impressions than "Poor"
  ads. Google evaluates:
  - Number of unique headlines and descriptions
  - Diversity of messaging angles
  - Keyword inclusion
  - Headline length variety
  - Whether headlines and descriptions work in any combination

  Optimize 4 RSAs from "Poor" or "Average" to "Excellent":

  RSA 1: Current rating — Poor
  Business: Online tutoring platform ($30/hour)
  Current headlines (5):
  H1: "Online Tutoring" | H2: "Get Tutoring Online" |
  H3: "Online Tutoring Service" | H4: "Best Online Tutoring" |
  H5: "Affordable Online Tutoring"
  Current descriptions (2):
  D1: "Sign up for online tutoring today." |
  D2: "Online tutoring for all subjects."
  Problems: Repetitive headlines, only 2 descriptions, no variety
  Task: Expand to 15 headlines + 4 descriptions with genuine diversity

  RSA 2: Current rating — Average
  Business: SaaS HR tool ($99/month)
  Current headlines (8): All benefit-focused, similar length
  Current descriptions (3): All feature lists
  Problems: No CTA headlines, no social proof, uniform length
  Task: Add variety in type, length, and angle to reach Excellent

  RSA 3: Current rating — Average
  Business: E-commerce pet supplies
  Current headlines (10): Good quantity but no keyword inclusion,
  all promotional
  Current descriptions (4): Strong but all include prices
  Problems: Missing keyword alignment and angle diversity
  Task: Improve keyword presence and angle variety

  RSA 4: Current rating — Poor
  Business: Law firm (estate planning)
  Current headlines (4): Short, generic, no trust signals
  Current descriptions (2): Vague, no CTA
  Problems: Insufficient assets, no credibility, no urgency
  Task: Complete rebuild with all asset types represented

  For each RSA:
  1. Diagnose the specific Ad Strength deficiencies
  2. Write the optimized version with all assets
  3. Label each headline's type (keyword, benefit, CTA, social proof,
     urgency, brand, question, feature)
  4. Show the length distribution of headlines (short/medium/long)
  5. Verify no two headlines are semantically redundant
  6. Predict the Ad Strength improvement

assertions:
  - type: llm_judge
    criteria: "Diagnoses correctly identify Ad Strength deficiencies — pinpoints the exact issues (repetition, insufficient assets, missing angles, uniform length)"
    weight: 0.25
    description: "Correct Ad Strength diagnosis"
  - type: llm_judge
    criteria: "Optimized RSAs achieve genuine diversity — headlines cover different types (benefit, CTA, social proof, urgency, keyword, question) with varied lengths"
    weight: 0.30
    description: "Genuine headline diversity"
  - type: llm_judge
    criteria: "No semantic redundancy — every headline adds unique information that the others don't cover"
    weight: 0.25
    description: "Zero semantic redundancy"
  - type: llm_judge
    criteria: "Headline type labeling is accurate — correctly categorizes each headline's primary function"
    weight: 0.20
    description: "Accurate headline type labeling"
