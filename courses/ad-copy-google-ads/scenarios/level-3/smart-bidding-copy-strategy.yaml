meta:
  id: smart-bidding-copy-strategy
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Align ad copy strategy with Smart Bidding algorithms for optimal AI-human collaboration"
  tags: [google-ads, smart-bidding, automation, copy-strategy, advanced]

state: {}

trigger: |
  Smart Bidding strategies (Target CPA, Target ROAS, Maximize
  Conversions, Maximize Conversion Value) use machine learning
  to optimize bids in real time. Ad copy must be designed to work
  WITH these algorithms rather than against them.

  Key principle: Smart Bidding optimizes for the signals it receives.
  Your ad copy choices determine WHICH signals the algorithm gets.

  Design copy strategies for 4 Smart Bidding scenarios:

  Scenario 1: Target CPA ($50) — B2B SaaS lead generation
  Current problem: CPA is $85 because ads attract low-intent clicks
  Task: Rewrite copy to pre-qualify clicks and reduce unqualified
  traffic. Include price signals, qualification language, and
  commitment indicators that help Smart Bidding learn faster.

  Scenario 2: Target ROAS (400%) — E-commerce with variable AOV
  Products range from $20-$500
  Current problem: Algorithm optimizes for cheap conversions,
  ignoring high-AOV products
  Task: Write separate ad groups for price tiers with copy that
  signals product value, helping ROAS bidding prioritize correctly.

  Scenario 3: Maximize Conversions — New campaign with no data
  Business: Online education platform, launching new course ($199)
  Current problem: No conversion history for the algorithm to learn
  Task: Write broad-appeal copy for the learning phase, then
  write refined copy for post-learning optimization.

  Scenario 4: Maximize Conversion Value — Multi-product retailer
  Products: Electronics ($50-$2,000), varying margins
  Current problem: Algorithm treats all conversions equally
  Task: Write copy that steers traffic toward high-margin products
  while maintaining conversion volume.

  For each scenario:
  1. Explain how the bidding strategy affects copy decisions
  2. Write the optimized RSAs (8 headlines, 4 descriptions)
  3. Define the ad group structure that supports the bidding logic
  4. Describe the learning phase copy vs mature phase copy
  5. Identify copy signals that help vs hurt the algorithm

assertions:
  - type: llm_judge
    criteria: "Copy-bidding alignment is clear — demonstrates how ad copy choices directly affect Smart Bidding performance through click quality and conversion signals"
    weight: 0.30
    description: "Clear copy-bidding alignment"
  - type: llm_judge
    criteria: "Pre-qualification strategy is effective — Target CPA copy includes price signals and qualification language that filters out low-intent clicks"
    weight: 0.25
    description: "Effective pre-qualification strategy"
  - type: llm_judge
    criteria: "Learning phase vs mature phase distinction is practical — provides genuinely different copy approaches for new campaigns vs established ones"
    weight: 0.25
    description: "Practical learning-phase strategy"
  - type: llm_judge
    criteria: "Ad group structure supports bidding — organizes campaigns so that each ad group's copy aligns with the bidding strategy's optimization target"
    weight: 0.20
    description: "Bidding-supportive ad group structure"
