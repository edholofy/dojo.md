meta:
  id: audience-segmented-copy
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Write audience-segmented Google Ads copy using observation and targeting audiences"
  tags: [google-ads, audience, segmentation, targeting, personalization, advanced]

state: {}

trigger: |
  Google Ads audiences — in-market, affinity, custom segments,
  remarketing lists, customer match, similar audiences, and
  demographics — allow you to tailor ad copy to specific user
  segments. Audience-specific copy typically outperforms generic
  copy by 20-40% in CTR.

  Write audience-segmented campaigns for 3 businesses:

  Business 1: Online university (MBA, Data Science, Nursing programs)
  Audience segments:
  - In-market: "Education > Degrees > Graduate Programs"
  - Custom segment: Visited competitor university websites
  - Affinity: "Business Professionals" vs "Technology Enthusiasts"
    vs "Healthcare Workers"
  - Demographics: 25-34 vs 35-44 vs 45+
  Task: Write distinct RSAs for each audience segment. Tailor
  value proposition, tone, and social proof to match the segment.

  Business 2: Home improvement retailer
  Audience segments:
  - In-market: "Home & Garden > Home Improvement > Kitchen Remodel"
  - Custom segment: DIY content consumers (YouTube DIY channels)
  - Remarketing: Viewed power tools vs viewed materials vs viewed
    services page
  - Customer match: Past purchasers (last 12 months)
  Task: Write ads that acknowledge each audience's relationship
  with the brand and intent level

  Business 3: Financial advisory firm
  Audience segments:
  - Life event: "Recently married" vs "New parent" vs "Approaching
    retirement"
  - In-market: "Financial Services > Investment Services"
  - Custom segment: Reads financial planning content
  - Demographics: High household income vs average income
  Task: Write ads with life-stage-appropriate financial messaging

  For each business:
  1. Write distinct RSAs (5 headlines + 4 descriptions) per segment
  2. Explain what changes between segments and why
  3. Define which audiences should be observation vs targeting
  4. Recommend bid adjustments by segment performance
  5. Design a testing plan to validate segment-specific copy lift

assertions:
  - type: llm_judge
    criteria: "Segment-specific copy is genuinely different — each audience gets meaningfully different messaging, not just surface-level word swaps"
    weight: 0.30
    description: "Genuinely segment-specific copy"
  - type: llm_judge
    criteria: "Audience selection is appropriate — correctly identifies which segments to target vs observe, and explains the strategic reasoning"
    weight: 0.25
    description: "Appropriate audience selection"
  - type: llm_judge
    criteria: "Life-stage messaging is empathetic — financial ads for new parents feel different from retirement-age ads, reflecting genuine lifestyle differences"
    weight: 0.25
    description: "Empathetic life-stage messaging"
  - type: llm_judge
    criteria: "Testing plan validates the approach — provides a methodology to prove that segment-specific copy outperforms generic copy"
    weight: 0.20
    description: "Validating testing plan"
