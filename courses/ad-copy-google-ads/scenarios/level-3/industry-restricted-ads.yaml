meta:
  id: industry-restricted-ads
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Write compliant Google Ads copy for restricted industries — healthcare, finance, legal, and gambling"
  tags: [google-ads, restricted, healthcare, finance, legal, compliance, advanced]

state: {}

trigger: |
  Google Ads restricts advertising in certain industries with
  additional copy requirements, certification needs, and content
  limitations. Writing effective ads within these constraints
  requires deep policy knowledge.

  Write compliant ad campaigns for 5 restricted industries:

  Industry 1: Healthcare — Prescription drug information
  Business: Online pharmacy (licensed, VIPPS-certified)
  Restrictions: No claims of curing diseases, no before/after
  promises, must include disclaimers, need LegitScript certification
  Keywords: "buy prescription medications online," "online pharmacy"
  Task: Write a complete RSA that promotes the pharmacy while
  fully complying with healthcare ad policies

  Industry 2: Financial services — Lending
  Business: Personal loan company ($5,000-$50,000 loans)
  Restrictions: Must include APR range, loan terms, lender info,
  cannot guarantee approval, must comply with TILA
  Keywords: "personal loan," "debt consolidation loan"
  Task: Write RSAs that include required financial disclosures
  within character limits

  Industry 3: Legal services — Personal injury
  Business: Law firm (free consultation, contingency fee)
  Restrictions: Cannot guarantee outcomes, must comply with state
  bar advertising rules, no misleading success claims
  Keywords: "personal injury lawyer," "car accident attorney"
  Task: Write ads that convey competence and results without
  making prohibited promises

  Industry 4: Gambling — Online sports betting
  Business: Licensed online sportsbook (available in 5 states)
  Restrictions: Must be licensed in target states, no advertising
  to minors, must include responsible gambling messaging
  Keywords: "online sports betting," "bet on NFL games"
  Task: Write ads with responsible gambling language and
  geo-targeting considerations

  Industry 5: Alcohol — Craft brewery direct-to-consumer
  Business: Craft beer subscription box
  Restrictions: No promoting excessive consumption, no targeting
  minors, must comply with state shipping laws
  Keywords: "craft beer delivery," "beer subscription box"
  Task: Write ads that celebrate the product while meeting alcohol
  advertising guidelines

  For each industry:
  1. List the specific Google Ads policy restrictions
  2. Write the complete RSA (8 headlines, 4 descriptions)
  3. Identify required certifications or approvals
  4. Write the required disclaimers within character limits
  5. Provide a compliance review checklist specific to the industry

assertions:
  - type: llm_judge
    criteria: "Policy restrictions are accurately cited — correctly identifies the specific Google Ads policies for each restricted industry"
    weight: 0.25
    description: "Accurate policy citation"
  - type: llm_judge
    criteria: "Ads comply while remaining compelling — the restricted ads are still persuasive and competitive despite the compliance constraints"
    weight: 0.30
    description: "Compelling within compliance"
  - type: llm_judge
    criteria: "Required disclosures fit character limits — financial APR ranges, legal disclaimers, and gambling warnings are included without exceeding limits"
    weight: 0.25
    description: "Disclosures within character limits"
  - type: llm_judge
    criteria: "Compliance checklists are comprehensive — cover all steps from certification to ad copy to landing page requirements"
    weight: 0.20
    description: "Comprehensive compliance checklists"
