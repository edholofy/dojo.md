meta:
  id: seasonal-promotional-ads
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Write seasonal and promotional Google Ads copy with time-sensitive campaign management"
  tags: [google-ads, seasonal, promotions, holidays, campaigns, advanced]

state: {}

trigger: |
  Seasonal and promotional campaigns require careful timing,
  urgency calibration, and rapid copy turnover. Google Ads
  offers promotion extensions, countdown customizers, and
  seasonal bid adjustments to support these campaigns.

  Write seasonal ad campaigns for 4 businesses across different
  calendar events:

  Business 1: E-commerce fashion retailer
  Event: Black Friday / Cyber Monday
  Timeline: Teaser (2 weeks before), Early Access (3 days before),
  Black Friday, Cyber Monday, Extended (3 days after)
  Task: Write a complete ad sequence across all 5 phases with
  evolving messaging, countdown timers, and promotion extensions

  Business 2: Tax preparation service
  Event: Tax season (January - April 15)
  Timeline: Early bird (Jan), Peak season (Feb-Mar),
  Last minute (Apr 1-15), Extension reminder (Apr 16-Oct 15)
  Task: Write ads that shift from planning to urgency across
  the season, with different messaging per phase

  Business 3: Fitness equipment retailer
  Event: New Year resolution season (Dec 26 - Feb 15)
  Timeline: Pre-resolution (Dec 26-31), Resolution peak (Jan 1-15),
  Commitment check (Jan 16-31), Habit formation (Feb 1-15)
  Task: Write ads that match the emotional arc of resolution-makers

  Business 4: B2B software company
  Event: End of fiscal year (Q4 push)
  Timeline: Budget planning (Oct), Use-it-or-lose-it (Nov),
  Last chance (Dec 1-20), Year-end close (Dec 21-31)
  Task: Write B2B ads that leverage fiscal year urgency without
  sounding desperate

  For each business:
  1. Write complete RSAs for each campaign phase
  2. Write promotion extensions with correct dates and offers
  3. Include countdown customizer syntax where appropriate
  4. Define the transition plan between phases
  5. Write the post-event recovery campaign
  6. Recommend budget pacing across phases

assertions:
  - type: llm_judge
    criteria: "Phase transitions are smooth — messaging evolves logically across campaign phases rather than abruptly switching between unrelated themes"
    weight: 0.25
    description: "Smooth phase transitions"
  - type: llm_judge
    criteria: "Urgency escalation is calibrated — urgency increases appropriately across phases without starting at maximum intensity"
    weight: 0.30
    description: "Calibrated urgency escalation"
  - type: llm_judge
    criteria: "Countdown customizers and promotion extensions use correct syntax and timing — dates, formatting, and fallback text are properly configured"
    weight: 0.25
    description: "Correct customizer implementation"
  - type: llm_judge
    criteria: "Post-event recovery is planned — includes a strategy for after the promotion ends rather than leaving campaigns to expire"
    weight: 0.20
    description: "Planned post-event recovery"
