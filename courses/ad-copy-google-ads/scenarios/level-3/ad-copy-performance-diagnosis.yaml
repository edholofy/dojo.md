meta:
  id: ad-copy-performance-diagnosis
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Diagnose and fix underperforming Google Ads copy using performance data"
  tags: [google-ads, performance, diagnosis, optimization, metrics, advanced]

state: {}

trigger: |
  Diagnosing ad copy performance requires connecting metrics to
  specific copy elements. When an ad underperforms, the data tells
  you which element to fix.

  Metric-to-copy-element diagnosis guide:
  - Low CTR + Good Impression Share → Headline problem
  - High CTR + Low Conversion Rate → Description or landing page
  - High CPC + Low Quality Score → Relevance or CTR issue
  - Good CTR + High CPA → Attracting wrong audience (copy too broad)

  Diagnose and fix 5 underperforming campaigns:

  Campaign 1: Low CTR (1.2% vs 3.5% industry average)
  Business: SaaS accounting tool ($49/month)
  Data: 50,000 impressions, 600 clicks, 12 conversions
  Quality Score: 5/10 (Below Avg CTR, Avg Relevance, Avg LP)
  Current ad: Generic benefit headlines, no urgency, no numbers
  Task: Diagnose the CTR problem, rewrite to fix it

  Campaign 2: High CTR (8.2%) but terrible conversion rate (0.3%)
  Business: Online course platform ($299 course)
  Data: 20,000 impressions, 1,640 clicks, 5 conversions
  Current ad: "Free Training" headline, but course costs $299
  Task: Diagnose the CTR-to-conversion gap, fix the mismatch

  Campaign 3: Escalating CPA ($180 vs $50 target)
  Business: B2B lead generation (consulting firm)
  Data: High impressions, decent CTR (3.8%), but leads are
  unqualified (wrong company size, wrong industry)
  Current ad: Broad messaging with no qualification signals
  Task: Add qualification filters to copy without killing volume

  Campaign 4: Declining performance over time
  Business: E-commerce supplements ($40 product)
  Data: Month 1 CTR 5.1%, Month 2: 3.8%, Month 3: 2.4%
  Same ads running for 3 months with no changes
  Task: Diagnose ad fatigue, create a refresh strategy

  Campaign 5: Good performance metrics but losing impression share
  Business: Local law firm
  Data: CTR 6.2%, Conv rate 12%, but impression share dropped
  from 85% to 42% over 2 months
  Quality Score declined from 8 to 5
  Task: Diagnose the Quality Score decline and restore it

  For each campaign:
  1. State the primary diagnosis in one sentence
  2. Identify the specific copy element causing the problem
  3. Write the optimized ad (8 headlines, 4 descriptions)
  4. Predict the metric improvement with reasoning
  5. Recommend the monitoring cadence going forward

assertions:
  - type: llm_judge
    criteria: "Diagnoses are data-driven — correctly connects specific metrics to specific copy problems rather than generic optimization advice"
    weight: 0.30
    description: "Data-driven diagnoses"
  - type: llm_judge
    criteria: "Fixes target the root cause — rewrites address the diagnosed issue specifically (CTR fix for CTR problems, qualification for CPA problems)"
    weight: 0.30
    description: "Root-cause-targeting fixes"
  - type: llm_judge
    criteria: "Ad fatigue diagnosis is actionable — provides a concrete refresh strategy with timeline and creative rotation plan"
    weight: 0.20
    description: "Actionable ad fatigue strategy"
  - type: llm_judge
    criteria: "Metric predictions are grounded — improvement estimates cite reasonable percentages based on the type of fix applied"
    weight: 0.20
    description: "Grounded metric predictions"
