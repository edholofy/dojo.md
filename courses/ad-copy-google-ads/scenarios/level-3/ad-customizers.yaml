meta:
  id: ad-customizers
  level: 3
  course: ad-copy-google-ads
  type: output
  description: "Use Google Ads customizers to create dynamic, personalized ad copy at scale"
  tags: [google-ads, customizers, dynamic-copy, personalization, advanced]

state: {}

trigger: |
  Ad customizers dynamically insert content into ads based on
  user context: countdown timers, location, device, audience,
  and custom business data feeds. They enable personalization
  at scale without creating hundreds of individual ads.

  Key customizer types:
  - Countdown: {=COUNTDOWN("2026/03/15 18:00:00","en-US",5)}
  - Location insertion: {LOCATION(City)}
  - IF functions: {=IF(device=mobile,Mobile text):Default text}
  - Business data feeds: Custom attributes from uploaded spreadsheets

  Implement customizer strategies for 4 businesses:

  Business 1: Event ticketing platform
  Event: Tech conference (March 15, 2026)
  Pricing tiers: Early bird $299 (ends Feb 28), Regular $499,
  Door $699
  Task: Write ads using countdown customizers for each pricing
  tier deadline, plus IF functions for mobile vs desktop

  Business 2: Multi-location retail chain (15 stores)
  Products: Same across stores, but promotions vary by region
  Task: Write ads using location insertion for city names,
  plus business data feed for store-specific offers

  Business 3: Seasonal e-commerce (fashion)
  Seasons: Spring collection launching, winter clearance ending
  Task: Write ads using countdown for clearance end date,
  IF functions for returning vs new customers

  Business 4: B2B software with industry-specific solutions
  Industries served: Healthcare, Finance, Education, Retail
  Task: Write ads using business data feed customizers that swap
  industry-specific value props, case studies, and compliance
  language based on audience signal

  For each business:
  1. Write the customizer syntax correctly for each ad element
  2. Write the default/fallback text for when customizers can't fire
  3. Show 3 example rendered versions of the same ad template
  4. Explain the data feed structure required
  5. Identify common customizer mistakes and how to avoid them

assertions:
  - type: llm_judge
    criteria: "Customizer syntax is correct — countdown, location, IF function, and data feed syntax follows Google's exact format requirements"
    weight: 0.30
    description: "Correct customizer syntax"
  - type: llm_judge
    criteria: "Fallback text is meaningful — default copy works as a strong standalone ad when customizers can't render"
    weight: 0.25
    description: "Meaningful fallback text"
  - type: llm_judge
    criteria: "Rendered examples demonstrate value — shows how the same template produces genuinely different, relevant ads for different users"
    weight: 0.25
    description: "Value-demonstrating rendered examples"
  - type: llm_judge
    criteria: "Common mistakes are practical — identifies real customizer errors like character overflow, missing defaults, and feed formatting issues"
    weight: 0.20
    description: "Practical mistake identification"
