meta:
  id: reminder-for-existential-challenges
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Apply healthcare communication expertise to existential challenges — pandemic preparedness, climate health adaptation, mental health crisis, and aging population communication"
  tags: [existential-challenges, pandemic-preparedness, population-aging, master]

state: {}

trigger: |
  Apply healthcare appointment communication expertise
  to existential challenges facing global health systems.

  Challenge 1 — Pandemic preparedness:
  Design a communication system that can scale from
  normal operations (100K daily appointments) to pandemic
  response (10M daily vaccination appointments) within
  weeks.
  - Mass scheduling and reminder communication
  - Vaccine eligibility notification by population tier
  - Second dose/booster scheduling and reminders
  - Adverse event reporting integration
  - Multi-language, multi-literacy communication
  - Misinformation counter-messaging within reminders

  Challenge 2 — Climate health adaptation:
  Develop communication for climate-related health
  services — heat wave response clinics, wildfire
  respiratory check-ups, flood-related disease screening.
  - Rapid deployment for emergency health services
  - Geographically-targeted communication
  - Vulnerable population priority messaging
  - Integration with emergency management systems
  - Post-disaster healthcare navigation

  Challenge 3 — Mental health crisis:
  Address the global mental health crisis through
  communication-driven appointment adherence.
  - 50% of mental health patients drop out after 3 sessions
  - Stigma prevents many from seeking initial appointments
  - Crisis intervention integration with reminder systems
  - Therapeutic alliance maintenance through messaging
  - Peer support connection through communication platforms

  Challenge 4 — Aging population:
  Design communication for an aging society where 25%
  of patients have cognitive impairment, multiple chronic
  conditions, and complex care coordination needs.
  - Caregiver communication networks
  - Cognitive-adaptive messaging
  - Fall prevention appointment reminders
  - End-of-life care communication sensitivity
  - Social isolation detection through engagement patterns

  Create:
  1. Pandemic-scalable communication architecture
  2. Climate health rapid deployment protocol
  3. Mental health communication that reduces dropout
  4. Aging population adaptive communication system
  5. Cross-challenge communication platform design
  6. Ethical framework for crisis communication
  7. Research priorities for each challenge

assertions:
  - type: llm_judge
    criteria: "Pandemic communication architecture can genuinely scale 100x — addresses infrastructure scaling, message prioritization under load, equity in access during surge, and the unique challenge of communicating with people who've never used the health system before."
    weight: 0.35
    description: "PandemicScalability"
  - type: llm_judge
    criteria: "Mental health communication reduces dropout through relationship, not pressure — uses therapeutic principles in messaging, maintains connection between sessions, normalizes the treatment journey, and integrates crisis resources naturally."
    weight: 0.35
    description: "MentalHealthRelationship"
  - type: llm_judge
    criteria: "Aging population system detects social isolation through engagement patterns — recognizes that changing response patterns (slower, less frequent, confused) may indicate cognitive decline or isolation, triggers welfare outreach appropriately."
    weight: 0.30
    description: "IsolationDetection"
