meta:
  id: reminder-technology-unicorn
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Scale a healthcare communication platform from startup to global company — building the infrastructure that transforms how the world's health systems communicate with patients"
  tags: [healthtech-unicorn, global-scaling, platform-building, master]

state: {}

trigger: |
  Scale "CareConnect AI" from successful US-based
  health tech company to the global platform for
  patient appointment communication.

  Current state (Year 3):
  - 200 health system clients in US
  - $85M ARR, growing 12% MoM
  - Series C: $150M raised (Sequoia lead)
  - 350-person team
  - Processing 50M patient messages/month
  - NPS: 78 (exceptional for health tech)
  - AI no-show prediction accuracy: 89%

  Growth targets (Years 3-6):
  - Year 4: International launch (UK, Canada, Australia)
  - Year 5: European expansion (GDPR complexity)
  - Year 6: LMIC presence (WHO partnership), $500M ARR
  - IPO readiness by Year 6

  Strategic challenges:

  International expansion:
  - NHS integration (UK) — single payer, different data model
  - EU data sovereignty (GDPR, country-specific rules)
  - Asia-Pacific (Japan, Singapore) — cultural communication
  - LMIC markets — fundamentally different infrastructure
  - Language/cultural adaptation at scale (50+ languages)

  Product evolution:
  - Conversational AI for appointment management
  - Population health communication layer
  - Clinical trial recruitment communication
  - Payer-provider communication bridge
  - Patient-generated data integration

  Competitive threats:
  - Epic/Cerner building native solutions
  - Big Tech (Google Health, Amazon Health) entering market
  - Regional competitors in each new market
  - Open-source alternatives gaining traction

  Create:
  1. International expansion playbook
  2. Product roadmap (Years 4-6)
  3. Competitive moat strategy
  4. Organizational scaling plan (350 → 2,000)
  5. Regulatory strategy across jurisdictions
  6. IPO readiness assessment and timeline
  7. Social impact integration into growth strategy

assertions:
  - type: llm_judge
    criteria: "International expansion acknowledges healthcare's local complexity — NHS integration requires understanding commissioning, EU expansion addresses data sovereignty beyond just GDPR compliance, and LMIC entry requires fundamentally different product."
    weight: 0.35
    description: "InternationalHealthcareComplexity"
  - type: llm_judge
    criteria: "Competitive moat deepens with scale — network effects from cross-system learning, AI models trained on massive diverse data, regulatory compliance as barrier to entry, and health system switching costs; the moat compounds over time."
    weight: 0.35
    description: "CompetitiveMoatCompounding"
  - type: llm_judge
    criteria: "Social impact is genuinely integrated, not CSR theater — LMIC access, health equity features, and open-source contributions are core to the business strategy, not afterthoughts; the company's mission and growth are aligned."
    weight: 0.30
    description: "SocialImpactIntegration"
