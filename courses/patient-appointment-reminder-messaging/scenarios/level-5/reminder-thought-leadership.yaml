meta:
  id: reminder-thought-leadership
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Establish global thought leadership in patient appointment communication — keynote development, industry influence, and shaping healthcare communication discourse"
  tags: [thought-leadership, global-influence, healthcare-communication, master]

state: {}

trigger: |
  You are invited to deliver the opening keynote at
  the World Health Communication Summit, the most
  prestigious global gathering of healthcare
  communication leaders.

  Event details:
  - Audience: 5,000 attendees from 60 countries
  - Mix: Health system CEOs, CMOs, CIOs, WHO officials,
    health tech leaders, patient advocates
  - Keynote: 45 minutes + 15 minute Q&A
  - Theme: "Communication as Care"
  - Live-streamed to 100,000+ healthcare professionals
  - Published in JAMA Health Forum as invited perspective

  Your thesis:
  "Every appointment reminder is a clinical intervention.
  When we treat patient communication as administrative
  overhead rather than a care delivery tool, we fail our
  patients and our profession."

  Supporting arguments:
  - Data showing communication quality predicts health
    outcomes independent of clinical care quality
  - Case studies from 5 countries showing communication-
    driven health improvements
  - The hidden clinical harm of poor communication
    (missed appointments → delayed diagnosis → worse
    outcomes → health disparities)
  - AI as the great equalizer in patient communication
  - The moral imperative of communication equity

  Create:
  1. Complete keynote script with stage directions
  2. Supporting data visualizations
  3. International case studies (5 countries)
  4. Audience engagement elements
  5. Post-keynote action framework for attendees
  6. Named model/framework for the field
  7. JAMA perspective article draft

assertions:
  - type: llm_judge
    criteria: "Keynote reframes the field — elevates appointment communication from administrative function to clinical intervention; the thesis is provocative but defensible, and the audience will never think about reminders the same way."
    weight: 0.35
    description: "KeynoteReframingPower"
  - type: llm_judge
    criteria: "International case studies reveal universal principles — examples from different health systems (single-payer, multi-payer, LMIC) demonstrate that communication quality matters regardless of system design; the principles transcend context."
    weight: 0.35
    description: "InternationalUniversality"
  - type: llm_judge
    criteria: "Named framework is memorable and adoptable — creates a model that attendees can immediately apply, simple enough to explain in an elevator pitch but robust enough for systematic implementation."
    weight: 0.30
    description: "FrameworkMemorability"
