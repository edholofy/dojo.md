meta:
  id: reminder-research-handbook
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Author the definitive research handbook on patient appointment communication — comprehensive academic reference establishing the field's theoretical foundations, methods, and future directions"
  tags: [research-handbook, academic-reference, field-establishment, master]

state: {}

trigger: |
  Author the definitive research handbook on patient
  appointment communication for an academic publisher.
  This handbook establishes the field as a recognized
  area of health services research.

  Publisher: Springer (Health Informatics Series)
  Format: 28 chapters, 700+ pages
  Contributors: 50+ scholars and practitioners
  Timeline: 24 months

  Handbook structure:

  Part I — Foundations (Chapters 1-6)
  - History of patient-provider communication
  - Health behavior theory applied to appointment adherence
  - Communication science in healthcare settings
  - Health informatics and communication systems
  - Behavioral economics and patient decision-making
  - Health equity and communication justice

  Part II — Methods (Chapters 7-11)
  - RCT design for communication interventions
  - Observational studies and natural experiments
  - Qualitative methods in communication research
  - AI/ML methods for communication optimization
  - Implementation science for communication interventions

  Part III — Channels and Modalities (Chapters 12-17)
  - SMS and text messaging research
  - Email and digital communication
  - Voice and conversational AI
  - Patient portal and interactive systems
  - Community health worker communication
  - Emerging modalities (AR/VR, wearables)

  Part IV — Populations and Contexts (Chapters 18-23)
  - Pediatric and adolescent communication
  - Geriatric and cognitive impairment
  - Behavioral health communication
  - Chronic disease management communication
  - Acute care and emergency follow-up
  - Global health and LMIC contexts

  Part V — Future (Chapters 24-28)
  - AI and autonomous communication systems
  - Communication and precision medicine
  - Regulatory evolution and patient rights
  - Climate health and pandemic communication
  - Research agenda for the next decade

  Create:
  1. Table of contents with chapter abstracts
  2. Three full chapter drafts (Foundations, Methods, Future)
  3. Contributor recruitment strategy
  4. Editorial guidelines
  5. Research gaps across all parts
  6. Teaching companion design
  7. Open-access and impact strategy

assertions:
  - type: llm_judge
    criteria: "Chapter abstracts establish a coherent field — each chapter builds on previous ones, cross-references are planned, and together they make the case that patient appointment communication is a distinct, important area of health services research."
    weight: 0.35
    description: "CoherentFieldEstablishment"
  - type: llm_judge
    criteria: "Sample chapters demonstrate academic rigor appropriate for the publisher — proper literature review, theoretical grounding, methodological precision, and scholarly contribution; these would be accepted by peer reviewers."
    weight: 0.35
    description: "AcademicRigorStandard"
  - type: llm_judge
    criteria: "Research gaps are genuinely novel and significant — not just 'more research needed' but specific hypotheses, methodological innovations, and data sources that would advance the field; gives emerging researchers clear directions."
    weight: 0.30
    description: "ResearchGapSignificance"
