meta:
  id: reminder-graduate-program
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a graduate-level academic program in healthcare patient communication — curriculum, research agenda, and academic-industry bridge for a new discipline"
  tags: [graduate-program, academic-design, new-discipline, master]

state: {}

trigger: |
  Design a graduate-level academic program that
  establishes healthcare patient communication as a
  recognized academic discipline. A top school of
  public health has invited you to create this
  first-of-its-kind program.

  University context:
  - Top-10 school of public health
  - Existing health informatics and health policy programs
  - Medical school with patient safety research center
  - Engineering school with AI/ML capabilities
  - Health system partnership for applied research
  - Endowment for 4 faculty positions

  Program tracks:
  - MS in Healthcare Communication Science (12-18 months)
  - MPH concentration in Patient Communication (6 courses)
  - PhD in Healthcare Communication Systems (4-5 years)
  - Executive certificate for health system leaders (6 months)

  Core knowledge areas:
  - Communication science and health behavior theory
  - Health informatics and EHR systems
  - Regulatory and compliance frameworks
  - Data science and AI in healthcare communication
  - Health equity and social determinants
  - Behavioral economics and nudge theory
  - Patient experience and human-centered design
  - Implementation science and change management

  Research agenda:
  - Communication-driven health outcomes
  - AI ethics in patient communication
  - Health equity in digital communication
  - Global communication standards
  - Next-generation communication modalities

  Create:
  1. Program design for all four tracks
  2. Course catalog (18 courses with descriptions)
  3. Faculty hiring profiles (4 positions)
  4. Research center design and agenda
  5. Industry partnership model
  6. Student recruitment and placement strategy
  7. Accreditation plan

assertions:
  - type: llm_judge
    criteria: "Program establishes a new discipline — doesn't just combine existing courses from informatics and communication departments but creates genuinely new curriculum at the intersection; graduates have skills no other program produces."
    weight: 0.35
    description: "NewDisciplineCreation"
  - type: llm_judge
    criteria: "Research agenda identifies questions that matter — focuses on unanswered questions with practical implications (does AI communication improve or harm the patient-provider relationship? What communication factors predict health outcomes independent of clinical care?)."
    weight: 0.35
    description: "ResearchAgendaSignificance"
  - type: llm_judge
    criteria: "Industry partnership balances academic independence with practical relevance — health systems get talent and research insights, students get experience and jobs, and the partnership doesn't compromise research objectivity."
    weight: 0.30
    description: "IndustryPartnershipBalance"
