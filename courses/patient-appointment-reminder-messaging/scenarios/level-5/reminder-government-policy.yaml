meta:
  id: reminder-government-policy
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Shape government policy on patient communication in healthcare — Congressional testimony, regulatory proposals, and patient rights frameworks"
  tags: [government-policy, patient-rights, regulatory-framework, master]

state: {}

trigger: |
  You are invited to testify before Congress and advise
  on comprehensive patient communication policy in
  healthcare. Your expertise is sought to shape
  legislation that protects patients while enabling
  innovation.

  Congressional context:
  - Senate HELP Committee hearing
  - Title: "Patient Communication in the Digital Age:
    Rights, Access, and Innovation"
  - Triggered by: widespread patient complaints about
    communication failures, HIPAA breach scandals in
    AI messaging, and growing health disparities in
    digital communication access

  Issues under consideration:

  1. Patient Communication Bill of Rights:
  - Right to choose communication channel
  - Right to communication in preferred language
  - Right to accessible communication (disability)
  - Right to communication privacy
  - Right to opt out without care consequences
  - Right to human communication option (AI disclosure)

  2. AI in Patient Communication:
  - Disclosure requirements when AI handles communication
  - Algorithmic bias auditing requirements
  - Clinical safety standards for AI triage in messaging
  - Patient consent for AI-generated health communication
  - Liability framework for AI communication failures

  3. Communication Equity:
  - Mandated multilingual communication standards
  - Digital literacy support requirements
  - Rural and underserved access mandates
  - Health equity reporting requirements
  - Funding for communication infrastructure

  4. Innovation and Competition:
  - Interoperability mandates for communication systems
  - Open standards requirements
  - Small practice impact considerations
  - International competitiveness
  - Privacy vs innovation balance

  Create:
  1. Written testimony for Congressional hearing
  2. Patient Communication Bill of Rights (legislative language)
  3. AI governance framework for healthcare messaging
  4. Communication equity mandate proposal
  5. Regulatory impact analysis
  6. Implementation roadmap for health systems
  7. Funding recommendations

assertions:
  - type: llm_judge
    criteria: "Testimony is authoritative and balanced — presents evidence from research and practice, acknowledges legitimate concerns from all stakeholders (patients, providers, vendors, payers), and makes specific recommendations with supporting rationale."
    weight: 0.35
    description: "TestimonyAuthority"
  - type: llm_judge
    criteria: "Patient Bill of Rights is specific and implementable — goes beyond aspirational language to define enforceable rights with measurable compliance criteria; addresses the tension between patient rights and practical constraints."
    weight: 0.35
    description: "BillOfRightsSpecificity"
  - type: llm_judge
    criteria: "AI governance framework addresses healthcare-specific risks — AI communication failures in healthcare can harm patients (missed critical appointments, wrong preparation instructions); the framework ensures clinical safety while enabling innovation."
    weight: 0.30
    description: "AIGovernanceClinicalSafety"
