meta:
  id: reminder-memoir
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a professional memoir documenting a career pioneering patient communication in healthcare — personal stories, industry evolution, and the human impact of getting communication right"
  tags: [memoir, career-reflection, human-impact, master]

state: {}

trigger: |
  Write a professional memoir documenting your 25-year
  career pioneering patient appointment communication
  in healthcare. This memoir centers on the human
  stories behind the systems.

  Career arc:

  Act 1 — The Receptionist's Insight (Years 1-8)
  - Started as front desk receptionist at a community
    health center in 2001
  - First realization: half the no-shows had tried to
    come but couldn't (transportation, childcare, wrong day)
  - Started calling patients personally — no-shows dropped
    from 35% to 18% on her schedule
  - Hospital administrator noticed, offered operations role
  - Built first automated reminder system (crude but effective)
  - Turning point: elderly patient died because she missed
    her oncology follow-up (the reminder went to old number)
  - Lesson: "Every missed message is a person"

  Act 2 — The System Builder (Years 9-16)
  - Led reminder system implementation for 500-provider
    health system
  - Discovered massive health disparities in communication
  - Built first multilingual reminder system in her market
  - Launched behavioral nudge research program
  - Speaking at HIMSS changed everything (standing ovation)
  - Published first paper in Health Affairs
  - Failure: AI system flagged patients by race for
    different messaging — had to shut it down
  - Lesson: "Technology amplifies both our best and worst
    instincts"

  Act 3 — The Global Advocate (Years 17-25)
  - WHO advisory committee appointment
  - Launched social enterprise for LMIC healthcare
  - Testified before Congress on patient communication rights
  - Founded the academic discipline
  - COVID: Everything she'd built was tested at scale
  - Current: Shaping AI ethics in healthcare communication
  - Lesson: "The most important technology is human
    connection"

  Create:
  1. Complete memoir outline (22 chapters)
  2. Three sample chapters (one from each Act)
  3. Key patient stories that shaped the career
  4. Industry evolution told through personal experience
  5. Lessons distilled for the next generation
  6. Reflection on failures and ethical reckonings
  7. Vision for the future

assertions:
  - type: llm_judge
    criteria: "Memoir voice is authentic and vulnerable — shares failures and ethical reckonings as honestly as successes; the AI race-flagging incident and the patient death are told with genuine emotion, not just as lessons."
    weight: 0.35
    description: "AuthenticVulnerability"
  - type: llm_judge
    criteria: "Patient stories humanize the systems — real (fictionalized) patients whose lives were affected by communication quality ground every technical discussion; the reader remembers the people, not just the processes."
    weight: 0.35
    description: "PatientStoryHumanization"
  - type: llm_judge
    criteria: "Career arc from receptionist to global leader is told authentically — each transition feels earned rather than inevitable, with setbacks and self-doubt along the way; the reader sees both the personal growth and the systemic change."
    weight: 0.30
    description: "CareerArcAuthenticity"
