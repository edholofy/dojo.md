meta:
  id: reminder-social-enterprise
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Launch a social enterprise using healthcare communication expertise — bridge the digital health divide and improve appointment adherence for underserved populations globally"
  tags: [social-enterprise, digital-divide, global-health, master]

state: {}

trigger: |
  Launch a social enterprise that uses healthcare
  appointment communication expertise to address the
  global digital health divide.

  Problem statement:
  - 3.6B people lack reliable access to healthcare
  - In LMICs, appointment no-show rates reach 40-60%
  - Community health worker systems lack communication tools
  - Feature phone SMS is the primary digital channel
    for 2B+ people
  - Language barriers limit communication effectiveness
  - No affordable, culturally-adapted solutions exist

  Social enterprise: "HealthBridge Communications"
  Mission: Ensure every patient, everywhere, receives
  timely, culturally appropriate appointment communication
  regardless of technology access or economic status.

  Model elements:
  - Open-source SMS-based reminder platform
  - Community health worker communication toolkit
  - Multi-language message library (100+ languages)
  - Offline-capable mobile app for health workers
  - Voice-based reminders for non-literate populations
  - Integration with national health information systems

  Revenue sustainability:
  - Cross-subsidy from high-income health system licensing
  - Global health grants (BMGF, USAID, WHO)
  - Government contracts in participating countries
  - Social impact investment
  - Premium AI features for paying customers

  Impact targets:
  - Reach 50M patients in 5 years
  - Reduce no-show rates by 40% in target populations
  - Support 200,000 community health workers
  - Deploy in 25 countries

  Create:
  1. Social enterprise business plan
  2. Technology platform architecture
  3. Community health worker toolkit design
  4. Multi-language and literacy adaptation strategy
  5. Impact measurement framework
  6. Sustainability and scaling plan
  7. Partnership strategy (WHO, governments, NGOs)

assertions:
  - type: llm_judge
    criteria: "Technology platform works in constrained environments — functions on feature phones, works with intermittent connectivity, supports voice-based interaction for non-literate users, and doesn't require expensive infrastructure."
    weight: 0.35
    description: "ConstrainedEnvironmentDesign"
  - type: llm_judge
    criteria: "Community health worker toolkit is practical and empowering — tools are designed with CHW input, don't add administrative burden, enhance rather than replace human judgment, and work within existing community structures."
    weight: 0.35
    description: "CHWToolkitPracticality"
  - type: llm_judge
    criteria: "Impact measurement goes beyond reach to outcomes — tracks not just messages sent but appointment attendance improvement, health outcome changes, and community health worker effectiveness; demonstrates genuine impact on health equity."
    weight: 0.30
    description: "ImpactMeasurementDepth"
