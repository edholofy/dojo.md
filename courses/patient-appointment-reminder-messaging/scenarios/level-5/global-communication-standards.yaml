meta:
  id: global-communication-standards
  level: 5
  course: patient-appointment-reminder-messaging
  type: output
  description: "Develop global standards for patient appointment communication — international best practices, cross-border interoperability, and universal quality frameworks for WHO adoption"
  tags: [global-standards, who-framework, international-practices, master]

state: {}

trigger: |
  Lead the development of the first global standards
  for patient appointment communication, commissioned
  by the World Health Organization.

  Scope:
  - Standards applicable across 194 WHO member states
  - Must work in high-income, middle-income, and low-income
    health systems
  - Must accommodate vastly different technology
    infrastructure
  - Must respect cultural communication norms globally
  - Must be evidence-based and measurable

  Regional considerations:

  High-income countries (US, UK, Germany, Japan):
  - Advanced EHR systems and digital infrastructure
  - Complex regulatory environments
  - High patient expectations for personalization
  - AI and automation widely available

  Middle-income countries (Brazil, India, Thailand, South Africa):
  - Mixed digital/paper systems
  - Mobile-first communication (WhatsApp dominant)
  - Language diversity challenges
  - Growing healthcare infrastructure
  - Community health worker integration

  Low-income countries (rural Sub-Saharan Africa, rural SE Asia):
  - Limited digital infrastructure
  - Community health worker-based systems
  - Oral communication cultures
  - Feature phone (SMS) as primary digital channel
  - Shared devices and community phones

  Cross-cutting themes:
  - Privacy and consent across legal frameworks
  - Health literacy adaptation
  - Gender-sensitive communication
  - Disability accessibility
  - Emergency and outbreak communication

  Create:
  1. Global standards framework document
  2. Implementation tiers by health system maturity
  3. Technology-appropriate solutions for each tier
  4. Cultural adaptation methodology
  5. Quality measurement framework
  6. Training resources for global adoption
  7. Standards governance and evolution process

assertions:
  - type: llm_judge
    criteria: "Standards accommodate extreme diversity without being meaningless — identifies universal principles (timeliness, clarity, respect, accessibility) while providing implementation guidance that's practical for a rural clinic in Mali and a teaching hospital in Boston."
    weight: 0.35
    description: "DiversityWithSubstance"
  - type: llm_judge
    criteria: "Technology-appropriate solutions for low-resource settings are innovative, not just scaled-down versions of high-tech solutions — leverages community health workers, oral communication, feature phone SMS, and local language capacity."
    weight: 0.35
    description: "LowResourceInnovation"
  - type: llm_judge
    criteria: "Quality measurement framework works across settings — defines metrics that can be collected in any setting (even without digital systems), uses proxy measures when direct measurement isn't feasible, and allows meaningful comparison."
    weight: 0.30
    description: "UniversalMeasurement"
