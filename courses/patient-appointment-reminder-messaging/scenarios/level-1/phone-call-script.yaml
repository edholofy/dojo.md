meta:
  id: phone-call-script
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a phone call script for an appointment reminder — natural-sounding script for staff or automated systems with voicemail backup"
  tags: [phone-script, voicemail, automated-call, beginner]

state: {}

trigger: |
  Write a phone call script for appointment reminders
  that can be used by front desk staff or adapted for
  an automated calling system. Include a voicemail
  version.

  Patient: Margaret Williams
  Appointment: Follow-up visit
  Provider: Dr. James Anderson, Family Medicine
  Date: Wednesday, March 20
  Time: 9:15 AM
  Location: Greenfield Family Practice
            123 Oak Street

  Script requirements:
  - Live call version (staff reads to patient)
  - Voicemail version (left when no answer)
  - HIPAA-safe voicemail (limited info if not confirmed
    they're speaking to the patient)
  - Include confirmation request
  - Handle common responses (confirm, reschedule, cancel)
  - Natural, conversational tone

  Create both the live call and voicemail scripts.

assertions:
  - type: llm_judge
    criteria: "Live call script sounds natural and conversational — not robotic or overly scripted; includes the caller identifying themselves and the practice, confirming they're speaking with the patient before sharing details, and handling basic responses."
    weight: 0.35
    description: "NaturalConversation"
  - type: llm_judge
    criteria: "Voicemail version is HIPAA-safe — does not mention specific medical details or provider specialty on voicemail (in case someone else hears it); asks patient to call back to confirm; provides office phone number clearly."
    weight: 0.35
    description: "VoicemailHIPAASafe"
  - type: llm_judge
    criteria: "Scripts handle common scenarios — includes branches for patient confirming, wanting to reschedule, or needing to cancel; staff knows what to say in each case without improvising."
    weight: 0.30
    description: "ScenarioHandling"
