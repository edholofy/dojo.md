meta:
  id: pre-procedure-preparation-reminder
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a pre-procedure preparation reminder with specific medical instructions — clear patient instructions for procedures requiring advance preparation"
  tags: [pre-procedure, preparation, medical-instructions, beginner]

state: {}

trigger: |
  Write a pre-procedure preparation reminder for a
  patient scheduled for a colonoscopy. Clear
  instructions are critical — improper preparation
  leads to cancelled or repeated procedures.

  Patient: Thomas Garcia
  Procedure: Screening colonoscopy
  Provider: Dr. Anil Patel, Gastroenterology
  Date: Tuesday, March 25
  Arrival time: 6:30 AM (procedure at 8:00 AM)
  Location: Riverside Surgery Center, Check-in Desk A

  Preparation instructions:
  Day before (Monday, March 24):
  - Clear liquids only (no red or purple colored drinks)
  - Begin bowel prep solution at 5:00 PM (MiraLAX + 64oz
    Gatorade, drink 8oz every 15 minutes)
  - Stop eating solid food by midnight the night before

  Day of procedure (Tuesday, March 25):
  - Nothing to eat or drink after midnight
  - Take heart/blood pressure medications with small sip
    of water by 5:00 AM
  - Do NOT take diabetes medications morning of
  - Do NOT take blood thinners (should have stopped 5 days
    prior per Dr. Patel's instructions)
  - Bring a driver (REQUIRED — you cannot drive yourself)
  - Wear comfortable, loose clothing
  - Leave valuables at home

  Create a clear, easy-to-follow preparation reminder
  (email format with timeline).

assertions:
  - type: llm_judge
    criteria: "Timeline format is crystal clear — uses chronological organization (day before, morning of) with specific times; critical instructions (fasting, medication holds, driver requirement) are visually emphasized and impossible to miss."
    weight: 0.35
    description: "TimelineClarity"
  - type: llm_judge
    criteria: "Medication instructions are precise and safe — clearly distinguishes which medications to take and which to hold, includes timing for allowed medications, and emphasizes the blood thinner hold; errors here could have medical consequences."
    weight: 0.35
    description: "MedicationSafety"
  - type: llm_judge
    criteria: "Driver requirement is prominently communicated — makes it absolutely clear that a driver is required (not optional), ideally mentions it more than once, and suggests arranging this in advance to prevent day-of scrambling."
    weight: 0.30
    description: "DriverRequirement"
