meta:
  id: beginner-reminder-shift
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Handle a basic appointment reminder complication — wrong contact info, patient confusion, and scheduling mix-up requiring clear corrective communication"
  tags: [complication, corrective-communication, scheduling-mixup, beginner]

state: {}

trigger: |
  A routine appointment reminder situation has become
  complicated. Handle multiple issues with clear,
  corrective communication.

  Situation:
  Your practice sent appointment reminders for tomorrow's
  schedule. Several problems have emerged:

  Problem 1 — Wrong patient contacted:
  A reminder for "Patricia Brown" was accidentally sent
  to "Patricia Brown-Smith" (different patient, same
  first name). Patricia Brown-Smith is confused and
  alarmed — she doesn't have an appointment and is
  worried about identity theft.

  Problem 2 — Incorrect time on reminder:
  James Park received a reminder saying his appointment
  is at 2:00 PM, but it's actually at 2:30 PM. He's
  already arranged his work schedule around 2:00 PM.
  (The template had an error.)

  Problem 3 — Patient can't understand reminder:
  An elderly patient, Helen Zhang (age 82), called
  confused by the text reminder. She doesn't understand
  the "Reply 1 to confirm" instruction. She wants to
  speak to someone but the office is closed for the day.

  Problem 4 — HIPAA concern:
  A reminder for a mental health appointment was sent
  via text that included "Psychiatry appointment with
  Dr. Morrison." The patient's spouse saw the text and
  the patient is upset about the privacy breach.

  Create corrective messages for each situation:
  1. Apology to wrong patient (Patricia Brown-Smith)
  2. Correction message to James Park
  3. Simpler follow-up for Helen Zhang
  4. Apology and remediation for the HIPAA concern

assertions:
  - type: llm_judge
    criteria: "Wrong-patient apology addresses the identity concern — explicitly states no personal health information was shared, explains how the error occurred, and reassures the patient that their information is secure; handles the emotional aspect."
    weight: 0.35
    description: "WrongPatientApology"
  - type: llm_judge
    criteria: "Time correction is clear and accountable — states the correct time unambiguously, apologizes for the inconvenience, and doesn't make the patient feel at fault; acknowledges the impact on their schedule."
    weight: 0.35
    description: "TimeCorrectionClarity"
  - type: llm_judge
    criteria: "HIPAA remediation takes the breach seriously — doesn't minimize the patient's concern, acknowledges the privacy violation, explains what steps will be taken to prevent recurrence, and offers to change communication preferences."
    weight: 0.30
    description: "HIPAARemediation"
