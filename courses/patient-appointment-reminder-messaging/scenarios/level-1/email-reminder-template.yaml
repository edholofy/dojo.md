meta:
  id: email-reminder-template
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a professional email appointment reminder with preparation instructions — detailed message with what to bring, how to prepare, and office policies"
  tags: [email-reminder, preparation-instructions, office-policies, beginner]

state: {}

trigger: |
  Write a professional email appointment reminder that
  includes preparation instructions for the visit.

  Patient: Robert Martinez
  Appointment: New patient consultation
  Provider: Dr. Lisa Park, Cardiology
  Date: Monday, March 18
  Time: 2:00 PM
  Location: Heart Health Associates
            450 Medical Parkway, Building B, 3rd Floor

  Preparation needed:
  - Bring photo ID and insurance card
  - Arrive 20 minutes early for paperwork
  - Bring list of current medications
  - Bring any previous medical records if available
  - Fast for 12 hours before appointment (blood work)
  - Wear comfortable, loose-fitting clothing

  Office policies:
  - 24-hour cancellation policy
  - Copay collected at check-in
  - Free parking in Garage C
  - Masks optional but available

  Create a complete email with subject line, body,
  and professional formatting.

assertions:
  - type: llm_judge
    criteria: "Email is well-organized and scannable — uses clear sections or bullet points for preparation instructions, makes the most important items (fasting, early arrival) visually prominent; patient won't miss critical prep steps."
    weight: 0.35
    description: "OrganizationScanability"
  - type: llm_judge
    criteria: "Preparation instructions are complete and specific — includes all required items (ID, insurance, medications, records, fasting, clothing), specifies the 12-hour fast clearly with timing implications, and explains why each item is needed."
    weight: 0.35
    description: "PreparationCompleteness"
  - type: llm_judge
    criteria: "Professional formatting includes appropriate subject line, greeting, body structure, and sign-off; includes contact information for questions; the email feels like it comes from a well-run medical practice."
    weight: 0.30
    description: "ProfessionalFormatting"
