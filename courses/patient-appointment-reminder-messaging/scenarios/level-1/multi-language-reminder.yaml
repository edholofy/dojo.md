meta:
  id: multi-language-reminder
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write appointment reminders in multiple languages — create bilingual messages for diverse patient populations with cultural sensitivity"
  tags: [multi-language, bilingual, cultural-sensitivity, beginner]

state: {}

trigger: |
  Write appointment reminder messages in both English
  and Spanish for a patient whose preferred language
  is Spanish. The practice serves a bilingual community.

  Patient: Maria Gonzalez
  Preferred language: Spanish
  Appointment: Prenatal visit (routine checkup)
  Provider: Dr. Elena Ruiz, OB-GYN
  Date: Thursday, March 21
  Time: 1:30 PM
  Location: Women's Health Center
            567 Care Drive, Suite 110

  What to bring:
  - Insurance card
  - Previous ultrasound results (if from another provider)
  - List of vitamins/supplements currently taking
  - Partner welcome to attend

  Requirements:
  - Create both English and Spanish versions
  - Spanish version should be natural, not machine-translated
  - Both versions should contain identical information
  - Consider cultural nuances in Spanish healthcare
    communication (may be more formal/respectful)
  - Format: SMS and email versions

  Create bilingual appointment reminders (SMS + email
  in both languages).

assertions:
  - type: llm_judge
    criteria: "Spanish version reads naturally — uses appropriate medical Spanish terminology, formal usted form, and natural phrasing that a native speaker would use; does not feel like a Google Translate output."
    weight: 0.35
    description: "SpanishNaturalness"
  - type: llm_judge
    criteria: "Both versions contain identical essential information — date, time, location, preparation instructions, and contact details are consistent across languages; nothing is lost or added in translation."
    weight: 0.35
    description: "InformationParity"
  - type: llm_judge
    criteria: "Cultural nuances are respected — Spanish version may use slightly more formal tone, appropriate greetings, and welcoming language that resonates with Hispanic healthcare communication norms."
    weight: 0.30
    description: "CulturalNuances"
