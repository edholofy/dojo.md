meta:
  id: basic-sms-reminder
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a basic SMS appointment reminder for a routine medical visit — clear, concise, HIPAA-mindful text message with essential details"
  tags: [sms-reminder, basic-messaging, routine-appointment, beginner]

state: {}

trigger: |
  Write an SMS appointment reminder for a routine
  medical visit. The message must be concise, clear,
  and HIPAA-compliant.

  Patient: Sarah Johnson
  Appointment: Annual physical exam
  Provider: Dr. Michael Chen, Internal Medicine
  Date: Thursday, March 15
  Time: 10:30 AM
  Location: Riverside Medical Center, Suite 204
  Duration: ~45 minutes

  Requirements:
  - Must be under 160 characters if possible
  - Include confirmation/cancellation option
  - Do not include diagnosis or treatment details
  - Include a way to reach the office
  - Consider HIPAA: no sensitive health information
  - Friendly but professional tone

  Create an SMS reminder message.

assertions:
  - type: llm_judge
    criteria: "Message is concise and actionable — includes date, time, provider name, and location in a scannable format; stays under or near 160 characters; includes a reply mechanism for confirm/cancel (e.g., 'Reply Y to confirm')."
    weight: 0.35
    description: "ConciseActionable"
  - type: llm_judge
    criteria: "HIPAA compliance is maintained — does not mention specific medical conditions, diagnoses, or treatment types; uses general terms like 'appointment' rather than specific procedure names; minimizes protected health information."
    weight: 0.35
    description: "HIPAACompliance"
  - type: llm_judge
    criteria: "Tone is warm but professional — feels caring without being overly casual; uses the patient's name appropriately; provides clear next steps without being demanding or robotic."
    weight: 0.30
    description: "ToneAppropriate"
