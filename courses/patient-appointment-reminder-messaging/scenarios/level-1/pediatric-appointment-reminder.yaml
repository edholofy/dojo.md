meta:
  id: pediatric-appointment-reminder
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a pediatric appointment reminder addressed to the parent/guardian — age-appropriate preparation tips and guardian-specific logistics"
  tags: [pediatric, parent-guardian, child-appointment, beginner]

state: {}

trigger: |
  Write an appointment reminder for a child's
  pediatric visit, addressed to the parent/guardian.

  Patient: Emma Wilson (age 4)
  Parent/Guardian: Jason Wilson (father)
  Appointment: 4-year well-child checkup
  Provider: Dr. Amy Chen, Pediatrics
  Date: Wednesday, March 19
  Time: 10:00 AM
  Location: Happy Kids Pediatrics
            234 Family Way

  Visit includes:
  - Height/weight/developmental check
  - Vision and hearing screening
  - DTaP and IPV vaccinations (2 shots)
  - Developmental milestone questionnaire
    (parent fills out in office)

  What to bring:
  - Insurance card
  - Immunization records (if new to practice)
  - Completed developmental questionnaire (attached)
  - Comfort item for child (stuffed animal, etc.)
  - Sibling care arranged (focused attention on Emma)

  Tips to include:
  - Talk to Emma about what to expect (doctor visit is
    normal and safe)
  - Dress in easy-to-remove clothing
  - Bring a small reward for after vaccinations

  Create an email reminder addressed to the parent.

assertions:
  - type: llm_judge
    criteria: "Message addresses the parent appropriately — uses the parent's name, refers to the child by name, provides information the parent needs to prepare both themselves and the child; clearly distinguishes parent tasks from child experience."
    weight: 0.35
    description: "ParentAppropriateAddress"
  - type: llm_judge
    criteria: "Vaccination mention is handled sensitively — acknowledges that shots can be stressful for children and parents, provides practical coping tips without being dismissive or alarming; normalizes the experience."
    weight: 0.35
    description: "VaccinationSensitivity"
  - type: llm_judge
    criteria: "Preparation tips are practical and thoughtful — comfort item suggestion, clothing advice, sibling care reminder, and talking-to-child tips show genuine understanding of what makes a pediatric visit go smoothly."
    weight: 0.30
    description: "PracticalPreparationTips"
