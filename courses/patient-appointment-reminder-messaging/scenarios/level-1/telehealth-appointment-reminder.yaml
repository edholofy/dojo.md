meta:
  id: telehealth-appointment-reminder
  level: 1
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a telehealth appointment reminder with technical setup instructions — ensure patients can connect successfully for virtual visits"
  tags: [telehealth, virtual-visit, technical-setup, beginner]

state: {}

trigger: |
  Write a telehealth appointment reminder that includes
  technical setup instructions. Many patients struggle
  with virtual visit technology.

  Patient: Richard Chen
  Appointment: Follow-up consultation (telehealth)
  Provider: Dr. Patricia Hayes, Rheumatology
  Date: Friday, March 22
  Time: 3:30 PM
  Platform: Doxy.me (browser-based, no app download needed)

  Technical requirements:
  - Device with camera and microphone (phone, tablet,
    or computer)
  - Stable internet connection
  - Quiet, well-lit, private location
  - Link to join: [will be sent 30 min before appointment]

  Steps to connect:
  1. Click the link sent to you 30 min before your visit
  2. Allow camera and microphone access when prompted
  3. Enter your name in the waiting room
  4. Wait for the provider to start the session

  Troubleshooting:
  - If link doesn't work, try a different browser (Chrome
    recommended)
  - If audio/video issues, check device permissions
  - Call office at (555) 123-4567 for tech help
  - If all else fails, we can switch to a phone call

  Create a patient-friendly telehealth reminder with
  setup instructions.

assertions:
  - type: llm_judge
    criteria: "Technical instructions are simple and non-intimidating — uses plain language, numbered steps, and avoids jargon; a non-tech-savvy patient (like an elderly person) could follow these instructions successfully."
    weight: 0.35
    description: "TechnicalSimplicity"
  - type: llm_judge
    criteria: "Troubleshooting section provides real reassurance — acknowledges that tech issues happen, provides specific solutions for common problems, and offers a phone-call fallback so patients don't feel anxious about technology failure."
    weight: 0.35
    description: "TroubleshootingReassurance"
  - type: llm_judge
    criteria: "Environment preparation guidance is included — reminds patient to find a quiet, private, well-lit space; this is a HIPAA consideration for the patient's own privacy during a medical conversation."
    weight: 0.30
    description: "EnvironmentPreparation"
