meta:
  id: regulatory-compliance-program
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Build a comprehensive regulatory compliance program for patient communications — HIPAA, TCPA, state laws, CMS requirements, and emerging regulations"
  tags: [regulatory-compliance, hipaa, tcpa, advanced]

state: {}

trigger: |
  Build a comprehensive regulatory compliance program
  for patient appointment communications that addresses
  the full spectrum of federal, state, and emerging
  regulations.

  Regulatory landscape:

  Federal regulations:
  - HIPAA Privacy Rule (PHI in communications)
  - HIPAA Security Rule (encrypted transmission)
  - HIPAA Breach Notification Rule
  - TCPA (autodialers, consent, frequency limits)
  - CAN-SPAM Act (email requirements)
  - 42 CFR Part 2 (substance abuse records)
  - CMS Conditions of Participation (Medicare/Medicaid)
  - FCC regulations (caller ID, robocalls)
  - ADA (accessible communications)

  State regulations:
  - State health information privacy laws (varies by state)
  - State consumer protection laws
  - State-specific texting regulations
  - Mini-HIPAA laws (stricter than federal)
  - State medical board advertising rules

  Emerging regulations:
  - AI transparency in healthcare communications
  - Biometric data privacy (voice recognition in IVR)
  - Children's data protection (pediatric patients)
  - Cross-border data transfer (international patients)
  - Social determinants data privacy

  Compliance program elements:
  - Policy development and documentation
  - Staff training and certification
  - Audit and monitoring processes
  - Incident response procedures
  - Vendor management (BAAs, data processing agreements)
  - Patient rights management
  - Record retention requirements

  Create:
  1. Compliance program charter and governance
  2. Regulatory matrix (all applicable regulations)
  3. Policy library for patient communications
  4. Annual compliance training curriculum
  5. Audit methodology and schedule
  6. Incident response playbook
  7. Vendor compliance assessment framework

assertions:
  - type: llm_judge
    criteria: "Regulatory matrix is comprehensive and actionable — maps each regulation to specific communication activities affected, identifies compliance requirements, and assigns responsibility; serves as a practical reference, not just a legal summary."
    weight: 0.35
    description: "RegulatoryMatrixComprehensiveness"
  - type: llm_judge
    criteria: "Audit methodology can detect real compliance gaps — defines what to review (message content, consent records, opt-out processing, breach log), how often, sampling methodology, and escalation procedures for findings."
    weight: 0.35
    description: "AuditMethodologyEffectiveness"
  - type: llm_judge
    criteria: "Incident response playbook covers communication-specific scenarios — HIPAA breach from wrong-patient messages, TCPA class action notification, state AG inquiry about texting practices; each scenario has clear steps and timelines."
    weight: 0.30
    description: "IncidentResponseSpecificity"
