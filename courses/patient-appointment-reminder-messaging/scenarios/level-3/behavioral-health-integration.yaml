meta:
  id: behavioral-health-integration
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design integrated behavioral health appointment reminder systems — coordinate mental health, substance abuse, and primary care messaging with enhanced privacy protections"
  tags: [behavioral-health, mental-health, enhanced-privacy, advanced]

state: {}

trigger: |
  Design an integrated appointment reminder system for
  behavioral health services that coordinates with
  primary care while maintaining enhanced privacy
  protections required by federal and state regulations.

  Behavioral health context:
  - 42 CFR Part 2 regulations (substance abuse records)
  - State-specific mental health confidentiality laws
  - Higher no-show rates (25-40% vs 15-20% general)
  - Stigma-related communication sensitivity
  - Crisis intervention considerations
  - Medication management coordination

  Patient populations:
  - Outpatient psychiatry (medication management)
  - Individual therapy (weekly/bi-weekly sessions)
  - Group therapy programs
  - Substance abuse treatment (IOP, residential aftercare)
  - Co-occurring disorder treatment
  - Court-ordered treatment participants

  Enhanced privacy requirements:
  - 42 CFR Part 2: Substance abuse records cannot be
    disclosed without specific written consent (separate
    from general HIPAA consent)
  - Mental health records: Many states require separate
    consent for any disclosure
  - No mention of treatment type in any communication
    that could be seen by third parties
  - Voicemail restrictions (may not leave messages about
    substance abuse treatment)
  - Emergency exceptions for imminent danger

  Coordination challenges:
  - Patient seeing psychiatrist AND primary care provider
  - Medication reconciliation across providers
  - Integrated care models (co-located services)
  - Communication between behavioral and medical teams
  - Patient may consent to medical but not behavioral
    health communications

  Create:
  1. Privacy-tiered messaging framework
  2. 42 CFR Part 2 compliant reminder templates
  3. Consent management for behavioral health
  4. Crisis-aware reminder system design
  5. Integrated care coordination messaging
  6. No-show intervention strategies for behavioral health
  7. Staff training on enhanced privacy requirements

assertions:
  - type: llm_judge
    criteria: "Privacy-tiered framework properly segments communications — behavioral health reminders use maximum privacy protection (generic language, restricted channels), while allowing integrated care teams to coordinate when patient consents; tiers are clearly defined."
    weight: 0.35
    description: "PrivacyTierFramework"
  - type: llm_judge
    criteria: "42 CFR Part 2 compliance is technically correct — understands that substance abuse records have additional protections beyond HIPAA, requires specific written consent, and properly handles the intersection of Part 2 and HIPAA requirements."
    weight: 0.35
    description: "Part2Compliance"
  - type: llm_judge
    criteria: "No-show interventions for behavioral health are clinically appropriate — recognizes that missed sessions may indicate clinical deterioration, uses warm outreach rather than punitive measures, and has protocols for welfare checks when clinically indicated."
    weight: 0.30
    description: "BehavioralHealthNoShows"
