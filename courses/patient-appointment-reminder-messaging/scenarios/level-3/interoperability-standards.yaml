meta:
  id: interoperability-standards
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design interoperability standards for appointment reminder systems — HL7 FHIR integration, cross-system data exchange, and standards-based communication across healthcare organizations"
  tags: [interoperability, hl7-fhir, data-exchange, advanced]

state: {}

trigger: |
  Design interoperability standards for appointment
  reminder systems that enable seamless data exchange
  across healthcare organizations using modern
  healthcare IT standards.

  Interoperability context:
  - ONC 21st Century Cures Act requirements
  - HL7 FHIR R4 standard adoption
  - CMS Interoperability and Patient Access rules
  - TEFCA (Trusted Exchange Framework) implementation
  - Patient right to access and control their data

  Technical requirements:

  FHIR resources to leverage:
  - Appointment (scheduling data)
  - Patient (demographics, contact info)
  - Practitioner (provider information)
  - Location (facility details)
  - Communication (message tracking)
  - CommunicationRequest (message templating)

  Cross-organization scenarios:
  - Patient referred to specialist at different health system
  - Patient with appointments at competing health systems
  - Health information exchange (HIE) notification coordination
  - Insurance-initiated preventive care reminders
  - Public health department vaccination reminders

  Data governance:
  - Patient consent for cross-organization messaging
  - Data use agreements between organizations
  - Minimum necessary standard for shared data
  - Audit trail for cross-system communications
  - Patient data correction and deletion rights

  Create:
  1. FHIR-based appointment reminder API specification
  2. Cross-organization messaging protocol
  3. Patient consent management framework
  4. Data governance and privacy standards
  5. Implementation guide for EHR vendors
  6. Certification criteria for compliant systems
  7. Testing and validation framework

assertions:
  - type: llm_judge
    criteria: "FHIR API specification is technically sound — properly uses FHIR resources, follows RESTful conventions, includes proper authentication (SMART on FHIR), and handles the appointment lifecycle (booked, confirmed, cancelled, no-show)."
    weight: 0.35
    description: "FHIRAPISpecification"
  - type: llm_judge
    criteria: "Cross-organization protocol prevents duplicate reminders — when a patient has appointments at two health systems, the protocol coordinates to avoid sending conflicting or overwhelming messages; includes conflict resolution logic."
    weight: 0.35
    description: "CrossOrgCoordination"
  - type: llm_judge
    criteria: "Patient consent framework respects autonomy — patients control which organizations can send them reminders, can opt in/out per organization, and consent decisions propagate across systems; the framework is practical to implement."
    weight: 0.30
    description: "ConsentFramework"
