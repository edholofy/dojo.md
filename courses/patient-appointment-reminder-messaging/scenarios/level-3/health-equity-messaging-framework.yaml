meta:
  id: health-equity-messaging-framework
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Build a health equity-centered messaging framework — address disparities in appointment adherence across populations with culturally responsive, barrier-aware communication"
  tags: [health-equity, disparities, culturally-responsive, advanced]

state: {}

trigger: |
  Build a health equity-centered appointment reminder
  messaging framework that addresses systemic disparities
  in appointment adherence. Data shows significant
  disparities by race, income, and geography.

  Disparity data:
  - White patients no-show rate: 12%
  - Black patients no-show rate: 22%
  - Hispanic patients no-show rate: 19%
  - Medicaid patients no-show rate: 28%
  - Uninsured patients no-show rate: 35%
  - Rural patients no-show rate: 24%
  - Urban safety-net clinic patients: 30%

  Root cause analysis:
  - Transportation barriers (no car, limited public transit)
  - Work inflexibility (hourly workers can't take time off)
  - Childcare unavailability
  - Language barriers in communication
  - Health literacy gaps
  - Distrust of healthcare system (historical trauma)
  - Financial anxiety (fear of unexpected costs)
  - Digital divide (no smartphone/internet access)
  - Implicit bias in reminder tone/language

  Current system gaps:
  - English-only automated reminders
  - Digital-only channels exclude 15% of patients
  - No transportation support information
  - No cost transparency in reminders
  - Standard messaging doesn't address barriers
  - No cultural adaptation of messaging

  Create:
  1. Health equity assessment for current reminder system
  2. Barrier-aware messaging templates
  3. Cultural adaptation guidelines for 5 populations
  4. Social determinants-informed reminder strategy
  5. Community health worker integration plan
  6. Digital divide mitigation approach
  7. Equity metrics and accountability framework

assertions:
  - type: llm_judge
    criteria: "Barrier-aware messaging proactively addresses common obstacles — includes transportation options, financial assistance information, childcare resources, and language support in reminders for patients whose profiles indicate these barriers."
    weight: 0.35
    description: "BarrierAwareMessaging"
  - type: llm_judge
    criteria: "Cultural adaptation goes beyond translation — addresses communication norms, healthcare trust levels, family decision-making dynamics, and historical context for different populations; feels genuinely informed by community perspectives."
    weight: 0.35
    description: "CulturalAdaptationDepth"
  - type: llm_judge
    criteria: "Equity metrics hold the system accountable — tracks no-show rates by demographic, monitors whether interventions reduce or maintain disparities, and has triggers for investigation when gaps persist or widen."
    weight: 0.30
    description: "EquityAccountability"
