meta:
  id: advanced-reminder-shift
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Navigate a complex health system crisis affecting appointment communications — pandemic response, surge capacity, regulatory changes, and technology failure simultaneously"
  tags: [crisis-integration, pandemic-response, systems-thinking, advanced]

state: {}

trigger: |
  Your health system faces a perfect storm of challenges
  affecting appointment reminder communications. Address
  all issues with integrated, systems-level thinking.

  Converging crises:

  1. PUBLIC HEALTH EMERGENCY:
  A new respiratory virus variant is surging. The health
  department mandates all healthcare facilities screen
  patients 24 hours before in-person visits and redirect
  symptomatic patients to designated sites. Your reminder
  system must add screening questions to all reminders
  for 8,000 daily appointments — immediately.

  2. TELEHEALTH SURGE:
  60% of appointments are being converted to telehealth
  within 48 hours. Patients who expected in-person visits
  need new instructions, technology setup help, and
  connection links. Many elderly patients have never done
  a video visit. The conversion affects 4,800 appointments.

  3. REGULATORY SHIFT:
  CMS emergency waivers relax certain HIPAA restrictions
  for telehealth but a new state law (effective immediately)
  requires explicit consent for text messaging that wasn't
  previously required. 30% of patients don't have updated
  consent on file.

  4. TECHNOLOGY FAILURE:
  Your primary SMS vendor experiences a nationwide outage.
  Estimated restoration: 72 hours. SMS was your primary
  channel for 55% of patients. You need fallback
  communication for 4,400 patients per day.

  5. STAFFING CRISIS:
  40% of front desk staff are out sick. Call volume is
  3x normal. The remaining staff can't manually call
  patients. The automated phone system is overloaded.

  Create a comprehensive response:
  1. Pre-visit screening integration plan
  2. Mass telehealth conversion communication strategy
  3. Consent management under new regulations
  4. SMS vendor failover plan
  5. Staffing crisis communication workaround
  6. Integrated timeline for all five responses

assertions:
  - type: llm_judge
    criteria: "Response treats all five crises as interconnected — SMS outage affects telehealth conversion communication, staffing crisis limits manual outreach for consent collection, and screening requirements add to already-strained communication channels."
    weight: 0.35
    description: "InterconnectedResponse"
  - type: llm_judge
    criteria: "Telehealth conversion communication addresses the digital divide — provides multiple pathways for elderly and non-tech-savvy patients (phone call setup help, printed instructions mailed, family member involvement), doesn't just send a link."
    weight: 0.35
    description: "DigitalDivideResponse"
  - type: llm_judge
    criteria: "SMS failover plan is practical and immediate — identifies backup channels (email, automated calls, portal notifications), prioritizes patients by appointment urgency, and has a clear activation procedure that depleted staff can execute."
    weight: 0.30
    description: "FailoverPracticality"
