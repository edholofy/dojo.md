meta:
  id: multi-site-care-coordination
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design multi-site care coordination messaging — coordinate appointment reminders across hospitals, clinics, labs, and imaging centers for patients with complex care needs"
  tags: [care-coordination, multi-site, complex-care, advanced]

state: {}

trigger: |
  Design a multi-site care coordination messaging system
  for patients who have appointments across multiple
  facilities within a health system. Complex patients
  often have 5-10 appointments per month at different
  locations.

  Patient example: Mrs. Eleanor Davis, age 72
  Monthly appointment schedule:
  - Primary care: Monthly visit (Main St Clinic)
  - Cardiology: Bi-weekly (Heart Center, Hospital Campus)
  - Endocrinology: Monthly (Diabetes Center, South Campus)
  - Lab work: Weekly INR checks (3 locations available)
  - Physical therapy: 2x/week (Rehab Center)
  - Ophthalmology: Quarterly (Eye Center, North Campus)
  - Pharmacy: Monthly medication review (Main St Clinic)

  Current problems:
  - Mrs. Davis gets 15-20 reminder messages per month
  - Messages come from 5 different systems/numbers
  - No coordination between facilities
  - Conflicting appointment times occasionally scheduled
  - Preparation instructions sometimes contradict
    (fasting for lab vs eating for PT)
  - She's overwhelmed and missing appointments

  Coordination requirements:
  - Unified communication from single identity
  - Consolidated daily/weekly appointment summaries
  - Conflict detection (overlapping appointments)
  - Preparation coordination (fasting schedules)
  - Transportation optimization (combine nearby visits)
  - Caregiver notification (daughter helps coordinate)
  - Escalation when appointments are missed

  Create:
  1. Unified appointment summary messaging design
  2. Conflict detection and resolution protocol
  3. Preparation instruction coordination logic
  4. Transportation optimization messaging
  5. Caregiver communication integration
  6. Missed appointment escalation workflow
  7. Patient preference management for complex care

assertions:
  - type: llm_judge
    criteria: "Unified summary reduces message fatigue — instead of 15-20 separate reminders, patient receives consolidated weekly overview and targeted daily reminders; the summary format is clear and scannable for elderly patients."
    weight: 0.35
    description: "UnifiedSummaryDesign"
  - type: llm_judge
    criteria: "Preparation coordination prevents conflicts — detects when fasting for lab work conflicts with eating requirements for other activities, suggests optimal appointment sequencing, and provides clear timeline instructions."
    weight: 0.35
    description: "PreparationCoordination"
  - type: llm_judge
    criteria: "Caregiver integration respects patient autonomy — daughter receives appropriate information with patient consent, can help coordinate but doesn't replace patient decision-making; the system supports family involvement without undermining independence."
    weight: 0.30
    description: "CaregiverIntegration"
