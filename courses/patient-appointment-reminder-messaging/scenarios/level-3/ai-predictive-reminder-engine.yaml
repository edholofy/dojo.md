meta:
  id: ai-predictive-reminder-engine
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design an AI-powered predictive reminder engine — machine learning models that optimize timing, channel, content, and frequency for individual patients"
  tags: [ai-engine, predictive-analytics, machine-learning, advanced]

state: {}

trigger: |
  Design an AI-powered predictive reminder engine that
  personalizes every aspect of appointment reminders
  based on patient behavior data and outcomes.

  Available data for model training:
  - 3 years of reminder data (5.2M messages sent)
  - Patient demographics and clinical data
  - Historical attendance/no-show records
  - Message engagement data (open, click, reply rates)
  - Channel preference signals
  - Time-of-day response patterns
  - Weather and traffic correlations
  - Insurance and financial data
  - Social determinants of health indicators

  AI capabilities to design:

  1. No-show prediction model:
  - Predict probability of no-show for each appointment
  - Identify key risk factors
  - Score patients 1-100 on no-show risk
  - Trigger appropriate intervention level

  2. Optimal timing model:
  - Predict when each patient is most likely to engage
  - Account for work schedules, timezone, preferences
  - Avoid notification fatigue
  - Learn from response pattern data

  3. Content personalization:
  - Generate optimal message content per patient
  - A/B test messaging approaches automatically
  - Adapt tone and complexity to patient literacy
  - Include relevant preparation based on history

  4. Channel optimization:
  - Predict best channel per patient per message type
  - Dynamic fallback if primary channel unresponsive
  - Multi-channel orchestration based on urgency

  Create:
  1. AI model architecture and data pipeline
  2. Feature engineering for each prediction model
  3. Training and validation methodology
  4. Ethical AI framework (bias detection, fairness)
  5. Clinical validation requirements
  6. Implementation and A/B testing strategy
  7. Performance monitoring and model retraining

assertions:
  - type: llm_judge
    criteria: "Feature engineering identifies genuinely predictive variables — goes beyond obvious factors (past no-shows) to include nuanced signals (appointment lead time, day of week, weather, time since last visit); features are practically obtainable from existing data."
    weight: 0.35
    description: "FeatureEngineering"
  - type: llm_judge
    criteria: "Ethical AI framework addresses healthcare-specific biases — considers that socioeconomic factors correlating with no-shows (transportation, employment flexibility) shouldn't lead to reduced care access; the system helps rather than penalizes vulnerable patients."
    weight: 0.35
    description: "EthicalAIHealthcare"
  - type: llm_judge
    criteria: "Clinical validation approach ensures patient safety — AI recommendations don't override clinical judgment, the system has human oversight mechanisms, and there are clear escalation paths when AI predictions seem wrong."
    weight: 0.30
    description: "ClinicalValidation"
