meta:
  id: population-health-communication
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design population health communication strategies using appointment reminders — preventive care campaigns, chronic disease management, and public health outreach through existing messaging infrastructure"
  tags: [population-health, preventive-care, public-health, advanced]

state: {}

trigger: |
  Design a population health communication strategy
  that leverages the appointment reminder infrastructure
  for broader health outcomes — preventive care, chronic
  disease management, and public health messaging.

  Health system population: 280,000 attributed lives
  Care gaps identified:
  - 42% of eligible patients overdue for colorectal cancer
    screening
  - 35% of diabetic patients haven't had A1C in 6+ months
  - 28% of women overdue for mammogram
  - 55% of patients haven't had flu shot this season
  - 60% of hypertensive patients not at BP goal

  Existing infrastructure:
  - Appointment reminder system reaching 85% of patients
  - Patient portal with 40% active users
  - 12-language translation capability
  - SMS, email, phone, portal channels
  - EHR data for patient risk stratification

  Population health goals:
  - Increase preventive screening rates by 20%
  - Improve chronic disease management metrics
  - Support public health campaigns (vaccination, etc.)
  - Reduce avoidable ED visits and hospitalizations
  - Improve HEDIS/quality measure performance

  Constraints:
  - Must not overwhelm patients with messages
  - Must integrate with (not replace) appointment reminders
  - Must comply with all communication regulations
  - Budget: $150K for population health messaging program
  - Must demonstrate ROI within 12 months

  Create:
  1. Population health messaging strategy
  2. Care gap outreach campaign design (3 conditions)
  3. Integration with appointment reminder workflows
  4. Risk stratification-based messaging tiers
  5. Measurement framework (quality metrics impact)
  6. Patient consent and preference management
  7. ROI model for population health messaging

assertions:
  - type: llm_judge
    criteria: "Messaging strategy integrates seamlessly with appointment reminders — care gap outreach happens at natural touchpoints (post-appointment, pre-annual-visit) rather than as separate campaigns; patients experience a coherent communication flow."
    weight: 0.35
    description: "SeamlessIntegration"
  - type: llm_judge
    criteria: "Risk stratification drives appropriate intensity — high-risk patients with multiple care gaps get more intensive outreach, while low-risk patients get gentle nudges; the system doesn't treat all patients the same."
    weight: 0.35
    description: "RiskStratificationIntensity"
  - type: llm_judge
    criteria: "ROI model connects messaging to measurable outcomes — links outreach campaigns to screening completion rates, quality measure performance, and downstream cost avoidance (prevented ED visits, early cancer detection); the model is credible."
    weight: 0.30
    description: "ROIModelCredibility"
