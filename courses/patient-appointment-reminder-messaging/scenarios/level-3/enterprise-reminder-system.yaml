meta:
  id: enterprise-reminder-system
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design an enterprise-level patient appointment reminder system for a large health system — multi-facility coordination, unified messaging, and centralized management across hundreds of providers"
  tags: [enterprise-system, health-system, centralized-management, advanced]

state: {}

trigger: |
  Design an enterprise appointment reminder system for
  a large integrated health system transitioning from
  decentralized, facility-level reminder systems.

  Health system profile:
  - 12 hospitals
  - 85 outpatient clinics
  - 2,400 providers
  - 8,000 daily outpatient appointments
  - 1.2M patient records
  - 3 different EHR systems (consolidating to Epic)
  - Currently: Each facility runs its own reminder system
  - Problem: Patients get conflicting messages from
    different facilities, inconsistent quality

  Enterprise requirements:
  - Single reminder platform across all facilities
  - Unified patient communication preferences
  - Centralized compliance and audit capability
  - Multi-facility appointment coordination
  - Enterprise-level reporting and analytics
  - Scalable to handle 8,000+ daily appointments
  - Disaster recovery and failover
  - Multi-language support (12 languages)

  Integration challenges:
  - 3 EHR systems during transition (2-year migration)
  - Multiple scheduling systems
  - Separate patient ID systems (MRN mapping needed)
  - Different facility branding requirements
  - Union workforce considerations for workflow changes

  Create:
  1. Enterprise architecture for unified reminder system
  2. EHR integration strategy during multi-system transition
  3. Patient preference centralization framework
  4. Multi-facility coordination protocols
  5. Compliance and audit infrastructure
  6. Disaster recovery and business continuity plan
  7. Rollout strategy across 12 hospitals and 85 clinics

assertions:
  - type: llm_judge
    criteria: "Architecture handles the multi-EHR transition gracefully — works with 3 different systems simultaneously, uses an integration layer that abstracts EHR differences, and has a clear migration path; doesn't require big-bang cutover."
    weight: 0.35
    description: "MultiEHRArchitecture"
  - type: llm_judge
    criteria: "Patient preference centralization prevents conflicting messages — a patient seeing cardiology at Hospital A and primary care at Clinic B gets coordinated, non-duplicative reminders; the system resolves conflicts in channel, frequency, and timing preferences."
    weight: 0.35
    description: "PreferenceCentralization"
  - type: llm_judge
    criteria: "Rollout strategy manages change across a complex organization — phases implementation by facility type/readiness, includes pilot programs, addresses staff training across union and non-union environments, and has rollback procedures."
    weight: 0.30
    description: "RolloutStrategy"
