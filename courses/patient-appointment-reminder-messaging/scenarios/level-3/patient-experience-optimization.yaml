meta:
  id: patient-experience-optimization
  level: 3
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a patient experience optimization strategy for appointment communications — journey mapping, sentiment analysis, and continuous improvement based on patient feedback"
  tags: [patient-experience, journey-mapping, sentiment-analysis, advanced]

state: {}

trigger: |
  Design a comprehensive patient experience optimization
  strategy for appointment reminder communications using
  journey mapping, sentiment analysis, and data-driven
  continuous improvement.

  Current patient experience data:
  - NPS for appointment communications: 32 (industry avg: 38)
  - Top complaints:
    1. "Too many messages" (34% of complaints)
    2. "Confusing instructions" (22%)
    3. "Can't easily reschedule" (18%)
    4. "Messages feel impersonal" (15%)
    5. "Wrong information" (11%)

  Patient satisfaction survey verbatims:
  - "I got 5 texts about one appointment. Stop!"
  - "The prep instructions were impossible to follow"
  - "I tried to cancel by text but nobody responded"
  - "Every message sounds like a robot wrote it"
  - "My name was wrong and they sent my wife's info to me"

  Available data for analysis:
  - 50,000 patient survey responses (12 months)
  - 500,000 reminder messages with engagement data
  - Call center logs (appointment-related inquiries)
  - Patient portal feedback and support tickets
  - Social media mentions (Google reviews, Yelp)
  - Staff feedback on patient communication issues

  Create:
  1. Patient journey map for appointment communication
  2. Sentiment analysis framework for feedback data
  3. Pain point prioritization matrix
  4. Message experience redesign recommendations
  5. Continuous improvement feedback loop
  6. Patient advisory council structure
  7. Experience metrics dashboard

assertions:
  - type: llm_judge
    criteria: "Patient journey map captures emotional states at each touchpoint — doesn't just list communication events but maps how patients feel (anxious at booking, overwhelmed by prep, frustrated by rescheduling difficulty); emotions inform design improvements."
    weight: 0.35
    description: "EmotionalJourneyMapping"
  - type: llm_judge
    criteria: "Pain point prioritization balances patient impact with implementation feasibility — 'too many messages' might be highest-impact but requires system changes, while 'wrong name' might be an easy quick win; the matrix guides resource allocation."
    weight: 0.35
    description: "PainPointPrioritization"
  - type: llm_judge
    criteria: "Patient advisory council structure ensures ongoing patient voice — includes diverse patient representation, regular meeting cadence, clear input mechanisms, and demonstrates how patient feedback actually changes communication practices."
    weight: 0.30
    description: "PatientAdvisoryCouncil"
