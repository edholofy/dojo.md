meta:
  id: multi-channel-reminder-sequence
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a multi-channel appointment reminder sequence — coordinated SMS, email, phone, and portal messages timed strategically to maximize confirmation rates"
  tags: [multi-channel, reminder-sequence, confirmation-rates, intermediate]

state: {}

trigger: |
  Design a multi-channel reminder sequence for a
  medical practice that coordinates messages across
  channels for maximum effectiveness.

  Practice: Summit Family Medicine (12 providers)
  Daily appointment volume: 120-150 patients
  Current no-show rate: 18% (industry avg: 15-20%)
  Goal: Reduce to under 10%

  Available channels:
  - SMS (85% of patients opted in)
  - Email (72% of patients have email on file)
  - Patient portal messages (40% active portal users)
  - Automated phone calls (100% have phone number)
  - Direct mail (for patients without digital access)

  Reminder timing strategy to design:
  - 7 days before appointment
  - 3 days before appointment
  - 1 day before appointment
  - Morning of appointment (same-day)

  Patient preference data:
  - 55% prefer text reminders
  - 25% prefer email
  - 15% prefer phone calls
  - 5% prefer portal messages

  Rules:
  - Never send more than 2 messages in a single day
  - Stop reminders once patient confirms
  - Escalate to phone if no response after 2 messages
  - Respect Do Not Disturb hours (8 AM - 8 PM only)

  Create:
  1. Complete reminder sequence with channel selection
  2. Message content for each touchpoint
  3. Escalation logic for non-responsive patients
  4. Channel preference management system
  5. Opt-out handling across channels

assertions:
  - type: llm_judge
    criteria: "Reminder sequence escalates appropriately — starts with preferred channel, escalates to additional channels for non-responders, increases urgency as appointment approaches; the sequence is logical and doesn't overwhelm patients who've already confirmed."
    weight: 0.35
    description: "SequenceEscalation"
  - type: llm_judge
    criteria: "Message content evolves across touchpoints — each message adds value (first: logistics, second: preparation, third: urgency, fourth: navigation); patients aren't receiving identical messages four times."
    weight: 0.35
    description: "ContentEvolution"
  - type: llm_judge
    criteria: "Opt-out and preference management is clearly defined — patients can easily change channels or stop messages, preferences are respected across the sequence, and the system handles edge cases (phone-only patients, no digital access)."
    weight: 0.30
    description: "PreferenceManagement"
