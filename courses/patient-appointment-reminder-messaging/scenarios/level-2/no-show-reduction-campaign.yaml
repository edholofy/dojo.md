meta:
  id: no-show-reduction-campaign
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a comprehensive no-show reduction campaign — data-driven messaging strategies, behavioral nudges, and measurement framework to reduce missed appointments"
  tags: [no-show-reduction, behavioral-nudges, data-driven, intermediate]

state: {}

trigger: |
  Design a comprehensive no-show reduction campaign
  using appointment reminder messaging as the primary
  intervention. The practice is losing significant
  revenue to missed appointments.

  Practice data:
  - Monthly appointments: 1,800
  - Current no-show rate: 22% (396 missed/month)
  - Cost per no-show: ~$175 (lost revenue + overhead)
  - Monthly loss: ~$69,300
  - Goal: Reduce to 8% within 6 months

  No-show patterns identified:
  - Monday AM: 28% no-show (highest)
  - Friday PM: 25% no-show
  - New patients: 30% no-show
  - Follow-ups booked 30+ days out: 26% no-show
  - Medicaid patients: 24% no-show
  - Patients age 18-30: 27% no-show

  Behavioral insights:
  - Patients who confirm are 4x more likely to attend
  - Personal phone calls reduce no-shows by 35%
  - Same-day reminders reduce no-shows by 20%
  - Including "we've reserved this time for you"
    language reduces no-shows by 15%

  Intervention options:
  - Enhanced reminder sequences (messaging improvements)
  - Waitlist management (fill cancelled slots)
  - Transportation assistance information
  - Financial barrier communication
  - Appointment time preference matching

  Create:
  1. No-show risk scoring model
  2. Tiered intervention strategy by risk level
  3. Enhanced message content using behavioral nudges
  4. Waitlist management communication workflow
  5. Measurement dashboard and KPIs
  6. 6-month rollout plan with milestones

assertions:
  - type: llm_judge
    criteria: "Risk scoring model uses actionable data — weights no-show history, appointment type, booking lead time, day/time, and patient demographics to predict risk; the model is practical to implement with existing practice management data."
    weight: 0.35
    description: "RiskScoringModel"
  - type: llm_judge
    criteria: "Behavioral nudges are evidence-based and specific — incorporates commitment language ('we've reserved this time for you'), social proof, loss framing, and personalization; each nudge has research backing and isn't just generic marketing advice."
    weight: 0.35
    description: "BehavioralNudgeEvidence"
  - type: llm_judge
    criteria: "Measurement framework tracks leading and lagging indicators — monitors confirmation rates, reminder engagement, and intervention-specific metrics alongside the ultimate no-show rate; can attribute improvement to specific interventions."
    weight: 0.30
    description: "MeasurementFramework"
