meta:
  id: intermediate-reminder-shift
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Navigate multiple appointment reminder complications simultaneously — HIPAA breach, system failure, patient complaint, and regulatory audit requiring coordinated response"
  tags: [multi-complication, system-failure, regulatory-audit, intermediate]

state: {}

trigger: |
  Your practice's appointment reminder system faces
  multiple simultaneous crises. Address all issues
  with coordinated, compliant responses.

  Crisis 1 — HIPAA breach discovered:
  Your reminder system sent a batch of 150 reminders
  that included provider specialty in the message body
  (e.g., "Your Psychiatry appointment with Dr. Morrison").
  A patient reported it to your compliance officer.
  Under HIPAA, this may constitute an unauthorized
  disclosure of PHI. You need to assess and respond.

  Crisis 2 — System failure:
  The automated reminder system crashed overnight.
  Tomorrow's 95 patients received NO reminders. It's
  now 2 PM the day before. Your historical no-show
  rate without reminders is 35%. You need to contact
  95 patients in the next 6 hours.

  Crisis 3 — Patient complaint to state:
  A patient filed a complaint with the state medical
  board claiming your practice texted her 7 times about
  one appointment and she felt "harassed." Your records
  show she received: 2 appointment reminders, 1 portal
  notification, 1 insurance verification request,
  1 intake form reminder, and 2 promotional texts about
  flu shots. She's right — 7 messages total.

  Crisis 4 — TCPA audit:
  Your practice received a letter from an attorney
  representing a class of patients claiming your
  automated calling system violates TCPA because
  patients weren't given proper opt-out options in
  every message. You need to audit your current
  messages immediately.

  Address all four crises:
  1. HIPAA breach assessment and response plan
  2. Emergency manual reminder outreach plan
  3. Patient complaint response and system fix
  4. TCPA compliance audit and remediation

assertions:
  - type: llm_judge
    criteria: "HIPAA breach response follows proper protocol — assesses whether it qualifies as a reportable breach, documents the incident, notifies affected patients if required, implements corrective action, and updates reminder templates to prevent recurrence."
    weight: 0.35
    description: "HIPAABreachProtocol"
  - type: llm_judge
    criteria: "Emergency outreach plan is practical for 95 patients in 6 hours — prioritizes high-risk patients, assigns staff roles, provides a script, and uses the most efficient channel mix; acknowledges that not all patients will be reached."
    weight: 0.35
    description: "EmergencyOutreachPracticality"
  - type: llm_judge
    criteria: "TCPA audit is thorough and actionable — reviews all automated message types for proper opt-out language, consent documentation, frequency compliance, and message content requirements; produces a remediation checklist with timelines."
    weight: 0.30
    description: "TCPAAuditThoroughness"
