meta:
  id: patient-portal-messaging-strategy
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a patient portal messaging strategy for appointment reminders — leverage portal features for interactive reminders, form completion, and pre-visit workflows"
  tags: [patient-portal, interactive-reminders, pre-visit-workflow, intermediate]

state: {}

trigger: |
  Design a patient portal messaging strategy that
  leverages interactive features for appointment
  management beyond simple reminders.

  Portal capabilities:
  - Secure messaging (HIPAA compliant)
  - Form completion (intake forms, questionnaires)
  - Document upload (insurance cards, records)
  - Appointment scheduling/rescheduling
  - Co-pay estimation and pre-payment
  - Check-in (up to 24 hours before appointment)
  - Real-time wait time updates
  - Visit summary delivery

  Current portal adoption: 40% (goal: 70%)
  Portal reminder open rate: 65% (vs 95% for SMS)

  Pre-visit workflow to design:
  1. 7 days out: Portal reminder with pre-visit checklist
  2. 5 days out: Intake forms available for completion
  3. 3 days out: Insurance verification prompt
  4. 1 day out: Digital check-in available
  5. 2 hours out: Real-time wait time estimate
  6. Post-visit: Summary and follow-up instructions

  Challenge: Many patients don't use the portal.
  Need a strategy that drives adoption while serving
  non-portal patients equitably.

  Create:
  1. Pre-visit portal workflow with message templates
  2. Portal adoption campaign through reminders
  3. Parallel non-portal patient pathway
  4. Portal message content for each touchpoint
  5. Metrics for portal engagement in reminder context

assertions:
  - type: llm_judge
    criteria: "Pre-visit workflow streamlines the patient experience — completing forms at home, verifying insurance in advance, and checking in digitally reduces day-of wait times; each portal interaction provides clear patient benefit."
    weight: 0.35
    description: "WorkflowStreamlining"
  - type: llm_judge
    criteria: "Portal adoption strategy is integrated into reminders naturally — doesn't feel like a separate marketing campaign but presents portal features as convenience improvements within existing reminder workflows; shows patients what they gain."
    weight: 0.35
    description: "AdoptionIntegration"
  - type: llm_judge
    criteria: "Non-portal patients receive equitable service — alternative pathways (phone, mail, in-person) provide the same preparation support; the portal is positioned as a convenience, not a requirement that creates a two-tier system."
    weight: 0.30
    description: "EquitableService"
