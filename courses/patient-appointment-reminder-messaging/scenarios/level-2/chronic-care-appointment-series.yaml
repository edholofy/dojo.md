meta:
  id: chronic-care-appointment-series
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design appointment reminder messaging for chronic care patients with recurring visits — build long-term engagement, track adherence, and personalize for ongoing relationships"
  tags: [chronic-care, recurring-appointments, adherence-tracking, intermediate]

state: {}

trigger: |
  Design an appointment reminder messaging strategy
  for patients with chronic conditions who have
  recurring appointments. These patients need ongoing
  engagement, not just one-time reminders.

  Patient profiles:

  Profile A — Diabetes management:
  - Quarterly visits with endocrinologist
  - Monthly lab work
  - Annual eye exam, foot exam, dental
  - Medication refill coordination
  - A1C tracking and goal setting

  Profile B — Heart failure:
  - Monthly cardiology visits
  - Weekly weight monitoring reminders
  - Medication adherence check-ins
  - Quarterly echocardiogram scheduling
  - Emergency warning sign awareness

  Profile C — Mental health (depression/anxiety):
  - Bi-weekly therapy sessions
  - Monthly medication management
  - PHQ-9 screening reminders
  - Crisis resource awareness
  - Session consistency encouragement

  Messaging challenges:
  - "Reminder fatigue" from frequent appointments
  - Maintaining engagement over months/years
  - Coordinating multiple provider appointments
  - Tracking adherence patterns over time
  - Balancing clinical urgency with patient autonomy

  Create:
  1. Chronic care reminder framework (adaptable to conditions)
  2. Message variation strategy to prevent fatigue
  3. Adherence tracking communication
  4. Multi-provider coordination messaging
  5. Milestone and progress celebration messages
  6. Re-engagement campaign for lapsed patients

assertions:
  - type: llm_judge
    criteria: "Message variation strategy prevents fatigue — uses rotating content, progress updates, health tips, and milestone celebrations alongside logistics; patients with monthly appointments aren't reading identical messages 12 times a year."
    weight: 0.35
    description: "VariationStrategy"
  - type: llm_judge
    criteria: "Re-engagement campaign for lapsed patients is compassionate, not punitive — acknowledges barriers (cost, transportation, burnout), offers flexible rescheduling, and emphasizes health partnership rather than compliance; respects patient autonomy."
    weight: 0.35
    description: "ReengagementCompassion"
  - type: llm_judge
    criteria: "Multi-provider coordination messaging helps patients manage complexity — when a diabetic patient needs to see endocrinology, ophthalmology, and podiatry, the messaging helps them track all appointments without confusion."
    weight: 0.30
    description: "MultiProviderCoordination"
