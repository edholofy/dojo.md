meta:
  id: post-visit-follow-up-messaging
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design post-visit follow-up messaging workflows — satisfaction surveys, care instructions, next appointment scheduling, and ongoing engagement"
  tags: [post-visit, follow-up, satisfaction-surveys, intermediate]

state: {}

trigger: |
  Design a post-visit follow-up messaging system that
  extends patient engagement beyond the appointment
  and supports continuity of care.

  Post-visit communication goals:
  - Patient satisfaction measurement
  - Care plan adherence support
  - Follow-up appointment scheduling
  - Medication adherence reminders
  - Complication/concern monitoring
  - Ongoing relationship building

  Messaging touchpoints:

  Immediate (same day):
  - Visit summary reminder (check patient portal)
  - Satisfaction survey (brief, 3-5 questions)
  - Pharmacy notification if new prescriptions

  Short-term (1-7 days):
  - Care instruction check-in
  - Medication side effect inquiry
  - Follow-up appointment scheduling prompt
  - Lab result availability notification

  Long-term (1-6 months):
  - Preventive care reminders
  - Chronic condition check-ins
  - Annual physical scheduling
  - Health education content
  - Re-engagement for lapsed patients

  Create:
  1. Post-visit messaging sequence for 3 visit types
     (routine visit, procedure, new diagnosis)
  2. Satisfaction survey design (SMS-based)
  3. Care instruction follow-up templates
  4. Re-engagement campaign for patients who haven't
     returned in 12+ months
  5. Metrics dashboard for post-visit engagement

assertions:
  - type: llm_judge
    criteria: "Post-visit sequences are differentiated by visit type — routine visits get simple follow-up, procedures get complication monitoring, new diagnoses get educational content and adherence support; not a one-size-fits-all approach."
    weight: 0.35
    description: "VisitTypeDifferentiation"
  - type: llm_judge
    criteria: "Satisfaction survey is brief and actionable — 3-5 questions that capture genuine feedback, uses SMS-friendly format (1-5 rating + optional comment), and has a clear path for addressing negative responses."
    weight: 0.35
    description: "SurveyBriefActionable"
  - type: llm_judge
    criteria: "Re-engagement campaign is compassionate, not transactional — reaches out to lapsed patients with care-focused messaging ('we want to make sure you're staying healthy') rather than revenue-focused ('you're overdue for a visit')."
    weight: 0.30
    description: "ReengagementCompassion"
