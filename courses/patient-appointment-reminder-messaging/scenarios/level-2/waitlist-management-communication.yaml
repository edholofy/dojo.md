meta:
  id: waitlist-management-communication
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design waitlist management communication workflows — notify waitlisted patients of openings, manage expectations, and fill cancelled appointment slots efficiently"
  tags: [waitlist-management, slot-filling, patient-communication, intermediate]

state: {}

trigger: |
  Design a waitlist management communication system
  that fills cancelled appointment slots quickly and
  manages patient expectations effectively.

  Practice context:
  - Average 8-12 cancellations per day
  - Average cancellation notice: 4 hours before appointment
  - Current waitlist: 45 patients across all providers
  - Goal: Fill 80%+ of cancelled slots
  - Current fill rate: 30% (most slots go unfilled)

  Waitlist categories:
  - Urgent (needs to be seen within 48 hours): 8 patients
  - Flexible (available on short notice): 22 patients
  - Specific provider preference: 15 patients

  Communication challenges:
  - Speed: Must notify and confirm within 2-3 hours
  - Fairness: First-come, first-served vs. clinical priority
  - Multiple offers: What if 3 patients want the same slot?
  - Declined offers: How many times before removing from list?
  - Patient frustration: Being on waitlist feels uncertain

  Create:
  1. Waitlist notification message templates (SMS/email)
  2. Prioritization logic for multiple candidates
  3. Time-limited offer workflow (accept within X minutes)
  4. Decline handling and re-queue process
  5. Waitlist status update communications
  6. Metrics and reporting for waitlist effectiveness

assertions:
  - type: llm_judge
    criteria: "Notification messages create urgency without pressure — clearly states the opening is time-sensitive, provides easy accept/decline mechanism, and respects that patients may not be able to drop everything; doesn't guilt patients for declining."
    weight: 0.35
    description: "UrgencyWithoutPressure"
  - type: llm_judge
    criteria: "Prioritization logic balances clinical need with fairness — urgent patients get first offer, then longest-waiting patients, with clear rules for provider-specific preferences; the system is defensible and transparent."
    weight: 0.35
    description: "PrioritizationFairness"
  - type: llm_judge
    criteria: "Status update communications manage expectations — patients know their position, estimated wait time, and that they haven't been forgotten; reduces incoming calls asking 'am I still on the list?'"
    weight: 0.30
    description: "ExpectationManagement"
