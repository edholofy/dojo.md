meta:
  id: mass-notification-system
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a mass notification system for appointment disruptions — provider illness, weather closures, system outages, and schedule changes affecting multiple patients"
  tags: [mass-notification, disruption-management, schedule-changes, intermediate]

state: {}

trigger: |
  Design a mass notification system for communicating
  appointment disruptions to multiple patients
  simultaneously. Different scenarios require different
  approaches.

  Scenario A — Provider illness:
  Dr. Chen is out sick tomorrow. She has 22 patients
  scheduled. 8 can be seen by Dr. Park (same specialty),
  14 need to be rescheduled. Need to notify all 22 patients
  by end of today.

  Scenario B — Weather closure:
  Severe winter storm forecast. Practice closing tomorrow.
  85 patients need to be notified. Some have urgent needs
  that can't wait (post-surgical follow-ups, medication
  refills expiring). Need to triage and communicate.

  Scenario C — System outage:
  EHR system is down. Today's remaining 35 appointments
  can proceed but without electronic records access.
  Patients need to know to bring medication lists and
  any paper records. Lab work and imaging referrals
  cannot be processed today.

  Scenario D — Schedule change:
  Dr. Patel is moving from Tuesday/Thursday to
  Monday/Wednesday schedule starting next month.
  45 patients with recurring appointments need to be
  transitioned. Some may need to find new providers
  if new days don't work.

  Create:
  1. Mass notification templates for each scenario
  2. Triage protocol for urgent vs. non-urgent patients
  3. Multi-channel delivery strategy
  4. Rescheduling workflow for disrupted appointments
  5. Follow-up communication plan
  6. Staff communication scripts for incoming calls

assertions:
  - type: llm_judge
    criteria: "Notification templates prioritize clarity and action — patients immediately understand what happened, what they need to do, and how to get help; no ambiguity about whether their appointment is cancelled, moved, or proceeding."
    weight: 0.35
    description: "ClarityAndAction"
  - type: llm_judge
    criteria: "Triage protocol protects vulnerable patients — identifies post-surgical patients, those needing urgent medication, and clinically time-sensitive cases for priority outreach and alternative arrangements; doesn't treat all cancellations equally."
    weight: 0.35
    description: "VulnerablePatientTriage"
  - type: llm_judge
    criteria: "Staff communication scripts prepare front desk for call volume — anticipated questions are answered, staff knows what they can offer (rescheduling options, alternative providers), and scripts maintain calm professionalism during chaos."
    weight: 0.30
    description: "StaffPreparedness"
