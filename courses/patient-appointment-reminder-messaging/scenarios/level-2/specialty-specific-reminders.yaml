meta:
  id: specialty-specific-reminders
  level: 2
  course: patient-appointment-reminder-messaging
  type: output
  description: "Create specialty-specific appointment reminder templates — tailored messaging for different medical specialties with unique preparation requirements and sensitivities"
  tags: [specialty-specific, tailored-templates, medical-specialties, intermediate]

state: {}

trigger: |
  Create specialty-specific appointment reminder
  templates for a multi-specialty medical group. Each
  specialty has unique preparation needs and
  communication sensitivities.

  Specialties to create templates for:

  1. Oncology (cancer treatment):
  - Patient: Starting chemotherapy cycle 3
  - Extreme sensitivity needed (emotional, anxious)
  - Prep: Blood work 24 hours before, hydrate well
  - Bring: Comfort items, driver, blanket
  - Session length: 3-4 hours
  - Tone: Compassionate, supportive, hopeful

  2. Mental Health (psychiatry):
  - Patient: Monthly medication management visit
  - HIPAA extra-sensitive (stigma concerns)
  - No details about diagnosis or medication in message
  - Telehealth option always mentioned
  - Tone: Normalizing, warm, non-clinical

  3. Orthopedics (surgery follow-up):
  - Patient: 6-week post-knee replacement follow-up
  - Bring: X-ray results if from external imaging
  - Wear shorts or loose pants for exam
  - Questions to prepare about rehab progress
  - Tone: Encouraging, progress-focused

  4. OB-GYN (prenatal visit):
  - Patient: 28-week prenatal appointment
  - Glucose tolerance test at this visit (drink prep)
  - Bring: Birth plan questions, partner welcome
  - Next appointments will be more frequent
  - Tone: Excited, supportive, informational

  Create tailored reminder templates for each specialty.

assertions:
  - type: llm_judge
    criteria: "Oncology reminder demonstrates exceptional emotional intelligence — acknowledges the difficulty of treatment, uses supportive language without being pitying, provides practical comfort suggestions, and conveys genuine care."
    weight: 0.35
    description: "OncologyEmotionalIntelligence"
  - type: llm_judge
    criteria: "Mental health reminder is maximally HIPAA-protective — uses only generic terms ('your appointment'), omits provider specialty, mentions telehealth availability as convenience (not stigma avoidance), and feels like any other medical reminder."
    weight: 0.35
    description: "MentalHealthPrivacy"
  - type: llm_judge
    criteria: "Each specialty template reflects genuine understanding of the patient experience — ortho focuses on recovery milestones, OB-GYN balances clinical with excitement, and each template includes specialty-relevant preparation that generic reminders miss."
    weight: 0.30
    description: "SpecialtyUnderstanding"
