meta:
  id: reminder-research-methodology
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a rigorous research study on appointment reminder effectiveness — randomized controlled trial methodology, IRB protocol, and publication strategy"
  tags: [research-methodology, rct-design, clinical-research, expert]

state: {}

trigger: |
  Design a rigorous multi-site randomized controlled
  trial to study the effectiveness of different
  appointment reminder strategies. This will be the
  largest study of its kind and establish evidence-based
  best practices.

  Research questions:
  1. Does AI-personalized reminder content reduce no-shows
     more than standard templated reminders?
  2. What is the optimal number and timing of reminders
     for different patient populations?
  3. Do behavioral nudges in reminder messages improve
     attendance compared to informational-only messages?
  4. How do reminder preferences and effectiveness vary
     across demographic groups?
  5. What is the cost-effectiveness of different reminder
     modalities (SMS vs email vs phone vs portal)?

  Study design parameters:
  - Multi-site: 8 health systems, 12 states
  - Target enrollment: 100,000 patients
  - Study duration: 18 months
  - Arms: Standard care, enhanced standard, AI-personalized,
    behavioral nudge, combined (AI + nudge)
  - Primary outcome: No-show rate
  - Secondary outcomes: Patient satisfaction, cost per
    appointment attended, health disparities impact
  - Subgroup analyses by age, race/ethnicity, income,
    insurance type, clinical condition

  Available resources:
  - NIH R01 grant: $2.8M over 3 years
  - Partnership with 8 health systems
  - Biostatistics core (university partnership)
  - Health services research team (8 investigators)
  - Technology partner for AI intervention

  Create:
  1. Study protocol (complete, IRB-ready)
  2. Randomization and blinding strategy
  3. Intervention specifications for each arm
  4. Data collection and management plan
  5. Statistical analysis plan
  6. Ethical considerations and IRB submission
  7. Publication and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Study protocol addresses healthcare-specific RCT challenges — handles clustering within health systems, accounts for provider-level variation, addresses ethical concerns of withholding reminders in control arm, and has pragmatic design elements."
    weight: 0.35
    description: "ProtocolHealthcareSpecific"
  - type: llm_judge
    criteria: "Statistical analysis plan is appropriate for the complexity — uses multilevel modeling for clustered data, accounts for multiple comparisons across 5 arms, pre-specifies subgroup analyses, and defines clinically meaningful effect sizes."
    weight: 0.35
    description: "StatisticalPlanRigor"
  - type: llm_judge
    criteria: "Ethical considerations address reminder equity — doesn't disadvantage control group patients (still receive standard reminders), monitors for disparate impact on vulnerable populations, and has stopping rules if one arm is clearly superior."
    weight: 0.30
    description: "EthicalEquityConsiderations"
