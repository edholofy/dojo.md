meta:
  id: reminder-technology-product
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a next-generation patient communication platform — product strategy, AI features, interoperability, and go-to-market for a healthcare technology startup"
  tags: [product-design, healthtech, saas-platform, expert]

state: {}

trigger: |
  Design a next-generation patient appointment
  communication platform for a healthcare technology
  startup. The product will compete with established
  players by leveraging AI and modern interoperability
  standards.

  Product vision: "CareConnect AI"
  Intelligent patient communication that reduces no-shows,
  improves outcomes, and delights patients — powered by
  AI that learns what works for each patient.

  Market analysis:
  - TAM: $4.2B patient communication market
  - SAM: $1.8B appointment reminder/engagement segment
  - Current leaders: Phreesia, Relatient, Solutionreach,
    Dialog Health
  - Gap: None offer true AI personalization or modern
    FHIR-native interoperability
  - Buyer: VP of Operations or CIO at health systems

  Competitive differentiators:
  - AI-powered personalization (content, timing, channel)
  - FHIR-native architecture (vs legacy HL7v2 integrations)
  - Predictive no-show scoring with intervention triggers
  - Natural language SMS (patients text naturally, AI responds)
  - Built-in health equity analytics
  - Population health messaging layer
  - Real-time A/B testing engine

  Technical constraints:
  - HIPAA compliant (SOC 2 Type II, HITRUST CSF)
  - EHR-agnostic (Epic, Cerner, Athena, Meditech)
  - 99.99% uptime SLA required
  - Must handle 10M+ messages per month at scale
  - Multi-language support (20+ languages)

  Create:
  1. Product strategy and positioning document
  2. MVP feature set (6-month launch)
  3. Full product roadmap (24-month vision)
  4. AI/ML architecture for personalization engine
  5. FHIR integration specification
  6. Pricing model and packaging
  7. Go-to-market strategy for health systems

assertions:
  - type: llm_judge
    criteria: "MVP is ruthlessly focused — solves the most painful problem first (likely no-show reduction with basic AI scoring), defers nice-to-haves, and can demonstrate ROI within 90 days of implementation; a health system would pilot this."
    weight: 0.35
    description: "MVPFocus"
  - type: llm_judge
    criteria: "AI architecture is technically credible — describes data pipeline, model training approach, feature engineering, inference latency requirements, and continuous learning loop; this would pass scrutiny from a health system CTO."
    weight: 0.35
    description: "AIArchitectureCredibility"
  - type: llm_judge
    criteria: "Go-to-market strategy navigates healthcare's long sales cycles — accounts for 6-18 month deal cycles, compliance review requirements, pilot-to-enterprise expansion path, and the importance of reference customers and clinical validation."
    weight: 0.30
    description: "GoToMarketHealthcare"
