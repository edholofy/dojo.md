meta:
  id: reminder-governance-framework
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Establish a governance framework for patient communications across a national health system — policy, compliance, technology standards, and organizational structure"
  tags: [governance, national-health-system, policy-framework, expert]

state: {}

trigger: |
  Establish a comprehensive governance framework for
  patient appointment communications across a national
  health system formed through multiple mergers.

  Organization: National Health Partners
  - 45 hospitals across 18 states
  - 350 outpatient clinics
  - 8,500 providers
  - 25,000 daily appointments
  - Result of 6 mergers over 8 years
  - Currently: 12 different reminder systems in use
  - No unified communication standards
  - Recent OCR investigation for HIPAA violations

  Governance challenges:
  - State-by-state regulatory variation (18 states)
  - Legacy systems from merged organizations
  - Different organizational cultures around communication
  - Physician autonomy vs standardization
  - Budget allocation across regions
  - Patient populations vary dramatically by region
  - Union considerations in 8 states

  Governance scope:
  - Communication standards and policies
  - Technology platform consolidation
  - Compliance and risk management
  - Vendor management and procurement
  - Quality assurance and monitoring
  - Patient rights and preferences
  - Innovation and emerging technology

  Create:
  1. Governance charter with authority structure
  2. National communication standards (mandatory vs optional)
  3. State-by-state compliance variation matrix
  4. Technology consolidation roadmap
  5. Risk management and audit framework
  6. Change management across merged cultures
  7. Innovation governance (testing new approaches)

assertions:
  - type: llm_judge
    criteria: "Governance structure balances national standards with regional autonomy — mandatory items focus on compliance and patient safety, while regional flexibility allows for population-specific adaptation and local regulatory requirements."
    weight: 0.35
    description: "NationalRegionalBalance"
  - type: llm_judge
    criteria: "Technology consolidation roadmap is realistic for a merged organization — phases migration from 12 systems to a unified platform over 3-4 years, accounts for data migration risks, staff retraining, and the reality that some legacy systems can't be retired immediately."
    weight: 0.35
    description: "ConsolidationRealism"
  - type: llm_judge
    criteria: "Change management addresses merger dynamics — recognizes that staff loyalty to legacy systems reflects organizational identity, provides psychological safety during transitions, and builds buy-in rather than mandating compliance."
    weight: 0.30
    description: "MergerChangeManagement"
