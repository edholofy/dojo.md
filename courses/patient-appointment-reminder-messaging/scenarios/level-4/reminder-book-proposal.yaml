meta:
  id: reminder-book-proposal
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Write a book proposal for the definitive guide to patient appointment communication in healthcare — publishing strategy, chapter outlines, and market positioning"
  tags: [book-proposal, publishing, thought-leadership, expert]

state: {}

trigger: |
  Write a book proposal for the definitive guide to
  patient appointment communication in modern healthcare.

  Book concept: "Every Message Matters: The Science and
  Art of Patient Appointment Communication"

  Author platform:
  - 20 years in healthcare operations and informatics
  - Former SVP of Patient Experience at a Top-10 health system
  - Published 15 peer-reviewed papers on patient communication
  - Keynote speaker at HIMSS, MGMA, Beryl Institute
  - Monthly column in Healthcare Executive magazine
  - Podcast: "Patient Voice" (300 episodes, 15K subscribers)
  - Advisory board: 3 health tech companies
  - Cited in New York Times, Washington Post, NPR

  Target audience:
  - Primary: Healthcare operations leaders (VP+)
  - Secondary: Health IT professionals implementing systems
  - Tertiary: Health tech founders and product managers
  - Academic: Health services researchers, MHA students

  Comparable titles:
  - "The Patient Will See You Now" by Eric Topol (broad digital health)
  - "Why We Revolt" by Victor Montori (patient-centered care)
  - "The Digital Doctor" by Robert Wachter (health IT)
  - Gap: No book specifically on patient communication systems

  Publisher targets:
  - Primary: McGraw Hill Health Professions
  - Secondary: Oxford University Press (health policy)
  - Hybrid: ACHE Management Series (healthcare executives)

  Create:
  1. Complete book proposal (submission-ready format)
  2. Chapter outline (18-20 chapters)
  3. Sample chapter
  4. Marketing and launch strategy
  5. Academic adoption plan
  6. Companion resources (case studies, tools, templates)

assertions:
  - type: llm_judge
    criteria: "Book proposal follows publisher-ready format — includes market analysis, competitive positioning, author platform summary, detailed chapter outline, and sample material; a literary agent or acquisitions editor would take this seriously."
    weight: 0.35
    description: "ProposalFormat"
  - type: llm_judge
    criteria: "Chapter outline covers the full scope — from fundamentals to AI/future vision, with practical case studies and frameworks in each chapter; the book would be both a reference guide and a strategic playbook for healthcare leaders."
    weight: 0.35
    description: "ChapterComprehensiveness"
  - type: llm_judge
    criteria: "Sample chapter demonstrates the book's unique voice — balances research evidence with real-world stories, makes technical content accessible to executive readers, and provides actionable takeaways; this chapter sells the rest of the book."
    weight: 0.30
    description: "SampleChapterVoice"
