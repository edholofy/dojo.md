meta:
  id: reminder-knowledge-graph
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Build a knowledge graph for healthcare appointment communication — structured knowledge connecting patient populations, communication strategies, channels, regulations, and outcomes"
  tags: [knowledge-graph, structured-knowledge, healthcare-ontology, expert]

state: {}

trigger: |
  Build a comprehensive knowledge graph that captures
  healthcare appointment communication expertise for
  AI-powered decision support and training.

  Knowledge domains to map:

  Patient segments:
  - Demographics (age, language, culture)
  - Clinical (chronic conditions, acute, preventive)
  - Behavioral (no-show history, response patterns)
  - Social determinants (transportation, literacy, technology)
  - Insurance (commercial, Medicare, Medicaid, uninsured)

  Communication strategies:
  - Reminder sequences (timing, frequency, escalation)
  - Content approaches (informational, behavioral, motivational)
  - Personalization dimensions (language, literacy, tone)
  - Barrier mitigation (transportation, cost, childcare)

  Channels:
  - SMS (capabilities, limitations, compliance)
  - Email (formatting, content depth, engagement)
  - Phone/IVR (scripts, personalization, cost)
  - Portal (interactivity, pre-visit workflows)
  - Mail (accessibility, lead time, cost)

  Regulations:
  - HIPAA (PHI restrictions by channel)
  - TCPA (consent, frequency, opt-out)
  - 42 CFR Part 2 (substance abuse)
  - State-specific requirements
  - ADA accessibility

  Outcomes:
  - No-show rates by segment and strategy
  - Patient satisfaction correlations
  - Cost-effectiveness metrics
  - Health equity impact measures
  - Clinical outcome connections

  Create:
  1. Knowledge graph ontology and schema
  2. Entity and relationship definitions
  3. Decision support engine design
  4. Training pathway recommendations
  5. AI recommendation algorithm logic
  6. Continuous learning and update process
  7. Query interface for practitioners

assertions:
  - type: llm_judge
    criteria: "Ontology captures meaningful healthcare relationships — connects patient segments to effective strategies, channels to regulatory constraints, and interventions to outcomes; relationships are clinically and operationally relevant."
    weight: 0.35
    description: "OntologyHealthcareRelevance"
  - type: llm_judge
    criteria: "Decision support engine produces actionable recommendations — given a patient profile and appointment type, recommends specific channel, timing, content approach, and barrier mitigation; recommendations are evidence-based and explainable."
    weight: 0.35
    description: "DecisionSupportActionability"
  - type: llm_judge
    criteria: "Continuous learning process incorporates new evidence — defines how outcome data feeds back to improve recommendations, how regulatory changes update constraints, and how new research findings are integrated."
    weight: 0.30
    description: "ContinuousLearningDesign"
