meta:
  id: reminder-behavioral-science
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Apply behavioral science to patient appointment reminders — cognitive biases, decision architecture, and nudge theory to improve healthcare attendance"
  tags: [behavioral-science, nudge-theory, healthcare-behavior, expert]

state: {}

trigger: |
  Apply behavioral science principles to redesign
  patient appointment reminder messaging for maximum
  attendance improvement while maintaining ethical
  standards in healthcare.

  Behavioral science principles to apply:

  Commitment devices:
  - Active confirmation (patient chooses to attend)
  - Implementation intentions ("I will go to my
    appointment on Tuesday at 2 PM")
  - Pre-commitment strategies (scheduling next appointment
    at current visit)
  - Public commitment (telling family about appointment)

  Loss framing:
  - "Your appointment slot reserved for you" vs
    "Schedule an appointment"
  - "Missing this appointment delays your results by 6 weeks"
  - Cost of missed appointment transparency
  - Sunk cost awareness (time already invested in referral)

  Social norms:
  - "95% of patients with your condition attend follow-up"
  - Provider relationship framing ("Dr. Chen is expecting you")
  - Community health norms messaging
  - Peer comparison (used carefully in healthcare)

  Friction reduction:
  - One-click confirmation
  - Pre-completed forms
  - Transportation integration
  - Childcare coordination information
  - Waiting time minimization promises

  Ethical boundaries in healthcare:
  - Cannot manipulate vulnerable patients
  - Must respect autonomy and informed consent
  - Cannot create false urgency about health conditions
  - Must be truthful about consequences of missing care
  - Cannot penalize patients for health decisions
  - Must consider health literacy in messaging design

  Create:
  1. Behavioral science audit of standard reminders
  2. Redesigned messages using each principle
  3. Ethical framework for behavioral nudges in healthcare
  4. RCT design to test behavioral interventions
  5. Implementation guide for health systems
  6. Equity analysis of behavioral approaches
  7. Staff training on ethical persuasion in healthcare

assertions:
  - type: llm_judge
    criteria: "Behavioral principles are applied specifically to healthcare context — loss framing addresses health outcomes not just scheduling convenience, social norms reference clinical evidence, and commitment devices leverage the patient-provider relationship."
    weight: 0.35
    description: "HealthcareSpecificApplication"
  - type: llm_judge
    criteria: "Ethical framework draws clear lines in healthcare — distinguishes between helpful nudges (reducing friction, providing social proof) and manipulation (creating fear, exploiting vulnerability); healthcare's power dynamics require higher ethical standards than commercial settings."
    weight: 0.35
    description: "HealthcareEthicalLines"
  - type: llm_judge
    criteria: "Equity analysis considers differential impact — examines whether behavioral nudges work equally across populations, identifies where nudges might reinforce existing disparities, and recommends adaptations for underserved populations."
    weight: 0.30
    description: "EquityAnalysis"
