meta:
  id: reminder-certification-program
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Design a professional certification program for healthcare patient communication specialists — curriculum, competency assessment, and industry recognition"
  tags: [certification, professional-development, healthcare-communication, expert]

state: {}

trigger: |
  Design a professional certification program for
  healthcare patient communication specialists. No
  formal credential exists for this growing role.

  Market need:
  - 15,000+ patient communication roles in US healthcare
  - No standardized credential or competency framework
  - Roles include: patient access coordinators, communication
    managers, reminder system administrators, patient
    experience coordinators
  - Employers struggle to assess candidate competency
  - Regulatory complexity requires specialized knowledge

  Certification tiers:

  Tier 1: Certified Patient Communication Specialist (CPCS)
  - Target: Front-line staff, coordinators
  - Scope: Message creation, system operation, compliance basics
  - 30-hour program, online + practicum

  Tier 2: Certified Patient Communication Manager (CPCM)
  - Target: Managers, team leads, system administrators
  - Scope: Strategy, technology management, analytics, compliance
  - 60-hour program, online + project

  Tier 3: Fellow in Patient Communication (FPC)
  - Target: Directors, consultants, vendors
  - Scope: Enterprise strategy, innovation, research, leadership
  - 100-hour program + portfolio + oral exam

  Curriculum domains:
  - Healthcare communication fundamentals
  - HIPAA/TCPA/regulatory compliance
  - Technology platforms and EHR integration
  - Patient experience and engagement science
  - Data analytics and optimization
  - Health equity in communication
  - Change management and leadership
  - Emerging technology (AI, NLP, predictive analytics)

  Create:
  1. Competency framework for all three tiers
  2. Detailed curriculum outline
  3. Assessment methodology (knowledge + practical)
  4. Recertification requirements
  5. Accreditation and CE credit strategy
  6. Marketing and enrollment plan
  7. Advisory board and governance structure

assertions:
  - type: llm_judge
    criteria: "Competency framework builds progressively — Tier 1 establishes operational competence, Tier 2 adds strategic and analytical skills, Tier 3 requires thought leadership and innovation; each tier has clear prerequisites and distinct value."
    weight: 0.35
    description: "CompetencyProgression"
  - type: llm_judge
    criteria: "Assessment methodology tests real-world competency — practical scenarios require applying knowledge to realistic healthcare communication challenges, not just answering multiple-choice questions about regulations."
    weight: 0.35
    description: "AssessmentAuthenticity"
  - type: llm_judge
    criteria: "Marketing plan reaches the fragmented target audience — healthcare communication professionals exist across departments (operations, IT, marketing, patient access); the plan identifies and reaches them through professional associations, conferences, and employer partnerships."
    weight: 0.30
    description: "MarketingReach"
