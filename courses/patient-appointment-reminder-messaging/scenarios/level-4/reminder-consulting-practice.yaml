meta:
  id: reminder-consulting-practice
  level: 4
  course: patient-appointment-reminder-messaging
  type: output
  description: "Launch a consulting practice specializing in healthcare appointment communication optimization — advisory services for health systems, vendors, and payers"
  tags: [consulting-practice, healthcare-advisory, business-building, expert]

state: {}

trigger: |
  Launch a consulting practice specializing in healthcare
  appointment communication optimization. You're
  transitioning from health system operations leader to
  independent consultant.

  Your credentials:
  - 18 years in healthcare operations
  - Reduced no-shows from 22% to 7% at a 500-provider system
  - Implemented enterprise reminder systems for 3 health systems
  - Published 12 peer-reviewed papers on patient communication
  - Speaker at HIMSS, MGMA, and AHA conferences
  - Former chair of MGMA Patient Communication Committee
  - Developed a proprietary no-show risk scoring model

  Target clients:
  - Tier 1: Large health systems (500+ providers) — $75K+ engagements
  - Tier 2: Mid-size practices (50-200 providers) — $25K-50K
  - Tier 3: EHR/communication vendors — $50K+ advisory
  - Tier 4: Health plans/payers — $100K+ population health

  Service offerings to design:
  - Communication system audit and optimization
  - No-show reduction program implementation
  - Technology vendor selection and implementation
  - Regulatory compliance assessment
  - Patient experience improvement
  - Population health messaging strategy
  - Staff training and change management

  Create:
  1. Consulting practice business plan
  2. Service catalog with methodology summaries
  3. Diagnostic assessment framework
  4. ROI calculator for client engagement proposals
  5. Thought leadership and marketing strategy
  6. Revenue model (Year 1-3 projections)
  7. Delivery team structure and scaling plan

assertions:
  - type: llm_judge
    criteria: "Diagnostic assessment framework reveals actionable insights — goes beyond surface metrics to uncover root causes of communication failures; clients gain significant value from the assessment itself and see clear paths to improvement."
    weight: 0.35
    description: "DiagnosticAssessmentDepth"
  - type: llm_judge
    criteria: "ROI calculator is credible and healthcare-specific — connects communication improvements to financial outcomes (no-show cost reduction, staff time savings, quality measure performance), uses defensible assumptions, and accounts for implementation costs."
    weight: 0.35
    description: "ROICalculatorCredibility"
  - type: llm_judge
    criteria: "Revenue model reflects consulting reality — accounts for sales cycles in healthcare (6-12 months), seasonal budget patterns, client concentration risk, and the challenge of scaling a consulting practice beyond founder capacity."
    weight: 0.30
    description: "RevenueModelRealism"
