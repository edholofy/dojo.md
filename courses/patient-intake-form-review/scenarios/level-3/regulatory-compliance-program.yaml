meta:
  id: regulatory-compliance-program
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Build a comprehensive intake regulatory compliance program — manage HIPAA, ADA, state laws, CMS requirements, and accreditation standards across a multi-state organization"
  tags: [regulatory-compliance, multi-state, accreditation, advanced]

state: {}

trigger: |
  Build a comprehensive regulatory compliance program
  for patient intake operations across a multi-state
  healthcare organization.

  Organization: American Health Partners
  - Operating in 8 states (CA, TX, FL, NY, IL, PA, OH, GA)
  - 25 facilities, 400 providers
  - 750,000 annual patient encounters
  - Current compliance: Ad hoc, no formal program
  - Recent audit findings: 12 compliance gaps identified

  Regulatory landscape to manage:

  Federal requirements:
  - HIPAA Privacy and Security Rules
  - ADA Title III (public accommodations)
  - Section 1557 ACA (nondiscrimination)
  - CMS Conditions of Participation
  - 42 CFR Part 2 (SUD records)
  - ONC Information Blocking Rules

  State-specific variations:
  - CA: Confidentiality of Medical Information Act (CMIA),
    stricter than HIPAA in some areas
  - TX: Texas Medical Records Privacy Act
  - NY: HIPAA preemption complexities, mental health
    confidentiality requirements
  - FL: State-specific HIPAA provisions
  - Each state: Varying consent of minor laws,
    mandatory reporting requirements, advance
    directive rules

  Accreditation standards:
  - Joint Commission (hospitals)
  - NCQA (ambulatory practices)
  - AAAHC (ambulatory surgery)
  - Each with intake-specific requirements

  Recent audit findings (top 5):
  1. Consent forms not updated for 2 years at 3 facilities
  2. HIPAA acknowledgments missing for 8% of patients
  3. Language access not consistently documented
  4. Minor consent handled inconsistently across states
  5. SDOH screening not implemented per CMS requirement

  Create:
  1. Multi-jurisdiction compliance matrix
  2. Compliance program charter and governance
  3. Risk assessment methodology
  4. Corrective action plans for audit findings
  5. Ongoing monitoring and audit schedule
  6. Staff compliance training framework
  7. Regulatory change management process

assertions:
  - type: llm_judge
    criteria: "Multi-jurisdiction compliance matrix identifies where state laws exceed federal requirements — California's CMIA requirements that go beyond HIPAA, New York's mental health confidentiality rules, and state-specific minor consent ages are mapped so intake staff know which law to follow in each state."
    weight: 0.35
    description: "JurisdictionMatrix"
  - type: llm_judge
    criteria: "Corrective action plans address each audit finding with specific remediation — not just 'update consent forms' but which forms, which facilities, timeline, responsible party, and verification that the fix is implemented and sustained."
    weight: 0.35
    description: "CorrectiveActionPlans"
  - type: llm_judge
    criteria: "Regulatory change management process is proactive — monitors legislative changes across 8 states, federal regulatory updates, and accreditation standard revisions; assesses impact on intake operations and triggers form/process updates before compliance deadlines."
    weight: 0.30
    description: "RegulatoryChangeManagement"
