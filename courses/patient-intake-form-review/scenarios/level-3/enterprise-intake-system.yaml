meta:
  id: enterprise-intake-system
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Design an enterprise-level patient intake management system — centralized intake operations across a multi-facility health system with standardized workflows and quality controls"
  tags: [enterprise-system, centralized-intake, multi-facility, advanced]

state: {}

trigger: |
  Design an enterprise-level patient intake management
  system for a large health system consolidating
  intake operations across multiple facilities.

  Organization: Meridian Health System
  - 6 hospitals, 35 ambulatory clinics, 12 urgent cares
  - 600 providers, 22 specialties
  - Annual patient encounters: 1.2 million
  - Active patient records: 450,000
  - EHR: Epic (all facilities)
  - Current state: Each facility manages intake independently
  - Duplicate record rate: 7.2% across system
  - Form versions: 47 different intake forms in use
  - Intake-related claim denials: $4.8M annually

  Strategic objectives:
  - Single patient identity across all facilities
  - Standardized intake forms with specialty customization
  - Pre-visit digital intake rate of 75%+
  - Real-time insurance eligibility verification
  - Regulatory compliance across all facilities
  - Centralized quality monitoring and reporting
  - Patient experience consistency across locations

  Challenges:
  - Facilities resist standardization ("we're different")
  - Multiple legacy workflows embedded in culture
  - Different patient demographics by location
  - Rural facilities have lower digital adoption
  - Union workforce at 3 hospitals (role change concerns)
  - Previous centralization attempt failed 2 years ago

  Create:
  1. Enterprise intake architecture
  2. Standardized form library with specialty modules
  3. Central intake operations model
  4. Master patient index strategy
  5. Implementation roadmap (phased)
  6. Change management strategy
  7. Performance benchmarking framework
  8. ROI projection

assertions:
  - type: llm_judge
    criteria: "Enterprise architecture balances standardization with necessary customization — core demographic, insurance, and consent elements are standardized system-wide; specialty-specific clinical elements are modular add-ons; facilities maintain ability to collect unique information without fragmenting the system."
    weight: 0.35
    description: "StandardizationBalance"
  - type: llm_judge
    criteria: "Change management strategy addresses why the previous attempt failed — identifies the specific resistance patterns (facility autonomy, cultural differences, union concerns) and designs engagement, communication, and governance strategies to overcome them; includes facility champions and gradual rollout."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Master patient index strategy reduces the 7.2% duplicate rate — implements enterprise MPI with probabilistic matching, cross-facility record linking, and proactive duplicate prevention; addresses both existing duplicate cleanup and prevention of future duplicates."
    weight: 0.30
    description: "MPIStrategy"
