meta:
  id: telehealth-intake-design
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Design telehealth-specific intake processes — address virtual visit consent, technology verification, remote identity confirmation, and cross-state licensing requirements"
  tags: [telehealth-intake, virtual-visit, remote-verification, advanced]

state: {}

trigger: |
  Design telehealth-specific intake processes for a
  healthcare organization expanding its virtual care
  program across multiple states.

  Organization: HealthConnect Virtual
  - Licensed in 15 states
  - Telehealth visit volume: 8,000/month (growing 20%/quarter)
  - Specialties: Primary care, behavioral health,
    dermatology, endocrinology
  - Platform: Custom app + Zoom for Healthcare
  - EHR: Epic with MyChart video visit integration

  Telehealth-specific intake challenges:

  1. Identity and location verification:
  - Must confirm patient is physically located in a
    state where provider is licensed
  - Cannot verify ID in person
  - Insurance coverage may differ by state of service
  - Patient location may change between scheduling
    and appointment

  2. Telehealth consent requirements:
  - Consent requirements vary by state
  - Some states require verbal consent recorded
  - Some require written/digital consent per visit
  - Some require consent only for first visit
  - Informed consent must address telehealth-specific
    risks (technology failures, privacy limitations)

  3. Technology readiness:
  - Patient must have adequate device, internet, and
    privacy for visit
  - Technology barriers disproportionately affect
    elderly and low-income patients
  - Audio-only visits have different intake requirements
  - Patient needs to be educated on virtual waiting room

  4. Cross-state complexity:
  - Patient enrolled in California but visiting family
    in Texas
  - Provider licensed in both states
  - Which state's consent laws apply?
  - Which state's prescribing rules apply?

  Create:
  1. Telehealth intake workflow
  2. State-specific consent management matrix
  3. Identity and location verification protocol
  4. Technology readiness assessment
  5. Audio-only visit intake modifications
  6. Cross-state compliance decision framework
  7. Patient onboarding for virtual care

assertions:
  - type: llm_judge
    criteria: "Location verification protocol addresses the licensing requirement — patient's physical location at the time of service determines which state's laws apply and whether the provider is licensed there; proposes real-time location confirmation (not just address on file) with documentation."
    weight: 0.35
    description: "LocationVerification"
  - type: llm_judge
    criteria: "State consent management matrix is operationally useful — staff can quickly determine what consent type is needed for a patient in a specific state; addresses the spectrum from 'verbal consent per visit' to 'written consent first visit only' across 15 states."
    weight: 0.35
    description: "StateConsentMatrix"
  - type: llm_judge
    criteria: "Technology readiness assessment prevents failed visits — screens for adequate bandwidth, compatible device, private space, and battery life before the appointment; provides alternatives (phone visit, in-person redirect) for patients who fail the assessment."
    weight: 0.30
    description: "TechReadinessAssessment"
