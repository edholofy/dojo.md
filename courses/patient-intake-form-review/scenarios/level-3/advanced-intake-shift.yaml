meta:
  id: advanced-intake-shift
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Advanced shift simulation — manage enterprise-level intake challenges including a system-wide form compliance audit, AI implementation decision, health equity assessment, and interoperability project"
  tags: [shift-simulation, enterprise-challenges, strategic-decisions, advanced]

state: {}

trigger: |
  You are the Director of Patient Access Services
  for a regional health system. Today you face
  strategic decisions that will shape intake operations
  for years to come.

  CHALLENGE 1 — Post-audit compliance crisis:
  An external auditor has identified that 15% of patient
  records across the system have expired or missing
  HIPAA acknowledgments. The state attorney general's
  office has been notified. You have 30 days to
  develop a remediation plan or face potential fines.
  The problem affects 67,000 patient records.

  CHALLENGE 2 — AI vendor evaluation:
  Two vendors have pitched AI-powered intake solutions:
  - Vendor A: $250K/year, proven at 15 health systems,
    reduces intake time by 40%, integrates with Epic
  - Vendor B: $150K/year, startup with innovative NLP,
    claims 60% reduction in intake time, requires
    custom EHR integration, only 2 production deployments
  Your CIO wants a recommendation by end of week.

  CHALLENGE 3 — Health equity data request:
  The CMO needs intake-driven health equity data for
  a board presentation next week. She wants to show:
  - SDOH screening completion rates by demographic group
  - Language access compliance metrics
  - Intake completion rate disparities
  - Recommendations for equity improvement
  Data hasn't been systematically collected before.

  CHALLENGE 4 — Patient complaint escalation:
  A prominent community leader filed a formal complaint
  after their non-English-speaking parent was given
  English-only forms, waited 45 minutes for a phone
  interpreter, and was asked to have their grandchild
  interpret instead. The complaint has been shared on
  social media and a local TV station is asking for
  a statement.

  Address all four challenges:
  1. HIPAA remediation plan with 30-day timeline
  2. AI vendor recommendation with justification
  3. Health equity data analysis framework
  4. Complaint response and language access reform
  5. Resource allocation across priorities
  6. Communication to leadership

assertions:
  - type: llm_judge
    criteria: "HIPAA remediation plan is actionable within 30 days — prioritizes patients with upcoming appointments (get acknowledgments signed at next visit), implements systematic outreach for remaining patients, and creates a process to prevent future lapses; demonstrates good-faith compliance to the attorney general."
    weight: 0.35
    description: "HIPAARemediationPlan"
  - type: llm_judge
    criteria: "Patient complaint response addresses both the individual case and systemic failure — apologizes to the family, explains corrective actions, and uses the incident as a catalyst for comprehensive language access reform; the media response is transparent without being defensive."
    weight: 0.35
    description: "ComplaintResponse"
  - type: llm_judge
    criteria: "AI vendor recommendation weighs risk appropriately — Vendor B's lower cost and bigger claims come with higher implementation risk (2 deployments vs. 15); the recommendation considers the organization's risk tolerance, timeline pressures, and the cost of a failed implementation."
    weight: 0.30
    description: "AIVendorRecommendation"
