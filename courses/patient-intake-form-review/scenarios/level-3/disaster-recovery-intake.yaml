meta:
  id: disaster-recovery-intake
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Design disaster recovery and business continuity plans for intake operations — handle system outages, natural disasters, mass casualty events, and pandemic surge situations"
  tags: [disaster-recovery, business-continuity, emergency-intake, advanced]

state: {}

trigger: |
  Design disaster recovery and business continuity
  plans for patient intake operations covering
  multiple emergency scenarios.

  Organization: Regional Medical Center
  - 350-bed hospital with ED (Level II trauma)
  - 8 ambulatory clinics
  - Normal daily volume: 600 encounters
  - EHR: Epic (fully digital intake since 2023)
  - Digital dependency: No current paper backup forms

  Scenarios to plan for:

  Scenario 1 — EHR system outage (planned/unplanned):
  Epic goes down for scheduled maintenance (8 hours)
  or experiences an unplanned outage (unknown duration).
  Patient registration, insurance verification, and
  clinical documentation cannot proceed electronically.
  The ED continues to receive patients.

  Scenario 2 — Natural disaster (hurricane/earthquake):
  Facility is operational but community infrastructure
  is damaged. Influx of patients from damaged facilities.
  Many patients arrive without identification, insurance
  cards, or medication lists. Communication systems
  (phone, internet) may be intermittent.

  Scenario 3 — Mass casualty event:
  Multiple trauma patients arriving simultaneously.
  Standard intake processes are too slow. Patient
  identification may not be immediately possible.
  Triage supersedes administrative processes.

  Scenario 4 — Pandemic surge:
  COVID-like pandemic requires modified intake:
  - Screening questions before entry
  - Contactless check-in to reduce exposure
  - High volume overwhelming registration staff
  - Temporary staff unfamiliar with systems
  - Testing and vaccination intake at high volume

  Create:
  1. EHR downtime intake procedures
  2. Natural disaster intake protocol
  3. Mass casualty intake triage procedures
  4. Pandemic surge intake modifications
  5. Paper-to-digital reconciliation process
  6. Emergency supply kit (forms, equipment)
  7. Staff cross-training plan for emergency roles
  8. Drill and testing schedule

assertions:
  - type: llm_judge
    criteria: "EHR downtime procedures provide functional continuity — pre-printed downtime forms are maintained, downtime registration numbering system prevents duplicate records, critical intake elements (allergies, medications, insurance) are captured on paper, and a reconciliation process ensures data enters the EHR when systems restore."
    weight: 0.35
    description: "DowntimeProcedures"
  - type: llm_judge
    criteria: "Mass casualty intake prioritizes patient safety over administrative completeness — uses triage tags or wristbands for identification, captures minimum data for treatment (name/DOB if available, allergies if known, injury type), and defers comprehensive registration until the patient is stabilized."
    weight: 0.35
    description: "MassCasualtyIntake"
  - type: llm_judge
    criteria: "Paper-to-digital reconciliation process prevents post-emergency data quality crisis — defines who enters paper data, timeline for entry, quality checks to prevent duplicates, and a process for matching unknown patients to their records once identification is confirmed."
    weight: 0.30
    description: "ReconciliationProcess"
