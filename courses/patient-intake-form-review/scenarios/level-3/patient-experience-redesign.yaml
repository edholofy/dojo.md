meta:
  id: patient-experience-redesign
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Redesign the patient intake experience — apply service design and UX principles to transform intake from an administrative burden into a positive first impression"
  tags: [patient-experience, service-design, ux-principles, advanced]

state: {}

trigger: |
  Redesign the patient intake experience using service
  design principles to transform it from the most
  frustrating part of a healthcare visit into a
  positive first impression.

  Organization: Prestige Medical Group
  - 30 providers, multi-specialty
  - Patient satisfaction scores:
    * Overall practice: 4.2/5
    * Intake/check-in experience: 2.8/5 (lowest category)
    * Wait time satisfaction: 2.5/5
    * "Would you recommend?": 3.8/5

  Patient journey mapping findings:

  Pain points identified:
  1. "I filled out the same information 3 times" (paper
     forms overlap with portal questions and staff questions)
  2. "The waiting room is stressful — uncomfortable chairs,
     loud TV, no privacy at the check-in window"
  3. "Nobody explained why they needed my information"
  4. "I had to dig through my wallet for 4 different cards"
  5. "The forms used words I didn't understand"
  6. "I felt like a number, not a person"
  7. "I arrived 15 minutes early as asked, then waited
     45 minutes anyway"

  Competitive benchmark:
  - Concierge medicine practices: Personalized pre-visit
    calls, no waiting room time, seamless check-in
  - Retail clinics (CVS MinuteClinic): Digital check-in,
    estimated wait times, minimal paperwork
  - Dental practices: Online forms, text confirmations,
    comfortable waiting areas, kids' areas

  Design constraints:
  - Cannot eliminate necessary documentation
  - Must maintain HIPAA compliance
  - Budget: $50K for redesign
  - Must work for both digital and non-digital patients
  - 12 providers must agree to any workflow changes

  Create:
  1. Patient journey map (current and desired states)
  2. Service design blueprint for new intake experience
  3. Physical space recommendations
  4. Digital experience redesign
  5. Staff interaction script and training
  6. Waiting room transformation plan
  7. Success metrics and measurement plan

assertions:
  - type: llm_judge
    criteria: "Service design blueprint addresses each documented pain point — eliminates redundant data collection, creates private check-in options, adds explanations for data requests, reduces card/document handling, uses plain language forms, personalizes the interaction, and reduces perceived wait time."
    weight: 0.35
    description: "PainPointResolution"
  - type: llm_judge
    criteria: "Waiting room transformation addresses the 2.5/5 satisfaction score — proposes practical improvements (comfortable seating, reduced noise, privacy partitions, estimated wait time displays, self-service kiosks) within the $50K budget; addresses the psychology of waiting."
    weight: 0.35
    description: "WaitingRoomTransformation"
  - type: llm_judge
    criteria: "Staff interaction script transforms intake staff from data collectors to patient welcomers — the first human interaction sets the tone for the entire visit; scripts focus on greeting, explaining the process, offering assistance, and making patients feel valued rather than processed."
    weight: 0.30
    description: "StaffInteractionRedesign"
