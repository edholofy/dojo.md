meta:
  id: health-equity-intake-framework
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Build a health equity-centered intake framework — address SDOH data collection, cultural competency in forms, language access, and disparities in intake completion rates"
  tags: [health-equity, sdoh-collection, cultural-competency, advanced]

state: {}

trigger: |
  Build a health equity-centered intake framework
  that addresses social determinants of health data
  collection, cultural competency in forms, and
  disparities in intake completion rates.

  Organization: Community Care Network
  - FQHC network serving 60,000 patients
  - 8 health centers across urban and rural locations
  - Patient demographics:
    * 45% Hispanic/Latino, 25% Black/African American,
      15% White, 10% Asian/Pacific Islander, 5% Other
    * 55% prefer non-English language for forms
    * 40% below federal poverty level
    * 25% uninsured, 50% Medicaid, 15% Medicare, 10% commercial
    * 30% have limited health literacy (below 6th grade
      reading level)

  Current intake disparities:
  - Pre-visit digital form completion: 62% for English-
    speaking patients, 18% for non-English speaking
  - Average in-office intake time: 15 min (English),
    35 min (non-English)
  - Missing data fields: 8% for White patients,
    22% for patients of color
  - Insurance verification success rate: 85% commercial,
    60% Medicaid, 35% uninsured (sliding scale)
  - Patient satisfaction with intake: 4.1/5 (English),
    2.8/5 (non-English)

  SDOH data collection mandate:
  - CMS requires SDOH screening for Medicare/Medicaid
  - Recommended screening areas: food insecurity, housing
    instability, transportation, interpersonal violence,
    financial strain
  - Must use validated instruments (PRAPARE, AHC-HRSN)
  - Data must be captured as structured Z-codes in EHR
  - Challenge: Patients may distrust SDOH questions
    (fear of reporting, cultural stigma)

  Create:
  1. Health equity intake assessment
  2. Culturally responsive form redesign
  3. SDOH collection strategy with sensitivity protocols
  4. Language access improvement plan
  5. Health literacy-appropriate forms
  6. Disparity reduction metrics and targets
  7. Community engagement strategy

assertions:
  - type: llm_judge
    criteria: "SDOH collection strategy addresses patient trust barriers — explains WHY the information is being collected, assures confidentiality, makes all SDOH questions optional, trains staff in trauma-informed approaches, and avoids framing questions in ways that feel judgmental or invasive."
    weight: 0.35
    description: "SDOHCollectionSensitivity"
  - type: llm_judge
    criteria: "Language access improvement plan closes the 62% vs 18% digital completion gap — proposes multilingual digital forms (not just Spanish), culturally adapted (not just translated) content, video/audio alternatives for low-literacy populations, and community health worker assistance programs."
    weight: 0.35
    description: "LanguageAccessEquity"
  - type: llm_judge
    criteria: "Health literacy-appropriate forms use plain language and visual aids — redesigns forms to 5th-grade reading level, uses pictorial response options where possible, avoids medical jargon, and provides verbal assistance options; addresses the 30% with limited health literacy without stigmatizing them."
    weight: 0.30
    description: "HealthLiteracyDesign"
