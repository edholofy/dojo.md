meta:
  id: interoperability-data-exchange
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Implement interoperable intake data exchange — design FHIR-based patient intake data sharing, health information exchange integration, and cross-system data portability"
  tags: [interoperability, fhir, hie-integration, advanced]

state: {}

trigger: |
  Implement interoperable patient intake data exchange
  for a health system that wants to eliminate redundant
  intake across its network and exchange intake data
  with external providers.

  Organization: Pacific Northwest Health Alliance
  - 4 health systems participating in a regional HIE
  - Combined patient population: 800,000
  - Each system uses different EHRs (Epic, Cerner,
    Meditech, athenahealth)
  - Current state: Patient completing intake at System A
    must re-complete the same forms at System B

  Interoperability goals:
  1. Share patient demographics across the alliance
  2. Share insurance verification results
  3. Share consent and authorization status
  4. Share medication lists and allergy information
  5. Enable patient-directed data portability
  6. Comply with ONC information blocking rules

  Technical standards:
  - FHIR R4 for data exchange
  - US Core Data for Interoperability (USCDI) v3
  - HL7 C-CDA for clinical document exchange
  - SMART on FHIR for patient authorization
  - Direct messaging for secure provider communication

  Challenges:
  - Different EHR data models and field definitions
  - Consent management across state lines (WA, OR, ID)
  - Patient matching without a universal identifier
  - Data quality variations between systems
  - Privacy regulations differ by state
  - Patients must opt-in/opt-out of data sharing

  Create:
  1. Interoperability architecture for intake data
  2. FHIR resource mapping for intake elements
  3. Cross-system patient matching strategy
  4. Consent management framework
  5. Data quality harmonization plan
  6. Patient data portability implementation
  7. Information blocking compliance assessment

assertions:
  - type: llm_judge
    criteria: "FHIR resource mapping covers all intake data elements — maps demographics to FHIR Patient resource, insurance to Coverage, allergies to AllergyIntolerance, medications to MedicationStatement, consents to Consent resource; addresses variations in how each EHR stores these elements."
    weight: 0.35
    description: "FHIRResourceMapping"
  - type: llm_judge
    criteria: "Cross-system patient matching addresses the absence of universal identifiers — proposes probabilistic matching algorithms using demographic data, addresses false positive and false negative rates, and includes a human review process for uncertain matches."
    weight: 0.35
    description: "PatientMatchingStrategy"
  - type: llm_judge
    criteria: "Consent management framework handles multi-state complexity — Washington, Oregon, and Idaho have different consent laws (especially for sensitive information like behavioral health, reproductive health, and SUD); the framework enables granular consent that respects the most restrictive applicable law."
    weight: 0.30
    description: "ConsentFramework"
