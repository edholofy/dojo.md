meta:
  id: intake-data-analytics
  level: 3
  course: patient-intake-form-review
  type: output
  description: "Build an intake data analytics program — analyze intake data patterns to improve operational efficiency, identify revenue opportunities, and enhance patient experience"
  tags: [data-analytics, operational-intelligence, revenue-optimization, advanced]

state: {}

trigger: |
  Build a comprehensive intake data analytics program
  that transforms intake data from an administrative
  byproduct into a strategic asset.

  Organization: National Medical Group
  - 200 providers across 30 locations
  - 500,000 annual patient encounters
  - EHR: Epic with data warehouse
  - Current analytics: Basic operational reports only

  Available data sources:
  - Patient registration data (demographics, insurance)
  - Form completion timestamps and patterns
  - Insurance eligibility verification results
  - Staff performance data (speed, accuracy)
  - Patient satisfaction survey data
  - Claim denial data linked to registration errors
  - Appointment no-show and cancellation data
  - Digital vs. paper form usage patterns

  Analytics capabilities to develop:

  1. Operational analytics:
  - Intake processing time by location/staff/day
  - Form completion rate trends
  - Bottleneck identification in intake workflow
  - Staff workload and capacity planning

  2. Revenue analytics:
  - Registration error correlation with claim denials
  - Insurance verification miss rates and revenue impact
  - Uninsured patient identification and financial counseling
  - Copay collection rates at intake

  3. Patient experience analytics:
  - Wait time patterns related to intake
  - Digital adoption rates and barriers
  - Patient satisfaction drivers in intake process
  - Demographic-specific experience differences

  4. Predictive analytics:
  - Predict no-shows based on intake completion patterns
  - Predict insurance issues before the appointment
  - Identify patients likely to have complex intake needs
  - Forecast intake staffing needs

  Create:
  1. Analytics strategy and roadmap
  2. KPI dashboard design
  3. Predictive model specifications
  4. Revenue impact analysis methodology
  5. Data governance framework
  6. Reporting and visualization plan
  7. Analytics-driven improvement program

assertions:
  - type: llm_judge
    criteria: "KPI dashboard connects intake metrics to business outcomes — doesn't just show form completion rates; links intake accuracy to claim denial rates, links verification success to revenue capture, and links wait times to patient satisfaction scores; each metric has a clear 'so what' connection."
    weight: 0.35
    description: "KPIDashboardDesign"
  - type: llm_judge
    criteria: "Predictive models are grounded in available data — no-show prediction using intake completion patterns is a valid predictor (patients who don't complete pre-visit forms are more likely to no-show); the model specification includes feature selection, training data requirements, and validation methodology."
    weight: 0.35
    description: "PredictiveModelSpecification"
  - type: llm_judge
    criteria: "Revenue impact analysis quantifies the cost of intake errors — connects specific error types (wrong insurance, missing group number, incorrect DOB) to specific denial categories and dollar amounts; creates a business case for intake quality investment."
    weight: 0.30
    description: "RevenueImpactQuantification"
