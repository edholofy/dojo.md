meta:
  id: intake-social-enterprise
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Launch a social enterprise addressing intake barriers for underserved populations — build an organization providing intake navigation, digital access, and advocacy for patients facing registration barriers"
  tags: [social-enterprise, health-equity, intake-barriers, master]

state: {}

trigger: |
  Launch a social enterprise that addresses the
  disproportionate impact of patient intake barriers
  on underserved populations.

  Problem statement:
  Patient intake creates systematic barriers for:
  - Uninsured/underinsured patients who can't navigate
    financial counseling during registration
  - Immigrants who fear providing personal information
  - Patients experiencing homelessness who lack a
    stable address, phone, or ID
  - Elderly patients overwhelmed by digital intake
  - Patients with limited English proficiency
  - Patients with disabilities who can't access
    standard forms

  Evidence of impact:
  - 15% of patients leave without being seen due to
    intake barriers
  - Non-English speakers wait 3x longer during intake
  - 30% of safety-net provider intake time is spent on
    financial counseling
  - Patients without ID face delays averaging 45 minutes
  - Digital-only intake excludes 20% of patients over 65

  Social enterprise concept:
  "AccessBridge" — a B-corp providing:
  1. Community intake navigators stationed at safety-net
     providers
  2. Multilingual, accessible intake technology for
     low-resource settings
  3. Pre-registration assistance for complex populations
  4. Advocacy for intake policy reform
  5. Training for community health workers on intake
     navigation

  Create:
  1. Social enterprise business plan
  2. Community navigator service model
  3. Accessible technology platform design
  4. Funding and sustainability strategy
  5. Impact measurement methodology
  6. Partnership framework (health systems, community orgs)
  7. Scaling strategy (local to national)

assertions:
  - type: llm_judge
    criteria: "Community navigator model addresses root causes — navigators don't just help fill out forms; they help patients obtain ID, connect to insurance enrollment, provide language interpretation, explain privacy protections to fearful patients, and bridge the digital divide."
    weight: 0.35
    description: "NavigatorModel"
  - type: llm_judge
    criteria: "Technology platform is designed for low-resource settings — works on basic smartphones, supports offline completion, offers audio/visual alternatives to text, provides real-time language support, and integrates with common EHRs at safety-net providers."
    weight: 0.35
    description: "LowResourceTechnology"
  - type: llm_judge
    criteria: "Impact measurement connects intake access to health outcomes — tracks not just intake completion rates but downstream metrics (kept appointments, completed treatments, preventive care received) that demonstrate the health impact of removing intake barriers."
    weight: 0.30
    description: "HealthOutcomeImpact"
