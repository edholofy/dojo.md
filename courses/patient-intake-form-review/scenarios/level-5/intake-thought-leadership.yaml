meta:
  id: intake-thought-leadership
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Establish thought leadership in patient access innovation — develop a multi-platform content strategy, keynote addresses, and policy white papers that redefine how healthcare thinks about intake"
  tags: [thought-leadership, patient-access, industry-influence, master]

state: {}

trigger: |
  Establish yourself as the leading voice in patient
  access innovation, redefining how the healthcare
  industry thinks about patient intake.

  Your platform:
  - Chief Innovation Officer for Patient Access at a
    top-5 US health system
  - NAHAM Board Chair and Past President
  - Advisory role to ONC on patient data interoperability
  - TEDx speaker on "The Hidden Crisis in Healthcare's
    Front Door"
  - 20,000 LinkedIn followers in healthcare leadership
  - Regular contributor to NEJM Catalyst

  Core thesis:
  "Patient intake is not an administrative process —
  it's the foundation of clinical quality, health
  equity, and patient engagement. Every error at intake
  compounds through the care journey. Every barrier
  at intake widens health disparities. The future of
  intake is invisible, equitable, and intelligent."

  Speaking engagements confirmed:
  - HIMSS keynote: "The AI-Powered Patient Front Door"
  - NAHAM annual conference: "From Clerks to Clinicians:
    The Evolution of Patient Access"
  - World Patient Safety Summit: "Intake Errors: The
    Silent Threat to Patient Safety"
  - Congressional briefing on patient data access

  Create:
  1. Thought leadership strategic plan
  2. HIMSS keynote outline and key messages
  3. NEJM Catalyst commentary
  4. Congressional briefing talking points
  5. Content calendar (12 months)
  6. Impact measurement framework
  7. Stakeholder engagement strategy

assertions:
  - type: llm_judge
    criteria: "Core thesis reframes intake from administrative to clinical — connects intake quality directly to patient safety (wrong allergies = wrong medications), health equity (language barriers = missed diagnoses), and engagement (first impression = trust); this reframing changes how executives prioritize intake."
    weight: 0.35
    description: "ReframingImpact"
  - type: llm_judge
    criteria: "Congressional briefing addresses policy levers — recommends specific federal actions (ONC interoperability standards for intake data, CMS requirements for intake quality metrics, funding for safety-net provider intake modernization) that legislators can actually implement."
    weight: 0.35
    description: "PolicyRecommendations"
  - type: llm_judge
    criteria: "Impact measurement tracks influence beyond content metrics — measures policy changes influenced, health system practices adopted, industry standard changes, and patient outcome improvements attributable to the thought leadership campaign."
    weight: 0.30
    description: "InfluenceMeasurement"
