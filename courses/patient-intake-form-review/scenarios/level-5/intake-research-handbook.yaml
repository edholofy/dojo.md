meta:
  id: intake-research-handbook
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Edit a comprehensive research handbook on patient registration and access — curate the definitive academic reference covering intake theory, methodology, evidence, and practice"
  tags: [research-handbook, academic-reference, patient-access, master]

state: {}

trigger: |
  Edit a comprehensive research handbook on patient
  registration and access that serves as the definitive
  academic and professional reference.

  Publisher: Springer Healthcare Administration Series
  Role: Editor-in-chief

  Handbook title:
  "The Springer Handbook of Patient Registration and
  Access: Science, Technology, and Equity in Healthcare's
  Front Door"

  Part I — Foundations (5 chapters):
  - History of patient registration in healthcare
  - Information science of patient data collection
  - Human factors in form design and completion
  - Legal and regulatory framework
  - Ethics of patient data collection

  Part II — Systems and Technology (5 chapters):
  - EHR integration and interoperability
  - Digital intake platforms and patient portals
  - AI and machine learning in patient access
  - Biometric identity and verification
  - Patient data portability and ownership

  Part III — Clinical Impact (4 chapters):
  - Intake accuracy and patient safety
  - Registration errors and revenue cycle
  - Intake data quality and clinical decision-making
  - Medication reconciliation at registration

  Part IV — Health Equity (4 chapters):
  - Language access and cultural competency
  - Disability and accessibility
  - Social determinants and intake barriers
  - Digital divide in patient access

  Part V — International Perspectives (3 chapters):
  - Universal patient identifiers (international models)
  - Registration in resource-limited settings
  - Global standards for patient data collection

  Part VI — Practice and Innovation (4 chapters):
  - Best practices in patient access operations
  - Workforce development and certification
  - Future of patient registration
  - Case studies in intake transformation

  Create:
  1. Complete handbook prospectus
  2. Detailed chapter outlines (25 chapters)
  3. Author recruitment strategy
  4. Editorial guidelines
  5. Research methodology appendix
  6. Production timeline

assertions:
  - type: llm_judge
    criteria: "Chapter outlines create a comprehensive reference — each chapter has specific scope, literature review plan, methodology, and contribution; together the 25 chapters cover intake from every angle (clinical, operational, technological, equity, international) with minimal overlap."
    weight: 0.35
    description: "ComprehensiveCoverage"
  - type: llm_judge
    criteria: "Health equity section is not an afterthought — Part IV is given equal weight to technology and clinical impact; the chapters address structural barriers (not individual deficits) and examine how intake systems can be redesigned to reduce rather than reinforce disparities."
    weight: 0.35
    description: "EquityCentrality"
  - type: llm_judge
    criteria: "Handbook fills a genuine academic gap — demonstrates that patient registration is studied fragmentarily across health informatics, health services research, human factors, and health equity journals; no unified reference exists for researchers, practitioners, or students."
    weight: 0.30
    description: "AcademicGap"
