meta:
  id: global-intake-standards
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Develop global patient registration and intake standards — compare international approaches, synthesize best practices, and propose universal standards for patient data collection"
  tags: [global-standards, international-comparison, universal-standards, master]

state: {}

trigger: |
  Develop a global framework for patient registration
  and intake standards by analyzing international
  approaches and synthesizing best practices.

  International systems to analyze:

  United States:
  - Fragmented, provider-specific intake processes
  - No national patient identifier
  - HIPAA privacy framework
  - High administrative burden ($262B annually)

  United Kingdom (NHS):
  - NHS number as universal patient identifier
  - GP-centric registration model
  - Summary Care Record accessible system-wide
  - Challenge: Data quality in centralized system

  Estonia:
  - X-Road digital infrastructure
  - National digital identity for all citizens
  - Fully interoperable health records
  - Patient-controlled data access
  - Model for digital-first nations

  India (Ayushman Bharat Digital Mission):
  - Aadhaar-linked health ID for 1.4B people
  - Ambitious digital health infrastructure
  - Challenge: Digital divide in rural areas
  - Privacy concerns with biometric-linked health data

  Singapore:
  - National Electronic Health Record (NEHR)
  - SingPass digital identity
  - Centralized registration across public healthcare
  - Challenge: Private sector integration

  Kenya (M-TIBA):
  - Mobile-first health platform
  - Digital health wallet for insurance
  - Innovative for low-resource settings
  - Challenge: Scalability and data quality

  Create:
  1. International comparison matrix
  2. Best practices synthesis
  3. Universal patient intake principles
  4. Digital identity framework
  5. Privacy and consent standards
  6. Implementation guide for different resource levels
  7. Research agenda for global intake optimization

assertions:
  - type: llm_judge
    criteria: "International comparison reveals structural insights — Estonia's X-Road and Singapore's NEHR demonstrate that universal patient identifiers and interoperable infrastructure eliminate redundant intake; the US's absence of these creates the $262B administrative burden."
    weight: 0.35
    description: "StructuralInsights"
  - type: llm_judge
    criteria: "Universal principles transcend system-specific contexts — identifies core principles (collect once and share, patient data ownership, privacy by design, accessibility regardless of technology access, clinical safety as non-negotiable) that apply in all healthcare contexts."
    weight: 0.35
    description: "UniversalPrinciples"
  - type: llm_judge
    criteria: "Implementation guide adapts to resource levels — high-resource settings can implement digital identity and interoperable EHR; mid-resource settings can use mobile-first approaches (Kenya model); low-resource settings need paper-compatible systems with digital bridge capabilities."
    weight: 0.30
    description: "ResourceAdaptation"
