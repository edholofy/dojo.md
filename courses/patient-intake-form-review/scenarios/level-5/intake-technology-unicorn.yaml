meta:
  id: intake-technology-unicorn
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Build a venture-scale patient access technology company — develop a platform that makes patient intake invisible through universal identity, AI, and interoperability"
  tags: [technology-unicorn, venture-scale, universal-identity, master]

state: {}

trigger: |
  Build a venture-scale technology company that makes
  patient intake invisible through universal patient
  identity, AI-powered data assembly, and healthcare
  interoperability.

  Company concept: "OneTouch Health"
  Vision: "Register once, access care everywhere."

  Platform strategy:
  OneTouch creates a persistent patient profile that
  follows the patient across all healthcare encounters:
  - Universal patient identity (verified once, trusted
    everywhere)
  - Auto-assembled health profile from multiple sources
  - Pre-populated intake for any provider encounter
  - Real-time insurance verification and benefit check
  - AI-powered clinical data assembly for providers
  - Patient-controlled data sharing

  Market dynamics:
  - TAM: $262B healthcare administrative waste
  - SAM: $15B patient registration and access segment
  - SOM: $1.5B (initial target: multi-provider groups)
  - Competitors: Phreesia, Clearwave, but none solve
    the cross-system identity problem

  Fundraise plan:
  - Seed: $5M (MVP, pilot with 3 health systems)
  - Series A: $30M (scale to 20 health systems)
  - Series B: $100M (payer integrations, national reach)
  - Series C: $250M (international, consumer app)

  Create:
  1. Pitch deck (Series A)
  2. Platform architecture
  3. Universal identity strategy
  4. Go-to-market plan
  5. Competitive moat analysis
  6. Unit economics model
  7. Regulatory navigation strategy
  8. Risk assessment and mitigation

assertions:
  - type: llm_judge
    criteria: "Universal identity strategy solves the US healthcare system's biggest interoperability gap — without a national patient identifier, proposes a privacy-preserving identity layer that enables patient matching across systems; addresses both technical challenges (matching algorithms) and political challenges (privacy concerns)."
    weight: 0.35
    description: "UniversalIdentityStrategy"
  - type: llm_judge
    criteria: "Competitive moat is defensible — network effects (more health systems = more complete patient profiles = more value), data asset (cross-system patient profiles don't exist elsewhere), switching costs (patient identity becomes embedded in clinical workflows), and regulatory complexity as a barrier to entry."
    weight: 0.35
    description: "CompetitiveMoat"
  - type: llm_judge
    criteria: "Regulatory navigation addresses the political minefield — a universal patient identity touches HIPAA, state privacy laws, biometric regulations (BIPA), patient consent, and the decades-old political debate about national patient identifiers; the strategy navigates these constraints without waiting for legislative resolution."
    weight: 0.30
    description: "RegulatoryNavigation"
