meta:
  id: intake-graduate-program
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Design a graduate academic program in patient access management — curriculum, research agenda, and industry partnerships for an emerging healthcare subdiscipline"
  tags: [graduate-program, academic-curriculum, patient-access, master]

state: {}

trigger: |
  Design a graduate-level academic program in patient
  access and registration management, establishing it
  as a recognized subdiscipline within health
  administration.

  University context:
  - School of Public Health at a research university
  - Existing programs: MHA, MPH, Health Informatics
  - CAHME accredited
  - Strong industry partnerships with health systems
  - Research focus: Health services and health equity

  Program concept:
  "Graduate Certificate in Patient Access Innovation"
  — a stackable credential that can also be embedded
  within MHA or Health Informatics degree programs.

  12-credit certificate (can complete in 2 semesters):
  - 4 courses, each 3 credits
  - Online/hybrid for working professionals
  - Capstone: Real-world intake improvement project
  - Target enrollment: 30 students per year

  Rationale:
  - 350,000+ patient access workers with no specialized
    graduate education
  - Digital transformation requires leadership with
    both operational and technical expertise
  - Health equity in patient access is an emerging
    research area
  - AI and interoperability creating new competency needs

  Create:
  1. Certificate curriculum design
  2. Course syllabi for 4 core courses
  3. Faculty expertise requirements
  4. Research agenda for the discipline
  5. Industry partnership framework
  6. Student recruitment strategy
  7. Career outcomes projection
  8. Financial sustainability model

assertions:
  - type: llm_judge
    criteria: "Curriculum integrates operational, technological, and equity dimensions — courses cover intake operations and process improvement, digital health technology for patient access, health equity in registration, and a capstone applying all three; graduates can lead at the intersection of these domains."
    weight: 0.35
    description: "IntegratedCurriculum"
  - type: llm_judge
    criteria: "Research agenda defines patient access as a scholarly field — identifies researchable questions (intake error impact on outcomes, digital intake equity effects, AI accuracy across demographics, optimal intake designs) that produce publishable scholarship and advance practice."
    weight: 0.35
    description: "ScholarlyResearchAgenda"
  - type: llm_judge
    criteria: "Stackable credential design maximizes market appeal — 12-credit certificate is accessible for working professionals; credits count toward MHA if student continues; creates a pipeline for the full degree program; employer tuition support is likely for a focused, practical certificate."
    weight: 0.30
    description: "StackableDesign"
