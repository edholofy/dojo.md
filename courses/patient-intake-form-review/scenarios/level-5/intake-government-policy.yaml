meta:
  id: intake-government-policy
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Develop federal policy for patient registration reform — design legislation, regulatory framework, and national standards for patient access and data collection"
  tags: [government-policy, national-standards, patient-access, master]

state: {}

trigger: |
  Develop comprehensive federal policy for patient
  registration and access reform as a health policy
  advisor to the White House Domestic Policy Council.

  Policy context:
  - Administrative waste consumes $262B annually
  - Patient registration is the #1 source of patient
    frustration in healthcare
  - No federal standards for patient intake processes
  - The national patient identifier debate remains
    politically toxic (Congressional ban since 1998)
  - Interoperability rules (ONC, CMS) address clinical
    data but not registration data specifically
  - Health equity disparities begin at registration

  Policy objectives:
  1. Reduce administrative burden of patient registration
  2. Establish national standards for intake data
  3. Advance patient identity solutions without
     politically toxic "national ID" framing
  4. Ensure equitable access to registration processes
  5. Protect patient privacy in digital registration
  6. Improve data accuracy for patient safety
  7. Enable patient data portability for registration

  Stakeholder positions:
  - Providers (AHA, AMA): Want standardized processes
    and reduced burden
  - Payers (AHIP): Want accurate data, support digital
  - Patients (advocacy): Want simpler processes, privacy
  - Technology vendors: Want interoperability mandates
  - Privacy advocates: Oppose centralized patient data
  - States: Want federal floor, not preemption

  Create:
  1. Policy analysis and options memo
  2. Legislative framework
  3. Regulatory implementation plan
  4. Patient identity strategy (navigating the ban)
  5. Privacy and security framework
  6. Health equity requirements
  7. Cost-benefit analysis
  8. Phase-in timeline

assertions:
  - type: llm_judge
    criteria: "Patient identity strategy navigates the Congressional ban creatively — proposes alternatives to a national patient identifier (voluntary patient-controlled digital identity, federated matching networks, SMART Health links) that achieve the same goal without triggering political opposition."
    weight: 0.35
    description: "IdentityStrategyCreativity"
  - type: llm_judge
    criteria: "Health equity requirements are enforceable — mandates language access, accessibility, and non-discrimination in registration; doesn't just recommend equity but creates reporting requirements, compliance standards, and accountability mechanisms."
    weight: 0.35
    description: "EquityEnforcement"
  - type: llm_judge
    criteria: "Cost-benefit analysis demonstrates that registration reform pays for itself — reduced administrative waste, fewer claim denials, improved patient safety from better data quality, and reduced health disparities all generate measurable savings that exceed implementation costs."
    weight: 0.30
    description: "CostBenefitAnalysis"
