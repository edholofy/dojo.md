meta:
  id: intake-memoir
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Write a professional memoir on patient access advocacy — craft a narrative that humanizes the intake experience and its impact on patients, staff, and healthcare quality"
  tags: [professional-memoir, patient-access, narrative-craft, master]

state: {}

trigger: |
  Write a professional memoir chronicling your career
  in patient access, from front-desk registration
  clerk to national advocate for intake reform.

  Author's career arc:
  - Year 1-3: Front desk registration clerk at a
    community clinic. Watched patients leave without
    care because they couldn't navigate intake. An
    elderly Spanish-speaking woman cried because she
    couldn't understand the forms. You helped her, got
    reprimanded for "taking too long."
  - Year 4-7: Intake supervisor. Saw how intake errors
    affected everything downstream. A patient received
    a blood transfusion with the wrong blood type
    because DOB was entered incorrectly and matched to
    the wrong patient record.
  - Year 8-12: Director of patient access. Led the
    digital transformation. The technology improved
    efficiency but created a new divide — patients
    without smartphones were left behind. You saw equity
    gaps widen even as metrics improved.
  - Year 13-16: VP at a health system. Discovered that
    intake quality predicted clinical outcomes better
    than almost any other administrative function. Started
    publishing research connecting intake to patient safety.
  - Year 17-20: National advocate. Testified before
    Congress about intake barriers. Launched a social
    enterprise for underserved communities. Won NAHAM
    Lifetime Achievement Award. Still visit community
    clinics to watch intake happen — still see the same
    problems you saw as a clerk.

  Key stories:
  1. The woman who cried (and changed your career)
  2. The blood type error (and the system that caused it)
  3. The digital divide (and the grandmother left behind)
  4. The research discovery (intake predicts outcomes)
  5. The congressional testimony (and what didn't change)
  6. The community clinic visit (20 years later)

  Create:
  1. Book structure and chapter outline
  2. Opening chapter (complete draft)
  3. Key narrative threads
  4. Reflection on systemic vs. individual change
  5. Vision chapter outline
  6. Discussion guide for healthcare teams

assertions:
  - type: llm_judge
    criteria: "Opening chapter establishes emotional stakes immediately — the reader understands that patient intake isn't about forms; it's about people being seen, being understood, and being able to access care; the personal voice is authentic and draws readers into the story."
    weight: 0.35
    description: "EmotionalStakes"
  - type: llm_judge
    criteria: "Narrative threads balance personal experience with systemic analysis — uses the blood type error to illuminate system design failures, uses the digital divide to explore equity, and uses the congressional testimony to examine policy limitations; personal stories illuminate systemic truths."
    weight: 0.35
    description: "PersonalSystemicBalance"
  - type: llm_judge
    criteria: "Vision chapter transcends the problems documented — after 20 years of witnessing intake barriers, the author proposes a specific, achievable vision for what patient access should become; the book ends with both honest assessment and pragmatic hope."
    weight: 0.30
    description: "TranscendentVision"
