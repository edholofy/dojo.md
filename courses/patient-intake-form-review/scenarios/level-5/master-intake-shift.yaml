meta:
  id: master-intake-shift
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Master shift simulation — lead a transformational moment in patient access balancing congressional testimony, technology disruption, global standards, and the human cost of registration barriers"
  tags: [shift-simulation, transformational-leadership, paradigm-change, master]

state: {}

trigger: |
  You are at a pivotal moment in patient access
  reform. As the most recognized authority on patient
  intake in healthcare, you face interconnected
  challenges that will define the future.

  MOMENT 1 — White House announcement:
  The President is announcing an Executive Order on
  "Reducing Healthcare Administrative Burden" tomorrow.
  You've been asked to brief the President and recommend
  3 specific actions related to patient registration.
  The EO can direct federal agencies but cannot change
  law. Other advisors are pushing for payment reform
  and clinical documentation reduction — you need to
  make the case that registration reform is equally
  important.

  MOMENT 2 — Technology company acquisition:
  Your patient access startup (built over 5 years) has
  received a $500M acquisition offer from a major EHR
  vendor. The acquisition would integrate your
  technology into their platform (reaching 60% of US
  hospitals) but would mean losing the cross-EHR
  interoperability that makes your platform unique.
  Your investors want to accept. Your team is divided.

  MOMENT 3 — WHO consultation:
  The WHO has asked you to help 5 developing nations
  design patient registration systems as they build
  digital health infrastructure. You must design
  approaches that work without US-level technology
  infrastructure while avoiding the mistakes the US
  system has made.

  MOMENT 4 — Personal reckoning:
  The elderly Spanish-speaking woman from your first
  year as a registration clerk — the one who cried
  because she couldn't understand the forms — died
  last year. Her daughter contacted you. She never
  got the care she needed that day. She avoided
  healthcare after that experience. Her cancer was
  diagnosed late. Her daughter asks: "Has anything
  really changed?"

  Navigate all four moments:
  1. Executive Order recommendations (3 specific actions)
  2. Acquisition decision framework
  3. Developing nation registration design principles
  4. Response to the daughter's question
  5. How these moments connect to your life's work
  6. Legacy statement

assertions:
  - type: llm_judge
    criteria: "Executive Order recommendations are specific, feasible, and impactful — identifies 3 actions that federal agencies can take without legislative change (e.g., ONC standards for registration interoperability, CMS requirements for intake quality metrics, HHS guidance on language access compliance)."
    weight: 0.35
    description: "EORecommendations"
  - type: llm_judge
    criteria: "Acquisition decision engages with genuine strategic tension — the reach of 60% of US hospitals vs. the loss of cross-platform interoperability; the financial security for the team vs. the mission compromise; the analysis examines conditions under which acceptance or rejection better serves the broader patient access mission."
    weight: 0.35
    description: "AcquisitionDecision"
  - type: llm_judge
    criteria: "Response to the daughter's question is honest and human — doesn't claim victory or make excuses; acknowledges that for many patients like her mother, nothing has changed; uses this personal reckoning to fuel continued advocacy while honoring the woman's experience and her daughter's pain."
    weight: 0.30
    description: "PersonalHonesty"
