meta:
  id: intake-existential-challenges
  level: 5
  course: patient-intake-form-review
  type: output
  description: "Address existential challenges to patient intake — navigate the future of registration in an era of universal digital identity, patient data ownership, ambient AI, and the potential elimination of intake"
  tags: [existential-challenges, future-of-intake, paradigm-shift, master]

state: {}

trigger: |
  Address the existential challenges facing patient
  intake as healthcare undergoes fundamental digital
  transformation.

  Challenge 1 — Universal digital identity:
  If every person has a verified digital identity
  (government-issued, biometric-linked), should patient
  intake exist at all? The person walks into a clinic,
  their identity is verified automatically, their
  records are pulled from a universal health record,
  and their insurance is confirmed in real-time. What
  role remains for intake?

  Challenge 2 — Patient data ownership:
  The movement toward patient-owned health data (SMART
  Health Cards, Apple Health Records, patient-controlled
  FHIR data) means patients could carry their complete
  medical record on their phone. Why should they fill
  out forms that ask for information they've already
  provided? When patients own their data, who is
  responsible for accuracy?

  Challenge 3 — Ambient AI documentation:
  AI systems that can listen to a patient conversation
  and automatically extract demographics, symptoms,
  medications, and allergies from natural conversation
  could eliminate forms entirely. The "intake" happens
  through the clinical encounter itself. But what about
  consent, privacy, and the legal requirements for
  signed documentation?

  Challenge 4 — Healthcare as a subscription:
  Concierge medicine, direct primary care, and
  subscription-based healthcare models eliminate
  insurance verification and many administrative
  intake steps. If healthcare moves toward subscription
  models, traditional intake becomes largely obsolete.

  Challenge 5 — Predictive pre-registration:
  AI that predicts when a person will need healthcare
  (based on wearable data, genomics, social determinants)
  could pre-register patients before they even know
  they need care. The "intake" happens before the
  patient arrives, based on predicted need.

  Create:
  1. Futures analysis for each challenge
  2. Scenario planning (3 future states at 10 years)
  3. Transition roadmap from current to future state
  4. Workforce impact analysis
  5. Ethical and privacy framework
  6. Policy recommendations
  7. Investment implications for intake technology

assertions:
  - type: llm_judge
    criteria: "Futures analysis honestly confronts the possibility that intake may become invisible — doesn't defensively protect current processes; examines scenarios where registration happens passively through digital identity, AI ambient capture, and patient-owned data portability."
    weight: 0.35
    description: "HonestFuturesAnalysis"
  - type: llm_judge
    criteria: "Patient data ownership challenge is addressed substantively — when patients own and control their health data, the paradigm shifts from 'collect information from patients' to 'receive information from patients'; addresses accuracy responsibility, consent management, and the end of redundant data collection."
    weight: 0.35
    description: "DataOwnershipResponse"
  - type: llm_judge
    criteria: "Workforce impact analysis provides constructive pathways — the 350,000+ patient access workers face significant disruption; identifies transferable skills (patient navigation, care coordination, health equity advocacy, AI oversight) and proposes transition support."
    weight: 0.30
    description: "WorkforceTransition"
