meta:
  id: multilingual-intake-assistance
  level: 1
  course: patient-intake-form-review
  type: output
  description: "Assist with intake form completion for patients with limited English proficiency — navigate language access requirements, interpreter services, and culturally sensitive communication"
  tags: [multilingual, language-access, interpreter-services, beginner]

state: {}

trigger: |
  Assist with intake form completion for patients
  with limited English proficiency. The practice
  serves a diverse community with significant
  non-English speaking populations.

  Situation 1:
  Patient: Mrs. Yuki Tanaka, age 73
  Language: Japanese (limited English)
  Accompaniment: Adult daughter (bilingual)
  Issue: Daughter completed all intake forms on behalf
  of mother, including signing the HIPAA authorization.
  Front desk accepted the forms without question.

  Situation 2:
  Patient: Mr. Ahmed Hassan, age 45
  Language: Arabic (no English)
  Accompaniment: Alone
  Issue: Patient was given English-only intake forms.
  He wrote responses in Arabic script in some fields
  and left others blank. He appears confused and
  uncomfortable. No Arabic interpreter is available
  on-site today.

  Situation 3:
  Patient: Mrs. Rosa Gutierrez, age 58
  Language: Spanish (basic English)
  Accompaniment: 12-year-old grandson (bilingual)
  Issue: Staff asked the grandson to interpret for
  grandmother while completing medical history form
  that includes questions about depression, domestic
  violence screening, and sexual health.

  Create:
  1. Assessment of language access compliance for each
  2. Correct procedure for each situation
  3. Language access policy recommendations
  4. Staff training points
  5. Resource list for interpreter services

assertions:
  - type: llm_judge
    criteria: "Identifies that using a minor as an interpreter for sensitive medical information is inappropriate — Situation 3's use of a 12-year-old grandson to interpret depression, domestic violence, and sexual health questions violates best practices and potentially regulations; the patient cannot provide honest answers through a family minor."
    weight: 0.35
    description: "MinorInterpreterIssue"
  - type: llm_judge
    criteria: "Addresses daughter signing on mother's behalf — in Situation 1, the patient should sign her own HIPAA forms (daughter can interpret the content but cannot substitute her signature unless she has legal authority); also raises question of whether the patient's own medical information was accurately conveyed through the daughter."
    weight: 0.35
    description: "SignatureAuthorityIssue"
  - type: llm_judge
    criteria: "Provides actionable solutions for Situation 2 — telephone interpreter services, video remote interpretation, rescheduling with an Arabic interpreter, or certified translation of forms are all viable options; leaving the patient confused and unassisted is a compliance violation under ACA Section 1557."
    weight: 0.30
    description: "InterpreterSolutions"
