meta:
  id: intake-behavioral-science
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Apply behavioral science to patient intake — analyze cognitive biases in form completion, design nudges for accuracy, and optimize the psychology of the intake experience"
  tags: [behavioral-science, cognitive-bias, nudge-design, expert]

state: {}

trigger: |
  Apply behavioral science principles to understand
  and improve patient intake behavior, form completion
  quality, and staff accuracy.

  Research context:
  You are a behavioral scientist embedded in a health
  system's patient experience innovation lab.

  Observed behavioral patterns:

  Patient-side behaviors:
  - Satisficing: Patients select "the first good enough"
    answer rather than the most accurate one (e.g.,
    checking "No" on all medical history questions to
    finish faster)
  - Social desirability bias: Patients underreport
    substance use, mental health symptoms, and non-
    adherence to medications on intake forms
  - Choice overload: Patients faced with 20+ pages of
    forms experience decision fatigue and accuracy drops
    significantly after page 8
  - Anchoring: Patients anchor to their previous form
    responses even when information has changed

  Staff-side behaviors:
  - Automation complacency: Staff reviewing auto-populated
    forms miss errors at higher rates than staff entering
    data manually
  - Confirmation bias: Staff assume returning patients'
    information is correct without verifying
  - Batch processing shortcuts: During high-volume periods,
    staff skip verification steps to reduce wait times
  - Authority deference: Staff don't question information
    from referring providers even when inconsistent

  System-level dynamics:
  - Default effect: Whatever is pre-filled as default
    is rarely changed (even if wrong)
  - Status quo bias: Organizations resist changing
    "the way we've always done intake"
  - Sunk cost fallacy: Organizations continue using
    expensive intake systems that don't work because of
    prior investment

  Create:
  1. Behavioral analysis of intake decision-making
  2. Patient-side nudge interventions
  3. Staff-side debiasing strategies
  4. Form design applying behavioral principles
  5. Measurement methodology for intervention impact
  6. Ethical considerations framework
  7. Implementation pilot design

assertions:
  - type: llm_judge
    criteria: "Patient-side nudges address satisficing and social desirability — designs forms that reduce satisficing (progress indicators, importance framing for key questions, varied response formats) and social desirability bias (normalizing language, indirect questioning, computer-administered sensitive screens)."
    weight: 0.35
    description: "PatientNudgeDesign"
  - type: llm_judge
    criteria: "Staff debiasing strategies address automation complacency — when auto-populated data reduces manual effort, staff vigilance drops; proposes attention-directing interventions (highlighting changed fields, requiring active confirmation of critical data, random verification audits)."
    weight: 0.35
    description: "StaffDebiasingStrategies"
  - type: llm_judge
    criteria: "Form design applies behavioral principles systematically — uses progressive disclosure to reduce choice overload, strategic question ordering (easy to hard, non-sensitive to sensitive), default management (no pre-filled defaults for medication allergies), and commitment devices."
    weight: 0.30
    description: "BehavioralFormDesign"
