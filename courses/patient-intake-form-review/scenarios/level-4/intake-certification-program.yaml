meta:
  id: intake-certification-program
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Design a professional certification for patient access specialists — competency frameworks, assessment methods, and career pathways for intake professionals"
  tags: [certification-program, professional-development, competency-framework, expert]

state: {}

trigger: |
  Design a professional certification program for
  patient access and intake specialists that builds
  on the existing CHAM (Certified Healthcare Access
  Manager) credential to create a comprehensive
  certification pathway.

  Context:
  - NAHAM (National Association of Healthcare Access
    Management) sponsors the existing CHAM certification
  - CHAM focuses on management-level competencies
  - No certification exists for frontline intake staff
  - High turnover in intake positions (40% annually)
  - Increasing complexity of intake (digital, regulatory,
    AI, health equity)
  - 350,000+ patient access workers nationally

  Proposed certification tiers:
  1. Certified Patient Access Specialist (CPAS) — entry
     * Registration, insurance verification, consent
  2. Certified Patient Access Professional (CPAP) — mid
     * Complex insurance, specialty intake, compliance
  3. CHAM — advanced (existing, enhanced)
     * Management, operations, strategic planning

  Design elements needed:
  - Competency framework for each tier
  - Examination design and question types
  - Experience and education prerequisites
  - Continuing education requirements
  - Recertification process
  - Employer incentive programs
  - Career pathway mapping
  - Study materials and preparation resources

  Create:
  1. Three-tier competency framework
  2. Examination blueprint for CPAS and CPAP
  3. Preparation curriculum
  4. Continuing education program
  5. Employer value proposition
  6. Career pathway with salary benchmarks
  7. Launch and adoption strategy

assertions:
  - type: llm_judge
    criteria: "Competency framework reflects evolving intake complexity — CPAS covers core registration and verification; CPAP adds digital intake systems, regulatory compliance, complex insurance, and patient experience; CHAM adds strategic planning, AI oversight, and organizational leadership."
    weight: 0.35
    description: "CompetencyEvolution"
  - type: llm_judge
    criteria: "Examination includes scenario-based assessment — not just multiple choice knowledge tests; CPAS candidates process mock registrations, CPAP candidates navigate complex insurance scenarios, and both tiers are evaluated on accuracy, efficiency, and patient interaction quality."
    weight: 0.35
    description: "ScenarioBasedAssessment"
  - type: llm_judge
    criteria: "Career pathway addresses the 40% turnover problem — certification creates professional identity, salary differentiation (15-25% premium for certified staff), advancement opportunities, and recognition; employers who support certification see reduced turnover."
    weight: 0.30
    description: "TurnoverReduction"
