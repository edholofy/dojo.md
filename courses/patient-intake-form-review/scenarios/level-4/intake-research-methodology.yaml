meta:
  id: intake-research-methodology
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Design a research study on intake processes and patient outcomes — develop methodology to measure how intake quality affects clinical outcomes, patient experience, and health equity"
  tags: [research-methodology, clinical-outcomes, health-equity, expert]

state: {}

trigger: |
  Design a comprehensive research study examining how
  patient intake quality affects downstream clinical
  outcomes, patient experience, and health equity.

  Research context:
  - Sponsor: AHRQ (Agency for Healthcare Research and Quality)
  - Funding: $500K, 24-month study
  - Investigator: Principal investigator at a research
    university health policy center
  - IRB approval: Required

  Research questions:
  1. Primary: Does intake data accuracy affect clinical
     outcomes (medication errors, missed diagnoses,
     delayed treatment)?
  2. Secondary: Do intake process disparities (by race,
     language, insurance type) correlate with disparities
     in care quality and outcomes?
  3. Secondary: What is the financial impact of intake
     errors across the revenue cycle?
  4. Exploratory: Does AI-assisted intake improve both
     efficiency and equity compared to manual intake?

  Available data sources:
  - EHR data from 5 health systems (partnership)
  - Patient safety event reports
  - Claims data (commercial and Medicare)
  - Patient satisfaction surveys (CAHPS)
  - Intake process observation data (new collection)
  - Staff interviews and focus groups

  Methodological considerations:
  - Mixed methods (quantitative and qualitative)
  - Retrospective chart review for outcome analysis
  - Prospective observation for process measurement
  - Propensity score matching for AI vs. manual comparison
  - Disparities analysis with intersectional framework

  Create:
  1. Study protocol with methodology
  2. IRB application narrative
  3. Data collection and management plan
  4. Statistical analysis plan
  5. Health equity analysis framework
  6. Publication strategy
  7. Policy recommendations development

assertions:
  - type: llm_judge
    criteria: "Study methodology establishes causal links — connecting intake errors to clinical outcomes requires controlling for confounders (disease severity, provider quality, care setting); the design uses appropriate methods (propensity matching, regression with clinical severity controls) to isolate intake quality effects."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "Health equity analysis uses an intersectional framework — examines intake disparities not just by race OR language OR insurance type, but at the intersection (e.g., Spanish-speaking Medicaid patients in rural settings may face compounded barriers compared to any single factor analysis)."
    weight: 0.35
    description: "IntersectionalEquityAnalysis"
  - type: llm_judge
    criteria: "Policy recommendations are grounded in study findings — translates research results into actionable recommendations for CMS, state regulators, accreditation bodies, and healthcare organizations; connects evidence to specific policy levers."
    weight: 0.30
    description: "PolicyRecommendations"
