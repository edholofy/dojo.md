meta:
  id: intake-book-proposal
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Write a book proposal on reimagining patient intake — develop a comprehensive treatment of how intake shapes the patient experience, clinical quality, and organizational performance"
  tags: [book-proposal, patient-access, thought-leadership, expert]

state: {}

trigger: |
  Write a book proposal for a healthcare publisher
  on reimagining patient intake as the foundation
  of healthcare quality.

  Author qualifications:
  - 20 years in patient access operations
  - Former VP of Patient Access at a top academic
    medical center
  - Led the first fully AI-powered intake implementation
    at a major health system
  - Published 12 peer-reviewed articles on intake
    quality and patient experience
  - President of NAHAM (National Association of
    Healthcare Access Management)
  - Keynote speaker at HFMA, NAHAM, ACHE conferences

  Book concept:
  Title: "First Impressions: How Patient Intake Shapes
  Healthcare Quality, Equity, and Experience"

  The book argues that patient intake — often dismissed
  as a clerical function — is actually the foundation
  of healthcare quality, and that reimagining intake
  can transform clinical outcomes, patient experience,
  health equity, and organizational performance.

  Key themes:
  1. Intake errors cascade into clinical harm
  2. The intake experience predicts patient engagement
  3. Intake data quality drives revenue cycle performance
  4. Digital transformation requires human-centered design
  5. Health equity starts at registration
  6. AI can augment (not replace) the human touch
  7. The future of intake is invisible

  Create:
  1. Complete book proposal (publisher-ready)
  2. Chapter outline with summaries
  3. Sample chapter (opening or key chapter)
  4. Market analysis and competitive positioning
  5. Author platform and promotion plan
  6. Delivery timeline

assertions:
  - type: llm_judge
    criteria: "Chapter outline builds a compelling argument arc — opens with intake's hidden impact on healthcare quality, moves through specific domains (clinical safety, patient experience, revenue, equity), and culminates in a vision for the future where intake is seamless and invisible."
    weight: 0.35
    description: "ArgumentArc"
  - type: llm_judge
    criteria: "Sample chapter demonstrates the book's unique perspective — connects a seemingly mundane process (patient registration) to life-and-death outcomes (medication errors from wrong allergy data, missed diagnoses from incomplete history); makes the reader see intake differently."
    weight: 0.35
    description: "UniquePerspecive"
  - type: llm_judge
    criteria: "Market analysis identifies the audience and gap — healthcare executives, patient access directors, health IT professionals, and quality leaders are the primary audience; no existing book treats intake as a strategic function rather than an operational procedure."
    weight: 0.30
    description: "MarketGap"
