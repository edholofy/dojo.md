meta:
  id: intake-governance-framework
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Design organizational governance for intake operations — executive oversight, form management committees, performance accountability, and strategic alignment"
  tags: [governance-framework, executive-oversight, form-management, expert]

state: {}

trigger: |
  Design a comprehensive governance framework for
  patient intake operations within a large health
  system that elevates intake from a clerical function
  to a strategically managed capability.

  Organization: National Health Alliance
  - 12 hospitals, 50 ambulatory sites
  - 900 providers, 25 specialties
  - Annual encounters: 2.5 million
  - Intake staff: 120 FTEs across locations
  - Current reporting: Intake reports to local site
    managers (no system-level oversight)
  - Annual impact of intake errors: $12M in claim denials,
    $3M in compliance risk

  Governance gaps:
  - No executive ownership of intake performance
  - 85 different form versions across the system
  - No standardized intake policies
  - No form change management process
  - No patient feedback integration
  - No connection between intake quality and clinical outcomes
  - No data-driven decision-making for intake operations

  Create:
  1. Governance structure and committee charters
  2. Form management lifecycle process
  3. Executive dashboard and reporting
  4. Performance accountability framework
  5. Patient advisory integration
  6. Form standardization and version control
  7. Quality metrics and benchmarking
  8. Annual governance calendar

assertions:
  - type: llm_judge
    criteria: "Form management lifecycle addresses the 85-version problem — establishes a centralized form library with version control, approval workflows for new/modified forms, sunset processes for outdated forms, and regulatory compliance review before any form goes live."
    weight: 0.35
    description: "FormManagementLifecycle"
  - type: llm_judge
    criteria: "Governance structure creates accountability without bureaucracy — defines who owns intake performance at the system level, who approves form changes, who monitors compliance, and who responds to patient feedback; cross-functional representation ensures clinical, operational, legal, and IT perspectives."
    weight: 0.35
    description: "GovernanceAccountability"
  - type: llm_judge
    criteria: "Patient advisory integration gives patients a voice in form design — includes patient representatives in form review, conducts usability testing with diverse patient populations, and uses patient satisfaction data to drive intake improvements."
    weight: 0.30
    description: "PatientAdvisory"
