meta:
  id: intake-consulting-practice
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Build a consulting practice specializing in patient intake transformation — develop service offerings, client engagement methodologies, and ROI demonstration for healthcare intake optimization"
  tags: [consulting-practice, intake-transformation, revenue-impact, expert]

state: {}

trigger: |
  Build a consulting practice specializing in patient
  intake transformation for healthcare organizations.

  Consultant profile:
  - 18 years in healthcare operations and revenue cycle
  - Former Chief Patient Access Officer at a 10-hospital system
  - Led digital intake transformation recovering $6M annually
  - Published research on intake error impact on revenue
  - Certified in LEAN and Six Sigma
  - CHAM (Certified Healthcare Access Manager) credential

  Market opportunity:
  - US healthcare loses $262B annually to billing errors,
    with intake errors contributing to 30% of claim denials
  - Average practice spends $28 per intake transaction
  - Digital intake market growing 25% annually
  - Most practices lack specialized intake expertise
  - Regulatory complexity (HIPAA, ADA, state laws) creates
    compliance demand

  Target clients:
  - Mid-size medical groups (20-100 providers)
  - Community hospitals (100-300 beds)
  - FQHCs seeking grant-funded improvement
  - Health systems post-EHR implementation

  Service areas:
  1. Intake operations assessment and benchmarking
  2. Digital transformation advisory
  3. Compliance audit and remediation
  4. Revenue recovery through intake optimization
  5. Patient experience improvement
  6. Staff training and competency development
  7. EHR optimization for intake workflows

  Create:
  1. Business plan with service offerings
  2. Client engagement methodology
  3. ROI demonstration framework
  4. Pricing strategy and revenue model
  5. Marketing and thought leadership plan
  6. Case study portfolio development
  7. Scalability strategy

assertions:
  - type: llm_judge
    criteria: "ROI demonstration framework quantifies intake optimization value — connects error rate reduction to claim denial reduction to revenue recovery; shows that reducing intake errors from 12% to 3% can recover 2-4% of net revenue; makes a compelling financial case for the consulting engagement."
    weight: 0.35
    description: "ROIDemonstration"
  - type: llm_judge
    criteria: "Service offerings are productized with clear deliverables — each offering has defined scope, methodology, timeline, and measurable outcomes; a 'Digital Intake Assessment' is a 4-week engagement producing a specific report with ROI projections, not an open-ended consulting relationship."
    weight: 0.35
    description: "ProductizedServices"
  - type: llm_judge
    criteria: "Marketing strategy positions the consultant as the intake specialist — leverages the $262B billing error statistic, intake's role in first impressions, and the regulatory compliance angle; targets healthcare conferences (NAHAM, HFMA) and industry publications."
    weight: 0.30
    description: "MarketingPositioning"
