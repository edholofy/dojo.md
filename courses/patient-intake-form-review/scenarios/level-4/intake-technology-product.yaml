meta:
  id: intake-technology-product
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Design a next-generation patient intake platform — create a SaaS product combining AI, biometric verification, universal patient identity, and seamless EHR integration"
  tags: [technology-product, saas-platform, product-design, expert]

state: {}

trigger: |
  Design a next-generation patient intake platform
  that reimagines the entire intake experience through
  technology innovation.

  Product vision:
  "Complete patient intake before the patient arrives,
  with zero manual data entry and 100% accuracy."

  Core capabilities:
  1. Universal patient identity — biometric verification,
     cross-system patient matching, one-time registration
  2. Intelligent auto-population — pull data from insurance
     databases, pharmacy records, prior provider systems
  3. Conversational intake — AI chatbot guides patients
     through intake via natural conversation (text/voice)
  4. Real-time verification — insurance eligibility,
     identity, and benefits confirmed instantly
  5. Smart consent management — regulatory-compliant
     consent tracking across jurisdictions
  6. Provider preparation — pre-visit clinical summaries
     assembled from intake data

  Target market:
  - Primary: Multi-specialty practices (10-100 providers)
  - Secondary: Health systems (100-500 providers)
  - TAM: 300,000 practices, $4B addressable market

  Technical decisions needed:
  - Biometric approach (facial recognition, fingerprint,
     palm vein, behavioral biometrics)
  - AI model architecture for conversational intake
  - Integration strategy (Epic, Cerner, athenahealth)
  - HIPAA compliance for biometric data storage
  - Multi-tenant vs. single-tenant architecture

  Business model:
  - SaaS subscription per provider per month
  - Transaction fees for verification services
  - Implementation and onboarding fees

  Create:
  1. Product requirements document
  2. Technical architecture
  3. AI conversational intake design
  4. Biometric identity strategy with privacy framework
  5. Go-to-market strategy
  6. Pricing model with unit economics
  7. Product roadmap (18 months)
  8. Competitive differentiation

assertions:
  - type: llm_judge
    criteria: "Conversational AI intake design addresses diverse patient interactions — handles patients who provide vague medication descriptions, patients with complex medical histories, patients who need questions explained, and patients who prefer different languages; the AI adapts complexity to the patient."
    weight: 0.35
    description: "ConversationalAIDesign"
  - type: llm_judge
    criteria: "Biometric identity strategy addresses BIPA and state privacy laws — Illinois BIPA, Texas CUBI, and Washington biometric laws impose strict consent and storage requirements; the strategy includes state-by-state compliance, alternative identification for patients who decline biometrics, and data minimization."
    weight: 0.35
    description: "BiometricPrivacyStrategy"
  - type: llm_judge
    criteria: "Unit economics demonstrate viability — per-provider pricing reflects the value (reduction from $28 to projected $8-12 per intake transaction, plus revenue recovery from reduced claim denials); customer acquisition cost and lifetime value analysis shows sustainable growth."
    weight: 0.30
    description: "UnitEconomicsViability"
