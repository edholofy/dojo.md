meta:
  id: intake-knowledge-graph
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Build a patient intake knowledge graph — design a structured knowledge system capturing form requirements, regulatory rules, payer specifications, and best practices for intelligent intake management"
  tags: [knowledge-graph, structured-knowledge, intelligent-intake, expert]

state: {}

trigger: |
  Design a knowledge graph for patient intake that
  captures the complex relationships between form
  requirements, regulatory rules, payer specifications,
  specialty needs, and patient characteristics to
  power intelligent intake management.

  Purpose:
  The knowledge graph powers a system that automatically
  determines exactly which forms, questions, and
  verifications are needed for a specific patient
  visit — eliminating both over-collection (unnecessary
  questions) and under-collection (missing critical data).

  Knowledge domains:

  1. Regulatory domain:
  - Federal requirements (HIPAA, ADA, CMS, ONC)
  - State-specific laws (50 states + DC)
  - Accreditation standards (Joint Commission, NCQA)
  - Payer-specific documentation requirements
  - Consent requirements by service type

  2. Clinical domain:
  - Specialty-specific intake requirements
  - Condition-specific screening tools
  - Medication reconciliation requirements
  - Clinical risk indicators from intake data
  - Preventive care screening triggers

  3. Operational domain:
  - Visit type to form mapping
  - New vs. returning patient requirements
  - Update frequency rules by data type
  - Digital vs. paper form availability
  - Language and accessibility requirements

  4. Patient domain:
  - Demographics affecting form requirements
  - Insurance type determining verification steps
  - Age-specific requirements (pediatric, geriatric)
  - Disability accommodations
  - Language preferences

  Scale:
  - 50 state jurisdictions + federal
  - 200+ medical specialties
  - 500+ insurance plans
  - 100+ visit types
  - 1,000+ form elements

  Create:
  1. Knowledge graph schema design
  2. Entity and relationship taxonomy
  3. Query patterns for dynamic form generation
  4. Data sourcing and maintenance strategy
  5. Integration with EHR and intake systems
  6. Validation methodology
  7. Change management for regulatory updates

assertions:
  - type: llm_judge
    criteria: "Query patterns enable dynamic form generation — given a specific patient (demographics, insurance, language), visit type (new vs return, specialty), and location (state), the graph returns exactly which form elements are needed, which can be pre-populated, and which require active patient input."
    weight: 0.35
    description: "DynamicFormGeneration"
  - type: llm_judge
    criteria: "Knowledge graph schema captures the multi-dimensional relationships — a consent requirement depends on state + service type + patient age + insurance type; a screening tool depends on specialty + patient demographics + visit reason; the schema models these intersections as traversable relationships."
    weight: 0.35
    description: "SchemaRelationships"
  - type: llm_judge
    criteria: "Maintenance strategy handles regulatory velocity — state laws change regularly, payer requirements update annually, accreditation standards revise periodically; the strategy includes monitoring sources, change assessment, and graph updates with version control and audit trails."
    weight: 0.30
    description: "MaintenanceStrategy"
