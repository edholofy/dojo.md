meta:
  id: expert-intake-shift
  level: 4
  course: patient-intake-form-review
  type: output
  description: "Expert shift simulation — navigate organizational intake challenges including a data breach, vendor evaluation, board presentation on intake ROI, and a patient safety incident linked to intake error"
  tags: [shift-simulation, organizational-challenges, strategic-leadership, expert]

state: {}

trigger: |
  You are the Chief Patient Access Officer for a
  national health system. Today demands expert-level
  strategic leadership.

  CHALLENGE 1 — Patient safety incident:
  A patient received the wrong medication in the
  hospital because their allergy to sulfa drugs was
  not captured during intake. The intake form shows
  "NKDA" (no known drug allergies) but the patient
  insists they reported the allergy. Investigation
  reveals the intake was done during a system downtime
  on paper forms, and the allergy field was transcribed
  incorrectly during reconciliation. The patient
  required ICU admission. Legal has been notified.

  CHALLENGE 2 — Data breach notification:
  Your intake vendor (cloud-based digital forms platform)
  notified you of a potential data breach affecting
  patient registration data. Approximately 15,000
  patient records may be exposed including names, DOBs,
  SSNs, and insurance information. You must assess
  the scope, notify affected patients (HIPAA breach
  notification rule), and manage public communication.

  CHALLENGE 3 — Board presentation:
  The CFO has asked you to present a $1.5M intake
  technology investment proposal to the board of
  directors tomorrow. The system promises to reduce
  intake errors by 80% and recover $4M in annual
  claim denials. The board chair is skeptical about
  technology investments after a failed ERP project.

  CHALLENGE 4 — Union grievance:
  The intake staff union has filed a grievance over
  the introduction of AI-powered intake tools, claiming
  management is replacing human workers with automation
  without following the collective bargaining agreement.
  15 positions are proposed for role transformation
  (not elimination). Union leadership wants a meeting.

  Address all four challenges:
  1. Patient safety incident response and prevention plan
  2. Data breach response protocol
  3. Board presentation strategy
  4. Union engagement approach
  5. Resource allocation across priorities
  6. Executive communication plan

assertions:
  - type: llm_judge
    criteria: "Patient safety incident response addresses both the immediate case and systemic failure — manages the clinical response, conducts root cause analysis of the downtime reconciliation process, implements safeguards (mandatory allergy verification post-downtime, dual-check for high-risk fields), and prepares for potential litigation."
    weight: 0.35
    description: "PatientSafetyResponse"
  - type: llm_judge
    criteria: "Data breach response follows HIPAA breach notification timeline — identifies that 15,000 records exceeds the 500-patient threshold requiring HHS notification within 60 days and media notification; outlines the investigation, patient notification letters, credit monitoring offering, and vendor accountability."
    weight: 0.35
    description: "BreachResponseCompliance"
  - type: llm_judge
    criteria: "Union engagement treats the grievance as a partnership opportunity — acknowledges legitimate concerns about job displacement, proposes transparent role transformation plans, offers retraining and upskilling programs, and involves union representatives in the AI implementation planning."
    weight: 0.30
    description: "UnionEngagement"
