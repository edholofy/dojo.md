meta:
  id: regulatory-form-update
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Manage regulatory-driven intake form updates — implement form changes required by new HIPAA regulations, state law changes, CMS requirements, and accreditation standards"
  tags: [regulatory-update, form-revision, compliance-changes, intermediate]

state: {}

trigger: |
  Manage intake form updates required by multiple
  simultaneous regulatory changes affecting a
  healthcare practice.

  Practice: Lakeview Medical Group
  - 20 providers, multi-specialty
  - Operating in Illinois
  - Currently uses forms last updated 18 months ago
  - Mix of paper and digital forms

  Regulatory changes requiring form updates:

  Change 1 — Updated HIPAA Privacy Rule:
  New rule requires more granular patient consent for
  sharing information related to substance use disorder
  (aligning 42 CFR Part 2 with HIPAA). Practice must
  update authorization forms to include specific SUD
  consent provisions.
  Deadline: 60 days

  Change 2 — Illinois state law (PA 103-0456):
  New state law requires healthcare providers to collect
  and document patient's preferred language, interpreter
  needs, and communication preferences on intake forms.
  Must offer forms in top 5 languages spoken in the
  service area.
  Deadline: 90 days

  Change 3 — CMS Medicare requirements:
  Updated Medicare enrollment verification requirements
  for managed care plans. Additional data fields needed
  for Medicare Advantage patients including plan type,
  supplemental coverage, and Part D enrollment status.
  Deadline: 45 days

  Change 4 — Joint Commission accreditation:
  Upcoming survey requires documentation of patient
  education on advance directives during intake. Forms
  must include advance directive inquiry and documentation
  of whether patient has a living will or healthcare POA.
  Deadline: 30 days (survey scheduled)

  Create:
  1. Regulatory change impact assessment
  2. Form revision plan with prioritized timeline
  3. Updated form templates (outlines for each change)
  4. Staff training on form changes
  5. Patient communication about new requirements
  6. Compliance verification checklist
  7. Ongoing regulatory monitoring process

assertions:
  - type: llm_judge
    criteria: "Prioritized timeline addresses the Joint Commission deadline first — the 30-day survey deadline is the most urgent and failure has immediate accreditation consequences; CMS changes (45 days) are next; the timeline sequences work to meet all deadlines without overwhelming staff."
    weight: 0.35
    description: "TimelinePrioritization"
  - type: llm_judge
    criteria: "SUD consent changes are implemented correctly — the 42 CFR Part 2 alignment with HIPAA still requires specific patient authorization for SUD information sharing; the updated authorization form distinguishes between general health information sharing and SUD-specific sharing with appropriate consent language."
    weight: 0.35
    description: "SUDConsentCompliance"
  - type: llm_judge
    criteria: "Language access requirements go beyond form translation — identifies the top 5 languages in the service area, plans translated forms, and integrates language preference data into the EHR for future visit preparation; addresses how to serve patients whose language isn't in the top 5."
    weight: 0.30
    description: "LanguageAccessImplementation"
