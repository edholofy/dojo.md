meta:
  id: specialty-specific-intake-design
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Design specialty-specific intake forms and review processes — tailor intake workflows for different medical specialties with unique documentation requirements"
  tags: [specialty-intake, form-design, clinical-requirements, intermediate]

state: {}

trigger: |
  Design specialty-specific intake forms and review
  processes for a multi-specialty medical group that
  currently uses one generic intake form for all
  departments.

  Organization: Metro Medical Associates
  - Specialties needing customized intake:
    1. Orthopedics
    2. Behavioral health (psychiatry and psychology)
    3. OB/GYN
    4. Pediatrics

  Current problem:
  The single generic form either:
  - Asks irrelevant questions for the specialty (OB/GYN
    patients answering orthopedic injury questions)
  - Misses critical specialty-specific information
    (behavioral health patients not screened for suicidality)
  - Uses inappropriate language for the population
    (adult medical terminology on pediatric forms)

  Requirements for each specialty:

  Orthopedics: Injury mechanism, pain assessment, prior
  imaging, functional limitations, work/sports status,
  workers' comp screening

  Behavioral health: PHQ-9/GAD-7 screening, medication
  history (psychiatric), substance use assessment,
  safety screening (suicidal/homicidal ideation),
  therapy history, confidentiality explanation

  OB/GYN: Menstrual history, pregnancy history (GTPAL),
  contraception, STI screening, last pap/mammogram,
  domestic violence screening, genetic history

  Pediatrics: Growth/developmental milestones, vaccination
  records, school performance, guardian information,
  pediatric medication dosing, allergy details with
  reaction types

  Create:
  1. Specialty-specific form templates (outline for each)
  2. Review process tailored to each specialty
  3. Shared common elements across specialties
  4. Workflow for patients seeing multiple specialties
  5. Staff training for specialty-specific review
  6. Quality metrics for each specialty's intake

assertions:
  - type: llm_judge
    criteria: "Behavioral health intake includes safety screening — PHQ-9 for depression severity, GAD-7 for anxiety, and suicidal ideation screening (Columbia or similar) are not optional; the review process includes an immediate escalation protocol if safety screening triggers concern."
    weight: 0.35
    description: "BehavioralHealthSafety"
  - type: llm_judge
    criteria: "Form design balances comprehensiveness with patient burden — specialty forms add necessary clinical questions without creating overwhelming forms; uses conditional logic (if applicable), skip patterns, and prioritizes questions by clinical importance."
    weight: 0.35
    description: "FormDesignBalance"
  - type: llm_judge
    criteria: "Multi-specialty patient workflow avoids redundancy — a patient seeing both orthopedics and behavioral health should complete common elements once and specialty elements for each; the system tracks which elements have been completed to prevent duplicate data collection."
    weight: 0.30
    description: "MultiSpecialtyWorkflow"
