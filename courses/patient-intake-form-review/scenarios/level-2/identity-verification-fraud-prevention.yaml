meta:
  id: identity-verification-fraud-prevention
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Implement patient identity verification and fraud prevention during intake — detect medical identity theft, insurance fraud, and duplicate records while maintaining patient dignity"
  tags: [identity-verification, fraud-prevention, duplicate-records, intermediate]

state: {}

trigger: |
  Implement patient identity verification and fraud
  prevention procedures during intake after the
  practice discovered several cases of medical
  identity fraud.

  Recent incidents:

  Incident 1: A patient used another person's insurance
  card to receive treatment. The real policyholder later
  received an EOB for services they didn't receive,
  and their medical record now contains incorrect
  diagnoses and medications.

  Incident 2: A duplicate patient record was created
  because registration staff entered "Michael Smith"
  and "Mike Smith" as separate patients. Lab results
  went to the wrong chart, causing a near-miss
  medication error.

  Incident 3: A patient presented with a valid-looking
  insurance card, but verification revealed the
  policy had been canceled 4 months ago. The patient
  had already received $3,200 in services billed to
  the invalid policy.

  Incident 4: A patient's identity was stolen. Someone
  else used their name and DOB to receive emergency
  services, resulting in incorrect allergies and
  medications in the real patient's record, which
  could have caused harm.

  Practice data:
  - 15,000 active patient records
  - Estimated 800 duplicate records (5.3%)
  - 2 confirmed identity theft cases in 6 months
  - No photo ID verification policy currently
  - No systematic duplicate record detection
  - Monthly new patient volume: 200

  Create:
  1. Patient identity verification protocol
  2. Duplicate record detection and merge strategy
  3. Insurance fraud prevention checklist
  4. Medical identity theft response procedure
  5. Staff training on verification without bias
  6. Patient communication about verification requirements
  7. Technology recommendations within $10K budget

assertions:
  - type: llm_judge
    criteria: "Identity verification protocol balances security with patient dignity — requires photo ID verification but handles situations where patients lack ID (homeless, undocumented, minors) with alternative verification methods; doesn't create barriers to care while reducing fraud."
    weight: 0.35
    description: "VerificationBalance"
  - type: llm_judge
    criteria: "Duplicate record strategy uses matching algorithms — proposes probabilistic matching on name, DOB, SSN, address, and phone number; addresses the 800 existing duplicates with a merge/purge project and establishes preventive measures (search-before-create) for new registrations."
    weight: 0.35
    description: "DuplicateRecordStrategy"
  - type: llm_judge
    criteria: "Medical identity theft response procedure addresses both the victim and the records — notifies the real patient, corrects their medical record (removing incorrect information is critical for safety), reports to law enforcement and insurers, and prevents future use of stolen identity at the practice."
    weight: 0.30
    description: "IdentityTheftResponse"
