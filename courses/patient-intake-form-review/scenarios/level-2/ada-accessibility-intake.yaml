meta:
  id: ada-accessibility-intake
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Design ADA-compliant intake processes — create accessible forms and workflows for patients with visual, hearing, cognitive, and physical disabilities"
  tags: [ada-compliance, accessibility, disability-accommodation, intermediate]

state: {}

trigger: |
  Design ADA-compliant intake processes for a medical
  practice that has received complaints about
  inaccessible forms and check-in procedures.

  Complaints received:

  Patient A — Visual impairment:
  Blind patient reported that the practice's digital
  intake forms on the patient portal are not compatible
  with screen readers. The kiosk check-in uses a
  touchscreen with no audio option. Print forms use
  8-point font.

  Patient B — Hearing impairment:
  Deaf patient was called from the waiting room by
  name (auditory only). During intake, staff attempted
  to communicate by writing notes back and forth,
  which was slow and frustrating. Patient has a video
  relay service number but staff didn't know how to use it.

  Patient C — Cognitive disability:
  Patient with traumatic brain injury found intake forms
  confusing (complex medical terminology, multi-step
  conditional questions). Caregiver reported that the
  20-page form packet was overwhelming and the patient
  became agitated and wanted to leave.

  Patient D — Motor disability:
  Wheelchair user could not reach the check-in counter
  (too high). Paper forms require handwriting which
  is difficult due to limited hand dexterity. Digital
  forms have small clickable areas and require
  scrolling.

  Practice information:
  - 6 providers, general internal medicine
  - Current forms: Mix of paper and digital (portal)
  - Patient portal: Epic MyChart
  - ADA compliance: No formal audit conducted
  - Budget for improvements: $15K

  Create:
  1. ADA compliance gap assessment
  2. Accessible form redesign recommendations
  3. Accommodations protocol for each disability type
  4. Staff training on disability-aware intake
  5. Technology solutions within budget
  6. Compliance monitoring plan

assertions:
  - type: llm_judge
    criteria: "Accessible form redesign addresses WCAG 2.1 Level AA requirements — screen reader compatibility for digital forms, minimum 12-point font for print, keyboard-only navigation, sufficient color contrast, proper form labels and alt text, and error identification that doesn't rely solely on color."
    weight: 0.35
    description: "WCAGCompliance"
  - type: llm_judge
    criteria: "Accommodations are individualized rather than one-size-fits-all — visual impairment needs audio/tactile solutions, hearing impairment needs visual communication (VRS, written, ASL interpreter), cognitive disability needs simplified forms with plain language, motor disability needs adaptive input methods."
    weight: 0.35
    description: "IndividualizedAccommodations"
  - type: llm_judge
    criteria: "Cognitive disability accommodations reduce form complexity — breaks the 20-page packet into manageable sections, uses plain language (5th grade reading level), eliminates unnecessary questions, provides visual aids, and allows caregiver assistance without removing patient autonomy."
    weight: 0.30
    description: "CognitiveAccessibility"
