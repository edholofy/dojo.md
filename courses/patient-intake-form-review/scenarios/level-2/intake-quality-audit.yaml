meta:
  id: intake-quality-audit
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Conduct a comprehensive intake quality audit — analyze error rates, identify systemic issues, and develop corrective action plans based on audit findings"
  tags: [quality-audit, error-analysis, corrective-action, intermediate]

state: {}

trigger: |
  Conduct a comprehensive intake quality audit for
  a medical practice experiencing high claim denial
  rates suspected to be linked to intake errors.

  Practice: Valley Health Clinic
  - 12 providers, 3 locations
  - Monthly patient visits: 2,400
  - Claim denial rate: 8.5% (industry avg: 5-7%)
  - Revenue impact of denials: $45K/month

  Audit sample: 200 patient records from the past month

  Audit findings:

  Demographic accuracy:
  - 18 records (9%) had name discrepancies between
    intake form and insurance card
  - 12 records (6%) had incorrect or missing DOB
  - 8 records (4%) had wrong gender marker
  - 24 records (12%) had incomplete addresses

  Insurance data accuracy:
  - 28 records (14%) had wrong insurance on file
  - 15 records (7.5%) had expired insurance
  - 22 records (11%) had missing group numbers
  - 10 records (5%) had wrong subscriber relationship

  Clinical documentation:
  - 35 records (17.5%) had incomplete medication lists
  - 42 records (21%) had missing allergy information
  - 28 records (14%) had no emergency contact on file
  - 18 records (9%) had outdated medical history

  Consent and compliance:
  - 30 records (15%) had expired consent forms
  - 12 records (6%) had missing HIPAA acknowledgments
  - 8 records (4%) had consent forms with wrong provider
  - 5 records (2.5%) had unsigned financial agreements

  Patterns identified:
  - Location B has 2x the error rate of other locations
  - Evening shift has 40% more errors than day shift
  - New hires (under 90 days) have 3x the error rate
  - Errors spike on Mondays (highest volume day)

  Create:
  1. Audit results report with data visualization plan
  2. Root cause analysis for key findings
  3. Corrective action plan with priorities
  4. Staff performance improvement recommendations
  5. Ongoing monitoring program
  6. Projected revenue impact of improvements

assertions:
  - type: llm_judge
    criteria: "Root cause analysis goes beyond surface-level findings — Location B's higher error rate could be staffing, training, or workflow differences; evening shift errors suggest fatigue or reduced supervision; Monday spikes indicate volume-driven shortcuts; each pattern gets a specific root cause hypothesis."
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Corrective action plan prioritizes by revenue impact — insurance data errors (14% wrong insurance, 7.5% expired) directly cause claim denials and should be addressed first; connects the 8.5% denial rate to specific intake error categories and estimates revenue recovery from each fix."
    weight: 0.35
    description: "RevenuePrioritizedActions"
  - type: llm_judge
    criteria: "Ongoing monitoring program prevents regression — establishes regular audit cadence, defines acceptable error rate thresholds, creates real-time dashboards for location/shift comparison, and triggers investigation when rates exceed thresholds."
    weight: 0.30
    description: "OngoingMonitoring"
