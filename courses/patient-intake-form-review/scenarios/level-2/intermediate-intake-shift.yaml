meta:
  id: intermediate-intake-shift
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Intermediate shift simulation — manage complex intake challenges including a digital system outage, dual insurance confusion, ADA accommodation request, and a suspected identity theft case"
  tags: [shift-simulation, complex-intake, concurrent-challenges, intermediate]

state: {}

trigger: |
  You are the lead intake coordinator during a
  challenging afternoon when multiple complex situations
  arise simultaneously.

  SITUATION 1 — Digital intake system outage:
  The patient portal and kiosk system went down 30
  minutes ago. 15 patients are scheduled for the next
  2 hours. 8 of them completed digital forms pre-visit
  (data may or may not have been saved). 7 will need
  paper forms. Staff are panicking because they haven't
  used paper forms in 6 months and can't find the
  current versions.

  SITUATION 2 — Dual insurance coordination confusion:
  A patient, Teresa Martinez age 40, has three insurance
  plans: her own employer Cigna, her husband's employer
  UHC (she's a dependent), and Medicaid. Front desk
  staff are confused about primary/secondary/tertiary
  order. Teresa is frustrated because "this happens
  every time and nobody gets it right."

  SITUATION 3 — ADA accommodation request:
  A new patient with severe anxiety disorder is having
  a panic attack in the waiting room triggered by the
  crowded, noisy environment. Their companion says the
  patient cannot sit in the waiting room and cannot
  handle filling out forms right now. The patient needs
  to be seen today — appointment is in 20 minutes.

  SITUATION 4 — Suspected identity mismatch:
  During insurance verification for a new patient
  (Jorge Ramirez, age 33), the insurance company reports
  that the DOB on file doesn't match the DOB provided
  on the intake form. The patient's photo ID shows the
  same name but the photo looks different from the
  person checking in. The patient is becoming defensive
  when questioned.

  Handle all four situations:
  1. System outage contingency plan
  2. Triple insurance coordination resolution
  3. Anxiety accommodation protocol
  4. Identity mismatch investigation approach
  5. Staff communication and coordination
  6. Documentation of all actions

assertions:
  - type: llm_judge
    criteria: "System outage response protects patient data and maintains operations — verifies which pre-visit submissions were saved, locates current paper form versions (or prints from backup), and creates a plan to enter paper data when systems restore; doesn't delay patient care for administrative reasons."
    weight: 0.35
    description: "OutageResponse"
  - type: llm_judge
    criteria: "Triple insurance coordination is resolved correctly — with Cigna (own employer), UHC (husband's employer as dependent), and Medicaid; own employer plan is primary, husband's plan is secondary, and Medicaid is always payer of last resort (tertiary); addresses Teresa's frustration by documenting the correct order prominently in her record."
    weight: 0.35
    description: "TripleInsuranceResolution"
  - type: llm_judge
    criteria: "Identity mismatch is investigated carefully without accusation — follows a protocol that assumes good faith first (common name, data entry error, family member's card), while protecting the practice from fraud; doesn't refuse care but limits services to essential/emergency while verification is completed."
    weight: 0.30
    description: "IdentityInvestigation"
