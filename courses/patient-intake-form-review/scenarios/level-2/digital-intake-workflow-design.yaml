meta:
  id: digital-intake-workflow-design
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Design a digital patient intake workflow — transition from paper to electronic forms with EHR integration, patient portal submission, and automated verification"
  tags: [digital-workflow, ehr-integration, portal-submission, intermediate]

state: {}

trigger: |
  Design a digital patient intake workflow for a
  multi-provider medical practice transitioning from
  paper-based to electronic intake.

  Current state:
  - Practice: 8 providers (3 MDs, 2 DOs, 3 NPs)
  - Specialties: Family medicine, internal medicine
  - Daily patient volume: 80-100 visits
  - Current process: Paper forms, manual EHR data entry
  - EHR: athenahealth (patient portal available)
  - Average intake completion time: 18 minutes in-office
  - Data entry errors: Estimated 12% of entries have issues
  - Staff: 3 front desk, 1 intake coordinator

  Target state:
  - 80% of forms completed pre-visit via patient portal
  - Automated EHR integration (no manual data entry)
  - Real-time insurance eligibility verification
  - Digital signature capture for consent forms
  - Under 5 minutes average in-office intake time
  - Less than 3% data entry error rate

  Constraints:
  - Must maintain paper option for patients without
    digital access (estimated 15% of patient population)
  - Must comply with HIPAA for electronic data collection
  - Budget: $25K for implementation
  - Timeline: 3-month rollout
  - Minimal disruption to daily operations during transition

  Create:
  1. Digital intake workflow design
  2. Patient portal configuration plan
  3. EHR integration specifications
  4. Paper-to-digital transition plan
  5. Patient communication and adoption strategy
  6. Staff training curriculum
  7. Performance metrics and monitoring plan

assertions:
  - type: llm_judge
    criteria: "Workflow design addresses the complete patient journey — from pre-visit portal notification to form completion, digital signature, insurance verification, EHR data import, and check-in; each step is mapped with timing, responsible party, and fallback for failures."
    weight: 0.35
    description: "CompleteWorkflowDesign"
  - type: llm_judge
    criteria: "Paper-to-digital transition maintains access for the 15% without digital access — provides kiosk/tablet option in-office, staff-assisted data entry, or hybrid paper-scan workflow; doesn't create a two-tier system where digitally connected patients get faster service while others wait."
    weight: 0.35
    description: "DigitalAccessEquity"
  - type: llm_judge
    criteria: "Patient adoption strategy addresses the behavioral change required — 80% pre-visit completion is ambitious; uses appointment reminder emails with form links, incentives (shorter wait times), and clear instructions; measures adoption rates and adjusts strategy if targets aren't met."
    weight: 0.30
    description: "PatientAdoptionStrategy"
