meta:
  id: pre-visit-intake-optimization
  level: 2
  course: patient-intake-form-review
  type: output
  description: "Optimize pre-visit intake completion rates — design strategies to maximize patient form completion before arrival, reducing wait times and improving data quality"
  tags: [pre-visit-optimization, completion-rates, wait-time-reduction, intermediate]

state: {}

trigger: |
  Optimize pre-visit intake completion rates for a
  practice struggling with low digital form adoption
  and long check-in wait times.

  Current state:
  - Practice: 10 providers, family medicine
  - Daily volume: 120 patients
  - Patient portal: Epic MyChart
  - Pre-visit form completion rate: 28% (target: 80%)
  - Average in-office intake time: 22 minutes
  - Average wait time (intake-related): 15 minutes
  - Patient satisfaction score: 3.2/5 (intake-related)

  Patient demographics:
  - Age 18-35: 25% (tech-savvy, lowest completion rate
    at 22% — "too lazy" or "forgot")
  - Age 35-55: 35% (moderate completion at 30%)
  - Age 55-70: 25% (moderate completion at 32%)
  - Age 70+: 15% (lowest digital access, 18% completion
    but highest willingness when assisted)

  Barriers identified through patient surveys:
  - 40%: "I didn't know forms were available online"
  - 25%: "The portal was confusing to navigate"
  - 15%: "I don't have a portal account"
  - 10%: "I started but the forms were too long"
  - 5%: "I prefer paper forms"
  - 5%: "Privacy concerns about online forms"

  Current communication touchpoints:
  - Appointment confirmation email (text only, no link)
  - Automated phone reminder 24 hours before visit
  - No SMS reminders
  - No post-appointment outreach

  Create:
  1. Multi-channel pre-visit communication strategy
  2. Form simplification and UX improvement plan
  3. Age-specific adoption strategies
  4. Completion rate improvement projections
  5. In-office backup process for non-completers
  6. Staff workflow adjustments
  7. Performance tracking dashboard

assertions:
  - type: llm_judge
    criteria: "Multi-channel strategy addresses the #1 barrier (40% didn't know forms were available) — adds form links to appointment confirmation emails, SMS reminders with direct links, and portal account setup assistance; each touchpoint is designed to convert awareness into completion."
    weight: 0.35
    description: "AwarenessStrategy"
  - type: llm_judge
    criteria: "Age-specific strategies address different barriers — younger patients need convenient mobile-optimized forms with SMS links (not just portal); older patients need assisted setup and simplified navigation; the 70+ group's high willingness suggests phone-based assistance could dramatically improve their rates."
    weight: 0.35
    description: "AgeSpecificStrategies"
  - type: llm_judge
    criteria: "Form simplification targets the 10% who started but didn't finish — shortens forms to essential-only questions, adds progress indicators, allows save-and-resume, and removes questions that can be collected during the visit; reduces form fatigue while maintaining necessary data collection."
    weight: 0.30
    description: "FormSimplification"
