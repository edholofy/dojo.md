meta:
  id: ap-transformation-case-study
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Write a detailed AP transformation case study — document a complex multi-year AP modernization journey including challenges, solutions, results, and lessons learned for publication"
  tags: [case-study, transformation, thought-leadership, expert]

state: {}

trigger: |
  Write a comprehensive, publication-ready case
  study of a fictional (but realistic) AP
  transformation at a mid-market healthcare
  company. The case study will be used for
  conference presentations and marketing.

  COMPANY PROFILE (fictional):
  Name: MedCore Health Systems
  - 12 hospitals, 45 outpatient clinics
  - $4.2B annual revenue
  - $1.8B annual AP spend (medical supplies,
    pharmaceuticals, services, capital equipment)
  - 350,000 invoices/year
  - 65 AP FTEs across 12 locations

  PRE-TRANSFORMATION STATE:
  - Cost per invoice: $18.50
  - Processing time: 22 days average
  - Touchless rate: 5%
  - Early payment discount capture: 18%
  - Duplicate payment rate: 0.4% ($7.2M/year)
  - 78% paper invoices
  - 12 different approval workflows
  - No centralized AP metrics
  - 4 ERP instances (3 legacy + 1 new Epic/Workday)

  POST-TRANSFORMATION STATE (after 24 months):
  - Cost per invoice: $3.80
  - Processing time: 4.5 days
  - Touchless rate: 72%
  - Discount capture: 78%
  - Duplicate rate: 0.02%
  - 95% electronic invoices
  - Standardized workflows
  - Real-time AP dashboard

  Write the full case study covering:
  1. Executive summary and business case
  2. Challenges and root causes
  3. Solution design and technology selection
  4. Implementation journey (phases, setbacks, pivots)
  5. Results and ROI
  6. Lessons learned and recommendations

assertions:
  - type: llm_judge
    criteria: "The case study tells a compelling transformation narrative with realistic challenges — the executive summary frames the transformation in healthcare-specific context (margin pressure, supply chain complexity, regulatory compliance); root cause analysis goes beyond 'manual processes' to identify systemic issues: decentralized structure led to 12 different ways of doing the same thing, physician-driven purchasing created non-PO invoice chaos, healthcare-specific challenges (GPO pricing verification, 340B drug pricing compliance, capital equipment approval complexity); the solution design section describes: technology selection process (evaluated 4+ platforms, selected based on healthcare-specific requirements like GPO integration and HIPAA compliance), organizational design (centralized shared services model with retained local liaisons at each hospital), process standardization (reduced 12 approval workflows to 3: PO-based, non-PO under $5K, non-PO over $5K); the implementation journey includes realistic setbacks: physician resistance to standardized purchasing, ERP integration delays (especially legacy systems), OCR accuracy challenges with medical supply invoices (complex line items), a security incident during vendor portal rollout that required 3-week pause; the narrative arc shows transformation, not just installation."
    weight: 0.35
    description: "TransformationNarrative"
  - type: llm_judge
    criteria: "Results and ROI are specific, credible, and quantified — the results section provides before/after metrics with clear methodology: cost per invoice reduction from $18.50 to $3.80 (79% reduction); calculation: labor savings from 65 to 28 FTEs (37 redeployed, not terminated — important for healthcare organization optics), processing cost savings $5.1M/year, technology cost $1.2M/year (net savings $3.9M); discount capture improvement from 18% to 78%: identified $42M in available discounts annually, capturing $32.8M vs. prior $7.6M = $25.2M incremental value; duplicate payment reduction from 0.4% to 0.02%: $7.2M/year reduced to $360K = $6.84M savings; total quantified annual value: $35.9M ($3.9M processing + $25.2M discounts + $6.84M duplicates); implementation cost: $4.2M over 24 months (technology, consulting, change management, training); payback period: approximately 6 weeks after full go-live; 3-year NPV: $85M+; qualitative benefits: vendor satisfaction improved (Net Promoter Score from -12 to +45), audit findings reduced from 14 to 2, AP team morale improved (new skills, elimination of tedious manual work), cash flow predictability enabled better treasury management."
    weight: 0.35
    description: "ResultsAndROI"
  - type: llm_judge
    criteria: "Lessons learned are genuine insights, not generic advice — the lessons section includes specific, hard-won insights: (1) 'Start with the hardest hospital first' — they initially planned to pilot with the most organized hospital but learned that proving the solution works at the most complex, resistant site builds credibility everywhere else; (2) 'Physician engagement is non-negotiable in healthcare AP' — AP transformation requires clinical stakeholder buy-in because physicians control 40% of purchasing decisions; they created a 'physician advisory panel' that provided input on approval workflows; (3) 'Don't underestimate the vendor onboarding effort' — converting 8,000 vendors from paper to electronic took 9 months (not the planned 3 months); dedicated vendor onboarding team was the key; (4) 'OCR is not magic' — initial OCR accuracy was 65% on medical supply invoices (complex line items, Latin terminology); required 6 months of model training to reach 92%; (5) 'The 37 redeployed AP staff became the transformation's biggest advocates' — moving them to exception handling, analytics, and vendor management roles improved job satisfaction and quality; (6) 'Quick wins fund the journey' — early discount capture improvements generated $8M in the first 6 months, which funded the remaining implementation; the case study is structured for presentation (clear headers, key metrics highlighted, pull quotes from stakeholders)."
    weight: 0.30
    description: "LessonsLearned"
