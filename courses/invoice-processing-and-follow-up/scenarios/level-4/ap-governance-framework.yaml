meta:
  id: ap-governance-framework
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an enterprise AP governance framework — establish policies, authority matrices, escalation procedures, and continuous improvement mechanisms for a multi-entity organization"
  tags: [governance, policy, authority-matrix, expert]

state: {}

trigger: |
  A rapidly growing company ($3B revenue, 40%
  growth through acquisitions) has inconsistent
  AP policies across its 8 business units. Design
  a unified AP governance framework.

  CURRENT STATE:
  - 8 business units with independent AP operations
  - Each unit has its own:
    - Approval authority thresholds (varying from
      $1K to $50K for manager-level approval)
    - Payment terms policies (some pay Net 15,
      others Net 60)
    - Vendor onboarding procedures
    - Invoice coding practices
    - Exception handling rules
  - No global AP policy document
  - No centralized AP metrics or reporting
  - 3 different ERP systems across units
  - Board audit committee has raised concerns about
    inconsistent controls
  - Recent internal audit found: 4 SoD violations,
    $2.1M in unauthorized commitments, and $340K
    in duplicate payments

  GOVERNANCE OBJECTIVES:
  - Standardize policies while allowing necessary
    local flexibility
  - Establish clear authority and accountability
  - Create consistent controls across all units
  - Enable centralized visibility and reporting
  - Support SOX compliance across the enterprise
  - Maintain operational efficiency (avoid
    bureaucracy that slows payments)

  Design:
  1. Policy framework and hierarchy
  2. Authority and delegation matrix
  3. Standardized procedures with local variations
  4. Compliance and monitoring mechanisms
  5. Governance committee structure
  6. Change management and adoption plan

assertions:
  - type: llm_judge
    criteria: "Policy framework establishes a clear hierarchy balancing standardization with local needs — three-tier policy structure: (1) Global AP Policy (mandatory for all units): approved by CFO and Board audit committee, covers: authority levels and delegation rules, segregation of duties requirements, vendor onboarding minimum standards, mandatory controls (3-way matching, duplicate detection, bank change verification), payment terms policy (minimum/maximum ranges), compliance requirements (SOX, regulatory), data retention and audit trail requirements; (2) Regional/Business Unit Standards (tailored within global guardrails): approved by BU Controller with Global AP oversight, covers: specific approval thresholds within global ranges, payment run schedules, local regulatory compliance procedures, ERP-specific process documentation; (3) Operating Procedures (detailed, unit-specific): approved by AP Manager, covers: step-by-step process guides, system navigation, exception handling workflows, contact lists and escalation paths; the framework addresses the specific audit findings: SoD violations resolved by global SoD matrix enforced in all ERPs, unauthorized commitments prevented by standardized authority matrix with system-enforced limits, duplicate payments addressed by mandatory cross-unit duplicate detection."
    weight: 0.35
    description: "PolicyFramework"
  - type: llm_judge
    criteria: "Authority matrix is granular and addresses the growth-through-acquisition complexity — delegation of authority (DoA) matrix defines approval levels based on: invoice type (PO vs. non-PO vs. intercompany), amount thresholds (standardized across all units), and role level; example matrix: PO invoices matching within tolerance (auto-approved, no human intervention needed), non-PO invoices: up to $5K (cost center manager), $5K-$25K (department director), $25K-$100K (VP), $100K-$500K (SVP/BU head), $500K-$1M (CFO), $1M+ (CFO + CEO or Board committee); the matrix handles: delegation during absence (one level up, time-limited), split authority (no splitting invoices to avoid thresholds — system monitors for this), emergency procedures (weekend/holiday approvals with post-facto review), new acquisitions (default to most conservative thresholds until assessed and integrated); vendor master authority: new vendor creation requires dual approval (requester + AP manager), bank detail changes require callback verification plus manager approval, vendor deactivation quarterly cleanup process; payment authority: payment run approval based on total batch value (not individual invoice), wire transfers require dual approval regardless of amount, same-day/emergency payments require VP+ approval with documented justification."
    weight: 0.35
    description: "AuthorityMatrix"
  - type: llm_judge
    criteria: "Governance committee and compliance monitoring enable continuous oversight — AP Governance Committee: chaired by VP/Controller-level, members from each BU, meeting monthly; responsibilities: review policy exceptions and approve changes, review cross-unit AP metrics dashboard, address escalated issues, approve new acquisition integration plans, annual policy refresh; compliance monitoring: continuous controls monitoring (CCM) program that tracks across all 3 ERPs: SoD compliance (automated conflict detection and reporting), authority matrix adherence (flag approvals exceeding delegation), policy compliance metrics (3-way match rate, exception bypass rate, vendor onboarding compliance), duplicate payment detection (cross-unit), payment terms compliance (actual terms vs. policy); KPI dashboard for audit committee (quarterly): cost per invoice by BU (with benchmark), processing cycle time by BU, exception and bypass rates, control effectiveness metrics, fraud indicators; change management: mandatory training for all AP staff on global policy, annual certification of policy understanding, integration playbook for new acquisitions (standardized 90-day integration with governance assessment in first 2 weeks), policy change communication process (30-day notice, training, system configuration, effective date); the framework avoids over-centralization by explicitly defining which decisions remain local (vendor relationships, payment timing within terms, operational scheduling) vs. centralized (policy standards, authority limits, control requirements)."
    weight: 0.30
    description: "GovernanceAndMonitoring"
