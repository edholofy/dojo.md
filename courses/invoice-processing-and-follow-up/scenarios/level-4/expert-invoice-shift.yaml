meta:
  id: expert-invoice-shift
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Expert shift simulation — serve as interim VP of AP advising the board on AP strategy, technology investment, and organizational transformation while managing a compliance crisis"
  tags: [shift-simulation, executive, board-advisory, expert]

state: {}

trigger: |
  You are an interim VP of AP brought in after
  the previous AP leader departed suddenly. The
  board has given you 90 days to stabilize
  operations and present a 3-year AP strategy.

  WEEK 1 ASSESSMENT FINDINGS:

  OPERATIONAL ISSUES:
  - 15,000 invoices in backlog (6+ weeks old)
  - 3 key AP staff resigned in sympathy with
    departed VP (team now at 60% capacity)
  - $45M in payments past due, vendor calls
    flooding in
  - Month-end close 8 days late
  - DPO has spiked to 72 days (target: 45)
  - Touchless rate: 15% (industry benchmark: 55%)

  COMPLIANCE ISSUES:
  - External auditor identified 3 material
    weaknesses in AP controls for SOX:
    1. No evidence of 3-way match for 35% of
       sampled invoices
    2. 8 users with conflicting SoD roles
    3. Payment approval documentation missing
       for 22% of sampled payments
  - IRS notice: $1.2M proposed penalty for 1099
    filing errors
  - State unclaimed property audit notification
    for 5 states

  TECHNOLOGY STATE:
  - SAP ECC 6.0 (end of mainstream support 2027)
  - No AP automation (all manual processing)
  - Excel-based tracking and reporting
  - No vendor portal

  POLITICAL LANDSCAPE:
  - CFO is skeptical of AP transformation spending
    ("just hire more people")
  - Procurement VP wants AP to report to them
  - Business unit controllers want to retain
    local AP authority
  - Board audit committee wants monthly updates

  Present:
  1. 30-day stabilization plan
  2. Compliance remediation strategy
  3. 3-year AP transformation roadmap
  4. Board presentation with business case
  5. Organizational and political strategy

assertions:
  - type: llm_judge
    criteria: "30-day stabilization plan addresses the immediate crisis with clear priorities — triage approach: Week 1 (Stop the bleeding): prioritize the 15,000 invoice backlog by criticality — pay critical/sole-source vendors immediately (estimate top 50 vendors represent 60% of past-due value), engage 4-6 temporary AP staff from staffing agency, establish daily cash disbursement meetings with Treasury (allocate the $45M past due across 4 weeks based on vendor criticality and late fee exposure), communicate proactively to top 100 vendors with payment schedules (reduces inbound call volume by 50%+); Week 2 (Stabilize operations): implement triage workflow — new invoices processed same-day for critical vendors, all others within 5 days, close the month-end (even if 8 days late, get it closed with documented accruals for unprocessed invoices), begin recruiting permanent AP replacements (3 positions); Week 3-4 (Establish rhythm): daily standup meetings with AP team, weekly backlog reduction targets (reduce by 3,000/week), vendor communication updates every Friday, preliminary assessment of compliance issues; success metrics for day 30: backlog below 5,000, DPO trending toward 55 days, no vendor supply disruptions, month-end close on time, SOX remediation plan drafted."
    weight: 0.35
    description: "StabilizationPlan"
  - type: llm_judge
    criteria: "Compliance remediation and 3-year roadmap are convincing for board-level audience — SOX remediation (immediate): material weakness 1 (3-way match): implement mandatory match documentation before payment release, retroactively document matches for audit sample, configure SAP workflow to enforce match-before-pay; material weakness 2 (SoD): immediately remove conflicting access for 8 users, implement compensating controls while permanent SoD redesign is completed, engage IT security for SAP role redesign; material weakness 3 (approval documentation): implement digital approval capture in SAP workflow, no payment without documented electronic approval; target: downgrade material weaknesses to significant deficiencies within 6 months, full remediation within 12 months; 1099 remediation: engage tax counsel for penalty abatement, perform full vendor classification review, implement automated TIN validation; 3-year roadmap: Year 1 (Stabilize and Foundation): hire team to full strength, implement basic AP automation (OCR + workflow in SAP), remediate SOX findings, establish KPI reporting, target: touchless rate 35%, cost per invoice $10; Year 2 (Transform): implement AI-powered AP platform, vendor portal, supply chain finance program, advanced analytics, target: touchless rate 55%, cost per invoice $6; Year 3 (Optimize): machine learning optimization, predictive analytics, real-time payments, working capital optimization, target: touchless rate 75%, cost per invoice $3.50."
    weight: 0.35
    description: "ComplianceAndRoadmap"
  - type: llm_judge
    criteria: "Board presentation and political strategy demonstrate executive-level communication — the board presentation frames AP transformation as a working capital and risk management initiative (not a back-office cost center improvement); business case: current AP cost $4.2M/year + $2M/year in missed discounts + $1.5M in fraud/error exposure = $7.7M annual cost of current state; transformed AP: $2M cost + $3M in captured discounts + $200K fraud/error = net positive $1M; investment required: $3M over 3 years; 3-year ROI: 400%+; political strategy: CFO concern ('just hire more people'): show that manual processing at current volume requires 35 FTEs at $120K fully loaded = $4.2M, while automation achieves better results with 15 FTEs = $1.8M + $800K technology = $2.6M — hiring more people is more expensive; Procurement VP (wants AP under procurement): propose dotted-line reporting structure where AP retains financial reporting to CFO but operational coordination with procurement through a shared P2P governance committee — this gives procurement influence without control, preserving financial independence; BU controllers (want local authority): propose 'federated model' — centralized processing with local approval authority and local compliance retained by BU controllers; audit committee: establish monthly written updates with standardized metrics dashboard, quarterly in-person presentations, commitment to specific remediation milestones with accountability."
    weight: 0.30
    description: "BoardAndPolitics"
