meta:
  id: ap-consulting-practice
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Build an AP consulting practice — develop service offerings, diagnostic frameworks, transformation methodologies, and value-based pricing for AP advisory services"
  tags: [consulting, practice-building, methodology, expert]

state: {}

trigger: |
  You are founding an AP transformation consulting
  practice within a mid-tier advisory firm. Design
  the practice from the ground up.

  MARKET CONTEXT:
  - AP automation market growing 12% CAGR
  - 60% of mid-market companies still primarily
    manual AP processes
  - Average AP cost per invoice: $12 (manual)
    vs. $2.50 (automated)
  - Common client pain points: high processing
    costs, poor visibility, fraud exposure,
    compliance failures, vendor dissatisfaction
  - Competition: Big 4 firms (expensive, enterprise
    focus), boutique AP consultancies, technology
    vendors offering "consulting" (biased)

  FIRM CONTEXT:
  - 200-person advisory firm, strong finance
    and operations practice
  - Good mid-market client relationships (200+
    active clients, $50M-$5B revenue)
  - No dedicated AP expertise currently
  - Target: $3M practice revenue within 3 years
  - Available investment: $500K for year 1

  Design:
  1. Service offerings and positioning
  2. Diagnostic and assessment framework
  3. Transformation methodology
  4. Pricing model and economics
  5. Team structure and hiring plan
  6. Go-to-market strategy

assertions:
  - type: llm_judge
    criteria: "Service offerings are differentiated and cover the full AP transformation lifecycle — tiered service portfolio: (1) AP Health Check (2-3 weeks, entry-level engagement): rapid diagnostic of current AP operations, benchmark against APQC/Hackett data, identify quick wins and build business case for transformation — this is the 'land' offering, priced at $25-40K to be accessible and demonstrate value; (2) AP Transformation Design (8-12 weeks): detailed current state assessment, future state design, technology evaluation and selection (vendor-agnostic, unlike technology vendors), business case development, implementation roadmap — priced at $100-175K; (3) AP Implementation Advisory (6-18 months): program management for AP automation implementation, process redesign, change management, testing and go-live support — priced at $150-300K+; (4) Managed AP Optimization (ongoing): continuous improvement, KPI monitoring, periodic reassessment, fractional AP leadership — priced at $10-20K/month; the positioning emphasizes vendor-independence (unlike technology vendors), mid-market focus (unlike Big 4 pricing), and practitioner expertise (unlike generalist consultants); cross-sell opportunities: supply chain finance advisory, working capital optimization, procure-to-pay process redesign."
    weight: 0.35
    description: "ServiceOfferings"
  - type: llm_judge
    criteria: "Diagnostic framework is structured and produces actionable output — the AP Health Check methodology: (1) Data collection (week 1): extract AP transaction data from ERP (12 months minimum), conduct stakeholder interviews (CFO, Controller, AP manager, procurement, key business unit leaders), process observation sessions (shadow AP team for 2 days), technology assessment (current system capabilities vs. utilization); (2) Analysis (week 2): calculate key metrics and benchmark (cost per invoice, invoices per FTE, touchless rate, DPO, discount capture rate, exception rate, cycle time), process mapping with time-motion analysis, control environment assessment (SoD, approval matrices, fraud controls), vendor analysis (concentration, payment method mix, term optimization potential); (3) Deliverable (week 3): maturity model scoring across 6 dimensions (process standardization, technology/automation, controls/compliance, vendor management, analytics/reporting, organizational capability) on a 1-5 scale, prioritized opportunity roadmap with estimated savings, executive presentation with business case; the maturity model creates a reusable framework that becomes the practice's intellectual property and differentiator."
    weight: 0.35
    description: "DiagnosticFramework"
  - type: llm_judge
    criteria: "Practice economics and go-to-market strategy achieve the $3M revenue target — year 1 ($500K investment, $600-800K target revenue): hire 2 senior consultants (AP domain experts, $150K each), 1 analyst ($80K), develop IP (maturity model, benchmark database, methodology playbooks); leverage existing firm relationships for 15-20 AP Health Checks (at $30K avg = $450-600K) and convert 3-4 into transformation projects ($100-150K each = $300-600K); year 2 ($1.2-1.5M target): add 2 more consultants, build managed services capability, develop industry-specific offerings (manufacturing, healthcare, financial services); year 3 ($2.5-3M target): 8-10 person team, established reputation, recurring managed services revenue stream, speaking/thought leadership; utilization targets: 70% billable for senior consultants, 80% for staff; blended rate: $250-350/hour; go-to-market: leverage firm's existing client base (200+ clients, present AP findings in routine advisory conversations), host AP benchmarking roundtables (bring 10-15 CFOs together quarterly, share anonymized benchmarking data — demonstrates expertise and generates leads), publish AP performance survey (annual, builds brand), partner with 2-3 AP technology vendors for mutual referrals (maintain independence by partnering with multiple); thought leadership: monthly AP insights newsletter, quarterly webinars, speaking at AP/finance conferences (IOFM, AFP)."
    weight: 0.30
    description: "EconomicsAndGTM"
