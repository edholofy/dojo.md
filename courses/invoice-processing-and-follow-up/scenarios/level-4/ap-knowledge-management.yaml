meta:
  id: ap-knowledge-management
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an AP knowledge management system — capture institutional knowledge, create decision frameworks, build training programs, and ensure continuity in AP operations"
  tags: [knowledge-management, training, institutional-knowledge, expert]

state: {}

trigger: |
  A company is facing a knowledge crisis in its
  AP department. Within 18 months, 40% of the AP
  team (including the AP Manager with 22 years of
  experience) will retire. Design a knowledge
  management system to preserve institutional
  knowledge and enable the next generation.

  CURRENT SITUATION:
  - AP team: 15 FTEs, average tenure 14 years
  - 6 team members retiring within 18 months
  - No documented procedures (everything is
    "tribal knowledge")
  - Critical undocumented knowledge includes:
    - Vendor-specific processing rules (vendor X
      always sends duplicate invoices, vendor Y
      requires manual matching because their PO
      numbers don't align with the system)
    - Informal approval workarounds ("for dept 450,
      always cc the admin because the VP never
      checks email")
    - Historical context ("we don't send this vendor
      to collections because the CEO has a personal
      relationship")
    - System quirks ("if you enter a credit memo
      over $50K, you have to split it into two
      entries because of a system limitation")
  - New hires take 6-9 months to become productive
  - Error rates spike whenever someone is on
    vacation

  Design:
  1. Knowledge capture methodology
  2. Knowledge base structure and content
  3. Decision support tools
  4. Training and onboarding program
  5. Knowledge maintenance process
  6. Technology platform

assertions:
  - type: llm_judge
    criteria: "Knowledge capture methodology systematically extracts tacit knowledge — the capture approach uses multiple methods to extract different types of knowledge: (1) Structured interviews: one-on-one sessions with each retiring team member, guided by a standardized knowledge elicitation template (what do you do, why do you do it that way, what would happen if you didn't, what are the exceptions); minimum 10 hours per team member over 4-6 weeks, recorded and transcribed; (2) Process observation and shadowing: new team members shadow experienced staff, documenting every decision point, exception, and workaround; each critical process observed 3+ times with different invoices/scenarios; (3) Decision journaling: experienced staff keep a 30-day decision log noting every time they make a judgment call that isn't covered by written procedure; (4) Exception mining: analyze 12 months of invoice exceptions, payment holds, manual overrides — each one represents a decision that required institutional knowledge; (5) Vendor knowledge cards: for top 200 vendors by volume, document vendor-specific rules, contact information, known issues, historical context, escalation procedures; (6) System workaround documentation: catalog all known system limitations and their workarounds (like the $50K credit memo split); the methodology prioritizes: start with the 6 retiring staff (highest urgency), focus on knowledge that is unique to individuals (not knowledge that multiple people share), and distinguish between valuable institutional knowledge and habits/workarounds that should be fixed rather than perpetuated."
    weight: 0.35
    description: "KnowledgeCapture"
  - type: llm_judge
    criteria: "Knowledge base structure and decision support tools enable rapid onboarding — knowledge base organized into 4 layers: (1) Process Library: step-by-step procedures for every AP process (invoice receipt, matching, coding, approval, payment, vendor management, period-end close), each with: standard process flow, decision points with criteria, exception handling procedures, screenshots and system navigation guides; (2) Vendor Intelligence Hub: vendor-specific profiles for top 200+ vendors including: invoicing patterns, known issues, special handling rules, relationship history, key contacts, pricing agreements, approved deviation from standard process; (3) Decision Framework Library: for judgment-call situations that currently rely on experience, create structured decision trees: 'when to escalate vs. resolve independently,' 'how to prioritize payment runs when cash is constrained,' 'when to approve a match exception vs. return to vendor,' 'how to assess whether a discount is worth taking'; (4) Troubleshooting Guide: common problems and solutions, organized by symptom ('vendor says they weren't paid' → check: payment status, cleared bank, correct bank details, returned ACH, vendor applied to wrong account); the new hire onboarding program reduces time-to-productivity from 6-9 months to 3-4 months through: structured 12-week curriculum, mentorship pairing, progressive responsibility (start with high-volume simple vendors, graduate to complex/exception-prone vendors), competency checkpoints at weeks 4, 8, and 12."
    weight: 0.35
    description: "KnowledgeBaseAndDecisionSupport"
  - type: llm_judge
    criteria: "Knowledge maintenance and technology platform prevent knowledge decay — maintenance process addresses the biggest risk with knowledge management systems: they become outdated; the maintenance approach: (1) Knowledge ownership: each process/vendor knowledge article has a designated owner responsible for accuracy, with mandatory review dates (quarterly for high-change areas, annually for stable processes); (2) Change-triggered updates: any process change, system update, vendor change, or policy revision triggers a knowledge base update as part of the change management checklist — the change is not complete until documentation is updated; (3) Error-driven improvement: every processing error is analyzed for root cause — if the error was caused by missing or incorrect documentation, the knowledge base is updated immediately; (4) Contribution incentives: team members earn recognition for knowledge contributions (documented in performance reviews, 'knowledge champion' designation); technology platform: wiki-style collaborative platform (Confluence, Notion, or SharePoint) with: full-text search across all knowledge articles, contextual links from ERP (when processing vendor X's invoice, a link to vendor X's knowledge card appears), version history and change tracking, embedded screenshots and screen recordings, tagging and categorization for easy discovery, analytics showing most-used articles and search terms with no results (knowledge gaps); the platform must be accessible from within the ERP workflow — AP staff won't use a separate system they have to navigate to; embedded knowledge (tooltips, contextual help, decision prompts within the ERP) is more effective than standalone documentation."
    weight: 0.30
    description: "MaintenanceAndTechnology"
