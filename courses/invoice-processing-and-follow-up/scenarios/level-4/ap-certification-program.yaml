meta:
  id: ap-certification-program
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Design a professional AP certification program — create curriculum, assessment methodology, competency framework, and credentialing structure for AP professionals"
  tags: [certification, professional-development, curriculum, expert]

state: {}

trigger: |
  The Institute of Finance Operations (IFO) wants
  to create a new professional certification for
  AP practitioners. Design the complete program.

  PROGRAM OBJECTIVES:
  - Establish professional standards for AP practice
  - Create career development pathways
  - Validate competency across experience levels
  - Address the skills gap as AP evolves from
    clerical to analytical/strategic
  - Compete with existing certifications (CAPP,
    APS) while offering differentiated value

  TARGET AUDIENCE:
  - Level 1: AP Specialists (1-3 years experience)
  - Level 2: AP Supervisors/Managers (3-7 years)
  - Level 3: AP Directors/VP (7+ years)

  MARKET RESEARCH:
  - 500,000+ AP professionals in the US alone
  - Only 15% hold any AP-specific certification
  - Employers increasingly require/prefer certified
    AP professionals
  - Digital transformation creating demand for new
    skills (analytics, automation management, vendor
    relationship management)
  - Remote/hybrid work changing AP operations

  Design:
  1. Certification tiers and prerequisites
  2. Competency framework and body of knowledge
  3. Curriculum design for each tier
  4. Assessment methodology
  5. Continuing education requirements
  6. Program economics and sustainability

assertions:
  - type: llm_judge
    criteria: "Certification tiers are well-structured with clear progression — three tiers with distinct value propositions: (1) Certified AP Professional (CAP): entry-level, requires 1+ year AP experience OR associate degree in accounting/finance, validates core AP competencies (invoice processing, matching, payment execution, vendor management, basic compliance), 150-question exam covering knowledge and application, 4-hour proctored exam; (2) Certified AP Manager (CAPM): mid-level, requires CAP + 3 years supervisory experience OR 5 years AP experience + bachelor's degree, validates management competencies (team leadership, process optimization, technology management, financial analysis, risk management), case-based exam with scenario analysis, 5-hour exam with multiple sections; (3) Certified AP Executive (CAPE): senior-level, requires CAPM + 5 years director-level experience, validates strategic competencies (transformation leadership, enterprise governance, supply chain finance, technology strategy, organizational development), portfolio submission + panel interview + strategic case study presentation; prerequisites prevent credential inflation while remaining accessible; alternative pathways acknowledge that not all experienced AP professionals have formal education."
    weight: 0.35
    description: "CertificationTiers"
  - type: llm_judge
    criteria: "Competency framework covers the evolving AP body of knowledge — the body of knowledge (BoK) is organized into 8 domains: (1) Invoice Management (receipt, validation, data capture, OCR/AI processing, matching, coding, approval workflows); (2) Payment Operations (payment methods, execution, treasury coordination, cash management, payment fraud prevention); (3) Vendor Management (onboarding, master data maintenance, relationship management, performance measurement, risk assessment); (4) Compliance and Controls (SOX compliance, internal controls design, audit readiness, regulatory compliance — 1099, VAT, withholding tax, data privacy); (5) Technology and Automation (ERP systems, AP automation platforms, AI/ML in AP, RPA, e-invoicing, analytics tools); (6) Financial Analysis (working capital management, DPO optimization, discount analysis, AP metrics and benchmarking, budgeting and forecasting); (7) Leadership and Strategy (team management, change management, stakeholder communication, strategic planning, continuous improvement); (8) Emerging Practices (supply chain finance, ESG in procurement, blockchain/DLT in payments, real-time payments, cross-border complexity); each domain is weighted differently by tier: CAP emphasizes domains 1-4, CAPM adds 5-7, CAPE emphasizes 5-8; the framework explicitly addresses the skills evolution from 'processing invoices' to 'managing AP technology and strategy.'"
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Assessment methodology and program economics are rigorous and sustainable — assessment design: CAP exam uses multiple-choice and simulation questions (e.g., 'given this invoice and PO, identify all matching exceptions' — testing application, not just memorization), item analysis and psychometric validation, Angoff method for cut score setting, question bank of 500+ items with regular refresh; CAPM exam includes case studies (2 extended scenarios requiring multi-step analysis and written recommendations), scored by trained graders using rubrics; CAPE assessment is portfolio-based: candidates submit a transformation project portfolio, undergo a 90-minute panel interview, and present a strategic case study solution — assessed by a panel of certified CAPE holders; all exams administered through proctored testing centers or monitored online proctoring; continuing education: 40 CPE credits per 2-year cycle, at least 50% in AP-specific topics, must include ethics component; program economics: exam fees (CAP: $350, CAPM: $550, CAPE: $800), annual membership fee ($150-250), study materials ($200-400), prep courses ($500-1,500); revenue model: year 1: 2,000 candidates (mostly CAP) = $700K exam fees + $300K materials/courses = $1M; year 3: 8,000 cumulative candidates with renewals = $2.5M; year 5: 15,000+ credential holders generating $4M+ annually through exams, renewals, events, and partnerships; investment: $800K year 1 (exam development, platform, marketing), breakeven by mid-year 2."
    weight: 0.30
    description: "AssessmentAndEconomics"
