meta:
  id: ap-technology-evaluation
  level: 4
  course: invoice-processing-and-follow-up
  type: output
  description: "Lead an enterprise AP technology evaluation — develop selection criteria, conduct vendor assessments, build business cases, and manage the RFP process for AP automation platforms"
  tags: [technology-selection, rfp, vendor-evaluation, expert]

state: {}

trigger: |
  As the AP Transformation Lead, you are managing
  the technology selection process for an enterprise
  AP automation platform. The company has narrowed
  to 4 vendors after initial screening. Design and
  execute the evaluation.

  COMPANY REQUIREMENTS:
  - 200,000 invoices/year across 3 business units
  - SAP S/4HANA ERP (recently migrated)
  - 15 currencies, 8 languages
  - Current touchless rate: 12%
  - Target touchless rate: 75% within 18 months
  - Budget: $1.5M implementation + $400K/year SaaS
  - Must support: OCR, ML classification, workflow,
    3-way matching, payment scheduling, analytics
  - SOX compliance required
  - Integration with existing vendor portal

  SHORTLISTED VENDORS:
  1. MegaAP Enterprise (large, established player)
     - Strengths: deep SAP integration, proven at scale
     - Concerns: expensive, complex implementation
     - Pricing: $1.8M impl + $500K/year

  2. CloudInvoice Pro (cloud-native mid-market)
     - Strengths: modern AI/ML, fast implementation
     - Concerns: limited enterprise references, newer
     - Pricing: $800K impl + $350K/year

  3. SAP Integrated AP (native SAP add-on)
     - Strengths: seamless SAP integration, single vendor
     - Concerns: less advanced AI, SAP vendor lock-in
     - Pricing: $1.2M impl + $420K/year

  4. GlobalProcess Suite (broad P2P platform)
     - Strengths: full procure-to-pay suite, strong analytics
     - Concerns: AP is one module of many, may be over-scoped
     - Pricing: $1.4M impl + $480K/year

  Design:
  1. Evaluation framework and scoring criteria
  2. RFP structure and key questions
  3. Demo and proof-of-concept plan
  4. Total cost of ownership analysis
  5. Risk assessment for each option
  6. Recommendation methodology

assertions:
  - type: llm_judge
    criteria: "Evaluation framework is weighted and comprehensive — scoring criteria organized by category with weights reflecting business priorities: Functional Capability (35%): OCR accuracy (multi-language, multi-format), ML classification and GL coding capability, matching engine sophistication (2/3-way, tolerance handling, partial matching), workflow configurability, payment scheduling and execution, exception management, analytics and reporting; Technical Architecture (20%): SAP S/4HANA integration depth (certified connector, real-time vs. batch, BAPI/IDoc/OData), cloud architecture (multi-tenant, data residency, scalability), API ecosystem (REST, webhooks, middleware requirements), security (SOC 2, ISO 27001, encryption), data migration approach; Implementation (15%): timeline to go-live (phase 1), implementation methodology, project team requirements (vendor + client), change management support, training approach; Vendor Viability (15%): financial stability, customer base and references (similar size/industry), product roadmap and R&D investment, support model (24/7, dedicated CSM, SLA); Total Cost of Ownership (15%): 5-year TCO including implementation, licensing, maintenance, internal resources, and estimated customization; each criterion scored 1-5 by evaluation team with consensus scoring methodology."
    weight: 0.35
    description: "EvaluationFramework"
  - type: llm_judge
    criteria: "RFP and proof-of-concept plan test real-world scenarios — RFP structure includes: company overview and requirements, mandatory requirements (pass/fail), scored requirements (weighted criteria), use case scenarios requiring detailed responses (not just checkboxes); key RFP questions that differentiate vendors: describe your approach to handling multi-PO invoices with partial deliveries across currencies, provide OCR accuracy benchmarks by language with sample sizes, describe your ML model training approach for GL coding (pre-trained vs. customer-specific, training data requirements, accuracy trajectory), explain your SAP S/4HANA integration architecture (direct vs. middleware, certified add-on, data flow diagram), describe your approach to achieving 75% touchless rate — what's your methodology and typical timeline; proof-of-concept plan: 3-4 week structured POC with standardized test data set (100 invoices representing all scenarios: multi-language, multi-currency, PO and non-PO, credit memos, complex matching scenarios); POC scoring: OCR accuracy by field and language, matching accuracy, GL coding accuracy, processing speed, user experience evaluation by AP team; reference checks: structured reference questionnaire covering implementation experience, actual touchless rates achieved, support quality, total cost vs. quoted cost, what they would do differently."
    weight: 0.35
    description: "RFPAndPOC"
  - type: llm_judge
    criteria: "TCO analysis and recommendation methodology account for hidden costs and risk — 5-year TCO for each vendor includes: license/subscription fees, implementation services, internal project team costs (PM, IT, AP resources), customization and integration development, data migration, training (initial + ongoing), ongoing support and maintenance, infrastructure (if applicable), upgrade and enhancement costs, estimated cost of internal resources for ongoing administration; hidden cost considerations: middleware requirements (if vendor doesn't have native SAP connector), custom report development, future module licensing, data storage overage fees, transaction volume overage fees, consultant rate escalation clauses; risk-adjusted TCO: apply risk multipliers for implementation timeline overrun (typical 20-40% for enterprise AP), scope creep, vendor pricing increases after initial term; the recommendation methodology produces: quantitative score (weighted evaluation criteria), qualitative assessment (cultural fit, strategic alignment, innovation trajectory), risk-adjusted TCO comparison, and final recommendation with clear rationale; the analysis acknowledges that CloudInvoice Pro's lower cost must be weighed against enterprise reference risk, while MegaAP's over-budget pricing needs negotiation strategy; the recommendation should NOT automatically default to the cheapest option — value, risk, and strategic fit must be balanced."
    weight: 0.30
    description: "TCOAndRecommendation"
