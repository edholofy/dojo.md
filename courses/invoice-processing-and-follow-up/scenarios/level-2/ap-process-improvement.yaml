meta:
  id: ap-process-improvement
  level: 2
  course: invoice-processing-and-follow-up
  type: output
  description: "Design AP process improvements — map current workflows, identify bottlenecks, implement automation opportunities, and measure performance improvements"
  tags: [process-improvement, workflow-optimization, automation, intermediate]

state: {}

trigger: |
  The VP Finance has asked you to improve the AP
  process. Current performance is below industry
  benchmarks across all key metrics.

  CURRENT AP METRICS:
  Metric                    | Current | Industry Avg | Best-in-Class
  --------------------------|---------|-------------|---------------
  Cost per invoice          | $14.50  | $8.00       | $2.50
  Processing time (days)    | 12      | 6           | 2
  Touchless rate            | 15%     | 45%         | 80%
  First-pass match rate     | 55%     | 75%         | 95%
  Invoices per FTE/month    | 1,200   | 2,500       | 5,000
  Discount capture rate     | 35%     | 55%         | 85%
  Duplicate payment rate    | 1.2%    | 0.5%        | 0.1%
  Exception rate            | 30%     | 15%         | 5%

  CURRENT PROCESS (as-is):
  1. Invoices arrive via mail (60%) and email (40%)
  2. Mail room sorts and scans invoices (1 day)
  3. AP clerk manually enters data (1-2 days)
  4. Clerk manually matches to PO (if applicable)
  5. Exceptions sent to buyer for resolution (3-5 days)
  6. Manager approval via email (1-3 days)
  7. Batch payment processing weekly (0-7 days wait)
  8. Check printing and mailing (1 day)

  AP TEAM:
  - 1 AP Manager
  - 6 AP Clerks
  - 1 AP Supervisor
  - Monthly volume: 7,200 invoices
  - Annual AP spend: $52M

  Design a process improvement program:
  1. Current-state process map with bottlenecks
  2. Future-state process design
  3. Technology recommendations
  4. Staffing impact analysis
  5. Implementation roadmap (12 months)
  6. ROI and business case

assertions:
  - type: llm_judge
    criteria: "Current-state analysis correctly identifies bottlenecks — the major bottlenecks are: (1) Mail handling (1 day delay for 60% of invoices — should be eliminated through electronic submission); (2) Manual data entry (1-2 days, 100% of invoices touched manually = 0% touchless — the biggest cost driver); (3) Exception resolution (3-5 days, 30% exception rate means 2,160 invoices/month need manual intervention — this is the longest single delay); (4) Email-based approval (1-3 days, no visibility into where approvals are stuck); (5) Weekly batch payments (up to 7 days waiting — prevents timely discount capture); the process map shows total cycle time of 7-19 days (avg 12) with each step's contribution; the root causes of the 30% exception rate are identified: poor PO data quality, vendor pricing inconsistencies, quantity mismatches from receiving, and missing PO references on invoices."
    weight: 0.35
    description: "CurrentStateAnalysis"
  - type: llm_judge
    criteria: "Future-state process design targets best-in-class metrics — the redesigned process: (1) Electronic invoice submission only (vendor portal or email-to-AP with OCR/AI extraction — eliminates mail room delay); (2) AI-powered data capture and GL coding (eliminates manual entry for 80%+ of invoices); (3) Automated 3-way matching with configurable tolerances (targets 95% first-pass match rate); (4) Workflow-based approval routing with mobile access and auto-escalation (reduces approval to <1 day); (5) Daily payment runs with automated discount detection (increases capture rate to 85%); (6) ACH/electronic payments default (eliminates check printing for 90%+ of payments); target metrics: cost per invoice $3-4, processing time 2-3 days, touchless rate 70-80%, first-pass match 90%+; the technology recommendations include: AP automation platform (Tipalti, Bill.com, AvidXchange, or SAP-native solution), OCR/AI engine, vendor portal, and electronic payment integration."
    weight: 0.35
    description: "FutureStateDesign"
  - type: llm_judge
    criteria: "Staffing impact and ROI justify the investment — staffing analysis: current 6 clerks processing 1,200 invoices/FTE/month; with automation targeting 5,000 invoices/FTE/month, the team could handle 7,200 invoices with 1.5 FTEs + 1 automation specialist; net reduction: 4-5 FTE positions (through attrition, redeployment, or reduction); however, recommend redeploying 2-3 clerks to higher-value roles (vendor management, analytics, exception resolution) rather than eliminating positions; ROI calculation: current annual cost: 8 FTEs × $60K avg salary = $480K + $14.50/invoice × 86,400 invoices = $1.25M total AP cost; future annual cost: 4 FTEs × $65K = $260K + $3.50/invoice × 86,400 = $302K + technology costs $100K/year = $662K; annual savings: ~$590K; technology implementation: $150-250K one-time; payback: 3-5 months; additional savings from discount capture increase and duplicate payment reduction add $150-200K/year; the 12-month implementation roadmap includes: months 1-3 (vendor selection, pilot), months 4-6 (rollout, training), months 7-9 (optimization), months 10-12 (measure and refine)."
    weight: 0.30
    description: "StaffingAndROI"
