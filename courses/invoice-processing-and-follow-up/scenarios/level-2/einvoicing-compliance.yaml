meta:
  id: einvoicing-compliance
  level: 2
  course: invoice-processing-and-follow-up
  type: output
  description: "Implement e-invoicing compliance — prepare for Peppol/UBL requirements, convert from PDF-based processing, and ensure VAT invoicing compliance across jurisdictions"
  tags: [e-invoicing, peppol, ubl, intermediate]

state: {}

trigger: |
  Your company (US-headquartered, with subsidiaries
  in Germany, France, and Belgium) must comply with
  upcoming EU e-invoicing mandates. Design the
  compliance implementation plan.

  CURRENT STATE:
  - All invoices received as PDF via email
  - Manual data entry into SAP
  - No EDI or structured e-invoicing
  - 3,500 vendor invoices/month in Europe
  - 800 customer invoices/month issued in Europe

  E-INVOICING MANDATES:
  Belgium: B2B e-invoicing mandatory from Jan 2026
  - All VAT-registered businesses
  - Peppol BIS 3.0 format required
  - Real-time reporting to tax authority

  France: Phased rollout starting Sep 2026
  - Large companies must issue e-invoices first
  - All companies must receive e-invoices
  - Chorus Pro or certified platform

  Germany: Mandatory B2B e-invoicing from Jan 2027
  - ZUGFeRD/XRechnung format
  - Integration with tax authority reporting

  YOUR SUBSIDIARIES:
  - Germany GmbH: 1,500 vendor invoices/month,
    500 customer invoices/month
  - France SAS: 1,200 vendor invoices/month,
    200 customer invoices/month
  - Belgium NV: 800 vendor invoices/month,
    100 customer invoices/month

  Create:
  1. Compliance gap assessment
  2. Technology solution recommendation
  3. Vendor communication plan
  4. Phased implementation timeline
  5. Testing and validation approach
  6. Cost-benefit analysis

assertions:
  - type: llm_judge
    criteria: "Gap assessment identifies all compliance requirements — for each country: Belgium (Jan 2026, most urgent): needs Peppol Access Point registration, UBL/Peppol BIS 3.0 invoice format support, integration with SAP for automated sending/receiving, vendor onboarding to Peppol network, real-time VAT reporting capability; France (Sep 2026): needs Chorus Pro registration or certified PDP (Plateforme de Dématérialisation Partenaire), support for Factur-X format (hybrid PDF/XML), e-reporting for B2C transactions; Germany (Jan 2027): needs XRechnung or ZUGFeRD support, Peppol or alternative delivery channel, integration with German tax authority reporting; the gap assessment maps current capabilities vs. requirements for each subsidiary; cross-cutting gaps: no structured e-invoicing capability, no Peppol connectivity, no automated VAT compliance reporting, SAP requires configuration for e-invoice processing."
    weight: 0.35
    description: "GapAssessment"
  - type: llm_judge
    criteria: "Technology solution is appropriate and scalable — recommends either: (1) An e-invoicing platform/service provider (Basware, Tradeshift, Tungsten, or similar) that acts as a Peppol Access Point and handles format conversion, or (2) SAP Document Compliance (if already on SAP S/4HANA) with country-specific modules; the solution must support: Peppol BIS 3.0 for Belgium, Factur-X/Chorus Pro for France, XRechnung/ZUGFeRD for Germany; bi-directional capability (both sending and receiving e-invoices); format conversion from PDF to structured XML for vendors not yet on e-invoicing; integration with SAP for automated posting; archiving with legal retention requirements (10+ years in most EU countries); the vendor communication plan includes: notification to all EU vendors about the upcoming changes, instructions for connecting via Peppol, a transition timeline, and support for vendors who need help adopting e-invoicing."
    weight: 0.35
    description: "TechnologySolution"
  - type: llm_judge
    criteria: "Implementation timeline is phased and realistic — Phase 1 (Q2-Q3 2025): Belgium preparation — select e-invoicing platform, register for Peppol, configure SAP integration, begin vendor outreach; Phase 2 (Q4 2025): Belgium go-live preparation — parallel testing, vendor onboarding to Peppol (target 80% of vendor volume), staff training; Phase 3 (Jan 2026): Belgium go-live — mandatory compliance; Phase 4 (Q1-Q2 2026): France preparation — register with Chorus Pro or PDP, configure Factur-X support; Phase 5 (Sep 2026): France go-live; Phase 6 (2026-2027): Germany preparation and go-live; the cost-benefit analysis includes: implementation costs (platform fees, SAP configuration, consulting), ongoing costs (per-transaction fees, platform subscription), and benefits (eliminated manual data entry for 3,500 invoices/month, reduced errors, faster processing, VAT reclaim optimization, compliance penalty avoidance); the estimated savings from automation alone (eliminating manual entry at $10-15/invoice × 3,500 = $35K-52K/month) should more than offset the platform costs."
    weight: 0.30
    description: "ImplementationTimeline"
