meta:
  id: early-payment-optimization
  level: 2
  course: invoice-processing-and-follow-up
  type: output
  description: "Optimize early payment discount capture — analyze discount opportunities, calculate annualized returns, design payment timing strategies, and implement dynamic discounting programs"
  tags: [early-payment, discount-optimization, cash-management, intermediate]

state: {}

trigger: |
  The CFO wants to optimize the company's early
  payment discount program. Currently, the company
  captures only 35% of available discounts. Analyze
  the current state and design an optimization plan.

  CURRENT PERFORMANCE:
  - Monthly AP volume: $4.2M across 800 invoices
  - Invoices with discount terms: 280 (35% of volume)
  - Discount terms breakdown:
    - 2/10 Net 30: 150 invoices, avg $8,500 each
    - 1/15 Net 45: 80 invoices, avg $6,200 each
    - 3/10 Net 60: 50 invoices, avg $12,000 each
  - Current discount capture rate: 35%
  - Reasons for missed discounts:
    - Invoice processing too slow (45%): invoice
      arrives but isn't entered until after the
      discount window
    - Cash unavailable (30%): timing mismatch
      between AR receipts and AP discount deadlines
    - Approval delays (25%): invoices stuck in
      approval workflow past discount date

  COMPANY FINANCIAL DATA:
  - Cost of capital (WACC): 8%
  - Line of credit available: $500K at 7% APR
  - Average AR collection: 42 days
  - Average cash balance: $350K
  - Cash conversion cycle: 68 days

  VENDOR RELATIONSHIPS:
  - Top 20 vendors represent 65% of AP spend
  - 5 strategic vendors have expressed interest in
    dynamic discounting
  - 3 vendors offer sliding scale discounts

  Design a comprehensive discount optimization
  program:
  1. Financial analysis of discount capture value
  2. Process improvements to increase capture rate
  3. Dynamic discounting proposal
  4. Cash management strategy
  5. ROI projection for the optimization program

assertions:
  - type: llm_judge
    criteria: "Financial analysis quantifies the full discount opportunity — calculates total available discounts: 2/10 Net 30 group: 150 × $8,500 × 2% = $25,500/month; 1/15 Net 45 group: 80 × $6,200 × 1% = $4,960/month; 3/10 Net 60 group: 50 × $12,000 × 3% = $18,000/month; total monthly discount opportunity: $48,460; currently capturing 35% = $16,961/month; missing $31,499/month = $377,988/year in available discounts; calculates annualized returns: 2/10 Net 30 APR = (2/98) × (365/20) = 37.2%; 1/15 Net 45 APR = (1/99) × (365/30) = 12.3%; 3/10 Net 60 APR = (3/97) × (365/50) = 22.6%; all significantly exceed the 8% WACC, making every discount worth pursuing, even if financed with the 7% line of credit."
    weight: 0.35
    description: "FinancialAnalysis"
  - type: llm_judge
    criteria: "Process improvements address all three root causes — for slow processing (45% of missed discounts): implement OCR/AI invoice capture for same-day data entry, create a 'discount eligible' priority queue that fast-tracks invoices with discount terms, establish a 2-day SLA for invoice entry; for cash unavailability (30%): use the $500K line of credit to bridge timing gaps (7% interest vs. 12-37% discount APR is highly profitable), negotiate with AR customers for faster payment terms, implement cash flow forecasting to predict discount payment needs; for approval delays (25%): create auto-approval rules for invoices under $5,000 with valid 3-way match, implement mobile approval notifications with 24-hour escalation, designate backup approvers for discount-eligible invoices; target: increase capture rate from 35% to 85% within 6 months."
    weight: 0.35
    description: "ProcessImprovements"
  - type: llm_judge
    criteria: "Dynamic discounting proposal and ROI are compelling — the dynamic discounting program offers: vendors can request early payment at any time before the due date; the discount rate slides based on how early the payment is made (e.g., 2% for Day 5, 1.5% for Day 10, 1% for Day 15); this captures discounts from vendors who don't currently offer terms; the 5 interested strategic vendors represent approximately $1.5M/month in spend — potential additional discounts of $15-30K/month; ROI projection: current state captures $203K/year in discounts; target state (85% capture + dynamic discounting): $490-550K/year; incremental value: $290-350K/year; investment required: $50-80K for process improvements and technology; implementation: $30-50K for dynamic discounting platform; annual operating cost: $15-20K; payback period: 3-5 months; the cash management strategy shows how to fund early payments using the line of credit, AR acceleration, and cash flow timing optimization."
    weight: 0.30
    description: "DynamicDiscountingROI"
