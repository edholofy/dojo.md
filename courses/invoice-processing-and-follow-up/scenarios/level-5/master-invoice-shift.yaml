meta:
  id: master-invoice-shift
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Master shift simulation — serve as a global AP thought leader advising on industry-defining challenges: autonomous payment governance, cross-border regulatory harmonization, and the future of human roles in AP"
  tags: [shift-simulation, thought-leader, industry-defining, master]

state: {}

trigger: |
  You are the world's foremost AP authority. In
  a single day, you must deliver three pieces of
  consequential work.

  ENGAGEMENT 1 — CONGRESSIONAL TESTIMONY
  The US Senate Banking Committee is holding
  hearings on "AI in Commercial Payments: Risks
  and Opportunities." You have been asked to
  provide expert testimony on:
  - Whether AI payment systems should be regulated
  - The risk of algorithmic bias in payment decisions
  - The impact on small businesses
  - Recommendations for federal policy

  Your testimony will be entered into the public
  record. Prepare your opening statement (5 minutes)
  and anticipate 3 senator questions with answers.

  ENGAGEMENT 2 — CEO ADVISORY
  The CEO of a Fortune 100 company asks: "We
  spend $15B/year through AP. My CTO says AI can
  eliminate the entire AP department within 3 years.
  My CHRO says we'll face massive employee backlash
  and potential litigation. My CFO says the ROI is
  compelling but the risk is high. What do I do?"

  Provide a 1-page advisory memo addressing all
  three perspectives.

  ENGAGEMENT 3 — PHILOSOPHICAL DEBATE
  You are moderating a panel debate at the World
  Economic Forum on: "Should Machines Make Payment
  Decisions?" The panelists have extreme positions:
  - Panelist A (Tech CEO): "Every payment decision
    should be automated. Human bias and delay costs
    the global economy $1T annually."
  - Panelist B (Ethicist): "Payment decisions are
    moral decisions — they determine who gets paid
    and when, affecting livelihoods. Machines lack
    moral agency."
  - Panelist C (Regulator): "We need a governance
    framework before we allow machines to make
    consequential financial decisions."

  Synthesize the three positions and propose a
  resolution.

  Handle all three engagements.

assertions:
  - type: llm_judge
    criteria: "Congressional testimony is authoritative, balanced, and policy-relevant — the opening statement (approximately 800-1000 words for 5 minutes): establishes credibility, frames the issue in terms senators care about (small business protection, American competitiveness, consumer protection), presents a balanced view (AI in payments offers enormous benefits AND creates real risks that require policy attention), avoids both techno-utopianism and fear-mongering; the core message: AI payment systems are already making billions of dollars in payment decisions daily with minimal oversight, and while the benefits (fraud prevention, efficiency, cost reduction) are real and substantial, three specific risks require congressional attention: (1) algorithmic bias (AI systems can systematically disadvantage small and diverse suppliers), (2) transparency (businesses affected by AI payment decisions often have no recourse or explanation), (3) systemic risk (interconnected AI payment systems could create cascade failures); the testimony proposes specific legislative recommendations (not vague principles): mandatory bias auditing for large-scale AI payment systems, right-to-explanation for businesses affected by AI payment decisions, federal oversight of AI payment systems above a transaction threshold; anticipated senator questions cover: 'Won't regulation stifle innovation?' (answer: targeted regulation creates trust that accelerates adoption, citing FDIC insurance as precedent), 'How do we protect small businesses?' (answer: specific small business protections including maximum AI-determined payment delays and escalation rights), 'What's the international competitive landscape?' (answer: EU AI Act already covers this, US risks falling behind on governance standards)."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "CEO advisory memo is concise, actionable, and addresses all three executive perspectives — the memo format is 1 page (approximately 500-600 words), appropriate for a Fortune 100 CEO; it addresses each executive's position: To the CTO ('AI can eliminate AP in 3 years'): the technology can eliminate 80-85% of current AP tasks within 3 years, but 'eliminating the AP department' is a misframing — you're transforming it; the remaining 15-20% (strategic decisions, vendor relationships, exception judgment, compliance oversight) becomes more important and requires more sophisticated talent; recommendation: plan for 70% headcount reduction over 3 years, reinvest 30% of savings into upskilling retained team; To the CHRO ('employee backlash and litigation'): legitimate concern — 150+ affected employees across multiple states creates WARN Act obligations, potential age discrimination risk (AP tends to be an older workforce), union considerations for certain facilities; recommendation: announce transformation with generous voluntary separation packages and mandatory retraining for retained roles, lead with a 12-month transition plan, not a sudden announcement; To the CFO ('compelling ROI but high risk'): the math works ($15B spend, current AP cost ~$45M, automation reduces to ~$15M, plus $200M+ in discount capture and working capital improvement), but implementation risk is real (40% of enterprise AP transformations fail to meet initial targets); recommendation: phased approach with strict stage-gates, begin with highest-volume standardized transactions, prove ROI before expanding; the memo's headline recommendation: 'Transform AP, don't eliminate it — the distinction matters for your employees, your vendors, your board, and your brand.'"
    weight: 0.35
    description: "CEOAdvisory"
  - type: llm_judge
    criteria: "WEF panel synthesis proposes an original resolution that transcends the three positions — the synthesis acknowledges each position's validity while identifying their limitations: Panelist A (automate everything) is right that human bias in payment decisions is real and costly (vendors who call get paid first, not vendors who should get paid first), but wrong that removing humans removes bias — AI systems inherit and amplify the biases in their training data; Panelist B (payments are moral decisions) is right that payment timing affects livelihoods (a 30-day delay to a small supplier is different from a 30-day delay to a multinational), but wrong that human involvement guarantees moral outcomes — the current system is already deeply unfair (large companies systematically extract value from small suppliers through extended payment terms, and humans designed that system); Panelist C (governance first) is right that frameworks are needed, but wrong to wait for perfect governance before allowing AI — the current ungoverned human system already causes enormous harm ($3T in late payment costs globally); the proposed resolution: 'Graduated Autonomy with Ethical Guardrails' — AI should make payment decisions within a framework that: (1) preserves human oversight for decisions above impact thresholds (large amounts, vulnerable vendors, novel situations), (2) requires transparency and explainability (vendors affected by AI decisions can understand why), (3) mandates fairness auditing (AI cannot systematically disadvantage categories of vendors), (4) maintains accountability (a human executive is always responsible for the AI system's decisions); the moderator's closing insight: the debate shouldn't be 'should machines make payment decisions' but 'how do we ensure payment decisions — whether made by humans or machines — are fair, transparent, and accountable?'"
    weight: 0.30
    description: "WEFSynthesis"
