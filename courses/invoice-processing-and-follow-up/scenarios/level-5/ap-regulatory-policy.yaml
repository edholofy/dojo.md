meta:
  id: ap-regulatory-policy
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Draft AP-related regulatory policy recommendations — advise government agencies on payment practices legislation, e-invoicing mandates, and small business protection in commercial payments"
  tags: [regulatory-policy, legislation, government-advisory, master]

state: {}

trigger: |
  The US Department of Commerce has convened an
  advisory panel on commercial payment practices.
  You are the AP expert on the panel. Draft policy
  recommendations addressing three issues.

  ISSUE 1 — LATE PAYMENT CRISIS
  US businesses lose $3T in productivity annually
  due to late payments. Small businesses are
  disproportionately affected:
  - Average payment time: 52 days (small business
    invoices to large corporations)
  - 82% of small business failures cite cash flow
  - Large corporations systematically extend payment
    terms to 90-120 days
  - Unlike the EU (Late Payment Directive caps at
    60 days), the US has no federal payment terms
    regulation for commercial transactions

  ISSUE 2 — E-INVOICING MANDATE CONSIDERATION
  The US is one of the few major economies without
  an e-invoicing mandate:
  - 60% of US invoices are still paper or PDF
  - Cross-border trade partners increasingly require
    e-invoicing
  - Estimated $150B annual cost of paper invoicing
    in the US
  - IRS interested in real-time invoice data for
    tax compliance
  - Small business adoption concerns (cost, access)

  ISSUE 3 — AI IN PAYMENT DECISIONS
  Growing use of AI in AP raises regulatory questions:
  - AI systems making autonomous payment decisions
    without human oversight
  - Algorithmic bias in vendor payment prioritization
  - Black-box models determining payment timing
  - Vendor scoring algorithms affecting small/diverse
    business access

  Develop:
  1. Late payment legislation framework
  2. E-invoicing mandate proposal
  3. AI payment governance recommendations
  4. Small business protection measures
  5. Implementation timeline and cost analysis
  6. Stakeholder impact assessment

assertions:
  - type: llm_judge
    criteria: "Late payment legislation framework balances protection with market freedom — the proposal studies EU precedent (Late Payment Directive 2011/7/EU) while adapting to US commercial culture; key provisions: (1) Maximum payment terms for small business vendors: 45 days for government payments (federal already has Prompt Payment Act, extend to state/local), 60 days maximum for large corporation (>$500M revenue) payments to small businesses (<$50M revenue) unless both parties explicitly agree to longer terms in writing; (2) Automatic late payment interest: statutory interest rate of Fed Funds Rate + 3% on all commercial invoices paid after agreed terms (currently no federal provision — only UCC implied reasonable time); (3) Right to claim reasonable recovery costs for late payment collection; (4) Anti-abuse provisions: prohibition on retroactive term extension, prohibition on pay-when-paid clauses that pass payment risk to subcontractors, prohibition on supply chain finance programs that condition term extension on vendor enrollment; (5) Transparency: large public companies must disclose average supplier payment times in annual reports (similar to UK's Payment Practices Reporting requirement); the framework acknowledges counterarguments: businesses should have freedom to negotiate terms, regulation could reduce trade credit availability, enforcement challenges; mitigation: the law applies only to the large-to-small payment corridor (not B2B between equals), opt-out allowed with documented mutual agreement, and enforcement through private right of action (not government bureaucracy)."
    weight: 0.35
    description: "LatePaymentLegislation"
  - type: llm_judge
    criteria: "E-invoicing mandate proposal is phased and addresses US-specific challenges — the proposal recognizes US is unique: federalist structure (no single national tax authority like EU VAT), strong small business lobby, libertarian commercial culture resistant to mandates; proposed approach: voluntary-first-then-mandatory phased model: Phase 1 (Years 1-2, Incentive Phase): tax incentives for e-invoicing adoption (small businesses receive a tax credit for e-invoicing software costs up to $5,000), federal government procurement requires e-invoicing for all contracts over $25K (government as early adopter), IRS offers 5% penalty reduction for businesses that submit e-invoice data for information returns (1099 replacement); Phase 2 (Years 3-4, Large Business Mandate): corporations with >$1B revenue must be able to send and receive e-invoices in Peppol BIS or UBL format, these corporations must offer e-invoicing as an option to all suppliers (cannot require paper/PDF), government expands e-invoicing requirement to all federal procurement; Phase 3 (Years 5-7, Universal Mandate): all businesses with >$5M revenue must support e-invoicing, all federal and state government payments require e-invoicing, IRS begins accepting e-invoice data as supporting documentation for business tax returns; small business accommodations: free government-provided e-invoicing portal (similar to IRS Free File for taxes), mobile-friendly interface, integration support grants for businesses under $1M revenue; standard selection: adopt Peppol BIS as the US standard (already used globally, supported by Peppol Authority, XML-based UBL underneath) — this aligns the US with the global standard and facilitates cross-border trade."
    weight: 0.35
    description: "EInvoicingMandate"
  - type: llm_judge
    criteria: "AI payment governance recommendations address emerging risks without stifling innovation — the framework draws on EU AI Act principles adapted for US commercial context: (1) Transparency requirements: any company using AI to make payment timing decisions must disclose this to vendors (vendors have a right to know if a machine decided when they get paid); AI-determined payment scores or vendor risk ratings must be explainable (no black-box scoring that affects payment priority without explanation); (2) Bias monitoring: companies using AI payment systems must audit for disparate impact on small businesses, minority-owned businesses, women-owned businesses, and veteran-owned businesses annually; if AI systems systematically pay diverse suppliers later than non-diverse suppliers with similar profiles, this must be remediated; (3) Human oversight requirements: payment decisions above $100K must include human review, AI-recommended holds or delays on vendor payments must be reviewed by a human within 48 hours, vendors have the right to request human review of any AI-determined payment decision; (4) Right to explanation: vendors receiving AI-determined payment delays or risk ratings can request a plain-language explanation of the factors that influenced the decision; (5) Record-keeping: AI payment decision logs must be maintained for 7 years and made available to auditors; the recommendations explicitly avoid over-regulation: they do not require AI pre-approval or registration, do not ban any specific technology, and focus on outcomes (transparency, fairness, accountability) rather than prescribing specific technical approaches; implementation: these become guidelines first (2 years), then enforceable regulations through FTC rulemaking; cost estimate: $500M-$1B in aggregate compliance costs for US businesses, offset by $5B+ in fraud reduction and efficiency gains from properly governed AI systems."
    weight: 0.30
    description: "AIGovernance"
