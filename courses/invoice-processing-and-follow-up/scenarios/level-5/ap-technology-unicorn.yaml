meta:
  id: ap-technology-unicorn
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an AP technology startup — create the business plan for an AI-powered AP platform targeting the underserved mid-market, from product vision through Series A"
  tags: [startup, business-plan, product-vision, master]

state: {}

trigger: |
  You are pitching a venture-backed AP technology
  startup to Series A investors. The company has
  built an AI-first AP platform that achieves 90%+
  touchless processing out of the box, without the
  6-12 month implementation timelines of incumbent
  solutions. Design the complete business plan.

  MARKET OPPORTUNITY:
  - $5.2B AP automation market (2026), growing 12% CAGR
  - 500,000+ mid-market companies ($50M-$1B revenue)
    with under-automated AP
  - Incumbent solutions (SAP Concur, Coupa, Basware)
    are complex, expensive, and require long
    implementations
  - Average mid-market AP: 15 FTEs, 50,000 invoices/
    year, $12/invoice, $600K annual AP cost
  - 65% of mid-market companies still primarily
    manual or semi-manual AP

  PRODUCT DIFFERENTIATION:
  - "Zero-configuration AI" — pre-trained models
    that work on day 1 without customer training data
  - Self-serve onboarding (go live in 48 hours, not
    6 months)
  - Consumption-based pricing (pay per invoice, not
    per seat or annual license)
  - Native ERP integration connectors (pre-built for
    top 15 ERPs)
  - Embedded working capital analytics (not just
    processing — strategic insights)

  CURRENT TRACTION:
  - MVP live for 8 months
  - 45 paying customers
  - $1.2M ARR, growing 25% month-over-month
  - 92% touchless rate (average across customers)
  - NPS: 72
  - CAC: $8,000 (primarily product-led growth)
  - Gross margin: 78%

  Develop:
  1. Vision and product strategy
  2. Go-to-market strategy
  3. Financial model (to Series B)
  4. Competitive positioning
  5. Team and hiring plan
  6. Series A pitch narrative

assertions:
  - type: llm_judge
    criteria: "Product vision and strategy articulate a compelling platform play — the vision goes beyond 'AP automation' to 'the financial operating system for mid-market companies'; the product roadmap: Phase 1 (current, AP Automation Core): AI-powered invoice capture, matching, coding, approval workflows, payment scheduling — this is the entry point and current product; Phase 2 (next 12 months, Working Capital Intelligence): embedded analytics that show customers their DPO trends, discount optimization opportunities, payment timing recommendations, vendor risk scores — this transforms the product from a cost-reduction tool to a strategic platform; Phase 3 (18-24 months, AP-as-a-Platform): open API enabling ecosystem: supply chain finance partners can offer financing through the platform, banks can offer virtual card programs, vendor management tools can integrate — the platform becomes the hub of the mid-market financial workflow; the 'zero-configuration AI' is the key differentiator and should be explained technically: the AI models are pre-trained on 50M+ invoices across industries, using transfer learning to achieve 90%+ accuracy without customer-specific training; the models improve per-customer through active learning (corrections feed back into the model), reaching 97%+ accuracy within 30 days; this eliminates the biggest barrier to AP automation adoption in mid-market: the 6-12 month implementation with expensive consultants."
    weight: 0.35
    description: "ProductVision"
  - type: llm_judge
    criteria: "Go-to-market strategy and financial model demonstrate a path to $100M ARR — GTM strategy: product-led growth (PLG) as primary motion: free trial (process 100 invoices free), self-serve onboarding, in-product expansion prompts; supplemented by: content marketing (AP benchmarking tools, ROI calculators), partnerships with mid-market accounting firms and ERP consultants, targeted outbound for companies with 25,000+ invoices/year; pricing: consumption-based at $0.50-$1.50 per invoice processed (tiered by volume), which means: a 50,000 invoice/year company pays $25-75K/year (compared to current $600K AP cost = 4-12% of the cost they're currently spending); expansion revenue: working capital analytics ($500/month add-on), advanced reporting ($300/month), API access ($200/month), premium support ($1,000/month); financial model: current: $1.2M ARR, 45 customers, $26.7K average ACV; Year 1 (post-Series A): scale to 200 customers, $6M ARR, invest in sales team (5 AEs), expand engineering; Year 2: 600 customers, $20M ARR, launch Phase 2 (Working Capital Intelligence), raise Series B ($30-40M at $200M+ valuation); Year 3: 1,500 customers, $55M ARR, international expansion; Year 5: 4,000+ customers, $120M+ ARR, profitable; unit economics: CAC $8,000 (PLG), ACV $30K+ (growing with expansion), LTV/CAC > 10x, payback period < 4 months, gross margin 78% → 82% at scale, net revenue retention 130%+ (volume growth + add-on adoption)."
    weight: 0.35
    description: "GTMAndFinancials"
  - type: llm_judge
    criteria: "Series A pitch narrative and competitive positioning are investor-ready — the pitch narrative follows a compelling arc: Problem (AP is broken for mid-market — enterprise solutions are too expensive and complex, point solutions don't integrate, manual processes cost $12/invoice); Insight (AI has reached the point where 90%+ accuracy is achievable out-of-box — the implementation barrier is no longer technical, it's go-to-market); Solution (zero-configuration AI platform with self-serve onboarding, consumption pricing); Traction ($1.2M ARR, 25% MoM growth, 92% touchless, 72 NPS — product-market fit is proven); Market ($5.2B and growing, 500K potential customers, $15B+ SAM with platform expansion); Team and ask ($15M Series A for: engineering expansion, sales team build-out, Phase 2 product development); competitive positioning: vs. Incumbents (Basware, Coupa, SAP): 'They sell to enterprises with 6-month implementations — we sell to mid-market with 48-hour go-live; they charge $100K+/year — we charge based on usage; they require consultants — we're self-serve'; vs. Point solutions (Bill.com, Stampli): 'They automate pieces — we automate the entire AP workflow end-to-end; they're invoice capture — we're working capital intelligence'; vs. ERP-native (SAP AP, Oracle AP): 'They're modules within a larger system — we're purpose-built and AI-first; our AI accuracy exceeds theirs because it's our entire focus'; the pitch addresses the key investor question: 'Why now?' — convergence of AI capability (transformer models for document understanding), mid-market digital adoption (accelerated by pandemic), consumption pricing normality (mid-market now expects pay-as-you-go), and ERP API availability (modern ERPs expose APIs that enable plug-and-play integration)."
    weight: 0.30
    description: "PitchAndCompetitive"
