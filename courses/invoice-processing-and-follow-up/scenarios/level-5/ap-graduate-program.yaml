meta:
  id: ap-graduate-program
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Design a graduate-level AP curriculum — create an MBA elective course on strategic accounts payable management covering theory, practice, and emerging frontiers"
  tags: [graduate-curriculum, academic, pedagogy, master]

state: {}

trigger: |
  A top business school wants to offer an MBA
  elective titled "Strategic Accounts Payable:
  The Hidden Driver of Corporate Value." This
  is the first graduate-level course dedicated
  to AP as a strategic function. Design the
  complete curriculum.

  COURSE PARAMETERS:
  - 14-week semester, 3 hours/week (42 contact hours)
  - MBA students with finance/operations backgrounds
  - Mix of lectures, cases, simulations, and
    guest speakers
  - Assessment: 30% individual assignments, 30%
    group project, 20% final exam, 20% participation

  COURSE OBJECTIVES:
  - Demonstrate AP's impact on corporate valuation
    (working capital, cash conversion cycle, cost
    of capital implications)
  - Develop competency in AP transformation
    leadership
  - Apply financial theory to payment optimization
  - Understand the technology landscape and
    evaluate automation investments
  - Prepare students for AP leadership roles in
    the AI era

  UNIQUE POSITIONING:
  - No other business school offers a dedicated
    AP course
  - Most MBA programs cover AP only as a line item
    in working capital discussions
  - The course should demonstrate that AP is a
    $2T+ global function deserving strategic
    attention at the executive level

  Design:
  1. Course structure and weekly topics
  2. Teaching cases (original, HBS-style)
  3. Simulation exercise design
  4. Assessment methodology
  5. Guest speaker strategy
  6. Course materials and readings

assertions:
  - type: llm_judge
    criteria: "Course structure progresses logically from foundations to frontier topics — Week 1: AP and Corporate Value Creation — why AP matters for firm valuation (link DPO to free cash flow to enterprise value using DCF models), the AP value chain, industry overview ($2T+ global function); Week 2: The Economics of Payment Timing — time value of money applied to payables, optimal payment theory, trade-off between DPO extension and vendor relationship capital; Week 3: Working Capital Strategy and AP's Role — cash conversion cycle, AP's interaction with AR and inventory, working capital management frameworks (Dell case study for negative CCC); Week 4: Payment Methods and Financial Innovation — ACH, wire, virtual cards, real-time payments, CBDC implications, payment economics and network effects; Week 5: Supply Chain Finance — reverse factoring, dynamic discounting, deep-tier financing, financial supply chain theory; Week 6: AP Technology and AI — OCR/ML/NLP for invoice processing, automation ROI methodology, technology selection frameworks; Week 7: Midterm Case Analysis; Week 8: Fraud, Controls, and Corporate Governance — AP fraud taxonomy, internal control theory (COSO framework applied to AP), SOX implications, behavioral aspects of fraud; Week 9: Global AP and Cross-Border Complexity — multi-currency, multi-jurisdiction compliance, transfer pricing, e-invoicing mandates; Week 10: Organizational Design for AP — centralized vs. decentralized, shared services theory, outsourcing vs. insourcing decision frameworks; Week 11: AP Analytics and Data-Driven Decision Making — predictive analytics, vendor risk modeling, working capital forecasting; Week 12: AP Transformation Leadership — change management theory applied to AP, stakeholder management, building the business case; Week 13: The Future of AP — autonomous finance, blockchain/DLT in payments, AI agents, ethical considerations; Week 14: Group Project Presentations and Course Synthesis."
    weight: 0.35
    description: "CourseStructure"
  - type: llm_judge
    criteria: "Teaching cases are original and pedagogically rich — at least 3 original HBS-style teaching cases: Case A (Week 3-4, 'PayOptima Corp: The DPO Dilemma'): a CFO must decide whether to extend payment terms from Net 30 to Net 60 to improve working capital — financial model shows $40M freed up, but key vendors are threatening to raise prices or leave; students must calculate the true net benefit considering: vendor price increases, supply chain risk, discount loss, relationship capital destruction; teaching note reveals that the 'optimal' answer depends on the company's cost of capital relative to vendor financing costs — not a simple DPO maximization; Case B (Week 8, 'The Ghost in the Machine: AP Fraud at MedCorp'): a healthcare company discovers a $4.5M ghost vendor scheme that ran for 3 years despite annual audits; case walks through the fraud scheme, the control failures, and the investigation; students must: identify the red flags that should have been caught, design the control improvements, and address the ethical dimensions (the fraudster was a single mother under financial stress — does this affect the response?); Case C (Week 10-11, 'GlobalTech's AP Transformation'): a technology company's 3-year AP transformation journey with real financial data; students analyze the business case, design the implementation approach, and address the organizational resistance; the case includes a twist — midway through implementation, a major acquisition adds 5 new country operations; each case has a detailed teaching note with discussion questions, analysis framework, and multiple defensible positions."
    weight: 0.35
    description: "TeachingCases"
  - type: llm_judge
    criteria: "Simulation and assessment demonstrate applied learning — the simulation exercise (spanning Weeks 5-6, contributing to the group project): 'AP Strategy Simulation' — teams of 4-5 students run the AP function for a simulated company over 8 'quarters' (compressed into 4 class sessions); each quarter presents: a set of invoices to process with varying complexity, payment decisions (which discounts to take, which vendors to prioritize), vendor relationship events (vendor requests term changes, vendor financial distress signals, new vendor onboarding), technology investment decisions (automate now or wait?), and a crisis event (fraud attempt, compliance audit, system failure); teams compete on a balanced scorecard: DPO (working capital), cost per invoice (efficiency), vendor satisfaction score (relationship), compliance score (audit readiness), and cash management (discount capture minus late fees); the simulation teaches: the interconnectedness of AP decisions (optimizing DPO hurts vendor satisfaction, taking all discounts requires more cash), the importance of data-driven decision-making, and the challenge of balancing short-term financial optimization with long-term strategic relationships; assessment methodology: individual assignments require quantitative analysis (calculate APR of discount terms, build a payment optimization model, analyze an AP technology RFP), group project is a full AP transformation proposal for a real company (anonymized), final exam combines quantitative problems with essay questions requiring strategic reasoning; guest speaker strategy: CFO discussing AP's impact on valuation, AP technology CEO, former fraudster (reformed) discussing AP fraud schemes, regulatory official discussing e-invoicing mandates — each speaker tied to that week's topic."
    weight: 0.30
    description: "SimulationAndAssessment"
