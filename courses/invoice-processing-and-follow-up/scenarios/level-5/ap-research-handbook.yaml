meta:
  id: ap-research-handbook
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Write the introduction and framework chapter for a definitive AP research handbook — synthesize academic and practitioner knowledge, identify research gaps, and propose theoretical frameworks for AP as an academic discipline"
  tags: [research-handbook, academic, theory-building, master]

state: {}

trigger: |
  You are the editor of "The Oxford Handbook of
  Accounts Payable and Commercial Payments" — the
  first comprehensive academic reference on AP.
  Write the introductory chapter that establishes
  AP as a legitimate field of academic inquiry.

  CHAPTER REQUIREMENTS:
  - Establish why AP deserves academic attention
    (it's a $2T+ global function affecting every
    business, yet has almost no dedicated academic
    literature)
  - Review what existing literature touches on AP
    (working capital, trade credit, supply chain
    finance, payment systems, financial technology)
  - Propose theoretical frameworks for studying AP
  - Identify the most important research gaps
  - Provide a roadmap for the handbook's 25 chapters
  - Include a formal academic bibliography

  THEORETICAL LENSES TO CONSIDER:
  - Transaction cost economics (Williamson)
  - Agency theory (Jensen & Meckling)
  - Resource-based view (Barney)
  - Information asymmetry (Akerlof)
  - Network effects and platform economics
  - Behavioral economics
  - Institutional theory

  TARGET AUDIENCE:
  - Accounting and finance academics
  - Operations management researchers
  - Information systems researchers
  - Doctoral students seeking research topics
  - Thoughtful practitioners

  Write:
  1. Chapter introduction and motivation
  2. Literature review organizing existing AP-adjacent research
  3. Theoretical framework proposals
  4. Research gap analysis
  5. Handbook roadmap (25 chapter descriptions)
  6. Bibliography

assertions:
  - type: llm_judge
    criteria: "The chapter convincingly argues for AP as an academic field — the opening section makes a compelling case: AP processes over $100T annually in global commercial payments, yet has virtually no dedicated academic literature; by contrast, fields like marketing (smaller economic footprint) have hundreds of journals; the 'academic neglect' of AP is attributed to three factors: (1) AP has historically been viewed as a clerical, non-strategic function (unworthy of academic attention), (2) AP sits at the intersection of multiple disciplines (accounting, finance, operations, IT) and thus falls between academic silos, (3) data access is difficult (AP data is proprietary and sensitive); the chapter argues that AP's transformation through AI and automation creates urgent academic questions that no existing field adequately addresses: how should organizations govern autonomous payment systems? What is the optimal balance between working capital optimization and supply chain resilience? How do payment practices affect economic inequality (large corporations extracting value from small suppliers through extended terms)? The literature review organizes existing research into 5 streams: (1) Trade credit theory (finance literature — Petersen & Rajan 1997, Ng et al. 1999 on trade credit terms), (2) Working capital management (accounting literature — Deloof 2003, Baños-Caballero et al. 2014), (3) Supply chain finance (operations literature — Hofmann 2005, Wuttke et al. 2013), (4) Payment systems (economics/IT literature — payments infrastructure, digital money), (5) Automation and AI in accounting (IS literature — emerging); the review demonstrates that each stream touches on AP but none addresses it holistically."
    weight: 0.35
    description: "AcademicMotivation"
  - type: llm_judge
    criteria: "Theoretical frameworks are rigorously applied to AP phenomena — the chapter proposes three primary theoretical frameworks: Framework 1 — AP as Transaction Cost Governance: Williamson's TCE framework applied to explain why companies organize AP differently (in-house, shared services, outsourced); the key variables are asset specificity (how specialized is the AP knowledge?), uncertainty (how unpredictable are invoice volumes and complexity?), and frequency (how often are transactions processed?); this framework predicts that companies with high AP complexity and uncertainty should keep AP in-house, while standardized high-volume AP should be outsourced; testable hypotheses generated; Framework 2 — The Information Asymmetry of Payment: Akerlof's market for lemons applied to the buyer-supplier payment relationship; the buyer has superior information about their own cash position and payment intentions, creating information asymmetry that suppliers cannot resolve; this explains: why suppliers offer early payment discounts (reducing adverse selection risk), why supply chain finance exists (a third party with information about the buyer's creditworthiness reduces asymmetry), and why payment data platforms create value (they reduce information asymmetry between buyers and suppliers); Framework 3 — AP as Organizational Capability (RBV): Barney's resource-based view applied to argue that AP excellence can be a source of sustained competitive advantage; an organization with superior AP capability achieves: lower cost of procurement (through better vendor relationships and terms), better working capital (through optimal payment timing), lower risk (through fraud prevention and compliance), and supply chain resilience (through vendor financial health management); these capabilities are valuable, rare, inimitable (built over years of institutional knowledge), and non-substitutable — meeting all VRIN criteria for sustained competitive advantage; each framework generates specific, testable research propositions that doctoral students can pursue."
    weight: 0.35
    description: "TheoreticalFrameworks"
  - type: llm_judge
    criteria: "Research gaps and handbook roadmap provide a comprehensive research agenda — the research gap analysis identifies 10 high-priority gaps: (1) No longitudinal studies of AP automation ROI (vendor claims are abundant, independent evidence is almost nonexistent), (2) No causal analysis of payment timing and supplier outcomes (correlational only), (3) AI governance in AP is unstudied (how should autonomous payment systems be overseen?), (4) Behavioral aspects of AP decision-making are unexplored (how do cognitive biases affect payment timing, invoice coding, fraud detection?), (5) Cross-country comparative studies of AP regulation effectiveness are minimal, (6) The relationship between AP practices and economic inequality is unexamined, (7) Cybersecurity and fraud in AP lacks academic rigor, (8) ESG implications of payment practices are unstudied, (9) Platform economics of e-invoicing networks need theoretical grounding, (10) The impact of real-time payments on working capital theory is unexplored; the 25-chapter handbook roadmap covers 5 parts: Part I Foundations (chapters 1-5: intro, history of commercial payments, trade credit theory, AP organizational models, AP metrics and benchmarking); Part II Operations (chapters 6-10: invoice processing, matching and validation, payment execution, vendor management, compliance and controls); Part III Technology (chapters 11-15: AP automation, AI/ML in invoice processing, e-invoicing standards, blockchain and payments, real-time payment systems); Part IV Strategy (chapters 16-20: working capital optimization, supply chain finance, AP governance, organizational design, transformation management); Part V Frontiers (chapters 21-25: AI governance, cross-border complexity, ESG and payments, behavioral AP, the future of commercial payments); each chapter description includes: research questions addressed, suggested methodology, expected contribution."
    weight: 0.30
    description: "ResearchGapsAndRoadmap"
