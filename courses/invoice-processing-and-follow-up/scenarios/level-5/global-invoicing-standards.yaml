meta:
  id: global-invoicing-standards
  level: 5
  course: invoice-processing-and-follow-up
  type: output
  description: "Develop global invoicing standards — propose a universal e-invoicing framework, harmonize cross-border requirements, and design interoperability standards for the global invoice ecosystem"
  tags: [global-standards, e-invoicing, interoperability, master]

state: {}

trigger: |
  The G20's Digital Economy Task Force has
  commissioned you to draft a proposal for global
  e-invoicing interoperability standards. The goal
  is to reduce the cost and complexity of cross-
  border invoicing.

  CURRENT LANDSCAPE:
  - 80+ countries have implemented or announced
    e-invoicing mandates (as of 2026)
  - At least 12 different e-invoicing standards
    in active use globally (Peppol BIS, ZUGFeRD,
    Factur-X, FatturaPA, CFDI, NF-e, e-Fapiao,
    UBL, CII, SII, KSeF, SDI)
  - Cross-border e-invoicing requires format
    conversion, tax mapping, and regulatory
    compliance in both jurisdictions
  - Estimated annual cost of invoicing complexity:
    $450B globally (OECD estimate)
  - SMEs disproportionately affected (lack
    resources to comply with multiple standards)

  KEY STAKEHOLDERS:
  - Tax authorities (want: real-time tax compliance,
    fraud prevention, VAT gap reduction)
  - Businesses (want: simplicity, one format for
    all markets, reduced compliance cost)
  - Technology vendors (want: stable standards they
    can build products against)
  - Trade organizations (want: reduced barriers to
    cross-border trade)
  - Developing economies (want: affordable
    compliance, digital inclusion)

  POLITICAL CONSTRAINTS:
  - Countries will not abandon existing domestic
    standards (too much invested)
  - Tax sovereignty concerns (countries control
    their own tax policy)
  - Data residency requirements (some countries
    require invoice data stored locally)
  - Digital divide (not all businesses have
    internet access or digital capability)

  Design:
  1. Global interoperability framework
  2. Core data standard
  3. Cross-border protocol
  4. Governance structure
  5. Implementation strategy for developing economies
  6. Transition roadmap

assertions:
  - type: llm_judge
    criteria: "Global interoperability framework respects sovereignty while enabling seamless cross-border invoicing — the framework proposes a federated model (NOT a single global standard replacing domestic standards): countries keep their domestic e-invoicing standards and clearance models but agree to a common cross-border exchange layer; the architecture has 3 layers: (1) Domestic Layer: each country's existing e-invoicing standard (Peppol in Nordics, CFDI in Mexico, NF-e in Brazil, etc.) remains unchanged; domestic compliance, tax rules, and clearance models are fully preserved; (2) Translation Layer: certified Access Points (similar to Peppol model but global) translate between domestic formats and the global core data set; translation is semantic (meaning-level mapping, not just field-level), maintained by a global registry of mappings; (3) Global Exchange Layer: standardized cross-border protocol using a subset of UBL (Universal Business Language) as the core interchange format — chosen because UBL is already ISO-standardized, widely implemented, extensible, and maintained by OASIS; the core data set includes the minimum required fields for any cross-border invoice (a 'global common denominator'): sender/receiver identification (with global LEI or similar identifier), invoice metadata (number, date, currency, payment terms), line items (description, quantity, unit price, amounts), tax information (tax type, rate, amount, jurisdiction), payment information (method, account references); countries can require additional domestic fields but cannot reduce the core set; this is analogous to how international shipping uses standardized customs forms while each country has its own domestic regulations."
    weight: 0.35
    description: "InteroperabilityFramework"
  - type: llm_judge
    criteria: "Cross-border protocol and governance structure are technically sound and politically viable — the cross-border exchange protocol: (1) 4-corner model (sender → sender's access point → receiver's access point → receiver), mirroring SWIFT for payments and Peppol for EU e-invoicing; (2) invoice routing using a Global Business Identifier (extends LEI or proposes a new lightweight registry for SMEs — full LEI cost of $200/year is prohibitive for micro-businesses in developing economies, so a tiered identifier system is needed); (3) real-time tax authority notification: when a cross-border invoice is exchanged, both the sender's and receiver's tax authority receive a notification (enabling real-time VAT matching and reducing the VAT gap); (4) digital signatures: invoices are cryptographically signed by the sender and verified by access points, providing non-repudiation and tamper evidence; governance structure: a new International E-Invoicing Standards Body (IEISB) under OECD/G20 umbrella, with representation from: tax authorities (one vote per member country), business advisory board (multinational, SME, and trade association representatives), technology advisory board (vendors, standards bodies — UBL/OASIS, UN/CEFACT, Peppol Authority), developing economy representatives (dedicated seats); the governance is modeled on successful international standards bodies like IASB (accounting standards) and SWIFT (payments); decision-making: core standard changes require 2/3 supermajority, domestic extensions are unilateral; annual review cycle for core standard updates."
    weight: 0.35
    description: "ProtocolAndGovernance"
  - type: llm_judge
    criteria: "Developing economy inclusion and transition roadmap are practical — the developing economy strategy recognizes that mandating sophisticated e-invoicing infrastructure is impractical for countries where 40%+ of businesses lack consistent internet access; tiered implementation model: Tier 1 (Advanced economies — EU, US, UK, Japan, Australia, etc.): full implementation with 4-corner model, real-time clearance optional per country, target: 24 months; Tier 2 (Emerging economies — Brazil, India, Mexico, South Africa, etc. — many already have domestic e-invoicing): bridge domestic systems to global exchange layer, capacity building support, target: 36 months; Tier 3 (Developing economies): simplified e-invoicing (mobile-based, SMS invoice reporting possible), free open-source tools for micro-businesses, gradual integration starting with government procurement invoices, international aid-funded infrastructure development, target: 60 months; specific accommodations: free or subsidized access point services for SMEs in developing economies, offline-capable invoice creation with batch upload, mobile-first design (most developing economy businesses access internet via mobile), simplified tax registration process integrated with e-invoicing enrollment; transition roadmap: Phase 1 (Year 1-2): establish governance body, finalize core data standard, certify first wave of global access points; Phase 2 (Year 2-3): pilot cross-border exchange among 10 volunteer countries (mix of Tier 1 and Tier 2); Phase 3 (Year 3-5): expand to all G20 countries, begin Tier 3 onboarding; Phase 4 (Year 5-7): near-universal coverage with continued Tier 3 support; estimated impact: $180B annual cost reduction (40% of current $450B complexity cost), 60% reduction in cross-border VAT fraud, 30% increase in trade participation by SMEs in developing economies."
    weight: 0.30
    description: "DevelopingEconomyAndRoadmap"
