meta:
  id: cross-border-invoice-compliance
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Navigate cross-border invoice compliance — manage withholding tax, VAT recovery, permanent establishment risk, transfer pricing documentation, and multi-jurisdiction regulatory requirements"
  tags: [cross-border, vat, withholding-tax, advanced]

state: {}

trigger: |
  A US-headquartered technology company with
  subsidiaries in the UK, Germany, Singapore, and
  Brazil needs to overhaul its cross-border invoice
  processing to ensure compliance across all
  jurisdictions.

  CURRENT ISSUES:
  - VAT recovery rate: only 45% (industry avg 80%)
  - Withholding tax errors: $340K in penalties
    over 2 years
  - Three invoices triggered PE (permanent
    establishment) risk reviews
  - Transfer pricing documentation gaps on
    intercompany invoices
  - No centralized view of cross-border obligations

  INVOICE VOLUME BY CORRIDOR:
  - US → UK: 200 invoices/year ($8M) — services
  - US → Germany: 150 invoices/year ($6M) — licenses + services
  - US → Singapore: 100 invoices/year ($4M) — services
  - US → Brazil: 80 invoices/year ($5M) — goods + services
  - Intercompany (all directions): 500 invoices/year ($45M)

  SPECIFIC COMPLIANCE REQUIREMENTS:
  - UK: VAT reverse charge on B2B services,
    Making Tax Digital compliance
  - Germany: e-invoicing mandate (ZUGFeRD),
    withholding tax on royalties (15.825%)
  - Singapore: GST on imported services,
    withholding tax on management fees (17%)
  - Brazil: complex invoice tax (ICMS, ISS, PIS,
    COFINS), nota fiscal requirements

  Design:
  1. Cross-border compliance framework
  2. VAT/GST recovery optimization
  3. Withholding tax management
  4. PE risk mitigation
  5. Transfer pricing invoice controls
  6. Technology and process solutions

assertions:
  - type: llm_judge
    criteria: "Cross-border compliance framework addresses each jurisdiction's specific requirements — UK: VAT reverse charge mechanism on B2B imported services (supplier invoices without VAT, buyer self-assesses under reverse charge and reports in VAT return), Making Tax Digital (MTD) compliance requiring digital recordkeeping and quarterly submissions; Germany: ZUGFeRD e-invoicing format (hybrid PDF with embedded XML), withholding tax on royalty/license payments at 15.825% (15% base + 5.5% solidarity surcharge), EU VAT directive requirements; Singapore: GST reverse charge on imported services above S$1M threshold, withholding tax on technical service and management fees at 17% (reducible to 8% under US-Singapore tax treaty); Brazil: nota fiscal eletrônica (NF-e) mandatory for goods, nota fiscal de serviços (NFS-e) for services, cascading taxes (ICMS on goods, ISS on services, PIS/COFINS on revenue), withholding at source (IRRF 15-25%); the framework includes a country-specific compliance matrix mapping each invoice type to required tax treatment."
    weight: 0.35
    description: "ComplianceFramework"
  - type: llm_judge
    criteria: "VAT recovery optimization and withholding tax management are actionable — VAT recovery improvement plan: current 45% recovery rate improved to 80%+ through: proper invoice documentation (vendor TIN, correct VAT amounts, proper descriptions), timely filing of VAT reclaim applications, use of tax treaty benefits to reduce withholding rates, engaging a VAT recovery specialist for historical claims (typically 3-year lookback), implementing automated VAT validation on incoming invoices; withholding tax management: tax treaty rate matrix (US-UK: 0% on services, 0% on royalties; US-Germany: 0% on services, 0% on royalties per treaty but 15.825% domestic rate applies without proper treaty forms; US-Singapore: reduced rates with Certificate of Residence; US-Brazil: 15% on services, 15% on royalties under treaty); process for obtaining and maintaining certificates of tax residence, W-8BEN-E management for inbound payments; transfer pricing controls: intercompany invoices must reference transfer pricing policy, arm's-length pricing documentation, benchmarking studies, contemporaneous documentation per OECD guidelines."
    weight: 0.35
    description: "VATAndWithholding"
  - type: llm_judge
    criteria: "PE risk mitigation and technology solutions are practical — PE risk controls: invoice descriptions must avoid language suggesting fixed place of business or dependent agent (e.g., avoid 'on-site management' or 'local supervision'); PE risk scoring for each cross-border service engagement; pre-approval review for service contracts exceeding 183 days or involving decision-making authority; tracking of employee travel days by jurisdiction; contract structuring guidance to minimize PE triggers; technology solution: centralized tax engine (Thomson Reuters ONESOURCE, Vertex, or Avalara) integrated with ERP for real-time tax determination; country-specific invoice template library ensuring correct format, language, and tax fields per jurisdiction; automated withholding tax calculation with treaty rate application; dashboard showing: VAT recovery status by country, withholding tax compliance status, PE risk indicators, transfer pricing documentation gaps; the implementation prioritizes Brazil (highest complexity and penalty risk) and Germany (e-invoicing mandate) first."
    weight: 0.30
    description: "PERiskAndTechnology"
