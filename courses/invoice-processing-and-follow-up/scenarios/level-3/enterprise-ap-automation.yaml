meta:
  id: enterprise-ap-automation
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an enterprise AP automation platform — architect end-to-end invoice processing automation with AI/ML, RPA, and integration with ERP systems for a global organization"
  tags: [enterprise-automation, ai-platform, rpa, advanced]

state: {}

trigger: |
  A Fortune 500 manufacturer (25,000 employees,
  18 countries, $2.8B annual AP spend) is
  replacing its manual AP processes with an
  end-to-end automation platform. Design the
  system.

  CURRENT STATE:
  - 180,000 invoices/year across 8,500 vendors
  - 3 ERP systems (SAP for Americas, Oracle for
    EMEA, local systems in APAC)
  - 65% paper invoices, 30% PDF, 5% EDI
  - 45 AP FTEs globally
  - Cost per invoice: $15.80
  - Processing time: 18 days average
  - Touchless rate: 8%
  - $4.2M annual AP labor cost

  REQUIREMENTS:
  - Support all 3 ERP systems
  - Handle 15 currencies
  - Process invoices in 12 languages
  - Achieve 80%+ touchless rate within 18 months
  - Reduce cost per invoice to under $4
  - Support country-specific tax requirements
  - Maintain SOX compliance controls
  - Integrate with existing vendor portal

  Design:
  1. Platform architecture
  2. AI/ML pipeline for invoice processing
  3. RPA automation for exception handling
  4. ERP integration strategy
  5. Change management approach
  6. ROI and business case

assertions:
  - type: llm_judge
    criteria: "Platform architecture is comprehensive and handles multi-ERP complexity — includes: (1) Unified invoice ingestion layer (email capture, vendor portal upload, OCR for paper/PDF, EDI gateway, e-invoicing connectors for Peppol/ZUGFeRD); (2) AI processing engine (OCR with multi-language support for 12 languages, ML classification and GL coding, intelligent data extraction); (3) Matching and validation engine (configurable 2-way/3-way matching against PO data from all 3 ERPs); (4) Workflow orchestration (approval routing, exception management, escalation); (5) ERP posting adapters (SAP RFC/IDoc, Oracle REST API, local system connectors); (6) Analytics and reporting layer; the architecture addresses: multi-ERP integration through an abstraction layer that normalizes invoice data before routing to the correct ERP; multi-currency through real-time FX conversion with configurable rate sources; data residency through regional deployment options (Americas, EMEA, APAC)."
    weight: 0.35
    description: "PlatformArchitecture"
  - type: llm_judge
    criteria: "AI/ML pipeline and RPA automation are technically sound — the AI pipeline includes: (1) Document classification (invoice vs. credit memo vs. statement, vendor identification); (2) Multi-language OCR (optimized models per language/region); (3) Field extraction (invoice number, date, amounts, line items, tax, payment terms) with confidence scoring; (4) GL code prediction using historical data (trained on 3+ years of corrected postings); (5) Duplicate detection across all 3 ERPs; (6) Anomaly flagging (unusual amounts, new vendors, pricing outliers); the RPA automation handles: exception resolution workflows (auto-query vendor portal for missing POs, auto-send reminders for approval delays, auto-route to correct approver based on GL/cost center), automated vendor setup for new vendors, and automated payment scheduling based on discount terms; the touchless rate target of 80% is achieved through: high-accuracy AI extraction (target 95%+ for header fields), strong first-pass match rate (target 90%+), and auto-approval for low-risk invoices."
    weight: 0.35
    description: "AIPipelineAndRPA"
  - type: llm_judge
    criteria: "ROI and change management are compelling — ROI calculation: current state: 180K invoices × $15.80 = $2.84M processing cost + $4.2M labor = $7.04M total; target state: 180K × $3.50 = $630K processing + $1.8M labor (reduced from 45 to 20 FTEs through redeployment) = $2.43M; annual savings: $4.61M; implementation cost: $2-3M (platform, integration, change management); payback: 6-8 months; additional benefits: faster processing reduces DPO impact, discount capture increases by $500K+/year, duplicate payment elimination saves $200K+/year; change management approach: phased rollout by region (Americas first — largest, SAP-based, most standardized), then EMEA (Oracle), then APAC (local systems); each phase includes: process redesign workshops, user training, parallel running, go-live support; the 25 redeployed AP FTEs move to vendor management, analytics, exception resolution, and compliance roles; SOX controls are maintained through: automated segregation of duties, digital audit trails, configurable approval authorities, and continuous monitoring dashboards."
    weight: 0.30
    description: "ROIAndChangeManagement"
