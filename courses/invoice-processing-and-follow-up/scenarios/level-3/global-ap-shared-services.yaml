meta:
  id: global-ap-shared-services
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design a global AP shared services center — plan centralization, establish SLAs, design operating model, and manage the transition from distributed AP operations"
  tags: [shared-services, centralization, operating-model, advanced]

state: {}

trigger: |
  A multinational company is consolidating AP
  operations from 15 country-specific teams into
  2 regional shared services centers. Design the
  operating model.

  CURRENT STATE:
  - 15 country AP teams across Americas, EMEA, APAC
  - Total AP headcount: 85 FTEs
  - Combined invoice volume: 300,000/year
  - Each country has its own processes, systems,
    and approval workflows
  - No standardized KPIs
  - Processing costs vary from $6/invoice
    (India) to $22/invoice (Switzerland)

  TARGET STATE:
  - SSC 1: Krakow, Poland (serving EMEA + Americas)
  - SSC 2: Manila, Philippines (serving APAC)
  - Retained teams: Small teams (1-2 people) in
    each country for local compliance/escalations
  - Target headcount: 45 FTEs in SSCs + 15 retained
    = 60 total (30% reduction)
  - Standardized global process with local
    variations for tax/compliance

  CHALLENGES:
  - Language: invoices in 12 languages
  - Time zones: need coverage for US, Europe, Asia
  - Local knowledge: country-specific tax rules,
    vendor relationships
  - Employee transition: 25 positions being
    eliminated
  - Union requirements in France and Germany
  - Data protection: GDPR for EU data processed
    in Poland

  Design:
  1. SSC operating model and organization
  2. Process standardization framework
  3. SLA structure and governance
  4. Transition plan (18-month rollout)
  5. Technology and infrastructure
  6. Risk mitigation

assertions:
  - type: llm_judge
    criteria: "Operating model balances standardization with local needs — the SSC organization includes: global process owner (VP level), SSC directors (one per center), team leads organized by process tower (invoice processing, matching, payments, vendor management, reporting) rather than by country; retained country teams handle: local tax compliance (VAT returns, withholding tax), vendor relationship escalations, regulatory filings (1099 in US, annual returns in EU), and in-country bank relationships; the language coverage is addressed through: multilingual hiring in Krakow (Polish staff often speak German, French, English), AI-powered translation for invoice data extraction, and dedicated language specialists for complex vendor communications; shift scheduling provides coverage across time zones: Manila covers APAC business hours + early US hours, Krakow covers European business hours + US business hours; the model shows clear escalation paths from SSC to retained country teams for issues requiring local knowledge."
    weight: 0.35
    description: "OperatingModel"
  - type: llm_judge
    criteria: "SLA structure and governance are comprehensive — SLAs defined at multiple levels: (1) Internal SLAs (SSC to business units): invoice processing time (target 3 days for PO invoices, 5 days for non-PO), first-pass match rate (85%+), payment accuracy (99.5%+), query response time (24 hours), duplicate payment rate (<0.1%); (2) Process SLAs: vendor setup (48 hours), payment run execution (daily), month-end close (2 business days after GL close); (3) Compliance SLAs: VAT filing (per country deadline), 1099/regulatory reporting (per deadline); governance structure: monthly SLA performance reviews with business unit stakeholders, quarterly business reviews with regional CFOs, annual service satisfaction surveys; SLA penalties/remedies for consistent underperformance; a balanced scorecard tracks: efficiency (cost per invoice, invoices per FTE), quality (error rates, duplicate rates), timeliness (processing time, payment on time), and satisfaction (stakeholder surveys)."
    weight: 0.35
    description: "SLAAndGovernance"
  - type: llm_judge
    criteria: "Transition plan handles people, process, and compliance risks — the 18-month rollout is phased: Months 1-3 (Planning): SSC facility setup, hiring and training, process documentation from all 15 countries; Months 4-9 (Wave 1 — Americas): US, Canada, Brazil transition to Krakow SSC (largest volume, English-speaking, simplest compliance); Months 7-12 (Wave 2 — APAC): Japan, Singapore, Australia, India transition to Manila SSC; Months 10-15 (Wave 3 — EMEA): UK, Germany, France, Netherlands transition to Krakow; Months 16-18: stabilization and optimization; the people transition plan addresses: redundancy packages compliant with local labor law, redeployment opportunities within the company, knowledge transfer requirements (minimum 3-month overlap), union consultation in France and Germany (per Works Council requirements); GDPR compliance is addressed: data processing agreement between entities, privacy impact assessment, data minimization, right to access provisions, adequate safeguards for cross-border data transfer within EU (Krakow is EU-based, simplifying compliance)."
    weight: 0.30
    description: "TransitionPlan"
