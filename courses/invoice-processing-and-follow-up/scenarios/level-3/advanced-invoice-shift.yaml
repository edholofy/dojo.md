meta:
  id: advanced-invoice-shift
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Advanced shift simulation — handle a cross-border AP integration, vendor financial distress, and regulatory compliance crisis simultaneously as AP Director"
  tags: [shift-simulation, multi-crisis, cross-functional, advanced]

state: {}

trigger: |
  You are the AP Director facing three concurrent
  strategic challenges on Monday morning.

  CASE 1 — ACQUISITION AP INTEGRATION
  Your company just acquired a European
  manufacturer with operations in Germany, France,
  and Poland. You have 90 days to integrate their
  AP operations into your shared services center.

  Acquired company details:
  - 800 vendors, 25,000 invoices/year
  - Manual processes, no automation
  - SAP ECC (your company uses Oracle)
  - €120M annual AP spend
  - 8 AP staff in Munich
  - German e-invoicing mandate effective in 4 months
  - Outstanding payables: €18M
  - No standardized approval workflows

  What is your 90-day integration plan?

  CASE 2 — CRITICAL VENDOR DISTRESS
  Your #2 supplier by spend ($45M/year for
  electronic components) just had their credit
  rating downgraded from BBB to B+. Industry
  reports suggest they may file for bankruptcy
  within 6 months. You have:
  - $3.2M in open POs with this vendor
  - $1.8M in outstanding payables to them
  - 4 critical products with no alternative supplier
  - Net 45 payment terms
  - Long-term supply agreement expiring in 8 months

  What actions do you take immediately, within
  30 days, and within 90 days?

  CASE 3 — REGULATORY COMPLIANCE EMERGENCY
  The IRS has sent a notice of proposed penalties
  ($890K) for 1099 reporting errors in the prior
  tax year. Simultaneously, your EU subsidiary
  received a VAT audit notification from German
  tax authorities covering 3 years of transactions.

  IRS issues identified:
  - 45 vendors misclassified as corporations
    (should have received 1099-NEC)
  - 12 vendors with incorrect TINs
  - $2.1M in payments to 8 vendors with no
    W-9 on file

  German VAT audit scope:
  - Input VAT claims on intercompany invoices
  - Reverse charge compliance on imported services
  - Invoice format compliance (required fields)

  How do you respond to both simultaneously?

assertions:
  - type: llm_judge
    criteria: "Acquisition AP integration plan is structured and realistic for 90 days — Phase 1 (Days 1-30, Assessment and Stabilization): freeze vendor master changes, document all current processes and approval chains, inventory all outstanding payables (€18M), ensure all current payments continue uninterrupted (business continuity is priority #1), assess SAP-to-Oracle data migration requirements, catalog German/French/Polish compliance requirements, begin German e-invoicing readiness assessment (4-month deadline is tight); Phase 2 (Days 31-60, Design and Build): design target operating model (Munich AP team transitions to SSC with 3-4 retained locally for German/French compliance), map SAP vendor master to Oracle vendor master (field-by-field data mapping), configure Oracle AP module for EU entities (multi-currency EUR/PLN, EU VAT rules, e-invoicing), build approval workflow matrix aligned with corporate policy, create parallel processing environment for testing; Phase 3 (Days 61-90, Migration and Go-Live): migrate vendor master data, redirect invoice receipt to SSC, parallel run (both systems processing for 2 weeks), cutover to Oracle, stabilize and address issues; the plan explicitly addresses the German e-invoicing mandate: since it's effective in 4 months (1 month after integration deadline), the Oracle configuration must include ZUGFeRD/XRechnung capability from day one; people plan: 8 Munich staff offered retention packages through transition, 3-4 retained for local compliance, remainder offered SSC roles or severance per German labor law (Works Council consultation required)."
    weight: 0.35
    description: "AcquisitionIntegration"
  - type: llm_judge
    criteria: "Vendor distress response is appropriately escalated and time-phased — immediate actions (this week): convene cross-functional crisis team (AP, procurement, legal, treasury, operations), assess the $3.2M in open POs — can any be redirected to alternative suppliers, place the $1.8M in payables on strategic hold (pay only in exchange for confirmed shipments — protective payment strategy), do NOT accelerate payments (this would increase exposure), engage legal to review supply agreement terms (termination triggers, force majeure, IP/tooling ownership); 30-day actions: qualify alternative suppliers for the 4 sole-source products (emergency qualification process), negotiate tooling and IP ownership/transfer agreements (if vendor has proprietary tooling for your products), reduce open PO exposure from $3.2M to minimum buffer, implement purchase order by purchase order release (no blanket orders), request financial statements and cash flow forecasts from vendor, consider strategic options: invest in vendor (equity or secured loan), acquire the product line, or form consortium with other customers; 90-day actions: complete alternative supplier qualification, negotiate transition agreements, build safety stock (8-12 weeks of critical components), if vendor stabilizes — renegotiate terms with financial protections (letter of credit, parent guarantee, performance bond); the AP-specific actions include: shorten payment terms only if tied to supply guarantees, implement weekly payment runs to this vendor (to control exposure), flag all invoices from this vendor for senior review, monitor for lien filings or UCC changes."
    weight: 0.35
    description: "VendorDistressResponse"
  - type: llm_judge
    criteria: "Regulatory compliance responses are appropriately urgent and parallel-tracked — IRS response: engage tax counsel immediately to file extension request for response (typically 30 days, extendable), conduct full 1099 review of current and prior year vendor classifications, correct the 45 misclassified vendors (update W-9 status and reclassify), obtain missing W-9s from the 8 unclassified vendors (initiate backup withholding at 24% if W-9s not received within 30 days), file corrected 1099s for prior year, negotiate penalty abatement based on reasonable cause and first-time penalty abatement (FTPA) provisions — $890K penalty may be reduced to $100-200K with good faith remediation; implement preventive controls: automated W-9 collection during vendor onboarding, annual vendor classification review, TIN verification via IRS TIN matching program before year-end filing; German VAT audit response: engage German tax advisor (Steuerberater), compile documentation for all intercompany invoices (transfer pricing support, service descriptions, cost allocation methodologies), verify reverse charge compliance on all imported services (proper self-assessment and reporting in German VAT returns), review invoice format compliance against UStG requirements (all mandatory fields present); the response prioritizes: IRS first (penalty exposure is immediate and quantified at $890K), German VAT in parallel (audit timeline is typically 3-6 months), both tracked via a compliance project plan with weekly status updates to CFO."
    weight: 0.30
    description: "RegulatoryResponse"
