meta:
  id: vendor-risk-management
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Build a vendor risk management program integrated with AP — assess financial health, monitor risk indicators, design early warning systems, and create contingency plans for vendor failures"
  tags: [vendor-risk, supply-chain, financial-health, advanced]

state: {}

trigger: |
  After two critical vendor bankruptcies disrupted
  operations (costing $4.8M in emergency sourcing
  and production delays), the company needs a vendor
  risk management program integrated with AP
  operations. Design the program.

  COMPANY CONTEXT:
  - $600M annual procurement spend
  - 3,200 active vendors
  - AP processes 140,000 invoices/year
  - 85 vendors classified as critical (sole source
    or limited alternatives)
  - Current vendor onboarding: basic credit check
    only, no ongoing monitoring

  RECENT FAILURES:
  Vendor A (precision components, $8M/year):
  - Filed Chapter 11 with no warning
  - Company had $1.2M in open POs
  - 6-week supply disruption
  - Emergency sourcing cost 3x normal price
  - Post-mortem revealed: vendor's payment behavior
    had been deteriorating for 8 months (requesting
    shorter terms, taking discounts late)

  Vendor B (specialty chemicals, $3M/year):
  - Ceased operations suddenly
  - $340K in prepaid orders lost
  - Environmental liability discovered post-closure
  - Company was one of only 3 customers
  - Post-mortem: vendor had been losing money for
    3 years, had 2 liens filed against them

  AP DATA AVAILABLE:
  - Payment history (all invoices, all terms)
  - Vendor communication logs
  - Invoice pattern data (frequency, amounts)
  - Dispute history
  - Early payment discount behavior
  - Payment term change requests

  Design:
  1. Vendor risk assessment framework
  2. AP-based early warning indicators
  3. Financial health monitoring
  4. Risk scoring model
  5. Contingency planning
  6. Integration with procurement and AP operations

assertions:
  - type: llm_judge
    criteria: "Vendor risk assessment framework is comprehensive and tiered — risk dimensions: financial risk (creditworthiness, profitability, liquidity), operational risk (capacity constraints, quality issues, delivery reliability), strategic risk (market position, customer concentration, technology relevance), compliance risk (regulatory, environmental, labor practices); tiered monitoring based on vendor criticality and spend: Tier 1 (85 critical vendors, sole/limited source): continuous monitoring with quarterly deep-dive financial reviews, annual on-site assessments, real-time alert monitoring; Tier 2 (next 300 vendors by spend, 60% of total): semi-annual financial review, annual risk questionnaire; Tier 3 (remaining 2,815 vendors): annual automated screening, event-driven reviews; the framework directly addresses the failure patterns from Vendors A and B: Vendor A's deteriorating payment behavior would have been flagged by AP-based early warning indicators; Vendor B's financial losses and liens would have been caught by financial monitoring and public records screening."
    weight: 0.35
    description: "RiskFramework"
  - type: llm_judge
    criteria: "AP-based early warning indicators leverage internal data to predict vendor distress — the model uses AP transaction data that the company already has to detect vendor financial deterioration before external signals appear; key AP-based indicators: (1) Payment term change requests — vendor asks for Net 15 instead of Net 30 (signals cash flow pressure); (2) Early payment discount behavior changes — vendor starts taking discounts they previously didn't, or offering new discounts (desperate for cash); (3) Invoice frequency changes — shift from monthly to weekly invoicing (accelerating cash collection); (4) Invoice amount patterns — declining invoice values may indicate reduced capacity or lost other customers; (5) Increase in partial shipments — vendor can't fund full production runs; (6) Communication tone changes — more frequent payment status inquiries, escalation to senior contacts; (7) Dispute patterns — vendor becomes more aggressive on disputed amounts they previously would have absorbed; (8) Quality of invoice documentation — deteriorating quality may indicate staff turnover or operational stress; each indicator is scored 1-5, with composite scoring triggering alerts: green (0-8), yellow (9-15, enhanced monitoring), orange (16-22, active risk management), red (23+, contingency activation)."
    weight: 0.35
    description: "APEarlyWarning"
  - type: llm_judge
    criteria: "Financial monitoring and contingency planning are actionable — external financial monitoring: credit bureau monitoring (D&B, Experian) with automated alerts for rating changes, public records screening for liens, judgments, UCC filings, bankruptcy filings, financial statement analysis for Tier 1 vendors (current ratio, quick ratio, debt-to-equity, days sales outstanding, revenue trends), news and social media monitoring for operational disruptions; risk scoring model combines internal AP signals (40% weight) with external financial data (35%) and operational/strategic factors (25%) into a composite 0-100 score; contingency planning: for each Tier 1 vendor, a documented contingency plan including: identified alternative suppliers (pre-qualified), safety stock levels (minimum 4-6 weeks for critical components), dual-sourcing strategy for vendors scoring below 60, contractual protections (performance bonds, parent guarantees, step-in rights), financial protections (reduce prepayment exposure, require letters of credit for high-risk vendors); integration with procurement: risk scores visible in purchasing workflow, automatic alerts when POs are created with high-risk vendors, procurement cannot increase spend with red-flagged vendors without VP approval."
    weight: 0.30
    description: "MonitoringAndContingency"
