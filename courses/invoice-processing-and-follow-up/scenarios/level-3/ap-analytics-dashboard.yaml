meta:
  id: ap-analytics-dashboard
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an AP analytics and reporting dashboard — define KPIs, build executive reporting, and create operational dashboards for continuous AP performance management"
  tags: [ap-analytics, kpis, dashboards, advanced]

state: {}

trigger: |
  The CFO wants a comprehensive AP analytics
  dashboard to gain visibility into AP operations
  and drive performance improvement. Design the
  dashboard and reporting framework.

  COMPANY CONTEXT:
  - 120,000 invoices/year, 4,200 vendors
  - $850M annual AP spend
  - AP team: 18 FTEs
  - ERP: SAP S/4HANA
  - Current reporting: monthly spreadsheet with
    basic metrics (invoices processed, overdue count)

  STAKEHOLDER REQUIREMENTS:
  CFO wants:
  - Working capital impact of AP timing
  - Cash flow forecasting based on AP obligations
  - Benchmarking against industry standards

  VP Procurement wants:
  - Vendor payment performance
  - Early payment discount capture
  - Vendor relationship health scores

  AP Director wants:
  - Team productivity metrics
  - Process bottleneck identification
  - Exception rates and resolution times
  - Compliance and audit readiness

  Controller wants:
  - Accrual accuracy
  - Period-end close metrics
  - GL coding accuracy

  Design:
  1. KPI framework (strategic, operational, compliance)
  2. Executive dashboard layout
  3. Operational dashboards
  4. Data architecture and sources
  5. Alerting and exception reporting
  6. Benchmarking methodology

assertions:
  - type: llm_judge
    criteria: "KPI framework is comprehensive and tiered — Strategic KPIs (CFO level): DPO (days payable outstanding) with trend and target, working capital impact ($M freed/consumed by AP timing changes), cash conversion cycle contribution, discount capture rate (% of available discounts taken, dollar value captured vs. missed), total cost of AP operations (cost per invoice processed, cost as % of spend); Operational KPIs (AP Director level): invoices processed per FTE per day (target: 25-35 for semi-automated), touchless processing rate (% requiring no human intervention), first-pass match rate (target 85%+), average processing cycle time (receipt to approval, approval to payment), exception rate by type (price, quantity, PO missing, tax), exception resolution time (target: 48 hours), duplicate payment rate (target: <0.1% by value), on-time payment rate (target: 98%+); Compliance KPIs (Controller level): accrual accuracy (estimated vs. actual, target: within 5%), period-end close time for AP sub-ledger, 1099 reporting accuracy, audit finding count, GL coding accuracy rate; each KPI has: definition, calculation formula, data source, target/benchmark, measurement frequency, and owner."
    weight: 0.35
    description: "KPIFramework"
  - type: llm_judge
    criteria: "Dashboard design addresses each stakeholder's needs — Executive dashboard (CFO): single-page view with DPO trend (12-month chart with benchmark line), cash flow waterfall showing AP payment obligations by week, discount capture summary (captured vs. missed with annualized opportunity cost), AP cost efficiency trend, top 10 vendors by spend with payment status; Operational dashboard (AP Director): real-time queue showing invoices by status (received, in matching, pending approval, approved, scheduled, paid), aging of unprocessed invoices (SLA countdown), team workload distribution, bottleneck heatmap (showing where invoices get stuck — e.g., 40% of delays in manager approval), exception resolution funnel; Procurement dashboard: vendor scorecard (payment terms compliance, dispute frequency, discount utilization per vendor), vendor risk indicators (financial health, concentration risk), payment method mix by vendor; Controller dashboard: accrual variance analysis, GL coding error rates by category, month-end close checklist with real-time status; drill-down capability from any metric to underlying transactions."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Data architecture and benchmarking are technically sound — data sources: SAP S/4HANA tables (BKPF/BSEG for accounting documents, EKKO/EKPO for purchase orders, RBKP/RSEG for invoice documents, LFA1/LFB1 for vendor master, BSIK/BSAK for open/cleared items), bank payment files, vendor portal logs, OCR/capture system logs; data architecture: ETL from SAP to analytics data warehouse (or SAP Analytics Cloud/BW), daily refresh for operational metrics, real-time for queue management, data quality validation layer; benchmarking methodology: compare against APQC benchmarks (top quartile targets): cost per invoice (top quartile: $2.07, median: $7.90), invoices per FTE (top quartile: 18,927/year, median: 7,769), processing cycle time (top quartile: 3.2 days, median: 8.4 days), electronic invoice rate (top quartile: 82%, median: 48%); alerting: automated alerts for SLA breaches, unusual payment patterns (fraud indicators), discount deadlines approaching, approval bottlenecks exceeding 48 hours; technology: Power BI or Tableau connected to SAP data, with scheduled email reports for executives and real-time dashboards for operations."
    weight: 0.30
    description: "DataAndBenchmarking"
