meta:
  id: ap-fraud-prevention-program
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design a comprehensive AP fraud prevention program — implement detective and preventive controls across vendor management, invoice processing, and payment execution"
  tags: [fraud-prevention, internal-controls, vendor-management, advanced]

state: {}

trigger: |
  Design a comprehensive AP fraud prevention
  program for a company that discovered $2.3M in
  fraudulent payments over the past 3 years.

  FRAUD INCIDENTS DISCOVERED:
  1. Ghost vendor scheme ($890K over 2 years)
     - Fictitious vendor created by AP clerk
     - 47 invoices paid to a PO Box
     - All under $20K approval threshold
     - Clerk had vendor setup AND payment authority

  2. Business Email Compromise ($480K, single event)
     - Vendor email spoofed (1-letter domain change)
     - Bank details changed, 3 payments redirected
     - Discovered only when real vendor called
       about non-payment

  3. Billing scheme ($620K over 18 months)
     - Vendor overbilled by inflating quantities
     - Receiving dock accepted goods without counting
     - AP matched to PO quantities, not received
     - Purchasing manager had side agreement with vendor

  4. Duplicate payment exploitation ($310K)
     - Same invoices submitted as PDF and paper
     - Slightly different invoice numbers used
     - No cross-format duplicate detection

  CURRENT CONTROLS (inadequate):
  - Single-person vendor setup
  - $20K approval threshold (too high)
  - No callback verification for bank changes
  - Manual 3-way match on sample basis only
  - No data analytics on AP transactions
  - Annual external audit only

  Design:
  1. Preventive controls framework
  2. Detective controls and analytics
  3. Vendor management overhaul
  4. Segregation of duties redesign
  5. Technology and monitoring tools
  6. Training and awareness program

assertions:
  - type: llm_judge
    criteria: "Preventive controls directly address each discovered fraud type — ghost vendor prevention: segregation of duties (separate vendor setup from payment processing), dual approval for new vendors, mandatory validation (TIN verification via IRS TIN matching, D&B business verification, physical address verification — no PO Boxes for new vendors), and periodic vendor master review; BEC prevention: mandatory callback verification for ALL bank detail changes using phone numbers from original vendor file (not from the change request), email domain validation, 72-hour hold on first payment to new bank details; billing scheme prevention: mandatory receiving counts with GRN required before invoice payment, automated 3-way match on 100% of PO invoices (not sample basis), price variance alerts; duplicate payment prevention: cross-format duplicate detection (fuzzy matching on vendor, amount, date regardless of invoice number format), automated duplicate scoring algorithm; lowered approval thresholds: tiered approvals ($5K, $25K, $50K, $100K+) with escalating authority requirements."
    weight: 0.35
    description: "PreventiveControls"
  - type: llm_judge
    criteria: "Detective controls use data analytics to identify fraud patterns — continuous monitoring dashboards: Benford's Law analysis on invoice amounts (first-digit distribution anomalies flag potential fabricated invoices), vendor payment concentration analysis (flag vendors with unusual payment patterns), round-number invoice analysis, sequential invoice number gaps; red flag reports: invoices just below approval thresholds (e.g., clustering at $19,500-$19,999 when threshold is $20K), vendors with only PO Box addresses, vendors sharing bank accounts or addresses with employees, payments to vendors with no purchase orders, new vendors with immediate high-volume invoicing; periodic analytics: duplicate payment scans (quarterly), vendor master data cleansing (semi-annually), employee-vendor relationship screening (annually — match employee addresses, phone numbers, TINs against vendor master); the program includes whistle-blower hotline, surprise audits, and a fraud risk assessment updated annually."
    weight: 0.35
    description: "DetectiveControls"
  - type: llm_judge
    criteria: "Segregation of duties and implementation plan are comprehensive — SoD matrix clearly separates: vendor master maintenance (setup team), purchase order creation (procurement), goods receipt (warehouse), invoice processing (AP), payment approval (management), payment execution (treasury); no single person can control more than one step in the procure-to-pay cycle; the technology stack includes: automated continuous monitoring tool (ACL/IDEA or modern equivalent like MindBridge or Oversight AI), vendor verification service integration, ERP workflow controls enforcing SoD, automated matching engine; the training program covers: annual fraud awareness training for all AP staff, red flag recognition training for managers, ethics hotline promotion, real case studies from the company's own incidents (anonymized); implementation is phased: Phase 1 (immediate, 0-30 days) — SoD fixes, bank change verification process, lower approval thresholds; Phase 2 (60-90 days) — vendor master cleanup, automated matching; Phase 3 (6 months) — analytics platform, continuous monitoring; ROI justification: $2.3M fraud discovered represents only detected fraud — estimated actual exposure is 2-3x, so $4.6-6.9M; prevention program cost of $300-500K/year delivers significant ROI."
    weight: 0.30
    description: "SoDAndImplementation"
