meta:
  id: intercompany-invoice-management
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design an intercompany invoice management framework — establish policies, automate reconciliation, ensure transfer pricing compliance, and streamline elimination for consolidated reporting"
  tags: [intercompany, transfer-pricing, consolidation, advanced]

state: {}

trigger: |
  A multinational corporation with 24 legal entities
  across 12 countries processes 8,000 intercompany
  invoices annually totaling $1.2B. The current
  process is causing significant issues. Design a
  comprehensive intercompany invoice management
  framework.

  CURRENT PROBLEMS:
  - Intercompany balance mismatches averaging
    $14M per quarter at consolidation
  - 3-week reconciliation effort each quarter
    involving 15 people across time zones
  - Transfer pricing adjustments identified
    post-close, requiring restatements
  - Different entities use different currencies,
    creating FX translation disputes
  - 30% of intercompany invoices lack proper
    supporting documentation
  - Tax authorities in Germany and India have
    questioned intercompany pricing on recent audits
  - No standardized intercompany agreement templates

  ENTITY STRUCTURE:
  - US parent + 5 US subsidiaries
  - 4 EU entities (UK, Germany, France, Netherlands)
  - 3 APAC entities (Singapore, India, Japan)
  - 2 LatAm entities (Brazil, Mexico)
  - Shared services center in India
  - Regional treasury centers in US, Netherlands, Singapore

  INTERCOMPANY TRANSACTION TYPES:
  - Management fees (parent to subsidiaries): $300M
  - IT services (shared services): $180M
  - Royalties/IP licensing: $250M
  - Goods transfers (cost plus): $350M
  - Treasury/intercompany loans: $120M interest

  Design:
  1. Intercompany policy framework
  2. Invoice standardization and automation
  3. Transfer pricing controls
  4. Reconciliation and matching process
  5. FX management and settlement
  6. Consolidation elimination procedures

assertions:
  - type: llm_judge
    criteria: "Intercompany policy framework establishes clear governance — the framework includes: intercompany agreement library with standardized templates for each transaction type (management fee agreements, IP licensing agreements, service level agreements, cost-sharing arrangements, loan agreements); pricing methodology documentation for each type per OECD Transfer Pricing Guidelines: management fees (cost allocation based on headcount/revenue/usage metrics with appropriate markup), IT services (cost plus 5-8% markup benchmarked against comparable uncontrolled transactions), royalties (comparable uncontrolled price or profit split method), goods (cost plus or resale minus depending on functional analysis), treasury (arm's length interest rate per currency using comparable rates); intercompany billing calendar ensuring both entities record in the same period; mandatory supporting documentation requirements (detailed service descriptions, time records for services, allocation keys for shared costs, benchmarking studies updated annually); governance: intercompany committee (tax, treasury, controllership) meeting quarterly, annual transfer pricing review, pre-approval for new intercompany arrangement types."
    weight: 0.35
    description: "PolicyFramework"
  - type: llm_judge
    criteria: "Reconciliation and matching automation eliminates the $14M quarterly mismatch — automated intercompany matching system (ICMS) that: creates mirror entries — when entity A issues an intercompany invoice, entity B's payable is automatically created via integration (no manual re-entry reducing data entry errors); implements real-time matching — transactions matched at initiation rather than at period-end; handles FX differences — agreed FX rate methodology (e.g., monthly average rate from ECB/Fed, applied consistently by both parties), FX differences below threshold ($500) auto-cleared to a designated FX variance account; the matching process: daily automated matching of posted transactions, weekly exception report of unmatched items, monthly forced resolution of all items over 30 days, quarterly sign-off by both entity controllers; netting and settlement: multilateral netting through treasury center (reduces payment volume by 60-70%, estimated $700-800M in gross payments reduced to $200-300M net), monthly netting cycle with settlement via intercompany bank accounts; the $14M mismatch is resolved by: eliminating timing differences (synchronized posting), standardizing FX rates (eliminating rate source disputes), and automating mirror entries (eliminating data entry discrepancies)."
    weight: 0.35
    description: "ReconciliationAutomation"
  - type: llm_judge
    criteria: "Transfer pricing controls and consolidation procedures address audit risk — transfer pricing controls: automated markup calculations applied at invoice generation (preventing incorrect pricing), quarterly true-up mechanism for cost-plus arrangements (actual costs reconciled against estimates), annual benchmarking study updates, contemporaneous documentation maintained per OECD Action 13 (master file, local file, CbCR); specific responses to Germany and India audit risk: Germany — ensure management fee charges have clear benefit test documentation (showing services were actually provided and beneficial to the German entity), maintain detailed time records and deliverables; India — ensure royalty rates are within safe harbor provisions where available, maintain functional analysis demonstrating arm's length nature; consolidation elimination: automated elimination entries generated from the matched intercompany transaction database, multi-level elimination for sub-consolidations (regional, then global), unrealized profit elimination on intercompany inventory, automated reconciliation between intercompany receivables and payables with variance threshold alerts; technology platform: SAP ICMS or BlackLine intercompany module integrated with ERP, providing single source of truth for all intercompany balances."
    weight: 0.30
    description: "TransferPricingAndConsolidation"
