meta:
  id: supply-chain-finance
  level: 3
  course: invoice-processing-and-follow-up
  type: output
  description: "Design a supply chain finance program — implement reverse factoring, dynamic discounting, and supplier financing to optimize working capital across the supply chain"
  tags: [supply-chain-finance, reverse-factoring, working-capital, advanced]

state: {}

trigger: |
  Design a comprehensive supply chain finance
  program for a mid-market manufacturer with
  $500M annual procurement spend.

  COMPANY PROFILE:
  - Revenue: $1.2B
  - Annual procurement: $500M across 2,000 vendors
  - Current payment terms: Net 45 (weighted avg)
  - DPO: 42 days
  - Cost of capital (WACC): 7.5%
  - Credit rating: BBB+
  - Cash position: adequate but variable

  SUPPLY CHAIN CHALLENGES:
  - 30% of vendors are small/medium businesses
    struggling with cash flow
  - 5 critical vendors have requested shorter
    payment terms (Net 15)
  - 2 vendor bankruptcies in the past year
    disrupted supply chain
  - Company wants to extend DPO to 60 days to
    improve working capital
  - Vendors resist term extension without
    compensation

  TARGET OUTCOMES:
  - Extend DPO from 42 to 60 days
  - Reduce supplier financial risk
  - Strengthen vendor relationships
  - Generate positive return on the program
  - Support ESG goals (supplier diversity and
    financial health)

  AVAILABLE SCF INSTRUMENTS:
  1. Reverse factoring (approved payables finance)
  2. Dynamic discounting (using company cash)
  3. Supply chain finance platform (bank-funded)
  4. Supplier early payment program
  5. Inventory financing

  Design:
  1. Program structure and instrument selection
  2. Vendor segmentation and eligibility
  3. Financial modeling (rates, terms, economics)
  4. Platform and technology requirements
  5. Legal and accounting considerations
  6. Launch and scaling plan

assertions:
  - type: llm_judge
    criteria: "Program structure uses the right instruments for each vendor segment — vendor segmentation: (1) Strategic vendors (top 50 by spend, 40% of procurement): reverse factoring program where bank pays vendor early at the company's credit rating (BBB+ ~ 4-5% rate vs. vendors' 8-15% borrowing cost); company pays bank at maturity (60 days); (2) Mid-tier vendors (next 200, 35% of procurement): dynamic discounting using company cash for high-return discounts; sliding scale based on days early; (3) SME vendors (remaining 1,750, 25% of procurement): supply chain finance platform with bank participation; fastest payments for smallest vendors; the financial model shows: extending terms to 60 days frees up approximately $24.7M in working capital ($500M × 18 additional days / 365); the reverse factoring program allows term extension without harming vendors — they get paid faster (at Day 10-15) while the company pays at Day 60; the economics work because the company's BBB+ credit rate (4-5%) is lower than most vendors' borrowing costs."
    weight: 0.35
    description: "ProgramStructure"
  - type: llm_judge
    criteria: "Financial modeling is rigorous — reverse factoring economics: bank funds early payment at Day 10 at company's credit rate + bank margin (est. 4.5%); vendor receives 95.5 cents on the dollar immediately instead of waiting 60 days; for a $10,000 invoice: vendor gets $9,926 at Day 10 (saves their 10%+ financing cost), company pays $10,000 at Day 60 (no additional cost beyond normal payment); the bank earns $74 in financing fees; dynamic discounting economics: for $175M in eligible spend, offering 1.5% discount for Day 10 payment yields: cost of discounts $2.6M, return on capital deployed (annualized): (1.5/98.5) × (365/50) = 11.1%, which exceeds the 7.5% WACC — profitable use of company cash; working capital impact: extending DPO from 42 to 60 days on $500M spend: additional working capital = $500M × 18/365 = $24.7M freed up; this has a value of $24.7M × 7.5% WACC = $1.85M/year."
    weight: 0.35
    description: "FinancialModeling"
  - type: llm_judge
    criteria: "Legal, accounting, and implementation considerations are addressed — legal: reverse factoring agreements must be structured to avoid reclassification from trade payables to bank debt (IFRS and GAAP implications — if the arrangement substantially changes the nature of the liability, it may need to be classified as borrowing); the company should disclose the SCF program in financial statements per recent FASB/IASB guidance; accounting treatment: trade payables remain classified as operating activities in cash flow statement if the arrangement doesn't extend terms beyond normal trade credit; the ESG component: the program can offer preferential rates (lower fees) for diverse suppliers, sustainability-certified vendors, or vendors who meet ESG criteria; the launch plan: Phase 1 (months 1-3) — onboard top 20 strategic vendors to reverse factoring; Phase 2 (months 4-6) — extend to mid-tier vendors with dynamic discounting; Phase 3 (months 7-12) — launch full platform for all eligible vendors; KPIs: vendor adoption rate, DPO improvement, supplier health metrics, working capital freed, program yield."
    weight: 0.30
    description: "LegalAndImplementation"
