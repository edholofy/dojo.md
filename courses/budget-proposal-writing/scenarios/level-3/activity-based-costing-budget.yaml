meta:
  id: activity-based-costing-budget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Activity-based costing budget — redesign a department budget using ABC methodology to reveal true cost drivers"
  tags: [abc, activity-based-costing, cost-drivers, methodology, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at a 450-person B2B
  SaaS company ($65M ARR). The CEO is frustrated because
  your department costs $8.2M/year but nobody can answer
  basic questions like "how much does it cost to onboard
  a customer?" or "what does it cost to retain an
  enterprise customer vs a mid-market one?" She wants
  you to rebuild your budget using activity-based costing.

  Current department structure:
  - 52 employees: 1 VP (you), 4 directors, 12 CSMs
    (enterprise), 15 CSMs (mid-market), 8 onboarding
    specialists, 6 support engineers, 4 training
    coordinators, 2 ops/analytics
  - Salary costs: $6.4M (avg $123K/person fully loaded)
  - Technology: $980K (Gainsight $340K, Zendesk $180K,
    training platform $120K, other tools $340K)
  - Travel: $420K (primarily enterprise customer visits)
  - Training & development: $180K
  - Events (customer conferences, webinars): $220K

  Current customer segments:
  | Segment | Customers | ARR/Customer | Total ARR | CS Cost Allocated |
  |---------|-----------|-------------|-----------|-------------------|
  | Enterprise | 45 | $280,000 | $12.6M | ??? |
  | Mid-Market | 320 | $95,000 | $30.4M | ??? |
  | SMB | 1,100 | $20,000 | $22.0M | ??? |

  Current cost allocation: "We divide by customer count"
  - Per customer: $8.2M / 1,465 = $5,600/customer
  - This means an enterprise customer ($280K ARR) and an
    SMB customer ($20K ARR) both "cost" $5,600 to serve
  - CEO: "That can't be right. Our enterprise CSMs each
    handle 4 accounts, and our SMB customers are mostly
    self-service."

  Key activities your team performs:
  1. Customer onboarding (new customers)
  2. Quarterly business reviews (enterprise only)
  3. Technical support escalation
  4. Product training delivery
  5. Renewal management
  6. Expansion/upsell support
  7. Health monitoring and proactive outreach
  8. Customer advocacy (case studies, references)
  9. Internal reporting and analytics
  10. Team management and development

  Time allocation data (from recent time study):
  - Enterprise CSMs: 60% proactive, 25% reactive, 15%
    admin
  - Mid-Market CSMs: 40% proactive, 40% reactive, 20%
    admin
  - Onboarding specialists: 80% onboarding, 20% training
  - Support engineers: 90% technical escalation, 10%
    documentation

  Task: Rebuild the department budget using activity-based
  costing. Calculate the true cost to serve each customer
  segment, identify which activities drive costs, and
  present insights that would change how the department
  operates. Include a profitability analysis by segment.

assertions:
  - type: llm_judge
    criteria: "Response applies ABC methodology correctly — identifies activities, assigns costs to activities (using time study data and direct attribution), then allocates activity costs to customer segments based on actual consumption; the cost per customer differs significantly by segment (enterprise likely $30K+ per customer, mid-market $8-12K, SMB $2-3K); the methodology reveals the cross-subsidy hidden in the per-customer average; calculations are transparent and verifiable."
    weight: 0.35
    description: "CorrectABCApplication"
  - type: llm_judge
    criteria: "Response reveals actionable insights — shows the true cost-to-serve vs revenue ratio by segment (is SMB profitable at $20K ARR with $2-3K cost? Is enterprise profitable at $280K with $30K+ cost?); identifies which activities are the biggest cost drivers; highlights where investment should increase (high-ROI activities) and where costs should decrease (low-value activities); the analysis would change how the CEO thinks about customer segment strategy."
    weight: 0.35
    description: "ActionableInsights"
  - type: llm_judge
    criteria: "Response connects ABC findings to operational recommendations — proposes changes based on the analysis (e.g., shift SMB to tech-touch/self-service model, invest more in enterprise retention given high ARR, automate repetitive activities, reallocate headcount based on segment profitability); the recommendations follow naturally from the data; includes a profitability analysis showing contribution margin by segment; the rebuilt budget tells a strategic story, not just an accounting exercise."
    weight: 0.30
    description: "OperationalRecommendations"
