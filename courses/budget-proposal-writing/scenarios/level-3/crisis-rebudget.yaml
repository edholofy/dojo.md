meta:
  id: crisis-rebudget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Crisis rebudget — rapidly rebudget an entire company in response to a major revenue shock"
  tags: [crisis, rebudgeting, downturn, rapid-response, advanced]

state: {}

trigger: |
  You're the CFO of a 600-person events management
  company ($95M revenue). Your largest client (30% of
  revenue) just terminated their contract effective in
  60 days due to their own financial difficulties. You
  need to rebudget the entire company immediately.

  Current budget (approved 3 months ago):
  - Revenue: $95M projected
  - COGS: $57M (60%)
  - Gross profit: $38M
  - Operating expenses: $32M
  - EBITDA: $6M (6.3% margin)
  - Cash on hand: $8M
  - Line of credit: $5M available (unused)
  - Monthly fixed costs: ~$2.1M
  - Monthly variable costs: ~$2.5M (tied to events)

  Impact of client loss:
  - Lost revenue: $28.5M annually ($2.375M/month)
  - Revenue drops to ~$66.5M (30% decline)
  - Associated COGS drops proportionally: ~$17.1M saved
  - But fixed costs remain: Rent, salaries, insurance,
    technology — $25.2M/year doesn't change
  - New projected EBITDA without action: -$4.7M (loss)
  - At current burn rate, cash runs out in ~7 months

  Workforce analysis:
  - 280 employees directly or partially worked on the
    lost client's events
  - 120 can be redeployed to other clients (capacity
    exists for 40 more events/year)
  - 160 have no immediate alternative work
  - Key talent risk: 35 senior event managers are getting
    recruiter calls
  - Severance cost at 2 weeks per year of service:
    estimated $2.4M for 160 people

  Revenue recovery potential:
  - Sales pipeline: $12M in potential new business (3-6
    month sales cycles)
  - Existing clients: 15% could increase their spend if
    offered incentives
  - New market segment (virtual events): Could launch in
    4 months, projected $5M in first year
  - Competitor poaching: 2 competitors are also
    approaching the lost client

  Board expectations:
  - "Don't panic — be strategic about cost cutting"
  - "Protect the core business and key relationships"
  - "Present options, not just doom and gloom"
  - "Show me how we survive this year and grow next year"

  Task: Create the crisis rebudget with 3 scenarios
  (aggressive cost cutting, moderate restructuring,
  strategic investment). Show the cash flow for each
  scenario, identify decision points, and recommend
  an approach that balances survival with positioning
  for recovery.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 distinct and viable scenarios — aggressive (deep cuts to reach breakeven quickly, higher risk of talent loss and capability damage), moderate (selective reductions preserving core capabilities, tight cash but sustainable), strategic (invest in new revenue while cutting, higher short-term risk but better long-term positioning); each scenario has specific actions, cost savings, cash flow projections, and trade-offs; the scenarios give the board real choices, not just one plan with variations."
    weight: 0.35
    description: "ThreeDistinctScenarios"
  - type: llm_judge
    criteria: "Response shows credible cash flow analysis — calculates monthly cash position for each scenario over 12 months; identifies when cash runs out in each scenario; considers severance costs (they worsen cash before improving it); accounts for the line of credit availability; shows when new revenue might offset the loss; the cash flow analysis reveals the true decision timeline (how long before irreversible decisions must be made)."
    weight: 0.35
    description: "CredibleCashFlowAnalysis"
  - type: llm_judge
    criteria: "Response balances survival with strategic thinking — doesn't just cut to survive (that's reactive); considers how to position for recovery (retain key talent, pursue the virtual events opportunity, protect client relationships); addresses the workforce decisions humanely (severance, redeployment, retention bonuses for key people); identifies the revenue recovery timeline and what investments accelerate it; the recommended approach would give the board confidence that leadership is being strategic under pressure."
    weight: 0.30
    description: "SurvivalWithStrategy"
