meta:
  id: nonprofit-grant-portfolio-budget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Nonprofit grant portfolio budget — manage a complex multi-funder budget with restricted and unrestricted funds, compliance requirements, and sustainability planning"
  tags: [nonprofit, grant-management, restricted-funds, compliance, advanced]

state: {}

trigger: |
  You're the CFO of a $28M nonprofit healthcare organization
  with 340 employees providing community health services
  across 12 clinic sites. Your funding comes from a complex
  mix of sources, and you need to create the consolidated
  annual budget that satisfies all funders, maintains
  compliance, and addresses a growing sustainability gap.

  Current funding portfolio:
  | Source | Amount | Type | Restrictions |
  |--------|--------|------|-------------|
  | Federal (HRSA 330) | $8.2M | Grant | Must serve uninsured, specific service targets |
  | State Medicaid | $6.5M | Reimbursement | Fee-for-service, 90-day lag |
  | Private Insurance | $4.8M | Revenue | Collection rate ~72% |
  | Ryan White (HIV) | $2.4M | Grant | HIV services only, MAI supplement |
  | SAMHSA (Behavioral) | $1.8M | Grant | Behavioral health integration |
  | County Contract | $1.5M | Contract | Dental services, specific zip codes |
  | Foundation Grants | $1.2M | Grants | Various program restrictions |
  | Patient Fees | $0.9M | Revenue | Sliding fee scale required |
  | Fundraising | $0.7M | Unrestricted | Donor intent varies |

  Budget challenges:
  - HRSA 330 grant renewal is next year — must demonstrate
    financial viability and appropriate cost allocation
  - Medicaid reimbursement rates haven't increased in 3 years
    while costs rose 12%
  - $2.1M in unrestricted funds must cover $3.8M in overhead
    (indirect costs) — creating a $1.7M sustainability gap
  - Three grants expire this year: SAMHSA ($1.8M), one
    foundation ($400K), county dental ($1.5M renewal uncertain)
  - New FQHC prospective payment system changes may increase
    Medicaid revenue by 8-12%
  - Board wants to open 2 new clinic sites ($800K startup each)
  - Federal single audit requires demonstrating proper cost
    allocation across all federal grants

  Cost allocation requirements:
  - Must use approved cost allocation plan (OMB Uniform
    Guidance, 2 CFR 200)
  - Indirect cost rate: 18.5% (negotiated with cognizant agency)
  - Some costs must be direct-charged to specific grants
  - Personnel costs split across multiple funding sources
    based on time-and-effort reporting
  - Building costs allocated by square footage per program

  Task: Create the consolidated annual budget showing revenue
  by source, expenses by program and natural classification,
  the cost allocation methodology, the sustainability gap
  analysis with mitigation strategies, and the grant
  compliance framework. Address both the board's expansion
  goals and the financial reality.

assertions:
  - type: llm_judge
    criteria: "Response creates a properly structured nonprofit budget — shows revenue by restricted vs unrestricted sources; presents expenses by both natural classification (salaries, benefits, supplies, occupancy) and functional classification (program vs management & general vs fundraising); applies the 18.5% indirect cost rate correctly; demonstrates proper cost allocation across multiple federal grants following 2 CFR 200; the budget would pass a federal single audit's review of cost allocation methodology."
    weight: 0.35
    description: "ProperNonprofitBudgetStructure"
  - type: llm_judge
    criteria: "Response addresses the sustainability gap — identifies the $1.7M structural deficit between unrestricted revenue and overhead costs; proposes realistic mitigation strategies (diversify unrestricted revenue, pursue indirect cost rate increase, negotiate higher reimbursement rates, increase fundraising); evaluates the board's expansion plans against financial reality (can they afford 2 new sites?); the analysis distinguishes between one-time and structural solutions."
    weight: 0.35
    description: "SustainabilityGapAnalysis"
  - type: llm_judge
    criteria: "Response manages grant portfolio risk — addresses the 3 expiring grants with contingency planning; shows what happens to programs if SAMHSA or county funding isn't renewed; proposes replacement funding strategies; evaluates the FQHC payment system change impact on Medicaid revenue; the budget tells a story about financial stewardship that would satisfy HRSA reviewers, the board, and donors simultaneously."
    weight: 0.30
    description: "GrantPortfolioRiskManagement"
