meta:
  id: budget-governance-framework
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Budget governance framework — design a company-wide budget governance system with controls, accountability, and transparency"
  tags: [governance, controls, accountability, framework, advanced]

state: {}

trigger: |
  You're the VP of Finance at a 1,200-person manufacturing
  company ($200M revenue) that has grown rapidly through
  acquisition. The company now has 4 business units, but
  budget management is chaotic — each BU has its own process,
  there's no consistent approval framework, and the CEO
  found out about a $2.3M unbudgeted spend only when it hit
  the P&L. She's asked you to design a budget governance
  framework "so this never happens again."

  Current problems:
  - No consistent approval thresholds across BUs
  - BU heads approve their own budget changes up to any
    amount (one approved a $1.2M vendor contract without
    CFO or CEO awareness)
  - Monthly budget reviews happen in 2 BUs, quarterly in 1,
    and not at all in the acquired BU
  - Reforecasting happens annually (too infrequent for a
    company this size)
  - 340 cost center managers have P&L authority but many
    lack financial training
  - Capital requests have no standardized evaluation
    criteria — "whoever yells loudest gets the money"
  - Transfer pricing between BUs is inconsistent
  - No formal process for budget reallocation mid-year

  Company structure:
  | BU | Revenue | Employees | Maturity |
  |----|---------|-----------|----------|
  | Core Manufacturing | $110M | 580 | Mature, established processes |
  | Specialty Products | $45M | 280 | Growth, some processes |
  | Services Division | $30M | 220 | New (acquired 18 months ago) |
  | Digital Solutions | $15M | 120 | Startup-like, minimal process |

  CEO's requirements:
  - "I want one governance framework for all BUs — no more
    special treatment"
  - "I should know about any spend over $500K before it
    happens, not after"
  - "Make it rigorous but don't create bureaucracy that
    slows us down"
  - "The Digital Solutions team moves fast — don't kill
    their agility with process"
  - "I want quarterly reforecasts at minimum"

  Task: Design the comprehensive budget governance framework
  including approval hierarchies, spending authority levels,
  variance management protocols, reforecasting cadence,
  capital allocation process, and accountability mechanisms.
  Present it as a document the CEO could share with all BU
  heads to implement.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive governance framework — includes tiered approval authority (cost center manager, BU head, CFO, CEO/board levels with clear dollar thresholds); defines budget variance tolerance bands and escalation triggers; establishes consistent reporting cadence across all BUs; creates a capital allocation process with standardized evaluation criteria; addresses transfer pricing standardization; the framework covers the full budget lifecycle from planning through execution and review."
    weight: 0.35
    description: "ComprehensiveGovernanceFramework"
  - type: llm_judge
    criteria: "Response balances control with agility — creates differentiated processes that maintain governance without bureaucracy (Digital Solutions might have different approval speed but same thresholds); addresses the CEO's concern about knowing about large spends proactively; includes expedited approval paths for urgent needs; doesn't create so many approval layers that nothing gets done; the framework would work for both the mature Core Manufacturing and the startup-like Digital Solutions."
    weight: 0.35
    description: "ControlWithAgility"
  - type: llm_judge
    criteria: "Response addresses change management — acknowledges that 340 cost center managers need training and support; proposes rollout plan (phased, not all at once); includes accountability mechanisms without being punitive; addresses the cultural differences across BUs (especially the acquired Services Division); includes specific examples of how common scenarios would be handled under the new framework; the document would build buy-in from BU heads rather than create resistance."
    weight: 0.30
    description: "ChangeManagementApproach"
