meta:
  id: portfolio-budget-allocation
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Portfolio budget allocation — allocate R&D budget across multiple product lines using portfolio management principles"
  tags: [portfolio, allocation, r-and-d, product-strategy, advanced]

state: {}

trigger: |
  You're the VP of Product at a 1,000-person enterprise
  software company ($180M ARR). The CEO has given you a
  total R&D budget of $42M for next year and wants you to
  allocate it across 6 product lines. Each product GM
  wants more than their fair share, and total requests
  sum to $68M. You need a principled allocation framework.

  Product portfolio:
  | Product | ARR | Growth | Margin | Stage | R&D Ask |
  |---------|-----|--------|--------|-------|---------|
  | Core ERP | $80M | 5% | 82% | Mature/Cash cow | $14M |
  | CRM | $45M | 18% | 75% | Growth | $16M |
  | Analytics | $25M | 35% | 70% | High growth | $12M |
  | HR Module | $18M | 12% | 78% | Growth | $8M |
  | AI Platform | $8M | 120% | 45% | Early/Investment | $10M |
  | IoT Module | $4M | -5% | 40% | Struggling | $8M |
  | Total | $180M | | | | $68M |

  Context for each product:

  Core ERP ($14M ask):
  - "I need $14M just to keep the lights on — security
    patches, compliance updates, platform modernization"
  - 55% of company revenue depends on this product
  - Technical debt is significant — 3 major incidents
    last year
  - But: Growth is only 5% — is heavy investment here
    just maintenance?

  CRM ($16M ask):
  - "We're losing deals to Salesforce because our product
    is 2 years behind on features"
  - Fastest-growing revenue product in absolute dollars
  - Competitive pressure is intense
  - $16M would fund 3 major feature releases

  Analytics ($12M ask):
  - "We have product-market fit and the market is
    exploding — double down now"
  - Highest growth rate, large addressable market
  - Could be standalone product or embedded in other
    products
  - $12M would fund AI/ML features that competitors
    don't have

  HR Module ($8M ask):
  - "Solid product, loyal customers, needs incremental
    investment"
  - Predictable growth, good margins
  - Not the most exciting but reliable revenue

  AI Platform ($10M ask):
  - "This is the future — every product needs AI"
  - Fastest percentage growth but from small base
  - Could become a platform capability for all products
  - High investment, uncertain payback timeline

  IoT Module ($8M ask):
  - "Just give me one more year — the market is about to
    turn"
  - Declining revenue, low margins
  - PM has said this for 2 years
  - But: 40 customers depend on it, some are large ERP
    customers

  CEO's guidance:
  - "Invest in growth, but don't break what's working"
  - "AI is strategic — but it needs to enhance existing
    products, not be a standalone moonshot"
  - "We can't keep funding IoT if it doesn't turn around"
  - "I want a framework, not just your gut feeling"

  Task: Create the portfolio allocation framework, apply
  it to allocate the $42M across all 6 products, and
  present the rationale in a way that each product GM
  understands why they got what they got (even if it's
  less than they wanted).

assertions:
  - type: llm_judge
    criteria: "Response creates a principled allocation framework — uses a methodology based on multiple factors (revenue contribution, growth rate, market opportunity, strategic importance, competitive necessity, technical debt/maintenance needs); weights the factors transparently; applies the framework consistently across all products; the framework produces allocations that are defensible and reproducible, not just the VP's preferences dressed up in a framework."
    weight: 0.35
    description: "PrincipledAllocationFramework"
  - type: llm_judge
    criteria: "Response makes tough calls on the portfolio — allocates meaningfully different amounts (not peanut butter); addresses the IoT decision honestly (likely reduced investment with sunset criteria); balances Core ERP maintenance needs against growth products; decides whether AI should be a standalone product or a shared capability; the allocation reflects strategic priorities, not just proportional to current revenue; each product gets a clear explanation of their allocation."
    weight: 0.35
    description: "ToughPortfolioDecisions"
  - type: llm_judge
    criteria: "Response addresses each GM's likely reaction — anticipates pushback from underfunded products (IoT GM will be frustrated, CRM GM may not get their $16M); explains what outcomes are expected for each allocation (if CRM gets $12M instead of $16M, what features must be prioritized?); sets success criteria and review points ('if IoT doesn't reach X by Q2, remaining budget reallocated'); the presentation would build consensus rather than create resentment."
    weight: 0.30
    description: "ConsensusBuilding"
