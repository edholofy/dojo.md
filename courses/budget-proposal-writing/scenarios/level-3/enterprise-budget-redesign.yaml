meta:
  id: enterprise-budget-redesign
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Enterprise budget redesign — redesign the annual budgeting process for a company that has outgrown its current approach"
  tags: [enterprise, process-redesign, governance, budgeting-process, advanced]

state: {}

trigger: |
  You're the VP of Finance at a 1,500-person technology
  company ($280M revenue) that has grown 3x in 4 years
  through organic growth and acquisitions. The budgeting
  process that worked at $90M revenue is now broken.

  Current problems:
  - Budget cycle takes 5 months (August to January) — by
    the time it's approved, Q1 is half over
  - 180 budget owners submit requests, resulting in
    $380M in total asks against $260M in available
    spending — every cycle is a painful negotiation
  - 3 acquired companies still use different budget
    formats and fiscal years
  - Department heads "game" the system — everyone pads
    by 15-20%, knowing they'll be cut
  - Finance team spends 60% of their time on budget
    process instead of analysis
  - Budget accuracy: Average department is 18% off actual
    by year-end
  - No connection between budget and strategy — it's a
    bottom-up wish list, not a top-down strategic plan
  - The CEO calls it "budget theater" and wants reform

  Company structure:
  - 4 business units (each with GM, own P&L)
  - 12 shared services departments (HR, Finance, IT,
    Legal, Facilities, etc.)
  - 3 geographic regions (Americas, EMEA, APAC)
  - Matrix reporting: BUs own revenue, shared services
    are allocated

  CEO's mandate:
  - "Reduce budget cycle to 8 weeks"
  - "Connect spending to 5 strategic priorities"
  - "Eliminate the gaming and padding"
  - "Give me monthly visibility, not annual set-and-forget"
  - "I want 90% budget accuracy, not 82%"
  - Budget for the redesign: $500K (consulting, tools,
    internal effort)

  Current technology:
  - Excel-based budgeting (3,000+ linked spreadsheets)
  - SAP for actuals (ERP)
  - No planning/forecasting tool
  - PowerBI for reporting (limited to actuals)

  Task: Design the new enterprise budgeting process.
  Include the operating model (cadence, roles, governance),
  methodology changes (how to eliminate gaming, connect
  to strategy), technology recommendations, and a phased
  implementation plan within the $500K budget.

assertions:
  - type: llm_judge
    criteria: "Response redesigns the process fundamentally — doesn't just speed up the current broken process; proposes a new methodology (likely driver-based or activity-based budgeting); shifts from bottom-up wish lists to top-down strategic allocation with bottom-up validation; creates a clear governance framework (who approves what, at what level); reduces the 5-month cycle to 8 weeks with a specific timeline showing how; the redesign addresses each of the CEO's specific mandates."
    weight: 0.35
    description: "FundamentalProcessRedesign"
  - type: llm_judge
    criteria: "Response addresses the gaming and accuracy problems — proposes mechanisms to eliminate padding (transparent benchmarking, use-it-or-redirect-it policies, rolling forecasts that replace annual negotiations); improves accuracy through continuous forecasting and variance accountability; connects budgets to the 5 strategic priorities (each dollar must map to a priority); the solutions are structural (changing incentives and processes), not just behavioral (telling people to stop gaming)."
    weight: 0.35
    description: "GamingAndAccuracySolutions"
  - type: llm_judge
    criteria: "Response includes practical technology and implementation recommendations — recommends specific planning tool categories (Anaplan, Adaptive, Vena, or similar) with justification; proposes how to migrate from 3,000 Excel spreadsheets without losing institutional knowledge; phases the implementation (process first, then tool, then optimization); the $500K budget is allocated across consulting, technology, and change management; the implementation plan acknowledges that changing a 1,500-person company's budget culture takes more than a new tool."
    weight: 0.30
    description: "TechnologyAndImplementation"
