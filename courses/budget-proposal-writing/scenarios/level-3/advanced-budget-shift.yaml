meta:
  id: advanced-budget-shift
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Advanced budget shift — handle a board budget challenge, a post-acquisition integration budget, and a competitive crisis rebudget simultaneously"
  tags: [shift-simulation, board, integration, crisis, advanced]

state: {}

trigger: |
  You're the CFO of a 900-person industrial technology
  company ($160M revenue). Three urgent budget situations
  have converged in the same week.

  SITUATION 1 — Board Budget Challenge:
  You're presenting the annual budget to the board on
  Friday. The lead board member (a PE partner) has sent
  pre-meeting questions:
  - "Your R&D budget is up 22% but revenue growth target is
    only 15%. Explain the ROI."
  - "SG&A as a percentage of revenue hasn't improved in 3
    years. What's the path to operational leverage?"
  - "You're projecting 18% gross margin improvement but I
    see no structural changes. What am I missing?"
  - "The $4M AI investment has no clear payback timeline.
    Why should I approve this?"

  Budget summary for board:
  | Line | This Year | Next Year | Change |
  |------|-----------|-----------|--------|
  | Revenue | $160M | $184M | +15% |
  | COGS | $104M | $114M | +10% |
  | Gross Profit | $56M | $70M | +25% |
  | R&D | $18M | $22M | +22% |
  | SG&A | $30M | $33M | +10% |
  | EBITDA | $8M | $15M | +88% |

  SITUATION 2 — Post-Acquisition Integration Budget:
  The company just closed a $45M acquisition of a 120-person
  competitor. The integration PMO needs a budget by Monday.
  You have early estimates:
  - IT integration (systems merge): $2.5M over 18 months
  - Facility consolidation: $1.8M (close 2 of 3 offices)
  - Severance (35 redundant roles): $1.4M
  - Retention bonuses (25 key people): $1.2M
  - Legal and regulatory: $600K
  - Rebranding: $400K
  - Revenue synergies expected: $8M by Year 2
  - Cost synergies expected: $6M by Year 2
  - But: The acquired company's financials look worse than
    due diligence suggested — their EBITDA was $3M, not $5M
    as reported

  SITUATION 3 — Competitive Emergency:
  Your largest competitor just announced they're slashing
  prices by 25% on their core product (which competes with
  40% of your revenue). The sales team is panicking — they
  want $3M in emergency pricing authority and accelerated
  product development investment.
  - If you match the price cut: $12M annual revenue impact
  - If you don't match: risk losing 15% of affected revenue
  - Sales VP: "I need the pricing authority by Wednesday
    or we'll lose 3 deals worth $4.2M this quarter"

  Task: Address all three situations with appropriate budget
  responses. For the board, prepare answers to each question.
  For the integration, create the budget with the adjusted
  financials. For the competitive crisis, propose a budget
  response that balances short-term defense with long-term
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response addresses the board questions convincingly — explains R&D ROI with specific expected returns (not just 'innovation is important'); shows the SG&A leverage path with operational improvements; substantiates the gross margin improvement with structural explanations (mix shift, pricing, automation); defends the AI investment with competitive necessity and specific use cases; the answers would satisfy a sophisticated PE investor who has seen many budget presentations."
    weight: 0.35
    description: "BoardQuestionResponses"
  - type: llm_judge
    criteria: "Response creates a credible integration budget — recalculates the acquisition economics with the $3M EBITDA (not $5M) reality; shows the impact on deal valuation and synergy timeline; phases the integration costs appropriately; identifies risks in the revised financials; proposes how to communicate the EBITDA gap to the board; the budget reflects someone who has dealt with post-close financial surprises and knows how to manage through them."
    weight: 0.35
    description: "IntegrationBudgetResponse"
  - type: llm_judge
    criteria: "Response proposes a strategic competitive response — doesn't just match the price cut or ignore it; considers selective price matching (protect key accounts, defend in core segments, let go of unprofitable business); calculates the financial impact of different response scenarios; addresses the sales VP's urgency with interim authority while developing a longer-term strategy; connects the competitive response to the board budget narrative; the response shows strategic thinking under pressure."
    weight: 0.30
    description: "CompetitiveResponseStrategy"
