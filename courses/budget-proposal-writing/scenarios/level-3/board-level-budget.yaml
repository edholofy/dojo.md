meta:
  id: board-level-budget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "Board-level budget — prepare the annual operating budget for board approval with strategic narrative"
  tags: [board, operating-budget, strategic-narrative, governance, advanced]

state: {}

trigger: |
  You're the CFO of a 800-person healthcare technology
  company ($120M revenue, EBITDA breakeven). The board
  meeting is in 2 weeks, and you need to present the
  annual operating budget for approval. The board is
  composed of 3 investors (PE firm), 2 independent
  directors, and the CEO. They care about strategic
  alignment, path to profitability, and capital efficiency.

  Company context:
  - Revenue: $120M (grew 25% this year)
  - EBITDA: $0 (breakeven, up from -$12M last year)
  - Cash: $35M
  - Key products: EHR system ($80M), Patient engagement
    platform ($30M), Analytics ($10M)
  - PE firm invested $100M 2 years ago, expecting exit
    in 3-4 years at 8-10x EBITDA

  Board's stated priorities:
  1. Path to 20% EBITDA margin within 3 years (for exit
     valuation)
  2. Revenue growth of 20%+ sustained
  3. Investment in AI capabilities (competitive necessity)
  4. Reduce customer churn from 12% to 8%
  5. Regulatory compliance (HIPAA, HITRUST, SOC 2)

  Proposed budget summary:
  | Category | This Year Actual | Next Year Budget | Change |
  |----------|-----------------|-----------------|--------|
  | Revenue | $120M | $150M | +25% |
  | COGS | $36M | $42M | +17% |
  | Gross Profit | $84M | $108M | +29% |
  | Sales & Marketing | $30M | $33M | +10% |
  | R&D | $32M | $38M | +19% |
  | G&A | $22M | $24M | +9% |
  | Total OpEx | $84M | $95M | +13% |
  | EBITDA | $0M | $13M | +$13M |
  | EBITDA Margin | 0% | 8.7% | +8.7pts |

  Key investments in the budget:
  - AI team (12 new hires, $4M): Build AI-powered
    clinical decision support
  - Customer success expansion (+6 CSMs, $600K): Reduce
    churn from 12% to 9%
  - SOC 2 Type II certification ($500K): Required by
    enterprise customers
  - International expansion prep ($1.5M): UK and Canada
    market entry (Year 2)
  - Sales capacity increase (+8 reps, $1.2M): Support
    $30M revenue growth

  Tensions in the budget:
  - R&D growing 19% while board wants margin expansion
    (AI investment is strategic but expensive)
  - Revenue target of 25% growth requires significant
    S&M investment
  - Customer success investment won't show ROI for 12-18
    months
  - $13M EBITDA sounds good but board wants faster path
    to 20%

  Task: Prepare the board-level budget presentation
  package. Include an executive summary, strategic
  narrative connecting the budget to the 5 board
  priorities, key investment decisions requiring board
  input, risk factors, and the 3-year path to 20% EBITDA.

assertions:
  - type: llm_judge
    criteria: "Response creates a board-ready budget presentation — executive summary with key metrics on one page; strategic narrative connecting each major budget line to the 5 board priorities; investment decisions framed as strategic choices (not just line items); the presentation respects board members' time and expertise level; includes a clear ask (what specific approvals are needed); the format would work in a real PE-backed board meeting."
    weight: 0.35
    description: "BoardReadyPresentation"
  - type: llm_judge
    criteria: "Response addresses the path to 20% EBITDA — shows the 3-year trajectory from 0% → 8.7% → ~14% → 20%; explains which investments are one-time vs ongoing; demonstrates operating leverage (revenue growing faster than expenses); addresses the R&D investment tension (AI spend is high now but builds competitive moat); shows how customer success investment reduces churn and improves net revenue retention; the financial narrative is credible and shows the PE investors a viable path to their target exit valuation."
    weight: 0.35
    description: "ProfitabilityPathway"
  - type: llm_judge
    criteria: "Response identifies risks and decision points for the board — presents areas where the board needs to make trade-offs (invest more in AI vs faster margin expansion; international expansion timing; growth rate vs profitability); identifies key risks (revenue target assumes 25% growth, churn reduction takes time, AI investment may not pay off for 2 years); proposes specific metrics the board should track quarterly; the presentation positions the CFO as a strategic partner, not just a number cruncher."
    weight: 0.30
    description: "RisksAndDecisionPoints"
