meta:
  id: ma-integration-budget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "M&A integration budget — create the post-merger integration budget with synergy targets and one-time costs"
  tags: [ma, integration, synergy, post-merger, advanced]

state: {}

trigger: |
  You're the CFO of a 2,000-person enterprise software
  company ($350M revenue) that just acquired a 500-person
  competitor ($85M revenue) for $425M. The board expects
  $35M in annual synergies by Year 3, and you need to
  create the integration budget. The challenge: achieving
  synergies requires investment, and the investment itself
  is substantial.

  Deal financial summary:
  - Purchase price: $425M (5x revenue)
  - Financed: $250M debt + $175M equity
  - Debt service: $18M/year (interest + principal)
  - Target synergies: $35M/year by Year 3
  - Expected one-time integration costs: $40-60M over
    2 years (need to refine)

  Synergy targets identified in due diligence:
  1. Headcount synergies: $18M/year
  - Redundant corporate functions (2 CFOs, 2 CMOs, etc.):
    $8M
  - Sales team overlap (shared territory): $4M
  - Duplicate engineering teams: $6M
  - Timing: Starts Month 3, fully realized Month 18

  2. Revenue synergies: $10M/year
  - Cross-sell to combined customer base: $6M
  - Price optimization on overlapping products: $4M
  - Timing: Starts Month 6, fully realized Month 30

  3. Operational synergies: $7M/year
  - Facility consolidation (close 2 of 5 offices): $3M
  - Technology platform consolidation: $2M
  - Vendor renegotiation (combined volume): $2M
  - Timing: Starts Month 6, fully realized Month 24

  One-time integration costs (your estimates):
  - Severance (estimated 120 eliminated positions): $8M
  - Retention bonuses (key talent, 18-month vesting): $6M
  - Technology integration (system migration): $12M
  - Facility closure (lease termination, moving): $4M
  - Rebranding and marketing: $2.5M
  - Legal and regulatory (antitrust, contract
    renegotiation): $3M
  - Change management and communication: $1.5M
  - Integration management office (PMO): $3M
  - Customer retention programs: $2M
  - Contingency (15%): $6.3M
  - Total: ~$48.3M

  Complications:
  - 2 acquired offices have lease terms of 3 and 5 years
    respectively (can't close immediately)
  - Key acquired talent is flight risk (3 VP-level
    engineers have competing offers)
  - Customer overlap: 15% of combined customer base buys
    from both companies (risk of confusion during
    integration)
  - Acquired company's ERP is Oracle; yours is SAP
  - Cultural integration: Acquired company is a startup
    culture; yours is enterprise

  Task: Create the detailed integration budget for Year 1
  and Year 2. Map synergy realization by quarter, show
  when one-time costs hit, calculate the net financial
  impact of integration, and present the ROI of the
  acquisition including integration costs. Include
  risk factors that could affect the numbers.

assertions:
  - type: llm_judge
    criteria: "Response creates a detailed quarterly integration budget — maps one-time costs and synergy realization by quarter over 2 years; shows the net financial impact (costs minus realized synergies) by quarter; demonstrates the 'J-curve' (costs come before synergies); Year 1 likely negative, Year 2 approaching breakeven; Year 3 and beyond show the full $35M synergy run rate; the quarterly granularity reveals cash flow timing challenges."
    weight: 0.35
    description: "DetailedIntegrationBudget"
  - type: llm_judge
    criteria: "Response validates synergy targets with realistic timing — doesn't assume immediate realization; accounts for the delay between action (headcount reduction) and financial impact (severance period, transition costs); recognizes that revenue synergies are hardest to achieve and take longest; separates 'identified' synergies from 'realized' synergies; the synergy ramp is conservative and credible; identifies which synergies are highest risk and which are most certain."
    weight: 0.35
    description: "RealisticSynergyTiming"
  - type: llm_judge
    criteria: "Response addresses integration risks and complications — plans for the lease term constraints (can't close offices immediately); addresses talent retention risk (the 3 VP-level engineers); considers customer confusion during integration; acknowledges the SAP/Oracle integration complexity; includes the cultural integration challenge; the budget accounts for what could go wrong, not just the optimistic path; presents the acquisition ROI honestly including all integration costs."
    weight: 0.30
    description: "RiskAwareIntegration"
