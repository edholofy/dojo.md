meta:
  id: international-expansion-budget
  level: 3
  course: budget-proposal-writing
  type: output
  description: "International expansion budget — create a budget for entering a new international market with currency, regulatory, and operational complexity"
  tags: [international, expansion, currency-risk, regulatory, advanced]

state: {}

trigger: |
  You're the Head of International at a 700-person US-
  based SaaS company ($100M ARR). The board has approved
  expanding into the European market, starting with the
  UK and Germany. You need to create a detailed 2-year
  budget for the expansion. The CFO is concerned about
  currency risk, regulatory compliance costs, and the
  fact that "every international expansion I've seen
  costs 2x what was budgeted."

  Expansion scope:
  - UK office: London (hub for English-speaking Europe)
  - Germany office: Munich (hub for DACH region)
  - Target: $8M ARR from Europe by end of Year 2
  - Current European revenue: $1.2M (from US-based sales,
    no local presence)

  Year 1 plan:
  - Hire Country Manager UK (month 1): £150,000/year
  - Hire Country Manager Germany (month 3): €160,000/year
  - UK sales team (by month 6): 3 reps at £80,000 base +
    £40,000 OTE
  - Germany sales team (by month 6): 3 reps at €85,000
    base + €40,000 OTE
  - Pre-sales/solutions engineer (shared): £95,000
  - Customer success (1 UK, 1 Germany by month 9):
    £70,000 / €75,000
  - Marketing (1 regional by month 6): £80,000

  Year 2 plan:
  - Double sales teams (6 per country)
  - Add 2 more CS per country
  - Marketing team of 3
  - Finance/admin local hire per country
  - Office upgrade from coworking to dedicated space

  Operational costs:
  - Coworking space: £1,500/month London, €1,200/month
    Munich (Year 1)
  - Dedicated office (Year 2): £15,000/month London,
    €10,000/month Munich
  - Legal entity setup (UK Ltd + German GmbH): $80,000
  - Local legal counsel (employment law, GDPR): $60,000/
    year per country
  - Payroll provider (local compliance): $500/employee/
    month
  - Accounting (local GAAP + US GAAP reconciliation):
    $4,000/month per country
  - Insurance (local requirements): $24,000/year per
    country
  - GDPR compliance: $150,000 (product changes +
    processes)
  - Data residency (EU hosting): $80,000/year additional
    AWS costs
  - Localization (product, marketing, legal): $120,000

  Currency assumptions:
  - Current rates: GBP/USD = 1.27, EUR/USD = 1.09
  - CFO requirement: Budget at 5% unfavorable rate AND
    show impact of 10% swing

  Revenue assumptions:
  - UK: £2.5M ARR by end of Year 2 (at current exchange:
    ~$3.2M)
  - Germany: €2.8M ARR by end of Year 2 (at current
    exchange: ~$3.1M)
  - Plus growth from existing $1.2M base: $2M by Year 2
  - Total European ARR target: ~$8.3M

  Task: Create the 2-year expansion budget in USD showing
  all costs with currency sensitivity. Include the revenue
  ramp model, the P&L for the European operation, and the
  break-even analysis. Address the CFO's concern about
  cost overruns.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive expansion budget — includes all cost categories (personnel in local currencies converted to USD, legal entity setup, compliance, office space, technology, localization); shows quarterly or semi-annual phasing as hires are made; accounts for the ramp timing (hires don't produce revenue immediately); the budget is in USD with transparent currency conversion; includes both GBP and EUR cost streams."
    weight: 0.35
    description: "ComprehensiveExpansionBudget"
  - type: llm_judge
    criteria: "Response addresses currency risk — presents the budget at the CFO-required 5% unfavorable rate; shows the impact of a 10% currency swing on total costs and revenue; calculates the natural hedge (UK costs in GBP, UK revenue in GBP — partially offsetting); identifies the net currency exposure; proposes whether hedging is necessary; the currency analysis demonstrates financial sophistication without overcomplicating."
    weight: 0.35
    description: "CurrencyRiskAnalysis"
  - type: llm_judge
    criteria: "Response includes P&L projection and break-even analysis — shows the European operation's standalone P&L; identifies when the European business becomes self-sustaining (likely 18-24 months for individual countries); calculates total investment before breakeven; addresses the CFO's '2x cost overrun' concern with specific risk buffers and contingency; identifies the biggest cost drivers and where overruns typically occur in international expansion; the analysis builds confidence that the budget is realistic."
    weight: 0.30
    description: "PnLAndBreakeven"
