meta:
  id: budget-cut-response
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Budget cut response — revise a department budget after being told to cut 15% while protecting critical priorities"
  tags: [budget-cut, prioritization, trade-offs, revision, beginner]

state: {}

trigger: |
  You're the Customer Support Manager at a 150-person
  SaaS company. You submitted your annual budget of
  $520,000 for next year. The CFO just sent it back with
  a note: "Company is tightening spending. Every
  department needs to cut 15%. Please resubmit at
  $442,000 or below. Identify what you're cutting and
  what the impact will be."

  Your original budget submission:
  1. Helpdesk software (Zendesk): $36,000/year — essential,
     used by all 8 agents daily
  2. Phone system (Dialpad): $14,400/year — essential for
     phone support
  3. Knowledge base tool (Guru): $9,600/year — internal
     agent knowledge base
  4. Customer satisfaction survey tool: $4,800/year
  5. Quality monitoring software: $7,200/year — records
     and scores calls
  6. Training budget: $24,000/year — courses, conferences,
     certifications for 8 agents
  7. New hire (9th agent): $65,000/year salary + $5,000
     onboarding
  8. Contractor for weekend coverage: $31,200/year (20
     hrs/week at $30/hr)
  9. Support community platform: $18,000/year — customer
     self-service forum (new initiative)
  10. Customer health monitoring tool: $12,000/year (new)
  11. Team offsite/morale: $8,000/year
  12. Overtime budget: $15,000/year for peak periods
  13. Travel (customer visits): $10,000/year
  14. Office supplies/equipment: $6,000/year
  15. Miscellaneous/contingency: $12,000/year

  Subtotal: $278,200 (operational) + $70,000 (new hire)
  + remaining items = $520,000 total (some items above
  sum to more; assume the numbers are correct as listed
  for a total of $520,000)

  Context for your decisions:
  - Ticket volume is up 25% year-over-year
  - Current CSAT: 88% (target: 92%)
  - Average response time: 4.2 hours (target: 2 hours)
  - 2 agents are showing burnout signs (turnover risk)
  - The 9th agent hire was to address volume growth
  - Community platform was supposed to deflect 20% of
    tickets
  - Weekend coverage has been handled by agents working
    overtime (the contractor was meant to fix this)

  Task: Revise the budget to $442,000 or below. For each
  cut, explain what you're eliminating or reducing, why
  you chose it, and what the business impact will be. Make
  the revised budget a document that shows the CFO you
  take the constraint seriously while being transparent
  about consequences.

assertions:
  - type: llm_judge
    criteria: "Response makes thoughtful prioritization decisions — protects essential tools and core team capacity; identifies which items can be cut with minimal impact vs which cuts have real consequences; doesn't just proportionally reduce everything (peanut butter approach) — makes strategic choices; considers which new initiatives to defer vs which are critical for handling volume growth; the prioritization logic is clear and defensible."
    weight: 0.35
    description: "ThoughtfulPrioritization"
  - type: llm_judge
    criteria: "Response is transparent about trade-offs and consequences — for each cut, clearly states the business impact (e.g., 'cutting the 9th hire means response times will likely increase to 6+ hours' or 'deferring the community platform means we lose the 20% ticket deflection'); doesn't hide bad news; presents the CFO with the honest reality of a 15% cut so they can make an informed decision; acknowledges burnout risk if headcount isn't addressed."
    weight: 0.35
    description: "TransparentTradeoffs"
  - type: llm_judge
    criteria: "Response presents a clean, revised budget — shows the original vs revised amount for each line item; clearly marks what was cut, reduced, or deferred; totals to $442,000 or below; maintains professional tone (not bitter or passive-aggressive about the cuts); may suggest phased approaches or conditional spending (e.g., 'if CSAT drops below 85%, we'll need to revisit the hire'); the revised budget is a complete, submittable document."
    weight: 0.30
    description: "CleanRevisedBudget"
