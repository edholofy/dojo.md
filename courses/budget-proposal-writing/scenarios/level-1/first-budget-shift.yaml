meta:
  id: first-budget-shift
  level: 1
  course: budget-proposal-writing
  type: output
  description: "First budget shift — handle multiple budget-related tasks under time pressure in a realistic workday"
  tags: [shift-simulation, multi-task, budget, pressure, beginner]

state: {}

trigger: |
  You're an Office Manager at a 40-person digital agency.
  It's Thursday morning and you have 3 budget-related
  tasks due by end of day Friday.

  Task 1 — Emergency Budget Request:
  The creative director just told you the team needs new
  design monitors. 5 designers are using 5-year-old 24"
  monitors, and a major client complained yesterday that
  the color accuracy on delivered assets was "unacceptable."
  The client is worth $300K/year.

  Your research:
  - Dell UltraSharp 27" 4K (U2723QE): $520 each × 5 =
    $2,600
  - LG 27UK850-W 27" 4K: $450 each × 5 = $2,250
  - Apple Studio Display: $1,599 each × 5 = $7,995
  - Calibration tool (i1Display Pro): $270 (one for the
    team)
  - The agency's discretionary spending limit without
    CEO approval: $3,000
  - Above $3,000 requires a written request to the CEO

  Task 2 — Monthly Expense Report:
  The bookkeeper needs your department's October expense
  report reconciled by Friday. You have 15 transactions
  to categorize and several need explanation:

  Key transactions needing attention:
  - $1,200 — Adobe Creative Cloud (annual renewal, paid
    monthly last year at $100/month but switched to annual
    at $960/year — need to explain the larger payment)
  - $340 — "Team dinner" — but it was actually a client
    meeting dinner (needs reclassification from "meals —
    internal" to "client entertainment")
  - $89 — Amazon purchase (unlabeled — you need to figure
    out what it was)
  - $2,100 — Conference sponsorship (was approved verbally
    by CEO but no written approval in the system)
  - $450 — Uber rides (3 trips, need to verify they're
    business-related)

  Task 3 — Next Quarter Budget Adjustment:
  The CEO announced yesterday that Q1 revenue is projected
  15% below forecast. She wants each department to submit
  a revised Q1 budget with 10% reduction by Friday. Your
  original Q1 budget was $42,000.

  Your Q1 line items:
  - Software subscriptions: $8,400 (committed — contracts)
  - Office supplies: $3,600
  - Marketing materials: $4,200
  - Client entertainment: $3,000
  - Team training: $6,000
  - Equipment: $4,800
  - Travel: $5,200
  - Miscellaneous: $3,600
  - Contingency: $3,200

  Task: Handle all 3 tasks. Write the monitor purchase
  request, reconcile the expense report with proper
  categorizations and explanations, and submit the revised
  Q1 budget at $37,800 or below.

assertions:
  - type: llm_judge
    criteria: "Response handles the monitor purchase effectively — recommends the Dell or LG option to stay near the $3,000 threshold; if exceeding $3,000, writes a brief but compelling request to the CEO connecting the purchase to the $300K client relationship; includes the calibration tool; the recommendation is practical and considers the approval threshold constraint."
    weight: 0.35
    description: "MonitorPurchaseDecision"
  - type: llm_judge
    criteria: "Response reconciles the expense report correctly — reclassifies the client dinner properly; explains the Adobe annual vs monthly payment change; flags the conference sponsorship needing written approval (retroactive documentation); investigates or flags the unlabeled Amazon purchase; verifies Uber rides are business-related; the reconciliation shows attention to detail and proper accounting practices."
    weight: 0.35
    description: "ExpenseReconciliation"
  - type: llm_judge
    criteria: "Response creates a sensible revised Q1 budget — reaches $37,800 or below; protects committed costs (software subscriptions can't be cut); makes reasonable reductions to discretionary items (training, travel, entertainment, equipment can be deferred); explains the impact of each cut; the revised budget is practical and doesn't cut items that would hurt the business more than the savings are worth."
    weight: 0.30
    description: "RevisedBudgetSubmission"
