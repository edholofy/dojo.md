meta:
  id: event-budget-proposal
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Event budget proposal — plan and justify the budget for a company event with detailed cost breakdown"
  tags: [event-budget, planning, cost-breakdown, justification, beginner]

state: {}

trigger: |
  You're the HR Coordinator at a 180-person tech company.
  The CEO wants to host the company's first-ever annual
  all-hands meeting and team building event. She's asked
  you to create a budget proposal for the event. The
  company has never done this before, so there's no
  historical baseline.

  Event details (CEO's vision):
  - Full-day event (8am-6pm) + optional evening social
  - All 180 employees (3 offices: HQ 120 people, remote
    office 35 people, fully remote 25 people)
  - Purpose: Company culture, strategy alignment, team
    building
  - CEO's budget expectation: "I don't know, maybe
    $30-40K? Just tell me what it costs."

  Your research on costs:

  Venue options:
  - Option A: Hotel ballroom (downtown) — $8,500 for the
    day, includes AV, parking $1,200
  - Option B: Conference center (suburbs) — $4,200 for
    the day, AV rental $1,500 extra, free parking
  - Option C: Company HQ lobby/warehouse space — Free,
    but needs $3,000 in rental furniture/staging, limited
    parking ($800 shuttle)

  Food & beverage:
  - Breakfast: $12/person
  - Lunch (buffet): $35/person
  - Afternoon snacks: $8/person
  - Evening reception (2 hours, appetizers + 2 drink
    tickets): $45/person
  - Dietary accommodations (estimate 15%): +$5/person for
    those guests
  - Per-person food total: ~$100-$105/person

  Travel (for remote employees):
  - 35 people from remote office: Group flight charter
    or individual flights
  - Airfare estimate: $350/person average (35 people =
    $12,250)
  - 25 fully remote: Airfare varies, estimate $450/person
    average ($11,250)
  - Hotel (1 night minimum, 2 recommended): $159/night ×
    60 people × 2 nights = $19,080
  - Ground transportation: Airport shuttles $2,400

  Activities/content:
  - Keynote speaker (external): $5,000-$15,000
  - Team building activity facilitator: $3,500
  - Photographer/videographer: $2,500
  - Swag bags (t-shirts, company merch): $25/person
    ($4,500)
  - Printed materials (agenda, name tags): $600

  Other:
  - Event planning coordinator (contract): $3,000
  - Insurance/liability: $500
  - Contingency: 10% of total

  Task: Create the event budget proposal with 3 options
  (basic, recommended, premium), recommend one, and
  explain to the CEO why the actual cost will likely
  exceed her $30-40K estimate. Include a per-person cost
  breakdown.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 tiered budget options — basic (minimal travel, in-office venue, no evening event), recommended (balanced approach, most employees travel, hotel venue, evening social), and premium (all employees, top venue, keynote speaker, full experience); each option has detailed line items; the tiers represent genuine trade-offs, not just arbitrary price differences; per-person costs are calculated for each tier."
    weight: 0.35
    description: "TieredBudgetOptions"
  - type: llm_judge
    criteria: "Response manages the CEO's cost expectations diplomatically — explains why the $30-40K estimate is low (travel alone for 60 remote employees is ~$44K); breaks down the major cost drivers so the CEO understands where money goes; doesn't just present a higher number — explains what you'd have to sacrifice to stay at $30-40K and why that might undermine the event's purpose; the communication is honest but not condescending."
    weight: 0.35
    description: "ExpectationManagement"
  - type: llm_judge
    criteria: "Response shows budget planning professionalism — includes contingency in all options; considers dietary needs and accessibility; identifies potential cost savings (bulk hotel rates, early booking discounts, swag alternatives); accounts for hidden costs (AV, parking, ground transport); the per-person cost breakdown is clear and transparent; a CEO reading this would feel confident that costs are well-researched and reasonable."
    weight: 0.30
    description: "BudgetPlanningProfessionalism"
