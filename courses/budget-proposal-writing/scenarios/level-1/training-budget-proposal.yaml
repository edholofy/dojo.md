meta:
  id: training-budget-proposal
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Training budget proposal — justify investment in employee training and development programs"
  tags: [training, development, investment, employee-growth, beginner]

state: {}

trigger: |
  You're the Learning & Development Coordinator at a
  250-person engineering consulting firm. Employee
  turnover increased from 12% to 22% last year, and exit
  interviews consistently cite "lack of growth
  opportunities" as the #1 reason for leaving. The HR
  Director has asked you to propose a comprehensive
  training budget for next year.

  Current state:
  - Training budget last year: $25,000 (for 250 people
    = $100/person — well below industry average of
    $1,200/person for professional services)
  - Last year's training: Ad hoc conference attendance
    for senior staff only
  - No structured development programs
  - No tuition reimbursement
  - No professional certification support
  - Competitors offer $2,000-$3,000/person in training
    benefits

  Cost of turnover:
  - 22% turnover = 55 departures last year
  - Average replacement cost: 1.5x salary
  - Average engineer salary: $95,000
  - Estimated annual turnover cost: 55 × $95,000 × 1.5
    = $7,837,500 (recruiting, onboarding, lost
    productivity)

  Proposed training programs:

  1. Technical certification support:
  - PE license prep course: $2,500/person (estimate 15
    eligible) = $37,500
  - Industry certifications (PMP, LEED, etc.): $1,200/
    person (estimate 30) = $36,000
  - Certification exam fees: Average $500/person (45
    people) = $22,500

  2. Professional development:
  - Leadership development program (for managers): $3,500/
    person (20 managers) = $70,000
  - Presentation skills workshop: $500/person (40 people)
    = $20,000
  - Project management fundamentals: $800/person (25
    people) = $20,000

  3. Technical training:
  - Software training (AutoCAD, Revit, etc.): $1,500/
    person (35 people) = $52,500
  - Industry conference attendance: $3,000/person (20
    people) = $60,000

  4. Tuition reimbursement:
  - Graduate degree support: Up to $5,250/person/year
    (IRS tax-free limit)
  - Estimate 10 participants: $52,500

  5. Learning platform subscription:
  - LinkedIn Learning or similar: $30/user/month × 250
    = $90,000/year

  6. Internal knowledge sharing:
  - Monthly "lunch and learn" series: $500/session × 12
    = $6,000
  - Mentorship program coordination: $5,000

  Total proposed: ~$472,000 (~$1,888/person)
  Current budget: $25,000
  Increase: $447,000 (1,788% increase)

  Task: Write the training budget proposal that justifies
  a massive increase in spending. Connect the investment
  to retention, recruitment, and business outcomes. Make
  it persuasive for both the HR Director and the CFO who
  will need to approve it.

assertions:
  - type: llm_judge
    criteria: "Response builds a compelling ROI case — connects training investment to turnover reduction (even reducing turnover from 22% to 15% would save millions in replacement costs); benchmarks against industry average ($1,200/person) and competitors ($2,000-3,000); positions the $472K investment against the $7.8M turnover cost; calculates break-even (how many retained employees pay for the program); the financial case makes the investment feel like a bargain compared to the alternative."
    weight: 0.35
    description: "CompellingROICase"
  - type: llm_judge
    criteria: "Response prioritizes the programs strategically — acknowledges that jumping from $25K to $472K in one year is a big ask; proposes a phased approach or priority tiers (most impactful programs first); identifies quick wins (LinkedIn Learning for immediate impact, certification support for retention signal) vs longer-term investments (tuition reimbursement, leadership development); shows awareness that not everything needs to launch at once."
    weight: 0.35
    description: "StrategicPrioritization"
  - type: llm_judge
    criteria: "Response connects training to business outcomes beyond retention — links PE certifications to the firm's ability to stamp projects (revenue enabler); connects leadership development to management quality; ties software training to project efficiency and billable hours; addresses recruitment advantage (competing for talent); the proposal shows training as a business strategy, not just an HR benefit; would resonate with a CFO who thinks in terms of revenue and productivity."
    weight: 0.30
    description: "BusinessOutcomeConnection"
