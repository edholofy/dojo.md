meta:
  id: new-hire-justification
  level: 1
  course: budget-proposal-writing
  type: output
  description: "New hire justification — build a business case for adding headcount with financial analysis"
  tags: [headcount, hiring, business-case, justification, beginner]

state: {}

trigger: |
  You're the Sales Director at a 100-person B2B services
  company. You want to hire 2 additional sales
  representatives but the CFO requires a written business
  case with financial justification for any new headcount.
  Your VP of Sales supports the request but says "the
  numbers need to be bulletproof."

  Current sales team:
  - 6 sales reps + you (player-coach, carrying a small
    quota)
  - Current annual quota per rep: $800,000
  - Average attainment: 92% ($736,000 per rep average)
  - Total team revenue: $5.15M (6 reps × $736K + your
    $530K)
  - Average deal size: $45,000
  - Sales cycle: 90 days average
  - Win rate: 28%
  - Current pipeline: $12M (2.3x coverage — below the
    3x target)

  The problem:
  - Inbound leads increased 40% this year (marketing
    investment paying off)
  - Each rep now handles 35 active opportunities (up from
    22 last year)
  - Lead response time increased from 2 hours to 18 hours
  - 120 qualified leads were untouched last quarter (no
    capacity)
  - Win rate dropped from 34% to 28% (reps are
    stretched too thin)
  - 2 reps showing burnout signs (considering leaving)

  Cost of 2 new sales reps:
  - Base salary: $65,000 each ($130,000 total)
  - On-target commission: $55,000 each ($110,000 total)
  - Benefits (healthcare, 401k): $18,000 each ($36,000)
  - Equipment (laptop, phone, CRM license): $4,500 each
    ($9,000 one-time)
  - Training/ramp: 4 months to full productivity
  - Recruiting cost: $12,000 per hire ($24,000 total)
  - Total Year 1 cost: ~$309,000 (fully loaded)
  - Total Year 1 at quota: 2 reps × $800K × 8 months
    productive (after 4 month ramp) × 70% ramp attainment
    = ~$747K in new revenue

  Company context:
  - Gross margin: 65%
  - Company revenue target next year: $8M (from $6.2M)
  - Current sales team can realistically produce $5.5M
    (at current capacity)
  - Gap to target: $2.5M
  - Customer acquisition cost (CAC): $8,200 currently
  - CAC payback period: 7 months

  Task: Write the headcount justification business case.
  Include the financial analysis, capacity analysis, risk
  of not hiring, and projected ROI. Make it compelling
  enough for a skeptical CFO.

assertions:
  - type: llm_judge
    criteria: "Response builds a data-driven capacity argument — shows the current team is at capacity (35 opportunities vs 22 previously, 120 untouched leads, declining win rate from 34% to 28%, increased response time); quantifies the revenue being left on the table (untouched leads × conversion rate × deal size); connects capacity constraints to declining performance metrics; the capacity analysis proves the need before discussing costs."
    weight: 0.35
    description: "DataDrivenCapacityArgument"
  - type: llm_judge
    criteria: "Response provides compelling financial justification — calculates Year 1 costs vs revenue (factoring in ramp time); shows contribution margin (revenue × 65% gross margin vs fully loaded cost); calculates ROI and payback period; projects Year 2 at full productivity; addresses the $2.5M gap to company target and shows how 2 new reps help close it; the financial model is conservative enough to be credible (uses 70% ramp attainment, not 100%)."
    weight: 0.35
    description: "FinancialJustification"
  - type: llm_judge
    criteria: "Response addresses the risk of NOT hiring — quantifies the cost of inaction (continued declining win rates, potential turnover of burned-out reps, untouched leads as lost revenue, inability to meet the $8M target); frames the hire as an investment with measurable return, not just an expense; addresses a skeptical CFO's likely questions (why not improve efficiency first? can existing reps handle more?); the business case makes inaction feel riskier than the investment."
    weight: 0.30
    description: "RiskOfInaction"
