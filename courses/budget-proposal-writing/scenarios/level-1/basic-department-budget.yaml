meta:
  id: basic-department-budget
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Basic department budget — create an annual budget request for a small department with clear justification"
  tags: [department-budget, annual-budget, justification, basics, beginner]

state: {}

trigger: |
  You're the Marketing Manager at a 75-person B2B software
  company. It's budget season and your CFO has asked each
  department head to submit their annual budget request for
  next year. This is your first time preparing a department
  budget.

  Your department:
  - Team: 5 people (you + 2 content marketers + 1 demand
    gen specialist + 1 graphic designer)
  - Current year budget: $380,000
  - Current year actual spend (10 months in): $340,000
    (projected to finish at $405,000 — slightly over
    budget due to unplanned conference sponsorship)

  Current year breakdown:
  - Salaries: $310,000 (not in your budget — HR handles)
  - Software/tools: $42,000 (HubSpot $18K, Canva $2.4K,
    SEMrush $4.8K, Zoom webinar $3.6K, misc $13.2K)
  - Content production: $48,000 (freelance writers,
    video production)
  - Events/conferences: $85,000 (2 trade shows $60K,
    1 unplanned sponsorship $25K)
  - Digital advertising: $120,000 (Google Ads $72K,
    LinkedIn $48K)
  - Print/collateral: $15,000
  - Travel: $25,000
  - Miscellaneous: $45,000

  What you want for next year:
  - Hire a 6th team member (marketing operations
    specialist) — salary handled by HR but you need
    $8,000 for equipment/onboarding
  - Increase digital advertising by 30% (competitors
    are outspending you)
  - Replace 2 aging software tools
  - Attend 3 trade shows instead of 2
  - Launch a podcast ($15,000 production budget)

  Company context:
  - Revenue: $12M, growing 20% year-over-year
  - CFO's guidance: "Budgets should grow no more than 10%
    unless there's a strong business case"
  - Company priority: Pipeline generation and brand
    awareness
  - Marketing generated 35% of sales pipeline this year

  Task: Write the annual budget proposal for your
  marketing department. Include line items, justification
  for increases, and show how spending aligns with company
  goals. Stay within the CFO's guidance or make a
  compelling case for exceeding it.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear, organized budget document — includes line-item breakdown by category, shows current year vs proposed next year comparison, calculates total increase and percentage change, addresses the CFO's 10% growth guidance; the format is professional and easy for a CFO to review; includes an executive summary or overview before diving into line items."
    weight: 0.35
    description: "ClearBudgetStructure"
  - type: llm_judge
    criteria: "Response justifies budget increases with business rationale — connects the 30% advertising increase to competitive pressure and pipeline generation; justifies the podcast launch with content strategy value; explains trade show expansion with ROI or lead generation data; addresses the current year overage honestly (unplanned sponsorship) and shows what's different next year; justifications tie spending to company priorities (pipeline generation, brand awareness), not just 'we want more money.'"
    weight: 0.35
    description: "BusinessJustification"
  - type: llm_judge
    criteria: "Response demonstrates budget literacy — categorizes expenses correctly (recurring vs one-time, fixed vs variable); accounts for the new hire's onboarding costs; identifies where current spending can be optimized to offset increases; shows awareness of the 10% growth constraint and either stays within it or explicitly makes the case for exceeding it; the budget is realistic and the math adds up; a CFO would take this seriously."
    weight: 0.30
    description: "BudgetLiteracy"
