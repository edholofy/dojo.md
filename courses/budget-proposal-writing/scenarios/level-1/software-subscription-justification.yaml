meta:
  id: software-subscription-justification
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Software subscription justification — build a business case for a new SaaS tool purchase"
  tags: [software, saas, business-case, productivity, beginner]

state: {}

trigger: |
  You're a Project Manager at a 90-person construction
  company. You want to purchase project management
  software to replace the company's current system of
  Excel spreadsheets, email chains, and a shared drive.
  The owner is skeptical of software subscriptions ("we've
  always done it this way") and wants a clear business
  case before approving any new recurring expense.

  Current state (the problem):
  - 12 active projects at any time, each worth $500K-$5M
  - 6 project managers, each running 2-3 projects
  - Project tracking: Individual Excel spreadsheets (each
    PM has their own format)
  - Communication: Email chains + text messages (hard to
    find information)
  - Document sharing: Shared network drive (no version
    control — last month 2 teams worked from different
    versions of blueprints, causing $15K rework)
  - Time tracking: Paper timesheets collected weekly
    (payroll reports 2 weeks delayed)
  - Client reporting: Manual — each PM spends ~5 hours/
    week creating status reports
  - Subcontractor coordination: Phone calls and emails
    (no visibility for the office)

  Pain points (from PM team survey):
  - "I spend 8 hours/week on administrative work that
    software should handle"
  - "I can never find the latest version of documents"
  - "The owner asks me for a project status and I have
    to spend an hour pulling data together"
  - "We've had 3 scheduling conflicts this year because
    we can't see resource allocation across projects"

  Software options evaluated:

  Option A — Procore (construction-specific):
  - Cost: $667/month ($8,000/year) for unlimited users
  - Features: Project management, document management,
    financials, field management, scheduling
  - Pros: Built for construction, industry standard
  - Cons: Most expensive, some features you won't use

  Option B — Monday.com (general PM):
  - Cost: $48/user/month × 12 users = $576/month
    ($6,912/year)
  - Features: Project tracking, time tracking, file
    sharing, dashboards, automation
  - Pros: Flexible, modern, easy to learn
  - Cons: Not construction-specific, may need
    customization

  Option C — Buildertrend (construction-specific):
  - Cost: $499/month ($5,988/year)
  - Features: Project management, scheduling, document
    management, client portal, daily logs
  - Pros: Construction-focused, includes client portal,
    good mobile app
  - Cons: Less flexible than Monday.com, smaller company

  Task: Write the business case for purchasing project
  management software. Compare the 3 options, quantify
  the current cost of inefficiency, and make a
  recommendation that would convince a skeptical,
  cost-conscious owner.

assertions:
  - type: llm_judge
    criteria: "Response quantifies the cost of the current state — calculates time wasted on administrative tasks (6 PMs × 8 hours/week × 52 weeks × hourly rate = significant cost); includes the $15K blueprint rework incident as a concrete example; estimates cost of scheduling conflicts, delayed payroll processing, and client reporting labor; the current inefficiency cost is significantly higher than the software subscription — making the case that 'doing nothing' is the expensive option."
    weight: 0.35
    description: "CostOfInefficiency"
  - type: llm_judge
    criteria: "Response compares options with construction-relevant criteria — evaluates construction-specific features (daily logs, subcontractor management, client portals) vs general PM capabilities; considers the owner's likely priorities (ease of adoption, mobile for field use, minimal training); makes a clear recommendation with justification; addresses the owner's subscription skepticism by framing it as a business investment, not just an expense."
    weight: 0.35
    description: "RelevantComparison"
  - type: llm_judge
    criteria: "Response addresses the owner's skepticism directly — anticipates objections ('we've always done it this way,' 'that's a lot per month,' 'my PMs should just be more organized'); uses concrete examples from the company's own experience (blueprint rework, scheduling conflicts); frames the subscription cost against a single project's value ($500K-$5M) to show perspective; proposes a pilot or trial period to reduce the perceived risk; the business case speaks the owner's language."
    weight: 0.30
    description: "SkepticismAddressed"
