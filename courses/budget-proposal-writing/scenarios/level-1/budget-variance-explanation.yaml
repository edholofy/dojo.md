meta:
  id: budget-variance-explanation
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Budget variance explanation — analyze and explain budget variances for a quarterly review meeting"
  tags: [variance, analysis, quarterly-review, explanation, beginner]

state: {}

trigger: |
  You're the Operations Manager at a 60-person
  e-commerce fulfillment company. The CFO has asked you
  to prepare a budget variance analysis for the Q3
  quarterly review. Several line items are significantly
  over or under budget, and the CFO wants clear
  explanations and corrective actions.

  Q3 Budget vs Actual:

  | Line Item | Q3 Budget | Q3 Actual | Variance |
  |-----------|-----------|-----------|----------|
  | Warehouse rent | $45,000 | $45,000 | $0 |
  | Utilities | $8,400 | $11,200 | +$2,800 |
  | Warehouse labor | $126,000 | $152,000 | +$26,000 |
  | Packaging materials | $34,000 | $41,500 | +$7,500 |
  | Shipping costs | $89,000 | $78,200 | -$10,800 |
  | Equipment maintenance | $6,000 | $14,800 | +$8,800 |
  | Software/IT | $12,000 | $12,000 | $0 |
  | Office supplies | $2,400 | $1,800 | -$600 |
  | Training | $4,500 | $900 | -$3,600 |
  | Insurance | $7,200 | $7,200 | $0 |
  | Miscellaneous | $3,000 | $5,800 | +$2,800 |
  | TOTAL | $337,500 | $370,400 | +$32,900 |

  Context you know:
  - Order volume in Q3 was 22% higher than forecasted
    (unexpected viral product drove sales)
  - You hired 4 temporary workers mid-quarter to handle
    volume ($18K in extra labor)
  - Overtime for existing staff: $8K (unbudgeted)
  - A forklift broke down and needed emergency repair
    ($7,500)
  - You renegotiated shipping rates mid-quarter (saving
    more than expected on per-unit basis)
  - Packaging supplier raised prices 12% in August
  - Air conditioning costs surged in July-August heat
    wave
  - Training was deferred to Q4 due to being too busy
  - Miscellaneous includes $2,200 for fire extinguisher
    inspection required by city

  Full-year outlook:
  - Annual budget: $1,350,000
  - YTD actual (through Q3): $1,085,200
  - Q4 budget: $337,500
  - If Q4 trends continue like Q3, you'll be ~$80K over
    annual budget

  Task: Write the Q3 budget variance analysis. For each
  significant variance, explain the cause, classify it
  (one-time vs recurring, controllable vs uncontrollable),
  and propose corrective actions. Include a revised Q4
  forecast and full-year projection.

assertions:
  - type: llm_judge
    criteria: "Response explains each significant variance clearly — provides specific causes for each over/under budget line item (labor: volume-driven temp hires + overtime; equipment: emergency forklift repair; utilities: heat wave; shipping: renegotiated rates; packaging: supplier price increase; training: deferred); connects variances to business context (22% volume increase was the primary driver); the explanations are specific enough that the CFO understands what happened and why."
    weight: 0.35
    description: "ClearVarianceExplanation"
  - type: llm_judge
    criteria: "Response classifies variances usefully — distinguishes between one-time events (forklift repair, fire inspection) and recurring issues (packaging price increase, volume-driven labor); separates controllable variances (overtime, deferred training) from uncontrollable ones (heat wave, supplier pricing, unexpected volume); this classification helps the CFO understand which variances need corrective action vs which are just noise."
    weight: 0.35
    description: "VarianceClassification"
  - type: llm_judge
    criteria: "Response provides a revised Q4 forecast and corrective actions — projects Q4 based on known changes (higher volume continuing? packaging prices staying?); proposes specific corrective actions for controllable overages (convert temps to hires if volume is permanent, preventive maintenance to avoid equipment emergencies, reschedule training); addresses the ~$80K annual overage risk with a plan to mitigate; the revised forecast is realistic, not just optimistic."
    weight: 0.30
    description: "RevisedForecastAndActions"
