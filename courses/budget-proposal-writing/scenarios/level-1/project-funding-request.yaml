meta:
  id: project-funding-request
  level: 1
  course: budget-proposal-writing
  type: output
  description: "Project funding request — write a budget proposal for a specific project with cost-benefit justification"
  tags: [project-budget, funding-request, cost-benefit, roi, beginner]

state: {}

trigger: |
  You're an IT Team Lead at a 200-person accounting firm.
  You want to propose a project to migrate the company's
  file storage from on-premise servers to cloud storage
  (Microsoft 365 SharePoint/OneDrive). Your IT Director
  has asked you to write a project budget proposal with
  cost-benefit analysis.

  Current state:
  - 3 on-premise file servers (purchased 5 years ago)
  - Storage capacity: 12TB used out of 20TB
  - Annual server maintenance contract: $18,000
  - Server room electricity/cooling: ~$6,000/year
  - IT staff time for server management: ~15 hours/month
    (your time + 1 other admin)
  - IT staff cost allocated: ~$12,000/year for server
    management
  - Backup solution: Tape backup, $4,800/year
  - Server hardware lifecycle: Due for replacement in
    18 months (estimated $45,000-$55,000 for new servers)

  Proposed cloud migration:
  - Microsoft 365 Business Premium already licensed for
    all employees ($22/user/month, already budgeted and
    paid — includes 1TB OneDrive per user and SharePoint)
  - Additional SharePoint storage needed: 5TB at
    $0.20/GB/month = $1,024/month ($12,288/year)
  - Migration tool license: $3,500 one-time
  - External consultant for migration planning and
    execution: $15,000 (estimated 80 hours at $185/hour)
  - Staff overtime during migration: $4,000 (weekend
    cutovers)
  - Training for staff: $2,500 (lunch-and-learns,
    documentation)
  - Contingency (10%): To be calculated

  Expected benefits:
  - Eliminate server replacement cost ($45K-$55K saved)
  - Reduce annual maintenance/power/backup: $28,800/year
    saved
  - Recover 15 hours/month of IT staff time (redirect
    to other projects)
  - Improved disaster recovery (cloud redundancy vs tape)
  - Remote access to files (currently requires VPN)
  - Better collaboration features (co-authoring, version
    history)

  Timeline: 3-month project (1 month planning, 1 month
  migration, 1 month stabilization)

  Task: Write the project funding request including total
  project cost, annual cost comparison (current vs cloud),
  ROI calculation, and a clear recommendation.

assertions:
  - type: llm_judge
    criteria: "Response calculates project costs accurately — includes all one-time costs (migration tool, consultant, overtime, training) with contingency; calculates ongoing annual cloud storage costs; shows total project investment clearly; the math is correct and verifiable; includes both the one-time migration costs and the ongoing operational cost change."
    weight: 0.35
    description: "AccurateCostCalculation"
  - type: llm_judge
    criteria: "Response provides a clear cost-benefit analysis — compares current annual costs (maintenance $18K + electricity $6K + IT time $12K + backup $4.8K = ~$40.8K) against new annual costs (additional SharePoint storage ~$12.3K); quantifies the server replacement avoidance ($45-55K); calculates ROI or payback period; separates tangible savings (cost reduction) from intangible benefits (remote access, collaboration, disaster recovery); the analysis would convince a budget-conscious IT Director."
    weight: 0.35
    description: "ClearCostBenefitAnalysis"
  - type: llm_judge
    criteria: "Response is structured as a professional funding request — includes executive summary, project scope, cost breakdown, benefit analysis, timeline, risks, and recommendation; the tone is professional and appropriate for an IT Director audience; addresses potential concerns (data security in cloud, migration risks, user adoption); the proposal stands alone as a complete document that could be approved or discussed without additional context."
    weight: 0.30
    description: "ProfessionalProposalFormat"
