meta:
  id: rolling-forecast
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Rolling forecast — build and present a rolling forecast that replaces the traditional annual budget process"
  tags: [rolling-forecast, forecasting, agile-budgeting, continuous, intermediate]

state: {}

trigger: |
  You're the FP&A Manager at a 280-person e-commerce
  company. The CFO wants to shift from annual budgeting
  to a rolling forecast model because "by March, our
  January budget is already obsolete." She's asked you to
  design the rolling forecast process and present the
  first quarterly update.

  Company context:
  - Revenue: $42M last year, highly seasonal (45% of
    revenue in Q4)
  - Annual budget set in November for next year
  - By March, actual performance is typically 15-25% off
    budget due to market shifts
  - 5 departments: Sales, Marketing, Operations, Product/
    Engineering, G&A

  Current budget vs actual (Q1 just completed):
  | Line Item | Q1 Budget | Q1 Actual | Variance |
  |-----------|-----------|-----------|----------|
  | Revenue | $7,350,000 | $8,100,000 | +$750,000 |
  | COGS | $2,940,000 | $3,400,000 | +$460,000 |
  | Gross Profit | $4,410,000 | $4,700,000 | +$290,000 |
  | Sales | $1,102,500 | $1,200,000 | +$97,500 |
  | Marketing | $882,000 | $950,000 | +$68,000 |
  | Operations | $735,000 | $810,000 | +$75,000 |
  | Product/Eng | $1,176,000 | $1,150,000 | -$26,000 |
  | G&A | $588,000 | $570,000 | -$18,000 |
  | EBITDA | -$73,500 | $20,000 | +$93,500 |

  What changed from budget:
  - A viral TikTok drove unexpected demand in February
    (one-time boost or sustained trend? — unclear)
  - COGS increased because 2 suppliers raised prices 8%
    and shipping costs spiked
  - Marketing overspent chasing the viral moment
  - Operations hired 3 temporary warehouse workers
  - Product/Eng deferred a contractor project to Q2

  Known factors for remainder of year:
  - New product line launching in Q3 (budgeted $1.5M in
    incremental revenue, now projected $1.8M based on
    pre-orders)
  - Competitor launched a similar product at 20% lower
    price (potential Q3-Q4 impact)
  - 2 marketing campaigns planned for Q2 ($200K total)
  - Q4 holiday season: Early indicators suggest strong
    consumer spending

  Task: Design the rolling forecast process (cadence,
  owners, methodology), create the rolling forecast for
  the remaining 3 quarters (Q2-Q4), and show how the
  full-year projection has changed from the original
  annual budget. Include a commentary explaining key
  changes and the confidence level in each forecast.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical rolling forecast process — defines the cadence (monthly or quarterly updates), who provides inputs (department heads), the timeline for updates, and the approval workflow; explains what changes from the annual budget approach (continuous vs point-in-time, driver-based vs line-item); the process is lightweight enough that it doesn't create administrative burden while being rigorous enough to improve accuracy."
    weight: 0.35
    description: "PracticalForecastProcess"
  - type: llm_judge
    criteria: "Response creates a credible rolling forecast for Q2-Q4 — incorporates Q1 actuals as the new baseline; adjusts for known factors (supplier price increases, new product launch, competitor pricing pressure, holiday season); addresses the viral TikTok question (does the forecast assume it continues or was one-time?); the Q4 forecast accounts for seasonality; the updated full-year projection is different from the original budget with clear explanations for each change."
    weight: 0.35
    description: "CredibleForecast"
  - type: llm_judge
    criteria: "Response includes confidence levels and scenario commentary — rates the confidence in each major forecast driver (high confidence: supplier cost increases are known; medium: new product launch is pre-order validated; low: viral demand sustainability, competitor impact); presents a range rather than a single number for key uncertainties; helps the CFO understand not just the forecast but how reliable it is; identifies the biggest risks to the forecast."
    weight: 0.30
    description: "ConfidenceLevels"
