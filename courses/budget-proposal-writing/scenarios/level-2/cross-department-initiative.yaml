meta:
  id: cross-department-initiative
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Cross-department initiative — build a budget for a project spanning multiple departments with shared costs"
  tags: [cross-department, shared-costs, allocation, initiative, intermediate]

state: {}

trigger: |
  You're the Director of Digital Transformation at a
  450-person retail company. The CEO has approved a
  company-wide digital transformation initiative, and you
  need to create the budget. The challenge: the project
  spans 5 departments, and each department head needs to
  understand what comes from their budget vs. the central
  project budget.

  Initiative: Implement an omnichannel customer experience
  platform integrating in-store, online, and mobile
  channels.

  Duration: 18 months (6 months implementation + 12 months
  optimization)

  Departments involved:
  1. IT (CIO): Infrastructure, integration, security
  2. Marketing (CMO): Customer data, campaigns, analytics
  3. Store Operations (VP Stores): In-store technology,
     staff training
  4. E-commerce (VP Digital): Online platform, mobile app
  5. Customer Service (VP CS): Unified customer view,
     omnichannel support

  Central project costs (from project budget):
  - Platform license (Salesforce Commerce Cloud):
    $320,000/year
  - Implementation partner: $450,000 (6-month engagement)
  - Project manager (contract): $12,000/month × 18 months
    = $216,000
  - Data migration and integration: $85,000
  - Testing and QA: $45,000
  - Change management consultant: $60,000
  - Contingency (15%): $176,400
  Total central: ~$1,352,400

  Department-specific costs:

  IT:
  - Infrastructure upgrades (network, servers): $120,000
  - Security assessment and implementation: $35,000
  - API development for legacy systems: $80,000
  - IT staff overtime: $25,000
  - Subtotal: $260,000

  Marketing:
  - Customer data platform: $48,000/year
  - Analytics tools: $24,000/year
  - Content creation for new channels: $35,000
  - Campaign setup and testing: $15,000
  - Subtotal: $122,000

  Store Operations:
  - In-store kiosks (50 stores × $2,500): $125,000
  - WiFi upgrades (50 stores × $3,000): $150,000
  - Staff training (800 employees): $80,000
  - Subtotal: $355,000

  E-commerce:
  - Mobile app development: $180,000
  - UX design: $45,000
  - Performance testing: $20,000
  - Subtotal: $245,000

  Customer Service:
  - Omnichannel support platform: $36,000/year
  - Agent training (45 agents): $22,500
  - Knowledge base rebuild: $15,000
  - Subtotal: $73,500

  Budget allocation question:
  The CEO wants each department to fund their specific
  costs from their existing budgets. The central costs
  should be allocated across departments proportionally.
  But several department heads are pushing back: "Why
  should my budget pay for infrastructure that benefits
  everyone?"

  Task: Create the complete initiative budget with clear
  separation of central vs departmental costs, propose
  a fair allocation methodology for central costs, and
  present it in a way that each department head can
  understand their total financial commitment. Address
  the pushback on cost allocation.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear, comprehensive initiative budget — presents central project costs and department-specific costs separately; shows the total initiative cost; provides each department's complete financial picture (their specific costs + their share of central costs); the format allows each department head to see exactly what they're committing to; includes a timeline showing when costs are incurred."
    weight: 0.35
    description: "ClearInitiativeBudget"
  - type: llm_judge
    criteria: "Response proposes a fair cost allocation methodology — considers multiple allocation methods (equal split, proportional to benefit/usage, proportional to department revenue, proportional to department-specific investment); recommends one with clear rationale; shows how each method affects each department's total cost; addresses the political reality that any allocation will be seen as unfair by someone; the chosen methodology is defensible."
    weight: 0.35
    description: "FairCostAllocation"
  - type: llm_judge
    criteria: "Response addresses department head pushback constructively — explains why shared investment benefits all departments (the platform creates shared value); proposes how to handle departments that benefit more vs less; considers phased investment to reduce initial commitment; suggests how departments can offset costs with expected benefits (increased sales, reduced support costs, improved efficiency); the response manages organizational politics without being adversarial."
    weight: 0.30
    description: "PushbackManagement"
