meta:
  id: budget-presentation-cfo
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Budget presentation to CFO — prepare and present a budget request to a skeptical CFO who will challenge every assumption"
  tags: [presentation, cfo, defense, assumptions, intermediate]

state: {}

trigger: |
  You're the VP of Engineering at a 200-person fintech
  company. You have a 30-minute meeting with the CFO
  tomorrow to present your engineering budget for next
  year. The CFO is known for being extremely detail-
  oriented and skeptical — she rejected 3 of 5 department
  budgets in the first round last year. You need to be
  prepared.

  Your proposed budget: $8.2M (up from $6.8M, a 20.6%
  increase)

  Budget breakdown:
  - Engineering salaries (42 current + 8 new hires):
    $6,200,000
  - Cloud infrastructure (AWS): $720,000 (up 35% from
    $533K)
  - Software licenses and tools: $340,000
  - Contractor/consulting: $280,000
  - Training and development: $120,000
  - Equipment (laptops, monitors): $180,000
  - Travel: $60,000
  - Team events/morale: $30,000
  - Conference sponsorships: $45,000
  - Recruiting costs: $225,000

  The 8 new hires breakdown:
  - 3 backend engineers ($155K avg): Support new payment
    processing platform
  - 2 frontend engineers ($140K avg): Mobile app rewrite
  - 1 DevOps engineer ($160K): Infrastructure automation
  - 1 security engineer ($165K): Compliance requirements
  - 1 engineering manager ($180K): Team growth requires
    another manager

  Known CFO concerns (from last year's conversations):
  1. "Why does AWS keep going up? Are we optimizing?"
  2. "Every department wants more headcount. Why can't
     we do more with the team we have?"
  3. "The recruiting budget seems high — $225K for 8
     hires?"
  4. "Training and conferences feel like nice-to-haves,
     not necessities"
  5. "What's the ROI on this additional $1.4M?"

  Supporting data you have:
  - Revenue per engineer: $238K (industry avg for fintech:
    $280K)
  - Engineering spend as % of revenue: 68% (industry avg:
    45-55% — you're above benchmark)
  - AWS unit cost is actually decreasing 15% per compute
    unit, but usage is growing 50% due to transaction
    volume growth
  - 3 engineers left last year citing "overwork" — each
    replacement cost $40K+ and took 3 months
  - Compliance audit identified 4 security gaps requiring
    dedicated security engineer
  - Mobile app rewrite is CEO's #1 priority

  Task: Prepare the budget presentation for the CFO.
  Structure it as talking points with supporting data,
  anticipate her specific questions, and prepare
  responses. Address the engineering spend percentage
  honestly — it's above industry average.

assertions:
  - type: llm_judge
    criteria: "Response prepares a structured presentation — organizes the budget by strategic priority (not just line items); leads with business outcomes and company priorities; presents the headline number ($8.2M) in context (% of revenue, industry comparison, revenue per engineer trajectory); the presentation structure respects the CFO's 30-minute constraint; includes visual-ready data points (comparisons, trends, ROI projections)."
    weight: 0.35
    description: "StructuredPresentation"
  - type: llm_judge
    criteria: "Response anticipates and prepares for CFO's specific objections — addresses each known concern with data (AWS optimization efforts + why costs still rise, recruiting cost benchmarks, training ROI/retention connection); prepares responses that are honest about weaknesses (engineering spend % is high) while explaining context; doesn't get defensive — acknowledges valid concerns and shows awareness of the CFO's perspective; includes backup slides or data points for tough questions."
    weight: 0.35
    description: "ObjectionPreparation"
  - type: llm_judge
    criteria: "Response frames the budget as an investment with measurable returns — connects each major investment to business outcomes (new hire ROI, security engineer preventing compliance fines, mobile rewrite supporting CEO's priority, retention savings from training investment); addresses the 'do more with less' challenge honestly (shows current team utilization, turnover risk, technical debt costs); the framing would resonate with a financially-minded CFO."
    weight: 0.30
    description: "InvestmentFraming"
