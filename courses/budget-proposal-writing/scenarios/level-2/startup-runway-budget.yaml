meta:
  id: startup-runway-budget
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Startup runway budget — create a budget and cash flow plan for a startup managing limited funding"
  tags: [startup, runway, cash-flow, burn-rate, intermediate]

state: {}

trigger: |
  You're the co-founder and COO of a seed-stage B2B SaaS
  startup. You just closed a $1.5M seed round and need to
  create a budget that gives you 18 months of runway to
  reach Series A milestones. Your lead investor wants to
  see a monthly cash flow plan with clear milestones.

  Current state:
  - Cash in bank: $1.5M (just received)
  - Team: 4 people (2 founders taking $80K salary each,
    1 engineer at $130K, 1 designer at $95K)
  - Product: MVP launched 3 months ago
  - Revenue: $2,800 MRR (8 paying customers, $350 ARPA)
  - Growth: Adding ~2 customers/month currently
  - Office: WeWork hot desks, $400/month per person

  Series A milestones (investor expectations):
  - $50K MRR by month 15 (~143 customers at current ARPA)
  - 3 enterprise customers ($2K+ MRR each)
  - Net revenue retention > 100%
  - Product-market fit validated (NPS > 40)
  - Team scaled to 10-12 people

  Hiring plan (your proposal):
  - Month 2: Senior engineer ($150K)
  - Month 4: Junior engineer ($90K)
  - Month 6: Sales rep ($70K base + $50K OTE commission)
  - Month 8: Customer success manager ($65K)
  - Month 10: Second sales rep ($70K + $50K OTE)
  - Month 12: Marketing manager ($85K)
  - Each hire: $5K recruiting + $3K equipment

  Other planned expenses:
  - AWS/infrastructure: $2,000/month, growing 15%/month
    with customer growth
  - Software tools (Slack, GitHub, HubSpot, etc.): $1,500/
    month
  - Legal/accounting: $3,000/month
  - Marketing: Starting month 4, $5,000/month increasing
    to $10,000/month by month 10
  - Insurance: $800/month
  - Travel (sales): Starting month 6, $3,000/month
  - Contingency: You need to decide how much buffer

  Revenue projections (your model):
  - Current: $2,800 MRR, growing $700/month organically
  - After sales hire (month 6+): Growth increases to
    $2,000/month
  - After second sales hire (month 10+): Growth increases
    to $4,000/month
  - Churn: 3% monthly currently, improving to 2% by
    month 12

  Task: Create the 18-month budget with monthly cash flow
  projections. Show when cash runs out under base case
  and pessimistic case (50% of revenue projections). Identify
  the decision points where you'd need to adjust spending.

assertions:
  - type: llm_judge
    criteria: "Response creates a detailed monthly cash flow model — shows month-by-month burn rate evolution as hires are added; tracks revenue growth against expenses; calculates net cash position each month; clearly shows when runway runs out; accounts for hiring timeline impact (new hires increase burn immediately but revenue impact is delayed); the model is granular enough to manage a real startup's cash."
    weight: 0.35
    description: "DetailedMonthlyCashFlow"
  - type: llm_judge
    criteria: "Response includes scenario analysis and decision points — presents base case and pessimistic (50% revenue) case; identifies the month cash runs out in each scenario; establishes decision points ('if MRR is below $X by month Y, delay the next hire or reduce marketing'); considers what to cut first if revenue underperforms; the scenario analysis reveals whether 18 months of runway is realistic and what assumptions must hold true."
    weight: 0.35
    description: "ScenarioAnalysisAndDecisions"
  - type: llm_judge
    criteria: "Response demonstrates startup financial literacy — tracks burn rate evolution and months of runway remaining; considers that churn compounds against growth; accounts for the delay between hiring salespeople and seeing revenue impact; reserves appropriate contingency without being too conservative (startups can't afford to sit on cash); addresses whether the plan reaches Series A milestones by month 15; an investor reviewing this would feel the founder understands their cash dynamics."
    weight: 0.30
    description: "StartupFinancialLiteracy"
