meta:
  id: zero-based-budget
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Zero-based budget — rebuild a department budget from scratch using zero-based budgeting methodology"
  tags: [zero-based, zbb, methodology, rebuilding, intermediate]

state: {}

trigger: |
  You're the VP of Operations at a 500-person logistics
  company. The CEO has mandated that all departments use
  zero-based budgeting (ZBB) for next year's budget cycle
  — starting from zero and justifying every dollar instead
  of adjusting last year's budget by a percentage. Your
  department has historically been the most "bloated" in
  the CFO's opinion. Last year's budget was $4.2M.

  Your department:
  - 45 employees across 4 teams
  - Warehouse operations (25 people)
  - Fleet management (10 people)
  - Logistics coordination (6 people)
  - Administrative support (4 people)

  Last year's budget breakdown (the one you're replacing):
  - Salaries & benefits: $2,850,000
  - Vehicle fleet (lease + fuel + maintenance): $480,000
  - Warehouse costs (rent, utilities, insurance): $360,000
  - Technology (WMS, TMS, GPS tracking, misc): $180,000
  - Supplies & equipment: $96,000
  - Training & development: $48,000
  - Travel: $36,000
  - Contracted services: $72,000
  - Miscellaneous: $78,000
  - Total: $4,200,000

  ZBB requires you to:
  1. Identify every activity your department performs
  2. Create "decision packages" for each activity
  3. Rank decision packages by priority
  4. Justify each package with business value
  5. Identify a "minimum viable" budget (bare essentials)
     and incremental packages above it

  Key activities your department performs:
  - Inbound receiving and inspection
  - Inventory management and cycle counting
  - Order picking, packing, and shipping
  - Fleet dispatch and routing
  - Delivery execution
  - Return processing
  - Carrier management and rate negotiation
  - Customs and trade compliance (international shipments)
  - Safety and compliance (OSHA, DOT)
  - Reporting and analytics

  Business context:
  - Revenue: $85M
  - Operations cost as % of revenue: 4.9% (industry
    benchmark: 3.5-4.5%)
  - 3 competitor bids for outsourcing your function came
    in at $3.5M-$3.8M (but quality concerns)
  - CEO's target: Get operations cost below 4% of revenue

  Task: Apply ZBB methodology to rebuild your department
  budget. Create decision packages ranked by priority,
  identify the minimum viable budget, and show how each
  incremental package adds value. Present the budget in a
  way that demonstrates the rigor of ZBB and addresses the
  CEO's cost concerns.

assertions:
  - type: llm_judge
    criteria: "Response applies ZBB methodology correctly — starts from zero (not from last year's $4.2M); creates distinct decision packages for each major activity; each package includes scope, cost, and business value; packages are ranked by priority (essential operations first, then optimization, then growth/improvement); the methodology demonstrates the analytical rigor that ZBB demands."
    weight: 0.35
    description: "CorrectZBBMethodology"
  - type: llm_judge
    criteria: "Response identifies a credible minimum viable budget — determines the absolute minimum cost to keep operations running (essential staff, warehouse, basic fleet, required compliance); the minimum is meaningfully lower than $4.2M; then layers incremental packages showing what each additional investment provides; the layered approach lets the CEO choose the investment level with clear understanding of trade-offs at each tier."
    weight: 0.35
    description: "MinimumViableBudget"
  - type: llm_judge
    criteria: "Response addresses the CEO's cost concerns — benchmarks against the 3.5-4.5% industry standard; addresses the outsourcing comparison ($3.5-3.8M) honestly (what quality/control risks come with outsourcing?); identifies specific cost reduction opportunities discovered through the ZBB process (activities that were funded by inertia, not value); the budget demonstrates that ZBB revealed savings while also showing which costs are genuinely necessary."
    weight: 0.30
    description: "CostConcernAddressed"
