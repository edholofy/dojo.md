meta:
  id: cost-reduction-proposal
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Cost reduction proposal — identify and propose cost savings across a department without cutting essential capabilities"
  tags: [cost-reduction, savings, optimization, efficiency, intermediate]

state: {}

trigger: |
  You're the Chief of Staff at a 400-person media company.
  Revenue declined 12% this year due to advertising market
  softness, and the CEO has asked each executive to
  propose cost reductions totaling 15% of their area's
  discretionary spending. Your task is to lead the G&A
  (General & Administrative) cost reduction effort.

  Current G&A budget: $6.8M annually
  Target: Reduce by $1.02M (15%)

  Current G&A breakdown:
  | Category | Annual Cost | Details |
  |----------|-------------|---------|
  | Office lease (HQ) | $1,200,000 | 40,000 sq ft, 3 years remaining |
  | Office lease (satellite) | $360,000 | 8,000 sq ft, month-to-month |
  | Office services | $180,000 | Cleaning, security, maintenance |
  | Utilities | $96,000 | Electric, water, internet |
  | HR department | $480,000 | 4 FTEs + benefits |
  | Finance/accounting | $520,000 | 4 FTEs + benefits |
  | Legal (in-house + outside) | $420,000 | 1 FTE + $280K outside counsel |
  | IT support | $680,000 | 5 FTEs + benefits |
  | Software subscriptions | $340,000 | 45 tools across the company |
  | Insurance | $210,000 | D&O, E&O, general liability |
  | Recruiting | $180,000 | Agency fees + job boards |
  | Employee perks | $240,000 | Snacks, gym, parking subsidies |
  | Professional development | $160,000 | Training, conferences, tuition |
  | Travel (corporate) | $280,000 | Non-revenue travel |
  | Office supplies/equipment | $120,000 | Furniture, supplies, printers |
  | Corporate events | $180,000 | Holiday party, summer outing, etc. |
  | Charitable giving | $50,000 | Matching program + donations |
  | Miscellaneous | $104,000 | Dues, subscriptions, misc |

  Context:
  - 35% of employees now work hybrid (3 days office/
    2 remote) — HQ has 40% vacant desks on any given day
  - Satellite office has 20 employees, all could work
    from HQ
  - Outside legal spend increased 40% last year due to
    a contract dispute (now resolved)
  - Software audit found 12 tools with fewer than 5
    active users
  - Recruiting was heavy this year (25 hires) but next
    year is a hiring freeze
  - 3 of 5 IT support staff could potentially be replaced
    by managed services

  Employee impact considerations:
  - CEO says "I don't want to cut people — find savings
    elsewhere first"
  - Morale is already fragile from the revenue decline
  - Perks were cited as a top 3 reason people join the
    company

  Task: Create a detailed cost reduction proposal that
  achieves $1.02M in savings. Categorize savings by ease
  of implementation (quick wins vs. longer-term), risk
  level, and employee impact. Present alternatives where
  trade-offs exist.

assertions:
  - type: llm_judge
    criteria: "Response identifies specific, achievable savings totaling $1.02M+ — targets obvious opportunities (satellite office closure, reduced outside legal, software rationalization, recruiting freeze savings, corporate travel reduction); provides specific dollar amounts for each initiative; the savings are realistic and verifiable, not just aspirational percentage cuts; the total reaches or exceeds the $1.02M target."
    weight: 0.35
    description: "SpecificAchievableSavings"
  - type: llm_judge
    criteria: "Response categorizes initiatives by implementation difficulty and risk — separates quick wins (software cleanup, travel policy, recruiting pause) from medium-term (satellite office closure, IT managed services evaluation) from long-term (HQ space optimization); assesses the risk of each cut (what could go wrong?); considers employee impact for each initiative; the categorization helps the CEO prioritize actions."
    weight: 0.35
    description: "ImplementationCategorization"
  - type: llm_judge
    criteria: "Response respects the CEO's constraint about not cutting people — finds savings primarily through non-headcount levers; where headcount-adjacent savings exist (IT managed services, satellite office), presents them as options with alternatives; addresses the morale concern (doesn't gut perks entirely — maybe reduces rather than eliminates); proposes changes that feel like smart management rather than panic cost-cutting; employees reading this wouldn't feel punished."
    weight: 0.30
    description: "PeopleFirstApproach"
