meta:
  id: capex-vs-opex-analysis
  level: 2
  course: budget-proposal-writing
  type: output
  description: "CapEx vs OpEx analysis — analyze whether a major investment should be classified as capital or operating expense and present the business case"
  tags: [capex, opex, classification, tax-implications, intermediate]

state: {}

trigger: |
  You're the IT Director at a 350-person law firm. The
  firm needs to modernize its IT infrastructure, and the
  Managing Partner wants to understand the financial
  implications of two approaches: buying servers
  (traditional CapEx) vs. moving to cloud (OpEx model).
  The CFO needs a detailed analysis for tax planning and
  the partnership's financial review.

  Current infrastructure (on-premise):
  - 8 physical servers (6 years old, end of life)
  - 2 storage arrays
  - Network equipment (switches, firewall)
  - Server room (dedicated space, cooling, UPS)
  - Current annual costs:
    * Maintenance contracts: $48,000
    * Electricity/cooling: $18,000
    * IT staff (2 system admins): $180,000
    * Software licenses (on-premise): $65,000
    * Insurance: $4,000
    * Total: $315,000/year

  Option A — Replace on-premise (CapEx approach):
  - New servers: $180,000
  - Storage: $75,000
  - Network equipment: $35,000
  - Installation/migration: $40,000
  - Total CapEx: $330,000
  - Depreciation: 5-year straight-line ($66,000/year)
  - Ongoing annual costs:
    * Maintenance: $28,000
    * Electricity/cooling: $15,000
    * IT staff: $180,000 (still need 2 admins)
    * Software licenses: $65,000
    * Insurance: $4,000
    * Total OpEx: $292,000/year

  Option B — Migrate to cloud (OpEx approach):
  - Migration project: $60,000 (one-time, classified as
    OpEx under current accounting guidance)
  - Monthly cloud costs: $12,500/month ($150,000/year)
    * Azure compute: $6,800
    * Azure storage: $2,200
    * Azure networking: $1,500
    * Microsoft 365 upgrade: $2,000
  - IT staff: Reduce to 1 admin + 1 cloud engineer =
    $170,000 (net saving $10K but higher-paid role)
  - Software licenses: $45,000/year (some included in
    cloud)
  - Total annual OpEx: $365,000/year (but no CapEx)

  Financial context:
  - Firm's marginal tax rate: 37% (partner income)
  - Partners prefer immediate deductions (OpEx) over
    depreciation (CapEx) for tax purposes
  - Firm has $2M in available cash
  - Section 179 deduction could allow immediate expensing
    of some CapEx (up to IRS limits)
  - Firm's weighted average cost of capital: 8%

  Task: Write the financial analysis comparing both
  options. Include the 5-year total cost comparison, tax
  implications of CapEx vs OpEx classification, cash flow
  analysis, and a recommendation that addresses both
  financial and operational considerations.

assertions:
  - type: llm_judge
    criteria: "Response provides accurate 5-year financial comparison — calculates total cost of ownership for both options over 5 years; includes CapEx depreciation schedule; accounts for tax implications of each approach (immediate OpEx deduction vs depreciation vs Section 179); considers time value of money (NPV at 8% WACC); the comparison reveals the true financial picture beyond just annual cost; math is correct and well-organized."
    weight: 0.35
    description: "Accurate5YearComparison"
  - type: llm_judge
    criteria: "Response explains tax implications clearly — distinguishes how CapEx (depreciated over 5 years unless Section 179 applies) vs OpEx (immediately deductible) affects the partners' tax positions; calculates the tax benefit difference; explains Section 179 applicability; considers that partners prefer immediate deductions; the tax analysis is accurate and would help the CFO and Managing Partner understand the after-tax cost; acknowledges this is analysis, not tax advice."
    weight: 0.35
    description: "TaxImplicationAnalysis"
  - type: llm_judge
    criteria: "Response considers operational factors beyond financials — addresses scalability (cloud scales with firm growth, on-premise requires future CapEx), business continuity (cloud DR vs on-premise backup), staffing risk (reliance on 2 admins vs cloud-managed infrastructure), flexibility (monthly vs 5-year commitment), and strategic alignment (modern law firms increasingly cloud-based); the recommendation balances financial analysis with operational reality."
    weight: 0.30
    description: "OperationalConsiderations"
