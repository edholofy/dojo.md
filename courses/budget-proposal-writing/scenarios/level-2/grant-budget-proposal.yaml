meta:
  id: grant-budget-proposal
  level: 2
  course: budget-proposal-writing
  type: output
  description: "Grant budget proposal — write a budget for a government or foundation grant application with compliance requirements"
  tags: [grant, funding, compliance, non-profit, intermediate]

state: {}

trigger: |
  You're the Program Director at a mid-sized non-profit
  organization focused on workforce development. You're
  applying for a $750,000 federal grant from the
  Department of Labor to fund a 2-year job training
  program for unemployed adults. The grant requires a
  detailed budget with justification narrative.

  Program overview:
  - Target: Train 200 unemployed adults in IT skills over
    2 years (100 per year)
  - Duration: 24 months
  - Location: Urban community center (existing space)
  - Curriculum: 12-week intensive IT support certification
    program (4 cohorts per year, 25 students each)
  - Includes: Classroom instruction, lab work,
    certification exam prep, job placement assistance,
    6-month post-placement support

  Grant requirements:
  - Budget must follow federal cost principles (2 CFR 200)
  - Costs must be allowable, reasonable, and allocable
  - Indirect cost rate: Your organization has a negotiated
    rate of 15% (NICRA on file)
  - Match requirement: 20% match ($150,000 in non-federal
    funds — you'll use in-kind and cash match)
  - Budget must be separated into Year 1 and Year 2
  - Budget justification narrative required for every
    line item

  Staffing plan:
  - Program Director (you): 50% FTE, $85,000 salary
    (50% = $42,500/year)
  - Lead Instructor: 100% FTE, $65,000/year
  - 2 Part-time Instructors: 50% FTE each, $50,000 salary
    (50% = $25,000 each/year)
  - Job Placement Coordinator: 100% FTE, $55,000/year
  - Program Assistant: 100% FTE, $38,000/year
  - Fringe benefits rate: 28% of salaries

  Other costs:
  - Equipment: 25 laptops for student lab ($800 each =
    $20,000), networking equipment ($5,000), projectors
    ($3,000)
  - Supplies: Training materials, textbooks ($150/student)
  - Certification exam fees: $350/student (CompTIA A+)
  - Participant stipends: $500/month per student during
    training (allowable under this grant)
  - Travel: Staff travel to employer partners, conferences
  - Contractual: External evaluator required ($30,000/yr)
  - Space: Community center provides free space (in-kind
    match value: $48,000/year)

  Task: Write the complete grant budget with Year 1 and
  Year 2 breakdowns, the budget justification narrative,
  and the matching funds documentation. Ensure compliance
  with federal cost principles.

assertions:
  - type: llm_judge
    criteria: "Response creates a compliant federal grant budget — organizes costs into standard federal budget categories (personnel, fringe, travel, equipment, supplies, contractual, other, indirect); separates Year 1 and Year 2; applies the 15% indirect cost rate correctly (on modified total direct costs); accounts for the 20% match requirement with specific match sources; the budget format would be recognizable to a federal grants reviewer."
    weight: 0.35
    description: "CompliantGrantBudget"
  - type: llm_judge
    criteria: "Response writes a thorough budget justification narrative — explains every line item with specific justification (why this cost is necessary, how it was calculated, how it supports program objectives); calculates fringe benefits at 28%; justifies the participant stipends as allowable under the grant; explains the in-kind space match valuation; the narrative connects each expense to program activities and outcomes; would satisfy a federal grants officer's review."
    weight: 0.35
    description: "ThoroughJustificationNarrative"
  - type: llm_judge
    criteria: "Response demonstrates grant budget literacy — correctly handles federal cost principles (allowable, reasonable, allocable); properly calculates indirect costs; documents matching funds (cash and in-kind); accounts for Year 2 salary increases if applicable; ensures total budget aligns with the $750,000 federal request plus $150,000 match; identifies any costs that might be questioned by reviewers and proactively justifies them."
    weight: 0.30
    description: "GrantBudgetLiteracy"
