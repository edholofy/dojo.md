meta:
  id: budget-cross-industry-research
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget cross-industry research — write the definitive 'State of Corporate Budgeting 2026' research report based on global survey data"
  tags: [research, cross-industry, survey-analysis, benchmarking, master]

state: {}

trigger: |
  You're the Director of Research at the Association for
  Financial Professionals (AFP). You've just completed the
  largest-ever global survey of corporate budgeting
  practices — 3,200 responses from CFOs, VPs of Finance,
  and FP&A leaders across 42 countries and 18 industries.
  You need to produce the "State of Corporate Budgeting
  2026" report that will become the definitive reference
  for how organizations budget.

  Survey data highlights to incorporate:
  
  Budget cycle metrics:
  - Average budget cycle length: 4.2 months (range: 6 weeks
    to 9 months)
  - Top quartile completes in under 8 weeks
  - 68% still use spreadsheets as primary tool
  - Average number of budget iterations: 6.3
  - 42% of CFOs say their budget is "outdated before it's
    approved"

  Methodology adoption:
  - Traditional incremental budgeting: 52%
  - Driver-based planning: 23%
  - Rolling forecasts (replaced annual): 12%
  - Zero-based budgeting: 8%
  - Beyond Budgeting (no annual budget): 3%
  - Hybrid approaches: 2%

  Technology trends:
  - AI/ML in budgeting (any use): 18% (up from 4% in 2023)
  - AI for revenue forecasting: 12%
  - AI for expense optimization: 9%
  - AI for scenario generation: 7%
  - Full AI-generated budget drafts: 2%
  - Satisfaction with budget tech: 34% satisfied

  Budget accuracy:
  - Revenue forecast accuracy (% within 5%): 38%
  - Expense forecast accuracy (% within 5%): 52%
  - Companies using AI show 15% improvement in accuracy
  - Budget accuracy correlates with financial performance
    (r=0.42, p<0.001)

  Organizational findings:
  - 89% of managers admit to "gaming" their budget submission
  - CEO involvement in budget review: 72% (but only 31%
    spend more than 4 hours)
  - Board approval of budget: 61% (39% delegate to
    management)
  - FP&A team size (median): 6 people per $1B revenue
  - 73% of FP&A leaders say budgeting takes too much of
    their time

  Regional differences:
  - Asia-Pacific: Shortest cycles (3.4 months avg), most
    likely to use AI
  - Europe: Most likely to adopt rolling forecasts (18%)
  - North America: Highest spreadsheet dependency (74%)
  - Middle East/Africa: Longest cycles (5.8 months avg)

  Task: Write the full research report including executive
  summary, key findings by theme, regional and industry
  benchmarking, statistical analysis of what distinguishes
  top-performing budget processes, the emerging trends
  section (AI, continuous planning, climate budgeting),
  and practitioner recommendations. The report should
  be 30-40 pages equivalent in content depth with data
  visualizations described.

assertions:
  - type: llm_judge
    criteria: "Response creates a professional research report — includes executive summary with top 10 findings; organizes findings thematically (cycle efficiency, methodology, technology, accuracy, organizational dynamics); presents data with appropriate statistical context (not just percentages but significance, correlations, segment analysis); describes data visualizations that would effectively communicate findings; the report structure and depth would be appropriate for a major AFP or McKinsey-caliber industry report."
    weight: 0.35
    description: "ProfessionalResearchReport"
  - type: llm_judge
    criteria: "Response provides actionable benchmarking and analysis — identifies what distinguishes top-performing budget processes from the rest (not just correlation but causal hypotheses); creates useful benchmarks by company size, industry, and region; analyzes the ROI of different budgeting methodologies (do rolling forecasts actually produce better outcomes?); addresses the AI adoption curve with practical guidance on when and how to adopt; the analysis goes beyond descriptive statistics to prescriptive insights."
    weight: 0.35
    description: "ActionableBenchmarkingAnalysis"
  - type: llm_judge
    criteria: "Response identifies emerging trends and future directions — analyzes the AI adoption trajectory with realistic predictions; addresses the shift from annual to continuous planning with evidence; covers climate/ESG budgeting integration as an emerging requirement; identifies generational differences in budgeting approaches; proposes a maturity model for budgeting excellence; the trends section is forward-looking without being speculative; a CFO reading this section would understand where budgeting is heading and how to prepare."
    weight: 0.30
    description: "EmergingTrendsAndFuture"
