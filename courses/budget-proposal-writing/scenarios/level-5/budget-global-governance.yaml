meta:
  id: budget-global-governance
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget global governance — design the global budget governance system for a Fortune 50 multinational spanning 60 countries"
  tags: [global-governance, multinational, fortune-50, enterprise-architecture, master]

state: {}

trigger: |
  You're the Global CFO of a Fortune 50 diversified
  industrial conglomerate ($78B revenue, 185,000 employees,
  operations in 62 countries). The company has grown through
  150+ acquisitions over 30 years, resulting in a patchwork
  of budget processes — from sophisticated SAP-integrated
  planning in Germany to spreadsheet-based budgets in
  emerging market subsidiaries. The CEO wants one unified
  global budget governance system.

  Company structure:
  | Division | Revenue | Countries | Entities | Budget Maturity |
  |----------|---------|-----------|----------|----------------|
  | Industrial Systems | $28B | 45 | 120 | SAP/BPC, mature |
  | Aerospace | $18B | 22 | 55 | Hyperion, moderate |
  | Healthcare Tech | $14B | 35 | 80 | Mixed (acquired) |
  | Energy Solutions | $12B | 40 | 95 | Anaplan, good |
  | Digital Services | $6B | 18 | 30 | Cloud-native, advanced |

  Current state problems:
  - 380 legal entities each submit budgets in local formats
  - 23 different budget tools and systems in use
  - Budget cycle takes 7 months (July to January for Jan 1
    fiscal year)
  - 15,000 cost centers worldwide, 4,200 P&L owners
  - Currency: 38 currencies in budget, FX management manual
  - Intercompany: $22B in intercompany transactions annually
  - Transfer pricing: Under audit in 8 countries simultaneously
  - Statutory requirements: 62 countries × different fiscal
    years, tax rules, GAAP standards
  - "Budget theater": Divisions inflate requests by 20%
    knowing HQ will cut them by 15%

  CEO mandate:
  - "I want one global budget process that takes 12 weeks,
    not 7 months"
  - "Every P&L owner should use the same system and the same
    definitions"
  - "I want real-time visibility into budget vs actuals in
    every country"
  - "Eliminate budget gaming — use data-driven base budgets"
  - "The budget should align with our 5-year strategic plan"
  - "Maintain local compliance while achieving global
    consistency"

  Constraints:
  - Capital budget for budget transformation: $45M over 3 years
  - Cannot disrupt current operations during transition
  - Must maintain SOX compliance throughout
  - Works council approval needed in 12 European countries
  - Acquisitions continue (3-4 per year) — must onboard
    acquired companies quickly
  - Board requires quarterly reforecasts from all divisions

  Task: Design the global budget governance system including
  the technology architecture, the standardized process
  framework, the organizational model (global FP&A center
  of excellence), the change management program for 4,200
  P&L owners, the compliance framework spanning 62
  countries, and the 3-year transformation roadmap. This
  should be the definitive blueprint for global budget
  governance at scale.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global budget architecture — proposes a technology platform strategy (consolidate 23 tools into unified architecture with division-level flexibility); defines standardized budget process with global calendar, common chart of accounts, and standard KPIs; creates the organizational model (global FP&A CoE, division controllers, country finance teams) with clear roles; addresses the 7-month to 12-week cycle compression with specific process redesign; the architecture would work at Fortune 50 scale with 380 entities and 4,200 P&L owners."
    weight: 0.35
    description: "ComprehensiveGlobalArchitecture"
  - type: llm_judge
    criteria: "Response addresses multi-country compliance and complexity — handles 62 countries' statutory requirements, tax rules, and GAAP standards; proposes transfer pricing governance for $22B intercompany transactions under audit; addresses currency management for 38 currencies with FX risk framework; considers works council requirements in European countries; maintains SOX compliance throughout transformation; the compliance framework demonstrates understanding of multinational financial governance at scale."
    weight: 0.35
    description: "MultiCountryCompliance"
  - type: llm_judge
    criteria: "Response creates a feasible 3-year transformation roadmap — phases the rollout across 5 divisions realistically (not all at once); addresses the change management for 4,200 P&L owners (training, communication, adoption support); proposes quick wins for the first year while building toward the full vision; handles the ongoing M&A integration challenge (how to onboard 3-4 acquisitions per year into the new system); the $45M budget is allocated across technology, people, and process investments; the roadmap would give the CEO and board confidence that this massive transformation is achievable."
    weight: 0.30
    description: "FeasibleTransformationRoadmap"
