meta:
  id: master-budget-shift
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Master budget shift — handle a congressional investigation into budget practices, a global financial crisis rebudget, and an AI-generated budget controversy simultaneously"
  tags: [shift-simulation, congressional, financial-crisis, ai-controversy, master]

state: {}

trigger: |
  You're the CFO of a Fortune 100 defense and technology
  conglomerate ($52B revenue, 120,000 employees). Three
  unprecedented situations converge simultaneously.

  SITUATION 1 — Congressional Investigation:
  The Senate Armed Services Committee has launched an
  investigation into your company's government contract
  budgeting practices. A whistleblower has alleged that:
  - Your company systematically underbudgets fixed-price
    contracts to win bids, then seeks modifications after
    contract award
  - The "independent cost estimates" submitted to the
    government were prepared by the same team that builds
    the competitive bid — not independent
  - $2.3B in government contract budget overruns over 5
    years were foreseeable at contract signing
  - Internal budget documents show "win rate" projections
    that assumed cost overruns would be recoverable

  You must prepare:
  - Testimony and supporting materials for the CFO's
    appearance before the committee
  - An internal review of budget practices on all 180
    active government contracts
  - A corrective action plan demonstrating reformed budget
    governance
  - Financial impact analysis: If contract modifications
    are denied, $800M in expected revenue could be at risk

  SITUATION 2 — Global Financial Crisis Rebudget:
  A major global financial shock (sovereign debt crisis in
  3 G20 economies) has triggered:
  - Stock market down 35% in 2 weeks
  - Your stock down 28% ($18B market cap loss)
  - Commercial customers freezing all CapEx decisions
  - Defense budget expected to be cut 8% in sequestration
  - Supply chain disruption (3 key suppliers in affected
    countries)
  - Currency volatility: EUR -15%, JPY +12%, GBP -10%
  - Your $8B revolving credit facility: Banks requesting
    covenant amendment discussions
  - Revenue at risk: $6-10B (12-19% of revenue)

  SITUATION 3 — AI Budget Controversy:
  Your company piloted an AI-powered budgeting system that
  generated budget recommendations for 40% of your cost
  centers. The AI:
  - Recommended eliminating 8,400 positions (7% of workforce)
    based on productivity analysis
  - Identified $1.2B in "waste" across the organization
  - Generated budget allocations that would shift $3B from
    legacy defense programs to commercial technology
  - The AI's recommendations leaked to the media: "Defense
    Giant's AI Wants to Fire 8,400 Workers"
  - Employee morale has cratered — union threatening strike
  - Congressional defense caucus: "Using AI to cut defense
    programs is a national security concern"
  - The AI also identified genuine inefficiencies that
    management had missed

  Task: Address all three crises with integrated budget
  responses. For Congress, prepare the testimony framework
  and corrective action plan. For the financial crisis,
  create the emergency rebudget with scenario analysis. For
  the AI controversy, craft the response strategy that
  salvages the useful insights while managing the PR and
  workforce crisis. All three responses must be internally
  consistent and reflect the CFO's fiduciary responsibility.

assertions:
  - type: llm_judge
    criteria: "Response addresses the congressional investigation with appropriate gravity — prepares testimony that acknowledges problems without admitting legal liability; the corrective action plan is substantive (not just PR — actually reforms the independent cost estimate process); quantifies the $800M revenue risk with scenario analysis; proposes contract budget governance reforms that would satisfy congressional oversight; the response demonstrates that the CFO takes the allegations seriously while protecting the company's legal position."
    weight: 0.35
    description: "CongressionalInvestigationResponse"
  - type: llm_judge
    criteria: "Response creates a credible crisis rebudget — addresses the $6-10B revenue-at-risk with specific scenario modeling; proposes cost actions that can be implemented quickly (hiring freeze, discretionary spending cuts, capital deferral) while preserving strategic capabilities; addresses the bank covenant situation with proactive communication and amendment proposal; handles currency volatility with hedging strategy; the rebudget would give the board and banks confidence that management is in control during a crisis."
    weight: 0.35
    description: "CrisisRebudgetResponse"
  - type: llm_judge
    criteria: "Response handles the AI controversy strategically — doesn't dismiss the AI's findings entirely (some inefficiencies are real) but manages the PR, workforce, and political dimensions; proposes how to use AI insights without the optics of 'AI decides who gets fired'; addresses union concerns with engagement strategy; responds to congressional defense caucus concerns about defense program cuts; the approach preserves the value of AI-assisted budgeting while rebuilding trust; all three crisis responses are internally consistent and mutually reinforcing."
    weight: 0.30
    description: "AIControversyAndIntegration"
