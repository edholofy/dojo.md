meta:
  id: fp-and-a-consulting-practice
  level: 5
  course: budget-proposal-writing
  type: output
  description: "FP&A consulting practice — design a boutique consulting firm specializing in budget transformation and FP&A modernization"
  tags: [consulting, fp-and-a, practice-building, methodology, master]

state: {}

trigger: |
  You're a former VP of FP&A at a Fortune 100 company who
  left to start "Clarity Financial Partners," a boutique
  consulting firm specializing in budget process
  transformation and FP&A modernization. You've assembled
  a team of 5 former FP&A leaders and need to create your
  firm's go-to-market strategy, methodology, and first
  client engagement framework.

  Market opportunity:
  - 85% of CFOs say their budgeting process is "broken"
  - FP&A transformation market: ~$8B globally
  - Competitors: Big 4 firms (expensive, generic), niche
    FP&A consultancies (few), technology vendors disguised
    as consultants (biased)
  - Your differentiation: Practitioner-led (you've done it),
    technology-agnostic, focused on process + people not
    just tools

  Service offerings to design:
  1. Budget Process Diagnostic (2-3 weeks, $50-75K):
     Assess current state, identify improvement opportunities,
     create transformation roadmap
  2. FP&A Operating Model Design (6-8 weeks, $150-250K):
     Redesign the FP&A function including organization,
     processes, technology architecture, and capabilities
  3. Budget Transformation Implementation (6-12 months,
     $500K-1.5M): Full implementation of new budgeting
     methodology (rolling forecasts, driver-based planning,
     integrated business planning)
  4. CFO Advisory (retainer, $15-25K/month): Ongoing
     strategic finance advisory for mid-market CFOs

  First client prospect:
  - $800M industrial manufacturer, 4,500 employees
  - Current budget cycle: 5 months, 40 spreadsheets, 120
    cost centers, no driver-based planning
  - CFO is new (6 months in) and wants to "modernize
    everything"
  - They've been pitched by Deloitte ($2.5M proposal,
    12-month engagement with 15 consultants) and Anaplan
    ($400K software + implementation, but no process change)
  - CFO's budget for this initiative: $750K-1M
  - Timeline expectation: "visible results in 6 months"

  Task: Create the complete consulting methodology for your
  flagship service (Budget Transformation Implementation),
  design the proposal for the first client that positions
  you against Deloitte and Anaplan, and build the value
  quantification framework that shows the CFO the ROI of
  the engagement. Include specific deliverables, workstream
  design, and pricing strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible consulting methodology — the Budget Transformation Implementation offering has a clear phase structure (discovery, design, build, deploy, optimize); each phase has specific deliverables, activities, and duration; the methodology addresses process, people, and technology holistically; includes change management throughout (not just at the end); the methodology reflects real FP&A transformation experience (not generic consulting framework); it would differentiate Clarity from both Big 4 firms and technology vendors."
    weight: 0.35
    description: "CredibleConsultingMethodology"
  - type: llm_judge
    criteria: "Response designs a winning client proposal — positions against Deloitte (too expensive, too many junior consultants, generic approach) and Anaplan (technology-only, no process change, vendor bias); scopes the engagement within the $750K-1M budget; shows visible results within 6 months (quick wins in Phase 1, structural improvements in Phase 2); the proposal demonstrates understanding of the client's specific challenges (5-month cycle, 40 spreadsheets, 120 cost centers); pricing strategy is competitive and value-based."
    weight: 0.35
    description: "WinningClientProposal"
  - type: llm_judge
    criteria: "Response includes a value quantification framework — calculates the ROI of FP&A transformation for the client (time savings from cycle reduction, accuracy improvement value, decision quality improvement, technology cost reduction from spreadsheet elimination); the framework is specific enough to produce compelling numbers but honest about what's guaranteed vs aspirational; includes metrics the CFO can track during and after the engagement; the value story would help the CFO justify the investment to the CEO and board."
    weight: 0.30
    description: "ValueQuantificationFramework"
