meta:
  id: budget-behavioral-economics
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget behavioral economics — write a research guide on cognitive biases in organizational budgeting and evidence-based interventions"
  tags: [behavioral-economics, cognitive-biases, research, nudge-theory, master]

state: {}

trigger: |
  You're a professor of organizational behavior and finance
  at MIT Sloan, specializing in behavioral economics applied
  to corporate finance. You've been awarded a $500K NSF
  grant to study cognitive biases in organizational
  budgeting. You need to produce the research framework
  and the practitioner guide that translates your findings
  into actionable interventions.

  Your research catalog of budget biases:
  1. Anchoring bias: Prior year budget anchors all future
     budgets (explains why ZBB feels so difficult)
  2. Planning fallacy: Managers systematically underestimate
     costs and overestimate revenue (average: 20% optimistic)
  3. Endowment effect: Departments treat budget allocation as
     "their money" and resist any reallocation
  4. Status quo bias: 73% of budget line items remain within
     5% of prior year regardless of changing needs
  5. Sunk cost fallacy: Continuing to fund failing projects
     because "we've already spent $X"
  6. Groupthink in budget committees: Committees approve
     budgets that no individual member would approve alone
  7. Authority bias: Junior analysts don't challenge senior
     leaders' budget assumptions even when data contradicts
  8. Availability bias: Recent events disproportionately
     influence budget assumptions (e.g., one bad quarter
     leads to excessive cost cutting)
  9. Optimism bias in revenue forecasting: Sales leaders
     forecast 30% higher than actual delivery
  10. Loss aversion in budget cuts: Fear of cutting $1 is
      2.5x stronger than desire to invest $1 in growth

  Research methodology:
  - 3-year longitudinal study of 50 companies
  - Access to budget documents, meeting transcripts, and
    financial outcomes
  - Controlled experiments with budget committees (A/B
    testing interventions)
  - Survey of 2,000 budget participants across industries

  Proposed interventions to test:
  - "Red team" budget reviews (dedicated challenge team)
  - Pre-mortem analysis ("assume this budget failed — why?")
  - Algorithmic base rates (AI-generated starting points
    instead of prior year)
  - Decision journals for budget approvers
  - Anonymous budget challenge submissions
  - Structured devil's advocate roles in budget committees

  Task: Create the research framework including the
  hypothesis structure, experimental design for the
  interventions, the expected findings based on preliminary
  data, and the practitioner guide that translates the
  research into a "Behavioral Budget Design Toolkit" for
  CFOs. The guide should be immediately usable by finance
  leaders who want to debias their budget process.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous research framework — structures hypotheses around each bias with testable predictions; designs experiments that isolate the impact of specific interventions (control vs treatment groups); addresses research validity concerns (selection bias, Hawthorne effect, confounding variables); the methodology section would pass peer review in a management science journal; connects behavioral economics theory to organizational budgeting practice in a novel way."
    weight: 0.35
    description: "RigorousResearchFramework"
  - type: llm_judge
    criteria: "Response produces a usable practitioner toolkit — translates each bias into specific, observable budget behaviors; proposes interventions that are practical to implement in real organizations (not just academic theory); includes implementation guidance for CFOs (how to introduce red teams, pre-mortems, algorithmic base rates without creating resistance); the toolkit has assessment tools, checklists, and facilitation guides; a CFO reading this could implement at least 3 interventions in their next budget cycle."
    weight: 0.35
    description: "UsablePractitionerToolkit"
  - type: llm_judge
    criteria: "Response demonstrates deep knowledge of both domains — shows genuine understanding of behavioral economics research methods AND corporate finance practice; the interventions are grounded in established behavioral science (Kahneman, Thaler, etc.) while being adapted for the budget context; addresses organizational politics and power dynamics (biases aren't just cognitive — they're also strategic); the writing bridges academic rigor and practitioner accessibility; the work represents a genuine contribution to both fields."
    weight: 0.30
    description: "CrossDomainExpertise"
