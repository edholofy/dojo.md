meta:
  id: budget-technology-platform
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget technology platform — design an AI-powered budget planning SaaS platform that disrupts traditional FP&A software"
  tags: [saas, ai-platform, fp-and-a-tech, product-design, master]

state: {}

trigger: |
  You're the CEO and co-founder of "PlanForge," an AI-
  powered budget planning platform that raised a $25M
  Series B. Your vision is to replace the traditional budget
  process (spreadsheets, Anaplan, Oracle Hyperion) with an
  AI-native planning platform that generates budgets,
  identifies biases, and continuously optimizes resource
  allocation. You need to create the product vision document,
  the go-to-market strategy, and the 3-year business plan.

  Product vision:
  - AI-generated budget drafts based on historical data,
    market signals, and company strategy
  - Automated bias detection (identifies anchoring, planning
    fallacy, sandbagging in submitted budgets)
  - Continuous planning engine (replaces annual cycle with
    always-on budget that adjusts to actuals)
  - Collaborative workflow with version control, commenting,
    and approval routing
  - Scenario modeling with Monte Carlo simulation
  - Natural language interface ("What happens if we increase
    sales headcount by 20%?")
  - Integration with ERP, CRM, HRIS, and data warehouses

  Market landscape:
  | Competitor | Revenue | Strength | Weakness |
  |-----------|---------|----------|----------|
  | Anaplan | $720M | Market leader, enterprise | Complex, expensive, no AI-native |
  | Adaptive (Workday) | $450M | Integrated with Workday | Locked to Workday ecosystem |
  | Vena | $120M | Excel-based, familiar | Limited AI, spreadsheet dependency |
  | Pigment | $50M | Modern UX, fast-growing | Early stage, limited enterprise |
  | Planful | $90M | Mid-market strong | Dated architecture |

  PlanForge current state:
  - 85 customers (mostly mid-market, $100M-$1B revenue)
  - ARR: $12M (growing 120% YoY)
  - ACV: $140K (enterprise deals trending to $300K+)
  - NRR: 135% (strong expansion)
  - Team: 95 people (40 engineering, 20 sales, 15 CS, 20 other)
  - Core AI models: Budget generation, bias detection,
    anomaly identification
  - Gross margin: 72% (compute costs for AI are significant)

  Series B expectations:
  - Reach $50M ARR within 24 months
  - Expand into enterprise segment ($1B+ revenue companies)
  - Build strategic partnerships with Big 4 firms
  - Achieve product-market fit in 3 verticals (SaaS, healthcare,
    manufacturing)
  - Path to profitability within 36 months

  Task: Create the comprehensive product and business plan
  including the product roadmap (what AI capabilities to
  build and in what order), the go-to-market strategy
  (how to win enterprise deals against Anaplan), the
  financial model (path from $12M to $50M+ ARR), and the
  competitive positioning document. Address the AI-specific
  challenges (accuracy, trust, explainability) and how you
  build an AI budget tool that CFOs actually trust.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision and roadmap — prioritizes AI capabilities by value and feasibility (budget generation before autonomous optimization); addresses the trust problem (CFOs won't trust AI-generated budgets without explainability and human-in-the-loop design); the roadmap sequences features to build from current capabilities to vision; includes technical considerations (model accuracy, training data requirements, compute costs); the product vision is ambitious but grounded in what's technically feasible."
    weight: 0.35
    description: "CompellingProductVisionAndRoadmap"
  - type: llm_judge
    criteria: "Response designs a viable go-to-market strategy — explains how to win against Anaplan in enterprise (not on features, but on outcomes and speed-to-value); identifies the ideal customer profile and buying process; proposes partnership strategy with Big 4 firms (they recommend tools to clients); addresses the vertical strategy (why SaaS, healthcare, manufacturing specifically); the financial model shows a credible path from $12M to $50M ARR with realistic assumptions about sales capacity, deal cycles, and expansion revenue."
    weight: 0.35
    description: "ViableGoToMarketStrategy"
  - type: llm_judge
    criteria: "Response addresses AI-specific challenges — tackles the fundamental trust problem (how do you get a CFO to trust AI-generated budget numbers?); proposes explainability features (why did the AI suggest this amount?); addresses accuracy and bias in the AI models themselves; considers the data moat strategy (more customers = better models = competitive advantage); the business plan includes AI compute costs in the margin model; the approach to AI in budgeting would be credible to both technical and finance audiences."
    weight: 0.30
    description: "AISpecificChallenges"
