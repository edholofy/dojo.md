meta:
  id: budget-thought-leadership
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget thought leadership — write an HBR-caliber article arguing that traditional annual budgeting is broken and proposing a new paradigm"
  tags: [thought-leadership, beyond-budgeting, paradigm-shift, hbr, master]

state: {}

trigger: |
  You're a former Fortune 500 CFO turned management
  professor at Wharton. Harvard Business Review has
  commissioned you to write a feature article titled
  "The Annual Budget Is Dead: What Should Replace It?"
  Your article should draw on your experience managing
  $10B+ budgets and your research into companies that have
  abandoned traditional budgeting.

  Article requirements:
  - 3,000-4,000 words
  - Must challenge conventional budgeting orthodoxy with
    evidence
  - Include case studies from real-type companies (you can
    reference composite examples)
  - Propose a specific alternative framework
  - Address the "but we need a budget for control" objection
  - Target audience: C-suite executives and board members

  Your research findings to incorporate:
  1. The average large company spends 25,000 person-days/year
     on budgeting, taking 4-6 months
  2. Budget accuracy: Average variance is ±15% — barely
     better than a simple trend line
  3. Gaming behaviors: 94% of surveyed managers admit to
     "padding" their budgets
  4. Innovation suppression: 78% of managers say budgets
     prevent them from pursuing opportunities discovered
     mid-year
  5. Companies that adopted "beyond budgeting" (rolling
     forecasts + relative targets) showed 23% higher
     shareholder returns over 10 years
  6. Zero-based budgeting shows 15-25% cost reduction in
     Year 1 but diminishing returns and organizational
     fatigue by Year 3
  7. AI-powered continuous planning tools are now mature
     enough to replace manual budget processes

  Counter-arguments to address:
  - "Boards need an annual plan to govern"
  - "Investors expect annual guidance"
  - "Without budgets, how do you control spending?"
  - "We tried this once and it was chaos"
  - "Our regulators require annual budgets"

  Task: Write the full HBR article that makes a compelling
  case for replacing traditional annual budgeting with a
  modern alternative. Include the framework, implementation
  roadmap, and specific guidance for CFOs who want to make
  the transition.

assertions:
  - type: llm_judge
    criteria: "Response presents a compelling intellectual argument — challenges traditional budgeting with specific evidence and examples; proposes a coherent alternative framework (not just 'do less budgeting' but a specific methodology like continuous planning with rolling forecasts, relative targets, and dynamic resource allocation); the argument builds logically from problem identification through solution to implementation; the writing quality and depth would be appropriate for an HBR feature article."
    weight: 0.35
    description: "CompellingIntellectualArgument"
  - type: llm_judge
    criteria: "Response addresses practical objections — doesn't just present theory but acknowledges and responds to real-world constraints (board governance, investor expectations, regulatory requirements, control mechanisms); proposes how the new framework handles each of these needs differently but effectively; includes transition guidance that acknowledges organizational change is hard; the practical advice would help a CFO who reads the article actually implement the ideas."
    weight: 0.35
    description: "PracticalObjectionsAddressed"
  - type: llm_judge
    criteria: "Response demonstrates deep finance expertise — incorporates the research data naturally (not just listing statistics); uses composite case studies effectively to illustrate points; shows understanding of why budgeting persists despite its flaws (organizational psychology, power dynamics, risk aversion); proposes metrics and governance mechanisms that would actually work in a large enterprise; the author's voice carries the authority of someone who has managed large budgets and understands both the theory and practice."
    weight: 0.30
    description: "DeepFinanceExpertise"
