meta:
  id: sovereign-budget-advisory
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Sovereign budget advisory — advise a developing nation on reforming its national budget process as an IMF/World Bank consultant"
  tags: [sovereign, national-budget, public-finance, imf, master]

state: {}

trigger: |
  You're a senior public finance advisor at the International
  Monetary Fund (IMF). You've been asked to advise the
  government of Meridia, a lower-middle-income country
  ($45B GDP, 28M population) that is reforming its national
  budget process as a condition of a $2B IMF Extended Fund
  Facility (EFF) program.

  Country context:
  - GDP: $45B ($1,607 per capita)
  - Government revenue: $8.1B (18% of GDP)
  - Government expenditure: $10.2B (22.7% of GDP)
  - Fiscal deficit: -$2.1B (4.7% of GDP)
  - Public debt: $28B (62% of GDP, rising rapidly)
  - Inflation: 12% (central bank target: 5%)
  - Currency: Meridian Dinar (MRD), depreciating 8%/year
  - Key sectors: Agriculture (25% GDP), Manufacturing (18%),
    Services (45%), Mining (12%)

  Current budget problems:
  1. Revenue mobilization: Tax-to-GDP ratio of 14% (excl.
     mining royalties) vs regional average of 18%
  2. Expenditure control: Off-budget spending estimated at
     15% of total expenditure (state-owned enterprises,
     extra-budgetary funds)
  3. Budget credibility: Actual spending deviates from
     approved budget by ±25%
  4. Transparency: Budget documents published late, limited
     public access, no citizen budget
  5. Procurement: 30% of public procurement is non-
     competitive (single-source)
  6. Subsidies: Energy subsidies of $1.8B/year (4% of GDP),
     poorly targeted — 60% benefits top 40% income earners
  7. Public investment: Poor project selection, 40% cost
     overrun average, no systematic appraisal
  8. Debt management: $3.2B in external debt service (39%
     of revenue), refinancing risk on $5B maturing in 2 years

  IMF program conditions (structural benchmarks):
  - Implement Treasury Single Account within 12 months
  - Publish quarterly fiscal reports within 45 days
  - Adopt program-based budgeting within 24 months
  - Reform energy subsidies (save $800M over 3 years)
  - Establish independent fiscal council
  - Implement GFSM 2014 reporting standards
  - Introduce medium-term expenditure framework (MTEF)

  Political constraints:
  - Election in 18 months — subsidy reform is politically
    explosive
  - 40% of government spending goes to civil service wages
    (powerful unions)
  - Mining revenue is volatile (copper: 70% of mineral exports)
  - Regional security concerns require defense spending (8%
    of budget)
  - International donors fund 12% of budget (with conditions)
  - Parliament has limited budget oversight capacity

  Task: Produce the budget reform advisory report for the
  Meridian government. Include the public financial
  management (PFM) reform roadmap, the medium-term fiscal
  framework, the subsidy reform strategy with social
  protection, the revenue mobilization plan, and the debt
  sustainability analysis. The report must be technically
  rigorous while politically realistic.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive PFM reform roadmap — sequences the reforms logically (TSA and basic controls first, then program budgeting, then performance management); addresses all IMF structural benchmarks with realistic timelines; includes institutional capacity building (Meridia can't implement sophisticated systems without trained staff); proposes technical assistance requirements; the roadmap reflects understanding of PFM reform in developing countries (PEFA framework, IMF FADS guidelines); the advice would be recognizable to IMF fiscal affairs department staff."
    weight: 0.35
    description: "ComprehensivePFMReformRoadmap"
  - type: llm_judge
    criteria: "Response addresses fiscal sustainability with political realism — proposes a credible path from 4.7% deficit to sustainable levels; the subsidy reform strategy includes social protection measures (targeted cash transfers to replace universal subsidies); revenue mobilization plan is realistic (expanding tax base, improving compliance, not just raising rates); addresses the civil service wage bill without proposing politically impossible mass layoffs; the fiscal framework acknowledges the election timeline and sequences reforms accordingly."
    weight: 0.35
    description: "FiscalSustainabilityWithRealism"
  - type: llm_judge
    criteria: "Response demonstrates sovereign finance expertise — includes debt sustainability analysis with scenario modeling (commodity price volatility, exchange rate depreciation, interest rate shocks); addresses the $5B refinancing risk with specific strategy; proposes revenue diversification away from volatile mining income; the MTEF covers at least 3 years with realistic fiscal targets; addresses aid dependency and donor coordination; the report would be credible as an IMF staff technical assistance document."
    weight: 0.30
    description: "SovereignFinanceExpertise"
