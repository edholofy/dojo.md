meta:
  id: budget-regulatory-standards
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget regulatory standards — draft model standards for corporate budget transparency and accountability as a regulatory policy advisor"
  tags: [regulatory, standards, transparency, corporate-governance, master]

state: {}

trigger: |
  You're a senior policy advisor to the SEC's Division of
  Corporation Finance. The Commission has asked you to draft
  a concept release exploring whether public companies
  should be required to disclose more information about
  their internal budgeting and resource allocation processes.
  This follows several high-profile cases where companies
  approved budgets they knew were unachievable (leading to
  earnings misses and investor losses) and cases where
  capital allocation decisions were made without proper
  board oversight.

  Background for the concept release:
  - Current disclosure: Companies disclose financial guidance
    (voluntary) but nothing about how budgets are created,
    approved, or governed
  - Problem cases:
    * Company A approved a budget with 25% growth target when
      internal analysis showed 8% was realistic — stock dropped
      40% when guidance was missed
    * Company B's CEO allocated $500M to a pet project that
      bypassed the normal budget process — resulted in $380M
      write-off
    * Company C's budget process was controlled by a single
      executive who manipulated assumptions to hit bonus targets

  Stakeholder perspectives to consider:
  - Investor advocates: "Budget governance is a material risk
    factor. Companies should disclose their budget process
    quality like they disclose internal controls over
    financial reporting."
  - Corporate lobby (Business Roundtable): "Budget processes
    are proprietary and competitively sensitive. Mandatory
    disclosure would be burdensome and reveal strategic
    information to competitors."
  - Audit firms: "We already assess internal controls.
    Budget governance could be incorporated into SOX
    attestation."
  - Governance experts: "The board's role in budget approval
    is a core governance function that deserves more
    transparency."
  - Academic research: "Studies show a correlation between
    budget process quality and financial reporting accuracy"

  SEC considerations:
  - Materiality threshold: When is budget governance "material"?
  - Cost-benefit analysis: What's the compliance cost vs
    investor protection benefit?
  - International comparisons: UK Corporate Governance Code
    requires board to assess "internal control effectiveness"
  - Existing frameworks: COSO internal controls, SOX 302/404
  - Small company exemptions: Should emerging growth companies
    be exempt?

  Task: Draft the concept release including the rationale
  for enhanced budget disclosure, proposed disclosure
  requirements (with alternatives ranging from principles-
  based to prescriptive), the cost-benefit analysis,
  questions for public comment, and the implementation
  timeline. The document must be balanced, acknowledging
  both investor protection benefits and corporate compliance
  burden.

assertions:
  - type: llm_judge
    criteria: "Response creates a properly structured SEC concept release — follows the format of actual SEC releases (background, discussion, proposed alternatives, economic analysis, request for comment); presents multiple regulatory approaches (principles-based disclosure, specific requirements, incorporation into SOX); each approach has clear benefits, costs, and trade-offs; the document is balanced (not advocating for regulation, but presenting options); the legal and regulatory language is appropriate for an SEC document."
    weight: 0.35
    description: "ProperSECConceptRelease"
  - type: llm_judge
    criteria: "Response addresses all stakeholder perspectives — gives fair treatment to both pro-regulation (investor protection, governance improvement) and anti-regulation (compliance burden, competitive sensitivity, proprietary information) arguments; proposes practical compromises (principles-based disclosure that reveals process quality without strategic details); addresses the small company burden with proportionate requirements; the comment questions are well-formulated and would generate useful public input."
    weight: 0.35
    description: "BalancedStakeholderTreatment"
  - type: llm_judge
    criteria: "Response demonstrates deep regulatory and finance expertise — connects budget governance to existing regulatory frameworks (SOX, COSO, proxy disclosure); the economic analysis includes both quantitative and qualitative cost-benefit assessment; addresses international comparisons thoughtfully; proposes implementation timeline that accounts for rulemaking process and compliance preparation; the concept release would be credible as an actual SEC staff document and would advance the public policy discussion on corporate budget transparency."
    weight: 0.30
    description: "RegulatoryAndFinanceExpertise"
