meta:
  id: budget-climate-integration
  level: 5
  course: budget-proposal-writing
  type: output
  description: "Budget climate integration — design a framework for integrating climate risk and sustainability into corporate budgeting processes"
  tags: [climate-risk, sustainability, esg, tcfd, master]

state: {}

trigger: |
  You're the Global Head of Sustainable Finance at a major
  consulting firm. A coalition of institutional investors
  managing $15 trillion in assets has commissioned you to
  develop a framework for "Climate-Integrated Budgeting" —
  a standard methodology for companies to incorporate
  climate risks and opportunities into their annual budget
  processes. The framework will be proposed to the ISSB
  (International Sustainability Standards Board) as a
  recommended practice.

  Framework requirements from the investor coalition:
  1. Carbon budget integration: Companies should set an
     internal carbon budget alongside their financial budget,
     with carbon costs assigned to business units
  2. Physical risk budgeting: Annual budgets should include
     scenario-based provisions for physical climate risks
     (extreme weather, supply chain disruption, asset
     impairment)
  3. Transition risk allocation: Capital budgets should
     allocate investment toward low-carbon transition, with
     stranded asset risk quantified
  4. Opportunity capture: Revenue budgets should include
     climate-related growth opportunities (green products,
     carbon markets, efficiency gains)
  5. Shadow carbon pricing: Internal carbon prices should
     be used in all investment decisions above $1M

  Industry applicability challenges:
  | Sector | Carbon Intensity | Key Climate Risk | Budget Integration Challenge |
  |--------|-----------------|-----------------|---------------------------|
  | Oil & Gas | Very High | Stranded assets, demand decline | Existential transition cost |
  | Utilities | High | Renewable transition, grid resilience | Massive CapEx reallocation |
  | Manufacturing | Medium-High | Supply chain, regulation | Scope 3 measurement |
  | Financial Services | Low (direct) | Portfolio exposure, liability | Financed emissions attribution |
  | Technology | Low | Data center energy, e-waste | Growing energy demand |
  | Agriculture | Medium | Physical risk, land use | Seasonal variability |

  Existing standards to build on:
  - TCFD recommendations (disclosure framework)
  - ISSB S2 (climate disclosure standard)
  - GHG Protocol (emissions accounting)
  - Science-Based Targets initiative (emissions reduction)
  - CDP (disclosure platform)
  - EU Taxonomy (activity classification)

  Skeptic arguments to address:
  - "Climate budgeting adds cost with no clear financial
    return"
  - "We can't accurately price carbon risk — the models
    are too uncertain"
  - "This is just another ESG reporting burden"
  - "Our competitors don't do this — it puts us at a
    competitive disadvantage"
  - "The budget is complex enough without adding climate
    dimensions"

  Task: Create the Climate-Integrated Budgeting framework
  including the methodology for each of the 5 components,
  industry-specific implementation guides for at least 3
  sectors, the shadow carbon pricing methodology, case
  studies showing financial materiality, and the proposal
  to ISSB with a phased adoption timeline. The framework
  must be rigorous enough for institutional investors while
  practical enough for CFOs to implement.

assertions:
  - type: llm_judge
    criteria: "Response creates a technically rigorous climate-budget integration framework — addresses all 5 components (carbon budgeting, physical risk, transition risk, opportunity capture, shadow carbon pricing) with specific methodology; builds on existing standards (TCFD, ISSB S2, GHG Protocol) rather than creating conflicting requirements; the framework is internally consistent and produces outputs that are useful for both financial planning and climate disclosure; the methodology for shadow carbon pricing is defensible and implementable."
    weight: 0.35
    description: "TechnicallyRigorousFramework"
  - type: llm_judge
    criteria: "Response provides practical industry-specific guidance — adapts the framework for at least 3 sectors with sector-relevant examples and metrics; acknowledges that climate integration looks very different for an oil company vs a tech company; addresses the Scope 3 measurement challenge practically; includes implementation difficulty assessment and phased adoption approach; a CFO in each sector could read the industry guide and understand what they need to do in their next budget cycle."
    weight: 0.35
    description: "PracticalIndustryGuidance"
  - type: llm_judge
    criteria: "Response addresses skeptic arguments with evidence — shows financial materiality of climate risk (not just environmental argument but financial case); responds to the competitive disadvantage concern (first-movers gain investor confidence, regulatory preparation); addresses model uncertainty honestly (range-based approach rather than false precision); proposes the ISSB adoption timeline that balances urgency with feasibility; the framework would satisfy both climate-focused investors and financially conservative CFOs."
    weight: 0.30
    description: "SkepticArgumentsAddressed"
