meta:
  id: multi-entity-consolidation-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Multi-entity consolidation budget — build a consolidated budget across multiple legal entities with intercompany eliminations and transfer pricing"
  tags: [consolidation, multi-entity, transfer-pricing, intercompany, expert]

state: {}

trigger: |
  You're the Group CFO of a $450M industrial conglomerate
  with 5 legal entities across 3 countries. The board wants
  a consolidated budget that provides true economic visibility
  while satisfying local statutory requirements. The current
  process takes 4 months and produces a budget that "nobody
  trusts" because intercompany transactions inflate revenue
  and costs.

  Entity structure:
  | Entity | Country | Revenue | Role |
  |--------|---------|---------|------|
  | ParentCo | US | $180M | Manufacturing + HQ |
  | SalesCo EU | Germany | $120M | European sales + distribution |
  | SalesCo APAC | Singapore | $80M | Asia-Pacific sales |
  | TechCo | Ireland | $45M | IP holding + R&D center |
  | ServiceCo | India | $25M | Shared services center |

  Intercompany transactions (annual):
  - ParentCo sells finished goods to SalesCo EU: $95M
  - ParentCo sells finished goods to SalesCo APAC: $65M
  - TechCo licenses IP to ParentCo: $30M
  - TechCo licenses IP to SalesCo EU: $15M
  - ServiceCo provides services to all entities: $25M total
  - ParentCo charges management fees to all subs: $12M total

  Transfer pricing issues:
  - German tax authority challenged the goods transfer price
    last year (wants higher EU entity profit)
  - Irish IP licensing rate under scrutiny (BEPS Pillar Two
    implications — 15% minimum tax)
  - India transfer pricing documentation due in 3 months
  - New OECD guidelines require "arm's length" documentation
    for all intercompany transactions
  - Total intercompany: $242M (must be eliminated in
    consolidation)

  Consolidated budget challenges:
  - External revenue (after eliminations): $450M — but
    entity-level budgets sum to $680M due to intercompany
  - Each entity CFO budgets to maximize local performance
    (SalesCo EU wants lower transfer prices, ParentCo wants
    higher)
  - Currency exposure: EUR (35% of external revenue), SGD
    (18%), INR (costs only)
  - Statutory requirements differ: US GAAP, German HGB
    (converting to IFRS), Singapore FRS, Irish IFRS
  - Tax optimization vs substance: Need to ensure transfer
    pricing supports budget AND is defensible
  - Board wants: One consolidated view, segment reporting,
    and entity-level P&Ls that reconcile

  Task: Design the consolidated budget with proper
  intercompany elimination, transfer pricing methodology
  that is both tax-efficient and defensible, currency
  management approach, and segment reporting. Include the
  reconciliation from entity-level budgets to consolidated
  view.

assertions:
  - type: llm_judge
    criteria: "Response creates a proper consolidated budget — shows the build-up from entity-level budgets to consolidated view; eliminates all $242M in intercompany transactions correctly; presents the reconciliation (entity sum $680M → eliminations → consolidated $450M); includes segment reporting that provides meaningful business insight; handles the multi-currency presentation appropriately; the consolidation methodology would satisfy both internal management and external auditor review."
    weight: 0.35
    description: "ProperConsolidatedBudget"
  - type: llm_judge
    criteria: "Response addresses transfer pricing strategically — proposes defensible transfer pricing methodology for each transaction type (goods: comparable uncontrolled price or cost-plus; IP licenses: comparable royalty rates; services: cost-plus); addresses the German tax challenge and Irish BEPS Pillar Two exposure; ensures transfer prices in the budget are consistent with arm's length documentation; balances tax efficiency with regulatory defensibility; the approach demonstrates understanding of international tax complexity."
    weight: 0.35
    description: "TransferPricingStrategy"
  - type: llm_judge
    criteria: "Response resolves entity-level conflicts — addresses the tension between entity CFOs optimizing locally vs group optimization; proposes a budgeting process that aligns entity incentives with group performance; handles currency risk across EUR, SGD, and INR exposures; addresses the accounting standard differences (US GAAP vs IFRS vs local GAAP); the process design would reduce the 4-month budget cycle and produce a budget that leadership trusts."
    weight: 0.30
    description: "EntityConflictResolution"
