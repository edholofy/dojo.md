meta:
  id: digital-transformation-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Digital transformation budget — build a multi-year technology transformation budget with business case, change management costs, and value realization framework"
  tags: [digital-transformation, technology, change-management, value-realization, expert]

state: {}

trigger: |
  You're the CTO/CDO of a $500M traditional insurance
  company (3,200 employees). The CEO and board have approved
  a 4-year digital transformation initiative with a total
  investment envelope of $85M. You need to create the
  detailed multi-year budget that balances technology
  investment, organizational change, and measurable business
  value — while managing the risk that "75% of digital
  transformations fail."

  Transformation pillars:
  1. Core systems modernization ($35M over 4 years):
     - Replace 25-year-old policy administration system
     - Migrate from mainframe to cloud (AWS)
     - API-enable all core systems
     - Current tech debt cost: $12M/year in maintenance

  2. Customer experience ($20M over 4 years):
     - Self-service portal and mobile app
     - Automated claims processing (current: 15 days avg)
     - Digital underwriting tools
     - Target: 70% of transactions digital (current: 20%)

  3. Data and analytics ($15M over 4 years):
     - Enterprise data platform (cloud data warehouse)
     - AI/ML for underwriting, fraud, pricing
     - Real-time reporting and dashboards
     - Predictive analytics for retention

  4. Organizational change ($15M over 4 years):
     - Digital skills training for 3,200 employees
     - Hire 80 new technology roles
     - Change management program
     - Process redesign for 45 core processes
     - Agile transformation of IT delivery

  Year 1 detailed budget needed:
  - Core systems: Assessment, vendor selection, architecture
    design, first module development ($8M)
  - Customer experience: Discovery, UX research, MVP for
    portal ($4M)
  - Data: Data strategy, platform architecture, first data
    migrations ($3M)
  - Change management: Communications, training design,
    first wave of upskilling ($3M)
  - Program management office: 8 FTEs ($2M)
  - Contingency: 15% ($3M)
  - Total Year 1: $23M

  Business case expectations:
  - Year 1: Net investment (no returns expected)
  - Year 2: $5M in efficiency gains (reduced manual processing)
  - Year 3: $15M in combined efficiency + revenue growth
  - Year 4: $25M in total value (run-rate)
  - NPV at 10% discount rate: $22M positive
  - Payback period: 3.2 years
  - But: Board member challenge — "I've never seen a
    transformation deliver its business case. Show me how
    this one will be different."

  Risks and constraints:
  - Cannot disrupt current operations during migration
  - Regulatory requirements (state DOI) for system changes
  - Union workforce (40% of employees) resistant to automation
  - Key legacy system vendor contract expires in 18 months
  - Competing for talent with insurtech startups
  - Insurance industry M&A could change strategic priorities

  Task: Create the 4-year transformation budget with Year 1
  detailed plan, the value realization framework, risk
  mitigation budget, change management investment plan, and
  the governance structure. Address the board member's
  skepticism about transformation ROI with a credible value
  tracking approach.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive transformation budget — breaks down the $85M across 4 years by pillar with appropriate phasing (assessment/design early, implementation mid, optimization late); Year 1 budget is detailed with quarterly milestones and spending cadence; includes all cost categories (technology, people, process, change management); the contingency is sized appropriately and governed by clear release criteria; the budget reflects realistic transformation economics (heavy investment early, value later)."
    weight: 0.35
    description: "ComprehensiveTransformationBudget"
  - type: llm_judge
    criteria: "Response includes a credible value realization framework — defines specific, measurable value drivers for each pillar (not just 'efficiency gains'); creates a value tracking methodology with leading and lagging indicators; addresses the board skepticism with concrete governance mechanisms (stage gates, value checkpoints, kill criteria); connects technology investment to business outcomes (claims processing time → customer satisfaction → retention → revenue); the framework distinguishes between value that's guaranteed vs dependent on adoption."
    weight: 0.35
    description: "ValueRealizationFramework"
  - type: llm_judge
    criteria: "Response addresses organizational change and risk — sizes the change management investment appropriately ($15M over 4 years for 3,200 employees); addresses union workforce concerns with specific engagement strategy; includes training budget with realistic capacity (you can't train 3,200 people at once); identifies the top 5 risks with quantified mitigation costs; proposes governance structure (steering committee, pillar leads, PMO) that ensures accountability; the plan acknowledges that technology is the easy part — people and process are where transformations fail."
    weight: 0.30
    description: "ChangeManagementAndRisk"
