meta:
  id: private-equity-value-creation-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Private equity value creation budget — build a 5-year value creation plan with EBITDA bridge, margin expansion levers, and exit valuation targets"
  tags: [private-equity, value-creation, ebitda-bridge, exit-planning, expert]

state: {}

trigger: |
  You're the CFO of a PE-backed healthcare services company.
  The PE firm (controlling shareholder, 70% ownership)
  acquired the company 18 months ago for $320M (8x EBITDA
  of $40M). They're targeting a 3x return in 5 years, which
  means they need exit valuation of ~$960M. To achieve this
  at an 8-10x exit multiple, EBITDA needs to reach $96-120M.

  Current state (18 months post-acquisition):
  - Revenue: $310M (was $280M at acquisition)
  - EBITDA: $44M (14.2% margin, up from $40M)
  - Employees: 2,800
  - 28 clinic locations across 6 states
  - Debt: $200M (5.5x leverage)
  - Cash: $18M
  - Revenue growth: 11% organic
  - Key service lines: Primary care (55%), Urgent care (25%),
    Behavioral health (15%), Telehealth (5%)

  PE firm's value creation thesis (from investment memo):
  1. Revenue growth to $500M through organic + M&A (acquire
     4-6 clinics per year at 5-6x EBITDA)
  2. EBITDA margin expansion from 14% to 22% through:
     - Revenue cycle management optimization ($8M impact)
     - Labor productivity improvement ($12M impact)
     - Procurement consolidation ($4M impact)
     - Shared services center ($6M impact)
  3. Multiple expansion from 8x to 10x through:
     - Higher-margin service mix (behavioral health, telehealth)
     - Technology platform ("tech-enabled services" narrative)
     - Geographic diversification
     - Recurring revenue model improvements

  Year 3 budget challenge (this year):
  - Board expects EBITDA of $62M (on path to $96-120M)
  - Revenue target: $380M
  - Must fund 3 acquisitions ($45M total, mostly debt-funded)
  - Labor costs rising 5% (60% of revenue)
  - Payer reimbursement rates flat to declining
  - Telehealth revenue growing 40% but still small ($25M)
  - Must refinance $200M debt (rate increase from 6.5% to 8%)
  - Operating partner wants to see "Year 3 inflection point"

  Task: Build the Year 3 operating budget as a value creation
  document. Include the EBITDA bridge from current $44M to
  target $62M, the margin expansion initiatives with P&L
  impact, the M&A integration budget, and the 5-year path
  to exit valuation. This budget must work as both an
  operating plan and a PE value creation narrative.

assertions:
  - type: llm_judge
    criteria: "Response builds a credible EBITDA bridge — shows the specific path from $44M to $62M EBITDA with identified initiatives (revenue growth contribution, margin expansion levers, M&A EBITDA add); each initiative has a quantified P&L impact; the bridge accounts for headwinds (labor cost inflation, rate pressure, debt refinancing costs); the total doesn't rely on 'stretch targets' or unidentified savings; a PE operating partner would find the bridge realistic and actionable."
    weight: 0.35
    description: "CredibleEBITDABridge"
  - type: llm_judge
    criteria: "Response integrates operating budget with value creation plan — connects each budget line to the value creation thesis; shows how Year 3 spending builds toward the exit valuation; addresses the margin expansion levers with specific implementation timelines and costs; includes the M&A budget (acquisition costs, integration costs, synergy capture timeline); the budget tells the story of a company systematically building value, not just growing revenue."
    weight: 0.35
    description: "ValueCreationIntegration"
  - type: llm_judge
    criteria: "Response addresses the exit valuation path — shows the 5-year trajectory from $310M/$44M to $500M/$96-120M; explains how service mix shift (toward behavioral health and telehealth) supports multiple expansion; addresses the debt refinancing impact on cash flow; identifies risks to the value creation plan (execution risk on margin initiatives, M&A integration risk, payer rate risk); proposes metrics the PE firm should track quarterly to ensure the plan is on track."
    weight: 0.30
    description: "ExitValuationPathway"
