meta:
  id: government-program-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Government program budget — create a federal program budget with OMB compliance, performance measures, and congressional justification"
  tags: [government, omb, federal-budget, congressional-justification, expert]

state: {}

trigger: |
  You're the Budget Director for a mid-size federal agency
  ($3.2B annual budget, 8,500 employees). You need to
  prepare the agency's FY2027 budget submission to OMB and
  the congressional justification documents. The political
  environment is challenging — your agency faces pressure
  to demonstrate efficiency while the Administration wants
  to expand two key programs.

  Agency structure:
  | Program | FY2026 Enacted | FY2027 Request | Change |
  |---------|---------------|----------------|--------|
  | Program A (Grants) | $1,400M | $1,600M | +14% |
  | Program B (Research) | $800M | $850M | +6% |
  | Program C (Enforcement) | $500M | $480M | -4% |
  | Program D (IT Modernization) | $200M | $280M | +40% |
  | Salaries & Expenses | $280M | $290M | +4% |
  | Inspector General | $20M | $22M | +10% |
  | Total | $3,200M | $3,522M | +10% |

  OMB guidance received:
  - Agency topline increased by 8% ($3,456M), but you're
    requesting $3,522M — need to justify the additional $66M
  - Administration priority: Expand Program A (grants to
    underserved communities) and Program D (IT modernization
    per federal mandate)
  - OMB examiner flagged: "Program C has declining workload
    metrics but flat budget — explain or reduce"
  - OMB requires: Performance measures tied to every dollar
    requested, efficiency metrics, evidence-based justification
  - Cross-cutting mandates: Cybersecurity ($15M increase
    required), climate adaptation ($8M), equity assessment ($3M)

  Congressional context:
  - Authorization committee supports Program A expansion
  - Appropriations committee skeptical of IT spending
    ("previous modernization project was $200M over budget")
  - Inspector General recently reported $180M in improper
    payments in Program A
  - Opposition party wants to cut agency budget by 15%
  - Two key committee members from states that benefit
    heavily from Program A grants

  Internal challenges:
  - Program C division will fight the 4% cut ("we're already
    understaffed")
  - IT modernization has no approved acquisition strategy yet
  - 15% of workforce eligible for retirement in 2 years
  - Union contract negotiations upcoming (3% COLA + step
    increases = 5.2% salary growth)

  Task: Prepare the budget submission package including the
  OMB budget justification, the congressional budget
  justification, performance measures for each program,
  and the internal communications strategy. The submission
  must survive scrutiny from OMB examiners, congressional
  staff, the IG, and the press.

assertions:
  - type: llm_judge
    criteria: "Response creates a proper federal budget submission — follows OMB Circular A-11 structure; includes program-level justifications with performance measures; ties each increase to specific outputs and outcomes; addresses the $66M gap between OMB topline and agency request with compelling justification; incorporates cross-cutting mandates (cyber, climate, equity); the format and language would be recognizable to federal budget professionals."
    weight: 0.35
    description: "ProperFederalBudgetFormat"
  - type: llm_judge
    criteria: "Response navigates political complexity — frames Program A expansion to address both Administration priorities and the improper payment concern (more funding WITH stronger controls); justifies IT modernization despite congressional skepticism (lessons learned from previous failure, phased approach); explains Program C reduction strategically (declining workload, efficiency gains, not capacity reduction); the document anticipates congressional questions and preemptively addresses them."
    weight: 0.35
    description: "PoliticalNavigationSkill"
  - type: llm_judge
    criteria: "Response includes performance measures and evidence — each program has SMART performance measures tied to budget levels; shows what outcomes improve with additional funding and what risks emerge with cuts; addresses the IG's improper payment finding with corrective action plan and budget for controls; includes workforce planning to address retirement wave; the performance framework demonstrates that the agency is results-oriented and accountable for taxpayer dollars."
    weight: 0.30
    description: "PerformanceAndEvidence"
