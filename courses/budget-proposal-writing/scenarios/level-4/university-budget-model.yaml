meta:
  id: university-budget-model
  level: 4
  course: budget-proposal-writing
  type: output
  description: "University budget model — redesign a university's budget allocation model balancing academic mission, financial sustainability, and stakeholder politics"
  tags: [higher-education, responsibility-center, academic-budget, institutional, expert]

state: {}

trigger: |
  You're the VP of Finance and Administration at a mid-size
  private university (8,000 students, 1,200 employees,
  $320M operating budget). The president has asked you to
  redesign the budget model because the current incremental
  approach is "rewarding the status quo and starving
  innovation." You need to propose a new Responsibility
  Center Management (RCM) budget model.

  Current financial picture:
  | Revenue Source | Amount | % Total |
  |---------------|--------|---------|
  | Tuition & Fees (net) | $185M | 58% |
  | Endowment Income | $42M | 13% |
  | Research Grants (indirect) | $28M | 9% |
  | Auxiliary Services | $25M | 8% |
  | Annual Giving | $18M | 6% |
  | Other | $22M | 7% |

  | Expense Category | Amount | % Total |
  |-----------------|--------|---------|
  | Compensation | $195M | 61% |
  | Financial Aid (institutional) | $48M | 15% |
  | Facilities | $32M | 10% |
  | Technology | $18M | 6% |
  | Other Operations | $27M | 8% |

  Schools/colleges:
  | School | Enrollment | Tuition Revenue | Cost | Subsidy |
  |--------|-----------|----------------|------|---------|
  | Arts & Sciences | 3,200 | $68M | $82M | -$14M |
  | Business | 1,800 | $52M | $38M | +$14M |
  | Engineering | 1,200 | $38M | $42M | -$4M |
  | Health Sciences | 1,000 | $35M | $28M | +$7M |
  | Education | 500 | $12M | $15M | -$3M |
  | Graduate Studies | 300 | $8M | $12M | -$4M |

  Political dynamics:
  - Business School dean: "We generate $14M surplus — why
    does it subsidize everyone else? Give us our revenue
    and we'll invest in growth."
  - Arts & Sciences dean: "We teach 40% of all credit hours
    including gen-ed requirements. Without us the university
    has no liberal arts identity."
  - Engineering dean: "Our research brings in $18M in grants.
    The indirect cost recovery should stay with us."
  - Education dean: "Our school serves the mission. Not
    everything should be measured by profit."
  - Faculty Senate: "RCM will turn this university into a
    marketplace. Academic decisions will be driven by
    revenue, not educational quality."
  - Board: "We need financial transparency and accountability.
    The current model hides winners and losers."

  President's mandate:
  - "Make cross-subsidies transparent but don't eliminate them"
  - "Incentivize enrollment growth and research productivity"
  - "Protect the liberal arts core — it's our identity"
  - "Create a strategic investment fund for new programs"
  - "Implement over 3 years with no school losing more than
    5% in any single year"

  Task: Design the RCM budget model including revenue
  attribution methodology, cost allocation approach, the
  subvention (subsidy) pool design, the strategic investment
  fund, transition plan, and the political strategy for
  gaining buy-in from deans, faculty, and the board.

assertions:
  - type: llm_judge
    criteria: "Response designs a technically sound RCM model — includes revenue attribution rules (tuition follows students, research indirects allocated by activity, shared revenue pools); cost allocation methodology (direct costs to schools, overhead allocation using reasonable drivers like square footage, FTE, credit hours); creates a subvention pool funded by a tax on revenue to support mission-critical but revenue-negative programs; includes a strategic investment fund for new program development; the model is financially coherent and internally consistent."
    weight: 0.35
    description: "TechnicallySoundRCMModel"
  - type: llm_judge
    criteria: "Response navigates institutional politics — addresses each dean's concerns specifically (Business School's surplus argument, A&S's cross-teaching contribution, Engineering's indirect cost claims, Education's mission argument); responds to Faculty Senate concerns about academic marketplace; designs the subvention pool to protect liberal arts while creating transparency; proposes governance structure for the strategic investment fund; the political strategy would build coalition support rather than create opposition."
    weight: 0.35
    description: "InstitutionalPoliticsNavigation"
  - type: llm_judge
    criteria: "Response includes a realistic transition plan — phases implementation over 3 years with hold-harmless provisions; shows how each school's budget changes year-by-year during transition; addresses the 5% maximum annual change constraint; includes training and communication plan for deans and department chairs; proposes performance metrics that balance financial and academic outcomes; the transition plan acknowledges that budget model changes in higher education are politically perilous and manages risk accordingly."
    weight: 0.30
    description: "RealisticTransitionPlan"
