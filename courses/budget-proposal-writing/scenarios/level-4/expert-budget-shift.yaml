meta:
  id: expert-budget-shift
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Expert budget shift — handle a hostile board takeover attempt affecting the budget, a regulatory-mandated rebudget, and a whistleblower allegation about budget fraud simultaneously"
  tags: [shift-simulation, hostile-takeover, regulatory, fraud-allegation, expert]

state: {}

trigger: |
  You're the CFO of a $350M publicly traded specialty
  chemicals company (1,800 employees). Three crises hit
  your budget process simultaneously in the same week.

  SITUATION 1 — Activist Investor Budget Challenge:
  An activist investor (12% stake) has sent a public letter
  demanding a "comprehensive operational review" and
  threatening a proxy fight. Their demands:
  - "Management's budget shows 4% EBITDA margin improvement
    over 3 years. Our analysis shows 12% is achievable
    through cost restructuring."
  - "The $45M R&D budget is bloated — peer companies spend
    30% less and grow faster."
  - "SG&A at 18% of revenue vs industry median of 14%.
    Explain or cut."
  - "Return $50M to shareholders via buyback within 12
    months."
  - They've published their own "shadow budget" showing
    $80M in potential savings

  Your current budget:
  | Line | Current | Activist Target | Gap |
  |------|---------|----------------|-----|
  | Revenue | $350M | $350M | $0 |
  | EBITDA | $42M (12%) | $84M (24%) | $42M |
  | R&D | $45M | $30M | $15M |
  | SG&A | $63M | $49M | $14M |
  | CapEx | $28M | $18M | $10M |

  SITUATION 2 — EPA Consent Decree Budget Impact:
  The EPA has issued a consent decree requiring $28M in
  environmental remediation at your largest manufacturing
  plant over the next 3 years. This was not in the budget.
  - Year 1 required spend: $12M
  - Ongoing compliance monitoring: $2M/year
  - Potential production disruption: 15% capacity reduction
    for 6 months during remediation
  - Revenue impact of capacity reduction: $18M
  - Additional insurance and legal costs: $3M
  - The plant generates 35% of total revenue

  SITUATION 3 — Internal Budget Fraud Allegation:
  The internal audit team has received a whistleblower
  complaint alleging that the VP of Sales has been pulling
  revenue forward by booking Q1 orders in Q4 ("channel
  stuffing") to meet annual targets. If true:
  - Q4 revenue may be overstated by $8-12M
  - FY actuals used as budget baseline would be inflated
  - Sales incentive payments may need to be clawed back ($1.2M)
  - SEC reporting implications (material misstatement?)
  - Restatement risk affecting stock price and debt covenants
  - The VP of Sales is the CEO's closest ally

  Task: Address all three situations. For the activist, craft
  a budget response that acknowledges legitimate points while
  defending strategic investments. For the EPA decree, create
  the remediation budget and address the revenue impact. For
  the fraud allegation, outline the investigation budget,
  potential financial restatement impact, and the revised
  budget baseline. All three responses must be consistent
  with each other and with your fiduciary duty as CFO.

assertions:
  - type: llm_judge
    criteria: "Response addresses the activist with strategic sophistication — doesn't dismiss all activist points (some may be valid) but pushes back on destructive cuts (R&D reduction would harm long-term competitiveness); proposes a counter-budget that shows meaningful but sustainable margin improvement; addresses the share buyback demand with capital allocation analysis; the response would be credible in a proxy fight — showing shareholders that management has a better plan than the activist's slash-and-burn approach."
    weight: 0.35
    description: "ActivistInvestorResponse"
  - type: llm_judge
    criteria: "Response integrates the EPA consent decree into the budget — quantifies the full financial impact (remediation costs + revenue loss + compliance costs); proposes funding the $12M Year 1 spend without additional debt (or with minimal debt); addresses the production capacity reduction with mitigation plans (shift production, expedite remediation, temporary outsourcing); considers how the EPA situation affects the activist narrative (unbudgeted $28M cost weakens the cost-cutting argument or strengthens the need for reserves)."
    weight: 0.35
    description: "EPAConsentDecreeIntegration"
  - type: llm_judge
    criteria: "Response handles the fraud allegation with appropriate gravity and process — outlines the investigation scope and budget (forensic accounting, external counsel, board audit committee involvement); calculates the financial impact scenarios (best case: $8M overstatement, worst case: $12M + restatement); addresses the SEC implications and CFO's personal liability; navigates the political sensitivity (VP of Sales is CEO's ally) while maintaining fiduciary duty; proposes how to rebuild the budget baseline if revenue was inflated; the response reflects a CFO who understands that integrity trumps politics."
    weight: 0.30
    description: "FraudAllegationHandling"
