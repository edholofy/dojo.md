meta:
  id: healthcare-system-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Healthcare system budget — build the annual operating budget for a multi-hospital health system with complex payer mix and regulatory requirements"
  tags: [healthcare, hospital-budget, payer-mix, regulatory, expert]

state: {}

trigger: |
  You're the SVP of Finance at a 4-hospital health system
  ($2.1B net patient revenue, 12,000 employees). You need
  to build the FY2027 operating budget during a period of
  significant financial pressure — reimbursement rates are
  declining, labor costs are surging, and the system needs
  $180M in capital investment.

  System overview:
  | Facility | Beds | NPR | Margin | Role |
  |----------|------|-----|--------|------|
  | Main Hospital | 450 | $950M | 3.2% | Tertiary, academic |
  | Community Hospital | 180 | $420M | 5.8% | Community care |
  | Children's Hospital | 120 | $380M | 1.5% | Pediatric specialty |
  | Rehabilitation Center | 80 | $180M | 7.2% | Post-acute |
  | Physician Practices | N/A | $170M | -8.5% | 280 employed physicians |

  Payer mix (blended system):
  | Payer | % Revenue | Rate Trend |
  |-------|-----------|-----------|
  | Medicare | 38% | +1.8% (below inflation) |
  | Medicaid | 18% | +0% (state frozen) |
  | Commercial | 32% | +3.5% (in negotiation) |
  | Self-pay/Charity | 8% | N/A |
  | Other Government | 4% | +1.2% |

  Revenue assumptions:
  - Volume growth: 2% inpatient, 5% outpatient, 8% ambulatory
  - Case mix index improvement: 0.02 (from 1.72 to 1.74)
  - Payer rate negotiations: Commercial +3.5%, Medicare per
    CMS update, Medicaid frozen
  - New service lines: Behavioral health ($12M Year 1),
    Home health expansion ($8M)
  - Bad debt provision: 3.5% of gross revenue

  Expense pressures:
  - Nursing wages: +6% (market adjustment to reduce 18%
    vacancy rate)
  - Travel nurses: Currently $45M/year — goal to reduce to
    $20M by hiring permanent staff (but hiring takes 9 months)
  - Supply chain: +4% (GPO contract renegotiation underway)
  - Pharmaceuticals: +8% (biosimilar strategy could save $6M)
  - Insurance premiums: +12% (malpractice)
  - IT/EHR: $28M/year (Epic contract renewal + cybersecurity)
  - Depreciation: $65M (increasing with capital investment)

  Capital budget requirements:
  - Surgical robot replacement: $8M
  - ED expansion (Main Hospital): $45M (3-year project, $15M
    this year)
  - Children's Hospital NICU upgrade: $22M
  - IT infrastructure (cybersecurity mandate): $18M
  - Routine capital (equipment, facilities): $65M
  - Physician practice EMR standardization: $12M
  - New ambulatory surgery center: $10M
  - Total request: $180M — but debt capacity supports $140M

  Board expectations:
  - System operating margin: >3% (currently 2.8%)
  - Days cash on hand: >180 days (currently 165)
  - Debt service coverage ratio: >3.0x (bond covenant)
  - Reduce physician practice losses by 50%
  - Fund capital plan without additional debt issuance

  Task: Build the system operating budget with revenue and
  expense projections by facility, the capital budget with
  prioritization framework, the physician practice
  improvement plan, and the cash flow projection ensuring
  bond covenant compliance. Present the budget to the board
  with the strategic narrative.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive health system budget — projects revenue by payer class with rate assumptions; phases volume growth by service type (inpatient, outpatient, ambulatory); builds expense budget addressing labor (nursing wages, travel nurse reduction), supply chain, pharmacy, and IT; presents the budget by facility with individual and consolidated P&L; the financial projections reflect healthcare-specific complexity (case mix, payer mix, bad debt, charity care)."
    weight: 0.35
    description: "ComprehensiveHealthSystemBudget"
  - type: llm_judge
    criteria: "Response addresses capital prioritization and financial constraints — creates a framework to prioritize $180M in requests against $140M capacity; considers clinical urgency, regulatory requirements, ROI, and strategic alignment; proposes how to fund the gap ($40M shortfall) through operational cash flow, philanthropy, or phasing projects; ensures debt service coverage ratio stays above 3.0x; the capital budget would satisfy both clinical leadership and bond rating agencies."
    weight: 0.35
    description: "CapitalPrioritizationFramework"
  - type: llm_judge
    criteria: "Response addresses physician practice losses and system sustainability — proposes specific actions to reduce the -8.5% margin in physician practices (productivity standards, panel size optimization, revenue cycle improvements, denials management); connects physician practices to downstream hospital revenue (referrals, surgical volumes); addresses the nursing labor strategy (permanent hiring vs travel nurses) with realistic timeline; the budget positions the system for sustainable improvement, not just one-year fixes."
    weight: 0.30
    description: "PracticeImprovementAndSustainability"
