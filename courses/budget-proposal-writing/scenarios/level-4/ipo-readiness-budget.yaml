meta:
  id: ipo-readiness-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "IPO readiness budget — prepare a pre-IPO company's budget that meets public company standards and tells the equity story"
  tags: [ipo, public-company, equity-story, sarbanes-oxley, expert]

state: {}

trigger: |
  You're the CFO of a high-growth SaaS company ($280M ARR,
  growing 35% YoY, 1,600 employees). The board has approved
  filing for an IPO in 12-18 months. You need to create the
  annual budget that will serve as the first "public company
  quality" financial plan — one that can withstand analyst
  scrutiny, establish the cadence for quarterly guidance,
  and tell the equity story through the numbers.

  Company profile:
  - ARR: $280M (NRR: 118%, GRR: 92%)
  - Revenue (recognized): $260M
  - Gross margin: 74%
  - Operating expenses: $245M (S&M: $110M, R&D: $85M, G&A: $50M)
  - Operating income: $15M (5.8% margin)
  - Free cash flow: $22M (8.5% margin)
  - Customers: 2,400 (enterprise: 350, mid-market: 850,
    SMB: 1,200)
  - Rule of 40: 43.5% (35% growth + 8.5% FCF margin)

  IPO readiness requirements for the budget:
  1. SOX 404 compliance: Budget must align with internal
     controls framework (being implemented, $3M cost)
  2. Revenue recognition: ASC 606 compliance across all
     contract types (multi-element arrangements, usage-based,
     professional services)
  3. Non-GAAP reconciliation: Must define and consistently
     apply non-GAAP adjustments (stock-based comp, M&A costs,
     restructuring)
  4. Segment reporting: May need to report by segment (product
     vs professional services, or by customer segment)
  5. Quarterly cadence: Budget must support quarterly guidance
     framework with seasonal patterns
  6. Comparable company benchmarks: Must position favorably
     vs public SaaS peers

  Banker feedback (from IPO bank selection process):
  - "Your growth is strong but margins lag peers. Show a
    credible path to 20% operating margin."
  - "The Rule of 40 is good, but investors will want to see
    it sustained post-IPO."
  - "Your sales efficiency (magic number) has declined 3
    quarters in a row. Address this."
  - "Stock-based comp is 18% of revenue — that's too high.
    Plan to bring it to 12-14%."
  - "You need to demonstrate predictable quarterly revenue
    with manageable variance."

  Internal tensions:
  - CRO wants $130M S&M budget to sustain 35% growth
  - CTO wants $100M R&D to build the AI platform
  - CPO says customer success needs $15M to maintain 118% NRR
  - Combined asks: $295M opex on $350M target revenue = -$10M
    operating loss
  - But: Equity story requires showing improving margins

  Task: Build the IPO-ready annual budget including the GAAP
  and non-GAAP P&L, quarterly phasing, the operating margin
  improvement narrative, SaaS metrics framework, and the
  equity story the numbers need to support. Address each
  banker concern and resolve the internal budget tensions.

assertions:
  - type: llm_judge
    criteria: "Response creates a public-company-quality budget — includes both GAAP and non-GAAP presentations with clear reconciliation; quarterly phasing reflects realistic seasonal patterns (not just annual/4); SaaS metrics framework includes ARR, NRR, GRR, CAC payback, LTV/CAC, magic number, Rule of 40; addresses ASC 606 revenue recognition considerations; the budget format would be recognizable to a public company CFO and would support the quarterly earnings cadence."
    weight: 0.35
    description: "PublicCompanyQualityBudget"
  - type: llm_judge
    criteria: "Response resolves budget tensions while building equity story — balances growth investment (CRO's $130M) against margin improvement (banker's 20% target); addresses declining sales efficiency with specific remediation; plans SBC reduction from 18% to 12-14% of revenue; shows how each OpEx dollar supports the equity narrative; the budget demonstrates a credible path from 5.8% to 15-20% operating margin over 3-4 years while sustaining 25%+ growth; the financial narrative would attract growth-stage public market investors."
    weight: 0.35
    description: "EquityStoryAlignment"
  - type: llm_judge
    criteria: "Response addresses IPO-specific requirements — plans for SOX 404 implementation costs and timeline; handles non-GAAP definition consistency; positions the company favorably against public SaaS benchmarks; establishes a guidance framework that's achievable (building in conservatism without sandbagging); identifies what metrics will matter most in the S-1 filing and roadshow; the budget reflects strategic awareness of how public market investors evaluate SaaS companies."
    weight: 0.30
    description: "IPOSpecificRequirements"
