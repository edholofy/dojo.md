meta:
  id: scenario-planning-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Scenario planning budget — build a multi-scenario budget framework with Monte Carlo analysis and decision triggers for a company facing extreme uncertainty"
  tags: [scenario-planning, monte-carlo, uncertainty, decision-triggers, expert]

state: {}

trigger: |
  You're the CFO of a $200M energy technology company (650
  employees) that sells equipment and software to both oil &
  gas and renewable energy sectors. The industry is at an
  inflection point, and your board has rejected your single-
  scenario budget for next year because "nobody can predict
  what this market will do." They want a multi-scenario
  budget framework.

  Market uncertainty factors:
  1. Oil prices: Could range from $45/bbl to $95/bbl
     (base: $72)
     - Below $55: O&G customers freeze CapEx (40% of revenue)
     - Above $85: O&G spending boom, renewable investment
       slows
  2. IRA (Inflation Reduction Act) implementation:
     - Full implementation: Renewable customers increase
       spending 30%
     - Partial rollback: Spending increase only 10%
     - Full rollback: Renewable spending declines 15%
  3. Interest rates:
     - Current (5.5%): Customer project financing manageable
     - Rising to 7%+: 25% of customer projects become
       uneconomical
     - Declining to 4%: Accelerated customer investment
  4. Technology disruption: Competitor launching AI-powered
     platform in Q3 — could capture 10-15% market share if
     you don't respond

  Current revenue breakdown:
  | Segment | Revenue | Growth | Sensitivity |
  |---------|---------|--------|-------------|
  | O&G Equipment | $80M | -3% | High oil price |
  | O&G Software | $35M | +8% | Moderate oil price |
  | Renewable Equipment | $45M | +22% | High IRA/rates |
  | Renewable Software | $25M | +35% | Moderate IRA |
  | Services | $15M | +5% | Low |

  Cost structure:
  - Fixed costs: $85M (salaries, facilities, R&D base)
  - Variable costs: 45% of equipment revenue, 15% of
    software revenue
  - R&D investment needed: $18-28M depending on competitive
    response
  - Current cash: $45M
  - Debt: $30M revolving credit

  Board's request:
  - "Give me 4 scenarios: base case, bull, bear, and black
    swan"
  - "Show me the probability-weighted expected outcome"
  - "Identify trigger points where we shift from one
    scenario's plan to another"
  - "I want Monte Carlo analysis on the key variables"
  - "The budget should be a decision framework, not just a
    forecast"

  Task: Build the multi-scenario budget framework with 4
  scenarios, probability-weighted financials, Monte Carlo
  sensitivity analysis on the key variables, decision
  triggers that tell management when to shift strategies,
  and the flexible resource allocation plan that adapts to
  conditions. This should be a living decision tool, not a
  static document.

assertions:
  - type: llm_judge
    criteria: "Response creates 4 distinct, internally consistent scenarios — each scenario combines the uncertainty factors (oil prices, IRA, rates, competition) into a coherent narrative with specific financial projections; the scenarios span a wide enough range to be useful (not just ±5% around base case); the bull and bear cases are genuinely different strategies (not just the same plan with different revenue numbers); the black swan scenario is extreme but plausible; each scenario includes revenue, costs, EBITDA, and cash position."
    weight: 0.35
    description: "FourDistinctScenarios"
  - type: llm_judge
    criteria: "Response includes probability-weighted analysis and Monte Carlo framework — assigns probabilities to each scenario (supported by reasoning); calculates the expected value across scenarios; describes a Monte Carlo approach for key variables (oil price, IRA status, interest rates) with sensitivity outputs; identifies which variables have the most impact on the P&L (tornado diagram concept); the quantitative analysis goes beyond simple scenario tables to show the distribution of possible outcomes."
    weight: 0.35
    description: "ProbabilisticAnalysis"
  - type: llm_judge
    criteria: "Response defines actionable decision triggers — specifies exactly what observable conditions (oil price level, IRA status, interest rate movement, competitor launch timing) trigger a shift from one scenario plan to another; identifies which budget decisions are no-regret moves (do them in all scenarios) vs scenario-dependent; proposes a quarterly review cadence with specific metrics that determine resource reallocation; the framework turns the budget from a static plan into a dynamic decision tool that management can actually use when conditions change."
    weight: 0.30
    description: "ActionableDecisionTriggers"
