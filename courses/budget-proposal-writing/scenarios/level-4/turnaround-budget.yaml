meta:
  id: turnaround-budget
  level: 4
  course: budget-proposal-writing
  type: output
  description: "Turnaround budget — create a 100-day turnaround budget for a company in severe financial distress"
  tags: [turnaround, financial-distress, restructuring, cash-management, expert]

state: {}

trigger: |
  You're a turnaround CFO brought in to save a 1,100-person
  retail technology company. The company has been burning
  cash for 18 months, the previous CFO was fired, and the
  board has given you 100 days to produce a viable plan or
  they'll consider selling the company at a distressed
  valuation.

  Financial situation (dire):
  - Revenue: $145M (was $180M two years ago, declining 10%/yr)
  - Gross margin: 52% (was 62% — pricing pressure + cost
    creep)
  - EBITDA: -$18M (burning $1.5M/month)
  - Cash: $12M (at current burn, 8 months of runway)
  - Debt: $40M revolving credit (fully drawn), $25M term
    loan, covenant violations likely in 90 days
  - Accounts receivable: $28M (DSO of 72 days, up from 45)
  - Accounts payable: $22M (stretching vendors — 3 key
    vendors threatening to go COD)
  - Inventory: $15M ($4M estimated obsolete)
  - Lease obligations: $8M/year (6 locations, 2 underutilized)

  Root causes identified in first 2 weeks:
  1. Product portfolio too broad — 140 SKUs, 40% generate
     <2% of revenue each
  2. Sales team selling unprofitable deals to hit revenue
     targets (38% of deals below cost)
  3. Customer concentration: Top 5 customers = 45% of revenue
  4. Technology platform needs $15M rebuild but company can't
     fund it
  5. Overhead grew 30% during growth years and was never
     right-sized
  6. No pricing discipline — 200+ custom price lists
  7. Three product lines are subscale and losing money ($12M
     revenue, -$5M contribution)

  Stakeholder landscape:
  - Bank group (3 banks): Watching closely, want weekly cash
    reporting, may demand paydown
  - Board: Split — 2 members want to sell now, 3 want to try
    turnaround
  - Employees: Morale terrible, 28% voluntary attrition in
    past year, key engineers leaving
  - Customers: Nervous — 3 large customers issued RFPs to
    competitors "just in case"
  - Vendors: 5 key vendors considering credit holds

  Task: Create the 100-day turnaround budget plan in 3
  phases: Stabilize (days 1-30, stop the bleeding),
  Restructure (days 31-70, right-size the business), and
  Relaunch (days 71-100, set growth trajectory). Include
  weekly cash flow projections, specific cost reduction
  actions with P&L impact, revenue stabilization plan,
  and the stakeholder communication strategy. The plan must
  convince the board that the turnaround is viable AND
  convince the banks not to call the loans.

assertions:
  - type: llm_judge
    criteria: "Response creates a phased 100-day plan with credible actions — Phase 1 (Stabilize) focuses on cash preservation, vendor management, and immediate cost cuts; Phase 2 (Restructure) addresses portfolio rationalization, pricing discipline, headcount right-sizing, and facility optimization; Phase 3 (Relaunch) sets the foundation for sustainable growth; each phase has specific, quantified actions with dollar impact; the plan addresses all 7 root causes identified; the timeline is aggressive but realistic for a turnaround."
    weight: 0.35
    description: "PhasedTurnaroundPlan"
  - type: llm_judge
    criteria: "Response includes credible cash flow management — shows weekly 13-week cash flow projection; identifies specific cash generation actions (AR collection, inventory liquidation, AP management); calculates the cash impact of restructuring costs (severance, lease termination); addresses the bank covenant situation with a specific bank communication strategy; shows when the company reaches cash flow breakeven; the cash management plan would give banks confidence to maintain credit facilities."
    weight: 0.35
    description: "CashFlowManagement"
  - type: llm_judge
    criteria: "Response balances cutting with preservation — doesn't just slash everything (that kills the business); identifies which product lines, customers, and capabilities to protect; addresses employee morale and retention of key talent during restructuring; proposes customer retention actions for the 5 largest accounts; the revenue stabilization plan is credible (not 'we'll grow our way out'); includes metrics to track turnaround progress weekly; the plan would convince the 3 pro-turnaround board members while giving the 2 skeptics enough evidence to support it."
    weight: 0.30
    description: "CuttingWithPreservation"
