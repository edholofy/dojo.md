meta:
  id: competitive-displacement-sequences
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Build competitive displacement sequences — design email campaigns that win prospects away from incumbent vendors without being negative or aggressive"
  tags: [sales, competitive, displacement, win-back, incumbent, advanced]

state: {}

trigger: |
  You're a Strategic Account Executive at "NextGen CRM" ($120M ARR).
  You're building competitive displacement sequences targeting
  companies currently using 3 different competitors.

  Target 1: Companies using Salesforce (enterprise incumbent)
  - Why they might leave: High cost ($150-300/user/month), complex
    implementation, requires dedicated admin staff, low user adoption
    (average 40% feature utilization)
  - Your advantage: 60% lower TCO, no admin needed, 90%+ adoption
    rate, built-in AI that Salesforce charges extra for
  - Their lock-in: Data migration fear, existing integrations,
    internal Salesforce expertise, sunk cost of implementation
  - Target persona: VP of Sales Ops frustrated with complexity

  Target 2: Companies using HubSpot (mid-market favorite)
  - Why they might leave: Outgrowing HubSpot's capabilities, hitting
    API limits, need enterprise features (advanced reporting, custom
    objects, territory management)
  - Your advantage: Enterprise capabilities with HubSpot simplicity,
    seamless migration tool, superior reporting
  - Their lock-in: Low cost, marketing hub integration, familiarity
  - Target persona: RevOps leader scaling from 50 to 150+ reps

  Target 3: Companies using spreadsheets/no CRM (early stage)
  - Why they might switch: Growing team, losing deals due to no
    pipeline visibility, investor/board pressure to professionalize
  - Your advantage: Fast setup (1 day), free tier to start, grows
    with them
  - Their lock-in: Simplicity, cost ($0), fear of change
  - Target persona: VP of Sales at a Series A/B startup

  Tasks:
  1. Design the 5-email displacement sequence for the Salesforce
     target. Each email should address a different pain point
     (cost, complexity, adoption, admin overhead, AI gap) without
     naming Salesforce. Write all 5 subject lines and the full
     copy for emails 1 and 3.

  2. For the HubSpot target, the key message is "you've outgrown
     your current tool." Write the 3-email "graduation" sequence
     that positions switching as a natural growth step, not a
     criticism of their current choice. Full copy for all 3.

  3. For the no-CRM target, the challenge is overcoming inertia.
     Write the sequence that creates urgency around their current
     situation without fear-mongering. Use the "growing team" and
     "investor expectation" angles.

  4. Create the "Competitive Displacement Ethics Guide" — the rules
     your team follows to compete aggressively but fairly. What
     can you say about competitors? What can't you say? When does
     competitive positioning cross the line?

assertions:
  - type: llm_judge
    criteria: "Salesforce sequence addresses real pain without naming — each email targets a genuine Salesforce frustration (cost, complexity, adoption, admin, AI pricing) using language the prospect would use, without mentioning Salesforce by name"
    weight: 0.25
    description: "Unnamed competitive targeting"
  - type: llm_judge
    criteria: "HubSpot graduation sequence is respectful — positions the switch as positive growth rather than criticism, acknowledges HubSpot's value at earlier stage, and frames NextGen CRM as the next step"
    weight: 0.25
    description: "Respectful graduation sequence"
  - type: llm_judge
    criteria: "No-CRM sequence creates healthy urgency — motivates action through growth opportunity and professional standards rather than fear, using investor expectations and team scaling as natural triggers"
    weight: 0.25
    description: "Healthy urgency creation"
  - type: llm_judge
    criteria: "Ethics guide draws clear lines — distinguishes between legitimate competitive selling (comparing capabilities, sharing customer outcomes) and unethical tactics (spreading FUD, making false claims, disparaging), with specific examples"
    weight: 0.25
    description: "Clear ethical boundaries"
