meta:
  id: account-based-sequences
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Build account-based email sequences — coordinate multi-threaded outreach across personas within target accounts with orchestrated messaging"
  tags: [sales, ABM, account-based, multi-threading, orchestration, advanced]

state: {}

trigger: |
  You're the ABM Campaign Manager at "EnterpriseSuite" ($200M ARR,
  enterprise platform). Your ABM program targets 50 named accounts.
  You need to build the email sequence architecture for 3 key
  accounts that are in different stages.

  Account 1: "TechCorp" — $500K target deal, NO prior engagement
  - 5 target personas identified:
    a) CTO (decision maker) — technical, data-driven, MIT alumnus
    b) VP of Engineering (influencer) — recently promoted, building team
    c) Director of IT (evaluator) — manages current vendor relationship
    d) Head of Security (blocker) — known to reject vendors on security
    e) CFO (budget holder) — recently announced cost-cutting initiative
  - Competitive situation: Deep in Oracle ecosystem, you're the disruptor
  - Available intel: TechCorp just posted 15 engineering job postings,
    their VP of Engineering posted about "modernizing our tech stack"

  Account 2: "FinanceFirst" — $300K target, STALLED engagement
  - VP of Data (your champion) went through a demo 3 months ago but
    has gone silent
  - You had brief email exchanges with the CTO (positive but noncommittal)
  - Their Q2 earnings showed 12% revenue decline — possible budget freeze
  - You need to re-engage the champion and expand to other stakeholders

  Account 3: "HealthPlus" — $400K target, ACTIVE evaluation
  - You're one of 3 vendors in a formal evaluation (competitors:
    ServiceNow and Salesforce)
  - Active contacts: CIO (champion), VP of Clinical Systems (evaluator)
  - Missing: CFO (haven't reached), CISO (critical but no contact)
  - Evaluation timeline: Decision in 6 weeks
  - Your advantage: superior healthcare-specific features
  - Your weakness: brand recognition vs. ServiceNow and Salesforce

  Tasks:
  1. Design the multi-threaded sequence plan for TechCorp (no prior
     engagement). What order do you contact the 5 personas? How do
     you coordinate messaging so each person gets a role-specific
     angle but the account story is consistent? Map the 30-day plan.

  2. Write the re-engagement strategy for FinanceFirst. How do you
     address the earnings decline without being insensitive? Design
     the sequence that re-activates the champion AND expands to new
     stakeholders simultaneously.

  3. For HealthPlus (active evaluation), design the "competitive
     acceleration" sequence. You have 6 weeks. Build the email
     cadence that reaches the CFO and CISO while reinforcing
     relationships with CIO and VP of Clinical Systems. How do
     you differentiate against ServiceNow and Salesforce?

  4. Create the "ABM Sequence Orchestration Rules" — the principles
     that ensure multi-threaded sequences don't backfire (e.g.,
     contacting too many people at once triggers a "are you
     spamming our whole company?" response).

assertions:
  - type: llm_judge
    criteria: "TechCorp threading is strategically ordered — contacts personas in a logical sequence (not all at once), uses the VP of Engineering's LinkedIn post as entry point, and coordinates messaging so each persona gets a unique but consistent narrative"
    weight: 0.25
    description: "Strategic threading order"
  - type: llm_judge
    criteria: "FinanceFirst re-engagement is sensitive — addresses the earnings decline context without being exploitative, provides value relevant to cost-cutting, and balances champion re-activation with new-stakeholder outreach"
    weight: 0.25
    description: "Sensitive re-engagement"
  - type: llm_judge
    criteria: "HealthPlus acceleration leverages healthcare advantage — differentiates against ServiceNow/Salesforce on healthcare-specific capabilities, reaches CFO and CISO through warm introductions or contextual outreach"
    weight: 0.25
    description: "Healthcare-advantage acceleration"
  - type: llm_judge
    criteria: "Orchestration rules prevent multi-threading backfire — includes timing gaps between persona contacts, total-account awareness, escalation awareness, and guidelines for when to throttle vs. accelerate"
    weight: 0.25
    description: "Backfire-preventing orchestration"
