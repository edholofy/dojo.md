meta:
  id: nurture-vs-sales-sequences
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Distinguish and design nurture sequences vs. sales sequences — build long-term relationship cadences for prospects not ready to buy and conversion cadences for active buyers"
  tags: [sales, nurture, long-term, relationship, conversion, advanced]

state: {}

trigger: |
  You're the Director of Demand Generation at "ContentStack" ($110M
  ARR, content management platform). Your funnel has a problem:
  marketing generates 5,000 MQLs per month, but sales only accepts
  1,200 as SQLs (24% acceptance rate). The other 3,800 MQLs get
  "recycled" back to marketing — but there's no nurture program.
  They just disappear.

  Your VP of Marketing says: "Those 3,800 rejected MQLs are future
  pipeline. 15% of them will be ready to buy within 12 months. Build
  the system that nurtures them until they're ready."

  Data on recycled MQLs (last 12 months):
  - Total recycled: 45,600 MQLs
  - Of those, 6,840 (15%) eventually became SQLs on their own
    (re-entered through website, event, or called back)
  - Average time from recycled to SQL-ready: 4.5 months
  - Top recycled segments:
    a) "Not ready yet" (40%): Right company, right role, but timing
       is wrong. Budget in 6 months, contract renewal in 9 months, etc.
    b) "Wrong contact" (25%): Interested individual but not decision
       maker. Needs to be multi-threaded to power.
    c) "Need more education" (20%): Interested but doesn't understand
       the problem well enough yet. Needs thought leadership.
    d) "Competitive evaluation" (15%): Currently in a contract with
       a competitor. Won't be free for 3-18 months.

  Available content assets:
  - 40 blog posts (industry-specific)
  - 12 case studies (by industry and use case)
  - 6 webinars (quarterly, live and on-demand)
  - 3 eBooks / whitepapers
  - 1 annual industry report
  - Monthly product update newsletter

  Tasks:
  1. Design the nurture sequence architecture for each of the 4
     recycled segments. How long is each sequence? What content
     flows? What triggers promote a nurture prospect back to an
     SQL? How do the 4 sequences differ in timing, content, and
     conversion signals?

  2. Write the first 3 emails for the "Not ready yet" segment
     nurture sequence. These prospects are interested but timing
     is wrong. How do you stay top of mind without being annoying
     over a 6-month period?

  3. Design the "Competitor contract" nurture strategy. These
     prospects are locked in with a competitor for 3-18 months.
     What's the slow-drip campaign that positions you as the
     alternative when their contract expires? Write the email that
     goes out 60 days before their estimated renewal date.

  4. Build the scoring model that determines when a nurture prospect
     is ready to be promoted to sales. What behavioral signals
     (content consumption, website visits, email engagement) and
     firmographic triggers (job changes, funding, growth) combine
     into a "ready to buy" score?

assertions:
  - type: llm_judge
    criteria: "Four segment sequences are genuinely different — 'not ready' gets long-interval timing-based nurture, 'wrong contact' gets multi-threading strategies, 'need education' gets thought leadership, 'competitive' gets slow positioning"
    weight: 0.25
    description: "Segment-differentiated nurture"
  - type: llm_judge
    criteria: "Not-ready emails maintain relationship without pressure — spaced appropriately over 6 months, provide value through content and insights, and include soft signals checking for timing changes without asking 'ready yet?'"
    weight: 0.25
    description: "Pressure-free timing nurture"
  - type: llm_judge
    criteria: "Competitor contract strategy is patient and strategic — slow-drip positions ContentStack as the alternative through case studies and comparison content, with the pre-renewal email arriving with perfect timing"
    weight: 0.25
    description: "Patient competitive strategy"
  - type: llm_judge
    criteria: "Scoring model combines behavioral and firmographic signals — includes engagement velocity, content depth, website recency, and external triggers with clear thresholds that prevent premature promotion and false negatives"
    weight: 0.25
    description: "Multi-signal scoring model"
