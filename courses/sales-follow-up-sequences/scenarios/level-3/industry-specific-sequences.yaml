meta:
  id: industry-specific-sequences
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Adapt follow-up sequences for specific industries — adjust tone, timing, compliance, and content for healthcare, financial services, government, and technology buyers"
  tags: [sales, industry-specific, healthcare, finance, government, advanced]

state: {}

trigger: |
  You're the Sales Enablement Director at "UnifiedPlatform" ($150M
  ARR, horizontal SaaS selling across 5 industries). Your SDR team
  uses a single follow-up sequence for all prospects, but conversion
  rates vary dramatically by industry:

  Industry performance (same sequence, same rep quality):
  - Technology: 6.2% reply rate, 2.1% meeting rate
  - Financial Services: 3.1% reply rate, 0.8% meeting rate
  - Healthcare: 2.8% reply rate, 0.6% meeting rate
  - Government: 1.9% reply rate, 0.4% meeting rate
  - Manufacturing: 4.5% reply rate, 1.4% meeting rate

  Current generic sequence (5 emails, 18 days):
  - Email 1: Intro + value prop
  - Email 2: Case study (tech company example)
  - Email 3: ROI calculator link
  - Email 4: "Checking in"
  - Email 5: Break-up email

  Industry-specific challenges:
  - Financial Services: Regulated, compliance-conscious, slow
    procurement, trust is everything, won't click unknown links
  - Healthcare: HIPAA awareness, clinical vs. admin buyers speak
    different languages, budget cycles tied to fiscal year (varies
    by org), extremely risk-averse
  - Government: Long procurement cycles, must use SAM.gov language,
    different contracting vehicles (GSA, GWACs), can't accept
    certain gifts/incentives, ethical rules about vendor contact

  Tasks:
  1. Redesign the follow-up sequence for Financial Services. What
     changes? Adjust: timing, tone, content, compliance language,
     case studies, and CTAs. Write the full 5-email sequence with
     subject lines and body copy.

  2. Redesign for Healthcare. Two versions: one targeting clinical
     buyers (doctors, nurses, clinical directors) and one targeting
     administrative buyers (CIO, VP of IT, CFO). How do the
     sequences differ? Write Email 1 for each version.

  3. Redesign for Government. What are the unique rules for
     government outreach? How do procurement cycles affect timing?
     Write the sequence that respects government buying norms while
     still creating urgency. Include the compliance considerations.

  4. Create the "Industry Adaptation Matrix" — for each of the 5
     industries, define: preferred email length, optimal cadence,
     required compliance language, best case study types, CTAs that
     work, and CTAs to avoid.

assertions:
  - type: llm_judge
    criteria: "Financial services sequence builds trust — uses formal tone, compliance-aware language, doesn't include external links in early emails, references financial industry case studies, and allows longer response windows"
    weight: 0.25
    description: "Trust-building finance sequence"
  - type: llm_judge
    criteria: "Healthcare dual sequences are genuinely different — clinical buyer emails use patient outcome language while admin buyer emails use efficiency/ROI language, with different CTAs appropriate to each audience"
    weight: 0.25
    description: "Audience-split healthcare sequences"
  - type: llm_judge
    criteria: "Government sequence respects procurement norms — references contracting vehicles, uses appropriate government language, accounts for longer cycles, and includes compliance considerations for vendor contact rules"
    weight: 0.25
    description: "Procurement-aware government sequence"
  - type: llm_judge
    criteria: "Adaptation matrix provides actionable differences — each of the 5 industries has meaningfully different recommendations for length, cadence, compliance, content, and CTAs, not just cosmetic changes"
    weight: 0.25
    description: "Meaningfully different adaptations"
