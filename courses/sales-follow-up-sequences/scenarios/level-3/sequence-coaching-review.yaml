meta:
  id: sequence-coaching-review
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Coach and review SDR email sequences — identify patterns in underperforming sequences, provide constructive feedback, and design improvement plans"
  tags: [sales, coaching, review, feedback, SDR-management, advanced]

state: {}

trigger: |
  You're the SDR Team Lead at "PipelinePro" ($75M ARR). You manage
  12 SDRs and are conducting quarterly sequence reviews. Three reps
  need coaching — each has a different performance pattern.

  Rep 1: Alex — High activity, low conversion
  - Sends 80 emails/day (team average: 50)
  - Open rate: 38% (above average)
  - Reply rate: 1.8% (team average: 4.2%)
  - Meetings booked: 6/month (target: 10)
  - Pattern: His emails are clearly templated with minimal
    personalization. Every email starts with "I hope this email
    finds you well" and ends with "Let me know if you'd like to
    chat." No phone calls, no LinkedIn.

  Sample Alex email:
  "Hi [Name], I hope this email finds you well. I'm reaching out
  because PipelinePro helps companies like yours increase pipeline
  visibility and forecast accuracy. We've helped over 500 companies
  improve their win rates by an average of 23%. I'd love to show
  you how we can do the same for [Company]. Would you be open to
  a quick 15-minute call this week? Best, Alex"

  Rep 2: Jordan — Low activity, high conversion
  - Sends 25 emails/day (half the team average)
  - Open rate: 45% (well above average)
  - Reply rate: 8.1% (nearly 2x team average)
  - Meetings booked: 8/month (close to target but below)
  - Pattern: Extremely personalized emails, spends 15 minutes per
    email researching the prospect. Refuses to use templates.
    "Templates feel inauthentic."

  Rep 3: Taylor — Inconsistent performer
  - Some weeks: 15 meetings booked (top performer)
  - Other weeks: 2 meetings (bottom performer)
  - Open rate: 34%, Reply rate: 3.8%
  - Pattern: Performance correlates with pipeline health. When
    pipeline is full, Taylor stops prospecting. When pipeline
    empties, they panic-send 100+ emails in a day (low quality).
  - Taylor's "panic" emails are aggressive: "Last chance to hear
    about our offer" after just 1 previous email

  Tasks:
  1. For each rep, write the coaching plan. Diagnose the root cause
     of their underperformance (not just the symptom). What
     specific changes do you recommend? What metrics do you track
     for improvement? How do you frame the feedback constructively?

  2. Rewrite Alex's sample email to show him what good looks like.
     Then create the "Personalization Framework" — the minimum
     personalization Alex should add to every email that takes less
     than 2 minutes (so it scales with his high-volume approach).

  3. Help Jordan scale without sacrificing quality. Design the
     "80/20 Personalization System" — the template framework that
     provides 80% of the structure while leaving 20% for Jordan's
     personalization, enabling 50+ emails/day without feeling
     inauthentic.

  4. Design the "Prospecting Rhythm" for Taylor that prevents the
     boom-bust cycle. How do you create consistent daily habits
     that keep pipeline flowing regardless of current deal status?

assertions:
  - type: llm_judge
    criteria: "Coaching plans diagnose root causes — Alex's problem is personalization not volume, Jordan's is efficiency not quality, Taylor's is discipline not skill, with specific improvement plans for each"
    weight: 0.25
    description: "Root-cause coaching"
  - type: llm_judge
    criteria: "Alex's rewrite and framework are practical — the rewrite demonstrates clear improvement, and the personalization framework adds meaningful customization in under 2 minutes per email with specific techniques"
    weight: 0.25
    description: "Practical personalization framework"
  - type: llm_judge
    criteria: "Jordan's 80/20 system respects quality — preserves Jordan's personalization instinct while providing template structure that doubles output, with clear guidance on which parts to personalize and which to standardize"
    weight: 0.25
    description: "Quality-preserving scaling"
  - type: llm_judge
    criteria: "Taylor's rhythm prevents boom-bust — creates daily minimums for prospecting activity regardless of pipeline status, with mechanisms to enforce consistency (time-blocking, activity minimums, accountability)"
    weight: 0.25
    description: "Boom-bust preventing rhythm"
