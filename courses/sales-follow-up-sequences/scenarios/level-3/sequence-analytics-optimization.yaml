meta:
  id: sequence-analytics-optimization
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Use advanced analytics to optimize email sequences — build predictive models, identify sequence bottlenecks, and design data-driven improvements"
  tags: [sales, analytics, optimization, predictive, data-driven, advanced]

state: {}

trigger: |
  You're the Director of Revenue Operations at "SequenceMax" ($100M
  ARR, 80 AEs, 30 SDRs). You have 6 months of sequence data from
  Outreach.io and your CRO wants you to find the "hidden patterns
  that are costing us meetings."

  Data available (6 months, 45,000 emails across 8,000 sequences):

  Sequence-level performance:
  - Cold outbound: 3.8% reply rate, 0.9% meeting rate
  - Post-event: 8.2% reply rate, 3.1% meeting rate
  - Post-demo: 22% reply rate, 12% meeting rate
  - Re-engagement: 5.4% reply rate, 1.8% meeting rate
  - Trial nurture: 11% reply rate, 4.2% meeting rate

  Step-level data (cold outbound, 5-step sequence):
  - Step 1 (Day 0): 38% open, 2.1% reply
  - Step 2 (Day 3): 31% open, 1.4% reply
  - Step 3 (Day 7): 28% open, 0.8% reply
  - Step 4 (Day 12): 24% open, 0.4% reply
  - Step 5 (Day 18): 21% open, 0.3% reply

  Anomalies found:
  1. Emails sent between 8-9am have 42% higher open rates than the
     team average, but the same reply rate
  2. Sequences with a phone call between emails 2 and 3 have 2.4x
     higher reply rates on email 3
  3. Emails with 1 question have 31% higher reply rates than emails
     with 0 or 3+ questions
  4. Prospects who open email 1 but don't reply, then DON'T open
     email 2, but DO open email 3 convert at 2x the rate of
     consistent openers (the "skip-open" pattern)
  5. SDRs who personalize the first line have 68% higher reply rates,
     but only 22% of emails have personalized first lines
  6. Thursday emails have 15% lower reply rates than Tuesday emails
     across all sequences

  Tasks:
  1. Analyze the 6 anomalies. For each, explain what's likely causing
     the pattern and recommend the specific operational change. Which
     anomalies have the highest revenue impact if fixed?

  2. The "skip-open" pattern (anomaly #4) is counterintuitive. Design
     the investigation to understand why prospects who skip email 2
     but open email 3 convert at 2x. What hypotheses would you test?
     How would you design the experiment?

  3. Build the "Sequence Health Score" — an automated metric that
     evaluates any sequence's performance using the patterns you've
     found. What are the 8 factors in the score? How are they
     weighted? What thresholds trigger a "redesign this sequence"
     alert?

  4. Create the 3-month optimization roadmap. In priority order, what
     changes do you implement? For each: the change, expected impact,
     implementation effort, and how you'll measure success.

assertions:
  - type: llm_judge
    criteria: "Anomaly analysis identifies root causes — explains each pattern beyond surface level (e.g., 8-9am opens are mobile/commute reads with low intent; phone-before-email-3 creates multi-touch reciprocity) with specific operational recommendations"
    weight: 0.25
    description: "Root-cause anomaly analysis"
  - type: llm_judge
    criteria: "Skip-open investigation is hypothesis-driven — proposes multiple plausible explanations (curiosity gap, subject line change, timing coincidence with buying signal) and designs experiments to validate each"
    weight: 0.25
    description: "Hypothesis-driven investigation"
  - type: llm_judge
    criteria: "Health score is comprehensive and weighted — includes relevant factors (reply rate by step, drop-off rate, personalization rate, timing, channel mix) with weights reflecting actual impact on conversion"
    weight: 0.25
    description: "Comprehensive health scoring"
  - type: llm_judge
    criteria: "Roadmap prioritizes highest-impact changes — starts with personalization adoption (68% higher reply rates) and phone integration (2.4x improvement) before lower-impact optimizations like send-time adjustment"
    weight: 0.25
    description: "Impact-prioritized roadmap"
