meta:
  id: advanced-sequence-shift
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Apply advanced sequence skills in a combined scenario — optimize an entire team's sequence strategy across multiple deal stages, channels, and buyer types"
  tags: [sales, follow-up, shift-simulation, optimization, advanced]

state: {}

trigger: |
  You're the newly hired Head of Sales Development at "RapidScale"
  ($70M ARR, 25 SDRs, 35 AEs). The CRO gives you 60 days to
  "transform our outreach operation." Here's what you inherit:

  Current performance:
  - SDR team meeting quota attainment: 62% (target: 85%)
  - Average meetings booked per SDR: 7/month (target: 12)
  - Reply rate across all sequences: 3.1%
  - Meeting show rate: 68% (32% no-shows)
  - SQL acceptance rate: 55% (AEs reject 45% of meetings as
    unqualified)
  - Total pipeline generated by SDR team: $2.1M/month (target: $4M)

  Root cause analysis (your first 2 weeks):
  1. Sequences are stale — the 3 core sequences haven't been updated
     in 14 months
  2. No personalization — 92% of emails are pure template
  3. Single channel — 96% of touchpoints are email, virtually no
     phone or LinkedIn usage
  4. No targeting — SDRs work alphabetical lists, not prioritized
     by intent or fit
  5. Meeting quality — SDRs book meetings to hit quota without
     qualifying
  6. No-show problem — confirmation emails are generic, no pre-
     meeting value
  7. No coaching — SDRs get pipeline reviewed but not sequence/email
     quality reviewed
  8. Tool underutilization — Outreach and Sales Navigator are both
     underused

  Budget: You can hire 2 additional people (SDR or Ops) and have
  $30K for tools/training.

  Tasks:
  1. Design the 60-day transformation plan. Week by week: what do
     you change, in what order, and what's the expected impact of
     each change? Prioritize ruthlessly — you can't fix everything
     at once.

  2. Redesign the 3 core sequences (cold outbound, inbound follow-up,
     post-demo follow-up) from scratch. For each: step count,
     channels per step, timing, personalization requirements, and
     exit criteria. Write the first email for each.

  3. Solve the meeting quality problem. Create the "Qualification
     Gate" — the criteria an SDR must verify before booking a
     meeting. Design the confirmation sequence that reduces no-shows
     from 32% to under 15%.

  4. Build the coaching program. Design the weekly sequence review
     cadence, the scoring rubric for email quality, and the
     feedback framework that improves the bottom 50% of SDRs
     without demoralizing them.

assertions:
  - type: llm_judge
    criteria: "60-day plan is prioritized by impact — addresses highest-leverage changes first (sequence redesign, personalization, qualification gate) before lower-impact changes (tool training, coaching cadence)"
    weight: 0.25
    description: "Impact-prioritized transformation"
  - type: llm_judge
    criteria: "Three redesigned sequences are modern and multi-channel — each includes email, LinkedIn, and phone touchpoints with personalization requirements at each step and clear exit criteria"
    weight: 0.25
    description: "Modern multi-channel redesign"
  - type: llm_judge
    criteria: "Qualification gate reduces bad meetings — defines specific criteria (budget, authority, need, timeline or similar) that SDRs verify before booking, and the confirmation sequence provides value that reduces no-shows"
    weight: 0.25
    description: "Quality-improving qualification"
  - type: llm_judge
    criteria: "Coaching program is constructive — includes specific quality rubric, peer examples of good/bad emails, improvement tracking, and a positive framework that builds skills rather than punishing underperformance"
    weight: 0.25
    description: "Constructive coaching program"
