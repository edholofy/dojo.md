meta:
  id: deal-acceleration-sequences
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Design deal acceleration sequences — use targeted follow-ups to compress sales cycles, overcome stalls, and create urgency in active opportunities"
  tags: [sales, deal-acceleration, urgency, pipeline, velocity, advanced]

state: {}

trigger: |
  You're a Senior Account Executive at "VelocitySaaS" ($95M ARR).
  Your pipeline review reveals 8 deals stuck in various stages.
  Your VP of Sales says: "I need $500K to close this quarter. You
  have $1.2M in pipeline but half of it is stalled. Accelerate or
  disqualify."

  Stalled deals:

  Deal A: "AlphaFinance" — $180K ACV, in evaluation for 45 days
  - Stall reason: Committee can't agree. CTO wants you, VP of
    Finance wants the cheaper option (Airtable), CEO hasn't weighed in
  - Your champion: CTO
  - Last activity: Technical evaluation passed 2 weeks ago

  Deal B: "BetaRetail" — $95K ACV, proposal sent 18 days ago
  - Stall reason: Procurement is slow-rolling. Your champion says
    "it's just process, they'll get to it"
  - Your champion: VP of Digital
  - Last activity: Champion confirmed "internally approved" but
    procurement hasn't engaged

  Deal C: "GammaHealth" — $220K ACV, in legal review for 30 days
  - Stall reason: Their legal team has 23 redlines on your contract.
    Your legal has responded to 15, but the remaining 8 are "hard
    issues" (liability, indemnification, data handling)
  - Your champion: CIO
  - Last activity: Legal teams exchanged redlines 10 days ago

  Deal D: "DeltaTech" — $150K ACV, demo completed 22 days ago
  - Stall reason: Champion went on medical leave, no one else is
    driving the evaluation internally
  - Original champion: Director of Engineering (on leave)
  - Other contacts: Junior engineer who attended the demo, CTO
    (brief introduction only)
  - Last activity: Demo follow-up email unanswered

  Tasks:
  1. For each deal (A-D), diagnose the true stall reason (it's not
     always what the champion tells you). Design the 2-week
     acceleration sequence — the specific emails, calls, and actions
     that will either unstick the deal or reveal it's dead.

  2. For Deal A (committee disagreement), write the "consensus-
     building" email sequence. Write 3 emails: one to the CTO
     (activating your champion), one to the VP of Finance (addressing
     the price concern), and one that the CTO can forward to the
     CEO to bring them into the conversation.

  3. For Deal D (champion on leave), write the outreach to the CTO
     that re-establishes momentum without being insensitive about
     the champion's medical leave. How do you pick up the thread
     with someone who has minimal context?

  4. Create the "Deal Stall Diagnostic" — a framework that helps AEs
     identify the type of stall (political, procedural, budget,
     champion, competitive, timing) and prescribes the acceleration
     tactic for each type.

assertions:
  - type: llm_judge
    criteria: "Stall diagnoses go deeper than surface — identifies that champion says 'just process' but procurement stall may signal deprioritization, committee disagreement may mask budget concern, and champion absence may require deal restart"
    weight: 0.25
    description: "Deep stall diagnosis"
  - type: llm_judge
    criteria: "Consensus-building emails are role-appropriate — CTO email activates champion with urgency, VP Finance email addresses cost concern with value framing, CEO-forwarded email is concise and strategic"
    weight: 0.25
    description: "Role-appropriate consensus emails"
  - type: llm_judge
    criteria: "Champion-absence outreach is tactful — reaches CTO without insensitivity about medical leave, provides enough context for CTO to engage, and offers to make the transition easy"
    weight: 0.25
    description: "Tactful champion-absence outreach"
  - type: llm_judge
    criteria: "Stall diagnostic is systematic — categorizes stall types with clear symptoms for each, and prescribes specific acceleration tactics (not generic 'follow up more') for political, procedural, budget, champion, competitive, and timing stalls"
    weight: 0.25
    description: "Systematic stall diagnostic"
