meta:
  id: executive-follow-up-strategy
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Design follow-up strategies for C-level executives — shorter cadences, peer-level engagement, executive-to-executive introductions, and board-level messaging"
  tags: [sales, executive, C-level, peer-selling, strategy, advanced]

state: {}

trigger: |
  You're the VP of Enterprise Sales at "StrategyCloud" ($180M ARR,
  strategic planning platform). Your team is working 3 enterprise
  deals where executive engagement is critical, but your reps are
  struggling to get responses from C-suite executives.

  Deal 1: "MegaCorp" — $450K ACV
  - Target: CEO (Janet Walsh, former McKinsey partner)
  - Current status: Your AE has sent 4 emails to the CEO. No
    response. The AE's emails are 200+ words and pitch product
    features.
  - Your CEO is willing to do a peer-to-peer outreach
  - You know Janet Walsh spoke at a strategy conference last month
    about "agility in uncertain markets"

  Deal 2: "GovAgency" — $600K ACV (federal contract)
  - Target: Deputy Secretary (political appointee, non-technical)
  - Current status: Your champion (CTO) says "I can't get budget
    approval without the Deputy Secretary's endorsement"
  - The Deputy Secretary cares about: constituent outcomes, cost
    savings to taxpayers, bipartisan appeal, press-worthy results
  - You cannot email them directly (must go through their chief
    of staff)
  - Your company has a case study from a similar federal agency

  Deal 3: "GlobalRetail" — $350K ACV
  - Target: CMO (brand-obsessed, former P&G marketing VP)
  - Current status: CMO attended your webinar, asked a question
    about "strategic planning for brand portfolio management"
  - Your AE sent a generic follow-up (CMO didn't respond)
  - Intelligence: The CMO is launching 3 new brands next year and
    publicly complained at a conference about "planning chaos"
  - Your product has a brand portfolio module that directly solves
    this

  Tasks:
  1. For Deal 1: Write the CEO-to-CEO email that your CEO sends to
     Janet Walsh. Keep it under 60 words. Reference her conference
     talk naturally. Then write the AE follow-up that rides the CEO
     introduction.

  2. For Deal 2: Design the pathway to the Deputy Secretary through
     the chief of staff. Write the email to the chief of staff that
     frames your platform in terms the Deputy Secretary cares about
     (outcomes, not technology). Include the federal case study
     reference.

  3. For Deal 3: Write the "perfect" follow-up to the CMO that your
     AE should have sent instead of the generic one. Reference her
     webinar question, her public comments about planning chaos,
     and the brand portfolio module — all in under 80 words.

  4. Create the "Executive Engagement Playbook" — the rules for
     engaging C-level executives. Cover: email length guidelines,
     when to use CEO-to-CEO outreach, how to leverage executive
     assistants and chiefs of staff, and the 5 biggest mistakes
     reps make when emailing executives.

assertions:
  - type: llm_judge
    criteria: "CEO-to-CEO email is peer-appropriate — under 60 words, references the conference talk naturally, reads as one executive to another (not salesy), and the AE follow-up leverages the introduction without being presumptuous"
    weight: 0.25
    description: "Peer-appropriate CEO email"
  - type: llm_judge
    criteria: "Chief of staff pathway is politically savvy — frames the platform in outcomes language (constituent impact, taxpayer savings), respects the chain of communication, and positions the case study as proof of similar success"
    weight: 0.25
    description: "Politically savvy government pathway"
  - type: llm_judge
    criteria: "CMO follow-up is hyper-specific — references the exact webinar question, connects to her public statements about planning chaos, and positions the brand portfolio module as the direct answer, all concisely"
    weight: 0.25
    description: "Hyper-specific CMO follow-up"
  - type: llm_judge
    criteria: "Executive playbook identifies real mistakes — covers brevity requirements, peer-level engagement rules, gatekeeper strategy, and common errors (too long, too feature-focused, too frequent, wrong tone, ignoring EA)"
    weight: 0.25
    description: "Real-mistake executive playbook"
