meta:
  id: multi-channel-orchestration
  level: 3
  course: sales-follow-up-sequences
  type: output
  description: "Orchestrate multi-channel follow-up sequences — coordinate email, LinkedIn, phone, video, and direct mail into cohesive buyer experiences"
  tags: [sales, multi-channel, orchestration, LinkedIn, phone, video, advanced]

state: {}

trigger: |
  You're the Head of Sales Development at "OmniReach" ($85M ARR,
  40 SDRs). Your team's email-only sequences are plateauing at 3.5%
  reply rate. You've been tasked with building a true multi-channel
  outreach program.

  Current state:
  - 40 SDRs sending 500 emails/day total
  - LinkedIn: Sporadic, no structured approach
  - Phone: 10% of SDRs make calls regularly, rest avoid it
  - Video: Not used at all
  - Direct mail: Never tried
  - Reply rate: 3.5% (email only)
  - Meeting rate: 0.8% of total outreach

  Available channels and tools:
  1. Email: Outreach.io (fully set up)
  2. LinkedIn: Sales Navigator (all SDRs have it, few use it)
  3. Phone: Dialpad with parallel dialer (most SDRs undertrained)
  4. Video: Loom (company license, unused)
  5. Direct mail: Sendoso (approved for $50/package for top targets)

  Channel performance benchmarks (from pilot program, 500 prospects):
  - Email only: 3.5% reply rate
  - Email + LinkedIn: 5.8% reply rate
  - Email + LinkedIn + Phone: 8.2% reply rate
  - Email + LinkedIn + Phone + Video: 11.4% reply rate
  - (Direct mail data not yet available)

  SDR concerns:
  - "I don't have time for all these channels"
  - "Phone calls are terrifying — I'll get yelled at"
  - "Video feels weird and too personal for cold outreach"
  - "How do I decide which channel to use when?"

  Tasks:
  1. Design the "Channel Selection Framework" — a decision tree that
     helps SDRs choose the right channel at the right time based
     on: deal value, prospect seniority, engagement signals, and
     sequence position. Create the visual decision framework.

  2. Build the 21-day multi-channel sequence template that integrates
     all 5 channels. Map each of the 12 touchpoints with: day,
     channel, purpose, time investment, and how it connects to the
     previous touchpoint. Show the "story" across channels.

  3. Address each SDR concern with practical solutions. For the
     phone-averse SDRs: design the 30-day phone comfort program
     that builds confidence gradually. For video skeptics: write
     the 60-second video script template that feels natural.

  4. Build the direct mail strategy for your top 50 target accounts.
     What do you send ($50 budget per package)? When in the sequence
     does it arrive? What's the email that references the package
     before and after it arrives? How do you measure ROI?

assertions:
  - type: llm_judge
    criteria: "Channel selection framework is practical and usable — provides clear decision criteria (deal value thresholds, seniority levels, engagement signals) that SDRs can follow quickly, not a complex matrix they'll ignore"
    weight: 0.25
    description: "Practical channel selection"
  - type: llm_judge
    criteria: "21-day sequence tells a coherent cross-channel story — touchpoints reference and build on previous ones (email mentions call attempt, LinkedIn message adds value beyond email, video personalizes after engagement)"
    weight: 0.25
    description: "Coherent cross-channel story"
  - type: llm_judge
    criteria: "SDR concerns are addressed practically — phone program builds confidence gradually (listen to calls → roleplay → easy calls → full outreach), video template removes friction with a fill-in-the-blank script"
    weight: 0.25
    description: "Practical concern solutions"
  - type: llm_judge
    criteria: "Direct mail strategy has clear ROI framework — specifies what to send (relevant, not gimmicky), timing relative to sequence, follow-up emails that reference the package, and measurement approach for the $50/package investment"
    weight: 0.25
    description: "ROI-framed direct mail"
