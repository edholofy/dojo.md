meta:
  id: no-response-handling
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Handle the silence — write follow-up emails when prospects go dark after initial interest, without being desperate or annoying"
  tags: [sales, follow-up, no-response, ghosting, persistence, beginner]

state: {}

trigger: |
  You're an SDR at "TaskFlow" (workflow automation SaaS, $20M ARR).
  You have 4 prospects who have gone silent at different stages. Your
  manager wants you to write the "nudge" emails for each.

  Prospect 1: Maria (Marketing Director at an agency)
  - Had a great discovery call 8 days ago
  - Said she'd send calendar availability for a demo within 2 days
  - You've sent 1 follow-up 5 days ago (no response)
  - She opened your follow-up email twice but didn't reply

  Prospect 2: James (VP of Operations at a manufacturing company)
  - Attended your webinar 2 weeks ago and asked a question in the
    Q&A chat
  - You sent a personalized follow-up the next day (no response)
  - You sent a second follow-up 5 days later (no response)
  - No email opens recorded

  Prospect 3: Priya (Head of Product at a SaaS company)
  - Completed a free trial signup 10 days ago
  - Logged into the trial once, created 1 workflow, hasn't returned
  - You sent a "getting started" email (opened, no reply)
  - You sent a "need help?" email 3 days later (not opened)

  Prospect 4: Carlos (CEO at a 50-person consulting firm)
  - You had coffee with him at a networking event
  - He said "definitely send me info, this sounds perfect for us"
  - You sent a follow-up email 6 days ago (opened, no reply)
  - You connected on LinkedIn (he accepted)

  Tasks:
  1. Write the next follow-up email for each prospect. Each email
     should use a different approach (don't just repeat "checking
     in" 4 times). Consider: what value can you add? What new angle
     can you try? What makes each situation unique?

  2. For Prospect 2 (James, no opens), your approach needs to
     change. If he's not opening emails, what do you try differently?
     Propose 3 alternative approaches beyond email.

  3. Write the "break-up email" for each prospect — the final
     message you'd send if none of your follow-ups work. The goal
     is to leave the door open without being needy.

assertions:
  - type: llm_judge
    criteria: "Four follow-ups use different approaches — each email tries a unique angle (new value, different question, trigger event, social proof) rather than variations of 'just checking in'"
    weight: 0.35
    description: "Varied follow-up approaches"
  - type: llm_judge
    criteria: "James alternatives go beyond email — proposes multi-channel approaches (LinkedIn message, phone call, video message, mutual connection intro) that address the fact that his emails aren't being opened"
    weight: 0.30
    description: "Multi-channel alternatives"
  - type: llm_judge
    criteria: "Break-up emails leave doors open — each final message is gracious, makes it easy for the prospect to re-engage later, and avoids guilt-tripping or desperation while maintaining professional dignity"
    weight: 0.35
    description: "Gracious break-up emails"
