meta:
  id: email-tone-mistakes
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Avoid common tone mistakes in follow-up emails — fix desperation, over-formality, aggression, and passive-aggressive language"
  tags: [sales, email, tone, writing, mistakes, beginner]

state: {}

trigger: |
  You're a Sales Development Rep at "AppStream" (app development
  platform, $28M ARR). Your team lead is running a "Tone Clinic"
  where she shows real follow-up emails (anonymized) that demonstrate
  common tone problems. Fix each one.

  Email 1 — The Desperate Rep:
  "Hi John, I've reached out a few times now and haven't heard back.
  I really hope I haven't done anything to offend you! I know you're
  busy but I'd truly appreciate even just 5 minutes of your time.
  This would mean a lot to me and my team. Please, if there's
  anything I can do differently, just let me know. I'm here whenever
  you're ready!"

  Email 2 — The Corporate Robot:
  "Dear Ms. Thompson, I am writing to follow up on our previous
  correspondence regarding the enterprise software evaluation
  currently underway at your organization. Per our discussion, I
  would like to reiterate the value proposition of our platform
  vis-a-vis your stated requirements. Please do not hesitate to
  contact me at your earliest convenience to schedule a subsequent
  meeting to discuss next steps."

  Email 3 — The Guilt Tripper:
  "Hi Sarah, I've sent you 3 emails and a voicemail over the past
  2 weeks with no response. I've invested significant time preparing
  a custom demo for your team and a detailed proposal addressing
  your specific needs. I'm sure you understand the effort involved.
  If you've decided to go in a different direction, the professional
  thing to do would be to let me know. I'll be waiting to hear from
  you."

  Email 4 — The Over-Familiar Rep:
  "Hey bro! 🔥 So pumped about our chat last week!! Your company is
  KILLING IT and I just KNOW we'd be an epic fit. Let's crush this
  together!! Hit me up when you wanna jam on next steps. LFG! 🚀🚀"

  Email 5 — The Feature Dumper:
  "Hi Alex, Just wanted to follow up and mention that we also offer
  advanced CI/CD pipeline integration, containerized deployment,
  multi-region failover, automated security scanning, real-time
  performance monitoring, API gateway management, serverless function
  support, and custom webhook configurations. Let me know if any of
  these interest you!"

  Tasks:
  1. For each email (1-5), diagnose the tone problem in one sentence,
     then rewrite the email with the correct professional tone.
     Keep each rewrite under 75 words.

  2. Write the "Tone Spectrum" guide — where does professional sales
     email tone fall on the spectrum from casual to formal? What's
     the ideal voice for B2B follow-ups? Include 3 example sentences
     at different tone levels and identify the sweet spot.

  3. Your team lead asks: "Does tone need to change based on who
     you're emailing?" Write guidelines for adjusting tone when
     emailing: a C-level executive, a technical buyer, a peer-level
     contact, and a startup founder. Keep differences subtle but
     meaningful.

assertions:
  - type: llm_judge
    criteria: "Diagnoses are accurate and rewrites fix the core issue — desperate email becomes confident, corporate becomes conversational, guilt trip becomes gracious, over-familiar becomes professional, feature dump becomes focused"
    weight: 0.40
    description: "Accurate diagnosis and fix"
  - type: llm_judge
    criteria: "Tone spectrum identifies the sweet spot — places ideal B2B email tone between overly casual and overly formal, shows examples at different levels, and explains why the middle ground builds trust"
    weight: 0.30
    description: "Clear tone spectrum"
  - type: llm_judge
    criteria: "Audience-specific tone adjustments are subtle — doesn't overhaul the entire email for different recipients but makes meaningful adjustments (more concise for C-level, more technical for engineers, more casual for startup founders)"
    weight: 0.30
    description: "Subtle audience adjustments"
