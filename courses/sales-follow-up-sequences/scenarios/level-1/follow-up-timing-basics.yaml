meta:
  id: follow-up-timing-basics
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Understand follow-up timing — when to send the first follow-up, how long to wait between touches, and when to stop following up"
  tags: [sales, follow-up, timing, cadence, beginner]

state: {}

trigger: |
  You're a new Business Development Rep at "MetricsPro" (analytics
  SaaS, $25M ARR). Your manager gives you 5 scenarios and asks you
  to create the follow-up timing plan for each.

  Scenario A: Cold outreach — you sent a prospecting email to a VP
  of Marketing at a mid-size e-commerce company. No response after
  3 business days.

  Scenario B: Post-demo — you gave a great demo to the Head of
  Engineering at a SaaS startup. She said "this looks promising,
  let me discuss with my team." That was 2 business days ago.

  Scenario C: Proposal sent — you sent a $30K annual proposal to
  the COO of a logistics company. He opened it (you can see in
  PandaDoc) but hasn't responded. It's been 4 business days.

  Scenario D: Conference connection — you had a 10-minute
  conversation at a trade show booth with the Director of IT at a
  healthcare company. She gave you her card and said "send me some
  info." The conference ended yesterday.

  Scenario E: Ghosted after verbal commitment — the CFO at a
  manufacturing company said "we're moving forward, send the
  contract." You sent it 7 business days ago. He hasn't signed
  or responded to 2 follow-ups.

  Tasks:
  1. For each scenario (A through E), design the follow-up sequence:
     when to send the first follow-up, how many follow-ups total,
     the spacing between each, and when to stop. Explain your
     reasoning for the timing of each.

  2. Your manager asks: "What's the difference between persistent
     and annoying?" Write the guidelines that help you decide when
     follow-up is helpful to the prospect vs. when it's pushy.

  3. Write the actual follow-up emails for Scenario C (proposal
     sent, opened but no response). Write follow-up #1 (day 4),
     follow-up #2 (your timing), and the "break-up email" (final
     follow-up).

assertions:
  - type: llm_judge
    criteria: "Timing plans are differentiated by scenario — cold outreach gets more frequent/persistent follow-up than post-demo or post-proposal, and the ghosted-after-commitment scenario gets the most urgent timing"
    weight: 0.30
    description: "Scenario-differentiated timing"
  - type: llm_judge
    criteria: "Persistent vs. annoying guidelines are practical — includes criteria like adding value in each touch, varying the channel/message, reading engagement signals, and knowing when silence is the answer"
    weight: 0.30
    description: "Practical persistence guidelines"
  - type: llm_judge
    criteria: "Proposal follow-up emails escalate appropriately — first email is light and curious, second adds value or urgency, break-up email gives the prospect an easy way to say no without burning the relationship"
    weight: 0.40
    description: "Escalating proposal follow-ups"
