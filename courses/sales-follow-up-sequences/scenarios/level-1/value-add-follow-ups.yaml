meta:
  id: value-add-follow-ups
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Write follow-up emails that add value instead of just 'checking in' — share relevant content, insights, and resources that keep the conversation moving"
  tags: [sales, follow-up, value-add, content, beginner]

state: {}

trigger: |
  You're an SDR at "SecurityFirst" (cybersecurity SaaS, $45M ARR).
  Your manager has banned the phrases "just checking in," "following
  up," "touching base," and "circling back" from all follow-up emails.

  She says: "Every email must give the prospect a reason to reply
  that has nothing to do with you wanting a meeting."

  You have 4 prospects who need follow-ups. For each, you have access
  to relevant resources and information.

  Prospect A: Chris, CTO at a fintech startup (200 employees)
  - Discovery call was 5 days ago, he said "interesting, but we
    have bigger fires right now"
  - During the call he mentioned they had a minor data breach last
    quarter
  - Available: Your company just published a "State of Fintech
    Security" report with data on breach costs by company size

  Prospect B: Dana, VP of IT at a healthcare chain (15 locations)
  - Demo was 8 days ago, she's evaluating your tool and a competitor
  - She asked about HIPAA compliance during the demo
  - Available: A case study from a similar-sized healthcare chain
    that achieved HIPAA compliance using your platform in 6 weeks

  Prospect C: Miguel, Head of Engineering at an e-commerce company
  - Signed up for a free trial 4 days ago but hasn't logged in
  - His LinkedIn shows he recently posted about struggling with
    API security
  - Available: A technical blog post your team wrote about "5 API
    Security Patterns Every E-Commerce Team Needs"

  Prospect D: Kim, Director of Operations at a manufacturing company
  - Met at a conference 2 weeks ago, she requested a follow-up
  - First follow-up (general product overview) got no response
  - Available: An industry report showing that 67% of manufacturing
    companies experienced a ransomware attempt in the past year

  Tasks:
  1. Write the value-add follow-up email for each prospect. Each
     email should lead with the value (resource, insight, data) and
     make the meeting request secondary or implicit.

  2. Explain why each resource you chose is the right match for that
     prospect. What's the connection between their situation and the
     content you're sharing?

  3. Your manager asks: "What if you don't have a perfect resource
     to share?" Write 5 types of value-add content that work when
     you don't have an exact-match resource (e.g., industry news,
     benchmark data, competitor analysis, etc.).

assertions:
  - type: llm_judge
    criteria: "Emails lead with value — each email opens with the resource or insight, connects it to the prospect's specific situation, and makes the sales ask secondary or naturally flowing from the value provided"
    weight: 0.35
    description: "Value-leading emails"
  - type: llm_judge
    criteria: "Resource matching is thoughtful — explains why each resource connects to the prospect's stated pain, situation, or interest rather than just being generically relevant to their industry"
    weight: 0.30
    description: "Thoughtful resource matching"
  - type: llm_judge
    criteria: "Five no-resource alternatives are practical — provides creative value-add options (industry data, competitive insight, relevant news, benchmarks, peer examples) that any rep can use without having a perfect content match"
    weight: 0.35
    description: "Practical no-resource alternatives"
