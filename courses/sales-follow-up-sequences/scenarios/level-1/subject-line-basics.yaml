meta:
  id: subject-line-basics
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Write effective follow-up email subject lines that get opened — avoid spam triggers, create curiosity, and reference previous conversations"
  tags: [sales, email, subject-lines, open-rates, beginner]

state: {}

trigger: |
  You're an Account Executive at "SalesBoost" (sales enablement
  platform, $35M ARR). Your manager is reviewing your follow-up
  emails and notices your open rates are well below team average
  (your 22% vs. team 41%).

  She pulls up your last 8 follow-up email subject lines:
  1. "Following up"
  2. "Checking in on our conversation"
  3. "SalesBoost — Next Steps"
  4. "Quick question about your sales process"
  5. "RE: SalesBoost Demo Request" (this was NOT a reply to an
     existing thread — you faked the RE:)
  6. "Don't miss out on 40% higher win rates!!!"
  7. "Following up (2)"
  8. "Touching base"

  Your manager says: "Half of these would make me hit delete
  instantly. Let me show you what works."

  Context for each original email:
  1. Follow-up after discovery call with a VP of Sales at a fintech
  2. Follow-up after demo with a Sales Director at a SaaS company
  3. Proposal follow-up to a CRO at a mid-market company
  4. Cold outreach follow-up to a VP of Sales Ops (no prior contact)
  5. Second follow-up to someone who downloaded a whitepaper
  6. Re-engagement email to a prospect who went dark 3 months ago
  7. Third follow-up after proposal, no response to first two
  8. Quarterly check-in with a prospect who said "not now" 90 days ago

  Tasks:
  1. For each of the 8 subject lines, explain what's wrong with it
     and write an improved version. Reference the specific context
     for each email to make the subject line relevant.

  2. Write the "Subject Line Principles" guide — the 5 rules every
     follow-up subject line should follow. Include examples of
     good and bad subject lines for each principle.

  3. Your manager asks: "Is it ever OK to fake a 'RE:' in a subject
     line?" Write the honest answer, including why it might work
     short-term but hurts long-term, and what to do instead.

assertions:
  - type: llm_judge
    criteria: "Improved subject lines are specific and contextual — each references something from the prior interaction or the prospect's situation rather than generic 'following up' or 'checking in' language"
    weight: 0.35
    description: "Contextual subject lines"
  - type: llm_judge
    criteria: "Principles are practical and memorable — covers specificity, curiosity, relevance, brevity, and authenticity with clear good/bad examples for each principle"
    weight: 0.35
    description: "Practical subject line principles"
  - type: llm_judge
    criteria: "Fake RE: answer is honest — explains it's deceptive, erodes trust, may violate CAN-SPAM in spirit, and offers legitimate alternatives that achieve similar open rates without dishonesty"
    weight: 0.30
    description: "Honest fake-RE assessment"
