meta:
  id: email-body-structure
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Structure follow-up email bodies for clarity and action — learn the opening hook, value bridge, and clear CTA framework"
  tags: [sales, email, structure, CTA, writing, beginner]

state: {}

trigger: |
  You're a Sales Development Rep at "FormStack" (form and workflow
  automation SaaS, $50M ARR). Your team lead is coaching you on email
  body structure. She shows you 3 follow-up emails you sent last week
  and asks you to improve them.

  Email 1 (post-demo follow-up, too long — 312 words):
  "Hi Jennifer, Thank you so much for taking the time to meet with
  me yesterday. It was really great to learn about your company and
  the challenges you're facing with your current form processes. As
  we discussed, FormStack can help streamline your entire workflow
  from form creation to data processing to approval routing. Our
  platform supports over 100 integrations including Salesforce,
  HubSpot, and Slack which I know you mentioned using. We also have
  advanced conditional logic that can reduce form completion time by
  up to 40%. Additionally, our new AI feature can auto-generate
  forms from a text description. Many of our customers in the
  healthcare space like yours have seen significant improvements...
  [continues for 3 more paragraphs]... Let me know your thoughts."

  Email 2 (proposal follow-up, too vague — 28 words):
  "Hi Tom, Just wanted to check in on the proposal I sent over last
  week. Happy to answer any questions. Looking forward to hearing
  from you!"

  Email 3 (cold follow-up, all about you — 156 words):
  "Hi Rachel, I'm reaching out again because FormStack is the
  leading workflow automation platform trusted by over 25,000
  organizations. We recently won the G2 Best Software award and were
  named a Leader in Gartner's Magic Quadrant. Our customers see an
  average 3.2x ROI within the first year. I'd love to show you how
  FormStack can transform your operations..."

  Tasks:
  1. Rewrite all 3 emails using the "Hook-Value-CTA" framework:
     Hook (1-2 sentences connecting to their context), Value (1-2
     sentences on what's relevant to THEM), CTA (1 clear, specific
     ask). Keep each under 100 words.

  2. Write the "Email Body Checklist" — the 7 things to verify
     before hitting send on any follow-up email. Include examples
     of what passes and fails each check.

  3. Your manager says: "The best follow-up emails could only have
     been written for this one person." Take Email 3 (cold follow-up
     to Rachel) and show 3 versions: generic (what you wrote),
     semi-personalized, and deeply personalized. Explain what
     research you'd need for each level.

assertions:
  - type: llm_judge
    criteria: "Rewrites follow Hook-Value-CTA structure — each email opens with a context-specific hook, delivers value relevant to the recipient, and ends with one clear, specific call to action, all under 100 words"
    weight: 0.35
    description: "Hook-Value-CTA rewrites"
  - type: llm_judge
    criteria: "Checklist is practical — includes checks for length, personalization, single CTA, buyer-centric language, mobile readability, and specific next step, with pass/fail examples"
    weight: 0.30
    description: "Practical send checklist"
  - type: llm_judge
    criteria: "Three personalization levels are clearly different — generic uses no prospect info, semi-personalized uses publicly available data, deeply personalized references specific business challenges, and the research requirements for each level are realistic"
    weight: 0.35
    description: "Three personalization levels"
