meta:
  id: call-to-action-basics
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Write clear, specific calls to action in follow-up emails — avoid vague asks and make it easy for prospects to take the next step"
  tags: [sales, email, CTA, next-steps, beginner]

state: {}

trigger: |
  You're a Business Development Rep at "ScheduleRight" (appointment
  scheduling SaaS, $15M ARR). Your manager is auditing CTAs across
  the team's follow-up emails and finds that yours are consistently
  too vague.

  Here are 6 CTAs from your recent emails, each paired with the
  context:

  1. Context: Post-demo, prospect seemed interested
     CTA: "Let me know if you'd like to discuss further."

  2. Context: Proposal sent 4 days ago, no response
     CTA: "Looking forward to hearing your thoughts."

  3. Context: Cold outreach follow-up, prospect opened your email
     CTA: "Would love to chat when you have time."

  4. Context: Post-discovery, need to schedule a demo
     CTA: "Feel free to book time on my calendar if interested."
     (includes Calendly link)

  5. Context: Trial ending in 3 days, prospect has been active
     CTA: "Let me know if you have any questions about upgrading."

  6. Context: Re-engagement after 90 days of silence
     CTA: "Just wanted to see if anything has changed on your end."

  Your manager says: "A good CTA has 3 qualities: it's specific
  (the prospect knows exactly what you're asking), it's low-friction
  (easy to say yes), and it has a time element (creates urgency
  without being pushy)."

  Tasks:
  1. Rewrite each of the 6 CTAs to be specific, low-friction, and
     time-aware. Explain what's wrong with each original and how
     your rewrite improves it.

  2. Write the "CTA Framework" — a guide with 5 CTA templates that
     work for different stages of the sales process (cold outreach,
     post-meeting, post-proposal, trial, re-engagement). Each
     template should have 2-3 variations.

  3. Your manager asks: "Should every email have only ONE CTA, or
     can you give options?" Write the answer with examples of when
     a single CTA works best vs. when offering 2 options is better.

assertions:
  - type: llm_judge
    criteria: "Rewrites are specific and actionable — each improved CTA tells the prospect exactly what to do (e.g., 'Reply with a yes/no' or 'Does Thursday at 2pm work?') rather than leaving the next step ambiguous"
    weight: 0.35
    description: "Specific actionable CTAs"
  - type: llm_judge
    criteria: "CTA framework covers the sales cycle — provides templates for cold, post-meeting, post-proposal, trial, and re-engagement stages, each with multiple variations that are genuinely different approaches"
    weight: 0.30
    description: "Stage-covering CTA framework"
  - type: llm_judge
    criteria: "Single vs. dual CTA guidance is nuanced — explains when one CTA reduces friction and when two options increase response rate, with specific examples of each scenario"
    weight: 0.35
    description: "Nuanced CTA count guidance"
