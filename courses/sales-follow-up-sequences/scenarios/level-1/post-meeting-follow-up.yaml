meta:
  id: post-meeting-follow-up
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Write effective post-meeting follow-up emails that recap key discussion points, confirm next steps, and maintain momentum after discovery or demo calls"
  tags: [sales, follow-up, post-meeting, recap, beginner]

state: {}

trigger: |
  You're a Sales Development Representative at "CloudSync" (project
  management SaaS, $40M ARR). You just completed a 30-minute
  discovery call with "DesignWorks" (creative agency, 45 employees).

  Call notes:
  - Attendees: Sarah Chen (Operations Manager), Marcus Rivera
    (Creative Director)
  - Current situation: Using spreadsheets and Slack to manage
    projects, losing track of deadlines, client complaints about
    missed deliverables
  - Pain points: No visibility into team workload (people are
    overloaded but managers don't know), no time tracking (can't
    bill clients accurately), status updates require manual
    check-ins every morning
  - Interest level: Sarah is enthusiastic, Marcus is skeptical
    ("we tried Asana and hated it")
  - Budget: Haven't discussed yet, Sarah said she needs to involve
    their CEO for anything over $500/month
  - Next step agreed: 45-minute demo next Tuesday at 2pm with Sarah,
    Marcus, and their CEO (Jordan Park)
  - Sarah mentioned they're evaluating Monday.com as well
  - Marcus specifically asked if your tool handles creative asset
    management (your answer: not natively, but integrates with
    Dropbox and Figma)

  Tasks:
  1. Write the post-meeting follow-up email to Sarah. Include: a
     brief recap of what you discussed, confirmation of the demo
     meeting, and 1-2 resources that address their specific pain
     points (don't just send generic marketing materials).

  2. Write a separate, shorter email to Marcus that acknowledges
     his concern about Asana and addresses the creative asset
     management question with more detail.

  3. What's wrong with this follow-up email a junior rep drafted?
     "Hi Sarah, Great chatting today! As discussed, I'm attaching
     our product overview deck and pricing sheet. Looking forward
     to the demo next week. Let me know if you have any questions!
     Best, Rep"
     Identify 5 specific problems and rewrite it.

assertions:
  - type: llm_judge
    criteria: "Sarah's email recaps specific pain points from the call (deadline visibility, workload tracking, time tracking) rather than generic product talking points, confirms the demo details, and includes relevant resources tied to their stated challenges"
    weight: 0.30
    description: "Pain-point-specific recap"
  - type: llm_judge
    criteria: "Marcus's email acknowledges his skepticism personally, addresses the creative asset management question with specific integration details, and doesn't feel like a copy-paste of Sarah's email"
    weight: 0.30
    description: "Skepticism-acknowledging email"
  - type: llm_judge
    criteria: "Critique identifies real problems with the draft (too generic, no recap of their pain points, sending pricing too early, no personalization, weak CTA) and the rewrite demonstrates each fix"
    weight: 0.40
    description: "Specific draft critique"
