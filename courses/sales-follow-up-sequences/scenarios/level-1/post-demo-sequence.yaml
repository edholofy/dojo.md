meta:
  id: post-demo-sequence
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Build a complete post-demo follow-up sequence — from same-day recap through decision timeline, handling silence and objections along the way"
  tags: [sales, follow-up, post-demo, sequence, beginner]

state: {}

trigger: |
  You're an Account Executive at "DataVault" (data backup and
  recovery SaaS, $30M ARR). You just gave a 45-minute demo to
  "FastShip" (e-commerce fulfillment company, 120 employees).

  Demo attendees and their reactions:
  - Lisa Park, IT Director (your main contact): Very engaged, asked
    12 questions, said "this solves our biggest pain point" about
    the automated backup scheduling feature
  - Derek Santos, CTO: Joined 15 minutes late, asked tough questions
    about encryption standards and data sovereignty, left saying
    "I need to review the security documentation"
  - Amy Liu, Finance Manager: Focused entirely on pricing, asked
    about payment terms and multi-year discounts, seemed concerned
    about the annual commitment

  Key moments from the demo:
  - Lisa's "aha moment": When you showed the one-click recovery
    feature that restored a test environment in 4 minutes (their
    current process takes 6-8 hours)
  - Derek's concern: Asked if data can be stored exclusively in US
    data centers (answer: yes, with Enterprise plan)
  - Amy's question: "What happens if we outgrow the 50TB tier?" You
    explained the scaling pricing but she seemed unsatisfied

  Agreed next step: Lisa said "Let me sync with Derek and Amy and
  get back to you by end of week." No specific meeting scheduled.

  Tasks:
  1. Write the same-day follow-up email (sent within 2 hours of the
     demo). It goes to all 3 attendees. Include the demo recap, but
     tailor the key points to resonate with all three perspectives.

  2. Derek didn't get his security question fully answered. Write a
     separate email to Derek (CC Lisa) that addresses his encryption
     and data sovereignty concerns with specific detail. Attach
     context about what documentation you'd include.

  3. Design the complete 3-week follow-up sequence assuming Lisa
     doesn't respond by end of week. Map out each email: timing,
     recipient, subject, key message, and CTA. Include at least 5
     touchpoints and a break-up email.

  4. Amy's pricing concern needs attention. Write the email that
     addresses the scaling pricing question without giving away
     unnecessary discounts. How do you handle the cost concern
     while reinforcing value?

assertions:
  - type: llm_judge
    criteria: "Same-day email addresses all 3 perspectives — recaps Lisa's aha moment, acknowledges Derek's security question with a promise to follow up, and references Amy's pricing interest without overwhelming any single reader"
    weight: 0.25
    description: "Three-perspective same-day email"
  - type: llm_judge
    criteria: "Derek's security email is technically credible — addresses encryption standards and data sovereignty with specific details, includes relevant documentation references, and positions the Enterprise plan naturally"
    weight: 0.25
    description: "Credible security follow-up"
  - type: llm_judge
    criteria: "3-week sequence escalates appropriately — starts with value-add content, varies the approach across touchpoints, includes different channels or angles, and the break-up email gives an easy exit without burning the relationship"
    weight: 0.25
    description: "Appropriately escalating sequence"
  - type: llm_judge
    criteria: "Pricing email reinforces value before addressing cost — reframes the scaling question around growth (positive framing), addresses Amy's concern directly, and avoids premature discounting"
    weight: 0.25
    description: "Value-first pricing email"
