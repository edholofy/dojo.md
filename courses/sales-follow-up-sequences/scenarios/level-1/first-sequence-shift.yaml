meta:
  id: first-sequence-shift
  level: 1
  course: sales-follow-up-sequences
  type: output
  description: "Apply all foundational follow-up skills in a combined scenario — build a complete multi-touch sequence from scratch for a real deal situation"
  tags: [sales, follow-up, shift-simulation, comprehensive, beginner]

state: {}

trigger: |
  You're a new Account Executive at "InsightCRM" (CRM platform for
  mid-market companies, $55M ARR). You've been handed a warm lead
  and need to build the entire follow-up sequence from first contact
  through close or disqualification.

  Lead information:
  - Rachel Nguyen, Director of Sales Operations at "GrowthCo"
    (B2B SaaS, 150 employees, $20M ARR, growing 40% year-over-year)
  - Source: Inbound — Rachel downloaded your "CRM Migration Guide"
    from your website 2 days ago
  - LinkedIn profile shows: 3 years at GrowthCo, previously at
    HubSpot, posts about sales ops challenges regularly
  - Recent LinkedIn post: "Our team just hit 25 AEs and our current
    CRM (Pipedrive) is showing its limits. Time to evaluate options."
  - GrowthCo's website shows they recently raised a $15M Series B
  - Your research found they use: Pipedrive, Outreach.io, Gong,
    Slack, Google Workspace

  Your tools: InsightCRM email (with tracking), LinkedIn (Sales
  Navigator), phone system (with voicemail)

  Tasks:
  1. Write the initial outreach email (Email 1) that references her
     content download and LinkedIn activity without being creepy.
     Goal: book a 20-minute discovery call.

  2. Design the complete 14-day follow-up sequence. Map each
     touchpoint: day, channel (email/LinkedIn/phone), subject line
     or message type, key message, and CTA. Include at least 7
     touchpoints across multiple channels.

  3. Write the actual email copy for touchpoints 2, 4, and 6 in
     your sequence. Each should use a different approach (value-add,
     social proof, curiosity, direct ask, etc.).

  4. Write the voicemail script for the phone touchpoint in your
     sequence. Keep it under 30 seconds and make it compelling
     enough that Rachel calls back or at least opens your next email.

assertions:
  - type: llm_judge
    criteria: "Initial email is personalized without being invasive — references the CRM Migration Guide download and her public LinkedIn post naturally, connects to GrowthCo's growth stage, and requests a specific, low-commitment next step"
    weight: 0.25
    description: "Personalized initial outreach"
  - type: llm_judge
    criteria: "14-day sequence is multi-channel and varied — includes email, LinkedIn, and phone touchpoints with different messages at each, increasing urgency progressively without repeating the same ask"
    weight: 0.25
    description: "Multi-channel varied sequence"
  - type: llm_judge
    criteria: "Three email copies use genuinely different approaches — each of the 3 emails (touchpoints 2, 4, 6) takes a distinct angle (value-add, social proof, direct ask, etc.) rather than variations of the same message"
    weight: 0.25
    description: "Distinct email approaches"
  - type: llm_judge
    criteria: "Voicemail is concise and compelling — under 30 seconds, references something specific to Rachel's situation, includes a clear reason to respond, and doesn't just repeat the email content"
    weight: 0.25
    description: "Compelling voicemail script"
