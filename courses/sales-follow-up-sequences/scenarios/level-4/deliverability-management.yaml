meta:
  id: deliverability-management
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Manage email deliverability at scale — handle domain reputation, authentication, warming, bounce management, and spam filter avoidance across a large sales organization"
  tags: [sales, deliverability, domain-reputation, SPF, DKIM, expert]

state: {}

trigger: |
  You're the Director of Sales Technology at "OutboundMax" ($160M
  ARR, 150 reps). Your deliverability has cratered over the past
  quarter, and it's destroying your pipeline.

  Crisis metrics:
  - Open rate dropped from 38% to 19% in 3 months
  - Bounce rate spiked from 2% to 8%
  - 3 of your 5 sending domains are on blacklists (Spamhaus, SORBS)
  - Google Workspace prospects: 22% delivery rate (was 45%)
  - Microsoft 365 prospects: 31% delivery rate (was 52%)
  - Average sequence completion rate: 40% (emails never reach inbox)
  - Pipeline generated by outbound: down 55% quarter-over-quarter

  Root cause investigation findings:
  1. Domain authentication: SPF configured but DKIM and DMARC
     incomplete on 2 of 5 domains
  2. Sending volume: Reps ramped from 40 to 100 emails/day overnight
     when new territories were assigned (no warming)
  3. List quality: 12% of prospect emails are invalid (no
     verification before sequencing)
  4. Content issues: 15 reps are using spam-trigger words in subject
     lines ("FREE," "ACT NOW," "GUARANTEED")
  5. Complaint rate: 0.4% (above Google's 0.3% threshold)
  6. Unsubscribe link: Only present in 60% of outbound emails
  7. Shared sending infrastructure: All 150 reps send from 5 domains
     (30 reps per domain, no isolation)

  Budget: $50K available for immediate fixes, $100K/year for ongoing
  management

  Tasks:
  1. Create the 30-day deliverability recovery plan. Prioritize the
     7 root causes by severity and urgency. What do you fix in week
     1 (emergency), week 2-3 (critical), and week 4 (foundation)?
     Include the expected improvement timeline.

  2. Design the domain and infrastructure architecture. How many
     domains do you need for 150 reps? How do you isolate rep
     reputation? What's the warming protocol for new domains?
     Include the technical setup: SPF, DKIM, DMARC configuration.

  3. Build the ongoing deliverability monitoring system. What 10
     metrics do you track daily? What thresholds trigger alerts?
     What's the escalation procedure when a domain gets blacklisted?
     Design the dashboard.

  4. Create the "Email Hygiene Policy" for all 150 reps. Cover:
     daily sending limits, list verification requirements, content
     guidelines (banned words/phrases), unsubscribe requirements,
     and consequences for policy violations. Make it enforceable.

assertions:
  - type: llm_judge
    criteria: "30-day plan addresses severity correctly — fixes authentication and blacklist issues in week 1 (emergency), sending limits and list quality in weeks 2-3, and content guidelines and monitoring in week 4"
    weight: 0.25
    description: "Severity-ordered recovery plan"
  - type: llm_judge
    criteria: "Domain architecture protects reputation — isolates sending across enough domains for 150 reps, includes proper SPF/DKIM/DMARC setup, and specifies warming protocols that prevent future blacklisting"
    weight: 0.25
    description: "Reputation-protecting architecture"
  - type: llm_judge
    criteria: "Monitoring system provides early warning — tracks bounce rates, complaint rates, delivery rates, blacklist status, and domain reputation daily, with specific thresholds that trigger escalation before crisis"
    weight: 0.25
    description: "Early-warning monitoring"
  - type: llm_judge
    criteria: "Hygiene policy is comprehensive and enforceable — includes specific sending limits, verification requirements, banned content, and clear consequences, with mechanisms to enforce compliance across 150 reps"
    weight: 0.25
    description: "Enforceable hygiene policy"
