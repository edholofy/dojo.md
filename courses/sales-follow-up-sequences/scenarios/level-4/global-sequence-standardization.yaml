meta:
  id: global-sequence-standardization
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Standardize email sequences across a global sales organization — manage localization, compliance, cultural norms, and quality consistency across regions"
  tags: [sales, global, standardization, localization, compliance, expert]

state: {}

trigger: |
  You're the VP of Global Sales Operations at "WorldSaaS" ($350M
  ARR, 250 reps selling in 20 countries). Your CEO says: "Our US
  sequences work great. Our international teams are struggling.
  Fix it without making everyone sound American."

  Regional performance:
  - North America (100 reps): 5.8% reply rate, 1.5% meeting rate
  - Western Europe (60 reps): 3.2% reply rate, 0.7% meeting rate
  - DACH (Germany/Austria/Switzerland, 25 reps): 2.1% reply rate,
    0.5% meeting rate
  - Nordics (15 reps): 4.5% reply rate, 1.2% meeting rate
  - UK/Ireland (20 reps): 4.8% reply rate, 1.3% meeting rate
  - APAC (20 reps): 1.8% reply rate, 0.3% meeting rate
  - LATAM (10 reps): 2.8% reply rate, 0.6% meeting rate

  Issues identified:
  - DACH: US sequences translated into German sound "too casual and
    pushy." German buyers expect formal address (Sie vs. du),
    technical depth, and data privacy prominently mentioned.
  - Japan (within APAC): Sequences are too direct. Japanese business
    culture expects relationship-building before any pitch. "Cold
    email" barely exists as a concept.
  - Brazil (within LATAM): Sequences are too transactional. Brazilian
    business culture is relationship-first. The CTA "book a meeting"
    feels aggressive without prior relationship.
  - France: Legal requirements for B2B email differ from US CAN-SPAM.
    CNIL (French data authority) has specific rules beyond GDPR.
  - Global compliance: GDPR (EU), LGPD (Brazil), PIPL (China),
    CASL (Canada), POPIA (South Africa) all have different rules
  - A global account ("MegaBank," operating in 12 countries) received
    cold outreach from 4 different regional teams in the same week

  Tasks:
  1. Design the global sequence framework. What's standardized
     globally (quality standards, brand voice, analytics) vs. what's
     localized (language, tone, compliance, cultural norms)?
     Create the governance model.

  2. Rewrite the cold outbound first email for 3 cultures: Germany
     (formal, technical, privacy-conscious), Japan (relationship-
     first, indirect, consensus-oriented), and Brazil (warm,
     personal, hierarchy-aware). Show how the same value proposition
     adapts to each culture without losing its core message.

  3. Create the compliance matrix for the top 8 countries. For each:
     what's required by law (consent, unsubscribe, physical address),
     what's best practice, and what's the maximum sequence length
     and frequency allowed?

  4. Solve the global account coordination problem. Design the
     process that prevents 4 regional teams from emailing the same
     company. Include: account ownership rules, CRM flagging, and
     the coordination workflow for multi-region prospects.

assertions:
  - type: llm_judge
    criteria: "Global framework balances consistency and localization — defines universal standards (brand, quality metrics, analytics) while allowing regional adaptation (tone, compliance, cultural norms) with clear governance for each"
    weight: 0.25
    description: "Balanced global framework"
  - type: llm_judge
    criteria: "Cultural adaptations are authentic — German email is formal (Sie), technical, and data-privacy-forward; Japanese email is indirect, relationship-building, and doesn't ask for a meeting; Brazilian email is warm and personal"
    weight: 0.25
    description: "Authentic cultural adaptations"
  - type: llm_judge
    criteria: "Compliance matrix is accurate and actionable — correctly distinguishes GDPR consent requirements from CAN-SPAM opt-out model, addresses LGPD, PIPL, CASL, and POPIA with specific requirements per country"
    weight: 0.25
    description: "Accurate compliance matrix"
  - type: llm_judge
    criteria: "Global account coordination prevents overlap — includes CRM-based account assignment, regional ownership rules, coordination triggers for multi-region companies, and escalation procedures"
    weight: 0.25
    description: "Overlap-preventing coordination"
