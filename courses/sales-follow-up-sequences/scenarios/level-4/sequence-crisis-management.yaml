meta:
  id: sequence-crisis-management
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Manage email sequence crises — handle mass unsubscribes, deliverability crashes, compliance violations, and PR incidents from outbound campaigns"
  tags: [sales, crisis, compliance, deliverability, PR, expert]

state: {}

trigger: |
  You're the CRO of "OutreachPro" ($200M ARR). Three crises have
  hit your sales email program simultaneously.

  Crisis 1: Compliance violation discovered
  - Your EMEA team sent 5,000 cold emails to EU prospects without
    proper GDPR consent documentation
  - A French prospect has filed a complaint with CNIL (French data
    protection authority)
  - CNIL has opened a preliminary investigation
  - Your legal team estimates potential fine: €500K to €2M
  - The EMEA VP of Sales says: "Everyone does this, it's not a big
    deal"
  - Your DPO (Data Protection Officer) disagrees: "This is serious.
    We need to self-report and remediate immediately."

  Crisis 2: Deliverability crash (related to Crisis 1)
  - Your primary EU domain is now on Spamhaus blacklist
  - EU email delivery rate dropped to 8% (was 42%)
  - 3,000 active sequences in EMEA are essentially dead
  - Pipeline impact: €4M in Q3 pipeline at risk
  - The blacklist removal process takes 2-4 weeks minimum

  Crisis 3: Social media backlash
  - A well-known tech influencer (250K followers) received one of
    your cold emails, found it invasive, and posted it publicly:
    "This is why we hate sales emails. @OutreachPro just emailed
    me with personal details scraped from my LinkedIn without
    my consent. This isn't personalization, it's surveillance."
  - The post has 2,000 retweets and growing
  - Your Head of Marketing says: "Don't respond, it'll blow over"
  - Your VP of Comms says: "We need to respond within 4 hours"

  Tasks:
  1. Write the crisis response plan for the GDPR violation. What do
     you do in the first 24 hours, first week, and first month?
     Address: legal response, CNIL cooperation, internal
     investigation, and the EMEA VP's dismissive attitude.

  2. Design the deliverability recovery plan for EMEA. How do you
     maintain pipeline momentum while the primary domain is
     blacklisted? What's the 4-week plan to restore deliverability?
     What changes permanently to prevent recurrence?

  3. Write the social media response to the influencer's post. Then
     design the internal communications plan: what do you tell your
     board, your employees, and your customers? Draft each message.

  4. These three crises are connected — they all stem from the same
     root cause. Write the "Post-Incident Review" memo to the board
     that explains the systemic failure, the cost, the remediation,
     and the structural changes that prevent recurrence.

assertions:
  - type: llm_judge
    criteria: "GDPR response is legally sound — includes proper incident classification, consideration of self-reporting, CNIL cooperation strategy, and addresses the EMEA VP's dismissive attitude as a cultural problem that needs correction"
    weight: 0.25
    description: "Legally sound GDPR response"
  - type: llm_judge
    criteria: "Deliverability recovery maintains business — includes temporary workarounds (backup domains, phone pivot, partner channels) while executing the 4-week blacklist removal, with permanent changes to domain architecture"
    weight: 0.25
    description: "Business-maintaining recovery"
  - type: llm_judge
    criteria: "Social media response is authentic — acknowledges the concern without being defensive, takes responsibility without admitting legal liability, and the internal communications are transparent and appropriately tailored to each audience"
    weight: 0.25
    description: "Authentic multi-audience response"
  - type: llm_judge
    criteria: "Board memo identifies systemic failure — connects the three crises to a common root cause (lack of compliance governance in outbound), quantifies total cost, and proposes structural changes that prevent recurrence"
    weight: 0.25
    description: "Systemic failure board memo"
