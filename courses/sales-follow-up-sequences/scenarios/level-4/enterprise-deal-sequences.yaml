meta:
  id: enterprise-deal-sequences
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Design email sequences for enterprise mega-deals — coordinate multi-threaded outreach across 10+ stakeholders, manage long sales cycles, and orchestrate executive engagement"
  tags: [sales, enterprise, mega-deal, multi-threading, executive, expert]

state: {}

trigger: |
  You're the VP of Enterprise Sales at "PlatformMax" ($300M ARR).
  You're personally managing the email strategy for your company's
  3 largest opportunities, all at different stages of the 9-month
  enterprise sales cycle.

  Deal 1: "GlobalBank" — $2.5M ACV, Month 2 of 9
  - Stage: Discovery/Qualification
  - 14 stakeholders identified across 4 divisions
  - Only 3 have been engaged (CIO, VP of IT, a director)
  - 11 stakeholders untouched, including the CFO and CEO
  - Competitor: Incumbent IBM relationship (15 years)
  - Challenge: How do you systematically engage 14 people without
    looking like you're "carpet bombing" the account?

  Deal 2: "MegaRetail" — $1.8M ACV, Month 5 of 9
  - Stage: Evaluation/Proof of Concept
  - 8 stakeholders engaged, 3 are champions
  - POC is going well but the CFO has gone silent after initially
    being supportive
  - Procurement just sent a "vendor questionnaire" (60 questions)
  - The evaluation committee meets monthly — next meeting in 3 weeks
  - You need to influence the committee before they meet

  Deal 3: "TechCorp" — $3.2M ACV, Month 8 of 9
  - Stage: Negotiation/Close
  - Legal review has stalled (22 redline items, 8 resolved)
  - Your champion (CTO) says "it's going to happen" but the
    CEO hasn't formally approved the budget
  - You need the CEO to approve before board meeting next month
  - Your CEO offered to make a peer-to-peer call with TechCorp's CEO

  Tasks:
  1. Design the 60-day multi-threading plan for GlobalBank. Map
     when each of the 14 stakeholders gets contacted, by whom (your
     team), through what channel, and with what message. Include
     the "warm introduction" chain — who introduces you to whom.

  2. For MegaRetail, design the "committee influence" email strategy
     for the 3 weeks before the evaluation committee meeting. What
     does each of your 3 champions receive to arm them? What do the
     5 non-champion committee members receive directly? Write the
     email to the silent CFO.

  3. For TechCorp, design the closing sequence. Map the pathway from
     current state (legal stall, no CEO approval) to signed contract.
     Include: the CEO-to-CEO outreach, the legal acceleration plan,
     and the timeline with specific dates and milestones.

  4. Create the "Enterprise Deal Email Playbook" — the framework
     for managing email communication across 9-month sales cycles.
     How do you maintain engagement without fatigue? When do you
     shift from selling to supporting? How do you coordinate emails
     across your team members?

assertions:
  - type: llm_judge
    criteria: "Multi-threading plan is methodical — sequences 14 stakeholders in a logical order using warm introductions, varies channels, and spaces contacts to avoid carpet-bombing while ensuring all stakeholders are reached within 60 days"
    weight: 0.25
    description: "Methodical multi-threading"
  - type: llm_judge
    criteria: "Committee influence strategy arms champions — provides champions with specific materials for the meeting, engages non-champions with role-appropriate value, and addresses the CFO's silence with a tactful re-engagement email"
    weight: 0.25
    description: "Champion-arming influence strategy"
  - type: llm_judge
    criteria: "Closing sequence maps the critical path — includes CEO-to-CEO outreach with specific talk track, legal acceleration tactics (parallel tracks, trade-off proposals), and a timeline with concrete milestones"
    weight: 0.25
    description: "Critical-path closing sequence"
  - type: llm_judge
    criteria: "Enterprise playbook addresses 9-month reality — includes engagement cadence by deal stage, fatigue prevention strategies, selling-to-supporting transition markers, and team coordination rules"
    weight: 0.25
    description: "9-month enterprise playbook"
