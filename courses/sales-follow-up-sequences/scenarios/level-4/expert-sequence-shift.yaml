meta:
  id: expert-sequence-shift
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Navigate a complex email sequence crisis combining organizational transformation, compliance, technology, and executive stakeholder management"
  tags: [sales, shift-simulation, expert, transformation, crisis]

state: {}

trigger: |
  You're the newly hired Chief Revenue Officer at "RapidGrowth"
  ($180M ARR, 200 reps, growing 35% YoY). The board hired you
  because the previous CRO was fired after pipeline generation
  declined 40% over 2 quarters. Your first-week assessment reveals
  the email outreach operation is the biggest problem.

  Assessment findings:

  Performance crisis:
  - SDR meeting rate: 0.5% of emails sent (industry: 1.2%)
  - AE follow-up rate: 38% of opportunities get proper follow-up
    (62% get ad hoc or no follow-up)
  - Pipeline from outbound: $3.2M/month (was $8M/month under
    previous CRO)
  - Revenue attributed to outbound follow-up: 28% of total (was 45%)

  Root causes (interconnected):
  1. Tool mess: 4 different email tools in use (Outreach for SDRs,
     SalesLoft for some AEs, HubSpot for marketing sequences,
     Gmail for other AEs). No integration between them.
  2. Data quality: 22% bounce rate (should be under 3%). CRM data
     is stale. No verification process.
  3. Content chaos: 500+ active sequences, many with outdated
     product info, old pricing, or messaging from 3 CEOs ago.
  4. Compliance time bomb: No GDPR documentation for EU outreach.
     No opt-out tracking across tools. No DPO involved in outbound.
  5. People problem: 8 SDR managers with wildly different standards.
     Top SDRs have left for competitors. Remaining team is
     demoralized. "Nothing we send works anymore."
  6. Attribution gap: No one can prove which emails or sequences
     drive revenue. The finance team says "prove outbound ROI or
     we cut the budget."

  Stakeholders:
  - Board: "Fix pipeline or we'll find someone who can."
  - CFO: "Prove ROI. I want to see data, not stories."
  - VP of Marketing: "Outbound gives our brand a bad name."
  - SDR managers (8): "Give us better tools and better data."
  - Legal/DPO: "I've been warning about GDPR for 2 years."

  Budget: $800K for the full transformation (tools, people, training)

  Tasks:
  1. Design the 180-day transformation plan. Phase 1 (Days 1-30):
     Emergency stabilization. Phase 2 (Days 31-90): Foundation
     rebuild. Phase 3 (Days 91-180): Scale and optimize. For each
     phase: objectives, key actions, expected impact, and the
     metrics that prove progress.

  2. Solve the tool consolidation problem. Which tool platform do
     you standardize on? How do you migrate 200 reps without losing
     active sequences? What's the 60-day migration timeline?

  3. Build the attribution model that satisfies the CFO. How do you
     connect emails → replies → meetings → pipeline → revenue?
     What data infrastructure do you need? Design the monthly
     report that proves outbound ROI.

  4. Write the memo to the board after 90 days. Present: what you
     found, what you've fixed, what's in progress, and the forecast
     for pipeline recovery. Include honest metrics — some will be
     better, some will still be bad. How do you maintain board
     confidence during the transformation?

assertions:
  - type: llm_judge
    criteria: "180-day plan addresses interconnected causes — Phase 1 stops the bleeding (data cleanup, compliance audit, quick sequence fixes), Phase 2 rebuilds foundation (tool consolidation, content refresh, training), Phase 3 scales (AI, analytics, optimization)"
    weight: 0.25
    description: "Interconnected-cause transformation"
  - type: llm_judge
    criteria: "Tool consolidation is practical — selects one platform with clear reasoning, provides a realistic 60-day migration timeline that doesn't disrupt active selling, and includes adoption support"
    weight: 0.25
    description: "Practical tool consolidation"
  - type: llm_judge
    criteria: "Attribution model satisfies the CFO — connects the full funnel from email to revenue with clear methodology, acknowledges attribution limitations honestly, and presents data the finance team can validate"
    weight: 0.25
    description: "CFO-satisfying attribution"
  - type: llm_judge
    criteria: "Board memo is honest and confidence-building — presents progress metrics alongside remaining challenges, demonstrates systematic approach, and provides a credible pipeline recovery forecast with clear milestones"
    weight: 0.25
    description: "Honest confidence-building memo"
