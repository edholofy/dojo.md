meta:
  id: sequence-team-building
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Build and lead a high-performing SDR team — design hiring profiles, onboarding programs, performance management, and career paths focused on outreach excellence"
  tags: [sales, SDR, team-building, hiring, onboarding, expert]

state: {}

trigger: |
  You're the VP of Sales Development at "ScaleUp" ($120M ARR). You
  need to build the SDR team from 15 to 40 reps in 6 months while
  improving per-rep productivity from 8 meetings/month to 14.

  Current team profile:
  - 15 SDRs, average tenure: 7 months
  - 3 top performers (18+ meetings/month): Use multi-channel, highly
    personalized sequences, make 30+ calls/day
  - 7 middle performers (8-12 meetings/month): Mostly email-only,
    moderate personalization, follow sequences mechanically
  - 5 underperformers (under 6 meetings/month): Template-only emails,
    no phone calls, inconsistent activity, 2 likely to be PIP'd

  Current process:
  - Onboarding: 1-week classroom training, then "shadow a top rep"
    for 3 days, then they're on their own
  - Ramp time: Average 3 months to reach 50% of quota
  - Attrition: 40% annual (losing people to AE promotions, other
    companies, and underperformance)
  - Coaching: Monthly 1:1s with managers (mostly pipeline review,
    not skill development)

  Constraints:
  - Hiring budget: $45K base salary per SDR (competitive for market)
  - Hiring timeline: 25 hires in 6 months (4-5 per month)
  - Manager capacity: 2 SDR managers (currently 7-8 direct reports
    each, will need to scale to 20 each)
  - Training resources: 1 enablement manager (shared with AE team)

  Tasks:
  1. Design the SDR hiring profile. What attributes predict success
     in email sequences and multi-channel outreach? Create the
     interview rubric that evaluates these attributes. Include a
     practical "sequence writing" exercise for the interview.

  2. Redesign the onboarding program. The current 1-week + shadow
     model produces reps who take 3 months to ramp. Design the
     30-day structured onboarding that reduces ramp to 6 weeks.
     Include: daily schedule for weeks 1-4, skills progression,
     and certification gates.

  3. Build the performance management framework for sequences.
     What metrics define "good" at each career stage (month 1-3,
     month 4-6, month 7+)? How do you differentiate between skill
     gaps (coachable) and will gaps (not coachable)? Design the
     coaching cadence.

  4. Design the career path from SDR to AE. What skills developed
     in email sequences transfer to the AE role? Create the
     promotion criteria that reward the right behaviors (not just
     meeting count).

assertions:
  - type: llm_judge
    criteria: "Hiring profile identifies predictive attributes — focuses on writing ability, curiosity, research skills, resilience, and coachability rather than just 'hustle' or prior sales experience, with a practical interview exercise"
    weight: 0.25
    description: "Predictive hiring attributes"
  - type: llm_judge
    criteria: "30-day onboarding is structured and progressive — builds skills incrementally (week 1: product/ICP, week 2: sequences/tools, week 3: supervised outreach, week 4: independent with coaching), with clear certification gates"
    weight: 0.25
    description: "Structured progressive onboarding"
  - type: llm_judge
    criteria: "Performance framework evolves by stage — sets different expectations for ramp vs. performing vs. senior SDRs, distinguishes skill gaps from will gaps with specific indicators, and includes actionable coaching cadence"
    weight: 0.25
    description: "Stage-evolving performance framework"
  - type: llm_judge
    criteria: "Career path rewards quality — promotion criteria include personalization rate, reply quality, meeting quality (not just quantity), and multi-channel adoption rather than only raw meeting count"
    weight: 0.25
    description: "Quality-rewarding career path"
