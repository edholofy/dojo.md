meta:
  id: sequence-operations-design
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Design a sequence operations function — build governance, quality standards, content libraries, and measurement frameworks for email sequences at scale"
  tags: [sales, operations, governance, quality, scale, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ScaleForce" ($250M ARR,
  200 reps across SDR, AE, and CSM teams). The CRO says: "We have
  200 people sending emails to our prospects and customers, and
  there's zero coordination. An SDR emails a prospect, an AE emails
  them 2 hours later, and our CSM emails a different person at the
  same company about renewal. We look chaotic."

  Current state:
  - 200 reps using Outreach.io independently
  - 340 active sequences across the organization (many duplicates)
  - No sequence approval process — anyone can create and launch
  - Average sequence: 6 steps, email only, zero A/B testing
  - No shared content library — reps write everything from scratch
  - Overlap rate: 15% of prospects receive emails from 2+ reps
    within the same week
  - No sequence analytics rolled up at the org level
  - Compliance risk: 3 reps have been flagged for potential GDPR
    violations in EU outreach

  Problems to solve:
  1. Sequence chaos — too many sequences, no quality control
  2. Inter-team conflict — SDR and AE sequences overlap
  3. Content duplication — 50+ versions of the "intro email"
  4. No analytics — can't measure what works across the org
  5. Compliance gaps — no guardrails on EU/regulated outreach
  6. Brand inconsistency — email tone varies from professional to
     borderline spam

  Budget: $150K/year for the sequence operations function

  Tasks:
  1. Design the "Sequence Governance Framework." Who can create
     sequences? What's the approval process? How do you consolidate
     340 sequences down to a manageable number? What are the
     mandatory standards every sequence must meet?

  2. Solve the inter-team overlap problem. Design the "Account
     Ownership and Outreach Coordination" system that prevents
     SDRs, AEs, and CSMs from emailing the same company on the
     same day. Include: rules, tools, and escalation paths.

  3. Build the centralized content library architecture. What
     content blocks do you create (intros, value props, case
     studies, CTAs, compliance footers)? How are they organized?
     Who maintains them? How do you balance standardization with
     rep personalization?

  4. Design the org-level sequence analytics dashboard. What
     metrics does the CRO see monthly? How do you compare
     performance across teams, reps, sequences, and content
     variants? What are the leading indicators that predict
     pipeline generation?

assertions:
  - type: llm_judge
    criteria: "Governance framework is practical — defines clear roles for sequence creation, an approval process that doesn't bottleneck reps, consolidation criteria for the 340 existing sequences, and mandatory quality standards"
    weight: 0.25
    description: "Practical governance framework"
  - type: llm_judge
    criteria: "Overlap solution uses account-level coordination — implements account ownership rules, sequence territory boundaries between SDR/AE/CSM, and a technical mechanism (likely Outreach rules or CRM triggers) to prevent same-day contact"
    weight: 0.25
    description: "Account-level overlap prevention"
  - type: llm_judge
    criteria: "Content library balances control and flexibility — provides standardized blocks that ensure quality and compliance while leaving room for rep personalization, with clear ownership and update cadence"
    weight: 0.25
    description: "Control-flexibility content library"
  - type: llm_judge
    criteria: "Analytics dashboard serves the CRO — shows org-level metrics (total meetings, pipeline, sequence performance), enables drill-down by team/rep/sequence, and includes leading indicators that predict future pipeline"
    weight: 0.25
    description: "CRO-serving analytics dashboard"
