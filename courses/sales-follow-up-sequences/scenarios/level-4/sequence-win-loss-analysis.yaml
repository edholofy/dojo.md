meta:
  id: sequence-win-loss-analysis
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Conduct systematic analysis of email sequence effectiveness — identify what drives replies and meetings, quantify improvement opportunities, and build data-driven optimization programs"
  tags: [sales, analytics, win-loss, optimization, data-driven, expert]

state: {}

trigger: |
  You're the Director of Sales Analytics at "DataDriven" ($140M ARR,
  90 reps). The CRO wants a comprehensive analysis of your email
  sequence performance and an evidence-based optimization plan.

  Data available (last 6 months, 180,000 emails, 12,000 sequences):

  Reply rate by email attributes:
  - Personalized first line: 6.8% reply (vs. 2.9% without)
  - Includes question: 5.4% (vs. 3.1% without question)
  - Under 75 words: 5.2% (vs. 3.4% for 75-150, 1.8% for 150+)
  - References prospect's company: 5.1% (vs. 3.3% generic)
  - Includes social proof: 4.8% (vs. 3.5% without)
  - Has calendar link: 3.9% (vs. 4.4% without — counterintuitive)
  - Sent Tuesday-Thursday: 4.6% (vs. 3.2% Monday/Friday)

  Meeting rate by sequence attributes:
  - Multi-channel (email + phone + LinkedIn): 2.8% meeting rate
  - Email + phone: 1.9%
  - Email + LinkedIn: 1.4%
  - Email only: 0.8%
  - Sequences with 5-7 steps: 1.6% meeting rate
  - Sequences with 3-4 steps: 1.1%
  - Sequences with 8+ steps: 0.9% (diminishing returns)

  Rep performance distribution:
  - Top 10%: 8.2% reply rate, 2.4% meeting rate
  - Middle 70%: 3.8% reply rate, 0.9% meeting rate
  - Bottom 20%: 1.4% reply rate, 0.2% meeting rate

  Surprising findings:
  1. Calendar links DECREASE reply rates (3.9% vs. 4.4%) — why?
  2. The best-performing email in any sequence is consistently
     email #3, not email #1 (5.1% vs. 3.8% reply rate)
  3. Prospects who receive a phone call within 4 hours of opening
     an email convert at 4x the rate of those called after 24+ hours
  4. The top 10% of reps personalize 78% of emails; bottom 20%
     personalize 8%

  Tasks:
  1. Present the "State of Sequences" analysis. What are the 5
     highest-impact findings? For each: the data, why it matters,
     and the specific recommendation. Which single change would
     have the biggest impact on overall meeting rate?

  2. Investigate the 4 surprising findings. For each: propose 2-3
     hypotheses explaining the pattern and design the experiment
     to validate the most likely hypothesis.

  3. Build the "Sequence Optimization Score" — a composite metric
     that predicts sequence effectiveness before it's launched.
     What factors go into the score? How is it calculated? What
     threshold indicates "ready to launch" vs. "needs improvement"?

  4. Design the 90-day optimization program that closes the gap
     between the top 10% (8.2% reply) and the middle 70% (3.8%
     reply). What interventions in what order? What's the expected
     improvement trajectory? Include monthly milestones.

assertions:
  - type: llm_judge
    criteria: "Analysis identifies highest-leverage findings — correctly identifies personalization (6.8% vs 2.9%) and multi-channel (2.8% vs 0.8%) as the biggest levers, with specific recommendations for implementation"
    weight: 0.25
    description: "High-leverage finding identification"
  - type: llm_judge
    criteria: "Surprising findings are investigated rigorously — provides plausible hypotheses for calendar link paradox, email #3 outperformance, speed-to-call effect, and personalization correlation, with experimental designs to validate"
    weight: 0.25
    description: "Rigorous anomaly investigation"
  - type: llm_judge
    criteria: "Optimization score is predictive — includes factors from the data (personalization rate, channel mix, email length, timing, step count) with weights reflecting actual impact on reply/meeting rates"
    weight: 0.25
    description: "Predictive optimization score"
  - type: llm_judge
    criteria: "90-day program is phased and measurable — addresses highest-impact improvements first (personalization training, multi-channel adoption), includes monthly milestones with expected reply rate improvements"
    weight: 0.25
    description: "Phased measurable program"
