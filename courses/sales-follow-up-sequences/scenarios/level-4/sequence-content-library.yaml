meta:
  id: sequence-content-library
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Build and manage a centralized email sequence content library — design reusable content blocks, governance frameworks, and quality standards for email templates at scale"
  tags: [sales, content-library, templates, governance, scale, expert]

state: {}

trigger: |
  You're the Director of Sales Content at "ContentForce" ($170M ARR,
  130 reps). Your CRO is frustrated: "We have 130 reps and 400+
  email templates, but nobody can find the right content when they
  need it. Our best emails are hidden on 3 reps' laptops."

  Current state:
  - 400+ email templates scattered across Outreach, Google Docs,
    Notion, and individual rep folders
  - No tagging, categorization, or searchability
  - 60% of templates are outdated (reference old pricing, former
    employees, or discontinued features)
  - Top performers have personal "swipe files" they won't share
  - Marketing creates content that sales doesn't use ("too generic")
  - New reps take 3+ weeks to find and customize effective templates
  - Content creation: each rep spends 45 min/day writing emails
    from scratch

  Content needs by category (from rep survey):
  - Industry-specific intros (6 industries × multiple personas)
  - Competitive differentiation emails (5 competitors)
  - Post-event follow-ups (conferences, webinars, roundtables)
  - Objection-response emails (12 common objections)
  - Case study summaries (by industry, deal size, use case)
  - Executive-level emails (different tone and brevity)
  - Re-engagement templates (by reason for stall)
  - Seasonal/timely templates (budget season, year-end, new year)

  Budget: $80K/year for content management + 1 dedicated headcount

  Tasks:
  1. Design the content library architecture. How do you categorize
     400+ templates into a system reps can actually navigate? What's
     the taxonomy (by persona, industry, stage, channel, objective)?
     How do reps find the right content in under 30 seconds?

  2. Solve the "swipe file hoarding" problem. Your top 3 performers
     have personal email libraries that outperform company templates
     by 40%. How do you capture this institutional knowledge without
     making top performers feel exploited? Design the incentive and
     process.

  3. Build the content governance framework. Who creates templates?
     Who approves them? How often are they reviewed? What triggers
     retirement of a template? How do you prevent the library from
     bloating back to 400+ disorganized templates?

  4. Design the content effectiveness measurement system. How do
     you know which templates work and which don't? What metrics
     do you track per template? How do you create the feedback
     loop that continuously improves the library?

assertions:
  - type: llm_judge
    criteria: "Library architecture is navigable — provides a clear taxonomy that reps can search by multiple dimensions (persona, industry, stage, objective) and find the right content within 30 seconds"
    weight: 0.25
    description: "Navigable library architecture"
  - type: llm_judge
    criteria: "Swipe file solution respects top performers — creates incentives for sharing (recognition, compensation, influence on team content) without forcing compliance, and captures knowledge systematically"
    weight: 0.25
    description: "Top-performer-respecting capture"
  - type: llm_judge
    criteria: "Governance prevents re-bloating — defines clear roles for creation, approval, review cadence, and retirement triggers that maintain a curated library rather than a dumping ground"
    weight: 0.25
    description: "Bloat-preventing governance"
  - type: llm_judge
    criteria: "Effectiveness measurement creates a feedback loop — tracks per-template metrics (open rate, reply rate, meeting conversion), identifies winners and losers, and feeds learnings back into content improvement"
    weight: 0.25
    description: "Feedback-loop measurement"
