meta:
  id: ai-powered-sequences
  level: 4
  course: sales-follow-up-sequences
  type: output
  description: "Leverage AI to transform email sequences — design AI-powered personalization, send-time optimization, content generation, and predictive response modeling"
  tags: [sales, AI, automation, personalization, predictive, expert]

state: {}

trigger: |
  You're the Head of Sales Technology at "FutureReach" ($180M ARR,
  120 SDRs/AEs). The CEO just approved $400K for AI-powered
  sequence optimization. You need to design the AI-augmented email
  system.

  Current state:
  - 120 reps sending 4,000 emails/day
  - Reply rate: 4.2% (industry average: 5.5%)
  - Meeting conversion: 1.1% of emails sent
  - Personalization: 30% of emails have custom first line
  - Send time: Reps send when they write (no optimization)
  - Content selection: Reps choose templates by gut feeling

  AI capabilities available:
  1. AI Personalization Engine: Analyzes prospect's LinkedIn, company
     news, tech stack, and job postings to generate personalized
     opening lines and value propositions
  2. Send-Time Optimization: ML model predicts when each individual
     prospect is most likely to open and reply (not just "Tuesday
     at 10am" but per-prospect optimization)
  3. AI Content Recommender: Based on prospect attributes (industry,
     role, deal stage, prior engagement), recommends which email
     template, case study, and CTA to use
  4. Response Prediction: Scores each prospect on likelihood to
     respond (0-100), enabling reps to focus energy on high-
     probability contacts
  5. AI Reply Classification: Automatically categorizes replies
     (interested, not interested, refer to colleague, out of office,
     request more info) and triggers appropriate next steps

  Team concerns:
  - "AI emails sound robotic — prospects will know it's automated"
  - "If everyone uses AI, won't all our emails sound the same?"
  - "What about hallucinated company data in personalized lines?"
  - "Will AI replace SDRs?"

  Tasks:
  1. Design the AI-augmented email workflow. For each stage (prospect
     selection, personalization, content, timing, send, response
     handling): what does AI do vs. what does the human do? Create
     the collaboration model that maximizes both.

  2. Build the AI quality assurance framework. How do you prevent
     hallucinations in AI-generated personalization? What's the
     review process? What confidence thresholds trigger human
     review vs. auto-send? Design the error-handling system.

  3. Model the ROI. If AI increases reply rate from 4.2% to 6.5%
     and personalization from 30% to 95%, what's the impact on
     meetings booked, pipeline generated, and revenue? Include
     the time savings from automated reply classification.

  4. Address each team concern honestly. Create the "AI Guidelines
     for Email Sequences" document that sets expectations, defines
     boundaries, and positions AI as augmentation, not replacement.

assertions:
  - type: llm_judge
    criteria: "Workflow balances AI and human roles — AI handles data gathering, initial personalization drafts, timing optimization, and reply classification while humans provide strategic judgment, final approval, and relationship nuance"
    weight: 0.25
    description: "Balanced AI-human workflow"
  - type: llm_judge
    criteria: "QA framework prevents hallucinations — includes confidence scoring, source verification, human review thresholds, and a rollback mechanism when AI-generated content is flagged as inaccurate"
    weight: 0.25
    description: "Hallucination-preventing QA"
  - type: llm_judge
    criteria: "ROI model is specific and credible — calculates meeting uplift from improved reply rate, time savings from automation, and total revenue impact with clear assumptions that a CFO would accept"
    weight: 0.25
    description: "Credible ROI calculation"
  - type: llm_judge
    criteria: "Concern responses are honest — acknowledges AI email risks (robotic tone, sameness) with practical solutions, addresses hallucination with specific safeguards, and positions SDR role evolution honestly"
    weight: 0.25
    description: "Honest concern responses"
