meta:
  id: sequence-economics-model
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Model the economics of email outreach — quantify cost per meeting, revenue attribution, channel ROI, and investment optimization for the board"
  tags: [sales, economics, ROI, attribution, board, master]

state: {}

trigger: |
  You're the SVP of Revenue Operations at "RevenueMax" ($800M ARR,
  500 reps). The CFO is preparing for the annual budget cycle and
  has challenged every department to justify their ROI. Your outbound
  email function costs $22M/year and the CFO says: "Prove it or lose
  half of it."

  Full cost model (annual):
  - SDR team (80 SDRs + 8 managers + 1 director): $12M
  - AE follow-up time (estimated 15% of 200 AEs' time): $5.4M
  - Tools (Outreach, Sales Navigator, data providers, verification):
    $1.8M
  - Content creation for sequences: $600K
  - Training and enablement: $400K
  - Infrastructure (domains, sending, compliance): $800K
  - Ops team (3 people managing sequences): $1M
  - Total: $22M/year

  Performance data:
  - SDR pipeline generated: $280M/year (win rate: 18% = $50.4M
    closed revenue)
  - AE self-sourced pipeline (includes follow-up contribution):
    $420M/year (win rate: 22% = $92.4M, but follow-up contribution
    is debated)
  - Total outbound-influenced revenue: somewhere between $50M and
    $142M depending on attribution model
  - SDR meetings booked: 9,600/year (cost per meeting: $2,292 if
    all costs attributed to SDR function)
  - AE meetings from follow-up sequences: estimated 4,800/year

  Attribution challenge:
  - Marketing says: "Most SDR meetings come from marketing-sourced
    leads. SDRs just convert marketing's pipeline."
  - Sales says: "Our follow-up sequences close deals that would
    otherwise die. We should get credit for all influenced revenue."
  - Finance says: "I need a defensible model, not departmental
    politics."

  CFO's specific scenarios to model:
  1. "What if we cut SDR team by 50% and invest in marketing?"
  2. "What if we double SDR investment?"
  3. "What if we keep headcount flat but invest in AI/tools?"
  4. "What's the optimal allocation across SDR, AE follow-up, and
     tools?"

  Tasks:
  1. Build the multi-touch attribution model that fairly credits
     outbound emails within the broader revenue engine. Address
     the marketing vs. sales debate with a data-driven framework.
     Present 3 attribution models (first-touch, multi-touch,
     influenced) and show how each changes the ROI calculation.

  2. Model all 4 CFO scenarios. For each: investment change,
     expected pipeline impact, revenue impact, and the risk
     assessment. Which scenario maximizes ROI?

  3. Build the "Outbound Unit Economics" framework. Calculate: cost
     per email sent, cost per reply, cost per meeting, cost per
     SQL, cost per opportunity, and cost per dollar of closed
     revenue. Compare to marketing's unit economics.

  4. Present the board-ready "Revenue Engine Investment Case" — the
     5-slide presentation that justifies the $22M outbound
     investment with clear data, honest limitations, and a
     recommendation for the optimal budget.

assertions:
  - type: llm_judge
    criteria: "Attribution model is fair and defensible — presents multiple models, explains trade-offs of each, resolves the marketing vs. sales debate with data rather than politics, and recommends the most accurate approach"
    weight: 0.25
    description: "Fair defensible attribution"
  - type: llm_judge
    criteria: "Four scenarios are modeled rigorously — each includes clear investment assumptions, pipeline impact projections based on historical data, revenue outcomes, and honest risk assessments with a clear recommendation"
    weight: 0.25
    description: "Rigorously modeled scenarios"
  - type: llm_judge
    criteria: "Unit economics are complete and comparable — calculates full funnel costs from email-sent to closed-revenue, compares to marketing equivalents fairly, and identifies where outbound is efficient vs. inefficient"
    weight: 0.25
    description: "Complete comparable unit economics"
  - type: llm_judge
    criteria: "Board presentation is data-driven and honest — leads with clear ROI calculation, acknowledges attribution limitations, presents the recommendation with supporting scenarios, and provides a defensible ask"
    weight: 0.25
    description: "Honest data-driven board case"
