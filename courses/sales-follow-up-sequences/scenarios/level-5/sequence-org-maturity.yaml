meta:
  id: sequence-org-maturity
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Assess and advance outbound email organizational maturity — build capability models, design progression frameworks, and create excellence centers across organizations at different stages"
  tags: [sales, maturity-model, organizational-design, excellence, master]

state: {}

trigger: |
  You're a Managing Director at a revenue consulting firm. Three
  clients at vastly different maturity stages need your guidance on
  their email outreach programs.

  Client A: "SeedRocket" ($5M ARR, 8 AEs, Series A)
  - No SDR function, AEs do their own prospecting
  - AEs use Gmail with no tracking or automation
  - Follow-up is ad hoc — some AEs follow up, others don't
  - Win rate: 24% (decent because deals are founder-referred)
  - Growing to 25 AEs in 12 months with new SDR team planned
  - Question: "We're about to hire our first SDRs. How do we set
    up email sequences from scratch without losing our personal
    touch?"

  Client B: "GrowthEngine" ($80M ARR, 60 AEs, 20 SDRs)
  - SDR team exists but underperforming (6 meetings/SDR/month)
  - Using Outreach.io with 45 active sequences
  - Personalization rate: 15% of emails
  - Multi-channel: email only (no phone, no LinkedIn in sequences)
  - No A/B testing, no analytics beyond Outreach defaults
  - Question: "We've hit a wall. Our sequences aren't getting better
    despite investment. How do we break through?"

  Client C: "MegaCorp" ($2B ARR, 400 AEs, 150 SDRs, 30 countries)
  - Mature outbound program with dedicated ops team (12 people)
  - Advanced AI personalization, multi-channel sequences
  - Reply rate: 5.8% (above industry average)
  - But: growth in meetings has plateaued despite increasing
    investment
  - Question: "We've built a world-class machine but it's plateaued.
    What's the next frontier?"

  Tasks:
  1. Create the "Outbound Maturity Model" — a 5-stage framework that
     maps the journey from startup to world-class. Define each stage
     with: capabilities, investment level, key metrics, and
     transition triggers. Place each client on the model.

  2. For Client A: Design the "Minimum Viable Outbound" — the
     lightest investment that works for an 8-to-25 AE company
     adding its first SDR team. What tool? What sequences? What
     training? Keep it simple enough to implement in 30 days.

  3. For Client B: Diagnose the plateau. Why isn't their investment
     producing better results? Identify the 3 most likely root
     causes and design the 90-day breakthrough plan that addresses
     each.

  4. For Client C: Design the "Outbound Innovation Frontier" — the
     advanced capabilities that take a mature program to the next
     level. These aren't incremental improvements; they're paradigm
     shifts in how outbound works at scale.

assertions:
  - type: llm_judge
    criteria: "Maturity model is progressive and actionable — defines 5 distinct stages with clear transitions, places all 3 clients accurately, and provides specific criteria for advancing between stages"
    weight: 0.25
    description: "Progressive actionable maturity model"
  - type: llm_judge
    criteria: "Startup prescription is appropriately light — recommends one tool, few sequences, basic training, and maintains the personal touch that's working at their stage, implementable in 30 days"
    weight: 0.25
    description: "Appropriately light startup plan"
  - type: llm_judge
    criteria: "Growth company diagnosis is insightful — goes beyond 'do more' to identify root causes (likely: email-only channel, low personalization, no optimization loop) with a 90-day plan that addresses each"
    weight: 0.25
    description: "Insightful plateau diagnosis"
  - type: llm_judge
    criteria: "Enterprise frontier proposes genuine innovation — suggests advanced capabilities beyond process improvement (predictive engagement modeling, AI-agent interactions, community-based prospecting, buyer-signal marketplaces)"
    weight: 0.25
    description: "Genuinely innovative frontier"
