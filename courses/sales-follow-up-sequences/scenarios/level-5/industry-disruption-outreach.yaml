meta:
  id: industry-disruption-outreach
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Design outbound strategies for industry disruption — build email sequences that create new categories, educate markets, and drive adoption of transformative solutions"
  tags: [sales, disruption, category-creation, market-education, master]

state: {}

trigger: |
  You're the VP of Go-to-Market at "QuantumSecure" ($50M ARR,
  growing 120% YoY), a company that uses quantum-resistant
  cryptography to protect enterprise data. Your product solves a
  problem most companies don't know they have yet: their current
  encryption will be breakable by quantum computers within 5-7
  years.

  The challenge: You're not selling against competitors — you're
  selling against apathy. 90% of CISOs know about the quantum
  threat theoretically but haven't prioritized it ("it's a 2030
  problem, not a 2026 problem"). You need email sequences that
  create urgency for a threat that feels distant.

  Three target segments:
  1. Financial Services CISOs (highest urgency — regulatory
     requirements emerging, "harvest now, decrypt later" attacks
     already happening on financial data)
  2. Healthcare CIOs (medium urgency — patient data has 50+ year
     relevance, HIPAA doesn't yet require quantum-resistant
     encryption but will)
  3. Government/Defense (high urgency — NIST has mandated quantum-
     resistant standards by 2030, agencies need to start now)

  Available proof points:
  - NIST published quantum-resistant encryption standards in 2024
  - China invested $15B in quantum computing (public data)
  - "Harvest now, decrypt later" attacks increased 400% in 2025
  - Your customers include 3 Fortune 100 companies (can reference
    but not name)
  - IBM projects a quantum computer capable of breaking RSA-2048
    by 2030-2033
  - Gartner recommends "crypto-agility assessment" starting 2025

  Tasks:
  1. Design the "Market Education" email sequence for Financial
     Services CISOs. This isn't a sales sequence — it's an
     awareness-to-urgency sequence that moves CISOs from "I know
     about this theoretically" to "I need to act now." Write all 6
     emails across a 45-day campaign.

  2. Write the "Urgency Accelerator" — the single email that has
     the highest probability of converting a skeptical CISO from
     "it's a 2030 problem" to "we should start evaluating now."
     Use: regulatory momentum, "harvest now, decrypt later" data,
     and migration timeline analysis.

  3. Design the Government/Defense sequence. These buyers respond
     to mandates and compliance. Write the sequence that uses the
     NIST mandate as the anchor and positions your solution as
     the path to compliance. Include the procurement-specific
     language needed for government outreach.

  4. Create the "Category Creation Outreach Playbook" — the
     framework for designing email sequences when you're selling
     a solution to a problem buyers don't yet prioritize. What
     principles apply beyond quantum security to any category-
     creating company?

assertions:
  - type: llm_judge
    criteria: "Market education sequence builds urgency progressively — moves from awareness (quantum threat exists) to understanding (harvest attacks happening now) to urgency (migration takes 2-3 years, timeline is tight) across 6 emails"
    weight: 0.25
    description: "Progressive urgency building"
  - type: llm_judge
    criteria: "Urgency accelerator is compelling — uses the strongest proof points (harvest attacks, regulatory momentum, migration timeline) to create genuine urgency without fear-mongering, making inaction feel riskier than action"
    weight: 0.25
    description: "Compelling urgency accelerator"
  - type: llm_judge
    criteria: "Government sequence uses mandate framing — anchors on NIST standards and compliance deadlines, uses procurement-appropriate language, and positions the solution as the compliance pathway"
    weight: 0.25
    description: "Mandate-anchored government sequence"
  - type: llm_judge
    criteria: "Category creation playbook is generalizable — extracts principles (education before selling, urgency from proof not fear, peer momentum, regulatory catalysts) applicable to any company creating a new category"
    weight: 0.25
    description: "Generalizable category playbook"
