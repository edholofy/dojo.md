meta:
  id: future-of-outbound
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Design the future of outbound sales email — navigate AI disruption, buyer behavior changes, privacy regulations, and channel evolution"
  tags: [sales, future, innovation, AI-disruption, channel-evolution, master]

state: {}

trigger: |
  You're a recognized thought leader in B2B sales. "SalesForward"
  (industry research firm) has commissioned you to write the
  definitive report on "The Future of Outbound Sales Email: 2026-
  2030." You'll present the findings at their annual conference
  (3,000 sales leaders) and the report will be distributed to 50,000
  subscribers.

  Trends you've identified through your research:

  1. AI email saturation: 78% of B2B companies now use AI to write
     outbound emails. Buyer inboxes are flooded with AI-generated
     content. Open rates industry-wide have declined 23% in 18
     months.

  2. Privacy tightening: 5 new privacy laws passed globally in the
     last year. Apple's Mail Privacy Protection makes open rate
     tracking unreliable. Google's "verified sender" program may
     require certification to reach inboxes.

  3. Buyer behavior shift: Under-35 buyers prefer video (42%),
     LinkedIn DM (28%), and Slack Connect (15%) over email (15%).
     Over-50 buyers still prefer email (68%).

  4. AI agents: Early adopters are using AI agents to read, filter,
     and respond to vendor outreach before humans see it. The
     "agent-to-agent" interaction is emerging.

  5. Personalization paradox: Hyper-personalized AI emails are
     triggering "uncanny valley" responses — buyers feel surveilled.
     Some companies are deliberately going "unpolished" (human-
     written, imperfect) to stand out.

  6. Channel convergence: The boundary between sales email, marketing
     email, and product email is dissolving. Buyers receive 120+
     B2B emails per week from all sources.

  7. Regulation convergence: The EU, US, Australia, and India are
     all moving toward opt-in consent models. Cold email as we know
     it may be illegal globally by 2029.

  Tasks:
  1. Write the keynote talk (45 min + Q&A). Structure around the 3
     most provocative theses about the future of outbound email.
     Include: the opening that grabs 3,000 sales leaders' attention,
     the supporting data, the counter-arguments, and the call to
     action.

  2. Address the "AI agent" trend. If buyers deploy AI agents to
     filter vendor outreach, what does that mean for email
     sequences? Write the section that explores "agent-to-agent"
     sales — where your AI generates emails and their AI decides
     whether the human sees them.

  3. Write the "5-Year Outbound Playbook" for a VP of Sales reading
     your report. What should they invest in today to be ready for
     2030? What should they stop doing? What new capabilities should
     they build? Make it actionable, not theoretical.

  4. The report's most controversial section: "The Death of Cold
     Email." Write the evidence-based argument that cold email in
     its current form will be obsolete by 2029, AND write the
     counterargument that it will evolve rather than die. Present
     both honestly and take a position.

assertions:
  - type: llm_judge
    criteria: "Keynote is provocative and grounded — opens with an attention-grabbing thesis, presents 3 arguments supported by the trend data, acknowledges counter-arguments, and ends with a specific call to action for the audience"
    weight: 0.25
    description: "Provocative grounded keynote"
  - type: llm_judge
    criteria: "Agent-to-agent analysis is thoughtful — explores the implications of AI-filtered inboxes seriously, considers what makes a message pass AI filters, and addresses the strategic implications for sales teams"
    weight: 0.25
    description: "Thoughtful agent-to-agent analysis"
  - type: llm_judge
    criteria: "5-year playbook is actionable — provides specific investments to make today (multi-channel, video, community), things to stop (mass email, template-only approaches), and new capabilities to build, with clear reasoning"
    weight: 0.25
    description: "Actionable 5-year playbook"
  - type: llm_judge
    criteria: "Death vs. evolution debate is honest — presents strong evidence for both positions (regulation trends vs. channel resilience), takes a clear position while acknowledging the strongest counter-arguments"
    weight: 0.25
    description: "Honest death-vs-evolution debate"
