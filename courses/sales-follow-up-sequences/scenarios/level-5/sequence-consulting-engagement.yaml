meta:
  id: sequence-consulting-engagement
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Lead a consulting engagement to transform a client's email outreach capability — assess maturity, design strategy, implement systems, and measure outcomes"
  tags: [sales, consulting, transformation, maturity-model, master]

state: {}

trigger: |
  You're a Principal Consultant at a revenue consulting firm.
  "EnterpriseMax" ($1.5B ARR, 800 reps, 50 countries) has hired
  you for an 8-month, $2M engagement to "fix outbound."

  Client situation:
  - 800 reps sending 25,000 emails/day across 50 countries
  - Overall meeting rate: 0.6% (industry benchmark: 1.2%)
  - Reply rate: 2.8% (benchmark: 5.5%)
  - No centralized sequence strategy — each of 15 regional teams
    operates independently
  - 5 different email tools in use across regions
  - Compliance violations in 3 countries discovered in audit
  - Top SDR performers are 8x more productive than bottom performers
  - $12M annual investment in outbound infrastructure and team
  - Board mandate: "Double outbound pipeline or sunset the function"

  Discovery findings (from 60 interviews + data analysis):
  - Best sequences are in the US and UK (built by 2 exceptional
    SDR managers who may leave)
  - Worst are in APAC where sequences are US templates translated
    (culturally inappropriate)
  - No shared learnings — winning approaches in one region aren't
    known to others
  - Legal has been "shouting into the void" about compliance for
    2 years
  - Attribution is a mess — no one agrees on how to measure
    outbound's contribution to revenue

  Tasks:
  1. Present the Outreach Maturity Assessment. Score EnterpriseMax
     on a 5-level model across 10 dimensions (content, process,
     tools, analytics, compliance, talent, personalization,
     multi-channel, cultural adaptation, attribution). Where are
     they today and where do they need to be in 8 months?

  2. Design the 8-month transformation roadmap. What are the 4
     phases? How do you sequence changes across 50 countries without
     disrupting current pipeline? Address the risk of the 2
     exceptional managers leaving (knowledge concentration risk).

  3. Build the financial model. The board wants to see: current
     cost per meeting ($X), target cost per meeting ($Y), and the
     investment needed to close the gap. If you double pipeline
     from outbound, what's the revenue impact? Present the 3-year
     ROI of the $2M engagement + implementation costs.

  4. Design the "Centers of Excellence" model — regional hubs that
     maintain global standards while enabling local adaptation.
     How many CoEs? Where are they? What do they do? How do they
     share best practices?

assertions:
  - type: llm_judge
    criteria: "Maturity assessment is granular and evidence-based — scores across 10 dimensions with specific evidence, identifies critical gaps (compliance, attribution, cultural adaptation), and sets realistic 8-month targets"
    weight: 0.25
    description: "Evidence-based maturity assessment"
  - type: llm_judge
    criteria: "Roadmap manages risk and change — phases transformation to maintain pipeline, addresses knowledge concentration risk from the 2 exceptional managers, and adapts approach for 50-country complexity"
    weight: 0.25
    description: "Risk-managed transformation roadmap"
  - type: llm_judge
    criteria: "Financial model satisfies the board — clearly shows current cost per meeting vs. target, quantifies revenue impact of doubled pipeline, and presents credible 3-year ROI with conservative assumptions"
    weight: 0.25
    description: "Board-satisfying financial model"
  - type: llm_judge
    criteria: "CoE model balances global and local — defines hub locations, staffing, responsibilities, and cross-regional knowledge sharing mechanisms while allowing cultural and compliance adaptation per region"
    weight: 0.25
    description: "Global-local CoE model"
