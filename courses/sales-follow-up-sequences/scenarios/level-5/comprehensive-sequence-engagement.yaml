meta:
  id: comprehensive-sequence-engagement
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Execute a comprehensive outbound transformation combining strategy, technology, psychology, analytics, and organizational design in a high-stakes multi-quarter initiative"
  tags: [sales, comprehensive, shift-simulation, transformation, master]

state: {}

trigger: |
  You're the newly appointed Chief Commercial Officer at "NexusReach"
  ($900M ARR, 500 reps, 35 countries, preparing for IPO in 20
  months). The board hired you to "build a predictable, scalable,
  world-class outbound engine." Your assessment reveals outbound
  email is both the biggest opportunity and the biggest risk.

  Assessment findings:

  Financial scope:
  - Outbound function cost: $45M/year (reps, tools, ops, content)
  - Pipeline generated: $900M/year (18% conversion = $162M revenue)
  - Each 1% improvement in conversion = $9M revenue
  - CAC for outbound: $28K (rising 15% YoY, concerning for IPO)

  Root causes (ranked by impact):
  1. No unified platform — 6 tools across regions, no shared data
  2. Personalization at 18% — 82% of emails are generic templates
  3. Email only — 94% of sequence touchpoints are email
  4. No engagement-based forecasting — email data disconnected from
     pipeline
  5. Compliance gaps — GDPR, LGPD, PIPL issues in 8 countries
  6. Declining effectiveness — reply rates down 30% over 18 months
  7. AI opportunity missed — no AI adoption despite competitor moves
  8. Analytics void — no cross-regional performance benchmarking
  9. Cultural mismatch — US sequences used globally
  10. Talent crisis — 45% SDR attrition, losing best performers

  Stakeholder map:
  - CEO: "Fix this before IPO. Budget: $8M over 20 months."
  - CFO: "Show quarterly improvement in CAC ratio."
  - Board: "Revenue predictability must reach 80+ before S-1 filing."
  - Regional VPs (5): "Don't impose US practices on our markets."
  - 500 reps: Range from enthusiastic to hostile about change
  - Legal/DPO: "Compliance is not optional. Fix it now."

  Tasks:
  1. Design the 20-month "Outbound Excellence Transformation" — a
     phased initiative addressing all 10 root causes. Phase 1
     (months 1-5): Foundation. Phase 2 (months 6-10): Scale.
     Phase 3 (months 11-15): Optimize. Phase 4 (months 16-20):
     Innovate. For each: objectives, investments, expected impact,
     and risk factors.

  2. Build the organizational model. Design the Outbound Center of
     Excellence: org structure, roles, hiring sequence, and
     interactions with Sales, Marketing, Legal, IT, and Regional
     VPs. How do you allocate $8M across 20 months?

  3. Create the change management strategy for 500 reps across 35
     countries. Address: tool migration, process standardization,
     cultural adaptation, compliance training, and the hostile-to-
     change segment. How do you achieve 80%+ adoption within 12
     months?

  4. Design the IPO-readiness dashboard. The board needs outbound
     to demonstrate: revenue predictability, declining CAC, rising
     efficiency, and compliance. Create the monthly reporting
     package, the early warning system, and the narrative that
     connects outbound excellence to company valuation.

  5. Write the 2-page memo to the CEO summarizing the entire plan.
     This is the document she'll share with the board at the next
     meeting.

assertions:
  - type: llm_judge
    criteria: "20-month plan addresses all root causes in logical phases — foundation builds platform and compliance, scale extends to all regions, optimize uses data and AI, innovate pushes frontiers, each with realistic milestones"
    weight: 0.20
    description: "Logically phased transformation"
  - type: llm_judge
    criteria: "Organizational model is right-sized for scope — proposes appropriate CoE structure with headcount and roles justified against $8M budget, clear interactions with all stakeholder groups"
    weight: 0.20
    description: "Right-sized CoE model"
  - type: llm_judge
    criteria: "Change management handles 35-country complexity — includes regional adaptation, addresses hostile reps with data and incentives, manages tool migration without disrupting active selling, and hits 80% adoption target"
    weight: 0.20
    description: "35-country change management"
  - type: llm_judge
    criteria: "IPO dashboard connects outbound to valuation — tracks CAC trends, revenue predictability, compliance status, and efficiency metrics in a format suitable for board review and investor scrutiny"
    weight: 0.20
    description: "Valuation-connected IPO dashboard"
  - type: llm_judge
    criteria: "CEO memo is executive-ready — 2 pages that are compelling, data-driven, honest about risks, and demonstrate urgency aligned with IPO timeline, suitable for board distribution"
    weight: 0.20
    description: "Executive-ready CEO memo"
