meta:
  id: behavioral-science-sequences
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Apply behavioral science to email sequences — leverage cognitive biases, persuasion psychology, and decision science to design more effective outreach"
  tags: [sales, behavioral-science, psychology, persuasion, decision-science, master]

state: {}

trigger: |
  You're a behavioral scientist hired by "PersuasionTech" ($220M
  ARR) to apply decision science to their email sequences. Their
  current sequences are written by sales reps with no formal
  understanding of cognitive psychology. You've been given access
  to their data and asked to redesign sequences using evidence-based
  principles.

  Current sequence performance:
  - Cold outbound reply rate: 3.8%
  - Post-demo follow-up reply rate: 18%
  - Re-engagement reply rate: 4.2%
  - Break-up email reply rate: 6.8% (highest of all follow-ups — why?)

  Behavioral science principles to apply:
  1. Social Proof: People follow similar others under uncertainty
  2. Reciprocity: People feel obligated to return favors
  3. Scarcity: Perceived limited availability increases value
  4. Commitment/Consistency: Small commitments lead to larger ones
  5. Authority: People defer to credible experts
  6. Liking: People say yes to those they like (similarity, praise)
  7. Loss Aversion: Losses hurt 2x more than equivalent gains
  8. Peak-End Rule: People remember the best/worst moment and the end
  9. Cognitive Fluency: Easy-to-process information is perceived as
     more truthful and trustworthy
  10. Zeigarnik Effect: Incomplete tasks create mental tension that
      motivates closure

  Your analysis of why break-up emails work better:
  - They trigger loss aversion (prospect is "losing" the opportunity)
  - They apply the Zeigarnik Effect (the conversation feels unfinished)
  - They use scarcity (last chance to engage)
  - They reduce cognitive load (simple binary decision: respond or don't)

  Tasks:
  1. Design the "Behavioral Sequence Architecture" — a framework that
     applies all 10 principles across a 7-email sequence. Map which
     principle is applied at which position and why. Show how the
     sequence builds psychological momentum from email 1 to 7.

  2. Rewrite a standard cold email sequence using behavioral science.
     Current emails just pitch features. Write all 7 emails showing
     which principles each leverages. Include: the control (current)
     and the treatment (behavioral) for emails 1, 4, and 7.

  3. The break-up email insight is your most interesting finding.
     Design a "reverse-engineered" sequence that applies break-up
     email psychology (loss aversion, Zeigarnik, scarcity) EARLIER
     in the sequence without actually being a break-up email. How
     do you activate these principles at positions 2, 3, and 4?

  4. Write the "Ethics of Behavioral Influence in Email" framework.
     Where's the line between ethical persuasion (making your value
     clear) and manipulation (creating false urgency, fabricating
     social proof)? Provide specific examples in email context.

assertions:
  - type: llm_judge
    criteria: "Behavioral architecture is sequential and building — maps principles across 7 positions in a logical progression (early emails use reciprocity/liking, middle use social proof/authority, late use scarcity/loss aversion) with clear rationale"
    weight: 0.25
    description: "Sequential behavioral architecture"
  - type: llm_judge
    criteria: "Rewritten emails demonstrate principles in action — control vs. treatment comparisons show clear differences, each email explicitly leverages named principles, and the writing feels natural not academic"
    weight: 0.25
    description: "Principle-demonstrating rewrites"
  - type: llm_judge
    criteria: "Break-up psychology applied earlier is creative — finds ways to trigger loss aversion and Zeigarnik effect in positions 2-4 without being a break-up email (perhaps through time-limited insights, incomplete data, or exclusivity framing)"
    weight: 0.25
    description: "Creative early break-up psychology"
  - type: llm_judge
    criteria: "Ethics framework is specific to email — distinguishes ethical uses (genuine scarcity, real social proof, truthful urgency) from manipulation (fabricated deadlines, fake testimonials, artificial limits) with email-specific examples"
    weight: 0.25
    description: "Email-specific ethics framework"
