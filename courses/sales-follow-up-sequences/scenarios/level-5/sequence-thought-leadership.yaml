meta:
  id: sequence-thought-leadership
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Develop thought leadership on email sequence excellence — conduct original research, publish findings, and build a body of work that advances the field"
  tags: [sales, thought-leadership, research, publishing, master]

state: {}

trigger: |
  You're a recognized expert in B2B email outreach. You've conducted
  the largest study ever on sales follow-up email sequences: 500,000
  emails across 200 companies over 2 years. Your findings challenge
  many "best practices" that sales leaders take for granted.

  Key findings (some controversial):

  1. The "More Touches = More Meetings" myth: Sequences with 5-6
     steps outperform 8+ step sequences by 34%. But the industry
     keeps building longer sequences because tool vendors incentivize
     volume over quality.

  2. Personalization has a cliff: Reply rates increase linearly with
     personalization up to "moderate" level (company + role reference),
     then plateau. "Deep" personalization (referencing specific
     LinkedIn posts, personal details) doesn't improve reply rates
     and sometimes decreases them (uncanny valley effect).

  3. The "Tuesday at 10am" myth: Optimal send time varies by persona,
     not by day. CTOs respond best at 7am (before meetings), CFOs at
     5pm (after meetings), VPs of Sales at 12pm (between calls).
     Generic "best time" advice is noise.

  4. Phone + email timing: A phone call within 2 hours of an email
     open increases reply probability by 340%. But only 4% of SDRs
     act on real-time open notifications.

  5. The "Break-Up Email" is the most effective email in any
     sequence — and it works because it's the only email that
     genuinely respects the prospect's autonomy (psychological
     reactance theory).

  6. Email sequences are 40% less effective than they were 3 years
     ago across every metric (open rate, reply rate, meeting rate),
     even controlling for personalization and quality.

  Tasks:
  1. Write the executive summary of the research report (3 pages).
     Present all 6 findings with context, implications, and
     recommendations. Handle finding #6 (declining effectiveness)
     carefully — the industry is heavily invested in email sequences.

  2. Finding #5 (break-up email + psychological reactance) is your
     most original contribution. Develop this concept fully:
     explain the theory, show the data, propose the practical
     framework, and describe how to apply reactance theory across
     ALL positions in a sequence, not just the break-up.

  3. Write the keynote abstract (200 words) and the 3 most
     provocative slide titles for a presentation at SaaStr Annual
     (5,000 attendees). Your talk is called "Everything You Know
     About Email Sequences Is Wrong."

  4. Design the "Sequence Effectiveness Benchmark" — an annual study
     methodology that companies can use to compare their sequence
     performance against peers. Define: dimensions, data collection,
     scoring, and the benchmark report template.

assertions:
  - type: llm_judge
    criteria: "Executive summary presents findings with nuance — each finding includes the data, the challenged assumption, the practical implication, and recommendation, with the declining effectiveness finding handled honestly but constructively"
    weight: 0.25
    description: "Nuanced executive summary"
  - type: llm_judge
    criteria: "Reactance theory section is fully developed — explains psychological reactance clearly, connects it to break-up email data, and proposes a practical framework for applying autonomy-respecting principles across all sequence positions"
    weight: 0.25
    description: "Fully developed reactance theory"
  - type: llm_judge
    criteria: "Keynote materials are provocative — abstract creates curiosity and urgency, slide titles challenge accepted wisdom in ways that would make 5,000 sales leaders want to attend"
    weight: 0.25
    description: "Provocative keynote materials"
  - type: llm_judge
    criteria: "Benchmark methodology is replicable — defines clear dimensions, practical data collection methods, objective scoring, and a reporting format that enables meaningful year-over-year and peer comparison"
    weight: 0.25
    description: "Replicable benchmark methodology"
