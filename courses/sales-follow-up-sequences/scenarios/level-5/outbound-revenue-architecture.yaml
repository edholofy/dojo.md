meta:
  id: outbound-revenue-architecture
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Architect the outbound function within a revenue operations framework — align sequences with pipeline stages, forecast accuracy, and revenue predictability"
  tags: [sales, revenue-architecture, revops, pipeline, forecasting, master]

state: {}

trigger: |
  You're the Chief Revenue Officer at "PredictableIO" ($600M ARR,
  IPO planned in 18 months). The board requires "revenue
  predictability" and your outbound email function is the most
  unpredictable part of your revenue engine.

  Current state:
  - Outbound generates 35% of pipeline ($420M of $1.2B total)
  - But outbound pipeline converts at only 15% vs. 25% for inbound
  - Forecast accuracy on outbound-sourced deals: 38% (vs. 68% for
    inbound)
  - SDR-sourced meetings: highly variable month-to-month (±40%)
  - Follow-up sequence engagement doesn't correlate with forecast
    category (a deal can be "commit" with zero email engagement)

  Data showing the disconnects:
  - Deals where prospect engaged with 3+ sequence emails: 28% close
    rate
  - Deals where prospect ignored all sequence emails: 8% close rate
  - But: 40% of "commit" deals have zero sequence engagement
    (relying entirely on calls/meetings, email not tracked)
  - Sequence engagement is NOT included in the forecasting model
  - No one has connected email analytics to pipeline health

  Board expectations for IPO:
  - Revenue predictability score: 85+ (currently 58)
  - Forecast accuracy across all sources: 75%+ (currently 52%)
  - Outbound pipeline generation: consistent ±10% month-over-month
    (currently ±40%)
  - Clear attribution model that investors can understand

  Tasks:
  1. Diagnose why outbound is unpredictable. What causes the ±40%
     monthly variance in SDR meetings? What causes the 38% forecast
     accuracy on outbound deals? Propose the root causes with
     supporting data.

  2. Design the "Sequence-Informed Forecasting Model." How do you
     integrate email engagement data into the pipeline forecasting
     model? What email signals predict deal progression vs. stall?
     Create the scoring model that improves outbound forecast
     accuracy from 38% to 65%+.

  3. Build the "Outbound Predictability Engine" — the operational
     system that reduces monthly variance from ±40% to ±10%. What
     processes, metrics, and controls ensure consistent pipeline
     generation? Include the early warning system that detects
     variance before it hits the pipeline number.

  4. Write the "Outbound Revenue Architecture" section for the IPO
     S-1 risk factors and business description. How do you describe
     your outbound motion to investors in a way that conveys
     sophistication and predictability? Draft the investor-facing
     language.

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies root causes of variance — explains that ±40% comes from inconsistent SDR activity, seasonality, territory quality variation, and lack of pipeline coverage metrics, with data supporting each cause"
    weight: 0.25
    description: "Variance root-cause diagnosis"
  - type: llm_judge
    criteria: "Forecasting model integrates email signals — uses engagement data (opens, replies, section views, forwarding) as leading indicators for deal health, with clear methodology for scoring and calibration"
    weight: 0.25
    description: "Email-informed forecasting model"
  - type: llm_judge
    criteria: "Predictability engine has operational controls — includes consistent activity requirements, pipeline coverage targets, early warning metrics, and management cadence that catches variance before it materializes"
    weight: 0.25
    description: "Operational predictability engine"
  - type: llm_judge
    criteria: "Investor language conveys sophistication — describes the outbound function in terms investors understand (predictable, measurable, scalable) without jargon, suitable for S-1 business description"
    weight: 0.25
    description: "Investor-appropriate language"
