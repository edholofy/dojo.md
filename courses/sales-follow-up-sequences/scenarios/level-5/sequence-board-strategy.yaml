meta:
  id: sequence-board-strategy
  level: 5
  course: sales-follow-up-sequences
  type: output
  description: "Present outbound email strategy to the board of directors — connect email operations to company valuation, revenue predictability, and market positioning"
  tags: [sales, board, investor, valuation, strategy, master]

state: {}

trigger: |
  You're the CRO of "ScaleCloud" ($500M ARR, publicly traded, $6B
  market cap). Your stock is down 22% after missing revenue targets
  for 2 consecutive quarters. The board has scheduled a special
  session on "Revenue Execution" and you need to present the outbound
  email strategy as part of the recovery plan.

  Board context:
  - Two activist investors have taken positions in the stock
  - Analysts are questioning your "go-to-market efficiency"
  - Your CAC ratio has worsened from 1.2 to 1.8 over 4 quarters
  - Outbound is your largest customer acquisition channel (42% of
    new logo revenue) but efficiency is declining
  - The board is considering whether to invest more in outbound or
    shift to product-led growth

  Your outbound data:
  - 300 reps involved in outbound (SDR + AE)
  - $35M annual investment in outbound function
  - Pipeline generated: $700M/year (20% conversion = $140M revenue)
  - CAC for outbound-sourced deals: $25K (was $18K two years ago)
  - CAC for PLG-sourced deals: $8K (but PLG only generates 15% of
    new logo revenue currently)
  - Outbound efficiency declining: cost per meeting up 38%, reply
    rates down 28%, meeting quality down 15%

  Board member perspectives:
  - Activist Investor 1: "Cut outbound by 40%. PLG is the future."
  - Activist Investor 2: "The CAC problem is an execution problem,
    not a strategy problem. Fix execution."
  - Former CEO: "You can't cut your way to growth. Invest in making
    outbound more efficient with AI."
  - Independent 1: "Show me the data. What's the optimal allocation
    between outbound and PLG?"
  - Independent 2: "What are our competitors doing? Are they seeing
    the same outbound decline?"

  Tasks:
  1. Write the board presentation (10 slides with talking points).
     Address each board member's perspective without being
     defensive. Present the honest diagnosis, the recovery plan,
     and the investment case.

  2. Build the "Outbound vs. PLG Investment Model" that answers
     Independent 1's question. If you shift $10M from outbound to
     PLG, what happens to revenue? If you invest $5M in AI-powered
     outbound efficiency, what happens? Model 3 scenarios with
     clear assumptions.

  3. Address Activist Investor 1's "cut 40%" proposal with data.
     Build the counter-case: what would ScaleCloud lose if outbound
     were cut 40%? Which customer segments would be unreachable?
     What's the revenue impact in quarters 1-4 after the cut?

  4. Design the "Revenue Efficiency Dashboard" the board reviews
     quarterly. Include: outbound CAC trends, efficiency metrics,
     channel allocation performance, and the leading indicators
     that predict next quarter's revenue before it materializes.

assertions:
  - type: llm_judge
    criteria: "Board presentation is honest and strategic — diagnoses the efficiency decline without excuses, addresses each board member's perspective with data, and presents a credible recovery plan with clear milestones"
    weight: 0.25
    description: "Honest strategic board presentation"
  - type: llm_judge
    criteria: "Investment model compares channels fairly — models outbound vs. PLG reallocation with clear assumptions about ramp time, conversion rates, and segment coverage, showing that the optimal answer is a calibrated mix"
    weight: 0.25
    description: "Fair channel investment model"
  - type: llm_judge
    criteria: "Counter-case to 40% cut is data-driven — quantifies the revenue loss from cutting outbound by segment (enterprise can't be reached by PLG), models the ramp time for PLG to replace lost pipeline, and shows the quarterly revenue impact"
    weight: 0.25
    description: "Data-driven counter to cuts"
  - type: llm_judge
    criteria: "Efficiency dashboard rebuilds trust — includes leading indicators (activity metrics, CAC trends, conversion rates) alongside lagging indicators (revenue, pipeline), with clear thresholds that trigger board escalation"
    weight: 0.25
    description: "Trust-rebuilding efficiency dashboard"
