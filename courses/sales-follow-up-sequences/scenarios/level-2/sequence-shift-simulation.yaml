meta:
  id: sequence-shift-simulation
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Apply intermediate sequence skills in a combined scenario — build and optimize a complete multi-channel sequence strategy for a real pipeline situation"
  tags: [sales, follow-up, shift-simulation, intermediate]

state: {}

trigger: |
  You're a Senior SDR at "RevStack" (revenue intelligence SaaS, $65M
  ARR). It's the beginning of Q3 and your manager gives you a target
  list of 50 accounts to work this quarter. You need to design the
  complete outreach and follow-up strategy.

  Your target list breakdown:
  - 15 "hot" accounts: Showed intent signals in the last 30 days
    (pricing page visits, G2 reviews, content downloads)
  - 20 "warm" accounts: Had some prior engagement (attended a
    webinar, met at a conference, or responded to a previous
    campaign but didn't convert)
  - 15 "cold" accounts: Fit your ICP perfectly but no prior
    engagement

  Your quota: Book 30 qualified meetings this quarter (10/month)
  - Historical conversion rates: Hot = 15% meeting rate, Warm = 8%,
    Cold = 3%
  - Expected from current list: Hot (15 × 15% = 2.3) + Warm (20 ×
    8% = 1.6) + Cold (15 × 3% = 0.5) = 4.4 meetings from first
    touch alone
  - Gap: You need 30 meetings but first-touch only yields ~4.4
  - Follow-up sequences are how you close the gap

  Available channels: Email, LinkedIn (Sales Navigator), phone
  (with parallel dialer), personalized video (Loom)

  Constraints:
  - Max 40 emails/day (deliverability limit)
  - Max 25 LinkedIn actions/day (platform limit)
  - Max 60 calls/day (time limit with dialer)
  - You have 4 hours/day for outreach (rest is meetings, admin, etc.)

  Tasks:
  1. Design the sequence strategy for all 3 account tiers. How many
     touchpoints per tier? What channels per tier? What's the time
     investment per account? Show the math that gets you to 30
     meetings with the daily activity constraints.

  2. Build the complete sequence for "hot" accounts (your highest-
     converting tier). Map a 14-day, multi-channel sequence with
     specific touchpoints, timing, and messaging angles. Write the
     first email and the LinkedIn connection request message.

  3. Your warm accounts include 5 webinar attendees who asked
     questions during the Q&A. Design the personalized follow-up
     for these 5 that references their specific questions. Write
     one example email.

  4. After 6 weeks, you review your data: hot accounts converted
     at 20% (better than expected), warm at 6% (below expected),
     and cold at 4% (slightly above). You've booked 18 meetings
     with 6 weeks left. Redesign your strategy for the remaining
     6 weeks to hit 30.

assertions:
  - type: llm_judge
    criteria: "Tier strategy is mathematically sound — shows realistic calculations for reaching 30 meetings across 3 tiers, accounts for multi-touch conversion uplift, and stays within daily activity constraints"
    weight: 0.25
    description: "Mathematically sound strategy"
  - type: llm_judge
    criteria: "Hot account sequence leverages intent signals — uses specific intent data (pricing page, G2 reviews) as conversation starters, combines channels effectively over 14 days, with compelling first email and LinkedIn message"
    weight: 0.25
    description: "Intent-leveraging hot sequence"
  - type: llm_judge
    criteria: "Webinar follow-ups are genuinely personalized — references specific Q&A questions as the hook, not just 'thanks for attending,' with example email that demonstrates question-specific messaging"
    weight: 0.25
    description: "Question-specific webinar follow-ups"
  - type: llm_judge
    criteria: "Mid-quarter adjustment is strategic — reallocates effort based on actual conversion data (more to hot/cold which overperformed, redesigns warm approach), with a credible plan to book 12 more meetings in 6 weeks"
    weight: 0.25
    description: "Data-driven mid-quarter adjustment"
