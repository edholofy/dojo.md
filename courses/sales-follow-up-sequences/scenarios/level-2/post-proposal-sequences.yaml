meta:
  id: post-proposal-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build post-proposal follow-up sequences — maintain momentum after sending a proposal, handle objections, and drive the deal to close"
  tags: [sales, post-proposal, closing, objection-handling, intermediate]

state: {}

trigger: |
  You're an Account Executive at "WorkflowMax" (business process
  automation, $70M ARR). You sent proposals to 3 different prospects
  last week. Each is in a different state and needs a different
  follow-up approach.

  Deal 1: "TechStart" — $45K ACV proposal sent 5 days ago
  - Prospect: VP of Operations, strong champion
  - Proposal opened 6 times by 3 different people (good signal)
  - But: no response to your "any questions?" email sent 2 days ago
  - Intelligence: Champion told you informally that the CEO is
    comparing your price to a cheaper competitor (Zapier)
  - Decision timeline: They want to decide by end of month (18 days)

  Deal 2: "LegalPro" — $80K ACV proposal sent 8 days ago
  - Prospect: Managing Partner at a 50-attorney law firm
  - Proposal opened once for 2 minutes, then not opened again
  - Your follow-up email was not opened
  - The Managing Partner said in the demo: "This looks good but I
    need to get my partners on board, and they hate change"
  - Decision timeline: "Sometime in Q2" (no firm date)

  Deal 3: "RetailChain" — $120K ACV proposal sent 3 days ago
  - Prospect: CTO, procurement also involved
  - Proposal opened by CTO (12 minutes reading — very thorough)
  - CTO replied: "Looks good overall. A few concerns: (1) your
    implementation timeline seems aggressive, (2) we need to see
    references in retail, (3) the pricing for the API add-on is
    higher than expected."
  - Decision timeline: Board meeting in 3 weeks

  Tasks:
  1. For Deal 1 (opened 6 times, no response): Design the follow-up
     sequence that addresses the competitive price comparison without
     the champion having told you officially. Write the next 3
     emails, spaced appropriately.

  2. For Deal 2 (minimal engagement, internal resistance): Diagnose
     why the proposal isn't gaining traction and design the re-
     engagement approach. Write the email that helps the Managing
     Partner sell internally to resistant partners.

  3. For Deal 3 (CTO replied with concerns): Write the response
     email addressing all 3 concerns. Then design the sequence from
     this response through the board meeting in 3 weeks.

  4. Create the "Post-Proposal Engagement Score" — a framework that
     uses proposal analytics (opens, time spent, viewers, sections
     viewed) to predict deal health and trigger the right follow-up
     action.

assertions:
  - type: llm_judge
    criteria: "Deal 1 sequence addresses price competition indirectly — reinforces value and TCO without explicitly mentioning the competitor or revealing champion's intel, using content that naturally counters a low-price alternative"
    weight: 0.25
    description: "Indirect competitive counter"
  - type: llm_judge
    criteria: "Deal 2 approach enables internal selling — provides the Managing Partner with ammunition for resistant partners (one-pagers, ROI summary, peer references from law firms) rather than just following up with him"
    weight: 0.25
    description: "Internal-selling enablement"
  - type: llm_judge
    criteria: "Deal 3 response addresses all 3 concerns specifically — provides a realistic implementation timeline adjustment, retail references, and API pricing justification or creative alternative, maintaining momentum toward the board meeting"
    weight: 0.25
    description: "Three-concern response"
  - type: llm_judge
    criteria: "Engagement score framework is actionable — maps proposal analytics signals (open frequency, view duration, multiple viewers, section focus) to deal health categories and specific follow-up actions for each"
    weight: 0.25
    description: "Actionable engagement scoring"
