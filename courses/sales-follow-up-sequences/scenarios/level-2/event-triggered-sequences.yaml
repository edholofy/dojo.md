meta:
  id: event-triggered-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build event-triggered follow-up sequences — design automated emails that fire based on prospect behavior, company events, and buying signals"
  tags: [sales, automation, triggers, behavioral, signals, intermediate]

state: {}

trigger: |
  You're the Demand Generation Manager at "SignalSaaS" (intent data
  platform, $50M ARR). Your sales team currently sends all follow-ups
  manually. You've been asked to design event-triggered sequences
  that fire automatically when specific buyer signals occur.

  Available trigger events from your tech stack:
  1. Website: Prospect visits pricing page (high intent)
  2. Website: Prospect views 3+ case studies in one session
  3. Content: Prospect downloads a whitepaper or eBook
  4. Product: Free trial signup
  5. Product: Trial user hits a usage milestone (e.g., creates 10th
     report)
  6. Email: Prospect opens a previous email 3+ times without replying
  7. LinkedIn: Prospect views your company page or a rep's profile
  8. Company: Prospect's company posts a new job listing in your
     category (e.g., "hiring a data analyst" = signal for analytics
     tools)
  9. Company: Prospect's company announces funding or earnings
  10. CRM: Deal has been in current stage for 14+ days (stalled)

  Current manual approach:
  - SDRs check intent signals once a day (if they remember)
  - Average response time to a high-intent signal: 26 hours
  - Only 40% of pricing page visitors get a follow-up within 48 hours
  - Trial signup → first human email: average 3 days

  Tasks:
  1. For each of the 10 trigger events, design the automated
     response: what email gets sent (or what task gets created for
     a human), the timing (how fast), the message framework, and
     the escalation if no response.

  2. Not all triggers are equal. Rank the 10 triggers by intent
     strength (1 = highest buying intent). Explain your ranking.
     Design different response urgency levels for each tier.

  3. Write the actual emails for the top 3 highest-intent triggers.
     These fire within minutes of the trigger event. They must feel
     personal (not automated) while being scalable.

  4. Design the "Signal Overload" rules — when multiple triggers fire
     for the same prospect within 24 hours (e.g., visits pricing
     page AND downloads whitepaper AND views 3 case studies), how
     do you prevent sending 3 automated emails? Build the
     deduplication and prioritization logic.

assertions:
  - type: llm_judge
    criteria: "Trigger responses are proportional to intent — pricing page visits get faster, more direct responses than job posting signals, with appropriate mix of automated emails and human tasks based on signal strength"
    weight: 0.25
    description: "Intent-proportional responses"
  - type: llm_judge
    criteria: "Intent ranking is logical and defended — explains why direct product engagement (pricing page, trial milestone) ranks higher than passive signals (job postings, profile views), with clear reasoning"
    weight: 0.25
    description: "Logical intent ranking"
  - type: llm_judge
    criteria: "Top 3 trigger emails feel personal — reference the specific action the prospect took naturally without saying 'I saw you visited our pricing page,' while still being relevant and timely"
    weight: 0.25
    description: "Personal-feeling trigger emails"
  - type: llm_judge
    criteria: "Signal overload rules prevent email fatigue — includes deduplication logic, priority-based suppression, cooling-off periods, and consolidation of multiple signals into a single response when appropriate"
    weight: 0.25
    description: "Fatigue-preventing signal rules"
