meta:
  id: re-engagement-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build re-engagement sequences for prospects who went dark — use trigger events, new value, and creative approaches to restart stalled conversations"
  tags: [sales, re-engagement, ghosting, win-back, trigger-events, intermediate]

state: {}

trigger: |
  You're a Senior AE at "CloudOps" (infrastructure monitoring SaaS,
  $60M ARR). Your pipeline review revealed 12 deals that went dark
  in the last 90 days. Your manager wants you to build re-engagement
  sequences for the 4 highest-value opportunities.

  Stalled Deal 1: "FastLogistics" — $85K ACV, went dark 45 days ago
  - Last activity: Proposal sent, champion (VP of Engineering) said
    "we're putting this on hold for Q1 planning"
  - Trigger event: You just saw on LinkedIn that FastLogistics hired
    a new CTO from AWS
  - Competitor: Was evaluating Datadog alongside you

  Stalled Deal 2: "FinanceFlow" — $120K ACV, went dark 60 days ago
  - Last activity: Completed technical evaluation, passed security
    review, but CFO froze all new spend during budget cuts
  - Trigger event: FinanceFlow just announced Q4 earnings beat
    expectations, stock up 15%
  - They were 90% through your sales process

  Stalled Deal 3: "HealthNet" — $65K ACV, went dark 30 days ago
  - Last activity: Demo went well but champion (Director of IT)
    stopped responding after you sent the proposal
  - Trigger event: None — no public news, no LinkedIn activity from
    the champion
  - You suspect they may be evaluating your competitor (New Relic)

  Stalled Deal 4: "EdTech" — $40K ACV, went dark 90 days ago
  - Last activity: Had a great discovery call, they said "perfect
    timing, we're building a new infrastructure team"
  - Trigger event: You noticed they posted 3 DevOps job openings
    on their careers page
  - The original champion left the company 2 months ago

  Tasks:
  1. For each stalled deal, write the re-engagement email. Each must
     reference the trigger event (or address the lack of one for
     Deal 3) and provide a compelling reason to restart the
     conversation. Don't reference the silence awkwardly.

  2. For Deal 2 (FinanceFlow, 90% through process, budget freeze
     lifted): Design the 3-email re-engagement sequence that
     acknowledges the budget situation has changed without being
     presumptuous. How do you pick up where you left off without
     making them re-evaluate from scratch?

  3. For Deal 4 (champion left): Write the outreach to the new
     contact. You need to find the new stakeholder, introduce
     yourself, and rebuild the relationship. Write the research
     plan, the initial email, and the value proposition adjusted
     for a new audience who has no context.

  4. Create the "Re-engagement Playbook" — the decision framework
     for which stalled deals to prioritize and which to let go.
     What criteria determine whether a deal is worth re-engaging?

assertions:
  - type: llm_judge
    criteria: "Re-engagement emails use trigger events naturally — each email leads with the relevant trigger (new CTO, earnings beat, job postings) as the reason for reaching out, without awkwardly referencing the silence"
    weight: 0.25
    description: "Trigger-event-driven re-engagement"
  - type: llm_judge
    criteria: "FinanceFlow sequence is tactful — acknowledges changed budget situation without being presumptuous or celebratory about their earnings, and positions picking up where they left off as easy and low-effort"
    weight: 0.25
    description: "Tactful budget-change sequence"
  - type: llm_judge
    criteria: "Champion-left outreach rebuilds from zero — includes a research plan to identify the new contact, an introduction email that doesn't assume prior context, and a repositioned value proposition for a fresh audience"
    weight: 0.25
    description: "Zero-context champion replacement"
  - type: llm_judge
    criteria: "Prioritization framework is data-driven — uses criteria like deal size, stage reached, trigger event quality, champion status, and competitive risk to prioritize which stalled deals deserve re-engagement effort"
    weight: 0.25
    description: "Data-driven prioritization"
