meta:
  id: sequence-automation-tools
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Set up and optimize email sequence automation tools — configure Outreach, SalesLoft, or HubSpot sequences for maximum effectiveness"
  tags: [sales, automation, tools, outreach, salesloft, intermediate]

state: {}

trigger: |
  You're the Sales Enablement Manager at "FlowOps" ($40M ARR, 40
  AEs, 15 SDRs). The company just purchased Outreach.io and your
  CRO wants you to migrate from the current chaos (AEs using Gmail
  with no tracking, SDRs using a mix of Apollo and manual follow-ups)
  to a standardized sequence platform.

  Current state:
  - 55 reps, each with their own follow-up approach
  - No visibility into follow-up activity (managers can't see what's
    sent)
  - No A/B testing capability
  - Email deliverability issues (2 reps got their domains blacklisted
    last quarter from mass sends)
  - Average follow-up emails per rep: varies wildly (some send 1,
    some send 12)
  - No sequence templates — everyone writes from scratch

  Requirements:
  - Build 5 core sequence templates: cold outbound, post-meeting,
    post-demo, post-proposal, re-engagement
  - Set up deliverability guardrails (sending limits, bounce handling)
  - Create an analytics dashboard the managers can review weekly
  - Enable A/B testing on at least 2 sequences immediately
  - Train 55 reps in 2 weeks

  Tasks:
  1. Design the 5 core sequence templates. For each: name, purpose,
     number of steps, channels per step, timing between steps, and
     the exit criteria (when does the prospect leave the sequence?).
     Keep each template flexible enough for personalization but
     structured enough for consistency.

  2. Write the deliverability protection plan. What sending limits
     do you set per rep per day? How do you handle bounces? What
     domain warming strategy do you implement? What rules prevent
     the blacklisting incidents from happening again?

  3. Design the weekly analytics dashboard for sales managers. What
     8 metrics do they see? How are they organized? What benchmarks
     define "good" vs. "needs attention"? Include the layout with
     sections.

  4. Create the 2-week rollout plan for 55 reps. What's the training
     approach (not everyone can attend the same session)? How do
     you ensure adoption? What's the support plan for the first
     month? Address the likely resistance ("I don't want to use
     templates, my emails are better").

assertions:
  - type: llm_judge
    criteria: "Five sequence templates are distinct and practical — each has a clear purpose, appropriate step count, multi-channel touchpoints, and exit criteria that prevent prospects from being stuck in sequences indefinitely"
    weight: 0.25
    description: "Distinct practical templates"
  - type: llm_judge
    criteria: "Deliverability plan is comprehensive — includes daily/hourly sending limits, bounce threshold monitoring, domain warming, blacklist prevention rules, and escalation procedures when issues arise"
    weight: 0.25
    description: "Comprehensive deliverability plan"
  - type: llm_judge
    criteria: "Dashboard surfaces actionable metrics — includes activity metrics (emails sent, opened, replied), outcome metrics (meetings booked, sequence conversion), and quality metrics (bounce rate, unsubscribe rate) with clear benchmarks"
    weight: 0.25
    description: "Actionable manager dashboard"
  - type: llm_judge
    criteria: "Rollout plan addresses real adoption challenges — includes multiple training formats, handles 'my emails are better' resistance with data, provides ongoing support, and measures adoption metrics in the first month"
    weight: 0.25
    description: "Adoption-focused rollout"
