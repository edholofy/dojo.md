meta:
  id: trial-conversion-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build trial-to-paid conversion email sequences — nurture free trial users through onboarding, activation, and purchase decision with behavioral triggers"
  tags: [sales, trial, conversion, onboarding, behavioral-triggers, intermediate]

state: {}

trigger: |
  You're the Growth Marketing Manager at "DesignHub" (collaborative
  design tool, $45M ARR, product-led growth model). Your 14-day free
  trial converts at 8% (industry benchmark: 15-20%). The CEO wants
  you to redesign the trial email sequence.

  Trial data:
  - 3,000 new trials/month
  - Day 1: 72% log in and complete setup
  - Day 3: 45% have created their first project
  - Day 7: 28% have invited a team member (this is your activation
    metric — users who invite a team member convert at 34% vs. 4%
    for solo users)
  - Day 10: 18% are still active
  - Day 14: 12% reach trial end as active users
  - Trial-to-paid conversion: 8% overall

  Current email sequence (5 emails, sent to everyone):
  - Day 0: "Welcome to DesignHub!"
  - Day 3: "Getting started with your first project"
  - Day 7: "Check out our advanced features"
  - Day 11: "Your trial ends in 3 days"
  - Day 14: "Your trial has expired — upgrade now"

  Problem: These emails are the same for everyone regardless of
  what they've done (or haven't done) in the trial.

  User segments you can trigger from:
  - Signed up but never logged in
  - Logged in but didn't create a project
  - Created a project but working solo (no team invite)
  - Invited team and actively collaborating
  - Power user (10+ projects, 3+ team members)

  Tasks:
  1. Design the behavioral email sequence for each of the 5 user
     segments. For each segment: what emails do they get, when, and
     what's the goal of each email? Show how the sequences differ
     based on user behavior.

  2. Write the 3 most critical emails in the sequence:
     a) Day 1 email to the "signed up but never logged in" segment
     b) Day 5 email to the "created project but solo" segment
        (goal: get them to invite a team member)
     c) Day 11 email to the "actively collaborating" segment
        (goal: convert to paid)

  3. The activation metric is "invited a team member" (34% vs. 4%
     conversion). Design the email + in-app nudge strategy that
     doubles the Day 7 team invite rate from 28% to 50%.

  4. What metrics should you track for each email in the sequence?
     Create the email performance dashboard with the 6 metrics that
     matter most for trial conversion sequences.

assertions:
  - type: llm_judge
    criteria: "Behavioral sequences are truly different per segment — non-logged-in users get activation nudges, solo users get collaboration prompts, active users get conversion offers, each with distinct timing and messaging"
    weight: 0.25
    description: "Segment-differentiated sequences"
  - type: llm_judge
    criteria: "Three critical emails match their purpose — never-logged-in email creates urgency to start, solo-user email motivates team invitation with specific benefits, collaborating-user email presents conversion with value already demonstrated"
    weight: 0.25
    description: "Purpose-matched critical emails"
  - type: llm_judge
    criteria: "Team invite strategy combines email and in-app — doesn't rely on email alone but integrates in-app prompts, collaboration features, and social triggers to drive the activation metric"
    weight: 0.25
    description: "Multi-channel activation strategy"
  - type: llm_judge
    criteria: "Dashboard includes the right metrics — tracks beyond opens and clicks to include activation rate, segment progression, conversion by email touchpoint, and revenue attribution per sequence"
    weight: 0.25
    description: "Conversion-focused dashboard"
