meta:
  id: cold-outreach-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build effective cold outreach sequences — design multi-touch cadences that earn responses from prospects who don't know you"
  tags: [sales, cold-outreach, prospecting, cadence, intermediate]

state: {}

trigger: |
  You're an SDR at "PipelineAI" (AI-powered sales intelligence
  platform, $35M ARR). You're building cold outreach sequences for
  3 different Ideal Customer Profiles (ICPs). Your target: 5% reply
  rate (team average is 3.2%).

  ICP 1: VP of Sales at mid-market SaaS companies (100-500 employees)
  - They care about: pipeline visibility, forecast accuracy,
    rep productivity
  - Common tech stack: Salesforce, Outreach/SalesLoft, Gong
  - Their world right now: Budget pressure, headcount reductions,
    "do more with less" mandate
  - Available angles: Your AI predicts deal outcomes 3x more
    accurately than CRM-based forecasting. A competitor
    (Clari) just had a security incident last month.

  ICP 2: Director of Revenue Operations at high-growth startups
    (Series B-C, 50-200 employees)
  - They care about: data accuracy, process automation, reporting
  - Common tech stack: HubSpot, Apollo, Notion
  - Their world right now: Building the revenue engine, hiring fast,
    need to prove ops impact to leadership
  - Available angles: Your platform reduces manual data entry by
    80%. You integrate with HubSpot natively.

  ICP 3: Chief Revenue Officer at enterprise companies (1,000+
    employees)
  - They care about: board-ready forecasts, team performance,
    competitive intelligence
  - Their world right now: Earnings pressure, board scrutiny on
    efficiency, AI transformation mandate
  - Available angles: 3 of their competitors are already customers.
    Your CEO could do a peer-to-peer intro.

  Tasks:
  1. Design the complete cold outreach sequence for ICP 1 (VP of
     Sales, mid-market SaaS). Map out a 21-day, 8-touchpoint
     sequence across email, LinkedIn, and phone. For each
     touchpoint: day, channel, subject/message type, key angle.

  2. Write the first 3 emails for ICP 1. Email 1: initial cold
     email. Email 2: value-add follow-up (3 days later). Email 3:
     social proof follow-up (7 days later). Each under 100 words.

  3. How does the sequence change for ICP 3 (CRO, enterprise)?
     Explain the 5 key differences in approach when cold-emailing
     a C-level executive vs. a VP-level contact. Write the initial
     email for the CRO.

  4. Your manager says: "The best cold emails don't feel cold."
     Write the pre-outreach research checklist — the 10 things to
     look up before writing a cold email that makes it feel warm.

assertions:
  - type: llm_judge
    criteria: "21-day sequence is well-paced and multi-channel — distributes 8 touchpoints across email, LinkedIn, and phone with appropriate spacing, varied angles, and escalating approaches without being aggressive"
    weight: 0.25
    description: "Well-paced multi-channel sequence"
  - type: llm_judge
    criteria: "Three emails are distinct and under 100 words — Email 1 opens cold with a relevant hook, Email 2 adds value without repeating the pitch, Email 3 uses social proof from peers, each with clear CTAs"
    weight: 0.25
    description: "Distinct concise cold emails"
  - type: llm_judge
    criteria: "CRO adjustments are meaningful — identifies real differences for executive outreach (shorter emails, peer-level language, strategic framing, less frequent cadence, CEO involvement) and the CRO email demonstrates these differences"
    weight: 0.25
    description: "Meaningful executive adjustments"
  - type: llm_judge
    criteria: "Research checklist enables warm-feeling outreach — includes specific sources (LinkedIn, earnings calls, job postings, tech stack tools, news) that provide genuine personalization angles beyond just name and company"
    weight: 0.25
    description: "Warm-outreach research checklist"
