meta:
  id: email-compliance-basics
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Navigate email compliance in sales sequences — understand CAN-SPAM, GDPR, and opt-out requirements for B2B outbound email"
  tags: [sales, compliance, CAN-SPAM, GDPR, legal, intermediate]

state: {}

trigger: |
  You're the Sales Operations Manager at "GlobalReach" ($80M ARR,
  selling to companies in the US, UK, Germany, and Australia). Your
  legal team just flagged that several of your SDRs' email sequences
  may violate compliance regulations. They've asked you to audit the
  current practices and fix the issues.

  Current practices flagged:
  1. SDRs are sending cold emails to prospects in Germany without
     any consent mechanism. One SDR sent 200 emails in a day to
     German prospects scraped from LinkedIn.
  2. Your unsubscribe link is buried in 6pt font at the bottom of
     emails, in light gray text that's nearly invisible
  3. An SDR's email sequence has 12 steps over 30 days. When a
     prospect clicks "unsubscribe" after email 4, they still receive
     email 5 (sent 2 hours later before the opt-out was processed)
  4. Cold emails don't include a physical mailing address
  5. Subject lines like "RE: Our conversation" are used on first
     cold emails (implying a prior conversation that didn't happen)
  6. Your email tool automatically adds prospects who reply "not
     interested" back to a different sequence 30 days later
  7. A UK prospect asked "where did you get my email?" and the SDR
     couldn't answer (they got it from a third-party data provider)

  Tasks:
  1. For each of the 7 flagged practices, explain: which regulation
     it potentially violates (CAN-SPAM, GDPR, or both), what the
     risk is (fine amount, reputation damage), and the specific fix.

  2. Create the "Email Compliance Checklist" that every SDR must
     follow before launching a new sequence. Cover: consent
     requirements by region, required email elements, opt-out
     handling, data source documentation, and sending limits.

  3. Your legal team asks: "Can we send cold B2B emails in the EU
     at all?" Write the honest answer. Explain the "legitimate
     interest" basis for B2B emails under GDPR, what qualifies, and
     what safeguards must be in place.

  4. Design the technical implementation for proper opt-out handling.
     How does the system process unsubscribes instantly, suppress
     across all sequences, and prevent the "reply not interested,
     get re-added" problem?

assertions:
  - type: llm_judge
    criteria: "Violation analysis is accurate — correctly identifies which regulations apply to each practice, distinguishes CAN-SPAM (US opt-out model) from GDPR (EU consent model), and provides specific fixes"
    weight: 0.25
    description: "Accurate violation analysis"
  - type: llm_judge
    criteria: "Compliance checklist is region-aware — differentiates requirements for US, EU/UK, and other regions rather than applying a one-size-fits-all approach, with specific action items for each"
    weight: 0.25
    description: "Region-aware compliance checklist"
  - type: llm_judge
    criteria: "GDPR legitimate interest explanation is nuanced — correctly explains that B2B cold email is possible under legitimate interest with proper safeguards, without either overstating risk or being cavalier about requirements"
    weight: 0.25
    description: "Nuanced GDPR explanation"
  - type: llm_judge
    criteria: "Opt-out implementation is technically sound — includes real-time suppression across all sequences, global opt-out lists, automated processing of negative replies, and prevention of re-enrollment"
    weight: 0.25
    description: "Technically sound opt-out system"
