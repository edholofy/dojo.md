meta:
  id: multi-stakeholder-sequences
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "Build follow-up sequences that engage multiple stakeholders within a buying committee — thread different personas with role-appropriate messaging"
  tags: [sales, multi-stakeholder, threading, buying-committee, intermediate]

state: {}

trigger: |
  You're an Account Executive at "DataPlatform" (enterprise analytics
  SaaS, $90M ARR). You're working a deal with "RetailGroup" (retail
  chain, 500 stores, 8,000 employees). After your initial demo, you
  have 4 stakeholders to engage, each with different interests and
  engagement levels.

  Stakeholders:
  1. Alex Chen, VP of Analytics (your champion)
     - Attended demo, very engaged, gave you internal intel
     - Told you: "I love the product but I can't approve this alone.
       You need to get buy-in from IT, Finance, and our COO."
     - Prefers email, responds within 24 hours

  2. Samara Patel, CTO
     - Attended 15 minutes of the demo, asked about security
     - Concern: "How does this integrate with our existing Snowflake
       data warehouse? We can't add another silo."
     - Her team evaluated a competitor (Looker) last year but the
       project stalled
     - Rarely responds to emails, active on LinkedIn

  3. David Kim, CFO
     - Did NOT attend the demo
     - Alex says: "David will only approve this if you can show
       clear ROI. He killed the Looker project because the business
       case was weak."
     - Very formal, expects structured communication

  4. Maria Gonzalez, COO (final decision maker)
     - Did NOT attend the demo, hasn't been contacted yet
     - Alex says: "Maria cares about competitive advantage. Show her
       how analytics will help us beat Amazon in same-day delivery."
     - Very busy, prefers short emails, responds to executives

  Tasks:
  1. Design the multi-threaded follow-up plan. For each stakeholder,
     map out: the first outreach, the messaging angle, the channel,
     the cadence, and how the threads connect. When do you engage
     each person and in what order?

  2. Write the follow-up sequence for Samara (CTO) — she's the
     technical blocker. Create 3 touchpoints over 10 days that
     address her Snowflake integration concern and the failed Looker
     precedent. At least 1 touchpoint should be LinkedIn.

  3. Write the cold outreach to David (CFO) — he didn't attend the
     demo and doesn't know you. Write the email that Alex should
     forward to introduce you, and the follow-up you send directly
     with a preliminary ROI framework.

  4. Your champion Alex says: "I can get you 15 minutes with Maria
     (COO) if you send her something compelling first." Write the
     email to Maria that earns those 15 minutes — it must be short,
     specific to her competitive advantage priority, and make her
     want to talk to you.

assertions:
  - type: llm_judge
    criteria: "Multi-threaded plan sequences stakeholders strategically — engages champion first, technical blocker second, builds financial case for CFO, and approaches COO last with champion introduction, with clear dependencies between threads"
    weight: 0.25
    description: "Strategic stakeholder sequencing"
  - type: llm_judge
    criteria: "CTO sequence addresses both concerns — tackles Snowflake integration with technical specifics and acknowledges the failed Looker project without being dismissive, using LinkedIn as a channel given her email behavior"
    weight: 0.25
    description: "Technical blocker engagement"
  - type: llm_judge
    criteria: "CFO outreach is formal and ROI-focused — includes a champion-forwarded introduction and a direct follow-up with preliminary business case that addresses David's known concern about weak ROI justification"
    weight: 0.25
    description: "ROI-focused CFO outreach"
  - type: llm_judge
    criteria: "COO email is short and compelling — under 100 words, focuses on competitive advantage against Amazon in same-day delivery, and creates enough curiosity for Maria to grant 15 minutes"
    weight: 0.25
    description: "Compelling COO email"
