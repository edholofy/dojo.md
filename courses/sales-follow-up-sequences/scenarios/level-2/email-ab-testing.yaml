meta:
  id: email-ab-testing
  level: 2
  course: sales-follow-up-sequences
  type: output
  description: "A/B test sales follow-up emails — design experiments, analyze results, and iterate on sequences using data rather than intuition"
  tags: [sales, email, A/B-testing, optimization, data-driven, intermediate]

state: {}

trigger: |
  You're the Sales Operations Analyst at "GrowthEngine" (marketing
  automation SaaS, $55M ARR, 60 SDRs). Your SDR team sends 15,000
  follow-up emails per month. The VP of Sales wants you to build an
  A/B testing program to optimize email performance.

  Current performance (last 3 months):
  - Average open rate: 34%
  - Average reply rate: 4.1%
  - Average meeting book rate: 0.8%
  - Subject lines are chosen by individual SDRs (no standardization)
  - Emails vary from 50 to 400 words (no guidelines)
  - CTAs range from vague ("let me know") to very specific ("book
    here for Tuesday 2pm")

  Your first 3 A/B tests have returned results:

  Test 1: Subject line (1,500 emails per variant)
  - A: "Quick question about [Company]'s marketing stack" → 41% open
  - B: "[First Name], saw your recent campaign" → 38% open
  - C: "Idea for improving [Company]'s lead gen" → 44% open

  Test 2: Email length (1,200 emails per variant)
  - A: Short (under 75 words) → 5.2% reply rate
  - B: Medium (75-150 words) → 4.8% reply rate
  - C: Long (150+ words) → 2.9% reply rate

  Test 3: CTA type (1,000 emails per variant)
  - A: "Reply with your availability" → 4.5% reply rate
  - B: Calendar link only → 3.8% reply rate
  - C: "Would [specific day/time] work?" → 5.1% reply rate

  Tasks:
  1. Analyze the 3 test results. For each: is the result
     statistically significant given the sample sizes? What's the
     actionable takeaway? What should change in the team's email
     guidelines based on these results?

  2. Design the next 4 A/B tests to run over the next quarter.
     For each: the hypothesis, the variants, the sample size needed,
     the primary metric, and the expected timeline to reach
     statistical significance.

  3. Your VP asks: "If we implement the winning variants from all 3
     tests, what's the projected impact on meetings booked?" Build
     the impact model showing the compound effect of improvements
     across open rate, reply rate, and meeting conversion.

  4. Create the "A/B Testing Playbook" for your SDR team — the rules
     of engagement for running clean experiments (one variable at a
     time, minimum sample sizes, how long to run tests, when results
     are conclusive).

assertions:
  - type: llm_judge
    criteria: "Analysis assesses statistical significance correctly — considers sample sizes relative to effect sizes, notes which results are conclusive vs. directional, and extracts actionable guidelines from each test"
    weight: 0.25
    description: "Statistical significance analysis"
  - type: llm_judge
    criteria: "Next 4 tests target meaningful variables — proposes experiments beyond what's been tested (personalization depth, send timing, follow-up spacing, tone) with proper hypotheses and sample size requirements"
    weight: 0.25
    description: "Meaningful next experiments"
  - type: llm_judge
    criteria: "Impact model shows compound effects — calculates how improving open rate, reply rate, and meeting conversion together amplify total meetings booked, with realistic assumptions about adoption"
    weight: 0.25
    description: "Compound impact model"
  - type: llm_judge
    criteria: "Testing playbook prevents common errors — includes rules for one variable at a time, minimum sample sizes, test duration, avoiding peeking at results early, and documenting learnings"
    weight: 0.25
    description: "Error-preventing testing playbook"
