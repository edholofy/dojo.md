meta:
  id: advanced-assessment-shift
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Handle three advanced assessment projects — a medical competency OSCE design, a corporate assessment center for leadership selection, and a K-12 standards-based grading conversion"
  tags: [shift-simulation, multi-project, osce, assessment-center, advanced]

state: {}

trigger: |
  You're a senior assessment consultant at a
  national education and workforce firm. Three major
  projects need deliverables this week.

  Project 1: Medical School OSCE Design
  A medical school needs to redesign their
  Objective Structured Clinical Examination (OSCE)
  for third-year students. The current OSCE has 8
  stations but only tests history-taking and
  physical exam skills. The accreditor wants broader
  competency coverage.
  - Design a 10-station OSCE covering:
    - Clinical reasoning (2 stations)
    - Communication skills (2 stations)
    - Procedural skills (2 stations)
    - Professionalism/ethics (2 stations)
    - Interprofessional collaboration (2 stations)
  - For each station: scenario description,
    standardized patient instructions, time limit,
    checklist, and global rating scale
  - Provide detailed design for 3 of the 10 stations
  - Include the standardized patient training guide
    for those 3 stations

  Project 2: Corporate Assessment Center
  A Fortune 500 company needs a 2-day assessment
  center to select 20 directors from 80 VP-track
  candidates. Design the center including:
  - 6 assessment exercises: in-tray/inbox simulation,
    group discussion, role-play with "direct report,"
    strategic presentation, data analysis case,
    and behavioral interview
  - Competency matrix showing which exercises assess
    which competencies (leadership, strategic
    thinking, people development, business acumen,
    communication, decision-making)
  - For 2 exercises: complete materials, scoring
    rubrics, and assessor guides
  - Assessor training outline
  - Candidate feedback report template

  Project 3: Standards-Based Grading Conversion
  A middle school (grades 6-8, 800 students) is
  converting from traditional letter grades to
  standards-based grading. Design the conversion
  including:
  - Grading scale: 1-4 (Beginning, Developing,
    Meeting, Exceeding) for each standard
  - How to convert existing assignments to
    standards-based scoring
  - Report card redesign showing standards mastery
    instead of letter grades
  - Parent communication guide (they'll have
    questions)
  - Gradebook configuration recommendations
  - Address the transcript challenge (how colleges
    interpret standards-based grades)

  Task: Complete all three projects with full
  deliverables.

assertions:
  - type: llm_judge
    criteria: "Response completes all three projects — OSCE has 10-station design with 3 fully detailed stations including SP guides; assessment center has 6 exercises with competency matrix and 2 complete exercise materials; standards-based grading includes scale, conversion process, report card redesign, parent guide, and transcript guidance."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expert-level assessment knowledge across domains — OSCE stations authentically test medical competencies with proper SP methodology; the assessment center exercises are validated methods for leadership selection; the standards-based grading conversion addresses real implementation challenges including parent resistance and college transcripts; each project reflects deep domain expertise."
    weight: 0.35
    description: "ExpertVersatility"
  - type: llm_judge
    criteria: "Response would produce professional-quality deliverables — the OSCE would satisfy medical school accreditors; the assessment center would identify the best VP-track candidates; the standards-based grading system would successfully replace letter grades; each project's materials could be implemented as delivered."
    weight: 0.30
    description: "ProfessionalQuality"
