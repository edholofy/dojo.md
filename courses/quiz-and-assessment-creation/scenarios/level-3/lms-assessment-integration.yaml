meta:
  id: lms-assessment-integration
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Design a comprehensive assessment architecture for a corporate LMS serving 10,000 employees, with automated grading, analytics dashboards, and compliance tracking"
  tags: [lms, corporate, assessment-architecture, analytics, advanced]

state: {}

trigger: |
  You're the Director of Learning Technology at a
  financial services company (10,000 employees, 30
  offices globally). The company is migrating from
  a patchwork of training tools to a unified LMS
  (Cornerstone OnDemand). You need to design the
  assessment architecture that will support all
  training evaluation across the organization.

  Assessment needs across the company:
  1. Compliance training (mandatory)
     - Anti-money laundering (annual, all employees)
     - Data privacy (annual, all employees)
     - Sexual harassment prevention (annual, all)
     - Securities regulations (quarterly, 2,000
       licensed employees)
     - Pass/fail with regulatory documentation

  2. Skills development (optional but tracked)
     - Leadership development programs
     - Technical skills (Excel, SQL, Python)
     - Sales methodology certification
     - Product knowledge for client-facing staff
     - Completion and proficiency tracking

  3. Onboarding assessments
     - 30-day, 60-day, 90-day knowledge checks for
       new hires
     - Role-specific competency verification
     - Manager sign-off workflows

  4. Performance-linked assessments
     - Quarterly skills assessments tied to
       performance reviews
     - 360-degree feedback surveys
     - Individual development plan tracking

  Architecture requirements:
  - Question bank organization (by domain, level,
    compliance requirement, role)
  - Automated grading rules (when human review is
    needed vs. auto-scored)
  - Analytics dashboard design (what metrics, who
    sees what, drill-down capability)
  - Compliance audit trail (who took what, when,
    score, attempt history)
  - Role-based assessment assignment logic (which
    employees see which assessments)
  - Integration points with HRIS and performance
    management systems
  - Reporting templates for regulators, managers,
    and L&D team

  Task: Design the complete assessment architecture
  with question bank structure, automation rules,
  analytics dashboards, compliance tracking, and
  integration specifications.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete assessment architecture — question bank organization with metadata taxonomy; automated grading rules distinguishing auto-scored from human-reviewed; analytics dashboard with role-appropriate views and drill-down; compliance audit trail with all required data points; role-based assignment logic; HRIS/performance system integration points; reporting templates for regulators, managers, and L&D."
    weight: 0.35
    description: "ArchitectureCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates learning technology expertise — the question bank taxonomy would scale to 10,000 employees; compliance tracking meets regulatory requirements for financial services; the analytics dashboards surface actionable data; role-based assignment logic handles complex organizational structures; the integration specifications are technically feasible with Cornerstone OnDemand."
    weight: 0.35
    description: "LearningTechExpertise"
  - type: llm_judge
    criteria: "Response would serve the organization effectively — the architecture supports all 4 assessment categories; compliance documentation would satisfy auditors; managers would get useful data about their teams; L&D would have clear metrics on program effectiveness; the system would be sustainable as the company grows; the migration from patchwork to unified LMS would succeed."
    weight: 0.30
    description: "OrganizationalEffectiveness"
