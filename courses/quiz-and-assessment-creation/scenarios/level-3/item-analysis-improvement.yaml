meta:
  id: item-analysis-improvement
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Conduct a comprehensive item analysis of a high-stakes nursing exam, identify problematic items, and redesign them using psychometric data"
  tags: [item-analysis, psychometrics, nursing, exam-improvement, advanced]

state: {}

trigger: |
  You're the assessment specialist for a nursing
  program. After administering the "Medical-Surgical
  Nursing II" final exam (100 questions, 200
  students), the item analysis data reveals serious
  problems. The overall pass rate dropped from 82%
  to 64%, and students are filing formal grade
  appeals. The dean wants answers and solutions
  before the next administration.

  Item analysis data for 10 flagged questions:

  Q12: Difficulty Index 0.15, Discrimination -0.08
  (Topic: Cardiac medication dosage calculation)
  - Option A: 8%, Option B: 15%*, Option C: 52%,
    Option D: 25%
  (* = keyed correct answer)

  Q23: Difficulty Index 0.95, Discrimination 0.02
  (Topic: Hand hygiene procedure)
  - Option A: 95%*, Option B: 2%, Option C: 2%,
    Option D: 1%

  Q31: Difficulty Index 0.45, Discrimination -0.15
  (Topic: Post-operative assessment priority)
  - Option A: 25%, Option B: 30%, Option C: 45%*,
    Option D: 0%

  Q47: Difficulty Index 0.22, Discrimination 0.35
  (Topic: Electrolyte imbalance symptoms)
  - Option A: 22%*, Option B: 38%, Option C: 20%,
    Option D: 20%

  Q58: Difficulty Index 0.50, Discrimination 0.05
  (Topic: Pain assessment scales)
  - Option A: 25%, Option B: 25%, Option C: 25%,
    Option D: 25%*

  Q64: Difficulty Index 0.72, Discrimination 0.42
  (Topic: Wound care staging — this is a good item)

  Q75: Difficulty Index 0.88, Discrimination 0.10
  (Topic: Patient rights — informed consent)
  - Option A: 88%*, Option B: 5%, Option C: 5%,
    Option D: 2%

  Q82: Difficulty Index 0.35, Discrimination 0.48
  (Topic: Diabetes management — this is a good item)

  Q91: Difficulty Index 0.30, Discrimination -0.22
  (Topic: Respiratory assessment in COPD)
  - Option A: 40%, Option B: 30%*, Option C: 18%,
    Option D: 12%

  Q98: Difficulty Index 0.42, Discrimination 0.38
  (Topic: Medication administration — 6 rights)

  Task requirements:
  1. Analyze each of the 10 items
     - Classify as: keep, revise, or discard
     - Explain what the psychometric data reveals
     - Identify specific problems (poor distractors,
       ambiguous stems, keying errors, etc.)

  2. For items classified as "revise," write the
     improved version with better stem, options, or
     both

  3. Write a report to the dean explaining:
     - Why the pass rate dropped (data-driven)
     - Which items should be excluded from scoring
       for this administration
     - Recommendations for the next exam
     - Whether grade appeals have merit

  4. Create an item writing guide for nursing faculty
     - Common item writing errors (with examples)
     - Quality criteria for new items
     - Review process before items go live

  Task: Complete the item analysis, revise flagged
  items, write the dean's report, and create the
  item writing guide.

assertions:
  - type: llm_judge
    criteria: "Response completes all deliverables — each of the 10 items is analyzed with classification (keep/revise/discard) and specific problem identification; revised versions provided for flagged items; dean's report explains the pass rate drop with data, recommends scoring adjustments, and addresses grade appeals; item writing guide covers common errors with examples and quality criteria."
    weight: 0.35
    description: "AnalysisCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates psychometric expertise — difficulty and discrimination indices are correctly interpreted; distractor analysis reveals real problems (e.g., Q12's likely keying error, Q58's random guessing pattern, Q23's trivial difficulty); the 'good items' are correctly identified; recommendations are data-driven; the item writing guide reflects assessment science best practices."
    weight: 0.35
    description: "PsychometricExpertise"
  - type: llm_judge
    criteria: "Response would resolve the crisis — the dean's report is professional and actionable; excluding problematic items from scoring is fair and defensible; revised items would perform better on next administration; the item writing guide would prevent future quality problems; the overall approach would restore student confidence and faculty assessment competency."
    weight: 0.30
    description: "CrisisResolution"
