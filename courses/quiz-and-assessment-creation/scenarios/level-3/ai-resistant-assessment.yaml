meta:
  id: ai-resistant-assessment
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Redesign assessments for the AI era — create AI-resistant evaluation methods for a business school that maintain academic rigor while embracing AI as a learning tool"
  tags: [ai-resistant, academic-integrity, ai-era, business-school, advanced]

state: {}

trigger: |
  You're the Associate Dean for Academic Affairs at
  a business school. ChatGPT and similar AI tools
  have made many traditional assessments obsolete —
  students can generate passing-quality essays, case
  analyses, financial models, and even code in
  minutes. Faculty are panicking and demanding
  return to in-class paper exams.

  Instead of going backward, the dean wants you to
  design assessments that are "AI-resistant" —
  meaning they assess competencies that AI cannot
  fake, while also teaching students to use AI
  effectively as a professional tool.

  Courses to redesign (one from each department):
  1. MBA Marketing: "Consumer Behavior" (60 students)
     - Current: 2 case analyses (30%), midterm exam
       (25%), final paper (35%), participation (10%)
  2. MBA Finance: "Corporate Finance" (55 students)
     - Current: Problem sets (20%), midterm (30%),
       final (40%), participation (10%)
  3. MBA Strategy: "Competitive Strategy" (50 students)
     - Current: Case memos (30%), group project (30%),
       final exam (30%), participation (10%)

  Design requirements:

  1. AI-resistant assessment methods
     - For each course, propose 3-4 assessments that
       cannot be completed by AI alone
     - Categories to consider: live demonstrations,
       oral exams, process-based assessment, personal
       experience integration, real-time problem
       solving, peer interaction assessment
     - For each assessment: description, weight,
       rubric, and WHY it's AI-resistant

  2. AI-integrated assessments
     - For each course, propose 1 assessment where
       students must USE AI and demonstrate mastery
       of AI-augmented work
     - What students submit: AI output + their
       evaluation/improvement of it
     - How to grade the human value-add vs. AI
       output
     - Assessment rubric for AI-augmented work

  3. Academic integrity policy
     - Course-specific AI use policies (what's
       allowed, what's not, what's required)
     - How to detect AI-generated content that
       violates policy (without relying solely on
       AI detectors)
     - Consequences framework that's educational,
       not just punitive

  4. Faculty implementation guide
     - How to transition from traditional to AI-era
       assessments
     - Time and effort comparison (will this be more
       or less work for faculty?)
     - Student pushback anticipation and responses
     - Technology requirements

  Task: Create the AI-resistant assessments, AI-
  integrated assessments, academic integrity policy,
  and faculty implementation guide for all 3 courses.

assertions:
  - type: llm_judge
    criteria: "Response creates complete AI-era assessments for all 3 courses — each has 3-4 AI-resistant assessments with weights, rubrics, and AI-resistance rationale; each has 1 AI-integrated assessment with grading criteria for human value-add; academic integrity policy covers AI use guidelines per course; faculty guide addresses transition, effort comparison, and student pushback."
    weight: 0.35
    description: "AIAssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI-era assessment expertise — AI-resistant methods genuinely cannot be completed by AI alone (not just harder versions of the same thing); AI-integrated assessments develop real professional skills; the integrity policy is nuanced (not blanket prohibition); detection methods go beyond unreliable AI detectors; the approach prepares students for AI-augmented professional work."
    weight: 0.35
    description: "AIEraExpertise"
  - type: llm_judge
    criteria: "Response would work in practice — the assessments maintain academic rigor without requiring proctored paper exams; faculty could implement these with reasonable effort; students would develop both subject expertise and AI fluency; the business school would be seen as forward-thinking; graduates would be better prepared for AI-augmented workplaces."
    weight: 0.30
    description: "PracticalImplementation"
