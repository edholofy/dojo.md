meta:
  id: assessment-analytics-dashboard
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Design an assessment analytics system for a school district, with dashboards for teachers, principals, and the superintendent showing student performance, growth, and equity data"
  tags: [analytics, dashboard, data-driven, school-district, advanced]

state: {}

trigger: |
  You're the Director of Assessment and Data for a
  suburban school district (18,000 students, 22
  schools, 1,200 teachers). The school board has
  mandated a "data-driven decision making"
  initiative but teachers are overwhelmed by data
  and administrators don't know which metrics matter.
  You need to design an assessment analytics system
  that surfaces the right data to the right people.

  Current data sources:
  - State standardized tests (ELA, Math, Science —
    annual, grades 3-8 and 11)
  - District benchmark assessments (ELA and Math —
    quarterly, grades K-12)
  - Classroom assessments (teacher-created — daily/
    weekly)
  - Common formative assessments (grade-level team
    created — biweekly)
  - AP/IB exam scores
  - SAT/ACT scores
  - Special education progress monitoring data
  - English learner proficiency data (ACCESS scores)

  Design requirements:

  1. Teacher dashboard
     - What data teachers need to see (and what they
       don't)
     - Class-level and student-level views
     - Growth tracking visualizations
     - Intervention triggers (when data says a
       student needs help)
     - Question-level analysis from common assessments
     - Mock up the dashboard layout with 6-8 key
       widgets
     - How the dashboard connects to instructional
       action

  2. Principal dashboard
     - School-level performance overview
     - Teacher effectiveness indicators (not
       evaluation — growth data)
     - Equity lens: performance by subgroup (race,
       SES, EL, SPED, gender)
     - Early warning system for students at risk
     - Mock up with 5-6 key widgets

  3. Superintendent / board dashboard
     - District-wide trends across years
     - School comparison (with appropriate caveats)
     - Strategic goal progress tracking
     - Budget-to-outcome analysis
     - Equity gap trends
     - Mock up with 4-5 key widgets

  4. Data governance
     - Who can see what data (privacy framework)
     - FERPA compliance considerations
     - How to prevent data misuse (e.g., punishing
       teachers for low scores)
     - Data literacy training plan for each audience

  5. Assessment calendar
     - Propose a rationalized assessment calendar
       that reduces redundant testing
     - Map which assessments feed which dashboards
     - "Assessment audit" — are there tests that
       provide no actionable data?

  Task: Design all three dashboards with mock-ups,
  the data governance framework, and the assessment
  calendar.

assertions:
  - type: llm_judge
    criteria: "Response designs all three dashboards — teacher dashboard with 6-8 widgets showing class/student data and intervention triggers; principal dashboard with 5-6 widgets including equity lens and early warning; superintendent dashboard with 4-5 widgets for trends and strategic goals; data governance framework covering privacy, FERPA, and misuse prevention; assessment calendar with redundancy reduction and assessment-to-dashboard mapping."
    weight: 0.35
    description: "AnalyticsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment analytics expertise — each dashboard surfaces role-appropriate data (teachers need action, principals need patterns, superintendent needs trends); equity analysis is substantive; intervention triggers are based on sound data thresholds; the assessment audit identifies genuinely redundant testing; FERPA compliance is correctly addressed; data literacy training is practical."
    weight: 0.35
    description: "AnalyticsExpertise"
  - type: llm_judge
    criteria: "Response would improve the district — teachers would actually use this dashboard to adjust instruction; principals could identify equity gaps and intervene; the superintendent could demonstrate progress to the board; the assessment calendar would reduce testing burden; the data governance would prevent misuse; the overall system would move the district from data-overwhelmed to data-informed."
    weight: 0.30
    description: "DistrictImprovement"
