meta:
  id: authentic-assessment-design
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Design authentic assessments for an engineering capstone course that simulate real-world engineering challenges with client presentations and peer review"
  tags: [authentic-assessment, engineering, capstone, real-world, advanced]

state: {}

trigger: |
  You're the capstone course coordinator for a
  mechanical engineering program. The ABET
  accreditation reviewers noted that the program's
  assessments are too exam-heavy and don't
  adequately demonstrate Student Outcome 5 ("an
  ability to function effectively on a team whose
  members together provide leadership, create a
  collaborative and inclusive environment, establish
  goals, plan tasks, and meet objectives") and
  Student Outcome 7 ("an ability to acquire and
  apply new knowledge as needed, using appropriate
  learning strategies").

  You're redesigning the capstone assessment to use
  authentic assessment methods that directly measure
  these outcomes through real engineering work.

  Capstone project context:
  - Teams of 4-5 students (8 teams, ~38 students)
  - Each team works with a real industry sponsor on
    a design challenge
  - Two-semester course (Fall: define problem,
    research, concept design; Spring: detailed
    design, prototype, testing, delivery)
  - Current assessment: midterm exam (20%), final
    exam (20%), project report (40%), presentation
    (20%)

  Redesigned assessment requirements:

  1. Authentic assessment portfolio (replace exams)
     - Design review presentations (3 gates: concept,
       preliminary, critical design review)
     - Each gate: what students present, who
       evaluates (faculty, sponsor, peers), what
       criteria are assessed, pass/revise decision
     - Gate rubrics aligned to ABET outcomes

  2. Team effectiveness assessment
     - Directly measures ABET Student Outcome 5
     - Multiple data sources: peer evaluation,
       meeting logs, contribution tracking, sponsor
       feedback
     - Formative checkpoints (not just end-of-course)
     - How individual grades differ from team grades
     - Handling dysfunctional teams

  3. Learning journal / reflection
     - Directly measures ABET Student Outcome 7
     - Structured prompts for each project phase
     - Evidence of acquiring new knowledge
     - Self-directed learning documentation
     - Evaluation rubric for reflective quality

  4. Sponsor evaluation component
     - Professional feedback form for industry
       sponsors
     - What sponsors can and cannot assess
     - How sponsor feedback integrates with academic
       grading
     - Managing sponsor expectations

  5. Final grade structure
     - New assessment weights replacing the exam-
       heavy model
     - How each assessment maps to ABET outcomes
     - Grade distribution expectations

  Task: Create the complete authentic assessment
  system with gate review rubrics, team assessment
  tools, learning journal framework, sponsor
  evaluation form, and grade structure.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete authentic assessment system — 3 design review gates with rubrics, evaluator roles, and criteria; team effectiveness assessment with multiple data sources and formative checkpoints; learning journal with structured prompts and evaluation rubric; sponsor evaluation form with integration guidance; final grade structure mapping to ABET outcomes."
    weight: 0.35
    description: "AuthenticAssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates engineering education expertise — gate reviews mirror industry design review practices; ABET Student Outcomes 5 and 7 are directly and validly assessed; the team assessment distinguishes individual from team performance; the learning journal captures genuine self-directed learning; sponsor evaluation appropriately bounds industry partner input; the system addresses ABET accreditation concerns."
    weight: 0.35
    description: "EngineeringEducationExpertise"
  - type: llm_judge
    criteria: "Response would satisfy ABET reviewers — the authentic assessments directly measure the previously under-assessed outcomes; the evidence trail would demonstrate student achievement; the system produces graduates better prepared for engineering practice; the approach is sustainable for faculty managing 8 teams; industry sponsors would value their involvement."
    weight: 0.30
    description: "AccreditationReadiness"
