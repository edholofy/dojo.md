meta:
  id: adaptive-assessment-system
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Design an adaptive testing system for a K-12 reading assessment platform, with item calibration, ability estimation algorithms, and content balancing"
  tags: [adaptive-testing, cat, reading-assessment, k12, advanced]

state: {}

trigger: |
  You're the chief assessment scientist at an
  edtech company building a K-12 reading assessment
  platform called "ReadLevel." School districts will
  use it 3 times per year (fall, winter, spring) to
  measure student reading proficiency from grades
  2-8. The assessment must be adaptive — each
  student gets a personalized test that efficiently
  measures their reading level in 20-30 minutes.

  Platform requirements:
  - Grades 2-8 reading assessment (7 grade levels)
  - Adaptive: questions adjust to student ability
    in real time
  - 20-25 questions per administration
  - Must measure: vocabulary, reading comprehension,
    literary analysis, informational text, and
    fluency-related skills
  - Results must map to grade-level equivalents and
    growth percentiles
  - Must be usable by teachers with no psychometric
    training

  Design requirements:

  1. Item bank specifications
     - Minimum items needed per grade band
     - Difficulty distribution within each content
       domain
     - Item calibration methodology (how items get
       their difficulty/discrimination parameters)
     - Passage selection criteria (length, readability,
       genre diversity, cultural representation)
     - Item metadata requirements
     - Write 3 sample items at different difficulty
       levels showing calibration parameters

  2. Adaptive algorithm design
     - Starting rule (where does the test begin for
       each grade?)
     - Item selection rule (how is the next item
       chosen?)
     - Ability estimation method (IRT model
       specification)
     - Content balancing constraints (ensuring
       coverage across domains)
     - Stopping rule (when does the test end?)
     - Exposure control (preventing item overuse)
     - Describe the algorithm flow for a hypothetical
       student session

  3. Score reporting
     - What scores are produced (scale score, grade
       equivalent, growth percentile, domain scores)
     - How scores are communicated to:
       - Teachers (actionable instructional data)
       - Parents (understandable without jargon)
       - District administrators (aggregate trends)
     - Growth measurement across administrations
     - Sample score reports for each audience

  4. Technical quality plan
     - Reliability targets and how to measure them
       for an adaptive test
     - Validity evidence to collect
     - Fairness and bias review process
     - Annual calibration and maintenance schedule

  Task: Design the complete adaptive assessment
  system with item bank specs, algorithm design,
  score reporting, and quality plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete adaptive assessment system — item bank specs with size, difficulty distribution, calibration methodology, and 3 sample items with parameters; adaptive algorithm with starting, selection, estimation, balancing, stopping, and exposure rules plus a session walkthrough; score reporting with scale scores, growth measures, and sample reports for 3 audiences; technical quality plan with reliability, validity, fairness, and maintenance."
    weight: 0.35
    description: "AdaptiveSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates adaptive testing expertise — IRT model specification is appropriate (1PL, 2PL, or 3PL with justification); content balancing constraints ensure domain coverage; the stopping rule balances precision with test length; ability estimation method is mathematically sound; item bank size calculations are realistic; exposure control prevents item compromise; the algorithm walkthrough shows a realistic student session."
    weight: 0.35
    description: "AdaptiveTestingExpertise"
  - type: llm_judge
    criteria: "Response would produce a viable assessment product — the system would accurately measure reading proficiency across grades 2-8; score reports would be useful to teachers, parents, and administrators; growth measurement would track student progress across administrations; the 20-25 question limit would be maintained; the system would be technically defensible and commercially viable."
    weight: 0.30
    description: "ProductViability"
