meta:
  id: cross-cultural-assessment
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Adapt a leadership competency assessment for deployment across 5 countries, addressing cultural validity, translation verification, and norm-setting"
  tags: [cross-cultural, international, leadership, translation, advanced]

state: {}

trigger: |
  You're the global talent assessment lead at a
  multinational corporation headquartered in the US.
  The company's "Leadership Readiness Assessment"
  (used to identify high-potential managers for
  promotion to director level) was developed in
  English for the US market. Now it must be deployed
  in 5 additional countries: Japan, Brazil, Germany,
  India, and Nigeria.

  Current assessment components:
  1. Situational Judgment Test (20 scenarios, choose
     best and worst response)
  2. Self-assessment of 12 leadership competencies
     (Likert 1-5)
  3. 360-degree feedback survey (same 12 competencies,
     rated by peers, reports, and manager)
  4. Case study analysis (written response to a
     business challenge)

  Cross-cultural challenges identified:
  - Leadership styles valued differently across
    cultures (e.g., directive vs. participative)
  - Response tendencies differ (East Asian
    respondents tend toward midpoint, Latin American
    respondents toward extremes)
  - "Correct" answers to SJT scenarios may be
    culture-dependent
  - Direct feedback to superiors is taboo in some
    cultures (affects 360)
  - Business case contexts may not translate (US
    regulations, market references)
  - Translation beyond words: concepts may not
    exist in all languages

  Adaptation requirements:

  1. Cultural validity analysis
     - For each assessment component, analyze what
       might not transfer across the 5 cultures
     - Identify which SJT scenarios need cultural
       adaptation (provide 3 examples with analysis)
     - Address response style differences and their
       impact on scoring

  2. Translation and adaptation process
     - Forward-backward translation protocol
     - Cultural adaptation review process
     - Who should be on the review panels per country
     - Pilot testing methodology
     - How to handle concepts with no direct
       translation

  3. Norm-setting strategy
     - Why US norms can't be applied globally
     - Country-specific vs. global norms debate
     - Sample size requirements for norm development
     - How to handle countries with small employee
       populations
     - Score interpretation across different norm
       groups

  4. Adapted assessment components
     - Revise 3 SJT scenarios showing US original
       and culturally adapted versions for Japan and
       Brazil
     - Modify the 360 feedback process for high
       power-distance cultures
     - Adapt the case study for non-US business
       contexts

  5. Fairness and legal considerations
     - Employment law differences across the 5
       countries
     - Data privacy (GDPR in Germany, LGPD in
       Brazil, PIPA in Japan)
     - How to ensure the assessment doesn't
       disadvantage candidates from any country

  Task: Create the cultural validity analysis,
  translation process, norm-setting strategy,
  adapted assessment components, and fairness
  framework.

assertions:
  - type: llm_judge
    criteria: "Response creates all five deliverables — cultural validity analysis for each component across 5 cultures with 3 SJT examples; translation protocol with forward-backward process and review panels; norm-setting strategy addressing country-specific vs. global norms; 3 adapted SJT scenarios (US vs. Japan and Brazil); 360 modifications for high power-distance cultures; fairness framework with legal and data privacy considerations per country."
    weight: 0.35
    description: "CrossCulturalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates cross-cultural assessment expertise — correctly identifies culture-specific leadership constructs; response style differences are substantively addressed; the SJT adaptations reflect genuine cultural understanding (not stereotypes); the 360 modifications for power-distance are practical; the norm-setting strategy is psychometrically sound; data privacy requirements are accurately cited per country."
    weight: 0.35
    description: "CrossCulturalExpertise"
  - type: llm_judge
    criteria: "Response would enable fair global deployment — the adapted assessment would identify leadership potential fairly across all 5 countries; the translation process would maintain construct validity; norm groups would enable meaningful cross-country comparisons; the fairness framework would prevent legal challenges; high-potential managers from any country would have equal opportunity to demonstrate readiness."
    weight: 0.30
    description: "GlobalFairness"
