meta:
  id: summative-assessment-redesign
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Redesign a university department's entire summative assessment strategy from traditional exams to a mixed-method approach with constructive alignment"
  tags: [summative, constructive-alignment, university, redesign, advanced]

state: {}

trigger: |
  You're an educational developer at a university's
  teaching center. The Computer Science department
  has asked for help — their accreditation review
  revealed that 85% of all course grades come from
  traditional closed-book exams, yet their program
  outcomes emphasize collaboration, problem-solving,
  and professional practice. The department chair
  wants a complete assessment redesign for their
  core curriculum (8 courses).

  Core courses to redesign:
  1. CS101 - Intro to Programming (200 students)
  2. CS201 - Data Structures (150 students)
  3. CS210 - Computer Organization (120 students)
  4. CS301 - Algorithms (100 students)
  5. CS310 - Operating Systems (90 students)
  6. CS320 - Database Systems (100 students)
  7. CS350 - Software Engineering (80 students)
  8. CS401 - Senior Capstone (40 students)

  Current state (all courses):
  - Midterm exam: 30%, Final exam: 40%,
    Homework: 20%, Participation: 10%
  - Exams are primarily code-tracing and algorithm
    analysis on paper

  Program learning outcomes:
  A. Design, implement, and evaluate computing
     solutions
  B. Apply CS theory to practice
  C. Function effectively in teams
  D. Communicate technical concepts effectively
  E. Recognize professional, ethical, and social
     responsibilities
  F. Apply knowledge of computing to real-world
     problems

  Redesign requirements:
  1. For each of the 8 courses:
     - Proposed assessment mix (types and weights)
     - How each assessment maps to program outcomes
     - Constructive alignment: learning activities →
       assessments → outcomes
     - Feasibility notes (considering class size)

  2. Assessment method catalog
     - For each method proposed (e.g., coding
       project, code review, technical presentation,
       portfolio, peer assessment, lab practical,
       open-book exam), provide:
     - Description and implementation guidance
     - Which outcomes it best assesses
     - Pros and cons
     - Grading approach and rubric sketch

  3. Transition plan
     - Phased rollout across 4 semesters
     - Faculty development needs (training on new
       assessment methods)
     - Student communication (managing expectations)
     - Resource requirements (TA hours, technology)

  4. Quality assurance
     - How to evaluate if the new assessments are
       better than exams
     - Grade distribution monitoring
     - Student feedback collection
     - Inter-rater reliability for subjective
       assessments

  Task: Create the assessment redesign for all 8
  courses, the method catalog, transition plan,
  and quality assurance framework.

assertions:
  - type: llm_judge
    criteria: "Response redesigns all 8 courses — each has a proposed assessment mix with weights, outcome mapping, and constructive alignment; the assessment method catalog describes each proposed method with implementation guidance, outcome alignment, pros/cons, and rubric sketches; transition plan covers 4-semester rollout with faculty development; quality assurance framework includes evaluation criteria and monitoring."
    weight: 0.35
    description: "RedesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment redesign expertise — assessment methods are appropriate for each course's content and class size; constructive alignment is genuine (not just relabeling exams); the catalog covers diverse methods beyond traditional testing; the transition plan is realistic about faculty adoption challenges; quality assurance measures would detect if the new system is actually better."
    weight: 0.35
    description: "RedesignExpertise"
  - type: llm_judge
    criteria: "Response would satisfy accreditation and improve learning — the redesigned assessments directly measure program outcomes including collaboration and professional practice; the mix reduces exam dependence while maintaining rigor; the transition plan would get faculty buy-in; students would develop demonstrable professional competencies; the department would pass its next accreditation review."
    weight: 0.30
    description: "AccreditationAndLearning"
