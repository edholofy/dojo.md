meta:
  id: assessment-bias-remediation
  level: 3
  course: quiz-and-assessment-creation
  type: output
  description: "Conduct a systematic bias review of a state licensing exam, develop a culturally responsive revision process, and create a fairness framework for ongoing item development"
  tags: [bias, equity, licensing-exam, cultural-responsiveness, advanced]

state: {}

trigger: |
  You're an assessment equity consultant hired by a
  state board of education. Their teacher licensing
  exam has a 22-percentage-point pass rate gap
  between white candidates (78%) and candidates of
  color (56%). After a discrimination lawsuit, the
  board must demonstrate that the exam is fair and
  valid, or risk losing the legal challenge.

  Exam details:
  - 120 multiple choice questions, 3-hour time limit
  - Tests: pedagogy (40%), subject knowledge (35%),
    professional responsibilities (25%)
  - Cut score: 70% (84/120)
  - Administered 3 times per year to ~5,000
    candidates total
  - Used for initial teacher licensure in the state

  Evidence of potential bias discovered:
  1. Scenario questions disproportionately feature
     suburban, middle-class school contexts
  2. "Correct" classroom management answers reflect
     one cultural norm of teacher authority
  3. Reading level of question stems is at graduate
     level (the exam tests teaching ability, not
     reading comprehension)
  4. Time pressure may disadvantage candidates whose
     first language isn't English (even though
     teaching will be in English)
  5. Historical content questions assume familiarity
     with specific cultural references
  6. The item development committee has been 90%
     white for the past decade

  Task requirements:

  1. Bias analysis report
     - Analyze each of the 6 evidence types
     - Explain how each could contribute to the
       pass rate gap
     - Distinguish between construct-relevant and
       construct-irrelevant variance
     - Recommend DIF (Differential Item Functioning)
       analysis methodology

  2. Remediation plan
     - Specific actions to address each bias source
     - Timeline for implementation (what can be done
       immediately vs. next cycle vs. long-term)
     - How to revise items without compromising
       content validity
     - 3 example questions: original biased version,
       analysis of the bias, revised culturally
       responsive version

  3. Fairness framework
     - Item development process that prevents bias
       from entering new items
     - Diverse review panel composition and training
     - Sensitivity review protocol
     - Ongoing DIF monitoring plan
     - Stakeholder communication strategy

  4. Legal defensibility memo
     - How the remediation plan addresses the
       lawsuit's claims
     - Evidence of validity the board should gather
     - Standards for Educational and Psychological
       Testing compliance

  Task: Create the bias analysis report, remediation
  plan, fairness framework, and legal defensibility
  memo.

assertions:
  - type: llm_judge
    criteria: "Response creates all four deliverables — bias analysis explains each of the 6 evidence types with construct-relevant vs. irrelevant distinction; remediation plan has specific actions, timeline, and 3 example question revisions; fairness framework covers item development, diverse panels, sensitivity review, and DIF monitoring; legal defensibility memo addresses lawsuit claims and SEPT compliance."
    weight: 0.35
    description: "BiasRemediationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment equity expertise — correctly distinguishes construct-relevant from construct-irrelevant variance; DIF methodology is correctly described; the 3 question revisions genuinely reduce bias while maintaining validity; the fairness framework would prevent future bias; the legal memo reflects knowledge of testing standards and case law; the cultural responsiveness is substantive, not performative."
    weight: 0.35
    description: "EquityExpertise"
  - type: llm_judge
    criteria: "Response would help the board win the lawsuit and improve the exam — the remediation plan is implementable and defensible; the fairness framework would narrow the pass rate gap; the revised items maintain content validity; the stakeholder communication builds public trust; the overall approach balances fairness with maintaining meaningful licensure standards."
    weight: 0.30
    description: "LegalAndPracticalResolution"
