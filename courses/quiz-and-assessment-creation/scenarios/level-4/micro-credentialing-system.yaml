meta:
  id: micro-credentialing-system
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design a micro-credentialing system for a state teacher professional development program, with competency-based digital badges, assessment pathways, and recognition frameworks"
  tags: [micro-credentials, digital-badges, teacher-pd, competency, expert]

state: {}

trigger: |
  You're the Director of Professional Learning at
  a state department of education. The state is
  launching a micro-credentialing system to replace
  the traditional "seat time" professional
  development model for the state's 85,000 teachers.
  Instead of sitting through workshops and logging
  hours, teachers will earn competency-based micro-
  credentials by demonstrating skills in their
  practice.

  System parameters:
  - 85,000 licensed teachers across 500 districts
  - Micro-credentials replace PD hour requirements
    for license renewal (currently 120 hours per
    5-year cycle)
  - Teachers choose micro-credentials relevant to
    their goals
  - Each micro-credential = evidence of competency
    in specific skill
  - Digital badges (Open Badges 3.0 standard)
  - Must work for teachers at all career stages

  Design requirements:

  1. Micro-credential framework
     - Categories of micro-credentials (instructional
       practice, content knowledge, leadership,
       equity, technology, social-emotional learning)
     - Stacking model: how individual micro-
       credentials combine into larger credentials
     - 3 tiers: Foundational, Advanced, Expert
     - How many micro-credentials = one license
       renewal cycle
     - Competency statements for each category

  2. Assessment design for micro-credentials
     - Evidence submission requirements per micro-
       credential (what teachers submit to prove
       competency)
     - Types of evidence: classroom video, student
       work samples, lesson plans, reflection essays,
       peer observations, student survey data
     - Evaluation rubric for each evidence type
     - Design 3 complete micro-credentials with full
       specifications:
       a) "Formative Assessment Practices" (ironic!)
       b) "Culturally Responsive Teaching"
       c) "Technology-Enhanced Learning"

  3. Reviewer system
     - Who evaluates micro-credential submissions
       (trained peer reviewers, not supervisors)
     - Reviewer recruitment, training, and calibration
     - Conflict of interest policies
     - Quality assurance and inter-rater reliability
     - Reviewer compensation model
     - Expected submission-to-decision timeline

  4. Technology platform requirements
     - Open Badges 3.0 compliance specifications
     - Portfolio submission system features
     - Reviewer management workflow
     - Dashboard for teachers, administrators, and
       state-level reporting
     - Integration with existing licensure database
     - Accessibility requirements

  5. Change management
     - Communication plan for 85,000 teachers
     - District administrator guidance
     - Pilot program design (which districts, how
       many teachers, timeline)
     - Evaluation plan for the micro-credential
       system itself
     - How to handle pushback from PD providers
       losing business

  Task: Create the complete micro-credentialing
  system with framework, 3 detailed micro-
  credentials, reviewer system, platform specs,
  and change management plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete system — micro-credential framework with categories, stacking, and 3 tiers; 3 fully specified micro-credentials (Formative Assessment, CRT, Tech-Enhanced) with evidence requirements and rubrics; reviewer system with training, calibration, and QA; technology platform requirements with Open Badges 3.0; change management with pilot design and communication plan."
    weight: 0.35
    description: "MicroCredentialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates micro-credentialing expertise — evidence requirements are authentic (not just paperwork); the 3 micro-credentials would genuinely assess teacher competency; the stacking model creates meaningful career pathways; the reviewer system ensures quality at scale; Open Badges 3.0 specifications are technically accurate; the change management addresses real teacher and district concerns."
    weight: 0.35
    description: "MicroCredentialExpertise"
  - type: llm_judge
    criteria: "Response would replace seat-time PD successfully — teachers would find the system more meaningful than workshop hours; the competency evidence would improve actual teaching practice; the micro-credentials would be recognized by districts and universities; the system would scale to 85,000 teachers; the pilot program would surface issues before statewide rollout."
    weight: 0.30
    description: "SystemTransformation"
