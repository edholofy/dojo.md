meta:
  id: expert-assessment-shift
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Handle three expert-level assessment crises — a psychometric scandal at a testing company, a university assessment boycott, and a corporate skills gap analysis failure"
  tags: [shift-simulation, crisis-management, expert-level, multi-crisis, expert]

state: {}

trigger: |
  You're the Chief Assessment Officer at a global
  assessment consulting firm. Three urgent situations
  require your expertise this week.

  Crisis 1: Testing Company Psychometric Scandal
  A major testing company (your client) is facing
  public exposure: a data journalist has obtained
  internal documents showing that for 3 years, the
  company's flagship certification exam (taken by
  200,000 candidates annually) had a scoring error
  that inflated scores by 3-8 points on a 100-point
  scale. Approximately 12,000 candidates may have
  passed who should have failed. The story publishes
  in 72 hours.
  - Write the crisis communication plan
  - Design the scoring correction methodology
  - Propose the remediation plan for affected
    candidates (do they lose their certifications?)
  - Draft the technical report explaining the error
    and correction
  - Recommend governance changes to prevent
    recurrence

  Crisis 2: University Assessment Boycott
  Faculty at a prestigious university have organized
  an "Assessment Boycott" — 40% of faculty refuse
  to participate in program assessment activities,
  calling them "performative compliance that wastes
  faculty time and undermines academic freedom." The
  provost has hired you to mediate. The accreditation
  visit is in 8 months.
  - Analyze the faculty's legitimate concerns vs.
    accreditation requirements
  - Propose a "meaningful assessment" model that
    addresses both faculty concerns and accreditor
    expectations
  - Design the mediation process
  - Write the agreement document both sides could
    accept
  - Create the 8-month implementation timeline

  Crisis 3: Skills Gap Analysis Failure
  A Fortune 500 client spent $3M on a company-wide
  skills assessment (all 25,000 employees). The
  results are useless — the assessment tool was
  self-report only, the competency framework was
  too generic, managers don't trust the data, and
  the vendor has been fired. The CHRO wants you to
  salvage the situation and produce actionable
  skills data.
  - Diagnose what went wrong with the original
    assessment
  - Design a "rescue" assessment approach that
    reuses some existing data and fills the gaps
  - Propose a validated competency assessment
    methodology
  - Create a realistic timeline and budget
  - Design the skills dashboard the CHRO actually
    needs

  Task: Address all three crises with full
  deliverables.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three crises — the scoring scandal has crisis communication, correction methodology, remediation plan, technical report, and governance changes; the assessment boycott has analysis, meaningful model, mediation process, agreement document, and 8-month timeline; the skills gap failure has diagnosis, rescue approach, validated methodology, timeline/budget, and dashboard design."
    weight: 0.35
    description: "CrisisCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expert assessment leadership — the scoring correction methodology is psychometrically sound; the crisis communication balances transparency with legal protection; the faculty mediation genuinely addresses academic freedom concerns; the meaningful assessment model satisfies accreditors without being performative; the skills gap rescue uses validated methods; each crisis response reflects deep assessment expertise."
    weight: 0.35
    description: "ExpertLeadership"
  - type: llm_judge
    criteria: "Response would resolve each crisis effectively — the testing company would survive the scandal with reputation partially intact; the university would achieve accreditation with faculty buy-in; the Fortune 500 company would get actionable skills data; each solution is implementable within its timeline; the overall response demonstrates why organizations need assessment expertise."
    weight: 0.30
    description: "CrisisResolution"
