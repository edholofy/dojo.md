meta:
  id: national-certification-program
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design a national professional certification exam program from scratch, including job analysis, test development, standard setting, and ongoing maintenance"
  tags: [certification, national, standard-setting, psychometrics, expert]

state: {}

trigger: |
  You're the Director of Certification at a newly
  formed professional association for data analytics
  professionals. The board has approved creating a
  "Certified Data Analytics Professional" (CDAP)
  credential — the first nationally recognized
  certification in this field. You must build the
  entire certification exam program from scratch,
  following psychometric best practices and NCCA
  (National Commission for Certifying Agencies)
  accreditation standards.

  Target population:
  - Data analysts with 2+ years of experience
  - Expected 5,000 candidates in Year 1, growing
    to 15,000 by Year 3
  - Diverse backgrounds: statistics, business,
    computer science, self-taught
  - Exam offered at 200 Prometric testing centers
    nationwide + online proctored

  Design requirements:

  1. Job analysis / practice analysis
     - Methodology for conducting the job analysis
     - Draft the content domains and task statements
       (based on typical data analytics work)
     - How subject matter experts (SMEs) are selected
     - Survey design for validating task importance
       and frequency
     - How the job analysis feeds the test blueprint

  2. Test development
     - Test blueprint with content domains, weights,
       and cognitive levels
     - Item development process (from SME workshop
       to pilot testing)
     - Item types: multiple choice (100), performance-
       based simulations (5 — e.g., "given this
       dataset, perform the analysis")
     - Item bank management (target size, metadata,
       security)
     - Pilot testing and field testing methodology
     - Equating plan for multiple test forms

  3. Standard setting
     - Method selection (modified Angoff, Bookmark,
       or other — justify choice)
     - Standard setting panel composition
     - Process for determining the cut score
     - Passing score defensibility documentation
     - Impact data analysis (projected pass rates by
       demographic)

  4. Exam administration
     - Security protocols (item exposure control,
       candidate misconduct)
     - Accommodations policy (ADA compliance)
     - Score reporting (what candidates receive,
       timeline, diagnostic feedback)
     - Retake policy
     - Appeals and score review process

  5. Ongoing maintenance
     - Annual item development cycle
     - 5-year job analysis refresh
     - Continuous item analysis and bank maintenance
     - Program evaluation metrics
     - NCCA accreditation application timeline

  Task: Create the complete certification program
  design document with all 5 sections.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — job analysis methodology with content domains and task statements; test blueprint with 100 MC and 5 simulations; item development process through pilot testing and equating; standard setting with justified method, panel composition, and cut score process; administration with security, accommodations, and score reporting; maintenance plan with annual cycle and NCCA timeline."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification program expertise — the job analysis follows NCCA standards; content domains reflect actual data analytics practice; the standard setting method is justified for this context; item development workshops are properly structured; equating methodology ensures form equivalence; security protocols are appropriate for high-stakes testing; the overall program would meet NCCA accreditation requirements."
    weight: 0.35
    description: "CertificationExpertise"
  - type: llm_judge
    criteria: "Response would produce a credible national certification — the CDAP would be recognized as a legitimate credential; the exam would distinguish qualified from unqualified practitioners; the psychometric foundation is sound; the program would scale from 5,000 to 15,000 candidates; employers would value the certification; the program would achieve NCCA accreditation."
    weight: 0.30
    description: "CredentialCredibility"
