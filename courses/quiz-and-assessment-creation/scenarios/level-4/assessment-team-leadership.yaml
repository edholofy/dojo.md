meta:
  id: assessment-team-leadership
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Build and lead an assessment department from scratch at a growing education company, including team structure, hiring plan, processes, and quality standards"
  tags: [leadership, team-building, assessment-department, processes, expert]

state: {}

trigger: |
  You're the first-ever Director of Assessment at
  a rapidly growing education company that produces
  curriculum and assessments for K-12 schools. The
  company has 50 curriculum developers but zero
  assessment professionals — assessment has been
  done ad hoc by curriculum writers with no formal
  training. The result: inconsistent quality,
  complaints from districts about test reliability,
  and a failed pilot with a large state that cited
  "lack of psychometric rigor."

  Company context:
  - $40M revenue, 2,000 district customers
  - Product: K-8 ELA and math curriculum with
    embedded assessments
  - Current assessment inventory: 3,200 items across
    12 grade-subject combinations
  - No item analysis has ever been conducted
  - No standardized item development process
  - Budget for your department: $1.8M first year,
    growing to $2.5M by Year 3
  - CEO's mandate: "Fix assessment quality and win
    the state contract"

  Build requirements:

  1. Department structure and hiring plan
     - Organizational chart for the assessment team
     - Roles needed (psychometrician, item writers,
       assessment specialist, data analyst, etc.)
     - Year 1 hiring priorities (can't hire everyone
       at once)
     - Job descriptions for the first 3 hires
     - Skills and qualifications for each role
     - Budget allocation across positions, tools,
       and operations

  2. Assessment quality standards
     - Item development process (from concept to
       publication)
     - Quality review gates (who reviews what at
       each stage)
     - Item writing guidelines for curriculum
       developers (who will still write many items)
     - Bias and sensitivity review protocol
     - Technical quality standards (difficulty,
       discrimination, reliability targets)

  3. Current inventory remediation
     - Plan to audit the 3,200 existing items
     - Triage methodology (keep, revise, discard)
     - Timeline for completing the audit
     - Pilot testing plan for unvalidated items
     - How to handle items already in use by
       districts

  4. State contract readiness
     - What the state requires for psychometric
       quality
     - Gap analysis between current capabilities
       and state requirements
     - 12-month roadmap to state contract readiness
     - Technical documentation to prepare
     - Alignment and validity evidence to collect

  5. Cross-functional integration
     - How assessment works with curriculum
       development
     - Workflow for new product development
     - Data feedback loop (assessment data →
       curriculum improvement)
     - Technology requirements (assessment platform,
       analytics tools)

  Task: Create the complete department build-out
  plan with team structure, quality standards,
  remediation plan, state readiness roadmap, and
  integration model.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete department plan — org chart with roles and Year 1 hiring priorities; 3 job descriptions with qualifications; assessment quality standards with item development process and review gates; 3,200-item audit plan with triage methodology; state contract readiness roadmap; cross-functional integration model with curriculum team workflows; budget allocation within $1.8M."
    weight: 0.35
    description: "DepartmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment leadership expertise — the team structure covers essential assessment functions; hiring priorities reflect what's most urgent; quality standards are rigorous but implementable; the inventory audit is systematic; the state readiness roadmap identifies real requirements; the cross-functional model addresses the curriculum developer relationship; the budget is realistic."
    weight: 0.35
    description: "LeadershipExpertise"
  - type: llm_judge
    criteria: "Response would transform the company's assessment quality — the department would fix the reliability complaints; the item development process would prevent future quality issues; the audit would remediate the existing inventory; the state contract would become achievable; the cross-functional model would prevent the 'ad hoc by curriculum writers' problem from recurring."
    weight: 0.30
    description: "TransformationalImpact"
