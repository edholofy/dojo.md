meta:
  id: assessment-for-learning-disabilities
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design a comprehensive assessment system for students with learning disabilities that provides valid measurement while ensuring equitable access and appropriate accommodations"
  tags: [learning-disabilities, special-education, accommodations, equity, expert]

state: {}

trigger: |
  You're the Director of Special Education
  Assessment for a large urban school district
  (95,000 students, of which 14,000 have IEPs).
  A federal monitoring review found that the
  district's assessment practices for students
  with disabilities are "inconsistent, often
  inappropriate, and fail to provide valid
  measures of what students know and can do." The
  district must submit a corrective action plan
  within 90 days.

  Problems identified:
  1. Accommodation decisions are arbitrary — some
     schools give extended time to all IEP students,
     others give none
  2. 2,800 students are taking alternate assessments
     who may not qualify (only students with
     significant cognitive disabilities should — the
     federal cap is 1% of tested students)
  3. No guidance for teachers on how to administer
     assessments with accommodations
  4. Progress monitoring assessments aren't sensitive
     enough to measure small gains
  5. Assessment data isn't used to adjust IEP goals
  6. English learners with disabilities (1,200
     students) receive neither EL nor disability
     accommodations consistently

  Corrective action requirements:

  1. Accommodation decision-making framework
     - How IEP teams decide which accommodations a
       student receives
     - Accommodation categories: presentation,
       response, setting, timing/scheduling
     - Decision-making flowchart for each category
     - List of allowable vs. non-allowable
       accommodations by assessment type
     - Training guide for IEP teams
     - Documentation requirements

  2. Alternate assessment eligibility criteria
     - Criteria for participation in alternate
       assessment vs. general assessment with
       accommodations
     - Decision-making guide for IEP teams
     - How to identify the ~1,400 students who
       should be moved from alternate to general
       assessment
     - Support plan for transitioned students
     - Parent communication strategy

  3. Progress monitoring assessment system
     - Curriculum-based measurement (CBM) selection
       and administration guidelines
     - Frequency of monitoring by disability category
     - How to interpret progress data (trend lines,
       rate of improvement)
     - Decision rules: when to adjust instruction
       vs. when to adjust goals
     - 3 sample progress monitoring protocols for
       different disability types

  4. Dual-identified student (EL + disability)
     assessment protocol
     - How to determine if a student's difficulties
       are language-based or disability-based
     - Accommodation planning for dually identified
       students
     - Assessment in native language vs. English
       decision framework
     - 2 sample cases with assessment plans

  5. Assessment data → IEP integration
     - How assessment data informs IEP goal writing
     - Templates for data-driven IEP goals
     - How annual assessment results trigger IEP
       reviews
     - Dashboard concept showing student assessment
       profile for IEP meetings

  Task: Create the complete corrective action plan
  with all 5 components.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete corrective action plan — accommodation framework with decision flowcharts and training guide; alternate assessment eligibility criteria with transition plan for 1,400 students; progress monitoring system with CBM guidelines and 3 sample protocols; dual-identified student protocol with 2 case studies; assessment-to-IEP integration with templates and dashboard concept."
    weight: 0.35
    description: "CorrectiveActionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates special education assessment expertise — accommodation decisions follow IDEA requirements; alternate assessment eligibility criteria align with federal 1% cap; CBM selection is appropriate for different disability categories; dual-identification protocols correctly distinguish language from disability; IEP goal templates use SMART criteria with assessment data; the plan addresses all federal monitoring findings."
    weight: 0.35
    description: "SpecialEdExpertise"
  - type: llm_judge
    criteria: "Response would resolve the federal monitoring findings — each identified problem has a specific solution; the corrective action plan is implementable within 90 days for initial submission; the accommodation framework would produce consistent, defensible decisions; transitioned students would be supported; the district would come into compliance while improving outcomes for 14,000 students with IEPs."
    weight: 0.30
    description: "ComplianceResolution"
