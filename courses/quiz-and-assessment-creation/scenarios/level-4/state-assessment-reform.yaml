meta:
  id: state-assessment-reform
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Lead a state's transition from traditional standardized testing to a through-course assessment model with performance tasks, balancing federal requirements with innovation"
  tags: [state-assessment, reform, policy, performance-tasks, expert]

state: {}

trigger: |
  You're the Chief Assessment Officer for a state
  department of education. The governor has signed
  legislation requiring the state to transition
  from its current "one big test" standardized
  assessment system to a "through-course" model
  that distributes assessment across the school
  year and includes performance tasks. The federal
  government (via ESSA) still requires annual
  assessment in ELA, math (grades 3-8 and once in
  high school), and science (3 grade spans).

  Current system:
  - Annual 3-day testing window (March)
  - All multiple choice and short constructed
    response
  - Scores reported in June (3 months later)
  - Strong psychometric properties but minimal
    instructional value
  - Cost: $35 per student, $28M annually
  - Teachers and parents hate the testing window

  New system requirements:
  - 3 assessment windows distributed across the year
    (fall, winter, spring)
  - Each window: shorter than current (90 min max),
    mix of selected response and performance tasks
  - Performance tasks: real-world application,
    scored by trained teachers
  - Results available within 2 weeks of each window
  - Must produce an annual summative score that
    meets ESSA technical requirements
  - Must maintain year-to-year comparability during
    transition
  - Budget: $42 per student ($33.6M — 20% increase
    approved)

  Design requirements:

  1. Assessment architecture
     - How 3 windows combine into annual scores
     - Content distribution across windows
     - Item types per window (selected response,
       constructed response, performance task)
     - Scoring model (combining teacher-scored
       performance tasks with machine-scored items)
     - Score scale design maintaining comparability

  2. Performance task design
     - Framework for performance task development
     - 2 complete sample performance tasks (one ELA,
       one math) for grade 5
     - Task specifications: stimulus materials,
       student instructions, scoring rubric, anchor
       papers at each score point
     - Administration guidelines (timing, materials
       allowed, accommodations)

  3. Teacher scoring system
     - How many teachers needed for scoring
     - Training protocol for scoring performance tasks
     - Inter-rater reliability standards and monitoring
     - Calibration and recalibration procedures
     - Cost model for teacher scoring
     - Quality control and backreading

  4. Technical quality plan
     - How to meet PEER REVIEW technical requirements
     - Reliability evidence for the through-course
       model
     - Validity argument for combining windows
     - Comparability study design (old system vs. new)
     - Fairness review process

  5. Implementation plan
     - 3-year phase-in timeline
     - Year 1: pilot (20 districts)
     - Year 2: field test (all districts, low-stakes)
     - Year 3: operational
     - Stakeholder communication (teachers, parents,
       legislators, media)
     - Risk mitigation

  Task: Design the complete through-course assessment
  system with architecture, sample tasks, scoring
  system, technical plan, and implementation timeline.

assertions:
  - type: llm_judge
    criteria: "Response designs the complete through-course system — 3-window architecture with content distribution and scoring model; 2 complete performance tasks (ELA and math) with rubrics and anchor papers; teacher scoring system with training, reliability standards, and cost model; technical quality plan meeting ESSA peer review requirements; 3-year implementation with pilot, field test, and operational phases."
    weight: 0.35
    description: "StateAssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates state assessment expertise — the 3-window model maintains annual summative validity; performance tasks are authentic and scorable; the scoring model is psychometrically sound for combining human and machine scores; the technical quality plan addresses real ESSA peer review criteria; the comparability study would demonstrate continuity; the budget model is realistic at $42/student."
    weight: 0.35
    description: "StateAssessmentExpertise"
  - type: llm_judge
    criteria: "Response would successfully reform the state's assessment system — the transition from one-big-test to through-course would improve instructional value; teachers would see assessment as useful rather than intrusive; results within 2 weeks would enable action; federal requirements would be met; the 3-year implementation is realistic; political and public support would be maintained."
    weight: 0.30
    description: "ReformSuccess"
