meta:
  id: institutional-assessment-framework
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design a university-wide institutional assessment framework for accreditation, covering program-level outcomes, general education assessment, and continuous improvement cycles"
  tags: [institutional, accreditation, higher-education, framework, expert]

state: {}

trigger: |
  You're the newly hired Vice Provost for
  Institutional Effectiveness at a regional
  university (12,000 students, 45 undergraduate
  programs, 18 graduate programs). The university
  failed its last accreditation visit — the Higher
  Learning Commission cited "insufficient evidence
  of systematic assessment of student learning
  outcomes" and "no evidence of using assessment
  data for continuous improvement." You have 18
  months before the follow-up visit.

  Current state:
  - Only 12 of 45 programs have assessment plans
  - No consistent assessment reporting template
  - General education has no assessment at all
  - Faculty view assessment as "compliance busywork"
  - No institutional learning outcomes defined
  - Assessment data exists in scattered spreadsheets
  - No assessment management system

  What you must build:

  1. Institutional learning outcomes (ILOs)
     - Draft 5-7 ILOs that all graduates should
       achieve
     - Map how ILOs connect to program outcomes
     - Define how ILOs will be assessed across the
       curriculum

  2. Program assessment framework
     - Template for program-level assessment plans
     - Assessment cycle (what happens each year)
     - Curriculum mapping guide (outcomes to courses)
     - Direct and indirect assessment methods menu
     - "Closing the loop" requirements — how programs
       must use data to improve
     - Complete example: one fully developed
       assessment plan for a sample program
       (Psychology BA)

  3. General education assessment plan
     - How to assess gen ed outcomes across hundreds
       of sections taught by different faculty
     - Sampling strategy (you can't assess everything)
     - Rubric development for gen ed competencies
     - Faculty involvement model
     - Reporting and improvement cycle

  4. Assessment infrastructure
     - Assessment management system requirements
       (RFP criteria)
     - Assessment committee structure (who reviews
       what)
     - Faculty development program on assessment
     - Annual assessment reporting calendar
     - How to make assessment meaningful (not just
       compliance)

  5. 18-month implementation timeline
     - Phased plan with milestones
     - Quick wins for the first 6 months
     - What the accreditors need to see at the
       follow-up visit
     - Resource requirements (budget, personnel)

  Task: Create the complete institutional assessment
  framework with ILOs, program template with
  Psychology example, gen ed plan, infrastructure
  design, and implementation timeline.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete institutional framework — 5-7 ILOs with program mapping; program assessment template with cycle, curriculum mapping, methods menu, and closing-the-loop requirements plus a Psychology BA example; general education assessment plan with sampling and rubrics; infrastructure design with system requirements, committee structure, faculty development, and calendar; 18-month phased timeline with milestones."
    weight: 0.35
    description: "InstitutionalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates institutional assessment expertise — ILOs are appropriately broad and measurable; the program template balances rigor with faculty workload; the gen ed sampling strategy is statistically sound; the Psychology example is realistic and complete; the infrastructure addresses faculty resistance; the timeline would satisfy HLC accreditors; the approach makes assessment meaningful rather than bureaucratic."
    weight: 0.35
    description: "InstitutionalExpertise"
  - type: llm_judge
    criteria: "Response would save the university's accreditation — the 18-month plan would produce sufficient evidence for the HLC follow-up visit; the framework would become sustainable beyond the crisis; faculty would see value in the process; the infrastructure would support continuous improvement; the university would move from 'insufficient evidence' to 'systematic assessment culture.'"
    weight: 0.30
    description: "AccreditationRecovery"
