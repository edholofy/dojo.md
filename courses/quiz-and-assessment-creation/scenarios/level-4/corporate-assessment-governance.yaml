meta:
  id: corporate-assessment-governance
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Establish an enterprise-wide assessment governance framework for a Fortune 100 company, standardizing assessment practices across HR, L&D, compliance, and talent management"
  tags: [governance, enterprise, standardization, fortune-100, expert]

state: {}

trigger: |
  You're the VP of Talent Assessment at a Fortune
  100 technology company (120,000 employees globally).
  An internal audit revealed a chaotic assessment
  landscape: HR uses one set of hiring assessments,
  L&D uses another for training, compliance uses a
  third for regulatory testing, and talent management
  uses a fourth for succession planning. None are
  coordinated, many overlap, some are legally
  questionable, and the company spends $12M annually
  on assessments with no clear ROI data.

  Current assessment chaos:
  - HR: 47 different hiring assessments purchased
    from 12 vendors, no validation studies
  - L&D: 200+ compliance quizzes of varying quality,
    15 leadership assessment tools, custom-built
    skills assessments
  - Talent Management: 3 different 360-feedback
    tools, 2 executive assessment vendors, an
    internal high-potential assessment with no
    psychometric validation
  - Regional variation: APAC uses different tools
    than EMEA and Americas
  - Data: assessment data in 8 different systems
    with no integration

  Governance requirements:

  1. Assessment inventory and rationalization
     - How to catalog all existing assessments
     - Evaluation criteria for keep/consolidate/
       retire decisions
     - Vendor evaluation framework
     - Target state: how many assessments should the
       company have?
     - Cost savings projection from rationalization

  2. Enterprise assessment standards
     - Quality standards for all assessments used
       (hiring, development, compliance, talent)
     - Validation requirements by assessment purpose
       and stakes
     - Bias review and adverse impact monitoring
       requirements
     - Global adaptation standards (language,
       culture, local law)
     - Data privacy and security requirements (GDPR,
       CCPA, local regulations)

  3. Assessment governance structure
     - Governance committee composition and charter
     - Assessment approval process (who can purchase
       or create assessments)
     - Annual review cycle for all assessments
     - Roles: assessment owner, assessment steward,
       governance chair
     - Escalation and exception process

  4. Unified assessment data strategy
     - Single assessment data architecture
     - How assessment data flows across HR, L&D,
       and talent management
     - Analytics and reporting (assessment ROI,
       predictive insights, equity monitoring)
     - Assessment data lifecycle (retention,
       deletion, access controls)
     - Dashboard concept for CHRO

  5. Implementation roadmap
     - Phase 1 (6 months): Inventory and quick wins
     - Phase 2 (6-12 months): Standards and governance
     - Phase 3 (12-24 months): Data integration and
       analytics
     - Change management for business units losing
       "their" assessments
     - Success metrics for the governance program

  Task: Create the complete governance framework
  with inventory plan, standards, governance
  structure, data strategy, and implementation
  roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — assessment inventory with evaluation criteria and rationalization plan; enterprise quality standards covering all assessment types with validation and bias requirements; governance structure with committee, approval process, and roles; unified data strategy with architecture and CHRO dashboard; 24-month implementation roadmap with phases, change management, and success metrics."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise assessment governance expertise — the inventory rationalization is data-driven; quality standards scale across 120,000 employees globally; the governance structure balances control with business unit autonomy; the data strategy integrates 8 siloed systems; global adaptation standards address real legal differences; the cost savings projection is credible."
    weight: 0.35
    description: "GovernanceExpertise"
  - type: llm_judge
    criteria: "Response would transform the company's assessment landscape — the $12M spend would be reduced and better allocated; assessment quality would improve across all functions; legal risk from unvalidated hiring assessments would be mitigated; leaders would have assessment data for better talent decisions; the governance program would sustain itself beyond the initial implementation."
    weight: 0.30
    description: "EnterpriseTransformation"
