meta:
  id: assessment-research-study
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design and write up a research study comparing the predictive validity of traditional vs. performance-based assessments for workplace performance outcomes"
  tags: [research, predictive-validity, workforce, study-design, expert]

state: {}

trigger: |
  You're a research scientist at a workforce
  assessment company. Your CEO wants to publish
  landmark research demonstrating that your
  company's performance-based assessments predict
  job performance better than traditional cognitive
  ability tests. This would differentiate your
  product and could reshape the pre-employment
  testing industry. The research must be rigorous
  enough for publication in the Journal of Applied
  Psychology.

  Study context:
  - Compare predictive validity of:
    A) Traditional cognitive ability test (Wonderlic-
       style, 50 MC items, 12 minutes)
    B) Your company's performance-based assessment
       (simulated work tasks, 45 minutes)
    C) Combined A+B
  - Criterion: supervisor performance ratings
    collected 6 and 12 months after hire
  - Target sample: 800+ new hires across 15 client
    companies, 4 job families (customer service,
    sales, administrative, technical)
  - Secondary analysis: adverse impact comparison
    (do the assessments differ in demographic group
    differences?)

  Design requirements:

  1. Study design and methodology
     - Research questions and hypotheses
     - Study design (concurrent vs. predictive
       validity, justify choice)
     - Sampling strategy across companies and job
       families
     - Power analysis for required sample size
     - Statistical analysis plan (correlation,
       regression, incremental validity, subgroup
       analyses)

  2. Measurement specifications
     - Performance-based assessment task descriptions
       (design 4 simulated work tasks, one per job
       family)
     - Scoring rubrics for performance tasks
     - Criterion measure: supervisor rating form
       design (behavioral anchored rating scale)
     - How to control for criterion contamination
       and deficiency

  3. Fairness analysis plan
     - Adverse impact calculations (4/5ths rule)
     - Differential prediction analysis
     - Measurement invariance testing across groups
     - How to report demographic differences
       responsibly
     - Implications for EEOC compliance

  4. Results section (hypothetical but realistic)
     - Present hypothetical results tables showing
       validity coefficients, incremental validity,
       and adverse impact ratios
     - What the data would need to show to support
       the company's claims
     - How to handle mixed results (what if some
       job families show no advantage?)

  5. Discussion and implications
     - Limitations section
     - Practical implications for hiring
     - Theoretical contribution
     - Future research directions

  Task: Write the complete research study with
  methodology, measurements, fairness analysis,
  hypothetical results, and discussion.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete research study — research questions with hypotheses; study design with sampling, power analysis, and statistical plan; 4 simulated work tasks with rubrics and BARS criterion measure; fairness analysis with adverse impact, differential prediction, and measurement invariance; hypothetical results tables with validity coefficients; discussion with limitations and implications."
    weight: 0.35
    description: "ResearchCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment research expertise — the study design is appropriate for predictive validity research; the power analysis is realistic; the statistical plan includes incremental validity analysis; the BARS criterion measure is well-constructed; the adverse impact analysis follows professional standards; the hypothetical results are realistic; the paper would be credible for the Journal of Applied Psychology."
    weight: 0.35
    description: "ResearchExpertise"
  - type: llm_judge
    criteria: "Response would serve the company's strategic goal — the study design would produce compelling evidence if the product works; the fairness analysis would differentiate from traditional tests on adverse impact; the research is ethical and transparent; the paper would influence the pre-employment testing industry; the discussion honestly addresses limitations."
    weight: 0.30
    description: "StrategicValue"
