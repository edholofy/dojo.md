meta:
  id: assessment-technology-platform
  level: 4
  course: quiz-and-assessment-creation
  type: output
  description: "Design the product requirements for an AI-powered assessment platform that automates item generation, adaptive delivery, and predictive analytics for K-12 districts"
  tags: [edtech, product-design, ai-assessment, platform, expert]

state: {}

trigger: |
  You're the VP of Assessment Science at an edtech
  startup that has raised $25M Series B to build
  "AssessAI" — an AI-powered assessment platform
  for K-12 school districts. The platform combines
  AI item generation, adaptive delivery, automated
  scoring, and predictive analytics. You need to
  design the assessment science architecture that
  will be the core of the product.

  Product vision:
  - Districts upload their standards and curriculum
  - AssessAI automatically generates aligned
    assessment items
  - Items are reviewed by teacher committees
  - Assessments are delivered adaptively
  - AI scores constructed-response items
  - Predictive analytics identify at-risk students
  - Teacher dashboards show actionable insights

  Design requirements:

  1. AI item generation engine
     - How AI generates items from standards and
       curriculum documents
     - Quality control pipeline (AI generates →
       human reviews → pilot tests → calibrates)
     - Item template library (what AI needs as input)
     - Handling different content areas (math items
       vs. ELA items vs. science items)
     - Bias detection in AI-generated items
     - 5 example items: show the standard, the AI
       prompt, the generated item, and what human
       review would check

  2. Adaptive delivery engine
     - IRT model selection for K-12 context
     - Content balancing across standards
     - Grade-level spanning (for above/below grade)
     - Test length optimization (minimum items for
       reliable measurement)
     - Real-time score estimation and confidence
       intervals
     - Handling classroom constraints (45-minute
       periods)

  3. AI scoring engine
     - What types of responses can be AI-scored
       (short answer, extended response, math work)
     - Training data requirements for scoring models
     - Human-AI scoring concordance validation
     - Confidence-based routing (when AI defers to
       human scoring)
     - How to handle scoring disagreements
     - Rubric-to-model training process

  4. Predictive analytics module
     - Student risk prediction model design
     - Feature engineering (what data predicts
       outcomes)
     - Ethical guardrails (preventing self-fulfilling
       prophecies)
     - How to present predictions to teachers
       responsibly
     - Model validation and monitoring for bias drift

  5. Data privacy and ethics
     - FERPA and COPPA compliance architecture
     - Student data minimization principles
     - AI transparency requirements (what can parents
       see about how AI is used)
     - Algorithmic fairness standards
     - Third-party audit plan

  Task: Design the complete assessment science
  architecture for AssessAI with all 5 components.

assertions:
  - type: llm_judge
    criteria: "Response designs the complete assessment platform — AI item generation with quality pipeline and 5 examples; adaptive delivery with IRT model, content balancing, and classroom constraints; AI scoring with training process, concordance validation, and confidence routing; predictive analytics with risk models and ethical guardrails; data privacy with FERPA/COPPA compliance and algorithmic fairness."
    weight: 0.35
    description: "PlatformCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment technology expertise — the AI item generation pipeline is realistic and includes human oversight; adaptive delivery handles K-12 constraints; AI scoring concordance validation follows industry standards; predictive analytics ethics are substantive (not performative); the IRT model selection is appropriate; the overall architecture would work technically."
    weight: 0.35
    description: "AssessmentTechExpertise"
  - type: llm_judge
    criteria: "Response would produce a viable edtech product — districts would buy this platform; teachers would trust AI-generated items after review; adaptive delivery would improve over fixed-form tests; AI scoring would save teacher time while maintaining quality; predictions would help without harming students; the product would differentiate in the market and justify $25M investment."
    weight: 0.30
    description: "ProductViability"
