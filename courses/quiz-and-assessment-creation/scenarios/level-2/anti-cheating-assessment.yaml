meta:
  id: anti-cheating-assessment
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Redesign an online exam to maintain academic integrity without invasive proctoring, using assessment design strategies and honor code frameworks"
  tags: [academic-integrity, anti-cheating, online-exam, intermediate]

state: {}

trigger: |
  You're the director of online learning at a
  university with 8,000 online students. After
  controversy over invasive AI proctoring software
  (students complained about privacy violations,
  racial bias in face detection, and anxiety from
  being watched), the provost has banned third-party
  proctoring tools. You need to redesign online
  exams to maintain academic integrity through
  assessment design rather than surveillance.

  Current problem course: "Introduction to
  Accounting" (500 students per semester, 3
  sections, 100% online)
  - Current exam: 50 multiple choice questions from
    a static question bank, 60-minute time limit
  - Known cheating methods: sharing answers via
    GroupMe, Googling questions, using Chegg,
    sharing screens on Discord, AI-generated answers

  Redesign requirements:

  1. Assessment redesign strategy
     - Convert the exam format to reduce cheating
       opportunities through design (not proctoring)
     - Strategies: randomized question pools,
       personalized questions, open-book with
       application focus, timed per-question
       delivery, etc.
     - Show the new exam structure (format, timing,
       question types)
     - Include 10 sample questions that demonstrate
       the cheat-resistant design

  2. Question bank design
     - How to build a question bank large enough for
       randomization across 500 students
     - Parameterized questions (same concept,
       different numbers/scenarios)
     - 5 examples of parameterized question templates
     - Tagging system for difficulty and content
       alignment

  3. Alternative assessment components
     - Replace some exam weight with assignments that
       are inherently harder to cheat on
     - Propose the new grade breakdown (what % exam,
       what % alternatives)
     - Describe 2-3 alternative assessment types with
       implementation details

  4. Honor code and culture
     - Draft an updated academic integrity statement
       for the course syllabus
     - Pre-exam integrity pledge
     - What to do when cheating is suspected (process
       that's fair to students)
     - How to communicate "why integrity matters" to
       students (not just threats)

  5. Detection without proctoring
     - Statistical anomaly detection (what patterns
       suggest cheating)
     - Submission metadata analysis
     - How to investigate without false accusations

  Task: Create the complete integrity-by-design
  assessment system with redesigned exam, question
  bank strategy, alternative assessments, honor
  code framework, and detection methods.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete integrity-by-design system — redesigned exam format with 10 sample cheat-resistant questions; question bank design with 5 parameterized templates and tagging system; 2-3 alternative assessment components with grade breakdown; honor code with syllabus statement, integrity pledge, and investigation process; statistical detection methods without proctoring."
    weight: 0.35
    description: "IntegritySystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic integrity expertise — the redesigned questions are genuinely harder to cheat on (not just harder overall); parameterized questions maintain validity across variants; alternative assessments are practical for 500 students; the honor code approach builds culture rather than just threatening; detection methods would identify real cheating without false accusations."
    weight: 0.35
    description: "IntegrityExpertise"
  - type: llm_judge
    criteria: "Response would replace proctoring effectively — the system would maintain assessment validity without surveillance; students would find it harder to cheat through design; the alternatives would still assess accounting competencies; the honor code would shift culture positively; the detection methods would catch serious violations; the system would scale to 500 students across 3 sections."
    weight: 0.30
    description: "ProctoringReplacement"
