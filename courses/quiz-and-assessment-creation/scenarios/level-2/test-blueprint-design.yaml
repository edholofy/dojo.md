meta:
  id: test-blueprint-design
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Create a comprehensive test blueprint for a nursing program's pharmacology final exam, with content-cognitive matrix, item specifications, and question bank organization"
  tags: [test-blueprint, nursing, pharmacology, intermediate]

state: {}

trigger: |
  You're the assessment coordinator for a nursing
  program at a health sciences university. The
  pharmacology faculty need a test blueprint for
  their final exam that ensures content coverage,
  cognitive rigor, and alignment with NCLEX-RN
  preparation. Last semester, student complaints
  and poor item analysis data revealed the exam
  was unbalanced — too many drug-name recall
  questions, too few clinical application items.

  Course content domains and weights:
  1. Pharmacokinetics & Pharmacodynamics (15%)
     - Absorption, distribution, metabolism,
       excretion, drug interactions
  2. Cardiovascular Medications (20%)
     - Antihypertensives, anticoagulants, cardiac
       glycosides, antiarrhythmics
  3. CNS Medications (15%)
     - Analgesics, anxiolytics, antidepressants,
       antiepileptics
  4. Anti-infective Agents (15%)
     - Antibiotics, antivirals, antifungals,
       antiparasitics
  5. Endocrine Medications (10%)
     - Insulin, oral hypoglycemics, thyroid drugs,
       corticosteroids
  6. Patient Safety & Medication Administration (15%)
     - Rights of medication administration, error
       prevention, dosage calculations
  7. Special Populations (10%)
     - Pediatric, geriatric, pregnancy, renal/hepatic
       impairment dosing

  Blueprint requirements:
  - 80-question exam, 2-hour time limit
  - Content-cognitive matrix crossing all 7 domains
    with Bloom's levels (Remember through Evaluate)
  - At least 40% of questions at Apply level or
    higher
  - Question type specifications: standard MC (50),
    select-all-that-apply (15), ordered response/
    sequencing (5), dosage calculation (10)
  - Item specifications for each cell of the matrix
    (what the question should test, stem format,
    cognitive demand)
  - A question bank organization plan (how to build
    and maintain 400+ items with metadata tags)
  - Parallel form guidance — how to create equivalent
    alternate exams from the same blueprint
  - Item analysis criteria for post-exam review
    (difficulty index, discrimination index targets)

  Task: Create the complete test blueprint with
  content-cognitive matrix, item specifications,
  question bank plan, parallel form guidance, and
  item analysis criteria.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete test blueprint — content-cognitive matrix crosses 7 domains with Bloom's levels; 80 questions distributed by domain weights; at least 40% at Apply+; question type specifications match (50 MC, 15 SATA, 5 ordering, 10 calculation); item specifications describe each matrix cell; question bank plan for 400+ items; parallel form guidance included; item analysis criteria with DI/DISC targets."
    weight: 0.35
    description: "BlueprintCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates test blueprinting expertise — the content-cognitive matrix is a functional tool (not just a table); item specifications would produce consistent questions across item writers; domain weights reflect clinical importance; NCLEX-style question formats are correctly specified; the question bank organization enables sustainable maintenance; parallel form guidance ensures exam equivalence."
    weight: 0.35
    description: "BlueprintingExpertise"
  - type: llm_judge
    criteria: "Response would improve the pharmacology exam — the blueprint addresses the original complaint (too much recall, too little application); the item analysis criteria would catch problematic items; the question bank would enable long-term exam quality; the overall system would better prepare students for NCLEX-RN; faculty could use this blueprint independently."
    weight: 0.30
    description: "ExamImprovement"
