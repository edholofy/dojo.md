meta:
  id: accessible-assessment-design
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Redesign an existing online assessment for full accessibility compliance, including screen reader compatibility, cognitive accommodations, and UDL principles"
  tags: [accessibility, udl, accommodations, inclusive-design, intermediate]

state: {}

trigger: |
  You're the accessibility coordinator at a large
  online university (40,000 students). The Office
  of Civil Rights has received a complaint that
  your online assessments are not accessible to
  students with disabilities. An audit of the
  "Introduction to Psychology" course exam reveals
  multiple accessibility failures.

  Current exam problems identified:
  - Images (brain diagrams) have no alt text
  - Drag-and-drop matching questions unusable with
    screen readers
  - Timed sections with no extended time option
  - Color-coded feedback (red = wrong, green =
    right) with no text alternative
  - Complex table-based questions that don't
    linearize for screen readers
  - No option for text-to-speech
  - Instructions assume visual processing only

  Student population includes:
  - 850 students with documented disabilities
  - 120 blind or low-vision students
  - 200 students with learning disabilities
    (dyslexia, processing speed)
  - 180 students with ADHD
  - 60 students with motor disabilities
  - 45 deaf or hard-of-hearing students
  - Unknown number of undocumented disabilities

  Redesign requirements:
  1. Fix each identified accessibility failure
     - Provide the specific solution for each
     - Show before/after examples

  2. Create an "Accessible Assessment Checklist"
     - Pre-publication checklist faculty can use
     - Covers WCAG 2.1 AA standards relevant to
       assessments
     - Organized by disability category

  3. Alternative question format guide
     - For each common question type (MC, matching,
       ordering, diagram-based, essay), provide an
       accessible version
     - Show how to convert inaccessible formats

  4. Accommodation implementation guide
     - Extended time (how to configure per student)
     - Screen reader compatibility testing protocol
     - Text-to-speech setup
     - Reduced distraction mode
     - Alternative formats (large print, audio)

  5. UDL (Universal Design for Learning) assessment
     principles
     - How to design assessments that work for
       everyone from the start
     - Reducing the need for individual
       accommodations through inclusive design

  Task: Create the accessibility remediation plan,
  checklist, alternative format guide, accommodation
  guide, and UDL principles document.

assertions:
  - type: llm_judge
    criteria: "Response addresses all accessibility failures with specific solutions — before/after examples for each problem; an Accessible Assessment Checklist covering WCAG 2.1 AA standards; alternative question format guide for all common types; accommodation implementation guide for extended time, screen readers, TTS, and more; UDL assessment principles for inclusive design from the start."
    weight: 0.35
    description: "AccessibilityCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates accessibility expertise — WCAG 2.1 AA standards are correctly applied; screen reader solutions are technically accurate; the checklist would catch real accessibility issues; alternative formats maintain assessment validity; accommodation guidance is specific enough for faculty to implement; UDL principles go beyond compliance to genuine inclusion."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "Response would resolve the OCR complaint — the remediation plan addresses all identified failures; the checklist would prevent future issues; the guides would enable faculty across the university to create accessible assessments independently; students with disabilities would have equitable assessment experiences; the UDL approach would reduce accommodation requests."
    weight: 0.30
    description: "ComplianceResolution"
