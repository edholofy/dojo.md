meta:
  id: blooms-aligned-assessment
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Redesign a recall-heavy university exam to systematically align with Bloom's taxonomy, targeting higher-order thinking across all cognitive levels"
  tags: [blooms-taxonomy, higher-order-thinking, university, intermediate]

state: {}

trigger: |
  You're a faculty development specialist at a
  university. A chemistry professor has come to you
  frustrated — her students pass exams but can't
  apply chemistry concepts in lab. Her current
  "General Chemistry I" midterm is 40 multiple
  choice questions, almost all at the Remember and
  Understand levels of Bloom's taxonomy.

  Current exam sample (representative of the problem):
  - Q: "What is the atomic number of carbon?" (Remember)
  - Q: "Which of the following is an ionic compound?"
    (Understand)
  - Q: "The pH of a neutral solution is ___" (Remember)
  - Q: "Define Avogadro's number" (Remember)

  Course learning objectives:
  1. Explain atomic structure and periodic trends
  2. Predict chemical bonding and molecular geometry
  3. Balance chemical equations and perform
     stoichiometric calculations
  4. Analyze solution chemistry and acid-base
     reactions
  5. Apply thermodynamic principles to predict
     reaction spontaneity
  6. Design experiments to test chemical hypotheses

  Redesign requirements:
  - 30 questions total, distributed across Bloom's
    levels:
    - Remember: 4 questions (13%)
    - Understand: 5 questions (17%)
    - Apply: 8 questions (27%)
    - Analyze: 6 questions (20%)
    - Evaluate: 4 questions (13%)
    - Create: 3 questions (10%)
  - Question types: multiple choice (15), short
    answer (6), problem-solving (5), mini-lab
    scenario (2), design question (2)
  - Each question must be tagged with:
    - Bloom's level
    - Learning objective addressed
    - Cognitive demand description (what thinking is
      required)
  - Include a "Bloom's alignment map" showing the
    distribution visually
  - Provide a "before and after" comparison showing
    how 5 original questions were elevated to higher
    Bloom's levels
  - Grading guide with rubrics for open-ended
    questions

  Task: Create the redesigned 30-question exam with
  Bloom's tagging, alignment map, before/after
  comparison, and grading guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a redesigned 30-question exam — questions distributed across all 6 Bloom's levels at specified percentages; includes 15 MC, 6 short answer, 5 problem-solving, 2 mini-lab scenarios, 2 design questions; each tagged with Bloom's level, learning objective, and cognitive demand; Bloom's alignment map included; 5 before/after question comparisons shown; grading rubrics for open-ended questions provided."
    weight: 0.35
    description: "RedesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Bloom's taxonomy expertise — questions genuinely operate at their tagged cognitive levels (not mislabeled); the progression from Remember to Create is authentic; higher-order questions require genuine analysis, evaluation, and creation; the before/after comparisons show meaningful elevation of cognitive demand; the alignment map would guide future exam design."
    weight: 0.35
    description: "BloomsExpertise"
  - type: llm_judge
    criteria: "Response would solve the professor's problem — students who pass this exam would be better prepared for lab application; the mix of question types assesses different skills; the exam is still fair and achievable for General Chemistry I students; the grading guide enables consistent scoring; the redesign approach could be applied to other exams."
    weight: 0.30
    description: "InstructionalImpact"
