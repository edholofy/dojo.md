meta:
  id: portfolio-assessment-system
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Design a portfolio-based assessment system for a graphic design program, with artifact requirements, reflection prompts, and evaluation rubrics"
  tags: [portfolio, assessment-system, graphic-design, intermediate]

state: {}

trigger: |
  You're the department chair for a 2-year graphic
  design associate degree program. You're replacing
  the traditional final project with a comprehensive
  portfolio assessment that students build throughout
  their program. The portfolio serves double duty —
  it's both the program's summative assessment and
  the student's professional portfolio for job
  applications.

  Program learning outcomes:
  1. Apply design principles (typography, color
     theory, layout, hierarchy)
  2. Use industry-standard software proficiently
     (Adobe Creative Suite, Figma)
  3. Execute projects across media (print, digital,
     branding, UX/UI)
  4. Communicate design rationale and respond to
     feedback
  5. Demonstrate professional practices (client
     communication, project management, deadlines)

  Portfolio assessment system requirements:
  1. Portfolio structure
     - Required artifacts by semester (4 semesters)
     - Minimum and maximum pieces per category
     - Categories: branding, print, digital/web,
       typography, personal project
     - What constitutes an acceptable artifact vs.
       what doesn't count

  2. Reflection component
     - Written reflection for each portfolio piece
     - Reflection prompts that develop metacognitive
       skills
     - A "design philosophy statement" (capstone
       reflection)
     - Process documentation requirements (sketches,
       iterations, final)

  3. Evaluation rubrics
     - Technical execution rubric
     - Design thinking rubric
     - Professional presentation rubric
     - Growth over time rubric (comparing early vs.
       late work)
     - Each rubric: 4 performance levels with
       specific descriptors

  4. Portfolio review process
     - Mid-program review (end of Year 1) — what's
       evaluated, what feedback is given
     - Final portfolio defense (end of Year 2) —
       presentation format, panel composition,
       evaluation criteria, pass/fail/revise
       decision process

  5. Industry alignment
     - How the portfolio maps to entry-level job
       requirements
     - Advice for students adapting the academic
       portfolio into a professional one

  Task: Create the complete portfolio assessment
  system with structure, reflection prompts, all
  rubrics, review process, and industry guidance.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete portfolio system — artifact requirements by semester with categories and counts; reflection prompts and design philosophy statement requirements; 4 evaluation rubrics (technical, design thinking, presentation, growth) with 4-level descriptors; mid-program and final review processes with panel composition and decision criteria; industry alignment guidance for job-ready portfolio adaptation."
    weight: 0.35
    description: "PortfolioCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates portfolio assessment expertise — artifact requirements build progressively across semesters; reflection prompts develop genuine metacognitive skills; rubrics distinguish between performance levels with observable criteria; the portfolio defense format is rigorous but fair; growth-over-time assessment captures development; industry alignment reflects actual graphic design hiring practices."
    weight: 0.35
    description: "PortfolioExpertise"
  - type: llm_judge
    criteria: "Response would serve both assessment and career goals — the portfolio genuinely assesses program learning outcomes; the review process provides meaningful feedback; the final defense is a culminating experience; students graduating with this portfolio would be competitive for entry-level design positions; the system is sustainable for faculty to manage across cohorts."
    weight: 0.30
    description: "DualPurposeEffectiveness"
