meta:
  id: intermediate-assessment-shift
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Handle three assessment design challenges in one shift — a bias audit of an existing exam, an adaptive quiz prototype, and a competency mapping for a training program"
  tags: [shift-simulation, multi-challenge, assessment-design, intermediate]

state: {}

trigger: |
  You're a senior assessment specialist at an
  education consulting firm. Three projects need
  your attention today.

  Project 1: Bias Audit of Standardized Test
  A school district's 8th-grade social studies
  benchmark exam has shown persistent achievement
  gaps — Black and Hispanic students score 15-20
  points lower than white students. The district
  wants an assessment bias audit before this year's
  administration. You have the test (35 questions).
  - Review protocol: Analyze 5 representative
    questions for potential bias (provide the 5
    questions and your analysis)
  - Types of bias to check: cultural, linguistic,
    socioeconomic, stereotyping, content familiarity
  - For each potentially biased item, explain the
    bias and propose a revised version
  - Write a bias review checklist the district can
    use for all future assessments
  - Provide recommendations for assembling a diverse
    item review panel

  Project 2: Adaptive Quiz Prototype
  An edtech startup wants you to design the logic
  for an adaptive math quiz (grade 3-5 multiplication
  and division). The quiz should adjust difficulty
  based on student responses.
  - Design a 15-question adaptive quiz flow
  - Define 3 difficulty tiers (foundational,
    grade-level, advanced)
  - Write 5 questions per tier (15 total)
  - Create the branching logic: when does a student
    move up/down tiers based on responses?
  - Define the scoring algorithm that produces a
    proficiency level
  - Map the flow visually (decision tree or flowchart
    description)

  Project 3: Training Competency Map
  A hospital is launching a "Patient Experience
  Excellence" training program for 300 nurses.
  They need a competency map connecting learning
  objectives to assessment methods.
  - Identify 8 competencies for patient experience
    (communication, empathy, responsiveness, etc.)
  - For each competency, define: the learning
    objective, the assessment method (observation,
    patient survey, simulation, knowledge check),
    and the mastery threshold
  - Create a one-page competency map visualization
    concept
  - Propose a 90-day assessment schedule

  Task: Complete all three projects with full
  deliverables.

assertions:
  - type: llm_judge
    criteria: "Response completes all three projects — the bias audit includes 5 question analyses with bias identification and revisions, a review checklist, and panel recommendations; the adaptive quiz has 15 questions across 3 tiers with branching logic and scoring algorithm; the competency map covers 8 patient experience competencies with objectives, assessment methods, mastery thresholds, and a 90-day schedule."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment specialist versatility — the bias analysis identifies real assessment bias types with substantive revisions; the adaptive quiz branching logic is sound and would produce accurate proficiency estimates; the competency map connects learning objectives to appropriate assessment methods for nursing; each project reflects deep assessment knowledge applied to different contexts."
    weight: 0.35
    description: "SpecialistVersatility"
  - type: llm_judge
    criteria: "Response would serve each client effectively — the bias audit would help the district address achievement gaps; the adaptive quiz logic would work in a real edtech product; the competency map would guide the hospital's training assessment; deliverables are professional quality suitable for client presentation."
    weight: 0.30
    description: "ClientDeliverables"
