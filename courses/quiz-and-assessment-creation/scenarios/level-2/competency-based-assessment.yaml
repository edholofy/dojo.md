meta:
  id: competency-based-assessment
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Design a competency-based assessment system for an IT helpdesk certification program, with mastery demonstrations, skill checklists, and progression tracking"
  tags: [competency-based, mastery, it-helpdesk, certification, intermediate]

state: {}

trigger: |
  You're the training director at a workforce
  development nonprofit that runs a 12-week IT
  Helpdesk Technician certificate program for
  career changers. The program is shifting from
  seat-time (pass if you attend 80% of classes and
  pass the final test) to competency-based (advance
  when you demonstrate mastery, regardless of time).

  Program competencies (aligned to CompTIA A+ and
  industry requirements):
  1. Hardware Troubleshooting
     - Identify components, diagnose failures, replace
       parts, basic repairs
  2. Operating Systems
     - Install, configure, and troubleshoot Windows,
       macOS, and Linux basics
  3. Networking Fundamentals
     - IP addressing, Wi-Fi troubleshooting, basic
       network configuration, connectivity diagnosis
  4. Software Support
     - Install/uninstall, update management, common
       application troubleshooting, malware removal
  5. Customer Service & Communication
     - Ticket documentation, phone/chat etiquette,
       escalation procedures, knowledge base usage
  6. Security Basics
     - Password policies, phishing recognition,
       physical security, data backup procedures

  Assessment system requirements:

  1. Competency framework
     - For each of the 6 competencies, define 3-5
       specific sub-competencies with mastery criteria
     - Mastery levels: Not Yet / Approaching / Meets
       / Exceeds
     - What "Meets" looks like for each (the minimum
       for certification)

  2. Assessment methods per competency
     - Mix of: hands-on demonstrations, knowledge
       checks, simulated ticket resolution, role-play
       scenarios
     - At least one hands-on assessment per competency
     - Design 2 complete assessments for each
       competency (12 total)

  3. Mastery tracking dashboard concept
     - What the student sees (progress toward
       certification)
     - What the instructor sees (cohort progress,
       intervention needs)
     - How re-assessment works (students can retake
       after additional practice)

  4. Certification requirements
     - Which competencies are required vs. elective
     - Minimum mastery level for certification
     - How the competency evidence is documented
     - What the certificate/transcript shows

  Task: Create the complete competency-based
  assessment system with framework, 12 assessments,
  tracking dashboard concept, and certification
  requirements.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete CBE assessment system — competency framework with 3-5 sub-competencies per area and mastery criteria; 12 assessments (2 per competency) mixing hands-on, knowledge checks, simulations, and role-play; mastery tracking dashboard concept for students and instructors; certification requirements with documentation approach."
    weight: 0.35
    description: "CBECompleteness"
  - type: llm_judge
    criteria: "Response demonstrates competency-based education expertise — mastery criteria are specific and observable; assessments genuinely test hands-on skills (not just written knowledge); the 'Not Yet' framing supports growth mindset; re-assessment process is practical; the system aligns with CompTIA A+ expectations; the tracking dashboard would reveal real progress."
    weight: 0.35
    description: "CBEExpertise"
  - type: llm_judge
    criteria: "Response would produce job-ready technicians — graduates who pass all competencies would succeed in entry-level helpdesk roles; the hands-on assessments test real-world skills; customer service assessment reflects actual helpdesk interactions; the certificate would be meaningful to employers; the system would serve career changers effectively."
    weight: 0.30
    description: "WorkforceReadiness"
