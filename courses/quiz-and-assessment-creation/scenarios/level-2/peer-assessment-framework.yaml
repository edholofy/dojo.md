meta:
  id: peer-assessment-framework
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Design a structured peer assessment framework for a graduate business course, with calibration exercises, feedback rubrics, and moderation processes"
  tags: [peer-assessment, graduate, business, calibration, intermediate]

state: {}

trigger: |
  You're an instructor for an MBA "Strategic
  Management" course with 45 students. The capstone
  assignment is a group strategy analysis (teams of
  5, analyzing a real company's competitive
  position). You want to incorporate peer assessment
  so students evaluate each other's contributions
  and provide substantive feedback on deliverables.

  The problem you're solving: Last semester, group
  projects had "free rider" issues and students
  complained that grading didn't reflect individual
  contributions. Some students did 80% of the work
  but received the same grade as those who did 20%.

  Peer assessment framework requirements:

  1. Contribution assessment (team members rate
     each other)
     - Criteria: quality of work, reliability,
       collaboration, intellectual contribution,
       leadership
     - Rating scale with behavioral anchors
     - Confidential individual ratings
     - How individual scores adjust the group grade
     - Mechanism to flag serious problems early (not
       just at the end)

  2. Deliverable peer review (teams review other
     teams' work)
     - Structured feedback form for the strategy
       analysis document
     - Rubric covering: strategic analysis depth,
       evidence quality, recommendations feasibility,
       presentation clarity
     - "Two stars and a wish" format plus structured
       criteria
     - How peer review scores factor into final grade

  3. Calibration exercise
     - Before students assess each other, they
       practice on a sample
     - Provide a sample strategy analysis (brief)
       with intentional strengths and weaknesses
     - Students rate it, then compare with expert
       rating
     - Discussion of scoring discrepancies to align
       standards

  4. Moderation process
     - How the instructor reviews peer ratings for
       fairness
     - Handling outlier scores (one person rates
       everyone low, or everyone rates everyone
       perfect)
     - Appeals process if a student disputes peer
       ratings
     - Statistical checks for rating consistency

  5. Training materials
     - Guide for students on how to give constructive
       feedback
     - Examples of helpful vs. unhelpful peer
       feedback
     - How to separate personal feelings from
       professional assessment

  Task: Create the complete peer assessment framework
  with all rating forms, calibration exercise,
  moderation process, and training materials.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete peer assessment framework — contribution assessment with criteria, scales, and grade adjustment mechanism; deliverable peer review with structured form and rubric; calibration exercise with sample work and alignment discussion; moderation process for fairness and outlier detection; training materials with examples of good and bad feedback."
    weight: 0.35
    description: "FrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates peer assessment expertise — behavioral anchors are specific and observable; the grade adjustment mechanism fairly reflects individual contributions; the calibration exercise would genuinely align student standards; moderation catches both inflated and deflated ratings; the training materials would improve feedback quality; the overall system addresses the free-rider problem."
    weight: 0.35
    description: "PeerAssessmentExpertise"
  - type: llm_judge
    criteria: "Response would improve group project outcomes — students would be accountable for their contributions; peer feedback would improve deliverable quality; the calibration exercise builds assessment literacy; the moderation process ensures fairness; the overall system would reduce complaints about unfair group grades while developing professional feedback skills."
    weight: 0.30
    description: "GroupProjectImprovement"
