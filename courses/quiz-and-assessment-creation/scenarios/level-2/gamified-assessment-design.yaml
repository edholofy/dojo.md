meta:
  id: gamified-assessment-design
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Design a gamified assessment system for a middle school history class, with point systems, badges, leaderboards, and learning quests"
  tags: [gamification, middle-school, history, engagement, intermediate]

state: {}

trigger: |
  You're a 7th-grade social studies teacher
  redesigning your assessment approach for a unit
  on "Ancient Civilizations" (Mesopotamia, Egypt,
  Indus Valley, China). Your students are
  disengaged with traditional tests — average
  scores are fine but motivation and deeper learning
  are low. You want to gamify the entire 4-week
  unit's assessment system.

  Class context:
  - 30 students, mixed abilities
  - 1:1 Chromebooks available
  - 45-minute periods, 5 days/week
  - Students are competitive but some shut down when
    they feel "behind"

  Gamification system requirements:
  1. XP (Experience Points) system
     - Define how students earn XP across the unit
     - Daily quests (small daily checks)
     - Weekly challenges (deeper assessments)
     - Boss battles (major assessments)
     - Side quests (optional enrichment)
     - XP-to-grade conversion chart

  2. Badge system (15 badges total)
     - Knowledge badges (content mastery)
     - Skill badges (historical thinking skills)
     - Effort badges (participation and growth)
     - Each badge: name, icon description, criteria
       to earn, what it represents

  3. Leaderboard design
     - How to make it motivating without
       discouraging struggling students
     - Privacy considerations
     - Team vs. individual options

  4. Assessment content within the game framework
     - 4 "Daily Quest" question sets (one per
       civilization, 5 questions each)
     - 2 "Weekly Challenge" assessments (10 questions
       each, cross-civilization comparison)
     - 1 "Boss Battle" final assessment (20
       questions, comprehensive, multiple question
       types)
     - 2 "Side Quests" (creative/research options)

  5. Safeguards
     - How to prevent gaming the system
     - Support for students who struggle with
       competition
     - Ensuring content learning isn't lost in game
       mechanics

  Task: Design the complete gamified assessment
  system with all components, assessment content,
  and safeguards.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete gamified assessment system — XP system with earning mechanisms and grade conversion; 15 badges with names, criteria, and categories; leaderboard design addressing motivation and privacy; 4 daily quest sets, 2 weekly challenges, 1 boss battle, and 2 side quests with actual questions; safeguards against gaming the system and supporting struggling students."
    weight: 0.35
    description: "GamificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates gamified assessment expertise — XP values are balanced to reward learning not just volume; badges represent meaningful achievement across domains; the leaderboard design prevents discouraging struggling students; game mechanics enhance rather than distract from content learning; the system is practical for a single teacher with 30 students."
    weight: 0.35
    description: "GamificationExpertise"
  - type: llm_judge
    criteria: "Response would increase engagement and learning — the system would motivate disengaged students; assessment content genuinely tests Ancient Civilizations knowledge; the mix of daily/weekly/boss assessments provides appropriate pacing; struggling students have paths to success; the overall system would improve both motivation and learning outcomes."
    weight: 0.30
    description: "EngagementImpact"
