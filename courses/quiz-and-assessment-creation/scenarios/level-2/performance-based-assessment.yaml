meta:
  id: performance-based-assessment
  level: 2
  course: quiz-and-assessment-creation
  type: output
  description: "Design a performance-based assessment for a culinary arts program where students demonstrate competencies through practical cooking tasks with observation checklists"
  tags: [performance-assessment, culinary, competency, practical, intermediate]

state: {}

trigger: |
  You're the program director for a community
  college culinary arts certificate program. The
  advisory board (local restaurant owners and chefs)
  has complained that graduates can pass written
  tests but struggle in real kitchens. You need to
  replace the written final exam with a performance-
  based assessment that tests actual cooking
  competencies.

  Program competencies to assess:
  1. Knife skills (cuts: julienne, brunoise, chiffonade,
     tournée, small/medium/large dice)
  2. Cooking methods (sauté, braise, roast, grill,
     poach)
  3. Sauce production (mother sauces: béchamel,
     velouté, espagnole, hollandaise, tomato)
  4. Timing and organization (mise en place, station
     management, plating within time limits)
  5. Food safety and sanitation (temperature control,
     cross-contamination prevention, personal hygiene)

  Assessment design requirements:
  1. Practical exam structure
     - 3-hour timed assessment
     - Students must produce a complete 3-course meal
     - Specific dishes assigned that test all 5
       competency areas
     - Define the 3 dishes and which competencies
       each tests

  2. Observation checklist for each competency
     - Specific, observable behaviors to watch for
     - Rating scale: Not Yet Competent / Approaching
       / Competent / Exemplary
     - Critical safety items that are automatic
       failures (e.g., serving undercooked chicken)

  3. Evaluator guide
     - Standardized scoring procedures
     - What evaluators should observe vs. ignore
     - Inter-rater reliability protocol (2 evaluators
       score independently)
     - Handling disagreements between evaluators

  4. Student preparation guide
     - What students will be expected to do
     - How they'll be evaluated
     - Practice recommendations
     - What constitutes a pass (must score Competent
       or above on all competencies, no automatic
       failures)

  Task: Design the complete performance-based
  assessment with dishes, observation checklists,
  evaluator guide, and student preparation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete performance-based assessment — 3-course meal assignment testing all 5 competencies; observation checklists with specific behaviors and 4-level rating scale for each competency; automatic failure criteria for safety; evaluator guide with standardized procedures and inter-rater reliability protocol; student preparation guide with expectations and practice recommendations."
    weight: 0.35
    description: "AssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates performance assessment expertise — the 3 dishes authentically test all 5 competency areas; observation criteria are specific and observable (not subjective); the evaluation protocol would produce consistent scores; the 3-hour time frame is realistic; automatic failure items are genuinely safety-critical; the inter-rater reliability process is practical."
    weight: 0.35
    description: "PerformanceExpertise"
  - type: llm_judge
    criteria: "Response would satisfy the advisory board — graduates who pass this assessment would be prepared for real kitchens; the assessment tests practical skills that matter in professional cooking; the student preparation guide sets clear expectations; the overall system would produce competent entry-level cooks who can function in a restaurant environment."
    weight: 0.30
    description: "IndustryReadiness"
