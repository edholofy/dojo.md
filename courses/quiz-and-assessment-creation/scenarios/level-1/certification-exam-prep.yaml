meta:
  id: certification-exam-prep
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a practice exam for a professional certification with domain-weighted questions, timed sections, and performance analysis guidance"
  tags: [certification, practice-exam, professional-development, beginner]

state: {}

trigger: |
  You're a training manager at an HR consulting firm.
  Your team of 12 HR generalists needs to pass the
  SHRM-CP (Society for Human Resource Management —
  Certified Professional) exam within 6 months. You
  want to create a realistic practice exam they can
  use to gauge readiness.

  SHRM-CP exam structure (your practice exam should
  mirror this):
  - 134 questions total (but use 40 for practice)
  - Two question types:
    - Knowledge items: Test HR knowledge directly
    - Situational judgment items: Present a workplace
      scenario and ask for the best course of action
  - Content areas and approximate weights:
    - People (HR Strategic Planning, Talent
      Acquisition, Employee Engagement): 30%
    - Organization (Structure, Technology, Data):
      20%
    - Workplace (Employment Law, Safety, Labor
      Relations): 30%
    - Behavioral Competencies (Leadership, Ethics,
      Communication): 20%
  - Time limit: 4 hours for full exam (scale to
    practice)

  Practice exam requirements:
  - 40 questions following the domain weights:
    - People: 12 questions
    - Organization: 8 questions
    - Workplace: 12 questions
    - Behavioral Competencies: 8 questions
  - Mix: 24 knowledge items + 16 situational
    judgment items
  - Each question must:
    - Have 4 answer options
    - Identify the correct answer
    - Explain why it's correct and why each wrong
      option is incorrect
    - Reference the SHRM competency or knowledge
      domain being tested
  - Include a scoring rubric and "readiness
    assessment" — what score indicates exam
    readiness
  - Provide a study plan recommendation based on
    domain scores

  Task: Write the 40-question practice exam with
  answer explanations, domain tagging, scoring
  rubric, readiness assessment guide, and study
  plan template.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 40-question practice exam — domain weights match (People 12, Organization 8, Workplace 12, Behavioral 8); mix includes 24 knowledge and 16 situational judgment items; each question has 4 options with correct answer identified; explanations cover why correct and why each wrong option is wrong; questions are tagged to SHRM competencies; scoring rubric and readiness assessment included."
    weight: 0.35
    description: "ExamCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification exam expertise — knowledge items test at appropriate depth for SHRM-CP level; situational judgment items present realistic HR scenarios with nuanced options; content accurately reflects SHRM Body of Applied Skills and Knowledge; the readiness assessment threshold is calibrated to actual exam difficulty; the study plan template is actionable."
    weight: 0.35
    description: "CertificationExpertise"
  - type: llm_judge
    criteria: "Response would prepare candidates effectively — the practice exam mirrors real exam format and difficulty; taking this exam would reveal genuine knowledge gaps; the domain-specific scoring would guide targeted study; the study plan would help candidates use limited preparation time efficiently; the overall tool would increase SHRM-CP pass rates."
    weight: 0.30
    description: "PreparationEffectiveness"
