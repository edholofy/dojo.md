meta:
  id: online-course-quiz
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create end-of-module quizzes for an online course on project management fundamentals, with question variety and immediate learner feedback"
  tags: [online-course, elearning, quiz-design, beginner]

state: {}

trigger: |
  You're an instructional designer building an
  online self-paced course called "Project Management
  Fundamentals" on your company's LMS. Each module
  ends with a quiz that learners must pass (70%)
  to unlock the next module.

  Course modules:
  1. What is Project Management? (definitions, PM
     roles, project vs. operations)
  2. Project Lifecycle (initiation, planning,
     execution, monitoring, closing)
  3. Scope Management (requirements gathering, WBS,
     scope creep)
  4. Time Management (Gantt charts, critical path,
     milestones, dependencies)
  5. Stakeholder Communication (RACI matrix,
     status reports, meeting management)

  Quiz requirements per module:
  - 10 questions per quiz (50 total)
  - Question types to include across the quizzes:
    - Multiple choice (majority)
    - Matching (e.g., match PM phase to its activities)
    - Ordering/sequencing (put steps in correct order)
    - Scenario-based (short workplace scenario +
      "what should the PM do?")
    - Fill-in-the-blank (for key terms)
  - Each question must:
    - Test a specific learning objective
    - Have a clear correct answer
    - Include immediate feedback (shown after each
      question)
    - Feedback includes: why correct answer is right,
      reference to the lesson section where the
      topic was covered
  - Questions should test application, not just
    recall where possible
  - Passing score: 70% (7/10)

  Task: Write all 50 quiz questions (10 per module)
  with answer choices, correct answers, and
  feedback for each question.

assertions:
  - type: llm_judge
    criteria: "Response creates 50 quiz questions across 5 modules — each module has 10 questions; question types include multiple choice, matching, ordering, scenario-based, and fill-in-the-blank; each question has a correct answer and immediate feedback referencing the lesson; questions are aligned to specific learning objectives; the question mix varies appropriately across modules."
    weight: 0.35
    description: "QuizCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates e-learning assessment expertise — questions test application and understanding (not just recall); scenario-based questions present realistic workplace situations; matching and ordering questions reinforce key relationships; feedback reinforces learning by explaining why and pointing to source material; the 70% passing threshold is calibrated appropriately for fundamentals content."
    weight: 0.35
    description: "ElearningExpertise"
  - type: llm_judge
    criteria: "Response would create an effective learning pathway — the quizzes genuinely assess module comprehension; the progressive unlock mechanism is supported by adequate assessment; the immediate feedback turns the quiz into a learning experience; the overall assessment system would prepare learners for real project management scenarios."
    weight: 0.30
    description: "LearningPathway"
