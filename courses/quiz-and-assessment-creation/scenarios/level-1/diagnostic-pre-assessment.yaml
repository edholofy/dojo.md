meta:
  id: diagnostic-pre-assessment
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a diagnostic pre-assessment for a math remediation program to identify specific skill gaps and place students at appropriate intervention levels"
  tags: [diagnostic, pre-assessment, math, placement, beginner]

state: {}

trigger: |
  You're a curriculum specialist at a community
  college designing a math remediation program.
  Incoming students who don't meet the placement
  threshold for College Algebra need to be assessed
  to determine exactly where their gaps are so they
  can be placed in the right intervention track.

  The pre-assessment must identify gaps across:
  1. Number sense and operations (fractions, decimals,
     percentages, order of operations)
  2. Basic algebra (variables, expressions, solving
     one-step and two-step equations)
  3. Ratios and proportions (unit rates, scaling,
     proportional reasoning)
  4. Geometry basics (area, perimeter, volume of
     simple shapes, angle relationships)
  5. Data and statistics (mean, median, mode, reading
     charts and graphs)

  Assessment requirements:
  - 30 questions total (6 per skill area)
  - Each skill area starts with an easier question
    and progresses to harder ones
  - Question types: multiple choice (20), short
    answer requiring work shown (5), and
    application/word problems (5)
  - For each question, identify:
    - The specific sub-skill being tested
    - The difficulty level (foundational, developing,
      proficient)
    - The common misconception the wrong answers
      reveal
  - Scoring guide that maps results to 3 placement
    tracks:
    - Track A: Intensive (0-40%) — pre-algebra
      fundamentals
    - Track B: Standard (41-70%) — targeted gap
      remediation
    - Track C: Accelerated (71-100%) — review and
      transition to College Algebra
  - Include a "skill profile" template that shows
    each student's strengths and gaps visually

  Task: Write the complete 30-question diagnostic
  assessment with answer keys, misconception
  analysis, scoring guide, and skill profile
  template.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 30-question diagnostic — 6 questions per skill area with progressive difficulty; includes 20 multiple choice, 5 short answer, and 5 word problems; each question identifies the sub-skill, difficulty level, and common misconceptions; a scoring guide maps to 3 placement tracks; a skill profile template visualizes strengths and gaps."
    weight: 0.35
    description: "DiagnosticCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates diagnostic assessment expertise — questions genuinely diagnose specific skill gaps (not just test generally); wrong answer options reflect real misconceptions (not random); difficulty progression within each area is appropriate; the placement thresholds are reasonable for community college remediation; the skill profile would reveal actionable patterns."
    weight: 0.35
    description: "DiagnosticExpertise"
  - type: llm_judge
    criteria: "Response would enable effective placement — the assessment would accurately sort students into appropriate tracks; the misconception analysis would guide targeted instruction; the skill profile would help instructors personalize support; the overall system would reduce time students spend in unnecessary remediation while ensuring readiness for College Algebra."
    weight: 0.30
    description: "PlacementEffectiveness"
