meta:
  id: skills-assessment-hiring
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a pre-employment skills assessment for a customer service representative position, including scoring criteria and candidate evaluation framework"
  tags: [skills-assessment, hiring, pre-employment, beginner]

state: {}

trigger: |
  You're an HR specialist at a growing e-commerce
  company hiring 20 customer service representatives.
  You receive 200+ applications per posting and need
  a standardized skills assessment to screen
  candidates before interviews. The assessment must
  be legally defensible and job-related.

  Position requirements:
  - Handle 40-50 customer inquiries per day (email,
    chat, phone)
  - Resolve order issues (shipping delays, returns,
    wrong items)
  - De-escalate frustrated customers
  - Navigate CRM software and order management
    systems
  - Write clear, professional, and empathetic
    responses
  - Basic math for refund calculations and discount
    applications

  Assessment requirements:
  1. Written communication section (5 items)
     - Rewrite poorly written customer emails
     - Compose responses to sample customer complaints
     - Grammar and tone correction exercises

  2. Situational judgment section (5 scenarios)
     - Angry customer with delayed order
     - Customer requesting exception to return policy
     - Multiple issues in one contact
     - Irate customer using inappropriate language
     - Priority triage (3 waiting customers)

  3. Basic skills section (5 items)
     - Simple math (refund calculations, percentage
       discounts)
     - Reading comprehension (interpret a return
       policy, find key information)
     - Data entry accuracy (spot errors in order
       records)

  4. Typing speed requirement
     - Minimum 40 WPM with 95% accuracy

  For each section:
  - The actual assessment items/prompts
  - A scoring rubric (what distinguishes a strong
    from weak response)
  - Cut-off scores for advancing to interview
  - Time limits per section
  - Legal considerations (job-relatedness, adverse
    impact mitigation)

  Task: Write the complete skills assessment with
  all items, scoring rubrics, cut-off criteria, and
  legal compliance notes.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete pre-employment assessment — 5 written communication items, 5 situational judgment scenarios, 5 basic skills items, and typing requirement; each section has scoring rubrics with clear criteria; cut-off scores and time limits are specified; legal compliance notes address job-relatedness and adverse impact; the assessment is practical to administer at scale."
    weight: 0.35
    description: "AssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates hiring assessment expertise — situational judgment scenarios are realistic for e-commerce customer service; scoring rubrics distinguish between performance levels with observable criteria; written communication items test actual job tasks; the assessment is job-related (legally defensible); cut-off scores are reasonable for screening 200+ candidates to interview stage."
    weight: 0.35
    description: "HiringExpertise"
  - type: llm_judge
    criteria: "Response would improve hiring quality — the assessment would identify candidates who will succeed in the role; it would reduce interview time by screening out clearly unqualified candidates; the scoring system would produce consistent results across evaluators; the legal framework would protect the company; the overall process would be fair and efficient."
    weight: 0.30
    description: "HiringEffectiveness"
