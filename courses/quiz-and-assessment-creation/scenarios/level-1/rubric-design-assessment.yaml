meta:
  id: rubric-design-assessment
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Design a grading rubric for a college-level argumentative essay assignment, with clear criteria, performance levels, and calibration guidance"
  tags: [rubric, essay-assessment, higher-education, beginner]

state: {}

trigger: |
  You're a first-year composition instructor at a
  state university. Your "English 101: College
  Writing" class has 25 students writing their first
  argumentative essay (1,500-2,000 words). You need
  a rubric that you can use consistently across all
  essays, share with students before they write, and
  use for peer review workshops.

  Essay assignment: "Take a position on a
  controversial campus issue and argue for a specific
  change using evidence from at least 4 sources."

  Rubric requirements:
  1. Analytic rubric (not holistic) with separate
     scores for each criterion
  2. Criteria to assess:
     - Thesis and argument structure
     - Evidence use and source integration
     - Counterargument and rebuttal
     - Organization and transitions
     - Style and voice
     - Grammar, mechanics, and formatting (MLA)
  3. Performance levels: Excellent (A), Proficient
     (B), Developing (C), Beginning (D), Inadequate
     (F)
  4. Each cell must have specific, observable
     descriptors (not vague like "good" or "poor")
  5. Point values that weight argument quality more
     heavily than mechanics
  6. A separate "peer review version" — simplified
     rubric students can use to give each other
     feedback (same criteria, friendlier language,
     guiding questions instead of scoring)
  7. Calibration guide: 3 sample thesis statements
     rated at different levels with explanation of
     why each earned its rating

  Task: Create the full grading rubric, the peer
  review version, and the calibration guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete analytic rubric — 6 criteria with 5 performance levels each, specific observable descriptors in every cell, point values weighted toward argument quality; a peer review version with guiding questions and student-friendly language; a calibration guide with 3 rated sample thesis statements and explanations."
    weight: 0.35
    description: "RubricCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates rubric design expertise — descriptors are specific and observable (not vague); performance levels show clear progression; point distribution appropriately weights higher-order thinking over mechanics; the peer review version genuinely helps students give useful feedback; calibration examples would help norming sessions."
    weight: 0.35
    description: "RubricDesignQuality"
  - type: llm_judge
    criteria: "Response would improve assessment consistency — the rubric would produce consistent scores across graders; students could use it to self-assess before submitting; the peer review version would generate actionable feedback; the calibration guide would align multiple graders; the overall system supports both evaluation and learning."
    weight: 0.30
    description: "AssessmentConsistency"
