meta:
  id: self-assessment-checklist
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a self-assessment checklist and reflection tool for a professional development program, with competency ratings, evidence prompts, and growth planning"
  tags: [self-assessment, professional-development, reflection, beginner]

state: {}

trigger: |
  You're the professional development coordinator
  at a school district with 450 teachers. The
  district is implementing a new "Growth-Focused
  Evaluation" model that replaces the old checklist
  observation form. Teachers need a self-assessment
  tool they complete before their annual review
  meeting with their principal.

  The self-assessment must cover 5 teaching domains:
  1. Planning and Preparation
     - Lesson planning, learning objectives,
       differentiation, assessment integration
  2. Classroom Environment
     - Relationships, culture, routines, physical
       space, behavior management
  3. Instruction
     - Engagement strategies, questioning techniques,
       technology integration, pacing
  4. Professional Responsibilities
     - Communication with families, collaboration
       with colleagues, professional growth
  5. Student Growth and Achievement
     - Data use, progress monitoring, intervention
       strategies, goal setting

  Self-assessment requirements:
  - For each domain, include 4-5 specific indicators
    (20-25 total)
  - Rating scale: Beginning (1), Developing (2),
    Proficient (3), Distinguished (4)
  - Each rating level needs a clear descriptor so
    teachers can honestly self-rate
  - "Evidence prompt" for each indicator — guides
    teachers to cite specific examples from their
    practice
  - Reflection questions for each domain (not just
    ratings)
  - A "Growth Goal" section where teachers identify
    1-2 areas for focused improvement with an action
    plan template
  - Language that feels supportive, not evaluative
    (this is for growth, not judgment)
  - A pre-meeting preparation guide explaining how
    to use the self-assessment in the review
    conversation

  Task: Create the complete self-assessment tool
  with all indicators, rating descriptors, evidence
  prompts, reflection questions, growth goal
  template, and preparation guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete self-assessment tool — 5 domains with 4-5 indicators each; 4-level rating scale with clear descriptors for each indicator at each level; evidence prompts guide teachers to cite specific examples; reflection questions go beyond ratings; growth goal section includes an action plan template; a pre-meeting preparation guide explains usage."
    weight: 0.35
    description: "ToolCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates self-assessment design expertise — rating descriptors are specific and observable (not vague); the progression from Beginning to Distinguished shows meaningful growth; evidence prompts encourage genuine reflection; the tone is supportive and growth-oriented; the tool balances comprehensiveness with practicality for 450 teachers."
    weight: 0.35
    description: "SelfAssessmentExpertise"
  - type: llm_judge
    criteria: "Response would improve professional development — the self-assessment would generate meaningful pre-meeting reflection; principals would receive useful data for productive conversations; the growth goal template would lead to actionable improvement plans; the overall tool would shift evaluation culture from compliance to growth."
    weight: 0.30
    description: "ProfessionalGrowthImpact"
