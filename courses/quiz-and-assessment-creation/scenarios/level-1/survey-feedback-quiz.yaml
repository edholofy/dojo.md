meta:
  id: survey-feedback-quiz
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a post-event feedback survey with Likert scales, open-ended questions, and actionable data collection for a company conference"
  tags: [survey, feedback, event-evaluation, beginner]

state: {}

trigger: |
  You're the events coordinator at a tech company
  that just hosted its annual 2-day "Innovation
  Summit" for 350 employees. The VP of People wants
  a post-event survey to measure satisfaction,
  identify what worked, and improve next year's
  event. Results will be shared with the executive
  team.

  Event details:
  - Day 1: Keynote, 3 breakout tracks (Technical,
    Leadership, Culture), networking lunch, panel
    discussion
  - Day 2: Hands-on workshops (4 options), team
    challenges, closing ceremony with awards
  - Venue: Off-site hotel conference center
  - Budget was $180K — leadership wants ROI data

  Survey requirements:
  - 20-25 questions total
  - Question types:
    - Likert scale (1-5, strongly disagree to
      strongly agree) for satisfaction metrics
    - Multiple choice for logistics feedback
    - Ranking questions for session preferences
    - Net Promoter Score (NPS) question
    - 3-4 open-ended questions for qualitative
      feedback
  - Sections: Overall satisfaction, content quality,
    logistics, networking value, suggestions for
    improvement
  - Survey should take < 10 minutes to complete
  - Include a "response rate strategy" — how to get
    at least 70% completion from 350 attendees
  - For each question, explain what data it provides
    and how it will be used in decision-making

  Task: Write the complete survey with all questions,
  answer options, the data usage guide for each
  question, and the response rate strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete post-event survey — 20-25 questions across specified sections; includes Likert scale, multiple choice, ranking, NPS, and open-ended question types; each question has clear answer options; a data usage guide explains what each question measures and how it informs decisions; a response rate strategy targets 70%+ completion."
    weight: 0.35
    description: "SurveyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates survey design expertise — Likert scales are properly constructed (balanced, labeled); NPS question follows standard format; questions avoid double-barreling and leading language; open-ended questions are strategically placed; the survey respects the < 10 minute completion target; question ordering follows survey methodology best practices."
    weight: 0.35
    description: "SurveyDesignQuality"
  - type: llm_judge
    criteria: "Response would generate actionable insights — the data collected would clearly inform next year's planning decisions; ROI-relevant metrics are captured; qualitative and quantitative data complement each other; the response rate strategy is realistic and actionable; the executive summary format would communicate findings effectively."
    weight: 0.30
    description: "ActionableInsights"
