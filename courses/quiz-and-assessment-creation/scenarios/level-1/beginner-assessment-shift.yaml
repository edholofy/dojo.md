meta:
  id: beginner-assessment-shift
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create three different assessments in one shift — a safety training quiz, a language proficiency placement test, and a volunteer skills inventory"
  tags: [shift-simulation, multi-assessment, variety, beginner]

state: {}

trigger: |
  You're a freelance instructional designer and it's
  a busy Monday. Three clients need assessments
  delivered by end of day.

  Client 1: Manufacturing Safety Quiz
  A factory with 150 workers needs a monthly safety
  refresher quiz. This month's topic: "Lockout/
  Tagout (LOTO) Procedures" — the safety process
  for de-energizing equipment before maintenance.
  - 10 questions (8 multiple choice, 2 scenario-
    based)
  - Must cover: when LOTO is required, the 6-step
    procedure, authorized vs. affected employees,
    group lockout, and consequences of skipping steps
  - Reading level: 6th grade (many workers are ESL)
  - Include answer key with OSHA regulation
    references
  - Passing score: 100% (safety-critical — workers
    must retake until they pass)

  Client 2: Language School Placement Test
  A language school offering Spanish courses at 4
  levels (Beginner, Elementary, Intermediate,
  Advanced) needs a placement test for new students.
  - 25 questions that progressively increase in
    difficulty
  - Test: grammar knowledge, vocabulary, reading
    comprehension, and basic writing
  - Question types: multiple choice (15), fill-in-
    the-blank (5), short answer (3), brief writing
    prompt (2)
  - Scoring guide that maps total scores to the 4
    placement levels
  - Should take 20-30 minutes

  Client 3: Nonprofit Volunteer Skills Inventory
  A food bank with 200+ volunteers needs a skills
  inventory to match volunteers to roles (warehouse,
  kitchen, front desk, delivery driving, events,
  admin).
  - Not a "test" — no right/wrong answers
  - Self-report format with rating scales
  - Categories: physical capabilities, interpersonal
    skills, technical skills, availability,
    certifications/licenses, interests
  - Output: a "volunteer profile" that suggests
    best-fit roles
  - Must be welcoming and inclusive (volunteers
    range from teens to retirees, diverse
    backgrounds)

  Task: Create all three assessments with complete
  questions, answer keys (where applicable), scoring
  guides, and any supporting materials.

assertions:
  - type: llm_judge
    criteria: "Response creates all three assessments — the LOTO safety quiz has 10 questions at 6th-grade reading level with OSHA references; the Spanish placement test has 25 progressive questions across grammar, vocabulary, reading, and writing with a 4-level scoring guide; the volunteer skills inventory covers all categories with welcoming self-report format and role-matching output."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment versatility — the safety quiz is appropriately strict (100% pass, safety-critical); the placement test genuinely differentiates between 4 proficiency levels; the skills inventory is not a test but a matching tool; each assessment uses question types appropriate to its purpose; ESL considerations are handled in the safety quiz; the volunteer inventory is inclusive."
    weight: 0.35
    description: "AssessmentVersatility"
  - type: llm_judge
    criteria: "Response would serve each client effectively — the safety quiz would satisfy OSHA training documentation; the placement test would accurately sort students into appropriate levels; the volunteer inventory would improve role matching and volunteer satisfaction; each assessment is practical to administer in its specific context."
    weight: 0.30
    description: "ClientEffectiveness"
