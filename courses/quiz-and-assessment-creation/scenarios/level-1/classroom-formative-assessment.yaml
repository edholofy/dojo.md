meta:
  id: classroom-formative-assessment
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a set of formative assessment activities for a high school biology unit, including exit tickets, quick checks, and peer assessment activities"
  tags: [formative-assessment, k12, biology, beginner]

state: {}

trigger: |
  You're a 10th-grade biology teacher starting a
  3-week unit on "Cell Structure and Function." You
  want to use formative assessment throughout the
  unit to check understanding before the summative
  test, so you can adjust your teaching in real time.

  Unit content:
  - Week 1: Cell theory, prokaryotic vs. eukaryotic
    cells, organelle structure and function
  - Week 2: Cell membrane, transport mechanisms
    (diffusion, osmosis, active transport)
  - Week 3: Cell division (mitosis, cell cycle),
    introduction to meiosis

  Class context:
  - 28 students per class, 4 sections
  - Mix of learning levels (3 IEP students, 2 ELL)
  - 50-minute class periods
  - Technology available: student Chromebooks,
    projector

  Formative assessment requirements:
  1. Daily exit tickets (15 total, one per class day)
     - 2-3 questions each
     - Quick to complete (< 3 minutes)
     - Quick to grade (you have 4 sections!)
     - Mix of question types

  2. Weekly "quick check" quizzes (3 total)
     - 5-8 questions each
     - Cover the week's content
     - Include at least one visual/diagram question
     - Provide immediate feedback strategy

  3. Peer assessment activities (2 total)
     - One for cell organelle identification
     - One for transport mechanisms
     - Include the rubric or criteria students use
     - Structure to prevent social discomfort

  4. Self-assessment checklist
     - "I can" statements for each learning objective
     - Students rate their confidence (1-4 scale)
     - Used before the summative test

  For each assessment:
  - The actual questions/prompts
  - Answer key or rubric
  - How to use the data (what to do if 30% get it
    wrong vs. 70% get it wrong)
  - Accommodations for IEP and ELL students

  Task: Write all formative assessments with
  questions, answer keys, data interpretation
  guidance, and accommodation notes.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete set of formative assessments — 15 exit tickets with questions and answer keys; 3 weekly quick checks with visual questions; 2 peer assessment activities with rubrics; the self-assessment checklist with 'I can' statements; each assessment includes data interpretation guidance and accommodation notes; the assessments cover all unit content proportionally."
    weight: 0.35
    description: "AssessmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates formative assessment expertise — exit tickets are genuinely quick (< 3 minutes); quick checks include visual/diagram questions appropriate for biology; peer assessment structure prevents social discomfort; the self-assessment uses confidence ratings meaningfully; data interpretation guidance gives actionable next steps; accommodations are specific to IEP and ELL needs."
    weight: 0.35
    description: "FormativeExpertise"
  - type: llm_judge
    criteria: "Response would improve teaching and learning — the formative data would identify misconceptions before the summative test; the peer assessment activities build student understanding; the self-assessment promotes metacognition; the overall system is manageable for a teacher with 4 sections; the assessments would measurably improve student performance on the unit test."
    weight: 0.30
    description: "TeachingImpact"
