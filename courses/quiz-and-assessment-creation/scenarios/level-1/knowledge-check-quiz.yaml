meta:
  id: knowledge-check-quiz
  level: 1
  course: quiz-and-assessment-creation
  type: output
  description: "Create a knowledge check quiz for a corporate training module, with multiple choice questions aligned to learning objectives and clear answer explanations"
  tags: [knowledge-check, corporate-training, multiple-choice, beginner]

state: {}

trigger: |
  You're an L&D specialist at a mid-size company.
  You've just delivered a 45-minute training session
  on "Data Privacy Basics for All Employees" and
  need to create a knowledge check quiz to verify
  understanding. All 500 employees must pass with
  80% or higher within 2 weeks.

  Training content covered:
  - What personal data is (PII, sensitive data)
  - Company data classification levels (Public,
    Internal, Confidential, Restricted)
  - Employee responsibilities (clean desk, screen
    lock, email caution, reporting breaches)
  - Phishing recognition (suspicious links, urgent
    language, spoofed addresses)
  - Data breach reporting process (who to contact,
    timeline, what to include)
  - Consequences of non-compliance (for the company
    and the individual)

  Quiz requirements:
  - 15 questions total
  - Mix of question types:
    - 10 multiple choice (4 options each)
    - 3 true/false
    - 2 scenario-based (read a scenario, choose
      the correct action)
  - Each question aligned to a specific learning
    objective
  - Correct answer identified for each question
  - Explanation for WHY the answer is correct (and
    why common wrong answers are wrong)
  - Questions ordered from easier to harder
  - No trick questions or "all of the above"
  - Language appropriate for non-technical employees
  - Passing score: 80% (12/15)

  Task: Write all 15 quiz questions with answer
  choices, correct answers, explanations, and
  learning objective alignment.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 15-question quiz — includes 10 multiple choice, 3 true/false, and 2 scenario-based questions; each question is aligned to a specific learning objective from the training; correct answers are identified with explanations; wrong answer explanations show why each distractor is incorrect; questions progress from easier to harder; no trick questions or 'all of the above.'"
    weight: 0.35
    description: "QuizCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment design quality — questions test understanding (not just recall); scenario-based questions present realistic workplace situations; distractors are plausible but clearly wrong; the language is accessible to non-technical employees; the quiz covers all training topics proportionally; the 80% passing threshold is achievable for employees who paid attention."
    weight: 0.35
    description: "AssessmentQuality"
  - type: llm_judge
    criteria: "Response would effectively verify training comprehension — the quiz would distinguish employees who understood the training from those who didn't; the explanations reinforce learning (not just score); the scenario questions test application, not just memorization; the overall quiz would satisfy compliance requirements for data privacy training."
    weight: 0.30
    description: "VerificationEffectiveness"
