meta:
  id: assessment-platform-product
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Write the product vision and investor pitch for a next-generation assessment platform that replaces traditional testing with continuous competency evidence, seeking $30M Series A"
  tags: [product-vision, startup, investor-pitch, assessment-platform, master]

state: {}

trigger: |
  You're the co-founder and CEO of "EvidenceOS" —
  a startup building the "operating system for
  competency evidence." Your thesis: traditional
  assessments (tests, exams, certifications) will
  be replaced by continuous, ambient evidence of
  competency collected from authentic work and
  learning activities. You're preparing for a $30M
  Series A.

  Product vision:
  - Students, professionals, and lifelong learners
    generate evidence of competency through their
    daily work and learning
  - AI analyzes this evidence against competency
    frameworks (academic standards, professional
    skills, industry certifications)
  - A "Competency Profile" replaces transcripts,
    resumes, and certificates
  - Employers, universities, and credentialing
    bodies can verify competencies
  - The platform creates a "skills layer" for the
    entire education-to-employment pipeline

  Pitch requirements:

  1. Problem statement and market analysis
     - Why traditional assessment is broken (specific
       data points)
     - The $50B assessment market and its disruption
       opportunity
     - Competitive landscape (existing players and
       why they won't solve this)
     - The "ambient assessment" mega-trend
     - Total addressable market (TAM), serviceable
       addressable market (SAM), serviceable
       obtainable market (SOM)

  2. Product architecture
     - Evidence collection layer (how competency
       evidence is captured from LMS, coding
       platforms, work tools, etc.)
     - AI analysis engine (how evidence maps to
       competencies)
     - Competency Profile (what users see, how it
       works)
     - Verification layer (how employers/universities
       trust the evidence)
     - Integration ecosystem (what systems
       EvidenceOS connects to)
     - Privacy and consent architecture (users own
       their data)

  3. Assessment science foundation
     - How to ensure validity of ambient evidence
     - Reliability of AI-analyzed competency ratings
     - Fairness across different evidence sources
     - Comparison to traditional assessment
       psychometrics
     - Research agenda to prove the model works

  4. Go-to-market strategy
     - Phase 1: University pilot (competency
       transcripts)
     - Phase 2: Workforce credentials (partner with
       employers)
     - Phase 3: Lifelong learning ecosystem
     - Customer acquisition strategy for each phase
     - Revenue model (B2B SaaS + marketplace)
     - Unit economics and pricing

  5. Financial projections and ask
     - 5-year revenue projection
     - Key metrics (users, evidence events, employer
       queries, verification transactions)
     - Use of $30M Series A funds
     - Team to build
     - Path to Series B and profitability

  Task: Write the complete investor pitch document
  with all 5 sections.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete pitch document — problem statement with market data and TAM/SAM/SOM; product architecture with evidence collection, AI analysis, profiles, and verification; assessment science foundation addressing validity, reliability, and fairness; 3-phase go-to-market with revenue model; financial projections with 5-year forecast, use of funds, and key metrics."
    weight: 0.35
    description: "PitchCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates dual expertise in assessment science and startup strategy — the assessment science section addresses real psychometric challenges; the product architecture is technically feasible; the go-to-market strategy follows proven SaaS patterns; the financial projections are investor-credible; the overall narrative explains why ambient assessment is the future."
    weight: 0.35
    description: "DualExpertise"
  - type: llm_judge
    criteria: "Response would attract Series A investment — the problem statement is compelling; the market opportunity is clear and large; the product is differentiated from competitors; the assessment science foundation addresses investor skepticism about validity; the financial projections show a path to $100M+ revenue; a top-tier VC would take this meeting."
    weight: 0.30
    description: "InvestmentReadiness"
