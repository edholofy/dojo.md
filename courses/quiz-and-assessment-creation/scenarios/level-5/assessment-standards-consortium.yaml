meta:
  id: assessment-standards-consortium
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Establish a multi-organization consortium to create quality standards for educational assessments, with governance, technical standards, certification, and industry adoption strategy"
  tags: [standards, consortium, industry, governance, master]

state: {}

trigger: |
  You've been appointed to lead the formation of
  the "Assessment Quality Consortium" (AQC) — a
  partnership of 20 organizations (testing companies,
  universities, school districts, professional
  associations, and edtech firms) that will
  establish voluntary quality standards for
  educational assessments. Think of this as a
  "LEED certification for assessments" — a
  recognized quality mark that consumers can trust.

  The problem AQC solves:
  - Anyone can call anything an "assessment"
  - No industry-wide quality standards exist beyond
    voluntary professional guidelines
  - Consumers (schools, employers, governments)
    can't distinguish high-quality from low-quality
    assessments
  - AI-generated assessments are flooding the market
    with unvalidated content
  - The $50B assessment industry has a credibility
    problem

  Consortium formation requirements:

  1. Governance structure
     - Founding member categories (testing company,
       university, K-12 district, professional
       association, edtech, consumer advocate)
     - Board composition and voting rules
     - Technical advisory committee structure
     - Membership tiers and dues structure
     - Decision-making process for standards
       development
     - Intellectual property and antitrust policies

  2. Assessment Quality Standards (AQS 1.0)
     - Standard 1: Content Validity — assessment
       measures what it claims to measure
     - Standard 2: Psychometric Rigor — reliability,
       item quality, scoring accuracy
     - Standard 3: Fairness — bias review, DIF
       analysis, accessibility
     - Standard 4: Appropriate Use — clear use cases,
       misuse prevention, score interpretation guides
     - Standard 5: Transparency — documentation,
       technical reports, public reporting
     - Standard 6: Data Ethics — privacy, security,
       algorithmic transparency, consent
     - For each: requirements, evidence needed,
       evaluation criteria, and compliance levels

  3. Certification program
     - How assessments earn the AQC quality mark
     - Application and review process
     - Evaluator qualifications and training
     - Certification levels (Bronze, Silver, Gold)
     - Annual renewal requirements
     - How to handle assessments that fail review
     - Fee structure that's accessible to small
       companies

  4. Industry adoption strategy
     - How to get testing companies to adopt
       voluntarily
     - How to get consumers (schools, employers) to
       demand the AQC mark
     - Government relations strategy (encouraging
       AQC as procurement requirement)
     - International expansion plan
     - Marketing and public awareness campaign

  5. 3-year launch plan
     - Year 1: Formation, governance, draft standards
     - Year 2: Pilot certification with founding
       members
     - Year 3: Public launch and first certifications
     - Budget: founding capital requirements, ongoing
       funding model
     - Success metrics

  Task: Create the complete consortium formation
  package with governance, AQS 1.0 standards,
  certification program, adoption strategy, and
  launch plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consortium package — governance with board composition, voting, and antitrust policies; AQS 1.0 with 6 standards each having requirements and evaluation criteria; certification program with levels, process, and fee structure; industry adoption strategy with government relations and consumer demand; 3-year launch plan with budget and success metrics."
    weight: 0.35
    description: "ConsortiumCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards-body expertise — the governance structure balances stakeholder interests; the 6 AQS standards are substantive and evaluable; the certification process is rigorous but achievable; the adoption strategy addresses real barriers; antitrust and IP policies are properly considered; the funding model is sustainable; the overall structure follows successful consortium precedents."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would establish AQC as the industry quality mark — testing companies would see value in certification; consumers would demand the mark; the AQS 1.0 standards would be technically defensible; the certification program would distinguish quality from marketing claims; the consortium would become self-sustaining; the assessment industry would improve as a result."
    weight: 0.30
    description: "IndustryImpact"
