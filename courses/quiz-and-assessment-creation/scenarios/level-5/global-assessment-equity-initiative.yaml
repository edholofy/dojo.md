meta:
  id: global-assessment-equity-initiative
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Design a UNESCO-backed global initiative to address assessment inequity across developing nations, with culturally appropriate frameworks, capacity building, and funding mechanisms"
  tags: [global, equity, unesco, developing-nations, capacity-building, master]

state: {}

trigger: |
  You've been appointed to lead a UNESCO initiative
  called "Fair Assessment for All" — a $100M,
  5-year global program to address the crisis of
  assessment inequity in developing nations. The
  core problem: 600 million children in low- and
  middle-income countries have no access to quality
  assessments, meaning their learning goes unmeasured,
  their needs go unidentified, and their educational
  systems can't improve.

  Context:
  - 90+ countries have no national assessment system
  - Many imported assessments are culturally
    inappropriate (Western-developed, English-
    language, decontextualized)
  - Teacher assessment capacity is minimal (most
    teachers have no training in assessment)
  - Data infrastructure is limited (paper-based,
    no analytics)
  - Assessment is often punitive (used to fail and
    sort students, not to improve learning)
  - International assessments (PISA, TIMSS) don't
    cover most developing nations

  Initiative design requirements:

  1. Assessment equity framework
     - Definition of "assessment equity" in global
       context
     - Minimum assessment standards for every country
     - How to balance global comparability with
       cultural appropriateness
     - Indigenous knowledge and assessment (how to
       assess knowledge systems that don't fit
       Western frameworks)
     - Assessment in multilingual contexts (many
       countries have 50+ languages)

  2. Country-level implementation models
     - Model A: "Assessment from scratch" — for
       countries with no national system
     - Model B: "Assessment improvement" — for
       countries with basic systems needing quality
       upgrades
     - Model C: "Assessment transformation" — for
       countries with traditional systems needing
       modernization
     - For each: what's built, capacity requirements,
       timeline, and example country

  3. Capacity building program
     - Teacher assessment literacy curriculum
       (adapted for low-resource contexts)
     - Assessment specialist training pipeline
     - "Train the trainer" model for sustainability
     - Technology-enabled assessment in low-
       connectivity environments
     - Regional centers of assessment excellence

  4. Culturally responsive assessment development
     - How to develop assessments that are valid
       within cultural contexts
     - Community engagement in assessment design
     - Assessment of skills valued locally (not just
       academics: agricultural knowledge, community
       skills, oral traditions)
     - 2 example assessments designed for specific
       cultural contexts

  5. Funding and sustainability
     - $100M allocation across 5 years and priorities
     - Donor coordination (World Bank, bilateral
       donors, foundations)
     - Country co-investment requirements
     - Sustainability plan (what continues after
       funding ends)
     - Monitoring, evaluation, and learning framework

  6. Political and ethical considerations
     - How to prevent assessment colonialism
     - Data sovereignty for developing nations
     - Assessment and the SDGs (Sustainable
       Development Goal 4)
     - Navigating political resistance to
       transparency

  Task: Design the complete "Fair Assessment for
  All" initiative with all 6 components.

assertions:
  - type: llm_judge
    criteria: "Response designs the complete initiative — assessment equity framework with multilingual and indigenous knowledge considerations; 3 country-level implementation models with examples; capacity building with teacher training and regional centers; culturally responsive assessment with 2 examples; $100M funding plan with sustainability model; political and ethical framework addressing assessment colonialism."
    weight: 0.35
    description: "InitiativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global assessment expertise — the equity framework addresses real structural barriers; implementation models are differentiated for different country contexts; culturally responsive assessment goes beyond translation; the capacity building is sustainable; the funding model reflects international development realities; the colonialism prevention is substantive, not tokenistic."
    weight: 0.35
    description: "GlobalExpertise"
  - type: llm_judge
    criteria: "Response would improve assessment for millions of learners — the initiative would build lasting assessment capacity in developing nations; culturally responsive assessments would measure what matters locally; teachers would gain assessment literacy; the political framework would gain government buy-in; the $100M would be well-spent; the initiative would become a landmark in global education."
    weight: 0.30
    description: "GlobalImpact"
