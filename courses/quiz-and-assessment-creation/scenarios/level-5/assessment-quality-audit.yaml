meta:
  id: assessment-quality-audit
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Conduct a comprehensive quality audit of a national testing organization's entire assessment portfolio, with psychometric review, bias analysis, and strategic recommendations"
  tags: [quality-audit, national-testing, portfolio-review, strategic, master]

state: {}

trigger: |
  You're the lead external auditor hired by a
  national testing organization (NTO) that
  administers 12 high-stakes exams taken by 2.5
  million candidates annually. The NTO's board has
  ordered a comprehensive quality audit after a
  series of incidents: two scoring errors discovered
  post-hoc, a successful legal challenge on bias
  grounds, declining public confidence, and a
  legislative threat to replace the NTO with a
  government agency.

  NTO's assessment portfolio:
  1. K-12 standardized tests (ELA, Math, Science) —
     grades 3, 5, 8, 11
  2. High school exit exam
  3. Teacher certification exam (4 subject areas)
  4. School administrator certification exam
  5. English language proficiency assessment
  6. College readiness assessment
  7. Career and technical education assessments
     (12 pathways)

  Audit requirements:

  1. Psychometric quality review
     - Assessment-level reliability analysis
       (internal consistency, standard error of
       measurement)
     - Item pool health assessment (age of items,
       exposure rates, difficulty/discrimination
       distributions)
     - Score scale maintenance and equating quality
     - Standard setting documentation review
     - Technical report completeness assessment
     - For each assessment: quality rating (Exceeds
       Standards, Meets Standards, Below Standards,
       Critical Concern) with justification

  2. Fairness and bias audit
     - DIF analysis review across gender, race/
       ethnicity, and EL status
     - Sensitivity review process evaluation
     - Accommodation adequacy for students with
       disabilities
     - Adverse impact analysis for certification
       exams
     - Language accessibility evaluation
     - Fairness rating for each assessment

  3. Operations and security review
     - Item security protocols (exposure control,
       breach response)
     - Scoring accuracy controls and verification
     - Administration standardization across sites
     - Accommodations delivery consistency
     - Technology infrastructure reliability
     - Data handling and privacy compliance

  4. Governance and quality management
     - Assessment development process documentation
     - Quality assurance checkpoints
     - Staff qualifications and professional
       development
     - Stakeholder engagement and communication
     - Complaint and appeals process evaluation
     - Organizational culture assessment (is quality
       valued or is it about throughput?)

  5. Strategic recommendations
     - Critical findings requiring immediate action
     - Medium-term improvements (6-18 months)
     - Long-term strategic investments
     - Investment priorities and estimated costs
     - Governance reforms to prevent recurrence
     - Public confidence restoration plan

  Task: Write the complete audit report with
  quality ratings for each assessment, fairness
  findings, operations review, governance
  evaluation, and strategic recommendations.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete audit report — psychometric quality review with ratings for each of the 12 assessments; fairness audit with DIF, sensitivity, and adverse impact analysis; operations review covering security, scoring, and administration; governance evaluation of processes, staff, and culture; strategic recommendations with immediate, medium-term, and long-term actions and costs."
    weight: 0.35
    description: "AuditCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment audit expertise — quality ratings are justified with specific evidence; the fairness audit identifies both systemic and item-level issues; the operations review catches the root causes of the scoring errors; the governance evaluation explains why problems recurred; strategic recommendations are prioritized and costed; the overall report reflects the standards expected of a national-level external audit."
    weight: 0.35
    description: "AuditExpertise"
  - type: llm_judge
    criteria: "Response would save the NTO — the audit report would satisfy the board and preempt legislative action; the immediate actions would address the most critical vulnerabilities; the public confidence plan would restore trust; the governance reforms would prevent recurrence; the NTO would emerge from the audit stronger than before; the report is diplomatically written but unflinchingly honest."
    weight: 0.30
    description: "OrganizationalSalvation"
