meta:
  id: psychometric-research-paper
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Write a publishable research paper on the psychometric properties of AI-generated assessment items compared to human-written items for the Journal of Educational Measurement"
  tags: [research, psychometrics, ai-items, publication, master]

state: {}

trigger: |
  You're a tenured professor of educational
  measurement at a research university. You've
  conducted a groundbreaking study comparing the
  psychometric properties of AI-generated test
  items versus traditionally developed items.
  You're writing the paper for the Journal of
  Educational Measurement (JEM).

  Study details:
  - Content area: high school biology (genetics
    unit)
  - 3 conditions:
    A) Human-written items (traditional SME
       development process)
    B) AI-generated items (GPT-4 with structured
       prompts, no human review)
    C) AI-generated + human-reviewed items (AI
       draft, SME revision)
  - 60 items per condition (180 total), all multiple
    choice with 4 options
  - Administered to 1,200 10th-grade students across
    12 schools
  - Balanced incomplete block design (each student
    answers items from all 3 conditions)
  - Data collected: item responses, response times,
    student demographics, teacher ratings of item
    quality

  Analyses conducted:
  - Classical test theory (CTT): difficulty index,
    discrimination index, distractor analysis
  - Item response theory (IRT): 2PL model, item
    parameter estimation
  - Differential item functioning (DIF) by condition
    and demographic groups
  - Expert panel quality ratings (blind — raters
    didn't know which condition)
  - Response time analysis
  - Content alignment analysis (items to standards)

  Paper requirements:

  1. Introduction (literature review)
     - AI in assessment: current state
     - Psychometric quality of AI-generated content
     - Research gaps this study addresses
     - Research questions (5 specific questions)

  2. Method
     - Participants, materials, procedure
     - Item development process for each condition
     - AI prompting methodology (include the prompt
       engineering approach)
     - Study design and administration
     - Analysis plan

  3. Results (create realistic hypothetical data)
     - CTT results by condition (tables)
     - IRT parameter estimates (tables)
     - DIF analysis results
     - Expert ratings comparison
     - Response time analysis
     - Content alignment results

  4. Discussion
     - What the results mean for assessment practice
     - When AI-generated items are "good enough"
     - The role of human review in AI item pipelines
     - Limitations
     - Implications for the assessment industry
     - Future research directions

  Task: Write the complete JEM paper with all
  sections, tables, and references.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete research paper — introduction with literature review and 5 research questions; method section with participants, item development procedures, AI prompting methodology, and analysis plan; results with CTT tables, IRT parameter estimates, DIF analysis, expert ratings, and response time data; discussion with implications, limitations, and future directions."
    weight: 0.35
    description: "PaperCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates psychometric research expertise — the balanced incomplete block design is appropriate; CTT and IRT analyses are correctly specified; DIF analysis methodology is sound; the AI prompting methodology is detailed enough to replicate; hypothetical results are realistic; the literature review reflects genuine assessment science; the paper follows JEM conventions."
    weight: 0.35
    description: "ResearchExpertise"
  - type: llm_judge
    criteria: "Response would advance the field — the research questions address genuinely important gaps; the methodology sets a standard for evaluating AI-generated items; the results provide actionable guidance for practitioners; the discussion honestly addresses when AI items are and aren't sufficient; the paper would be cited by both assessment scientists and practitioners."
    weight: 0.30
    description: "FieldContribution"
