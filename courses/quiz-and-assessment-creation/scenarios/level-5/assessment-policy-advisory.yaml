meta:
  id: assessment-policy-advisory
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Serve as chief advisor to a national education secretary developing federal assessment policy, balancing accountability, innovation, equity, and political feasibility"
  tags: [policy, federal, advisory, education-secretary, master]

state: {}

trigger: |
  You're the newly appointed Senior Advisor for
  Assessment Policy to the U.S. Secretary of
  Education. The Secretary wants to issue new
  guidance on assessment policy that balances
  federal accountability requirements with growing
  demands for assessment innovation, equity, and
  reduced testing burden. Your recommendations
  will shape assessment policy for the next decade.

  Political context:
  - Bipartisan frustration with "over-testing" but
    disagreement on alternatives
  - States experimenting with innovative assessment
    (through-course, performance tasks, competency-
    based) want federal flexibility
  - Civil rights groups insist on annual comparable
    data to identify achievement gaps
  - Testing companies lobby for status quo
  - Teacher unions want reduced testing burden
  - Parent groups are split (some want more data,
    some want less testing)
  - AI-generated assessments are an emerging concern

  Policy development requirements:

  1. Assessment landscape analysis
     - Current federal assessment requirements (ESSA)
     - What's working and what isn't (evidence-based)
     - State innovation examples (5 states doing
       interesting things)
     - The equity data imperative: why comparable
       annual data matters
     - The testing burden reality: how much time
       students actually spend testing

  2. Policy framework: "Assessment for Learning"
     - Vision: assessment that improves learning, not
       just measures it
     - Pillar 1: Accountability with flexibility
       (how states can innovate while meeting federal
       requirements)
     - Pillar 2: Assessment quality (minimum
       standards for any assessment system)
     - Pillar 3: Equity through data (protecting
       subgroup reporting while reducing burden)
     - Pillar 4: Student-centered assessment (age-
       appropriate, culturally responsive,
       accessible)
     - Pillar 5: Assessment literacy (building
       capacity at every level)
     - Pillar 6: Responsible AI in assessment
       (guardrails for AI-generated items and scoring)

  3. Specific policy recommendations
     - Recommendation 1: "Innovative Assessment
       Demonstration Authority" expansion
     - Recommendation 2: Federal assessment quality
       standards
     - Recommendation 3: Competitive grants for
       assessment innovation
     - Recommendation 4: AI assessment transparency
       requirements
     - Recommendation 5: Assessment literacy
       initiative
     - For each: what it does, who benefits, cost,
       political feasibility, potential opposition

  4. Stakeholder communication
     - Dear Colleague letter to state chiefs
     - Talking points for the Secretary's press
       conference
     - One-page summary for congressional briefing
     - FAQ for parents and educators
     - Response to anticipated criticism from each
       stakeholder group

  5. Implementation timeline
     - What can be done through guidance (no
       legislation needed)
     - What requires regulatory change
     - What requires congressional action
     - 5-year phased implementation
     - Success metrics and evaluation plan

  Task: Write the complete policy advisory package
  with landscape analysis, framework, recommendations,
  stakeholder communications, and implementation
  timeline.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy package — landscape analysis with current requirements and state examples; 6-pillar policy framework; 5 specific recommendations with costs and feasibility; stakeholder communications including Dear Colleague letter, talking points, congressional summary, parent FAQ, and criticism responses; implementation timeline distinguishing guidance from regulatory from legislative actions."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment policy expertise — ESSA requirements are accurately described; state innovation examples are realistic; the framework balances accountability with flexibility; policy recommendations are implementable; AI assessment guardrails are substantive; the political feasibility analysis is honest about opposition; the overall package reflects deep understanding of federal education policy."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would shape national assessment policy — the Secretary could adopt this framework; the recommendations would survive political scrutiny; the equity protections would satisfy civil rights groups; the innovation flexibility would satisfy states; the assessment quality standards would improve the field; the AI guardrails would address an emerging concern; the package would be the Secretary's signature education initiative."
    weight: 0.30
    description: "PolicyImpact"
