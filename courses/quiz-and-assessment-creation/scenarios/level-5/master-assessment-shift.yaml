meta:
  id: master-assessment-shift
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "As the newly appointed Global Chief Assessment Officer, manage five simultaneous crises spanning K-12, higher education, workforce, international, and AI assessment domains"
  tags: [shift-simulation, multi-crisis, strategic, global, master]

state: {}

trigger: |
  You've been appointed the first-ever Global Chief
  Assessment Officer (GCAO) at a newly created
  international assessment governance organization.
  In your first month, five critical situations
  demand your simultaneous attention.

  Crisis 1: AI Assessment Arms Race
  Three major testing companies have simultaneously
  released AI-powered "instant assessment generators"
  that create full exams in seconds from any content.
  School districts are adopting them without
  validation. Early data shows 35% of AI-generated
  items contain factual errors, 20% have construct-
  irrelevant difficulty, and bias analysis hasn't
  been performed on any of them. Meanwhile, AI
  scoring is being marketed as replacing human
  grading entirely. You need to:
  - Issue an urgent advisory on AI-generated
    assessments
  - Propose international quality standards for AI
    assessment tools
  - Design a rapid validation framework for AI-
    generated items
  - Address the workforce impact on assessment
    professionals

  Crisis 2: Global Testing Scandal
  A coordinated cheating ring spanning 15 countries
  has compromised the world's largest English
  language proficiency test (used for university
  admissions and immigration). 500,000 test scores
  are potentially invalid. Universities have
  suspended admissions decisions. Governments have
  frozen visa processing. You need to:
  - Lead the international crisis response
  - Design the score invalidation and retesting plan
  - Propose security reforms for international
    testing
  - Address the humanitarian impact on legitimate
    test-takers caught in the freeze

  Crisis 3: Assessment Equity Data Crisis
  A major international report reveals that
  standardized testing data has been systematically
  used to justify discriminatory policies in 12
  countries — from tracking students by race to
  denying employment to linguistic minorities.
  Anti-testing movements are gaining political power,
  and 3 countries have announced plans to ban all
  standardized testing. You need to:
  - Write a position paper on the ethical use of
    assessment data
  - Propose guardrails that prevent misuse while
    preserving beneficial uses
  - Design an "Assessment Ethics Review Board"
  - Address the legitimate concerns of anti-testing
    advocates

  Crisis 4: Credentialing Fragmentation
  The explosion of digital credentials (micro-
  credentials, digital badges, blockchain
  certificates) has created a credentialing
  landscape that nobody can navigate. Employers
  can't verify what credentials mean. Learners
  can't transfer them. Fraud is rampant — fake
  credentials are sold for $50 online. You need to:
  - Propose a global credentialing interoperability
    standard
  - Design a verification infrastructure
  - Address credential fraud at scale
  - Create a "credential translation" framework
    for employers

  Crisis 5: Assessment and Mental Health
  A WHO report directly links assessment anxiety
  to a 40% increase in youth mental health crises
  across 25 countries. The report calls out high-
  stakes testing, competitive exam systems, and
  punitive grading as major contributing factors.
  Parents' groups are demanding "trauma-informed
  assessment." You need to:
  - Write the organization's response to the WHO
    report
  - Propose assessment design principles that
    reduce harm
  - Design a "well-being impact assessment" for
    testing programs
  - Balance mental health concerns with assessment
    necessity

  Task: Address all five crises with appropriate
  documents. Produce: the AI assessment advisory,
  the testing scandal response plan, the assessment
  ethics position paper, the credentialing standard
  proposal, and the mental health response.
  Additionally, write the strategic memo to your
  organization's board tying all five together into
  a unified vision for responsible global assessment
  governance.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises substantively — the AI advisory includes quality standards and validation framework; the testing scandal response covers invalidation, retesting, and security; the ethics paper addresses misuse with guardrails; the credentialing proposal includes interoperability standard and fraud prevention; the mental health response balances harm reduction with assessment necessity; the board memo connects all five into a unified governance vision."
    weight: 0.35
    description: "CrisisManagementCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global assessment governance expertise — the AI standards are technically sound; the testing scandal response handles international coordination; the ethics framework navigates cultural differences across 12 countries; the credentialing standard is technically interoperable; the mental health response is evidence-based; the board memo demonstrates strategic thinking about the future of assessment globally."
    weight: 0.35
    description: "GovernanceExpertise"
  - type: llm_judge
    criteria: "Response would establish the organization's global leadership — each crisis response creates lasting institutional frameworks; the unified vision would convince the board to invest; the AI standards would gain industry adoption; the credentialing standard would become foundational; the overall response demonstrates why global assessment governance is necessary and this organization should lead it."
    weight: 0.30
    description: "InstitutionalLeadership"
