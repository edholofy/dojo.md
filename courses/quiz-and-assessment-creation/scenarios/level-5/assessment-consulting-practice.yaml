meta:
  id: assessment-consulting-practice
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Launch a boutique assessment consulting practice with a proprietary methodology, service packages, and go-to-market strategy"
  tags: [consulting, practice-building, methodology, business, master]

state: {}

trigger: |
  After 20 years leading assessment at testing
  companies, universities, and school districts,
  you're launching your own boutique assessment
  consulting firm: "MeasureTrue." Your differentiation
  is a proprietary methodology called the "Assessment
  Integrity Framework" (AIF) — a systematic approach
  to ensuring that assessments are valid, fair,
  useful, and aligned to their stated purpose.

  Firm launch requirements:

  1. The AIF Methodology (your IP)
     - 5 dimensions of assessment integrity:
       Alignment, Validity, Equity, Utility, Ethics
     - For each dimension: definition, evaluation
       criteria, diagnostic tools, maturity levels
       (1-5)
     - The "Assessment Integrity Scorecard" — a
       proprietary diagnostic tool
     - How the AIF applies differently to:
       - K-12 education assessments
       - Higher education assessment
       - Corporate talent assessment
       - Professional certification exams
     - Case study format showing AIF applied to a
       real assessment challenge

  2. Service packages (5 offerings)
     - Assessment Audit (2-week diagnostic)
     - Assessment Redesign (3-6 month engagement)
     - Psychometric Services (ongoing retainer)
     - Assessment Team Development (training program)
     - Expert Witness / Legal Support (as-needed)
     - For each: scope, deliverables, timeline,
       pricing model, ideal client profile

  3. Go-to-market strategy
     - Target market segments and buyer personas
     - Content marketing plan (thought leadership
       that demonstrates expertise)
     - Speaking and conference strategy
     - Partnership opportunities (testing companies,
       edtech, law firms)
     - Sales process from lead to engagement
     - Revenue projections (Year 1-3)

  4. Three sample case studies
     - Case 1: K-12 — Helped a state fix its
       assessment system after legislative criticism
     - Case 2: Corporate — Redesigned a Fortune 500
       hiring assessment program reducing adverse
       impact by 60%
     - Case 3: Certification — Built a professional
       certification exam from job analysis to NCCA
       accreditation
     - Each: situation, approach (using AIF),
       results, client testimonial

  5. Firm operations
     - Team structure (solo to 5-person firm in
       Year 3)
     - Technology stack for delivering services
     - Professional liability considerations
     - Professional development plan for staying
       current

  Task: Create the complete firm launch package
  with AIF methodology, service packages, go-to-
  market strategy, case studies, and operations
  plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting launch — AIF methodology with 5 dimensions, evaluation criteria, and maturity levels; 5 service packages with scope, deliverables, and pricing; go-to-market strategy with buyer personas, content plan, and revenue projections; 3 case studies with situation-approach-results format; operations plan with team growth and technology stack."
    weight: 0.35
    description: "ConsultingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates consulting business expertise — the AIF methodology is genuinely valuable (not just repackaged common knowledge); service packages are priced appropriately for boutique consulting; the go-to-market strategy targets realistic buyers; case studies are compelling and credible; revenue projections are realistic for a solo-to-small-firm trajectory; the overall firm would attract clients."
    weight: 0.35
    description: "ConsultingExpertise"
  - type: llm_judge
    criteria: "Response would launch a viable consulting practice — the AIF methodology would differentiate from competitors; clients would see clear value in each service package; the case studies would generate new business; the go-to-market strategy would produce leads; the firm could grow sustainably from Year 1 to Year 3; a 20-year assessment veteran would find this plan actionable."
    weight: 0.30
    description: "BusinessViability"
