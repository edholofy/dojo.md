trigger: |
  You've been invited to write a chapter for the
  "Oxford Handbook of Educational Assessment" (4th
  edition). Your chapter: "The Cognitive Science of
  Assessment: How Students Process, Interpret, and
  Respond to Assessment Tasks."

  This chapter sits at the intersection of cognitive
  psychology and assessment design. It should be the
  definitive reference on how cognitive science
  research should inform the design of assessment
  items, tasks, and systems.

  Chapter requirements:

  Section 1: Cognitive Processing During Assessment
  - Working memory demands of different question
    types
  - Cognitive load theory applied to item design
  - How students read and interpret question stems
  - The role of prior knowledge in test performance
  - Attention, fatigue, and performance over time

  Section 2: Decision-Making and Response Selection
  - How students choose answers in multiple choice
    (process of elimination, recognition, guessing)
  - Constructed response cognitive processes
    (generation vs. recognition)
  - The psychology of distractor attraction
  - Metacognitive monitoring during assessment
    (confidence calibration)
  - Test-taking strategies and their cognitive basis

  Section 3: Emotional and Motivational Dimensions
  - Test anxiety: cognitive interference model
  - Stereotype threat and assessment performance
  - Motivation and effort investment in low-stakes
    vs. high-stakes contexts
  - Growth mindset and assessment interpretation
  - The emotional impact of feedback timing and
    format

  Section 4: Implications for Assessment Design
  - Evidence-centered design through a cognitive
    lens
  - Item types and their cognitive demands (taxonomy)
  - Optimal assessment conditions based on cognitive
    science
  - Designing for cognitive accessibility
  - Technology-enhanced items and cognitive
    engagement

  Section 5: Future Directions
  - Neuroeducation and assessment (what brain
    imaging tells us)
  - Process data analysis (using response patterns
    and timing as evidence)
  - Cognitive diagnostic models
  - Personalized assessment based on cognitive
    profiles
  - AI and the cognitive science of automated
    scoring

  Requirements:
  - 8,000-10,000 words
  - Academic tone appropriate for Oxford Handbook
  - 8 sections with subsections
  - Research citations throughout (reference at
    least 50 studies)
  - 2-3 figures or tables illustrating key concepts
  - Practical implications box for each section

  Task: Write the complete handbook chapter.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive handbook chapter — covers all 5 sections with subsections; addresses cognitive processing, decision-making, emotional dimensions, design implications, and future directions; 8,000-10,000 words; academic tone; references 50+ studies; includes figures/tables; practical implications for each section."
    weight: 0.35
    description: "ChapterCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep cognitive science and assessment expertise — correctly applies working memory, cognitive load, and metacognition to assessment; the distractor psychology section reflects genuine research; test anxiety is treated with nuance; evidence-centered design is accurately described; future directions are based on real emerging research areas."
    weight: 0.35
    description: "CognitiveAssessmentExpertise"
  - type: llm_judge
    criteria: "Response would be accepted for the Oxford Handbook — the chapter would be the definitive reference on cognitive science and assessment; assessment designers would use it to improve their work; researchers would cite it; the practical implications would change how practitioners think about item design; the chapter fills a genuine gap in the assessment literature."
    weight: 0.30
    description: "HandbookQuality"
