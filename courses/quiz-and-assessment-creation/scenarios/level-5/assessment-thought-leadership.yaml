meta:
  id: assessment-thought-leadership
  level: 5
  course: quiz-and-assessment-creation
  type: output
  description: "Write a keynote address and white paper for a national assessment conference arguing for a paradigm shift in educational assessment beyond standardized testing"
  tags: [thought-leadership, keynote, paradigm-shift, assessment-future, master]

state: {}

trigger: |
  You've been invited to deliver the opening keynote
  at the National Council on Measurement in Education
  (NCME) 2026 Annual Meeting. The theme is "Assessment
  Beyond the Test: Reimagining What Measurement Can
  Be." Your keynote must challenge the field's
  fundamental assumptions while remaining empirically
  grounded.

  Your argument: The standardized test — the dominant
  assessment paradigm for over a century — has reached
  its limits. It cannot measure what matters most for
  21st-century success: creativity, collaboration,
  ethical reasoning, adaptive expertise, and the
  ability to learn new things. A new paradigm is
  needed — not incremental improvement of existing
  tests, but a fundamentally different approach to
  educational measurement.

  Keynote requirements:
  1. Opening: Compelling narrative that illustrates
     the problem (a real student whose test scores
     don't reflect their abilities)
  2. The case against the current paradigm
     - What standardized tests measure well
     - What they cannot measure (with evidence)
     - The opportunity costs of over-testing
     - How the testing industry resists change
  3. The new paradigm: "Embedded Evidence Systems"
     - Assessment embedded in authentic learning
       tasks
     - AI-powered evidence collection from digital
       learning environments
     - Portfolio-based demonstration of competency
     - Community-validated evidence of impact
  4. Technical feasibility
     - Psychometric challenges and solutions
     - Reliability without standardization
     - Validity of authentic evidence
     - Fairness in non-standardized assessment
  5. Call to action for the measurement community
  6. Q&A preparation: 10 anticipated tough questions
     with responses

  Additionally, write the companion white paper
  (6,000+ words) that provides the empirical
  foundation for the keynote argument, with full
  literature review, proposed framework, and
  research agenda.

  Task: Write the keynote speech and the companion
  white paper.

assertions:
  - type: llm_judge
    criteria: "Response delivers both deliverables — the keynote speech includes compelling narrative opening, case against current paradigm with evidence, the 'Embedded Evidence Systems' vision with 4 components, technical feasibility discussion, call to action, and 10 Q&A preparations; the white paper is 6,000+ words with literature review, framework, and research agenda."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates assessment field mastery — the critique of standardized testing is empirically grounded; the new paradigm addresses real psychometric challenges (not just handwaving reliability); the technical feasibility section confronts hard problems; the literature review cites relevant assessment science; the Q&A responses anticipate real pushback from measurement professionals."
    weight: 0.35
    description: "FieldMastery"
  - type: llm_judge
    criteria: "Response would influence the assessment field — the keynote would generate discussion and debate at NCME; the white paper would be cited in subsequent assessment literature; the Embedded Evidence Systems framework is specific enough to inspire research programs; the overall argument advances the field beyond incremental improvement toward genuine paradigm reconsideration."
    weight: 0.30
    description: "FieldInfluence"
