meta:
  id: enterprise-ds-program
  level: 5
  course: design-system-documentation
  type: output
  description: "Enterprise design system program — design and document an enterprise-wide design system program spanning multiple business units, products, and platforms"
  tags: [enterprise, program, multi-BU, organizational, master]

state: {}

trigger: |
  You're hired as the Chief Design Systems Officer (a new
  C-level role) at a global enterprise with:

  - 5 business units, each with their own products
  - 15,000 engineers and 2,000 designers globally
  - 3 existing design systems (one per major BU, none aligned)
  - 40+ products across web, mobile, desktop, and embedded
  - Offices in 12 countries with designers in 8 time zones
  - Annual digital product investment: $500M
  - Estimated waste from inconsistency: $45M/year (duplicated
    components, rework, integration costs)

  The CTO's mandate: "Unify our design system landscape.
  I don't care if it's one system or a federated approach,
  but stop the $45M waste. You have 3 years and a $15M
  budget."

  Task: Design the enterprise design system program strategy
  including organizational model, technical architecture,
  governance, and documentation approach.

assertions:
  - type: llm_judge
    criteria: "Response designs an enterprise program model — evaluates organizational approaches: single unified system (maximum consistency, highest change management cost), federated model (shared foundation + BU-specific extensions, balanced approach), or marketplace model (curated library of approved components from any BU). Recommends one with clear rationale. Technical architecture: shared design token foundation across all 3 existing systems (immediate win: consistent colors, typography, spacing), shared core component library (20-30 universal components: Button, Input, Modal, Table), BU-specific component libraries extending the core. Migration strategy: converge the 3 systems over 3 years, not a big-bang replacement"
    weight: 0.35
    description: "ProgramModel"
  - type: llm_judge
    criteria: "Response creates the governance and organizational structure — enterprise governance board (representatives from each BU, quarterly strategic decisions), design system team structure (central platform team of 15-20 + embedded contributors from each BU), RACI matrix for decisions (who decides what goes into core vs BU-specific), contribution model at enterprise scale (BU teams contribute to core, core team maintains quality), and documentation strategy (single documentation platform with BU-specific sections, shared foundations, enterprise-wide search). Addresses the 8-timezone challenge: async-first governance, regional champions"
    weight: 0.35
    description: "GovernanceOrganization"
  - type: llm_judge
    criteria: "Response presents a realistic 3-year plan with the $15M budget — Year 1 ($5M): establish governance, audit all 3 systems, create shared token foundation, build core team, quick wins on the highest-waste areas. Year 2 ($5M): launch unified core library, migrate first 2 BUs, establish enterprise documentation site, build contribution pipeline. Year 3 ($5M): complete migration, optimization, advanced features (AI-augmented, predictive), demonstrate $45M waste reduction. Each year has: headcount plan, major milestones, risk mitigation, and measurable KPIs for the $45M waste reduction. Acknowledges the political challenges of unifying 5 BUs"
    weight: 0.30
    description: "ThreeYearPlan"
