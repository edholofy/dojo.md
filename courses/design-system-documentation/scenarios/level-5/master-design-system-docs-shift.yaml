meta:
  id: master-design-system-docs-shift
  level: 5
  course: design-system-documentation
  type: output
  description: "Master design system docs shift — handle a week of strategic design system leadership including board presentation, M&A, industry contribution, and organizational transformation"
  tags: [shift, combined, assessment, executive-leadership, master]

state: {}

trigger: |
  You're the Chief Design Systems Officer. Your week:

  MONDAY — BOARD MEETING: The board is reviewing the $15M
  3-year design system investment. Year 1 is complete. Results:
  adoption went from 40% to 68%, estimated $8M in engineering
  savings, but the mobile launch was delayed 2 months because
  mobile components weren't ready. The board asks: "Is this
  on track? Should we continue the investment?" Present
  the year-1 review and year-2 plan.

  WEDNESDAY — ACQUISITION ANNOUNCEMENT: The company just
  acquired a competitor with a completely different tech
  stack (Angular vs your React). The CTO asks: "How does
  this affect the design system? Can we integrate their
  product within 18 months?" Design the integration
  strategy.

  THURSDAY — INDUSTRY STANDARDS: The W3C Design Tokens
  Community Group asks you to co-chair a new working group
  on "Design System Component Documentation Standards."
  Decide whether to accept and what your company gains
  from this involvement.

  FRIDAY — TEAM CRISIS: Your best design system engineer
  just quit, and 2 more are interviewing elsewhere. The
  team is demoralized because they feel "invisible" — the
  products get credit for quality but the DS team is
  overhead. Address the retention crisis.

  Task: Navigate all four challenges with strategic
  leadership.

assertions:
  - type: llm_judge
    criteria: "Response handles the board review honestly and strategically — Year 1 results: 40%→68% adoption exceeds target, $8M savings exceeds $5M Year 1 investment (positive ROI), but mobile delay was a real failure. Addresses the failure directly: root cause (mobile was deprioritized in the roadmap, now corrected with cross-platform planning process), corrective action (mobile parity is #1 Year 2 priority). Year 2 plan: mobile parity, accessibility compliance, M&A integration playbook. Makes the case for continued investment: Year 1 proved the model works, Year 2 is about scaling the returns. Board-appropriate language and format"
    weight: 0.35
    description: "BoardReview"
  - type: llm_judge
    criteria: "Response designs the acquisition integration and W3C decision — Angular acquisition strategy: shared design token layer (framework-agnostic) as immediate bridge, parallel component libraries during transition, 18-month migration plan with realistic phasing. W3C decision: recommends accepting (benefits: industry influence, hiring brand, early access to standards, company positions itself as leader) with guardrails (limit time commitment, company retains IP, align with company roadmap). Both decisions documented with clear rationale and risk analysis"
    weight: 0.35
    description: "AcquisitionAndStandards"
  - type: llm_judge
    criteria: "Response addresses the team crisis with empathy and action — immediate actions: 1:1s with remaining team to understand concerns, retention packages for critical roles, public recognition of DS team's impact. Structural changes: make DS team more visible (internal case studies showing DS impact on product launches, DS team presents at product all-hands), career growth opportunities (conference speaking, open-source visibility, industry working group participation), and organizational positioning (DS team reports to CTO, not buried under a product team). Demonstrates that all four challenges are connected: the board investment enables team growth, the W3C role provides career prestige, the acquisition creates new opportunities"
    weight: 0.30
    description: "TeamCrisis"
