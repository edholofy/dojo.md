meta:
  id: design-system-maturity-model
  level: 5
  course: design-system-documentation
  type: output
  description: "Design system maturity model — create a comprehensive maturity assessment framework for evaluating and advancing design system programs"
  tags: [maturity-model, assessment, benchmarking, advancement, master]

state: {}

trigger: |
  You're a design system consultant hired by 3 different
  companies to assess their design system maturity:

  Company A (Startup, 50 engineers):
  - Figma component library, no code components
  - One designer maintaining it part-time
  - No documentation beyond Figma file annotations
  - Used by 3 of 5 product teams

  Company B (Mid-size, 300 engineers):
  - React component library with Storybook
  - 4-person team (2 designers, 2 engineers)
  - Documentation exists but is outdated
  - 50% adoption, governance is informal

  Company C (Enterprise, 2000 engineers):
  - Multi-platform system (Web, iOS, Android)
  - 15-person team with PM and tech writer
  - Comprehensive documentation but no metrics
  - 70% adoption, formal governance, struggling with scale

  Each company asks: "How mature is our design system, and
  what should we focus on next?"

  Task: Create a design system maturity model and assess
  each company against it.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive maturity model — 5 maturity levels across key dimensions: Components (ad-hoc → library → documented → governed → optimized), Documentation (none → basic → comprehensive → living → AI-augmented), Governance (none → informal → defined → measured → strategic), Adoption (organic → encouraged → tracked → incentivized → universal), Team (part-time → dedicated → cross-functional → program → center of excellence), Technology (design-only → design+code → multi-platform → automated → intelligent). Each level has clear, testable criteria. The model is practical, not academic — usable by teams to self-assess"
    weight: 0.35
    description: "MaturityModel"
  - type: llm_judge
    criteria: "Response assesses each company accurately — Company A: Level 1-2 (design-only, part-time, no code components, limited adoption — focus on: hire a dedicated person, create code components for top 10 most-used Figma components, write getting started guide). Company B: Level 2-3 (code library exists, small team, outdated docs, informal governance — focus on: update documentation, establish governance process, implement adoption tracking, hire a tech writer). Company C: Level 3-4 (multi-platform, comprehensive docs, formal governance, but no metrics — focus on: implement metrics dashboard, scale governance for 2000 engineers, address documentation freshness, establish DS as strategic platform). Each assessment includes top 3 priorities with rationale"
    weight: 0.35
    description: "CompanyAssessments"
  - type: llm_judge
    criteria: "Response provides advancement guidance — for each maturity level, specific actions to advance to the next level (Level 2→3: add code components, write documentation, formalize governance. Level 3→4: implement metrics, automate documentation, establish contribution model, measure ROI). Includes common anti-patterns that block advancement (skipping documentation to ship faster, over-governing too early, building too many components before proving value), benchmarks from industry leaders (what Level 5 looks like: Material Design, Carbon), and a self-assessment worksheet teams can use independently"
    weight: 0.30
    description: "AdvancementGuidance"
