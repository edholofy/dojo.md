meta:
  id: ai-augmented-design-system
  level: 5
  course: design-system-documentation
  type: output
  description: "AI-augmented design system — design the strategy and documentation for integrating AI capabilities into the design system for automated design, code generation, and documentation"
  tags: [AI, automation, code-generation, future, master]

state: {}

trigger: |
  The CTO presents a vision: "In 3 years, designers should
  be able to describe a feature in natural language and the
  design system generates a production-ready UI. Engineers
  should get auto-generated component implementations from
  design files. Documentation should write itself."

  Current AI capabilities you're evaluating:
  1. Design-to-code: AI converts Figma designs into code
     using design system components (v0, Locofy, Anima)
  2. Natural language to UI: "Create a user profile page with
     avatar, bio, and settings" → generated layout using DS
     components
  3. Documentation generation: AI writes usage guidelines,
     code examples, and accessibility specs from component
     source code
  4. Design review: AI reviews designs for DS compliance
     (correct tokens, proper component usage, accessibility)
  5. Component suggestion: AI recommends which DS components
     to use for a given design pattern

  Task: Design the AI integration strategy for the design
  system, including what to build, what to buy, and how to
  document AI-assisted workflows.

assertions:
  - type: llm_judge
    criteria: "Response creates a phased AI integration strategy — Phase 1 (Now, low risk): AI-powered documentation (auto-generate props tables from TypeScript, suggest code examples, write accessibility specs from ARIA attributes), design review bot (check Figma designs against DS tokens and components, flag inconsistencies). Phase 2 (6-12 months, medium risk): design-to-code with DS components (ensure generated code uses DS components not arbitrary HTML), component suggestion engine (given a wireframe, recommend DS components). Phase 3 (12-24 months, high risk): natural language to UI (constrained generation using only DS components), predictive component creation (analytics suggest what components to build next). Each phase has: build vs buy recommendation, quality assurance approach, and success criteria"
    weight: 0.35
    description: "AIIntegrationStrategy"
  - type: llm_judge
    criteria: "Response documents AI-assisted workflows — how to document the design system FOR AI consumption (structured metadata, component relationships, usage context that helps AI make better suggestions), how to document AI features FOR users (prompt engineering guides for NL-to-UI, quality expectations and limitations, how to review and edit AI-generated output), and how AI changes the documentation itself (AI-generated docs need human review, version control for AI-edited content, attribution for AI vs human content). Addresses the 'documentation writes itself' claim realistically: what AI can generate well (API references, code examples) vs what needs human input (design rationale, usage guidelines, do/don't)"
    weight: 0.35
    description: "AIWorkflowDocumentation"
  - type: llm_judge
    criteria: "Response addresses quality, risks, and governance — quality assurance for AI-generated output (AI generates code that compiles but may not follow best practices, accessibility compliance checking for AI-generated UIs, visual regression testing against expected output), risks (AI hallucinating non-existent components, generating inaccessible markup, creating inconsistent patterns, vendor lock-in on AI tools), and governance (who reviews AI-generated code before production, how to maintain the human design review as a quality gate, ethical considerations around AI-generated design replacing junior designer work). Provides a realistic timeline vs the CTO's ambitious vision"
    weight: 0.30
    description: "QualityRisksGovernance"
