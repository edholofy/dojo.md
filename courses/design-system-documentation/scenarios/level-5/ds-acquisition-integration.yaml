meta:
  id: ds-acquisition-integration
  level: 5
  course: design-system-documentation
  type: output
  description: "Design system acquisition integration — lead design system strategy during M&A including due diligence, integration planning, and multi-system unification"
  tags: [M&A, acquisition, integration, due-diligence, master]

state: {}

trigger: |
  Your company is acquiring a competitor. You're the design
  system lead asked to participate in due diligence and plan
  the integration. Assessment:

  Your company (Acquirer):
  - Mature design system: 150 components, 85% adoption
  - React-based, Web and iOS
  - Design tokens using W3C format
  - 12-person team, comprehensive documentation

  Acquired company (Target):
  - Emerging design system: 40 components, 30% adoption
  - Vue-based, Web only
  - No design tokens (hardcoded values)
  - 2-person team, minimal documentation
  - BUT: superior data visualization components (charts,
    graphs, dashboards) that your system lacks
  - 3M users who love the product's visual identity

  Integration options:
  A) Full migration to acquirer's system (fastest, but loses
     target's strengths)
  B) Keep both systems (no disruption, but permanent cost)
  C) Best-of-both merge (best quality, hardest to execute)

  Task: Design the design system integration strategy
  including due diligence assessment, integration plan, and
  documentation approach.

assertions:
  - type: llm_judge
    criteria: "Response conducts thorough due diligence — technical assessment of the target's system (component quality audit, code architecture review, accessibility compliance, performance benchmarks, technical debt inventory), value assessment (which target components are superior and worth preserving: data viz, which are redundant, which are below standard), people assessment (target's 2-person team capabilities and retention risk), user impact assessment (3M users' emotional attachment to the visual identity, migration risk to user retention). Recommends integration option with clear rationale (likely Option C with specific scope: migrate target to acquirer's foundation but adopt target's data viz components)"
    weight: 0.35
    description: "DueDiligence"
  - type: llm_judge
    criteria: "Response designs a detailed integration plan — Phase 1 (months 1-3): establish shared design tokens (extract target's hardcoded values into token format, map to acquirer's token architecture), keep target's product running on existing system. Phase 2 (months 4-9): port target's data viz components to acquirer's system (React rewrite, token integration, documentation), begin migrating target's basic components to acquirer's equivalents. Phase 3 (months 10-18): complete migration, unified documentation site, deprecate target's standalone system. Each phase has: deliverables, team allocation, risk mitigation, and user communication plan. Addresses the Vue→React migration specifically"
    weight: 0.35
    description: "IntegrationPlan"
  - type: llm_judge
    criteria: "Response addresses documentation and people strategy — documentation integration (how to document the merged system: single docs site with migration guides, component mapping tables showing target→acquirer equivalents, data viz components documented as first-class additions to the acquirer's system), team integration (retaining target's 2-person team with clear roles in the combined team, knowledge transfer for data viz domain expertise), and user transition (gradual visual identity evolution so 3M target users don't feel their product was destroyed, communication plan explaining improvements not just changes). Includes success metrics for the integration"
    weight: 0.30
    description: "DocumentationAndPeople"
