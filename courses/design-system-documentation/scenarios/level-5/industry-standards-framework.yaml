meta:
  id: industry-standards-framework
  level: 5
  course: design-system-documentation
  type: output
  description: "Industry standards framework — develop documentation standards that align with or contribute to industry-wide design system standards"
  tags: [standards, W3C, interoperability, industry, master]

state: {}

trigger: |
  You're a design system thought leader invited to contribute
  to an industry working group on "Design System Interoperability
  Standards." The W3C Design Tokens Community Group has published
  a draft specification for design tokens, and the working group
  wants to extend this to component documentation.

  The challenge: every design system documents components
  differently. Material Design, Carbon, Polaris, and Atlassian
  all have different formats for:
  - Component props/API
  - Usage guidelines
  - Accessibility specifications
  - Code examples
  - Visual specifications

  This makes it impossible to:
  - Migrate between design systems
  - Create universal design tools that work with any system
  - Benchmark design systems against each other
  - Train AI models on design system documentation

  The working group asks: "What would a component documentation
  standard look like? Is standardization even desirable?"

  Task: Propose a component documentation standard and address
  the benefits, challenges, and implications of standardization.

assertions:
  - type: llm_judge
    criteria: "Response proposes a thoughtful documentation standard — structured component documentation format: component metadata (name, category, status, version), API specification (props with types and descriptions in a machine-readable format), accessibility specification (WCAG criteria mapping, keyboard interaction table, ARIA requirements), usage guidelines (structured when-to-use/when-not-to-use format), and visual specification (design token references, state definitions). Distinguishes between standardizable aspects (API format, accessibility specs, token references) and non-standardizable aspects (voice and tone, subjective design guidance). Proposes a schema (JSON Schema or similar) that tools can validate against"
    weight: 0.35
    description: "StandardProposal"
  - type: llm_judge
    criteria: "Response analyzes benefits and challenges of standardization — benefits: tooling ecosystem (universal Figma plugins, IDE integrations, linters), migration capability (switch design systems with automated prop mapping), quality benchmarking (compare accessibility coverage, documentation completeness across systems), AI training (structured data for design system copilots). Challenges: flexibility vs rigidity (standards can stifle innovation), adoption burden (existing systems must retrofit), cultural differences (what's 'good documentation' differs by organization), maintenance (who governs the standard as the industry evolves). Provides a balanced perspective, not just advocacy"
    weight: 0.35
    description: "BenefitsAndChallenges"
  - type: llm_judge
    criteria: "Response addresses the practical path to standardization — phased approach (start with machine-readable metadata and API specs, later add accessibility and usage guidelines), backward compatibility (standard as an export format, not a replacement for existing docs), governance model (who maintains the standard: W3C working group, open-source foundation, or industry consortium), tooling to lower adoption barrier (converters from existing formats, validators, documentation generators), and real-world validation (pilot with 3-5 major design systems before finalizing). References the W3C Design Tokens spec as a model for process"
    weight: 0.30
    description: "PracticalPath"
