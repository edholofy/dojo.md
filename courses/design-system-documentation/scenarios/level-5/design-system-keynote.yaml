meta:
  id: design-system-keynote
  level: 5
  course: design-system-documentation
  type: output
  description: "Design system keynote — design a thought leadership keynote about the future of design systems for a major industry conference"
  tags: [keynote, thought-leadership, conference, future, master]

state: {}

trigger: |
  You've been invited to deliver the opening keynote at
  "DesignSystems Conference 2027" to an audience of 1,500
  design system practitioners, leaders, and executives.

  The conference theme: "Design Systems at the Crossroads"

  The organizer says: "The community is at an inflection
  point. AI is changing everything. Some companies are
  cutting design system teams because 'AI can generate UI
  now.' Others are doubling down. Teams are questioning
  whether design systems are still relevant in an AI-first
  world. We need a keynote that addresses the elephant in
  the room and charts a path forward."

  Context:
  - AI code generation tools (Copilot, v0) can now generate
    component code from descriptions
  - Some companies report 40% reduction in UI development
    time using AI
  - Design system teams are being restructured or reduced
  - New role emerging: "Design System AI Engineer"
  - Open question: does AI make design systems more or less
    important?

  Task: Design the 45-minute keynote including thesis,
  narrative arc, supporting arguments, and actionable
  takeaways.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling keynote with a clear, provocative thesis — central argument (e.g., 'AI doesn't replace design systems — it makes them the most important infrastructure investment your company will make, because AI-generated UIs are only as good as the system they're constrained to'), narrative arc (opening with the fear → reframing the problem → evidence for the thesis → vision for the future → call to action), and 3-4 supporting arguments with real examples. The thesis is specific and debatable, not a generic 'embrace change.' Structured for 45 minutes with timing notes"
    weight: 0.35
    description: "KeynoteDesign"
  - type: llm_judge
    criteria: "Response addresses the AI question substantively — analyzes what AI changes (code generation speed, design exploration breadth, documentation automation, accessibility checking) and what it doesn't change (design decisions need human judgment, brand consistency needs governance, component quality needs testing, accessibility needs expertise, cross-platform needs architecture). Makes the case: without design systems, AI generates inconsistent, inaccessible, unmaintainable UIs; with design systems, AI generates constrained, consistent, high-quality UIs faster. The design system becomes the 'constitution' that AI operates within"
    weight: 0.35
    description: "AIAnalysis"
  - type: llm_judge
    criteria: "Response provides actionable takeaways for the audience — specific actions practitioners can take: how to position design systems for the AI era (documentation as AI training data, tokens as constraints, components as generation targets), new skills to develop (AI prompt engineering for design, data literacy for metrics, systems thinking), organizational arguments to make (design systems are MORE important with AI, not less — they're the quality control layer), and community-building recommendations (open standards for AI-compatible design systems, shared tooling, knowledge sharing). Addresses the emotional dimension: practitioners worried about their careers need both honesty and empowerment"
    weight: 0.30
    description: "ActionableTakeaways"
