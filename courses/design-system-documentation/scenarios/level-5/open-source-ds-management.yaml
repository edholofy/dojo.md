meta:
  id: open-source-ds-management
  level: 5
  course: design-system-documentation
  type: output
  description: "Open-source design system management — design the documentation, governance, and community strategy for publishing a design system as open source"
  tags: [open-source, community, governance, publishing, master]

state: {}

trigger: |
  Your company's CEO says: "Our design system is best-in-class.
  Let's open-source it. It'll be great for hiring, brand
  positioning, and giving back to the community."

  You're the design system lead tasked with making this happen.
  Considerations:

  - Current system is deeply integrated with proprietary
    tooling, internal APIs, and company-specific patterns
  - Documentation references internal Figma files, Slack
    channels, and internal wikis
  - No external contribution process exists
  - Legal needs to review for proprietary code and license
  - The team (12 people) already struggles with internal
    support — adding external users multiplies demand
  - Competitors could use your system to build competing
    products faster

  Successful precedents: IBM Carbon, Shopify Polaris,
  Atlassian Design System, GitHub Primer.

  Task: Design the strategy for open-sourcing the design
  system including documentation, governance, community
  management, and risk mitigation.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive open-source documentation strategy — public documentation requirements (remove all internal references, replace Figma file links with public examples, create self-contained getting started guide, add license headers, write CONTRIBUTING.md, CODE_OF_CONDUCT.md, SECURITY.md), documentation restructure (internal docs remain for company-specific patterns, public docs cover the reusable system), external-facing content (README with clear value proposition, live demo site, interactive examples, framework-specific guides). Addresses the gap between internal documentation (references proprietary tools) and external documentation (must be self-sufficient)"
    weight: 0.35
    description: "DocumentationStrategy"
  - type: llm_judge
    criteria: "Response creates governance and community models — governance structure (maintainer team, contributor levels: first-time contributor → contributor → committer → maintainer, decision-making process for accepting contributions, RFC process for major changes), community management (GitHub issue templates, PR review SLA for external contributions, public roadmap, community Slack/Discord, regular release notes), and sustainability plan (how 12-person team handles external demand: dedicated community rotation, community office hours, clear scope boundaries for what the team will/won't support externally). References lessons from Carbon, Polaris, or Primer"
    weight: 0.35
    description: "GovernanceCommunity"
  - type: llm_judge
    criteria: "Response addresses risks and strategic considerations — competitive risk mitigation (differentiation comes from product strategy not UI components, open-sourcing builds goodwill), legal requirements (license choice: MIT for maximum adoption vs Apache 2.0 for patent protection, proprietary code audit, trademark guidelines for the DS name), team capacity management (budgeting community time, preventing burnout, when to say no), success metrics (GitHub stars, npm downloads, external contributions, job applications citing the DS, conference talks, community growth), and phased launch plan (soft launch with select partners, then public announcement with documentation polish, then community building)"
    weight: 0.30
    description: "RisksAndStrategy"
