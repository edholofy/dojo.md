meta:
  id: executive-communication
  level: 5
  course: design-system-documentation
  type: output
  description: "Executive communication — create executive-level communication materials for design system investment, progress, and strategic value"
  tags: [executive, communication, board, investment, master]

state: {}

trigger: |
  You're the design system program lead preparing for 3
  executive communications this quarter:

  1. BOARD PRESENTATION (15 minutes): The board wants to
  understand why the company spends $5M/year on a "component
  library." Most board members are finance and operations
  executives with no design or engineering background.

  2. CTO QUARTERLY REVIEW (30 minutes): Show progress on
  the design system roadmap, address the failed iOS launch
  (components weren't ready for the mobile team's deadline),
  and request budget for 3 new headcount.

  3. ALL-HANDS ANNOUNCEMENT (5 minutes): Announce the design
  system's v5.0 major release to 2,000 employees. Make it
  relevant to people who've never heard of the design system.

  Each audience needs completely different framing, detail
  level, and language.

  Task: Create the communication strategy and key content
  for all three executive communications.

assertions:
  - type: llm_judge
    criteria: "Response creates the board presentation — translates design system value into business language: not 'reusable components' but 'engineering productivity infrastructure that reduces time-to-market by X%', not 'design consistency' but 'brand quality assurance at scale', not 'accessibility compliance' but 'regulatory risk mitigation.' Includes: one-slide visual showing the concept (building blocks → products), ROI slide (investment vs. measured returns), competitive context (what peers invest), and forward-looking slide (how DS supports company strategy). No jargon. Anticipates board questions: 'Why can't AI do this?' 'Can we outsource?' 'What's the risk if we cut investment?'"
    weight: 0.35
    description: "BoardPresentation"
  - type: llm_judge
    criteria: "Response handles the CTO review with transparency and strategy — progress report (roadmap items completed, adoption metrics, quality improvements), honest assessment of the iOS failure (root cause: mobile components weren't prioritized because roadmap was web-centric, what's being done: cross-platform planning process, mobile-first component development for next quarter), headcount request (specific roles needed, business case for each: mobile engineer for cross-platform parity, accessibility specialist for compliance deadline, documentation lead for scaling documentation quality). Demonstrates accountability without deflecting blame"
    weight: 0.35
    description: "CTOReview"
  - type: llm_judge
    criteria: "Response creates an engaging all-hands announcement — makes the design system relevant to non-technical employees: 'You know how our product looks and feels consistent whether you're on web or mobile? That's the design system.' Highlights v5.0 changes in terms of user/employee impact, not technical details. Celebrates the team's work. Makes it memorable (a single key message, a compelling visual or demo, a relatable analogy). All 3 communications are clearly differentiated in tone, depth, and framing while maintaining consistent core messaging"
    weight: 0.30
    description: "AllHandsAnnouncement"
