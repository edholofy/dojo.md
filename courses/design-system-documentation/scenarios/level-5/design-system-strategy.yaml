meta:
  id: design-system-strategy
  level: 5
  course: design-system-documentation
  type: output
  description: "Design system strategy — develop a 3-5 year strategic vision for a design system including investment case, maturity roadmap, and organizational positioning"
  tags: [strategy, vision, investment, maturity, master]

state: {}

trigger: |
  You're the VP of Design Systems at a Fortune 500 company
  ($8B revenue, 3,000 engineers, 500 designers). The CEO has
  asked you to present a "3-year design system strategy" to
  the executive leadership team.

  Current state:
  - Design system exists for 4 years, 150 components
  - 60% adoption across 20 product teams
  - Team of 12 (4 designers, 6 engineers, 1 PM, 1 tech writer)
  - Annual budget: $3.2M
  - Recognized internally but seen as a "nice to have" not
    a strategic asset
  - Competitors are using design systems to ship 2x faster

  Board context:
  - Company is losing market share to more agile competitors
  - Digital transformation initiative underway
  - M&A activity expected (2-3 acquisitions in next 3 years)
  - Regulatory pressure for accessibility compliance

  Task: Develop the 3-year design system strategy with
  investment case, maturity roadmap, and executive
  presentation.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling 3-year strategic vision — Year 1 ('Foundation to Excellence'): achieve 85% adoption, accessibility compliance across all components, establish metrics dashboard, document governance model. Year 2 ('Platform for Scale'): M&A integration playbook, multi-brand theming architecture, developer experience automation, cross-platform parity. Year 3 ('Strategic Differentiator'): AI-augmented design system, predictive component analytics, industry-leading open-source contribution, design system as competitive advantage. Each year has: strategic themes, key initiatives, investment requirements, and measurable outcomes. The vision connects design system maturity to business velocity"
    weight: 0.35
    description: "StrategicVision"
  - type: llm_judge
    criteria: "Response builds a rigorous investment case — current ROI calculation (engineering hours saved: 150 components × average 40 uses × 4 hours saved = X hours × loaded cost = $Y, design consistency: reduced QA cycles × cost, onboarding: faster ramp-up × new hire cost), projected ROI at 85% adoption (additional savings from 60→85%), M&A integration savings (each acquisition saves $Z in integration costs by using the design system as the target platform), and competitive analysis (competitors shipping 2x faster, quantified impact of slower time-to-market). Investment ask: team expansion from 12 to 20 over 3 years, with phased business case for each hire"
    weight: 0.35
    description: "InvestmentCase"
  - type: llm_judge
    criteria: "Response addresses organizational positioning and executive communication — repositions the design system from 'nice to have' to 'strategic infrastructure' (analogous to CI/CD pipeline or cloud platform — nobody questions investing in AWS), maturity model showing current state vs. target state vs. industry leaders, risk analysis (what happens if we don't invest: growing tech debt, slower feature delivery, accessibility lawsuits, M&A integration failures), and executive presentation structure (15-minute version with clear ask, detailed appendix for deep-dive questions). Anticipates executive questions: 'Why can't AI replace this?', 'Why not outsource?', 'What if we just mandate it?'"
    weight: 0.30
    description: "ExecutivePositioning"
