meta:
  id: accessibility-at-scale-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Accessibility at scale documentation — document an enterprise-level accessibility program integrated into the design system"
  tags: [accessibility, WCAG, enterprise, compliance, scale, expert]

state: {}

trigger: |
  Your company faces a regulatory deadline: all digital
  products must comply with WCAG 2.2 AA within 12 months
  (European Accessibility Act). Current state:

  - Design system has basic accessibility (keyboard nav,
    ARIA labels) but no systematic documentation
  - 6 product teams with varying accessibility knowledge
  - Last audit found 200+ issues across all products
  - No accessibility testing in CI/CD
  - Accessibility documentation is scattered: some in
    component docs, some in a separate wiki, some nowhere
  - Teams don't know which WCAG criteria apply to which
    component patterns

  The Head of Engineering says: "The design system should be
  the foundation for accessibility compliance. If teams use
  DS components correctly, they should be mostly WCAG
  compliant. Document how."

  Task: Design and document an accessibility program that
  uses the design system as the compliance foundation.

assertions:
  - type: llm_judge
    criteria: "Response documents accessibility by design system layer — foundation layer (color contrast tokens guaranteed AA compliant, typography scale meeting minimum size, spacing ensuring touch targets, motion respecting prefers-reduced-motion), component layer (each component's WCAG compliance: which criteria it satisfies when used correctly, keyboard interaction spec, screen reader behavior, ARIA attributes required, focus management), pattern layer (composite accessibility: focus flow through forms, error announcement in live regions, modal focus trapping), and product layer (what teams must still handle: content accessibility, reading order, page structure, alt text). Maps each DS element to specific WCAG 2.2 success criteria"
    weight: 0.35
    description: "AccessibilityByLayer"
  - type: llm_judge
    criteria: "Response creates a WCAG compliance matrix — maps WCAG 2.2 AA success criteria to design system elements: which criteria the DS handles automatically (1.4.3 Contrast — guaranteed by tokens, 2.1.1 Keyboard — handled by component), which criteria the DS supports but teams must implement correctly (1.1.1 Non-text Content — components have alt text props but teams must provide values, 2.4.6 Headings — heading component exists but teams must use correct hierarchy), and which criteria are outside DS scope (1.2.1 Audio/Video — media content, 3.1.1 Language — page-level). This matrix tells teams exactly what the DS covers and what they're responsible for"
    weight: 0.35
    description: "ComplianceMatrix"
  - type: llm_judge
    criteria: "Response addresses testing, training, and the 12-month deadline — automated accessibility testing integration (axe-core in CI, Storybook a11y addon, component-level accessibility tests), accessibility documentation format (each component page has an 'Accessibility' section with: supported WCAG criteria, keyboard spec, screen reader behavior, testing instructions), training program for 6 product teams (accessibility fundamentals workshop, DS accessibility features walkthrough, self-audit checklist), and prioritized remediation plan for the 200+ existing issues (categorized by DS-fixable vs product-team-fixable, severity-ordered). Realistic timeline for the 12-month deadline"
    weight: 0.30
    description: "TestingTraining"
