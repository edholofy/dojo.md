meta:
  id: design-system-roadmap-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Design system roadmap documentation — create and communicate a strategic design system roadmap that aligns with product and business objectives"
  tags: [roadmap, strategy, planning, alignment, expert]

state: {}

trigger: |
  You're the design system lead presenting your annual roadmap
  to the VP of Product and VP of Engineering. They say:

  "Last year's roadmap was a list of components to build. This
  year, I need to see how the design system roadmap connects
  to our business priorities:

  1. International expansion (5 new markets, 3 new languages)
  2. Accessibility compliance (European Accessibility Act
     deadline in 14 months)
  3. Platform consolidation (merging 2 acquired products into
     one platform)
  4. Developer velocity (goal: 30% faster feature delivery)
  5. Brand refresh (new visual identity rolling out Q3)

  Show me how the design system supports each of these, and
  give me a prioritized quarterly plan."

  Task: Create a strategic design system roadmap that maps
  to business objectives and present it with clear
  prioritization.

assertions:
  - type: llm_judge
    criteria: "Response creates a business-aligned roadmap — maps each DS initiative to a business priority: internationalization (i18n token architecture, RTL component support, string externalization), accessibility (WCAG 2.2 AA compliance for all components, accessibility testing automation, documentation), platform consolidation (component parity audit, migration guides, unified token system for merged products), developer velocity (documentation improvements, code generation tooling, reduced component API surface), brand refresh (new token architecture for rebrand, component reskin, migration guides). Each initiative has: business objective it supports, deliverables, dependencies, and success metrics"
    weight: 0.35
    description: "BusinessAlignedRoadmap"
  - type: llm_judge
    criteria: "Response provides prioritized quarterly planning — Q1-Q4 breakdown with rationale: highest-urgency items first (accessibility for compliance deadline, i18n for expansion timeline), strategic sequencing (token architecture before brand refresh, component audit before consolidation), and parallel workstreams (accessibility and i18n can run concurrently, brand refresh depends on new token architecture). Each quarter has: 2-3 major initiatives, capacity allocation (% of team time), key milestones, and risk factors. Includes trade-offs: 'If we prioritize accessibility, the brand refresh shifts to Q3'"
    weight: 0.35
    description: "QuarterlyPlan"
  - type: llm_judge
    criteria: "Response documents the roadmap in an executive-friendly format — one-page visual roadmap (swimlanes by business priority, timeline by quarter, dependency arrows), accompanying detail document (initiative briefs with scope, resources, success criteria), communication plan (how the roadmap is shared with product teams, how it's updated quarterly, how teams can request additions), and progress tracking (quarterly review format, milestone reporting, risk escalation). Addresses the 'list of components' problem: roadmap speaks in outcomes not outputs"
    weight: 0.30
    description: "RoadmapPresentation"
