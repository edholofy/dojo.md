meta:
  id: organizational-change-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Organizational change documentation — create documentation and communication strategies for driving design system adoption across a resistant organization"
  tags: [change-management, adoption, resistance, communication, expert]

state: {}

trigger: |
  You're the design system lead at a company where adoption
  is stalled at 40% after 2 years. Investigation reveals:

  - Resistance from senior engineers: "I can build it faster
    than learning your component API"
  - Resistance from designers: "The components don't match
    our design vision for this product"
  - Product teams bypass the system: they use DS components
    for basic UI but build custom components for anything
    complex
  - Documentation is comprehensive but nobody reads it:
    Storybook analytics show 20% of pages have 0 views
  - New hires adopt quickly but existing employees resist
    change
  - No executive mandate: adoption is "encouraged" not
    "required"

  The VP of Engineering says: "I don't want to mandate it.
  Make it so good that people choose to use it."

  Task: Create a documentation and communication strategy
  that drives organic adoption from 40% to 80%.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-channel adoption strategy — targeted documentation improvements: reduce friction (one-click code examples, framework-specific guides, migration codemods for teams on custom components), address specific resistance (senior engineers: performance benchmarks showing DS components are faster/lighter, video walkthroughs showing complex use cases; designers: theming guide showing how to customize within the system, contribution path for missing components). Communication plan: launch campaign (internal blog posts, demo days, success stories from adopting teams), ongoing engagement (monthly DS newsletter, Slack channel with quick tips, office hours)"
    weight: 0.35
    description: "AdoptionStrategy"
  - type: llm_judge
    criteria: "Response addresses the documentation usability problem — why 20% of pages have 0 views (content audit to identify unused pages: are they needed? poorly discovered? poorly named?), documentation restructuring (move from reference-heavy to task-oriented: 'How do I build a form?' instead of 'Form component API'), search optimization (people search for problems not component names: 'date picker won't open' not 'DatePicker troubleshooting'), and documentation marketing (embed docs links in code comments, IDE autocomplete snippets that link to docs, onboarding buddy program that introduces docs). Creates measurable documentation goals"
    weight: 0.35
    description: "DocumentationUsability"
  - type: llm_judge
    criteria: "Response creates change management artifacts — adoption playbook for each team type (engineering-led teams: emphasize code quality and performance, design-led teams: emphasize customization and design system contribution, product-led teams: emphasize speed to market), success metrics for the 40%→80% goal (quarterly milestones, team-by-team tracking), incentive programs (DS champion recognition, team adoption leaderboard, case study features for teams that successfully migrated), and executive communication (monthly adoption dashboard showing progress, cost/quality impact of low adoption areas to build the case for eventual mandate if needed)"
    weight: 0.30
    description: "ChangeManagement"
