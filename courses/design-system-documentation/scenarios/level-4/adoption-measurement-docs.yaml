meta:
  id: adoption-measurement-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Adoption and measurement documentation — design comprehensive adoption tracking, impact measurement, and ROI reporting for design system stakeholders"
  tags: [adoption, measurement, ROI, stakeholders, reporting, expert]

state: {}

trigger: |
  You're the design system program manager. The CEO asks:
  "We've invested $2M in the design system over 3 years.
  What's the return? Show me data."

  Available data:
  - Component usage analytics (via bundle analysis)
  - Storybook page view metrics
  - Git commit data showing DS component imports
  - Quarterly developer satisfaction surveys
  - Support ticket data (internal DS support channel)
  - Product release velocity data (before and after DS adoption)
  - Design QA defect rates
  - Time-to-onboard for new engineers

  Missing data:
  - Direct revenue attribution (can't link DS usage to revenue)
  - Designer productivity metrics (no baseline)
  - Exact cost of inconsistency (hard to quantify)

  Task: Build a comprehensive ROI report and design an ongoing
  measurement framework for the design system.

assertions:
  - type: llm_judge
    criteria: "Response builds a compelling ROI case from available data — quantifies savings: engineer time saved per component (industry benchmark × number of component instances × hourly rate), reduced QA cycles (defect rate reduction × QA cost), faster onboarding (weeks saved × fully-loaded new-hire cost), reduced support tickets (ticket reduction × cost per ticket). Uses release velocity data as productivity evidence (X% faster feature delivery). Calculates total estimated value vs. $2M investment. Presents in executive-friendly format with a clear ROI ratio and payback period. Acknowledges estimation methodology honestly"
    weight: 0.35
    description: "ROIReport"
  - type: llm_judge
    criteria: "Response designs an ongoing measurement framework — metric categories: Adoption (component coverage %, team-by-team adoption, time-to-adopt new components), Quality (design consistency score, accessibility pass rate, production bugs related to UI), Efficiency (feature delivery time, design-to-code handoff time, component reuse rate), Satisfaction (developer NPS for DS, designer NPS, quarterly survey trends). Each metric has: data source, measurement method, target, reporting frequency, and who cares about it (executive: ROI metrics, DS team: adoption metrics, product teams: efficiency metrics)"
    weight: 0.35
    description: "MeasurementFramework"
  - type: llm_judge
    criteria: "Response addresses the hard-to-measure areas — how to estimate designer productivity improvement (before/after time studies, project timeline comparison), how to approximate the cost of inconsistency (brand perception surveys, user confusion support tickets, rework time when different teams build the same thing), and how to connect DS usage to product quality without direct revenue attribution (correlation between DS adoption rate and product metrics like NPS, task completion rate, conversion). Includes a dashboard design showing the key metrics and a reporting cadence for different stakeholders"
    weight: 0.30
    description: "HardToMeasure"
