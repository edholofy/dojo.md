meta:
  id: documentation-automation
  level: 4
  course: design-system-documentation
  type: output
  description: "Documentation automation — design automated documentation generation pipelines that keep docs synchronized with code and design tools"
  tags: [automation, generation, CI-CD, synchronization, expert]

state: {}

trigger: |
  You're the design system tech lead. Documentation maintenance
  is consuming 30% of the team's time. Problems:

  - Props tables are manually written and frequently out of
    date (TypeScript types change, docs don't update)
  - Figma components and code components drift apart (designer
    adds a variant in Figma, nobody updates the code or docs)
  - Code examples in docs use outdated import paths
  - Changelog is manually written and often incomplete
  - Token documentation requires manual update when tokens
    are added or modified
  - The docs site build doesn't catch broken examples

  Task: Design a documentation automation pipeline that
  reduces manual documentation effort by 70% while improving
  accuracy.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive automation pipeline — auto-generated props tables (extract from TypeScript interfaces/types, including default values, descriptions from JSDoc comments, required/optional status), auto-generated token documentation (read token JSON/YAML files, generate color swatches, typography specimens, spacing visualizations automatically), auto-generated changelog (from conventional commit messages, categorized by component and change type), and code example testing (compile and render all code examples in CI, fail the build if examples have errors). Each automation has: input source, transformation process, output format, and trigger mechanism"
    weight: 0.35
    description: "AutomationPipeline"
  - type: llm_judge
    criteria: "Response addresses Figma-to-code synchronization — Figma component auditing (automated comparison of Figma component variants vs code component props to detect drift), Figma design token sync (token changes in Figma propagate to code via Tokens Studio or similar, triggering docs rebuild), documentation CI pipeline (on every component PR: rebuild affected doc pages, run visual regression on docs, verify props table matches code, check all links), and alerts for drift (automated notification when Figma and code are out of sync, report showing which components have documentation gaps)"
    weight: 0.35
    description: "SynchronizationAndCI"
  - type: llm_judge
    criteria: "Response balances automation with human-written content — what to automate (props tables, token lists, changelogs, code example validation, link checking, component status pages) vs what requires human writing (usage guidelines, do/don't examples, accessibility notes, pattern descriptions, getting started guides). Documentation workflow: automated sections are generated and committed, human sections are written alongside and preserved during regeneration. Estimates time savings with specific calculations (current 30% → target 10% with automation). Includes tooling recommendations and implementation roadmap"
    weight: 0.30
    description: "AutomationBalance"
