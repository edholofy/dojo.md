meta:
  id: team-operations-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Design system team operations documentation — document internal team processes, workflows, and standards for the design system team itself"
  tags: [team-operations, workflows, processes, internal, expert]

state: {}

trigger: |
  You're the design system lead managing a team of 8 (2
  designers, 4 engineers, 1 tech writer, 1 PM). Problems:

  - No documented process for how components go from request
    to release (everyone has a different understanding)
  - Component quality is inconsistent: some components have
    thorough docs, tests, and accessibility; others ship
    with minimal coverage
  - New team members take 3 months to become productive
    because tribal knowledge isn't documented
  - The team can't agree on priorities: some work on what's
    exciting, not what's needed
  - Release process is manual and error-prone: last release
    broke 2 product teams because a token was accidentally
    removed

  Task: Document the design system team's internal operations
  including component development workflow, quality standards,
  and release process.

assertions:
  - type: llm_judge
    criteria: "Response documents the component development workflow — end-to-end process: 1) Request intake (proposal template, evaluation against criteria), 2) Design phase (design spec, design review, Figma component with variants and states), 3) Engineering phase (component implementation, unit tests, visual regression tests, accessibility tests), 4) Documentation phase (API reference, usage guidelines, code examples, accessibility specs, Storybook stories), 5) Review phase (design review, code review, docs review, accessibility audit), 6) Release phase (changelog entry, version bump, publish, announcement). Each phase has: owner, deliverables, approval criteria, and estimated timeline"
    weight: 0.35
    description: "DevelopmentWorkflow"
  - type: llm_judge
    criteria: "Response creates a component quality definition — 'Definition of Done' checklist: design (Figma component with all variants, states, responsive behavior, dark mode), code (component implementation, TypeScript types, unit tests > 80% coverage, visual regression test, accessibility test, performance benchmark), documentation (overview, anatomy, props table, usage guidelines, do/don't, accessibility spec, code examples, Storybook stories), and review (design review sign-off, code review approval, accessibility audit pass, documentation review). Quality gate: components cannot be released without meeting all criteria. Addresses the current inconsistency"
    weight: 0.35
    description: "QualityStandards"
  - type: llm_judge
    criteria: "Response documents the release process and team onboarding — release process: pre-release checklist (all tests pass, changelog complete, migration guide for breaking changes, beta period for major changes), release steps (version bump, build, publish to registry, update docs site, announce in Slack/email), post-release (monitor for issues, support window for migration questions). Team onboarding guide: first week (setup, architecture overview, read key docs), first month (shadow a component lifecycle, make first small contribution), first quarter (own a component end-to-end). Addresses the broken release: what safeguards prevent accidental token removal"
    weight: 0.30
    description: "ReleaseAndOnboarding"
