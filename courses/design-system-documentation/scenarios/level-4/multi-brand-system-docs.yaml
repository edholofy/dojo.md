meta:
  id: multi-brand-system-docs
  level: 4
  course: design-system-documentation
  type: output
  description: "Multi-brand system documentation — document a design system that serves multiple brands with shared components but distinct visual identities"
  tags: [multi-brand, theming, white-label, visual-identity, expert]

state: {}

trigger: |
  You're the design system architect at a company with 4
  brands under one umbrella:

  - Brand A: Enterprise SaaS (blue, formal, data-dense)
  - Brand B: Consumer app (vibrant gradient, playful, spacious)
  - Brand C: Healthcare platform (green, trustworthy, accessible)
  - Brand D: White-label product sold to 30+ partner companies
    who apply their own branding

  All brands share the same component library but with
  different themes. Current documentation problems:

  - Docs show only Brand A's theme; other brands guess
  - Brand D partners have no documentation for theming
  - Some components behave differently per brand (Brand C
    requires larger touch targets for accessibility)
  - The token system documentation doesn't explain the
    multi-brand architecture
  - New team members don't understand the relationship
    between shared components and brand themes

  Task: Design documentation for a multi-brand design system
  that serves internal brands and external partners.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-brand documentation architecture — shared foundation documentation (components, patterns, accessibility standards that are identical across brands), brand-specific sections (theme tokens per brand with visual examples, brand-specific component variants, voice and content guidelines per brand), and partner documentation for Brand D (theming guide: how to create a custom theme, token customization reference, brand application checklist). Documentation structure: brand switcher on the docs site showing the same component rendered in each brand theme. Clearly separates what's shared (80%) from what's customized (20%)"
    weight: 0.35
    description: "MultiBrandArchitecture"
  - type: llm_judge
    criteria: "Response documents the theming system for multi-brand — token architecture showing how themes work (shared component → semantic tokens → brand-specific reference tokens), complete theme file documentation (which tokens are overridable, required vs optional tokens, default values), visual comparison of components across brands (same Button in Brand A blue formal vs Brand B vibrant playful vs Brand C green accessible), and Brand D theming guide (step-by-step: clone base theme, customize tokens, test against component test suite, validate accessibility). Addresses the Brand C accessibility requirement: how certain brands override default behaviors"
    weight: 0.35
    description: "ThemingDocumentation"
  - type: llm_judge
    criteria: "Response addresses documentation maintenance at scale — how to keep documentation current across 4+ brands without quadrupling effort (single-source component docs with brand theme preview, auto-generated brand-specific style guides from theme tokens), how to handle Brand D's 30+ partner variations (partner portal with self-service theming docs, FAQ for common customization requests), governance for brand-specific exceptions (when can a brand deviate from shared components, approval process), and onboarding new brands or partners (checklist for adding a new brand theme to the system)"
    weight: 0.30
    description: "MaintenanceAtScale"
