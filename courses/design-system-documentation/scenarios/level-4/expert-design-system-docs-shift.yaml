meta:
  id: expert-design-system-docs-shift
  level: 4
  course: design-system-documentation
  type: output
  description: "Expert design system docs shift — handle a week of expert-level documentation challenges including governance, multi-brand, and organizational adoption"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're the design system program lead. Your week:

  MONDAY — GOVERNANCE CRISIS: A VP overrode the design system
  team's decision to reject a component (a custom chart
  component that doesn't meet accessibility standards). They
  shipped it with the design system's namespace, confusing
  teams. You need to document guardrails that prevent this
  while respecting executive authority.

  TUESDAY — MULTI-BRAND EXPANSION: The company is acquiring
  a startup. Their product needs to adopt your design system
  but maintain its distinct visual identity as a sub-brand.
  You need to document how a new brand theme integrates into
  the multi-brand architecture.

  THURSDAY — METRICS REVIEW: The quarterly board meeting is
  Friday. You need to present design system ROI. Component
  adoption is at 65%, up from 40% a year ago. Developer
  surveys show 80% satisfaction. But the CFO wants dollar
  figures, not percentages.

  FRIDAY — TEAM SCALING: You're writing the job description
  for a "Design System Documentation Lead" — a new role that
  owns the entire documentation strategy. What skills,
  responsibilities, and success metrics should this role have?

  Task: Address all four challenges with expert-level
  documentation and strategy.

assertions:
  - type: llm_judge
    criteria: "Response handles the governance crisis diplomatically — documents an escalation path that respects executive authority while protecting system quality: VP override process (documented, requires written rationale, component clearly labeled as 'exception' not 'approved', accessibility risk acknowledged), post-override follow-up (accessibility remediation plan with deadline, component review at next governance meeting), and prevention (governance charter signed by VP-level stakeholders establishing quality standards as non-negotiable, executive education on why accessibility standards exist). The documentation is firm on standards while politically savvy"
    weight: 0.35
    description: "GovernanceCrisis"
  - type: llm_judge
    criteria: "Response creates practical multi-brand integration documentation and CFO-ready metrics — new brand onboarding guide: step-by-step process for adding a sub-brand (fork base theme tokens, customize brand colors/typography, validate against component test suite, accessibility check, documentation generation). ROI presentation: translates 65% adoption into dollars (N components × usage instances × estimated build hours saved × hourly rate = $X saved; reduced QA defects × cost per defect = $Y saved; faster onboarding × fully-loaded cost = $Z saved). Presents payback period and projected value at 80% and 100% adoption"
    weight: 0.35
    description: "BrandAndMetrics"
  - type: llm_judge
    criteria: "Response writes a compelling Documentation Lead job description — role definition (owns documentation strategy, quality, and tooling; bridges design, engineering, and content), key responsibilities (documentation architecture, content standards, automation pipeline, user research for docs, analytics and optimization, team mentoring), required skills (technical writing, front-end development understanding, information architecture, design systems knowledge, analytics, stakeholder management), success metrics (documentation coverage %, docs NPS score, time-to-find-answer, documentation-related support tickets, content freshness score). Positions the role as strategic, not just 'writing docs'"
    weight: 0.30
    description: "DocumentationLeadRole"
