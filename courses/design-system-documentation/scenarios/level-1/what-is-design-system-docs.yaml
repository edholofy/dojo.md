meta:
  id: what-is-design-system-docs
  level: 1
  course: design-system-documentation
  type: output
  description: "What is design system documentation — understand the purpose, audience, and structure of design system documentation"
  tags: [fundamentals, introduction, purpose, beginner]

state: {}

trigger: |
  A junior designer asks: "Our team has a Figma library with
  components and some color variables, but no documentation.
  My lead says we need 'design system documentation.' What
  exactly is that? Isn't the Figma file itself the documentation?
  What should I be documenting and who is it for?"

  Task: Explain what design system documentation is, why it
  matters beyond the Figma file, and outline what it typically
  includes.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains what design system documentation is and why Figma alone isn't enough — documentation captures the 'why' and 'how' that visual files can't: when to use a component vs. an alternative, accessibility requirements, interaction behaviors, content guidelines, and code implementation details. Explains the different audiences: designers (usage guidelines, do/don't examples), developers (props/API, code snippets, accessibility attributes), product managers (pattern rationale, UX principles), and content writers (copy patterns, voice guidelines)"
    weight: 0.35
    description: "WhatAndWhy"
  - type: llm_judge
    criteria: "Response outlines the typical structure of design system documentation — foundations (color, typography, spacing, icons, motion), components (buttons, inputs, modals, cards, navigation), patterns (forms, data display, empty states, error handling), guidelines (accessibility, content, responsive design, internationalization), and getting started (installation, usage, contribution). Explains the difference between reference documentation (API specs) and guidance documentation (when and how to use)"
    weight: 0.35
    description: "DocumentationStructure"
  - type: llm_judge
    criteria: "Response provides practical examples that make the concept concrete — shows what a well-documented component looks like vs. an undocumented one (e.g., a Button component: just the Figma layer vs. documentation with variants, sizes, states, accessibility labels, do/don't usage examples, code snippet). Mentions real-world design systems as examples (Material Design, Polaris, Carbon, Atlassian) without requiring the reader to know them. Explains the business value: reduced design/dev time, consistency, fewer questions in Slack"
    weight: 0.30
    description: "PracticalExamples"
