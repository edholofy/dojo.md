meta:
  id: getting-started-guide
  level: 1
  course: design-system-documentation
  type: output
  description: "Getting started guide — write an onboarding guide that helps new team members start using the design system quickly"
  tags: [onboarding, getting-started, setup, beginner]

state: {}

trigger: |
  A junior designer says: "A new designer just joined our team
  and asked 'How do I start using the design system?' I realized
  we don't have a getting started guide. They spent 2 days
  figuring out how to install the component library, find the
  Figma files, and understand our conventions.

  Our design system includes:
  - Figma component library (50+ components)
  - React component package (@company/ui)
  - Design tokens (CSS variables + Figma variables)
  - A Storybook instance (components.company.com)

  How do I write a getting started guide that gets new team
  members productive in hours, not days?"

  Task: Write a getting started guide for the design system
  that covers both designer and developer onboarding.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear getting started guide with separate paths for designers and developers — Designer path: 1) Enable the Figma library (step-by-step with screenshots description), 2) Understand the component structure (how components are organized, naming convention), 3) Use your first component (drag a Button, customize it, understand variants), 4) Apply tokens (use color and typography styles, not raw values). Developer path: 1) Install the package (npm install command, peer dependencies), 2) Import and use a component (code example), 3) Apply theming (how to use tokens/CSS variables), 4) Check Storybook for docs. Each step is actionable with specific instructions"
    weight: 0.35
    description: "OnboardingPaths"
  - type: llm_judge
    criteria: "Response includes practical first-task exercises — 'Build your first page using the design system' walkthrough: create a simple form with heading, text input, and button using only design system components and tokens. Shows the designer version (Figma) and developer version (code). Includes common mistakes to avoid ('Don't detach components — customize using variants instead', 'Don't use hex values — use token references'). Provides a 'What's where' quick reference: Figma for design, Storybook for docs, npm for code, Slack channel for questions"
    weight: 0.35
    description: "PracticalExercises"
  - type: llm_judge
    criteria: "Response addresses the broader onboarding experience — links to next resources after getting started (component reference, token documentation, contribution guide), FAQ for common new-user questions ('What if I need a component that doesn't exist?', 'Can I modify a component?', 'How do I report a bug?'), and a checklist format that new team members can work through (setup checklist with checkboxes). Keeps the guide concise and scannable (headers, numbered steps, callout boxes for tips)"
    weight: 0.30
    description: "OnboardingExperience"
