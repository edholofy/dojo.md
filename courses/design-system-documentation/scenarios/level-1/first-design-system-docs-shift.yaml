meta:
  id: first-design-system-docs-shift
  level: 1
  course: design-system-documentation
  type: output
  description: "First design system docs shift — handle a day of basic documentation tasks including component docs, token reference, and team questions"
  tags: [shift, combined, assessment, beginner]

state: {}

trigger: |
  You're a junior designer on the design system team. Here's
  your day:

  9:00 AM — Your lead asks you to document the Card component.
  The Card has: default, elevated, and outlined variants. It
  can contain a header, body, footer, and optional media area.
  Sizes: compact and default. "Write it up like our Button
  docs — anatomy, variants, usage guidelines."

  10:30 AM — A developer in Slack asks: "What's the difference
  between spacing-3 and spacing-4? When do I use 12px vs 16px?"
  You check and there's no spacing usage guide.

  2:00 PM — A new designer asks: "I'm looking for the correct
  shade of gray for disabled text. I found gray-400, gray-500,
  and gray-600 used in different places. Which is correct?"

  3:30 PM — Your lead reviews your Card documentation and says:
  "Good start, but you're missing the do/don't section. People
  need to see what NOT to do with Cards."

  Task: Handle all four situations with appropriate
  documentation responses.

assertions:
  - type: llm_judge
    criteria: "Response writes Card component documentation — includes anatomy (header, body, footer, media area with visual layout description), variant descriptions (default: for standard content grouping, elevated: for content that needs visual prominence with shadow, outlined: for content areas with clear boundaries), sizing (compact for lists and dense layouts, default for standalone content), usage guidelines (when to use Cards vs other containers), and a content structure guide (what goes in header vs body vs footer)"
    weight: 0.35
    description: "CardDocumentation"
  - type: llm_judge
    criteria: "Response addresses the spacing and color questions with clear, reusable answers — spacing: explains the difference between spacing-3 (12px) and spacing-4 (16px) with use case examples (12px for tighter groupings within a component like icon-to-text, 16px for standard component padding like card padding), creating a mini spacing usage reference. Color: identifies the correct disabled text color with accessibility reasoning (gray-500 on white meets 4.5:1 contrast ratio, documents it as the canonical value for text-disabled token). Both answers contribute to documentation that helps future questioners"
    weight: 0.35
    description: "SpacingColorAnswers"
  - type: llm_judge
    criteria: "Response adds do/don't examples to the Card documentation — concrete examples: Do: use Cards for grouping related content, maintain consistent padding within Cards. Don't: nest Cards within Cards, use Cards for single-line items (use a list instead), put too many actions in a Card footer (max 2), use elevated Cards inside other elevated surfaces. Each don't explains the reason (nesting Cards creates visual noise and unclear hierarchy). Shows understanding that do/don't sections prevent common misuse patterns"
    weight: 0.30
    description: "DoDontExamples"
