meta:
  id: design-token-documentation
  level: 1
  course: design-system-documentation
  type: output
  description: "Design token documentation — document design tokens including color, typography, spacing, and their naming conventions"
  tags: [tokens, color, typography, spacing, naming, beginner]

state: {}

trigger: |
  A junior designer says: "My team uses design tokens but the
  documentation is just a big table of hex values. Nobody
  understands which color to use when. Here are some of our
  current token names:

  - blue-500: #2563EB
  - blue-600: #1D4ED8
  - gray-100: #F3F4F6
  - text-primary: #111827
  - bg-surface: #FFFFFF
  - spacing-4: 16px
  - spacing-8: 32px
  - font-size-sm: 14px
  - font-size-md: 16px

  How should I document these so people actually know which
  tokens to use?"

  Task: Write documentation for design tokens that goes beyond
  a color swatch table to include usage guidance and naming
  conventions.

assertions:
  - type: llm_judge
    criteria: "Response explains the token hierarchy — distinguishes between primitive/global tokens (blue-500, gray-100 — the raw values), semantic/alias tokens (text-primary, bg-surface — the purpose-based names), and component tokens (button-bg-primary, input-border — component-specific). Explains why semantic tokens matter: if you use 'blue-500' directly and the brand color changes, you update everywhere; if you use 'brand-primary' which references blue-500, you update once. Documents the naming convention system with clear rules"
    weight: 0.35
    description: "TokenHierarchy"
  - type: llm_judge
    criteria: "Response provides usage guidance for each token category — Color: when to use each semantic color token (text-primary for body text, text-secondary for captions, bg-surface for cards, bg-page for page background), including accessibility notes (contrast ratios for text on backgrounds). Typography: when to use each size (sm for captions, md for body, lg for headings), line height pairings, font weight tokens. Spacing: the spacing scale rationale (4px base unit), when to use each value (spacing-1 for tight grouping, spacing-4 for section padding). Includes do/don't examples"
    weight: 0.35
    description: "UsageGuidance"
  - type: llm_judge
    criteria: "Response addresses practical documentation format — how to present tokens visually (color swatches with token name, hex value, and usage note; typography samples at actual size; spacing examples with visual indicators), how to organize the documentation (by category: color → typography → spacing → elevation → motion, or by use case: surfaces → text → borders → interactive), and how to keep it updated (tokens should be the single source of truth, documentation auto-generated from token files where possible)"
    weight: 0.30
    description: "DocumentationFormat"
