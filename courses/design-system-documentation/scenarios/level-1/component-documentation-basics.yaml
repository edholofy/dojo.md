meta:
  id: component-documentation-basics
  level: 1
  course: design-system-documentation
  type: output
  description: "Component documentation basics — write clear documentation for a single UI component including anatomy, variants, states, and usage guidelines"
  tags: [components, anatomy, variants, states, beginner]

state: {}

trigger: |
  A junior designer says: "I've been asked to write documentation
  for our Button component. I've never documented a component
  before. Here's what I know about it:

  - 3 variants: Primary, Secondary, Tertiary
  - 3 sizes: Small (32px), Medium (40px), Large (48px)
  - States: Default, Hover, Active, Focus, Disabled, Loading
  - Can have: icon-only, icon + label, label only
  - Colors follow our brand palette

  What should the documentation include and how should I
  structure it?"

  Task: Write the documentation structure for a Button component
  and demonstrate what good component documentation looks like.

assertions:
  - type: llm_judge
    criteria: "Response provides a complete documentation structure for the Button component — includes: overview/description (what it is and when to use it), anatomy diagram (label area, icon slot, container, focus ring), variants with descriptions (Primary for main actions, Secondary for alternative actions, Tertiary for low-emphasis), sizes with use cases (when to use each size), states with visual descriptions, props/API table (variant, size, disabled, loading, icon, onClick), and accessibility section (keyboard navigation, ARIA attributes, focus management)"
    weight: 0.35
    description: "DocumentationStructure"
  - type: llm_judge
    criteria: "Response includes usage guidelines with do/don't examples — when to use Primary vs Secondary vs Tertiary (only one primary action per section, don't use two primary buttons side by side), icon usage guidelines (icon should reinforce the label, not replace it for critical actions), sizing guidelines (use medium by default, small for dense UIs, large for mobile-first), and content guidelines for button labels (use action verbs, be specific: 'Save changes' not 'Submit', keep under 3 words). Provides concrete visual examples or clear descriptions of good vs bad usage"
    weight: 0.35
    description: "UsageGuidelines"
  - type: llm_judge
    criteria: "Response includes code examples and interaction details — at least one code snippet showing basic usage (HTML/React/framework-agnostic), interaction specifications (hover timing, loading spinner behavior, disabled state cursor), and spacing guidelines (minimum touch target, spacing between buttons, alignment in button groups). Explains how to document states clearly so developers can implement them accurately"
    weight: 0.30
    description: "CodeAndInteraction"
