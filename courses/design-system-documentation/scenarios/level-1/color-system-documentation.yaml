meta:
  id: color-system-documentation
  level: 1
  course: design-system-documentation
  type: output
  description: "Color system documentation — document a color system with palettes, semantic colors, accessibility contrast ratios, and usage guidelines"
  tags: [color, palette, accessibility, contrast, beginner]

state: {}

trigger: |
  A junior designer says: "I need to document our color system.
  Right now we have:

  - Brand colors: Blue (#2563EB), Navy (#1E3A5F), Orange (#F97316)
  - A gray scale: 50 through 900 (10 shades)
  - Status colors: Success (green), Warning (amber), Error (red),
    Info (blue)
  - But no clear rules about which colors to use where

  Designers keep asking:
  - 'Which blue do I use for links vs. buttons vs. backgrounds?'
  - 'Is this text readable on this background?'
  - 'Can I use the brand orange for error states?'
  - 'What about dark mode?'

  How do I document this so people stop guessing?"

  Task: Write color system documentation that answers common
  color usage questions and ensures accessible color choices.

assertions:
  - type: llm_judge
    criteria: "Response documents the color system with usage roles — maps colors to specific use cases: primary action color (buttons, links, focus rings), secondary colors (backgrounds, borders, dividers), text colors (primary, secondary, disabled, inverse), surface colors (page, card, modal, overlay), status colors (success, warning, error, info with specific usage contexts), and interactive states (hover, active, selected, disabled). Each color has a clear 'use this for' description, not just a swatch. Addresses the specific questions: link blue vs button blue vs background blue"
    weight: 0.35
    description: "ColorUsageRoles"
  - type: llm_judge
    criteria: "Response covers accessibility thoroughly — WCAG contrast ratios (4.5:1 for normal text, 3:1 for large text and UI components), a contrast matrix showing which color combinations pass/fail, accessible color pairing recommendations for common use cases (text on white, text on colored backgrounds, text on dark surfaces), and guidance on not relying on color alone to convey information (use icons, text, or patterns alongside color for status). Addresses the 'brand orange for errors' question with accessibility reasoning"
    weight: 0.35
    description: "AccessibilityGuidance"
  - type: llm_judge
    criteria: "Response addresses practical color documentation — how to present the documentation visually (color swatches with hex, RGB, HSL values, token names, and contrast ratios shown), how to handle dark mode (token-based approach where semantic tokens map to different values in light vs dark), do/don't examples for common mistakes (don't use brand blue as a background with white text if contrast fails), and how to extend the system (process for adding new colors, approval criteria)"
    weight: 0.30
    description: "PracticalDocumentation"
