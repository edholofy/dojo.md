meta:
  id: spacing-layout-documentation
  level: 1
  course: design-system-documentation
  type: output
  description: "Spacing and layout documentation — document spacing scales, grid systems, and layout patterns for consistent UI composition"
  tags: [spacing, layout, grid, composition, beginner]

state: {}

trigger: |
  A junior designer says: "Our spacing is inconsistent. I
  counted the padding values used across our app:

  2, 4, 5, 6, 8, 10, 12, 14, 16, 18, 20, 24, 28, 30, 32,
  36, 40, 48, 56, 60, 64, 72, 80, 96px

  That's 24 different spacing values! Some are clearly from
  the 4px grid (4, 8, 16, 24, 32) but others are arbitrary.
  Designers just eyeball spacing.

  We also have no layout documentation — no grid specs, no
  max-width rules, no guidance on content area sizing.

  How do I document spacing and layout so we get consistency?"

  Task: Write spacing and layout documentation that establishes
  a clear spacing scale and layout system.

assertions:
  - type: llm_judge
    criteria: "Response establishes a clear spacing scale — defines a limited, intentional set of spacing values based on a 4px or 8px grid (e.g., 4, 8, 12, 16, 24, 32, 48, 64, 96px), names each value with a token (spacing-1 through spacing-12 or t-shirt sizes xs through 3xl), explains the mathematical relationship (each step is a meaningful increment, not arbitrary), and maps values to use cases: spacing-1 (4px) for tight grouping (icon to label), spacing-4 (16px) for component internal padding, spacing-6 (24px) for between components, spacing-8 (32px) for section spacing. Addresses the 24-value problem: how to reduce to the essential set"
    weight: 0.35
    description: "SpacingScale"
  - type: llm_judge
    criteria: "Response documents layout patterns — grid system (column count, gutter width, margin rules for different breakpoints), max-width guidelines (content width for readability: 65-75ch for text, 1280px for app layouts), responsive breakpoints with behavior descriptions, and common layout patterns (sidebar + content, full-width, centered content, dashboard grid). Includes visual diagrams or clear descriptions of spacing relationships (related items have smaller gaps, unrelated items have larger gaps — proximity principle)"
    weight: 0.35
    description: "LayoutDocumentation"
  - type: llm_judge
    criteria: "Response provides practical application guidance — how to choose the right spacing value (decision tree: is it within a component? between components? between sections?), do/don't examples with visual descriptions (don't: use 20px when 24px is the nearest scale value, don't eyeball — use the token; do: use consistent spacing within repeated elements, increase spacing for visual hierarchy), and how to audit existing spacing (find and replace arbitrary values with nearest scale value). Addresses the migration path from 24 values to the clean scale"
    weight: 0.30
    description: "PracticalApplication"
