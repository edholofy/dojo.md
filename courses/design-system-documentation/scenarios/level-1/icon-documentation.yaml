meta:
  id: icon-documentation
  level: 1
  course: design-system-documentation
  type: output
  description: "Icon documentation — document an icon system including naming, sizing, usage guidelines, and accessibility requirements"
  tags: [icons, accessibility, naming, usage, beginner]

state: {}

trigger: |
  A junior designer says: "We have 200+ icons in our design
  system but zero documentation. Problems we keep running into:

  - Designers can't find icons: 'Do we have a settings icon?
    Is it a gear or a slider?'
  - Inconsistent sizing: some icons are 16px, some 20px, some
    24px with no clear rules
  - No accessibility guidance: developers don't know when to
    add alt text vs. mark as decorative
  - Duplicate icons: we have 'close', 'x', and 'dismiss' that
    all look the same
  - No guidance on when to use outlined vs. filled variants

  How should I document our icon system?"

  Task: Write documentation for an icon system covering
  organization, sizing, usage guidelines, and accessibility.

assertions:
  - type: llm_judge
    criteria: "Response creates organized icon documentation — icon catalog structure (organized by category: navigation, action, status, communication, content, with searchable index), naming conventions (consistent verb/noun format: search, add, delete, settings; no synonyms: pick 'close' OR 'dismiss', not both), sizing system (define standard sizes: 16px for inline, 20px for UI controls, 24px for standalone, 32px for large displays, with use case for each), and variant guidelines (outlined for UI navigation, filled for selected/active states, or consistent system with rationale)"
    weight: 0.35
    description: "IconOrganization"
  - type: llm_judge
    criteria: "Response covers accessibility requirements for icons — when icons need alt text (standalone icons that convey meaning: search icon as a button needs 'Search'), when icons are decorative (icon next to a text label: mail icon next to 'Email' is decorative, use aria-hidden), how to write alt text for icons (describe the action not the visual: 'Close' not 'X mark'), color contrast requirements (icons must meet 3:1 contrast ratio against background), and touch target sizing (minimum 44x44px tap area even if icon is visually smaller)"
    weight: 0.35
    description: "IconAccessibility"
  - type: llm_judge
    criteria: "Response addresses practical icon usage guidance — do/don't examples (do: use consistent stroke width across all icons, don't: mix outlined and filled icons in the same context), color guidelines (use current text color for icons in text, use semantic colors for status icons: red for error, green for success), spacing rules (icon-to-text spacing, icon-to-edge padding), and the deduplication problem (audit for duplicates, establish canonical icon names, redirect aliases). Provides a format that makes icons easy to browse and find"
    weight: 0.30
    description: "UsageGuidance"
