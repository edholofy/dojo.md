meta:
  id: typography-documentation
  level: 1
  course: design-system-documentation
  type: output
  description: "Typography documentation — document a typography system including type scale, font families, line heights, and usage guidelines for headings, body, and UI text"
  tags: [typography, type-scale, fonts, headings, beginner]

state: {}

trigger: |
  A junior designer says: "I need to document our typography
  system. Here's what we use:

  - Primary font: Inter (headings and body)
  - Monospace font: JetBrains Mono (code blocks)
  - Type scale: 12, 14, 16, 18, 20, 24, 30, 36, 48px
  - Weights: Regular (400), Medium (500), Semibold (600),
    Bold (700)

  But there's no guidance on which size/weight combinations
  to use. Designers use random sizes and weights. One page
  might have 8 different text styles. How do I document
  typography so there's consistency?"

  Task: Write typography documentation that defines a clear
  type system with named styles and usage guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates named typography styles — defines a limited set of named styles instead of exposing the full scale: Display (48px/Bold), Heading 1 (36px/Semibold), Heading 2 (30px/Semibold), Heading 3 (24px/Medium), Heading 4 (20px/Medium), Body Large (18px/Regular), Body (16px/Regular), Body Small (14px/Regular), Caption (12px/Regular), Label (14px/Medium), Code (14px/Mono Regular). Each style has: font family, size, weight, line height, letter spacing, and a description of when to use it. Line height ratios are specified (typically 1.2-1.3 for headings, 1.5 for body)"
    weight: 0.35
    description: "TypographyStyles"
  - type: llm_judge
    criteria: "Response provides usage guidelines with hierarchy rules — when to use each style (Display for hero sections only, H1 for page titles, H2 for sections, Body for content, Caption for metadata, Label for form labels), hierarchy rules (one H1 per page, don't skip heading levels, use weight changes within a level sparingly), and do/don't examples (don't: use Bold for body text, mix too many sizes on one page, use Display in a card; do: use consistent heading hierarchy, pair Body with Caption for supporting text). Maximum recommended styles per page/view"
    weight: 0.35
    description: "UsageGuidelines"
  - type: llm_judge
    criteria: "Response covers practical typography considerations — responsive typography (how sizes adapt on mobile, minimum readable sizes), accessibility requirements (minimum 16px for body text, line height at least 1.5 for readability, sufficient contrast), how to document the type scale in both design tools (Figma text styles) and code (CSS/token references), and the relationship between typography tokens and component design (buttons use Label style, inputs use Body style, toasts use Body Small). Includes a typography specimen or quick reference format"
    weight: 0.30
    description: "PracticalConsiderations"
