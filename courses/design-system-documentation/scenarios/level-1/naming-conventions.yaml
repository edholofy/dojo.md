meta:
  id: naming-conventions
  level: 1
  course: design-system-documentation
  type: output
  description: "Naming conventions — establish and document consistent naming conventions for components, tokens, and design system elements"
  tags: [naming, conventions, consistency, organization, beginner]

state: {}

trigger: |
  A junior designer says: "Our design system has a naming mess.
  Different team members name things differently:

  Components:
  - 'PrimaryButton' vs 'ButtonPrimary' vs 'btn-primary'
  - 'TextInput' vs 'InputText' vs 'text-field'
  - 'NavBar' vs 'NavigationBar' vs 'TopNav' vs 'Header'

  Tokens:
  - 'color-blue-500' vs 'blue500' vs 'Blue/500'
  - 'font-size-large' vs 'fontSize-lg' vs 'text-lg'

  Icons:
  - 'ic_search' vs 'search-icon' vs 'SearchIcon' vs 'magnifier'

  We need to standardize. How do I create naming conventions
  that everyone will actually follow?"

  Task: Design a naming convention system for a design system
  and document it clearly.

assertions:
  - type: llm_judge
    criteria: "Response establishes clear naming rules — component naming (PascalCase for React/code, kebab-case for CSS, category-first or modifier-last convention with rationale), token naming (structured format: category-property-variant-state, e.g., color-text-primary, spacing-component-sm), icon naming (object-first with consistent format: search, arrow-left, chevron-down), and file naming (consistent with component names). Picks one convention for each and explains why, rather than listing all options. Addresses the specific examples from the trigger"
    weight: 0.35
    description: "NamingRules"
  - type: llm_judge
    criteria: "Response provides naming principles that guide future decisions — be descriptive not cryptic (NavigationBar not NavBar), be consistent in word order (always Category + Variant: ButtonPrimary, ButtonSecondary, not PrimaryButton, SecondaryBtn), avoid abbreviations unless universally understood (btn is OK, nav is OK, txt is not), use singular nouns for components (Card not Cards), and test names by asking 'would a new team member understand this?' Includes a decision tree or flowchart for naming new elements"
    weight: 0.35
    description: "NamingPrinciples"
  - type: llm_judge
    criteria: "Response addresses adoption and enforcement — how to document the conventions (naming guide with examples, searchable reference), how to enforce them (PR review checklist, linting rules, Figma naming validation), how to handle exceptions and edge cases (when existing names conflict with new conventions, migration strategy for renaming), and how to get team buy-in (involve the team in deciding conventions, not just dictating them). Provides a before/after showing the cleanup of the messy names"
    weight: 0.30
    description: "AdoptionEnforcement"
