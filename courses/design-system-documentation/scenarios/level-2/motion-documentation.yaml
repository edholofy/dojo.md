meta:
  id: motion-documentation
  level: 2
  course: design-system-documentation
  type: output
  description: "Motion and animation documentation — document animation principles, timing tokens, and interaction motion guidelines for consistent UI motion"
  tags: [motion, animation, timing, easing, transitions, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Our product has inconsistent
  animations. Some transitions are 100ms, others 500ms. Some
  use linear easing, others use ease-in-out. Some components
  animate, others just appear. There's no pattern.

  I've been asked to document our motion system. We need:
  - Animation timing standards
  - Easing curve definitions
  - Guidelines for when things should animate vs. appear
  - Reduced motion / prefers-reduced-motion support

  I've looked at Material Design's motion guidelines but
  they're complex. How do I document motion for our simpler
  design system?"

  Task: Write motion documentation that establishes clear,
  practical animation standards.

assertions:
  - type: llm_judge
    criteria: "Response creates a motion token system — defines timing tokens (instant: 0ms, fast: 100ms, normal: 200ms, slow: 300ms, deliberate: 500ms) with use cases for each (instant for color changes, fast for hover states, normal for expand/collapse, slow for page transitions, deliberate for complex choreography). Defines easing curves (ease-out for elements entering/appearing, ease-in for elements exiting/leaving, ease-in-out for elements moving/transforming, linear for progress indicators). Each token has a name, value, and clear use case guidance"
    weight: 0.35
    description: "MotionTokens"
  - type: llm_judge
    criteria: "Response provides motion principles and component guidelines — principles: motion should be functional not decorative, faster is usually better (< 300ms for UI interactions), animate the minimum necessary, respect user preferences. Component-specific motion specs: dropdown menus (fade + slide down, 200ms, ease-out on open / ease-in on close), modals (fade in overlay + scale up content, 300ms), toasts (slide in from edge, 200ms, auto-dismiss with fade out), page transitions (fade, 200ms), loading skeletons (pulse animation, continuous). Explains when NOT to animate (simple state changes, data updates, user-initiated instant actions)"
    weight: 0.35
    description: "MotionGuidelines"
  - type: llm_judge
    criteria: "Response covers accessibility and implementation — prefers-reduced-motion support (how components should behave: replace motion with instant transitions or crossfade, never remove the state change entirely, code example showing the media query), documentation format for developers (CSS custom properties for timing/easing, code snippets for common transitions), and how to demonstrate motion in static documentation (video clips, annotated GIFs, or Storybook interactive examples showing the animation with timing labels). Keeps the system simple enough for a small team to implement"
    weight: 0.30
    description: "AccessibilityImplementation"
