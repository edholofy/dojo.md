meta:
  id: storybook-documentation
  level: 2
  course: design-system-documentation
  type: output
  description: "Storybook documentation — write effective Storybook stories and documentation pages that serve as living design system docs"
  tags: [storybook, interactive-docs, stories, living-documentation, intermediate]

state: {}

trigger: |
  An intermediate designer says: "We use Storybook for our
  design system but it's a mess:

  - Stories are just the component rendered with default props
  - No descriptions or usage guidelines in Storybook
  - Controls are auto-generated but not curated (50 props
    including internal ones are exposed)
  - No documentation pages — just component stories
  - Stories don't show real-world usage patterns
  - Developers copy-paste from stories but get confused by
    the Storybook wrapper code

  How do I turn our Storybook from a component playground
  into actual design system documentation?"

  Task: Write guidelines for creating effective Storybook
  documentation including stories, docs pages, and controls.

assertions:
  - type: llm_judge
    criteria: "Response designs a Storybook documentation strategy — story organization (group by category: Forms, Navigation, Feedback, Layout), story types (Default story showing standard usage, Variant stories for each visual variant, Interactive stories for user-flow demonstrations, Playground story with all controls), MDX documentation pages (component overview, anatomy, guidelines, do/don't, accessibility, code examples alongside visual examples). Explains the difference between Stories (visual regression testing, developer reference) and Docs pages (designer and developer documentation)"
    weight: 0.35
    description: "StorybookStrategy"
  - type: llm_judge
    criteria: "Response addresses the quality issues — curating controls (hide internal props, group related props, set sensible defaults, add descriptions to each control, use control types that match prop types), writing useful story descriptions (not just the component name but usage context: 'Use Primary Button for the main action on a page. Only one primary action per section.'), and creating real-world examples (stories that show components in context: a form with labels, help text, validation, and submit button, not just an isolated input field). Shows before/after of a poorly documented vs well-documented component"
    weight: 0.35
    description: "QualityImprovement"
  - type: llm_judge
    criteria: "Response covers the practical setup — how to write MDX docs pages (combining markdown with live component examples), how to add design tokens visualization to Storybook, how to link Figma designs to Storybook stories (embedding or linking), how to ensure copy-paste code examples work outside Storybook (import paths, required context/providers), and how to maintain Storybook docs as the component evolves (docs as part of the component PR, review checklist for story quality). Includes a template for a well-documented component page"
    weight: 0.30
    description: "PracticalSetup"
