meta:
  id: usage-guidelines-writing
  level: 2
  course: design-system-documentation
  type: output
  description: "Usage guidelines writing — write clear, actionable usage guidelines that help designers and developers make the right component choices"
  tags: [usage, guidelines, decision-making, patterns, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Our design system has 60+
  components but no usage guidelines. Designers constantly ask:

  - 'Should I use a Modal or a Dialog or a Drawer for this?'
  - 'When do I use a Toast vs a Banner vs an Alert?'
  - 'Should this be a Dropdown Menu or a Select?'
  - 'Is this a Card or a Panel or a Section?'

  The components look different visually, but nobody documented
  WHEN to use each one. How do I write usage guidelines that
  help people choose the right component?"

  Task: Write usage guidelines for commonly confused component
  groups and create a decision framework for component selection.

assertions:
  - type: llm_judge
    criteria: "Response writes clear 'when to use' and 'when not to use' for each component in confused groups — Modal vs Dialog vs Drawer: Modal for blocking actions requiring user decision, Dialog for informational content that can be dismissed, Drawer for supplementary content that doesn't interrupt workflow. Toast vs Banner vs Alert: Toast for transient feedback on completed actions (auto-dismisses), Banner for persistent system-level information (stays until addressed), Alert for inline contextual warnings within content. Each distinction includes a concrete scenario example that makes the difference obvious"
    weight: 0.35
    description: "ComponentDistinctions"
  - type: llm_judge
    criteria: "Response creates decision frameworks — decision trees or flowcharts for choosing between similar components: 'Does it block the user? Yes → Modal. No → Does it show supplementary content? Yes → Drawer. No → Dialog.' 'Is the feedback about a completed action? Yes → Toast. Is it system-wide? Yes → Banner. Is it contextual to content? Yes → Alert.' Covers the Select vs Dropdown Menu distinction (Select for form input, Dropdown Menu for action lists). Provides a quick-reference comparison table for each group"
    weight: 0.35
    description: "DecisionFrameworks"
  - type: llm_judge
    criteria: "Response includes do/don't examples with rationale — concrete examples: Don't use a Modal for content that users might want to reference while working (use a Drawer instead because they can see the main content). Don't use a Toast for error messages (they auto-dismiss and users might miss them — use an Alert). Don't use a Select for fewer than 5 options (use Radio buttons for visibility). Each don't explains the UX problem it causes. Format is scannable with clear visual or structural distinction between do and don't"
    weight: 0.30
    description: "DoDontExamples"
