meta:
  id: responsive-documentation
  level: 2
  course: design-system-documentation
  type: output
  description: "Responsive design documentation — document breakpoints, responsive behavior patterns, and how components adapt across screen sizes"
  tags: [responsive, breakpoints, mobile, adaptive, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Our design system docs show
  components at desktop size only. When developers build mobile
  views, they improvise. Results:

  - The data table becomes horizontally scrollable on mobile
    (unusable with 12 columns)
  - Navigation tabs overflow off-screen with no handling
  - Modal dialogs don't resize — they're clipped on mobile
  - Cards stack differently depending on which developer
    built the page
  - Nobody knows if we officially support tablet sizes

  We need responsive documentation but I'm not sure what
  level of detail is needed. How do I document responsive
  behavior in a design system?"

  Task: Write responsive design documentation including
  breakpoints, component responsive behavior, and layout
  patterns.

assertions:
  - type: llm_judge
    criteria: "Response establishes breakpoint documentation — defines official breakpoints with names and rationale (mobile: 0-599px, tablet: 600-1023px, desktop: 1024-1439px, wide: 1440px+), explains mobile-first vs desktop-first approach, documents the grid system at each breakpoint (columns, gutters, margins), and provides a breakpoint decision guide (what changes at each breakpoint and why). Addresses the tablet question: whether to support tablet as a distinct design target or treat it as responsive between mobile and desktop"
    weight: 0.35
    description: "BreakpointDocumentation"
  - type: llm_judge
    criteria: "Response documents component responsive behavior — for each of the problem components: data table (responsive patterns: horizontal scroll for simple tables, card-based layout for complex data, column priority hiding with 'Show more' for medium tables), navigation tabs (scroll horizontally with fade indicator, or collapse into a dropdown/more menu), modals (full-screen on mobile with close button, side sheet on tablet, centered on desktop), cards (stacking rules: 1 column on mobile, 2 on tablet, 3-4 on desktop, with consistent gap tokens). Each component has explicit rules, not just 'it adapts'"
    weight: 0.35
    description: "ComponentResponsive"
  - type: llm_judge
    criteria: "Response creates responsive layout patterns — common page layouts at each breakpoint (sidebar + content collapses to bottom nav + full content on mobile, data-dense dashboards become scrollable card lists), responsive typography scale (font sizes that adjust at breakpoints), touch target sizing for mobile (minimum 44x44px), and responsive spacing (can spacing tokens scale down on mobile or remain fixed). Includes a documentation format: shows the component/layout at each breakpoint side-by-side with annotation of what changes"
    weight: 0.30
    description: "LayoutPatterns"
