meta:
  id: design-dev-handoff-specs
  level: 2
  course: design-system-documentation
  type: output
  description: "Design-dev handoff specs — write specifications that bridge design and development including interaction details, responsive behavior, and edge cases"
  tags: [handoff, specifications, responsive, interaction, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Developers keep building
  components that don't match the design. Common complaints:

  - 'The hover state wasn't specified, so I guessed'
  - 'How should this component behave on mobile?'
  - 'What happens when the text is too long?'
  - 'You showed 3 items in the mockup. What about 0? Or 100?'
  - 'The animation timing isn't in the specs'
  - 'What's the loading state look like?'

  I've been handing off Figma files but they clearly aren't
  enough. What additional specs do I need to write to reduce
  these gaps?"

  Task: Create a handoff specification template that covers
  the details developers need but designers often forget.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive handoff spec template — sections covering: interaction states (default, hover, active, focus, disabled, loading, error, empty, skeleton), responsive behavior (how the component adapts at each breakpoint, what collapses/hides/stacks), content overflow rules (text truncation with ellipsis, line clamping, scrolling behavior, minimum/maximum widths), edge cases (0 items, 1 item, max items, very long text, special characters, RTL text), animation specs (duration, easing function, property being animated, delay), and loading states (skeleton, spinner, progressive loading). Each section includes what to specify and an example"
    weight: 0.35
    description: "HandoffTemplate"
  - type: llm_judge
    criteria: "Response addresses the communication gap between design and development — how to annotate Figma files effectively (red-line specs, interaction annotations, flow diagrams for complex interactions), what to document outside Figma (behavior specs in a shared doc, acceptance criteria format), how to specify responsive behavior clearly (not just 'it stacks on mobile' but specific breakpoint, column changes, spacing adjustments, hidden elements), and how to handle states that aren't visible in a static mockup (hover, focus, loading, error states need explicit documentation or separate frames)"
    weight: 0.35
    description: "CommunicationGap"
  - type: llm_judge
    criteria: "Response provides practical content boundary specs — what happens when content exceeds expected bounds: text truncation rules (single-line truncate with tooltip, multi-line clamp at N lines), image handling (aspect ratio preservation, fallback for missing images, lazy loading behavior), list limits (pagination, 'Show more' behavior, virtual scrolling threshold), and empty state variations (no data yet, no results from search, error loading data). Includes a checklist designers can run through before handoff to catch common gaps"
    weight: 0.30
    description: "ContentBoundaries"
