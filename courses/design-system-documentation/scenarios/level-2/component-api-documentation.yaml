meta:
  id: component-api-documentation
  level: 2
  course: design-system-documentation
  type: output
  description: "Component API documentation — write detailed API reference documentation for components including props, events, slots, and code examples"
  tags: [API, props, code-examples, reference, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Developers keep asking me
  questions that our component docs don't answer:

  - 'What props does the Select component accept?'
  - 'What's the default value for the size prop?'
  - 'Can I pass a custom render function for options?'
  - 'What events does the component emit?'
  - 'How do I control the open/closed state externally?'

  Our docs show the component visually but have no API reference.
  Developers end up reading the source code. How do I write
  API documentation for a complex component like Select?"

  Task: Write API documentation for a Select component that
  serves developers as a complete reference.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive API reference — props table with columns for prop name, type, default value, required/optional, and description. Covers key Select props: options (array of objects), value/defaultValue (controlled/uncontrolled), onChange (callback), placeholder (string), disabled (boolean), size (sm/md/lg, default md), variant (outlined/filled), label (string), error/helperText (validation), multiple (boolean for multi-select), searchable (boolean for filtering), renderOption (custom render function). Each prop has a clear type signature and practical description"
    weight: 0.35
    description: "APIReference"
  - type: llm_judge
    criteria: "Response includes code examples for common use cases — basic usage (simple options array), controlled component (value + onChange), multi-select, searchable select, custom option rendering, form integration (with validation), grouped options, disabled state, and async option loading. Each example is self-contained and copyable. Shows both simple and complex patterns. Explains controlled vs uncontrolled usage patterns clearly"
    weight: 0.35
    description: "CodeExamples"
  - type: llm_judge
    criteria: "Response covers events, slots/composition, and accessibility API — events/callbacks (onChange, onOpen, onClose, onSearch with their signatures and when they fire), composition points (how to customize trigger button, option items, empty state, loading state), keyboard navigation spec (arrow keys to navigate, Enter to select, Escape to close, Type-ahead search), and ARIA attributes (role=listbox, aria-expanded, aria-selected, aria-activedescendant). Explains how to test the component programmatically"
    weight: 0.30
    description: "EventsAccessibility"
