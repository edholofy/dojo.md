meta:
  id: content-guidelines-integration
  level: 2
  course: design-system-documentation
  type: output
  description: "Content guidelines integration — integrate content and writing guidelines into component documentation so copy and design are documented together"
  tags: [content, writing-guidelines, copy, integration, intermediate]

state: {}

trigger: |
  An intermediate designer says: "Our design system documents
  visual specs but says nothing about the words inside
  components. Designers ask:

  - 'What should the button say? Save? Submit? Confirm?'
  - 'How long can a toast message be?'
  - 'What's the format for error messages?'
  - 'Should modal titles be questions or statements?'
  - 'What capitalization do we use for labels?'

  We have a separate writing style guide in a Google Doc but
  nobody reads it. How do I integrate content guidelines
  directly into component documentation?"

  Task: Add content guidelines to component documentation
  so copy guidance appears alongside visual and code specs.

assertions:
  - type: llm_judge
    criteria: "Response integrates content guidelines into component docs — for each component: Button (label format: verb + noun, 2-4 words, sentence case; examples: 'Save changes', 'Delete project', 'Add to cart'; avoid: 'Submit', 'OK', 'Click here'), Toast (structure: [What happened] + [optional next step], max 2 lines, example: 'Changes saved. View in dashboard.'), Error message (structure: [What happened] + [How to fix it], example: 'Email address is required. Enter a valid email to continue.'), Modal title (format: verb phrase or question, example: 'Delete this project?' or 'Share with team'), Label capitalization (sentence case for all UI labels: 'First name' not 'First Name')"
    weight: 0.35
    description: "ContentInComponents"
  - type: llm_judge
    criteria: "Response shows how to structure content alongside visual specs — content section within each component page (after usage guidelines, before code examples), with a format that includes: content template (fill-in structure), character limits (max characters for the component), tone guidance (what tone is appropriate for this component type), do/don't copy examples (paired with the visual do/don't), and localization notes (strings that will expand, avoid concatenation). Shows before (component page without content) and after (with integrated content guidelines)"
    weight: 0.35
    description: "IntegrationStructure"
  - type: llm_judge
    criteria: "Response addresses the organizational challenge — why the separate Google Doc approach fails (discoverability: people don't look for writing guidance in a separate doc), how to ensure content guidelines stay updated alongside component changes (content review as part of component PR), who owns content guidelines in the design system (UX writer as contributor, with design system team as publisher), and how to handle the transition (migrate relevant sections from Google Doc into component pages, keep the Google Doc as a 'content principles' overview, link between them). Practical workflow for keeping content and design docs in sync"
    weight: 0.30
    description: "OrganizationalChallenge"
