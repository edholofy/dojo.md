meta:
  id: cross-platform-documentation
  level: 3
  course: design-system-documentation
  type: output
  description: "Cross-platform documentation — document design system components that work across web, iOS, and Android with platform-specific adaptations"
  tags: [cross-platform, iOS, Android, web, platform-specific, advanced]

state: {}

trigger: |
  A senior designer says: "Our design system supports Web
  (React), iOS (SwiftUI), and Android (Jetpack Compose). But
  our docs are web-only. Problems:

  - Mobile developers guess how components should look on
    their platform
  - The iOS team made buttons with rounded corners (following
    iOS HIG) while Android uses our sharp corners
  - Navigation patterns are completely different per platform
    but we have no documentation on which pattern to use where
  - Touch targets differ: web has hover states, mobile doesn't
  - The same component has different prop names per platform
    (React: 'onClick', SwiftUI: 'action', Compose: 'onClick')

  How do I document a design system that spans 3 platforms
  without tripling the documentation work?"

  Task: Design a cross-platform documentation strategy that
  covers shared foundations and platform-specific adaptations.

assertions:
  - type: llm_judge
    criteria: "Response designs a documentation architecture for cross-platform — shared layer (principles, tokens, visual design that's identical: color, typography scale, spacing), platform-adapted layer (how components adapt: web Button has hover state, mobile has press/ripple, iOS follows HIG rounding, Android follows Material conventions), and platform-specific layer (navigation patterns, gestures, platform-only components). Documentation structure: each component page has a shared section (purpose, anatomy, usage guidelines) and platform tabs (Web, iOS, Android) for implementation details, code examples, and platform-specific behavior"
    weight: 0.35
    description: "CrossPlatformArchitecture"
  - type: llm_judge
    criteria: "Response addresses platform adaptation rules — clear guidelines for what must be identical across platforms (brand colors, spacing scale, component purpose and content) vs. what adapts (interaction patterns, animation conventions, native controls). Specific rules: buttons (shared: color, typography, sizing; adapted: corner radius per platform, press feedback), navigation (bottom tabs on mobile, sidebar on web, platform-native back behavior), touch vs mouse (hover states web-only, press states mobile-only, touch targets minimum 44pt on mobile). Prop mapping table showing equivalent API across platforms"
    weight: 0.35
    description: "AdaptationRules"
  - type: llm_judge
    criteria: "Response provides a practical documentation workflow — how to avoid tripling documentation work (single-source content for shared sections, platform-specific addenda), who writes what (web team documents web, mobile teams document mobile, design system team maintains shared sections), how to keep docs in sync across platforms (shared sections as the source of truth, platform docs reference but don't duplicate), and tooling recommendations (docs site with platform toggle, or separate sections with clear cross-references). Includes a template for a cross-platform component page"
    weight: 0.30
    description: "DocumentationWorkflow"
