meta:
  id: documentation-site-architecture
  level: 3
  course: design-system-documentation
  type: output
  description: "Documentation site architecture — design the information architecture, navigation, and content strategy for a design system documentation website"
  tags: [information-architecture, site-design, navigation, content-strategy, advanced]

state: {}

trigger: |
  A senior designer says: "We need to build a documentation
  site for our design system. Currently docs are scattered
  across Notion, Storybook, Google Docs, and Figma annotations.
  We're consolidating into one site.

  Content inventory:
  - 80 components across 8 categories
  - 15 foundation pages (color, typography, spacing, etc.)
  - 12 pattern pages (forms, navigation, data display, etc.)
  - 8 guideline pages (accessibility, content, responsive, etc.)
  - Getting started guides for designers and developers
  - Changelog and release notes
  - Contribution guidelines

  Target audiences: 40 designers, 120 developers, 30 PMs
  who occasionally reference the system.

  How should I organize this site so people can find what
  they need quickly?"

  Task: Design the information architecture, navigation, and
  content strategy for the design system documentation site.

assertions:
  - type: llm_judge
    criteria: "Response designs a clear information architecture — top-level navigation: Getting Started (onboarding, installation), Foundations (color, typography, spacing, icons, motion, elevation), Components (organized by category: Actions, Forms, Navigation, Data Display, Feedback, Layout, Overlays, Media), Patterns (Forms, Data Tables, Empty States, Error Handling, Navigation), Guidelines (Accessibility, Content, Responsive, Internationalization), and Resources (Changelog, Contributing, FAQs, Support). Explains the rationale for the categorization. Includes search as a primary navigation method (developers search by component name, designers browse by category)"
    weight: 0.35
    description: "InformationArchitecture"
  - type: llm_judge
    criteria: "Response addresses different audience needs — how each audience uses the site: developers (search for component → API reference → code example → copy-paste), designers (browse components → usage guidelines → do/don't → Figma link), PMs (patterns → understand interaction flows → review accessibility). Design considerations: code examples prominent for developers, visual examples prominent for designers, progressive disclosure (overview first, details on demand), and multiple entry points to the same content (search, browse, related component links). Includes role-based landing pages or filters"
    weight: 0.35
    description: "AudienceStrategy"
  - type: llm_judge
    criteria: "Response covers the practical site setup — technology recommendation (static site generator: Docusaurus, Astro, Next.js with MDX for interactive examples), how to integrate Storybook embeds (live component previews in docs pages), content workflow (who creates, reviews, and publishes content), SEO and discoverability (component pages should be the top Google result for 'company name + component name'), and maintenance plan (how to keep docs current with releases, docs-as-code approach where docs live alongside component code). Addresses migration from the current scattered docs"
    weight: 0.30
    description: "PracticalSetup"
