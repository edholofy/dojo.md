meta:
  id: design-system-analytics
  level: 3
  course: design-system-documentation
  type: output
  description: "Design system analytics documentation — document metrics, dashboards, and reporting for measuring design system adoption and impact"
  tags: [analytics, metrics, adoption, dashboards, reporting, advanced]

state: {}

trigger: |
  A senior designer says: "Leadership keeps asking 'Is the
  design system working?' and we don't have good answers. We
  track npm download counts and Storybook page views, but
  that doesn't tell us if the system is actually improving
  product quality or developer productivity.

  Questions we can't answer:
  - What percentage of our UI uses design system components
    vs. custom components?
  - Which components are most/least used?
  - Are teams adopting new components or staying on old ones?
  - Has the design system reduced design/development time?
  - Is visual consistency improving across products?
  - Which documentation pages are helpful vs. useless?

  How do I set up meaningful metrics and document them for
  ongoing reporting?"

  Task: Design a design system metrics framework and
  document how to measure adoption, usage, and impact.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-dimensional metrics framework — adoption metrics (percentage of UI surfaces using DS components, team-by-team adoption rate, new component adoption speed), usage metrics (component usage frequency, variant distribution, override/customization rate, deprecated component usage), quality metrics (design consistency score, accessibility audit pass rate, visual regression test pass rate), and efficiency metrics (time to build new features with/without DS, support ticket volume related to inconsistency, designer/developer satisfaction survey). Each metric has: what to measure, how to measure it, target value, and reporting cadence"
    weight: 0.35
    description: "MetricsFramework"
  - type: llm_judge
    criteria: "Response addresses measurement methodology — how to track component usage in production (code scanning, bundle analysis, custom telemetry), how to measure adoption beyond installation (actual usage vs. imported-but-unused), how to calculate the 'override rate' (custom CSS overriding design system styles as a signal of system gaps), documentation analytics (page views, time on page, search queries, feedback ratings), and how to connect design system metrics to business outcomes (correlation with product quality metrics, not just DS-internal metrics). Acknowledges measurement limitations and proxy metrics"
    weight: 0.35
    description: "MeasurementMethodology"
  - type: llm_judge
    criteria: "Response creates a reporting and communication plan — dashboard design (executive summary dashboard: 3-5 key metrics, detailed dashboard for the DS team: usage breakdown, adoption trends, quality scores), reporting cadence (monthly team metrics, quarterly leadership report, annual strategic review), how to present metrics to different audiences (leadership: ROI and business impact, product teams: adoption and gaps, DS team: detailed usage for roadmap planning), and how to use metrics to drive decisions (low adoption → investigate barriers, high override rate → component needs improvement, most-searched-for component → prioritize documentation). Includes dashboard wireframe or structure"
    weight: 0.30
    description: "ReportingCommunication"
