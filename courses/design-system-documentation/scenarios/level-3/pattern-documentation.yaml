meta:
  id: pattern-documentation
  level: 3
  course: design-system-documentation
  type: output
  description: "Pattern documentation — document reusable UX patterns that compose multiple components into complete interaction flows"
  tags: [patterns, composition, flows, interaction, advanced]

state: {}

trigger: |
  A senior designer says: "We have individual component docs
  but no pattern documentation. Components are the LEGO bricks;
  patterns are the assembled sets. For example:

  - 'Form Pattern': how to compose Labels, Inputs, Help Text,
    Validation Messages, and Submit Button into a consistent form
  - 'Data Table Pattern': how to compose Table, Filters, Search,
    Pagination, and Bulk Actions into a functional data view
  - 'Empty State Pattern': how to compose Illustration, Heading,
    Description, and CTA into a helpful empty state

  Designers know the components exist but don't know how to
  combine them into these standard patterns. Everyone assembles
  them differently. How do I document patterns?"

  Task: Write pattern documentation for forms, data tables,
  and empty states, and create a pattern documentation template.

assertions:
  - type: llm_judge
    criteria: "Response documents the Form Pattern comprehensively — composition: which components make up a form and their arrangement (Label above Input, Help Text below Input, Validation Message replaces Help Text on error, required field indicator, section grouping with Dividers, action bar at bottom with Primary + Secondary buttons). Interaction flow: validation timing (validate on blur for inline, on submit for full form), error handling pattern (scroll to first error, focus the field, show inline message), progressive disclosure (show advanced fields on demand). Layout rules: single column for simplicity, max field width, spacing between fields"
    weight: 0.35
    description: "FormPattern"
  - type: llm_judge
    criteria: "Response documents the Data Table and Empty State patterns — Data Table: composition (Search bar + Filter chips + Table + Pagination + Bulk action bar), standard features (column sorting, row selection, inline actions, responsive behavior), state management (loading, empty, error, filtered-no-results), and configuration options (which features to include based on data size and use case). Empty State: three types (first-use: encourage action, no-results: guide to adjust, error: explain and recover), composition template (illustration + heading + description + primary CTA + optional secondary), content guidelines (heading states the situation, description guides next steps, CTA is the action), and placement rules"
    weight: 0.35
    description: "TableEmptyPatterns"
  - type: llm_judge
    criteria: "Response creates a reusable pattern documentation template — template sections: Pattern name, Problem it solves, When to use / When not to use, Anatomy (component composition diagram), Interaction flow (step-by-step user journey), Variants (different configurations for different contexts), Accessibility considerations (keyboard flow through the composed pattern), Content guidelines (copy patterns for the pattern's text elements), Code example (how to implement the full pattern), and Related patterns (links to similar or complementary patterns). Explains how patterns differ from components in documentation (patterns show composition and flow, components show individual API)"
    weight: 0.30
    description: "PatternTemplate"
