meta:
  id: contribution-guidelines
  level: 3
  course: design-system-documentation
  type: output
  description: "Contribution guidelines — design and document a contribution model that enables teams to contribute components and patterns to the design system"
  tags: [contribution, community, process, governance, advanced]

state: {}

trigger: |
  A senior designer says: "Our design system team of 4 can't
  build everything. Product teams create custom components
  that could be shared, but there's no contribution process.

  Current problems:
  - 3 teams built their own Date Range Picker independently
  - A contributed component broke the build because it didn't
    meet quality standards
  - Teams don't know if their component is 'design system
    worthy' or product-specific
  - One team contributed a component 6 months ago and now
    nobody maintains it
  - The design system team spends 40% of time reviewing
    low-quality contributions

  How do I create contribution guidelines that enable quality
  contributions without overwhelming the core team?"

  Task: Design and document a contribution model with clear
  criteria, process, and quality standards.

assertions:
  - type: llm_judge
    criteria: "Response designs a tiered contribution model — contribution categories: Proposal (idea submission with use case), Pattern (documented usage pattern using existing components), Community Component (contributed and maintained by the contributor team, listed in docs with 'community' label), Core Component (fully owned by the design system team, highest quality bar). Each tier has different requirements: proposals need a use case and 3+ team interest, community components need docs and tests, core components need full design system team review and adoption commitment. Includes clear criteria for when a community component graduates to core"
    weight: 0.35
    description: "ContributionModel"
  - type: llm_judge
    criteria: "Response creates a contribution process with quality gates — step-by-step process: 1) Submit proposal (template: problem, use case, affected teams, existing alternatives), 2) Review by design system team (acceptance criteria: used by 3+ teams, no existing component covers it, aligns with design principles), 3) Build to standards (component checklist: accessibility, responsive, tokens-based, documented, tested), 4) Review and feedback (design review, code review, docs review), 5) Publish (release, announcement, migration guide for teams using ad-hoc versions). Quality checklist is specific and testable, not vague"
    weight: 0.35
    description: "ContributionProcess"
  - type: llm_judge
    criteria: "Response addresses the maintenance and ownership challenge — ownership model (who maintains contributed components: contributor team owns community components with design system team SLA for core), support expectations by tier (community: best-effort by contributor, core: SLA from design system team), deprecation process for abandoned components (warning period, migration path, removal), and how to prevent the 'low-quality contribution flood' (proposal gate filters early, office hours for guidance before building, contribution workshops). Includes templates for proposal, PR checklist, and documentation requirements"
    weight: 0.30
    description: "MaintenanceOwnership"
