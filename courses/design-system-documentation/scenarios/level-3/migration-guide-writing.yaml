meta:
  id: migration-guide-writing
  level: 3
  course: design-system-documentation
  type: output
  description: "Migration guide writing — write comprehensive migration guides for major design system version upgrades including breaking changes, codemods, and step-by-step instructions"
  tags: [migration, upgrade, breaking-changes, codemods, advanced]

state: {}

trigger: |
  A senior designer says: "We're releasing design system v4.0
  with major changes:

  1. Token restructure: All color tokens renamed from
     'color-blue-500' to 'color-primary-500' (semantic naming)
  2. Component API changes: Button's 'variant' prop values
     changed from 'primary/secondary/danger' to
     'filled/outlined/destructive'
  3. Removed components: Dropdown removed (use Select instead),
     InlineAlert removed (use Alert with inline prop)
  4. New layout system: Flexbox-based Stack and Grid replace
     the old Row/Column components
  5. Theme structure change: Theme object shape changed
     completely for multi-brand support

  12 product teams need to migrate. Last time we did a major
  version (v2 to v3), it took teams 3-6 months because the
  migration guide was just a changelog. How do I write a
  migration guide that actually helps teams upgrade?"

  Task: Write a migration guide for the v3 to v4 upgrade
  that minimizes migration pain.

assertions:
  - type: llm_judge
    criteria: "Response writes a structured migration guide — organized by change type with increasing difficulty: Quick wins first (token renames: find-and-replace with specific regex patterns or codemod command), medium effort (prop value changes: before/after code examples for each component), complex changes (component replacements: how to replace Dropdown with Select including prop mapping, how to replace Row/Column with Stack/Grid including layout equivalences), and theme restructure (step-by-step with old theme shape vs new theme shape, property-by-property mapping). Each section has: what changed, why it changed, how to migrate, and estimated effort"
    weight: 0.35
    description: "MigrationStructure"
  - type: llm_judge
    criteria: "Response provides practical migration tools — codemods or automated scripts for mechanical changes (regex find-replace for token names, AST-based codemod for prop renames), migration checklist (checkboxes for each change that teams can track), testing strategy (what to test after migration: visual regression, accessibility, functionality), and incremental migration path (can teams migrate component-by-component or must it be all-at-once, compatibility layer for running v3 and v4 simultaneously during transition). Includes a 'verify your migration' section with specific things to check"
    weight: 0.35
    description: "MigrationTools"
  - type: llm_judge
    criteria: "Response addresses the organizational side of migration — communication plan (announce months before, provide migration office hours, create a migration Slack channel), timeline guidance (recommended migration window, what to do if teams can't migrate immediately), support resources (FAQ from common migration issues, design system team availability for pairing sessions), and success tracking (how to track which teams have migrated, dashboard showing migration status). Learns from the v2→v3 failure: what went wrong and how v4 migration is different"
    weight: 0.30
    description: "OrganizationalMigration"
