meta:
  id: advanced-design-system-docs-shift
  level: 3
  course: design-system-documentation
  type: output
  description: "Advanced design system docs shift — handle a week of complex documentation challenges including migration, cross-platform, and metrics reporting"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You're a senior design system documentarian. Your week:

  MONDAY — The mobile team launches iOS components for the
  first time. They've built 20 core components in SwiftUI
  matching the web design system. You need to add iOS
  documentation alongside the existing web docs without
  restructuring the entire site. How do you integrate it?

  WEDNESDAY — A product team reports that they're building
  a complex data visualization dashboard and can't find
  guidance in the design system. They need: chart color
  palettes, data-dense layout patterns, loading states for
  live data, and number formatting. None of this exists.
  How do you document data visualization patterns quickly?

  FRIDAY — Quarterly leadership review. Your VP asks: "Show
  me the design system ROI. How much time and money has it
  saved us?" You have: npm download data, Storybook analytics,
  and anecdotal feedback from 3 team leads. How do you build
  a compelling report?

  Task: Address all three challenges with strategic
  documentation responses.

assertions:
  - type: llm_judge
    criteria: "Response designs the iOS documentation integration — practical approach: add platform tabs (Web | iOS) to each component page, shared sections (purpose, anatomy, usage guidelines) remain platform-agnostic, platform-specific sections added under tabs (SwiftUI code examples, iOS-specific interaction patterns, iOS accessibility APIs). Prioritization: document the 20 iOS components by usage frequency (most-used first), create a 'Getting Started with iOS' page, and establish a template so the mobile team can contribute iOS docs. Addresses the 60 web-only components: mark as 'Web only' with an 'iOS coming soon' or 'Request iOS version' flag"
    weight: 0.35
    description: "iOSIntegration"
  - type: llm_judge
    criteria: "Response creates data visualization pattern documentation — chart color palette (accessible, distinguishable, sequential and diverging scales), data-dense layout patterns (dashboard grid with consistent card sizes, information hierarchy in dashboards), loading states for live data (skeleton charts, real-time update indicators, stale data warnings), and number formatting (abbreviation rules: 1K, 1M, 1B; decimal precision; locale-aware formatting). Pragmatic approach: create a 'Data Visualization' section with essential patterns now, mark as 'living document' for expansion. Provides enough for the team to unblock immediately"
    weight: 0.35
    description: "DataVisualizationDocs"
  - type: llm_judge
    criteria: "Response builds a compelling ROI report from limited data — constructs the narrative from available data: npm downloads showing adoption growth, Storybook analytics showing which components are referenced most, team lead quotes providing qualitative evidence. Fills gaps with reasonable estimates: developer time saved per component (industry benchmark: 2-4 hours per component instance avoided), consistency value (reduced QA cycles), and onboarding acceleration (new developers productive faster with documented system). Presents in executive-friendly format: headline metric, supporting evidence, forward-looking projections"
    weight: 0.30
    description: "ROIReport"
