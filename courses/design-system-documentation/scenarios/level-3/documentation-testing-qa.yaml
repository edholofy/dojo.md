meta:
  id: documentation-testing-qa
  level: 3
  course: design-system-documentation
  type: output
  description: "Documentation testing and QA — establish quality assurance processes for design system documentation including accuracy, completeness, and usability testing"
  tags: [testing, QA, accuracy, completeness, usability, advanced]

state: {}

trigger: |
  A senior designer says: "Our design system docs have a trust
  problem. Common complaints:

  - 'The code example doesn't work — it imports from the wrong
    path'
  - 'The docs show a prop that was removed 2 versions ago'
  - 'The accessibility spec says Tab behavior but the actual
    component uses Arrow keys'
  - 'The Figma component has 4 variants but the docs only
    describe 3'
  - 'I followed the getting started guide and got stuck at
    step 5 because the CLI command changed'

  People have stopped trusting the docs and go straight to
  the source code. How do I ensure our documentation is
  accurate, complete, and trustworthy?"

  Task: Design a documentation QA process that catches errors
  before they erode trust.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-layer documentation QA process — automated checks (code example testing: compile/render all code snippets in CI, prop table verification: auto-generate from source code to catch drift, link checking: broken link scanner, Figma-to-docs sync: variant count comparison), manual review (documentation review as part of component PR checklist, quarterly full-site audit, fresh-eyes testing by new team members), and user feedback (thumbs up/down on every page, 'Report an issue' button, analytics on page views and search-with-no-results as content gap signals)"
    weight: 0.35
    description: "QAProcess"
  - type: llm_judge
    criteria: "Response addresses docs-as-code for accuracy — keeping documentation in the same repository as component code (changes to the component trigger docs review), auto-generated sections (props table generated from TypeScript types, changelog generated from Git history, component preview rendered from actual component), and documentation CI pipeline (docs build fails if code examples have errors, visual regression tests for documentation screenshots, accessibility checks on the docs site itself). Explains how this prevents the specific complaints: wrong import paths caught by compilation, removed props caught by auto-generation, stale guides caught by CI testing"
    weight: 0.35
    description: "DocsAsCode"
  - type: llm_judge
    criteria: "Response covers documentation usability testing — how to test if docs are usable not just accurate: task-based testing (give a new developer a task and observe if they can complete it using only the docs), readability review (technical level appropriate for the audience, scannable format, clear headings), completeness audit (does every component have all required sections, gap analysis template), and freshness tracking (last-updated dates, staleness alerts for pages not updated in 6+ months). Includes a documentation quality scorecard that rates each page on accuracy, completeness, usability, and freshness"
    weight: 0.30
    description: "UsabilityTesting"
