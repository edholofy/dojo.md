meta:
  id: internationalization-docs
  level: 3
  course: design-system-documentation
  type: output
  description: "Internationalization documentation — document how design system components support internationalization including RTL, text expansion, and locale-specific formatting"
  tags: [i18n, RTL, localization, text-expansion, advanced]

state: {}

trigger: |
  A senior designer says: "Our product is expanding to Arabic,
  Hebrew, Japanese, and German markets. Our design system docs
  say nothing about internationalization. Developers ask:

  - 'Does the Sidebar component flip for RTL languages?'
  - 'The Button overflows when German text is 40% longer'
  - 'How should dates display in Japanese (2024年3月15日)?'
  - 'Icons with directional meaning (arrows, progress bars) —
    do they mirror for RTL?'
  - 'Where do I put the currency symbol for different locales?'

  How do I add internationalization documentation to our
  design system?"

  Task: Write internationalization documentation for the
  design system covering RTL, text expansion, formatting,
  and cultural adaptation.

assertions:
  - type: llm_judge
    criteria: "Response documents RTL support comprehensively — what mirrors in RTL (layout direction, text alignment, directional icons like arrows and chevrons, progress bars, navigation order, reading order) and what doesn't mirror (non-directional icons like search/settings, media playback controls, phone numbers, logos). Component-specific RTL specs: Sidebar flips to right side, horizontal navigation reverses, checkboxes move to right side of labels, breadcrumbs reverse order. Includes visual examples or descriptions showing LTR vs RTL layouts. Explains CSS logical properties (margin-inline-start instead of margin-left)"
    weight: 0.35
    description: "RTLDocumentation"
  - type: llm_judge
    criteria: "Response addresses text expansion and formatting — text expansion guidelines (German text is 30-40% longer than English, plan for expansion in all text containers), design rules for handling expansion (min/max widths, text wrapping behavior, truncation rules per component), locale-specific formatting documentation (date formats by locale, number formatting, currency display rules, address format variations), and CJK-specific considerations (Japanese text may be taller, line-breaking rules differ, no word spacing). Practical component guidelines: Button max width handling, Table column resizing for expanded text, Modal content overflow"
    weight: 0.35
    description: "TextExpansionFormatting"
  - type: llm_judge
    criteria: "Response creates a practical i18n checklist for components — developer checklist for i18n-ready components (use logical properties not physical, externalize all strings, support bidirectional text, handle text overflow gracefully, use locale-aware formatting for dates/numbers/currencies, test with RTL languages and long German strings), designer checklist (design with text expansion in mind, mark directional elements that should mirror, avoid text in images, use universal icons where possible), and a testing protocol (how to test RTL: browser direction toggle, translation pseudolocalization for expansion testing). Provides i18n documentation template for each component"
    weight: 0.30
    description: "I18nChecklist"
