meta:
  id: advanced-prioritization-shift
  level: 3
  course: feature-request-handling
  type: output
  description: "Handle an advanced feature prioritization shift where strategic context changes mid-cycle, requiring rapid reprioritization"
  tags: [feature-requests, reprioritization, strategic-shift, advanced]

state: {}

trigger: |
  You're a senior PM at "CloudCRM" ($90M ARR, 12,000 customers). It's
  the start of Q2 and you've just finalized the quarterly roadmap.
  Then everything changes in one week.

  Your approved Q2 roadmap:
  1. Advanced email sequences (customer requested, 8 weeks)
  2. LinkedIn Sales Navigator integration (sales team, 4 weeks)
  3. Custom reporting builder (enterprise, 6 weeks)
  4. Performance optimization sprint (engineering, 2 weeks)

  Week 1 changes:

  Monday: A major competitor (30% market share) announces they're
  being acquired by Microsoft. This will give them deep Office 365
  integration. Your CTO says: "Our Office integration is basic. We
  need to accelerate this or we'll lose customers."

  Wednesday: Your largest customer ($3M/year, 8% of ARR) announces
  they're evaluating alternatives because your API doesn't support
  their new workflow requirements. Their contract renews in 90 days.

  Thursday: Apple announces a new privacy feature in iOS that will
  break email open tracking — the foundation of your email sequences
  feature (roadmap item #1).

  Friday: The CEO reads a Goldman Sachs report predicting that "AI
  CRM" will be a $50B market by 2028. She says: "We need an AI
  strategy. What can we ship in Q2?"

  Tasks:
  1. How do you triage these 4 disruptions? Which ones actually
     require roadmap changes and which are noise?

  2. Propose the revised Q2 roadmap. What stays, what goes, what's
     new? Justify each change.

  3. The team is demoralized — they just committed to a plan that's
     now changing. How do you communicate the reprioritization without
     creating a culture of "roadmaps don't matter"?

  4. How do you prevent reactive planning from becoming the norm?
     Design a framework for evaluating mid-cycle disruptions.

assertions:
  - type: llm_judge
    criteria: "Triage separates signal from noise — the largest customer churn risk and Apple privacy change are concrete threats requiring action, while the competitor acquisition and CEO AI interest need evaluation before reacting"
    weight: 0.25
    description: "Signal vs noise triage"
  - type: llm_judge
    criteria: "Revised roadmap preserves some stability — doesn't throw out the entire plan but makes targeted swaps, keeping team morale and execution momentum"
    weight: 0.25
    description: "Stability-preserving revision"
  - type: llm_judge
    criteria: "Team communication validates the original plan — explains that the plan was right with the information available, and that adapting to new information is a strength, not a failure"
    weight: 0.25
    description: "Morale-preserving communication"
  - type: llm_judge
    criteria: "Mid-cycle evaluation framework has criteria — proposes a threshold for when disruptions warrant roadmap changes (e.g., revenue at risk, competitive threat level, irreversibility) vs when to stay the course"
    weight: 0.25
    description: "Disruption evaluation framework"
