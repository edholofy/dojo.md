meta:
  id: data-driven-prioritization
  level: 3
  course: feature-request-handling
  type: output
  description: "Use product analytics, cohort analysis, and usage data to validate or challenge feature request priorities"
  tags: [feature-requests, analytics, data-driven, cohort-analysis, advanced]

state: {}

trigger: |
  You're a PM at "AnalyticsPro" (business intelligence tool, $50M ARR,
  8,000 customers). The product team has been prioritizing based on
  request volume, but the VP of Product wants to shift to data-driven
  prioritization.

  She provides you with analytics data alongside the feature requests:

  Feature Request A: "Add Slack notifications for report updates"
  - Votes: 350 (3rd most requested)
  - Usage data: Only 12% of users have connected any integration
  - Cohort data: Users with integrations retain at 95% vs 75% without
  - Insight: High-retaining behavior, but low adoption

  Feature Request B: "Improve chart customization"
  - Votes: 500 (1st most requested)
  - Usage data: 80% of users create at least 1 chart per week
  - Cohort data: Chart customization usage has no correlation with
    retention or expansion
  - Insight: Widely used feature, but improvement doesn't drive outcomes

  Feature Request C: "Add cohort analysis feature"
  - Votes: 80 (15th most requested)
  - Usage data: N/A (doesn't exist yet)
  - Cohort data: 40% of churned customers cited "not enough analysis
    tools" as a reason for leaving. Competitor's cohort feature is
    their #1 selling point.
  - Insight: Low votes but high strategic importance

  Feature Request D: "Mobile app"
  - Votes: 420 (2nd most requested)
  - Usage data: 3% of sessions are from mobile browsers
  - Cohort data: Mobile users have same retention as desktop users
  - Insight: High request volume but very low actual mobile usage

  Feature Request E: "Scheduled report delivery"
  - Votes: 200 (6th most requested)
  - Usage data: 60% of users export reports manually every week
  - Cohort data: Users who set up automated workflows retain at 92%
    vs 72% for manual users
  - Insight: Automation correlates strongly with retention

  Tasks:
  1. Rank these 5 features using ONLY the vote data. Then re-rank
     using the analytics data. How different are the two rankings?

  2. Feature B has the most votes but no retention impact. Feature C
     has few votes but strong strategic signal. How do you present
     this tension to stakeholders?

  3. Feature D (mobile app) has 420 votes but only 3% mobile usage.
     What explains this disconnect? What would you need to verify
     before deprioritizing it?

  4. Design the "data enrichment" process: For each new feature
     request, what analytics data should be automatically attached
     to give the PM a complete picture?

assertions:
  - type: llm_judge
    criteria: "Rankings differ significantly — vote-based puts chart customization and mobile app on top, while data-driven puts Slack integration and scheduled reports higher due to retention correlation"
    weight: 0.25
    description: "Significant ranking difference"
  - type: llm_judge
    criteria: "Tension presentation is diplomatic — doesn't dismiss votes but explains that vote volume measures desire while analytics measures business impact, using specific numbers"
    weight: 0.25
    description: "Diplomatic data vs votes presentation"
  - type: llm_judge
    criteria: "Mobile disconnect is explored — proposes explanations (aspiration vs behavior, future need, competitive comparison) and suggests verifying with interviews before deprioritizing"
    weight: 0.25
    description: "Mobile disconnect explored"
  - type: llm_judge
    criteria: "Data enrichment process is automated — proposes attaching usage frequency, retention correlation, churn mention rate, and segment breakdown automatically to each request"
    weight: 0.25
    description: "Automated data enrichment"
