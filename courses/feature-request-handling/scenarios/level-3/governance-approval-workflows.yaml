meta:
  id: governance-approval-workflows
  level: 3
  course: feature-request-handling
  type: output
  description: "Design a feature request governance framework with approval workflows, decision rights, and accountability structures"
  tags: [feature-requests, governance, approval, decision-rights, advanced]

state: {}

trigger: |
  You're the VP of Product at "EnterpriseSuite" ($200M ARR, 400
  engineers, 15 products). Feature decisions are currently chaotic:

  Problems:
  - Any VP can add items to any product's backlog
  - The CEO regularly overrides sprint plans with "urgent" requests
  - Sales promises features to close deals without PM approval
  - No clear decision rights: who approves a feature for development?
  - Features ship without product validation (engineering builds
    what they think is right)
  - 30% of shipped features have <5% adoption (built wrong thing)

  Recent incident: Sales promised a $500K prospect that Feature X
  would ship in Q2. Engineering estimated 6 months. The CEO told
  engineering to "make it happen." Feature X shipped in 4 months
  with significant technical debt and no PM validation. The prospect
  signed but Feature X is now the company's most buggy feature.

  The CEO says: "We need guardrails, but I don't want bureaucracy.
  How do we make better decisions faster?"

  Tasks:
  1. Design the feature governance framework:
     - Who can submit feature requests? (Everyone)
     - Who can approve features for development? (Not everyone)
     - What approval levels exist based on feature size?
       (Small = PM, Medium = PM + Eng Lead, Large = Product Council)
     - What's the escalation path when someone disagrees?

  2. Design the "Product Council" — the governance body for major
     feature decisions:
     - Who sits on it? How often does it meet?
     - What criteria does it use to approve/reject?
     - How do you prevent it from becoming a bottleneck?

  3. How do you prevent the sales-driven incident from recurring?
     Design a policy for sales commitments about unbuilt features.

  4. The CEO wants to maintain the ability to override priorities for
     genuinely urgent business needs. Design the "executive override"
     process — how does it work without undermining the governance?

assertions:
  - type: llm_judge
    criteria: "Governance tiers are proportional — small features need lightweight approval (PM sign-off), medium features need PM + engineering alignment, large features need cross-functional council"
    weight: 0.25
    description: "Proportional governance tiers"
  - type: llm_judge
    criteria: "Sales commitment policy is concrete — proposes a rule like 'sales cannot commit to unbuilt features without PM sign-off' with consequences for violations"
    weight: 0.25
    description: "Concrete sales policy"
  - type: llm_judge
    criteria: "Executive override has accountability — allows CEO overrides but requires documentation of the business case, trade-off acknowledgment, and post-mortem if the override feature underperforms"
    weight: 0.25
    description: "Accountable executive override"
  - type: llm_judge
    criteria: "Anti-bureaucracy measures are built in — proposes fast-track paths for small features, time-boxed council meetings, and async approval for clear-cut decisions"
    weight: 0.25
    description: "Anti-bureaucracy safeguards"
