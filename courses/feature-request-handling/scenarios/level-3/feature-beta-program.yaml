meta:
  id: feature-beta-program
  level: 3
  course: feature-request-handling
  type: output
  description: "Design and run a beta program to validate a feature before general release, using requesters as beta participants"
  tags: [feature-requests, beta, validation, launch, advanced]

state: {}

trigger: |
  You're a PM at "DocSign" (e-signature platform, $45M ARR). You've
  been building the #1 requested feature for 4 months: "Document
  Templates" — the ability to create reusable signature templates
  for recurring documents.

  Template feature details:
  - 600 customers requested this over 2 years
  - Development is 80% complete, launching in 6 weeks
  - Templates will support: custom fields, signing order, conditional
    logic, and branding

  Your VP wants a beta program before general release. "We can't
  afford to launch this wrong. 600 people are watching."

  Beta program constraints:
  - Engineering can support 50 beta users max (limited to supporting
    bug reports and feedback from this group)
  - Beta period: 3 weeks before general release
  - Beta users will see an "early access" version with potential bugs
  - You need feedback on: usability, missing functionality, edge cases

  Complications:
  - Customer A ($200K/year) has been asking for templates for 18 months
    and expects to be first. Their use case is complex (legal docs with
    50+ fields).
  - Customer B is a product reviewer who blogs about DocSign. If they
    get early access, they'll write about it (good and bad).
  - Customer C submitted the original template request 2 years ago
    but has since churned. They left because of this missing feature.
  - Customer D is a competitor's customer who expressed interest in
    switching IF templates are available.
  - 80% of the 600 requesters are on your basic plan ($20/month) and
    templates will be a Pro feature ($50/month).

  Tasks:
  1. Design the beta program: Selection criteria for 50 participants,
     onboarding process, feedback collection, and success metrics.

  2. Handle the complicated participants:
     - Customer A expects to be first. Their complex use case might
       break the beta. Include or exclude?
     - Customer B will write about it publicly. Include or exclude?
     - Customer C churned. Try to win them back through the beta?
     - Customer D is a competitor's customer. Include or exclude?

  3. How do you handle the 550 requesters NOT in the beta who see
     others getting early access? Some will feel snubbed.

  4. Templates are a Pro feature, but 80% of requesters are on Basic.
     How do you communicate the pricing to customers who've waited
     2 years for a feature that now requires an upgrade?

assertions:
  - type: llm_judge
    criteria: "Selection criteria are diverse — includes a mix of plan tiers, use case complexity, industry verticals, and engagement levels, not just the biggest customers"
    weight: 0.25
    description: "Diverse beta selection"
  - type: llm_judge
    criteria: "Complex participants are handled individually — Customer A is included with expectations managed, Customer B decision weighs PR risk/reward, Customer C is a strategic win-back opportunity"
    weight: 0.25
    description: "Individual participant decisions"
  - type: llm_judge
    criteria: "Non-beta requester communication is proactive — informs them of the timeline, explains beta selection, and makes them feel valued (e.g., priority access after beta)"
    weight: 0.25
    description: "Proactive non-beta communication"
  - type: llm_judge
    criteria: "Pricing communication is empathetic — acknowledges that customers waited 2 years and now face a paywall, proposes a transition path (trial, discount, grandfathering) rather than a hard paywall"
    weight: 0.25
    description: "Empathetic pricing communication"
