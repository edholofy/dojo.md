meta:
  id: multi-product-prioritization
  level: 3
  course: feature-request-handling
  type: output
  description: "Prioritize feature requests across multiple products that share engineering resources and have different customer bases"
  tags: [feature-requests, multi-product, portfolio, resource-allocation, advanced]

state: {}

trigger: |
  You're the VP of Product at "SuiteCorp" ($120M ARR) which has 3
  products sharing a pool of 150 engineers:

  Product A: "SuiteHR" (HR management, $60M ARR, 3,000 customers)
  - Mature product, market leader, growing 15% YoY
  - Top request: AI resume screening (200 requests)
  - Current allocation: 70 engineers

  Product B: "SuitePay" (payroll, $40M ARR, 2,000 customers)
  - Growth product, #3 in market, growing 40% YoY
  - Top request: Multi-state tax compliance (300 requests, blocking
    sales in 15 states)
  - Current allocation: 50 engineers

  Product C: "SuiteLearn" (LMS, $20M ARR, 1,000 customers)
  - New product (launched 18 months ago), growing 80% YoY
  - Top request: SCORM compliance (150 requests, table stakes)
  - Current allocation: 30 engineers

  Cross-product request: "Single sign-on across all Suite products"
  - 500 customers have requested this
  - Would require 6 engineers for 3 months from a shared platform team
  - Customers using 2+ products retain at 97% vs 82% for single-product

  The CEO wants you to reallocate engineers for next year. Each
  product PM is lobbying for more resources. The CEO asks:

  "Should we invest where the revenue is (SuiteHR), where the growth
  is (SuitePay/SuiteLearn), or where the cross-product synergy is?"

  Tasks:
  1. How do you allocate 150 engineers across 3 products + a platform
     team? Justify your allocation with data.

  2. The cross-product SSO request has the most votes. But it requires
     taking engineers from product teams. How do you fund the platform
     team without weakening products?

  3. Each product PM's top request is their #1 priority. But you can
     only fully fund 2 of the 3. Which one gets deferred, and how
     do you communicate this?

  4. Design the cross-product feature request process: When a request
     affects multiple products, who owns the decision?

assertions:
  - type: llm_judge
    criteria: "Allocation considers growth trajectory — doesn't just give the most engineers to the biggest product (SuiteHR) but invests disproportionately in high-growth products (SuitePay, SuiteLearn)"
    weight: 0.25
    description: "Growth-aware allocation"
  - type: llm_judge
    criteria: "Platform team is explicitly funded — creates a dedicated allocation for cross-product features (SSO) rather than trying to share engineers across products"
    weight: 0.25
    description: "Explicit platform funding"
  - type: llm_judge
    criteria: "Deferral communication is strategic — explains that the deferred feature isn't rejected, just sequenced, and connects the decision to company-wide priorities"
    weight: 0.25
    description: "Strategic deferral communication"
  - type: llm_judge
    criteria: "Cross-product process has clear ownership — proposes a platform PM or product council to own cross-product requests rather than letting them fall between product teams"
    weight: 0.25
    description: "Clear cross-product ownership"
