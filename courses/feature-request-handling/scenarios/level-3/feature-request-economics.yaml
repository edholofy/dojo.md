meta:
  id: feature-request-economics
  level: 3
  course: feature-request-handling
  type: output
  description: "Apply economic analysis to feature decisions — calculate ROI, estimate cost of delay, and build business cases for feature investments"
  tags: [feature-requests, economics, ROI, cost-of-delay, advanced]

state: {}

trigger: |
  You're a PM at "PayrollPro" (payroll SaaS, $100M ARR, 10,000
  customers). The CFO is demanding that every feature request have a
  business case before engineering resources are allocated. "I want to
  see the ROI of every feature we build."

  You have 5 features competing for the next quarter. Engineering
  capacity: 8 person-months total.

  Feature 1: Multi-state tax calculation
  - Effort: 3 person-months
  - 300 customers requesting (all multi-state employers)
  - Average contract value of requesters: $25K/year
  - 40 of these customers are "at risk" of churning without it
  - Competitor launched this 6 months ago

  Feature 2: Employee self-service portal
  - Effort: 4 person-months
  - 500 customers requesting
  - Reduces admin support tickets by 30% (currently 8,000/month)
  - Support cost per ticket: $15
  - Also a sales enabler (mentioned by 20 prospects worth $1M total)

  Feature 3: Real-time payroll preview
  - Effort: 2 person-months
  - 150 customers requesting
  - Reduces payroll errors by 40% (current error rate: 3% of runs)
  - Each payroll error costs $200 in support + correction time
  - 10,000 payroll runs/month

  Feature 4: QuickBooks integration upgrade
  - Effort: 1 person-month
  - 800 customers requesting (most requested feature)
  - Current integration is "basic" — upgrade would sync all data
  - No direct revenue impact but highest satisfaction driver

  Feature 5: Contractor payment module
  - Effort: 5 person-months
  - 200 customers requesting
  - Opens new market segment (gig economy companies)
  - TAM for contractor payments: $500M
  - Would require new pricing tier

  Tasks:
  1. Build the ROI case for each feature. Calculate: expected revenue
     impact, cost savings, and cost of delay (what happens if you
     DON'T build this feature?).

  2. Given 8 person-months of capacity, which combination of features
     maximizes ROI? Show the math.

  3. Feature 5 has the biggest TAM but highest effort. How do you
     evaluate a "new market" feature against "serve existing customers
     better" features?

  4. The CFO wants to see a standardized "Feature Investment Memo"
     template. Design a 1-page format that works for all features.

assertions:
  - type: llm_judge
    criteria: "ROI calculations are quantified — each feature has dollar values for revenue at risk, cost savings, and opportunity cost, not just qualitative assessments"
    weight: 0.25
    description: "Quantified ROI calculations"
  - type: llm_judge
    criteria: "Combination optimization uses constraint — selects features that fit within 8 person-months while maximizing total ROI, potentially combining Features 1+3+4 (6 months) rather than picking the single highest-ROI feature"
    weight: 0.25
    description: "Constraint-optimized combination"
  - type: llm_judge
    criteria: "New market evaluation has a framework — proposes evaluating Feature 5 on TAM validation, go-to-market readiness, and cannibalization risk, not just total market size"
    weight: 0.25
    description: "New market evaluation framework"
  - type: llm_judge
    criteria: "Investment memo is practical — includes problem, proposed solution, expected ROI, cost, risks, and success metrics on a single page"
    weight: 0.25
    description: "Practical investment memo"
