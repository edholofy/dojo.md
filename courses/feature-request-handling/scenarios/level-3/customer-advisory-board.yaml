meta:
  id: customer-advisory-board
  level: 3
  course: feature-request-handling
  type: output
  description: "Design and run a customer advisory board that validates feature priorities, surfaces unmet needs, and creates advocates"
  tags: [feature-requests, advisory-board, customer-voice, validation, advanced]

state: {}

trigger: |
  You're the Director of Product at "TeamSync" (team collaboration
  platform, $75M ARR, 2,000 customers). The CEO wants you to launch
  a Customer Advisory Board (CAB) to validate product decisions.

  "We're building in a vacuum," she says. "I want 15-20 customers who
  represent our market to tell us if we're building the right things."

  Your customer base:
  - Enterprise (500+ employees): 200 customers, $200K avg contract
  - Mid-market (100-499 employees): 800 customers, $50K avg contract
  - SMB (10-99 employees): 1,000 customers, $10K avg contract

  Industries: Technology (40%), Financial Services (25%), Healthcare
  (15%), Education (10%), Other (10%)

  Challenges:
  - Your biggest customers are hard to get time with
  - Your smallest customers are easiest to recruit but may not
    represent strategic direction
  - Some customers will use the CAB to push their personal wish list
  - NDA concerns: sharing roadmap information with customers who may
    be competitors' customers too
  - Executive expectations: CEO expects the CAB to validate her vision,
    not necessarily challenge it

  Tasks:
  1. Design the CAB: How many members? What's the ideal composition
     (by segment, industry, persona)? Selection criteria?

  2. Design the first CAB meeting (90 minutes):
     - Agenda and structure
     - How do you present the roadmap for feedback without just getting
       confirmation bias?
     - What exercises or activities generate honest, actionable input?
     - How do you prevent one loud voice from dominating?

  3. The CAB votes and your top feature request (#1 on the public
     board) doesn't make the CAB's top 5. How do you reconcile CAB
     input with broader customer feedback?

  4. A CAB member keeps pushing their company's specific needs and
     getting frustrated when you don't prioritize them. How do you
     manage this relationship?

assertions:
  - type: llm_judge
    criteria: "Composition is representative — includes a mix of enterprise, mid-market, and SMB with industry diversity, not just the biggest or most vocal customers"
    weight: 0.25
    description: "Representative CAB composition"
  - type: llm_judge
    criteria: "Meeting design avoids confirmation bias — proposes activities like blind prioritization, problem-first (not solution-first) discussions, or competitive comparison exercises"
    weight: 0.25
    description: "Bias-resistant meeting design"
  - type: llm_judge
    criteria: "CAB vs public board reconciliation is thoughtful — explains that the CAB represents strategic customers while the public board reflects volume, and both signals are valid but weighted differently"
    weight: 0.25
    description: "Signal reconciliation approach"
  - type: llm_judge
    criteria: "Difficult member management is diplomatic — sets clear expectations about the CAB's advisory role vs decision-making role, while making the member feel valued"
    weight: 0.25
    description: "Diplomatic difficult member management"
