meta:
  id: jtbd-product-discovery
  level: 3
  course: feature-request-handling
  type: output
  description: "Apply the Jobs-to-Be-Done framework to transform raw feature requests into outcome-driven product opportunities"
  tags: [feature-requests, JTBD, discovery, outcomes, advanced]

state: {}

trigger: |
  You're a senior PM at "LearnPlatform" (corporate training LMS,
  $40M ARR, 500 enterprise customers). The product team has collected
  1,200 feature requests over the past year. Your VP of Product says:
  "Stop building features. Start understanding jobs."

  She wants you to apply Jobs-to-Be-Done (JTBD) to reframe your top
  feature requests as job statements.

  JTBD Format: "When I [situation], I want to [motivation], so I can
  [expected outcome]."

  Top 10 feature requests by volume:
  1. "Better reporting dashboard" (280 requests)
  2. "Mobile app" (220 requests)
  3. "SCORM compliance" (190 requests)
  4. "Gamification / badges" (170 requests)
  5. "AI-powered course recommendations" (150 requests)
  6. "Manager approval workflows" (140 requests)
  7. "Integration with Slack" (120 requests)
  8. "Video hosting (built-in)" (110 requests)
  9. "Multilingual support" (95 requests)
  10. "Custom certificates" (85 requests)

  Additional context from customer interviews:
  - L&D directors (#1 requesters) are constantly asked "what's the
    ROI of our training investment?" by CFOs
  - Learners complete only 35% of assigned courses
  - 40% of enterprise customers operate in 3+ countries
  - Managers don't know what their teams should learn next
  - Support tickets spike every time a customer tries to upload video

  Tasks:
  1. Convert the top 5 feature requests into JTBD statements. For
     each, identify the functional job, emotional job, and social job.

  2. After reframing, do the priorities change? Which "jobs" are most
     underserved based on the interview context?

  3. Request #1 (reporting) has 280 votes but really maps to multiple
     jobs: ROI measurement, compliance tracking, learner progress,
     manager visibility. How do you decompose it?

  4. Design a JTBD interview guide for "better reporting dashboard"
     that your team can use to discover the real jobs.

assertions:
  - type: llm_judge
    criteria: "JTBD statements capture the outcome, not the feature — 'better reporting' becomes 'demonstrate training ROI to CFO' or similar outcome-focused framing"
    weight: 0.25
    description: "Outcome-focused JTBD statements"
  - type: llm_judge
    criteria: "Priorities shift after JTBD reframing — features that address high-pain jobs (ROI justification, low completion rates) may outrank features with more votes but lower job urgency"
    weight: 0.25
    description: "JTBD shifts priorities"
  - type: llm_judge
    criteria: "Reporting decomposition identifies distinct jobs — separates ROI measurement (L&D directors to CFOs), compliance tracking (regulated industries), progress monitoring (managers), and self-assessment (learners)"
    weight: 0.25
    description: "Reporting decomposed into jobs"
  - type: llm_judge
    criteria: "Interview guide probes situations and outcomes — asks about when they need reports, who they share with, what decisions reports inform, and what happens when reports aren't available"
    weight: 0.25
    description: "Situation-focused interview guide"
