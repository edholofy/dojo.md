meta:
  id: feature-request-to-prd
  level: 3
  course: feature-request-handling
  type: output
  description: "Transform a cluster of related feature requests into a product requirements document that engineering can build from"
  tags: [feature-requests, PRD, requirements, specification, advanced]

state: {}

trigger: |
  You're a PM at "InvoiceCloud" (invoicing SaaS, $35M ARR, 15,000
  customers). After months of collecting feature requests, the #1
  theme is "better payment handling." But this theme contains 15
  distinct requests that need to be synthesized into a buildable PRD.

  Related feature requests:
  1. "Accept credit card payments on invoices" (400 requests)
  2. "Accept ACH/bank transfers" (200 requests)
  3. "Support partial payments" (180 requests)
  4. "Auto-send payment reminders before due date" (150 requests)
  5. "Auto-send overdue payment reminders" (140 requests)
  6. "Accept international payments (multi-currency)" (120 requests)
  7. "Recurring invoice auto-charging" (110 requests)
  8. "Payment plans / installments" (90 requests)
  9. "Payment receipt auto-generation" (80 requests)
  10. "Integration with Stripe" (70 requests)
  11. "Integration with PayPal" (60 requests)
  12. "Accept Apple Pay / Google Pay" (50 requests)
  13. "Late fee auto-calculation" (45 requests)
  14. "Payment analytics dashboard" (40 requests)
  15. "Accept crypto payments" (20 requests)

  Engineering constraints:
  - Team capacity: 4 engineers for 12 weeks
  - Must use a payment processor (build on Stripe or similar)
  - PCI compliance is required for any credit card handling
  - International payments add 3 weeks for currency conversion

  Customer context:
  - 70% of invoices are paid late (average 12 days past due)
  - 30% of customers are international
  - Average invoice size: $2,500
  - Most customers use QuickBooks or Xero for accounting

  Tasks:
  1. Scope the PRD: Given 12 weeks and 4 engineers, which requests
     make the cut for v1? Which are v2? Which are out of scope?

  2. Write the PRD for v1 with: Problem statement, Goals and success
     metrics, User stories, Requirements (must have / nice to have),
     Out of scope, Technical considerations.

  3. How do you handle the gap between what customers asked for (15
     features) and what you're building in v1 (subset)? Write the
     communication plan.

  4. Define the success metrics: How do you know if this feature was
     worth building? What does success look like at 30/60/90 days?

assertions:
  - type: llm_judge
    criteria: "Scoping is realistic — v1 focuses on highest-impact, lowest-risk items (Stripe integration, credit card payments, payment reminders) rather than trying to build everything in 12 weeks"
    weight: 0.25
    description: "Realistic v1 scoping"
  - type: llm_judge
    criteria: "PRD includes success metrics — defines measurable goals like reducing late payment rate from 70% to X%, payment adoption rate, and time-to-payment reduction"
    weight: 0.25
    description: "Measurable PRD goals"
  - type: llm_judge
    criteria: "Communication plan is transparent — tells customers what's in v1, what's planned for v2, and what's being evaluated, without promising specific dates for v2"
    weight: 0.25
    description: "Transparent phasing communication"
  - type: llm_judge
    criteria: "PCI compliance is addressed — recognizes that credit card handling requires PCI compliance and proposes using Stripe's hosted fields or similar to minimize PCI scope"
    weight: 0.25
    description: "Compliance addressed in PRD"
