meta:
  id: cross-functional-alignment
  level: 3
  course: feature-request-handling
  type: output
  description: "Align product, engineering, sales, and customer success teams on feature priorities when each team has different objectives"
  tags: [feature-requests, cross-functional, alignment, stakeholders, advanced]

state: {}

trigger: |
  You're the VP of Product at "WorkflowPro" (workflow automation
  platform, $80M ARR, 200 engineers, 5,000 customers). The quarterly
  planning meeting is in one week, and every department has submitted
  their feature priorities. They don't align.

  Sales priorities (VP Sales: "Revenue is the only metric that matters"):
  1. Salesforce CRM integration (would close $3M in pipeline)
  2. Enterprise SSO (5 prospects require it for security compliance)
  3. Custom reporting for executives (sales demo differentiator)

  Customer Success priorities (VP CS: "Retention saves more than acquisition"):
  1. Workflow templates library (would reduce onboarding time by 40%)
  2. In-app guidance / tooltips (top support ticket driver)
  3. Usage analytics dashboard (help CS identify at-risk accounts)

  Engineering priorities (CTO: "We need to fix the foundation"):
  1. API refactoring (current API limits integrations, blocks 3 features)
  2. Performance optimization (dashboard load times increasing 10%/month)
  3. Automated testing infrastructure (releases taking 3x longer)

  Product priorities (you, based on customer research):
  1. AI workflow builder (biggest market opportunity, $20M TAM)
  2. Mobile app (fastest growing request, market shifting to mobile)
  3. Marketplace for custom integrations (ecosystem play)

  The CEO says: "I don't want politics. I want a plan that makes
  everyone feel heard but prioritizes what matters most for the
  business. You have 200 engineers and can do roughly 8 major features
  this year."

  Tasks:
  1. Evaluate all 12 priorities: Score each on revenue impact, retention
     impact, strategic importance, and feasibility. Produce a unified
     ranking.

  2. Select 8 features for the year. How do you ensure each department
     sees their priorities represented without just picking 2 from each?

  3. The CTO's infrastructure work (API refactoring, performance,
     testing) is invisible to customers but enables future features.
     How much capacity should you reserve for this? Justify to the CEO.

  4. Write the all-hands communication that announces the plan. How
     do you frame it so the Sales VP doesn't feel their priorities
     were dismissed?

assertions:
  - type: llm_judge
    criteria: "Unified ranking uses consistent criteria — all 12 features are scored on the same dimensions rather than each department's features being evaluated differently"
    weight: 0.25
    description: "Consistent cross-functional scoring"
  - type: llm_judge
    criteria: "Infrastructure gets dedicated capacity — proposes reserving 20-30% of engineering capacity for CTO's priorities (API, performance, testing) as enablers for everything else"
    weight: 0.25
    description: "Infrastructure capacity reserved"
  - type: llm_judge
    criteria: "Selection balances present and future — includes both immediate revenue drivers (Salesforce integration) and strategic investments (AI workflow builder), explaining the balance"
    weight: 0.25
    description: "Present vs future balanced"
  - type: llm_judge
    criteria: "Communication frames choices positively — explains what IS being built and why, not what was rejected, connecting each chosen feature to company goals"
    weight: 0.25
    description: "Positive framing communication"
