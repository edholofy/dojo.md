meta:
  id: b2b-enterprise-requests
  level: 2
  course: feature-request-handling
  type: output
  description: "Handle feature requests from enterprise B2B customers where contract pressure, multi-stakeholder dynamics, and revenue concentration complicate prioritization"
  tags: [feature-requests, B2B, enterprise, contracts, intermediate]

state: {}

trigger: |
  You're a PM at "DataPipe" (data integration platform, $30M ARR, 200
  customers). Your customer base is 70% enterprise ($100K+ contracts)
  and 30% SMB ($5K-$20K contracts).

  Three enterprise situations need your attention:

  Situation 1: Contract-driven feature
  MegaCorp ($800K/year, your largest customer) is negotiating renewal.
  Their CISO demands: "We need FedRAMP certification and SOC 2 Type II
  compliance reporting built into the platform by Q3, or we're moving
  to Competitor X." Your compliance roadmap has this planned for Q4.

  Situation 2: Multi-stakeholder conflict
  TechGlobal ($300K/year) has submitted feature requests from 4
  different departments:
  - IT: "We need SSO with our custom SAML provider" (blocking rollout)
  - Data Team: "We need real-time streaming, not just batch processing"
  - Finance: "We need usage-based billing reports per department"
  - VP Engineering: "We need a GraphQL API, your REST API is outdated"
  All are marked "critical" by the account team.

  Situation 3: Small customer, big feature
  StartupCo ($8K/year) requests a feature that would benefit 50% of
  your customer base: "We need a visual pipeline builder — dragging
  and dropping instead of writing YAML configs." Your support data
  shows YAML complexity is the #1 support ticket driver.

  Tasks:
  1. How do you handle MegaCorp's demand to accelerate compliance?
     What are the risks of saying yes? Of saying no?

  2. TechGlobal has 4 "critical" requests. How do you prioritize among
     them? What questions do you ask the account team?

  3. StartupCo's $8K contract doesn't justify a major feature. But the
     request has broad appeal. How do you balance customer size vs.
     request quality?

  4. Design a policy for handling enterprise feature requests that
     prevents the "biggest customer always wins" trap.

assertions:
  - type: llm_judge
    criteria: "MegaCorp analysis weighs both sides — accelerating compliance has resource cost and opportunity cost, but losing $800K/year has direct revenue impact; presents a balanced risk assessment"
    weight: 0.25
    description: "Balanced enterprise risk assessment"
  - type: llm_judge
    criteria: "TechGlobal prioritization asks about blocking impact — identifies SSO as likely highest priority because it's blocking rollout (adoption at risk), then asks which other requests affect renewal"
    weight: 0.25
    description: "Blocking-impact prioritization"
  - type: llm_judge
    criteria: "StartupCo request is evaluated on merit, not contract size — recognizes that the visual pipeline builder serves the broader customer base and shouldn't be dismissed because the requester is small"
    weight: 0.25
    description: "Merit over contract size"
  - type: llm_judge
    criteria: "Enterprise policy includes guardrails — proposes limits on custom development, evaluation criteria beyond contract value, and a process that considers total customer base impact"
    weight: 0.25
    description: "Guardrail enterprise policy"
