meta:
  id: kano-model-analysis
  level: 2
  course: feature-request-handling
  type: output
  description: "Apply the Kano model to categorize feature requests as basic needs, performance needs, or delighters to inform prioritization strategy"
  tags: [feature-requests, Kano, satisfaction, categorization, intermediate]

state: {}

trigger: |
  You're a product manager at "FitTrack" (fitness tracking app, 100,000
  users). You've conducted a Kano survey where users rated how they'd
  feel if a feature was present (functional question) and absent
  (dysfunctional question).

  The Kano model categories:
  - Must-be (Basic): Expected. Absence = dissatisfaction. Presence ≠
    satisfaction. (Like seatbelts in a car.)
  - One-dimensional (Performance): More = better. Linear relationship
    with satisfaction. (Like fuel efficiency.)
  - Attractive (Delighter): Not expected. Presence = delight. Absence
    ≠ dissatisfaction. (Like heated seats.)
  - Indifferent: Users don't care either way.
  - Reverse: Some users actively don't want this feature.

  Survey results for 10 feature requests:

  1. Crash fixes (app crashes 2x/week for 30% of users)
     If present: Expected | If absent: Very frustrated

  2. Faster sync speed (currently 15 seconds)
     If present: Happy | If absent: Unhappy

  3. Social workout challenges with friends
     If present: Excited | If absent: Neutral

  4. Apple Health / Google Fit integration
     If present: Expected | If absent: Frustrated

  5. AI-generated personalized workout plans
     If present: Very excited | If absent: Neutral

  6. Heart rate zone training alerts
     If present: Happy | If absent: Slightly unhappy

  7. Data export to CSV
     If present: Neutral | If absent: Neutral

  8. Gamification (badges, streaks, leaderboards)
     If present: Mixed (some excited, some annoyed) | If absent: Neutral

  9. GPS route tracking for outdoor runs
     If present: Happy | If absent: Unhappy

  10. Motivational push notifications
      If present: Mixed (some like it, some find it annoying) |
      If absent: Neutral

  Tasks:
  1. Classify each feature into a Kano category and explain your
     reasoning.

  2. Based on the Kano analysis, what's the optimal build order?
     (Hint: Must-be first, then Performance, then Delighters)

  3. Feature 8 (gamification) and Feature 10 (motivational notifications)
     got "mixed" reactions — some users love them, others hate them.
     How do you handle features that are Attractive for some users
     but Reverse for others?

  4. Feature 5 (AI workout plans) is a delighter today. But in 12
     months, every competitor might have it. How does the Kano
     category shift over time?

assertions:
  - type: llm_judge
    criteria: "Classifications are correct — crash fixes and Apple Health are Must-be, sync speed and GPS are One-dimensional, AI workouts and social challenges are Attractive, CSV export is Indifferent"
    weight: 0.25
    description: "Correct Kano classifications"
  - type: llm_judge
    criteria: "Build order follows Kano logic — Must-be features (crash fixes, integration) come first because their absence causes dissatisfaction, even though they don't 'delight'"
    weight: 0.25
    description: "Kano-driven build order"
  - type: llm_judge
    criteria: "Mixed-reaction features get a nuanced approach — proposes making gamification optional/configurable or segment-targeted rather than forcing it on all users"
    weight: 0.25
    description: "Nuanced mixed-reaction handling"
  - type: llm_judge
    criteria: "Kano decay is explained — recognizes that today's Delighters become tomorrow's Must-be features as competitors adopt them and user expectations rise"
    weight: 0.25
    description: "Kano category decay understood"
