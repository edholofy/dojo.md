meta:
  id: feature-request-metrics
  level: 2
  course: feature-request-handling
  type: output
  description: "Set up metrics and tracking to measure the effectiveness of your feature request handling process"
  tags: [feature-requests, metrics, tracking, process, intermediate]

state: {}

trigger: |
  You're a PM at "ProjectPro" (project management tool, $25M ARR).
  Your VP asks: "We handle hundreds of feature requests a month, but
  we have no idea if we're doing a good job. What should we measure?"

  Current state (no metrics):
  - 300 feature requests filed monthly
  - No tracking of request-to-ship time
  - No measurement of customer satisfaction with request handling
  - No way to know if shipped features were actually requested
  - No connection between requests and retention/churn data

  You pull some raw data:
  - 3,200 total open feature requests
  - Average request age: 14 months
  - Last 10 shipped features: 6 were customer-requested, 4 were
    internally-driven
  - 200 requests were closed in the last quarter (40 shipped, 80
    declined, 80 auto-closed as stale)
  - Customer satisfaction with "how we handle feedback": 3.2/5

  You know that the industry benchmark for customer-to-feature
  influence rate is 40-60% (percentage of shipped features that
  originated from customer requests).

  Tasks:
  1. Define 6-8 key metrics for the feature request process. For each
     metric, specify: What it measures, how to calculate it, what a
     good target is, and why it matters.

  2. Looking at the raw data, what's the current health of the process?
     What's working and what's broken?

  3. The VP asks: "If we improve these metrics, does it actually
     improve business outcomes?" How do you connect feature request
     metrics to revenue, retention, and NPS?

  4. Design a monthly dashboard that the VP can review in 5 minutes.

assertions:
  - type: llm_judge
    criteria: "Metrics cover the full lifecycle — includes intake metrics (volume, categorization), processing metrics (time to triage, time to decision), outcome metrics (shipped rate, customer satisfaction), and business metrics (feature-influenced retention)"
    weight: 0.25
    description: "Full-lifecycle metrics"
  - type: llm_judge
    criteria: "Current state diagnosis is specific — identifies that 14-month average age and 3,200 open requests signal a broken process, and 60% customer-to-feature rate is acceptable but satisfaction is low"
    weight: 0.25
    description: "Specific current state diagnosis"
  - type: llm_judge
    criteria: "Business outcome connection is quantified — proposes tracking whether customers whose requests were shipped have higher retention than those whose requests were declined"
    weight: 0.25
    description: "Quantified business connection"
  - type: llm_judge
    criteria: "Dashboard is concise — proposes 4-6 key metrics on a single view that tells a story, not 20 charts that overwhelm"
    weight: 0.25
    description: "Concise dashboard design"
