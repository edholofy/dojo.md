meta:
  id: competitive-feature-requests
  level: 2
  course: feature-request-handling
  type: output
  description: "Handle feature requests driven by competitive pressure — when customers say 'Competitor X has this' — without falling into the feature parity trap"
  tags: [feature-requests, competitive, strategy, feature-parity, intermediate]

state: {}

trigger: |
  You're a PM at "MailPro" (email marketing platform, $15M ARR, 8,000
  customers). Your main competitors are "MailRival" (market leader,
  $200M ARR) and "MailNew" (fast-growing startup, $5M ARR).

  This month, you've received several competitive feature requests:

  Request 1: "MailRival just launched AI subject line generation. We
  need this too or we'll lose customers."
  — From VP Sales. MailRival announced this at their conference last
  week. Your sales team is panicking.

  Request 2: "MailNew has a drag-and-drop email builder that's way
  better than yours. I'm considering switching."
  — From a $5K/year customer. You checked: MailNew's builder IS nicer.
  Your builder hasn't been updated in 2 years.

  Request 3: "Both MailRival and MailNew have SMS marketing. You're
  the only one without it. This is becoming a table-stakes feature."
  — From 3 enterprise prospects during sales calls.

  Request 4: "MailRival charges $500/month for what you charge $200.
  Can you add their advanced analytics features so I don't have to
  upgrade?"
  — From a customer who wants premium features at your price point.

  Request 5: "I read that MailNew is building a customer data platform
  (CDP). Are you building one too?"
  — From your biggest customer ($100K/year). MailNew hasn't even
  shipped this yet — it's a blog post about their vision.

  Tasks:
  1. For each request, classify it:
     - Table stakes (must have to compete)
     - Competitive advantage (would differentiate us)
     - Feature parity trap (copying for copying's sake)
     - Irrelevant (not our strategic direction)

  2. What's the right response to Request 1? The sales team is
     panicking about AI subject lines. Is panic justified?

  3. Request 2 (better email builder) and Request 3 (SMS marketing)
     are both competitive gaps. You can only build one this quarter.
     Which do you choose and why?

  4. How do you respond to Request 5 (CDP that hasn't shipped yet)?
     Your customer is worried about a vaporware feature.

assertions:
  - type: llm_judge
    criteria: "Classifications avoid knee-jerk reactions — AI subject lines might be hype (not table stakes yet), SMS is becoming table stakes (3 prospects mentioned it), better builder is a real competitive gap"
    weight: 0.25
    description: "Thoughtful competitive classification"
  - type: llm_judge
    criteria: "Sales panic is managed rationally — acknowledges the concern but proposes evaluating actual customer demand for AI subject lines before panic-building, checking if any customers have actually churned for this reason"
    weight: 0.25
    description: "Rational sales panic management"
  - type: llm_judge
    criteria: "Builder vs SMS decision uses strategic criteria — considers whether the gap is losing current customers (builder) vs blocking new sales (SMS), and which aligns with product strategy"
    weight: 0.25
    description: "Strategic gap prioritization"
  - type: llm_judge
    criteria: "Vaporware response is calm and strategic — doesn't promise to match an unshipped feature, instead focuses on current strengths and what the customer can do today"
    weight: 0.25
    description: "Calm vaporware response"
