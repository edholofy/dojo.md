meta:
  id: saying-no-to-big-customers
  level: 2
  course: feature-request-handling
  type: output
  description: "Navigate the difficult situation of declining feature requests from high-value enterprise customers without jeopardizing the relationship or contract"
  tags: [feature-requests, enterprise, saying-no, relationship, intermediate]

state: {}

trigger: |
  You're a PM at "SecureVault" (data security platform, $60M ARR).
  Your top 3 customers each represent significant revenue and each
  has a feature request that conflicts with your product strategy.

  Customer 1: "GlobalBank" ($2M/year, 8% of ARR)
  Request: "Build a custom on-premise deployment option. Our board
  won't allow any data in the cloud."
  Your strategy: Cloud-only SaaS. On-premise would require a separate
  codebase, dedicated support, and 4-6 months of engineering.
  Risk if you say no: They've started evaluating Competitor Z.

  Customer 2: "HealthCo" ($1.5M/year, 6% of ARR)
  Request: "Integrate with our proprietary legacy EHR system (no
  public API, requires custom development)."
  Your strategy: Standard integrations only. Custom integrations
  would set a precedent and consume disproportionate resources.
  Risk if you say no: Contract renewal in 90 days.

  Customer 3: "RetailGiant" ($1M/year, 4% of ARR)
  Request: "We want to white-label your platform and resell it to
  our franchise network."
  Your strategy: No reseller model. This would create channel conflict
  and require a completely different pricing/support structure.
  Risk if you say no: They represent a potential $5M expansion if
  they deploy to franchises.

  Tasks:
  1. For each customer, analyze: Can you accommodate this request?
     Should you? What are the true costs beyond engineering time?

  2. Write the "no" communication for Customer 1 (GlobalBank). You're
     declining their #1 request while they're evaluating a competitor.

  3. Customer 2 (HealthCo) has a renewal in 90 days. How do you say
     "no" to the integration while keeping the renewal on track?
     What alternatives can you offer?

  4. Customer 3 (RetailGiant) represents $5M in potential expansion.
     At what point does the revenue opportunity justify changing your
     product strategy? How do you evaluate this?

assertions:
  - type: llm_judge
    criteria: "Cost analysis goes beyond engineering — identifies that on-premise would create ongoing operational burden, custom integration sets a precedent, and white-labeling creates channel conflict"
    weight: 0.25
    description: "Beyond-engineering cost analysis"
  - type: llm_judge
    criteria: "GlobalBank response is firm but relationship-preserving — doesn't promise on-premise but offers alternatives (private cloud, dedicated tenant, compliance certifications) that address the underlying need"
    weight: 0.25
    description: "Firm but relationship-preserving"
  - type: llm_judge
    criteria: "HealthCo renewal strategy is proactive — proposes a conversation about what IS on the roadmap, explores workarounds (middleware, API development partnership), and addresses the renewal timeline directly"
    weight: 0.25
    description: "Proactive renewal strategy"
  - type: llm_judge
    criteria: "RetailGiant evaluation has a framework — proposes criteria for when revenue opportunity justifies strategy change (e.g., minimum commitment, market validation, alignment with long-term vision)"
    weight: 0.25
    description: "Strategy-change evaluation framework"
