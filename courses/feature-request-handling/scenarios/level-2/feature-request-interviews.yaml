meta:
  id: feature-request-interviews
  level: 2
  course: feature-request-handling
  type: output
  description: "Conduct customer interviews to dig deeper into feature requests and discover the real problem behind the asked-for solution"
  tags: [feature-requests, interviews, discovery, user-research, intermediate]

state: {}

trigger: |
  You're a PM at "BookingApp" (restaurant reservation platform, 3,000
  restaurant customers). Your top feature request this quarter is:
  "Add a waitlist feature" — 180 restaurants have asked for it.

  But your VP of Product warns: "Don't build what they ask for. Dig
  deeper. 'Waitlist' means different things to different restaurants."

  She gives you 5 customer interviews to conduct. Here are the
  restaurant profiles and their initial request:

  Restaurant A (Fine dining, 80 seats): "We need a waitlist for walk-
  ins. On Friday nights, we turn away 30-40 people because we're full."

  Restaurant B (Fast casual, 120 seats): "We need a waitlist so
  customers know how long they'll wait. They leave when the line
  looks long."

  Restaurant C (Popular brunch spot, 60 seats): "We need a waitlist
  integrated with our reservations. No-shows leave empty tables while
  walk-ins are waiting outside."

  Restaurant D (Bar & grill, 200 seats): "We need a waitlist because
  we want to stop taking reservations entirely. First come, first
  served — but organized."

  Restaurant E (Small café, 20 seats): "We don't need a waitlist
  exactly, but we want to text customers when their table is ready
  so they can browse nearby shops."

  Tasks:
  1. For each restaurant, write 3 discovery questions that dig into
     their real problem (not their requested solution).

  2. After the interviews, what do you learn? Are these all the same
     feature, or different features with the same name?

  3. If you can only build ONE version of the waitlist, what scope
     would satisfy the most restaurants? What trade-offs does this
     require?

  4. Restaurant D wants to eliminate reservations entirely. Should you
     accommodate this edge case, or is it outside your product vision
     as a reservation platform?

assertions:
  - type: llm_judge
    criteria: "Discovery questions probe the problem, not the solution — asks about the pain point (e.g., 'What happens when you turn people away?', 'How do you handle the situation today?') rather than 'What would the waitlist look like?'"
    weight: 0.25
    description: "Problem-focused discovery questions"
  - type: llm_judge
    criteria: "Analysis identifies distinct needs — recognizes that 'waitlist' means walk-in management (A), wait time estimation (B), no-show backfill (C), queue management (D), and notification system (E)"
    weight: 0.25
    description: "Distinct needs from same request"
  - type: llm_judge
    criteria: "MVP scope makes trade-offs explicit — proposes a core feature set that covers the most common need and clearly states what's excluded and why"
    weight: 0.25
    description: "Explicit MVP trade-offs"
  - type: llm_judge
    criteria: "Restaurant D edge case is thoughtfully handled — considers whether eliminating reservations conflicts with product vision, and proposes either accommodating it or explaining why it's out of scope"
    weight: 0.25
    description: "Edge case strategy"
