meta:
  id: internal-vs-external-requests
  level: 2
  course: feature-request-handling
  type: output
  description: "Navigate the tension between internal feature requests from leadership/engineering and external requests from customers"
  tags: [feature-requests, internal, external, stakeholders, intermediate]

state: {}

trigger: |
  You're a PM at "ReportHub" (business reporting SaaS, $20M ARR, 5,000
  customers). Feature requests come from two very different sources,
  and they frequently conflict.

  External requests (from customers):
  1. "We need better chart customization — colors, fonts, sizes" (320
     requests, #1 most requested)
  2. "Please add Salesforce integration" (180 requests)
  3. "We need a mobile-friendly report viewer" (150 requests)

  Internal requests (from your team):
  4. CEO: "We need to add AI-generated insights. Every competitor is
     talking about AI. This is existential." (No customer has asked
     for this.)
  5. CTO: "We need to migrate from our monolith to microservices.
     It's slowing down all development." (Customers don't see this
     directly.)
  6. VP Sales: "We need a self-serve trial. I'm losing 40% of
     prospects because they want to try before they buy." (Prospects
     aren't customers yet, so this doesn't show in customer requests.)
  7. Head of Design: "Our UI is from 2021. We need a full redesign.
     It looks dated compared to competitors." (Some customers agree,
     others say "don't change it.")

  Budget for next 2 quarters: capacity for 4 major features.

  Tasks:
  1. Evaluate all 7 requests. Which 4 do you recommend for the next
     2 quarters?

  2. The CEO's AI request has zero customer demand but strong executive
     conviction. How do you handle requests from powerful stakeholders
     that don't align with customer data?

  3. The CTO's microservices migration is invisible to customers but
     would speed up all future development by 30%. How do you factor
     infrastructure work into feature prioritization?

  4. Design a process that gives both internal and external voices
     appropriate weight without letting either dominate.

assertions:
  - type: llm_judge
    criteria: "Selection balances internal and external — doesn't only pick customer-requested features (ignoring strategic needs) or only pick leadership requests (ignoring customers)"
    weight: 0.25
    description: "Balanced internal/external selection"
  - type: llm_judge
    criteria: "CEO AI request is handled diplomatically — doesn't dismiss it but proposes validating demand first (customer interviews, prototype, spike) before committing full resources"
    weight: 0.25
    description: "Diplomatic executive handling"
  - type: llm_judge
    criteria: "Infrastructure work is valued — recognizes microservices migration as a force multiplier that accelerates all future features, even though customers don't see it"
    weight: 0.25
    description: "Infrastructure value recognized"
  - type: llm_judge
    criteria: "Process design prevents loudest-voice-wins — proposes a framework where requests are evaluated on shared criteria regardless of source"
    weight: 0.25
    description: "Source-agnostic evaluation process"
