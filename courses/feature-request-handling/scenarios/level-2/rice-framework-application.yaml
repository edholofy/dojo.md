meta:
  id: rice-framework-application
  level: 2
  course: feature-request-handling
  type: output
  description: "Apply the RICE prioritization framework to score and rank feature requests with quantified reach, impact, confidence, and effort"
  tags: [feature-requests, RICE, prioritization, scoring, intermediate]

state: {}

trigger: |
  You're a PM at "CloudDocs" (document collaboration SaaS, 20,000
  users, $8M ARR). Your VP of Product has standardized on the RICE
  framework for all prioritization decisions.

  RICE scoring:
  - Reach: How many users per quarter will this affect?
  - Impact: How much will it move the needle? (3=Massive, 2=High,
    1=Medium, 0.5=Low, 0.25=Minimal)
  - Confidence: How sure are you? (100%=High, 80%=Medium, 50%=Low)
  - Effort: Person-months to build
  - Score = (Reach × Impact × Confidence) / Effort

  Score these 8 feature requests:

  Feature 1: Real-time co-editing
  Data: Requested by 60% of users in last survey. Top reason prospects
  don't convert. Would affect all 20,000 users. Effort: 6 person-months.
  You're 80% confident it will significantly increase conversions.

  Feature 2: Offline mode
  Data: Requested by 2,000 users. Field workers who need docs without
  internet. Effort: 4 person-months. You're 50% confident on the
  technical approach.

  Feature 3: Advanced permissions (role-based access)
  Data: Required by 15 enterprise prospects worth $500K combined.
  Affects ~3,000 enterprise users. Effort: 3 person-months. High
  confidence (well-understood problem).

  Feature 4: Template gallery
  Data: 8,000 users use templates monthly. Better gallery could
  increase template usage by 30%. Effort: 1.5 person-months. High
  confidence.

  Feature 5: Version comparison (diff view)
  Data: 5,000 users request this. Common in competitive products.
  Effort: 2 person-months. Medium confidence (UI complexity unknown).

  Feature 6: AI writing assistant
  Data: 12,000 users would try it. Trending feature in market. Effort:
  5 person-months. Low confidence (AI quality uncertain, competitive
  landscape shifting).

  Feature 7: Mobile app redesign
  Data: 6,000 mobile users, 2.1 star rating on App Store. Effort:
  4 person-months. High confidence (clear problems to fix).

  Feature 8: Slack integration
  Data: 4,000 users on Slack, reduces context switching. Effort:
  1 person-month. High confidence (well-documented API).

  Tasks:
  1. Score all 8 features using RICE. Show your calculations.
  2. Rank them by RICE score and recommend the top 3 for next quarter.
  3. Feature 6 (AI assistant) scores poorly due to low confidence.
     How do you handle a feature where the market is moving fast but
     you're not confident in the approach?
  4. What are RICE's limitations? When would you override the score?

assertions:
  - type: llm_judge
    criteria: "RICE calculations are shown and consistent — each feature has explicit Reach, Impact, Confidence, Effort values with the formula applied correctly"
    weight: 0.25
    description: "Correct RICE calculations"
  - type: llm_judge
    criteria: "Slack integration scores well — high confidence, low effort (1 month), decent reach (4,000) makes it a high RICE-score quick win"
    weight: 0.25
    description: "Quick wins identified via RICE"
  - type: llm_judge
    criteria: "AI assistant strategy addresses low confidence — proposes a spike, prototype, or phased approach to increase confidence before committing full effort, rather than just deprioritizing it"
    weight: 0.25
    description: "Low-confidence feature strategy"
  - type: llm_judge
    criteria: "RICE limitations are identified — mentions that revenue impact, strategic importance, and competitive urgency aren't captured in standard RICE, and proposes when to override"
    weight: 0.25
    description: "RICE limitations identified"
