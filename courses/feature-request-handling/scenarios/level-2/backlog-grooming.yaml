meta:
  id: backlog-grooming
  level: 2
  course: feature-request-handling
  type: output
  description: "Groom a messy feature request backlog — clean up stale requests, merge duplicates, and establish an ongoing grooming cadence"
  tags: [feature-requests, backlog, grooming, maintenance, intermediate]

state: {}

trigger: |
  You're a PM at "SurveyPro" (survey creation tool, 15,000 users).
  You've inherited a feature request backlog that hasn't been groomed
  in 18 months. It's a mess.

  Backlog stats:
  - 847 open feature requests
  - Oldest request: 3 years ago ("Add Zapier integration")
  - 120 requests have 0 votes and no comments
  - 200+ requests are duplicates (estimated)
  - 45 requests were for features that already shipped
  - 30 requests are from customers who churned 12+ months ago
  - 15 requests are actually bug reports miscategorized as features
  - The top 3 requests by votes haven't changed in 2 years

  Your VP says: "This backlog is useless. Nobody trusts it, nobody
  looks at it, and customers think we ignore them because their
  2-year-old requests are still 'under review.' Fix it."

  Specific examples from the backlog:

  Request #23 (3 years old, 450 votes): "Add logic branching to
  surveys" — This was shipped 6 months ago but the request is still
  open.

  Request #156 (2 years old, 12 votes): "Support RTL languages"
  — Requester churned 18 months ago. 3 other customers have since
  requested this.

  Request #389 (1 year old, 0 votes): "Let me upload custom fonts"
  — No other customers have requested this. Zero engagement.

  Request #502 (8 months old, 89 votes): "Offline survey mode"
  Request #510 (8 months old, 67 votes): "Take surveys without internet"
  Request #523 (7 months old, 34 votes): "Survey offline capability"
  — Three separate requests for the same thing.

  Tasks:
  1. Design the backlog cleanup plan: What categories do you sort the
     847 requests into? What are the rules for each category?

  2. Handle each of the specific examples above. What do you do with
     Requests #23, #156, #389, #502/510/523?

  3. Should you consider "backlog bankruptcy" — closing everything and
     starting fresh? What are the pros and cons?

  4. Design the ongoing grooming process so this never happens again.
     What cadence, criteria, and automations do you put in place?

assertions:
  - type: llm_judge
    criteria: "Cleanup categories are actionable — proposes categories like 'Close: Already shipped', 'Close: Stale (no engagement)', 'Merge: Duplicates', 'Keep: Active demand', 'Reclassify: Bug reports'"
    weight: 0.25
    description: "Actionable cleanup categories"
  - type: llm_judge
    criteria: "Specific examples handled correctly — #23 is closed with 'shipped' notification to voters, #502/510/523 are merged into one canonical request, #389 is closed or archived"
    weight: 0.25
    description: "Correct example handling"
  - type: llm_judge
    criteria: "Backlog bankruptcy is considered seriously — weighs the benefit of a clean slate against the risk of losing customer trust and historical signal"
    weight: 0.25
    description: "Thoughtful bankruptcy consideration"
  - type: llm_judge
    criteria: "Ongoing grooming cadence is specific — proposes monthly or quarterly reviews with automated stale-request policies (e.g., auto-close after 12 months with no activity)"
    weight: 0.25
    description: "Specific grooming cadence"
