meta:
  id: predictive-feature-planning
  level: 4
  course: feature-request-handling
  type: output
  description: "Move from reactive feature request handling to predictive product planning using data science, market analysis, and customer behavior patterns"
  tags: [feature-requests, predictive, data-science, proactive, expert]

state: {}

trigger: |
  You're the CPO at "InsightPro" (customer analytics platform, $180M
  ARR, 12,000 customers). You've been reactive — waiting for feature
  requests and then building. The CEO wants you to be predictive —
  anticipating customer needs before they ask.

  "Amazon doesn't wait for customers to request features. They
  anticipate needs. I want us to do the same."

  Data available:
  - 3 years of feature request history (36,000 requests)
  - Product usage analytics for all 12,000 customers
  - Customer health scores and churn data
  - Market trend data (competitor launches, analyst reports)
  - Support ticket volume and topics
  - Sales call transcripts (10,000 calls)

  Historical patterns you've discovered:
  - Features requested 6 months before a competitor launches them
    were a strong signal of market direction (78% accuracy)
  - Customers who use Feature A and Feature B but not Feature C have
    a 65% chance of requesting Feature D within 3 months
  - Support ticket spikes in a specific area predict feature requests
    in that area 2-4 weeks later
  - When 3+ enterprise customers independently request something,
    it appears in a competitor's product within 12 months 80% of the
    time

  Current challenge: Your data science team has built a "Feature
  Prediction Model" that scores potential features by predicted demand.
  The model says your next big feature should be "AI-powered customer
  segmentation" — but zero customers have requested it.

  Tasks:
  1. Design the predictive feature planning system:
     - What data inputs feed the prediction model?
     - How do you validate predictions before committing engineering?
     - What's the confidence threshold for building unrequested features?

  2. The model predicts "AI customer segmentation" but no one's asked
     for it. How do you validate this prediction? What experiments
     would you run?

  3. How do you balance predictive planning with reactive feature
     requests? (You still need to listen to customers, not just models.)

  4. Design the feedback loop: When a prediction is right or wrong,
     how does that improve the model?

assertions:
  - type: llm_judge
    criteria: "Prediction system uses multiple signals — combines request history, usage patterns, churn data, support tickets, and competitive intelligence rather than relying on a single signal"
    weight: 0.25
    description: "Multi-signal prediction system"
  - type: llm_judge
    criteria: "Validation before building — proposes testing the AI segmentation prediction through customer interviews, fake door tests, prototypes, or concierge experiments before committing engineering resources"
    weight: 0.25
    description: "Prediction validation methods"
  - type: llm_judge
    criteria: "Reactive-predictive balance is explicit — proposes a capacity split (e.g., 60% request-driven, 40% prediction-driven) with rules for when predictions override requests"
    weight: 0.25
    description: "Explicit balance framework"
  - type: llm_judge
    criteria: "Feedback loop improves the model — proposes tracking prediction accuracy (features predicted vs actually requested/adopted), retraining on outcomes, and adjusting confidence thresholds"
    weight: 0.25
    description: "Model improvement feedback loop"
