meta:
  id: pricing-gated-features
  level: 4
  course: feature-request-handling
  type: output
  description: "Navigate the complex intersection of feature requests and pricing strategy — when requested features should be free vs. premium, and how to communicate pricing decisions"
  tags: [feature-requests, pricing, monetization, strategy, expert]

state: {}

trigger: |
  You're the VP of Product at "MarketingHub" (marketing automation,
  $120M ARR, 25,000 customers). You have 3 tiers: Free, Pro ($49/mo),
  and Enterprise ($199/mo). Several feature request decisions have
  pricing implications.

  Decision 1: Most-requested free tier feature
  5,000 free-tier users request "email automation" (currently Pro-only).
  Adding it would be the #1 growth driver — your PLG motion depends on
  free users converting. But if you add it free, Pro loses its #1
  differentiator. Pro users will ask: "What am I paying for?"

  Decision 2: Enterprise feature requested by Pro users
  2,000 Pro users request "advanced analytics" (currently Enterprise-
  only). They say: "$199/month is too expensive for just analytics.
  Give us analytics at the Pro level." If you do, Enterprise loses its
  #1 differentiator. Enterprise customers will ask: "Why should I pay
  4x more?"

  Decision 3: New feature with no home
  You're building "AI content generation" — the most exciting feature
  in 2 years. 10,000 users across all tiers are asking for it. Where
  does it go?
  - Free: Drives adoption but no revenue
  - Pro-only: Revenue driver but angers free users
  - Enterprise-only: Undercuts market positioning (competitors offer
    it at lower tiers)
  - All tiers with usage limits: Fair but complex

  Decision 4: Customer-funded feature
  A $500K/year enterprise customer offers to fund development of a
  feature ($200K budget) if they get exclusive access for 12 months.
  After 12 months, it becomes available to all Enterprise customers.

  Tasks:
  1. For each of the 4 decisions, analyze the options and recommend
     a pricing strategy. Consider revenue impact, customer perception,
     competitive positioning, and growth.

  2. How do you communicate to 5,000 free users that email automation
     will remain Pro-only? (Or, if you move it to free, how do you
     communicate to Pro users?)

  3. For the AI feature (Decision 3), design the pricing model. How
     do you structure usage limits across tiers?

  4. The customer-funded feature (Decision 4): Should you accept?
     What precedent does this set? What guardrails are needed?

assertions:
  - type: llm_judge
    criteria: "Pricing decisions consider value metrics — proposes pricing based on the value each tier gets, not just feature count, ensuring each tier has clear differentiation"
    weight: 0.25
    description: "Value-based pricing decisions"
  - type: llm_judge
    criteria: "AI feature pricing uses tiered access — proposes all tiers get some access with escalating limits or capabilities, maximizing adoption while preserving upgrade incentive"
    weight: 0.25
    description: "Tiered AI access model"
  - type: llm_judge
    criteria: "Communication anticipates objections — addresses 'what am I paying for?' and 'why should I pay more?' proactively with clear value messaging for each tier"
    weight: 0.25
    description: "Objection-anticipating communication"
  - type: llm_judge
    criteria: "Customer-funded feature analysis includes precedent risk — considers that accepting sets a precedent where paying customers expect to buy exclusive features, potentially distorting the product roadmap"
    weight: 0.25
    description: "Precedent risk analysis"
