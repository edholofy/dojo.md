meta:
  id: feature-request-culture
  level: 4
  course: feature-request-handling
  type: output
  description: "Build a customer-centric product culture where feature requests are valued, the voice of the customer influences decisions, and every team contributes to product direction"
  tags: [feature-requests, culture, customer-centric, organization, expert]

state: {}

trigger: |
  "TechSuite" ($250M ARR, 500 engineers, 30,000 customers) has a
  product culture problem. Despite collecting feature requests, the
  organization doesn't actually use them.

  Cultural symptoms:
  - Engineers say: "Customers don't know what they want. We're the
    experts."
  - Sales says: "Product never builds what customers ask for. I have
    to make promises to close deals."
  - CS says: "I submit feature requests into a black hole. I've
    stopped bothering."
  - PMs say: "We have too many requests and not enough time. Most
    are noise anyway."
  - Customers say: "I submitted a request 2 years ago. Never heard
    back. They don't listen."

  Quantitative evidence:
  - 8,000 open feature requests, 60% older than 1 year
  - Customer satisfaction with "how we handle feedback": 2.1/5
  - Only 15% of shipped features originated from customer requests
  - NPS among customers who submitted requests: +12 (vs +38 overall)
  - CS team stopped logging 70% of feature requests ("what's the point?")
  - Zero engineers attend customer feedback sessions

  The CEO says: "We need to be customer-obsessed. Right now we're
  customer-deaf. I want every team to feel ownership over the customer
  experience, starting with how we handle their requests."

  Tasks:
  1. Diagnose the cultural problem: What systemic issues cause each
     team's attitude? Map the cause-and-effect chain.

  2. Design the cultural transformation program:
     - How do you get engineers to value customer input?
     - How do you get CS to trust the process again?
     - How do you get PMs to close the loop with customers?
     - How do you make customer feedback visible company-wide?

  3. Design 5 specific initiatives:
     - A "customer voice" program that brings customer stories to
       engineering teams
     - A feedback loop that notifies every requester of decisions
     - An engineering rotation where developers talk to customers
     - A "feature request hall of fame" recognizing customer-driven
       features
     - A quarterly "customer feedback review" for leadership

  4. How do you measure cultural change? What leading indicators show
     the culture is shifting before the NPS improves?

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies the feedback loop breakdown — CS stopped logging because nothing happens, PMs can't prioritize because data is incomplete, engineers build without context because they're disconnected from customers"
    weight: 0.25
    description: "Feedback loop breakdown identified"
  - type: llm_judge
    criteria: "Engineer engagement is designed to be voluntary and valuable — proposes customer sessions that are interesting (not mandatory chores), connecting engineers to the impact of their work"
    weight: 0.25
    description: "Voluntary engineer engagement"
  - type: llm_judge
    criteria: "CS re-engagement is trust-based — recognizes that CS needs to see results from logging requests before they'll start doing it again, proposes quick wins to rebuild trust"
    weight: 0.25
    description: "Trust-based CS re-engagement"
  - type: llm_judge
    criteria: "Leading indicators are behavioral — tracks request logging rates, engineer participation in customer sessions, PM response times, and feature-request-to-ship rate before waiting for NPS to move"
    weight: 0.25
    description: "Behavioral leading indicators"
