meta:
  id: feature-request-at-scale
  level: 4
  course: feature-request-handling
  type: output
  description: "Design a feature request management system for an organization processing 5,000+ requests per month across multiple products and channels"
  tags: [feature-requests, scale, automation, ML, operations, expert]

state: {}

trigger: |
  "MegaPlatform" ($800M ARR, 1,200 engineers, 8 products, 100,000
  customers) processes 5,000+ feature requests per month from:
  - Customer support tickets (2,000/month)
  - In-app feedback widget (1,500/month)
  - Sales opportunity notes (500/month)
  - Community forum (400/month)
  - Customer advisory boards (100/month)
  - Social media mentions (300/month)
  - Partner channel (200/month)

  Current problems:
  - Requests go to 8 different product teams with no central view
  - 40% are duplicates (discovered too late)
  - Average time from request to PM awareness: 3 weeks
  - Feature requests from sales are "lost" in CRM notes
  - No way to quantify total demand across channels
  - Community forum has 50,000 open feature requests (3 years old)
  - Customers get different answers from support vs sales vs CS
  - No ability to notify all requesters when a feature ships

  The CPO says: "I want a single system of record for every feature
  request across every channel. I want to know, at any moment, what
  our customers want most."

  Tasks:
  1. Design the centralized feature request system:
     - Architecture (intake → deduplication → classification → routing
       → prioritization → notification)
     - How do you unify 7 channels into one view?
     - What ML/NLP capabilities are needed for auto-classification?
     - What's the data model for a feature request at this scale?

  2. Solve the deduplication problem:
     - How do you detect that request #4,873 is the same as request
       #12 from 2 years ago?
     - What similarity threshold do you use?
     - How do you handle near-duplicates (related but different)?

  3. Design the notification system:
     - When a feature ships, how do you notify the relevant requesters
       across all channels?
     - How do you handle the 50,000 stale forum requests?

  4. Calculate the ROI of this system. What does the organization gain
     from centralized feature request management?

assertions:
  - type: llm_judge
    criteria: "Architecture covers the full pipeline — includes intake normalization, NLP-based deduplication, ML classification by product/category, routing to PMs, and closed-loop notification"
    weight: 0.25
    description: "Full pipeline architecture"
  - type: llm_judge
    criteria: "Deduplication uses embedding similarity — proposes semantic similarity (not just keyword matching) to detect that 'dark theme option' and 'night mode for eye strain' are the same request"
    weight: 0.25
    description: "Semantic deduplication"
  - type: llm_judge
    criteria: "Stale forum strategy is practical — proposes a mass-communication + archival approach for the 50,000 old requests rather than trying to triage each one individually"
    weight: 0.25
    description: "Practical stale forum strategy"
  - type: llm_judge
    criteria: "ROI is quantified — calculates time saved (PM hours, support hours), retention impact (shipping requested features faster), and revenue impact (sales closing deals with better feature visibility)"
    weight: 0.25
    description: "Quantified system ROI"
