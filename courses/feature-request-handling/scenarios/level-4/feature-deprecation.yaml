meta:
  id: feature-deprecation
  level: 4
  course: feature-request-handling
  type: output
  description: "Handle the reverse of feature requests — communicating feature deprecation, sunsetting products, and managing customer pushback when beloved features are removed"
  tags: [feature-requests, deprecation, sunsetting, communication, expert]

state: {}

trigger: |
  You're the VP of Product at "ProductSuite" ($200M ARR, 30,000
  customers). To fund new features that customers are requesting, you
  need to deprecate old features that are expensive to maintain but
  have loyal users.

  Deprecation 1: Legacy reporting engine
  - Used by 3,000 customers (10% of base)
  - Costs $800K/year to maintain (servers, support, bug fixes)
  - A new reporting engine (launched 18 months ago) does everything
    the legacy one does, plus more
  - But 500 customers refuse to migrate, saying "the new one doesn't
    work the same way" and "I've built all my workflows around the
    old reports"

  Deprecation 2: Desktop application
  - Used by 1,200 customers (4% of base)
  - Built in 2015, runs on Windows only
  - Would cost $2M to modernize to current standards
  - Web app does 95% of what the desktop app does
  - 200 enterprise customers use it for offline access (no web
    alternative exists for offline)
  - One customer ($400K/year) says: "If you kill the desktop app,
    we'll leave."

  Deprecation 3: API v1
  - 800 integrations still use API v1 (launched 2018)
  - API v2 launched 2 years ago, is more secure and performant
  - Maintaining v1 requires 2 full-time engineers
  - Some v1 endpoints have no v2 equivalent (3 niche endpoints)
  - 50 customers have built mission-critical integrations on v1

  Tasks:
  1. For each deprecation, design the communication plan: Who needs
     to know, when, and how do you phase the sunset?

  2. The $400K customer threatens to leave over the desktop app. How
     do you handle this? When is one customer's revenue enough to
     keep a deprecated feature alive?

  3. Design the migration support program for API v1 users. How do
     you help 800 integrations migrate without breaking their systems?

  4. How do you make the business case internally? Show the math:
     what does deprecation save vs. what does migration cost?

assertions:
  - type: llm_judge
    criteria: "Communication is phased and generous — proposes long sunset timelines (6-12+ months), early notification, migration support, and clear deadlines rather than abrupt removal"
    weight: 0.25
    description: "Phased generous sunset"
  - type: llm_judge
    criteria: "Desktop app decision addresses offline need — recognizes that 200 customers need offline access and proposes a solution (PWA, offline mode, or extended support) rather than just killing the app"
    weight: 0.25
    description: "Offline need addressed"
  - type: llm_judge
    criteria: "API migration support is comprehensive — proposes migration guides, code examples, deprecation warnings in responses, and a dedicated support channel for the 50 mission-critical integrations"
    weight: 0.25
    description: "Comprehensive API migration"
  - type: llm_judge
    criteria: "Business case quantifies both sides — shows maintenance savings ($800K + $2M + 2 engineers) and migration costs (support, engineering, potential churn revenue)"
    weight: 0.25
    description: "Two-sided business case"
