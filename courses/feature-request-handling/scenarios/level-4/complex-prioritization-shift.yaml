meta:
  id: complex-prioritization-shift
  level: 4
  course: feature-request-handling
  type: output
  description: "Handle a high-stakes prioritization session where board pressure, customer churn, competitive moves, and internal politics collide"
  tags: [feature-requests, prioritization, high-stakes, politics, expert]

state: {}

trigger: |
  You're the CPO at "EntPlatform" ($400M ARR, 800 engineers, 20,000
  customers). The annual planning meeting is tomorrow. The board has
  mandated that you present a 12-month feature investment plan. But
  every stakeholder has an urgent, conflicting priority.

  Board directive: "Revenue growth must accelerate from 20% to 35%
  YoY. The $400M we invested in this company needs a return."

  Stakeholder priorities:

  CRO (Chief Revenue Officer): "We need enterprise features to move
  upmarket. Our average deal size is $20K. I want it to be $100K.
  Build: advanced permissions, audit logs, SSO, and SOC 2 compliance."
  Revenue at stake: $50M pipeline requires these features.

  CFO: "Our gross margins are dropping because we over-customized for
  individual customers. Stop building custom features. Invest in
  scalable platform capabilities."
  Context: Custom development consumed 30% of engineering last year.

  CTO: "We have $50M in technical debt. If we don't address it now,
  we'll have a major outage within 12 months. I need 100 engineers
  on infrastructure."
  Context: Last quarter's outage cost $3M in credits and 5 customer
  losses.

  VP Customer Success: "Churn is at 12%. The #1 reason is 'missing
  features.' We need to build the top 20 customer-requested features
  NOW."
  Context: $48M ARR at risk from churn.

  VP Product (your direct report): "Our competitors just launched AI
  features. If we don't invest in AI this year, we'll be irrelevant
  in 3 years."
  Context: Market analyst downgraded your company due to "lack of
  AI strategy."

  Resources: 800 engineers, approximately 2,400 person-months/year.

  Tasks:
  1. Evaluate all 5 investment priorities. How much capacity does each
     deserve? Show your allocation with percentages and person-months.

  2. The CRO and VP CS have conflicting priorities: enterprise features
     vs. top customer requests. These overlap partially but not fully.
     How do you resolve this?

  3. The CTO wants 100 engineers (12.5%) for infrastructure. The board
     wants growth features. How do you make the case for invisible
     technical work to a growth-focused board?

  4. Write the executive summary of your 12-month plan that gets
     board approval. Max 1 page.

assertions:
  - type: llm_judge
    criteria: "Allocation addresses all 5 priorities — doesn't ignore any stakeholder but distributes capacity proportionally to business impact, with enterprise and customer-requested features getting the largest share"
    weight: 0.25
    description: "All priorities addressed"
  - type: llm_judge
    criteria: "CRO vs VP CS conflict is resolved by overlap analysis — identifies which customer-requested features also serve enterprise needs, maximizing shared value"
    weight: 0.25
    description: "Overlap-based conflict resolution"
  - type: llm_judge
    criteria: "Technical debt case uses business language — frames infrastructure investment in terms of outage risk ($3M per incident), development velocity (30% faster with debt paid), and customer retention"
    weight: 0.25
    description: "Business-language technical case"
  - type: llm_judge
    criteria: "Executive summary connects to 35% growth target — maps each investment to its contribution toward accelerating from 20% to 35% growth"
    weight: 0.25
    description: "Growth-target-aligned summary"
