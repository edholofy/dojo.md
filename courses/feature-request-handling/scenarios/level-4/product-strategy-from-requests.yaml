meta:
  id: product-strategy-from-requests
  level: 4
  course: feature-request-handling
  type: output
  description: "Derive product strategy and market insights from patterns in thousands of feature requests, identifying underserved markets and strategic opportunities"
  tags: [feature-requests, strategy, market-insights, patterns, expert]

state: {}

trigger: |
  You're the CPO at "DataTools" (data analytics platform, $150M ARR,
  15,000 customers). You've collected 12,000 feature requests over 3
  years. Your Head of Data Science has analyzed the corpus and surfaced
  these patterns:

  Pattern 1: Emerging segment
  450 requests in the past 6 months mention "real-time" or "streaming"
  data. Two years ago, this was 20 requests total. The requesters are
  primarily from fintech and gaming companies — not your core market
  (enterprise analytics).

  Pattern 2: Unserved persona
  800 requests come from people with "analyst" in their title asking
  for "no-code" or "drag-and-drop" capabilities. Your product requires
  SQL knowledge. These requests are 3x more likely to come from churned
  customers.

  Pattern 3: Platform play
  300 requests mention wanting to build custom apps or dashboards ON
  your platform and share them with their customers. They want you to
  be a platform, not just a tool.

  Pattern 4: Competitive gap
  600 requests ask for features that Competitor A already has (AI-
  powered insights, natural language queries). These requests have
  grown 200% in 12 months.

  Pattern 5: Regional expansion
  200 requests ask for data residency options (EU, Asia-Pacific).
  These all come from enterprise customers worth $500K+ in potential
  contract value.

  Current strategy: Enterprise analytics tool for data teams that
  know SQL, deployed on US cloud infrastructure.

  The board meeting is in 2 weeks. They'll ask: "Where should we
  invest the next $50M?"

  Tasks:
  1. What strategic insights do these 5 patterns reveal? What market
     shifts are happening beneath the request data?

  2. Which patterns represent the biggest strategic opportunity? Rank
     them by potential impact and recommend investment priorities.

  3. Pattern 2 (no-code) and Pattern 4 (AI/NLQ) could cannibalize
     your core product. How do you pursue these without alienating
     your SQL-proficient power users?

  4. Build the board presentation: Frame the feature request data as
     a strategic narrative about where the market is going and where
     DataTools should invest.

assertions:
  - type: llm_judge
    criteria: "Strategic insights connect patterns — recognizes that real-time streaming, no-code, and AI/NLQ are all part of a broader market shift toward democratized, real-time analytics"
    weight: 0.25
    description: "Connected strategic insights"
  - type: llm_judge
    criteria: "Investment priorities are ranked with reasoning — considers market size, competitive urgency, build complexity, and alignment with existing strengths"
    weight: 0.25
    description: "Reasoned investment ranking"
  - type: llm_judge
    criteria: "Cannibalization risk is managed — proposes a multi-tier product strategy (pro tier for SQL users, standard tier for no-code) or a complementary approach rather than replacing the core"
    weight: 0.25
    description: "Cannibalization risk managed"
  - type: llm_judge
    criteria: "Board narrative is data-driven — uses the request data as evidence of market direction, not just opinion, connecting request trends to revenue opportunities"
    weight: 0.25
    description: "Data-driven board narrative"
