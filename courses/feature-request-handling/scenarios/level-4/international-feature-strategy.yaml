meta:
  id: international-feature-strategy
  level: 4
  course: feature-request-handling
  type: output
  description: "Manage feature requests from international markets with different regulatory requirements, cultural expectations, and market maturity levels"
  tags: [feature-requests, international, localization, regulatory, expert]

state: {}

trigger: |
  You're the VP of Product at "GlobalPay" (payment processing platform,
  $200M ARR). You operate in 25 countries and receive feature requests
  that vary dramatically by market.

  Market-specific feature requests:

  EU markets (40% of revenue):
  - GDPR consent management improvements (500 requests)
  - PSD2 Strong Customer Authentication enhancements (300 requests)
  - SEPA Direct Debit support improvements (200 requests)
  - Invoice formatting per EU member state (150 requests)
  - "Right to be forgotten" automation (100 requests)

  US market (35% of revenue):
  - ACH payment improvements (400 requests)
  - Multi-state tax calculation (350 requests)
  - 1099 reporting automation (200 requests)
  - Mobile wallet support (Apple Pay, Google Pay) (180 requests)

  APAC markets (15% of revenue, fastest growing):
  - WeChat Pay / Alipay integration (300 requests)
  - QR code payment support (250 requests)
  - Local language support (Japanese, Korean, Chinese) (200 requests)
  - Cross-border payment optimization (150 requests)

  LATAM markets (10% of revenue):
  - PIX integration (Brazil, 200 requests)
  - Boleto payment support (100 requests)
  - Local currency handling with inflation (80 requests)
  - Tax invoice requirements (NFe, Brazil) (70 requests)

  Complication: Your engineering team is 80% US-based and has limited
  knowledge of international payment regulations. Each market's
  requests require regulatory expertise you don't have.

  Budget: Can invest in 2 markets deeply this year.

  Tasks:
  1. Which 2 markets do you invest in? Justify with revenue, growth
     rate, competitive positioning, and strategic importance.

  2. For the 2 chosen markets, prioritize the feature requests.
     Which are regulatory must-haves vs. nice-to-haves?

  3. How do you handle the markets NOT chosen? They still have
     regulatory compliance requirements that can't be ignored.

  4. Design the international feature request process: How do you
     ensure market-specific needs are surfaced and prioritized fairly
     when the product team is US-centric?

assertions:
  - type: llm_judge
    criteria: "Market selection considers growth potential — APAC's 15% revenue but fastest growth may warrant investment over US's 35% revenue but slower growth"
    weight: 0.25
    description: "Growth-weighted market selection"
  - type: llm_judge
    criteria: "Regulatory vs nice-to-have distinction is clear — GDPR and PSD2 are non-negotiable compliance, while WeChat Pay is a market opportunity; the difference drives prioritization"
    weight: 0.25
    description: "Regulatory vs opportunity distinction"
  - type: llm_judge
    criteria: "Non-chosen markets still get compliance coverage — acknowledges that regulatory features (GDPR, tax) can't be deprioritized just because the market wasn't 'chosen' for deep investment"
    weight: 0.25
    description: "Compliance baseline for all markets"
  - type: llm_judge
    criteria: "US-centric bias mitigation is addressed — proposes local market liaisons, regional PMs, or structured input channels to prevent the US team from underweighting international needs"
    weight: 0.25
    description: "Bias mitigation for US-centric team"
