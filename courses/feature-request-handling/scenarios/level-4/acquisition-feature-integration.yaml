meta:
  id: acquisition-feature-integration
  level: 4
  course: feature-request-handling
  type: output
  description: "Merge feature request backlogs and prioritization processes after a company acquisition, reconciling two customer bases with different expectations"
  tags: [feature-requests, acquisition, integration, portfolio, expert]

state: {}

trigger: |
  "CloudSuite" ($300M ARR, 25,000 customers) just acquired "NimbleApp"
  ($30M ARR, 5,000 customers). The products overlap 60% in
  functionality but each has unique capabilities the other lacks.

  CloudSuite's feature request backlog:
  - 5,000 open requests
  - Top requests: API improvements, enterprise compliance, advanced
    analytics
  - Process: Formal, quarterly prioritization with RICE scoring
  - Customers: Enterprise-focused, long sales cycles, $50K+ contracts

  NimbleApp's feature request backlog:
  - 800 open requests
  - Top requests: Better UX, mobile app, faster onboarding
  - Process: Informal, continuous prioritization via community voting
  - Customers: SMB-focused, self-serve, $200-$2K/month

  The integration challenge:
  - 500 NimbleApp customers requested features that CloudSuite already
    has (they just didn't know)
  - 200 CloudSuite customers requested features that NimbleApp has
  - NimbleApp's #1 request (mobile app) has been CloudSuite's lowest
    priority for 3 years
  - CloudSuite's #1 request (SOC 2 compliance) is irrelevant to 95%
    of NimbleApp's customers
  - NimbleApp promised 15 features to customers that CloudSuite has
    already decided not to build

  The CEO says: "I want one product roadmap, one backlog, and one
  process within 6 months. Don't lose either customer base."

  Tasks:
  1. Design the backlog integration plan: How do you merge 5,800
     requests from two different systems with different taxonomies?

  2. How do you handle the 500+200 requests for features that already
     exist in the other product? (Customer education vs. feature
     migration)

  3. NimbleApp promised 15 features that CloudSuite won't build. How
     do you communicate this to NimbleApp's customers without losing
     them?

  4. Design the unified prioritization process that serves both
     enterprise (CloudSuite) and SMB (NimbleApp) customer segments
     without one dominating the other.

assertions:
  - type: llm_judge
    criteria: "Backlog integration has a taxonomy mapping step — proposes mapping NimbleApp's categories to CloudSuite's (or creating a new unified taxonomy) before merging"
    weight: 0.25
    description: "Taxonomy mapping approach"
  - type: llm_judge
    criteria: "Existing-feature requests become migration opportunities — proposes proactive communication to 700 customers that their request already exists in the combined product"
    weight: 0.25
    description: "Migration opportunity identification"
  - type: llm_judge
    criteria: "Broken promise communication is empathetic — acknowledges NimbleApp's commitments, explains the new context, and offers alternatives or compensation rather than just saying 'no'"
    weight: 0.25
    description: "Empathetic broken promise handling"
  - type: llm_judge
    criteria: "Unified process prevents enterprise dominance — proposes segment-weighted prioritization or dedicated capacity for each segment so SMB needs aren't always deprioritized"
    weight: 0.25
    description: "Segment-balanced process"
