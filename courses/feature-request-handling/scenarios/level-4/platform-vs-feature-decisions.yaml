meta:
  id: platform-vs-feature-decisions
  level: 4
  course: feature-request-handling
  type: output
  description: "Navigate the strategic decision between building individual features vs building a platform that enables customers to build their own features"
  tags: [feature-requests, platform, strategy, extensibility, expert]

state: {}

trigger: |
  You're the VP of Product at "FormFlow" (business workflow platform,
  $100M ARR, 20,000 customers). A critical strategic question has
  emerged from the feature request data:

  The data: Your top 100 feature requests all follow a pattern. They're
  not asking for one thing — they're asking for variations of a theme:
  - "Add a field for [custom data type]" (50 variations)
  - "Add an integration with [specific tool]" (30 variations)
  - "Add a workflow step for [custom action]" (20 variations)

  The strategic question: Do you keep building individual features
  (custom field for addresses, integration with Salesforce, workflow
  step for approvals)? Or do you build a platform (custom field
  builder, integration marketplace with API, workflow action builder)?

  Option A: Feature approach
  - Build the top 20 most-requested specific features
  - Effort: 3 months per feature, 60 months total (5 years)
  - Addresses 60% of requests directly
  - Each feature is polished and supported

  Option B: Platform approach
  - Build custom field builder + integration API + action SDK
  - Effort: 12 months of platform investment
  - Theoretically addresses 100% of requests
  - Customers/partners build specific solutions
  - Requires developer ecosystem, documentation, support

  Option C: Hybrid approach
  - Build the top 5 features + the custom field builder
  - Effort: 9 months
  - Addresses immediate needs while building toward platform

  Complications:
  - 80% of your customers are non-technical (can't build on a platform)
  - Your developer ecosystem is zero (no partners, no marketplace)
  - Competitor A went platform and lost 30% of SMB customers
  - Competitor B stayed features-only and is falling behind enterprise

  Tasks:
  1. Analyze all 3 options: Pros, cons, risks, and who each serves best.

  2. Which option do you recommend? Justify with customer data and
     competitive context.

  3. If you choose the platform approach, how do you serve the 80%
     non-technical customers who can't build on it?

  4. Design the 2-year product strategy that balances feature delivery
     with platform investment. Include milestones and decision gates.

assertions:
  - type: llm_judge
    criteria: "Analysis considers customer segments — recognizes that 80% non-technical base means pure platform approach risks alienating the majority, while features-only approach has scaling limitations"
    weight: 0.25
    description: "Segment-aware analysis"
  - type: llm_judge
    criteria: "Recommendation accounts for competitive dynamics — considers Competitor A's SMB loss (platform risk) and Competitor B's enterprise loss (features-only risk)"
    weight: 0.25
    description: "Competitively-informed recommendation"
  - type: llm_judge
    criteria: "Non-technical customer strategy is concrete — proposes template marketplace, partner-built solutions, or no-code builder on top of the platform for non-technical users"
    weight: 0.25
    description: "Non-technical customer strategy"
  - type: llm_judge
    criteria: "2-year strategy has decision gates — includes checkpoints where data determines whether to accelerate platform investment or pivot back to features"
    weight: 0.25
    description: "Decision gates in strategy"
