meta:
  id: feature-portfolio-management
  level: 5
  course: feature-request-handling
  type: output
  description: "Manage feature requests across a portfolio of products with shared customers, competing resources, and strategic interdependencies"
  tags: [feature-requests, portfolio, multi-product, strategy, mastery]

state: {}

trigger: |
  You're the Chief Product Officer of "OmniSuite" ($700M ARR, 1,500
  engineers, 8 products, 80,000 customers). Each product has its own
  PM team, its own feature request backlog, and its own customer base
  — but 40% of customers use 3+ products.

  The portfolio challenge:

  Product 1: OmniCRM ($250M ARR, mature, 25,000 customers)
  Top request: AI sales forecasting (2,000 requests)

  Product 2: OmniSupport ($150M ARR, growing, 15,000 customers)
  Top request: OmniCRM integration (1,500 requests)

  Product 3: OmniAnalytics ($100M ARR, growing fast, 10,000 customers)
  Top request: Real-time data from OmniCRM and OmniSupport (1,000 req)

  Product 4: OmniMarket ($80M ARR, new, 8,000 customers)
  Top request: Campaign attribution using OmniAnalytics data (800 req)

  Cross-product requests (from multi-product customers):
  - "Unified search across all Omni products" (3,000 requests)
  - "Single sign-on with shared user profiles" (2,500 requests)
  - "Shared customer record across CRM, Support, Marketing" (2,000 req)
  - "Unified reporting dashboard" (1,800 requests)

  The strategic tension:
  - Product PMs want to invest in product-specific features
  - Cross-product features benefit multi-product customers (40% of base,
    70% of revenue) but no single product team owns them
  - Building cross-product features requires engineers from multiple
    teams to coordinate (expensive and slow)
  - Customers using 3+ products have 96% retention vs 78% for single-
    product customers

  The board's direction: "Omni's value is the suite, not individual
  products. Invest in the glue that keeps customers using everything."

  Tasks:
  1. How do you allocate engineering capacity between product-specific
     and cross-product features? What ratio maximizes portfolio value?

  2. Who owns cross-product feature requests? Design the organizational
     model for cross-product features.

  3. The cross-product requests are the most requested overall, but
     each product PM argues their product-specific features matter
     more. How do you resolve this?

  4. Design the portfolio-level prioritization framework that evaluates
     features based on their impact across the entire suite, not just
     one product.

assertions:
  - type: llm_judge
    criteria: "Cross-product investment is prioritized — recognizes that cross-product customers generate 70% of revenue with 96% retention, justifying significant investment in 'glue' features"
    weight: 0.25
    description: "Cross-product investment justified"
  - type: llm_judge
    criteria: "Organizational model for cross-product is concrete — proposes a platform team, cross-product PM, or product council with dedicated engineering capacity"
    weight: 0.25
    description: "Concrete cross-product org model"
  - type: llm_judge
    criteria: "PM disagreement resolution uses data — proposes evaluating features by portfolio-level impact (cross-product retention, expansion revenue) rather than product-level metrics"
    weight: 0.25
    description: "Data-driven PM disagreement resolution"
  - type: llm_judge
    criteria: "Portfolio framework considers interdependencies — evaluates how building a feature in one product enables or enhances features in other products"
    weight: 0.25
    description: "Interdependency-aware framework"
