meta:
  id: feature-maturity-model
  level: 5
  course: feature-request-handling
  type: output
  description: "Assess and advance an organization's feature request maturity from reactive to predictive, designing the roadmap for each maturity stage"
  tags: [feature-requests, maturity, assessment, organizational, mastery]

state: {}

trigger: |
  You're a product operations consultant. Three clients have hired you
  to assess their feature request maturity and design improvement
  roadmaps. You use a 5-level maturity model:

  Level 1 — Chaotic: No process. Requests scattered across email,
  Slack, and memory. Decisions based on whoever shouts loudest.

  Level 2 — Reactive: Requests collected in a tool. Basic triage
  exists. Decisions based on request volume and urgency.

  Level 3 — Structured: Formal prioritization framework (RICE, etc).
  Regular review cadence. Customer feedback loop exists.

  Level 4 — Data-driven: Analytics inform priorities. A/B testing
  validates features. Customer advisory board provides input.

  Level 5 — Predictive: ML models predict demand. Proactive feature
  planning. Continuous discovery. Feature request system is a
  competitive advantage.

  Client assessments:

  Client A: "QuickStart" (Series B startup, $8M ARR, 20 engineers)
  - Feature requests live in 4 Slack channels and a shared Google Doc
  - CEO decides all priorities in a weekly meeting
  - No customer can see what's been requested or planned
  - Shipped features often surprise the team ("wait, we're building
    that?")
  - Current maturity: Level 1 (Chaotic)
  - Target: Level 3 within 12 months

  Client B: "GrowthCo" (Series D, $80M ARR, 150 engineers)
  - Uses Productboard for requests, RICE for scoring
  - Quarterly planning with cross-functional input
  - But: scored features often get overridden by executive requests
  - Feedback loop exists but customers report 3-week response times
  - Current maturity: Level 3 (Structured, with gaps)
  - Target: Level 4 within 12 months

  Client C: "EnterpriseCorp" ($500M ARR, 800 engineers, 20 products)
  - Analytics team provides data for prioritization
  - Customer advisory board meets quarterly
  - A/B tests for some features, but not systematic
  - Feature request data is siloed per product, no cross-product view
  - No predictive capabilities, fully reactive to requests
  - Current maturity: Level 4 (Data-driven, with gaps)
  - Target: Level 5 within 18 months

  Tasks:
  1. For each client, identify the specific gaps preventing them from
     reaching the next maturity level.

  2. Design the improvement roadmap for Client A (Level 1 → 3):
     Quarter-by-quarter, what do they implement?

  3. Design the improvement roadmap for Client B (Level 3 → 4):
     How do they make data truly drive decisions and close the
     executive override gap?

  4. Design the improvement roadmap for Client C (Level 4 → 5):
     What does the predictive feature planning system look like?

assertions:
  - type: llm_judge
    criteria: "Gap analysis is specific per client — identifies that Client A lacks basic tooling, Client B has process but not enforcement, and Client C has data but not cross-product intelligence"
    weight: 0.25
    description: "Specific gap analysis"
  - type: llm_judge
    criteria: "Client A roadmap starts with tooling — proposes centralizing requests into one tool before worrying about frameworks or analytics"
    weight: 0.25
    description: "Tooling-first for Level 1"
  - type: llm_judge
    criteria: "Client B roadmap addresses executive override — proposes governance structures that accommodate executive input without undermining the scoring framework"
    weight: 0.25
    description: "Override-addressing for Level 3"
  - type: llm_judge
    criteria: "Client C roadmap includes ML and cross-product — proposes unified data platform across 20 products and predictive models that forecast demand"
    weight: 0.25
    description: "ML and cross-product for Level 4→5"
