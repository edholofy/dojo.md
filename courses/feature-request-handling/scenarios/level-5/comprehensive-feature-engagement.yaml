meta:
  id: comprehensive-feature-engagement
  level: 5
  course: feature-request-handling
  type: output
  description: "Handle the ultimate feature request challenge — a full simulation where competitive pressure, customer churn, internal politics, and strategic pivots collide across a portfolio of products"
  tags: [feature-requests, comprehensive, simulation, full-day, mastery]

state: {}

trigger: |
  You're the CPO of "NexaSuite" ($600M ARR, 1,200 engineers, 10
  products, 60,000 customers). Today is the most consequential day
  of your career as a product leader.

  8:00 AM — Board mandate
  The board just approved a strategic pivot: NexaSuite will transform
  from a "best-of-breed point solutions" company to an "integrated
  AI-first platform." They've approved $100M in investment over 24
  months. Every product roadmap must change. Every feature request
  backlog must be re-evaluated.

  The implications:
  - 15,000 open feature requests are based on the OLD strategy
  - 300 features currently in development need to be re-evaluated
  - 50 enterprise contracts include feature commitments that may no
    longer align with the new direction
  - 1,200 engineers need to be re-allocated across products

  9:30 AM — Customer revolt
  Word of the pivot leaks to customers via a board member's tweet.
  Your community forum explodes:
  - "Are you abandoning [Product X]? I depend on it!"
  - "I requested [Feature Y] 18 months ago and now you're pivoting?"
  - "AI-first sounds like marketing BS. Just build what we asked for."
  - Your NPS drops 8 points in 24 hours (from +42 to +34)

  11:00 AM — Internal crisis
  3 product managers resign, saying: "We spent months building
  roadmaps based on customer requests, and now it's all thrown out."
  2 engineering directors refuse to re-allocate their teams. The VP
  Sales says: "If you change the roadmap, we'll miss revenue targets
  by $30M."

  1:00 PM — Competitor move
  Your main competitor (30% market share) announces a major acquisition
  that gives them the exact AI capabilities your board just approved
  investment in. They'll be ahead of you by 18 months.

  3:00 PM — Customer escalation
  5 enterprise customers ($25M combined ARR) call an emergency meeting:
  "We have feature commitments in our contracts. If you pivot away
  from these features, we consider that a breach of contract."

  Tasks:
  1. Triage the day: Prioritize these 5 crises. What do you address
     first, and what can wait?

  2. Design the feature request re-evaluation framework: How do you
     review 15,000 requests and 300 in-progress features through the
     lens of the new AI-first strategy?

  3. Handle the customer communication crisis: Write the message to
     60,000 customers explaining the strategic shift WITHOUT
     triggering more panic.

  4. Handle the contractual obligations: 5 enterprise customers have
     feature commitments. How do you honor contracts while pivoting?

  5. How do you retain the 3 PMs who resigned and get the 2
     engineering directors aligned? The internal people crisis is as
     urgent as the external one.

  6. The competitor is 18 months ahead. How does this change your
     approach to the pivot? Do you adjust speed, scope, or strategy?

assertions:
  - type: llm_judge
    criteria: "Day triage prioritizes customer trust and internal stability — addresses customer communication and PM retention before strategic planning, recognizing that execution requires people and trust"
    weight: 0.20
    description: "Trust and stability first"
  - type: llm_judge
    criteria: "Re-evaluation framework is systematic — proposes criteria for sorting 15,000 requests into categories (aligned with AI strategy, still relevant, needs modification, deprecated)"
    weight: 0.20
    description: "Systematic re-evaluation"
  - type: llm_judge
    criteria: "Customer message balances vision with continuity — presents the AI-first pivot as an evolution (not abandonment), commits to honoring existing obligations, and shares what won't change"
    weight: 0.20
    description: "Vision-continuity balanced message"
  - type: llm_judge
    criteria: "Contractual obligations are handled legally and relationally — proposes honoring commitments while renegotiating scope, offering alternatives, or extending timelines rather than breaching contracts"
    weight: 0.20
    description: "Legal and relational contract handling"
  - type: llm_judge
    criteria: "Competitive response adjusts strategy — proposes focusing on differentiation rather than feature parity with the competitor, potentially acquiring AI capability or partnering rather than building from scratch"
    weight: 0.20
    description: "Differentiation-focused competitive response"
