meta:
  id: feature-innovation-lab
  level: 5
  course: feature-request-handling
  type: output
  description: "Design an innovation program that goes beyond feature requests to proactively discover and validate breakthrough product ideas that customers can't articulate"
  tags: [feature-requests, innovation, discovery, breakthrough, mastery]

state: {}

trigger: |
  You're the CPO at "WorkPlatform" ($400M ARR, 50,000 customers). The
  company has mastered feature request handling — you collect, triage,
  and ship customer-requested features efficiently. But the CEO is
  concerned:

  "We're great at giving customers what they ask for. But we're not
  creating anything they didn't imagine. Steve Jobs said 'people don't
  know what they want until you show it to them.' Our competitors
  are launching breakthrough features while we're optimizing existing
  ones."

  Evidence:
  - 90% of your shipped features originated from customer requests
  - Only 10% were internally conceived innovations
  - Competitor A launched an AI assistant that customers love — zero
    customers had requested it
  - Competitor B launched a no-code workflow builder that doubled their
    growth — it was an internal bet, not a customer request
  - Your product hasn't had a "wow" feature in 2 years
  - Customer NPS is high (+45) but "likelihood to recommend to a
    friend" has plateaued — customers are satisfied but not excited

  The challenge: How do you balance customer-driven development (safe,
  validated, incremental) with innovation-driven development (risky,
  unvalidated, potentially breakthrough)?

  Tasks:
  1. Design the innovation lab: How does it operate alongside the
     feature request process?
     - Separate team? Same team with dedicated time?
     - How does it source ideas (beyond feature requests)?
     - How does it validate ideas cheaply before full investment?
     - How does it kill ideas that don't work?

  2. The "jobs beyond requests" framework: How do you discover customer
     needs that customers can't articulate? Design the research
     methodology.

  3. Allocate the innovation budget: What percentage of engineering
     should go to request-driven vs innovation-driven development?
     How do you justify investing in unvalidated ideas to a data-
     driven board?

  4. Design the innovation-to-product pipeline: When an innovation lab
     experiment succeeds, how does it become a product feature? What
     are the handoff criteria?

assertions:
  - type: llm_judge
    criteria: "Innovation lab has structural separation — proposes dedicated team or dedicated time (e.g., Google's 20%, Amazon's two-pizza teams) rather than asking the same PMs to innovate while handling requests"
    weight: 0.25
    description: "Structural innovation separation"
  - type: llm_judge
    criteria: "Discovery methodology goes beyond surveys — proposes ethnographic research, customer shadowing, behavioral data mining, trend analysis, or design sprints to uncover unarticulated needs"
    weight: 0.25
    description: "Beyond-survey discovery methods"
  - type: llm_judge
    criteria: "Investment allocation has a kill mechanism — proposes stage gates where innovation projects must demonstrate user interest before progressing, preventing endless R&D spend"
    weight: 0.25
    description: "Kill mechanism for innovations"
  - type: llm_judge
    criteria: "Board justification uses portfolio thinking — frames innovation investment as risk diversification, comparing it to venture capital portfolio theory where most bets fail but winners are transformative"
    weight: 0.25
    description: "Portfolio-framed board case"
