meta:
  id: feature-request-roi-framework
  level: 5
  course: feature-request-handling
  type: output
  description: "Build a comprehensive ROI framework for the entire feature request management function, proving its value to the C-suite and board"
  tags: [feature-requests, ROI, business-case, measurement, mastery]

state: {}

trigger: |
  You're the VP of Product Ops at "ScaleCo" ($300M ARR). The CFO is
  scrutinizing every cost center and asks: "Your product management
  team of 25 people spends significant time on feature request
  management — collecting, triaging, prioritizing, communicating. What's
  the ROI of all this work? Can we do it with fewer people?"

  Current feature request operations:
  - Team: 25 PMs (partially dedicated to feature requests) + 5 product
    ops specialists (fully dedicated) + tools budget ($200K/year)
  - Total estimated cost: $4M/year (loaded costs + tools)

  Measurable outcomes over the past 2 years:
  - Feature-request-to-ship rate increased from 8% to 35%
  - Customer satisfaction with feature delivery: 2.1 → 4.0/5
  - Churn among customers who submitted requests: dropped from 22%
    to 8% (vs 10% overall)
  - Features built from customer requests have 3x higher adoption than
    internally-driven features (65% vs 22%)
  - Time from request to acknowledgment: dropped from 21 days to 2 days
  - Duplicate request rate: dropped from 40% to 12% (saving 4 PM hours/
    week in triage)
  - Sales win rate when referencing customer-driven roadmap: 45% (vs
    28% without roadmap)

  Harder-to-measure outcomes:
  - Customer advocacy and referrals from customers whose features shipped
  - Competitive intelligence gathered from request patterns
  - Product strategy informed by request trend analysis
  - Engineering efficiency from better-specified features (fewer rewrites)
  - Employee satisfaction (PMs report higher job satisfaction)

  Tasks:
  1. Build the ROI model: Calculate the financial return of the $4M
     investment in feature request management. Include both direct
     returns and attributable returns.

  2. The CFO asks: "Can we cut the team from 30 to 15 and use AI to
     cover the gap?" Evaluate this proposal honestly — what's saved,
     what's lost, and what's the risk?

  3. Design the ongoing ROI dashboard that proves the function's value
     quarterly. What metrics make the business case self-evident?

  4. Write the board-level memo: "Why Feature Request Management Is
     Our Most Undervalued Function." 1 page, data-driven.

assertions:
  - type: llm_judge
    criteria: "ROI calculation includes churn prevention — quantifies the revenue saved by reducing request-submitter churn from 22% to 8% on identifiable revenue base"
    weight: 0.25
    description: "Churn prevention in ROI"
  - type: llm_judge
    criteria: "Headcount reduction analysis is honest — acknowledges some savings from AI but identifies risks like losing customer relationship quality, competitive intelligence, and strategic input"
    weight: 0.25
    description: "Honest headcount analysis"
  - type: llm_judge
    criteria: "Dashboard connects to revenue — shows feature request metrics alongside revenue metrics (churn, expansion, win rate) so the business impact is visually obvious"
    weight: 0.25
    description: "Revenue-connected dashboard"
  - type: llm_judge
    criteria: "Board memo uses financial language — speaks in terms of ROI, revenue protection, and competitive advantage, not product management jargon"
    weight: 0.25
    description: "Financial-language board memo"
