meta:
  id: product-market-fit-signals
  level: 5
  course: feature-request-handling
  type: output
  description: "Use feature request patterns to diagnose product-market fit, identify when to pivot, and determine whether feature investment or strategic repositioning is needed"
  tags: [feature-requests, PMF, strategy, pivot, mastery]

state: {}

trigger: |
  You're an advisor to 3 companies, each with different feature request
  patterns that signal different product-market fit situations. Your
  job is to diagnose each company's PMF health from their feature
  request data.

  Company A: "BuildBot" (construction project management, $15M ARR,
  2,000 customers, 3 years old)
  Feature request signal:
  - 80% of requests are for core functionality ("basic scheduling,"
    "resource tracking," "budget management")
  - Customers describe requests as "table stakes" and "expected basics"
  - Competitor products have these features
  - NPS: +15 (mediocre)
  - Churn: 18% annually
  - Sean Ellis survey: 22% "very disappointed" if product disappeared
  Diagnosis question: Does BuildBot have product-market fit?

  Company B: "AnalyzeAI" (AI-powered analytics, $5M ARR, 500
  customers, 18 months old)
  Feature request signal:
  - 70% of requests are for features that diverge from the core
    product (CRM features, project management, communication tools)
  - Customers say: "I love the analytics but I wish it did [unrelated
    thing] too"
  - Core feature requests are declining month over month
  - NPS: +42 (good for the 30% who use it heavily)
  - Churn: 25% annually (but power users have 2% churn)
  - Sean Ellis survey: 45% "very disappointed" (bimodal — power users
    love it, casual users don't care)
  Diagnosis question: AnalyzeAI has PMF for a niche. How should this
  affect their feature strategy?

  Company C: "RetailFlow" (retail operations, $40M ARR, 5,000
  customers, 5 years old)
  Feature request signal:
  - Requests are highly diverse — no clear pattern or top request
  - Customer segments want completely different things (restaurants
    want POS, retailers want inventory, e-commerce wants integration)
  - 500 "one-off" requests (unique to single customers)
  - NPS: +28 (adequate)
  - Churn: 12% annually
  - Sean Ellis survey: 35% "very disappointed"
  Diagnosis question: RetailFlow is trying to serve too many segments.
  How do they focus?

  Tasks:
  1. Diagnose each company's PMF health using the feature request
     signals. What do the request patterns tell you?

  2. For Company A (missing table stakes): Should they invest in
     building missing basics, or is it too late? What determines
     whether feature investment can save them?

  3. For Company B (niche PMF): How do they decide whether to go
     deeper in their niche or expand to serve casual users? What
     does the feature request data suggest?

  4. For Company C (unfocused): How do they use feature requests to
     identify which segment to focus on? Design the analysis
     framework.

assertions:
  - type: llm_judge
    criteria: "Company A is correctly diagnosed as pre-PMF — missing table stakes + 22% 'very disappointed' + 18% churn signals that core functionality gaps are preventing PMF"
    weight: 0.25
    description: "Pre-PMF diagnosis for Company A"
  - type: llm_judge
    criteria: "Company B strategy leverages niche strength — recommends going deeper with power users (2% churn segment) rather than expanding to serve casual users with unrelated features"
    weight: 0.25
    description: "Niche-deepening for Company B"
  - type: llm_judge
    criteria: "Company C focus framework uses segment analysis — proposes analyzing which customer segment has highest retention, highest expansion, and most concentrated feature requests to pick a focus"
    weight: 0.25
    description: "Segment-based focus framework"
  - type: llm_judge
    criteria: "Feature requests are treated as diagnostic signals — treats request patterns as symptoms of strategic health, not just a to-do list to build from"
    weight: 0.25
    description: "Requests as diagnostic signals"
