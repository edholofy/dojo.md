meta:
  id: open-source-feature-governance
  level: 5
  course: feature-request-handling
  type: output
  description: "Manage feature requests for a popular open-source project with community governance, where commercial interests, community desires, and maintainer capacity must be balanced"
  tags: [feature-requests, open-source, governance, community, mastery]

state: {}

trigger: |
  You're the lead maintainer and PM at "OpenDB" — a popular open-source
  database (60,000 GitHub stars, 5,000 contributors, 200,000 users).
  OpenDB also has a commercial cloud offering ($50M ARR) run by your
  company.

  The governance challenge: Feature requests come from 4 competing
  constituencies, each with different interests.

  Community contributors (volunteers):
  - Want: Performance improvements, developer experience, new storage
    engines
  - 2,000 open issues and feature requests on GitHub
  - Say: "Stop adding commercial features to the open-source version"
  - Contribute 60% of code but have no formal decision-making power

  Commercial customers ($50M ARR):
  - Want: Enterprise features (RBAC, audit logs, backup, monitoring)
  - 500 feature requests in the commercial support portal
  - Say: "We need features that justify our cloud subscription"
  - Fund 80% of full-time development through revenue

  Competitors (who fork your code):
  - "ForkDB" has 10,000 users and adds features you haven't built
  - They cherry-pick your best features and add proprietary ones
  - Their feature set is becoming more attractive to enterprises

  Core maintainers (8 people, 3 full-time):
  - Burned out from 200+ issues per month
  - Struggling to review 50 PRs per week
  - Say: "We need to say no more, but the community gets angry when
    we reject RFCs"

  Recent controversy:
  A community member proposed a major feature (new query language).
  200 community votes in favor. The commercial team vetoed it because
  it would compete with a commercial offering. The community is
  furious. "Open-source means community-driven, not company-driven."

  Tasks:
  1. Design the feature governance model: How are feature decisions
     made? Who has voting power? How do you balance commercial
     interests with community desires?

  2. Handle the query language controversy: The community wants it,
     the commercial team vetoed it. What's the right resolution?

  3. Design the feature request process for an open-source project:
     - RFC process for major features
     - Community voting that actually influences decisions
     - Maintainer bandwidth protection
     - Clear criteria for acceptance and rejection

  4. How do you compete with ForkDB without alienating the community
     by moving features from open-source to commercial?

assertions:
  - type: llm_judge
    criteria: "Governance model gives community real voice — proposes a technical steering committee or RFC voting process where community input genuinely influences decisions, not just advisory"
    weight: 0.25
    description: "Real community voice"
  - type: llm_judge
    criteria: "Query language resolution balances both sides — proposes a compromise like open-sourcing the feature with the commercial offering providing a managed version, or a community-driven fork of the feature"
    weight: 0.25
    description: "Balanced controversy resolution"
  - type: llm_judge
    criteria: "Maintainer burnout is addressed — proposes processes that reduce maintainer load (automated triage, community moderators, clear rejection criteria) rather than just adding more work"
    weight: 0.25
    description: "Burnout-reducing processes"
  - type: llm_judge
    criteria: "Open-source vs commercial boundary is clear — defines what belongs in open-source (core database, community features) vs commercial (enterprise operations, managed services)"
    weight: 0.25
    description: "Clear open/commercial boundary"
