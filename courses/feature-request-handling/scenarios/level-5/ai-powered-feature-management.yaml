meta:
  id: ai-powered-feature-management
  level: 5
  course: feature-request-handling
  type: output
  description: "Design an AI-powered feature request management system that automates intake, classification, deduplication, prioritization, and communication at scale"
  tags: [feature-requests, AI, automation, ML, future, mastery]

state: {}

trigger: |
  "ScalePlatform" ($1B ARR, 200,000 customers, 2,000 engineers)
  receives 20,000 feature requests per month. The CEO says: "We need
  AI to make sense of this. No human can read 20,000 requests."

  Your AI team has built prototypes for 5 capabilities:

  Capability 1: Intake Classification
  LLM reads each request and assigns: product area, category, sentiment,
  urgency, and estimated customer impact.
  Current accuracy: 78% on product area, 65% on category.

  Capability 2: Semantic Deduplication
  Embedding model clusters semantically similar requests.
  Current precision: 82% (18% false positives = unique requests
  incorrectly merged).
  Current recall: 70% (30% of true duplicates missed).

  Capability 3: Demand Forecasting
  ML model predicts which unrequested features will be requested in
  6 months based on usage patterns, support tickets, and market data.
  Historical accuracy: 62% (hit rate on predicted feature requests).

  Capability 4: Auto-Response Generation
  LLM generates personalized acknowledgment responses to each request.
  Quality rating (human eval): 4.1/5 (vs 3.8/5 for current templates).
  Risk: Occasionally generates responses that imply features will be
  built ("we're working on this" when it's not planned).

  Capability 5: Prioritization Scoring
  ML model assigns a priority score based on: requester value, request
  frequency, competitive landscape, strategic alignment, and effort.
  Correlation with PM decisions: 0.72 (reasonable but not perfect).

  Challenges:
  - PMs don't trust the AI scores ("I know my customers better")
  - Customers feel dehumanized when they receive AI-generated responses
  - The dedup false positives are causing customer complaints ("my
    unique request was auto-closed as duplicate!")
  - Privacy: requests contain customer data, business strategies, and
    confidential information
  - Bias: the model prioritizes enterprise customer requests because
    they historically get more attention in the training data

  Tasks:
  1. Design the AI-human collaboration model for each capability:
     What confidence threshold triggers auto-action vs human review?
     How do you handle AI mistakes gracefully?

  2. The dedup false positive problem (closing unique requests as
     duplicates) is causing trust issues. How do you solve this
     while maintaining dedup efficiency?

  3. Address the bias toward enterprise requests. How do you ensure
     the AI system doesn't create a two-tier feature request system?

  4. Design the privacy framework: What data can the AI see? How do
     you handle confidential information in requests?

  5. Calculate the ROI: If the system works as designed, how many PM
     and support hours does it save? What's the cost vs benefit?

assertions:
  - type: llm_judge
    criteria: "Confidence thresholds vary by action severity — auto-response at 85%, dedup suggestion at 90%, auto-close at 95%, prioritization as recommendation only, not auto-action"
    weight: 0.20
    description: "Severity-calibrated thresholds"
  - type: llm_judge
    criteria: "Dedup solution prevents false closes — proposes suggesting duplicates for human confirmation rather than auto-closing, or allowing customers to appeal with one click"
    weight: 0.20
    description: "False-close prevention"
  - type: llm_judge
    criteria: "Bias mitigation is specific — proposes rebalancing training data, adding segment-fairness constraints, or separate models per segment to prevent enterprise bias"
    weight: 0.20
    description: "Specific bias mitigation"
  - type: llm_judge
    criteria: "Privacy framework includes PII handling — proposes redaction before LLM processing, data minimization, and policies for what the model can and cannot see"
    weight: 0.20
    description: "PII-aware privacy framework"
  - type: llm_judge
    criteria: "ROI calculation includes both savings and risks — quantifies PM/support hour savings but also accounts for the cost of AI errors (lost trust, customer complaints)"
    weight: 0.20
    description: "Risk-inclusive ROI"
