meta:
  id: feature-request-psychology
  level: 5
  course: feature-request-handling
  type: output
  description: "Apply behavioral psychology principles to understand why customers request what they do, how to interpret requests accurately, and how to communicate decisions effectively"
  tags: [feature-requests, psychology, behavioral, communication, mastery]

state: {}

trigger: |
  You're a product strategy consultant specializing in the psychology
  of feature requests. A client asks you to help their product team
  understand the cognitive biases that affect both customers submitting
  requests and PMs evaluating them.

  Part 1: Customer biases in feature requests

  Bias A: Availability heuristic
  A customer just experienced a payment failure and now submits:
  "You URGENTLY need redundant payment processing." They used your
  product for 3 years without a payment issue. Should you weigh this
  request differently because it was triggered by a single bad
  experience?

  Bias B: Anchoring effect
  A customer switching from Competitor X requests: "Add the same
  dashboard layout as [Competitor X]." They're anchored to their
  previous experience. The actual need might be different from the
  solution they're describing.

  Bias C: Loss aversion
  500 customers request "don't remove the classic editor" when you
  announce a new editor. Only 200 used the classic editor regularly.
  300 are reacting to potential loss, not actual need.

  Bias D: Social proof
  A feature gets 50 votes in the first week after a popular blog post
  mentions it. The votes come from people who read the post, not from
  genuine need discovery. How do you distinguish organic demand from
  bandwagon voting?

  Part 2: PM biases in evaluation

  Bias E: Recency bias
  Your PM team consistently over-prioritizes the most recent requests
  and under-prioritizes older requests, even when older requests have
  more data supporting them.

  Bias F: HiPPO (Highest Paid Person's Opinion)
  The CEO's feature ideas get built 80% of the time, while customer-
  requested features get built 15% of the time.

  Bias G: Sunk cost fallacy
  A feature that's been "in progress" for 6 months with 3 engineers
  keeps getting prioritized because "we've already invested so much,"
  even though customer need has shifted.

  Tasks:
  1. For each of the 7 biases, explain the psychological mechanism
     and how it distorts feature request data.

  2. Design "debiasing" techniques for each: What process, data, or
     framework would counteract the bias?

  3. How do you design a feature request system that minimizes these
     biases? (Template design, scoring systems, decision processes)

  4. Write a training guide for PMs: "The 7 Cognitive Biases That
     Distort Your Feature Prioritization (And How to Fix Them)"

assertions:
  - type: llm_judge
    criteria: "Psychological mechanisms are accurately described — correctly identifies availability heuristic (recency of experience), anchoring (reference point dependence), loss aversion (2x weight of losses vs gains), and social proof (conformity)"
    weight: 0.25
    description: "Accurate psychological descriptions"
  - type: llm_judge
    criteria: "Debiasing techniques are practical — proposes concrete methods like cooling-off periods for reactive requests, blind scoring to counter HiPPO, and vote-source analysis for social proof"
    weight: 0.25
    description: "Practical debiasing techniques"
  - type: llm_judge
    criteria: "System design addresses biases structurally — proposes process features like randomized request ordering, time-decay scoring, and mandatory data review before prioritization"
    weight: 0.25
    description: "Structurally debiased system"
  - type: llm_judge
    criteria: "PM training guide is actionable — provides specific 'when you notice X, do Y' guidance that PMs can apply immediately"
    weight: 0.25
    description: "Actionable PM training"
