meta:
  id: feature-request-transformation
  level: 5
  course: feature-request-handling
  type: output
  description: "Lead a complete transformation of a broken feature request process from chaos to a world-class voice-of-customer program"
  tags: [feature-requests, transformation, VoC, leadership, mastery]

state: {}

trigger: |
  You've been hired as CPO of "LegacyTech" ($500M ARR, 1,000
  engineers, 50,000 customers, 15 products). The board hired you to
  fix the product organization. Your first 90 days reveal:

  The current state:
  - 25,000 open feature requests across 15 products (oldest: 7 years)
  - No unified feature request system (3 different tools: Jira,
    Productboard, and spreadsheets)
  - 12 PMs, each with their own prioritization method
  - Customer satisfaction with "feature delivery": 1.8/5
  - Only 8% of shipped features were customer-requested
  - Sales makes feature promises in 60% of deals
  - 40% of engineering capacity goes to "urgent" executive requests
  - Feature adoption rate: 23% of shipped features reach 10% adoption
  - No customer advisory board, no beta program, no feedback loop
  - The last customer survey was 3 years ago

  Financial context:
  - Revenue growth slowed from 30% to 8% YoY
  - Churn increased from 8% to 15%
  - Competitor just raised $200M and is building AI features
  - Board is considering replacing the entire product leadership

  Your predecessor left notes:
  "I tried to fix this. The engineering team resists PM involvement.
  Sales thinks they own the roadmap. The CEO changes priorities weekly.
  The executive team doesn't understand product management. Good luck."

  Tasks:
  1. Diagnose: What's the root cause of the 1.8/5 satisfaction score
     and 23% adoption rate? Map the systemic failures.

  2. Design the 12-month transformation plan:
     - Month 1-3: Foundation and quick wins
     - Month 4-6: Process and tooling
     - Month 7-9: Culture and capability
     - Month 10-12: Optimization and scale
     Include organizational changes, tooling decisions, and process
     redesigns.

  3. Handle the political dynamics:
     - How do you stop sales from making feature promises?
     - How do you stop the CEO from weekly priority changes?
     - How do you earn engineering's trust?
     - How do you prove value to a skeptical board?

  4. What does success look like at 6 months and 12 months? Define
     the metrics that prove the transformation is working.

assertions:
  - type: llm_judge
    criteria: "Root cause diagnosis connects all symptoms — low adoption traces to building the wrong things (executive-driven), which traces to no customer input, which traces to broken feedback loops"
    weight: 0.20
    description: "Connected root cause diagnosis"
  - type: llm_judge
    criteria: "Quick wins build credibility — Month 1-3 includes tangible improvements (fix top 5 customer-requested bugs, launch feedback survey, unify tools) that demonstrate change"
    weight: 0.20
    description: "Credibility-building quick wins"
  - type: llm_judge
    criteria: "Political dynamics are handled through systems, not confrontation — proposes governance processes that naturally prevent sales promises and CEO priority changes"
    weight: 0.20
    description: "System-based political solutions"
  - type: llm_judge
    criteria: "Success metrics are specific and phased — proposes measurable targets (customer satisfaction 1.8→3.5, adoption 23%→50%, customer-originated features 8%→40%) at 6 and 12 months"
    weight: 0.20
    description: "Specific phased metrics"
  - type: llm_judge
    criteria: "25,000-request backlog gets a strategy — proposes some form of backlog bankruptcy, archival, or mass-triage rather than ignoring the elephant in the room"
    weight: 0.20
    description: "Backlog strategy included"
