meta:
  id: first-prioritization-meeting
  level: 1
  course: feature-request-handling
  type: output
  description: "Prepare for and run your first feature prioritization meeting where stakeholders have competing opinions"
  tags: [feature-requests, meeting, prioritization, stakeholders, fundamentals]

state: {}

trigger: |
  You're a junior PM at "CRM Plus" (customer relationship management
  tool, 5,000 customers). Tomorrow is your first feature prioritization
  meeting. Your manager is on vacation and you're running it solo.

  Attendees and their priorities:

  VP Sales (Tom): "We need CRM-to-email integration NOW. I've lost
  3 deals this month because prospects asked 'does it integrate with
  Gmail?' and the answer was no. This is costing us real revenue."

  Head of Engineering (Priya): "We need to pay down technical debt
  first. The database is slow and if we keep adding features on a
  shaky foundation, everything will break. I want 2 sprints for
  refactoring before any new features."

  Head of Support (Carlos): "The number one support ticket is 'how
  do I import my contacts from a CSV?' We need a proper import tool.
  It would cut our ticket volume by 20%."

  VP Marketing (Nina): "We need a public API. Our competitors all
  have APIs and we're being excluded from 'best CRM tools' lists
  because integration reviewers can't test us."

  CEO (drops in for 5 minutes): "Just make sure whatever we build
  moves the needle on revenue. We need to hit $10M ARR by year-end."

  Your data:
  - Current ARR: $7.5M
  - Biggest growth lever: Enterprise sales (need integrations)
  - Biggest churn driver: Poor onboarding (need import tool)
  - Technical debt: 30% of bugs trace to the slow database
  - Engineering capacity: 2 features per quarter maximum

  Tasks:
  1. Prepare the meeting agenda — what structure ensures productive
     discussion and a decision in 60 minutes?

  2. Each stakeholder makes a strong case. How do you evaluate their
     arguments? Create a simple comparison framework.

  3. Make your recommendation: Which 2 features for next quarter?
     Justify with data and explain how it ties to the $10M ARR goal.

  4. How do you handle Tom (VP Sales) when he pushes back because
     his feature wasn't selected?

assertions:
  - type: llm_judge
    criteria: "Meeting agenda is structured for decision-making — includes time-boxed pitches, data-driven evaluation criteria, and a commitment to leaving with a decision, not just discussion"
    weight: 0.25
    description: "Decision-focused agenda"
  - type: llm_judge
    criteria: "Recommendation ties to the $10M goal — connects feature choices to revenue growth (new sales) and churn reduction (retention), showing the path to $10M"
    weight: 0.25
    description: "Revenue-aligned recommendation"
  - type: llm_judge
    criteria: "Comparison framework is objective — evaluates each request on the same criteria (revenue impact, effort, strategic alignment, customer demand) rather than relying on who argues loudest"
    weight: 0.25
    description: "Objective comparison framework"
  - type: llm_judge
    criteria: "Pushback handling is respectful — acknowledges Tom's valid concern about lost deals, explains the reasoning, and offers a compromise (e.g., 'it's Q3 priority' or 'we'll do a lightweight version')"
    weight: 0.25
    description: "Respectful pushback handling"
