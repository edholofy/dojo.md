meta:
  id: saying-no-basics
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn how to decline feature requests gracefully without damaging customer relationships"
  tags: [feature-requests, communication, saying-no, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "InvoiceFlow" (invoicing SaaS,
  800 customers). Customers frequently request features that your
  product team has decided not to build. Your job is to communicate
  "no" in a way that's honest but doesn't make customers feel dismissed.

  Scenario 1: Cryptocurrency payments
  A customer asks: "When are you going to support Bitcoin payments?
  It's 2026 — every payment platform should have this."
  Product decision: Not on the roadmap. Crypto represents <1% of B2B
  payments and adds significant compliance complexity.

  Scenario 2: White-label option
  A customer asks: "Can I remove your branding from the invoices and
  add my own logo? I want it to look like my own platform."
  Product decision: This has been requested 3 times in 2 years. The
  engineering cost is 4 weeks. Not enough demand to justify it.

  Scenario 3: Custom invoice templates with code
  A developer customer asks: "I want to write custom HTML/CSS for my
  invoice templates. Your template editor is too limiting."
  Product decision: This conflicts with your product philosophy of
  simplicity. You offer 20 templates. Custom code would create support
  burden and security risks.

  Scenario 4: Integration with obscure accounting software
  A customer asks: "Do you integrate with 'LedgerPro'? It's what we
  use and we can't switch."
  Product decision: LedgerPro has 200 users worldwide. You support
  QuickBooks, Xero, and FreshBooks. Building this integration isn't
  viable.

  Tasks:
  1. Write a response to each of the 4 scenarios that declines the
     request while maintaining the relationship.

  2. For each response, identify what technique you're using:
     - Redirecting to existing alternatives
     - Explaining the "why" behind the decision
     - Validating the need without promising the solution
     - Offering a workaround

  3. Which of these 4 requests, if any, deserve to be reconsidered?
     What would change your mind?

assertions:
  - type: llm_judge
    criteria: "Responses don't say 'never' — uses language like 'not currently on our roadmap' or 'not something we're planning right now' rather than permanently closing the door"
    weight: 0.25
    description: "Door left open"
  - type: llm_judge
    criteria: "Each response validates the customer's need — acknowledges why they want the feature before explaining why it's not being built"
    weight: 0.25
    description: "Need validated before declining"
  - type: llm_judge
    criteria: "Workarounds are offered where possible — for white-labeling suggests higher-tier plan or custom CSS, for LedgerPro suggests API or Zapier, for crypto suggests third-party processor"
    weight: 0.25
    description: "Workarounds offered"
  - type: llm_judge
    criteria: "Reconsideration criteria are specific — identifies that white-labeling could be reconsidered if demand increases or if it becomes a competitive differentiator"
    weight: 0.25
    description: "Specific reconsideration criteria"
