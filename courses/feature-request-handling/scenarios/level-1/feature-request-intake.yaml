meta:
  id: feature-request-intake
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn how to properly receive, document, and categorize incoming feature requests from customers"
  tags: [feature-requests, intake, categorization, fundamentals]

state: {}

trigger: |
  You're a junior product associate at "TaskMaster" (project management
  SaaS, 2,000 customers). You've just been put in charge of the feature
  request inbox — a shared email where customers, sales reps, and
  support agents submit ideas for new features.

  This morning you have 8 new messages:

  Message 1 (from customer): "Your app NEEDS dark mode. Every other
  app has it. I'm tired of the bright white screen burning my eyes
  at night."

  Message 2 (from sales rep): "Big prospect (50 seats, $25K/year)
  wants Gantt chart view before they'll sign. Can we add this?"

  Message 3 (from customer): "It would be cool if you had some kind
  of AI thing that could help write task descriptions."

  Message 4 (from support agent): "Getting 10+ tickets/week asking
  for the ability to set recurring tasks. This is our most requested
  feature."

  Message 5 (from customer): "Bug: when I click the export button
  nothing happens." (This is filed as a feature request but sounds
  like a bug.)

  Message 6 (from customer): "Please add integrations with Slack,
  Teams, Discord, Zoom, Google Calendar, Outlook, Notion, Figma,
  and Linear." (9 different requests in one message.)

  Message 7 (from CEO): "I saw a competitor launch AI task planning.
  We should look into this."

  Message 8 (from customer): "I love your product! One small thing —
  could the notification sound be customizable?"

  Tasks:
  1. For each message, categorize it: Is it a feature request, a bug
     report, a question, or something else? If it's a feature request,
     assign a category (UI/UX, Integration, AI, Core functionality).

  2. Write a proper feature request ticket for Message 2 (Gantt chart)
     with these fields: Title, Description, Requester, Business context,
     User problem being solved, Suggested solution.

  3. How do you handle Message 6 (9 requests in one message)?
     Do you create 9 separate tickets? Group them? Something else?

  4. Write an acknowledgment reply to Message 1 (dark mode request).

assertions:
  - type: llm_judge
    criteria: "Categorization is accurate — Message 5 is identified as a bug (not a feature request), Message 7 is identified as internal competitive intelligence, and the rest are properly categorized as feature requests"
    weight: 0.25
    description: "Accurate categorization"
  - type: llm_judge
    criteria: "Gantt chart ticket separates problem from solution — describes the user's need (visualizing project timelines/dependencies) rather than just 'add Gantt chart'"
    weight: 0.25
    description: "Problem vs solution separation"
  - type: llm_judge
    criteria: "Multi-request handling is practical — suggests splitting Message 6 into individual tickets or logical groups (e.g., all communication tools together) rather than one giant ticket"
    weight: 0.25
    description: "Practical multi-request handling"
  - type: llm_judge
    criteria: "Acknowledgment is warm and honest — thanks the customer, confirms the request is logged, but doesn't promise dark mode will be built or give a timeline"
    weight: 0.25
    description: "Warm honest acknowledgment"
