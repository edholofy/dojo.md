meta:
  id: duplicate-request-handling
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn to identify and merge duplicate feature requests while making each requester feel heard"
  tags: [feature-requests, deduplication, organization, fundamentals]

state: {}

trigger: |
  You're managing the feature request board at "NoteApp" (note-taking
  SaaS, 10,000 users). You've noticed that many requests are duplicates
  phrased differently. Here are 12 requests that came in this week:

  Request A: "Add markdown support for formatting notes"
  Request B: "Let me use bold, italic, and headers in my notes"
  Request C: "Rich text editor please!"
  Request D: "I want to be able to format text like in Google Docs"

  Request E: "Add folders to organize my notes"
  Request F: "Let me create categories or tags for notes"
  Request G: "I need a way to group related notes together"
  Request H: "Nested notebooks would be amazing"

  Request I: "Dark mode"
  Request J: "Night theme option"
  Request K: "Can you make the background black? White hurts my eyes"
  Request L: "Accessibility: high contrast mode for low vision users"

  Tasks:

  1. Group these 12 requests into clusters of duplicates. Which ones
     are true duplicates, which are similar-but-different, and which
     should remain separate?

  2. For each cluster, write a canonical feature request title and
     description that captures the spirit of all requests in the group.

  3. Request L (high contrast mode) was grouped with dark mode requests
     I-K. Should it be? Explain why this is or isn't the same request.

  4. Write a message to the requester of Request B informing them
     that their request has been merged with the "text formatting"
     cluster. How do you make them feel heard while explaining the
     merge?

  5. The "text formatting" cluster has 4 requests but they want
     different things (markdown vs rich text vs Google Docs-like).
     How do you handle this?

assertions:
  - type: llm_judge
    criteria: "Request L is separated from dark mode — recognizes that accessibility/high contrast is a different need than cosmetic dark mode, even though both change the visual theme"
    weight: 0.25
    description: "Accessibility vs cosmetic distinction"
  - type: llm_judge
    criteria: "Text formatting cluster acknowledges differences — notes that markdown support vs rich text editor vs WYSIWYG are different implementation approaches to the same underlying need"
    weight: 0.25
    description: "Implementation differences noted"
  - type: llm_judge
    criteria: "Merge message validates the original request — confirms 'your specific feedback about bold/italic/headers has been noted' even while merging into a broader category"
    weight: 0.25
    description: "Validating merge message"
  - type: llm_judge
    criteria: "Organization cluster properly groups E-H — recognizes folders, tags, categories, and nested notebooks as different solutions to the same organization need"
    weight: 0.25
    description: "Correct organization grouping"
