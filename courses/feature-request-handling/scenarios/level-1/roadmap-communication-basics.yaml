meta:
  id: roadmap-communication-basics
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn how to communicate product roadmap decisions to customers who have submitted feature requests"
  tags: [feature-requests, roadmap, communication, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "EventPro" (event management
  SaaS, 4,000 customers). The product team just published the Q2
  roadmap, and now you need to communicate with customers who submitted
  feature requests.

  Q2 Roadmap (what's being built):
  - Virtual event hosting (new feature)
  - Attendee check-in mobile app (new feature)
  - Improved reporting dashboard (enhancement)

  What's NOT on the Q2 roadmap (frequently requested):
  - Multi-language support (requested by 200 customers)
  - Custom registration forms (requested by 150 customers)
  - Sponsor management module (requested by 80 customers)

  What was just shipped (Q1):
  - Stripe payment integration (requested by 300 customers)

  You need to write 4 different communications:

  1. "We built it!" message: Write to the 300 customers who requested
     Stripe integration letting them know it shipped.

  2. "It's coming!" message: Write to customers who'll benefit from
     Q2 features (virtual events, check-in app, reporting).

  3. "Not yet" message: Write to the 200 customers who requested
     multi-language support. It's not on Q2 but the product team
     acknowledges it's important.

  4. "Roadmap update" post: Write a brief public blog-style roadmap
     update announcing Q2 plans.

  Tasks:
  1. Write all 4 communications
  2. For the "we built it" message, how do you encourage customers to
     try the new feature?
  3. For the "not yet" message, how do you maintain hope without
     making promises?
  4. For the public roadmap post, what level of specificity is
     appropriate? (Exact dates? Quarters? Vague timelines?)

assertions:
  - type: llm_judge
    criteria: "Shipped feature message celebrates and drives adoption — thanks customers for the feedback, announces the feature, includes a link or CTA to try it, and asks for feedback"
    weight: 0.25
    description: "Adoption-driving ship message"
  - type: llm_judge
    criteria: "Not-yet message maintains trust — acknowledges the request is important, doesn't promise a specific timeline, but signals it hasn't been forgotten"
    weight: 0.25
    description: "Trust-maintaining not-yet message"
  - type: llm_judge
    criteria: "Public roadmap avoids specific dates — uses quarters or 'coming soon' rather than exact dates, protecting the team from deadline pressure while giving customers direction"
    weight: 0.25
    description: "Appropriately vague public roadmap"
  - type: llm_judge
    criteria: "Communications are differentiated by audience — the individual customer messages are personal and specific, while the public post is broader and marketing-appropriate"
    weight: 0.25
    description: "Audience-appropriate tone"
