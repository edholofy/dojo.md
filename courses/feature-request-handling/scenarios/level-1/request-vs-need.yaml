meta:
  id: request-vs-need
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn to distinguish between what customers ask for (the request) and what they actually need (the underlying problem)"
  tags: [feature-requests, problem-discovery, user-needs, fundamentals]

state: {}

trigger: |
  You're a product associate at "ShipTrack" (logistics management
  platform, 1,500 customers). Your PM has taught you an important
  principle: "Customers tell you solutions. Your job is to find the
  problem."

  Here are 5 customer requests. For each one, the customer is asking
  for a specific solution, but there may be a deeper underlying need.

  Request 1: "Add a button to export all shipment data to Excel."
  Customer context: A logistics manager at a mid-size company. They
  export data every Friday to create a weekly report for their boss.

  Request 2: "Let me set up automatic email alerts when a shipment
  is delayed by more than 2 hours."
  Customer context: A customer support lead who gets complaints from
  end-customers about late deliveries. They want to proactively reach
  out before customers call in.

  Request 3: "Can you make the dashboard load faster? It takes 10
  seconds and I lose my train of thought."
  Customer context: A dispatcher who checks the dashboard 50+ times
  per day to monitor active shipments.

  Request 4: "I want to be able to color-code my shipments by
  customer."
  Customer context: A small business owner who handles 5 major
  customers and wants to quickly see which shipments belong to which
  customer.

  Request 5: "Please add integration with SAP."
  Customer context: An enterprise operations director. Their company
  uses SAP for everything. Currently, a team of 3 manually enters
  ShipTrack data into SAP every day.

  Tasks:

  1. For each request, identify:
     a) What the customer is asking for (the solution)
     b) What problem they're actually trying to solve (the need)
     c) Are there alternative solutions that might be better?

  2. For Request 1, what questions would you ask the customer to
     better understand their underlying need?

  3. For Request 3, is this a feature request or a performance bug?
     How would you categorize it?

  4. Which of these 5 requests, once you understand the real need,
     might be solved by an existing feature they don't know about?

assertions:
  - type: llm_judge
    criteria: "Request 1 underlying need is identified — the need isn't Excel export but automated weekly reporting for their boss, which could be solved by a built-in report or scheduled email"
    weight: 0.25
    description: "Underlying need identified"
  - type: llm_judge
    criteria: "Alternative solutions are proposed — for Request 2, suggests a customer-facing tracking portal or automated SMS, not just email alerts; for Request 4, suggests filtering or grouping views"
    weight: 0.25
    description: "Creative alternatives proposed"
  - type: llm_judge
    criteria: "Request 3 is correctly identified as a performance issue — recognizes that a 10-second load time for a frequently-used dashboard is a bug/performance issue, not a feature request"
    weight: 0.25
    description: "Performance issue identified"
  - type: llm_judge
    criteria: "Discovery questions go beyond the request — for Request 1, asks about what data they include in the report, who reads it, what decisions it drives, and how often they create it"
    weight: 0.25
    description: "Deep discovery questions"
