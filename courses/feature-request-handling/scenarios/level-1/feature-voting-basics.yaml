meta:
  id: feature-voting-basics
  level: 1
  course: feature-request-handling
  type: output
  description: "Set up and manage a basic feature voting system to aggregate customer demand and track request popularity"
  tags: [feature-requests, voting, feedback, fundamentals]

state: {}

trigger: |
  You're a product coordinator at "DesignTool" (collaborative design
  app, 8,000 users). The company just launched a public feature voting
  board (like Canny or UserVoice) and after 2 months, here are the
  results:

  Top 10 voted features:
  1. Offline mode (842 votes)
  2. Version history (731 votes)
  3. Dark mode (698 votes)
  4. Real-time collaboration (654 votes)
  5. Plugin/extension system (589 votes)
  6. Mobile app (523 votes)
  7. PDF export (478 votes)
  8. Template marketplace (445 votes)
  9. AI design suggestions (412 votes)
  10. Keyboard shortcuts (387 votes)

  Your PM is skeptical: "These votes don't tell the whole story. Our
  biggest customers don't vote on public boards. And 'dark mode' always
  wins voting contests even though it rarely drives business results."

  Additional context:
  - Only 1,200 of 8,000 users have voted (15% participation)
  - Free users vote 3x more than paid users
  - Your top 50 customers (by revenue) haven't voted at all
  - "Real-time collaboration" is the #1 request from enterprise
    prospects in sales calls
  - "PDF export" is the most common reason for support tickets

  Tasks:

  1. What are the limitations of a pure voting system? Identify at
     least 4 biases that make the raw vote count misleading.

  2. How would you weight the votes to get a more accurate signal?
     Propose a weighting system (e.g., paid users count more,
     enterprise votes weighted higher).

  3. Looking at the full picture (votes + sales data + support data),
     what would your actual top 5 priority list look like?

  4. The #1 voted feature (offline mode) would take 6 months of
     engineering. How do you communicate to the 842 voters that
     you're not building it next?

assertions:
  - type: llm_judge
    criteria: "Identifies voting biases — mentions selection bias (only 15% vote), vocal minority effect, free vs paid user skew, and enterprise customer absence from the board"
    weight: 0.25
    description: "Voting biases identified"
  - type: llm_judge
    criteria: "Weighting system accounts for revenue — proposes weighting by plan tier, account size, or revenue contribution so enterprise customer preferences aren't drowned out by free users"
    weight: 0.25
    description: "Revenue-weighted voting"
  - type: llm_judge
    criteria: "Reprioritized list differs from raw votes — real-time collaboration and PDF export move up (enterprise demand and support ticket reduction) while dark mode and offline mode move down"
    weight: 0.25
    description: "Data-informed reprioritization"
  - type: llm_judge
    criteria: "Communication to voters is honest and specific — explains why offline mode isn't next (complexity, timeline), what IS being built instead, and that their votes still matter"
    weight: 0.25
    description: "Honest voter communication"
