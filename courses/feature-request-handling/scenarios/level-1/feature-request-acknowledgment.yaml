meta:
  id: feature-request-acknowledgment
  level: 1
  course: feature-request-handling
  type: output
  description: "Write professional acknowledgment messages for feature requests that set appropriate expectations without overpromising"
  tags: [feature-requests, acknowledgment, communication, fundamentals]

state: {}

trigger: |
  You're on the customer success team at "FormBuilder" (online form
  tool, 5,000 users). You need to acknowledge feature requests from
  different types of customers, each requiring a slightly different
  tone and level of detail.

  Request 1: From a free-tier user
  "I wish there was a way to add conditional logic to forms — like
  show question 5 only if the answer to question 3 is 'Yes'. This
  would be SO useful!"
  Context: Conditional logic exists on the Pro plan ($29/month). The
  user is on the free plan.

  Request 2: From an enterprise customer ($50K/year)
  "We need HIPAA compliance for our healthcare intake forms. Without
  it, we can't use FormBuilder for our primary use case. Our contract
  renews in 60 days."
  Context: HIPAA compliance is on the roadmap for Q3 (4 months away).

  Request 3: From a power user (Pro plan, very active in community)
  "I've been using FormBuilder for 3 years now and I really think you
  should add a form analytics dashboard — response rates, completion
  times, drop-off points. I posted about this in the community forum
  and 47 people upvoted it."
  Context: Form analytics is being actively developed, shipping in
  ~6 weeks. But it hasn't been publicly announced yet.

  Request 4: From an angry customer
  "This is the THIRD time I'm asking for PDF export. Every time I get
  a generic 'thanks for the feedback' response. Do you even read these?
  Is anyone actually listening?"
  Context: PDF export has been requested 200+ times. It's prioritized
  for Q2 but you can't share specific dates.

  Tasks:
  1. Write an acknowledgment response for each of the 4 requests.
  2. For Request 1, how do you mention the Pro plan without being
     overly salesy?
  3. For Request 2, how much do you reveal about the Q3 roadmap?
  4. For Request 4, how do you rebuild trust with a frustrated repeat
     requester?

assertions:
  - type: llm_judge
    criteria: "Free user response naturally mentions Pro plan — weaves in that conditional logic exists on Pro without making the reply feel like a sales pitch"
    weight: 0.25
    description: "Natural upsell mention"
  - type: llm_judge
    criteria: "Enterprise response addresses urgency — acknowledges the 60-day renewal timeline and provides enough roadmap signal (without exact dates) to support their planning"
    weight: 0.25
    description: "Urgency-aware enterprise response"
  - type: llm_judge
    criteria: "Power user response doesn't leak the unannounced feature — shows appreciation for the community advocacy without confirming or denying that analytics is being built"
    weight: 0.25
    description: "No premature announcement"
  - type: llm_judge
    criteria: "Angry customer response is different from a first-time acknowledgment — acknowledges the frustration of asking 3 times, doesn't use generic template language, and signals that this request has genuine traction"
    weight: 0.25
    description: "Genuine frustrated-customer response"
