meta:
  id: prioritization-basics
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn basic feature prioritization using impact vs effort thinking and simple scoring methods"
  tags: [feature-requests, prioritization, impact-effort, fundamentals]

state: {}

trigger: |
  You're a junior PM at "HelpDesk Pro" (customer support tool, 3,000
  customers). Your team has a sprint planning meeting tomorrow and
  you need to recommend which features to build next quarter.

  The engineering team has capacity for approximately 3 medium features
  or 1 large + 2 small features per quarter.

  Here are 8 feature requests, each with data:

  Feature A: Canned response library
  - Requested by: 340 customers (most-requested feature)
  - Impact: Saves agents 15 min/day on average
  - Effort: Small (2 weeks)
  - Revenue impact: Reduces churn — most churned customers cite "too
    slow to respond" as a reason

  Feature B: AI-powered ticket routing
  - Requested by: 45 customers (mostly enterprise)
  - Impact: Reduces misrouted tickets by 60%
  - Effort: Large (10 weeks)
  - Revenue impact: Required by 3 enterprise prospects ($200K total)

  Feature C: Customer satisfaction (CSAT) surveys
  - Requested by: 180 customers
  - Impact: Lets teams measure support quality
  - Effort: Medium (5 weeks)
  - Revenue impact: Table stakes — competitors all have it

  Feature D: Dark mode
  - Requested by: 520 customers (second most-requested)
  - Impact: Cosmetic / quality of life
  - Effort: Medium (4 weeks)
  - Revenue impact: Minimal — unlikely to drive new sales or reduce
    churn

  Feature E: WhatsApp integration
  - Requested by: 90 customers
  - Impact: Opens new communication channel
  - Effort: Medium (6 weeks)
  - Revenue impact: Would unlock LATAM market ($500K opportunity)

  Feature F: Reporting dashboard
  - Requested by: 210 customers
  - Impact: Lets managers track team performance
  - Effort: Large (8 weeks)
  - Revenue impact: Sells to managers (buying decision makers)

  Feature G: Mobile app
  - Requested by: 150 customers
  - Impact: Agents can respond on the go
  - Effort: Extra-large (16 weeks — not feasible this quarter)
  - Revenue impact: High for field service companies

  Feature H: Emoji reactions on tickets
  - Requested by: 25 customers
  - Impact: Minor quality of life
  - Effort: Small (1 week)
  - Revenue impact: None

  Tasks:
  1. Score each feature using a simple impact/effort framework. Show
     your scoring and reasoning.

  2. Recommend which features to build this quarter (remember: capacity
     for ~3 medium or 1 large + 2 small). Justify your choices.

  3. For the features NOT selected, write a one-sentence rationale for
     why they didn't make the cut this quarter.

  4. What additional data would you want before finalizing the decision?

assertions:
  - type: llm_judge
    criteria: "Scoring uses multiple impact factors — considers request volume, revenue impact, competitive necessity, and effort, not just 'most requested wins'"
    weight: 0.25
    description: "Multi-factor scoring"
  - type: llm_judge
    criteria: "Feature A (canned responses) is highly ranked — high request volume, small effort, and direct churn reduction make it the best bang-for-buck"
    weight: 0.25
    description: "Quick wins identified"
  - type: llm_judge
    criteria: "Dark mode is deprioritized despite high request count — recognizes that request volume alone doesn't justify prioritization when revenue impact is minimal"
    weight: 0.25
    description: "Request volume isn't everything"
  - type: llm_judge
    criteria: "Additional data requests are smart — asks about churn correlation, customer segment breakdown, competitive timeline, or A/B testing feasibility"
    weight: 0.25
    description: "Smart data requests"
