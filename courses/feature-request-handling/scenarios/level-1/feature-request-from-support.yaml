meta:
  id: feature-request-from-support
  level: 1
  course: feature-request-handling
  type: output
  description: "Learn to extract and document feature requests that surface through customer support conversations"
  tags: [feature-requests, support, extraction, fundamentals]

state: {}

trigger: |
  You're a support agent at "SchedulePro" (appointment scheduling SaaS,
  6,000 customers). Your PM has asked you to start capturing feature
  requests that come up during support conversations. "Most feature
  requests don't come through the feature request form — they come
  through support tickets disguised as questions or complaints."

  Here are 5 support conversations from today:

  Ticket 1: "How do I send appointment reminders via WhatsApp?"
  You: "Currently we support email and SMS reminders. WhatsApp isn't
  available yet."
  Customer: "Oh, that's disappointing. Most of my clients prefer
  WhatsApp. I guess I'll keep doing it manually."

  Ticket 2: "I'm getting an error when I try to book 50 appointments
  at once."
  You: "Our system supports up to 20 bulk bookings at a time."
  Customer: "That's way too low. I run a clinic with 200 daily
  patients. I need to import my whole schedule at once."

  Ticket 3: "Can you help me set up different booking pages for
  different services? I'm a salon and I want one page for haircuts
  and another for coloring."
  You: "Currently, all services show on a single booking page. You
  can't create separate pages per service type."
  Customer: "That makes my page really long and confusing for clients."

  Ticket 4: "I cancelled my subscription but I need to resubscribe.
  The pricing page shows $29/month but I was paying $19/month on the
  old plan. Can I get my old price back?"
  You: "Unfortunately, once a subscription is cancelled, the previous
  pricing isn't available."
  Customer: "That's really frustrating. I only cancelled because I
  was on vacation for a month."

  Ticket 5: "Is there a way to accept deposits when someone books?
  I have a lot of no-shows and I want to charge a small deposit."
  You: "We don't currently support deposit collection at booking time."
  Customer: "No-shows cost me $2,000/month. This would really help."

  Tasks:
  1. For each ticket, extract the implied feature request. Write a
     proper feature request ticket with: Title, Problem statement,
     Business impact, and how many customers might benefit.

  2. Ticket 4 is a pricing/policy issue, not a feature request. Or is
     it? How would you categorize it?

  3. Which of these 5 extracted requests has the strongest business
     case? Why?

  4. Write a template that support agents can use to quickly capture
     feature requests from conversations.

assertions:
  - type: llm_judge
    criteria: "Feature requests are extracted from complaints — converts 'that's disappointing' moments into proper feature requests with problem statements and business context"
    weight: 0.25
    description: "Requests extracted from complaints"
  - type: llm_judge
    criteria: "Ticket 4 is thoughtfully categorized — recognizes it could be a feature request (subscription pause option) OR a policy issue (win-back pricing), and explains the distinction"
    weight: 0.25
    description: "Thoughtful categorization of edge case"
  - type: llm_judge
    criteria: "Business case evaluation considers revenue impact — Ticket 5 (deposits) has quantified impact ($2K/month in no-shows) and Ticket 2 (bulk booking) blocks a specific use case"
    weight: 0.25
    description: "Revenue-aware business case"
  - type: llm_judge
    criteria: "Support template is practical — includes 4-5 fields that a busy support agent can fill out in under 2 minutes, not a lengthy form"
    weight: 0.25
    description: "Practical support template"
