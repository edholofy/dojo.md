meta:
  id: communication-technology-product
  level: 4
  course: client-communication-drafting
  type: output
  description: "Design a legal client communication technology product — build a SaaS platform that transforms how law firms communicate with clients through AI, automation, and analytics"
  tags: [legal-tech, saas-product, communication-platform, expert]

state: {}

trigger: |
  Design a SaaS product that transforms legal
  client communication.

  PRODUCT: "ClientBridge" — an AI-powered legal
  client communication platform.

  COMPETITIVE LANDSCAPE:
  - Clio Grow: Client intake focused; limited ongoing
    communication
  - MyCase: Basic client portal; limited analytics
  - Lawmatics: CRM for law firms; marketing focused
  - CasePeer: Case management with basic portal
  - Generic CRMs (Salesforce, HubSpot): Not legal-
    specific; compliance gaps

  PRODUCT DIFFERENTIATORS:
  1. AI-drafted client communications with ethics
     compliance checking
  2. Predictive client satisfaction analytics
  3. Multi-channel communication orchestration
     (email, portal, text, phone, postal)
  4. Practice-area-specific communication workflows
  5. Built-in ethics compliance engine (50-state)
  6. Communication intelligence dashboard

  TARGET MARKET:
  - Primary: Personal injury firms (10,000+ in US)
  - Secondary: Family law firms (8,000+)
  - Tertiary: General litigation firms (15,000+)
  - Enterprise: AmLaw 200 (200 firms)

  PRICING MODEL:
  - Starter: $99/attorney/month (basic features)
  - Professional: $199/attorney/month (AI + analytics)
  - Enterprise: Custom (full platform + API access)

  Create:
  1. Product requirements document
  2. Technical architecture
  3. AI communication engine design
  4. Go-to-market strategy
  5. Product roadmap (24 months)

assertions:
  - type: llm_judge
    criteria: "Product requirements document addresses the specific pain points of legal client communication — the #1 pain point (clients not hearing from their attorney) is solved by automated communication triggers tied to case stages; the #2 pain point (response time) is addressed by AI-drafted responses that attorneys review and send in minutes; the #3 pain point (fee disputes from poor billing communication) is solved by automated billing notifications with plain-language explanations; the PRD defines MVP features (automated status updates, basic portal, communication tracking) vs. Phase 2 features (AI drafting, analytics, multi-channel orchestration); each feature maps to a specific user story from the attorney and client perspectives."
    weight: 0.35
    description: "ProductRequirements"
  - type: llm_judge
    criteria: "AI communication engine design is practical and ethically compliant — the engine uses practice-area-specific language models fine-tuned on legal communications; tone analysis ensures appropriate voice for different situations (empathetic for adverse rulings, professional for billing, urgent for deadline notifications); the 50-state ethics compliance check prevents sending communications that violate jurisdiction-specific rules; all AI-generated content requires attorney approval before sending; the engine improves through attorney feedback loops (accepted vs. modified drafts); bias detection prevents language that could be perceived as discriminatory or insensitive."
    weight: 0.35
    description: "AICommunicationEngine"
  - type: llm_judge
    criteria: "Go-to-market strategy targets the right beachhead — starts with personal injury firms (highest communication volume, clearest ROI, most standardizable communications); uses content marketing (blog posts, webinars on 'reducing malpractice risk through communication'), partnership with legal malpractice insurers (premium discount for platform users), and conference presence (AAJ, ABA TechShow); the pricing strategy ($99-199/attorney/month) is positioned between basic case management tools and enterprise platforms; the 24-month roadmap progresses from PI-focused MVP to multi-practice-area platform with enterprise capabilities; customer acquisition cost and lifetime value projections demonstrate viable unit economics."
    weight: 0.30
    description: "GoToMarketStrategy"
