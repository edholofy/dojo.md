meta:
  id: communication-governance
  level: 4
  course: client-communication-drafting
  type: output
  description: "Design a client communication governance framework — create organizational policies, accountability structures, and compliance mechanisms for client communications across a legal organization"
  tags: [governance, organizational-policy, compliance-mechanisms, expert]

state: {}

trigger: |
  Design a client communication governance
  framework for a state bar association to
  recommend to its 40,000+ members.

  CONTEXT:
  The state bar's disciplinary statistics show that
  communication-related complaints (Rule 1.4) are
  the #1 category of ethics complaints for the 8th
  consecutive year, representing 28% of all complaints.

  DISCIPLINARY DATA (last 5 years):
  - 4,200 complaints citing Rule 1.4 violations
  - 850 resulted in informal admonitions
  - 220 resulted in formal discipline
  - 45 resulted in suspension
  - 8 resulted in disbarment (combined with other
    violations)
  - Most common specific complaints:
    * "Attorney never returns calls" (35%)
    * "Not informed of case status" (25%)
    * "Not told about settlement offer" (15%)
    * "Didn't explain court ruling" (12%)
    * "Fee dispute — charges never explained" (8%)
    * "Other communication failures" (5%)

  FRAMEWORK REQUIREMENTS:
  1. Model communication standards for all practice
     areas
  2. Minimum communication frequency guidelines
  3. Required communication types and triggers
  4. Technology standards for secure communication
  5. Special populations guidance (non-English
     speakers, elderly, disabled clients)
  6. Quality assurance and self-assessment tools
  7. CLE requirements for communication competency
  8. Malpractice insurance integration
  9. Enforcement mechanisms within existing
     disciplinary framework
  10. Resources for solo and small firm practitioners

  Create:
  1. Complete governance framework document
  2. Model communication standards
  3. Self-assessment tool for practitioners
  4. CLE curriculum on communication competency
  5. Implementation guide for different firm sizes

assertions:
  - type: llm_judge
    criteria: "Model communication standards address the top complaint categories — 'never returns calls' is addressed by a 48-hour response standard for non-urgent communications and same-day for urgent; 'not informed of case status' is addressed by minimum quarterly updates with practice-area-specific escalation (monthly for active litigation); 'not told about settlement offer' is addressed by mandatory prompt notification of all offers and demands; 'didn't explain court ruling' is addressed by 48-hour adverse ruling notification with explanation requirement; 'fee dispute' is addressed by transparent billing practices and fee change notification; each standard is specific enough to enforce but flexible enough for different practice contexts."
    weight: 0.35
    description: "ModelCommunicationStandards"
  - type: llm_judge
    criteria: "Implementation guide adapts to different firm sizes — solo practitioners get simplified templates and low-tech solutions (calendar reminders, phone call logs, simple spreadsheet tracking); small firms (2-10 attorneys) get streamlined policies, shared calendar systems, and basic technology recommendations; mid-size firms (11-50 attorneys) get departmental standards, communication tracking software, and quality review processes; large firms (50+) get enterprise-level governance with dedicated communication officers, analytics dashboards, and automated compliance monitoring; each size tier includes realistic budget estimates and implementation timelines; the guide acknowledges that compliance cost must be proportional to firm resources."
    weight: 0.35
    description: "SizeAdaptedImplementation"
  - type: llm_judge
    criteria: "Self-assessment tool enables voluntary compliance — provides a scored checklist that attorneys can use to evaluate their own communication practices against the model standards; the tool covers: engagement letter completeness, communication frequency, response time, adverse event notification, billing transparency, special populations accommodation, technology security, and documentation practices; scoring categorizes practitioners as 'exemplary,' 'compliant,' 'at risk,' or 'deficient' with specific improvement recommendations for each category; the self-assessment is designed to be used voluntarily as a practice management tool and by malpractice insurers as a risk assessment instrument."
    weight: 0.30
    description: "SelfAssessmentTool"
