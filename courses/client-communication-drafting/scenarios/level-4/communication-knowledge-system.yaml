meta:
  id: communication-knowledge-system
  level: 4
  course: client-communication-drafting
  type: output
  description: "Design a knowledge management system for legal client communications — build an organizational memory that captures communication best practices, templates, and lessons learned across a firm's history"
  tags: [knowledge-management, template-library, organizational-learning, expert]

state: {}

trigger: |
  Design a knowledge management system for client
  communications at a national law firm.

  FIRM: Alliance Partners (300 attorneys, 10 offices,
  6 practice groups)
  PROBLEM: Communication quality varies dramatically
  across offices and practice groups. A brilliant
  settlement letter drafted in the Boston office is
  unknown to attorneys in Dallas facing the same
  situation. Communication templates are outdated,
  scattered across individual drives, and
  inconsistent.

  KNOWLEDGE ASSETS TO CAPTURE:
  1. Communication Templates — engagement letters,
     status updates, demand letters, settlement
     reports, adverse ruling notifications, billing
     communications, termination letters, referral
     letters
  2. Best Practice Examples — actual communications
     (anonymized) that produced excellent results
     (client praise, successful negotiations, client
     retention)
  3. Cautionary Examples — communications that led
     to complaints, malpractice claims, or client
     loss (anonymized, used for training)
  4. Practice-Area Guides — communication protocols
     specific to PI, family law, corporate, employment,
     IP, real estate
  5. Judicial Preferences — how specific judges prefer
     communications formatted
  6. Client Type Guides — communication approaches
     for corporate GCs, individuals, elderly clients,
     non-English speakers, institutional clients
  7. Outcome Data — which communication approaches
     correlate with better outcomes (settlement
     acceptance rates, client satisfaction)

  SYSTEM REQUIREMENTS:
  - Searchable template library with version control
  - AI-powered recommendation engine ("attorneys
    in similar situations used this template")
  - Quality rating system (peer-reviewed templates)
  - Practice-group-specific customization
  - Multi-office access with local adaptation
  - Continuous improvement from usage analytics
  - Integration with case management and email
  - Client confidentiality protection (anonymization)

  Create:
  1. Knowledge system architecture
  2. Content capture and curation workflow
  3. AI recommendation engine design
  4. Quality assurance and governance
  5. Adoption and continuous improvement plan

assertions:
  - type: llm_judge
    criteria: "Knowledge system architecture connects communication assets across the firm — designs a multi-layer system: content layer (templates, examples, guides stored with metadata tags), intelligence layer (AI-powered search, recommendation engine, pattern recognition), and interface layer (integrated into email clients, case management, and document management); the architecture supports the key use case: attorney in Dallas facing a complex settlement communication searches the system and finds a peer-rated template from Boston plus an anonymized best-practice example from Chicago; version control ensures templates are current; practice-group-specific views surface the most relevant content."
    weight: 0.35
    description: "SystemArchitecture"
  - type: llm_judge
    criteria: "AI recommendation engine provides contextual suggestions — uses case metadata (practice area, case stage, communication type, client profile) to recommend appropriate templates and examples; learns from attorney behavior (which templates are selected, which are modified heavily, which result in client praise or complaints); the engine surfaces cautionary examples when an attorney's draft shares characteristics with communications that previously led to problems; recommendations improve over time through usage analytics and attorney feedback; the engine respects privilege by operating on anonymized patterns rather than client-specific content."
    weight: 0.35
    description: "AIRecommendationEngine"
  - type: llm_judge
    criteria: "Content capture workflow requires minimal attorney effort — automated capture occurs when attorneys use the system's template engine; best-practice nominations are peer-driven (attorneys flag exceptional communications for inclusion); cautionary examples are identified through complaint tracking, malpractice claims, and quality audit findings; anonymization is automated through entity recognition with human review; a dedicated knowledge curator (0.5 FTE) manages the library, ensures quality, and retires outdated content; governance includes an editorial board (one representative per practice group) that meets quarterly to review and approve new content."
    weight: 0.30
    description: "ContentCaptureWorkflow"
