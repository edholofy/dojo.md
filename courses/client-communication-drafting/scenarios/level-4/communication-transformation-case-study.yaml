meta:
  id: communication-transformation-case-study
  level: 4
  course: client-communication-drafting
  type: output
  description: "Write a case study documenting a law firm's transformation of its client communication practices — from malpractice-prone ad hoc methods to a data-driven, technology-enabled communication program"
  tags: [case-study, transformation, measurable-outcomes, expert]

state: {}

trigger: |
  Write a detailed case study of a law firm's
  client communication transformation.

  FIRM: Chen & Rodriguez LLP — 75-attorney firm,
  primarily personal injury and employment law

  CATALYST FOR CHANGE:
  In 2022, the firm experienced a "perfect storm"
  of communication failures:
  - 2 malpractice verdicts totaling $4.2M (both
    related to client communication)
  - Malpractice insurer threatened non-renewal
  - NPS score dropped to -22
  - 3 bar complaints in 6 months
  - Lost their largest referral source (referring
    attorney said "I can't send clients to a firm
    that doesn't call them back")
  - 15% annual client attrition rate
  - Google reviews averaged 2.1 stars

  TRANSFORMATION (2022-2024):
  Phase 1 — Crisis Stabilization (Jan-Mar 2022):
  - Hired a communication consultant
  - Audited all 800 active files for communication
    gaps
  - Immediate outreach to 200+ clients not contacted
    in 90+ days
  - Implemented 48-hour response mandate

  Phase 2 — Systems Implementation (Apr-Sep 2022):
  - Selected and implemented client portal (Clio)
  - Created communication templates for 25 scenarios
  - Established practice-group-specific communication
    standards
  - Hired 3 Client Communication Coordinators
  - Trained all staff (40 hours for attorneys, 20
    for staff)

  Phase 3 — Culture Change (Oct 2022-Dec 2023):
  - Monthly communication compliance audits
  - Partner compensation tied to client satisfaction
    metrics (10% of bonus)
  - "Client Communication Champion" awards (quarterly)
  - Client advisory board (12 former/current clients)
  - Revised engagement letters with communication
    commitments

  RESULTS (December 2024):
  - Zero malpractice claims since transformation
  - NPS improved from -22 to +45
  - Client attrition reduced from 15% to 4%
  - Google reviews improved from 2.1 to 4.6 stars
  - Referral source returned (and referrals increased
    3x)
  - Revenue grew 25% (attributed partly to improved
    retention and referrals)
  - Malpractice insurance premium decreased 18%
  - ROI on transformation investment: 520%

  Create:
  1. Executive summary
  2. Detailed transformation narrative
  3. Quantitative outcome analysis
  4. Lessons learned and critical success factors
  5. Replication guide for other firms

assertions:
  - type: llm_judge
    criteria: "Transformation narrative captures the human and organizational dynamics — documents the crisis catalyst that forced change (malpractice verdicts as wake-up call); chronicles the resistance encountered (partner pushback on 48-hour mandate, staff skepticism about communication templates, technology adoption challenges); highlights the critical role of the communication consultant and the 3 new coordinators; describes the culture change from 'communication is someone else's job' to shared responsibility; captures specific turning points (the partner compensation link, the returning referral source, the first client advisory board meeting); the narrative is genuine and instructive, not a sanitized corporate story."
    weight: 0.35
    description: "TransformationNarrative"
  - type: llm_judge
    criteria: "Quantitative outcome analysis demonstrates measurable ROI — tracks each metric from baseline to result: NPS (-22 → +45), attrition (15% → 4%), Google reviews (2.1 → 4.6), zero malpractice claims (vs. 2 verdicts/$4.2M), malpractice premium (-18%), revenue (+25%), referrals (3x increase); the 520% ROI calculation includes: investment costs (consultant $150K, technology $80K, 3 coordinators $210K/year, training $50K) vs. returns (avoided malpractice costs, premium savings, increased revenue from retention and referrals); the analysis distinguishes between correlation and causation where appropriate and attributes revenue growth partly to communication improvements."
    weight: 0.35
    description: "QuantitativeOutcomeAnalysis"
  - type: llm_judge
    criteria: "Replication guide provides actionable steps for different firm sizes — adapts the three-phase approach (crisis stabilization → systems implementation → culture change) for solo practitioners, small firms (2-10), mid-size firms (11-50), and large firms (50+); identifies the minimum viable transformation (48-hour response mandate + monthly status update templates + basic tracking system) vs. the full program; includes realistic budgets for each firm size; addresses the most common barriers to transformation (partner resistance, technology cost, training time) with specific strategies from the case study; provides templates and checklists that firms can implement immediately."
    weight: 0.30
    description: "ReplicationGuide"
