meta:
  id: communication-book-proposal
  level: 4
  course: client-communication-drafting
  type: output
  description: "Write a book proposal for a definitive guide to legal client communication — design a comprehensive reference covering ethics, drafting, technology, and organizational best practices"
  tags: [book-proposal, legal-writing, reference-guide, expert]

state: {}

trigger: |
  Write a book proposal for the definitive guide
  to legal client communication.

  PROPOSED TITLE: "The Client Connection: A Lawyer's
  Guide to Communication That Builds Trust, Prevents
  Malpractice, and Grows Your Practice"

  AUTHOR PROFILE:
  - 30 years legal practice (litigation partner)
  - Former state bar ethics committee chair
  - Adjunct professor of professional responsibility
  - Published in ABA Journal, Law Practice Management,
    Georgetown Journal of Legal Ethics
  - National speaker on legal malpractice prevention
  - Founded a legal communication consulting practice

  TARGET PUBLISHER: ABA Publishing or Carolina
  Academic Press

  TARGET AUDIENCE:
  - Primary: Practicing attorneys (all levels)
  - Secondary: Law firm managers and administrators
  - Tertiary: Law students, bar examiners, malpractice
    insurers

  MARKET ANALYSIS:
  - No comprehensive book on legal client communication
    exists
  - Related books: practice management guides mention
    communication tangentially
  - Growing demand as client expectations increase
    and technology changes communication norms
  - Communication is the #1 complaint category in
    every state bar survey — there should be a book
    addressing this

  Create:
  1. Complete book proposal with 15-18 chapter outline
  2. Sample chapter outline (Chapter 1)
  3. Market analysis and competitive positioning
  4. Author platform and marketing plan
  5. Writing timeline and deliverable schedule

assertions:
  - type: llm_judge
    criteria: "Chapter outline covers the complete spectrum of legal client communication — progresses from foundational ethics (Model Rule 1.4, duty to communicate, informed consent) through practical skills (drafting engagement letters, status updates, adverse rulings, settlement communications, billing letters) to advanced topics (crisis communication, cross-cultural communication, technology-mediated communication, AI-assisted drafting) to organizational chapters (building communication programs, quality assurance, training) to emerging issues (digital ethics, deepfake concerns, AI disclosure); each chapter includes practical exercises, templates, and real-world examples; the outline demonstrates comprehensive coverage that justifies the 'definitive guide' positioning."
    weight: 0.35
    description: "ChapterOutline"
  - type: llm_judge
    criteria: "Market analysis demonstrates a clear gap — identifies the absence of any comprehensive book on legal client communication despite it being the #1 complaint category; positions against related titles (practice management books, legal writing guides, professional responsibility texts) showing how each addresses communication only tangentially; quantifies the target market (1.3M US attorneys plus 400K paralegals); the ABA Publishing pathway provides credibility, distribution through ABA member channels, and CLE integration potential; the marketing plan leverages the author's speaking platform, consulting practice, and ethics committee connections for endorsements from prominent legal figures."
    weight: 0.35
    description: "MarketAnalysis"
  - type: llm_judge
    criteria: "Writing timeline is realistic for a comprehensive reference — proposes 12-18 months for manuscript delivery; includes milestones for research phase (3 months), first draft (6 months), revision based on expert review (3 months), and final manuscript preparation (2-3 months); the author's existing consulting practice and teaching provide ongoing access to real-world examples and current data; chapter drafts will be beta-tested in CLE presentations for audience feedback; the proposal includes 3-5 endorsement commitments from prominent legal professionals and a foreword writer suggestion."
    weight: 0.30
    description: "WritingTimeline"
