trigger: |
  Design a national certification program in legal
  client communication excellence.

  PROGRAM: Certified Legal Communication
  Professional (CLCP)
  SPONSORING ORGANIZATION: American Bar Association
  Section of Law Practice

  PROGRAM STRUCTURE:
  Three certification levels:

  Level 1 — CLCP Associate:
  - For: Paralegals, legal assistants, new attorneys
  - Prerequisites: Legal experience (1+ years)
  - Focus: Foundational communication skills,
    ethics rules, template usage, client intake

  Level 2 — CLCP Professional:
  - For: Practicing attorneys, senior paralegals
  - Prerequisites: CLCP Associate + 3 years
    experience + portfolio of 10 sample communications
  - Focus: Complex communication drafting, crisis
    communication, cross-cultural skills, technology

  Level 3 — CLCP Master:
  - For: Practice group leaders, consultants, trainers
  - Prerequisites: CLCP Professional + 7 years +
    demonstrated leadership in communication
    standards
  - Focus: Program design, training development,
    quality assurance, organizational strategy

  CURRICULUM AREAS:
  1. Ethics of client communication (Model Rules)
  2. Written communication drafting
  3. Oral communication skills
  4. Digital communication and technology
  5. Cross-cultural and accessible communication
  6. Crisis and adverse event communication
  7. Billing and fee communication
  8. Quality assurance and self-assessment
  9. Organizational standards development
  10. Communication analytics and improvement

  Create:
  1. Detailed curriculum for each level
  2. Examination and assessment structure
  3. Continuing education requirements
  4. Revenue model and program sustainability
  5. Market positioning and value proposition

assertions:
  - type: llm_judge
    criteria: "Curriculum builds progressively across three levels — Level 1 covers fundamentals: Model Rule 1.4 requirements, basic communication templates (status updates, intake confirmations, billing notifications), phone etiquette, email best practices, confidentiality in digital communications, and client intake procedures; Level 2 adds complexity: complex drafting (settlement reports, board memos, regulatory communications), crisis communication, cross-cultural skills, mediation/negotiation communication, adverse ruling notifications, and technology platform proficiency; Level 3 covers leadership: communication program design, quality audit methodology, training curriculum development, communication analytics, organizational change management, and consulting skills; each level maps specific competencies to learning objectives."
    weight: 0.35
    description: "ProgressiveCurriculum"
  - type: llm_judge
    criteria: "Assessment structure measures practical competency — Level 1: 100-question multiple-choice ethics and knowledge exam plus a practical assessment (draft 3 communications from provided fact patterns, scored by rubric); Level 2: portfolio review (10 sample communications evaluated by certified reviewers) plus a live exercise (role-play a difficult client conversation, evaluated by trained assessors); Level 3: requires either publication/presentation on communication topics or design and implementation of a communication program at a real firm, plus a peer review panel evaluation; all assessments use standardized rubrics; recertification requires continuing education credits every 3 years."
    weight: 0.35
    description: "AssessmentStructure"
  - type: llm_judge
    criteria: "Revenue model demonstrates program sustainability — primary revenue: certification exam fees ($300 Level 1, $500 Level 2, $800 Level 3), annual membership dues ($150-$300), CLE course fees ($75-$250 per course), study materials ($100-$300); secondary revenue: corporate training programs for firms ($10K-$50K), conference registration, and sponsorships from legal technology companies; the program reaches break-even with 500 certified members; long-term sustainability relies on certification becoming valued by employers (firms prefer or require CLCP for client-facing roles) and malpractice insurers (premium discounts for certified practitioners); the value proposition emphasizes reduced malpractice risk and improved client retention."
    weight: 0.30
    description: "RevenueModel"
