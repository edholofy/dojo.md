meta:
  id: communication-research-program
  level: 4
  course: client-communication-drafting
  type: output
  description: "Design a research program studying legal client communication effectiveness — develop empirical studies measuring how communication quality affects client outcomes, satisfaction, and attorney-client relationships"
  tags: [research-program, empirical-studies, communication-science, expert]

state: {}

trigger: |
  Design an academic research program studying
  the impact of client communication practices on
  legal outcomes and client satisfaction.

  RESEARCH CENTER: Center for Legal Communication
  Excellence, Georgetown University Law Center

  RESEARCH QUESTIONS:
  1. Does proactive client communication lead to
     better case outcomes (higher settlements,
     better verdict results)?
  2. What communication frequency optimizes client
     satisfaction without creating inefficiency?
  3. How does communication style (formal vs.
     informal, written vs. verbal) affect client
     trust and cooperation?
  4. Do clients who understand their case better
     make better settlement decisions?
  5. What is the economic impact of communication
     failures on law firms (lost clients, malpractice
     claims, bar complaints)?
  6. How do technology-mediated communications (email,
     portal, text) compare to traditional methods in
     effectiveness?

  AVAILABLE RESOURCES:
  - 10 partner law firms (2,000+ attorneys, 50,000+
    active matters across firms)
  - 5 years of client satisfaction survey data
  - State bar complaint databases (3 states)
  - Legal malpractice insurer claims database
    (15,000 claims)
  - Mock client study facility
  - $2M in foundation funding (3-year grant)

  METHODOLOGICAL CHALLENGES:
  - Attorney-client privilege limits access to
    communication content
  - Causation vs. correlation (better attorneys may
    both communicate better AND achieve better
    outcomes)
  - Selection bias in participating firms
  - Defining and measuring "communication quality"
  - Client satisfaction is subjective and culturally
    variable

  Create:
  1. Research program design (6 interconnected studies)
  2. Methodology for each study
  3. Data collection and analysis plan
  4. Expected findings and practical implications
  5. Publication and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Research program addresses causal inference challenges — uses multiple methodological approaches to triangulate findings: (1) observational study using firm case data with propensity score matching to control for attorney quality and case complexity; (2) quasi-experimental study comparing firms before and after implementing communication standards; (3) randomized controlled trial using mock clients receiving different communication treatments; (4) claims database analysis correlating communication practices with malpractice outcomes; (5) qualitative interview study with clients about their communication experience; (6) survey experiment testing client perceptions of different communication styles; each study addresses specific threats to internal and external validity."
    weight: 0.35
    description: "ResearchProgramDesign"
  - type: llm_judge
    criteria: "Data collection respects privilege while yielding useful insights — metadata analysis (communication frequency, timing, channel, response time) avoids accessing privileged content; client satisfaction surveys administered independently from legal representation; malpractice claims data provides outcome measures without privileged information; mock client studies allow controlled content analysis without real privilege concerns; the research protocol includes IRB approval, informed consent from participating attorneys and clients, and data anonymization procedures; the $2M budget is allocated appropriately across personnel (60%), technology (20%), and operations (20%)."
    weight: 0.35
    description: "DataCollectionPlan"
  - type: llm_judge
    criteria: "Expected findings translate to actionable recommendations — hypothesizes optimal communication frequency by practice area (weekly for active litigation, bi-weekly for transactional, monthly for dormant matters); identifies communication style preferences by client demographics; quantifies the economic cost of communication failures ($35K average malpractice claim defense + $175K settlement + client lifetime value loss); the publication strategy targets both academic journals (Journal of Legal Studies, Georgetown Law Journal) and practitioner publications (ABA Journal, Law Practice Management) to bridge the research-practice gap; CLE programs disseminate findings to practicing attorneys."
    weight: 0.30
    description: "ActionableFindings"
