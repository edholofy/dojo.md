meta:
  id: communication-consulting-practice
  level: 4
  course: client-communication-drafting
  type: output
  description: "Design a legal communication consulting practice — build a specialized firm offering client communication audits, training, technology implementation, and ongoing optimization for law firms"
  tags: [consulting-practice, business-design, service-delivery, expert]

state: {}

trigger: |
  Design a consulting practice specializing in
  legal client communication excellence.

  FOUNDER: Former managing partner of an AmLaw 100
  firm and former state bar ethics committee chair
  with 25 years of experience in legal practice
  management and client relations.

  MARKET OPPORTUNITY:
  - 23% of malpractice claims cite communication
    failures (ABA data)
  - Average malpractice claim costs $35,000 to
    defend and $175,000 to settle
  - Only 12% of law firms have formal communication
    standards
  - Client satisfaction directly correlates with
    client retention and referrals
  - Legal tech companies need professional services
    partners for implementation

  TARGET CLIENTS:
  - AmLaw 200 law firms (communication programs)
  - Mid-size firms (50-200 attorneys) wanting to
    professionalize
  - State bar associations (CLE programs, ethics
    guidance)
  - Legal malpractice insurers (risk reduction
    programs)
  - Legal technology companies (implementation
    partner)
  - In-house legal departments

  SERVICE LINES:
  1. Communication Audits (assessment + recommendations)
  2. Standards Development (templates, policies,
     procedures)
  3. Technology Implementation (portal, CRM, tracking)
  4. Training Programs (CLE, staff development)
  5. Expert Witness (communication standard of care
     testimony in malpractice cases)
  6. Ongoing Optimization (retainer-based continuous
     improvement)

  Create:
  1. Business plan with revenue model
  2. Service delivery framework for each line
  3. Go-to-market strategy
  4. Staffing and capability plan
  5. Competitive differentiation

assertions:
  - type: llm_judge
    criteria: "Business plan includes realistic revenue projections for a professional services firm — Year 1 targets 8-12 audit engagements ($15K-$50K each), 3-5 standards development projects ($25K-$75K), and 6-8 training programs ($5K-$15K); Year 2 adds technology implementation ($50K-$150K) and expert witness services ($500/hour); Year 3 introduces retainer-based optimization ($5K-$15K/month); the model reaches profitability by end of Year 2 with a team of 8-12; revenue mix evolves from project-based to recurring; partnership with malpractice insurers provides a referral channel (insurers recommend the service to firms with communication-related claims)."
    weight: 0.35
    description: "BusinessPlan"
  - type: llm_judge
    criteria: "Go-to-market strategy leverages the founder's unique credentials — former managing partner credibility opens doors at AmLaw firms; ethics committee chair experience provides authority on communication standards; the strategy leads with thought leadership (ABA Journal articles, state bar speaking, law practice management conferences) to build awareness; malpractice insurer partnerships provide warm referrals (insurers incentivize clients to use the service through premium discounts); pilot programs at 3-5 early-adopter firms create case studies for broader marketing; the strategy acknowledges the long sales cycle (6-12 months for large firm engagements) and plans cash flow accordingly."
    weight: 0.35
    description: "GoToMarketStrategy"
  - type: llm_judge
    criteria: "Competitive differentiation is clear and defensible — positions against generic legal consultants (deeper communication specialization), technology vendors (strategic guidance, not just tools), and bar association programs (more comprehensive, ongoing relationship); the unique value proposition combines: (1) former managing partner who understands firm economics, (2) ethics committee expertise for compliance, (3) malpractice prevention focus with measurable ROI, and (4) technology implementation capability; the firm offers a 'communication maturity model' assessment that creates a roadmap for progressive improvement rather than one-time fixes."
    weight: 0.30
    description: "CompetitiveDifferentiation"
