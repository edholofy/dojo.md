meta:
  id: communication-behavioral-science
  level: 4
  course: client-communication-drafting
  type: output
  description: "Apply behavioral science to legal client communication — research how cognitive biases, framing effects, and decision architecture influence client decisions and design communications that support better client outcomes"
  tags: [behavioral-science, decision-architecture, client-psychology, expert]

state: {}

trigger: |
  Design a research and application program
  exploring how behavioral science principles can
  improve legal client communication and client
  decision-making.

  RESEARCH AREAS:

  1. Framing Effects in Settlement Communications:
  - How does framing a $100K settlement as "recovery
    of 80% of damages" vs. "loss of 20% of damages"
    affect client acceptance?
  - Risk-averse framing vs. risk-seeking framing
  - Loss aversion in settlement decisions
  - Anchoring effects of initial demand amounts

  2. Information Overload in Legal Communications:
  - How much legal information can clients process
    effectively?
  - Optimal length for different communication types
  - Cognitive load theory applied to legal writing
  - Summary vs. detailed communication preferences

  3. Trust Building Through Communication:
  - Which communication behaviors build attorney-
    client trust fastest?
  - Effect of communication frequency on trust
  - Role of vulnerability and honesty in trust
  - Cultural variations in trust-building communication

  4. Decision Fatigue in Multiple-Issue Cases:
  - How do clients make decisions when facing many
    simultaneous legal issues?
  - Sequential vs. bundled decision presentation
  - Choice architecture for legal decisions
  - Cooling-off periods for major decisions

  5. Emotional Regulation in Adverse Communications:
  - How clients process bad news from attorneys
  - Optimal bad news delivery strategies
  - Emotional support vs. solution-focused responses
  - Timing of adverse communications

  Create:
  1. Research program with 5 study designs
  2. Practical application guidelines for attorneys
  3. Communication design principles based on
     behavioral science
  4. Training module for attorneys on behavioral
     communication
  5. Ethical considerations for using behavioral
     insights

assertions:
  - type: llm_judge
    criteria: "Research program applies rigorous behavioral science methodology — each study has testable hypotheses grounded in established behavioral economics theory (Kahneman & Tversky's prospect theory for framing, Miller's cognitive load theory for information overload, social exchange theory for trust); the settlement framing study uses randomized between-subjects design with realistic legal scenarios; the information overload study tests comprehension and retention at different communication lengths; the trust study uses longitudinal design tracking attorney-client relationships over time; participant pools include actual legal clients (not just students) for ecological validity; IRB protocols address the ethical implications of studying vulnerable populations."
    weight: 0.35
    description: "BehavioralResearchProgram"
  - type: llm_judge
    criteria: "Communication design principles are practical and evidence-based — derives actionable guidelines: (1) frame settlements in terms of what the client gains, not what they lose (prospect theory); (2) limit settlement letters to 2-3 key decision points with supporting detail available on request (cognitive load); (3) deliver bad news with empathy first, explanation second, and options third (emotional regulation research); (4) use strategic anchoring in demand communications (set high but defensible anchors); (5) present complex decisions sequentially rather than simultaneously (decision fatigue research); each principle includes a before/after communication example showing the difference."
    weight: 0.35
    description: "DesignPrinciples"
  - type: llm_judge
    criteria: "Ethical considerations address the manipulation concern — distinguishes between ethical 'nudging' (helping clients make decisions aligned with their own stated interests) and manipulation (pushing clients toward decisions that serve the attorney's interests); addresses the ethical tension in framing (presenting information persuasively vs. objectively); discusses when behavioral insights should NOT be used (avoiding manipulating client settlement decisions to benefit attorney fee recovery); the analysis considers Model Rule 1.4's requirement for sufficient information to make informed decisions and how behavioral insights can enhance rather than undermine informed consent; references the behavioral ethics literature on professional responsibility."
    weight: 0.30
    description: "EthicalConsiderations"
