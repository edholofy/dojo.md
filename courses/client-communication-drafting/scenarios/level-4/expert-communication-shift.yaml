meta:
  id: expert-communication-shift
  level: 4
  course: client-communication-drafting
  type: output
  description: "Expert shift simulation — address organizational-level communication challenges including governance design, technology transformation, professional development, and knowledge management across a legal organization"
  tags: [shift-simulation, organizational-leadership, strategic-planning, expert]

state: {}

trigger: |
  You are the Chief Client Experience Officer at
  a global law firm (600 attorneys, 20 offices,
  8 countries). Three strategic challenges require
  your expertise.

  CHALLENGE 1 — AI COMMUNICATION ETHICS CRISIS
  Your firm deployed an AI-assisted communication
  tool 6 months ago. This week, a client discovered
  that a status update they received was AI-generated
  (the attorney didn't modify the AI draft
  significantly). The client is furious: "I'm paying
  $500/hour for a computer to send me form letters?"
  Two more clients have raised similar concerns.
  Legal media has picked up the story.

  Address:
  - Immediate crisis response to affected clients
  - Firm-wide policy on AI disclosure in client
    communications
  - Ethics analysis (must AI-generated content be
    disclosed?)
  - Technology adjustment (what guardrails are needed?)
  - Media response strategy
  - Client advisory communication to all clients
    about the firm's AI usage

  CHALLENGE 2 — GLOBAL COMMUNICATION STANDARDS
  The firm's 8-country footprint creates
  communication chaos:
  - US office uses email heavily; Japanese office
    prefers formal written letters
  - UK office follows SRA (Solicitors Regulation
    Authority) communication standards; US follows
    ABA Model Rules
  - Dubai office must comply with DIFC regulations
  - Data privacy restrictions (GDPR, PIPL) limit
    cross-border client data sharing
  - Time zone differences mean clients wait 12+ hours
    for responses
  - 4 different client portal systems across offices

  Design a unified global communication standard
  that respects local requirements.

  CHALLENGE 3 — DIVERSITY AND INCLUSION IN
  CLIENT COMMUNICATION
  A client satisfaction analysis reveals concerning
  disparities:
  - Non-English-speaking clients rate communication
    satisfaction 40% lower than English-speaking
    clients
  - Elderly clients (65+) rate satisfaction 25%
    lower than younger clients
  - Clients with disabilities report 35% lower
    satisfaction
  - Clients from minority communities report feeling
    "less valued" in communications

  Design a D&I communication initiative that
  addresses these disparities.

assertions:
  - type: llm_judge
    criteria: "AI ethics crisis response is comprehensive and principled — immediate response to affected clients includes personal partner-level outreach, acknowledgment of the concern, and explanation of how AI is used (as a drafting assistant, always reviewed by the attorney); the firm-wide AI disclosure policy establishes transparency standards (clients are informed that the firm uses AI tools to assist in communication drafting, similar to research tools); the ethics analysis examines whether current rules require disclosure (most jurisdictions don't explicitly address AI drafting, but Rule 1.4's informed communication principle is relevant); technology guardrails include mandatory minimum modification percentages and attorney attestation before sending; the media response acknowledges the use of AI while emphasizing attorney oversight."
    weight: 0.35
    description: "AIEthicsCrisisResponse"
  - type: llm_judge
    criteria: "Global communication standard respects local requirements while achieving consistency — creates a core standard (applicable everywhere: response time, minimum content, quality review) with jurisdiction-specific modules (US: Model Rules compliance; UK: SRA Principles and Code of Conduct; Dubai: DIFC requirements; Japan: cultural formality expectations); addresses the data privacy challenge through a unified client portal with region-specific data hosting (EU data stays in EU, China data stays in China); time zone coverage is addressed through regional communication teams with handoff protocols; the standard consolidates the 4 portal systems into a single platform with local customization; implementation respects the firm's federal structure while achieving client-facing consistency."
    weight: 0.35
    description: "GlobalCommunicationStandard"
  - type: llm_judge
    criteria: "D&I communication initiative addresses measured disparities — for non-English speakers: professional interpretation services for all substantive communications, translated key documents, bilingual staff recruitment, cultural competency training; for elderly clients: large-print communication options, phone-preferred communication tracks, simplified digital tools, patient and unhurried communication training; for clients with disabilities: ADA-compliant digital communications, alternative format documents (audio, braille, screen-reader-compatible), accommodation inquiry at intake; for minority communities: implicit bias training for all attorneys, communication audits reviewing tone across demographic groups, diverse client advisory board; each initiative includes measurable goals (close the satisfaction gap by 50% within 12 months) and accountability structures."
    weight: 0.30
    description: "DIInitiative"
