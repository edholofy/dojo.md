meta:
  id: mass-notification-system
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design a mass client notification system — create scalable communication processes for notifying thousands of clients in class actions, mass torts, or regulatory proceedings while maintaining personalization and compliance"
  tags: [mass-notification, class-action, scalable-communication, advanced]

state: {}

trigger: |
  Design a mass client notification system for a
  plaintiff's firm handling a mass tort with 5,000+
  individual clients.

  FIRM: Morrison Justice Group (mass tort plaintiff's
  firm, 50 attorneys, 200 staff)
  CASE: In re DefectiveImplant Litigation — hip
  implant failure causing injuries to thousands

  CLIENT BASE:
  - 5,200 individual clients across 48 states
  - Age range: 45-85 (many elderly, some with
    limited tech access)
  - Languages: English (85%), Spanish (10%),
    Vietnamese (3%), other (2%)
  - Tech access: 60% email, 30% prefer phone/mail,
    10% mixed
  - Client sophistication: ranges from retired
    professionals to low-income individuals

  COMMUNICATION NEEDS:
  1. Regular case status updates (quarterly)
  2. Settlement proposal notifications requiring
     individual client consent
  3. Medical record request follow-ups
  4. Statute of limitations warnings for clients
     in different jurisdictions
  5. Bellwether trial result notifications
  6. Fee agreement modifications
  7. Client fact sheet collection (missing for 40%)

  CHALLENGES:
  - Cannot personally call 5,200 clients quarterly
  - Must maintain personalization (each client feels
    individually represented)
  - Must comply with ethics rules in 48 states
  - Must track and verify delivery/receipt of
    critical communications
  - Must handle responses from 5,200+ clients
  - Some communications require individual signed
    responses (settlement consent)
  - Budget: $500K/year for client communication

  CURRENT PROBLEMS:
  - 800 clients have not been contacted in 6+ months
  - 2,100 client fact sheets still outstanding
  - 12 ethics complaints from clients claiming
    "abandonment"
  - Staff burnout from repetitive communication tasks

  Create:
  1. Mass communication system architecture
  2. Tiered communication strategy
  3. Technology platform requirements
  4. Compliance and tracking framework
  5. Staffing and workflow design

assertions:
  - type: llm_judge
    criteria: "Tiered communication strategy personalizes at scale — creates communication tiers: Tier 1 (automated but personalized): quarterly status updates customized by case stage, jurisdiction, and language preference via email, mail, or client portal; Tier 2 (semi-automated): settlement notifications, fact sheet requests, and medical record follow-ups using templates with case-specific data merge and paralegal review; Tier 3 (personal contact): settlement consent conversations, ethics complaint responses, and clients with special needs requiring attorney involvement; the tiering ensures the 800 uncontacted clients are immediately addressed while managing the ongoing communication load across all 5,200 clients."
    weight: 0.35
    description: "TieredCommunicationStrategy"
  - type: llm_judge
    criteria: "Technology platform handles scale and compliance — addresses multi-channel delivery (email, postal mail, client portal, phone) with delivery tracking and confirmation; automated translation support for Spanish, Vietnamese, and other languages; settlement consent workflows with e-signature capability and return tracking; client fact sheet collection through online forms and paper alternatives; 48-state ethics compliance rules engine (different states have different communication requirements); the platform integrates with the firm's case management system for data consistency; the $500K annual budget is allocated across technology, staffing, and mailing costs."
    weight: 0.35
    description: "TechnologyPlatform"
  - type: llm_judge
    criteria: "Staffing and workflow design prevents burnout while ensuring quality — creates a dedicated client communication team (separate from litigation team) with defined roles: communication coordinators for Tier 1/2, client relationship managers for Tier 3, bilingual staff for non-English speakers; workflow automation eliminates repetitive manual tasks; quality monitoring includes spot-checks of automated communications and client satisfaction sampling; the 12 ethics complaints are addressed through immediate outreach plus systemic fixes (minimum contact frequency policies, automated alerts when clients haven't been contacted within policy windows); staff workload metrics prevent the burnout that caused the current crisis."
    weight: 0.30
    description: "StaffingAndWorkflow"
