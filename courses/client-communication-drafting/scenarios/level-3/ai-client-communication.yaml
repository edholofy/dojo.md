meta:
  id: ai-client-communication
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design an AI-assisted client communication system — build a platform that uses AI to draft, review, and optimize client communications while maintaining attorney oversight and ethical compliance"
  tags: [ai-assisted, communication-technology, ethics-compliance, advanced]

state: {}

trigger: |
  Design an AI-assisted client communication
  platform for a modern law firm.

  PLATFORM VISION:
  "CounselComm AI" — an AI platform that assists
  attorneys in drafting, reviewing, and sending
  client communications with built-in ethics
  compliance, tone analysis, and quality assurance.

  CORE CAPABILITIES TO DESIGN:

  1. AI Draft Generation:
  - Attorney inputs: case type, communication purpose,
    key facts, client profile
  - AI generates a draft communication using
    appropriate template and tone
  - AI includes all required elements (deadlines,
    next steps, disclaimers)
  - Attorney reviews, modifies, and approves before
    sending

  2. Compliance Checking:
  - Scans drafts for ethics rule violations
  - Flags potential unauthorized practice of law
  - Checks for inadvertent privilege waiver
  - Verifies conflict check status before sending
  - Ensures fee communications comply with Rule 1.5
  - Detects potentially misleading statements

  3. Tone and Readability Analysis:
  - Analyzes draft for appropriate tone (empathetic,
    professional, urgent, etc.)
  - Checks readability level against client profile
    (ESL clients, elderly clients, sophisticated
    corporate GCs)
  - Flags jargon and suggests plain language
    alternatives
  - Detects potentially insensitive language

  4. Communication Intelligence:
  - Tracks all client communications
  - Identifies clients who haven't been contacted
    within policy windows
  - Analyzes communication patterns for quality
  - Generates communication reports for management
  - Predicts client satisfaction issues before they
    escalate

  ETHICAL CONSIDERATIONS:
  - AI cannot practice law or give legal advice
  - Attorney must review and approve all communications
  - AI-generated content must be disclosed (or not?)
  - Client data security and confidentiality
  - Bias detection in AI-generated content
  - Professional liability for AI-assisted communications

  Create:
  1. Platform architecture and feature specifications
  2. AI model design for legal communication
  3. Ethics compliance engine
  4. Attorney workflow integration
  5. Risk management framework

assertions:
  - type: llm_judge
    criteria: "Platform architecture ensures attorney oversight — the AI generates drafts but attorneys must review and approve every communication before sending (no automated client contact without human review); the workflow includes: AI draft → attorney review → compliance check → tone analysis → attorney approval → send; each step is logged for audit trails; the architecture addresses the unauthorized practice of law concern by positioning AI as a drafting assistant, not a communicator; the platform distinguishes between routine communications (AI can draft most content) and sensitive communications (AI provides template but attorney writes substance)."
    weight: 0.35
    description: "AttorneyOversightArchitecture"
  - type: llm_judge
    criteria: "Ethics compliance engine addresses real risks — scans for: Rule 1.4 compliance (sufficient information for informed decisions), Rule 1.5 issues (fee communication completeness), Rule 1.7 (conflict-related content), Rule 1.6 (inadvertent privilege waiver, confidential information in wrong communication), Rule 1.16 (proper termination procedures); the engine checks against a database of ethics opinions from relevant jurisdictions; the compliance check is mandatory before sending and cannot be bypassed; false positive rates are managed through attorney override with justification logging."
    weight: 0.35
    description: "EthicsComplianceEngine"
  - type: llm_judge
    criteria: "Risk management framework addresses AI-specific professional liability — defines the standard of care when using AI-assisted communications (attorney remains fully responsible for content); addresses the disclosure question (whether clients must be told AI assisted in drafting); establishes quality monitoring processes (regular audits of AI-generated vs. attorney-modified content); defines escalation procedures when AI drafts are materially modified (indicating potential AI quality issues); the framework addresses malpractice insurance implications and ensures the platform enhances rather than undermines professional liability protection."
    weight: 0.30
    description: "RiskManagementFramework"
