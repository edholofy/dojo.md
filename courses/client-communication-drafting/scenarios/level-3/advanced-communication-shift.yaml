meta:
  id: advanced-communication-shift
  level: 3
  course: client-communication-drafting
  type: output
  description: "Advanced shift simulation — manage enterprise-scale client communication challenges including crisis response coordination, cross-border regulatory communications, and systemic communication failure remediation"
  tags: [shift-simulation, enterprise-challenges, crisis-management, advanced]

state: {}

trigger: |
  You are the newly appointed Director of Client
  Relations at a national law firm. Three critical
  situations land on your desk on your first day.

  SITUATION 1 — MASS COMMUNICATION FAILURE
  A system error in the firm's case management
  software caused automated status update emails
  to stop sending 6 weeks ago. 2,400 clients across
  all practice groups have NOT received their
  scheduled quarterly status updates. The error
  was just discovered when a partner noticed
  complaints piling up.

  Additional problems:
  - 45 clients have called to complain about silence
  - 3 clients have filed bar complaints
  - 2 clients have hired new attorneys (assuming
    they were abandoned)
  - The managing partner wants a communication
    recovery plan TODAY
  - Some of the missed updates contained time-
    sensitive information (filing deadlines,
    settlement deadlines)

  Design the recovery plan including:
  - Triage system for time-sensitive matters
  - Client outreach priority framework
  - Template for the recovery communication
  - Bar complaint response strategy
  - Process to prevent recurrence

  SITUATION 2 — VIP CLIENT CRISIS
  The firm's largest client (BankCorp, $8M/year in
  billings) just received a Wells Notice from the
  SEC indicating potential enforcement action for
  securities fraud. BankCorp's CEO is calling the
  managing partner every hour demanding updates.
  The managing partner asks you to coordinate all
  communications with BankCorp.

  Communications needed:
  - CEO talking points (what to say to BankCorp's
    board today)
  - Wells submission strategy communication (to
    GC and CEO)
  - Employee communication guidelines (what
    BankCorp can tell its employees)
  - Coordination with BankCorp's PR firm
  - Insurance carrier notification

  SITUATION 3 — CULTURAL COMPETENCY COMPLAINT
  A client (Jin-Soo Park, Korean immigrant, limited
  English) has complained to the state bar that his
  attorney never explained his immigration case in
  a language he could understand, never used an
  interpreter, and that he signed documents he
  didn't understand. The attorney claims "he seemed
  to understand everything."

  Address:
  - Immediate bar complaint response strategy
  - Review of the client file for communication
    documentation
  - Firm-wide cultural competency assessment
  - Policy development for non-English-speaking
    clients
  - Training needs analysis

assertions:
  - type: llm_judge
    criteria: "Mass communication recovery plan is systematic and risk-prioritized — immediate triage identifies the subset of 2,400 clients with time-sensitive matters (upcoming deadlines, pending settlement offers, active hearings) for personal attorney contact within 24 hours; second tier addresses clients who have already complained (45 callers, 3 bar complaints, 2 departed clients) with partner-level outreach; third tier receives the recovery communication (acknowledgment of the gap, status update, apology); the template takes responsibility without creating litigation exposure; the bar complaint response demonstrates the firm's remediation efforts; the prevention plan includes redundant notification systems and monitoring."
    weight: 0.35
    description: "MassCommunicationRecovery"
  - type: llm_judge
    criteria: "VIP client crisis communication is coordinated and privileged — CEO talking points for the board meeting are concise, factual, and privilege-protected; the Wells submission strategy communication explains the 30-day response window and the importance of a well-crafted submission; employee communication guidelines prevent rumors while maintaining securities law compliance (insider trading restrictions); PR coordination ensures public messaging is consistent with legal strategy; insurance notification is timely to preserve D&O coverage; all communications are coordinated through a single point of contact to prevent inconsistent messaging."
    weight: 0.35
    description: "VIPClientCrisis"
  - type: llm_judge
    criteria: "Cultural competency response is both reactive and systemic — the bar complaint response acknowledges the potential failure and documents remediation steps; the file review examines whether interpreter services were offered, whether documents were provided in Korean, whether the engagement letter addressed language needs; the firm-wide assessment evaluates current practices for non-English-speaking clients across all practice groups; the new policy requires: language assessment at intake, professional interpreter for all substantive communications, translated key documents in the client's language, documentation of language accommodations; the training program covers cultural competency, implicit bias, and practical interpretation protocols."
    weight: 0.30
    description: "CulturalCompetencyResponse"
