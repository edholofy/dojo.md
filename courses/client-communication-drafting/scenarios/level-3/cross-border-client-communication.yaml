meta:
  id: cross-border-client-communication
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design cross-border client communication protocols — manage client communications across multiple jurisdictions, legal systems, languages, and cultural contexts for international legal matters"
  tags: [cross-border, international, multi-jurisdiction, advanced]

state: {}

trigger: |
  Design cross-border client communication protocols
  for a law firm handling an international corporate
  investigation.

  CLIENT: GlobalTech Corp. (US-based multinational)
  MATTER: Anti-corruption investigation involving
  operations in US, UK, Brazil, China, and India

  REGULATORY BODIES INVOLVED:
  - US DOJ (FCPA investigation)
  - US SEC (securities fraud inquiry)
  - UK Serious Fraud Office (UK Bribery Act)
  - Brazil Federal Prosecution Service (Clean
    Company Act)
  - China's National Supervisory Commission
  - India's CBI (Prevention of Corruption Act)

  CLIENT STAKEHOLDERS:
  - US Board of Directors (English; New York)
  - Special Committee (3 independent directors)
  - General Counsel (US; English)
  - Regional counsel: UK (English), Brazil
    (Portuguese), China (Mandarin), India (English
    + Hindi)
  - Local management in each country
  - External auditors (Big 4 firm)
  - Insurance carriers (D&O and E&O)

  COMMUNICATION CHALLENGES:
  - Time zones span 15 hours (New York to Shanghai)
  - Multiple privilege regimes (US attorney-client
    privilege differs from UK legal advice privilege;
    China has no equivalent privilege)
  - Different regulatory disclosure obligations in
    each country
  - Language barriers with local management and
    counsel
  - Data privacy restrictions (GDPR, China's PIPL,
    India's DPDP, Brazil's LGPD) limit what client
    data can be communicated across borders
  - Cultural expectations for communication style
    vary dramatically
  - Coordinated defense requires consistent messaging
    but different jurisdictions have different
    procedural requirements
  - Waiver risk: privilege waiver in one jurisdiction
    could affect all jurisdictions

  Create:
  1. Cross-border communication protocol
  2. Privilege protection strategy per jurisdiction
  3. Data privacy-compliant communication framework
  4. Cultural adaptation guidelines
  5. Coordinated messaging strategy

assertions:
  - type: llm_judge
    criteria: "Cross-border communication protocol coordinates across 6 jurisdictions — establishes a centralized communication hub (US lead counsel) with defined channels to each jurisdiction's local counsel and management; addresses the 15-hour time zone challenge with communication windows and asynchronous protocols; defines which communications require real-time coordination (regulatory responses, media statements) vs. routine updates; the protocol specifies communication hierarchy (board → special committee → GC → regional counsel → local management) with clear escalation procedures; each jurisdiction has a designated communication lead who filters information to and from the center."
    weight: 0.35
    description: "CrossBorderProtocol"
  - type: llm_judge
    criteria: "Privilege protection strategy addresses fundamental differences between jurisdictions — US attorney-client privilege requires communications for legal advice; UK legal advice privilege is narrower (applies only to communications with lawyers, not in-house counsel in some contexts); China has no equivalent privilege; the strategy uses the 'lowest common denominator' approach where needed and jurisdiction-specific protections where possible; labels and handling protocols differ by jurisdiction; the protocol addresses the critical risk that privilege waiver in one jurisdiction (especially China) could be used to argue waiver in others; the Kovel agreement concept and Upjohn warnings are addressed for employee interviews."
    weight: 0.35
    description: "PrivilegeProtection"
  - type: llm_judge
    criteria: "Data privacy-compliant framework addresses cross-border data transfer restrictions — GDPR requires lawful basis for transferring personal data from UK/EU to US; China's PIPL restricts outbound data transfer; India's DPDP and Brazil's LGPD impose similar restrictions; the framework identifies which client communications contain personal data, establishes lawful transfer mechanisms (standard contractual clauses, binding corporate rules), and creates data minimization protocols for cross-border communications; the framework ensures regulatory cooperation does not violate data protection laws in the countries where data originates."
    weight: 0.30
    description: "DataPrivacyCompliance"
