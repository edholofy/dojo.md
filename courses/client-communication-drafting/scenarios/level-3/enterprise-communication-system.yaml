meta:
  id: enterprise-communication-system
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design an enterprise client communication system — create standardized templates, workflows, quality controls, and technology infrastructure for client communications across a large law firm"
  tags: [enterprise-system, communication-standards, workflow-design, advanced]

state: {}

trigger: |
  A 250-attorney law firm is redesigning its client
  communication practices after a malpractice audit
  revealed systemic communication failures. Design
  a comprehensive client communication system.

  CURRENT PROBLEMS:
  - 4 malpractice claims in 2 years due to client
    communication failures
  - Claim 1: Client not informed of settlement
    deadline; deadline expired ($2.5M loss)
  - Claim 2: Adverse ruling not communicated for
    6 weeks; client lost appeal window
  - Claim 3: Fee dispute — client says hourly rate
    increase was never communicated
  - Claim 4: Conflict of interest not disclosed;
    client discovered independently
  - Client satisfaction survey: 62% (industry
    average: 78%)
  - 23% of clients report "never hearing from their
    attorney between major events"
  - No standardized communication templates
  - No communication tracking or accountability
  - Partners resist "form letters" as impersonal

  FIRM STRUCTURE:
  - 250 attorneys across 6 offices
  - Practice groups: Corporate, Litigation, Real
    Estate, Employment, IP, Tax
  - 120 paralegals and legal assistants
  - IT department with CRM capabilities (Salesforce)
  - Marketing department (6 staff)

  REQUIREMENTS:
  - Standardized communication templates adaptable
    to each practice group
  - Automated communication triggers (e.g., adverse
    ruling → notification within 48 hours)
  - Communication tracking dashboard
  - Quality review process
  - Client portal for self-service status checks
  - Metrics and reporting
  - Training program for all staff
  - Compliance with ethics rules across 6 states

  Create:
  1. Communication system architecture
  2. Template library design (20+ template categories)
  3. Automated trigger framework
  4. Quality assurance and accountability program
  5. Implementation and change management plan

assertions:
  - type: llm_judge
    criteria: "Communication system addresses each failure mode — automated deadline notification prevents Claim 1; adverse ruling triggers with 48-hour response requirement prevent Claim 2; fee change protocols with written acknowledgment prevent Claim 3; conflict checking integration with communication workflow prevents Claim 4; the system creates redundancy (attorney + paralegal + automated alerts) so no single point of failure can cause a malpractice event; the 23% 'never hear from attorney' problem is addressed by mandatory minimum communication frequency (practice-group-specific)."
    weight: 0.35
    description: "FailureModeAddressing"
  - type: llm_judge
    criteria: "Template library balances standardization with personalization — creates 20+ template categories (engagement, status update, adverse ruling, settlement, billing, conflict disclosure, referral, termination, etc.) with practice-group-specific variations; templates include mandatory content (deadlines, next steps, contact info) while leaving space for personalized attorney commentary; addresses partner resistance to 'form letters' by demonstrating that templates ensure completeness while the attorney adds personal context and analysis; each template maps to the specific ethics rule it satisfies (Rule 1.4, 1.5, 1.7, 1.16)."
    weight: 0.35
    description: "TemplateLibraryDesign"
  - type: llm_judge
    criteria: "Implementation plan manages change across 250 attorneys — phased rollout starting with pilot practice groups (Litigation, Employment — highest communication failure rates); training program includes CLE credits to incentivize participation; communication tracking dashboard provides partners with visibility into their team's compliance; metrics include response time to client inquiries, communication frequency, client satisfaction scores, and malpractice near-miss tracking; the plan addresses the multi-state ethics compliance challenge (6 states, varying communication requirements); executive sponsorship and accountability structure are defined."
    weight: 0.30
    description: "ImplementationPlan"
