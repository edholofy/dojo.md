meta:
  id: crisis-communication-protocol
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design a crisis communication protocol — create client communication procedures for high-stakes situations including data breaches, regulatory emergencies, executive arrests, and mass tort notifications"
  tags: [crisis-communication, emergency-protocol, stakeholder-management, advanced]

state: {}

trigger: |
  Design a comprehensive crisis communication
  protocol for a law firm's corporate practice group
  that handles clients in crisis situations.

  FIRM: Global Law Partners LLP (500 attorneys,
  12 offices worldwide)
  PRACTICE GROUP: Crisis Management & Regulatory
  Defense (40 attorneys)

  CRISIS SCENARIOS TO ADDRESS:

  Scenario A — Data Breach Response:
  Client discovers 5M customer records were
  compromised. 47 states have different notification
  requirements (timing ranges from 24 hours to 90
  days). Client needs coordinated communication to:
  - Board of Directors (privileged)
  - Affected consumers (regulatory requirement)
  - Regulators (state AGs, FTC, international DPAs)
  - Media (controlled messaging)
  - Business partners and vendors
  - Employees

  Scenario B — Executive Arrest:
  Client's CEO arrested on federal fraud charges.
  Client needs simultaneous communication to:
  - Board of Directors (activate succession plan)
  - SEC (8-K filing within 4 business days)
  - Shareholders
  - Employees
  - Media
  - Banking partners and creditors
  - Key customers

  Scenario C — Product Safety Emergency:
  Client's product causes 3 deaths. CPSC, FDA, and
  trial lawyers are all contacting the company.
  Communication needed to:
  - Families of victims (through counsel)
  - Regulatory agencies (CPSC, FDA)
  - Retail partners (recall coordination)
  - Consumers (recall notice)
  - Media
  - Employees
  - Insurance carriers

  PROTOCOL REQUIREMENTS:
  - Communication cascade timelines (who is told
    what, in what order)
  - Template communications for each audience
  - Privilege protection strategies
  - Regulatory notification compliance across
    jurisdictions
  - Media coordination procedures
  - Internal communication chain of command

  Create:
  1. Crisis communication protocol framework
  2. Communication cascade timeline for each scenario
  3. Audience-specific template communications
  4. Privilege protection strategies
  5. Training and drill program

assertions:
  - type: llm_judge
    criteria: "Communication cascade timelines prioritize legally required notifications — for data breach: identifies mandatory notification windows by state (24-hour states first, then 30-day, 45-day, 60-day, 90-day tiers); for executive arrest: SEC 8-K within 4 business days is flagged as highest priority; for product safety: CPSC mandatory reporting within 24 hours of learning of death under Section 15(b) of CPSA; each cascade maps audiences in priority order with timing requirements; the cascades account for dependencies (board must approve public statements before media contact; privilege must be established before documenting the investigation)."
    weight: 0.35
    description: "CascadeTimelines"
  - type: llm_judge
    criteria: "Audience-specific templates adapt messaging for each stakeholder — board communications are comprehensive and privileged; consumer notifications meet regulatory requirements (plain language, remediation options, contact information); media statements are concise, factual, and avoid admissions; employee communications address job security and operational impact; regulatory notifications are compliant with specific agency requirements; templates include guidance for what to say and what NOT to say; each template is marked with the audience, purpose, and mandatory content elements."
    weight: 0.35
    description: "AudienceSpecificTemplates"
  - type: llm_judge
    criteria: "Privilege protection strategies are comprehensive — distinguishes between privileged communications (attorney-client, work product) and non-privileged communications (business, regulatory filings, public statements); provides specific guidance: all internal investigation communications should be directed through counsel; labels and handling protocols for privileged documents; strategies for maintaining privilege while complying with regulatory disclosure obligations; addresses the common law crime-fraud exception and selective waiver issues; the protocol prevents inadvertent privilege waiver during the chaos of a crisis response."
    weight: 0.30
    description: "PrivilegeProtection"
