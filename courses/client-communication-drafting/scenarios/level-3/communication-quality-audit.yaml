meta:
  id: communication-quality-audit
  level: 3
  course: client-communication-drafting
  type: output
  description: "Conduct a client communication quality audit — evaluate a law firm's communication practices against professional standards, identify deficiencies, and recommend improvements across all communication types"
  tags: [quality-audit, compliance-review, best-practices, advanced]

state: {}

trigger: |
  Conduct a comprehensive client communication
  quality audit for a law firm that has received
  multiple client complaints and a malpractice
  claim related to communication failures.

  FIRM: Westfield & Associates (45 attorneys,
  2 offices)
  PRACTICE AREAS: Personal Injury (55% of revenue),
  Workers' Comp (25%), Family Law (20%)

  AUDIT TRIGGER:
  - 3 state bar complaints in 12 months (all citing
    Rule 1.4 communication failures)
  - 1 malpractice claim (missed statute of
    limitations — client says they were never told
    about the deadline)
  - Client satisfaction survey: 54% (below 78%
    industry average)
  - Net Promoter Score: -15 (industry average: +20)
  - Google reviews: 2.8 stars (multiple reviews
    cite "never returns calls")

  AUDIT FINDINGS:

  Finding 1 — Engagement Letters:
  - 30% of active files have NO signed engagement
    letter
  - 45% of existing engagement letters are missing
    scope limitations
  - 20% have outdated fee schedules
  - Template was last updated in 2019

  Finding 2 — Status Updates:
  - Average time between client contacts: 67 days
  - 22% of clients haven't been contacted in 90+ days
  - No standard for minimum communication frequency
  - Updates are ad hoc — no templates or procedures

  Finding 3 — Adverse Ruling Notifications:
  - Average time to notify client of adverse ruling:
    11 days (should be 48 hours)
  - 3 instances where clients learned of rulings
    from opposing counsel before their own attorney

  Finding 4 — Settlement Communications:
  - 2 settlements approved without documented client
    consent
  - Settlement letters lack financial analysis
  - No standardized format for presenting offers

  Finding 5 — Billing Communications:
  - 40% of invoices sent more than 30 days after
    work performed
  - Fee disputes average $8,000 per occurrence
  - No policy for discussing fee increases

  Finding 6 — Technology:
  - No client portal
  - Email is only digital communication channel
  - No communication tracking system
  - No centralized phone message system

  Create:
  1. Complete audit report with findings
  2. Risk assessment for each finding
  3. Remediation plan with priorities
  4. Compliance monitoring framework
  5. Training curriculum for all staff

assertions:
  - type: llm_judge
    criteria: "Audit report connects each finding to specific risks — Finding 1 (missing engagement letters) creates malpractice exposure and fee dispute vulnerability; Finding 2 (67-day average contact gap) directly caused the bar complaints and client satisfaction issues; Finding 3 (11-day adverse ruling notification) caused the opposing counsel notification embarrassment and could cause missed appeal deadlines; Finding 4 (undocumented settlement consent) violates Model Rule 1.2(a) and creates malpractice exposure; Finding 5 (late invoicing) causes revenue leakage and client distrust; Finding 6 (no technology) means no audit trail and no accountability; each finding is rated by severity and urgency."
    weight: 0.35
    description: "AuditReportFindings"
  - type: llm_judge
    criteria: "Remediation plan prioritizes by risk level — immediate actions (30 days): audit all files for engagement letters and obtain missing ones, implement 48-hour adverse ruling notification policy, obtain retroactive settlement consent documentation; short-term (90 days): implement communication tracking system, establish minimum contact frequency policy (at least monthly for PI, bi-weekly for active litigation), update engagement letter template; medium-term (6 months): implement client portal, create template library, develop billing communication procedures; the plan includes specific responsible parties, deadlines, and success metrics for each remediation item."
    weight: 0.35
    description: "RemediationPlan"
  - type: llm_judge
    criteria: "Training curriculum addresses the root causes — covers: Model Rule 1.4 requirements (what, when, and how to communicate), engagement letter best practices with live template exercises, status update procedures with role-playing, adverse ruling notification protocol with simulated scenarios, settlement communication procedures with financial analysis training, billing communication and fee discussion training; the curriculum includes practice-area-specific modules (PI clients have different needs than family law clients); training is mandatory for all attorneys and staff with annual refresher requirements; CLE credits incentivize attorney participation; competency assessments verify training effectiveness."
    weight: 0.30
    description: "TrainingCurriculum"
