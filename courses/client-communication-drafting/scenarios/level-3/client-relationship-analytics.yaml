meta:
  id: client-relationship-analytics
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design a client relationship analytics system — build data-driven tools for measuring communication quality, predicting client satisfaction, and identifying at-risk client relationships before they deteriorate"
  tags: [client-analytics, relationship-management, predictive-analysis, advanced]

state: {}

trigger: |
  Design a client relationship analytics system
  for a national law firm to predict and prevent
  client dissatisfaction.

  FIRM: Alliance Legal Partners (200 attorneys,
  8 offices)
  ANNUAL REVENUE: $180M
  CLIENT BASE: 3,500 active matters across all
  practice groups

  PROBLEM:
  The firm loses 15% of its client base annually
  (vs. 8% industry average). Exit interviews reveal
  that 70% of departing clients cite "poor
  communication" as the primary reason for leaving.
  The firm estimates each lost client relationship
  costs $50,000-$200,000 in lifetime value.

  AVAILABLE DATA SOURCES:
  - Email metadata (volume, response time, sender/
    recipient, but NOT content — privilege)
  - Phone call logs (duration, frequency, direction)
  - Billing records (hours, amounts, payment timing)
  - Case management data (matter type, stage,
    duration, outcome)
  - Client satisfaction surveys (annual, 40% response
    rate)
  - Website and portal engagement metrics
  - Referral tracking (clients referring new business)
  - Marketing touchpoints (events, newsletters)
  - LinkedIn connections between attorneys and clients

  ANALYTICS TO BUILD:

  1. Client Health Score:
  - Composite metric predicting client satisfaction
  - Leading indicators of dissatisfaction
  - Real-time dashboard for partners

  2. Communication Quality Metrics:
  - Response time to client inquiries
  - Communication frequency vs. benchmarks
  - Proactive vs. reactive communication ratio
  - Multi-channel engagement analysis

  3. At-Risk Client Detection:
  - Early warning system for deteriorating
    relationships
  - Automated alerts to responsible partners
  - Intervention protocols

  4. Relationship Intelligence:
  - Cross-selling opportunity identification
  - Key relationship mapping (who knows whom)
  - Client lifecycle analysis
  - Revenue concentration risk

  Create:
  1. Analytics system architecture
  2. Client Health Score methodology
  3. At-risk detection algorithms
  4. Dashboard design for partners
  5. Privacy and ethics compliance framework

assertions:
  - type: llm_judge
    criteria: "Client Health Score methodology uses predictive indicators — combines quantitative metrics: communication frequency score (vs. matter-stage benchmarks), response time score (hours to respond to client emails/calls), billing health score (payment timeliness, fee dispute history), engagement score (portal logins, event attendance, survey completion), and referral activity (clients who refer are healthy); each metric is weighted by predictive power determined through analysis of historical client departures; the score is normalized 0-100 with thresholds: Green (>75), Yellow (50-75), Red (<50); the methodology accounts for practice-area differences (corporate clients expect faster response than estate planning clients)."
    weight: 0.35
    description: "ClientHealthScoreMethodology"
  - type: llm_judge
    criteria: "At-risk detection uses leading indicators of client departure — identifies early warning patterns from historical data: sudden decrease in email volume (30%+ drop), increased time between responses, late or disputed payments after a history of prompt payment, declining portal engagement, failure to respond to satisfaction surveys, pattern of calling the office rather than the assigned attorney (indicating relationship with the attorney is weak); automated alerts notify the responsible partner with specific intervention recommendations; the system provides a 90-day warning window before typical client departure events."
    weight: 0.35
    description: "AtRiskDetection"
  - type: llm_judge
    criteria: "Privacy and ethics compliance framework addresses sensitive data use — the system uses email metadata (volume, timing, sender/recipient) but never accesses email content (preserving privilege); phone call duration and frequency are analyzed but conversations are never recorded or transcribed without consent; the framework addresses: client consent for data analysis (added to engagement letter), attorney-client privilege protection, data security and access controls, bias detection (are minority clients systematically scored lower?), ethical use policies (analytics inform relationship management, not case strategy); the framework complies with state bar ethics opinions on data analytics in legal practice."
    weight: 0.30
    description: "PrivacyEthicsCompliance"
