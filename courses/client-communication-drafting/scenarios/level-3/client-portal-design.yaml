meta:
  id: client-portal-design
  level: 3
  course: client-communication-drafting
  type: output
  description: "Design a client communication portal — create a secure digital platform that enables clients to access case information, communicate with their attorneys, review documents, and manage their legal matters self-service"
  tags: [client-portal, digital-platform, self-service, advanced]

state: {}

trigger: |
  Design a comprehensive client communication
  portal for a mid-size law firm.

  FIRM: Cascade Legal Group (80 attorneys, 3 offices)
  PRACTICE AREAS: Personal Injury, Family Law,
  Employment, Business Litigation, Estate Planning

  CURRENT STATE:
  - Client communication is 90% phone and email
  - Attorneys spend 25% of their time on routine
    client inquiries ("What's the status of my case?")
  - Clients complain about being unable to reach
    their attorney
  - Document sharing is done via email attachments
    (security concern)
  - Billing inquiries consume 10 hours/week of
    admin time
  - No self-service capability for clients

  TARGET STATE:
  - 60% of routine inquiries resolved through
    portal self-service
  - Secure document sharing and e-signature
  - Real-time case status visibility
  - Integrated billing and payment
  - Mobile-friendly design
  - Multi-language support
  - ADA-accessible

  PORTAL FEATURES TO DESIGN:

  1. Case Dashboard:
  - Visual case timeline (current stage highlighted)
  - Next steps and upcoming deadlines
  - Key documents and evidence list
  - Attorney team and contact information

  2. Secure Messaging:
  - Attorney-client messaging (encrypted, logged)
  - Document sharing with version control
  - Read receipts and response tracking
  - Urgency flagging (routine vs. needs attention)

  3. Document Center:
  - Secure upload/download
  - E-signature integration
  - Document categorization
  - Settlement agreements, engagement letters, etc.

  4. Billing and Payments:
  - Invoice viewing and payment
  - Retainer balance tracking
  - Payment history
  - Online payment processing

  5. Knowledge Center:
  - FAQ by practice area
  - Legal process explainers
  - What to expect guides
  - Glossary of legal terms

  CONSTRAINTS:
  - Must comply with state ethics rules on electronic
    communication
  - Must maintain attorney-client privilege
  - HIPAA compliance for personal injury medical
    records
  - Budget: $200K development + $50K/year
    maintenance
  - Timeline: 6-month development

  Create:
  1. Portal architecture and user experience design
  2. Feature specifications for each module
  3. Security and compliance framework
  4. Practice-area customization approach
  5. Adoption and rollout strategy

assertions:
  - type: llm_judge
    criteria: "Portal architecture reduces attorney time on routine inquiries — the case dashboard provides real-time status that answers the #1 client question ('What's happening with my case?') without requiring a phone call; practice-area-specific status workflows (personal injury: investigation → demand → negotiation → litigation → resolution; family law: filing → discovery → mediation → trial → decree) give clients visual understanding of where they are; the Knowledge Center with FAQ and process explainers pre-answers common questions; the design targets the stated goal of 60% self-service resolution of routine inquiries."
    weight: 0.35
    description: "RoutineInquiryReduction"
  - type: llm_judge
    criteria: "Security and compliance framework protects privileged communications — all data encrypted at rest and in transit; multi-factor authentication required; role-based access controls (client sees only their matter); HIPAA compliance module for personal injury medical records; e-signature complies with ESIGN Act and UETA; secure messaging meets state bar requirements for electronic client communication; audit trails maintain attorney-client privilege documentation; the portal terms of service address privilege protection and client responsibilities; SOC 2 Type II compliance planned; the $200K development budget is realistic for the defined scope."
    weight: 0.35
    description: "SecurityCompliance"
  - type: llm_judge
    criteria: "Adoption strategy addresses diverse client populations — acknowledges that Cascade's clients range from tech-savvy business clients to elderly personal injury clients to family law clients in emotional distress; the rollout is phased by practice area (business litigation first, then personal injury, then family law); training includes video tutorials, in-person walkthroughs during client meetings, and printed quick-start guides; portal is mobile-responsive and ADA-accessible; multi-language support addresses client demographics; the strategy retains phone and email as alternatives for clients who cannot or will not use the portal; attorney adoption is incentivized through demonstrated time savings."
    weight: 0.30
    description: "AdoptionStrategy"
