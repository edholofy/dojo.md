meta:
  id: regulatory-client-communication
  level: 3
  course: client-communication-drafting
  type: output
  description: "Draft complex regulatory client communications — communicate government investigation developments, compliance obligations, and enforcement risk to corporate clients navigating multi-agency regulatory proceedings"
  tags: [regulatory-communication, government-investigation, enforcement, advanced]

state: {}

trigger: |
  Draft a series of client communications for a
  corporate client facing simultaneous regulatory
  investigations from multiple agencies.

  CLIENT: MedDevice Corp. (NYSE-listed medical
  device manufacturer)
  CONTACT: General Counsel, Dr. Elena Torres
  YOUR FIRM: Baker Hughes & Associates

  SITUATION:
  MedDevice is under investigation by 3 federal
  agencies for alleged off-label marketing of its
  cardiac monitoring device and kickback payments
  to physicians:

  1. DOJ Criminal Division: Grand jury investigation
     for health care fraud (18 U.S.C. § 1347) and
     Anti-Kickback Statute violations
  2. HHS-OIG: Civil False Claims Act investigation
     (31 U.S.C. § 3729-3733); potential treble
     damages on $500M in Medicare billings
  3. SEC: Investigation into whether MedDevice
     properly disclosed the investigations and
     regulatory risks in its 10-K/10-Q filings

  RECENT DEVELOPMENTS:
  - DOJ has issued 15 grand jury subpoenas to
    current and former employees
  - HHS-OIG has demanded 5 years of sales records,
    physician payment data, and marketing materials
  - SEC has issued a formal order of investigation
  - Company's VP of Sales (key witness) resigned
    last week and retained separate counsel
  - Board has formed a Special Committee and hired
    your firm as Special Committee counsel

  COMMUNICATIONS NEEDED:
  1. Initial briefing memo to Special Committee
     (privileged)
  2. Employee communication regarding investigation
     (Upjohn warnings)
  3. SEC Form 8-K disclosure language regarding
     investigations
  4. Insurance carrier notification (D&O policy)
  5. Communication to external auditors regarding
     contingent liability assessment

  Create all 5 communications with appropriate
  privilege protections and disclosure considerations.

assertions:
  - type: llm_judge
    criteria: "Special Committee memo is comprehensive and properly privileged — marked as attorney-client privileged and work product; provides a candid assessment of the legal exposure across all three investigations (criminal liability, civil FCA treble damages, SEC enforcement action); addresses the VP of Sales resignation and its strategic implications (potential cooperator); recommends immediate steps (document preservation, employee interview protocol, separate counsel for individuals); the memo is direct and analytical, appropriate for board-level decision-making; the memo explicitly establishes the privilege foundation by documenting that it is for the purpose of providing legal advice."
    weight: 0.35
    description: "SpecialCommitteeMemo"
  - type: llm_judge
    criteria: "Employee communication includes proper Upjohn warnings — informs employees of the investigation, explains the company's obligation to cooperate, and critically includes corporate Miranda/Upjohn warnings: the attorney represents the company not the individual employee, the privilege belongs to the company and can be waived, the employee's statements may be disclosed to the government; advises employees of their right to retain personal counsel; the communication balances the need for employee cooperation with honest disclosure of the risks employees face; the tone is firm but not threatening; the communication is legally sound under Model Rule 1.13 (organization as client)."
    weight: 0.35
    description: "UpjohnWarnings"
  - type: llm_judge
    criteria: "SEC 8-K disclosure language navigates the tension between transparency and self-incrimination — the disclosure acknowledges the investigations without admitting wrongdoing; uses precise language ('the Company is cooperating with government inquiries') that satisfies SEC disclosure requirements without prejudicing the criminal defense; addresses the materiality analysis (these investigations could have a material adverse effect on the Company's business, financial condition, and results of operations); the disclosure is consistent with the SEC's requirements under Regulation FD and Items 8.01/1.01 of Form 8-K while being reviewed by both the criminal defense team and securities counsel."
    weight: 0.30
    description: "SEC8KDisclosure"
