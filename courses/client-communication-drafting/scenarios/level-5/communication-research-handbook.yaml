meta:
  id: communication-research-handbook
  level: 5
  course: client-communication-drafting
  type: output
  description: "Author a comprehensive research handbook on legal client communication — create the definitive academic reference synthesizing empirical research, theoretical frameworks, and methodological approaches for studying attorney-client communication"
  tags: [research-handbook, academic-reference, empirical-research, master]

state: {}

trigger: |
  Oxford University Press has commissioned you to
  edit "The Oxford Handbook of Legal Client
  Communication" — the first comprehensive academic
  reference on this topic. Design the handbook and
  write the editor's introduction.

  HANDBOOK PARAMETERS:
  - 30 chapters by leading scholars and practitioners
  - Target audience: academics, doctoral students,
    policy makers, senior practitioners
  - Expected to become the standard reference in
    the field for 10+ years
  - Must synthesize existing research while
    identifying gaps and future directions

  ORGANIZE CHAPTERS INTO SECTIONS:

  Part I: Theoretical Foundations (Chapters 1-6)
  - Communication theory applied to legal contexts
  - Professional relationship theory
  - Trust and credibility in professional services
  - Power dynamics in attorney-client communication
  - Cultural and linguistic dimensions
  - Ethical frameworks for professional communication

  Part II: Empirical Research (Chapters 7-14)
  - Client satisfaction and communication quality
  - Communication and legal outcomes
  - Technology-mediated legal communication
  - Cross-cultural communication in legal settings
  - Communication in specific practice areas
  - Communication with vulnerable populations
  - Communication failures and malpractice
  - Organizational communication in law firms

  Part III: Applied Perspectives (Chapters 15-22)
  - Communication drafting and writing
  - Oral communication and counseling
  - Digital communication and social media
  - AI and automated communication
  - Crisis and adverse event communication
  - Client communication in dispute resolution
  - Pro bono and legal aid communication
  - Communication training and pedagogy

  Part IV: Policy and Future Directions
  (Chapters 23-30)
  - Regulation of attorney-client communication
  - International comparative analysis
  - Access to justice and communication equity
  - Technology and the future of legal communication
  - Measuring communication quality
  - Communication and legal profession reform
  - Research methodology for legal communication
  - Future research agenda

  Create:
  1. Complete handbook table of contents with chapter
     descriptions and suggested authors
  2. Editor's introduction (5,000-7,000 words)
  3. Research methodology chapter outline
  4. Contributor guidelines
  5. Marketing and impact strategy

assertions:
  - type: llm_judge
    criteria: "Handbook table of contents demonstrates comprehensive coverage and logical organization — each chapter description clearly defines scope, key arguments, and contribution to the field; suggested authors are plausible scholars from relevant disciplines (law, communication, psychology, sociology, linguistics, information science); the progression from theoretical foundations through empirical research to applied perspectives to policy follows standard handbook architecture; chapters are distinct without significant overlap; the overall structure positions legal client communication as a legitimate interdisciplinary field of study deserving of systematic academic attention; cross-references between chapters create intellectual coherence."
    weight: 0.35
    description: "HandbookContents"
  - type: llm_judge
    criteria: "Editor's introduction synthesizes the state of the field — identifies the paradox that communication is the most complained-about aspect of legal practice yet receives the least scholarly attention; traces the intellectual history of the field from early professional responsibility scholarship through the access to justice movement to current empirical and technology-focused research; articulates the interdisciplinary nature of the field (drawing on communication theory, behavioral economics, organizational behavior, and legal ethics); identifies 5-7 major research gaps (longitudinal studies of communication impact on case outcomes, cross-cultural communication research, technology impact studies, communication equity research); the introduction positions the handbook as both a synthesis of existing knowledge and a research agenda for the next decade."
    weight: 0.35
    description: "EditorsIntroduction"
  - type: llm_judge
    criteria: "Research methodology chapter and contributor guidelines establish scholarly standards — the methodology chapter covers both quantitative approaches (survey research, experimental designs, content analysis of legal communications, NLP-based analysis of large communication corpora) and qualitative approaches (ethnographic observation of attorney-client interactions, interview-based studies, case study methodology, discourse analysis); addresses unique methodological challenges in legal communication research (attorney-client privilege limiting access to communications, ethical review board concerns about studying vulnerable populations, difficulty controlling for case outcome variables); contributor guidelines specify length (8,000-12,000 words per chapter), citation style, required elements (literature review, original contribution, future research directions), and review process (double-blind peer review with editorial oversight)."
    weight: 0.30
    description: "MethodologyAndGuidelines"
