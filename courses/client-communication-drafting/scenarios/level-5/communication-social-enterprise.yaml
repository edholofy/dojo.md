meta:
  id: communication-social-enterprise
  level: 5
  course: client-communication-drafting
  type: output
  description: "Launch a social enterprise that brings professional communication standards to underserved legal markets — design a scalable model serving pro bono organizations, legal aid societies, and public defenders"
  tags: [social-enterprise, access-to-justice, underserved-markets, master]

state: {}

trigger: |
  Design a social enterprise that democratizes
  access to professional legal client communication
  tools and training.

  PROBLEM STATEMENT:
  While large law firms invest millions in client
  communication technology and training, the
  organizations serving the most vulnerable clients
  have the worst communication infrastructure:
  - Legal aid organizations handle 300+ cases per
    attorney with no communication support tools
  - Public defenders communicate with clients
    primarily through brief in-person meetings
    at courthouses
  - Pro bono attorneys lack templates, training,
    and oversight for client communications
  - Immigration legal services organizations
    communicate with clients who speak 40+
    languages with minimal translation support
  - Disability rights organizations lack accessible
    communication formats
  - Domestic violence legal services need trauma-
    informed communication protocols

  THE ENTERPRISE: "ClearCounsel"
  Mission: Every legal client deserves clear,
  timely, respectful communication regardless of
  their attorney's resources.

  DESIGN THE FOLLOWING:

  1. TECHNOLOGY PLATFORM
  - Free/low-cost client communication portal
    for legal aid organizations
  - Template library for common legal aid scenarios
    (eviction defense, benefits appeals, immigration,
    family law, consumer debt)
  - Automated translation for 20+ languages
  - Accessibility features (screen reader compatible,
    large print, audio, simplified language levels)
  - Mobile-first design (many clients lack computers)

  2. TRAINING PROGRAM
  - Free online training for legal aid attorneys
  - Trauma-informed communication certification
  - Cultural competency modules
  - Train-the-trainer program for supervising
    attorneys

  3. BUSINESS MODEL
  - How does this sustain itself financially?
  - Revenue streams that don't burden the
    organizations being served
  - Cross-subsidy models (law firm sponsorship,
    government contracts, foundation grants)
  - Earned revenue from premium features sold to
    private-sector firms

  4. IMPACT MEASUREMENT
  - How do you prove this works?
  - Client outcome metrics
  - Attorney efficiency metrics
  - Systemic impact on access to justice

  Create:
  1. Complete business plan
  2. Technology platform specification
  3. Training curriculum outline
  4. Funding and sustainability strategy
  5. Five-year impact projection

assertions:
  - type: llm_judge
    criteria: "Business plan addresses the fundamental tension between serving organizations with no budget and achieving financial sustainability — the cross-subsidy model is credible: large law firms pay premium pricing ($50K-100K annually) for an enterprise version that includes impact reporting (demonstrating ESG/pro bono commitment), and this revenue subsidizes free access for qualified legal aid organizations; government contracts (LSC, DOJ Office for Access to Justice) provide infrastructure funding; foundation grants (Gates Foundation access to justice initiatives, Robin Hood Foundation) fund development; earned revenue from consulting services to bar associations and court systems adds diversification; the business plan includes realistic 5-year financial projections showing a path to sustainability by Year 3-4."
    weight: 0.35
    description: "BusinessPlan"
  - type: llm_judge
    criteria: "Technology platform specification addresses the unique needs of underserved populations — mobile-first design recognizes that 85% of legal aid clients primarily access technology through smartphones; the translation engine supports real-time translation for the 20 most common languages in legal aid settings (including indigenous languages and sign language video); accessibility features exceed ADA requirements (WCAG 2.1 AAA compliance); the platform operates effectively on low-bandwidth connections; template library covers the most common legal aid case types with plain-language explanations at 6th-grade reading level; client-facing communications include visual aids (infographics, timelines, step-by-step illustrations) for clients with limited literacy; data security protects particularly vulnerable populations (domestic violence survivors, undocumented immigrants)."
    weight: 0.35
    description: "TechnologyPlatform"
  - type: llm_judge
    criteria: "Impact measurement framework demonstrates both individual and systemic change — individual metrics track client-level outcomes (comprehension of legal rights and options, satisfaction with attorney communication, compliance with legal deadlines and requirements, reduced failure-to-appear rates); organizational metrics track attorney efficiency (time saved on communication tasks, cases handled per attorney, reduced malpractice risk); systemic metrics track access to justice impact (clients served, geographic reach, language coverage, demographic equity); the framework includes a rigorous evaluation methodology (randomized controlled trial in partner organizations comparing ClearCounsel users to control groups) designed to produce publishable research demonstrating causation not just correlation; 5-year projections include specific targets (50,000 clients served, 500 organizations, 30 states, 20 languages)."
    weight: 0.30
    description: "ImpactMeasurement"
