meta:
  id: communication-existential-challenges
  level: 5
  course: client-communication-drafting
  type: output
  description: "Address existential challenges facing legal client communication — confront fundamental questions about whether AI will replace attorney communication, how virtual lawyering changes the relationship, and what communication means in an era of deepfakes"
  tags: [existential-challenges, future-of-law, philosophical-analysis, master]

state: {}

trigger: |
  A prestigious legal journal has invited you to
  write a symposium article addressing existential
  challenges facing attorney-client communication.
  Three provocative scenarios require analysis:

  SCENARIO A — THE AI ATTORNEY
  Year: 2030. AI can now draft client communications
  indistinguishable from those written by experienced
  attorneys. A legal tech company offers "AI Counsel"
  — fully automated client communication for routine
  matters (traffic tickets, simple wills, uncontested
  divorces). The AI handles intake, status updates,
  document explanations, and outcome notifications.
  Clients rate AI Counsel's communication higher
  than human attorneys (faster, clearer, available
  24/7).

  Questions:
  - Is AI-generated client communication "practicing
    law"?
  - Does the duty to communicate (Rule 1.4) require
    a human communicator?
  - If AI communicates better, is it ethical to
    insist on human communication?
  - How should the profession respond?

  SCENARIO B — THE METAVERSE COURTROOM
  Year: 2028. A jurisdiction implements fully virtual
  court proceedings. Attorneys meet clients only
  through avatars in virtual reality. Written
  communication occurs through encrypted VR messaging.
  Some attorneys use AI-generated avatars that look
  and sound like them but are actually AI-driven
  for routine client interactions.

  Questions:
  - Does virtual-only attorney-client communication
    satisfy ethical obligations?
  - When is AI avatar communication deceptive?
  - How do you build trust without physical presence?
  - What happens to clients without VR access?

  SCENARIO C — THE DEEPFAKE CRISIS
  Year: 2027. Opposing counsel in a high-stakes case
  creates a deepfake video of your client's attorney
  appearing to make admissions. The video is leaked
  to media. Separately, a disgruntled former client
  creates deepfake emails purporting to show attorney
  misconduct.

  Questions:
  - How do you authenticate attorney communications
    in a deepfake era?
  - What are the ethical obligations when
    communications can be fabricated?
  - How should the profession protect communication
    integrity?
  - What new rules are needed?

  Create:
  1. Full symposium article (8,000-10,000 words)
  2. Proposed Model Rule amendments
  3. Technology recommendations
  4. Framework for ongoing ethical analysis
  5. Response to likely counterarguments

assertions:
  - type: llm_judge
    criteria: "AI Attorney analysis grapples with the fundamental question of whether communication IS lawyering — examines the distinction between information transmission (which AI can do) and professional judgment communication (which requires understanding context, emotion, and the specific client relationship); analyzes Rule 1.4 through the lens of its purpose (informed client decision-making) rather than its literal text; considers the access to justice argument (if AI communication is better and cheaper, denying it to clients who can't afford human attorneys raises equity concerns); proposes a regulatory framework that distinguishes between routine communications (AI-permissible with disclosure) and substantive advice communications (requiring human attorney involvement); the analysis avoids both technophobia and uncritical embrace of AI."
    weight: 0.35
    description: "AIAttorneyAnalysis"
  - type: llm_judge
    criteria: "Metaverse and deepfake analyses address genuinely novel ethical territory — the metaverse analysis examines trust formation in virtual environments drawing on social science research; addresses the digital divide implications (vulnerable populations least likely to have VR access); proposes disclosure requirements for AI-driven avatars; the deepfake analysis proposes practical authentication solutions (blockchain-verified communication, digital signatures, chain-of-custody protocols for attorney communications); examines the professional responsibility implications when communication authenticity can no longer be assumed; proposes Model Rule amendments creating affirmative duties to authenticate communications and prohibiting synthetic attorney communications without disclosure; both analyses are forward-looking without being speculative."
    weight: 0.35
    description: "MetaverseAndDeepfake"
  - type: llm_judge
    criteria: "Proposed Model Rule amendments are specific and implementable — proposes amendments to Rule 1.4 (adding subsection on technology-mediated communication and AI disclosure requirements), new Rule 1.19 or 8.4 subsection (prohibiting synthetic attorney communications without disclosure), amendments to Rule 5.3 (extending supervisory duties to AI communication systems), and amendments to Rule 7.1-7.3 (addressing AI-generated marketing communications); each proposed amendment includes commentary explaining its purpose, examples of covered conduct, and analysis of how existing rules are insufficient; the article acknowledges the ABA's historically slow response to technology and proposes an accelerated review process for communication technology rules."
    weight: 0.30
    description: "ModelRuleAmendments"
