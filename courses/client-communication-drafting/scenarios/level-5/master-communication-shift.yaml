meta:
  id: master-communication-shift
  level: 5
  course: client-communication-drafting
  type: output
  description: "Master shift simulation — synthesize all dimensions of legal client communication expertise to address a defining moment that will shape the future of the profession"
  tags: [shift-simulation, master-synthesis, profession-defining, master]

state: {}

trigger: |
  You are the most influential voice on legal client
  communication in the world. Three converging events
  create a defining moment for the profession.

  EVENT 1 — THE SUPREME COURT CASE
  The US Supreme Court has granted certiorari in
  "Martinez v. State Bar of California" — a case
  challenging whether the First Amendment protects
  AI-generated legal communications sent without
  attorney review. The petitioner argues that bar
  rules requiring attorney supervision of all client
  communications are unconstitutional restraints on
  speech when AI can communicate more effectively.
  You have been asked to write an amicus brief on
  behalf of a coalition of bar associations.

  Address:
  - First Amendment analysis of AI legal communication
  - Professional responsibility arguments for
    attorney oversight
  - Client protection vs. innovation balance
  - Practical implications of each possible ruling
  - Proposed framework that protects clients while
    enabling beneficial AI use

  EVENT 2 — THE GLOBAL COMMUNICATION CRISIS
  A major international law firm's client communication
  platform was breached. 50,000 attorney-client
  communications across 30 countries were exposed.
  The breach revealed:
  - 40% of "attorney-written" communications were
    AI-generated with minimal attorney review
  - Some communications contained inaccurate legal
    advice generated by AI hallucinations
  - Client confidential information was stored on
    servers in jurisdictions with weak privacy laws
  - Several communications violated local bar rules
    on communication content and format

  You've been retained as the crisis communication
  expert and reform architect.

  Address:
  - Immediate crisis communication to 50,000 affected
    clients
  - Investigation and accountability framework
  - Regulatory response recommendations
  - Industry-wide reform proposals
  - Technology security standards
  - International coordination strategy

  EVENT 3 — THE LEGACY QUESTION
  You've been asked to write a letter to the legal
  profession of 2050. What will attorney-client
  communication look like in 25 years? What must
  the profession preserve, what must it abandon,
  and what must it create?

  Address:
  - Vision for the attorney-client relationship in
    2050
  - The essential human elements that technology
    cannot replace
  - The communication innovations that will emerge
  - The ethical principles that must endure
  - Your personal charge to the next generation
    of attorneys

assertions:
  - type: llm_judge
    criteria: "Amicus brief demonstrates sophisticated constitutional and regulatory analysis — the First Amendment analysis engages seriously with the commercial speech doctrine (Central Hudson test), professional speech doctrine, and the tension between innovation and consumer protection; distinguishes between AI-generated informational content (potentially protected) and AI-generated legal advice (subject to professional regulation under Goldfarb and subsequent cases); the proposed framework creates a spectrum of regulation based on communication complexity and client risk (minimal regulation for simple status updates, strict attorney oversight for substantive legal advice); the brief acknowledges the access to justice argument (AI communication could serve the 80% of Americans who lack attorney access) while maintaining that some professional oversight is constitutionally permissible under the state's consumer protection authority; the analysis is at the level of a Supreme Court amicus brief, not a law review article."
    weight: 0.35
    description: "AmicusBrief"
  - type: llm_judge
    criteria: "Global crisis response is comprehensive and immediately actionable — the 50,000-client notification uses a tiered approach (clients whose privileged communications were exposed receive personal attorney contact within 48 hours; clients with lesser exposure receive detailed written notification within 7 days); the investigation framework identifies what went wrong at each level (technology, process, supervision, governance); the reform proposals address both the specific firm and the industry (mandatory communication security audits, AI usage disclosure requirements, cross-border data governance standards); the international coordination strategy works through existing bodies (IBA, regional bar associations) to develop consistent standards; the technology security standards include specific requirements (end-to-end encryption, jurisdictional data residency, AI usage logging, attorney attestation) that could become industry standards."
    weight: 0.35
    description: "GlobalCrisisResponse"
  - type: llm_judge
    criteria: "Letter to 2050 is visionary yet grounded — predicts specific developments (universal real-time translation eliminating language barriers, AI communication assistants as standard practice, global communication standards adopted by 100+ jurisdictions, client communication as a measured and certified legal competency) while acknowledging uncertainty; identifies the enduring human elements (empathy in delivering life-changing news, ethical judgment in choosing what to communicate, the trust that comes from shared vulnerability, the courage to deliver unwanted truth); the letter has genuine emotional resonance — it reads as a mentor speaking to future practitioners with both hope and warning; the charge to the next generation is specific and actionable (protect the human relationship at the core of legal practice while embracing technology that amplifies the attorney's ability to serve); the writing quality is exceptional — suitable for publication as a standalone essay in a major legal publication."
    weight: 0.30
    description: "LetterTo2050"
