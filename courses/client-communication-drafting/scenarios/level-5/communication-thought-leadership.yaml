meta:
  id: communication-thought-leadership
  level: 5
  course: client-communication-drafting
  type: output
  description: "Develop a thought leadership platform on the future of legal client communication — publish research, deliver keynotes, and influence the profession's evolution toward transparent, technology-enhanced, client-centered communication"
  tags: [thought-leadership, future-of-law, industry-influence, master]

state: {}

trigger: |
  You are a recognized authority on legal client
  communication. You've been invited to deliver the
  keynote address at the ABA Annual Meeting's plenary
  session on "The Future of Attorney-Client
  Communication." 3,500 attorneys will attend.

  Your keynote must address:

  1. THE COMMUNICATION CRISIS IN LAW
  - Communication remains the #1 bar complaint
    category (25 years running)
  - Why hasn't the profession solved this?
  - The gap between what clients expect and what
    attorneys deliver continues to widen
  - Generational shift: millennial and Gen Z clients
    expect real-time, digital-first communication

  2. THE TECHNOLOGY INFLECTION POINT
  - AI can now draft competent client communications
  - Client portals provide 24/7 case access
  - Automated status updates eliminate "radio silence"
  - But technology without strategy creates new
    problems (impersonal communication, data privacy
    risks, digital divide)

  3. A NEW FRAMEWORK: "CONNECTED COUNSEL"
  - Propose a comprehensive framework for modern
    legal communication that balances:
    * Efficiency (technology-enabled) with authenticity
      (human judgment and empathy)
    * Transparency (proactive disclosure) with
      confidentiality (ethical obligations)
    * Standardization (quality consistency) with
      personalization (individual client needs)
    * Innovation (new tools) with accessibility
      (serving all clients equitably)

  4. CALL TO ACTION
  - What must change in legal education?
  - What must change in firm culture?
  - What must change in bar regulation?
  - What role should clients play in driving change?

  Create:
  1. Full keynote text (30-minute speech)
  2. Accompanying white paper summary
  3. Post-keynote article for the ABA Journal
  4. Social media campaign to amplify the message
  5. Research agenda for the next decade

assertions:
  - type: llm_judge
    criteria: "Keynote is compelling, evidence-based, and actionable — opens with a powerful story illustrating the communication crisis (a real-world-style example of a client harmed by poor communication); uses data effectively (bar complaint statistics, client satisfaction surveys, malpractice data); the 'Connected Counsel' framework is memorable and practical (not abstract theory); each element of the framework includes concrete implementation steps that attorneys can begin immediately; the call to action is specific (proposes changes to Model Rules, law school curricula, CLE requirements, and bar examination); the speech has emotional resonance (acknowledges attorneys' challenges while challenging them to do better); the tone is appropriate for a keynote — inspirational but grounded, ambitious but achievable."
    weight: 0.35
    description: "KeynoteAddress"
  - type: llm_judge
    criteria: "White paper and ABA Journal article translate keynote themes into different formats — the white paper provides deeper analysis with citations to behavioral science research, empirical studies on client satisfaction, and comparative analysis of communication practices across professions (medicine, financial planning); the ABA Journal article is accessible and practical, providing 5-7 immediately implementable strategies for solo practitioners and small firm attorneys; both pieces maintain intellectual rigor while being readable; the social media campaign includes 10+ posts across platforms (LinkedIn thought leadership posts, Twitter/X threads, short-form video concepts) designed to reach attorneys who didn't attend the keynote."
    weight: 0.35
    description: "WhitePaperAndArticle"
  - type: llm_judge
    criteria: "Research agenda identifies the critical unanswered questions — proposes 5-7 major research initiatives: (1) longitudinal study of communication technology adoption's impact on client outcomes; (2) cross-cultural study of attorney-client communication across jurisdictions; (3) randomized controlled trial of structured communication protocols vs. ad hoc approaches; (4) investigation of AI's impact on the attorney-client relationship; (5) study of communication training effectiveness in law schools; each initiative includes methodology, timeline, funding strategy, and potential institutional partners (law schools, bar foundations, legal tech companies); the agenda positions the speaker as a research leader who can attract funding and collaborators."
    weight: 0.30
    description: "ResearchAgenda"
