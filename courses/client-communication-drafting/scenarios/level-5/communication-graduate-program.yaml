meta:
  id: communication-graduate-program
  level: 5
  course: client-communication-drafting
  type: output
  description: "Design a graduate-level academic program in legal client communication — create curriculum, pedagogy, and research infrastructure for an emerging academic discipline"
  tags: [academic-program, curriculum-design, legal-education, master]

state: {}

trigger: |
  A top-20 law school has invited you to design and
  direct a new graduate program: the LL.M. in Legal
  Client Communication & Professional Relationships.
  This is the first program of its kind globally.

  PROGRAM PARAMETERS:
  - 30-credit LL.M. (one academic year or two years
    part-time)
  - Target enrollment: 25 students per cohort
  - Students: practicing attorneys (5+ years), law
    firm administrators, legal tech professionals,
    bar regulators
  - Budget: $2M startup, $800K annual operating
  - Must be self-sustaining by Year 3 through tuition,
    executive education, and research grants

  CURRICULUM MUST COVER:
  1. Theoretical foundations (communication theory,
     behavioral science, professional responsibility)
  2. Applied skills (drafting, technology, crisis
     communication, cross-cultural communication)
  3. Research methods (empirical legal studies,
     survey design, data analysis)
  4. Leadership and organizational change
  5. Capstone project (original research or practice
     innovation)

  ADDITIONAL DELIVERABLES:
  - Faculty recruitment plan (6 FTE needed)
  - Executive education offerings (revenue stream)
  - Research center design (funding and output targets)
  - Advisory board composition
  - Accreditation pathway
  - Student recruitment strategy
  - Alumni placement and career outcomes

  Create:
  1. Complete curriculum with course descriptions
  2. Faculty recruitment and development plan
  3. Research center design and funding strategy
  4. Executive education catalog
  5. Five-year strategic plan with financial projections

assertions:
  - type: llm_judge
    criteria: "Curriculum is intellectually rigorous and practically relevant — required courses build from theory (Communication Theory for Legal Professionals, Behavioral Science of Client Decision-Making, Ethics of Professional Communication) through application (Advanced Legal Drafting Workshop, Technology-Mediated Communication, Cross-Cultural Legal Communication) to leadership (Leading Communication Transformation, Communication Program Design and Measurement); elective courses allow specialization (AI and Legal Communication, Health Law Communication, International Arbitration Communication); the capstone requires either original empirical research or a documented practice innovation implemented at the student's organization; assessment methods go beyond traditional law school exams to include simulations, portfolio development, and peer review."
    weight: 0.35
    description: "CurriculumDesign"
  - type: llm_judge
    criteria: "Faculty plan and research center are credible — identifies the interdisciplinary expertise needed (legal scholars specializing in professional responsibility, communication scholars with legal expertise, behavioral scientists, technology specialists, practitioners with communication consulting experience); recruitment strategy addresses the challenge that this is a new field with few established scholars by combining lateral hires, post-doctoral fellowships, and practitioner-scholars; the research center has a focused mission (improving legal client outcomes through evidence-based communication) with 3-year targets for publications, grants, and practice impact; funding strategy includes foundation grants (Open Society, Ford Foundation's access to justice programs), law firm sponsorships, and government research contracts."
    weight: 0.35
    description: "FacultyAndResearch"
  - type: llm_judge
    criteria: "Financial model achieves self-sustainability — five-year projections show revenue sources: LL.M. tuition ($60K-80K per student × 25 = $1.5M-2M), executive education ($300K-500K annually from 2-day programs for law firm leaders), research grants ($200K-400K), and consulting revenue ($100K-200K); expenses include faculty salaries (6 FTE at competitive rates), staff (3 FTE), technology and facilities, marketing, and student support; break-even analysis shows sustainability achievable by Year 3 with 80% enrollment targets; executive education catalog includes 5-8 programs (Communication Audit for Law Firms, AI Communication Ethics, Client Experience Design, Crisis Communication for Legal Leaders) priced competitively with comparable executive legal education."
    weight: 0.30
    description: "FinancialModel"
