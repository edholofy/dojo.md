meta:
  id: communication-technology-unicorn
  level: 5
  course: client-communication-drafting
  type: output
  description: "Design a legal communication technology product from concept to market leadership — create a comprehensive business plan for a SaaS platform that transforms how law firms communicate with clients"
  tags: [technology-product, startup, legal-tech, master]

state: {}

trigger: |
  You are the founder and CEO of "ClientBridge" — a
  legal communication technology startup. You've
  raised a $5M Series A and need to build the
  product that will transform legal client
  communication.

  MARKET OPPORTUNITY:
  - 450,000 law firms in the US alone
  - Average firm spends $0 on dedicated client
    communication technology
  - Client communication is the #1 bar complaint
  - No dominant platform exists (fragmented market:
    Clio, MyCase, and others touch communication
    tangentially but none focus on it)
  - Law firms are 10 years behind other professional
    services in client communication technology

  PRODUCT VISION:
  ClientBridge is the first platform purpose-built
  for legal client communication. It's not a case
  management system with communication features —
  it's a communication platform with legal workflow
  integration.

  CORE CAPABILITIES:
  1. Smart Communication Engine
  - AI-assisted drafting with legal-specific
    training
  - Template library with firm customization
  - Automated status updates triggered by case
    milestones
  - Multi-channel delivery (email, portal, SMS,
    secure messaging)

  2. Client Experience Layer
  - Client-facing portal with case timeline
  - Document sharing with e-signature
  - Secure messaging with attorney
  - Automated appointment scheduling
  - Satisfaction pulse surveys

  3. Compliance & Analytics
  - Communication audit trail (Rule 1.4 compliance)
  - Response time tracking and SLA monitoring
  - Client satisfaction analytics
  - Bar complaint risk scoring
  - Malpractice prevention alerts

  4. AI Intelligence
  - Sentiment analysis of client communications
  - Communication quality scoring
  - Predictive analytics (which clients are at
    risk of complaints?)
  - Natural language case status summaries

  Create:
  1. Complete product specification
  2. Go-to-market strategy
  3. Competitive analysis and positioning
  4. 3-year financial model
  5. Technical architecture overview

assertions:
  - type: llm_judge
    criteria: "Product specification demonstrates deep understanding of legal communication needs — features are designed around actual attorney workflows rather than generic CRM concepts; the AI drafting engine is trained on legal communication patterns (not general business writing); template customization allows firm-specific language, tone, and branding while maintaining compliance with jurisdiction-specific rules; the automated status update system connects to popular case management platforms (Clio, PracticePanther, Filevine) via API to trigger communications at case milestones; the compliance layer tracks Rule 1.4 requirements by jurisdiction and alerts attorneys when communication gaps exceed regulatory thresholds; the product roadmap shows a phased approach (MVP → growth → enterprise) with clear feature prioritization."
    weight: 0.35
    description: "ProductSpecification"
  - type: llm_judge
    criteria: "Go-to-market strategy addresses the unique challenges of selling to law firms — recognizes that law firms are notoriously slow technology adopters and plans accordingly; the sales strategy targets firms experiencing communication pain points (recent malpractice claims, bar complaints, client attrition) rather than technology-forward firms; pricing model is accessible to small firms (freemium or low-cost tier for firms under 5 attorneys, per-attorney pricing for larger firms); distribution strategy includes bar association partnerships, malpractice insurer referral programs, and CLE integration (attorneys earn CLE credit for completing communication training within the platform); the marketing strategy uses case studies, ROI calculators, and compliance messaging rather than feature-focused advertising."
    weight: 0.35
    description: "GoToMarketStrategy"
  - type: llm_judge
    criteria: "Financial model is realistic for a legal tech startup — Year 1 focuses on product development and initial customer acquisition (50-100 firms); Year 2 targets growth (500-1,000 firms) with revenue reaching $1-2M ARR; Year 3 targets scale (2,500-5,000 firms) with revenue reaching $5-10M ARR; customer acquisition cost accounts for the long sales cycle in legal (3-6 months); churn assumptions reflect the stickiness of communication platforms (once integrated, hard to switch); the model includes realistic assumptions about average revenue per firm by segment (solo: $50-100/month, small: $200-500/month, mid-size: $1,000-3,000/month, large: $5,000-15,000/month); technical architecture uses modern cloud-native design with particular attention to data security and client confidentiality requirements (SOC 2, HIPAA-adjacent security, data encryption at rest and in transit)."
    weight: 0.30
    description: "FinancialModel"
