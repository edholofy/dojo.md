meta:
  id: communication-memoir
  level: 5
  course: client-communication-drafting
  type: output
  description: "Write a professional memoir exploring how client communication shaped a legal career — create a narrative that illuminates the human dimension of attorney-client relationships through three decades of practice"
  tags: [memoir, professional-narrative, career-reflection, master]

state: {}

trigger: |
  Write a professional memoir chapter titled
  "Words That Mattered: How Client Communication
  Shaped My Legal Career."

  AUTHOR CONTEXT:
  You are a senior litigation partner retiring after
  32 years of practice. You've handled thousands of
  cases, from small-claims court to the Supreme Court.
  Your career arc: public defender (5 years) → legal
  aid attorney (3 years) → small firm associate
  (4 years) → partner at a mid-size firm (20 years).

  MEMOIR ELEMENTS TO INCLUDE:

  1. THE DEFINING FAILURE (Year 3)
  As a public defender, you failed to adequately
  communicate a plea offer to a client. The client
  rejected the plea without understanding the
  consequences, went to trial, and received a
  sentence three times longer. The client's mother
  confronted you in the courthouse hallway. This
  moment changed everything about how you practice.

  2. THE TRANSFORMATIVE CLIENT (Year 12)
  An elderly Vietnamese immigrant client who spoke
  almost no English taught you more about
  communication than law school ever did. Through
  an interpreter, over dozens of meetings, you
  learned that effective communication isn't about
  words — it's about patience, respect, and truly
  understanding what the client needs to know.

  3. THE TECHNOLOGY RECKONING (Year 25)
  Your firm implemented a client portal. You resisted
  initially ("I didn't go to law school to send
  text messages"), then discovered that technology
  could enhance rather than replace personal
  connection. A client who'd been frustrated by
  unreturned calls became your strongest referral
  source after the portal gave them 24/7 access to
  case information.

  4. THE MENTORING LEGACY (Year 30)
  A young associate you mentored won a communication
  award. In her acceptance speech, she credited your
  teaching: "Every email is a relationship. Every
  letter is a promise. Every silence is an answer."
  You realized your greatest contribution wasn't
  cases won but communication culture built.

  5. LESSONS DISTILLED
  What you wish you'd known at the start. What you'd
  tell every new lawyer. What the profession gets
  wrong about communication.

  Create:
  1. Full memoir chapter (5,000-7,000 words)
  2. Reflection questions for CLE presentation
  3. Teaching guide for law school seminar use
  4. Op-ed adaptation for legal publication

assertions:
  - type: llm_judge
    criteria: "Memoir chapter is genuinely moving and instructive — the defining failure scene is vivid and emotionally honest (the mother's words, the courtroom atmosphere, the sleepless nights that followed); the Vietnamese immigrant client story avoids both sentimentality and cultural stereotyping while conveying authentic lessons about cross-cultural communication; the technology section captures the generational tension authentically (initial resistance, gradual acceptance, eventual advocacy); the mentoring legacy provides a satisfying narrative arc (failure → learning → mastery → transmission); the writing style is literary rather than legalistic — showing rather than telling, using specific sensory details and dialogue rather than abstract principles; the memoir is suitable for publication in a legal journal or general-interest legal publication."
    weight: 0.35
    description: "MemoirChapter"
  - type: llm_judge
    criteria: "Lessons distilled are profound without being preachy — extracts 7-10 principles from the career narrative that go beyond conventional advice; examples: 'The most important communication is the one you didn't send' (about restraint and timing); 'Your client's silence doesn't mean agreement — it means they've stopped trusting you enough to disagree' (about reading non-verbal cues); 'Technology is a hearing aid, not a voice — it amplifies your communication, it doesn't replace it' (about the technology relationship); each lesson is grounded in a specific story from the memoir, making it memorable and credible; the overall message is that communication is the practice of law, not a soft skill adjacent to it."
    weight: 0.35
    description: "LessonsDistilled"
  - type: llm_judge
    criteria: "Teaching materials make the memoir pedagogically useful — CLE reflection questions prompt attorneys to examine their own communication practices (not just discuss the author's); the law school teaching guide includes discussion questions, role-play exercises based on the memoir's scenarios, and a communication self-assessment; the op-ed adaptation condenses the memoir's themes into a 1,200-word argument for why communication should be treated as a core legal competency (not an elective skill); all materials reference current professional responsibility rules and connect personal narrative to systemic issues."
    weight: 0.30
    description: "TeachingMaterials"
