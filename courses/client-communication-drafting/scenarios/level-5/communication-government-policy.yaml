meta:
  id: communication-government-policy
  level: 5
  course: client-communication-drafting
  type: output
  description: "Develop government policy recommendations for improving legal client communication — create a policy framework addressing the communication crisis in the legal profession through regulation, funding, and systemic reform"
  tags: [government-policy, regulatory-reform, systemic-change, master]

state: {}

trigger: |
  The US Department of Justice, Office for Access to
  Justice, has commissioned you to develop policy
  recommendations for improving legal client
  communication nationwide. Your report will inform
  federal policy, congressional testimony, and grant
  programs.

  POLICY CONTEXT:
  - Communication failure is the #1 driver of bar
    complaints in 48 states
  - An estimated 80% of legal malpractice claims
    involve communication breakdowns
  - The access to justice gap means millions of
    Americans lack any attorney communication at all
  - Legal aid organizations are overwhelmed — one
    attorney for every 6,000 eligible clients in
    some states
  - Technology could help but adoption is uneven
    and unregulated
  - No federal standards exist for attorney-client
    communication quality

  REPORT MUST ADDRESS:

  1. THE SCOPE OF THE PROBLEM
  - National data on communication complaints,
    malpractice claims, and client satisfaction
  - Disparate impact on underserved communities
  - Economic cost of communication failures
    (malpractice payouts, bar discipline costs,
    case outcomes affected)
  - Comparison with other regulated professions
    (medicine, financial services)

  2. POLICY RECOMMENDATIONS
  - Federal funding for communication technology
    in legal aid
  - CLE requirements focused on communication skills
  - Law school accreditation standards for
    communication training
  - Model legislation for client communication
    rights
  - Technology standards and certification
  - Research funding priorities

  3. IMPLEMENTATION FRAMEWORK
  - Federal vs. state responsibilities
  - Funding mechanisms (appropriations, fee-funded
    programs, public-private partnerships)
  - Timeline for implementation
  - Pilot programs and evaluation
  - Stakeholder engagement strategy

  Create:
  1. Complete policy report (executive summary +
     detailed recommendations)
  2. Draft congressional testimony
  3. Proposed legislation outline
  4. Grant program design for 3 pilot programs
  5. Stakeholder coalition strategy

assertions:
  - type: llm_judge
    criteria: "Policy report is evidence-based and politically viable — uses data from ABA surveys, state bar complaint databases, malpractice insurer data, and client satisfaction research to quantify the problem; recommendations are achievable within the current political landscape (avoids proposals requiring constitutional amendments or radical restructuring); federal funding recommendations are tied to existing programs (LSC funding, DOJ grant programs, Title IV of the Higher Education Act for law school standards); the report acknowledges the tension between federal policy and state regulation of attorneys and proposes collaborative approaches (model rules, incentive-based adoption, conditional funding); economic analysis demonstrates that prevention through better communication is cheaper than the current cost of communication failures (malpractice insurance, disciplinary proceedings, case reopenings)."
    weight: 0.35
    description: "PolicyReport"
  - type: llm_judge
    criteria: "Congressional testimony is persuasive and accessible — opens with a compelling case example that illustrates the human cost of communication failure; presents data concisely (3-5 key statistics that frame the problem's magnitude); connects legal communication to broader congressional priorities (access to justice, consumer protection, technology policy, equity); specific funding requests are reasonable and well-justified ($50M for legal aid communication technology grants, $10M for research, $5M for pilot programs); the testimony anticipates likely questions from both parties and prepares responses; proposed legislation includes a bill name, key provisions, and enforcement mechanisms that work within existing regulatory structures (conditions on LSC funding, ABA accreditation standards, federal court communication requirements)."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "Grant program designs are implementable and measurable — three pilot programs target different aspects: (1) Technology for Legal Aid ($15M over 3 years, competitive grants to 20 legal aid organizations to implement client communication platforms with evaluation); (2) Law School Communication Training ($5M over 2 years, grants to 10 law schools to develop and test communication skills curricula with outcomes tracked into early career); (3) Communication Quality Initiative ($10M over 3 years, grants to 5 state bars to implement communication quality monitoring systems with malpractice and complaint outcome tracking); each program includes eligibility criteria, application process, evaluation methodology (randomized controlled trials where feasible), reporting requirements, and sustainability plans beyond the grant period; the overall strategy includes a stakeholder coalition (ABA, AALS, legal aid organizations, malpractice insurers, legal tech companies, client advocacy groups) with specific roles for each."
    weight: 0.30
    description: "GrantProgramDesign"
