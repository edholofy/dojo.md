meta:
  id: global-communication-standards
  level: 5
  course: client-communication-drafting
  type: output
  description: "Develop international standards for legal client communication — create a cross-jurisdictional framework adopted by bar associations, law societies, and international legal organizations worldwide"
  tags: [international-standards, cross-jurisdictional, global-governance, master]

state: {}

trigger: |
  The International Bar Association (IBA) has
  commissioned you to develop the first-ever
  International Standards for Legal Client
  Communication. These standards will be recommended
  for adoption by bar associations and law societies
  in 190+ countries.

  CONTEXT:
  - No international standard currently exists
  - Communication requirements vary dramatically
    across jurisdictions (US Model Rules, UK SRA
    Standards, EU directives, Asian regulatory
    frameworks)
  - Cross-border legal work is increasing, creating
    confusion about which communication standards
    apply
  - Technology has made cross-border communication
    instantaneous but raised new privacy and
    regulatory concerns
  - Client expectations are converging globally
    due to digital platforms

  STANDARDS MUST ADDRESS:

  1. CORE PRINCIPLES (universal, applicable everywhere)
  - Timeliness of communication
  - Clarity and comprehensibility
  - Transparency about fees and progress
  - Client autonomy in decision-making
  - Confidentiality and data protection
  - Accessibility and non-discrimination

  2. IMPLEMENTATION TIERS
  - Tier 1: Minimum standards (all jurisdictions)
  - Tier 2: Enhanced standards (developed legal
    markets)
  - Tier 3: Excellence standards (aspirational best
    practices)

  3. CROSS-BORDER PROTOCOLS
  - Which jurisdiction's standards apply in multi-
    jurisdictional matters?
  - Data transfer and privacy compliance
  - Language and translation requirements
  - Technology platform standards

  4. ENFORCEMENT AND CERTIFICATION
  - Self-assessment tools for law firms
  - Third-party certification programs
  - Complaint mechanisms for clients
  - Continuous improvement requirements

  Create:
  1. Complete standards document (IBA format)
  2. Implementation guide for national bar associations
  3. Self-assessment toolkit for law firms
  4. Client rights charter (multilingual template)
  5. Monitoring and evaluation framework

assertions:
  - type: llm_judge
    criteria: "Standards document achieves the balance between universality and local applicability — core principles are stated at a level of generality that accommodates diverse legal traditions (common law, civil law, Islamic law, customary law) while providing meaningful guidance; the three-tier implementation structure allows developing jurisdictions to adopt minimum standards while providing a roadmap toward excellence; cross-border protocols resolve conflicts of law in communication standards using a 'highest applicable standard' approach tempered by local regulatory requirements; the document references existing international instruments (UN Basic Principles on the Role of Lawyers, IBA Standards for the Independence of the Legal Profession) and builds upon rather than duplicates them."
    weight: 0.35
    description: "StandardsDocument"
  - type: llm_judge
    criteria: "Implementation guide provides practical adoption pathways — addresses the political reality that bar associations are sovereign and cannot be compelled to adopt standards; proposes voluntary adoption with incentives (IBA certification, reciprocity agreements, client confidence markers); includes model legislation/rules that bar associations can adapt to their regulatory frameworks; provides timeline for phased adoption (Year 1: awareness and consultation, Year 2: pilot in 10 jurisdictions, Year 3-5: broad adoption); addresses resistance factors (sovereignty concerns, resource limitations, cultural differences) with specific strategies; includes case studies of successful international standard adoption in other professions (medicine: WHO standards, accounting: IFRS)."
    weight: 0.35
    description: "ImplementationGuide"
  - type: llm_judge
    criteria: "Self-assessment toolkit and client rights charter are immediately usable — the toolkit provides a scored rubric (100-point scale) covering all core principles with specific indicators for each tier; law firms can complete the assessment in under 2 hours; results generate an improvement roadmap with prioritized actions; the client rights charter is written in plain language accessible to non-lawyers, available as a template in 6+ UN languages, and can be displayed in law firm reception areas and on websites; the monitoring framework includes both quantitative metrics (complaint rates, response times, client satisfaction scores) and qualitative measures (client interviews, peer review)."
    weight: 0.30
    description: "ToolkitAndCharter"
