meta:
  id: engagement-letter-drafting
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a client engagement letter — define the scope of representation, fee arrangement, responsibilities of both parties, and termination provisions in a clear and comprehensive engagement agreement"
  tags: [engagement-letter, fee-agreement, scope-of-work, beginner]

state: {}

trigger: |
  Draft an engagement letter for a new client
  retaining your firm for a business contract
  dispute.

  FIRM: Anderson & Park LLP
  ATTORNEY: James Anderson, Partner
  CLIENT: TechStart Solutions Inc.
  CONTACT: CEO, David Kim

  MATTER:
  TechStart contracted with WebDev Corp. to build
  a custom e-commerce platform for $150,000.
  WebDev delivered a product that doesn't meet
  specifications, is 4 months late, and has
  significant bugs. TechStart has paid $100,000
  so far and is withholding the final $50,000.
  WebDev is threatening to sue for the balance.

  FEE ARRANGEMENT:
  - Hourly billing
  - Partner rate: $450/hour
  - Associate rate: $300/hour
  - Paralegal rate: $150/hour
  - Initial retainer: $10,000
  - Monthly billing with net-30 payment terms
  - Retainer replenished when balance drops below
    $2,500

  SCOPE OF REPRESENTATION:
  - Evaluate contract and WebDev's performance
  - Respond to any demand from WebDev
  - Negotiate resolution if possible
  - File breach of contract lawsuit if negotiation
    fails
  - Representation does NOT include appeals or
    collections

  ADDITIONAL TERMS:
  - Client responsible for providing all relevant
    documents and communications
  - Either party may terminate with 30 days written
    notice
  - Firm reserves right to withdraw if bills unpaid
    for 60+ days
  - Client consents to electronic communication

  Draft the engagement letter.

assertions:
  - type: llm_judge
    criteria: "Engagement letter clearly defines scope and limitations — specifies exactly what the firm will handle (contract evaluation, demand response, negotiation, litigation if needed) and explicitly states what is excluded (appeals, collections); the scope is specific enough to prevent scope creep but flexible enough to cover foreseeable developments; the limitation on scope protects both the firm (from unbounded representation) and the client (by setting clear expectations); the letter explains that additional scope would require a separate agreement."
    weight: 0.35
    description: "ScopeDefinition"
  - type: llm_judge
    criteria: "Fee arrangement is transparent and complete — lists all billing rates (partner, associate, paralegal) with specific dollar amounts; explains the $10,000 retainer, how it will be applied, and the $2,500 replenishment threshold; specifies monthly billing cycle and net-30 payment terms; addresses what happens if bills are unpaid for 60+ days (firm's right to withdraw); discloses anticipated costs beyond attorney fees (filing fees, service costs, expert fees if applicable); the fee section is written in plain language that a business client can understand."
    weight: 0.35
    description: "FeeTransparency"
  - type: llm_judge
    criteria: "Letter includes essential professional responsibility protections — contains termination provisions (30 days written notice by either party); addresses electronic communication consent; includes conflict check confirmation; explains duty of confidentiality; addresses document preservation obligations; the letter is formatted as a professional business letter that the client signs and returns; the signature block includes a space for the client's acknowledgment and date; the letter complies with state bar requirements for engagement letter content."
    weight: 0.30
    description: "ProfessionalResponsibility"
