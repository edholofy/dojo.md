meta:
  id: status-update-email
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a client status update email — communicate case progress, upcoming deadlines, and next steps in clear, professional language that keeps the client informed without unnecessary legal jargon"
  tags: [status-update, email-drafting, client-communication, beginner]

state: {}

trigger: |
  Draft a status update email to a client about
  their personal injury case.

  CLIENT: Maria Gonzalez
  CASE: Auto accident, rear-ended at stoplight
  DATE OF ACCIDENT: October 12, 2024
  ATTORNEY: You (associate at Smith & Associates)

  CURRENT STATUS:
  - Client completed treatment (physical therapy
    for whiplash) on January 15, 2025
  - Medical records have been collected from:
    City Hospital ER, Dr. Chen (orthopedist),
    Valley Physical Therapy
  - Total medical bills: $28,450
  - Still waiting for final billing statement from
    Valley Physical Therapy
  - Demand letter will be sent to defendant's
    insurance (State Farm) once all records are in
  - Client's health insurance (Blue Cross) has a
    subrogation lien of $12,200 that will need to
    be negotiated

  CLIENT CONCERNS (from last phone call):
  - "How long will this take?"
  - "Will I get enough to cover all my bills?"
  - "My friend's case took 3 years — will mine?"

  DRAFT REQUIREMENTS:
  - Professional but warm tone
  - Avoid promising specific outcomes or timelines
  - Explain next steps clearly
  - Address her concerns without making guarantees
  - Use plain language (client is not a lawyer)
  - Include a call to action (what she needs to do)

assertions:
  - type: llm_judge
    criteria: "Email uses plain language and warm professional tone — avoids legal jargon or explains terms when used (subrogation lien is explained in simple terms like 'your health insurance's right to be repaid'); addresses Maria by name; acknowledges her concerns from the last phone call without making promises about timelines or outcomes; uses phrases like 'we expect' or 'typically' rather than guarantees; the tone conveys competence and empathy without being overly casual or overly formal."
    weight: 0.35
    description: "ToneAndLanguage"
  - type: llm_judge
    criteria: "Status update is complete and well-organized — covers all key information: treatment completion, medical records collected (lists providers), total bills to date, pending items (Valley PT final billing), next steps (demand letter to State Farm), and the subrogation lien that will need negotiation; the email is structured logically (current status → pending items → next steps → what client needs to do); information flows naturally without overwhelming the reader; key dates and dollar amounts are included for the client's records."
    weight: 0.35
    description: "StatusUpdateCompleteness"
  - type: llm_judge
    criteria: "Email manages expectations appropriately — addresses the 'how long' question with realistic framing (each case is different, typically X months for negotiation phase, litigation if needed could take longer) without specific time promises; addresses the 'will I get enough' concern by explaining the process (demand → negotiation → lien negotiation → net recovery) without guaranteeing amounts; avoids comparing to the friend's case; includes a clear call to action (contact Valley PT for final bill, or notify attorney of any changes); professional responsibility is maintained throughout (no outcome guarantees per Model Rule 1.4)."
    weight: 0.30
    description: "ExpectationManagement"
