meta:
  id: demand-letter-basic
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a basic demand letter — state the client's claim, summarize the facts, assert legal theories, and make a specific monetary demand with a deadline for response"
  tags: [demand-letter, pre-litigation, collections, beginner]

state: {}

trigger: |
  Draft a demand letter on behalf of a client
  seeking payment for unpaid invoices.

  CLIENT: Creative Design Studio LLC
  CONTACT: Owner, Sarah Chen
  DEBTOR: Luxe Hotels Group Inc.
  CONTACT: CFO, Michael Torres

  FACTS:
  - Creative Design Studio designed marketing
    materials for Luxe Hotels' new boutique hotel
    launch
  - Contract signed March 1, 2024
  - Deliverables: logo design, website mockups,
    brochure design, social media templates
  - All deliverables completed and approved by
    Luxe Hotels by June 15, 2024
  - Contract price: $45,000
  - Payment terms: 50% upon signing ($22,500 — PAID),
    50% upon delivery ($22,500 — UNPAID)
  - Invoice #1042 sent June 15, 2024 for $22,500
  - Reminder sent July 15, 2024
  - Second reminder sent August 15, 2024
  - Phone call September 10, 2024 — Michael Torres
    acknowledged debt but said "cash flow is tight,
    we'll pay next month"
  - No payment received as of February 2025

  ADDITIONAL FACTS:
  - Contract includes 1.5% monthly interest on late
    payments
  - Contract includes attorney's fees provision
    (prevailing party)
  - Luxe Hotels is actively using all delivered
    materials in their marketing

  DEMAND:
  - Principal: $22,500
  - Interest: $22,500 × 1.5% × 8 months = $2,700
  - Total demand: $25,200
  - Response deadline: 15 business days
  - Warn that litigation will follow if no payment

  Draft the demand letter.

assertions:
  - type: llm_judge
    criteria: "Demand letter states the claim clearly and persuasively — opens by identifying the parties and the contractual relationship; summarizes the key facts chronologically (contract → delivery → approval → non-payment → reminders → acknowledgment of debt); cites specific contract provisions (payment terms, interest clause, attorney's fees provision); the letter is factual and professional without being hostile or threatening; the tone is firm but leaves room for resolution; the letter demonstrates that Creative Design Studio has been reasonable and patient."
    weight: 0.35
    description: "ClaimStatement"
  - type: llm_judge
    criteria: "Monetary demand is specific and well-supported — breaks down the total demand: $22,500 principal (referencing Invoice #1042 and the 50% upon delivery contract term), $2,700 in accrued interest (citing the 1.5% monthly interest provision and calculating 8 months), for a total of $25,200; notes that interest continues to accrue; references the attorney's fees provision that would increase costs if litigation becomes necessary; the calculation is transparent and verifiable from the stated facts."
    weight: 0.35
    description: "MonetaryDemand"
  - type: llm_judge
    criteria: "Letter includes appropriate deadline and consequences — sets a specific 15-business-day response deadline from the date of the letter; clearly states that if payment is not received or a satisfactory payment arrangement is not made within the deadline, the firm will recommend that the client pursue all available legal remedies including filing a breach of contract lawsuit; mentions that litigation would increase costs to the debtor (attorney's fees provision, continued interest, court costs); the letter is not an ultimatum but a professional communication that preserves the possibility of negotiated resolution."
    weight: 0.30
    description: "DeadlineAndConsequences"
