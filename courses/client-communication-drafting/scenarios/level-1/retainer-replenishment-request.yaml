meta:
  id: retainer-replenishment-request
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a retainer replenishment request — communicate to the client that their retainer balance is low, explain the work performed, and request additional funds while maintaining the client relationship"
  tags: [billing, retainer, fee-communication, beginner]

state: {}

trigger: |
  Draft a retainer replenishment request to a
  client whose retainer balance has dropped below
  the minimum threshold.

  CLIENT: Thompson Family Trust
  TRUSTEE: William Thompson
  MATTER: Estate administration — probate of
  Margaret Thompson's estate
  YOUR FIRM: Baker & Associates

  ENGAGEMENT TERMS:
  - Initial retainer: $15,000
  - Partner rate: $400/hour
  - Associate rate: $275/hour
  - Paralegal rate: $125/hour
  - Replenishment trigger: balance below $3,000
  - Required replenishment: $10,000

  CURRENT STATUS:
  - Retainer deposited: $15,000
  - Total billed to date: $13,250
  - Current balance: $1,750

  WORK PERFORMED (last billing period):
  - 4 hours Partner: Hearing on petition for probate
    ($1,600)
  - 6 hours Associate: Inventory and appraisal of
    estate assets ($1,650)
  - 8 hours Paralegal: Creditor notification process,
    publication of notice ($1,000)
  - Total this period: $4,250

  UPCOMING WORK:
  - Federal estate tax return preparation (complex;
    estate exceeds exemption amount)
  - Real property transfers (2 properties)
  - Settlement of creditor claims
  - Distribution to beneficiaries
  - Final accounting and petition for distribution

  Draft the retainer replenishment request.

assertions:
  - type: llm_judge
    criteria: "Request is professional and relationship-preserving — frames the replenishment as a normal part of the engagement (per the engagement letter terms) rather than a demand for money; acknowledges the work completed and progress made; the tone conveys that the estate administration is progressing well and the additional funds will support important upcoming work; avoids creating anxiety or suggesting billing problems; maintains the trustee's confidence in the firm's stewardship of estate resources."
    weight: 0.35
    description: "ProfessionalTone"
  - type: llm_judge
    criteria: "Billing transparency is complete — itemizes work performed this billing period by professional (partner, associate, paralegal) with hours and amounts; shows the retainer balance calculation (deposited minus billed equals current balance of $1,750); references the engagement letter's $3,000 threshold and $10,000 replenishment requirement; provides a summary of upcoming work to justify the continued investment; the trustee can see exactly where the money went and understand why more is needed."
    weight: 0.35
    description: "BillingTransparency"
  - type: llm_judge
    criteria: "Request includes practical next steps and context — explains what upcoming work items the replenishment will cover (estate tax return, property transfers, creditor settlements, distributions); provides context about the stage of the probate process (moving from inventory/appraisal phase to distribution phase); includes payment instructions or references the prior payment method; sets a reasonable deadline for the replenishment; offers to discuss billing questions or the upcoming work plan; the letter fulfills the Model Rule 1.5 requirement to communicate fee information clearly."
    weight: 0.30
    description: "PracticalNextSteps"
