meta:
  id: referral-decline-letter
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a referral and decline letter — professionally decline representation while providing a referral to appropriate counsel and ensuring the potential client's interests are protected"
  tags: [decline-letter, referral, non-engagement, beginner]

state: {}

trigger: |
  Draft a decline letter with referral for a
  potential client whose case your firm cannot
  accept.

  POTENTIAL CLIENT: Carlos Reyes
  CONSULTATION DATE: February 15, 2025
  ATTORNEY: You

  CASE SUMMARY:
  Carlos was involved in a workplace accident at a
  construction site on January 10, 2025. A beam
  fell on his leg, breaking it in two places. He
  had surgery and will need 6 months of physical
  therapy. He believes the general contractor
  (BuildAll Inc.) was negligent in failing to
  secure the beam.

  WHY DECLINING:
  - Your firm represents BuildAll Inc. in other
    matters (conflict of interest)
  - You identified the conflict during intake
  - You did NOT provide any legal advice during
    the consultation beyond basic information

  REFERRAL:
  - Recommend 3 construction accident attorneys:
    1. Martinez & Lee LLP (experienced in
       construction injury; 555-0101)
    2. The Wilson Law Group (former OSHA attorney;
       555-0102)
    3. Pacific Workers' Comp Attorneys (if workers'
       comp route preferred; 555-0103)

  IMPORTANT:
  - Workers' compensation deadline: must file
    within 30 days of injury (by February 9, 2025
    — THIS MAY HAVE ALREADY PASSED)
  - Third-party negligence claim: statute of
    limitations is 2 years
  - Carlos needs to act quickly

  Draft the decline letter with referral and
  deadline warnings.

assertions:
  - type: llm_judge
    criteria: "Decline letter clearly states no attorney-client relationship was formed — explicitly states that the firm is not representing Carlos, no legal advice was provided, and the firm cannot take the case due to a conflict of interest (without disclosing the identity of the conflicting client, which is itself confidential); the letter avoids any language that could create an implied attorney-client relationship; the letter is clear that the referrals are not endorsements and Carlos should evaluate each attorney independently."
    weight: 0.35
    description: "ClearDecline"
  - type: llm_judge
    criteria: "Deadline warnings are prominent and urgent — the workers' compensation 30-day deadline (potentially already passed by February 9) is flagged prominently with appropriate urgency; the 2-year statute of limitations for the third-party negligence claim is noted; the letter urges Carlos to contact one of the referred attorneys immediately given the time sensitivity; the deadline information protects the firm from potential liability for failure to warn about limitations periods; the letter makes clear these are general deadlines and actual deadlines depend on specific facts that a retained attorney should evaluate."
    weight: 0.35
    description: "DeadlineWarnings"
  - type: llm_judge
    criteria: "Referrals are presented professionally and helpfully — provides 3 attorney referrals with names, brief descriptions of their relevant experience, and phone numbers; acknowledges that Carlos may also contact the local bar association referral service; the letter is compassionate toward Carlos's situation even while declining; the tone conveys that the firm takes his potential claim seriously even though it cannot represent him; the letter does not guarantee that the referred attorneys will accept the case or achieve any particular outcome."
    weight: 0.30
    description: "ReferralPresentation"
