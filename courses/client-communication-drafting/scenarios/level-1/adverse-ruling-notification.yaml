meta:
  id: adverse-ruling-notification
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft an adverse ruling notification — communicate a negative court ruling to the client with empathy, explain what the ruling means, discuss options going forward, and maintain the client's confidence"
  tags: [adverse-ruling, bad-news, court-ruling, beginner]

state: {}

trigger: |
  Draft a letter to your client notifying them
  that the court denied their motion for summary
  judgment.

  CLIENT: Pacific Coast Construction Inc.
  CONTACT: President, James Wu
  CASE: Pacific Coast Construction v. City of
  Riverside — breach of contract
  YOUR FIRM: Chen & Associates

  BACKGROUND:
  Pacific Coast had a $2.5M contract with the City
  to renovate a community center. The City
  terminated the contract, claiming defective
  workmanship. Pacific Coast sued for breach of
  contract, arguing the City's termination was
  pretextual (the real reason was budget cuts).

  THE MOTION:
  You filed a motion for summary judgment arguing
  there was no genuine dispute that the City
  breached the contract. The motion relied on:
  - Inspection reports showing work met specs
  - City's own inspector approved all completed work
  - Budget meeting minutes showing fiscal pressure
  - Email from City manager: "We need to find a way
    to cancel the renovation project"

  THE RULING:
  - Court DENIED the motion
  - Judge found "genuine disputes of material fact"
    regarding workmanship quality
  - Judge noted City's expert report (submitted in
    opposition) identified 12 specific defects
  - Judge stated the "smoking gun" email is relevant
    but does not resolve the factual dispute
  - Case will proceed to trial

  WHAT THIS MEANS:
  - NOT a loss on the merits — just means the case
    must go to trial
  - The smoking gun email is still admissible and
    powerful evidence
  - The City's expert report must now be countered
    with Pacific Coast's own expert
  - Trial will likely be scheduled 6-9 months out
  - Additional costs: expert witness ($15,000-$25,000),
    trial preparation, potential 5-day trial

  Draft the notification letter.

assertions:
  - type: llm_judge
    criteria: "Letter delivers bad news with empathy and context — opens by acknowledging the disappointing result before explaining the ruling; reframes the denial constructively (not a loss on merits, standard for summary judgment is very high, many strong cases proceed to trial); avoids blaming the client, the judge, or the firm's strategy; the tone is professional, empathetic, and confident without being dismissive of the client's disappointment; the letter demonstrates that the attorney understands the client's frustration while maintaining the client's trust in the representation."
    weight: 0.35
    description: "BadNewsDelivery"
  - type: llm_judge
    criteria: "Ruling is explained in practical terms — explains what summary judgment is and why the high standard wasn't met (the court found factual disputes that a jury must resolve); addresses the City's expert report (12 specific defects) as the key factor the judge cited; explains that the 'smoking gun' email remains admissible at trial; avoids legal jargon or explains it when used; the client understands what happened, why it happened, and what it means for the case going forward; the letter doesn't oversimplify or condescend."
    weight: 0.35
    description: "RulingExplanation"
  - type: llm_judge
    criteria: "Forward-looking strategy and costs are transparent — outlines the path to trial (discovery continues, expert witness needed, trial preparation, 5-day trial in 6-9 months); provides cost estimates for remaining phases (expert $15K-$25K plus trial preparation costs); discusses the need to retain a construction expert to counter the City's expert report; offers to schedule a call or meeting to discuss strategy in detail; maintains confidence in the case's strength while being honest about the additional investment required; the letter complies with the duty to keep clients informed about costs under Model Rule 1.5."
    weight: 0.30
    description: "ForwardLookingStrategy"
