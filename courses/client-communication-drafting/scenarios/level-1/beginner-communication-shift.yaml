meta:
  id: beginner-communication-shift
  level: 1
  course: client-communication-drafting
  type: output
  description: "Beginner shift simulation — handle multiple client communication tasks under time pressure including a status update, a demand letter response, and a sensitive billing communication"
  tags: [shift-simulation, multi-task, time-pressure, beginner]

state: {}

trigger: |
  You are a junior associate starting your Monday
  morning. Your supervising partner left three
  urgent communication tasks on your desk over the
  weekend with a note: "Draft these before our
  10 AM meeting."

  TASK 1 — URGENT STATUS UPDATE
  Client: Helen Wright (elderly, 78 years old)
  Case: Real estate dispute — neighbor encroaching
  on her property with a fence built 3 feet over
  the property line
  Status: Survey completed last week confirming
  the encroachment. Neighbor has been sent a letter
  requesting fence removal. Neighbor's attorney
  responded saying "my client has no intention of
  moving the fence."
  Task: Draft a status update for Helen explaining
  the situation and recommending next steps (file
  a quiet title action or seek injunctive relief).
  Note: Helen is not tech-savvy; prefers paper
  mail; use large, simple language.

  TASK 2 — RESPONSE TO DEMAND LETTER
  Client: Mike's Auto Body Shop (sole proprietor)
  Situation: A former customer (Patricia Lane) sent
  a demand letter through her attorney claiming
  Mike's shop caused $5,000 in damage to her car
  during a routine oil change (scratched the entire
  driver's side). Mike insists the scratches were
  pre-existing and has before-and-after photos
  proving it.
  Task: Draft a response to the demand letter on
  behalf of Mike's Auto Body Shop rejecting the
  claim and presenting the photo evidence.

  TASK 3 — SENSITIVE BILLING ISSUE
  Client: Dr. Sarah Kim (dentist, employment
  discrimination case)
  Situation: Dr. Kim's invoice is 90 days past due
  ($12,500). She has been responsive to all case-
  related communications but is ignoring billing
  emails. Her case is going well (strong
  discrimination claim, trial in 6 months).
  Task: Draft a firm-but-professional billing
  follow-up that preserves the relationship while
  addressing the overdue balance. Per firm policy,
  accounts over 120 days trigger a formal review
  that could affect continued representation.

assertions:
  - type: llm_judge
    criteria: "Helen Wright's status update is accessible and empathetic — uses large, simple language appropriate for a 78-year-old client; avoids legal jargon or thoroughly explains terms like 'quiet title action' and 'injunctive relief' in plain English; the tone is patient, respectful, and reassuring; the letter explains that the neighbor refusing to move the fence means they may need to go to court, and what that process looks like; the recommendation presents options clearly so Helen can make an informed decision; the format is suitable for paper mail delivery."
    weight: 0.35
    description: "ElderlyClientCommunication"
  - type: llm_judge
    criteria: "Demand letter response effectively rejects the claim with evidence — responds professionally to the customer's attorney; presents the before-and-after photos as key evidence that scratches were pre-existing; offers to provide copies of the photographs for review; does not make ad hominem attacks on the claimant; preserves the option for the client to negotiate while firmly rejecting liability; the tone is professional and confident without being aggressive; the response puts the opposing attorney on notice that the claim lacks merit and litigation would be unsuccessful."
    weight: 0.35
    description: "DemandLetterResponse"
  - type: llm_judge
    criteria: "Billing follow-up balances firmness with relationship preservation — acknowledges the strong case and ongoing partnership; addresses the 90-day overdue balance directly without accusation; explains the firm's 120-day policy and its potential consequences (review of continued representation) as a matter of policy rather than threat; offers payment plan options or invites a conversation about the balance; maintains the working relationship needed for the upcoming trial; the letter demonstrates that the firm values the client relationship while also needing to address a legitimate business concern."
    weight: 0.30
    description: "SensitiveBillingCommunication"
