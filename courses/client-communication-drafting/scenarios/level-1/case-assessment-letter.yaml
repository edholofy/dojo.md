meta:
  id: case-assessment-letter
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a case assessment letter — provide the client with an honest evaluation of their case's strengths, weaknesses, likely outcomes, and recommended course of action"
  tags: [case-assessment, evaluation-letter, client-advisory, beginner]

state: {}

trigger: |
  Draft a case assessment letter for a potential
  client who consulted with your firm about a
  slip-and-fall injury.

  CLIENT: Robert Thompson
  CONSULTATION DATE: February 10, 2025
  ATTORNEY: Lisa Park, Partner

  FACTS FROM CONSULTATION:
  - Robert slipped on ice in the parking lot of
    Mega Grocery Store on January 5, 2025 at
    approximately 7:30 AM
  - He broke his wrist and sprained his ankle
  - He went to the ER; treatment included wrist
    cast and ankle brace
  - Estimated medical bills: $8,500
  - He missed 2 weeks of work (salary: $1,200/week)
  - Lost wages: $2,400

  STRENGTHS:
  - Weather records show freezing temperatures and
    ice overnight
  - Store was open for business when he fell
  - No salt or sand visible on the parking lot
  - Another customer witnessed the fall
  - Robert was wearing appropriate winter boots

  WEAKNESSES:
  - Robert admits he "saw some ice but thought it
    was just frost"
  - He was looking at his phone when he fell
  - Store's defense will argue comparative negligence
  - Store may argue open and obvious condition
  - No photos taken at the scene; ice melted by
    afternoon

  RECOMMENDATION:
  - Case has merit but comparative negligence is
    a significant concern
  - Estimated case value: $25,000-$40,000 (before
    reduction for comparative fault)
  - Likely comparative fault allocation: 20-30%
    to Robert
  - Recommend pursuing claim but client should
    understand the risks

  FEE: Contingency — 33.3% if settled pre-suit,
  40% if litigation required

  Draft the assessment letter.

assertions:
  - type: llm_judge
    criteria: "Assessment is honest about both strengths and weaknesses — presents the strengths (weather conditions, store open, no de-icing, witness, appropriate footwear) alongside the weaknesses (Robert saw ice, was on phone, open and obvious defense, no photos) without sugarcoating; the letter explains comparative negligence in plain language (the jury could reduce his award by the percentage they find him at fault); the estimated case value range ($25K-$40K before reduction) and likely comparative fault (20-30%) give the client realistic expectations; the assessment complies with Model Rule 1.4's duty to provide sufficient information for informed decision-making."
    weight: 0.35
    description: "HonestAssessment"
  - type: llm_judge
    criteria: "Legal concepts are explained in accessible language — comparative negligence, open and obvious doctrine, and contingency fees are explained without legal jargon; the client can understand what each weakness means for his case; the letter doesn't assume legal knowledge; analogies or simple explanations are used where helpful; the letter explains the litigation process (demand → negotiation → lawsuit if needed → discovery → trial) in terms the client can follow; the assessment empowers the client to make an informed decision about whether to proceed."
    weight: 0.35
    description: "AccessibleLanguage"
  - type: llm_judge
    criteria: "Fee arrangement and next steps are clearly presented — contingency fee structure (33.3% pre-suit, 40% litigation) is explained with examples of what the client would receive net of fees and costs; costs that may be deducted are listed (filing fees, expert fees, medical record costs); the letter outlines specific next steps if the client decides to proceed (sign engagement letter, provide medical authorizations, don't discuss the case on social media); a deadline for the client's decision is suggested; the letter provides direct contact information for follow-up questions."
    weight: 0.30
    description: "FeeAndNextSteps"
