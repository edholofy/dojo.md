meta:
  id: client-intake-confirmation
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a client intake confirmation letter — confirm the new client relationship, summarize what was discussed during the initial consultation, and outline immediate next steps"
  tags: [intake-confirmation, new-client, consultation-summary, beginner]

state: {}

trigger: |
  Draft a client intake confirmation letter
  following an initial consultation.

  CLIENT: Jennifer Park
  CONSULTATION DATE: February 20, 2025
  ATTORNEY: David Martinez, Associate
  FIRM: Rivera & Associates

  CONSULTATION SUMMARY:
  Jennifer works as a marketing manager at TechGiant
  Corp (employed since 2019). She was passed over
  for promotion to Senior Marketing Director in
  January 2025. She believes the decision was based
  on her pregnancy (she announced her pregnancy in
  November 2024, and the promotion decision was made
  in January 2025).

  Key facts discussed:
  - Jennifer has worked at TechGiant for 6 years
  - Performance reviews: "Exceeds Expectations"
    every year
  - She was the most senior marketing manager
  - The promotion went to a male colleague with
    2 years less experience and lower performance
    ratings
  - Her supervisor made comments like "Are you sure
    you want more responsibility right now?" after
    her pregnancy announcement
  - Jennifer has emails documenting the comments
  - She has not filed any complaint with HR yet

  NEXT STEPS DISCUSSED:
  1. Jennifer will gather and preserve all relevant
     emails, performance reviews, and communications
  2. She will NOT confront her supervisor or discuss
     the situation at work
  3. The firm will review her employment contract
     and company policies
  4. The firm will assess whether to file an EEOC
     charge (300-day deadline from discriminatory
     act = November 2025)
  5. Jennifer will sign engagement letter (sent
     separately)

  IMPORTANT REMINDERS:
  - Do not discuss the case with coworkers
  - Do not post about the situation on social media
  - Preserve all digital communications
  - Contact the firm immediately if any adverse
    action occurs (demotion, termination, etc.)

  Draft the intake confirmation letter.

assertions:
  - type: llm_judge
    criteria: "Confirmation letter accurately summarizes the consultation — captures the key facts discussed (employment history, performance record, promotion denial, pregnancy announcement timeline, supervisor's comments) without making legal conclusions; distinguishes between facts Jennifer reported and legal assessment; the summary gives Jennifer a record of what was discussed and allows her to correct any inaccuracies; the letter does not include privileged legal strategy or assessment that could be discoverable."
    weight: 0.35
    description: "ConsultationSummary"
  - type: llm_judge
    criteria: "Next steps are clear and actionable — lists exactly what Jennifer needs to do (gather emails and reviews, preserve communications, sign engagement letter) and what to avoid (don't confront supervisor, don't discuss with coworkers, don't post on social media); explains why these actions matter (preservation of evidence, protection against retaliation claims); the EEOC deadline (300 days, approximately November 2025) is flagged prominently; the letter asks Jennifer to contact the firm immediately if anything changes at work."
    weight: 0.35
    description: "ActionableNextSteps"
  - type: llm_judge
    criteria: "Letter establishes the professional relationship properly — confirms the attorney-client relationship has been formed (or that it will be upon return of signed engagement letter); references the engagement letter being sent separately; addresses confidentiality (their communications are protected by attorney-client privilege); provides direct contact information for the attorney and firm; sets expectations for the firm's next steps (review of employment contract and policies, EEOC charge assessment); the tone is supportive and professional, conveying that Jennifer's concerns are being taken seriously."
    weight: 0.30
    description: "RelationshipEstablishment"
