meta:
  id: settlement-offer-communication
  level: 1
  course: client-communication-drafting
  type: output
  description: "Draft a settlement offer communication — present a settlement offer to the client, explain the terms, analyze pros and cons, and enable the client to make an informed decision while maintaining client autonomy"
  tags: [settlement-offer, client-decision, informed-consent, beginner]

state: {}

trigger: |
  Draft a letter presenting a settlement offer
  to your client.

  CLIENT: Amanda Foster
  CASE: Foster v. Downtown Fitness Center — personal
  injury (fell on broken step at gym)
  ATTORNEY: You (associate at Miller Law Group)

  SETTLEMENT OFFER RECEIVED:
  Downtown Fitness Center's insurance company
  (Hartford Insurance) has offered $75,000 to
  settle the case.

  CASE DETAILS:
  - Amanda fell on a broken step at the gym entrance
    on March 15, 2024
  - Injuries: fractured ankle, torn ligament
  - Surgery required: ORIF (open reduction internal
    fixation)
  - 3 months off work (teacher, salary $55,000/year)
  - Total medical bills: $42,000
  - Lost wages: $13,750
  - Physical therapy ongoing (estimated additional
    $5,000)
  - Total economic damages: ~$60,750
  - Non-economic damages (pain and suffering):
    estimated $40,000-$80,000

  ANALYSIS:
  - Total estimated case value: $100,750 - $140,750
  - Offer of $75,000 is below estimated value
  - However, trial is uncertain:
    * Gym claims Amanda was wearing inappropriate
      footwear (flip-flops)
    * Gym's maintenance log shows step was reported
      broken 2 weeks before accident (helps our case)
    * Jury could find partial comparative fault
  - If case goes to trial: 12-18 months from now
  - Contingency fee: 33.3% pre-trial ($24,975 from
    $75K settlement) or 40% if trial ($40K+ from
    potential $100K+ verdict)
  - Costs to date: $3,500
  - Estimated trial costs: additional $8,000-$12,000

  RECOMMENDATION: Counter at $110,000; willing to
  settle at $90,000-$95,000

  Draft the letter presenting the offer and your
  recommendation.

assertions:
  - type: llm_judge
    criteria: "Letter preserves client autonomy in settlement decision — presents the offer objectively before giving the attorney's recommendation; makes clear that the decision to accept, reject, or counter is entirely the client's (Model Rule 1.2 — client decides settlement); provides enough information for an informed decision including financial analysis; the recommendation is framed as advice, not direction; the letter asks the client to contact the office to discuss rather than assuming a course of action."
    weight: 0.35
    description: "ClientAutonomy"
  - type: llm_judge
    criteria: "Financial analysis is transparent and comprehensive — shows the net to client calculation: $75,000 offer minus 33.3% fee ($24,975) minus costs ($3,500) = ~$46,525 net; compares this to estimated case value at trial minus 40% fee minus costs; explains the risk-adjusted calculus (certainty of $46,525 now vs. uncertain higher amount in 12-18 months with trial risks); the footwear issue is presented as a trial risk that could reduce the verdict through comparative fault; the financial presentation helps the client understand the real trade-offs."
    weight: 0.35
    description: "FinancialAnalysis"
  - type: llm_judge
    criteria: "Recommendation is well-reasoned and actionable — recommends countering at $110,000 with a target settlement range of $90,000-$95,000; explains the rationale (case value supports a higher number, the broken step maintenance log is strong evidence, but the footwear issue creates trial risk that justifies settling below maximum estimated value); provides a clear next step (client should call to discuss and authorize a counter); sets a timeline for response to the insurance company; the letter balances advocacy for the client's interests with realistic assessment of litigation risks."
    weight: 0.30
    description: "RecommendationQuality"
