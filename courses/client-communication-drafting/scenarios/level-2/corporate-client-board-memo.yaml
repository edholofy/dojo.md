meta:
  id: corporate-client-board-memo
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a board-level client communication — present legal strategy, risk assessment, and recommendations to a corporate board of directors in a format appropriate for executive decision-making"
  tags: [corporate-client, board-memo, executive-communication, intermediate]

state: {}

trigger: |
  Draft a memorandum to a corporate board of
  directors regarding a pending regulatory
  investigation.

  CLIENT: NovaPharma Inc. (publicly traded
  pharmaceutical company)
  TO: Board of Directors
  FROM: Outside Counsel (your firm, Harris & Chen LLP)
  RE: FDA Investigation — Response Strategy

  CONFIDENTIAL — ATTORNEY-CLIENT PRIVILEGED

  SITUATION:
  FDA has opened a formal investigation into
  NovaPharma's manufacturing practices at the
  Memphis facility following 3 consumer complaints
  about contaminated product (antibiotic tablets
  found to contain particulate matter).

  REGULATORY STATUS:
  - FDA Form 483 issued December 15, 2024 (5
    observations)
  - Warning Letter issued January 20, 2025
  - NovaPharma's response due February 20, 2025
  - FDA has hinted at possible consent decree if
    response is inadequate
  - No product recall yet ordered but FDA "strongly
    recommends" voluntary recall of affected lots

  FINANCIAL EXPOSURE:
  - Voluntary recall costs: $15-25M
  - Consent decree costs: $50-100M (plant shutdown,
    third-party monitoring, remediation)
  - Potential DOJ criminal referral: $200M+ fines
  - Class action exposure (consumer lawsuits): $100M+
  - Stock price impact: 15-25% decline estimated
    if consent decree or criminal action
  - Lost revenue during plant shutdown: $30M/quarter

  OPTIONS FOR BOARD CONSIDERATION:
  1. Aggressive compliance — voluntary recall,
     comprehensive corrective action, full cooperation
     with FDA, hire third-party compliance monitor
     proactively (estimated cost: $40-60M)
  2. Measured response — address Form 483 observations,
     targeted recall of affected lots only, negotiate
     with FDA on scope (estimated cost: $20-35M)
  3. Contested approach — challenge FDA's findings,
     argue observations are minor, resist consent
     decree (risk: escalation to criminal referral)

  RECOMMENDATION: Option 1 (Aggressive compliance)

  Draft the board memorandum.

assertions:
  - type: llm_judge
    criteria: "Board memo is structured for executive decision-making — opens with a clear executive summary stating the situation, risk level, and recommended action; uses a format appropriate for board governance (numbered options, risk assessment matrix, financial impact analysis); avoids unnecessary legal detail while covering all material information; the memo is concise enough for a 30-minute board discussion but comprehensive enough for fiduciary duty documentation; privileged and confidential markings are prominent; the memo acknowledges the board's fiduciary obligations and public company disclosure requirements."
    weight: 0.35
    description: "BoardMemoStructure"
  - type: llm_judge
    criteria: "Financial analysis enables board-level risk assessment — presents each option with estimated costs, risk probabilities, and potential worst-case scenarios; Option 1 ($40-60M but reduces criminal risk and consent decree probability); Option 2 ($20-35M but higher risk of escalation); Option 3 (lowest upfront cost but highest risk of criminal referral and $200M+ exposure); the analysis considers stock price impact, lost revenue during shutdown, and class action exposure; the memo helps the board weigh short-term costs against long-term risk reduction; securities disclosure obligations (8-K, 10-K risk factors) are addressed."
    weight: 0.35
    description: "FinancialRiskAnalysis"
  - type: llm_judge
    criteria: "Recommendation is supported and actionable — recommends Option 1 with clear rationale: demonstrates good faith to FDA (reducing consent decree probability), positions company favorably if DOJ criminal referral occurs (cooperation credit), provides the strongest defense in consumer class actions (proactive remediation), and shows board fulfillment of fiduciary duties; the memo proposes specific next steps (board resolution authorizing counsel to proceed, retention of compliance monitor, formation of special committee); timeline for each step is included; the recommendation addresses the February 20 response deadline urgency."
    weight: 0.30
    description: "SupportedRecommendation"
