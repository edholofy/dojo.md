meta:
  id: discovery-update-complex
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a complex discovery update — communicate voluminous discovery findings, document review results, and privilege issues to a sophisticated client while maintaining attorney-client privilege"
  tags: [discovery-update, document-review, privilege, intermediate]

state: {}

trigger: |
  Draft a discovery update letter to a corporate
  client about document review findings in a
  complex commercial litigation.

  CLIENT: TechVentures Inc. (software company)
  CONTACT: General Counsel, Priya Sharma
  CASE: TechVentures v. DataCorp Solutions —
  breach of software licensing agreement ($8M claim)
  YOUR FIRM: Blackwell & Partners

  DISCOVERY STATUS:
  - TechVentures produced: 125,000 documents (2.5TB)
  - DataCorp produced: 89,000 documents (1.8TB)
  - Review completed: 85% of DataCorp's production
  - Remaining: 15% (approximately 13,350 documents)

  KEY FINDINGS (from DataCorp's documents):

  Favorable:
  - Internal emails show DataCorp executives knew
    they were exceeding license limits by 3,000 seats
  - CFO email (Jan 2024): "We should just pay for
    the additional licenses but the budget won't
    allow it — let's hope they don't audit"
  - Technical logs confirm 8,400 active users vs.
    5,000 licensed seats
  - DataCorp's IT manager flagged the issue to
    management 4 times in 6 months

  Unfavorable:
  - TechVentures' own sales team emails suggest
    they informally told DataCorp that "a few extra
    seats is no big deal" during a trade show
  - Contract amendment discussion in 2023 where
    TechVentures proposed a lower per-seat price
    for additional licenses but DataCorp rejected
    the offer (suggests TechVentures knew about
    overuse and tried to monetize it rather than
    enforce)

  PRIVILEGE ISSUES:
  - DataCorp is withholding 2,100 documents on
    privilege (in-house counsel involved)
  - Their privilege log appears to over-designate
    (many documents are business documents copied
    to in-house counsel)
  - We recommend challenging the privilege assertions
    on approximately 800 documents

  DEPOSITIONS PLANNED:
  - DataCorp's CFO (key — the "let's hope" email)
  - DataCorp's IT Manager (flagged the issue)
  - DataCorp's CEO (decision-making authority)
  - TechVentures' VP of Sales (the "no big deal"
    comment — we need to prepare for this)

  Draft the discovery update to Priya Sharma.

assertions:
  - type: llm_judge
    criteria: "Discovery findings are presented with both favorable and unfavorable evidence — the letter honestly presents the 'smoking gun' emails (CFO's 'let's hope they don't audit') and technical logs proving overuse alongside the problematic sales team emails ('a few extra seats is no big deal') and the 2023 amendment negotiation; Priya as GC needs the complete picture to assess case strategy; the letter explains how each finding affects the litigation position; the unfavorable evidence is not buried or minimized but is contextualized with potential responses and mitigation strategies."
    weight: 0.35
    description: "BalancedFindings"
  - type: llm_judge
    criteria: "Privilege challenges and deposition strategy are clearly communicated — explains the over-designation issue in DataCorp's privilege log (2,100 withheld, ~800 likely improperly designated); recommends a motion to compel with cost-benefit analysis; deposition strategy addresses both offensive depositions (CFO and IT Manager to lock in favorable testimony) and the defensive challenge (preparing TechVentures' VP of Sales for the 'no big deal' comment); the letter asks Priya to identify any additional TechVentures witnesses who may have relevant knowledge; privilege protection is maintained throughout the letter itself."
    weight: 0.35
    description: "PrivilegeAndStrategy"
  - type: llm_judge
    criteria: "Letter is appropriately sophisticated for a GC audience — uses appropriate legal terminology without over-explaining concepts Priya already understands; the letter is organized for efficient review (executive summary, favorable findings, unfavorable findings, privilege issues, deposition plan, next steps, budget update); includes budget implications of the privilege challenge motion and depositions; asks for specific input and decisions from Priya (authorize privilege motion, confirm deposition witnesses, prepare VP of Sales); the tone is collegial between outside counsel and GC rather than attorney-to-lay-client."
    weight: 0.30
    description: "GCSophistication"
