meta:
  id: appeal-recommendation-letter
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft an appeal recommendation letter — analyze a trial court verdict, assess appellate prospects, explain the appellate process, and recommend whether the client should appeal"
  tags: [appeal-recommendation, post-trial, appellate-analysis, intermediate]

state: {}

trigger: |
  Draft a letter to your client recommending
  against appealing an unfavorable trial verdict.

  CLIENT: Pinnacle Real Estate Group LLC
  CONTACT: Managing Partner, Robert Chen
  CASE: Pinnacle v. SilverLake Investors LLC —
  breach of partnership agreement
  YOUR FIRM: Hamilton & Associates
  ATTORNEY: Katherine Hamilton, Partner

  TRIAL RESULT:
  After a 5-day bench trial, Judge Williams ruled
  in favor of SilverLake on all counts:
  - Found Pinnacle breached the partnership agreement
    by making capital calls without proper notice
  - Awarded SilverLake $1.2M in damages
  - Denied Pinnacle's counterclaim for mismanagement
  - Ordered Pinnacle to pay $180,000 in SilverLake's
    attorney's fees (prevailing party provision)

  APPELLATE ANALYSIS:

  Arguments for appeal:
  - Judge may have misinterpreted the notice provision
    (contract language is arguably ambiguous)
  - Judge excluded key testimony from Pinnacle's
    expert on industry custom (evidentiary ruling)
  - Damages calculation included speculative future
    losses

  Arguments against appeal:
  - Standard of review for contract interpretation
    after bench trial is "clearly erroneous" —
    highly deferential to trial judge
  - Evidentiary rulings reviewed for "abuse of
    discretion" — very difficult to overturn
  - Damages challenges rarely succeed on appeal
  - Appeal would take 12-18 months and cost
    $75,000-$125,000 in additional fees
  - Must post a supersedeas bond ($1.38M) to stay
    execution during appeal
  - 15% success rate for appellate reversal in
    contract cases in this circuit

  RECOMMENDATION: Do NOT appeal. Instead, negotiate
  payment terms for the judgment and focus on the
  ongoing business relationship (Pinnacle and
  SilverLake still co-own 3 other properties).

  Draft the recommendation letter.

assertions:
  - type: llm_judge
    criteria: "Appellate analysis is thorough and balanced — presents both the arguments for appeal (contract interpretation error, excluded expert testimony, speculative damages) and the significant obstacles (clearly erroneous standard, abuse of discretion standard, 15% reversal rate); explains the standards of review in plain language so Robert understands why appeals after bench trials are particularly difficult; the analysis is honest rather than self-serving (the firm would earn $75-125K in fees from an appeal); the 15% success rate provides concrete data for decision-making."
    weight: 0.35
    description: "AppellateAnalysis"
  - type: llm_judge
    criteria: "Recommendation against appeal is well-reasoned and client-focused — explains the cost-benefit analysis: $75-125K in fees plus $1.38M supersedeas bond plus 12-18 months of uncertainty for a 15% chance of reversal; contrasts with the alternative strategy (negotiate payment terms, preserve the business relationship with SilverLake on 3 other properties); the recommendation prioritizes the client's overall business interests over the litigation result; the letter acknowledges the client's likely frustration with the verdict while providing rational counsel."
    weight: 0.35
    description: "RecommendationReasoning"
  - type: llm_judge
    criteria: "Letter addresses deadline urgency and next steps — notes the appeal deadline (typically 30 days from judgment entry) and the need for a decision before it expires; explains what happens if the appeal is not filed (judgment becomes final, execution can proceed); proposes specific next steps for the recommended alternative (approach SilverLake's counsel about payment terms, discuss business relationship going forward); addresses the attorney's fees award ($180K) and whether negotiation could reduce it; the letter makes clear this is the attorney's recommendation but the decision is Robert's to make; offers to meet in person to discuss."
    weight: 0.30
    description: "DeadlineAndNextSteps"
