meta:
  id: multi-language-client-communication
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft client communications for a non-English-speaking client — create communications that work through interpretation, address cultural considerations, and ensure informed consent across language barriers"
  tags: [cross-cultural, language-barriers, informed-consent, intermediate]

state: {}

trigger: |
  Draft communications for a client who speaks
  limited English, addressing cultural and
  language considerations.

  CLIENT: Fatima Al-Rashid
  LANGUAGE: Arabic (speaks very limited English;
  all communications through interpreter)
  CASE: Asylum application based on domestic
  violence persecution in home country
  YOUR FIRM: Community Legal Services
  ATTORNEY: Sarah Williams

  CONTEXT:
  Fatima fled her home country after years of
  severe domestic violence by her husband. She has
  two children (ages 6 and 8) who are also
  applicants. Her asylum interview with USCIS is
  scheduled for April 10, 2025 (6 weeks away).

  COMMUNICATIONS NEEDED:

  1. Interview preparation letter explaining:
  - What the asylum interview is and what will happen
  - Who will be present (asylum officer, interpreter,
    attorney)
  - What types of questions will be asked (about her
    persecution, fear of return, country conditions)
  - The importance of being truthful and detailed
  - How the interpreter will work
  - What documents to bring
  - What to wear, arrive time, logistics

  2. Sensitive topics advisory:
  - The interview will require discussing traumatic
    events in detail
  - Fatima should know she can request breaks
  - She can ask for a female asylum officer and
    interpreter
  - Emotional reactions are normal and will not
    hurt her case
  - Preparing for difficult questions about the
    violence

  CULTURAL CONSIDERATIONS:
  - Fatima comes from a culture where discussing
    domestic violence is deeply stigmatized
  - She may be reluctant to describe physical and
    sexual violence to strangers
  - Trust-building is essential
  - She may defer to authority figures rather than
    express disagreement
  - Concepts like "asylum" and "persecution" may
    need cultural translation beyond literal language
    translation

  Draft both communications designed for
  interpretation into Arabic.

assertions:
  - type: llm_judge
    criteria: "Communications are designed for effective interpretation — uses short, clear sentences that translate well; avoids idioms, colloquialisms, and complex legal jargon; defines legal terms in plain concepts (asylum = 'protection given by a country to someone who has left their own country because they are in danger'); uses concrete rather than abstract language; the interview preparation letter is structured with numbered steps and clear headers that an interpreter can follow; provides enough detail for understanding without overwhelming the client."
    weight: 0.35
    description: "InterpretationDesign"
  - type: llm_judge
    criteria: "Cultural sensitivity is woven throughout — acknowledges the stigma around discussing domestic violence without being patronizing; normalizes Fatima's potential reluctance while gently explaining why detailed testimony is necessary for her case; addresses the power dynamics (she may defer to the asylum officer rather than correct misunderstandings) and empowers her to speak up; the option to request a female asylum officer and interpreter is presented as her right, not a special accommodation; the communications respect her cultural background while ensuring she understands the requirements of the American asylum process."
    weight: 0.35
    description: "CulturalSensitivity"
  - type: llm_judge
    criteria: "Trauma-informed communication addresses sensitive content appropriately — warns Fatima that the interview will require discussing difficult events without retraumatizing her in the letter itself; normalizes emotional reactions during the interview; explains that crying, pausing, or becoming upset will not hurt her case; provides strategies for managing difficult moments (request breaks, take deep breaths, tell the attorney if she needs help); the letter balances preparing her for difficult questions with reassurance and support; the approach is trauma-informed and compassionate while being practically useful."
    weight: 0.30
    description: "TraumaInformedCommunication"
