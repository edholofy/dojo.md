meta:
  id: intermediate-communication-shift
  level: 2
  course: client-communication-drafting
  type: output
  description: "Intermediate shift simulation — manage complex client communications including a corporate board briefing, a multi-party settlement negotiation update, and a sensitive conflict disclosure under tight deadlines"
  tags: [shift-simulation, multi-case, complex-communications, intermediate]

state: {}

trigger: |
  You are a mid-level associate managing three
  critical client communications that must go out
  today. Your partner is in trial and unavailable.

  TASK 1 — CORPORATE CLIENT CRISIS UPDATE
  Client: FoodChain Corp. (restaurant chain, 200
  locations)
  Situation: A social media post went viral
  yesterday showing a customer finding a foreign
  object (metal fragment) in their food at a
  FoodChain restaurant. Post has 2M views. Five
  additional customers have now reported similar
  incidents at different locations.
  Action needed: Draft an urgent communication to
  FoodChain's CEO and General Counsel advising on:
  - Immediate legal exposure (product liability,
    negligence)
  - Preserve evidence recommendation
  - Do NOT issue any public statements without
    legal review
  - Potential regulatory response (health department,
    FDA if interstate commerce)
  - Media response strategy (coordinate with PR
    firm, no admissions)
  - Recommend retaining product liability defense
    counsel (if your firm doesn't handle this area)

  TASK 2 — EMOTIONAL CLIENT SUPPORT
  Client: Margaret Wu, age 65 (widow)
  Case: Wrongful death of her husband (hospital
  negligence during routine surgery)
  Situation: Margaret called the office in tears.
  Today is the 1-year anniversary of her husband's
  death. The defense filed a motion arguing that
  Mr. Wu's pre-existing heart condition was the
  true cause of death, not the surgical error.
  She says: "They're saying it's his fault he died.
  How can they do that?"
  Action needed: Draft a compassionate letter that:
  - Acknowledges the emotional weight of the
    anniversary and the motion
  - Explains that the defense motion is standard
    litigation strategy (not personal)
  - Reassures her that your medical expert has
    already addressed causation
  - Explains next steps (your response to the motion
    is due in 3 weeks)
  - Invites her to call when she's ready to discuss

  TASK 3 — DIFFICULT FEE CONVERSATION
  Client: Dr. James Park (orthopedic surgeon)
  Case: Medical malpractice defense
  Situation: Dr. Park's malpractice insurance covers
  defense costs, but the insurer-appointed law firm
  (not yours) is handling the main defense. Dr. Park
  hired your firm separately to protect his medical
  license before the State Medical Board. The
  insurer DOES NOT cover license defense.
  Current bill: $45,000 (Dr. Park's personal
  responsibility)
  Problem: Dr. Park hasn't paid the last 3 invoices
  ($22,500 total). He says "I thought insurance
  was covering everything." He genuinely seems
  confused about which firm is doing what.
  Action needed: Draft a letter clarifying the
  separate representations, the insurance coverage
  gap, and requesting payment — without alienating
  a client who may need you through a Medical Board
  hearing in 2 months.

assertions:
  - type: llm_judge
    criteria: "Corporate crisis communication is urgent and comprehensive — addresses the CEO and GC with appropriate urgency; covers immediate legal exposure, evidence preservation (surveillance video, customer complaints, food samples, supplier records), social media/public statement restrictions (no admissions, coordinate with PR, preserve posts as evidence), regulatory notification obligations, and insurance notification; the communication provides a prioritized action list (do this today, do this this week); the tone is authoritative without being alarmist; the letter demonstrates crisis management expertise and guides the corporate client through the first 48 hours."
    weight: 0.35
    description: "CrisisCommunication"
  - type: llm_judge
    criteria: "Emotional client letter is compassionate and reassuring — acknowledges the anniversary and the additional pain of the defense motion with genuine empathy; explains that defense motions challenging causation are routine legal strategy ('standard' and 'expected') and not a personal attack on her husband; provides specific reassurance (the medical expert has already addressed causation in their report); gives concrete next steps (response due in 3 weeks, she'll receive a copy); invites her to call when she's ready without pressuring immediate contact; the letter balances legal information with human compassion."
    weight: 0.35
    description: "EmotionalSupportLetter"
  - type: llm_judge
    criteria: "Fee clarification letter resolves confusion without alienating the client — clearly explains the two separate representations: (1) insurer-appointed firm handling the malpractice lawsuit defense (covered by insurance), and (2) your firm handling the Medical Board license defense (NOT covered by insurance, Dr. Park's personal responsibility); uses a simple comparison or chart to make the distinction clear; addresses the $22,500 outstanding balance; acknowledges the genuine confusion and resolves it without accusation; emphasizes the importance of the Medical Board hearing (2 months away) and the firm's commitment to his defense; offers a payment plan if needed."
    weight: 0.30
    description: "FeeClairificationLetter"
