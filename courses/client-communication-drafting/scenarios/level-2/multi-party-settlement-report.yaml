meta:
  id: multi-party-settlement-report
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a multi-party settlement report — present settlement options to a client involved in complex litigation with multiple defendants, insurance carriers, and competing claims"
  tags: [settlement-report, multi-party, risk-analysis, intermediate]

state: {}

trigger: |
  Draft a comprehensive settlement report for a
  client involved in a multi-party construction
  accident case.

  CLIENT: Derek Johnson
  CASE: Johnson v. BuildCo General Contractors Inc.,
  SubElectric LLC, and City of Westlake

  FACTS:
  Derek, an electrician employed by SubElectric,
  was injured when scaffolding collapsed at a
  construction site managed by BuildCo. He suffered
  a shattered right knee requiring total knee
  replacement, plus PTSD from the fall.

  INJURY DETAILS:
  - Total knee replacement surgery: $85,000
  - Physical therapy (12 months): $24,000
  - PTSD treatment (ongoing): $15,000 to date
  - Future medical costs (knee revision in 10 years):
    estimated $95,000
  - Lost wages (14 months off work): $98,000
  - Diminished earning capacity: $250,000 (lifetime)
  - Pain and suffering: $200,000-$400,000

  SETTLEMENT OFFERS:

  From BuildCo's insurer (Hartford, $2M policy):
  - Offer: $425,000
  - Position: "Scaffolding met OSHA standards;
    SubElectric's employee was improperly positioned"

  From City of Westlake:
  - Offer: $75,000
  - Position: "City's inspection was within standards;
    limited governmental immunity applies"
  - Note: City has sovereign immunity cap of $250,000

  From SubElectric (Derek's employer):
  - Workers' comp lien: $145,000 (already paid)
  - SubElectric argues workers' comp is exclusive
    remedy as employer
  - However, if SubElectric's negligence was "gross"
    (evidence suggests safety violations), the
    exclusive remedy may not apply

  TOTAL CURRENT OFFERS: $500,000
  TOTAL ESTIMATED CASE VALUE: $767,000-$967,000
  WORKERS' COMP LIEN TO RESOLVE: $145,000

  TRIAL RISKS:
  - 40% chance jury finds OSHA standards were met
    (BuildCo defense)
  - Governmental immunity could reduce or eliminate
    City's liability
  - SubElectric exclusive remedy defense has 50/50
    chance of success
  - Derek's failure to wear fall protection harness
    (comparative fault: 15-25%)

  RECOMMENDATION:
  Counter BuildCo at $650,000, accept City's $75K
  given immunity risk, and negotiate workers' comp
  lien down 40% before settling.

  Draft the settlement report to Derek.

assertions:
  - type: llm_judge
    criteria: "Settlement report presents multi-party dynamics clearly — explains each defendant's offer, their legal position, and the associated risks; the report helps Derek understand why each defendant's case is different and why the strategy differs for each; BuildCo (main target, highest liability), City (limited by sovereign immunity), and SubElectric (complex workers' comp exclusive remedy issue) are each analyzed separately with their specific risk factors; the report is organized so Derek can understand the overall picture and make informed decisions about each component."
    weight: 0.35
    description: "MultiPartyPresentation"
  - type: llm_judge
    criteria: "Financial analysis is comprehensive and transparent — shows total damages ($767K-$967K), current total offers ($500K), the workers' comp lien ($145K that must be repaid), and the net to client under various scenarios; calculates what Derek receives if all current offers are accepted vs. if the recommended counter is successful; factors in attorney fees and costs; addresses the workers' comp lien negotiation strategy (reduce by 40%); the analysis shows Derek the financial trade-offs of settling now vs. going to trial with each defendant."
    weight: 0.35
    description: "FinancialAnalysis"
  - type: llm_judge
    criteria: "Risk assessment is honest and decision-enabling — presents trial risks candidly: 40% chance BuildCo wins on OSHA compliance, sovereign immunity may eliminate City liability, 50/50 on SubElectric exclusive remedy defense, and 15-25% comparative fault for not wearing harness; the report explains what each risk means in dollar terms; the recommendation (counter BuildCo, accept City, negotiate lien) is supported by the risk analysis; the report makes clear that the decision is Derek's and provides enough information for an informed choice."
    weight: 0.30
    description: "RiskAssessment"
