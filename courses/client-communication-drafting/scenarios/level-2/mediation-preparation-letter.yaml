meta:
  id: mediation-preparation-letter
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a mediation preparation letter — prepare the client for the mediation process, explain what to expect, establish settlement authority parameters, and provide strategic guidance"
  tags: [mediation-preparation, adr, settlement-strategy, intermediate]

state: {}

trigger: |
  Draft a mediation preparation letter to your
  client ahead of a scheduled mediation session.

  CLIENT: ProTech Manufacturing Inc.
  CONTACT: President, Kevin Park
  CASE: ProTech v. SupplyChain Logistics Corp. —
  breach of warehousing agreement
  MEDIATOR: Hon. Margaret Chen (ret.), JAMS
  MEDIATION DATE: March 15, 2025 (2 weeks away)
  LOCATION: JAMS Office, Chicago

  CASE SUMMARY:
  SupplyChain was storing ProTech's $2M inventory
  of electronic components. A roof leak damaged
  $800,000 worth of inventory. ProTech claims
  SupplyChain breached the warehousing agreement
  by failing to maintain the facility. SupplyChain
  argues the roof leak was caused by an unprecedented
  storm (force majeure) and that ProTech failed to
  maintain adequate insurance.

  DAMAGES CLAIMED: $800,000 (inventory) + $350,000
  (business interruption) + $120,000 (replacement
  sourcing premium) = $1,270,000

  LITIGATION POSITION:
  Strengths:
  - Warehousing agreement requires SupplyChain to
    "maintain facility in good working order"
  - Roof inspection report from 6 months before
    the leak recommended repairs that were not done
  - Building code violation for deferred maintenance

  Weaknesses:
  - Storm was significant (3 inches of rain in 2
    hours)
  - ProTech's insurance policy had lapsed 2 months
    before the damage (ProTech's administrative error)
  - Contract has a limitation of liability clause
    capping damages at $500,000
  - Contract's force majeure clause is broadly written

  SETTLEMENT AUTHORITY:
  - Last demand: $1,000,000
  - SupplyChain's last offer: $200,000
  - Recommended target settlement: $400,000-$500,000
  - Walk-away: below $300,000
  - Liability cap creates a hard ceiling

  Draft the mediation preparation letter.

assertions:
  - type: llm_judge
    criteria: "Mediation process explanation prepares the client — explains what mediation is (facilitated negotiation, not binding, confidential), the mediator's role (neutral facilitator, not a judge), the typical structure (joint session, opening statements, caucuses, shuttle diplomacy), Kevin's role (decision-maker who should attend with settlement authority), expected duration (full day), and logistics (arrive early, bring relevant documents, comfortable attire); the letter addresses common client concerns about mediation (fears about showing weakness, confidentiality of statements, what happens if it fails)."
    weight: 0.35
    description: "MediationProcessExplanation"
  - type: llm_judge
    criteria: "Settlement strategy is clearly communicated — explains the negotiation range: current positions ($1M demand vs. $200K offer), recommended target ($400K-$500K), and walk-away ($300K minimum); justifies the target by reference to the $500K liability cap (even if ProTech proves full liability, recovery is contractually capped); addresses how to handle the weaknesses (lapsed insurance, broad force majeure clause) during mediation; provides talking points for the opening statement; advises Kevin on what he should and should not say during the session; the strategy preserves flexibility while establishing clear parameters."
    weight: 0.35
    description: "SettlementStrategy"
  - type: llm_judge
    criteria: "Letter addresses practical and strategic preparation — includes logistics (date, time, location, what to bring); instructs Kevin on appropriate demeanor (professional, calm, open to resolution); addresses the emotional dynamics of mediation (the other side will present their case strongly, which is normal); prepares Kevin for the possibility that the case does not settle (trial preparation continues regardless); discusses whether a structured settlement (payment plan) might bridge the gap if SupplyChain claims inability to pay a lump sum; asks Kevin to confirm his schedule and settlement authority before the mediation date."
    weight: 0.30
    description: "PracticalPreparation"
