meta:
  id: conflict-of-interest-disclosure
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a conflict of interest disclosure — inform the client of a newly discovered potential conflict, explain the implications, obtain informed consent, or propose appropriate resolution"
  tags: [conflict-disclosure, ethics, informed-consent, intermediate]

state: {}

trigger: |
  Draft a conflict of interest disclosure letter
  to two existing clients after discovering a
  potential conflict.

  YOUR FIRM: Peterson & Lowe LLP

  CLIENT 1: GreenTech Industries Inc.
  CONTACT: CEO, Laura Chen
  MATTER: Patent infringement defense — accused
  of infringing SmartGrid Corp.'s power management
  patent
  ATTORNEY: Partner Sarah Peterson

  CLIENT 2: SmartGrid Corp.
  CONTACT: General Counsel, Marcus Williams
  MATTER: Regulatory compliance advice on new
  DOE energy efficiency standards (completely
  unrelated to patent litigation)
  ATTORNEY: Partner James Lowe

  CONFLICT DISCOVERED:
  The firm has been representing SmartGrid Corp.
  on regulatory matters for 2 years. Last month,
  a new patent infringement lawsuit was filed:
  SmartGrid Corp. v. GreenTech Industries Inc.
  GreenTech approached Peterson & Lowe to defend
  the patent case. The intake team failed to catch
  that SmartGrid is an existing client.

  Partner Sarah Peterson has already done 8 hours
  of work on GreenTech's defense before the
  conflict was discovered.

  ANALYSIS:
  - This is a direct conflict under Model Rule
    1.7(a)(1) — representing clients directly
    adverse to each other
  - The patent matter and regulatory matter are
    unrelated in substance
  - However, the firm possesses SmartGrid's
    confidential information from the regulatory
    engagement
  - Informed written consent from BOTH clients is
    required if the conflict is consentable
  - The conflict may NOT be consentable — the firm
    would be adverse to a current client in
    litigation

  OPTIONS:
  1. Seek consent from both clients to continue
     both representations (with ethical wall)
  2. Withdraw from GreenTech's patent defense
     (newer matter) and refer to another firm
  3. Withdraw from SmartGrid's regulatory work
     and continue GreenTech's defense
  4. Withdraw from both matters

  RECOMMENDATION: Option 2 (withdraw from GreenTech,
  refer to qualified patent defense counsel, and
  continue SmartGrid regulatory work)

  Draft BOTH disclosure letters (one to each client).

assertions:
  - type: llm_judge
    criteria: "Disclosure letters are transparent and complete — each client receives full disclosure of the conflict, how it was discovered, and what work has been performed; the letters explain Model Rule 1.7(a)(1) in plain language (the firm has two clients who are adverse to each other); the 8 hours of work already performed on GreenTech's defense is disclosed; the letters acknowledge the intake failure and take responsibility; each letter explains the firm's recommendation and asks for the client's input; both letters are drafted simultaneously showing consistent treatment."
    weight: 0.35
    description: "ConflictTransparency"
  - type: llm_judge
    criteria: "GreenTech's letter handles the withdrawal sensitively — explains that the firm must withdraw from the patent defense due to the conflict; provides referrals to qualified patent defense counsel; offers to facilitate a smooth transition of the 8 hours of work product; addresses what happens to confidential information GreenTech has shared (it remains protected); does not charge for the conflicted work already performed (or offers a significant discount); the tone is apologetic for the intake error while maintaining professionalism; the letter ensures GreenTech's interests are protected during the transition."
    weight: 0.35
    description: "WithdrawalLetter"
  - type: llm_judge
    criteria: "SmartGrid's letter maintains the existing relationship — informs Marcus Williams of the situation transparently; explains that the firm is withdrawing from the adverse representation (GreenTech) to continue serving SmartGrid; assures SmartGrid that no confidential information was shared with GreenTech's defense team; describes any ethical wall that was implemented upon discovery of the conflict; the letter reinforces the firm's commitment to SmartGrid's interests; the tone is professional and proactive, demonstrating the firm's ethical standards rather than defensiveness about the intake failure."
    weight: 0.30
    description: "ExistingClientMaintenance"
