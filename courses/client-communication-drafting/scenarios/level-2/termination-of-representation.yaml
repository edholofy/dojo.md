meta:
  id: termination-of-representation
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft a termination of representation letter — professionally terminate the attorney-client relationship, explain the reasons, protect the client's interests, and comply with ethical obligations"
  tags: [termination, withdrawal, ethical-obligations, intermediate]

state: {}

trigger: |
  Draft a termination of representation letter
  to a client whose relationship with the firm
  has become untenable.

  CLIENT: Richard Blake
  CASE: Blake v. Oakwood Apartments — personal
  injury (slip and fall in apartment common area)
  YOUR FIRM: Santos & Rivera LLP
  ATTORNEY: Maria Santos, Partner

  REASONS FOR TERMINATION:
  - Richard has failed to respond to 6 phone calls
    and 4 emails over the past 3 months
  - He missed his own deposition twice without
    explanation (court has warned of sanctions)
  - He failed to provide medical authorizations
    requested 4 months ago
  - His medical bills remain unverified because he
    won't cooperate
  - Richard owes $3,500 in costs that were advanced
    and invoiced
  - The firm suspects Richard may have settled
    directly with the apartment complex behind the
    firm's back (an acquaintance mentioned Richard
    received a check)

  CASE STATUS:
  - Discovery deadline: April 15, 2025 (7 weeks away)
  - Trial date: June 10, 2025
  - Outstanding discovery: Richard's deposition,
    medical authorizations, expert report
  - If Richard does not complete discovery, the case
    may be dismissed with prejudice

  ETHICAL REQUIREMENTS:
  - Must give reasonable notice
  - Must protect client's interests (return file,
    provide deadlines)
  - Must obtain court permission to withdraw
    (litigation is pending)
  - Cannot reveal privileged reasons for withdrawal
    to the court
  - Must return any unearned fees (none here — costs
    were advanced and earned)

  Draft the termination letter.

assertions:
  - type: llm_judge
    criteria: "Termination letter is professional and protects the client's interests — despite the frustrating circumstances, the letter maintains a professional tone without accusation; clearly states the firm's intention to withdraw; lists the specific instances of non-cooperation factually (missed depositions, unanswered communications, missing authorizations) as the basis for withdrawal; informs Richard that the firm will file a motion to withdraw with the court and he will have an opportunity to respond; provides all critical deadlines he must be aware of (discovery April 15, trial June 10); returns or offers to transfer his file to new counsel."
    weight: 0.35
    description: "ProfessionalTermination"
  - type: llm_judge
    criteria: "Ethical obligations are satisfied — the letter gives reasonable notice of withdrawal; informs Richard of the need to obtain substitute counsel promptly given the pending deadlines; offers to cooperate with any new attorney's transition; provides a complete list of what's in the client file and how to retrieve it; addresses the $3,500 in advanced costs owed; does NOT reference the suspected direct settlement (the firm cannot accuse without proof, and this may implicate privilege); the letter explains that the court must approve the withdrawal before it becomes effective; all Model Rule 1.16 requirements are met."
    weight: 0.35
    description: "EthicalCompliance"
  - type: llm_judge
    criteria: "Critical deadlines and consequences are prominently communicated — the letter warns Richard in clear terms that the discovery deadline (April 15) and trial date (June 10) are approaching; explains that failure to complete his deposition and provide medical authorizations could result in case dismissal with prejudice (meaning he cannot refile); warns about potential sanctions from the court for missed depositions; emphasizes the urgency of retaining new counsel; provides the firm's contact information for file transfer coordination; the deadline warnings protect both the client's interests and the firm from malpractice exposure."
    weight: 0.30
    description: "DeadlineCommunication"
