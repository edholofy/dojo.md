meta:
  id: expert-witness-engagement
  level: 2
  course: client-communication-drafting
  type: output
  description: "Draft client communication about expert witness retention — explain the need for expert testimony, present expert options, discuss costs, and obtain client authorization for expert engagement"
  tags: [expert-witness, case-strategy, cost-authorization, intermediate]

state: {}

trigger: |
  Draft a letter to your client explaining the
  need to retain expert witnesses and requesting
  authorization for the associated costs.

  CLIENT: Susan and Tom Morgan
  CASE: Morgan v. Premier Home Builders Inc. —
  construction defect (water intrusion in new home)
  YOUR FIRM: Rodriguez & Associates
  ATTORNEY: Ana Rodriguez, Partner

  BACKGROUND:
  The Morgans purchased a new home from Premier
  Home Builders for $750,000 in March 2023. By
  September 2023, they noticed water intrusion
  in the basement and around windows. They've
  spent $18,000 on temporary repairs. The case is
  now in litigation and discovery is underway.

  EXPERTS NEEDED:

  1. Construction Defect Expert
  - Purpose: Inspect the home, identify all defects,
    testify about standard of care violations
  - Recommended: Dr. Robert Kim, PE — 20 years
    experience, testified in 50+ cases
  - Cost: $15,000 inspection and report; $5,000
    for deposition; $8,000 for trial testimony
  - Total estimated: $28,000

  2. Damages Expert / Cost Estimator
  - Purpose: Calculate full repair costs for all
    identified defects
  - Recommended: BuildCalc Associates (construction
    cost estimation firm)
  - Cost: $8,000 report; $3,000 deposition; $5,000
    trial
  - Total estimated: $16,000

  3. Mold Remediation Expert (if mold found)
  - Purpose: Assess health risks and remediation
    costs if mold is present
  - May or may not be needed depending on inspection
  - Cost: $5,000-$12,000

  TOTAL ESTIMATED EXPERT COSTS: $44,000-$56,000

  CASE VALUE:
  - Estimated repair costs: $150,000-$250,000
  - Loss of use damages: $25,000
  - Diminished property value: $50,000-$100,000
  - Total estimated value: $225,000-$375,000

  The Morgans are on a tight budget and will need
  to fund expert costs upfront (not contingency).

  Draft the letter explaining the expert needs and
  seeking authorization.

assertions:
  - type: llm_judge
    criteria: "Expert needs are justified by case strategy — explains why each expert is necessary (the construction defect expert establishes liability, the damages expert quantifies repair costs, the mold expert addresses potential health claims); connects each expert to a specific legal element the Morgans need to prove; explains what happens if experts are NOT retained (case weakened, potentially dismissed on summary judgment for lack of expert proof); the justification helps the Morgans understand that expert costs are an investment in their case, not an optional expense."
    weight: 0.35
    description: "ExpertJustification"
  - type: llm_judge
    criteria: "Cost presentation is transparent and budget-conscious — presents each expert's costs broken down by phase (report, deposition, trial) so the Morgans understand what they're paying for; the total range ($44,000-$56,000) is presented in context of the case value ($225,000-$375,000) to show the investment is proportional; acknowledges the Morgans' tight budget and suggests phased engagement (construction expert first, damages expert after inspection, mold expert only if needed); addresses whether any costs might be recoverable from the defendant if they win."
    weight: 0.35
    description: "CostTransparency"
  - type: llm_judge
    criteria: "Letter obtains informed authorization — provides enough information for the Morgans to make a knowing decision; presents the expert recommendations as the attorney's professional judgment while making clear the clients authorize the expenditure; includes a signature line or authorization form for the Morgans to approve the expert engagement; offers to discuss in a phone call or meeting before proceeding; addresses the timeline (when each expert needs to be retained relative to discovery deadlines); the letter fulfills the duty to consult with clients about costs under Model Rules 1.4 and 1.5."
    weight: 0.30
    description: "InformedAuthorization"
