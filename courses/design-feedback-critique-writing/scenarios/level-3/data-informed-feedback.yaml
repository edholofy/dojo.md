meta:
  id: data-informed-feedback
  level: 3
  course: design-feedback-critique-writing
  type: output
  description: "Data-informed feedback — use analytics, heatmaps, and user research to ground design critique in evidence"
  tags: [data-informed, analytics, heatmaps, evidence, advanced]

state: {}

trigger: |
  A designer proposes a major redesign of a SaaS pricing
  page. Before the critique, you review the available data:

  Analytics:
  - Current page has 12% conversion rate (visitor to
    trial signup)
  - 65% of users scroll past the fold
  - Average time on page: 2 minutes 15 seconds
  - Mobile traffic: 40% but only 6% mobile conversion

  Heatmap data:
  - Most clicks on the 'Enterprise' plan card, but most
    signups are for the 'Pro' plan
  - FAQ section gets heavy scroll attention but low click
  - The feature comparison table gets almost no attention

  User research (5 interviews):
  - 4/5 users said the pricing tiers were confusing
  - 3/5 couldn't find the information they needed to
    decide between plans
  - All 5 said they wished they could see a simple
    comparison

  The designer's redesign: simplified to 3 plans (from 5),
  added a comparison toggle, moved FAQ above the fold,
  removed the feature comparison table.

  Task: Write data-informed feedback on the redesign,
  using the available evidence to support or challenge
  each decision.

assertions:
  - type: llm_judge
    criteria: "Response uses data to evaluate each design decision — plan simplification (supports: 4/5 users found tiers confusing, reducing from 5 to 3 reduces cognitive load, counter-question: which 2 plans were removed? if Enterprise was removed despite getting the most clicks, that needs justification — clicks indicate interest even if conversion is elsewhere), comparison toggle (strongly supports: 3/5 couldn't compare plans, 'wished they could see a simple comparison' — direct user request, the toggle approach is arguably better than the table which got no heatmap attention), FAQ above fold (mixed signal: FAQ gets heavy scroll attention which suggests interest, but moving it above fold may push the pricing cards — the actual conversion elements — further down, consider: keep FAQ accessible but don't let it compete with the pricing cards), removing comparison table (supports: heatmap shows almost no attention, but question: was it ignored because it was bad, or because it was buried? the redesigned comparison toggle may serve the same need better — if the toggle works, removing the table is justified)."
    weight: 0.35
    description: "DataInformedFeedback"
  - type: llm_judge
    criteria: "Response identifies data gaps and recommends additional research — mobile conversion gap (current: 40% of traffic but only 6% conversion vs 12% desktop — the redesign must specifically address mobile, does the new design improve the mobile experience? request: mobile-specific mockup and mobile user testing), Enterprise interest vs Pro conversion (heatmap shows Enterprise clicks but Pro conversions — why? are users clicking Enterprise out of curiosity but choosing Pro on price? or are Enterprise users abandoning? this insight should inform how the 3 plans are positioned), what the data doesn't tell us (5 user interviews is a small sample — directionally useful but not statistically significant, heatmap shows where people click but not why — interpretation requires caution, correlation ≠ causation: high FAQ attention might mean users are confused, not that FAQ is valuable content), recommended next steps (A/B test the redesign against current page — the 12% conversion rate is the baseline to beat, set success criteria before launching: target conversion rate, mobile conversion improvement, and time-to-decision reduction)."
    weight: 0.35
    description: "DataGapsAndResearch"
  - type: llm_judge
    criteria: "Response models data-informed critique methodology — how to use data in feedback (cite specific data points: 'The heatmap shows the comparison table receives almost no attention, which supports your decision to remove it,' not 'I think the table should go' — data transforms opinion into evidence), data hierarchy in critique (quantitative data — analytics, heatmaps — tells you WHAT is happening, qualitative data — user interviews — tells you WHY, together they inform design decisions — neither alone is sufficient, the designer's redesign addresses the WHY from interviews but should be validated with WHAT from analytics after launch), avoiding data worship (data-informed not data-driven: data is input not dictator, some design improvements can't be predicted by current data — the redesign may improve metrics in ways current analytics can't anticipate, trust professional judgment when data is ambiguous — the designer's simplification instinct aligns with the research even if the heatmap data is less clear)."
    weight: 0.30
    description: "DataInformedMethodology"
