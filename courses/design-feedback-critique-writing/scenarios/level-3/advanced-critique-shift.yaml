meta:
  id: advanced-critique-shift
  level: 3
  course: design-feedback-critique-writing
  type: output
  description: "Advanced critique shift — handle multiple advanced design feedback challenges in a single session"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You're a lead designer handling escalated critique
  situations:

  TASK 1 — A designer's work was criticized publicly
  by a VP who said: "This looks like it was designed
  by someone who doesn't understand our users." The
  designer is devastated and considering quitting. You
  need to write a response to the VP that defends the
  designer while addressing any legitimate concerns.

  TASK 2 — You're reviewing a complex enterprise form
  with 40 fields across 5 sections. The designer says
  "all 40 fields are required by the business." Your
  user research shows 60% form abandonment rate. Write
  feedback that challenges the requirements without
  dismissing the business need.

  TASK 3 — Two senior designers disagree about a
  navigation pattern. Designer A wants a left sidebar
  (traditional), Designer B wants a top navigation bar
  (modern). Both have valid arguments and the debate has
  stalled the project for 2 weeks. Write a critique
  that breaks the deadlock.

  Task: Handle all three advanced critique challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — VP's destructive feedback — written response to VP (professional but firm: 'I appreciate your engagement with the design process. I'd like to discuss your concerns about the user understanding — can you share specific elements that don't align with user needs? That will help us address the issue directly. I'd also like to note that public criticism of an individual designer's competence can undermine team psychological safety and discourage the risk-taking that leads to innovative design. I'd welcome the opportunity to present our user research and design rationale in a follow-up meeting.'), support for the designer (private: acknowledge their feelings, validate that the VP's delivery was inappropriate regardless of any design merit, help separate the feedback from the attack — is there a legitimate concern behind the harsh delivery?, if so: address the design issue professionally, if not: escalate the behavior to the VP's manager or HR if appropriate), systemic action (propose ground rules for future reviews: feedback must be about design decisions not designer competence, all feedback must be specific and actionable, concerns about 'user understanding' must cite evidence)."
    weight: 0.35
    description: "DestructiveFeedbackResponse"
  - type: llm_judge
    criteria: "Response handles Task 2 — challenging 40-field requirement — data-driven challenge ('Our user research shows 60% form abandonment — meaning 60% of users who start this form never complete it. Every abandoned form is a lost opportunity. We can keep all 40 fields and lose 60% of submissions, or we can find a better approach.'), alternative approaches (progressive disclosure: show 12 essential fields first, reveal remaining 28 in logical groups as user progresses — studies show multi-step forms improve completion, conditional fields: do all 40 apply to every user? likely not — show only fields relevant to the user's context, reduce perceived complexity, 'save and continue later': for genuinely complex forms, let users save progress — removes the all-or-nothing pressure), framing for the business ('I'm not saying we don't need the data — I'm saying the current approach isn't getting us the data either. 60% abandonment means we're capturing 0 of those 40 fields for most users. A progressive approach may get us 15 fields from 90% of users, then 40 fields from 70% — which gets us MORE data overall.')"
    weight: 0.35
    description: "RequirementChallenge"
  - type: llm_judge
    criteria: "Response handles Task 3 — breaking the navigation deadlock — moves beyond preference to criteria ('We've been debating sidebar vs. top nav for 2 weeks based on preference. Let's define the criteria that matter and evaluate both objectively: 1. Information architecture — how many top-level items? 2. Content density — how much horizontal space does the content need? 3. User task patterns — do users need to see nav while working? 4. Scalability — can the pattern accommodate future growth?'), evidence-based evaluation (sidebar works better when: many navigation items 8+, nested hierarchy, users need to see nav while working, content doesn't need full width; top nav works better when: fewer items 5-7, flat hierarchy, content needs maximum width like dashboards, global navigation with minimal depth — evaluate against the actual product requirements), resolution approach (if criteria clearly favor one option: present the evidence-based decision, if criteria are split: prototype both, user-test with 5 users on a specific task, let data decide — 'let's spend 2 days prototyping both and 1 day testing instead of 2 more weeks debating' — action is faster than argument)."
    weight: 0.30
    description: "DeadlockBreaker"
