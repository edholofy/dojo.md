meta:
  id: content-design-critique
  level: 3
  course: design-feedback-critique-writing
  type: output
  description: "Content design critique — review UX copy, microcopy, and content within designs for clarity, consistency, and tone"
  tags: [content, ux-copy, microcopy, tone, advanced]

state: {}

trigger: |
  A designer asks for feedback on a payment flow. The
  visual design is solid, but the copy has issues:

  1. Error message: "Error 422: Unprocessable entity"
     — shown to end users when payment fails
  2. Button label on confirmation: "Submit" (submit what?)
  3. Empty state on transaction history: "No data found"
  4. Success message: "Your payment has been successfully
     processed and the transaction has been completed
     and recorded in our system." (42 words)
  5. Tooltip on a credit card icon: "Click here to add
     a new payment method to your account for future
     transactions" (16 words for a tooltip)
  6. The page uses "payment method," "card," "payment
     instrument," and "billing method" interchangeably

  The designer says: "I focus on visual design — I'm
  not sure what good copy looks like."

  Task: Write content-focused design feedback on the
  copy issues with principles and rewrites.

assertions:
  - type: llm_judge
    criteria: "Response rewrites each copy issue — technical error (original: 'Error 422: Unprocessable entity' → rewrite: 'Payment couldn't be processed. Please check your card details and try again.' — principle: never expose technical errors to users, explain what happened and what to do next), vague button (original: 'Submit' → rewrite: 'Pay $49.99' or 'Confirm Payment' — principle: buttons should describe the outcome, not the action of clicking), empty state (original: 'No data found' → rewrite: 'No transactions yet. Your payment history will appear here.' — principle: empty states should explain what will appear and why it's empty), verbose success (original: 42 words → rewrite: 'Payment complete! Check your email for a receipt.' — principle: success messages should be brief and celebratory, not bureaucratic), long tooltip (original: 16 words → rewrite: 'Add payment method' — principle: tooltips should be 3-5 words maximum, supplementary not instructional), inconsistent terminology (original: 4 different terms → rewrite: pick one — 'payment method' — and use it everywhere — principle: consistency reduces cognitive load)."
    weight: 0.35
    description: "CopyRewrites"
  - type: llm_judge
    criteria: "Response teaches content design principles — user-centered language (write for the user's context and emotional state — a payment error is stressful, so clear and calm language matters more than technical accuracy), progressive disclosure in copy (error messages: what happened → what to do, success messages: confirmation → next step — each message answers the user's immediate question), voice and tone consistency (the interface should have a consistent personality — friendly or formal, active or passive — mixing 'Click here to add' with 'Your payment has been processed' feels inconsistent), the writer's maxim (say the same thing in fewer words — every word should earn its place, if removing a word doesn't change the meaning, remove it), and labels as UX (button labels, field labels, and navigation text are the primary way users understand what things do — bad labels cause as many usability problems as bad layouts)."
    weight: 0.35
    description: "ContentPrinciples"
  - type: llm_judge
    criteria: "Response addresses the designer's copy skills gap — practical guidance (you don't need to be a copywriter, but you should: read your UI copy out loud — if it sounds awkward, it reads awkward, use the 'mom test' — would your mom understand this message?, keep a style guide reference — consistent terminology list, for error messages always: say what happened + what to do, for buttons always: describe the result not the click), suggest collaboration (if your organization has a content designer or UX writer — involve them in design reviews, if not: create a simple content checklist for self-review before presenting), and content review checklist (Is every error message user-friendly? Do button labels describe outcomes? Are empty states helpful? Is copy concise? Is terminology consistent? Does tone match the brand voice? — 6 questions to check before any design review)."
    weight: 0.30
    description: "DesignerGuidance"
