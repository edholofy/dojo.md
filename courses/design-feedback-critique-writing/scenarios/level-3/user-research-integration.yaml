meta:
  id: user-research-integration
  level: 3
  course: design-feedback-critique-writing
  type: output
  description: "User research integration — ground design feedback in user research findings rather than assumptions"
  tags: [user-research, evidence-based, assumptions, testing, advanced]

state: {}

trigger: |
  During a design review, the following debate occurs:

  Designer: "I put the key actions in a floating action
  button (FAB) because mobile users need quick access."

  PM: "Users will never find that — they don't know
  what the + button does. Put explicit buttons instead."

  Senior Designer: "FABs work great — Google uses them
  in all their apps. Users are trained on this pattern."

  UX Researcher (quietly): "Actually, we have data on
  this. In our usability tests last quarter, 3 out of
  8 participants couldn't find the FAB on our current
  app. And 2 of the 5 who found it thought it was only
  for adding new items, not for the other actions we
  put inside it."

  The room goes quiet. The data contradicts both the
  designer's assumption and the senior designer's
  confidence.

  Task: Write a critique that integrates the user
  research data to resolve the debate and teach the
  team how to use research in critiques.

assertions:
  - type: llm_judge
    criteria: "Response uses research data to resolve the debate — data-first framing ('Let's start with what we know from testing: 37.5% of users couldn't find the FAB, and 40% of those who did find it had misconceptions about its purpose. This is significant — it means over half of users either can't use or misunderstand this interaction pattern in our specific product.'), addresses each position with data (designer's assumption: 'quick access' via FAB is only true for users who find it — research shows 37.5% didn't, the assumption is disproven; PM's 'users will never find it': partially validated — not 'never' but a significant number didn't, the concern was directionally correct; senior designer's 'Google uses it': Google's context differs — their apps are used daily by billions, pattern familiarity varies by user population, our specific users showed lower familiarity), and clear recommendation (based on the data: the FAB is not serving its intended purpose for a significant portion of users — redesign with explicit, visible action buttons or a clearly labeled expandable menu)."
    weight: 0.35
    description: "ResearchBasedResolution"
  - type: llm_judge
    criteria: "Response teaches research integration in critique — principles (research evidence should be the tiebreaker when opinions conflict — not seniority, not conviction, not 'Google does it', when research data exists and is relevant: it should be cited in the critique, when no research exists: identify the assumption and recommend testing before making a final decision), common anti-patterns (highest-paid person's opinion — HiPPO — overriding data, anecdotal evidence treated as research: 'my mom couldn't find it' is not usability testing, outdated research applied to new context: testing from 2 years ago may not reflect current users, cherry-picking research: citing only the findings that support your position), and practical advice for this team (UX researcher spoke 'quietly' — this is a culture problem, research should have equal weight to design and business opinions in critique, establish a practice: before every design review, the researcher shares relevant findings from prior testing, include 'What assumptions are we making?' as a standing question in every critique)."
    weight: 0.35
    description: "ResearchIntegrationPrinciples"
  - type: llm_judge
    criteria: "Response provides a path forward that serves the team — specific design recommendation (given the data: Option A — explicit labeled buttons for primary actions — always visible, no discoverability issue, tested pattern; Option B — labeled FAB with text label like '+ New' instead of just an icon — improves discoverability; Option C — contextual action bar at the bottom with labeled icons — combines quick access with clarity; recommend testing the best option with users before finalizing), process improvement (propose a standard: every design review includes a 'Research Check' — what relevant user data do we have? what assumptions are we making? does this need testing before we commit? — this prevents debates from being settled by opinion when data could inform the decision), and team dynamics (acknowledge that contradicting a senior designer with data requires courage — the researcher should be praised for speaking up, create safety for data-driven dissent: 'In this team, research findings override seniority — that's how we make better products')."
    weight: 0.30
    description: "PathForward"
