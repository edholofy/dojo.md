meta:
  id: critique-frameworks
  level: 2
  course: design-feedback-critique-writing
  type: output
  description: "Critique frameworks — apply structured frameworks like I Like/I Wish/What If and Rose/Bud/Thorn to design reviews"
  tags: [frameworks, i-like-i-wish, rose-bud-thorn, structured, intermediate]

state: {}

trigger: |
  A design team lead says: "My team gives random,
  unstructured feedback. Some people only say positive
  things, others only criticize. There's no consistency.

  I've heard about frameworks like 'I Like / I Wish /
  What If' and 'Rose / Bud / Thorn.' Which should we
  use, and how do we apply them properly?

  Example: A designer just presented a new onboarding
  flow — 5 screens, first-time user experience. We
  need to give feedback on it. Show me how each
  framework would structure the feedback."

  Task: Explain critique frameworks and demonstrate
  each one applied to the onboarding flow example.

assertions:
  - type: llm_judge
    criteria: "Response explains multiple critique frameworks — I Like / I Wish / What If (I Like: specific positive observations tied to design goals — 'I like that the progress indicator shows 3 of 5 steps — it reduces abandonment anxiety', I Wish: areas for improvement framed constructively — 'I wish the skip option was more visible — users who already know this feature shouldn't be forced through it', What If: creative exploration and alternatives — 'What if we personalized the onboarding based on user role — an admin sees different screens than a viewer?'), Rose / Bud / Thorn (Rose: what's working well — 'the illustration style is consistent and welcoming', Bud: potential that could be developed — 'the tooltip on step 3 could expand into a more interactive tutorial', Thorn: what needs attention — 'the text on screen 2 is too dense — 150 words is too much for an onboarding screen'). Each framework is applied to the actual onboarding scenario, not just described abstractly."
    weight: 0.35
    description: "FrameworkExplanation"
  - type: llm_judge
    criteria: "Response compares frameworks and recommends — when to use each (I Like/I Wish/What If: best for early-stage designs where creative exploration is valued — the 'What If' component encourages blue-sky thinking, great for brainstorming; Rose/Bud/Thorn: better for evaluating more developed designs — 'Bud' identifies latent potential rather than wild alternatives, more grounded), team adoption considerations (simpler frameworks get adopted faster — ILIWWI is easy to remember and naturally balanced, some teams find 'I Wish' too soft — can replace with 'I Wonder' or 'I'd Improve', Rose/Bud/Thorn metaphor is intuitive but some people confuse Bud and Rose), and provides a recommendation for this team (given they have inconsistency problems: start with ILIWWI because it naturally ensures balanced feedback — every reviewer must provide at least one of each, add a priority marker to each item: 'must address' vs 'consider' vs 'explore')."
    weight: 0.35
    description: "ComparisonAndRecommendation"
  - type: llm_judge
    criteria: "Response shows practical implementation — how to run a framework-based critique session (1. Facilitator presents the framework and rules — 2 minutes, 2. Designer presents work with specific questions — 5 minutes, 3. Silent individual review — each reviewer writes feedback using the framework — 5 minutes, 4. Round-robin sharing — each person shares top items from each category — 15 minutes, 5. Facilitator synthesizes themes and action items — 3 minutes), documentation template (table format: Framework Category | Feedback | Priority | Action Required), pitfalls to avoid (framework fatigue: don't force every review through a framework — sometimes informal feedback is appropriate, gaming the framework: writing token positives just to satisfy the 'I Like' requirement — positives should be genuine, framework as crutch: eventually the team should internalize balanced feedback without needing the structure)."
    weight: 0.30
    description: "PracticalImplementation"
