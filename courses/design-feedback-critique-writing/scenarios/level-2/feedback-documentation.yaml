meta:
  id: feedback-documentation
  level: 2
  course: design-feedback-critique-writing
  type: output
  description: "Feedback documentation — create thorough design review documentation that tracks decisions, rationale, and action items"
  tags: [documentation, tracking, decisions, rationale, intermediate]

state: {}

trigger: |
  A design manager says: "We have a recurring problem:
  feedback gets lost. Here's what happens:

  1. Great feedback is given in a critique session
  2. Nobody writes it down comprehensively
  3. The designer remembers some feedback but forgets
     other pieces
  4. Three weeks later, a stakeholder asks 'didn't we
     agree to change that?' and nobody can confirm
  5. The same feedback is given again in the next review
     because nobody tracked what was already addressed
  6. Design decisions have no documented rationale —
     new team members don't know WHY things look this way

  I need a system for documenting design feedback that
  actually works."

  Task: Create a design feedback documentation system
  with templates, workflows, and rationale tracking.

assertions:
  - type: llm_judge
    criteria: "Response creates a documentation system — critique session notes template (date, attendees, design reviewed with version/link, context and goals, feedback items captured with: description, who raised it, priority, decision — accept/defer/reject with rationale, assigned owner, status — open/in-progress/resolved), design decision log (separate from session notes: logs WHY major design decisions were made — 'We chose a tab navigation over a sidebar because user testing showed 60% faster task completion — decided in Review #3 on [date]' — provides institutional memory for new team members), version tracking (each review references a specific design version — 'Reviewed V3 of checkout flow' — so feedback can be traced to the exact iteration, before/after documentation: when feedback is implemented, capture both states — what changed and why)."
    weight: 0.35
    description: "DocumentationSystem"
  - type: llm_judge
    criteria: "Response provides practical workflow — capture workflow (during session: dedicated note-taker captures all feedback in real-time using the template, within 24 hours: facilitator cleans up notes, adds priorities and assignments, shares with all participants for confirmation, ongoing: designer updates status of each item as they address it, before next review: facilitator reviews open items from previous session — nothing falls through the cracks), tooling recommendations (Notion/Confluence: structured templates with status tracking, Figma comments: spatial feedback directly on designs, linked to session notes, Jira/Linear: actionable items from feedback converted to tickets for tracking, choose one system and be consistent — multiple systems = lost feedback), and the 3-week problem solution (before each review session: facilitator pulls up the previous session's notes and checks status of each item — 'Last session we agreed to change the button color — has that been done?' — creates accountability and prevents repeating resolved discussions)."
    weight: 0.35
    description: "PracticalWorkflow"
  - type: llm_judge
    criteria: "Response addresses rationale preservation — why document rationale (new team members: can understand why the design looks the way it does without re-debating resolved questions, future decisions: 'we tried X and rejected it because of Y' prevents circular discussions, stakeholder management: 'this was decided on [date] with [people] present based on [evidence]' resolves 'didn't we agree to change that?' disputes), rationale capture format (each major design decision: Decision — what was decided, Alternatives Considered — what else was evaluated, Rationale — why this option was chosen, Evidence — data, research, or testing that supported the decision, Stakeholders — who was involved in the decision, Date — when it was decided), and maintenance (documentation only works if maintained: assign ownership — someone is responsible for keeping it current, integrate into workflow — not an extra step but part of the design process, review quarterly: archive old decisions, update current ones, remove outdated rationale)."
    weight: 0.30
    description: "RationalePreservation"
