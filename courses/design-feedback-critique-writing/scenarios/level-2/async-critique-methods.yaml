meta:
  id: async-critique-methods
  level: 2
  course: design-feedback-critique-writing
  type: output
  description: "Async critique methods — design and implement effective asynchronous design review processes for distributed teams"
  tags: [async, remote, distributed, written, intermediate]

state: {}

trigger: |
  A design manager says: "My team is spread across
  4 time zones (US West, US East, London, Singapore).
  Live design reviews only work for 2 of the 4 zones.
  The other 2 always get excluded.

  We tried just posting designs in Slack with 'please
  review.' Results:
  - Most comments were 'looks good' or emoji reactions
  - Feedback came in over 3 days with no clear deadline
  - No structure — some people wrote paragraphs, others
    wrote nothing
  - The designer didn't know when to consider the review
    'done'
  - Critical feedback from Singapore came after the
    design was already in development

  How do we make async design reviews actually work?"

  Task: Design an effective async design critique
  process for a distributed team.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured async review process — review request format (standardized template: Design Link, Context — what problem this solves, Specific Questions — 2-3 focused questions the designer wants answered, Review Deadline — specific date/time, Review Type — quick check/detailed review/approval needed, What's NOT being reviewed — prevent off-topic feedback), review timeline (clear SLA: reviewers have 48 hours to submit feedback, feedback window is fixed — after deadline, review is considered complete, urgency levels: standard 48h, expedited 24h, critical same-day with explicit notification), reviewer expectations (minimum feedback: answer the designer's specific questions, use the structured format — not free-form comments, 'looks good' is only acceptable with: 'I reviewed for [scope] and found no issues')."
    weight: 0.35
    description: "AsyncProcess"
  - type: llm_judge
    criteria: "Response provides tools and techniques for quality async feedback — Figma/design tool comments (annotate directly on the design — spatial context makes feedback clearer, use comment threads for discussion not just one-off comments, resolve comments when addressed — creates clear resolution tracking), video walkthroughs (Loom or similar: designer records a 3-5 minute walkthrough of the design explaining decisions — reviewers understand context before commenting, reviewers can record video feedback for complex issues — 'let me show you what I mean' is more effective than writing a paragraph), structured feedback document (shared doc alongside the design: organized by section or screen, each reviewer adds feedback in a consistent format, facilitator synthesizes themes and creates action items after review window closes), and timezone-inclusive practices (rotating the 'priority review' zone so no team always goes last, stagger review requests: post at a time when Singapore can see it first occasionally, summary document ensures late reviewers see prior feedback and build on it)."
    weight: 0.35
    description: "ToolsAndTechniques"
  - type: llm_judge
    criteria: "Response addresses common async pitfalls — 'looks good' problem (require structured responses: every reviewer must address each of the designer's specific questions — if the answer is genuinely 'no issues,' they must state what they evaluated: 'I reviewed the flow for edge cases and error states — no issues found'), late feedback problem (hard deadline enforced — if critical feedback arrives after the deadline: it's flagged for the next iteration, not used to block current progress, exception process for genuine blockers: accessibility violations or data privacy issues can override the deadline), lack of engagement (if reviewers consistently don't participate: rotate responsibility — assign 2-3 specific reviewers per review rather than 'everyone review', accountability: review participation tracked, discussed in 1:1s), and the 'done' signal (facilitator sends a summary when the review window closes: 'Review complete. Key feedback: [themes]. Action items: [list]. Moving to implementation on [date].' — creates clear closure)."
    weight: 0.30
    description: "PitfallPrevention"
