meta:
  id: prioritizing-contradictory-feedback
  level: 2
  course: design-feedback-critique-writing
  type: output
  description: "Prioritizing contradictory feedback — resolve conflicting design feedback from multiple stakeholders"
  tags: [contradictory, conflict, prioritization, resolution, intermediate]

state: {}

trigger: |
  A designer receives contradictory feedback on a
  product page:

  VP of Marketing: "Add more content — product details,
  testimonials, comparison table, FAQs. Long pages
  convert better."

  VP of Engineering: "Simplify this page. Every element
  adds load time. Keep it minimal for performance."

  UX Researcher: "Our testing shows users scroll past
  the fold but most conversions happen above the fold.
  Users are browsing, not reading everything."

  Head of Design: "The brand guidelines call for
  generous whitespace and minimal layouts. This is
  too dense."

  The designer asks: "They all outrank me and they
  all disagree. Whose feedback do I follow?"

  Task: Help the designer resolve contradictory feedback
  with a decision framework.

assertions:
  - type: llm_judge
    criteria: "Response provides a decision framework for contradictory feedback — hierarchy of evidence (1. User data and research > 2. Business metrics > 3. Technical constraints > 4. Design principles > 5. Individual preferences — when stakeholders disagree, defer to the highest evidence level available), applied to this situation (the UX researcher's data is the strongest signal: users scroll but convert above fold — this informs the solution, the engineer's performance concern is a measurable constraint — not optional, the marketer's 'long pages convert better' needs qualification: for THEIR product or in general? — request data, the head of design's brand guidelines are important but guidelines serve goals not the other way around), the key insight (these aren't actually all contradictory — they can be reconciled with the right design approach)."
    weight: 0.35
    description: "DecisionFramework"
  - type: llm_judge
    criteria: "Response proposes a solution that addresses all concerns — reconciliation approach (above-fold focus: put the core value proposition, key visual, and CTA above the fold — addresses UX research finding about conversion location AND brand's whitespace requirement, progressive disclosure below: testimonials, comparison table, FAQs available for scrollers — addresses marketing's content needs without forcing density, lazy loading: content below fold loads on scroll — addresses engineering's performance concern, the page can be long AND fast AND clean if content is prioritized correctly), communication (present the solution to each stakeholder showing how their concern is addressed: 'Marketing: all your content is included, prioritized by conversion impact. Engineering: lazy loading keeps initial load under 2s. Design: above-fold section has generous whitespace. Research: conversion elements are above fold where data shows they matter most.')."
    weight: 0.35
    description: "ReconciliationSolution"
  - type: llm_judge
    criteria: "Response teaches the political and process skills — navigating hierarchy ('they all outrank me' — this is a design maturity issue, not a seniority issue: the designer should present data and reasoning, not just obey the loudest VP, frame as: 'I've synthesized everyone's input and here's my recommendation based on our user data' — you're not choosing sides, you're integrating perspectives), escalation protocol (if stakeholders truly can't be reconciled: identify the decision-maker — who has final authority on product page content and design? present the trade-offs objectively: 'Option A maximizes content, costs performance. Option B maximizes speed, reduces content. Option C balances both. User data supports C. What would you like to do?'), and prevention (set up a decision-making framework BEFORE designs are reviewed: who has final say on what? content decisions → product/marketing, technical decisions → engineering, design quality → design lead, user experience → data-informed group decision — pre-agreed framework prevents ad-hoc power struggles)."
    weight: 0.30
    description: "PoliticalNavigation"
