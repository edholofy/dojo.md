meta:
  id: design-stage-feedback
  level: 2
  course: design-feedback-critique-writing
  type: output
  description: "Design stage feedback — adapt critique approach for wireframes vs mockups vs prototypes vs production-ready designs"
  tags: [design-stages, wireframe, mockup, prototype, intermediate]

state: {}

trigger: |
  A designer presents a low-fidelity wireframe of a new
  feature. A stakeholder immediately says: "The colors
  are boring, the fonts look bad, and I don't like the
  stock photos."

  The designer responds: "It's a wireframe — there ARE
  no colors, custom fonts, or real photos yet. Those
  decisions come later."

  This happens constantly on the team. People give
  pixel-perfect visual feedback on wireframes and
  conceptual feedback on polished mockups.

  Task: Create a guide for what feedback is appropriate
  at each design stage to prevent mismatched critique.

assertions:
  - type: llm_judge
    criteria: "Response defines feedback appropriate to each design stage — Wireframe/Sketch stage (appropriate: information architecture, content hierarchy, user flow logic, feature inclusion/exclusion, layout structure, navigation patterns; inappropriate: colors, fonts, imagery, visual polish, pixel-level spacing, brand alignment), Mockup/Visual Design stage (appropriate: color palette, typography, visual hierarchy, brand consistency, imagery and illustration style, component styling, accessibility of visual design; inappropriate: fundamental flow changes, feature scope changes, information architecture restructuring — these should have been resolved in wireframe stage), Prototype/Interactive stage (appropriate: interaction patterns, transitions, micro-interactions, error handling, edge cases, responsive behavior, performance feel; inappropriate: wholesale layout changes, brand direction — too late), Production-Ready stage (appropriate: final QA — spacing precision, alignment, responsive breakpoints, copy, accessibility compliance; inappropriate: major direction changes, concept-level feedback — this is refinement not reimagining)."
    weight: 0.35
    description: "StageFeedbackGuide"
  - type: llm_judge
    criteria: "Response addresses the stakeholder misalignment problem — why it happens (non-designers don't understand fidelity levels — they see a screen and react to everything they see or don't see, wireframes without color feel 'unfinished' to stakeholders accustomed to seeing polished screens), how to prevent it (set expectations at the start of every review: 'This is a wireframe — we're reviewing LAYOUT and FLOW, not visual design. Colors and images will come in the next stage.', show a visual legend: 'gray boxes = placeholder images, Lorem ipsum = draft text, no colors = intentional — we're not there yet', add a cover slide or header to design files: 'WIREFRAME — Feedback requested on: navigation structure and content hierarchy. NOT reviewing: visual design, typography, imagery'), how to redirect in the moment ('Great observation about the visual treatment — let me capture that for when we move to the mockup stage. For today, can you focus on whether the flow makes sense for the user?')."
    weight: 0.35
    description: "MisalignmentPrevention"
  - type: llm_judge
    criteria: "Response provides a practical reference the team can use — critique checklist per stage (a table or card set: Design Stage | Review Focus | Questions to Ask | Out of Scope), example questions per stage (Wireframe: 'Does this screen contain all the information the user needs at this point?' 'Is the flow logical from the user's perspective?' 'Are we missing any important use cases?'; Mockup: 'Does this visual hierarchy guide the user's eye correctly?' 'Is the brand voice consistent?' 'Do the colors meet contrast requirements?'; Prototype: 'Does this interaction feel natural?' 'What happens when the user makes an error?' 'How does this behave on a slow connection?'), and stage transition criteria (what must be resolved before moving from wireframe to mockup: flow approved, content structure confirmed, feature scope locked — prevents expensive direction changes at later stages)."
    weight: 0.30
    description: "PracticalReference"
