meta:
  id: design-review-facilitation
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Design review facilitation — set up and facilitate a productive design critique session"
  tags: [facilitation, review, critique-session, process, beginner]

state: {}

trigger: |
  A design team lead says: "Our design reviews are
  terrible. Here's what happens:

  - The designer presents for 20 minutes, leaving only
    10 minutes for actual feedback
  - Feedback is dominated by the loudest person
  - Half the feedback is about personal taste
  - Nobody takes notes, so feedback is forgotten
  - The designer leaves confused about what to actually
    change
  - Sometimes the review devolves into solving problems
    on the spot instead of identifying issues

  We have weekly 30-minute critique sessions with 5
  people. How do I make them productive?"

  Task: Design a structured design critique format
  with facilitation guide, ground rules, and feedback
  framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured critique format — time allocation for 30 minutes (context setting: 3-5 minutes — designer shares the design with specific questions they want answered, NOT a full walkthrough; silent review: 3-5 minutes — everyone looks at the design independently, writes initial thoughts before group discussion; structured feedback: 15 minutes — facilitated discussion following the framework; action items: 5 minutes — facilitator summarizes key feedback, designer confirms understanding, next steps documented), ground rules (feedback must be tied to design goals, user needs, or evidence — not personal taste, everyone contributes — facilitator actively invites quieter participants, identify issues don't solve them — 'this navigation may confuse users' not 'you should move the nav to the left and make it blue and...', presenter asks specific questions — 'Does this flow handle the error case well?' focuses the critique)."
    weight: 0.35
    description: "CritiqueFormat"
  - type: llm_judge
    criteria: "Response provides facilitation techniques — managing dominant voices (facilitator uses round-robin or written-first approach: everyone writes feedback during silent review, then shares one item at a time in turn — prevents one person from dominating, facilitator redirects tangents: 'Great point — let's capture that but stay focused on [the designer's question]'), preventing taste-based feedback (when someone says 'I don't like the color' — facilitator asks: 'Can you frame that in terms of user impact or design goals? What concern does the color raise for our target users?', if feedback can't be reframed from opinion to impact, it's acknowledged and parked: 'Noted as a preference — let's focus on items tied to our goals'), keeping focus (prevent solving on the spot: 'Let's identify all the issues first, then the designer can explore solutions in their own time' — critique is for diagnosis not treatment, facilitator ensures designer's specific questions are answered — not just random observations)."
    weight: 0.35
    description: "FacilitationTechniques"
  - type: llm_judge
    criteria: "Response includes documentation and follow-up — note-taking (designate a note-taker or use a shared document — every piece of feedback captured with: what was said, priority level assigned during discussion, who said it — creates accountability), post-critique summary (facilitator or note-taker sends summary within 24 hours: key decisions made, prioritized action items, open questions for further discussion, next review date — the designer has a clear list of what to address), feedback framework options (offer 1-2 specific frameworks the team can adopt: 'I like / I wish / What if' — simple, balanced, encourages positive and constructive feedback; or 'Rose / Thorn / Bud' — what's working / what's not / what has potential; or custom: 'Does this serve the user goal? / Does it match our standards? / What's the risk?' — whichever the team chooses, consistency is key), and continuous improvement (after 4-6 sessions with the new format: retrospective on the critique process itself — is it working better? what needs adjustment?)."
    weight: 0.30
    description: "DocumentationAndFollowUp"
