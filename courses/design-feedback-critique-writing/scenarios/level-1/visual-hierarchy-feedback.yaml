meta:
  id: visual-hierarchy-feedback
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Visual hierarchy feedback — identify and communicate visual hierarchy issues in a design"
  tags: [visual-hierarchy, layout, scanning, priority, beginner]

state: {}

trigger: |
  A designer shares a dashboard design for review.
  Problems you notice:

  - All cards are the same size and visual weight —
    the most important metric looks identical to the
    least important one
  - The page title and the card titles are the same
    font size (16px bold)
  - Navigation, content, and sidebar all compete for
    attention equally
  - There's a critical alert banner that's styled the
    same as informational content
  - The 'Export Report' action (used daily) and 'Delete
    Account' (used rarely) have identical button styles

  The designer asks: "Does this layout work?"

  Task: Write feedback focused specifically on visual
  hierarchy issues, explaining what hierarchy is and
  why it matters.

assertions:
  - type: llm_judge
    criteria: "Response explains visual hierarchy concept — what it is (visual hierarchy is the arrangement of design elements to guide the user's eye through content in order of importance — the most important elements should be seen first, less important elements should recede), why it matters (without hierarchy, users can't quickly find what they need — everything competes for attention so nothing stands out, in a dashboard: users need to see critical information immediately without hunting), how hierarchy is created (size: larger elements draw attention first, weight: bolder elements stand out, color: high-contrast or saturated colors attract the eye, position: top-left in LTR cultures is seen first, whitespace: isolated elements command more attention than crowded ones), and applies these concepts to the specific dashboard."
    weight: 0.35
    description: "HierarchyExplanation"
  - type: llm_judge
    criteria: "Response provides specific hierarchy feedback for each issue — cards (make the primary KPI card 2x the size of secondary metrics — or use color/border to distinguish primary from secondary, give the most important metric a larger number display), title hierarchy (page title should be 24-28px, card titles 16-18px — at least 1.5x difference to create clear parent-child relationship), content zones (navigation should be visually quieter than content — lighter weight, less saturated color; sidebar should be clearly secondary; main content area should dominate visual attention), alert banner (critical alert needs: contrasting background color like red/orange, icon, larger text weight — it must visually interrupt the default scanning pattern to be noticed), button differentiation (daily action: primary button style — prominent, colored, larger; dangerous rare action: tertiary or text-only style — less prominent, possibly requires confirmation — action importance should match visual prominence)."
    weight: 0.35
    description: "SpecificHierarchyFeedback"
  - type: llm_judge
    criteria: "Response uses the 'squint test' or similar technique — practical testing method (suggest the designer squint at their design or view it at 25% zoom — if everything looks the same blur of equal-weight elements, hierarchy has failed; the most important element should be identifiable even when blurry), before/after description (describe what the current design looks like when squinted: 'a uniform grid of equal rectangles with no focal point' vs what it should look like: 'one large prominent metric at top-left, smaller supporting cards below, quiet navigation along the side'), written as feedback the designer can act on (not a lecture about design theory but practical guidance: 'try making the revenue card span the full width at the top, increase the number font to 48px bold, and reduce the secondary metrics to a compact row below — this immediately tells users what matters most')."
    weight: 0.30
    description: "PracticalTechnique"
