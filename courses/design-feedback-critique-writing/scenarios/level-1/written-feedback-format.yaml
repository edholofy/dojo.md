meta:
  id: written-feedback-format
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Written feedback format — structure written design feedback clearly with annotations and priority levels"
  tags: [written, format, annotations, structure, beginner]

state: {}

trigger: |
  A remote design team needs to switch from verbal
  design reviews to written async feedback. A designer
  says: "We've been doing live critiques but half the
  team is in different time zones. My manager wants us
  to write our feedback instead.

  Problem: when people just comment on Figma, the
  feedback is scattered — random comments on random
  frames, no priority, no structure. Half the comments
  are 'looks good' and the other half are vague.

  How should I structure written design feedback so it's
  clear, organized, and actionable?"

  Task: Create a written design feedback format/template
  that teams can use for async design reviews.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured feedback template — header section (reviewer name, date, design being reviewed with link, review stage: exploration/wireframe/visual/final, time spent reviewing — sets context), summary (2-3 sentence overall impression: what's working well, what needs attention, readiness assessment: ready to proceed / needs minor changes / needs major revision), categorized feedback (organized by type: Must Fix — blocks progress, issues that will cause user problems or violate standards; Should Fix — important improvements, not blocking but should be addressed before launch; Consider — suggestions and enhancements, nice-to-have improvements; Praise — what's working well, reinforce good decisions), per-item structure (each feedback item has: reference — which screen/component/element, observation — what you see, concern — why it's an issue, suggestion — proposed solution or direction)."
    weight: 0.35
    description: "FeedbackTemplate"
  - type: llm_judge
    criteria: "Response provides concrete examples in the template — example Must Fix ('Screen 3 — Checkout Form: The submit button has white text on yellow background — contrast ratio ~1.3:1, fails WCAG AA. Suggest: change button to dark text on yellow, or change button color to a darker shade. This will be flagged in accessibility audit.'), example Should Fix ('Screen 1 — Dashboard: The primary metric and secondary metrics have identical visual weight. Users need to identify the key metric quickly. Suggest: enlarge the primary metric card or add visual emphasis through color/size.'), example Consider ('Screen 2 — Profile: The avatar upload area could benefit from drag-and-drop in addition to the file picker button — common pattern in modern apps, improves the interaction feel.'), example Praise ('Screen 4 — Onboarding: The progressive disclosure of form fields is excellent — showing only relevant fields based on previous answers reduces cognitive load. This should be the pattern for all multi-step forms.'). Each example demonstrates the observation-concern-suggestion structure."
    weight: 0.35
    description: "ConcreteExamples"
  - type: llm_judge
    criteria: "Response addresses async feedback best practices — annotation guidance (reference specific screens and elements by name or number — not 'the button' but 'the Submit button on the Payment screen', include annotated screenshots or Figma frame links where possible, mark the exact element being discussed), response protocol (designer should acknowledge each piece of feedback: agree/disagree/need-discussion, disagreements documented with rationale — not ignored, feedback resolved in next iteration with notes on what changed and why), avoiding async pitfalls (don't just write 'looks good' — if you have no feedback, explain what you evaluated: 'I reviewed the flow for usability and accessibility — no issues found', be mindful of tone in writing — what sounds conversational in person can read as harsh in text, use questions instead of commands: 'Have you considered...?' rather than 'Change this to...')"
    weight: 0.30
    description: "AsyncBestPractices"
