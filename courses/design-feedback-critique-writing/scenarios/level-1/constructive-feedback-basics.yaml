meta:
  id: constructive-feedback-basics
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Constructive feedback basics — write design feedback that is specific, actionable, and kind"
  tags: [constructive, basics, actionable, specific, beginner]

state: {}

trigger: |
  A junior designer shows you their first landing page
  design and asks for feedback. The design has several
  issues:

  - The headline is 14px gray text — barely visible
  - There are 6 different font sizes with no clear
    hierarchy
  - The CTA button is the same color as the background
    — it disappears
  - The layout has no whitespace — everything is cramped
  - But the color palette is actually quite nice and the
    illustration choice is creative

  The designer says: "Be honest — I can take it."

  Task: Write constructive design feedback that
  identifies issues while being specific, actionable,
  and encouraging.

assertions:
  - type: llm_judge
    criteria: "Response demonstrates constructive feedback principles — specific not vague (BAD: 'the typography needs work' — GOOD: 'the headline at 14px gray doesn't command attention — try 28-36px in a darker color like #1A1A2E to create a clear entry point'), actionable not just critical (each piece of feedback includes a suggested fix or direction — not just 'this is wrong' but 'try this instead'), balanced (starts with or includes genuine positives — the color palette and illustration choices are good and should be acknowledged specifically, not as a token compliment but as real design strengths), prioritized (not a laundry list of equal-weight items — identifies the most impactful issues: hierarchy and CTA visibility are the critical ones, spacing is important, the 6 font sizes can be addressed after the big issues)."
    weight: 0.35
    description: "ConstructivePrinciples"
  - type: llm_judge
    criteria: "Response addresses each design issue with specific feedback — headline visibility (14px gray is functionally invisible for a headline — recommend specific size increase and color change with rationale: headlines should be the first thing users see), typography hierarchy (6 different sizes create confusion — recommend reducing to 3-4 sizes with a modular scale: headline, subhead, body, caption — explain why hierarchy matters for scanning), CTA visibility (same color as background = invisible call to action — recommend contrasting color with sufficient WCAG contrast, explain that CTA should be the most visually prominent interactive element), whitespace (cramped layout makes content feel overwhelming — recommend specific spacing: 24-32px between sections, 16px between related elements — whitespace is not wasted space, it's breathing room), each feedback point is 2-3 sentences: observation + why it matters + suggestion."
    weight: 0.35
    description: "SpecificFeedback"
  - type: llm_judge
    criteria: "Response models good feedback tone and structure — tone (respectful and collaborative — 'have you considered...' rather than 'you should...', frames as conversation not judgment, acknowledges the effort and intention behind design choices), structure (organized in a clear format — either numbered list or grouped by priority, starts with strengths before areas for improvement, ends with encouragement and next steps — 'if you address the hierarchy and CTA visibility, this will be a really strong design'), avoids common feedback anti-patterns (no 'I would have done it differently' without explaining why, no subjective opinions presented as facts — 'I don't like blue' vs 'this blue doesn't meet contrast requirements', no overwhelming with too many changes at once — focus on the 3-4 most impactful improvements)."
    weight: 0.30
    description: "ToneAndStructure"
