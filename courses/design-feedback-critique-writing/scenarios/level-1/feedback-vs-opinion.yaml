meta:
  id: feedback-vs-opinion
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Feedback vs opinion — distinguish between objective design feedback and subjective personal preference"
  tags: [objective, subjective, opinion, evidence, beginner]

state: {}

trigger: |
  You're facilitating a design review. Three stakeholders
  give feedback on a new mobile app design:

  Stakeholder A (PM): "I don't like the purple. Can we
  make it blue? Blue is more professional."

  Stakeholder B (Engineer): "This design is too busy.
  There's too much going on. Can we simplify it?"

  Stakeholder C (Marketing): "The hero image feels wrong.
  It should be more aspirational — something with people
  smiling."

  The designer is frustrated: "None of this is actionable.
  'I don't like purple' isn't feedback — it's a preference.
  How do I handle this?"

  Task: Rewrite each stakeholder's feedback to be
  objective and actionable, and explain the difference
  between opinion and feedback.

assertions:
  - type: llm_judge
    criteria: "Response distinguishes opinion from feedback — defines the difference (opinion: personal preference with no design rationale — 'I don't like purple', feedback: observation tied to a design goal, user need, or measurable outcome — 'purple may not align with our enterprise audience who associate blue with trust in financial apps'), provides a test (ask: 'would a different designer reach the same conclusion?' — if yes, it's likely objective feedback; if it depends entirely on personal taste, it's opinion), acknowledges opinions aren't worthless (stakeholder preferences matter politically and sometimes intuitively point to real issues — but they need to be unpacked: WHAT about the purple feels unprofessional? is it the hue, saturation, context, or just unfamiliarity?), and explains why this matters (designers can act on objective feedback immediately; opinions require investigation to find the underlying concern)."
    weight: 0.35
    description: "OpinionVsFeedback"
  - type: llm_judge
    criteria: "Response rewrites each stakeholder's feedback — Stakeholder A rewrite (original: 'I don't like purple, make it blue' → rewritten: 'Our target users are enterprise finance managers who may associate purple with consumer/lifestyle brands rather than financial credibility. Have we validated the purple with our target audience? If user research supports it, we should keep it; if not, consider blues or teals that test better with this demographic.'), Stakeholder B rewrite (original: 'too busy, simplify' → rewritten: 'I'm concerned about cognitive load on this screen. Can we identify the primary user task and ensure it's visually prioritized? Specifically, the sidebar, notification badge, search bar, and promotional banner all compete for attention. Which is most important for the user at this point in their journey?'), Stakeholder C rewrite (original: 'hero image feels wrong, make it aspirational' → rewritten: 'the current hero image shows our product in isolation. Our brand positioning emphasizes human connection — consider testing an image that shows users benefiting from the product to better communicate our value proposition.'). Each rewrite transforms opinion into actionable, evidence-based feedback."
    weight: 0.35
    description: "FeedbackRewrites"
  - type: llm_judge
    criteria: "Response coaches the designer on handling opinion-based feedback — techniques for unpacking opinions (ask 'why': 'What about the purple feels unprofessional to you?' — often reveals a legitimate concern behind the opinion, ask 'for whom': 'Is this your personal preference or do you think our users would feel the same?' — reframes as user-centered question, ask 'compared to what': 'What examples of professional apps are you thinking of?' — gives concrete reference points), facilitating productive critique (set ground rules for reviews: feedback should reference design goals, user needs, or data — not personal taste, ask stakeholders to frame feedback as 'I think [this element] might not work for [user/goal] because [reason]', separate aesthetic reactions from functional concerns — both are valid but require different responses), and empowering the designer (the designer should feel confident pushing back on pure opinion with: 'I hear your preference — can you help me understand the user concern behind it? That will help me address it effectively')."
    weight: 0.30
    description: "HandlingOpinions"
