meta:
  id: usability-feedback
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Usability feedback — identify and communicate usability issues in a design focusing on user task completion"
  tags: [usability, task-completion, ux, user-flow, beginner]

state: {}

trigger: |
  A designer presents a checkout flow for an e-commerce
  site. Walking through it, you notice:

  - The 'Back' button and 'Continue' button look
    identical — both are blue filled buttons side by side
  - Shipping address form has 12 fields visible at once
    on mobile — requires extensive scrolling
  - The order summary disappears when user moves to
    payment step — they can't verify what they're paying for
  - Error messages appear at the top of the page, not
    next to the field with the error
  - No progress indicator — user doesn't know they're
    on step 2 of 4

  The designer says: "I think the flow is clean and
  simple. What do you think?"

  Task: Write usability-focused feedback on this checkout
  flow, framing issues in terms of user impact.

assertions:
  - type: llm_judge
    criteria: "Response frames feedback in terms of user experience, not just visual issues — user-centered language (each issue described from the user's perspective: 'When a user accidentally clicks Back instead of Continue because both buttons look the same, they lose their entered data and have to start over — that's a checkout abandonment risk' rather than 'the buttons need different styles'), task completion focus (every piece of feedback connects to: can the user complete the checkout successfully and efficiently? issues that block or slow checkout are critical), severity indication (distinguishes between: critical — user may fail to complete checkout, important — user is slowed or confused, nice-to-have — would improve experience but doesn't block completion), and acknowledges what works ('clean and simple' is a valid design goal — the feedback should refine the execution without dismissing the designer's intent)."
    weight: 0.35
    description: "UserCenteredFraming"
  - type: llm_judge
    criteria: "Response provides specific usability feedback for each issue — identical buttons (primary action = filled/colored button, secondary action = outlined or text-only — visual differentiation prevents accidental clicks, specific suggestion: Continue as blue filled on right, Back as gray text link on left), 12-field mobile form (cognitive overload — recommend progressive disclosure or multi-step form, group related fields: name section, address section, each fitting one mobile viewport, auto-fill and address lookup reduce manual entry), disappearing order summary (users need to verify before paying — show persistent summary or expandable summary on payment step, removing it creates anxiety: 'am I paying for the right items?'), error positioning (errors at top of page: user scrolls up, reads error, scrolls back down to find the field — inline errors next to the field are immediately actionable, reference: Nielsen Norman Group research on inline validation), progress indicator (users feel lost without knowing how many steps remain — add step indicator: Shipping > Payment > Review > Confirm — reduces abandonment because users see the end is near)."
    weight: 0.35
    description: "SpecificUsabilityFeedback"
  - type: llm_judge
    criteria: "Response models how to frame usability feedback constructively — connects to metrics (each issue is framed with potential impact: 'checkout abandonment rate,' 'time to complete,' 'error recovery rate' — this helps the designer and PM prioritize), provides evidence-based reasoning (references established UX patterns or research where relevant — Baymard Institute checkout research, Nielsen Norman Group form design, common e-commerce patterns — gives feedback authority beyond personal opinion), suggests testing (for issues where the 'right' answer isn't obvious: 'consider A/B testing the progress indicator — some minimalist checkouts perform well without it, but most research suggests showing progress reduces abandonment'), and ends constructively (the overall flow IS clean and simple — these refinements will make it clean, simple, AND usable — the designer's instinct is good, it just needs specific UX improvements)."
    weight: 0.30
    description: "ConstructiveFraming"
