meta:
  id: color-typography-feedback
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Color and typography feedback — write specific, helpful feedback on color choices and typography in a design"
  tags: [color, typography, visual-design, specifics, beginner]

state: {}

trigger: |
  A designer shares a marketing landing page. You notice
  these color and typography issues:

  1. Body text is a trendy thin weight (font-weight: 200)
     — hard to read at 14px on screen
  2. Five different colors are used for links across the
     page — blue, teal, purple, underlined black, and
     orange
  3. The heading font is a decorative script that's
     almost illegible at smaller sizes
  4. Background color is dark gray (#333) with dark blue
     text (#1A237E) — very low contrast
  5. The overall palette is cohesive and the color
     choices for illustrations are beautiful

  The designer is proud of the visual aesthetic.

  Task: Write feedback on the color and typography
  issues that's specific and educational without
  dismissing the designer's aesthetic goals.

assertions:
  - type: llm_judge
    criteria: "Response addresses each issue with specific, educational feedback — thin font weight (font-weight: 200 at 14px is a readability concern — thin strokes disappear on lower-resolution screens and in bright ambient light, recommend 400 regular for body text minimum, can use 300 light at 18px+ for stylistic sections — explain: readability should never be sacrificed for style trends), inconsistent link colors (5 different link colors means users can't reliably identify clickable elements — link color should be consistent site-wide, pick one color that's distinct from body text and use it everywhere, underlined black is especially problematic as it may not register as clickable to users expecting colored links), decorative heading font (script fonts can be beautiful at large display sizes but lose legibility below ~24px — recommend: keep the script font for the hero headline at 48px+ where it shines, switch to a readable sans-serif for H2-H4 levels — this preserves the aesthetic impact where it matters most)."
    weight: 0.35
    description: "SpecificIssueFeedback"
  - type: llm_judge
    criteria: "Response handles the contrast issue with care and specifics — dark blue on dark gray (#1A237E on #333: approximately 2.4:1 contrast ratio — fails WCAG AA's 4.5:1 requirement for normal text, this isn't just a guideline — users with low vision, aging users, and anyone in bright sunlight literally cannot read this text), solution that preserves the dark aesthetic (the designer clearly wants a dark, moody look — don't suggest white backgrounds, instead: lighten the text to #90CAF9 or similar light blue that maintains the blue tone but achieves 4.5:1+, or slightly lighten the background to #555 while keeping the blue — the dark aesthetic can absolutely be accessible with the right combinations), and acknowledges what works (the illustration color choices are genuinely beautiful — say so specifically and explain why they work: cohesive warm/cool balance, effective saturation levels — this reinforces the designer's strengths while addressing the issues)."
    weight: 0.35
    description: "ContrastAndBalance"
  - type: llm_judge
    criteria: "Response teaches through the feedback — each piece of feedback includes a brief 'why' explanation that educates (not lectures) the designer: why thin weights fail on screen (pixel rendering limitations), why consistent link colors matter (affordance theory — users learn interactive patterns), why decorative fonts have size limits (stroke complexity vs pixel resolution), why contrast matters beyond aesthetics (real users in real conditions), avoids condescending tone ('you might already know this, but...' or excessive hedging — instead, states facts clearly and respectfully), and provides specific numbers or references where helpful (exact contrast ratios, specific font-weight values, WCAG requirements — gives the designer concrete parameters to design within rather than vague 'make it more readable')."
    weight: 0.30
    description: "EducationalApproach"
