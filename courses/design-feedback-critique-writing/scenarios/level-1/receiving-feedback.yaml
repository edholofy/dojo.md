meta:
  id: receiving-feedback
  level: 1
  course: design-feedback-critique-writing
  type: output
  description: "Receiving feedback — help a designer process and respond to critique professionally and productively"
  tags: [receiving, responding, professional, growth, beginner]

state: {}

trigger: |
  A designer comes to you upset after a design review.
  They say:

  "I just had the worst critique. Here's the feedback
  I got:

  1. PM said: 'This doesn't match what I had in mind at
     all.' (No specifics.)
  2. Senior designer said: 'The spacing is inconsistent
     and the color choices don't align with our brand
     guidelines.' (Fair, but it stung.)
  3. Engineer said: 'This will be really hard to build.
     Can you simplify it?' (Every time!)
  4. VP said: 'I love it!' then the PM contradicted them
     in front of everyone.
  5. Another designer said: 'Have you tried looking at
     how [competitor] does it?' (Felt dismissive.)

  I'm demoralized. How do I deal with this? Some feedback
  seems valid, some seems unfair, and some is just
  unhelpful."

  Task: Help the designer process each piece of feedback,
  identify what's actionable, and respond professionally.

assertions:
  - type: llm_judge
    criteria: "Response helps process each piece of feedback — PM's 'doesn't match' (unhelpful as stated — but signals misalignment, action: schedule 1:1 to ask specific questions: 'What did you have in mind? Can you show me examples or describe the differences you see?' — the PM may have a legitimate concern poorly expressed), Senior designer's spacing/color feedback (this IS actionable feedback even though it stings — spacing inconsistency and brand misalignment are objective issues, action: review brand guidelines and spacing system, compare your design against them, fix the gaps — this is the most valuable feedback in the batch), Engineer's 'simplify' (recurring pattern suggests a process issue — action: involve engineers earlier in the design process, ask specifically: 'Which parts are hard to build? Can you help me understand the constraints?' — 'simplify it' needs unpacking into specific technical limitations), VP vs PM contradiction (political situation — action: after the meeting, clarify privately with both: 'I heard different perspectives — can we align on the direction?' — don't put yourself in the middle of their disagreement), Competitor reference (may feel dismissive but could be helpful — action: actually look at the competitor's approach, not to copy but to understand if there's a pattern you missed)."
    weight: 0.35
    description: "ProcessingFeedback"
  - type: llm_judge
    criteria: "Response teaches how to receive feedback well — emotional management (it's normal to feel defensive — design feels personal because you made creative choices, acknowledge the feeling but don't react from it, technique: write down all feedback without responding, process emotions privately, respond when calm), separating signal from noise (not all feedback is equal: technical/objective feedback from experts = high signal, vague feelings from non-designers = important but needs unpacking, contradictory feedback from multiple stakeholders = alignment problem not a design problem), response framework (for each piece of feedback, decide: agree and will fix — acknowledge and document the change, disagree but will investigate — 'I see your point, let me explore that option and come back with a comparison', need clarification — 'Can you help me understand more specifically what you mean?', out of scope — 'That's a great consideration for the next iteration')."
    weight: 0.35
    description: "ReceivingSkills"
  - type: llm_judge
    criteria: "Response addresses the systemic issues and builds resilience — critique process improvement (the review described has structural problems: no agenda, no clear decision-maker, contradictory feedback in public — suggest: propose a structured critique format for future reviews with clear goals and roles), building professional resilience (feedback on design is not feedback on you as a person — even when poorly delivered, separate design identity from personal identity, keep a 'wins file': save screenshots of successful designs and positive feedback — review it when critique feels overwhelming), and follow-up (write a summary email after the review: 'Here's the feedback I captured, here are my planned next steps, and here are items where I need clarification' — this demonstrates professionalism, creates a record, and gives stakeholders a chance to correct misunderstandings)."
    weight: 0.30
    description: "ResilienceAndProcess"
