meta:
  id: design-ops-critique
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Design ops critique — evaluate and optimize design operations infrastructure to support scalable critique practices"
  tags: [design-ops, infrastructure, tooling, process, master]

state: {}

trigger: |
  As the Head of Design Operations, you're auditing your
  critique infrastructure. Current state:

  Tools:
  - Figma for design files (but no standardized review
    workflow)
  - Slack for ad-hoc feedback (messages get lost)
  - Notion for meeting notes (inconsistent documentation)
  - No dedicated critique/review tool
  - No analytics on feedback patterns

  Process:
  - 45 designers across 8 teams
  - Reviews scheduled manually by each team
  - No standardized critique template or format
  - Feedback documented inconsistently — some in Figma
    comments, some in Slack, some in Notion, some nowhere
  - No way to track if feedback was implemented
  - No historical record of design decisions and rationale

  Pain points from designer survey:
  - "I can't find feedback from last month's review" (72%)
  - "I don't know if my feedback was implemented" (65%)
  - "Reviews are scheduled at inconvenient times" (58%)
  - "I give the same feedback repeatedly" (45%)
  - "There's no way to share feedback across teams" (40%)

  Task: Design a critique operations infrastructure that
  supports scalable, trackable, and effective feedback.

assertions:
  - type: llm_judge
    criteria: "Response designs a critique operations stack — feedback workflow in Figma (standardize: all design reviews happen in Figma using a structured review workflow — create review-ready pages with context, goals, and specific questions for reviewers, use Figma branching for review iterations, establish naming conventions for review files: '[Status] Feature - Review Date'), centralized feedback tracking (choose one system of record for all feedback — recommend Notion or a purpose-built tool: every piece of feedback is captured with: the design it references, who gave it, priority level, status (open, accepted, implemented, deferred), rationale for acceptance or deferral — this addresses the 72% who can't find past feedback and the 65% who don't know if feedback was implemented), scheduling automation (use scheduling tool like Calendly or Reclaim to automate review scheduling: each team has standing review slots, designers can book cross-team review slots, timezone-aware scheduling for distributed teams — addresses the 58% scheduling pain), feedback pattern analytics (track: most common feedback themes across teams, recurring feedback that suggests systemic issues, feedback implementation rate, time from feedback to implementation — the 45% giving repeat feedback suggests systemic design issues that should be addressed at the design system or pattern level)."
    weight: 0.35
    description: "CritiqueOpsStack"
  - type: llm_judge
    criteria: "Response addresses knowledge management — design decision records (create a lightweight ADR-style system for design decisions: for every significant design choice, document: context, decision, alternatives considered, critique feedback that informed it, rationale — this creates institutional memory and answers 'why did we design it this way?' months later), cross-team feedback sharing (address the 40% who want cross-team sharing: create a 'Feedback Library' — curated collection of high-quality feedback examples organized by design pattern type, encourage teams to tag and share feedback that applies beyond their specific feature, quarterly 'feedback digest' highlighting common themes and systemic issues across all teams), template and framework standardization (create standardized templates: review request template — what you're reviewing, what stage, what kind of feedback you need, feedback template — observation, impact, suggestion, priority, review summary template — key decisions, action items, owners, deadlines — consistency reduces cognitive overhead and makes feedback searchable and comparable)."
    weight: 0.35
    description: "KnowledgeManagement"
  - type: llm_judge
    criteria: "Response provides implementation plan and metrics — rollout plan (don't overhaul everything at once: month 1 — standardize Figma review workflow and feedback template, train all teams; month 2 — launch centralized feedback tracking in Notion with migration of existing feedback; month 3 — implement scheduling automation and cross-team review infrastructure; month 4 — launch feedback analytics and pattern tracking; month 5 — introduce design decision records; month 6 — full system operational with feedback library and cross-team sharing), success metrics (operational: time to schedule a review — target under 2 minutes, feedback findability — target 90%+ can find past feedback, feedback implementation tracking — 100% of feedback has a status, review documentation rate — 100% of reviews have notes; quality: feedback specificity and actionability scores, recurring feedback reduction — from 45% to under 20%, cross-team feedback sharing rate, designer satisfaction with critique process — quarterly survey), continuous improvement (quarterly critique ops retrospective: is the infrastructure serving the designers or burdening them?, adjust tools and processes based on actual usage data, sunset tools that aren't being used — complexity is the enemy of adoption, design ops should make critique easier not add more process)."
    weight: 0.30
    description: "ImplementationAndMetrics"
