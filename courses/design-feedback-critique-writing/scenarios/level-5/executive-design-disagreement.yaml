meta:
  id: executive-design-disagreement
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Executive design disagreement — resolve high-stakes design disagreements between C-level executives using critique principles"
  tags: [executive, c-suite, disagreement, high-stakes, master]

state: {}

trigger: |
  Two C-level executives are locked in a design dispute
  that's blocking a $50M product initiative:

  CTO: "We need to build a platform-first design. API-
  driven, developer-focused, minimal UI. Our competitors
  are winning on developer experience. The dashboard should
  be secondary — power users will build their own."

  CMO: "Our growth comes from self-serve users who need a
  polished, intuitive dashboard. If we make this developer-
  focused, we'll lose the 80% of users who can't code.
  Our brand is built on accessibility and ease of use."

  Data:
  - 80% of revenue comes from self-serve dashboard users
  - 20% of revenue from API/developer users, but growing
    at 3x the rate of dashboard users
  - Developer segment has 90% retention vs 60% for dashboard
  - Competitor X (developer-focused) just raised $200M
  - Competitor Y (dashboard-focused) is losing market share
  - Your largest enterprise deal ($8M/year) specifically
    requires API access

  The CEO has asked you, as CPO, to resolve this and
  present a unified product vision.

  Task: Write a critique-based resolution that uses data
  to resolve the executive disagreement and align the
  organization.

assertions:
  - type: llm_judge
    criteria: "Response uses data to reframe the debate — both are right (the CTO is right that developer segment is growing 3x faster with 90% retention — this is the future growth engine; the CMO is right that 80% of current revenue is dashboard users — ignoring them would be catastrophic; this isn't an either/or decision — it's a sequencing and resource allocation decision), data-driven analysis (developer segment: 20% of revenue but growing 3x with 90% retention — extrapolate the crossover point when developer revenue exceeds dashboard if trends continue; dashboard segment: 80% of revenue but 60% retention signals potential churn risk — this segment needs attention regardless of the platform debate; competitive landscape: developer-focused Competitor X raised $200M — the market is validating developer-first, dashboard-focused Competitor Y losing share — the market is penalizing dashboard-only; enterprise signal: $8M deal requiring API — enterprise customers are demanding platform capabilities), resolution (the data supports a platform-first strategy with a world-class dashboard — not choosing one over the other, but building the platform layer that powers both the API and the dashboard, dashboard becomes the best client of your own platform, this satisfies both: CTO gets platform architecture, CMO gets polished dashboard, and the architecture enables future flexibility)."
    weight: 0.35
    description: "DataDrivenResolution"
  - type: llm_judge
    criteria: "Response applies critique principles to executive conflict — critique the positions not the people (separate identity from opinion — the CTO isn't wrong for wanting platform-first, the CMO isn't wrong for protecting current revenue, frame the resolution as 'the data suggests a third option that serves both goals' not 'one of you is wrong'), evidence-based decision making (use the same principles from design critique: opinions are interesting but data decides — the retention differential 90% vs 60%, the growth rate differential 3x, the competitive landscape signals, the enterprise deal requirements — all point toward platform capabilities as essential, but the revenue concentration 80% dashboard means the dashboard can't be deprioritized), structured resolution format (present to the CEO: current state analysis — both segments are important for different reasons, strategic recommendation — platform-first architecture that powers a world-class dashboard, phased execution — how to sequence investment, risk analysis — what happens if we go all-in on either extreme, success metrics — how we'll know the unified strategy is working)."
    weight: 0.35
    description: "CritiquePrinciplesApplied"
  - type: llm_judge
    criteria: "Response provides an implementable path forward — phased strategy (Phase 1 quarter 1-2: build platform/API layer beneath existing dashboard — dashboard continues to function but now runs on the same API that external developers will use; Phase 2 quarter 2-3: launch developer portal with API access, documentation, and developer experience — capture the growing segment; Phase 3 quarter 3-4: rebuild dashboard as a first-class API client — showcasing what's possible on the platform, this becomes the best example of what developers can build; Phase 4 ongoing: invest in both channels proportional to growth and retention data), alignment mechanism (establish a unified product council: CTO, CMO, and CPO review platform and dashboard metrics monthly, decisions based on data not debate — if developer growth accelerates, shift more investment, if dashboard retention improves, validate the approach, quarterly strategy review where both segments present performance against targets), managing the transition (communicate to the organization: this is not a pivot, it's an evolution — we're becoming a platform company that serves both builders and users, address concerns from both camps: dashboard team isn't being deprioritized, developer team is getting investment — both are essential, success metric: platform revenue as percentage of total, dashboard retention improvement, developer segment growth rate maintenance)."
    weight: 0.30
    description: "ImplementablePath"
