trigger: |
  You've been invited to give a keynote at a major design
  conference (5,000 attendees). The topic: "The Future of
  Design Critique." The organizer says:

  "We don't want another talk about giving feedback nicely.
  We want you to challenge how the industry thinks about
  critique. What's broken? What's next? What should design
  critique look like in 5 years?"

  Your research for the talk reveals:
  - 90% of design critique advice focuses on interpersonal
    dynamics (be kind, be specific) — important but solved
  - Almost no critique frameworks integrate quantitative
    data systematically
  - AI-generated designs are emerging — how do you critique
    work that wasn't designed by a human?
  - Remote/async work has fundamentally changed how feedback
    flows — most critique advice assumes a room full of people
  - Design systems have automated many consistency checks —
    what's left for humans to critique?
  - Critique is still design-internal — rarely includes
    engineering, product, or business perspectives
    structurally

  Task: Write the keynote outline with original frameworks
  and provocative ideas about the future of design critique.

assertions:
  - type: llm_judge
    criteria: "Response presents original frameworks — beyond niceness (the industry has optimized critique for interpersonal safety — and that's great, but we've stalled there: most critique produces feedback that's kind and specific but doesn't actually improve design outcomes measurably, propose: Outcome-Oriented Critique — every piece of feedback must connect to a measurable user or business outcome, not just a design principle, shift from 'this could be more consistent' to 'this inconsistency is causing X% error rate — here's how to fix it'), data-integrated critique framework (propose: Evidence-Layered Critique — three layers: Layer 1 — Automated Checks: design system compliance, accessibility scanning, brand guideline verification — machines handle consistency; Layer 2 — Data-Informed Review: analytics, user research, A/B test results integrated into the critique conversation — humans interpret data; Layer 3 — Creative Judgment: innovation, emotional resonance, narrative coherence — humans evaluate what machines cannot, this framework evolves critique from opinion-based to evidence-based while preserving space for creative judgment)."
    weight: 0.35
    description: "OriginalFrameworks"
  - type: llm_judge
    criteria: "Response addresses emerging challenges — AI-generated design critique (when AI generates design options, traditional critique breaks down: you can't ask AI 'what was your rationale?' — it doesn't have design intent, propose: Intent-First Critique — critique the prompt and criteria, not just the output, evaluate AI designs against user research and business goals, not aesthetic preference, the human role shifts from creating to curating and critiquing AI output — critique becomes more important not less), async-first critique (the 'room full of designers' model is dead for many teams: propose: Structured Async Critique Protocol — reviewer receives design with context doc and specific questions, 48-hour review window with structured feedback template, synchronous time reserved only for discussion of conflicting feedback or complex trade-offs, this actually produces better feedback: people have time to think, introverts have equal voice, all feedback is documented by default), post-design-system critique (if design systems automate consistency, what's left for human critique?: strategic design decisions — is this the right problem to solve?, information architecture — is the content organized for user mental models?, interaction innovation — is there a better way to accomplish this task?, emotional design — does this feel right for the user's emotional context?, narrative coherence — does the user journey tell a coherent story?)."
    weight: 0.35
    description: "EmergingChallenges"
  - type: llm_judge
    criteria: "Response provides a compelling keynote structure — provocative opening (challenge the audience: 'Design critique hasn't evolved in 20 years. We've gotten better at being nice about it, but we haven't gotten better at making it actually improve outcomes. Today I want to propose that we rebuild critique from the ground up.'), key arguments structured for impact (each section builds on the previous: 1. What critique was designed for — and why that's no longer sufficient; 2. The evidence gap — why most feedback is opinion dressed as expertise; 3. Three frameworks for the next era of critique; 4. What changes when AI designs and humans critique; 5. A call to action — specific practices the audience can implement Monday morning), actionable takeaways (don't just inspire — equip: every attendee should leave with: one new framework they can apply immediately, one metric they should track for their critique practice, one uncomfortable question to ask in their next design review — practical value makes keynotes memorable), cross-functional critique future (the talk should end with the biggest idea: critique shouldn't be design's internal practice — it should be a company-wide discipline where every function critiques its work with the rigor design aspires to — design critique as the model for organizational learning)."
    weight: 0.30
    description: "KeynoteStructure"
