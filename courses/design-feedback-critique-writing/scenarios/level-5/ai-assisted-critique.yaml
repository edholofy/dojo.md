meta:
  id: ai-assisted-critique
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "AI-assisted critique — integrate AI tools into design critique workflows while preserving human judgment and creativity"
  tags: [ai, automation, augmented-critique, future, master]

state: {}

trigger: |
  Your design organization is exploring AI-assisted design
  critique. The team has mixed feelings:

  Enthusiasts: "AI could catch accessibility issues, brand
  inconsistencies, and design system violations instantly.
  It would free us to focus on strategic feedback."

  Skeptics: "Design critique requires human empathy,
  context understanding, and creative judgment. AI can't
  replace the nuance of a great design review."

  The CEO wants a recommendation: "Should we invest in AI
  tools for design critique? If so, what should AI do and
  what should remain human?"

  Current critique pain points:
  - 40% of review time spent catching consistency issues
    that could be automated
  - Accessibility violations found in 60% of reviews —
    most are detectable by automated tools
  - Design system compliance takes 20% of facilitator
    attention
  - Cross-timezone teams struggle with synchronous reviews
  - Junior designers want faster feedback than weekly
    reviews allow
  - Documentation of critique sessions is inconsistent

  Task: Design an AI-assisted critique framework that
  defines what AI handles, what humans handle, and how
  they work together.

assertions:
  - type: llm_judge
    criteria: "Response defines clear AI and human domains — AI domain automated layer (what AI should handle: accessibility scanning — WCAG compliance checking, color contrast ratios, touch target sizes, alt text presence; design system compliance — component usage verification, spacing consistency, typography conformance, color token usage; brand guideline checks — logo placement, brand color usage, typography hierarchy; basic usability heuristics — form label presence, button sizing, interactive element spacing; documentation — auto-summarize feedback sessions, track feedback implementation status, generate metrics — this addresses the 40% consistency time, 60% a11y violations, and 20% design system checking), human domain judgment layer (what humans must retain: strategic design decisions — is this the right approach for the user problem?; emotional and cultural resonance — does this feel right for the user's context?; creative innovation — is there a more elegant solution?; interpersonal dynamics — delivering difficult feedback with empathy; business context — how does this design serve business goals?; edge cases and nuance — situations that don't fit patterns; narrative coherence — does the user journey tell a coherent story?)."
    weight: 0.35
    description: "AIHumanDomains"
  - type: llm_judge
    criteria: "Response designs the integrated workflow — pre-review AI pass (before any human review session: AI scans the design and generates an automated report covering: accessibility issues with severity and fix suggestions, design system compliance with specific violations highlighted, brand guideline adherence, basic heuristic issues — this report is attached to the review request so human reviewers don't need to spend time on detectable issues), during review human focus (with AI handling the automated checks, human reviewers focus entirely on: does this design solve the user's problem effectively?, is the information architecture intuitive?, are the interactions appropriate for the context?, what alternative approaches could be stronger?, how does this fit into the broader product experience? — review quality improves because humans aren't distracted by mechanical issues), post-review AI documentation (AI captures and structures the feedback: auto-generates review summary from discussion notes, tracks each piece of feedback with status — open, accepted, implemented, deferred, identifies patterns across reviews — recurring issues that might indicate systemic problems, generates metrics dashboard — review frequency, feedback implementation rate, common issue categories), async AI critique for junior designers (address the 'faster feedback' need: junior designers can get AI feedback instantly on consistency, accessibility, and system compliance — this provides 24/7 feedback without waiting for weekly reviews, while strategic feedback still comes from human reviewers in scheduled sessions)."
    weight: 0.35
    description: "IntegratedWorkflow"
  - type: llm_judge
    criteria: "Response addresses risks and implementation — risks of AI critique (over-reliance: designers may stop thinking about accessibility or consistency because 'AI will catch it' — counter by maintaining human accountability for quality, false confidence: AI can miss context-dependent issues — a technically accessible design can still be unusable, creativity suppression: if AI enforces design system too rigidly, designers may stop innovating — AI should flag deviations not block them, bias: AI tools trained on existing patterns may penalize innovative approaches — configure for suggestions not enforcement), implementation plan (phase 1: pilot with 2 teams — automated accessibility scanning and design system compliance checking before reviews, measure: time saved in reviews, issues caught pre-review, designer satisfaction; phase 2: expand to all teams — add brand guideline checking and async feedback for junior designers; phase 3: add documentation automation and cross-review pattern analysis; phase 4: advanced — AI-suggested design alternatives based on patterns from successful designs), recommendation to CEO (invest yes — but with guardrails: AI should augment human critique not replace it, start with the mechanical checks that consume 40%+ of review time, keep strategic and creative judgment firmly with humans, measure ROI: time savings, issue detection rate, review quality scores, projected payback period: 6-12 months based on time savings alone)."
    weight: 0.30
    description: "RisksAndImplementation"
