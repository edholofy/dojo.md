meta:
  id: organizational-critique-culture
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Organizational critique culture — architect company-wide critique culture that extends beyond design to product, engineering, and leadership"
  tags: [organizational, company-wide, culture, cross-discipline, master]

state: {}

trigger: |
  The CEO says: "The design team's critique culture has
  transformed how designers work. I want this across the
  entire company. Product should critique product strategy.
  Engineering should critique architecture decisions.
  Marketing should critique campaigns. Leadership should
  critique organizational decisions. How do we scale design
  critique principles to the whole organization?"

  Company context:
  - 2,000 employees across 4 functions
  - Design critique program is 18 months mature
  - Engineering does code reviews but not architecture
    critiques
  - Product does sprint reviews but not strategy critiques
  - Marketing does campaign post-mortems but not pre-launch
    reviews
  - Leadership makes decisions in closed rooms with no
    structured feedback process
  - Company values include "transparency" and "continuous
    improvement" but practices don't reflect this

  Task: Design a company-wide critique culture framework
  that adapts design critique principles for every function.

assertions:
  - type: llm_judge
    criteria: "Response adapts critique principles per function — universal principles (from design critique: feedback must be specific and actionable, critique the work not the person, evidence over opinion, psychological safety enables honest feedback — these apply universally), function-specific adaptations (engineering: extend code review culture to architecture review — monthly architecture critique where teams present technical decisions and receive peer feedback, focus on trade-offs and alternatives not just correctness; product: introduce strategy critique — biweekly session where PMs present roadmap decisions, feature bets, and prioritization rationale to peer PMs for constructive challenge, separate from sprint review which is execution-focused; marketing: pre-launch campaign critique — before campaigns go live, structured review of messaging, targeting, creative against brand guidelines and campaign objectives, supplement existing post-mortems with proactive review; leadership: structured decision review — leadership presents major organizational decisions to a review panel before finalizing, includes diverse perspectives and devil's advocate role), each function gets adapted format, cadence, and criteria while sharing core principles."
    weight: 0.35
    description: "FunctionSpecificAdaptation"
  - type: llm_judge
    criteria: "Response addresses scaling challenges — culture resistance (engineering may see critique as 'slowing down shipping', product may see strategy critique as 'undermining PM autonomy', marketing may see pre-launch review as 'design thinking imposed on marketing', leadership critique is the hardest — leaders must model vulnerability by opening their decisions to feedback), training and enablement (each function needs critique facilitators trained in the universal principles but adapted for their domain context, design team can serve as 'critique consultants' initially — sharing what they learned from their 18-month journey, create a critique playbook for each function with domain-specific examples and templates), leadership modeling (the CEO asked for this — the CEO must go first: publicly submit a strategic decision for critique, model receiving feedback gracefully, demonstrate that critique improves decisions not undermines authority — if leadership doesn't model it, nobody will believe it's safe), avoiding bureaucracy (critique should enhance decision quality not slow everything down — keep sessions focused and time-boxed, not every decision needs formal critique — define thresholds: decisions above X impact level get structured review, smaller decisions use informal peer feedback)."
    weight: 0.35
    description: "ScalingChallenges"
  - type: llm_judge
    criteria: "Response provides implementation strategy — phased rollout (don't launch in all 4 functions simultaneously: Phase 1 months 1-3 — engineering architecture critique, build on existing code review culture, lowest resistance; Phase 2 months 3-6 — product strategy critique, PMs are used to sprint reviews, extend to strategy; Phase 3 months 6-9 — marketing pre-launch critique, supplement existing post-mortems; Phase 4 months 9-12 — leadership decision review, hardest change, requires most trust, save for when other functions have established credibility), measurement (per-function: decision quality metrics — are critiqued decisions producing better outcomes than uncritiqued ones?, participation rates and psychological safety surveys, 360-degree feedback on critique culture, cross-function: company-wide culture survey tracking 'transparency' and 'continuous improvement' alignment with stated values, innovation metrics — does critique culture correlate with more creative solutions?), sustainability (critique culture officer or champion per function, quarterly cross-function critique culture summit — share learnings and best practices, annual company-wide 'Critique Culture Report' measuring maturity across all functions, integrate critique skills into hiring criteria for all functions — not just design)."
    weight: 0.30
    description: "ImplementationStrategy"
