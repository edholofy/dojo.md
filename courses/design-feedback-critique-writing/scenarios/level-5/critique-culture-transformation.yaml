meta:
  id: critique-culture-transformation
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Critique culture transformation — lead a company-wide transformation from toxic feedback culture to healthy critique at every level"
  tags: [transformation, company-wide, toxic-to-healthy, cultural-change, master]

state: {}

trigger: |
  A PE-backed company ($500M revenue, 5,000 employees) has
  a toxic feedback culture that's damaging performance:

  Symptoms:
  - Glassdoor rating: 2.4/5 (primary complaint: "brutal
    culture, management by fear")
  - Employee engagement score: 32% (industry average: 65%)
  - Annual turnover: 42% (industry average: 18%)
  - Estimated cost of turnover: $35M/year
  - Innovation pipeline: 0 new products in 3 years
  - Customer satisfaction declining for 8 consecutive
    quarters

  Root causes identified:
  - Founder's leadership style is "radical candor" taken
    to an extreme — public humiliation as motivation
  - Senior leadership mimics the founder's style
  - Middle management caught between executive expectations
    and team wellbeing
  - "Performance reviews" are public ranking sessions where
    the bottom 10% are called out
  - No HR intervention because "the founder wants it this
    way"
  - PE firm concerned about declining metrics and retention
    costs

  The PE firm hires you as Chief People & Design Officer
  with a mandate: "Fix the culture. The founder has agreed
  to support changes."

  Task: Design a comprehensive culture transformation plan
  that replaces toxic feedback with constructive critique
  at every organizational level.

assertions:
  - type: llm_judge
    criteria: "Response addresses the founder and leadership — founder coaching (the founder's 'radical candor extreme' is the root cause — without changing founder behavior, nothing else will stick: executive coaching for the founder focusing on impact vs intent — the founder likely believes they're being honest and helpful, show them the data: 42% turnover costs $35M/year, their 'honesty' is destroying value, help the founder understand that directness without respect is not radical candor — it's just cruelty, Kim Scott herself distinguishes radical candor from 'obnoxious aggression'), leadership behavior change (senior leaders mimic the founder — they need new models: leadership development program focused on constructive feedback skills, clear expectations: public humiliation is prohibited — period, violations have consequences, model new behavior from the top — the founder must visibly change first, create a leadership feedback charter: we give feedback that is direct, specific, private, and focused on growth, not public, vague, humiliating, or focused on shame), immediate policy changes (end public ranking sessions immediately — replace with private, constructive performance conversations, implement 360-degree feedback for leaders — they need to hear how their style impacts teams, establish an anonymous reporting channel for toxic feedback incidents — with actual follow-through)."
    weight: 0.35
    description: "LeadershipTransformation"
  - type: llm_judge
    criteria: "Response provides a phased transformation plan — phase 1 months 1-3 stop the bleeding (immediate policy changes: end public humiliation practices, ban public ranking, establish feedback guidelines, create safe reporting channels, implement manager training on constructive feedback — minimum 8 hours for all people managers, quick wins: address the most egregious behaviors that drive turnover, communicate the change: 'we're evolving our feedback culture from destructive to constructive — and leadership goes first'), phase 2 months 4-6 build new muscle (introduce structured critique practices from design discipline to all functions: every team has regular feedback sessions with ground rules, train 100 feedback facilitators across the organization — 2 per team minimum, launch new performance review format: private, growth-oriented, two-way conversation, establish feedback quality metrics: are people receiving useful feedback? do they feel psychologically safe?), phase 3 months 7-12 embed and measure (track: engagement score trajectory — target 45% by month 12, turnover rate — target 30% by month 12, Glassdoor trend, manager feedback quality ratings from reports, innovation metrics — are people willing to take risks and propose ideas?, make feedback culture a core competency in hiring, promotion, and performance evaluation), phase 4 year 2 optimize (target: engagement above 50%, turnover below 25%, Glassdoor above 3.5, innovation pipeline restarted, customer satisfaction trend reversing — connect culture improvement to business metrics for the PE firm)."
    weight: 0.35
    description: "PhasedTransformation"
  - type: llm_judge
    criteria: "Response addresses business case and PE firm concerns — financial ROI (the PE firm cares about returns — frame everything financially: $35M/year turnover cost: reducing turnover from 42% to 25% saves approximately $14M/year, productivity loss: disengaged employees are 18% less productive — at $500M revenue, even 5% productivity improvement is $25M, innovation: 0 new products in 3 years means the company is living off legacy — culture change enables innovation pipeline, customer satisfaction: 8 quarters of decline will eventually hit revenue — culture improvement is customer retention strategy), measurement framework for PE (quarterly culture health dashboard: engagement score, turnover rate, feedback quality metrics, innovation pipeline, customer satisfaction, cost savings from reduced turnover — the PE firm needs to see ROI quarterly), risk management (culture transformation can fail: resistance from leaders who benefited from the old culture — some may leave, and that's acceptable, founder regression — the founder may revert under pressure, ongoing coaching is essential, change fatigue — pace the transformation so people can absorb changes, 'this is just a fad' skepticism — sustained commitment over 18+ months is required, early visible wins build credibility for the long transformation)."
    weight: 0.30
    description: "BusinessCaseAndPE"
