meta:
  id: master-critique-shift
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Master critique shift — handle multiple master-level strategic design critique challenges in a single session"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Chief Design Officer at a publicly traded
  company. Three strategic challenges arrive simultaneously:

  TASK 1 — M&A Design Culture Integration: Your company
  ($2B revenue, 200 designers) is acquiring a competitor
  ($800M revenue, 80 designers). The competitor has a
  completely different design philosophy: they believe in
  "design by committee" (consensus-driven, slow, thorough)
  while your company practices "design by conviction"
  (individual designer ownership, fast, opinionated). Both
  approaches have produced successful products. The board
  wants a unified design organization within 12 months.
  Write the integration strategy.

  TASK 2 — Industry Standards Body: You've been asked to
  chair an industry working group creating "Design Critique
  Standards" — formalized critique practices that companies
  across the industry can adopt. Critics say standardizing
  critique kills creativity. Supporters say it raises the
  industry baseline. Write the standards framework.

  TASK 3 — Design Crisis Response: A viral social media
  post shows your product's interface failing a user with
  a disability. The post has 2M views. The accessibility
  failure was a known issue flagged in a design review 6
  months ago but deprioritized. The press is calling.
  Write the crisis response and the systemic fix.

  Task: Handle all three master-level critique challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — M&A design culture integration — cultural assessment (both approaches have strengths: 'design by committee' produces thoroughly vetted, consensus-backed solutions — lower risk, higher buy-in, slower; 'design by conviction' produces bold, innovative, individually-owned solutions — higher risk, faster, more distinctive; neither is superior — the goal is to create a unified culture that takes the best of both), integration strategy (don't force either culture on the other: create a new framework: 'Conviction with Consultation' — individual designers own decisions but must consult cross-functional stakeholders, fast iterations validated through structured feedback rather than slow consensus, use critique practices as the integration mechanism — shared review formats create shared culture), 12-month plan (months 1-3: cultural assessment and relationship building — mixed team projects to build trust; months 4-6: unified critique practices piloted with mixed teams; months 7-9: roll out unified practices to all teams; months 10-12: assess, adjust, and formalize the new culture), risk management (some designers from both sides will leave — plan for it, don't let cultural integration become cultural domination — the acquiring company's culture isn't automatically 'right')."
    weight: 0.35
    description: "MACultureIntegration"
  - type: llm_judge
    criteria: "Response handles Task 2 — industry critique standards — framework design (standards should define: minimum requirements — every organization should have regular design reviews, trained facilitators, documented feedback, feedback quality criteria; recommended practices — structured formats, cross-functional participation, data-informed critique, feedback tracking; advanced practices — AI-assisted checks, design quality metrics, cross-organizational review, design maturity assessment — these are aspirational), creativity preservation (address the criticism directly: standards don't standardize creativity — they standardize process: standardized process frees creative energy by removing ambiguity about how critique happens, allowing full focus on what is being critiqued, analogy: musical scales don't kill musical creativity — they provide a foundation for it, the standards define the container, not the content), practical considerations (industry adoption requires: voluntary not mandatory — companies adopt because the standards help them not because they're forced, scalable — applicable to 5-person startups and 5000-person enterprises, measurable — organizations can assess themselves against the standards, evolving — standards committee updates annually based on industry learning and emerging practices)."
    weight: 0.35
    description: "IndustryStandards"
  - type: llm_judge
    criteria: "Response handles Task 3 — accessibility crisis response — immediate response (within 24 hours: public acknowledgment — 'We failed this user and we're fixing it. We were aware of this issue and we didn't prioritize it. That was wrong. Here's what we're doing immediately.' — own it completely, no corporate deflection, ship the fix — the known issue flagged 6 months ago should be fixed NOW with emergency priority, reach out to the affected user directly — privately and respectfully, this is about them not your brand recovery), systemic fix (the real crisis is that a known accessibility issue was deprioritized in review: change the governance: accessibility issues flagged in design review cannot be deprioritized without VP-level sign-off, implement automated accessibility testing in CI/CD — catch issues before they reach users, quarterly accessibility audit of the entire product — not just new features, hire or designate accessibility specialists in the design review process), accountability without blame (the design review flagged the issue — that means the critique process worked, the failure was in the prioritization process that deprioritized a known accessibility violation, fix the process: accessibility issues get a separate priority track that can't be overridden by feature work, communicate internally: 'Our design review caught this 6 months ago. The failure was that we deprioritized it. We're changing our governance so this can't happen again.')."
    weight: 0.30
    description: "AccessibilityCrisisResponse"
