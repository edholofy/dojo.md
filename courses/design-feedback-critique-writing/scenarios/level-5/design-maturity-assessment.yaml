meta:
  id: design-maturity-assessment
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Design maturity assessment — evaluate an organization's design critique maturity and create a roadmap for advancement"
  tags: [maturity, assessment, roadmap, organizational, master]

state: {}

trigger: |
  A Fortune 500 company hires you as a design consultant
  to assess their design maturity. After 4 weeks of
  interviews, observations, and data gathering, your
  findings:

  Structure:
  - 120 designers across 15 product teams
  - Design reports to Engineering (no independent design
    leadership at VP level)
  - No centralized design operations
  - Design system exists but maintained by 1 person

  Critique practices:
  - 4 teams do regular critiques (27%)
  - 6 teams do occasional reviews (40%)
  - 5 teams have no design review process (33%)
  - No cross-team critique mechanism
  - No executive design review

  Quality indicators:
  - Accessibility: 35% WCAG AA compliance
  - Design system adoption: 45%
  - Customer satisfaction (CSAT) design-attributed: 3.2/5
  - Designer satisfaction: 2.8/5 (industry average 3.6)
  - Designer turnover: 30% annually (industry average 18%)
  - Time from design to development: 6 weeks average
  - Post-launch design revision rate: 55% of features

  Task: Write a comprehensive design maturity assessment
  with diagnosis, maturity level classification, and a
  3-year advancement roadmap.

assertions:
  - type: llm_judge
    criteria: "Response provides a structured maturity assessment — maturity model (define 5 levels: Level 1 Ad Hoc — design happens but without process, quality varies wildly, no feedback culture; Level 2 Emerging — some teams have critique practices, design system exists but adoption is low, quality inconsistent; Level 3 Established — all teams have regular critiques, design system widely adopted, consistent quality baseline; Level 4 Integrated — design is integrated into business strategy, cross-functional critique culture, data-driven design decisions; Level 5 Leading — design is a strategic differentiator, critique culture extends company-wide, continuous innovation), current assessment (this organization is between Level 1 and Level 2: 33% of teams have no reviews at all, 35% accessibility compliance, 45% design system adoption, 55% post-launch revision rate, 30% designer turnover — all indicators of immature design practice, the single design system maintainer is a critical risk — bus factor of 1), each dimension scored: critique culture, design system, accessibility, organizational structure, designer satisfaction and growth."
    weight: 0.35
    description: "MaturityAssessment"
  - type: llm_judge
    criteria: "Response diagnoses root causes — structural problem (design reporting to engineering means: design decisions are subordinated to engineering priorities, no executive voice for design quality, designers feel undervalued — contributing to 2.8/5 satisfaction and 30% turnover, no authority to establish cross-team design standards), critique culture deficit (73% of teams have absent or inconsistent review practices — root cause: no organizational mandate for design quality, no trained facilitators, no time allocated for reviews, without critique, quality issues compound: 55% post-launch revision rate means more than half of designs need fixing after launch — indicating insufficient pre-launch review), design system underinvestment (1 person maintaining a system for 120 designers across 15 teams is unsustainable — 45% adoption reflects inadequate support, without a robust design system, consistency is impossible and each team reinvents solutions — contributing to the 6-week design-to-development time), accessibility gap (35% WCAG AA compliance is a legal and ethical risk — indicates accessibility is not part of the design process, likely not reviewed in critiques, and not enforced in development)."
    weight: 0.35
    description: "RootCauseDiagnosis"
  - type: llm_judge
    criteria: "Response provides a phased 3-year roadmap — year 1 foundation (quarter 1: hire VP of Design to give design executive voice, establish design ops function with 2-3 hires, expand design system team to 3-4 people; quarter 2: mandate weekly design critiques for all 15 teams, train 30 critique facilitators — 2 per team, launch accessibility training and set 60% WCAG compliance target; quarter 3: establish cross-team review cadence, implement design quality gates in development process, launch design system adoption drive targeting 70%; quarter 4: assess progress — target all teams doing regular reviews, designer satisfaction improving, design system adoption at 70%), year 2 maturation (establish cross-functional critique practices, integrate user research into design reviews, launch design quality metrics dashboard, target: 80% accessibility compliance, 80% design system adoption, designer turnover below 22%, post-launch revision rate below 35%), year 3 excellence (design as strategic partner to business, company-wide critique culture expansion, design innovation programs, target: 95% accessibility, 90%+ design system adoption, designer satisfaction above industry average, design contributing measurably to business outcomes — Level 4 maturity), each phase has clear goals, investments needed, success metrics, and risk factors."
    weight: 0.30
    description: "ThreeYearRoadmap"
