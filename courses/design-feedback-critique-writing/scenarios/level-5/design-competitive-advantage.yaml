meta:
  id: design-competitive-advantage
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Design competitive advantage — position design critique and quality as a strategic competitive advantage at the board level"
  tags: [competitive-advantage, strategy, board-level, differentiation, master]

state: {}

trigger: |
  You're presenting to the board of directors. The
  chairperson asks: "Three of our competitors have larger
  engineering teams and bigger budgets. How does design
  give us a competitive advantage that they can't easily
  replicate?"

  Company context:
  - $200M revenue SaaS company
  - 50 designers (competitors have 20-30 each)
  - Industry-leading NPS (72 vs competitor average of 45)
  - Lowest churn rate in the category (5% vs 12% average)
  - Highest per-seat revenue ($180/seat vs $120 average)
  - Design critique culture rated "best in class" by
    industry survey
  - Design system powers 95% of product interface
  - Average time from design to shipped feature: 2 weeks
    (competitor average: 6 weeks)

  However:
  - Competitors are investing heavily in design
  - Two competitors just hired VPs of Design from Apple
    and Google
  - Your design team is your most requested acquisition
    target ("we'd buy you just for the design team")

  Task: Build a board-level strategic case for design as
  a durable competitive advantage, specifically how
  critique culture creates compounding returns.

assertions:
  - type: llm_judge
    criteria: "Response builds the competitive moat argument — design as compounding advantage (competitors can hire designers and buy tools — but critique culture takes years to build and can't be copied: it requires organizational trust, institutional knowledge, trained facilitators, and embedded practices — hiring Apple/Google VPs doesn't automatically create this, those VPs will spend 18-24 months building what you already have, while you're 3+ years ahead and still compounding), quantified advantages (NPS 72 vs 45: this translates directly to organic growth through word-of-mouth and referrals, churn 5% vs 12%: each point of churn reduction is worth approximately X million in retained revenue annually, per-seat revenue $180 vs $120: users pay 50% more because they perceive higher value — design quality enables premium pricing, 2-week vs 6-week delivery: 3x faster design-to-ship means faster iteration, faster response to market changes, faster customer value delivery — this is a velocity advantage), the flywheel (critique culture → higher design quality → better user experience → higher NPS → lower churn → higher revenue per seat → more investment in design → stronger critique culture — this is a self-reinforcing cycle that competitors must build from scratch)."
    weight: 0.35
    description: "CompetitiveMoatArgument"
  - type: llm_judge
    criteria: "Response addresses durability and threats — why it's hard to replicate (three barriers to entry: 1. Time — critique culture takes 3+ years of consistent investment, you can't accelerate trust and institutional knowledge; 2. People — your 50 designers are trained in this culture, they've internalized the practices, new hires from Apple/Google bring different cultural norms that need adaptation; 3. Systems — your design system, review processes, metrics dashboards, and feedback infrastructure are deeply integrated — competitors would need to build all of this while also shipping product), competitive response strategy (competitors hiring VPs of Design is a threat signal — they're trying to build what you have: accelerate your advantage: invest in the next generation of critique practices before competitors catch up to your current level, deepen design system investment, expand critique culture to product and engineering — create advantages competitors haven't even thought of yet, talent retention: your design team is your 'most requested acquisition target' — protect them: competitive compensation, growth opportunities, design culture as a retention tool), board-level metrics to track (quarterly report: design-attributed revenue — NPS-driven growth, churn reduction value, premium pricing maintenance, competitive gap tracking — are competitor NPS/churn/revenue metrics closing the gap or are you maintaining distance?, talent metrics — retention rate, offer acceptance rate, employer brand strength in design community, innovation velocity — new feature launch rate compared to competitors)."
    weight: 0.35
    description: "DurabilityAndThreats"
  - type: llm_judge
    criteria: "Response provides strategic recommendations for the board — investment case (design is delivering disproportionate ROI compared to engineering headcount: 50 designers producing premium pricing, lowest churn, highest NPS — the marginal return on design investment is higher than marginal engineering investment at this point, recommend: increase design investment by 20% over 2 years focused on: design system expansion, critique culture deepening, research capabilities, this investment protects and extends the competitive advantage), acquisition defense (the 'we'd buy you for the design team' signal means: the design team IS the competitive advantage, the board should understand that if the design team degrades through underinvestment, cost-cutting, or cultural neglect, the company's core differentiator is at risk, protecting design culture is protecting company valuation), future positioning (where to take the advantage next: AI-augmented design critique — use AI to handle consistency checks so human critique focuses on innovation and strategy, expand design thinking to business strategy — the critique discipline that makes your design great can make your business strategy better, design-led market expansion — your UX advantage enables entry into adjacent markets where competitors can't match the user experience)."
    weight: 0.30
    description: "StrategicRecommendations"
