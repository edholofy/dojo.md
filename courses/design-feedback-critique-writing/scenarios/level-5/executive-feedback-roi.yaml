meta:
  id: executive-feedback-roi
  level: 5
  course: design-feedback-critique-writing
  type: output
  description: "Executive feedback ROI — quantify and communicate the business return on investment of design feedback programs to C-suite and board"
  tags: [executive, roi, business-case, c-suite, master]

state: {}

trigger: |
  The CFO is reviewing budgets and questions the design
  team's investment: "You spent $2.3M on design last year
  including salaries, tools, and your critique program.
  Engineering can show me their output in shipped features
  and bug reduction. What can design show me?"

  Available data:
  - Design-reviewed features: 40% fewer post-launch bugs
  - User adoption of reviewed features: 25% higher
  - Support cost for reviewed features: 15% lower
  - Design system saved ~800 engineering hours last year
  - Customer NPS increased from 42 to 58 after design
    quality program
  - Time-to-market decreased 20% with design involvement
  - 2 enterprise deals ($1.2M combined) cited "superior
    UX" as deciding factor
  - Designer retention improved from 65% to 88% after
    critique culture program

  The CFO needs a framework, not just anecdotes.

  Task: Build a comprehensive design ROI presentation for
  the CFO that translates design quality and critique
  investments into financial terms.

assertions:
  - type: llm_judge
    criteria: "Response builds a financial framework — cost avoidance (40% fewer bugs: calculate average bug fix cost × number of bugs avoided = direct engineering savings, 15% lower support costs: calculate support ticket cost × reduction = direct cost savings, design system 800 hours saved: at average engineering hourly rate = direct savings — total these for 'costs design prevents'), revenue attribution (25% higher adoption: connect to revenue — higher adoption means more active users, better retention, more opportunities for upsell/expansion, 2 enterprise deals citing UX: $1.2M directly attributed to design quality, 20% faster time-to-market: revenue realized sooner — calculate the value of 20% earlier launch for an average feature, NPS 42→58: industry research shows NPS correlates with revenue growth — cite relevant benchmarks), retention savings (designer retention 65%→88%: calculate cost of designer turnover — recruiting, onboarding, ramp-up time, productivity loss — at average design salary, each retained designer saves 50-200% of salary in turnover costs, improved culture from critique program is the driver), present as: 'For every $1 invested in design, the organization sees $X in measurable value.'"
    weight: 0.35
    description: "FinancialFramework"
  - type: llm_judge
    criteria: "Response teaches executive communication of design value — CFO language (don't talk about design principles or aesthetics — talk about: cost reduction, revenue generation, risk mitigation, competitive advantage, use financial terminology: ROI, cost avoidance, attribution, payback period, present design as a business function not an art function), dashboard not deck (propose a quarterly design ROI dashboard: key metrics tracked over time with financial translations, trend lines showing improvement trajectories, comparison: design-reviewed vs non-reviewed feature performance, make the data self-evident — the CFO shouldn't need a designer to explain why design matters), address the comparison to engineering (the CFO compared design to engineering — both are investments in product quality: engineering ensures things work, design ensures things work for users, engineering metrics — shipped features, bug rates — measure internal quality, design metrics — adoption, NPS, support costs — measure external quality and user impact, together they represent full product quality)."
    weight: 0.35
    description: "ExecutiveCommunication"
  - type: llm_judge
    criteria: "Response provides sustainable design ROI practices — ongoing measurement infrastructure (don't make this a one-time presentation — establish continuous design impact tracking: automated dashboards connecting design review completion to downstream metrics, quarterly design ROI report to finance, annual design investment review with CFO — make it a standing meeting), attribution methodology (design impact is often shared with engineering and product — establish clear attribution model: direct attribution — UX cited in deals, design-reviewed bug reduction; contributory attribution — NPS improvement, time-to-market; systemic attribution — design system savings, retention improvement; be honest about what's directly attributable vs correlated — credibility matters more than inflated numbers), investment case for growth (use the ROI framework to justify future investment: if current investment yields X return, additional investment in design systems, research, or headcount will yield proportional or greater return — show the CFO the marginal return curve of design investment, propose: for every additional designer, based on current ratios, expected business impact is Y — let the data make the case for growth)."
    weight: 0.30
    description: "SustainableROI"
