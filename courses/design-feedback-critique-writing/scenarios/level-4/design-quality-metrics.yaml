meta:
  id: design-quality-metrics
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Design quality metrics — define and implement measurable design quality standards for critique and evaluation"
  tags: [quality, metrics, standards, measurement, expert]

state: {}

trigger: |
  The CEO asks your design leadership team: "Engineering
  has code coverage, bug rates, and velocity metrics. What
  are design's equivalent quality metrics? How do we know
  if our design quality is improving or declining?"

  Context:
  - 45 designers across 8 product teams
  - No formal design quality measurement exists
  - Designers resist metrics: "You can't measure creativity"
  - Product managers want quantitative design benchmarks
  - Recent competitive analysis shows your product's UX
    rated lower than 2 key competitors
  - Customer support tickets mentioning "confusing" or
    "hard to use" have increased 30% year-over-year

  Task: Propose a design quality metrics framework that
  satisfies leadership needs while respecting design's
  qualitative nature.

assertions:
  - type: llm_judge
    criteria: "Response defines a balanced metrics framework — outcome metrics (what users experience: task success rate per feature, time-on-task for key workflows, error rate and recovery rate, SUS or UMUX-Lite scores per product area, NPS/CSAT specifically attributed to UX, support tickets tagged as UX issues — trending down from the 30% increase), process metrics (how design work happens: design system component coverage and adoption rate, accessibility compliance percentage — WCAG AA, design review completion rate — every major feature reviewed, usability test coverage — percentage of features tested before launch, design debt ratio — known issues vs resolved issues), consistency metrics (how cohesive the experience feels: cross-product pattern consistency score, brand guideline compliance, interaction pattern uniformity — do similar actions work the same way everywhere?), each metric has: definition, measurement method, target, and review cadence."
    weight: 0.35
    description: "MetricsFramework"
  - type: llm_judge
    criteria: "Response addresses designer resistance thoughtfully — reframe the conversation (metrics don't measure creativity — they measure the impact of creative decisions on users, just as code coverage doesn't measure engineering brilliance but ensures reliability, design metrics ensure our creative work actually serves users, 'what gets measured gets improved' — without metrics design improvement is invisible and under-resourced), avoid vanity metrics (don't measure: number of designs produced, pixel-perfection scores, subjective aesthetic ratings — these are counterproductive, do measure: whether users can accomplish their goals, whether the experience is consistent, whether accessibility standards are met — these are objective and user-centered), designer-owned metrics (designers should define and own their metrics — not have engineering or product metrics imposed on them, frame metrics as design's voice at the leadership table: 'when the CEO asks how design is doing, what story do we want to tell? without metrics, we have no story'), address the competitive gap (competitors rated higher on UX — what specific metrics would show where and why? task success rates, time-on-task comparisons, heuristic evaluation scores — use metrics to close the competitive gap with evidence not opinion)."
    weight: 0.35
    description: "DesignerResistance"
  - type: llm_judge
    criteria: "Response provides implementation plan — measurement infrastructure (tools: analytics integration for task success and time-on-task, quarterly SUS/UMUX-Lite surveys, support ticket tagging taxonomy for UX issues, automated accessibility scanning, design system analytics for adoption tracking), reporting cadence (weekly: team-level metrics in sprint reviews, monthly: cross-team design quality dashboard for design leadership, quarterly: executive design quality report for C-suite with trend analysis and competitive benchmarking, annually: comprehensive design maturity assessment), getting started (don't try to measure everything at once: phase 1 — support ticket trending and SUS baseline, phase 2 — task success rates for top 5 workflows, phase 3 — design system adoption and accessibility compliance, phase 4 — full dashboard, start with the metrics that address the CEO's concern: competitive UX rating and support ticket increase — show improvement on these first to build credibility for the metrics program)."
    weight: 0.30
    description: "ImplementationPlan"
