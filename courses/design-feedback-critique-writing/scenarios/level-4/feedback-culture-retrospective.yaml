meta:
  id: feedback-culture-retrospective
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Feedback culture retrospective — assess, diagnose, and improve an organization's design feedback culture through structured retrospective"
  tags: [retrospective, culture-assessment, diagnosis, improvement, expert]

state: {}

trigger: |
  Six months after implementing a design review program,
  you're running a retrospective. Survey data reveals:

  Positive signals:
  - Review attendance up from 40% to 85%
  - 78% of designers say they feel "safe sharing WIP"
  - Cross-functional participation doubled
  - Design system adoption increased from 60% to 82%

  Concerning signals:
  - Reviews consistently run over time (60-min sessions
    averaging 85 minutes)
  - 3 teams report "review fatigue" — too many reviews
  - Feedback quality scores plateau — hasn't improved
    in 3 months
  - Senior designers still give 70% of all feedback —
    junior voice ratio unchanged
  - 40% of feedback is "nice to have" — not prioritized
    or actionable
  - Remote designers rate inclusion at 6/10 vs 8/10 for
    in-person

  Task: Write a retrospective analysis with diagnosis of
  each concern and specific interventions to address them.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses each concern with root causes — time overruns (root causes: too much work reviewed per session, no clear scope definition upfront, facilitators not enforcing time boxes, discussion spiraling into implementation details — fix: limit each review to 2-3 design topics max, allocate specific time per topic with timer, facilitator training on time management, parking lot for tangential discussions), review fatigue (root causes: too many reviews without clear purpose differentiation, some reviews could be async, designers feel obligated to attend all reviews even when not relevant — fix: categorize reviews into mandatory team reviews and optional cross-team reviews, introduce async critique option for smaller changes, let designers choose which cross-team reviews to attend based on relevance), feedback quality plateau (root causes: initial improvement came from low-hanging fruit like 'be specific', further improvement requires deeper skill building, feedback templates may be creating formulaic responses — fix: advanced feedback workshops focusing on critique depth, introduce 'feedback on feedback' sessions where facilitators coach feedback quality, refresh templates and frameworks to prevent staleness)."
    weight: 0.35
    description: "DiagnosisAndRootCauses"
  - type: llm_judge
    criteria: "Response addresses participation and inclusion gaps — senior designer dominance (root cause: junior designers lack confidence, seniors fill silence, habit from old culture still persists despite improved safety — fix: structured critique formats that allocate equal speaking time, 'juniors first' round where junior designers share feedback before seniors, pair junior and senior designers where senior coaches junior to formulate and present feedback, track and share speaking time metrics to make the imbalance visible), unprioritized feedback (root cause: 40% 'nice to have' means reviewers aren't distinguishing between critical and optional feedback — fix: require feedback prioritization during critique: P1 must fix before ship, P2 should fix if time allows, P3 consider for future iteration, facilitator summarizes only P1 and P2 action items, teach the difference between blocking feedback and suggestions), remote inclusion gap (6/10 vs 8/10 is significant — root cause: in-person side conversations exclude remote participants, screen sharing quality may not show design details, remote designers may feel like observers not participants — fix: all-remote format for at least 50% of reviews, remote-first facilitation: call on remote participants explicitly, share high-res design files before review so remote designers can zoom in, dedicated remote advocate role who flags when remote voices are being excluded)."
    weight: 0.35
    description: "ParticipationAndInclusion"
  - type: llm_judge
    criteria: "Response provides a forward-looking improvement plan — celebrate wins first (the positive signals are significant: 85% attendance from 40%, 78% psychological safety, doubled cross-functional participation, 82% design system adoption — these are real achievements that the team should acknowledge and be proud of, frame the retrospective as 'building on success' not 'fixing failure'), specific interventions with timeline (month 1: implement time boxing and review scope limits, introduce feedback prioritization, launch 'juniors first' speaking order; month 2: introduce async critique option to reduce fatigue, remote inclusion improvements, advanced feedback workshop; month 3: reassess metrics — are time overruns decreasing? is feedback quality improving? is the junior/senior voice ratio shifting?), program evolution principles (the review program should evolve every quarter based on retrospective data, no process is permanent — what worked 6 months ago may need updating, measure continuously: add the concerning signals to regular tracking alongside the positive signals, build a culture of meta-feedback: feedback about the feedback process itself is healthy and should be encouraged)."
    weight: 0.30
    description: "ImprovementPlan"
