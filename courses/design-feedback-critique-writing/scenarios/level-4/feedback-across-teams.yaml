meta:
  id: feedback-across-teams
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Feedback across teams — scale design feedback practices across distributed teams with different maturity levels"
  tags: [scaling, distributed, cross-team, maturity, expert]

state: {}

trigger: |
  Your design organization has 6 distributed teams across
  3 time zones (US West, US East, EU). Each team has
  different critique maturity:

  Team Alpha (US West, 8 designers): Strong critique
  culture, weekly structured reviews, high participation
  Team Beta (US East, 6 designers): Inconsistent — reviews
  happen but quality varies, dominated by 2 vocal designers
  Team Gamma (EU, 5 designers): No reviews — designers
  work in isolation and share only finished work
  Team Delta (US West, 4 designers): New team, eager but
  inexperienced — feedback is mostly "looks good" or "I
  don't like the colors"
  Team Echo (US East, 7 designers): Reviews happen but
  are defensive — designers argue rather than listen
  Team Foxtrot (EU/US East split, 5 designers): Split
  across time zones, can never find a time to meet

  Total: 35 designers, 6 teams, 3 time zones, 6 different
  maturity levels.

  Task: Create a unified feedback scaling strategy that
  raises all teams to a consistent standard while
  respecting their differences.

assertions:
  - type: llm_judge
    criteria: "Response provides team-specific interventions — Alpha (leverage as model: document their practices, have Alpha members mentor other teams, use them as pilot for new initiatives), Beta (address the 2 vocal designers: introduce facilitator rotation and speaking-time limits, pair quieter designers to co-present so they build confidence), Gamma (start from scratch: assign a critique champion from the team, begin with low-stakes exercises like reviewing external designs before internal work, establish a weekly 30-min slot and make attendance mandatory for 8 weeks to build the habit), Delta (skill building: pair with Alpha for mentorship, provide feedback sentence starters and frameworks like 'I notice... I wonder... Have you considered...', train on giving specific actionable feedback), Echo (address defensiveness: introduce 'silent feedback' where all feedback is written before discussed, use facilitator to enforce 'no defending during feedback round' rule, reframe critique as collaborative problem-solving not evaluation), Foxtrot (time zone solution: async critique via Loom videos or Figma comments with structured prompts, plus one synchronous session per sprint that alternates between EU-friendly and US-friendly times)."
    weight: 0.35
    description: "TeamSpecificInterventions"
  - type: llm_judge
    criteria: "Response addresses cross-team and time zone challenges — unified standards (all teams should meet minimum bar: at least one structured review per week, every review has a facilitator, feedback must be specific and actionable, all feedback documented for reference — but format can vary by team preference), time zone strategy (synchronous: monthly all-hands design critique at rotating times — each time zone takes the inconvenient slot once per quarter; asynchronous: shared Figma project for async feedback with structured comment templates, Loom video reviews for detailed walkthroughs across time zones, 48-hour feedback window for async reviews to ensure all time zones can participate), cross-team pollination (quarterly team swaps: 1 designer from each team joins another team's critique for a week — builds empathy and spreads best practices, cross-team critique pairs: each team is paired with another team for monthly peer reviews, shared feedback repository: best feedback examples, common patterns, lessons learned)."
    weight: 0.35
    description: "CrossTeamTimeZone"
  - type: llm_judge
    criteria: "Response provides governance and measurement — critique maturity model (define levels: Level 1 — no regular reviews; Level 2 — reviews happen but unstructured; Level 3 — structured reviews with facilitation; Level 4 — cross-functional reviews with data integration; Level 5 — self-sustaining critique culture that drives design excellence — map each team to current level and set targets: all teams at Level 3 within 6 months, Level 4 within 12 months), measurement and tracking (team-level: review frequency, participation rate, feedback quality scored by facilitator, designer satisfaction survey quarterly; organization-level: design consistency across teams, design system adoption convergence, time-to-quality for designs, designer retention and growth), scaling infrastructure (critique playbook: standardized facilitator guide, feedback templates, review formats, training materials; critique champions program: one trained facilitator per team who coaches others and reports to design ops; feedback tools: standardized on one platform for async feedback across all teams; quarterly retrospective on the critique program itself — is it working? what needs to change?)."
    weight: 0.30
    description: "GovernanceAndMeasurement"
