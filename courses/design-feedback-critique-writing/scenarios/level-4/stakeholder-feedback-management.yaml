meta:
  id: stakeholder-feedback-management
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Stakeholder feedback management — handle complex stakeholder dynamics, competing priorities, and executive feedback in design reviews"
  tags: [stakeholders, executives, politics, alignment, expert]

state: {}

trigger: |
  You're presenting a major product redesign to a room of
  senior stakeholders. During the review:

  CEO: "I want it to feel more premium — like Apple."
  VP Sales: "Our enterprise clients need more density. They
  complained the current design wastes space."
  VP Engineering: "This redesign will take 6 months. Can we
  do something simpler?"
  Head of Marketing: "The brand colors need to be more
  prominent. I can barely see our brand in this."
  VP Customer Success: "Our NPS shows users love the current
  navigation. Why are we changing it?"
  CFO: "What's the ROI? How do we know this redesign will
  increase revenue?"

  Every stakeholder has a different priority. Some feedback
  contradicts other feedback. The CEO's "like Apple"
  directive is vague. The CFO wants numbers you may not
  have.

  Task: Write a response strategy that addresses each
  stakeholder's feedback, resolves contradictions, and
  moves the project forward.

assertions:
  - type: llm_judge
    criteria: "Response addresses each stakeholder specifically — CEO 'like Apple' (translate vague direction into actionable criteria: 'premium feel' means: generous whitespace, refined typography, restrained color palette, attention to micro-interactions — ask clarifying questions: 'When you think of Apple, is it the simplicity, the polish, the consistency, or the brand elevation that resonates most?', never dismiss executive feedback even when vague — decode it), VP Sales density concern (enterprise density and premium feel can coexist: density doesn't mean cramped — it means efficient use of space, propose: configurable density settings — comfortable default with compact mode for power users, validate with enterprise client research — not just sales anecdotes), VP Engineering scope concern (legitimate: 6-month redesign is a large commitment — propose phased approach: Phase 1 core experience 8 weeks, Phase 2 enhanced features 8 weeks, Phase 3 polish and edge cases 8 weeks, each phase delivers shippable value), Head of Marketing brand (brand doesn't mean logo everywhere: brand is expressed through consistent color, typography, and interaction patterns — present brand color strategy: primary color for key actions, brand palette for accents, show how brand identity can be strong without being overwhelming), VP Customer Success navigation (respect the data: if NPS shows navigation satisfaction, present evidence for why change is needed despite satisfaction — or acknowledge that navigation should be evolved not replaced, propose: user testing of new navigation against current to validate the change), CFO ROI (prepare business case: conversion improvements from similar redesigns in the industry, reduced support costs from improved usability, competitive positioning against products cited in lost deals, customer retention impact — frame as investment with expected returns)."
    weight: 0.35
    description: "StakeholderResponses"
  - type: llm_judge
    criteria: "Response resolves contradictions between stakeholders — map the contradictions (premium/Apple feel vs enterprise density, 6-month concern vs comprehensive redesign scope, brand prominence vs clean premium aesthetic, keeping navigation vs redesigning — these aren't all true contradictions, some can be resolved with nuance), resolution framework (1. Separate opinions from data — VP Customer Success has NPS data, others have opinions — data gets more weight; 2. Identify shared goals — everyone wants a better product that drives business results, frame solutions in terms of shared goals; 3. Find creative solutions that satisfy multiple stakeholders — density settings satisfies both CEO and VP Sales, phased approach satisfies VP Engineering and CEO; 4. Where true contradictions exist, escalate the decision with clear trade-offs: 'We can optimize for premium feel OR maximum density, but not both simultaneously — here's what each choice means for the business'), managing the room (don't try to resolve everything in the meeting — acknowledge each concern, document it, propose follow-up: 'I hear six important perspectives. Let me synthesize these into a revised proposal that addresses each concern, and we'll reconvene in one week with a recommendation')."
    weight: 0.35
    description: "ContradictionResolution"
  - type: llm_judge
    criteria: "Response provides a strategic path forward — post-meeting action plan (within 48 hours: send meeting summary with each stakeholder's concern acknowledged and how it will be addressed, schedule 1:1 follow-ups with CEO and CFO — the two most critical stakeholders, revise proposal to incorporate feasible feedback, prepare data to support or counter specific concerns), stakeholder management strategy (identify the true decision-maker — likely the CEO, understand who has veto power — CFO can kill the project on ROI grounds, build coalition: VP Customer Success has data on your side, ally with them, manage VP Engineering by showing phased approach reduces risk), design review structure for next time (pre-meeting: share materials 48 hours in advance so stakeholders can process before the room, frame the review: 'we're looking for alignment on direction, not pixel-level feedback', structured feedback: ask each stakeholder to submit top 3 concerns in writing before the meeting to avoid real-time pile-on, separate strategic feedback from tactical feedback — executives should focus on strategy, tactical details go to design reviews)."
    weight: 0.30
    description: "StrategicPathForward"
