meta:
  id: critique-training-program
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Critique training program — design and implement a training curriculum to teach design critique skills across the organization"
  tags: [training, curriculum, skill-development, organizational, expert]

state: {}

trigger: |
  Your organization is launching a Design Critique Training
  Program. You need to train 3 audiences:

  1. Designers (35 people) — need to give and receive
     better feedback, facilitate reviews, and integrate
     research into critiques
  2. Product Managers (20 people) — need to give design
     feedback without prescribing solutions, understand
     design trade-offs, and collaborate effectively
  3. Engineers (50 people) — need to give implementation-
     informed feedback, raise feasibility concerns
     constructively, and participate in design reviews
     without derailing into technical debates

  Constraints:
  - Maximum 2 hours per training session
  - Must include hands-on practice, not just slides
  - Participants are skeptical: "another corporate training"
  - Training must work for both in-person and remote
  - Budget for 4 sessions total across all 3 audiences

  Task: Design the critique training curriculum with
  session plans, exercises, and success metrics.

assertions:
  - type: llm_judge
    criteria: "Response designs audience-specific training — designer session 2 hours (hour 1: the anatomy of great feedback — what makes feedback specific, actionable, and kind — examples of before/after feedback transformation, facilitation skills — how to run a critique session, manage time, ensure all voices are heard, handle difficult dynamics; hour 2: hands-on practice — critique a real design in small groups with rotating facilitators, each group presents their feedback to the room and receives meta-feedback on their feedback quality), PM session 2 hours (hour 1: design thinking for PMs — understanding design trade-offs, how to express needs without prescribing solutions — transform 'make the button bigger' into 'users are missing the primary action, how might we increase its visibility?', when to push back and when to trust designer judgment; hour 2: hands-on — PMs and designers co-critique a design together, practicing the language of collaborative feedback), engineer session 2 hours (hour 1: the engineer's role in design review — how to raise feasibility concerns constructively, how to suggest alternatives without dismissing design intent — transform 'we can't build that' into 'that approach has performance implications, what if we considered this alternative that achieves the same user goal?', separating 'can't' from 'hard'; hour 2: hands-on — engineers practice giving implementation-informed feedback on a design that has intentional feasibility challenges)."
    weight: 0.35
    description: "AudienceSpecificTraining"
  - type: llm_judge
    criteria: "Response addresses the fourth session and engagement — combined session 2 hours (bring all 3 audiences together for a cross-functional critique simulation: hour 1 — mixed groups of designers, PMs, and engineers critique a realistic product design together, applying skills from individual sessions, facilitator observes and coaches; hour 2 — debrief on cross-functional dynamics, establish shared vocabulary and norms for ongoing design reviews, each group commits to one practice they'll implement in their team), overcoming skepticism (don't call it training — call it a 'Design Critique Workshop' or 'Feedback Lab', start with a compelling example: show a product failure caused by poor feedback culture and a success enabled by good critique, make it immediately practical: 'you'll leave with 3 techniques you can use in your next design review', use real product examples not abstract exercises — people engage more when the work matters), remote adaptation (all exercises work in breakout rooms, use FigJam or Miro for collaborative critique annotation, structured turn-taking ensures remote voices are equal, async pre-work: participants review a design and submit initial feedback before the session — this saves time and ensures everyone arrives prepared)."
    weight: 0.35
    description: "CombinedSessionAndEngagement"
  - type: llm_judge
    criteria: "Response includes success metrics and sustainability — measurement (pre/post survey: feedback confidence, critique satisfaction, perceived team collaboration — measure change; 30-day follow-up: are participants using the techniques? what's changed in their design reviews?; 90-day assessment: design review quality ratings, cross-functional participation rates, designer satisfaction with feedback culture; qualitative: collect 'before and after' feedback examples that show improvement), sustainability beyond the 4 sessions (create a critique toolkit: quick-reference cards with feedback sentence starters, facilitation checklists, review templates — distribute to all participants; establish critique champions: one trained facilitator per team who coaches ongoing practice; monthly 'feedback clinic': 30-min optional session where anyone can bring a feedback challenge and get advice; integrate critique skills into onboarding — every new hire gets a 30-min orientation to the organization's feedback culture and norms), materials (session slides, facilitator guide, participant workbook with exercises, feedback templates and sentence starters, critique facilitation checklist, design review format templates — all available in a shared workspace)."
    weight: 0.30
    description: "MetricsAndSustainability"
