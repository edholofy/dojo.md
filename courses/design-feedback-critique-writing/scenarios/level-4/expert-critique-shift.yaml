meta:
  id: expert-critique-shift
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Expert critique shift — handle multiple expert-level organizational design feedback challenges in a single session"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're the VP of Design handling three organizational
  critique challenges simultaneously:

  TASK 1 — Your company acquired a startup. The startup's
  15 designers have a very different critique culture:
  fast, informal, sometimes harsh ("move fast and break
  feelings"). Your 35 designers use structured, gentle
  critiques. Both sides think the other is wrong. You need
  to merge the cultures without losing what works from
  either side.

  TASK 2 — The board has asked you to justify design's
  contribution to the company. They want to see how design
  feedback and quality processes translate to business
  outcomes. You have data showing: design-reviewed features
  have 40% fewer post-launch bugs, 25% higher user
  adoption, and 15% lower support costs. But the board
  wants a comprehensive framework, not just data points.

  TASK 3 — A competitor just shipped a product that makes
  your flagship feature look outdated. Your CEO wants
  "a complete redesign in 6 weeks." Your design team says
  "we need 4 months to do it right." You need to write
  a critique-informed response that manages expectations
  while mobilizing the team.

  Task: Handle all three expert critique challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — culture merger — acknowledges both cultures have value (startup speed and directness catches problems fast, corporate structure ensures thoroughness and psychological safety — neither is 'wrong'), merger strategy (don't force one culture on the other — create a new shared culture that takes the best of both: from startup take speed and directness, from corporate take structure and safety, new norms: feedback must be direct AND respectful — 'fast' doesn't mean 'harsh' and 'structured' doesn't mean 'slow'), integration plan (mixed teams for cross-pollination, joint workshop where both sides share their critique practices and co-create new norms, buddy system pairing startup and corporate designers, 90-day check-in to assess cultural integration — are both groups feeling heard?), risk management (startup designers may resist structure as 'corporate bureaucracy', corporate designers may resist directness as 'rudeness' — address both perceptions explicitly, watch for cliques forming along old company lines)."
    weight: 0.35
    description: "CultureMerger"
  - type: llm_judge
    criteria: "Response handles Task 2 — board justification — comprehensive design ROI framework (organize around: revenue impact — features with design review have 25% higher adoption = more usage = more revenue or retention, cost reduction — 40% fewer post-launch bugs = reduced engineering rework costs, 15% lower support costs = direct savings, risk mitigation — design governance prevents costly redesigns and brand damage, competitive advantage — design quality as market differentiator), presentation strategy for the board (translate design metrics into business language: 'design review reduces post-launch engineering rework by 40%, saving approximately X engineering hours per quarter', create a design quality dashboard that maps to business KPIs, show year-over-year trends not just snapshots, benchmark against industry data where available), ongoing measurement (propose quarterly design impact report to the board — not a one-time presentation but a sustained narrative, track: feature adoption rates for reviewed vs unreviewed features, support cost trends, user satisfaction trends, design system ROI — component reuse savings)."
    weight: 0.35
    description: "BoardJustification"
  - type: llm_judge
    criteria: "Response handles Task 3 — redesign timeline pressure — manage the CEO expectation (6 weeks for a complete redesign is unrealistic and will produce worse results than the competitor — but saying 'no' without an alternative is not helpful, propose a phased approach: Week 1-2 — rapid competitive analysis and design sprint to identify key differentiators, Week 3-6 — ship Phase 1 with the highest-impact improvements that close the competitive gap, Month 2-3 — Phase 2 with deeper innovations that leapfrog the competitor, Month 3-4 — Phase 3 polish and optimization), critique-informed approach (use design critique to accelerate not slow down: daily critiques during the sprint phase to iterate faster, competitive design teardown — what specifically makes the competitor's feature better? don't redesign everything, identify the 3-5 specific areas where the competitor is genuinely ahead, focus improvement there), team mobilization (acknowledge the urgency without creating panic, frame as 'focused sprint' not 'death march', protect quality: shipping a rushed redesign that's worse than the competitor helps nobody, the 4-month timeline was the team's honest estimate — negotiate to 3 months with a 6-week Phase 1 visible shipment)."
    weight: 0.30
    description: "RedesignTimeline"
