meta:
  id: critique-culture-building
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Critique culture building — transform an organization's feedback culture from toxic or absent to healthy and productive"
  tags: [culture, transformation, psychological-safety, organizational, expert]

state: {}

trigger: |
  You've been hired as VP of Design at a company where the
  design critique culture is broken. In your first month,
  you observe:

  1. Senior designers dominate reviews — junior designers
     rarely speak up
  2. Feedback is either brutal ("this is terrible, start
     over") or empty praise ("looks great!")
  3. Designers avoid sharing work-in-progress for fear of
     criticism
  4. Two designers have formal HR complaints about a senior
     designer's "feedback style"
  5. Cross-functional partners (PMs, engineers) don't attend
     design reviews because "it's always a fight"
  6. The previous design director's approach was "I'll tell
     you what's wrong and you fix it" — top-down dictation
  7. Remote designers feel excluded from in-person critique
     sessions

  Task: Create a culture transformation plan to establish
  healthy design critique practices.

assertions:
  - type: llm_judge
    criteria: "Response addresses immediate problems — HR complaints (take the HR complaints seriously — meet with the designers who filed them, meet with the senior designer privately, establish that aggressive feedback is not acceptable regardless of design quality, work with HR on appropriate intervention — coaching, mediation, or formal action depending on severity), stop the bleeding (immediately establish ground rules for all critiques: feedback must be about the work not the person, feedback must be specific and actionable, no 'this is terrible' without explaining what and why, all participants have equal voice — seniority doesn't confer louder speaking rights, facilitator enforces time and turn-taking), remote inclusion (all critique sessions must have a remote-first format: shared screen, structured turn-taking that ensures remote voices are heard, async feedback options for those in different time zones, no side conversations in the room that exclude remote participants)."
    weight: 0.35
    description: "ImmediateProblems"
  - type: llm_judge
    criteria: "Response provides a phased culture transformation — phase 1 weeks 1-4 safety (establish critique ground rules and post them visibly, train all designers on constructive feedback — what it looks like and sounds like, introduce structured critique formats like 'I Like I Wish What If' to replace unstructured free-for-all, lead by example: the VP shares their own work-in-progress and models receiving feedback gracefully), phase 2 months 2-3 skill building (facilitate critique workshops — practice giving and receiving feedback on non-work examples to build skills in a low-stakes environment, pair senior designers with juniors as feedback mentors — but not the one with HR complaints, introduce critique roles: presenter, facilitator, note-taker — rotate so everyone practices each role, start cross-functional attendance by inviting one PM or engineer to observe then gradually participate), phase 3 months 4-6 embedding (transition from VP-facilitated to team-facilitated critiques, measure critique health: anonymous survey on psychological safety, participation rates, feedback quality ratings, address the previous director's legacy: explicitly name the old approach as harmful and model the new approach consistently, celebrate examples of great feedback — make constructive critique visible and valued)."
    weight: 0.35
    description: "PhasedTransformation"
  - type: llm_judge
    criteria: "Response addresses systemic and leadership issues — leadership behavior change (the previous director modeled dictatorial feedback — the new VP must model the opposite: ask questions before giving answers, share thinking process not just conclusions, admit uncertainty and mistakes publicly, praise specific feedback from junior designers to elevate their voices), senior designer accountability (senior designers who dominate reviews need coaching — they may not realize their impact, frame it as leadership development: 'great senior designers elevate others, not just deliver their own opinions', set expectations: senior designers should ask 3 questions before offering 1 suggestion), measuring culture change (track: critique attendance and participation rates, anonymous psychological safety survey — quarterly, ratio of junior to senior speaking time in reviews, number of work-in-progress shares — increasing WIP sharing indicates increasing trust, cross-functional attendance at design reviews, time from first draft to shared draft — shorter means more willingness to share early), sustainability (culture change takes 12-18 months minimum — plan for sustained effort, hire for feedback culture fit — interview candidates on how they give and receive feedback, include critique facilitation skills in designer career ladders, make 'contributes to healthy critique culture' a performance review criterion)."
    weight: 0.30
    description: "SystemicChange"
