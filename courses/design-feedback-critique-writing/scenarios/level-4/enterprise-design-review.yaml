meta:
  id: enterprise-design-review
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Enterprise design review — establish and run a scalable design review program across a large organization"
  tags: [enterprise, design-review, program, scaling, expert]

state: {}

trigger: |
  You're the Head of Design at a 2,000-person company with
  45 designers across 8 product teams. The VP of Product
  says: "Design quality is inconsistent across teams. Some
  teams ship polished work, others ship things that don't
  match our standards. We need a review process."

  Current state:
  - No formal design review process exists
  - Each team has their own informal critique practices
  - 3 teams do weekly critiques, 2 do ad-hoc reviews, 3
    do no reviews at all
  - Design system exists but adoption varies (40-90%
    across teams)
  - Designers report feeling isolated in their product teams
  - Recent customer NPS dropped citing "inconsistent
    experience across features"
  - Two designers recently left citing "no growth or
    feedback culture"

  Task: Design and propose an enterprise design review
  program that scales across all 8 teams.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-tier review program — tier structure (Tier 1: Team Critiques — weekly within each product team, 30 min, focus on in-progress work, low formality, all 8 teams required to hold these, rotating facilitator from within the team; Tier 2: Cross-Team Reviews — biweekly, pairs of teams review each other's work, 60 min, focuses on consistency and pattern sharing, rotates pairings so every team interacts with every other team; Tier 3: Design Quality Gates — milestone reviews before major launches, 90 min, includes design system lead and accessibility reviewer, ensures launch-ready quality and brand consistency; Tier 4: Monthly Design Showcase — all designers, 60 min, celebrate shipped work, share learnings, build community across the 45 designers), each tier has clear purpose, cadence, participants, format, and expected outcomes."
    weight: 0.35
    description: "ReviewProgramDesign"
  - type: llm_judge
    criteria: "Response addresses scaling challenges — consistency without bureaucracy (provide review templates and rubrics but allow teams to adapt format, define minimum standards not maximum process — every team must review, but how they review can flex), facilitator training (not everyone knows how to run a good critique — create a facilitator guide, train 2 facilitators per team, include: how to frame feedback, how to manage time, how to handle defensive reactions, how to ensure all voices are heard), design system integration (reviews should catch design system drift — include design system compliance as a review criterion, feed common deviations back to the design system team for potential updates, address the 40-90% adoption gap by making reviews a natural enforcement mechanism), measurement (track: percentage of teams holding regular reviews, design system adoption rate trending toward 90%+, designer satisfaction with feedback culture, NPS improvement over time, time-to-design-quality measured by revision cycles)."
    weight: 0.35
    description: "ScalingChallenges"
  - type: llm_judge
    criteria: "Response addresses culture and retention — psychological safety (the program must feel supportive not punitive — position reviews as learning opportunities not gatekeeping, explicitly address the fear that reviews = criticism = career risk, share examples of how reviews helped improve work — make success stories visible), designer growth (connect reviews to professional development — feedback received in reviews feeds into growth plans, cross-team reviews expose designers to different problem spaces and mentors, the two designers who left cited 'no growth or feedback culture' — this program directly addresses that), community building (45 designers across 8 teams are currently isolated — cross-team reviews and monthly showcases create connections, consider a design guild or community of practice that owns the review program, pair junior designers with seniors across teams for mentorship), implementation plan (phase in gradually: month 1 — Tier 1 in all teams, month 2 — add Tier 2, month 3 — add Tier 3, month 4 — add Tier 4, pilot with 2-3 willing teams first then expand, gather feedback and iterate on the program itself)."
    weight: 0.30
    description: "CultureAndRetention"
