meta:
  id: design-governance-framework
  level: 4
  course: design-feedback-critique-writing
  type: output
  description: "Design governance framework — establish governance structures for design decisions, quality gates, and approval workflows"
  tags: [governance, quality-gates, approval, process, expert]

state: {}

trigger: |
  Your design organization keeps having the same problems:

  1. Features ship without design review — engineers
     implement PM wireframes directly
  2. Designers discover their components were modified by
     engineers after handoff
  3. Accessibility issues are found in production because
     nobody reviewed for WCAG compliance
  4. Brand inconsistencies appear because new features don't
     go through brand review
  5. Three teams independently designed different date picker
     components
  6. Customer-facing copy goes live without content review —
     resulting in confusing error messages and inconsistent
     terminology

  The VP of Product says: "We need design governance, but
  I don't want to slow down our development velocity."

  Task: Design a governance framework that ensures design
  quality without becoming a bottleneck.

assertions:
  - type: llm_judge
    criteria: "Response designs a lightweight governance structure — quality gates (define 3 gates integrated into existing development process: Gate 1 — Design Intent Review: before development starts, 15-min check that design is complete, accessible, and uses design system components — catches problems before they're built; Gate 2 — Implementation Fidelity Check: during development, designer spot-checks implementation against design specs — catches modification drift; Gate 3 — Pre-Launch Quality Review: before release, 30-min review covering accessibility, brand consistency, content quality, and design system compliance — catches production issues), each gate has: clear criteria for pass/fail, defined reviewer roles, maximum turnaround time to prevent bottleneck, escalation path for disagreements, and automated checks where possible (accessibility scanning, design system linting)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response addresses each specific problem — engineers implementing PM wireframes (governance rule: no feature enters development without a design-approved spec — PMs can sketch ideas but design must review and approve before engineering estimates, this isn't about slowing down — it's about not building twice), post-handoff modifications (governance rule: design changes after handoff require designer notification — if engineering needs to deviate from spec, they flag it in the ticket for design review, implement design QA in sprint review), accessibility in production (governance rule: accessibility is part of Gate 1 and Gate 3 — Gate 1 checks design for WCAG compliance, Gate 3 runs automated a11y scan before release, assign accessibility champions per team), brand inconsistencies (governance rule: any new visual element or pattern goes through design system review before implementation — design system team has 48-hour SLA for review), duplicate components (governance rule: before designing a new component, check design system library — if a similar component exists, use or extend it, if not, propose a new component through design system RFC process), unreviewed copy (governance rule: all customer-facing copy goes through content review — define a content checklist that designers can self-apply for minor copy, content team reviews major flows)."
    weight: 0.35
    description: "ProblemSpecificSolutions"
  - type: llm_judge
    criteria: "Response balances quality with velocity — not a bottleneck (governance should accelerate not decelerate: catching issues before development is faster than fixing them in production, design system reuse is faster than building from scratch, clear quality criteria reduce ambiguity and rework cycles — frame governance as velocity enabler), automation (automate what you can: design system component usage verification, accessibility scanning in CI/CD, brand color and typography checks via design linting tools, terminology consistency checks for common copy patterns — automation handles routine checks so human reviewers focus on judgment calls), right-sizing (not everything needs full governance: small changes like copy tweaks can go through lightweight self-service checklist, medium changes need peer review within the team, large changes — new features, new patterns, new pages — go through full quality gates, define clear criteria for each category to avoid ambiguity), exceptions process (when velocity genuinely requires bypassing a gate — document the exception, accept the design debt, add the review to the next sprint's backlog — never just skip review without tracking it)."
    weight: 0.30
    description: "QualityVelocityBalance"
