meta:
  id: documentation-platform-product
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Design a next-generation developer documentation platform product, including product vision, technical architecture, go-to-market strategy, and competitive positioning"
  tags: [product-design, platform, devtools, master]

state: {}

trigger: |
  You're the co-founder and CPO of "DocsForge" — a
  startup building the next-generation developer
  documentation platform. You've raised a $15M Series
  A to build the "Figma for developer documentation."
  Your thesis: documentation tooling is stuck in 2015
  (static site generators + markdown) while developer
  expectations have evolved dramatically.

  Market context:
  - Current tools: Docusaurus, GitBook, ReadMe,
    Mintlify, Readme.io, Stoplight
  - TAM: 450,000 companies with developer-facing
    products
  - Pain points: docs drift from code, no
    personalization, poor search, manual code
    example maintenance, no analytics on what works
  - Trend: AI is transforming how developers consume
    documentation
  - Competition: Well-funded competitors (Mintlify
    $18M, ReadMe $35M) but no clear winner

  Create the complete product vision:

  1. Product vision and strategy
     - Mission and positioning statement
     - Target personas (3 detailed user personas)
     - Jobs-to-be-done framework
     - Key differentiators (what DocsForge does that
       no one else can)
     - Product principles (design philosophy)

  2. Core product features (v1.0)
     - AI-powered writing assistant (context-aware,
       trained on your codebase)
     - Live code examples (connected to your actual
       API, auto-validated)
     - Personalized documentation (adapts to user's
       SDK, skill level, use case)
     - Documentation analytics (what content works,
       where users struggle)
     - Collaborative editing (real-time, with
       engineering review workflow)
     - API reference auto-generation with manual
       enrichment
     - Interactive API explorer (built-in, not
       separate tool)

  3. Technical architecture
     - System architecture (services, data stores,
       integrations)
     - AI/ML pipeline (embeddings, RAG, code
       analysis)
     - Real-time collaboration engine
     - Content delivery and performance (global CDN,
       edge rendering)
     - Integration architecture (GitHub, CI/CD,
       API specs, analytics)
     - Security and compliance (SOC 2, data
       isolation)
     - Scalability design (10,000+ documentation
       sites)

  4. Go-to-market strategy
     - Launch strategy (beta → GA)
     - Pricing model (free tier, pro, enterprise)
     - Sales motion (PLG + enterprise sales)
     - Developer marketing strategy
     - Partnership strategy (framework integrations,
       API platforms)
     - Customer success program design

  5. Competitive analysis and positioning
     - Feature comparison matrix (DocsForge vs. top
       5 competitors)
     - Competitive moats (sustainable advantages)
     - Displacement strategy (how to win customers
       from incumbents)
     - Risk assessment (competitive responses,
       market risks)

  6. Roadmap and milestones
     - 18-month product roadmap (quarterly)
     - Key metrics and targets per quarter
     - Team scaling plan (engineering, design,
       content)
     - Series B readiness criteria
     - Vision: 3-year product trajectory

  Deliverable: Complete product vision document with
  technical architecture, go-to-market strategy,
  competitive analysis, and product roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product vision — all 6 areas are covered; the product differentiators are genuine innovations, not just incremental improvements; the technical architecture is buildable by a Series A team; the go-to-market strategy addresses both PLG and enterprise channels; competitive analysis is honest about strengths and weaknesses; the roadmap is ambitious but realistic for an 18-month timeline."
    weight: 0.35
    description: "ProductVisionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and developer tools expertise — the personas reflect real documentation stakeholders; the AI features are technically feasible and genuinely useful; live code examples solve a real pain point; personalization architecture handles the complexity of multi-SDK, multi-level adaptation; the pricing model balances growth with revenue; the overall product would genuinely advance developer documentation beyond current tools."
    weight: 0.35
    description: "ProductExpertise"
  - type: llm_judge
    criteria: "Response would attract investors and customers — the market opportunity is well-articulated; the competitive moats are defensible; the go-to-market strategy would achieve early traction; the Series B readiness criteria are realistic; a developer would choose DocsForge over existing alternatives; the overall vision would justify the $15M investment."
    weight: 0.30
    description: "MarketViability"
