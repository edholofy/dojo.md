meta:
  id: documentation-consulting-practice
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Launch a developer documentation consulting practice with proprietary methodology, service offerings, case studies, and thought leadership strategy"
  tags: [consulting, business-building, methodology, master]

state: {}

trigger: |
  After 15 years leading documentation at companies
  like Stripe, Twilio, and Vercel, you're launching
  "DocArchitect" — a premium developer documentation
  consulting practice. Your unique expertise is in
  transforming documentation from a cost center to a
  competitive advantage.

  Business context:
  - Target market: Series B+ startups and enterprises
    with developer platforms (TAM: ~8,000 companies)
  - Revenue target: $500K year 1 → $2M year 3
  - Pricing: $25K-$150K per engagement
  - Competitors: Individual freelance technical
    writers ($50-150/hr), large consultancies
    (generic), in-house hiring

  Create the complete consulting practice:

  1. Proprietary methodology: "The Documentation
     Maturity Model" (DMM)
     - 5 maturity levels with detailed criteria
     - Assessment rubric (score each dimension)
     - Dimensions: content quality, developer
       experience, tooling, governance, measurement,
       culture, accessibility
     - Benchmark data (what "good" looks like at
       each level)
     - Visual framework / diagram description

  2. Service offerings (5 packages)
     - Documentation Audit ($25K, 3 weeks)
     - Documentation Strategy ($50K, 6 weeks)
     - Documentation Transformation ($150K, 6 months)
     - Developer Portal Design ($75K, 8 weeks)
     - Ongoing Advisory ($10K/month retainer)
     - Each with: deliverables, process, team
       required, typical outcomes

  3. Case studies (3 detailed examples)
     - Case 1: API-first startup (50→500 developers,
       docs as growth lever)
     - Case 2: Enterprise migration (legacy docs →
       modern docs-as-code)
     - Case 3: Open-source project (community docs
       from chaos to clarity)
     - Each with: challenge, approach, results with
       metrics, client testimonial

  4. Sales collateral
     - One-page executive summary
     - "Why Documentation Matters" data sheet (ROI
       statistics, industry benchmarks)
     - Proposal template
     - Pricing justification framework

  5. Thought leadership strategy
     - Content calendar (12 months)
     - Conference speaking strategy
     - Newsletter / blog topics
     - Book outline ("Developer Documentation
       Excellence")
     - Community building approach

  6. Delivery infrastructure
     - Engagement kickoff template
     - Assessment toolkit (questionnaires, interview
       guides, scoring sheets)
     - Deliverable templates (audit report, strategy
       doc, implementation plan)
     - Quality assurance process
     - Client communication cadence

  Deliverable: Complete consulting practice launch
  package with methodology, service offerings, case
  studies, sales materials, and delivery infrastructure.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — the Documentation Maturity Model is a credible proprietary framework with clear levels and assessment criteria; all 5 service offerings have specific deliverables and processes; the 3 case studies are detailed with believable metrics; sales collateral would persuade executive buyers; the thought leadership strategy builds authority; the delivery infrastructure enables consistent quality."
    weight: 0.35
    description: "PracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep documentation industry expertise — the maturity model reflects real documentation challenges; the service pricing is justified and competitive; the case studies reflect authentic transformation patterns; the ROI framework uses defensible metrics; the methodology differentiates from generic consulting; the overall practice would be credible to Stripe/Twilio-caliber companies."
    weight: 0.35
    description: "IndustryExpertise"
  - type: llm_judge
    criteria: "Response would launch a viable consulting business — the revenue targets are realistic for the pricing and market size; the service offerings cover the buyer journey; the thought leadership strategy builds pipeline; the delivery infrastructure ensures repeatability; the overall practice would attract and retain premium clients in the developer documentation space."
    weight: 0.30
    description: "BusinessViability"
