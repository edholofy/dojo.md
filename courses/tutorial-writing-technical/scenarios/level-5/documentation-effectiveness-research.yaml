meta:
  id: documentation-effectiveness-research
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Design and write a rigorous research study on the effectiveness of different tutorial formats on developer learning outcomes, suitable for academic publication"
  tags: [research, empirical-study, learning-outcomes, master]

state: {}

trigger: |
  You're a researcher at the intersection of
  software engineering education and technical
  communication. You're designing a study for
  publication in IEEE Transactions on Professional
  Communication or ACM SIGDOC. The study investigates
  how different tutorial formats affect developer
  learning outcomes.

  Research question: "How do tutorial format (text,
  interactive, video, AI-conversational) and learner
  experience level interact to affect learning
  outcomes, knowledge retention, and transfer in
  programming tutorials?"

  Study parameters:
  - Participants: 240 developers (80 novice, 80
    intermediate, 80 advanced)
  - Tutorial topic: Building a REST API with
    authentication (standardized content)
  - 4 conditions (same content, different format):
    1. Traditional text tutorial (MDX, step-by-step)
    2. Interactive browser-based tutorial (sandboxed)
    3. Video tutorial (screencast with narration)
    4. AI-conversational (chatbot-guided learning)
  - Outcome measures: immediate performance, 2-week
    retention, transfer to novel task, self-efficacy,
    satisfaction

  Write the complete research paper:

  1. Introduction and literature review
     - Theoretical framework (cognitive load theory,
       multimedia learning, constructivism)
     - Prior research on tutorial effectiveness
     - Research gap identification
     - Hypotheses (5-6 specific, testable)

  2. Methodology
     - Experimental design (4×3 factorial)
     - Participant recruitment and screening
     - Tutorial development process (how content
       equivalence was ensured)
     - Measurement instruments (performance test,
       retention test, transfer task, self-efficacy
       scale, satisfaction survey)
     - Procedure (detailed protocol)
     - Data analysis plan (ANOVA, post-hoc tests,
       effect sizes)
     - Ethical considerations (IRB, consent, data
       handling)

  3. Expected results
     - Hypothesized patterns (based on theory and
       prior research)
     - Simulated data tables and figures (realistic
       effect sizes)
     - Statistical analysis descriptions
     - Interaction effects exploration

  4. Discussion
     - Theoretical implications
     - Practical implications for tutorial authors
     - Limitations (internal and external validity)
     - Future research directions

  5. Practical recommendations
     - Decision framework for choosing tutorial
       format
     - When to use each format (context-dependent
       recommendations)
     - Cost-benefit analysis of each format
     - Hybrid approach recommendations

  Deliverable: Complete research paper (suitable for
  peer review submission) with literature review,
  methodology, simulated results, discussion, and
  practical recommendations.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete research paper — all 5 sections are present with academic rigor; the literature review covers relevant theories and prior research; the 4×3 factorial design is correctly specified; measurement instruments are valid and reliable; data analysis plan uses appropriate statistical methods; simulated results include realistic effect sizes and statistical tests; discussion addresses both theory and practice; the paper follows academic conventions and could be submitted to IEEE or ACM."
    weight: 0.35
    description: "ResearchCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the experimental design controls for confounding variables; content equivalence across formats is addressed; the measurement instruments capture meaningful learning outcomes (not just satisfaction); the statistical analysis plan is appropriate for the design; effect sizes are realistic; limitations are honestly discussed; the overall study design would pass peer review."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "Response would advance the field of technical communication — the research question addresses a genuine gap in the literature; the theoretical framework connects to established learning science; the practical recommendations would help tutorial authors make evidence-based format decisions; the study design could actually be conducted; the findings (even simulated) would be useful for the documentation community."
    weight: 0.30
    description: "FieldContribution"
