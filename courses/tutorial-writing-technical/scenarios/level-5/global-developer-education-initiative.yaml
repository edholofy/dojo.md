meta:
  id: global-developer-education-initiative
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Design a global developer education initiative to bring programming tutorials to underserved regions, addressing language, infrastructure, and cultural barriers"
  tags: [global-education, equity, accessibility, master]

state: {}

trigger: |
  You're appointed as the Director of the "Code for
  All" initiative — a joint program between the Linux
  Foundation, UNESCO, and major tech companies (Google,
  Microsoft, Meta, AWS) to create high-quality
  programming tutorials accessible to developers in
  underserved regions worldwide.

  The challenge:
  - 70% of developer documentation is English-only
  - Internet connectivity varies dramatically (many
    regions have < 1 Mbps)
  - Screen reader and assistive technology adoption
    varies by region
  - Cultural contexts in tutorials assume Western
    tech industry norms
  - Cost of developer tools and cloud services is
    prohibitive in many regions
  - Teaching methodology differs across educational
    traditions
  - Most tutorials assume constant internet, modern
    hardware, and specific OS environments

  Initiative scope:
  - 50 countries, 25 languages
  - Target: 5 million new developers in 5 years
  - Budget: $50M over 5 years (from consortium)
  - Must be sustainable beyond the grant period

  Design the complete initiative:

  1. Content strategy
     - Curriculum framework (what to teach, in what
       order, at what depth)
     - Content creation model (who writes, reviews,
       localizes)
     - Open licensing strategy (CC-BY-SA or similar)
     - Content adaptation framework (cultural
       context, local examples, regional tech
       ecosystems)
     - Offline-first content design

  2. Technology platform
     - Offline-capable learning platform architecture
     - Low-bandwidth content delivery (progressive
       loading, text-first)
     - Device compatibility (feature phones, low-end
       Android, shared computers)
     - Local development environment options (when
       cloud IDEs aren't feasible)
     - Accessibility compliance across diverse
       contexts (WCAG + regional needs)

  3. Localization system
     - 25-language localization strategy
     - Community translation governance
     - Cultural adaptation beyond translation
       (examples, metaphors, names, context)
     - Right-to-left and complex script support
     - Translation quality at scale

  4. Community and sustainability
     - Local community builder program
     - Train-the-trainer methodology
     - Regional hub model (physical and virtual)
     - Revenue model for post-grant sustainability
     - Measuring community health across cultures

  5. Partnership and governance
     - Consortium governance structure
     - Regional partner selection criteria
     - University and coding bootcamp partnerships
     - Government and NGO relationships
     - Corporate sponsor engagement model
     - IP and branding framework

  6. Impact measurement
     - Theory of change
     - Outcome metrics (not just output metrics)
     - Equity-focused evaluation framework
     - Longitudinal tracking (employment outcomes)
     - Annual impact report methodology
     - Independent evaluation process

  Deliverable: Complete initiative design with
  content strategy, technology platform, governance
  structure, and impact measurement framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete global developer education initiative — all 6 areas are covered; the content strategy addresses language and cultural barriers; the technology platform works in low-connectivity environments; the localization system handles 25 languages with quality; the community model builds local capacity; governance balances consortium members; impact measurement goes beyond simple metrics to evaluate genuine outcomes."
    weight: 0.35
    description: "InitiativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global education expertise — the offline-first design is technically feasible; cultural adaptation goes beyond translation to include pedagogy, examples, and context; the sustainability model extends beyond the grant period; the community builder program respects local educational traditions; the equity framework addresses real barriers (cost, connectivity, language, cultural norms); the initiative avoids common pitfalls of Western-centric tech education programs."
    weight: 0.35
    description: "GlobalExpertise"
  - type: llm_judge
    criteria: "Response would genuinely expand access to programming education — the 5 million developer target is ambitious but achievable with the $50M budget; the platform reaches truly underserved communities (not just capital cities); the train-the-trainer model creates multiplicative impact; the initiative would be sustainable and growing 5 years after the grant; the overall design would make the consortium partners proud of their investment."
    weight: 0.30
    description: "EquitableImpact"
