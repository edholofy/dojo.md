meta:
  id: technical-writing-thought-leadership
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Write a keynote presentation and accompanying paper that redefines technical writing for the AI era, addressing the future of developer documentation"
  tags: [thought-leadership, future-of-docs, keynote, master]

state: {}

trigger: |
  You're invited to deliver the opening keynote at
  Write the Docs Portland 2026 — the premier
  conference for documentation professionals (1,200
  attendees, 40+ countries). Your talk is titled
  "The Last Tutorial: How AI is Transforming
  Developer Education (And Why Writers Matter More
  Than Ever)."

  The documentation profession is at an inflection
  point. AI can now generate tutorials, answer
  questions about codebases, and create personalized
  learning paths. Many technical writers are anxious
  about their relevance. Your keynote must address
  this honestly and chart a path forward.

  Keynote requirements:
  - 45-minute presentation with speaker notes
  - Provocative but well-reasoned thesis
  - Acknowledges real disruption while showing the
    path forward
  - Backed by data and real examples
  - Includes practical takeaways, not just philosophy

  Keynote structure:
  1. The state of developer documentation (data on
     what's working and what's broken)
  2. What AI can already do (honest assessment of
     capabilities with examples)
  3. What AI gets wrong (hallucination in technical
     content, trust, context loss, the "looks right
     but subtly wrong" problem)
  4. The new role of technical writers (information
     architects, not just content creators)
  5. Five documentation innovations for the AI era:
     - Structured knowledge systems (not documents)
     - Executable documentation (docs that run and
       validate themselves)
     - Conversational documentation interfaces
     - Personalized learning paths at scale
     - Community-AI collaboration models
  6. The human advantage (judgment, empathy, narrative,
     trust, teaching)
  7. Call to action: What to learn, what to let go,
     and where to invest

  Additionally, write the accompanying white paper
  (full-length article version of the keynote):
  - 5,000+ word thought leadership piece
  - Can be published on the Write the Docs blog
  - Includes data, case studies, and predictions
  - Has actionable recommendations for documentation
    teams, tool vendors, and companies
  - Bibliography/references section

  Task: Write both the complete keynote (with speaker
  notes for each slide) and the full white paper.

assertions:
  - type: llm_judge
    criteria: "Response produces both a complete keynote and white paper — the keynote has all 7 sections with speaker notes; the white paper is comprehensive (5,000+ words) with data, case studies, and predictions; both pieces address the AI transformation of technical writing honestly; the thesis is provocative but well-supported; the five documentation innovations are genuinely forward-looking; practical takeaways are specific and actionable."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of both presentation and long-form writing — the keynote has compelling narrative arc and strong speaker notes; the white paper has rigorous argumentation and evidence; the AI assessment is technically accurate (not hype or dismissal); the 'new role' vision is realistic and inspiring; the overall content positions technical writers as essential, not obsolete; the presentation would engage a skeptical audience of documentation professionals."
    weight: 0.35
    description: "ContentMastery"
  - type: llm_judge
    criteria: "Response would influence the profession — the keynote would be the most-discussed talk at Write the Docs; the white paper would be widely shared and cited; documentation teams would use the recommendations to evolve their practices; the vision would help technical writers navigate the AI transition with confidence; the overall contribution advances the profession meaningfully."
    weight: 0.30
    description: "ProfessionalInfluence"
