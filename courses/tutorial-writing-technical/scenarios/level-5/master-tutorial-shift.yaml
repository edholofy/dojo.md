meta:
  id: master-tutorial-shift
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "As new CTO of Developer Experience, simultaneously manage five critical documentation crises while establishing the strategic vision for technical communication across the organization"
  tags: [shift-simulation, multi-crisis, strategic, master]

state: {}

trigger: |
  You've just been appointed CTO of Developer
  Experience at TechNova — a $5B developer platform
  company with 1.2 million developer customers
  across 15 products. You report directly to the CEO.
  In your first week, five critical situations demand
  your attention simultaneously.

  Crisis 1: Documentation Security Breach
  A security researcher published a blog post
  showing that your public documentation contained
  12 API keys, 3 database connection strings, and
  8 internal URLs that exposed internal architecture.
  The post went viral on Hacker News (top 5, 800
  comments). You need to:
  - Write the public incident response (blog post +
    social media statement)
  - Design the documentation security audit process
    (scan all 12,000 pages)
  - Create a prevention framework (automated secret
    scanning for docs pipelines, contributor training,
    review process changes)
  - Write the internal engineering post-mortem
  - Design the ongoing monitoring system

  Crisis 2: Major Product Launch Without Documentation
  The VP of Product shipped a major new product
  (AI-powered deployment platform) without any
  documentation. 50,000 developers are trying to use
  it based on a marketing landing page and a 3-minute
  demo video. Support tickets are at 5x normal volume.
  You need to:
  - Create the emergency documentation plan (what to
    write in 72 hours vs. 2 weeks vs. 1 month)
  - Write the getting-started guide (immediate need)
  - Design the process to prevent undocumented
    launches (documentation readiness gate)
  - Define the "minimum viable documentation" standard
    for product launches
  - Create the cross-functional launch checklist

  Crisis 3: Enterprise Customer Documentation
  Your three largest enterprise customers ($2M+
  ARR each) have threatened to churn, citing
  documentation quality as the primary reason. Their
  specific complaints:
  - No enterprise deployment guide (on-prem, air-
    gapped environments)
  - API documentation doesn't cover enterprise-
    specific endpoints
  - No compliance documentation (SOC 2, HIPAA, FedRAMP
    mapping)
  - SDKs have no versioning or migration guides
  You need to create the enterprise documentation
  strategy and write the highest-priority document
  (enterprise deployment guide).

  Crisis 4: Documentation Team Attrition
  3 of your 8 senior technical writers have resigned
  in the past month (compensation, burnout, and
  frustration with organizational priority). Two more
  are actively interviewing. You need to:
  - Retention plan for remaining team
  - Emergency hiring plan (timeline, job descriptions,
    interview process)
  - Contractor/agency strategy for bridge period
  - Team restructuring proposal (addressing the root
    causes: compensation, career path, organizational
    respect for documentation)
  - 90-day stabilization plan

  Crisis 5: Competitor Documentation Comparison
  A prominent developer influencer published a
  detailed comparison showing your documentation
  ranked last among top 5 competitors (Vercel, AWS,
  Cloudflare, Netlify vs. TechNova). The comparison
  was fair and accurate. The CEO wants your response.
  You need to:
  - Honest assessment of the competitive gap
  - 6-month documentation improvement roadmap
  - Quick wins for visible improvement (30 days)
  - Long-term documentation excellence strategy
  - Board presentation on documentation investment
    (5 slides, connecting docs to revenue retention)

  Task: Address all five crises with appropriate
  documentation. Produce: the public incident
  response, the 72-hour documentation plan with
  getting-started guide, the enterprise deployment
  guide outline, the team stabilization plan, and
  the board presentation. Additionally, write the
  strategic memo to the CEO tying all five crises
  together with a unified documentation excellence
  vision.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises substantively — the security breach response is both public-facing and includes prevention framework; the emergency documentation plan prioritizes correctly for the undocumented launch; the enterprise documentation strategy addresses the specific $2M+ customer complaints; the team stabilization plan addresses root causes of attrition; the competitive response includes honest assessment and actionable roadmap; the CEO memo ties all five together into a coherent vision."
    weight: 0.35
    description: "CrisisManagementCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates executive-level documentation leadership — the security incident response builds trust while showing accountability; the emergency docs plan is realistic for the 72-hour timeline; the enterprise strategy would prevent $6M+ in churn; the team plan addresses compensation, career path, and organizational respect; the board presentation connects documentation quality to revenue; the overall response shows strategic thinking under pressure."
    weight: 0.35
    description: "ExecutiveLeadership"
  - type: llm_judge
    criteria: "Response would stabilize the situation and set up long-term success — each crisis response addresses both the immediate fire and the systemic issue; the unified vision memo would convince the CEO to invest seriously in documentation; the 6-month roadmap would show measurable improvement in the competitive comparison; the team plan would stop the attrition and rebuild morale; the overall response demonstrates why a CTO of Developer Experience is worth the executive-level hire."
    weight: 0.30
    description: "StrategicTransformation"
