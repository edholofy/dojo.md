meta:
  id: documentation-quality-audit
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Conduct a comprehensive documentation quality audit of a major cloud platform, producing a detailed findings report with prioritized recommendations and transformation roadmap"
  tags: [quality-audit, enterprise, assessment, master]

state: {}

trigger: |
  You're the lead consultant engaged by a major
  cloud platform company (similar in scale to
  DigitalOcean or Heroku) to conduct a comprehensive
  documentation quality audit. The company has
  120,000 developer customers but documentation NPS
  is -15 (industry average is +20 for top platforms).
  Developer churn analysis shows "poor documentation"
  is the #2 reason developers leave (after pricing).

  Documentation scope to audit:
  - 3,500 documentation pages
  - 45 product lines
  - 12 API references
  - 8 SDK documentation sets (4 languages × 2 SDKs)
  - 200 tutorials and guides
  - 50 conceptual/architectural docs
  - 15 getting started guides
  - Changelog/release notes (3 years)

  Audit methodology (apply all of these):
  - Content quality assessment (accuracy, clarity,
    completeness, currency)
  - Information architecture evaluation (findability,
    navigation, structure)
  - Developer experience analysis (time-to-first-
    success, error recovery, progressive disclosure)
  - Technical accuracy spot checks (run code
    examples, test API calls)
  - Competitive benchmarking (vs. AWS, Vercel,
    Stripe, Netlify)
  - User research synthesis (existing support
    tickets, community forums, NPS comments)
  - Accessibility audit (WCAG 2.1 AA compliance)
  - SEO and discoverability analysis

  Produce the complete audit deliverable:

  1. Executive summary
     - Overall documentation health score
     - Top 5 critical findings
     - Investment recommendation
     - Expected ROI of documentation improvement
     - Competitive position assessment

  2. Detailed findings (organized by dimension)
     - Content quality findings (with severity
       ratings)
     - Information architecture findings
     - Developer experience findings
     - Technical accuracy findings
     - Accessibility findings
     - SEO findings
     - Each finding with: description, evidence,
       severity (P0-P3), affected products, example

  3. Competitive benchmarking report
     - Feature-by-feature comparison with 4
       competitors
     - Strengths and weaknesses relative to each
     - Best practices borrowed from competitors
     - Unique opportunities (things no competitor
       does well)

  4. Prioritized recommendation roadmap
     - Quick wins (< 1 month, high impact)
     - Medium-term improvements (1-3 months)
     - Strategic investments (3-12 months)
     - Each recommendation with: effort, impact,
       dependencies, success metrics

  5. Documentation transformation plan
     - Organizational changes needed
     - Process improvements
     - Tooling recommendations
     - Hiring plan
     - Budget estimate (year 1 and ongoing)
     - 12-month milestone calendar
     - Risk assessment and mitigation

  Deliverable: Complete audit report with findings,
  competitive analysis, prioritized recommendations,
  and transformation plan.

assertions:
  - type: llm_judge
    criteria: "Response produces a complete documentation quality audit — all 5 deliverable sections are present; the executive summary gives a clear picture of documentation health; findings are organized by dimension with severity ratings and evidence; competitive benchmarking compares meaningfully against 4 named competitors; recommendations are prioritized with effort/impact analysis; the transformation plan has organizational, process, and tooling components with realistic budgets."
    weight: 0.35
    description: "AuditCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates documentation assessment expertise — findings reflect real documentation problems (not generic observations); severity ratings are well-calibrated; competitive benchmarking identifies specific best practices; the developer experience analysis goes beyond surface-level issues; the recommendations address root causes, not symptoms; the transformation plan is operationally realistic."
    weight: 0.35
    description: "AssessmentExpertise"
  - type: llm_judge
    criteria: "Response would transform documentation from a churn driver to a competitive advantage — the quick wins would show immediate improvement; the 12-month plan would move NPS from -15 toward positive territory; the ROI framework justifies the investment to executives; the overall audit would give the company a clear, actionable path from documentation crisis to documentation excellence."
    weight: 0.30
    description: "TransformativeValue"
