meta:
  id: technical-communication-handbook
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Write a definitive handbook chapter on the cognitive science of technical tutorials — how developers learn from documentation and how to optimize for comprehension, retention, and transfer"
  tags: [cognitive-science, learning-theory, handbook, master]

state: {}

trigger: |
  You're writing a chapter for "The Oxford Handbook
  of Technical Communication" (the definitive
  academic reference in the field). Your chapter is
  titled "The Cognitive Science of Developer Tutorials:
  How Software Engineers Learn from Documentation."

  This chapter bridges cognitive science research
  with practical technical writing. It should be
  rigorous enough for academic citation and practical
  enough for documentation teams to apply.

  Chapter structure:

  1. Introduction: The unique challenge of teaching
     through documentation
     - How developer learning differs from other
       domains
     - The documentation paradox (users want to skip
       reading but need to understand)
     - Framework: from reading to comprehension to
       application

  2. Cognitive load in technical tutorials
     - Intrinsic load (complexity of the material)
     - Extraneous load (bad design that wastes
       cognitive resources)
     - Germane load (effort that builds schemas)
     - Worked examples effect in code tutorials
     - Fading guidance (scaffolding removal)
     - Specific techniques to reduce extraneous
       load in documentation

  3. The role of prior knowledge
     - Expert-novice differences in reading
       documentation
     - The "curse of knowledge" in technical writing
     - Schema theory and code comprehension
     - Prerequisite structures and knowledge graphs
     - Adaptive documentation (adjusting to reader
       knowledge)

  4. Multimedia learning in technical contexts
     - Text + code + diagrams + video integration
     - Contiguity principle (place related
       information close together)
     - Redundancy principle (when text + video
       hurts learning)
     - Modality principle for technical content
     - Interactive vs. passive content

  5. Transfer and application
     - Near transfer (applying to similar problems)
     - Far transfer (applying principles to new
       domains)
     - Analogical reasoning in API learning
     - Mental model construction from documentation
     - The gap between "following a tutorial" and
       "building independently"

  6. Motivation and self-regulation
     - Self-efficacy in developer learning
     - The role of productive struggle
     - Flow state in tutorial completion
     - Goal orientation (learning vs. performance
       goals)
     - Emotional design of error messages and
       troubleshooting guides

  7. Research-backed design principles (synthesis)
     - 15-20 evidence-based principles for tutorial
       design
     - Each principle with: research basis, practical
       application, example from developer
       documentation
     - Decision framework for applying principles

  8. Future research directions
     - Open questions in technical tutorial
       effectiveness
     - AI-generated tutorials and learning outcomes
     - Personalization at scale
     - Cross-cultural considerations in technical
       learning

  Chapter requirements:
  - 8,000-10,000 words
  - Academic tone with practical applications
  - 40+ references to peer-reviewed research
  - Figures/diagrams described (cognitive models,
    frameworks)
  - Suitable for both researchers and practitioners

  Task: Write the complete handbook chapter.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete handbook chapter — all 8 sections are present with appropriate depth; cognitive science research is correctly applied to technical documentation; the 15-20 design principles synthesize research into actionable guidance; the chapter bridges theory and practice effectively; academic conventions are followed (references, rigorous argumentation, acknowledged limitations); the chapter would be a credible contribution to the Oxford Handbook."
    weight: 0.35
    description: "ChapterCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep knowledge of cognitive science and technical communication — cognitive load theory is applied correctly to documentation design; multimedia learning principles are contextualized for developer content; transfer research informs tutorial design; the expert-novice analysis reflects genuine cognitive differences; the research citations are relevant and properly integrated; the overall chapter advances understanding of how developers learn from documentation."
    weight: 0.35
    description: "ScholarlySynthesis"
  - type: llm_judge
    criteria: "Response would influence both research and practice — researchers would cite the chapter for its theoretical framework; documentation teams would use the design principles to improve tutorials; the future research directions would inspire new studies; the overall chapter fills a genuine gap in the technical communication literature at the intersection of cognitive science and developer education."
    weight: 0.30
    description: "FieldInfluence"
