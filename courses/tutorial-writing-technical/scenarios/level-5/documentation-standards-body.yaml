meta:
  id: documentation-standards-body
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Develop industry-wide technical documentation quality standards as chair of a cross-company standards committee, including certification criteria and assessment framework"
  tags: [standards, industry-wide, certification, master]

state: {}

trigger: |
  You've been elected chair of the newly formed
  "Developer Documentation Quality Alliance" (DDQA)
  — a consortium of 25 companies (including Google,
  Microsoft, Stripe, AWS, Datadog, MongoDB, Twilio)
  committed to establishing industry-wide standards
  for developer documentation quality.

  The Alliance's mission: "Define what 'good' means
  for developer documentation and give companies a
  framework to measure and improve."

  Current landscape problems:
  - No agreed-upon quality standards for developer
    documentation
  - Companies benchmark informally against Stripe's
    docs but without structured criteria
  - Developer experience surveys show documentation
    as a top-3 pain point across the industry
  - Technical writing certifications exist but don't
    address developer documentation specifically
  - No shared vocabulary for documentation quality
    dimensions

  Design the complete standards framework:

  1. Documentation Quality Standard (DQS 1.0)
     - Quality dimensions with definitions (8-10
       dimensions)
     - Scoring rubric for each dimension (1-5 scale
       with behavioral anchors)
     - Minimum thresholds for "DQS Certified"
     - Dimension weighting and overall score
       calculation
     - Examples at each score level for each
       dimension
     - Standard format (suitable for ISO-like
       publication)

  2. Assessment methodology
     - Self-assessment toolkit
     - Third-party audit process
     - Automated assessment tools (what can be
       measured programmatically)
     - Human assessment components (what requires
       expert judgment)
     - Sample size and confidence requirements
     - Assessment report template

  3. Certification program
     - Company certification levels (Bronze, Silver,
       Gold, Platinum)
     - Certification process and timeline
     - Renewal requirements (annual)
     - Certification body governance
     - Assessor training and qualification
     - Fee structure and sustainability model

  4. Industry benchmarking
     - Annual benchmarking report methodology
     - Anonymous data collection framework
     - Key metrics and their definitions
     - Comparative analysis approach
     - Trend tracking over time
     - Public benchmark data (anonymized)

  5. Implementation guidance
     - Getting started guide for companies
     - Common improvement patterns by starting level
     - ROI framework for documentation investment
     - Change management guidance
     - Case studies from founding members

  6. Governance and evolution
     - Standards committee structure
     - Revision process (how the standard evolves)
     - Public comment period procedures
     - Voting and decision-making rules
     - Intellectual property policy
     - Relationship with existing standards bodies
       (W3C, ISO, IEEE)

  Deliverable: Complete standards framework with
  quality dimensions, assessment methodology,
  certification program, and governance structure.

assertions:
  - type: llm_judge
    criteria: "Response develops a complete industry standards framework — all 6 areas are covered; the quality dimensions are comprehensive and well-defined; the scoring rubric has clear behavioral anchors; the assessment methodology combines automated and human evaluation; the certification program has credible levels and governance; benchmarking enables industry-wide comparison; implementation guidance helps companies adopt the standard."
    weight: 0.35
    description: "StandardsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards development expertise — the quality dimensions reflect genuine documentation quality factors; the scoring rubric would produce reliable assessments across assessors; the certification program follows credible governance patterns; the fee structure ensures sustainability; the governance model allows evolution without instability; the overall framework would gain credibility with Google/Microsoft/Stripe-caliber companies."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would elevate the documentation profession — the standard would give companies a shared vocabulary for documentation quality; certification would incentivize investment; benchmarking would create accountability; the ROI framework would help justify documentation budgets; the overall initiative would professionalize developer documentation across the industry."
    weight: 0.30
    description: "IndustryImpact"
