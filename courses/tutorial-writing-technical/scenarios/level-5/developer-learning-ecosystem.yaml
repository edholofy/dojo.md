meta:
  id: developer-learning-ecosystem
  level: 5
  course: tutorial-writing-technical
  type: output
  description: "Design a complete developer learning ecosystem that unifies documentation, tutorials, certifications, community content, and AI-assisted learning into a coherent platform"
  tags: [learning-ecosystem, platform-design, unified, master]

state: {}

trigger: |
  You're the SVP of Developer Relations at a major
  cloud infrastructure company (annual revenue $2B,
  500,000 developer customers, 120 products). The
  CEO has tasked you with unifying the fragmented
  developer education landscape into a coherent
  "Developer Learning Ecosystem."

  Current fragmentation:
  - Documentation site (Docusaurus, 8,000 pages)
  - Tutorial platform (custom, 400 tutorials)
  - Certification program (3 levels, 15,000 certified)
  - Community forums (Discourse, 200,000 members)
  - Blog (engineering + product, 2,000 posts)
  - Video content (YouTube, 500 videos)
  - Webinars (monthly, 2,000 attendees average)
  - SDK examples (GitHub, 300 repos)
  - Each run by a different team with different
    tools, standards, and metrics

  The unified ecosystem must:
  - Create a single entry point for all developer
    learning
  - Personalize the experience based on role, skill
    level, and product usage
  - Track learning progress across all content types
  - Connect documentation to tutorials to
    certification naturally
  - Surface community expertise alongside official
    content
  - Measure the impact of education on product
    adoption and retention

  Design the complete ecosystem:

  1. Ecosystem architecture
     - Unified content model (schema that spans all
       content types)
     - Learning graph (knowledge prerequisites and
       relationships)
     - Personalization engine (what to show whom)
     - Cross-content linking and recommendations
     - Single search across all content types
     - Unified analytics platform

  2. User experience design
     - Developer journey mapping (awareness →
       learning → building → mastering)
     - Entry point design (how developers find the
       ecosystem)
     - Navigation and wayfinding across content types
     - Progress tracking and achievement system
     - Mobile and offline experience
     - Accessibility across the ecosystem

  3. Content operations
     - Editorial governance across 8+ content teams
     - Content lifecycle management
     - Quality standards applied consistently
     - Content deduplication and canonical management
     - Release coordination (docs + tutorials +
       videos for product launches)
     - Community content curation pipeline

  4. Technical platform
     - Microservices architecture for the ecosystem
     - Content APIs and headless CMS integration
     - Real-time personalization pipeline
     - Analytics data warehouse design
     - AI/ML infrastructure (recommendations,
       search, personalization)
     - Integration with product analytics (usage
       data informing learning recommendations)

  5. Organizational model
     - Reporting structure for education teams
     - Centralized vs. federated content creation
     - Shared services (design, engineering, analytics)
     - Career paths for developer educators
     - Cross-functional coordination mechanisms
     - Budget model ($15M annual, allocated across
       teams)

  6. Impact measurement
     - Developer education impact model (how
       education drives adoption)
     - Attribution framework (connecting learning
       to product usage)
     - Developer satisfaction measurement (holistic)
     - Content effectiveness analysis
     - Business impact reporting (to CEO/board)
     - Competitive positioning assessment

  Deliverable: Complete ecosystem design with
  architecture, user experience, content operations,
  technical platform, organizational model, and
  impact measurement framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete developer learning ecosystem — all 6 areas are covered; the content model unifies 8+ content types; personalization addresses role, skill, and product usage; the technical platform handles the scale (500K developers, 8,000+ pages); content operations coordinate across multiple teams; the organizational model supports the ecosystem; impact measurement connects education to business outcomes."
    weight: 0.35
    description: "EcosystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates developer education platform expertise — the learning graph enables meaningful progression; personalization is technically feasible and genuinely useful; the content model handles diverse content types without oversimplification; community content integration maintains quality; the analytics design enables actionable insights; the overall ecosystem would be a significant competitive advantage."
    weight: 0.35
    description: "PlatformExpertise"
  - type: llm_judge
    criteria: "Response would transform developer education from fragmented to unified — developers would experience a coherent learning journey; teams would collaborate instead of competing; content duplication would decrease; product adoption would increase through better education; the CEO would see clear ROI from the $15M investment; the ecosystem would be a model for the industry."
    weight: 0.30
    description: "TransformativeVision"
