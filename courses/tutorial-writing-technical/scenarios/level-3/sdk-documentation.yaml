meta:
  id: sdk-documentation
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write comprehensive SDK documentation including getting started, authentication, core concepts, advanced usage, error handling, and migration from a competitor's SDK"
  tags: [sdk, documentation, developer-experience, advanced]

state: {}

trigger: |
  You're the Head of Developer Experience at an
  analytics company. You're launching a new
  JavaScript SDK (v1.0) that replaces the legacy
  SDK and competes with Segment, Mixpanel, and
  Amplitude. The SDK documentation is the #1
  factor in developer adoption, and you need it
  to be best-in-class.

  SDK details:
  - Name: TrackKit JS SDK
  - Install: npm install @trackkit/browser
  - Size: 12KB gzipped (smaller than competitors)
  - Features: Event tracking, user identification,
    page views, feature flags, A/B testing, session
    replay, privacy controls (GDPR/CCPA)
  - Frameworks: React, Next.js, Vue, vanilla JS
  - TypeScript: Full type definitions included

  Documentation sections to write:
  1. Overview (what TrackKit is, why it's different,
     SDK architecture)
  2. Quick Start (5-minute integration)
  3. Installation (npm, CDN, framework-specific
     setup for React/Next.js/Vue)
  4. Core Concepts (events, properties, identity,
     sessions, batching)
  5. Event Tracking (track, identify, page, group,
     alias — with examples)
  6. Advanced Features (feature flags, A/B testing,
     session replay integration)
  7. Privacy and Compliance (GDPR consent mode,
     CCPA opt-out, data residency, PII scrubbing)
  8. Error Handling and Debugging (debug mode,
     error codes, network retry, offline queue)
  9. Performance (bundle size optimization, lazy
     loading, sampling)
  10. Migration Guides (from Segment, from Mixpanel,
      from Amplitude — side-by-side API comparison)
  11. API Reference (complete method signatures
      with types)
  12. Changelog and Versioning

  Quality bar:
  - Every code example must be copy-pasteable and
    work
  - TypeScript types shown inline
  - Framework-specific examples (not just vanilla JS)
  - Migration guides with before/after code
  - Each section can stand alone (no "see above")

  Task: Write the complete SDK documentation
  covering all 12 sections with production-quality
  examples, TypeScript types, and framework-specific
  integration guides.

assertions:
  - type: llm_judge
    criteria: "Response writes comprehensive SDK documentation — covers all 12 sections with appropriate depth; code examples are complete, typed, and copy-pasteable; the quick start achieves a working integration in 5 minutes; core concepts are clearly explained; advanced features go beyond basics; the API reference includes complete method signatures with TypeScript types; the documentation can serve as both tutorial and reference."
    weight: 0.35
    description: "DocumentationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates best-in-class SDK documentation practices — framework-specific examples (React, Next.js, Vue) are idiomatic for each framework; privacy and compliance section is substantive (GDPR, CCPA, PII scrubbing); error handling includes specific error codes and solutions; performance section addresses real concerns (bundle size, lazy loading); migration guides provide side-by-side API comparisons with competitors; the documentation would be competitive with Segment/Mixpanel/Amplitude docs."
    weight: 0.35
    description: "DocumentationQuality"
  - type: llm_judge
    criteria: "Response is developer-friendly and adoption-optimized — the overview quickly communicates why TrackKit is different; the quick start is genuinely achievable in 5 minutes; each section stands alone without requiring full sequential reading; the debugging section would save developers hours of troubleshooting; the migration guides would convince developers using competitors to switch; the overall documentation would drive SDK adoption."
    weight: 0.30
    description: "DeveloperAdoption"
