meta:
  id: data-science-notebook
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write a data science tutorial as a Jupyter notebook, combining narrative explanation, code, visualizations, and analysis in a reproducible document"
  tags: [data-science, jupyter, notebook, advanced]

state: {}

trigger: |
  You're a data scientist at a retail company.
  You've been asked to create a Jupyter notebook
  tutorial called "Customer Segmentation with
  Python: From Raw Data to Actionable Insights"
  for the company's data analytics team. The team
  has Python basics but hasn't done customer
  segmentation before.

  Notebook parameters:
  - Language: Python 3.11
  - Libraries: pandas, scikit-learn, matplotlib,
    seaborn, plotly
  - Dataset: E-commerce transaction data (customer
    ID, purchase date, amount, product category,
    channel) — simulated but realistic
  - Technique: RFM analysis + K-Means clustering
  - Audience: Junior data analysts who know Python
    and pandas but not ML

  Notebook structure:
  1. Introduction and business context (markdown)
     - Why customer segmentation matters for retail
     - What we'll build (RFM + clustering)
  2. Data loading and exploration (code + markdown)
     - Load the dataset
     - Shape, dtypes, missing values
     - Key statistics and distributions
  3. Data cleaning (code + markdown)
     - Handle missing values
     - Remove duplicates
     - Filter outliers
  4. RFM Feature Engineering (code + markdown)
     - Calculate Recency, Frequency, Monetary
     - Explain each metric with business context
     - Visualize RFM distributions
  5. K-Means Clustering (code + markdown)
     - Feature scaling (StandardScaler)
     - Finding optimal K (elbow method, silhouette)
     - Run K-Means with chosen K
     - Assign clusters to customers
  6. Cluster Analysis and Visualization (code +
     markdown)
     - Profile each cluster (who are these customers?)
     - 3D scatter plot of clusters
     - Business labels (Champions, At Risk, Lost, etc.)
  7. Business Recommendations (markdown)
     - Actionable strategies per segment
     - Expected impact
  8. Next Steps and Reproducibility (markdown)
     - Requirements.txt for reproducibility
     - Limitations and future work

  Requirements:
  - Every code cell must be runnable in sequence
  - Markdown cells explain the WHY, not just WHAT
  - Visualizations are labeled and professional
  - The notebook tells a story from question to
    answer
  - Include the simulated dataset generation code

  Task: Write the complete Jupyter notebook content
  (all cells in order — both markdown and code)
  with the narrative, code, and visualization
  specifications.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete Jupyter notebook tutorial — includes all 8 sections with appropriate mix of markdown and code cells; code cells are runnable in sequence (imports at top, no undefined variables); markdown cells provide business context and methodology explanation; the RFM analysis is correctly implemented; K-Means clustering includes proper feature scaling and elbow method; the notebook achieves the goal (customer segments with business labels)."
    weight: 0.35
    description: "NotebookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates literate programming — the notebook tells a coherent story from business question to actionable insights; markdown explanations connect code to business concepts; visualizations are specified with proper labels, titles, and context; each analysis step is motivated (WHY we do this, not just HOW); the business recommendations section translates data into action; the notebook would be understandable by a non-technical stakeholder."
    weight: 0.35
    description: "LiterateProgramming"
  - type: llm_judge
    criteria: "Response is reproducible and educational — the simulated dataset generation code is included; requirements are specified for reproducibility; the notebook teaches the methodology (RFM, K-Means) well enough for the analyst to apply it to different data; limitations are honestly discussed; the overall notebook would serve as both a tutorial and a template for future segmentation analyses."
    weight: 0.30
    description: "ReproducibilityAndEducation"
