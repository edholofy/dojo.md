meta:
  id: accessibility-technical-docs
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write an accessibility-focused tutorial for web developers, covering WCAG compliance, screen reader testing, and accessible component implementation"
  tags: [accessibility, wcag, a11y, advanced]

state: {}

trigger: |
  You're an accessibility engineer at a large SaaS
  company. After a VPAT (Voluntary Product
  Accessibility Template) audit revealed 47
  accessibility violations, the VP of Engineering
  has mandated accessibility training for all
  frontend developers. You need to write a
  comprehensive tutorial.

  Tutorial parameters:
  - Audience: Frontend developers (React/TypeScript)
    who have heard of accessibility but never
    implemented it systematically
  - Standard: WCAG 2.1 Level AA
  - Focus: Practical implementation, not just
    theory

  Tutorial structure:
  1. Why accessibility matters (legal, ethical,
     business case — your company's 47 violations
     as motivation)
  2. WCAG 2.1 overview (4 principles: Perceivable,
     Operable, Understandable, Robust — with
     practical examples of each)
  3. Semantic HTML (why it matters more than ARIA,
     common mistakes)
  4. Building accessible components:
     - Modal dialog (focus trap, escape key,
       aria-modal, return focus)
     - Dropdown menu (keyboard navigation, arrow
       keys, aria-expanded)
     - Data table (proper headers, caption, sortable
       columns with aria-sort)
     - Form with validation (error association,
       aria-describedby, live regions)
  5. Color and contrast (contrast ratios, tools,
     color-blind considerations, dark mode)
  6. Screen reader testing tutorial:
     - VoiceOver (macOS) basics for developers
     - NVDA (Windows) basics
     - What to test and what to listen for
     - Common "sounds right but isn't accessible"
       mistakes
  7. Automated testing:
     - axe-core integration with Vitest
     - Lighthouse accessibility audit
     - CI/CD accessibility gates
  8. Accessibility checklist (organized by component
     type)

  Requirements:
  - Complete React/TypeScript code for all 4
    components
  - Show both inaccessible AND accessible versions
    (before/after)
  - Include keyboard interaction specifications
  - Screen reader announcements described for each
    component
  - All code follows WCAG 2.1 Level AA

  Task: Write the complete accessibility tutorial
  with all 8 sections, 4 accessible component
  implementations, and the testing methodology.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete accessibility tutorial — covers all 8 sections; all 4 components (modal, dropdown, table, form) have complete React/TypeScript code; each component shows inaccessible AND accessible versions; keyboard interactions are specified; screen reader behavior is described; WCAG principles are connected to practical implementation; automated testing integration is demonstrated."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine accessibility expertise — component implementations follow WCAG 2.1 AA correctly; ARIA attributes are used appropriately (not over-used); focus management is handled correctly in modal and dropdown; form validation uses proper error association; the before/after comparisons highlight meaningful accessibility improvements; the screen reader testing section teaches developers to test their own work; the overall tutorial would address real accessibility violations."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "Response is practical and immediately applicable — developers can copy the accessible components into their codebase; the automated testing setup would catch future violations; the accessibility checklist is organized for daily use; the tutorial motivates developers (not just scares them with legal threats); the overall training would measurably improve the company's accessibility posture and address the 47 violations."
    weight: 0.30
    description: "PracticalApplication"
