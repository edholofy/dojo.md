meta:
  id: multi-language-tutorial
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write a tutorial that teaches the same concept across 4 programming languages, maintaining consistency while being idiomatic in each language"
  tags: [multi-language, polyglot, comparative, advanced]

state: {}

trigger: |
  You're a senior technical writer at a cloud
  platform company. You need to write a tutorial
  called "Build a REST API in 30 Minutes" that
  shows the same API implementation in 4 languages.
  Your platform supports all 4, and developers
  should be able to choose their preferred language.

  API to build:
  - A simple bookstore API with CRUD operations
  - Endpoints:
    - GET /books — list all books
    - GET /books/:id — get a specific book
    - POST /books — create a new book
    - PUT /books/:id — update a book
    - DELETE /books/:id — delete a book
  - Data model: id, title, author, isbn, price,
    published_year
  - Storage: In-memory array (to keep focus on
    the API, not database setup)
  - Features: Input validation, error handling,
    proper HTTP status codes

  Languages and frameworks:
  1. JavaScript/TypeScript — Express.js
  2. Python — FastAPI
  3. Go — Gin
  4. Rust — Actix-web

  Tutorial structure:
  - Introduction (what we're building, why this
    API design)
  - Language selector tabs (reader picks their
    language)
  - For each language:
    - Project setup and dependencies
    - Define the data model
    - Implement each endpoint (progressive)
    - Add validation and error handling
    - Test with cURL examples
  - Shared sections:
    - API design decisions (RESTful conventions)
    - cURL test commands (same for all languages)
    - Comparison table (LOC, performance
      characteristics, type safety, ecosystem)

  Requirements:
  - Code must be idiomatic for each language (not
    a direct translation)
  - Each language version must be functionally
    identical (same endpoints, same responses)
  - Shared concepts explained once, language-
    specific details in tabs
  - Include a language comparison section (honest
    trade-offs)

  Task: Write the complete multi-language tutorial
  with implementations in all 4 languages, shared
  API design content, and the comparison section.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete multi-language tutorial — all 4 language implementations (Express, FastAPI, Gin, Actix-web) are complete and functional; each implementation covers all 5 CRUD endpoints; the code is idiomatic for each language (not a mechanical translation); shared sections (API design, cURL testing) avoid unnecessary repetition; the data model and response format are consistent across languages."
    weight: 0.35
    description: "MultiLanguageCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates language-specific expertise — Express uses async/await and proper middleware; FastAPI uses Pydantic models and type hints; Go uses Gin's binding and proper error handling; Rust uses Actix-web with proper ownership and Result types; validation and error handling follow each language's conventions; the code would pass a code review from a developer experienced in that language."
    weight: 0.35
    description: "LanguageExpertise"
  - type: llm_judge
    criteria: "Response provides valuable cross-language comparison — the comparison section honestly evaluates trade-offs (LOC, performance, type safety, learning curve, ecosystem); the tutorial helps developers choose the right language for their use case; the shared API design section teaches RESTful conventions language-independently; the overall tutorial is useful for both single-language and polyglot developers."
    weight: 0.30
    description: "ComparisonValue"
