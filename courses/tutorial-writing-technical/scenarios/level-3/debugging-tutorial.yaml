meta:
  id: debugging-tutorial
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write an advanced debugging tutorial that teaches systematic debugging methodology using real-world bug scenarios with production debugging tools"
  tags: [debugging, methodology, production, advanced]

state: {}

trigger: |
  You're a principal engineer writing a tutorial
  for your company's internal engineering education
  program called "The Art of Debugging: A
  Systematic Approach to Finding and Fixing Bugs."
  Junior and mid-level engineers on your team spend
  too much time debugging with console.log — you
  want to teach them professional debugging skills.

  Tutorial parameters:
  - Audience: Engineers with 1-3 years experience
  - Languages: TypeScript/Node.js (backend),
    React (frontend)
  - Tools: Chrome DevTools, Node.js debugger, VS
    Code debugger, logging frameworks

  Tutorial structure:
  1. The debugging mindset (hypothesis-driven
     debugging, not random changes)
  2. Bug Scenario 1: The Memory Leak
     - Symptom: API server crashes every 8 hours
     - Tools: Node.js heap snapshots, --inspect flag,
       Chrome DevTools Memory tab
     - Root cause: Event listener not cleaned up
     - Fix and verification
  3. Bug Scenario 2: The Race Condition
     - Symptom: Intermittent test failures, "works
       on my machine"
     - Tools: Logging with correlation IDs,
       deterministic testing
     - Root cause: Async operations completing in
       unexpected order
     - Fix and verification
  4. Bug Scenario 3: The UI Rendering Bug
     - Symptom: Component shows stale data after
       navigation
     - Tools: React DevTools, component profiler,
       useEffect dependency analysis
     - Root cause: Missing dependency in useEffect
     - Fix and verification
  5. Bug Scenario 4: The Performance Regression
     - Symptom: API response time doubled after
       deploy
     - Tools: APM traces, database query analysis,
       git bisect
     - Root cause: N+1 query introduced in recent
       commit
     - Fix and verification
  6. Production debugging (when you can't reproduce
     locally)
     - Structured logging best practices
     - Distributed tracing
     - Feature flags for debugging
     - Canary deployments
  7. Debugging checklist and decision tree

  Requirements:
  - Each bug scenario follows: symptom → hypothesis
    → investigation → root cause → fix → verify
  - Show actual tool output (heap snapshots, traces,
    logs)
  - Teach the methodology, not just the specific
    fixes
  - Include the debugging decision tree (flowchart
    description)

  Task: Write the complete debugging tutorial with
  all 7 sections, 4 realistic bug scenarios, tool
  demonstrations, and the debugging methodology.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete debugging tutorial — covers all 7 sections; all 4 bug scenarios follow the symptom → hypothesis → investigation → root cause → fix → verify methodology; tool usage is demonstrated with realistic output; the debugging decision tree provides a reusable framework; the tutorial teaches systematic debugging, not ad-hoc troubleshooting; the production debugging section addresses real-world constraints."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches debugging methodology effectively — the hypothesis-driven approach is explained and applied consistently; each scenario demonstrates different debugging tools and techniques; the root causes are realistic (memory leaks, race conditions, stale closures, N+1 queries); the fixes are correct and the verification steps confirm the fix; the methodology is transferable to bugs not covered in the tutorial."
    weight: 0.35
    description: "MethodologyTeaching"
  - type: llm_judge
    criteria: "Response would transform debugging skills — the tutorial moves developers beyond console.log to professional tools; production debugging guidance addresses real constraints (can't attach debugger, can't reproduce); the debugging checklist is immediately usable; the decision tree guides the right approach for different bug types; the overall tutorial would measurably improve team debugging efficiency."
    weight: 0.30
    description: "SkillTransformation"
