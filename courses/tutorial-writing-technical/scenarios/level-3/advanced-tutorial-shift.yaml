meta:
  id: advanced-tutorial-shift
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write three advanced technical documents simultaneously: a distributed systems tutorial, a complete developer portal plan, and a technical writing style guide"
  tags: [shift-simulation, multi-document, advanced]

state: {}

trigger: |
  You're the Head of Developer Education at a
  cloud infrastructure company (similar to
  Cloudflare or Vercel). Three major initiatives
  have converged and all need your expertise this
  week.

  Document 1: Distributed Systems Tutorial
  "Understanding Distributed Consensus: From Raft
  to Production" — for your engineering blog.
  - Audience: Backend engineers who've used
    distributed systems but don't understand
    consensus algorithms
  - Must cover: Why consensus matters, the
    split-brain problem, Raft algorithm walkthrough
    (leader election, log replication, safety),
    practical implementation considerations, how
    your company's edge network uses consensus
  - Include: Step-by-step Raft visualization
    (text-based state diagrams showing 5-node
    cluster through leader election and log
    replication), pseudocode for key operations,
    comparison with Paxos, real-world failure
    scenarios and how Raft handles them
  - Length: ~3,000 words, deeply technical but
    accessible

  Document 2: Developer Portal Plan
  Your company is launching a new developer portal
  (replacing scattered docs). Create a comprehensive
  content architecture plan:
  - Information architecture (site map with all
    sections and navigation)
  - Content types taxonomy (tutorials, guides,
    references, concepts, troubleshooting — with
    templates for each)
  - Content style and voice guidelines specific to
    your technical documentation
  - Migration plan from existing docs (3 sources:
    GitBook, README files, internal wiki)
  - Success metrics (time-to-first-deploy,
    support ticket deflection, developer NPS)
  - SEO strategy for technical content
  - Versioning strategy for multi-product docs

  Document 3: Technical Writing Style Guide
  Create an internal style guide for your 8-person
  developer education team:
  - Voice and tone principles (with before/after
    examples)
  - Code example standards (language, formatting,
    runnable requirements, error handling)
  - Terminology decisions (specific words to use
    and avoid, with rationale)
  - Accessibility requirements for technical
    content (alt text for diagrams, code block
    accessibility, screen reader considerations)
  - Inclusive language guidelines (with technical
    context — e.g., allowlist/denylist, primary/
    replica)
  - Review process and quality checklist
  - Templates for common document types

  Task: Write all three documents. Each must be
  complete and production-ready. The distributed
  systems tutorial must demonstrate deep technical
  understanding, the portal plan must be actionable,
  and the style guide must be immediately usable by
  your team.

assertions:
  - type: llm_judge
    criteria: "Response produces all three documents at high quality — the distributed systems tutorial explains Raft clearly with state diagrams and pseudocode; the developer portal plan has complete information architecture and actionable migration strategy; the style guide has concrete before/after examples and immediately usable templates; all three documents reflect advanced technical writing expertise."
    weight: 0.35
    description: "MultiDocumentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery across technical writing domains — the Raft tutorial balances depth with accessibility and includes accurate technical content; the portal plan addresses real challenges (migration, versioning, SEO, metrics); the style guide covers inclusive language and accessibility beyond surface level; each document serves its distinct audience and purpose effectively."
    weight: 0.35
    description: "CrossDomainMastery"
  - type: llm_judge
    criteria: "Response is production-ready — all three documents could be published or implemented without significant revision; the tutorial would engage senior engineers; the portal plan would guide a real migration project; the style guide would align an 8-person team's writing quality; together the three documents demonstrate the breadth expected of a Head of Developer Education."
    weight: 0.30
    description: "ProductionReadiness"
