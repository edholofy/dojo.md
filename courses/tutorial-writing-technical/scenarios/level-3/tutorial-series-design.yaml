meta:
  id: tutorial-series-design
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Design and write the first 3 parts of a 10-part tutorial series, including the series arc, prerequisite management, and continuity between installments"
  tags: [tutorial-series, multi-part, curriculum, advanced]

state: {}

trigger: |
  You're a developer educator at a major tech
  company. You're creating a 10-part tutorial
  series called "Build a Full-Stack SaaS App from
  Zero to Production" for the company's developer
  learning platform. The series should take a
  developer from nothing to a deployed, production-
  ready SaaS application.

  Series overview:
  - Total: 10 parts, released weekly
  - Stack: Next.js 14, Prisma, PostgreSQL, Stripe,
    Clerk (auth), Vercel
  - Final product: A project management tool (like
    a simplified Linear) with authentication, teams,
    projects, tasks, real-time updates, billing

  Series arc:
  Part 1: Project setup, auth, and first page
  Part 2: Database design and Prisma setup
  Part 3: Building the core UI (dashboard, project
    list, task board)
  Part 4: CRUD operations and server actions
  Part 5: Real-time updates with Server-Sent Events
  Part 6: Team management and permissions
  Part 7: Stripe integration (subscriptions)
  Part 8: Email notifications and webhooks
  Part 9: Testing and error monitoring
  Part 10: Deployment, CI/CD, and going live

  Design requirements:
  - Each part should be self-contained enough to
    be useful alone but connected to the series
  - Each part starts with a "What we built last
    time" recap and ends with a "What's next"
    preview
  - A running code repository with branches for
    each part (part-1, part-2, etc.)
  - Prerequisites clearly stated for each part
  - Estimated time for each part (2-4 hours)

  Task: Write the complete series design document
  (arc overview, part summaries, prerequisite chain)
  AND the full content for Parts 1-3. Each part
  should be a complete, publishable tutorial.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive series design — the 10-part arc is coherent and builds to a complete SaaS application; part summaries preview what each installment covers; the prerequisite chain is clear; the series design document would guide the creation of all 10 parts; Parts 1-3 are fully written with complete code examples; each part starts with a recap and ends with a preview."
    weight: 0.35
    description: "SeriesDesign"
  - type: llm_judge
    criteria: "Response writes production-quality tutorial content for Parts 1-3 — Part 1 sets up the project, auth, and first page successfully; Part 2 designs the database schema and sets up Prisma; Part 3 builds the core UI components; code examples are complete and runnable; the code builds incrementally (Part 2 code extends Part 1 code); the branch strategy (part-1, part-2, part-3) is explained; each part achieves a tangible milestone."
    weight: 0.35
    description: "ContentQuality"
  - type: llm_judge
    criteria: "Response manages series continuity effectively — readers can start at Part 1 and follow through Part 3 without gaps; prerequisite management handles readers who join mid-series; the repository branch structure allows readers to catch up; the 2-4 hour time estimate per part is realistic; the series would keep developers engaged across 10 weekly installments; the overall series would be a flagship educational resource."
    weight: 0.30
    description: "SeriesContinuity"
