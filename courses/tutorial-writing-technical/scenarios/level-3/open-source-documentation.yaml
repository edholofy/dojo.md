meta:
  id: open-source-documentation
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Create a complete documentation suite for an open-source project, including README, contributing guide, architecture docs, and API reference"
  tags: [open-source, documentation-suite, community, advanced]

state: {}

trigger: |
  You're the creator of "Velox" — an open-source
  Rust-based HTTP load testing tool that has grown
  from a side project to 8,000 GitHub stars. The
  community is growing but contributions are slow
  because the documentation is just a basic README.
  You need to create a complete documentation suite.

  Project details:
  - Name: Velox
  - Language: Rust
  - What it does: HTTP load testing with scenarios
    written in YAML/TOML; supports concurrent
    users, ramp-up patterns, assertions, and HTML
    reports
  - Install: cargo install velox or download binary
  - Current docs: 200-line README with installation
    and basic usage

  Documentation suite to create:
  1. README.md (rewrite for the 8,000-star project
     it has become)
     - Project description with badges
     - Quick start (3 commands to first load test)
     - Feature overview with examples
     - Installation options
     - Community links

  2. docs/getting-started.md
     - First load test tutorial
     - Understanding the output
     - Writing your first scenario file
     - Running against a local server

  3. docs/configuration.md
     - Complete reference for scenario YAML/TOML
     - All assertion types
     - Environment variable support
     - Profiles (dev, staging, production)

  4. CONTRIBUTING.md
     - Development setup (Rust toolchain, building
       from source)
     - Project architecture overview
     - How to add a new assertion type (guided
       example)
     - Code style and conventions
     - Testing guidelines
     - PR process and review expectations
     - Issue and PR templates

  5. docs/architecture.md
     - High-level system design
     - Key modules and their responsibilities
     - How a load test execution flows through
       the system
     - Extension points for contributors

  6. docs/cli-reference.md
     - All CLI commands and flags
     - Global options
     - Output format options

  Task: Create the complete documentation suite
  with all 6 documents, optimized for both new
  users and potential contributors.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 6-document documentation suite — the README is appropriate for an 8,000-star project (badges, features, quick start); the getting-started guide works for complete newcomers; the configuration reference is comprehensive; CONTRIBUTING.md welcomes and guides new contributors; the architecture doc explains the system design; the CLI reference covers all commands; the documents form a cohesive suite."
    weight: 0.35
    description: "SuiteCompleteness"
  - type: llm_judge
    criteria: "Response follows open-source documentation best practices — the README sells the project quickly (why should I use this?); the CONTRIBUTING guide reduces friction for new contributors; the architecture doc helps contributors understand where to make changes; issue and PR templates are included; code style and testing expectations are clear; the documentation would increase both adoption and contribution rate."
    weight: 0.35
    description: "OpenSourcePractices"
  - type: llm_judge
    criteria: "Response serves both users and contributors — the getting-started guide and CLI reference serve end users; CONTRIBUTING and architecture docs serve contributors; the README serves both audiences; the configuration reference is a shared resource; the documentation suite addresses the slow contribution problem; the overall quality matches the project's 8,000-star status."
    weight: 0.30
    description: "DualAudienceService"
