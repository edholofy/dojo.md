meta:
  id: infrastructure-tutorial
  level: 3
  course: tutorial-writing-technical
  type: output
  description: "Write an infrastructure-as-code tutorial teaching Terraform from first resource to production-ready multi-environment setup with modules and state management"
  tags: [infrastructure, terraform, iac, advanced]

state: {}

trigger: |
  You're a platform engineer writing an internal
  tutorial for your company called "Terraform from
  Zero to Production: A Practical Guide for
  Developers." Your company is standardizing on
  Terraform for infrastructure management, and
  backend developers need to learn it.

  Tutorial parameters:
  - Tool: Terraform (HashiCorp)
  - Cloud: AWS
  - Audience: Backend developers who manage their
    own infrastructure but have never used IaC
  - Goal: From first resource to a production-ready
    multi-environment setup

  Tutorial structure:
  1. Why IaC matters (manual vs automated, drift,
     reproducibility)
  2. Terraform fundamentals (providers, resources,
     state, plan/apply)
  3. Your first resource (create an S3 bucket)
  4. Variables and outputs (parameterize the config)
  5. Multiple resources with dependencies (VPC,
     subnets, security groups, EC2 instance)
  6. State management (remote state with S3 backend,
     state locking with DynamoDB)
  7. Modules (create a reusable VPC module)
  8. Multi-environment setup (dev/staging/prod with
     workspaces or directory structure)
  9. Secrets management (AWS Secrets Manager,
     sensitive variables, .gitignore)
  10. CI/CD integration (GitHub Actions for
      terraform plan on PR, apply on merge)
  11. Common mistakes and how to avoid them
  12. Reference architecture (complete production
      setup diagram and code)

  Requirements:
  - All Terraform code must be syntactically
    correct (HCL)
  - Show terraform plan output to explain what
    will happen
  - Address state management carefully (this is
    where teams fail)
  - Include the common mistakes section (based on
    real incidents)
  - Build incrementally (each section adds to the
    previous)

  Task: Write the complete Terraform tutorial with
  all 12 sections, production-ready code examples,
  and the reference architecture.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete Terraform tutorial — covers all 12 sections from fundamentals to reference architecture; HCL code is syntactically correct; terraform plan output is shown and explained; the progression from single resource to multi-environment production setup is logical; state management is thoroughly covered; modules are properly constructed; the CI/CD integration connects Terraform to the development workflow."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches Terraform production practices — remote state with locking is set up correctly; secrets are never stored in state or version control; the multi-environment setup follows best practices; modules are designed for reusability; the CI/CD pipeline prevents accidental production changes; common mistakes reflect real-world incidents; the reference architecture would be production-ready."
    weight: 0.35
    description: "ProductionPractices"
  - type: llm_judge
    criteria: "Response is accessible to Terraform newcomers — the tutorial assumes no IaC experience; fundamentals are explained clearly before advanced topics; each section builds on the previous one; the common mistakes section prevents costly errors; the overall tutorial would enable a backend developer to manage AWS infrastructure with Terraform confidently."
    weight: 0.30
    description: "Accessibility"
