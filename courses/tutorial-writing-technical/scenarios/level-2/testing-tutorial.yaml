meta:
  id: testing-tutorial
  level: 2
  course: tutorial-writing-technical
  type: output
  description: "Write a testing tutorial that teaches developers how to write unit tests, integration tests, and end-to-end tests for a real application feature"
  tags: [testing, unit-tests, e2e, intermediate]

state: {}

trigger: |
  You're a senior QA engineer writing a tutorial
  for your company's engineering blog called
  "A Practical Guide to Testing Your React App:
  From Unit to E2E." The team has low test coverage
  (23%) and most developers say they "don't know
  what to test or how."

  Tutorial parameters:
  - Framework: React 18 with TypeScript
  - Testing tools: Vitest (unit/integration),
    React Testing Library, Playwright (E2E)
  - Feature to test: A shopping cart component
    (add items, update quantity, remove items,
    calculate totals, apply discount codes)

  Tutorial structure:
  1. The testing pyramid (what to test at each
     level and why)
  2. Setting up the testing environment (Vitest
     config, RTL setup, Playwright install)
  3. Unit tests: Testing the cart calculation logic
     - Test adding items
     - Test quantity updates
     - Test discount code application
     - Test edge cases (empty cart, negative
       quantity, expired discount)
  4. Integration tests: Testing the cart component
     - Render and interact with the cart UI
     - Test add-to-cart flow
     - Test remove item flow
     - Test that totals update correctly
  5. E2E tests: Testing the full checkout flow
     - Navigate to product page → add to cart →
       view cart → apply discount → proceed to
       checkout
  6. What NOT to test (implementation details,
     third-party code, getters/setters)
  7. Testing patterns and anti-patterns
  8. Running tests in CI (GitHub Actions config)

  Requirements:
  - All test code must be complete and runnable
  - Explain the rationale for each test (why this
    test matters)
  - Show both the implementation code AND the test
    code
  - Include common testing mistakes and how to
    avoid them
  - Address "what do I test?" directly

  Task: Write the complete testing tutorial with
  all 8 sections, production-quality test examples,
  and practical testing advice.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete testing tutorial — covers all 8 sections from testing pyramid to CI configuration; test examples are complete and runnable; all three testing levels (unit, integration, E2E) are demonstrated with the shopping cart feature; the implementation code is shown alongside test code; the testing pyramid explanation motivates the multi-level approach; the GitHub Actions config is practical."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches good testing practices — each test has a clear rationale (WHY this test matters); edge cases are tested thoughtfully; the 'what NOT to test' section prevents over-testing; testing anti-patterns are identified with corrections; the tests follow React Testing Library best practices (user-centric queries, not implementation details); the E2E tests cover a realistic user flow; the overall approach would improve the team's 23% coverage meaningfully."
    weight: 0.35
    description: "TestingPractices"
  - type: llm_judge
    criteria: "Response directly addresses 'I don't know what to test' — provides clear decision criteria for what deserves a test; the shopping cart example is relatable and demonstrates real testing decisions; the tutorial builds testing confidence progressively; the CI integration makes testing part of the workflow; the overall guide would transform a testing-reluctant developer into a testing-confident one."
    weight: 0.30
    description: "TestingConfidence"
