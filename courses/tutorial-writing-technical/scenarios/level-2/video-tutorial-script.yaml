meta:
  id: video-tutorial-script
  level: 2
  course: tutorial-writing-technical
  type: output
  description: "Write a video tutorial script for a screencast, including narration, on-screen actions, code progression, and visual cues for editing"
  tags: [video-script, screencast, narration, intermediate]

state: {}

trigger: |
  You're a content creator for a YouTube channel
  about web development (150K subscribers). You're
  creating a 15-minute screencast tutorial called
  "Build a Real-Time Chat App with WebSockets in
  15 Minutes." Your videos are known for clear
  explanations and smooth pacing.

  Video parameters:
  - Duration: 15 minutes
  - Style: Screencast with voice narration (no
    face camera)
  - Editor: VS Code with dark theme
  - Browser: Chrome with DevTools
  - Code: Node.js (Express + ws library) + vanilla
    HTML/JS client

  Script format requirements:
  - Timestamp markers for each section
  - Two-column format: Left = narration (what to
    say), Right = on-screen actions (what to show)
  - Code progression markers (what code to type/
    paste at each point)
  - Visual cue notes for editing (zoom in on
    specific code, highlight, callout boxes)
  - Pause points for the viewer to follow along

  Video structure:
  - [0:00-0:30] Hook — show the finished app working
  - [0:30-1:30] What are WebSockets? (brief
    concept explanation with a diagram)
  - [1:30-3:00] Project setup (npm init, install
    dependencies)
  - [3:00-6:00] Build the server (Express + ws,
    connection handling, broadcast)
  - [6:00-9:00] Build the client (HTML structure,
    WebSocket connection, send/receive messages)
  - [9:00-11:00] Add features (username, typing
    indicator, user join/leave notifications)
  - [11:00-13:00] Polish (CSS styling, auto-scroll,
    message timestamps)
  - [13:00-14:00] Testing with multiple browser
    windows
  - [14:00-15:00] Recap, next steps, and call to
    action

  Task: Write the complete video tutorial script
  with narration, on-screen actions, code
  progression, and editing notes for all sections.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete video script — covers all sections with timestamp markers; the two-column format clearly separates narration from on-screen actions; code progression is tracked (what's typed/pasted at each point); visual cue notes guide the editor; the script fits within 15 minutes; the final product (real-time chat app) works end-to-end; the hook shows the finished app first to capture attention."
    weight: 0.35
    description: "ScriptCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates screencast best practices — narration is conversational and engaging (not reading documentation); on-screen actions are paced for viewer comprehension; code is introduced incrementally (not dumping entire files); visual cues highlight important code; pause points allow viewers to follow along; the concept explanation (WebSockets) is brief but clear; the script flows naturally from section to section."
    weight: 0.35
    description: "ScreencastPractices"
  - type: llm_judge
    criteria: "Response is technically accurate and production-ready — the WebSocket implementation is correct (ws library, connection handling, broadcast); the client-side code properly handles connection, sending, and receiving; features (username, typing indicator) are implemented correctly; the script could be used to record the video without additional planning; the overall tutorial would be engaging for a YouTube audience."
    weight: 0.30
    description: "TechnicalAccuracy"
