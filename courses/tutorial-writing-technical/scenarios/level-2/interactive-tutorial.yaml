meta:
  id: interactive-tutorial
  level: 2
  course: tutorial-writing-technical
  type: output
  description: "Design an interactive tutorial with progressive challenges, code exercises, and automated validation — a learn-by-doing experience"
  tags: [interactive, learn-by-doing, exercises, intermediate]

state: {}

trigger: |
  You're an instructional designer at an online
  coding education platform. You're creating an
  interactive tutorial called "Learn CSS Grid in
  30 Minutes" that teaches through hands-on
  challenges rather than reading. The tutorial
  runs in the browser with a live code editor and
  visual preview.

  Tutorial platform capabilities:
  - Split-screen: Code editor (left) + live preview
    (right)
  - Starter code provided for each challenge
  - Automated validation (checks if the CSS output
    matches expected layout)
  - Hint system (3 progressive hints per challenge)
  - "Show solution" button (with explanation of
    why it works)

  Tutorial structure (10 progressive challenges):
  1. Your first grid (display: grid, 3 columns)
  2. Controlling column sizes (fr units, px, auto)
  3. Row heights (grid-template-rows, implicit rows)
  4. Grid gap (gap, row-gap, column-gap)
  5. Placing items (grid-column, grid-row, spanning)
  6. Named grid areas (grid-template-areas)
  7. Alignment (justify-items, align-items, place-
     items)
  8. Responsive grid (auto-fill, auto-fit, minmax)
  9. Nested grids (grid inside grid)
  10. Final challenge: Build a dashboard layout
      (combines all concepts)

  For each challenge, provide:
  - Brief concept introduction (3-4 sentences max)
  - The challenge prompt (what to build)
  - Starter HTML/CSS code
  - Expected result description (what it should
    look like)
  - 3 progressive hints
  - Solution code with explanation
  - Validation criteria (how the system checks
    correctness)

  Constraints:
  - Each challenge should take 2-4 minutes
  - Introductions are minimal — learning happens
    through doing
  - Hints progress from vague to specific
  - Solutions explain WHY, not just WHAT

  Task: Design the complete interactive tutorial
  with all 10 challenges, including introductions,
  prompts, starter code, hints, solutions with
  explanations, and validation criteria.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete 10-challenge interactive tutorial — each challenge has all required components (introduction, prompt, starter code, expected result, 3 hints, solution, validation criteria); the challenges progress from simple (display: grid) to complex (dashboard layout); each challenge takes 2-4 minutes; the final challenge integrates skills from all previous challenges; the overall tutorial would teach CSS Grid through hands-on practice."
    weight: 0.35
    description: "TutorialDesign"
  - type: llm_judge
    criteria: "Response creates effective learning-by-doing experiences — introductions are brief (3-4 sentences); the challenge prompts are clear and motivating; starter code provides enough scaffolding without giving away the answer; hints progress from conceptual to specific; solutions explain WHY the approach works (not just showing code); validation criteria are specific enough for automated checking; the tutorial teaches through doing, not reading."
    weight: 0.35
    description: "LearningByDoing"
  - type: llm_judge
    criteria: "Response teaches CSS Grid accurately and progressively — CSS Grid concepts are introduced in the right order (basic grid before alignment before responsive); code examples use modern CSS Grid syntax; the responsive design challenge uses auto-fill/auto-fit/minmax correctly; the dashboard layout is a practical, real-world application; the overall tutorial would leave a developer comfortable using CSS Grid in their own projects."
    weight: 0.30
    description: "CSSGridAccuracy"
