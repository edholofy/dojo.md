meta:
  id: interactive-learning-platform
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design a browser-based interactive tutorial platform with sandboxed code execution, progressive challenges, and adaptive difficulty for learning a programming framework"
  tags: [interactive-learning, platform-design, edtech, expert]

state: {}

trigger: |
  You're the VP of Education at a developer tools
  company that makes a popular open-source framework
  (similar to Next.js or SvelteKit). You're building
  an interactive learning platform called "LearnFrame"
  — a browser-based tutorial system where developers
  learn by writing real code in sandboxed environments,
  similar to Codecademy, Exercism, or the Svelte
  tutorial.

  Platform specifications:
  - Target: 50,000 monthly active learners
  - 5 learning paths (beginner → advanced)
  - 120 interactive lessons total
  - Browser-based code editor with live preview
  - Sandboxed execution (WebContainers or similar)
  - Progress tracking and skill assessment
  - Community features (discussions, solutions)

  Design the complete platform and content system:

  1. Learning path architecture
     - 5 paths with progression logic
     - Prerequisite system and skill tree
     - Lesson types (guided, challenge, project,
       quiz, sandbox)
     - Difficulty calibration methodology
     - Estimated time per lesson and path

  2. Interactive lesson design system
     - Lesson authoring format (content + code +
       tests + hints)
     - Step-by-step instruction overlay system
     - Code validation engine (unit tests, AST
       analysis, output matching)
     - Hint system (progressive disclosure, 3 levels
       of hints per step)
     - Error message customization (framework-
       specific, beginner-friendly)

  3. Sandboxed execution environment
     - Architecture for browser-based code execution
     - File system simulation
     - Package management in sandbox
     - Preview rendering (for UI frameworks)
     - Performance constraints and guardrails
     - Security considerations

  4. Content authoring pipeline
     - Lesson specification format (complete schema)
     - Content review and testing workflow
     - A/B testing framework for lesson variants
     - Analytics events for learning effectiveness
     - Content versioning (when framework updates)

  5. Adaptive learning features
     - Skill assessment algorithm
     - Difficulty adjustment logic
     - Personalized path recommendations
     - Spaced repetition for concept reinforcement
     - Struggle detection and intervention

  6. Write 3 sample lessons (complete specifications)
     - Lesson 1: "Your First Component" (beginner,
       guided, ~10 minutes)
     - Lesson 2: "Data Fetching Patterns" (intermediate,
       challenge, ~20 minutes)
     - Lesson 3: "Build a Todo App" (intermediate,
       project, ~45 minutes)
     - Each with: instructions, starter code, solution
       code, test cases, hints, common mistakes

  Deliverable: Complete platform design with learning
  architecture, lesson authoring system, technical
  specifications, and 3 fully specified sample lessons.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete interactive learning platform — all 6 areas are covered; the learning path architecture has clear progression; the lesson design system handles guided, challenge, and project types; sandbox execution is technically specified; the content pipeline supports authoring and iteration; adaptive features personalize the experience; all 3 sample lessons are fully specified with instructions, code, tests, and hints."
    weight: 0.35
    description: "PlatformCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates interactive education platform expertise — the lesson authoring format is comprehensive and practical; code validation uses appropriate techniques (tests, AST, output); the hint system provides genuine progressive disclosure; the adaptive learning algorithm is sound; the sandbox architecture is technically feasible; the content versioning strategy handles framework updates gracefully."
    weight: 0.35
    description: "PlatformExpertise"
  - type: llm_judge
    criteria: "Response would create an effective learning experience — the 3 sample lessons demonstrate increasing complexity; the platform would scale to 50,000 monthly learners; the adaptive features would reduce learner frustration and dropout; the overall design competes with Codecademy/Exercism quality; content authors could produce lessons using the specification format."
    weight: 0.30
    description: "LearningEffectiveness"
