meta:
  id: open-source-docs-governance
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design a documentation governance system for a major open-source project with hundreds of contributors, multiple language translations, and versioned docs across releases"
  tags: [open-source, governance, community-docs, expert]

state: {}

trigger: |
  You're the Documentation Lead for a major open-
  source project (similar in scale to React, Vue,
  or Kubernetes — 50,000 GitHub stars, 800
  contributors, 15 major releases). The project's
  documentation has grown organically and is now
  a significant maintenance burden.

  Current state:
  - 1,200 documentation pages across 3 versions
    (current, previous, next/canary)
  - 45 community-maintained translations (12
    "official," rest are stale)
  - 150 open documentation PRs (oldest: 8 months)
  - No clear ownership model — PRs languish
  - Inconsistent quality — ranges from excellent
    to misleading
  - 3 competing "getting started" guides written
    by different contributors
  - API reference is auto-generated but poorly
    integrated with guides
  - "Documentation" is the #2 complaint in the
    annual community survey

  Design the complete documentation governance
  system:

  1. Documentation governance model
     - Ownership structure (docs teams, area owners,
       maintainers)
     - Decision-making process (who approves what)
     - RFC process for documentation architecture
       changes
     - Conflict resolution (competing approaches,
       style disagreements)
     - Relationship between docs team and core
       maintainers

  2. Contribution workflow
     - Contributor guide (complete document)
     - PR review process and SLA (time to first
       review, time to merge)
     - Issue triage process for docs issues
     - "Good first issue" pipeline for new
       contributors
     - Mentorship program for documentation
       contributors
     - Bot automation (stale PRs, label management,
       review assignment)

  3. Quality standards and enforcement
     - Content quality rubric (scoring system)
     - Editorial review checklist
     - Automated quality checks (linting, link
       checking, example validation)
     - Style guide enforcement (automated +
       human review)
     - Accuracy review process (technical
       correctness verification)

  4. Version management
     - Multi-version documentation strategy
     - Content branching workflow
     - Migration guide process (for breaking
       changes)
     - Deprecation notice standards
     - Archive policy for old versions

  5. Translation governance
     - Official vs. community translation tiers
     - Translation freshness requirements per tier
     - Translation coordinator roles
     - Machine translation + human review pipeline
     - Stale translation handling (fallback to
       English vs. warning banner)

  6. Sustainability and health metrics
     - Documentation health dashboard
     - Contributor engagement metrics
     - Content freshness tracking
     - Community satisfaction measurement
     - Quarterly documentation health report
       template
     - Burnout prevention for docs maintainers

  Deliverable: Complete governance system with
  organizational structure, contribution workflows,
  quality standards, and sustainability metrics.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete open-source documentation governance system — all 6 areas are covered; the ownership model clarifies who is responsible for what; the contribution workflow addresses the 150 open PRs problem; quality standards prevent inconsistent content; version management handles 3+ concurrent versions; translation governance creates sustainable tiers; sustainability metrics prevent maintainer burnout."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates open-source community expertise — the governance model respects volunteer contributor dynamics; the PR review SLA is realistic for a volunteer-driven project; the mentorship program grows the contributor pool; bot automation reduces maintainer burden appropriately; the translation tier system is honest about sustainability; the overall system works with volunteer incentives, not against them."
    weight: 0.35
    description: "OpenSourceExpertise"
  - type: llm_judge
    criteria: "Response would resolve the documentation crisis — the 150 open PR backlog would be addressed; competing guides would be consolidated; documentation would improve from #2 complaint to a project strength; the governance system scales with the project's growth; contributor engagement would increase sustainably."
    weight: 0.30
    description: "CrisisResolution"
