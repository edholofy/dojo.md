meta:
  id: compliance-documentation-system
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design a compliance-focused technical documentation system for a regulated industry, covering SOC 2, HIPAA, and GDPR requirements with automated evidence collection"
  tags: [compliance, regulated-industry, documentation-system, expert]

state: {}

trigger: |
  You're the Director of Security Documentation at
  a healthcare SaaS company that processes PHI
  (Protected Health Information). The company needs
  to maintain compliance documentation for SOC 2
  Type II, HIPAA, and GDPR simultaneously. Last
  year's SOC 2 audit had 8 findings related to
  insufficient documentation, and a HIPAA risk
  assessment identified documentation gaps in 12
  of 45 safeguards.

  Current state:
  - 340 policy documents (Word/SharePoint, many
    outdated)
  - 85 technical runbooks (Confluence, inconsistent)
  - 120 architecture diagrams (Lucidchart, version
    unknown)
  - Audit evidence gathered manually (takes 6 weeks)
  - No traceability from policy → control →
    implementation → evidence
  - 3 compliance frameworks with overlapping
    requirements
  - Annual audit prep consumes 2 FTE-months
  - Engineering team resents compliance documentation
    as "checkbox theater"

  Design the complete compliance documentation
  system:

  1. Compliance documentation architecture
     - Unified control framework mapping (SOC 2 +
       HIPAA + GDPR → common controls)
     - Policy → Standard → Procedure → Evidence
       hierarchy
     - Document types and templates for each level
     - Metadata schema (owner, review date,
       applicable frameworks, control mappings)
     - Version control and change management

  2. Technical documentation for compliance
     - Architecture documentation standards (what
       auditors need to see)
     - Data flow diagrams for PHI (required format
       and content)
     - Access control documentation (role matrices,
       privilege inventories)
     - Incident response playbook template
     - Change management documentation
     - Business continuity / disaster recovery docs

  3. Automated evidence collection
     - Evidence types and collection methods
     - Integration with AWS (CloudTrail, Config,
       GuardDuty)
     - Integration with identity provider (Okta)
     - Integration with CI/CD pipeline (deployment
       logs, code review evidence)
     - Automated screenshot/report generation
     - Evidence repository architecture

  4. Continuous compliance monitoring
     - Control effectiveness monitoring dashboard
     - Documentation freshness tracking
     - Automated gap detection
     - Risk register integration
     - Audit readiness score calculation

  5. Engineering-friendly compliance
     - Developer documentation requirements (what
       engineers must document and when)
     - PR templates with compliance checkboxes
     - Architecture decision records (ADRs) for
       compliance-relevant decisions
     - Making compliance documentation useful (not
       just audit artifacts)
     - "Compliance as code" approach

  6. Audit preparation and execution
     - Audit readiness checklist
     - Evidence package assembly automation
     - Auditor portal design (self-serve access to
       evidence)
     - Finding remediation tracking
     - Continuous audit readiness vs. annual
       scramble

  Deliverable: Complete compliance documentation
  system design with unified control framework,
  automation architecture, templates, and the
  engineering integration approach.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete compliance documentation system — all 6 areas are covered; the unified control framework maps SOC 2, HIPAA, and GDPR to common controls; the policy hierarchy is clear and complete; technical documentation templates address auditor needs; automated evidence collection integrates with real AWS and identity provider services; monitoring provides continuous audit readiness; the engineering integration makes compliance documentation useful."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance documentation expertise — the SOC 2 + HIPAA + GDPR mapping is accurate; PHI data flow documentation meets HIPAA requirements; evidence collection automation is technically feasible; the architecture documentation would satisfy auditors; the 'compliance as code' approach is practical; the system addresses the 8 SOC 2 findings and 12 HIPAA gaps specifically."
    weight: 0.35
    description: "ComplianceExpertise"
  - type: llm_judge
    criteria: "Response would transform compliance operations — audit evidence gathering would drop from 6 weeks to near-continuous; the engineering team would find compliance docs useful (not checkbox theater); the system would prevent future audit findings; the overall approach scales across all three frameworks without tripling the documentation burden."
    weight: 0.30
    description: "OperationalTransformation"
