meta:
  id: api-documentation-pipeline
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design and implement an automated API documentation pipeline that generates, validates, and publishes API docs from OpenAPI specs with human-written guides"
  tags: [api-docs, automation, pipeline, expert]

state: {}

trigger: |
  You're the API Platform Lead at an enterprise
  SaaS company with 23 public APIs serving 8,000
  developer customers. Your API documentation has
  significant problems:

  - 6 APIs have OpenAPI specs, 17 don't
  - Specs that exist are outdated (average 4 months
    behind the code)
  - No automated validation — broken examples ship
  - Human-written guides exist for 3 APIs only
  - Developer onboarding time: 5 days (target: 1)
  - Support tickets about docs: 340/month
  - API response examples are manually maintained
    and often wrong

  Design the complete API documentation pipeline:

  1. OpenAPI specification strategy
     - Spec-first vs. code-first decision (with
       rationale for your recommendation)
     - Spec generation/maintenance tooling by
       language (Node.js, Python, Go, Java)
     - Spec validation CI checks (linting,
       breaking change detection, completeness)
     - Governance: who owns specs, review process

  2. Documentation generation pipeline
     - Architecture diagram of the full pipeline
     - OpenAPI → reference docs generation (tool
       selection and customization)
     - Code sample generation (request/response
       examples in 5 languages)
     - Try-it-out / API playground integration
     - Versioning strategy (multi-version docs)

  3. Content enrichment layer
     - How human-written guides integrate with
       generated reference docs
     - Getting started guides template
     - Use case tutorials template
     - Authentication guide template
     - Each template with: structure, writing
       guidelines, required sections

  4. Validation and quality gates
     - Example validation (actually run examples
       against staging API)
     - Link checking
     - Completeness scoring (% of endpoints with
       descriptions, examples, error docs)
     - Breaking change detection and changelog
       generation
     - Contract testing integration

  5. Publishing and delivery
     - Developer portal architecture
     - Search optimization (API-specific search UX)
     - SDK documentation auto-generation
     - Webhook documentation and testing tools
     - Changelog and migration guide automation

  6. Metrics and continuous improvement
     - Documentation quality score algorithm
     - Developer satisfaction measurement
     - Support ticket deflection tracking
     - API adoption funnel analysis
     - Quarterly documentation review process

  Deliverable: Complete pipeline architecture with
  tool recommendations, CI/CD configuration examples,
  templates for human-written content, and the
  measurement strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete API documentation pipeline — all 6 areas are covered with technical depth; the OpenAPI strategy addresses all 23 APIs systematically; the generation pipeline has a clear architecture; content enrichment integrates human and generated docs; validation gates catch real problems (broken examples, incomplete docs, breaking changes); publishing delivers a modern developer portal; metrics track meaningful outcomes."
    weight: 0.35
    description: "PipelineCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates API documentation platform expertise — tool recommendations are specific and justified; CI/CD configurations would actually work; the spec-first vs. code-first recommendation has sound rationale; example validation against staging is technically feasible; the pipeline handles the complexity of 23 APIs across 4 languages; the versioning strategy supports real API evolution patterns."
    weight: 0.35
    description: "TechnicalExpertise"
  - type: llm_judge
    criteria: "Response would solve the stated problems — the pipeline would bring all 23 APIs to documented status; automated validation would prevent broken examples from shipping; developer onboarding would accelerate toward the 1-day target; support tickets would decrease from 340/month; the overall system would be maintainable by the team without heroic effort."
    weight: 0.30
    description: "ProblemResolution"
