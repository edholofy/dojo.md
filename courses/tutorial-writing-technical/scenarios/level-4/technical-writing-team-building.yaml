meta:
  id: technical-writing-team-building
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Build a technical writing function from scratch at a scaling startup, including hiring, processes, tools, metrics, and integration with engineering culture"
  tags: [team-building, technical-writing-ops, leadership, expert]

state: {}

trigger: |
  You're hired as the first Director of Technical
  Writing at a Series C startup ($85M raised, 400
  employees, 180 engineers). The company has a
  developer platform used by 25,000 developers but
  zero dedicated technical writers. Documentation
  has been written ad-hoc by engineers, resulting in
  inconsistent quality, massive gaps, and a developer
  experience score of 3.2/10 for documentation.

  Your mandate: Build the technical writing function
  from zero to a high-performing team within 18
  months.

  Company context:
  - Products: API platform, CLI tool, SDKs (5
    languages), web dashboard
  - Current docs: 200 pages in GitBook, mostly
    outdated, no style consistency
  - Engineering culture: Move fast, ship weekly,
    docs are an afterthought
  - Developer community: 25,000 users, active
    Discord (8,000 members), monthly meetups
  - Competitors have excellent docs (they're cited
    as a reason developers choose competitors)
  - Budget: $1.5M year 1 (headcount + tools)

  Design the complete technical writing function:

  1. Team structure and hiring plan
     - Roles and job descriptions (what skills
       matter most for each role)
     - Hiring timeline (who to hire first and why)
     - Team structure at 6, 12, and 18 months
     - Embedded vs. centralized model decision
     - Interview process for technical writers
       (portfolio review, writing exercise, technical
       assessment)

  2. Documentation strategy
     - Content audit methodology for the 200 existing
       pages
     - Content gap analysis framework
     - Prioritization model (what to write/rewrite
       first)
     - Documentation types and their owners
     - Release documentation process (docs ship with
       features)

  3. Process and workflow design
     - Documentation development lifecycle
     - Engineer-writer collaboration model
     - Review process (technical review + editorial)
     - Publishing workflow (PR-based with preview)
     - Docs-as-code toolchain selection
     - Style guide creation approach

  4. Engineering culture integration
     - Getting engineers to contribute to docs
     - "Docs required" policy design and rollout
     - Documentation champion program
     - Reducing friction for engineer contributions
     - Handling resistance ("writing docs isn't my
       job")

  5. Community documentation
     - Community contribution guidelines
     - Tutorial submission process
     - Community-written content quality standards
     - Recognition and incentive program
     - Community-to-official doc pipeline

  6. Metrics, reporting, and executive communication
     - Documentation quality scorecard
     - Developer satisfaction tracking
     - Business impact metrics (support tickets,
       time-to-first-API-call, developer retention)
     - Monthly executive report template
     - 18-month success criteria and milestones

  Deliverable: Complete function-building plan with
  hiring strategy, process design, culture integration
  approach, and success metrics.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete technical writing function — all 6 areas are covered with operational depth; the hiring plan specifies roles, skills, and timeline; the documentation strategy addresses the existing 200-page audit and gap analysis; processes integrate with the engineering workflow; culture integration handles resistance practically; community documentation creates a contribution pipeline; metrics connect documentation to business outcomes."
    weight: 0.35
    description: "FunctionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates technical writing leadership expertise — the embedded vs. centralized decision is well-reasoned; the hiring sequence prioritizes correctly for maximum early impact; the 'docs ship with features' process is realistic for a fast-moving startup; the culture integration approach respects engineering autonomy while raising the documentation bar; the interview process would identify strong technical writers."
    weight: 0.35
    description: "LeadershipExpertise"
  - type: llm_judge
    criteria: "Response would transform the developer experience — the 18-month plan would move documentation from 3.2/10 to competitive quality; the function would scale with the company; executive reporting demonstrates documentation ROI; the overall approach would make documentation a competitive advantage rather than a weakness."
    weight: 0.30
    description: "TransformativeImpact"
