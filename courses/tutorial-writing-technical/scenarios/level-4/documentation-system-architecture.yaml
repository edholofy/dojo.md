meta:
  id: documentation-system-architecture
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design a complete documentation-as-code system architecture for a large engineering organization, including tooling, CI/CD, content management, and governance"
  tags: [docs-as-code, architecture, governance, expert]

state: {}

trigger: |
  You're the Director of Developer Experience at
  a company with 2,000 engineers across 40 teams.
  Documentation is scattered across Confluence,
  Google Docs, README files, Notion, and tribal
  knowledge. The CTO has given you a mandate to
  build a unified documentation system with a $1.2M
  annual budget.

  Current state assessment:
  - 12,000+ Confluence pages (60% outdated)
  - 800+ README files across 200 repos
  - 350 Google Docs "design documents"
  - 15 Notion workspaces (team-specific)
  - Average developer spends 45 min/day searching
    for documentation
  - New hire onboarding takes 6 weeks (target: 3)
  - 78% of developers report "documentation is a
    major pain point" in the last survey

  Design a complete documentation system:
  1. Documentation platform architecture
     - Docs-as-code toolchain (SSG, version control,
       CI/CD, preview deployments)
     - Content schema and metadata standards
     - Search infrastructure (full-text + semantic)
     - Multi-repo aggregation strategy
  2. Content governance framework
     - Ownership model (who owns what docs)
     - Review and approval workflows
     - Freshness policies (staleness detection,
       automated reminders, archival)
     - Quality metrics and scorecards
  3. Migration strategy
     - Phased migration plan (12 months)
     - Content audit and triage methodology
     - Automated migration tooling specifications
     - Risk mitigation for each source
  4. Content types and templates
     - ADR (Architecture Decision Record)
     - Runbook / playbook
     - API reference (auto-generated + manual)
     - How-to guide
     - Concept / explanation
     - Troubleshooting guide
     - Onboarding path
     - Each with: template, metadata schema, review
       criteria, staleness rules
  5. Developer workflow integration
     - IDE integration (doc previews, broken link
       detection)
     - PR-triggered doc updates
     - Automated API doc generation
     - Doc linting in CI
  6. Success metrics and measurement plan
     - Baseline measurements
     - Leading and lagging indicators
     - Dashboard specifications
     - 12-month targets with milestones

  Deliverable: Complete system architecture document
  with technical specifications, governance framework,
  migration plan, and measurement strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete documentation system architecture — covers all 6 areas with technical depth; the docs-as-code toolchain is specified with concrete tools and integrations; content governance addresses ownership, freshness, and quality systematically; the migration strategy handles all 4 source systems with risk mitigation; content types include actionable templates; developer workflow integration reduces friction; success metrics are measurable and time-bound."
    weight: 0.35
    description: "SystemArchitectureCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise documentation expertise — the architecture handles the scale (2,000 engineers, 40 teams); search infrastructure addresses both full-text and semantic needs; governance model balances centralization with team autonomy; migration plan is phased to manage risk; the solution addresses the root causes of the current problems (scattered docs, staleness, search difficulty); the $1.2M budget is used effectively."
    weight: 0.35
    description: "EnterpriseExpertise"
  - type: llm_judge
    criteria: "Response would measurably improve documentation outcomes — the system would reduce the 45 min/day search time; onboarding would accelerate toward the 3-week target; staleness detection would prevent the 60% outdated content problem; the overall architecture would survive the test of organizational reality (politics, adoption resistance, competing priorities)."
    weight: 0.30
    description: "MeasurableImpact"
