meta:
  id: expert-tutorial-shift
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Handle three expert-level documentation challenges simultaneously: a post-incident learning document, a platform migration guide for 500+ customers, and a developer certification program curriculum"
  tags: [shift-simulation, multi-document, expert]

state: {}

trigger: |
  You're the Chief Developer Advocate at a cloud
  platform company. Three critical documentation
  initiatives need your leadership this quarter.

  Document 1: Post-Incident Learning Document
  Your platform had a major 4-hour outage affecting
  15,000 customers. Write a public post-incident
  review that serves as both accountability and
  education.
  - Timeline: 14:23 UTC detection → 18:47 UTC
    resolution
  - Root cause: Cascading failure triggered by a
    configuration change to the load balancer that
    exceeded connection pool limits, causing database
    connection exhaustion across 3 availability zones
  - Contributing factors: Missing circuit breaker,
    insufficient connection pool monitoring, config
    change deployed without gradual rollout
  - Must include: Detailed technical timeline,
    architecture diagrams showing the failure path,
    what went wrong at each layer, 5 specific
    remediation items with timelines, honest
    assessment without blame
  - Tone: Transparent, technically detailed, shows
    the company learned and is improving
  - Audience: Affected customers (technical CTOs
    and engineers)

  Document 2: Platform Migration Guide
  Your platform is migrating from v2 API to v3 API
  (breaking changes). 500+ customers need to migrate
  within 12 months. Write the complete migration
  documentation:
  - Breaking changes catalog (15 specific changes
    with old → new patterns)
  - Automated migration tool documentation
  - Step-by-step migration guide (assessment →
    plan → execute → verify)
  - Rollback procedures
  - FAQ addressing common migration concerns
  - Timeline and support resources
  - Coexistence period documentation (running v2
    and v3 simultaneously)

  Document 3: Developer Certification Program
  Design and write the curriculum for "Certified
  CloudPlatform Developer" — a professional
  certification program:
  - 3 certification levels (Associate, Professional,
    Expert)
  - Exam blueprint for each level (domains, weights,
    question counts)
  - Study guide outline for each level
  - Sample questions (5 per level, with explanations)
  - Lab exercises specification (hands-on component)
  - Certification maintenance requirements
  - Program governance (question bank management,
    psychometric standards)

  Task: Write all three documents. The post-incident
  review must build trust, the migration guide must
  minimize customer churn, and the certification
  program must establish industry credibility.

assertions:
  - type: llm_judge
    criteria: "Response produces all three documents at expert quality — the post-incident review has a detailed technical timeline with architecture diagrams and honest remediation commitments; the migration guide covers all 15 breaking changes with old/new patterns and includes rollback procedures; the certification program has complete exam blueprints, sample questions, and lab exercise specifications for all 3 levels."
    weight: 0.35
    description: "MultiDocumentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expert-level technical writing across diverse document types — the post-incident review balances transparency with professionalism; the migration guide minimizes customer effort and anxiety; the certification program follows psychometric best practices; each document serves its distinct audience and purpose; the overall quality reflects Chief Developer Advocate caliber."
    weight: 0.35
    description: "ExpertCraftmanship"
  - type: llm_judge
    criteria: "Response would achieve business outcomes — the post-incident review would rebuild customer trust; the migration guide would achieve high migration rates with minimal churn; the certification program would establish industry credibility; together the three documents demonstrate the strategic documentation leadership expected at the executive level."
    weight: 0.30
    description: "BusinessOutcomes"
