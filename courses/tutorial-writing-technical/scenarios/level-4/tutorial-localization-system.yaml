meta:
  id: tutorial-localization-system
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design a technical documentation localization system for translating tutorials into 12 languages while maintaining code accuracy, cultural relevance, and synchronized updates"
  tags: [localization, i18n, translation, expert]

state: {}

trigger: |
  You're the Head of Global Developer Relations at
  a developer tools company expanding from English-
  only documentation to 12 languages. Your developer
  community is 55% non-English-speaking, and
  competitors (Stripe, Twilio) already offer
  localized docs. Revenue from non-English markets
  is growing 3x faster than English markets.

  Target languages: Japanese, Korean, Chinese
  (Simplified), Chinese (Traditional), Spanish,
  Portuguese (Brazilian), French, German, Russian,
  Hindi, Arabic, Turkish

  Current documentation:
  - 450 pages of tutorials and guides
  - 120 API reference pages (auto-generated from
    OpenAPI)
  - 85 code examples (JavaScript, Python, Ruby, Go)
  - 30 video transcripts
  - Documentation updates: ~40 pages/month
  - Platform: Docusaurus with MDX

  Challenges to address:
  - Code examples must NOT be translated (but
    comments should be)
  - API parameter names stay in English
  - Screenshots and diagrams need localization
  - Right-to-left (RTL) layout for Arabic
  - Character encoding for CJK languages
  - Cultural context in examples (currency, dates,
    names, addresses)
  - Keeping translations synchronized when English
    source changes
  - Quality assurance for technical accuracy in
    translation

  Design the complete localization system:

  1. Localization architecture
     - Content management and translation memory
       system
     - Source string extraction and management
     - Translation workflow (human, MT+human review,
       community)
     - File format and i18n framework for Docusaurus

  2. Technical content handling
     - Code block localization rules (what translates,
       what doesn't)
     - API reference localization strategy
     - Screenshot and diagram localization pipeline
     - Variable/placeholder system for code examples

  3. Cultural adaptation guidelines
     - Per-language style guides for technical content
     - Cultural context adaptation rules (examples,
       metaphors, humor)
     - Date, number, currency formatting by locale
     - Name and address examples by culture
     - RTL layout specifications

  4. Synchronization and maintenance
     - Change detection and translation queue system
     - Priority scoring for translation updates
     - Fallback strategy (show English when translation
       unavailable)
     - Version control for translations
     - Stale translation detection and flagging

  5. Quality assurance
     - Technical review process by language
     - Automated QA checks (formatting, links,
       placeholders, code blocks)
     - Community feedback integration
     - Translation quality metrics
     - Glossary management (technical terms)

  6. Budget and timeline
     - Cost model (per-word, per-language breakdown)
     - Phased rollout plan (which languages first)
     - Team structure (in-house vs. vendor vs.
       community)
     - 18-month roadmap with milestones

  Deliverable: Complete localization system design
  with architecture, cultural guidelines, QA process,
  and phased rollout plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete localization system — all 6 areas are covered; the architecture handles the technical complexity of localizing developer documentation; code block handling correctly separates translatable from non-translatable content; cultural adaptation goes beyond surface-level translation; synchronization keeps 12 language versions current; QA ensures technical accuracy; the budget and timeline are realistic."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates localization expertise for technical content — code examples are handled correctly (comments translated, code preserved); RTL layout for Arabic is addressed technically; CJK character considerations are handled; the translation workflow balances quality with speed; glossary management prevents inconsistent technical terminology; the cultural adaptation guidelines would prevent embarrassing mistakes."
    weight: 0.35
    description: "LocalizationExpertise"
  - type: llm_judge
    criteria: "Response is implementable and would grow the international developer community — the phased rollout prioritizes highest-impact languages; the cost model is realistic for 450+ pages across 12 languages; the synchronization system prevents stale translations; the overall system would make the company competitive with Stripe/Twilio's localized docs; the architecture scales as documentation grows."
    weight: 0.30
    description: "BusinessImpact"
