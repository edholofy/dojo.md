meta:
  id: ai-assisted-documentation
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design an AI-augmented documentation system that uses LLMs to assist with writing, maintaining, and personalizing technical documentation while maintaining accuracy and trust"
  tags: [ai-documentation, llm-integration, personalization, expert]

state: {}

trigger: |
  You're the VP of Developer Experience at a cloud
  platform company. The CEO wants to "use AI to
  revolutionize our developer documentation." You
  need to design a thoughtful, practical AI-augmented
  documentation system that genuinely improves the
  developer experience without sacrificing accuracy
  or trust.

  Current documentation:
  - 2,500 pages of docs (tutorials, references,
    guides)
  - 50,000 daily active documentation users
  - Average time on page: 3.2 minutes
  - Search satisfaction: 45% (users often don't
    find what they need)
  - Code examples cover 3 languages (should be 8)
  - No personalization (same experience for all
    skill levels)

  Design the complete AI-augmented documentation
  system:

  1. AI-powered documentation features
     - Conversational documentation assistant
       (architecture, RAG pipeline, guardrails)
     - Code example generation (translate examples
       to user's preferred language)
     - Personalized documentation paths (skill-
       level adaptation)
     - Intelligent search (semantic search +
       query understanding)
     - Automated code example validation
     - "Explain this" feature (simplify complex
       docs on demand)

  2. AI writing assistance for authors
     - Draft generation from specs/tickets
     - Style guide enforcement via AI review
     - Automatic screenshot/diagram generation
     - Code example generation with test validation
     - Translation assistance for localization
     - Staleness detection (flag docs that may be
       outdated based on code changes)

  3. Accuracy and trust framework
     - Hallucination prevention architecture
     - Source attribution and confidence scoring
     - Human review workflow for AI-generated content
     - Feedback loops (user corrections)
     - Accuracy metrics and monitoring
     - Clear labeling of AI-generated vs. human-
       written content
     - Versioned knowledge base management

  4. Personalization engine
     - User skill assessment (implicit + explicit)
     - Content adaptation strategies (beginner vs.
       expert views)
     - Language and framework preference handling
     - Learning path recommendations
     - "Show me the code" vs. "explain the concept"
       toggle
     - Privacy considerations and data handling

  5. Technical architecture
     - RAG pipeline design (embedding, retrieval,
       generation)
     - Knowledge base construction from docs +
       code + issues
     - Caching and performance (sub-2-second
       responses)
     - Cost management (LLM API costs at 50K
       daily users)
     - Evaluation framework for response quality
     - A/B testing infrastructure

  6. Rollout and risk management
     - Phased rollout plan (internal → beta → GA)
     - Risk assessment (accuracy, cost, user trust,
       legal)
     - Fallback strategies (graceful degradation)
     - Success metrics and kill switches
     - Team training for AI-augmented workflows
     - Competitive analysis (what others are doing)

  Deliverable: Complete AI-augmented documentation
  system design with technical architecture, accuracy
  framework, personalization engine, and rollout plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete AI-augmented documentation system — all 6 areas are covered with technical depth; the conversational assistant has a realistic RAG architecture; writing assistance tools are practical for documentation authors; the accuracy framework addresses hallucination risks seriously; personalization adapts to skill level and preferences; the technical architecture handles scale (50K daily users); the rollout plan manages risk appropriately."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI documentation expertise — the RAG pipeline design is technically sound; hallucination prevention is multi-layered; code example generation includes validation; the cost model is realistic for LLM APIs at scale; the accuracy framework maintains user trust; the personalization engine respects privacy; the overall design avoids AI hype and focuses on genuine developer experience improvement."
    weight: 0.35
    description: "AIExpertise"
  - type: llm_judge
    criteria: "Response would genuinely improve developer documentation — search satisfaction would improve from 45%; code examples would expand from 3 to 8 languages; personalization would serve beginners and experts differently; the AI features would reduce documentation maintenance burden; the overall system would be a competitive advantage; risks are managed with fallbacks and kill switches."
    weight: 0.30
    description: "GenuineImprovement"
