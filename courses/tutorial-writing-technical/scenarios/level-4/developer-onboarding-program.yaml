meta:
  id: developer-onboarding-program
  level: 4
  course: tutorial-writing-technical
  type: output
  description: "Design and write a complete developer onboarding documentation program for a complex microservices platform, from Day 1 to first production deploy"
  tags: [onboarding, developer-experience, program-design, expert]

state: {}

trigger: |
  You're the Developer Experience Lead at a
  fintech company with a complex microservices
  platform (85 services, 12 teams, 300 engineers).
  New hire onboarding currently takes 8 weeks to
  first meaningful contribution and 16 weeks to
  independent productivity. The VP of Engineering
  wants this cut to 4 weeks and 8 weeks respectively.

  Current onboarding problems:
  - No structured path — new hires get a Confluence
    link dump and a "buddy" who's too busy
  - Environment setup takes 3-5 days (Docker, K8s,
    20+ env vars, VPN, AWS access)
  - Architecture knowledge is tribal — no written
    overview exists
  - Each team has different conventions, tooling,
    and deployment processes
  - New hires don't know what they don't know

  Platform context:
  - Microservices in Go, TypeScript, Python
  - Kubernetes on AWS (EKS)
  - gRPC between services, REST for external APIs
  - PostgreSQL, Redis, Kafka, Elasticsearch
  - Datadog for observability
  - ArgoCD for deployments
  - GitHub for source code, Linear for project mgmt

  Design the complete onboarding program:

  1. Onboarding architecture
     - Learning path structure (phases, milestones,
       checkpoints)
     - Self-serve vs. guided components
     - Personalization by role (backend, frontend,
       platform, data)
     - Progress tracking and manager visibility

  2. Day 1 setup guide (complete document)
     - One-command dev environment setup script spec
     - Access provisioning checklist
     - First "hello world" deploy in < 2 hours
     - Verification steps for each component

  3. Architecture overview document (complete)
     - System architecture with service map
     - Data flow for key user journeys
     - Technology choices and rationale
     - Team ownership boundaries
     - How to find the right team/person

  4. "First Week" guided tutorial (complete)
     - Day-by-day structure
     - Hands-on exercises with the real codebase
     - First PR, first code review, first deploy
     - Key people to meet and what to ask them

  5. Self-serve knowledge base structure
     - Service catalog template
     - "How do I...?" FAQ organized by task
     - Debugging guides for common issues
     - Cross-team conventions document

  6. Measurement and iteration
     - Onboarding NPS survey design
     - Time-to-productivity metrics
     - Content effectiveness tracking
     - Quarterly review process

  Deliverable: The complete onboarding program with
  all written documents (setup guide, architecture
  overview, first week tutorial) plus the program
  design documents.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete developer onboarding program — all 6 sections are covered; the Day 1 setup guide, architecture overview, and first week tutorial are written as complete documents (not just outlines); the learning path has clear phases and milestones; personalization addresses the 4 role types; the program addresses all current problems (link dumps, slow setup, tribal knowledge, inconsistent conventions)."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep understanding of developer onboarding — the setup guide would actually work for a complex microservices environment; the architecture overview explains the system at the right level of abstraction; the first week tutorial builds real skills with the actual codebase; the knowledge base structure would prevent the 'don't know what I don't know' problem; the measurement approach would track real improvement."
    weight: 0.35
    description: "OnboardingExpertise"
  - type: llm_judge
    criteria: "Response would achieve the time-to-productivity targets — the program would cut onboarding from 8 weeks to 4 weeks for first contribution; the self-serve components reduce dependency on busy buddies; the one-command setup eliminates the 3-5 day environment problem; the overall program would scale as the company grows from 300 to 500+ engineers."
    weight: 0.30
    description: "ProductivityImpact"
