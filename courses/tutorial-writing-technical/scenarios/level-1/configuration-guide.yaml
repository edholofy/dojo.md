meta:
  id: configuration-guide
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a configuration guide for a development tool, explaining each option, defaults, and common configuration patterns for different use cases"
  tags: [configuration, development-tools, reference, beginner]

state: {}

trigger: |
  You're the maintainer of "Lintify" — an open-
  source code linter for TypeScript projects. Users
  keep filing issues saying "how do I configure
  this?" because the current docs only list the
  config options without explaining when to use
  them. You need to write a configuration guide.

  Tool details:
  - Name: Lintify
  - Config file: lintify.config.ts or .lintifyrc.json
  - 15 configuration options across 4 categories

  Categories and options:
  1. General:
     - strictMode (boolean, default: false) — enable
       all strict rules
     - ignore (string[], default: []) — file patterns
       to skip
     - extends (string) — inherit from preset
       ("recommended", "strict", "minimal")

  2. Style rules:
     - maxLineLength (number, default: 100) — max
       characters per line
     - indentStyle ("spaces" | "tabs", default:
       "spaces")
     - indentSize (number, default: 2) — spaces per
       indent level
     - quoteStyle ("single" | "double", default:
       "single")
     - semicolons (boolean, default: true) — require
       semicolons

  3. Code quality:
     - noUnusedVars (boolean, default: true) — flag
       unused variables
     - noImplicitAny (boolean, default: false) —
       require explicit types
     - maxComplexity (number, default: 10) —
       cyclomatic complexity limit
     - noConsoleLog (boolean, default: false) — flag
       console.log statements

  4. Performance:
     - parallel (boolean, default: true) — parallel
       file processing
     - cache (boolean, default: true) — cache results
     - maxWorkers (number, default: 4) — parallel
       workers count

  Guide requirements:
  - Explain each option with a brief description,
    the default value, and when you'd change it
  - Provide 3 complete config examples:
    1. "Quick start" (minimal config for new projects)
    2. "Team project" (opinionated config for
       collaborative work)
    3. "Open source library" (strict config for
       public packages)
  - Show how to override settings per-directory
  - Explain the extends presets and when to use each

  Task: Write the complete configuration guide with
  option explanations, the 3 config examples, and
  practical guidance for choosing the right
  settings.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete configuration guide — explains all 15 options across 4 categories; each option includes description, default value, type, and guidance on when to change it; the 3 config examples (quick start, team project, open source) are complete and realistic; per-directory overrides are explained; the extends presets are compared; the guide is well-organized with clear headings."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response provides practical guidance beyond listing options — explains the WHY behind each option (not just WHAT it does); the 3 config examples represent genuinely different use cases with different trade-offs; the guide helps users make informed decisions rather than just copy-pasting defaults; style rules are connected to team preferences and project context; the overall guide turns configuration from overwhelming to understandable."
    weight: 0.35
    description: "PracticalGuidance"
  - type: llm_judge
    criteria: "Response is well-formatted for a docs site — config examples use proper TypeScript/JSON syntax; options are presented in a scannable format (tables or consistent structure); the guide is navigable (users can find specific options quickly); the writing is concise and developer-appropriate; the overall guide would reduce 'how do I configure this?' issues significantly."
    weight: 0.30
    description: "FormattingAndUsability"
