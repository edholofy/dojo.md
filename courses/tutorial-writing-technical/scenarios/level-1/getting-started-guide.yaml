meta:
  id: getting-started-guide
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a getting-started guide for a JavaScript library, walking a beginner developer through installation, setup, and building their first working example"
  tags: [getting-started, javascript, beginner-tutorial, beginner]

state: {}

trigger: |
  You're a developer advocate at a startup that
  has built "FormEase" — an open-source JavaScript
  library for building multi-step forms with
  validation. The library has 2,000 GitHub stars
  but the #1 complaint in issues is "I can't figure
  out how to get started." You need to write a
  getting-started guide.

  Library details:
  - Name: FormEase
  - Install: npm install formease
  - Works with: React, Vue, vanilla JS
  - Key features: Multi-step forms, built-in
    validation, progress indicator, accessible
    by default
  - Current docs: API reference exists but no
    tutorial content

  Getting-started guide requirements:
  - Target audience: Junior to mid-level developers
    who know JavaScript and have used npm
  - Prerequisites: Node.js 18+, npm, basic HTML/
    JavaScript knowledge
  - Goal: Reader builds a working 3-step contact
    form (name/email → message → confirmation)
    in under 15 minutes
  - Format: Markdown for the docs site (Docusaurus)

  Guide structure:
  1. What is FormEase? (2-3 sentences, not a sales
     pitch)
  2. Prerequisites and installation
  3. Create your first form (minimal example)
  4. Add steps (extend to multi-step)
  5. Add validation (email format, required fields)
  6. Customize styling (basic CSS)
  7. Next steps (links to advanced guides)

  Constraints:
  - All code examples must be complete and runnable
    (no "..." or "// rest of your code here")
  - Use vanilla JavaScript (not React/Vue) for
    maximum accessibility
  - Include expected output descriptions after
    each code block
  - Keep it under 1,500 words

  Task: Write the complete getting-started guide
  following the structure above, with tested,
  runnable code examples and clear explanations.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete getting-started guide — includes all 7 sections; code examples are complete and runnable (not snippets with '...'); the progression from installation to working 3-step form is clear and logical; each step builds on the previous one; the guide achieves the goal (working multi-step form) within the stated scope; the final result is a functional contact form with name/email, message, and confirmation steps."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates good technical writing — explanations are clear and concise (not over-explaining obvious things or under-explaining complex ones); code examples have expected output descriptions; prerequisites are stated upfront; the tone is helpful without being condescending; technical terms are used correctly; the guide is under 1,500 words; the writing would be appropriate for a professional docs site."
    weight: 0.35
    description: "WritingQuality"
  - type: llm_judge
    criteria: "Response is developer-friendly — uses vanilla JavaScript (not React/Vue) as specified; installation instructions are copy-pasteable; code examples follow modern JavaScript conventions; the guide doesn't assume knowledge beyond the stated prerequisites; the 'Next steps' section provides clear pathways for continued learning; the overall guide would resolve the 'I can't figure out how to get started' complaint."
    weight: 0.30
    description: "DeveloperExperience"
