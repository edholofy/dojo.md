meta:
  id: api-quickstart
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write an API quickstart tutorial that walks developers through authentication, making their first API call, and handling the response"
  tags: [api, quickstart, rest-api, beginner]

state: {}

trigger: |
  You're a technical writer at a weather data
  company. Your REST API provides weather
  forecasts, and you need to write a quickstart
  tutorial for developers integrating the API for
  the first time. The current docs jump straight
  to the API reference without any tutorial content.

  API details:
  - Base URL: https://api.weathernow.io/v2
  - Authentication: API key in header
    (X-API-Key: YOUR_API_KEY)
  - Free tier: 1,000 requests/day
  - Key endpoints:
    - GET /current?location={city} — current weather
    - GET /forecast?location={city}&days={1-7} —
      forecast
    - GET /alerts?location={city} — severe weather
      alerts

  Example response (GET /current?location=Seattle):
  {
    "location": "Seattle, WA",
    "temperature": { "fahrenheit": 52, "celsius": 11 },
    "condition": "Partly Cloudy",
    "humidity": 78,
    "wind": { "speed_mph": 8, "direction": "NW" },
    "updated_at": "2026-02-27T14:30:00Z"
  }

  Quickstart requirements:
  - Show 3 languages: cURL, Python, JavaScript
    (Node.js)
  - Steps: Sign up for API key → Make first request
    → Parse the response → Handle errors →
    Build something useful (weather widget data)
  - Include rate limit headers explanation
  - Include common error responses (401 invalid
    key, 429 rate limited, 404 location not found)
  - Keep it practical — end with a useful mini-
    project, not just "it works!"

  Task: Write the complete API quickstart tutorial
  with code examples in all 3 languages, error
  handling guidance, and a practical mini-project
  at the end.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete API quickstart — covers sign-up, first request, response parsing, error handling, and a practical mini-project; code examples are provided in all 3 languages (cURL, Python, JavaScript); the progression is logical (simple request → understanding response → handling errors → building something); the tutorial uses realistic API responses; the mini-project is practical and achievable."
    weight: 0.35
    description: "QuickstartCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates good API documentation practices — authentication is explained clearly; code examples are complete and runnable; error responses (401, 429, 404) are documented with example responses and solutions; rate limiting is explained; the response format is well-documented; code examples follow idiomatic conventions for each language (requests library for Python, fetch for JavaScript); headers and parameters are clearly shown."
    weight: 0.35
    description: "APIDocsPractices"
  - type: llm_judge
    criteria: "Response is developer-friendly and practical — code examples are copy-pasteable with clear placeholders for the API key; the tutorial doesn't over-explain obvious concepts; the mini-project demonstrates real-world value; the languages are handled with equal quality (not just cURL + afterthought translations); the quickstart would help a developer integrate the API within 30 minutes; the overall tutorial bridges the gap between 'no docs' and 'API reference.'"
    weight: 0.30
    description: "DeveloperExperience"
