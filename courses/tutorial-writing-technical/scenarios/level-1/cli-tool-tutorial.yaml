meta:
  id: cli-tool-tutorial
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a tutorial for a command-line tool, explaining installation, basic commands, common workflows, and configuration options"
  tags: [cli, command-line, tool-tutorial, beginner]

state: {}

trigger: |
  You're a developer who created "imgopt" — an
  open-source CLI tool for optimizing images for
  the web. It compresses, resizes, and converts
  images to modern formats (WebP, AVIF). The tool
  has 500 GitHub stars but most issues are "how
  do I use this?" You need to write a proper
  tutorial.

  Tool details:
  - Name: imgopt
  - Install: npm install -g imgopt
  - Language: Node.js
  - Key commands:
    - imgopt compress <file|dir> — compress images
    - imgopt resize <file> --width 800 --height 600
    - imgopt convert <file> --format webp
    - imgopt batch <dir> --config imgopt.config.json
    - imgopt info <file> — show image metadata
  - Config file: imgopt.config.json for batch
    processing presets
  - Supported formats: JPEG, PNG, GIF, WebP, AVIF,
    SVG

  Tutorial requirements:
  - Audience: Web developers who want to optimize
    images for their websites
  - Prerequisites: Node.js 18+, npm, terminal
    basics
  - Structure:
    1. Installation and verification
    2. Your first optimization (compress a single
       image)
    3. Resizing images for responsive design
    4. Converting to modern formats (WebP/AVIF)
    5. Batch processing a directory
    6. Configuration file for project presets
    7. Integrating into a build pipeline (npm
       script)
  - Each command should show: the command, example
    output, and explanation of what happened
  - Include file size before/after to demonstrate
    value

  Task: Write the complete CLI tutorial with all
  7 sections, realistic command examples with
  output, and practical workflow demonstrations.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete CLI tutorial — covers all 7 sections from installation through build pipeline integration; each command is shown with realistic example output; explanations describe what each command does and why; the tutorial builds from simple (single file) to complex (batch + config + build integration); the flow represents a realistic developer workflow; the tutorial demonstrates real value (showing file size savings)."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates good CLI documentation practices — commands are clearly formatted and copy-pasteable; flags and options are explained; example output is realistic (includes file paths, sizes, percentages); the config file format is fully documented; error scenarios are mentioned; the npm script integration is practical; the tutorial teaches the tool AND the underlying concepts (image optimization for web)."
    weight: 0.35
    description: "CLIDocsPractices"
  - type: llm_judge
    criteria: "Response is practical and developer-centric — the tutorial solves a real problem (optimizing images for web performance); file size before/after comparisons demonstrate tangible value; the build pipeline integration makes the tool part of a real workflow; the configuration file enables team-wide consistency; the tutorial would convert a 'how do I use this?' user into a productive user; the writing is concise and respects the developer's time."
    weight: 0.30
    description: "PracticalValue"
