meta:
  id: database-setup-tutorial
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a tutorial for setting up a database, creating tables, inserting data, and writing basic queries for a web application"
  tags: [database, sql, setup-tutorial, beginner]

state: {}

trigger: |
  You're writing a tutorial for your company's
  developer blog called "Set Up PostgreSQL for
  Your First Web App." The target readers are
  junior developers who have completed a bootcamp
  and know JavaScript but have never worked with
  a database directly (they've only used ORMs).

  Tutorial parameters:
  - Database: PostgreSQL 16
  - Context: Setting up the database for a simple
    task management app (like a basic Todoist)
  - Audience: Bootcamp graduates who know JS/Node
    but not SQL
  - Format: Blog post with code blocks

  Data model (simple):
  - users: id, email, name, created_at
  - projects: id, name, user_id (FK), created_at
  - tasks: id, title, description, status (todo/
    in_progress/done), priority (low/medium/high),
    project_id (FK), assigned_to (FK to users),
    due_date, created_at

  Tutorial structure:
  1. Why learn SQL? (brief motivation — even if
     you use an ORM, understanding SQL matters)
  2. Install PostgreSQL (macOS with Homebrew, or
     Docker alternative)
  3. Connect to PostgreSQL (psql basics)
  4. Create your database and tables
  5. Insert sample data
  6. Basic queries (SELECT, WHERE, ORDER BY, LIMIT)
  7. Joins (get tasks with project and user names)
  8. Connecting from Node.js (pg library, basic
     query)
  9. Next steps

  Requirements:
  - All SQL is complete and runnable
  - Explain SQL syntax inline (not just "run this")
  - Show query results as formatted tables
  - Include common mistakes (forgetting semicolons,
    wrong data types, FK constraint violations)
  - Keep explanations brief — this is a tutorial,
    not a textbook

  Task: Write the complete database setup tutorial
  with all 9 sections, runnable SQL examples,
  formatted query results, and clear explanations.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete database tutorial — covers all 9 sections; SQL examples are complete and runnable (CREATE TABLE with proper data types, INSERT with realistic data, SELECT with various clauses); the data model matches the specification (users, projects, tasks with foreign keys); query results are shown as formatted tables; the Node.js connection example uses the pg library correctly; the tutorial achieves the goal of setting up a working database."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response teaches SQL effectively to beginners — explains SQL syntax inline without being a textbook; the progression from simple (SELECT) to complex (JOINs) is gradual; common mistakes are highlighted at relevant points; the motivation section explains why SQL knowledge matters even with ORMs; the tutorial connects database concepts to the web app context; the explanations are appropriate for bootcamp graduates who know JavaScript."
    weight: 0.35
    description: "TeachingEffectiveness"
  - type: llm_judge
    criteria: "Response is practical and well-formatted — installation instructions cover both Homebrew and Docker; psql commands are clearly shown; the sample data is realistic and interesting (not just 'test1', 'test2'); the blog post format is clean with clear headings and code blocks; the tutorial respects the reader's time; the overall guide would help a JavaScript developer become comfortable with PostgreSQL basics."
    weight: 0.30
    description: "PracticalFormatting"
