meta:
  id: troubleshooting-guide
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a troubleshooting guide for common development environment issues, organized by symptom with diagnostic steps and solutions"
  tags: [troubleshooting, debugging, developer-tools, beginner]

state: {}

trigger: |
  You're a DevRel engineer at a company that makes
  "DevBox" — a containerized development
  environment tool (similar to Docker Dev
  Environments or GitHub Codespaces). Support
  tickets show that 60% of issues fall into the
  same 8 categories. You need to write a
  troubleshooting guide to reduce support volume.

  Top 8 issues (from support data):
  1. "DevBox won't start" — container fails to
     initialize (30% of tickets)
  2. "Port forwarding not working" — app runs but
     can't access it in browser (15%)
  3. "File changes aren't reflected" — hot reload
     not working, file sync issues (12%)
  4. "Out of disk space" — container storage full
     (10%)
  5. "Extension not loading" — VS Code extensions
     fail in DevBox (8%)
  6. "Git authentication failing" — can't push/pull
     from inside container (7%)
  7. "Environment variables missing" — app can't
     find .env values (5%)
  8. "Slow performance" — DevBox running sluggishly
     (3%)

  Guide requirements:
  - Organize by symptom (what the user sees/
    experiences)
  - For each issue include:
    - Symptom description (what the user observes)
    - Likely causes (ranked by probability)
    - Diagnostic steps (commands to run to identify
      the specific cause)
    - Solution for each cause
    - Prevention tips
  - Include a diagnostic flowchart description for
    the top issue ("DevBox won't start")
  - Format: Markdown, scannable, use collapsible
    sections for detailed solutions

  Task: Write the complete troubleshooting guide
  covering all 8 issues with diagnostic steps,
  solutions, and prevention tips.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete troubleshooting guide — covers all 8 issues; each issue includes symptom description, likely causes, diagnostic steps, solutions, and prevention tips; the diagnostic steps use specific commands (not 'check your settings'); solutions are actionable and specific; the guide is organized by symptom (what the user experiences, not what's technically wrong); the flowchart for 'DevBox won't start' is included."
    weight: 0.35
    description: "GuideCompleteness"
  - type: llm_judge
    criteria: "Response follows troubleshooting best practices — causes are ranked by probability (most likely first); diagnostic steps narrow down the cause before suggesting solutions; the guide assumes the user is frustrated and provides quick wins early; solutions distinguish between common and edge-case causes; prevention tips help users avoid the problem in the future; the overall approach would reduce the 60% of repetitive support tickets."
    weight: 0.35
    description: "TroubleshootingPractices"
  - type: llm_judge
    criteria: "Response is scannable and user-friendly — issues are easy to find (clear headings matching user symptoms); users can jump to their specific problem without reading the entire guide; commands are copy-pasteable; the format uses collapsible sections or clear structure for detailed solutions; the tone is empathetic (not blaming the user); the guide works as both a self-service resource and a support team reference."
    weight: 0.30
    description: "Scannability"
