meta:
  id: concept-explainer
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a conceptual tutorial explaining a technical concept with analogies, diagrams (described), and progressive examples that build understanding"
  tags: [conceptual, explanation, learning, beginner]

state: {}

trigger: |
  You're a senior developer writing for your
  company's engineering blog. The topic: "How
  DNS Works: A Developer's Guide." New developers
  on your team keep asking how DNS resolution
  works, and you want a reference article that
  explains it clearly without dumbing it down.

  Article requirements:
  - Audience: Junior-to-mid developers who use DNS
    daily but don't understand how it works under
    the hood
  - Tone: Conversational but technically accurate
  - Length: ~2,000 words

  Structure:
  1. The problem DNS solves (why we need it)
  2. An analogy that makes DNS click (phone book?
     library catalog? Something fresh)
  3. The DNS resolution process step-by-step:
     - Browser cache → OS cache → Resolver →
       Root nameserver → TLD nameserver →
       Authoritative nameserver
  4. DNS record types explained (A, AAAA, CNAME,
     MX, TXT, NS) with practical examples
  5. How TTL works and why caching matters
  6. Common DNS issues developers encounter:
     - "It works on my machine" (DNS cache)
     - Propagation delays after changing records
     - CNAME at apex domain limitation
  7. Practical section: DNS commands every developer
     should know (dig, nslookup, host)
  8. Diagram descriptions for 2 key visuals:
     - DNS resolution flow diagram
     - DNS record hierarchy diagram

  Requirements:
  - Use a real domain example (example.com per
    RFC 2606) throughout
  - Include terminal commands with realistic output
  - Explain each DNS record type with a real-world
    use case
  - The article should make someone say "oh, THAT'S
    how it works"

  Task: Write the complete conceptual tutorial
  explaining DNS for developers with all 8 sections,
  a fresh analogy, practical commands, and diagram
  descriptions.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete conceptual tutorial — covers all 8 sections; the DNS resolution process is technically accurate and clearly explained step-by-step; all specified DNS record types are covered with practical use cases; TTL and caching are explained; common developer issues are addressed; terminal commands (dig, nslookup) show realistic output; diagram descriptions are detailed enough for a designer to create visuals."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response explains complex concepts clearly — the analogy is fresh and illuminating (not just 'DNS is a phone book'); the step-by-step resolution process builds understanding progressively; technical accuracy is maintained without drowning in RFC details; the tone is conversational but professional; the article creates genuine 'aha moments'; the writing respects the reader's intelligence while filling knowledge gaps."
    weight: 0.35
    description: "ExplanationQuality"
  - type: llm_judge
    criteria: "Response is practical and developer-centric — DNS commands are shown with real output; common issues (cache, propagation, CNAME apex) are connected to scenarios developers actually encounter; the article bridges theory and practice; DNS record examples use realistic scenarios (setting up email, pointing to CDN); the overall article would be a go-to reference that developers bookmark and share."
    weight: 0.30
    description: "PracticalValue"
