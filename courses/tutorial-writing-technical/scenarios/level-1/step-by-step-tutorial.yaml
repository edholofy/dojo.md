meta:
  id: step-by-step-tutorial
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write a step-by-step tutorial for deploying a static website to a cloud platform, with clear instructions, screenshots descriptions, and troubleshooting tips"
  tags: [step-by-step, deployment, cloud, beginner]

state: {}

trigger: |
  You're a technical writer at a cloud hosting
  company. You need to write a tutorial called
  "Deploy Your First Website to CloudHost in 10
  Minutes." This is the most-visited page in your
  docs and the current version has a 45% bounce
  rate — users give up before finishing.

  Tutorial context:
  - Platform: CloudHost (a simplified cloud hosting
    platform similar to Netlify/Vercel)
  - What users deploy: A static HTML/CSS/JS website
  - Users: Non-expert developers, bootcamp graduates,
    hobbyists
  - Current problem: Steps are vague ("configure
    your settings"), no screenshots described, no
    troubleshooting for common errors

  Tutorial requirements:
  - Start from: User has a local folder with
    index.html, style.css, and script.js
  - End with: Website live at username.cloudhost.io
  - Steps: Create account → Install CLI → Login
    via CLI → Initialize project → Deploy → Verify
    live site → Set up custom domain (optional)
  - Each step must include:
    - What to do (specific command or UI action)
    - What you should see (expected output or
      screenshot description)
    - What to do if it fails (common error +
      solution)
  - Format: Markdown with numbered steps

  Common errors to address:
  - "Command not found" (CLI not installed correctly)
  - "Authentication failed" (wrong credentials or
    expired token)
  - "Build failed: no index.html found" (wrong
    directory)
  - "Deploy succeeded but site shows blank page"
    (path issues)

  Task: Write the complete step-by-step deployment
  tutorial with clear instructions, expected output
  descriptions, and troubleshooting tips for each
  common error.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete step-by-step tutorial — covers all steps from account creation through deployment and verification; each step is specific (exact commands, exact UI actions — not vague instructions); expected output is described after each command; the tutorial achieves the goal (live website) within the stated scope; the optional custom domain step is included; the flow is logical and sequential."
    weight: 0.35
    description: "TutorialCompleteness"
  - type: llm_judge
    criteria: "Response includes effective troubleshooting — addresses all 4 common errors (command not found, auth failed, no index.html, blank page); troubleshooting tips are placed contextually (near the step where the error would occur, not in a separate section); solutions are specific (not just 'check your configuration'); the troubleshooting would reduce the 45% bounce rate; the error messages and solutions feel realistic."
    weight: 0.35
    description: "TroubleshootingQuality"
  - type: llm_judge
    criteria: "Response is accessible to non-expert developers — language avoids unnecessary jargon; prerequisites are clear; commands are copy-pasteable; the tutorial doesn't assume knowledge beyond basic HTML and command line; the tone is encouraging; the '10 minutes' promise is realistic for the scope; the overall tutorial would successfully guide a bootcamp graduate through their first deployment."
    weight: 0.30
    description: "Accessibility"
