meta:
  id: beginner-tutorial-shift
  level: 1
  course: tutorial-writing-technical
  type: output
  description: "Write three different technical tutorials simultaneously — a getting-started guide, a troubleshooting FAQ, and a quick reference card — for the same developer tool"
  tags: [multi-format, documentation-suite, shift-simulation, beginner]

state: {}

trigger: |
  You're a solo developer advocate at a startup
  that makes "TaskQueue" — an open-source job
  queue library for Node.js (similar to Bull or
  BullMQ). The library just hit 1.0 and you need
  to create three pieces of documentation before
  the launch announcement.

  Library details:
  - Name: TaskQueue
  - Install: npm install taskqueue
  - Requires: Node.js 20+, Redis 7+
  - Key features: Delayed jobs, retries with
    backoff, priority queues, rate limiting,
    job progress tracking, dashboard UI
  - Current docs: Only a README with basic usage

  Document 1 — Getting Started Guide:
  Write a getting-started guide that takes a
  developer from npm install to processing their
  first job in under 10 minutes. Cover: installation,
  Redis setup, creating a queue, adding a job,
  processing a job, and checking job status. Use
  a practical example (sending welcome emails).

  Document 2 — Troubleshooting FAQ:
  Write a troubleshooting FAQ covering the top 10
  questions from beta users:
  1. "Jobs are stuck in 'waiting' status"
  2. "Redis connection refused"
  3. "Jobs run more than once (duplicate processing)"
  4. "Memory keeps growing"
  5. "Jobs fail silently (no error logged)"
  6. "How do I handle job retries?"
  7. "Dashboard shows no data"
  8. "Jobs process in wrong order"
  9. "Can I use TaskQueue without Redis?"
  10. "How do I migrate from Bull to TaskQueue?"

  Document 3 — Quick Reference Card:
  Write a one-page quick reference (cheat sheet)
  covering: queue creation options, job options
  (delay, priority, retry, timeout), worker
  options (concurrency, rate limit), job lifecycle
  states, key events, and common patterns (all
  in compact format for quick scanning).

  Task: Create all three documents, each in the
  appropriate format for its purpose.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct documentation pieces — the getting-started guide follows a clear tutorial format with progressive steps; the troubleshooting FAQ is organized by symptom with practical solutions; the quick reference card is compact and scannable; each document serves its specific purpose (learn, debug, reference); the three documents complement each other without excessive overlap."
    weight: 0.35
    description: "ThreeDocuments"
  - type: llm_judge
    criteria: "Response demonstrates consistent technical accuracy across documents — the library API is consistent across all three documents; code examples in the getting-started guide match the patterns in the quick reference; troubleshooting solutions reference real library features; the documentation suite feels like it's for the same product; all three documents would be useful for developers at different stages of using TaskQueue."
    weight: 0.35
    description: "TechnicalConsistency"
  - type: llm_judge
    criteria: "Response formats each document appropriately — the getting-started guide is tutorial-style with numbered steps and code blocks; the FAQ is scannable with clear question-answer format; the quick reference is compact and information-dense (tables, short syntax examples); the three formats serve different developer needs (learning, problem-solving, quick lookup); the overall documentation suite would support a successful 1.0 launch."
    weight: 0.30
    description: "FormatAppropriateness"
