meta:
  id: multi-office-standardization
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Standardize buyer inquiry response across 12 offices — brand consistency while allowing local market adaptation"
  tags: [multi-office, standardization, brand-consistency, advanced]

state: {}

trigger: |
  You're the Chief Marketing Officer for a regional
  brokerage with 12 offices across 3 states. A brand
  audit revealed massive inconsistency:

  Findings:
  - Response times range from 12 minutes (best office)
    to 18 hours (worst office)
  - 12 different email signatures in use
  - No consistent greeting or closing language
  - 4 offices have auto-responders, 8 don't
  - Social media responses vary from professional to
    inappropriate
  - 3 offices scored "fail" on Fair Housing response
    audits
  - Spanish-speaking coverage exists in only 2 of
    12 offices despite 15%+ Hispanic population in
    6 office areas

  Design a standardization initiative:

  1. Brand response standards (the "non-negotiables"):
     - Response time requirements
     - Brand voice guidelines
     - Visual identity standards
     - Fair Housing compliance minimums
     - Language coverage requirements

  2. Local adaptation framework (the "customizables"):
     - Market-specific content guidelines
     - Local team size considerations
     - Regional legal requirement differences
     - Cultural and demographic adaptation

  3. Implementation plan:
     - Rollout timeline (12-week plan)
     - Office champion program
     - Technology standardization
     - Training and certification

  4. Monitoring and accountability:
     - Monthly scorecards by office
     - Mystery shopper program
     - Compliance reporting
     - Recognition and consequences

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standardization initiative — non-negotiable brand standards; local adaptation framework; 12-week implementation plan; monitoring with scorecards, mystery shoppers, and compliance reporting."
    weight: 0.35
    description: "StandardizationCompleteness"
  - type: llm_judge
    criteria: "Response balances consistency with flexibility — brand non-negotiables ensure quality and compliance; local adaptation allows market-specific customization; the framework doesn't impose a one-size-fits-all approach on diverse markets."
    weight: 0.35
    description: "ConsistencyFlexibilityBalance"
  - type: llm_judge
    criteria: "The initiative would fix the identified problems — response time gaps would narrow; Fair Housing failures would be corrected; Spanish coverage would expand; brand presentation would be consistent across all 12 offices."
    weight: 0.30
    description: "ProblemResolutionOutcome"
