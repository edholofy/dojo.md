meta:
  id: inquiry-compliance-audit
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Conduct a compliance audit of buyer inquiry responses — Fair Housing, TCPA, CAN-SPAM, and state-specific regulations"
  tags: [compliance-audit, fair-housing, tcpa, advanced]

state: {}

trigger: |
  You're a compliance officer conducting a quarterly
  audit of your brokerage's buyer inquiry responses.
  You've sampled 200 responses and found these issues:

  Fair Housing violations found:
  - 12 responses described neighborhood demographics
  - 3 responses steered buyers away from areas
  - 7 responses used coded language ("family-friendly
    area," "up-and-coming neighborhood," "traditional
    community")
  - 2 responses treated same-race testers differently
    than different-race testers

  TCPA violations found:
  - 18 text messages sent without prior consent
  - 8 auto-responses sent to numbers on Do Not Call
  - Marketing texts missing opt-out language
  - No record of consent for 35% of text recipients

  CAN-SPAM violations found:
  - 14 emails missing physical address
  - 22 emails missing unsubscribe mechanism
  - 6 emails with deceptive subject lines
  - Opt-out requests not honored within 10 days

  State-specific issues:
  - 5 responses in State A lacked required agency
    disclosure language
  - 3 responses in State B didn't include required
    property condition disclaimers

  Write the audit report:
  1. Executive summary with risk assessment
  2. Detailed findings by violation category
  3. Severity ratings and potential penalties
  4. Corrective action plan with timelines
  5. Updated policies and templates to prevent
     recurrence
  6. Training recommendations

assertions:
  - type: llm_judge
    criteria: "Response creates a complete audit report — executive summary with risk assessment; detailed findings for Fair Housing, TCPA, CAN-SPAM, and state violations; severity ratings with potential penalties; corrective actions; updated policies; training plan."
    weight: 0.35
    description: "AuditReportCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance expertise — Fair Housing violations are correctly classified by severity; TCPA consent requirements are accurately described; CAN-SPAM penalties are realistic; state-specific issues acknowledge jurisdictional differences."
    weight: 0.35
    description: "ComplianceExpertise"
  - type: llm_judge
    criteria: "The corrective action plan would resolve the violations — Fair Housing training addresses specific coded language; TCPA consent processes are implemented; CAN-SPAM templates are updated; the brokerage's legal exposure is significantly reduced."
    weight: 0.30
    description: "CorrectiveActionEffectiveness"
