meta:
  id: advanced-inquiry-shift
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Shift simulation — handle three complex inquiry scenarios requiring cross-functional expertise in legal, technical, and human dimensions"
  tags: [shift-simulation, cross-functional, advanced]

state: {}

trigger: |
  Three complex situations land on your desk
  simultaneously:

  === SITUATION 1: The Viral Negative Review ===
  A buyer posted a viral TikTok (2.3M views) showing
  their inquiry exchange with one of your agents. The
  agent's response was dismissive ("that budget won't
  get you anything good in this market"). Comments
  are calling your brokerage elitist. Other buyers
  are DMing asking "will you treat me this way too?"
  Design: Crisis response — public statement, DM
  response template for concerned buyers, internal
  investigation, and the dismissed buyer's personal
  response.

  === SITUATION 2: The Data Breach ===
  Your CRM provider reports a breach. Buyer inquiry
  data (names, emails, phone numbers, pre-approval
  amounts, and property interests) for 4,200 leads
  may have been compromised. You must notify affected
  buyers and maintain trust.
  Design: Breach notification response — buyer
  communication, regulatory notifications, FAQ, and
  trust restoration plan.

  === SITUATION 3: The AI Misfire ===
  Your AI chatbot responded to a buyer inquiry in
  Spanish with "This property is in a neighborhood
  where many Hispanic families live — you'd fit right
  in!" This is a clear Fair Housing steering violation
  generated by AI. The buyer screenshot it and
  filed a complaint.
  Design: Immediate response to the buyer, AI system
  remediation, regulatory response, and prevention
  framework.

  Create complete response plans for all three
  situations.

assertions:
  - type: llm_judge
    criteria: "Response creates complete response plans for all three crises — viral review crisis with public statement and DM templates; data breach notification with regulatory compliance; AI Fair Housing violation with immediate remediation and prevention."
    weight: 0.35
    description: "TripleCrisisCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates crisis management sophistication — the viral review response is authentic not corporate; the breach notification meets legal requirements; the AI violation response takes full responsibility and proposes systemic fixes."
    weight: 0.35
    description: "CrisisSophistication"
  - type: llm_judge
    criteria: "All three responses would restore and maintain trust — the dismissed buyer feels heard; breached leads feel protected; the Fair Housing complainant sees genuine accountability; the brokerage's reputation recovers."
    weight: 0.30
    description: "TrustRestorationOutcome"
