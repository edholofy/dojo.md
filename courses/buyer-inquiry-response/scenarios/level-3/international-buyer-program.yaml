meta:
  id: international-buyer-program
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Build an international buyer inquiry program — handle inquiries from buyers in 8 countries with cultural sensitivity, legal awareness, and language support"
  tags: [international-buyers, cross-cultural, global-program, advanced]

state: {}

trigger: |
  You're the Director of International Sales for a
  luxury brokerage in Miami. 40% of your inquiries
  come from international buyers. You need to build
  a comprehensive international buyer inquiry response
  program.

  Top buyer markets (by inquiry volume):
  1. Brazil (Portuguese) — Investment + vacation homes
  2. Colombia (Spanish) — Relocation + investment
  3. Canada (English/French) — Snowbird properties
  4. UK (English) — Relocation + investment
  5. China (Mandarin) — Investment + education
  6. Argentina (Spanish) — Capital preservation
  7. Israel (Hebrew) — Investment + relocation
  8. Venezuela (Spanish) — Relocation + asylum cases

  Design the program:

  1. Cultural communication guides for top 4 markets:
     - Communication style preferences
     - Decision-making patterns
     - Relationship-building expectations
     - Common sensitivities or taboos

  2. Inquiry response templates adapted for
     international buyers:
     - Initial response (addressing visa, financing,
       tax, and legal questions proactively)
     - EB-5 and investment visa information
     - Foreign national mortgage guidance
     - FIRPTA tax implications
     - Wire transfer and currency considerations

  3. Operational infrastructure:
     - Language coverage plan
     - Time zone response schedule
     - International showing coordination
     - Cross-border document requirements

  4. Compliance framework:
     - OFAC screening requirements
     - Anti-money laundering considerations
     - Foreign bank account reporting
     - Fair Housing across cultural contexts

assertions:
  - type: llm_judge
    criteria: "Response creates a complete international buyer program — cultural guides for top 4 markets; inquiry templates addressing visa/financing/tax; operational infrastructure for language and time zones; compliance framework for OFAC/AML/FIRPTA."
    weight: 0.35
    description: "InternationalProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates international real estate expertise — cultural guides show genuine understanding of communication differences; financing guidance addresses foreign national mortgage complexities; compliance covers OFAC, AML, and FIRPTA accurately."
    weight: 0.35
    description: "InternationalExpertise"
  - type: llm_judge
    criteria: "The program would serve international buyers effectively — cultural sensitivity would build trust; proactive legal/tax information would reduce friction; language coverage would ensure no buyer is excluded; compliance would protect the brokerage."
    weight: 0.30
    description: "InternationalServiceQuality"
