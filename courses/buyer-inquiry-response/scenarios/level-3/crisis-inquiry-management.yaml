meta:
  id: crisis-inquiry-management
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Manage buyer inquiries during a market crisis — handle surge demand, address panic, and maintain service quality during unprecedented events"
  tags: [crisis-management, market-disruption, surge-capacity, advanced]

state: {}

trigger: |
  Three simultaneous crises are creating
  unprecedented buyer inquiry challenges:

  Crisis 1: Interest Rate Shock
  Mortgage rates dropped from 7.2% to 5.1% overnight
  due to emergency Fed action. Your brokerage received
  850 inquiries in 24 hours (normal: 40/day). Most
  are asking "Should I buy NOW before rates go back
  up?" Agents are overwhelmed.

  Crisis 2: Natural Disaster Displacement
  A major flood displaced 3,000 families in your
  market. You're receiving urgent inquiries from
  displaced families needing immediate housing, plus
  investor inquiries about damaged properties. Fair
  Housing and price gouging concerns are real.

  Crisis 3: Major Employer Relocation
  A tech company announced 2,500 new jobs in your
  area, starting in 6 months. Relocation inquiries
  are flooding in from out-of-state. Current
  inventory is tight (1.2 months supply).

  Design crisis response protocols:
  1. Surge capacity plan for the rate drop (triage,
     auto-responses, temporary staffing)
  2. Displaced family response protocol (empathy,
     resources, ethical considerations)
  3. Relocation inquiry management system (out-of-state
     buyers, market education, inventory strategy)
  4. Agent messaging guides for each crisis
  5. Ethical guidelines for crisis situations

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive crisis protocols for all three situations — surge capacity plan for rate drop; empathetic displaced family protocol; relocation management system; agent messaging guides; ethical guidelines."
    weight: 0.35
    description: "CrisisProtocolCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates crisis management expertise — surge triage is practical; displaced family protocol prioritizes empathy and fair treatment; relocation management sets realistic expectations about tight inventory; ethical guidelines prevent exploitation."
    weight: 0.35
    description: "CrisisManagementExpertise"
  - type: llm_judge
    criteria: "Protocols would maintain service quality and ethics during crises — no families are exploited; investor inquiries about damaged properties are handled ethically; price gouging is prevented; agents have clear scripts for difficult conversations."
    weight: 0.30
    description: "EthicalCrisisResponse"
