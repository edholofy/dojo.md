meta:
  id: accessibility-inquiry-program
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Design an accessible inquiry response program — serve buyers with disabilities, language barriers, and technology limitations"
  tags: [accessibility, inclusive-design, ada-compliance, advanced]

state: {}

trigger: |
  Your brokerage is being audited for accessibility
  compliance after a complaint from a deaf buyer who
  couldn't communicate with any agent (all relied on
  phone calls). You need to redesign your inquiry
  response system for universal accessibility.

  Buyer populations to serve:
  - Deaf/hard of hearing buyers (video relay, text)
  - Blind/low-vision buyers (screen reader compatible)
  - Mobility-impaired buyers (virtual tour emphasis)
  - Non-English speakers (12 languages in your market)
  - Elderly buyers (tech-limited, prefer phone/print)
  - Neurodiverse buyers (sensory considerations)

  Design the accessible inquiry program:

  1. Multi-channel communication options:
     - For each population, define preferred channels
     - Technology requirements and accommodations
     - Staff training requirements

  2. Website and digital accessibility:
     - WCAG 2.1 AA compliance for inquiry forms
     - Screen reader compatible listing details
     - Video content captioning and descriptions
     - Accessible virtual tour alternatives

  3. In-person showing accommodations:
     - Accessibility checklist for properties
     - Accommodation request process in inquiry flow
     - Agent training on disability etiquette

  4. Response templates adapted for accessibility:
     - Plain language versions (6th grade reading level)
     - Large print / high contrast formats
     - Video relay service (VRS) call scripts
     - Translated inquiry confirmations

  5. Compliance documentation and audit trail

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive accessibility program — multi-channel options for 6 populations; WCAG 2.1 AA digital compliance; showing accommodations; adapted response templates; compliance documentation."
    weight: 0.35
    description: "AccessibilityProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine accessibility expertise — accommodations are practical and specific; language is person-first and respectful; the program goes beyond compliance to genuine inclusion; training addresses common mistakes."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "The program would serve all buyers equitably — a deaf buyer could communicate fully; a blind buyer could access listing information; non-English speakers would receive translated materials; elderly buyers wouldn't be forced into digital-only channels."
    weight: 0.30
    description: "EquitableServiceOutcome"
