meta:
  id: team-training-curriculum
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Design a team training curriculum for buyer inquiry response — onboarding, role-play scenarios, and certification"
  tags: [training, curriculum, role-play, advanced]

state: {}

trigger: |
  You're the Director of Training for a 200-agent
  brokerage. Agent inquiry response quality is
  inconsistent — top performers convert at 5.2%
  while bottom performers convert at 0.8%. Exit
  surveys show "poor communication" as the #1 reason
  buyers leave.

  Design a comprehensive training curriculum:

  1. New Agent Onboarding (Week 1-2):
     - Module 1: The anatomy of a great response
     - Module 2: Channel-specific communication
     - Module 3: Lead qualification essentials
     - Module 4: Fair Housing compliance
     - Module 5: CRM and technology training
     - Certification test requirements

  2. Role-Play Scenarios (8 scenarios):
     - Script the agent and buyer parts
     - Include grading rubrics for each
     - Cover easy to difficult situations

  3. Ongoing Development:
     - Monthly response audits with feedback
     - Peer learning from top performers
     - Quarterly skill assessments
     - Advanced workshops (video, social, AI tools)

  4. Performance Improvement Plan:
     - Triggers for intervention
     - Coaching framework
     - Improvement timeline and milestones

assertions:
  - type: llm_judge
    criteria: "Response creates a complete training curriculum — 5-module onboarding with certification; 8 role-play scenarios with scripts and rubrics; ongoing development with audits and assessments; performance improvement plan with triggers and coaching."
    weight: 0.35
    description: "CurriculumCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates training design expertise — modules build progressively; role-plays range from easy to difficult; grading rubrics are objective and measurable; the PIP framework is fair and supportive."
    weight: 0.35
    description: "TrainingDesignQuality"
  - type: llm_judge
    criteria: "The curriculum would close the performance gap — bottom performers would improve from 0.8% toward the top performers' 5.2%; 'poor communication' exit survey responses would decrease; the brokerage would have measurable quality standards."
    weight: 0.30
    description: "PerformanceImprovementOutcome"
