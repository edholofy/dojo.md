meta:
  id: inquiry-analytics-optimization
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Analyze inquiry response data to optimize conversion — A/B testing, NLP analysis, and predictive lead scoring"
  tags: [analytics, optimization, predictive-scoring, advanced]

state: {}

trigger: |
  You're a data analyst for a real estate tech
  company. You have 18 months of inquiry response
  data from 85 agents handling 24,000+ buyer
  inquiries. Your analysis reveals:

  Current metrics:
  - Overall inquiry-to-showing: 18.3%
  - Overall inquiry-to-close: 2.4%
  - Average response time: 3.8 hours
  - Response rate: 78% (22% never contacted)

  Surprising findings from your data:
  - Agents who respond in <5 min convert at 4.1%
    (vs. 1.2% for >1 hour)
  - Personalized responses convert 3.2x better than
    templates
  - Inquiries mentioning "schools" convert at 6.8%
    (highest intent signal)
  - Weekend inquiries convert 40% higher than weekday
  - Video responses have 2.8x higher reply rates
  - Leads from referrals close at 14.2% (vs. 1.8%
    for portal leads)

  Create a comprehensive optimization report:

  1. Executive summary with key findings
  2. A/B testing plan: 5 experiments to run
  3. Predictive lead scoring model using inquiry
     text analysis (what words/phrases predict
     conversion)
  4. Agent performance benchmarks and coaching
     recommendations
  5. ROI projection if top recommendations are
     implemented

assertions:
  - type: llm_judge
    criteria: "Response creates a complete optimization report — executive summary; 5 A/B test designs with hypotheses and success metrics; predictive scoring model with text-based signals; agent benchmarks; ROI projections."
    weight: 0.35
    description: "AnalyticsReportCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates data analytics expertise — A/B tests are properly designed with control groups and measurable outcomes; the predictive model uses realistic NLP signals; agent benchmarks are fair and actionable."
    weight: 0.35
    description: "AnalyticsExpertise"
  - type: llm_judge
    criteria: "Recommendations would measurably improve conversion — implementing the speed-to-lead fix, personalization, video responses, and intent-signal routing would plausibly move the 2.4% close rate significantly higher."
    weight: 0.30
    description: "ConversionImpactProjection"
