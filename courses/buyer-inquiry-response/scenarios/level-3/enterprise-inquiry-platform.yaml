meta:
  id: enterprise-inquiry-platform
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Design an enterprise buyer inquiry management platform for a 500-agent brokerage — CRM architecture, AI routing, and performance analytics"
  tags: [enterprise, platform-design, crm-architecture, advanced]

state: {}

trigger: |
  You're the VP of Sales Operations for a 500-agent
  brokerage receiving 3,200+ buyer inquiries per month.
  Current challenges:
  - Average response time: 6.7 hours
  - Lead conversion rate: 1.8%
  - 34% of inquiries receive no response at all
  - No standardized quality metrics
  - Agents cherry-pick "good" leads, ignore others
  - $420K/year spent on lead generation with poor ROI

  Design an enterprise inquiry management platform:

  1. System architecture:
     - Inquiry intake and normalization across 12
       sources (portals, website, social, phone, chat,
       sign calls, referrals, open houses, ads, email,
       walk-ins, past client re-engagement)
     - AI-powered lead scoring and routing engine
     - Response quality monitoring system
     - Agent performance dashboards

  2. Routing algorithm design:
     - Match factors: agent expertise, geographic zone,
       price range, availability, current load, and
       historical conversion rates
     - Round-robin with weighted preferences
     - Overflow and escalation rules

  3. Quality standards:
     - Response time SLAs by lead tier
     - Response quality scoring rubric
     - Mystery shopper / audit program
     - Agent coaching triggers

  4. ROI model: Project the impact on conversion
     rates and revenue

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise platform — system architecture handling 12 inquiry sources; AI routing algorithm with weighted matching; quality standards with SLAs and auditing; ROI model projecting conversion and revenue improvements."
    weight: 0.35
    description: "EnterpriseSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise operations expertise — the routing algorithm balances fairness with performance; quality standards are measurable; the audit program catches problems; the system addresses cherry-picking and the 34% no-response rate."
    weight: 0.35
    description: "OperationalSophistication"
  - type: llm_judge
    criteria: "The platform would transform the brokerage's performance — the 6.7-hour response time would drop dramatically; the 1.8% conversion rate would improve meaningfully; the $420K lead gen spend would generate better ROI."
    weight: 0.30
    description: "TransformationalImpact"
