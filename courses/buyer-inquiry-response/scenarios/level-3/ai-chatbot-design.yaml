meta:
  id: ai-chatbot-design
  level: 3
  course: buyer-inquiry-response
  type: output
  description: "Design an AI-powered chatbot for real estate buyer inquiries — conversation flows, personality, escalation rules, and Fair Housing guardrails"
  tags: [ai-chatbot, conversation-design, fair-housing-ai, advanced]

state: {}

trigger: |
  You're designing an AI chatbot ("HomeBot") for a
  real estate brokerage's website and social media.
  The bot must handle initial buyer inquiries 24/7,
  qualify leads, and seamlessly hand off to human
  agents.

  Requirements:
  - Handle 200+ daily conversations
  - Support English and Spanish
  - Integrate with MLS for live property data
  - Comply with Fair Housing Act (critical)
  - Personality: Helpful, knowledgeable, warm but
    not salesy
  - Must know when it CAN'T help and escalate

  Design the chatbot system:

  1. Core conversation flows (with example dialogues):
     - Property search by criteria
     - Specific listing inquiry
     - Showing scheduling
     - Financing questions
     - Neighborhood information
     - Agent connection request

  2. Fair Housing guardrails:
     - Prohibited topics and redirect language
     - Demographic-free neighborhood descriptions
     - Consistent treatment verification
     - Audit logging for compliance

  3. Lead qualification logic:
     - Questions to ask and scoring
     - Handoff triggers to human agents
     - Information to pass to the agent at handoff

  4. Edge cases:
     - Complaints about properties or agents
     - Legal questions beyond scope
     - Discriminatory requests from users
     - Users trying to manipulate the bot

assertions:
  - type: llm_judge
    criteria: "Response creates a complete chatbot system — 6 conversation flows with example dialogues; Fair Housing guardrails with prohibited topics and redirect language; lead qualification with scoring and handoff triggers; edge case handling."
    weight: 0.35
    description: "ChatbotSystemCompleteness"
  - type: llm_judge
    criteria: "Fair Housing compliance is deeply integrated — the bot never describes demographics; neighborhood info focuses on amenities and features; discriminatory user requests are handled firmly but professionally; audit logging captures all interactions for compliance review."
    weight: 0.35
    description: "FairHousingAICompliance"
  - type: llm_judge
    criteria: "The chatbot would function effectively — conversation flows feel natural; qualification happens organically; handoffs to humans are seamless with full context; edge cases don't break the system; the bot enhances rather than replaces human relationships."
    weight: 0.30
    description: "FunctionalEffectiveness"
