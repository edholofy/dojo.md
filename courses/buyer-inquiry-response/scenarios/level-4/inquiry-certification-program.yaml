meta:
  id: inquiry-certification-program
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Design a professional certification for buyer communication skills — curriculum, assessment, and continuing education"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  You're designing the "Certified Buyer Communication
  Specialist" (CBCS) designation — the first
  professional credential focused exclusively on
  buyer inquiry response and communication excellence.

  Sponsoring organization: National Association of
  Realtors, in partnership with a university's
  communication studies department.

  Design the complete certification program:

  1. Credential structure:
     - CBCS-Associate (entry-level, 2 years experience)
     - CBCS-Professional (mid-career, 5 years)
     - CBCS-Master (expert, 10+ years + teaching)

  2. Curriculum for CBCS-Professional (primary tier):
     - Module 1: Communication Psychology for Real Estate
     - Module 2: Multi-Channel Response Excellence
     - Module 3: Lead Qualification and Conversion Science
     - Module 4: Fair Housing Communication Mastery
     - Module 5: Technology and AI in Buyer Communication
     - Module 6: Crisis and Difficult Situation Communication
     - Capstone: Live response evaluation

  3. Assessment methods:
     - Written examination (100 questions)
     - Portfolio of 20 response exemplars
     - Live role-play evaluation
     - Peer and client references

  4. Continuing education requirements (36 credits
     every 3 years)

  5. Program economics: Pricing, revenue model,
     break-even analysis

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — 3-tier credential structure; 6-module curriculum plus capstone for the Professional tier; 4 assessment methods; continuing education requirements; program economics."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates credentialing expertise — curriculum covers essential competencies; assessment methods validate real skills not just knowledge; the tier structure creates a career progression; continuing education keeps the credential relevant."
    weight: 0.35
    description: "CredentialingExpertise"
  - type: llm_judge
    criteria: "The CBCS designation would be valued by the industry — agents would pursue it to differentiate themselves; brokerages would require it for client-facing roles; consumers would seek CBCS-certified agents; the credential would raise industry communication standards."
    weight: 0.30
    description: "IndustryAdoption"
