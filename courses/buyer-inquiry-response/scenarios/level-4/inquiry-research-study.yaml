meta:
  id: inquiry-research-study
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Design a research study on buyer inquiry response effectiveness — methodology, variables, data collection, and publication plan"
  tags: [research, academic-study, behavioral-economics, expert]

state: {}

trigger: |
  You've received a $320,000 grant from the National
  Association of Realtors Foundation to study "The
  Impact of Inquiry Response Quality on Buyer
  Outcomes and Market Equity."

  Research questions:
  1. How does response time affect buyer satisfaction,
     transaction outcomes, and agent selection?
  2. Do response quality differences create
     inequitable outcomes across buyer demographics?
  3. What role does AI-assisted response play in
     conversion rates and buyer trust?

  Design the complete research study:

  1. Literature review outline: Key areas to cover
  2. Research methodology:
     - Study design (mixed methods)
     - Sample: 3,000 buyer inquiries across 5 markets
     - Variables: response time, personalization level,
       channel, AI vs human, buyer demographics
     - Data collection methods
     - Ethical considerations (IRB requirements)
  3. Analysis plan:
     - Statistical methods
     - Qualitative coding framework
     - Bias mitigation strategies
  4. Expected deliverables:
     - Academic papers (target journals)
     - Industry white paper
     - Policy recommendations
     - Open dataset contribution
  5. Timeline and budget allocation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete research design — literature review outline; mixed methods methodology with 3,000-inquiry sample; variable identification; analysis plan with statistical and qualitative methods; deliverables and timeline."
    weight: 0.35
    description: "ResearchDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — study design is rigorous; variables are properly operationalized; ethical considerations address buyer privacy and IRB requirements; bias mitigation is thoughtful."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "The study would produce meaningful knowledge — research questions address both efficiency and equity; findings would inform industry practices; policy recommendations would be evidence-based; the open dataset would enable future research."
    weight: 0.30
    description: "KnowledgeContribution"
