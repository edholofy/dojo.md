meta:
  id: expert-inquiry-shift
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Shift simulation — address three industry-defining challenges in buyer inquiry response at the expert level"
  tags: [shift-simulation, industry-defining, expert]

state: {}

trigger: |
  Three industry-defining challenges require your
  expert-level response:

  === CHALLENGE 1: The Post-NAR Settlement World ===
  After the NAR settlement, buyer agency agreements
  are now required before showing properties. This
  has fundamentally changed the inquiry-to-showing
  process. Many buyers are confused, angry, or
  refusing to sign. Inquiry volume dropped 30% as
  buyers resist the new process.
  Design: A buyer inquiry response system adapted
  for the post-settlement world — how to explain
  buyer agency, address objections, and maintain
  inquiry-to-showing conversion in the new reality.

  === CHALLENGE 2: The Deepfake Agent Crisis ===
  Scammers are using AI to create deepfake video
  responses impersonating real agents. They're
  responding to buyer inquiries, collecting personal
  financial information, and committing wire fraud.
  3 buyers in your market lost earnest money deposits.
  Design: An agent authentication system for buyer
  inquiry responses — how to prove you're real, warn
  buyers about fraud, and create verified response
  channels.

  === CHALLENGE 3: The Generational Communication Gap ===
  Your brokerage serves 4 generations simultaneously:
  Gen Z (18-28), Millennials (29-44), Gen X (45-60),
  and Boomers (61-78). Each has radically different
  communication expectations. Gen Z wants TikTok DMs;
  Boomers want phone calls. One-size-fits-all is dead.
  Design: A generational communication matrix — how
  to identify, adapt to, and serve each generation's
  inquiry response preferences.

  Create comprehensive responses to all three
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three challenges — post-NAR settlement inquiry adaptation with buyer agency explanation; deepfake authentication system with verification protocols; generational communication matrix with 4-generation coverage."
    weight: 0.35
    description: "TripleChallengeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates industry leadership — the settlement adaptation preserves conversion while respecting new requirements; the authentication system is technically feasible; the generational matrix goes beyond stereotypes to genuine communication science."
    weight: 0.35
    description: "IndustryLeadershipQuality"
  - type: llm_judge
    criteria: "Solutions would define industry practice — the settlement response system would become a model for other brokerages; the authentication protocol would be adopted industry-wide; the generational matrix would improve service for all demographics."
    weight: 0.30
    description: "IndustryDefiningOutcome"
