meta:
  id: inquiry-consulting-practice
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Launch a consulting practice specializing in buyer inquiry optimization — methodology, service offerings, and client proposals"
  tags: [consulting, methodology, practice-building, expert]

state: {}

trigger: |
  After 15 years optimizing buyer inquiry responses
  and achieving documented 4.8x conversion improvements,
  you're launching ResponseIQ Consulting. Your
  proprietary framework is RAPID:
  - R: Receive (multi-channel intake optimization)
  - A: Assess (lead scoring and qualification)
  - P: Personalize (persona-matched responses)
  - I: Iterate (A/B testing and analytics)
  - D: Develop (agent training and coaching)

  Build your consulting practice:

  1. RAPID Framework documentation:
     - Detailed methodology for each phase
     - Assessment tools and scoring rubrics
     - Benchmarking standards
     - ROI measurement approach

  2. Service tier structure:
     - Tier 1: RAPID Audit ($5,000) — 2-week
       assessment with recommendations
     - Tier 2: RAPID Implementation ($25,000) —
       Full system redesign over 90 days
     - Tier 3: RAPID Transformation ($75,000) —
       12-month enterprise engagement

  3. Write 2 client proposals:
     - Proposal A: 50-agent brokerage with 2.1%
       conversion rate (Tier 2)
     - Proposal B: 800-agent franchise with
       inconsistent response quality (Tier 3)

  4. Thought leadership content plan (12 months)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — RAPID framework with detailed methodology; 3 service tiers with pricing and deliverables; 2 tailored client proposals; 12-month thought leadership plan."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "The RAPID framework demonstrates deep expertise — each phase has actionable tools and rubrics; the methodology would produce measurable results; benchmarking standards are industry-relevant; ROI measurement is rigorous."
    weight: 0.35
    description: "FrameworkExpertise"
  - type: llm_judge
    criteria: "Proposals would win business — the 50-agent proposal addresses their specific conversion problem; the 800-agent proposal tackles inconsistency at scale; pricing is justified by projected ROI; deliverables are specific and measurable."
    weight: 0.30
    description: "ProposalWinRate"
