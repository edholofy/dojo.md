meta:
  id: inquiry-technology-product
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Build a proptech product for buyer inquiry management — product requirements, architecture, AI models, and go-to-market strategy"
  tags: [proptech, product-management, ai-product, expert]

state: {}

trigger: |
  You're the CPO of InquiryAI, a proptech startup
  that raised $5.2M in seed funding to build
  "the definitive buyer inquiry management platform."

  Product vision: Use AI to ensure every buyer inquiry
  receives a perfect, personalized, compliant response
  within 60 seconds — regardless of channel, time,
  or agent availability.

  Core product features to design:
  1. SmartResponse: AI-generated personalized responses
     that match agent voice and style
  2. ComplianceShield: Real-time Fair Housing, TCPA,
     and CAN-SPAM compliance checking
  3. LeadIQ: Predictive lead scoring from inquiry
     text analysis
  4. ChannelSync: Unified inbox across email, text,
     chat, social, phone (transcription)
  5. CoachAI: Agent response quality scoring with
     real-time coaching suggestions

  Create:
  1. Product requirements document (PRD) for V1 launch
  2. Technical architecture overview (AI models,
     integrations, data pipeline)
  3. Compliance-first design principles
  4. Go-to-market strategy (first 100 customers)
  5. Pricing model (freemium to enterprise)
  6. Success metrics and KPIs

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product plan — PRD for V1 with 5 core features; technical architecture with AI models and integrations; compliance design principles; go-to-market for first 100 customers; pricing model; KPIs."
    weight: 0.35
    description: "ProductPlanCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and technical expertise — AI model choices are realistic; integrations address real CRM/MLS ecosystems; compliance-first design is genuine not bolted on; the architecture would scale."
    weight: 0.35
    description: "ProductTechnicalExpertise"
  - type: llm_judge
    criteria: "The product would succeed in market — the go-to-market strategy targets the right early adopters; pricing matches willingness to pay; the 60-second response promise is compelling and achievable; compliance differentiation is strong."
    weight: 0.30
    description: "MarketViability"
