meta:
  id: inquiry-knowledge-graph
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Design a knowledge graph connecting buyer intent signals to optimal response strategies — NLP analysis, intent taxonomy, and response matching"
  tags: [knowledge-graph, nlp, intent-mapping, expert]

state: {}

trigger: |
  You're building a knowledge graph that maps buyer
  inquiry intent signals to optimal response strategies.
  This will power an AI system that recommends the
  best response approach for every inquiry.

  Design the knowledge graph:

  1. Buyer intent taxonomy (hierarchical):
     - Level 1: 5 primary intent categories (Browse,
       Compare, Evaluate, Decide, Transact)
     - Level 2: 3-5 sub-intents per category
     - Level 3: Specific signals (keywords, phrases,
       behavioral patterns)

  2. Response strategy nodes:
     - For each intent category, define optimal
       response characteristics:
       * Tone and formality level
       * Information density
       * Call to action type
       * Response urgency
       * Follow-up strategy
       * Channel preference

  3. Signal-to-strategy mapping rules:
     - 10 example inquiry texts with NLP analysis
     - Identified intent signals
     - Mapped response strategy
     - Predicted conversion probability

  4. Graph relationships:
     - Intent escalation paths (Browse → Compare →
       Evaluate → Decide → Transact)
     - Cross-intent patterns
     - Buyer journey stage inference
     - Feedback loops for model improvement

assertions:
  - type: llm_judge
    criteria: "Response creates a complete knowledge graph design — hierarchical intent taxonomy with 3 levels; response strategy nodes with 6+ characteristics per category; 10 example mappings with NLP analysis; graph relationships with escalation paths and feedback loops."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "The intent taxonomy is linguistically sound — intent categories are mutually exclusive and collectively exhaustive; keyword signals are realistic; NLP analysis of 10 examples is convincing; the Browse-to-Transact progression reflects real buyer behavior."
    weight: 0.35
    description: "IntentTaxonomyQuality"
  - type: llm_judge
    criteria: "The knowledge graph would power effective AI responses — signal-to-strategy mappings are logical; predicted conversion probabilities are realistic; the feedback loop enables continuous improvement; the system would outperform rule-based response templates."
    weight: 0.30
    description: "AISystemViability"
