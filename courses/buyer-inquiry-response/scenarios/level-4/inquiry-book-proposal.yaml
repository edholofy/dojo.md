meta:
  id: inquiry-book-proposal
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Write a book proposal for a definitive guide on buyer communication — market analysis, chapter outline, and sample chapter"
  tags: [book-proposal, publishing, thought-leadership, expert]

state: {}

trigger: |
  You're writing a book proposal for:
  "The First Response: How Real Estate Communication
  Wins or Loses Buyers Before the First Showing"

  A major business publisher is interested after your
  keynote at Inman Connect went viral (2.1M views).

  Create the complete book proposal:

  1. Book overview:
     - Premise: The inquiry response is the most
       important — and most neglected — moment in
       real estate
     - Market: 2M+ licensed agents in the US, plus
       real estate educators, proptech companies, and
       consumer advocates
     - Competitive analysis: 3 existing books and how
       yours differs

  2. Chapter outline (14 chapters):
     Organized into 4 parts:
     - Part I: The Science of First Impressions
     - Part II: The Art of Response
     - Part III: The Systems That Scale
     - Part IV: The Future of Buyer Communication

  3. Author platform and marketing plan

  4. Sample chapter: Chapter 3 — "The 5-Minute
     Window: Why Response Speed Is the Ultimate
     Differentiator" (~2,500 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — book overview with premise and competitive analysis; 14-chapter outline in 4 parts; author platform and marketing plan; Chapter 3 sample at ~2,500 words on the 5-minute response window."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "The chapter outline covers the field comprehensively — from psychology of first impressions through practical response techniques to systems and future trends — and the sample chapter uses data, stories, and actionable insights."
    weight: 0.35
    description: "ContentQuality"
  - type: llm_judge
    criteria: "A publisher would acquire this book — the premise fills a genuine market gap; the competitive analysis shows differentiation; the sample chapter demonstrates the author can deliver compelling content; the marketing plan shows a reachable audience."
    weight: 0.30
    description: "PublishingViability"
