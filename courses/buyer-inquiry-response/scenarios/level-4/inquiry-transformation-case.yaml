meta:
  id: inquiry-transformation-case
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Write a Harvard Business School-style case study on a brokerage's inquiry response transformation — from worst to first in 18 months"
  tags: [case-study, transformation, business-school, expert]

state: {}

trigger: |
  Write a Harvard Business School-style case study:
  "Pinnacle Realty: From Last to First in Buyer
  Response"

  Company background:
  - 180-agent brokerage, 4 offices, suburban market
  - 2023: Ranked last in customer satisfaction among
    12 local brokerages (NPS: -12)
  - Key problems: 14-hour average response time;
    1.4% conversion rate; 45% agent turnover;
    $890K annual lead gen spend with poor ROI
  - New CEO hired from tech industry

  Transformation timeline:
  - Month 1-3: Audit, technology investment, new CRM
  - Month 4-6: Response standards, training overhaul
  - Month 7-12: AI integration, predictive scoring
  - Month 13-18: Culture transformation, results

  Results by Month 18:
  - NPS: +67 (from -12)
  - Response time: 4.2 minutes average
  - Conversion rate: 4.8% (from 1.4%)
  - Agent turnover: 12% (from 45%)
  - Revenue per lead: $2,340 (from $780)
  - Lead gen spend reduced to $540K with better results

  Write the case study:
  1. Situation analysis
  2. Decision points and alternatives considered
  3. Implementation narrative
  4. Results and analysis
  5. Teaching note with discussion questions

assertions:
  - type: llm_judge
    criteria: "Response creates a complete HBS-style case study — situation analysis; decision points with alternatives; implementation narrative across 18 months; results analysis; teaching note with discussion questions."
    weight: 0.35
    description: "CaseStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates business case writing quality — the narrative includes real tension and conflict; decision points present genuine alternatives; the teaching note raises questions that don't have obvious answers; the case would generate rich classroom discussion."
    weight: 0.35
    description: "CaseWritingQuality"
  - type: llm_judge
    criteria: "The case study would be valuable for real estate education — it provides a replicable transformation framework; the results are believable; the teaching note connects to broader management principles; readers would learn actionable strategies."
    weight: 0.30
    description: "EducationalValue"
