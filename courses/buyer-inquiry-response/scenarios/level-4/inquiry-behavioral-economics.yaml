meta:
  id: inquiry-behavioral-economics
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Apply behavioral economics to buyer inquiry response — choice architecture, nudge theory, and ethical persuasion frameworks"
  tags: [behavioral-economics, nudge-theory, choice-architecture, expert]

state: {}

trigger: |
  You're a behavioral economist consulting for a
  real estate technology company. They want to
  redesign their inquiry response system using
  behavioral science principles.

  Current problems:
  - Buyers receive too many listing alerts (choice
    overload → paralysis)
  - 68% of inquiries never result in a showing
    (intention-action gap)
  - Buyers who see 15+ homes make worse decisions
    than those who see 5-8 (information overload)
  - First-time buyers delay pre-approval by 3 months
    on average (present bias)

  Apply behavioral economics:

  1. Choice architecture for listing recommendations:
     - How many listings to present and in what order
     - Default options and opt-out vs opt-in framing
     - Anchoring effects in price presentation
     - Social proof integration

  2. Nudge design for the inquiry-to-showing journey:
     - Commitment devices for showing appointments
     - Loss aversion framing for market updates
     - Temporal discounting for "act now" messaging
     - Implementation intentions for buyer next steps

  3. Ethical framework:
     - Where nudges become manipulation
     - Transparency requirements
     - Buyer autonomy preservation
     - Dark pattern identification and prohibition

  4. A/B testing plan to validate 4 behavioral
     interventions

assertions:
  - type: llm_judge
    criteria: "Response applies behavioral economics rigorously — choice architecture uses real principles (default effects, anchoring, social proof); nudge design addresses specific gaps; the ethical framework distinguishes nudges from manipulation; A/B tests are well-designed."
    weight: 0.35
    description: "BehavioralScienceRigor"
  - type: llm_judge
    criteria: "Response demonstrates deep behavioral economics knowledge — correctly applies concepts like choice overload, intention-action gap, present bias, loss aversion, and temporal discounting to the real estate context."
    weight: 0.35
    description: "BehavioralEconomicsExpertise"
  - type: llm_judge
    criteria: "The interventions would improve buyer outcomes ethically — the 68% no-showing rate would decrease; first-time buyer pre-approval delays would shorten; buyers would make better decisions with fewer homes — all while preserving buyer autonomy."
    weight: 0.30
    description: "EthicalOutcomeImprovement"
