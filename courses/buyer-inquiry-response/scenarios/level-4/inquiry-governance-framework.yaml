meta:
  id: inquiry-governance-framework
  level: 4
  course: buyer-inquiry-response
  type: output
  description: "Create a governance framework for buyer inquiry practices — industry standards, ethical guidelines, and accountability structures"
  tags: [governance, industry-standards, ethics, expert]

state: {}

trigger: |
  The National Association of Realtors has appointed
  you to chair a new committee: "Standards for Buyer
  Communication Excellence." The committee will
  establish the first industry-wide governance
  framework for how agents respond to buyer inquiries.

  Context:
  - Consumer trust in agents is at a 15-year low
  - AI-generated responses raise authenticity concerns
  - Fair Housing violations in digital communications
    increased 180% in 3 years
  - No industry standard for response quality exists
  - Consumer advocacy groups demand accountability
  - 72% of buyer complaints cite "communication"

  Design the governance framework:

  1. Standards document: "Code of Buyer Communication
     Excellence"
     - Response timeliness standards
     - Personalization and authenticity requirements
     - AI disclosure obligations
     - Channel-specific quality minimums
     - Fair Housing communication standards
     - Data privacy and consent requirements

  2. Certification program:
     - Individual agent certification
     - Brokerage-level certification
     - Assessment criteria and renewal process

  3. Enforcement mechanism:
     - Complaint process
     - Investigation procedures
     - Sanctions and remediation
     - Appeals process

  4. Annual reporting and transparency requirements

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — standards document covering all 6 areas; certification program for agents and brokerages; enforcement mechanism with complaint/investigation/sanctions/appeals; annual reporting requirements."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates governance expertise — standards are specific enough to be measurable; certification criteria are rigorous but achievable; enforcement is fair with due process; the framework balances accountability with practical implementation."
    weight: 0.35
    description: "GovernanceExpertise"
  - type: llm_judge
    criteria: "The framework would restore consumer trust — the 15-year low in trust would reverse; AI disclosure would address authenticity concerns; Fair Housing digital violations would decrease; the 72% communication complaint rate would drop."
    weight: 0.30
    description: "TrustRestorationOutcome"
