meta:
  id: inquiry-graduate-program
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Design a graduate program in real estate communication science — curriculum, research agenda, and industry partnership model"
  tags: [graduate-program, academic, curriculum-design, master]

state: {}

trigger: |
  A top-25 university's School of Communication is
  launching a first-of-its-kind graduate certificate
  in "Real Estate Communication Science." You're the
  founding program director.

  Program vision: Bridge communication science,
  behavioral economics, technology, and real estate
  practice to create the next generation of industry
  leaders.

  Design the complete program:

  1. Program structure:
     - 5 core courses (3 credits each)
     - 2 elective tracks: "Technology & AI" or
       "Leadership & Policy"
     - Capstone research project
     - Industry practicum (200 hours)

  2. Core course syllabi (detailed for all 5):
     - RECOM 501: Foundations of Real Estate
       Communication
     - RECOM 502: Buyer Psychology and Decision Science
     - RECOM 503: Digital Communication Systems
     - RECOM 504: Compliance, Ethics, and Fair Housing
     - RECOM 505: Data Analytics for Communication
       Optimization

  3. Research agenda: 5 priority research questions

  4. Industry advisory board structure and
     partnership model

  5. Student recruitment and career outcomes

assertions:
  - type: llm_judge
    criteria: "Response creates a complete graduate program — 5 core courses with detailed syllabi; 2 elective tracks; capstone and practicum requirements; 5 research questions; advisory board structure; recruitment and career plan."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic program design expertise — syllabi include learning objectives, readings, and assessments; courses build progressively; the capstone integrates learning; the practicum connects theory to practice."
    weight: 0.35
    description: "AcademicDesignQuality"
  - type: llm_judge
    criteria: "The program would attract students and create career value — graduates would be sought by brokerages, proptech companies, and industry associations; the research agenda would advance the field; industry partnerships would provide real-world relevance."
    weight: 0.30
    description: "ProgramViability"
