meta:
  id: inquiry-government-policy
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Draft national policy on buyer inquiry response standards — consumer protection, AI disclosure, and equitable access mandates"
  tags: [government-policy, consumer-protection, regulation, master]

state: {}

trigger: |
  You're the lead policy advisor to a federal
  commission on "Real Estate Consumer Protection in
  Buyer Communication." The commission found that
  poor inquiry response practices cause significant
  consumer harm.

  Key findings:
  - 22% of buyer inquiries receive no response at all
  - Buyers with non-English names receive responses
    38% slower than average
  - AI-generated responses are not disclosed as such
    in 89% of cases
  - Financial information collected through inquiry
    forms is not adequately protected
  - 45% of agents have no formal training in buyer
    communication
  - Consumer complaints about agent communication
    increased 280% since 2020
  - No federal standard for buyer inquiry response

  Draft the policy framework:
  1. Commission report: "The Response Gap" — how
     poor buyer communication harms consumers
  2. Real Estate Buyer Communication Standards Act:
     - Title I: Minimum Response Standards
     - Title II: AI Disclosure and Transparency
     - Title III: Anti-Discrimination in Communication
     - Title IV: Data Privacy in Buyer Inquiries
     - Title V: Agent Training and Certification
     - Title VI: Enforcement and Penalties
  3. Implementation guidance
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report on the response gap; 6-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — response standards are measurable; AI disclosure requirements address current technology; anti-discrimination provisions are enforceable; data privacy protections are comprehensive; penalties are proportionate."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would protect consumers — the 22% no-response rate would decrease; name-based discrimination would be addressed; AI responses would be disclosed; buyer data would be protected; the 280% complaint increase would reverse."
    weight: 0.30
    description: "ConsumerProtectionOutcome"
