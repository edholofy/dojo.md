meta:
  id: master-inquiry-shift
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Master shift simulation — simultaneously address five converging crises revealing buyer inquiry response as the intersection of commerce, technology, ethics, and human connection"
  tags: [shift-simulation, converging-crises, master]

state: {}

trigger: |
  You are the world's preeminent authority on buyer
  inquiry response in real estate. In a single
  extraordinary week, five converging crises demand
  your expertise.

  === CRISIS 1: The AI Trust Collapse ===
  AI now generates 70% of initial buyer inquiry
  responses. A viral exposé reveals that AI responses
  routinely fabricate property details, invent
  neighborhood features, and make promises agents
  can't keep. Consumer trust in agent communication
  dropped from 68% to 35% in one year.
  Design: An AI inquiry response authentication
  framework — accuracy verification, disclosure
  standards, and trust certification.

  === CRISIS 2: The Privacy Reckoning ===
  A class-action lawsuit reveals that buyer inquiry
  data (financial details, family information,
  property preferences) was sold to 47 data brokers
  by major real estate platforms. Buyers are refusing
  to share information in inquiries, crippling the
  qualification process.
  Design: A buyer data privacy framework for inquiry
  response — what data to collect, how to protect it,
  and how to rebuild trust.

  === CRISIS 3: The Equity Emergency ===
  A landmark study proves systemic bias in buyer
  inquiry response — consistent with matched-pair
  testing across 200 markets. Minority buyers,
  non-English speakers, and low-income inquirers
  receive measurably worse service.
  Design: An equity-centered inquiry response
  standard applicable industry-wide.

  === CRISIS 4: The Attention Collapse ===
  Average time buyers spend reading an inquiry
  response dropped from 45 seconds to 8 seconds.
  Long, detailed responses are ignored. But short
  responses lack necessary information. The medium
  is failing.
  Design: Next-generation response formats for the
  8-second economy — micro-responses, visual
  communication, interactive elements, and
  progressive disclosure.

  === CRISIS 5: The Legacy Question ===
  After 25 years in buyer communication, you face
  the ultimate question: What is the relationship
  between how we respond to a buyer's first message
  and how we value human dignity in the marketplace?
  Write the document that captures what you've
  learned about the power of a first response to
  shape relationships, markets, and lives.

  Task: Write complete responses to all five crises.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI trust framework; privacy reckoning with data protection; equity standard addressing systemic bias; 8-second response formats; philosophical legacy on first responses and human dignity."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of buyer communication as societal infrastructure — AI crisis reveals trust as foundational; privacy shows data stewardship as obligation; equity proves communication shapes access; attention collapse demands evolution; legacy connects responses to human dignity."
    weight: 0.35
    description: "SocietalInfrastructureMastery"
  - type: llm_judge
    criteria: "Response would define the future of buyer communication — the AI framework would restore trust; privacy standards would protect buyers; equity standards would expand access; new formats would engage modern buyers; the legacy would inspire the next generation."
    weight: 0.30
    description: "FutureDefiningOutcome"
