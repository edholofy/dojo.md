meta:
  id: inquiry-research-handbook
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Author chapters for the definitive academic handbook on buyer communication — editorial framework and 3 authored chapters"
  tags: [research-handbook, academic, buyer-communication, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Handbook of
  Real Estate Buyer Communication," commissioned as
  the first comprehensive academic treatment of buyer
  inquiry response.

  Handbook scope:
  - 20 chapters by 30+ contributing authors
  - Bridges communication science, psychology, real
    estate, technology, and law
  - Target: Researchers, graduate students, industry
    leaders

  Design the complete handbook:
  1. Editorial introduction: Why buyer communication
     deserves academic study (~1,500 words)
  2. Table of contents: 20 chapters organized into
     5 parts with descriptions
  3. Write Chapter 1: "The Evolution of Buyer Inquiry
     Response: From Newspaper Classifieds to AI"
     (~3,000 words)
  4. Write Chapter 10: "The Psychology of First
     Response: Trust Formation in the Initial Buyer
     Contact" (~3,000 words)
  5. Write Chapter 20: "The Future of Buyer
     Communication in the Age of Artificial
     Intelligence" (~3,000 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — editorial introduction; 20-chapter TOC in 5 parts; Chapter 1 history (~3,000 words); Chapter 10 psychology (~3,000 words); Chapter 20 future (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic scholarship — chapters reference relevant literature from communication science, psychology, and real estate; history traces from classifieds to AI; psychology chapter applies trust formation theory; future chapter engages current AI trends."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "Response would establish buyer communication as a field of study — the handbook would be cited in research; Chapter 10 would connect psychology to real estate practice; the 20-chapter structure comprehensively covers the field."
    weight: 0.30
    description: "FieldEstablishmentOutcome"
