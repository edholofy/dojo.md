meta:
  id: global-inquiry-standards
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Draft global standards for buyer inquiry response — international framework applicable across 50+ countries with diverse legal and cultural systems"
  tags: [global-standards, international-framework, regulatory, master]

state: {}

trigger: |
  The International Real Estate Federation (FIABCI)
  has commissioned you to draft the first global
  standards for buyer inquiry response. The standards
  must work across 50+ countries with vastly different
  legal systems, cultural norms, and technology
  infrastructure.

  Challenges:
  - EU GDPR restricts data collection differently
    than US or Asian regulations
  - Some countries have no Fair Housing equivalent
  - Technology access ranges from AI-powered CRMs to
    handwritten ledgers
  - Cultural communication norms vary dramatically
    (direct vs. indirect, formal vs. casual)
  - Multiple languages and scripts
  - Different concepts of property ownership

  Design the global standards framework:

  1. Universal principles (applicable everywhere):
     - Core values that transcend legal/cultural
       differences
     - Minimum response standards
     - Buyer dignity and respect requirements

  2. Regional adaptation guides (4 regions):
     - North America (US/Canada): Fair Housing, TCPA,
       NAR settlement
     - European Union: GDPR, consumer protection
       directives
     - Asia-Pacific: Cultural communication norms,
       relationship-building
     - Latin America/Caribbean: Informal markets,
       trust-building

  3. Certification: International Buyer Communication
     Standard (IBCS)
     - Certification levels
     - Assessment criteria adaptable by region
     - Mutual recognition agreements

  4. Technology standards:
     - Minimum digital infrastructure
     - AI governance principles
     - Cross-border data handling

assertions:
  - type: llm_judge
    criteria: "Response creates a complete global framework — universal principles; 4 regional adaptation guides addressing specific legal and cultural contexts; IBCS certification with regional adaptability; technology standards with AI governance."
    weight: 0.35
    description: "GlobalFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global perspective — universal principles are genuinely universal not US-centric; regional guides show authentic understanding of EU GDPR, Asian communication norms, and Latin American market realities; technology standards account for infrastructure gaps."
    weight: 0.35
    description: "GlobalPerspective"
  - type: llm_judge
    criteria: "The framework would be adopted internationally — FIABCI member associations would implement it; the IBCS certification would become a recognized credential; buyers worldwide would benefit from improved communication standards."
    weight: 0.30
    description: "InternationalAdoption"
