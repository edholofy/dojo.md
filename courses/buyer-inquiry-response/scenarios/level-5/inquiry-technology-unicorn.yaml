meta:
  id: inquiry-technology-unicorn
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Build a unicorn startup around AI-powered buyer communication — product vision, Series C pitch, and category creation"
  tags: [unicorn, startup, ai-communication, master]

state: {}

trigger: |
  You're the CEO of ResponseGenius, a startup that
  raised $8M (Seed + Series A) and is preparing for
  a $60M Series C at a $600M valuation. ResponseGenius
  creates a new category: "Buyer Communication
  Intelligence."

  Platform capabilities:
  - InstantResponse: AI-generated personalized buyer
    responses in <30 seconds across all channels
  - ComplianceGuard: Real-time Fair Housing, TCPA,
    and state law compliance for every message
  - IntentIQ: Predictive buyer intent scoring from
    inquiry text, behavioral signals, and market data
  - VoiceMatch: AI trained on each agent's personal
    communication style and voice
  - ConversionEngine: End-to-end inquiry-to-close
    optimization with predictive analytics

  Traction:
  - $13M ARR, growing 210% YoY
  - 620 brokerage customers (140 enterprise)
  - 48,000 active agent users
  - 9.5M buyer inquiries processed
  - Average 3.2x improvement in inquiry-to-showing
    conversion
  - NPS: 74
  - Net revenue retention: 155%

  Create:
  1. Series C pitch deck narrative (12-15 slides)
  2. Category creation: "Buyer Communication
     Intelligence"
  3. Product roadmap: Next 18 months
  4. Competitive moat analysis
  5. Path to $100M ARR
  6. IPO vs acquisition analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch with compelling story; category creation for Buyer Communication Intelligence; 18-month roadmap; competitive moat; $100M ARR path; IPO vs acquisition analysis."
    weight: 0.35
    description: "UnicornNarrativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture expertise — pitch leverages 210% growth and 9.5M inquiries processed; moat analysis identifies real defensibility (data network effects, compliance IP, agent voice training); projections are credible and backed by unit economics."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would convince investors — the $60M Series C is justified by metrics; Buyer Communication Intelligence would become a recognized category; ResponseGenius would become the industry standard for buyer inquiry response."
    weight: 0.30
    description: "InvestorConvictionOutcome"
