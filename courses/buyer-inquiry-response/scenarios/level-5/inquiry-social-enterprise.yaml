meta:
  id: inquiry-social-enterprise
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Build a social enterprise improving housing access through better buyer communication — serving underserved populations"
  tags: [social-enterprise, housing-access, equity, master]

state: {}

trigger: |
  You're founding "OpenDoor Response," a social
  enterprise with the mission: "Every home seeker
  deserves a dignified, helpful response — regardless
  of income, language, or background."

  Problem: Research shows that buyer inquiry response
  quality correlates with buyer demographics:
  - Buyers with "ethnic-sounding" names receive
    responses 12% less often and 2.3 hours slower
  - Non-English inquiries receive responses 28% less
    often
  - Buyers with low stated budgets receive dismissive
    or no responses 34% of the time
  - First-generation home buyers receive less
    educational content
  - Rural buyers have 40% fewer agents willing to
    respond

  Design the social enterprise:

  1. Mission, theory of change, and impact model

  2. Four programs:
     - ResponseEquity: Audit and improve response
       equity at partner brokerages
     - FirstHome: Specialized inquiry response
       training for serving first-generation buyers
     - LanguageBridge: Multilingual response
       infrastructure for 15 languages
     - RuralConnect: Virtual buyer response services
       for underserved rural markets

  3. Impact measurement framework:
     - Response equity metrics
     - Housing access outcomes
     - Demographic gap reduction

  4. Funding model:
     - Revenue streams (brokerage partnerships,
       grants, government contracts)
     - 5-year financial projections
     - Sustainability plan

  5. Scaling strategy: 50 markets in 5 years

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission with theory of change; 4 programs addressing specific equity gaps; impact measurement with response equity metrics; funding model with 5-year projections; scaling strategy."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social impact expertise — the theory of change connects inquiry response to housing access outcomes; programs address root causes not symptoms; impact metrics are meaningful; the funding model balances mission with sustainability."
    weight: 0.35
    description: "SocialImpactExpertise"
  - type: llm_judge
    criteria: "OpenDoor Response would reduce housing access inequity — the 12% name-based gap would narrow; non-English response rates would increase; low-budget buyers would receive dignified responses; rural buyers would gain access to professional services."
    weight: 0.30
    description: "EquityOutcome"
