meta:
  id: inquiry-for-existential-challenges
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Redesign buyer inquiry response for existential challenges — climate migration, housing affordability crisis, and post-pandemic community rebuilding"
  tags: [existential-challenges, climate, affordability, master]

state: {}

trigger: |
  Three existential challenges are reshaping how
  buyer inquiries must be handled:

  === CHALLENGE 1: Climate Migration ===
  50,000 families are relocating from coastal flood
  zones, wildfire zones, and extreme heat areas. They
  inquire about properties in "climate haven" markets.
  Their inquiries are urgent, emotional, and often
  include trauma. Receiving communities are
  overwhelmed.
  Design: A buyer inquiry response protocol for
  climate migrants — addressing trauma, providing
  climate risk information about destination markets,
  and managing community capacity.

  === CHALLENGE 2: The Affordability Abyss ===
  In 40% of US markets, the median home price exceeds
  5x the median household income. Buyer inquiries
  increasingly come from people who mathematically
  cannot afford to buy. Agents face a moral dilemma:
  encourage unrealistic dreams or deliver hard truths.
  Design: An honest, compassionate inquiry response
  framework for markets where affordability is a
  systemic barrier — including alternative paths to
  housing stability.

  === CHALLENGE 3: Post-Pandemic Community Rebuilding ===
  Remote work created "zoom towns" where 30%+ of
  buyers are newcomers. Original residents feel
  displaced. Buyer inquiries from newcomers generate
  community resentment. Agents are caught between
  serving buyers and serving communities.
  Design: A community-conscious buyer inquiry response
  approach — welcoming newcomers while honoring
  existing communities and addressing displacement
  concerns honestly.

  Create comprehensive responses to all three
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three existential challenges — climate migration with trauma-informed protocols; affordability crisis with honest compassionate responses and alternatives; zoom town dynamics with community-conscious approaches."
    weight: 0.35
    description: "ExistentialChallengeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates moral sophistication — climate migrant trauma is handled with genuine empathy; affordability conversations balance honesty with dignity; community displacement concerns are acknowledged without excluding newcomers."
    weight: 0.35
    description: "MoralSophistication"
  - type: llm_judge
    criteria: "Responses would serve both individuals and communities — climate migrants find safe housing; priced-out buyers discover alternative paths; zoom towns integrate newcomers while protecting existing residents; agents act as community stewards not just salespeople."
    weight: 0.30
    description: "CommunityAndIndividualOutcome"
