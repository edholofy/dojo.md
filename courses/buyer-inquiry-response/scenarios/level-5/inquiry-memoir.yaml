meta:
  id: inquiry-memoir
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Write a professional memoir about a career in buyer communication — 3 chapters on the human stories behind the inquiries"
  tags: [memoir, career-reflection, storytelling, master]

state: {}

trigger: |
  You've spent 20 years responding to buyer inquiries.
  From your first fumbled phone call to leading
  communication strategy for a national brokerage,
  you've learned that behind every inquiry is a human
  story.

  Write your memoir: "The Other End of the Line:
  Twenty Years of First Conversations"

  Chapter 1: "The One That Got Away" (~2,500 words)
  Your biggest regret — a young couple who sent a
  timid email: "We probably can't afford anything,
  but is there anything in our budget?" You were busy
  with a luxury listing and didn't respond for 3 days.
  By then, they'd found another agent who helped them
  buy their first home. You learned: every inquiry
  deserves a response, regardless of budget. This
  moment shaped your entire philosophy.

  Chapter 7: "The Voice on the Other End" (~2,500
  words)
  The inquiry that changed everything — a phone call
  from a recently widowed woman who started crying
  while asking about selling her husband's dream
  home. You realized inquiry response isn't about
  sales — it's about meeting people at pivotal life
  moments: births, deaths, divorces, promotions,
  retirements, relocations. Every inquiry is a life
  transition in disguise.

  Chapter 12: "A Million First Conversations"
  (~2,500 words)
  Your final year before retirement, overseeing a
  system that handles 50,000 buyer inquiries per
  month. You worry that automation and AI are losing
  the human element you fought for. Then you discover
  an AI response that moved a buyer to tears with its
  empathy. You realize the future isn't human OR AI —
  it's human AND AI, each amplifying the other's
  strengths.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 explores the regret and lesson about every inquiry deserving a response; Chapter 7 explores life transitions behind inquiries; Chapter 12 explores the human-AI future."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — uses scenes not summaries; the couple's email is vivid; the widow's phone call is emotionally authentic; the AI revelation in Chapter 12 is nuanced not simplistic; the voice is personal and reflective."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "The memoir would resonate with readers — real estate professionals would see their own experiences reflected; the stories reveal deeper truths about human connection; each chapter builds toward the book's thesis that inquiry response is fundamentally about human dignity."
    weight: 0.30
    description: "ReaderResonanceOutcome"
