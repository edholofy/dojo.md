meta:
  id: inquiry-thought-leadership
  level: 5
  course: buyer-inquiry-response
  type: output
  description: "Establish thought leadership in buyer communication — keynote speech, manifesto, industry publication, and TEDx talk"
  tags: [thought-leadership, keynote, manifesto, master]

state: {}

trigger: |
  You've been recognized as the world's foremost
  authority on buyer inquiry response in real estate.
  You're invited to define the future of the field.

  Create four thought leadership pieces:

  1. Keynote speech: "The First 5 Minutes: How Real
     Estate Lost — and Can Regain — Buyer Trust"
     (Inman Connect, 3,000 attendees, 25 minutes)
     Include: Opening hook, 3 main arguments with
     data, a story that moved you, call to action

  2. Manifesto: "The Buyer Communication Bill of
     Rights" — 10 rights every buyer deserves when
     they inquire about a property (with explanations)

  3. Industry article: "Why AI Will Make Great
     Communicators More Valuable, Not Less" (Inman
     News, 1,200 words) — argue against the fear that
     AI replaces the human connection in real estate

  4. TEDx talk outline: "What Your Real Estate Agent's
     First Message Tells You About Everything"
     (18 minutes) — the broader lesson about first
     impressions, trust, and human connection

assertions:
  - type: llm_judge
    criteria: "Response creates four complete thought leadership pieces — a 25-minute keynote with opening hook and data; a 10-point manifesto with explanations; a 1,200-word industry article; a TEDx outline connecting real estate to universal human themes."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Content demonstrates genuine expertise and originality — the keynote uses compelling data and storytelling; the manifesto is principled not generic; the article makes a nuanced argument about AI; the TEDx talk transcends real estate to reveal broader truths."
    weight: 0.35
    description: "ExpertiseAndOriginality"
  - type: llm_judge
    criteria: "Each piece would influence its audience — the keynote would change how agents think about response; the manifesto would be adopted by brokerages; the article would reshape the AI conversation; the TEDx talk would make non-real-estate audiences care."
    weight: 0.30
    description: "AudienceInfluence"
