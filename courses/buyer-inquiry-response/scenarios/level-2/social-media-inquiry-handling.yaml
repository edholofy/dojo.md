meta:
  id: social-media-inquiry-handling
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Handle buyer inquiries across social media platforms — Facebook, Instagram, and TikTok with platform-appropriate responses"
  tags: [social-media, platform-specific, digital-marketing, intermediate]

state: {}

trigger: |
  You receive buyer inquiries on three different
  social media platforms. Write responses appropriate
  to each platform's culture and format.

  Platform 1: Facebook Comment
  On your listing post for a $349K ranch:
  "How much are the taxes? Is this near the highway?
  My mom lives on Elm Street, would be great to be
  close to her!"
  - Public comment visible to all followers
  - 23 other people have reacted to the post

  Platform 2: Instagram DM
  After your Reel showing a home tour:
  "That kitchen 😍 is this still available? What
  neighborhood is this in? Your content is amazing
  btw!"
  - Private message, informal tone expected
  - User has 2,400 followers, appears to be late 20s

  Platform 3: TikTok Comment
  On your "Day in the life of a realtor" video:
  "ok but how do u even afford a house in this
  economy 💀 asking for a friend (the friend is me)"
  - Public comment, casual/humorous tone expected
  - Video has 12K views and 340 likes

  For each, write:
  1. The public/DM response on the platform
  2. A follow-up message to move the conversation
     to a private channel (if public)
  3. Guidelines for what to share publicly vs privately

assertions:
  - type: llm_judge
    criteria: "Response provides platform-appropriate replies — Facebook gets a helpful public comment plus a private message suggestion; Instagram DM is warm and conversational; TikTok matches the casual/humorous tone while still being professional."
    weight: 0.35
    description: "PlatformAppropriateness"
  - type: llm_judge
    criteria: "Response demonstrates social media savvy — knows what to share publicly (general info, engagement) vs privately (specific pricing, personal details, scheduling); transitions from social to professional channels naturally."
    weight: 0.35
    description: "SocialMediaSavvy"
  - type: llm_judge
    criteria: "Responses would convert social media followers to leads — each moves the conversation toward a private channel and next steps without being pushy or breaking the platform's culture."
    weight: 0.30
    description: "SocialToLeadConversion"
