meta:
  id: video-response-scripts
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Write personalized video response scripts — use BombBomb-style video emails to stand out from text-only responses"
  tags: [video-response, personalization, differentiation, intermediate]

state: {}

trigger: |
  You're implementing video email responses (using
  BombBomb or similar) to differentiate from other
  agents. Video responses get 81% higher reply rates
  than text-only emails.

  Create video scripts for these 4 scenarios:

  Scenario 1: First Response to Zillow Lead
  "Angela M. inquired about 88 Sunrise Blvd ($425K,
  4 bed colonial). She's been saving your listings
  for 3 weeks on Zillow."
  - Video length: 60-90 seconds
  - Goal: Make a personal connection, stand out

  Scenario 2: Pre-Showing Introduction
  "The Martinez family is coming from out of state
  to see 5 properties this Saturday. They've never
  met you in person."
  - Video length: 90-120 seconds
  - Goal: Build trust before meeting

  Scenario 3: Post-Showing "Here's What I Noticed"
  "The Chens saw 3 houses today. They loved #2 but
  were concerned about the small backyard. They're
  'going to think about it.'"
  - Video length: 60-90 seconds
  - Goal: Re-engage with insights

  Scenario 4: Market Update for Nurture Leads
  "Monthly market update for 45 leads in your
  database who aren't actively searching yet."
  - Video length: 2-3 minutes
  - Goal: Stay top of mind, provide value

  For each script, include:
  1. Opening hook (first 5 seconds)
  2. Full script with visual cues (what to show)
  3. Call to action
  4. Email subject line and preview text

assertions:
  - type: llm_judge
    criteria: "Response creates four complete video scripts — each with a compelling 5-second opening hook, full script with visual cues, specific call to action, and email subject line with preview text."
    weight: 0.35
    description: "VideoScriptCompleteness"
  - type: llm_judge
    criteria: "Scripts are natural and personable — they sound like a real person talking to camera, not reading a formal letter; visual cues add value (showing the property, the neighborhood, market charts); and each matches its appropriate length."
    weight: 0.35
    description: "VideoNaturalness"
  - type: llm_judge
    criteria: "Videos would differentiate the agent and increase engagement — the first response would stand out from generic Zillow replies; the pre-showing video would build trust; the post-showing video would re-engage; the market update would nurture leads."
    weight: 0.30
    description: "DifferentiationEffectiveness"
