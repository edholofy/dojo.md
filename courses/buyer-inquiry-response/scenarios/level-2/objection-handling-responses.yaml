meta:
  id: objection-handling-responses
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Craft responses to common buyer objections — price concerns, market timing fears, and commitment hesitation"
  tags: [objection-handling, buyer-concerns, persuasion, intermediate]

state: {}

trigger: |
  You're preparing an objection-handling playbook
  for your real estate team. Write response templates
  for these 6 common buyer objections:

  Objection 1: "I think the market is going to crash.
  I want to wait."

  Objection 2: "We love the house but it's $30K over
  our budget. We can't go that high."

  Objection 3: "We want to keep looking. We've only
  seen 5 houses."

  Objection 4: "My parents think we should rent for
  another year."

  Objection 5: "We found a similar house on Zillow
  that's $40K cheaper in the next town."

  Objection 6: "We like the house but we're worried
  about the [nearby highway / power lines / busy
  street]."

  For each objection, provide:
  1. The empathetic acknowledgment
  2. The reframe or data point
  3. The question that moves forward
  4. The follow-up message if they're still hesitant

  Important: Responses must be honest and helpful,
  not manipulative. Never dismiss valid concerns.

assertions:
  - type: llm_judge
    criteria: "Response addresses all 6 objections with the four-part structure — empathetic acknowledgment, reframe/data point, forward-moving question, and hesitancy follow-up — for each one."
    weight: 0.35
    description: "ObjectionCoverage"
  - type: llm_judge
    criteria: "Responses are honest and respectful — market crash concerns get data not dismissal; budget limits are respected not pushed; the highway concern is acknowledged as valid; parents' advice is honored — no manipulation or high-pressure tactics."
    weight: 0.35
    description: "EthicalPersuasion"
  - type: llm_judge
    criteria: "Responses would actually help buyers make informed decisions — they provide useful data, ask thoughtful questions, and move conversations forward while respecting buyers' autonomy and timeline."
    weight: 0.30
    description: "DecisionSupportQuality"
