meta:
  id: competitive-situation-response
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer who is working with or considering other agents — differentiate without disparaging competitors"
  tags: [competitive, agent-differentiation, ethics, intermediate]

state: {}

trigger: |
  You receive these three inquiries from buyers
  who mention other agents. Write responses that
  differentiate you ethically.

  Inquiry 1: Currently with another agent
  "Hi, I've been working with an agent for 2 months
  but I'm frustrated — she never responds to my
  emails and I've missed out on 2 houses because she
  was slow. I'm not sure if I'm allowed to switch
  agents. Can you help? — Nicole"

  Inquiry 2: Comparing agents
  "I'm interviewing 3 agents before I choose one.
  What's your commission? How many houses did you
  sell last year? What makes you better than the
  other agents I'm talking to? — Raj"

  Inquiry 3: Using a discount brokerage
  "I signed up for Redfin but I'm not getting much
  personal attention. My Redfin agent has 40 clients.
  Would it be worth switching to a traditional agent?
  What would I get that's different? — Sarah"

  For each inquiry:
  1. Address their specific situation professionally
  2. Differentiate through value, not competitor
     criticism
  3. Handle the ethics of the situation (buyer
     agency agreements, non-disparagement)
  4. Propose a clear next step

assertions:
  - type: llm_judge
    criteria: "Response addresses all three competitive situations — Nicole's agency switch question, Raj's agent comparison, and Sarah's discount brokerage comparison — with appropriate ethical handling of buyer agency agreements and non-disparagement."
    weight: 0.35
    description: "CompetitiveSituationHandling"
  - type: llm_judge
    criteria: "Responses differentiate through positive value proposition — highlighting the agent's service, availability, communication style, and results — without criticizing or disparaging any competitor or business model."
    weight: 0.35
    description: "EthicalDifferentiation"
  - type: llm_judge
    criteria: "Responses would win the buyer's business — Nicole would feel confident switching; Raj would see clear value; Sarah would understand the difference — all through honest value presentation."
    weight: 0.30
    description: "CompetitiveWinRate"
