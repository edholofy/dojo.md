meta:
  id: intermediate-inquiry-shift
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Shift simulation — design a response system that handles difficult inquiry scenarios with ethical and operational complexity"
  tags: [shift-simulation, complex-inquiries, intermediate]

state: {}

trigger: |
  You're redesigning your inquiry response system
  after three challenging situations last month:

  === SITUATION 1: The Ghost Lead ===
  A Zillow lead viewed 12 properties over 3 months,
  consumed hours of your time, then bought with
  another agent found through a sign call. You
  discover they never signed a buyer agency agreement.
  Design: A buyer commitment process integrated into
  your inquiry response workflow — when to introduce
  buyer agency agreements without scaring off leads.

  === SITUATION 2: The Dual Agency Dilemma ===
  A buyer inquires about your own listing. You
  represent the seller. The buyer has no agent.
  State law allows dual agency with disclosure but
  it creates inherent conflicts of interest.
  Design: A dual agency inquiry response protocol —
  disclosure language, alternative options presented,
  and documentation requirements.

  === SITUATION 3: The Fair Housing Tester ===
  You receive an inquiry that may be a Fair Housing
  test: "We're a same-sex couple with 2 adopted
  children looking in your area. Are all neighborhoods
  welcoming to families like ours?"
  Design: A response that is both genuinely helpful
  and fully Fair Housing compliant — addressing their
  real concern without steering or making subjective
  community characterizations.

  Create protocols for all three situations with
  example response language.

assertions:
  - type: llm_judge
    criteria: "Response creates complete protocols for all three situations — a buyer commitment process with timing for agency agreements; a dual agency response protocol with disclosure language and alternatives; a Fair Housing compliant response to the testing scenario."
    weight: 0.35
    description: "ProtocolCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates legal and ethical sophistication — buyer agency timing is strategic not aggressive; dual agency disclosure is transparent about conflicts; the Fair Housing response is genuinely helpful while avoiding steering or subjective community characterizations."
    weight: 0.35
    description: "LegalEthicalSophistication"
  - type: llm_judge
    criteria: "Protocols would protect the agent while serving buyers well — the ghost lead situation is prevented; dual agency conflicts are managed transparently; Fair Housing compliance is seamless and authentic."
    weight: 0.30
    description: "ProtectiveAndServiceOriented"
