meta:
  id: buyer-persona-responses
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Customize inquiry responses for different buyer personas — adapt communication style, content, and cadence to personality types"
  tags: [buyer-personas, communication-styles, adaptability, intermediate]

state: {}

trigger: |
  You receive the same basic inquiry — "I'm looking
  for a 3-bedroom home under $400K" — from four
  different buyer personas. Write tailored responses
  for each:

  Persona 1: The Analytical Engineer
  "I've created a spreadsheet comparing 47 properties
  on 12 criteria. I need the exact square footage,
  price per square foot, HOA fees, property tax
  history for the last 5 years, and energy efficiency
  ratings for any listings you recommend. I've read
  3 books on home buying."

  Persona 2: The Emotional First-Timer
  "OMG I'm so excited! I just got pre-approved and I
  can finally buy my own place!! 🎉 I want something
  that FEELS like home — cozy, warm, maybe a
  fireplace? I cry at every house on HGTV lol"

  Persona 3: The Busy Executive
  "I need a house. 3 bed, under $400K, good schools,
  short commute to downtown. I have zero time to
  waste. Send me your top 3 picks and let's schedule
  showings for Saturday morning. — Sent from iPhone"

  Persona 4: The Skeptical Experienced Buyer
  "I've bought and sold 4 homes. The last 2 agents
  I worked with were terrible — pushy, didn't listen,
  and wasted my time with houses that didn't match
  what I asked for. What makes you different?"

  For each persona, write a response that matches
  their communication style, addresses their specific
  needs, and builds rapport.

assertions:
  - type: llm_judge
    criteria: "Response creates four distinctly different replies — the analytical buyer gets data and specifics; the emotional buyer gets warmth and excitement; the executive gets efficiency and action items; the skeptical buyer gets credibility and listening."
    weight: 0.35
    description: "PersonaAdaptation"
  - type: llm_judge
    criteria: "Each response matches the persona's communication style — data-heavy for the engineer; enthusiastic and warm for the first-timer; concise and action-oriented for the executive; respectful and earned-trust for the skeptic."
    weight: 0.35
    description: "StyleMatching"
  - type: llm_judge
    criteria: "Each response would resonate with its persona — the engineer would feel respected, the first-timer would feel supported, the executive would feel their time is valued, and the skeptic would be willing to give this agent a chance."
    weight: 0.30
    description: "PersonaResonance"
