meta:
  id: speed-to-lead-system
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Design a speed-to-lead response system — auto-responses, routing rules, and response time benchmarks for a real estate team"
  tags: [speed-to-lead, automation, response-time, intermediate]

state: {}

trigger: |
  You're the team leader for a 6-agent real estate
  team that receives 120+ buyer inquiries per month
  from multiple sources. Your current average response
  time is 4.2 hours — far above the industry-best
  5-minute benchmark.

  Inquiry sources and volumes:
  - Zillow: 45/month (highest intent)
  - Realtor.com: 25/month
  - Team website: 20/month
  - Social media DMs: 15/month
  - Referrals: 10/month
  - Sign calls/texts: 5/month

  Team structure:
  - 2 senior agents (luxury focus, $500K+)
  - 3 mid-level agents (general residential)
  - 1 new agent (eager, available, needs training)
  - ISA (Inside Sales Agent) available 9 AM - 9 PM

  Design a complete speed-to-lead system:
  1. Response time standards by source and urgency
  2. Auto-response templates (immediate sends)
  3. Lead routing rules (who gets what, when)
  4. After-hours coverage plan
  5. Escalation procedures for missed response windows
  6. KPI dashboard metrics to track

assertions:
  - type: llm_judge
    criteria: "Response creates a complete speed-to-lead system — response time standards for each source; auto-response templates; lead routing rules matching agent expertise and availability; after-hours plan; escalation procedures; KPI metrics."
    weight: 0.35
    description: "SystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates real estate operations expertise — routing matches agent skills to lead types (luxury leads to senior agents), ISA role is properly utilized, after-hours coverage is realistic, and KPIs are measurable."
    weight: 0.35
    description: "OperationalExpertise"
  - type: llm_judge
    criteria: "Response would reduce the team's 4.2-hour average response time to under 15 minutes — the automation handles immediate acknowledgment, routing ensures appropriate agents respond quickly, and escalation prevents leads from going cold."
    weight: 0.30
    description: "ResponseTimeImprovement"
