meta:
  id: drip-campaign-sequences
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Design email drip campaigns for different buyer segments — first-time buyers, relocators, and investors with tailored content sequences"
  tags: [drip-campaign, email-sequences, segmentation, intermediate]

state: {}

trigger: |
  You're building automated email drip campaigns for
  three buyer segments. Each campaign runs for 30
  days after initial inquiry.

  Segment 1: First-Time Home Buyers
  - Typically nervous, need education
  - Budget: $200-350K
  - Timeline: 3-6 months
  - Key concerns: process confusion, affordability,
    qualifying for a mortgage

  Segment 2: Corporate Relocators
  - Moving for work, time-pressured
  - Budget: $350-550K
  - Timeline: 30-90 days
  - Key concerns: finding the right area quickly,
    schools, commute, temporary housing

  Segment 3: Real Estate Investors
  - Numbers-driven, analytical
  - Budget: $150-400K per property
  - Timeline: Ongoing / opportunistic
  - Key concerns: cap rates, cash flow, market
    trends, property management

  For each segment, design:
  1. 8-email sequence over 30 days with:
     - Send day and subject line
     - Content summary (2-3 sentences)
     - Call to action
  2. SMS touchpoints interspersed between emails
  3. Trigger events that accelerate the sequence

assertions:
  - type: llm_judge
    criteria: "Response creates three complete 8-email sequences — each with specific send days, subject lines, content summaries, and calls to action — plus SMS touchpoints and trigger events for all three buyer segments."
    weight: 0.35
    description: "SequenceCompleteness"
  - type: llm_judge
    criteria: "Content is segment-appropriate — first-time buyers get educational content about the buying process; relocators get area guides, school info, and timeline-driven urgency; investors get market data, ROI analysis, and deal alerts."
    weight: 0.35
    description: "SegmentRelevance"
  - type: llm_judge
    criteria: "The campaigns would nurture leads effectively — email cadence is realistic (not daily spam), content builds progressively, trigger events respond to buyer behavior, and CTAs escalate naturally from education to action."
    weight: 0.30
    description: "NurturingEffectiveness"
