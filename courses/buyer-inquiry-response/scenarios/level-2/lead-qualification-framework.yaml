meta:
  id: lead-qualification-framework
  level: 2
  course: buyer-inquiry-response
  type: output
  description: "Build a buyer lead qualification framework — scoring criteria, qualifying questions, and response templates by lead quality"
  tags: [lead-qualification, scoring, BANT, intermediate]

state: {}

trigger: |
  You're creating a lead qualification system for
  your brokerage. Currently, agents spend equal time
  on all inquiries regardless of quality, resulting
  in burned-out agents and poor conversion rates
  (2.1% inquiry-to-close).

  Design a buyer lead qualification framework:

  1. Lead scoring model (0-100 points) based on:
     - Budget clarity and pre-approval status
     - Timeline to purchase
     - Motivation level and specificity
     - Communication responsiveness
     - Geographic match to your market

  2. Lead tiers based on score:
     - Hot (80-100): Immediate personal attention
     - Warm (50-79): Structured follow-up sequence
     - Cool (25-49): Automated nurture campaign
     - Cold (0-24): Monthly drip, minimal effort

  3. For each tier, create:
     - Qualifying questions to ask
     - Response template
     - Follow-up cadence
     - Escalation/downgrade triggers

  4. Include 4 example buyer profiles and score them

assertions:
  - type: llm_judge
    criteria: "Response creates a complete scoring model — clear point values for budget, timeline, motivation, responsiveness, and geographic factors — with defined tier thresholds and realistic scoring that would differentiate leads effectively."
    weight: 0.35
    description: "ScoringModelQuality"
  - type: llm_judge
    criteria: "Each tier has appropriate response strategies — hot leads get immediate personal attention with specific qualifying questions; warm leads get structured sequences; cool leads get automated nurture; cold leads get minimal drip — with clear escalation and downgrade triggers."
    weight: 0.35
    description: "TierStrategyQuality"
  - type: llm_judge
    criteria: "The 4 example buyer profiles demonstrate the scoring system in action — profiles span different tiers, scoring is consistent with the model, and the system would improve the 2.1% conversion rate by focusing agent time on highest-quality leads."
    weight: 0.30
    description: "PracticalApplication"
