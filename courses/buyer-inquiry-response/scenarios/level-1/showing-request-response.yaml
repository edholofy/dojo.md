meta:
  id: showing-request-response
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer's showing request — confirm availability, provide logistics, and set expectations"
  tags: [showing-request, scheduling, buyer-response, beginner]

state: {}

trigger: |
  You're a real estate agent and received this text
  message from a new lead:

  "Hey, I'd like to see the house on Oak Street that's
  listed for $299K. Are you available this weekend?
  - Mike"

  Property: 18 Oak Street
  - 3 bed / 1.5 bath ranch
  - Listed at $299,000 (12 days on market)
  - Seller-occupied (requires 24-hour notice)
  - Open house scheduled Saturday 1-3 PM
  - You have availability: Saturday 10 AM or Sunday
    2 PM for private showings

  Write a text message response that:
  1. Confirms the property and thanks Mike
  2. Offers specific showing times (including the
     open house option)
  3. Asks a qualifying question naturally
  4. Provides the property address and any prep info
  5. Keeps the tone appropriate for text messaging
     (concise but professional)

assertions:
  - type: llm_judge
    criteria: "Response confirms the correct property, offers specific available times including Saturday 10 AM, Sunday 2 PM, and mentions the Saturday 1-3 PM open house option."
    weight: 0.35
    description: "ShowingLogisticsAccuracy"
  - type: llm_judge
    criteria: "Response is appropriately concise for text messaging — not a full email, includes a natural qualifying question (pre-approval, working with an agent, timeline), and maintains professional warmth."
    weight: 0.35
    description: "ChannelAppropriateness"
  - type: llm_judge
    criteria: "Response would secure a showing appointment — it makes scheduling easy, conveys enthusiasm without pressure, and begins the relationship-building process."
    weight: 0.30
    description: "AppointmentConversion"
