meta:
  id: neighborhood-question-response
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer's neighborhood questions — provide area information while maintaining Fair Housing compliance"
  tags: [neighborhood, fair-housing, area-info, beginner]

state: {}

trigger: |
  You're a buyer's agent who received this email from
  a relocating family:

  "We're moving from Denver to your area for my wife's
  new job. We have two kids (ages 7 and 10) and are
  looking at homes in the $350-450K range. Can you
  tell us about the neighborhoods where your listings
  are? We want to know about schools, safety, and
  what kind of people live there. Thanks, David R."

  You have listings in three neighborhoods:
  - Riverside: Near top-rated elementary (9/10 on
    GreatSchools), parks, family-friendly amenities
  - Downtown: Walkable, restaurants, nightlife,
    newer condos and townhomes
  - Meadowbrook: Larger lots, quiet streets,
    community pool, established neighborhood

  Important: David's question about "what kind of
  people live there" is a Fair Housing red flag. You
  cannot describe demographics, race, religion,
  national origin, or familial status of residents.

  Write a response that:
  1. Welcomes David's family warmly
  2. Describes each neighborhood by amenities and
     features (NOT demographics)
  3. Redirects the "what kind of people" question
     appropriately
  4. Provides objective school information sources
  5. Suggests next steps

assertions:
  - type: llm_judge
    criteria: "Response describes all three neighborhoods using amenities, features, and lifestyle characteristics — NOT demographics, and appropriately redirects the 'what kind of people live there' question without making David feel accused or uncomfortable."
    weight: 0.35
    description: "FairHousingCompliance"
  - type: llm_judge
    criteria: "Response is helpful and welcoming — provides genuinely useful neighborhood information, directs to objective school resources like GreatSchools.org, and acknowledges the relocation context."
    weight: 0.35
    description: "HelpfulInformation"
  - type: llm_judge
    criteria: "Response would build trust with a relocating family — it demonstrates local expertise, makes the family feel welcomed, and naturally moves toward scheduling property tours in relevant neighborhoods."
    weight: 0.30
    description: "TrustBuildingEffectiveness"
