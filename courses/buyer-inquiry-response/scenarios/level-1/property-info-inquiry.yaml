meta:
  id: property-info-inquiry
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer's basic property information inquiry — address specific questions about bedrooms, square footage, and lot size"
  tags: [property-info, basic-inquiry, buyer-response, beginner]

state: {}

trigger: |
  You're a real estate agent who just received this
  inquiry through Zillow about your listing at
  742 Maple Drive:

  "Hi, I saw your listing for 742 Maple Drive. Can
  you tell me how many bedrooms it has, the total
  square footage, and the lot size? Also, is the
  basement finished? Thanks, Sarah M."

  Property details:
  - 4 bedrooms, 2.5 bathrooms
  - 2,450 sq ft living space
  - 0.32-acre lot (13,939 sq ft)
  - Partially finished basement (rec room finished,
    utility area unfinished)
  - Listed at $385,000
  - Built 2004, updated kitchen 2021

  Write a response to Sarah that:
  1. Answers all her specific questions
  2. Proactively shares 2-3 additional relevant details
  3. Invites her to schedule a showing
  4. Includes your contact information

assertions:
  - type: llm_judge
    criteria: "Response answers all four of Sarah's questions — bedroom count, square footage, lot size, and basement status — accurately using the provided property details."
    weight: 0.35
    description: "QuestionAnsweringAccuracy"
  - type: llm_judge
    criteria: "Response is professional and warm — uses Sarah's name, provides 2-3 proactive details beyond what was asked, and invites her to schedule a showing with clear next steps."
    weight: 0.35
    description: "ProfessionalEngagement"
  - type: llm_judge
    criteria: "Response would convert an inquiry to a showing — it builds interest without being pushy, demonstrates knowledge of the property, and makes scheduling easy."
    weight: 0.30
    description: "ConversionEffectiveness"
