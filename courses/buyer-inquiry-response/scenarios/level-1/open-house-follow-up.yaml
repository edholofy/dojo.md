meta:
  id: open-house-follow-up
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Write follow-up messages to buyers who attended an open house — segment by interest level and personalize outreach"
  tags: [open-house, follow-up, segmentation, beginner]

state: {}

trigger: |
  You hosted an open house at 320 Willow Lane
  ($375,000, 3 bed/2 bath, updated ranch). Twelve
  visitors signed in. Write follow-up messages for
  these three visitors:

  Visitor 1 — High Interest:
  "Rachel K. — Spent 45 minutes, asked about the
  furnace age, roof warranty, and whether sellers
  would negotiate. Said she's pre-approved and
  looking to move within 60 days."

  Visitor 2 — Moderate Interest:
  "James & Priya D. — Toured for 20 minutes, liked
  the backyard but said the kitchen felt small. Asked
  about nearby listings with larger kitchens. First
  time at an open house."

  Visitor 3 — Low Interest / Neighbor:
  "Bob H. — Lives two doors down, stayed 10 minutes,
  said he was 'just curious about the price.' Mentioned
  his daughter might be looking to buy soon."

  Write personalized follow-up emails for each
  visitor, tailored to their interest level, with
  appropriate calls to action.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct follow-up emails appropriately tailored to each interest level — Rachel gets urgency and next steps toward an offer; James & Priya get alternative listings with larger kitchens; Bob gets a gentle referral ask about his daughter."
    weight: 0.35
    description: "SegmentedFollowUp"
  - type: llm_judge
    criteria: "Each email references specific details from the open house interaction — furnace/roof for Rachel, kitchen concern for James & Priya, daughter for Bob — demonstrating attentive listening and personalization."
    weight: 0.35
    description: "PersonalizationQuality"
  - type: llm_judge
    criteria: "Each email would achieve its conversion goal — Rachel moves toward scheduling a second showing or making an offer; James & Priya engage with alternative listings; Bob refers his daughter — without any feeling overly aggressive."
    weight: 0.30
    description: "ConversionBySegment"
