meta:
  id: online-chat-inquiry
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Handle a live chat inquiry on your website — respond in real-time conversational format while qualifying the lead"
  tags: [live-chat, real-time, lead-qualification, beginner]

state: {}

trigger: |
  A visitor on your real estate website initiates a
  live chat. Write your side of the conversation
  (5-7 agent responses) based on the following
  visitor messages:

  Visitor message 1: "Hi, are you available?"

  Visitor message 2: "I'm looking for a 3-bedroom
  home under $400K. Do you have anything?"

  Visitor message 3: "We need good schools for our
  kids. We're in no rush, maybe 6 months."

  Visitor message 4: "What areas do you recommend?"

  Visitor message 5: "Can you send me some listings
  to look at?"

  Your market knowledge:
  - Oakridge: 3-bed homes $350-420K, schools rated
    8-9/10, 15 min to downtown
  - Willowbrook: 3-bed homes $310-380K, schools
    rated 7-8/10, newer construction
  - Cedar Hills: 3-bed homes $280-350K, schools
    rated 6-7/10, larger lots

  Write your chat responses that:
  1. Are conversational and concise (chat-appropriate)
  2. Naturally qualify the buyer (budget confirmed,
     timeline, needs)
  3. Provide helpful neighborhood guidance without
     Fair Housing issues
  4. Move toward capturing contact information
  5. Set up a next step (email listings, phone call,
     or meeting)

assertions:
  - type: llm_judge
    criteria: "Agent responses are appropriately concise for live chat — short paragraphs, conversational tone, no long-form email-style replies — while covering all five visitor messages with relevant, helpful answers."
    weight: 0.35
    description: "ChatFormatAppropriateness"
  - type: llm_judge
    criteria: "Agent naturally qualifies the buyer through the conversation — confirms budget, notes the 6-month timeline, identifies school priority — and describes neighborhoods by amenities and features, not demographics."
    weight: 0.35
    description: "NaturalQualification"
  - type: llm_judge
    criteria: "Chat conversation would convert the visitor to a lead — it captures or requests contact information, proposes a concrete next step, and builds enough rapport that the visitor wants to continue the relationship."
    weight: 0.30
    description: "ChatToLeadConversion"
