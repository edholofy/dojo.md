meta:
  id: price-reduction-inquiry
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer asking about a price reduction — explain the adjustment and rekindle interest"
  tags: [price-reduction, buyer-interest, re-engagement, beginner]

state: {}

trigger: |
  You're a listing agent who just reduced the price
  on a property. A buyer who viewed it 3 weeks ago
  sends this email:

  "Hi, I noticed the price dropped on 55 Cedar Lane.
  We liked the house when we saw it but thought it
  was overpriced. What's the new price and why was
  it reduced? Is there something wrong with the
  house? — Jennifer & Tom P."

  Property: 55 Cedar Lane
  - Originally listed at $425,000
  - Reduced to $399,900 (5.9% reduction)
  - 4 bed / 2.5 bath colonial, 2,800 sq ft
  - 45 days on market
  - Reason: Market adjustment — comparable homes
    in area selling at $390K-$410K range
  - No inspection issues or defects
  - Sellers motivated (relocating for work in 60 days)
  - New comp sold last week: similar home at $405K

  Write a response that:
  1. Addresses their concern about "something wrong"
  2. Explains the price reduction honestly
  3. Creates urgency without being manipulative
  4. Invites them back for a second showing

assertions:
  - type: llm_judge
    criteria: "Response honestly explains the price reduction as a market adjustment — references comparable sales, addresses the 'something wrong' concern directly, and maintains credibility without being defensive."
    weight: 0.35
    description: "HonestExplanation"
  - type: llm_judge
    criteria: "Response creates appropriate urgency — mentions seller motivation, the competitive new price point relative to comps, and the value opportunity without using high-pressure tactics."
    weight: 0.35
    description: "UrgencyWithIntegrity"
  - type: llm_judge
    criteria: "Response would re-engage the buyers — it validates their initial instinct about pricing, positions the reduction positively, and makes a second showing feel like the natural next step."
    weight: 0.30
    description: "ReEngagementEffectiveness"
