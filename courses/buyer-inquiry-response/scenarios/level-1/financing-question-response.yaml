meta:
  id: financing-question-response
  level: 1
  course: buyer-inquiry-response
  type: output
  description: "Respond to a buyer's financing questions — provide general guidance without acting as a mortgage advisor"
  tags: [financing, mortgage-questions, lender-referral, beginner]

state: {}

trigger: |
  You're a real estate agent who received this
  inquiry through your website:

  "I'm interested in buying my first home in your
  area. I make about $65K/year and have $15K saved.
  I'm not sure if I can afford anything or what
  kind of loan I should get. Can you help me
  understand my options? — Marcus J."

  Your knowledge:
  - FHA loans require 3.5% down with 580+ credit
  - Conventional loans: 3-20% down
  - USDA loans: 0% down for rural areas (some of
    your listings qualify)
  - State first-time buyer program: up to $10K in
    down payment assistance
  - You are NOT a licensed mortgage professional
  - You have 3 trusted lender partners you can refer

  Write a response that:
  1. Encourages Marcus about his home-buying potential
  2. Provides general (not specific) financing info
  3. Clearly states you're not a mortgage professional
  4. Recommends getting pre-approved with a lender
  5. Offers to connect him with trusted lender partners
  6. Maintains appropriate scope (no specific rate
     quotes or qualification calculations)

assertions:
  - type: llm_judge
    criteria: "Response provides helpful general financing information — mentions loan types and the first-time buyer program — while clearly disclaiming that the agent is not a mortgage professional and avoiding specific rate quotes or qualification calculations."
    weight: 0.35
    description: "AppropriateFinancingGuidance"
  - type: llm_judge
    criteria: "Response is encouraging and empowering — makes Marcus feel his homeownership goal is achievable, recommends pre-approval as the logical next step, and offers lender referrals."
    weight: 0.35
    description: "EncouragingTone"
  - type: llm_judge
    criteria: "Response would move Marcus toward becoming a client — it builds confidence, provides a clear path forward (pre-approval then home search), and positions the agent as a knowledgeable guide."
    weight: 0.30
    description: "LeadNurturingEffectiveness"
