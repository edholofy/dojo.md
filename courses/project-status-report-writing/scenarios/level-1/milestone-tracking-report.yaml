meta:
  id: milestone-tracking-report
  level: 1
  course: project-status-report-writing
  type: output
  description: "Milestone tracking report — create a report focused on milestone progress, completion dates, and timeline adherence"
  tags: [milestones, timeline, tracking, progress, beginner]

state: {}

trigger: |
  You're a project coordinator for an office relocation
  project. The VP of Operations wants a milestone tracking
  report showing where each milestone stands. She's very
  detail-oriented and wants to see planned vs actual dates.

  Project: Office Relocation — Moving from Building A to
  Building B
  Project Duration: January 6 - April 30, 2026
  Today's Date: March 3, 2026

  Milestones:

  1. Space Planning Complete
     Planned: Jan 20 | Actual: Jan 22 (2 days late)
     Status: COMPLETE
     Notes: Minor delay due to architect availability

  2. IT Infrastructure Design Approved
     Planned: Feb 3 | Actual: Feb 3
     Status: COMPLETE
     Notes: On time

  3. Vendor Contracts Signed (movers, furniture, IT cabling)
     Planned: Feb 14 | Actual: Feb 21 (7 days late)
     Status: COMPLETE
     Notes: Legal review took longer than expected on the
     furniture vendor contract due to liability clause
     negotiations

  4. Furniture Order Placed
     Planned: Feb 17 | Actual: Feb 24 (7 days late — cascaded
     from Milestone 3)
     Status: COMPLETE
     Notes: 7-day delay cascaded from vendor contract delay.
     Furniture delivery now expected March 28 instead of
     March 21

  5. IT Cabling Installation
     Planned: Feb 24 - Mar 14 | Actual Start: Feb 24
     Status: IN PROGRESS (60% complete)
     Notes: On track for Mar 14 completion. No issues.

  6. Old Office Packing
     Planned: Mar 10 - Mar 21
     Status: NOT STARTED (on schedule — starts next week)
     Notes: Packing supplies ordered and arriving Mar 8

  7. Furniture Delivery & Setup
     Planned: Mar 21 - Mar 28 | Revised: Mar 28 - Apr 4
     Status: NOT STARTED
     Notes: Delayed 7 days due to cascaded vendor delay.
     This pushes into the moving weekend window.

  8. Physical Move
     Planned: Mar 28-29 (weekend) | Revised: Apr 4-5
     Status: NOT STARTED
     Notes: Move weekend shifted 1 week. Movers confirmed
     new date is available.

  9. Post-Move IT Setup & Testing
     Planned: Mar 30 - Apr 7 | Revised: Apr 6 - Apr 13
     Status: NOT STARTED

  10. Full Operations in New Office
      Planned: Apr 7 | Revised: Apr 14
      Status: NOT STARTED
      Notes: 7-day delay to full operations. Still within
      the Apr 30 project deadline.

  Task: Create the milestone tracking report.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear milestone tracking report — presents all 10 milestones with planned dates, actual/revised dates, status (complete/in progress/not started), and whether each is on time, delayed, or at risk; makes the cascading delay pattern clear (Milestone 3 delay cascaded through 4, 7, 8, 9, 10); includes an overall project timeline assessment (7-day delay but still within the April 30 deadline); uses a format that allows quick visual scanning of milestone status (table or structured list with consistent formatting)."
    weight: 0.35
    description: "MilestoneTracking"
  - type: llm_judge
    criteria: "Response communicates the delay impact clearly — shows the original planned completion (April 7) vs revised completion (April 14); explains the root cause (legal review on furniture vendor contract) and how it cascaded; highlights that despite the 7-day delay, the project remains within the April 30 deadline with 16 days of buffer; identifies any remaining risks to the revised timeline; presents this information in a way that a VP can quickly understand the situation."
    weight: 0.35
    description: "DelayImpactAnalysis"
  - type: llm_judge
    criteria: "Response includes forward-looking elements — identifies upcoming activities for the next reporting period; flags any dependencies or risks for upcoming milestones; notes the reduced buffer (16 days remaining vs original 23 days); the report is suitable for an executive audience who wants both the current status and the outlook."
    weight: 0.30
    description: "ForwardLooking"
