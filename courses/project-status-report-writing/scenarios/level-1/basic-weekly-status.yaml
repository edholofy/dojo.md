meta:
  id: basic-weekly-status
  level: 1
  course: project-status-report-writing
  type: output
  description: "Basic weekly status report — create a clear, structured weekly project status report for a small team project"
  tags: [weekly, basic, team, status, beginner]

state: {}

trigger: |
  You're a junior project coordinator. Your manager asked you
  to write a weekly status report for the team's website
  redesign project. This is your first time writing one.

  Project: Corporate Website Redesign
  Week: Week 4 of 12
  Team: 5 people (1 PM, 2 developers, 1 designer, 1 content writer)

  What happened this week:
  - Designer (Anna) completed the homepage mockup and it was
    approved by the marketing director on Tuesday
  - Developer (Ben) finished the header and footer components
    (was supposed to be done last week — delayed 3 days due
    to a browser compatibility issue with Safari)
  - Developer (Carlos) is working on the product pages
    template. He's about 60% done and expects to finish by
    Wednesday next week
  - Content writer (Diana) has drafted content for the About
    page and Team page. She's waiting on headshots from HR
    (requested last week, no response yet)
  - You set up the staging environment on Tuesday

  Overall status: On track but tight. The 3-day delay on
  header/footer was absorbed by the schedule buffer, but
  there's no more buffer left.

  Next week's plan:
  - Anna starts the product page designs
  - Ben begins integrating the CMS
  - Carlos finishes product page template
  - Diana needs headshots to finalize Team page
  - You need to schedule the mid-project review meeting

  Task: Write the weekly status report.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear, well-structured weekly status report — includes essential elements: project name, reporting period (Week 4 of 12), overall status indicator (on track/at risk/off track), and a progress summary; organizes content logically with sections for accomplishments, upcoming work, and issues/risks; uses concise, factual language; is scannable with headers and bullet points; appropriate length for a weekly update (not a novel, not a one-liner)."
    weight: 0.35
    description: "BasicStructure"
  - type: llm_judge
    criteria: "Response accurately captures progress and issues — documents what was completed (homepage mockup approved, header/footer components done, staging environment set up); documents what's in progress (product pages template 60%, About/Team page content drafted); identifies the delay honestly (header/footer 3-day delay, cause: Safari compatibility) and its impact (schedule buffer consumed); flags the blocker (HR headshots not received) with context (requested last week, no response); communicates overall status accurately (on track but tight, no remaining buffer)."
    weight: 0.35
    description: "AccurateContent"
  - type: llm_judge
    criteria: "Response includes forward-looking elements — lists next week's planned activities with owners; identifies risks or concerns for the upcoming period (no schedule buffer remaining, headshot dependency); the report helps the reader understand not just where the project is, but where it's going; includes any needed decisions or help requests (headshot follow-up)."
    weight: 0.30
    description: "ForwardLooking"
