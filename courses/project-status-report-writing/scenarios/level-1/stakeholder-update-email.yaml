meta:
  id: stakeholder-update-email
  level: 1
  course: project-status-report-writing
  type: output
  description: "Stakeholder update email — write a concise project status update email for stakeholders who don't want to read a full report"
  tags: [email, stakeholder, concise, update, beginner]

state: {}

trigger: |
  You're managing a CRM implementation project. The VP of
  Sales (your main stakeholder) told you: "I don't read long
  reports. Just email me what I need to know — 30 seconds
  max." Write the weekly status update email.

  Project: Salesforce CRM Implementation
  Timeline: 6-month project, currently in Month 3
  Budget: $500K (on track)
  Team: 4 internal + 3 Salesforce consultants

  This week's key items:
  - Data migration test #1 completed. 94% of records migrated
    successfully. The 6% failures are due to incomplete phone
    number formatting in the legacy system. Fix estimated at
    2 days.
  - User acceptance testing (UAT) starts next Monday with 8
    sales reps from the pilot group
  - The custom reporting dashboard the VP specifically
    requested is ready for her review. You need 30 minutes
    of her time to walk through it.
  - Training schedule published for all 45 sales reps —
    3 sessions over 2 weeks starting March 17
  - One concern: 2 of the 3 Salesforce consultants are ending
    their contract in 4 weeks. You need to either extend them
    or ensure knowledge transfer is complete by then. You're
    requesting a decision on extension by Friday.

  Task: Write the status update email for the VP of Sales.

assertions:
  - type: llm_judge
    criteria: "Response creates a concise, scannable email — the email can be read in 30 seconds or less; uses a clear subject line that conveys the status; uses bullet points, bold text, or other formatting for rapid scanning; leads with the most important items first; does not include unnecessary background or context the VP already knows; the tone is professional but not overly formal — this is a working relationship communication."
    weight: 0.35
    description: "ConciseEmail"
  - type: llm_judge
    criteria: "Response includes all key items appropriately — mentions the data migration success (94%) with the fix plan for the 6% failures; flags UAT starting next Monday; highlights the custom dashboard being ready for review (this is something the VP personally requested — make it prominent); mentions the training schedule; clearly calls out the consultant extension decision needed by Friday — this is an ask, not just information; distinguishes between FYI items and items requiring VP action."
    weight: 0.35
    description: "KeyItemCoverage"
  - type: llm_judge
    criteria: "Response makes action items clear — the VP should know exactly what she needs to do after reading: schedule 30 minutes for dashboard review, decide on consultant extension by Friday; these asks are prominent and not buried; the email uses a structure that makes action items stand out from informational updates; the overall status (Month 3 of 6, on budget, on track) is communicated without a separate section for it."
    weight: 0.30
    description: "ClearActionItems"
