meta:
  id: project-completion-report
  level: 1
  course: project-status-report-writing
  type: output
  description: "Project completion report — create a final status report summarizing a completed project's outcomes vs original plan"
  tags: [completion, closeout, final, retrospective, beginner]

state: {}

trigger: |
  Your project just finished. Your manager wants a final
  completion report to close out the project formally.

  Project: Employee Onboarding Portal
  Original Timeline: August 1 - November 30, 2025 (4 months)
  Actual Timeline: August 1 - December 19, 2025 (4.5 months)
  Original Budget: $85,000
  Final Cost: $91,200

  What was delivered:
  - New employee onboarding portal with self-service features
  - Automated document collection (offer letters, tax forms,
    ID verification)
  - Manager onboarding checklist with automated reminders
  - Integration with the HRIS system (Workday)
  - Employee handbook acknowledgment tracking
  - IT equipment request automation

  What was cut from scope:
  - Buddy/mentor matching feature (deferred to Phase 2)
  - Mobile app version (deferred to Phase 2)
  Reason: Timeline pressure. These features weren't critical
  for launch and the team agreed to defer them.

  Schedule performance:
  - Milestone 1 (Design): On time
  - Milestone 2 (Backend): 1 week late (Workday API was
    poorly documented, integration took longer than expected)
  - Milestone 3 (Frontend): On time (team parallelized with
    backend catch-up)
  - Milestone 4 (QA): 2 weeks late (found critical security
    vulnerability in document upload — required redesign of
    file handling)
  - Milestone 5 (Launch): 19 days late (net effect of delays)

  Budget performance:
  - Development: $52,000 (planned $48,000) — over due to
    Workday integration complexity and security fix
  - Design: $12,000 (planned $12,000) — on budget
  - QA: $15,200 (planned $10,000) — over due to extended
    testing after security fix
  - Infrastructure: $8,000 (planned $8,000) — on budget
  - Project management: $4,000 (planned $7,000) — under budget

  Results (first 30 days post-launch):
  - 34 new employees onboarded using the portal
  - Average onboarding time reduced from 5 days to 1.5 days
  - HR team reports saving approximately 8 hours per week
  - Employee satisfaction with onboarding: 4.3/5 (previous:
    3.1/5)
  - 2 minor bugs reported and fixed in the first week
  - Zero security incidents

  Lessons learned:
  - The Workday API integration should have been prototyped
    during the design phase, not discovered during build
  - Security review should happen earlier in the process
  - Scope cuts (buddy matching, mobile) were the right call
    to protect the launch date

  Task: Create the project completion report.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive project completion report — includes project overview, timeline comparison (planned vs actual), budget comparison (planned vs actual with variance by category), scope delivered vs deferred, key metrics/results, and lessons learned; presents the project honestly — acknowledges the 19-day delay and $6,200 overage without defensiveness but also highlights the successful outcomes (onboarding time reduction, satisfaction improvement, HR time savings); uses a professional format suitable for project closure documentation."
    weight: 0.35
    description: "CompletionReport"
  - type: llm_judge
    criteria: "Response presents outcomes and value delivered — highlights the measurable results (5 days to 1.5 days onboarding, 8 hours/week HR savings, 4.3/5 satisfaction vs 3.1/5 baseline); puts the budget overage in context (7.3% over budget with significant scope delivered and measurable ROI); notes the zero security incidents as validation of the security fix investment; mentions the 34 employees successfully onboarded in the first month; the report makes a case for the project's value despite being late and over budget."
    weight: 0.35
    description: "ValueDelivered"
  - type: llm_judge
    criteria: "Response includes forward-looking recommendations — documents Phase 2 scope (buddy matching, mobile app) as next steps; includes lessons learned in a constructive way that can be applied to future projects; recommends process improvements (earlier API prototyping, earlier security review); the report serves as both a closure document and a reference for future similar projects."
    weight: 0.30
    description: "LessonsAndNextSteps"
