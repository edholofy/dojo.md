meta:
  id: blockers-and-risks-report
  level: 1
  course: project-status-report-writing
  type: output
  description: "Blockers and risks report — identify, document, and communicate project blockers and risks with appropriate urgency and recommended actions"
  tags: [blockers, risks, escalation, issues, beginner]

state: {}

trigger: |
  You're a project manager for a marketing campaign launch.
  Your director does a weekly "blockers review" and wants a
  clear report on current blockers and risks. The project is
  for launching a new product marketing campaign in 3 weeks.

  Current Blockers (things stopping work right now):

  1. Legal Approval: The campaign tagline "Nothing Works
     Better" needs legal review for comparative advertising
     claims. Legal has had it for 8 business days (SLA is 5
     days). You've followed up twice. The entire print design
     is on hold waiting for this approval.
     Impact: Print materials can't go to production. Print
     needs 10 business days for production. You now have 15
     business days until launch.

  2. Brand Photography: The photoshoot was scheduled for last
     Friday but was cancelled because the product prototype
     wasn't ready. Manufacturing says the prototype will be
     ready this Wednesday. You need to reschedule the shoot
     and then it takes 3 days for photo editing.
     Impact: No product photos for digital ads, social media,
     or the landing page.

  Current Risks (things that could become blockers):

  1. Social Media Budget: The $50K social media ad budget has
     not been approved by Finance. The request was submitted
     2 weeks ago. Without it, you can't book ad placements.
     Ad platforms need 5 business days notice for premium
     placements. You have 15 business days until launch.
     Probability: Medium. Finance usually approves but they're
     in quarterly close right now.
     Impact if realized: No paid social media for launch.

  2. Influencer Contract: One of the 3 influencers (the one
     with the largest following — 500K) hasn't signed their
     contract. Their agent is negotiating for higher
     compensation. If they don't sign by next Friday, you
     lose the posting window.
     Probability: Medium-High. The agent has been difficult.
     Impact if realized: Lose the highest-reach influencer
     placement.

  3. Landing Page: The developer assigned to the landing page
     has been pulled onto a production bug fix. He was
     supposed to start the landing page Monday. His manager
     says "maybe 2-3 more days on the bug." The landing page
     needs 5 days of development plus 2 days of QA.
     Probability: High. He's already been reassigned.
     Impact if realized: Landing page delayed, possibly not
     ready for launch.

  Task: Create the blockers and risks report.

assertions:
  - type: llm_judge
    criteria: "Response clearly distinguishes between blockers and risks — separates current blockers (things stopping work NOW) from risks (things that COULD stop work); for each blocker: describes the issue, how long it's been blocked, what's been done so far, impact on the project, and recommended action to unblock; for each risk: describes the potential issue, probability, impact if realized, and recommended mitigation; uses appropriate urgency language (blockers are more urgent than risks)."
    weight: 0.35
    description: "BlockerRiskDistinction"
  - type: llm_judge
    criteria: "Response includes timeline analysis and recommended actions — calculates the timeline math for each item (e.g., legal approval + print production = 15 days needed, 15 days available = zero margin); provides specific recommended actions for each blocker (escalate legal approval to director level, reschedule photoshoot for Thursday/Friday); provides mitigation actions for each risk (escalate budget approval, set deadline for influencer agent, request developer be returned or find alternative); makes clear which items need the director's intervention vs what the PM can handle alone."
    weight: 0.35
    description: "ActionsAndTimeline"
  - type: llm_judge
    criteria: "Response is formatted for a director's review meeting — organized for quick scanning during a meeting; leads with the most critical items; includes a summary of overall launch risk (the combined effect of blockers + risks); uses consistent format for each item; is action-oriented (the director should leave the review knowing exactly what to do); appropriate length — detailed enough to understand each issue but concise enough for a 15-minute review."
    weight: 0.30
    description: "MeetingReadyFormat"
