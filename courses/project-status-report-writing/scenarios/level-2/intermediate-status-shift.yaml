meta:
  id: intermediate-status-shift
  level: 2
  course: project-status-report-writing
  type: output
  description: "Intermediate status shift — handle multiple conflicting stakeholder expectations about status reporting while managing a project that's sending mixed signals"
  tags: [shift, intermediate, stakeholders, conflicting, mixed-signals]

state: {}

trigger: |
  You're a project manager in an impossible situation. Your
  project is simultaneously succeeding and failing depending
  on who you ask, and three different stakeholders want three
  different versions of reality in your status report.

  Project: Customer Self-Service Portal
  Timeline: 5 months, currently Month 3
  Budget: $250K

  The conflicting perspectives:

  Engineering VP (your direct manager):
  "The technical work is excellent. We're ahead of schedule
  on development, code quality is high, and the architecture
  is solid. Report this as GREEN."
  Reality: Engineering IS ahead. 75% of features are code-
  complete vs 60% planned. Zero critical bugs. The technical
  team is delivering great work.

  Product VP (the business sponsor):
  "This project is failing. We've done 3 rounds of user
  testing and the NPS is 31 — below our 40 threshold. Users
  find the interface confusing. We need to redesign the
  navigation entirely. Report this as RED."
  Reality: User testing IS showing poor results. The core
  navigation pattern isn't working. A redesign would add 4-6
  weeks and $50-80K.

  CFO:
  "We're $15K over budget at the midpoint and the burn rate
  is accelerating. If we add a redesign, we'll blow the
  budget by 30%. I need to see the financial reality in the
  status report. Report this as AMBER for budget."
  Reality: Budget IS tight. Additional redesign makes it
  worse. But the CFO doesn't know about the user testing
  results yet.

  Additional complication:
  - The CEO reads all project status reports. She doesn't
    want conflicting signals from her leadership team.
  - You need ONE status report that serves all audiences
    and is honest about all three perspectives.
  - The project genuinely IS technically excellent but
    failing on user experience. These are both true.

  Actual project data:
  - Features code-complete: 75% (ahead of 60% plan)
  - Code quality: 0 critical bugs, 4 minor bugs
  - Budget: $142K spent of $250K (57% spent at 60% timeline)
  - User testing NPS: 31 (target: 40)
  - User task completion rate: 62% (target: 85%)
  - Navigation redesign estimate: 4-6 weeks, $50-80K
  - Team morale: High (engineers are proud of the work)

  Task: Write ONE status report that honestly addresses all
  three perspectives and recommends a path forward.

assertions:
  - type: llm_judge
    criteria: "Response creates a single honest status report that acknowledges multiple dimensions — doesn't choose one stakeholder's version of reality but presents a multi-dimensional view; presents the project status with separate RAG indicators for different dimensions (Technical: GREEN, User Experience: RED, Budget: AMBER); demonstrates that a project can be simultaneously succeeding technically and failing on user experience; uses actual data to support each assessment (75% features complete, NPS 31 vs target 40, 62% task completion, budget position); the CEO reading this should get a complete, honest picture without conflicting signals."
    weight: 0.35
    description: "HonestMultidimensional"
  - type: llm_judge
    criteria: "Response recommends a clear path forward with trade-offs — presents the redesign decision as the critical choice with options: Option A (proceed as-is, risk launching a product users find confusing), Option B (redesign navigation, add 4-6 weeks and $50-80K), Option C (phased approach — launch with current design for internal users, redesign for external launch); each option includes timeline, budget, and user experience impact; connects the technical excellence to the solution (the engineering team can execute the redesign efficiently because the underlying architecture is solid); provides a clear recommendation."
    weight: 0.35
    description: "PathForward"
  - type: llm_judge
    criteria: "Response navigates the political dynamics professionally — doesn't side with any one VP; presents the Engineering VP's perspective as a strength to build on, the Product VP's concern as a valid risk that needs action, and the CFO's budget concern as a constraint to manage; the report doesn't create winners and losers but aligns all three perspectives around a common understanding; suggests that the project isn't 'failing' or 'succeeding' — it's at a decision point that requires leadership alignment; the tone and language are professional and unifying."
    weight: 0.30
    description: "PoliticalNavigation"
