meta:
  id: executive-dashboard-report
  level: 2
  course: project-status-report-writing
  type: output
  description: "Executive dashboard report — create a one-page executive dashboard that distills a complex project into key metrics, RAG status, and strategic highlights"
  tags: [executive, dashboard, one-page, metrics, intermediate]

state: {}

trigger: |
  You're a senior project manager. The CTO has asked you to
  create a one-page executive dashboard for the quarterly
  technology leadership meeting. She reviews 8 project
  dashboards in 30 minutes, so yours needs to be immediately
  understandable.

  Project: Cloud Migration Program
  Duration: 18 months (currently Month 9 — 50% through)
  Budget: $4.2M
  Team: 22 people (12 internal, 10 contractors)
  Sponsor: CTO

  Current metrics:

  Overall Status: AMBER (was GREEN last month)

  Schedule:
  - Phase 1 (Infrastructure): COMPLETE (on time)
  - Phase 2 (Data Migration): AMBER — 2 weeks behind
    Reason: Legacy database schemas more complex than
    assessed. 47 of 120 application databases migrated.
  - Phase 3 (Application Migration): GREEN — not started yet
    but on track for planned start date
  - Phase 4 (Cutover & Decommission): GREEN — 6 months away

  Budget:
  - Spent: $2.1M of $4.2M (50% at 50% — looks on track)
  - However: $180K in unplanned cloud egress charges
  - Forecast to complete: $4.5M (7% over budget)
  - Key driver: Egress charges and additional contractor time
    for legacy database complexity

  Quality:
  - 47 databases migrated with 99.2% data integrity
  - 3 data integrity issues found and resolved
  - Performance testing shows 15% improvement in query speed
    on cloud infrastructure
  - Zero downtime incidents during migration

  Risks:
  - HIGH: Remaining 73 databases include the 5 most complex
    (ERP, CRM, financial reporting) — these may take longer
    than estimated
  - MEDIUM: Cloud egress charges trending higher than budgeted
  - LOW: 2 contractors' contracts expire in Month 12 —
    extension requests submitted

  Key Decisions Needed:
  1. Approve additional $300K budget for egress charges and
     extended contractor time
  2. Decide whether to migrate the ERP database or keep it
     on-premises (hybrid approach)

  Accomplishments This Period:
  - Completed infrastructure phase ahead of schedule
  - Achieved 99.2% data integrity across all migrations
  - Performance improvement of 15% validates the business case

  Task: Create the one-page executive dashboard.

assertions:
  - type: llm_judge
    criteria: "Response creates a scannable one-page executive dashboard — uses visual formatting (tables, RAG indicators, key metric callouts) that can be understood in under 3 minutes; leads with overall status (AMBER) and the reason for the change from GREEN; includes key metrics in a dashboard format (budget: $2.1M/$4.2M spent, forecast $4.5M; schedule: 47/120 databases migrated, 2 weeks behind; quality: 99.2% data integrity); the layout is structured for quick executive scanning with clear sections and visual hierarchy."
    weight: 0.35
    description: "DashboardFormat"
  - type: llm_judge
    criteria: "Response highlights decisions needed and key risks — prominently features the two decisions needed (budget approval, ERP hybrid approach) in a way the CTO can't miss; presents risks with appropriate severity (HIGH/MEDIUM/LOW) and brief impact descriptions; connects the AMBER status to specific causes (database complexity, egress charges) and shows the path back to GREEN; includes the forecast overage ($300K/7%) with context."
    weight: 0.35
    description: "DecisionsAndRisks"
  - type: llm_judge
    criteria: "Response balances bad news with accomplishments — doesn't just focus on problems; highlights the infrastructure phase completion ahead of schedule, the 99.2% data integrity, and the 15% performance improvement; these accomplishments validate the business case and provide confidence that the team can handle the challenges; the dashboard tells a complete story: good progress with manageable challenges that need executive attention."
    weight: 0.30
    description: "BalancedPicture"
