meta:
  id: client-project-status
  level: 2
  course: project-status-report-writing
  type: output
  description: "Client project status report — create a professional status report for an external client that maintains confidence while being transparent about challenges"
  tags: [client, external, professional, confidence, intermediate]

state: {}

trigger: |
  You're a project manager at a consulting firm. You need
  to create the bi-weekly status report for your client,
  MedTech Corp. This is a fixed-price implementation project
  and the client's VP of Technology receives your report.

  Project: Custom Patient Portal Implementation
  Contract Value: $650,000 (fixed price)
  Timeline: 5 months (currently end of Month 3)
  Your team: 4 developers, 1 designer, 1 QA, you (PM)

  What's happening:

  Good news:
  - Patient registration flow is complete and tested — client
    loved the demo last week
  - Appointment scheduling module is 80% done
  - The client's IT team completed their API integration work
    ahead of schedule
  - User research sessions showed 92% task completion rate
    in usability testing

  Problems:
  - The insurance verification module is significantly more
    complex than scoped. The client's insurance system has 47
    different payer configurations (you estimated 15 during
    the proposal). Your team has completed 20 so far.
  - This complexity means you're burning through your margin.
    Internally, the project is now projected to lose $40K.
    The client doesn't know about your internal financials.
  - One of your senior developers (the one building the
    insurance module) is threatening to quit because he's
    frustrated with the legacy insurance API documentation.

  Things the client needs to do:
  - Provide test accounts for the remaining 27 payer
    configurations (you've asked twice, they haven't provided
    them yet)
  - Sign off on the appointment scheduling module design by
    Friday so development can continue
  - Schedule end-user training dates (you need 4 weeks notice
    for training materials prep)

  Internal concerns (don't share with client):
  - Your firm is losing money on this fixed-price deal
  - Developer retention risk on the insurance module
  - The insurance module complexity could push the timeline
    by 2-3 weeks if client doesn't provide test accounts soon

  Task: Create the bi-weekly client status report.

assertions:
  - type: llm_judge
    criteria: "Response creates a professional client-facing status report — presents progress positively and factually (registration complete, scheduling 80%, usability at 92% task completion, client IT team API work ahead of schedule); addresses the insurance module complexity transparently but without revealing internal financial impact — frames it as a scope complexity issue that needs collaborative resolution (more payer configurations than anticipated, need client's test accounts to proceed); does NOT reveal: internal margin/profitability concerns, developer retention risk, or any language suggesting the firm underestimated the work."
    weight: 0.35
    description: "ProfessionalClientReport"
  - type: llm_judge
    criteria: "Response clearly communicates client action items — makes the client's responsibilities prominent and urgent: provide 27 payer test accounts (blocking insurance module progress — this is the critical path), sign off on appointment scheduling design by Friday, schedule end-user training dates (4 weeks lead time needed); frames these as collaborative needs not demands; creates appropriate urgency around the test accounts without blaming the client for delays; connects client action items to project timeline impact."
    weight: 0.35
    description: "ClientActionItems"
  - type: llm_judge
    criteria: "Response manages expectations about the insurance module — addresses the 47 vs 15 payer configuration complexity as a shared discovery (not a mistake); proposes a path forward (phased approach, prioritize highest-volume payers first, or adjust timeline); hints at the timeline risk (2-3 weeks) diplomatically without creating alarm; maintains client confidence in the team's ability to deliver; the overall tone is 'we've got this but need your help on specific items' not 'we're in trouble.'"
    weight: 0.30
    description: "ExpectationManagement"
