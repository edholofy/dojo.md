meta:
  id: scope-change-report
  level: 2
  course: project-status-report-writing
  type: output
  description: "Scope change impact report — document how a scope change affects the project timeline, budget, and resources, and communicate the impact to stakeholders"
  tags: [scope-change, impact, timeline, budget, intermediate]

state: {}

trigger: |
  You're a project manager. Last week, the project sponsor
  approved a significant scope change to your project. You
  need to create an impact report showing how this change
  affects the project plan.

  Project: E-commerce Platform Upgrade
  Original Timeline: January - June 2026 (6 months)
  Original Budget: $400K
  Team: 8 people

  Scope Change Request (Approved):
  The VP of Sales wants to add a B2B wholesale ordering
  portal to the e-commerce platform. This was not in the
  original scope. The approval was given because a major
  wholesale client (worth $5M annually) threatened to leave
  if the company didn't have B2B ordering capability by Q3.

  B2B Portal Requirements:
  - Wholesale customer accounts with tiered pricing
  - Bulk ordering with quantity discounts
  - Net-30/Net-60 payment terms (not just credit card)
  - Custom catalog views per wholesale customer
  - Purchase order integration
  - Separate B2B analytics dashboard

  Impact Assessment:

  Timeline Impact:
  - B2B portal estimated at 10 weeks of development
  - Can partially parallelize with existing work but needs
    2 developers pulled from current workstreams for 6 weeks
  - Pulling developers will delay the current B2C checkout
    optimization by 3 weeks
  - New overall timeline: January - August 2026 (8 months,
    2 months added)
  - OR: Keep June deadline but cut B2C features (product
    recommendations engine and wishlist functionality)

  Budget Impact:
  - Additional development: $120K
  - Payment terms integration (third-party): $25K
  - Extended testing: $15K
  - Total additional budget: $160K
  - New total project budget: $560K (40% increase)

  Resource Impact:
  - Need 1 additional backend developer (B2B payment logic)
  - Need 0.5 additional QA resource for B2B testing
  - Current team stretched — overtime likely for 4-6 weeks

  Risk Impact:
  - Quality risk: compressed timelines and parallel work
    increase bug probability
  - Team morale risk: overtime and context switching
  - Integration risk: B2B payment terms is new capability
    the team hasn't built before

  Task: Create the scope change impact report for the
  project steering committee.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear scope change impact report — documents the scope change with business justification ($5M wholesale client retention); presents timeline impact with options (Option A: extend to August, Option B: keep June but cut B2C features); presents budget impact ($160K additional, 40% increase to $560K) with line-item breakdown; documents resource impact (additional headcount, overtime); presents risk impact (quality, morale, integration); the report is structured so the steering committee can make an informed decision between options."
    weight: 0.35
    description: "ImpactDocumentation"
  - type: llm_judge
    criteria: "Response presents clear options with trade-offs — gives the steering committee actionable choices, not just a description of the problem; each option includes: timeline, budget, what's gained, what's lost, and risk level; includes a recommendation with rationale; addresses the business context (the $5M client threat justifies the change but the committee needs to understand the full cost); the report doesn't present the scope change as a problem but as a business decision with trade-offs."
    weight: 0.35
    description: "OptionsAndTradeoffs"
  - type: llm_judge
    criteria: "Response is professional and decision-oriented — formatted for a steering committee review; includes an executive summary that captures the key message in 2-3 sentences; uses tables or structured formats for the impact comparison; includes the revised project plan or timeline visualization; identifies any dependencies on committee decisions (budget approval, hiring approval, scope cut authorization); the report serves as a formal record of the scope change and its approved impact."
    weight: 0.30
    description: "DecisionOriented"
