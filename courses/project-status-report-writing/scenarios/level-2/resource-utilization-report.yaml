meta:
  id: resource-utilization-report
  level: 2
  course: project-status-report-writing
  type: output
  description: "Resource utilization report — create a report showing team capacity, utilization, and allocation across project activities"
  tags: [resources, utilization, capacity, allocation, intermediate]

state: {}

trigger: |
  You're a project lead managing a team of 8 people across
  two concurrent projects. Your director asked for a resource
  utilization report because she suspects the team is
  overloaded and wants data to justify hiring.

  Team Members and Current Allocation:

  1. Alex (Senior Developer) — 120% utilized
     - Project Alpha: 80% (backend API development)
     - Project Beta: 30% (code reviews and architecture
       guidance)
     - Operational support: 10% (production incident response)
     Note: Working 48-hour weeks consistently for 3 weeks.
     Has expressed burnout concerns.

  2. Maria (Mid Developer) — 100% utilized
     - Project Alpha: 60% (frontend development)
     - Project Beta: 40% (feature development)
     Note: Context-switching between projects daily. Velocity
     has dropped 20% since she was split across projects.

  3. Raj (Mid Developer) — 95% utilized
     - Project Alpha: 95% (database and infrastructure)
     Note: Single point of failure for all database work.
     No backup if Raj is unavailable.

  4. Sarah (Junior Developer) — 70% utilized
     - Project Alpha: 50% (testing scripts, minor features)
     - Training/learning: 20%
     Note: Could take on more work but needs senior guidance
     (which Alex doesn't have time to provide).

  5. Tom (QA Engineer) — 110% utilized
     - Project Alpha: 60% (test planning and execution)
     - Project Beta: 40% (regression testing)
     - Bug triage: 10% (both projects)
     Note: Testing is becoming a bottleneck. Stories pile up
     waiting for QA. Tom is skipping test automation to keep
     up with manual testing.

  6. Lisa (Designer) — 85% utilized
     - Project Alpha: 45% (UI/UX design)
     - Project Beta: 30% (design system maintenance)
     - Design reviews: 10%
     Note: Well-balanced but nearing capacity.

  7. Mike (DevOps) — 75% utilized
     - Project Alpha: 30% (CI/CD pipeline, deployments)
     - Project Beta: 20% (infrastructure)
     - Operational: 25% (monitoring, incident response)
     Note: Has capacity but his skills are specialized and
     can't substitute for developer or QA gaps.

  8. You (Project Lead) — 105% utilized
     - Project Alpha management: 50%
     - Project Beta management: 30%
     - Meetings, reporting, stakeholder mgmt: 25%
     Note: Not enough time for hands-on project management
     on either project.

  Historical data:
  - Ideal utilization target: 80-85%
  - Team average current: 95%
  - Team average 3 months ago: 82%
  - Average overtime hours/week: 12 across team
  - Sprint velocity trend: declining 8% over last 3 sprints

  Task: Create the resource utilization report with
  recommendations for the director.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive utilization report — presents each team member's allocation with percentages across projects and activities; highlights over-utilized team members (Alex 120%, Tom 110%, You 105%); identifies under-utilized resources and why (Sarah 70% lacks senior guidance, Mike 75% specialized skills); shows the team average (95%) vs the ideal target (80-85%); includes historical context (was 82% three months ago, now 95%); uses visual formatting (table or structured list) that makes utilization levels immediately scannable."
    weight: 0.35
    description: "UtilizationData"
  - type: llm_judge
    criteria: "Response identifies systemic risks from over-utilization — connects utilization data to business risks: burnout risk (Alex expressing concerns, consistent overtime), single points of failure (Raj for database), quality risk (Tom skipping test automation to keep up), declining velocity (8% drop over 3 sprints), context-switching penalty (Maria's 20% velocity drop); frames these as not just HR concerns but project delivery risks; the director should understand that the current utilization levels are unsustainable and threatening project outcomes."
    weight: 0.35
    description: "RiskIdentification"
  - type: llm_judge
    criteria: "Response provides data-driven hiring and reallocation recommendations — includes specific recommendations: hire additional QA to relieve Tom's bottleneck, hire a mid-level developer to reduce Alex's load and provide Sarah with mentorship, consider dedicating resources to single projects to reduce context-switching; quantifies the case (overtime hours, velocity decline, risk of burnout-driven turnover); provides short-term mitigations (rebalance within current team) and long-term solutions (hiring); the recommendations are justified by the data in the report, not just opinions."
    weight: 0.30
    description: "Recommendations"
