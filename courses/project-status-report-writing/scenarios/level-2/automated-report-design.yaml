meta:
  id: automated-report-design
  level: 2
  course: project-status-report-writing
  type: output
  description: "Automated report design — design an automated status reporting system using project management tools to replace manual weekly status reports"
  tags: [automation, dashboard, tools, efficiency, intermediate]

state: {}

trigger: |
  You're a PMO analyst at a software company with 15 active
  projects. The PMO director is frustrated:

  "Our project managers spend 2-3 hours every Friday writing
  status reports. That's 30-45 hours of PM time per week
  across the organization — just on reporting. Most of the
  data they're reporting already exists in Jira, Confluence,
  and our financial system. I want you to design an automated
  reporting system that generates 80% of the status report
  automatically and PMs only need to add commentary."

  Current tools:
  - Jira: All projects use Jira for task tracking (sprints,
    stories, bugs, epics)
  - Confluence: Project documentation and meeting notes
  - Google Sheets: Budget tracking (manual entry)
  - Slack: Team communication
  - Google Workspace: Status reports currently written as
    Google Docs

  Available data in Jira (per project):
  - Sprint velocity (story points committed vs completed)
  - Burndown charts
  - Bug counts by severity (open, in progress, resolved)
  - Epic progress (percentage complete)
  - Release status
  - Team member workload

  Current manual status report template (what PMs write):
  1. Overall status (RAG) — manual assessment
  2. Key accomplishments this week — PM writes narrative
  3. Planned next week — PM writes narrative
  4. Risks and issues — PM writes narrative
  5. Budget status — PM copies from spreadsheet
  6. Milestone progress — PM manually checks and reports
  7. Team highlights — PM writes narrative

  Constraints:
  - Budget for new tools: $500/month maximum
  - Must work with existing Jira/Confluence/Google stack
  - 15 PMs need to adopt the system
  - Must still allow PM narrative/commentary (not 100% automated)
  - Reports need to be shareable with non-technical stakeholders

  Task: Design the automated status reporting system.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical automated reporting system — identifies which report elements can be auto-populated from Jira (velocity, burndown, bug counts, epic progress, sprint completion) vs which need PM input (overall RAG assessment, key narrative, risk commentary); proposes a specific technical approach using available tools (Jira dashboards, Confluence templates, Jira-Confluence integration, possibly Jira automation or a lightweight tool within the $500/month budget); creates a report template that blends automated data with PM narrative sections; estimates time savings (target: from 2-3 hours to 30-45 minutes per PM per week)."
    weight: 0.35
    description: "AutomationDesign"
  - type: llm_judge
    criteria: "Response provides a specific implementation plan — includes a phased rollout (don't change all 15 projects at once); addresses the budget tracking gap (Google Sheets to Jira or automated pull); provides the template design showing where automated data appears and where PMs write commentary; includes examples of automated metrics displays (sprint velocity chart, bug trend, epic progress bars); addresses stakeholder access (non-technical people need to view without Jira accounts); includes a rollout timeline and adoption plan for 15 PMs."
    weight: 0.35
    description: "ImplementationPlan"
  - type: llm_judge
    criteria: "Response addresses adoption and quality concerns — acknowledges that automated reports can lack context and narrative quality; designs safeguards (PM review before sending, required commentary sections, quality checks); addresses PM adoption challenges (training, resistance to change, 'but my project is special' objections); includes a feedback mechanism to improve the system over time; provides metrics to measure the system's success (time saved, report quality scores, stakeholder satisfaction); the design balances automation efficiency with report quality."
    weight: 0.30
    description: "AdoptionAndQuality"
