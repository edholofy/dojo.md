meta:
  id: red-status-escalation
  level: 2
  course: project-status-report-writing
  type: output
  description: "RED status escalation — write a status report that escalates a project to RED status with clear impact analysis and proposed recovery plan"
  tags: [red-status, escalation, recovery-plan, crisis, intermediate]

state: {}

trigger: |
  You're a project manager and your project just turned RED.
  This is the first time a project under your leadership has
  gone RED. Your PMO director told you: "Write the RED status
  report. Be clear about what happened, what the impact is,
  and how you plan to recover. The executive committee reviews
  all RED projects on Monday."

  Project: Customer Data Platform (CDP) Implementation
  Timeline: 6 months, currently Month 4 (Week 16 of 24)
  Budget: $350K
  Sponsor: CMO

  Previous status history:
  - Months 1-2: GREEN
  - Month 3: AMBER (data quality issues)
  - Month 4 Week 1: AMBER
  - Month 4 Week 2 (now): RED

  What triggered RED:

  1. Technical Failure: The CDP vendor's data connector for
     Salesforce broke after a Salesforce API update on Monday.
     All customer data syncing stopped. The vendor says the
     fix will take "1-2 weeks." This is the third time their
     connector has broken in 4 months. Without Salesforce
     data, the CDP is unusable for the marketing team.

  2. Vendor Instability: You learned on Wednesday that the
     CDP vendor (a startup) laid off 30% of their engineering
     team last week. Your account manager was let go. You
     have no current point of contact at the vendor. The
     vendor's CEO sent a generic email saying "business as
     usual" but you're concerned about their viability.

  3. Data Quality Crisis: The data quality issues flagged in
     AMBER status have worsened. 23% of customer records have
     duplicate or conflicting data across systems. The data
     cleansing effort was supposed to complete by Week 14 but
     is now estimated at Week 20 due to scope being larger
     than assessed.

  4. Marketing Team Frustration: The CMO's team has been
     waiting 4 months for the CDP to enable personalized
     campaigns. They're now threatening to buy a different
     tool themselves. The CMO told you: "I'm losing patience.
     My team needs something that works."

  Impact:
  - Q4 personalized marketing campaigns at risk ($2M projected
    revenue impact from delayed campaigns)
  - Vendor viability concern puts the entire $350K investment
    at risk
  - Marketing team morale and trust in IT declining
  - Potential vendor switching cost: $100-150K + 3 months
    restart time

  Task: Write the RED status escalation report for the
  executive committee.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear, honest RED status report — leads with the status change (AMBER to RED) and the primary drivers; presents the situation factually without defensiveness or blame-shifting; shows the status history trajectory (GREEN → AMBER → RED) to demonstrate this was escalated appropriately (not a surprise RED); organizes the issues by severity and impact; quantifies the business impact ($2M campaign revenue at risk, $350K investment potentially lost, $100-150K switching cost); the report demonstrates the PM is in control of the situation even though the project is not."
    weight: 0.35
    description: "REDStatusClarity"
  - type: llm_judge
    criteria: "Response includes a recovery plan with options — doesn't just present problems but proposes solutions; includes multiple recovery options for the executive committee to choose from (e.g., Option A: give vendor 2 weeks to fix and demonstrate stability, with defined exit criteria; Option B: begin parallel evaluation of alternative CDP vendors while maintaining current vendor; Option C: implement interim solution for marketing team while resolving vendor situation); each option includes timeline, cost, risk, and recommendation; addresses all 4 issues (technical failure, vendor stability, data quality, marketing team needs) with specific actions."
    weight: 0.35
    description: "RecoveryPlan"
  - type: llm_judge
    criteria: "Response is formatted for an executive committee review — structured for a formal executive review meeting; includes a clear executive summary at the top; uses professional language appropriate for C-level audience; includes specific asks from the executive committee (decisions needed: vendor continuation vs exit, budget for potential vendor switch, interim solution approval); provides a timeline for recovery milestones; the report builds confidence that despite the RED status, there's a clear path forward with executive support."
    weight: 0.30
    description: "ExecutiveCommitteeFormat"
