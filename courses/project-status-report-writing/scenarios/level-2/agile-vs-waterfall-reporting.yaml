meta:
  id: agile-vs-waterfall-reporting
  level: 2
  course: project-status-report-writing
  type: output
  description: "Agile vs waterfall reporting — create status reports for the same project using both agile and waterfall reporting methodologies and explain the differences"
  tags: [agile, waterfall, comparison, methodology, intermediate]

state: {}

trigger: |
  You're a PMO analyst. Your organization is transitioning
  from waterfall to agile and the PMO director wants you to
  demonstrate how status reporting differs between the two
  methodologies. She's asked you to take the same project and
  create both a waterfall-style status report and an agile-
  style status report, then explain the differences.

  Project: Internal Knowledge Base Platform
  Duration: 4 months
  Team: 6 developers, 1 designer, 1 QA, 1 PM
  Current: End of Month 2 (halfway point)

  Project data:

  Waterfall view:
  - Phase 1 (Requirements): COMPLETE
  - Phase 2 (Design): COMPLETE
  - Phase 3 (Development): IN PROGRESS (50% of planned
    features coded)
  - Phase 4 (Testing): NOT STARTED
  - Phase 5 (Deployment): NOT STARTED
  - Schedule: On time per Gantt chart
  - Budget: $180K, spent $95K (53% at 50% timeline)

  Agile view:
  - Sprint 1 (Weeks 1-2): Search functionality — DONE (13 pts)
  - Sprint 2 (Weeks 3-4): Article authoring — DONE (15 pts)
  - Sprint 3 (Weeks 5-6): Categories & tags — DONE (11 pts)
  - Sprint 4 (Weeks 7-8): User profiles & permissions —
    IN PROGRESS (committed 14 pts, completed 8 pts at
    mid-sprint)
  - Velocity: 13 avg (Sprint 1: 13, S2: 15, S3: 11)
  - Product backlog: 52 points remaining (4 sprints left)
  - Based on velocity (13 avg), can complete ~52 points in
    4 sprints — just fits
  - Sprint 4 includes a scope addition: admin dashboard
    (5 pts) added by product owner (wasn't in original plan)

  Additional data:
  - 3 bugs in production from Sprint 2 (article formatting
    issues) — being fixed in Sprint 4
  - Stakeholder feedback after Sprint 3 demo: "Love the
    search, but we need better filtering" — added to backlog
    (3 pts)
  - Team happiness: 4.2/5 in retro surveys

  Task: Create BOTH a waterfall-style status report AND an
  agile-style status report for this project, then provide a
  comparison explaining the key differences in how each
  approach presents the same information.

assertions:
  - type: llm_judge
    criteria: "Response creates a proper waterfall-style status report — uses phase-gate structure showing each phase's status (Complete/In Progress/Not Started); includes Gantt chart or timeline view reference; presents budget in planned vs actual format; reports on milestone completion; uses traditional RAG or percentage-complete metrics; focuses on schedule adherence and phase completion; presents a linear, sequential view of progress; the report feels familiar to a traditional PMO audience."
    weight: 0.35
    description: "WaterfallReport"
  - type: llm_judge
    criteria: "Response creates a proper agile-style status report — uses sprint-based tracking showing each sprint's committed vs completed points; includes velocity metrics and trend (13 avg); presents a burndown or burnup view; shows product backlog remaining (52 points) and forecasts based on velocity; acknowledges scope changes (admin dashboard addition, filtering feedback) as normal backlog management; highlights working software delivered each sprint; references sprint demos, retro feedback, and stakeholder input; the report feels natural to an agile team."
    weight: 0.35
    description: "AgileReport"
  - type: llm_judge
    criteria: "Response provides an insightful comparison of the two approaches — explains key differences: waterfall measures progress by phase completion while agile measures by value delivered; waterfall treats scope changes as threats while agile treats them as normal backlog management; waterfall testing is a separate phase while agile integrates testing throughout; waterfall shows 50% of development 'done' but no usable software in users' hands, while agile shows 3 sprints of working, tested features already deployed; notes that the same project data tells different stories depending on the methodology; the comparison helps the PMO director understand why reporting needs to change as the organization transitions."
    weight: 0.30
    description: "InsightfulComparison"
