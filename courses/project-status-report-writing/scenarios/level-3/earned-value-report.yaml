meta:
  id: earned-value-report
  level: 3
  course: project-status-report-writing
  type: output
  description: "Earned value management report — create a formal EVM report with CPI, SPI, and forecasting metrics for a large enterprise project"
  tags: [earned-value, evm, cpi, spi, forecasting, advanced]

state: {}

trigger: |
  You're a project controls analyst on a large government IT
  modernization contract. The contracting officer requires
  monthly Earned Value Management (EVM) reports.

  Project: Federal Agency IT Modernization (FITM)
  Contract Value: $24M (Cost-Plus-Fixed-Fee)
  Duration: 36 months (currently Month 15)
  Reporting Period: January 2026

  EVM Data (cumulative through January 2026):
  - Budget at Completion (BAC): $24,000,000
  - Planned Value (PV): $10,200,000 (42.5% of BAC)
  - Earned Value (EV): $8,900,000 (37.1% of BAC)
  - Actual Cost (AC): $10,800,000 (45.0% of BAC)

  Derived metrics:
  - Schedule Variance (SV) = EV - PV = -$1,300,000
  - Cost Variance (CV) = EV - AC = -$1,900,000
  - Schedule Performance Index (SPI) = 0.873
  - Cost Performance Index (CPI) = 0.824

  Forecasts:
  - Estimate at Completion (EAC) = BAC/CPI = $29,126,214
  - Estimate to Complete (ETC) = EAC - AC = $18,326,214
  - Variance at Completion (VAC) = BAC - EAC = -$5,126,214
  - To-Complete Performance Index (TCPI) = 1.144

  Monthly trend (last 6 months):
  | Month   | CPI  | SPI  |
  |---------|------|------|
  | Aug 25  | 0.91 | 0.95 |
  | Sep 25  | 0.89 | 0.93 |
  | Oct 25  | 0.87 | 0.91 |
  | Nov 25  | 0.86 | 0.90 |
  | Dec 25  | 0.84 | 0.88 |
  | Jan 26  | 0.824| 0.873|

  WBS Top 5 problem areas:
  1. WBS 3.2 Data Migration: CPI 0.71, SPI 0.68
  2. WBS 2.4 Security Compliance: CPI 0.78, SPI 0.82
  3. WBS 4.1 Testing: CPI 0.80, SPI 0.75
  4. WBS 1.3 Requirements: CPI 0.85, SPI 0.90
  5. WBS 3.1 Development: CPI 0.88, SPI 0.92

  Contributing factors:
  - Data migration complexity underestimated
  - Security compliance requirements expanded by the agency
  - Staff turnover: 4 key personnel replaced in 6 months
  - Requirements volatility in 3 functional areas

  Task: Create the monthly EVM report for the contracting
  officer.

assertions:
  - type: llm_judge
    criteria: "Response creates a formal EVM report with all required metrics — presents BAC, PV, EV, AC correctly; calculates and presents derived metrics (SV, CV, SPI, CPI, EAC, ETC, VAC, TCPI); includes the 6-month trend analysis showing deteriorating performance; presents WBS-level analysis identifying problem areas; includes forecast at completion ($29.1M vs $24M BAC = 21.4% overrun); uses proper EVM terminology and formatting expected by government contracting officers."
    weight: 0.35
    description: "EVMMetrics"
  - type: llm_judge
    criteria: "Response provides analysis and corrective action plan — interprets the EVM data: the declining trend is most concerning; the TCPI of 1.144 means the team needs to perform 14.4% more efficiently than planned for every remaining dollar; identifies root causes by WBS element; proposes corrective actions: rebaseline data migration, request equitable adjustment for expanded security scope, stabilize staffing, implement change control for requirements; addresses whether a formal rebaseline is needed."
    weight: 0.35
    description: "AnalysisAndActions"
  - type: llm_judge
    criteria: "Response addresses the contracting officer's concerns — uses language appropriate for government contract reporting; addresses cost-plus-fixed-fee implications; presents the variance analysis required by contract; provides a realistic revised estimate for budget planning; addresses whether the period of performance is achievable given current SPI trends."
    weight: 0.30
    description: "ContractingOfficerView"
