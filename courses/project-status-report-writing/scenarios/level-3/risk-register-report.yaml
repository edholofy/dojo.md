meta:
  id: risk-register-report
  level: 3
  course: project-status-report-writing
  type: output
  description: "Risk register and mitigation report — create a comprehensive risk register with quantified impacts, mitigation strategies, and integration into project status reporting"
  tags: [risk-register, mitigation, quantification, probability, advanced]

state: {}

trigger: |
  You're a senior project manager for a healthcare IT
  project. The steering committee has asked you to create a
  formal risk register and present it as part of your monthly
  status report. They want to understand the risk landscape,
  not just individual risks.

  Project: Electronic Health Records (EHR) System Upgrade
  Timeline: 15 months (currently Month 6)
  Budget: $3.5M
  Users: 2,000 clinicians across 12 clinics

  Current Risk Register:

  R-001: Data Migration Integrity
  Probability: HIGH | Impact: CRITICAL
  Description: Patient data migration from legacy system may
  introduce errors in medication records.
  Current status: Active. 3 data integrity issues found in
  test migration (medication dosage mismatches).
  Mitigation: Double-validation process for all medication
  data. Adding clinical pharmacist review of migrated records.
  Estimated mitigation cost: $45K
  Risk owner: Data Migration Lead

  R-002: Clinician Adoption Resistance
  Probability: HIGH | Impact: HIGH
  Description: Clinicians resist new EHR workflows, leading
  to low adoption and workarounds.
  Current status: Active. Survey shows 40% of clinicians are
  "skeptical" about the new system.
  Mitigation: Clinical champion program (12 champions across
  clinics), hands-on training labs, workflow customization.
  Estimated mitigation cost: $80K
  Risk owner: Change Management Lead

  R-003: Interface Engine Failure
  Probability: LOW | Impact: CRITICAL
  Description: The HL7 interface engine that connects the
  EHR to lab systems, pharmacy, and radiology may fail
  during cutover.
  Current status: Active. Interface testing shows 2 of 15
  interfaces have intermittent failures.
  Mitigation: Redundant interface engine, manual fallback
  procedures for critical interfaces.
  Estimated mitigation cost: $30K
  Risk owner: Integration Architect

  R-004: Regulatory Compliance Gap
  Probability: MEDIUM | Impact: CRITICAL
  Description: New EHR may not meet CMS Meaningful Use
  Stage 3 requirements, risking $500K in annual incentive
  payments.
  Current status: Active. 8 of 12 Meaningful Use measures
  validated. 4 measures require configuration changes.
  Mitigation: Dedicated compliance analyst validating each
  measure. Gap remediation in progress.
  Estimated mitigation cost: $25K
  Risk owner: Compliance Officer

  R-005: Go-Live Timing
  Probability: MEDIUM | Impact: HIGH
  Description: Go-live during flu season (October-February)
  could overwhelm clinicians who are simultaneously learning
  a new system and handling high patient volumes.
  Current status: Watching. Go-live currently planned for
  November — peak flu season.
  Mitigation: Consider shifting go-live to September (2
  months earlier) or March (4 months later).
  Estimated mitigation cost: $0-150K depending on direction
  Risk owner: Project Manager (you)

  R-006: Budget Overrun
  Probability: MEDIUM | Impact: MEDIUM
  Description: Cumulative scope additions and mitigation
  costs pushing budget toward overrun.
  Current status: Active. Current mitigation costs total
  $180K above original budget. Contingency remaining: $120K.
  Mitigation: Scope prioritization review, defer non-critical
  customizations to Phase 2.
  Risk owner: Project Sponsor

  R-007: Vendor Support Degradation
  Probability: LOW | Impact: HIGH
  Description: EHR vendor recently acquired by larger company.
  Support quality and responsiveness may decline.
  Current status: Watching. Response times have increased 30%
  in last 2 months.
  Mitigation: Document SLA benchmarks, escalation to vendor
  executive sponsor if SLA degrades further.
  Estimated mitigation cost: $0
  Risk owner: Vendor Manager

  Task: Create the risk register report for the steering
  committee.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive risk register report — presents all 7 risks in a structured format with probability, impact, status, mitigation, cost, and owner; uses a risk matrix or heat map visualization showing probability vs impact; categorizes risks (data/technical, organizational, financial, regulatory, operational); includes a risk score or ranking to prioritize risks; shows trend (which risks are improving, worsening, or stable); provides a summary view for quick steering committee consumption and detailed view for reference."
    weight: 0.35
    description: "RiskRegisterFormat"
  - type: llm_judge
    criteria: "Response provides risk landscape analysis — doesn't just list individual risks but synthesizes the overall risk posture: total risk exposure quantification (medication data errors = patient safety, Meaningful Use gap = $500K financial, go-live timing = operational risk); shows how risks interact (budget overrun risk is partly driven by cumulative mitigation costs for other risks); identifies the top 3 risks requiring steering committee attention; connects risk management to project success criteria (patient safety, regulatory compliance, clinician adoption, budget)."
    weight: 0.35
    description: "RiskLandscape"
  - type: llm_judge
    criteria: "Response includes actionable recommendations for the steering committee — presents specific decisions needed: approve September vs November vs March go-live date (R-005), approve additional $180K mitigation costs or prioritize scope cuts (R-006), decide on escalation to EHR vendor executive (R-007); includes a mitigation effectiveness assessment (are current mitigations working?); the report enables the steering committee to make informed risk-acceptance or risk-mitigation decisions; tracks risk closure and new risk identification over time."
    weight: 0.30
    description: "ActionableRecommendations"
