meta:
  id: regulatory-project-reporting
  level: 3
  course: project-status-report-writing
  type: output
  description: "Regulatory project reporting — create status reports for a project subject to regulatory oversight where documentation serves as compliance evidence"
  tags: [regulatory, compliance, audit-trail, evidence, advanced]

state: {}

trigger: |
  You're the project manager for a pharmaceutical company
  implementing a new laboratory information management
  system (LIMS). This project is subject to FDA 21 CFR
  Part 11 and GxP requirements. Your status reports serve
  dual purposes: project management AND regulatory compliance.

  Project: LIMS Implementation
  Duration: 14 months (currently Month 8)
  Budget: $2.5M
  Regulatory Framework: FDA 21 CFR Part 11, EU Annex 11, GxP

  Current status:

  Validation Activities (Critical for compliance):
  - Installation Qualification (IQ): COMPLETE
  - Operational Qualification (OQ): IN PROGRESS (65%)
    - 12 of 18 test protocols executed
    - 2 deviations documented (DEV-2026-004, DEV-2026-005)
    - DEV-004: timestamp format discrepancy (CAPA in progress)
    - DEV-005: user access level mismatch (resolved, pending
      QA approval)
  - Performance Qualification (PQ): NOT STARTED (depends on OQ)
  - Computer System Validation docs: 70% complete

  Project Progress:
  - System configuration: 85% complete
  - Data migration from legacy system: 50% (on track)
  - User training: Not started (scheduled Month 11)
  - Audit trail configuration: Complete
  - Electronic signature implementation: In testing

  Regulatory concerns:
  - FDA is conducting a facility inspection next month
  - The inspector may ask about the LIMS project validation
  - All documentation must demonstrate validation follows
    a pre-approved plan
  - Deviations must have formal CAPA documentation

  Task: Create the status report that serves both project
  management and regulatory compliance purposes.

assertions:
  - type: llm_judge
    criteria: "Response creates a status report that meets regulatory documentation standards — uses precise regulatory language (IQ/OQ/PQ, CAPA, deviations, validation protocols); documents validation activities with the level of detail required for FDA inspection (protocol numbers, deviation tracking, approval status); includes traceability between requirements, test protocols, and results; the report could serve as evidence during an FDA inspection that the project follows a systematic, validated approach; uses formal language and structure appropriate for a regulated environment."
    weight: 0.35
    description: "RegulatoryStandards"
  - type: llm_judge
    criteria: "Response properly documents deviations and corrective actions — deviation DEV-2026-004 (timestamp format) and DEV-2026-005 (user access level) are documented with: description, impact assessment, root cause, corrective action, preventive action, and status; follows pharmaceutical CAPA standards; distinguishes between resolved and in-progress deviations; demonstrates that deviations are treated as improvement opportunities, not just problems."
    weight: 0.35
    description: "DeviationDocumentation"
  - type: llm_judge
    criteria: "Response balances project management with compliance — includes both traditional PM elements (schedule, budget, risk) and regulatory elements (validation status, deviation tracking, inspection readiness); addresses the upcoming FDA inspection with specific preparation actions; presents the project timeline in the context of regulatory milestones (IQ to OQ to PQ to go-live); identifies compliance risks as project risks."
    weight: 0.30
    description: "PMAndCompliance"
