meta:
  id: multi-vendor-report
  level: 3
  course: project-status-report-writing
  type: output
  description: "Multi-vendor project report — create a status report for a project involving multiple external vendors with contractual obligations and performance tracking"
  tags: [multi-vendor, contracts, sla, performance, advanced]

state: {}

trigger: |
  You're the project manager for a new retail store technology
  deployment involving 4 external vendors. Your VP wants a
  status report that tracks each vendor's performance against
  their contracts and identifies integration risks.

  Project: Flagship Store Technology Deployment
  Timeline: 6 months (currently Month 4)
  Budget: $1.2M (across 4 vendor contracts + internal)
  Location: New flagship store opening in 8 weeks

  Vendor 1 — POS Systems Inc. (Point of Sale hardware/software)
  Contract: $350K, fixed price
  SLA: Hardware delivered by Week 18, software configured
  by Week 20, staff training by Week 22
  Current Status: AMBER
  - Hardware: 80% delivered (20 of 25 terminals).
    5 terminals delayed — vendor blaming chip shortage.
    Expected 2 weeks late.
  - Software: Configuration on track for delivered units
  - Training: Cannot start until all terminals are on-site
  - Contract issue: Vendor wants to substitute a different
    terminal model for the 5 delayed units. Your team hasn't
    tested the substitute model.

  Vendor 2 — NetSecure (Network infrastructure)
  Contract: $200K, time & materials with cap
  SLA: Network operational 4 weeks before store opening
  Current Status: GREEN
  - Network cabling: Complete
  - WiFi installation: Complete, testing in progress
  - Firewall configuration: 90% done
  - On track, professional team, no issues

  Vendor 3 — DisplayTech (Digital signage)
  Contract: $180K, fixed price
  SLA: All displays installed and content-ready 3 weeks
  before opening
  Current Status: RED
  - 12 of 20 displays installed
  - Content management system has a critical bug — video
    content causes system crashes
  - The vendor's lead engineer quit last week
  - The vendor has missed 3 of their last 5 milestone dates
  - You escalated to their VP of Delivery who promised a
    "recovery plan by Friday" — it's now the following
    Wednesday with no recovery plan received

  Vendor 4 — CloudAnalytics (Customer analytics platform)
  Contract: $150K, subscription + implementation
  SLA: Platform operational with 30 days of data before
  store opening
  Current Status: AMBER
  - Platform configured and working in staging
  - Integration with POS system (Vendor 1) not started
    because POS configuration isn't final
  - Dependency: Cannot go live until POS data is flowing
  - If POS is delayed, analytics platform is delayed equally

  Internal costs: $320K (staff time, project management,
  infrastructure)

  Integration risks:
  1. POS delay cascades to Analytics platform
  2. Digital signage CMS bug affects in-store experience
  3. If store opens without all technology, the brand
     experience is compromised

  Task: Create the multi-vendor status report.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear multi-vendor status report — presents each vendor with their contract details, SLA status, current performance, and RAG indicator; shows the overall project status driven by the worst vendor performance; tracks vendor milestone adherence (DisplayTech missed 3 of 5 milestones); includes budget tracking per vendor and total; makes the 8-week countdown to store opening prominent throughout the report; uses a format that allows quick comparison of vendor performance."
    weight: 0.35
    description: "MultiVendorTracking"
  - type: llm_judge
    criteria: "Response identifies integration dependencies and cascading risks — maps the POS to Analytics dependency clearly; flags the DisplayTech CMS bug as a threat to store opening experience; identifies the POS terminal substitution risk (untested model); shows how individual vendor delays compound at the project level; calculates the critical path through the vendor dependencies; assesses whether the 8-week store opening date is achievable given current vendor performance."
    weight: 0.35
    description: "IntegrationRisks"
  - type: llm_judge
    criteria: "Response provides vendor management recommendations — addresses the DisplayTech RED situation with specific actions (escalation beyond VP, contractual remedies, contingency planning for partial signage at opening); addresses the POS substitution issue (require testing before accepting alternate model, contractual implications of late delivery); recommends whether to invoke contract penalties or SLA remedies; provides a contingency plan for the store opening if vendors don't fully deliver; the report helps the VP make vendor management decisions."
    weight: 0.30
    description: "VendorManagement"
