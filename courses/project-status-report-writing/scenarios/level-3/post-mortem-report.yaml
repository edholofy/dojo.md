meta:
  id: post-mortem-report
  level: 3
  course: project-status-report-writing
  type: output
  description: "Post-mortem report — create a comprehensive project post-mortem that analyzes what went wrong, what went right, and provides actionable lessons for future projects"
  tags: [post-mortem, lessons-learned, retrospective, analysis, advanced]

state: {}

trigger: |
  You're a senior PM. Your project just completed — 3 months
  late and 40% over budget. Despite that, the deliverable
  works and the business is using it. The PMO director wants
  a formal post-mortem report that the entire PMO can learn
  from. She specifically said: "I don't want finger-pointing.
  I want systemic lessons."

  Project: Supply Chain Visibility Platform
  Original Plan: 9 months, $1.5M
  Actual: 12 months, $2.1M (40% over budget, 33% late)
  Team: 12 people (6 internal, 6 contractors)
  Sponsor: VP Supply Chain

  What went wrong:

  1. Requirements instability (Months 1-4):
     - Original requirements were signed off but the VP
       Supply Chain changed priorities 3 times
     - Added real-time tracking (wasn't in scope) in Month 2
     - Removed a planned feature (demand forecasting) in
       Month 3, then added it back in Month 5
     - No formal change control process was followed

  2. Vendor dependency (Months 3-7):
     - Selected a startup vendor for the GPS tracking module
     - Vendor delivered 6 weeks late and the API was buggy
     - Spent $120K more than planned on vendor integration
     - Lesson: The vendor was chosen because they were the
       cheapest, not the most reliable

  3. Technical debt (Months 5-9):
     - Under time pressure, the team took shortcuts
     - Accumulated technical debt required a 4-week
       stabilization period before launch
     - 47 bugs found in UAT (12 critical)

  4. Team issues (throughout):
     - 2 of 6 contractors underperformed and were replaced
       in Month 6 (lost 3 weeks to transition)
     - Senior developer burned out in Month 8 and took
       medical leave
     - Team morale declined from Month 4 onward

  What went right:

  1. The final product works well — users rate it 4.2/5
  2. The architecture is solid and scalable
  3. Strong partnership with the operations team who
     were excellent testers
  4. The PM (you) escalated risks early and consistently
  5. Despite challenges, no data security incidents
  6. The platform is projected to save $3.2M annually
     in supply chain efficiency

  Quantitative summary:
  - Schedule: 33% late (9 → 12 months)
  - Budget: 40% over ($1.5M → $2.1M)
  - Scope: Net increase of 15% from original
  - Quality: Final product quality is high (4.2/5 user
    rating, 99.8% uptime in first month)
  - Business value: $3.2M projected annual savings
    (ROI positive in 8 months despite overruns)

  Task: Create the formal post-mortem report.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive, balanced post-mortem — analyzes both what went wrong and what went right with equal rigor; presents the quantitative summary upfront (schedule, budget, scope, quality, value); organizes the analysis by theme (requirements management, vendor management, technical practices, team management) rather than chronologically; avoids blame while still being honest about failures; acknowledges that despite significant overruns, the project delivered real business value ($3.2M annual savings)."
    weight: 0.35
    description: "BalancedPostMortem"
  - type: llm_judge
    criteria: "Response provides systemic lessons, not finger-pointing — identifies root causes at the process level: lack of change control process (not 'the VP kept changing requirements'), vendor selection criteria that prioritized cost over reliability (not 'the vendor was bad'), absence of technical debt management practices (not 'the team cut corners'), insufficient contractor vetting (not 'the contractors were lazy'); each lesson includes: what happened, the systemic root cause, the quantified impact, and a specific recommendation for future projects."
    weight: 0.35
    description: "SystemicLessons"
  - type: llm_judge
    criteria: "Response provides actionable recommendations for the PMO — includes 5-8 specific recommendations the PMO can implement across all projects (formal change control process, vendor evaluation criteria revision, technical debt budgeting, contractor performance monitoring, team wellbeing checkpoints); each recommendation is tied to a specific failure from this project; includes a 'what we'd do differently' section; the post-mortem serves as a reference document for future PMs facing similar challenges; acknowledges that some overruns can be acceptable if the business value justifies them."
    weight: 0.30
    description: "ActionableRecommendations"
