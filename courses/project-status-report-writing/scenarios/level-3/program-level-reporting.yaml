meta:
  id: program-level-reporting
  level: 3
  course: project-status-report-writing
  type: output
  description: "Program-level reporting — create a consolidated program status report that aggregates multiple related projects and highlights cross-project dependencies and risks"
  tags: [program, portfolio, consolidated, dependencies, advanced]

state: {}

trigger: |
  You're a program manager overseeing a Digital Transformation
  Program consisting of 5 related projects. The CEO wants a
  monthly program status report for the executive team.

  Program: Digital Transformation 2026
  Duration: 18 months (currently Month 7)
  Total Budget: $12M
  Program Sponsor: CEO
  Overall Program Status: AMBER

  Project 1 — CRM Modernization (PM: Sarah)
  Status: GREEN | Budget: $3M ($1.4M spent) | Schedule: On track
  - Salesforce implementation progressing well
  - Data migration 70% complete
  - Go-live target: Month 10 (unchanged)

  Project 2 — E-commerce Platform (PM: David)
  Status: AMBER | Budget: $3.5M ($2.1M spent — 60% at 39%) | Schedule: 3 weeks behind
  - New payment gateway integration delayed by vendor
  - Mobile experience redesign taking longer than planned
  - 2 key developers resigned (replacements being hired)
  - Go-live target: Month 12 → revised to Month 13

  Project 3 — Data Analytics Platform (PM: Priya)
  Status: RED | Budget: $2.5M ($1.8M spent — 72% at 39%) | Schedule: 6 weeks behind
  - Depends on CRM data (Project 1) and E-commerce data (Project 2)
  - Data modeling scope expanded 40% when actual data complexity discovered
  - Original vendor couldn't deliver; replaced mid-project
  - Go-live target: Month 14 → revised to Month 16 (2 months late)
  - Budget forecast: $3.2M (28% over original)

  Project 4 — Process Automation (PM: Chen)
  Status: GREEN | Budget: $1.5M ($550K spent) | Schedule: On track
  - 12 of 30 business processes automated
  - Strong business adoption (4.2/5 user satisfaction)
  - Go-live: phased, already delivering value

  Project 5 — Cybersecurity Upgrade (PM: Maria)
  Status: GREEN | Budget: $1.5M ($600K spent) | Schedule: On track
  - Network segmentation complete
  - Identity management rollout in progress
  - Compliance audit prep on schedule

  Cross-project dependencies:
  - Project 3 (Analytics) depends on data from Projects 1 and 2
  - Project 2's delay cascades to Project 3's analytics capability
  - Process Automation (Project 4) integrates with CRM (Project 1)
  - Cybersecurity (Project 5) affects all projects' deployment approach

  Program-level concerns:
  1. Total budget: $12M planned, $11.7M forecast (if Project 3
     absorbs its overrun from existing contingency) or $12.7M
     (if additional funding needed)
  2. Project 3 is the critical path for the program's
     primary KPI: "data-driven decision making by end of 2026"
  3. The board wants to see measurable ROI by Month 12 — only
     Project 4 is currently delivering measurable value

  Task: Create the monthly program status report.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive program-level status report — presents all 5 projects with individual RAG status, key metrics, and current state in a consolidated view; shows overall program status (AMBER) with the primary driver (Project 3 RED, Project 2 AMBER); includes program-level budget rollup ($12M total, forecast $11.7-12.7M depending on decisions); shows program timeline with all 5 projects' go-live dates on a single view; highlights the program's primary KPI ('data-driven decision making by end of 2026') and assesses whether it's achievable given current trajectory."
    weight: 0.35
    description: "ProgramLevelView"
  - type: llm_judge
    criteria: "Response highlights cross-project dependencies and their impact — clearly shows how Project 2's delay cascades to Project 3's analytics capability; maps the dependency chain (CRM data → Analytics, E-commerce data → Analytics); identifies the critical path through the program (Project 3 is the gate to the program's primary KPI); shows how Project 5's cybersecurity requirements affect deployment planning for all projects; the report helps the executive team understand the program as an integrated system, not 5 independent projects."
    weight: 0.35
    description: "DependencyMapping"
  - type: llm_judge
    criteria: "Response provides program-level recommendations and decision requests — addresses the board's Month 12 ROI expectation realistically (only Project 4 delivering value currently — propose showcasing Process Automation results while managing expectations for Analytics); recommends actions for the RED project (Project 3: additional funding decision, scope reduction options, timeline acceptance); provides a program-level risk assessment (not just per-project risks but systemic program risks); presents decisions needed from the CEO and executive team with clear options and implications."
    weight: 0.30
    description: "ProgramRecommendations"
