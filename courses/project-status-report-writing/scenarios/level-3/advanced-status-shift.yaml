meta:
  id: advanced-status-shift
  level: 3
  course: project-status-report-writing
  type: output
  description: "Advanced status shift — write a status report when you discover that previous reports were inaccurate and the project is in worse shape than anyone realizes"
  tags: [shift, advanced, correction, discovery, honesty]

state: {}

trigger: |
  You just took over as project manager for a project that
  the previous PM left (they resigned suddenly). As you
  review the project, you realize the previous PM's status
  reports were misleading. The project is in much worse
  shape than leadership believes. You need to write your
  first status report — one that corrects the record.

  Project: Customer 360 Data Platform
  Timeline: 10 months (currently Month 7)
  Budget: $1.8M
  Previous PM Status (last report, 2 weeks ago): GREEN

  What the previous PM reported:
  - "Development 70% complete, on track for Month 10 launch"
  - "Budget on track at $1.1M spent"
  - "All milestones met"
  - "Team is performing well"

  What you've discovered after 2 weeks of assessment:

  1. Development is actually 40-45% complete, not 70%.
     The previous PM was counting features as "done" when
     they were coded but not tested. 12 of the 30 "completed"
     features fail integration testing. They need significant
     rework.

  2. Budget: $1.1M has been spent, but $200K of invoices
     from the data integration vendor were not recorded.
     Actual spend is $1.3M (72% at 70% timeline). The vendor
     has also submitted a change order for $150K for
     additional data mapping work.

  3. Milestones: 3 milestones were marked "complete" but
     actually have open defects that prevent true completion.
     The QA team confirms they flagged these defects but were
     told by the previous PM to "log them for later."

  4. Team: Morale is very low. The team knew the project was
     behind but felt pressured to report GREEN. Two team
     members are interviewing elsewhere. The lead architect
     told you: "I tried to raise concerns but was told to
     stay positive in status updates."

  5. Vendor relationship: The data integration vendor is
     frustrated. They've been asking for scope clarification
     for 6 weeks and the previous PM didn't respond. They're
     threatening to pause work.

  Your realistic assessment:
  - True completion: 40-45%
  - True budget position: $1.3M spent + $150K pending change
    order = $1.45M of $1.8M budget consumed at 45% done
  - Realistic timeline: 4-5 more months needed (Month 11-12)
  - The project is recoverable but needs significant
    intervention

  Task: Write your first status report as the new PM that
  corrects the record honestly.

assertions:
  - type: llm_judge
    criteria: "Response honestly corrects the previous reporting without character assassination — changes the project status from GREEN to RED with clear justification; presents the corrected metrics (40-45% complete not 70%, $1.3M actual spend not $1.1M, 3 milestones with open defects); explains the discrepancy factually (features counted as done without testing, unrecorded invoices, defects deferred) without personal attacks on the previous PM; the report builds credibility through transparency while being professional about the predecessor."
    weight: 0.35
    description: "HonestCorrection"
  - type: llm_judge
    criteria: "Response provides a realistic recovery plan — presents the project as recoverable with intervention; includes a revised timeline (Month 11-12), revised budget forecast (including the $150K change order), and specific recovery actions; addresses the team morale issue (create a safe environment for honest reporting); addresses the vendor relationship (respond to scope clarification, process the change order); addresses the quality issues (establish proper QA gates, rework the 12 failing features); provides a new baseline that leadership can trust."
    weight: 0.35
    description: "RecoveryPlan"
  - type: llm_judge
    criteria: "Response addresses the systemic reporting failure — identifies not just what went wrong with the project but what went wrong with the reporting process: the team felt pressured to report GREEN, the QA team's concerns were suppressed, the architect who raised issues was told to 'stay positive'; recommends process changes to prevent future reporting manipulation (independent QA validation, definition of 'done' enforcement, team anonymous feedback channels); the report serves as a case study for the importance of honest status reporting."
    weight: 0.30
    description: "SystemicLessons"
