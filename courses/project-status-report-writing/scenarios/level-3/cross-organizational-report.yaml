meta:
  id: cross-organizational-report
  level: 3
  course: project-status-report-writing
  type: output
  description: "Cross-organizational project report — create a status report for a project that spans multiple departments with different priorities, cultures, and reporting preferences"
  tags: [cross-organizational, departments, alignment, politics, advanced]

state: {}

trigger: |
  You're the project manager for a company-wide initiative
  that spans 4 departments. Each department has different
  expectations for status reporting and different levels of
  engagement. You need to create ONE report that works for
  all of them.

  Project: Company-Wide Data Governance Initiative
  Duration: 12 months (currently Month 5)
  Budget: $800K
  Sponsor: COO

  Department perspectives:

  IT Department (CIO — your home department):
  - Wants technical details: infrastructure, data models,
    integration points
  - Prefers dashboards with metrics
  - Very supportive — sees this as their strategic initiative
  - Status: On track technically

  Legal & Compliance (General Counsel):
  - Only cares about regulatory compliance (GDPR, CCPA)
  - Wants to know: are we compliant by the deadline? Yes/no.
  - Frustrated that IT keeps sending technical reports she
    can't understand
  - Status: Compliance framework 60% defined, on track

  Sales Department (VP Sales):
  - Initially resistant: "Why do we need data governance?"
  - Now somewhat engaged after seeing how bad data costs deals
  - Wants to know: when will CRM data quality improve?
  - Has not assigned a dedicated resource despite committing
  - Status: Sales data cleanup 30% complete, behind due to
    no dedicated resource

  Finance Department (CFO):
  - Wants cost justification for everything
  - Skeptical about the $800K budget: "Show me the ROI"
  - Insists on formal monthly financial reporting
  - Status: Budget on track ($340K spent of $800K)

  Cross-departmental issues:
  1. Data ownership disputes: Sales and Marketing both claim
     ownership of customer data. No resolution yet.
  2. MDM tool selection stalled — IT, Finance, and Sales
     can't agree on vendor.
  3. Training rollout delayed because HR hasn't provided
     the training schedule.

  Task: Create the status report that serves all 4
  departmental audiences.

assertions:
  - type: llm_judge
    criteria: "Response creates a report that addresses all 4 departmental perspectives — includes a section or lens for each audience: technical progress for IT (infrastructure, integration, data model completion), compliance status for Legal (regulatory framework progress, compliance gap analysis, deadline confidence), business impact for Sales (CRM data quality improvement timeline, deal impact quantification), and financial accountability for Finance (budget status, ROI tracking, cost justification); the report doesn't try to be all things to all people but provides clear sections that each stakeholder can navigate to quickly."
    weight: 0.35
    description: "MultiplePerspectives"
  - type: llm_judge
    criteria: "Response addresses cross-departmental blockers and politics — documents the data ownership dispute between Sales and Marketing diplomatically; flags the MDM vendor selection stall as a risk requiring COO intervention; addresses the Sales department's missing dedicated resource as a commitment gap affecting timeline; handles the HR training schedule dependency; presents these issues as organizational alignment needs, not departmental failures; provides specific recommendations for resolution."
    weight: 0.35
    description: "CrossDepartmentalIssues"
  - type: llm_judge
    criteria: "Response manages the COO sponsor effectively — provides the COO with a clear picture of organizational adoption challenges (not just technical progress); highlights where COO intervention is needed (data ownership resolution, vendor selection decision, resource commitment enforcement); includes an overall program health assessment that acknowledges strong technical progress but flags organizational adoption as the primary risk; the report enables the COO to take specific actions."
    weight: 0.30
    description: "SponsorManagement"
