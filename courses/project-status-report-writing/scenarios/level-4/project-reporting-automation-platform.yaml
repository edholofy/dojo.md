meta:
  id: project-reporting-automation-platform
  level: 4
  course: project-status-report-writing
  type: output
  description: "Project reporting automation platform — architect an enterprise platform that automates status report generation using AI and integrations across the entire project portfolio"
  tags: [automation, platform, enterprise, ai, expert]

state: {}

trigger: |
  You're the VP of Project Delivery at a global professional
  services firm (10,000 employees, 500+ active client
  projects). The CEO has approved a $2M investment to build
  an AI-powered project reporting platform:

  "Our project managers spend 15% of their time on status
  reporting instead of managing projects. That's $30M in
  PM salary annually — $4.5M wasted on report writing.
  I want a platform that generates 90% of the status report
  automatically, lets the PM add the 10% human insight, and
  delivers it to the right stakeholders in the right format.
  If we get this right, it's also a competitive advantage —
  our clients will get better visibility than any other firm
  offers."

  Current state:
  - 500+ active projects across 15 industries
  - 300 project managers (junior to senior partner level)
  - Tools in use: Jira (60% of projects), MS Project (25%),
    Monday.com (10%), spreadsheets (5%)
  - CRM: Salesforce (client data, contracts, invoicing)
  - Finance: SAP (budgets, actuals, resource costs)
  - Time tracking: Custom system (hours by project/task)
  - Communication: Slack, email, Teams
  - Document management: SharePoint, Confluence

  Requirements:
  1. Auto-generate weekly status reports by pulling data from
     all source systems
  2. AI-powered narrative generation for accomplishments,
     risks, and next steps
  3. Multi-format output: client-facing PDF, internal
     dashboard, executive summary, email digest
  4. Predictive analytics: flag at-risk projects automatically
  5. Client portal: clients can see real-time project status
  6. Natural language queries: "Show me all RED projects in
     financial services" or "What's the burn rate on Project X?"
  7. Integration with existing tools (no rip-and-replace)
  8. Support for multiple languages (firm operates in 12
     countries)

  Constraints:
  - Client data confidentiality (some projects are under NDA)
  - Data residency requirements in EU and Asia
  - 300 PMs with varying technical skill levels
  - Must work alongside existing tools, not replace them
  - $2M budget over 18 months

  Task: Architect the project reporting automation platform.

assertions:
  - type: llm_judge
    criteria: "Response architects a comprehensive platform — includes system architecture with data integration layer (connectors to Jira, MS Project, Monday.com, Salesforce, SAP, time tracking), data warehouse/lake for aggregation, AI/ML layer for narrative generation and predictive analytics, presentation layer for multi-format output, and client portal; addresses all 7 functional requirements; provides a realistic technology stack recommendation within the $2M budget; includes data flow diagrams or architecture descriptions showing how data moves from source systems through to generated reports."
    weight: 0.35
    description: "PlatformArchitecture"
  - type: llm_judge
    criteria: "Response addresses AI-powered features thoughtfully — designs the AI narrative generation with appropriate guardrails (PM review before distribution, confidence scoring, human-in-the-loop for sensitive content); includes predictive analytics using historical project data (risk scoring, outcome forecasting); addresses the natural language query capability; designs the multi-language support for 12 countries; addresses the balance between automation and PM judgment; includes a training data strategy (how do you train the AI on good status reports vs bad ones); considers AI hallucination risks in a professional services context."
    weight: 0.35
    description: "AIFeatures"
  - type: llm_judge
    criteria: "Response includes security, compliance, and implementation — addresses client data confidentiality (role-based access, NDA-flagged projects with restricted visibility, data isolation); addresses EU and Asia data residency with appropriate architecture decisions; includes a phased implementation plan over 18 months (MVP → enhanced → full platform); addresses adoption strategy for 300 PMs; provides ROI calculation against the $4.5M annual waste in PM reporting time; includes the client portal as a competitive differentiator; addresses ongoing maintenance and evolution of the platform."
    weight: 0.30
    description: "SecurityAndImplementation"
