meta:
  id: agile-transformation-reporting
  level: 4
  course: project-status-report-writing
  type: output
  description: "Agile transformation reporting — design status reporting that works during an organization's transition from waterfall to agile, bridging both methodologies"
  tags: [agile-transformation, hybrid, transition, bridging, expert]

state: {}

trigger: |
  You're the Agile Transformation Lead at a large bank
  (15,000 employees). The bank is transitioning from
  waterfall to agile over 3 years. You're in Year 2 and
  the transformation is creating a reporting crisis:

  "Our executives are used to Gantt charts and milestone
  reports. Our agile teams refuse to report in waterfall
  format — they say it's antithetical to agile principles.
  Meanwhile, the regulators require specific project
  documentation formats that neither pure agile nor pure
  waterfall teams produce consistently. We need a reporting
  approach that works for everyone during this transition."

  Current state:
  - 40% of teams are fully agile (80 teams, 15 SAFe trains)
  - 30% are hybrid (using agile practices with waterfall gates)
  - 30% are still waterfall (mostly regulatory and
    infrastructure projects)
  - 200+ active projects/initiatives across all methodologies

  Stakeholder expectations:
  - Board and regulators: Want milestone-based reports with
    clear deliverable dates and compliance evidence
  - C-suite: Want portfolio-level dashboards showing
    investment ROI and strategic progress
  - VPs and Directors: Want team performance and delivery
    metrics
  - Agile teams: Want sprint-based metrics, velocity, and
    outcome-based reporting
  - PMO: Wants a single reporting framework that works
    for everything

  Current problems:
  1. Agile teams report in story points and velocity — execs
     don't understand these metrics
  2. Waterfall teams report in percentage complete — agile
     coaches say this is misleading
  3. Hybrid teams report inconsistently — some lean agile,
     some lean waterfall
  4. No way to compare or aggregate across methodologies
  5. SAFe PI planning creates a natural reporting cadence
     that doesn't match the quarterly executive cycle
  6. Regulatory projects require specific documentation
     that agile teams aren't producing

  Budget for reporting transformation: $300K
  Timeline: New framework must be in place within 6 months

  Task: Design the unified reporting framework that bridges
  agile and waterfall during the transformation.

assertions:
  - type: llm_judge
    criteria: "Response designs a unified reporting framework that bridges methodologies — creates a common reporting layer that normalizes agile metrics (velocity, story points, sprint completion) and waterfall metrics (milestones, percentage complete, EVM) into comparable indicators (outcome delivery rate, investment burn rate, risk index, value delivered); doesn't force either methodology to change its internal practices but creates a translation layer for cross-methodology reporting; addresses the 200+ projects across 3 methodology types; includes portfolio-level aggregation that allows comparison regardless of methodology."
    weight: 0.35
    description: "UnifiedFramework"
  - type: llm_judge
    criteria: "Response addresses each stakeholder group's needs — shows how the framework serves: the board (milestone-equivalent views of agile work using PI objectives and features), the C-suite (portfolio dashboards with ROI and strategic alignment), VPs (team performance metrics), agile teams (preserve sprint-based reporting), PMO (single framework), and regulators (compliance documentation requirements mapped to agile artifacts); includes specific examples of how to translate agile concepts for traditional executives (e.g., 'an epic is a project milestone,' 'PI objectives are quarterly deliverables'); addresses the SAFe PI planning to executive quarterly cycle alignment."
    weight: 0.35
    description: "StakeholderNeeds"
  - type: llm_judge
    criteria: "Response includes implementation plan and change management — provides a phased rollout within the 6-month timeline; addresses the cultural resistance from both sides (agile purists who resist any 'waterfall' reporting and traditional managers who don't trust agile metrics); includes training for executives on agile metrics and for agile teams on regulatory documentation; proposes technology solutions within the $300K budget (Jira + reporting overlay, or similar); includes success metrics for the framework; addresses how the framework will evolve as more teams move to agile (eventually the waterfall layer becomes unnecessary)."
    weight: 0.30
    description: "ImplementationPlan"
