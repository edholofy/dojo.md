meta:
  id: pmo-reporting-framework
  level: 4
  course: project-status-report-writing
  type: output
  description: "PMO reporting framework — design an enterprise PMO reporting framework that standardizes status reporting across an organization with multiple methodologies and project types"
  tags: [pmo, framework, standardization, enterprise, expert]

state: {}

trigger: |
  You're the newly appointed PMO Director at a financial
  services company (8,000 employees). The CEO hired you
  specifically to "professionalize project management." Your
  first mandate: standardize project status reporting.

  Current state (chaos):
  - 75 active projects, $300M annual project spend
  - 22 project managers with varying experience levels
  - Project types: IT (40%), regulatory (25%), product (20%),
    infrastructure (15%)
  - Methodologies in use: waterfall (45%), agile (35%),
    hybrid (20%)
  - Current reporting: each PM uses their own format
  - No common definition of RAG status — one PM's GREEN
    is another PM's AMBER
  - Executive team receives 15-20 status emails per week
    in different formats
  - Board Technology Committee gets a manually assembled
    PowerPoint each quarter that takes the CTO 2 days to
    create
  - No centralized project data — information scattered
    across Jira, MS Project, SharePoint, and email
  - PMO maturity level: assessed at Level 1 (ad hoc)

  Target state:
  - Standardized reporting across all 75 projects
  - Automated portfolio dashboards for executives
  - Board-ready quarterly reports generated in hours, not days
  - PMO maturity level 3 (defined) within 18 months

  Constraints:
  - Budget: $500K for tooling and implementation
  - Cannot force all projects to use the same methodology
  - Must accommodate regulated projects with specific
    documentation requirements
  - Some PMs will resist standardization ("my project is
    unique")
  - The organization has a history of failed PMO initiatives

  Task: Design the enterprise PMO reporting framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive PMO reporting framework — includes reporting standards (common RAG definitions with objective criteria, standard metrics per project type, reporting cadence by project size and risk); creates a template hierarchy (project-level weekly, program-level monthly, portfolio quarterly, board quarterly); defines minimum required data elements that all projects must report regardless of methodology; addresses the methodology diversity (agile, waterfall, hybrid) by creating a common reporting layer that normalizes different metrics (velocity and burndown for agile, EVM and milestones for waterfall) into comparable portfolio-level indicators."
    weight: 0.35
    description: "FrameworkDesign"
  - type: llm_judge
    criteria: "Response includes governance, adoption, and change management — creates a reporting governance structure (who defines standards, who ensures compliance, who reviews quality); addresses PM resistance with a pragmatic approach (phased rollout, PM involvement in template design, demonstrate value before mandating compliance); includes training and enablement for 22 PMs with varying experience; provides an adoption roadmap that moves from voluntary to required over time; addresses the organization's history of failed PMO initiatives by designing for quick wins and visible value; includes quality assurance processes for status reports."
    weight: 0.35
    description: "GovernanceAndAdoption"
  - type: llm_judge
    criteria: "Response includes technology architecture and maturity roadmap — recommends a technology stack within the $500K budget that integrates with existing tools (Jira, MS Project, SharePoint); provides a data architecture for centralizing project information; includes the CTO's quarterly board report automation (from 2 days to hours); provides a maturity roadmap from Level 1 to Level 3 with specific milestones; includes success metrics for the framework itself (PM adoption rate, executive satisfaction, reporting accuracy, time-to-report); addresses regulatory project requirements within the framework."
    weight: 0.30
    description: "TechnologyAndMaturity"
