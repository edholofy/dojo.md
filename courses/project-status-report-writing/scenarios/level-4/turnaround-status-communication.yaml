meta:
  id: turnaround-status-communication
  level: 4
  course: project-status-report-writing
  type: output
  description: "Turnaround status communication — develop a communication strategy for a failing project that needs to rebuild stakeholder confidence through transparent, credible reporting"
  tags: [turnaround, failing, confidence, recovery, expert]

state: {}

trigger: |
  You've been brought in as the turnaround project manager
  for a failing enterprise project. The project has been RED
  for 4 months and stakeholder confidence is at zero. The
  CEO told you: "I'm giving you one chance to save this
  project. If you can't show credible progress in 90 days,
  we're killing it."

  Project: Enterprise Resource Planning (ERP) Implementation
  Original: 18 months, $8M | Current: Month 14, $7.2M spent
  Status: RED for 4 consecutive months
  Previous PM: Removed in Month 10

  The mess you inherited:
  1. Trust deficit: Previous PM reported GREEN until Month 10,
     then it went straight to RED. Leadership feels deceived.
     The CFO said: "I don't believe any status report from
     this project anymore."

  2. Scope/schedule: Original scope was 8 modules. Only 3 are
     complete. 2 more are 60-70% done. 3 haven't started.
     The original go-live date (Month 18) is impossible.

  3. Budget: $7.2M of $8M spent with only 40% of scope
     delivered. EAC is $12-14M if all 8 modules are delivered.

  4. Vendor relationship: The ERP vendor is owed $800K in
     unpaid invoices. They've reduced their team from 8 to 3
     consultants. Relationship is adversarial.

  5. Team: Of 15 original team members, 8 remain. Morale is
     described as "defeated." The remaining team is competent
     but exhausted.

  6. Organizational impact: 500 employees are waiting for the
     new ERP. They've been in limbo for 14 months — processes
     are broken because the old system was partially
     decommissioned in preparation for migration.

  Your assessment after 2 weeks:
  - The 3 completed modules work well
  - The 2 in-progress modules can be finished in 8 weeks
  - The 3 unstarted modules are less critical and could be
    Phase 2 (12-18 months later)
  - Total cost to complete the 5-module scope: $2.5M additional
  - Vendor relationship is salvageable if invoices are paid
  - Go-live for 5 modules: achievable in 4 months (Month 18)

  Task: Design the turnaround communication strategy and
  write the first status report that begins rebuilding trust.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible turnaround communication strategy — acknowledges the trust deficit and addresses it directly (doesn't pretend the past didn't happen); establishes new reporting standards that demonstrate transparency (weekly reports with verifiable metrics, not narrative assessments); proposes a reporting cadence appropriate for a RED project (weekly to steering committee, bi-weekly to CEO); includes a 90-day communication plan with specific milestones the stakeholders can verify; addresses the CFO's distrust with data-driven, verifiable reporting; the strategy prioritizes credibility over optimism."
    weight: 0.35
    description: "TurnaroundStrategy"
  - type: llm_judge
    criteria: "Response writes a credible first status report — presents the honest current state (40% scope complete, $7.2M of $8M spent, 5 of 8 modules achievable); proposes the revised scope (5 modules now, 3 in Phase 2) with clear rationale; provides a realistic revised timeline (Month 18 for 5-module go-live); presents the additional $2.5M budget request with detailed justification; addresses the vendor relationship recovery plan; addresses the team situation (rebuilding morale, potential additional hires); the report is brutally honest but constructive — it acknowledges reality while proposing a viable path forward."
    weight: 0.35
    description: "FirstStatusReport"
  - type: llm_judge
    criteria: "Response addresses the organizational impact and stakeholder management — acknowledges the 500 employees in limbo and proposes interim solutions; addresses each stakeholder group differently (CEO needs confidence in recovery, CFO needs budget transparency, end users need timeline clarity, vendor needs payment commitment, team needs leadership and hope); includes specific trust-building mechanisms (verifiable milestones every 2 weeks, independent QA validation, transparent budget tracking); the communication strategy is designed to gradually rebuild confidence through demonstrated delivery, not promises."
    weight: 0.30
    description: "StakeholderManagement"
