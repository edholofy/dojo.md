meta:
  id: predictive-project-analytics
  level: 4
  course: project-status-report-writing
  type: output
  description: "Predictive project analytics — design a predictive analytics framework that uses historical project data to forecast outcomes and identify at-risk projects before they fail"
  tags: [predictive, analytics, forecasting, data-driven, expert]

state: {}

trigger: |
  You're the VP of Project Delivery at a large IT consulting
  firm (5,000 consultants, 200 active client projects). The
  CEO wants to move from reactive status reporting to
  predictive analytics:

  "We find out projects are in trouble when they're already
  RED. By then it's too late. I want to predict which
  projects will go RED before they do. We have 10 years of
  project data — use it."

  Available historical data (10 years, 2,000+ projects):
  - Project type, size, methodology, industry, team size
  - Weekly status reports (RAG history, milestone data)
  - Budget performance (planned vs actual by month)
  - Resource data (team turnover, utilization, experience)
  - Risk registers and issue logs
  - Client satisfaction scores
  - Final project outcomes (on-time, on-budget, scope met)
  - Post-mortem reports for 200+ projects

  Known patterns from ad hoc analysis:
  - Projects that change PM mid-stream are 3x more likely
    to go RED
  - Projects where the first milestone slips are 2.5x more
    likely to finish late
  - Projects with > 20% scope change in first quarter have
    67% probability of budget overrun
  - Resource utilization above 95% precedes quality issues
    by 4-6 weeks
  - Declining stakeholder meeting attendance correlates with
    project cancellation

  Current reporting:
  - Weekly PM status reports (traditional, narrative + RAG)
  - Monthly portfolio reviews
  - Quarterly executive briefings
  - No automated analytics or predictive capabilities

  Budget for analytics initiative: $2M over 2 years
  Team: Can hire 3-4 data analysts/engineers

  Task: Design the predictive project analytics framework
  and show how it integrates with status reporting.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive predictive analytics framework — identifies specific predictive indicators from the historical data (PM change, first milestone slip, scope change rate, utilization levels, stakeholder engagement decline); proposes a risk scoring model that combines multiple indicators into a project health score; includes both leading indicators (things that predict future problems) and lagging indicators (confirmation of current state); creates an early warning system with defined thresholds and alert mechanisms; the framework is grounded in the firm's actual historical patterns, not generic project management theory."
    weight: 0.35
    description: "PredictiveFramework"
  - type: llm_judge
    criteria: "Response integrates predictive analytics with status reporting — shows how traditional PM status reports are enhanced with predictive data (e.g., a project reporting GREEN but showing early warning indicators gets flagged); creates a new reporting layer that combines PM assessment with data-driven prediction; addresses the tension between PM judgment and algorithmic prediction (both have value); includes dashboard designs showing the predictive health score alongside traditional RAG status; proposes a process for when PM assessment and predictive model disagree."
    weight: 0.35
    description: "ReportingIntegration"
  - type: llm_judge
    criteria: "Response provides a practical implementation plan — includes a phased approach (Phase 1: data infrastructure, Phase 2: model development, Phase 3: integration with reporting); addresses data quality challenges (10 years of data in varying formats); proposes the team structure for the 3-4 analysts/engineers; allocates the $2M budget across infrastructure, tools, hiring, and model development; includes success metrics (prediction accuracy, early warning lead time, reduction in RED projects); addresses the cultural change required (PMs need to trust and use the predictions, not feel surveilled)."
    weight: 0.30
    description: "ImplementationPlan"
