meta:
  id: expert-status-shift
  level: 4
  course: project-status-report-writing
  type: output
  description: "Expert status shift — navigate a complex situation where accurate status reporting has legal, financial, and ethical implications involving multiple stakeholders with competing interests"
  tags: [shift, expert, legal, ethics, competing-interests]

state: {}

trigger: |
  You're the VP of Project Delivery at a systems integration
  firm. You're managing a $20M government contract that's in
  serious trouble, and accurate status reporting has become
  a legal and ethical minefield.

  Project: State Benefits Administration System
  Contract: $20M fixed-price, 2-year delivery
  Client: State Department of Human Services
  Current: Month 16 of 24
  Overall Status: Should be RED but is being reported as AMBER

  The situation:

  1. Your firm's CEO has instructed you to keep the project
     at AMBER status in external reports to the state client.
     "If we go RED, it triggers a contract review clause that
     allows the state to bring in an independent assessor.
     That assessor will find problems we haven't disclosed.
     Keep it AMBER."

  2. The project is actually:
     - 45% complete at 67% of timeline (significantly behind)
     - $14M spent of $20M budget with only 45% scope delivered
     - EAC is $28-32M (40-60% over budget)
     - 3 key deliverables are 4+ months late
     - Data migration has critical defects affecting 15,000
       benefit recipients

  3. The data migration defects mean that 15,000 people are
     receiving incorrect benefit calculations. Some are being
     overpaid (creating future clawback issues) and some are
     being underpaid (a potential civil rights issue for
     vulnerable populations).

  4. Your project lead has filed an internal ethics complaint
     saying the AMBER reporting is "misleading the client and
     potentially harming benefit recipients."

  5. The state's Inspector General has started asking questions
     about the project timeline. They haven't requested an
     audit yet, but they're aware of complaints from benefit
     recipients.

  6. Your firm's board is considering a $5M write-down on
     the contract. The CFO says: "If we disclose the true
     status, the stock price drops 15%."

  7. Your legal team says: "Government contracts have strict
     reporting requirements. Knowingly misrepresenting
     project status on a government contract is a False
     Claims Act violation. Potential penalties: treble
     damages plus $11K per false claim."

  You are preparing this month's status report. The CEO
  wants AMBER. Legal says RED is legally required. Ethics
  says RED is morally required. Finance says RED will cost
  the firm $50M in market cap.

  Task: Write your recommended status report and explain
  your decision on status designation with full awareness
  of the implications.

assertions:
  - type: llm_judge
    criteria: "Response recommends honest RED status reporting with legal and ethical justification — acknowledges the CEO's pressure but recommends RED status based on: legal requirement (False Claims Act exposure from knowingly misrepresenting government contract status), ethical obligation (15,000 benefit recipients affected by data defects, including vulnerable populations being underpaid), professional responsibility (the project lead's ethics complaint creates a documentation trail), and business risk analysis (the short-term stock price impact is less severe than False Claims Act treble damages and potential debarment from government contracts); the response demonstrates moral courage while being pragmatic about the consequences."
    weight: 0.35
    description: "EthicalDecision"
  - type: llm_judge
    criteria: "Response writes a credible status report that addresses all dimensions — presents the project's actual status (45% complete at 67% timeline, $14M of $20M spent, EAC $28-32M); immediately addresses the data migration defects affecting 15,000 benefit recipients as the highest-priority issue requiring remediation; proposes a recovery plan (scope reduction, timeline extension, dedicated defect remediation team); presents the financial impact honestly ($5M write-down recommendation); addresses the Inspector General's inquiry proactively; the report demonstrates competence and accountability, not just failure reporting."
    weight: 0.35
    description: "CredibleReport"
  - type: llm_judge
    criteria: "Response addresses the organizational dynamics and provides a path forward — includes a recommendation to the CEO on why honest reporting is in the firm's long-term interest (cover-ups are always discovered, early disclosure enables negotiated resolution, the ethics complaint creates legal exposure if ignored); proposes a communication strategy for the state client (proactive disclosure with a remediation plan is better than being discovered); addresses the stock price concern with perspective (a managed disclosure with a recovery plan is less damaging than a scandal); addresses the project lead's ethics complaint as a signal to take seriously, not suppress; provides a realistic path forward for the project (revised scope, revised budget, dedicated benefit recipient remediation)."
    weight: 0.30
    description: "OrganizationalDynamics"
