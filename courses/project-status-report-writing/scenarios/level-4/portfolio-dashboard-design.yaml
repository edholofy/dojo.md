meta:
  id: portfolio-dashboard-design
  level: 4
  course: project-status-report-writing
  type: output
  description: "Portfolio dashboard design — design a comprehensive project portfolio dashboard for a PMO that provides executive visibility across 50+ active projects"
  tags: [portfolio, pmo, dashboard, executive, expert]

state: {}

trigger: |
  You're the PMO Director at a Fortune 500 manufacturing
  company. The CEO has given you a mandate: "I want to see
  the health of our entire $200M project portfolio on a
  single screen. Right now I get 50 different status reports
  from 50 different project managers in 50 different formats.
  Give me one dashboard that tells me where to focus."

  Portfolio context:
  - 52 active projects across 5 categories:
    - Digital Transformation: 12 projects ($60M)
    - Manufacturing Excellence: 15 projects ($55M)
    - Product Development: 10 projects ($40M)
    - Regulatory Compliance: 8 projects ($25M)
    - Infrastructure: 7 projects ($20M)
  - 180 project team members across all projects
  - 8 project managers reporting to you
  - Average project duration: 14 months
  - Current portfolio health: 30 GREEN, 15 AMBER, 7 RED

  Executive pain points:
  1. No visibility into resource conflicts across projects
  2. Can't see which projects share dependencies
  3. Budget tracking is fragmented — no portfolio-level view
  4. Strategic alignment unclear — which projects support
     which strategic objectives?
  5. Risk exposure unknown at the portfolio level
  6. No way to compare project performance across the portfolio

  Available data sources:
  - Microsoft Project Server (schedule data)
  - SAP (financial data, budget tracking)
  - Jira (agile projects — 20 of 52 projects)
  - SharePoint (status reports, risk registers)
  - HR system (resource allocation)

  Technology budget: $100K for dashboard tooling
  Timeline: Dashboard MVP in 8 weeks

  Task: Design the portfolio dashboard with all views, metrics,
  KPIs, and the underlying data architecture.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive portfolio dashboard — includes a single-screen executive summary showing overall portfolio health (30G/15A/7R), total budget vs spend, resource utilization, and strategic alignment scorecard; provides drill-down views by category (Digital, Manufacturing, Product, Regulatory, Infrastructure); includes project-level views accessible from the portfolio view; addresses all 6 executive pain points (resource conflicts, dependencies, budget, strategic alignment, risk exposure, performance comparison); the dashboard design is practical and buildable within the $100K and 8-week constraints."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Response includes specific KPIs, metrics, and visualization choices — defines portfolio-level KPIs (on-time delivery rate, budget adherence, resource utilization, risk index, strategic alignment score); specifies visualization types for each metric (RAG heat maps, trend lines, bubble charts for risk/impact, Gantt overlays for dependencies, resource histograms); includes portfolio financial dashboard (total spend trajectory, forecast vs budget, category-level burn rates, earned value metrics where applicable); provides alert and exception mechanisms (auto-flag projects crossing thresholds, trend deterioration alerts)."
    weight: 0.35
    description: "MetricsAndVisualization"
  - type: llm_judge
    criteria: "Response addresses data architecture and implementation — proposes a data integration strategy across the 5 source systems (Project Server, SAP, Jira, SharePoint, HR); recommends a dashboard technology within the $100K budget (Power BI, Tableau, or similar); addresses data quality challenges (how to normalize data from different sources, how to handle agile vs waterfall metrics); includes a phased implementation plan for the 8-week timeline (MVP with core metrics first, enhanced views later); addresses governance (who maintains the dashboard, how data freshness is ensured, how PMs contribute data consistently)."
    weight: 0.30
    description: "DataAndImplementation"
