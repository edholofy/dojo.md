meta:
  id: board-level-reporting
  level: 4
  course: project-status-report-writing
  type: output
  description: "Board-level project reporting — create a strategic project report for a corporate board of directors that connects project execution to business strategy and shareholder value"
  tags: [board, strategic, governance, fiduciary, expert]

state: {}

trigger: |
  You're the CTO of a publicly traded technology company
  ($2B revenue). The board's Technology Committee meets
  quarterly and you need to present the technology project
  portfolio status. The committee chair told you: "I don't
  want to hear about sprints and bug counts. Tell me: are
  our technology investments creating shareholder value?"

  Technology Portfolio (annual investment: $180M):

  Program 1 — AI Platform ($45M, Year 2 of 3)
  Business objective: Establish AI product line (projected
  $200M revenue by Year 5)
  Status: AMBER
  - Core ML platform launched Q2 — 23 enterprise clients
    in pilot (target was 30)
  - Customer feedback: product is strong but sales team
    can't articulate the value proposition
  - Revenue to date: $4.2M (target was $8M at this point)
  - Key risk: competitor launched similar product at 40%
    lower price point
  - CPI: 0.88 (over budget due to additional ML engineers)

  Program 2 — Platform Modernization ($60M, Year 3 of 4)
  Business objective: Reduce technical debt, improve platform
  reliability from 99.5% to 99.99%
  Status: GREEN
  - Reliability improved from 99.5% to 99.92%
  - Customer churn due to platform issues: reduced 45%
  - Estimated churn reduction value: $12M annually
  - On budget, 1 month ahead of schedule
  - 60% of legacy systems retired

  Program 3 — Cybersecurity ($30M, Year 1 of 2)
  Business objective: Meet SOC 2 Type II and protect
  against increasing threat landscape
  Status: GREEN
  - SOC 2 Type II audit passed (first time)
  - Zero data breaches (industry average: 1.2 per year
    for companies this size)
  - Insurance premium reduction: $2M annually
  - 3 enterprise deals ($15M combined) won specifically
    because of SOC 2 certification

  Program 4 — Data Analytics ($25M, Year 1 of 2)
  Business objective: Enable data-driven decision making
  across the organization
  Status: AMBER
  - Data warehouse operational but adoption is low (30%
    of target users active)
  - Root cause: data quality issues and insufficient
    training
  - Executive dashboard launched — CEO uses it daily
  - Cost savings from automated reporting: $1.5M annually
  - Risk: if adoption doesn't improve, ROI case weakens

  Program 5 — Customer Experience ($20M, Year 2 of 2)
  Business objective: Reduce customer support costs and
  improve NPS
  Status: GREEN
  - Self-service portal launched: 35% reduction in
    support tickets
  - Chatbot handling 28% of inquiries autonomously
  - NPS improved from 42 to 54
  - Annual support cost reduction: $8M
  - Customer satisfaction: highest in 5 years

  Task: Create the board Technology Committee report.

assertions:
  - type: llm_judge
    criteria: "Response creates a board-appropriate technology report — connects every program to shareholder value and business outcomes (not technical metrics); uses language directors understand (revenue impact, cost reduction, competitive positioning, risk mitigation) not engineering language (sprints, APIs, technical debt); presents the $180M annual technology investment in the context of business value delivered and expected; includes a technology portfolio ROI assessment; the report is strategic, concise, and appropriate for fiduciary oversight; includes appropriate governance content (risk oversight, investment allocation, strategic alignment)."
    weight: 0.35
    description: "BoardAppropriate"
  - type: llm_judge
    criteria: "Response addresses the AMBER programs with strategic framing — AI Platform: frames the revenue shortfall ($4.2M vs $8M) as a go-to-market issue not a technology issue, presents the competitive threat, and proposes strategic options for the board to consider (pricing strategy, differentiation, sales enablement); Data Analytics: frames the adoption challenge as a change management issue with a remediation plan, presents the ROI at risk if adoption doesn't improve; the board should understand the strategic implications and options, not the operational details."
    weight: 0.35
    description: "StrategicFraming"
  - type: llm_judge
    criteria: "Response provides portfolio-level strategic insights — presents the total value being created across all 5 programs (churn reduction $12M, insurance savings $2M, SOC 2-enabled deals $15M, support cost reduction $8M, reporting savings $1.5M — total quantifiable value: $38.5M+ against $180M investment); identifies strategic risks at the portfolio level (AI product competitive positioning, data analytics adoption); recommends portfolio-level decisions (increase AI sales enablement investment, accelerate data analytics change management); the report enables the board committee to fulfill its technology oversight responsibilities."
    weight: 0.30
    description: "PortfolioInsights"
