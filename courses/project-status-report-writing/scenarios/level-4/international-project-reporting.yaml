meta:
  id: international-project-reporting
  level: 4
  course: project-status-report-writing
  type: output
  description: "International project reporting — create status reporting for a global project with teams in multiple countries, languages, and regulatory environments"
  tags: [international, global, multi-cultural, compliance, expert]

state: {}

trigger: |
  You're the global program manager for a multinational
  insurance company deploying a new claims processing
  platform across 8 countries simultaneously. Each country
  has different regulatory requirements, languages, and
  project management cultures.

  Program: Global Claims Platform Deployment
  Duration: 24 months (currently Month 10)
  Budget: $45M across all countries
  Total team: 120 people across 8 countries

  Country deployments:

  USA (Lead: Jennifer, $12M): GREEN
  - Ahead of schedule, strong team, regulatory approval on track
  - FDA equivalent (state insurance regulators) approvals: 38 of 50 states

  UK (Lead: James, $8M): GREEN
  - On track, FCA regulatory submission complete
  - Brexit-related data residency requirements addressed

  Germany (Lead: Klaus, $6M): AMBER
  - Works council negotiations have delayed user testing by 6 weeks
  - BaFin regulatory requirements more stringent than anticipated
  - Klaus reports status in German; your translator is on vacation

  Japan (Lead: Yuki, $5M): AMBER
  - Cultural challenge: team is reluctant to report problems
  - You suspect the project is further behind than reported
  - FSA regulatory requirements require additional data fields
  - All documentation must be in Japanese for regulatory submission

  India (Lead: Priya, $4M): GREEN
  - Excellent progress, cost-efficient delivery
  - IRDAI regulatory compliance on track
  - Team works overtime without being asked (concerning for sustainability)

  Brazil (Lead: Carlos, $4M): RED
  - SUSEP regulatory changes mid-project require significant rework
  - Political instability affecting the local team's focus
  - Currency fluctuation has eroded budget by 12% in USD terms
  - Carlos escalated 3 times but feels ignored by global PMO

  France (Lead: Marie, $3.5M): AMBER
  - ACPR regulatory requirements nearly met
  - Strong labor laws limit overtime; timeline constrained
  - Marie insists on detailed process documentation that other
    countries consider excessive

  Australia (Lead: David, $2.5M): GREEN
  - On track, APRA regulatory compliance progressing
  - Smallest deployment, well-managed

  Cross-country challenges:
  1. No standardized status reporting format across countries
  2. Time zones make synchronous meetings nearly impossible
  3. Regulatory requirements vary dramatically (each country
     needs different data fields, retention policies, and
     audit trails)
  4. Cultural differences in risk reporting (Japan under-reports,
     Germany over-documents, USA is direct, Brazil is
     relationship-first)

  Task: Create the global program status report and propose
  a standardized reporting framework that accommodates
  cultural and regulatory differences.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive global program status report — presents all 8 countries with consistent metrics allowing comparison while acknowledging different contexts; shows overall program status (3 GREEN, 3 AMBER, 1 RED); includes program-level budget in USD with currency impact analysis (Brazil's 12% erosion); addresses regulatory compliance across all 8 countries with a unified tracking view; provides a global timeline showing country-by-country go-live dates and dependencies; the report serves as a single source of truth for global executive leadership."
    weight: 0.35
    description: "GlobalReport"
  - type: llm_judge
    criteria: "Response addresses cultural and regulatory complexity — handles Japan's under-reporting tendency with a diplomatically worded verification mechanism; addresses Germany's works council and documentation requirements as legitimate constraints; handles Brazil's RED status with empathy (Carlos escalated 3 times feeling ignored); addresses India's overtime concern proactively; accommodates France's documentation standards; proposes a standardized reporting framework that allows cultural adaptation while maintaining comparability; addresses the language challenges (German reports, Japanese regulatory docs)."
    weight: 0.35
    description: "CulturalComplexity"
  - type: llm_judge
    criteria: "Response proposes a workable global reporting framework — creates a standardized minimum dataset that all countries must report (core metrics in a common format) with allowance for country-specific additions; addresses time zone challenges with async reporting approaches; proposes a reporting cadence that works across cultures; includes a governance structure for the global PMO that respects local autonomy while ensuring global visibility; addresses the Brazil escalation failure (the system should not allow 3 escalations to be ignored); includes regulatory compliance tracking as a first-class element of the framework."
    weight: 0.30
    description: "GlobalFramework"
