meta:
  id: multi-portfolio-executive-reporting
  level: 4
  course: project-status-report-writing
  type: output
  description: "Multi-portfolio executive reporting — design executive reporting across multiple project portfolios with competing priorities, shared resources, and strategic interdependencies"
  tags: [multi-portfolio, executive, strategic, interdependencies, expert]

state: {}

trigger: |
  You're the VP of Enterprise Project Management at a large
  healthcare organization (3 hospitals, 50 clinics, 15,000
  employees). You report to the COO and present quarterly to the
  executive committee and board. The organization has 4 major
  project portfolios with competing priorities and shared
  resources.

  Portfolio 1 — Digital Transformation ($25M, 35 projects):
  - Electronic Health Record (EHR) migration: $12M, AMBER
    (vendor delays, physician resistance to new workflows)
  - Patient portal redesign: $3M, GREEN
  - Telemedicine expansion: $4M, GREEN
  - AI diagnostic support tools: $2M, RED (regulatory delays,
    FDA clearance taking longer than expected)
  - 31 smaller digital projects: mixed status

  Portfolio 2 — Facility Expansion ($80M, 12 projects):
  - New surgical wing: $45M, GREEN (on time, under budget)
  - Clinic renovations (8 clinics): $20M, AMBER (supply chain
    delays on specialized equipment)
  - Data center consolidation: $8M, RED (security audit found
    critical vulnerabilities mid-project)
  - 1 smaller facility project: GREEN

  Portfolio 3 — Regulatory Compliance ($15M, 20 projects):
  - HIPAA audit remediation: $5M, RED (3 critical findings,
    60-day correction deadline from HHS)
  - Joint Commission preparation: $4M, AMBER (mock survey
    identified 15 deficiencies)
  - CMS interoperability mandate: $3M, GREEN
  - State licensing updates: $1.5M, GREEN
  - 16 smaller compliance projects: mostly GREEN

  Portfolio 4 — Workforce & Culture ($10M, 18 projects):
  - Nurse retention program: $3M, AMBER (turnover still at 28%,
    industry is 22%)
  - Leadership development: $2M, GREEN
  - DEI initiative: $1.5M, AMBER (low participation in voluntary
    programs)
  - Employee wellness platform: $1M, GREEN
  - 14 smaller workforce projects: mixed

  Cross-portfolio challenges:
  1. IT team is shared across all portfolios — 40% overallocated
  2. The EHR migration (Portfolio 1) and HIPAA remediation
     (Portfolio 3) have critical dependencies on each other
  3. The data center consolidation (Portfolio 2) is blocking
     the telemedicine expansion (Portfolio 1)
  4. Total capital budget: $130M, but the CFO just announced a
     $15M budget reduction due to declining patient volumes
  5. Board wants to see "strategic alignment" — how each project
     maps to the organization's 5-year strategic plan

  The COO has asked you to prepare the quarterly executive report
  that helps the executive committee make resource allocation
  decisions across portfolios and provides the board with
  strategic oversight.

  Task: Write the quarterly multi-portfolio executive report.
  Include portfolio-level summaries, cross-portfolio analysis,
  strategic alignment view, resource conflict analysis, and
  recommendations for the $15M budget reduction.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive multi-portfolio executive report — presents all 4 portfolios with consistent summary metrics (total budget, spend to date, project count by RAG status, key risks); provides cross-portfolio analysis showing interdependencies (EHR-HIPAA dependency, data center-telemedicine blocking relationship, shared IT resource overallocation); includes a strategic alignment view mapping projects to organizational strategy; presents financial analysis across all portfolios ($130M total, burn rates, forecasts); the report enables executive decision-making, not just status awareness."
    weight: 0.35
    description: "MultiPortfolioReport"
  - type: llm_judge
    criteria: "Response addresses the $15M budget reduction with strategic recommendations — analyzes which projects can be deferred, descoped, or cancelled with least strategic impact; prioritizes regulatory compliance projects (HIPAA remediation has a legal deadline); evaluates trade-offs between portfolios (facility expansion has sunk costs, digital transformation has future revenue impact); provides scenario analysis for different reduction strategies; addresses the political dynamics of cross-portfolio resource allocation; recommendations are defensible and tied to strategic priorities."
    weight: 0.35
    description: "BudgetReduction"
  - type: llm_judge
    criteria: "Response addresses resource conflicts and provides actionable governance — analyzes the IT overallocation across portfolios with specific recommendations (prioritization framework, temporary staff augmentation, project sequencing); addresses the critical dependencies with specific risk mitigation (what happens to HIPAA remediation if EHR is delayed? what's the telemedicine impact of data center delays?); proposes a governance mechanism for cross-portfolio prioritization decisions; the report serves both the COO (operational decisions) and the board (strategic oversight) with appropriate content for each audience."
    weight: 0.30
    description: "ResourceGovernance"
