meta:
  id: project-intelligence-ai
  level: 5
  course: project-status-report-writing
  type: output
  description: "Project intelligence and AI — design an AI-driven project intelligence system that predicts project outcomes, detects risks before they materialize, and generates actionable insights from project data"
  tags: [ai, intelligence, predictive, innovation, master]

state: {}

trigger: |
  You're the VP of Project Intelligence at a global consulting
  firm (50,000 consultants, 5,000 active client engagements).
  The firm has 15 years of project data — 40,000 completed
  projects with full lifecycle data. The CEO wants to turn this
  data into the firm's most powerful competitive advantage.

  "We have the largest dataset of project outcomes in the world.
  Every project we've ever run — the status reports, the risk
  logs, the change requests, the team compositions, the client
  feedback, the financial outcomes. We know which projects
  succeeded and which failed, and we have all the signals that
  preceded both outcomes. I want an AI system that uses this
  data to predict project outcomes, detect risks before they
  materialize, and generate the best status reports in the
  industry. This is a $50M investment over 3 years."

  Available data:
  - 40,000 completed projects (2010-2026)
  - 5,000 active projects with real-time data feeds
  - Data fields: weekly status reports (narrative + metrics),
    risk logs, change requests, team composition changes,
    client satisfaction scores, financial actuals vs estimates,
    milestone completion rates, defect counts, resource
    utilization, communication patterns (email/Slack metadata)
  - Industry coverage: Financial Services (30%), Healthcare (20%),
    Technology (15%), Government (15%), Manufacturing (10%),
    Energy (10%)
  - Project types: Software implementation, transformation,
    integration, infrastructure, advisory

  Requirements:
  1. Predictive Risk Model: Predict project failure 3-6 months
     before traditional indicators would flag it
  2. Automated Status Intelligence: Generate narrative status
     reports that are more insightful than human-written ones
  3. Pattern Recognition: Identify "project DNA" — which
     combination of factors predict success vs failure
  4. Prescriptive Analytics: Not just "this project is at risk"
     but "here's what to do about it"
  5. Client-Facing Intelligence: Give clients predictive
     visibility into their projects
  6. Benchmark Database: "Your project is performing in the
     35th percentile compared to similar projects"

  Constraints:
  - Client confidentiality (training data must be anonymized)
  - Bias detection (ensure AI doesn't encode biases)
  - Explainability (partners won't trust black-box predictions)
  - Integration with existing PM tools

  Task: Design the AI-driven project intelligence platform —
  the data architecture, ML models, user experience, and
  go-to-market strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive AI platform architecture — includes data pipeline (ingestion from 14+ source systems, anonymization layer for client confidentiality, feature engineering from project lifecycle data); ML model design (risk prediction models using historical project signals, NLP models for status report analysis and generation, pattern recognition for 'project DNA' identification); addresses all 6 requirements with specific technical approaches; includes a realistic technology stack; addresses the 40,000-project training dataset with appropriate train/validation/test splits; includes model evaluation metrics (precision/recall for risk prediction, BLEU/human evaluation for narrative generation)."
    weight: 0.35
    description: "AIArchitecture"
  - type: llm_judge
    criteria: "Response addresses the human-AI interaction design — designs the automated status report generation with appropriate human oversight (AI generates draft, PM adds context, AI learns from PM edits); includes explainability for risk predictions (not just 'this project is RED' but 'these 5 signals indicate risk based on 200 similar past projects'); designs the prescriptive analytics ('projects with similar patterns succeeded when they took these 3 actions'); addresses the benchmark database design (how to normalize across industries, sizes, types for meaningful comparison); includes the client-facing intelligence portal; addresses bias detection and mitigation in the ML models."
    weight: 0.35
    description: "HumanAIDesign"
  - type: llm_judge
    criteria: "Response includes go-to-market and organizational strategy — positions the AI platform as a competitive differentiator in consulting sales; includes a phased implementation (internal use first, then client-facing); addresses partner and consultant adoption (these are senior professionals who may resist AI oversight); provides ROI calculation for the $50M investment; addresses ethical considerations (AI predicting team performance raises HR concerns, client data usage for training raises trust issues); includes a data governance framework; addresses continuous learning as new projects complete."
    weight: 0.30
    description: "GoToMarketStrategy"
