meta:
  id: project-reporting-thought-leadership
  level: 5
  course: project-status-report-writing
  type: output
  description: "Project reporting thought leadership — write a definitive industry report on the future of project status reporting, establishing new paradigms for how organizations should think about project visibility"
  tags: [thought-leadership, industry-report, future, paradigm, master]

state: {}

trigger: |
  You're a senior research fellow at a leading management think
  tank. You've been commissioned to write the definitive industry
  report on "The Future of Project Status Reporting" — a report
  that will be published at the annual Global Project Management
  Summit and is expected to influence how organizations worldwide
  approach project reporting for the next decade.

  Research basis:
  - 3-year study across 500 organizations in 40 countries
  - Analysis of 50,000 project status reports
  - 200 executive interviews (CIOs, CPOs, CEOs, board members)
  - Academic partnership with 5 leading business schools
  - Industry data from PMI, Gartner, McKinsey, BCG

  Key research findings to incorporate:

  1. The "Reporting Paradox": Organizations that spend the most
     time on status reporting have the worst project outcomes.
     Top performers spend 3% of PM time on reporting; bottom
     performers spend 22%. The reason: over-reporting is a
     symptom of trust deficit and control culture.

  2. The "Green Disease": 78% of projects that eventually fail
     were reported as GREEN 3 months before failure. Only 12%
     of project failures were predicted by status reports. Status
     reports are lagging indicators dressed up as leading ones.

  3. The "Audience Problem": Status reports are written for the
     author's manager, not for decision-makers. 85% of executive
     survey respondents say status reports don't help them make
     decisions. 67% say they don't read them.

  4. The "Data-Rich, Insight-Poor" problem: Organizations
     collect more project data than ever but generate less
     actionable insight. Average project generates 2,400 data
     points per week; average status report uses 8.

  5. The "AI Disruption": Early adopters of AI-generated status
     reports report 40% time savings and 25% improvement in risk
     detection, but face challenges with nuance, context, and
     the "last mile" of insight that requires human judgment.

  6. The "Outcome Shift": Leading organizations are moving from
     "Are we on time and on budget?" to "Are we delivering
     value?" — outcome-based reporting. But only 8% of
     organizations have implemented it.

  Task: Write the executive summary and key recommendations
  chapter of the industry report. This should reframe how
  the industry thinks about project status reporting.

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling thought leadership piece — presents the research findings as a narrative that challenges conventional wisdom about project status reporting; uses the 6 key findings to build a case for paradigm shift (from compliance-driven reporting to decision-enabling intelligence); proposes a new model or framework for project reporting (e.g., 'Project Intelligence Model' replacing 'Project Status Reporting'); uses data from the 500-organization study to support arguments; the tone is authoritative and forward-looking, appropriate for a global summit audience; includes specific, quotable insights that would be cited by industry leaders."
    weight: 0.35
    description: "ThoughtLeadership"
  - type: llm_judge
    criteria: "Response provides actionable recommendations that reframe the paradigm — addresses each of the 6 findings with specific recommendations; proposes the shift from status reporting to project intelligence (continuous, predictive, outcome-focused); recommends solving the 'Green Disease' with leading indicators and independent assurance; addresses the 'Audience Problem' by redesigning reports for decision-makers; proposes leveraging AI while preserving human judgment; recommends outcome-based reporting with specific implementation guidance; provides a maturity model that organizations can use to assess and improve their project reporting."
    weight: 0.35
    description: "ActionableRecommendations"
  - type: llm_judge
    criteria: "Response demonstrates intellectual depth and foresight — goes beyond incremental improvements to propose fundamental rethinking; addresses the cultural and organizational changes required (not just tool and process changes); considers the implications of AI on the project management profession (if AI generates reports, what is the PM's role?); addresses the tension between transparency and organizational politics; proposes how the profession should evolve; includes a vision for project reporting in 2035; acknowledges limitations and areas for further research; the piece would be credible as a real think tank publication."
    weight: 0.30
    description: "IntellectualDepth"
