meta:
  id: enterprise-pmo-strategy
  level: 5
  course: project-status-report-writing
  type: output
  description: "Enterprise PMO strategy — design an enterprise project management office that serves as the central nervous system for a global organization's project portfolio, with reporting as its core value proposition"
  tags: [enterprise-pmo, strategy, governance, portfolio, master]

state: {}

trigger: |
  You've been hired as the Chief Project Officer (CPO) — a newly
  created C-suite role — at a $30B global technology company. The
  board created this role after a series of high-profile project
  failures that cost the company $800M in write-offs over 3 years.

  The board's mandate: "Build an enterprise PMO that ensures we
  never again discover a failing $200M project from the press.
  You report directly to the CEO and have a dotted line to the
  board's Technology & Strategy Committee."

  Company profile:
  - $30B revenue, 80,000 employees, 45 countries
  - 3 major business lines: Cloud Services, Enterprise Software,
    Professional Services
  - Annual project/initiative spend: $6B
  - Active projects: 1,500+
  - Current PMO: Each business line has its own PMO with no
    coordination; Professional Services has no PMO at all
  - Project management maturity: Level 1-2 (Initial/Repeatable)
    on the OPM3 scale — target is Level 4 (Managed)

  Recent failures that triggered this role:
  1. Cloud Platform Rewrite ($200M): Cancelled after 3 years when
     an internal whistleblower went to the press. The project had
     been reporting GREEN throughout.
  2. SAP Migration ($150M): 200% over budget, delivered with
     critical defects that caused 3 days of revenue system outage.
  3. Customer Data Platform ($100M): Delivered on time but
     zero adoption — the product didn't solve the actual problem.
  4. Three M&A integration projects ($350M combined): All
     significantly delayed, destroying anticipated synergies.

  Your resources:
  - Direct team: 25 headcount to build
  - Budget: $20M annually for the EPMO function
  - Executive sponsor: CEO (strong support)
  - Board mandate: quarterly reporting to Technology & Strategy
    Committee

  Task: Design the enterprise PMO strategy with reporting as
  its central value proposition. Include the organizational
  design, governance framework, reporting architecture, and
  the roadmap to reach OPM3 Level 4 maturity within 3 years.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive enterprise PMO strategy — includes organizational design (25-person team structure with roles: portfolio analysts, reporting architects, methodology leads, change management, data/analytics); defines the EPMO's relationship to the 3 business line PMOs (federated model with central standards); establishes governance framework with project stage-gates, portfolio review cadence, escalation protocols, and kill criteria for failing projects; directly addresses each of the 4 recent failures with specific mechanisms that would have caught them earlier (GREEN-washing detection, adoption/value metrics, M&A integration governance)."
    weight: 0.35
    description: "EPMOStrategy"
  - type: llm_judge
    criteria: "Response designs a world-class reporting architecture — creates a multi-tier reporting system (project → program → BU portfolio → enterprise portfolio → board); includes real-time dashboards with AI-powered anomaly detection; designs early warning systems that would have caught the 4 recent failures; includes both delivery metrics (schedule, budget, scope) and value metrics (adoption, business outcomes, ROI realization); addresses the 1,500+ project scale with automated data collection and exception-based reporting; designs the quarterly board reporting package; includes predictive analytics for project risk scoring."
    weight: 0.35
    description: "ReportingArchitecture"
  - type: llm_judge
    criteria: "Response includes a realistic maturity roadmap — maps the journey from OPM3 Level 1-2 to Level 4 over 3 years with specific milestones; includes change management for 80,000 employees across 45 countries; addresses cultural transformation (ending GREEN-washing, creating psychological safety for honest reporting); includes capability building programs for project managers; provides the $20M annual budget allocation across the roadmap; addresses the Professional Services line that has no PMO; includes success metrics and measurement approach at each maturity level; considers quick wins in Year 1 to build credibility."
    weight: 0.30
    description: "MaturityRoadmap"
