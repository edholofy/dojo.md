meta:
  id: global-reporting-standardization
  level: 5
  course: project-status-report-writing
  type: output
  description: "Global enterprise reporting standardization — standardize project reporting across a 200,000-person multinational corporation spanning 60 countries with diverse project management cultures and regulatory environments"
  tags: [global, standardization, multinational, enterprise, master]

state: {}

trigger: |
  You're the Global Head of Project Management at a Fortune 50
  multinational corporation (200,000 employees, 60 countries,
  $120B revenue). The company has grown through 40 acquisitions
  over 20 years, and project reporting is completely fragmented.

  The CEO's directive: "I want one view of our entire project
  portfolio across all 60 countries and all acquired entities.
  Today I have 40 different reporting systems giving me 40
  different versions of reality. I want one truth."

  Current state:
  - 40 acquired companies, each with their own PM methodology
  - 8,000 active projects ($15B annual project spend)
  - 250 PMOs globally (some mature, some non-existent)
  - 12,000 project managers at all levels
  - Languages: 25+ (reporting in local languages)
  - Regulatory environments: EU, APAC, Americas, Middle East,
    Africa — each with different compliance requirements
  - Tools: SAP PPM (30%), Microsoft Project (20%), Jira (15%),
    Planview (10%), Monday.com (5%), spreadsheets (20%)
  - Maturity: ranges from OPM3 Level 1 to Level 4 across regions

  Specific challenges:
  1. Japan (15,000 employees): Consensus-driven culture;
     status reports avoid negative language; problems are
     communicated indirectly through relationship channels
  2. Germany (20,000): Extremely detailed and process-oriented;
     status reports are 20+ pages; works council has opinions
     about PM methodology changes
  3. India (35,000): Highly capable teams but tendency to
     commit to aggressive timelines and then struggle; status
     reports are optimistic
  4. Brazil (8,000): Relationship-driven; status is discussed
     in person, not in reports; formal reporting is seen as
     bureaucratic overhead
  5. US (50,000): Most mature PMO but also the most politically
     complex; status reports are weaponized in organizational
     turf battles
  6. China (18,000): Government relationships require careful
     reporting; data sovereignty laws restrict what data leaves
     the country
  7. UK (12,000): Post-acquisition integration still ongoing;
     team resents "being told how to work by HQ"
  8. Middle East (5,000): Mega-projects with government
     partnerships; reporting must satisfy both corporate and
     government stakeholders

  Budget: $25M over 3 years for the standardization initiative
  Constraint: Cannot disrupt ongoing project delivery

  Task: Design the global reporting standardization strategy —
  the framework, the technology architecture, the cultural
  change management approach, and the phased implementation plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global standardization strategy — creates a federated reporting framework (global standards with local adaptation) rather than a one-size-fits-all approach; defines the minimum viable reporting dataset all 60 countries must provide (core metrics in a standard format) while allowing regional enrichment; addresses the technology landscape (6+ tools) with an integration/middleware strategy; designs a global project taxonomy and classification system; includes portfolio-level aggregation architecture that gives the CEO the 'one truth' view across 8,000 projects; addresses the 25+ language challenge with a practical approach."
    weight: 0.35
    description: "GlobalStrategy"
  - type: llm_judge
    criteria: "Response addresses cultural complexity with sophisticated change management — provides specific strategies for each of the 8 named regions (Japan's indirect communication, Germany's detail orientation, India's optimism bias, Brazil's relationship preference, US political dynamics, China's data sovereignty, UK's post-acquisition resistance, Middle East's dual stakeholders); doesn't impose Western PM practices globally but creates a framework that respects cultural differences while ensuring comparable data; includes change management for 12,000 project managers across 40 acquired cultures; addresses resistance and adoption with culturally appropriate approaches."
    weight: 0.35
    description: "CulturalChangeManagement"
  - type: llm_judge
    criteria: "Response includes realistic implementation and governance — provides a phased 3-year rollout plan that doesn't disrupt ongoing delivery; addresses the $25M budget with allocation across technology, change management, and capability building; includes a governance structure for the standardization initiative (global PMO council, regional champions, compliance mechanisms); addresses regulatory requirements across multiple jurisdictions; includes maturity progression for regions at different OPM3 levels; provides success metrics and ROI calculation; addresses sustainability after the 3-year initiative."
    weight: 0.30
    description: "ImplementationGovernance"
