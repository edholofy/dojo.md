meta:
  id: board-level-governance-reporting
  level: 5
  course: project-status-report-writing
  type: output
  description: "Board-level governance reporting — design project governance reporting for a public company board that satisfies fiduciary duties, regulatory requirements, and strategic oversight needs"
  tags: [board, governance, fiduciary, regulatory, master]

state: {}

trigger: |
  You're the Chief Transformation Officer at a publicly traded
  financial services company ($50B AUM). The board's Audit
  Committee has demanded a complete overhaul of how technology
  and transformation projects are reported to the board after
  the SEC flagged concerns about the company's disclosure of
  material technology risks in its 10-K filing.

  SEC feedback (paraphrased): "The company's disclosures
  regarding technology transformation risks are inadequate.
  Multiple material technology projects were significantly
  delayed or over budget without timely disclosure to investors.
  The board's oversight of technology execution risk appears
  insufficient."

  The board chair told you: "I need project reporting that
  satisfies our fiduciary duties. I need to know — in real
  time — if any project poses a material risk to the company.
  I also need to demonstrate to the SEC that we have robust
  governance and oversight. And I need it to be actionable,
  not 200 pages of detail that no one reads."

  Context:
  - 45 active technology/transformation projects ($800M total)
  - 12 are "material" (>$20M or critical to operations)
  - Board meets quarterly; Audit Committee meets monthly
  - Regulatory environment: SEC, OCC, Federal Reserve (bank
    holding company), state regulators
  - Recent issues:
    * Core banking platform migration ($120M): 14 months late,
      not disclosed in 10-K until it became public
    * Cybersecurity upgrade ($45M): Budget doubled, discovered
      by Audit Committee through vendor complaint
    * Customer data platform ($30M): Cancelled after $22M spent,
      disclosed as a one-time charge
  - Board members: 12 directors, 3 have technology backgrounds,
    rest are financial/legal/operational experts
  - Audit Committee: 5 members, 1 technology expert

  Requirements:
  1. Board-level project governance framework
  2. Materiality thresholds for project risk disclosure
  3. Reporting format that serves board fiduciary duties
  4. SEC-compliant disclosure triggers
  5. Real-time escalation protocols for material project risks
  6. Integration with enterprise risk management (ERM)

  Task: Design the board-level project governance and reporting
  framework that satisfies fiduciary duties, SEC requirements,
  and provides actionable oversight for directors without
  technology backgrounds.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive board governance framework — includes materiality thresholds for project risk disclosure (quantitative: budget variance %, timeline delay thresholds; qualitative: operational risk, regulatory risk, reputational risk); designs escalation protocols (what triggers immediate board notification vs quarterly reporting vs Audit Committee review); establishes governance cadence (quarterly board portfolio review, monthly Audit Committee project risk review, real-time material event notification); addresses all 3 recent failures with specific mechanisms that would have triggered earlier disclosure; integrates with enterprise risk management."
    weight: 0.35
    description: "GovernanceFramework"
  - type: llm_judge
    criteria: "Response designs board-appropriate reporting — creates reporting formats that serve directors without technology backgrounds (strategic narrative with financial impact, not technical detail); designs a materiality-filtered portfolio dashboard (12 material projects with drill-down, 33 non-material in summary); includes leading indicators and predictive metrics, not just lagging status; addresses SEC disclosure requirements with specific triggers for 10-K/10-Q/8-K disclosure; designs the quarterly board presentation format; includes independent assurance mechanisms (internal audit validation of project status); provides templates or examples of effective board-level project reporting."
    weight: 0.35
    description: "BoardReporting"
  - type: llm_judge
    criteria: "Response addresses regulatory compliance and fiduciary duties — maps project reporting to SEC disclosure requirements (material technology risks in 10-K, interim updates in 10-Q, material events in 8-K); addresses OCC and Federal Reserve expectations for technology risk management in bank holding companies; includes the Audit Committee's role in project oversight with specific charter recommendations; addresses director education on technology project risk; provides liability protection framework for directors (demonstrates adequate oversight); includes documentation and record-keeping for regulatory examination."
    weight: 0.30
    description: "RegulatoryCompliance"
