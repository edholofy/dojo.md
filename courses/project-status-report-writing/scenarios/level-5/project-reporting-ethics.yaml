meta:
  id: project-reporting-ethics
  level: 5
  course: project-status-report-writing
  type: output
  description: "Project reporting ethics and transparency — develop an ethical framework for project status reporting that addresses systemic dishonesty, cultural pressure to misreport, and the professional obligations of project managers"
  tags: [ethics, transparency, professional-responsibility, systemic, master]

state: {}

trigger: |
  You're the president of a national project management
  professional association (150,000 members). You've been asked
  to lead a blue-ribbon commission on "Ethics in Project Status
  Reporting" after a series of high-profile project failures
  where dishonest reporting contributed to catastrophic outcomes.

  The commission was triggered by three events in the past year:

  Case 1 — Healthcare.gov Redux:
  A state health insurance exchange project ($200M) was reported
  as GREEN until 2 weeks before go-live, when it catastrophically
  failed. 500,000 people couldn't enroll in health insurance
  during open enrollment. Investigation found the project team
  knew the system would fail 6 months earlier but feared
  political retaliation for honest reporting. Three project
  managers testified they were explicitly told to "keep it green"
  by political appointees.

  Case 2 — Bridge Construction:
  A $2B infrastructure project was reported on schedule despite
  the project team discovering structural design flaws that
  required a 2-year delay. The contractor feared liquidated
  damages. They continued construction on the flawed design for
  8 months while "working on a fix." The falsified status reports
  were cited in the subsequent investigation as contributing to
  a public safety risk.

  Case 3 — Financial System Migration:
  A major bank's core system migration ($500M) was reported as
  AMBER when it was clearly RED. The bank's stock price was tied
  to the migration timeline (analysts were tracking it). The
  board directed the CTO to "manage the narrative." When the
  project eventually failed, $2B in market cap was destroyed and
  the SEC investigated for securities fraud through misleading
  project disclosures.

  Your commission's mandate:
  1. Develop an ethical framework for project status reporting
  2. Create professional standards that project managers can
     reference when pressured to misreport
  3. Propose whistleblower protections specific to project
     reporting
  4. Address the systemic incentives that encourage dishonest
     reporting
  5. Create a model code of ethics for project status reporting
  6. Propose regulatory recommendations

  Task: Write the commission's findings and recommendations —
  the ethical framework, the professional standards, and the
  policy proposals.

assertions:
  - type: llm_judge
    criteria: "Response develops a comprehensive ethical framework for project reporting — analyzes the systemic causes of dishonest reporting (organizational culture, incentive structures, political pressure, fear of retaliation, financial market pressure); draws lessons from all 3 cases showing how misreporting directly caused harm (500K people without insurance, public safety risk, $2B market cap destruction, SEC investigation); creates an ethical decision framework that project managers can apply when pressured (duty to report accurately, duty to stakeholders, duty to public safety, hierarchy of obligations when duties conflict); addresses the tension between organizational loyalty and professional ethics."
    weight: 0.35
    description: "EthicalFramework"
  - type: llm_judge
    criteria: "Response creates actionable professional standards and protections — develops a model code of ethics for project status reporting with specific principles (accuracy, timeliness, completeness, materiality, independence of judgment); creates whistleblower protections specific to project reporting (safe harbor for PMs who escalate status concerns, anti-retaliation provisions, independent reporting channels); proposes professional certification requirements related to ethical reporting; provides decision trees or frameworks PMs can use when facing pressure ('if your manager tells you to keep it green when it's red, here are your options and obligations'); addresses the legal protections and risks for PMs."
    weight: 0.35
    description: "ProfessionalStandards"
  - type: llm_judge
    criteria: "Response proposes systemic reforms and regulatory recommendations — addresses the incentive structures that encourage dishonesty (executive compensation tied to project timelines, contractor fear of liquidated damages, political appointees' career incentives); proposes organizational reforms (independent project assurance functions, separation of project execution from project reporting, mandatory external review triggers); includes regulatory recommendations (government contract reporting standards, SEC disclosure requirements for material technology risks, professional liability for knowing misrepresentation); provides an implementation roadmap for the profession."
    weight: 0.30
    description: "SystemicReforms"
