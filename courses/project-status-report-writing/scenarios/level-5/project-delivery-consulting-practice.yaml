meta:
  id: project-delivery-consulting-practice
  level: 5
  course: project-status-report-writing
  type: output
  description: "Project delivery consulting practice — build a consulting practice that helps Fortune 500 companies transform their project reporting from administrative overhead into strategic competitive advantage"
  tags: [consulting, practice-building, fortune-500, strategic, master]

state: {}

trigger: |
  You're a managing partner at a Big Four consulting firm launching
  a new practice: "Project Intelligence & Delivery Excellence."
  Your thesis is that most organizations treat project reporting as
  administrative overhead, when it should be a strategic asset that
  drives better decision-making, earlier risk detection, and
  competitive advantage.

  Your first client engagement:

  Client: Fortune 100 industrial conglomerate
  Revenue: $85B across 6 business units
  Active projects: 2,000+ (from $50K to $2B)
  Annual project spend: $12B
  Problem: The CEO told your firm's senior partner: "We spend
  $12 billion a year on projects and I have no idea which ones
  are succeeding. Every business unit reports differently. I get
  200 pages of status reports monthly and learn nothing. I found
  out our biggest project was 18 months late by reading about it
  in the Wall Street Journal. Fix this."

  Current state assessment:
  - 6 business units, each with their own PMO (or none)
  - No standard project taxonomy or reporting framework
  - 14 different project management tools across the enterprise
  - Project success rate: estimated 35% (industry avg: 45%)
  - No portfolio-level visibility
  - Board receives annual project update (woefully inadequate)
  - $200M estimated in "zombie projects" (no one knows they're
    still running or consuming resources)
  - Cultural issue: "shooting the messenger" — PMs who report
    problems get blamed, so everyone reports GREEN

  Your engagement scope:
  - Phase 1 (6 months): Assessment and framework design
  - Phase 2 (12 months): Implementation across 3 business units
  - Phase 3 (12 months): Enterprise rollout and optimization
  - Engagement value: $15M over 30 months
  - Success metric: CEO gets real-time portfolio visibility
    and project success rate improves to 55%+

  Task: Design the consulting engagement — the assessment
  methodology, the transformation framework, the reporting
  architecture, and the change management approach that will
  transform this conglomerate's project reporting capability.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive consulting engagement — includes a structured assessment methodology (maturity model for project reporting across 6 business units, stakeholder interviews at all levels, tool landscape analysis, cultural assessment for 'shoot the messenger' dynamics, zombie project identification process); designs a transformation framework with a unified project taxonomy, standard metrics that allow cross-BU comparison while preserving BU autonomy, portfolio-level aggregation architecture, and executive reporting layer; the approach is realistic for a Big Four engagement with appropriate governance, staffing model, and quality assurance."
    weight: 0.35
    description: "ConsultingEngagement"
  - type: llm_judge
    criteria: "Response addresses the strategic reporting architecture — designs a multi-tier reporting system (project-level, program-level, BU portfolio, enterprise portfolio, board-level); includes real-time dashboards for the CEO with drill-down capability; addresses the 14-tool landscape with an integration strategy (not rip-and-replace); designs the project taxonomy and classification system; includes predictive analytics for early warning; addresses the zombie project problem with discovery and sunset processes; designs the metrics framework that enables portfolio optimization and capital reallocation decisions."
    weight: 0.35
    description: "ReportingArchitecture"
  - type: llm_judge
    criteria: "Response addresses culture change and sustainability — directly tackles the 'shoot the messenger' culture with psychological safety initiatives, incentive realignment, and executive behavior change; includes change management across 6 business units with different cultures; addresses the phased rollout strategy (3 BUs first, then enterprise); includes capability building (training, communities of practice, maturity progression); provides ROI model for the $15M engagement against the $12B project spend; addresses long-term sustainability after the consulting engagement ends; includes success metrics and measurement approach."
    weight: 0.30
    description: "CultureAndSustainability"
