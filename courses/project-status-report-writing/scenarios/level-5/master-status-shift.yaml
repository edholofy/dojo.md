meta:
  id: master-status-shift
  level: 5
  course: project-status-report-writing
  type: output
  description: "Master status shift — navigate a geopolitically complex situation where project reporting intersects with international relations, regulatory compliance across jurisdictions, and organizational survival"
  tags: [shift, master, geopolitical, survival, multi-jurisdictional]

state: {}

trigger: |
  You're the Chief Delivery Officer at a global defense and
  aerospace contractor. You're managing the most complex project
  reporting situation of your career — one that intersects
  national security, international trade law, corporate survival,
  and personal legal exposure.

  Program: Joint Multi-Nation Satellite Communications System
  Contract: $2.8B across 5 allied nations (US lead, UK, Canada,
    Australia, Japan contributing)
  Duration: 7 years (currently Year 4)
  Classification: Parts are classified SECRET, parts UNCLASSIFIED
  Overall Status: Complex — varies by nation and by work package

  The situation has escalated dramatically this month:

  1. TECHNICAL STATUS:
     The core satellite bus (US-developed, $800M) is 14 months
     behind schedule. The cause is a fundamental design flaw in
     the encryption subsystem discovered at Year 3. Your chief
     engineer says: "The fix requires a redesign that adds 18
     months and $200M. There's no shortcut."

  2. POLITICAL DIMENSION:
     The US DoD program office has been briefed on the technical
     issue but has NOT informed the allied nation partners. The
     US program manager told you: "This is a diplomatic issue,
     not a technical one. We'll inform allies through diplomatic
     channels when the time is right. Your status reports to the
     joint program board should report the encryption issue as
     'under review.'"

  3. EXPORT CONTROL COMPLICATION:
     Your ITAR compliance officer discovered that 3 subcontractors
     have been sharing encryption design data with the UK team
     in ways that may violate ITAR (International Traffic in Arms
     Regulations). If reported, this could trigger a State
     Department investigation and $500M+ in penalties. If not
     reported, you're personally liable as a corporate officer.

  4. ALLIED NATION STATUS:
     - UK ($600M contribution): On schedule, unaware of core
       bus delay. Their defense minister is planning a public
       announcement of "on-time delivery" next month.
     - Canada ($300M): Slightly behind but manageable
     - Australia ($200M): On track
     - Japan ($100M): Ahead of schedule but their team has
       noticed the encryption redesign activity and is asking
       questions through back channels

  5. FINANCIAL EXPOSURE:
     Your company has already booked $1.8B in revenue on this
     contract using percentage-of-completion accounting. The
     18-month delay and $200M cost growth would require a
     massive revenue restatement. Your CFO says: "If we restate,
     we violate our debt covenants. The company could face
     bankruptcy."

  6. PERSONAL EXPOSURE:
     Your legal counsel says: "As CDO, you have personal liability
     under the False Claims Act for government contract reporting,
     under ITAR for export control violations, and under SOX for
     financial reporting accuracy. You need your own lawyer."

  7. WHISTLEBLOWER:
     An engineer on the encryption team has contacted the DoD
     Inspector General about the design flaw timeline. The IG
     has not yet opened an investigation but has acknowledged
     receipt of the complaint.

  Task: Determine your course of action. Write the status
  communications you believe are necessary, explain your
  reasoning for each decision, and address the personal,
  corporate, and geopolitical implications.

assertions:
  - type: llm_judge
    criteria: "Response demonstrates sophisticated ethical and legal reasoning — navigates the intersection of multiple legal regimes (False Claims Act, ITAR, SOX, international defense agreements); recommends immediate ITAR self-disclosure as legally required (voluntary disclosure to State Department reduces penalties dramatically vs being discovered); addresses the personal liability with appropriate seriousness (recommends retaining personal counsel); rejects the DoD program manager's instruction to underreport as legally untenable; addresses the whistleblower complaint as accelerating the timeline for honest disclosure; distinguishes between what the CDO can legally decide vs what requires board-level and government-level coordination."
    weight: 0.35
    description: "EthicalLegalReasoning"
  - type: llm_judge
    criteria: "Response crafts appropriate multi-audience status communications — writes or outlines the status communications needed for each audience (US DoD program office: full technical disclosure with redesign plan; joint program board: honest technical status with diplomatic sensitivity; allied nations: coordinated disclosure strategy; company board: financial impact and legal exposure briefing; CFO: revenue restatement analysis; external auditors: SOX implications); the communications are appropriately calibrated for classification level, diplomatic sensitivity, and legal requirements; addresses the UK defense minister's planned announcement as an urgent timing issue."
    weight: 0.35
    description: "MultiAudienceCommunications"
  - type: llm_judge
    criteria: "Response provides a strategic path forward — proposes a coordinated disclosure strategy (sequence matters: ITAR first, then DoD, then allies, then board, then financial restatement); addresses the corporate survival question with a realistic assessment (voluntary disclosure with remediation plan is survivable; cover-up is not); proposes a technical recovery plan for the program; addresses the geopolitical implications with appropriate humility (the CDO doesn't control diplomatic channels but can influence the process); acknowledges the personal career risk while maintaining professional integrity; the response demonstrates the kind of moral courage and strategic thinking expected at the C-suite level."
    weight: 0.30
    description: "StrategicPathForward"
