meta:
  id: project-reporting-innovation
  level: 5
  course: project-status-report-writing
  type: output
  description: "Project reporting innovation — design the next generation of project status reporting that moves beyond traditional formats, leveraging real-time data, behavioral science, and outcome-based measurement"
  tags: [innovation, next-generation, behavioral-science, outcomes, master]

state: {}

trigger: |
  You're the founder and CEO of a venture-backed startup that's
  building the "next generation of project intelligence." You've
  raised $30M Series B based on your thesis that project status
  reporting is fundamentally broken and needs to be reinvented
  from first principles.

  Your thesis (from your pitch deck):

  "Project status reports haven't changed in 50 years. They're
  still narrative documents, written by biased humans, reviewed
  by distracted executives, filed in systems nobody searches.
  Meanwhile, the data exhaust from modern projects — commits,
  tickets, messages, meetings, deployments, incidents — contains
  more signal about project health than any human could capture
  in a report. We're building the project health monitoring
  system that replaces the status report."

  Your product vision:
  1. Passive Data Collection: No PM input required for 90% of
     status. System ingests data from project tools (Jira, GitHub,
     CI/CD, Slack, calendar, email metadata) and infers status.
  2. Behavioral Analytics: Analyze communication patterns to
     detect team stress, disengagement, or conflict before they
     surface in status reports (Slack response times, meeting
     patterns, code review dynamics).
  3. Outcome Tracking: Shift from "are we on time?" to "are we
     delivering value?" Track business metrics post-delivery to
     measure actual project impact.
  4. Cognitive Debiasing: Apply behavioral science to counteract
     known reporting biases (optimism bias, anchoring, groupthink,
     status quo bias) with calibrated prompts and automated
     reality checks.
  5. Narrative Intelligence: When narrative is needed, generate it
     from data — but with built-in skepticism (the AI plays
     devil's advocate against overly optimistic framing).
  6. Stakeholder-Adaptive Delivery: Same data, different views.
     The board sees strategic risk. The PM sees tactical issues.
     The developer sees sprint-level priorities.

  You're presenting at a major tech conference. Your audience
  includes potential enterprise customers (CIOs, CTOs, VPs of
  PMO), investors, and industry analysts.

  Competitive landscape:
  - Monday.com, Asana, Smartsheet: Project management tools with
    basic reporting
  - Planview, Clarity: Enterprise PPM with traditional reporting
  - ChatGPT/Copilot: Generic AI that can summarize but doesn't
    understand project management

  Task: Write the conference keynote presentation content and
  the detailed product architecture that you'll present to
  enterprise prospects in the 1:1 meetings afterward.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision and keynote narrative — presents a coherent argument for why project status reporting needs reinvention (not just incremental improvement); uses the 6 product pillars to tell a story about the future of project intelligence; differentiates from existing PM tools (not another project management tool — a project health monitoring system); addresses the conference audience (CIOs want reduced risk, CTOs want better signals, PMO VPs want efficiency); includes compelling examples or scenarios that demonstrate the product's value; the keynote would be credible at a major tech conference."
    weight: 0.35
    description: "ProductVision"
  - type: llm_judge
    criteria: "Response designs a technically credible product architecture — includes the passive data collection layer (API integrations with major PM/dev/communication tools); designs the behavioral analytics engine (what signals indicate team stress, how to detect without surveillance, privacy considerations); includes the cognitive debiasing system with specific behavioral science principles applied; designs the narrative intelligence engine with appropriate AI guardrails; addresses the stakeholder-adaptive delivery system; the architecture would be credible to technical evaluators; addresses data privacy, security, and ethical considerations of behavioral monitoring."
    weight: 0.35
    description: "ProductArchitecture"
  - type: llm_judge
    criteria: "Response addresses market positioning and enterprise concerns — differentiates from the competitive landscape with specific positioning; addresses enterprise sales objections (privacy concerns with behavioral monitoring, accuracy of AI-generated insights, change management for PMs who lose control of the narrative, integration complexity); includes a go-to-market strategy; addresses the ethical implications of surveillance-adjacent behavioral analytics; proposes how the product handles edge cases (creative projects where 'chaos' is normal, research projects with unpredictable timelines); provides a credible roadmap."
    weight: 0.30
    description: "MarketPositioning"
