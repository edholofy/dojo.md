meta:
  id: ecommerce-support-technology
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Architect e-commerce support technology — evaluate, implement, and integrate the complete tech stack from help desk to order management to analytics"
  tags: [support, ecommerce, technology, integration, architecture, expert]

state: {}

trigger: |
  The e-commerce support tech stack is more complex than general
  support because it must integrate with order management, shipping,
  inventory, payment processing, and e-commerce platforms. The
  right architecture enables agents to see full customer context
  and take action without switching between 8 different tools.

  Part 2: Architect the tech stack
  For "GreenMarket" — an organic grocery e-commerce store
  migrating from manual processes to an integrated tech stack:
  - Platform: Shopify Plus
  - Orders: 30,000/month
  - Support channels: Email, chat, phone, Instagram, Facebook
  - Current pain: agents switch between 6 tabs to answer one ticket

  1. Design the integrated technology architecture:
     Core systems and how they connect:
     - Help desk (Gorgias/Zendesk) ↔ Shopify (orders, customers)
     - Help desk ↔ Shipping (ShipStation) — tracking in inbox
     - Help desk ↔ Returns (Loop Returns) — return status
     - Help desk ↔ Payments (Stripe) — refund capability
     - Help desk ↔ Subscription (Recharge) — subscription management
     - Help desk ↔ Reviews (Yotpo) — review response
     - Help desk ↔ CRM — customer lifetime data
     - Analytics layer pulling from all systems
     Draw the data flow and integration points.

  2. Evaluate help desk platforms for GreenMarket:
     Compare Gorgias, Re:amaze, and Zendesk for this specific case:
     - Shopify integration depth
     - Grocery-specific needs (perishable products, delivery windows)
     - Multi-channel capabilities
     - Automation features
     - Pricing at 30,000 orders/month
     - Scalability to 100,000 orders
     Provide weighted scoring and recommendation.

  3. Design the agent workspace:
     Create the ideal single-screen view for an agent handling tickets:
     - Customer panel (who they are, lifetime value, preferences)
     - Order panel (recent orders, status, tracking)
     - Conversation panel (current and historical interactions)
     - Action panel (refund, reorder, return label, one-click actions)
     - Knowledge panel (product info, macros, similar tickets)
     Describe each panel's content and layout.

  4. Create the implementation plan:
     Phase 1 (weeks 1-4): Help desk migration + Shopify integration
     Phase 2 (weeks 5-8): Shipping + returns + payment integration
     Phase 3 (weeks 9-12): Automation + AI setup
     Phase 4 (weeks 13-16): Analytics + optimization
     For each: tasks, risks, success criteria, rollback plan.

  Part 3: Technology governance
  1. Vendor management and contract negotiation
  2. Data privacy across integrated systems
  3. Technology cost optimization
  4. Future-proofing the stack

assertions:
  - type: llm_judge
    criteria: "The architecture reduces tab-switching — the integrated design gives agents everything they need in one view"
    weight: 0.30
    description: "Tab-switching reduction"
  - type: llm_judge
    criteria: "Platform evaluation considers grocery-specific needs — perishable products, delivery windows, and freshness concerns are factored in"
    weight: 0.25
    description: "Industry-specific evaluation"
  - type: llm_judge
    criteria: "The agent workspace design is practical — it shows the right information in a logical layout that agents could actually use"
    weight: 0.25
    description: "Practical agent workspace"
  - type: llm_judge
    criteria: "The implementation plan includes rollback plans — each phase has risk mitigation, not just optimistic timelines"
    weight: 0.20
    description: "Risk-aware implementation"
