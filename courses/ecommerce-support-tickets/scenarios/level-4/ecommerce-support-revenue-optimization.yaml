meta:
  id: ecommerce-support-revenue-optimization
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Optimize support for revenue impact — turn every support interaction into a revenue opportunity through conversion, retention, upselling, and advocacy"
  tags: [support, ecommerce, revenue, conversion, upselling, expert]

state: {}

trigger: |
  In e-commerce, support isn't just a cost center — it's a
  revenue channel. Pre-sale chat increases conversion 3x. Post-sale
  support drives repeat purchases. Every interaction is a chance
  to increase cart value, prevent returns, save cancellations,
  and create advocates who refer new customers.

  Part 2: Build a revenue-focused support program
  For "TechShelf" — an electronics e-commerce store:
  - 25,000 orders/month, $120 AOV
  - 15 support agents, 6,000 tickets/month
  - Current CSAT: 4.2, FCR: 73%
  - Pre-sale chat conversion: 8% (industry: 15-20%)
  - Return rate: 18% (industry: 15%)
  - Repeat purchase rate: 28% (industry: 35%)

  1. Design a support-driven revenue program:
     Identify and quantify 6 revenue levers:
     a) Pre-sale chat conversion optimization (8% → 15%)
     b) Return prevention through support (reduce 18% → 14%)
     c) Upsell/cross-sell during support interactions
     d) Cancellation saves and win-back
     e) Review generation from support interactions
     f) Referral program integration into support flows
     For each: current state, target, actions, expected revenue impact

  2. Create the pre-sale support playbook:
     - Proactive chat triggers (which pages, what behavior)
     - Product recommendation framework (needs-based, not pushy)
     - Objection handling (price, compatibility, reviews)
     - Closing techniques for support (natural, not salesy)
     - Cross-sell and bundle suggestions
     - Cart abandonment follow-up

  3. Design the return-to-exchange conversion program:
     - When a return request comes in, offer exchange first
     - Exchange presentation (show similar products, offer free shipping)
     - Partial refund "keep and discount" option
     - Store credit with bonus incentive
     - Measurement: exchange rate, revenue retained

  4. Calculate the total revenue impact:
     Using TechShelf's numbers:
     - Revenue from improved chat conversion
     - Revenue saved from return prevention
     - Revenue from upsell/cross-sell
     - Revenue from cancellation saves
     - Revenue from improved repeat purchase rate
     - Total support-influenced revenue per month
     - Compare to team cost for ROI

  Part 3: Revenue culture in support
  1. Training agents on sales skills without being pushy
  2. Incentive structures that reward revenue AND satisfaction
  3. Measuring and reporting support revenue contribution
  4. Avoiding the "sales pressure" trap in support

assertions:
  - type: llm_judge
    criteria: "Revenue calculations are realistic — each lever uses defensible assumptions and the math is correct for the given numbers"
    weight: 0.30
    description: "Realistic revenue math"
  - type: llm_judge
    criteria: "The pre-sale playbook feels helpful not pushy — product recommendations and closing techniques are natural extensions of helpfulness"
    weight: 0.25
    description: "Helpful not pushy pre-sale"
  - type: llm_judge
    criteria: "Return-to-exchange conversion is well-designed — exchange options are genuinely attractive alternatives, not tricks to avoid refunds"
    weight: 0.25
    description: "Genuine exchange alternatives"
  - type: llm_judge
    criteria: "Revenue culture balances sales and satisfaction — incentives reward both conversion and customer happiness"
    weight: 0.20
    description: "Balanced revenue culture"
