meta:
  id: omnichannel-experience-design
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Design seamless omnichannel support — integrate online, mobile, social, marketplace, and in-store support into one unified customer experience"
  tags: [support, ecommerce, omnichannel, unified, experience-design, expert]

state: {}

trigger: |
  Omnichannel customers have 30% higher CLV than single-channel
  customers. But omnichannel support is hard — customers expect
  seamless transitions between website chat, Instagram DM, email,
  phone, and even physical stores. The experience must feel like
  one continuous conversation regardless of channel.

  Part 2: Design an omnichannel system
  For "StyleHub" — a fashion brand with DTC website, mobile app,
  3 physical stores, Amazon, Instagram Shop, and TikTok Shop:

  1. Map the omnichannel customer journey:
     Follow 3 customer scenarios across multiple channels:
     a) Customer browses on Instagram → asks question via DM →
        buys on website → tracks via mobile app → exchanges at
        physical store → leaves review on Instagram
     b) Customer buys on Amazon → has sizing issue → contacts
        DTC support (confused about which brand to contact) →
        needs exchange → directed to correct channel
     c) Customer starts chat on mobile → chat drops (lost signal)
        → emails support → calls next day → expects all agents
        to know the full history

     For each: identify handoff points, data that must transfer,
     and potential friction.

  2. Design the unified customer profile:
     - Data sources: website, app, stores, marketplace, social
     - What information unifies (order history, support history,
       preferences, loyalty, lifetime value)
     - Real-time vs. batch sync
     - Privacy considerations (what can be shared across channels)

  3. Create the channel strategy matrix:
     For each channel (website chat, email, phone, Instagram DM,
     TikTok DM, in-store, Amazon):
     - What issues this channel handles best
     - Response time expectations
     - Brand voice adaptation
     - Staffing model
     - Escalation to other channels
     - Metrics specific to this channel

  4. Design the cross-channel handoff protocol:
     - When to suggest a different channel
     - How to transfer context seamlessly
     - Agent communication during handoff
     - Preventing "please repeat your issue" experiences
     - Measuring cross-channel resolution quality

  Part 3: Omnichannel measurement
  1. Cross-channel customer satisfaction tracking
  2. Channel attribution for revenue and resolution
  3. Identifying channel cannibalization vs. complementation
  4. Optimizing channel mix based on data

assertions:
  - type: llm_judge
    criteria: "Customer journeys identify real friction points — the handoff between channels is where experience breaks and these moments are specifically addressed"
    weight: 0.30
    description: "Real friction point identification"
  - type: llm_judge
    criteria: "The unified customer profile design is practical — it identifies which data can realistically be shared across channels with privacy considerations"
    weight: 0.25
    description: "Practical unified profile"
  - type: llm_judge
    criteria: "The channel strategy matrix differentiates genuinely — each channel has distinct strengths and appropriate use cases"
    weight: 0.25
    description: "Genuinely differentiated channels"
  - type: llm_judge
    criteria: "Cross-channel handoffs prevent information loss — the protocol ensures customers never have to repeat their issue"
    weight: 0.20
    description: "Information-preserving handoffs"
