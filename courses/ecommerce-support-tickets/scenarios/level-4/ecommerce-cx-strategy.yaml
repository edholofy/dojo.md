meta:
  id: ecommerce-cx-strategy
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Design the customer experience strategy — create a holistic CX vision that integrates support, marketing, product, and operations for maximum customer delight"
  tags: [support, ecommerce, cx-strategy, customer-experience, holistic, expert]

state: {}

trigger: |
  Customer experience (CX) strategy goes beyond support — it's
  the entire journey from first brand awareness through purchase,
  delivery, use, and advocacy. Expert e-commerce leaders design
  CX strategies where support is one critical component of a
  unified experience vision.

  Part 2: Design a CX strategy
  For "WellnessShop" — a health and wellness DTC brand
  ($20M revenue, 80K customers, supplements + equipment):

  Current CX pain points:
  - CSAT: 3.8 (down from 4.2 a year ago)
  - NPS: 22 (target: 45)
  - Return rate: 16% (supplements: 8%, equipment: 28%)
  - Repeat purchase: 42% (supplements: 55%, equipment: 15%)
  - Average resolution time: 28 hours (target: 8 hours)
  - WISMO tickets: 38% of all tickets
  - Top complaint: "Products don't match website photos/descriptions"

  1. Create the CX vision document:
     - Current state assessment (where we are)
     - Target state vision (where we want to be)
     - CX principles (what guides every decision)
     - Differentiation strategy (what makes WellnessShop special)
     - Connection to business outcomes (CX → revenue → growth)

  2. Map the end-to-end customer journey:
     From awareness → consideration → purchase → delivery →
     use → replenishment → advocacy:
     - Identify each touchpoint
     - Current experience quality (good/neutral/bad)
     - Desired experience quality
     - Which team owns each touchpoint
     - Dependencies between touchpoints

  3. Design 5 CX improvement initiatives:
     Initiative 1: Reduce WISMO (proactive shipping communications)
     Initiative 2: Fix product expectations gap (better descriptions)
     Initiative 3: Equipment return reduction (better pre-sale guidance)
     Initiative 4: Resolution time improvement (process + staffing)
     Initiative 5: Supplement replenishment program (support-driven)
     For each: problem, solution, owner, investment, expected impact

  4. Create the CX measurement framework:
     - Journey-stage metrics (awareness → advocacy)
     - Emotional metrics (how customers feel at each stage)
     - Operational metrics (speed, accuracy, effort)
     - Business impact metrics (revenue, retention, advocacy)
     - Quarterly CX review cadence and reporting structure

  Part 3: CX leadership
  1. Building cross-functional CX alignment
  2. CX governance and decision-making
  3. Sustaining CX improvements over time
  4. CX innovation and experimentation

assertions:
  - type: llm_judge
    criteria: "The CX vision connects customer experience to business outcomes — it's not just about being nice but about driving measurable growth"
    weight: 0.30
    description: "Business-connected CX vision"
  - type: llm_judge
    criteria: "The journey map identifies real pain points — WISMO dominance, product expectation gaps, and high equipment returns are correctly diagnosed"
    weight: 0.25
    description: "Accurate pain point diagnosis"
  - type: llm_judge
    criteria: "CX initiatives are prioritized by impact — the highest-impact improvements are identified with realistic investment estimates"
    weight: 0.25
    description: "Impact-prioritized initiatives"
  - type: llm_judge
    criteria: "The measurement framework goes beyond CSAT — it includes emotional, operational, and business impact metrics across the journey"
    weight: 0.20
    description: "Comprehensive CX measurement"
