meta:
  id: ecommerce-support-workforce-planning
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Design workforce planning for e-commerce support — forecast staffing needs, optimize scheduling, manage seasonal scaling, and balance cost with service quality"
  tags: [support, ecommerce, workforce-planning, staffing, scheduling, expert]

state: {}

trigger: |
  E-commerce support workforce planning is uniquely challenging
  due to extreme seasonal variation, promotional spikes, and the
  direct correlation between support capacity and revenue. Under-
  staffing during peak periods means lost sales and damaged brand
  reputation; over-staffing during lulls wastes budget.

  Part 2: Design workforce planning
  For "OutdoorGear" — an outdoor recreation e-commerce company
  ($35M revenue, 120K customers, 25-person support team):

  Current staffing data:
  - Full-time agents: 25 (20 general, 3 technical, 2 VIP)
  - Average handle time: email 12 min, chat 8 min, phone 15 min
  - Channel mix: email 45%, chat 35%, phone 20%
  - Current utilization: 82% average (peaks at 110% in Nov-Dec)
  - Monthly ticket volume: Jan 8K, Feb 7K, Mar 9K, Apr 11K,
    May 14K, Jun 16K, Jul 18K, Aug 15K, Sep 10K, Oct 12K,
    Nov 22K, Dec 28K
  - Attrition rate: 35% annual
  - Training time for new agents: 3 weeks to competency
  - Budget constraint: support cost must stay under 4% of revenue

  1. Build the annual workforce plan:
     - Monthly staffing requirements based on volume forecast
     - Channel-specific capacity planning (email, chat, phone)
     - Identify months requiring temporary staff augmentation
     - Calculate full-time vs. seasonal vs. outsourced mix
     - Factor in attrition, training ramp, and planned PTO
     - Budget projection by month and by cost category

  2. Design the scheduling optimization:
     - Shift patterns that match demand curves (hourly, daily, weekly)
     - Weekend and holiday coverage models
     - Skill-based routing requirements (technical, VIP, general)
     - Break and lunch coverage to maintain SLAs
     - Flexibility mechanisms (overtime, shift swaps, on-call)
     - Agent preference accommodation within business constraints

  3. Create the seasonal scaling playbook:
     - Peak season preparation timeline (90/60/30/7 days out)
     - Temporary agent sourcing strategy (BPO, gig, internal)
     - Abbreviated training program for seasonal agents
     - Technology and tooling provisioning for temporary staff
     - Quality assurance during high-volume periods
     - Ramp-down process and knowledge retention post-peak

  4. Design the workforce analytics framework:
     - Real-time capacity monitoring dashboard
     - Forecast accuracy tracking and model refinement
     - Agent productivity and efficiency metrics
     - Cost-per-contact optimization targets
     - Service level impact analysis by staffing level
     - Quarterly workforce planning review process

  Part 3: Strategic workforce considerations
  1. Build vs. outsource decision framework
  2. Remote and distributed team management
  3. Career pathing to reduce attrition
  4. AI and automation impact on headcount planning

assertions:
  - type: llm_judge
    criteria: "The workforce plan accounts for seasonal extremes — the Nov-Dec peak at 22K-28K tickets requires concrete scaling strategies, not just adding headcount"
    weight: 0.30
    description: "Seasonal scaling strategy"
  - type: llm_judge
    criteria: "Budget analysis is realistic — the 4% of revenue constraint is calculated against the staffing plan with specific cost breakdowns"
    weight: 0.25
    description: "Budget-constrained planning"
  - type: llm_judge
    criteria: "Scheduling optimization balances agent welfare with business needs — shift patterns consider preferences and burnout while meeting SLAs"
    weight: 0.25
    description: "Balanced scheduling"
  - type: llm_judge
    criteria: "The seasonal playbook includes both ramp-up and ramp-down — it addresses hiring, training, quality maintenance, and knowledge retention"
    weight: 0.20
    description: "Complete seasonal playbook"
