meta:
  id: ecommerce-compliance-legal
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Navigate e-commerce legal and compliance requirements — handle consumer protection laws, GDPR, product liability, and regulatory inquiries"
  tags: [support, ecommerce, compliance, legal, consumer-protection, expert]

state: {}

trigger: |
  E-commerce support agents must navigate a complex legal landscape:
  consumer protection laws vary by country, GDPR affects data
  handling, product liability creates safety obligations, and
  advertising regulations constrain what you can say. Getting
  compliance wrong creates legal liability; getting it right
  builds customer trust.

  Part 2: Handle compliance scenarios
  For "BeautyGlobal" — a cosmetics e-commerce brand selling
  internationally (US, EU, UK, Canada, Australia):

  1. GDPR data request (EU customer):
     "Under GDPR, I want a copy of all personal data you hold
     about me and then I want it all deleted. I also want to know
     who you've shared my data with."
     - Process the data subject access request
     - Coordinate data from all systems (orders, support, marketing)
     - Handle the deletion request (what must be kept for tax/legal)
     - Write the compliant response

  2. Product safety complaint:
     "Your moisturizer caused a severe allergic reaction. I had
     to go to the ER. I'm considering legal action."
     - Respond appropriately (empathy without admitting liability)
     - Internal escalation (legal, product safety, insurance)
     - Adverse event reporting (FDA/EU Cosmetics Regulation)
     - Customer communication that's caring but legally careful

  3. False advertising claim:
     "Your website says this serum 'removes wrinkles in 7 days.'
     I've used it for 3 weeks and nothing has changed. This is
     false advertising. I want a refund and you should take
     down those fake claims."
     - Address the customer complaint
     - Escalate the advertising claim internally (is it defensible?)
     - Process the refund
     - Internal recommendation on claim language

  4. International consumer protection conflict:
     Australian customer demands a refund 45 days after purchase.
     Your policy says 30 days. Australian Consumer Law guarantees
     refunds for products that don't match their description
     regardless of store policy.
     - Research applicable consumer protection
     - Decide correctly (Australian law overrides store policy)
     - Process the refund with appropriate acknowledgment

  5. Counterfeit product accusation:
     "I think the product I received is fake. The packaging looks
     different from what I've bought in stores. If you're selling
     counterfeits, that's illegal."
     - Investigate the claim seriously
     - Provide authenticity verification
     - If legitimate, reassure and explain packaging variations
     - If supply chain issue discovered, escalate immediately

  Part 3: Compliance operations
  1. Building compliance training for support agents
  2. Country-specific compliance cheat sheets
  3. Working with legal counsel on support responses
  4. Regulatory trend monitoring

assertions:
  - type: llm_judge
    criteria: "GDPR handling is legally accurate — the response addresses access, deletion, and data sharing disclosure requirements correctly"
    weight: 0.30
    description: "Legally accurate GDPR"
  - type: llm_judge
    criteria: "The product safety response is empathetic but legally careful — it shows genuine concern without admitting product liability"
    weight: 0.25
    description: "Empathetic legally careful safety response"
  - type: llm_judge
    criteria: "International consumer law is correctly applied — Australian Consumer Law overrides the store's 30-day policy"
    weight: 0.25
    description: "Correct international law application"
  - type: llm_judge
    criteria: "The counterfeit investigation is thorough — the claim is taken seriously with proper verification steps"
    weight: 0.20
    description: "Thorough counterfeit investigation"
