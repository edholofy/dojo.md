meta:
  id: ecommerce-operations-at-scale
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Scale e-commerce support operations — design processes, teams, and technology for stores handling 50,000+ orders per month"
  tags: [support, ecommerce, operations, scaling, enterprise, expert]

state: {}

trigger: |
  Scaling e-commerce support from a small team to enterprise
  operations requires fundamental redesign. At 50,000+ orders
  per month, you need specialized teams, advanced automation,
  sophisticated quality programs, and data-driven management.

  Part 2: Design scaled operations
  For "MegaStore" — growing from 20,000 to 80,000 orders/month:
  Current: 12 agents, 5,000 tickets/month, 3.8 CSAT
  Target: handling 20,000 tickets/month with 4.5+ CSAT

  1. Design the organizational structure:
     - Tiered team (generalists, specialists, leads)
     - Channel-specific teams vs. skill-based teams
     - Quality assurance function
     - Training and development function
     - Workforce management (scheduling, forecasting)
     - Include headcount plan for 6-month scaling

  2. Design the technology architecture:
     - Help desk platform (evaluation and recommendation)
     - Self-service tools (chatbot, tracking page, return portal)
     - AI and automation layer
     - Analytics and reporting infrastructure
     - Integration architecture (OMS, WMS, shipping, CRM)
     - Budget allocation

  3. Create the process framework:
     - Ticket lifecycle SOP
     - Returns processing workflow
     - Fraud detection workflow
     - Escalation procedures
     - Quality assurance program
     - Agent performance management
     - Knowledge management system

  4. Build the scaling roadmap:
     Month 1-2: Foundation (hire leads, implement tools)
     Month 3-4: Team building (hire agents, training program)
     Month 5-6: Optimization (automation, QA, analytics)
     For each phase: milestones, risks, success metrics

assertions:
  - type: llm_judge
    criteria: "The organizational design scales logically from 12 to 40+ agents with appropriate specialization and management layers"
    weight: 0.30
    description: "Logical organizational scaling"
  - type: llm_judge
    criteria: "Technology architecture integrates order management, shipping, and support tools into a cohesive system"
    weight: 0.25
    description: "Cohesive technology architecture"
  - type: llm_judge
    criteria: "The process framework is comprehensive and e-commerce-specific — returns, fraud, and product knowledge are central, not afterthoughts"
    weight: 0.25
    description: "E-commerce-specific processes"
  - type: llm_judge
    criteria: "The roadmap accounts for maintaining service quality during rapid growth — quality isn't sacrificed for speed"
    weight: 0.20
    description: "Quality during rapid growth"
