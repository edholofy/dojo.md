meta:
  id: dtc-brand-support-strategy
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Design DTC brand support strategy — build support as a competitive advantage for direct-to-consumer brands competing against marketplaces"
  tags: [support, ecommerce, dtc, brand-strategy, competitive-advantage, expert]

state: {}

trigger: |
  DTC (Direct-to-Consumer) brands compete against the convenience
  of Amazon by offering a superior branded experience. Support is
  a key differentiator — Amazon's support is efficient but
  impersonal. DTC brands can offer personalized, brand-authentic
  support that builds emotional connections and justifies premium
  pricing.

  Part 2: Design a DTC support strategy
  For "PureSleep" — a DTC premium mattress brand ($800-$2,000):
  - Selling exclusively through puresleep.com
  - 100-night sleep trial, free returns, 10-year warranty
  - Competing against Casper, Purple, and mattresses on Amazon
  - 5,000 orders/month, $1,200 AOV, 8 support agents

  1. Design the support experience as competitive advantage:
     - Map every customer touchpoint (pre-sale through 10-year warranty)
     - Identify "WOW" moments where support creates differentiation
     - Compare PureSleep support to Amazon mattress buying experience
     - Define what makes DTC support worth the price premium
     - Create the "PureSleep Promise" — the support brand

  2. Create the pre-sale consultation program:
     Mattress buying is high-anxiety (expensive, hard to try online,
     sleep quality impacts everything). Design:
     - "Sleep Consultation" — guided product recommendation
     - Comparison with competitor products (honest, helpful)
     - Trial period support (check-ins at night 7, 30, 60)
     - Sleep environment advice (pillows, sheets, room setup)
     - Write sample consultations for 3 customer profiles

  3. Design the sleep trial support program:
     The 100-night trial is the core product promise. Design:
     - Day 1: Welcome and setup guidance
     - Week 1: "How's your sleep?" check-in
     - Week 4: Adjustment period guidance (mattresses need break-in)
     - Day 60: Proactive satisfaction check
     - Return process: if they want to return, make it painless
       but also explore whether adjustments could help

  4. Design the warranty support experience:
     10-year warranty means supporting customers years after purchase:
     - Year 1: Product care and maintenance tips
     - Year 2-5: Proactive check-ins ("Still sleeping great?")
     - Year 5+: Upgrade offers and referral program
     - Warranty claims: fast, hassle-free, brand-reinforcing
     - Turn warranty interactions into advocacy opportunities

  Part 3: DTC support measurement
  1. Measuring support's impact on DTC brand perception
  2. Comparing DTC support cost vs. Amazon FBA support cost
  3. Support's role in justifying premium DTC pricing
  4. Building a support team that believes in the brand

assertions:
  - type: llm_judge
    criteria: "Support is clearly differentiated from Amazon — the strategy articulates why PureSleep's support experience is worth a premium price"
    weight: 0.30
    description: "Clear Amazon differentiation"
  - type: llm_judge
    criteria: "The sleep trial support program builds trust progressively — check-ins at the right intervals show genuine care about the customer's sleep quality"
    weight: 0.25
    description: "Trust-building trial support"
  - type: llm_judge
    criteria: "Pre-sale consultations are genuinely helpful — they guide the customer to the right mattress, not just the most expensive one"
    weight: 0.25
    description: "Genuinely helpful consultations"
  - type: llm_judge
    criteria: "Long-term warranty support creates advocacy — the 10-year touchpoint strategy turns customers into brand advocates over time"
    weight: 0.20
    description: "Advocacy-creating warranty support"
