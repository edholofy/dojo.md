meta:
  id: complex-ecommerce-simulation
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Navigate a complex multi-day e-commerce scenario — manage a holiday crisis, product recall, team restructuring, and strategic initiative simultaneously"
  tags: [support, ecommerce, simulation, complex, multi-thread, expert]

state: {}

trigger: |
  You are the Director of Customer Experience at "FreshMart" —
  a premium grocery delivery e-commerce company
  ($40M revenue, 150K customers, 35-person support team).

  Navigate a critical week during the November holiday season:

  MONDAY: Holiday prep week
  Thread 1 — Volume forecast crisis:
  Your data team projects 4x normal support volume for Thanksgiving
  week (next week). You currently have capacity for 2x.
  Task: Create an emergency staffing and automation plan for
  Thanksgiving week.

  Thread 2 — Product quality alert:
  Your food safety team reports that a batch of organic turkeys
  from one supplier may have been stored at incorrect temperature.
  2,000 turkeys from this batch are scheduled for delivery
  Wednesday-Friday this week.
  Task: Write the food safety response plan (this is a potential
  health risk before a holiday where people are serving turkey).

  WEDNESDAY:
  Thread 1 update: You've secured 15 temporary agents but they
  need training by Friday.
  Task: Create a crash 2-day training program focused on holiday-
  specific scenarios.

  Thread 2 update: Lab results confirm 500 of the 2,000 turkeys
  are from the affected batch. 200 have already been delivered.
  Task: Write urgent customer notification and initiate replacement
  deliveries before Thanksgiving.

  Thread 3 — Competitor promotion:
  Your main competitor launches "Free Thanksgiving Delivery" with
  massive social media campaign. Your inbox fills with "Why don't
  you offer free delivery?" complaints. 50 cancellation requests.
  Task: Write the competitive response strategy and cancellation
  save approach.

  FRIDAY:
  Thread 2 resolution: All affected customers contacted, replacement
  turkeys delivered. One customer consumed the turkey and is
  reporting mild food poisoning symptoms.
  Task: Handle the food illness report (legal, safety, customer care).

  Thread 4 — Strategic initiative:
  CEO wants you to present a plan for launching a customer loyalty
  program that integrates with support. Board meeting in 2 weeks.
  Task: Write the loyalty program concept including support integration.

  End of week: Write your weekly report covering all 4 threads.

assertions:
  - type: llm_judge
    criteria: "The food safety response prioritizes customer health — turkey replacement is executed urgently before Thanksgiving without waiting for full investigation"
    weight: 0.30
    description: "Health-first food safety response"
  - type: llm_judge
    criteria: "The crash training program is realistic for 2 days — it focuses on the most critical holiday scenarios rather than trying to cover everything"
    weight: 0.25
    description: "Realistic crash training"
  - type: llm_judge
    criteria: "The food illness report is handled with appropriate legal and safety awareness — empathy without liability, internal escalation to legal"
    weight: 0.25
    description: "Legally aware illness response"
  - type: llm_judge
    criteria: "The weekly report synthesizes 4 complex threads coherently — it presents a clear picture of status, risks, and decisions needed"
    weight: 0.20
    description: "Coherent multi-thread synthesis"
