meta:
  id: ecommerce-data-analytics
  level: 4
  course: ecommerce-support-tickets
  type: output
  description: "Use data analytics to optimize e-commerce support — build dashboards, analyze trends, predict volume, and prove business impact"
  tags: [support, ecommerce, analytics, data, dashboards, expert]

state: {}

trigger: |
  Data transforms e-commerce support from reactive firefighting
  to strategic business intelligence. Support data reveals product
  quality issues, shipping performance, customer satisfaction
  drivers, and revenue opportunities that no other department has
  access to.

  Part 2: Build an analytics program
  For "HomeCraft" — a home goods e-commerce store:
  Data available (last 12 months):
  - 180,000 orders, 42,000 tickets
  - CSAT: 4.1/5.0 trending down (was 4.3 six months ago)
  - Return rate: 22% (was 18% six months ago)
  - Top categories: WISMO 32%, Returns 24%, Product 18%, Payment 11%, Other 15%
  - Product returns by reason: Size/fit 15%, Quality 35%, Expectation 30%, Other 20%
  - CSAT by agent: ranges from 3.4 to 4.8
  - Return rate by product category: Furniture 28%, Textiles 25%, Decor 12%, Kitchen 8%
  - Chat conversion rate: 11% (was 14% six months ago)
  - Repeat purchase rate: 31% (industry benchmark: 38%)

  1. Diagnose the declining metrics:
     - Analyze: why is CSAT declining?
     - Analyze: why are return rates increasing?
     - Analyze: why is chat conversion dropping?
     - Connect: are these trends related?
     - Identify: root causes and contributing factors
     - Recommend: specific actions to reverse each trend

  2. Build the executive support dashboard:
     Design 4 dashboard views:
     a) CEO view: business impact (revenue, churn, CLV)
     b) VP Operations: operational health (SLAs, volume, efficiency)
     c) Support Manager: team performance (agent metrics, quality)
     d) Product Team: customer intelligence (top issues, product feedback)
     Define specific visualizations, metrics, and refresh cadences.

  3. Create a predictive model for support volume:
     - Identify volume drivers (orders, marketing campaigns, product launches, seasons)
     - Build a weekly volume forecast model
     - Calculate staffing needs from volume predictions
     - Design alert thresholds for unexpected volume spikes

  4. Design a support-to-product intelligence pipeline:
     - Automated tagging of product quality signals
     - Weekly product quality report (flagging concerning trends)
     - Return reason analysis driving product improvements
     - Customer verbatim summary for product teams
     - Feedback loop: product improvements → support ticket reduction

  Part 3: Advanced analytics
  1. Cohort analysis (new vs. returning customer support patterns)
  2. Attribution modeling (support's contribution to revenue)
  3. A/B testing support approaches with rigorous measurement
  4. Machine learning applications in support analytics

assertions:
  - type: llm_judge
    criteria: "The diagnostic analysis correctly identifies root causes — the increasing quality-related returns and agent performance variance are connected to CSAT decline"
    weight: 0.30
    description: "Correct root cause diagnosis"
  - type: llm_judge
    criteria: "Dashboard designs serve different audiences — the CEO sees business impact while the product team sees actionable customer intelligence"
    weight: 0.25
    description: "Audience-appropriate dashboards"
  - type: llm_judge
    criteria: "The predictive model is practical — it uses available data to forecast volume with enough lead time for staffing decisions"
    weight: 0.25
    description: "Practical predictive model"
  - type: llm_judge
    criteria: "The product intelligence pipeline creates a closed loop — support data leads to product improvements which reduce future tickets"
    weight: 0.20
    description: "Closed-loop product intelligence"
