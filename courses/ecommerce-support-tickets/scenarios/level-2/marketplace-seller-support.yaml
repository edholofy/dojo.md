meta:
  id: marketplace-seller-support
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Navigate marketplace support — handle Amazon, eBay, and Etsy-specific support scenarios and understand DTC vs. marketplace support differences"
  tags: [support, ecommerce, marketplace, amazon, etsy, dtc, intermediate]

state: {}

trigger: |
  Many e-commerce businesses sell on marketplaces (Amazon, eBay,
  Etsy) in addition to their own DTC (direct-to-consumer) store.
  Each marketplace has its own rules, dispute resolution processes,
  and customer expectations. Supporting marketplace customers
  requires understanding the platform's unique constraints.

  Part 1: Marketplace vs. DTC support
  1. Key differences:
     - DTC: Full control over policies, communication, customer data
     - Marketplace: Platform controls policies, limited customer contact
     - DTC: Brand voice in every interaction
     - Marketplace: Constrained by platform messaging guidelines
     - DTC: You handle returns/refunds directly
     - Marketplace: Platform may handle (e.g., Amazon FBA)
  2. Amazon seller support:
     - A-to-Z Guarantee claims (customer protection)
     - FBA vs. FBM handling differences
     - Account health metrics (ODR, late shipment, cancellation rate)
     - Restricted communication (messaging guidelines)
     - Return policy determined by Amazon, not you
  3. Etsy seller support:
     - Handmade/custom product expectations
     - Case system for disputes
     - Star seller requirements
     - Personalized buyer communication encouraged
  4. eBay seller support:
     - Money Back Guarantee disputes
     - Seller performance standards
     - Resolution center process
     - Feedback management

  Part 2: Handle marketplace support scenarios
  For "CraftHaven" — selling handmade ceramics on Etsy and their
  own Shopify store, plus some items on Amazon:

  1. Amazon A-to-Z claim (unfair):
     A customer filed an A-to-Z claim saying "item not as described"
     for a handmade mug. Your listing clearly shows the item is
     handmade with natural variations. The customer expected
     machine-perfect consistency.
     - Respond to the A-to-Z claim with evidence
     - Explain handmade variations professionally
     - Protect your seller metrics

  2. Etsy custom order dispute:
     "I ordered a custom name plate and you spelled the name wrong!
     It says 'Micheal' but I wanted 'Michael'. I can't give this
     as a gift now."
     Check the order notes — the customer actually typed "Micheal"
     in their custom order form.
     - Handle diplomatically (they DID provide the wrong spelling)
     - Offer resolution without blame
     - Protect your Etsy seller rating

  3. DTC vs. marketplace pricing complaint:
     "I just saw the same vase on your website for $45 but I paid
     $55 on Amazon! Why are you charging more on Amazon?!"
     - Explain pricing differences (marketplace fees, fulfillment costs)
     - Don't undermine your Amazon presence
     - Consider offering a future incentive for DTC purchases

  4. Etsy review response:
     Customer leaves a 2-star review: "Nice quality but took
     3 weeks to arrive. Way too long for the price."
     You shipped within your stated 1-2 week processing time;
     USPS delayed the rest.
     - Write a professional public review response
     - Balance defending your shop with empathy for their wait

  5. Cross-platform order confusion:
     "I have orders on both your website and Amazon. I want to
     return the Amazon one but exchange the website one. Also,
     can I use my website loyalty points on Amazon? This is confusing."
     - Clarify the separate systems
     - Help them navigate both returns
     - Guide them toward DTC for future (loyalty benefits)

  Part 3: Multi-marketplace strategy
  1. Unified support across marketplaces
  2. Protecting seller ratings and account health
  3. Moving marketplace customers to DTC
  4. Managing inventory and customer expectations across channels

assertions:
  - type: llm_judge
    criteria: "Marketplace-specific constraints are respected — Amazon responses follow messaging guidelines, Etsy responses align with platform norms"
    weight: 0.30
    description: "Platform-appropriate responses"
  - type: llm_judge
    criteria: "The custom order spelling dispute is handled diplomatically — the customer's mistake is addressed without blame while still offering resolution"
    weight: 0.25
    description: "Diplomatic blame-free resolution"
  - type: llm_judge
    criteria: "The pricing complaint explains marketplace economics honestly — it justifies the price difference without making the customer feel cheated"
    weight: 0.25
    description: "Honest pricing explanation"
  - type: llm_judge
    criteria: "The review response is professional and effective — it provides context without being defensive or argumentative"
    weight: 0.20
    description: "Professional review response"
