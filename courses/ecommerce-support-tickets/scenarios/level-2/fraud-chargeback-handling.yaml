meta:
  id: fraud-chargeback-handling
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Handle fraud and chargebacks — detect fraudulent orders, manage chargeback disputes, and protect both the business and legitimate customers"
  tags: [support, ecommerce, fraud, chargebacks, security, intermediate]

state: {}

trigger: |
  E-commerce fraud costs the industry $48 billion annually. Support
  agents are on the front line — detecting suspicious activity,
  handling chargeback disputes, and balancing fraud prevention with
  customer experience. Being too aggressive catches false positives;
  too lenient invites loss.

  Part 1: E-commerce fraud fundamentals
  1. Fraud types:
     - Card-not-present (CNP) fraud (stolen card details)
     - Friendly fraud (customer disputes legitimate purchase)
     - Account takeover (hacker accesses customer account)
     - Return fraud (returning used/different items)
     - Promotion abuse (multiple accounts for discounts)
     - Reseller fraud (buying limited items to resell)
  2. Chargeback process:
     - Customer disputes charge with their bank
     - Bank contacts merchant's payment processor
     - Merchant has 7-30 days to respond with evidence
     - Bank decides in favor of customer or merchant
     - Chargeback ratio above 1% risks payment processor penalties
  3. Fraud indicators:
     - Billing/shipping address mismatch
     - Multiple failed payment attempts
     - Unusual order size or frequency
     - Different shipping addresses for same card
     - Express shipping on high-value orders to new address
     - Email address patterns (random characters)

  Part 2: Handle fraud and chargeback scenarios
  For "LuxeWatch" — an online luxury watch retailer
  (Average order: $800, Free shipping, 14-day returns):

  1. Suspicious high-value order:
     New customer places a $3,200 order (3 watches) with express
     shipping. Billing address is in Florida, shipping to California.
     Email is random characters @gmail.com. Card authorized.
     - Assess fraud risk (score the indicators)
     - Decide: ship, hold, or cancel
     - If holding, write the verification email to customer

  2. Friendly fraud chargeback:
     A customer purchased a watch ($1,100), received it (tracking
     confirmed delivery + signature), then filed a chargeback
     claiming "item not received."
     - Prepare the chargeback response with evidence
     - Include: tracking proof, signature, delivery confirmation
     - Write the professional customer communication

  3. Account takeover report:
     "Someone changed my email and password and ordered 5 watches
     to an address I don't recognize! Those aren't my orders!"
     - Secure the account immediately
     - Investigate the unauthorized orders
     - Cancel/intercept fraudulent shipments
     - Reassure the legitimate customer

  4. Return fraud suspicion:
     Customer returns a $900 watch claiming "defective." Your
     warehouse team notes the returned watch has a different
     serial number than what was shipped — it appears to be
     a counterfeit.
     - Handle the confrontation professionally
     - Document the evidence
     - Decide on refund denial with legal awareness

  5. Promotion abuse:
     You notice 8 orders using different email addresses but
     the same billing address, each using the "WELCOME15" first-
     order discount code. Total: $2,400 in discounted purchases.
     - Investigate the pattern
     - Decide on action (cancel orders, blacklist, honor some)
     - Write policy for future prevention

  Part 3: Fraud prevention operations
  1. Building fraud detection checklists for support agents
  2. Working with payment processors on fraud tools
  3. Chargeback response templates and evidence collection
  4. Balancing fraud prevention with customer experience

assertions:
  - type: llm_judge
    criteria: "Fraud assessment correctly scores risk indicators — the suspicious order evaluation considers multiple signals and makes a defensible decision"
    weight: 0.30
    description: "Correct fraud risk assessment"
  - type: llm_judge
    criteria: "The chargeback response includes compelling evidence — tracking, signature, and delivery proof are organized in a bank-ready format"
    weight: 0.25
    description: "Compelling chargeback evidence"
  - type: llm_judge
    criteria: "The account takeover response prioritizes security — the account is secured first, then investigation and customer reassurance"
    weight: 0.25
    description: "Security-first account takeover"
  - type: llm_judge
    criteria: "The return fraud scenario is handled professionally — the counterfeit discovery is addressed firmly but without accusatory language"
    weight: 0.20
    description: "Professional fraud confrontation"
