meta:
  id: subscription-recurring-support
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Support subscription and recurring orders — handle subscription management, failed payments, skip/pause requests, and subscription retention"
  tags: [support, ecommerce, subscriptions, recurring, retention, intermediate]

state: {}

trigger: |
  Subscription e-commerce adds complexity to support: recurring
  billing, subscription management, failed payment recovery, and
  the constant challenge of preventing involuntary churn. Every
  subscription ticket has recurring revenue implications.

  Part 1: Subscription support fundamentals
  1. Common subscription ticket types:
     - Billing (charges, payment failures, plan changes)
     - Delivery (skip, pause, reschedule, address change)
     - Product (swap products, customize box, preferences)
     - Cancellation (cancel, pause instead, win-back)
     - Account (login, payment method update, gifting)
  2. Subscription-specific challenges:
     - Failed payments (involuntary churn — silent revenue loss)
     - Subscription fatigue ("I have too many subscriptions")
     - Product accumulation ("I have 6 bottles piling up")
     - Price sensitivity (recurring = higher scrutiny)
     - Cancellation friction (too easy = churn, too hard = complaints)
  3. Key subscription metrics:
     - MRR (Monthly Recurring Revenue)
     - Churn rate (voluntary vs. involuntary)
     - LTV (Lifetime Value)
     - Payment recovery rate
     - Skip/pause rate

  Part 2: Handle subscription scenarios
  For "FreshBox" — a meal kit subscription service
  ($59/week for 3 meals, $89/week for 5 meals, skip anytime):

  Write responses for 6 subscription scenarios:

  1. Failed payment recovery:
     "My card was declined and you cancelled my delivery for this
     week! I was counting on those meals. Can you fix this?"
     Customer: 8 months subscriber, $59/week plan
     - Recover the payment (update card, retry)
     - Rescue the delivery if possible
     - Set up payment failure notifications for the future

  2. Skip/pause request:
     "I'm going on vacation for 3 weeks. How do I pause my
     subscription? I don't want to be charged while I'm away."
     Customer: 4 months subscriber, $89/week plan
     - Process the pause (make it easy)
     - Set a resume date
     - Welcome them back when they return

  3. Product customization request:
     "I just became vegetarian. Can I switch all my meals to
     vegetarian options without changing my plan? Also, my husband
     is allergic to nuts — can you exclude those?"
     Customer: 6 months subscriber, $89/week plan, couple
     - Handle dietary preference changes
     - Address the allergy seriously (safety concern)
     - Update their preference profile

  4. Cancellation save:
     "I want to cancel. The meals are good but $89/week is too
     expensive with everything going on right now."
     Customer: 10 months subscriber, $89/week plan
     - Explore alternatives before cancelling
     - Offer: downgrade plan, skip weeks, promotional pricing
     - If they still want to cancel, make it graceful

  5. Subscription gifting:
     "I want to gift a 3-month subscription to my mom for her
     birthday. She lives at a different address. How does this work?"
     Customer: Active subscriber, wants to gift
     - Explain the gifting process
     - Handle the logistics (different address, preferences)
     - Make it feel special (gift message, presentation)

  6. Billing dispute:
     "I was charged $89 this week but I thought I switched to the
     $59 plan last month. I even have the confirmation email!"
     Customer: Shows confirmation of plan change
     - Investigate the billing discrepancy
     - Refund the difference if the change was confirmed
     - Fix the plan for future charges

  Part 3: Subscription optimization
  1. Reducing involuntary churn (dunning sequences, card updaters)
  2. Building a cancellation flow that retains customers
  3. Subscription analytics for support teams
  4. The pause vs. cancel strategy (keeping options open)

assertions:
  - type: llm_judge
    criteria: "All 6 responses protect recurring revenue — each interaction considers the long-term subscription relationship, not just the immediate issue"
    weight: 0.30
    description: "Revenue-protecting responses"
  - type: llm_judge
    criteria: "The cancellation save offers genuine alternatives — downgrade and skip options are presented as real solutions, not desperate retention tactics"
    weight: 0.25
    description: "Genuine cancellation alternatives"
  - type: llm_judge
    criteria: "The food allergy request is handled with appropriate seriousness — nut allergies are a safety concern, not just a preference"
    weight: 0.25
    description: "Safety-serious allergy handling"
  - type: llm_judge
    criteria: "The billing dispute is resolved customer-first — the confirmation email is honored without requiring extensive investigation"
    weight: 0.20
    description: "Customer-first billing resolution"
