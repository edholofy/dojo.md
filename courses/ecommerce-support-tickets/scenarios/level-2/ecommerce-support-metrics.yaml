meta:
  id: ecommerce-support-metrics
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Track e-commerce support metrics — measure CSAT, resolution time, conversion influence, and the revenue impact of support interactions"
  tags: [support, ecommerce, metrics, analytics, revenue-impact, intermediate]

state: {}

trigger: |
  E-commerce support metrics go beyond traditional support KPIs.
  In addition to response time and CSAT, e-commerce support
  directly influences revenue through pre-sale conversion, post-sale
  retention, and return prevention. Tracking these metrics proves
  support's value to the business.

  Part 1: E-commerce support metrics
  1. Traditional metrics:
     - First Response Time (FRT): <1 hour email, <30 sec chat
     - Resolution Time: <24 hours (e-commerce expectation)
     - CSAT: 82% average for e-commerce (target: 85%+)
     - First Contact Resolution (FCR): 78% benchmark
     - Ticket volume per channel
  2. E-commerce-specific metrics:
     - Revenue influenced by support (pre-sale conversations → purchase)
     - Ticket-to-order ratio (tickets per 100 orders)
     - Self-service deflection rate (issues resolved without agent)
     - Return prevention rate (support interactions that prevent returns)
     - Review score correlation with support quality
  3. Revenue metrics:
     - Support-driven conversion rate (chat → purchase)
     - Average order value from support-assisted purchases
     - Repeat purchase rate for customers who contacted support
     - Customer Lifetime Value (CLV) by support experience quality
     - Cost per ticket vs. revenue per supported customer

  Part 2: Build an e-commerce support analytics program
  For "BeautyBox" — an online cosmetics store:
  - 15,000 orders/month, $65 average order value
  - Support team: 8 agents (5 email, 2 chat, 1 social)
  - Monthly tickets: 3,200 (21 per 100 orders)
  - CSAT: 4.0/5.0
  - FRT: 3.8 hours (email), 45 seconds (chat)
  - FCR: 71%
  - Chat conversion rate: 12%

  1. Design the support KPI dashboard:
     Create a dashboard with 3 views:
     - Agent daily view: personal metrics, queue status, targets
     - Manager weekly view: team performance, trends, alerts
     - Executive monthly view: business impact, ROI, benchmarks
     Define specific metrics for each view with targets.

  2. Calculate support's revenue impact:
     Using BeautyBox's data:
     - Chat conversations that led to purchases (calculate $)
     - Returns prevented by support intervention (estimate %)
     - Repeat purchases from customers who had positive support (vs. no support contact)
     - Show the total revenue influenced per month
     - Calculate support ROI (team cost vs. revenue influenced)

  3. Create a support quality scorecard:
     - 8 evaluation criteria weighted for e-commerce
     - Sample scoring of 3 support interactions
     - Coaching recommendations based on scores
     - Connection between quality scores and business outcomes

  4. Design a support experiment:
     Hypothesis: "Adding proactive chat on the cart page will
     increase conversion by 5% and reduce cart abandonment."
     - Experiment design (A/B test structure)
     - Metrics to track during the experiment
     - Success criteria and timeline
     - Expected impact calculation

  Part 3: Data-driven optimization
  1. Using metrics to justify hiring decisions
  2. A/B testing support approaches
  3. Seasonal metric adjustments (holiday benchmarks differ)
  4. Benchmarking against industry and competitors

assertions:
  - type: llm_judge
    criteria: "The three dashboard views serve different audiences effectively — agents see daily targets, managers see trends, executives see business impact"
    weight: 0.30
    description: "Audience-appropriate dashboards"
  - type: llm_judge
    criteria: "Revenue impact calculations are realistic — the math connects support activities to revenue with defensible assumptions"
    weight: 0.25
    description: "Realistic revenue calculations"
  - type: llm_judge
    criteria: "The support experiment is well-designed — the A/B test has clear hypothesis, metrics, success criteria, and expected impact"
    weight: 0.25
    description: "Well-designed support experiment"
  - type: llm_judge
    criteria: "Quality scorecard criteria are e-commerce-specific — they include sales opportunity, product knowledge, and brand voice alongside traditional metrics"
    weight: 0.20
    description: "E-commerce-specific quality criteria"
