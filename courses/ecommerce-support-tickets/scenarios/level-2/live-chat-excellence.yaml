meta:
  id: live-chat-excellence
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Excel at live chat support — manage real-time conversations, handle multiple chats simultaneously, and convert chat interactions into sales"
  tags: [support, ecommerce, live-chat, real-time, conversion, intermediate]

state: {}

trigger: |
  Live chat is the highest-converting support channel in e-commerce.
  Customers who use live chat are 3x more likely to buy. But chat
  requires different skills than email: real-time typing, managing
  multiple conversations, and thinking on your feet. Response time
  under 30 seconds is the expectation.

  Part 1: Live chat best practices
  1. Chat-specific skills:
     - Short, scannable messages (2-3 sentences max)
     - Break long answers into multiple messages
     - Use "typing indicator" strategically (customer knows you're there)
     - Personal greeting (name, offer to help)
     - Proactive chat triggers (offer help before they ask)
  2. Managing multiple chats:
     - Ideal: 2-3 simultaneous chats
     - Maximum effective: 4-5 (quality drops after)
     - Priority: active conversation > waiting customer > idle
     - Use macros for common openings while personalizing closings
  3. Chat conversion techniques:
     - Answering product questions instantly (no "let me check")
     - Reducing checkout friction in real-time
     - Suggesting complementary products naturally
     - Creating urgency (limited stock, sale ending)
     - Following up on abandoned chats

  Part 2: Handle live chat scenarios
  For "UrbanStyle" — an online streetwear brand with live chat:

  Simulate 3 complete chat conversations (5-8 messages each):

  1. Pre-sale conversion chat:
     Customer browsing sneakers page for 3 minutes, chat proactively
     triggered: "Hey! Need help finding the perfect pair?"
     Customer is deciding between two sneakers, worried about sizing,
     and wants to know about a sale. Convert them to purchase.
     - Write the full chat transcript
     - Include product recommendation and sizing help
     - Close with a purchase or clear next step

  2. Post-purchase issue chat (frustrated):
     Customer initiates chat: "Why was my order cancelled without
     telling me??"
     Their order was cancelled due to a payment authorization failure.
     They weren't notified (a system gap).
     - De-escalate in real-time (chat de-escalation is harder)
     - Fix the issue (reprocess the order)
     - Acknowledge the notification failure

  3. Multi-question chat:
     Customer: "Hi quick questions — do you ship to UK? How long?
     Can I return if it doesn't fit? Also is the hoodie on your
     homepage still in stock in XL?"
     - Handle multiple questions efficiently
     - Answer all questions (don't miss any)
     - Lead toward a purchase

  Then handle 2 challenging chat situations:

  4. Managing 3 simultaneous chats:
     You have 3 active chats:
     - Chat A: Complex return issue (needs investigation)
     - Chat B: Simple WISMO question
     - Chat C: Pre-sale sizing question (high purchase intent)
     Show how you prioritize and manage response timing across
     all three. Write key messages for each.

  5. Chat-to-email handoff:
     A customer's issue requires investigation that will take
     20+ minutes. They can't stay on chat.
     - Write the handoff message (don't lose the customer)
     - Set clear expectations for email follow-up
     - Capture all necessary information before they leave

  Part 3: Chat optimization
  1. Proactive chat trigger design (when to pop up, when not to)
  2. Chat-to-conversion tracking and optimization
  3. After-hours chat strategy (chatbot, email capture)
  4. Measuring chat quality (response time, CSAT, conversion rate)

assertions:
  - type: llm_judge
    criteria: "Chat conversations feel natural and real-time — messages are appropriately short, the pace feels like actual chat, not email responses in a chat window"
    weight: 0.30
    description: "Natural real-time chat feel"
  - type: llm_judge
    criteria: "The pre-sale chat successfully guides toward purchase — the conversation naturally leads to a buying decision through helpful information"
    weight: 0.25
    description: "Effective pre-sale chat conversion"
  - type: llm_judge
    criteria: "Multi-chat management demonstrates clear prioritization — the high-intent buyer gets faster responses while all three customers feel attended to"
    weight: 0.25
    description: "Effective multi-chat prioritization"
  - type: llm_judge
    criteria: "The chat-to-email handoff preserves the customer relationship — the transition feels seamless, not like being dumped"
    weight: 0.20
    description: "Seamless channel handoff"
