meta:
  id: seasonal-surge-management
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Manage seasonal support surges — prepare for Black Friday, holiday season, flash sales, and product launches with staffing, automation, and process plans"
  tags: [support, ecommerce, seasonal, black-friday, holiday, surge, intermediate]

state: {}

trigger: |
  E-commerce support volume can spike 200-300% during seasonal
  events. Black Friday/Cyber Monday, holiday shipping deadlines,
  flash sales, and product launches create predictable but intense
  surges. Preparation is everything — you can't hire and train
  agents the week before Black Friday.

  Part 1: Seasonal surge fundamentals
  1. Major e-commerce surge events:
     - Black Friday / Cyber Monday (highest volume)
     - Holiday season (Nov-Dec, up to 40% of annual revenue)
     - Valentine's Day, Mother's Day, Father's Day
     - Back-to-school season
     - Flash sales and product launches
     - Amazon Prime Day (affects all e-commerce)
  2. What surges during peaks:
     - WISMO tickets (3-4x normal volume)
     - Payment failures (higher transaction volume = more errors)
     - Discount code issues (expired, wrong code, stacking)
     - Shipping deadline anxiety ("Will it arrive by Christmas?")
     - Returns spike (January = "returns season")
     - Stock issues (sold out, backorder confusion)
  3. Preparation timeline:
     - 12 weeks before: Hiring seasonal agents
     - 8 weeks: Training program
     - 4 weeks: System stress testing
     - 2 weeks: Final preparation and rehearsal
     - During: Real-time monitoring and adjustment
     - After: Debrief and lessons learned

  Part 2: Plan a Black Friday support operation
  For "TrendMart" — a fashion and lifestyle e-commerce store:
  Normal volume: 200 tickets/day, 5 agents
  Expected BFCM volume: 800+ tickets/day for 5 days

  1. Create the staffing plan:
     - How many seasonal agents to hire (calculate)
     - Training curriculum for seasonal agents (2-week program)
     - Shift schedules for extended hours (6 AM - midnight)
     - Agent specialization during surge (WISMO team, returns team,
       payment team, general)
     - Escalation protocols (when to involve permanent agents)

  2. Design the automation strategy:
     - Auto-replies for top 5 surge ticket types
     - Self-service flows (order tracking, return initiation)
     - Chatbot handling for common questions
     - Proactive communication (shipping cutoff dates, sale details)
     - Target: 40% deflection of surge tickets

  3. Create the BFCM support playbook:
     - Day-by-day plan (Wednesday pre-sale through Cyber Monday)
     - Hour-by-hour coverage model for Black Friday
     - Real-time monitoring dashboard (what to watch)
     - Escalation matrix (when surge becomes crisis)
     - Communication templates for surge-specific issues:
       a) "Item sold out after you ordered" communication
       b) "Shipping delays due to high volume" notification
       c) "Payment processing delays" explanation
       d) "Discount code expired/sold-out item" resolution

  4. Plan the January returns surge:
     - Expected return volume (30-40% of holiday orders)
     - Processing capacity and timeline
     - Gift return handling (no receipt, exchange preferences)
     - Refund processing timeline communication

  Part 3: Continuous improvement
  1. Post-surge retrospective (what worked, what didn't)
  2. Year-over-year surge comparison metrics
  3. Building institutional knowledge for future surges
  4. Technology investments to reduce surge impact

assertions:
  - type: llm_judge
    criteria: "The staffing plan is mathematically sound — agent count, shift coverage, and ticket capacity calculations add up for 800+ tickets/day"
    weight: 0.30
    description: "Mathematically sound staffing"
  - type: llm_judge
    criteria: "The automation strategy targets the right ticket types — WISMO and self-service returns deflect the highest volume surge categories"
    weight: 0.25
    description: "High-impact automation targeting"
  - type: llm_judge
    criteria: "The BFCM playbook is operationally detailed — it covers specific hours, specific scenarios, and specific communication templates"
    weight: 0.25
    description: "Operationally detailed playbook"
  - type: llm_judge
    criteria: "The January returns plan anticipates the post-holiday reality — gift returns, refund timelines, and processing capacity are addressed"
    weight: 0.20
    description: "Realistic post-holiday planning"
