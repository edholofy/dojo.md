meta:
  id: post-purchase-experience
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Design the post-purchase support experience — create order confirmations, shipping updates, delivery follow-ups, and review request sequences"
  tags: [support, ecommerce, post-purchase, notifications, follow-up, intermediate]

state: {}

trigger: |
  The post-purchase experience determines whether a customer
  buys again. Most e-commerce brands focus on acquisition but
  neglect the journey after the order is placed. Proactive
  post-purchase communication reduces support tickets AND
  increases repeat purchases.

  Part 1: Post-purchase communication timeline
  1. Immediate (0-1 hour):
     - Order confirmation email
     - Payment confirmation
     - Expected delivery date
  2. Processing (1-48 hours):
     - Order processing confirmation
     - Any delays communicated proactively
  3. Shipping (2-7 days):
     - Shipping confirmation with tracking
     - In-transit updates (major milestones)
     - Out for delivery notification
     - Delivered confirmation
  4. Post-delivery (1-14 days):
     - "How's your purchase?" check-in
     - Product care/usage tips
     - Review request
     - Cross-sell recommendations
  5. Ongoing (30+ days):
     - Replenishment reminder (consumable products)
     - Loyalty program updates
     - Win-back if no repeat purchase

  Part 2: Design the post-purchase experience
  For "GreenLeaf" — an organic skincare e-commerce brand:

  1. Write the complete email sequence:
     Design 8 emails from order to repeat purchase:
     a) Order confirmation (immediate)
     b) Shipping confirmation (with branded tracking page concept)
     c) Out for delivery notification
     d) Delivery confirmation + "What's in your box" guide
     e) Day 3: Product usage tips and routine suggestions
     f) Day 7: "How's it going?" check-in + review request
     g) Day 14: Complementary product recommendation
     h) Day 30: Replenishment reminder

     For each email: subject line, preview text, key content,
     CTA, and tone guidance.

  2. Design the branded tracking page:
     Instead of sending customers to UPS.com, design a branded
     tracking experience:
     - Order status timeline (visual)
     - Product tips while they wait
     - FAQ for delivery issues
     - Contact support option
     - Cross-sell recommendations
     - Social media engagement

  3. Create the review request strategy:
     - Optimal timing (how many days after delivery)
     - Email template with incentive (discount for photo review)
     - Follow-up if no review after first request
     - Different approach for high-value vs. low-value orders
     - Handling negative feedback within the review request flow

  4. Design a proactive issue detection system:
     - Monitor for delivery exceptions → auto-communicate
     - Detect long processing time → auto-update customer
     - Identify abandoned delivery → proactive reshipment offer
     - Track return patterns → product improvement signal

  Part 3: Measuring post-purchase impact
  1. Post-purchase email engagement metrics
  2. Tracking attribution (post-purchase to repeat purchase)
  3. Support ticket reduction from proactive communication
  4. Optimizing the sequence through A/B testing

assertions:
  - type: llm_judge
    criteria: "The 8-email sequence is complete and well-timed — each email serves a clear purpose with appropriate spacing and content"
    weight: 0.30
    description: "Complete well-timed email sequence"
  - type: llm_judge
    criteria: "The branded tracking page adds genuine value — it goes beyond status updates to include product tips, FAQ, and support access"
    weight: 0.25
    description: "Value-adding tracking page"
  - type: llm_judge
    criteria: "The review request strategy is effective without being annoying — timing, incentives, and follow-up are balanced"
    weight: 0.25
    description: "Effective non-annoying review requests"
  - type: llm_judge
    criteria: "Proactive issue detection genuinely prevents support tickets — each automated trigger addresses a real customer pain point before they contact support"
    weight: 0.20
    description: "Genuinely preventive detection"
