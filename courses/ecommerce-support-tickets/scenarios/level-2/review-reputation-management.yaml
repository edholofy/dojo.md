meta:
  id: review-reputation-management
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Manage reviews and reputation — respond to positive and negative reviews, handle review disputes, and build trust through social proof"
  tags: [support, ecommerce, reviews, reputation, social-proof, intermediate]

state: {}

trigger: |
  Reviews are the lifeblood of e-commerce. 93% of consumers read
  reviews before buying, and a one-star increase can drive 5-9%
  more revenue. Support's role in review management is critical —
  responding to reviews, resolving issues that cause negative
  reviews, and encouraging satisfied customers to leave reviews.

  Part 1: Review management fundamentals
  1. The review ecosystem:
     - Product reviews (on-site: Yotpo, Judge.me, Stamped)
     - Marketplace reviews (Amazon, Etsy, eBay)
     - Third-party reviews (Google, Trustpilot, BBB)
     - Social proof (Instagram, TikTok, YouTube)
  2. Review response principles:
     - Respond to ALL negative reviews (shows you care)
     - Respond to positive reviews selectively (top reviews, detailed ones)
     - Never argue with reviewers publicly
     - Take resolution offline (DM, email) when possible
     - Thank for feedback, even when negative
  3. Review impact metrics:
     - Average star rating (4.0+ is baseline, 4.5+ is excellent)
     - Review volume (more reviews = more trust)
     - Recency (recent reviews matter more)
     - Photo/video reviews (highest trust)
     - Response rate to reviews (shows active engagement)

  Part 2: Handle review scenarios
  For "KitchenCraft" — an online kitchenware store:

  Write review responses for 6 scenarios:

  1. Negative product review (legitimate issue):
     ★★☆☆☆ "Non-stick pan started peeling after 2 months of
     normal use. Very disappointed for a $65 pan."
     - Acknowledge the quality issue
     - Offer resolution (replacement under warranty)
     - Show future customers you stand behind your products

  2. Negative review (unreasonable expectations):
     ★☆☆☆☆ "This cast iron pan is SO HEAVY. I can barely lift it
     with food in it. Terrible design. Would not recommend."
     - Cast iron IS heavy — that's the nature of the product
     - Respond without making the customer feel foolish
     - Help future buyers set correct expectations

  3. Negative review (shipping, not product):
     ★★☆☆☆ "Product seems great but it arrived 2 weeks late and
     the box was crushed. Lucky the pan wasn't damaged."
     - Address the shipping issue (which you can fix)
     - Don't invalidate their frustration
     - Show you're improving shipping

  4. Positive detailed review:
     ★★★★★ "Best chef's knife I've ever owned. Holds its edge
     beautifully after 6 months of daily use. Worth every penny
     of the $89 price tag."
     - Engage meaningfully (not just "thanks!")
     - Highlight the review for other shoppers
     - Build the relationship

  5. Fake/competitor review:
     ★☆☆☆☆ "Worst company ever. Products are cheap Chinese
     knockoffs. Buy from [competitor name] instead."
     No order history found for this reviewer.
     - Handle suspected fake review
     - Report through platform's dispute process
     - Write a professional public response in the meantime

  6. Review with specific support complaint:
     ★★☆☆☆ "The blender is fine but customer service was awful.
     I emailed about a missing lid and got a robotic template
     response after 5 days. Had to email 3 times before they
     actually helped."
     - Own the support failure
     - Offer to make it right
     - Use this as internal feedback

  Part 3: Review strategy
  1. Encouraging reviews (post-purchase email timing and content)
  2. Handling review disputes with platforms
  3. Using review data for product improvement
  4. Building a review response playbook

assertions:
  - type: llm_judge
    criteria: "Negative review responses are professional and resolution-oriented — each turns a negative into an opportunity to show customer care publicly"
    weight: 0.30
    description: "Professional resolution-focused responses"
  - type: llm_judge
    criteria: "The unreasonable review response is handled gracefully — cast iron weight is addressed without making the customer feel foolish while helping future buyers"
    weight: 0.25
    description: "Graceful unreasonable review handling"
  - type: llm_judge
    criteria: "The support complaint review is owned honestly — the response acknowledges the failure rather than making excuses"
    weight: 0.25
    description: "Honest support failure acknowledgment"
  - type: llm_judge
    criteria: "The suspected fake review is handled properly — the public response is professional while the private dispute process is initiated"
    weight: 0.20
    description: "Proper fake review handling"
