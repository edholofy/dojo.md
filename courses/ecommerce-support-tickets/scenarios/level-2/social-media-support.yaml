meta:
  id: social-media-support
  level: 2
  course: ecommerce-support-tickets
  type: output
  description: "Manage social media support — handle public complaints, DM conversations, social commerce inquiries, and brand reputation on social platforms"
  tags: [support, ecommerce, social-media, instagram, tiktok, reputation, intermediate]

state: {}

trigger: |
  Social media support is uniquely high-stakes in e-commerce.
  Every response is public, every complaint is visible to
  thousands, and social commerce (Instagram Shopping, TikTok Shop)
  is creating new support channels. Your social responses are
  marketing AND support simultaneously.

  Part 1: Social media support landscape
  1. Platform-specific expectations:
     - Instagram: DMs for support, comments for praise/complaints,
       1-4 hour response expected, visual/brand-conscious
     - TikTok: Comments on product videos, TikTok Shop DMs,
       1 hour response during live sales, casual/authentic tone
     - Facebook: Messenger for support, comments on ads,
       1-4 hour response, mix of demographics
     - Twitter/X: Public complaints, quick resolution expected,
       <1 hour response, concise communication
  2. Public vs. private resolution:
     - Always acknowledge publicly (shows you're responsive)
     - Move sensitive details to DM (order numbers, personal info)
     - Post resolution publicly (shows other customers you care)
     - Never argue publicly (even if the customer is wrong)
  3. Social commerce support:
     - In-app purchases create new support flows
     - Live shopping events need real-time support
     - Influencer content drives product questions
     - User-generated content creates expectations

  Part 2: Handle social media support scenarios
  For "GlowUp Cosmetics" — a beauty brand selling on Instagram
  Shop, TikTok Shop, and their own website:

  1. Public Instagram complaint:
     Comment on product photo (visible to 50K followers):
     "@glowupcosmetics this foundation BROKE ME OUT so bad!!
     worst purchase ever 😤😤 #wasteofmoney"
     - Write the public reply (empathetic, brief, action-oriented)
     - Write the follow-up DM (detailed resolution)
     - Consider: other followers are reading this

  2. TikTok Shop order issue:
     DM via TikTok: "hey i ordered the lip kit from ur tiktok
     live last week and it still hasnt shipped?? yall said 2-3
     days shipping 💀"
     - Match the casual TikTok tone
     - Resolve the shipping delay
     - Maintain brand voice on this platform

  3. Viral negative post:
     A customer posts a TikTok showing your mascara flaking badly
     after 2 hours. It's going viral (200K views, 5K comments).
     Most comments are negative. Some are from competitors' fans.
     - Write the official comment response
     - Create a DM outreach strategy for the poster
     - Draft internal plan for managing the viral moment

  4. Instagram DM product question (pre-sale):
     "Hey! Love your content 😍 I'm looking at the vitamin C
     serum but I have really sensitive skin. Is it okay for
     sensitive skin? Also do you ship to UK?"
     - Respond in Instagram DM style (friendly, emoji-friendly)
     - Answer product and shipping questions
     - Convert the inquiry to a sale

  5. Facebook ad comment complaint:
     On your paid ad (reaching 100K people):
     "DON'T BUY FROM THEM. Ordered 3 weeks ago, never received
     it, and their customer service is NONEXISTENT"
     - Write the public response (other ad viewers are watching)
     - Write the private follow-up
     - Consider the impact on ad performance

  6. Positive social mention opportunity:
     A beauty influencer (50K followers) posts: "@glowupcosmetics
     just became my holy grail. This blush is EVERYTHING 🌟"
     - Engage with the positive mention
     - Turn it into a relationship opportunity
     - Consider reposting/partnership potential

  Part 3: Social media support strategy
  1. Social media support playbooks (by platform)
  2. Monitoring tools and response workflows
  3. Crisis management on social media
  4. Measuring social support impact

assertions:
  - type: llm_judge
    criteria: "Public responses are strategically crafted — they address the customer AND the audience watching, showing the brand cares without oversharing"
    weight: 0.30
    description: "Audience-aware public responses"
  - type: llm_judge
    criteria: "The viral negative post is handled with appropriate urgency — the response addresses the issue publicly while the DM outreach seeks resolution"
    weight: 0.25
    description: "Viral post crisis handling"
  - type: llm_judge
    criteria: "Tone adapts to each platform — Instagram is visual and emoji-friendly, TikTok is casual, Facebook is slightly more formal"
    weight: 0.25
    description: "Platform-adapted tone"
  - type: llm_judge
    criteria: "The positive mention is leveraged strategically — it's not just a 'thank you' but a genuine relationship-building opportunity"
    weight: 0.20
    description: "Strategic positive engagement"
