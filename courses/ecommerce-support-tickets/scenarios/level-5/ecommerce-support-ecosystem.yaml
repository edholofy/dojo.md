meta:
  id: ecommerce-support-ecosystem
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Design a complete e-commerce support ecosystem — integrate self-service, community, AI, agents, and partner support into a seamless multi-tier system"
  tags: [support, ecommerce, ecosystem, self-service, community, mastery]

state: {}

trigger: |
  World-class e-commerce support isn't a single channel or team —
  it's an ecosystem where self-service, community, AI, human agents,
  and partner networks work together. Each tier handles what it does
  best, and customers move seamlessly between tiers based on need.

  Design the support ecosystem for "CraftMarket" — an artisan
  marketplace connecting 5,000 sellers with 300K buyers
  ($45M GMV, handmade and vintage goods):

  Unique challenges:
  - Two-sided marketplace (buyers AND sellers need support)
  - Handmade products = unique items, no standard product database
  - High emotional attachment to purchases (gifts, special occasions)
  - Seller quality variance (professional shops to hobby sellers)
  - Dispute resolution between buyers and sellers
  - Shipping from individual sellers (not centralized warehouse)

  1. Design the multi-tier support ecosystem:

     Tier 0 — Self-service:
     - Help center with dynamic content (buyer vs. seller persona)
     - Order tracking integrated with multi-seller shipments
     - Automated return/refund initiation for clear-cut cases
     - FAQ chatbot for common questions
     - Community forums for peer support
     Define: content strategy, deflection targets, handoff triggers

     Tier 1 — AI-assisted support:
     - AI agent handles routine inquiries with human oversight
     - Automated buyer-seller mediation for simple disputes
     - Smart routing based on issue complexity and customer value
     - Proactive outreach for detected problems
     Define: automation scope, accuracy targets, human handoff rules

     Tier 2 — Specialist human support:
     - Buyer specialists (order issues, quality complaints)
     - Seller specialists (listing help, policy questions, payouts)
     - Dispute mediators (buyer-seller conflicts)
     - Trust & safety (fraud, policy violations, counterfeit claims)
     Define: team structure, skill requirements, resolution authority

     Tier 3 — Expert escalation:
     - Complex dispute arbitration
     - Legal and compliance issues
     - PR-sensitive cases (social media escalations)
     - Executive escalations
     Define: escalation criteria, SLAs, decision authority

  2. Design the seller support program:
     - Onboarding support for new sellers
     - Success coaching for growing sellers
     - Top seller premium support
     - Policy compliance guidance
     - Payout and financial support

  3. Create the dispute resolution framework:
     - Buyer protection policy (when marketplace intervenes)
     - Seller protection policy (against fraudulent claims)
     - Mediation process and timeline
     - Escalation to arbitration criteria
     - Fair outcome guidelines (refund, partial refund, return, credit)

  4. Ecosystem performance measurement:
     - Tier effectiveness (resolution rate per tier)
     - Cross-tier escalation patterns
     - Buyer satisfaction vs. seller satisfaction balance
     - Dispute outcome fairness metrics
     - Ecosystem cost efficiency (cost per resolution by tier)

assertions:
  - type: llm_judge
    criteria: "The multi-tier ecosystem appropriately segments support — self-service handles volume, AI handles routine, specialists handle complexity, and experts handle exceptions"
    weight: 0.25
    description: "Appropriate tier segmentation"
  - type: llm_judge
    criteria: "The seller support program recognizes marketplace duality — sellers need different support than buyers, with specific programs for onboarding, growth, and compliance"
    weight: 0.25
    description: "Marketplace duality recognition"
  - type: llm_judge
    criteria: "Dispute resolution is fair to both sides — buyer protection and seller protection are balanced, with clear criteria for when the marketplace intervenes"
    weight: 0.25
    description: "Balanced dispute resolution"
  - type: llm_judge
    criteria: "Performance measurement tracks ecosystem health — it measures each tier's effectiveness and how well they work together, not just individual metrics"
    weight: 0.25
    description: "Ecosystem health measurement"
