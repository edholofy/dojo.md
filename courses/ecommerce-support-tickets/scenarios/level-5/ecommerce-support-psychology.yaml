meta:
  id: ecommerce-support-psychology
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Apply behavioral psychology to e-commerce support — understand customer decision-making, reduce cognitive friction, and design psychologically informed support experiences"
  tags: [support, ecommerce, psychology, behavioral, customer-behavior, mastery]

state: {}

trigger: |
  E-commerce support operates at the intersection of customer
  emotion and purchase behavior. Understanding cognitive biases,
  emotional triggers, and decision-making psychology transforms
  support from problem-solving to experience design.

  Part 1: Psychology of e-commerce customers
  1. Loss aversion in returns and refunds
  2. The endowment effect and product attachment
  3. Cognitive dissonance after purchase (buyer's remorse)
  4. Social proof and its impact on support interactions
  5. The peak-end rule in customer experience

  Part 2: Apply psychological principles
  For "GourmetBox" — a specialty food subscription e-commerce
  company ($12M revenue, 45K subscribers):

  1. Rewrite these support responses using behavioral psychology:

     Scenario A — Cancellation request:
     Current response: "Sorry to hear you want to cancel. I've
     processed your cancellation. You'll receive a confirmation
     email shortly."
     Task: Rewrite using loss aversion, endowment effect, and
     social proof to ethically retain the customer without being
     manipulative. Show what they'll lose, remind them of value
     received, and share what other customers in their situation
     chose to do.

     Scenario B — Complaint about product quality:
     Current: "We apologize for the quality issue. We'll send a
     replacement."
     Task: Rewrite using the service recovery paradox — the goal
     is to make the customer MORE loyal after the complaint than
     before. Design the recovery experience (acknowledgment,
     explanation, compensation, follow-up).

     Scenario C — Price comparison complaint:
     Current: "Our prices reflect premium sourcing and quality.
     We appreciate your business."
     Task: Rewrite using anchoring, framing, and value perception.
     Help the customer see the value proposition without dismissing
     their concern about price.

  2. Design psychologically optimized support flows:
     - First contact: reduce anxiety, build trust, set expectations
     - Wait time: manage perception (progress indicators, updates)
     - Resolution: create closure and positive final impression
     - Follow-up: reinforce positive outcome, encourage advocacy
     Apply the peak-end rule to each flow.

  3. Create an emotional intelligence framework for agents:
     - Identifying customer emotional states from text cues
     - Matching communication style to emotional state
     - De-escalation techniques grounded in psychology
     - Building rapport in text-based communication
     - Managing agent emotional labor and preventing burnout

  Part 3: Advanced applications
  1. Nudge theory in self-service design
  2. Choice architecture in support options
  3. Ethical boundaries of psychological techniques in support
  4. Measuring psychological impact on customer behavior

assertions:
  - type: llm_judge
    criteria: "The cancellation rewrite uses loss aversion ethically — it highlights what the customer will miss without being manipulative or creating false urgency"
    weight: 0.30
    description: "Ethical loss aversion application"
  - type: llm_judge
    criteria: "The service recovery response creates a 'wow' moment — it goes beyond simple replacement to create an experience that strengthens loyalty"
    weight: 0.25
    description: "Service recovery paradox application"
  - type: llm_judge
    criteria: "The emotional intelligence framework is practical for text-based support — it provides concrete text cues and response patterns, not just abstract emotional concepts"
    weight: 0.25
    description: "Practical emotional intelligence"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly defined — the response distinguishes between helpful persuasion and manipulation, with clear lines agents should not cross"
    weight: 0.20
    description: "Clear ethical boundaries"
