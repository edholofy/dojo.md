meta:
  id: ecommerce-global-operations
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Design global e-commerce support operations — build a follow-the-sun model, manage cultural differences, ensure compliance across jurisdictions, and deliver consistent quality worldwide"
  tags: [support, ecommerce, global, international, operations, mastery]

state: {}

trigger: |
  Scaling e-commerce support globally introduces complexity that
  domestic operations never face: time zones, languages, cultural
  expectations, legal frameworks, payment methods, and shipping
  logistics all vary by market. The best global operations deliver
  consistent quality while adapting to local expectations.

  Design global support operations for "TechWear" — a performance
  apparel e-commerce brand expanding from US-only to 12 countries:
  - Current: US-based, English only, 30 agents, $40M revenue
  - Expanding to: UK, Germany, France, Japan, Australia, Canada,
    Netherlands, Sweden, Spain, Italy, South Korea, Brazil
  - Target: $120M revenue within 18 months
  - Each market launches with localized website and local shipping

  1. Design the global support model:
     - Follow-the-sun coverage model (which time zones, which hubs)
     - Hub strategy: centralized vs. distributed vs. hybrid
     - Language strategy: native speakers vs. multilingual agents
       vs. translation technology
     - Staffing plan by market (based on projected volume)
     - Escalation paths across time zones and languages
     - Knowledge base localization approach

  2. Cultural adaptation framework:
     - Communication style differences by market (e.g., German
       customers expect precision, Japanese customers expect
       formality, Brazilian customers expect warmth)
     - Return and refund expectations by culture
     - Complaint behavior patterns by market
     - Localized quality standards and CSAT benchmarks
     - Training modules for cultural competency
     - When to standardize vs. when to localize

  3. Multi-jurisdiction compliance:
     - EU consumer protection (14-day cooling-off, GDPR)
     - UK post-Brexit consumer rights
     - Japanese consumer contract law
     - Australian Consumer Law (strong consumer protections)
     - Brazilian Consumer Defense Code (CDC)
     - South Korean e-commerce regulations
     - Create a compliance matrix: requirement × market × action

  4. Global technology architecture:
     - Unified help desk with market-specific configurations
     - Translation and localization tooling
     - Currency and payment method handling across markets
     - Shipping provider integration per market
     - Analytics and reporting across all markets
     - Data residency requirements (EU data stays in EU, etc.)

  5. Global quality and consistency framework:
     - Universal quality standards with local flexibility
     - Cross-market quality auditing program
     - Knowledge sharing between markets
     - Global best practice identification and rollout
     - Quarterly global operations review

assertions:
  - type: llm_judge
    criteria: "The follow-the-sun model provides realistic coverage — hub locations and staffing are based on time zone clustering and projected market volume, not arbitrary choices"
    weight: 0.25
    description: "Realistic follow-the-sun model"
  - type: llm_judge
    criteria: "Cultural adaptation goes beyond language translation — it addresses communication style, complaint behavior, and service expectations with specific examples per market"
    weight: 0.25
    description: "Deep cultural adaptation"
  - type: llm_judge
    criteria: "The compliance matrix correctly identifies key differences — EU cooling-off periods, GDPR, Australian Consumer Law, and Brazilian CDC are accurately applied"
    weight: 0.25
    description: "Accurate multi-jurisdiction compliance"
  - type: llm_judge
    criteria: "The quality framework balances consistency with local adaptation — it defines what must be universal vs. what can be localized"
    weight: 0.25
    description: "Consistent yet adaptable quality"
