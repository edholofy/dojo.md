meta:
  id: ecommerce-support-portfolio
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Create a professional e-commerce support portfolio — document your expertise through case studies, frameworks, playbooks, and measurable outcomes"
  tags: [support, ecommerce, portfolio, case-study, professional, mastery]

state: {}

trigger: |
  A professional portfolio demonstrates mastery through documented
  outcomes, not just experience. E-commerce support leaders need
  to articulate their impact through data, frameworks, and case
  studies that prove they can transform support operations.

  Create a professional portfolio that demonstrates e-commerce
  support mastery:

  1. Case study: Support transformation
     Write a detailed case study for transforming support at a
     fictional e-commerce company "ModernHome" (home decor, $18M
     revenue, 70K customers):
     - Starting state: CSAT 3.2, resolution time 48h, no self-service,
       shared inbox, 60% agent turnover, support cost at 9% of revenue
     - Actions taken over 12 months (tell the story of transformation)
     - Ending state: show the measurable outcomes
     - Lessons learned and what you'd do differently
     Use the STAR format (Situation, Task, Action, Result) with
     specific metrics throughout.

  2. Framework: E-commerce support maturity model
     Design a 5-level maturity model that any e-commerce company
     can use to assess their support operation:
     Level 1 — Reactive: firefighting, no tools, no process
     Level 2 — Organized: help desk, basic processes, metrics
     Level 3 — Proactive: self-service, automation, quality program
     Level 4 — Strategic: data-driven, revenue-contributing, cross-functional
     Level 5 — Transformative: AI-powered, predictive, industry-leading
     For each level: characteristics, capabilities, metrics, and
     what it takes to advance to the next level.

  3. Playbook: Holiday season surge management
     Write a complete playbook that could be handed to any e-commerce
     support leader facing their first holiday season:
     - 90 days out: planning and preparation checklist
     - 60 days out: staffing and training actions
     - 30 days out: technology and automation readiness
     - 7 days out: final preparation and team briefing
     - During peak: daily management rhythm and escalation paths
     - Post-peak: debrief, retention, and improvement planning
     Include specific tools, templates, and decision frameworks.

  4. Thought leadership piece:
     Write a 1000-word article: "Why E-commerce Support Is the
     Most Undervalued Growth Lever" covering:
     - The hidden economics of support (data and examples)
     - How support drives CLV, reduces acquisition costs, and
       prevents revenue leakage
     - What best-in-class looks like vs. the industry average
     - A call to action for e-commerce leaders

assertions:
  - type: llm_judge
    criteria: "The case study tells a compelling transformation story with specific metrics — it shows measurable before/after outcomes, not just vague improvements"
    weight: 0.30
    description: "Metrics-driven case study"
  - type: llm_judge
    criteria: "The maturity model is practical and assessable — any e-commerce company could read it and accurately place themselves on the scale"
    weight: 0.25
    description: "Practical maturity model"
  - type: llm_judge
    criteria: "The holiday playbook is actionable — a first-time support leader could follow it step by step with specific timelines, checklists, and decision frameworks"
    weight: 0.25
    description: "Actionable holiday playbook"
  - type: llm_judge
    criteria: "The thought leadership article makes a data-backed argument — it uses specific economics to prove support's value as a growth lever"
    weight: 0.20
    description: "Data-backed thought leadership"
