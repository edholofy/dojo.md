meta:
  id: ecommerce-support-consultancy
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Act as an e-commerce support consultant — audit an existing operation, identify transformation opportunities, and deliver a strategic roadmap for world-class support"
  tags: [support, ecommerce, consultancy, audit, strategy, mastery]

state: {}

trigger: |
  You've been hired as an external consultant by "NestHome" — a
  home furnishings e-commerce company ($50M revenue, 200K customers)
  that wants to transform its support operation from cost center to
  competitive advantage.

  Current state assessment data:
  - CSAT: 3.5/5.0 (industry average: 4.1)
  - NPS: 12 (industry average: 32)
  - First response time: 18 hours (target: 4 hours)
  - Resolution time: 72 hours (target: 24 hours)
  - First contact resolution: 38% (industry average: 68%)
  - Agent attrition: 55% annual (industry average: 30%)
  - Cost per ticket: $28 (industry average: $15)
  - Support team: 40 agents, 3 team leads, 1 manager
  - Channels: email only (no chat, no phone, no social)
  - Tools: shared Gmail inbox + spreadsheet tracker
  - No knowledge base, no automation, no self-service
  - Product return rate: 32% (industry average: 20%)
  - WISMO tickets: 48% of all volume
  - Agent training: 2-day orientation, no ongoing training
  - No quality assurance program

  Deliverables:

  1. Executive audit report:
     - Current state diagnosis with root cause analysis
     - Benchmarking against industry standards
     - Quantified cost of poor support (lost revenue, returns,
       churn, agent replacement costs)
     - Quick wins (30-day impact) vs. strategic initiatives (6-12mo)

  2. 12-month transformation roadmap:
     Phase 1 (months 1-3): Foundation — help desk, channels, basics
     Phase 2 (months 4-6): Optimization — automation, self-service
     Phase 3 (months 7-9): Excellence — proactive, personalized
     Phase 4 (months 10-12): Innovation — AI, predictive, advocacy
     For each phase: initiatives, investment, expected ROI, risks

  3. Technology recommendation:
     - Help desk platform selection with justification
     - Integration architecture with existing e-commerce stack
     - Automation and AI tool recommendations
     - Implementation timeline and resource requirements

  4. People transformation plan:
     - Organizational structure redesign
     - Compensation and career path overhaul
     - Training curriculum (onboarding + ongoing)
     - Performance management framework
     - Culture change management approach

  5. Business case presentation:
     - Total investment required over 12 months
     - Expected ROI timeline (break-even point)
     - Risk mitigation strategies
     - Success metrics and governance framework
     - Board-ready executive summary

assertions:
  - type: llm_judge
    criteria: "The audit correctly quantifies the cost of poor support — agent replacement costs, lost revenue from churn, unnecessary returns, and operational inefficiency are calculated"
    weight: 0.25
    description: "Quantified cost of poor support"
  - type: llm_judge
    criteria: "The roadmap is phased realistically — it doesn't try to fix everything at once, and each phase builds on the previous one's foundation"
    weight: 0.25
    description: "Realistically phased roadmap"
  - type: llm_judge
    criteria: "The people plan addresses the 55% attrition root cause — it goes beyond compensation to include career paths, training, culture, and working conditions"
    weight: 0.25
    description: "Attrition root cause addressed"
  - type: llm_judge
    criteria: "The business case is board-ready — it presents investment, ROI timeline, and risk mitigation in a format executives can approve"
    weight: 0.25
    description: "Board-ready business case"
