meta:
  id: ecommerce-support-mastery-challenge
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Demonstrate mastery across all e-commerce support disciplines — handle interconnected challenges spanning operations, technology, people, strategy, and customer experience"
  tags: [support, ecommerce, mastery, comprehensive, challenge, mastery]

state: {}

trigger: |
  This mastery challenge tests your ability to connect all aspects
  of e-commerce support leadership. Each section builds on previous
  knowledge and requires synthesis across multiple domains.

  Scenario: You are the newly appointed VP of Customer Experience
  at "FreshStyle" — a fast-growing fashion e-commerce brand that
  just raised Series B ($25M). Revenue: $30M, growing 80% YoY.
  Customer base: 150K. Support team: 18 agents.

  Challenge 1 — Operational audit (30 minutes):
  Analyze these metrics and identify the 3 most critical issues:
  - Ticket volume growing 120% YoY (faster than revenue)
  - CSAT declining: Q1 4.2, Q2 4.0, Q3 3.7, Q4 3.4
  - FCR: 42% (fashion industry benchmark: 65%)
  - Returns: 35% (industry: 25%), 60% cite "not as expected"
  - Agent tenure: average 7 months, 3 agents quit last month
  - Chat conversion: 8% (was 15% when team was smaller)
  - VIP customers (top 5% by spend) receive same service as all
  - No size guide, no virtual try-on, no styling support

  Challenge 2 — Strategic plan (45 minutes):
  Create a 90-day plan that addresses the 3 critical issues while
  supporting 80% revenue growth. Include:
  - Immediate stabilization actions (week 1-2)
  - Quick wins that show measurable improvement (week 3-6)
  - Structural changes for sustainable improvement (week 7-12)
  - Resource requirements and budget justification
  - How you'll measure success at 30/60/90 days

  Challenge 3 — Board presentation (30 minutes):
  The board wants to understand why support costs are rising faster
  than revenue and what your plan is. Create a board presentation:
  - Current state (data-driven, 2 slides)
  - Root cause analysis (1 slide)
  - Strategic plan summary (2 slides)
  - Investment request and expected ROI (1 slide)
  - Risk factors and mitigation (1 slide)

  Challenge 4 — Crisis response (20 minutes):
  During your 90-day plan execution, a crisis hits: a viral TikTok
  video shows a customer's FreshStyle dress falling apart at a
  wedding. 50K views in 2 hours, negative comments flooding in,
  50 cancellation requests, press inquiries starting.
  Write the complete crisis response covering: social media, PR,
  affected customer, broader customer base, and internal team.

  Challenge 5 — Innovation proposal (25 minutes):
  The CEO asks: "What should FreshStyle support look like in 2
  years?" Write a vision document that includes:
  - AI-powered personal styling support
  - Virtual try-on integration with support
  - Predictive support (reaching out before problems occur)
  - Community-driven support and peer recommendations
  - Support as a revenue driver (not cost center)

assertions:
  - type: llm_judge
    criteria: "The operational audit correctly identifies that ticket volume growing faster than revenue, declining CSAT, and high returns from 'not as expected' are interconnected problems rooted in pre-sale experience gaps"
    weight: 0.30
    description: "Interconnected root cause identification"
  - type: llm_judge
    criteria: "The 90-day plan balances immediate stabilization with structural change — it doesn't sacrifice long-term improvement for short-term metrics"
    weight: 0.25
    description: "Balanced short and long-term planning"
  - type: llm_judge
    criteria: "The crisis response handles all stakeholders simultaneously — the viral TikTok customer, social media audience, press, existing customers, and internal team all get appropriate responses"
    weight: 0.25
    description: "Multi-stakeholder crisis response"
  - type: llm_judge
    criteria: "The innovation vision is ambitious but grounded — AI styling and predictive support are connected to current pain points, not just technology for technology's sake"
    weight: 0.20
    description: "Grounded innovation vision"
