meta:
  id: ecommerce-support-roi
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Build the ROI case for e-commerce support investment — quantify support's impact on revenue, retention, lifetime value, and brand equity"
  tags: [support, ecommerce, roi, business-case, revenue-impact, mastery]

state: {}

trigger: |
  E-commerce leaders often struggle to justify support investment
  because they measure costs (headcount, tools) but not value
  (retained revenue, increased CLV, reduced returns). Building a
  rigorous ROI framework transforms the budget conversation from
  "how do we reduce support costs?" to "how do we maximize support
  ROI?"

  Part 1: Build the ROI framework
  For "UrbanPet" — a pet supplies e-commerce company
  ($25M revenue, 90K customers, 20-agent support team):

  Current financial data:
  - Annual support cost: $1.8M (7.2% of revenue)
  - Average order value: $65
  - Customer lifetime value: $420 (3.2 year avg. lifespan)
  - Customer acquisition cost: $45
  - Annual churn rate: 28%
  - Churn rate after negative support: 65%
  - Churn rate after positive support: 12%
  - Repeat purchase rate after great support: 78%
  - Repeat purchase rate after poor support: 22%
  - Support-influenced revenue (upsell/cross-sell): $180K/year
  - Return rate: 18% overall, 11% after support intervention
  - Average return cost: $22 (shipping + processing + restock)
  - Word-of-mouth referrals from support promoters: est. 800/year

  1. Calculate the full economic value of support:
     - Revenue retained: customers saved from churning × CLV
     - Revenue generated: support-influenced sales + referrals
     - Costs avoided: returns prevented + escalations avoided
     - Brand value: NPS improvement → acquisition cost reduction
     Show the math for each component with conservative, moderate,
     and optimistic scenarios.

  2. Build the investment business case:
     Proposed investments:
     a) Upgrade help desk platform ($48K/year)
     b) Add 5 agents for chat coverage ($250K/year)
     c) Implement AI automation ($36K/year)
     d) Launch VIP support program ($60K/year)
     e) Agent training program ($30K/year)
     Total: $424K additional annual investment

     For each investment:
     - Direct ROI calculation (investment → return)
     - Payback period
     - Risk-adjusted expected value
     - Leading indicators to track

  3. Create the CFO-ready presentation:
     - Executive summary (1 paragraph)
     - Current state: support as cost center (with data)
     - Future state: support as profit center (with projections)
     - Investment ask with detailed ROI breakdown
     - Implementation timeline and milestone-based funding
     - Risk factors and sensitivity analysis

  Part 2: Ongoing ROI measurement
  1. Monthly ROI tracking dashboard
  2. Attribution methodology (how to credit support for outcomes)
  3. A/B testing support investments
  4. Communicating ROI to stakeholders

assertions:
  - type: llm_judge
    criteria: "The economic value calculation is rigorous — it shows specific math for retained revenue, generated revenue, avoided costs, and brand value with the provided data"
    weight: 0.30
    description: "Rigorous economic calculation"
  - type: llm_judge
    criteria: "The business case includes risk-adjusted returns — it doesn't just present optimistic projections but shows conservative, moderate, and optimistic scenarios"
    weight: 0.25
    description: "Risk-adjusted projections"
  - type: llm_judge
    criteria: "The CFO presentation reframes support from cost center to profit center — it presents data that changes the narrative about support spending"
    weight: 0.25
    description: "Cost-to-profit narrative shift"
  - type: llm_judge
    criteria: "Attribution methodology is practical — it provides a realistic way to credit support for revenue outcomes without over-claiming"
    weight: 0.20
    description: "Practical attribution methodology"
