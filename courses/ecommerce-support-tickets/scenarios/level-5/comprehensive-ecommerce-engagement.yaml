meta:
  id: comprehensive-ecommerce-engagement
  level: 5
  course: ecommerce-support-tickets
  type: output
  description: "Complete a comprehensive e-commerce support engagement — from discovery through strategy, implementation planning, and executive presentation for a complex multi-brand operation"
  tags: [support, ecommerce, comprehensive, engagement, multi-brand, mastery]

state: {}

trigger: |
  This is the capstone scenario. You are leading a comprehensive
  support transformation engagement for "OmniRetail Group" — a
  holding company that owns 4 e-commerce brands:

  Brand A: "PetPlanet" — pet supplies, $30M revenue, 120K customers
  Brand B: "FitGear" — fitness equipment, $22M revenue, 80K customers
  Brand C: "KidsBright" — children's education toys, $15M revenue, 55K customers
  Brand D: "GardenPro" — gardening supplies, $18M revenue, 65K customers

  Combined: $85M revenue, 320K total customers (40K overlap)
  Current: each brand has independent support (separate tools,
  separate teams, separate processes). Total: 65 agents across brands.

  The CEO wants to determine: should support be consolidated into
  a shared service, kept separate, or use a hybrid model?

  Phase 1 — Discovery (analyze each brand):
  For each brand, assess:
  - Unique support challenges (pet food safety vs. fitness
    equipment assembly vs. child safety vs. seasonal gardening)
  - Current performance metrics (provide realistic estimates)
  - Customer expectations specific to each vertical
  - Synergies with other brands in the portfolio
  - Risks of changing the current model

  Phase 2 — Options analysis:
  Model A: Full consolidation (one team, one tool, one process)
  Model B: Independent (status quo with improvements)
  Model C: Hybrid (shared platform + specialized pods per brand)
  For each model: benefits, risks, estimated costs, implementation
  complexity, impact on customer experience, impact on agents.
  Provide a weighted decision matrix.

  Phase 3 — Recommended strategy:
  Based on your analysis, recommend the optimal model with:
  - Detailed implementation plan (phases, timeline, milestones)
  - Technology architecture (shared vs. brand-specific)
  - Organizational structure and transition plan
  - Cost model (current state vs. future state)
  - Risk mitigation for the transition period
  - Success metrics at 6, 12, and 18 months

  Phase 4 — Executive presentation:
  Create a 10-slide board presentation:
  1. Executive summary
  2. Current state across all 4 brands
  3. The problem: fragmentation costs and missed synergies
  4. Options considered
  5-6. Recommended approach (2 slides)
  7. Implementation timeline
  8. Investment and ROI
  9. Risks and mitigation
  10. Decision request and next steps

  Phase 5 — Change management:
  - Communication plan for 65 agents across 4 brands
  - Manager alignment and champion identification
  - Training and transition support
  - Customer communication (if any brand experience changes)
  - 90-day stabilization plan post-transition

assertions:
  - type: llm_judge
    criteria: "The discovery phase recognizes brand-specific support needs — pet food safety, equipment assembly, child safety, and seasonal gardening each create unique requirements"
    weight: 0.25
    description: "Brand-specific needs recognition"
  - type: llm_judge
    criteria: "The options analysis is balanced — each model's pros, cons, and risks are fairly evaluated, not biased toward one predetermined answer"
    weight: 0.25
    description: "Balanced options analysis"
  - type: llm_judge
    criteria: "The recommended strategy includes a realistic cost model — current vs. future costs are estimated with enough detail to make a financial decision"
    weight: 0.25
    description: "Realistic cost modeling"
  - type: llm_judge
    criteria: "Change management addresses agent impact — the plan for transitioning 65 agents across 4 brands includes communication, training, and stabilization"
    weight: 0.25
    description: "Agent-focused change management"
