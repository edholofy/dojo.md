meta:
  id: ecommerce-tools-platforms
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Understand e-commerce support tools — learn the major help desk platforms, order management systems, and support automation tools for online retail"
  tags: [support, ecommerce, tools, platforms, gorgias, helpdesk, beginner]

state: {}

trigger: |
  E-commerce support tools are specialized for retail workflows.
  Unlike general help desk platforms, they integrate directly
  with storefronts, order systems, and shipping carriers —
  giving agents full context without switching between systems.

  Part 1: E-commerce support tool landscape
  1. E-commerce-specific help desks:
     - Gorgias: Deep Shopify integration, ticket-based pricing,
       order actions from inbox, revenue tracking
     - Re:amaze: Unified inbox, conversation-based pricing,
       chatbot + human handoff, multi-brand support
     - Richpanel: Self-service customer portals, order tracking,
       self-service returns, multi-brand (up to 5 stores)
     - Tidio: Superior chatbot capabilities, conversation-based
       pricing, automation-first approach
  2. General help desks used in e-commerce:
     - Zendesk: Enterprise-grade, Shopify app available
     - Freshdesk: Feature-rich, good e-commerce integrations
     - Help Scout: Simple, email-focused
  3. Supporting tools:
     - Order management: Shopify, WooCommerce, BigCommerce admin
     - Shipping: ShipStation, ShipBob, Shippo
     - Returns: Returnly, Loop Returns, Happy Returns
     - Reviews: Yotpo, Judge.me, Stamped.io
     - Chat: LiveChat, Olark, Intercom
  4. Key integrations:
     - Storefront ↔ Help desk (order context in every ticket)
     - Shipping carrier ↔ Help desk (tracking from inbox)
     - Payment processor ↔ Help desk (refund from inbox)
     - Returns platform ↔ Help desk (return status visibility)

  Part 2: Evaluate and configure tools
  For "ArtisanGoods" — a handmade goods e-commerce store launching
  on Shopify (500 orders/month, 2 support agents, email + chat):

  1. Compare 3 platforms for ArtisanGoods:
     - Gorgias vs. Re:amaze vs. Richpanel
     - Evaluation criteria: price, Shopify integration,
       automation capabilities, ease of use, scalability
     - Weighted scoring matrix
     - Recommendation with rationale

  2. Design the support workflow in the recommended tool:
     - Ticket routing (by channel, by topic, by priority)
     - Auto-tagging rules (order status, return, product question)
     - Canned responses (10 most common replies)
     - Macros for common actions (refund, reorder, return label)
     - SLA configuration

  3. Create the automation setup:
     - Auto-reply for WISMO tickets (pull tracking automatically)
     - Chatbot for business hours and after hours
     - Auto-close resolved tickets after 48 hours
     - Priority escalation for VIP customers
     - Weekend/holiday auto-response

  4. Design the reporting dashboard:
     - Daily metrics: ticket volume, response time, resolution rate
     - Weekly metrics: CSAT, top categories, agent performance
     - Monthly metrics: trends, revenue influenced, deflection rate
     - Custom reports for the store owner

  Part 3: Tool optimization
  1. When to upgrade your tool (volume thresholds)
  2. Building vs. buying support automation
  3. Measuring tool ROI (cost per ticket, time saved)
  4. Future-proofing your support stack

assertions:
  - type: llm_judge
    criteria: "The platform comparison provides genuine decision guidance — weighted scoring reflects real priorities for a small Shopify store"
    weight: 0.30
    description: "Genuine platform comparison"
  - type: llm_judge
    criteria: "Canned responses are complete and professional — all 10 are ready to use with appropriate personalization placeholders"
    weight: 0.25
    description: "Complete usable canned responses"
  - type: llm_judge
    criteria: "Automation setup is practical for a 2-person team — it reduces workload without over-engineering for the current scale"
    weight: 0.25
    description: "Right-sized automation"
  - type: llm_judge
    criteria: "The reporting dashboard provides actionable insights for a store owner — metrics that matter for business decisions, not just operational stats"
    weight: 0.20
    description: "Business-relevant reporting"
