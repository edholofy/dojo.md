meta:
  id: first-ecommerce-shift
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Complete your first e-commerce support shift — handle a realistic queue mixing WISMO, returns, product questions, and delivery issues in a simulated work session"
  tags: [support, ecommerce, first-shift, capstone, simulation, beginner]

state: {}

trigger: |
  Bringing it all together — handle a realistic e-commerce
  support queue that combines order tracking, returns, product
  questions, shipping issues, and brand communication in a
  simulated support shift.

  You're a new support agent at "NaturalGlow" — a natural skincare
  e-commerce brand (Free shipping over $50, 30-day returns,
  cruelty-free, vegan). Brand voice: warm, knowledgeable,
  earth-conscious.

  Your shift starts with 8 tickets in the queue:

  Ticket 1 (received 5 min ago):
  Subject: "ORDER NEVER ARRIVED - NEED ASAP"
  "I ordered your Vitamin C serum for my sister's birthday
  TOMORROW and tracking says it's stuck in a sorting facility
  for 3 days! I paid for express shipping! Please help!"
  Customer: 3rd order, $67 purchase, Express shipping
  Order #NG-8891

  Ticket 2 (received 20 min ago):
  Subject: "Return request - allergic reaction"
  "I used the new rose face cream and broke out in a rash.
  I want a full refund. Should I see a doctor? This has never
  happened with your products before."
  Customer: Loyal customer, 12 orders over 2 years
  Order #NG-8845

  Ticket 3 (received 1 hour ago):
  Subject: "Which moisturizer for dry sensitive skin?"
  "I have very dry, sensitive skin (eczema-prone). Which of
  your moisturizers would you recommend? I'm worried about
  reactions since I react to most products."
  Customer: New customer, no previous orders

  Ticket 4 (received 1.5 hours ago):
  Subject: "Wrong shade of foundation"
  "I ordered 'Honey Beige' but received 'Warm Sand.' They
  look completely different. I need the right shade for an
  event next week."
  Customer: 2nd order, $42 purchase
  Order #NG-8867

  Ticket 5 (received 2 hours ago):
  Subject: "Discount code not working"
  "The GLOW20 code from your Instagram post isn't working.
  It says expired but the post was yesterday!"
  Customer: New customer, $89 cart ready to checkout

  Ticket 6 (received 2.5 hours ago):
  Subject: "Subscription question"
  "Can I change my subscription from monthly to every 6 weeks?
  I'm not using the cleanser fast enough and have 3 bottles
  piling up."
  Customer: Subscription customer, 8 months

  Ticket 7 (received 3 hours ago):
  Subject: "Are your products really cruelty-free?"
  "I saw online that your supplier tests on animals. Is this
  true? I only buy cruelty-free and I'm about to place a big
  order for my spa."
  Customer: Potential B2B customer, spa owner

  Ticket 8 (received 4 hours ago):
  Subject: "Love your products!!!"
  "Just wanted to say your retinol night cream changed my skin!
  Been using it 3 months and my skin has never looked better.
  You should raise the price honestly lol. Any rewards program?"
  Customer: 6 orders, enthusiastic fan

  For each ticket:
  1. Assign priority and order of response
  2. Write the complete customer response (in NaturalGlow brand voice)
  3. Note any internal actions needed

  After handling all 8, reflect on:
  - Priority decisions and why
  - Revenue opportunities in the queue
  - Knowledge base articles that would help

assertions:
  - type: llm_judge
    criteria: "Tickets are prioritized correctly — the time-sensitive birthday gift and allergic reaction are handled first, the positive review can wait"
    weight: 0.30
    description: "Correct priority ordering"
  - type: llm_judge
    criteria: "All 8 responses use the NaturalGlow brand voice consistently — warm, knowledgeable, earth-conscious language throughout"
    weight: 0.25
    description: "Consistent brand voice"
  - type: llm_judge
    criteria: "The allergic reaction response includes appropriate health concern — it suggests consulting a doctor and handles the safety aspect seriously"
    weight: 0.25
    description: "Appropriate health response"
  - type: llm_judge
    criteria: "Revenue opportunities are identified — the discount code ticket, the B2B spa inquiry, and the positive review are flagged as conversion/expansion opportunities"
    weight: 0.20
    description: "Revenue opportunity identification"
