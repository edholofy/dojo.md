meta:
  id: product-inquiries
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Answer product inquiries — help customers choose the right product with sizing, compatibility, availability, and recommendation guidance"
  tags: [support, ecommerce, product-questions, pre-sale, recommendations, beginner]

state: {}

trigger: |
  Pre-sale product inquiries are revenue opportunities disguised
  as support tickets. A helpful, knowledgeable response can
  convert a browser into a buyer, increase order value through
  recommendations, and reduce returns by ensuring the right
  purchase. These are not "just questions" — they're sales
  conversations.

  Part 1: Product inquiry types
  1. Sizing and fit:
     - "Will this fit me?" (size charts, fit descriptions)
     - "How does this compare to [competitor brand] sizing?"
     - "What size should I order between two sizes?"
  2. Product details:
     - Material, dimensions, weight, color accuracy
     - Care instructions, durability expectations
     - Compatibility (electronics, accessories, parts)
  3. Availability:
     - Restock dates for out-of-stock items
     - Size/color availability
     - Pre-order information
     - Store vs. warehouse availability
  4. Recommendations:
     - "Which one should I get?" (comparison help)
     - "What goes well with this?" (cross-sell opportunity)
     - "Is this good for [specific use case]?"
  5. Product comparison:
     - Feature differences between similar products
     - Value comparison (price vs. features)
     - Upgrade recommendations

  Part 2: Answer product inquiry scenarios
  For "FitGear" — an online fitness equipment store:

  Write responses for 6 product inquiries:

  1. Sizing question:
     "I want to buy the resistance band set but I'm a beginner.
     Which resistance level should I start with? I'm 5'4" and
     mostly want to do arm exercises."
     - Recommend the right level with reasoning
     - Suggest starting point with room to progress
     - Build purchasing confidence

  2. Compatibility question:
     "Will the handlebar attachment (SKU: FG-HB200) fit my
     existing home gym cable machine? It's a different brand
     (PowerMax 3000)."
     - Research compatibility honestly
     - If unsure, say so and offer to find out
     - Suggest verified compatible options if it won't fit

  3. Out-of-stock inquiry:
     "The 25lb hex dumbbells are out of stock. When will they
     be back? I need a pair for my home gym setup."
     - Provide restock information if available
     - Offer alternatives (similar products, waitlist)
     - Capture their interest (back-in-stock notification)

  4. Product comparison:
     "I'm choosing between the FitGear Spin Bike ($399) and the
     FitGear Pro Bike ($599). What's the difference? Is the Pro
     worth the extra $200?"
     - Provide honest comparison
     - Help them decide based on THEIR needs (not just upsell)
     - Include specific feature differences

  5. Gift recommendation:
     "I want to buy a fitness gift for my husband. He's into
     weightlifting and has a home gym. Budget around $100-$150.
     Any suggestions?"
     - Make personalized recommendations
     - Consider the gift context (something he wouldn't buy himself?)
     - Offer gift wrapping or gift receipt

  6. Product quality concern:
     "I read some reviews saying the yoga mat starts peeling after
     a few months. Is this a known issue? I don't want to waste
     $49 on something that won't last."
     - Address the concern honestly
     - Share product quality information (materials, warranty)
     - If it IS a known issue, don't deny it

  Part 3: Turning inquiries into conversions
  1. Closing techniques for support (not salesy, genuinely helpful)
  2. Cross-sell and upsell in support (recommendations, bundles)
  3. Reducing abandonment through pre-sale support
  4. Product knowledge training for support agents

assertions:
  - type: llm_judge
    criteria: "All 6 responses help the customer make a confident purchase decision — each answer provides enough information to buy (or not buy) with confidence"
    weight: 0.30
    description: "Confidence-building product help"
  - type: llm_judge
    criteria: "The product comparison is honest — it recommends based on the customer's needs, not just pushing the more expensive option"
    weight: 0.25
    description: "Honest product comparison"
  - type: llm_judge
    criteria: "The quality concern response is transparent — it addresses the review feedback honestly rather than dismissing it"
    weight: 0.25
    description: "Transparent quality response"
  - type: llm_judge
    criteria: "Recommendations are personalized — the gift suggestion and sizing advice are tailored to the specific customer's needs"
    weight: 0.20
    description: "Personalized recommendations"
