meta:
  id: ecommerce-communication-tone
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Master e-commerce support communication — write responses that match your brand voice, handle emotions, and create positive shopping experiences"
  tags: [support, ecommerce, communication, tone, brand-voice, beginner]

state: {}

trigger: |
  E-commerce support tone is different from corporate support.
  It's more personal, more casual (usually), and more brand-driven.
  Your support voice IS your brand voice — customers can't tell
  the difference. Every email, chat, and social reply either
  strengthens or weakens the brand.

  Part 1: E-commerce tone principles
  1. Brand voice in support:
     - Luxury brands: formal, refined, attentive
     - Casual/fun brands: friendly, playful, relatable
     - Technical/gear brands: knowledgeable, enthusiastic, precise
     - Sustainable brands: caring, educational, values-driven
     - The brand voice guide should be your support bible
  2. Tone vs. voice:
     - Voice is consistent (who you are)
     - Tone changes with context (how you respond to situations)
     - Happy customer: celebratory, enthusiastic
     - Frustrated customer: empathetic, solution-focused
     - Confused customer: patient, clear, encouraging
  3. E-commerce communication traps:
     - Sounding robotic ("Your request has been processed")
     - Over-apologizing ("I'm SO sorry! I'm really sorry!")
     - Being too casual for the situation (damage/loss needs gravity)
     - Corporate speak when the brand is casual
     - Mixing up customer names or order details

  Part 2: Write brand-appropriate responses
  Write the SAME support scenario (a delayed order) in 4 different
  brand voices:

  Scenario: Customer ordered a product 8 days ago, expected delivery
  was 5-7 days. Tracking shows it's still in transit. Customer
  writes: "Where's my order? It's late."

  1. Luxury fashion brand ("Maison Élégance"):
     - Formal, refined, personalized
     - "Dear [Name]" not "Hey there!"
     - Express genuine concern for the inconvenience
     - Offer premium resolution

  2. Fun, quirky pet brand ("WoofWoof Supply"):
     - Casual, playful, on-brand humor
     - "Hey [Name]!" with personality
     - Light touch while still being helpful
     - Include a pet-related quip or emoji

  3. Premium outdoor gear brand ("Summit Gear Co"):
     - Knowledgeable, adventure-spirited, reliable
     - Direct and efficient (adventure people are doers)
     - Convey competence and reliability
     - Offer proactive options

  4. Sustainable home goods brand ("EarthNest"):
     - Warm, caring, values-conscious
     - Community-oriented language
     - Reference sustainability where natural
     - Genuine and thoughtful

  Then write 4 additional scenarios across any brand voice:

  5. Handling an angry customer (the brand stays professional)
  6. Upselling naturally in a support response
  7. Responding to a compliment/positive feedback
  8. Breaking bad news (out of stock, discontinued item)

  Part 3: Developing your brand voice
  1. Creating a support voice guide
  2. Training agents on brand consistency
  3. QA for brand voice compliance
  4. Evolving the voice as the brand grows

assertions:
  - type: llm_judge
    criteria: "The 4 brand voices are distinctly different — each response is clearly from a different brand with unique personality, not just minor wording changes"
    weight: 0.30
    description: "Distinctly different brand voices"
  - type: llm_judge
    criteria: "All responses maintain professionalism despite different tones — the fun brand is still helpful, the luxury brand still addresses the issue"
    weight: 0.25
    description: "Professional despite tone variation"
  - type: llm_judge
    criteria: "The angry customer response stays in brand voice — the brand personality doesn't disappear when handling a complaint"
    weight: 0.25
    description: "Brand voice maintained under pressure"
  - type: llm_judge
    criteria: "The bad news response is delivered with care — the out-of-stock communication manages disappointment while offering alternatives"
    weight: 0.20
    description: "Careful bad news delivery"
