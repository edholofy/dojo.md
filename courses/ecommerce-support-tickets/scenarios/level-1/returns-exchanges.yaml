meta:
  id: returns-exchanges
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Process returns and exchanges — handle return requests, explain policies, generate return labels, and turn returns into exchanges or store credit"
  tags: [support, ecommerce, returns, exchanges, refunds, beginner]

state: {}

trigger: |
  Returns are not failures — they're opportunities to build
  loyalty. 92% of customers will buy again if the return process
  is easy. A bad return experience is the fastest way to lose
  a customer forever. Handling returns well is essential to
  e-commerce success.

  Part 1: Returns and exchanges fundamentals
  1. Return policy basics:
     - Return window (14, 30, 60, 90 days — industry varies)
     - Condition requirements (tags attached, unworn, original packaging)
     - Return shipping (free, customer pays, conditional)
     - Refund method (original payment, store credit, exchange)
     - Processing time (3-5 business days after receipt)
  2. Types of returns:
     - Size/fit issue (most common in fashion — 52% of returns)
     - Changed mind / didn't like it
     - Defective/damaged product
     - Wrong item received
     - Late delivery (no longer needed)
     - Gift return
  3. Return alternatives:
     - Exchange for different size/color (keep the sale!)
     - Store credit (keep the revenue)
     - Partial refund (keep and get discount)
     - Bundle offer (add items instead of returning)

  Part 2: Handle return and exchange scenarios
  For "HomeNest" — an online home decor store
  (30-day returns, free return shipping over $50, 10% restocking
  fee on furniture, exchanges free):

  Write responses for 6 return scenarios:

  1. Simple size exchange:
     "The throw pillows I ordered are too small for my couch.
     Can I exchange for the larger size? Order #HN-7823"
     - Process the exchange
     - Make it seamless (ship new before receiving return if possible)

  2. Return outside window:
     "I want to return a lamp I bought 45 days ago. I just moved
     and it doesn't match my new apartment. Order #HN-7501"
     - Policy says 30 days — how do you handle this?
     - Balance policy enforcement with customer goodwill

  3. Defective product:
     "The ceramic vase arrived with a crack in the bottom. It must
     have been damaged in shipping. I really wanted this vase."
     Order #HN-7912
     - Handle the defect (this isn't a standard return)
     - Offer replacement without requiring return of damaged item
     - Address the emotional disappointment

  4. Gift return (no receipt):
     "I received a blanket as a gift from your store but it's not
     my style. I don't have the order number or receipt. Can I
     return or exchange it?"
     - Handle gift returns gracefully
     - Verify the product is from your store
     - Offer store credit (standard for gift returns)

  5. Buyer's remorse with restocking fee:
     "I want to return the bookshelf (Order #HN-7650, $289).
     It's fine but I found one I like better at another store.
     Wait — there's a restocking fee?!"
     - Explain the furniture restocking fee transparently
     - Offer alternatives (exchange, discount on something else)

  6. Multiple items, partial return:
     "I ordered 5 items but want to return 3 of them. I love the
     rug and candle set but the curtains don't match. Order #HN-7799"
     - Process partial return efficiently
     - Confirm which items they're keeping
     - Provide clear return instructions for the 3 items

  Part 3: Optimizing returns
  1. Reducing return rates (better product info, size guides, reviews)
  2. Converting returns to exchanges (saving the sale)
  3. Tracking return reasons (product improvement data)
  4. The economics of free returns vs. paid returns

assertions:
  - type: llm_judge
    criteria: "All 6 responses make the return process feel easy — the customer knows exactly what to do next with clear step-by-step instructions"
    weight: 0.30
    description: "Easy clear return process"
  - type: llm_judge
    criteria: "The outside-window return is handled with flexibility — rigid policy enforcement is balanced with customer retention thinking"
    weight: 0.25
    description: "Flexible policy application"
  - type: llm_judge
    criteria: "The defective product response treats the customer as a victim of the problem — it doesn't follow the standard return process but provides accelerated resolution"
    weight: 0.25
    description: "Defect-appropriate resolution"
  - type: llm_judge
    criteria: "Exchange and store credit are positioned as attractive alternatives — responses genuinely try to keep the revenue while meeting customer needs"
    weight: 0.20
    description: "Revenue-preserving alternatives"
