meta:
  id: payment-billing-issues
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Resolve payment and billing issues — handle failed payments, incorrect charges, refund processing, and gift card problems"
  tags: [support, ecommerce, payment, billing, refunds, beginner]

state: {}

trigger: |
  Payment issues are high-urgency e-commerce tickets because
  they involve customers' money. Fast, accurate resolution is
  essential — and you must handle financial information with
  care and security awareness.

  Part 1: Common payment issues
  1. Payment failures:
     - Declined credit/debit card (insufficient funds, expired,
       fraud block, issuer decline)
     - PayPal/digital wallet errors
     - Buy Now Pay Later (Klarna, Afterpay) issues
     - Currency conversion problems
     - 3D Secure / authentication failures
  2. Billing concerns:
     - Charged wrong amount
     - Double charged
     - Charged but order not confirmed
     - Pending charge for cancelled order
     - Tax calculation questions
  3. Refund processing:
     - Refund timeline (3-10 business days depending on method)
     - Partial refunds (return part of order)
     - Refund to expired card (what happens?)
     - Store credit vs. original payment method
  4. Gift cards and promotions:
     - Gift card balance issues
     - Promotional code problems
     - Loyalty points not applied
     - Bundle pricing confusion

  Part 2: Resolve payment scenarios
  For "TechMart" — an electronics e-commerce store
  (Credit cards, PayPal, Klarna, Apple Pay accepted):

  Write responses for 6 payment scenarios:

  1. Payment declined at checkout:
     "I keep getting 'Payment Declined' when trying to buy a
     laptop ($899). My card works everywhere else! I've tried 3 times."
     - Troubleshoot common causes
     - Suggest alternatives without implying financial problems
     - Help them complete the purchase

  2. Double charge:
     "I was charged TWICE for my order #TM-5521 ($149.99 each).
     Only one order shows in my account. I need the extra charge
     removed immediately!"
     - Investigate (authorization hold vs. actual charge)
     - Explain the difference clearly
     - Process refund if it's a genuine double charge

  3. Refund not received:
     "I returned my headphones 2 weeks ago and tracking shows you
     received them 10 days ago. Where is my refund?! Order #TM-5389"
     - Check refund status in the system
     - Explain processing timeline
     - Escalate if overdue

  4. Gift card not working:
     "I received a $100 TechMart gift card for my birthday but
     when I enter the code, it says 'Invalid gift card.' The card
     is brand new and unopened."
     - Troubleshoot the gift card issue
     - Verify the card hasn't been activated (common issue)
     - Resolve quickly (birthday purchase = emotional)

  5. Klarna installment confusion:
     "I used Klarna for my TV purchase ($599) but I just got
     charged the full amount on my credit card too. So I'm paying
     twice??"
     - Explain how Klarna works with credit cards
     - Investigate any double-charge scenario
     - Provide clear payment breakdown

  6. Tax calculation dispute:
     "Why am I being charged $47 in tax on a $499 order? That's
     almost 10%! I live in Oregon where there's no sales tax."
     - Investigate tax calculation
     - Explain shipping address vs. billing address tax rules
     - Correct if the calculation is wrong

  Part 3: Payment security
  1. PCI compliance basics for support agents
  2. Never asking for full card numbers (what info you CAN request)
  3. Recognizing fraud indicators in payment tickets
  4. Secure handling of financial information

assertions:
  - type: llm_judge
    criteria: "All 6 responses handle financial concerns with appropriate urgency — money issues are treated as high-priority regardless of amount"
    weight: 0.30
    description: "Appropriate financial urgency"
  - type: llm_judge
    criteria: "The double charge response correctly distinguishes between authorization holds and actual charges — it educates without being condescending"
    weight: 0.25
    description: "Correct charge explanation"
  - type: llm_judge
    criteria: "Payment security awareness is demonstrated — no response requests full card numbers or sensitive payment data"
    weight: 0.25
    description: "Payment security awareness"
  - type: llm_judge
    criteria: "The payment declined response helps without embarrassment — it suggests alternatives tactfully without implying the customer has financial problems"
    weight: 0.20
    description: "Tactful decline handling"
