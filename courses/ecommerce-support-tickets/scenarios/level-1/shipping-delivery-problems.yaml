meta:
  id: shipping-delivery-problems
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Handle shipping and delivery problems — resolve lost packages, damaged goods, wrong items, and delivery failures"
  tags: [support, ecommerce, shipping, delivery, lost-packages, beginner]

state: {}

trigger: |
  Shipping problems are emotionally charged because the customer
  has already paid and is waiting for something tangible. Lost,
  damaged, or wrong items feel like broken promises. Fast,
  empathetic resolution is critical — 1.7 million packages
  are lost per quarter globally.

  Part 1: Shipping problem types
  1. Lost packages:
     - Tracking shows delivered but not received
     - Tracking stopped updating (in transit for too long)
     - No tracking information at all
     - Stolen (porch piracy — 58M packages stolen annually)
  2. Damaged goods:
     - Visible damage to packaging and product
     - Product works but cosmetically damaged
     - Concealed damage (discovered after opening)
     - Fragile item broken despite "fragile" label
  3. Wrong item received:
     - Completely wrong product
     - Right product, wrong size/color/variant
     - Missing items from multi-item order
     - Someone else's order delivered to them
  4. Delivery failures:
     - Delivered to wrong address
     - Delivery attempted but customer wasn't home
     - Address undeliverable (apartment access, gated community)
     - International customs hold

  Part 2: Resolve shipping scenarios
  For "FreshBrew" — an online specialty coffee and equipment store
  (Ships via USPS, UPS, and FedEx):

  Write responses for 6 shipping scenarios:

  1. Package marked delivered but not received:
     "My coffee grinder ($129) says 'Delivered' at 11:30 AM
     today but nothing is at my door or mailroom. Order #FB-3321"
     - Investigation steps before replacement
     - Timeline for resolution
     - Replacement or refund policy

  2. Product arrived damaged:
     "My French press arrived completely shattered! The box was
     crushed — clearly mishandled by the carrier. I'm so
     frustrated. Order #FB-3287"
     (Customer attaches photos of damaged packaging and product)
     - Express empathy for the disappointment
     - Immediate replacement without requiring return of broken item
     - File carrier claim internally

  3. Missing items from order:
     "I ordered 3 bags of coffee and a mug. The mug arrived but
     no coffee. The packing slip shows all 4 items. Order #FB-3345"
     - Investigate (split shipment vs. packing error)
     - Send missing items immediately
     - Apologize for the inconvenience

  4. International order stuck in customs:
     "I ordered from Canada and my package has been 'in customs'
     for 2 weeks. Is it lost? Will I have to pay duty fees?
     Nobody told me about extra charges. Order #FB-3198"
     - Explain customs process
     - Address the duty fees question (should have been disclosed)
     - Offer realistic timeline and options

  5. Wrong item sent:
     "I ordered Ethiopian Yirgacheffe beans but received Colombian
     Supremo instead. I specifically wanted Ethiopian for a
     coffee tasting event this weekend. Order #FB-3356"
     - Handle the urgency (event deadline)
     - Ship correct item with expedited shipping
     - Let them keep the wrong item as goodwill

  6. Carrier lost in transit:
     "It's been 14 days since my order shipped and tracking shows
     it's been sitting at a USPS facility in Memphis for 9 days.
     I think it's lost. Order #FB-3267"
     - Acknowledge the unusually long delay
     - Contact carrier / open investigation
     - Offer reshipment vs. waiting

  Part 3: Shipping problem prevention
  1. Packaging best practices (reducing damage)
  2. Carrier selection and performance tracking
  3. Shipping insurance decisions
  4. Setting delivery expectations at checkout

assertions:
  - type: llm_judge
    criteria: "All 6 responses resolve the issue quickly — the customer gets a clear path to receiving their product without excessive waiting or hoops"
    weight: 0.30
    description: "Quick clear resolution path"
  - type: llm_judge
    criteria: "The damaged product response doesn't require shipping back broken items — it replaces immediately with appropriate empathy"
    weight: 0.25
    description: "No-hassle damage replacement"
  - type: llm_judge
    criteria: "The international customs response honestly addresses the duty fee issue — if fees weren't disclosed at checkout, this is acknowledged as a failing"
    weight: 0.25
    description: "Honest customs disclosure"
  - type: llm_judge
    criteria: "The wrong item with event deadline gets expedited resolution — the urgency of the weekend event drives the response timeline"
    weight: 0.20
    description: "Urgency-driven resolution"
