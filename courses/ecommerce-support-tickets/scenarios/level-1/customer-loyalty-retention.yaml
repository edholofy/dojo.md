meta:
  id: customer-loyalty-retention
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Build customer loyalty through support — turn support interactions into repeat purchase opportunities and long-term customer relationships"
  tags: [support, ecommerce, loyalty, retention, repeat-purchase, beginner]

state: {}

trigger: |
  In e-commerce, acquiring a new customer costs 5x more than
  retaining an existing one, and existing customers spend 67%
  more. Every support interaction is a chance to build or destroy
  loyalty. Great e-commerce support doesn't just solve problems —
  it creates fans.

  Part 1: Loyalty through support
  1. The loyalty impact of support:
     - 45% of customers choose brands based on support quality
     - 5% increase in retention = 25-95% profit increase
     - One bad experience negates 12 positive ones
     - Post-purchase support drives repeat purchases more than
       pre-purchase marketing
  2. Loyalty-building support behaviors:
     - Going beyond the minimum (surprise and delight)
     - Remembering previous interactions (personalization)
     - Proactive follow-up after resolution
     - Turning complaints into opportunities
     - Genuine product enthusiasm (not scripted)
  3. Loyalty program integration:
     - Points for engagement (not just purchases)
     - VIP tier recognition in support interactions
     - Exclusive offers for loyal customers
     - Early access to new products
     - Birthday and anniversary acknowledgments

  Part 2: Build loyalty through support scenarios
  For "PetPals" — an online pet supply store with a loyalty program
  (Bronze: 0-500 points, Silver: 500-1500, Gold: 1500+):

  Write responses that build loyalty for 6 scenarios:

  1. Turn a complaint into a fan:
     "I'm really annoyed — the dog food I ordered arrived with a
     torn bag and food spilled everywhere. Order #PP-1234"
     Customer: Gold loyalty member, 2 years, 45 orders
     - Resolve the issue AND build deeper loyalty
     - Recognize their loyalty status
     - Go above and beyond for a loyal customer

  2. Proactive follow-up opportunity:
     A customer bought a puppy starter kit 2 weeks ago (first order).
     You notice they haven't ordered since. Order #PP-1501
     - Write a proactive check-in email
     - Offer helpful advice (not just sales)
     - Include a welcome discount for next order

  3. Personalized recommendation after support:
     Customer just resolved a return of adult dog food (wrong size)
     and mentioned they have a senior golden retriever with
     sensitive stomach. Order #PP-1389
     - Recommend appropriate products based on conversation
     - Make it helpful, not pushy
     - Include relevant information about senior dog nutrition

  4. Loyalty program question:
     "How do I use my points? I have 1,200 but I can't figure out
     how to apply them at checkout."
     Customer: Silver member, getting close to Gold
     - Help them use their points
     - Highlight how close they are to Gold
     - Make them feel valued

  5. Win back after bad experience:
     Customer had a terrible experience last month (wrong order +
     slow return process). They haven't ordered since.
     - Write the win-back outreach
     - Acknowledge the past issue
     - Offer genuine value (not just a discount code)

  6. VIP customer special treatment:
     Gold member emails: "Do you have the limited edition holiday
     pet sweater? It says sold out on the website."
     - Check for any remaining inventory
     - If truly sold out, offer alternatives
     - Make them feel their Gold status matters

  Part 3: Measuring loyalty from support
  1. Net Promoter Score (NPS) tracking from support interactions
  2. Repeat purchase rate correlation with support quality
  3. Customer Lifetime Value (CLV) impact of support
  4. Building a loyalty-first support culture

assertions:
  - type: llm_judge
    criteria: "All 6 responses genuinely build loyalty — each interaction leaves the customer feeling more connected to the brand than before"
    weight: 0.30
    description: "Genuine loyalty building"
  - type: llm_judge
    criteria: "The complaint-to-fan response goes meaningfully above and beyond — it doesn't just fix the issue but creates a memorable positive experience"
    weight: 0.25
    description: "Meaningful above-and-beyond"
  - type: llm_judge
    criteria: "Personalized recommendations feel helpful not salesy — product suggestions are based on the customer's specific pet and needs"
    weight: 0.25
    description: "Helpful not salesy recommendations"
  - type: llm_judge
    criteria: "The win-back outreach is authentic — it acknowledges the past failure genuinely and offers real value"
    weight: 0.20
    description: "Authentic win-back outreach"
