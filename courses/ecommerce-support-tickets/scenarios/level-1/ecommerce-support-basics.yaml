meta:
  id: ecommerce-support-basics
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Learn e-commerce support fundamentals — understand ticket types, customer expectations, and the unique challenges of supporting online shoppers"
  tags: [support, ecommerce, basics, fundamentals, tickets, beginner]

state: {}

trigger: |
  E-commerce support is fundamentally different from SaaS support.
  Customers are emotionally invested in physical products, timing
  matters (gifts, events, seasons), and every interaction affects
  whether they'll buy again. Understanding these dynamics is the
  foundation of great e-commerce support.

  Part 1: E-commerce support landscape
  1. How e-commerce support differs from SaaS:
     - Tangible products (emotional attachment, physical expectations)
     - Time sensitivity (delivery dates, events, seasons)
     - Higher transaction volume, lower individual value
     - Returns and refunds are core operations (not edge cases)
     - Pre-sale support directly drives revenue
     - Customer loyalty is harder to build (low switching costs)
  2. Common e-commerce ticket types (by volume):
     - Where is my order? (WISMO) — 30-40% of all tickets
     - Returns and exchanges — 15-20%
     - Product questions — 10-15%
     - Payment and billing issues — 10%
     - Shipping problems (damage, lost, wrong item) — 8-10%
     - Account issues — 5-8%
     - Promotions and discounts — 5%
     - Other — 5-10%
  3. Customer expectations in e-commerce:
     - Fast response (chat: <1 min, email: <4 hours)
     - Easy returns (67% check return policy before buying)
     - Proactive shipping updates (not just tracking numbers)
     - Personalized recommendations
     - Consistent experience across channels

  Part 2: Handle basic e-commerce tickets
  For "StyleHaven" — an online fashion retailer
  (Free shipping over $75, 30-day returns, sizes XS-3XL):

  Write responses for 6 common ticket types:

  1. Where Is My Order (WISMO):
     "Hi, I ordered a dress 5 days ago (Order #SH-28491) and
     haven't received any shipping update. When will it arrive?"
     - Check order status, provide tracking info
     - Set delivery expectations
     - Offer proactive next steps

  2. Simple return request:
     "I need to return the jeans I ordered (Order #SH-27833).
     They're too big. How do I send them back?"
     - Explain the return process clearly
     - Offer exchange as alternative
     - Make it easy (prepaid label, instructions)

  3. Product question (pre-sale):
     "Does the silk blouse in your new collection run true to
     size? I'm usually a medium but sometimes need a large.
     Also, is the color more of a dusty rose or bright pink?"
     - Answer with helpful detail
     - Guide toward the right purchase
     - Include size guide reference

  4. Discount code not working:
     "I'm trying to use code SPRING25 but it says 'invalid code'
     at checkout. I got this in your email yesterday!"
     - Troubleshoot the code issue
     - Apply the discount manually if valid
     - Don't lose the sale

  5. Wrong item received:
     "I ordered the blue sweater in size M but received a red
     one in size L. This is really disappointing."
     - Apologize for the error
     - Offer immediate resolution (reship correct item)
     - Don't make them wait for the return to get the right item

  6. Account login help:
     "I can't log in to check my order status. I've tried
     resetting my password but no email is coming through."
     - Troubleshoot the login issue
     - Provide order status proactively
     - Resolve the access problem

  Part 3: E-commerce support mindset
  1. Every interaction is a revenue opportunity (not a cost)
  2. Speed matters more in e-commerce than almost any other industry
  3. The return experience determines repeat purchases
  4. Pre-sale support is as important as post-sale

assertions:
  - type: llm_judge
    criteria: "All 6 responses are friendly, helpful, and resolve the issue — they sound like a knowledgeable, caring shop assistant, not a corporate robot"
    weight: 0.30
    description: "Friendly helpful responses"
  - type: llm_judge
    criteria: "The WISMO response provides specific, actionable information — not just 'check your tracking link' but actual status and expected delivery"
    weight: 0.25
    description: "Specific WISMO information"
  - type: llm_judge
    criteria: "The wrong item response prioritizes the customer — the correct item is shipped immediately without requiring the return first"
    weight: 0.25
    description: "Customer-first wrong item handling"
  - type: llm_judge
    criteria: "The pre-sale product question helps the customer buy with confidence — it addresses sizing uncertainty and color accurately"
    weight: 0.20
    description: "Confidence-building pre-sale help"
