meta:
  id: order-status-tracking
  level: 1
  course: ecommerce-support-tickets
  type: output
  description: "Handle order status inquiries — respond to WISMO tickets, explain shipping timelines, and proactively communicate delivery updates"
  tags: [support, ecommerce, orders, tracking, shipping, beginner]

state: {}

trigger: |
  "Where Is My Order?" (WISMO) is the single most common
  e-commerce support ticket, often representing 30-40% of
  all inquiries. Handling WISMO tickets efficiently while
  managing customer anxiety about their purchases is a
  fundamental e-commerce support skill.

  Part 1: WISMO fundamentals
  1. Order lifecycle stages:
     - Order placed → Payment confirmed → Processing →
       Shipped → In transit → Out for delivery → Delivered
  2. Common WISMO scenarios:
     - Order placed, no tracking yet (processing delay)
     - Tracking shows no movement (carrier delay)
     - "Delivered" but customer hasn't received it
     - International order stuck in customs
     - Order split into multiple shipments
     - Pre-order or backorder status
  3. Customer anxiety factors:
     - Gift purchases (deadline pressure)
     - High-value orders (financial concern)
     - First-time customers (trust not established)
     - Repeat issues (past bad delivery experience)

  Part 2: Resolve WISMO scenarios
  For "GearUp" — an outdoor equipment online store
  (Standard shipping 5-7 days, Express 2-3 days, Free over $100):

  Write responses for 8 WISMO scenarios:

  1. "I ordered 3 days ago and still no tracking number"
     Order #GU-4521, placed Monday, standard shipping
     Status: Processing (warehouse has 2-day processing time)

  2. "Tracking hasn't updated in 4 days — is it lost?"
     Order #GU-4388, shipped 6 days ago via UPS
     Status: Last scan "Departed facility" in Memphis, 4 days ago

  3. "It says delivered but I never got it"
     Order #GU-4102, marked delivered yesterday at 2:15 PM
     Status: GPS confirmed delivery to correct address

  4. "I paid for Express but it's been 4 days"
     Order #GU-4499, Express shipping, placed 4 days ago
     Status: Processing delayed 1 day, shipped 3 days ago, in transit

  5. "Where are the rest of my items?"
     Order #GU-4445, 5 items ordered, 3 received today
     Status: Remaining 2 items shipping from different warehouse

  6. "My order is stuck in customs"
     Order #GU-4301, international (Canada), shipped 10 days ago
     Status: Customs clearance pending (duty charges required)

  7. "I placed a pre-order 3 weeks ago — any updates?"
     Order #GU-4200, pre-order for unreleased tent
     Status: Expected ship date pushed from Feb 20 to Mar 5

  8. "I need this by Saturday for a camping trip!"
     Order #GU-4555, placed today (Wednesday), standard shipping
     Status: Not yet processed, Saturday delivery impossible with
     standard shipping

  For each: provide the response with specific status information,
  set accurate expectations, and offer next steps.

  Part 3: Reducing WISMO tickets
  1. Proactive shipping notifications (what to send and when)
  2. Self-service order tracking (branded tracking page)
  3. Setting expectations at checkout (delivery date estimates)
  4. Carrier selection and performance monitoring

assertions:
  - type: llm_judge
    criteria: "All 8 responses provide specific, honest status information — vague platitudes like 'it's on its way' are replaced with actual details and timelines"
    weight: 0.30
    description: "Specific honest status information"
  - type: llm_judge
    criteria: "The 'delivered but not received' scenario follows proper investigation steps — it doesn't immediately assume theft or blame the customer"
    weight: 0.25
    description: "Proper delivery investigation"
  - type: llm_judge
    criteria: "The Express shipping delay includes appropriate acknowledgment — the customer paid extra for speed and didn't get it"
    weight: 0.25
    description: "Express delay acknowledgment"
  - type: llm_judge
    criteria: "WISMO reduction strategies are practical — proactive notifications, tracking pages, and checkout expectations are actionable"
    weight: 0.20
    description: "Practical WISMO reduction"
