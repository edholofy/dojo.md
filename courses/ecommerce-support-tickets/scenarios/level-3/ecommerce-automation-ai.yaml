meta:
  id: ecommerce-automation-ai
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Implement AI and automation in e-commerce support — design chatbots, auto-responses, self-service flows, and AI-assisted agent tools"
  tags: [support, ecommerce, ai, automation, chatbots, self-service, advanced]

state: {}

trigger: |
  E-commerce support is uniquely suited to automation because many
  ticket types are predictable and data-rich. Order status checks,
  return initiations, and tracking inquiries can be fully automated,
  while AI can assist agents with product knowledge, personalization,
  and response drafting. The goal: 40% ticket deflection while
  improving customer experience.

  Part 1: E-commerce automation opportunities
  1. Fully automatable (no human needed):
     - Order status lookup (WISMO)
     - Return initiation (self-service portal)
     - Shipping tracking updates
     - Account password reset
     - Subscription management (skip, pause, cancel)
     - Order modification (before processing)
  2. AI-assisted (human + AI):
     - Product recommendations (AI suggests, human personalizes)
     - Complaint responses (AI drafts, human reviews/adjusts)
     - Fraud detection (AI flags, human investigates)
     - Review responses (AI drafts, human approves)
     - Sizing recommendations (AI calculates, human confirms)
  3. Human-only (don't automate):
     - Complex complaints (emotional situations)
     - High-value customer issues (VIP treatment)
     - Product safety concerns (health/safety)
     - Fraud investigation (judgment required)
     - B2B account management (relationship-dependent)

  Part 2: Build an e-commerce automation program
  For "TechDirect" — a consumer electronics e-commerce store
  (8,000 orders/month, 2,400 tickets/month):

  1. Design a customer-facing chatbot:
     Create conversation flows for the top 5 automated scenarios:
     a) WISMO: order lookup → status → tracking → delivery estimate
     b) Return initiation: order lookup → reason → exchange offer →
        return label generation
     c) Payment issue: order lookup → charge verification →
        explanation or dispute initiation
     d) Product question: category → specific product → specs/availability
     e) Cancel/modify order: order lookup → status check → process
        change or explain why it can't be changed

     For each: write the full conversation tree including error
     handling, human handoff triggers, and fallback responses.

  2. Design AI-assisted agent tools:
     - Smart response suggestions (3 options ranked by relevance)
     - Customer context panel (order history, lifetime value, sentiment)
     - Product knowledge assistant (instant spec lookup)
     - Similar ticket finder (how was this resolved before?)
     - Auto-triage and priority assignment
     Design each tool with mockup interface description and agent workflow.

  3. Create the self-service return portal:
     - Customer lookup (order number + email)
     - Item selection (which items to return)
     - Reason capture (structured with follow-up questions)
     - Exchange offer (show available alternatives)
     - Refund method selection
     - Return label generation
     - Confirmation and instructions
     Design the complete user flow with decision points.

  4. Calculate automation ROI:
     - Current cost per ticket (manual)
     - Projected cost per automated resolution
     - Expected deflection rate per automation
     - Implementation cost vs. annual savings
     - Customer satisfaction impact (positive or negative?)

  Part 3: Automation governance
  1. When automation hurts customer experience
  2. Continuous improvement of automated flows
  3. Testing and monitoring automation quality
  4. Preparing the team for AI-augmented support

assertions:
  - type: llm_judge
    criteria: "Chatbot flows are complete with error handling — each flow includes fallbacks for unrecognized inputs and clear human handoff triggers"
    weight: 0.30
    description: "Complete chatbot flows"
  - type: llm_judge
    criteria: "AI-assisted agent tools are genuinely useful — they reduce agent effort without removing human judgment from important decisions"
    weight: 0.25
    description: "Genuinely useful AI tools"
  - type: llm_judge
    criteria: "The self-service return portal prioritizes exchanges — the flow naturally guides toward exchanges before offering refunds"
    weight: 0.25
    description: "Exchange-prioritizing return flow"
  - type: llm_judge
    criteria: "ROI calculation is realistic — it accounts for implementation costs, maintenance, and potential negative impact on customer satisfaction"
    weight: 0.20
    description: "Realistic automation ROI"
