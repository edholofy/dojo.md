meta:
  id: customer-segmentation-support
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Differentiate support by customer segment — tailor service levels, communication style, and resolution approaches for VIP, new, at-risk, and wholesale customers"
  tags: [support, ecommerce, segmentation, vip, personalization, advanced]

state: {}

trigger: |
  Not all e-commerce customers should receive identical support.
  A VIP customer spending $5,000/year deserves different treatment
  than a first-time $20 buyer — not because the $20 buyer is less
  important, but because the relationship context is different.
  Smart segmentation improves both efficiency and satisfaction.

  Part 1: Customer segmentation for support
  1. Common e-commerce segments:
     - VIP/High-value: Top 10% by spend, loyal, high LTV
     - Regular: Consistent buyers, moderate spend
     - New: First 1-3 orders, still forming opinion
     - At-risk: Declining purchase frequency, recent complaints
     - One-time: Single purchase, haven't returned
     - Wholesale/B2B: Business accounts, bulk orders
  2. Segment-specific support strategies:
     - VIP: Priority queue, personal touches, proactive outreach
     - New: Extra patience, onboarding guidance, follow-up
     - At-risk: Save offers, special attention, feedback requests
     - One-time: Win-back attempts, low-friction experience
  3. Segmentation data sources:
     - Order history (frequency, recency, monetary value — RFM)
     - Customer lifetime value (CLV)
     - CSAT and NPS scores
     - Support ticket history
     - Website behavior (browsing, cart abandonment)
     - Loyalty program tier

  Part 2: Design segmented support
  For "LuxeHome" — a premium home furnishings e-commerce brand:

  1. Define 5 customer segments and their support treatment:
     Create a support segmentation matrix:
     - Segment definition (who belongs in each segment)
     - Support SLA per segment (response time, resolution time)
     - Communication tone per segment
     - Resolution authority per segment (agent autonomy for refunds,
       discounts, shipping upgrades)
     - Proactive outreach triggers per segment

  2. Write the same support response for 3 different segments:
     Scenario: Customer's $300 order arrived with a small scratch
     on a wooden side table. It's usable but not perfect.

     Version A — VIP customer ($15,000 lifetime spend, 3 years):
     Version B — New customer (2nd order, joined 2 months ago):
     Version C — At-risk customer (3 recent complaints, no order in 60 days):

     Show how resolution differs per segment (replacement vs. partial
     refund vs. discount on next order).

  3. Design a VIP support program:
     - VIP identification criteria
     - Dedicated VIP support team or queue
     - VIP perks (priority shipping, extended returns, personal stylist)
     - VIP communication style guide
     - VIP save protocol (when a VIP threatens to leave)

  4. Create an at-risk customer intervention playbook:
     - At-risk signal identification
     - Proactive outreach templates
     - Save offers and escalation authority
     - Measurement: did the intervention prevent churn?

  Part 3: Operationalizing segmentation
  1. Implementing segmentation in your help desk
  2. Training agents on segment-specific treatment
  3. Avoiding segment discrimination (fair treatment for all)
  4. Measuring the ROI of segmented support

assertions:
  - type: llm_judge
    criteria: "The segmentation matrix is practical — segment definitions, SLAs, and resolution authority are specific enough to implement"
    weight: 0.30
    description: "Practical segmentation matrix"
  - type: llm_judge
    criteria: "The three segment-specific responses are meaningfully different — VIP gets premium treatment, new customer gets nurturing, at-risk gets special attention"
    weight: 0.25
    description: "Meaningfully different segment responses"
  - type: llm_judge
    criteria: "The VIP program provides genuine differentiation — perks and treatment are valuable enough to make VIP status feel special"
    weight: 0.25
    description: "Genuine VIP differentiation"
  - type: llm_judge
    criteria: "Fair treatment is addressed — the segmentation doesn't result in poor treatment for non-VIP customers"
    weight: 0.20
    description: "Fair treatment across segments"
