meta:
  id: ecommerce-crisis-management
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Manage e-commerce support crises — handle product recalls, data breaches, shipping carrier failures, and viral negative publicity"
  tags: [support, ecommerce, crisis, recall, data-breach, reputation, advanced]

state: {}

trigger: |
  E-commerce crises happen fast and publicly. A product recall,
  data breach, or viral complaint can flood support with hundreds
  of tickets in hours while simultaneously damaging brand
  reputation on social media. Expert support teams have crisis
  playbooks ready before they're needed.

  Part 1: E-commerce crisis types
  1. Product safety crisis:
     - Product recall (safety hazard discovered)
     - Contamination or allergen issue (food/cosmetics)
     - Counterfeit products in supply chain
  2. Data/security crisis:
     - Customer data breach (payment info, personal data)
     - Account compromise (mass login attempts)
     - Payment processing failure
  3. Operational crisis:
     - Carrier/shipping failure (warehouse fire, carrier strike)
     - Website outage during peak sales
     - Fulfillment center disaster
  4. Reputation crisis:
     - Viral negative customer experience
     - Influencer public complaint
     - Competitor attack campaign
     - Controversial company action or statement

  Part 2: Navigate an e-commerce crisis
  For "PureEssentials" — an organic food and supplement e-commerce
  brand (50,000 customers, 3,000 orders/week):

  CRISIS: Your supplier informs you that 3 batches of your
  best-selling organic protein powder may contain undeclared
  peanut allergens. The affected batches (manufactured Sept 15-30)
  have already been shipped to approximately 2,000 customers
  over the past 6 weeks.

  This is a life-threatening food safety issue.

  1. Immediate response (first 2 hours):
     - Internal crisis team activation plan
     - Stop all shipments of affected product
     - Identify all affected orders (batch tracking)
     - Draft initial customer notification
     - Coordinate with regulatory agency (FDA)
     - Social media monitoring setup

  2. Customer notification (send within 4 hours):
     Write 3 versions:
     a) Email to customers who ordered the affected product
        (urgent, clear, actionable)
     b) Email to customers with known peanut allergies in their
        profile (highest priority, phone outreach too)
     c) General announcement on website and social media

  3. Support operations during crisis:
     - Phone lines (set up dedicated recall hotline)
     - Email templates for incoming inquiries
     - Refund/replacement process (no questions asked)
     - Social media response strategy
     - FAQ for support agents
     - Escalation protocol for reports of allergic reactions

  4. Day 3-7: Ongoing management:
     - Daily status updates to customers
     - Media inquiry response (press reaches out)
     - Regulatory compliance documentation
     - Supply chain investigation and accountability
     - Customer who reported allergic reaction (one customer
       went to hospital — write the response)

  5. Post-crisis (weeks 2-4):
     - Post-crisis customer communication
     - Trust rebuilding campaign
     - Product return to market communication
     - Long-term brand recovery plan
     - Internal post-mortem and process improvements

  Part 3: Crisis preparedness
  1. Building crisis playbooks for common e-commerce scenarios
  2. Crisis communication templates (pre-written, ready to customize)
  3. Crisis team roles and responsibilities
  4. Simulating crises to test preparedness

assertions:
  - type: llm_judge
    criteria: "The allergen crisis is treated with appropriate urgency — customer safety comes before brand protection, and notifications are sent quickly"
    weight: 0.30
    description: "Safety-first crisis response"
  - type: llm_judge
    criteria: "Customer with known peanut allergy gets highest priority — they receive proactive phone outreach in addition to email"
    weight: 0.25
    description: "Highest-risk customer priority"
  - type: llm_judge
    criteria: "The hospitalized customer response is appropriate — it expresses genuine concern, offers full support, and involves legal guidance"
    weight: 0.25
    description: "Appropriate medical incident response"
  - type: llm_judge
    criteria: "Post-crisis communication rebuilds trust — it's honest about what happened, what changed, and why customers can trust the brand again"
    weight: 0.20
    description: "Trust-rebuilding communication"
