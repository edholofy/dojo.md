meta:
  id: ecommerce-voc-analytics
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Analyze voice of customer data from e-commerce support — extract insights from tickets, reviews, chat logs, and social mentions to drive product and experience improvements"
  tags: [support, ecommerce, voc, analytics, customer-feedback, advanced]

state: {}

trigger: |
  Voice of Customer (VoC) analytics transforms raw support
  interactions into strategic insights. E-commerce support teams
  sit on a goldmine of customer feedback — every ticket, chat,
  review, and social mention contains signals about product quality,
  website experience, and unmet customer needs.

  Part 1: VoC fundamentals
  1. Sources of customer voice in e-commerce
  2. Qualitative vs. quantitative feedback analysis
  3. Turning unstructured feedback into structured data
  4. Feedback loop: insight → action → measurement

  Part 2: Analyze VoC data
  For "StyleHub" — an online fashion retailer ($15M revenue,
  60K customers, 8,000 tickets/month):

  Recent VoC data snapshot:
  - Top ticket themes: sizing issues (22%), late delivery (18%),
    fabric quality (15%), wrong item received (12%), returns
    process confusion (10%), payment failures (8%), other (15%)
  - Product reviews (last 90 days): 4,200 reviews, avg 3.6 stars
  - Common review phrases: "runs small," "color different from
    photo," "great style but poor stitching," "fast shipping"
  - Social mentions: 340/month, 45% negative sentiment
  - NPS by segment: new customers 18, repeat customers 42
  - Chat satisfaction: 78% (down from 85% three months ago)

  1. Perform a comprehensive VoC analysis:
     - Categorize feedback by theme, severity, and frequency
     - Identify the top 5 actionable insights
     - Calculate estimated revenue impact of each issue
     - Map insights to responsible teams (product, logistics,
       marketing, support, engineering)

  2. Create a VoC reporting framework:
     - Weekly VoC digest for support managers
     - Monthly VoC report for cross-functional leadership
     - Quarterly VoC strategic review for executives
     - Real-time VoC alerts for critical emerging issues
     Define content, audience, format, and cadence for each.

  3. Design a closed-loop VoC program:
     - How feedback is collected and tagged at source
     - How insights are prioritized and routed
     - How actions are tracked to completion
     - How impact is measured and reported back
     - How customers are informed their feedback led to changes

  Part 3: Advanced VoC techniques
  1. Sentiment analysis and trend detection
  2. Competitive VoC benchmarking
  3. Predictive analytics from VoC signals
  4. Building a customer-centric culture through VoC

assertions:
  - type: llm_judge
    criteria: "The VoC analysis correctly identifies actionable insights — sizing issues, photo accuracy, and quality problems are connected to both returns and negative reviews"
    weight: 0.30
    description: "Actionable VoC insights"
  - type: llm_judge
    criteria: "The reporting framework serves different audiences appropriately — weekly tactical for managers vs. quarterly strategic for executives"
    weight: 0.25
    description: "Audience-appropriate reporting"
  - type: llm_judge
    criteria: "Revenue impact estimates are reasonable — they connect customer issues to measurable business outcomes like return costs and churn"
    weight: 0.25
    description: "Revenue impact quantification"
  - type: llm_judge
    criteria: "The closed-loop program ensures feedback leads to action — there's a clear path from customer complaint to product improvement to customer notification"
    weight: 0.20
    description: "Closed-loop feedback program"
