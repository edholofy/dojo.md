meta:
  id: international-ecommerce-support
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Support international e-commerce customers — handle cross-border shipping, customs, duties, currency issues, and cultural differences in global support"
  tags: [support, ecommerce, international, cross-border, customs, advanced]

state: {}

trigger: |
  International e-commerce adds layers of complexity: customs
  duties, longer shipping times, currency conversion, language
  barriers, and different consumer protection laws by country.
  Support agents need to navigate these while maintaining the
  same friendly, helpful experience domestic customers receive.

  Part 1: International support challenges
  1. Shipping and logistics:
     - Longer delivery times (7-21 days standard)
     - Customs clearance delays
     - Duties and taxes (DDP vs. DDU shipping)
     - Carrier limitations by country
     - Address format differences
     - Restricted/prohibited items by country
  2. Financial:
     - Currency conversion and pricing
     - International payment methods (iDEAL, Boleto, WeChat Pay)
     - VAT/GST handling
     - Refund in original currency
     - Exchange rate fluctuation disputes
  3. Legal and regulatory:
     - EU consumer protection (14-day cooling-off period)
     - GDPR data handling
     - Product safety standards by region
     - Import restrictions (cosmetics, food, electronics)
     - Distance selling regulations

  Part 2: Handle international support scenarios
  For "GlobalStyle" — a US-based fashion brand shipping to 40 countries:

  1. Customs duty surprise:
     "I ordered a coat for €120 but was charged €35 in customs
     duties on delivery! Your website didn't mention anything
     about extra charges. I refuse to pay and want a refund."
     Customer: Germany, first international order
     - Explain duties and how they work
     - Address the transparency issue
     - Offer resolution (refund duties? absorb cost? DDP solution?)

  2. International return logistics:
     "I need to return a dress from Australia. The return shipping
     label you sent is for USPS — it doesn't work here. And the
     return shipping quote from Australia Post is $45 AUD!"
     Customer: Australia, $89 USD order
     - Handle the expensive international return
     - Offer alternatives (partial refund, keep the item, local return)
     - Review policy for international returns

  3. Currency and pricing dispute:
     "Your website showed the price as ¥12,000 but my credit card
     was charged ¥12,847. That's a 7% difference! I want the
     price I was shown."
     Customer: Japan, credit card currency conversion
     - Explain dynamic currency conversion vs. bank conversion
     - Determine if the difference is fair
     - Offer resolution if it's a pricing display issue

  4. EU consumer rights (14-day cooling-off):
     "Under EU law, I have the right to return this item within
     14 days without giving a reason. You're telling me I need a
     reason? That's illegal."
     Customer: France, returning an unworn dress within 14 days
     - Address the legal requirement correctly
     - Process the return per EU regulations
     - Ensure your policy is compliant

  5. International shipping tracking gap:
     "Tracking shows my package left the US 12 days ago but then
     nothing. No updates from any carrier. Did it get lost in
     the ocean?"
     Customer: Brazil, order value $150
     - Explain international tracking handoff (carrier to carrier)
     - Investigate the gap
     - Set realistic expectations

  Part 3: International support operations
  1. Building international support capabilities (language, timezone)
  2. DDP vs. DDU shipping strategy
  3. International return policy design
  4. Country-specific support playbooks

assertions:
  - type: llm_judge
    criteria: "Customs and duty explanations are accurate and clear — the customer understands why they were charged and what can be done about it"
    weight: 0.30
    description: "Accurate customs explanations"
  - type: llm_judge
    criteria: "EU consumer rights are handled correctly — the 14-day cooling-off period is recognized as a legal requirement, not a discretionary policy"
    weight: 0.25
    description: "Correct EU rights handling"
  - type: llm_judge
    criteria: "International returns offer practical alternatives — expensive cross-border shipping is addressed with creative solutions"
    weight: 0.25
    description: "Practical international return solutions"
  - type: llm_judge
    criteria: "Currency issues are explained without condescension — exchange rate mechanics are clarified in accessible language"
    weight: 0.20
    description: "Accessible currency explanations"
