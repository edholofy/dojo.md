meta:
  id: b2b-wholesale-support
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Support B2B and wholesale e-commerce customers — handle bulk orders, net terms, purchase orders, and the unique needs of business buyers"
  tags: [support, ecommerce, b2b, wholesale, bulk-orders, advanced]

state: {}

trigger: |
  B2B e-commerce support is fundamentally different from B2C.
  Business buyers have larger orders, longer decision cycles,
  need invoicing and net terms, and expect a level of account
  management that goes beyond consumer support. One B2B
  customer may be worth 100 individual consumers.

  Part 1: B2B e-commerce support differences
  1. B2B customer characteristics:
     - Higher order values ($500-$50,000+)
     - Repeat/recurring orders (predictable revenue)
     - Multiple stakeholders (buyer, approver, receiver, finance)
     - Formal procurement processes (POs, invoicing, net terms)
     - Price negotiation and volume discounts
     - Custom catalogs and pricing tiers
  2. B2B support ticket types:
     - Purchase order processing
     - Invoice discrepancies and disputes
     - Net terms and payment terms requests
     - Bulk order logistics (partial shipments, delivery scheduling)
     - Product customization requests
     - Account management (adding users, changing permissions)
     - Catalog and pricing inquiries
  3. B2B support expectations:
     - Dedicated account representative
     - Faster response times (revenue impact is higher)
     - Phone and email preferred (less chat)
     - Documentation and paper trail for everything
     - Flexibility and negotiation willingness

  Part 2: Handle B2B support scenarios
  For "OfficeSupplyPro" — a B2B office supply e-commerce platform:

  1. Large order with purchase order:
     "We need to place an order for 500 ergonomic chairs ($350 each)
     for our new office buildout. We'll need net 60 terms and delivery
     coordinated over 3 weeks (different floors of the building).
     Please provide a formal quote. PO to follow. — Procurement Dept,
     TechCorp Industries"
     - Process the large order request professionally
     - Address: quote generation, net terms approval, delivery scheduling
     - Write the formal response

  2. Invoice discrepancy:
     "Invoice #OSP-8892 shows $12,450 but our PO approved $11,800.
     The difference appears to be a shipping charge that wasn't in
     the original quote. We cannot process payment until this is
     resolved. — Accounts Payable, MedGroup LLC"
     - Investigate the discrepancy
     - Resolve quickly (delayed payment affects cash flow)
     - Provide corrected documentation

  3. Bulk return — quality issue:
     "We received 200 desk lamps from our last order and 35 of
     them have flickering issues. This is a safety concern for our
     office. We need replacements for the 35 defective units and
     a quality assurance report. — Facilities Manager, GlobalFinance"
     - Handle the volume defect professionally
     - Address the safety concern
     - Provide the quality assurance documentation requested

  4. New wholesale account setup:
     "We're a chain of 12 coworking spaces. We'd like to set up
     a wholesale account with volume pricing for ongoing supplies.
     We estimate $15,000-$20,000/month in purchases. What are
     your wholesale terms? — CEO, CoWork Nation"
     - Welcome the high-value prospect
     - Outline wholesale account options
     - Connect with sales for pricing negotiation

  5. Account manager transition:
     "Our account manager Sarah left 3 weeks ago and nobody has
     reached out. We have 2 pending orders, an open invoice
     dispute, and need to place our Q2 bulk order. This is
     unacceptable for a $200K/year account. — VP Operations, BigCorp"
     - Handle the relationship gap urgently
     - Take immediate ownership of pending issues
     - Assign new account management

  Part 3: B2B support operations
  1. Building B2B support processes (different from B2C)
  2. Account tiering and service level differentiation
  3. B2B self-service portals
  4. Measuring B2B support success (retention, expansion, NPS)

assertions:
  - type: llm_judge
    criteria: "B2B responses match business communication standards — they're formal, documented, and address the specific business concerns (POs, invoicing, terms)"
    weight: 0.30
    description: "Business-appropriate communication"
  - type: llm_judge
    criteria: "The invoice discrepancy is resolved with documentation — the corrected invoice and explanation are provided in a format finance teams can process"
    weight: 0.25
    description: "Document-ready resolution"
  - type: llm_judge
    criteria: "The account manager transition response takes immediate ownership — it doesn't make excuses but immediately addresses all pending issues"
    weight: 0.25
    description: "Immediate ownership response"
  - type: llm_judge
    criteria: "The wholesale prospect is handled as a sales opportunity — the response qualifies the prospect while providing useful information"
    weight: 0.20
    description: "Sales-aware prospect handling"
