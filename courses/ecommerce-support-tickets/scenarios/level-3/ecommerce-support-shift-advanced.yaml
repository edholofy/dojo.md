meta:
  id: ecommerce-support-shift-advanced
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Navigate an advanced e-commerce support shift — handle a complex queue with VIP customers, fraud alerts, international issues, and team coordination"
  tags: [support, ecommerce, simulation, advanced-shift, complex, advanced]

state: {}

trigger: |
  An advanced e-commerce support shift includes everything from
  the basics plus: VIP customer management, fraud detection,
  international complications, team coordination, and real-time
  decision-making under pressure.

  You're the senior agent on a Friday afternoon shift at
  "LuxeBeauty" — a premium cosmetics e-commerce brand.
  Your team: You + 2 agents (Maya and Jake).
  It's December 15th — peak holiday season.

  HOUR 1 (1:00 PM - 2:00 PM):
  Queue:
  - Chat 1: VIP customer ($3,000/year) — "My holiday gift set
    order shows 'processing' for 3 days. I need it by the 20th
    for a party. This is a $250 order."
  - Email 1: International (UK) — return request for items
    totaling £180, outside your normal 30-day window but within
    UK's 14-day cooling-off period
  - Email 2: Fraud alert — a $1,200 order flagged by your
    system (5 luxury gift sets to a new address with new account)

  At 1:30 PM: Maya asks for help — a customer is claiming they
  never received a package (tracking shows delivered with photo
  proof of delivery at correct doorstep)

  HOUR 2 (2:00 PM - 3:00 PM):
  - Instagram DM: Customer posts story showing a broken compact
    mirror from their order, tags the brand with angry caption
    (500 views and growing)
  - Chat 2: Subscription customer — wants to pause but is also
    upset about being charged for a box she thought she cancelled
  - Email 3: "I placed 2 orders yesterday by accident. Can you
    combine them to avoid double shipping charges?"

  At 2:45 PM: Jake reports 6 similar complaints about a new
  eye shadow palette — appears to be a product quality batch issue

  HOUR 3 (3:00 PM - 4:00 PM):
  - The product quality issue escalates (15 complaints now)
  - A beauty blogger (100K followers) DMs saying she received a
    damaged PR package and wants a replacement before her review
    goes live Monday
  - Email 4: B2B inquiry from a spa asking about wholesale pricing

  For the entire shift:
  1. Prioritize and sequence your actions for each hour
  2. Write key responses (at least 8 complete responses)
  3. Handle team coordination
  4. Make decisions on the fraud alert and product quality issue
  5. Write end-of-shift handoff notes

assertions:
  - type: llm_judge
    criteria: "Priority decisions are sound — the VIP holiday order, fraud alert, and emerging product quality issue get appropriate urgency"
    weight: 0.30
    description: "Sound priority decisions"
  - type: llm_judge
    criteria: "The product quality batch issue is escalated properly — 15 complaints about the same product triggers an internal quality alert"
    weight: 0.25
    description: "Proper quality issue escalation"
  - type: llm_judge
    criteria: "The beauty blogger PR package gets strategic treatment — it's handled as both a support issue and a marketing opportunity"
    weight: 0.25
    description: "Strategic PR package handling"
  - type: llm_judge
    criteria: "Team coordination is effective — Maya and Jake get clear guidance and the workload is distributed appropriately"
    weight: 0.20
    description: "Effective team coordination"
