meta:
  id: ecommerce-support-team-building
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Build an e-commerce support team — hire, train, and develop agents with product knowledge, sales skills, and brand voice mastery"
  tags: [support, ecommerce, team-building, hiring, training, advanced]

state: {}

trigger: |
  E-commerce support agents need a unique blend of skills:
  customer service empathy, product knowledge, sales instinct,
  brand voice consistency, and technical tool proficiency.
  Building a great e-commerce support team requires hiring for
  these traits and developing them through structured training.

  Part 1: E-commerce agent skills
  1. Essential skills:
     - Product knowledge (your entire catalog, not just FAQs)
     - Brand voice mastery (consistent tone across all channels)
     - Sales instinct (when to recommend, cross-sell, upsell)
     - Technical proficiency (help desk, order system, analytics)
     - Emotional intelligence (reading customer mood, de-escalation)
     - Speed (e-commerce customers expect fast resolution)
  2. Hiring for e-commerce:
     - Retail experience (understanding customer buying behavior)
     - Writing quality (most support is text-based)
     - Product passion (they should like what you sell)
     - Multi-tasking ability (chat + email simultaneously)
     - Sales background is a bonus (not required)
  3. Training unique to e-commerce:
     - Product training (hands-on with every product category)
     - Order management system training
     - Returns and refund processing
     - Fraud detection basics
     - Brand voice certification
     - Sales techniques appropriate for support

  Part 2: Build the team
  For "ActiveWear" — an athletic apparel e-commerce brand
  (growing from 3 to 8 support agents over 6 months):

  1. Create the job description:
     Write a compelling job posting for an e-commerce support
     specialist that attracts candidates who are:
     - Customer-focused with retail or service experience
     - Strong writers who can match brand voice
     - Comfortable with technology and multi-channel work
     - Passionate about fitness and active lifestyles

  2. Design the interview process:
     Step 1 — Written assessment:
     3 simulated customer scenarios:
     a) WISMO ticket (basic, tests process knowledge)
     b) Product recommendation chat (tests product knowledge and
        sales instinct)
     c) Angry customer return request (tests empathy and de-escalation)
     Include scoring rubric.

     Step 2 — Live role play:
     15-minute simulation where candidate handles a live chat
     while simultaneously drafting an email response.
     Include evaluation criteria.

  3. Create the 30-day onboarding program:
     Week 1: Brand, product, and culture immersion
     - Product knowledge training (hands-on with merchandise)
     - Brand voice workshop (writing exercises)
     - Tool training (help desk, order system, shipping)
     - Shadow experienced agents

     Week 2: Process and policy mastery
     - Return/refund processing (practice scenarios)
     - Fraud detection basics
     - Escalation procedures
     - Channel-specific guidelines (email, chat, social)

     Week 3: Supervised practice
     - Handle tickets with mentor review
     - Chat under supervision
     - Social media responses (drafted, reviewed, then posted)

     Week 4: Graduated independence
     - Independent email handling
     - Supervised chat (mentor available)
     - First QA review and coaching
     - 30-day assessment and goal setting

  4. Design ongoing development:
     - Monthly product knowledge updates (new arrivals)
     - Quarterly brand voice refreshers
     - Sales skills workshops
     - Career path: Agent → Senior → Lead → Manager
     - Cross-training opportunities (merchandising, marketing)

  Part 3: Team culture
  1. Building a team that cares about the brand
  2. Incentive structures for e-commerce support
  3. Preventing burnout in seasonal peaks
  4. Support team as brand ambassadors

assertions:
  - type: llm_judge
    criteria: "The job description is compelling and brand-aligned — it attracts candidates who are passionate about the product category, not just looking for any support job"
    weight: 0.25
    description: "Compelling brand-aligned job posting"
  - type: llm_judge
    criteria: "The interview process evaluates e-commerce-specific skills — writing quality, product knowledge, and multi-tasking ability are tested"
    weight: 0.30
    description: "E-commerce skill evaluation"
  - type: llm_judge
    criteria: "The 30-day onboarding builds competence progressively — from observation to supervised practice to graduated independence at an appropriate pace"
    weight: 0.25
    description: "Progressive competence building"
  - type: llm_judge
    criteria: "Ongoing development includes product knowledge — new arrivals training reflects the reality that e-commerce catalogs constantly change"
    weight: 0.20
    description: "Continuous product knowledge"
