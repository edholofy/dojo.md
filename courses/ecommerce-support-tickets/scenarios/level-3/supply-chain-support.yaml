meta:
  id: supply-chain-support
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Support customers through supply chain disruptions — communicate backorders, delays, substitutions, and stock-outs while maintaining trust"
  tags: [support, ecommerce, supply-chain, backorders, inventory, advanced]

state: {}

trigger: |
  Supply chain disruptions directly impact customer experience.
  When products are backordered, shipments delayed, or items
  out of stock after ordering, support must communicate honestly,
  offer alternatives, and maintain customer trust through
  uncertainty.

  Part 1: Supply chain impacts on support
  1. Common supply chain issues:
     - Product out of stock after order placed
     - Backorder with uncertain delivery date
     - Supplier quality issues (defective batch)
     - Shipping carrier disruptions (weather, strikes, capacity)
     - Warehouse capacity issues (fulfillment delays)
     - Global supply chain disruptions (port congestion, shortages)
  2. Communication challenges:
     - Delivering bad news (your order is delayed/cancelled)
     - Managing uncertain timelines (we don't know when)
     - Offering substitutions (similar but not identical)
     - Proactive vs. reactive communication
     - Balancing honesty with maintaining confidence

  Part 2: Handle supply chain support scenarios
  For "OutdoorEdge" — an outdoor recreation e-commerce store:

  1. Backorder with uncertain timeline:
     200 customers ordered the popular "Summit Pro" tent that went
     out of stock mid-order rush. Supplier says 4-8 weeks for restock
     but can't guarantee the date.
     - Write the proactive notification to all 200 customers
     - Offer options: wait, substitute, cancel with bonus
     - Handle a customer who replies angrily

  2. Partial order cancellation (item discontinued):
     A customer ordered 5 items. One item (a specific hiking pole
     model) has been discontinued by the manufacturer with no
     replacement. The other 4 items are ready to ship.
     - Communicate the cancellation of 1 item
     - Ship the remaining 4 without delay
     - Suggest an alternative product
     - Refund the cancelled item

  3. Quality issue requiring hold on shipments:
     Your QA team discovers that a batch of water filters may not
     meet filtration standards. You have 85 orders containing these
     filters ready to ship or already shipped.
     - Stop unshipped orders (communicate the delay)
     - Recall already-shipped orders (safety concern)
     - Explain without causing panic (water safety issue)

  4. Holiday season supplier delay:
     It's December 5th. Your top-selling gift items (premium thermos
     set, $89) are stuck at the port. They won't arrive at your
     warehouse until December 18th. You have 500 pre-orders
     promising delivery by Christmas.
     - Calculate if Christmas delivery is still possible
     - Write communication for different scenarios (possible vs. not)
     - Offer alternatives for those who can't wait
     - Manage the gift-giving anxiety

  5. Substitution offer:
     A customer ordered specific running shoes (Model X, $129) that
     are now permanently out of stock. The closest alternative is
     Model Y ($149, slightly different features).
     - Offer the substitution with full transparency
     - Absorb the price difference (don't charge more)
     - Let them decide (substitution or refund)

  Part 3: Supply chain resilience
  1. Building support playbooks for common supply chain scenarios
  2. Proactive communication templates
  3. Working with operations on supply chain visibility
  4. Customer expectation management during disruptions

assertions:
  - type: llm_judge
    criteria: "All communications are honest about uncertainty — when delivery dates are unknown, the response acknowledges this rather than inventing dates"
    weight: 0.30
    description: "Honest uncertainty communication"
  - type: llm_judge
    criteria: "Customer options are clearly presented — each scenario gives customers clear choices (wait, alternative, refund) with enough information to decide"
    weight: 0.25
    description: "Clear customer options"
  - type: llm_judge
    criteria: "The safety concern (water filters) is handled with appropriate urgency — product safety outweighs business convenience"
    weight: 0.25
    description: "Appropriate safety urgency"
  - type: llm_judge
    criteria: "The holiday delivery scenario addresses gift anxiety — the emotional dimension of Christmas gift expectations is acknowledged"
    weight: 0.20
    description: "Gift anxiety acknowledgment"
