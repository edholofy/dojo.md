meta:
  id: product-knowledge-management
  level: 3
  course: ecommerce-support-tickets
  type: output
  description: "Build product knowledge systems — create internal wikis, training materials, and quick-reference tools so agents can answer any product question instantly"
  tags: [support, ecommerce, product-knowledge, wiki, training, advanced]

state: {}

trigger: |
  E-commerce support agents are expected to know everything about
  every product in the catalog. With catalogs ranging from hundreds
  to tens of thousands of SKUs, this requires structured knowledge
  management — not just memory. Great product knowledge systems
  give agents instant access to accurate information.

  Part 1: Product knowledge challenges
  1. Scale challenges:
     - Large catalogs (hundreds to thousands of products)
     - Frequent changes (new arrivals, discontinued items)
     - Seasonal inventory (holiday items, limited editions)
     - Variant complexity (sizes, colors, materials, configurations)
  2. Knowledge types needed:
     - Specifications (dimensions, materials, weight, compatibility)
     - Usage guidance (care instructions, best practices, limitations)
     - Comparison data (how products differ from each other)
     - Common issues (known defects, fit guidance, FAQ per product)
     - Inventory status (in stock, backordered, discontinued)
     - Promotional context (current sales, upcoming launches)
  3. Knowledge delivery methods:
     - Internal wiki (searchable, always current)
     - Product quick-reference cards (one-pagers per product)
     - Comparison matrices (side-by-side product comparisons)
     - Known issue alerts (recently discovered problems)
     - New arrival briefings (weekly/monthly knowledge updates)

  Part 2: Build a product knowledge system
  For "CycleGear" — an online cycling equipment store with
  2,000 SKUs across bikes, components, clothing, and accessories:

  1. Design the internal product wiki structure:
     - Category organization (bikes, components, clothing, accessories)
     - Product page template (what information every product entry needs)
     - Quick search and cross-reference system
     - Version control (who updated, when, what changed)
     - Integration with help desk (inline product lookup)

  2. Create 3 sample product knowledge pages:
     a) "CycleGear Pro Road Bike" ($1,899):
        Full specs, sizing guide, common questions, known issues,
        comparison with similar models, care instructions
     b) "Shimano 105 Groupset" ($699):
        Compatibility matrix, installation notes, common issues,
        comparison with Ultegra and Tiagra
     c) "CycleGear Waterproof Jersey" ($89):
        Material specs, size chart, care instructions, customer
        feedback summary, comparison with non-waterproof version

  3. Design the weekly knowledge update process:
     - New arrivals briefing (Monday morning)
     - Known issue alerts (as discovered, real-time)
     - Price change notifications
     - Seasonal inventory updates
     - Product training sessions (monthly deep dives)

  4. Create a product comparison tool:
     Design a template that agents can quickly fill out when
     customers ask "What's the difference between X and Y?"
     - Feature comparison matrix
     - Use case guidance (which is better for what scenario)
     - Price/value positioning
     - Customer review summary per product

  Part 3: Knowledge maintenance
  1. Keeping knowledge current (process for updates)
  2. Product knowledge testing for agents
  3. Using support data to improve product information
  4. Measuring the impact of better product knowledge on metrics

assertions:
  - type: llm_judge
    criteria: "The wiki structure is practical for 2,000 SKUs — it's searchable, well-organized, and agents can find information quickly during live conversations"
    weight: 0.30
    description: "Practical searchable wiki structure"
  - type: llm_judge
    criteria: "Sample product pages contain all information an agent needs — specs, sizing, known issues, and comparisons are all included"
    weight: 0.25
    description: "Complete product knowledge pages"
  - type: llm_judge
    criteria: "The weekly update process keeps knowledge current — new arrivals, price changes, and known issues are communicated systematically"
    weight: 0.25
    description: "Systematic knowledge updates"
  - type: llm_judge
    criteria: "The comparison tool helps agents make recommendations — it guides toward the right product for the customer's specific needs"
    weight: 0.20
    description: "Recommendation-enabling comparisons"
