meta:
  id: family-home-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a property listing description for a family home in the suburbs emphasizing schools and family amenities"
  tags: [family-home, suburbs, schools, beginner]

state: {}

trigger: |
  You're writing a listing description for a family
  home in a well-regarded school district.

  Property details:
  - 4 bed / 2.5 bath colonial, 2-story
  - 2,400 sq ft, built in 2005
  - Master suite with walk-in closet and en-suite
    bath (double vanity, soaking tub, separate shower)
  - Open-concept main floor with kitchen opening to
    family room (gas fireplace)
  - Kitchen: 42" cabinets, granite island, pantry
  - Finished basement (600 sq ft bonus space)
  - Backyard: 0.35 acres, patio, mature trees,
    swing set stays
  - 2-car attached garage
  - Neighborhood: Willow Creek subdivision, HOA
    maintains common areas, community pool, walking
    trails
  - Schools: Willow Creek Elementary (9/10), Lincoln
    Middle (8/10), Washington High (9/10) — all
    within 2 miles
  - Address: 1423 Birchwood Lane, Willow Creek
  - List price: $475,000

  Target buyer: Growing families upgrading from
  starter homes.

  Write:
  1. MLS listing description (250 words max)
  2. Family-focused marketing narrative (400 words)
  3. Open house flyer text (highlights for print
     flyer, including 8 bullet points)
  4. Email blast text for buyer's agents (150 words,
     professional tone)

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 pieces — MLS description (250 words max); family-focused narrative (400 words); open house flyer with 8 bullet points; buyer's agent email blast (150 words). Property details are accurate."
    weight: 0.35
    description: "FamilyListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates family-focused marketing — school ratings are prominently featured; the narrative envisions family life in the home; the finished basement and backyard are positioned as family assets; community amenities (pool, trails) are highlighted."
    weight: 0.35
    description: "FamilyMarketingQuality"
  - type: llm_judge
    criteria: "Response would attract growing families — the listing connects the home to the family lifestyle (not just features); school proximity and ratings are a key selling point; the swing set and community pool create emotional appeal; the agent email is professional and actionable."
    weight: 0.30
    description: "FamilyBuyerOutcome"
