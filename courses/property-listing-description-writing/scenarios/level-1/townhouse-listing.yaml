meta:
  id: townhouse-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a listing description for a townhouse balancing the benefits of homeownership with low-maintenance living"
  tags: [townhouse, low-maintenance, homeownership, beginner]

state: {}

trigger: |
  You're writing a listing description for a
  townhouse that appeals to buyers who want
  homeownership without the full maintenance burden.

  Property details:
  - 3 bed / 2.5 bath, 3-story end unit
  - 1,650 sq ft, built in 2016
  - End unit advantage: extra windows on 3 sides,
    only 1 shared wall
  - Main level: Open living/dining/kitchen with
    9-ft ceilings, half bath, patio access
  - Upper level: 2 bedrooms + primary suite with
    walk-in closet and en-suite
  - Lower level: Finished rec room, storage, garage
    access
  - 1-car attached garage + 1 driveway pad
  - Private fenced patio (12x15) with gas line for
    grill
  - HOA: $210/month (exterior maintenance, snow
    removal, landscaping, common area upkeep)
  - Community: Brookstone Village — pool, playground,
    walking paths
  - Location: 10 min to commuter rail, walkable to
    shops and restaurants
  - Address: 88 Brookstone Way, Unit A, Brookstone
    Village
  - List price: $385,000

  Write:
  1. MLS listing description (250 words max)
  2. Marketing description for "lock-and-leave"
     lifestyle (300 words targeting busy
     professionals and downsizers)
  3. Comparative advantage statement (how this
     townhouse compares to similarly priced condos
     and single-family homes)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (250 words max); lock-and-leave lifestyle description (300 words); comparative advantage statement vs condos and single-family. End unit and low-maintenance benefits are highlighted."
    weight: 0.35
    description: "TownhouseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates townhouse positioning skill — the end unit premium is emphasized; the HOA is framed as a value (not just a cost); the lifestyle description appeals to busy professionals; the comparative statement clearly differentiates from condos and houses."
    weight: 0.35
    description: "TownhousePositioningQuality"
  - type: llm_judge
    criteria: "Response would attract the right buyer — busy professionals would see the convenience; downsizers would appreciate the maintenance-free living; the listing bridges homeownership desire with low-maintenance reality."
    weight: 0.30
    description: "TownhouseBuyerOutcome"
