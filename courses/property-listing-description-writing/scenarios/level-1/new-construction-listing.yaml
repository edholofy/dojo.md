meta:
  id: new-construction-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a listing description for a new construction home highlighting modern features and builder quality"
  tags: [new-construction, builder, modern, beginner]

state: {}

trigger: |
  You're writing a listing description for a new
  construction home in a planned community. The home
  is complete and ready for move-in.

  Property details:
  - 4 bed / 3 bath, 2-story craftsman style
  - 2,800 sq ft + 400 sq ft covered patio
  - Builder: Crestview Homes (10-year structural
    warranty)
  - Energy features: spray foam insulation, dual-pane
    low-E windows, ENERGY STAR appliances, smart
    thermostat, 200-amp electrical panel (EV-ready)
  - Smart home: Ring doorbell, smart locks, pre-wired
    for surround sound, USB outlets throughout
  - Kitchen: 10-ft island with waterfall quartz,
    36" gas range, pot filler, walk-in pantry
  - Primary suite: Tray ceiling, spa bath with
    freestanding tub, oversized walk-in closet with
    built-in organizers
  - 2-car garage with epoxy floors and extra storage
  - Community: Crestview Meadows — pool, clubhouse,
    dog park, 2 miles of walking trails
  - Address: 95 Meadow Ridge Way, Crestview Meadows
  - List price: $565,000
  - Builder incentive: $10,000 closing cost credit
    with preferred lender

  Write:
  1. MLS listing description (250 words max)
  2. Builder marketing brochure text (400 words
     emphasizing quality, energy efficiency, and
     community)
  3. Feature highlights for the spec sheet (10 key
     features with brief descriptions)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (250 words max); builder marketing brochure (400 words); spec sheet with 10 feature highlights. Builder incentive and warranty are mentioned."
    weight: 0.35
    description: "NewConstructionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates new construction marketing — energy efficiency is quantified where possible; smart home features are highlighted as lifestyle benefits; the warranty and builder reputation build confidence; the closing cost incentive creates urgency."
    weight: 0.35
    description: "NewConstructionMarketingQuality"
  - type: llm_judge
    criteria: "Response would differentiate from resale listings — the listing emphasizes that everything is new (no deferred maintenance); modern features position the home as future-ready; the community amenities add value beyond the home itself."
    weight: 0.30
    description: "NewVsResaleOutcome"
