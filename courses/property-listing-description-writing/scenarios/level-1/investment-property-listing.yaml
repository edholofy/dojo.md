meta:
  id: investment-property-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a listing description for a duplex investment property targeting real estate investors"
  tags: [investment, duplex, rental-income, investor, beginner]

state: {}

trigger: |
  You're writing a listing for a duplex targeting
  investors. The listing must emphasize income
  potential and investment fundamentals.

  Property details:
  - Side-by-side duplex (not stacked)
  - Unit A: 2 bed / 1 bath, 850 sq ft — currently
    rented at $1,200/month (lease expires Aug 2026)
  - Unit B: 2 bed / 1 bath, 850 sq ft — currently
    rented at $1,150/month (lease expires Nov 2026)
  - Total building: 1,700 sq ft, built in 1985
  - Separate utilities (each tenant pays own)
  - Shared: Coin laundry in basement, parking lot
    (4 spots)
  - Recent improvements: New roof (2023), updated
    electrical panels (2024), exterior paint (2024)
  - Current gross rent: $28,200/year
  - Annual expenses (taxes, insurance, maintenance):
    ~$7,800
  - NOI: ~$20,400
  - Address: 225-227 Oak Street, Riverside
  - List price: $265,000

  Target buyer: First-time real estate investor or
  portfolio builder.

  Write:
  1. MLS listing description (250 words max) with
     investment metrics
  2. Investor marketing sheet (key financial metrics
     presented clearly: cap rate, gross rent
     multiplier, cash-on-cash return assumptions)
  3. "Why this duplex" summary (5 bullet points
     for why this is a smart first investment)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (250 words max); investor marketing sheet with cap rate, GRM, and cash-on-cash return calculations; 5-point investment summary. Financial figures are accurate and clearly presented."
    weight: 0.35
    description: "InvestmentListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates investment property marketing — cap rate is correctly calculated (~7.7%); NOI and expenses are clearly stated; recent improvements reduce near-term capex risk; separate utilities are highlighted as an advantage; tenant leases provide immediate income."
    weight: 0.35
    description: "InvestmentMarketingQuality"
  - type: llm_judge
    criteria: "Response would attract investors — financial metrics make the investment case clear; the listing positions this as an accessible first investment; the 5-point summary addresses common investor concerns; the listing doesn't oversell or misrepresent returns."
    weight: 0.30
    description: "InvestorAttractionOutcome"
