meta:
  id: beginner-listing-shift
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Shift simulation — write listing descriptions for a lakefront cottage, a downtown loft, and a horse property using different tones and styles"
  tags: [shift-simulation, multi-property, beginner]

state: {}

trigger: |
  You're a real estate agent with three new listings
  that each require a completely different marketing
  approach.

  === LISTING 1: Lakefront Cottage ===
  2 bed / 1 bath, 950 sq ft, built in 1960. 75 ft
  of lake frontage on Crystal Lake. Screened-in porch
  overlooking the water. Original knotty pine
  interior. Private dock with boat lift. Woodburning
  fireplace. Well and septic. Seasonal cabin feel
  with year-round potential. Price: $325,000.
  Target: Vacation home buyers, retirees seeking
  tranquility.

  Write: MLS listing (200 words) + a "lifestyle
  escape" marketing piece (250 words) that sells
  the feeling of lake living.

  === LISTING 2: Downtown Loft ===
  1 bed / 1 bath, 1,100 sq ft in a converted 1920s
  textile warehouse. 14-ft exposed brick ceilings,
  original timber beams, polished concrete floors,
  oversized industrial windows. Open floor plan.
  Building has 24 units, rooftop access, secured
  entry. Walk to 20+ restaurants, 3 music venues,
  art galleries. No parking (street only). Price:
  $289,000.
  Target: Creatives, young professionals, urban
  enthusiasts.

  Write: MLS listing (200 words) + an "urban
  creative" marketing piece (250 words) that
  emphasizes the industrial character and
  neighborhood energy.

  === LISTING 3: Horse Property ===
  4 bed / 3 bath, 3,200 sq ft on 12 acres. 6-stall
  barn with tack room and wash bay, 3 fenced
  pastures, round pen, riding arena (100x200).
  Property has creek, spring-fed pond, and 3 acres
  of mixed hardwood forest. Main house: wrap-around
  porch, country kitchen, mudroom. 30-min to town.
  Price: $675,000.
  Target: Equestrians, hobby farmers, rural lifestyle
  seekers.

  Write: MLS listing (250 words) + an "equestrian
  lifestyle" marketing piece (300 words) that speaks
  to horse owners specifically.

  Write all six pieces.

assertions:
  - type: llm_judge
    criteria: "Response creates all 6 pieces — lakefront MLS (200 words) + lifestyle escape (250 words); downtown loft MLS (200 words) + urban creative (250 words); horse property MLS (250 words) + equestrian lifestyle (300 words). Property details are accurate across all listings."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response adapts tone appropriately — the lakefront piece evokes serenity and nature; the loft piece pulses with urban energy and creative spirit; the horse property speaks knowledgeably to equestrians with barn and arena details; each listing has a distinct voice."
    weight: 0.35
    description: "ToneAdaptationQuality"
  - type: llm_judge
    criteria: "Response would attract each target buyer — vacation seekers would feel the lake calling; creatives would envision themselves in the loft; equestrians would recognize this as a serious horse property; each listing connects features to the target lifestyle."
    weight: 0.30
    description: "TargetedAttractionOutcome"
