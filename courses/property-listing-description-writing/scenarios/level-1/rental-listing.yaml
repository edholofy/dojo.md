meta:
  id: rental-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a rental property listing description for an apartment targeting tenants on Apartments.com and Craigslist"
  tags: [rental, apartment, tenant, beginner]

state: {}

trigger: |
  You're a property manager writing rental listing
  descriptions for a vacant apartment unit.

  Property details:
  - 2 bed / 1 bath, second floor of a 3-story
    walk-up
  - 900 sq ft, recently renovated
  - Renovations: new LVP flooring, painted cabinets,
    new countertops, updated bathroom tile, new
    lighting fixtures
  - Laundry: Shared in-building (basement), coin-op
  - Parking: 1 assigned spot included, additional $75
  - Pet policy: Cats allowed ($250 deposit), no dogs
  - Utilities: Tenant pays electric and gas; water/
    sewer/trash included
  - Lease: 12-month minimum
  - Available: March 1, 2026
  - Rent: $1,450/month, $1,450 security deposit
  - Location: 3 blocks from Metro station, 1 block
    from grocery store
  - Address: 340 Park Ave, Unit 2B, Midtown

  Write:
  1. Apartments.com listing (300 words, highlight
     features and neighborhood)
  2. Craigslist posting (shorter, 150 words, include
     key details tenants search for)
  3. Leasing inquiry response template (professional
     email responding to an interested tenant with
     showing details and application info)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — Apartments.com listing (300 words); Craigslist posting (150 words); leasing inquiry response email. All essential details (rent, beds/baths, pet policy, utilities, availability) are included."
    weight: 0.35
    description: "RentalListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates rental marketing skill — Apartments.com listing is detailed and searchable; Craigslist is concise with key facts upfront; the response template is professional and provides actionable next steps; fair housing language is used throughout."
    weight: 0.35
    description: "RentalMarketingQuality"
  - type: llm_judge
    criteria: "Response would fill the vacancy quickly — the listing highlights recent renovations and location advantages; pet policy and utilities are clearly stated (reducing unqualified inquiries); the response template moves prospects toward application."
    weight: 0.30
    description: "VacancyReductionOutcome"
