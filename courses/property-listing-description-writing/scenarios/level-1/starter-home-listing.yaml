meta:
  id: starter-home-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a property listing description for a modest starter home targeting first-time homebuyers"
  tags: [starter-home, first-time-buyers, residential, beginner]

state: {}

trigger: |
  You're a real estate agent writing a listing
  description for a starter home in a suburban
  neighborhood.

  Property details:
  - 3 bed / 1.5 bath ranch-style home
  - 1,150 sq ft, built in 1978
  - Lot size: 0.22 acres, fenced backyard
  - Recent updates: new roof (2024), updated kitchen
    with granite counters and stainless appliances
  - Original hardwood floors throughout
  - Attached 1-car garage
  - Central A/C (2022), gas furnace (2020)
  - Address: 847 Maple Drive, Oakdale
  - List price: $245,000
  - School district: Oakdale Unified (rated 7/10)
  - Commute: 25 min to downtown, near I-94

  Target buyer: First-time homebuyers, young couples,
  small families looking for an affordable entry
  into homeownership.

  Write:
  1. MLS listing description (250-word max, following
     standard MLS format with feature highlights)
  2. Extended marketing description for Zillow/
     Realtor.com (400 words, more narrative style)
  3. Social media post (Instagram/Facebook — short,
     engaging, with suggested hashtags)
  4. Key selling points list (5 bullet points for
     the flyer)

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 pieces — MLS description (250-word max); extended Zillow/Realtor.com narrative (400 words); social media post with hashtags; 5-point selling points list. All property details are accurately represented."
    weight: 0.35
    description: "ListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates listing writing skill — MLS description follows standard format with key features upfront; the Zillow narrative uses benefit language (not just features); social media is engaging and shareable; selling points highlight value for first-time buyers."
    weight: 0.35
    description: "ListingWritingQuality"
  - type: llm_judge
    criteria: "Response would attract first-time buyers — the language emphasizes affordability, move-in readiness, and recent updates; the listing creates excitement without overpromising; the price-to-value story is compelling."
    weight: 0.30
    description: "BuyerAttractionOutcome"
