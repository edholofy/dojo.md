meta:
  id: fixer-upper-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a listing description for a fixer-upper that honestly represents the condition while highlighting potential"
  tags: [fixer-upper, investor, potential, honest, beginner]

state: {}

trigger: |
  You're writing a listing description for a home
  that needs significant work. The challenge is
  being honest about the condition while highlighting
  the opportunity.

  Property details:
  - 3 bed / 1 bath bungalow, single story
  - 1,050 sq ft, built in 1952
  - "As-is" sale — seller will not make repairs
  - Condition issues: Original kitchen and bath
    (functional but dated), some hardwood floors need
    refinishing, exterior paint peeling, HVAC is 18
    years old, roof has 5-7 years remaining
  - Positives: Solid bones (brick exterior, good
    foundation per inspection), large lot (0.4 acres),
    detached 2-car garage/workshop, mature oak trees,
    desirable Elmwood neighborhood with homes selling
    for $350K-$450K when renovated
  - No HOA, R-2 zoning (allows ADU/in-law suite)
  - Address: 612 Elm Street, Elmwood
  - List price: $189,000 (comparable renovated homes:
    $380K-$420K)

  Target buyer: Investors, flippers, handy buyers
  looking for sweat equity.

  Write:
  1. MLS listing description (250 words max) that
     is honest about condition but emphasizes
     opportunity
  2. Investor-focused marketing description (300
     words with ARV analysis framing)
  3. "Opportunity profile" — key renovation potential
     highlights (5-6 bullet points)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (250 words max) that's honest about as-is condition; investor-focused description (300 words) with ARV framing; opportunity profile with 5-6 renovation highlights."
    weight: 0.35
    description: "FixerUpperCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates honest marketing skill — condition issues are disclosed without being discouraging; 'as-is' is clear; positive framing focuses on potential not deception; ARV analysis positions the investment opportunity; the listing doesn't use misleading euphemisms."
    weight: 0.35
    description: "HonestMarketingQuality"
  - type: llm_judge
    criteria: "Response would attract the right buyers — investors would see the profit potential; handy buyers would see the sweat equity opportunity; the listing wouldn't attract buyers who'd be disappointed by the condition; the price-to-ARV spread is compelling."
    weight: 0.30
    description: "RightBuyerOutcome"
