meta:
  id: vacant-land-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a listing description for a vacant residential lot emphasizing building potential and location"
  tags: [vacant-land, lot, building-potential, beginner]

state: {}

trigger: |
  You're writing a listing description for a vacant
  residential lot. Selling land requires a different
  approach than selling a home — you're selling
  possibility.

  Property details:
  - 1.2 acres, gently sloping with southern exposure
  - Zoned R-1 (single family residential)
  - Utilities available at the road: city water,
    sewer, electric, natural gas, fiber internet
  - Perk test passed (also suitable for septic)
  - No HOA, no architectural restrictions
  - Mature trees along the perimeter providing
    privacy, cleared center suitable for building
  - Views: Partial mountain views from the higher
    elevation of the lot
  - Soil test completed, suitable for standard
    foundation
  - Neighborhood: Adjacent to established homes in
    the $400K-$600K range
  - Access: Paved road frontage, 100 ft
  - Location: 15 min to downtown, 5 min to
    elementary school and shopping
  - Address: Lot 7, Ridge View Road, Summit Hills
  - List price: $95,000

  Write:
  1. MLS listing description (200 words max)
  2. Builder/developer-focused marketing piece (250
     words)
  3. "Dream home" buyer marketing piece (250 words
     emphasizing the canvas for their vision)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (200 words max); builder-focused description (250 words); dream home buyer description (250 words). Technical details (zoning, utilities, perk test, soil test) are included appropriately."
    weight: 0.35
    description: "VacantLandCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates land marketing skill — the MLS includes essential development-ready facts; the builder piece emphasizes buildability and comparable values; the dream home piece sells vision and possibility; each targets its audience differently."
    weight: 0.35
    description: "LandMarketingQuality"
  - type: llm_judge
    criteria: "Response would attract the right buyer — builders would see a buildable, profitable lot; dream home buyers would envision their custom home; the mountain views and privacy are positioned as premium features; the price is contextualized against neighboring home values."
    weight: 0.30
    description: "LandBuyerOutcome"
