meta:
  id: condo-listing
  level: 1
  course: property-listing-description-writing
  type: output
  description: "Write a property listing description for an urban condo targeting young professionals"
  tags: [condo, urban, young-professionals, beginner]

state: {}

trigger: |
  You're writing a listing description for an urban
  condo in a trendy neighborhood.

  Property details:
  - 1 bed / 1 bath, 5th floor corner unit
  - 780 sq ft, built in 2018
  - Open-concept kitchen/living with floor-to-ceiling
    windows facing west (sunset views)
  - Quartz countertops, waterfall island, soft-close
    cabinets
  - In-unit washer/dryer
  - One assigned parking spot in secured garage
  - Building amenities: rooftop deck, fitness center,
    package room, bike storage
  - HOA: $385/month (includes water, trash, building
    insurance, amenities)
  - Walk Score: 92, Bike Score: 87
  - Near: 3 restaurants, coffee shop, yoga studio,
    co-working space within 2 blocks
  - Address: Unit 512, The Atelier, 220 Commerce St,
    Riverview Arts District
  - List price: $329,000

  Target buyer: Young professional, single or couple,
  values walkability and urban lifestyle.

  Write:
  1. MLS listing description (250 words max)
  2. Lifestyle-focused marketing description (350
     words emphasizing the neighborhood and lifestyle)
  3. Virtual tour script (narration for a 2-minute
     video walkthrough)

assertions:
  - type: llm_judge
    criteria: "Response creates all 3 pieces — MLS description (250 words max); lifestyle marketing description (350 words); virtual tour script (2-minute narration). Property details and amenities are accurately represented."
    weight: 0.35
    description: "CondoListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates condo marketing expertise — MLS highlights the corner unit, views, and building amenities; lifestyle description paints a picture of daily urban living; the virtual tour script guides viewers logically through the space; Walk Score and neighborhood are emphasized."
    weight: 0.35
    description: "CondoMarketingQuality"
  - type: llm_judge
    criteria: "Response would appeal to young professionals — the lifestyle narrative resonates with urban living values; the listing makes the HOA fee seem justified; the neighborhood description creates FOMO; the virtual tour builds emotional connection."
    weight: 0.30
    description: "TargetBuyerAppealOutcome"
