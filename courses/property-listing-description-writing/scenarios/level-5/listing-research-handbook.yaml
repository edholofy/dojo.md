meta:
  id: listing-research-handbook
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Author chapters for the definitive academic handbook on real estate marketing communications — editorial framework and 3 authored chapters"
  tags: [research-handbook, academic, real-estate-marketing, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Handbook of
  Real Estate Marketing Communications," commissioned
  as the first comprehensive academic treatment of
  property marketing language.

  Handbook scope:
  - 22 chapters by 35+ contributing authors
  - Bridges real estate, marketing, linguistics,
    behavioral economics, and law
  - Target: Researchers, graduate students, industry
    leaders

  Design the complete handbook:
  1. Editorial introduction: Why real estate marketing
     communications deserve academic study (~1,500
     words)
  2. Table of contents: 22 chapters organized into
     5 parts with descriptions
  3. Write Chapter 1: "The Evolution of Property
     Descriptions: From Classified Ads to AI" (~3,000
     words)
  4. Write Chapter 11: "The Linguistics of Listing
     Descriptions: Persuasion, Framing, and Buyer
     Behavior" (~3,000 words)
  5. Write Chapter 22: "The Future of Real Estate
     Marketing Language in the AI Era" (~3,000 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — editorial introduction; 22-chapter TOC in 5 parts; Chapter 1 history (~3,000 words); Chapter 11 linguistics (~3,000 words); Chapter 22 future (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic scholarship — chapters reference relevant literature from real estate, marketing, and linguistics; the history traces from newspaper classifieds to AI; the linguistics chapter applies persuasion theory to listing language; the future chapter engages current AI trends."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "Response would establish a new field — the handbook would be cited in research; Chapter 11 would connect linguistics to real estate practice; the 22-chapter structure would comprehensively cover the field; the handbook would attract cross-disciplinary interest."
    weight: 0.30
    description: "FieldEstablishmentOutcome"
