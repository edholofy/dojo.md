meta:
  id: listing-technology-unicorn
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Build a unicorn startup around AI-powered listing content — product vision, Series C pitch, and category creation"
  tags: [unicorn, startup, ai-listing, category-creation, master]

state: {}

trigger: |
  You're the CEO of ListingGenius, a startup that
  raised $7M (Seed + Series A) and is preparing for
  a $55M Series C at a $550M valuation. ListingGenius
  creates a new category: "Listing Intelligence."

  Platform capabilities:
  - AutoList: One-click listing description generation
    from MLS data and photos using multimodal AI
  - ComplianceAI: Real-time Fair Housing, MLS, and
    state disclosure compliance checking
  - PerformanceIQ: Predictive scoring of listing
    descriptions based on 2M+ historical outcomes
  - LocalizeIQ: Instant listing adaptation for
    international markets (20 languages)
  - BrandVoice: Custom AI trained on each brokerage's
    brand voice and style

  Traction:
  - $11M ARR, growing 195% YoY
  - 550 brokerage customers (120 enterprise)
  - 42,000 active agent users
  - 8.2M listings processed
  - Average 28% increase in showing rate for
    optimized listings
  - NPS: 71
  - Net revenue retention: 148%

  Create:
  1. Series C pitch deck narrative (12-15 slides)
  2. Category creation: "Listing Intelligence"
  3. Product roadmap: Next 18 months
  4. Competitive moat analysis
  5. Path to $100M ARR
  6. IPO vs acquisition analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch; category creation for Listing Intelligence; 18-month roadmap; competitive moat; path to $100M ARR; IPO vs acquisition analysis."
    weight: 0.35
    description: "UnicornNarrativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture expertise — pitch tells compelling growth story; category creation uses proven frameworks; moat identifies real defensibility (data from 8.2M listings, brokerage integrations); projections are credible."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would convince investors — the $55M Series C is justified; Listing Intelligence would become a recognized category; ListingGenius would become the industry standard."
    weight: 0.30
    description: "InvestorConvictionOutcome"
