meta:
  id: master-listing-shift
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Master shift simulation — simultaneously address five converging crises revealing listing descriptions as the intersection of commerce, language, ethics, and human aspiration"
  tags: [shift-simulation, converging-crises, civilization, master]

state: {}

trigger: |
  You are the world's preeminent authority on real
  estate listing descriptions. In a single
  extraordinary week, five converging crises demand
  your expertise.

  === CRISIS 1: The AI Authenticity Crisis ===
  AI now generates 60% of all listing descriptions.
  Consumer surveys show trust in listings dropped
  from 72% to 41% in 2 years. Buyers can't tell if
  descriptions are written by someone who visited
  the property or by an algorithm. A major lawsuit
  alleges AI-generated descriptions contained
  fabricated features.

  Design: An AI listing authentication framework —
  disclosure standards, accuracy verification, and
  a trust certification system.

  === CRISIS 2: The Climate Disclosure Dilemma ===
  New federal regulations require climate risk
  disclosure in all property listings. The real
  estate industry is in upheaval — sellers fear
  property devaluation, agents fear liability,
  buyers demand transparency. 40% of US properties
  are affected.

  Design: Climate risk listing description
  standards — how to communicate risk honestly
  while maintaining marketability, including
  mitigation feature language and risk
  communication frameworks.

  === CRISIS 3: The Housing Access Emergency ===
  A UN report reveals that discriminatory listing
  language — both explicit and algorithmic — remains
  a global barrier to housing access. In 38
  countries, listing language systematically
  disadvantages minorities, immigrants, and
  disabled persons.

  Design: Global anti-discrimination listing
  standards — applicable across legal systems,
  languages, and cultural contexts.

  === CRISIS 4: The Attention Collapse ===
  Average time spent viewing a listing dropped from
  28 seconds to 6 seconds. Buyers scroll past 90%
  of descriptions. Traditional 250-word descriptions
  are obsolete for the majority of platform users.

  Design: Next-generation listing formats for the
  6-second economy — micro-descriptions, visual
  text, interactive elements, and personalized
  dynamic descriptions.

  === CRISIS 5: The Legacy Question ===
  After 25 years writing about homes, you face the
  ultimate question: What is the relationship between
  how we describe a home and how we value human
  shelter? Write the document that captures what
  you've learned about the power of words to shape
  real estate markets, communities, and lives.

  Task: Write complete responses to all five crises.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI authentication framework; climate disclosure standards; global anti-discrimination standards; next-generation 6-second formats; philosophical legacy on words and shelter."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of listing descriptions as societal infrastructure — AI crisis reveals trust as the foundation of markets; climate disclosure shows that transparency and marketability can coexist; discrimination crisis proves that words shape housing access; attention collapse demands evolution; the legacy connects descriptions to human dignity."
    weight: 0.35
    description: "SocietalInfrastructureMastery"
  - type: llm_judge
    criteria: "Response would define the future of real estate marketing — the AI framework would restore trust; climate standards would enable transparent markets; anti-discrimination standards would expand housing access globally; new formats would engage modern buyers; the legacy would inspire the next generation to see listing descriptions as a force for both commerce and justice."
    weight: 0.30
    description: "FutureDefiningOutcome"
