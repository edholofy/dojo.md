meta:
  id: listing-graduate-program
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Design a graduate certificate in Real Estate Marketing Communications — curriculum, industry partnerships, and applied research"
  tags: [graduate-program, academic, curriculum, master]

state: {}

trigger: |
  You've been appointed to design a graduate
  certificate program in Real Estate Marketing
  Communications at a major university's school of
  business. This is the first academic program
  specifically focused on real estate marketing
  content, including listing descriptions.

  Program vision: Create the first academically
  rigorous program that combines real estate
  marketing, persuasive writing, digital marketing,
  compliance, and data analytics applied specifically
  to property marketing.

  Design the program:
  1. Academic rationale — why real estate marketing
     deserves specialized education
  2. Graduate certificate curriculum (6 courses):
     - Core courses (4 courses with descriptions)
     - Elective tracks: Luxury/International, Digital/
       PropTech, Commercial Real Estate
  3. Capstone project requirements (industry
     partnership applied project)
  4. Industry advisory board (composition and role)
  5. Faculty profiles (4 positions — mix of academic
     and industry)
  6. Student recruitment strategy (targeting agents,
     coordinators, marketing professionals)
  7. Industry partnership model (brokerages, portals,
     MLS organizations as partners)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete program — academic rationale; 6-course curriculum with 3 elective tracks; capstone requirements; advisory board; 4 faculty profiles; recruitment strategy; industry partnerships."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic and industry expertise — courses cover the full scope of real estate marketing communications; elective tracks address genuine specializations; the capstone is applied and industry-connected; faculty profiles are interdisciplinary."
    weight: 0.35
    description: "AcademicDesignQuality"
  - type: llm_judge
    criteria: "Response would attract students and industry support — the program fills a genuine gap; graduates would be immediately valuable to brokerages; industry partners would sponsor students and projects; the program would elevate the profession."
    weight: 0.30
    description: "ProgramSuccessOutcome"
