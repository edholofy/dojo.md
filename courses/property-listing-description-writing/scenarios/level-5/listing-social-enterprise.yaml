meta:
  id: listing-social-enterprise
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Found a social enterprise that brings quality listing descriptions to underserved markets — affordable housing, rural properties, FSBO sellers, and minority-owned brokerages"
  tags: [social-enterprise, equity, underserved, access, master]

state: {}

trigger: |
  You're founding "ListingEquity," a social
  enterprise whose mission is: "Every property
  deserves a great description, regardless of
  price point or market."

  Target populations:
  1. Affordable housing providers (public housing
     authorities, community land trusts, nonprofits):
     Listings for affordable units often use
     institutional language that stigmatizes residents.
     Design listing templates that market affordable
     housing with dignity and appeal.
  2. Rural property sellers: Properties in rural
     areas get 60% fewer online views than suburban.
     Agents in rural markets lack marketing resources.
     Create marketing toolkits optimized for rural
     property types (farms, large lots, off-grid).
  3. FSBO sellers: For-sale-by-owner sellers often
     write poor descriptions that undersell their
     homes by an average of 5.5%. Create a free
     self-service listing description tool.
  4. Minority-owned brokerages: Small minority-owned
     brokerages often can't afford marketing staff.
     Provide free listing writing training and
     templates.

  Create the social enterprise:
  1. Mission, theory of change, impact metrics
  2. Service design for each population
  3. Content creation model (volunteer writers,
     AI-assisted, open-source templates)
  4. Funding model (grants, cross-subsidy, portal
     partnerships)
  5. Impact measurement framework
  6. 3-year growth plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission and theory of change; services for all 4 populations; content creation model; funding model; impact measurement; 3-year plan."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social impact expertise — affordable housing templates preserve dignity; rural toolkits address actual rural property types; the FSBO tool is genuinely self-service; minority brokerage support is empowering not patronizing."
    weight: 0.35
    description: "SocialImpactExpertise"
  - type: llm_judge
    criteria: "Response would achieve equitable outcomes — affordable housing would be marketed with appeal; rural properties would get more views; FSBO sellers would close the 5.5% gap; minority brokerages would compete more effectively."
    weight: 0.30
    description: "EquityOutcome"
