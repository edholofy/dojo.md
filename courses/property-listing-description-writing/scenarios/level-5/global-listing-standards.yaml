meta:
  id: global-listing-standards
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Found a global standards body for property listing quality — charter, standards framework, and international certification"
  tags: [standards-body, global, certification, master]

state: {}

trigger: |
  You're founding the International Property
  Listing Standards Council (IPLSC), a global body
  that will set quality standards for property
  listing descriptions worldwide.

  Context:
  - No global standards for listing description
    quality
  - Misleading listings cost consumers billions
  - Fair Housing/anti-discrimination laws differ
    by country
  - AI-generated listings flood markets with no
    quality control
  - Cross-border property marketing has no standards
  - Consumer trust in online listings is declining

  Create:
  1. IPLSC charter — mission, vision, governance,
     founding board (12 members from 8 countries)
  2. Property Listing Quality Standard (PLQS-1000):
     a. Content accuracy and completeness
     b. Anti-discrimination compliance
     c. Consumer protection and transparency
     d. Accessibility and inclusion
     e. Digital optimization and discoverability
     f. Photography and multimedia standards
  3. Certified Listing Professional (CLP) credential
  4. Platform accreditation (for listing portals)
  5. Relationship to existing standards (MLS rules,
     RESO Data Dictionary, local regulations)
  6. 5-year strategic plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — charter with international governance; PLQS-1000 with 6 domains; CLP credential; platform accreditation; existing standards integration; 5-year plan."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates international standards expertise — the charter accommodates different legal systems; PLQS domains are comprehensive; CLP requirements are rigorous; platform accreditation addresses Zillow-type portals; RESO integration is practical."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would establish global influence — IPLSC would be recognized internationally; PLQS-1000 would be adopted; CLP would become a valued credential; consumer trust in listings would improve; AI-generated listing quality would be standardized."
    weight: 0.30
    description: "GlobalInfluenceOutcome"
