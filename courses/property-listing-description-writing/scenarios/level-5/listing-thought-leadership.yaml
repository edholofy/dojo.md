meta:
  id: listing-thought-leadership
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Establish thought leadership in real estate listing marketing — keynote speech, manifesto, industry article, and TEDx talk"
  tags: [thought-leadership, keynote, manifesto, master]

state: {}

trigger: |
  You're the world's foremost authority on real
  estate listing descriptions. After 20 years
  revolutionizing how properties are marketed
  through words, you've been invited to share your
  vision.

  Create 4 thought leadership pieces:

  1. Keynote speech: "250 Words That Move Markets"
     for the NAR Annual Conference (20,000 attendees)
     (~1,500 words). Argue that listing descriptions
     are the most undervalued and underleveraged
     marketing tool in real estate.

  2. "The Listing Description Manifesto" — 10
     principles that challenge how the industry
     thinks about property descriptions. Each
     principle should be provocative and backed by
     data or logic.

  3. Inman News feature article: "Why Your Listing
     Descriptions Are Costing You $2 Billion"
     (~2,000 words). Quantify the industry-wide cost
     of poor listing descriptions through lost
     showings, extended DOM, and reduced sale prices.

  4. TEDx talk outline: "What Houses Tell Us About
     Language" (18-minute talk). Explore how the
     words we use to describe homes reveal our values,
     biases, and aspirations as a society.

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 pieces — keynote (~1,500 words); 10-principle manifesto; Inman article (~2,000 words) quantifying costs; TEDx outline on language and society."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates thought leadership — the keynote makes a data-backed case; manifesto principles genuinely challenge convention; the Inman article quantifies the $2B cost convincingly; the TEDx talk connects real estate language to broader human truths."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Response would influence the industry — the keynote would change agent behavior; the manifesto would be shared industry-wide; the Inman article would shift brokerage investment; the TEDx talk would elevate listing writing from a task to an art."
    weight: 0.30
    description: "IndustryInfluenceOutcome"
