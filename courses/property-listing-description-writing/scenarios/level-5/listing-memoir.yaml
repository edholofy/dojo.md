meta:
  id: listing-memoir
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Write a professional memoir about a career writing listing descriptions — 3 chapters on the art, ethics, and human impact of marketing homes"
  tags: [memoir, career-reflection, storytelling, master]

state: {}

trigger: |
  You've spent 25 years writing listing descriptions.
  From your first job crafting descriptions for a
  small-town broker to leading the content strategy
  for a global real estate platform, you've
  discovered that describing a home is describing
  a life.

  Write your memoir: "Selling Dreams: A Life in
  Listing Descriptions"

  Chapter 1: "The House That Wrote Itself" (~2,500
  words)
  Your first listing — a modest 2-bedroom bungalow
  belonging to an elderly widow moving to assisted
  living. She walked you through every room telling
  you stories: "This is where my husband proposed,"
  "This is where my children took their first steps."
  You realized that a listing description isn't about
  granite counters — it's about translating one
  family's meaning into another family's possibility.
  Explore: How descriptions bridge past and future.

  Chapter 7: "The Words We're Not Allowed to Say"
  (~2,500 words)
  The evolution of Fair Housing in listing language.
  You witnessed the industry's painful reckoning with
  discriminatory descriptions. You helped rewrite
  thousands of listings and trained hundreds of
  agents. But you also saw how compliance sometimes
  stripped descriptions of humanity. You found the
  balance between legal safety and authentic marketing.
  Explore: The tension between compliance and craft.

  Chapter 14: "A Billion Descriptions" (~2,500 words)
  Your crowning achievement: building the content
  strategy for a global platform with listings in
  30 languages across 20 countries. You discovered
  that how cultures describe homes reveals what they
  value. Japanese listings measure rooms in tatami.
  German listings lead with energy efficiency. Indian
  listings describe vastu shastra alignment. You
  learned that there is no universal way to describe
  a home — and that's what makes it beautiful.
  Explore: What listing descriptions reveal about
  human values worldwide.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 explores meaning and possibility; Chapter 7 explores Fair Housing tension; Chapter 14 explores global cultural differences; all use narrative storytelling."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — storytelling uses scenes not summaries; the widow's stories are moving; the Fair Housing chapter navigates a sensitive topic with nuance; the global chapter reveals genuine cultural insights; the voice is authentic."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "Response would resonate with readers — real estate professionals would see their work reflected; the memoir would elevate listing writing from mundane to meaningful; each chapter reveals deeper truths about homes, language, and human values."
    weight: 0.30
    description: "ReaderResonanceOutcome"
