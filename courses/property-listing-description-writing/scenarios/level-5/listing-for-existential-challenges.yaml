meta:
  id: listing-for-existential-challenges
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Create listing description frameworks for properties facing existential challenges — climate-vulnerable properties, post-disaster listings, and housing in declining communities"
  tags: [existential, climate, disaster, decline, master]

state: {}

trigger: |
  You're a real estate marketing ethicist advising
  on listing descriptions for properties facing
  unprecedented challenges.

  === CHALLENGE 1: Climate-Vulnerable Properties ===
  Properties in flood zones, wildfire corridors,
  and coastal erosion areas face a marketing paradox:
  agents must attract buyers while disclosing real
  risks. 40% of US properties face significant
  climate risk, but only 15 states require climate
  risk disclosure.

  Design: Ethical listing description guidelines
  for climate-vulnerable properties that balance
  marketability with transparency — including
  disclosure templates, mitigation feature
  marketing, and risk communication frameworks.

  === CHALLENGE 2: Post-Disaster Listings ===
  After natural disasters (hurricanes, wildfires,
  floods), thousands of properties enter the market
  simultaneously. Some are damaged, some are rebuilt,
  some are in communities that may not fully recover.
  Listing descriptions must navigate restoration
  claims, community viability, and buyer uncertainty.

  Design: Post-disaster listing description
  standards — condition categories, rebuilding
  documentation requirements, community recovery
  narratives, and buyer protection disclosures.

  === CHALLENGE 3: Declining Community Properties ===
  Properties in communities facing population loss,
  industrial departure, or economic decline face
  stigma. Descriptions must honestly represent the
  market while identifying genuine buyer value
  (affordability, space, community potential).

  Design: Ethical marketing framework for properties
  in declining markets — avoiding both
  misrepresentation and hopelessness, identifying
  genuine value, and targeting appropriate buyers.

  Write frameworks for all three challenges.

assertions:
  - type: llm_judge
    criteria: "Response creates frameworks for all 3 challenges — climate-vulnerable guidelines with disclosure templates; post-disaster standards with condition categories; declining community framework with ethical marketing principles."
    weight: 0.35
    description: "ExistentialChallengesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates ethical marketing expertise — climate disclosures balance transparency with marketability; post-disaster standards protect buyers without destroying markets; declining community marketing identifies genuine value without misrepresentation."
    weight: 0.35
    description: "EthicalMarketingExpertise"
  - type: llm_judge
    criteria: "Response would serve all stakeholders — buyers would make informed decisions; sellers in difficult markets would have fair representation; communities would maintain dignity; the frameworks would prevent litigation while supporting market function."
    weight: 0.30
    description: "StakeholderProtectionOutcome"
