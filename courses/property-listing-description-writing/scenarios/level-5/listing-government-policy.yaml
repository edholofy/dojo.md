meta:
  id: listing-government-policy
  level: 5
  course: property-listing-description-writing
  type: output
  description: "Draft national policy on property listing transparency — consumer protection standards, AI disclosure requirements, and fair marketing mandates"
  tags: [government-policy, consumer-protection, transparency, master]

state: {}

trigger: |
  You're the lead policy advisor to a federal
  commission on "Real Estate Consumer Protection in
  the Digital Age." The commission found that
  misleading listing descriptions are a significant
  source of consumer harm.

  Key findings:
  - 35% of listing descriptions contain material
    omissions (known issues not mentioned)
  - AI-generated listings are not disclosed as such
    in 92% of cases
  - Photo manipulation (virtual staging, enhanced
    colors) misleads 28% of buyers
  - International listings lack standardized
    consumer protections
  - Discriminatory listing language persists despite
    Fair Housing enforcement
  - Consumer complaints about misleading listings
    increased 340% since 2020
  - No federal standard for listing accuracy

  Draft the policy framework:
  1. Commission report: "The Trust Gap" — how
     misleading listings harm consumers
  2. Real Estate Listing Transparency Act:
     - Title I: Listing Accuracy Standards
     - Title II: AI and Technology Disclosure
       Requirements
     - Title III: Photo and Virtual Staging Standards
     - Title IV: Fair Housing Enforcement Enhancement
     - Title V: Consumer Complaint and Remediation
     - Title VI: Enforcement and Penalties
  3. Implementation guidance
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report on the trust gap; 6-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — accuracy standards are measurable; AI disclosure requirements address current technology; photo standards prevent manipulation; Fair Housing enhancement builds on existing law; consumer remediation is practical; penalties are proportionate."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would protect consumers — the 35% omission rate would decrease; AI listings would be disclosed; photo manipulation would be regulated; the 340% complaint increase would reverse; consumer trust in listings would be restored."
    weight: 0.30
    description: "ConsumerProtectionOutcome"
