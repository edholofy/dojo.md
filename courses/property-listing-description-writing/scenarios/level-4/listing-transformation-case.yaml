meta:
  id: listing-transformation-case
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Write a detailed transformation case study — how a struggling brokerage reinvented its listing descriptions and doubled its showing rate"
  tags: [transformation, case-study, turnaround, metrics, expert]

state: {}

trigger: |
  You're writing a detailed case study for a real
  estate industry conference about how Summit Realty,
  a mid-market brokerage, transformed its listing
  descriptions and achieved dramatic results.

  Before transformation (Year 1 baseline):
  - 120 agents, 1,800 listings/year
  - Average DOM (days on market): 45
  - Average showing-to-listing ratio: 8.2 showings
  - Average sale-to-list price: 96.8%
  - Fair Housing complaints: 12/year
  - Agent satisfaction with marketing support: 3.1/5
  - 0% of listings had SEO optimization
  - Listing descriptions written by agents (no review)

  After transformation (Year 3 results):
  - Average DOM: 28 (38% reduction)
  - Average showings: 14.6 (78% increase)
  - Sale-to-list: 99.1% (2.3 point improvement)
  - Fair Housing complaints: 1/year (92% reduction)
  - Agent satisfaction: 4.6/5
  - 100% SEO-optimized listings
  - Centralized content team with AI assistance

  Write the complete case study:
  1. Executive summary (300 words)
  2. Situation analysis — what was broken and why
  3. Transformation strategy — the 5 initiatives
     implemented over 3 years
  4. Implementation narrative — challenges, setbacks,
     and breakthroughs
  5. Results analysis with year-over-year metrics
  6. ROI calculation
  7. Lessons learned (5 key takeaways)
  8. Replication guide — how other brokerages can
     achieve similar results

assertions:
  - type: llm_judge
    criteria: "Response creates a complete case study — executive summary; situation analysis; 5 transformation initiatives; implementation narrative; year-over-year metrics; ROI calculation; 5 lessons learned; replication guide."
    weight: 0.35
    description: "CaseStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates strategic expertise — the 5 initiatives are logical and build on each other; implementation challenges are realistic; the metrics improvement is credibly attributed to specific initiatives; the ROI calculation connects listing quality to revenue."
    weight: 0.35
    description: "StrategicExpertise"
  - type: llm_judge
    criteria: "Response would inspire replication — the replication guide is actionable for other brokerages; lessons learned are practical; the case study would be compelling at an industry conference; attendees would leave with a concrete action plan."
    weight: 0.30
    description: "IndustryImpactOutcome"
