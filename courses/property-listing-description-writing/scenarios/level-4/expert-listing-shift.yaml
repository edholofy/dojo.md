meta:
  id: expert-listing-shift
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Shift simulation — design listing systems for a smart city development, an underwater hotel resort, and a Mars habitat concept"
  tags: [shift-simulation, futuristic, unprecedented, expert]

state: {}

trigger: |
  You're a visionary real estate marketing strategist
  asked to create listing descriptions for three
  unprecedented property types.

  === PROJECT 1: Smart City Development ===
  A $12B smart city being built from scratch
  (15,000 units, mixed-use, fully autonomous
  vehicles, AI-managed infrastructure, 100%
  renewable energy). First residents move in 2028.
  You're marketing the first 500 residential units
  (studios to 4-bed, $250K-$1.5M). The challenge:
  buyers must envision life in a city that doesn't
  yet exist.

  Create: Project-wide marketing narrative (500
  words) + 3 unit-type descriptions + FAQ addressing
  buyer concerns about buying in an unbuilt city.

  === PROJECT 2: Underwater Hotel Resort ===
  The world's first underwater luxury resort (50
  suites, 30 ft below ocean surface, transparent
  walls, marine life viewing, submarine transfer
  from shore). Opening 2029, taking reservations
  now. Nightly rate: $5,000-$25,000. The challenge:
  marketing an experience that no one has ever had.

  Create: Resort marketing narrative (400 words) +
  2 suite descriptions + booking page copy.

  === PROJECT 3: Mars Habitat Concept ===
  A company selling reservations for the first Mars
  residential habitat (launch 2035, 100 founding
  residents, $500K deposit). The habitat includes
  private quarters, communal spaces, hydroponic
  farms, and Earth-view observation deck. The
  challenge: marketing a home on another planet.

  Create: Mission narrative (400 words) + habitat
  unit description + reservation application copy.

  Write all pieces for all three projects.

assertions:
  - type: llm_judge
    criteria: "Response creates all pieces — smart city narrative + 3 unit descriptions + FAQ; underwater resort narrative + 2 suite descriptions + booking copy; Mars habitat narrative + unit description + reservation copy."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visionary marketing — smart city descriptions make the unbuilt feel real; underwater resort creates wonder without fantasy; Mars habitat balances aspiration with credibility; each adapts real estate marketing principles to unprecedented contexts."
    weight: 0.35
    description: "VisionaryMarketingQuality"
  - type: llm_judge
    criteria: "Response would generate interest — smart city early adopters would deposit; underwater resort guests would book; Mars pioneers would apply; each listing navigates the challenge of selling something that doesn't yet exist."
    weight: 0.30
    description: "PioneerAttractionOutcome"
