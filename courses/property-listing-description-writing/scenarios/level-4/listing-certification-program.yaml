meta:
  id: listing-certification-program
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Create a professional certification program for listing description specialists — competency framework, exam, and continuing education"
  tags: [certification, professional, competency, credentialing, expert]

state: {}

trigger: |
  You're partnering with NAR (National Association
  of Realtors) to create a new professional
  designation: CLS (Certified Listing Specialist).
  This would be the first designation focused
  specifically on listing description quality.

  Market justification:
  - 90%+ of buyers start online — listing quality
    directly impacts showing volume
  - Agents report spending more time on descriptions
    than any other marketing task
  - No existing training or certification for listing
    writing skill
  - Brokerages want to verify agent listing
    competency
  - AI disruption: agents need to demonstrate value
    beyond what AI can generate

  Design the certification program:
  1. Competency framework — 6 core competencies with
     proficiency indicators
  2. CLS designation requirements (education hours,
     exam, portfolio, experience)
  3. Exam blueprint — domains, weights, question
     types, passing score
  4. Required course curriculum (16-hour program
     with modules)
  5. Portfolio requirements — sample listings
     demonstrating competency
  6. Recertification requirements (CE credits every
     2 years)
  7. Marketing plan for the designation — why agents
     and brokerages should care
  8. Launch timeline and first-year targets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification — 6-competency framework; designation requirements; exam blueprint; 16-hour curriculum with modules; portfolio requirements; recertification; marketing plan; launch timeline."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates credentialing expertise — competencies cover the full scope of listing writing; the exam tests practical skills (not just knowledge); portfolio requirements ensure real-world ability; the marketing plan addresses both agent and brokerage value propositions."
    weight: 0.35
    description: "CredentialingExpertise"
  - type: llm_judge
    criteria: "Response would establish a valued designation — agents would see career value; brokerages would prefer CLS-certified agents; the designation would differentiate skilled agents from AI; NAR would see membership and education revenue benefits."
    weight: 0.30
    description: "DesignationValueOutcome"
