meta:
  id: listing-governance-framework
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Design a national listing description governance framework for a real estate franchise with 2,000+ offices and 50,000+ agents"
  tags: [governance, franchise, national, standards, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer of a major
  real estate franchise (2,000+ offices, 50,000+
  agents, 12 countries). After a $2.5M Fair Housing
  settlement, the board mandated comprehensive
  listing description governance.

  Current state:
  - Decentralized: each office sets own standards
  - 47% of offices have no listing review process
  - Fair Housing complaints: 180+ per year
  - MLS violations: 500+ per year across all markets
  - International offices have no compliance guidance
  - AI-generated listings are emerging with no policy
  - Brand reputation at risk from poor listings

  Design the governance framework:
  1. Global listing standards policy — applicable to
     all offices in all countries
  2. Regional compliance overlays — country-specific
     requirements for US, Canada, UK, Australia,
     and others
  3. AI-generated listing policy — rules for when
     and how AI can be used
  4. Compliance monitoring technology — automated
     scanning of all new listings
  5. Escalation and enforcement protocol — from
     warning to franchise termination
  6. Annual compliance reporting dashboard
  7. Training and certification requirements for
     all agents
  8. Incident response playbook for Fair Housing
     complaints

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — global standards policy; regional compliance for 5+ countries; AI listing policy; automated monitoring technology; escalation protocol; compliance dashboard; training/certification; incident response playbook."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates franchise governance expertise — global standards balance consistency with local flexibility; regional overlays address actual regulatory differences; the AI policy is forward-looking; enforcement protocol scales from coaching to termination; the framework prevents the next $2.5M settlement."
    weight: 0.35
    description: "GovernanceExpertise"
  - type: llm_judge
    criteria: "Response would reduce risk — Fair Housing complaints would drop from 180+; MLS violations would decrease from 500+; all 2,000+ offices would have review processes; the franchise brand would be protected; the AI policy would prevent new categories of violations."
    weight: 0.30
    description: "RiskReductionOutcome"
