meta:
  id: listing-consulting-practice
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Launch a consulting practice specializing in real estate listing optimization — methodology, services, and proposals for brokerages, developers, and portals"
  tags: [consulting, methodology, practice-launch, expert]

state: {}

trigger: |
  You're launching "ListingCraft Consulting," a
  boutique firm specializing in real estate listing
  description optimization. Your proprietary
  methodology: the SELL Framework.

  - S: Story (identify the property's compelling
    narrative)
  - E: Elements (extract and prioritize features
    that matter to target buyers)
  - L: Language (craft descriptions using proven
    high-performing language patterns)
  - L: Legal (ensure full compliance with Fair
    Housing, MLS rules, and disclosures)

  Build the consulting practice:
  1. SELL Framework methodology document — detailed
     phases, tools, deliverables
  2. Service catalog (6 services with descriptions
     and pricing)
  3. Write 3 proposals:
     a. National brokerage (500 agents, standardize
        listing quality, $120K)
     b. Luxury developer (200-unit project, complete
        marketing copy, $85K)
     c. Real estate portal (AI listing enhancement
        product, $200K consulting engagement)
  4. Case study: "How we increased a brokerage's
     average showing rate by 34% through listing
     description optimization"
  5. Competitive positioning against generic marketing
     agencies

assertions:
  - type: llm_judge
    criteria: "Response builds a complete consulting practice — SELL Framework methodology; 6 services with pricing; 3 tailored proposals (brokerage $120K, developer $85K, portal $200K); case study with specific metrics; competitive positioning."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates consulting and real estate marketing expertise — the SELL Framework is practical and differentiating; proposals address each client's unique challenges; pricing reflects market rates; the case study quantifies ROI; competitive positioning identifies genuine advantages."
    weight: 0.35
    description: "ConsultingExpertise"
  - type: llm_judge
    criteria: "Response would win clients — each proposal justifies its budget with expected outcomes; the case study builds credibility; the SELL Framework is memorable and client-facing; the firm would stand out from generic marketing agencies."
    weight: 0.30
    description: "ClientAcquisitionOutcome"
