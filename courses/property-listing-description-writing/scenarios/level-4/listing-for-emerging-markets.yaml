meta:
  id: listing-for-emerging-markets
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Design listing description systems for emerging real estate markets — short-term rentals, co-living, fractional ownership, and tokenized real estate"
  tags: [emerging-markets, airbnb, co-living, fractional, tokenized, expert]

state: {}

trigger: |
  You're a real estate marketing strategist advising
  4 companies in emerging real estate segments that
  don't fit traditional listing frameworks.

  === SEGMENT 1: Short-Term Rental (Airbnb/VRBO) ===
  A property management company with 85 vacation
  rental properties needs listing descriptions for
  Airbnb and VRBO. These listings must sell
  experiences, not real estate. They need to optimize
  for search within the platforms and manage guest
  expectations.

  Create: Listing template and 2 sample descriptions
  (beachfront condo, mountain cabin).

  === SEGMENT 2: Co-Living Space ===
  A co-living startup (furnished rooms in shared
  houses, targeting remote workers 25-35) needs
  listings that sell community, not just housing.
  Current platform: their own website + Facebook
  Groups + housing-specific subreddits.

  Create: Room listing template and 2 sample
  descriptions (downtown house, suburban house).

  === SEGMENT 3: Fractional Ownership ===
  A company selling 1/8 fractional ownership shares
  in vacation homes needs descriptions that explain
  the model while marketing the property. Each owner
  gets 6 weeks/year. Price: $125K per 1/8 share of
  a $1M home.

  Create: Fractional listing template + sample
  description for a ski condo.

  === SEGMENT 4: Tokenized Real Estate ===
  A blockchain platform selling tokenized shares in
  commercial properties (minimum $500 investment,
  quarterly distributions) needs listing descriptions
  for a different audience: crypto-native investors.

  Create: Token offering description template +
  sample for a retail property.

  Create all templates and sample descriptions.

assertions:
  - type: llm_judge
    criteria: "Response creates materials for all 4 segments — STR template + 2 samples; co-living template + 2 samples; fractional template + 1 sample; tokenized template + 1 sample. Each adapts to its unique platform and audience."
    weight: 0.35
    description: "EmergingMarketsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates emerging market expertise — STR descriptions sell experiences and optimize for Airbnb search; co-living descriptions sell community; fractional descriptions explain the model clearly; tokenized descriptions speak to crypto-native investors; each adapts tone and content for its audience."
    weight: 0.35
    description: "EmergingMarketExpertise"
  - type: llm_judge
    criteria: "Response would convert in each market — vacation renters would book; remote workers would apply to co-living; vacation buyers would understand fractional; crypto investors would invest in tokens; each listing drives its specific conversion action."
    weight: 0.30
    description: "ConversionOutcome"
