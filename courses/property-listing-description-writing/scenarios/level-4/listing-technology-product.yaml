meta:
  id: listing-technology-product
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Build a product strategy for ListingIQ — an AI platform that scores, improves, and generates listing descriptions for real estate agents"
  tags: [product, technology, ai-platform, proptech, expert]

state: {}

trigger: |
  You're the CEO of ListingIQ, a proptech startup
  that raised $4.5M in seed funding. Your platform
  uses AI to score, improve, and generate listing
  descriptions.

  Platform capabilities:
  - ListingScore: AI quality scoring (0-100) based on
    proven correlation with sales outcomes
  - AutoEnhance: One-click improvement suggestions
    that elevate description quality
  - GenerateIQ: Full description generation from MLS
    data + photos using GPT-4 vision
  - ComplianceShield: Real-time Fair Housing and MLS
    compliance checking
  - InsightsDash: Analytics showing how description
    quality impacts listing performance

  Traction:
  - $1.8M ARR, growing 220% YoY
  - 3,200 agent subscribers (500 team accounts)
  - Average ListingScore improvement: 42 → 78
  - Agents using ListingIQ see 22% more showings
  - NPS: 65
  - 8 MLS integrations live

  Create:
  1. Series A pitch deck narrative (12-15 slides,
     targeting $15M raise at $75M valuation)
  2. Product roadmap: Next 12 months
  3. Competitive moat analysis
  4. Enterprise sales strategy (targeting brokerages
     with 100+ agents)
  5. Path to $20M ARR
  6. Key hires needed in next 12 months

assertions:
  - type: llm_judge
    criteria: "Response builds a complete product strategy — Series A pitch narrative; 12-month roadmap; competitive moat; enterprise sales strategy; path to $20M ARR; key hire plan."
    weight: 0.35
    description: "ProductStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates proptech venture expertise — the pitch tells a compelling growth story with real metrics; the moat identifies defensible advantages (MLS integrations, data network effects); enterprise strategy addresses brokerage decision-makers; revenue projections are credible."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would raise the Series A — the $15M ask is justified by traction; the competitive moat would withstand incumbents; the enterprise strategy would accelerate growth; ListingIQ would become the standard for listing quality."
    weight: 0.30
    description: "FundraisingOutcome"
