meta:
  id: listing-research-study
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Design a research study on how listing description language affects buyer behavior, perceived property value, and time on market"
  tags: [research, behavioral-economics, language, study-design, expert]

state: {}

trigger: |
  You're a principal investigator at a real estate
  research center designing a landmark study: "Words
  That Sell: How Listing Language Shapes Buyer
  Behavior and Property Values."

  Research questions:
  1. Do specific linguistic features (emotional
     language, sensory details, lifestyle framing)
     causally affect buyer interest?
  2. Does listing description quality affect perceived
     property value (and willingness to pay)?
  3. Are there interaction effects between description
     quality and property price segment?
  4. How do cultural and demographic factors moderate
     the effect of listing language?

  Study design:
  - Experimental component: Controlled experiments
    with 1,500 participants evaluating identical
    properties with different descriptions
  - Observational component: NLP analysis of 50,000
    real MLS listings correlated with outcomes
  - Mixed methods: Qualitative interviews with 30
    buyers about how descriptions influenced their
    decisions

  Funding: $280K from NAR Foundation, 18-month
  timeline.

  Design the research study:
  1. Literature review framework
  2. Experimental methodology (stimuli design, random
     assignment, measurement)
  3. Observational methodology (NLP pipeline, feature
     engineering, regression models)
  4. Qualitative methodology (interview protocol,
     thematic analysis)
  5. Data analysis plan for each component
  6. Expected findings and theoretical contributions
  7. Practical implications for the industry
  8. Limitations and ethical considerations

assertions:
  - type: llm_judge
    criteria: "Response designs a complete mixed-methods study — literature review framework; experimental methodology with stimuli and controls; observational NLP pipeline; qualitative interview protocol; data analysis plans; expected findings; practical implications; ethics."
    weight: 0.35
    description: "ResearchStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — experimental stimuli control for confounders; NLP feature engineering captures meaningful linguistic features; the mixed-methods design triangulates findings; statistical methods are appropriate; ethical considerations include deception in experiments."
    weight: 0.35
    description: "ResearchMethodologyQuality"
  - type: llm_judge
    criteria: "Response would advance knowledge — findings would be publishable in top journals; practical implications would change how agents write listings; the NLP component would produce a reusable listing quality model; the $280K investment is justified."
    weight: 0.30
    description: "KnowledgeAdvancementOutcome"
