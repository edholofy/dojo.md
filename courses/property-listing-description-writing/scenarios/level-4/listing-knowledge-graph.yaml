meta:
  id: listing-knowledge-graph
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Build a knowledge graph-powered listing intelligence system that connects property features, buyer preferences, market data, and high-performing language"
  tags: [knowledge-graph, listing-intelligence, semantic, ai, expert]

state: {}

trigger: |
  You're the VP of Data Science at a major real
  estate portal building a knowledge graph that
  powers intelligent listing descriptions. The graph
  connects property features to buyer preferences
  to high-performing language.

  Knowledge graph scope:
  - 500+ property feature nodes (granite counters,
    hardwood floors, pool, etc.)
  - 80+ buyer persona nodes (first-time buyer,
    downsizer, investor, luxury seeker, etc.)
  - 1,000+ language pattern nodes (descriptions
    that correlate with faster sales)
  - 200+ neighborhood attribute nodes
  - 50+ market condition nodes
  - Edges: feature → appeals to → persona,
    feature → best described as → language pattern,
    neighborhood → attracts → persona

  Use cases:
  1. Agent inputs property features → system
     recommends optimal description language for the
     target buyer persona
  2. Agent selects target buyer → system highlights
     which features to emphasize and which to
     de-emphasize
  3. Market shifts → system recommends adjusting
     language (e.g., in a buyer's market, emphasize
     value; in a seller's market, emphasize demand)
  4. New listing → system generates a description
     by traversing the graph

  Design the knowledge graph system:
  1. Graph architecture — node types, edge types,
     properties, and relationships
  2. Data collection methodology — how to populate
     the graph from MLS data and sales outcomes
  3. Recommendation algorithm — how the system
     traverses the graph to suggest language
  4. Example outputs for 3 different property/buyer
     combinations
  5. Continuous learning — how the graph updates
     from new sales data
  6. Integration with existing listing workflows
  7. Performance metrics — how to measure the
     system's impact on listing outcomes

assertions:
  - type: llm_judge
    criteria: "Response builds a complete knowledge graph system — architecture with node/edge types; data collection methodology; recommendation algorithm; 3 example outputs; continuous learning mechanism; workflow integration; performance metrics."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates graph-based intelligence expertise — relationships between features, buyers, and language are meaningful; the recommendation algorithm produces genuinely better descriptions; continuous learning improves over time; the system handles market condition changes."
    weight: 0.35
    description: "GraphIntelligenceExpertise"
  - type: llm_judge
    criteria: "Response would transform listing creation — agents would write better descriptions with graph-powered recommendations; the 3 examples demonstrate clear value; the system would learn and improve; listing outcomes would measurably improve."
    weight: 0.30
    description: "ListingTransformationOutcome"
