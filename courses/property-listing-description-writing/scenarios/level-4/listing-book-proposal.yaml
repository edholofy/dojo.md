meta:
  id: listing-book-proposal
  level: 4
  course: property-listing-description-writing
  type: output
  description: "Write a book proposal for 'Words That Sell Houses' — the definitive guide to real estate listing descriptions with 2 sample chapters"
  tags: [book-proposal, publishing, real-estate, expert]

state: {}

trigger: |
  You're proposing a book to a real estate publisher:
  "Words That Sell Houses: The Art and Science of
  Property Listing Descriptions."

  Book premise: In an industry that spends billions
  on technology, photography, and marketing, the
  most critical asset is still 250 words of text —
  the listing description. This book teaches agents
  how to write descriptions that sell.

  Target audience: Real estate agents, team leaders,
  listing coordinators, brokerage marketing managers.

  Proposed structure (14 chapters):
  Part I: The Science of Selling with Words (Ch 1-4)
  Part II: Writing for Every Property (Ch 5-9)
  Part III: Advanced Strategies (Ch 10-14)

  Write:
  1. Book proposal with chapter-by-chapter outline
  2. Market analysis — competing titles, market gap
  3. Author platform and credentials
  4. Write Chapter 1: "The $250,000 Paragraph" (~3,000
     words — how a well-written listing description
     can add $250K to a luxury home's sale price,
     backed by data)
  5. Write Chapter 8: "The Fair Housing Minefield"
     (~3,000 words — navigating compliance while
     writing compelling descriptions, with real
     violation examples and rewrites)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — chapter-by-chapter outline for 14 chapters; market analysis; author platform; Chapter 1 (~3,000 words) on description value; Chapter 8 (~3,000 words) on Fair Housing compliance."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates publishing and real estate expertise — Chapter 1 uses compelling data and stories to prove descriptions' financial impact; Chapter 8 navigates Fair Housing with real examples; the outline progresses from fundamentals to advanced strategies; the market analysis identifies a genuine gap."
    weight: 0.35
    description: "PublishingExpertise"
  - type: llm_judge
    criteria: "Response would get published and adopted — agents would buy the book as a career investment; Chapter 1 would convince skeptics that descriptions matter; Chapter 8 would protect agents from legal liability; the book would become the go-to reference for listing writing."
    weight: 0.30
    description: "PublishingOutcome"
