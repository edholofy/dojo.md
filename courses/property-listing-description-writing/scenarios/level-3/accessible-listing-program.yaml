meta:
  id: accessible-listing-program
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Design an accessible listing description program that serves visually impaired homebuyers, non-English speakers, and buyers with cognitive disabilities"
  tags: [accessibility, inclusive, wcag, multilingual, advanced]

state: {}

trigger: |
  You're an accessibility consultant hired by a
  state real estate commission to develop guidelines
  for accessible listing descriptions. A complaint
  from the National Federation of the Blind found
  that 94% of online listings are inaccessible to
  screen reader users.

  Accessibility gaps identified:
  - Photo-only information (features shown in photos
    but not described in text)
  - Complex formatting that screen readers can't
    parse (tables, special characters, emojis)
  - No alt text on listing photos (screen readers
    say "image" for every photo)
  - Abbreviations without explanation (BR, BA, sqft,
    HOA, DOM)
  - No multilingual support (15% of state population
    is limited English proficiency)
  - Listing descriptions assume visual spatial
    understanding ("open concept flows to the right")

  Design the accessible listing program:
  1. Accessible listing description standards
     (WCAG 2.1 AA adapted for real estate)
  2. Screen reader-compatible description template
  3. Photo alt text guidelines with 10 examples
     (interior and exterior photos)
  4. Plain language listing guide — rewriting complex
     real estate jargon into accessible language
  5. Multilingual listing standards for top 5
     languages in the state
  6. Agent training curriculum on accessible listing
     writing
  7. Compliance audit checklist

assertions:
  - type: llm_judge
    criteria: "Response creates a complete accessible program — WCAG-adapted standards; screen reader template; photo alt text guidelines with 10 examples; plain language guide; multilingual standards; agent training; compliance audit checklist."
    weight: 0.35
    description: "AccessibilityProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates accessibility expertise — screen reader compatibility is technically accurate; alt text examples are descriptive and useful; plain language guide addresses real estate jargon; multilingual standards are practical; the standards would satisfy the NFB complaint."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "Response would make listings accessible — visually impaired buyers could understand properties from descriptions alone; non-English speakers could access listings; the 94% inaccessibility rate would dramatically decrease; the program would become a model for other states."
    weight: 0.30
    description: "AccessibilityOutcome"
