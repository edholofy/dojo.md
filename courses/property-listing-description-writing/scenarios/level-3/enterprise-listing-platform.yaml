meta:
  id: enterprise-listing-platform
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Design an enterprise listing content management system for a national brokerage — templates, AI assistance, quality control, and syndication across 500+ agents"
  tags: [enterprise, cms, national-brokerage, quality-control, advanced]

state: {}

trigger: |
  You're the VP of Marketing at a national real
  estate brokerage (500+ agents, 15 offices, 8,000+
  listings/year). The CEO wants to standardize and
  elevate listing quality across all offices while
  allowing agent personalization.

  Current problems:
  - Listing quality varies by office and agent
  - 23% of listings have Fair Housing language issues
  - Average listing sits 15 days before description
    is written
  - No brand consistency across offices
  - MLS character limits differ by region
  - Agents spend 45 min per listing on descriptions
  - Syndication errors cause 12% of listings to
    display incorrectly on Zillow/Realtor.com

  Design the enterprise listing content system:
  1. Content management platform architecture —
     templates, workflows, approvals
  2. AI-assisted listing description generator with
     brand voice training
  3. Multi-MLS compliance engine (auto-adapts
     descriptions to different MLS requirements)
  4. Quality control workflow — automated Fair Housing
     screening, readability scoring, brand compliance
  5. Performance analytics — which description
     elements correlate with faster sales
  6. Agent training program on the new system
  7. Syndication quality assurance — ensuring
     descriptions display correctly across platforms
  8. ROI projection (time savings, quality improvement,
     risk reduction)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete enterprise system — CMS architecture; AI description generator; multi-MLS compliance; Fair Housing screening; performance analytics; agent training; syndication QA; ROI projection."
    weight: 0.35
    description: "EnterprisePlatformCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise marketing expertise — the AI generator balances efficiency with brand voice; Fair Housing screening catches violations automatically; multi-MLS compliance addresses regional differences; analytics connect descriptions to sales outcomes."
    weight: 0.35
    description: "EnterpriseExpertise"
  - type: llm_judge
    criteria: "Response would transform the brokerage — the 23% Fair Housing issue rate would drop; 45-minute writing time would decrease; syndication errors would be eliminated; listing quality would be consistently high across all 15 offices."
    weight: 0.30
    description: "BrokerageTransformationOutcome"
