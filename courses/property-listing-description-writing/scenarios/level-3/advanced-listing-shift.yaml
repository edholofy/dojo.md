meta:
  id: advanced-listing-shift
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Shift simulation — write listings for a controversial property (former grow house), a celebrity estate with privacy requirements, and a mixed-use property with retail and residential"
  tags: [shift-simulation, multi-context, advanced]

state: {}

trigger: |
  You're handling three challenging listings that
  each require navigating sensitive or complex
  situations.

  === LISTING 1: Former Cannabis Grow House ===
  A 3 bed/2 bath home was previously used as an
  illegal cannabis grow operation. The property has
  been fully remediated (mold removed, electrical
  brought to code, new HVAC, fresh paint). An
  independent inspection report confirms the property
  is safe. However, the home's history is public
  record and neighbors know. Price: $225,000 (30%
  below comparable homes). State law requires
  disclosure of material facts.

  Challenge: Write a listing that complies with
  disclosure requirements, is honest about the
  history, but markets the property positively as a
  renovation opportunity.

  Write: MLS listing (250 words) with appropriate
  disclosures + a buyer FAQ addressing common
  concerns (5 Q&As).

  === LISTING 2: Celebrity Estate ===
  A well-known celebrity is selling their 8 bed/
  10 bath, 12,000 sq ft estate ($18.5M). The seller
  demands: no address in listing, no aerial photos
  showing the full property boundary, no mentions of
  the seller's identity, private showings only with
  NDA, and limited photography (approved images only).

  Challenge: Create compelling marketing despite
  severe information restrictions.

  Write: MLS listing (300 words) that creates
  intrigue without identifying the seller + a
  private broker preview invitation (200 words)
  with NDA and showing protocol.

  === LISTING 3: Mixed-Use Property ===
  A 3-story building with ground-floor retail (2
  storefronts, both leased) and 4 residential
  apartments above (3 occupied, 1 vacant). Total
  building income: $14,200/month. Zoned C-3 (mixed-
  use). Price: $1,850,000. Target: Investors who
  understand commercial/residential blended
  properties.

  Challenge: Market to sophisticated investors with
  financial analysis while also creating individual
  listings for the vacant residential unit.

  Write: Investment listing (300 words with financial
  metrics) + vacant apartment rental listing (200
  words).

  Write all six pieces.

assertions:
  - type: llm_judge
    criteria: "Response creates all 6 pieces — grow house MLS + buyer FAQ; celebrity MLS + broker preview invitation; mixed-use investment listing + apartment rental listing. Each navigates its unique challenge appropriately."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise with sensitive listings — grow house disclosure is legally compliant and honest; celebrity listing creates intrigue without privacy violations; mixed-use financial analysis is investor-grade; each listing navigates its constraints skillfully."
    weight: 0.35
    description: "SensitiveListingExpertise"
  - type: llm_judge
    criteria: "Response would sell each property — the grow house would attract buyers comfortable with the history; the celebrity estate would generate qualified interest; the mixed-use would attract sophisticated investors; each listing matches the right buyer to the right property."
    weight: 0.30
    description: "ChallengingPropertyOutcome"
