meta:
  id: listing-content-operations
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Design a listing content operations system for a high-volume team that processes 50+ new listings per week with consistent quality and turnaround"
  tags: [content-operations, high-volume, workflow, team, advanced]

state: {}

trigger: |
  You're the operations manager for a mega real
  estate team (top-producing team in the state,
  50+ new listings per week, 15 agents, 3 listing
  coordinators). The team needs a content operations
  system that produces high-quality listing
  descriptions at scale.

  Current bottlenecks:
  - Listing coordinators write 15-20 descriptions
    per day (burnout, declining quality)
  - Agents want descriptions within 4 hours of
    photos being delivered
  - Quality review catches errors in 18% of
    descriptions
  - No standardized process — each coordinator has
    their own workflow
  - Peak seasons (spring/summer) overwhelm capacity
  - Agent feedback loop is informal and inconsistent

  Design the content operations system:
  1. Workflow design — from photo delivery to
     published listing in 4 hours
  2. Role definitions and capacity planning
     (coordinators, editors, QA)
  3. Description templates by property type (5
     templates with fill-in sections)
  4. Quality checklist — 15-point review before
     publishing
  5. Technology stack — tools for writing, review,
     publishing, and tracking
  6. Performance metrics and SLAs
  7. Seasonal scaling plan (handling 2x volume in
     peak season)
  8. Agent feedback and continuous improvement process

assertions:
  - type: llm_judge
    criteria: "Response designs a complete operations system — 4-hour workflow; role definitions with capacity; 5 property-type templates; 15-point quality checklist; technology stack; performance metrics/SLAs; seasonal scaling; agent feedback process."
    weight: 0.35
    description: "ContentOpsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates operations expertise — the 4-hour SLA is achievable with the designed workflow; capacity planning prevents burnout; templates maintain quality at volume; the seasonal plan handles 2x demand; metrics drive continuous improvement."
    weight: 0.35
    description: "OperationsExpertise"
  - type: llm_judge
    criteria: "Response would solve the bottlenecks — the 18% error rate would decrease; coordinator burnout would be addressed; the 4-hour turnaround would be met consistently; peak season capacity would be manageable; agent satisfaction would improve."
    weight: 0.30
    description: "OperationalExcellenceOutcome"
