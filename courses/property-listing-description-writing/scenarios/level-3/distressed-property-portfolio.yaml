meta:
  id: distressed-property-portfolio
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Write listing descriptions for a portfolio of 15 bank-owned (REO) properties with varying conditions, legal constraints, and disclosure requirements"
  tags: [reo, bank-owned, distressed, portfolio, compliance, advanced]

state: {}

trigger: |
  You're the listing coordinator for a bank's REO
  (Real Estate Owned) department. You need to create
  listing descriptions for 15 bank-owned properties
  that the bank acquired through foreclosure.

  Legal constraints:
  - All properties sold "as-is, where-is"
  - Bank makes NO representations about condition
  - Specific disclosure language required by bank's
    legal department
  - Cannot use words that imply warranties (e.g.,
    "move-in ready," "perfect condition")
  - Must include REO addendum language
  - Cannot guarantee any utility or system
    functionality
  - Some properties may have occupants (tenants or
    former owners)

  Write full listing descriptions for 5 representative
  properties from the portfolio:

  1. Occupied foreclosure — tenant in place, 3 bed/
     1 bath, $135,000, showing with 48-hr notice only
  2. Vacant and winterized — 4 bed/2 bath, $195,000,
     utilities disconnected, unknown condition of
     mechanicals
  3. Fire-damaged — 2 bed/1 bath, $45,000, partial
     roof damage, lot value plays, sold for land/rehab
  4. Luxury REO — 5 bed/4 bath, $680,000, pool
     (condition unknown), gated community, deferred
     maintenance
  5. Commercial REO — 3,000 sq ft retail strip, 2
     of 3 units vacant, $320,000, environmental Phase
     I recommended

  For each property:
  1. MLS listing (200 words with required legal
     language)
  2. Investor marketing summary (150 words
     emphasizing opportunity)

  Then create: REO listing description template with
  required legal disclaimers and variable fields.

assertions:
  - type: llm_judge
    criteria: "Response creates listings for all 5 properties — each with MLS description (200 words) and investor summary (150 words), plus an REO template. Required legal language (as-is, no warranties, REO addendum) is included in every listing."
    weight: 0.35
    description: "REOPortfolioCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates REO listing expertise — legal disclaimers are properly placed; condition descriptions are honest without being discouraging; occupied property shows restrictions; fire-damaged property is marketed for land/rehab value; the template covers all required variables."
    weight: 0.35
    description: "REOExpertise"
  - type: llm_judge
    criteria: "Response would sell these properties — investors would see opportunity despite constraints; legal language protects the bank; each listing positions the property for its realistic buyer (rehabber, landlord, land buyer, discount luxury); the template would standardize future REO listings."
    weight: 0.30
    description: "REOSalesOutcome"
