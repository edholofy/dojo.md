meta:
  id: listing-analytics-optimization
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Build a data analytics system that correlates listing description elements with sales performance — time on market, showing frequency, and sale price vs list price"
  tags: [analytics, data-driven, performance, correlation, advanced]

state: {}

trigger: |
  You're a data scientist at a large real estate
  brokerage analyzing 12,000 listing descriptions
  from the past 2 years to determine which
  description elements correlate with better sales
  outcomes.

  Available data per listing:
  - Full listing description text
  - Property attributes (beds, baths, sqft, price,
    type, location)
  - Days on market (DOM)
  - Number of showings
  - Number of online views and saves
  - Sale price vs list price ratio
  - Number of offers received
  - Agent who wrote the listing
  - Market conditions (inventory level, interest
    rates at time of listing)

  Preliminary findings:
  - Listings with 150-250 words sell 8 days faster
    than those with 50-100 words
  - "Lifestyle language" correlates with 3% higher
    sale/list ratio in homes over $500K
  - Listings mentioning specific upgrades with dates
    (e.g., "new roof 2024") sell 11 days faster
  - All-caps listings average 6 fewer showings
  - Listings with price justification language sell
    at 99.2% vs 97.8% of list price

  Build the analytics system:
  1. Description scoring model — automated quality
     score based on identified correlations
  2. Feature extraction framework — how to parse
     descriptions for analyzable elements
  3. Statistical analysis methodology — controlling
     for confounders (market, price, location)
  4. Agent performance benchmarking — description
     quality by agent with coaching insights
  5. Real-time recommendations engine — suggesting
     improvements as agents write
  6. Quarterly market trend reports — how effective
     listing language evolves over time
  7. Presentation deck for agents — data-backed
     writing recommendations

assertions:
  - type: llm_judge
    criteria: "Response builds a complete analytics system — scoring model; NLP feature extraction; statistical methodology controlling for confounders; agent benchmarking; real-time recommendation engine; quarterly reports; agent presentation deck."
    weight: 0.35
    description: "AnalyticsSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates data science and real estate expertise — feature extraction captures meaningful listing elements; statistical methodology controls for market conditions; correlations vs causation is addressed; recommendations are actionable for agents; the scoring model is well-calibrated."
    weight: 0.35
    description: "DataScienceExpertise"
  - type: llm_judge
    criteria: "Response would improve listing performance — agents would write better descriptions based on data; the scoring model would predict listing performance; the real-time engine would prevent poor listings from going live; brokerage-wide DOM would decrease."
    weight: 0.30
    description: "PerformanceImprovementOutcome"
