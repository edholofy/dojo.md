meta:
  id: listing-compliance-audit
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Conduct a comprehensive compliance audit of a brokerage's listing descriptions — Fair Housing, MLS rules, state disclosure requirements, and advertising regulations"
  tags: [compliance-audit, fair-housing, mls-rules, regulations, advanced]

state: {}

trigger: |
  You're a compliance consultant hired by a real
  estate brokerage after they received a Fair Housing
  complaint and an MLS fine. You need to audit their
  listing descriptions and create a remediation plan.

  Brokerage profile:
  - 85 agents across 4 offices
  - 1,200 active listings
  - Operates in 3 states (each with different
    disclosure requirements)
  - 2 MLS memberships with different rules
  - Recently received:
    - Fair Housing complaint (discriminatory language
      in 2 listings)
    - MLS fine ($500) for non-compliant formatting
    - State real estate commission warning about
      missing disclosure language

  Audit scope:
  - Fair Housing compliance across all listings
  - MLS formatting and content rules compliance
  - State-specific disclosure requirements
  - Truth-in-advertising compliance
  - Photo and virtual tour content compliance
  - Agent advertising of personal listings

  Conduct the audit:
  1. Audit methodology — how to review 1,200 listings
     systematically
  2. Compliance framework — all applicable regulations
     organized by category
  3. Common violation patterns (provide 10 examples
     of violations you'd expect to find with
     corrections)
  4. Risk scoring model — how to prioritize
     remediation
  5. Remediation plan with timeline
  6. Ongoing compliance monitoring system
  7. Agent compliance training curriculum
  8. Compliance officer role description and KPIs

assertions:
  - type: llm_judge
    criteria: "Response conducts a complete audit — systematic methodology for 1,200 listings; compliance framework covering Fair Housing, MLS, state disclosures, truth-in-advertising; 10 example violations; risk scoring; remediation plan; monitoring system; training curriculum; compliance officer role."
    weight: 0.35
    description: "ComplianceAuditCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance expertise — the methodology efficiently handles 1,200 listings; example violations include both obvious and subtle issues; risk scoring prioritizes by legal exposure; multi-state requirements are addressed; the monitoring system prevents recurrence."
    weight: 0.35
    description: "ComplianceExpertise"
  - type: llm_judge
    criteria: "Response would resolve compliance issues — Fair Housing complaints would not recur; MLS fines would be prevented; state disclosure requirements would be met; the brokerage would become a compliance model; ongoing monitoring would catch issues proactively."
    weight: 0.30
    description: "ComplianceResolutionOutcome"
