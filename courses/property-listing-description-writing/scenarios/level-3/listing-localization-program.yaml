meta:
  id: listing-localization-program
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Design a listing description localization program for an international real estate platform operating in 8 countries"
  tags: [localization, international, multi-country, cultural, advanced]

state: {}

trigger: |
  You're the Head of Content for a global real
  estate platform expanding from the US to 7
  additional countries. Listing descriptions must
  be localized — not just translated — for each
  market.

  Markets and challenges:
  1. UK: Different terminology (flat vs apartment,
     ground floor vs first floor, garden vs yard),
     leasehold vs freehold, EPC ratings required
  2. Australia: Different terminology (lounge vs
     living room, ensuite), strata vs freehold, BBQ
     culture, indoor-outdoor living emphasis
  3. Germany: Strict advertising regulations,
     Energieausweis required, formal language,
     apartment layouts described differently (rooms
     not bedrooms), metric-only
  4. Japan: Tatami room sizes, Japanese era dating,
     building age matters more (earthquake codes),
     balcony descriptions, proximity to station in
     minutes walking
  5. UAE: Off-plan vs ready, freehold zones, service
     charges, community descriptions critical,
     cultural sensitivity around lifestyle descriptions
  6. Brazil: CRECI registration required, IPTU tax
     mentions, condominium fee details, Portuguese
     language nuances between regions
  7. Canada: Bilingual requirements (English/French
     in Quebec), metric/imperial dual, different
     property tax structures by province

  Design the localization program:
  1. Market-specific listing templates for each
     country
  2. Terminology mapping document (US terms →
     local equivalents)
  3. Regulatory compliance requirements per market
  4. Cultural adaptation guidelines
  5. Quality assurance process for localized listings
  6. Training program for local content teams
  7. Sample localized listing for 3 of the 7 markets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete localization program — templates for each country; terminology mapping; regulatory compliance per market; cultural adaptation guidelines; QA process; training program; 3 sample localized listings."
    weight: 0.35
    description: "LocalizationProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates international real estate expertise — terminology differences are accurate (flat/apartment, tatami rooms, strata/freehold); regulatory requirements reflect actual laws (EPC, Energieausweis, CRECI); cultural adaptations address genuine market differences."
    weight: 0.35
    description: "InternationalExpertise"
  - type: llm_judge
    criteria: "Response would enable global expansion — localized listings would feel native to each market; regulatory compliance would prevent legal issues; the QA process would maintain quality across languages; local teams could execute independently."
    weight: 0.30
    description: "GlobalExpansionOutcome"
