meta:
  id: ai-listing-generator
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Design an AI-powered listing description generator that creates personalized, compliant descriptions from property data and photos"
  tags: [ai-powered, generator, automation, compliance, advanced]

state: {}

trigger: |
  You're the CTO of a proptech startup building an
  AI-powered listing description generator. The
  product must produce descriptions that match or
  exceed human-written quality while ensuring
  compliance and personalization.

  Product requirements:
  - Input: MLS data fields, property photos, agent
    preferences, target buyer persona
  - Output: Multiple description versions (MLS,
    marketing, social media) in 30 seconds
  - Fair Housing: Built-in compliance checking that
    flags and rewrites problematic language
  - Brand voice: Learns and replicates each agent's
    writing style from their past listings
  - Local context: Integrates neighborhood data,
    school ratings, Walk Score, transit info
  - Photo analysis: Uses computer vision to identify
    features visible in photos but not in MLS data

  Competitive landscape:
  - ListingAI: Basic template fill, no compliance
  - HomeSnap: Photo-to-description but generic
  - WriteMyListing: Human writers, not scalable

  Design the AI listing generator:
  1. Product architecture — data pipeline, AI models,
     compliance layer, output generation
  2. Training data strategy — how to train on high-
     quality listings while avoiding biased language
  3. Compliance engine — Fair Housing, state-specific
     disclosure requirements, MLS rules
  4. Personalization framework — how the AI adapts
     to agent voice and buyer persona
  5. Quality scoring system — how the AI evaluates
     its own output before delivery
  6. Human-in-the-loop workflow — when and how agents
     review AI-generated content
  7. Demo: Generate sample outputs for 3 different
     property types using the described system

assertions:
  - type: llm_judge
    criteria: "Response designs a complete AI system — architecture with data pipeline and models; training data strategy addressing bias; compliance engine for Fair Housing and MLS rules; personalization for voice and persona; quality scoring; human-in-the-loop workflow; 3 demo outputs."
    weight: 0.35
    description: "AIGeneratorCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI product expertise — the architecture is technically feasible; training data strategy addresses bias in real estate language; the compliance engine catches both explicit and implicit violations; personalization uses meaningful features (not just synonyms); quality scoring correlates with listing performance."
    weight: 0.35
    description: "AIProductExpertise"
  - type: llm_judge
    criteria: "Response would create a competitive product — the generator would produce descriptions better than template-fill competitors; compliance checking would be a selling point; agent adoption would be high due to personalization; the 3 demo outputs would impress potential customers."
    weight: 0.30
    description: "ProductCompetitivenessOutcome"
