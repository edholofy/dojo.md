meta:
  id: development-project-marketing
  level: 3
  course: property-listing-description-writing
  type: output
  description: "Create a complete marketing narrative for a new residential development — from project positioning to individual unit descriptions for 120 units across 4 floor plan types"
  tags: [development, new-construction, marketing, project-wide, advanced]

state: {}

trigger: |
  You're the marketing director for a 120-unit
  condominium development launching sales.
  "The Harborview" is a luxury waterfront project
  in a revitalizing industrial district.

  Project details:
  - 120 units across 2 towers (12 stories each)
  - 4 floor plan types:
    A. Studio (550 sq ft, 20 units) — $380K-$420K
    B. 1-bed (750 sq ft, 40 units) — $495K-$575K
    C. 2-bed (1,100 sq ft, 40 units) — $695K-$825K
    D. Penthouse (1,800 sq ft, 20 units) — $1.2M-$1.5M
  - Views: Harbor (premium), city skyline, park
  - Amenities: Infinity pool, co-working lounge,
    wine room, dog wash, EV charging, concierge
  - Developer: Meridian Group (3rd project, strong
    reputation)
  - Neighborhood: Harbor District — formerly
    industrial, now mixed-use with restaurants,
    brewery, public waterfront park, ferry terminal
  - Target: 60% owner-occupant, 40% investor
  - Sales launch: 90 days from now

  Create the marketing content suite:
  1. Project positioning statement and brand narrative
     (500 words)
  2. Individual floor plan descriptions (one for each
     type A, B, C, D — 200 words each)
  3. Amenities marketing copy (300 words)
  4. Neighborhood transformation story (400 words)
  5. Investor-specific marketing package (ROI
     projections, rental estimates, appreciation
     thesis — 400 words)
  6. Pre-sale event invitation and VIP access
     language (200 words)

assertions:
  - type: llm_judge
    criteria: "Response creates the complete marketing suite — brand narrative (500 words); 4 floor plan descriptions (200 words each); amenities copy (300 words); neighborhood story (400 words); investor package (400 words); pre-sale invitation (200 words)."
    weight: 0.35
    description: "DevelopmentMarketingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates development marketing expertise — the brand narrative positions the project distinctively; floor plan descriptions differentiate each type's lifestyle appeal; the neighborhood story addresses industrial-to-residential transformation positively; investor projections are credible."
    weight: 0.35
    description: "DevelopmentExpertise"
  - type: llm_judge
    criteria: "Response would drive pre-sales — the brand narrative would generate buzz; floor plan descriptions would help buyers self-select; the investor package would attract the 40% investor target; the pre-sale event would create urgency and exclusivity."
    weight: 0.30
    description: "PreSalesOutcome"
