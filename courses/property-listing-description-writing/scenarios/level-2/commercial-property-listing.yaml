meta:
  id: commercial-property-listing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Write commercial property listing descriptions for retail, office, and industrial spaces with different buyer motivations"
  tags: [commercial, retail, office, industrial, intermediate]

state: {}

trigger: |
  You're a commercial real estate agent writing
  listings for 3 different commercial properties.
  Each requires a fundamentally different approach
  because commercial buyers evaluate properties
  based on business use and investment potential.

  === PROPERTY 1: Retail Space ===
  1,800 sq ft ground-floor retail unit in a mixed-use
  building. 40 ft of street frontage on Main Street.
  Previously a boutique clothing store. Existing
  tenant improvements: display lighting, fitting
  rooms (removable), HVAC. NNN lease available at
  $28/sq ft. Traffic count: 18,000 vehicles/day.
  Adjacent tenants: coffee shop, salon, dental office.
  Zoning: C-2 (commercial).

  === PROPERTY 2: Office Space ===
  4,200 sq ft 2nd-floor office suite in a Class B
  office building. Currently configured as: reception,
  8 private offices, conference room, break room,
  server room. Building amenities: lobby, elevator,
  shared conference center, 3.5/1,000 parking ratio.
  Modified gross lease at $22/sq ft. Building
  occupancy: 88%.

  === PROPERTY 3: Industrial/Warehouse ===
  12,000 sq ft warehouse with 1,500 sq ft of office
  space. Clear height: 24 ft. 2 dock-high doors,
  1 grade-level door. 400-amp 3-phase electrical.
  Fenced yard (8,000 sq ft). Zoned I-1 (light
  industrial). Near I-75 interchange (0.5 miles).
  Available for lease ($8.50/sq ft NNN) or sale
  ($1,400,000).

  For each property, write:
  1. LoopNet/CoStar listing description (200 words)
  2. Broker email to prospective tenants/buyers
     (150 words, professional)

assertions:
  - type: llm_judge
    criteria: "Response creates all 6 pieces — LoopNet descriptions and broker emails for retail, office, and industrial. Each listing includes appropriate commercial details (lease rates, traffic counts, clear height, parking ratios) relevant to that property type."
    weight: 0.35
    description: "CommercialListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates commercial real estate expertise — retail listing emphasizes foot traffic and frontage; office listing highlights configuration and parking; industrial listing leads with clear height, dock doors, and electrical; lease types (NNN, modified gross) are explained; each listing speaks to commercial buyer motivations."
    weight: 0.35
    description: "CommercialExpertise"
  - type: llm_judge
    criteria: "Response would attract commercial tenants/buyers — retail would appeal to retailers evaluating foot traffic; office would attract businesses needing move-in ready space; industrial would reach logistics and manufacturing users; broker emails create professional urgency."
    weight: 0.30
    description: "CommercialTenantOutcome"
