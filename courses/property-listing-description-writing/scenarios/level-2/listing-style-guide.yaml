meta:
  id: listing-style-guide
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Create a brokerage-wide listing description style guide ensuring consistency, quality, and compliance across all agents"
  tags: [style-guide, consistency, brokerage, standards, intermediate]

state: {}

trigger: |
  You're the marketing director of a mid-size real
  estate brokerage (65 agents, 800+ listings/year).
  Listing description quality varies wildly — some
  agents write compelling narratives, others submit
  ALL CAPS descriptions with typos and no
  punctuation. You need a style guide.

  Current problems:
  - Inconsistent capitalization (ALL CAPS vs normal)
  - Abbreviations vary (BR vs bed vs bedroom)
  - Some agents use exclamation marks excessively!!!
  - Fair Housing violations (3 complaints last year)
  - No mobile optimization (descriptions too long
    for phone screens)
  - Inconsistent feature ordering (some lead with
    price, others with location)
  - Brand voice not established

  Create the brokerage listing description style
  guide:
  1. Brand voice and tone guidelines (professional
     but approachable)
  2. Formatting standards (capitalization, punctuation,
     abbreviations, length limits)
  3. Structural template (what goes in paragraph 1,
     2, 3 of every listing)
  4. Word choice guide (preferred terms, banned terms,
     power words list)
  5. Fair Housing compliance section (dos and don'ts
     with examples)
  6. Before/after examples showing poor listings
     rewritten to standard
  7. Mobile optimization guidelines
  8. Quick-reference cheat sheet (1-page summary)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete style guide — brand voice guidelines; formatting standards; structural template; word choice guide with preferred/banned/power words; Fair Housing section; before/after examples; mobile optimization; quick-reference cheat sheet."
    weight: 0.35
    description: "StyleGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates marketing leadership — the voice guidelines are specific enough to enforce consistency; formatting standards address ALL CAPS and abbreviations; the structural template creates a recognizable brokerage brand; before/after examples are dramatically improved."
    weight: 0.35
    description: "MarketingLeadershipQuality"
  - type: llm_judge
    criteria: "Response would standardize quality — 65 agents could follow this guide independently; Fair Housing complaints would decrease; mobile-optimized listings would perform better; the brokerage brand would be consistently represented."
    weight: 0.30
    description: "QualityStandardizationOutcome"
