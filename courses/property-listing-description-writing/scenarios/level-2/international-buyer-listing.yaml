meta:
  id: international-buyer-listing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Write listing descriptions targeting international buyers with cultural adaptation, currency conversion, and metric measurements"
  tags: [international, cultural-adaptation, multilingual, intermediate]

state: {}

trigger: |
  You're a real estate agent in Miami specializing
  in international buyers. A new luxury condo listing
  needs marketing materials adapted for 3 target
  international markets.

  Property details:
  - 3 bed / 3.5 bath, 38th floor unit with ocean views
  - 2,200 sq ft (204 sq meters)
  - Building: Oceana Residences (2022), 45 floors
  - Features: Italian Snaidero kitchen, Miele
    appliances, floor-to-ceiling impact windows,
    private elevator, 2 parking spaces
  - Building amenities: Infinity pool, spa, fitness
    center, private beach, concierge, valet
  - HOA: $1,850/month
  - Address: Unit 3802, Oceana Residences, Collins Ave,
    Sunny Isles Beach, FL
  - List price: $2,450,000

  Target markets:
  1. Brazilian buyers (Portuguese language, BRL
     currency, metric system, value beach lifestyle
     and security)
  2. Canadian snowbirds (English/French, CAD
     currency, value weather escape and rental income
     potential when not in residence)
  3. Middle Eastern investors (Arabic consideration,
     USD pricing fine, value privacy and luxury brand
     names, interested in EB-5 visa pathway)

  For each market:
  1. Culturally adapted listing description (300
     words) with appropriate measurements and currency
  2. Key selling points tailored to that market's
     values (5 bullet points)
  3. Cultural considerations notes (what to emphasize,
     what to avoid)

assertions:
  - type: llm_judge
    criteria: "Response creates materials for all 3 markets — Brazilian (Portuguese considerations, BRL, beach/security emphasis), Canadian (CAD, weather/rental income), Middle Eastern (privacy/luxury/EB-5). Each includes listing description, 5 tailored selling points, and cultural considerations."
    weight: 0.35
    description: "InternationalListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates international marketing expertise — cultural adaptations are genuine (not stereotypes); currency conversions are contextually appropriate; selling points reflect actual buyer motivations; cultural considerations show real-world knowledge of each market."
    weight: 0.35
    description: "CulturalAdaptationQuality"
  - type: llm_judge
    criteria: "Response would attract international buyers — Brazilian buyers would feel the listing speaks to their priorities; Canadian snowbirds would see the practical value; Middle Eastern investors would appreciate the privacy and investment angle; each market's unique concerns are addressed."
    weight: 0.30
    description: "InternationalBuyerOutcome"
