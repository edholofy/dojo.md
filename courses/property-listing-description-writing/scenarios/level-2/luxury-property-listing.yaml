meta:
  id: luxury-property-listing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Write luxury property listing descriptions using elevated language, lifestyle storytelling, and exclusivity marketing"
  tags: [luxury, high-end, lifestyle, storytelling, intermediate]

state: {}

trigger: |
  You're a luxury real estate specialist writing the
  listing for a $4.2M waterfront estate. Luxury
  listings require elevated language, lifestyle
  storytelling, and a sense of exclusivity.

  Property details:
  - 5 bed / 6.5 bath waterfront estate
  - 6,800 sq ft on 2.1 acres with 200 ft of
    private waterfront on Lake Simcoe
  - Architecture: Contemporary farmhouse by award-
    winning architect James Mercer
  - Interior: Italian marble foyer, white oak plank
    floors, 12-ft coffered ceilings, floor-to-ceiling
    Fleetwood windows
  - Kitchen: Bulthaup cabinetry, Gaggenau appliances,
    Calacatta Oro marble, butler's pantry with wine
    wall (200 bottles)
  - Primary suite: Lake-facing balcony, Waterworks
    fixtures, heated floors, custom Poliform closet
  - Outdoor: Infinity-edge pool, outdoor kitchen
    with pizza oven, fire pit lounge, boathouse with
    boat lift, private sandy beach
  - Smart home: Savant system, Lutron lighting,
    Sonos whole-home audio, security cameras
  - Garage: 4-car heated with Tesla charging
  - Address: 18 Lakeshore Blvd, Oro-Medonte
  - List price: $4,200,000

  Write:
  1. MLS listing description (300 words, elevated
     but not purple prose)
  2. Full marketing narrative (800 words — a
     lifestyle story that makes the reader feel they
     are experiencing the estate)
  3. Print brochure copy (front cover tagline +
     interior spreads text for 4 pages)
  4. Private showing invitation email (exclusive
     tone, 200 words)

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 pieces — MLS description (300 words); lifestyle narrative (800 words); print brochure copy (tagline + 4 pages); private showing invitation email (200 words). Premium brand names and architectural details are accurately featured."
    weight: 0.35
    description: "LuxuryListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates luxury marketing mastery — language is elevated without being overwrought; the narrative creates sensory experiences (not just lists features); brand names are mentioned naturally; the showing invitation creates exclusivity; the brochure has visual text that would complement photography."
    weight: 0.35
    description: "LuxuryMarketingQuality"
  - type: llm_judge
    criteria: "Response would attract qualified luxury buyers — the listing conveys the estate's value without being crass about price; the lifestyle story makes buyers envision their life there; the exclusive showing invitation creates urgency; the brochure positions the property as a rare offering."
    weight: 0.30
    description: "LuxuryBuyerOutcome"
