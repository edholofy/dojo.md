meta:
  id: neighborhood-description-guide
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Create neighborhood and community descriptions that enhance property listings without violating fair housing guidelines"
  tags: [neighborhood, community, fair-housing, location-marketing, intermediate]

state: {}

trigger: |
  You're a marketing director at a real estate
  brokerage creating a neighborhood description
  guide and templates for your 45 agents. The
  descriptions must enhance listings while staying
  compliant with Fair Housing laws.

  Challenge: Agents often describe neighborhoods in
  ways that inadvertently violate Fair Housing (e.g.,
  "family neighborhood," "safe area," "diverse
  community," "up-and-coming" — all potentially
  problematic).

  Create neighborhood descriptions for 4 different
  areas:

  1. Riverside Heights (urban, walkable):
     Walk Score 88, 15 restaurants, 3 parks, farmers
     market, 2 breweries, art walk first Fridays,
     commuter rail station, median home price $420K

  2. Creekside Estates (suburban, family-oriented):
     Top-rated schools (9/10), community pool, soccer
     fields, library, 3 playgrounds, bike paths,
     median home price $550K

  3. Historic Milltown (character-rich, renovating):
     1890s architecture, converted mill buildings,
     coffee shops, artisan studios, community garden,
     median home price $310K

  4. Summit Pointe (luxury, privacy-focused):
     Gated, 2-acre minimum lots, equestrian trails,
     private lake, club with golf and tennis, median
     home price $1.2M

  For each neighborhood:
  1. Write a 150-word compliant description
  2. Flag common phrases agents might use that could
     be Fair Housing violations
  3. Provide compliant alternatives for flagged phrases

  Then create: A "Neighborhood Description Do's and
  Don'ts" reference guide for all 45 agents.

assertions:
  - type: llm_judge
    criteria: "Response creates descriptions for all 4 neighborhoods (150 words each); identifies potentially problematic phrases for each; provides compliant alternatives; includes a comprehensive Do's and Don'ts reference guide."
    weight: 0.35
    description: "NeighborhoodGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Fair Housing and marketing expertise — descriptions are compelling without demographic references; flagged phrases include subtle violations agents might miss; alternatives maintain marketing appeal; the reference guide is practical for daily use."
    weight: 0.35
    description: "FairHousingMarketingExpertise"
  - type: llm_judge
    criteria: "Response would protect the brokerage — agents would write compliant descriptions confidently; the guide prevents inadvertent violations; each neighborhood description enhances listings while staying legal; the brokerage reduces Fair Housing complaint risk."
    weight: 0.30
    description: "BrokerageProtectionOutcome"
