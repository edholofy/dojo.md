meta:
  id: intermediate-listing-shift
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Shift simulation — write listings for a historic home requiring sensitivity, a short-sale with legal constraints, and a multi-family conversion opportunity"
  tags: [shift-simulation, multi-context, intermediate]

state: {}

trigger: |
  You're handling three challenging listings that
  each require specialized writing approaches.

  === LISTING 1: Historic Home ===
  A 1904 Queen Anne Victorian on the National
  Register of Historic Places. 4 bed / 2.5 bath,
  3,400 sq ft. Original features: stained glass
  transom windows, pocket doors, clawfoot tubs,
  carved fireplace mantels, wraparound porch with
  gingerbread trim. Some deferred maintenance: porch
  needs paint, 2 windows need restoration, kitchen
  is from 1985 renovation. Historic district
  restrictions apply (exterior changes require
  commission approval). Price: $485,000.

  Challenge: Market the charm without triggering
  buyer fears about maintenance costs and restrictions.

  Write: MLS listing (250 words) + heritage marketing
  piece (350 words) that positions restrictions as
  character protection, not limitations.

  === LISTING 2: Short Sale ===
  3 bed / 2 bath ranch, 1,350 sq ft. The seller owes
  $280K, listing at $245,000 (short sale). Bank must
  approve all offers. Property is in decent condition
  but hasn't been updated since 2008. Timeline:
  bank approval takes 60-120 days. Seller is
  cooperative. Price: $245,000.

  Challenge: Attract buyers willing to navigate the
  short sale process while being honest about the
  timeline and uncertainty.

  Write: MLS listing (200 words) clearly disclosing
  the short sale + a "short sale opportunity" buyer
  guide (250 words) explaining the process and
  benefits.

  === LISTING 3: Multi-Family Conversion ===
  Large single-family home (6 bed / 4 bath, 4,200
  sq ft) in a zone that allows conversion to a
  triplex. Current owner uses as single-family but
  it has 3 kitchens, 3 separate entrances, and
  separate utility meters already installed. Near
  university. Price: $520,000.

  Challenge: Market to both traditional homebuyers
  AND investors seeing the conversion potential.

  Write: MLS listing (250 words) + investor
  opportunity analysis (300 words) with potential
  rental income projections.

  Write all six pieces.

assertions:
  - type: llm_judge
    criteria: "Response creates all 6 pieces — historic home MLS + heritage piece; short sale MLS + buyer guide; multi-family MLS + investor analysis. Each addresses the unique challenge of its listing type."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates specialized expertise — historic restrictions are positioned positively; short sale process is honestly explained; multi-family conversion potential is quantified; each listing navigates its unique marketing challenge skillfully."
    weight: 0.35
    description: "SpecializedExpertise"
  - type: llm_judge
    criteria: "Response would attract the right buyers — history enthusiasts would appreciate the heritage piece; patient buyers would see short sale value; investors would see the triplex potential; each listing matches buyers to the right opportunity."
    weight: 0.30
    description: "BuyerMatchingOutcome"
