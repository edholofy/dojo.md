meta:
  id: seo-optimized-listing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Write SEO-optimized listing descriptions with keyword strategy for maximum visibility on Zillow, Realtor.com, and Google"
  tags: [seo, keywords, search-optimization, intermediate]

state: {}

trigger: |
  You're a listing agent who specializes in digital
  marketing. A seller has a beautiful home that's
  been sitting on the market for 30 days with only
  12 online views — the listing description isn't
  search-optimized.

  Property details:
  - 4 bed / 3 bath Mediterranean-style home
  - 3,100 sq ft, built in 2012, corner lot
  - Features: courtyard entry, chef's kitchen with
    Wolf range and Sub-Zero fridge, wine room,
    primary suite with spa bath, covered loggia
    with outdoor kitchen, pool and spa, 3-car garage
  - Location: Tierra Verde community, Scottsdale, AZ
  - List price: $1,150,000
  - Target keywords to rank for: "Scottsdale luxury
    home," "Scottsdale pool home," "Mediterranean
    home Scottsdale," "Tierra Verde Scottsdale"

  Create:
  1. SEO-optimized MLS description (250 words) with
     natural keyword integration
  2. Extended web description (500 words) targeting
     long-tail search phrases
  3. Keyword strategy document — primary, secondary,
     and long-tail keywords with placement guidance
  4. Schema markup recommendations for the listing
     page
  5. Image alt text recommendations for 8 listing
     photos (describe the photo and optimize for SEO)

assertions:
  - type: llm_judge
    criteria: "Response creates all 5 deliverables — SEO-optimized MLS (250 words); extended web description (500 words); keyword strategy with primary/secondary/long-tail; schema markup recommendations; 8 image alt text descriptions."
    weight: 0.35
    description: "SEOListingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates SEO expertise — keywords are integrated naturally (not stuffed); long-tail phrases target specific buyer searches; schema markup is technically accurate; alt text is descriptive and keyword-rich; the strategy addresses Zillow/Realtor.com algorithms."
    weight: 0.35
    description: "SEOExpertise"
  - type: llm_judge
    criteria: "Response would increase visibility — the listing would rank for target keywords; online views would increase from 12; the descriptions read naturally despite optimization; the strategy is actionable for this specific property."
    weight: 0.30
    description: "VisibilityOutcome"
