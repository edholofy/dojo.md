meta:
  id: fair-housing-compliant-listing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Review and rewrite listing descriptions to ensure full Fair Housing Act compliance while maintaining marketing effectiveness"
  tags: [fair-housing, compliance, legal, rewrite, intermediate]

state: {}

trigger: |
  You're a broker reviewing listing descriptions
  written by 3 new agents before they go live. You
  need to identify Fair Housing violations and
  rewrite the descriptions to be compliant while
  keeping them effective.

  === LISTING A (Original — has violations): ===
  "Perfect for a young Christian family! This
  charming home is in a quiet, safe neighborhood
  with great schools — no Section 8. Walking distance
  to St. Mary's Church. The master bedroom suite is
  ideal for couples. Near the country club and golf
  course. An adult community feel without the
  restrictions."

  Property: 4 bed / 2.5 bath colonial, $425,000,
  Maplewood subdivision.

  === LISTING B (Original — has violations): ===
  "Stunning bachelor pad in the heart of Koreatown!
  This modern studio is perfect for a single
  professional who speaks the language of the
  neighborhood. Steps from authentic restaurants
  and cultural centers. No kids or pets. Must be
  able to climb 3 flights of stairs."

  Property: Studio / 1 bath, $215,000, 3rd floor
  walk-up.

  === LISTING C (Original — has violations): ===
  "Exclusive estate in a prestigious, restricted
  community. This gated home offers the privacy and
  security that discerning families desire, away from
  the problems of the city. Handicapped-accessible
  entrance available upon request. Ideal for
  English-speaking professionals."

  Property: 5 bed / 4 bath estate, $1,800,000.

  For each listing:
  1. Identify every Fair Housing violation with the
     specific protected class affected
  2. Rewrite the listing to be fully compliant while
     maintaining marketing appeal
  3. Explain why each change was necessary

  Then create: A Fair Housing listing compliance
  checklist that agents can use before submitting
  any listing.

assertions:
  - type: llm_judge
    criteria: "Response addresses all 3 listings — each violation is identified with the specific protected class (religion, familial status, race, national origin, disability, sex); compliant rewrites maintain marketing appeal; explanations are clear; a compliance checklist is provided."
    weight: 0.35
    description: "FairHousingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Fair Housing expertise — identifies obvious violations (Section 8 discrimination, no kids, English-speaking) and subtle ones (adult community feel, restricted community, bachelor pad); rewrites are genuinely compliant; the checklist is comprehensive and practical."
    weight: 0.35
    description: "FairHousingExpertise"
  - type: llm_judge
    criteria: "Response would prevent legal liability — all protected classes are correctly identified; compliant rewrites show that effective marketing doesn't require discriminatory language; the checklist would prevent future violations across the brokerage."
    weight: 0.30
    description: "LegalComplianceOutcome"
