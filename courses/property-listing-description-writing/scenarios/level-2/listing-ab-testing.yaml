meta:
  id: listing-ab-testing
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Create A/B test variations of listing descriptions to optimize for clicks, saves, and showing requests"
  tags: [ab-testing, optimization, data-driven, intermediate]

state: {}

trigger: |
  You're a real estate marketing analyst helping
  agents optimize their listing descriptions using
  A/B testing. You'll create test variations for 3
  different properties.

  === PROPERTY 1: Mid-Range Ranch ===
  3 bed / 2 bath, 1,500 sq ft, $325,000
  Hypothesis: "Lifestyle-focused descriptions
  generate more saves than feature-focused
  descriptions"
  Test: Feature-focused version (A) vs lifestyle-
  focused version (B), 250 words each

  === PROPERTY 2: Luxury Condo ===
  2 bed / 2 bath penthouse, 1,800 sq ft, $895,000
  Hypothesis: "Opening with a provocative question
  generates more clicks than opening with property
  facts"
  Test: Facts-first version (A) vs question-hook
  version (B), 300 words each

  === PROPERTY 3: Investment Duplex ===
  2-unit, $340,000, $2,800/month gross rent
  Hypothesis: "Leading with ROI numbers generates
  more inquiries than leading with property
  description"
  Test: Property-description-first (A) vs
  numbers-first (B), 200 words each

  Create:
  1. Both A/B versions for all 3 properties (6
     descriptions total)
  2. Testing methodology — how to set up the tests
     on listing platforms
  3. Success metrics for each test
  4. Analysis framework for interpreting results
  5. Recommendations for future tests

assertions:
  - type: llm_judge
    criteria: "Response creates all 6 description versions (A and B for each property); testing methodology; success metrics per test; analysis framework; future test recommendations. Each A/B pair tests a single variable while controlling others."
    weight: 0.35
    description: "ABTestingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates marketing experimentation expertise — A/B pairs isolate the tested variable; the methodology is practical for real estate platforms; metrics are measurable (clicks, saves, showing requests); the analysis framework accounts for sample size and significance."
    weight: 0.35
    description: "ExperimentationExpertise"
  - type: llm_judge
    criteria: "Response would improve listing performance — the variations are meaningfully different; results would be actionable; the framework could be applied to future listings; data-driven optimization would become part of the agent's practice."
    weight: 0.30
    description: "PerformanceOptimizationOutcome"
