meta:
  id: listing-photography-descriptions
  level: 2
  course: property-listing-description-writing
  type: output
  description: "Write compelling photo captions, virtual tour scripts, and video walkthrough narration for a property listing"
  tags: [photography, virtual-tour, video, multimedia, intermediate]

state: {}

trigger: |
  You're a listing coordinator preparing the
  multimedia marketing package for a mid-range home.
  The photographer has delivered 25 photos, a 3D
  Matterport tour, and raw video footage for a
  walkthrough video.

  Property details:
  - 3 bed / 2 bath contemporary ranch
  - 1,900 sq ft, built in 2019
  - Open concept with 10-ft ceilings
  - Kitchen: shaker cabinets, quartz, large island
    with seating for 4
  - Living room: gas fireplace, slider to covered
    deck
  - Primary: en-suite with dual vanity, large shower
  - Finished flex room (could be office, gym, or
    4th bedroom)
  - Attached 2-car garage, mudroom entry
  - Backyard: fenced, paver patio, fire pit area,
    raised garden beds
  - Address: 510 Aspen Trail, Cedarville
  - List price: $389,000

  Photos delivered (create captions for each):
  1. Front exterior (wide angle, curb appeal)
  2. Front door/entry
  3. Living room (fireplace view)
  4. Living room (window/deck view)
  5. Kitchen (island view)
  6. Kitchen (appliance wall view)
  7. Dining area
  8. Primary bedroom
  9. Primary bathroom
  10. Second bedroom
  11. Third bedroom
  12. Flex room
  13. Laundry room
  14. Mudroom/garage entry
  15. Backyard (patio/fire pit)

  Create:
  1. Photo captions for all 15 photos (descriptive,
     benefit-focused, 10-20 words each)
  2. 3D Matterport tour room labels and descriptions
     (brief descriptions for each tagged room)
  3. Video walkthrough narration script (2.5-minute
     guided tour, conversational but professional)
  4. Social media video teaser script (30-second
     highlight reel narration)

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 deliverables — 15 photo captions (10-20 words each); Matterport room labels; 2.5-minute video narration script; 30-second social teaser script. All property details are accurately represented."
    weight: 0.35
    description: "MultimediaCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multimedia marketing skill — photo captions go beyond labels to sell benefits; Matterport descriptions help virtual visitors understand each space; the walkthrough script flows naturally room-to-room; the teaser creates urgency and interest."
    weight: 0.35
    description: "MultimediaMarketingQuality"
  - type: llm_judge
    criteria: "Response would enhance the listing's digital presence — photo captions would make the listing stand out; the video script would keep viewers watching; the social teaser would drive traffic to the full listing; multimedia elements work together as a cohesive package."
    weight: 0.30
    description: "DigitalPresenceOutcome"
