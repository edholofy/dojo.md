meta:
  id: plain-english-rewrite
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Rewrite financial disclosures in plain English — transform jargon-heavy, legalistic financial narratives into clear, readable text per SEC plain English guidelines"
  tags: [plain-english, readability, sec-guidelines, intermediate]

state: {}

trigger: |
  The following financial disclosures are written
  in dense, legalistic language. Rewrite each in
  plain English per the SEC's Plain English
  Handbook guidelines while preserving all material
  information.

  DISCLOSURE 1 — LIQUIDITY (from MD&A):
  "The Company's principal sources of liquidity
  are comprised of cash flows generated from
  operating activities in the ordinary course of
  business and borrowings made available pursuant
  to the terms of the Company's existing revolving
  credit facility agreement, which provides for
  aggregate commitments of up to $200,000,000
  subject to certain financial covenant requirements
  including a maximum consolidated leverage ratio
  of 4.0x consolidated EBITDA as defined therein.
  As of December 31, 2025, the Company had
  $45,200,000 of outstanding borrowings under the
  revolving credit facility and $18,300,000 of
  outstanding letters of credit, resulting in
  $136,500,000 of availability thereunder."

  DISCLOSURE 2 — REVENUE RECOGNITION:
  "Revenue from contracts with customers is
  recognized when control of the promised goods
  or services is transferred to the customer in
  an amount that reflects the consideration the
  Company expects to be entitled to in exchange
  for those goods or services. The Company
  determines revenue recognition through the
  following five-step model: (i) identification
  of the contract(s) with a customer; (ii)
  identification of the performance obligations
  in the contract; (iii) determination of the
  transaction price; (iv) allocation of the
  transaction price to the performance obligations
  in the contract; and (v) recognition of revenue
  when (or as) the entity satisfies a performance
  obligation."

  DISCLOSURE 3 — GOODWILL IMPAIRMENT:
  "In accordance with Accounting Standards
  Codification ('ASC') Topic 350, Intangibles—
  Goodwill and Other, the Company evaluates
  goodwill for impairment on an annual basis as
  of October 1, or more frequently if events or
  changes in circumstances indicate that the
  carrying amount of a reporting unit may exceed
  its fair value. In performing its annual
  impairment assessment, the Company first
  performs a qualitative assessment to determine
  whether it is more likely than not (i.e., a
  probability of greater than 50 percent) that
  the fair value of a reporting unit is less than
  its carrying amount. If the qualitative
  assessment indicates impairment is more likely
  than not, the Company performs a quantitative
  assessment comparing the estimated fair value
  of each reporting unit to its carrying amount."

  Rewrite all three in plain English.

assertions:
  - type: llm_judge
    criteria: "Liquidity rewrite is clear and accessible while preserving all material facts — the rewritten disclosure should convey: the company gets its cash from two sources — business operations and a $200M credit line; as of December 31, 2025, it had used $45.2M of that credit line plus $18.3M in letters of credit, leaving $136.5M available to borrow; the credit line requires the company to keep its debt below 4x EBITDA; the rewrite uses: active voice ('we fund our operations through...' instead of 'liquidity is comprised of...'), shorter sentences, plain terms ('credit line' instead of 'revolving credit facility agreement providing for aggregate commitments'), clear arithmetic (used + letters of credit = amount used, total - used = available), and removes unnecessary legal phrases ('pursuant to the terms of,' 'in the ordinary course of business,' 'as defined therein'); the rewrite is approximately 50-60% shorter than the original while preserving every material fact."
    weight: 0.35
    description: "LiquidityRewrite"
  - type: llm_judge
    criteria: "Revenue recognition rewrite explains the concept without just quoting ASC 606 — the original is essentially a verbatim recitation of ASC 606's five-step model, which provides no company-specific information; the plain English rewrite should: explain HOW the company recognizes revenue in practical terms (e.g., 'we record revenue when we deliver products to customers or complete services' rather than the abstract five-step model), provide company-specific examples where relevant (if the company sells both products and subscriptions, explain when revenue is recognized for each), use straightforward language ('we count revenue when...' not 'revenue is recognized when control is transferred'), and acknowledge that while the five-step framework is required accounting policy, the narrative should focus on helping investors understand the company's specific revenue patterns; the rewrite demonstrates the difference between compliance-driven boilerplate and investor-useful disclosure."
    weight: 0.35
    description: "RevenueRewrite"
  - type: llm_judge
    criteria: "Goodwill impairment rewrite demystifies the concept for non-accountants — the rewrite explains: goodwill represents the premium we paid over the fair value of net assets when we acquired businesses; we test annually (October 1) whether this premium is still justified — meaning whether the acquired business units are still worth at least what we paid; we first do a quick check (qualitative) and only do a detailed valuation if the quick check suggests a problem; if the business unit is worth less than what's on our books, we write down the difference as a loss; the rewrite strips out: ASC references that mean nothing to most investors, probability language ('more likely than not, i.e., a probability of greater than 50 percent'), and passive constructions; all three rewrites follow the SEC Plain English Handbook principles: short sentences, active voice, common words, concrete examples, and no unnecessary legal or accounting jargon; the rewrites should be approximately 40-60% shorter than the originals."
    weight: 0.30
    description: "GoodwillRewrite"
