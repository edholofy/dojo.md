meta:
  id: risk-factor-writing
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Write SEC-compliant risk factors — draft company-specific risk disclosures that are meaningful, not boilerplate, per Regulation S-K Item 105"
  tags: [risk-factors, sec-disclosure, item-105, intermediate]

state: {}

trigger: |
  The SEC has issued a comment letter criticizing
  the company's risk factors as "generic and
  boilerplate." Rewrite three risk factors to be
  company-specific and meaningful per Item 105
  of Regulation S-K.

  COMPANY: CloudMed Health (healthcare SaaS company)
  - Revenue: $420M, 85% subscription, 15% services
  - Customers: 1,200 hospitals and health systems
  - Data: processes 500M patient records
  - Market: US healthcare revenue cycle management
  - Key regulation: HIPAA, HITECH, state data privacy

  CURRENT (REJECTED) RISK FACTORS:
  1. "We face competition from other companies that
     may have greater resources. If we are unable to
     compete effectively, our business could be
     materially adversely affected."

  2. "We may experience cybersecurity incidents that
     could harm our business. A data breach could
     result in significant costs and reputational
     damage."

  3. "Changes in healthcare regulations could
     adversely affect our business. New laws or
     changes to existing laws could increase our
     compliance costs."

  Rewrite each risk factor to be company-specific,
  meaningful, and compliant with the SEC's
  expectations. Each should be 200-300 words.

assertions:
  - type: llm_judge
    criteria: "Competition risk factor is specific to CloudMed's competitive landscape — the rewritten risk factor names or describes specific competitive threats: large EHR vendors (Epic, Cerner/Oracle Health) that are expanding into revenue cycle management and can bundle with their existing hospital installations at reduced cost; established revenue cycle management competitors (R1 RCM, Waystar, nThrive) that have larger customer bases and longer track records; and potential new entrants using AI to automate revenue cycle workflows; the risk explains HOW competition specifically threatens CloudMed: hospitals may choose integrated solutions from their EHR vendor rather than CloudMed's best-of-breed approach, competitors with greater resources may offer more aggressive pricing or acquire complementary technologies, and CloudMed's 1,200-customer base represents only approximately 20% of the addressable market, meaning most hospitals could be won by competitors; the consequences are specific: loss of customers to bundled solutions, pricing pressure reducing margins, increased sales cycle length, and higher customer acquisition costs."
    weight: 0.35
    description: "CompetitionRiskFactor"
  - type: llm_judge
    criteria: "Cybersecurity risk factor addresses the specific nature of CloudMed's data exposure — the rewritten risk factor quantifies the exposure: CloudMed processes 500 million patient records containing protected health information (PHI), making it a high-value target for cyber attacks; the risk is specific to healthcare data: HIPAA breach notification requirements mandate disclosure of breaches affecting 500+ individuals, which would be reported to HHS, state attorneys general, and media outlets, creating reputational damage beyond financial cost; the potential financial impact is quantified: HIPAA penalties of up to $1.9 million per violation category per year, plus state-level enforcement, class action litigation (recent healthcare data breach settlements averaging $200-400 per affected record), and customer contract termination rights triggered by breach events; the risk addresses CloudMed's specific threat landscape: nation-state actors targeting healthcare data, ransomware attacks on healthcare infrastructure increasing 150% in recent years, and the risk from the company's third-party hosting and cloud infrastructure dependencies."
    weight: 0.35
    description: "CybersecurityRiskFactor"
  - type: llm_judge
    criteria: "Healthcare regulation risk factor addresses specific regulatory exposure — the rewritten risk factor identifies specific regulations and their impact on CloudMed: changes to CMS reimbursement methodologies (e.g., Medicare payment rate adjustments) directly affect the demand for revenue cycle management services; state data privacy laws (California CCPA/CPRA, Texas medical privacy law, state-specific breach notification laws) create a patchwork of compliance requirements that increase operating costs; the 21st Century Cures Act interoperability requirements may require CloudMed to share patient data in ways that reduce competitive differentiation; potential federal privacy legislation could supersede existing frameworks and require significant system modifications; the risk is specific: a 10% reduction in Medicare reimbursement rates could lead hospitals to reduce spending on revenue cycle technology by 15-20%, directly impacting CloudMed's addressable market; each rewritten risk factor is 200-300 words, uses company-specific facts and figures, explains the mechanism of harm (not just 'could adversely affect'), and would satisfy SEC staff reviewers that the disclosure is meaningful."
    weight: 0.30
    description: "RegulationRiskFactor"
