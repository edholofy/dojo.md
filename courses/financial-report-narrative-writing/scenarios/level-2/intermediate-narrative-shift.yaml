meta:
  id: intermediate-narrative-shift
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Intermediate shift simulation — produce multiple financial narratives for different audiences under deadline pressure: an SEC filing section, an internal board memo, and an analyst Q&A prep"
  tags: [shift-simulation, multi-audience, deadline-pressure, intermediate]

state: {}

trigger: |
  It's 10-K filing week and you must produce three
  deliverables by end of day. The company just
  completed a challenging year.

  COMPANY: RegionalAir Holdings (regional airline)
  FY2025 RESULTS:
  - Revenue: $2.1B (-3% YoY due to capacity cuts)
  - CASM (cost per available seat mile): 14.2¢
    (down from 14.8¢ — improvement)
  - RASM (revenue per ASM): 15.1¢ (up from 14.5¢)
  - Operating margin: 6.3% (up from -2.1% loss year)
  - Net income: $84M (prior year: -$52M loss)
  - Fuel cost: 38% of COGS ($3.45/gallon avg)
  - Load factor: 82% (up from 76%)
  - Fleet: 145 aircraft (down from 160 — retired 15)
  - Net debt: $1.8B (down from $2.1B)

  CONTEXT:
  - Turnaround year after 2024 losses
  - CEO implemented "Right-Size, Right-Price" strategy
  - Cut unprofitable routes, retired old aircraft
  - Improved revenue per seat through better pricing
  - Fuel hedging saved $45M vs. spot prices
  - Pilot contract ratification added $30M annual cost
  - DOT on-time performance: 78% (improved from 71%)

  DELIVERABLE 1: Write the MD&A opening paragraphs
  for the 10-K (300 words — "Overview" section).

  DELIVERABLE 2: Write an internal memo to the
  board highlighting the turnaround progress and
  remaining risks (400 words).

  DELIVERABLE 3: Prepare Q&A talking points for
  the CFO — anticipate 5 analyst questions and
  draft responses (bullet format).

assertions:
  - type: llm_judge
    criteria: "MD&A overview section is SEC-compliant and frames the turnaround — the 300-word overview follows Regulation S-K Item 303 guidance: provides a balanced summary of results (revenue down 3% but profitability dramatically improved from -2.1% to +6.3% operating margin), attributes the turnaround to specific actions (capacity rationalization, fleet retirement, revenue management improvements, fuel hedging), identifies known trends that will affect future results (pilot cost increases, fleet modernization needs, competitive dynamics), and sets up the detailed discussion that follows in the rest of MD&A; the language is appropriate for a public filing: factual, balanced, avoids promotional tone, and includes forward-looking elements with appropriate hedging; the overview tells the transformation story: from a loss-making airline with too many seats and too many old aircraft to a right-sized, profitable operation."
    weight: 0.35
    description: "MDAOverview"
  - type: llm_judge
    criteria: "Board memo provides strategic context beyond the public filing — the 400-word memo gives the board information they need that goes beyond the public MD&A: competitive intelligence (how do our margins compare to peer regionals?), strategic risks the board should be monitoring (potential for another pilot shortage driving further contract cost increases, the 15 retired aircraft need replacement — what's the fleet plan?), balance sheet trajectory (net debt down $300M is positive but $1.8B is still significant — path to investment grade?), the DOT performance improvement to 78% is good but still below the 80% threshold that avoids regulatory scrutiny; the tone is more candid than the public filing: the turnaround is real but fragile — a fuel spike, pilot action, or recession could reverse it; the board should understand both the progress made and the remaining vulnerability."
    weight: 0.35
    description: "BoardMemo"
  - type: llm_judge
    criteria: "Analyst Q&A prep anticipates the right questions and provides defensible answers — the 5 questions should include what experienced airline analysts would ask: (1) revenue decline vs. industry growth (defensive answer: deliberate capacity cut, RASM improvement shows pricing power), (2) sustainability of margin improvement (how much is structural vs. favorable fuel?), (3) pilot contract impact on forward cost structure ($30M headwind acknowledged, offset by fleet efficiency), (4) fleet renewal plan and CapEx needs for the 15 retired aircraft, (5) capacity growth plans for 2026 (will the company grow again or continue to optimize?); each response is in bullet format, concise, and includes both the answer and the supporting data points; the responses are honest about challenges while framing them constructively — the CFO should not sound evasive on analyst calls."
    weight: 0.30
    description: "AnalystQAPrep"
