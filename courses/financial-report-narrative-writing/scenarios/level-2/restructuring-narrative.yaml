meta:
  id: restructuring-narrative
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Write restructuring and special charges narrative — communicate workforce reductions, facility closures, and restructuring charges with appropriate transparency and sensitivity"
  tags: [restructuring, special-charges, workforce-reduction, intermediate]

state: {}

trigger: |
  The company is announcing a major restructuring
  program alongside Q4 earnings. Draft the
  restructuring narrative for both the earnings
  release and the MD&A.

  RESTRUCTURING DETAILS:
  Program name: "Accelerate 2026"
  Total estimated charges: $85-95M
  - Severance and benefits: $45-50M
  - Facility closure costs: $20-25M
  - Asset impairments: $15-18M
  - Contract termination costs: $5-7M

  WORKFORCE IMPACT:
  - 1,200 positions eliminated (8% of workforce)
  - Primarily in: manufacturing (600), corporate
    functions (350), sales support (250)
  - Affected locations: 3 manufacturing plants
    (2 closures, 1 consolidation), corporate
    HQ reduction
  - Severance: 2 weeks per year of service,
    average 24 weeks
  - Outplacement services provided

  EXPECTED BENEFITS:
  - Annual run-rate savings: $120M by end of 2026
  - Operating margin improvement: +2.5 percentage
    points
  - Manufacturing footprint optimized (12 plants
    to 10)
  - Corporate overhead reduced by 15%

  TIMELINE:
  - Q4 2025: $35M charge (initial severance, asset
    impairments)
  - Q1 2026: $30M charge (facility closure, remaining
    severance)
  - Q2 2026: $20M charge (contract terminations,
    remaining costs)
  - H2 2026: savings fully realized

  Write:
  1. Earnings release restructuring section (300 words)
  2. MD&A restructuring disclosure (500 words)

assertions:
  - type: llm_judge
    criteria: "Earnings release section communicates the restructuring clearly and sensitively — the press release section names the program, quantifies the charges ($85-95M), describes the scope (1,200 positions, 3 plant actions), and communicates expected benefits ($120M annual savings, 2.5pp margin improvement); critically, the language acknowledges the human impact — these are not just 'headcount reductions' but 'difficult decisions affecting approximately 1,200 employees and their families'; the company's commitment to affected employees is stated: severance averaging 24 weeks, outplacement services, benefits continuation; the section includes a management quote framing the restructuring as necessary for long-term competitiveness while acknowledging the personal impact; the release is factual without being coldly clinical, and avoids euphemisms ('right-sizing,' 'optimization of human capital') that feel tone-deaf during workforce reductions."
    weight: 0.35
    description: "EarningsReleaseSection"
  - type: llm_judge
    criteria: "MD&A disclosure meets SEC requirements for restructuring reporting — the MD&A section follows ASC 420 (exit or disposal cost obligations) disclosure requirements: describes the major actions comprising the program (plant closures, workforce reduction, corporate reorganization), quantifies each cost component (severance $45-50M, facility $20-25M, impairments $15-18M, contract terminations $5-7M), provides the timeline for charges and savings realization, explains the expected financial impact on future operations; the narrative goes beyond the minimum disclosure: explains WHY the restructuring is necessary (market conditions, competitive dynamics, over-capacity), how the restructuring aligns with the company's strategic direction, what the post-restructuring operating model looks like (10 plants instead of 12, leaner corporate structure), and what risks could affect the estimated savings (execution risk, customer disruption, talent retention in remaining operations); the MD&A disclosure also addresses: the impact on revenue (any revenue at risk from plant closures?), the impact on future COGS (savings quantified), and whether the restructuring charges will be presented separately in the income statement."
    weight: 0.35
    description: "MDADisclosure"
  - type: llm_judge
    criteria: "Both sections handle the balance between financial benefit and human cost — the overall narrative conveys: the financial case is clear ($85-95M investment generating $120M annual savings, approximately 1.3-year payback), but the communication doesn't treat this purely as a financial optimization; the earnings release acknowledges affected employees, the MD&A discusses the talent and operational transition plan; the language avoids: overly positive framing of layoffs ('exciting transformation'), military metaphors ('surgical cuts'), and dehumanizing language ('resource optimization'); the narrative would withstand media scrutiny (reporters will quote the press release), employee review (remaining employees will read this), and analyst scrutiny (investors want to know the savings are real and achievable); the two deliverables are appropriately different: the press release is shorter, more accessible, and includes the human element; the MD&A is longer, more technical, and focused on financial compliance."
    weight: 0.30
    description: "BalanceAndSensitivity"
