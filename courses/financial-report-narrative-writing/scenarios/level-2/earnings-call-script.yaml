meta:
  id: earnings-call-script
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Write earnings call prepared remarks — draft the CFO's scripted commentary for the quarterly earnings conference call with analysts and investors"
  tags: [earnings-call, analyst-communication, prepared-remarks, intermediate]

state: {}

trigger: |
  Draft the CFO's prepared remarks (financial
  review section) for the Q2 2025 earnings
  conference call. The CEO will handle the
  strategic overview; you write the financial
  detail section.

  COMPANY: TechFlow Systems (enterprise software)
  Stock: TFLO, NASDAQ, $2.8B market cap

  Q2 2025 RESULTS:
  Revenue: $185M (+18% YoY)
    Subscription: $148M (+24%)
    Professional Services: $27M (+2%)
    Perpetual License: $10M (-22%)
  
  Non-GAAP Gross Margin: 72% (Q2'24: 69%)
  Non-GAAP Operating Margin: 14% (Q2'24: 10%)
  Non-GAAP EPS: $0.42 (Q2'24: $0.28)
  
  FCF: $28M (15% margin, Q2'24: $12M)
  RPO (Remaining Performance Obligations): $620M (+22%)
  Net Revenue Retention: 118%
  
  Cash: $320M, no debt
  Customers >$100K ARR: 285 (up from 240)

  UPDATED GUIDANCE (raised):
  FY2025 Revenue: $740-750M (prior: $720-735M)
  Non-GAAP Op Margin: 13-14% (prior: 12-13%)
  FCF Margin: 14-15%

  ANALYST SENSITIVITIES:
  - Analysts will focus on subscription growth
    deceleration (24% vs. 28% in Q1)
  - Professional services revenue barely growing
  - Perpetual license declining (model transition)
  - Want to understand RPO composition (short vs.
    long-term)

  Write 500-700 words of CFO prepared remarks.

assertions:
  - type: llm_judge
    criteria: "Prepared remarks follow earnings call conventions and pre-empt analyst concerns — the remarks should follow standard earnings call structure: open with a brief framing statement ('Thank you [CEO name]. Let me walk through our Q2 financial results in detail'), proceed through revenue by line, margins, profitability, cash flow, balance sheet, and guidance; the subscription growth deceleration (24% vs. 28% in Q1) should be addressed proactively — not defensively but with context: perhaps noting that Q1 benefited from a large deal that pulled forward revenue, or that 24% subscription growth at $148M scale represents $28M of net new subscription revenue (compared to $25M in Q1 at 28% growth rate — the absolute dollar growth is actually accelerating); the perpetual license decline of 22% should be framed as an expected and positive outcome of the subscription model transition; the professional services near-flat growth should be positioned as intentional: higher subscription mix means less customization, and lower services intensity is a positive for gross margin expansion."
    weight: 0.35
    description: "EarningsCallConventions"
  - type: llm_judge
    criteria: "Financial narrative highlights the key proof points that analysts value — the remarks should emphasize: (1) RPO of $620M (+22%) as a leading indicator of future revenue, with commentary on the current vs. non-current split (analysts want to know how much converts to revenue in the next 12 months); (2) Net revenue retention of 118% demonstrating strong expansion within the existing customer base; (3) Customers >$100K ARR growing from 240 to 285 (19% growth) shows enterprise penetration; (4) Gross margin expansion from 69% to 72% driven by subscription mix shift (higher margin than services and perpetual); (5) Operating margin improvement from 10% to 14% showing operating leverage and disciplined expense management; (6) FCF improvement from $12M to $28M (more than doubling) demonstrating the quality of earnings; the guidance raise is presented with appropriate confidence: both revenue ($740-750M, up from $720-735M) and margin (13-14%, up from 12-13%) raised, signaling broad-based improvement."
    weight: 0.35
    description: "AnalystProofPoints"
  - type: llm_judge
    criteria: "Writing tone and style match a CFO's earnings call delivery — the tone is confident but measured (not promotional — this will be a public transcript and SEC fair disclosure applies), uses precise numbers rather than vague descriptions, includes appropriate hedging language ('we expect,' 'we anticipate') for forward-looking statements, flows naturally when read aloud (this is a script for verbal delivery, not a written report), is 500-700 words (approximately 4-5 minutes of speaking time), and closes with the guidance raise and a brief forward-looking statement before transitioning to Q&A ('With that, let me turn it back to [CEO/operator] for questions')."
    weight: 0.30
    description: "CFOToneAndStyle"
