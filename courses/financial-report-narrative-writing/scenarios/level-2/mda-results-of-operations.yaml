meta:
  id: mda-results-of-operations
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Write MD&A Results of Operations section — draft SEC-compliant discussion of revenue, cost, and profitability changes with proper attribution and analysis"
  tags: [mda, results-of-operations, sec-compliance, intermediate]

state: {}

trigger: |
  Draft the Results of Operations section of the
  MD&A for a publicly traded specialty chemicals
  company's annual report (10-K filing).

  RESULTS OF OPERATIONS — FISCAL YEAR 2025 vs 2024
  (in millions)
                        FY2025   FY2024   Change    %
  Net Revenue           $1,845   $1,720   $125    +7.3%
    Volume effect                          $172   +10.0%
    Price/mix effect                      ($47)   -2.7%

  Cost of Goods Sold    $1,218   $1,100   $118   +10.7%
  Gross Profit            $627     $620     $7    +1.1%
  Gross Margin            34.0%    36.0%  -2.0pp

  Selling Expenses        $185     $175    $10    +5.7%
  R&D                     $112      $98    $14   +14.3%
  G&A                      $95      $88     $7    +8.0%
  Restructuring             $18      $0    $18      NM
  Total OpEx              $410     $361    $49   +13.6%

  Operating Income        $217     $259   ($42)  -16.2%
  Operating Margin         11.8%    15.1%  -3.3pp

  Interest Expense         $32      $28     $4   +14.3%
  Other Income              $5       $3     $2   +66.7%
  Pre-tax Income          $190     $234   ($44)  -18.8%
  Tax Expense              $42      $56   ($14)  -25.0%
  Effective Tax Rate       22.1%    23.9%  -1.8pp
  Net Income              $148     $178   ($30)  -16.9%
  Diluted EPS             $2.96    $3.56  ($0.60) -16.9%

  ADDITIONAL CONTEXT:
  - Volume growth from new agricultural chemistry
    customer wins
  - Price decline: competitive pressure in
    industrial coatings segment
  - COGS increase: feedstock costs (crude-oil
    derivatives) up 15%
  - R&D increase: investment in sustainable
    chemistry platform
  - Restructuring: closed underperforming coatings
    plant in Ohio ($18M charge — $12M severance,
    $6M asset writedowns)
  - Interest: $50M incremental borrowing for
    working capital
  - Tax rate benefit: R&D tax credits and favorable
    geographic mix

  Write the full Results of Operations section
  (800-1000 words) in MD&A format per Regulation
  S-K Item 303.

assertions:
  - type: llm_judge
    criteria: "Revenue analysis properly attributes changes to volume, price, and mix — the narrative follows SEC guidance to attribute material revenue changes to specific factors: revenue increased $125M (7.3%) driven by volume growth of $172M (10.0%) partially offset by unfavorable price/mix of $47M (2.7%); the volume growth is attributed to new agricultural chemistry customer wins, representing the company's expansion into higher-growth end markets; the price decline is attributed to competitive pressure specifically in the industrial coatings segment (not across all segments — the specificity matters for SEC compliance); the narrative discusses the strategic implications: the volume/price divergence signals a market where the company is gaining share but facing pricing pressure — management should address whether this pricing pressure is expected to continue."
    weight: 0.35
    description: "RevenueAttribution"
  - type: llm_judge
    criteria: "Cost and margin analysis meets SEC MD&A standards — COGS analysis: cost of goods sold increased 10.7%, outpacing revenue growth of 7.3%, resulting in 2.0pp gross margin compression from 36.0% to 34.0%; the narrative attributes this to: feedstock cost inflation (crude-oil derivatives up 15%, which disproportionately affects the chemicals industry), the inability to fully pass through cost increases to customers (only partially offset by volume leverage), and potentially unfavorable product mix from higher volume in lower-margin agricultural products; operating expense analysis: selling expenses grew 5.7% (below revenue growth — positive efficiency), R&D grew 14.3% driven by the strategic sustainable chemistry platform investment, G&A grew 8.0% for infrastructure scaling; the restructuring charge of $18M is discussed separately with specifics: closure of the Ohio coatings plant comprising $12M in severance and $6M in asset write-downs, positioned as a strategic decision to exit underperforming capacity; operating margin compression of 3.3pp attributed to the combination of gross margin pressure, restructuring charges, and strategic R&D investment."
    weight: 0.35
    description: "CostAndMarginAnalysis"
  - type: llm_judge
    criteria: "Below-the-line items and overall narrative quality meet filing standards — interest expense increase of $4M attributed to $50M incremental borrowing for working capital needs (the narrative should question what's driving the working capital increase); effective tax rate improvement from 23.9% to 22.1% attributed to R&D tax credits (linked to the increased R&D investment) and favorable geographic earnings mix; the overall narrative is 800-1000 words, follows standard MD&A format (revenue → COGS → gross profit → OpEx → operating income → below the line → net income), uses proper SEC language and disclosure conventions, avoids promotional language, addresses known trends and uncertainties (feedstock cost outlook, competitive pricing environment, restructuring benefits expected), and would pass SEC staff review without generating a comment letter for insufficient explanation."
    weight: 0.30
    description: "BelowLineAndQuality"
