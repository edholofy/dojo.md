meta:
  id: board-financial-report
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Write a board-level financial report — prepare financial narrative for board of directors review with appropriate level of strategic analysis and governance focus"
  tags: [board-reporting, governance, strategic-analysis, intermediate]

state: {}

trigger: |
  Prepare the CFO's financial report narrative
  for the Q3 board of directors meeting. The board
  package needs a financial summary that goes
  beyond the numbers to highlight strategic
  implications and items requiring board attention.

  COMPANY: Consumer products company, $800M revenue
  BOARD: 9 directors (3 independent, 2 with finance
  backgrounds)

  Q3 HIGHLIGHTS:
  - Revenue: $210M (budget: $220M, -4.5%)
  - EBITDA: $33.6M (budget: $39.6M, -15.2%)
  - EBITDA margin: 16.0% (budget: 18.0%)
  - Net income: $14.2M (budget: $19.8M, -28.3%)
  - Year-to-date revenue: $605M (FY budget: $840M,
    needs $235M in Q4 vs. budget)
  - Cash: $45M (down $20M from Q2)
  - Covenant compliance: 3.2x net debt/EBITDA
    (covenant max: 4.0x)
  - Dividend: $8M paid (maintained, but FCF coverage
    tightening)

  ITEMS REQUIRING BOARD ATTENTION:
  1. The $10M revenue shortfall is concentrated in
     the Premium segment (new product launch
     underperforming — 40% below plan)
  2. A&P spend was cut $5M in Q3 to preserve EBITDA
     (creates Q4 risk for revenue)
  3. Working capital deteriorating (AR +$15M,
     inventory +$8M vs. Q2)
  4. Two customer contracts up for renewal ($25M
     combined) with competitive pressure
  5. Potential $12M goodwill impairment in the
     International segment (triggering event: 3
     consecutive quarters of declining revenue)

  Write a 600-800 word board-level financial
  narrative that highlights both results and
  items requiring governance attention.

assertions:
  - type: llm_judge
    criteria: "Board narrative leads with strategic issues, not just financial results — the narrative opens with the headline for the board: Q3 revenue missed budget by 4.5% ($10M), driven primarily by the Premium segment new product underperformance; but more importantly, the decisions made in response (cutting A&P spend by $5M) create meaningful risk for Q4; the board needs to understand the dynamic: management preserved near-term EBITDA by cutting marketing spend, but this creates a compounding problem — less marketing support for an already underperforming product, making the Q4 revenue target ($235M needed for full-year budget) increasingly difficult; the narrative should frame the 5 board-attention items in order of governance importance: (1) the goodwill impairment risk ($12M, requiring board awareness of the triggering event analysis), (2) the revenue/A&P trade-off decision and its implications, (3) the contract renewal risk ($25M, competitive threat), (4) working capital deterioration and cash consumption, (5) covenant compliance trajectory (3.2x vs. 4.0x max — still compliant but trending the wrong way)."
    weight: 0.35
    description: "StrategicFocus"
  - type: llm_judge
    criteria: "Financial analysis is appropriate for board-level governance — covenant analysis: net debt/EBITDA at 3.2x with 4.0x maximum provides 0.8x of headroom, but if Q4 EBITDA comes in below budget (likely given the A&P cuts and revenue risk), headroom narrows further; the narrative should model the downside: if Q4 revenue misses by 10% and EBITDA margin compresses to 14%, the covenant would approach 3.7x; dividend sustainability analysis: $8M quarterly dividend ($32M annual) against deteriorating free cash flow — if working capital continues consuming cash, the dividend coverage could become an issue by Q2 2026; goodwill impairment: the International segment's 3 consecutive quarters of declining revenue constitutes a triggering event under ASC 350 requiring an impairment test — the $12M potential charge would not affect cash flow but would reduce reported earnings; the narrative provides the board with actionable information for governance decisions, not just operational updates."
    weight: 0.35
    description: "GovernanceAnalysis"
  - type: llm_judge
    criteria: "Writing is appropriate for a board audience — 600-800 words, organized with clear section headers or signposts so directors can quickly navigate to areas of interest, uses financial terminology appropriate for a board with mixed financial literacy (explains technical concepts like covenant compliance without being condescending), clearly separates 'for information' items from 'requiring board discussion/decision' items, recommends specific actions or decisions the board should consider (e.g., whether to maintain the A&P cut strategy, how to respond to the contract renewal competitive threat), and maintains a tone of professional gravity — neither alarming nor dismissive of the challenges."
    weight: 0.30
    description: "BoardAppropriate"
