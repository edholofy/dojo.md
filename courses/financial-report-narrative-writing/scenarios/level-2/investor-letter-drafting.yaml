meta:
  id: investor-letter-drafting
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Draft an annual investor letter — write a CEO-to-shareholder letter that combines financial results with strategic narrative and vision for an annual report"
  tags: [investor-letter, shareholder-communication, annual-report, intermediate]

state: {}

trigger: |
  Draft the CEO's annual letter to shareholders
  for the 2025 annual report of a mid-cap
  industrial technology company.

  COMPANY: Precision Dynamics Corp (PRC)
  Market cap: $3.2B, listed NYSE

  FY2025 RESULTS:
  - Revenue: $1.85B (+8% YoY)
  - Adjusted EBITDA: $315M (17.0% margin, +1.5pp)
  - Net income: $168M ($4.20 EPS, +12%)
  - Free cash flow: $195M (62% conversion)
  - Backlog: $2.4B (record, +15%)
  - Returned $120M to shareholders (dividends + buybacks)
  - 22nd consecutive year of dividend growth

  KEY ACCOMPLISHMENTS:
  - Completed acquisition of AutoSense Technologies
    (autonomous sensing for manufacturing, $340M)
  - Launched PRC Digital — IoT platform for
    connected factory equipment
  - Won $400M multi-year contract with major
    automotive OEM
  - Expanded margins despite inflationary environment
  - Named to Fortune's "Most Admired Companies"
  - Reduced Scope 1+2 emissions by 18%

  KEY CHALLENGES:
  - European division underperformed (flat revenue,
    margin decline)
  - Supply chain disruptions in H1 delayed some
    deliveries
  - Integration of AutoSense slower than planned
  - CFO departure in Q3 (new CFO hired from outside)

  CEO PERSONALITY:
  - 12 years as CEO, industry veteran
  - Known for candor and long-term thinking
  - Values operational excellence and innovation
  - Previous letters have been praised by analysts
    for transparency

  Write a 700-900 word shareholder letter.

assertions:
  - type: llm_judge
    criteria: "Letter opens with a strong, candid frame and tells a coherent strategic story — the opening should not be generic ('Dear Shareholders, I'm pleased to report...') but should frame 2025 with a distinctive perspective — perhaps opening with the record backlog as evidence of customer trust, or the tension between strong results and challenging environment; the letter weaves financial results into a strategic narrative: revenue growth and margin expansion demonstrate the company's pricing power and operational discipline, the AutoSense acquisition and PRC Digital launch together represent the company's evolution from an industrial equipment company to an industrial technology company, the $400M automotive contract validates this strategy; the narrative has an arc: where the company was, what it accomplished, where it's going — not just a list of achievements; the CEO's voice should come through as someone who thinks in decades (referencing the 22-year dividend streak) but acts with urgency on transformation."
    weight: 0.35
    description: "StrategicNarrative"
  - type: llm_judge
    criteria: "Letter addresses challenges honestly — a CEO known for candor and transparency must address the negatives: European division underperformance acknowledged directly (not buried or euphemized) with an honest assessment and specific actions being taken; the AutoSense integration being slower than planned is acknowledged with context on what's causing the delay and what management is doing to get back on track; the CFO departure is addressed with confidence in the new hire and continuity message; the H1 supply chain disruptions are discussed with the impact on customers and how the company adapted; the honesty about challenges STRENGTHENS the credibility of the positive results — when the CEO says revenue grew 8% and margins expanded, investors believe it because the CEO also acknowledged what went wrong; this balance of confidence and candor is the hallmark of a respected CEO letter."
    weight: 0.35
    description: "CandorAndHonesty"
  - type: llm_judge
    criteria: "Writing quality is publication-ready and appropriate for an annual report — the letter is 700-900 words, uses a personal but professional tone (first person 'I' and 'we'), avoids corporate jargon and buzzwords, includes specific numbers to substantiate claims (not just adjectives like 'strong' and 'excellent'), has a clear conclusion that looks forward to 2026 with an appropriate mix of ambition and realism, thanks employees and customers (not just shareholders), and would be appropriate for publication in a glossy annual report; the letter should NOT read like an earnings release — it should have the CEO's personality and strategic perspective, offering insights that investors couldn't get from the financial statements alone."
    weight: 0.30
    description: "WritingQuality"
