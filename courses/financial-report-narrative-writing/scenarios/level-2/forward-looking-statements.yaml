meta:
  id: forward-looking-statements
  level: 2
  course: financial-report-narrative-writing
  type: output
  description: "Draft forward-looking statements with safe harbor compliance — write guidance narratives, earnings outlook, and cautionary language that meets PSLRA requirements"
  tags: [forward-looking, safe-harbor, pslra, intermediate]

state: {}

trigger: |
  Draft the forward-looking statements and guidance
  section for the Q4 earnings release. Ensure
  compliance with PSLRA safe harbor provisions.

  GUIDANCE TO COMMUNICATE:
  FY2026 Outlook:
  - Revenue: $1.35B - $1.40B (FY2025 actual: $1.28B)
  - Adjusted EBITDA margin: 18-20%
  - Adjusted EPS: $3.20 - $3.50
  - Capital expenditure: $80-90M
  - Free cash flow: $120-140M
  - Effective tax rate: 22-24%

  ASSUMPTIONS UNDERLYING GUIDANCE:
  - No major acquisitions or divestitures
  - USD/EUR rate of 1.08-1.12
  - Raw material costs flat to +3%
  - No significant regulatory changes
  - New product launch in Q2 contributing $30-40M
    in H2 revenue
  - Restructuring savings of $15M from 2025
    plant closure fully realized
  - 2% organic price increases across portfolio
  - 3-4% volume growth in specialty segments

  KEY RISKS TO GUIDANCE:
  - Macroeconomic slowdown could reduce volume
  - FX volatility beyond assumed range
  - Raw material cost spikes (oil/gas linked)
  - New product launch delay
  - Competitive pricing pressure in commodities
  - Potential trade policy changes (tariffs)

  Write:
  1. Management outlook narrative (CEO perspective)
  2. Detailed guidance table with assumptions
  3. Forward-looking statement safe harbor language
  4. Risk factors that could cause actual results
     to differ

assertions:
  - type: llm_judge
    criteria: "Management outlook narrative uses forward-looking language properly with meaningful cautionary context — the CEO outlook uses appropriate conditional language ('we expect,' 'we anticipate,' 'we believe,' 'we are targeting') rather than definitive statements about future results; the narrative connects the guidance range to specific business initiatives: revenue growth of 5-9% driven by the new product launch ($30-40M in H2), organic price increases (2%), and volume growth (3-4%) in specialty segments; the EBITDA margin expansion from current levels to 18-20% is attributed to: restructuring savings realization ($15M), mix improvement from specialty growth, and operating leverage; the narrative is balanced — it expresses confidence while acknowledging uncertainty; it does NOT guarantee results or use language like 'we will achieve' or 'results will be'; the guidance range widths are appropriate: wider for more uncertain items (revenue $50M range, EPS $0.30 range), narrower for more controllable items (tax rate 2pp range)."
    weight: 0.35
    description: "OutlookNarrative"
  - type: llm_judge
    criteria: "Safe harbor language meets PSLRA requirements with meaningful (not boilerplate) cautionary statements — the safe harbor provision includes: (1) Identification: clearly identifies which statements are forward-looking ('statements regarding expected revenue, earnings, margins, and cash flow for fiscal year 2026 are forward-looking statements within the meaning of Section 27A of the Securities Act and Section 21E of the Exchange Act'); (2) Meaningful cautionary language: the risk factors are SPECIFIC to the company and the guidance provided — not generic boilerplate; specifically addresses: macroeconomic conditions affecting customer demand in the company's end markets, foreign currency fluctuations (especially EUR/USD) affecting reported results, raw material costs linked to oil and gas prices, the timing and commercial success of the planned new product launch, realization of restructuring cost savings, competitive pricing dynamics in commodity chemical markets, and changes in trade policy including tariffs; (3) The cautionary factors directly correspond to the assumptions underlying the guidance — this is what makes the safe harbor 'meaningful' per PSLRA requirements."
    weight: 0.35
    description: "SafeHarborCompliance"
  - type: llm_judge
    criteria: "Guidance presentation and risk factors are investor-ready — the guidance table is clearly formatted with: metric, FY2026 range, FY2025 actual, and key assumptions for each line item; the assumptions are disclosed transparently (FX rate, raw material outlook, no M&A); the risk factors section identifies 6-8 specific factors that could cause results to differ materially, with each factor explained in 2-3 sentences describing HOW it would affect specific guidance metrics (not just 'various factors could affect results'); the overall presentation would be appropriate for distribution on a wire service (PR Newswire/Business Wire), inclusion in the 8-K filing, and discussion on the earnings conference call; the language avoids both excessive optimism (which undermines safe harbor protection) and excessive caution (which provides no useful information to investors)."
    weight: 0.30
    description: "GuidancePresentation"
