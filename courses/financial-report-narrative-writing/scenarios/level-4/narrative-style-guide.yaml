meta:
  id: narrative-style-guide
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Create a corporate financial narrative style guide — establish standards for tone, terminology, structure, and quality across all financial communications for a large organization"
  tags: [style-guide, standards, corporate-communications, expert]

state: {}

trigger: |
  The CFO of a Fortune 500 company has asked you
  to create a comprehensive Financial Narrative
  Style Guide that will standardize all financial
  communications across the organization.

  COMPANY: A diversified conglomerate with
  4 business segments, 15 countries, 200+
  finance professionals writing narratives

  CURRENT PROBLEMS:
  - Every segment writes variance commentary
    differently
  - No consistent terminology ("operating income"
    vs. "EBIT" vs. "operating profit" used
    interchangeably)
  - Tone varies from informal to overly legalistic
  - New analysts take 6 months to learn the
    "house style"
  - SEC filings have been criticized for readability
  - Board reports use different formats than
    management reports
  - International teams translate narratives
    inconsistently

  SCOPE OF THE STYLE GUIDE:
  - All internal financial narratives (management
    reports, board packages, variance commentary)
  - All external financial narratives (10-K/Q,
    earnings releases, investor presentations,
    annual report)
  - All levels: analyst commentary through CFO
    communication

  Design:
  1. Style guide structure and organization
  2. Tone and voice guidelines
  3. Financial terminology standards
  4. Narrative structure templates
  5. Quality checklist and review process
  6. Training and adoption plan

assertions:
  - type: llm_judge
    criteria: "Style guide establishes clear, actionable writing standards — the guide covers: Tone and Voice: professional but accessible, active voice preferred (minimum 70% active voice), present tense for current conditions, past tense for results, conditional for forward-looking; avoid promotional language in SEC filings, maintain appropriate confidence in investor communications without overpromising; Sentence and Paragraph Standards: target Flesch-Kincaid grade level of 12-14 for SEC filings, 10-12 for management reports; average sentence length of 15-20 words; one idea per paragraph; maximum paragraph length of 5 sentences; Financial Terminology Dictionary: standardized terms with approved usage (e.g., always 'operating income' not 'EBIT' in external filings, always 'adjusted' before non-GAAP measures, never 'pro forma' when meaning non-GAAP per SEC guidance); Number Formatting: dollar amounts in millions with one decimal ($145.2M), percentages with one decimal (12.4%), year-over-year changes always include both dollar and percentage; Variance Commentary Standard: every variance explanation must include: the line item, the dollar and percentage variance, and the business driver (the 'why'); prohibited phrases: 'due to various factors,' 'as expected,' 'in line with management expectations' (without specifying what was expected)."
    weight: 0.35
    description: "WritingStandards"
  - type: llm_judge
    criteria: "Narrative structure templates provide consistent frameworks without being restrictive — templates for each major narrative type: (1) Monthly Variance Commentary Template: headline summary (1 sentence stating total variance and key driver), line-by-line commentary (item, variance, driver, outlook), footer with forward-looking implications; (2) Quarterly Earnings Release Template: headline with key metrics, CEO quote paragraph, financial highlights table, segment summaries, guidance section, non-GAAP reconciliation, forward-looking safe harbor; (3) MD&A Section Templates: overview structure (industry context, period summary, known trends), results of operations structure (revenue by line, COGS, OpEx, below-the-line), liquidity structure (sources, uses, near-term adequacy, long-term needs); (4) Board Report Template: executive dashboard narrative, segment performance summaries, items requiring board attention, risk update; each template specifies: target length, required sections, example language for common situations, and checklist of compliance requirements; the templates are flexible enough for different segment contexts while ensuring consistency in structure and quality."
    weight: 0.35
    description: "NarrativeTemplates"
  - type: llm_judge
    criteria: "Quality process and training plan ensure adoption across 200+ finance professionals — quality review process: three-tier review system: (1) Self-review using a standardized checklist (numbers verified, active voice check, driver explanation for every variance, prohibited phrases scan), (2) Peer review by another finance professional (cross-segment to ensure external readability), (3) Senior review by segment controller or VP Finance (strategic alignment, completeness, tone); the checklist is available as a digital tool integrated into the document workflow; training plan: mandatory 4-hour workshop for all finance professionals writing narratives (covering the guide, live editing exercises, before/after examples from actual company documents), quarterly 'Narrative Clinic' sessions (bring your worst paragraph, improve it together), new hire orientation module (the style guide is part of onboarding), annual refresher linked to year-end filing preparation; adoption measures: narrative quality score tracked quarterly (readability, compliance, style adherence), best narrative awards (monthly recognition), and the CFO reviews a random sample of 10 narratives per quarter to reinforce the standard; international considerations: the guide is translated into key languages with local adaptations for terminology, but narrative structure and quality standards are global."
    weight: 0.30
    description: "QualityAndTraining"
