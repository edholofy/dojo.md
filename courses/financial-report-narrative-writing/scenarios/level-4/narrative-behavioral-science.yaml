meta:
  id: narrative-behavioral-science
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Apply behavioral science to financial narratives — use cognitive psychology, framing effects, and decision-making research to understand how narrative choices affect investor perception and behavior"
  tags: [behavioral-science, investor-perception, framing-effects, expert]

state: {}

trigger: |
  A behavioral finance research team is studying
  how financial narrative choices affect investor
  perception. Design experiments and analyze how
  specific narrative techniques influence how
  investors interpret financial results.

  RESEARCH QUESTION:
  How do financial narrative framing choices affect
  investor perceptions of company performance,
  risk assessment, and investment decisions?

  EXISTING RESEARCH:
  - Tone of annual reports predicts future earnings
    (Li, 2010)
  - Complex language in 10-Ks correlates with
    higher cost of capital (Loughran & McDonald, 2014)
  - Managers strategically use readability to
    obscure poor performance (Lo et al., 2017)
  - Non-GAAP measures systematically bias investor
    perception upward (Black et al., 2018)
  - Forward-looking statements create expectations
    that anchor future evaluations (Hutton et al., 2012)

  SPECIFIC FRAMING EFFECTS TO STUDY:
  1. Gain vs. Loss framing of the same results
  2. Order effects (good news first vs. bad news first)
  3. Anchoring through selective benchmark comparison
  4. Complexity as strategic obfuscation
  5. Non-GAAP prominence effects

  Design:
  1. Five experimental studies (one per framing effect)
  2. Hypothesis for each study
  3. Methodology (participants, stimuli, measures)
  4. Practical implications for financial narrative
     writers
  5. Ethical considerations
  6. Regulatory implications

assertions:
  - type: llm_judge
    criteria: "Experimental designs are methodologically rigorous — each of the 5 studies has: (1) Gain/Loss Framing: hypothesis — presenting the same operating margin as 'improved by 1.5 percentage points' (gain frame) vs. 'remains 3.5 percentage points below industry average' (loss frame) will produce significantly different investor assessments of management quality; methodology — between-subjects design, 200+ participants (mix of MBA students and retail investors), identical financial data with only the narrative framing changed, measuring perceived management competence, investment likelihood, and expected future returns on 7-point scales; (2) Order Effects: hypothesis — earnings releases that present positive results before negative results ('primacy') will generate higher investment ratings than those presenting negative first ('recency'); stimuli — identical financial results reordered; (3) Anchoring: hypothesis — comparing results to a favorable benchmark (prior year loss period) vs. an unfavorable benchmark (pre-pandemic peak) will significantly shift investor assessment of the same absolute results; (4) Complexity/Obfuscation: hypothesis — companies with negative results will produce narratives with higher readability scores (more complex language), and investors will rate complex narratives as less trustworthy when results are negative; (5) Non-GAAP Prominence: hypothesis — presenting adjusted EPS before GAAP EPS (despite equal prominence rules) leads investors to anchor on the adjusted figure when forming valuations."
    weight: 0.35
    description: "ExperimentalDesigns"
  - type: llm_judge
    criteria: "Practical implications translate research into actionable guidance for narrative writers — for each study, practical implications should include: Gain/Loss Framing: narrative writers can legitimately choose between frames (both are factually accurate) — the ethical question is whether the chosen frame is informative or misleading; recommendation: present both the absolute level AND the trend (investors need both perspectives); Order Effects: the standard practice of leading with headlines creates primacy bias — recommendation: structure narratives with balanced openings that present the overall picture before details; Anchoring: benchmark selection is a powerful narrative tool — comparing to a weak prior period flatters current results, comparing to a strong benchmark sets high expectations; recommendation: use consistent benchmarks and disclose the benchmark selection rationale; Complexity: the research confirms what SEC critics suspect — managers use complexity to obscure bad news; recommendation: commit to consistent readability scores regardless of news direction (the style guide should target the same Flesch-Kincaid score whether results are good or bad); Non-GAAP: despite equal prominence rules, the primacy effect means the first number seen is anchored — recommendation: strictly alternate which metric appears first, or always lead with GAAP; overall: the research provides evidence-based arguments for the SEC's plain English requirements and non-GAAP rules."
    weight: 0.35
    description: "PracticalImplications"
  - type: llm_judge
    criteria: "Ethical and regulatory considerations address the tension between persuasion and transparency — the ethical analysis addresses: the fundamental tension in financial narrative writing: management has a duty to present results favorably (maximizing shareholder value) while also having a duty to present results accurately (fair disclosure); the research demonstrates that framing choices — all technically accurate — can significantly affect investor perception; this creates an ethical gray zone: is it acceptable to choose the most favorable factual frame? Where does legitimate presentation become manipulation?; the ethical framework proposed: (1) Transparency test — would the framing choice be defensible if challenged in court? (2) Consistency test — is the company using the same framing approach in good quarters and bad? (3) Sophistication test — would a reasonable investor recognize the framing effect? (4) Materiality test — does the framing choice affect a reasonable investor's decision?; regulatory implications: the research provides empirical support for SEC initiatives on: non-GAAP equal prominence requirements, plain English rules, risk factor specificity requirements, and potential new guidance on narrative framing; the research suggests that cognitive biases in financial narrative processing are systematic, predictable, and exploitable — strengthening the case for regulatory intervention."
    weight: 0.30
    description: "EthicsAndRegulation"
