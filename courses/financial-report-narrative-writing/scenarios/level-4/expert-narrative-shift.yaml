meta:
  id: expert-narrative-shift
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Expert shift simulation — manage a full filing cycle: draft 10-K MD&A under time pressure, respond to auditor narrative comments, prepare earnings guidance after an acquisition, and brief the board on narrative strategy"
  tags: [shift-simulation, filing-cycle, 10-k, expert]

state: {}

trigger: |
  You are the VP of Financial Reporting at a $6B
  technology company. It's filing season and you
  have four critical deliverables due this week.

  TASK 1 — 10-K MD&A REVISION (due Wednesday)
  The external auditors have provided comments on
  the MD&A draft. Address their key concerns.

  Auditor Comments:
  1. "The discussion of revenue growth attributes
     the increase to 'strong demand across all
     segments.' Please provide segment-specific
     drivers and quantify the contribution of each."
  2. "The liquidity discussion states the company
     has 'adequate liquidity.' Please quantify and
     specify the period covered."
  3. "Risk factors related to AI regulation are
     generic. Given the company's significant AI
     product revenue ($800M, 28% of total), the
     risk factor should address specific regulatory
     proposals."

  Segment revenue data:
  - Cloud Services: $1.8B (+18%, driven by
    enterprise migration deals, 45 new logos)
  - Software Licenses: $1.2B (-5%, perpetual to
    SaaS transition continuing)
  - AI Solutions: $800M (+65%, new product launches,
    government contracts)
  - Professional Services: $480M (+3%, lower
    utilization offset by rate increases)
  - Total: $4.28B (+14% YoY, organic growth 11%,
    acquisition contributed 3%)

  Liquidity:
  - Cash: $2.1B
  - Revolver: $1.5B (undrawn)
  - Annual OCF: $850M
  - Capex: $400M
  - Debt maturities: $500M in 2027, $750M in 2029

  Write the revised passages (400 words total).

  TASK 2 — POST-ACQUISITION GUIDANCE (due Thursday)
  The company closed a $1.2B acquisition of an AI
  startup last month. Draft the updated FY2026
  guidance narrative for the earnings release.

  Pre-acquisition guidance:
  - Revenue: $4.50-4.65B
  - Adjusted operating margin: 22-23%
  - Adjusted EPS: $4.80-5.00

  Acquisition impact:
  - Adds $180-200M revenue (8 months contribution)
  - Dilutive to margins by 150-200 bps (investment
    phase)
  - $45M integration costs (excluded from adjusted)
  - $120M amortization of acquired intangibles
  - 15M new shares issued

  Write the updated guidance paragraph (200 words).

  TASK 3 — BOARD NARRATIVE STRATEGY MEMO (due Friday)
  The board wants a 1-page memo on the company's
  financial narrative strategy for the coming year.

  Write a 300-word board memo covering: key narrative
  themes, regulatory disclosure changes ahead, and
  recommended narrative investments.

  TASK 4 — ANALYST DAY SCRIPT (due Friday)
  Write the CFO's opening remarks (200 words) for
  next month's Analyst Day, framing the company's
  financial story and setting expectations.

  Handle all four tasks.

assertions:
  - type: llm_judge
    criteria: "MD&A revisions directly address each auditor comment with specificity — Comment 1 response: replaces 'strong demand across all segments' with segment-specific drivers and quantified contributions — Cloud Services grew 18% ($275M increase) driven by enterprise cloud migration deals including 45 new enterprise logos; Software Licenses declined 5% ($63M) as the perpetual-to-SaaS transition continues (now 60% SaaS mix vs. 48% prior year); AI Solutions grew 65% ($310M) driven by new product launches and government contracts; Professional Services grew 3% ($14M) reflecting lower utilization partially offset by rate increases; organic growth contributed 11 percentage points and the acquisition of [name] contributed 3 points; Comment 2 response: replaces 'adequate liquidity' with quantified assessment — total available liquidity of $3.6B ($2.1B cash and $1.5B undrawn revolving credit facility), annual operating cash flow of approximately $850M after capital expenditures of $400M, provides free cash flow sufficient to fund operations, debt service ($500M maturity in 2027), and strategic investments through at least 2028; Comment 3 response: replaces generic AI risk with specific reference to EU AI Act compliance requirements, US AI executive orders, potential classification of the company's AI products as high-risk AI systems under proposed frameworks, and the financial impact (estimated $50-100M compliance costs over 3 years)."
    weight: 0.35
    description: "MDARevisions"
  - type: llm_judge
    criteria: "Guidance narrative, board memo, and analyst script demonstrate range and strategic thinking — the updated guidance paragraph: presents revised ranges incorporating the acquisition (revenue: $4.68-4.85B, operating margin: 20.5-21.5%, adjusted EPS updated for dilution from 15M new shares), clearly separates organic and acquisition contributions, discloses the $45M integration costs are excluded from adjusted metrics with appropriate Regulation G language, and includes the $120M amortization impact on GAAP results; the board memo: identifies 3-4 key narrative themes for the year (the AI growth story, the SaaS transition narrative, the acquisition integration story, and the margin investment-for-growth framing), flags upcoming regulatory changes affecting disclosure (climate rules, AI regulation risk factors, potential non-GAAP tightening), and recommends narrative investments (style guide, technology for narrative production, training); the analyst day script: frames the financial story compellingly without being promotional — positions the company at the intersection of cloud and AI, acknowledges the margin pressure from AI investment as intentional and temporary, and sets expectations for the acquisition contribution timeline; all four deliverables maintain consistency in key messages, numbers, and tone while adapting for different audiences."
    weight: 0.35
    description: "GuidanceBoardAndAnalyst"
  - type: llm_judge
    criteria: "All four deliverables demonstrate the ability to switch between narrative modes under filing-season pressure — the shift simulation tests: (1) Compliance mode (auditor response): precise, factual, directly responsive — no vague language, every assertion quantified, (2) Forward-looking mode (guidance): appropriately cautious, ranges not points, clearly labeled non-GAAP measures, integration costs disclosed, (3) Strategic mode (board memo): big-picture thinking, identifies risks and opportunities in the narrative strategy, actionable recommendations, (4) Persuasive mode (analyst day): compelling without being promotional, builds confidence in the business strategy, acknowledges challenges while maintaining a positive trajectory; the four deliverables together demonstrate mastery of financial narrative writing — the VP can switch between regulatory compliance, investor guidance, board governance, and strategic communication within the same week while maintaining consistency across all outputs."
    weight: 0.30
    description: "NarrativeModeSwitch"
