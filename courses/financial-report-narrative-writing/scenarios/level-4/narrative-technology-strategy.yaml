meta:
  id: narrative-technology-strategy
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Design a technology strategy for financial narrative automation — evaluate NLG platforms, AI writing assistants, and workflow tools to transform how a large organization produces financial narratives"
  tags: [technology-strategy, nlg, automation, expert]

state: {}

trigger: |
  The CFO of a $12B multinational has asked you to
  develop a 3-year technology strategy for automating
  financial narrative production. Currently, 300+
  finance professionals spend approximately 25% of
  their time writing financial narratives manually.

  CURRENT STATE:
  - SAP ERP with BPC for consolidation
  - Excel-based reporting for most narratives
  - Manual copy-paste from Excel to Word/PowerPoint
  - Average time to produce quarterly board package:
    15 business days
  - Average time for 10-K narrative sections: 8 weeks
  - 47 different report templates across segments
  - No version control for narrative drafts
  - Review process via email with track changes
  - Frequent errors in number transcription
  - 3 FTEs dedicated to formatting and layout

  PAIN POINTS:
  - Numbers in narratives don't match source data
  - Same commentary written multiple times for
    different audiences
  - No institutional memory of prior period narratives
  - Inconsistent terminology across segments
  - Last-minute changes cascade through multiple
    documents
  - Audit trail for narrative changes is incomplete

  VENDOR LANDSCAPE (evaluated):
  1. Workiva (Wdesk) — SEC filing platform
  2. Narrative Science (Quill) — NLG platform
  3. Microsoft Copilot — AI writing assistant
  4. Custom GPT solution — internal development
  5. Certent — disclosure management

  Design:
  1. Current state assessment and business case
  2. Target architecture (3-year roadmap)
  3. Vendor evaluation framework
  4. Implementation phasing
  5. Change management approach
  6. ROI and success metrics

assertions:
  - type: llm_judge
    criteria: "Business case quantifies the cost of manual narrative production — the assessment calculates: 300 professionals × 25% time on narratives = 75 FTE-equivalents; at a fully-loaded cost of $120-150K per FTE, the annual narrative production cost is $9-11.25M; error remediation costs (restatements, audit findings, delayed filings) estimated at $500K-1M annually; the 3 formatting FTEs cost $250-350K; total addressable cost: approximately $10-13M annually; the business case targets 40-50% efficiency improvement over 3 years, yielding $4-6.5M annual savings; additional benefits: reduced filing risk, faster close-to-disclosure cycle, improved narrative quality and consistency; technology investment estimated at $3-5M over 3 years (licenses, implementation, training), yielding a 2-year payback."
    weight: 0.35
    description: "BusinessCase"
  - type: llm_judge
    criteria: "Target architecture and roadmap are technically sound — Year 1 (Foundation): implement Workiva or equivalent for SEC filings and XBRL tagging, establish single source of truth for financial data flowing into narratives, deploy version control and collaborative review workflow, eliminate manual number transcription through data-linked narratives; Year 2 (Intelligence): deploy NLG for first-draft variance commentary (the 80% of narratives that follow patterns), integrate AI writing assistant for draft enhancement and consistency checking, build narrative template library with dynamic data binding, implement terminology enforcement engine; Year 3 (Optimization): advanced NLG for complex narratives (MD&A, board packages), predictive narrative suggestions based on data patterns, cross-document consistency engine (change a number once, update everywhere), narrative analytics (readability scoring, compliance checking, tone analysis); the architecture maintains human oversight at every stage — AI drafts, humans review and approve; the vendor evaluation framework scores vendors across: data integration capability, NLG quality, compliance features, audit trail, scalability, and total cost of ownership."
    weight: 0.35
    description: "ArchitectureAndRoadmap"
  - type: llm_judge
    criteria: "Change management and ROI metrics address the human side of automation — the change management plan recognizes that finance professionals may resist narrative automation (fear of job displacement, skepticism about AI quality, attachment to personal writing style); the approach: (1) Position automation as 'augmentation not replacement' — AI handles first drafts and formatting, humans focus on insight and judgment, (2) Start with the biggest pain point (number accuracy and formatting) before tackling narrative generation, (3) Champion network: identify 10-15 early adopters across segments who pilot new tools and demonstrate benefits, (4) Training program: mandatory workshops on AI-assisted writing, emphasizing that the skill shifts from 'writing from scratch' to 'editing and improving AI drafts,' (5) Success metrics tracked quarterly: time-to-produce (target: 50% reduction in board package production time), error rate (target: zero number transcription errors), consistency score (terminology compliance across documents), user satisfaction (quarterly survey of finance professionals), and ROI metrics (cost savings vs. investment); the strategy acknowledges risks: AI hallucination in financial narratives (requires robust validation), over-reliance on templates reducing narrative quality, and regulatory uncertainty about AI-generated SEC disclosures."
    weight: 0.30
    description: "ChangeManagementAndROI"
