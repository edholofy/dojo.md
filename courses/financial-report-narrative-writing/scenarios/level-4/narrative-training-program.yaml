meta:
  id: narrative-training-program
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Design a financial narrative writing training program — develop curriculum, exercises, and certification for finance professionals at all levels"
  tags: [training-program, curriculum, certification, expert]

state: {}

trigger: |
  A Fortune 500 company's Chief Accounting Officer
  has commissioned a comprehensive financial narrative
  writing training program after external auditors
  noted that narrative quality varies significantly
  across the organization.

  ORGANIZATION PROFILE:
  - 450 finance professionals across 6 segments
  - 85 write external narratives (SEC filings,
    earnings releases)
  - 200 write internal narratives (management
    reports, board packages)
  - 165 write variance commentary only
  - Current skill levels vary from "barely adequate"
    to "excellent" with no standard assessment
  - New hires take 12+ months to produce acceptable
    narratives independently

  AUDIT FINDINGS:
  - "Variance commentary frequently restates numbers
    without explaining business drivers"
  - "Forward-looking statements lack specificity
    required by SEC guidance"
  - "Non-GAAP disclosures inconsistently presented
    across segments"
  - "Risk factor disclosures are boilerplate and
    not updated for current conditions"
  - "Plain English standards not consistently applied
    in SEC filings"

  Design:
  1. Skill assessment framework
  2. Curriculum design (3 tiers matching skill levels)
  3. Exercise portfolio (hands-on practice scenarios)
  4. Certification program
  5. Ongoing development and quality assurance
  6. Measurement of training effectiveness

assertions:
  - type: llm_judge
    criteria: "Skill assessment and curriculum directly address the audit findings — the skill assessment evaluates 6 competencies: (1) Variance Attribution (explaining 'why' not just 'what'), (2) Regulatory Compliance (SEC rules for FLS, non-GAAP, risk factors, plain English), (3) Audience Adaptation (writing for boards vs. analysts vs. management), (4) Data-to-Narrative Translation (turning tables into insight), (5) Tone and Voice (professional, confident, balanced), (6) Structure and Organization (logical flow, appropriate detail level); the curriculum has 3 tiers: Tier 1 — Foundations (for the 165 variance commentary writers): 2-day workshop covering the 'So What?' test for every variance, the BUILD framework (Background, Unexpected, Impact, Likely cause, Direction), number formatting standards, and prohibited phrases ('due to various factors'); Tier 2 — Advanced (for the 200 internal narrative writers): 3-day program adding audience adaptation, board-level writing, executive summary techniques, data visualization narratives, and the 'pyramid principle' for financial narrative structure; Tier 3 — Expert (for the 85 external narrative writers): 5-day intensive covering SEC disclosure requirements, MD&A best practices, non-GAAP presentation rules, forward-looking statement drafting, risk factor writing, earnings release composition, and regulatory update sessions."
    weight: 0.35
    description: "AssessmentAndCurriculum"
  - type: llm_judge
    criteria: "Exercise portfolio provides realistic practice — exercises are drawn from realistic scenarios (ideally based on the company's own filings with data changed): Tier 1 exercises: (1) Before/After rewrites — given a 'bad' variance commentary, identify what's missing and rewrite it, (2) Driver Identification — given a data table showing variances, identify the business drivers and write commentary, (3) Number Presentation — given raw data, format and present it following the style guide, (4) Prohibited Phrase Hunt — find and replace vague language in sample narratives; Tier 2 exercises: (1) Audience Translation — take a single set of results and write versions for the board, the management team, and a segment review, (2) Executive Summary Challenge — condense a 10-page analysis into a 1-page executive summary, (3) Bad News Delivery — write balanced commentary for a segment that missed targets, (4) Chart Narrative — write the narrative that should accompany a specific chart or dashboard; Tier 3 exercises: (1) SEC Comment Letter Simulation — receive a mock SEC comment and draft the response, (2) Non-GAAP Reconciliation — write the narrative accompanying a non-GAAP reconciliation table, (3) Risk Factor Rewrite — take a boilerplate risk factor and make it company-specific, (4) Crisis Narrative — draft an 8-K for a material event under time pressure, (5) Earnings Release Draft — write a complete earnings release from a data package."
    weight: 0.35
    description: "ExercisePortfolio"
  - type: llm_judge
    criteria: "Certification and effectiveness measurement create accountability — the certification program: 3 levels matching the tiers: Certified Financial Narrative Writer (CFNW-Foundation, CFNW-Advanced, CFNW-Expert); certification requires: completing the curriculum, passing a practical writing assessment (graded by a panel against a rubric, not just multiple choice), and maintaining certification through annual continuing education (8 hours minimum); the certification directly addresses the audit findings: only CFNW-Expert certified writers may draft SEC filing narratives; ongoing quality assurance: quarterly 'Narrative Quality Reviews' where a random sample of 20 narratives per segment is scored against the quality rubric (the same one used in certification); training effectiveness measured by: (1) Pre/post assessment scores (targeting 30%+ improvement), (2) Time-to-competency for new hires (target: reduce from 12 months to 6), (3) Audit finding reduction (target: zero narrative-related audit findings within 2 years), (4) Narrative quality scores from quarterly reviews (target: 80%+ scoring 'meets expectations' or higher within 18 months), (5) SEC comment letter frequency related to narrative quality (target: 50% reduction); the program has executive sponsorship from the CAO with segment controller accountability for their teams' certification completion."
    weight: 0.30
    description: "CertificationAndMeasurement"
