meta:
  id: narrative-governance-framework
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Design a financial narrative governance framework — establish review processes, sign-off protocols, and quality assurance for SEC filings and investor communications"
  tags: [governance, review-process, sign-off-protocols, expert]

state: {}

trigger: |
  After a securities class action lawsuit alleged
  that the company's earnings releases contained
  misleading statements, the board has mandated
  a comprehensive governance framework for all
  financial narratives. Design the framework.

  COMPANY CONTEXT:
  - $5B revenue public company (NYSE)
  - 4 business segments
  - Quarterly earnings releases, 10-K, three 10-Qs
  - Annual shareholder letter, proxy statement
  - Monthly investor presentations
  - Ad hoc 8-K filings (15-20 per year)

  THE LITIGATION:
  - Class action alleges misleading revenue guidance
    and omission of known product quality issues
  - CEO and CFO named personally (Section 302/906
    certifications)
  - Alleged class period: 18 months
  - Company settled for $85M (insurance covered $50M)
  - Board conducted post-mortem review

  POST-MORTEM FINDINGS:
  - Revenue guidance was based on overly optimistic
    sales pipeline assumptions (not challenged)
  - Product quality issues were known to operations
    but not communicated to finance/IR
  - Earnings release review process involved only
    CFO and IR — no legal or segment review
  - No formal sign-off process for financial
    narratives
  - CEO relied on CFO representation without
    independent verification
  - No disclosure committee existed

  Design:
  1. Disclosure Committee structure and charter
  2. Financial narrative review and approval process
  3. Information flow (operations to disclosure)
  4. Certification support (SOX 302/906)
  5. Training and accountability
  6. Continuous improvement mechanism

assertions:
  - type: llm_judge
    criteria: "Disclosure Committee structure addresses the root causes of the litigation — the committee charter establishes: membership (CFO as chair, General Counsel, Controller, VP of IR, Chief Compliance Officer, segment controllers on a rotating basis, and CRO or VP Operations to address the information gap that caused the product quality omission); the committee's mandate: review and approve ALL material financial narratives before release, establish procedures for collecting information required for SEC filings and earnings releases, evaluate the materiality of information and events, and ensure timely disclosure of material information; the committee directly addresses each post-mortem finding: (1) Revenue guidance now requires segment-level pipeline review (not just top-down assumptions) with documented challenge process, (2) Operations-to-finance information flow: mandatory quarterly sub-certification from each business unit head confirming no undisclosed material issues (product quality, legal, regulatory), (3) Earnings release review now includes: segment controllers, legal, operations representative — not just CFO and IR, (4) Formal sign-off required from disclosure committee before any financial narrative is released externally, (5) CEO receives independent briefing from General Counsel and Controller (not just CFO) before signing Section 302/906 certifications."
    weight: 0.35
    description: "DisclosureCommittee"
  - type: llm_judge
    criteria: "Review and approval process is specific and workable — the process defines: (1) Document Categories and Review Levels: Tier 1 (highest scrutiny — 10-K, 10-Q, earnings releases): full disclosure committee review, legal review, CFO and CEO sign-off, board audit committee notification; Tier 2 (high scrutiny — investor presentations, 8-K filings, guidance updates): CFO review, legal review, IR lead review; Tier 3 (standard — monthly management reports, internal board packages): segment controller review, CFO office review; (2) Timeline Protocol: earnings release draft due to disclosure committee 5 business days before release (not the night before), each reviewer has assigned review windows with written sign-off required, final version locked 24 hours before release (no last-minute changes without full committee re-review); (3) Review Checklist: each reviewer uses a standardized checklist for their area of expertise — legal reviews forward-looking statements and risk disclosure, controller verifies all numbers tie to audited/reviewed financials, IR reviews for consistency with prior public statements, operations confirms no omitted material events; (4) Documentation: all review comments and sign-offs retained for 7 years as part of the corporate records."
    weight: 0.35
    description: "ReviewProcess"
  - type: llm_judge
    criteria: "Information flow and certification support prevent future omissions — sub-certification process: each business unit head, VP of operations, VP of legal, and VP of HR must submit quarterly sub-certifications to the disclosure committee confirming: no undisclosed material events, no undisclosed litigation or regulatory actions, no product quality issues that could affect financial statements, no known trends that could materially affect future results, no related party transactions outside of approved policies; the sub-certifications feed directly into the CEO/CFO SOX 302/906 certification process: the CEO and CFO can certify with confidence because they have documented representations from each business unit head; training: annual disclosure training for all VPs and above covering: what constitutes material information, the obligation to escalate potential disclosure items, the legal consequences of withholding material information, case studies from the company's own litigation; accountability: failure to disclose material information through the sub-certification process is a terminable offense; continuous improvement: quarterly disclosure committee self-assessment, annual external review of disclosure processes by outside counsel, post-filing review of each 10-K/Q to identify improvement areas."
    weight: 0.30
    description: "InformationFlowAndCertification"
