meta:
  id: narrative-crisis-playbook
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Create a financial narrative crisis communication playbook — establish protocols for restatements, material weaknesses, going concern, regulatory investigations, and other financial crises"
  tags: [crisis-playbook, restatement, material-weakness, expert]

state: {}

trigger: |
  After experiencing two financial narrative crises
  in 18 months (a restatement and an SEC Wells
  notice), the board has directed the creation of a
  comprehensive Financial Narrative Crisis Playbook.

  RECENT CRISES:
  Crisis 1 — Revenue Restatement (9 months ago):
  - $45M cumulative revenue misstatement over
    3 years (ASC 606 timing errors)
  - 8-K filed 6 days after discovery (too slow —
    should have been filed sooner)
  - Narrative in the 8-K was vague and raised more
    questions than it answered
  - Stock dropped 22% on the announcement
  - Class action filed within 48 hours
  - Auditor relationship strained

  Crisis 2 — SEC Wells Notice (3 months ago):
  - SEC Staff recommends enforcement action for
    inadequate disclosure of related party
    transactions
  - Company disclosed the Wells notice in a 10-Q
    but the narrative was insufficient
  - Analyst community blindsided — no proactive
    IR communication
  - Bond rating placed on negative watch

  COMPANY: $3B revenue, NYSE-listed, investment
  grade credit (now on negative watch), 12,000
  employees

  Design:
  1. Crisis categorization and escalation protocols
  2. Pre-drafted narrative templates for each crisis
    type
  3. Communication timeline and channel strategy
  4. Stakeholder-specific messaging frameworks
  5. Legal-communications coordination protocol
  6. Post-crisis review and improvement process

assertions:
  - type: llm_judge
    criteria: "Crisis categorization addresses the full spectrum of financial narrative crises — the playbook categorizes crises into tiers with escalation protocols: Tier 1 (Critical — CEO/Board notification within 2 hours): restatement of previously filed financials, auditor resignation or going concern qualification, SEC enforcement action or Wells notice, fraud discovery, bankruptcy or covenant breach; Tier 2 (Severe — CFO/GC notification within 4 hours): material weakness in internal controls, significant estimation errors not requiring restatement, regulatory investigation (non-enforcement), credit rating downgrade, significant litigation; Tier 3 (Elevated — Controller/IR notification within 24 hours): control deficiency requiring disclosure, SEC comment letter requiring material revision, key executive departure during filing period, significant goodwill or asset impairment; each tier specifies: who is notified and when, who leads the narrative response (for Tier 1: CEO/CFO with GC oversight; for Tier 2: CFO with GC review; for Tier 3: Controller/IR lead with CFO approval), the disclosure timeline (Tier 1: draft 8-K within 24 hours of determination, file within 4 business days; Tier 2: address in next required filing; Tier 3: evaluate materiality for current filing), and the review and approval chain."
    weight: 0.35
    description: "CrisisCategorizationAndEscalation"
  - type: llm_judge
    criteria: "Pre-drafted templates and communication strategy are specific and actionable — templates for each major crisis type: (1) Restatement 8-K Template: structured disclosure covering — which periods affected and why, quantified impact on each affected line item, whether the misstatement was due to error or fraud, effect on previously filed financial statements and any non-reliance language, remediation steps and timeline, management's assessment of the impact on internal controls, and a forward-looking statement about the restated filing timeline; the template includes DO and DON'T guidance (DO: be specific about the nature and amount; DON'T: use minimizing language like 'immaterial errors' if the restatement is clearly material); (2) Material Weakness Disclosure Template: description of the weakness in specific terms, impact on financial reporting, remediation plan with specific actions and timeline, management's conclusion on effectiveness of ICFR; (3) Wells Notice Template: factual statement of the Wells notice, description of the subject matter (without admitting wrongdoing), company's intention to respond, statement that the outcome cannot be predicted; (4) Going Concern Template: conditions giving rise to substantial doubt, management's plans to mitigate, assessment of whether the plans are likely to be effective; communication channel strategy: 8-K filed first (legal obligation), followed within 1 hour by press release (broader reach), followed by proactive IR outreach to top 20 institutional investors within 24 hours, followed by employee communication within 24 hours."
    weight: 0.35
    description: "TemplatesAndCommunication"
  - type: llm_judge
    criteria: "Legal-communications coordination and post-crisis review prevent future failures — the playbook directly addresses the tension between legal caution and investor communication: legal counsel naturally wants to say as little as possible (minimize litigation exposure), while IR and the narrative team need to provide enough information to maintain credibility; the coordination protocol: (1) Joint drafting sessions — legal and narrative teams draft together (not sequentially, which causes delays and results in overly legalistic language), (2) 'Red line' framework — legal identifies specific words/phrases that create legal exposure, narrative team proposes alternatives that are both legally safe and informative, (3) Pre-approved language bank — for each crisis type, legal has pre-approved certain descriptions, allowing the narrative team to work faster during a crisis, (4) Escalation to outside counsel — when internal legal and narrative cannot agree, outside securities counsel mediates; the playbook specifically addresses the failures from the two recent crises: the restatement 8-K was vague because legal review happened after the narrative was drafted (too late to meaningfully collaborate); the Wells notice disclosure was insufficient because IR was excluded from the drafting process; post-crisis review: within 30 days of each crisis, the disclosure committee conducts a formal review — what was the trigger, how was the narrative handled, what would we change, and how do we update the playbook; the review examines: timeline (were we fast enough?), narrative quality (did we provide enough information?), stakeholder reaction (how did investors, analysts, rating agencies, and regulators respond?), and legal outcome (did the disclosure create or mitigate legal exposure?)."
    weight: 0.30
    description: "LegalCoordinationAndReview"
