meta:
  id: narrative-consulting-practice
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Build a financial narrative consulting practice — develop advisory offerings for improving corporate financial communications, investor relations, and SEC disclosure quality"
  tags: [consulting, financial-communications, advisory, expert]

state: {}

trigger: |
  You are launching a financial narrative advisory
  practice within a mid-tier consulting firm.
  Design the practice to help public and pre-IPO
  companies improve their financial communications.

  MARKET OPPORTUNITY:
  - 6,000+ US public companies filing with SEC
  - 500+ IPOs/SPACs per year
  - 85% of companies receive SEC comment letters
    (avg 2.5 rounds of comments)
  - Investor surveys: 70% say corporate financial
    narratives are too boilerplate
  - Growing regulatory complexity (ESG, cyber, non-
    GAAP scrutiny)
  - Plain English compliance remains weak
  - IR professionals report narrative quality as
    top improvement area

  COMPETITIVE LANDSCAPE:
  - Big 4 accounting firms (adjacent advisory)
  - IR consulting firms (strategic communication)
  - Securities lawyers (compliance focus)
  - No dedicated financial narrative quality firm

  Design:
  1. Service offerings and positioning
  2. Diagnostic methodology (narrative quality audit)
  3. Deliverable frameworks
  4. Pricing model
  5. Team and expertise requirements
  6. Go-to-market strategy

assertions:
  - type: llm_judge
    criteria: "Service offerings are differentiated and address a real market gap — the practice fills the gap between legal compliance (what lawyers do) and strategic communication (what IR firms do): financial narrative quality — the craft of translating financial results into clear, insightful, compliant narratives that build investor trust; service tiers: (1) Financial Narrative Audit ($30-50K): comprehensive review of all investor-facing financial narratives (10-K/Q, earnings releases, investor letters, presentations) against a proprietary quality scorecard covering: readability (Flesch-Kincaid score, sentence length), specificity (ratio of company-specific to generic statements), attribution quality (% of variances explained with 'why' not just 'what'), compliance (non-GAAP presentation, forward-looking statements, risk factor specificity), competitive comparison (benchmark narrative quality against industry peers); (2) Narrative Transformation ($75-150K): redesign of all financial communications using the audit findings, including: MD&A restructuring, earnings release template redesign, investor presentation narrative refresh, SEC comment letter mitigation (pre-empting common comments); (3) Filing Season Support ($25-50K per filing): hands-on narrative drafting and editing support for 10-K, 10-Q, and earnings releases; (4) IPO Narrative Advisory ($150-250K): S-1 narrative strategy and drafting for pre-IPO companies."
    weight: 0.35
    description: "ServiceOfferings"
  - type: llm_judge
    criteria: "Diagnostic methodology creates proprietary intellectual property — the Financial Narrative Quality Scorecard is the practice's key differentiator: a structured framework scoring narratives across 8 dimensions: (1) Readability (quantitative): Flesch-Kincaid grade level, average sentence length, passive voice percentage, jargon density; (2) Specificity: ratio of company-specific facts to generic statements, unique vs. boilerplate sentences per section; (3) Causal Attribution: percentage of variance explanations that include a business driver ('why') vs. just restating numbers ('what'); (4) Forward-Looking Value: quality and specificity of guidance, trend discussion, and known uncertainties; (5) Non-GAAP Compliance: equal prominence, reconciliation completeness, justification quality; (6) Risk Factor Quality: company-specificity score, quantification of potential impact, currency of disclosure; (7) Competitive Differentiation: how distinctive the company's narrative voice is vs. peer set; (8) Investor Utility: assessed through investor surveys or analyst feedback where available; each dimension is scored 1-5 with detailed rubrics; the resulting 'Narrative Quality Score' becomes a benchmark clients can track year over year; the scorecard methodology is proprietary and creates switching costs — clients invest in the improvement journey and want to see their scores improve."
    weight: 0.35
    description: "DiagnosticMethodology"
  - type: llm_judge
    criteria: "Practice economics and go-to-market are viable — year 1 plan: team of 4 (practice lead with 15+ years financial reporting experience, 2 senior consultants with SEC filing experience, 1 editor/writing specialist); target: 15-20 Narrative Audits ($450-800K) + 5-8 Transformation projects ($375-1.2M) + 3-5 Filing Support engagements ($75-250K) = $900K-2.25M year 1 revenue; by year 3: $3-5M revenue with 8-12 person team; go-to-market: leverage existing firm's CFO relationships (introduce Narrative Audit as a value-add alongside existing advisory services), target companies that received SEC comment letters on their narrative disclosures (this is public information available on EDGAR), offer free 30-minute 'Narrative Score Preview' at CFO conferences (quick assessment of 3 pages of their 10-K), publish 'Annual Financial Narrative Quality Report' benchmarking narrative quality across industries (generates press coverage and inbound leads), partner with IR societies (NIRI) for speaking opportunities; the unique selling proposition: 'We don't just make your disclosures compliant — we make them compelling. Your financial narrative is your company's story told in numbers and words. We make sure both work together.'"
    weight: 0.30
    description: "EconomicsAndGTM"
