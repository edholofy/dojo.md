meta:
  id: narrative-regulatory-response
  level: 4
  course: financial-report-narrative-writing
  type: output
  description: "Develop a comprehensive strategy for responding to evolving SEC narrative disclosure requirements — anticipate regulatory changes and proactively improve financial narrative practices"
  tags: [regulatory-strategy, sec-compliance, disclosure, expert]

state: {}

trigger: |
  The SEC has proposed several new rules that will
  significantly affect financial narrative disclosures.
  As the VP of Financial Reporting for a Fortune 200
  company, develop a comprehensive response strategy.

  PROPOSED RULES (hypothetical but realistic):
  1. Climate-Related Disclosures (adopted):
     - Scope 1 and 2 GHG emissions in 10-K
     - Climate risk narrative in MD&A
     - Transition plan disclosure
     - Financial statement impact of climate events

  2. Cybersecurity Risk Management (adopted):
     - Material incident disclosure within 4 business
       days (8-K)
     - Risk management process narrative in 10-K
     - Board oversight of cyber risk

  3. Human Capital Disclosures (proposed):
     - Workforce composition metrics
     - Compensation fairness analysis
     - Workforce development narrative
     - Turnover and retention data

  4. Non-GAAP Measures (proposed tightening):
     - Adjusted measures cannot exceed GAAP prominence
     - Mandatory comparison of non-GAAP to GAAP
       trend over 5 years
     - Prohibition on "cherry-picking" adjustments
     - Enhanced reconciliation narrative requirements

  COMPANY CONTEXT:
  - Manufacturing company ($18B revenue)
  - 45,000 employees in 22 countries
  - Significant Scope 1 emissions (heavy industry)
  - Prior cyber incident (contained, not material)
  - Heavy user of non-GAAP measures (6 adjusted
    metrics)

  Design:
  1. Impact assessment for each proposed rule
  2. Gap analysis (current vs. required disclosures)
  3. Narrative drafting strategy for new disclosures
  4. Implementation timeline and resource plan
  5. Comment letter strategy (engaging with rulemaking)
  6. Board and management communication plan

assertions:
  - type: llm_judge
    criteria: "Impact assessment identifies specific narrative requirements and gaps — for each rule: (1) Climate: current state — generic climate risk mention in risk factors, no Scope 1/2 quantification, no transition plan; gap — need narrative MD&A section covering physical and transition risks, quantified emissions with methodology disclosure, forward-looking transition plan with targets and timeline, financial statement footnote for climate-related impairments/AROs; challenge — Scope 1 data exists in EHS systems but has never been audited to SEC standard; the narrative must be specific enough to be useful but careful about forward-looking liability; (2) Cybersecurity: current state — general risk factor about cyber threats; gap — need specific description of risk management framework (currently described only in board materials), incident response narrative protocol for 4-day 8-K filing (who writes, who reviews, who approves under extreme time pressure), board oversight narrative for annual proxy; (3) Human Capital: current state — basic headcount and diversity percentages in 10-K; gap — need workforce composition detail by category, compensation equity analysis narrative, development program descriptions with outcomes, turnover data with context; (4) Non-GAAP: current state — 6 adjusted metrics with varying reconciliation quality; gap — need to evaluate whether all 6 survive the tightened rules, some adjustments may be prohibited under proposed rules (recurring items labeled as non-recurring), 5-year trend comparison will show divergence between GAAP and non-GAAP (potentially embarrassing), reconciliation narratives need significant enhancement."
    weight: 0.35
    description: "ImpactAssessment"
  - type: llm_judge
    criteria: "Narrative drafting strategy and implementation are practical — the drafting approach for each new disclosure area: Climate MD&A: adopt a narrative structure that balances specificity with appropriate uncertainty language — describe physical risks (facility-level exposure to extreme weather, quantified where possible), transition risks (regulatory, market, technology changes affecting the business), opportunities (efficiency gains, new products), and the company's strategy for managing each; use scenario analysis narrative (aligned with TCFD) showing financial impact under different temperature pathways; draft in Q2 for year-end filing, allowing time for management challenge and board review; Cybersecurity 8-K Protocol: pre-draft template 8-K language for common incident types (ransomware, data breach, supply chain compromise) with fill-in-the-blank sections; establish a 'Disclosure SWAT Team' (GC, CISO, Controller, IR) that can produce an 8-K within 48 hours of materiality determination; Non-GAAP Remediation: reduce from 6 to 3-4 adjusted metrics (eliminate those where the adjustment is recurring or where the metric diverges materially from GAAP over 5 years); redesign reconciliation tables with enhanced narrative explaining each adjustment's nature and business rationale; implementation timeline phases the work over 18 months with climate and cyber first (adopted rules), human capital and non-GAAP second (proposed rules); resource plan: 2-3 additional FTEs in financial reporting, external climate/ESG consultant, cybersecurity disclosure counsel."
    weight: 0.35
    description: "DraftingAndImplementation"
  - type: llm_judge
    criteria: "Comment letter strategy and board communication demonstrate strategic engagement — the comment letter strategy: the company should submit thoughtful comment letters on proposed rules (human capital, non-GAAP tightening) through industry trade groups and directly; key arguments to make: human capital — support principles-based disclosure (narrative) over prescriptive metrics that may not be comparable across industries; advocate for safe harbor protection for workforce development narrative; non-GAAP — support enhanced reconciliation requirements but argue against the 5-year trend comparison mandate (creates a misleading comparison if business model has fundamentally changed through M&A); request transition period of 2 fiscal years for companies to adjust their metrics; board communication: quarterly updates to the audit committee on regulatory changes, with a focus on: (1) the narrative disclosure implications (what new stories the company will need to tell publicly), (2) the data and process requirements (what information needs to flow to financial reporting that currently doesn't), (3) the liability implications (new disclosures create new targets for securities litigation — the climate transition plan in particular creates measurable commitments), (4) the competitive implications (what will peers disclose and how will the company's narrative compare?); the overall strategy positions the company as a proactive, transparent discloser rather than a reluctant complier — this approach builds investor trust and reduces the risk of enforcement action."
    weight: 0.30
    description: "CommentLetterAndBoardComm"
