meta:
  id: income-statement-summary
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write an income statement summary — translate quarterly P&L results into narrative commentary suitable for management review"
  tags: [income-statement, quarterly-results, management-reporting, beginner]

state: {}

trigger: |
  Write a management narrative summary of the
  following Q3 income statement results for a
  mid-market software company.

  CONSOLIDATED INCOME STATEMENT — Q3 2025
  (in thousands)
                          Q3 2025   Q3 2024   Change
  Revenue
    Subscription          $12,400   $10,200   +21.6%
    Professional Services  $2,800    $3,100   -9.7%
    Hardware/Other           $600      $800   -25.0%
  Total Revenue           $15,800   $14,100   +12.1%

  Cost of Revenue
    Subscription COGS      $3,100    $2,800   +10.7%
    Services COGS          $2,200    $2,400   -8.3%
    Hardware COGS            $480      $640   -25.0%
  Total COGS               $5,780    $5,840   -1.0%

  Gross Profit            $10,020    $8,260   +21.3%
  Gross Margin              63.4%     58.6%   +4.8pp

  Operating Expenses
    Sales & Marketing      $4,200    $3,800   +10.5%
    R&D                    $3,500    $3,000   +16.7%
    G&A                    $1,800    $1,600   +12.5%
  Total OpEx               $9,500    $8,400   +13.1%

  Operating Income           $520     ($140)    NM
  Operating Margin            3.3%    -1.0%   +4.3pp

  KEY CONTEXT:
  - Company transitioned from perpetual licenses
    to subscription model 2 years ago
  - Subscription revenue growing as recurring base
    builds
  - Professional services declining as product
    becomes easier to implement (self-serve)
  - Hardware declining as company exits that
    business line
  - Gross margin improvement driven by subscription
    mix shift (higher margin than services/hardware)
  - R&D increase includes new AI product initiative
  - Company reached operating profitability for
    first time since model transition

  Write a 400-500 word management narrative.

assertions:
  - type: llm_judge
    criteria: "Narrative leads with the most important story and provides strategic context — the opening paragraph should lead with the headline: the company achieved operating profitability for the first time since the subscription model transition, with operating income of $520K vs. a loss of $140K in the prior year period; total revenue grew 12.1% year-over-year driven by 21.6% subscription revenue growth; the narrative should frame results within the strategic context of the business model transition — subscription revenue now represents 78% of total revenue (up from 72% a year ago), reflecting the successful transition from perpetual to recurring; the narrative addresses each revenue stream: subscription growth of $2.2M (21.6%) reflects the growing recurring base with strong net retention, professional services decline of $300K (-9.7%) is positioned positively as evidence that the product is becoming easier to implement (reduced implementation dependency is strategically positive even though it reduces near-term revenue), hardware decline of $200K (-25%) reflects the planned exit from this business line."
    weight: 0.35
    description: "StrategicNarrative"
  - type: llm_judge
    criteria: "Margin analysis and expense commentary demonstrate financial acumen — the gross margin story is told clearly: 4.8 percentage point improvement to 63.4% driven by favorable revenue mix shift toward subscription (highest margin stream), with subscription COGS growing slower than subscription revenue (10.7% vs. 21.6%) indicating economies of scale in hosting/infrastructure; operating expense commentary explains the 13.1% growth in context: S&M grew 10.5% (below revenue growth rate, showing improving sales efficiency), R&D grew 16.7% (includes investment in new AI product initiative — frame as strategic investment, not just cost increase), G&A grew 12.5% (supporting growth infrastructure); the commentary notes that despite OpEx growing 13.1%, operating leverage is evident as revenue grew 12.1% while the company swung from operating loss to profit — demonstrating that the cost structure is now appropriately scaled for the subscription model."
    weight: 0.35
    description: "MarginAndExpenseAnalysis"
  - type: llm_judge
    criteria: "Writing is appropriate for management audience in length, tone, and structure — the narrative is 400-500 words as specified, organized with clear structure (can use headers or well-structured paragraphs), uses professional financial language without being overly technical, includes specific numbers and percentages to support statements, balances positive results with honest assessment of challenges (services and hardware declines), avoids excessive optimism or corporate-speak, and includes a brief forward-looking comment about what these results mean for the trajectory of the business; the narrative is written for a management audience (VP+ level) who understand financial statements but want the narrative interpretation — the 'so what' behind the numbers."
    weight: 0.30
    description: "WritingAppropriateness"
