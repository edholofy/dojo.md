meta:
  id: balance-sheet-highlights
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write balance sheet highlights — summarize key balance sheet changes and their business implications for a quarterly management report"
  tags: [balance-sheet, liquidity, financial-position, beginner]

state: {}

trigger: |
  Write balance sheet highlights for the quarterly
  management report. Explain the key changes and
  their business implications.

  BALANCE SHEET SUMMARY (in thousands)
                           Sep 30   Jun 30   Change
  ASSETS
  Cash & Equivalents       $8,200   $12,500  ($4,300)
  Accounts Receivable      $9,800    $7,200   $2,600
  Inventory                $6,500    $5,100   $1,400
  Prepaid Expenses         $1,200    $1,000     $200
  Total Current Assets    $25,700   $25,800    ($100)

  PP&E (net)              $14,200   $13,800     $400
  Goodwill                $22,000   $22,000       $0
  Other Intangibles        $3,800    $4,100    ($300)
  Total Assets            $65,700   $65,700       $0

  LIABILITIES
  Accounts Payable         $4,200    $3,800     $400
  Accrued Expenses         $3,500    $3,200     $300
  Current Debt             $2,000    $2,000       $0
  Total Current Liab.      $9,700    $9,000     $700

  Long-term Debt          $18,000   $18,000       $0
  Total Liabilities       $27,700   $27,000     $700

  EQUITY
  Total Equity            $38,000   $38,700    ($700)

  KEY RATIOS:
  Current Ratio:    2.65x (prior: 2.87x)
  Quick Ratio:      1.86x (prior: 2.19x)
  DSO:              62 days (prior: 48 days)
  DIO:              55 days (prior: 42 days)
  Debt/Equity:      0.53x (prior: 0.52x)

  CONTEXT:
  - Q3 is seasonally the company's largest
    revenue quarter
  - Cash decline: $3M used for equipment purchase,
    $1.3M negative operating cash flow
  - AR increase: large Q3 shipments in final 2
    weeks of quarter (not yet collected)
  - Inventory build: preparing for Q4 holiday
    season orders
  - Equity decline: Q3 net loss of $700K

  Write a 300-400 word narrative highlighting
  the key changes and their implications.

assertions:
  - type: llm_judge
    criteria: "Narrative correctly identifies and explains the key balance sheet movements — the highlights should focus on the most significant changes: (1) Cash decline of $4.3M explained by both the equipment purchase ($3M capital investment) and negative operating cash flow ($1.3M) — this is the most concerning change and should be addressed directly; (2) AR increase of $2.6M and DSO increase from 48 to 62 days explained by the timing of Q3 shipments (heavy billing in last 2 weeks) — the narrative should note whether this is typical seasonal behavior and what the collection outlook is; (3) Inventory build of $1.4M and DIO increase from 42 to 55 days positioned as intentional preparation for Q4 holiday season — this is strategic, not a problem, but warrants noting the cash tied up; (4) Current ratio decline from 2.87x to 2.65x — still healthy but trending down, driven by cash reduction and current liability increases; the narrative connects the dots: the cash position is declining because the company is investing (equipment, inventory build) while operating cash flow was negative — if Q4 collections are strong and holiday sales materialize, the position should recover."
    weight: 0.35
    description: "KeyMovements"
  - type: llm_judge
    criteria: "Narrative addresses liquidity and financial health implications — the commentary should assess overall financial health: total assets unchanged ($65.7M), but the composition shifted from cash to receivables and inventory (less liquid assets replacing more liquid assets); the liquidity discussion notes: current ratio of 2.65x is adequate but declined from 2.87x, quick ratio decline from 2.19x to 1.86x is more concerning as it excludes the inventory build; the equity decline of $700K reflects the Q3 net loss — the narrative should note this is the second consecutive quarterly loss (or similar context if implied); debt levels unchanged at $20M total, debt-to-equity stable at 0.53x; the forward-looking implications: the company needs strong Q4 collections to restore cash position, the inventory build is a bet on holiday demand that needs to pay off, and negative operating cash flow needs to reverse."
    weight: 0.35
    description: "LiquidityAssessment"
  - type: llm_judge
    criteria: "Writing is concise, well-structured, and at appropriate level for management — the narrative is 300-400 words as specified, uses a logical structure (overview, key changes, implications), includes relevant ratios to support analysis, distinguishes between concerns and explainable/seasonal movements, uses professional balance sheet terminology correctly (DSO, DIO, current ratio, quick ratio), avoids alarmist language but doesn't sugarcoat the cash position decline, and provides a balanced assessment that acknowledges both the strategic investments and the liquidity concerns."
    weight: 0.30
    description: "WritingQuality"
