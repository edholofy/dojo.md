meta:
  id: ratio-interpretation
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write financial ratio interpretation narratives — explain what key financial ratios mean in business terms for a non-financial audience"
  tags: [ratio-analysis, interpretation, plain-english, beginner]

state: {}

trigger: |
  The CEO has asked for plain-English explanations
  of the company's key financial ratios for the
  quarterly town hall presentation. Write narratives
  that non-financial employees can understand.

  COMPANY: Mid-market manufacturing company
  AUDIENCE: All employees (mostly non-finance)

  RATIOS TO EXPLAIN:
  1. Gross Margin: 38.2% (prior year: 41.5%)
  2. Operating Margin: 8.4% (prior year: 11.2%)
  3. Current Ratio: 1.8x (prior year: 2.3x)
  4. Debt-to-Equity: 0.65x (prior year: 0.45x)
  5. Inventory Turnover: 5.2x (prior year: 6.8x)
  6. DSO (Days Sales Outstanding): 48 days
     (prior year: 39 days)
  7. Return on Equity: 14.2% (prior year: 16.8%)

  CONTEXT:
  - Company invested in a new production facility
    (funded partially by debt)
  - Raw material costs increased 12% due to
    supply chain disruptions
  - Large customer extended payment terms from
    Net 30 to Net 45
  - New facility not yet at full production
    efficiency
  - Two new product lines launched in Q2

  For each ratio, write:
  - A plain-English explanation of what it measures
  - What our number means in context
  - Why it changed from last year
  - 2-3 sentences maximum per ratio
  Plus an overall summary paragraph.

assertions:
  - type: llm_judge
    criteria: "Explanations are genuinely plain-English and accessible to non-financial employees — each ratio explanation avoids jargon and uses relatable analogies or straightforward language: gross margin explained as 'for every dollar of revenue, how much we keep after paying for materials and direct labor' (not 'revenue minus COGS divided by revenue'); current ratio explained as 'our ability to pay bills coming due in the next year' (not 'current assets divided by current liabilities'); debt-to-equity explained in terms of 'how much of the company is funded by borrowing vs. our own money'; inventory turnover explained as 'how quickly we sell through our stock'; DSO explained as 'how long it takes customers to pay us'; each explanation connects to something employees can relate to rather than abstract financial concepts."
    weight: 0.35
    description: "PlainEnglish"
  - type: llm_judge
    criteria: "Context links each ratio change to specific business events — every year-over-year change is explained with the business reason: gross margin decline (41.5% to 38.2%) linked to the 12% raw material cost increase from supply chain disruptions; operating margin decline (11.2% to 8.4%) reflects both the gross margin pressure plus higher overhead from the new facility not yet at full efficiency; current ratio decline (2.3x to 1.8x) reflects the investment in new facility using some short-term resources; debt-to-equity increase (0.45x to 0.65x) directly linked to borrowing to fund the new production facility; inventory turnover decline (6.8x to 5.2x) reflects stocking up for new product lines and the new facility; DSO increase (39 to 48 days) directly attributed to the large customer extending payment terms; ROE decline (16.8% to 14.2%) reflects lower profitability despite higher equity base; the overall summary should reassure employees while being honest: the ratio changes are largely explained by strategic investments (new facility, new products) and external factors (material costs, customer terms) — not operational failure."
    weight: 0.35
    description: "ContextualExplanation"
  - type: llm_judge
    criteria: "Writing is appropriately concise (2-3 sentences per ratio) and includes a coherent summary — each ratio explanation is truly 2-3 sentences (not paragraphs), the overall summary paragraph ties everything together into a coherent story for employees, the tone is honest but not alarming (acknowledging declines while explaining they're expected given investments), and the writing would work in a presentation slide or town hall script format."
    weight: 0.30
    description: "ConciseAndCoherent"
