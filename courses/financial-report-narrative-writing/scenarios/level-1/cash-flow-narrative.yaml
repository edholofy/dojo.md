meta:
  id: cash-flow-narrative
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write a cash flow statement narrative — explain operating, investing, and financing cash flows and their relationship to business activities"
  tags: [cash-flow, operating-cash, management-reporting, beginner]

state: {}

trigger: |
  Write a narrative explanation of the quarterly
  cash flow statement for management review.

  CASH FLOW STATEMENT — Q2 2025 (in thousands)

  OPERATING ACTIVITIES
  Net Income                          $1,200
  Adjustments:
    Depreciation & Amortization        $850
    Stock-Based Compensation           $320
    Change in AR                     ($1,800)
    Change in Inventory                 $400
    Change in AP                       ($600)
    Change in Deferred Revenue          $950
    Other                               $180
  Net Cash from Operations            $1,500

  INVESTING ACTIVITIES
  Purchase of Equipment              ($2,200)
  Capitalized Software Dev            ($800)
  Acquisition (net of cash)          ($5,500)
  Net Cash from Investing           ($8,500)

  FINANCING ACTIVITIES
  Proceeds from Revolving Credit      $4,000
  Repayment of Term Loan              ($750)
  Dividends Paid                      ($400)
  Share Repurchases                    ($600)
  Net Cash from Financing             $2,250

  NET CHANGE IN CASH                 ($4,750)
  Beginning Cash                     $18,200
  Ending Cash                        $13,450

  CONTEXT:
  - Company acquired a small competitor for $5.5M
    in cash during Q2
  - AR increased due to strong June sales
  - Inventory decreased (drawdown of excess stock)
  - Drew on revolving credit facility to fund
    the acquisition
  - Continued regular quarterly dividend ($400K)
  - Opportunistic share repurchase ($600K)

  Write a 300-400 word cash flow narrative.

assertions:
  - type: llm_judge
    criteria: "Narrative explains each cash flow section with business context — operating cash flow: net cash from operations of $1.5M was positive despite $1.8M consumed by AR growth (explained by strong June sales not yet collected); non-cash items (D&A $850K, SBC $320K) added back to net income of $1.2M; deferred revenue increase of $950K indicates new prepaid contracts (positive sign for future revenue); inventory decrease of $400K reflects intentional drawdown of excess stock; investing activities: the $8.5M outflow was dominated by the $5.5M acquisition, with the remaining $3M in equipment and capitalized software representing ongoing business investment; financing activities: the $4M drawn on the revolving credit facility was used to fund the acquisition (connecting investing and financing activities), while the company maintained its regular dividend ($400K) and executed an opportunistic share repurchase ($600K); the narrative connects the three sections: the acquisition was the quarter's defining cash event, funded through a combination of existing cash and revolving credit."
    weight: 0.35
    description: "CashFlowExplanation"
  - type: llm_judge
    criteria: "Narrative addresses overall cash position and forward implications — the summary notes: cash decreased by $4.75M to $13.45M, primarily due to the acquisition; if the acquisition is excluded, underlying cash generation was $3.75M positive ($1.5M operations - $3M non-acquisition investing + $2.25M financing); the narrative should note the quality of cash flow: operating cash flow is healthy and positive, the cash decrease was driven by a strategic investment (acquisition) not operational weakness; forward-looking considerations: the revolving credit draw increases debt and will require repayment or refinancing, the AR build should convert to cash in Q3, and the company maintained shareholder returns (dividends + buybacks) even during an acquisition quarter, signaling confidence."
    weight: 0.35
    description: "CashPositionAnalysis"
  - type: llm_judge
    criteria: "Writing is clear, professional, and appropriately structured — the narrative is 300-400 words, organized by cash flow section (operating, investing, financing) with an overall summary, uses proper cash flow terminology, avoids conflating cash flow with profitability, connects the three sections to tell a coherent story, and is written for a management audience who wants to understand where the cash went and whether the position is healthy."
    weight: 0.30
    description: "WritingQuality"
