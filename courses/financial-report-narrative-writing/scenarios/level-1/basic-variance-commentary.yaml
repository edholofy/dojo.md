meta:
  id: basic-variance-commentary
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write basic variance commentary — explain budget-to-actual differences for revenue and expense line items in plain, professional language"
  tags: [variance-commentary, budget-actual, beginner-writing, beginner]

state: {}

trigger: |
  Write variance commentary for the following
  Q1 results vs. budget for the Marketing
  department. Explain each significant variance.

  MARKETING DEPARTMENT — Q1 RESULTS
  Line Item          | Budget    | Actual    | Variance
  -------------------|-----------|-----------|----------
  Personnel Costs    | $420,000  | $385,000  | ($35,000) F
  Advertising        | $180,000  | $215,000  | $35,000 U
  Events/Trade Shows | $95,000   | $42,000   | ($53,000) F
  Software/Tools     | $65,000   | $72,000   | $7,000 U
  Travel             | $35,000   | $28,000   | ($7,000) F
  Consulting         | $50,000   | $85,000   | $35,000 U
  Total              | $845,000  | $827,000  | ($18,000) F

  CONTEXT (use this to explain the "why"):
  - Two marketing coordinator positions budgeted
    but only one was filled (hire delayed to Q2)
  - Digital ad spend increased to support new
    product launch moved up from Q2
  - Annual industry conference was cancelled by
    organizer; regional events postponed to Q3
  - Added Salesforce Marketing Cloud mid-quarter
    (not in original budget)
  - Consulting spend increased due to brand
    refresh project approved in February
  - Travel underspent due to cancelled conference

  Write professional variance commentary for each
  line item and an executive summary paragraph.

assertions:
  - type: llm_judge
    criteria: "Commentary explains the WHY behind each variance, not just restating the numbers — each line item commentary connects the dollar variance to a specific business reason: personnel favorable by $35K due to delayed hire of second marketing coordinator (expected to fill in Q2, will create an unfavorable run rate going forward); advertising unfavorable by $35K due to accelerated digital campaign supporting the product launch timeline change (moved from Q2 to Q1); events favorable by $53K because the industry conference was cancelled by the organizer and regional events were postponed to Q3 (this is timing, not savings — spend expected to shift to later quarters); software unfavorable by $7K due to unbudgeted addition of Salesforce Marketing Cloud; consulting unfavorable by $35K due to brand refresh project approved mid-quarter; travel favorable by $7K linked to cancelled conference; the commentary avoids simply restating numbers (bad: 'advertising was $35K over budget') and instead provides context (good: 'advertising exceeded budget by $35K reflecting accelerated digital spend to support the product launch timeline')."
    weight: 0.35
    description: "VarianceExplanation"
  - type: llm_judge
    criteria: "Executive summary paragraph synthesizes the story coherently — the summary doesn't just list variances but tells a cohesive narrative: overall marketing spend was $18K favorable to budget, driven primarily by timing differences (delayed hire, cancelled/postponed events) partially offset by incremental spend on strategic initiatives (brand refresh, product launch support); the summary highlights forward-looking implications: the personnel savings are temporary (hire expected in Q2), event spend will shift to later quarters, and the consulting overspend is expected to continue as the brand refresh project is completed; the tone is professional and concise, written for a management audience that wants the 'so what' not just the 'what'; the summary distinguishes between permanent savings, timing differences, and scope changes."
    weight: 0.35
    description: "ExecutiveSummary"
  - type: llm_judge
    criteria: "Writing quality is professional, clear, and appropriately formatted — the commentary uses: consistent format for each line item (line item name, variance amount and direction, explanation), active voice, specific dollar amounts and percentages where appropriate, professional but not overly formal tone, proper accounting terminology (favorable/unfavorable, not 'good' or 'bad'), no jargon without explanation, proper sentence structure; the formatting makes it scannable — a busy executive should be able to read the summary and skip to specific line items of interest; the commentary avoids common pitfalls: no exclamation marks, no emotional language, no blame attribution, no speculation without basis, and no vague phrases like 'due to various factors' or 'as expected.'"
    weight: 0.30
    description: "WritingQuality"
