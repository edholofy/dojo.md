meta:
  id: kpi-dashboard-narrative
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write KPI dashboard narrative — interpret key performance indicators and write the accompanying commentary that explains what the metrics mean for the business"
  tags: [kpi, dashboard-commentary, metrics-interpretation, beginner]

state: {}

trigger: |
  Write the narrative commentary to accompany
  the monthly KPI dashboard for a SaaS company.
  The dashboard shows the metrics; your job is to
  explain what they mean.

  MONTHLY KPI DASHBOARD — FEBRUARY 2025

  REVENUE METRICS:
  MRR (Monthly Recurring Revenue): $2.45M
    Prior Month: $2.38M (+2.9%)
    Year Ago: $1.92M (+27.6%)
  ARR (Annualized): $29.4M
  New MRR: $142K (from 18 new customers)
  Expansion MRR: $85K (upsells/cross-sells)
  Churned MRR: ($95K) (6 customers lost)
  Net New MRR: $132K

  CUSTOMER METRICS:
  Total Customers: 342 (prior month: 330)
  Net Revenue Retention (NRR): 112%
  Gross Revenue Retention (GRR): 94%
  Logo Churn: 1.8% monthly (6 of 330)
  Average Revenue Per Account: $7,164/month

  EFFICIENCY METRICS:
  CAC (Customer Acquisition Cost): $18,500
  CAC Payback Period: 14 months
  LTV/CAC Ratio: 4.2x
  Rule of 40: 35 (27.6% growth + 7.4% margin)

  ENGAGEMENT:
  DAU/MAU Ratio: 42%
  NPS: 38
  Support Tickets/Customer: 1.8

  BENCHMARKS (median SaaS at $25-50M ARR):
  NRR: 108%, GRR: 90%, Logo Churn: 2.5%,
  CAC Payback: 18 months, LTV/CAC: 3.5x,
  Rule of 40: 30, NPS: 35

  Write 400-500 words of dashboard commentary.

assertions:
  - type: llm_judge
    criteria: "Commentary interprets what each metric means for business health — the narrative shouldn't just restate numbers but explain their significance: MRR growth of 2.9% month-over-month and 27.6% year-over-year shows strong momentum with the business adding $132K in net new MRR; the breakdown matters: new MRR ($142K) and expansion MRR ($85K) significantly exceed churned MRR ($95K), indicating healthy growth dynamics; NRR of 112% means existing customers are growing their spend 12% annually even after accounting for churn — this is above the median benchmark of 108%; GRR of 94% shows strong base retention with only 6% annual revenue churn, also above benchmark; logo churn of 1.8% monthly (21.6% annualized) is actually below the benchmark median of 2.5%, meaning the company retains customers better than peers; the efficiency metrics are strong: LTV/CAC of 4.2x exceeds the benchmark 3.5x, CAC payback of 14 months is faster than the 18-month benchmark; the Rule of 40 score of 35 is above the median 30, though not yet at the 40 threshold — the narrative should note what combination of growth and margin improvement would get there."
    weight: 0.35
    description: "MetricsInterpretation"
  - type: llm_judge
    criteria: "Commentary identifies areas of strength and concern with context — the narrative balances positive and concerning signals: strengths include above-benchmark retention (NRR, GRR, logo churn), healthy unit economics (LTV/CAC, CAC payback), and consistent MRR growth; areas requiring attention: NPS of 38 is only slightly above benchmark (35) and not exceptional for a company with strong retention — could indicate latent churn risk; DAU/MAU of 42% suggests moderate daily engagement (not sticky enough for a platform play); support tickets at 1.8 per customer per month may indicate product complexity or quality issues; the 6 churned customers representing $95K MRR ($15.8K average) suggests mid-market customer losses — worth investigating if there's a pattern; the Rule of 40 at 35 indicates the company needs either faster growth or better margins to reach best-in-class status."
    weight: 0.35
    description: "StrengthsAndConcerns"
  - type: llm_judge
    criteria: "Writing is appropriate for a SaaS executive audience — uses SaaS-standard terminology correctly (MRR, ARR, NRR, GRR, CAC, LTV, Rule of 40, logo churn), contextualizes metrics against benchmarks provided, is 400-500 words as specified, organizes commentary logically (revenue, retention, efficiency, engagement), provides actionable insights rather than just description, and is written for a leadership team that knows SaaS metrics but wants the interpretive layer."
    weight: 0.30
    description: "WritingAppropriateness"
