meta:
  id: earnings-release-draft
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Draft a basic earnings release summary — write the headline and opening paragraphs of a quarterly earnings press release"
  tags: [earnings-release, press-release, investor-communications, beginner]

state: {}

trigger: |
  Draft the headline and first 3 paragraphs of
  a quarterly earnings press release for a
  publicly traded regional bank.

  COMPANY: First Regional Bancorp (NASDAQ: FRBK)
  PERIOD: Q2 2025

  KEY RESULTS:
  - Net Income: $18.2M ($0.91/diluted share)
  - Prior Year Q2: $15.8M ($0.79/share)
  - Net Interest Income: $42.5M (up 8.3%)
  - Net Interest Margin: 3.42% (up from 3.18%)
  - Non-Interest Income: $8.2M (down 4.7%)
  - Provision for Credit Losses: $3.8M (up from $2.1M)
  - Efficiency Ratio: 58.2% (improved from 61.5%)
  - Total Loans: $4.8B (up 6.2% YoY)
  - Total Deposits: $5.2B (up 3.8% YoY)
  - CET1 Ratio: 10.8%
  - NPL Ratio: 0.42% (up from 0.31%)
  - ROE: 12.4% (up from 10.8%)

  MANAGEMENT QUOTES TO INCORPORATE:
  CEO: "Our Q2 results demonstrate the strength of
  our relationship-based banking model and the
  benefits of our diversified loan portfolio."

  CFO: "Net interest margin expansion drove strong
  earnings growth, while we proactively increased
  provisions to reflect the evolving credit
  environment."

  GUIDANCE:
  - Full-year 2025 EPS: $3.40-$3.60
  - NIM expected to remain in 3.35-3.50% range
  - Loan growth target: 5-7% for full year

  Draft the press release opening (headline +
  3 paragraphs).

assertions:
  - type: llm_judge
    criteria: "Headline and lead paragraph follow earnings release conventions — the headline includes: company name, quarter/year, and the key metric (EPS of $0.91 or net income of $18.2M), with a descriptor of performance (e.g., 'Reports Second Quarter 2025 EPS of $0.91, Up 15% Year-Over-Year'); the first paragraph (lead) follows the standard earnings release format: company name, ticker, date, key financial results (net income, EPS, YoY comparison), and 1-2 performance highlights (NIM expansion, loan growth); the format matches what investors and analysts expect from a bank earnings release — factual, numbers-forward, with key metrics in the first sentences."
    weight: 0.35
    description: "HeadlineAndLead"
  - type: llm_judge
    criteria: "Body paragraphs appropriately incorporate management quotes and context — paragraph 2 should provide additional financial detail: NII growth, NIM expansion, efficiency ratio improvement, deposit/loan growth, with the CEO quote integrated naturally (not just inserted as a block quote without context); paragraph 3 should address the credit quality story: the provision increase (from $2.1M to $3.8M), the NPL ratio increase (from 0.31% to 0.42%), positioned as proactive risk management rather than a credit crisis — the CFO quote about proactive provisioning fits here; the narrative should also mention the strong capital position (CET1 of 10.8%) and the guidance for full year; the balance is important: the release highlights the positives (NIM expansion, ROE improvement, loan growth, efficiency gains) while transparently addressing the negatives (provision increase, non-interest income decline, NPL increase)."
    weight: 0.35
    description: "BodyParagraphs"
  - type: llm_judge
    criteria: "Writing follows press release style and is factually accurate — uses proper press release format (city, date, company identifier), third person, past tense for results, factual tone without promotional language, all numbers are accurately cited from the data provided, proper banking terminology (NIM, CET1, NPL, efficiency ratio), includes the NASDAQ ticker, and management quotes are naturally woven into the narrative rather than inserted awkwardly; the release avoids forward-looking language in the narrative sections (reserving it for the guidance section) and would be suitable for filing on a wire service."
    weight: 0.30
    description: "PressReleaseStyle"
