meta:
  id: segment-performance-summary
  level: 1
  course: financial-report-narrative-writing
  type: output
  description: "Write a business segment performance summary — compare and explain results across multiple business segments for quarterly reporting"
  tags: [segment-reporting, multi-segment, comparative-analysis, beginner]

state: {}

trigger: |
  Write a segment performance summary for a
  diversified industrial company with three
  operating segments.

  SEGMENT RESULTS — Q4 2025 (in millions)

  INDUSTRIAL EQUIPMENT SEGMENT:
  Revenue: $185M (prior year: $172M, +7.6%)
  Operating Income: $28.5M (prior year: $24.8M)
  Operating Margin: 15.4% (prior year: 14.4%)
  Backlog: $210M (up from $180M)

  BUILDING PRODUCTS SEGMENT:
  Revenue: $120M (prior year: $135M, -11.1%)
  Operating Income: $8.4M (prior year: $16.2M)
  Operating Margin: 7.0% (prior year: 12.0%)
  Backlog: $65M (down from $95M)

  AFTERMARKET SERVICES SEGMENT:
  Revenue: $75M (prior year: $68M, +10.3%)
  Operating Income: $18.0M (prior year: $15.6M)
  Operating Margin: 24.0% (prior year: 22.9%)
  Backlog: N/A (service business)

  CONSOLIDATED:
  Revenue: $380M (prior year: $375M, +1.3%)
  Operating Income: $54.9M (prior year: $56.6M, -3.0%)
  Operating Margin: 14.4% (prior year: 15.1%)

  CONTEXT:
  - Housing starts declined 18% in 2025 (impacting
    Building Products)
  - Industrial capital spending remained strong
  - Aftermarket benefiting from aging installed base
  - Building Products had $4M in restructuring charges
  - Raw material costs increased 6% across all segments

  Write a 400-500 word segment analysis.

assertions:
  - type: llm_judge
    criteria: "Narrative tells a clear story of divergent segment performance — the analysis should lead with the consolidated picture (modest revenue growth masking very different segment trajectories) and then explain each segment: Industrial Equipment is the growth driver (7.6% revenue growth, margin expansion to 15.4%, strong backlog growth indicating continued momentum), driven by sustained industrial capital spending; Building Products is the challenge (11.1% revenue decline, margin compression from 12.0% to 7.0%, declining backlog) driven by the 18% decline in housing starts, with $4M in restructuring charges further impacting margins — the underlying operating margin excluding restructuring would be approximately 10.3%, still down significantly; Aftermarket Services is the margin star (10.3% revenue growth, 24.0% margin — highest of all segments, and expanding) benefiting from the aging installed equipment base; the narrative explains how the consolidated results (1.3% revenue growth, 3.0% operating income decline) are misleading without segment context — the strong segments are growing but the Building Products weakness is dragging overall results."
    weight: 0.35
    description: "SegmentNarrative"
  - type: llm_judge
    criteria: "Analysis includes forward-looking indicators and addresses margin dynamics — backlog analysis: Industrial Equipment backlog growth to $210M (up 17%) suggests continued strength in coming quarters; Building Products backlog decline to $65M (down 32%) indicates the weakness will continue; the margin discussion addresses raw material cost pressure across all segments (6% increase) — Industrial Equipment and Aftermarket absorbed this through pricing power and mix, while Building Products could not pass costs through in a declining market; the restructuring charges in Building Products should be discussed: management is taking action to right-size the segment for lower volumes, which is appropriate given the housing market outlook; the narrative should note that Aftermarket Services' high and improving margins highlight the strategic value of recurring service revenue and the installed base."
    weight: 0.35
    description: "ForwardIndicators"
  - type: llm_judge
    criteria: "Writing is well-organized and uses appropriate comparative language — the analysis is 400-500 words, organized by segment with a consolidated summary, uses comparative language effectively (year-over-year changes, margin percentages, backlog trends), correctly handles the restructuring charge adjustment, and provides a balanced view that acknowledges both strength and weakness without either over-optimism or excessive negativity."
    weight: 0.30
    description: "WritingOrganization"
