meta:
  id: narrative-social-enterprise
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Design a social enterprise that democratizes financial narrative quality — create a nonprofit or B-corp that improves financial communication for underserved organizations"
  tags: [social-enterprise, democratization, nonprofit, master]

state: {}

trigger: |
  You are developing a social enterprise called
  "ClearNumbers" that aims to democratize access
  to high-quality financial narrative writing.

  THE PROBLEM:
  - Small public companies (micro-cap, $50-300M
    market cap) produce significantly worse financial
    narratives than large-cap companies
  - These companies cannot afford the Big 4 advisory
    fees, specialized IR firms, or dedicated narrative
    professionals
  - Poor narrative quality leads to: wider bid-ask
    spreads, less analyst coverage, higher cost of
    capital, more SEC comment letters, and greater
    litigation risk
  - Research shows a "narrative quality gap" that
    mirrors the wealth gap — companies that can
    afford good narrative advice get cheaper capital,
    creating a virtuous cycle, while those that
    can't are trapped in a vicious cycle
  - Approximately 3,000 US public companies have
    fewer than 5 finance professionals and produce
    their own SEC filings with limited expertise

  THE OPPORTUNITY:
  - AI and NLG tools have dramatically reduced the
    cost of narrative quality assistance
  - Financial narrative best practices are well-
    documented but not widely accessible
  - The SEC's plain English initiative has created
    demand for better narratives
  - University accounting programs rarely teach
    financial narrative writing

  Design:
  1. Mission and operating model
  2. Service offerings (free and paid tiers)
  3. Technology platform
  4. Funding and sustainability model
  5. Impact measurement
  6. 3-year growth plan

assertions:
  - type: llm_judge
    criteria: "Mission and operating model address a genuine market failure — the enterprise model: ClearNumbers operates as a B-Corp (not a pure nonprofit) to combine social mission with financial sustainability; the mission: 'Every public company investor deserves clear, specific, and informative financial narrative, regardless of the company's size or resources'; the operating model: (1) Free tier: AI-powered narrative quality assessment tool (upload your 10-K, receive a quality score with specific improvement recommendations — modeled on the grading rubric from academic research); open-source narrative templates and style guides adapted for small companies; a library of 'best-in-class' narrative examples from companies of similar size; (2) Subsidized tier ($5-15K per filing vs. $50-150K from Big 4): human-reviewed narrative editing for SEC filings — AI generates first-pass improvements, human editors (trained financial writers) review and refine; comment letter response assistance; (3) Market-rate tier: full-service narrative advisory for mid-cap companies willing to pay market rates, with revenues cross-subsidizing the free and subsidized tiers; the model addresses the root cause: small companies don't lack the financial data — they lack the narrative expertise to translate data into insight; ClearNumbers provides that expertise at scale through technology, with human oversight where it matters."
    weight: 0.35
    description: "MissionAndModel"
  - type: llm_judge
    criteria: "Technology platform leverages AI responsibly to scale narrative quality — the platform: (1) Narrative Quality Scanner: AI engine that analyzes uploaded 10-K/10-Q sections against 8 quality dimensions (readability, specificity, causal attribution, forward-looking content, sentiment balance, risk factor quality, non-GAAP compliance, consistency with prior filings); produces a detailed report with sentence-level recommendations ('This sentence restates the revenue number without explaining why it changed — add the business driver'); built on fine-tuned language models trained on 10,000+ SEC filings and 5,000+ SEC comment letters; (2) Narrative Improvement Engine: given a 'below standard' section, the AI generates an improved version maintaining the company's facts but enhancing the narrative quality; human editor reviews every AI-generated improvement before delivery; (3) Comment Letter Predictor: analyzes draft filings and flags sections likely to receive SEC comments (based on patterns from historical comment letters); (4) Template Library: industry-specific narrative templates that small companies can customize; all with style guide enforcement built in; responsible AI principles: every AI-generated narrative is disclosed as AI-assisted; the human editor has final authority; the system never fabricates information or adds claims not supported by the source data; the technology reduces cost by 70-80% compared to traditional advisory services."
    weight: 0.35
    description: "TechnologyPlatform"
  - type: llm_judge
    criteria: "Funding model and impact measurement demonstrate viability and accountability — funding: Year 1 — seed funding from a combination of foundation grants (financial literacy and capital markets access focus), impact investors, and a pilot program with 2-3 stock exchanges interested in improving their listed companies' disclosure quality; Year 2-3 — the market-rate tier generates revenue to cross-subsidize the free tier; target: market-rate revenue covers 60% of operating costs by Year 3, with grants and impact investment covering the remainder; long-term sustainability: by Year 5, the enterprise should be self-sustaining through the tiered pricing model (similar to how open-source companies like GitLab monetize); impact measurement tracks: (1) Narrative Quality Improvement: average quality score increase for companies using the platform (target: 1.5 points on a 5-point scale within 2 filing cycles), (2) SEC Comment Letter Reduction: companies using ClearNumbers receive fewer narrative-related SEC comments (target: 40% reduction), (3) Market Outcomes: bid-ask spread narrowing for participating companies vs. control group (this is the ultimate measure of whether better narrative translates to better capital markets outcomes), (4) Reach: number of companies served (target: 200 by Year 1, 500 by Year 2, 1,000 by Year 3), (5) User Satisfaction: quarterly survey of participating companies; 3-year growth: Year 1 — launch free tool and subsidized tier for 200 companies, establish partnerships with 5 stock exchanges and 10 university accounting programs; Year 2 — expand to 500 companies, launch market-rate tier, begin international expansion; Year 3 — 1,000 companies, self-sustaining operations, publish annual 'State of Financial Narrative Quality' report."
    weight: 0.30
    description: "FundingAndImpact"
