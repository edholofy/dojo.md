meta:
  id: narrative-existential-questions
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Write a provocative essay examining whether financial narrative as we know it will survive — explore existential challenges from AI, real-time data, and changing investor expectations"
  tags: [existential, future-vision, essay, master]

state: {}

trigger: |
  Write a 3,000-word essay for the Harvard Business
  Review titled:

  "The End of the Annual Report: Why Financial
  Narrative Must Reinvent Itself or Die"

  THESIS:
  The traditional financial narrative — the 10-K
  MD&A, the earnings release, the annual shareholder
  letter — was designed for an era of quarterly
  information updates and paper-based communication.
  In an age of real-time data, AI-processed
  information, and stakeholder capitalism, the
  current model is obsolete. Financial narrative must
  fundamentally reinvent itself or become irrelevant.

  ARGUMENTS TO DEVELOP:
  1. The temporal mismatch — quarterly/annual
     narratives in a real-time world
  2. The audience fragmentation — one narrative for
     vastly different users
  3. The AI disruption — both production and
     consumption being automated
  4. The trust deficit — financial narratives are
     widely perceived as self-serving
  5. The scope expansion — climate, human capital,
     cyber, stakeholder interests beyond shareholders
  6. The information overload — 10-Ks have tripled
     in length since 2000 with no evidence of
     improved information value

  COUNTERARGUMENTS TO ADDRESS:
  - The annual reporting cycle provides important
    discipline
  - Human judgment in narrative provides value that
    data alone cannot
  - Regulatory frameworks depend on periodic
    narrative disclosure
  - Not all investors have access to real-time data

  The essay should propose a new model for financial
  narrative that addresses these challenges.

assertions:
  - type: llm_judge
    criteria: "The essay develops a compelling intellectual argument with original insight — the essay goes beyond simply listing problems to develop a coherent thesis about why financial narrative is at an inflection point; it draws on specific evidence: the average 10-K length has grown from 30,000 words in 2000 to over 80,000 words today, yet research shows analyst forecast accuracy has not improved proportionally; SEC comment letters increasingly focus on narrative deficiencies, suggesting regulators recognize the quality problem; the 2023 SEC climate disclosure rule added an estimated 15-20 pages to the average 10-K, and human capital and cybersecurity requirements are adding more; the essay identifies the fundamental tension: the regulatory impulse is to require MORE narrative disclosure (more topics, more specificity) while the market impulse is toward LESS (real-time data, algorithmic processing, dashboard analytics); the proposed new model provides a resolution to this tension — perhaps a 'layered disclosure model' where a core narrative (shorter, more strategic) is supplemented by machine-readable structured data, interactive dashboards, and continuous disclosure updates; the model preserves the value of human-authored strategic narrative while acknowledging that much of what currently fills 10-Ks could be better delivered through other channels."
    weight: 0.35
    description: "IntellectualArgument"
  - type: llm_judge
    criteria: "The essay engages seriously with counterarguments and proposes a practical new model — the counterarguments are treated fairly, not dismissed: the annual reporting discipline argument is acknowledged (the rhythm of periodic reflection forces management to synthesize and prioritize — continuous disclosure could lead to information fragmentation); the human judgment argument is validated (AI can generate narrative from data but cannot yet provide the strategic interpretation that a thoughtful MD&A offers); the regulatory framework argument is addressed (any new model must work within the securities law framework and protect investors); the accessibility argument is respected (the 'democratization' of financial information requires that narrative remains available to non-sophisticated investors, not just those with AI tools); the proposed new model balances these concerns: (1) A 'Strategic Narrative' document (replacing the current MD&A) that is shorter (10-15 pages maximum), focused on management's strategic interpretation of results and forward-looking assessment, written by humans for humans, updated quarterly; (2) A structured data layer (replacing much of the current 10-K boilerplate) that provides machine-readable financial data, risk indicators, ESG metrics, and trend data, updated monthly or in real-time; (3) An interactive disclosure platform (replacing the current static filing model) where investors can explore company data at the level of detail they need; (4) Event-based disclosure (enhanced 8-K model) for material developments between periodic filings."
    weight: 0.35
    description: "CounterargumentsAndModel"
  - type: llm_judge
    criteria: "The essay is written at HBR publication quality — the writing is sophisticated, engaging, and accessible to a senior business audience; it opens with a compelling hook (perhaps a specific anecdote or striking statistic that illustrates the problem); it uses concrete examples throughout rather than abstract arguments; it includes at least 2-3 specific company examples (anonymized if needed) that illustrate the problems and opportunities; the tone is provocative but balanced — it challenges the status quo without being dismissive of the regulatory and legal frameworks that underpin current disclosure; the essay is structured with clear sections, each building on the previous, leading to the proposed model; it closes with a call to action that is specific and achievable rather than vaguely aspirational; the writing avoids academic jargon while maintaining intellectual rigor; it would be credible as a piece written by a former SEC chief accountant, a Fortune 500 CFO, or a leading accounting professor — someone who deeply understands both the practice and the theory of financial narrative; the essay is approximately 3,000 words."
    weight: 0.30
    description: "WritingQuality"
