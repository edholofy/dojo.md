meta:
  id: global-narrative-standards
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Propose global financial narrative standards — develop an international framework for financial narrative quality that harmonizes disclosure practices across jurisdictions"
  tags: [global-standards, harmonization, international, master]

state: {}

trigger: |
  The IFRS Foundation has established a working
  group to develop principles for financial narrative
  quality in management commentary (the IFRS
  equivalent of MD&A). You have been appointed to
  draft the exposure draft.

  BACKGROUND:
  - IFRS Practice Statement 1 (Management
    Commentary) was revised in 2021 but provides
    limited guidance on narrative quality
  - The SEC's Regulation S-K provides US-specific
    guidance but is not internationally applicable
  - The EU's European Single Electronic Format
    (ESEF) focuses on structured data, not narrative
  - There is no global standard for what constitutes
    "good" financial narrative
  - Research shows narrative quality varies
    enormously across jurisdictions — some countries
    produce highly specific, driver-focused narratives
    while others produce generic, compliance-only text

  SCOPE OF THE EXPOSURE DRAFT:
  - Applicable to all entities preparing general
    purpose financial reports under IFRS
  - Covers: management commentary, strategic reports,
    operating and financial reviews, and similar
    narrative documents accompanying financial
    statements
  - Principles-based (not prescriptive rules)
  - Compatible with existing jurisdiction-specific
    requirements

  WORKING GROUP:
  - 15 members from 12 countries
  - Mix of regulators, preparers, investors, auditors,
    academics
  - Must achieve consensus

  Produce:
  1. The exposure draft (core principles and
     application guidance)
  2. Basis for conclusions (rationale for key
     decisions)
  3. Illustrative examples

assertions:
  - type: llm_judge
    criteria: "The exposure draft establishes principles that are universally applicable yet meaningful — the core principles (approximately 6-8) address the fundamental elements of narrative quality without being so prescriptive that they conflict with jurisdiction-specific rules; suggested principles: (1) Relevance — narrative should help users assess the entity's ability to create value over the short, medium, and long term, (2) Faithfulness — narrative should be a faithful representation of management's view, not merely a recitation of financial data, (3) Specificity — narrative should be specific to the entity's circumstances; generic statements that could apply to any company in the industry do not meet the standard, (4) Causal Attribution — material changes in financial results should be explained with reference to the underlying business drivers, not merely quantified, (5) Forward-Looking Orientation — narrative should include management's view of known trends, uncertainties, and events that are reasonably likely to affect future performance, with appropriate uncertainty language, (6) Consistency — narrative should be consistent in approach across periods, allowing users to compare management's discussion over time, (7) Accessibility — narrative should be written in clear, accessible language appropriate for the entity's investor base, (8) Balance — narrative should present a balanced view of the entity's performance, position, and prospects, not only favorable information; each principle includes application guidance with examples of compliant and non-compliant narrative."
    weight: 0.35
    description: "CorePrinciples"
  - type: llm_judge
    criteria: "The basis for conclusions addresses the key tensions in global narrative standard-setting — the document explains the working group's rationale for key decisions: (1) Why principles-based over rules-based: rules-based narrative standards (like some SEC requirements) can lead to 'check-the-box' compliance without genuine quality improvement; principles allow management to exercise judgment about what is material and relevant; however, the working group acknowledges that principles require enforcement mechanisms to be effective; (2) Why 'specificity' is a standalone principle: research shows that the single biggest deficiency in financial narratives globally is generic, boilerplate language; the specificity principle directly addresses this by requiring entity-specific disclosure; (3) The tension between forward-looking disclosure and litigation risk: some jurisdictions (particularly the US) have safe harbor protections for forward-looking statements while others do not; the standard encourages forward-looking disclosure but acknowledges that jurisdictions must provide appropriate legal frameworks; (4) The language accessibility challenge: 'plain English' is a culturally specific concept; the standard uses 'accessibility' to encompass the principle across languages and writing traditions; (5) The enforcement question: narrative quality is inherently subjective; the standard recommends that securities regulators develop review programs that assess narrative quality (as the SEC does through comment letters), but does not mandate a specific enforcement approach; (6) Compatibility with existing frameworks: the standard is designed to complement, not replace, jurisdiction-specific requirements — a narrative that meets SEC Regulation S-K requirements should also meet this standard, and vice versa."
    weight: 0.35
    description: "BasisForConclusions"
  - type: llm_judge
    criteria: "Illustrative examples demonstrate practical application across different contexts — the examples cover at least 3-4 different scenarios showing how the principles apply: (1) A manufacturing company explaining a revenue decline: non-compliant example uses generic language ('revenue decreased due to challenging market conditions'), compliant example identifies specific factors (loss of a major customer representing 8% of revenue, pricing pressure in the automotive segment, partially offset by volume growth in aerospace), (2) A technology company discussing forward-looking risks: non-compliant example lists generic risks ('the company faces competition'), compliant example provides specific competitive context and quantifies potential impact, (3) A financial institution discussing liquidity: non-compliant example uses regulatory boilerplate, compliant example explains the entity's specific liquidity position with quantification, (4) An extractive industry company discussing ESG: non-compliant example provides generic sustainability language, compliant example links ESG factors to specific financial impacts (carbon pricing exposure quantified, water usage in the context of operating costs); the examples span different industries and jurisdictions to demonstrate the universal applicability of the principles; the examples are realistic and could be drawn from actual filings (with names changed)."
    weight: 0.30
    description: "IllustrativeExamples"
