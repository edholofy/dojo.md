meta:
  id: narrative-thought-leadership
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Deliver a keynote address on the future of financial narrative — articulate a vision for how financial storytelling will evolve with AI, regulatory change, and investor expectations"
  tags: [thought-leadership, keynote, future-vision, master]

state: {}

trigger: |
  You have been invited to deliver the opening
  keynote at the SEC's annual conference on
  Corporate Disclosure. Your topic:

  "The Next Decade of Financial Narrative:
  From Compliance Document to Strategic Asset"

  AUDIENCE:
  - 500 attendees: SEC commissioners and staff,
    corporate CFOs and controllers, Big 4 audit
    partners, securities lawyers, investor advocates,
    academics, and financial journalists

  CONTEXT:
  - Financial narratives have evolved from simple
    statutory filings to complex multi-stakeholder
    communications
  - AI is transforming both the production and
    consumption of financial narratives
  - Regulatory requirements are expanding (climate,
    cyber, human capital)
  - Investor expectations are shifting (ESG,
    stakeholder capitalism, real-time information)
  - Trust in corporate disclosures is at a
    historical low point

  EXPECTED DELIVERABLE:
  - 30-minute keynote script (approximately
    4,000 words)
  - Must be intellectually rigorous while accessible
  - Should propose a framework or model that advances
    the field
  - Must address multiple stakeholder perspectives
    (regulators, preparers, investors)
  - Should include concrete recommendations

  Write the full keynote script.

assertions:
  - type: llm_judge
    criteria: "The keynote proposes an original framework that advances thinking about financial narrative — the speech introduces a model or framework (e.g., 'The Financial Narrative Maturity Model' or 'The Trust Architecture for Corporate Disclosure') that provides a new way of thinking about financial narrative evolution; the framework should address multiple dimensions: (1) the evolution from compliance-driven to insight-driven narrative, (2) the role of technology in narrative production and consumption, (3) the regulatory framework needed to support better narratives, and (4) the investor's changing relationship with corporate disclosure; the framework should be memorable and actionable — something attendees can apply in their organizations; the keynote demonstrates deep expertise across the financial reporting ecosystem: SEC regulations, audit standards, investor relations, corporate governance, accounting standards, and disclosure economics; the speech includes specific examples and case studies (anonymized or hypothetical) that illustrate the framework's application."
    weight: 0.35
    description: "OriginalFramework"
  - type: llm_judge
    criteria: "The keynote addresses the AI transformation of financial narrative with nuance — the speech does not simply celebrate AI or fear it, but provides a nuanced analysis: (1) AI as narrative producer — NLG can generate first-draft variance commentary, earnings summaries, and routine disclosures, freeing human writers to focus on insight and judgment; the risk is homogenization (every company's AI produces the same boilerplate) and the loss of authentic management voice; (2) AI as narrative consumer — investors increasingly use NLP to process thousands of filings simultaneously; this means narratives must be both machine-parseable and human-readable; (3) AI as narrative auditor — automated tools can check consistency, flag anomalies, and compare narratives to prior periods; this changes the disclosure review process; (4) The authenticity question — when AI writes a CEO letter or MD&A section, who is the 'author'? What does the CEO's Section 302 certification mean when AI generated the narrative? This is an emerging regulatory question; (5) The information asymmetry question — if sophisticated investors use AI to extract information from filings while retail investors read them at face value, does AI widen the information gap?; the speech proposes principles for responsible AI use in financial narrative (human oversight, disclosure of AI involvement, maintaining management voice)."
    weight: 0.35
    description: "AITransformation"
  - type: llm_judge
    criteria: "The keynote is well-structured, engaging, and appropriately balanced across stakeholder perspectives — the speech structure follows a compelling arc (not just a list of topics): it opens with a specific, memorable anecdote or historical reference that frames the evolution of financial narrative; it builds through the current challenges and opportunities; it presents the framework as a way forward; and it closes with a call to action that speaks to each stakeholder group; the tone is appropriate for an SEC conference — intellectually serious but not academic, confident but not dismissive of complexity, forward-looking but grounded in current reality; the speech addresses each stakeholder perspective: regulators (what rules are needed vs. what rules impede good narrative), preparers (how to elevate narrative from a compliance burden to a strategic advantage), investors (what they actually need from financial narrative and what they don't), auditors (the expanding role in narrative assurance beyond just the numbers); the concrete recommendations include at least 3-4 actionable proposals: for the SEC (e.g., narrative quality principles beyond plain English), for companies (e.g., invest in narrative as a strategic function), for investors (e.g., reward better narratives with lower cost of capital), and for the profession (e.g., establish financial narrative as a recognized discipline); the keynote is approximately 4,000 words and would fill a 30-minute speaking slot."
    weight: 0.30
    description: "StructureAndBalance"
