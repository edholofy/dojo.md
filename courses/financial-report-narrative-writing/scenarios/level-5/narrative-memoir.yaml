meta:
  id: narrative-memoir
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Write a professional memoir from the perspective of a career financial narrative writer — capture the human story behind decades of translating numbers into words"
  tags: [memoir, career-reflection, storytelling, master]

state: {}

trigger: |
  Write a 2,500-word professional memoir from the
  perspective of a retiring Chief Financial Narrative
  Officer (a title that didn't exist when they
  started their career). The memoir spans 30 years
  (1995-2025) in corporate financial reporting.

  CHARACTER:
  - Started as a junior financial analyst writing
    variance commentary in 1995
  - Rose through financial reporting roles at 3
    companies
  - Witnessed the evolution from paper-based
    reporting to digital to AI-assisted
  - Navigated multiple financial crises (dot-com,
    Enron/SOX, 2008, COVID)
  - Personally experienced an SEC investigation
    (the company was at fault, not the narrator)
  - Championed the professionalization of financial
    narrative writing
  - Now retiring as the first person with "narrative"
    in their C-suite title

  KEY MOMENTS TO COVER:
  1. 1995: First variance commentary (hand-written
     on a pre-printed form)
  2. 2001: Writing the narrative for a going-concern
     company during the dot-com bust
  3. 2002-2003: The post-Enron SOX era — watching
     narrative expand from 5 pages to 50
  4. 2008: Writing the financial narrative during
     the global financial crisis
  5. 2015: The SEC comment letter that changed
     everything (demanded specificity)
  6. 2020: COVID disclosure challenges
  7. 2023-2025: AI arrives in financial narrative

  The memoir should be reflective, insightful, and
  capture the human experience of this profession.

assertions:
  - type: llm_judge
    criteria: "The memoir captures the authentic voice and arc of a career in financial narrative — the writing has a genuine, reflective first-person voice — not corporate-speak but the honest observations of someone who has spent 30 years translating numbers into words; the career arc is believable: starting as a junior analyst who didn't understand why writing mattered ('I just wanted to be a CPA, not a writer'), gradually discovering that the narrative IS the analysis, and eventually becoming a champion for narrative quality; each key moment is vivid and specific: the 1995 variance commentary scene should evoke the physical experience (the pre-printed form, the handwriting, the controller crossing out their first attempt with a red pen and saying something memorable); the going-concern narrative in 2001 should capture the emotional weight of writing words that could determine a company's fate; the SOX era should convey the frustration of watching narrative expand for compliance rather than insight; the 2008 crisis should describe the impossible challenge of writing about uncertainty when the narrator themselves didn't know what was happening; the memoir weaves personal growth with professional evolution — the narrator's skill develops alongside the profession itself."
    weight: 0.35
    description: "AuthenticVoice"
  - type: llm_judge
    criteria: "The memoir provides genuine insight into the craft of financial narrative — interspersed with the career story are observations about what makes financial narrative effective: the difference between restating numbers and explaining them; the moment when the narrator learned that 'the best financial narrative is one where the reader forgets they're reading a financial document and starts thinking about the business'; insights about working with different stakeholders (the CEO who wanted only good news, the lawyer who wanted no news, the auditor who wanted every fact, the investor who wanted the truth); the SEC investigation experience provides a powerful lesson about the consequences of narrative — seeing how words written years ago were scrutinized in deposition, understanding that every sentence in a filing is a potential exhibit in litigation; the narrator's philosophy of financial narrative should emerge organically through the stories rather than being stated didactically; the memoir captures the loneliness of the financial narrative writer — the person who sits between the numbers and the readers, translating one language into another, often underappreciated by both sides."
    weight: 0.35
    description: "CraftInsight"
  - type: llm_judge
    criteria: "The memoir's treatment of AI and the future is nuanced and emotionally resonant — the final section (2023-2025) addresses the narrator's relationship with AI in financial narrative with emotional depth: the initial reaction (fear? excitement? skepticism?), the first time they saw AI generate a variance commentary that was 'technically correct but soulless,' the gradual realization that AI will handle the mechanical aspects of their job while humans focus on the interpretive and strategic; the narrator reflects on what is lost and what is gained — AI will never understand the political dynamics behind a board presentation, the unwritten rules about what you can and cannot say in an earnings release, or the subtle art of delivering bad news in a way that maintains investor confidence; the retirement scene provides closure: perhaps the narrator reads their very first variance commentary from 1995 alongside an AI-generated version and reflects on what has changed and what hasn't; the memoir ends with a note of cautious optimism — financial narrative writing is evolving, not dying, and the narrator's career represents the bridge between the era of handwritten commentary and the era of AI-assisted disclosure; the overall piece is approximately 2,500 words and reads as genuine literature, not just a professional history."
    weight: 0.30
    description: "AIAndClosure"
