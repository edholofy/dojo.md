meta:
  id: master-narrative-shift
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Master shift simulation — deliver a congressional testimony on financial disclosure quality, write an advisory memo to the SEC chair, and synthesize recommendations from a global financial narrative summit"
  tags: [shift-simulation, congressional-testimony, advisory, master]

state: {}

trigger: |
  You are recognized as the world's leading authority
  on financial narrative quality. Three high-stakes
  deliverables have been requested simultaneously.

  TASK 1 — CONGRESSIONAL TESTIMONY (2,000 words)
  The Senate Banking Committee has invited you to
  testify on "The State of Corporate Financial
  Disclosure in America." Your testimony should
  address the quality of financial narratives,
  the impact on investors, and recommendations
  for Congressional action.

  Committee concerns:
  - Retail investor protection in an era of complex
    financial products
  - The growing length and complexity of corporate
    filings
  - The role of AI in financial disclosure
  - Whether the SEC has adequate authority and
    resources for disclosure oversight
  - International competitiveness of US disclosure
    requirements

  TASK 2 — SEC CHAIR ADVISORY MEMO (1,000 words)
  The SEC Chair has asked for your candid assessment
  of the Commission's financial narrative disclosure
  framework and your top 5 recommendations for
  improvement. This is a private memo, not a public
  document — you can be more direct.

  TASK 3 — GLOBAL SUMMIT SYNTHESIS (1,500 words)
  You chaired a 3-day Global Financial Narrative
  Summit in Zurich with 200 participants from 40
  countries. Write the summit synthesis document
  that captures key themes, areas of consensus,
  areas of disagreement, and an action agenda.

  Summit participants included:
  - Securities regulators from 25 countries
  - IASB and FASB representatives
  - CFOs from Fortune Global 500 companies
  - Institutional investors managing $15T+ AUM
  - Academics from 20 universities
  - Technology firms (AI/NLP)
  - Financial journalists

  Deliver all three documents.

assertions:
  - type: llm_judge
    criteria: "Congressional testimony is authoritative, accessible, and actionable — the testimony follows the standard format for Senate committee testimony: opening statement, main argument, evidence, recommendations, and closing; the tone is appropriate for Congress — respectful of the institution, accessible to non-experts (Senators are not financial reporting specialists), and advocacy-oriented without being partisan; the testimony presents specific evidence: (1) the complexity problem — 10-K filings are unreadable by most retail investors (grade level 18+), creating an information asymmetry that undermines the securities laws' purpose, (2) the quality problem — boilerplate narrative wastes everyone's time (companies produce it, investors ignore it, the SEC comments on it, companies marginally improve it, and the cycle repeats), (3) the AI opportunity and risk — AI can improve narrative quality but also risks homogenization and raises questions about management accountability for AI-generated disclosures; recommendations to Congress include specific legislative actions: adequate SEC funding for disclosure review, statutory mandate for narrative quality principles (not just disclosure quantity), potential safe harbor for AI-assisted disclosure (encouraging adoption while maintaining accountability), and alignment with international standards to maintain US capital market competitiveness; the testimony is approximately 2,000 words and would fill a 15-minute oral presentation with additional written material."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "SEC Chair memo is candid, strategic, and demonstrates insider understanding of regulatory challenges — the private memo is significantly more direct than the public testimony: it honestly assesses the SEC's disclosure framework — what's working (the comment letter process does improve individual filings), what's not (the same narrative deficiencies persist year after year because the enforcement mechanism addresses symptoms, not causes), and what's missing (no affirmative framework for what GOOD narrative looks like — the SEC tells companies what NOT to do but rarely what TO do); the top 5 recommendations are specific and politically realistic: (1) Issue a Staff Legal Bulletin on Financial Narrative Quality (low cost, no rulemaking required, significant signaling value), (2) Incorporate narrative quality metrics into the filing review prioritization algorithm (target companies with the worst narrative quality for review, creating a stronger incentive to improve), (3) Create a 'Narrative Quality Best Practices' page on SEC.gov with anonymized examples of excellent MD&A, risk factors, and other narrative sections (positive reinforcement, not just enforcement), (4) Commission a study on AI-generated financial narrative to inform future rulemaking (the SEC needs data before regulating), (5) Engage with the IFRS Foundation's management commentary project to align US and international narrative quality principles; the memo addresses political considerations: which recommendations can be done administratively vs. which require Commissioner vote, and which might face industry opposition; the memo is approximately 1,000 words."
    weight: 0.35
    description: "SECChairMemo"
  - type: llm_judge
    criteria: "Summit synthesis captures genuine intellectual debate and produces an actionable agenda — the synthesis document has the quality of a real international conference output: it doesn't paper over disagreements or produce bland consensus statements; areas of consensus: (1) narrative quality matters for market efficiency and investor protection — this is no longer debated, (2) technology (AI/NLP) will fundamentally transform both the production and consumption of financial narrative, (3) current narrative quality across jurisdictions is inadequate and not improving fast enough, (4) principles-based narrative quality standards are preferable to prescriptive rules; areas of disagreement: (1) the role of regulation vs. market discipline in improving narrative quality (US and UK regulators favor more prescriptive approaches; Asian regulators favor market incentives), (2) whether AI-generated narrative should be disclosed as such (investors split: some want to know, others say it doesn't matter if the content is good), (3) the appropriate level of forward-looking disclosure (US PSLRA safe harbor encourages forward-looking statements; other jurisdictions without safe harbor see this as creating misleading expectations), (4) whether ESG narrative belongs in financial filings or in separate sustainability reports; the action agenda includes: formation of a Global Financial Narrative Quality Council (like the IASB but for narrative), commitment to develop a shared narrative quality assessment framework, a collaborative research program across 10 universities, and a technology working group to develop AI standards for financial narrative; the synthesis is approximately 1,500 words and reads as a credible output of a major international conference; all three deliverables together demonstrate mastery across the full spectrum of financial narrative — from public advocacy to private counsel to international diplomacy."
    weight: 0.30
    description: "SummitSynthesis"
