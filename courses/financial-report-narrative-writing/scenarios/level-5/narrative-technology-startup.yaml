meta:
  id: narrative-technology-startup
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Write a business plan for a financial narrative technology startup — design a product that transforms how companies produce and investors consume financial narratives"
  tags: [startup, business-plan, technology, master]

state: {}

trigger: |
  Write a Series A pitch deck narrative (business
  plan format) for a startup called "NarrativeIQ"
  that is building the next generation of financial
  narrative technology.

  PRODUCT VISION:
  NarrativeIQ transforms financial narrative from a
  static compliance exercise into a dynamic,
  interactive, AI-powered communication platform.

  FOUNDING TEAM:
  - CEO: Former VP of Financial Reporting at a
    Fortune 100 company (15 years)
  - CTO: Former NLP research lead at Google
    (10 years, PhD in computational linguistics)
  - CPO: Former head of product at Workiva (8 years)
  - Chief Scientist: Professor of accounting and
    information systems at Wharton

  PRODUCT (built, in beta with 12 companies):
  1. NarrativeIQ Studio — AI-powered narrative
     drafting tool that connects directly to ERP/GL
     data, generates first-draft narratives, and
     provides real-time compliance checking
  2. NarrativeIQ Analytics — NLP engine that scores
     narrative quality, flags SEC comment letter risk,
     and benchmarks against peers
  3. NarrativeIQ Viewer — interactive disclosure
     platform where investors can explore company
     narratives with linked data, comparisons, and
     drill-down capabilities

  MARKET:
  - TAM: $8B (corporate financial reporting software)
  - SAM: $2B (narrative-specific tools and services)
  - SOM: $200M (initial target: US public companies)

  TRACTION:
  - 12 beta customers (3 Fortune 500, 5 mid-cap,
    4 small-cap)
  - $800K ARR (signed contracts, not yet live)
  - Average deal size: $67K ARR
  - 94% beta user satisfaction score
  - 2 LOIs from Big 4 firms for integration

  RAISE: $15M Series A at $60M pre-money valuation

  Write the full business plan narrative
  (approximately 3,000 words).

assertions:
  - type: llm_judge
    criteria: "The business plan articulates a compelling problem-solution narrative — the plan opens with the problem statement that resonates with anyone who has worked in financial reporting: companies spend billions of dollars producing financial narratives that are largely unread, poorly written, and serve compliance rather than communication; the narrative connects specific pain points to NarrativeIQ's solution: (1) Problem: 75 FTE-equivalents at a Fortune 500 company spend 25% of their time on narrative production → Solution: NarrativeIQ Studio reduces first-draft time by 80% through AI-powered generation from connected data; (2) Problem: SEC issues 2,000+ comment letters annually, many addressing narrative deficiencies → Solution: NarrativeIQ Analytics predicts and flags comment letter risk before filing; (3) Problem: investors use NLP to process filings because the narratives are too long and generic to read → Solution: NarrativeIQ Viewer transforms static narrative into interactive, data-linked disclosure; the competitive positioning differentiates from: Workiva (filing platform, not narrative quality), Microsoft Copilot (generic AI, not financial-domain-specific), Big 4 advisory (services, not scalable technology), and point solutions (analytics only, not end-to-end); the moat is: proprietary NLP models trained on 50,000+ SEC filings and 10,000+ comment letters, network effects as more companies use the platform (better benchmarking), and switching costs once integrated with ERP systems."
    weight: 0.35
    description: "ProblemSolutionNarrative"
  - type: llm_judge
    criteria: "Financial projections and go-to-market are credible and detailed — the financial model: Year 1 (post-Series A): grow from 12 to 50 customers, $3.5M ARR, focus on mid-cap companies ($1-10B revenue) as ideal initial customer (large enough to have narrative pain, small enough to adopt new technology quickly); Year 2: 150 customers, $12M ARR, expand into Fortune 500 (longer sales cycle but much larger deal sizes: $200-500K ARR), launch Big 4 integration partnerships; Year 3: 350 customers, $30M ARR, international expansion (IFRS-compatible product), launch the Viewer platform for investors (dual-sided network); Year 4: $60M ARR, path to profitability; the unit economics: current average deal $67K ARR, target blended average of $100K as Fortune 500 mix increases; gross margin: 75-80% (cloud-hosted SaaS, AI compute costs managed through model efficiency); CAC payback: 18 months (enterprise sales cycle is 4-6 months, implementation 3 months); LTV/CAC: 5x+ (annual financial reporting is a recurring need with high switching costs); go-to-market: enterprise sales team (5 reps by end of Year 1, each targeting $700K new ARR), conference presence (AICPA, FEI, NIRI), SEC comment letter targeting (identify companies that received narrative-related comments and offer a free assessment), Big 4 channel partnership (integration with audit and advisory workflows); use of $15M Series A: 50% product development (expand engineering team from 8 to 25, build Viewer platform), 30% go-to-market (sales team, marketing, conferences), 20% operations and G&A."
    weight: 0.35
    description: "FinancialsAndGTM"
  - type: llm_judge
    criteria: "The plan addresses risks, regulatory considerations, and the investor narrative compellingly — risks acknowledged: (1) Regulatory risk — the SEC may issue guidance on AI-generated disclosures that could create compliance complexity; mitigation: the advisory board includes a former SEC commissioner, and the product is designed as human-augmented, not human-replaced; (2) Adoption risk — CFOs may be reluctant to use AI for SEC filings due to liability concerns (Section 302/906 certifications); mitigation: the product positions AI as draft-generation and quality-checking, not final authoring; (3) Competitive risk — Workiva, Microsoft, or a Big 4 firm could build competing functionality; mitigation: domain-specific NLP models and SEC filing training data create a significant technical moat that generic AI tools cannot easily replicate; (4) Market timing risk — the financial narrative quality market may not be large enough to support a venture-scale outcome; mitigation: the $800K ARR and 12 beta customers demonstrate real willingness to pay; the investor narrative is compelling: this is the first purpose-built AI platform for financial narrative — a category creator in a market that spends billions on financial reporting but has never had technology specifically designed for the narrative layer; the founding team uniquely combines deep domain expertise (CFO track + SEC experience), cutting-edge NLP capability, and proven enterprise software product leadership; the plan is approximately 3,000 words and reads like a credible Series A pitch."
    weight: 0.30
    description: "RisksAndInvestorNarrative"
