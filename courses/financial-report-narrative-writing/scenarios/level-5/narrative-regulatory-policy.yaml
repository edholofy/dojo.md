meta:
  id: narrative-regulatory-policy
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Draft regulatory policy recommendations for improving financial narrative quality — write a policy paper proposing reforms to SEC disclosure rules based on evidence and best practices"
  tags: [regulatory-policy, sec-reform, policy-paper, master]

state: {}

trigger: |
  The SEC's Investor Advisory Committee has asked
  you to prepare a policy paper with recommendations
  for improving the quality of financial narrative
  disclosures. The paper will inform potential
  rulemaking.

  CONTEXT:
  - The SEC receives over 50,000 annual filings
    containing narrative disclosures
  - Research consistently shows that narrative quality
    is a significant predictor of investor outcomes
  - Despite decades of plain English initiatives,
    average 10-K readability has worsened
  - The SEC's Division of Corporation Finance
    reviews approximately 4,000 filings annually
    and issues 2,000+ comment letters
  - Common narrative deficiencies identified in
    comment letters: boilerplate language, missing
    business drivers, vague forward-looking
    statements, non-GAAP prominence issues, outdated
    risk factors

  THE COMMITTEE WANTS:
  - Evidence-based recommendations (not opinions)
  - Practical proposals that can be implemented
    within existing statutory authority
  - Consideration of costs and benefits to both
    registrants and investors
  - International perspective (what can the US
    learn from other jurisdictions?)
  - Technology-aware proposals (how can technology
    help?)

  Write a 3,500-word policy paper with:
  1. Problem statement with evidence
  2. Analysis of current regulatory framework gaps
  3. 5-7 specific policy recommendations
  4. Cost-benefit analysis for each recommendation
  5. Implementation roadmap
  6. Dissenting perspectives

assertions:
  - type: llm_judge
    criteria: "The problem statement is evidence-based and compelling — the paper opens with specific evidence that financial narrative quality is a systemic problem: (1) Readability data: the average 10-K has a Flesch-Kincaid grade level of 18-20 (post-graduate level), up from 14-16 in 2000, despite the SEC's 1998 Plain English Handbook; (2) Length data: average 10-K length has grown from approximately 40,000 words in 2000 to over 80,000 words in 2024, with no evidence that longer filings contain proportionally more useful information; (3) Boilerplate evidence: NLP analysis shows that 30-40% of sentences in the average MD&A could apply to any company in the same industry (Li 2008, Brown & Tucker 2011); (4) Comment letter patterns: the SEC's most common narrative-related comments relate to specificity, business driver attribution, and non-GAAP presentation — the same issues year after year, suggesting the current regulatory approach is not driving improvement; (5) Investor impact: academic research links narrative quality to bid-ask spreads (Lehavy et al. 2011), analyst forecast accuracy (Bozanic et al. 2018), and cost of capital (Lang & Stice-Lawrence 2015); (6) International comparison: jurisdictions like the UK (Strategic Report) and Australia (Operating and Financial Review) have implemented narrative quality standards with measurable improvements in readability and specificity."
    weight: 0.35
    description: "ProblemStatement"
  - type: llm_judge
    criteria: "Policy recommendations are specific, implementable, and evidence-based — the paper proposes 5-7 concrete recommendations within the SEC's existing statutory authority: (1) Narrative Quality Principles: adopt a set of principles (similar to the proposed IFRS Management Commentary standard) that define what constitutes quality narrative — specificity, causal attribution, forward-looking orientation, balance, and accessibility; these principles would supplement, not replace, existing Regulation S-K requirements; (2) Readability Mandate: require that 10-K narrative sections achieve a maximum Flesch-Kincaid grade level of 14 (high school level), with a 3-year phase-in period; this is measurable, enforceable, and directly supported by research linking readability to investor outcomes; (3) Boilerplate Detection: require companies to certify that their MD&A does not contain 'substantially unchanged' language from the prior year's filing for sections where facts and circumstances have changed; this addresses the 'cut and paste' problem directly; (4) Enhanced Comment Letter Focus: direct the Division of Corporation Finance to prioritize narrative quality in filing reviews, with specific guidance on what constitutes deficient narrative (not just missing information, but poor quality information); (5) Non-GAAP Narrative Enhancement: require that non-GAAP reconciliations include narrative explanation of each adjusting item's nature, recurrence, and management's rationale for exclusion; (6) Risk Factor Sunset: require that risk factors be reviewed annually and include the date of last substantive revision; risk factors unchanged for 3+ years create a rebuttable presumption of boilerplate; (7) Technology-Enabled Disclosure: authorize and encourage the use of AI-powered narrative quality tools in the filing process, with appropriate disclosure of AI involvement; for each recommendation, the paper provides: the evidence supporting it, the estimated compliance cost, the expected benefit to investors, and the implementation timeline."
    weight: 0.35
    description: "PolicyRecommendations"
  - type: llm_judge
    criteria: "The paper addresses costs, dissenting perspectives, and implementation with intellectual honesty — cost-benefit analysis: for each recommendation, the paper honestly assesses both the compliance burden and the expected benefit; for example, the readability mandate: estimated cost of $10-20K per filing for plain English editing services (approximately $60-120M across all registrants), but expected benefit of lower cost of capital and improved market efficiency that dwarfs the compliance cost; the paper acknowledges where costs are uncertain and where benefits are difficult to quantify; dissenting perspectives are treated fairly: (1) The 'liability concern' — companies argue that more specific narrative creates more litigation targets; the paper responds that vague narrative actually creates more litigation risk because it's harder to defend as 'true and complete'; (2) The 'one size doesn't fit all' concern — small companies argue that narrative quality standards impose disproportionate costs; the paper acknowledges this and recommends a scaled approach (smaller registrants have longer phase-in periods and simplified requirements); (3) The 'government shouldn't dictate writing style' concern — the paper clarifies that the recommendations address substance (specificity, attribution) not style, and that readability standards are objective metrics, not subjective quality judgments; (4) The 'this won't work' concern — skeptics argue that companies will find ways to technically comply while maintaining poor quality; the paper proposes enforcement mechanisms (enhanced comment letter focus, narrative quality scoring) to address this; the implementation roadmap phases recommendations over 3-5 years, starting with the least costly and most impactful; the paper is approximately 3,500 words and is written in the formal but accessible style appropriate for an SEC advisory committee paper."
    weight: 0.30
    description: "CostsBenefitsAndDissent"
