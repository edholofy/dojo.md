meta:
  id: narrative-graduate-program
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Design a graduate-level course on financial narrative — create a 14-week MBA elective curriculum that treats financial narrative writing as a strategic discipline"
  tags: [graduate-program, curriculum, academic, master]

state: {}

trigger: |
  A top-20 MBA program has asked you to design
  a new elective course: "Strategic Financial
  Narrative: The Art and Science of Corporate
  Financial Communication."

  PROGRAM CONTEXT:
  - 14-week semester, 3 hours per week (42 contact
    hours)
  - Target enrollment: 30-40 MBA students
  - Prerequisites: Financial Accounting, Corporate
    Finance
  - Mix of students targeting: CFO track, investor
    relations, equity research, consulting, and
    entrepreneurship
  - Program values: rigorous academic content with
    practical application

  LEARNING OBJECTIVES:
  The course should prepare students to:
  1. Analyze and evaluate financial narratives
     critically
  2. Write effective financial narratives for
     multiple audiences
  3. Understand the regulatory framework governing
     financial narrative
  4. Apply behavioral science insights to narrative
     design
  5. Use technology to enhance narrative quality
  6. Navigate the ethical tensions in financial
     narrative

  AVAILABLE RESOURCES:
  - Access to EDGAR filings
  - NLP tools for narrative analysis
  - Guest speaker budget (6 sessions)
  - Bloomberg terminal access
  - 2 teaching assistants

  Produce:
  1. Full syllabus (14-week schedule)
  2. Assessment design (grades and rubrics)
  3. Three detailed lesson plans (Weeks 1, 7, 14)
  4. Guest speaker strategy

assertions:
  - type: llm_judge
    criteria: "The 14-week syllabus covers the field comprehensively with a logical progression — the course structure moves from foundations through analysis to practice and mastery: Weeks 1-3 (Foundations): Week 1 — What Is Financial Narrative? (history, purpose, stakeholders, the information ecosystem); Week 2 — The Regulatory Framework (SEC disclosure rules, Reg S-K, Reg G, PSLRA safe harbor, international equivalents); Week 3 — The Economics of Disclosure (why companies disclose, voluntary vs. mandatory, the cost of capital connection, Verrecchia's disclosure theory); Weeks 4-6 (Analysis): Week 4 — Deconstructing the 10-K (anatomy of MD&A, risk factors, what makes good vs. bad narrative, live EDGAR analysis); Week 5 — Earnings Releases and Investor Letters (non-GAAP framing, tone analysis, Warren Buffett's letters as case study); Week 6 — NLP Analysis of Financial Narrative (hands-on: using Python/NLP tools to analyze 100 MD&A sections for readability, sentiment, specificity); Weeks 7-9 (Behavioral Science): Week 7 — Framing Effects in Financial Narrative (prospect theory, gain/loss framing, anchoring, experimental evidence); Week 8 — Impression Management and Obfuscation (readability manipulation, attribution theory, self-serving bias in narrative); Week 9 — Investor Processing of Financial Narrative (limited attention, format effects, information overload); Weeks 10-12 (Practice): Week 10 — Writing Workshop 1: Variance Commentary and Management Reports; Week 11 — Writing Workshop 2: MD&A and Earnings Releases; Week 12 — Crisis Communication and Special Situations (restatements, going concern, litigation); Weeks 13-14 (Integration): Week 13 — AI and the Future of Financial Narrative (NLG, AI-assisted writing, regulatory implications); Week 14 — Ethics and Professional Responsibility (where does legitimate framing become manipulation?, student presentations)."
    weight: 0.35
    description: "SyllabusDesign"
  - type: llm_judge
    criteria: "Assessment design tests both analytical and writing skills — the grading structure: (1) Narrative Deconstruction Paper (25%): students select a company and write a 3,000-word critical analysis of its financial narrative quality across all public documents (10-K, earnings releases, investor presentations), scoring it against a rubric provided in Week 4 and providing specific improvement recommendations; grading rubric: depth of analysis (not just 'the readability is low' but 'the readability drops by 2 grade levels in sections discussing negative results, suggesting strategic obfuscation'), evidence quality (specific citations from filings), and constructiveness of recommendations; (2) Financial Narrative Portfolio (35%): over the semester, students produce 5 narrative deliverables for a fictional company (whose financial data is provided): a variance commentary, an MD&A section, an earnings release, a board memo, and a crisis communication (8-K); each is graded against the relevant professional standard and must show progressive improvement; (3) NLP Analysis Project (15%): team project (groups of 4) using NLP tools to analyze a corpus of filings and present findings (e.g., 'How does narrative tone predict earnings surprises in the pharmaceutical sector?'); (4) Class Participation and Guest Speaker Engagement (15%): includes prepared questions for guest speakers and in-class analysis exercises; (5) Final Exam (10%): take-home case study requiring students to analyze a company's disclosure and draft a recommended narrative strategy."
    weight: 0.35
    description: "AssessmentDesign"
  - type: llm_judge
    criteria: "Detailed lesson plans and guest speaker strategy demonstrate pedagogical depth — Week 1 lesson plan: opens with a provocative exercise — students read two narratives describing the same quarterly results (one framed positively, one negatively) and vote on whether they would invest; the reveal that both describe the same data introduces the power of narrative framing; lecture covers the history of financial narrative (from the 1933/1934 Acts through Regulation S-K evolution), introduces the course framework, and assigns the first reading (a seminal paper on disclosure theory); Week 7 lesson plan: behavioral science deep-dive — starts with a live experiment (students receive identical financial data with different narrative frames and rate the company), analyzes results as a class, introduces prospect theory and framing effects with specific application to financial narrative, discusses the ethical implications; Week 14 lesson plan: synthesis and reflection — student presentations of their Narrative Deconstruction Papers (best 5 selected by TAs), panel discussion on 'Is financial narrative inherently manipulative?', course wrap-up linking back to Week 1's framing exercise; guest speaker strategy targets 6 sessions spread across the semester: (1) A public company CFO on the narrative drafting process (Week 3), (2) An SEC Division of Corporation Finance staff member on the comment letter process (Week 5), (3) An equity research analyst on how they process financial narratives (Week 9), (4) A securities litigator on narrative liability (Week 12), (5) An NLG/AI company founder on technology in financial narrative (Week 13), (6) A former SEC commissioner or chief accountant on the future of disclosure (Week 14)."
    weight: 0.30
    description: "LessonPlansAndSpeakers"
