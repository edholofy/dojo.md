  id: narrative-research-handbook
  level: 5
  course: financial-report-narrative-writing
  type: output
  description: "Write the introduction chapter for an academic handbook on financial narrative research — establish the field, synthesize key findings, and define the research agenda"
  tags: [research-handbook, academic, literature-review, master]

state: {}

trigger: |
  Write the introductory chapter (approximately
  3,000 words) for "The Oxford Handbook of Financial
  Narrative Research." This chapter must establish
  the field, synthesize decades of research, and
  set the agenda for future scholarship.

  CHAPTER TITLE:
  "Financial Narrative: The Bridge Between Numbers
  and Decisions"

  YOUR ROLE: You are the handbook's editor, a
  distinguished professor of accounting and
  information systems with 25 years of research
  in financial disclosure.

  THE HANDBOOK: 30 chapters covering:
  Part I: Foundations (disclosure theory, narrative
    economics, regulatory frameworks)
  Part II: Production (how companies create
    financial narratives — incentives, processes,
    behavioral biases)
  Part III: Content Analysis (NLP methods,
    readability, tone, specificity, forward-looking
    content)
  Part IV: Consequences (market reactions, analyst
    behavior, investor decision-making, cost of
    capital)
  Part V: Special Topics (non-GAAP narrative, ESG
    disclosure, crisis communication, international
    comparison)
  Part VI: Future Directions (AI, real-time
    disclosure, regulatory evolution)

  The introduction must:
  1. Define the field and its boundaries
  2. Trace the intellectual history
  3. Synthesize the major research streams
  4. Identify the most important findings
  5. Highlight unresolved questions
  6. Preview the handbook's structure

assertions:
  - type: llm_judge
    criteria: "The chapter establishes financial narrative research as a coherent academic field — the introduction defines the field's boundaries: financial narrative research encompasses the study of non-numerical textual content in corporate financial communications, including its production, content characteristics, economic consequences, and regulatory environment; the field draws on multiple disciplines: accounting (disclosure theory, information asymmetry), finance (market efficiency, cost of capital), linguistics (discourse analysis, readability), psychology (behavioral finance, cognitive processing), computer science (NLP, machine learning), and law (securities regulation, liability); the intellectual history traces the field from early work on disclosure theory (Verrecchia 1983, Dye 1985) through the seminal textual analysis papers (Li 2008, Loughran & McDonald 2011, Brown & Tucker 2011) to the current NLP revolution; the chapter identifies the paradigm shift that occurred when computational tools made it possible to analyze thousands of filings simultaneously, transforming financial narrative from a qualitative field studied through case studies into a quantitative field with large-sample empirical evidence; the writing is appropriate for a senior academic audience — rigorous, precise, well-cited, but not impenetrable."
    weight: 0.35
    description: "FieldEstablishment"
  - type: llm_judge
    criteria: "The synthesis of research streams is comprehensive and insightful — the chapter organizes the literature into clear research streams and identifies the key findings in each: (1) Readability research: complex language in 10-Ks is associated with higher processing costs for investors (Li 2008), and there is evidence that managers strategically increase complexity when reporting bad news (Lo et al. 2017, Bloomfield 2008); (2) Tone and sentiment: financial narrative tone (measured using the Loughran-McDonald dictionary) predicts future earnings and stock returns (Feldman et al. 2010, Loughran & McDonald 2011); abnormal positive tone is associated with subsequent negative performance, suggesting impression management; (3) Specificity and informativeness: specific, quantitative disclosures are associated with lower information asymmetry (Hope et al. 2016); boilerplate risk factors are less useful to investors than company-specific ones (Campbell et al. 2014); (4) Forward-looking statements: the credibility and specificity of forward-looking disclosures affect their market impact (Hutton et al. 2003, Bozanic et al. 2018); (5) Non-GAAP narrative: the framing and prominence of non-GAAP measures affects investor perception of earnings quality (Black et al. 2018, Christensen et al. 2021); (6) ESG narrative: the emerging literature on sustainability reporting quality and its association with real outcomes; the synthesis identifies what we know and, importantly, what we don't — the chapter highlights unresolved debates and contradictory findings."
    weight: 0.35
    description: "ResearchSynthesis"
  - type: llm_judge
    criteria: "The research agenda is forward-looking and identifies genuinely important open questions — the chapter concludes with 5-7 research priorities that would advance the field: (1) Causality: most financial narrative research is correlational — we know that narrative quality is associated with market outcomes, but establishing causation requires better identification strategies (natural experiments, regulatory changes as exogenous shocks); (2) AI and NLP methodology: the field relies heavily on dictionary-based methods (Loughran-McDonald) that may be obsolete as transformer-based models can capture contextual meaning; the research agenda should develop and validate new NLP methods specifically designed for financial text; (3) Production side: we know a lot about what financial narratives contain but very little about how they are produced — who writes them, what incentives shape the writing, how do review processes affect content? Ethnographic and interview-based research is needed; (4) International comparison: most research focuses on US 10-K filings; the field needs more cross-country research comparing narrative practices under different regulatory regimes; (5) Real-time and interactive disclosure: as disclosure moves from periodic filings to continuous communication, how do narrative quality concepts apply to earnings call transcripts, social media, and interactive data platforms? (6) AI-generated narrative: as companies begin using AI to produce financial narratives, what are the implications for informativeness, liability, and investor trust? This is an entirely new research domain; the chapter previews the handbook's structure, connecting each part to the research streams and open questions identified in the introduction; the overall chapter is approximately 3,000 words."
    weight: 0.30
    description: "ResearchAgenda"
