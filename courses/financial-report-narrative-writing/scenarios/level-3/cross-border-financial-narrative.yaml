meta:
  id: cross-border-financial-narrative
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write cross-border financial narratives — handle multi-currency results, constant currency disclosure, geographic segment reporting, and FX impact analysis for multinational companies"
  tags: [cross-border, constant-currency, fx-impact, advanced]

state: {}

trigger: |
  Write the international results and foreign
  currency discussion for the MD&A of a US-based
  multinational consumer products company.

  GEOGRAPHIC RESULTS — FY2025 (in millions)

  REPORTED RESULTS (USD):
                      FY2025    FY2024   Reported
                                         Growth
  North America       $3,200    $3,050    +4.9%
  Europe              $1,650    $1,720    -4.1%
  Asia Pacific        $1,100    $1,050    +4.8%
  Latin America         $550      $480   +14.6%
  Total               $6,500    $6,300    +3.2%

  CONSTANT CURRENCY RESULTS:
                      FY2025    FY2024   Organic
                      (CC)               Growth
  North America       $3,200    $3,050    +4.9%
  Europe              $1,650    $1,580    +4.4%
  Asia Pacific        $1,100      $985   +11.7%
  Latin America         $550      $420   +31.0%
  Total               $6,500    $6,035    +7.7%

  FX IMPACT ANALYSIS:
  Strengthening USD reduced reported results:
  - Europe: ($140M) — EUR weakened 8% vs. USD
  - Asia Pacific: ($65M) — JPY weakened 15%, CNY
    weakened 5%, offset by AUD strengthening 3%
  - Latin America: ($60M) — BRL weakened 12%,
    ARS hyperinflation (85% devaluation)
  - Total FX headwind: ($265M), or -4.2% impact
    on reported growth

  ADDITIONAL CONTEXT:
  - Argentina applied hyperinflationary accounting
    (IAS 29) — results are remeasured
  - Europe organic growth driven by pricing (+6%)
    partially offset by volume decline (-1.6%)
  - Asia organic growth driven by volume (+8%)
    and favorable mix (+3.7%)
  - Latin America growth almost entirely pricing
    (to offset inflation)
  - Natural hedging: ~40% of COGS in local currency
  - Financial hedging: 12-month rolling hedge
    program covering 70% of forecast exposures

  Write a 600-800 word currency and geographic
  analysis for MD&A.

assertions:
  - type: llm_judge
    criteria: "Constant currency analysis clearly separates organic performance from FX impact — the narrative presents the critical insight: reported revenue grew 3.2% but organic (constant currency) revenue grew 7.7% — the 4.5 percentage point gap represents the $265M FX headwind from a strengthening US dollar; the narrative explains constant currency methodology: prior year results are restated at current year exchange rates to isolate operational performance from currency movements; for each geography: Europe appears to have declined 4.1% on a reported basis, but organically grew 4.4% — the entire decline and more is attributable to EUR weakness; Asia Pacific appears to have grown 4.8% but organically grew 11.7% — significant organic momentum masked by JPY and CNY weakness; Latin America's 14.6% reported growth actually represents 31.0% organic growth, with the difference being massive currency devaluation (particularly ARS); the narrative makes clear that FX is not a one-time item — it represents a structural headwind when the USD is strengthening and will reverse when the USD weakens."
    weight: 0.35
    description: "ConstantCurrencyAnalysis"
  - type: llm_judge
    criteria: "Geographic segment narratives explain pricing vs. volume dynamics and address Argentina hyperinflation — Europe analysis: organic growth of 4.4% driven primarily by pricing actions (+6.0%) partially offset by volume declines (-1.6%), indicating that European consumers are reducing purchases in response to price increases — this pricing/volume dynamic is an important signal about demand elasticity; Asia Pacific analysis: strong organic growth of 11.7% driven by healthy volume gains (+8.0%) and favorable mix (+3.7%), suggesting genuine market share expansion and premiumization success; Latin America analysis: the 31.0% organic growth is almost entirely pricing to offset local inflation — this is not 'real' growth in the traditional sense; the Argentina hyperinflationary accounting is specifically addressed: under IAS 29, Argentine results are remeasured using a price-level index and translated at the period-end rate, which creates volatility in reported results; the narrative discloses the approximate Argentina revenue and its significance to the Latin America total; the hedging discussion explains: the natural hedge (40% local currency COGS reduces exposure), the financial hedge program (12-month rolling, 70% coverage), and the approximate benefit from hedging ($50-80M protection against further deterioration)."
    weight: 0.35
    description: "GeographicAndHyperinflation"
  - type: llm_judge
    criteria: "Non-GAAP constant currency presentation follows SEC guidance — the constant currency metric is presented as a non-GAAP measure per Regulation G: reconciled to the most directly comparable GAAP measure (reported revenue), presented with equal or greater prominence to reported results, with explanation of why management believes the constant currency measure is useful to investors (it enables evaluation of operational performance independent of currency fluctuations that are outside management's control); the narrative does not over-rely on constant currency — it presents both reported and organic results and discusses the FX impact honestly (not dismissing it as 'just currency' since FX translation directly affects USD-denominated earnings and cash repatriation); the overall narrative is 600-800 words, technically accurate, well-organized by geography with consistent analytical framework, and would meet SEC expectations for a multinational company's geographic discussion."
    weight: 0.30
    description: "NonGAAPCompliance"
