meta:
  id: audit-committee-narrative
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write audit committee report narratives — draft the audit committee's report for the proxy statement and prepare financial reporting oversight disclosures"
  tags: [audit-committee, proxy-statement, governance-reporting, advanced]

state: {}

trigger: |
  Draft the Audit Committee Report for the proxy
  statement and prepare the committee chair's
  presentation narrative for the annual
  shareholders' meeting.

  COMPANY: GlobalTech Industries (NYSE: GTI)
  Revenue: $4.8B, SOX reporting company

  AUDIT COMMITTEE COMPOSITION:
  - Chair: Margaret Chen (former CFO, CPA, financial
    expert per SEC rules)
  - John Williams (former CEO of technology company)
  - Patricia Martinez (cybersecurity expert, former
    CISO)
  - David Kim (academic, accounting professor)
  - All independent per NYSE listing standards

  FY2025 AUDIT ACTIVITIES:
  - Met 10 times (quarterly + 6 additional meetings)
  - Reviewed quarterly and annual financial
    statements
  - Discussed critical accounting estimates:
    goodwill impairment ($2.1B goodwill, one segment
    passed by only 8% margin)
    revenue recognition (ASC 606, long-term contracts)
    income tax positions (uncertain tax positions
    per ASC 740 totaling $85M)
  - External auditor: PricewaterhouseCoopers
  - Audit fees: $6.8M (audit $5.2M, tax $1.2M,
    other $0.4M)
  - Internal audit reported 4 findings (2 high,
    2 medium), all remediated
  - Cybersecurity: reviewed incident response plan,
    no material incidents
  - Whistleblower: 12 reports received, all
    investigated, none material
  - Auditor independence confirmed

  SPECIFIC ISSUES DISCUSSED:
  - Goodwill: Consumer Electronics segment goodwill
    ($450M) passed impairment test by only 8% margin
    — committee questioned management's revenue
    growth assumptions
  - Tax: IRS audit of FY2022-2023 in progress,
    potential exposure $15-25M beyond accrued
  - Cybersecurity: new SEC disclosure rules
    compliance, board-level cyber expertise
  - Related party: CEO's brother-in-law's company
    provided $2.3M in consulting services (approved
    under related party policy)

  Write:
  1. Proxy statement Audit Committee Report
     (400 words, per SEC requirements)
  2. Committee chair's annual meeting remarks
     (300 words, less formal)

assertions:
  - type: llm_judge
    criteria: "Proxy statement Audit Committee Report meets SEC requirements per Rule 14a-101 — the report includes all required elements: (1) names of committee members and identification of financial expert (Margaret Chen), (2) statement that the committee reviewed the audited financial statements with management, (3) statement that the committee discussed with PricewaterhouseCoopers all matters required under PCAOB Auditing Standard No. 1301 (Communication with Audit Committees), (4) statement that the committee received the written disclosures and letter from PwC required by PCAOB Ethics and Independence Rule 3526 regarding auditor independence, (5) recommendation to the board that the audited financial statements be included in the 10-K for filing with the SEC; the report also addresses: the auditor selection decision (recommending PwC for re-appointment), audit and non-audit fees ($6.8M total, with breakdown), and the committee's pre-approval policy for non-audit services; the tone is appropriately formal for a legal document that will be filed with the SEC."
    weight: 0.35
    description: "ProxyReport"
  - type: llm_judge
    criteria: "Report addresses substantive issues while maintaining appropriate boundaries — the report discusses the critical accounting estimates reviewed (goodwill impairment, revenue recognition, tax positions) without crossing into management's territory — the committee's role is oversight, not preparation; the goodwill impairment discussion notes that the Consumer Electronics segment passed by only 8% margin and that the committee challenged management's assumptions — this level of specificity demonstrates active oversight without making accounting judgments; the tax position disclosure notes the IRS audit and the range of potential exposure ($15-25M beyond accrued) without opining on the likely outcome; the related party transaction ($2.3M to CEO's brother-in-law's company) is acknowledged as reviewed and approved under the company's related party policy — transparency about this sensitive item is important; the cybersecurity oversight is addressed per new SEC rules; the report does NOT include forward-looking statements or safe harbor language (not applicable to audit committee reports)."
    weight: 0.35
    description: "SubstantiveOversight"
  - type: llm_judge
    criteria: "Chair's annual meeting remarks are appropriately accessible and confidence-building — the 300-word remarks translate the formal proxy report into language shareholders can understand: what the committee did (10 meetings, reviewed financial statements, challenged management assumptions, ensured auditor independence), what issues received special attention (the goodwill impairment margin, the IRS audit, cybersecurity readiness), and what the committee's overall assessment is (the financial statements fairly present the company's position); the tone is confident but not dismissive of risks — the chair should convey that the committee took its role seriously, asked hard questions, and is satisfied with the outcome; the remarks mention: the diverse expertise of committee members (CPA/CFO, tech CEO, cybersecurity expert, accounting professor), the additional meetings beyond quarterly requirements (signaling diligence), and the committee's role in the internal audit program (4 findings, all remediated); the remarks are less formal than the proxy report but maintain gravitas appropriate for a public shareholders' meeting."
    weight: 0.30
    description: "AnnualMeetingRemarks"
