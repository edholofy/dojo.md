meta:
  id: full-mda-section
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write a complete MD&A section — draft the full Management's Discussion and Analysis for a 10-K filing covering liquidity, results, critical estimates, and known trends"
  tags: [mda, 10k-filing, comprehensive, advanced]

state: {}

trigger: |
  Write the complete MD&A section for a mid-cap
  biotech company's 10-K filing. The company is
  transitioning from development-stage to
  commercial-stage.

  COMPANY: Neuragen Therapeutics (NRGN)
  NASDAQ, $1.5B market cap
  First commercial product approved 14 months ago

  FY2025 RESULTS (in millions):
  Product Revenue: $142 (first full year)
  License/Milestone Revenue: $35
  Total Revenue: $177
  Prior Year Revenue: $28 (license only)

  COGS: $32 (22.5% of product revenue)
  R&D: $185 (3 pipeline programs)
  SG&A: $95 (commercial launch costs)
  Total OpEx: $312

  Operating Loss: ($135)
  Interest Income: $18 (from cash reserves)
  Net Loss: ($120)
  Loss per share: ($1.50)

  Cash: $480M (down from $620M)
  Cash burn: $140M/year at current rate
  Runway: ~3.4 years at current burn

  KEY ITEMS FOR MD&A:
  - Product (Nexura) treating rare neurological
    condition, ~15,000 US patients
  - $142M revenue on a $200K/year list price
  - 710 patients on therapy (4.7% penetration)
  - Reimbursement coverage: 75% of commercial lives
  - 3 Phase 2 pipeline programs ($60M each)
  - Critical accounting estimates: revenue
    recognition (gross-to-net adjustments for
    specialty pharma), R&D accruals, stock-based
    compensation, income tax valuation allowance
  - Going concern: not applicable (3.4 years cash
    runway) but auditor flagged the continuing
    losses as a discussion point

  Write the full MD&A covering:
  1. Overview
  2. Results of Operations
  3. Liquidity and Capital Resources
  4. Critical Accounting Estimates
  5. Known Trends and Uncertainties

assertions:
  - type: llm_judge
    criteria: "MD&A overview and results of operations are comprehensive for a commercial-stage biotech — the overview frames the company's transition: first full year of commercial product revenue ($142M), reaching 710 patients (4.7% penetration of 15,000 US patients), while continuing to invest in 3 pipeline programs; results of operations: product revenue analysis discusses volume (710 patients), pricing ($200K list price), gross-to-net adjustments (specialty pharma has significant GTN deductions for copay assistance, rebates, and returns — the $142M net revenue implies significant GTN from the $200K × 710 = $142M gross), and the trajectory (sequential quarterly growth expected as penetration increases); R&D of $185M analyzed by program and development stage (3 Phase 2 programs at ~$60M each, plus preclinical/early research); SG&A of $95M reflects the commercial infrastructure build for Nexura launch (sales force, marketing, patient support programs, medical affairs); operating loss of $135M is expected for a biotech in early commercialization and narrowed from prior year; the narrative avoids both excessive optimism about the product launch and excessive concern about ongoing losses."
    weight: 0.35
    description: "OverviewAndResults"
  - type: llm_judge
    criteria: "Liquidity and critical accounting estimates sections meet SEC standards for a cash-burning biotech — liquidity section: addresses the most critical question for biotech investors — 'how long can the company survive?' The cash position of $480M with approximately $140M annual burn rate provides approximately 3.4 years of runway; the section discusses: sources of cash (product revenue growing, potential milestone payments, interest income from invested cash reserves), uses of cash (R&D programs, commercial operations, general corporate), and whether the company will need to raise additional capital (at current trajectories, the company can fund operations through FY2028 without additional financing, but pipeline advancement or commercial expansion could accelerate the need); going concern is not a risk but continuing losses are acknowledged; critical accounting estimates: (1) Revenue recognition/gross-to-net is the most critical — specialty pharma GTN estimates involve significant judgment for copay assistance accruals, Medicaid/Medicare rebates, and product returns; explains the estimation methodology and sensitivity; (2) R&D accruals for clinical trial costs (estimates of completion percentage for ongoing trials); (3) Stock-based compensation (Black-Scholes inputs, especially expected volatility for a recently-commercial biotech); (4) Income tax valuation allowance (full valuation allowance maintained against deferred tax assets due to history of losses — explain when this might reverse)."
    weight: 0.35
    description: "LiquidityAndEstimates"
  - type: llm_judge
    criteria: "Known trends and uncertainties section is specific and investor-useful — the section addresses: (1) Nexura commercial trajectory: patient penetration trend, reimbursement expansion outlook (75% coverage today, what's the path to broader coverage?), competitive threats (are other companies developing treatments for this indication?), pricing sustainability (rare disease pricing under scrutiny); (2) Pipeline risks: the 3 Phase 2 programs each represent meaningful investment with binary outcomes (clinical success or failure); (3) Operating leverage: at what revenue level does the company reach operating breakeven? (approximate calculation: if product revenue reaches ~$350-400M with current cost structure, operating losses would turn to profits); (4) Regulatory: potential label expansion for Nexura, FDA interactions on pipeline programs; (5) Capital needs: whether the company will need to raise equity or debt and potential dilutive impact; the section provides genuine forward-looking analysis per SEC guidance — not just listing risks but explaining how management sees the business evolving; the overall MD&A is comprehensive, well-organized with clear section headers, and would meet SEC staff expectations for a biotech's first commercial-year filing."
    weight: 0.30
    description: "TrendsAndUncertainties"
