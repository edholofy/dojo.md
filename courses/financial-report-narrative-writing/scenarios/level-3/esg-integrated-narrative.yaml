meta:
  id: esg-integrated-narrative
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write ESG-integrated financial narratives — embed environmental, social, and governance disclosures into financial reporting narratives with proper metrics, frameworks, and materiality assessment"
  tags: [esg, sustainability, integrated-reporting, advanced]

state: {}

trigger: |
  Write the integrated financial and ESG narrative
  section for a Fortune 500 energy company's annual
  report. The company must address both financial
  performance and the energy transition.

  COMPANY: Meridian Energy Corp
  Revenue: $28B, 35,000 employees
  Business: integrated oil & gas with growing
  renewables portfolio

  FY2025 FINANCIAL RESULTS:
  Revenue: $28.2B (-8% due to lower oil prices)
  Net Income: $3.8B (-22%)
  ROACE: 12.4% (prior: 16.1%)
  CapEx: $6.2B (50% upstream, 30% renewables, 20% downstream)
  Dividend: $2.8B (maintained, 4.5% yield)
  Share buybacks: $1.5B

  ESG METRICS:
  Environment:
  - Scope 1+2 GHG: 28M tonnes CO2e (down 12% YoY)
  - Scope 3: 180M tonnes (disclosed, not yet targeted)
  - Methane intensity: 0.12% (industry avg: 0.20%)
  - Renewables capacity: 4.2 GW (up 35%)
  - Renewables revenue: $1.8B (6.4% of total, up from 4.1%)
  - Carbon capture projects: 2 operational, 3 in development
  - 2030 target: 50% reduction in Scope 1+2 vs. 2019

  Social:
  - Total Recordable Incident Rate: 0.32 (industry avg: 0.52)
  - Workforce diversity: 34% female (up from 31%)
  - STEM education investment: $45M
  - Just transition fund: $100M for affected communities

  Governance:
  - Board independence: 10 of 12 directors independent
  - Board climate expertise: 4 directors with energy transition experience
  - Executive compensation: 20% linked to emissions targets
  - Political spending transparency: full disclosure

  FRAMEWORK REQUIREMENTS:
  - TCFD-aligned climate narrative
  - SASB oil & gas materiality map
  - SEC climate disclosure considerations
  - Integrated with financial performance narrative

  Write 800-1000 words of integrated narrative.

assertions:
  - type: llm_judge
    criteria: "Narrative genuinely integrates ESG with financial performance — the narrative does NOT treat ESG as a separate section bolted onto the financial discussion; instead, it weaves environmental and social topics into the financial analysis: the 8% revenue decline is discussed alongside the strategic shift toward renewables (the company is deliberately diversifying away from volatile commodity revenue toward more predictable renewables revenue); CapEx allocation (30% to renewables) is framed as both a financial investment decision and a climate strategy; the 12% reduction in Scope 1+2 emissions is connected to operational efficiency (methane reduction programs that also reduce waste and improve production economics); the $100M just transition fund is discussed as both a social commitment and a risk mitigation investment (maintaining social license to operate in transitioning communities); the financial return on renewables is explicitly discussed: $1.8B revenue on the growing renewables portfolio with its margin profile compared to upstream operations."
    weight: 0.35
    description: "IntegratedNarrative"
  - type: llm_judge
    criteria: "Climate narrative follows TCFD framework and addresses the energy transition honestly — the narrative addresses the four TCFD pillars: (1) Governance: board oversight of climate risk (4 directors with energy transition expertise, 20% of executive comp linked to emissions targets); (2) Strategy: how the energy transition affects the business model — the company operates in both the 'old' energy system (oil & gas) and the 'new' (renewables), and the narrative honestly discusses the tension between near-term shareholder returns from hydrocarbons and long-term positioning for the energy transition; (3) Risk Management: climate-related risks including physical risks (extreme weather affecting operations), transition risks (carbon pricing, regulatory changes, demand destruction for fossil fuels), and liability risks (potential litigation); (4) Metrics and Targets: specific targets (50% Scope 1+2 reduction by 2030 vs. 2019 baseline), progress to date (12% reduction in FY2025), and honest discussion of Scope 3 emissions (180M tonnes disclosed but not yet targeted — the narrative explains why Scope 3 is challenging for an energy company); the narrative avoids greenwashing: it doesn't claim the company is 'green' when 94% of revenue still comes from hydrocarbons, but demonstrates genuine strategic commitment to the transition."
    weight: 0.35
    description: "TCFDClimateNarrative"
  - type: llm_judge
    criteria: "Writing quality and framework alignment are publication-ready — the narrative references SASB materiality for oil & gas (GHG emissions, air quality, water management, community relations, workforce health and safety), integrates with SEC climate disclosure expectations, uses proper ESG metrics with consistent methodology and baselines, provides forward-looking targets with credible interim milestones, is 800-1000 words, maintains a tone that is credible for an energy company (not defensive about hydrocarbons, not pretending to be a pure-play renewables company), and would satisfy: sustainability-focused investors, traditional financial investors, regulators, and ESG rating agencies; the narrative acknowledges the challenge of the energy transition while demonstrating strategic commitment and measurable progress."
    weight: 0.30
    description: "QualityAndFramework"
