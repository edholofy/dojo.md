meta:
  id: nlg-financial-reporting
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Design an NLG-powered financial reporting system — architect an AI system that generates automated financial narratives for management reporting, earnings commentary, and variance analysis"
  tags: [nlg, ai-narrative, automation, advanced]

state: {}

trigger: |
  Design a Natural Language Generation (NLG)
  system for automated financial narrative
  production. The company wants to automate
  routine financial commentary while maintaining
  quality and compliance.

  COMPANY CONTEXT:
  - Fortune 500 industrial conglomerate
  - 12 business segments, 45 cost centers
  - Monthly management reporting package: 80+ pages
  - Currently requires 15 FP&A analysts 5 days
    each month to produce narratives
  - Quarterly SEC filings (10-Q, 10-K)
  - Annual report and investor communications

  CURRENT PAIN POINTS:
  - Inconsistent narrative quality across segments
  - Late delivery (narratives are the bottleneck)
  - Analysts spend 70% of time writing, 30%
    analyzing
  - Variance commentary often restates numbers
    without explaining "why"
  - Different analysts have different writing styles
  - Templates become stale and boilerplate

  NLG SYSTEM REQUIREMENTS:
  - Generate monthly variance commentary for all
    45 cost centers automatically
  - Produce segment-level management narratives
  - Draft first-pass earnings release commentary
  - Generate KPI dashboard narratives
  - Support multiple output formats (Word, PDF,
    PowerPoint, email)
  - Maintain consistent tone and terminology
  - Flag items requiring human judgment

  Design:
  1. NLG system architecture
  2. Data pipeline and narrative rules
  3. Quality assurance framework
  4. Human-in-the-loop process
  5. Compliance considerations
  6. Implementation roadmap

assertions:
  - type: llm_judge
    criteria: "NLG system architecture is technically sound and addresses the specific use case — the architecture includes: (1) Data Layer: connections to ERP/GL system (SAP, Oracle) for actuals, budgeting system for targets, prior period data warehouse for trends; data normalization and validation to ensure narrative accuracy; (2) Analytics Engine: automated variance calculation (actual vs. budget, actual vs. prior year, actual vs. forecast), significance testing (only narrate material variances — defined as >5% AND >$50K), trend detection (3+ period patterns), anomaly identification (unusual movements requiring attention); (3) Narrative Generation Engine: template-based core with NLG enhancement — templates provide consistent structure while NLG adds contextual intelligence; rule-based narrative logic for standard situations (e.g., 'if revenue variance is favorable AND volume-driven, use expansion narrative; if cost-driven, use pricing narrative'), ML-based narrative for complex situations requiring pattern recognition; (4) Output Layer: multi-format rendering (Word, PDF, PowerPoint, email), consistent branding and formatting, drill-down hyperlinks from summary to detail; the architecture handles the 45 cost centers as parameterized instances of the same narrative engine, not 45 custom implementations."
    weight: 0.35
    description: "SystemArchitecture"
  - type: llm_judge
    criteria: "Narrative rules and quality assurance prevent the common pitfalls of automated commentary — the narrative rule engine addresses the core problem of 'restating numbers without explaining why': Rule 1 — every variance statement must include a causal driver (not just 'revenue increased $5M' but 'revenue increased $5M driven by [volume/price/mix/new customer/seasonal factor]'); the system achieves this by: mapping GL accounts to business drivers (e.g., revenue account 4100 links to volume and pricing data from the sales system), using prior period commentary (if an analyst explained the same variance last month, use that context), and flagging variances without identifiable drivers for human review; Quality assurance framework: automated checks (all numbers verified against source data, no rounding errors, no contradictions between sections, all required sections present), tone analysis (consistent professional tone, no inappropriate language, readability score within target range), human review workflow (analyst reviews NLG output and accepts/modifies/rejects each section — the system learns from modifications); the '70/30 flip' goal: analysts currently spend 70% writing and 30% analyzing — the NLG system should flip this to 30% reviewing generated narratives and 70% analyzing business implications and providing strategic context that NLG cannot generate."
    weight: 0.35
    description: "NarrativeRulesAndQA"
  - type: llm_judge
    criteria: "Compliance considerations and implementation roadmap are realistic — compliance guardrails: the NLG system should NEVER be used to generate final SEC filing language without human review and approval; specific compliance rules: forward-looking statements must be flagged and routed to legal review, non-GAAP measures must be reconciled and properly presented, material weakness-related disclosures require CFO sign-off, the system must maintain an audit trail showing which narratives were NLG-generated vs. human-authored; the system should NOT generate: risk factor disclosures (too much judgment required), critical accounting estimate discussions (requires management assessment), going concern evaluations, or any narrative involving fraud investigation; implementation roadmap: Phase 1 (Months 1-3): pilot with 5 cost centers, monthly variance commentary only, parallel run with human analysts writing independently; Phase 2 (Months 4-6): expand to all 45 cost centers for variance commentary, begin segment-level narrative pilot; Phase 3 (Months 7-12): add earnings release first-draft capability, KPI dashboard narratives, PowerPoint generation; Phase 4 (Year 2): continuous learning from analyst edits, expand to forecast commentary, begin international segment support; ROI: current cost of narrative production (15 analysts × 5 days × 12 months = 900 person-days/year); target: reduce to 300 person-days (67% reduction), freeing analysts for strategic analysis; system cost: $500K implementation + $200K/year — payback within 12 months."
    weight: 0.30
    description: "ComplianceAndRoadmap"
