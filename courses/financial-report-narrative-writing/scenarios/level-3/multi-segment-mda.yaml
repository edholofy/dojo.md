meta:
  id: multi-segment-mda
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write multi-segment MD&A with divergent performance — craft segment-level narratives when business units are performing very differently, requiring balanced storytelling"
  tags: [segment-reporting, divergent-performance, balanced-narrative, advanced]

state: {}

trigger: |
  Write the segment analysis section of MD&A for
  a diversified conglomerate with 4 segments
  performing very differently.

  SEGMENT RESULTS — FY2025 (in millions)

  HEALTHCARE SOLUTIONS:
  Revenue: $2,400 (+15%)
  Op Income: $480 (20.0% margin, +2.5pp)
  Backlog: $3.1B (+22%)
  Story: star performer, benefiting from aging
  demographics and new product launches

  INDUSTRIAL AUTOMATION:
  Revenue: $1,800 (+3%)
  Op Income: $198 (11.0% margin, -1.0pp)
  Backlog: $1.2B (-5%)
  Story: mature business facing cyclical slowdown,
  margin pressure from wage inflation

  CONSUMER ELECTRONICS:
  Revenue: $900 (-18%)
  Op Income: ($45) (-5.0% margin, was +3.0%)
  Backlog: N/A
  Story: disaster segment, missed product cycle,
  market share lost to Chinese competitors, CEO
  considering strategic alternatives

  FINANCIAL SERVICES:
  Revenue: $600 (+8%)
  Op Income: $150 (25.0% margin, +1.0pp)
  Backlog: N/A
  Story: small but highly profitable, benefiting
  from higher interest rates, acquisition target
  interest from PE firms

  CONSOLIDATED:
  Revenue: $5,700 (+4.2%)
  Op Income: $783 (13.7% margin, +0.2pp)

  ADDITIONAL CONTEXT:
  - Analysts expect the company to divest Consumer
    Electronics
  - Healthcare may become a standalone company
    (sum-of-parts value discussion)
  - CEO has publicly stated "all options on the
    table" for portfolio optimization
  - $250M restructuring charge expected in Consumer
    Electronics

  Write 700-900 words of segment MD&A that
  honestly addresses all four segments.

assertions:
  - type: llm_judge
    criteria: "Segment narratives honestly characterize divergent performance without burying bad news — Healthcare Solutions receives appropriate credit as the growth driver: 15% revenue growth, margin expansion to 20%, 22% backlog growth signaling continued momentum, driven by specific product launches and demographic tailwinds; Industrial Automation is characterized honestly: modest 3% growth with margin compression, facing cyclical headwinds and wage inflation, but still profitable and generating returns; Consumer Electronics is addressed directly — not buried at the end or euphemized: 18% revenue decline, swing to operating loss, lost market share, missed product cycle; the narrative uses the CEO's 'all options on the table' framing to address the strategic alternatives being considered without speculating; Financial Services is presented as a high-margin, steady contributor with its own strategic considerations; the consolidated narrative acknowledges that the 4.2% revenue growth and 13.7% margin mask dramatically different segment trajectories, and that the 'average' doesn't tell the real story."
    weight: 0.35
    description: "HonestSegmentNarrative"
  - type: llm_judge
    criteria: "Narrative addresses the portfolio strategy questions analysts care about — the MD&A should discuss: the sum-of-parts value dynamic (Healthcare at 20% margins deserves a premium multiple, Consumer Electronics at -5% margin drags the consolidated multiple), the strategic alternatives language per SEC guidance (disclose enough about strategic reviews without creating forward-looking commitment — 'the Company is evaluating strategic alternatives for its Consumer Electronics segment' with appropriate cautionary language), the $250M expected restructuring charge (disclosed as a known trend/uncertainty per Item 303), and the potential for separation or divestiture transactions; the narrative avoids: promising specific outcomes for strategic reviews, providing synergy estimates that could become litigation targets if a deal doesn't happen, and being so vague about Consumer Electronics' problems that analysts can't assess the real situation; each segment discussion includes: revenue drivers, margin dynamics, competitive positioning, and forward-looking indicators (backlogs where applicable)."
    weight: 0.35
    description: "PortfolioStrategy"
  - type: llm_judge
    criteria: "Writing quality handles the complexity of divergent segments — the 700-900 word segment analysis is organized clearly (each segment has its own section or paragraph), uses consistent analytical framework across segments (revenue growth → margin → competitive dynamics → outlook), handles the transition between strong and weak segments without whiplash (doesn't go from glowing about Healthcare to apocalyptic about Consumer Electronics), provides specific quantitative support for every claim, and maintains the required SEC balance between completeness and materiality; the overall narrative would satisfy both SEC reviewers (complete segment disclosure per ASC 280 and Regulation S-K Item 303) and investment analysts (actionable insight into each segment's trajectory and the portfolio strategy implications)."
    weight: 0.30
    description: "WritingComplexity"
