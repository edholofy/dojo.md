meta:
  id: crisis-financial-communication
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write financial crisis communications — draft restatement disclosures, going concern narratives, material weakness announcements, and other adverse financial communications"
  tags: [crisis-communication, restatement, going-concern, advanced]

state: {}

trigger: |
  The company must issue three adverse financial
  communications simultaneously. Draft all three.

  SITUATION 1 — FINANCIAL RESTATEMENT
  The company discovered that revenue for Q2 and
  Q3 2025 was overstated by a combined $18M due
  to premature revenue recognition on 12 contracts
  where performance obligations had not been
  completed.

  Impact:
  - Q2 revenue reduced: $8M (from $142M to $134M)
  - Q3 revenue reduced: $10M (from $155M to $145M)
  - Cumulative net income reduction: $12.6M
  - EPS impact: ($0.25) per diluted share
  - Cause: sales team recorded delivery dates
    incorrectly; finance relied on delivery
    confirmations without independent verification
  - The error was detected during year-end audit
  - No fraud suspected — internal control weakness

  SITUATION 2 — MATERIAL WEAKNESS DISCLOSURE
  Related to the restatement, the company must
  disclose a material weakness in internal controls
  over financial reporting (ICFR).

  Material weakness: Insufficient controls over
  revenue recognition, specifically:
  - No independent verification of delivery/
    acceptance dates
  - Manual revenue recognition process without
    automated cutoff controls
  - Inadequate training on ASC 606 for sales team

  SITUATION 3 — GOING CONCERN QUALIFICATION
  The company's auditor has added a going concern
  paragraph to the audit opinion. The company has
  $22M cash, burns $8M/quarter, has a $15M
  revolver (fully drawn), and must refinance a
  $45M term loan due in 10 months.

  Draft:
  1. 8-K restatement disclosure (400 words)
  2. Material weakness remediation plan narrative
     (300 words)
  3. Going concern disclosure for financial
     statements (200 words)

assertions:
  - type: llm_judge
    criteria: "Restatement 8-K disclosure is complete and meets SEC requirements — the disclosure includes all required elements: clear identification of the periods being restated (Q2 and Q3 2025), quantification of the error ($18M revenue reduction, $12.6M net income impact, $0.25 EPS impact), nature of the error (premature revenue recognition on 12 contracts where performance obligations were not complete — delivery dates incorrectly recorded), the root cause (reliance on sales team delivery confirmations without independent verification), statement that previously filed financial statements should no longer be relied upon (the standard language), identification that the error represents a material weakness in ICFR, statement on whether fraud was involved (no fraud suspected), the board/audit committee's involvement in the determination, and reference to amended filings that will be made (10-Q/A for Q2 and Q3); the tone is transparent and factual — not defensive, not minimizing the error, not over-apologizing; the disclosure would meet SEC staff expectations and survive securities litigation scrutiny."
    weight: 0.35
    description: "RestatementDisclosure"
  - type: llm_judge
    criteria: "Material weakness remediation plan is specific and credible — the 300-word narrative identifies the material weakness precisely: insufficient controls over revenue recognition cutoff, specifically the lack of independent verification of delivery and acceptance dates for revenue transactions; the remediation plan includes specific, measurable actions: (1) implementing automated controls within the ERP system to require documented customer acceptance before revenue is recognized (not just delivery confirmation from sales team), (2) establishing an independent revenue recognition review function within the controller's organization that validates all significant revenue transactions before recording, (3) implementing ASC 606 training for the sales team covering performance obligation completion criteria, (4) deploying enhanced month-end cutoff procedures with specific testing of deliveries in the last 5 business days of each period, (5) engaging an external accounting firm to assist with remediation design and testing; the plan provides a timeline: design and implementation by end of Q1 2026, testing effectiveness through Q2 2026, expected to be fully remediated by Q3 2026; the narrative is credible — not promising an overnight fix but showing systematic approach."
    weight: 0.35
    description: "RemediationPlan"
  - type: llm_judge
    criteria: "Going concern disclosure is compliant with ASC 205-40 and ASU 2014-15 — the 200-word disclosure follows the required format: identifies the conditions raising substantial doubt (accumulated losses, negative cash flow, term loan maturity within 12 months, fully drawn revolver), quantifies the liquidity position ($22M cash, $8M quarterly burn, $45M term loan due in 10 months), describes management's plans to mitigate (cost reduction measures, asset sales, refinancing discussions with lenders, potential equity raise), and includes a conclusion about whether the plans are sufficient to alleviate the substantial doubt (if plans are not yet executed, the disclosure should state that substantial doubt exists despite management's plans); the language is appropriately measured — neither falsely reassuring nor unnecessarily alarming; all three disclosures together tell a coherent but challenging story: the company has financial reporting issues (restatement), control issues (material weakness), and viability concerns (going concern) — this is a company in serious difficulty, and the communications must be transparent about the severity while maintaining credibility."
    weight: 0.30
    description: "GoingConcernDisclosure"
