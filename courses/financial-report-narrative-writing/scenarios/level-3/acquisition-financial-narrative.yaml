meta:
  id: acquisition-financial-narrative
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write acquisition financial narratives — draft M&A disclosure narratives covering purchase price allocation, pro forma results, and integration impact for SEC filings"
  tags: [acquisition, manda, purchase-price-allocation, advanced]

state: {}

trigger: |
  The company completed a significant acquisition
  in Q3 2025. Write the acquisition-related
  financial narratives for the 10-K and related
  disclosures.

  ACQUISITION DETAILS:
  Target: DataStream Analytics (data analytics SaaS)
  Closing: September 15, 2025
  Purchase price: $680M (cash $400M + stock $280M)
  
  DataStream pre-acquisition (LTM):
  Revenue: $95M (growing 32% YoY)
  EBITDA: $12M (12.6% margin)
  Customers: 850 enterprise accounts
  ARR: $105M
  NRR: 125%

  PURCHASE PRICE ALLOCATION (preliminary):
  Cash and equivalents: $15M
  Accounts receivable: $18M
  Other current assets: $5M
  Technology (developed): $180M (7-year life)
  Customer relationships: $120M (10-year life)
  Trade name: $25M (indefinite life)
  Other intangibles: $10M
  Goodwill: $385M
  Deferred revenue: ($28M)
  Deferred tax liability: ($42M)
  Other liabilities: ($8M)
  Total: $680M

  STRATEGIC RATIONALE:
  - DataStream's analytics platform complements
    the company's existing data infrastructure
  - Cross-sell opportunity to combined customer base
  - Expected revenue synergies: $40M by year 3
  - Expected cost synergies: $15M by year 2
  - Retention of key DataStream talent (3-year
    retention packages for 25 executives)

  ACQUISITION COSTS: $18M (advisory, legal, regulatory)

  Write:
  1. MD&A acquisition narrative (500 words)
  2. Purchase price allocation disclosure (300 words)
  3. Pro forma revenue discussion (200 words)

assertions:
  - type: llm_judge
    criteria: "MD&A acquisition narrative explains the strategic rationale and financial impact — the narrative covers: strategic rationale (complementary analytics capabilities, cross-sell opportunity, customer base expansion), financial terms ($680M total consideration: $400M cash funded from existing cash and revolver draw, $280M in stock approximately X million shares at closing price), acquisition costs ($18M expensed per ASC 805), the impact on FY2025 results (DataStream contributed approximately $25M revenue and ($X)M operating loss for the period from September 15 through December 31, including amortization of acquired intangibles), the goodwill of $385M representing the premium paid for expected synergies, assembled workforce, and growth potential — the narrative explains why the company paid $680M for a business with $12M EBITDA (approximately 57x EBITDA), which is justified by the 32% growth rate, 125% NRR, and expected synergies; the narrative addresses integration progress: customer retention, talent retention (25 executives with 3-year packages), technology integration roadmap; the discussion of synergies is appropriately caveated as expected rather than guaranteed."
    weight: 0.35
    description: "AcquisitionNarrative"
  - type: llm_judge
    criteria: "Purchase price allocation disclosure follows ASC 805 and is technically sound — the 300-word PPA disclosure: notes that the allocation is preliminary (standard for acquisitions completed within the measurement period), identifies each class of assets acquired and liabilities assumed with fair values, explains the valuation methodology for significant intangibles (technology valued using relief from royalty method, customer relationships valued using multi-period excess earnings method, trade name valued using relief from royalty method), discusses the goodwill: not deductible for tax purposes, assigned to the [relevant] reporting unit, represents the value of expected synergies and assembled workforce that do not qualify for separate recognition; the deferred revenue fair value adjustment is explained: DataStream's $28M deferred revenue was written down to fair value (representing only the cost to fulfill the remaining obligation plus a reasonable profit margin), which will reduce revenue recognized in the post-acquisition period compared to what DataStream would have recognized — this is a common and material adjustment that analysts focus on."
    weight: 0.35
    description: "PPADisclosure"
  - type: llm_judge
    criteria: "Pro forma discussion and overall narrative quality are investor-ready — the pro forma revenue discussion: presents supplemental pro forma results as if the acquisition occurred on January 1, 2025 (or 2024 for comparative), notes that pro forma results include: the revenue that would have been recognized absent the deferred revenue fair value adjustment, the intangible amortization that would have been recorded for the full period, the interest expense on acquisition financing, and exclusion of acquisition costs (one-time); the pro forma is labeled as supplemental, unaudited, and not necessarily indicative of future results; the overall narrative across all three sections is consistent (numbers tie, strategic rationale is coherent), technically sound (proper ASC 805 and Regulation S-X Article 11 compliance), and would satisfy both SEC reviewers and investment analysts."
    weight: 0.30
    description: "ProFormaAndQuality"
