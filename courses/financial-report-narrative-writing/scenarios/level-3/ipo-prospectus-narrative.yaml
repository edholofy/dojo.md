meta:
  id: ipo-prospectus-narrative
  level: 3
  course: financial-report-narrative-writing
  type: output
  description: "Write IPO prospectus financial narratives — draft the financial sections of an S-1 registration statement including business overview, risk factors, and use of proceeds"
  tags: [ipo, s1-prospectus, registration-statement, advanced]

state: {}

trigger: |
  A high-growth fintech company is preparing its
  S-1 registration statement for an IPO. Draft key
  financial narrative sections.

  COMPANY: PayBridge Technologies
  Business: B2B payments platform for mid-market
  Offering: $350M IPO at estimated $3.5B valuation

  FINANCIAL HISTORY (in millions):
                    FY2025   FY2024   FY2023
  Revenue           $280     $195     $128
  Revenue Growth     44%      52%      68%
  Gross Profit      $196     $132      $83
  Gross Margin       70%      68%      65%
  Operating Loss    ($42)    ($68)    ($85)
  Op Margin         -15%     -35%     -66%
  Net Loss          ($48)    ($72)    ($88)
  FCF               ($22)    ($55)    ($72)

  KEY METRICS:
  Customers: 8,500 (up from 5,800)
  NRR: 128%
  Gross Revenue Retention: 95%
  Payment Volume: $85B processed
  Take Rate: 0.33% of payment volume
  RPO: $420M

  USE OF PROCEEDS:
  - $350M gross (estimated $325M net)
  - R&D investment (40%): AI-powered reconciliation,
    cross-border expansion
  - Sales & Marketing (30%): enterprise sales team,
    international markets
  - Working Capital (20%): general corporate
  - Potential Acquisitions (10%): complementary
    technology

  Write:
  1. S-1 Business Overview financial narrative
     (400 words)
  2. Selected Risk Factors — financial risks
     (3 risk factors, 200 words each)
  3. Use of Proceeds section (200 words)

assertions:
  - type: llm_judge
    criteria: "S-1 Business Overview tells the PayBridge growth story with required disclosures — the financial narrative section of the business overview presents: the revenue trajectory ($128M → $195M → $280M, representing 3-year CAGR of approximately 48%), the improving unit economics (gross margin expansion from 65% to 70%, operating losses narrowing from -66% to -15%), the platform's scale ($85B payment volume), and the customer metrics that validate product-market fit (NRR of 128%, GRR of 95%, growing from 5,800 to 8,500 customers); the narrative frames the losses appropriately for a growth-stage fintech: investment in customer acquisition and product development that is showing clear returns in improving margins and operating leverage; the take rate of 0.33% is contextualized within the B2B payments market; the RPO of $420M is highlighted as forward revenue visibility; the narrative follows S-1 conventions: uses the SEC's required plain English for the cover page and summary sections, presents financials with comparatives, and includes appropriate references to detailed financial statements elsewhere in the prospectus."
    weight: 0.35
    description: "BusinessOverview"
  - type: llm_judge
    criteria: "Risk factors are specific to PayBridge and meet heightened S-1 standards — three financial risk factors: (1) History of losses and uncertain path to profitability: acknowledges the cumulative losses ($208M over 3 years), explains that continued investment in growth may extend the timeline to profitability, warns that profitability is not guaranteed and depends on continued revenue growth outpacing expense growth; this risk factor does NOT use the safe harbor (forward-looking statement safe harbor does not apply to IPO disclosures — PSLRA explicitly excludes IPOs); (2) Revenue concentration in B2B payments and take rate compression risk: explains that a decrease in take rate from 0.33% to 0.28% would reduce revenue by approximately $42M annually (15%), and that competitive pressure or large customer negotiations could compress pricing; (3) Payment volume risk and macroeconomic sensitivity: $85B in payment volume is the company's lifeblood — an economic downturn reducing B2B payment activity would directly impact revenue regardless of customer count; each risk factor includes specific, quantified potential impact and is materially different from generic boilerplate."
    weight: 0.35
    description: "RiskFactors"
  - type: llm_judge
    criteria: "Use of Proceeds follows SEC conventions and provides appropriate specificity — the 200-word section follows Regulation S-K Item 504: identifies the principal purposes (R&D 40%, S&M 30%, working capital 20%, potential acquisitions 10%), estimates net proceeds ($325M after underwriting discounts and offering expenses), provides reasonable specificity about each use category without over-committing to exact allocations, includes the standard caveat that management will have broad discretion in the application of proceeds, notes that pending use, proceeds will be invested in short-term, investment-grade instruments; the 'potential acquisitions' mention includes the standard language that the company has no specific agreements for acquisitions at the time of filing; the overall tone across all three sections is appropriately balanced for an IPO: bullish enough to attract investors but honest enough to meet SEC scrutiny and withstand potential litigation."
    weight: 0.30
    description: "UseOfProceeds"
