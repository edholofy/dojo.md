meta:
  id: inclusive-language-audit
  level: 2
  course: job-description-writing
  type: output
  description: "Inclusive language audit — review and rewrite a JD to remove biased language and attract diverse candidates"
  tags: [inclusive-language, dei, bias, audit, intermediate]

state: {}

trigger: |
  You're a Talent Acquisition Specialist at a tech company that
  has committed to improving diversity in hiring. Your VP of
  People has flagged the following JD as problematic and asked
  you to audit and rewrite it.

  Current JD (with issues):

  "SENIOR SOFTWARE ENGINEER — JOIN OUR BROTHERHOOD OF CODE

  Are you a coding ninja who can crush it in a fast-paced,
  high-pressure environment? We're looking for a rockstar
  developer who thrives on aggressive deadlines and isn't
  afraid to man the helm when things get tough.

  You'll join our young, energetic team of guys who work hard
  and play hard. We're basically a family here — we do beer
  pong on Fridays, play pickup basketball at lunch, and our
  hackathons go until 2am.

  Requirements:
  - Must be a native English speaker
  - Graduated from a top-tier university (Ivy League preferred)
  - 10+ years of experience (we want seasoned veterans)
  - Must be able to work in our office full-time (no exceptions)
  - Cultural fit is our #1 priority
  - Should be comfortable in a competitive, alpha environment
  - Must be available 24/7 for on-call rotations

  We're disrupting the industry and need warriors, not
  paper-pushers. If you can't handle the heat, don't apply.

  Perks: Unlimited PTO, ping pong table, beer fridge"

  Task: Write a detailed audit identifying every problematic
  element in this JD (with explanations of why each is
  problematic), then write the corrected version that would
  attract diverse, qualified candidates.

assertions:
  - type: llm_judge
    criteria: "Response provides a thorough audit — identifies gender-coded language (brotherhood, guys, man the helm, alpha); ageist language (young, energetic, seasoned veterans); exclusionary requirements (native English speaker, Ivy League, cultural fit as priority); masculine-coded culture signals (beer pong, basketball, competitive/warrior language); accessibility issues (full-time office, 24/7 on-call); explains WHY each element is problematic, not just that it is; references research on how gendered language affects application rates."
    weight: 0.35
    description: "ThoroughAudit"
  - type: llm_judge
    criteria: "Response writes a corrected JD that is genuinely inclusive — replaces gendered language with neutral alternatives; focuses on skills and outcomes over credentials and pedigree; describes culture in welcoming terms; includes flexible work considerations; uses 'you' language that helps candidates see themselves in the role; includes EEO statement and accommodation language; the corrected JD would score well on tools like Textio or Gender Decoder."
    weight: 0.35
    description: "InclusiveRewrite"
  - type: llm_judge
    criteria: "Response maintains attractiveness while being inclusive — the corrected JD still sounds exciting and compelling, not sanitized or corporate-speak; conveys the company's energy and ambition without exclusionary language; keeps the role sounding challenging and interesting; doesn't overcorrect to the point of blandness; would attract top talent AND diverse candidates simultaneously."
    weight: 0.30
    description: "AttractiveAndInclusive"
