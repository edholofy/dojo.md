meta:
  id: salary-transparency-compliance
  level: 2
  course: job-description-writing
  type: output
  description: "Salary transparency compliance — write JDs that comply with pay transparency laws across multiple jurisdictions"
  tags: [salary-transparency, compliance, pay-equity, legal, intermediate]

state: {}

trigger: |
  You're the HR Manager at a 300-person company headquartered
  in New York City with offices in Colorado and California, plus
  remote employees in Washington state and Connecticut. Your
  legal team has flagged that your JDs may not comply with
  various state and local pay transparency laws.

  Current situation:
  - NYC Local Law 32: Requires salary range on all job postings
  - Colorado Equal Pay for Equal Work Act: Requires compensation
    and benefits in all job postings
  - California SB 1162: Requires pay scale for positions
  - Washington SB 5761: Requires wage scale or salary range
  - Connecticut: Requires salary range upon request or by the
    time an offer is made

  You need to write 3 JDs for roles being hired across multiple
  locations:

  1. Software Engineer (can be based in NYC, Colorado, or remote)
     - Band: $120K-$160K (NYC), $110K-$145K (Colorado), 
       $115K-$150K (remote/other states)
     - Equity: Stock options, details at offer stage
     - Benefits: Standard package (health, 401k, PTO)

  2. Sales Manager (California office only)
     - Base: $90K-$110K
     - OTE (On-Target Earnings): $160K-$200K
     - Commission structure: 50/50 base/commission split
     - Car allowance: $500/month

  3. Marketing Coordinator (remote, open to all US states)
     - Salary: $55K-$70K
     - No geographic differential
     - Standard benefits

  Task: Write all 3 JDs with compliant salary/compensation
  disclosures. Include a brief compliance note explaining how
  each JD addresses the relevant laws.

assertions:
  - type: llm_judge
    criteria: "Response creates JDs compliant with pay transparency laws — each JD includes salary range prominently (not buried in fine print); the multi-location Software Engineer JD addresses geographic pay differentials transparently; the Sales Manager JD includes full OTE, commission structure, and additional compensation (car allowance); all JDs include benefits information as required by Colorado law; the approach would pass legal review in NYC, CO, CA, WA, and CT."
    weight: 0.35
    description: "LegalCompliance"
  - type: llm_judge
    criteria: "Response handles geographic pay differentials thoughtfully — explains why the Software Engineer has different ranges by location (cost of living, market rates); presents the differentials transparently without making lower-cost locations feel undervalued; addresses how remote workers are compensated; the Sales Manager commission structure is clearly explained (base vs OTE vs total compensation); the Marketing Coordinator's flat rate across locations is noted."
    weight: 0.35
    description: "PayDifferentials"
  - type: llm_judge
    criteria: "Response includes compliance notes and education — provides a brief explanation of which laws apply to each role; helps the reader understand why different information is disclosed for different roles; mentions best practices beyond minimum compliance (transparency builds trust); the JDs serve as templates for future postings; notes are practical and actionable, not just legal boilerplate."
    weight: 0.30
    description: "ComplianceEducation"
