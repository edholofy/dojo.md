meta:
  id: employer-branding-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Employer branding JD — write a job description that authentically conveys company culture and employer brand"
  tags: [employer-branding, culture, voice, authenticity, intermediate]

state: {}

trigger: |
  You're the Employer Brand Manager at a climate-tech startup
  (120 employees, Series B, $45M raised). Your company builds
  software for renewable energy grid management. You have a
  strong mission and culture, but your JDs read like generic
  corporate postings that could be from any company.

  Your CEO's feedback: "We lose candidates to Google and
  Stripe because our JDs don't convey who we are. Every JD
  reads the same. Candidates can't tell we're a mission-driven
  climate company that actually walks the talk."

  Company culture facts (authentic, not aspirational):
  - 4-day work week (implemented 18 months ago, proven results)
  - Carbon-negative operations (office powered by solar, remote
    workers get carbon offsets)
  - 20% of engineering time on open-source contributions
  - Monthly "Demo Days" where any employee can present
  - Transparent salary bands published internally
  - No titles below VP level (flat structure)
  - Annual company retreat focused on sustainability projects
  - Parental leave: 6 months for all parents

  Role to hire: Full-Stack Engineer
  - Salary: $130K-$165K
  - Tech stack: TypeScript, React, Node.js, PostgreSQL, AWS
  - Team: 5 engineers working on grid optimization algorithms
  - Remote-first (US time zones)

  Task: Write the JD with strong employer branding that
  authentically conveys the company culture while still
  communicating the role clearly. The JD should feel
  unmistakably "yours" — not interchangeable with any other
  company's posting.

assertions:
  - type: llm_judge
    criteria: "Response creates a JD with distinctive employer brand — weaves culture facts naturally into the JD (not as a bolted-on 'About Us' section); the mission (climate tech, grid management) feels central, not decorative; specific culture elements (4-day week, 20% open source, Demo Days) are mentioned authentically; the JD feels like it could only come from this company, not any generic tech startup; the voice is confident and genuine."
    weight: 0.35
    description: "DistinctiveBrand"
  - type: llm_judge
    criteria: "Response balances brand with role clarity — the employer branding enhances rather than obscures the actual role description; technical requirements are clear (TypeScript, React, Node.js, PostgreSQL, AWS); team size, scope, and day-to-day work are well described; salary and benefits are prominently included; a qualified engineer could easily assess whether they're a fit for both the role and the culture."
    weight: 0.35
    description: "BrandRoleBalance"
  - type: llm_judge
    criteria: "Response is authentic, not performative — culture claims are backed by specifics (18 months of 4-day week results, not just 'we value work-life balance'); avoids corporate buzzwords ('synergy', 'disrupt', 'leverage'); the sustainability commitment feels real (carbon offsets, solar office) not greenwashed; would attract mission-driven engineers who might otherwise go to bigger companies; the tone would resonate with the target audience."
    weight: 0.30
    description: "Authenticity"
