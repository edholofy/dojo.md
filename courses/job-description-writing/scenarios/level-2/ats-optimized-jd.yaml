meta:
  id: ats-optimized-jd
  level: 2
  course: job-description-writing
  type: output
  description: "ATS-optimized JD — write a job description optimized for Applicant Tracking Systems while remaining human-readable"
  tags: [ats, optimization, keywords, searchability, intermediate]

state: {}

trigger: |
  You're a recruiter at a mid-size company using Greenhouse as
  your ATS. Your hiring manager has written a JD for a "Data
  Wizard" role, but candidates aren't finding it through job
  boards and your ATS isn't matching relevant resumes.

  The current JD:
  - Title: "Data Wizard — Make Numbers Dance"
  - Uses creative but non-standard section headers ("Your
    Superpowers", "What's in Your Utility Belt", "The Quest
    Awaits")
  - Buries keywords in long paragraphs
  - Uses non-standard job titles and skill descriptions
    ("number crunching" instead of "data analysis")
  - Has no structured format for ATS parsing

  The actual role is a Senior Data Analyst who will:
  - Build dashboards and reports using SQL, Python, and Tableau
  - Analyze customer behavior and product usage data
  - Present findings to leadership and recommend actions
  - Work with the product team to define and track KPIs
  - Mentor junior analysts (team of 3)

  Requirements:
  - 4-6 years in data analysis or business intelligence
  - Strong SQL and Python (pandas, numpy)
  - Experience with Tableau or Power BI
  - Understanding of statistical methods
  - Excellent communication skills
  - Bachelor's in Statistics, Math, CS, or related field

  Salary: $95K-$120K, hybrid (3 days office/2 remote), NYC

  Task: Rewrite the JD to be ATS-optimized (proper title,
  standard sections, keyword-rich) while still being engaging
  for human readers. Explain your ATS optimization choices.

assertions:
  - type: llm_judge
    criteria: "Response creates an ATS-optimized JD — uses a standard, searchable job title (Senior Data Analyst, not 'Data Wizard'); structures with standard ATS-parseable sections (About the Role, Responsibilities, Qualifications, Benefits); includes relevant keywords naturally (data analysis, SQL, Python, Tableau, business intelligence, KPIs, dashboards); uses standard formatting (bullet points, clear headers); avoids images, tables, or special characters that break ATS parsing."
    weight: 0.35
    description: "ATSOptimization"
  - type: llm_judge
    criteria: "Response explains ATS optimization strategy — describes why the original title was problematic for search; explains keyword placement strategy (title, first paragraph, requirements section); discusses the balance between keyword density and readability; mentions job board SEO considerations; explains standard section headers and why they matter for parsing; provides actionable ATS tips the hiring manager can apply to future JDs."
    weight: 0.35
    description: "OptimizationExplanation"
  - type: llm_judge
    criteria: "Response keeps the JD engaging despite optimization — doesn't sacrifice readability for keyword stuffing; maintains personality and company voice where appropriate; uses action verbs and outcome-oriented language; the JD would attract qualified data analysts who find it both through ATS search and interesting to read; includes all logistics (salary, hybrid, location) in a clear format."
    weight: 0.30
    description: "EngagingDespiteOptimization"
