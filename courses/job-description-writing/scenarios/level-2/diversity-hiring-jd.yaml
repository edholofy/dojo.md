meta:
  id: diversity-hiring-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Diversity hiring JD — write a JD for a diversity-focused hiring initiative without tokenizing or legal risk"
  tags: [diversity, dei, hiring-initiative, legal, intermediate]

state: {}

trigger: |
  You're the Director of DEI at a large accounting firm (2,000
  employees). The firm's leadership has noticed that while 52%
  of entry-level hires are women, only 12% of partners are
  women, and the firm's racial diversity drops significantly at
  manager level and above. The firm wants to launch a targeted
  leadership development and hiring program.

  Your task is to write a JD for a new role:
  - Title: Director of Inclusive Talent Development
  - Reports to: Chief People Officer
  - Salary: $140K-$175K
  - Location: Hybrid, headquarters in Philadelphia

  The role will:
  - Design and lead a sponsorship program for underrepresented
    managers to accelerate partner-track development
  - Analyze promotion and attrition data to identify systemic
    barriers
  - Partner with recruiting to diversify candidate pipelines
    for senior roles
  - Create inclusive leadership training for all partners and
    senior managers
  - Establish metrics and accountability framework for diversity
    goals
  - Advise on ERG (Employee Resource Group) strategy
  - Report quarterly diversity metrics to the executive committee

  Important considerations:
  - The JD must attract DEI professionals without using language
    that could create legal risk (avoid implying hiring quotas
    or preferential treatment based on protected characteristics)
  - Must demonstrate genuine commitment, not performative DEI
  - Should acknowledge the firm's current state honestly
  - Must be legally compliant post-SFFA (Students for Fair
    Admissions v. Harvard) implications for corporate DEI

  Task: Write the JD that attracts experienced DEI
  professionals while being legally sound and authentically
  committed.

assertions:
  - type: llm_judge
    criteria: "Response writes a legally sound DEI-focused JD — avoids language implying hiring quotas or race-based preferences; focuses on systems and processes rather than demographic targets; uses legally safe language (equity, inclusion, belonging, barrier removal, systemic analysis); frames diversity work as business imperative, not compliance checkbox; the JD would pass legal review in the current post-SFFA environment."
    weight: 0.35
    description: "LegalSoundness"
  - type: llm_judge
    criteria: "Response demonstrates genuine commitment — acknowledges the firm's actual diversity challenges (52% entry-level women vs 12% partners); describes substantive work (sponsorship programs, systemic barrier analysis, pipeline development) not just training; the role has real authority (reports to CPO, presents to exec committee); avoids performative DEI language ('we celebrate diversity'); the JD would attract experienced DEI professionals who can spot performative efforts."
    weight: 0.35
    description: "GenuineCommitment"
  - type: llm_judge
    criteria: "Response creates an attractive opportunity for DEI professionals — describes impactful, substantive work; includes metrics and accountability (this role can make a difference); salary is competitive for the level; qualifications focus on DEI expertise and demonstrated impact; includes EEO statement and accommodation language; the JD signals that the firm is serious about change, which is the #1 thing DEI professionals look for in a role."
    weight: 0.30
    description: "DEIProfessionalAppeal"
