meta:
  id: intermediate-jd-shift
  level: 2
  course: job-description-writing
  type: output
  description: "Intermediate JD shift — handle a last-minute change where a role fundamentally transforms during the JD writing process"
  tags: [shift, role-change, stakeholder-management, adaptation, intermediate]

state: {}

trigger: |
  You're a Senior Recruiter at a healthcare technology company.
  You spent a week writing and getting approvals for a "Senior
  Backend Engineer" JD. It was approved by the hiring manager,
  the VP of Engineering, and HR. You were about to post it when
  three things happened simultaneously:

  1. Budget cut: The approved salary band ($160K-$190K) was
     cut by 20% due to Q2 budget revisions. New max: $152K.

  2. Scope change: The VP of Engineering decided to merge the
     backend team with the platform team. The role now needs
     infrastructure/DevOps skills in addition to backend
     development. The team will own both application code AND
     deployment pipelines.

  3. Market data: Your compensation analyst shared data showing
     that "Backend Engineer" roles get 40% fewer applications
     than "Software Engineer" roles on LinkedIn, and the title
     change would also better reflect the expanded scope.

  Original approved JD highlights:
  - Title: Senior Backend Engineer
  - Salary: $160K-$190K
  - Stack: Go, PostgreSQL, gRPC, Kubernetes
  - Team: 6 backend engineers
  - Focus: API development and microservices architecture

  New reality:
  - Budget: $128K-$152K (after 20% cut)
  - Expanded scope: Backend + infrastructure/DevOps
  - New stack additions: Terraform, AWS, CI/CD pipelines,
    monitoring (Datadog)
  - Team: 8 engineers (merged backend + platform)
  - Suggested title change: Senior Software Engineer — Platform

  Task: Write a memo to the VP of Engineering explaining the
  changes and their implications (will this role be harder to
  fill at lower comp with broader scope?), then write the
  revised JD. Be honest about the trade-offs.

assertions:
  - type: llm_judge
    criteria: "Response writes a candid memo to the VP — addresses all three changes and their implications; honestly flags that broader scope at lower compensation will make the role harder to fill; provides market data reasoning for the title change; suggests compromises (reduce scope, adjust level to mid-level, negotiate budget, phase requirements); the memo is respectful but doesn't sugarcoat the talent market reality; provides concrete recommendations."
    weight: 0.35
    description: "CandidMemo"
  - type: llm_judge
    criteria: "Response writes a revised JD that works within constraints — adjusts title, salary range, and scope to reflect new reality; the expanded requirements (backend + infra) are prioritized sensibly (some required, some preferred); the salary range ($128K-$152K) is positioned competitively given the scope; the JD is honest about what the role entails without being a wish list; maintains healthcare tech company branding."
    weight: 0.35
    description: "RevisedJD"
  - type: llm_judge
    criteria: "Response demonstrates recruiter expertise — shows understanding of how budget cuts, scope changes, and title changes interact; references talent market dynamics; addresses whether the role level should be adjusted (maybe mid-level is more realistic at this comp); suggests creative solutions (signing bonus, equity, title premium, phased hiring); the response would be valuable to a real VP making these decisions."
    weight: 0.30
    description: "RecruiterExpertise"
