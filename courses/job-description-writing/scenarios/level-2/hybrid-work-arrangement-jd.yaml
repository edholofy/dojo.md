meta:
  id: hybrid-work-arrangement-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Hybrid work arrangement JD — write a JD that clearly communicates a nuanced hybrid work policy"
  tags: [hybrid, flexible-work, work-arrangement, clarity, intermediate]

state: {}

trigger: |
  You're the Head of People at a financial services company
  (600 employees). Your company recently redesigned its work
  policy after surveying all employees. The result is a nuanced
  hybrid model that varies by role type, and candidates keep
  getting confused about what "hybrid" means at your company.

  Your hybrid policy:
  - "Anchor Days": Tuesday and Wednesday are company-wide
    in-office days (all hybrid employees)
  - "Flex Days": Teams choose 1 additional day per week in
    office (Mon, Thu, or Fri — team decides together)
  - "Focus Fridays": No meetings allowed on Fridays (in-office
    or remote)
  - Quarterly "Connection Weeks": Full week in office, planned
    6 months in advance
  - Core hours: 10am-4pm ET for collaboration, flexible outside
  - Some roles are fully in-office (trading floor, client-facing)
  - Some roles are fully remote (specific teams hired remote)
  - Equipment: Company provides monitors and peripherals for
    both office and home setups

  You're hiring a Financial Analyst (hybrid role):
  - Salary: $85K-$105K
  - Team: FP&A (Financial Planning & Analysis)
  - Manager: VP of Finance (in-office anchor + Thursday)
  - Office: Downtown Boston
  - In-office expectation: 3 days/week (Tue, Wed, + team day)

  The role itself:
  - Build and maintain financial models
  - Support quarterly earnings preparation
  - Partner with department heads on budget planning
  - Create board-ready financial presentations
  - Analyze variances and provide actionable recommendations

  Task: Write the JD with crystal-clear hybrid work details.
  A candidate should know exactly what their week looks like
  before they apply.

assertions:
  - type: llm_judge
    criteria: "Response clearly communicates the hybrid arrangement — explains the anchor day system (Tue/Wed), team flex day, and Focus Friday concept; specifies this role is 3 days in-office; describes core hours and flexibility outside them; mentions Connection Weeks; a candidate reading this JD would know exactly what a typical week looks like (which days in office, which remote, when meetings happen, when they're free); no ambiguity about 'hybrid'."
    weight: 0.35
    description: "HybridClarity"
  - type: llm_judge
    criteria: "Response integrates work arrangement with role description — the hybrid details complement rather than overwhelm the Financial Analyst role description; core financial responsibilities are clearly described; qualifications are appropriate for the level and salary; the JD explains how the hybrid model specifically works for this team (VP's schedule, team day choice); includes Boston office location and any relocation/commute expectations."
    weight: 0.35
    description: "IntegratedDescription"
  - type: llm_judge
    criteria: "Response positions hybrid as a benefit, not a compromise — frames the policy as intentionally designed (not pandemic leftover); explains the reasoning behind each element (anchor days for collaboration, Focus Fridays for deep work); mentions equipment for both locations; the JD makes the hybrid model sound thoughtful and employee-centric; would attract candidates specifically looking for structured hybrid (not ambiguous 'flexible' promises)."
    weight: 0.30
    description: "HybridAsStrength"
