meta:
  id: competency-based-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Competency-based JD — write a job description focused on competencies and behaviors rather than credentials"
  tags: [competency-based, skills-first, behaviors, inclusive-hiring, intermediate]

state: {}

trigger: |
  You're the Head of Talent at a fintech company that has
  decided to shift to competency-based hiring. Your CEO read
  research showing that degree requirements screen out 70% of
  Black and 80% of Hispanic workers for roles that don't
  actually need degrees. The company wants to remove artificial
  credential barriers.

  Your current JD for a Customer Success Manager reads:

  "Requirements:
  - Bachelor's degree in Business, Marketing, or related field
  - MBA preferred
  - 5-7 years of customer success or account management
  - Salesforce certification required
  - GAAP accounting knowledge
  - Previous experience at a SaaS company with $50M+ ARR"

  The actual job involves:
  - Managing a portfolio of 30-40 mid-market accounts
  - Conducting quarterly business reviews with customers
  - Identifying upsell and expansion opportunities
  - Resolving customer escalations
  - Collaborating with Product on feature requests
  - Reducing churn through proactive outreach
  - Using Salesforce to track account health

  Salary: $80K-$100K + $20K variable (based on retention/expansion)
  Location: Hybrid, Chicago

  Task: Rewrite this JD using a competency-based approach.
  Replace credential requirements with demonstrated skills
  and behaviors. Explain the rationale for each change.

assertions:
  - type: llm_judge
    criteria: "Response replaces credentials with competencies — removes degree requirement and replaces with relevant skills; replaces years-of-experience with demonstrated capability language; removes Salesforce certification requirement and replaces with CRM proficiency; eliminates unnecessary GAAP knowledge; reframes 'SaaS experience' as transferable skills (relationship management, recurring revenue understanding); each competency maps to actual job functions."
    weight: 0.35
    description: "CompetencyRewrite"
  - type: llm_judge
    criteria: "Response explains the rationale clearly — describes why each credential was replaced and what competency replaced it; references the equity impact of credential requirements (degree stats mentioned in prompt); explains the business case for competency-based hiring (wider talent pool, better predictive validity, reduced bias); acknowledges what might be lost and how to mitigate (e.g., Salesforce training during onboarding); the explanation would convince a skeptical hiring manager."
    weight: 0.35
    description: "RationaleExplanation"
  - type: llm_judge
    criteria: "Response creates a stronger JD overall — the competency-based version is more specific and useful than the credential-based original; helps candidates self-assess based on behaviors rather than checking boxes; includes clear compensation information; maintains rigor (not 'anyone can apply') while being accessible; distinguishes between required competencies and preferred competencies; would attract diverse, qualified candidates."
    weight: 0.30
    description: "StrongerJD"
