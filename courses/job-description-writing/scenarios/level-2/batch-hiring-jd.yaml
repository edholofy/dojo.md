meta:
  id: batch-hiring-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Batch hiring JD — write job descriptions for multiple similar roles that differentiate clearly between levels"
  tags: [batch-hiring, career-ladder, leveling, differentiation, intermediate]

state: {}

trigger: |
  You're a Technical Recruiter at a fast-growing e-commerce
  company. The VP of Engineering needs to hire across three
  levels of the same function simultaneously and wants JDs
  that clearly differentiate between them so candidates
  self-select into the right level.

  Roles to write:
  1. Junior Frontend Engineer (L1-L2)
  2. Mid-Level Frontend Engineer (L3)
  3. Senior Frontend Engineer (L4)

  Shared context:
  - Team: Consumer web team (builds the shopping experience)
  - Stack: React, TypeScript, Next.js, GraphQL, Tailwind CSS
  - Location: Remote (US), or in-office Austin, TX
  - Company: 400 employees, $200M revenue, profitable

  Level-specific details:

  Junior (L1-L2):
  - Salary: $75K-$95K
  - Focus: Implement features from specs, write tests, learn
    the codebase, participate in code reviews
  - Mentorship: Paired with a senior engineer
  - Requirements: 0-2 years experience, CS fundamentals,
    basic React knowledge, eagerness to learn

  Mid-Level (L3):
  - Salary: $110K-$140K
  - Focus: Own features end-to-end, contribute to technical
    decisions, mentor juniors, improve team processes
  - Autonomy: Works independently on medium-complexity projects
  - Requirements: 2-5 years experience, strong React/TypeScript,
    testing expertise, some system design understanding

  Senior (L4):
  - Salary: $150K-$185K
  - Focus: Technical leadership, architecture decisions,
    cross-team collaboration, raising the bar for quality
  - Impact: Sets technical direction for the team
  - Requirements: 5+ years experience, deep frontend expertise,
    system design skills, track record of mentoring

  Task: Write all 3 JDs. Each must clearly communicate its
  level so that candidates can accurately self-select. A
  candidate reading all three should understand exactly which
  one fits their experience.

assertions:
  - type: llm_judge
    criteria: "Response creates three clearly differentiated JDs — the progression from Junior to Mid to Senior is obvious in scope, autonomy, impact, and expectations; each JD uses level-appropriate language (Junior: 'learn and grow', Mid: 'own and deliver', Senior: 'lead and architect'); responsibilities escalate logically; qualifications don't overlap confusingly between levels; a candidate reading all three would know exactly which level fits them."
    weight: 0.35
    description: "ClearDifferentiation"
  - type: llm_judge
    criteria: "Response maintains consistency while differentiating — all three JDs share the same format and branding; company/team description is consistent; the shared tech stack is referenced consistently; salary ranges don't overlap; each JD stands alone as a complete posting while clearly belonging to a family; benefits and logistics are consistent across all three."
    weight: 0.35
    description: "ConsistentFamily"
  - type: llm_judge
    criteria: "Response is practical and recruiter-friendly — each JD is the right length for its level (Junior can be shorter, Senior may need more detail); includes all logistics (remote, Austin, salary); qualifications are realistic for each level; the JDs would work well on job boards (ATS-friendly titles, standard sections); helps reduce misleveled applications, saving recruiter time."
    weight: 0.30
    description: "RecruiterPractical"
