meta:
  id: executive-level-jd
  level: 2
  course: job-description-writing
  type: output
  description: "Executive-level JD — write a job description for a VP-level position that balances strategic vision with operational specifics"
  tags: [executive, vp-level, strategic, leadership, intermediate]

state: {}

trigger: |
  You're the CHRO at a 500-person B2B SaaS company ($80M ARR,
  Series D funded). The CEO has asked you to write the JD for
  a new VP of Product role. This is a critical executive hire
  that will report directly to the CEO and sit on the leadership
  team.

  Context:
  - The company currently has a Director of Product who will
    report to this VP (the Director was considered but isn't
    ready for the VP role yet — handle this sensitively)
  - Product team: 3 PMs, 2 Product Designers, 1 UX Researcher
  - Engineering: 45 engineers across 6 squads
  - The company is preparing for a potential IPO in 18-24 months
  - Key challenge: Product has been engineering-led; this VP
    needs to establish product-led culture
  - Compensation: $250K-$300K base + equity (0.3-0.5%)

  The CEO's notes:
  "I need someone who can own the product vision AND execute.
  Not a 'strategy person' who can't ship. They need to earn
  the respect of our engineering team, which is strong and
  opinionated. Must have scaled product orgs through $50M to
  $200M ARR. Board experience is a plus — they'll present at
  board meetings quarterly."

  Task: Write the VP of Product job description. Balance
  strategic vision with operational credibility. The JD should
  attract senior product leaders without reading like a wishlist.

assertions:
  - type: llm_judge
    criteria: "Response writes an executive-level JD with appropriate gravitas — uses strategic language without being vague; describes the role's impact on company trajectory (IPO readiness, product-led transformation); includes both vision-setting and execution responsibilities; specifies team size and scope; includes compensation range with equity; doesn't read like a mid-level PM JD with 'VP' slapped on the title."
    weight: 0.35
    description: "ExecutiveGravitas"
  - type: llm_judge
    criteria: "Response balances requirements realistically — specifies experience scaling through relevant ARR range without demanding exact numbers; includes board presentation experience as preferred not required; focuses on demonstrated outcomes over credentials; the qualifications would attract strong VP-level candidates without being an impossible wishlist; acknowledges the political sensitivity of the role (existing Director, engineering-led culture)."
    weight: 0.35
    description: "RealisticRequirements"
  - type: llm_judge
    criteria: "Response makes the opportunity compelling — describes what makes this role uniquely attractive (pre-IPO timing, greenfield product leadership, strong engineering team to partner with); sells the company stage and opportunity without overselling; includes enough about culture and team to help candidates self-select; the JD would stand out among other VP Product postings."
    weight: 0.30
    description: "CompellingOpportunity"
