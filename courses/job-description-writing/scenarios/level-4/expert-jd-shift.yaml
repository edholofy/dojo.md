meta:
  id: expert-jd-shift
  level: 4
  course: job-description-writing
  type: output
  description: "Expert JD shift — navigate a crisis where published JDs become the center of a public discrimination lawsuit"
  tags: [shift, crisis, discrimination, lawsuit, public-scrutiny, expert]

state: {}

trigger: |
  You're the CHRO of a 2,000-person technology company. A
  former candidate who was rejected has filed a class-action
  discrimination lawsuit, and your JDs are Exhibit A. The
  lawsuit alleges systematic age discrimination in hiring.

  Evidence cited in the lawsuit:
  1. JD language: 15 JDs use phrases like "digital native,"
     "recent graduate energy," "startup mindset," and "fast-
     paced environment for those with fresh ideas"
  2. Experience caps: 8 JDs list "3-5 years experience" as a
     maximum, not minimum
  3. Cultural signals: Office photos on careers page show only
     young employees; JDs reference "ping pong tournaments"
     and "company kickball team"
  4. Technology requirements: 3 JDs require "TikTok marketing
     experience" for roles that don't involve social media
  5. Data pattern: Of 500 hires in the last 2 years, only 4%
     are over 45, despite 35% of applicants being over 45

  Your legal team's assessment: "This is a strong case. The
  JDs are indefensible. We need to remediate immediately AND
  prepare for public scrutiny — this will make the news."

  Media has already picked up the story. A tech journalist
  has published your worst JDs verbatim.

  Immediate actions needed:
  1. Crisis response: Statement to employees, board, and media
  2. JD remediation: Audit all 347 JDs and fix discriminatory
     language within 48 hours
  3. Process reform: New JD approval process to prevent
     recurrence
  4. Hiring data analysis: Demonstrate commitment to fair hiring
  5. Cultural change: Address the underlying culture that
     produced these JDs

  Task: Create the crisis response plan, the remediation
  framework (with before/after examples for the most
  problematic JDs), and the long-term reform plan.

assertions:
  - type: llm_judge
    criteria: "Response creates an effective crisis response — includes statements for employees, board, and media that are appropriately different in tone and detail; acknowledges the problem without admitting legal liability (legal counsel coordination); demonstrates concrete commitment to change (not just apology); the employee statement addresses morale and trust; the media statement is concise and positions the company as taking this seriously; addresses the published JDs directly."
    weight: 0.35
    description: "CrisisResponse"
  - type: llm_judge
    criteria: "Response provides thorough JD remediation — creates a triage framework for the 347 JDs (red/yellow/green priority); fixes all 5 categories of discriminatory language with specific before/after examples; the 48-hour remediation plan is realistic (not all JDs need full rewrites — some need targeted edits); removes experience caps, ageist language, and irrelevant cultural signals; the remediated JDs are genuinely age-inclusive, not just sanitized."
    weight: 0.35
    description: "JDRemediation"
  - type: llm_judge
    criteria: "Response addresses long-term reform — designs a new JD approval process with compliance checkpoints; addresses the cultural root causes (why hiring managers wrote ageist JDs); includes training for hiring managers; establishes monitoring and auditing; the reform plan demonstrates to the court (and public) that the company is changing systemically; includes data collection and reporting commitments; the plan would reduce legal exposure and improve hiring fairness."
    weight: 0.30
    description: "LongTermReform"
