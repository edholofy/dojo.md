meta:
  id: jd-global-standardization
  level: 4
  course: job-description-writing
  type: output
  description: "Global JD standardization — create a unified JD standard across a multinational corporation with diverse regulatory and cultural environments"
  tags: [global, standardization, multinational, regulatory, cultural, expert]

state: {}

trigger: |
  You're the Global Head of Talent Acquisition at a 20,000-
  person multinational manufacturing company headquartered in
  Chicago with operations in 12 countries. Each region has
  developed its own JD practices over decades, creating chaos:

  Current state by region:
  - US (8,000 employees): Detailed JDs, ATS-optimized, legally
    reviewed but inconsistent across 15 offices
  - Germany (3,000 employees): Works council must approve all
    JDs; highly structured, gender-neutral per AGG requirements
  - Japan (2,500 employees): JDs are minimal by tradition;
    roles defined by department, not individual position
  - Brazil (2,000 employees): JDs must comply with CLT labor
    law; heavy on benefits disclosure; union consultation
    required for certain roles
  - India (1,500 employees): Mix of formal and informal; IT
    roles are well-defined, manufacturing roles are not
  - UK (1,000 employees): Post-Brexit visa requirements must
    be addressed; gender pay gap reporting implications
  - UAE (800 employees): Emiratization requirements; WPS
    compliance; Arabic language requirements for certain roles
  - China (700 employees): JDs must comply with Labor Contract
    Law; hukou system considerations; social insurance
    requirements
  - 4 smaller offices (500 each): Singapore, Australia, Mexico,
    Poland

  CEO mandate: "I want a global JD standard that ensures
  consistency and compliance across all 12 countries. But it
  can't be US-centric — each region must feel ownership."

  Your deliverables:
  1. Global JD standard (core elements that are universal)
  2. Regional adaptation guidelines (what varies by country)
  3. Governance model (who owns what)
  4. Implementation roadmap (phase by region)
  5. Sample JDs: Same role (Manufacturing Engineer) adapted for
     US, Germany, and Japan to demonstrate the standard

  Budget: $800K over 18 months
  Team: Global project team of 8 (1 from each major region)

  Task: Create the global JD standardization framework and
  demonstrate it with the 3 sample Manufacturing Engineer JDs.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical global standard — identifies universal core elements (role title, responsibilities, qualifications, compensation philosophy, EEO equivalent) while allowing regional variation (legal requirements, cultural norms, language, benefits); the standard is principled but not rigid; acknowledges that true standardization requires flexibility; the governance model distributes ownership to regions (not US-centric); includes version control and update processes."
    weight: 0.35
    description: "PracticalGlobalStandard"
  - type: llm_judge
    criteria: "Response demonstrates regional expertise — the 3 sample JDs (US, Germany, Japan) show genuine understanding of each country's requirements; German JD includes works council language, AGG compliance, probation period; Japan JD reflects cultural norms (shorter, department-oriented, harmony emphasis); US JD includes pay transparency and EEO; each sample feels authentic to its market while following the global standard structure."
    weight: 0.35
    description: "RegionalExpertise"
  - type: llm_judge
    criteria: "Response includes realistic implementation plan — phases rollout by region (starting with regions with strongest JD maturity); $800K budget is allocated across technology, consulting, translation, training, and project management; addresses change management for 8 diverse regional cultures; includes success metrics; the 18-month timeline is phased logically; accounts for works council approvals in Germany, union consultation in Brazil, and other region-specific gates."
    weight: 0.30
    description: "RealisticImplementation"
