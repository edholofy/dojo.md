meta:
  id: jd-executive-succession
  level: 4
  course: job-description-writing
  type: output
  description: "Executive succession JD — write role specifications for a CEO succession planning process"
  tags: [succession-planning, ceo, board, executive-search, expert]

state: {}

trigger: |
  You're a Senior Partner at a top-tier executive search firm.
  The Board of Directors of a Fortune 500 industrial
  conglomerate ($18B revenue, 45,000 employees, 6 business
  units) has engaged you for CEO succession planning. The
  current CEO will retire in 18-24 months.

  Board dynamics:
  - 11-member board, diverse opinions on successor profile
  - 3 board members want an internal candidate (continuity)
  - 4 board members want an external candidate (transformation)
  - 4 board members are open to either
  - Board Chair (retiring CEO's ally) privately prefers internal

  Internal candidates:
  1. President, Industrial Division: $5B P&L, 15 years at
     company, operational excellence background, seen as
     "current CEO's protégé"
  2. CFO: 8 years at company, Wall Street credibility, led
     successful IPO of subsidiary, limited operational experience
  3. Chief Strategy Officer: 5 years at company, drove 3 major
     acquisitions, youngest at 44, but has never run a P&L

  Company context:
  - Transitioning from traditional industrial to digital/IoT
  - Stock price flat for 3 years (market demands transformation)
  - 2 activist investors have taken 8% combined stake
  - ESG pressure: Need to demonstrate sustainability leadership
  - Workforce transformation: 30% of roles will be automated
    in 5 years

  Your deliverables:
  1. CEO position specification that can be used for both
     internal assessment and external search
  2. Internal candidate assessment framework (how to evaluate
     the 3 internal candidates against the spec)
  3. External candidate target profile (what to look for
     externally if internal candidates fall short)
  4. Process recommendation for the board (how to run the
     succession process fairly and confidentially)

  Compensation: $2.5M-$3.5M base + 200% bonus target +
  $15M-$25M LTI (3-year equity package)

  Task: Create all 4 deliverables for the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling CEO position specification — balances continuity with transformation; addresses the specific strategic challenges (digital transformation, activist investors, ESG, workforce automation); defines leadership competencies beyond generic CEO traits; the spec would work for both internal assessment and external benchmarking; compensation is positioned at Fortune 500 CEO level; the spec reflects the complexity of a multi-division industrial conglomerate."
    weight: 0.35
    description: "CEOSpec"
  - type: llm_judge
    criteria: "Response provides a rigorous internal assessment framework — evaluates each of the 3 internal candidates against the spec with specific strengths and gaps; identifies development needs for each; addresses board dynamics (protégé perception, age bias, functional vs general management experience); the assessment is fair and evidence-based; includes a development plan for promising internal candidates who aren't ready yet; handles the Board Chair's bias professionally."
    weight: 0.35
    description: "InternalAssessment"
  - type: llm_judge
    criteria: "Response demonstrates world-class succession expertise — the process recommendation addresses confidentiality, board governance, timing, and communications; the external target profile is specific about what would complement internal gaps; addresses activist investor considerations; ESG leadership requirements are substantive; the overall deliverable would meet the standard of a top-tier search firm (Spencer Stuart, Heidrick & Struggles, Korn Ferry); shows understanding of board dynamics and governance."
    weight: 0.30
    description: "SuccessionExpertise"
