meta:
  id: jd-ma-integration
  level: 4
  course: job-description-writing
  type: output
  description: "M&A JD integration — harmonize job descriptions across two merging companies with different role architectures"
  tags: [ma, merger, integration, harmonization, role-architecture, expert]

state: {}

trigger: |
  You're the Chief People Officer leading the people integration
  for a major acquisition. Your company (AcquirerCo, 3,000
  employees, enterprise software) has acquired TargetCo (800
  employees, consumer mobile app). The cultures, role structures,
  and compensation philosophies are fundamentally different.

  AcquirerCo's approach:
  - Traditional role architecture: 15 job families, 8 levels
  - Formal titles (Senior Software Engineer III)
  - Compensation: 50th percentile market, heavy on benefits
  - JDs: Detailed, compliance-focused, legally reviewed
  - Career ladders: Well-defined, promotion criteria documented
  - 347 active JDs in centralized HR system

  TargetCo's approach:
  - Flat structure: No formal levels, creative titles ("Growth
    Hacker", "Chief Happiness Officer", "Code Whisperer")
  - Compensation: 75th percentile base, less benefits, heavy
    equity
  - JDs: Informal, culture-forward, minimal compliance language
  - Career ladders: Undefined ("everyone's an entrepreneur")
  - 45 JDs total, most stored in Google Docs

  Integration challenges:
  1. Map TargetCo's 45 roles to AcquirerCo's job families
  2. Resolve title conflicts (TargetCo's "VP of Engineering"
     manages 8 people; AcquirerCo's manages 200)
  3. Harmonize compensation without losing TargetCo talent
     (they're paid higher base but get fewer benefits)
  4. Preserve TargetCo's culture elements that drive innovation
     while establishing governance
  5. Legal compliance: TargetCo's JDs are non-compliant in
     3 states where they have employees

  Timeline: 6 months to full integration
  Budget: $200K for the JD/role harmonization workstream

  Task: Create the JD integration plan. Include the role
  mapping strategy, sample mappings for 5 key TargetCo roles,
  a communication plan for both companies' employees, and the
  harmonized JD template that respects both cultures.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical integration plan — includes a phased approach (immediate compliance fixes, role mapping, compensation harmonization, cultural integration); the role mapping strategy is systematic (job family alignment, level calibration, title standardization); addresses compensation harmonization without mass attrition; timeline is realistic for 6 months; budget allocation reflects real integration costs."
    weight: 0.35
    description: "PracticalPlan"
  - type: llm_judge
    criteria: "Response provides specific role mappings — maps 5 key TargetCo roles to AcquirerCo's framework with clear rationale; addresses title inflation honestly (TargetCo VP → AcquirerCo Director); handles compensation gaps (higher base vs more benefits); the mappings are fair and defensible; includes communication talking points for affected employees; acknowledges where mapping isn't clean and provides creative solutions."
    weight: 0.35
    description: "RoleMappings"
  - type: llm_judge
    criteria: "Response balances governance with culture — the harmonized template incorporates compliance requirements from AcquirerCo and cultural elements from TargetCo; acknowledges that destroying TargetCo's culture destroys the acquisition's value; communication plan addresses anxiety from both sides (AcquirerCo: 'are we becoming a startup?'; TargetCo: 'are we losing our identity?'); the approach would retain key talent from both companies."
    weight: 0.30
    description: "CulturalBalance"
