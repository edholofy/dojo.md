meta:
  id: jd-compensation-philosophy
  level: 4
  course: job-description-writing
  type: output
  description: "JD compensation philosophy — design how compensation is communicated across JDs to reflect company values and attract talent in a transparent market"
  tags: [compensation, philosophy, total-rewards, transparency, expert]

state: {}

trigger: |
  You're the VP of Total Rewards at a 3,000-person technology
  company preparing for IPO. Your compensation philosophy is
  complex, and how you communicate it in JDs has become a
  strategic issue.

  Current compensation components:
  - Base salary: Market-competitive, location-adjusted
  - Annual bonus: 10-30% target (varies by level)
  - Pre-IPO equity: RSUs with 4-year vesting, 1-year cliff
  - Sign-on bonus: Available for critical hires
  - Benefits: Comprehensive (medical, dental, vision, 401k
    match, unlimited PTO, parental leave)
  - Perks: Learning stipend ($2K/year), wellness ($100/month),
    home office ($1,500 one-time)

  Challenges:
  1. Pay transparency laws require salary ranges, but your
     ranges are wide (e.g., $120K-$200K for "Senior Engineer")
     because they span 4 sub-levels
  2. Candidates focus on base salary and ignore equity — but
     equity is worth $50K-$300K annually at projected IPO
     valuations
  3. Location-adjusted pay means the same role pays $160K in
     SF and $130K in Austin — how to present this in JDs?
  4. Candidates compare your total comp against FAANG base
     salaries — an apples-to-oranges comparison
  5. Internal equity: If you post the full range externally,
     current employees in the lower half feel underpaid

  The CFO wants JDs to clearly communicate total compensation
  to help candidates understand the full value proposition —
  especially the equity upside pre-IPO.

  Your deliverables:
  1. Compensation communication philosophy (how to present comp
     in all JDs)
  2. Compensation section template for JDs (standardized format)
  3. Sample compensation disclosures for 4 roles at different
     levels:
     - Software Engineer ($120K-$155K base, L3)
     - Senior Software Engineer ($155K-$200K base, L4-L5)
     - Engineering Manager ($180K-$230K base, M1-M2)
     - VP of Engineering ($270K-$350K base, E1)
  4. Equity education supplement (a separate document linked
     from JDs that explains pre-IPO equity value)
  5. FAQ for recruiters on handling compensation questions

  Task: Create all 5 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response creates a coherent compensation communication philosophy — articulates principles for how comp is presented (transparency, total rewards focus, honesty about ranges); addresses all 5 challenges with specific solutions; the philosophy is consistent and defensible; handles location adjustment diplomatically; addresses the internal equity tension (existing employees seeing posted ranges); the approach complies with pay transparency laws while telling the company's compensation story."
    weight: 0.35
    description: "CompPhilosophy"
  - type: llm_judge
    criteria: "Response provides practical templates and samples — the JD compensation section template is reusable across all roles; 4 sample disclosures show how the template scales across levels; each sample includes base, bonus, equity, and benefits in a clear format; the equity education supplement explains pre-IPO equity in candidate-friendly language (not finance jargon); the recruiter FAQ addresses real candidate objections (FAANG comparison, range width, location adjustment)."
    weight: 0.35
    description: "PracticalTemplates"
  - type: llm_judge
    criteria: "Response demonstrates total rewards expertise — understands how different candidates value different components (early-career: base salary; experienced: equity + base; executives: total comp); addresses the pre-IPO equity communication challenge sophisticately; the equity supplement is honest about risk (IPO is not guaranteed) while compelling about upside; the overall approach helps candidates make informed decisions and positions the company competitively against FAANG offers."
    weight: 0.30
    description: "TotalRewardsExpertise"
