meta:
  id: jd-governance-framework
  level: 4
  course: job-description-writing
  type: output
  description: "JD governance framework — design an enterprise-wide job description governance system with approval workflows and quality standards"
  tags: [governance, enterprise, approval-workflow, quality-standards, expert]

state: {}

trigger: |
  You're the CHRO of a 5,000-person multinational financial
  services company. A recent audit revealed critical JD
  governance failures:

  Audit findings:
  - 347 active JDs across the company, 40% haven't been updated
    in 3+ years
  - No centralized JD repository — teams store JDs in email,
    Google Docs, Confluence, and local drives
  - 28% of JDs don't include salary ranges (violating 4 state
    laws where you have employees)
  - No approval workflow — hiring managers post JDs without HR
    or legal review
  - 15 different JD templates in use across departments
  - JDs for the same role title have wildly different
    qualifications across offices
  - No version control — edits aren't tracked
  - 3 pending EEOC complaints reference JD language

  The Board Compensation Committee has mandated you create a
  comprehensive JD governance framework. Budget: $500K for
  implementation (includes technology, training, and consulting).

  Your framework must address:
  1. Centralized JD management system (technology and process)
  2. Standardized templates with required and optional fields
  3. Approval workflow (who reviews, in what order, SLAs)
  4. Compliance automation (flag missing salary ranges, biased
     language, outdated qualifications)
  5. Annual review cycle (how to keep 347+ JDs current)
  6. Role architecture alignment (connecting JDs to job families,
     career levels, and compensation bands)
  7. Change management (getting 200+ hiring managers to adopt
     the new system)
  8. Success metrics (how to measure governance effectiveness)

  Task: Design the complete JD governance framework. Include
  the technology recommendation, process design, approval
  workflow, and change management plan. Budget allocation
  should be realistic.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive governance framework — addresses all 8 areas with specific, actionable designs; the technology recommendation is realistic (ATS integration, JD management platform, or HR system module); approval workflows have clear RACI and SLAs; compliance automation identifies specific checks; the annual review cycle is practical for 347+ JDs; role architecture connects JDs to broader HR systems; the framework is thorough but implementable."
    weight: 0.35
    description: "ComprehensiveFramework"
  - type: llm_judge
    criteria: "Response includes realistic budget allocation and timeline — the $500K is allocated across technology, training, consulting, and change management with justification; implementation timeline is phased (not everything at once); quick wins are identified (compliance fixes first); the budget reflects real-world costs for HR technology and organizational change; includes ongoing operational costs beyond initial implementation."
    weight: 0.35
    description: "RealisticBudget"
  - type: llm_judge
    criteria: "Response addresses change management seriously — acknowledges that technology alone won't fix governance; includes a plan for training 200+ hiring managers; addresses resistance (hiring managers who see governance as bureaucracy); provides incentives and accountability mechanisms; explains how to phase adoption; success metrics measure both compliance and adoption; the change management plan is as detailed as the technical framework."
    weight: 0.30
    description: "ChangeManagement"
