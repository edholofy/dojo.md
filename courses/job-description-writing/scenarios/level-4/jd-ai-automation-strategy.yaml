meta:
  id: jd-ai-automation-strategy
  level: 4
  course: job-description-writing
  type: output
  description: "JD AI automation strategy — design a system that uses AI to generate, review, and optimize job descriptions at enterprise scale"
  tags: [ai, automation, enterprise-scale, technology, expert]

state: {}

trigger: |
  You're the VP of HR Technology at a 15,000-person global
  company. The CEO has seen demos of AI-powered JD tools and
  wants to "automate JD writing." You need to design a
  thoughtful AI strategy that goes beyond the hype.

  Current state:
  - 1,200 active JDs across 30 countries
  - 800 new JDs written per year
  - Average time to create a JD: 4.5 days (multiple reviews)
  - 60% of recruiter time on JDs is spent on revisions
  - JD quality score (internal audit): 62/100 average
  - 3 FTE dedicated to JD management

  CEO's ask: "Use AI to write all our JDs. Should save us
  millions and be way better than what hiring managers write."

  Your assessment of AI JD tools (you've evaluated 6 vendors):
  - Strengths: Faster first drafts, inclusive language checking,
    keyword optimization, consistency across JDs, multi-language
    support
  - Weaknesses: Hallucinate requirements, generate generic JDs,
    struggle with nuanced roles, can perpetuate bias from
    training data, legal review still needed, miss company-
    specific context
  - Risk: Over-reliance could produce compliant but soulless
    JDs that all sound identical

  Available AI capabilities:
  1. JD generation from role brief (hiring manager inputs)
  2. Inclusive language analysis and suggestions
  3. Competitive benchmarking (compare against market JDs)
  4. ATS keyword optimization
  5. Compliance checking (multi-jurisdiction)
  6. Translation and cultural adaptation
  7. JD performance analytics (correlate JD text with
     application volume and quality)

  Budget: $300K first year (technology + implementation)
  Goal: Reduce JD creation time by 60%, improve quality
  score from 62 to 85+

  Task: Design the AI-powered JD strategy. Include the human-
  AI workflow, risk mitigation, vendor evaluation criteria,
  implementation roadmap, and realistic expectations for what
  AI can and cannot do. Counter the CEO's "automate everything"
  with a nuanced approach.

assertions:
  - type: llm_judge
    criteria: "Response designs a nuanced AI strategy — goes beyond 'use AI to write JDs'; defines a human-AI workflow where AI assists but humans own quality; identifies which of the 7 capabilities to prioritize and why; addresses risks (bias perpetuation, generic output, hallucinated requirements); includes vendor evaluation criteria; the strategy is specific enough to implement but flexible enough to evolve; manages the CEO's expectations honestly."
    weight: 0.35
    description: "NuancedStrategy"
  - type: llm_judge
    criteria: "Response includes a realistic implementation roadmap — phases implementation logically (start with compliance checking, then generation, then optimization); includes pilot program design; defines success metrics beyond time savings (quality scores, diversity of applicant pool, hiring manager satisfaction); the $300K budget is allocated realistically across technology licensing, integration, training, and change management; timeline accounts for procurement, integration, and adoption."
    weight: 0.35
    description: "RealisticRoadmap"
  - type: llm_judge
    criteria: "Response demonstrates AI and HR technology expertise — understands AI capabilities and limitations specifically for JD writing; addresses data privacy concerns (feeding JDs into external AI models); considers multi-language and multi-country implications; explains how to maintain brand voice with AI-generated content; proposes quality assurance processes; the response would work as an actual board-ready strategy document."
    weight: 0.30
    description: "TechExpertise"
