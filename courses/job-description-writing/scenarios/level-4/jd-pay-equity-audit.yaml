meta:
  id: jd-pay-equity-audit
  level: 4
  course: job-description-writing
  type: output
  description: "Pay equity audit via JDs — conduct a pay equity analysis using job descriptions to identify and remediate compensation disparities"
  tags: [pay-equity, compensation, audit, disparities, remediation, expert]

state: {}

trigger: |
  You're the VP of Total Rewards at a 2,500-person technology
  company. A proactive pay equity audit has revealed concerning
  patterns that trace back to job descriptions:

  Audit findings:
  1. Title inflation in male-dominated teams: "Senior Engineer"
     in the infrastructure team (85% male) has the same
     qualifications as "Engineer II" in the QA team (60% female),
     but Senior Engineer pays $30K more

  2. Gendered role families: "Office Manager" ($55K avg, 92%
     female) and "Facilities Coordinator" ($72K avg, 78% male)
     have 80% overlapping responsibilities

  3. Geographic arbitrage in JDs: Remote JDs for the same role
     show different salary ranges — candidates in lower cost-of-
     living areas are disproportionately women and minorities

  4. Credential premium bias: Roles requiring "MBA preferred"
     pay $25K more on average, but performance data shows no
     correlation between MBA and job performance for these roles

  5. Level compression: 3 different "Director" titles across
     departments have salary ranges spanning $120K-$250K with
     no clear distinction in scope

  Your task involves:
  - Analyze these 5 findings and explain the JD-related root
    causes
  - Create a remediation plan that addresses each disparity
    through JD reform
  - Design a new JD framework that prevents future pay equity
    issues
  - Write before/after JDs for 2 of the problematic roles
  - Create a pay equity monitoring dashboard specification

  Budget: $150K for remediation
  Timeline: Complete within 6 months
  Risk: The audit findings could become discoverable in
  litigation — handle with appropriate legal sensitivity

  Task: Create the complete pay equity remediation plan
  centered on JD reform.

assertions:
  - type: llm_judge
    criteria: "Response provides thorough root cause analysis — explains how each of the 5 findings connects to JD practices; identifies systemic issues (title inflation, gendered role families, credential bias) not just individual problems; quantifies the impact where possible; addresses the litigation risk with appropriate legal sensitivity (privilege considerations, remediation framing); the analysis would help leadership understand how JDs contribute to pay inequity."
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Response creates an actionable remediation plan — addresses each disparity with specific JD-centered solutions; includes title standardization, role family consolidation, credential requirement review, geographic compensation philosophy; the before/after JDs demonstrate concrete improvements; the plan is phased and realistic for 6 months and $150K; includes legal review integration and communication strategy for affected employees."
    weight: 0.35
    description: "RemediationPlan"
  - type: llm_judge
    criteria: "Response designs ongoing prevention — the JD framework prevents future pay equity issues through structural design (standardized leveling, required justification for credential requirements, bias-checking tools); the dashboard specification includes meaningful metrics (pay gap by job family, title consistency scores, credential utilization rates); the monitoring system would catch emerging disparities before they become systemic; demonstrates deep compensation and equity expertise."
    weight: 0.30
    description: "OngoingPrevention"
