meta:
  id: jd-workforce-transformation
  level: 4
  course: job-description-writing
  type: output
  description: "Workforce transformation JDs — rewrite job descriptions for an entire function being transformed by AI and automation"
  tags: [transformation, ai-impact, reskilling, future-of-work, expert]

state: {}

trigger: |
  You're the CHRO of a 3,500-person insurance company. The CEO
  has announced a 3-year "Digital Transformation" initiative
  that will fundamentally change how claims are processed. AI
  and automation will handle 70% of routine claims, transforming
  the role of 400 claims adjusters.

  Current Claims Department (400 people):
  - 250 Claims Adjusters (process routine claims manually)
  - 80 Senior Claims Adjusters (handle complex claims)
  - 40 Claims Supervisors (manage teams of 8-12)
  - 20 Claims Managers (oversee regions)
  - 10 Claims Directors (strategy and compliance)

  Future Claims Department (250 people, 3-year transition):
  - 0 routine Claims Adjusters (automated)
  - 120 Complex Claims Specialists (human judgment required)
  - 50 AI Claims Reviewers (review AI decisions, handle appeals)
  - 30 Claims Experience Designers (design automated workflows)
  - 25 Claims Data Analysts (monitor AI performance, identify
    bias)
  - 15 Claims Technology Partners (bridge between claims and
    engineering)
  - 10 Claims Operations Leaders (transformed management role)

  The challenge:
  - 150 positions will be eliminated over 3 years
  - 250 positions will be fundamentally transformed
  - You need to write JDs for roles that don't exist yet
  - Must balance honest communication with avoiding mass panic
  - Union (OPEIU) represents 200 of the claims adjusters
  - Reskilling program budget: $5M over 3 years
  - Public commitment: "No involuntary layoffs" — all reductions
    through attrition, early retirement, and redeployment

  Task: Write JDs for 3 of the new roles (Complex Claims
  Specialist, AI Claims Reviewer, Claims Experience Designer),
  a transition communication framework for affected employees,
  and the reskilling pathway that maps current skills to future
  roles.

assertions:
  - type: llm_judge
    criteria: "Response creates compelling JDs for 3 new roles — each role is well-defined despite being novel; the Complex Claims Specialist emphasizes human judgment and empathy; the AI Claims Reviewer role clearly describes human-AI collaboration; the Claims Experience Designer combines process design with technology; all JDs include realistic qualifications that current employees could develop; compensation levels are appropriate for transformed roles."
    weight: 0.35
    description: "TransformedRoleJDs"
  - type: llm_judge
    criteria: "Response creates a thoughtful transition communication framework — acknowledges employee anxiety honestly; explains the transformation timeline clearly; emphasizes the 'no involuntary layoffs' commitment with specifics; addresses union considerations; provides individual-level messaging (what this means for YOU); the communication is neither falsely optimistic nor panic-inducing; includes manager talking points and FAQ."
    weight: 0.35
    description: "TransitionCommunication"
  - type: llm_judge
    criteria: "Response designs practical reskilling pathways — maps current claims adjuster skills to future role requirements; identifies transferable skills and skill gaps; the reskilling program is realistic within $5M budget; includes timeline and milestones; considers that not all employees will want to or can reskill; provides multiple pathways (not one-size-fits-all); accounts for age, tenure, and learning style diversity among 400 affected employees."
    weight: 0.30
    description: "ReskillingPathways"
