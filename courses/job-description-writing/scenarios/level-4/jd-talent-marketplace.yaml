meta:
  id: jd-talent-marketplace
  level: 4
  course: job-description-writing
  type: output
  description: "Internal talent marketplace — design JDs and role descriptions for an internal talent marketplace platform"
  tags: [talent-marketplace, internal-mobility, skills-matching, platform, expert]

state: {}

trigger: |
  You're the VP of People at a 4,000-person professional
  services firm. Employee surveys consistently show that
  "lack of career development" is the #1 reason people leave
  (32% of voluntary attrition). Exit interviews reveal that
  most departing employees didn't know about internal
  opportunities that would have kept them.

  The CEO has approved an internal talent marketplace — a
  platform where employees can discover opportunities, projects,
  mentorships, and stretch assignments. You need to design the
  role description framework that powers it.

  The marketplace will include 4 types of opportunities:
  1. Full-time internal transfers (permanent moves between teams)
  2. Project-based gigs (20-40% of time for 3-6 months)
  3. Stretch assignments (10-20% of time, developmental)
  4. Mentorship/shadow opportunities (5-10% of time)

  Current problems:
  - Internal JDs are copy-pasted from external postings (wrong
    audience — internal candidates already know the company)
  - No framework for gigs, stretch assignments, or mentorship
    opportunities (they happen informally or not at all)
  - Managers hoard talent — no incentive to let their people
    explore
  - Skills taxonomy doesn't exist — can't match people to
    opportunities
  - No way to track skills developed through marketplace
    participation

  Your deliverables:
  1. Opportunity description templates for all 4 types
  2. Skills taxonomy framework (how skills are tagged and
     matched to opportunities)
  3. Manager guidelines (how to post opportunities and
     support employee participation)
  4. Sample descriptions: 1 internal transfer, 1 project gig,
     1 stretch assignment, 1 mentorship opportunity
  5. Success metrics for the marketplace

  Task: Design the internal talent marketplace framework with
  all deliverables.

assertions:
  - type: llm_judge
    criteria: "Response creates distinct templates for all 4 opportunity types — each template is appropriately different (full transfer JD is comprehensive, gig descriptions are time-bounded and scope-focused, stretch assignments emphasize learning goals, mentorship opportunities focus on relationship dynamics); templates are written for an internal audience (no company overview needed, reference internal systems and processes); each template includes skills tags, time commitment, and manager approval requirements."
    weight: 0.35
    description: "DistinctTemplates"
  - type: llm_judge
    criteria: "Response designs a practical skills taxonomy — creates a framework for categorizing and matching skills to opportunities; distinguishes between technical skills, leadership skills, and domain knowledge; explains how skills are validated (self-reported, manager-confirmed, assessment-based); the taxonomy is extensible but not overwhelming; addresses how marketplace participation develops and records new skills; the matching logic is clear and useful."
    weight: 0.35
    description: "SkillsTaxonomy"
  - type: llm_judge
    criteria: "Response addresses the organizational dynamics — tackles the talent hoarding problem with specific solutions (manager incentives, participation goals, backfill support); the manager guidelines are practical and address real concerns (what if my best person wants to leave?); success metrics go beyond participation counts (retention improvement, skill development, promotion rates); the framework would actually reduce the 32% attrition driven by career development concerns."
    weight: 0.30
    description: "OrganizationalDynamics"
