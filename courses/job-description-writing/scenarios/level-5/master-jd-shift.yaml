meta:
  id: master-jd-shift
  level: 5
  course: job-description-writing
  type: output
  description: "Master JD shift — navigate a scenario where a company's job descriptions become the center of a congressional investigation and public reckoning"
  tags: [shift, congressional-investigation, systemic-reform, public-crisis, master]

state: {}

trigger: |
  You're the Chief People Officer of a Fortune 50 technology
  company (150,000 employees globally, $200B market cap). A
  congressional investigation into "Discriminatory Hiring
  Practices in Big Tech" has subpoenaed your company's entire
  JD library, hiring data, and internal communications about
  hiring practices over the past 5 years.

  The investigation's preliminary findings (leaked to the press):
  1. Your company's JDs for technical roles systematically
     require credentials (PhD, top-10 CS programs) that
     disproportionately exclude Black and Hispanic candidates
  2. Age-coded language in 60% of JDs ("digital native,"
     "startup mentality," "recent graduate preferred")
  3. Internal emails show hiring managers explicitly requesting
     JDs be written to attract "young, hungry" candidates
  4. Pay transparency: Your company lobbied against state pay
     transparency laws while internally using salary ranges
     that show $40K+ gaps between demographic groups in
     identical roles
  5. AI screening: Your ATS AI, trained on historical JDs and
     hiring decisions, was found to systematically down-rank
     candidates from HBCUs and women's colleges
  6. H-1B visa manipulation: JDs for roles filled by visa
     holders were found to have artificially inflated
     requirements to justify that "no qualified US workers
     are available" — a violation of DOL regulations

  Simultaneous pressures:
  - Congressional hearing in 3 weeks (you'll testify)
  - SEC investigation into pay equity disclosures
  - Class-action lawsuit filed by 500+ rejected candidates
  - Employee walkout planned by internal DEI advocates
  - Stock price dropped 8% on the investigation news
  - Major government contracts ($3B) under review pending
     investigation outcome
  - Activist investors calling for leadership changes

  Your deliverables:
  1. Congressional testimony preparation (opening statement +
     anticipated Q&A with honest, defensible answers)
  2. Immediate remediation plan (what you're doing in the next
     30 days)
  3. Systemic reform plan (what you're doing over 12 months)
  4. Internal communication to 150,000 employees
  5. Board presentation on the path forward

  Task: Create all 5 deliverables. This is a career-defining
  moment — be honest, be accountable, and propose reforms that
  would actually fix the systemic issues, not just optics.

assertions:
  - type: llm_judge
    criteria: "Response creates credible congressional testimony — the opening statement acknowledges failures without creating additional legal liability; anticipated Q&A addresses each of the 6 findings with honest, defensible answers; demonstrates accountability (not deflection or corporate speak); proposes concrete reforms that would satisfy congressional scrutiny; the testimony is prepared for hostile questioning from both parties; reflects understanding of how congressional hearings work."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "Response provides both immediate and systemic reform plans — the 30-day plan includes tangible actions (JD audit, AI screening suspension, pay equity review, removal of credential inflation); the 12-month plan addresses root causes (hiring manager accountability, JD governance, AI bias auditing, compensation restructuring, H-1B compliance overhaul); reforms are specific enough to be verifiable; addresses all 6 findings with dedicated remediation; the plans would withstand scrutiny from Congress, SEC, and the court."
    weight: 0.35
    description: "ReformPlans"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder crisis expertly — employee communication is honest and inspiring (addresses walkout concerns); board presentation addresses stock price, government contracts, and leadership accountability; balances legal caution with moral accountability; the response demonstrates the courage to propose real change (not just PR management); addresses the H-1B finding honestly (this is potentially criminal, not just civil); the overall response would help the company survive and genuinely reform."
    weight: 0.30
    description: "CrisisNavigation"
