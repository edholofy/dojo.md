meta:
  id: jd-ethical-ai-hiring
  level: 5
  course: job-description-writing
  type: output
  description: "Ethical AI in hiring JDs — develop ethical guidelines and audit frameworks for AI-generated and AI-screened job descriptions"
  tags: [ethics, ai, bias, audit, responsible-ai, master]

state: {}

trigger: |
  You're the Chief Ethics Officer at a major HR technology
  company that serves 10,000+ employers and processes 50
  million job applications annually. Your platform uses AI to:
  - Generate JD drafts from hiring manager inputs
  - Optimize JDs for inclusivity and searchability
  - Match candidates to JDs based on skills analysis
  - Predict application rates and quality for JD variations

  A whistleblower has leaked internal data showing:
  1. Your AI-generated JDs systematically use more "agentic"
     language (competitive, driven, assertive) for roles paying
     $100K+ and more "communal" language (supportive, collaborative,
     team-oriented) for roles paying under $60K — reinforcing
     gendered pay hierarchies

  2. The JD optimizer recommends removing "accommodation available"
     language because it correlates with lower application rates
     — prioritizing volume over inclusion

  3. Skills-matching algorithms trained on historical hiring data
     perpetuate the credentials of previously successful
     candidates (predominantly white, male, Ivy League-educated
     for senior roles)

  4. JD performance predictions are least accurate for roles in
     industries with historically underrepresented workforces,
     creating a feedback loop of poor JDs for diverse hiring

  5. Employers using your "diversity-optimized" JD mode receive
     more diverse applicant pools but have lower offer acceptance
     rates — suggesting the JDs attract candidates who are then
     screened out by biased interview processes downstream

  The CEO has asked you to:
  1. Create an AI Ethics Framework for JD products
  2. Design a bias audit methodology for AI-generated JDs
  3. Develop transparency standards (what should employers and
     candidates know about AI involvement?)
  4. Write the public-facing Responsible AI Report for JD
     products
  5. Recommend product changes to address each of the 5 findings

  Regulatory context: NYC Local Law 144 (AI bias audit for
  automated employment decisions), EU AI Act (high-risk AI
  classification for employment), Illinois AI Video Interview
  Act

  Task: Create all 5 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous AI Ethics Framework — addresses all 5 whistleblower findings with specific principles and guardrails; the framework goes beyond generic 'AI ethics' to be specifically about JD and hiring AI; includes accountability mechanisms (who is responsible when AI creates biased JDs — the platform, the employer, or both?); addresses the tension between optimization (more applications) and equity (inclusive language); the framework is informed by NYC LL144, EU AI Act, and emerging AI governance standards."
    weight: 0.35
    description: "EthicsFramework"
  - type: llm_judge
    criteria: "Response designs a practical bias audit methodology — specifies what to measure (gendered language ratios, accommodation language presence, credential bias, accuracy disparities); defines audit frequency and triggers; includes statistical tests appropriate for detecting bias in generated text; addresses the 5 specific findings with targeted audit procedures; the methodology could be implemented by a real AI ethics team; includes both pre-deployment and post-deployment monitoring."
    weight: 0.35
    description: "BiasAuditMethodology"
  - type: llm_judge
    criteria: "Response addresses transparency and product recommendations — the transparency standards are specific about what employers and candidates should know; the Responsible AI Report is honest about findings and remediation (not whitewashing); product change recommendations are technically feasible and address root causes, not just symptoms; the overall response demonstrates deep understanding of AI ethics in the employment context; the deliverables would build trust with employers, candidates, regulators, and the public."
    weight: 0.30
    description: "TransparencyAndRemediation"
