meta:
  id: jd-cross-industry-research
  level: 5
  course: job-description-writing
  type: output
  description: "Cross-industry JD research — conduct a comprehensive cross-industry analysis of job description practices and their impact on hiring outcomes"
  tags: [research, cross-industry, analysis, hiring-outcomes, master]

state: {}

trigger: |
  You're the Research Director at a workforce analytics firm.
  Your team has access to the largest JD dataset in the world:
  10 million job descriptions across 20 industries, 50
  countries, and 15 years (2011-2026), along with corresponding
  hiring outcome data (application volume, time-to-fill, offer
  acceptance, 1-year retention, diversity metrics).

  Your Board has asked for a landmark research report: "The
  State of Job Descriptions 2026 — What Works, What Doesn't,
  and What's Next."

  Your analysis should cover:

  1. Evolution Analysis (2011-2026):
     - How have JDs changed in length, language, and structure?
     - What trends emerged (pay transparency, DEI language,
       remote work mentions, AI references)?
     - What remained stubbornly unchanged?

  2. Effectiveness Analysis:
     - Which JD elements correlate with higher application rates?
     - Which correlate with better quality of hire (1-year
       retention)?
     - Is there a tension between volume and quality? (Do JDs
       that attract more applicants produce worse hires?)

  3. Industry Benchmarks:
     - How do JD practices differ across tech, healthcare,
       finance, manufacturing, and retail?
     - Which industry has the "best" JD practices and why?
     - Where are the biggest improvement opportunities?

  4. Diversity Impact:
     - Which JD practices most strongly correlate with diverse
       applicant pools?
     - Does inclusive language in JDs translate to diverse hires
       (or just diverse applicants)?
     - What's the salary range transparency effect on gender
       pay gap?

  5. AI Impact (2023-2026):
     - How has AI-generated JD content affected quality?
     - Are AI-written JDs producing better hiring outcomes?
     - The homogenization problem: Are all JDs starting to
       sound the same?

  6. Predictive Model:
     - Based on the data, what does the "ideal" JD look like?
     - Can you predict time-to-fill from JD text alone?
     - What are the 10 most impactful changes any company
       can make to their JDs?

  Task: Write the comprehensive research report with findings,
  data visualizations (described), and actionable recommendations.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive research report — covers all 6 analysis areas with specific findings and data points (can be realistic estimates if not exact); includes trend analysis with temporal data; industry benchmarks are specific and differentiated; the report reads like a genuine workforce analytics publication; data visualizations are described clearly enough to imagine; the length and depth reflect a landmark annual report."
    weight: 0.35
    description: "ComprehensiveReport"
  - type: llm_judge
    criteria: "Response provides actionable recommendations — the '10 most impactful changes' are specific, ranked, and evidence-based; recommendations distinguish between quick wins and strategic investments; addresses different company sizes and industries; the predictive model findings are translated into practical guidance; recommendations are bold enough to be interesting but grounded enough to be credible; the report would be cited by HR leaders making JD strategy decisions."
    weight: 0.35
    description: "ActionableRecommendations"
  - type: llm_judge
    criteria: "Response demonstrates research rigor — acknowledges limitations and confounding variables; distinguishes correlation from causation; addresses the AI impact honestly (not just hype or fear); the diversity analysis is nuanced (diverse applicants vs diverse hires is a critical distinction); the evolution analysis identifies genuinely surprising or counter-intuitive findings; the overall report advances understanding of JD effectiveness beyond conventional wisdom."
    weight: 0.30
    description: "ResearchRigor"
