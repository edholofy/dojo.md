meta:
  id: jd-cultural-transformation
  level: 5
  course: job-description-writing
  type: output
  description: "Cultural transformation through JDs — use job descriptions as a lever for transforming organizational culture at a 30,000-person company"
  tags: [cultural-transformation, organizational-change, language, values, master]

state: {}

trigger: |
  You're a senior organizational psychologist engaged by the
  CEO of a 30,000-person defense contractor that is
  undergoing a mandated cultural transformation. The company
  lost a $2B contract because the government client cited
  "toxic organizational culture" and "inability to attract
  diverse talent" as disqualifying factors.

  The culture audit revealed:
  - Military-hierarchical culture: Rigid chains of command,
    titles like "Division Commander" for civilian roles
  - Exclusionary language embedded in operations: "warrior
    mindset," "battle-tested," "mission-critical personnel"
  - Homogeneous leadership: 94% male, 89% white at VP+ level
  - Innovation deficit: Culture suppresses dissent and
    creativity (compared to competitors like SpaceX, Palantir)
  - Attrition crisis: 28% annual turnover among employees
    under 35 and female engineers
  - Glassdoor: 2.8/5 rating, with reviews citing "old boys
    club" and "feels like the military but without the mission"

  JD findings specifically:
  - 600+ JDs use militaristic language inappropriately
  - "Must have active security clearance" used on 40% of roles
    where it isn't actually required (screens out diverse
    candidates who haven't had access to clearance opportunities)
  - No remote work options despite 60% of competitors offering
    them
  - JDs emphasize obedience and compliance over innovation
  - Zero mention of employee development, flexibility, or
    work-life balance

  The CEO's mandate: "Our JDs are a mirror of our culture.
  Fix the mirror and you start to fix the culture. I need
  someone to tell me the hard truth about what our JDs say
  about who we are — and redesign them to reflect who we
  need to become."

  Budget: $2M over 24 months for the JD/culture workstream
  Constraint: Can't alienate the existing workforce (many are
  proud veterans who take the military language as identity)

  Task: Create the cultural transformation strategy using JDs
  as the primary lever, including the cultural audit findings
  report, the transformation roadmap, sample before/after JDs
  for 3 roles, and the change management plan that respects
  existing employees while driving necessary change.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling cultural audit and transformation strategy — the analysis honestly diagnoses how JDs reflect and reinforce the toxic culture; identifies specific language patterns and their impact; the transformation roadmap is phased over 24 months with clear milestones; connects JD reform to broader cultural change (JDs alone won't fix culture, but they're a powerful lever); the strategy is ambitious but realistic for $2M."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response provides effective before/after JDs for 3 roles — demonstrates the transformation from militaristic/exclusionary to inclusive/innovative language; removes unnecessary security clearance requirements where justified; introduces remote work options; balances mission seriousness with modern workplace values; the 'after' JDs still feel appropriate for defense/aerospace (not overly casual) while being dramatically more inclusive; shows the transformation is possible without losing the company's identity."
    weight: 0.35
    description: "BeforeAfterJDs"
  - type: llm_judge
    criteria: "Response navigates the change management challenge expertly — respects veterans and existing employees who identify with military culture; doesn't frame the transformation as 'your culture is bad' but as 'we need to evolve to win'; involves existing employees as change agents; addresses the security clearance issue without dismissing legitimate security needs; the communication plan avoids alienating 30,000 current employees while attracting the diverse talent the company needs; demonstrates emotional intelligence alongside strategic thinking."
    weight: 0.30
    description: "ChangeManagement"
