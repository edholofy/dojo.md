meta:
  id: jd-skills-based-org
  level: 5
  course: job-description-writing
  type: output
  description: "Skills-based organization — design a post-JD talent system where skills replace traditional job descriptions entirely"
  tags: [skills-based, post-jd, future-of-work, organizational-design, master]

state: {}

trigger: |
  You're the Chief People Officer at Unilever (a real pioneer
  of skills-based organization). The CEO of a Fortune 100
  technology company ($40B revenue, 80,000 employees) has
  engaged you as an advisor. They want to move to a fully
  skills-based talent model — and potentially eliminate
  traditional job descriptions entirely.

  Their vision: "Instead of hiring for 'Senior Product Manager'
  with a fixed JD, we want to hire for a bundle of skills
  (strategic thinking, data analysis, stakeholder management,
  market research) and deploy people to work that matches their
  skills, regardless of traditional role boundaries."

  Current state:
  - 8,500 unique job titles
  - Traditional JDs for every role
  - Rigid organizational hierarchy (8 levels)
  - Skills data: Currently zero — they don't know what skills
    their 80,000 employees have
  - Technology: Workday HRIS, no skills intelligence platform

  The ask:
  1. Skills Taxonomy Design: How to categorize skills for an
     80,000-person tech company (technical, leadership,
     functional, industry)
  2. "Skill Profiles" vs. Job Descriptions: What replaces the
     traditional JD? Design the new format
  3. Talent Deployment Model: How do you match people to work
     in a skills-based system?
  4. Transition Roadmap: How to move 80,000 people from JDs to
     skills profiles over 3 years
  5. Risk Analysis: What breaks when you eliminate JDs?
     (Compensation structures, legal compliance, organizational
     clarity, career paths)
  6. Hybrid Model Recommendation: Should they go fully skills-
     based or maintain a hybrid approach? Make a recommendation
     with evidence

  Budget: $50M over 3 years (technology, consulting, change
  management)

  Task: Create the comprehensive advisory deliverable covering
  all 6 areas.

assertions:
  - type: llm_judge
    criteria: "Response creates a sophisticated skills-based organization design — the skills taxonomy is comprehensive but practical (not 10,000 skills); skill profiles are genuinely different from repackaged JDs; the talent deployment model explains how work gets matched to people; references real-world examples (Unilever, Ericsson, Novartis, or others who have attempted this); the design acknowledges that skills-based organization is fundamentally different from relabeling existing structures."
    weight: 0.35
    description: "SkillsBasedDesign"
  - type: llm_judge
    criteria: "Response provides honest risk analysis and recommendation — identifies real risks of eliminating JDs (legal compliance gaps, compensation structure breakdown, loss of organizational clarity, career path confusion, manager resistance); the hybrid model recommendation is nuanced and evidence-based (not just 'do both'); addresses technology requirements realistically ($50M budget allocation); the recommendation would work for a Fortune 100 scale company."
    weight: 0.35
    description: "RiskAndRecommendation"
  - type: llm_judge
    criteria: "Response includes a realistic transition roadmap — phased approach over 3 years with clear milestones; addresses the 'zero skills data' starting point; includes technology implementation (skills intelligence platform); change management for 80,000 employees; pilot program design; addresses union/legal considerations; the $50M budget is allocated realistically; the roadmap accounts for organizational fatigue and competing priorities; demonstrates genuine CPO-level advisory expertise."
    weight: 0.30
    description: "TransitionRoadmap"
