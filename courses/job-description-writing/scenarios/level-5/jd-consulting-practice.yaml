meta:
  id: jd-consulting-practice
  level: 5
  course: job-description-writing
  type: output
  description: "JD consulting practice — build a consulting practice specializing in job description optimization and talent attraction strategy"
  tags: [consulting, practice-building, talent-strategy, business-development, master]

state: {}

trigger: |
  You're a former CHRO who is launching a boutique consulting
  firm specializing in Job Description Strategy & Talent
  Attraction Optimization. Your thesis: JDs are the most
  underinvested touchpoint in the talent acquisition funnel,
  and companies that invest in JD excellence gain measurable
  competitive advantage in hiring.

  Your firm will offer 5 service lines:

  1. JD Audit & Compliance Review ($25K-$75K per engagement)
     - Legal compliance across all jurisdictions
     - Inclusive language analysis
     - ATS optimization assessment
     - Pay equity implications

  2. JD Transformation Program ($100K-$250K)
     - Full JD library rewrite
     - Template and governance framework
     - Hiring manager training
     - Technology implementation support

  3. Employer Brand Through JDs ($50K-$150K)
     - Employer voice and tone development
     - JD content strategy
     - Candidate experience optimization
     - A/B testing framework for JD effectiveness

  4. Executive & Specialized Search JD Development ($15K-$40K
     per role)
     - C-suite position specifications
     - Board recruitment profiles
     - Emerging role definition (AI, sustainability, etc.)

  5. JD Analytics & Intelligence (SaaS product, $500/month per
     company)
     - AI-powered JD scoring
     - Market benchmarking
     - Application rate prediction
     - Diversity impact modeling

  Build the following:
  1. Firm positioning and go-to-market strategy
  2. Sample engagement proposal for Service Line 2 (a $200K
     JD Transformation for a 3,000-person healthcare company)
  3. Case study demonstrating ROI (fictional but realistic)
  4. Content marketing plan for the first year

  Task: Create all 4 deliverables to launch the consulting
  practice.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible consulting firm strategy — the positioning differentiates from generalist HR consulting; go-to-market strategy identifies target clients, channels, and pricing rationale; the 5 service lines are well-defined with clear value propositions; the overall strategy is realistic for a boutique firm launch; demonstrates understanding of the consulting business model (utilization, pricing, staffing)."
    weight: 0.35
    description: "ConsultingStrategy"
  - type: llm_judge
    criteria: "Response writes a professional engagement proposal — the $200K JD Transformation proposal for a healthcare company includes scope, methodology, timeline, team, deliverables, and pricing; the proposal is structured like a real consulting proposal (executive summary, approach, work plan, team bios, pricing, terms); addresses healthcare-specific JD challenges (clinical vs non-clinical roles, compliance, credentialing); the proposal would win business."
    weight: 0.35
    description: "EngagementProposal"
  - type: llm_judge
    criteria: "Response creates a compelling case study and content plan — the case study demonstrates measurable ROI (time savings, quality improvements, diversity impact, cost reduction); the content marketing plan includes thought leadership topics, channels, cadence, and lead generation strategy; both demonstrate deep subject matter expertise; the case study would be convincing to a CHRO evaluating the firm; the content plan would build authority in the space."
    weight: 0.30
    description: "CaseStudyAndContent"
