meta:
  id: jd-behavioral-science
  level: 5
  course: job-description-writing
  type: output
  description: "Behavioral science of JDs — apply cognitive and behavioral science research to redesign how job descriptions influence candidate behavior"
  tags: [behavioral-science, psychology, candidate-behavior, research, master]

state: {}

trigger: |
  You're a behavioral scientist at a leading research
  university, and a major job platform (think LinkedIn or
  Indeed) has funded your research lab to study "The Behavioral
  Science of Job Descriptions." Your $2M, 3-year research
  grant requires you to produce actionable findings.

  Your research questions:
  1. Decision Architecture: How does JD structure (order of
     information, formatting, length) affect application
     decisions? What's the "JD nudge" equivalent of default
     opt-in?

  2. Confidence Gap: Research shows women apply when they meet
     100% of qualifications, men at 60%. How can JD design
     reduce this confidence gap without lowering standards?

  3. Anchoring Effects: How do salary ranges in JDs create
     anchoring bias? Does posting $80K-$120K anchor candidates
     to the bottom, middle, or top? How does range width affect
     perceived fairness?

  4. Choice Overload: The paradox of long requirement lists —
     more specific JDs help candidates self-select, but too
     many requirements trigger choice overload and avoidance.
     Where's the threshold?

  5. Social Proof and Signaling: How do cultural signals in JDs
     (team photos, benefit lists, mission statements) affect
     different demographic groups? Do "beer fridges" and "ping
     pong tables" signal anything beyond fun?

  6. Temporal Discounting: Candidates discount future benefits
     (career growth, learning) relative to immediate benefits
     (salary, perks). How should JDs balance present vs. future
     value?

  Year 1 deliverable: A comprehensive research report with:
  - Literature review of existing research
  - Original experiment designs for questions 1-6
  - Preliminary findings from pilot studies
  - Evidence-based JD design principles
  - A "Behaviorally-Informed JD Template" based on findings

  Task: Write the Year 1 research report.

assertions:
  - type: llm_judge
    criteria: "Response writes a credible academic research report — includes literature review with relevant studies and citations (even if fictional, they should be plausible); experiment designs are methodologically sound (sample sizes, control groups, variables, statistical approaches); addresses each of the 6 research questions with appropriate depth; the writing style is academic but accessible; the report would be credible as a university research deliverable."
    weight: 0.35
    description: "AcademicCredibility"
  - type: llm_judge
    criteria: "Response provides actionable design principles — translates research findings into practical JD writing guidelines; the 'Behaviorally-Informed JD Template' is usable (not just theoretical); addresses the confidence gap with specific language recommendations; provides guidance on salary range presentation, requirement list length, and cultural signaling; each principle is backed by the research evidence presented; the principles would be useful to actual HR practitioners."
    weight: 0.35
    description: "ActionablePrinciples"
  - type: llm_judge
    criteria: "Response demonstrates interdisciplinary expertise — integrates behavioral economics (nudge theory, anchoring, choice overload), social psychology (confidence gap, social proof, signaling), cognitive science (decision architecture, temporal discounting), and labor economics; the experiment designs are creative and feasible; preliminary findings are plausible and nuanced (not everything confirms the hypothesis); the report advances understanding beyond surface-level observations."
    weight: 0.30
    description: "InterdisciplinaryExpertise"
