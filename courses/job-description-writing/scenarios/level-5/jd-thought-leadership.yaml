meta:
  id: jd-thought-leadership
  level: 5
  course: job-description-writing
  type: output
  description: "JD thought leadership — write an industry-defining report on the future of job descriptions and talent attraction"
  tags: [thought-leadership, future-of-work, industry-report, master]

state: {}

trigger: |
  You're a Partner at a leading HR consulting firm. Harvard
  Business Review has commissioned you to write a feature
  article on "The Death and Reinvention of the Job Description."
  The premise: traditional JDs are a relic of the industrial
  age, and the future of talent attraction looks fundamentally
  different.

  Your research has uncovered:

  1. The Attention Economy Problem: Average job seekers spend
     14.6 seconds reading a JD. 73% of millennials find jobs
     through social media, not job boards. The traditional
     1,000-word JD is competing with TikTok for attention.

  2. The Skills vs. Roles Shift: LinkedIn data shows that skills
     have a half-life of 5 years. 65% of children entering
     primary school will work in jobs that don't exist yet. JDs
     anchored to static role definitions are obsolete before
     they're posted.

  3. The AI Disruption: AI can now write JDs, screen resumes,
     and match candidates — but AI-generated JDs all sound
     identical. The "AI JD paradox": better optimization,
     worse differentiation.

  4. The Transparency Revolution: Pay transparency laws in 20+
     US states, EU Pay Transparency Directive, and candidate
     expectations are forcing radical openness. JDs must now
     answer questions companies used to keep secret.

  5. The Inclusion Imperative: Research shows that JDs with
     gendered language receive 42% fewer female applicants.
     But "inclusive" JDs often become so sanitized they lose
     all personality and voice.

  6. The Gig Economy Blur: 36% of the US workforce is
     freelance/contract. Traditional JDs assume full-time
     employment in a world where work arrangements are fluid.

  Your article should:
  - Diagnose the fundamental problems with traditional JDs
  - Present 5-7 forward-looking alternatives or evolutions
  - Include real-world examples and data
  - Be provocative but practical
  - Appeal to both HR leaders and business executives

  Task: Write the HBR article (3,000-4,000 words).

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling HBR-quality article — has a strong thesis about JD reinvention; engages the reader from the opening paragraph; uses data and research effectively (the 6 trends from the prompt plus additional insights); presents 5-7 forward-looking alternatives that are genuinely innovative (not just 'write better JDs'); includes real-world examples or case studies; the writing quality is HBR-level (authoritative, evidence-based, well-structured); appropriate length (3,000-4,000 words)."
    weight: 0.35
    description: "HBRQuality"
  - type: llm_judge
    criteria: "Response is provocative but practical — challenges conventional thinking about JDs without being contrarian for its own sake; each forward-looking alternative includes implementation guidance; acknowledges trade-offs and limitations; balances futurism with today's reality; provides a roadmap for HR leaders to act on the ideas; the article would spark discussion in HR leadership circles while being actionable."
    weight: 0.35
    description: "ProvocativeAndPractical"
  - type: llm_judge
    criteria: "Response demonstrates deep expertise — shows understanding of talent acquisition, organizational design, labor law, technology trends, and behavioral science; integrates multiple disciplines (not just an HR perspective); addresses both the HR audience and business executive audience; the alternatives proposed show original thinking, not just aggregation of existing ideas; the article would establish the author as a thought leader in the space."
    weight: 0.30
    description: "DeepExpertise"
