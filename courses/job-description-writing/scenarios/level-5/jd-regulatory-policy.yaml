meta:
  id: jd-regulatory-policy
  level: 5
  course: job-description-writing
  type: output
  description: "JD regulatory policy — draft model legislation and regulatory guidance for job description transparency and fairness"
  tags: [regulatory, policy, legislation, transparency, fairness, master]

state: {}

trigger: |
  You're the Chair of a government task force on Employment
  Transparency, convened by the US Department of Labor. Your
  mandate: develop model legislation and regulatory guidance
  for job description standards that states can adopt.

  Context:
  - 25+ states have passed or proposed pay transparency laws,
    but requirements vary wildly
  - No federal standard exists for JD content or transparency
  - EEOC receives 80,000+ discrimination complaints annually;
    many trace to JD language
  - Employer groups argue that excessive regulation hurts small
    businesses
  - Worker advocacy groups demand comprehensive transparency
  - The EU Pay Transparency Directive (2023) sets an
    international precedent
  - AI-generated JDs raise new questions about accountability

  Your task force includes:
  - 3 employer-side representatives (Chamber of Commerce, SHRM,
    tech industry association)
  - 3 worker-side representatives (AFL-CIO, NAACP, disability
    rights organization)
  - 2 academic experts (labor economics, employment law)
  - 2 government officials (EEOC Commissioner, DOL Deputy
    Secretary)
  - You as independent Chair

  Deliverables:
  1. Model Job Description Transparency Act (legislative text
     with 10-12 key provisions)
  2. Regulatory guidance for implementation (detailed rules and
     exemptions)
  3. Small business impact analysis (how to avoid crushing
     small employers while maintaining standards)
  4. Dissenting perspectives summary (capture disagreements from
     task force members with responses)

  The legislation must balance:
  - Transparency and worker protection
  - Employer flexibility and competitive concerns
  - Small business burden vs. large employer accountability
  - Innovation (don't freeze JD practices in current forms)
  - Enforceability and compliance costs
  - Constitutional considerations (First Amendment, Commerce
    Clause)

  Task: Create all 4 deliverables as a comprehensive policy
  package.

assertions:
  - type: llm_judge
    criteria: "Response drafts credible model legislation — includes 10-12 specific provisions covering pay transparency, essential function requirements, anti-discrimination language standards, accommodation disclosure, salary history bans, AI disclosure (if AI-generated), and enforcement mechanisms; the provisions are structured like actual legislation (definitions, requirements, exemptions, penalties, effective dates); balances employer and worker interests; could realistically serve as model state legislation."
    weight: 0.35
    description: "ModelLegislation"
  - type: llm_judge
    criteria: "Response provides practical regulatory guidance — translates legislative provisions into implementable rules; includes examples of compliant and non-compliant JDs; addresses edge cases (small employers, confidential searches, union positions); provides safe harbor provisions; the guidance is detailed enough for employers to comply but not so prescriptive as to be unworkable; addresses AI-generated JD accountability."
    weight: 0.35
    description: "RegulatoryGuidance"
  - type: llm_judge
    criteria: "Response includes realistic impact analysis and dissent — the small business analysis honestly addresses compliance costs and proposes mitigation (phased implementation, employer size thresholds, free compliance tools); dissenting perspectives represent real arguments from both employer and worker sides; responses to dissent are substantive, not dismissive; the overall package demonstrates the complexity of labor policy and would be credible as a government task force output."
    weight: 0.30
    description: "ImpactAndDissent"
