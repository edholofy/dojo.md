meta:
  id: jd-enterprise-architecture
  level: 5
  course: job-description-writing
  type: output
  description: "Enterprise JD architecture — design the complete job architecture for a 50,000-person organization from scratch"
  tags: [enterprise-architecture, job-architecture, 50k-org, from-scratch, master]

state: {}

trigger: |
  You're the Chief People Officer at a newly formed
  conglomerate. Three mid-size companies (a healthcare system,
  a technology company, and a financial services firm) have
  merged into a single 50,000-person organization. Each company
  had its own job architecture, and the Board has mandated a
  unified system within 18 months.

  The three legacy systems:
  1. HealthCo (20,000 employees):
     - 2,500 unique job titles
     - Clinical roles with licensure requirements
     - Union-represented roles (30% of workforce)
     - JCAHO/CMS compliance requirements for clinical JDs
     - Compensation: Market-based, geographic differentials

  2. TechCo (18,000 employees):
     - 400 unique job titles (lean)
     - Engineering levels 1-8 with skills-based progression
     - No unions, high equity compensation
     - Global workforce (US, India, Israel, Ukraine)
     - Compensation: Top-of-market, location-adjusted

  3. FinanceCo (12,000 employees):
     - 1,800 unique job titles
     - Regulatory requirements (FINRA, SEC) for licensed roles
     - Heavily hierarchical (20+ management levels)
     - US-only, traditional benefits
     - Compensation: Median market, heavy bonus structure

  Your task:
  1. Design the unified job architecture (job families, sub-
     families, career levels, and role profiles)
  2. Create the governance model for maintaining 50,000 roles
  3. Address the compensation harmonization challenge
  4. Handle regulatory/licensure requirements across industries
  5. Design the JD template that works for clinical, technical,
     financial, and corporate roles
  6. Create the implementation roadmap with change management

  Budget: $5M over 18 months
  Team: 25 people (including 3 external consultants from
  Mercer/Willis Towers Watson)

  Task: Design the complete enterprise job architecture with
  all 6 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response designs a coherent unified job architecture — creates a job family structure that accommodates healthcare, technology, and financial services; career levels are standardized but allow for industry-specific variations (clinical ladders, engineering levels, financial regulatory tiers); the architecture reduces 4,700+ titles to a manageable framework without losing role specificity; governance model scales to 50,000 people; the overall design is informed by established frameworks (Hay, Mercer, Willis Towers Watson)."
    weight: 0.35
    description: "UnifiedArchitecture"
  - type: llm_judge
    criteria: "Response addresses the hardest integration challenges — compensation harmonization across three very different philosophies; regulatory requirements for clinical and financial roles; union considerations for HealthCo; global workforce for TechCo; the JD template works across fundamentally different role types; addresses employee communication about title and level changes; the solutions are practical, not theoretical."
    weight: 0.35
    description: "IntegrationChallenges"
  - type: llm_judge
    criteria: "Response includes a realistic implementation plan — $5M budget is allocated across technology, consulting, change management, and implementation; 18-month timeline is phased (architecture design → pilot → rollout); addresses the 25-person team structure; includes change management for 50,000 affected employees; identifies risks and mitigation; success metrics measure both adoption and accuracy; the plan acknowledges that job architecture is a living system requiring ongoing maintenance."
    weight: 0.30
    description: "ImplementationPlan"
