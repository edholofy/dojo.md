meta:
  id: jd-international-hiring
  level: 3
  course: job-description-writing
  type: output
  description: "International hiring JDs — write job descriptions adapted for different cultural and legal contexts across multiple countries"
  tags: [international, global-hiring, cultural-adaptation, legal, advanced]

state: {}

trigger: |
  You're the Global Talent Acquisition Director at a 2,000-
  person enterprise software company headquartered in San
  Francisco. The company is hiring the same role — Senior
  Product Manager — in three different countries simultaneously.
  Each location requires a different approach to the JD.

  Locations and considerations:

  1. United States (San Francisco or NYC)
     - Salary: $165K-$200K + equity
     - At-will employment
     - Must comply with CA/NY pay transparency laws
     - Standard US benefits (health, 401k, PTO)
     - Work authorization: Must be authorized to work in US

  2. Germany (Berlin)
     - Salary: €95K-€115K (German market rates are lower)
     - Employment contract required (not at-will)
     - 30 days minimum vacation (legally required)
     - Works council considerations
     - Probation period: 6 months (standard)
     - Must reference Teilzeit- und Befristungsgesetz (part-time
       and fixed-term employment act) compliance
     - Gender-neutral language (German law requires it)
     - No photos required on applications (EU anti-discrimination)

  3. Japan (Tokyo)
     - Salary: ¥12M-¥16M (~$80K-$107K)
     - Lifetime employment culture expectations
     - Benefits: Commuter pass, housing allowance common
     - Emphasis on team harmony and consensus-building
     - Japanese language requirements for stakeholder management
     - Different resume/application conventions

  The role is the same across all locations:
  - Own the product roadmap for the enterprise analytics module
  - Work with engineering, design, and data science teams
  - Conduct customer research and competitive analysis
  - Define metrics and measure product success
  - Present to leadership on product strategy

  Task: Write all 3 versions of the JD. Each should be
  legally compliant, culturally appropriate, and optimized
  for the local talent market while maintaining consistent
  role expectations.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 culturally and legally appropriate JDs — the US version includes pay transparency and at-will language; the German version references minimum vacation, probation period, contract employment, and gender-neutral language requirements; the Japan version reflects local employment culture, compensation norms (housing allowance, commuter pass), and language requirements; each JD would pass local legal review."
    weight: 0.35
    description: "LocalCompliance"
  - type: llm_judge
    criteria: "Response adapts tone and style for each market — the US version is direct and opportunity-focused; the German version is more structured and detail-oriented (German candidates expect thoroughness); the Japan version emphasizes team and organizational context (important in Japanese work culture); compensation is presented in local currency with local benefits; each version would resonate with local candidates."
    weight: 0.35
    description: "CulturalAdaptation"
  - type: llm_judge
    criteria: "Response maintains role consistency while adapting — the core PM responsibilities are the same across all three versions; the leadership and collaboration expectations are consistent; the seniority level is equivalent (even if titles differ by market); the JDs clearly represent the same role at the same company; differences are limited to legal, cultural, and market-specific elements; would work for a globally consistent hiring process."
    weight: 0.30
    description: "ConsistentCore"
