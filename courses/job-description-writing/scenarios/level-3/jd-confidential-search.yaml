meta:
  id: jd-confidential-search
  level: 3
  course: job-description-writing
  type: output
  description: "Confidential search JD — write a job description for a confidential executive search that protects sensitive information"
  tags: [confidential, executive-search, sensitive, discretion, advanced]

state: {}

trigger: |
  You're a Partner at an executive search firm. A client (a
  publicly traded consumer goods company, $3B revenue) has
  engaged you to find a replacement for their current CFO, who
  doesn't know they're being replaced. This is extremely
  confidential — if the current CFO or the market finds out,
  it could affect the stock price and the CFO might sabotage
  the transition.

  The situation:
  - Current CFO has been underperforming for 18 months
  - Board decided to replace during last board meeting
  - CEO and Board Chair are the only internal people who know
  - The search must be completed in 90 days
  - The company cannot be named in any posting or outreach
  - Industry: Consumer Packaged Goods (CPG)

  Role details (you can share):
  - Title: Chief Financial Officer
  - Reports to: CEO
  - Compensation: $500K-$650K base + 100% bonus target + equity
    (LTI worth $1.5M-$2.5M over 4 years)
  - Location: Headquarters in a major Midwest US city
  - Company: Public CPG company, $3B revenue, 5,000 employees,
    profitable but needs financial transformation

  Requirements:
  - Public company CFO or VP Finance experience
  - CPG or consumer industry background
  - Experience with M&A, investor relations, and board reporting
  - Track record of driving cost optimization and margin
    improvement
  - Experience leading finance teams of 50+
  - SOX compliance expertise
  - Must be willing to relocate to Midwest

  What you CANNOT reveal:
  - Company name
  - Current CFO's identity or that they're being replaced
  - Specific board dynamics or reasons for the search
  - Exact city (only "major Midwest city")
  - Any information that would allow identification of the company

  Task: Write two documents:
  1. The confidential position specification (for qualified
     candidates who sign NDAs and reach the shortlist stage)
  2. The public-facing "blind" job posting that attracts
     qualified candidates without revealing the company

assertions:
  - type: llm_judge
    criteria: "Response creates an effective blind posting — describes the opportunity compellingly without revealing the company; uses industry and size descriptors that are broad enough (CPG, $3B, Midwest) without being so vague they're useless; explains why the search is confidential without raising red flags; includes enough detail about compensation and role scope to attract qualified CFO candidates; the posting would generate interest from the right level of executive."
    weight: 0.35
    description: "EffectiveBlindPosting"
  - type: llm_judge
    criteria: "Response creates a detailed confidential spec — provides significantly more detail than the blind posting (org structure, team size, key challenges, financial transformation mandate, board reporting expectations); includes candidate profile (background, skills, experience) in detail; describes the opportunity's strategic context; this document would be shared only with NDA-signed shortlist candidates; it helps serious candidates evaluate the opportunity thoroughly."
    weight: 0.35
    description: "ConfidentialSpec"
  - type: llm_judge
    criteria: "Response demonstrates executive search expertise — understands the sensitivity dynamics (stock price, CFO sabotage risk); explains the search process (how candidates progress from blind posting to confidential spec to interviews); addresses relocation expectations appropriately; the compensation package is presented professionally; the overall approach reflects how top-tier executive search firms handle confidential mandates; protects both the client and candidate interests."
    weight: 0.30
    description: "SearchExpertise"
