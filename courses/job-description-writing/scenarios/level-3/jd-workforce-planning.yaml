meta:
  id: jd-workforce-planning
  level: 3
  course: job-description-writing
  type: output
  description: "JD workforce planning — connect job descriptions to a broader workforce planning strategy"
  tags: [workforce-planning, headcount, strategic-hiring, pipeline, advanced]

state: {}

trigger: |
  You're the Director of Talent Strategy at a 700-person
  logistics technology company. The CFO has approved 35 new
  headcount for the year, but wants the hiring plan tied to
  business objectives, not just department requests. You need
  to create JDs that connect to the workforce plan.

  Company priorities for the year:
  1. Launch automated warehouse management system (Q2)
  2. Expand into European market (Q3-Q4)
  3. Reduce customer support costs by 30% through self-service
  4. Achieve SOC 2 Type II compliance

  Approved headcount allocation:
  - Engineering: 15 positions (mix of levels)
  - Sales & BD: 8 positions (European market expansion)
  - Customer Success: 5 positions (but must reduce net headcount
    through automation — so it's 5 new hires, 3 reductions)
  - Security/Compliance: 4 positions (SOC 2 initiative)
  - Operations: 3 positions

  Your task: Write 4 JDs that each connect to a different
  company priority. For each, include a "Strategic Rationale"
  section (internal-only, not in the posting) explaining how
  this hire connects to the workforce plan.

  1. Staff Engineer — Warehouse Automation (Priority 1)
     - Salary: $180K-$220K + equity
  2. Enterprise Sales Manager — EMEA (Priority 2)
     - Salary: €100K-€130K + commission, based in London or
       Amsterdam
  3. Customer Success Automation Specialist (Priority 3)
     - Salary: $90K-$110K — must build the self-service tools
       that reduce support headcount
  4. Security & Compliance Manager (Priority 4)
     - Salary: $140K-$170K

  Task: Write all 4 JDs with their strategic rationale
  documents. Show how each role connects to the company's
  priorities and workforce plan.

assertions:
  - type: llm_judge
    criteria: "Response creates 4 JDs tied to strategic priorities — each JD clearly reflects its connected business objective; the Staff Engineer focuses on warehouse automation capabilities; the EMEA Sales Manager is written for European market context (location, language, market knowledge); the CS Automation Specialist emphasizes building self-service tools; the Security Manager focuses on SOC 2 compliance; each JD would attract candidates who can deliver on the specific business objective."
    weight: 0.35
    description: "StrategicAlignment"
  - type: llm_judge
    criteria: "Response includes strong strategic rationale documents — each rationale explains why this specific role exists in the workforce plan; connects the hire to measurable business outcomes; explains timing and urgency; notes dependencies on other hires; addresses the sensitive situation in Customer Success (hiring while reducing headcount); the rationale documents would help leadership understand ROI of each hire."
    weight: 0.35
    description: "StrategicRationale"
  - type: llm_judge
    criteria: "Response demonstrates workforce planning expertise — shows understanding of how JDs connect to business strategy; addresses the EMEA role's unique considerations (European employment, compensation, language); handles the CS team's automation-driven restructuring sensitively; considers how these 4 roles interact with the broader 35-person hiring plan; the approach would work as a template for the remaining 31 hires."
    weight: 0.30
    description: "WorkforcePlanningExpertise"
