meta:
  id: advanced-jd-shift
  level: 3
  course: job-description-writing
  type: output
  description: "Advanced JD shift — handle a scenario where legal, cultural, and business pressures simultaneously conflict in JD creation"
  tags: [shift, legal-conflict, cultural-pressure, multi-stakeholder, advanced]

state: {}

trigger: |
  You're the Head of HR at a 300-person company in a contentious
  situation. You need to write a JD for a Senior Engineering
  Manager, but you're receiving conflicting pressure from
  multiple stakeholders:

  Stakeholder 1 — CEO:
  "We need someone who 'fits our culture.' Our team is mostly
  Stanford/MIT grads in their late 20s-early 30s. I want someone
  who'll fit right in. Oh, and post it on our careers page — no
  salary range. I don't want our competitors knowing our comp
  levels."

  Stakeholder 2 — VP of Engineering:
  "I need a female engineering manager specifically. Our
  engineering leadership is 100% male and we got hammered in
  our Glassdoor reviews. Can we write the JD so that it
  attracts only women? Maybe say something like 'women
  encouraged to apply'?"

  Stakeholder 3 — Legal Counsel:
  "I've reviewed our last 10 JDs and they're all legally risky.
  We're operating in California — we MUST include salary range
  (SB 1162). And we cannot say 'cultural fit' — it's been
  successfully challenged as a proxy for discrimination.
  The 'women encouraged' language is legally dangerous too."

  Stakeholder 4 — Board Member:
  "I hear you're hiring an Engineering Manager. My nephew just
  graduated from a coding bootcamp and would be perfect. Can
  you write the JD to match his qualifications? He has 6
  months of experience."

  Role reality:
  - Senior Engineering Manager
  - Managing 15 engineers across 3 teams
  - Salary: $190K-$230K (must be included per CA law)
  - Requires 8+ years engineering experience, 3+ years
    management experience
  - San Francisco, hybrid

  Task: Write a memo to all 4 stakeholders explaining why you
  can't fulfill their requests, then write the actual JD that
  is legally compliant, genuinely inclusive, and would attract
  the best candidates regardless of background. Navigate the
  politics diplomatically.

assertions:
  - type: llm_judge
    criteria: "Response writes a diplomatic memo addressing all 4 stakeholders — explains to the CEO why salary must be included (CA law) and why 'cultural fit' is problematic; explains to the VP why gender-targeted language creates legal risk while offering legal alternatives to improve gender diversity (inclusive language, diverse sourcing, structured interviews); explains to Legal that you're aligned and incorporating their feedback; handles the Board Member's nephew request gracefully without creating liability."
    weight: 0.35
    description: "DiplomaticMemo"
  - type: llm_judge
    criteria: "Response writes a JD that threads all needles — legally compliant (salary range, no discriminatory language, proper EEO statement); genuinely inclusive (would attract diverse candidates including women without targeting by gender); appropriately rigorous (8+ years experience, management experience — the nephew can't qualify without lowering standards); culturally welcoming without being exclusionary; the JD satisfies Legal while being more than just compliance."
    weight: 0.35
    description: "ThreadsAllNeedles"
  - type: llm_judge
    criteria: "Response demonstrates HR leadership courage — doesn't simply say 'no' to stakeholders but offers constructive alternatives; provides education on why diverse teams perform better (for the CEO); suggests legal ways to improve gender representation (for the VP); protects the company from legal exposure while being practical; the response would earn the trust of all 4 stakeholders even though none got exactly what they asked for."
    weight: 0.30
    description: "HRLeadership"
