meta:
  id: jd-organizational-design
  level: 3
  course: job-description-writing
  type: output
  description: "JD organizational design — design job descriptions that reflect and support an organizational restructuring"
  tags: [org-design, restructuring, role-architecture, cross-functional, advanced]

state: {}

trigger: |
  You're the VP of People at a 400-person B2B software company
  that is restructuring from a functional organization (separate
  Engineering, Product, Design, QA departments) to a squad-based
  model (cross-functional teams of 6-8 people). This affects
  every JD in the company.

  Current state:
  - 4 functional departments with separate managers
  - Roles defined by function: "Frontend Engineer", "QA Engineer",
    "Product Manager", "UX Designer"
  - Career ladders are function-specific
  - JD library: 45 existing JDs organized by department

  Future state (12 cross-functional squads):
  - Each squad: 1 PM, 1 Designer, 4-5 Engineers, 1 QA
  - Squad leads rotate (not a permanent management role)
  - Engineers expected to be more full-stack (not just frontend
    or backend)
  - QA embedded in squads, not a separate function
  - Dual reporting: functional chapter lead + squad lead

  Your challenge: Rewrite 5 key JDs that reflect the new
  structure:

  1. Software Engineer (replacing separate Frontend/Backend JDs)
     - Salary: $120K-$160K, Level: Mid to Senior
  2. Squad Product Manager (replacing centralized PM)
     - Salary: $130K-$150K, Level: Mid
  3. Embedded Quality Engineer (replacing QA department role)
     - Salary: $100K-$130K, Level: Mid
  4. Chapter Lead, Engineering (new role — functional leadership
     without direct team management)
     - Salary: $170K-$200K, Level: Senior/Staff
  5. Squad Lead (rotational, not a separate hire — write as an
     internal role description)
     - No separate salary (additional stipend: $5K/quarter)

  Task: Write all 5 JDs/role descriptions that clearly reflect
  the squad-based model. Include a brief introduction explaining
  the organizational structure for candidates unfamiliar with
  the squad model.

assertions:
  - type: llm_judge
    criteria: "Response creates JDs that reflect the squad model — each JD clearly describes how the squad structure works; explains cross-functional collaboration as a core part of every role; the Software Engineer JD reflects full-stack expectations; the QA role is positioned as embedded, not separate; the Chapter Lead role clearly distinguishes functional leadership from squad leadership; the Squad Lead description frames it as a rotational responsibility; all roles reference the dual-reporting structure."
    weight: 0.35
    description: "SquadModelReflection"
  - type: llm_judge
    criteria: "Response includes a clear organizational context introduction — explains the squad model for external candidates (what it is, why the company chose it, how it works day-to-day); the introduction is referenced by but not repeated in each JD; helps candidates understand what working in this structure actually feels like; addresses common concerns (who's my manager, how do I grow, how are decisions made)."
    weight: 0.35
    description: "OrganizationalContext"
  - type: llm_judge
    criteria: "Response handles the complexity well — all 5 JDs are distinct and clear; salary ranges and levels are appropriate; each JD stands alone as a complete posting; the Squad Lead internal description differs appropriately from external JDs; the Chapter Lead role is well-defined (this is the hardest to explain clearly); the response demonstrates understanding of agile organizational design and its implications for hiring."
    weight: 0.30
    description: "ComplexityManagement"
