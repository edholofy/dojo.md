meta:
  id: jd-emerging-role
  level: 3
  course: job-description-writing
  type: output
  description: "Emerging role JD — write a job description for a role that doesn't yet have established market norms"
  tags: [emerging-role, ai, novel-position, market-creation, advanced]

state: {}

trigger: |
  You're the CTO at a 200-person enterprise SaaS company.
  You want to hire for a new role that doesn't have established
  market benchmarks: "AI Integration Engineer." This role sits
  at the intersection of traditional software engineering and
  AI/ML, but it's not a data scientist, ML engineer, or
  traditional SWE.

  What you need this person to do:
  - Integrate AI/LLM capabilities (OpenAI, Anthropic, open-source
    models) into existing products
  - Build prompt engineering frameworks and evaluation pipelines
  - Design retrieval-augmented generation (RAG) systems for
    enterprise data
  - Create guardrails and safety layers for AI features
  - Evaluate AI model performance and cost trade-offs
  - Work with product managers to identify high-impact AI
    applications
  - Educate engineering teams on AI integration best practices
  - Own the AI SDK/abstraction layer used by all product teams

  The challenge:
  - No established job title for this (AI Engineer? LLM Engineer?
    AI Integration Specialist? Applied AI Engineer?)
  - Unclear market rate ($140K? $200K? $250K? This role didn't
    exist 2 years ago)
  - Skills span multiple traditional roles
  - Hard to calibrate requirements when the field is 2 years old
  - Candidates may come from SWE, ML, or product backgrounds

  Context:
  - Company has 50 engineers but zero AI/ML expertise today
  - This is the first AI hire — they'll build the AI practice
  - Budget: Flexible, CEO says "pay what it takes for the
    right person"
  - Remote-first, US-based

  Task: Write the JD for this emerging role. Address the title
  question, set appropriate requirements for a role with no
  established norms, and make the opportunity compelling for
  the kind of person who thrives in ambiguity.

assertions:
  - type: llm_judge
    criteria: "Response handles the emerging role challenge — selects and justifies a job title (with consideration of alternatives); sets requirements that are rigorous but not rigid (can't demand 5 years of LLM experience when the field is 2 years old); focuses on demonstrated capability and adaptability over specific credentials; acknowledges that candidates may come from diverse backgrounds (SWE, ML, product); addresses the compensation challenge with a reasonable market-informed range."
    weight: 0.35
    description: "EmergingRoleHandling"
  - type: llm_judge
    criteria: "Response makes the opportunity uniquely compelling — positions this as a foundational role (first AI hire, building the practice); emphasizes autonomy, impact, and scope; appeals to builders who want to shape a new function, not join an established one; describes the technical work concretely enough to attract serious candidates; the JD stands out from generic 'AI Engineer' postings flooding the market."
    weight: 0.35
    description: "CompellingOpportunity"
  - type: llm_judge
    criteria: "Response demonstrates AI/ML hiring sophistication — distinguishes this role from adjacent roles (data scientist, ML engineer, traditional SWE); references relevant technologies accurately (RAG, prompt engineering, LLM evaluation); sets expectations for the build-vs-buy and model selection responsibilities; addresses safety and guardrails as a requirement; the JD would attract AI practitioners, not just engineers who added 'AI' to their LinkedIn."
    weight: 0.30
    description: "AIHiringSophistication"
