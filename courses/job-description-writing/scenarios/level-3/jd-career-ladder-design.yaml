meta:
  id: jd-career-ladder-design
  level: 3
  course: job-description-writing
  type: output
  description: "Career ladder design — create a complete career ladder with JDs for each level of a job family"
  tags: [career-ladder, leveling, job-family, progression, advanced]

state: {}

trigger: |
  You're the VP of Engineering at a 350-person company. Your
  engineering team (85 engineers) has inconsistent leveling —
  some teams have 3 levels, others have 6. This causes pay
  equity issues, confusion about promotions, and difficulty
  hiring because candidates can't compare levels across teams.

  You're creating a unified engineering career ladder with 7
  levels, and need JD-style role descriptions for each:

  Level 1: Associate Software Engineer ($70K-$90K)
  Level 2: Software Engineer ($90K-$120K)
  Level 3: Senior Software Engineer ($120K-$155K)
  Level 4: Staff Software Engineer ($155K-$190K)
  Level 5: Principal Software Engineer ($190K-$230K)
  Level 6: Distinguished Engineer ($230K-$275K)
  Level 7: Fellow ($275K-$330K)

  For each level, define:
  - Scope of impact (individual → team → org → company → industry)
  - Technical skills expected
  - Leadership/influence expectations
  - Autonomy level
  - Typical experience (as a guideline, not requirement)
  - Key differentiator from the level below

  Additional context:
  - Levels 1-3 are used for external hiring JDs
  - Levels 4-5 are used for both external hiring and internal
    promotion
  - Levels 6-7 are primarily internal promotions (rarely hired
    externally)
  - The IC (individual contributor) track goes all the way to
    Level 7 — no management required

  Task: Create the full 7-level career ladder with role
  descriptions. Each level should clearly differentiate from
  adjacent levels. Include a summary matrix and write complete
  external-facing JDs for Levels 2 and 4 (most commonly hired).

assertions:
  - type: llm_judge
    criteria: "Response creates a coherent 7-level career ladder — each level has clear scope, skills, leadership, autonomy, and experience descriptions; the progression from L1 to L7 is logical (individual → team → org → company → industry impact); each level's key differentiator from the level below is specific and clear; salary bands don't overlap awkwardly; the ladder would help engineers understand what's needed for promotion; the IC track is valued equally to management throughout."
    weight: 0.35
    description: "CoherentLadder"
  - type: llm_judge
    criteria: "Response writes strong external JDs for L2 and L4 — the L2 (Software Engineer) JD is welcoming and focuses on growth potential; the L4 (Staff Engineer) JD emphasizes technical leadership and cross-team impact; both JDs are complete (responsibilities, qualifications, compensation, benefits); the JDs clearly reflect their ladder level without being internal documents; a candidate could read both and accurately self-level."
    weight: 0.35
    description: "ExternalJDs"
  - type: llm_judge
    criteria: "Response includes a practical summary matrix — provides a visual or tabular comparison across all 7 levels; highlights the key dimensions (scope, autonomy, leadership) at each level; the matrix is useful as a quick reference for hiring managers and HR; distinguishes between the hiring-focused levels (1-3) and promotion-focused levels (6-7); the overall deliverable would actually work as an engineering career framework document."
    weight: 0.30
    description: "PracticalMatrix"
