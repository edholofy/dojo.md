meta:
  id: jd-legal-compliance-framework
  level: 3
  course: job-description-writing
  type: output
  description: "JD legal compliance framework — create a comprehensive legal review framework for job descriptions across ADA, EEOC, FLSA, and state laws"
  tags: [legal, compliance, ada, eeoc, flsa, framework, advanced]

state: {}

trigger: |
  You're an HR Director at a 1,500-person company that just
  settled an EEOC complaint related to discriminatory language
  in a job posting. The settlement requires you to create a
  comprehensive JD compliance framework. Your legal counsel
  wants a practical guide that HR and hiring managers can use.

  The problematic JD that led to the complaint:
  - Required "young and energetic team player" (age discrimination)
  - Listed "must be able to lift 50 lbs" for a desk job (ADA issue)
  - Required "clean-shaven appearance" for a non-safety role
    (religious discrimination)
  - Stated "must have US work authorization" instead of proper
    language (national origin concerns)
  - Listed "bachelor's degree required" for a role where it wasn't
    a business necessity (disparate impact)

  Your framework must address:
  1. ADA compliance — essential vs. marginal functions, physical
     requirements, reasonable accommodation language
  2. EEOC protected categories — age, race, gender, religion,
     national origin, disability, genetic information
  3. FLSA considerations — exempt vs. non-exempt classification,
     salary threshold requirements
  4. State-specific requirements — pay transparency (NY, CA, CO,
     WA), ban-the-box, salary history bans
  5. Title VII implications — bona fide occupational qualifications
     (BFOQ) vs. preferences

  Task: Create the JD compliance framework as a practical
  checklist and guide. Then demonstrate it by auditing the
  problematic JD and writing a compliant version of the same
  role (Office Administrator, $50K-$60K, Chicago).

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive compliance framework — covers ADA (essential functions, physical demands, accommodation language), EEOC (all protected categories, coded language to avoid), FLSA (classification, salary thresholds), state laws (pay transparency, ban-the-box), and Title VII (BFOQ analysis); the framework is organized as a practical checklist, not a legal treatise; each item includes what to do AND what NOT to do with examples."
    weight: 0.35
    description: "ComprehensiveFramework"
  - type: llm_judge
    criteria: "Response demonstrates the framework with the audit — systematically identifies every violation in the problematic JD; explains the specific law each violation triggers; provides the legally compliant alternative language for each issue; the audit serves as a teaching example that hiring managers could learn from; demonstrates how the framework applies in practice, not just theory."
    weight: 0.35
    description: "PracticalDemonstration"
  - type: llm_judge
    criteria: "Response writes a compliant Office Administrator JD — applies every element of the framework; includes proper essential functions language, accommodation statement, EEO statement, pay transparency compliance; the JD is complete, well-written, and would attract qualified candidates; proves that compliance doesn't make JDs sterile or unappealing; includes all required elements for Chicago/Illinois posting requirements."
    weight: 0.30
    description: "CompliantJD"
