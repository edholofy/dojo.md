meta:
  id: jd-accessibility-accommodation
  level: 3
  course: job-description-writing
  type: output
  description: "Accessibility and accommodation JD — write JDs that are accessible and properly handle accommodation requests"
  tags: [accessibility, accommodation, ada, disability-inclusion, advanced]

state: {}

trigger: |
  You're the Director of HR at a 450-person technology company.
  Your company just hired a Disability Inclusion Specialist who
  reviewed your entire JD library and found significant issues:

  Findings from the audit:
  1. 80% of JDs list physical requirements that aren't essential
     functions (e.g., "must be able to lift 25 lbs" for a
     software engineer role)
  2. No JDs include information about the accommodation request
     process
  3. Several JDs use ableist language ("must be a strong
     communicator" — excludes nonverbal communicators who use
     AAC devices)
  4. Application process requires a timed online assessment that
     disadvantages candidates with certain disabilities
  5. None of the JDs are formatted for screen reader compatibility
  6. The EEO statement is generic boilerplate that doesn't
     mention disability specifically

  The Specialist has asked you to:
  1. Create a disability-inclusive JD writing guide
  2. Demonstrate by rewriting 2 JDs:
     - Software Engineer ($120K-$155K, remote)
     - Customer Support Specialist ($45K-$55K, in-office Denver)

  For each rewritten JD:
  - Separate essential from marginal functions (ADA requirement)
  - Include proper accommodation request information
  - Remove ableist language while maintaining clarity
  - Format for accessibility (screen reader compatible structure)
  - Include meaningful disability inclusion language (not just
    legal boilerplate)

  Task: Create the disability-inclusive JD writing guide and
  the 2 rewritten JDs. Show how to make JDs genuinely
  accessible, not just legally compliant.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical disability-inclusive guide — covers essential vs. marginal functions (with decision framework); identifies common ableist language and provides alternatives; explains accommodation process wording; addresses accessible formatting (heading structure, plain language, screen reader compatibility); goes beyond ADA compliance to genuine inclusion; includes examples for each guideline."
    weight: 0.35
    description: "InclusiveGuide"
  - type: llm_judge
    criteria: "Response rewrites both JDs with genuine accessibility — essential functions are clearly identified and distinguished from marginal functions; physical requirements are only listed when truly essential (and the Customer Support role may have different physical needs than the SWE role); accommodation request process is clearly described; language is inclusive without being awkward; both JDs maintain their attractiveness and clarity."
    weight: 0.35
    description: "AccessibleJDs"
  - type: llm_judge
    criteria: "Response demonstrates disability inclusion expertise — understands the difference between ADA compliance and genuine inclusion; addresses the timed assessment issue; provides alternatives to ableist phrases that are natural, not forced; the EEO statement is meaningful, not boilerplate; the overall approach signals to candidates with disabilities that this company is genuinely welcoming; references would be useful for the Disability Inclusion Specialist to implement."
    weight: 0.30
    description: "InclusionExpertise"
