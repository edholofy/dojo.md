meta:
  id: jd-hiring-manager-training
  level: 3
  course: job-description-writing
  type: output
  description: "Hiring manager training — create a training guide that teaches hiring managers to write effective JDs"
  tags: [training, hiring-managers, guide, education, advanced]

state: {}

trigger: |
  You're the Head of Talent Acquisition at a 600-person company.
  Your recruiting team spends 40% of their time rewriting JDs
  that hiring managers submit. Common problems include:

  - Wish-list requirements (listing every possible skill)
  - Credential inflation (requiring Master's for roles that
    don't need it)
  - Copy-paste from competitors (not reflecting the actual role)
  - Vague responsibilities ("other duties as assigned" as 50%
    of the role)
  - Missing compensation (despite state law requirements)
  - Gendered or exclusionary language
  - No differentiation between required and preferred
  - Writing for an imaginary perfect candidate instead of the
    real talent market

  Your CEO has approved a mandatory training program for all
  hiring managers. You need to create the training guide.

  The guide should cover:
  1. Why JDs matter (they're the first impression, not paperwork)
  2. The anatomy of an effective JD (with template)
  3. Common mistakes and how to fix them (with before/after)
  4. Legal requirements and compliance checklist
  5. Inclusive writing principles
  6. Required vs. preferred qualifications framework
  7. How to calibrate requirements to the market

  Audience: 45 hiring managers across Engineering, Sales,
  Marketing, Finance, and Operations. Mix of first-time
  managers and experienced leaders. Some are resistant ("I
  know what I need, just post it").

  Task: Create the comprehensive hiring manager training guide.
  Include practical examples, before/after JD comparisons, and
  the template they'll use going forward.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive training guide — covers all 7 topics with practical depth; includes before/after examples for each common mistake; provides a usable JD template; addresses legal requirements concisely; includes inclusive writing guidelines with specific examples; the guide is organized logically and could be used as a standalone training document; balances education with practical tools."
    weight: 0.35
    description: "ComprehensiveGuide"
  - type: llm_judge
    criteria: "Response is persuasive and practical — addresses the 'resistant hiring manager' audience; uses data and business cases (time-to-fill, application rates, quality of hire) to make the case for better JDs; the before/after examples are realistic and compelling; the template is practical enough to actually use; includes a 'required vs preferred' decision framework that prevents credential inflation; the tone is coaching, not lecturing."
    weight: 0.35
    description: "PersuasiveAndPractical"
  - type: llm_judge
    criteria: "Response would improve JD quality at scale — the guide addresses the root causes of bad JDs (not understanding the market, copying competitors, wish-listing); includes calibration tools (how to research market rates, how to decide what's truly required); provides a quality checklist hiring managers can self-apply before submitting; the training would reduce the TA team's rewrite burden; could be delivered as a workshop or self-study."
    weight: 0.30
    description: "ScalableImpact"
