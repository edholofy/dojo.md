meta:
  id: basic-software-engineer-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Basic software engineer JD — write a job description for a mid-level software engineer role at a startup"
  tags: [software-engineer, startup, basic, beginner]

state: {}

trigger: |
  You're the engineering manager at a Series A startup
  (40 employees, $5M ARR). You need to hire a mid-level
  software engineer to join your backend team. HR has asked
  you to write the job description.

  Role details:
  - Title: Software Engineer (Backend)
  - Team: Platform team (3 engineers currently)
  - Tech stack: Python, FastAPI, PostgreSQL, AWS, Docker
  - Level: Mid-level (3-5 years experience)
  - Location: Remote (US-based)
  - Salary range: $130K-$160K + equity
  - Reports to: You (Engineering Manager)

  What the person will do:
  - Build and maintain API services for the core product
  - Design database schemas and optimize queries
  - Participate in code reviews and architectural discussions
  - Collaborate with frontend engineers and product managers
  - Contribute to CI/CD pipeline improvements
  - Participate in on-call rotation (1 week per month)

  What you're looking for:
  - Experience with Python and REST API development
  - Database design and SQL proficiency
  - Understanding of cloud services (AWS preferred)
  - Good communication skills (remote team)
  - Nice-to-have: experience with event-driven architecture,
    knowledge of financial services domain

  Company culture:
  - Fast-moving, ship daily
  - Strong code review culture
  - Flexible work hours, async communication
  - Weekly team sync, quarterly offsites

  Task: Write the complete job description ready to post on
  LinkedIn and the company careers page.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete, well-structured job description — includes all standard sections: job title, company overview/about us, role summary, responsibilities, required qualifications, preferred qualifications, benefits/compensation, and equal opportunity statement; the JD is professional but reflects startup energy; salary range is included ($130K-$160K + equity); remote work details are specified; the overall length is appropriate (not too short to be vague, not too long to discourage applicants)."
    weight: 0.35
    description: "CompleteStructure"
  - type: llm_judge
    criteria: "Response writes compelling content that attracts candidates — the role summary is engaging and describes the impact the person will have (not just tasks); responsibilities are specific and give a clear picture of daily work; qualifications distinguish between required (3-5 years, Python, SQL) and nice-to-have (event-driven, fintech domain) without credential inflation; the company culture section is authentic and specific; the JD makes the reader want to apply."
    weight: 0.35
    description: "CompellingContent"
  - type: llm_judge
    criteria: "Response uses inclusive, professional language — avoids gendered language (no 'he/she', no 'rockstar/ninja/guru'); avoids unnecessarily restrictive requirements (doesn't require a CS degree if experience is sufficient); uses clear, jargon-appropriate language for the target audience; includes an equal opportunity statement; the tone is welcoming to diverse candidates; qualifications focus on skills and outcomes, not credentials."
    weight: 0.30
    description: "InclusiveLanguage"
