meta:
  id: internal-promotion-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Internal promotion JD — write an internal job posting for a newly created team lead position"
  tags: [internal, promotion, team-lead, beginner]

state: {}

trigger: |
  You're the Director of Engineering at a 200-person company.
  You're creating a new Team Lead position and want to post
  it internally first before opening it externally. Internal
  JDs are different — you're writing for people who already
  know the company.

  Role context:
  - Title: Team Lead, Frontend Engineering
  - New position: Created because the frontend team grew from
    4 to 8 engineers and needs dedicated leadership
  - Reports to: You (Director of Engineering)
  - Team: 8 frontend engineers (mix of junior to senior)
  - This is a player/coach role (50% coding, 50% leading)

  What the Team Lead will do:
  - Lead sprint planning and technical decision-making for the
    frontend team
  - Conduct 1:1s with 8 direct reports
  - Set technical direction for the frontend architecture
  - Continue hands-on coding (approximately 50% of time)
  - Participate in hiring decisions for the team
  - Coordinate with product managers and designers on priorities
  - Mentor junior engineers and conduct code reviews

  Internal posting specifics:
  - Open to current employees only for 2 weeks, then external
  - Must have been at the company for at least 6 months
  - Salary adjustment: Move to Band 5 ($140K-$170K)
  - Current frontend engineers who apply will be considered
    equally with other internal candidates
  - Not applying will have no negative consequences (explicitly
    state this)

  The tricky part: 2 senior frontend engineers are likely
  candidates. You need the JD to be fair and not appear
  written for a specific person.

  Task: Write the internal job posting. Adapt the format and
  tone for an internal audience.

assertions:
  - type: llm_judge
    criteria: "Response writes an internal posting appropriate for current employees — adapts tone for an audience that already knows the company (no need for lengthy company description); references internal context (team growth from 4 to 8, need for dedicated leadership); clearly states the internal-first timeline (2 weeks internal before external); states the 6-month tenure requirement; includes salary band information; explicitly states that not applying has no negative consequences."
    weight: 0.35
    description: "InternalFormat"
  - type: llm_judge
    criteria: "Response is fair and unbiased — the JD doesn't appear written for a specific internal candidate; qualifications are based on skills and competencies, not tenure or seniority markers that would favor one person; includes both technical and leadership qualifications; describes the player/coach balance clearly (50/50); the selection criteria are transparent and would allow multiple internal candidates to see themselves in the role."
    weight: 0.35
    description: "FairnessAndBias"
  - type: llm_judge
    criteria: "Response addresses the internal candidate experience — explains how to express interest (who to contact, what materials to submit); describes the internal interview process (will it differ from external?); addresses the concern about applying for a role on your current team; maintains professionalism while being more conversational than an external posting; the JD encourages qualified internal candidates to apply without creating pressure."
    weight: 0.30
    description: "CandidateExperience"
