meta:
  id: contract-freelance-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Contract/freelance JD — write a job description for a contract or freelance position with clear terms"
  tags: [contract, freelance, temporary, terms, beginner]

state: {}

trigger: |
  You're the Marketing Director at a mid-size company. You
  need to hire a freelance graphic designer for a 3-month
  brand refresh project. Writing JDs for contract work is
  different from full-time roles — you need to be clear about
  the arrangement to avoid misclassification issues.

  Role details:
  - Title: Freelance Graphic Designer — Brand Refresh Project
  - Type: Independent contractor (1099)
  - Duration: 3 months (March-May), potential extension
  - Hours: Approximately 20-25 hours/week
  - Rate: $75-$100/hour (depending on experience)
  - Location: Remote
  - Start date: March 3, 2026

  Project scope:
  - Redesign company logo and visual identity
  - Create new brand guidelines document
  - Design templates for: presentations, social media, email
    newsletters, business cards, letterhead
  - Deliver all assets in appropriate formats (AI, SVG, PNG,
    PDF, Figma)

  What you need:
  - Strong portfolio demonstrating brand identity work
  - Proficiency with Adobe Creative Suite and Figma
  - Experience creating brand guidelines documents
  - Ability to work independently with weekly check-ins
  - Understanding of print and digital design requirements
  - Responsive communication (respond within 24 hours on
    business days)

  Important distinctions (contractor vs employee):
  - Sets own schedule (no set hours)
  - Uses own equipment and software
  - No benefits provided
  - Responsible for own taxes
  - Owns no IP — all work product belongs to the company
    (work-for-hire agreement required)

  Task: Write the freelance job posting. Make the contract
  terms clear to avoid worker misclassification issues.

assertions:
  - type: llm_judge
    criteria: "Response writes a clear freelance/contract JD — explicitly identifies the role as independent contractor (1099); states the duration (3 months), approximate hours (20-25/week), and rate ($75-$100/hour); clearly defines the project scope and deliverables; specifies that no benefits are provided; mentions work-for-hire IP assignment; the terms are transparent enough to avoid misclassification issues."
    weight: 0.35
    description: "ClearContractTerms"
  - type: llm_judge
    criteria: "Response maintains contractor classification language — avoids language that implies employee status (doesn't say 'reports to', doesn't require set hours, doesn't mandate specific tools); emphasizes autonomy in how work is completed; describes the relationship appropriately (client-contractor, not employer-employee); includes relevant legal elements (1099, work-for-hire, own equipment); the JD would pass scrutiny from a labor law perspective."
    weight: 0.35
    description: "ClassificationCompliance"
  - type: llm_judge
    criteria: "Response makes the opportunity attractive to freelancers — describes the project as interesting creative work (brand refresh, not production design); includes portfolio requirement (shows this is a quality engagement); specifies deliverables clearly (freelancers prefer well-scoped projects); mentions potential extension; the rate is competitive and transparent; the JD would attract experienced freelance designers."
    weight: 0.30
    description: "FreelancerAppeal"
