meta:
  id: sales-representative-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Sales representative JD — write a job description for an account executive role with clear compensation structure"
  tags: [sales, account-executive, compensation, beginner]

state: {}

trigger: |
  You're the Sales Director at a SaaS company. You need to
  hire an Account Executive for your mid-market segment. Sales
  JDs are tricky because you need to accurately describe the
  compensation structure (base + commission) and the quota
  expectations without scaring away candidates.

  Role details:
  - Title: Account Executive, Mid-Market
  - Segment: Companies with 100-1,000 employees
  - Territory: Southeast US (FL, GA, NC, SC, TN, AL)
  - Location: Remote within territory
  - Reports to: Sales Director (you)
  - Team: 8 AEs, 2 SDRs who source leads for you

  Compensation:
  - Base salary: $75K-$90K
  - On-target earnings (OTE): $150K-$180K
  - Commission: Uncapped, paid monthly
  - Annual quota: $600K in new ARR
  - Average deal size: $30K-$60K ARR
  - Sales cycle: 45-60 days
  - Ramp period: 3 months (reduced quota during ramp)

  What they'll do:
  - Run the full sales cycle from qualified lead to close
  - Conduct product demos and discovery calls
  - Build relationships with VP and C-level buyers
  - Negotiate contracts and pricing
  - Collaborate with SDRs on outbound strategy
  - Maintain accurate pipeline in Salesforce
  - Attend 2-3 industry events per year

  What you need:
  - 3-5 years B2B SaaS sales experience
  - Track record of quota attainment (show me your numbers)
  - Experience selling to mid-market companies
  - Comfortable with consultative selling approach
  - CRM proficiency (Salesforce preferred)
  - Willingness to travel within territory (~25%)

  Task: Write the complete job description with clear
  compensation structure.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete sales JD — includes all sections with special attention to the compensation structure (clearly explains base, OTE, commission structure, uncapped earnings, quota, ramp period); the territory and travel requirements are transparent; the role scope is clear (full-cycle AE, not just closing or just prospecting); includes required and preferred qualifications; the JD is accurate about what the role entails daily."
    weight: 0.35
    description: "CompleteSalesJD"
  - type: llm_judge
    criteria: "Response makes the compensation structure compelling and transparent — clearly presents the OTE range ($150K-$180K) alongside base ($75K-$90K); explains the commission is uncapped (this is a selling point); mentions the ramp period with reduced quota (shows the company invests in new hires); presents the quota ($600K) in context of deal sizes ($30K-$60K = 10-20 deals/year, achievable); the comp section would attract quality salespeople while being honest about expectations."
    weight: 0.35
    description: "CompensationClarity"
  - type: llm_judge
    criteria: "Response balances selling the role with honest expectations — conveys the opportunity (uncapped commission, growing company, territorial ownership) while being transparent about requirements (travel, quota, territory coverage); doesn't oversell or undersell; the qualifications are realistic for the comp level; includes EEO statement; the tone is professional and confident — matching what sales candidates expect; the JD differentiates from the thousands of identical AE postings."
    weight: 0.30
    description: "HonestBalance"
