meta:
  id: operations-coordinator-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Operations coordinator JD — write a job description for an operations coordinator role at a growing company"
  tags: [operations, coordinator, growing-company, beginner]

state: {}

trigger: |
  You're the Office Manager at a fast-growing e-commerce
  company (80 employees, grew from 30 to 80 in the past year).
  The growth has outpaced your ability to manage everything
  alone. You need an Operations Coordinator to help keep
  the company running smoothly.

  Role details:
  - Title: Operations Coordinator
  - Reports to: Office Manager (you)
  - Location: In-office, Brooklyn, NY
  - Type: Full-time, exempt
  - Salary: $55K-$65K
  - Level: Junior to mid-level (1-3 years experience)

  What the person will do:
  - Manage office supplies, vendor relationships, and facilities
  - Coordinate employee onboarding logistics (equipment, badges,
    workspace setup, first-week schedule)
  - Organize company events (monthly team lunches, quarterly
    offsites, annual holiday party)
  - Maintain office calendar and conference room bookings
  - Process expense reports and purchase orders
  - Coordinate with IT on equipment procurement and setup
  - Handle incoming mail, packages, and deliveries
  - Support HR with benefits enrollment paperwork
  - Manage relationships with building management and cleaning
    service

  What you need:
  - Organized and detail-oriented
  - Comfortable juggling multiple tasks
  - Good with people (you'll interact with everyone in the company)
  - Proficiency with Google Workspace and basic Excel
  - Previous office or administrative experience helpful but
    not required
  - Must be comfortable in a fast-paced environment

  Task: Write the complete job description. Make the role
  sound valued and important, not like a "just an admin" role.

assertions:
  - type: llm_judge
    criteria: "Response writes a job description that elevates the operations role — positions the coordinator as essential to company operations (not 'just admin'); describes the impact of the role (keeping 80 people productive, shaping company culture through events, being the first touchpoint for new hires); uses language that conveys importance and autonomy; includes all standard JD sections with Brooklyn in-office details and salary range."
    weight: 0.35
    description: "ElevatedRole"
  - type: llm_judge
    criteria: "Response has appropriate qualifications — doesn't over-require for a $55K-$65K role (no 'Bachelor's required', no '5 years experience'); focuses on skills and traits over credentials; clearly states that previous experience is helpful but not required; the requirements match the compensation level; uses inclusive language that welcomes candidates from diverse backgrounds including career changers."
    weight: 0.35
    description: "AppropriateQualifications"
  - type: llm_judge
    criteria: "Response is clear about the role's scope and growth — describes daily work clearly enough for candidates to self-assess; mentions the fast-growth context (30 to 80 employees) as both an opportunity and a reality check; suggests career growth potential; includes benefits; has an EEO statement; the overall JD would attract quality candidates who are excited about operations work."
    weight: 0.30
    description: "ClearScope"
