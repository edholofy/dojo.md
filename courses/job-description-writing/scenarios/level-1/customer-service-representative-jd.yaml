meta:
  id: customer-service-representative-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Customer service representative JD — write a job description for an entry-level customer service role at a retail company"
  tags: [customer-service, entry-level, retail, beginner]

state: {}

trigger: |
  You're the customer service team lead at a mid-size online
  retailer (200 employees). You need to hire 3 customer service
  representatives. This is an entry-level role and you want to
  attract people who may not have traditional corporate
  experience.

  Role details:
  - Title: Customer Service Representative
  - Department: Customer Experience (team of 12)
  - Location: Hybrid (office in Austin, TX — 3 days in office,
    2 days remote)
  - Hours: Full-time, shift-based (8am-8pm coverage needed)
  - Pay: $18-$22/hour (non-exempt/hourly)
  - Benefits: Health insurance, PTO, employee discount, tuition
    reimbursement

  What the person will do:
  - Respond to customer inquiries via phone, email, and chat
  - Process returns, exchanges, and order modifications
  - Troubleshoot shipping and delivery issues
  - Escalate complex issues to senior team members
  - Document customer interactions in CRM (Zendesk)
  - Meet quality standards: 90% CSAT, <3 min first response

  What you need:
  - Strong communication skills (verbal and written)
  - Comfortable with technology and learning new software
  - Ability to handle multiple conversations simultaneously
  - Patience and empathy in difficult situations
  - Reliable internet for remote work days
  - Available for at least one weekend shift per month

  What you DON'T need (common misconceptions):
  - No college degree required
  - No prior customer service experience required (will train)
  - No specific software experience required (will train)

  Task: Write the complete job description. Make it accessible
  to candidates without corporate experience while still being
  professional.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete, accessible JD — includes all standard sections but uses language appropriate for entry-level candidates; clearly states that no degree or prior experience is required; specifies hourly pay ($18-$22/hour) and FLSA non-exempt status appropriately; explains hybrid schedule clearly; lists benefits including tuition reimbursement prominently; the JD is welcoming to career changers and first-time job seekers."
    weight: 0.35
    description: "AccessibleStructure"
  - type: llm_judge
    criteria: "Response avoids common entry-level JD mistakes — doesn't list 'minimum 2 years customer service experience' for what's described as entry-level; doesn't require skills that will be trained (Zendesk, specific software); focuses on transferable qualities (communication, empathy, reliability) over credentials; makes the shift/weekend requirement clear without being discouraging; explains what the company provides (training, growth path) not just what it demands."
    weight: 0.35
    description: "EntryLevelAppropriate"
  - type: llm_judge
    criteria: "Response is professional yet inviting — the tone bridges professional and approachable; includes what makes the role attractive (tuition reimbursement, employee discount, career growth); describes daily work clearly so candidates can self-assess fit; uses inclusive language; specifies the hybrid details (3 days office, 2 remote) and shift requirements transparently; includes EEO statement; the JD would attract quality applicants for an hourly retail position."
    weight: 0.30
    description: "ProfessionalYetInviting"
