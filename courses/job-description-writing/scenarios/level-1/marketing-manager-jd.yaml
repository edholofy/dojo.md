meta:
  id: marketing-manager-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Marketing manager JD — write a job description for a marketing manager role at a B2B SaaS company"
  tags: [marketing, manager, b2b-saas, beginner]

state: {}

trigger: |
  You're the VP of Marketing at a B2B SaaS company
  (150 employees, $20M ARR). You need to hire a Marketing
  Manager to own demand generation. This is your first
  marketing manager hire — previously you did everything
  yourself with freelancers.

  Role details:
  - Title: Marketing Manager, Demand Generation
  - Reports to: VP of Marketing (you)
  - Team: Will manage 1 content writer and work with
    freelance designers
  - Location: Remote (US, ET or CT preferred for meeting overlap)
  - Salary: $95K-$120K + bonus
  - Level: Mid-level (4-7 years marketing experience)

  What the person will do:
  - Own the demand gen strategy and pipeline targets
  - Plan and execute campaigns (email, paid ads, webinars,
    content marketing)
  - Manage the marketing budget ($300K/quarter)
  - Track and report on marketing KPIs (MQLs, pipeline
    contribution, CAC)
  - Optimize the website for conversion
  - Collaborate with sales on lead quality and handoff process
  - Manage 1 direct report (content writer) and freelancers

  What you need:
  - B2B SaaS marketing experience
  - Experience with marketing automation (HubSpot preferred)
  - Data-driven approach — comfortable with metrics and attribution
  - Campaign management across multiple channels
  - Budget management experience
  - Management experience (at least 1 direct report)
  - Strong writing skills

  Task: Write the complete job description.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete marketing manager JD — includes all standard sections; accurately represents the role scope (demand gen ownership, budget management, team management); specifies required and preferred qualifications appropriately; includes salary range ($95K-$120K + bonus); describes the remote work arrangement with timezone preference; the JD accurately conveys the scope and seniority of the role."
    weight: 0.35
    description: "CompleteJD"
  - type: llm_judge
    criteria: "Response makes the role compelling — describes the impact opportunity (first marketing manager, building the function); highlights the autonomy (owns strategy and budget); explains what success looks like (pipeline targets, marketing KPIs); describes the company and product enough for candidates to assess interest; the benefits and growth opportunity are clear; the JD differentiates this role from generic marketing manager postings."
    weight: 0.35
    description: "CompellingRole"
  - type: llm_judge
    criteria: "Response uses appropriate qualifications — requires B2B SaaS experience without over-specifying (doesn't require exact same industry); makes HubSpot a preference not a requirement; requires management experience appropriate for the role; doesn't inflate requirements (doesn't require 10+ years or MBA); uses inclusive language; the qualifications section would attract a diverse pool of qualified candidates."
    weight: 0.30
    description: "AppropriateQualifications"
