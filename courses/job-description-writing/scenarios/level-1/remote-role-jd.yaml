meta:
  id: remote-role-jd
  level: 1
  course: job-description-writing
  type: output
  description: "Remote role JD — write a job description for a remote role that clearly addresses location, timezone, and work arrangement expectations"
  tags: [remote, work-arrangement, timezone, beginner]

state: {}

trigger: |
  You're the People Operations lead at a fully remote company
  (60 employees across 15 US states). You're hiring a Product
  Designer, and your CEO wants you to make the remote work
  details crystal clear in the JD.

  "Last time we hired, 3 candidates got to the final round
  before discovering we're fully remote with no office option.
  One wanted hybrid. Another was in Europe and we can't hire
  there yet. Clear this up in the JD so we don't waste anyone's
  time."

  Role details:
  - Title: Product Designer
  - Location: Fully remote, US-based only (we can hire in
    all 50 states)
  - Timezone: Core hours 10am-3pm ET required for collaboration
  - Equipment: Company provides laptop, monitor, and $500
    home office stipend
  - Internet: Reliable high-speed internet required (not provided)
  - Travel: 2-4 times per year for team offsites (company paid)
  - No office: The company has no physical office
  - Salary: $110K-$140K (same regardless of location)

  Additional remote-specific details:
  - Communication: Primarily async via Slack and Notion; live
    meetings kept to under 10 hours/week
  - Culture: Weekly team sync (video), monthly all-hands,
    quarterly virtual social events
  - Onboarding: 2-week virtual onboarding program
  - Manager: Reports to Head of Design (based in Portland, OR)

  Task: Write the job description with special attention to
  clearly communicating the remote work arrangement, timezone
  requirements, and what working at this company actually
  looks like day-to-day.

assertions:
  - type: llm_judge
    criteria: "Response clearly communicates all remote work details — explicitly states fully remote with US-only restriction; specifies core hours (10am-3pm ET); lists equipment provided and home office stipend; clarifies travel expectations (2-4 offsites/year); notes no physical office exists; states location-independent salary; the remote details are prominent, not buried; a candidate would have zero confusion about the work arrangement."
    weight: 0.35
    description: "RemoteClarity"
  - type: llm_judge
    criteria: "Response describes remote work culture, not just logistics — goes beyond 'you work from home' to describe what remote work actually looks like (async-first communication, <10 hours of meetings/week, virtual onboarding, team sync rhythm); makes the remote culture sound intentional and well-designed, not an afterthought; includes both the benefits (flexibility, location independence) and the reality (self-discipline needed, video calls, async communication skills)."
    weight: 0.35
    description: "RemoteCulture"
  - type: llm_judge
    criteria: "Response writes a complete product designer JD alongside the remote details — includes role-specific content (design responsibilities, required skills, portfolio expectations); doesn't let the remote details overwhelm the actual role description; balances remote work information with the design role information; includes salary range, benefits, EEO statement; the JD would attract designers specifically interested in remote work with this level of structure."
    weight: 0.30
    description: "CompleteDesignerJD"
