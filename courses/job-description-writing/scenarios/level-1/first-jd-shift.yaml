meta:
  id: first-jd-shift
  level: 1
  course: job-description-writing
  type: output
  description: "First JD shift — handle a situation where a hiring manager gives you contradictory requirements for a job description"
  tags: [shift, contradictory-requirements, negotiation, beginner]

state: {}

trigger: |
  You're an HR coordinator at a 100-person company. A hiring
  manager has sent you requirements for a new job description,
  but the requirements are contradictory and unrealistic. You
  need to write a JD that actually works while diplomatically
  pushing back on the issues.

  The hiring manager's email:

  "I need a JD for a new role on my team. Here's what I need:

  Title: Junior Data Scientist
  Salary: $50K-$60K

  Requirements:
  - PhD in Machine Learning, Statistics, or related field
  - 5+ years of industry experience in data science
  - Expert in Python, R, SQL, Spark, TensorFlow, PyTorch,
    scikit-learn, Tableau, Power BI, AWS, Azure, GCP
  - Published research in top-tier ML conferences
  - Experience leading a team of 3+ data scientists
  - Must have worked at a FAANG company
  - Fluent in Mandarin (our China office might need them)

  This should be an easy fill — data science is popular, right?
  I need someone in 2 weeks."

  The problems (which you need to identify and address):
  1. PhD + 5 years experience ≠ Junior level or $50-60K salary
  2. The tech stack is exhaustive and unrealistic for one person
  3. FAANG requirement eliminates 99% of candidates
  4. Published research + leadership + PhD = Senior/Principal level
  5. Mandarin requirement based on speculation, not actual need
  6. 2-week timeline is unrealistic for this type of hire
  7. Title and comp don't match qualifications at all

  Task: Write a diplomatic response to the hiring manager
  explaining the issues, then write the corrected job
  description that reflects a realistic hire at the stated
  budget and title level.

assertions:
  - type: llm_judge
    criteria: "Response writes a diplomatic response to the hiring manager — identifies all 7 contradictions without being condescending; explains the market reality (PhD + 5 years = $150K+ not $50K); suggests realistic alternatives (either adjust the title/comp to match qualifications, or adjust qualifications to match the title/comp); frames the feedback as trying to help the manager hire successfully, not just criticizing their request; the tone is professional, helpful, and collaborative."
    weight: 0.35
    description: "DiplomaticResponse"
  - type: llm_judge
    criteria: "Response writes a corrected JD — produces a realistic JD that works within the $50K-$60K budget and 'Junior' title (likely: Junior Data Analyst or Junior Data Scientist with Bachelor's degree, 0-2 years experience, focused tech stack, no leadership or research requirements); the corrected JD is complete and well-written; qualifications match the compensation level; the role is genuinely fillable in the market."
    weight: 0.35
    description: "CorrectedJD"
  - type: llm_judge
    criteria: "Response educates the hiring manager — explains concepts like title-compensation alignment, market rate considerations, the importance of focused vs exhaustive requirements, how unrealistic JDs waste recruiting time and damage employer brand; provides data points where possible (market salaries for data scientists with PhDs); the response would help the hiring manager write better JDs in the future, not just fix this one."
    weight: 0.30
    description: "EducationalValue"
