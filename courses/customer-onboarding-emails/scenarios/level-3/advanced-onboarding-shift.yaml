meta:
  id: advanced-onboarding-shift
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Simulate an advanced onboarding email operations day — handle cross-functional requests, deliverability crises, automation failures, and strategic decisions"
  tags: [onboarding, email, simulation, operations, crisis, advanced]

state: {}

trigger: |
  You're the Senior Onboarding Email Manager at "GrowthStack" —
  a mid-market SaaS with 2,000 new signups daily across 3 products.

  Today's shift:

  1. CRITICAL — Deliverability crisis:
     Gmail inbox placement dropped from 92% to 61% overnight.
     Investigation shows: a marketing team blast (50K recipients)
     went out on the shared IP yesterday, triggering spam complaints.
     - Immediate: assess damage to onboarding emails
     - Triage: separate onboarding onto dedicated IP?
     - Communication: what to tell the 2,000 users who signed up
       today whose welcome emails may have gone to spam
     - Long-term: prevent this from happening again

  2. Automation failure:
     The behavioral trigger for "user connected integration but
     hasn't created their first workflow" hasn't been firing for 3
     days. ~1,200 users missed this critical activation email.
     - Diagnose: event pipeline issue or automation platform issue?
     - Remediate: send the missed emails now? Modified content?
     - Measure: what's the expected activation impact?

  3. Cross-functional request:
     Product team launched a major UI redesign yesterday. All
     screenshots in emails 2-6 are now outdated.
     - Priority: which emails need updating first?
     - Temporary fix: remove screenshots or use generic imagery?
     - Process: how to prevent this in the future?
     - Timeline: realistic update schedule

  4. Enterprise onboarding request:
     The sales team just closed a 500-user enterprise deal. The
     CRO wants a custom onboarding sequence for this account.
     - Assess: can you adapt existing sequences or build from scratch?
     - Design: the enterprise-specific onboarding approach
     - Resource: how to handle this without disrupting standard operations

  5. Performance review:
     Your quarterly onboarding email review is due. Current metrics:
     - Welcome email open rate: 68% (target: 75%)
     - Activation rate (email-driven): 31% (target: 40%)
     - Trial conversion: 11% (target: 15%)
     - Re-engagement recovery: 8% (target: 15%)
     - Prepare the review with diagnosis and improvement plan

  Handle all 5 situations. End with a prioritized shift summary.

assertions:
  - type: llm_judge
    criteria: "Deliverability crisis response separates onboarding from marketing — the immediate action isolates onboarding emails on a dedicated IP to protect the most critical emails"
    weight: 0.25
    description: "IP isolation response"
  - type: llm_judge
    criteria: "Automation failure remediation is thoughtful — sending missed emails 3 days late requires modified content that acknowledges the delay, not just batch-sending the original email"
    weight: 0.25
    description: "Thoughtful automation remediation"
  - type: llm_judge
    criteria: "Screenshot update prioritization is correct — emails 2-3 (early activation) are highest priority since they affect the most users and the earliest stage"
    weight: 0.25
    description: "Correct screenshot prioritization"
  - type: llm_judge
    criteria: "Quarterly review includes actionable improvement plans — each underperforming metric gets a specific diagnosis and improvement action, not just 'we'll try harder'"
    weight: 0.25
    description: "Actionable quarterly review"
