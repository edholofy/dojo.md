meta:
  id: onboarding-automation-architecture
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Architect onboarding email automation systems — design the technical infrastructure for behavior-triggered sequences, dynamic content, and real-time personalization at scale"
  tags: [onboarding, email, automation, architecture, technical, advanced]

state: {}

trigger: |
  Scaling onboarding emails beyond simple time-based sequences
  requires thoughtful automation architecture — event pipelines,
  segmentation engines, and dynamic content systems.

  Part 1: Automation platform architecture

  "ScaleUp" — a growing SaaS with 10,000 new signups/month:

  Current state: Mailchimp with 7 time-based emails
  Target state: Behavior-driven, segmented, multi-channel system

  Design the automation architecture:

  1. Event pipeline:
     - What user events need to be tracked? (list top 15)
     - How do events flow from product → email platform?
     - Event schema design (what data per event?)
     - Real-time vs. batch processing requirements
     - Data warehouse integration for analytics

  2. Segmentation engine:
     - How are users segmented dynamically?
     - Segment update frequency (real-time vs. hourly vs. daily)
     - Segment definitions (rules-based vs. ML-based)
     - Cross-segment handling (user qualifies for multiple segments)

  3. Sequence orchestration:
     - How do behavioral triggers interact with time-based emails?
     - Priority rules when multiple emails are triggered
     - Frequency capping (max emails per day/week)
     - Suppression rules (don't send if user just did X)
     - Sequence branching logic (if/then/else flows)

  4. Dynamic content engine:
     - Liquid/Handlebars template system
     - Personalization tokens (name, company, usage data)
     - Conditional content blocks (show/hide based on segment)
     - Real-time data injection (latest usage stats in email)

  Part 2: Platform evaluation

  Compare these platforms for ScaleUp's needs:
  - Customer.io: event-driven, flexible workflows
  - Intercom: product tours + messaging combined
  - Braze: enterprise scale, AI optimization
  - ActiveCampaign: automation + CRM combined

  For each, evaluate:
  - Behavioral trigger capabilities
  - Segmentation sophistication
  - Multi-channel support
  - Pricing at 10K signups/month
  - Integration complexity
  - Recommend the best fit with reasoning.

  Part 3: Migration plan

  Design the migration from Mailchimp to the new platform:
  - Phase 1: Parallel running (old + new)
  - Phase 2: Gradual traffic shift (10% → 50% → 100%)
  - Phase 3: Old platform sunset
  - Data migration requirements
  - Risk mitigation during transition

assertions:
  - type: llm_judge
    criteria: "Event pipeline design is specific — the top 15 events are listed with schema, and the real-time vs. batch decision is made with reasoning"
    weight: 0.25
    description: "Specific event pipeline design"
  - type: llm_judge
    criteria: "Orchestration handles conflicts — the design addresses what happens when multiple triggers fire simultaneously, with priority rules and frequency capping"
    weight: 0.25
    description: "Conflict-handling orchestration"
  - type: llm_judge
    criteria: "Platform comparison is decision-quality — each platform is evaluated on the specific criteria that matter for this use case, with a clear recommendation"
    weight: 0.25
    description: "Decision-quality platform comparison"
  - type: llm_judge
    criteria: "Migration plan is risk-aware — parallel running and gradual traffic shift prevent losing users during the transition"
    weight: 0.25
    description: "Risk-aware migration"
