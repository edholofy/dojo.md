meta:
  id: plg-onboarding-sequences
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Design product-led growth onboarding sequences — create email strategies that complement in-product experiences to drive self-serve activation and expansion"
  tags: [onboarding, email, plg, product-led, activation, advanced]

state: {}

trigger: |
  In product-led growth, the product IS the primary onboarding
  experience. Email's role shifts from "teach about the product"
  to "complement and reinforce what users discover in-product."

  Part 1: PLG email strategy

  "DataPipe" — a developer data integration tool:
  - Free tier: 1,000 rows/mo, 3 connectors
  - Pro: $49/mo, 100K rows, unlimited connectors
  - Team: $99/user/mo, shared pipelines, governance

  PLG characteristics:
  - Users sign up and start building immediately (no sales)
  - Aha moment: first successful data sync (usually within 30 min)
  - Expansion trigger: hitting row limits or needing team features
  - Conversion: bottom-up (individual → team → enterprise)

  1. Design the 3-track PLG email system:

     Track 1: Quick win (Days 0-3)
     Goal: Get to aha moment ASAP
     - Email 1: Welcome with quick-start focus (not feature tour)
     - Email 2: "Your first sync worked!" (celebrate if triggered)
       OR "Need help with your first sync?" (if stalled)
     - Email 3: "Here's what your data can do now"
     Write subject lines and key messages for each.

     Track 2: Habit formation (Days 4-14)
     Goal: Make the product part of their workflow
     - Behavioral triggers: scheduled syncs, recurring usage
     - Emails about: automation, scheduling, monitoring
     Write 3 emails that drive habit formation.

     Track 3: Expansion (Days 14-30)
     Goal: Drive upgrade or team adoption
     - Triggered by: approaching limits, sharing pipelines
     - Emails about: team features, governance, ROI of scaling
     Write 2 expansion-focused emails.

  2. PLG vs. sales-led email comparison:
     Show how the same onboarding email (Day 3) differs between:
     - PLG approach: "Your pipeline synced 2,500 rows yesterday"
     - Sales-led approach: "Let me walk you through our features"
     Write both and explain the philosophy difference.

  Part 2: Self-serve to sales-assist handoff

  Design the email that transitions a PLG user to sales:
  - Trigger: user hits free tier limits + team of 10+ employees
  - Email should feel like a natural next step, not a sales pitch
  - Include: specific usage data, team value proposition, easy CTA
  Write the full email.

assertions:
  - type: llm_judge
    criteria: "PLG emails complement rather than replace in-product experience — they reinforce what users do in the product rather than trying to teach everything through email"
    weight: 0.30
    description: "Product-complementing emails"
  - type: llm_judge
    criteria: "Quick win track focuses on aha moment speed — emails in the first 3 days are about removing friction to first success, not feature tours"
    weight: 0.25
    description: "Aha-moment-focused quick wins"
  - type: llm_judge
    criteria: "PLG vs. sales-led comparison is clear — the PLG version uses user's actual data, while sales-led is product-focused, demonstrating fundamentally different philosophies"
    weight: 0.25
    description: "Clear PLG vs. sales-led contrast"
  - type: llm_judge
    criteria: "Sales handoff feels natural — the transition email references the user's specific usage and positions sales as a resource, not a gatekeeper"
    weight: 0.20
    description: "Natural sales handoff"
