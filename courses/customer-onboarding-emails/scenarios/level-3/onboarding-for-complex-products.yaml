meta:
  id: onboarding-for-complex-products
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Design onboarding emails for complex products — handle long activation paths, multi-feature products, and users who need weeks to realize value"
  tags: [onboarding, email, complex-products, long-activation, advanced]

state: {}

trigger: |
  Not every product has a 5-minute aha moment. Complex products
  like ERPs, data platforms, and enterprise tools may take weeks
  to set up and months to show value. The onboarding email
  strategy must adapt accordingly.

  Part 1: Complex product onboarding challenges

  "DataStack" — an enterprise data warehouse and analytics platform:
  - Setup involves: data source connection, schema design, ETL
    pipeline configuration, dashboard building, user permissions
  - Time to first value: 2-4 weeks
  - Full activation: 6-8 weeks
  - Trial period: 30 days (with extension option)
  - Multiple users involved: data engineer (setup), analyst (use),
    manager (consume reports)

  1. Design the extended onboarding timeline:
     Phase 1 (Week 1): Foundation — connection and ingestion
     Phase 2 (Week 2-3): Building — schema, transforms, pipelines
     Phase 3 (Week 4-5): Value — dashboards, reports, insights
     Phase 4 (Week 6-8): Adoption — team rollout, advanced features

     Map the email sequence across all 4 phases:
     - How many emails per phase?
     - What's the cadence (daily, twice weekly, weekly)?
     - What changes as the user progresses?

  2. Write phase-specific emails:

     Phase 1 email: "Your data source is connected — here's what
     happens next"
     - Celebrate the first milestone
     - Set expectations for the longer journey ahead
     - Provide a visual roadmap of remaining steps

     Phase 2 email: "Your first pipeline is running"
     - Celebrate automated data flow
     - Show early insights (even before dashboards)
     - Maintain motivation during the "boring middle"

     Phase 3 email: "Your first dashboard just went live"
     - BIG celebration — this is the aha moment
     - Show the impact (data processed, insights available)
     - Drive team sharing

  3. Motivation maintenance:
     How do you keep users engaged during a 6-week setup when
     they haven't seen value yet?
     - Progress tracking (% complete indicators)
     - Quick wins along the way (intermediate value delivery)
     - Peer comparison ("Most teams are at this stage by week 2")
     - Human touchpoints (when to add CSM outreach)

assertions:
  - type: llm_judge
    criteria: "Extended timeline acknowledges the reality — the email sequence spans 6-8 weeks with appropriate cadence changes, not trying to squeeze a complex product into a 14-day sequence"
    weight: 0.30
    description: "Reality-appropriate timeline"
  - type: llm_judge
    criteria: "The 'boring middle' is addressed — Phase 2 emails maintain motivation during the technically necessary but excitement-low pipeline building phase"
    weight: 0.25
    description: "Boring middle motivation"
  - type: llm_judge
    criteria: "Quick wins are identified — intermediate value moments (early insights before dashboards) keep users engaged before the big aha moment"
    weight: 0.25
    description: "Intermediate quick wins"
  - type: llm_judge
    criteria: "Human touchpoints are integrated — the design identifies where automated emails aren't enough and CSM outreach should supplement"
    weight: 0.20
    description: "Integrated human touchpoints"
