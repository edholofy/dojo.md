meta:
  id: onboarding-email-design
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Design onboarding email templates — create visual layouts, responsive designs, and brand-consistent templates that work across email clients and devices"
  tags: [onboarding, email, design, templates, responsive, advanced]

state: {}

trigger: |
  Email design directly impacts engagement. A well-designed
  onboarding email is scannable, mobile-friendly, and guides
  the eye toward the CTA. But email design has unique constraints
  that web design doesn't.

  Part 1: Email design principles for onboarding

  1. Scannable structure:
     - Inverted pyramid (most important content first)
     - Short paragraphs (2-3 sentences max)
     - Visual hierarchy (headings, bold, whitespace)
     - One-column layout (most reliable across clients)
     Design the wireframe layout for each onboarding email type:
     a) Welcome email wireframe
     b) Feature highlight email wireframe
     c) Check-in email wireframe
     d) Trial ending email wireframe
     Describe each layout in detail (sections, spacing, elements).

  2. Mobile optimization:
     60%+ of email opens are on mobile.
     - Minimum touch target: 44x44px for CTA buttons
     - Font size: minimum 16px body, 22px headings
     - Single column, max-width 600px
     - Images: optional, not load-bearing (alt text critical)
     Describe mobile-specific design decisions for onboarding.

  3. Plain text vs. HTML decision:
     For each email type in the onboarding sequence, recommend:
     - Welcome: HTML or plain text? Why?
     - Activation nudge: HTML or plain text? Why?
     - Check-in: HTML or plain text? Why?
     - Social proof: HTML or plain text? Why?
     - Trial ending: HTML or plain text? Why?
     Justify each choice.

  Part 2: Brand-consistent template system

  For "Clarity" — a project management tool:
  Brand: clean, professional, blue/white palette, sans-serif

  Design the template system:
  1. Base template: shared header, footer, typography, colors
  2. Welcome variant: hero image, prominent CTA
  3. Feature variant: screenshot + description layout
  4. Check-in variant: personal, minimal design, text-focused
  5. Conversion variant: value summary, pricing, CTA

  Describe each template's visual elements, spacing, and how they
  maintain brand consistency while serving different purposes.

  Part 3: Email client compatibility

  Address these rendering challenges:
  - Outlook uses Word rendering engine (breaks CSS)
  - Gmail clips emails over 102KB
  - Dark mode inverts colors (logo and CTA visibility)
  - Image blocking (many clients block by default)
  For each challenge, describe the workaround.

assertions:
  - type: llm_judge
    criteria: "Wireframe layouts are specific — each email type has a distinct layout structure described in enough detail to build, not generic 'header + body + CTA'"
    weight: 0.25
    description: "Specific wireframe layouts"
  - type: llm_judge
    criteria: "Plain text vs. HTML decisions are justified — each email type has a clear rationale for the format choice based on the email's purpose"
    weight: 0.25
    description: "Justified format decisions"
  - type: llm_judge
    criteria: "Mobile optimization is practical — specific measurements and constraints are provided, not just 'make it responsive'"
    weight: 0.25
    description: "Practical mobile optimization"
  - type: llm_judge
    criteria: "Email client challenges have real workarounds — Outlook, Gmail, dark mode, and image blocking each get specific technical solutions"
    weight: 0.25
    description: "Real rendering workarounds"
