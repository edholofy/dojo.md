meta:
  id: onboarding-copywriting-advanced
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Master advanced onboarding email copywriting — use storytelling, behavioral psychology, and strategic framing to create emails that drive action"
  tags: [onboarding, email, copywriting, psychology, storytelling, advanced]

state: {}

trigger: |
  Advanced onboarding copywriting goes beyond clear writing. It
  uses storytelling, psychology, and strategic framing to make
  every email compelling and action-driving.

  Part 1: Storytelling in onboarding

  Transform this bland feature email into a story-driven email:

  Before: "AnalyticsPro has a collaboration feature that lets you
  share dashboards with your team. You can set permissions and add
  comments. Click here to try it."

  After: Write 3 versions using different storytelling techniques:

  Version A: Customer hero story
  "When Maria's team at [Company] was spending 4 hours every Monday
  compiling reports manually, she shared one dashboard..."
  Complete this email.

  Version B: Before/after contrast
  Show the user's current state (working alone) vs. future state
  (team collaboration), making the gap feel tangible.
  Write the full email.

  Version C: "Imagine" framing
  Paint a picture of the user's life after using the feature.
  Write the full email.

  Part 2: Psychological principles in onboarding copy

  Apply each principle to a specific onboarding email:

  1. Curiosity gap:
     Write a subject line + first paragraph that creates a gap
     the user can only close by opening the email and clicking.
     Product: a CRM tool, feature: automated follow-ups

  2. Social proof with specificity:
     Write a social proof paragraph that uses specific numbers
     rather than vague claims.
     Bad: "Thousands of companies use our tool"
     Good: Write yours.

  3. Loss aversion in trial emails:
     Write a trial-ending paragraph that frames the upgrade as
     avoiding loss rather than gaining features.
     Show both the loss-framing and gain-framing versions.

  4. Commitment and consistency:
     Write an email that reminds users of their initial goal (from
     signup) and shows how the next step is consistent with it.

  5. Reciprocity trigger:
     Write an email that gives genuine value first (tip, template,
     insight) before making an ask.

  Part 3: Rewrite clinic

  Rewrite these onboarding emails to be more compelling:

  Original A: "We have many integrations available. Check out our
  integrations page to see what connects with your tools."

  Original B: "You haven't used the reporting feature yet. Reports
  help you understand your data better. Click here to create one."

  Original C: "Your trial is ending soon. Upgrade now to continue
  using all features. Plans start at $19/month."

  For each, identify what's wrong, then rewrite using the
  techniques from Parts 1 and 2.

assertions:
  - type: llm_judge
    criteria: "Story versions are genuinely different techniques — the hero story, before/after, and 'imagine' framing each use a distinct narrative approach, not variations of the same structure"
    weight: 0.25
    description: "Distinct storytelling techniques"
  - type: llm_judge
    criteria: "Psychological principles are applied naturally — the copy reads like a well-written email, not like a psychology textbook exercise"
    weight: 0.25
    description: "Natural psychology application"
  - type: llm_judge
    criteria: "Loss vs. gain framing comparison is instructive — both versions for the trial email show how the same information lands differently when framed as loss vs. gain"
    weight: 0.25
    description: "Instructive framing comparison"
  - type: llm_judge
    criteria: "Rewrites are substantially better — the clinic versions don't just fix grammar but fundamentally restructure the emails around action and value"
    weight: 0.25
    description: "Substantially improved rewrites"
