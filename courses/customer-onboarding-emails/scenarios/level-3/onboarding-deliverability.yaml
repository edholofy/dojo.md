meta:
  id: onboarding-deliverability
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Optimize onboarding email deliverability — ensure emails reach the inbox through authentication, warming, content optimization, and sender reputation management"
  tags: [onboarding, email, deliverability, spam, authentication, advanced]

state: {}

trigger: |
  The best onboarding email in the world is worthless if it lands
  in spam. Deliverability is the foundation of email onboarding,
  and it requires ongoing technical and content optimization.

  Part 1: Deliverability fundamentals

  "NovaTech" — a SaaS product launching a new onboarding sequence:

  1. Email authentication setup:
     - SPF (Sender Policy Framework): what it does, how to configure
     - DKIM (DomainKeys Identified Mail): what it does, key setup
     - DMARC (Domain-based Message Authentication): policy options
     - BIMI (Brand Indicators for Message Identification): optional
     Explain each and write the DNS records needed.

  2. IP warming schedule:
     NovaTech is moving to a new sending IP. Design the warming
     plan:
     - Week 1: send to ___ recipients (most engaged first)
     - Week 2: expand to ___
     - Week 3: expand to ___
     - Week 4: full volume
     - What to monitor at each stage
     - Red flags that mean slow down

  3. Sender reputation factors:
     Explain how each affects deliverability:
     - Bounce rate (hard vs. soft bounces)
     - Spam complaint rate
     - Unsubscribe rate
     - Engagement rate (opens, clicks)
     - List hygiene (invalid addresses)
     - Sending consistency
     For each, define the danger threshold and prevention strategy.

  Part 2: Onboarding-specific deliverability

  Onboarding emails have unique deliverability considerations:

  1. Transactional vs. marketing classification:
     - Which onboarding emails are transactional (expected, requested)?
     - Which are marketing (promotional, can be opted out)?
     - Should they send from different streams/IPs?
     - How does this classification affect deliverability?

  2. Content optimization for inbox placement:
     Review these elements for spam triggers:
     - Subject lines (avoid spam words, caps, excessive punctuation)
     - HTML/text ratio (how much HTML is too much?)
     - Image-to-text ratio (optimal mix)
     - Link density (how many links per email?)
     - Unsubscribe placement and compliance (CAN-SPAM, GDPR)

  3. Gmail and Microsoft specific:
     - Gmail Promotions vs. Primary tab: how to get into Primary
     - Microsoft Focused vs. Other inbox: optimization tips
     - Google Postmaster Tools setup and monitoring
     - Microsoft SNDS (Smart Network Data Services)

  Part 3: Deliverability monitoring

  Design the monitoring dashboard:
  - Inbox placement rate by provider (Gmail, Outlook, Yahoo)
  - Authentication pass rates (SPF, DKIM, DMARC)
  - Bounce rate by email in the sequence
  - Spam complaint rate by email in the sequence
  - Alert thresholds (when to investigate)

assertions:
  - type: llm_judge
    criteria: "Authentication setup is technically accurate — SPF, DKIM, and DMARC records are correctly described with enough detail to implement"
    weight: 0.25
    description: "Technically accurate authentication"
  - type: llm_judge
    criteria: "IP warming schedule is progressive — the plan starts with the most engaged recipients and gradually expands, with monitoring at each stage"
    weight: 0.25
    description: "Progressive IP warming"
  - type: llm_judge
    criteria: "Transactional vs. marketing classification is correct — welcome and activation emails are transactional, while feature highlights and social proof are marketing"
    weight: 0.25
    description: "Correct email classification"
  - type: llm_judge
    criteria: "Gmail Primary tab strategies are practical — the advice goes beyond generic tips to specific content and formatting recommendations"
    weight: 0.25
    description: "Practical Gmail optimization"
