meta:
  id: industry-specific-onboarding
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Design industry-specific onboarding sequences — adapt email strategies for fintech, healthcare, education, and marketplace products with unique regulatory and user needs"
  tags: [onboarding, email, industry-specific, compliance, adaptation, advanced]

state: {}

trigger: |
  Different industries have different onboarding challenges —
  regulated industries need compliance language, marketplaces
  need two-sided onboarding, and education products need
  different motivation patterns.

  Part 1: Industry-specific onboarding design

  Design the onboarding email sequence for each industry:

  Industry A: Fintech (banking/payments app)
  "PaySmart" — a personal finance app:
  - Regulatory: KYC verification required, FDIC disclosures
  - Trust: users need to trust you with their financial data
  - Activation: link bank account, make first transaction

  Design a 7-email sequence that:
  - Builds trust before asking for sensitive data
  - Guides through KYC verification without losing users
  - Includes required compliance disclosures naturally
  - Celebrates first transaction
  Write subject lines and key messages for all 7 emails.

  Industry B: Healthcare SaaS (patient management)
  "MedFlow" — a practice management tool for clinics:
  - Regulatory: HIPAA compliance in all communications
  - Complexity: multi-step setup (EHR integration, scheduling)
  - Stakeholders: doctors, nurses, admin staff, IT

  Design a 5-email sequence that:
  - Addresses HIPAA compliance from email 1
  - Guides multi-stakeholder setup
  - Doesn't include any PHI (protected health information)
  Write subject lines and compliance considerations.

  Industry C: EdTech (online learning)
  "SkillUp" — an online course platform:
  - Motivation: learners drop off after initial excitement
  - Activation: complete first lesson
  - Retention: consistent learning habits

  Design a 7-email sequence that:
  - Channels initial excitement into first action
  - Uses learning science (spaced repetition, micro-learning)
  - Builds habit loops (daily or weekly learning triggers)
  - Celebrates learning milestones
  Write subject lines and motivation strategies.

  Industry D: Marketplace (two-sided)
  "SkillMatch" — a freelancer marketplace:
  - Two audiences: freelancers (supply) and clients (demand)
  - Activation differs: freelancer = complete profile; client = post first job

  Design separate 5-email sequences for both sides:
  - Freelancer sequence: profile completion, portfolio, first bid
  - Client sequence: first job post, browse talent, first hire
  Write subject lines for both sequences.

assertions:
  - type: llm_judge
    criteria: "Fintech sequence builds trust first — sensitive data requests (bank linking, KYC) come after trust-building emails, not in the welcome email"
    weight: 0.25
    description: "Trust-first fintech sequence"
  - type: llm_judge
    criteria: "Healthcare sequence is HIPAA-aware — emails never include patient data and compliance considerations are noted for each email"
    weight: 0.25
    description: "HIPAA-aware healthcare sequence"
  - type: llm_judge
    criteria: "EdTech sequence uses learning science — habit formation, spaced repetition, or other evidence-based learning principles are applied"
    weight: 0.25
    description: "Learning-science-based EdTech"
  - type: llm_judge
    criteria: "Marketplace has genuinely different sequences — freelancer and client paths have different goals, CTAs, and content, not the same sequence with different labels"
    weight: 0.25
    description: "Differentiated marketplace sequences"
