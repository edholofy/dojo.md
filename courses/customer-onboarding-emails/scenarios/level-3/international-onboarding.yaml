meta:
  id: international-onboarding
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Design international onboarding email programs — handle localization, timezone optimization, cultural adaptation, and multi-language sequence management"
  tags: [onboarding, email, international, localization, timezone, advanced]

state: {}

trigger: |
  Expanding onboarding emails internationally isn't just translation.
  Cultural norms, timezone optimization, communication styles, and
  regulatory requirements vary significantly across markets.

  Part 1: Localization strategy

  "GlobalApp" — a productivity tool expanding to 8 markets:
  US (existing), UK, Germany, France, Japan, Brazil, India, Australia

  1. Localization priority matrix:
     For each market, assess:
     - Market size and growth potential
     - Cultural distance from US (how much adaptation needed?)
     - Localization effort (translation + cultural adaptation)
     - Regulatory requirements (GDPR, local privacy laws)
     Prioritize which markets to localize first and why.

  2. Localization depth levels:
     Define 3 tiers:
     - Tier 1 (full localization): translated content, cultural
       adaptation, local case studies, local timezone optimization
     - Tier 2 (partial localization): translated content, timezone
       optimization, but US-centric examples
     - Tier 3 (minimal): English with timezone optimization only
     Assign each market to a tier and justify.

  Part 2: Cultural adaptation

  Write the welcome email for 3 markets, adapting for culture:

  US version (existing):
  "Hey! Welcome to GlobalApp. Let's get you set up in 3 minutes.
  Your first project is waiting 🚀"

  Germany adaptation:
  - More formal tone (Sie vs. du decision)
  - Data privacy mention (GDPR awareness)
  - Precise, no-fluff approach
  Write the full email.

  Japan adaptation:
  - Respectful and humble tone
  - Group orientation (how this helps the team)
  - Quality and reliability emphasis
  Write the full email.

  Brazil adaptation:
  - Warm and personal tone
  - Relationship-building emphasis
  - Community and social elements
  Write the full email.

  Part 3: Timezone optimization

  Design the timezone-aware sending strategy:
  - What time should onboarding emails send in each timezone?
  - How do you handle users who travel or have ambiguous timezones?
  - Day-of-week considerations by market (work week varies)
  - Holiday calendar integration (don't send during national holidays)

  Part 4: Multi-language sequence management

  Address operational challenges:
  - How do you manage 8 language versions of 7 emails (56 emails)?
  - Translation workflow (who translates? review process?)
  - A/B testing across languages (separate tests per language?)
  - Content updates (how to update one email across all languages?)
  - Quality assurance for translated content

assertions:
  - type: llm_judge
    criteria: "Cultural adaptations are genuine — Germany gets formality and privacy focus, Japan gets group orientation and respect, Brazil gets warmth, not just the same email translated"
    weight: 0.30
    description: "Genuine cultural adaptation"
  - type: llm_judge
    criteria: "Localization tiers are practical — the framework acknowledges that not every market needs full localization and prioritizes based on market size and cultural distance"
    weight: 0.25
    description: "Practical localization tiers"
  - type: llm_judge
    criteria: "Timezone strategy is thorough — it addresses not just send time but day-of-week, holidays, and ambiguous timezone handling"
    weight: 0.25
    description: "Thorough timezone strategy"
  - type: llm_judge
    criteria: "Multi-language operations are addressed — the workflow for managing 56+ email variants includes translation, review, update propagation, and QA"
    weight: 0.20
    description: "Multi-language operational plan"
