meta:
  id: personalization-at-scale
  level: 3
  course: customer-onboarding-emails
  type: output
  description: "Implement personalization at scale in onboarding emails — use dynamic content, conditional logic, and real-time data to make every email feel individually crafted"
  tags: [onboarding, email, personalization, dynamic-content, scale, advanced]

state: {}

trigger: |
  True personalization goes beyond "Hi {first_name}." It means
  every email feels like it was written specifically for that user
  based on their behavior, preferences, and context.

  Part 1: Personalization layers

  For "DesignSpace" — a collaborative design tool:

  Design 5 layers of personalization for the onboarding sequence:

  Layer 1: Identity personalization
  - First name, company name, job title
  - Example: "Hi Sarah, welcome to DesignSpace"
  - Effort: low | Impact: low-medium

  Layer 2: Segment personalization
  - Different content for designers vs. marketers vs. managers
  - Example: designer sees Figma import tip; marketer sees
    brand kit setup
  - Effort: medium | Impact: medium

  Layer 3: Behavioral personalization
  - Content based on what the user has/hasn't done
  - Example: if user created 3 designs, show sharing tips;
    if zero designs, show template gallery
  - Effort: high | Impact: high

  Layer 4: Contextual personalization
  - Based on signup source, device, time of day, location
  - Example: user from a webinar gets "As you saw in the demo..."
  - Effort: medium | Impact: medium

  Layer 5: Predictive personalization
  - AI-selected content based on lookalike behavior
  - Example: "Users like you typically love the vector editor"
  - Effort: very high | Impact: high

  For each layer:
  - Provide 3 concrete examples
  - Specify the data required
  - Describe the implementation approach
  - Estimate the activation impact

  Part 2: Write a fully personalized email

  Write the Day 5 check-in email with all personalization layers:

  Variant A: For a designer who has created 4 designs, uses the
  vector tool heavily, signed up from a Product Hunt post
  Write the full email.

  Variant B: For a marketing manager who has created 1 design
  using a template, invited 2 teammates, signed up from a
  Google search for "design tool for non-designers"
  Write the full email.

  Variant C: For a solo freelancer who signed up 5 days ago but
  only logged in twice, created nothing, signed up from a
  competitor comparison blog post
  Write the full email.

  Part 3: Personalization pitfalls

  Address:
  - When does personalization become creepy?
  - How to handle missing data (no job title, no company)
  - Diminishing returns: when is more personalization not worth it?
  - Privacy considerations (GDPR, data minimization)

assertions:
  - type: llm_judge
    criteria: "All 3 email variants are meaningfully different — each addresses the user's specific behavior, context, and needs, not just swapping a name token"
    weight: 0.30
    description: "Meaningfully different variants"
  - type: llm_judge
    criteria: "Personalization layers build progressively — identity is easy/low impact, behavioral is hard/high impact, creating a clear prioritization for implementation"
    weight: 0.25
    description: "Progressive personalization layers"
  - type: llm_judge
    criteria: "Creepiness boundary is defined — the response gives a clear line between helpful ('based on your activity') and creepy ('we tracked you from Product Hunt')"
    weight: 0.25
    description: "Defined creepiness boundary"
  - type: llm_judge
    criteria: "Missing data handling is practical — fallback content exists for when personalization data isn't available, rather than showing blank fields"
    weight: 0.20
    description: "Practical missing data handling"
