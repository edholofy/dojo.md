meta:
  id: activation-emails
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write activation emails that drive users to complete key setup steps — guide new users through account configuration, first actions, and initial value delivery"
  tags: [onboarding, email, activation, setup, beginner]

state: {}

trigger: |
  Activation emails are the bridge between signup and value. If
  users don't complete key setup steps, they'll never experience
  your product's value and will churn.

  Part 1: Activation email fundamentals

  Activation emails should:
  1. Focus on ONE setup step per email
  2. Show the benefit of completing the step (not just the how)
  3. Make the step feel quick and easy
  4. Include visual guidance if possible
  5. Create urgency without being pushy

  Part 2: Write activation emails

  "DataDash" — an analytics dashboard tool:

  Setup steps (in order of importance):
  1. Connect a data source (most critical — no data = no value)
  2. Create first dashboard
  3. Invite a teammate
  4. Set up automated reports

  Write activation emails for each setup step:

  Email A: "Connect your first data source"
  - User signed up yesterday but hasn't connected any data
  - Subject line
  - Body explaining WHY this step matters (not just how)
  - Step-by-step guidance (keep it to 3 steps max)
  - CTA: "Connect Your Data"
  - Offer help if they're stuck

  Email B: "Create your first dashboard"
  - User connected data 2 days ago but hasn't made a dashboard
  - Subject line
  - Show what they're missing (preview of insights)
  - Quick-start option (template dashboards)
  - CTA: "Choose a Template"

  Email C: "Invite your team"
  - User has been active for 5 days, solo user
  - Subject line
  - Social proof: "Teams who collaborate see 3x more insights"
  - Make it easy: just enter email addresses
  - CTA: "Invite Teammates"

  Part 3: Fix these activation emails

  Bad activation email:
  "Subject: Action Required: Complete Your Setup
  Dear User, You have not yet completed the required setup steps
  for your DataDash account. Please log in and complete the
  following mandatory configuration: [list of 8 steps]. Failure
  to complete setup within 7 days may result in limited
  functionality. — The DataDash Team"

  Identify every problem and rewrite it.

assertions:
  - type: llm_judge
    criteria: "Activation emails lead with benefits — each email explains WHY the step matters (what value it unlocks) before HOW to do it"
    weight: 0.30
    description: "Benefit-led activation"
  - type: llm_judge
    criteria: "Each email focuses on exactly one action — the emails don't list multiple setup steps but guide toward a single next step"
    weight: 0.25
    description: "Single action focus"
  - type: llm_judge
    criteria: "The bad example rewrite addresses the threatening tone, overwhelming list, and missing value proposition"
    weight: 0.25
    description: "Correct bad example fix"
  - type: llm_judge
    criteria: "Emails offer help — each activation email acknowledges that users might be stuck and provides a path to support"
    weight: 0.20
    description: "Help availability"
