meta:
  id: onboarding-email-tone
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Set the right tone in onboarding emails — match your brand voice, adapt to audience, and balance professionalism with warmth across different product types"
  tags: [onboarding, email, tone, voice, copywriting, beginner]

state: {}

trigger: |
  Tone in onboarding emails signals who you are as a company.
  Too formal feels cold. Too casual feels unprofessional. The
  right tone builds trust and makes users feel they chose well.

  Part 1: Tone spectrum

  Onboarding email tone ranges from formal to casual:

  Formal: "We are pleased to welcome you to our platform."
  Professional: "Welcome to DataFlow. Here's how to get started."
  Friendly: "Hey! So glad you're here. Let's set up your account."
  Casual: "Yooo! Welcome aboard 🎉 Let's get this party started!"

  Part 2: Match tone to product

  Write the opening paragraph of a welcome email for each product,
  using the appropriate tone:

  Product A: "SecureVault" — enterprise cybersecurity platform
  Audience: IT directors and CISOs
  Expected tone: ___
  Opening paragraph: ___

  Product B: "PetPal" — pet care subscription box
  Audience: pet owners, mostly 25-45
  Expected tone: ___
  Opening paragraph: ___

  Product C: "CodeCamp" — developer learning platform
  Audience: software engineers
  Expected tone: ___
  Opening paragraph: ___

  Product D: "WeddingPlan" — wedding planning tool
  Audience: engaged couples
  Expected tone: ___
  Opening paragraph: ___

  Product E: "FinanceFlow" — accounting software for small business
  Audience: small business owners and bookkeepers
  Expected tone: ___
  Opening paragraph: ___

  Part 3: Tone consistency check

  Here's a 3-email sequence. Identify the tone inconsistency
  and rewrite to make it consistent:

  Email 1: "Hey! Welcome to BrandX! We're SO excited you're here!
  Let's do this! 🚀🔥"

  Email 2: "Dear Valued Customer, We would like to inform you of
  the various features available within your BrandX subscription.
  Please find below a comprehensive overview."

  Email 3: "yo what's up, just checking in to see if you need
  anything lol. hit us up if you do 😎"

  Pick the best tone for a mid-range B2B SaaS and rewrite all 3.

assertions:
  - type: llm_judge
    criteria: "Tone matches audience — enterprise security gets professional tone, pet care gets warm/playful, developer platform gets knowledgeable/casual, and each is authentically different"
    weight: 0.30
    description: "Audience-matched tone"
  - type: llm_judge
    criteria: "Tone consistency fix identifies the problem — the rewrite establishes a single consistent voice across all 3 emails rather than swinging between extremes"
    weight: 0.25
    description: "Consistent tone fix"
  - type: llm_judge
    criteria: "None of the tones are sycophantic — even friendly/casual options sound genuine rather than overly enthusiastic or performative"
    weight: 0.25
    description: "Non-sycophantic tone"
  - type: llm_judge
    criteria: "Tone choices are justified — each product's tone selection includes reasoning about the audience's expectations and emotional state during onboarding"
    weight: 0.20
    description: "Justified tone choices"
