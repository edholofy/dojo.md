meta:
  id: cta-design
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Design effective CTAs for onboarding emails — write button text, placement, and surrounding copy that drives action without overwhelming new users"
  tags: [onboarding, email, cta, conversion, beginner]

state: {}

trigger: |
  The CTA (call to action) is the single most important element
  in an onboarding email. Every word in the email should lead
  to the CTA. If the CTA isn't clear, the email fails.

  Part 1: CTA writing principles

  Good CTAs:
  - Start with a verb ("Create," "Start," "Try," "Explore")
  - Are specific ("Create your first project" > "Get started")
  - Promise value ("See your insights" > "Click here")
  - Are button-sized (2-5 words)
  - Create low friction (sounds easy and quick)

  Bad CTAs:
  - Vague: "Click here," "Submit," "Continue"
  - Multiple: 3 buttons competing for attention
  - Scary: "Commit now," "Buy now" (too early in onboarding)
  - Hidden: buried at the bottom of a long email

  Part 2: Write CTAs for onboarding emails

  For each scenario, write the primary CTA button text and 2-3
  sentences of supporting copy that leads into it:

  1. Welcome email for a design tool:
     Goal: Get user to create their first design
     CTA button: ___
     Supporting copy: ___

  2. Activation email for a CRM:
     Goal: Get user to import their contacts
     CTA button: ___
     Supporting copy: ___

  3. Feature email for an analytics platform:
     Goal: Get user to set up their first automated report
     CTA button: ___
     Supporting copy: ___

  4. Social proof email for a project management tool:
     Goal: Get user to try a template that a featured customer uses
     CTA button: ___
     Supporting copy: ___

  5. Check-in email for a fitness app:
     Goal: Get user to complete their first workout
     CTA button: ___
     Supporting copy: ___

  6. Trial ending email for a video editing tool:
     Goal: Get user to upgrade to paid plan
     CTA button: ___
     Supporting copy: ___

  Part 3: CTA critique

  Fix these CTAs (rewrite button text and explain the improvement):
  a) "Click Here" (in a welcome email)
  b) "Submit" (in an activation email)
  c) "Buy Premium Plan — $49/mo — Annual Saves 20% — Enterprise
     Contact Us" (in a trial-ending email — too many options)
  d) "Learn More" (in a feature highlight email)

assertions:
  - type: llm_judge
    criteria: "CTAs are action-specific — each button uses a verb and describes the specific action the user will take, not generic 'click here' or 'get started'"
    weight: 0.30
    description: "Action-specific CTAs"
  - type: llm_judge
    criteria: "Supporting copy leads naturally to the CTA — the sentences before the button create motivation and context, making the button click feel like the obvious next step"
    weight: 0.25
    description: "Natural CTA lead-in"
  - type: llm_judge
    criteria: "Trial ending CTA is appropriately soft — it doesn't use hard-sell language but creates value-based motivation to upgrade"
    weight: 0.25
    description: "Appropriately soft trial CTA"
  - type: llm_judge
    criteria: "CTA fixes reduce friction — rewrites replace vague, scary, or overwhelming buttons with clear, low-friction alternatives"
    weight: 0.20
    description: "Friction-reducing fixes"
