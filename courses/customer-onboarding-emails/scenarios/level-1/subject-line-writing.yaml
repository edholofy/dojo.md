meta:
  id: subject-line-writing
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write compelling onboarding email subject lines — craft subject lines that get opened by using curiosity, benefit-focus, personalization, and appropriate urgency"
  tags: [onboarding, email, subject-lines, copywriting, beginner]

state: {}

trigger: |
  Your subject line determines whether your onboarding email gets
  opened or ignored. Even the best email body is worthless if no
  one reads it.

  Part 1: Subject line principles for onboarding

  Best practices:
  - Keep it 30-50 characters (mobile-friendly)
  - Lead with benefit or curiosity
  - Use the recipient's name sparingly (not every email)
  - Avoid spam triggers (ALL CAPS, excessive punctuation!!!)
  - Match the subject to the email content (no bait-and-switch)
  - Use preview text to extend the subject line story

  Part 2: Write subject lines

  For each onboarding email, write 3 subject line options and
  recommend the best one with reasoning:

  1. Welcome email (Day 0) for a CRM tool:
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  2. Activation email (Day 1) — user hasn't logged in yet:
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  3. Feature highlight email (Day 3) — automation feature:
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  4. Social proof email (Day 5) — customer success story:
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  5. Check-in email (Day 7) — "How's it going?":
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  6. Trial ending email (Day 12) — 2 days left:
     Option A: ___
     Option B: ___
     Option C: ___
     Recommended: ___ because ___

  Part 3: Subject line critique

  Rate these subject lines (1-5) and explain why:
  a) "Welcome to AppName! 🎉🎊🎉"
  b) "Your account is ready"
  c) "Quick question about your goals"
  d) "DON'T MISS OUT — Complete Setup NOW"
  e) "[Name], here's your 3-minute quick start"
  f) "Re: your account"

  Write preview text for your top 3 rated subject lines.

assertions:
  - type: llm_judge
    criteria: "Subject line options show variety — each set of 3 uses different approaches (benefit, curiosity, personalization, urgency) rather than minor variations of the same idea"
    weight: 0.30
    description: "Varied subject line approaches"
  - type: llm_judge
    criteria: "Recommendations are justified — the reasoning for the best option references open rate factors like length, benefit clarity, or curiosity gap"
    weight: 0.25
    description: "Justified recommendations"
  - type: llm_judge
    criteria: "Subject line critique correctly identifies spam triggers — 'DON'T MISS OUT' and excessive emojis are flagged, while conversational options are rated higher"
    weight: 0.25
    description: "Correct spam identification"
  - type: llm_judge
    criteria: "Preview text extends the subject line — it adds information that complements the subject rather than repeating it"
    weight: 0.20
    description: "Complementary preview text"
