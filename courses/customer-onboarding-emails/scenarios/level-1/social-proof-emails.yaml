meta:
  id: social-proof-emails
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write social proof emails for onboarding — use customer testimonials, case studies, usage stats, and community signals to build confidence in new users"
  tags: [onboarding, email, social-proof, testimonials, beginner]

state: {}

trigger: |
  Social proof emails reduce buyer's remorse and build confidence
  that users made the right choice. They're especially effective
  on Day 5-7, after the initial excitement fades.

  Part 1: Types of social proof in onboarding

  1. Customer testimonial: "Here's what [Name] at [Company] says..."
  2. Usage statistics: "Join 50,000 teams who..."
  3. Case study snippet: "How [Company] achieved [Result]..."
  4. Community signal: "Users like you also set up..."
  5. Expert endorsement: "Rated #1 by [Authority]..."
  6. Milestone: "10 million projects created on our platform"

  Part 2: Write social proof emails

  For "ProjectFlow" — a project management tool (trial user, Day 5):

  Email A: Customer testimonial approach
  Write a social proof email featuring a testimonial from a
  marketing agency that reduced their project delivery time by 35%.
  - Subject line
  - Brief intro connecting to the user's experience
  - Testimonial presentation (quote + context)
  - CTA that connects the testimonial to the user's next action
  Keep it under 120 words.

  Email B: Usage statistics approach
  Write a social proof email using platform statistics:
  - 12,000 teams use ProjectFlow
  - 2.3 million tasks completed this month
  - Average team saves 6 hours/week
  - Subject line
  - Make the stats feel relevant (not just big numbers)
  - CTA connecting stats to user's next step

  Email C: Peer comparison approach
  Write a social proof email showing what users in a similar
  role/industry typically do in their first week:
  "Most marketing teams set up 3 projects in their first week.
  You've set up 1 — here's a template to help you get started
  with your next one."
  - Subject line
  - Personalized comparison (encouraging, not shaming)
  - CTA to take the suggested action

  Part 3: Social proof mistakes

  Identify what's wrong with each and rewrite:
  a) "1 MILLION users can't be wrong!" (just a number, no story)
  b) Testimonial from "A satisfied customer" (anonymous)
  c) "Our CEO says: 'This is the best product ever made'"
     (self-referential, not customer proof)

assertions:
  - type: llm_judge
    criteria: "Testimonial email tells a specific story — it includes the company name, specific result (35% delivery time reduction), and enough context to be believable"
    weight: 0.30
    description: "Specific testimonial story"
  - type: llm_judge
    criteria: "Statistics feel relevant — the numbers are connected to the user's potential outcome, not just impressive-sounding vanity metrics"
    weight: 0.25
    description: "Relevant statistics"
  - type: llm_judge
    criteria: "Peer comparison is encouraging — it motivates without shaming, using the comparison to suggest a helpful next step rather than making the user feel behind"
    weight: 0.25
    description: "Encouraging peer comparison"
  - type: llm_judge
    criteria: "Mistake fixes are substantive — rewrites address the core issue (anonymous testimonials, self-referential quotes) with genuine social proof"
    weight: 0.20
    description: "Substantive mistake fixes"
