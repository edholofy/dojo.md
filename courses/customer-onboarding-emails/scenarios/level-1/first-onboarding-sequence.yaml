meta:
  id: first-onboarding-sequence
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Design and write your first complete onboarding email sequence — create a 7-email series from welcome to conversion for a SaaS product"
  tags: [onboarding, email, sequence, complete, practice, beginner]

state: {}

trigger: |
  Put everything together: write a complete 7-email onboarding
  sequence from scratch. This exercise combines welcome emails,
  activation, feature highlights, social proof, check-ins, and
  trial conversion.

  The product: "NoteSync" — a note-taking and knowledge management
  tool for professionals.

  Details:
  - Price: $12/mo or $99/year
  - 14-day free trial
  - Key features: smart note organization, full-text search,
    cross-device sync, team collaboration, AI-powered summaries
  - Aha moment: when a user creates 10+ notes and uses search
    to find one instantly
  - Target audience: knowledge workers, researchers, writers
  - Competitor: Notion, Obsidian, Evernote
  - Brand voice: intelligent, clean, helpful (not corporate)

  Write the complete sequence:

  Email 1 (Day 0): Welcome email
  - Subject line + preview text
  - Full email body
  - CTA

  Email 2 (Day 1): Getting started
  - Subject line + preview text
  - Full email body
  - CTA: create first note

  Email 3 (Day 3): Feature highlight (AI summaries)
  - Subject line + preview text
  - Full email body
  - CTA: try AI summary on existing notes

  Email 4 (Day 5): Social proof
  - Subject line + preview text
  - Full email body (include a testimonial)
  - CTA

  Email 5 (Day 7): Check-in
  - Subject line + preview text
  - Full email body
  - CTA: reply with questions or explore help center

  Email 6 (Day 10): Team collaboration feature
  - Subject line + preview text
  - Full email body
  - CTA: invite a teammate

  Email 7 (Day 13): Trial ending
  - Subject line + preview text
  - Full email body
  - CTA: upgrade

  For each email, keep the body under 150 words. After writing
  all 7, create a summary table showing: day, subject line, goal,
  CTA, and expected open rate benchmark.

assertions:
  - type: llm_judge
    criteria: "The sequence tells a coherent story — each email builds on the previous one, moving from welcome to activation to engagement to conversion in a logical progression"
    weight: 0.30
    description: "Coherent sequence story"
  - type: llm_judge
    criteria: "Each email is under 150 words — the emails are concise and scannable, not walls of text"
    weight: 0.20
    description: "Concise email bodies"
  - type: llm_judge
    criteria: "The aha moment (10+ notes + search) is woven into the sequence — early emails guide toward creating notes, and the search feature is highlighted once the user has content to search"
    weight: 0.25
    description: "Aha moment integration"
  - type: llm_judge
    criteria: "The summary table is useful — it provides a quick reference view of the entire sequence with clear goals per email"
    weight: 0.25
    description: "Useful summary table"
