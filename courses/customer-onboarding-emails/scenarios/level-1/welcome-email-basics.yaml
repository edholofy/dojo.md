meta:
  id: welcome-email-basics
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write effective welcome emails — craft the first email a new customer receives that sets expectations, delivers immediate value, and drives the first action"
  tags: [onboarding, email, welcome, basics, beginner]

state: {}

trigger: |
  The welcome email is the most-opened email you'll ever send (50-60%
  open rate vs. 20-25% for regular emails). It sets the tone for the
  entire customer relationship.

  Part 1: Welcome email fundamentals

  A great welcome email has:
  1. Warm, personal greeting (not "Dear Valued Customer")
  2. Confirmation of what they signed up for
  3. One clear next action (not five)
  4. Expectation setting (what emails are coming next)
  5. Easy way to get help

  Part 2: Write welcome emails for these products

  Product A: "TaskFlow" — a project management SaaS ($29/mo)
  New user just signed up for a 14-day free trial.
  Write the welcome email including:
  - Subject line (aim for 30-50 characters)
  - Preview text
  - Body (keep under 150 words)
  - One clear CTA: "Create your first project"
  - Brief mention of what to expect next

  Product B: "FreshBox" — a meal kit delivery service ($59/week)
  Customer just placed their first order, arriving in 3 days.
  Write the welcome email including:
  - Subject line
  - Order confirmation details
  - What to expect before delivery
  - One clear CTA: "Customize your preferences"
  - Excitement-building content

  Product C: "LearnPro" — an online learning platform ($19/mo)
  Student just enrolled in their first course.
  Write the welcome email including:
  - Subject line
  - Course access confirmation
  - One clear CTA: "Start Lesson 1"
  - Encouragement and community mention

  Part 3: Common welcome email mistakes

  Identify what's wrong with this welcome email and rewrite it:

  "Subject: Welcome to Our Platform!!!
  Hi there, thanks for signing up for AccountPro. Here are some
  things you can do: set up your profile, connect your bank,
  invite your team, customize your dashboard, explore templates,
  read our blog, join our community, follow us on social media,
  and download our mobile app. Click here to get started!"

assertions:
  - type: llm_judge
    criteria: "Each welcome email has exactly ONE clear CTA — the emails don't overwhelm with multiple actions but guide toward a single first step"
    weight: 0.30
    description: "Single clear CTA"
  - type: llm_judge
    criteria: "Emails are warm and personal — they sound like a human wrote them, not a corporate template, with appropriate tone for each product"
    weight: 0.25
    description: "Warm personal tone"
  - type: llm_judge
    criteria: "The bad example rewrite fixes the core problem — too many CTAs are reduced to one, and the overwhelming list of actions is replaced with a focused next step"
    weight: 0.25
    description: "Correct bad example diagnosis"
  - type: llm_judge
    criteria: "Subject lines are compelling and concise — they're under 50 characters and give a reason to open"
    weight: 0.20
    description: "Compelling subject lines"
