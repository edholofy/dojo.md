meta:
  id: check-in-emails
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write onboarding check-in emails — craft emails that genuinely ask how users are doing, surface blockers, and offer help without being pushy or automated-feeling"
  tags: [onboarding, email, check-in, engagement, beginner]

state: {}

trigger: |
  Check-in emails (typically Day 5-7) serve a dual purpose: they
  make users feel cared for, and they surface problems before
  users quietly churn. The best check-in emails feel genuinely
  personal, not like automated messages.

  Part 1: Check-in email approaches

  Approach A: The helpful friend
  "How's everything going with [Product]? I noticed you set up
  [thing they did]. If you need any help with [next step], I'm
  here."

  Approach B: The quick question
  "Quick question — what made you sign up for [Product]? Knowing
  your goal helps me point you to the right features."

  Approach C: The value reminder
  "You've been using [Product] for a week. Here's what you've
  accomplished so far: [summary]. Here's what's next."

  Part 2: Write check-in emails

  Scenario 1: Active user check-in
  "AnalyticsPro" user signed up 7 days ago. They've:
  - Connected 2 data sources
  - Created 1 dashboard
  - Logged in 4 times
  Write a check-in email that celebrates their progress and
  suggests the next level (sharing dashboards with team).

  Scenario 2: Stalled user check-in
  "AnalyticsPro" user signed up 7 days ago. They've:
  - Logged in once (Day 1)
  - Started data source connection but didn't complete it
  - Haven't returned since
  Write a check-in email that surfaces the blocker without
  making the user feel guilty for not using the product.

  Scenario 3: Power user check-in
  "AnalyticsPro" user signed up 7 days ago. They've:
  - Connected 5 data sources
  - Created 8 dashboards
  - Invited 3 teammates
  - Logged in every day
  Write a check-in email that matches their enthusiasm and
  introduces advanced features they might not have found.

  Part 3: From vs. reply-to

  Should check-in emails come from:
  a) "The [Product] Team" (generic)
  b) "Sarah from [Product]" (named person)
  c) "[CEO Name], Founder of [Product]" (founder)

  For each option, explain when it works best and write the
  appropriate sign-off.

assertions:
  - type: llm_judge
    criteria: "Stalled user email is empathetic, not guilt-inducing — it acknowledges the incomplete setup without phrases like 'you haven't been back' and offers specific help for the blocker"
    weight: 0.30
    description: "Empathetic stalled user email"
  - type: llm_judge
    criteria: "Active and power user emails are differentiated — the active user gets encouragement to go deeper, while the power user gets advanced features and recognition"
    weight: 0.25
    description: "Differentiated user-level emails"
  - type: llm_judge
    criteria: "Check-in emails feel personal — they reference specific user actions and feel like they were written by a human who looked at the user's account"
    weight: 0.25
    description: "Genuinely personal check-ins"
  - type: llm_judge
    criteria: "From/reply-to analysis gives practical guidance — each option has a clear use case with reasoning, not just 'it depends'"
    weight: 0.20
    description: "Practical sender guidance"
