meta:
  id: trial-ending-emails
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Write trial-ending and conversion emails — craft the emails that convert free trial users to paying customers with value recaps, urgency, and clear upgrade paths"
  tags: [onboarding, email, trial, conversion, upgrade, beginner]

state: {}

trigger: |
  Trial-ending emails are the culmination of your onboarding
  sequence. They need to recap the value received, create
  appropriate urgency, and make upgrading feel natural — not like
  a hard sell.

  Part 1: Trial ending email sequence

  Typical trial conversion emails:
  - Day 10 (4 days left): Value recap + what you'll lose
  - Day 12 (2 days left): Social proof + easy upgrade
  - Day 14 (last day): Final reminder + special offer (optional)
  - Day 15 (expired): "Your trial ended" + path back

  Part 2: Write the conversion sequence

  "FormBuilder" — a form and survey tool:
  Plan: $19/mo after 14-day trial
  User has created 5 forms and received 230 responses during trial.

  Email A (Day 10 — 4 days left):
  - Subject line
  - Recap what the user has accomplished (5 forms, 230 responses)
  - What happens when the trial ends (read-only access, no new forms)
  - CTA: "Keep Your Forms Active"
  - Tone: helpful and informative, not pushy

  Email B (Day 12 — 2 days left):
  - Subject line
  - Social proof element (what similar users do after upgrading)
  - Make upgrading feel easy ("takes 30 seconds")
  - CTA: "Upgrade Now"
  - Address common hesitations (can cancel anytime, etc.)

  Email C (Day 14 — last day):
  - Subject line
  - Create urgency without being aggressive
  - Optional: limited-time offer (first month at $9)
  - CTA: "Activate Your Account"
  - Keep it short — this is a reminder, not a sales pitch

  Email D (Day 15 — trial expired):
  - Subject line
  - Acknowledge the trial ended
  - Summarize what they built (forms, responses, data)
  - Let them know their data is safe for 30 days
  - Gentle CTA: "Reactivate Anytime"
  - No guilt, no pressure — leave the door open

  Part 3: Conversion email mistakes

  Fix these:
  a) "YOUR TRIAL EXPIRES TOMORROW. UPGRADE NOW OR LOSE EVERYTHING!"
  b) "We noticed you haven't upgraded yet. Here's why you should..."
     (generic, not personalized to their usage)
  c) Trial ending email with no mention of what happens to their data

assertions:
  - type: llm_judge
    criteria: "Value recap is personalized — the emails reference the user's specific usage (5 forms, 230 responses) rather than generic feature lists"
    weight: 0.30
    description: "Personalized value recap"
  - type: llm_judge
    criteria: "Urgency escalates appropriately — Day 10 is informational, Day 12 adds social proof, Day 14 is a brief reminder, and Day 15 is graceful, not aggressive"
    weight: 0.25
    description: "Appropriate urgency escalation"
  - type: llm_judge
    criteria: "Post-expiry email is respectful — it doesn't guilt-trip but lets the user know their data is safe and they can return anytime"
    weight: 0.25
    description: "Respectful post-expiry email"
  - type: llm_judge
    criteria: "Mistake fixes remove fear and add personalization — the aggressive tone is replaced with value-focused messaging, and generic language is replaced with user-specific content"
    weight: 0.20
    description: "Fear-removed, personalized fixes"
