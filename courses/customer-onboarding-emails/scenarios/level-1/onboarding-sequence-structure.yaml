meta:
  id: onboarding-sequence-structure
  level: 1
  course: customer-onboarding-emails
  type: output
  description: "Understand onboarding email sequence structure — learn the standard flow from welcome to activation to engagement and how each email builds toward value realization"
  tags: [onboarding, email, sequence, structure, beginner]

state: {}

trigger: |
  An onboarding sequence isn't random emails — it's a carefully
  designed journey that guides new users from signup to becoming
  engaged, paying customers.

  Part 1: Standard onboarding sequence structure

  The typical SaaS onboarding sequence:

  Email 1 (Day 0): Welcome — confirm signup, single next step
  Email 2 (Day 1): Getting started — first key action guidance
  Email 3 (Day 3): Feature spotlight — show core value feature
  Email 4 (Day 5): Social proof — customer story or testimonial
  Email 5 (Day 7): Check-in — "How's it going?" + help offer
  Email 6 (Day 10): Advanced feature — deeper value unlock
  Email 7 (Day 14): Milestone or trial ending — conversion push

  Part 2: Design the sequence

  For "DesignHub" — a collaborative design tool (14-day free trial,
  $39/mo after):

  1. Map out the 7-email sequence:
     For each email, specify:
     - Day sent (relative to signup)
     - Subject line
     - Goal of the email (what action you want)
     - Key message (1-2 sentences summarizing content)
     - CTA button text

  2. Identify the "aha moment":
     DesignHub's aha moment is when a user creates their first
     design AND shares it with a teammate. This typically happens
     by Day 3 for successful users.
     - Which emails in your sequence drive toward this moment?
     - How do you adjust if the user hasn't reached it by Day 5?

  3. Define the sequence goals:
     - Email 1-2: Activation (user completes setup)
     - Email 3-4: Engagement (user discovers core value)
     - Email 5-6: Habit formation (user returns regularly)
     - Email 7: Conversion (user becomes paying customer)
     Explain how each email maps to these goals.

  Part 3: Timing considerations

  Answer these questions:
  - Why send Email 2 on Day 1, not Day 0?
  - Why space Email 3-4 every 2 days, not daily?
  - When should you send more frequently vs. less?
  - What day/time performs best for onboarding emails?

assertions:
  - type: llm_judge
    criteria: "The sequence has a clear progression — each email builds on the previous one, moving from setup to engagement to conversion, not random feature dumps"
    weight: 0.30
    description: "Clear sequence progression"
  - type: llm_judge
    criteria: "The aha moment is central to the design — the sequence is oriented around helping users reach the collaborative design moment, not just touring features"
    weight: 0.25
    description: "Aha moment orientation"
  - type: llm_judge
    criteria: "Each email has a single clear goal — the purpose of each email is stated and the CTA matches that goal"
    weight: 0.25
    description: "Single-goal emails"
  - type: llm_judge
    criteria: "Timing rationale is thoughtful — the spacing between emails considers user behavior and avoids both overwhelming and losing engagement"
    weight: 0.20
    description: "Thoughtful timing rationale"
