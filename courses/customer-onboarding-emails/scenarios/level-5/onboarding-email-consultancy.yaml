meta:
  id: onboarding-email-consultancy
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Act as an onboarding email consultant — diagnose failures, design transformation programs, and deliver recommendations that fundamentally improve activation and conversion"
  tags: [onboarding, email, consultancy, transformation, strategy, mastery]

state: {}

trigger: |
  You're a senior consultant specializing in onboarding email
  optimization. A high-growth SaaS company has engaged you.

  Client: "RapidScale" — a project management SaaS
  - $28M ARR, growing 80% YoY
  - 25,000 new signups/month (75% from paid acquisition)
  - Plans: Free, Pro ($19/mo), Business ($49/user/mo)
  - 14-day trial for Pro and Business

  Current onboarding metrics:
  - Welcome email open rate: 52% (benchmark: 65-80%)
  - Day 7 email open rate: 18% (benchmark: 35-45%)
  - Activation rate (completed 3 core actions): 22% (benchmark: 40%)
  - Trial to paid conversion: 6% (benchmark: 12-18%)
  - Time to activation: 8 days average (benchmark: 2-3 days)
  - Re-engagement recovery rate: 3% (benchmark: 10-15%)

  Current onboarding emails:
  - 5 time-based emails (Day 0, 3, 7, 10, 13)
  - No behavioral triggers
  - No segmentation
  - Generic content (same for all users)
  - Text-heavy, no visual guides
  - CTAs are vague ("Learn More", "Get Started")
  - No A/B testing history
  - Sent from "no-reply@rapidscale.com"

  Deliverables:

  1. Diagnostic report (detailed):
     - Benchmark every metric against industry standards
     - Identify root causes for underperformance
     - Map the activation funnel and find the biggest leak
     - Estimate revenue lost due to poor onboarding
     Present findings with specific, data-backed insights.

  2. Transformation plan:
     Design a 90-day transformation with 3 phases:
     - Phase 1 (Days 1-30): Quick wins and foundations
     - Phase 2 (Days 31-60): Behavioral triggers and segmentation
     - Phase 3 (Days 61-90): Optimization and measurement
     For each phase, detail: initiatives, expected impact, resources.

  3. Write the redesigned sequence:
     Create the complete new 10-email sequence:
     - 7 core emails + 3 behavioral branches
     - Full subject lines, email briefs, and CTAs
     - Segmentation rules for 3 segments
     - Behavioral trigger definitions

  4. Financial projection:
     If the transformation improves:
     - Activation from 22% to 35%
     - Conversion from 6% to 10%
     Calculate the annual revenue impact.

assertions:
  - type: llm_judge
    criteria: "Diagnostic identifies the welcome email open rate as a foundational problem — at 52%, most users never start the sequence, and fixing this unlocks downstream improvements"
    weight: 0.25
    description: "Foundational problem identification"
  - type: llm_judge
    criteria: "The no-reply sender is called out — sending from no-reply@rapidscale.com is identified as a specific driver of low engagement and poor deliverability"
    weight: 0.25
    description: "No-reply sender identified"
  - type: llm_judge
    criteria: "Revenue projection is specific — the calculation uses actual signup volume, conversion improvement, and plan pricing to show concrete dollar impact"
    weight: 0.25
    description: "Specific revenue projection"
  - type: llm_judge
    criteria: "Quick wins in Phase 1 show immediate impact — subject line improvements, sender name change, and CTA optimization can improve metrics within 30 days"
    weight: 0.25
    description: "Immediate-impact quick wins"
