meta:
  id: onboarding-ecosystem-design
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Design the onboarding communication ecosystem — integrate email, in-app, SMS, push, chatbot, and human touchpoints into a unified orchestration platform"
  tags: [onboarding, email, ecosystem, orchestration, multi-channel, mastery]

state: {}

trigger: |
  The onboarding communication ecosystem extends beyond email to
  encompass every touchpoint a new user encounters. Orchestrating
  these channels creates an experience greater than the sum of
  its parts.

  Part 1: Ecosystem architecture

  "OmniApp" — a $150M ARR B2B SaaS platform:

  Current channels (siloed):
  - Email: Customer.io (lifecycle team)
  - In-app: Intercom (product team)
  - SMS: Twilio (growth team)
  - Push: OneSignal (mobile team)
  - Chatbot: Intercom (support team)
  - Human CSM: Salesforce (CS team)
  - Webinar: Zoom + marketing automation (marketing team)

  Problems:
  - 7 channels, 6 teams, no coordination
  - Users get 3-4 messages about the same thing from different channels
  - No unified user state across channels
  - Channel preference is ignored (email person gets SMS)
  - Human CSM has no visibility into automated touchpoints
  - Total touchpoints in first 14 days: 23 (overwhelming)

  1. Design the unified orchestration layer:
     - Central decision engine (which channel, which message, when)
     - Unified user profile (state across all channels)
     - Priority and frequency rules (max touchpoints per day/week)
     - Channel preference learning (adapt to user behavior)
     - Human-in-the-loop integration (when CSM takes over)

  2. Redesign the first 14 days:
     Map every touchpoint across all channels:
     - Day 0: which channels activate? What does each say?
     - Day 1-3: activation phase touchpoints
     - Day 4-7: engagement phase touchpoints
     - Day 8-14: conversion phase touchpoints
     Total touchpoints should decrease from 23 to ≤12.
     For each touchpoint, specify: channel, trigger, content, fallback.

  3. Channel selection intelligence:
     Design the algorithm for choosing the right channel:
     - User preference signals (opened email? tapped push?)
     - Message urgency and type
     - Channel effectiveness data
     - Fatigue management (channel rotation)
     - Regulatory constraints (opt-in status per channel)

  Part 2: Data integration

  Design the data layer:
  - Event schema: standardized events across all channels
  - User state: unified view of onboarding progress
  - Attribution: which channel drove which action?
  - Feedback loops: channel performance → orchestration decisions

  Part 3: Implementation roadmap

  Phase 1 (Q1): Unified user profile and basic rules
  Phase 2 (Q2): Orchestration engine and channel optimization
  Phase 3 (Q3): AI-driven channel selection and personalization
  Phase 4 (Q4): Autonomous optimization and learning

assertions:
  - type: llm_judge
    criteria: "Touchpoint count decreases — the redesign reduces from 23 to ≤12 touchpoints by eliminating redundancy across channels"
    weight: 0.25
    description: "Reduced touchpoint count"
  - type: llm_judge
    criteria: "Channel selection is intelligent — the algorithm considers user preference, message type, fatigue, and opt-in status, not just defaulting to email"
    weight: 0.25
    description: "Intelligent channel selection"
  - type: llm_judge
    criteria: "Human CSM integration is seamless — when a CSM takes over, automated touchpoints adjust rather than continuing to fire independently"
    weight: 0.25
    description: "Seamless CSM integration"
  - type: llm_judge
    criteria: "Implementation is phased by dependency — unified user profile comes before orchestration, which comes before AI optimization"
    weight: 0.25
    description: "Dependency-phased implementation"
