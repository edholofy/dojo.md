meta:
  id: onboarding-future-trends
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Anticipate the future of onboarding communication — emerging technologies, changing customer expectations, regulatory evolution, and the transformation of how new users are activated"
  tags: [onboarding, email, future, trends, strategy, mastery]

state: {}

trigger: |
  The onboarding email landscape is being reshaped by AI, privacy
  regulations, channel proliferation, and evolving user expectations.
  Staying ahead requires understanding where things are heading.

  Part 1: Technology trends

  1. Generative AI in onboarding:
     - AI-written, personalized email content at scale
     - Conversational onboarding via AI assistants
     - Dynamic sequence optimization (AI adjusts sequence in real-time)
     - AI-powered user intent prediction
     For each: current state, 2-year outlook, implications for teams

  2. Privacy-first onboarding:
     - Cookie deprecation impact on email targeting
     - Apple Mail Privacy Protection (open tracking unreliable)
     - GDPR enforcement tightening
     - Zero-party data strategies (user-provided preferences)
     How does onboarding email adapt when you can't track opens
     reliably and third-party data is restricted?

  3. Channel evolution:
     - Email's role shrinking or changing (not disappearing)
     - Rich messaging (RCS, WhatsApp Business)
     - In-product onboarding sophistication
     - Voice and video onboarding
     How does the multi-channel mix shift over the next 3 years?

  Part 2: Customer expectation trends

  1. Personalization expectations:
     - Users expect Netflix-level personalization from Day 1
     - Generic sequences will feel outdated
     - "Good enough" personalization won't differentiate
     What does "Netflix-level" onboarding personalization look like?

  2. Speed expectations:
     - Time-to-value expectations are decreasing
     - Users expect value in minutes, not days
     - Long onboarding sequences may lose relevance
     How do onboarding emails adapt when users expect instant value?

  3. Self-serve expectations:
     - Users prefer to figure things out themselves
     - Onboarding emails that "teach" may feel patronizing
     - Role shifts to "support when stuck" rather than "guide step by step"
     How does this change the email sequence philosophy?

  Part 3: Strategic recommendations

  Write the "Onboarding Communications 2028" strategy document:

  1. Technology investment priorities (what to build/buy)
  2. Team evolution (how roles and skills change)
  3. Measurement evolution (what to measure when opens are unreliable)
  4. Channel strategy (where email fits in the broader ecosystem)
  5. Organizational change (how the function evolves)

  Include: executive summary, key recommendations, investment asks,
  and timeline.

assertions:
  - type: llm_judge
    criteria: "Privacy-first adaptation is practical — the response provides concrete alternatives to open tracking (click-based measurement, engagement scoring, zero-party data) rather than just acknowledging the challenge"
    weight: 0.25
    description: "Practical privacy adaptation"
  - type: llm_judge
    criteria: "Channel evolution is nuanced — email's role is repositioned (not eliminated), with clear reasoning about what email does best vs. where other channels take over"
    weight: 0.25
    description: "Nuanced channel evolution"
  - type: llm_judge
    criteria: "Speed expectation response is actionable — the strategy addresses how to deliver value faster through email, not just acknowledging that users want speed"
    weight: 0.25
    description: "Actionable speed response"
  - type: llm_judge
    criteria: "Strategy document is investment-ready — the 2028 vision includes specific investment asks and timeline that an executive could approve"
    weight: 0.25
    description: "Investment-ready strategy"
