meta:
  id: onboarding-email-innovation
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Innovate in onboarding email — design next-generation approaches using AI, interactive content, hyper-personalization, and emerging communication channels"
  tags: [onboarding, email, innovation, ai, interactive, mastery]

state: {}

trigger: |
  The future of onboarding email extends beyond traditional
  static messages. Emerging technologies enable interactive,
  AI-adaptive, and hyper-personalized experiences.

  Part 1: Next-generation onboarding concepts

  Design and evaluate each innovation:

  1. AI-composed emails:
     Each onboarding email is generated dynamically by an LLM
     based on the user's profile, behavior, and goals. No two
     users receive the same email.
     - Technology architecture (LLM integration with email platform)
     - Personalization depth (what inputs shape the output?)
     - Quality control (how to prevent bad outputs?)
     - A/B test: AI-composed vs. human-written templates
     - Ethical considerations (transparency, data usage)
     - Expected impact on activation

  2. Interactive email experiences:
     Emails with interactive elements (surveys, product previews,
     mini-tutorials) that users complete inside the email without
     clicking through to the product.
     - AMP for Email implementation
     - Use cases: onboarding quiz, preference selection, quick setup
     - Email client support limitations
     - Fallback design for non-supporting clients
     Write an interactive welcome email that lets users select
     their primary use case directly in the email.

  3. Video-first onboarding:
     Replace text-heavy onboarding emails with personalized video
     messages (name, company, relevant features auto-generated).
     - Video generation at scale (tools, costs, quality)
     - Email embedding vs. thumbnail linking
     - Bandwidth and loading considerations
     - Impact on engagement vs. text emails
     Write the email framework for a video-first onboarding.

  4. Conversational onboarding:
     Instead of one-way emails, onboarding happens through an
     email-based conversation (reply-driven flow).
     - User replies drive the sequence (not time triggers)
     - AI processes replies and advances the conversation
     - NLP for intent detection in replies
     - Fallback for non-responders
     Design the 5-turn conversational onboarding flow.

  Part 2: Feasibility assessment

  For each innovation, score:
  - Technical readiness (1-5)
  - Expected activation impact (1-5)
  - Implementation cost (low/medium/high)
  - Risk level (low/medium/high)
  - Time to deploy (months)
  Recommend which to pilot first and design the pilot.

  Part 3: The future state

  Write the "Onboarding Email 2030" vision:
  - What will onboarding email look like in 5 years?
  - Which current practices will be obsolete?
  - What new capabilities will be standard?
  - How will the role of onboarding email specialist evolve?

assertions:
  - type: llm_judge
    criteria: "AI-composed email design includes quality control — the architecture addresses how to prevent bad, off-brand, or hallucinated content from reaching users"
    weight: 0.25
    description: "Quality-controlled AI email"
  - type: llm_judge
    criteria: "Interactive email acknowledges client limitations — the design includes fallback experiences for Gmail, Outlook, and other clients that don't support AMP"
    weight: 0.25
    description: "Fallback-aware interactive email"
  - type: llm_judge
    criteria: "Feasibility scores are honest — not every innovation gets a high score; some are flagged as technically immature or too costly for current implementation"
    weight: 0.25
    description: "Honest feasibility scoring"
  - type: llm_judge
    criteria: "Future vision is grounded — the 2030 predictions build on current technology trends rather than pure speculation"
    weight: 0.25
    description: "Grounded future vision"
