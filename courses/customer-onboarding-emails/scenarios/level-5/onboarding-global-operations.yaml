meta:
  id: onboarding-global-operations
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Design and manage global onboarding email operations — coordinate multi-region programs, localize at scale, and build follow-the-sun content operations"
  tags: [onboarding, email, global, operations, localization, mastery]

state: {}

trigger: |
  Global onboarding email operations manage the complexity of
  multiple languages, cultures, regulations, and time zones
  while delivering a consistent, high-quality experience.

  Part 1: Global operations design

  "WorldApp" — a productivity SaaS in 20 markets:
  - 80,000 signups/month globally
  - 10 supported languages
  - 20 email onboarding sequences (varying by market/segment)
  - Total email variants managed: 400+
  - Team: 12 people across US, EU, and APAC

  Current challenges:
  - English-first approach leaves non-English markets underserved
  - Time-to-localize new emails: 3-4 weeks
  - Cultural adaptation is minimal (direct translation only)
  - A/B tests only run on English version
  - 30% of global signups receive a degraded experience

  1. Design the global operating model:
     - Centralized content strategy with regional execution
     - "Master email" concept (English source → localization branches)
     - Regional content managers vs. central localization team
     - Cultural review process (native speakers for each market)
     - Localization technology stack (TMS, CAT tools, AI translation)

  2. Build the localization workflow:
     - New email creation: English → localization → cultural review →
       QA → deploy
     - Time target: reduce from 3-4 weeks to 5 business days
     - Machine translation + human review hybrid approach
     - Glossary and style guide per language
     - Continuous localization (not batch)

  3. Design the regional performance framework:
     For each market:
     - Benchmarks adjusted for local norms (open rates vary by region)
     - Cultural effectiveness metrics (not just translation quality)
     - Regional experiment roadmap
     - Market-specific optimization opportunities

  Part 2: Market prioritization

  With limited resources, prioritize investment across 20 markets:
  - Tier 1 (full investment): which markets and why?
  - Tier 2 (standard investment): criteria for this tier
  - Tier 3 (minimal investment): what's the minimum viable experience?
  Design the scoring model (market size, growth, current performance,
  investment required, competitive pressure).

  Part 3: Global content operations

  Design the content operations system:
  - Content calendar across all markets
  - Version control for 400+ email variants
  - Approval workflows per region
  - Quality metrics per language
  - Content freshness tracking (stale email detection)
  - Incident management across time zones

assertions:
  - type: llm_judge
    criteria: "Localization workflow targets 5 days — the design shows specific process improvements that compress 3-4 weeks to 5 days, not just a hope for faster turnaround"
    weight: 0.25
    description: "Specific localization acceleration"
  - type: llm_judge
    criteria: "Market prioritization uses a multi-factor model — not just market size but growth potential, competitive pressure, and current underservice levels"
    weight: 0.25
    description: "Multi-factor market prioritization"
  - type: llm_judge
    criteria: "Regional benchmarks are culturally adjusted — the framework acknowledges that a 45% open rate in Japan means something different than 45% in the US"
    weight: 0.25
    description: "Culturally adjusted benchmarks"
  - type: llm_judge
    criteria: "Content operations handles 400+ variants — the version control and tracking system is designed for this scale, not a small-team approach"
    weight: 0.25
    description: "Scale-appropriate content operations"
