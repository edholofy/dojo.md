meta:
  id: onboarding-mastery-challenge
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Demonstrate mastery of onboarding emails — solve interconnected challenges that test strategy, copywriting, analytics, technology, and leadership simultaneously"
  tags: [onboarding, email, mastery, challenge, comprehensive, mastery]

state: {}

trigger: |
  This mastery challenge tests every onboarding email skill —
  from copywriting individual emails to designing enterprise
  systems, from analyzing data to making strategic decisions.

  Scenario: "NexTech" — a $200M ARR horizontal SaaS platform
  with 50,000 monthly signups across 3 products and 12 markets.

  Challenge 1: Acquisition channel mismatch

  Your onboarding emails perform well for organic signups (18%
  conversion) but terribly for paid acquisition signups (4%
  conversion). Paid acquisition is 60% of signups and growing.

  - Diagnose: why do paid signups convert at 1/4 the rate?
  - Analyze: what's different about these users' behavior?
  - Design: a paid-acquisition-specific onboarding path
  - Write: the welcome email for paid acquisition users
  - Model: the revenue impact of closing the conversion gap

  Challenge 2: Product-market fit signal

  Product 3 (launched 6 months ago) has 15% activation and 2%
  trial conversion. Your boss says "fix the onboarding emails."

  But you suspect the problem isn't the emails — it's the product.
  - Present the evidence that this is a product problem, not email
  - Design the diagnostic experiment (what would prove it?)
  - Write the communication to your VP explaining why more emails
    won't fix a product-market fit issue
  - Propose what you CAN do with email to help (feedback collection,
    rapid iteration signaling)

  Challenge 3: Global launch crisis

  NexTech is launching in Japan next month. The localization team
  translated all 12 onboarding emails, but you just discovered
  the translation is machine-generated with cultural errors (casual
  tone, Western idioms, wrong formality level).

  - Assess: the risk of launching with poor translations
  - Decision: delay launch, launch with English only, or fix?
  - If fix: prioritize which emails to fix first
  - Write: the culturally-correct Japanese welcome email brief
    (in English, describing tone, structure, and cultural notes)
  - Process: prevent this from happening for future market launches

  Challenge 4: Board-level presentation

  Prepare the "Onboarding Email Program" section for the board deck:
  - Program health scorecard (RAG status for key metrics)
  - Revenue attribution (how much revenue do emails drive?)
  - Investment vs. return analysis
  - Key wins from the past quarter
  - Risks and mitigation
  - Investment ask for next quarter
  Write the board slide content (concise, executive-level).

assertions:
  - type: llm_judge
    criteria: "Paid acquisition diagnosis identifies intent mismatch — paid users may have weaker intent or different expectations than organic users, requiring different onboarding"
    weight: 0.25
    description: "Intent mismatch diagnosis"
  - type: llm_judge
    criteria: "Product-market fit argument is evidence-based — the case that Product 3's problem is the product, not emails, uses activation data, user feedback, and comparison metrics"
    weight: 0.25
    description: "Evidence-based PMF argument"
  - type: llm_judge
    criteria: "Japan localization response prioritizes correctly — the welcome email and first activation email are fixed first, while later emails can wait"
    weight: 0.25
    description: "Correct localization priority"
  - type: llm_judge
    criteria: "Board content is executive-appropriate — it's concise, uses RAG indicators, and focuses on revenue impact and investment asks, not operational details"
    weight: 0.25
    description: "Executive-appropriate board content"
