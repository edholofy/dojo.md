meta:
  id: comprehensive-onboarding-engagement
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Demonstrate complete mastery in a comprehensive engagement — advise a CEO on transforming their onboarding communication program from scratch to world-class"
  tags: [onboarding, email, comprehensive, ceo-advisory, transformation, mastery]

state: {}

trigger: |
  You've been asked to advise the CEO of "Velocity" — a Series D
  SaaS company ($120M ARR, 40,000 monthly signups) on transforming
  their onboarding email program. The current program is in crisis.

  CEO brief:
  "Our trial conversion has been dropping for 6 straight months —
  from 16% to 9%. We're spending $4M/month on acquisition but
  losing 91% of signups before they pay. I'm convinced the
  onboarding experience is broken, and email is a huge part of
  that. Fix it."

  Context:
  - 3 products, 4 buyer segments, 8 markets
  - Current onboarding emails: generic, outdated, same since launch
  - No dedicated onboarding team (marketing sends the emails)
  - Email platform: legacy Mailchimp, no behavioral triggers
  - Activation rate: 28% (was 45% 18 months ago)
  - Competitors have sophisticated, personalized onboarding
  - Engineering changes broke several email triggers 3 months ago
    (never fixed)
  - No one currently owns onboarding email success

  Deliverable 1: Diagnostic assessment

  1. Root cause analysis:
     - Why did activation drop from 45% to 28%?
     - Is this an email problem, product problem, or acquisition problem?
     - How much of the conversion decline can email address?
     - What's the financial impact of the current state?
     Present findings with evidence and recommendations.

  2. Competitive analysis:
     - Benchmark against top 3 competitors' onboarding
     - Identify specific gaps (what they do that you don't)
     - Quick wins vs. long-term improvements

  Deliverable 2: Transformation plan

  Design the 12-month transformation:

  Month 1-2: Emergency stabilization
  - Fix broken triggers
  - Quick wins (subject lines, CTAs, sender name)
  - Hire first dedicated owner
  - Expected impact: 9% → 11% conversion

  Month 3-4: Foundation
  - Platform migration (Mailchimp → Customer.io or equivalent)
  - Behavioral trigger implementation
  - Basic segmentation (4 segments)
  - Expected impact: 11% → 13% conversion

  Month 5-8: Transformation
  - Full behavioral sequence redesign
  - Multi-channel integration
  - A/B testing program launch
  - International adaptation
  - Expected impact: 13% → 16% conversion

  Month 9-12: Optimization
  - AI-powered personalization
  - Advanced experimentation
  - Cross-product onboarding
  - Expected impact: 16% → 18% conversion

  Deliverable 3: Investment case

  Total investment ask: ___
  - Team (headcount, roles, salary)
  - Technology (platforms, tools)
  - Services (localization, design, consulting)

  Expected return:
  - Additional paying customers per month (at each milestone)
  - Additional ARR
  - 3-year ROI
  - Payback period

  Deliverable 4: CEO presentation

  Write the 10-slide presentation:
  1. Executive summary (1 slide)
  2. The problem (2 slides)
  3. Root cause analysis (2 slides)
  4. Transformation plan (3 slides)
  5. Investment and return (1 slide)
  6. Timeline and next steps (1 slide)

  Describe each slide's content and key message.

assertions:
  - type: llm_judge
    criteria: "Root cause analysis distinguishes email from product — the assessment determines how much of the 45% → 28% activation decline is attributable to email problems vs. product changes or acquisition quality shifts"
    weight: 0.25
    description: "Cause-separated root analysis"
  - type: llm_judge
    criteria: "Transformation milestones have realistic conversion targets — each phase's expected conversion improvement is grounded in benchmark data, not arbitrary round numbers"
    weight: 0.25
    description: "Realistic milestone targets"
  - type: llm_judge
    criteria: "Emergency stabilization addresses the broken triggers — the immediate plan fixes the 3-month-old engineering issue first, as the most impactful quick win"
    weight: 0.25
    description: "Broken trigger priority fix"
  - type: llm_judge
    criteria: "CEO presentation is compelling — it tells a clear story from problem to solution to investment ask, in a format a Series D CEO can act on"
    weight: 0.25
    description: "Compelling CEO presentation"
