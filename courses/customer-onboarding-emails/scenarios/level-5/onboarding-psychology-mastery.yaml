meta:
  id: onboarding-psychology-mastery
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Master the psychology of onboarding — apply behavioral science, habit formation, motivation theory, and cognitive load management to create onboarding emails that drive lasting behavior change"
  tags: [onboarding, email, psychology, behavioral-science, habit, mastery]

state: {}

trigger: |
  Onboarding is fundamentally about behavior change — getting
  someone to adopt a new tool and make it part of their workflow.
  Understanding the psychology behind this change makes your
  emails dramatically more effective.

  Part 1: Behavioral science frameworks

  Apply each framework to onboarding email design:

  1. Fogg Behavior Model: B = MAP (Motivation × Ability × Prompt)
     - Motivation: why does the user care? (email builds this)
     - Ability: how easy is the action? (email reduces friction)
     - Prompt: when does the trigger hit? (email timing)

     For "TaskPro" (project management tool), design 3 emails
     that optimize each element:
     - Email A: High motivation email (inspire action with outcomes)
     - Email B: High ability email (make the next step trivially easy)
     - Email C: Perfect prompt email (sent at the exact right moment)

  2. Hook Model (Nir Eyal): Trigger → Action → Variable Reward → Investment
     Map how onboarding emails create habits:
     - External triggers (email notifications)
     - Internal triggers (anxiety about missing deadlines)
     - Actions (simple, low-friction next steps)
     - Variable rewards (unexpected insights from data)
     - Investment (time/data that increases switching cost)
     Design 4 emails that build the hook cycle.

  3. Self-Determination Theory: Autonomy, Competence, Relatedness
     Users are motivated when they feel:
     - Autonomy: they chose this, it's their decision
     - Competence: they're getting better at something
     - Relatedness: they're part of a group
     Write 3 emails that address each motivation type.

  4. Cognitive load management:
     Users can only process so much new information.
     - Progressive disclosure: reveal features gradually
     - Chunking: group related information
     - Recognition over recall: show, don't tell
     Redesign a typical "here are all our features" email
     using cognitive load principles.

  Part 2: Motivation patterns across the onboarding journey

  Map emotional states and design email interventions:

  Day 0-1: Peak excitement (new tool energy!)
  → Email strategy: channel excitement into first action
  → Danger: overwhelming with too much information

  Day 2-5: Reality check (this is harder than expected)
  → Email strategy: reduce friction, offer help, normalize struggle
  → Danger: user gives up

  Day 6-10: Plateau (not seeing enough value yet)
  → Email strategy: show quick wins, social proof, peer progress
  → Danger: user forgets about the product

  Day 11-14: Decision point (commit or quit)
  → Email strategy: summarize value, show what they'd lose, make
     commitment easy
  → Danger: analysis paralysis

  For each stage, write the email that addresses the emotional state.

  Part 3: Ethical persuasion boundaries

  For each technique, define the ethical application vs. manipulation:
  1. Urgency: helpful reminder vs. fake countdown timer
  2. Social proof: real community vs. inflated numbers
  3. Loss aversion: value reminder vs. fear-based messaging
  4. Commitment: progress tracking vs. sunk cost guilt
  Write the ethics charter for onboarding email persuasion.

assertions:
  - type: llm_judge
    criteria: "Fogg model emails optimize different elements — the motivation email is different from the ability email, which is different from the prompt email, each targeting a specific behavior driver"
    weight: 0.25
    description: "Distinct Fogg model optimization"
  - type: llm_judge
    criteria: "Emotional journey mapping is realistic — the excitement → struggle → plateau → decision arc reflects actual user psychology, not assumed smooth adoption"
    weight: 0.25
    description: "Realistic emotional journey"
  - type: llm_judge
    criteria: "Hook model creates genuine habits — the emails help users form real product habits through variable rewards and investment, not just engagement tricks"
    weight: 0.25
    description: "Genuine habit formation"
  - type: llm_judge
    criteria: "Ethics charter draws specific lines — each persuasion technique has a concrete boundary between helpful application and manipulation"
    weight: 0.25
    description: "Specific ethical boundaries"
