meta:
  id: onboarding-portfolio-management
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Manage onboarding email programs across a multi-product portfolio — optimize shared resources, cross-product experiences, and portfolio-level performance"
  tags: [onboarding, email, portfolio, multi-product, management, mastery]

state: {}

trigger: |
  Managing onboarding emails across a portfolio of products
  requires balancing product-specific needs with shared resources,
  cross-product discovery, and portfolio-level optimization.

  Part 1: Portfolio assessment

  "TechGroup" — a company with 5 SaaS products:

  Product A: "DataViz" (analytics, $79/mo, 5K signups/mo)
  - Onboarding: 8 emails, behavioral triggers, 3 segments
  - Performance: 16% trial conversion, 72% activation
  - Team: 1 dedicated email person
  - Maturity: high (2 years of optimization)

  Product B: "FormBuilder" (forms, $29/mo, 12K signups/mo)
  - Onboarding: 5 time-based emails, no segmentation
  - Performance: 9% trial conversion, 45% activation
  - Team: shared with marketing team
  - Maturity: low (basic sequence, rarely updated)

  Product C: "ChatAssist" (customer chat, $49/mo, 8K signups/mo)
  - Onboarding: 7 emails, basic behavioral triggers
  - Performance: 12% trial conversion, 58% activation
  - Team: 1 part-time email person
  - Maturity: medium (some optimization, not systematic)

  Product D: "APIConnect" (integration platform, $99/mo, 3K signups/mo)
  - Onboarding: 4 emails, developer-focused
  - Performance: 8% trial conversion, 38% activation
  - Team: no dedicated resource (engineering writes emails)
  - Maturity: very low (engineer-written emails)

  Product E: "TeamSync" (collaboration, $15/user/mo, 15K signups/mo)
  - Onboarding: 10 emails, multi-stakeholder, high sophistication
  - Performance: 14% trial conversion, 65% activation
  - Team: 2 dedicated people
  - Maturity: high (complex but well-optimized)

  1. Portfolio analysis:
     - Where is the biggest improvement opportunity? (hint: it's not
       the already-good products)
     - What's the revenue impact of bringing each product to benchmark?
     - Which product should get the next investment dollar?

  2. Shared services design:
     What can be centralized across all 5 products?
     - Template system and design components
     - Analytics and measurement framework
     - A/B testing infrastructure and methodology
     - Deliverability management
     - Compliance and governance
     What must remain product-specific?

  3. Cross-product onboarding:
     40% of TechGroup customers use 2+ products.
     Design the cross-product onboarding strategy:
     - When to introduce a second product during onboarding
     - How to avoid overwhelming new users
     - Cross-product bundle onboarding for customers who buy 2+ at once
     Write the cross-product introduction email.

  4. Investment allocation:
     You have $500K additional budget for the portfolio.
     Allocate across the 5 products with specific justification.
     Show expected ROI per product from the investment.

assertions:
  - type: llm_judge
    criteria: "Investment prioritizes the biggest opportunity — Product B or D (lowest maturity, highest improvement potential) gets significant attention, not just adding more to already-good products"
    weight: 0.25
    description: "Opportunity-based investment"
  - type: llm_judge
    criteria: "Shared services are correctly identified — templates, analytics, and compliance centralize well, while content and segmentation stay product-specific"
    weight: 0.25
    description: "Correct shared service split"
  - type: llm_judge
    criteria: "Cross-product timing is right — second product is introduced after activation (not during), when the user has demonstrated value from the first product"
    weight: 0.25
    description: "Right cross-product timing"
  - type: llm_judge
    criteria: "Budget allocation has ROI justification — each product's allocation comes with expected return, not equal distribution across products"
    weight: 0.25
    description: "ROI-justified budget allocation"
