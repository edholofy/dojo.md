meta:
  id: onboarding-roi-framework
  level: 5
  course: customer-onboarding-emails
  type: output
  description: "Build comprehensive ROI frameworks for onboarding email programs — quantify business value, justify investment, and measure return on every onboarding email dollar spent"
  tags: [onboarding, email, roi, framework, financial, mastery]

state: {}

trigger: |
  The onboarding email program must demonstrate ROI to justify
  investment and earn organizational support. A robust framework
  connects email metrics to business outcomes in language
  executives understand.

  Part 1: Full-cycle ROI model

  "CloudSuite" — a B2B SaaS ($80M ARR):
  - 8,000 new signups per month
  - Plans: Starter ($39/mo), Pro ($99/mo), Enterprise ($299/mo)
  - Average starting plan: Pro
  - Trial conversion: 14%
  - Average customer lifetime: 24 months
  - Onboarding email program cost: $320K/year
    (2 FTEs: $180K, Platform: $60K, Design: $40K, Tools: $40K)

  Engagement data:
  - Users who engaged with onboarding emails (opened 4+): 55%
  - Engaged user trial conversion: 21%
  - Non-engaged user trial conversion: 5%
  - Engaged user 12-month retention: 82%
  - Non-engaged user 12-month retention: 54%

  1. Calculate the full ROI:

     Direct revenue impact:
     - Additional conversions from email engagement
     - Additional retained revenue from better onboarding
     - Expansion revenue from better-activated users
     - Support cost reduction from better-onboarded users

     Calculate:
     - Annual revenue attributable to onboarding emails
     - Cost of onboarding email program
     - ROI percentage
     - Revenue per dollar invested

  2. Incremental investment analysis:
     The team wants to hire 2 more people (+$180K) and upgrade
     the platform (+$40K) to:
     - Add behavioral triggers (estimated +8% engagement)
     - Add segmentation (estimated +3% conversion for engaged)
     - Add A/B testing (estimated +2% overall improvement)

     Calculate:
     - Expected incremental revenue
     - Incremental ROI
     - Payback period
     - Break-even analysis (what % improvement is needed to justify?)

  3. Sensitivity analysis:
     What if key assumptions are wrong?
     - If engagement only improves by half the estimate
     - If conversion improvement is 50% lower
     - If the new hires take 6 months to reach full productivity
     - If the platform migration causes 2 months of disruption
     Model each scenario and identify the break-even point.

  Part 2: Attribution methodology

  Design the attribution framework:
  - First-touch: email gets credit for all conversions it influenced
  - Last-touch: only the email closest to conversion gets credit
  - Multi-touch: distributed credit across all touchpoints
  - Incrementality: control group to measure true email impact
  Recommend the best approach for CloudSuite and justify.

  Part 3: Executive reporting

  Create the quarterly ROI report:
  - One-page executive summary
  - Key metrics with trend arrows
  - Revenue attribution with methodology note
  - Investment vs. return visualization
  - Next quarter priorities and expected impact

assertions:
  - type: llm_judge
    criteria: "ROI calculation includes retention impact — better onboarding doesn't just convert more users, it retains them longer, and the LTV difference is captured"
    weight: 0.25
    description: "Retention-inclusive ROI"
  - type: llm_judge
    criteria: "Sensitivity analysis identifies the break-even — the model shows the minimum improvement needed to justify the investment, not just the best-case scenario"
    weight: 0.25
    description: "Break-even sensitivity analysis"
  - type: llm_judge
    criteria: "Attribution methodology recommendation is specific — one approach is recommended with clear reasoning about why it fits CloudSuite's needs"
    weight: 0.25
    description: "Specific attribution recommendation"
  - type: llm_judge
    criteria: "Executive report is one page — the quarterly summary is genuinely concise with the right metrics for a senior audience"
    weight: 0.25
    description: "Genuinely concise executive report"
