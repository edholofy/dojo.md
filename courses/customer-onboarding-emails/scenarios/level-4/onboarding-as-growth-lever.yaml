meta:
  id: onboarding-as-growth-lever
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Use onboarding emails as a growth lever — design sequences that drive viral adoption, team expansion, referrals, and network effects through strategic email touchpoints"
  tags: [onboarding, email, growth, viral, expansion, expert]

state: {}

trigger: |
  Onboarding emails don't just activate individual users — they
  can drive growth loops by encouraging team invites, referrals,
  social sharing, and viral adoption.

  Part 1: Growth loops in onboarding

  "CollabSpace" — a team collaboration tool:
  - Free: 3 users, basic features
  - Pro: $12/user/mo, unlimited features
  - Growth model: bottom-up adoption (one person → team → company)

  1. Design the viral onboarding loop:

     Loop 1: Team invite loop
     User A signs up → Onboarding email encourages team invite →
     User B gets invited → User B activates → User B invites User C
     - Which email in the sequence triggers the invite?
     - What incentive (if any) drives the invite?
     - How does the invited user's onboarding differ?
     - What's the target viral coefficient (invites per user)?
     Write the invite-triggering email and the invited user welcome.

     Loop 2: Content sharing loop
     User creates a document → Shares with external collaborator →
     Collaborator sees the product in use → Signs up
     - How does the shared content promote the product?
     - What email does the new user from sharing get?
     - How is this different from a direct signup welcome?
     Write the "shared content" signup email.

     Loop 3: Referral loop
     Existing user refers a friend → Friend signs up → Both get credit
     - When in onboarding is the referral ask appropriate?
     - What makes the referral feel natural (not spammy)?
     - What reward structure maximizes referrals?
     Write the referral ask email and the referred user welcome.

  2. Design the expansion onboarding:
     When a team goes from 3 free users to 10+ users (upgrade trigger):
     - Admin onboarding: team management, permissions, billing
     - New user onboarding: adapted for users who saw the product
       before joining officially
     - Manager onboarding: reporting, usage tracking, ROI
     Write the admin expansion email.

  Part 2: Measuring growth impact

  Design the growth metrics framework:
  - Viral coefficient (invites sent per user, conversion of invites)
  - Team expansion rate (solo → team conversion)
  - Referral rate (referrals per user)
  - Time-to-team-formation (days from first user to team signup)
  - Revenue per growth loop (which loop generates most revenue?)

  Part 3: Growth email ethics

  Where's the line between:
  - Helpful: "Invite your team to collaborate" (genuine value)
  - Pushy: "Invite 5 friends to unlock premium features"
  - Dark pattern: auto-importing contacts and sending invites
  Write guidelines for growth emails that drive adoption ethically.

assertions:
  - type: llm_judge
    criteria: "Viral loops are product-natural — team invites and content sharing are core to the product's value, not bolted-on growth hacks"
    weight: 0.30
    description: "Product-natural viral loops"
  - type: llm_judge
    criteria: "Invited user onboarding is adapted — users who arrive via invite or sharing get context about the product from the inviter's perspective, not a cold welcome"
    weight: 0.25
    description: "Adapted invited user onboarding"
  - type: llm_judge
    criteria: "Growth ethics guidelines draw clear lines — the framework distinguishes between value-driven growth (helpful) and manipulation (dark patterns)"
    weight: 0.25
    description: "Clear growth ethics lines"
  - type: llm_judge
    criteria: "Expansion onboarding addresses different stakeholders — admin, new users, and managers each get role-appropriate content during the scale-up"
    weight: 0.20
    description: "Stakeholder-aware expansion"
