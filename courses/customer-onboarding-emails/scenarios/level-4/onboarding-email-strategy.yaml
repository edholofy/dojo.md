meta:
  id: onboarding-email-strategy
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Build an organization-wide onboarding email strategy — align email programs with business objectives, define ownership, and create scalable processes for multi-product portfolios"
  tags: [onboarding, email, strategy, organizational, leadership, expert]

state: {}

trigger: |
  At the strategic level, onboarding email isn't a marketing tactic
  — it's a business function that directly impacts activation,
  revenue, and customer lifetime value.

  Part 1: Strategic framework

  "SaaS Portfolio Inc." operates 4 products:
  - Product A: Analytics platform (enterprise, $500/mo)
  - Product B: Email marketing tool (SMB, $49/mo)
  - Product C: CRM (mid-market, $129/mo)
  - Product D: Project management (teams, $15/user/mo)

  Each product has its own onboarding sequence, built independently
  by different teams. Total: 32 onboarding emails across 4 products.

  Current state:
  - No shared strategy or standards
  - Different platforms (Customer.io, Mailchimp, Intercom, HubSpot)
  - Inconsistent brand voice across products
  - No cross-product onboarding (users of Product A don't learn
    about Product B)
  - No shared measurement framework
  - Each team measures success differently

  1. Design the unified onboarding email strategy:
     - Organizational model: centralized team vs. embedded specialists
       vs. center of excellence? Recommend with reasoning.
     - Shared standards: brand voice guide, template system, QA process
     - Platform consolidation: one platform or justified multi-platform?
     - Cross-product onboarding: when and how to introduce other products
     - Measurement framework: shared KPIs across all 4 products

  2. Build the operating model:
     - Who owns onboarding emails? (Product? Marketing? Growth? CX?)
     - RACI matrix for: strategy, content, design, technical, analytics
     - Content creation workflow: brief → draft → review → approve → deploy
     - Change management process: how are changes requested and implemented?
     - Quarterly review cadence and governance

  3. Roadmap:
     Q1: Assessment and quick wins
     Q2: Platform and standard consolidation
     Q3: Cross-product onboarding launch
     Q4: Advanced personalization and optimization
     Detail key initiatives, milestones, and dependencies per quarter.

assertions:
  - type: llm_judge
    criteria: "Organizational model recommendation is justified — the choice between centralized, embedded, and CoE considers the company's size, product diversity, and current capabilities"
    weight: 0.25
    description: "Justified organizational model"
  - type: llm_judge
    criteria: "Cross-product onboarding is carefully designed — it introduces other products at the right moment (after activation, not during) without being pushy"
    weight: 0.25
    description: "Careful cross-product timing"
  - type: llm_judge
    criteria: "RACI matrix is clear and complete — every function (strategy through analytics) has unambiguous ownership"
    weight: 0.25
    description: "Clear RACI ownership"
  - type: llm_judge
    criteria: "Roadmap is sequenced by dependencies — platform consolidation comes before advanced personalization, and quick wins build momentum for bigger changes"
    weight: 0.25
    description: "Dependency-sequenced roadmap"
