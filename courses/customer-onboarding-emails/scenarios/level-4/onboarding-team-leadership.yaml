meta:
  id: onboarding-team-leadership
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Lead an onboarding email team — hire, train, manage, and develop specialists who create high-performing onboarding email programs"
  tags: [onboarding, email, leadership, team-building, management, expert]

state: {}

trigger: |
  As onboarding email programs mature, they need dedicated teams.
  Leading this team requires a mix of email expertise, analytics
  capability, cross-functional influence, and people management.

  Part 1: Team design

  "GrowthCo" — a Series C SaaS company ($40M ARR) needs to build
  a dedicated onboarding email function. Currently, onboarding
  emails are handled ad-hoc by the marketing team.

  1. Team structure:
     Design the team for today and for 12 months from now:

     Today (3 people):
     - Role 1: ___
     - Role 2: ___
     - Role 3: ___
     Define responsibilities, skills, and reporting structure.

     In 12 months (6 people):
     - Additional roles and growth areas
     - Specialization vs. generalization trade-offs
     - Reporting: under marketing, product, or growth?

  2. Hiring:
     Write the job description for the first hire: "Senior
     Onboarding Email Strategist"
     - Key responsibilities (5-7)
     - Required skills and experience
     - Nice-to-have qualifications
     - Interview questions (5 questions that test for the right skills)
     - Take-home exercise: design a brief for evaluating candidates

  3. Training program:
     Design the 30-60-90 day plan for a new team member:
     - First 30 days: learn the product, audit current emails
     - Days 31-60: own one email in the sequence, run first A/B test
     - Days 61-90: propose and implement one improvement
     Detail the learning objectives and milestones for each phase.

  Part 2: Cross-functional collaboration

  The onboarding email team works with:
  - Product: feature launches, UI changes, user event tracking
  - Engineering: event pipeline, platform integration
  - Design: email templates, brand consistency
  - Data: analytics, A/B test analysis, attribution
  - Sales: enterprise onboarding, handoff triggers
  - Customer success: at-risk user identification

  For each team:
  - Define the collaboration touchpoints
  - Identify common friction points
  - Design the communication cadence (standup, weekly, monthly)
  - Write the "ways of working" agreement

  Part 3: Performance management

  Design the team scorecard:
  - Individual metrics: email quality, experiment velocity, impact
  - Team metrics: activation rate improvement, conversion lift
  - Leading indicators: experiment pipeline, content freshness
  - Lagging indicators: revenue attribution, retention impact

assertions:
  - type: llm_judge
    criteria: "Team structure is right-sized — 3 people today and 6 in 12 months is realistic for a $40M ARR company, with clear roles that cover strategy, execution, and analytics"
    weight: 0.25
    description: "Right-sized team structure"
  - type: llm_judge
    criteria: "Interview questions test real skills — the questions evaluate onboarding email expertise (not generic marketing), including scenario-based questions"
    weight: 0.25
    description: "Skill-testing interview questions"
  - type: llm_judge
    criteria: "Cross-functional agreements are specific — each team relationship has defined touchpoints and friction resolution, not just 'we should collaborate more'"
    weight: 0.25
    description: "Specific cross-functional agreements"
  - type: llm_judge
    criteria: "30-60-90 plan is progressive — the new hire goes from learning to contributing to improving, with clear milestones at each stage"
    weight: 0.25
    description: "Progressive onboarding plan"
