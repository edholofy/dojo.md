meta:
  id: onboarding-experimentation-program
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Build an onboarding email experimentation program — create a systematic approach to testing, learning, and optimizing that drives continuous improvement"
  tags: [onboarding, email, experimentation, testing, optimization, expert]

state: {}

trigger: |
  Mature onboarding email programs don't just A/B test — they
  run systematic experimentation programs that test hypotheses,
  build institutional knowledge, and compound improvements.

  Part 1: Experimentation framework

  "DataFlow" — a data integration SaaS with 8,000 signups/month:

  1. Build the experimentation backlog:
     Categorize experiments by:
     - Content experiments: subject lines, copy, social proof
     - Structural experiments: sequence length, email order, timing
     - Personalization experiments: segmentation, dynamic content
     - Channel experiments: email vs. in-app, multi-channel
     - Radical experiments: completely new approaches

     Create an experiment backlog of 20 experiments, prioritized
     by expected impact × feasibility. For the top 5, write:
     - Hypothesis
     - Test design (variants, sample size, duration)
     - Primary and secondary metrics
     - Expected impact range
     - Learning goal (what will you know after this test?)

  2. Statistical rigor:
     For DataFlow's signup volume (8,000/month):
     - What's the minimum detectable effect at 95% confidence?
     - How long do tests need to run?
     - How many tests can run simultaneously without interference?
     - When to use multi-armed bandit vs. fixed A/B tests
     - How to handle seasonality and external factors

  3. Learning repository:
     Design the system for capturing and sharing experiment results:
     - Experiment card template (hypothesis, results, learnings)
     - Pattern library (what works across multiple tests)
     - Anti-pattern library (what consistently fails)
     - Quarterly learning review process
     - How to share learnings across the organization

  Part 2: Multi-variate testing

  Design a multi-variate test for Email 3 (feature highlight):
  Variables:
  - Subject line: benefit-focused vs. curiosity-focused
  - Content: text-heavy vs. screenshot-focused
  - CTA: specific action vs. general explore
  - Timing: Day 3 vs. Day 5

  Calculate:
  - Total combinations: ___
  - Sample size needed for each combination
  - Duration required
  - Simplification strategy if full MVT isn't feasible

  Part 3: Beyond A/B testing

  Design advanced experiments:
  1. Hold-out test: what happens if you DON'T send the sequence?
  2. Sequence order test: does email order matter?
  3. Frequency test: 5 emails vs. 7 vs. 10 in 14 days
  4. Channel test: email-only vs. email + in-app
  For each, design the experiment and explain the insight it provides.

assertions:
  - type: llm_judge
    criteria: "Experiment backlog is prioritized by impact × feasibility — high-impact, easy tests come first, and radical experiments are included for breakthrough potential"
    weight: 0.25
    description: "Impact-prioritized backlog"
  - type: llm_judge
    criteria: "Statistical calculations are correct for the signup volume — the minimum detectable effect and test duration match what 8,000 monthly signups can support"
    weight: 0.25
    description: "Correct statistical calculations"
  - type: llm_judge
    criteria: "Learning repository captures institutional knowledge — experiment results are structured for future reference, not just recorded and forgotten"
    weight: 0.25
    description: "Knowledge-capturing repository"
  - type: llm_judge
    criteria: "Hold-out test is included — testing what happens with NO emails provides the baseline for understanding email's true incremental value"
    weight: 0.25
    description: "Baseline hold-out test"
