meta:
  id: onboarding-customer-journey-integration
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Integrate onboarding emails into the full customer journey — connect pre-sale, onboarding, adoption, expansion, and renewal into a seamless email experience"
  tags: [onboarding, email, customer-journey, lifecycle, integration, expert]

state: {}

trigger: |
  Onboarding doesn't exist in isolation. It connects to marketing
  emails before signup and customer success emails after activation.
  Gaps between these stages create disjointed experiences.

  Part 1: Journey mapping

  "PlatformX" — a B2B SaaS tool:

  Map the complete email journey from first touch to year 2:

  Pre-signup (Marketing owns):
  - Awareness: blog newsletter, thought leadership
  - Consideration: product emails, case studies, comparison guides
  - Decision: trial prompt, demo request follow-up

  Onboarding (Growth owns):
  - Activation: welcome, setup, feature discovery
  - Engagement: habit formation, team adoption
  - Conversion: trial ending, upgrade path

  Post-onboarding (Customer Success owns):
  - Adoption: advanced features, best practices
  - Expansion: upsell triggers, new feature launches
  - Renewal: value recap, renewal communication
  - Advocacy: referral, review, case study requests

  For each transition point, identify:
  - Where does hand-off friction occur?
  - What context is lost between stages?
  - How does the user experience these transitions?

  Part 2: Seamless transition design

  Design the email transitions:

  Transition 1: Marketing → Onboarding
  Problem: user gets marketing emails, signs up, then gets
  completely different onboarding emails with no connection.
  - How to reference what brought them in (webinar, content, ad)
  - How to suppress marketing emails during onboarding
  - How to resume marketing at the right time

  Transition 2: Onboarding → Customer Success
  Problem: onboarding ends abruptly and CS emails don't start
  for weeks, creating a communication gap.
  - When does onboarding "end" (behavioral trigger, not just time)
  - How to transition tone (setup guidance → ongoing partnership)
  - First post-onboarding email: what should it say?

  Transition 3: Customer Success → Expansion
  Problem: expansion emails feel like sales, not support.
  - Usage-based triggers for expansion opportunities
  - How to make upsell emails feel like natural recommendations
  - Write the expansion trigger email

  Part 3: Technical coordination

  Address:
  - How do Marketing (HubSpot), Growth (Customer.io), and CS
    (Intercom) coordinate without overlapping or creating gaps?
  - Unified customer profile: where does the truth live?
  - Frequency capping across teams and systems
  - Preference management (user opts out of one type but not others)

assertions:
  - type: llm_judge
    criteria: "Transition friction is specifically identified — each handoff point names the concrete context loss and user experience problem, not just 'coordination is important'"
    weight: 0.25
    description: "Specifically identified friction"
  - type: llm_judge
    criteria: "Marketing-to-onboarding transition preserves context — the onboarding welcome references what brought the user in rather than starting from zero"
    weight: 0.25
    description: "Context-preserving transition"
  - type: llm_judge
    criteria: "Onboarding end is behavioral, not time-based — the transition to CS happens when the user demonstrates activation, not just after 14 days"
    weight: 0.25
    description: "Behavioral onboarding end"
  - type: llm_judge
    criteria: "Cross-system coordination is practical — the design addresses multi-platform reality with specific frequency capping and preference management approaches"
    weight: 0.25
    description: "Practical cross-system coordination"
