meta:
  id: ai-powered-onboarding
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Design AI-powered onboarding email systems — use machine learning for send time optimization, content selection, next-best-action prediction, and autonomous sequence optimization"
  tags: [onboarding, email, ai, machine-learning, optimization, expert]

state: {}

trigger: |
  AI transforms onboarding emails from static sequences to
  adaptive, personalized journeys that optimize themselves
  based on user behavior and outcomes.

  Part 1: AI applications in onboarding emails

  For "SmartSaaS" — a growing platform with 20,000 signups/month:

  1. Send time optimization:
     Traditional: send all welcome emails at 9 AM recipient timezone
     AI-powered: learn optimal send time per user based on:
     - Historical open patterns
     - Device usage patterns (mobile morning, desktop afternoon)
     - Industry/role patterns
     - Day-of-week engagement data
     Design the model:
     - Training data requirements
     - Feature engineering
     - Evaluation metrics (open rate lift)
     - Cold-start problem (no history for new users)
     - Expected improvement (benchmark: 15-25% open rate lift)

  2. Content selection:
     Traditional: same email sequence for everyone in a segment
     AI-powered: dynamically select:
     - Which feature to highlight (based on predicted interest)
     - Which testimonial to show (industry/role match)
     - How much content to include (based on past engagement length)
     - Which CTA to present (based on predicted next action)
     Design the recommendation engine:
     - Content library structure
     - User feature vector
     - Collaborative filtering approach
     - Exploration vs. exploitation (how to test new content)

  3. Next-best-action prediction:
     Traditional: email sequence is fixed regardless of user journey
     AI-powered: after each user action, predict:
     - Most likely next action
     - Best email to send to maximize activation probability
     - Whether to send any email at all (sometimes silence is better)
     Design the model:
     - State representation (user journey as a sequence)
     - Action space (all possible emails to send)
     - Reward function (activation, conversion, engagement)
     - Reinforcement learning vs. supervised approach
     - Safety constraints (don't over-email, don't skip critical info)

  Part 2: Implementation roadmap

  Phase 1 (months 1-3): Data foundation
  - Event tracking implementation
  - Historical data collection and cleaning
  - A/B testing infrastructure upgrade

  Phase 2 (months 4-6): First AI models
  - Send time optimization (highest ROI, lowest risk)
  - Basic content personalization
  - Model monitoring and feedback loops

  Phase 3 (months 7-12): Advanced AI
  - Next-best-action system
  - Autonomous sequence optimization
  - Cross-channel AI coordination

  Part 3: Risks and ethics

  Address:
  - AI bias: does the model treat all users equally?
  - Transparency: should users know AI selects their emails?
  - Human oversight: when should a human review AI decisions?
  - Failure modes: what happens when the model performs poorly?
  - Over-optimization: can AI optimize for opens while hurting LTV?

assertions:
  - type: llm_judge
    criteria: "Send time model addresses the cold-start problem — new users with no history get a reasonable default based on cohort data rather than random timing"
    weight: 0.25
    description: "Cold-start-addressed timing model"
  - type: llm_judge
    criteria: "Content selection includes exploration — the system doesn't just exploit what's known to work but tests new content to discover better options"
    weight: 0.25
    description: "Exploration-inclusive content selection"
  - type: llm_judge
    criteria: "Next-best-action model has safety constraints — it can't over-email users or skip legally required communications, even if the model suggests it"
    weight: 0.25
    description: "Safety-constrained predictions"
  - type: llm_judge
    criteria: "Risks are concretely addressed — over-optimization is identified as a real risk where AI might increase opens but decrease actual activation"
    weight: 0.25
    description: "Concrete risk assessment"
