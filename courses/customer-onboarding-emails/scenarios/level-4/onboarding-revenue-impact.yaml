meta:
  id: onboarding-revenue-impact
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Quantify the revenue impact of onboarding emails — build financial models that connect email performance to activation, conversion, retention, and lifetime value"
  tags: [onboarding, email, revenue, financial-model, roi, expert]

state: {}

trigger: |
  Email marketing returns $36 for every $1 spent on average, but
  onboarding emails specifically can be worth much more because
  they directly drive activation and conversion — the moments
  that determine whether a user becomes a paying customer.

  Part 1: Revenue attribution model

  "AppFlow" — a workflow automation tool:
  - 5,000 new signups/month
  - Trial: 14 days free
  - Plans: $29/mo (Starter), $79/mo (Pro), $199/mo (Business)
  - Current trial conversion: 12%
  - Average starting plan: Pro ($79/mo)
  - Average customer lifetime: 18 months
  - Monthly churn: 4.5%

  Current onboarding email program:
  - 7-email sequence (time-based)
  - Welcome email open rate: 65%
  - Average sequence engagement: 42% (opened 3+ of 7 emails)
  - Engaged user conversion: 22%
  - Non-engaged user conversion: 4%

  1. Calculate email-attributed revenue:
     - Users who engaged with onboarding emails: conversion rate × LTV
     - Users who didn't engage: conversion rate × LTV
     - Incremental revenue from onboarding emails (difference)
     - Monthly email-attributed revenue
     - Annual email-attributed revenue
     - ROI of onboarding email program (cost vs. attributed revenue)

  2. Model improvement scenarios:
     What's the revenue impact of:
     - Improving welcome email open rate from 65% to 80%
     - Improving sequence engagement from 42% to 55%
     - Improving engaged conversion from 22% to 28%
     - Implementing behavioral triggers (estimated +30% engagement)
     - Adding segmentation (estimated +15% conversion for engaged)
     Calculate each independently and combined.

  3. Build the investment case:
     Current annual investment: $180K (1 FTE + platform costs)
     Proposed investment: $450K (3 FTEs + better platform + tools)
     - Expected improvement from expanded team
     - Payback period
     - 3-year NPV at 10% discount rate
     - Risk factors and sensitivity analysis

  Part 2: Attribution challenges

  Address:
  - How do you know email caused the conversion vs. the product?
  - Multi-touch attribution: email + in-app + sales
  - Control group methodology (hold-out groups)
  - Incrementality testing (send vs. don't send)
  Design the attribution framework for AppFlow.

assertions:
  - type: llm_judge
    criteria: "Revenue attribution math is correct — the calculations accurately compare engaged vs. non-engaged conversion rates and properly compute LTV impact"
    weight: 0.25
    description: "Correct attribution math"
  - type: llm_judge
    criteria: "Improvement scenarios show compound impact — implementing multiple improvements together creates exponential rather than additive revenue gains"
    weight: 0.25
    description: "Compound improvement modeling"
  - type: llm_judge
    criteria: "Investment case addresses risk — sensitivity analysis shows what happens if improvements are 50% of expected, not just best-case projections"
    weight: 0.25
    description: "Risk-addressed investment case"
  - type: llm_judge
    criteria: "Attribution framework uses incrementality — the methodology includes control groups or hold-out testing, not just correlation between email engagement and conversion"
    weight: 0.25
    description: "Incrementality-based attribution"
