meta:
  id: onboarding-governance
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Establish onboarding email governance — create policies, compliance frameworks, and quality standards that ensure consistency and regulatory compliance at scale"
  tags: [onboarding, email, governance, compliance, policy, expert]

state: {}

trigger: |
  At scale, onboarding emails need governance — clear policies
  about who can change what, compliance with regulations, and
  quality standards that prevent errors.

  Part 1: Email governance framework

  "GlobalSaaS" — operating in US, EU, UK, Canada, Australia:
  - 3 product lines, each with its own onboarding emails
  - 5 teams involved in email creation
  - Regulatory requirements: CAN-SPAM, GDPR, CASL, PECR, AUS Spam Act

  1. Policy framework:
     Create policies for:
     - Content standards: brand voice, tone, accuracy requirements
     - Compliance requirements: unsubscribe, consent, data handling
     - Approval process: who must approve before sending?
     - Change management: how are email changes requested and deployed?
     - Emergency changes: process for urgent fixes (broken links, etc.)
     - Sunsetting: when and how to retire old emails

  2. Compliance matrix:
     For each jurisdiction, document:
     - Consent requirements (opt-in type: express, implied, inferred)
     - Unsubscribe requirements (timeframe, method)
     - Content requirements (sender identification, physical address)
     - Record-keeping requirements
     - Penalties for non-compliance
     Highlight key differences that affect onboarding email design.

  3. Quality assurance process:
     Design the QA checklist for every onboarding email before it sends:
     - Content: spelling, grammar, accuracy, brand voice
     - Technical: links work, personalization tokens render, mobile test
     - Compliance: unsubscribe present, consent appropriate, disclosures
     - Data: correct segments, correct triggers, correct suppression
     - Design: renders in top 5 email clients, dark mode checked
     - Approval: required sign-offs obtained

  Part 2: Incident management

  Design the process for onboarding email incidents:
  - Severity levels (S1: wrong content to all users, S2: broken link,
    S3: minor typo, S4: cosmetic issue)
  - Response time by severity
  - Communication plan (internal and external)
  - Post-incident review process
  - Prevention measures

  Part 3: Audit and reporting

  Design the quarterly governance audit:
  - Compliance audit: are all emails compliant across jurisdictions?
  - Quality audit: sample review of recent emails
  - Performance audit: are emails meeting targets?
  - Process audit: are teams following the governance process?
  - Report template for leadership review

assertions:
  - type: llm_judge
    criteria: "Compliance matrix captures real differences — GDPR consent requirements differ meaningfully from CAN-SPAM, and the matrix reflects this rather than treating all jurisdictions the same"
    weight: 0.25
    description: "Differentiated compliance matrix"
  - type: llm_judge
    criteria: "QA checklist is comprehensive and practical — it covers content, technical, compliance, data, and design without being so long that it's ignored"
    weight: 0.25
    description: "Comprehensive practical QA"
  - type: llm_judge
    criteria: "Incident severity levels are clearly defined — each level has a specific trigger, response time, and communication plan"
    weight: 0.25
    description: "Clear incident severity levels"
  - type: llm_judge
    criteria: "Emergency change process is fast but safe — urgent fixes can go out quickly without full governance, but there are guardrails to prevent errors"
    weight: 0.25
    description: "Fast but safe emergency process"
