meta:
  id: complex-onboarding-simulation
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Simulate a complex onboarding email operations week — handle product launches, platform migrations, deliverability crises, and strategic pivots simultaneously"
  tags: [onboarding, email, simulation, operations, complex, expert]

state: {}

trigger: |
  You're the Director of Lifecycle Email at "TechVenture" — a
  $100M ARR SaaS company with 30,000 new signups per month across
  2 products. This week tests your strategic and operational skills.

  Monday:
  Product team announces a major feature launch in 10 days.
  The new feature changes the core onboarding flow (users now
  set up integrations first, then create their workspace, reversing
  the current order).
  - Assess: how many onboarding emails need to change?
  - Plan: can you update the sequence in 10 days?
  - Risk: what happens to users mid-sequence when the change goes live?
  - Write the project plan with tasks, owners, and deadlines.

  Tuesday:
  The CFO presents a challenge: "Our trial conversion is 14%.
  The board wants 20% by end of Q2. What's your plan?"
  - Diagnose: where in the onboarding funnel is the drop-off?
  - Model: what improvement at each stage gets to 20%?
  - Present: the email-driven initiatives and their expected impact
  - Honest: what percentage of the gap can email alone close?
  Write the CFO presentation outline.

  Wednesday:
  Product 2 (acquired 3 months ago) still runs on a separate
  email platform (Mailchimp). The CEO wants it migrated to
  Customer.io (Product 1's platform) within 60 days.
  - Assess: migration scope and risk
  - Plan: phased migration approach
  - Resources: what team capacity does this require?
  - Trade-off: this competes with the feature launch work

  Thursday:
  Deliverability alert: Product 1's Gmail inbox placement dropped
  to 55% (from 88%). Google Postmaster shows a spike in spam
  complaints from Tuesday's marketing blast.
  - Immediate: triage and contain
  - Root cause: marketing and onboarding share an IP
  - Fix: short-term and long-term
  - Impact: estimate how many signups received degraded onboarding

  Friday:
  Wrap up: write the weekly report for your VP covering all 4 situations.
  Include: status of each, decisions made, help needed, and next week's priorities.

assertions:
  - type: llm_judge
    criteria: "Feature launch response includes mid-sequence user handling — users who are between email 3 and 7 when the flow changes get a specific transition plan"
    weight: 0.25
    description: "Mid-sequence transition plan"
  - type: llm_judge
    criteria: "CFO presentation is honest about email's contribution — it quantifies what email can realistically improve and acknowledges that reaching 20% requires product and sales changes too"
    weight: 0.25
    description: "Honest contribution assessment"
  - type: llm_judge
    criteria: "Resource trade-off between migration and feature launch is addressed — the response acknowledges that both can't get full attention and proposes a sequencing or staffing solution"
    weight: 0.25
    description: "Resource trade-off resolution"
  - type: llm_judge
    criteria: "Weekly report is concise and actionable — it summarizes all 4 situations with status, decisions, and specific help needed, in a format a VP can act on quickly"
    weight: 0.25
    description: "Concise actionable weekly report"
