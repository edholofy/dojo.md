meta:
  id: onboarding-at-scale
  level: 4
  course: customer-onboarding-emails
  type: output
  description: "Scale onboarding email operations — manage high-volume sending, platform architecture, team coordination, and operational excellence for 100K+ monthly signups"
  tags: [onboarding, email, scale, operations, high-volume, expert]

state: {}

trigger: |
  At 100K+ monthly signups, onboarding email operations face
  unique challenges: volume stress on infrastructure, content
  freshness at scale, team coordination across time zones, and
  maintaining personalization quality.

  Part 1: Scale challenges

  "MegaPlatform" — a consumer SaaS:
  - 150,000 new signups per month
  - 12 onboarding emails per sequence (time + behavioral)
  - 4 segments with different paths
  - Monthly email volume: 1.2M+ onboarding emails
  - 6 markets, 4 languages
  - Team: 8 people across 2 time zones

  1. Infrastructure design:
     - Sending capacity planning (peak hour requirements)
     - Platform architecture (primary + failover)
     - IP warming and reputation management at volume
     - Rate limiting and throttling strategy
     - Monitoring and alerting for 1.2M monthly sends

  2. Content operations at scale:
     - 48 base emails (12 emails × 4 segments)
     - 192 localized versions (48 × 4 languages)
     - Dynamic content variants within each email
     - Monthly content refresh cycle
     - Version control and change tracking
     Design the content management system and workflow.

  3. Team operations:
     - Role distribution across 8 people
     - On-call rotation for email incidents
     - Handoff protocols between time zones
     - Stakeholder management (product, marketing, CS, legal)
     - Knowledge management (documentation, runbooks)

  Part 2: Automation at scale

  Design the automation improvements:
  1. Template-based email creation (non-technical staff)
  2. Automated QA testing (link checking, rendering, compliance)
  3. Automated monitoring (deliverability, engagement, anomalies)
  4. Automated content rotation (cycle social proof, testimonials)
  5. Self-healing automations (restart failed sequences)

  Part 3: Scaling measurement

  At 150K signups/month, you have statistical power for:
  - Running multiple simultaneous A/B tests
  - Segment-level optimization
  - Near-real-time performance monitoring
  - Sophisticated attribution modeling

  Design the analytics stack:
  - Real-time dashboard for operations
  - Weekly performance review for team
  - Monthly strategic review for leadership
  - Quarterly deep dives for optimization

assertions:
  - type: llm_judge
    criteria: "Infrastructure handles peak loads — the design accounts for signup volume surges (launches, campaigns) and includes failover, not just steady-state capacity"
    weight: 0.25
    description: "Peak-load infrastructure"
  - type: llm_judge
    criteria: "Content management handles 192+ email versions — the system for tracking, updating, and maintaining nearly 200 email versions is practical and prevents drift"
    weight: 0.25
    description: "Scalable content management"
  - type: llm_judge
    criteria: "Automation reduces manual operations — automated QA, monitoring, and self-healing keep the 8-person team focused on strategy rather than fire-fighting"
    weight: 0.25
    description: "Manual-work-reducing automation"
  - type: llm_judge
    criteria: "Analytics stack serves different audiences — real-time for ops, weekly for team, monthly for leadership, with appropriate detail level for each"
    weight: 0.25
    description: "Audience-tiered analytics"
