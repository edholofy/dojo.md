meta:
  id: segmented-onboarding
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Design segmented onboarding sequences — create different email paths based on user persona, plan tier, use case, and company size"
  tags: [onboarding, email, segmentation, personalization, intermediate]

state: {}

trigger: |
  One-size-fits-all onboarding fails because a marketing manager
  and an engineer need completely different guidance, even for the
  same product. Segmentation delivers 27% higher activation rates.

  Part 1: Segmentation strategy

  "WorkFlow" — a workflow automation tool:
  Plans: Free, Pro ($29/mo), Business ($79/mo), Enterprise (custom)

  User segments identified from signup survey:
  - Role: marketer, developer, operations, manager
  - Company size: solo, small team (2-10), mid-market (11-200), enterprise (200+)
  - Use case: marketing automation, DevOps, HR workflows, sales ops
  - Experience: first automation tool, switching from competitor, advanced user

  1. Design the segmentation matrix:
     - Which dimensions matter most for onboarding content?
     - How many distinct paths can you realistically maintain?
     - Where do segments converge (same email for multiple segments)?
     - What's the minimum viable segmentation? (start small)

  2. Design 3 distinct onboarding paths:

     Path A: Marketing manager, small team, marketing automation
     - 7-email sequence with subject lines and key messages
     - Focus on: campaign templates, audience segmentation, reporting
     - Aha moment: first automated campaign sends

     Path B: Developer, mid-market, DevOps automation
     - 7-email sequence with subject lines and key messages
     - Focus on: API integration, CI/CD templates, webhooks
     - Aha moment: first automated deployment pipeline

     Path C: Operations manager, enterprise, HR workflows
     - 7-email sequence with subject lines and key messages
     - Focus on: approval flows, compliance templates, team setup
     - Aha moment: first approval workflow completes

  3. Identify the shared emails:
     Which emails can be the same across all 3 paths?
     (Example: welcome email, billing/account emails, check-in)
     Which must be different? Why?

assertions:
  - type: llm_judge
    criteria: "Segmentation is practical — the matrix recommends a manageable number of paths (3-5) rather than an unmanageable combinatorial explosion"
    weight: 0.25
    description: "Practical segmentation"
  - type: llm_judge
    criteria: "Each path speaks to the segment's language — the marketer path uses marketing terms, the developer path uses technical terms, and each addresses segment-specific goals"
    weight: 0.30
    description: "Segment-specific language"
  - type: llm_judge
    criteria: "Shared vs. unique emails are correctly identified — welcome and billing emails are shared, while feature guidance and aha moment emails are segment-specific"
    weight: 0.25
    description: "Correct shared/unique split"
  - type: llm_judge
    criteria: "Aha moments are segment-appropriate — each segment has a different definition of success that matches their use case"
    weight: 0.20
    description: "Segment-appropriate aha moments"
