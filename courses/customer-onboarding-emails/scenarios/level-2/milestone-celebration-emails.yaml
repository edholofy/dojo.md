meta:
  id: milestone-celebration-emails
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Write milestone celebration emails — acknowledge user achievements, reinforce positive behavior, and use progress moments to drive deeper engagement"
  tags: [onboarding, email, milestones, celebration, engagement, intermediate]

state: {}

trigger: |
  Milestone emails celebrate what users have accomplished. They
  reinforce that the user is making progress, and progress is the
  strongest predictor of continued engagement.

  Part 1: Milestone strategy

  For "FitTrack" — a fitness tracking app:

  Define milestones and celebration emails:

  1. First workout logged
  2. First week streak (7 consecutive days)
  3. First goal achieved (e.g., 10K steps)
  4. 10th workout
  5. First month active
  6. Personal best broken
  7. Community engagement (first social post or like)

  For each milestone:
  - Trigger condition (what exactly fires this email?)
  - Subject line
  - Key message (1-2 sentences)
  - Celebration tone (excited but not over-the-top)
  - Next challenge or goal suggestion
  - CTA

  Part 2: Write full milestone emails

  Email A: First workout logged
  - Celebrate the start
  - Set expectations for what's next
  - Suggest tomorrow's workout
  - Keep it short and energizing

  Email B: 7-day streak
  - Acknowledge consistency (harder than starting)
  - Show data: "You've burned X calories this week"
  - Social proof: "Only 30% of users hit a 7-day streak"
  - Challenge: "Can you make it to 14?"

  Email C: First month active
  - Monthly summary (workouts, time, calories, streaks)
  - Show progress visually if possible (describe the design)
  - Testimonial from long-term user about month 2+
  - CTA: set a new goal for month 2

  Part 3: Milestone email mistakes

  Fix these:
  a) Celebrating too many milestones (sending an email for every
     single workout creates email fatigue)
  b) Generic celebration: "Congratulations! You did something!"
     (no specifics)
  c) Using milestones as sales opportunities: "Great job! Now
     upgrade to Premium for more features!"
  For each, explain the problem and show the better approach.

assertions:
  - type: llm_judge
    criteria: "Milestones are meaningful — not every action gets an email; the milestones celebrate real achievements that represent genuine progress"
    weight: 0.25
    description: "Meaningful milestones"
  - type: llm_judge
    criteria: "Celebration emails include user-specific data — they reference the user's actual metrics (calories, workouts, streaks) rather than generic congratulations"
    weight: 0.30
    description: "Data-enriched celebrations"
  - type: llm_judge
    criteria: "Each milestone email includes a 'next' — the celebration naturally leads to a next challenge or goal, maintaining momentum"
    weight: 0.25
    description: "Forward-looking celebrations"
  - type: llm_judge
    criteria: "Mistake fixes address email fatigue — the response explains how to select which milestones to celebrate and which to skip"
    weight: 0.20
    description: "Email fatigue mitigation"
