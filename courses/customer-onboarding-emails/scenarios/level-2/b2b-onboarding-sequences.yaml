meta:
  id: b2b-onboarding-sequences
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Design B2B onboarding email sequences — handle multi-stakeholder onboarding, champion enablement, admin vs. end-user flows, and enterprise-specific needs"
  tags: [onboarding, email, b2b, enterprise, multi-stakeholder, intermediate]

state: {}

trigger: |
  B2B onboarding is fundamentally different from B2C. You're
  onboarding an organization, not just a person. Multiple
  stakeholders need different information at different times.

  Part 1: Multi-stakeholder email mapping

  "TeamSync" — a B2B project management platform ($79/user/mo):

  Stakeholders in a typical B2B onboarding:
  1. Admin/buyer: set up the account, configure settings, manage billing
  2. Champion: the person who advocated for the purchase internally
  3. End users: the team members who will use it daily
  4. Manager: wants reporting and oversight capabilities

  Design separate email sequences for each stakeholder:

  Admin sequence (7 emails):
  Map out: day, subject line, goal, key content
  Focus on: account setup, SSO configuration, user provisioning,
  billing, security settings, compliance features

  Champion sequence (5 emails):
  Map out: day, subject line, goal, key content
  Focus on: rollout planning, internal communication templates,
  success metrics, executive reporting

  End-user sequence (5 emails):
  Map out: day, subject line, goal, key content
  Focus on: getting started, key features, tips and shortcuts,
  mobile app, integrations they'll use

  Part 2: Write key emails

  Write the full email for:

  Email A: Admin welcome (Day 0)
  - Focus: account setup checklist, security configuration
  - Tone: professional, technical, efficient
  - CTA: "Complete account setup"

  Email B: Champion enablement (Day 1)
  - Focus: helping them roll out successfully to the team
  - Include: email template they can send to their team
  - CTA: "Send the team invite"

  Email C: End-user welcome (triggered when admin invites them)
  - Focus: what this tool does and how to start
  - Tone: friendly, non-technical
  - CTA: "Try your first project"
  - Note: they didn't choose this tool — don't assume enthusiasm

  Part 3: Coordination challenges

  Address:
  - How do you avoid the admin getting flooded with both admin
    AND general onboarding emails?
  - What if the admin IS the champion AND an end user?
  - How do you handle a team where only 3 of 10 invited users
    actually log in?

assertions:
  - type: llm_judge
    criteria: "Stakeholder sequences are truly different — admin gets technical setup, champion gets rollout strategy, end users get usage guidance, not the same content with different labels"
    weight: 0.30
    description: "Truly differentiated stakeholder paths"
  - type: llm_judge
    criteria: "End-user welcome acknowledges they didn't choose the tool — the email doesn't assume they're excited but helps them see the value for their daily work"
    weight: 0.25
    description: "Non-assuming end-user welcome"
  - type: llm_judge
    criteria: "Champion enablement includes internal communication tools — the email provides a ready-to-use template the champion can forward to their team"
    weight: 0.25
    description: "Champion enablement tools"
  - type: llm_judge
    criteria: "Coordination challenges are addressed practically — the dual-role and low-adoption scenarios get specific solutions, not just acknowledgment"
    weight: 0.20
    description: "Practical coordination solutions"
