meta:
  id: multi-channel-onboarding
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Design multi-channel onboarding — coordinate email with in-app messages, SMS, and push notifications to create a seamless onboarding experience across touchpoints"
  tags: [onboarding, email, multi-channel, in-app, sms, intermediate]

state: {}

trigger: |
  Email alone can't carry the entire onboarding experience. The
  best onboarding programs coordinate email, in-app messages, SMS,
  and push notifications — each channel serving a different purpose.

  Part 1: Channel strengths

  Map each channel to its best use in onboarding:

  Email:
  - Strength: detailed content, education, reference material
  - Best for: ___
  - Open rate: ~40-50% for onboarding
  - When to use: ___

  In-app messages:
  - Strength: contextual, zero friction, interactive
  - Best for: ___
  - Visibility: 100% (user is in the product)
  - When to use: ___

  SMS:
  - Strength: urgency, 98% open rate, immediate
  - Best for: ___
  - Limitations: character limit, cost, permission required
  - When to use: ___

  Push notifications:
  - Strength: re-engagement, timely nudges
  - Best for: ___
  - Limitations: easily disabled, fatigue risk
  - When to use: ___

  Part 2: Multi-channel onboarding design

  For "BudgetPal" — a personal finance app:

  Design the first 7 days across all channels:

  Day 0:
  - Email: Welcome + get started guide
  - In-app: Interactive setup wizard
  - SMS: (none — too early)
  - Push: (none — not enabled yet)

  Day 1:
  - Email: ___
  - In-app: ___
  - SMS: ___
  - Push: ___

  Continue through Day 7, specifying:
  - What each channel communicates
  - Why that channel (not another) is used
  - How channels complement rather than repeat
  - Triggers (time-based or behavioral)

  Part 3: Channel conflict avoidance

  Address these coordination challenges:
  1. User just completed an action in-app — how do you prevent
     the email about that action from sending?
  2. User hasn't opened the last 3 emails — should you switch
     to push or SMS?
  3. User opted out of SMS — how does the onboarding adjust?
  4. User completed in-app onboarding in 1 hour — should emails
     still send?
  Write specific rules for each scenario.

assertions:
  - type: llm_judge
    criteria: "Channels are complementary, not repetitive — email and in-app messages serve different purposes rather than saying the same thing twice"
    weight: 0.30
    description: "Complementary channel design"
  - type: llm_judge
    criteria: "Channel selection is justified — each touchpoint explains why that channel was chosen over alternatives for that specific message"
    weight: 0.25
    description: "Justified channel selection"
  - type: llm_judge
    criteria: "Conflict avoidance rules are specific — the response provides concrete suppression rules, not just 'coordinate channels'"
    weight: 0.25
    description: "Specific conflict rules"
  - type: llm_judge
    criteria: "SMS usage is restrained — SMS is reserved for high-value, time-sensitive moments rather than being used as a backup for unopened emails"
    weight: 0.20
    description: "Restrained SMS usage"
