meta:
  id: re-engagement-sequences
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Design re-engagement email sequences for stalled users — win back users who signed up but dropped off before reaching activation"
  tags: [onboarding, email, re-engagement, activation, churn-prevention, intermediate]

state: {}

trigger: |
  Most SaaS products lose 40-60% of signups before activation.
  Re-engagement sequences for stalled users can recover 15-25%
  of these lost users — that's free revenue from people who
  already showed interest.

  Part 1: Stalled user identification

  "CloudEdit" — an online document editor:

  Define stall points and re-engagement triggers:

  Stall Point A: Signed up, never logged in (30% of signups)
  - Wait time before re-engagement: 48 hours
  - Possible reasons: forgot, distracted, evaluating alternatives
  - Re-engagement approach: value reminder + easy login link

  Stall Point B: Logged in once, created nothing (25% of signups)
  - Wait time: 3 days after last login
  - Possible reasons: didn't know where to start, overwhelmed
  - Re-engagement approach: guided template + quick start video

  Stall Point C: Created one doc, never returned (15% of signups)
  - Wait time: 5 days after last activity
  - Possible reasons: didn't see enough value, found alternative
  - Re-engagement approach: show what they're missing + social proof

  Stall Point D: Active for 3 days, then disappeared (10%)
  - Wait time: 7 days after last login
  - Possible reasons: busy, hit a blocker, lost interest
  - Re-engagement approach: check-in + "what went wrong?"

  Part 2: Write the re-engagement sequences

  For each stall point, write a 3-email re-engagement sequence:

  Stall Point A sequence:
  - Email 1 (48 hours): Gentle reminder with value prop
  - Email 2 (5 days): New angle — what others are creating
  - Email 3 (10 days): Last attempt — "We'll keep your spot"
  Write all 3 with subject lines and full body.

  Stall Point D sequence:
  - Email 1 (7 days): Empathetic check-in — "Everything okay?"
  - Email 2 (12 days): Show progress of others in their cohort
  - Email 3 (18 days): Final email — offer help or graceful exit
  Write all 3 with subject lines and full body.

  Part 3: Know when to stop

  Design the "sunset" policy:
  - After how many unanswered re-engagement emails do you stop?
  - How do you avoid becoming spam?
  - What's the final email before you stop sending?
  Write the final "goodbye" email that leaves the door open.

assertions:
  - type: llm_judge
    criteria: "Stall points are differentiated — each drop-off point gets a different re-engagement strategy because the reasons for stalling differ"
    weight: 0.30
    description: "Differentiated stall point strategies"
  - type: llm_judge
    criteria: "Re-engagement emails don't guilt-trip — the tone is empathetic and helpful, not 'we noticed you haven't been back' with passive-aggressive undertones"
    weight: 0.25
    description: "Guilt-free re-engagement"
  - type: llm_judge
    criteria: "Each sequence escalates and then stops — emails progress from gentle to direct, with a clear endpoint rather than indefinite pestering"
    weight: 0.25
    description: "Escalating then stopping"
  - type: llm_judge
    criteria: "The goodbye email is graceful — it acknowledges the relationship didn't work out and genuinely leaves the door open without desperation"
    weight: 0.20
    description: "Graceful goodbye email"
