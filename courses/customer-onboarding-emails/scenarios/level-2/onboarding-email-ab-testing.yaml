meta:
  id: onboarding-email-ab-testing
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "A/B test onboarding emails — design experiments, measure results, and iterate on subject lines, content, CTAs, and timing for better activation rates"
  tags: [onboarding, email, ab-testing, optimization, data, intermediate]

state: {}

trigger: |
  A/B testing onboarding emails is how you go from "I think this
  works" to "I know this works." The challenge is testing with
  statistical rigor while not disrupting the user experience.

  Part 1: Test prioritization

  For "LaunchPad" — a marketing automation tool:

  Prioritize these potential A/B tests by expected impact:

  1. Welcome email subject line: personal name vs. benefit-focused
  2. Welcome email CTA: "Get Started" vs. "Create Your First Campaign"
  3. Email 3 timing: Day 3 vs. Day 5
  4. Email 4 content: customer testimonial vs. usage statistics
  5. Sequence length: 5 emails vs. 7 emails
  6. Sender name: "Sarah from LaunchPad" vs. "LaunchPad Team"
  7. Email format: text-only vs. HTML with images
  8. CTA placement: top of email vs. bottom of email

  Rank them 1-8 and explain your reasoning. What should you test
  first and why?

  Part 2: Design 3 A/B tests

  For each test, specify:

  Test 1: Welcome email subject line
  - Hypothesis: "Personal name + benefit performs better than generic"
  - Variant A: ___
  - Variant B: ___
  - Sample size needed (assume 1,000 signups/week)
  - Primary metric: open rate
  - Secondary metric: click-through rate
  - Run duration: ___
  - Statistical significance threshold: 95%
  - Decision criteria: what constitutes a "winner"?

  Test 2: Activation email CTA text
  - Hypothesis: ___
  - Variant A: ___
  - Variant B: ___
  - Full test design (same structure as above)
  - Primary metric: click-through rate
  - Secondary metric: activation completion

  Test 3: Sequence timing (Day 3 vs. Day 5 for feature email)
  - Hypothesis: ___
  - Variant A: ___
  - Variant B: ___
  - Full test design
  - Primary metric: feature adoption rate
  - Secondary metric: overall trial conversion

  Part 3: Common A/B testing mistakes in onboarding

  Identify and explain these mistakes:
  1. Testing multiple variables at once
  2. Ending tests too early (before statistical significance)
  3. Testing trivial changes (button color in onboarding)
  4. Not measuring downstream impact (opens don't equal activation)
  5. Ignoring segment interactions (what works for SMB may not
     work for enterprise)

assertions:
  - type: llm_judge
    criteria: "Test prioritization focuses on high-impact elements first — subject lines and CTA text are tested before email format or button placement"
    weight: 0.25
    description: "Impact-based test prioritization"
  - type: llm_judge
    criteria: "Test designs include sample size and statistical rigor — the designs specify how many signups are needed and how long to run, not just 'test for a week'"
    weight: 0.25
    description: "Statistically rigorous design"
  - type: llm_judge
    criteria: "Downstream metrics are included — tests measure not just opens/clicks but actual activation and conversion outcomes"
    weight: 0.25
    description: "Downstream metric inclusion"
  - type: llm_judge
    criteria: "Common mistakes are explained with examples — each mistake has a concrete illustration of why it leads to wrong conclusions"
    weight: 0.25
    description: "Concrete mistake examples"
