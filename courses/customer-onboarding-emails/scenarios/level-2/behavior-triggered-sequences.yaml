meta:
  id: behavior-triggered-sequences
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Design behavior-triggered onboarding sequences — create emails that fire based on user actions (or inaction) rather than fixed time delays"
  tags: [onboarding, email, behavioral, triggers, automation, intermediate]

state: {}

trigger: |
  Behavior-triggered emails get 300% higher open rates than
  time-based sequences. Instead of "Day 3 email," you send
  "User connected data source but hasn't created a dashboard."

  Part 1: Behavioral trigger mapping

  For "InsightBoard" — a business intelligence tool:

  Key activation milestones:
  1. Sign up (account created)
  2. Connect first data source
  3. Create first visualization
  4. Share with a teammate
  5. Set up automated report

  Map behavioral triggers for each transition:

  Milestone 1→2 (signup → connect data):
  - Trigger if NOT completed within 24 hours
  - Email: "Your data is waiting" — guide to connect
  - Trigger if completed: skip to milestone 2→3 email

  Milestone 2→3 (connect → create viz):
  - Trigger if NOT completed within 48 hours after connecting
  - Email: "See your data come alive" — template gallery
  - Trigger if completed: skip to milestone 3→4 email

  Design the full behavioral trigger map for all 5 milestones.
  For each trigger, specify:
  - Condition (action or inaction)
  - Wait time before firing
  - Email content summary
  - Skip conditions (if user already advanced)
  - Fallback (if user is completely inactive)

  Part 2: Write the behavioral emails

  Write the full email for each of these triggers:

  Email A: User signed up 48 hours ago, never logged in
  - Re-engagement focus
  - Subject line, body, CTA
  - Tone: helpful, not guilt-inducing

  Email B: User connected data, created a viz, but hasn't
  shared with anyone (5 days in)
  - Collaboration nudge
  - Subject line, body, CTA
  - Include benefit of sharing (feedback, alignment)

  Email C: User completed all milestones in 2 days (power user)
  - Advanced feature introduction
  - Subject line, body, CTA
  - Match their enthusiasm and sophistication

  Part 3: Time-based vs. behavioral comparison

  Show how the same Day 3 email looks different:
  - Time-based: generic feature highlight sent to everyone on Day 3
  - Behavioral: 3 different emails based on where the user is
  Write all 3 behavioral variants and explain why they outperform.

assertions:
  - type: llm_judge
    criteria: "Behavioral triggers are specific — each trigger has a clear condition, wait time, and skip logic, not just 'if user is inactive'"
    weight: 0.30
    description: "Specific behavioral triggers"
  - type: llm_judge
    criteria: "Never-logged-in email is re-engaging without guilt — it focuses on what the user is missing, not what they haven't done"
    weight: 0.25
    description: "Guilt-free re-engagement"
  - type: llm_judge
    criteria: "Power user email matches their pace — it introduces advanced features rather than repeating basics they've already discovered"
    weight: 0.25
    description: "Pace-matched power user email"
  - type: llm_judge
    criteria: "Behavioral vs. time-based comparison is concrete — the 3 variants show materially different content that addresses different user states"
    weight: 0.20
    description: "Concrete behavioral advantage"
