meta:
  id: onboarding-metrics-analysis
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Analyze onboarding email metrics — interpret open rates, click rates, activation funnels, and conversion data to diagnose and improve onboarding effectiveness"
  tags: [onboarding, email, metrics, analytics, optimization, intermediate]

state: {}

trigger: |
  Onboarding email metrics tell you where users are dropping off
  and which emails are (or aren't) driving activation. The key is
  looking beyond vanity metrics to measure actual business impact.

  Part 1: Metrics analysis

  "AppLaunch" — a mobile app builder (14-day trial):

  Current onboarding email performance:

  Email 1 (Day 0, Welcome):
  Open: 72%, Click: 34%, Activation step completed: 58%

  Email 2 (Day 1, Getting Started):
  Open: 55%, Click: 22%, Activation step completed: 31%

  Email 3 (Day 3, Feature Highlight):
  Open: 41%, Click: 12%, Activation step completed: 8%

  Email 4 (Day 5, Social Proof):
  Open: 38%, Click: 9%, Activation step completed: 6%

  Email 5 (Day 7, Check-in):
  Open: 35%, Click: 15%, Activation step completed: 11%

  Email 6 (Day 10, Advanced Feature):
  Open: 28%, Click: 7%, Activation step completed: 3%

  Email 7 (Day 13, Trial Ending):
  Open: 45%, Click: 18%, Conversion to paid: 8%

  Overall funnel:
  - Signups: 1,000/week
  - Activated (completed all setup): 280 (28%)
  - Trial-to-paid: 80 (8%)
  - Industry benchmark: 15-25% trial conversion

  1. Diagnose the funnel:
     - Where is the biggest drop-off?
     - Which email is underperforming vs. benchmarks?
     - What does the Email 3 cliff suggest?
     - Why does Email 5 (check-in) show a click bump?
     - Why does Email 7 show higher opens than Email 6?

  2. Recommend improvements:
     For each underperforming email, propose:
     - What to change (subject, content, timing, CTA)
     - Expected impact
     - How to test the improvement

  3. Calculate the business case:
     If you improve trial conversion from 8% to 12%:
     - Additional paid users per week
     - Additional MRR (plan is $39/mo)
     - Annual revenue impact
     - What conversion rate improvement justifies hiring a
       dedicated onboarding email specialist?

  Part 2: Cohort analysis

  Design a cohort analysis framework:
  - Week 1 cohort vs. Week 4 cohort (are improvements working?)
  - Segment by signup source (organic vs. paid vs. referral)
  - Segment by plan selected (free vs. paid trial)
  - Show how to visualize this data for weekly team review

assertions:
  - type: llm_judge
    criteria: "The Email 3 cliff is diagnosed correctly — a massive drop in activation suggests the feature highlight isn't connecting with user needs at that stage, or the timing is wrong"
    weight: 0.30
    description: "Correct cliff diagnosis"
  - type: llm_judge
    criteria: "Improvements are specific and testable — each recommendation identifies what to change and how to measure whether it worked"
    weight: 0.25
    description: "Specific testable improvements"
  - type: llm_judge
    criteria: "Business case quantifies the impact — the revenue calculation shows the concrete dollar value of improving conversion rates"
    weight: 0.25
    description: "Quantified business impact"
  - type: llm_judge
    criteria: "Cohort analysis design enables learning — the framework compares time cohorts and segments to identify what's actually driving improvement"
    weight: 0.20
    description: "Learning-enabling cohort design"
