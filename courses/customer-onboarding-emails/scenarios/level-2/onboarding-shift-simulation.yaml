meta:
  id: onboarding-shift-simulation
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Simulate an onboarding email operations shift — handle sequence failures, customer complaints, performance dips, and urgent content changes in real-time"
  tags: [onboarding, email, simulation, operations, troubleshooting, intermediate]

state: {}

trigger: |
  You're the onboarding email manager at "GrowthHub" — a marketing
  platform with 500 new signups per day. Today's shift brings a
  mix of operational issues.

  Queue of 8 tasks (handle in priority order):

  1. URGENT: Email 3 (feature highlight) has been sending with a
     broken CTA link for the past 6 hours. ~125 users affected.
     - Fix the link immediately
     - Decide: resend to affected users or not?
     - Write the "oops" email if you decide to resend
     - Document the incident

  2. The welcome email open rate dropped from 72% to 48% this
     week. No changes were made to the email.
     - Diagnose possible causes
     - Check: deliverability issue? Subject line fatigue?
       Signup source change? Spam filter?
     - Recommend investigation steps

  3. A customer replied to the check-in email: "Stop emailing
     me. I signed up to try the product, not to get spammed with
     emails every other day."
     - Write the response
     - Reflect: is 7 emails in 14 days too many?
     - Recommend adjustment if needed

  4. Product team launched a new feature yesterday. They want it
     mentioned in the onboarding sequence "by tomorrow."
     - Assess: should it go in an existing email or a new one?
     - Write the updated email or new email
     - Manage the stakeholder expectation about timeline

  5. Trial conversion rate dropped from 8% to 5% this month.
     Marketing wants to add a discount offer to Email 7.
     - Assess: is a discount the right approach?
     - Propose alternatives to discounting
     - If discount is chosen, write the email

  6. The enterprise segment (100+ employee companies) has 2%
     trial conversion vs. 12% for small teams.
     - Diagnose why enterprise converts poorly on self-serve
     - Recommend: different sequence? Sales handoff? Both?
     - Write the enterprise-specific intervention

  7. Legal says Email 4 (social proof) uses a customer quote
     without proper permission. Need to update immediately.
     - Replace the quote or get permission?
     - Write the replacement email if quote is removed
     - Set up a process to prevent this in the future

  8. New hire joining the team next week needs to understand
     the current onboarding email system.
     - Write a 1-page onboarding brief for the new team member
     - Include: sequence structure, key metrics, tools used,
       current experiments, and known issues

  Handle all 8. End with a shift summary.

assertions:
  - type: llm_judge
    criteria: "Broken link is handled with appropriate urgency — the response fixes the issue, decides on resend strategy with reasoning, and documents the incident for prevention"
    weight: 0.25
    description: "Appropriate broken link response"
  - type: llm_judge
    criteria: "Customer complaint is handled respectfully — the response acknowledges the feedback, adjusts expectations, and considers whether the email frequency actually needs changing"
    weight: 0.25
    description: "Respectful complaint handling"
  - type: llm_judge
    criteria: "Enterprise conversion diagnosis goes beyond 'send different emails' — it identifies that enterprise decision-making is fundamentally different and may need a sales-assisted path"
    weight: 0.25
    description: "Enterprise conversion insight"
  - type: llm_judge
    criteria: "Discount alternative is proposed — the response doesn't just add a discount but considers whether conversion dropped for reasons a discount won't fix"
    weight: 0.25
    description: "Thoughtful discount alternative"
