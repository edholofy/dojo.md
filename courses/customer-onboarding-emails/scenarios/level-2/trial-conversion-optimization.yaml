meta:
  id: trial-conversion-optimization
  level: 2
  course: customer-onboarding-emails
  type: output
  description: "Optimize trial-to-paid conversion emails — design conversion sequences that address objections, demonstrate value, and make upgrading feel natural"
  tags: [onboarding, email, trial, conversion, optimization, intermediate]

state: {}

trigger: |
  The difference between a 5% and 25% trial conversion rate often
  comes down to what you email during those 14 days. Trial
  conversion emails are not sales emails — they're value
  demonstration emails.

  Part 1: Conversion sequence by user behavior

  "ReportPro" — a reporting and analytics tool:
  14-day trial, $49/mo or $470/year

  Design different conversion approaches based on trial behavior:

  Segment A: High engagement (logged in 10+ times, created 5+ reports)
  - They already see the value — focus on removing friction
  - Write the Day 10 conversion email:
    Subject line, body, CTA
  - Key message: You've built something valuable. Keep it.
  - Include: annual vs. monthly comparison, data continuity

  Segment B: Medium engagement (logged in 3-5 times, 1-2 reports)
  - They've tasted value but haven't committed — show more
  - Write the Day 10 conversion email:
    Subject line, body, CTA
  - Key message: Here's what you haven't tried yet
  - Include: feature they haven't used, social proof

  Segment C: Low engagement (logged in once, no reports)
  - They might be lost — re-engage before converting
  - Write the Day 7 re-engagement email:
    Subject line, body, CTA
  - Key message: Let us help you get started
  - Include: guided setup offer, video tutorial

  Part 2: Objection-handling emails

  Write emails that address these common trial-ending objections:

  "It's too expensive":
  - ROI calculation: time saved × hourly rate
  - Comparison to manual alternative
  - Mention annual pricing discount
  Write the email.

  "I'm not sure I'll use it enough":
  - Usage data from their trial period
  - Projection: "At your current pace, you'll save X hours/month"
  - Downgrade option (lower tier)
  Write the email.

  "I'm evaluating other options":
  - Differentiation points (what ReportPro does that others don't)
  - Migration cost consideration
  - Offer extended trial (not discount)
  Write the email.

  Part 3: Post-trial grace period strategy

  25% of trial conversions happen AFTER the trial ends.
  Design the post-trial email strategy:
  - Day 15 (1 day after): "Your trial ended, but..."
  - Day 18: Value recap of what they built
  - Day 25: Limited-time offer or extended trial
  - Day 30: Final attempt before data cleanup warning
  Write subject lines for each and the full Day 15 email.

assertions:
  - type: llm_judge
    criteria: "Conversion emails match engagement level — high-engagement users get friction removal, low-engagement users get re-engagement before conversion, not the same upgrade pitch"
    weight: 0.30
    description: "Engagement-matched conversion"
  - type: llm_judge
    criteria: "Objection-handling emails provide specific value — the 'too expensive' email includes actual ROI math, not just 'it's worth it'"
    weight: 0.25
    description: "Specific objection handling"
  - type: llm_judge
    criteria: "Post-trial strategy is patient — it gives users time to convert after trial ends without aggressive tactics, acknowledging that 25% convert after expiry"
    weight: 0.25
    description: "Patient post-trial strategy"
  - type: llm_judge
    criteria: "Competitive response offers an extended trial, not a discount — the email recognizes that price discounting devalues the product while extra trial time demonstrates confidence"
    weight: 0.20
    description: "Value-preserving competitive response"
