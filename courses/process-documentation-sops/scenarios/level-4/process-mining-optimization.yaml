meta:
  id: process-mining-optimization
  level: 4
  course: process-documentation-sops
  type: output
  description: "Use process mining to discover, analyze, and optimize enterprise processes at a large insurance company, then document the optimized processes as SOPs"
  tags: [process-mining, optimization, insurance, data-driven, expert]

state: {}

trigger: |
  You're the Head of Process Excellence at a top-10
  US insurance company ($15B premium, 18,000 employees).
  You've deployed Celonis process mining across your
  claims, underwriting, and policy servicing operations.
  The process mining data has revealed that actual process
  execution differs dramatically from documented SOPs —
  the "happy path" in SOPs is followed only 23% of the
  time, with 77% of cases taking non-standard paths
  involving rework loops, unnecessary handoffs, and
  workarounds.

  Process mining findings:

  Claims Processing (analyzed 2.4M claims over 18 months):
  - 847 unique process variants discovered (SOP describes
    1 path with 4 exceptions)
  - Average cycle time: 34 days (SOP target: 15 days)
  - Top 5 variants account for 62% of cases
  - 38% of claims involve 3+ handoffs between adjusters
  - Rework rate: 28% (claim reopened after initial
    decision)
  - Automation potential: 42% of activities could be
    automated

  Underwriting (analyzed 180K submissions):
  - 312 unique variants
  - Average cycle time: 22 days (SOP target: 5 days)
  - 45% of submissions "ping-pong" between underwriter
    and broker (3+ rounds)
  - 60% of underwriter time spent on data gathering
    (not risk assessment)
  - Decline-to-bind ratio: 4:1 (80% of work produces
    no revenue)

  Policy Servicing (analyzed 1.8M transactions):
  - Endorsement processing: 156 variants, 8-day average
    (SOP target: 2 days)
  - Simple address changes take the same process path as
    complex coverage modifications (no tiering)
  - 22% of transactions require manual intervention
    that could be straight-through processed

  Task: Create the comprehensive process optimization
  report and redesigned SOPs. For claims processing,
  document the top 5 process variants as standardized
  paths, eliminate unnecessary variants, and create SOPs
  for the optimized process. Include the automation
  roadmap, the process performance monitoring framework
  using continuous process mining, and the change
  management plan for transitioning 18,000 employees from
  847 variants to 5 standardized paths.

assertions:
  - type: llm_judge
    criteria: "Response creates a data-driven process optimization — uses process mining data to identify root causes of process variants (why do 847 variants exist?); designs optimized processes based on best-performing variants; reduces variants from 847 to a manageable set of standardized paths; addresses the 77% non-compliance gap between SOPs and actual execution; proposes both process redesign and SOP redesign; the optimization targets are grounded in the data provided."
    weight: 0.35
    description: "DataDrivenOptimization"
  - type: llm_judge
    criteria: "Response produces optimized claims processing SOPs — documents the top 5 standardized claim variants with clear decision criteria for routing; addresses the handoff problem (reducing from 3+ to minimum necessary); designs the process to reduce rework rate from 28%; includes automation integration points; the SOPs reflect actual complexity while eliminating unnecessary variation; the optimized process targets the 15-day cycle time goal."
    weight: 0.35
    description: "OptimizedClaimsSOPs"
  - type: llm_judge
    criteria: "Response includes continuous monitoring and change management — proposes process performance monitoring framework using continuous process mining (not just one-time analysis); includes KPIs and dashboards for ongoing variant tracking; addresses the change management challenge of transitioning 18,000 employees; includes automation roadmap with ROI projections; an insurance COO would find this compelling and implementable."
    weight: 0.30
    description: "MonitoringAndChangeManagement"
