meta:
  id: nuclear-safety-procedures
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design safety-critical procedures for a nuclear power plant responding to NRC inspection findings on procedure quality and human factors deficiencies"
  tags: [nuclear, safety-critical, nrc, human-factors, expert]

state: {}

trigger: |
  You're the Procedures Manager at a two-unit nuclear
  power plant (2,200 MW total capacity, 1,100 employees).
  The NRC (Nuclear Regulatory Commission) has issued a
  White finding (low-to-moderate safety significance)
  related to procedure quality after an event where an
  operator error during a routine surveillance test
  caused an unplanned reactor trip. The investigation
  determined that the procedure was technically correct
  but poorly written — ambiguous steps, inadequate
  caution/warning placement, and failure to address a
  known equipment variation between the two units.

  NRC findings:
  1. "Procedure steps lacked sufficient detail and clarity
     to be performed correctly without reliance on
     operator experience or institutional knowledge"
  2. "Cautions and warnings were not placed before the
     steps they applied to"
  3. "Unit-specific differences were not clearly
     identified, leading to operator confusion"
  4. "Place-keeping aids (checkboxes, sign-offs) were
     not consistently used for safety-significant steps"
  5. "Human factors engineering principles were not
     systematically applied to procedure development"

  Procedure categories:
  - Emergency Operating Procedures (EOPs): 45 procedures
    (symptom-based, used during plant emergencies)
  - Abnormal Operating Procedures (AOPs): 120 procedures
    (alarm response, equipment failures)
  - Normal Operating Procedures: 350 procedures (startup,
    shutdown, routine operations)
  - Surveillance Test Procedures: 280 procedures (per
    Technical Specifications)
  - Maintenance Procedures: 500+ procedures
  - Administrative Procedures: 200+ procedures

  Total: ~1,500 safety-related procedures

  Nuclear-specific requirements:
  - NUREG-0899 (Guidelines for Preparation of Emergency
    Operating Procedures)
  - NUREG-1358 (Lessons Learned from NRC Procedure
    Reviews)
  - ANSI/ANS 3.2 (Administrative Controls for Nuclear
    Power Plants)
  - 10 CFR 50, Appendix B (Quality Assurance for Safety-
    Related Structures)
  - Writer's Guide must address human factors (HFE)
    principles

  Task: Create the corrective action plan for the NRC,
  design the comprehensive Procedure Writer's Guide
  (incorporating human factors engineering principles),
  develop the procedure quality standards, create the
  procedure review and validation methodology (including
  human factors review and simulator validation), and
  design the upgrade plan to systematically improve the
  1,500 safety-related procedures. Include examples of
  before/after procedure improvements for the specific
  deficiencies cited.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible NRC corrective action plan — addresses each of the 5 NRC findings with specific corrective and preventive actions; the corrective action plan follows nuclear industry expectations (extent of condition review, root cause analysis, effectiveness measures); the Procedure Writer's Guide incorporates human factors engineering principles (step structure, caution/warning placement, place-keeping, unit-specific identification); before/after examples demonstrate clear improvement."
    weight: 0.35
    description: "CredibleNRCResponse"
  - type: llm_judge
    criteria: "Response addresses nuclear-specific procedure requirements — the Writer's Guide addresses NUREG-0899 and NUREG-1358 requirements; distinguishes between procedure types (EOPs vs AOPs vs normal vs surveillance) with appropriate format and detail level; addresses human factors principles (concurrent/sequential step format, conditional logic, reference to drawings/parameters, place-keeping aids); the procedure review methodology includes human factors review and simulator validation for safety-significant procedures."
    weight: 0.35
    description: "NuclearSpecificRequirements"
  - type: llm_judge
    criteria: "Response includes a systematic upgrade plan — proposes a prioritized approach to upgrading 1,500 procedures (safety significance-based prioritization); includes procedure quality metrics; addresses the scale of the effort realistically (resources, timeline, training for procedure writers); proposes ongoing procedure quality monitoring; the plan would be accepted by the NRC and plant management; demonstrates understanding of nuclear safety culture expectations."
    weight: 0.30
    description: "SystematicUpgradePlan"
