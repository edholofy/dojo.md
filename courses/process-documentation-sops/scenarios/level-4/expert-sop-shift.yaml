meta:
  id: expert-sop-shift
  level: 4
  course: process-documentation-sops
  type: output
  description: "Shift simulation — handle a DOJ investigation triggered by SOP failures, a major product recall requiring documentation reconstruction, and a hostile acquisition where process documentation is a key due diligence finding"
  tags: [shift-simulation, doj-investigation, recall, due-diligence, expert]

state: {}

trigger: |
  You're the Chief Quality Officer at a $1.2B specialty
  pharmaceutical company (1,800 employees, 3
  manufacturing sites). Three interconnected crises have
  erupted in the same week.

  CRISIS 1 — DOJ INVESTIGATION (Monday):
  The Department of Justice has opened a criminal
  investigation into your company's manufacturing
  practices after a former quality manager turned
  whistleblower. The complaint alleges that production
  supervisors routinely deviated from approved SOPs to
  meet production targets, and that quality management
  was aware but failed to document the deviations or
  take corrective action. The DOJ is seeking:
  - All manufacturing SOPs, batch records, and deviation
    reports for the past 5 years
  - All training records showing who was trained on what
  - All CAPA records related to manufacturing deviations
  - All internal audit reports
  - Communication records between production and quality

  Your immediate problem: many of the documents requested
  may not exist (deviations that weren't documented), or
  may contradict each other (SOPs say one thing, batch
  records show another).

  CRISIS 2 — VOLUNTARY RECALL (Wednesday):
  Three lots of a high-revenue injectable product ($85M
  annual revenue) must be recalled after particulate
  matter was found during stability testing. Root cause
  appears related to the SOP deviations described in
  Crisis 1 — specifically, a cleaning validation SOP
  that was shortened from a 4-hour procedure to 2 hours
  without formal change control. You need to:
  - Document the recall scope and justification
  - Reconstruct what actually happened during manufacturing
    (when batch records and SOPs don't match)
  - Determine how many more lots are potentially affected
  - Communicate with FDA, customers, and patients

  CRISIS 3 — HOSTILE ACQUISITION (Friday):
  A larger pharmaceutical company has launched a hostile
  acquisition bid. Their due diligence team has requested
  access to your quality system documentation as a
  condition of their offer. Your board believes the
  quality system deficiencies (which are now public due
  to the DOJ investigation) will be used to reduce the
  acquisition price by $200-400M. The acquirer's quality
  team will specifically examine:
  - SOP compliance and documentation practices
  - FDA correspondence and inspection history
  - Product quality data and recall history
  - Quality system maturity vs industry benchmarks

  Task: Create the response strategy for all three
  situations: the DOJ document production plan (including
  how to handle gaps and inconsistencies honestly and
  legally), the recall documentation package, and the
  quality system assessment that the board can use to
  defend the company's value during acquisition
  negotiations. Address the fundamental question: how do
  you simultaneously admit to quality system failures
  (DOJ requires honesty), manage the recall (patient
  safety requires transparency), and defend company
  value (board fiduciary duty)?

assertions:
  - type: llm_judge
    criteria: "Response addresses all three crises with strategic coherence — recognizes the interconnection between DOJ investigation, recall, and acquisition; proposes DOJ document production plan that is honest and legally defensible (working with legal counsel on privilege, document holds, gap documentation); manages the recall with patient safety as priority while minimizing further legal exposure; addresses the acquisition defense with a forward-looking quality improvement narrative; the strategy balances transparency with company protection."
    weight: 0.35
    description: "StrategicCoherence"
  - type: llm_judge
    criteria: "Response demonstrates pharmaceutical quality expertise — the DOJ response addresses GMP documentation requirements (21 CFR 211, 212); the recall documentation follows FDA recall classification procedures; the quality system assessment uses industry-recognized maturity frameworks; addresses the root cause (production deviating from SOPs to meet targets) as a systemic culture issue, not just individual failures; proposes credible remediation that would satisfy both DOJ and FDA."
    weight: 0.35
    description: "PharmaQualityExpertise"
  - type: llm_judge
    criteria: "Response addresses the value defense challenge — proposes how to present quality system deficiencies to the acquirer in a way that demonstrates awareness and remediation commitment (reducing the valuation discount); creates a quality improvement roadmap that serves triple duty (DOJ remediation, FDA compliance, acquirer confidence); addresses the ethical tension between disclosure obligations and fiduciary duty; a pharmaceutical board and legal counsel would find this approach credible and implementable."
    weight: 0.30
    description: "ValueDefense"
