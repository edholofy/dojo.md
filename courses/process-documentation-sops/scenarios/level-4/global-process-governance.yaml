meta:
  id: global-process-governance
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design global process governance for a Fortune 200 multinational harmonizing 12,000 SOPs across 40 countries while maintaining regulatory compliance in each jurisdiction"
  tags: [global-governance, multinational, harmonization, expert]

state: {}

trigger: |
  You're the Global Head of Business Process Management
  at a Fortune 200 consumer products company ($28B
  revenue, 45,000 employees, 40 countries, 85
  manufacturing sites). After 5 acquisitions in 7 years,
  the company has approximately 12,000 SOPs in 18
  languages, stored in 6 different document management
  systems, with no global process governance.

  The problem quantified:
  - Same product manufactured at 3 sites with 3 different
    SOPs (quality variance: 2% defect rate at best site
    vs 11% at worst)
  - Regulatory compliance managed locally with no
    visibility to corporate (recent €4M fine in EU for
    non-compliance with REACH regulations that other
    sites had already addressed)
  - Process improvement efforts are siloed — a $500K
    Lean initiative in the US wasn't replicated at similar
    sites internationally
  - Audit preparation requires 3-6 months per site
    because documentation is inconsistent
  - 12,000 SOPs: estimated 30% redundant, 25% outdated,
    15% conflicting

  Governance requirements:
  - Global process standards with local compliance
    variations
  - Multi-language document management with translation
    quality control
  - Process performance benchmarking across sites
  - Regulatory change management across 40 jurisdictions
  - Process improvement capture and replication
  - Audit-ready documentation at all times
  - Budget: $12M over 3 years

  Regulatory landscape:
  - FDA 21 CFR (US manufacturing)
  - EU GMP, REACH, CLP regulations
  - China GB standards
  - Japan PMDA/MHLW requirements
  - Brazil ANVISA
  - India CDSCO
  - ISO 22716 (cosmetics GMP — 30 of 85 sites)
  - ISO 9001 (all sites)

  Task: Design the global process governance framework
  including the governance structure (global process
  council, regional process teams, site process owners),
  the documentation architecture (global vs regional vs
  site-level), the SOP rationalization methodology
  (reducing 12,000 to a manageable, non-redundant set),
  the technology platform strategy, the multi-language
  management approach, and the change management
  program. Include the regulatory harmonization framework
  for managing compliance across 40 jurisdictions.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible global governance framework — creates multi-level governance structure (global process council, regional teams, site owners) with clear authority and decision rights; defines documentation architecture distinguishing global standards from regional/site procedures; proposes SOP rationalization methodology to reduce 12,000 SOPs to manageable set; addresses the specific quality variance problem (2% vs 11% defect rates); the framework is appropriate for a Fortune 200 with 85 manufacturing sites."
    weight: 0.35
    description: "CredibleGlobalGovernance"
  - type: llm_judge
    criteria: "Response addresses regulatory harmonization — creates a framework for managing compliance across FDA, EU GMP, REACH, China GB, Japan PMDA, Brazil ANVISA, India CDSCO, and ISO standards simultaneously; prevents regulatory gaps like the €4M REACH fine; proposes regulatory change detection and cascade across relevant sites; addresses the challenge of local regulations within global standards; the approach would be accepted by regulatory affairs professionals."
    weight: 0.35
    description: "RegulatoryHarmonization"
  - type: llm_judge
    criteria: "Response includes technology and change management — recommends technology platform with clear selection criteria for managing 12,000+ SOPs across 18 languages; addresses translation quality control; proposes process improvement capture and replication methodology; includes change management program for 45,000 employees across different cultures; the implementation is phased within the $12M/3-year budget; includes quick wins and long-term transformation milestones."
    weight: 0.30
    description: "TechnologyAndChange"
