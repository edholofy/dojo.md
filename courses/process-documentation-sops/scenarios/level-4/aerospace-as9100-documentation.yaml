meta:
  id: aerospace-as9100-documentation
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design the quality documentation system for an aerospace manufacturer achieving AS9100D certification while meeting NADCAP special process accreditation requirements"
  tags: [aerospace, as9100, nadcap, quality-system, expert]

state: {}

trigger: |
  You're the Director of Quality at a 450-person
  aerospace manufacturer ($95M revenue) that produces
  structural components for commercial and military
  aircraft. Your largest customer (Boeing, 45% of revenue)
  has mandated AS9100D certification within 14 months and
  NADCAP accreditation for your special processes (heat
  treating, non-destructive testing, chemical processing)
  within 18 months. Without both, you lose the contract.

  Current state:
  - ISO 9001:2015 certified (5 years)
  - No AS9100 certification
  - No NADCAP accreditation
  - Quality system documentation adequate for ISO 9001
    but missing aerospace-specific requirements
  - Configuration management: informal (engineering
    manages drawings but no formal CM process)
  - First Article Inspection: performed but not per
    AS9102 standard
  - Risk management: not embedded in processes (AS9100D
    Clause 8.1.1 requirement)
  - Counterfeit parts prevention: no formal program
  - Product safety: no formal process
  - Special processes: performed per internal procedures
    but not to NADCAP standards

  AS9100D-specific requirements beyond ISO 9001:
  - Operational risk management (Clause 8.1.1)
  - Configuration management (Clause 8.1.2)
  - Product safety (Clause 8.1.3)
  - Prevention of counterfeit parts (Clause 8.1.4)
  - First Article Inspection (AS9102)
  - Special process control (NADCAP)
  - Key characteristics management
  - On-time delivery and quality performance metrics
  - Customer property management (government property)
  - Project management for complex products

  NADCAP special processes requiring accreditation:
  - Heat treating (AMS 2750, customer-specific specs)
  - Non-destructive testing (NAS 410, ASNT TC-1A)
  - Chemical processing (AMS 2700, anodizing, plating)

  Task: Design the complete quality documentation system
  for AS9100D certification including the quality manual,
  the required procedures and work instructions, the
  configuration management system, the counterfeit parts
  prevention program, the first article inspection
  process, and the NADCAP preparation documentation for
  all 3 special processes. Include the gap analysis,
  implementation timeline, and resource plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive AS9100D documentation system — includes quality manual addressing all AS9100D clauses; creates required procedures for aerospace-specific requirements (operational risk management, configuration management, product safety, counterfeit parts prevention, FAI per AS9102); addresses key characteristics management; includes performance metrics (OTD, quality); the documentation system goes beyond ISO 9001 to meet aerospace-specific expectations."
    weight: 0.35
    description: "ComprehensiveAS9100System"
  - type: llm_judge
    criteria: "Response addresses NADCAP requirements — provides documentation approach for all 3 special processes (heat treating, NDT, chemical processing); references relevant specifications (AMS 2750, NAS 410, ASNT TC-1A, AMS 2700); addresses pyrometry requirements for heat treating; includes operator qualification requirements for NDT; addresses chemical processing controls; the NADCAP documentation would meet PRI (Performance Review Institute) audit expectations."
    weight: 0.35
    description: "NADCAPRequirements"
  - type: llm_judge
    criteria: "Response includes realistic implementation — provides gap analysis methodology comparing current ISO 9001 system to AS9100D and NADCAP requirements; proposes achievable timeline within 14 months (AS9100D) and 18 months (NADCAP); defines resource requirements; addresses training needs for 450 employees; includes mock audit preparation; the plan accounts for the Boeing contract urgency; an aerospace quality professional would find this plan credible."
    weight: 0.30
    description: "RealisticImplementation"
