meta:
  id: sop-maturity-assessment
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design a process documentation maturity model and conduct a maturity assessment for a large healthcare system, creating the multi-year roadmap to operational excellence"
  tags: [maturity-model, assessment, healthcare, roadmap, expert]

state: {}

trigger: |
  You're an external consultant (former VP of Process
  Excellence at a top health system) engaged by a 12-
  hospital healthcare system ($4.5B net patient revenue,
  28,000 employees) to assess their process documentation
  maturity and create a roadmap to operational excellence.
  The system's new CEO came from manufacturing and is
  frustrated by the inconsistency: "We have 12 hospitals
  doing the same thing 12 different ways."

  Assessment findings from your initial discovery:
  - Total SOPs/policies across the system: estimated
    8,000-12,000 (nobody knows the exact number)
  - Documentation tools: 4 different platforms (PolicyStat
    at 5 hospitals, Confluence at 3, SharePoint at 2,
    paper binders at 2)
  - Standardization: Less than 15% of clinical and
    operational processes are standardized across all 12
    hospitals
  - Age of documentation: Average SOP age is 3.8 years;
    22% haven't been reviewed in 5+ years
  - Training: "Read and sign" attestation is the primary
    training method; no competency verification
  - Compliance: Joint Commission, CMS, state health
    department, and payer requirements all embedded
    differently across hospitals
  - Process performance: Core measures (OR turnover time,
    ED throughput, discharge time, medication
    administration timing) vary 40-200% across hospitals
  - Recent events: Two sentinel events in 6 months were
    traced to process documentation failures (wrong
    procedure version followed, critical step missing)

  CEO expectations:
  - Maturity assessment with clear scoring methodology
  - Benchmarking against best-in-class health systems
  - Multi-year roadmap with investment requirements
  - Quick wins (measurable improvement within 6 months)
  - Business case for process standardization investment
  - Budget guidance: CEO will support $8-15M over 3 years
    if ROI is demonstrated

  Task: Create the process documentation maturity model
  (with clear levels, criteria, and scoring methodology),
  conduct the assessment for the healthcare system
  (scoring each dimension), create the multi-year roadmap
  with phased implementation, develop the business case
  showing ROI of process standardization, and identify
  3-5 quick wins for the first 6 months. Include the
  governance structure needed to sustain improvement.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive maturity model — defines clear maturity levels (at least 5) with observable criteria for each dimension (documentation quality, accessibility, currency, standardization, training effectiveness, compliance integration, performance linkage); the scoring methodology is objective and repeatable; the model is calibrated for healthcare (addresses clinical vs operational processes, regulatory requirements, patient safety implications); the assessment applies the model to the healthcare system with specific scores and gaps."
    weight: 0.35
    description: "ComprehensiveMaturityModel"
  - type: llm_judge
    criteria: "Response produces a credible roadmap and business case — the multi-year roadmap is phased with clear priorities, milestones, and resource requirements; quick wins are genuinely achievable within 6 months and show measurable improvement; the business case quantifies ROI (cost of poor quality, sentinel event costs, regulatory compliance efficiency, operational variation reduction); the investment level ($8-15M) is justified against the returns; a healthcare CEO from manufacturing would find this compelling."
    weight: 0.35
    description: "CredibleRoadmapAndBusinessCase"
  - type: llm_judge
    criteria: "Response addresses healthcare-specific challenges — recognizes the difference between clinical and operational processes; addresses physician engagement (SOPs for clinical practice require physician buy-in); includes patient safety considerations (how process standardization prevents sentinel events); addresses regulatory complexity (Joint Commission, CMS, state requirements); proposes governance structure that sustains improvement across 12 hospitals; the approach would be accepted by hospital administrators and clinical leaders."
    weight: 0.30
    description: "HealthcareSpecificChallenges"
