meta:
  id: crisis-operations-playbook
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design an enterprise crisis operations playbook for a global airline covering operational disruptions, safety events, cybersecurity incidents, and reputational crises"
  tags: [crisis-management, airline, operations, playbook, expert]

state: {}

trigger: |
  You're the VP of Enterprise Resilience at a major
  global airline (150 aircraft, 200 destinations, 35,000
  employees, $18B revenue). After a series of operational
  disruptions — a 3-day IT outage that stranded 120,000
  passengers, a runway incursion near-miss, and a social
  media crisis from a viral passenger video — the CEO
  wants a comprehensive crisis operations playbook that
  ensures consistent, rapid response regardless of
  crisis type.

  Crisis types to address:
  1. Operational disruption (weather, IT failure, ATC,
     airport closure)
  2. Aircraft incident/accident (hull loss, emergency
     landing, injuries)
  3. Security event (bomb threat, hijacking, active
     shooter)
  4. Public health (pandemic, food contamination, crew
     illness outbreak)
  5. Cybersecurity incident (data breach, ransomware,
     operational technology attack)
  6. Reputational crisis (viral video, employee
     misconduct, executive scandal)
  7. Labor action (pilot/FA strike, work slowdown,
     sickout)
  8. Regulatory (grounding order, FAA enforcement,
     international dispute)

  Current gaps:
  - Crisis plans exist but are siloed (operations,
    security, IT, communications each have separate plans)
  - No unified crisis classification or escalation system
  - Command structure unclear when crisis spans multiple
    departments
  - Communication approval takes too long (2-hour average
    for first public statement during IT outage)
  - No social media rapid response protocol
  - Passenger care procedures are inconsistent across
    stations
  - Post-crisis review happens "sometimes" with no
    structured learning capture
  - Regulatory notification timelines are not documented
    (FAA, DOT, TSA, international authorities)

  Regulatory requirements:
  - FAA Part 121 Emergency Response (14 CFR 121.135)
  - DOT Aviation Disaster Family Assistance Act
  - TSA security directive compliance
  - EU Regulation 261/2004 (passenger rights)
  - Montreal Convention (international liability)
  - GDPR (data breach notification, EU operations)
  - State data breach notification laws

  Task: Create the enterprise crisis operations playbook
  including: unified crisis classification system (levels
  1-4 with clear escalation triggers), command structure
  for each crisis level, response procedures for each
  crisis type, communication protocols (internal, external,
  social media, regulatory), passenger care procedures,
  regulatory notification requirements, post-crisis review
  methodology, and training/exercise program. The playbook
  should enable any duty manager to initiate the correct
  response at 3 AM without needing to call the VP.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive crisis playbook — defines a unified crisis classification system (4 levels with clear escalation triggers); establishes command structure for each level (who leads, who's involved, who decides); provides response procedures for each of the 8 crisis types; includes communication protocols with specific timelines; addresses the siloed plan problem by creating an integrated framework; the playbook enables autonomous crisis initiation without senior leadership."
    weight: 0.35
    description: "ComprehensiveCrisisPlaybook"
  - type: llm_judge
    criteria: "Response addresses airline-specific requirements — includes passenger care procedures (rebooking, accommodation, compensation per EU 261 and DOT); addresses regulatory notification timelines for each authority (FAA, DOT, TSA, international CAAs); includes social media rapid response protocol (reducing 2-hour statement to 30 minutes); addresses aircraft incident/accident response per Family Assistance Act; the playbook reflects airline operations reality (stations, crew scheduling, dispatch, maintenance)."
    weight: 0.35
    description: "AirlineSpecificRequirements"
  - type: llm_judge
    criteria: "Response includes training and continuous improvement — proposes crisis exercise program (tabletop, functional, full-scale); includes post-crisis review methodology with structured learning capture; defines training requirements by role; addresses the coordination challenge across 200 stations and 35,000 employees; includes playbook maintenance and update procedures; an airline CEO would find this playbook comprehensive and implementable."
    weight: 0.30
    description: "TrainingAndImprovement"
