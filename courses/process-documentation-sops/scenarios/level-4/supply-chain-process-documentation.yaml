meta:
  id: supply-chain-process-documentation
  level: 4
  course: process-documentation-sops
  type: output
  description: "Document end-to-end supply chain processes for a global electronics manufacturer implementing dual-sourcing, nearshoring, and resilience strategies post-pandemic"
  tags: [supply-chain, resilience, global-manufacturing, documentation, expert]

state: {}

trigger: |
  You're the VP of Supply Chain Transformation at a $8B
  global electronics manufacturer (12,000 employees, 6
  manufacturing sites, 2,400 suppliers across 28
  countries). The board has mandated a complete redesign
  of supply chain processes after pandemic and geopolitical
  disruptions caused $450M in lost revenue over 3 years.
  You need to document the transformed supply chain
  processes.

  Transformation initiatives requiring documentation:
  1. Dual-sourcing strategy: Every critical component must
     have 2+ qualified suppliers (currently 65% single-
     source for critical components)
  2. Nearshoring: Establishing Mexico and Eastern Europe
     manufacturing to reduce Asia-Pacific dependency (from
     78% to 50% within 3 years)
  3. Supply chain control tower: Real-time visibility
     across all tiers (currently visibility only to Tier 1)
  4. Supplier qualification and management: New risk-based
     supplier qualification process
  5. Inventory strategy: From JIT to "strategic buffer"
     model for critical components
  6. Trade compliance: New processes for evolving tariff,
     sanctions, and export control landscape
  7. ESG supply chain compliance: Scope 3 emissions,
     conflict minerals, forced labor prevention

  Process documentation challenges:
  - 3 different planning systems (SAP APO, Oracle ASCP,
    custom Excel models) being consolidated to Kinaxis
    RapidResponse
  - Supplier management processes vary by region
    (procurement offices in US, Germany, China, Japan)
  - Quality requirements differ by end market (automotive,
    medical, defense, consumer)
  - Trade compliance procedures changing quarterly due to
    evolving sanctions and tariffs
  - ESG documentation requirements growing rapidly (EU
    CSRD, German Supply Chain Act, US Uyghur Forced Labor
    Prevention Act)

  Task: Create the comprehensive supply chain process
  documentation framework and write detailed SOPs for
  3 critical processes: the dual-sourcing qualification
  process, the supply chain risk monitoring and response
  procedures (control tower operations), and the trade
  compliance and sanctions screening process. Include
  the process performance metrics, the escalation
  framework, and the continuous improvement methodology.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive supply chain documentation framework — covers all 7 transformation initiatives at the framework level; provides detailed SOPs for the 3 priority processes (dual-sourcing, control tower operations, trade compliance); the dual-sourcing SOP includes supplier qualification criteria, validation testing, and transition management; the control tower SOP defines monitoring procedures, alert thresholds, and escalation protocols; addresses the multi-system transition (to Kinaxis)."
    weight: 0.35
    description: "ComprehensiveSupplyChainDocs"
  - type: llm_judge
    criteria: "Response addresses global complexity — the trade compliance SOP covers tariff classification, sanctions screening (OFAC, EU, UK), export controls (EAR, ITAR), and customs procedures; addresses the evolving regulatory landscape with procedures for regulatory change monitoring; includes ESG compliance documentation (Scope 3, conflict minerals, forced labor); the SOPs address regional variation across US, Germany, China, Japan procurement offices; the documentation supports four distinct end markets (automotive, medical, defense, consumer)."
    weight: 0.35
    description: "GlobalComplexity"
  - type: llm_judge
    criteria: "Response includes performance metrics and resilience — defines supply chain resilience metrics beyond traditional KPIs; proposes process performance monitoring framework; includes continuous improvement methodology for supply chain processes; addresses the strategic shift from JIT to buffer inventory; the documentation enables the reduction from 78% to 50% Asia-Pacific dependency; a supply chain executive would find this framework actionable for a $8B manufacturer."
    weight: 0.30
    description: "MetricsAndResilience"
