meta:
  id: m-and-a-process-integration
  level: 4
  course: process-documentation-sops
  type: output
  description: "Lead post-merger process integration for a $2.5B acquisition, harmonizing two complete sets of business processes, SOPs, and quality systems within aggressive synergy timelines"
  tags: [m-and-a, integration, harmonization, synergy, expert]

state: {}

trigger: |
  You're the VP of Integration Management Office (IMO)
  at a $5B specialty chemicals company that just closed
  a $2.5B acquisition of a competitor. The deal thesis
  promises $180M in annual synergies by Year 3, with
  $80M from operational efficiencies (process
  standardization). Your job is to integrate all business
  processes and documentation within 18 months.

  The two companies:
  Acquirer ("ChemCorp"):
  - $5B revenue, 8,000 employees, 22 manufacturing sites
  - Mature process documentation (ISO 9001, ISO 14001,
    RC 14001 certified)
  - 3,200 SOPs in SAP Document Management
  - Strong EHS culture, excellent OSHA safety record
  - Process-oriented, disciplined but slow to change
  - ERP: SAP S/4HANA

  Acquired ("SpecChem"):
  - $2.5B revenue, 4,500 employees, 14 manufacturing
    sites
  - Mixed documentation quality (4 sites ISO certified,
    10 not)
  - ~1,800 SOPs across SharePoint, network drives, and
    paper
  - Entrepreneurial culture, fast-moving but inconsistent
  - Higher innovation rate but weaker quality systems
  - ERP: Oracle EBS (migrating to SAP as part of
    integration)

  Integration complexity:
  - 36 manufacturing sites post-merger (some produce
    overlapping products)
  - 5,000 SOPs combined (significant overlap and conflict)
  - 3 product lines to be consolidated (closing 4
    SpecChem sites, transferring production to ChemCorp)
  - Different safety cultures (ChemCorp: zero-incident
    mindset; SpecChem: 3x ChemCorp's incident rate)
  - Regulatory: EPA, OSHA, REACH, chemical safety
    regulations vary by site/country
  - Employee anxiety high — layoffs expected in
    overlapping functions

  Synergy timeline:
  - Day 1-90: Critical harmonization (safety, compliance,
    financial controls)
  - Day 91-180: Core process standardization
  - Day 181-365: Full integration of overlapping functions
  - Day 366-540: Optimization and best practice deployment

  Task: Create the process integration plan including
  the methodology for evaluating "best of both"
  processes, the SOP harmonization approach (which
  processes to standardize, which to leave site-specific),
  the site closure/production transfer documentation
  requirements, the safety culture integration plan, the
  technology migration approach for SOPs (Oracle →
  SAP), and the change management strategy for 12,500
  employees. Address how to capture $80M in operational
  efficiency synergies through process standardization.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible M&A process integration plan — defines methodology for evaluating and selecting 'best of both' processes; proposes SOP harmonization approach with clear decision framework (what must be standardized vs what stays local); addresses site closure documentation (technology transfer, regulatory notifications, production qualification); the plan is phased realistically within 18 months; addresses the 5,000 SOP rationalization challenge."
    weight: 0.35
    description: "CredibleIntegrationPlan"
  - type: llm_judge
    criteria: "Response addresses cultural and change management challenges — proposes safety culture integration plan (bridging ChemCorp's zero-incident mindset with SpecChem's higher incident rate); addresses employee anxiety and retention during integration; includes communication strategy for 12,500 employees; addresses the cultural tension (disciplined but slow vs entrepreneurial but inconsistent); the change management approach preserves the best of both cultures."
    weight: 0.35
    description: "CulturalAndChangeManagement"
  - type: llm_judge
    criteria: "Response connects process integration to synergy capture — clearly links process standardization activities to the $80M synergy target; identifies specific areas where process harmonization drives efficiency gains; includes synergy tracking methodology; addresses the technology migration (Oracle → SAP) for documentation; proposes metrics for measuring integration success; a PE sponsor or board member would find the synergy capture approach credible and measurable."
    weight: 0.30
    description: "SynergyCaptureConnection"
