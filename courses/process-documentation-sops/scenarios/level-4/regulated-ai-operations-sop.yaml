meta:
  id: regulated-ai-operations-sop
  level: 4
  course: process-documentation-sops
  type: output
  description: "Design operational SOPs for AI/ML systems in a regulated financial institution, covering model deployment, monitoring, bias testing, and regulatory compliance"
  tags: [ai-operations, mlops, financial-regulation, model-governance, expert]

state: {}

trigger: |
  You're the Head of AI Governance at a top-20 US bank
  ($180B assets, 22,000 employees). The bank has deployed
  38 AI/ML models in production (credit decisioning,
  fraud detection, AML monitoring, customer service,
  marketing targeting). The OCC has issued an MRA
  (Matter Requiring Attention) citing inadequate
  operational procedures for AI model lifecycle
  management, and the Federal Reserve has published new
  guidance on AI governance that your bank must implement
  within 12 months.

  OCC MRA findings:
  1. "No documented procedures for AI model deployment
     to production"
  2. "Model monitoring procedures do not address
     algorithmic drift or bias emergence"
  3. "No documented process for emergency model shutdown"
  4. "Incident response procedures do not address AI-
     specific failure modes"
  5. "Training data governance procedures are insufficient"

  Current AI/ML models in production:
  - Credit scoring (4 models): Consumer lending, small
    business, mortgage, credit card
  - Fraud detection (3 models): Transaction, application,
    account takeover
  - AML monitoring (2 models): Transaction screening,
    customer risk rating
  - Customer service (5 chatbots): Different product lines
  - Marketing (4 models): Propensity, next-best-offer,
    churn prediction, pricing
  - Operations (20+ models): Document processing, claims
    triage, resource allocation

  Regulatory requirements:
  - SR 11-7 (Model Risk Management)
  - OCC 2021-41 (Fair lending and AI)
  - CFPB guidance on adverse action notices for AI
  - ECOA fair lending requirements
  - Federal Reserve AI governance framework (new)
  - State AI laws (Colorado, Illinois, NYC)
  - EU AI Act (for EU subsidiary operations)

  MLOps infrastructure:
  - Model training: Databricks
  - Feature store: Tecton
  - Model registry: MLflow
  - Deployment: Kubernetes (EKS)
  - Monitoring: Evidently AI + custom dashboards
  - CI/CD: GitLab

  Task: Design the comprehensive AI Operations SOP
  system including: model deployment procedures (from
  validated model to production), model monitoring SOPs
  (performance, drift, bias, fairness), emergency model
  shutdown procedures, AI incident response, training
  data governance, and the model lifecycle management
  framework. Address the regulatory requirements for
  explainability, adverse action notices, and fair
  lending compliance. The SOPs must satisfy the OCC MRA
  and the new Fed guidance.

assertions:
  - type: llm_judge
    criteria: "Response designs comprehensive AI operations SOPs — includes model deployment procedures with validation gates, approval workflows, and go/no-go criteria; model monitoring SOPs address performance degradation, data drift, concept drift, and bias emergence with specific metrics and thresholds; emergency model shutdown procedures include fallback processes (what happens when the credit model is turned off?); addresses all 5 OCC MRA findings with specific procedural remediation."
    weight: 0.35
    description: "ComprehensiveAIOperationsSOPs"
  - type: llm_judge
    criteria: "Response addresses regulatory requirements — includes procedures for ECOA fair lending compliance (adverse action notices from AI models); addresses SR 11-7 model risk management lifecycle; incorporates OCC fair lending AI guidance; addresses state AI laws (Colorado, Illinois, NYC); addresses training data governance (data quality, representativeness, bias in training data); proposes explainability procedures for different model types and regulatory contexts; the SOPs would satisfy OCC examiners."
    weight: 0.35
    description: "RegulatoryRequirements"
  - type: llm_judge
    criteria: "Response includes practical MLOps integration — references the actual infrastructure (Databricks, MLflow, Kubernetes, Evidently AI); includes AI-specific incident response procedures (model producing biased outputs, adversarial attack, training data contamination); addresses the scale (38 models in production); proposes model lifecycle management framework with clear stage gates; the SOPs are practical for an AI engineering team to follow while meeting governance requirements."
    weight: 0.30
    description: "PracticalMLOpsIntegration"
