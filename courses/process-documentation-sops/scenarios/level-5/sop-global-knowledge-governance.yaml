meta:
  id: sop-global-knowledge-governance
  level: 5
  course: process-documentation-sops
  type: output
  description: "Design the operational knowledge governance system for a Fortune 20 multinational with 250,000 employees, 90 countries, and regulatory requirements spanning 30+ frameworks"
  tags: [global-governance, fortune-20, knowledge-management, scale, master]

state: {}

trigger: |
  You're the Chief Process Officer (a C-suite role
  created for you) at a Fortune 20 diversified industrial
  conglomerate ($85B revenue, 250,000 employees, 90
  countries, 6 business segments: Aviation, Power,
  Healthcare, Renewable Energy, Digital, Financial
  Services). The CEO has made operational excellence a
  top-3 strategic priority and created your role to
  unify process and knowledge governance across what has
  historically been a highly decentralized federation.

  The scale of the challenge:
  - Estimated 45,000-60,000 SOPs across the enterprise
    (nobody has a definitive count)
  - 14 document management systems in use
  - 23 languages required for operational procedures
  - Quality management systems: AS9100 (Aviation), ISO
    13485 (Healthcare), ISO 9001 (Power, Renewable),
    SOX/regulatory (Financial Services)
  - Union agreements in 40 countries affect procedure
    change management
  - 3 major ERPs (SAP, Oracle, Workday) plus 200+
    specialty systems
  - Annual audit/inspection burden: 500+ external
    regulatory inspections across all segments and
    countries

  Recent failures driving the mandate:
  - Aviation segment: $800M engine recall traced to a
    manufacturing SOP that wasn't updated after a
    material specification change 3 years ago
  - Healthcare segment: EU MDR compliance gap in 4
    countries — procedures not translated/localized in
    time for regulatory deadline
  - Power segment: Two identical quality failures at
    different plants — a fix at one plant was never
    shared with the other
  - Financial Services: Consent decree for BSA/AML
    documentation deficiencies
  - Digital: No SOPs existed for AI model deployment
    (leading to biased algorithm in healthcare product)

  Board expectations:
  - Single governance framework (not single system) that
    ensures material processes meet quality and compliance
    standards
  - Prevent catastrophic failures from documentation gaps
  - Enable best practice sharing across 250,000 employees
  - Leverage AI to transform process documentation from
    cost center to competitive advantage
  - Budget: $65M over 5 years
  - Measurable improvement in quality metrics, audit
    readiness, and knowledge sharing within 24 months

  Task: Design the enterprise operational knowledge
  governance system including the governance framework
  (organizational structure, decision rights, escalation),
  the process documentation architecture (what's global,
  segment, regional, site-specific), the technology
  strategy (single platform vs federated, AI capabilities),
  the regulatory harmonization approach for 30+ frameworks,
  the change management strategy for 250,000 employees
  across 90 countries, and the 5-year transformation
  roadmap with measurable milestones.

assertions:
  - type: llm_judge
    criteria: "Response designs a governance framework appropriate for Fortune 20 scale — creates organizational structure with clear decision rights across corporate, segment, regional, and site levels; addresses the federated vs centralized tension; proposes documentation architecture that distinguishes global standards from segment/regional/site procedures; addresses the 14 DMS consolidation strategy; the framework handles 6 different business segments with different quality system requirements (AS9100, ISO 13485, ISO 9001, SOX); a Fortune 20 CEO and board would find this framework credible."
    weight: 0.35
    description: "Fortune20ScaleGovernance"
  - type: llm_judge
    criteria: "Response addresses the specific failures and regulatory complexity — directly prevents recurrence of each failure (aviation SOP lag, healthcare MDR gaps, power knowledge siloing, financial services documentation deficiency, digital AI governance gap); proposes regulatory harmonization across 30+ frameworks; addresses multi-language management at scale (23 languages); addresses union considerations in 40 countries; the approach handles 500+ annual regulatory inspections; the regulatory strategy would be accepted by chief compliance officers across all 6 segments."
    weight: 0.35
    description: "FailurePreventionAndRegulatory"
  - type: llm_judge
    criteria: "Response includes a credible transformation roadmap — proposes phased 5-year plan within $65M budget; identifies quick wins for 24-month measurable improvement; addresses change management for 250,000 employees across 90 countries with different cultures; proposes AI transformation strategy that's technically feasible and provides competitive advantage; includes metrics for measuring transformation progress; the roadmap accounts for organizational resistance in a historically decentralized company."
    weight: 0.30
    description: "CredibleTransformationRoadmap"
