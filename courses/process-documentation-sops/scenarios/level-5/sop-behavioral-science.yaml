meta:
  id: sop-behavioral-science
  level: 5
  course: process-documentation-sops
  type: output
  description: "Write a research framework on behavioral factors in SOP compliance, studying why people don't follow procedures and designing evidence-based interventions"
  tags: [behavioral-science, compliance, human-factors, research, master]

state: {}

trigger: |
  You're a professor of Organizational Behavior at
  London School of Economics. You've received a £500K
  research grant from the UK Health and Safety Executive
  (HSE) to study why people don't follow standard
  operating procedures, even in safety-critical
  environments. Your research will inform HSE guidance
  on procedural compliance in high-hazard industries.

  Your catalog of procedural non-compliance factors:

  Individual factors:
  1. Cognitive load: Workers can retain 7±2 steps; SOPs
     with 30+ steps lead to step-skipping
  2. Habituation: After performing a procedure 50+ times,
     workers develop "shortcuts" that omit steps perceived
     as unnecessary
  3. Time pressure: Under production pressure, workers
     skip "verification" and "documentation" steps first
  4. Skill-based errors: Experienced workers rely on
     muscle memory and miss when conditions change
  5. Overconfidence: Workers with 10+ years experience
     believe they know better than the SOP

  Organizational factors:
  6. Conflicting goals: "Follow the SOP exactly" vs
     "meet the production target" — when these conflict,
     production usually wins
  7. Normalization of deviance: Small deviations that
     don't cause immediate harm become accepted practice
  8. Silent approval: Supervisors who observe deviations
     and don't correct them implicitly approve them
  9. Procedure quality: Poorly written SOPs are impossible
     to follow (ambiguity, missing information, wrong
     sequence)
  10. Feedback gap: Workers never see the consequences of
      procedural deviations (consequences are delayed or
      probabilistic)

  Systemic factors:
  11. Procedure volume: Average worker in a chemical
      plant has 200+ applicable SOPs (nobody can know
      them all)
  12. Update lag: SOPs describe how work was done 2 years
      ago, not how it's done today
  13. One-size-fits-all: Same SOP for a novice and a
      20-year veteran
  14. No adaptation path: No mechanism for workers to
      improve procedures based on their experience

  Research methodology:
  - 3-year study across 40 organizations in 4 sectors
    (chemicals, healthcare, nuclear, aviation)
  - Direct observation of procedural compliance (10,000+
    observed tasks)
  - Eye-tracking studies during procedure following
  - Survey of 3,000 workers and 500 supervisors
  - Controlled experiments testing debiasing interventions
  - Analysis of 500 incident investigations where
    procedural non-compliance was a contributing factor

  Task: Create the research framework and practitioner
  guide. Include hypothesis structure for each non-
  compliance factor, experimental design for interventions,
  the "Procedural Compliance Toolkit" for safety
  managers, and the "Procedure Design Guide" that
  incorporates behavioral science principles. The toolkit
  should help organizations improve compliance from
  the typical 34% to 80%+ without relying on
  surveillance or punishment.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous research framework — structures hypotheses for key non-compliance factors with testable predictions; designs experiments that isolate behavioral factors and test interventions; addresses research validity (Hawthorne effect in compliance observation, selection bias, industry differences); proposes novel interventions informed by behavioral science (nudge theory, cognitive ergonomics, organizational psychology); the methodology would pass peer review in a human factors or safety science journal."
    weight: 0.35
    description: "RigorousResearchFramework"
  - type: llm_judge
    criteria: "Response produces a usable practitioner toolkit — translates each non-compliance factor into observable behaviors and detection methods; proposes practical interventions that work in real organizational settings (not just lab conditions); includes a Procedure Design Guide incorporating behavioral science principles (cognitive load management, chunking, decision support, adaptive procedures); the toolkit enables improvement from 34% to 80%+ compliance without surveillance or punishment; a safety manager could implement 3+ interventions immediately."
    weight: 0.35
    description: "UsablePractitionerToolkit"
  - type: llm_judge
    criteria: "Response demonstrates deep cross-disciplinary expertise — shows genuine understanding of behavioral science research (Reason, Dekker, Hollnagel) applied to procedural compliance; connects individual behaviors to organizational and systemic factors; addresses the political dynamics (production pressure overriding safety, normalization of deviance enabled by management); proposes interventions that address root causes, not just symptoms; the research contributes to both academic knowledge and regulatory practice."
    weight: 0.30
    description: "CrossDisciplinaryExpertise"
