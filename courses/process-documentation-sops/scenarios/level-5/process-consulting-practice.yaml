meta:
  id: process-consulting-practice
  level: 5
  course: process-documentation-sops
  type: output
  description: "Design a boutique process excellence consulting firm specializing in operational documentation transformation for regulated industries"
  tags: [consulting, practice-building, methodology, regulated-industries, master]

state: {}

trigger: |
  You're a former VP of Process Excellence at a Fortune
  100 pharmaceutical company who left to start "Clarity
  Process Partners," a boutique consulting firm
  specializing in process documentation transformation
  for regulated industries. You've assembled a team of 6
  former quality directors, regulatory affairs leaders,
  and process engineers from pharma, medical devices,
  aerospace, and financial services.

  Market opportunity:
  - 72% of regulated companies cite process documentation
    as their #1 audit vulnerability
  - Average FDA Warning Letter remediation: $15-50M and
    18-36 months
  - Consent decree costs: $100M+ and years of production
    constraints
  - Process documentation transformation market: ~$8B
    globally
  - Competitors: Big 4 (expensive, generic), regulatory
    consulting firms (narrow, compliance-only), technology
    vendors (tool-first, not strategy-first)

  Service offerings to design:
  1. Process Documentation Health Check (2 weeks, $50-75K):
     Rapid assessment of documentation maturity with
     regulatory risk scoring
  2. Warning Letter/Consent Decree Remediation (6-18
     months, $500K-3M): Full quality system documentation
     overhaul meeting regulatory expectations
  3. Process Excellence Transformation (12-24 months,
     $1-5M): Comprehensive operational documentation
     transformation beyond compliance
  4. Regulatory Readiness Assessment (4 weeks, $100-150K):
     Pre-inspection preparation and mock audit
  5. SOP Writing Training Program (2-5 days, $25-50K):
     Capability building for client teams

  First client prospect:
  - $400M medical device company, 800 employees
  - Just received FDA Warning Letter with 5 documentation-
    related findings
  - Previous remediation attempt with a Big 4 firm
    failed ($1.8M spent, FDA still not satisfied)
  - New CEO wants "someone who's actually done this, not
    slide-deck consultants"
  - Budget: $1-2M over 12 months
  - Competition: Deloitte ($3.5M proposal), small
    regulatory firm ($800K proposal)

  Task: Create the complete consulting methodology for
  your flagship service (Warning Letter Remediation),
  develop the winning proposal for the medical device
  client that positions you against Deloitte and the
  regulatory firm, build the process documentation
  maturity model, and design the knowledge transfer
  approach that builds client capability so they don't
  need you forever.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible consulting methodology — the Warning Letter Remediation methodology has clear phases (assess, design, build, validate, sustain); each phase has specific deliverables, activities, and success criteria; the methodology reflects real regulatory remediation experience (not generic consulting frameworks); addresses the common failure mode (Big 4 firm that failed — why do remediations fail?); the methodology differentiates Clarity Process Partners from competitors."
    weight: 0.35
    description: "CredibleConsultingMethodology"
  - type: llm_judge
    criteria: "Response designs a winning client proposal — positions effectively against Deloitte (practitioner-led vs slide-deck consultants, outcome-focused vs framework-focused, right-sized investment) and the regulatory firm (broader scope, sustainability focus, capability building); addresses the specific medical device challenges (5 Warning Letter findings, failed Big 4 remediation); scopes within $1-2M budget; demonstrates understanding of FDA expectations for Warning Letter remediation; the proposal would win the business."
    weight: 0.35
    description: "WinningClientProposal"
  - type: llm_judge
    criteria: "Response includes a maturity model and knowledge transfer — creates a process documentation maturity model with clear levels and observable criteria; designs knowledge transfer approach (training client staff to maintain documentation independently); addresses sustainability (how to ensure client doesn't regress after consultants leave); includes ROI framework for consulting engagement; the approach builds lasting client capability rather than dependency."
    weight: 0.30
    description: "MaturityModelAndKnowledgeTransfer"
