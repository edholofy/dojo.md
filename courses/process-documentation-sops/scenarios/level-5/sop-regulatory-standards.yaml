meta:
  id: sop-regulatory-standards
  level: 5
  course: process-documentation-sops
  type: output
  description: "Draft international standards for process documentation quality in safety-critical industries, creating the ISO framework for procedural excellence"
  tags: [standards, iso, safety-critical, international, master]

state: {}

trigger: |
  You're the Chair of the ISO Technical Committee TC 176
  Working Group on "Procedural Quality in Safety-Critical
  Industries." Following several high-profile disasters
  where procedural documentation failures were identified
  as contributing factors (Boeing 737 MAX, Grenfell Tower,
  Deepwater Horizon, Fukushima), the ISO Council has
  commissioned your working group to develop a new
  international standard: ISO 45005 "Requirements for
  Process Documentation in Safety-Critical Operations."

  Disasters informing the standard:
  1. Boeing 737 MAX (2018-2019): Pilots weren't trained
     on MCAS system; SOP for runaway stabilizer trim
     didn't address automated system interaction; 346 deaths
  2. Grenfell Tower (2017): Fire safety procedures were
     based on "stay put" policy that was inappropriate
     for the building's cladding; procedures not updated
     when building was renovated; 72 deaths
  3. Deepwater Horizon (2010): Well control procedures
     not followed; positive pressure test results
     misinterpreted; procedure for cement job inadequate;
     11 deaths, environmental catastrophe
  4. Fukushima (2011): Emergency operating procedures
     assumed power would be available; no procedures for
     total station blackout scenario; procedures assumed
     single reactor failure, not multi-unit
  5. CrowdStrike outage (2024): Software deployment
     procedure lacked staged rollout requirement;
     configuration update bypassed testing; 8.5M systems
     affected globally

  Working group composition:
  - Nuclear safety experts (IAEA, NRC, ONR)
  - Aviation safety (ICAO, FAA, EASA)
  - Healthcare quality (WHO, Joint Commission)
  - Chemical/process safety (OSHA, HSE UK, CEFIC)
  - Technology/cybersecurity (NIST, ENISA)
  - Human factors experts (HFES, CIEHF)
  - Industry representatives (manufacturing, energy,
    transportation)

  Standard requirements:
  - Must be applicable across all safety-critical sectors
  - Must be adoptable by national standards bodies
  - Must be certifiable (auditable requirements)
  - Must address both document quality and procedural
    execution
  - Must incorporate human factors engineering principles
  - Must address digital and AI-assisted procedures
  - Must be proportionate (not impose nuclear-level
    requirements on every industry)

  Task: Draft the ISO 45005 standard including scope
  and definitions, the requirements framework (document
  quality, procedural design, training and competency,
  change management, performance monitoring, continuous
  improvement), sector-specific annexes for at least 3
  industries, the conformity assessment framework, and
  the guidance notes for implementation. Include how the
  standard addresses each of the cited disasters' root
  causes.

assertions:
  - type: llm_judge
    criteria: "Response drafts a credible international standard — follows ISO standard structure (scope, normative references, terms and definitions, requirements, annexes); the requirements are specific enough to be auditable yet principle-based enough to apply across industries; addresses document quality, procedural design, training/competency, change management, performance monitoring, and continuous improvement; the standard draws clear lessons from each cited disaster; the draft would be taken seriously by the ISO TC 176 working group."
    weight: 0.35
    description: "CredibleInternationalStandard"
  - type: llm_judge
    criteria: "Response addresses cross-industry applicability — includes sector-specific annexes for at least 3 industries with appropriate calibration; addresses proportionality (risk-based tiering of requirements); incorporates human factors engineering principles throughout; addresses digital and AI-assisted procedures; the standard doesn't impose nuclear-level requirements on non-nuclear industries; the conformity assessment framework is practical for certification bodies."
    weight: 0.35
    description: "CrossIndustryApplicability"
  - type: llm_judge
    criteria: "Response demonstrates standards expertise and safety systems thinking — shows understanding of how standards development works (consensus-based, stakeholder input, pilot testing); addresses the relationship with existing standards (ISO 9001, ISO 45001, sector-specific standards); proposes implementation guidance that helps organizations adopt the standard; the standard advances the profession beyond current best practices; a safety systems expert would find this a meaningful contribution to preventing future disasters."
    weight: 0.30
    description: "StandardsExpertise"
