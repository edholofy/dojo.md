meta:
  id: sop-thought-leadership
  level: 5
  course: process-documentation-sops
  type: output
  description: "Write a Harvard Business Review article arguing that traditional SOPs are obsolete and proposing the future of operational knowledge management"
  tags: [thought-leadership, hbr, future-of-work, knowledge-management, master]

state: {}

trigger: |
  You're a professor of Operations Management at MIT
  Sloan School of Management and a former Chief Operating
  Officer of a Fortune 100 company. Harvard Business
  Review has commissioned you to write a feature article
  titled "The Standard Operating Procedure Is Dead: What
  Replaces It?" based on your research across 200
  organizations.

  Your research findings:
  - Average SOP compliance rate across industries: 34%
    (the documented procedure is followed as written only
    1 in 3 times)
  - Average SOP age: 3.7 years (procedures describe
    how work was done, not how it's currently done)
  - Time spent writing/updating SOPs: 12% of management
    time (estimated $180B annually across US enterprises)
  - Knowledge worker response to "Do you consult SOPs
    regularly?": 11% yes, 89% no
  - Organizations with process mining: discovered that
    actual work has 3-10x more variants than documented
  - AI-capable organizations: beginning to replace static
    SOPs with dynamic, contextual guidance systems

  Case studies from your research:
  1. Toyota Production System: The gold standard — but
     even Toyota has moved beyond static work standards
     to "dynamic standardization" where standards evolve
     continuously through kaizen
  2. Amazon: "Working backwards" documentation (future-
     state press releases) instead of traditional SOPs;
     operational procedures embedded in software systems
  3. Netflix: "No Rules Rules" culture — minimal
     procedures, maximum context; relies on talent
     density and judgment over documented processes
  4. Nuclear power: Highest SOP compliance rates (92%)
     but at enormous cost (procedure adherence monitoring,
     validation, training); not transferable to most
     industries
  5. Healthcare: Evidence-based practice guidelines
     replacing rigid procedures; clinical decision support
     systems providing contextual guidance at point of care

  Your thesis: The future is not better SOPs — it's a
  fundamentally different approach to operational knowledge
  that combines embedded intelligence, continuous learning,
  and human judgment. Static documents will be replaced
  by dynamic knowledge systems that learn from execution.

  Task: Write the complete HBR article including the
  evidence that traditional SOPs fail, the analysis of
  why they fail (human factors, organizational dynamics,
  knowledge decay), the framework for the future of
  operational knowledge, case studies of organizations
  pioneering new approaches, and practical recommendations
  for COOs and process leaders. The article should be
  provocative enough to generate debate while being
  grounded in evidence.

assertions:
  - type: llm_judge
    criteria: "Response produces a publication-quality article — follows HBR style (executive-accessible, evidence-based, actionable); builds a compelling argument with data, case studies, and frameworks; the thesis is provocative but defensible (SOPs aren't just outdated, the paradigm is wrong); includes the research data effectively; the article structure has a clear narrative arc from problem to evidence to framework to action; a COO reading this would reconsider their approach to operational documentation."
    weight: 0.35
    description: "PublicationQualityArticle"
  - type: llm_judge
    criteria: "Response provides a credible framework for the future — the proposed alternative to traditional SOPs is concrete enough to implement (not just 'use AI'); addresses different contexts (regulated vs unregulated, safety-critical vs routine, knowledge work vs manual work); uses case studies effectively (Toyota, Amazon, Netflix, nuclear, healthcare); the framework acknowledges that some domains still need traditional SOPs while proposing evolution paths for others."
    weight: 0.35
    description: "CredibleFutureFramework"
  - type: llm_judge
    criteria: "Response includes actionable recommendations — provides specific steps for COOs and process leaders to begin the transition; addresses the organizational change challenge; proposes metrics for the new paradigm; acknowledges regulatory constraints that limit transformation in some industries; the recommendations are tiered by organizational readiness; the article balances vision with pragmatism."
    weight: 0.30
    description: "ActionableRecommendations"
