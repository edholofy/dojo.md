meta:
  id: sop-technology-platform
  level: 5
  course: process-documentation-sops
  type: output
  description: "Design an AI-native process documentation platform that replaces traditional SOP systems with continuous, learning-based operational knowledge management"
  tags: [ai-platform, product-design, sop-tech, innovation, master]

state: {}

trigger: |
  You're the CEO and co-founder of "ProcedureAI," an
  AI-native operational knowledge platform that raised a
  $35M Series B. Your vision is to replace traditional
  SOP/document management systems (MasterControl,
  Veeva Vault, Documentum) with a platform that
  continuously learns from how work is actually performed
  and evolves procedures in real-time.

  Product vision:
  - Process observation engine: Uses computer vision,
    system logs, and IoT sensors to observe how work is
    actually performed
  - Automatic procedure generation: AI creates initial
    SOPs by observing expert workers performing tasks
  - Dynamic procedures: SOPs adapt to context (operator
    experience level, equipment variant, product type)
  - Compliance engine: Automatically maps procedures
    to regulatory requirements (FDA, OSHA, EPA, ISO)
  - Deviation detection: Real-time identification when
    work deviates from procedure (without surveillance
    culture)
  - Knowledge graph: Connects procedures, training,
    competency, equipment, and products in a queryable
    knowledge graph
  - Natural language interface: "How do I change the
    filter on reactor 3?" returns the exact procedure
    step with video

  Market landscape:
  | Competitor | Revenue | Strength | Weakness |
  |-----------|---------|----------|----------|
  | MasterControl | $250M | FDA/pharma leader | Legacy, document-centric |
  | Veeva Vault QMS | $180M | Life sciences depth | Rigid, expensive |
  | Documentum | $350M | Enterprise scale | Dinosaur technology |
  | Process Street | $30M | Modern UX, checklists | No AI, no compliance |
  | Dozuki | $15M | Visual work instructions | Limited industries |
  | SwipeGuide | $8M | Frontline worker focus | Small, EU only |

  ProcedureAI current state:
  - 35 customers (food manufacturing, chemicals, pharma)
  - ARR: $6M (growing 180% YoY)
  - ACV: $170K (enterprise deals reaching $500K)
  - NRR: 135%
  - Team: 85 people (40 engineering, 20 AI/ML, 10 sales)
  - Core AI: Process observation, automatic SOP generation
    (from video), contextual procedure delivery
  - Gross margin: 62% (AI compute costs significant)

  Series B expectations:
  - Reach $35M ARR within 24 months
  - Enter pharmaceutical market (displacing MasterControl)
  - Achieve FDA 21 CFR Part 11 compliance certification
  - Build regulatory mapping engine for 5+ frameworks
  - Path to profitability within 36 months

  Task: Create the comprehensive product and business
  plan including the product roadmap (prioritized AI
  capabilities), the go-to-market strategy (how to
  displace MasterControl in pharma), the regulatory
  compliance strategy (how does an AI system meet 21 CFR
  Part 11?), the trust framework (how do quality managers
  trust AI-generated SOPs?), and the 3-year financial
  model.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision and roadmap — prioritizes AI capabilities by customer value and technical feasibility; addresses the regulatory compliance challenge (how AI-generated procedures meet FDA 21 CFR Part 11, OSHA, ISO requirements); the roadmap builds from current capabilities to full vision; includes differentiation from legacy systems (continuous learning vs static documents, context-aware vs one-size-fits-all); the product vision is ambitious but technically grounded."
    weight: 0.35
    description: "CompellingProductVision"
  - type: llm_judge
    criteria: "Response designs a viable go-to-market strategy — explains how to win pharma deals against entrenched MasterControl; identifies the buying process (VP Quality, VP Regulatory, CIO); proposes partnership strategy with consulting firms and system integrators; addresses vertical expansion strategy; the financial model shows credible path from $6M to $35M ARR; accounts for enterprise sales cycle length in regulated industries."
    weight: 0.35
    description: "ViableGoToMarketStrategy"
  - type: llm_judge
    criteria: "Response addresses trust and regulatory challenges — explains how quality managers and regulators trust AI-generated SOPs (human-in-the-loop review, audit trails, validation methodology); proposes how the platform achieves 21 CFR Part 11 certification (electronic signatures, audit trails, system validation); addresses competitive moat (data network effects from process observation across customers); includes realistic AI compute costs in the margin model; approach would be credible to both quality professionals and technologists."
    weight: 0.30
    description: "TrustAndRegulatoryChallenge"
