meta:
  id: sop-ethics-accountability
  level: 5
  course: process-documentation-sops
  type: output
  description: "Develop an ethical framework for process documentation addressing accountability when procedures fail, documentation fraud, and AI-generated SOPs in safety-critical environments"
  tags: [ethics, accountability, safety-culture, documentation-integrity, master]

state: {}

trigger: |
  You're a professor of Engineering Ethics at Stanford
  University and a member of the National Academy of
  Engineering's Committee on Ethical Issues in
  Engineering. Following the Boeing 737 MAX disasters,
  the Titan submersible implosion, and growing concerns
  about AI-generated safety procedures, the NAE has
  commissioned you to develop an "Ethical Framework for
  Process Documentation in Safety-Critical Systems."

  Cases that prompted the framework:
  1. Boeing 737 MAX: Safety assessment documentation
     used flawed assumptions; procedure changes were
     made to avoid triggering retraining requirements;
     internal emails showed engineers knew procedures
     were inadequate but management overruled concerns.
     346 deaths.
  2. Titan submersible: No third-party certification of
     procedures; CEO dismissed industry safety standards
     as "needlessly conservative"; operating procedures
     were informal and undocumented. 5 deaths.
  3. PG&E/Camp Fire: Vegetation management procedures
     existed but weren't followed; maintenance procedures
     were deferred to reduce costs; documentation showed
     compliance that didn't exist in practice. 85 deaths.
  4. Therac-25 (historical): Software safety procedures
     relied on hardware interlocks that were removed in
     newer version; procedure documentation didn't address
     software-only safety barriers. 6 radiation injuries/
     deaths.
  5. Emerging concern — AI-generated SOPs: Companies are
     beginning to use AI to generate safety procedures.
     When an AI-generated procedure is wrong and someone
     is hurt, who is accountable? The AI developer? The
     company that deployed it? The worker who followed it?
     The manager who approved it without expert review?

  Ethical dimensions to address:
  - Documentation integrity: When is poor documentation
    negligent? When is it criminal?
  - Production vs safety: What are the ethical obligations
    when management pressures workers to deviate from
    safety procedures to meet deadlines?
  - Accountability hierarchy: Who is responsible when
    procedures fail — the writer, the approver, the
    trainer, the executor, the organization?
  - Whistleblower protection: What obligations exist
    when an employee identifies that documented procedures
    are inadequate?
  - AI accountability: How should responsibility be
    allocated when AI generates or modifies safety
    procedures?
  - Economic pressure: When is cost-cutting that reduces
    documentation quality ethically indefensible?

  Task: Develop the complete ethical framework including
  ethical principles for documentation integrity,
  accountability frameworks for procedure failures at
  each organizational level, guidance on AI-generated
  procedures in safety-critical environments, the role
  of professional engineering ethics in procedure design,
  whistleblower protection and dissent mechanisms, and
  recommendations for regulatory reform. The framework
  should be adopted by the NAE and influence engineering
  licensing requirements.

assertions:
  - type: llm_judge
    criteria: "Response develops substantive ethical principles — articulates principles specific to process documentation (not generic engineering ethics); addresses the tension between economic efficiency and safety documentation quality; provides accountability frameworks for each case study (Boeing, Titan, PG&E, Therac-25); distinguishes between negligent, reckless, and intentional documentation failures; the principles are philosophically grounded while being practically actionable; the framework goes beyond legal compliance to genuine ethical reasoning."
    weight: 0.35
    description: "SubstantiveEthicalPrinciples"
  - type: llm_judge
    criteria: "Response addresses AI accountability and emerging challenges — provides specific guidance on AI-generated procedures in safety-critical environments (when is it acceptable, what safeguards are needed, who reviews, who is accountable for errors); addresses the accountability gap when procedures are automated; proposes how professional engineering ethics should evolve to address AI-assisted procedure design; the AI guidance would be relevant to companies currently deploying AI for SOP generation."
    weight: 0.35
    description: "AIAccountabilityGuidance"
  - type: llm_judge
    criteria: "Response creates implementable professional guidance — the framework is structured for adoption by the NAE and professional engineering societies; includes recommendations for engineering licensing requirements related to procedure documentation; proposes whistleblower protection mechanisms; addresses the organizational culture that enables documentation fraud; proposes regulatory reforms that would prevent the cited disasters; the framework elevates the ethical standing of the engineering profession regarding documentation responsibilities."
    weight: 0.30
    description: "ImplementableProfessionalGuidance"
