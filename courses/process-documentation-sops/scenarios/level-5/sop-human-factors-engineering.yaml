meta:
  id: sop-human-factors-engineering
  level: 5
  course: process-documentation-sops
  type: output
  description: "Design a human factors engineering framework for procedure design, creating the definitive guide for writing procedures that humans can actually follow correctly"
  tags: [human-factors, cognitive-ergonomics, procedure-design, safety, master]

state: {}

trigger: |
  You're the Chief Human Factors Engineer at the IAEA
  (International Atomic Energy Agency), where you've
  spent 20 years studying how procedure design affects
  human performance in safety-critical operations. The
  IAEA Director General has asked you to create the
  definitive "Human Factors Guide for Procedure Design"
  that will be adopted as IAEA Technical Document (TECDOC)
  and recommended for use across all nuclear power
  programs globally. Other safety-critical industries
  (aviation, healthcare, chemical processing) have
  expressed interest in adapting it.

  Your research base:
  - Analysis of 2,500 nuclear events where procedure
    problems were contributing factors
  - Eye-tracking studies showing how operators actually
    read procedures (spoiler: they don't read linearly)
  - Cognitive workload studies measuring mental demand
    during procedure execution
  - Comparison of procedure formats across 40 countries
    and 4 industries
  - 15 years of simulator validation data (do operators
    perform better with well-designed procedures?)

  Key research findings:
  1. Step length: Procedures with steps over 20 words
     have 3x the error rate of steps under 10 words
  2. Conditional logic: Nested IF-THEN statements beyond
     2 levels cause 60% error rate (operators take wrong
     branch)
  3. Place-keeping: Without checkboxes or physical
     markers, operators lose their place after any
     interruption (interruptions occur every 3-5 minutes
     in a control room)
  4. Caution/warning placement: Cautions placed after
     the relevant step (instead of before) are missed
     80% of the time
  5. Concurrent steps: Operators can reliably execute 2
     concurrent actions; 3+ concurrent actions cause 40%
     of operators to miss one
  6. Reference switching: Each time an operator must
     reference another procedure or drawing, error rate
     increases 15%
  7. Unit-specific differences: Generic procedures used
     across different equipment configurations cause 25%
     of procedure-related errors
  8. Digital vs paper: Digital procedures reduce place-
     keeping errors by 50% but increase "click-through"
     (executing without reading) by 30%

  Task: Create the comprehensive Human Factors Guide for
  Procedure Design including the cognitive science
  foundations, the design principles with evidence base,
  the format standards (step structure, conditional logic,
  place-keeping, warnings/cautions), the validation
  methodology (how to test if a procedure is human-
  factors compliant), the procedure review checklist, and
  the cross-industry adaptation guidance. Include before/
  after examples showing how HFE principles transform
  real procedures.

assertions:
  - type: llm_judge
    criteria: "Response creates a scientifically grounded guide — connects each design principle to cognitive science evidence (working memory limits, attention, visual scanning, decision-making under stress); addresses all 8 research findings with specific design solutions; includes before/after examples demonstrating how HFE principles transform procedures; the guide distinguishes between cognitive science facts and design recommendations; the scientific foundation would be accepted by the human factors engineering community."
    weight: 0.35
    description: "ScientificallyGroundedGuide"
  - type: llm_judge
    criteria: "Response produces practical design standards — provides specific format standards for step structure, conditional logic, place-keeping, warnings/cautions, concurrent actions, and reference management; addresses digital vs paper procedure design differences; includes a validation methodology (how to test procedure usability before deployment); provides a procedure review checklist that a writer or reviewer can apply; the standards are specific enough to produce consistent results across different procedure writers."
    weight: 0.35
    description: "PracticalDesignStandards"
  - type: llm_judge
    criteria: "Response enables cross-industry adoption — includes guidance for adapting nuclear-grade HFE principles to other safety-critical industries (aviation, healthcare, chemical processing); addresses proportionality (not every industry needs nuclear-level procedure rigor); proposes a tiered approach based on safety significance and consequence of error; the guide would be adopted by the IAEA as a TECDOC and used as reference by other industries; demonstrates mastery of both human factors science and operational procedure design."
    weight: 0.30
    description: "CrossIndustryAdoption"
