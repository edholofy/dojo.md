meta:
  id: master-sop-shift
  level: 5
  course: process-documentation-sops
  type: output
  description: "Master shift simulation — handle a multi-agency investigation, a global product safety crisis, and a hostile takeover defense where documentation failures are central to all three"
  tags: [shift-simulation, crisis-convergence, investigation, global-crisis, master]

state: {}

trigger: |
  You're the Chief Quality and Compliance Officer of
  "Apex Life Sciences," a $3.5B global pharmaceutical
  and medical device company (6,500 employees, 8
  manufacturing sites across 4 continents). It's Tuesday
  morning and three existential crises are unfolding
  simultaneously — all connected by a common thread of
  documentation failures.

  CRISIS 1 — MULTI-AGENCY INVESTIGATION (6:00 AM):
  The FDA, DOJ, and SEC have launched a coordinated
  investigation. The FDA issued a Warning Letter citing
  data integrity violations at your largest manufacturing
  site — specifically, batch records that appear to have
  been fabricated to show compliance with SOPs that
  weren't actually followed. The DOJ is investigating
  potential fraud (knowingly distributing adulterated
  products), and the SEC is investigating whether
  management's public statements about quality system
  compliance constituted securities fraud. Your outside
  counsel estimates potential exposure:
  - FDA consent decree: $50-200M + production restrictions
  - DOJ criminal prosecution: Individual and corporate
  - SEC enforcement: $100M+ in penalties + executive bars
  - Total exposure: $500M-1B

  Your immediate discovery obligations:
  - Litigation hold on all documents (preserve everything)
  - Document production for 3 agencies simultaneously
  - Internal investigation to determine scope of
    misconduct

  CRISIS 2 — GLOBAL PATIENT SAFETY EVENT (8:00 AM):
  Reports from 3 countries (US, Germany, Japan) indicate
  that a batch of your injectable biologic product may
  have caused severe adverse reactions in 23 patients
  (4 hospitalizations, 1 death under investigation).
  Initial analysis suggests the product failed sterility
  requirements, potentially due to the same SOP
  non-compliance identified in Crisis 1 — the cleaning
  and sterilization SOP was systematically shortened
  without validation. You need to:
  - Determine recall scope (how many batches affected?)
  - Notify regulators in all markets (FDA, EMA, PMDA,
    TGA, Health Canada — 45+ country registrations)
  - Communicate with healthcare providers and patients
  - Preserve evidence for the investigation while
    managing the recall

  The critical tension: Evidence needed for the recall
  investigation may be subject to attorney-client
  privilege in the DOJ investigation. How you handle
  document production could either help or destroy your
  legal defense.

  CRISIS 3 — HOSTILE ACQUISITION DEFENSE (10:00 AM):
  A larger pharmaceutical company has launched a hostile
  tender offer at $42/share (current price: $28, pre-
  crisis price was $65). Their public statement says the
  company is "fundamentally undervalued despite temporary
  quality issues that new management can resolve." Your
  board believes the quality failures are being exploited
  to acquire the company at a distressed price. The board
  wants to:
  - Defend against the hostile bid
  - Demonstrate that quality issues are remediable
  - Present a credible standalone turnaround plan
  - Protect shareholder value during the crisis

  The acquirer's due diligence team has filed a FOIA
  request for your FDA inspection records and is citing
  the quality failures to shareholders as evidence that
  current management is incompetent.

  Task: Produce the comprehensive crisis response
  including: the coordinated multi-agency investigation
  response strategy (document production, internal
  investigation scope, privilege management); the global
  recall management plan (scope determination, multi-
  country regulatory notifications, patient/provider
  communication, evidence preservation); and the board
  presentation for hostile acquisition defense (quality
  remediation plan, management credibility, standalone
  value proposition). Address the fundamental
  documentation culture failure that enabled all three
  crises and propose the transformation that prevents
  recurrence.

assertions:
  - type: llm_judge
    criteria: "Response produces a coordinated crisis response — addresses all three crises with strategic coherence (investigation response, patient safety, shareholder defense); recognizes the interconnections and tensions between crises (privilege issues between recall investigation and DOJ); correctly prioritizes patient safety above legal defense and acquisition defense; the multi-agency response strategy is legally sophisticated (litigation holds, privilege management, parallel investigations); the recall plan follows FDA procedures while preserving evidence."
    weight: 0.35
    description: "CoordinatedCrisisResponse"
  - type: llm_judge
    criteria: "Response addresses the global recall and patient safety — the recall scope determination methodology is rigorous (batch review, risk assessment, expansion criteria); multi-country regulatory notification plan addresses FDA, EMA, PMDA, TGA, Health Canada and 45+ markets; patient and provider communication is transparent and compassionate; the recall documentation package meets regulatory expectations across jurisdictions; the response demonstrates that patient safety is the absolute priority."
    weight: 0.35
    description: "GlobalRecallAndPatientSafety"
  - type: llm_judge
    criteria: "Response addresses the systemic documentation failure and acquisition defense — identifies the root cause culture failure that enabled SOP non-compliance, data integrity violations, and management blindness; proposes a credible quality transformation plan that serves triple duty (regulatory remediation, patient safety restoration, shareholder value defense); the board presentation demonstrates that current management can execute the turnaround; the response shows the strategic sophistication expected of a C-suite executive managing through a potentially existential crisis."
    weight: 0.30
    description: "SystemicFailureAndDefense"
