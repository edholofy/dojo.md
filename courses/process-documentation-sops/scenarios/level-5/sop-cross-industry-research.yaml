meta:
  id: sop-cross-industry-research
  level: 5
  course: process-documentation-sops
  type: output
  description: "Write the definitive 'State of Process Documentation 2026' research report based on a global survey of 2,800 organizations across 15 industries"
  tags: [research, cross-industry, survey, benchmarking, master]

state: {}

trigger: |
  You're the Director of Research at the American
  Society for Quality (ASQ). You've completed the
  largest-ever global survey of process documentation
  practices — 2,800 responses from quality directors,
  operations leaders, and compliance officers across 15
  industries and 35 countries. You need to produce the
  "State of Process Documentation 2026" report.

  Survey data highlights:

  Documentation maturity metrics:
  - Formal document control system: 58% (up from 42% in
    2020)
  - SOPs reviewed within past 2 years: 45%
  - Electronic document management: 62% (vs 38% still
    using paper/file shares)
  - Process documentation owner assigned: 34%
  - Documentation integrated with training: 28%

  SOP quality and compliance:
  - Estimated SOP compliance rate: 34% average (self-
    reported; actual observed rates likely lower)
  - SOPs that accurately reflect current practice: 41%
  - Organizations that have measured SOP compliance: 22%
  - SOPs with competency verification beyond "read and
    sign": 18%
  - "Our SOPs are useful for training new employees": 52%
    agree
  - "Our SOPs are used as daily reference by experienced
    staff": 14% agree

  Technology adoption:
  - Any AI use in process documentation: 15% (up from 3%
    in 2022)
  - AI for SOP generation: 8%
  - AI for compliance monitoring: 6%
  - AI for procedure optimization: 4%
  - Process mining deployed: 11%
  - Digital work instructions (visual/interactive): 19%

  Top process documentation challenges (ranked):
  1. Keeping SOPs current (78%)
  2. Getting employees to follow SOPs (72%)
  3. Measuring SOP effectiveness (68%)
  4. Managing document volume (65%)
  5. Cross-department standardization (62%)
  6. Regulatory compliance documentation (58%)
  7. Multi-language/multi-site management (52%)
  8. Training tied to documentation (48%)
  9. Version control and change management (45%)
  10. Knowledge retention (42%)

  Industry benchmarking (maturity score 1-5):
  - Nuclear: 4.2 (highest)
  - Aerospace: 3.8
  - Pharmaceutical: 3.6
  - Automotive: 3.4
  - Medical devices: 3.2
  - Financial services: 2.8
  - Food & beverage: 2.6
  - Chemical: 2.5
  - Healthcare delivery: 2.3
  - Technology/software: 2.1
  - Professional services: 1.8
  - Retail: 1.6
  - Construction: 1.4
  - Hospitality: 1.2

  Regional differences:
  - Europe: Highest regulatory compliance focus (GDPR,
    MDR, REACH driving documentation rigor)
  - North America: Most likely to use electronic systems,
    highest AI adoption
  - Asia-Pacific: Fastest improvement rate (maturity up
    40% in 3 years)
  - Middle East/Africa: Lowest baseline but rapidly
    investing in formalization

  Task: Write the full research report including
  executive summary, key findings by theme, industry
  and regional benchmarking, analysis of what
  distinguishes high-maturity organizations, the AI
  adoption trajectory, and practitioner recommendations.
  This should become the definitive annual reference for
  process documentation professionals.

assertions:
  - type: llm_judge
    criteria: "Response creates a professional research report — includes executive summary with top findings; organizes findings thematically (maturity, quality/compliance, technology, challenges); presents data with appropriate statistical context; describes visualizations that would communicate findings effectively; the report structure and depth would be appropriate for a major ASQ or APQC-caliber industry report; provides actionable benchmarks for quality professionals."
    weight: 0.35
    description: "ProfessionalResearchReport"
  - type: llm_judge
    criteria: "Response identifies what distinguishes high-maturity organizations — analyzes what differentiates nuclear and aerospace (4.0+ maturity) from retail and hospitality (sub-2.0); creates useful benchmarks by industry, size, and region; addresses the gap between having SOPs and getting value from them (58% have document control but only 34% compliance); identifies the 'documentation compliance paradox' (more SOPs doesn't mean better outcomes); prescriptive insights help quality directors improve their programs."
    weight: 0.35
    description: "MaturityAnalysis"
  - type: llm_judge
    criteria: "Response identifies emerging trends and future directions — analyzes the AI adoption trajectory in process documentation; addresses why 86% of experienced staff don't use SOPs as daily reference; covers the shift from static documents to dynamic knowledge systems; proposes a maturity model for the profession; a quality director reading this would understand where process documentation is heading and how to position their organization."
    weight: 0.30
    description: "TrendsAndFuture"
