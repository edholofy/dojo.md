meta:
  id: inventory-receiving-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write an inventory receiving SOP for a small e-commerce warehouse covering inspection, counting, labeling, and putaway procedures"
  tags: [warehouse, inventory, receiving, beginner]

state: {}

trigger: |
  You're the Warehouse Supervisor at a 25-person
  e-commerce company that sells pet supplies. The warehouse
  receives 15-25 shipments per week from 8 different
  suppliers. Inventory discrepancies have been a growing
  problem — last month, you had $4,200 in unaccounted
  inventory variances. The Operations Manager wants a
  formal receiving SOP.

  Current problems:
  - No standard inspection process — some workers check
    every item, others just count boxes
  - Damaged goods sometimes get put on shelves and shipped
    to customers (3 returns last month for damaged items)
  - Supplier packing slips don't always match PO quantities
    — discrepancies aren't documented consistently
  - Items sometimes go to wrong shelf locations
  - Temperature-sensitive items (pet supplements, treats)
    aren't always moved to climate-controlled area promptly
  - No photos taken of damaged shipments, making supplier
    claims difficult

  Warehouse layout:
  - Receiving dock (2 bays)
  - Inspection/staging area
  - Main shelving (Zones A-D, aisles 1-20)
  - Climate-controlled room (Zone E)
  - Oversized item area (Zone F)
  - Damaged/return holding area

  Systems:
  - ShipStation for order management
  - SkuVault for inventory management
  - Supplier portal for PO management

  Staff: 3 receiving team members (varying experience
  levels — one is brand new)

  Task: Write a complete receiving SOP covering dock
  scheduling, shipment inspection, quantity verification,
  damage documentation, labeling, putaway procedures, and
  discrepancy reporting. Include handling for temperature-
  sensitive items and damaged goods.

assertions:
  - type: llm_judge
    criteria: "Response produces a clear, step-by-step receiving SOP — includes numbered procedures from truck arrival through putaway completion; uses action verbs (inspect, count, verify, photograph, label, shelve); addresses each identified problem (inspection inconsistency, damage getting shelved, quantity discrepancies, wrong locations, temperature-sensitive delays); includes decision points (what to do when quantities don't match, what to do with damaged items)."
    weight: 0.35
    description: "ClearStepByStepSOP"
  - type: llm_judge
    criteria: "Response includes practical documentation requirements — specifies when and how to document discrepancies (quantities, photos of damage); includes forms or checklists for receiving inspectors; addresses the climate-controlled item protocol with time requirements; provides clear criteria for accepting vs rejecting shipments; defines when to escalate to supervisor; the documentation approach would support supplier damage claims."
    weight: 0.35
    description: "PracticalDocumentation"
  - type: llm_judge
    criteria: "Response is appropriate for the audience — written for warehouse workers with varying experience levels (clear enough for a new hire); uses simple language and avoids jargon; includes zone references matching the warehouse layout; references the actual systems in use (SkuVault, ShipStation); could be laminated and posted at the receiving dock; the SOP would measurably reduce the $4,200 monthly inventory variance."
    weight: 0.30
    description: "AudienceAppropriate"
