meta:
  id: quality-inspection-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a quality inspection SOP for a small custom furniture manufacturer covering incoming materials, in-process checks, and final inspection"
  tags: [quality, manufacturing, inspection, beginner]

state: {}

trigger: |
  You're the Production Supervisor at a 35-person custom
  furniture manufacturer. Customer complaints about
  quality have increased 40% this year — issues include
  mismatched stains, loose joints, hardware misalignment,
  and incorrect dimensions. The owner wants a formal
  quality inspection SOP to catch defects before shipping.

  Production workflow:
  1. Materials receiving (lumber, hardware, finishes)
  2. Cutting and milling
  3. Assembly (joinery, hardware installation)
  4. Sanding and surface preparation
  5. Finishing (staining, painting, lacquer)
  6. Final assembly and hardware
  7. Packaging and shipping

  Current quality approach:
  - Each craftsperson "checks their own work"
  - No formal inspection points
  - No defined acceptance criteria (what counts as
    "acceptable" varies by person)
  - Customer orders include detailed specs but these
    aren't always referenced during production
  - No defect tracking or categorization
  - Rework costs: estimated $3,500/month (15% of defects
    caught after shipping become warranty claims)

  Common defect categories:
  - Dimensional: pieces cut to wrong dimensions (±1/16")
  - Finish: uneven stain, drips, orange peel, color
    mismatch
  - Assembly: loose joints, gaps, hardware misaligned
  - Materials: knots, cracks, warping in lumber not
    caught during receiving
  - Specification: wrong hardware, wrong finish, wrong
    dimensions vs customer order

  Task: Write a quality inspection SOP with inspection
  points at receiving, in-process (at least 2 checkpoints),
  and final inspection before shipping. Include specific
  acceptance criteria for each defect category, inspection
  checklists, defect documentation procedures, and
  rework/disposition decisions.

assertions:
  - type: llm_judge
    criteria: "Response produces a multi-stage quality inspection SOP — includes inspection at receiving (lumber/materials), at least 2 in-process checkpoints (post-cutting, post-assembly, and/or post-finishing), and final inspection before shipping; each inspection point has specific acceptance criteria; uses measurable standards where possible (tolerances, visual standards); assigns responsible inspectors; the SOP creates quality gates that prevent defects from progressing downstream."
    weight: 0.35
    description: "MultiStageInspectionSOP"
  - type: llm_judge
    criteria: "Response includes practical inspection tools — provides checklists for each inspection point; defines acceptance/rejection criteria for each defect category (dimensional tolerances, finish quality standards, assembly strength tests); includes a defect documentation form; addresses disposition decisions (rework, scrap, accept with deviation); includes order specification verification against customer specs; could be used by craftspeople without quality engineering background."
    weight: 0.35
    description: "PracticalInspectionTools"
  - type: llm_judge
    criteria: "Response addresses root cause reduction — includes defect tracking/categorization that enables pattern identification; addresses the 'checking your own work' problem (independent verification at key points); connects receiving inspection to downstream quality (rejecting bad lumber before it becomes furniture); the SOP would measurably reduce the 40% increase in complaints and $3,500/month rework costs."
    weight: 0.30
    description: "RootCauseReduction"
