meta:
  id: social-media-posting-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a social media content publishing SOP for a small B2B software company covering content creation, approval, scheduling, and crisis response"
  tags: [social-media, marketing, content, beginner]

state: {}

trigger: |
  You're the Marketing Coordinator at a 30-person B2B
  SaaS company that sells project management software.
  After a junior team member accidentally posted an
  unfinished draft to the company LinkedIn page (getting
  15K impressions before it was caught), and another
  incident where a customer complaint on Twitter went
  unanswered for 4 days, the VP of Marketing has asked
  you to create a formal social media SOP.

  Current social media presence:
  - LinkedIn (company page, 8,500 followers) — primary
  - Twitter/X (3,200 followers) — secondary
  - YouTube (1,100 subscribers) — product demos, webinars
  - Instagram (800 followers) — culture/recruiting

  Content types:
  - Product updates and feature announcements
  - Blog post promotion
  - Industry thought leadership
  - Customer case studies
  - Employee spotlights and culture posts
  - Event promotion (webinars, conferences)
  - Curated industry news sharing

  Team roles:
  - Marketing Coordinator (you): content creation, scheduling
  - Content Writer: blog posts, long-form content
  - Graphic Designer: visual assets
  - VP of Marketing: final approval authority
  - CEO: approval required for product announcements and
    any PR-sensitive content

  Tools:
  - Buffer for scheduling
  - Canva for graphics
  - Google Docs for content drafts

  Task: Write a social media SOP covering content creation
  workflow, approval chain by content type, scheduling
  procedures, response protocols for comments and DMs
  (including negative feedback and crisis scenarios),
  brand voice guidelines, and the posting cadence for
  each platform.

assertions:
  - type: llm_judge
    criteria: "Response produces a structured social media SOP — includes content creation workflow from ideation through publishing; defines approval chain by content type (who approves what, and when CEO approval is needed); specifies posting cadence by platform; includes brand voice guidelines relevant to B2B SaaS; addresses the scheduling tool workflow (Buffer); the SOP would prevent the accidental draft posting incident."
    weight: 0.35
    description: "StructuredSocialMediaSOP"
  - type: llm_judge
    criteria: "Response includes response and crisis protocols — defines response time SLAs for comments and DMs by platform; provides guidance for handling negative feedback, customer complaints, and trolls; includes escalation criteria; addresses crisis scenarios (product outage, data breach, PR incident); defines who can respond to what; the SOP would prevent the 4-day unanswered complaint scenario."
    weight: 0.35
    description: "ResponseAndCrisisProtocols"
  - type: llm_judge
    criteria: "Response is practical for a small team — the workflow doesn't create unnecessary bureaucracy for a 30-person company; includes templates or examples for common post types; addresses content calendar planning; references the actual tools (Buffer, Canva, Google Docs); could be followed by a new marketing hire on their first day; balances quality control with agility."
    weight: 0.30
    description: "PracticalForSmallTeam"
