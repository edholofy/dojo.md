meta:
  id: equipment-maintenance-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a preventive maintenance SOP for commercial kitchen equipment at a multi-location restaurant group"
  tags: [maintenance, restaurant, equipment, beginner]

state: {}

trigger: |
  You're the Facilities Manager for a restaurant group
  that operates 4 locations. Equipment breakdowns have
  been costly — last quarter, you had 3 major equipment
  failures (walk-in cooler, commercial dishwasher, hood
  ventilation) that cost $18,000 in emergency repairs and
  resulted in 2 partial-day closures. The COO wants a
  preventive maintenance SOP to reduce breakdowns.

  Equipment requiring maintenance across locations:
  - Walk-in coolers and freezers (2 per location)
  - Commercial ovens (3-4 per location)
  - Fryers (2-3 per location)
  - Dishwashers (1 per location)
  - Hood ventilation systems (1 per location)
  - Ice machines (1-2 per location)
  - Refrigerated prep tables (2-3 per location)
  - HVAC systems (1-2 per location)

  Current maintenance approach:
  - Reactive only — fix things when they break
  - No maintenance schedule or checklists
  - Kitchen managers sometimes clean filters "when they
    remember"
  - Health inspections have cited temperature logging gaps
  - No vendor service contracts for any equipment
  - No maintenance records — when a tech comes, nobody
    records what was done

  Staff involved:
  - Kitchen Manager at each location: daily checks
  - Line cooks: basic cleaning maintenance
  - You (Facilities Manager): coordinate vendors, major
    issues
  - External vendors: HVAC, refrigeration, hood cleaning

  Task: Write a preventive maintenance SOP that includes
  daily, weekly, monthly, and quarterly maintenance tasks
  for each equipment category. Include inspection
  checklists, temperature logging requirements, vendor
  service scheduling, maintenance record-keeping, and
  escalation procedures for issues found during
  inspections.

assertions:
  - type: llm_judge
    criteria: "Response produces a comprehensive maintenance SOP — organizes tasks by frequency (daily, weekly, monthly, quarterly); covers all equipment categories listed; assigns responsible parties (kitchen staff vs manager vs vendor); includes specific maintenance actions (not just 'check equipment' but 'clean condenser coils,' 'inspect door gaskets,' 'test thermostat calibration'); addresses health code compliance (temperature logging); the SOP would prevent the types of failures described."
    weight: 0.35
    description: "ComprehensiveMaintenanceSOP"
  - type: llm_judge
    criteria: "Response includes practical checklists and record-keeping — provides printable daily/weekly checklists for kitchen staff; includes temperature log templates; defines how to record vendor service visits; includes escalation criteria (when to call a vendor vs handle in-house); addresses vendor service contract recommendations; the record-keeping approach would support health inspection compliance."
    weight: 0.35
    description: "ChecklistsAndRecordKeeping"
  - type: llm_judge
    criteria: "Response is appropriate for restaurant operations — written for kitchen staff who are busy during service; daily tasks are quick and achievable during opening/closing routines; doesn't require technical expertise beyond basic kitchen operations; addresses multi-location consistency; the SOP balances thoroughness with practical time constraints; could be posted near equipment stations."
    weight: 0.30
    description: "RestaurantAppropriate"
