meta:
  id: first-sop-shift
  level: 1
  course: process-documentation-sops
  type: output
  description: "Shift simulation — handle three simultaneous SOP-related challenges as an Operations Coordinator at a growing startup"
  tags: [shift-simulation, multi-challenge, operations, beginner]

state: {}

trigger: |
  You're the Operations Coordinator at a 60-person SaaS
  startup that's growing fast. It's Thursday afternoon
  and three things have landed on your desk simultaneously.

  SITUATION 1 — URGENT SOP NEEDED (2:00 PM):
  A customer service agent accidentally deleted a
  customer's entire account data while trying to process
  a cancellation. The VP of Customer Success is furious
  and demands "an SOP for account cancellation by end of
  day so this never happens again." The current process
  is tribal knowledge — agents just "know" what to do
  (except clearly they don't). There are 3 types of
  cancellations: immediate, end-of-billing-cycle, and
  downgrade-instead-of-cancel. Each has different data
  retention implications.

  SITUATION 2 — EXISTING SOP CONFUSION (2:30 PM):
  Two team leads from different shifts are arguing about
  the correct procedure for processing refunds. The
  existing SOP (written 8 months ago) says "contact the
  billing team for refunds over $500" but the billing
  team was reorganized 4 months ago and that team no
  longer exists. One lead has been emailing the CFO
  directly, the other has been approving refunds up to
  $2,000 on their own authority. The CFO has noticed
  and wants this resolved immediately.

  SITUATION 3 — NEW TOOL ROLLOUT (3:00 PM):
  The company is switching from Zendesk to Intercom next
  Monday. The IT team has handled the technical migration,
  but nobody has updated any of the 12 customer service
  SOPs that reference Zendesk-specific procedures (ticket
  tagging, macros, escalation workflows). Agents are
  asking "will our processes change?" and nobody has
  answered them.

  Task: Address all three situations: write the account
  cancellation SOP, update the refund SOP with the correct
  approval chain, and create a plan for updating the 12
  SOPs affected by the Zendesk-to-Intercom migration
  (you don't need to rewrite all 12, but provide the
  migration plan and update one as an example).

assertions:
  - type: llm_judge
    criteria: "Response addresses all three situations — writes a usable account cancellation SOP covering the three cancellation types with data retention safeguards; resolves the refund SOP confusion by establishing a clear approval chain; creates a practical plan for the Zendesk-to-Intercom SOP migration; each response is proportionate to urgency (cancellation SOP is most urgent, migration plan can be phased); demonstrates ability to triage and prioritize."
    weight: 0.35
    description: "AllThreeSituationsAddressed"
  - type: llm_judge
    criteria: "Response produces quality SOPs under time pressure — the cancellation SOP is complete enough to prevent the data deletion incident from recurring; the refund approval chain is clear and eliminates the current ambiguity; the migration plan identifies what changes in each SOP and prioritizes by frequency of use; the SOPs balance thoroughness with the reality of same-day or short-timeline delivery."
    weight: 0.35
    description: "QualityUnderPressure"
  - type: llm_judge
    criteria: "Response shows operational maturity — addresses root causes (why didn't the cancellation SOP exist before? why wasn't the refund SOP updated when billing was reorganized?); proposes ongoing SOP maintenance practices; communicates appropriately with stakeholders (VP, CFO, team leads, agents); the response would build credibility as an Operations Coordinator managing a fast-growing startup."
    weight: 0.30
    description: "OperationalMaturity"
