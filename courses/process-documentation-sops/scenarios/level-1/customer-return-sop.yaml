meta:
  id: customer-return-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a customer returns processing SOP for a mid-size online retailer covering return authorization, inspection, refund, and restocking"
  tags: [returns, customer-service, retail, beginner]

state: {}

trigger: |
  You're the Customer Service Lead at a mid-size online
  clothing retailer (50 employees, $12M annual revenue).
  Returns are 18% of orders — about 200 returns per week.
  The return process is chaotic: some customers get
  instant refunds while others wait 3 weeks, restocking
  decisions are inconsistent, and the team handles
  identical situations differently.

  Current return policy:
  - 30-day return window from delivery date
  - Items must be unworn with tags attached
  - Final sale items are non-returnable
  - Free return shipping on orders over $75
  - Exchanges available for size/color

  Current problems:
  - No standard for evaluating returned item condition
    (one agent accepts visibly worn items, another rejects
    items with slightly wrinkled tags)
  - Refund timing varies from same-day to 21 days
  - No tracking of return reasons (missing data for
    product improvement)
  - Warehouse team sometimes restocks items that should
    be disposed of
  - Customer communication is inconsistent (some get
    updates, others don't)
  - Gift returns and exchanges have no documented process

  Systems:
  - Shopify for orders
  - Gorgias for customer service tickets
  - ShipBob for fulfillment/warehouse
  - Returnly for return labels

  Task: Write a returns processing SOP that standardizes
  every step from return request through refund/exchange
  completion. Include condition assessment criteria,
  refund timing standards, restocking vs disposal
  decisions, customer communication templates, and
  tracking return reason codes.

assertions:
  - type: llm_judge
    criteria: "Response produces a complete returns SOP — covers the full lifecycle from return request through refund completion; includes clear condition assessment criteria (what qualifies as 'like new' vs 'worn' vs 'damaged'); standardizes refund timing with specific SLAs; defines restocking vs disposal criteria; addresses gift returns and exchanges; includes return reason code categories for tracking; the SOP would eliminate the inconsistencies described."
    weight: 0.35
    description: "CompleteReturnsSOP"
  - type: llm_judge
    criteria: "Response includes customer-facing elements — provides communication templates or scripts for key touchpoints (return approved, item received, refund processed, exchange shipped); defines escalation criteria (when to involve a manager); addresses edge cases (items past 30 days, items without tags but clearly unworn, partial returns); the customer experience would be consistent regardless of which agent handles the return."
    weight: 0.35
    description: "CustomerFacingElements"
  - type: llm_judge
    criteria: "Response is operationally practical — references the actual systems (Shopify, Gorgias, ShipBob, Returnly); includes decision trees or flowcharts for common scenarios; could be used to train a new customer service agent; addresses the data tracking gap (return reasons) that helps product improvement; the SOP balances customer satisfaction with business protection (preventing abuse)."
    weight: 0.30
    description: "OperationallyPractical"
