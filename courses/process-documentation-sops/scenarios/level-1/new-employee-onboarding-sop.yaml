meta:
  id: new-employee-onboarding-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a new employee onboarding SOP for a 40-person marketing agency covering first-day through first-month procedures"
  tags: [onboarding, hr, first-sop, beginner]

state: {}

trigger: |
  You're the Office Manager at a 40-person digital
  marketing agency. Onboarding has been inconsistent —
  the last three hires had completely different first-day
  experiences. One didn't get a laptop for 3 days, another
  wasn't introduced to their team, and a third had no
  access to any tools for a week. The CEO has asked you
  to write the agency's first formal onboarding SOP.

  Current onboarding (informal):
  - HR sends offer letter and basic paperwork via email
  - IT "usually" sets up a laptop (no standard timeline)
  - Manager is supposed to plan first week but rarely does
  - Tool access (Slack, Asana, Google Workspace, Figma,
    HubSpot) is requested ad hoc
  - No standard training schedule
  - No check-in cadence defined
  - Badge access handled by facilities when they "get
    around to it"

  Tools and systems to provision:
  - Laptop (Mac or PC based on role)
  - Google Workspace account
  - Slack (add to team channels)
  - Asana (add to relevant projects)
  - HubSpot (for client-facing roles)
  - Figma (for design roles)
  - 1Password (company vault access)
  - Building badge and parking pass

  Roles involved in onboarding:
  - Office Manager (you): coordination
  - HR Coordinator: paperwork, benefits enrollment
  - IT Administrator: equipment and access
  - Direct Manager: role-specific training
  - Assigned Buddy: cultural integration

  Task: Write a complete onboarding SOP that covers
  pre-arrival preparation (before Day 1), Day 1 agenda,
  Week 1 activities, and 30-day milestones. Include
  responsible parties for each step, timing requirements,
  and checklists that can be printed and tracked.

assertions:
  - type: llm_judge
    criteria: "Response produces a well-structured SOP — includes clear sections (purpose, scope, responsibilities, procedures); uses numbered steps with action verbs; assigns responsible parties to each step; includes timing requirements (when each step must be completed); provides printable checklists; covers all four phases (pre-arrival, Day 1, Week 1, 30-day); the SOP is detailed enough that any Office Manager could follow it without additional context."
    weight: 0.35
    description: "WellStructuredSOP"
  - type: llm_judge
    criteria: "Response addresses all the gaps identified — solves the laptop delay problem (pre-arrival IT provisioning with deadlines); ensures consistent introductions; creates standard tool access provisioning; includes training schedule framework; defines check-in cadence; addresses badge and parking setup timing; the SOP would prevent the specific problems described (no laptop for 3 days, no team intro, no tool access for a week)."
    weight: 0.35
    description: "GapsAddressed"
  - type: llm_judge
    criteria: "Response is practical and usable — written in clear, concise language appropriate for a 40-person agency (not overly corporate); includes checklists that could actually be printed and used; distinguishes role-specific variations (design vs client-facing vs other); the buddy system is defined with specific expectations; the SOP could be implemented immediately without significant additional work."
    weight: 0.30
    description: "PracticalAndUsable"
