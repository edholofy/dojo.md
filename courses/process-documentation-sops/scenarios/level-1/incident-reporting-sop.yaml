meta:
  id: incident-reporting-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write an incident reporting SOP for a property management company covering tenant emergencies, maintenance issues, and safety incidents"
  tags: [incident-reporting, property-management, safety, beginner]

state: {}

trigger: |
  You're the Operations Manager at a property management
  company that manages 12 apartment complexes (1,800
  units total) with a team of 25 maintenance staff, 8
  leasing agents, and 4 property managers. Incident
  handling is inconsistent — last month, a water main
  break at one property wasn't escalated for 6 hours
  because the on-call tech thought the property manager
  would handle it, and the property manager thought the
  tech had already called a plumber. Another incident: a
  tenant slip-and-fall wasn't documented, and now there's
  a liability claim with no incident report.

  Types of incidents to cover:
  - Emergency maintenance (water leaks, gas smells, no
    heat in winter, no A/C in summer, electrical hazards)
  - Non-emergency maintenance requests
  - Safety incidents (injuries, falls, fires, carbon
    monoxide alarms)
  - Security incidents (break-ins, vandalism, trespassing)
  - Property damage (storm damage, vehicle impact, fire)
  - Tenant complaints and disputes

  Current tools:
  - AppFolio for property management and work orders
  - Shared Google Drive for documents
  - Personal cell phones for emergency calls
  - No formal incident reporting system

  On-call structure:
  - 24/7 emergency maintenance line staffed by rotating
    maintenance techs
  - Property managers available by phone during business
    hours
  - You (Operations Manager) are escalation point

  Task: Write an incident reporting SOP that defines
  incident categories and severity levels, initial
  response procedures for each category, escalation
  criteria and timelines, documentation requirements
  (including what to document for liability protection),
  follow-up procedures, and communication templates for
  tenants. Include the on-call decision tree for after-
  hours emergencies.

assertions:
  - type: llm_judge
    criteria: "Response produces a clear incident reporting SOP — defines incident categories with severity levels (emergency, urgent, routine); provides initial response procedures for each category; includes clear escalation criteria and timelines (who to call, when, for what); defines documentation requirements that protect against liability; addresses both during-hours and after-hours procedures; the SOP would prevent the water main break communication failure."
    weight: 0.35
    description: "ClearIncidentReportingSOP"
  - type: llm_judge
    criteria: "Response includes decision trees and documentation — provides an after-hours decision tree for on-call techs; includes incident report templates or forms with required fields; specifies what to photograph/document at scenes (especially for injury and property damage); defines follow-up communication requirements with tenants; addresses the liability documentation gap that led to the slip-and-fall claim issue."
    weight: 0.35
    description: "DecisionTreesAndDocumentation"
  - type: llm_judge
    criteria: "Response is practical for property management — references AppFolio for work order integration; addresses the multi-property scale (12 complexes, 1,800 units); includes tenant communication templates; could be used by maintenance techs with varying experience levels; the on-call decision tree is clear enough to follow at 2 AM; addresses common property management emergencies realistically."
    weight: 0.30
    description: "PracticalForPropertyManagement"
