meta:
  id: client-intake-sop
  level: 1
  course: process-documentation-sops
  type: output
  description: "Write a client intake and project kickoff SOP for a small web design agency covering inquiry through signed contract"
  tags: [client-intake, agency, sales-process, beginner]

state: {}

trigger: |
  You're the Account Manager at a 15-person web design
  agency. The agency has grown from 5 to 15 people in
  18 months, and the informal client intake process is
  breaking down. Recent problems: a project started
  without a signed contract (the client later disputed
  the scope), two discovery calls were scheduled with
  no preparation (the founder had to wing it), and a
  hot lead went cold because nobody followed up for
  9 days.

  Current client journey (informal):
  1. Inquiry comes in via website form, email, or referral
  2. Someone (varies) responds and schedules a discovery
     call
  3. Founder conducts discovery call
  4. Project scope and proposal created (no standard
     format)
  5. Proposal sent and followed up on (inconsistently)
  6. Contract signed (hopefully before work starts)
  7. Kickoff meeting (sometimes happens, sometimes not)

  Team roles in the intake process:
  - Account Manager (you): lead management, proposals
  - Founder/Creative Director: discovery calls, final
    pricing decisions
  - Project Manager: kickoff and project planning
  - Admin Assistant: scheduling, contract administration

  Tools:
  - HubSpot CRM (recently implemented, barely used)
  - Google Docs for proposals
  - DocuSign for contracts
  - Calendly for scheduling
  - Slack for internal communication

  Average deal: $15,000-45,000 project value
  Monthly inquiries: 20-30
  Close rate: ~25% (could be better with consistent
  follow-up)

  Task: Write a client intake SOP covering lead capture
  and initial response, discovery call preparation,
  proposal creation and delivery, follow-up cadence,
  contract execution, and project kickoff handoff. Include
  timing standards, templates needed, and CRM usage
  requirements at each stage.

assertions:
  - type: llm_judge
    criteria: "Response produces a structured intake SOP — covers each stage from inquiry through kickoff handoff; defines timing standards (e.g., respond within X hours, send proposal within X days); assigns responsibility at each step; includes CRM (HubSpot) usage requirements; defines what information to collect at each stage; the SOP would prevent all three described problems (no contract, unprepared calls, lost leads)."
    weight: 0.35
    description: "StructuredIntakeSOP"
  - type: llm_judge
    criteria: "Response includes templates and checklists — provides or describes templates needed (discovery call questionnaire, proposal template outline, follow-up email templates, kickoff agenda); includes a lead qualification checklist; defines proposal pricing structure or guidelines; includes handoff checklist from sales to project management; references actual tools (HubSpot, Calendly, DocuSign)."
    weight: 0.35
    description: "TemplatesAndChecklists"
  - type: llm_judge
    criteria: "Response is practical for a growing agency — the process isn't over-engineered for a 15-person team; acknowledges the founder's role while building process around them; improves close rate through consistent follow-up; the SOP scales as the team continues to grow; could be implemented within a week with minimal disruption."
    weight: 0.30
    description: "PracticalForGrowingAgency"
