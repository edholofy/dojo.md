meta:
  id: sop-automation-ai
  level: 3
  course: process-documentation-sops
  type: output
  description: "Design an AI-assisted SOP creation, maintenance, and execution platform for a large organization transitioning from static documents to dynamic, intelligent procedures"
  tags: [ai, automation, sop-platform, innovation, advanced]

state: {}

trigger: |
  You're the Director of Operational Excellence at a
  2,000-person logistics company ($500M revenue) with
  1,800 SOPs across warehousing, transportation, customer
  service, and corporate functions. The CEO has challenged
  you to "bring SOPs into the 21st century" after learning
  that most SOPs are PDF documents that nobody reads,
  45% are outdated, and there's no way to know if
  employees are actually following them.

  Current SOP pain points:
  - SOPs are static PDFs stored in SharePoint (average
    document: 12 pages, 65% of content is boilerplate)
  - Nobody reads them cover-to-cover (employees skim or
    skip entirely)
  - Updates require a 6-step approval process that takes
    4-6 weeks (so updates are delayed or skipped)
  - No connection between SOPs and actual work systems
    (ERP, WMS, TMS)
  - Training on SOP changes is "email blast + hope"
  - No analytics on SOP usage, compliance, or effectiveness
  - New employees are overwhelmed with 50+ SOPs to read
    in first week
  - Process variations between shifts/locations are
    invisible
  - Subject matter experts spend 200+ hours/year writing
    and updating SOPs

  CEO's vision:
  - SOPs that are "alive" — dynamic, contextual, and
    embedded in work systems
  - AI-assisted SOP creation from process observation
  - Real-time SOP compliance monitoring
  - Personalized SOP delivery (show the right procedure
    to the right person at the right time)
  - Automated SOP updates when systems or regulations
    change
  - Analytics dashboard showing SOP health across the
    organization
  - Budget: $2M for initial platform, $500K/year
    ongoing

  Task: Design the AI-powered SOP platform including
  the architecture (how SOPs become dynamic and
  contextual), the AI capabilities for SOP creation and
  maintenance, the integration approach with work systems
  (WMS, TMS, ERP), the compliance monitoring methodology,
  the analytics framework, and the implementation roadmap.
  Include how AI handles regulatory SOPs (where accuracy
  is critical) versus operational SOPs (where efficiency
  matters more). Address the change management challenge
  of moving from documents to a platform.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling AI-powered SOP platform — describes the architecture for dynamic, contextual SOPs (embedded in workflow vs standalone documents); defines AI capabilities for SOP creation (process mining, natural language generation), maintenance (regulatory change detection, automated updates), and delivery (contextual, role-based, just-in-time); the platform integrates with work systems (WMS, TMS, ERP); the design is technically feasible and addresses the specific pain points."
    weight: 0.35
    description: "CompellingAIPlatform"
  - type: llm_judge
    criteria: "Response addresses compliance and trust — distinguishes between regulatory SOPs (where AI assists but human approval is required) and operational SOPs (where AI can auto-update with oversight); includes compliance monitoring methodology that measures actual adherence; addresses analytics framework (SOP usage, compliance rates, time savings, error reduction); addresses the trust question (how do you know AI-generated or AI-updated SOPs are correct?); the platform handles the 1,800 existing SOP migration."
    weight: 0.35
    description: "ComplianceAndTrust"
  - type: llm_judge
    criteria: "Response includes a realistic implementation roadmap — proposes phased implementation within the $2M budget; addresses change management for 2,000 employees; includes quick wins (immediate value) and long-term transformation; addresses the SOP approval process streamlining; proposes metrics for measuring platform ROI; the roadmap is achievable for a logistics company; a CEO would be convinced this is worth the investment."
    weight: 0.30
    description: "RealisticRoadmap"
