meta:
  id: multi-site-manufacturing-sops
  level: 3
  course: process-documentation-sops
  type: output
  description: "Harmonize manufacturing SOPs across 4 global production sites for an automotive parts supplier achieving IATF 16949 multi-site certification"
  tags: [manufacturing, multi-site, iatf-16949, harmonization, advanced]

state: {}

trigger: |
  You're the Global Quality Director at an automotive
  parts supplier ($650M revenue, 2,200 employees)
  operating 4 manufacturing sites: Detroit (USA),
  Monterrey (Mexico), Stuttgart (Germany), and Shanghai
  (China). Your largest customer (a major OEM, 35% of
  revenue) requires IATF 16949 multi-site certification
  within 18 months. Currently, each site has independent
  quality systems with different documentation, different
  processes, and different quality performance levels.

  Current state by site:
  Detroit (HQ, 600 employees):
  - ISO 9001 certified (not IATF 16949)
  - 320 SOPs in English, stored in Confluence
  - Quality performance: 150 PPM, 92% on-time delivery

  Monterrey (450 employees):
  - ISO 9001 certified
  - 280 SOPs in Spanish, stored in paper binders
  - Quality performance: 350 PPM, 85% on-time delivery

  Stuttgart (500 employees):
  - IATF 16949 certified independently
  - 410 SOPs in German, stored in IMS (Integrated
    Management System) software
  - Quality performance: 45 PPM, 97% on-time delivery

  Shanghai (650 employees):
  - ISO 9001 certified
  - 250 SOPs in Mandarin, stored in local server
  - Quality performance: 280 PPM, 88% on-time delivery

  Multi-site IATF 16949 challenges:
  - Single quality manual needed covering all sites
  - Core processes must be standardized, local procedures
    can vary
  - Documentation must address customer-specific
    requirements (CSRs) for each OEM
  - APQP, PPAP, FMEA, MSA, and SPC procedures must be
    consistent
  - Internal audit program must cover all sites
  - Management review must consolidate all site data
  - Language: SOPs needed in English (master) plus local
    languages

  Task: Create the multi-site SOP harmonization plan
  including the documentation architecture (what's
  global vs site-specific), the core process SOPs
  (quality planning, production control, nonconformance
  management), the translation and localization strategy,
  the gap analysis methodology comparing each site to
  IATF 16949 requirements, and the implementation
  timeline to achieve multi-site certification within
  18 months.

assertions:
  - type: llm_judge
    criteria: "Response creates a viable multi-site documentation architecture — clearly defines what must be global (quality manual, core processes, APQP/PPAP/FMEA/MSA/SPC procedures) vs what can be site-specific (work instructions, local regulatory compliance, equipment-specific procedures); creates core process SOPs that are specific enough to standardize quality while flexible enough for site differences; addresses customer-specific requirements; the architecture meets IATF 16949 multi-site certification requirements."
    weight: 0.35
    description: "ViableDocumentArchitecture"
  - type: llm_judge
    criteria: "Response addresses multi-language and multi-cultural challenges — proposes practical translation strategy (English master, local language translations); addresses cultural differences in quality practices (German precision culture vs Chinese manufacturing norms); leverages Stuttgart's existing IATF 16949 certification as the template; includes gap analysis methodology comparing each site's current state to requirements; the harmonization approach respects local capabilities while driving standardization."
    weight: 0.35
    description: "MultiLanguageMultiCulture"
  - type: llm_judge
    criteria: "Response includes a realistic implementation plan — proposes phased approach achievable within 18 months; addresses resource requirements and budget; includes internal audit preparation for multi-site certification; defines performance improvement targets for each site; proposes metrics for measuring harmonization progress; addresses the significant PPM gap between sites (45 PPM Stuttgart vs 350 PPM Monterrey); the plan would be credible to both the automotive OEM customer and the IATF registrar."
    weight: 0.30
    description: "RealisticImplementation"
