meta:
  id: knowledge-management-system
  level: 3
  course: process-documentation-sops
  type: output
  description: "Design an enterprise knowledge management system for a professional services firm facing critical knowledge loss from retiring workforce and high turnover"
  tags: [knowledge-management, retention, professional-services, advanced]

state: {}

trigger: |
  You're the Chief Knowledge Officer at a 1,500-person
  engineering consulting firm ($280M revenue) specializing
  in infrastructure projects (bridges, tunnels, water
  systems). The firm faces a knowledge crisis: 30% of
  senior engineers (the people who know how things
  actually work) will retire within 5 years, and annual
  turnover among mid-level engineers is 22%.

  Knowledge loss examples:
  - A senior bridge engineer retired and took 35 years
    of institutional knowledge about specific bridge
    types, local geology considerations, and client
    relationships. The next project of that type had a
    $2M cost overrun because the team didn't know the
    design considerations he would have flagged
  - Three recent quality failures were traced to "lost
    knowledge" — procedures that existed in senior
    engineers' heads but were never documented
  - Client complaints about inconsistent deliverable
    quality between offices

  Current documentation state:
  - Project files stored on network drives (inconsistent
    naming, no metadata)
  - Technical standards and design guides: 150 documents,
    most 5-10 years old
  - "Lessons learned" database: 2,300 entries, mostly
    unusable (too vague: "communicate better with client")
  - No standard project execution procedures
  - No mentoring or knowledge transfer program
  - Individual engineers keep personal "cheat sheets"
    and calculation templates on their laptops

  Knowledge categories to capture:
  - Technical design knowledge (calculations, design
    choices, material selection)
  - Project execution knowledge (client management,
    regulatory navigation, field construction oversight)
  - Institutional knowledge (why decisions were made,
    historical context, client preferences)
  - Expert judgment (when to deviate from standards,
    risk assessment intuition)
  - Relationship knowledge (client contacts, regulatory
    relationships, subconsultant capabilities)

  Task: Design the enterprise knowledge management system
  including the knowledge capture methodology (how to
  extract tacit knowledge from retiring experts), the
  documentation framework (standards, templates, project
  procedures), the technology platform architecture, the
  governance model (ownership, quality, maintenance),
  and the change management strategy to get engineers
  to actually use it. Address how to capture expert
  judgment and institutional knowledge — the hardest
  knowledge to document.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive knowledge management system — includes knowledge capture methodology for tacit knowledge (structured interviews, expert shadowing, after-action reviews, decision journals); creates a documentation framework with standards, templates, and project procedures; addresses all knowledge categories (technical, execution, institutional, judgment, relationship); proposes technology architecture that enables search, retrieval, and contextual discovery; the system addresses the specific knowledge crisis at an engineering consulting firm."
    weight: 0.35
    description: "ComprehensiveKMSystem"
  - type: llm_judge
    criteria: "Response addresses the hardest challenge — tacit knowledge capture — proposes specific methodologies for extracting expert judgment (not just procedures but decision-making heuristics, risk intuition, and design philosophy); addresses institutional knowledge (why decisions were made, historical context); includes mentoring program design that transfers tacit knowledge to mid-career engineers; the approach would prevent the $2M cost overrun type of knowledge loss."
    weight: 0.35
    description: "TacitKnowledgeCapture"
  - type: llm_judge
    criteria: "Response includes adoption and sustainability — proposes change management strategy to get engineers to contribute to and use the system (engineers notoriously resist documentation); addresses governance (who maintains quality, reviews entries, ensures currency); includes metrics for measuring KM system effectiveness; the system is designed for sustainability beyond initial implementation; a CKO could implement this with realistic resources."
    weight: 0.30
    description: "AdoptionAndSustainability"
