meta:
  id: enterprise-process-architecture
  level: 3
  course: process-documentation-sops
  type: output
  description: "Design an enterprise process architecture and documentation framework for a Fortune 500 insurance company standardizing operations across 15 business units"
  tags: [enterprise-architecture, process-framework, standardization, advanced]

state: {}

trigger: |
  You're the VP of Business Process Management at a
  Fortune 500 insurance company ($18B premium revenue,
  12,000 employees, 15 business units). The CEO has
  mandated an enterprise-wide process standardization
  initiative after discovering that the same claims
  process is documented and executed differently across
  all 15 business units — resulting in wildly different
  cycle times (3 days to 45 days), customer satisfaction
  scores (NPS -12 to +62), and error rates (2% to 18%).

  Current state:
  - 15 business units each have their own process
    documentation (or none at all)
  - 4 different documentation tools in use (SharePoint,
    Confluence, paper binders, network drives)
  - No common process taxonomy or naming convention
  - No process ownership model (nobody owns end-to-end
    processes that cross business units)
  - 2,800+ SOPs across the enterprise (estimated 40%
    are outdated or redundant)
  - No process performance metrics
  - Merger history: 3 acquisitions in 5 years, each
    brought their own processes

  CEO expectations:
  - Single process architecture covering all operations
  - Common documentation standard across all 15 BUs
  - Process performance benchmarking across BUs
  - Identification of best practices for standardization
  - Clear process ownership and governance
  - Budget: $4M over 2 years
  - Measurable improvement in claims cycle time, customer
    satisfaction, and operational cost within 18 months

  Task: Design the enterprise process architecture
  including the process hierarchy (levels 0-4), the
  documentation standard and template system, the
  process governance model (ownership, review, change
  control), the technology platform recommendation,
  the migration plan for 2,800+ existing SOPs, and the
  performance measurement framework. Address how to
  standardize processes across 15 BUs with different
  cultures and systems while maintaining necessary
  local variations.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible enterprise process architecture — defines a clear process hierarchy (L0 enterprise value chain, L1 process areas, L2 processes, L3 sub-processes, L4 procedures/work instructions); creates documentation standards with templates for each level; establishes a governance model with process ownership, review cycles, and change control; the architecture is appropriate for a Fortune 500 insurance company with multiple business units and merger history."
    weight: 0.35
    description: "CredibleProcessArchitecture"
  - type: llm_judge
    criteria: "Response addresses standardization vs local variation — provides a framework for deciding what must be standard across all BUs vs what can vary locally; includes a migration plan for the 2,800+ existing SOPs (triage, rationalize, standardize, migrate); addresses the cultural challenges of standardizing across 15 BUs with different histories; proposes change management approach; the plan is achievable within $4M and 2 years."
    weight: 0.35
    description: "StandardizationFramework"
  - type: llm_judge
    criteria: "Response includes technology and measurement — recommends a process documentation platform with clear selection criteria; defines process performance metrics (cycle time, quality, cost, customer satisfaction) with benchmarking across BUs; addresses the claims process specifically (reducing the 3-45 day range); proposes a process maturity model; the performance framework enables continuous improvement; a Fortune 500 COO would find this compelling."
    weight: 0.30
    description: "TechnologyAndMeasurement"
