meta:
  id: gmp-pharma-sop-system
  level: 3
  course: process-documentation-sops
  type: output
  description: "Design a GMP-compliant SOP management system for a pharmaceutical manufacturer responding to FDA Warning Letter findings on documentation deficiencies"
  tags: [gmp, pharmaceutical, fda, warning-letter, advanced]

state: {}

trigger: |
  You're the Senior Director of Quality Systems at a
  mid-size pharmaceutical manufacturer (800 employees,
  $500M revenue, 2 manufacturing sites). The company
  received an FDA Warning Letter citing 7 documentation
  deficiencies across your quality system. The Warning
  Letter gives you 15 business days to respond with a
  comprehensive corrective action plan.

  FDA Warning Letter findings:
  1. "SOPs do not adequately describe production processes
     to ensure batch-to-batch consistency" (21 CFR
     211.100)
  2. "Document control procedures are inadequate — obsolete
     documents found in manufacturing areas" (21 CFR
     211.180)
  3. "Training records do not demonstrate that personnel
     have been trained on current SOPs" (21 CFR 211.25)
  4. "Deviation investigation procedures do not ensure
     root cause identification" (21 CFR 211.192)
  5. "Change control procedures do not assess impact on
     validated processes" (21 CFR 211.100)
  6. "CAPA effectiveness checks are not documented or
     are overdue" (21 CFR 211.192)
  7. "Annual product review procedures do not include
     all required data elements" (21 CFR 211.180)

  Current SOP system:
  - 850 SOPs across both manufacturing sites
  - Document management: MasterControl (implemented 3
    years ago but only 60% of SOPs migrated)
  - 40% of SOPs are still in paper-based binders
  - Average SOP age: 4.2 years (many haven't been
    reviewed since initial creation)
  - SOP writing quality varies significantly (some are
    3 pages, equivalent ones at the other site are 30
    pages)
  - No SOP writing guide or style standard
  - Training is "read and sign" with no competency
    verification

  Products:
  - 12 commercial products (tablets, capsules, topical)
  - 3 products in clinical supply (Phase II and III)
  - Both sites produce commercial products (some products
    manufactured at both sites with different SOPs)

  Task: Write the FDA Warning Letter response addressing
  all 7 findings with specific corrective and preventive
  actions. Then design the comprehensive SOP management
  system overhaul including: SOP writing standards and
  style guide, document control procedures meeting GMP
  requirements, training effectiveness program beyond
  "read and sign," deviation and CAPA procedure
  improvements, and the MasterControl migration completion
  plan. Include the implementation timeline and resource
  requirements.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible FDA Warning Letter response — addresses each of the 7 findings individually with specific corrective actions (what will be done), preventive actions (how it will be prevented from recurring), responsible parties, and completion dates; the response follows FDA-expected format and tone (acknowledges deficiencies, demonstrates understanding of GMP requirements, commits to specific measurable remediation); the response would prevent FDA from escalating to consent decree or import alert."
    weight: 0.35
    description: "CredibleFDAResponse"
  - type: llm_judge
    criteria: "Response designs a comprehensive SOP management overhaul — creates SOP writing standards with a style guide; designs document control procedures that prevent obsolete documents in manufacturing areas; proposes training program beyond 'read and sign' (hands-on competency verification, knowledge assessments); improves deviation investigation to require root cause analysis; enhances change control with process validation impact assessment; fixes CAPA tracking; the overhaul addresses root causes, not just symptoms."
    weight: 0.35
    description: "ComprehensiveSOPOverhaul"
  - type: llm_judge
    criteria: "Response addresses pharmaceutical manufacturing complexity — recognizes dual-site operations with different SOPs for same products; proposes SOP harmonization approach; addresses MasterControl migration completion; includes realistic implementation timeline (immediate corrections vs systemic improvements); defines resource requirements; addresses clinical supply SOP requirements (Phase II/III compliance); the plan would be accepted by a pharmaceutical quality professional and FDA reviewer."
    weight: 0.30
    description: "PharmaManufacturingComplexity"
