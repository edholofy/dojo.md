meta:
  id: digital-transformation-process
  level: 3
  course: process-documentation-sops
  type: output
  description: "Redesign and document business processes for a digital transformation initiative at a traditional bank, transitioning from paper-based to digital workflows"
  tags: [digital-transformation, banking, process-redesign, advanced]

state: {}

trigger: |
  You're the Head of Process Transformation at a regional
  bank ($12B assets, 2,800 employees, 85 branches). The
  bank is undergoing a 3-year digital transformation and
  you've been tasked with redesigning and documenting the
  core banking processes to support digital-first
  operations. The CEO wants to reduce branch dependency
  by 60% while improving customer experience.

  Processes to redesign and document:
  1. Account opening (currently 45 minutes in-branch,
     target: 10 minutes digital)
  2. Loan origination (currently 21 days average, target:
     3 days for pre-approved, 7 days for new)
  3. Wire transfers (currently requires in-branch visit
     for amounts over $5,000)
  4. Dispute resolution (currently 15-day average, target:
     48 hours for straightforward disputes)
  5. Customer onboarding/KYC (currently paper-based with
     wet signatures required)

  Current state challenges:
  - 450 SOPs, most written for paper-based processes
  - Regulatory requirements (BSA/AML, CRA, TILA, RESPA,
    ECOA) embedded in procedures — changes must maintain
    compliance
  - 2,800 employees trained on current processes (change
    management is massive)
  - Legacy core banking system (FIS) being replaced with
    nCino/Salesforce for lending and Temenos for core
  - Dual-run period: old and new systems running in
    parallel for 6 months
  - Branch staff resistance to change ("this is how we've
    always done it")
  - Compliance team concerned about digital process gaps

  Regulatory considerations:
  - BSA/AML: Customer identification program (CIP)
    requirements
  - E-SIGN Act: Electronic signature compliance
  - UDAAP: Fair lending in automated decisioning
  - State-specific requirements for digital account
    opening
  - OCC expectations for change management in banking

  Task: Redesign and document the account opening process
  and the loan origination process for digital-first
  operations. For each, provide the current-state process
  map, the future-state process design, the transitional
  procedures (dual-run period), compliance mapping
  (showing how each regulatory requirement is met in the
  new process), and the training plan. Include the SOP
  structure for both digital and branch fallback scenarios.

assertions:
  - type: llm_judge
    criteria: "Response redesigns processes for digital-first — the account opening process achieves the 10-minute digital target while maintaining CIP/KYC compliance; the loan origination process reduces cycle time with clear pre-approval, digital application, and automated decisioning steps; both processes include digital identity verification, e-signature, and straight-through processing where possible; the designs reflect modern digital banking practices."
    weight: 0.35
    description: "DigitalFirstProcessDesign"
  - type: llm_judge
    criteria: "Response maintains regulatory compliance — includes compliance mapping for each process showing how BSA/AML, E-SIGN Act, UDAAP, TILA, RESPA, and ECOA requirements are met in the digital process; addresses the dual-run period with clear procedures for both old and new systems; includes branch fallback procedures for when digital processes fail or when customers prefer in-person service; the compliance approach would satisfy OCC examiners."
    weight: 0.35
    description: "RegulatoryCompliance"
  - type: llm_judge
    criteria: "Response addresses the human side of transformation — includes change management and training plan for 2,800 employees; addresses branch staff resistance; proposes phased rollout approach; the SOPs cover both digital and paper-based scenarios during transition; includes metrics for measuring transformation success; the documentation approach supports the dual-run period without overwhelming staff with two complete sets of procedures."
    weight: 0.30
    description: "TransformationManagement"
