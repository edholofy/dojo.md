meta:
  id: compliance-program-documentation
  level: 3
  course: process-documentation-sops
  type: output
  description: "Document a comprehensive corporate compliance program for a mid-size fintech company preparing for OCC examination and state regulatory audits"
  tags: [compliance, fintech, regulatory, program-documentation, advanced]

state: {}

trigger: |
  You're the Chief Compliance Officer at a 500-person
  fintech company ($200M revenue) that provides payment
  processing and small business lending. The company has
  grown 300% in 3 years, and the compliance infrastructure
  hasn't kept pace. You're facing an OCC examination in
  6 months and state regulatory audits in 3 states.

  Compliance program documentation needed:
  1. BSA/AML program (CIP, CDD, EDD, SAR filing, CTR
     filing, OFAC screening)
  2. Consumer compliance (TILA, ECOA, UDAAP, FCRA, EFTA,
     Reg E, Reg Z)
  3. Fair lending program (HMDA if applicable, fair
     lending testing, adverse action notices)
  4. Information security program (GLBA Safeguards Rule)
  5. Vendor management program (OCC Bulletin 2023-17)
  6. Complaint management program
  7. Change management for new products/services
  8. Compliance training program
  9. Compliance monitoring and testing plan
  10. Board and senior management reporting

  Current state:
  - BSA/AML: Basic procedures exist but haven't been
    updated for new products (BNPL launched 8 months ago
    with no AML risk assessment)
  - Consumer compliance: SOPs written by business units,
    not reviewed by compliance
  - Fair lending: No documented testing program
  - Information security: Written by IT, doesn't meet
    GLBA requirements
  - Vendor management: No formal program
  - 70% of compliance SOPs are outdated
  - No compliance monitoring/testing schedule
  - Board reporting is ad hoc presentations, not
    structured reporting

  Regulatory risks:
  - BNPL product without proper TILA disclosures
  - SAR filing timeliness issues (average 42 days vs
    required 30)
  - No documented adverse action notice procedures
  - Customer complaint response times averaging 21 days
    (some state requirements: 15 days)
  - 3 state examiner concerns from recent exams (informal
    citations)

  Task: Create the compliance program documentation
  framework and write 3 priority SOPs: BSA/AML program
  (including BNPL risk assessment), consumer compliance
  procedures (TILA disclosures and adverse action
  notices), and the compliance monitoring and testing
  plan. Include the board reporting template and the
  OCC examination preparation checklist.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive compliance program framework — addresses all 10 documentation areas at the framework level; provides detailed SOPs for the 3 priority areas (BSA/AML with BNPL risk assessment, consumer compliance with TILA and adverse action procedures, compliance monitoring/testing); the BSA/AML SOP addresses SAR filing timeliness with specific procedures to meet 30-day requirement; the consumer compliance SOP addresses BNPL disclosure gaps; the monitoring plan includes risk-based testing methodology."
    weight: 0.35
    description: "ComprehensiveComplianceFramework"
  - type: llm_judge
    criteria: "Response addresses the specific regulatory risks — the BNPL product gets a proper AML risk assessment and TILA disclosure procedures; SAR filing procedures include controls to meet 30-day timeline; adverse action notice procedures comply with ECOA and FCRA; complaint management addresses 15-day state requirements; the framework anticipates OCC examiner expectations and addresses the 3 informal state citations; the documentation would demonstrate a 'culture of compliance' to regulators."
    weight: 0.35
    description: "RegulatoryRiskAddressed"
  - type: llm_judge
    criteria: "Response includes board reporting and exam preparation — provides a board reporting template with metrics, trends, and risk assessments; includes OCC examination preparation checklist; addresses the 6-month timeline to exam readiness; proposes compliance monitoring calendar with testing schedule; the program scales with the company's 300% growth; a fintech compliance professional would find this credible and actionable."
    weight: 0.30
    description: "BoardReportingAndExamPrep"
