meta:
  id: regulatory-submission-sop
  level: 3
  course: process-documentation-sops
  type: output
  description: "Design the SOP system for a medical device company's regulatory submission process covering 510(k), PMA, CE marking, and global registration"
  tags: [regulatory, medical-device, global-registration, advanced]

state: {}

trigger: |
  You're the VP of Regulatory Affairs at a 350-person
  medical device company ($120M revenue) that manufactures
  diagnostic imaging equipment. The company is expanding
  internationally and needs to systematize its regulatory
  submission process. Currently, regulatory submissions
  are managed ad hoc by individual RA specialists, each
  with their own approach.

  Regulatory pathways to document:
  - FDA 510(k) (US market clearance)
  - FDA PMA (for higher-risk Class III devices)
  - FDA De Novo (for novel lower-risk devices)
  - EU CE marking under MDR 2017/745
  - Health Canada MDEL and device licensing
  - Japan PMDA Shonin
  - China NMPA registration
  - Brazil ANVISA registration

  Current problems:
  - No standard submission preparation process (each
    specialist reinvents the wheel)
  - Missing predicate device analysis led to a 510(k)
    rejection (6-month delay, $400K cost)
  - EU MDR transition caught the company off-guard —
    2 products lost CE marking temporarily
  - No centralized tracking of submission status across
    markets
  - Post-market surveillance data not systematically
    feeding back into submissions
  - Technical file structure varies between submissions
  - No standard process for responding to regulatory
    authority questions (deficiency letters)

  Regulatory team: 12 specialists plus 3 support staff
  Active submissions: ~25 per year across all markets
  Product portfolio: 8 product families, 45 SKUs

  Task: Design the SOP system for regulatory submissions
  including the master submission process (generic across
  all pathways), pathway-specific supplements (510(k),
  PMA, CE marking/MDR, international), the predicate/
  equivalent device analysis procedure, the technical
  file assembly procedure, the deficiency response
  process, the submission tracking and status reporting
  framework, and the post-market surveillance feedback
  loop. Include templates and checklists for the most
  common pathways.

assertions:
  - type: llm_judge
    criteria: "Response designs a systematic regulatory SOP framework — creates a master submission process with pathway-specific supplements; includes predicate/equivalent device analysis procedure that would prevent the rejection described; defines technical file assembly with consistent structure; addresses deficiency letter response process with timeline management; the SOP system covers the 8 regulatory pathways with appropriate detail; the framework would standardize work across 12 RA specialists."
    weight: 0.35
    description: "SystematicRegulatorySOPs"
  - type: llm_judge
    criteria: "Response addresses multi-market complexity — recognizes the differences between US FDA, EU MDR, and international pathways; addresses EU MDR 2017/745 specific requirements (clinical evaluation, post-market clinical follow-up, UDI); includes market-specific checklists for the most common submissions (510(k), CE marking); addresses simultaneous multi-market submissions for the same product; the approach prevents the MDR transition problem described."
    weight: 0.35
    description: "MultiMarketComplexity"
  - type: llm_judge
    criteria: "Response includes tracking and continuous improvement — proposes submission tracking system with status reporting; includes post-market surveillance feedback loop into submissions; defines quality metrics for the regulatory function (submission success rate, cycle time, deficiency rate); provides templates and checklists that RA specialists would actually use; the system is scalable as the company grows internationally."
    weight: 0.30
    description: "TrackingAndImprovement"
