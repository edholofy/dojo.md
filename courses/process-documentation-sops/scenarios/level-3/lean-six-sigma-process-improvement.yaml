meta:
  id: lean-six-sigma-process-improvement
  level: 3
  course: process-documentation-sops
  type: output
  description: "Lead a Lean Six Sigma process improvement project for a hospital emergency department, documenting current and future state processes with measurable outcomes"
  tags: [lean-six-sigma, healthcare, process-improvement, advanced]

state: {}

trigger: |
  You're a Lean Six Sigma Black Belt consultant engaged
  by a 450-bed urban hospital to improve Emergency
  Department (ED) throughput. The ED sees 65,000 patients
  annually, and key metrics are deteriorating:

  Current performance:
  - Door-to-provider time: 78 minutes (target: 30 min)
  - Average length of stay (LOS): 5.2 hours (target: 3.5)
  - Left without being seen (LWBS): 8.2% (target: <2%)
  - Patient satisfaction (Press Ganey): 42nd percentile
  - Boarding hours (admitted patients waiting for beds):
    average 4.8 hours per patient
  - Median time to disposition decision: 3.1 hours

  ED operations:
  - 42 treatment spaces (beds + chairs)
  - 3 shifts: Day (7A-3P), Evening (3P-11P), Night (11P-7A)
  - Average daily census: 178 patients
  - Peak hours: 10AM-8PM (60% of volume)
  - Staffing: 12 physicians, 48 nurses, 8 techs, 6
    registration staff per 24 hours

  Current process problems identified in Gemba walks:
  - Triage takes 15-20 minutes (national benchmark: 5-7)
  - Registration happens sequentially after triage (adds
    10-15 minutes before provider sees patient)
  - Lab results wait: average 62 minutes (most are
    standard panels)
  - Radiology wait: average 45 minutes for X-ray, 90
    minutes for CT
  - "Vertical patient" pathway doesn't exist (low-acuity
    patients occupy beds unnecessarily)
  - Admitted patients board in ED beds for hours, blocking
    new patients
  - Charge nurse spends 40% of time on bed management
    phone calls
  - Provider documentation takes 35 minutes per patient
    (EHR inefficiency)

  Hospital leadership expects:
  - DMAIC methodology followed rigorously
  - Current and future state process maps
  - Statistical analysis of bottleneck impact
  - Documented SOPs for redesigned processes
  - 90-day implementation plan
  - Sustainability plan with control charts

  Task: Complete the DMAIC project documentation including
  the Define phase (project charter, SIPOC, VOC), the
  Measure phase (current state process map, data collection
  plan, baseline capability), the Analyze phase (root
  cause analysis, bottleneck identification, statistical
  analysis), the Improve phase (future state process
  design with SOPs for key changes), and the Control phase
  (control plan, monitoring dashboard, sustainability
  procedures). Focus the improvement SOPs on the 3
  highest-impact changes.

assertions:
  - type: llm_judge
    criteria: "Response follows rigorous DMAIC methodology — includes a project charter with scope, goals, and timeline; creates SIPOC diagram for the ED process; documents current state with process map; identifies bottlenecks through data analysis (triage time, registration delay, lab/radiology wait, boarding); proposes statistically-justified improvements; the methodology would pass Lean Six Sigma certification review."
    weight: 0.35
    description: "RigorousDMAIC"
  - type: llm_judge
    criteria: "Response produces high-impact improvement SOPs — identifies the 3 highest-impact changes and documents detailed SOPs for each; the improvements are evidence-based (addressing measured bottlenecks); includes future state process map showing how metrics improve; the SOPs are specific to ED operations (not generic); addresses staff workflow changes realistically; the improvements could achieve the target metrics (door-to-provider 30 min, LOS 3.5 hours, LWBS <2%)."
    weight: 0.35
    description: "HighImpactImprovementSOPs"
  - type: llm_judge
    criteria: "Response includes a robust control plan — defines control charts for key metrics; includes monitoring dashboard design; establishes sustainability procedures (daily huddles, weekly metric review, monthly process audits); addresses the 90-day implementation timeline; includes change management for staff (physicians, nurses, techs, registration); the control plan ensures improvements are sustained after the consultant leaves."
    weight: 0.30
    description: "RobustControlPlan"
