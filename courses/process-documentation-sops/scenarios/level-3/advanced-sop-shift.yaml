meta:
  id: advanced-sop-shift
  level: 3
  course: process-documentation-sops
  type: output
  description: "Shift simulation — handle a consent decree requiring complete SOP system overhaul, a product recall driven by SOP failure, and a whistleblower complaint about documentation fraud"
  tags: [shift-simulation, consent-decree, recall, whistleblower, advanced]

state: {}

trigger: |
  You're the VP of Quality at a 600-person medical
  device manufacturer ($180M revenue). It's Monday
  morning and three crises have converged.

  CRISIS 1 — FDA CONSENT DECREE (8:00 AM):
  The company has received an FDA consent decree requiring
  a complete quality system overhaul within 12 months.
  The decree stems from repeated 483 observations and a
  Warning Letter over 3 years, all related to documentation
  failures. Key requirements:
  - All SOPs must be rewritten to meet 21 CFR 820
  - Independent third-party must audit and approve all
    SOPs before reactivation
  - Production must cease for 2 product lines until SOPs
    are approved (projected revenue impact: $3M/month)
  - Monthly progress reports to FDA
  - Failure to comply: contempt of court and potential
    facility closure
  The board wants a detailed remediation plan by Friday.

  CRISIS 2 — PRODUCT RECALL (8:45 AM):
  A Class II recall has been initiated for a surgical
  instrument after 12 reports of component failure during
  procedures. Root cause investigation reveals that a
  manufacturing SOP was changed 6 months ago to reduce
  cycle time (from 45 minutes to 30 minutes per unit) but
  the change bypassed the formal change control process —
  no impact assessment on product quality was performed,
  no validation study was conducted, and the engineering
  team that approved the change didn't involve quality.
  The SOP change directly compromised product integrity.
  You need to manage the recall and prevent it from
  worsening the FDA consent decree situation.

  CRISIS 3 — WHISTLEBLOWER COMPLAINT (9:30 AM):
  An anonymous employee has filed a complaint with the
  FDA alleging that production supervisors on second
  shift routinely backdate training records and fabricate
  SOP compliance documentation to pass internal audits.
  The complaint includes specific examples with dates.
  You've just been informed by legal counsel that FDA
  will investigate within 30 days. If the allegation is
  substantiated, it could transform the consent decree
  into facility closure.

  Task: Address all three crises: create the consent
  decree remediation plan framework (board-ready by
  Friday), manage the recall documentation and root
  cause corrective action, and design the internal
  investigation approach for the whistleblower complaint.
  Show how the three situations interconnect and how
  your response addresses the systemic documentation
  culture failures that enabled all three.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three crises with clear interconnection — recognizes that all three crises stem from the same root cause (systemic documentation culture failure); the consent decree remediation plan is board-ready with timeline, resources, and milestones; the recall response includes proper documentation (recall letters, corrective action, customer notification); the whistleblower investigation is designed to be thorough, independent, and legally defensible; priorities are correctly sequenced."
    weight: 0.35
    description: "AllCrisesInterconnected"
  - type: llm_judge
    criteria: "Response demonstrates quality system expertise — the consent decree remediation plan addresses 21 CFR 820 requirements systematically; the recall CAPA addresses the root cause (SOP change without change control) with both corrective and preventive actions; the investigation approach for the whistleblower complaint protects the complainant while ensuring thorough review; the response addresses the systemic issue of documentation culture, not just individual failures."
    weight: 0.35
    description: "QualitySystemExpertise"
  - type: llm_judge
    criteria: "Response proposes a sustainable path forward — addresses the $3M/month revenue impact with prioritization of SOP remediation by production line criticality; proposes culture change initiatives beyond just rewriting SOPs; includes governance improvements (change control, training verification, management accountability); the plan is realistic for a 600-person company under consent decree; a medical device CEO and board would find this credible and actionable."
    weight: 0.30
    description: "SustainablePathForward"
