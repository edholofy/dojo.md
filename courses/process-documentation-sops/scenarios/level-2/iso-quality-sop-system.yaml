meta:
  id: iso-quality-sop-system
  level: 2
  course: process-documentation-sops
  type: output
  description: "Design an ISO 9001-compliant document control system and write core quality SOPs for a manufacturing company preparing for certification"
  tags: [iso-9001, quality, document-control, intermediate]

state: {}

trigger: |
  You're the Quality Manager at a 150-person precision
  machining company ($22M revenue) that supplies
  aerospace and medical device components. Your largest
  customer (40% of revenue) has given you 12 months to
  achieve ISO 9001:2015 certification or lose the
  contract. Currently, the company has no formal quality
  management system — procedures are informal and
  inconsistent across 3 shifts.

  Current documentation state:
  - 6 informal procedures (handwritten or in Word docs,
    no version control)
  - No document numbering system
  - No formal change control process
  - Training records are incomplete (paper-based, stored
    in filing cabinets)
  - Quality records (inspection reports, NCRs) are in
    spreadsheets with no backup
  - No management review process documented

  ISO 9001:2015 mandatory documented information:
  - Quality policy and objectives
  - Scope of the QMS
  - Process interactions (process map)
  - Document control procedure
  - Control of records procedure
  - Internal audit procedure
  - Control of nonconforming outputs
  - Corrective action procedure
  - Management review records

  Additional procedures needed for your operations:
  - Incoming material inspection
  - In-process inspection
  - Final inspection and testing
  - Calibration of measuring equipment
  - Customer complaint handling
  - Supplier evaluation and approval

  Task: Design the document control system (numbering,
  versioning, approval, distribution, retention) and
  write three core SOPs: Document Control, Control of
  Nonconforming Product, and Corrective Action. Include
  the document hierarchy, forms templates descriptions,
  and the implementation timeline to achieve certification
  within 12 months.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete document control system — includes document numbering scheme, version control methodology, approval workflow, distribution control, document review cycle, and retention requirements; the system is scalable for a 150-person manufacturer; addresses transition from informal to formal documentation; the system meets ISO 9001:2015 Clause 7.5 requirements for documented information."
    weight: 0.35
    description: "CompleteDocumentControlSystem"
  - type: llm_judge
    criteria: "Response produces ISO-compliant SOPs — the three SOPs (Document Control, Nonconforming Product, Corrective Action) follow proper SOP format with purpose, scope, responsibilities, procedures, and records; each SOP includes the specific requirements from ISO 9001:2015; addresses root cause analysis in corrective action; includes dispositions for nonconforming product (rework, scrap, accept-as-is, return to supplier); the SOPs would pass an ISO registrar audit."
    weight: 0.35
    description: "ISOCompliantSOPs"
  - type: llm_judge
    criteria: "Response includes a realistic implementation timeline — proposes a phased 12-month plan to achieve certification; prioritizes documentation in logical order; addresses training requirements for 3 shifts; includes internal audit preparation; accounts for the registrar's Stage 1 and Stage 2 audit process; the timeline is achievable for a company starting from near-zero documentation."
    weight: 0.30
    description: "RealisticTimeline"
