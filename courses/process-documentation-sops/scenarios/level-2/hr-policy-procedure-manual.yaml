meta:
  id: hr-policy-procedure-manual
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write an employee handbook chapter on leave management with supporting SOPs for a multi-state employer covering FMLA, state laws, and company-specific policies"
  tags: [hr, leave-management, fmla, compliance, intermediate]

state: {}

trigger: |
  You're the HR Director at a 400-person professional
  services firm with offices in California, New York,
  Texas, and Illinois. After two compliance complaints
  (one FMLA violation resulting in a DOL investigation,
  one California CFRA mishandling that led to a lawsuit),
  the CEO wants you to rewrite the leave management
  section of the employee handbook and create supporting
  SOPs for HR staff.

  Current problems:
  - HR generalists in each office apply leave policies
    differently
  - California's specific requirements (CFRA, PDL, paid
    family leave) are not documented separately from
    federal FMLA
  - New York's paid family leave program interactions with
    FMLA aren't clear
  - Managers don't know when to notify HR about leave
    requests (some approve directly, causing compliance
    issues)
  - Return-to-work process is inconsistent (some employees
    return without medical clearance)
  - Intermittent FMLA leave tracking is manual and error-
    prone
  - No documentation of the interactive accommodation
    process for ADA-related leave

  Leave types to cover:
  - FMLA (12 weeks, qualifying reasons)
  - California CFRA (additional protections beyond FMLA)
  - California PDL (pregnancy disability leave)
  - New York Paid Family Leave
  - Illinois Victims' Economic Safety and Security Act
  - Company sick leave and PTO
  - Short-term and long-term disability
  - Military leave (USERRA)
  - Bereavement leave
  - ADA reasonable accommodations (extended leave)

  Systems:
  - ADP Workforce Now (HRIS and payroll)
  - Reliance Standard (disability insurance provider)
  - Paper-based leave tracking (the problem)

  Task: Write the employee handbook chapter on leave
  management (employee-facing) and the internal HR SOP
  for leave administration (HR staff-facing). The handbook
  chapter should be clear and compliant across all 4
  states. The SOP should include step-by-step procedures
  for processing each leave type, state-specific decision
  trees, tracking requirements, and return-to-work
  protocols.

assertions:
  - type: llm_judge
    criteria: "Response produces compliant leave management documentation — the handbook chapter covers all leave types with clear eligibility criteria, duration, pay status, and employee obligations; addresses state-specific variations (California CFRA/PDL, New York PFL, Illinois VESSA); explains how different leave types interact (FMLA + state + company PTO); the handbook language would pass employment law review; written in clear, employee-friendly language."
    weight: 0.35
    description: "CompliantLeaveDocumentation"
  - type: llm_judge
    criteria: "Response creates a usable HR administration SOP — includes step-by-step procedures for processing each leave type; provides state-specific decision trees (California vs New York vs Texas vs Illinois); defines manager responsibilities vs HR responsibilities; addresses intermittent leave tracking methodology; includes return-to-work protocol with medical clearance requirements; addresses ADA interactive process; the SOP would prevent the FMLA violation and CFRA mishandling described."
    weight: 0.35
    description: "UsableHRAdminSOP"
  - type: llm_judge
    criteria: "Response addresses practical administration challenges — proposes tracking improvements beyond paper-based system; includes notice and documentation requirements for both employer and employee; addresses coordination with disability insurance (Reliance Standard); defines escalation for complex leave situations; includes compliance monitoring checkpoints; the documentation could train a new HR generalist to handle leave administration correctly."
    weight: 0.30
    description: "PracticalAdministration"
