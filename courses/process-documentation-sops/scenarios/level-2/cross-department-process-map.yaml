meta:
  id: cross-department-process-map
  level: 2
  course: process-documentation-sops
  type: output
  description: "Map and document a cross-departmental order-to-cash process for a B2B distributor with handoff points, SLAs, and exception handling"
  tags: [process-mapping, cross-functional, order-to-cash, intermediate]

state: {}

trigger: |
  You're the Process Improvement Manager at a 200-person
  B2B industrial supplies distributor ($45M revenue). The
  CEO has asked you to map and document the order-to-cash
  (O2C) process after discovering that the average order
  cycle time is 14 days — competitors average 5 days.

  Departments involved in O2C:
  1. Sales: Receives orders (phone, email, portal)
  2. Order Entry: Keys orders into ERP (SAP Business One)
  3. Credit: Approves credit for new/large orders
  4. Warehouse: Picks, packs, ships orders
  5. Shipping: Coordinates carriers, generates BOLs
  6. Billing: Generates invoices
  7. Collections: Follows up on past-due accounts

  Current pain points identified through interviews:
  - Sales reps submit incomplete orders (missing part
    numbers, ship-to addresses) — 30% require rework
  - Credit approval takes 2-3 days for new customers
    (no defined SLA)
  - Warehouse picks are delayed when items are out of
    stock (no proactive notification to sales)
  - Shipping doesn't consolidate orders for same customer
    on same day (extra freight costs)
  - Invoices sometimes don't match POs (pricing errors
    from manual entry)
  - No single person owns the end-to-end process
  - Each department blames the others for delays

  Systems:
  - SAP Business One (ERP)
  - Salesforce (CRM)
  - ShipStation (shipping)
  - QuickBooks (billing/invoicing — yes, separate from SAP)

  Task: Create a comprehensive O2C process map with
  swimlane diagram description, document the SOP for each
  department's role, define handoff points with SLAs,
  create exception handling procedures, and propose
  process improvements to reduce cycle time from 14 to
  5 days.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive process map — describes a swimlane diagram covering all 7 departments; identifies every handoff point between departments; defines SLAs for each process step; documents exception handling for common issues (incomplete orders, credit holds, stockouts, pricing mismatches); assigns process ownership; the map would reveal why the current cycle time is 14 days."
    weight: 0.35
    description: "ComprehensiveProcessMap"
  - type: llm_judge
    criteria: "Response documents actionable SOPs — provides department-level SOPs or work instructions for key steps; addresses the specific pain points (incomplete orders, credit delays, stockouts, freight consolidation, invoice errors); includes decision trees for exceptions; defines escalation procedures; the SOPs are specific to a B2B distributor context (part numbers, BOLs, POs)."
    weight: 0.35
    description: "ActionableSOPs"
  - type: llm_judge
    criteria: "Response proposes credible improvements — identifies specific changes to reduce cycle time from 14 to 5 days; addresses system integration gaps (SAP, Salesforce, ShipStation, QuickBooks); proposes measurable KPIs for the O2C process; addresses the ownership gap; the improvement proposals are realistic for a 200-person distributor and don't require a complete system overhaul."
    weight: 0.30
    description: "CredibleImprovements"
