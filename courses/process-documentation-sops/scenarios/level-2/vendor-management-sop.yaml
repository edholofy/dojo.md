meta:
  id: vendor-management-sop
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write vendor onboarding and management SOPs for a healthcare organization covering qualification, risk assessment, performance monitoring, and compliance"
  tags: [vendor-management, healthcare, compliance, intermediate]

state: {}

trigger: |
  You're the Procurement Manager at a 500-bed hospital
  system ($800M annual revenue) with 1,200 active
  vendors. A recent Joint Commission survey identified
  vendor management as an area requiring improvement,
  specifically citing lack of documented procedures for
  vendor qualification, absence of ongoing performance
  monitoring, and inadequate vendor access controls.

  Current vendor management problems:
  - No standardized vendor qualification process (some
    vendors are approved by a department head's email,
    others go through a months-long process)
  - Vendor credentialing for on-site access is managed
    by 3 different departments with different requirements
  - No risk-based vendor categorization (a janitorial
    supplier goes through the same process as a medical
    device vendor)
  - Performance reviews happen only when there's a
    problem (no proactive monitoring)
  - Contract compliance monitoring is manual and sporadic
  - Vendor insurance and license verification is done at
    onboarding but never re-verified
  - No process for emergency vendor engagement (when a
    critical supplier fails and you need an alternative
    immediately)

  Vendor categories:
  - Medical devices and equipment (FDA-regulated)
  - Pharmaceuticals (DEA, state pharmacy board)
  - IT systems and services (HIPAA BAA required)
  - Clinical services (staffing agencies, consulting)
  - Facilities and construction
  - Food services
  - General supplies and office products

  Compliance requirements:
  - Joint Commission standards
  - HIPAA (BAA for vendors with PHI access)
  - DEA (controlled substance vendors)
  - State hospital licensing requirements
  - FDA device tracking requirements
  - Group Purchasing Organization (GPO) contract compliance

  Systems:
  - Workday (ERP/procurement)
  - Vendormate (credentialing — underutilized)
  - Contract Logix (contract management)

  Task: Write SOPs for vendor onboarding/qualification,
  vendor risk categorization, ongoing performance
  monitoring, vendor credentialing for on-site access,
  and emergency vendor engagement. Include risk-based
  tiering criteria, qualification checklists by vendor
  category, and performance scorecard methodology.

assertions:
  - type: llm_judge
    criteria: "Response produces comprehensive vendor management SOPs — covers onboarding/qualification with risk-based tiering (not one-size-fits-all); includes category-specific requirements (medical device vendors need different qualification than office supply vendors); defines ongoing performance monitoring with specific KPIs and review frequency; addresses vendor credentialing for on-site access; includes emergency vendor engagement procedure; the SOPs address all Joint Commission findings."
    weight: 0.35
    description: "ComprehensiveVendorSOPs"
  - type: llm_judge
    criteria: "Response addresses healthcare-specific compliance — includes HIPAA BAA requirements for vendors with PHI access; addresses DEA requirements for pharmaceutical vendors; includes FDA device tracking; defines insurance and license re-verification schedule; addresses GPO contract compliance monitoring; the SOPs reflect healthcare procurement reality (clinical vs non-clinical vendors, patient safety considerations)."
    weight: 0.35
    description: "HealthcareCompliance"
  - type: llm_judge
    criteria: "Response includes practical tools — provides vendor risk categorization matrix with clear criteria; includes qualification checklists by vendor category; defines performance scorecard methodology with measurable KPIs; references actual systems (Workday, Vendormate, Contract Logix); addresses the 1,200 active vendor scale; the SOPs could be implemented with existing staff and systems."
    weight: 0.30
    description: "PracticalTools"
