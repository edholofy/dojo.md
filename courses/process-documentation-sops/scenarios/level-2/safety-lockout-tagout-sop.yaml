meta:
  id: safety-lockout-tagout-sop
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write OSHA-compliant lockout/tagout SOPs for a chemical processing plant covering energy control procedures, training, and periodic inspection"
  tags: [safety, lockout-tagout, osha, chemical, intermediate]

state: {}

trigger: |
  You're the Safety Manager at a 250-person chemical
  processing plant that produces industrial adhesives
  and sealants. OSHA conducted an inspection after an
  employee suffered severe chemical burns when a valve
  was opened during maintenance on a reactor vessel.
  The investigation revealed that the energy isolation
  procedure was not followed — specifically, the thermal
  energy from the exothermic reaction and the chemical
  energy from the pressurized vessel were not addressed
  in the lockout procedure.

  OSHA citations received:
  - Serious violation: 29 CFR 1910.147(c)(4)(i) — Energy
    control procedures do not address all energy sources
  - Serious violation: 29 CFR 1910.147(c)(7)(i) — Periodic
    inspection of energy control procedures not conducted
  - Other-than-serious: 29 CFR 1910.147(c)(7)(iv) —
    Periodic inspection certification incomplete
  - Proposed penalty: $87,000

  Energy sources in your facility:
  - Electrical (motors, control systems, heating elements)
  - Mechanical (agitators, conveyors, pumps)
  - Hydraulic (press systems, valve actuators)
  - Pneumatic (compressed air systems, pneumatic valves)
  - Chemical (reactive materials, pressurized vessels)
  - Thermal (heated reactors, steam systems, cooling
    systems)
  - Gravitational (elevated tanks, hopper systems)
  - Stored/residual energy (capacitors, springs, elevated
    loads)

  Equipment requiring LOTO procedures:
  - 12 reactor vessels (chemical + thermal + mechanical)
  - 8 mixing tanks (mechanical + chemical)
  - 3 packaging lines (electrical + mechanical + pneumatic)
  - 2 boiler systems (thermal + electrical + pressure)
  - 15 pump systems (electrical + mechanical + hydraulic)
  - Multiple conveyor systems (electrical + mechanical +
    gravitational)

  Current LOTO program deficiencies:
  - Generic LOTO procedure used for all equipment (doesn't
    address equipment-specific energy sources)
  - No machine-specific energy control procedures (MSECPs)
  - Annual periodic inspections not documented
  - Training records don't distinguish between authorized
    and affected employees
  - Group lockout procedures not documented
  - Shift transfer procedures during extended maintenance
    not defined

  Task: Write the corrective action plan for OSHA, create
  the energy control program document, write 3 machine-
  specific energy control procedures (reactor vessel,
  packaging line, boiler system), design the training
  program, and create the periodic inspection protocol.
  Include the group lockout and shift transfer procedures.

assertions:
  - type: llm_judge
    criteria: "Response produces OSHA-compliant LOTO documentation — addresses each citation with specific corrective actions; the energy control program meets 29 CFR 1910.147 requirements; machine-specific procedures identify ALL energy sources for each equipment type (the reactor vessel must address chemical, thermal, mechanical, pressure, and residual energy); procedures include energy isolation, lockout application, stored energy verification, and release from lockout; the documentation would satisfy OSHA upon re-inspection."
    weight: 0.35
    description: "OSHACompliantLOTO"
  - type: llm_judge
    criteria: "Response includes machine-specific energy control procedures — the 3 MSECPs (reactor vessel, packaging line, boiler system) each list specific isolation points, types and magnitudes of energy, lockout device requirements, and stored/residual energy verification methods; procedures are detailed enough for an authorized employee to safely isolate all energy sources; includes clear verification steps (try-start, pressure gauge check, temperature verification); addresses the chemical energy hazard that caused the original incident."
    weight: 0.35
    description: "MachineSpecificProcedures"
  - type: llm_judge
    criteria: "Response addresses program management requirements — includes training program distinguishing between authorized employees, affected employees, and other employees; defines group lockout procedures for complex maintenance; addresses shift transfer during extended maintenance; creates periodic inspection protocol with certification documentation; the program addresses all current deficiencies; includes implementation timeline for abating OSHA citations within the penalty timeline."
    weight: 0.30
    description: "ProgramManagement"
