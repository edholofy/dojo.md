meta:
  id: intermediate-sop-shift
  level: 2
  course: process-documentation-sops
  type: output
  description: "Shift simulation — handle a regulatory audit, an SOP failure investigation, and a system migration documentation challenge simultaneously"
  tags: [shift-simulation, multi-challenge, regulatory, intermediate]

state: {}

trigger: |
  You're the Quality and Compliance Manager at a
  250-person medical device manufacturer. It's Monday
  morning and three situations demand your attention
  simultaneously.

  SITUATION 1 — SURPRISE FDA AUDIT (8:00 AM):
  An FDA investigator has arrived for an unannounced
  inspection under 21 CFR 820 (Quality System Regulation).
  They've requested your document control procedures,
  training records for the past 2 years, and CAPA
  (Corrective and Preventive Action) log. You know that
  your document control SOP was updated 6 months ago but
  the old version is still in circulation on the
  production floor. You also know that 15% of your
  training records are missing (people were trained but
  nobody documented it). You have 30 minutes before the
  investigator begins reviewing documents.

  SITUATION 2 — SOP FAILURE INVESTIGATION (8:30 AM):
  The production supervisor reports that a batch of
  Class II medical devices failed final inspection — 200
  units with a dimensional defect. Investigation reveals
  that the machining SOP specifies a tolerance of ±0.005"
  but the operator was using a version of the SOP from
  2023 that specified ±0.010". The document control
  system shows the current version was released 4 months
  ago, but the workstation still had the old laminated
  copy. This is the second time in 6 months that an
  outdated SOP has caused a quality issue.

  SITUATION 3 — ERP MIGRATION DOCUMENTATION (9:00 AM):
  The company is migrating from a legacy ERP system to
  SAP in 8 weeks. The IT team has the technical migration
  covered, but nobody has addressed the 45 SOPs that
  reference the legacy system (screen names, menu paths,
  report names, field locations). The VP of Operations
  wants a plan by end of week for updating all 45 SOPs
  to reference SAP, training staff on the new procedures,
  and ensuring no production disruption during the
  transition.

  Task: Address all three situations: prepare for the
  FDA audit (what to do in the next 30 minutes, how to
  address the gaps), investigate the SOP failure and
  create a CAPA, and develop the ERP migration
  documentation plan. Prioritize appropriately and
  demonstrate that you can manage simultaneous compliance
  pressures.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three situations with appropriate prioritization — the FDA audit gets immediate attention (30-minute preparation plan, gap mitigation strategy, honest but strategic approach to known issues); the SOP failure investigation includes root cause analysis and CAPA with corrective and preventive actions; the ERP migration plan is practical with phased approach and risk mitigation; priorities are correctly sequenced (FDA first, quality investigation second, migration plan third)."
    weight: 0.35
    description: "AllSituationsAddressed"
  - type: llm_judge
    criteria: "Response demonstrates regulatory competence — the FDA audit preparation shows understanding of 21 CFR 820 requirements; the CAPA follows proper structure (problem description, root cause, corrective action, preventive action, effectiveness check); addresses the systemic document control failure (why do old SOPs remain in circulation?); the CAPA prevents recurrence, not just fixes the current batch; demonstrates knowledge of FDA inspection dynamics."
    weight: 0.35
    description: "RegulatoryCompetence"
  - type: llm_judge
    criteria: "Response shows practical quality management — the migration plan addresses the 45 SOP updates with realistic timeline, resource requirements, and validation approach; proposes improvements to document control that prevent old versions from remaining in circulation; addresses the training record gaps with both immediate and long-term solutions; a medical device quality professional would find these responses credible and actionable."
    weight: 0.30
    description: "PracticalQualityManagement"
