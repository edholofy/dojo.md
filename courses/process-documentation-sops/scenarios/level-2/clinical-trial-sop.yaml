meta:
  id: clinical-trial-sop
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write clinical trial SOPs for a biotech startup conducting its first Phase II trial covering protocol compliance, adverse event reporting, and data management"
  tags: [clinical-trial, gcp, biotech, regulatory, intermediate]

state: {}

trigger: |
  You're the Director of Clinical Operations at a
  45-person biotech startup preparing for its first
  Phase II clinical trial. The company has a promising
  oncology drug candidate and has enrolled its first
  patients at 8 clinical sites across the US. The FDA
  requires documented SOPs for Good Clinical Practice
  (GCP) compliance, and your clinical research
  organization (CRO) partner has flagged that your SOP
  library is incomplete.

  SOPs needed urgently (trial enrollment has started):
  1. Adverse Event (AE) reporting and classification
  2. Informed consent process
  3. Protocol deviation management
  4. Source document verification
  5. Investigational product accountability

  Trial details:
  - Phase II, randomized, double-blind, placebo-controlled
  - 120 patients across 8 sites
  - 12-month treatment period + 6-month follow-up
  - CRO: Medpace (managing site monitoring)
  - EDC system: Medidata Rave
  - IVRS: Signant Health (randomization/drug supply)
  - Safety database: Argus Safety

  Regulatory requirements:
  - 21 CFR Part 11 (electronic records)
  - ICH E6 (R2) Good Clinical Practice
  - FDA IND regulations (21 CFR 312)
  - IRB oversight requirements
  - SAE reporting: 24 hours to sponsor, 15 days to FDA
    (7 days for fatal/life-threatening)

  Task: Write the Adverse Event Reporting SOP and the
  Protocol Deviation Management SOP. Each must include
  classification criteria, reporting timelines, roles and
  responsibilities (site, CRO, sponsor), documentation
  requirements, and escalation procedures. The SOPs must
  comply with ICH E6 and FDA regulations.

assertions:
  - type: llm_judge
    criteria: "Response produces GCP-compliant SOPs — the AE reporting SOP includes correct classification (AE vs SAE vs SUSAR), causality assessment criteria, regulatory reporting timelines (24-hour initial, 15-day follow-up, 7-day for fatal), responsible parties at each level (site investigator, CRO monitor, sponsor safety team, FDA); the Protocol Deviation SOP classifies deviations by severity (minor, major, critical), defines reporting requirements, and addresses corrective and preventive actions; both SOPs comply with ICH E6 and 21 CFR 312."
    weight: 0.35
    description: "GCPCompliantSOPs"
  - type: llm_judge
    criteria: "Response includes practical clinical operations elements — references the actual systems (Medidata Rave, Argus Safety, Signant Health); includes decision trees for AE classification and causality; provides sample forms or data entry workflows; addresses the relationship between sponsor, CRO (Medpace), and clinical sites; includes training requirements for site staff and monitors; the SOPs are usable by a clinical research coordinator at a study site."
    weight: 0.35
    description: "PracticalClinicalOperations"
  - type: llm_judge
    criteria: "Response demonstrates understanding of clinical trial context — recognizes the urgency (trial enrollment has started without complete SOPs); addresses 21 CFR Part 11 requirements for electronic records; includes audit trail requirements; addresses blinding protection in safety reporting for a double-blind study; the SOPs would pass an FDA inspection or sponsor audit; appropriate for a small biotech conducting its first Phase II trial."
    weight: 0.30
    description: "ClinicalTrialContext"
