meta:
  id: change-management-sop
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write a change management SOP for an IT services company covering change request, risk assessment, approval, implementation, and post-implementation review"
  tags: [change-management, itil, it-services, intermediate]

state: {}

trigger: |
  You're the IT Service Manager at a 300-person IT
  services company that manages infrastructure for 40
  mid-market clients. After a failed change caused a
  12-hour outage for your largest client (a hospital
  system), resulting in a $200K SLA penalty and near-
  loss of the account, the VP of Operations demands a
  formal change management SOP based on ITIL practices.

  Current change management (informal):
  - Engineers make changes whenever they think it's
    needed
  - No formal change request or approval process
  - No risk assessment before changes
  - No testing requirements defined
  - Rollback plans are "in the engineer's head"
  - No change freeze periods (even during client-critical
    operations like month-end or shift changes)
  - No post-implementation review
  - Change history is in Slack messages and memory

  The incident that triggered this:
  - Engineer applied a firewall rule change to production
    instead of staging
  - The change blocked the hospital's EMR system access
  - No rollback plan existed — took 12 hours to identify
    and fix
  - Nobody knew the change was happening
  - Client found out from their users, not from your team

  Client environments:
  - 40 clients, each with separate network/server
    infrastructure
  - Mix of on-premises and cloud (AWS, Azure)
  - Some clients have compliance requirements (HIPAA,
    PCI-DSS, SOX)
  - SLA commitments: 99.9% uptime for Tier 1 clients

  Systems:
  - ConnectWise for ticketing and client management
  - Jira for internal project tracking
  - Confluence for documentation
  - PagerDuty for alerting

  Task: Write a comprehensive change management SOP
  covering change categorization (standard, normal,
  emergency), change request submission, risk assessment
  methodology, approval workflows by change type and
  client tier, testing and validation requirements,
  implementation procedures, rollback plans, communication
  requirements, and post-implementation review. Include
  change freeze policies and special requirements for
  regulated clients (HIPAA, PCI-DSS).

assertions:
  - type: llm_judge
    criteria: "Response produces a comprehensive ITIL-aligned change management SOP — defines change categories (standard, normal, emergency) with clear criteria for each; includes change request form with required fields; provides risk assessment methodology (impact × probability matrix); defines approval workflows that vary by change type, risk level, and client tier; addresses testing and validation requirements before implementation; the SOP would prevent the hospital outage scenario."
    weight: 0.35
    description: "ComprehensiveITILAlignedSOP"
  - type: llm_judge
    criteria: "Response addresses operational requirements — includes rollback plan requirements (documented before every change, tested for high-risk changes); defines communication requirements (client notification, internal team awareness); establishes change freeze policies (month-end, holidays, client-critical periods); addresses regulated client requirements (HIPAA change documentation, PCI-DSS change windows); defines post-implementation review process; references actual tools (ConnectWise, Jira, Confluence, PagerDuty)."
    weight: 0.35
    description: "OperationalRequirements"
  - type: llm_judge
    criteria: "Response is practical for an MSP environment — acknowledges the multi-client complexity (40 clients with different environments and requirements); doesn't create so much overhead that routine changes become impractical; provides a fast-track for emergency changes while maintaining documentation; includes CAB (Change Advisory Board) structure appropriate for a 300-person company; the SOP balances control with operational agility."
    weight: 0.30
    description: "PracticalForMSP"
