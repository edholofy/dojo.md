meta:
  id: food-safety-haccp-sop
  level: 2
  course: process-documentation-sops
  type: output
  description: "Write HACCP-compliant food safety SOPs for a mid-size food manufacturing company covering critical control points, monitoring, and corrective actions"
  tags: [food-safety, haccp, manufacturing, regulatory, intermediate]

state: {}

trigger: |
  You're the Food Safety Manager at a 180-person snack
  food manufacturer ($35M revenue) that produces granola
  bars, trail mix, and dried fruit products. A recent FDA
  inspection resulted in 3 observations (Form 483):
  1. Inadequate allergen control procedures
  2. Insufficient monitoring of critical control points
  3. Corrective action records incomplete

  You have 15 business days to respond with a corrective
  action plan. The company's existing SOPs are outdated
  (last revised 2019) and don't reflect current production
  lines or FDA requirements under FSMA.

  Production overview:
  - 3 production lines (granola bars, trail mix, dried
    fruit)
  - Major allergens present: tree nuts (almonds, cashews),
    peanuts, wheat, soy, milk (in chocolate chips)
  - All 3 lines share equipment (changeover between
    products)
  - Daily production: 40,000 units across all lines

  Critical control points (CCPs):
  - CCP-1: Metal detection (all lines, post-packaging)
  - CCP-2: Oven temperature (granola bar line, baking)
  - CCP-3: Water activity measurement (dried fruit line)
  - CCP-4: Allergen changeover verification (all lines)

  Current problems:
  - Metal detector logs have gaps (operators skip checks
    during rush periods)
  - Oven temperature is monitored but corrective action
    for deviations isn't documented
  - Allergen changeover uses visual inspection only (no
    swab testing)
  - Training records for food safety are 18 months old
  - No prerequisite program documentation (sanitation,
    pest control, supplier approval)

  Task: Write the corrective action response to the FDA
  483 and create updated SOPs for allergen control,
  CCP monitoring and corrective action, and sanitation
  (prerequisite program). Include monitoring forms, CCP
  decision trees, and the training plan for production
  staff.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible FDA 483 response — addresses each of the 3 observations with specific corrective actions, responsible parties, and completion dates; the response format follows FDA expectations; corrective actions are both immediate (fix the current gap) and preventive (prevent recurrence); the response would satisfy an FDA investigator and prevent escalation to a Warning Letter."
    weight: 0.35
    description: "CredibleFDA483Response"
  - type: llm_judge
    criteria: "Response creates compliant food safety SOPs — the allergen control SOP addresses changeover procedures with verification testing (not just visual inspection), product scheduling to minimize changeovers, labeling verification, and supplier allergen documentation; the CCP monitoring SOP defines monitoring frequency, critical limits, corrective actions for deviations, and verification procedures; the sanitation SOP addresses cleaning validation, chemical concentrations, and environmental monitoring; SOPs follow HACCP principles and FSMA requirements."
    weight: 0.35
    description: "CompliantFoodSafetySOPs"
  - type: llm_judge
    criteria: "Response includes practical monitoring tools — provides monitoring forms/logs for each CCP; includes allergen changeover checklist with swab testing protocol; defines what constitutes a deviation and the specific corrective actions; includes a training plan with competency verification; the forms and tools could be used by production operators on the manufacturing floor; addresses the gap-in-logs problem with accountability measures."
    weight: 0.30
    description: "PracticalMonitoringTools"
