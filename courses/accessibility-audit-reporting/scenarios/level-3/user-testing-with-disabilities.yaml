meta:
  id: user-testing-with-disabilities
  level: 3
  course: accessibility-audit-reporting
  type: output
  description: "User testing with disabilities — plan and report on usability testing sessions with users who have various disabilities"
  tags: [user-testing, usability, disabilities, research, advanced]

state: {}

trigger: |
  A senior auditor says: "Our client's legal team
  says automated and manual expert auditing isn't
  enough. They want evidence that people with
  disabilities can actually use their product.

  They're asking us to conduct usability testing
  with users who have disabilities and include the
  findings in our audit report. I've done regular
  usability testing but never specifically with
  disabled participants.

  Questions:
  1. How do I recruit participants with different
     disabilities?
  2. What accommodations do I need for the sessions?
  3. How is the testing protocol different?
  4. How do I report usability findings alongside
     WCAG compliance findings?
  5. Is this different from expert accessibility
     testing?

  How do I plan and conduct accessible usability
  testing?"

  Task: Design a user testing plan with disabled
  participants and show how to incorporate findings
  into an accessibility audit report.

assertions:
  - type: llm_judge
    criteria: "Response designs participant recruitment and session planning — disability representation (recruit across disability types: 2-3 screen reader users who are blind, 2-3 users with low vision using magnification, 2-3 users with motor disabilities using alternative input — switch, voice control, 2-3 users with cognitive disabilities, 1-2 deaf/hard of hearing users — minimum 8-10 participants across groups), recruitment approach (partner with disability organizations, use accessibility-focused research panels like Fable or AbilityNet, compensate participants fairly — at least $100/hour, allow extra time per session: 75-90 minutes instead of standard 60), session accommodations (provide materials in accessible formats in advance, ensure video conferencing platform is accessible — Zoom with captions, offer in-person or remote options, have technical support available to troubleshoot assistive technology, allow participants to use their own devices and assistive technology)"
    weight: 0.35
    description: "RecruitmentPlanning"
  - type: llm_judge
    criteria: "Response covers testing protocol and methodology — adapted protocol (task-based testing with accessibility-specific tasks: 'Navigate to your account settings using only your keyboard', 'Find the phone number on the contact page using your screen reader', 'Complete the registration form using voice control'), observation focus (note: task completion — can they complete the task at all? time on task — how long does it take compared to non-disabled baseline? error rate — how many wrong paths or retries? satisfaction — subjective assessment of difficulty? assistive technology conflicts — does the AT behave unexpectedly? workarounds — do participants develop their own workarounds for inaccessible features?), facilitation differences (don't help or provide hints even if participant struggles — document the struggle as a finding, don't assume what the participant can or can't do — let them show you, ask about their usual workflow: 'How would you normally find this on other websites?', use think-aloud protocol adapted: screen reader users may pause narration while AT speaks), and ethical considerations (informed consent in accessible format, right to stop at any time, don't make participants feel like test subjects — they're expert users providing valuable feedback)"
    weight: 0.35
    description: "TestingProtocol"
  - type: llm_judge
    criteria: "Response shows how to integrate findings into audit report — findings format (separate section: 'User Testing with Disabled Participants' with: participant demographics table without identifying information, task completion rates by disability group, key observations organized by theme, verbatim quotes illustrating impact — 'I would normally give up at this point and call customer service instead'), integration with WCAG findings (cross-reference: WCAG finding ID + user testing observation: 'Finding A-003: Missing form labels — during user testing, 3 of 3 screen reader participants were unable to complete the registration form, confirming the severity of this WCAG 1.3.1 violation'), unique insights from user testing (issues that expert auditing missed: users with cognitive disabilities confused by icon-only navigation despite technically meeting WCAG, low vision users struggling with layout at 200% zoom despite passing reflow criteria — the zoomed layout was technically accessible but practically unusable), and how user testing evidence strengthens the report (provides real-world impact data that complements technical findings, transforms abstract WCAG violations into concrete user stories, gives the client evidence for prioritization: issues that caused task failure for real users are highest priority)"
    weight: 0.30
    description: "ReportIntegration"
