meta:
  id: advanced-audit-shift
  level: 3
  course: accessibility-audit-reporting
  type: output
  description: "Advanced audit shift — handle a week of complex accessibility audit challenges including WCAG 2.2 mapping, third-party components, and CI/CD integration"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You're a senior accessibility auditor. Your week:

  MONDAY — A government agency requires a full WCAG
  2.2 Level AA conformance report for their citizen
  portal. The portal has 200+ pages including complex
  forms, data tables, PDF downloads, and embedded
  maps. You need to design the audit scope, sampling
  strategy, and reporting format for the conformance
  mapping.

  WEDNESDAY — A major SaaS platform is launching a
  new dashboard feature built with React. It uses
  custom chart components, drag-and-drop widgets,
  real-time data updates, and a complex filter panel.
  The engineering team says they're "accessibility
  ready" but have never tested with a screen reader.
  Conduct the audit and report findings.

  FRIDAY — The CTO asks: "We keep fixing accessibility
  issues that come back. How do we prevent regressions?"
  Design an accessibility testing strategy that
  integrates with their CI/CD pipeline, including
  what to automate, what to test manually, and how
  to report on continuous compliance.

  Task: Handle all three advanced audit challenges.

assertions:
  - type: llm_judge
    criteria: "Response designs the government conformance audit — sampling strategy (200+ pages: identify page templates — if 200 pages use 15 templates, audit all 15 template types plus key user journeys like form submission, PDF download, account creation, select 3-5 representative pages per template for a sample of 45-75 pages), conformance mapping approach (criterion-by-criterion assessment of all ~50 Level A and AA criteria, status per criterion: Supports, Partially Supports, Does Not Support, Not Applicable, with remarks referencing specific test results and page URLs), reporting format (executive summary with overall conformance statement, full WCAG 2.2 conformance table, detailed findings for each failure, methodology section documenting tools, browsers, assistive technologies, and sample pages), and new WCAG 2.2 criteria specifically tested (2.4.11 Focus Not Obscured, 2.5.7 Dragging Movements, 2.5.8 Target Size, 3.2.6 Consistent Help, 3.3.7 Redundant Entry, 3.3.8 Accessible Authentication)"
    weight: 0.35
    description: "GovernmentConformance"
  - type: llm_judge
    criteria: "Response audits the React dashboard — chart accessibility (custom charts need text alternatives or data tables — screen reader users need to access the data represented visually, interactive chart elements need keyboard focus and labels), drag-and-drop widgets (WCAG 2.5.7: must have keyboard alternative — button-based move/resize or arrow key repositioning), real-time data updates (WCAG 4.1.3: data refreshes must announce via aria-live regions without disrupting screen reader users reading other content — polite for routine updates, assertive for alerts), filter panel (keyboard operability: all filters accessible via keyboard, filter results announced, clear filters button accessible, applied filter count communicated). Includes specific screen reader test results with verbatim announcements for each component"
    weight: 0.35
    description: "DashboardAudit"
  - type: llm_judge
    criteria: "Response designs the CI/CD regression prevention strategy — automated layer (axe-core in component tests catching ARIA violations and contrast issues, Lighthouse CI on PR preview deploys for page-level checks, custom rules for organization-specific patterns), manual layer (quarterly manual audits with screen reader and keyboard testing, user testing with people with disabilities annually), reporting layer (automated accessibility score tracked over time on dashboard, regression alerts when score drops, monthly accessibility compliance report to leadership), and implementation plan (Phase 1: add axe-core to existing test suite — warning only, Phase 2: make Critical violations block PR merges, Phase 3: expand to Major violations, Phase 4: continuous monitoring in production). Addresses the CTO's concern about regression prevention specifically"
    weight: 0.30
    description: "RegressionPrevention"
