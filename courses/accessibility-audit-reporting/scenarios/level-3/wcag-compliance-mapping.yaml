meta:
  id: wcag-compliance-mapping
  level: 3
  course: accessibility-audit-reporting
  type: output
  description: "WCAG 2.2 compliance mapping — create comprehensive WCAG conformance reports mapping every applicable criterion to audit findings"
  tags: [WCAG-2.2, compliance, mapping, conformance, advanced]

state: {}

trigger: |
  A senior auditor says: "A government agency client
  requires a full WCAG 2.2 Level AA conformance
  report — not just a list of issues, but a
  criterion-by-criterion assessment showing the
  compliance status of every applicable WCAG success
  criterion.

  For each of the ~50 Level A and AA criteria, I need
  to document:
  - Does the product pass or fail this criterion?
  - If it partially passes, which pages pass and
    which fail?
  - If it's not applicable, why not?

  The client says: 'We need this for our legal
  compliance records. A findings-based report isn't
  enough — we need to demonstrate systematic
  evaluation of every criterion.'

  How do I create a WCAG conformance mapping report?"

  Task: Create a WCAG 2.2 Level AA conformance
  mapping report structure with example entries
  showing pass, fail, partial, and N/A assessments.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured conformance mapping — report format (table with columns: WCAG SC Number, SC Name, Level, Conformance Status: Supports/Partially Supports/Does Not Support/Not Applicable, Remarks explaining the assessment), organized by WCAG principle and guideline (Principle 1 Perceivable → Guideline 1.1 Text Alternatives → SC 1.1.1 Non-text Content → assessment, Principle 2 Operable → Guideline 2.1 Keyboard Accessible → SC 2.1.1 Keyboard → assessment), example entries demonstrating each status: Supports ('SC 1.1.1: All content images have descriptive alt text. Decorative images use empty alt attribute. Testing confirmed on all 15 audited pages.'), Partially Supports ('SC 1.4.3: Body text meets 4.5:1 contrast ratio. However, secondary labels on the dashboard use #999 on #FFF = 2.85:1, failing the minimum ratio on 3 of 15 pages.'), Does Not Support ('SC 2.1.1: Custom dropdown menus and the date picker component cannot be operated with keyboard. Affects 8 of 15 pages.'), Not Applicable ('SC 1.2.1: No audio-only content exists on the audited pages.')"
    weight: 0.35
    description: "ConformanceMapping"
  - type: llm_judge
    criteria: "Response covers new WCAG 2.2 criteria specifically — new criteria added in WCAG 2.2 that must be evaluated: SC 2.4.11 Focus Not Obscured (Minimum) Level AA (focused element must not be entirely hidden by author-created content like sticky headers or cookie banners — test by tabbing through page with all overlays present), SC 2.4.13 Focus Appearance Level AAA (focus indicator must have minimum contrast and area — not required at AA but good to assess), SC 2.5.7 Dragging Movements Level AA (drag operations must have single-pointer alternative — test all drag-and-drop interfaces for button-based alternatives), SC 2.5.8 Target Size Minimum Level AA (interactive targets minimum 24x24 CSS pixels with spacing exemptions — measure all clickable elements), SC 3.2.6 Consistent Help Level A (help mechanisms like chat, phone, contact page must appear in consistent location across pages), SC 3.3.7 Redundant Entry Level A (information already provided shouldn't be re-entered in multi-step processes — test checkout and registration flows), SC 3.3.8 Accessible Authentication Minimum Level AA (login must not require cognitive function tests like CAPTCHA without alternatives). Each criterion includes how to test and how to document in the mapping"
    weight: 0.35
    description: "WCAG22Criteria"
  - type: llm_judge
    criteria: "Response explains conformance methodology and report quality — sampling strategy for large sites (can't test every page: define representative sample covering every page template and user flow, document which pages were sampled and why, note that conformance claim applies to sampled pages — extrapolated to similar pages), conformance levels explained (Conformance Level A: all Level A criteria met, Conformance Level AA: all Level A AND Level AA criteria met — a single Level A failure means the site does not conform at any level), partial conformance approach (if full conformance isn't achievable: document 'Statement of Partial Conformance' with specific criteria that are not met and timeline for remediation), and report quality standards (each criterion assessment must be evidence-based — reference specific test results, page URLs, and tools used, avoid subjective assessments: 'appears accessible' — instead: 'tested with NVDA on Chrome, all form fields announced their labels correctly', include testing methodology section detailing: tools, assistive technologies, browsers, devices, and sample pages)"
    weight: 0.30
    description: "ConformanceMethodology"
