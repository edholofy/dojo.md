meta:
  id: accessibility-executive-strategy
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility executive strategy — develop C-suite business case for accessibility investment with ROI projections, risk analysis, and strategic positioning"
  tags: [strategy, executive, ROI, business-case, master]

state: {}

trigger: |
  A Chief Accessibility Officer says: "I'm presenting
  to the CEO and board next month. They want answers:

  1. What's our legal risk if we don't invest in
     accessibility? Quantify it.
  2. What's the business opportunity if we do invest?
     Beyond just avoiding lawsuits.
  3. How much should we invest? What's the ROI?
  4. How do we compare to our competitors?
  5. What's the 3-year strategic roadmap?

  The CFO is skeptical: 'Accessibility sounds like a
  cost center. Show me revenue impact.'

  The CTO says: 'We'll add it to the backlog.'
  I need to counter both.

  Build me the executive business case."

  Task: Create a comprehensive executive accessibility
  business case with financial modeling, risk
  quantification, and strategic roadmap.

assertions:
  - type: llm_judge
    criteria: "Response builds a quantified business case — risk quantification (legal: average ADA web accessibility settlement $50K-$300K for first offense, class action settlements $1M-$10M, litigation defense costs $200K-$500K regardless of outcome — calculate expected annual legal cost based on industry lawsuit rate × company exposure, operational: accommodation costs for employees with disabilities using inaccessible tools — $X per employee per year in workarounds and productivity loss × number of affected employees, revenue: 15-20% of population has disabilities with $8T combined global spending power — calculate addressable market share being excluded), opportunity quantification (market expansion: accessible products reach 1.3B people with disabilities plus 2.4B friends/family who influence purchasing decisions, SEO improvement: accessibility improvements correlate with 30-50% improvement in search engine rankings — calculate traffic and conversion impact, brand loyalty: 71% of consumers with disabilities leave websites that are difficult to use — calculate customer retention value, talent acquisition: accessible workplace tools attract broader talent pool — reduce hiring costs by $X through wider candidate pool)"
    weight: 0.35
    description: "QuantifiedBusinessCase"
  - type: llm_judge
    criteria: "Response provides financial modeling and ROI — investment model (Year 1: $500K — team building: $250K for 2 FTE specialists + training program, tooling: $100K for automated scanning and monitoring, remediation: $150K for contractor support fixing existing issues. Year 2: $350K — ongoing team: $250K, tooling: $50K maintenance, training: $50K expansion. Year 3: $300K — steady state: team + tooling + training), returns model (Year 1: $200K saved in legal risk reduction + $100K in accommodation cost reduction = $300K. Year 2: $400K legal risk + $150K accommodation + $200K revenue from accessible products = $750K. Year 3: $500K legal + $200K accommodation + $500K revenue = $1.2M. Cumulative 3-year ROI: ($300K + $750K + $1.2M) - ($500K + $350K + $300K) = $1.1M net positive = 96% ROI), and CFO rebuttal (accessibility is not a cost center: it's risk reduction — insurance analogy: you don't call fire insurance a cost center, it's revenue enablement — every inaccessible product page is a sales rep turning away customers, frame investment as technical debt repayment — just like code refactoring, ignoring it makes future work more expensive)"
    weight: 0.35
    description: "FinancialModeling"
  - type: llm_judge
    criteria: "Response addresses competitive positioning and CTO rebuttal — competitive analysis (benchmark against 3-5 competitors: audit their public-facing products for accessibility, compare VPAT availability and quality, compare accessibility statements and commitments, present: 'Competitor A has dedicated accessibility team of 10, Competitor B publishes detailed VPATs quarterly, we have 0 dedicated staff and no VPAT — we are the laggard'), CTO rebuttal ('adding to backlog' means it never gets done — accessibility issues have been in backlogs for years at most companies without progress, frame as infrastructure: accessibility is like security — you don't add security to the backlog, you build it into the development process, show data: issues found in design cost 10x less to fix than issues found in production, accessibility testing in CI/CD prevents backlog growth), and strategic roadmap (Year 1 Foundation: hire team, establish processes, remediate critical barriers, Year 2 Integration: embed in development lifecycle, build design system accessibility, launch accessible products, Year 3 Leadership: achieve WCAG AA compliance, publish VPAT, position as industry leader, contribute to accessibility community — each year has measurable milestones and decision gates)"
    weight: 0.30
    description: "CompetitivePositioning"
