meta:
  id: global-standards-harmonization
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Global standards harmonization — navigate and harmonize accessibility standards across US, EU, Canada, and Asia-Pacific for multinational organizations"
  tags: [global, standards, harmonization, multinational, master]

state: {}

trigger: |
  A Global Chief Accessibility Officer says: "We
  operate in 30 countries. Each has different
  accessibility regulations:

  - US: ADA + Section 508 (WCAG 2.1 AA)
  - EU: European Accessibility Act + EN 301 549
  - UK: Equality Act + Public Sector Bodies Regulations
  - Canada: AODA + Accessible Canada Act
  - Australia: Disability Discrimination Act
  - Japan: JIS X 8341-3
  - South Korea: KWCAG
  - India: Rights of Persons with Disabilities Act

  Questions:
  1. Can we have one accessibility standard that
     satisfies all jurisdictions?
  2. Where do standards conflict or exceed each other?
  3. How do we audit for multi-jurisdictional compliance?
  4. How do we report to regulators in different
     countries?
  5. WCAG 3.0 is coming — how do we prepare?

  I need a unified global accessibility strategy."

  Task: Create a global accessibility standards
  harmonization strategy covering multi-jurisdictional
  compliance, unified auditing, and future-proofing.

assertions:
  - type: llm_judge
    criteria: "Response maps global standards landscape — standards comparison (all major standards reference or closely align with WCAG: US ADA references WCAG 2.1 AA, EU EN 301 549 normatively references WCAG 2.1 and adds software-specific requirements, UK mirrors EU requirements post-Brexit, Canada AODA references WCAG 2.0 AA, Australia DDA doesn't specify but courts apply WCAG, Japan JIS X 8341-3 closely mirrors WCAG 2.1, South Korea KWCAG mirrors WCAG 2.1 with Korean-specific additions, India RPWD references international best practices), unified approach (audit against WCAG 2.2 AA as the global baseline — this meets or exceeds all regional WCAG-based requirements, supplement with EN 301 549 additional requirements for EU compliance — these go beyond WCAG for software and mobile, address jurisdiction-specific additions: Korean language-specific requirements, Japanese JIS additions), and conflict analysis (no major conflicts between standards — they're all WCAG-based with regional additions, the strictest requirement wins in a harmonized approach — if EU requires something the US doesn't, apply it globally for consistency)"
    weight: 0.35
    description: "GlobalMapping"
  - type: llm_judge
    criteria: "Response designs multi-jurisdictional audit and reporting — unified audit methodology (single audit protocol testing against WCAG 2.2 AA + EN 301 549 additions = covers all jurisdictions, audit report includes jurisdiction-specific compliance sections: 'This finding affects compliance in the following jurisdictions: US ADA, EU EAA, UK Equality Act', regional audit teams with local expertise: understand local regulations, can communicate with local regulators), reporting by jurisdiction (EU: publish accessibility statement on website per EAA requirement — includes conformance status, limitations, feedback mechanism, date of assessment, US: maintain VPAT/ACR for procurement — update with each major release, UK: publish accessibility statement per GDS requirements — similar to EU but UK-specific format, all regions: annual compliance report to local legal teams with risk assessment), and audit frequency by jurisdiction (EU: accessibility statement must be reviewed annually minimum, US: no mandated frequency but quarterly monitoring recommended for ADA risk management, all: continuous automated monitoring across all properties with jurisdiction-specific dashboards)"
    weight: 0.35
    description: "MultijurisdictionalAudit"
  - type: llm_judge
    criteria: "Response addresses WCAG 3.0 preparation and future-proofing — WCAG 3.0 overview (major architectural change: moves from pass/fail success criteria to scoring-based conformance — bronze/silver/gold levels, new outcome-based testing rather than technique-based, expanded scope: cognitive accessibility, mobile, emerging technologies given more weight, timeline: still in development, likely 3-5 years from adoption — but organizations should start understanding the direction), future-proofing strategy (current investments in WCAG 2.2 AA will transfer to WCAG 3.0 — the underlying principles remain the same, invest in: user testing with disabled people — this will become more important in WCAG 3.0's outcome-based approach, invest in: cognitive accessibility — currently underserved in WCAG 2.x but prominent in 3.0, invest in: process and culture rather than just compliance — WCAG 3.0's scoring model rewards organizations that go beyond minimum), and governance structure (Global Accessibility Council: representatives from each major region, meets quarterly, owns the global standard, Regional Accessibility Leads: adapt global standard to local regulations, manage local audit programs, report to council, Standards Watch: dedicated person tracking regulatory changes across all 30 countries — early warning system for new requirements)"
    weight: 0.30
    description: "FutureProofing"
