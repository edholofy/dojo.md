meta:
  id: inclusive-design-culture
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Inclusive design culture transformation — transform organizational culture from compliance-driven to inclusion-driven accessibility"
  tags: [culture, transformation, inclusive-design, leadership, master]

state: {}

trigger: |
  A Chief Design Officer says: "We've been doing
  accessibility audits for 3 years. We fix issues.
  Then we create new ones. The cycle never ends because
  our teams see accessibility as a compliance checkbox,
  not a design value.

  Symptoms:
  - Designers say 'accessibility is the developer's
    job'
  - Developers say 'the audit will catch it'
  - PMs don't include accessibility in user stories
  - Users with disabilities aren't in our research
    participant pool
  - Our products are technically compliant but
    practically unusable for many disabled users

  I want to shift from 'audit and fix' to 'design
  and build inclusively from the start.' How do I
  transform the culture?"

  Task: Design a cultural transformation strategy
  that shifts the organization from compliance-driven
  to inclusion-driven accessibility.

assertions:
  - type: llm_judge
    criteria: "Response addresses root causes and reframes accessibility — mindset shift framework (from 'compliance checkbox' to 'design quality': accessibility is not an add-on — it's a measure of design quality, like performance or security, from 'someone else's job' to 'everyone's responsibility': designers own accessible designs, developers own accessible code, PMs own accessible requirements — same as quality ownership, from 'audit and fix' to 'build it right': shift investment from remediation to prevention — $1 spent in design saves $100 in remediation), empathy building (not just training — experience: have every team member complete 3 key tasks on their product using only a screen reader, using only keyboard, using only voice control — experiencing the barriers firsthand is more powerful than reading about them, user connection: establish ongoing relationship with users with disabilities — not just usability testing sessions but advisory panel that provides continuous feedback, disability simulation caveat: simulations are imperfect and controversial — pair with real user stories and relationships, don't use simulations as a substitute for involving disabled people)"
    weight: 0.35
    description: "CulturalReframing"
  - type: llm_judge
    criteria: "Response designs a multi-phase transformation program — Phase 1 Awareness (Months 1-3: executive commitment — CEO publicly states accessibility as company value, mandatory 2-hour inclusive design workshop for all staff, establish Disability Employee Resource Group, begin recruiting users with disabilities for research participant panel), Phase 2 Integration (Months 4-9: embed accessibility in design process — accessibility annotations required in all design reviews, embed in development — accessible component library and code review checklists, embed in product — accessibility acceptance criteria in every user story, embed in research — disabled participants in every research study), Phase 3 Ownership (Months 10-18: design teams conduct their own accessibility reviews — not waiting for external audit, development teams run automated accessibility tests — builds break on failures, PM teams write accessibility stories — not just retrofitting, QA teams include accessibility in every test plan), Phase 4 Innovation (Months 19-24: teams proactively design for edge cases and diverse abilities, accessibility insights drive product innovation — features designed for disabled users that benefit everyone, organization contributes to accessibility community — open-source accessible components, conference talks, published research)"
    weight: 0.35
    description: "TransformationProgram"
  - type: llm_judge
    criteria: "Response includes sustainability mechanisms and metrics — structural changes (accessibility in job descriptions and interview rubrics for all design and engineering roles, accessibility in performance reviews — not a separate metric but part of quality expectations, accessibility champions in every team with dedicated time allocation, accessible design patterns in design system — making the right thing the easy thing), culture metrics (awareness: % of staff who can name 3 WCAG principles — target 80%, behavior: % of designs that include accessibility annotations before review — target 100%, outcome: accessibility issues found in production vs found in design — ratio should shift toward design over time, inclusion: % of research studies including disabled participants — target 100%, satisfaction: disabled employee and user satisfaction surveys — trending upward), and anti-pattern prevention (don't create an 'accessibility police' culture — enable and support, don't audit and blame, don't outsource inclusion — hiring an accessibility team doesn't mean everyone else stops caring, don't celebrate compliance — celebrate inclusion, celebrate when a disabled user says 'this product is great' not when an auditor says 'this product passes')"
    weight: 0.30
    description: "SustainabilityMetrics"
