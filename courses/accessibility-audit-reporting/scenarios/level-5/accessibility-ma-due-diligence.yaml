meta:
  id: accessibility-ma-due-diligence
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility M&A due diligence — evaluate accessibility as part of merger and acquisition due diligence including risk assessment, remediation costing, and integration planning"
  tags: [M&A, due-diligence, acquisition, valuation, master]

state: {}

trigger: |
  A Chief Digital Officer says: "We're acquiring a
  healthcare SaaS company for $200M. During due
  diligence, our team evaluates technology, security,
  and compliance — but no one is looking at
  accessibility.

  The target company:
  - Serves 500 hospitals and 50K healthcare workers
  - Has a patient-facing portal used by 2M patients
  - Has never conducted an accessibility audit
  - Has no VPAT or accessibility documentation
  - Is subject to ADA, Section 508 (many hospital
    clients are government-funded), and HIPAA
  - Has 3 pending OCR complaints about inaccessible
    patient portal

  The CEO asks: 'Is accessibility a deal-breaker?
  If not, what's the risk and how do we price it
  into the deal?'

  Design the accessibility due diligence assessment."

  Task: Conduct accessibility due diligence for the
  acquisition including risk assessment, remediation
  costing, and deal impact analysis.

assertions:
  - type: llm_judge
    criteria: "Response designs the due diligence assessment — rapid accessibility evaluation (2-3 day assessment: automated scan of patient portal and provider platform, manual keyboard and screen reader testing of critical user journeys — patient login, appointment booking, medical records access, provider order entry, assessment of accessibility architecture — is the codebase structured for remediation or does it need fundamental rework?), risk identification (legal: 3 pending OCR complaints = active legal risk — each could result in $50K-$200K settlement plus remediation requirements, Section 508 exposure: government-funded hospital clients may require VPAT for continued use — if product can't produce VPAT, clients may switch to competitors, patient portal: ADA applies — 2M patients includes estimated 300K+ with disabilities who may face barriers, HIPAA intersection: if screen reader users can't access their medical records, this is both an accessibility and a healthcare access rights issue), assessment deliverable (accessibility risk scorecard: Critical/High/Medium/Low across dimensions — legal, operational, technical, reputational, with specific evidence for each rating)"
    weight: 0.35
    description: "DueDiligenceAssessment"
  - type: llm_judge
    criteria: "Response provides remediation costing and deal impact — remediation cost estimate (based on rapid assessment findings: if product has ~500 accessibility issues across platforms — Critical: 50 issues × $2K avg fix = $100K, Major: 150 issues × $1K avg = $150K, Minor: 300 issues × $300 avg = $90K, plus: VPAT creation $25K, accessibility team hiring 2 FTE = $300K/year, training program $50K, ongoing monitoring $50K/year — total Year 1 remediation: $765K, ongoing: $400K/year), deal impact analysis (remediation costs should be factored into acquisition price: $765K Year 1 + $400K ongoing × 5 years = $2.77M present value — negotiate price reduction or escrow, risk costs: 3 pending complaints estimated $150K-$600K settlement range + $500K legal defense = up to $1.1M, client retention risk: if 10% of government-funded hospital clients leave due to Section 508 non-compliance — calculate revenue impact), and recommendation to CEO (not a deal-breaker but a significant risk factor: reduce acquisition price by $3-5M to account for accessibility debt, require seller to resolve 3 OCR complaints before closing or escrow $1M for resolution, include accessibility remediation milestones in integration plan with 18-month timeline to full WCAG AA compliance)"
    weight: 0.35
    description: "CostingDealImpact"
  - type: llm_judge
    criteria: "Response includes integration planning — post-acquisition accessibility roadmap (Month 1-3: resolve 3 OCR complaints with targeted remediation, conduct comprehensive accessibility audit of all products, create VPAT for immediate client needs, Month 4-9: remediate all Critical and Major issues on patient portal, establish accessibility CI/CD pipeline preventing new issues, hire accessibility team and begin training program, Month 10-18: full WCAG AA compliance across all products, accessibility embedded in development lifecycle, ongoing monitoring and quarterly audits), client communication plan (proactively communicate to hospital clients: 'Under new ownership, we are investing $X in accessibility — here's our remediation timeline and commitment', provide VPAT to clients requesting Section 508 compliance documentation, establish accessibility feedback channel for client-reported issues), and due diligence checklist for future acquisitions (add accessibility to standard M&A due diligence: request VPAT, review accessibility complaint history, conduct rapid accessibility assessment, estimate remediation costs, evaluate accessibility team capability, assess legal exposure — prevent future acquisitions from being surprised by accessibility debt)"
    weight: 0.30
    description: "IntegrationPlanning"
