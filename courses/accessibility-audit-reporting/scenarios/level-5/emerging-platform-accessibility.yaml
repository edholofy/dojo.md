meta:
  id: emerging-platform-accessibility
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Emerging platform accessibility — audit and report on accessibility for VR/AR, voice interfaces, IoT, and emerging technology platforms"
  tags: [emerging, VR, AR, voice, IoT, master]

state: {}

trigger: |
  A Chief Product Officer says: "We're launching
  products on emerging platforms:

  1. A VR training application for employee onboarding
  2. An AR maintenance guide (technicians point phone
     at equipment to see instructions)
  3. A voice-first smart home control interface
  4. A kiosk/digital signage system for retail stores
  5. A wearable health monitoring dashboard

  Our accessibility team knows web and mobile, but
  these platforms don't have WCAG criteria that
  directly apply. We can't just ignore accessibility
  because standards are unclear.

  How do we audit emerging platforms? What principles
  apply? How do we report on platforms where the
  standards are still evolving?"

  Task: Create accessibility audit approaches for
  emerging technology platforms with principles-based
  evaluation and reporting.

assertions:
  - type: llm_judge
    criteria: "Response creates principles-based evaluation for VR and AR — VR accessibility audit (physical accessibility: VR excludes users who can't wear headsets or stand — require seated mode alternative, visual accessibility: VR relies heavily on vision — provide audio descriptions of environments, haptic feedback for navigation, captions for all speech and significant sounds, cognitive accessibility: VR can cause motion sickness — provide comfort settings: teleportation vs smooth locomotion, reduce visual complexity options, input accessibility: VR controllers require grip/dexterity — support alternative input: voice commands, gaze control, switch-compatible controllers, audit approach: evaluate each interaction for alternative modality — if it requires vision, is there audio? if it requires hand controllers, is there voice?), AR accessibility audit (screen reader compatibility: AR overlays on camera view must be readable by screen readers — provide text alternative to visual overlays, motor accessibility: AR requires holding phone and pointing — provide alternative access: save instructions for static viewing, contrast: AR text must be readable against variable real-world backgrounds — test in different lighting conditions, audio: AR audio instructions must have visual alternatives for deaf users)"
    weight: 0.35
    description: "VRARAudit"
  - type: llm_judge
    criteria: "Response covers voice, kiosk, and wearable accessibility — Voice interface audit (visual alternative: voice-first interface must have screen-based alternative for deaf users and users who can't speak, error recovery: voice misrecognition must offer easy correction — 'Did you mean turn off the lights? Say yes or correct me', discoverability: users must be able to learn available commands without guessing — provide command reference in accessible format, language support: voice recognition must handle accented speech, speech impediments — test with diverse speakers, privacy: voice commands in shared spaces may expose private information — provide silent alternative), Kiosk audit (physical accessibility: screen must be reachable from wheelchair — mount at accessible height with knee clearance, input accessibility: touchscreen must have alternative input — physical buttons, headphone jack with audio navigation, visual accessibility: high contrast mode, large text option, screen reader output via headphone jack, time limits: kiosk sessions must allow extended time for users who need it), Wearable audit (small screen: critical information must be legible — minimum text size, high contrast, haptic feedback as alternative to visual notifications, companion app: complex interactions should be available on paired phone with full accessibility — wearable handles simple interactions)"
    weight: 0.35
    description: "VoiceKioskWearable"
  - type: llm_judge
    criteria: "Response provides emerging platform audit methodology and reporting — principles-based audit framework (when platform-specific standards don't exist, apply WCAG principles: Perceivable — can users perceive all content through at least one sense? Operable — can users interact through at least one input method? Understandable — is the interface predictable and clear? Robust — does it work with available assistive technology? evaluate each interaction against all four principles, document which principles are met and which are not), reporting for emerging platforms (create emerging platform audit report template: Platform Description — what it is, who uses it, how they interact, Applicable Standards — cite relevant standards where they exist, note gaps, Principles-Based Evaluation — systematic review against POUR principles, Platform-Specific Findings — issues unique to this platform type, Recommendations — both immediate fixes and long-term architectural changes, Standards Gap Analysis — document where standards need to be developed for this platform), and contribution to standards (findings from emerging platform audits should feed into standards development: participate in W3C XR Accessibility group, contribute to emerging voice interface accessibility guidelines, share audit findings with industry working groups — help create the standards that don't exist yet)"
    weight: 0.30
    description: "EmergingMethodology"
