meta:
  id: master-audit-shift
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Master audit shift — handle a week of strategic accessibility challenges including regulatory crisis, global program launch, and industry keynote"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Global Chief Accessibility Officer of a
  Fortune 100 technology company. Your week:

  MONDAY — The European Commission announces
  enforcement actions against 3 companies in your
  industry for EAA non-compliance. Your EU legal team
  calls: "Are we next? We have 6 weeks to demonstrate
  compliance or face fines up to €300,000 per
  violation." Your EU products have never been
  formally audited. Design a 6-week emergency
  compliance response.

  WEDNESDAY — The CEO announces expansion into 5 new
  markets (Brazil, India, South Korea, Japan,
  Australia). Each has different accessibility
  regulations. The CEO says: "I want accessibility
  built in from day one in these markets — not
  retrofitted. How do we launch accessible products
  in markets we've never operated in?" Design the
  market entry accessibility strategy.

  FRIDAY — You discover that your company's
  accessibility VPAT claims "Supports" for several
  criteria that your own internal testing shows
  "Does Not Support." The VPAT was created by a
  well-meaning employee without adequate testing.
  Government clients rely on this VPAT for
  procurement decisions. How do you handle this
  VPAT integrity crisis?

  Task: Handle all three strategic accessibility
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response designs the EU emergency compliance response — Week 1-2 triage (rapid automated scan of all EU-facing products — identify Critical and Major violations, prioritize by public visibility and legal risk, assess: how many WCAG AA criteria are clearly failing?), Week 2-3 remediation (fix all Critical issues — keyboard traps, missing alt text on critical functions, form label associations, deploy accessible alternatives for known broken features — e.g., accessible HTML version of inaccessible interactive features), Week 3-4 documentation (create EU accessibility statements for all products — required under EAA, document current conformance status honestly — include remediation timeline for gaps, create EN 301 549 conformance mapping showing criterion-by-criterion assessment), Week 4-6 verification (independent audit of remediated products — verify fixes work with assistive technology, prepare compliance documentation for potential regulatory inquiry: audit methodology, findings, remediation evidence, ongoing monitoring plan), and risk mitigation (engage EU accessibility counsel, proactively communicate with regulators: 'We are actively remediating and can demonstrate progress' — proactive disclosure is better than discovery during enforcement)"
    weight: 0.35
    description: "EUEmergencyResponse"
  - type: llm_judge
    criteria: "Response creates market entry accessibility strategy — regulatory mapping per market (Brazil: Lei Brasileira de Inclusão — references WCAG, India: RPWD Act 2016 — guidelines being developed, South Korea: KWCAG based on WCAG 2.1, Japan: JIS X 8341-3 — mirrors WCAG 2.1, Australia: DDA — courts apply WCAG 2.0/2.1 AA), unified approach (WCAG 2.2 AA as global baseline — exceeds all five markets' requirements, supplement with market-specific requirements: South Korea's additional criteria, Japan's JIS-specific additions), accessibility-by-design process (before any market launches: accessibility requirements in product specs from day 1, local user research including disabled users in each market, localized accessibility testing — test with local screen readers and local assistive technology, cultural considerations: disability terminology, support expectations, and user behavior vary by market), and launch readiness criteria (no product launches without: WCAG 2.2 AA conformance verified, local accessibility statement published, VPAT created for enterprise clients, user testing with local disabled users completed, local regulatory compliance confirmed)"
    weight: 0.35
    description: "MarketEntryStrategy"
  - type: llm_judge
    criteria: "Response handles the VPAT integrity crisis — immediate actions (within 24 hours: pull the inaccurate VPAT from distribution, notify legal and compliance teams of the discrepancy, begin rapid assessment to determine actual conformance levels for each criterion claimed as 'Supports'), corrective VPAT (within 2 weeks: conduct proper accessibility audit of each criterion claimed as 'Supports', create corrected VPAT with accurate conformance status — 'Does Not Support' where appropriate, with remediation timeline, add detailed remarks explaining the gap: what was claimed, what the actual state is, and when it will be resolved), client communication (proactive notification to government clients: 'We identified inaccuracies in our previous VPAT dated [X] and have issued a corrected version. We take accuracy seriously and have implemented process changes to prevent recurrence.', offer: additional testing support for clients who made procurement decisions based on inaccurate VPAT, risk assessment for each client: could the inaccuracy affect their Section 508 compliance?), process prevention (implement VPAT governance process: VPATs must be based on documented accessibility testing results — not self-assessment, VPATs reviewed by qualified accessibility team before publication, VPAT accuracy verified quarterly against actual product state, training: ensure employees understand VPAT is a formal compliance document — inaccuracy has legal implications). Demonstrates ethical leadership and transparency"
    weight: 0.30
    description: "VPATIntegrityCrisis"
