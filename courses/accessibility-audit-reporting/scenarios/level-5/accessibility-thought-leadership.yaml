meta:
  id: accessibility-thought-leadership
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility thought leadership — deliver keynote presentations, publish industry research, and lead accessibility discourse"
  tags: [thought-leadership, keynote, industry, speaking, master]

state: {}

trigger: |
  You've been invited to give the opening keynote at
  CSUN Assistive Technology Conference, the world's
  largest accessibility conference. The title:
  "Beyond Compliance: How Accessibility Auditing
  Must Evolve for the Next Decade."

  The audience is 3,000 accessibility professionals:
  auditors, developers, policy makers, assistive
  technology vendors, and disability advocates.

  Your talk should:
  1. Honestly assess the state of accessibility
     auditing today — what's working and what's not
  2. Present a vision for how auditing must change
  3. Address the gap between compliance and usability
  4. Challenge the industry to raise its standards
  5. Be actionable — attendees should leave with
     specific changes to make

  Conference organizers say: "We want a talk that
  challenges assumptions and moves the industry
  forward."

  Task: Write the keynote outline with key arguments,
  supporting evidence, and actionable takeaways.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling keynote with honest industry assessment — opening (provocative: 'We've been auditing websites for 25 years. We've published millions of audit reports. And yet — the web is no more accessible today than it was a decade ago for many disabled users. 96.3% of homepages have detectable WCAG failures. Something is fundamentally broken in how we approach accessibility auditing. Today, I want to talk about what needs to change.'), current state assessment (what's working: automated tools catch more issues than ever, legal frameworks are stronger globally, awareness is at an all-time high; what's not working: audit reports gather dust — average remediation rate is under 50%, compliance doesn't equal usability — sites can 'pass' WCAG and still be unusable, audit industry is reactive not proactive — we audit after the damage is done, we audit against checklists not against user experience — a site can meet every criterion and still frustrate users with disabilities), the compliance-usability gap (powerful example: 'I audited a banking app that scored 92% on WCAG AA compliance. Then I watched a blind user try to transfer money. It took her 23 minutes. A sighted user does it in 90 seconds. We were compliant. We were not accessible.')"
    weight: 0.35
    description: "KeynoteStructure"
  - type: llm_judge
    criteria: "Response presents a vision for evolved auditing — three shifts needed: Shift 1: From checklist auditing to outcome auditing (measure whether disabled users can actually complete tasks, not just whether WCAG criteria are technically met — add task completion testing to every audit, measure time-on-task for disabled vs non-disabled users, report both compliance AND usability scores), Shift 2: From point-in-time audits to continuous accessibility (annual audits are insufficient — accessibility must be monitored continuously like uptime or security, integrate accessibility into CI/CD, real-time dashboards, automated regression detection — audit reports should show trends not snapshots), Shift 3: From technical reports to impact stories (audit reports written for developers miss the point — executives, PMs, and designers need to understand user impact, every finding should include: the human impact, not just the WCAG violation — 'Maria, who uses a screen reader, cannot pay her electric bill online because the payment form has no labels' is more powerful than 'WCAG 1.3.1 failure on payment form')"
    weight: 0.35
    description: "EvolutionVision"
  - type: llm_judge
    criteria: "Response includes actionable takeaways for the audience — for auditors (add outcome-based testing to your audits: task completion rates with disabled users alongside WCAG conformance, stop writing reports for developers — write reports for decision-makers who control budgets, include ROI calculations in every audit report — make the business case undeniable), for developers (don't wait for audits — build accessibility testing into your development workflow today, learn one assistive technology well enough to test your own code — NVDA is free, VoiceOver is built into Mac, treat accessibility failures like security failures — they should block deployment), for policy makers (push for outcome-based standards — WCAG 3.0's scoring approach is a step in the right direction, require user testing with disabled people as part of compliance — technical conformance alone is insufficient, mandate accessibility monitoring not just auditing — annual audits create annual compliance cycles with 11 months of regression), memorable closing (challenge to the audience: 'We are the accessibility profession. If we don't evolve our practices, who will? The next decade of accessibility depends on whether we have the courage to admit that what we're doing isn't working well enough, and the vision to imagine something better. Let's build that better future — starting with the next audit you write.')"
    weight: 0.30
    description: "ActionableTakeaways"
