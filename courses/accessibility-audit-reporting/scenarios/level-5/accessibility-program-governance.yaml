meta:
  id: accessibility-program-governance
  level: 5
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility program governance — establish board-level accessibility governance with policies, metrics, and accountability structures"
  tags: [governance, board, policy, accountability, master]

state: {}

trigger: |
  A CEO says: "After our recent ADA settlement, the
  board has mandated formal accessibility governance.
  They want:

  1. A board-level accessibility policy with teeth
  2. Clear accountability — who owns accessibility?
  3. Quarterly metrics the board can track
  4. An accessibility risk register alongside our
     security and compliance risk registers
  5. Integration with our ESG reporting — investors
     are asking about digital inclusion

  The board says: 'We govern cybersecurity with CISO
  reporting, compliance with CCO reporting. We need
  the same rigor for accessibility.'

  Design the governance structure."

  Task: Create a board-level accessibility governance
  framework with policy, accountability, metrics,
  risk management, and ESG integration.

assertions:
  - type: llm_judge
    criteria: "Response creates accessibility governance structure — organizational accountability (Chief Accessibility Officer reporting to CTO or CEO — same level as CISO, Accessibility Steering Committee: CAO, CTO, General Counsel, VP Product, VP Design, HR Director — quarterly meetings, Accessibility Council: CAO + product accessibility leads from each business unit — monthly meetings, every product team has designated Accessibility Champion — part of their role, not extra work), board-level policy (Accessibility Policy Statement: company commits to WCAG 2.2 AA compliance for all public-facing products, new products must be accessibility-compliant at launch — no exceptions without CAO sign-off, accessibility included in all vendor procurement evaluations, accessibility training mandatory for all product development staff, accommodations provided for all employees with disabilities, policy reviewed annually by the board, violations escalated to steering committee within 48 hours)"
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response designs metrics and risk management — quarterly board metrics (5 key metrics: 1. Portfolio Compliance Score — weighted average WCAG AA compliance across all products, trending over time — target: 85% Year 1, 95% Year 3, 2. Accessibility Incident Rate — complaints, legal actions, employee accommodation requests per quarter — target: decreasing, 3. Mean Time to Remediate — average days from issue identification to resolution by severity — target: Critical <14 days, Major <30 days, 4. Prevention Rate — % of accessibility issues caught before production vs in production — target: >80% caught pre-production, 5. Investment Efficiency — accessibility spend as % of total development budget vs compliance improvement — ROI tracking), risk register (accessibility risk register format: Risk ID, Description, Likelihood 1-5, Impact 1-5, Risk Score, Mitigation Strategy, Owner, Status — example risks: R-001 ADA litigation from inaccessible customer portal: Likelihood 4, Impact 5, Score 20, Mitigation: quarterly audit + continuous monitoring + remediation SLA, R-002 EU EAA enforcement fine: Likelihood 3, Impact 4, Score 12, Mitigation: EN 301 549 compliance program + accessibility statements published — risk register reviewed quarterly by steering committee, top risks presented to board)"
    weight: 0.35
    description: "MetricsRisk"
  - type: llm_judge
    criteria: "Response covers ESG integration and reporting — ESG alignment (accessibility as Social pillar of ESG: digital inclusion supports company's commitment to equal access and opportunity, metrics mapped to ESG frameworks: GRI Standards — GRI 413: Local Communities can include digital accessibility, SASB — relevant for technology companies under Data Privacy and Accessibility, UN SDGs — SDG 10 Reduced Inequalities, SDG 11 Sustainable Cities and Communities), investor communication (ESG report accessibility section: 'Our Commitment to Digital Inclusion' — includes: number of products achieving WCAG AA compliance, number of employees with disabilities supported with accessible tools, accessibility investment as percentage of product development budget, user satisfaction scores from disabled users, partnerships with disability organizations), annual accessibility report (public-facing: published on corporate website, includes: accessibility policy statement, current compliance status by product, progress metrics year-over-year, upcoming accessibility initiatives, how users can report accessibility barriers, transparency: honest about gaps and timeline for remediation — builds trust with disability community, investors, and regulators)"
    weight: 0.30
    description: "ESGIntegration"
