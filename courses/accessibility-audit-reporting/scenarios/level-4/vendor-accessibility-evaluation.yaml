meta:
  id: vendor-accessibility-evaluation
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Vendor accessibility evaluation — assess third-party vendor products for accessibility compliance during procurement"
  tags: [vendor, evaluation, procurement, VPAT-review, expert]

state: {}

trigger: |
  A procurement director says: "We're evaluating
  3 vendors for our new CRM platform. Each vendor
  submitted a VPAT. I need our accessibility team
  to evaluate which vendor is truly accessible vs
  which is just claiming compliance.

  Vendor A: Claims 'Supports' for 90% of WCAG criteria,
  VPAT is 2 pages long with minimal detail.

  Vendor B: Claims 'Partially Supports' for 60% of
  criteria with detailed explanations and remediation
  timelines for gaps.

  Vendor C: No VPAT available but says their product
  is 'fully accessible' and offers a demo.

  How do I evaluate these vendor claims? The product
  will be used by 5,000 employees including staff
  with disabilities. Getting this wrong is costly."

  Task: Evaluate the three vendor accessibility
  claims and create an evaluation framework for
  vendor accessibility assessment.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each vendor critically — Vendor A red flags (90% 'Supports' with minimal detail is a major red flag: legitimate VPATs for complex CRM products rarely claim 90% full support, 2-page VPAT for a complex product suggests superficial assessment or inflated claims, no methodology described — who tested? what tools? ask for testing methodology and evidence), Vendor B analysis (60% 'Partially Supports' with detailed explanations is actually more trustworthy: specific limitations documented shows honest assessment, remediation timelines show commitment to improvement, detailed VPAT suggests rigorous evaluation process — this vendor understands accessibility), Vendor C risk (no VPAT is unacceptable for enterprise procurement: verbal claims of 'fully accessible' without documentation are unreliable, request VPAT as a hard requirement — if they can't produce one, they haven't evaluated their product, offer to conduct an independent evaluation during the demo period). Recommendation: Vendor B is likely the most accessible despite lower percentage — honesty and commitment outweigh inflated claims"
    weight: 0.35
    description: "VendorEvaluation"
  - type: llm_judge
    criteria: "Response creates a vendor evaluation framework — evaluation criteria (weighted scoring: VPAT quality and completeness: 20%, independent accessibility testing results: 30%, remediation commitment and timeline: 15%, accessibility expertise on vendor team: 10%, contractual commitments: 15%, user testing evidence: 10%), independent testing protocol (don't rely on vendor self-assessment: conduct 2-day focused evaluation of core user journeys with screen reader and keyboard, test with 3 assistive technologies: NVDA, VoiceOver, keyboard-only, focus on: login flow, core CRM tasks — create contact, search, generate report, admin settings), VPAT review checklist (is VPAT version current? does it match the product version being evaluated? does it include methodology? are 'Supports' claims specific and verifiable? are 'Partially Supports' entries honest about limitations? are remediation timelines realistic? is there a history of VPAT updates showing improvement?)"
    weight: 0.35
    description: "EvaluationFramework"
  - type: llm_judge
    criteria: "Response covers contractual protections and ongoing monitoring — contract requirements (accessibility SLA: vendor must maintain WCAG 2.2 AA compliance, regression clause: new releases must maintain or improve accessibility — no regressions, remediation timeline: vendor must fix Critical accessibility issues within 30 days, Major within 90 days, audit rights: buyer can conduct independent accessibility audit annually, VPAT updates: vendor must provide updated VPAT with each major release, exit clause: if vendor fails to maintain accessibility commitments, buyer can terminate without penalty), ongoing monitoring (quarterly automated scan of vendor product, annual manual audit of core user journeys, user feedback mechanism: employees with disabilities can report accessibility issues, vendor performance tracking: number of accessibility issues reported, average resolution time, regression rate), and evaluation report format (comparison matrix: Vendor A vs B vs C across all evaluation criteria, accessibility risk assessment for each vendor, total cost of ownership including estimated remediation costs, recommendation with rationale)"
    weight: 0.30
    description: "ContractsMonitoring"
