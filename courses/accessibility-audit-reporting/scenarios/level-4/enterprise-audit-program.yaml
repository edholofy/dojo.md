meta:
  id: enterprise-audit-program
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Enterprise audit program — design and manage an accessibility audit program across a portfolio of 50+ digital properties"
  tags: [enterprise, program, portfolio, governance, expert]

state: {}

trigger: |
  A Chief Digital Officer says: "We have 60 digital
  properties: 12 customer-facing websites, 8 mobile
  apps, 15 internal tools, 10 partner portals, and
  15 microsites. We've never conducted a systematic
  accessibility audit across the portfolio.

  Challenges:
  - We can't audit everything at once
  - Different properties have different risk levels
  - Some were built by vendors we no longer contract
  - Internal tools have no accessibility budget
  - We need to show the board progress quarterly

  Design an enterprise audit program that:
  - Prioritizes what to audit first
  - Scales across the full portfolio
  - Provides board-level reporting
  - Doesn't require 100 auditors

  How do we operationalize accessibility auditing
  at enterprise scale?"

  Task: Design an enterprise accessibility audit
  program with prioritization, scaling strategy,
  and executive reporting.

assertions:
  - type: llm_judge
    criteria: "Response creates a prioritized audit approach — tiered prioritization (Tier 1 Critical: customer-facing websites and mobile apps — highest legal risk, revenue impact, user volume — full manual audit within 90 days, Tier 2 Important: partner portals — contractual and reputational risk — automated scan + targeted manual testing within 6 months, Tier 3 Standard: internal tools — employee accommodation risk — automated scan + remediation of Critical/Major issues within 9 months, Tier 4 Low priority: microsites — limited audience — automated scan within 12 months with manual review of issues found), portfolio risk scoring (score each property: public exposure × user volume × legal jurisdiction × last audit date × known complaints = risk score — prioritize highest scores), and resource planning (60 properties don't need 60 audits simultaneously: rotate through tiers, re-audit Tier 1 annually, Tier 2 every 18 months, Tier 3 every 2 years)"
    weight: 0.35
    description: "PrioritizedProgram"
  - type: llm_judge
    criteria: "Response designs scalable audit operations — team structure (don't hire 100 auditors: core team of 3-5 accessibility specialists manages program, automated scanning runs daily across all 60 properties, manual audits conducted by core team on priority schedule, external audit firm engaged for annual comprehensive audits of Tier 1 properties), efficiency strategies (template-based auditing: if 5 websites share a CMS template, audit the template once and apply findings to all 5, component-level auditing: audit shared design system components once — findings apply everywhere they're used, risk-based sampling: don't test every page — test page templates and critical user journeys), technology stack (automated scanning platform: axe Monitor or Siteimprove for continuous monitoring of all 60 properties, issue tracking: centralized accessibility issue database with property assignments, dashboard: real-time compliance scores per property — red/yellow/green status), and vendor-built properties (request VPATs from all vendors, include accessibility SLAs in vendor contracts, schedule vendor properties for independent verification audits)"
    weight: 0.35
    description: "ScalableOperations"
  - type: llm_judge
    criteria: "Response includes executive reporting framework — board-level dashboard (quarterly report: portfolio compliance score as single metric trending over time, properties by compliance status: compliant/in-progress/at-risk/not-assessed, top risks: properties with highest legal exposure and lowest compliance, remediation progress: issues found vs fixed trend line, investment vs results: dollars spent vs compliance improvement), metric definitions (compliance score: weighted average of WCAG AA criteria passing across tested properties — Tier 1 properties weighted higher, risk index: combines legal jurisdiction sensitivity × public exposure × known issues × time since last audit), narrative reporting (don't just show numbers: 'Our customer-facing properties improved from 62% to 78% WCAG AA compliance this quarter. Three critical issues on the e-commerce checkout were remediated, reducing legal risk. Two partner portals remain at-risk due to vendor unresponsiveness — escalation in progress.'), and milestones (Year 1 target: all Tier 1 properties at 80% AA compliance, Year 2: all Tier 1 at 95% and Tier 2 at 80%, Year 3: full portfolio at 85%+ compliance)"
    weight: 0.30
    description: "ExecutiveReporting"
