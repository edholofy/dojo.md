meta:
  id: vpat-acr-creation
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "VPAT/ACR creation — write Voluntary Product Accessibility Templates and Accessibility Conformance Reports for product procurement"
  tags: [VPAT, ACR, procurement, conformance-report, expert]

state: {}

trigger: |
  A senior accessibility manager says: "Our SaaS
  product is being evaluated by 3 enterprise clients
  and 2 government agencies. They all require a VPAT
  (Voluntary Product Accessibility Template) as part
  of the procurement process.

  Our product is partially accessible — some areas
  are strong (keyboard navigation, color contrast)
  but others need work (screen reader support for
  complex widgets, PDF export accessibility).

  Challenges:
  - How honest should the VPAT be about gaps?
  - How do I write 'Partially Supports' entries
    that are helpful, not misleading?
  - The government clients require different VPAT
    editions (WCAG, Section 508)
  - How do I handle criteria where we support the
    feature on web but not on our mobile app?

  I need to create a VPAT that's accurate, honest,
  and positions us competitively."

  Task: Create a VPAT/ACR for a partially accessible
  SaaS product with honest assessments, helpful
  notes, and strategic positioning.

assertions:
  - type: llm_judge
    criteria: "Response creates a proper VPAT structure — VPAT 2.5 format (Product name, version, date, contact information, evaluation methodology, applicable standards: WCAG 2.2, Section 508, EN 301 549), conformance level definitions (Supports: fully meets criterion, Partially Supports: some aspects don't meet criterion, Does Not Support: majority doesn't meet criterion, Not Applicable: criterion not relevant, Not Evaluated: not yet assessed), example entries at each level: Supports entry ('1.4.3 Contrast Minimum — Supports: All text content meets 4.5:1 contrast ratio. Verified with automated testing across all pages.'), Partially Supports entry ('4.1.2 Name Role Value — Partially Supports: Standard form controls and navigation are fully accessible. Custom data visualization widgets lack screen reader support — remediation planned for Q3 2026.'), Does Not Support entry ('1.2.5 Audio Description — Does Not Support: Training videos lack audio descriptions. Audio description tracks are in production with estimated completion Q4 2026.'). Each entry includes specific, verifiable claims"
    weight: 0.35
    description: "VPATStructure"
  - type: llm_judge
    criteria: "Response addresses honesty vs positioning strategy — honesty principles (never claim Supports when it doesn't — procurement officers test claims, getting caught in false claims damages trust and can void contracts, always disclose known issues — it's better for buyers to find issues in the VPAT than discover them during evaluation), strategic positioning (for 'Partially Supports': include the specific limitation AND the remediation plan with timeline — 'Complex data tables partially support 1.3.1 — header associations implemented for simple tables, complex multi-level tables pending remediation in Q3 2026', for 'Does Not Support': include the business justification and timeline — shows you're aware and acting, not ignoring), competitive advantage (a thorough, honest VPAT with remediation timelines is more competitive than a vague one that claims full support — evaluators prefer transparency, include product roadmap commitment to accessibility showing trajectory toward full compliance)"
    weight: 0.35
    description: "HonestyStrategy"
  - type: llm_judge
    criteria: "Response handles multi-edition and multi-platform considerations — VPAT editions (WCAG Edition: maps product to WCAG 2.2 criteria — used by most clients, Section 508 Edition: adds Section 508 specific requirements — required for US government procurement, INT Edition: includes EN 301 549 for European requirements — needed for EU clients, recommended: create the International Edition which covers all three standards in one document), multi-platform handling (for criteria where web supports but mobile doesn't: 'Partially Supports — Web application fully supports keyboard navigation. Mobile application [iOS/Android] has limited keyboard/switch access support for 3 of 12 core features. Mobile remediation planned for Q2 2026.' — specify which platform and which features are affected, don't blanket-claim partial support without specifics), and maintenance (VPAT should be updated with each major release, version-specific: VPAT for v3.2 may differ from v3.1, include date and product version prominently — outdated VPATs are a procurement red flag)"
    weight: 0.30
    description: "MultiEditionPlatform"
