meta:
  id: accessibility-training-program
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility training program — design and deliver accessibility audit training for development teams to build internal capability"
  tags: [training, capability-building, team, upskilling, expert]

state: {}

trigger: |
  A Director of Engineering says: "We currently rely
  on external auditors for accessibility testing. It's
  expensive ($50K per audit) and slow (3-week
  turnaround). I want to build internal accessibility
  capability so teams can catch issues before external
  audits.

  Current state:
  - 200 developers, 30 designers, 20 QA testers
  - Zero accessibility training completed
  - No one knows how to use a screen reader
  - External auditor finds 40+ issues per audit
  - Teams fix issues but create new ones

  I don't need everyone to be an expert, but I need:
  - Developers to write accessible code by default
  - Designers to design accessible interfaces
  - QA to catch accessibility issues in testing
  - A few internal experts for complex questions

  How do I build this capability efficiently?"

  Task: Design an accessibility training program
  with role-based curricula, assessment methods,
  and capability metrics.

assertions:
  - type: llm_judge
    criteria: "Response designs role-based training curricula — Developer curriculum (Level 1 Fundamentals — 4 hours: WCAG overview, semantic HTML, keyboard accessibility, ARIA basics, common mistakes to avoid, hands-on: fix 5 real accessibility bugs in sample code. Level 2 Intermediate — 8 hours: form accessibility, dynamic content and live regions, complex widget patterns, testing with axe in development, hands-on: build an accessible modal, dropdown, and tab component. Level 3 Advanced — 4 hours: screen reader testing basics, ARIA authoring practices for custom widgets, CI/CD integration — only for developers interested in specializing), Designer curriculum (4-hour workshop: accessible color palettes and contrast, inclusive design principles, annotating designs for accessibility — focus states, keyboard flows, ARIA labels, testing designs with accessibility checklist, hands-on: audit and redesign a non-accessible form), QA curriculum (8-hour program: using axe and WAVE for automated testing, keyboard navigation testing protocol, screen reader testing basics with NVDA, writing accessibility test cases from WCAG criteria, bug reporting for accessibility issues — WCAG reference, severity, remediation suggestion)"
    weight: 0.35
    description: "RoleBasedCurricula"
  - type: llm_judge
    criteria: "Response includes assessment and certification — skill assessment (pre-training assessment: baseline accessibility knowledge quiz — establishes starting point, post-training assessment: practical evaluation — given a page with 10 accessibility issues, find and properly document at least 7, hands-on coding assessment for developers: given inaccessible component, make it accessible within 30 minutes), certification levels (Accessibility Aware: completed fundamentals training and passed knowledge quiz — expected of all staff, Accessibility Practitioner: completed intermediate training and passed practical assessment — expected of all developers and QA, Accessibility Expert: completed advanced training, demonstrated screen reader testing proficiency, can conduct internal audits — target 5-10 people across organization), ongoing learning (quarterly accessibility lunch-and-learn sessions, accessibility issue review in sprint retrospectives, internal accessibility community of practice with monthly meetings, annual recertification with updated WCAG content)"
    weight: 0.35
    description: "AssessmentCertification"
  - type: llm_judge
    criteria: "Response provides ROI and success metrics — cost comparison (external audits: $50K × 4 per year = $200K annual cost, training program: $30K setup + $10K annual maintenance = $40K first year, $10K ongoing, if training reduces external audit findings by 50%: can reduce audit frequency or scope saving $100K/year, ROI: positive within 12 months), capability metrics (training coverage: % of each role that has completed relevant level — target 100% at Level 1 within 6 months, accessibility issue creation rate: track new accessibility issues per sprint — should decrease after training, external audit findings: number of issues found by external auditor — should decrease by 50% within 12 months of training program launch, self-service resolution: % of accessibility issues found and fixed internally without external help — target 80% within 12 months), and program evolution (Year 1: establish training program and baseline metrics, Year 2: refine curriculum based on common mistakes — focus training on patterns that teams keep getting wrong, Year 3: advanced topics — emerging platforms, AI accessibility, contributing to external accessibility community)"
    weight: 0.30
    description: "ROIMetrics"
