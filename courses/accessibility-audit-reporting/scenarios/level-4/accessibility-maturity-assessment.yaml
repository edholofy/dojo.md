meta:
  id: accessibility-maturity-assessment
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Accessibility maturity assessment — evaluate organizational accessibility maturity across process, culture, and technology dimensions"
  tags: [maturity, assessment, organizational, dimensions, expert]

state: {}

trigger: |
  A Chief Accessibility Officer says: "The board
  wants to know: 'How mature is our accessibility
  program compared to industry peers?'

  I need to assess our organization across all
  dimensions of accessibility maturity — not just
  technical compliance, but our processes, culture,
  procurement, training, and governance.

  Current state clues:
  - We have 2 accessibility specialists for 500+
    developers
  - Accessibility training is optional, 15% have
    taken it
  - We audit reactively — when a complaint comes in
  - No accessibility requirements in vendor procurement
  - Our design system has some ARIA but it's
    inconsistent
  - Leadership mentions accessibility in all-hands
    but doesn't track metrics

  How do I assess our maturity and create an
  improvement roadmap?"

  Task: Conduct an accessibility maturity assessment
  and create a roadmap from current state to target
  maturity level.

assertions:
  - type: llm_judge
    criteria: "Response defines maturity model dimensions and levels — dimensions assessed (based on W3C Accessibility Maturity Model): 1. Culture and Leadership (does leadership actively champion accessibility?), 2. Process Integration (is accessibility embedded in design, development, QA?), 3. Personnel and Expertise (dedicated roles, team capability, training coverage), 4. Procurement (accessibility requirements in vendor selection), 5. Technology and Tools (automated testing, monitoring, design system accessibility), 6. Performance Measurement (metrics tracked, compliance monitored, trends analyzed), 7. Communication (accessibility policy published, feedback mechanism, reporting). Maturity levels per dimension: Level 1 Inactive (no awareness or action), Level 2 Reactive (respond to complaints but no proactive program), Level 3 Proactive (formal program with processes, still inconsistent), Level 4 Embedded (accessibility is standard practice across organization), Level 5 Leading (innovating, contributing to industry, benchmark for others)"
    weight: 0.35
    description: "MaturityModel"
  - type: llm_judge
    criteria: "Response assesses the current state using clues provided — Culture and Leadership: Level 2 Reactive (leadership mentions accessibility but doesn't track metrics — awareness without accountability), Process Integration: Level 1-2 (audits only happen when complaints come in — no proactive testing in development lifecycle), Personnel: Level 2 (2 specialists for 500 developers = 1:250 ratio — industry recommendation is 1:50, 15% training coverage is far below target of 100%), Procurement: Level 1 (no accessibility requirements in vendor procurement — unmanaged risk), Technology: Level 2 (design system has some ARIA but inconsistent — effort exists but not systematic), Performance: Level 1 (no metrics tracked — can't demonstrate improvement or identify trends), Communication: Level 2 (mentioned in all-hands but no published policy or feedback mechanism). Overall maturity: Level 1-2 Reactive — the organization acknowledges accessibility but lacks systematic approach"
    weight: 0.35
    description: "CurrentAssessment"
  - type: llm_judge
    criteria: "Response creates an improvement roadmap — target state (Level 4 Embedded within 24 months — realistic for an organization currently at Level 2), phased roadmap: Phase 1 Foundation (Months 1-6: hire 3 more accessibility specialists reaching 1:100 ratio, make accessibility training mandatory for all developers and designers, establish automated scanning across all properties, publish accessibility policy and feedback mechanism), Phase 2 Integration (Months 7-12: embed accessibility checkpoints in design review and code review processes, add accessibility requirements to procurement templates, build accessible design system components and deprecate inaccessible ones, begin tracking compliance metrics quarterly), Phase 3 Optimization (Months 13-18: accessibility testing integrated in CI/CD blocking deployments, vendor accessibility evaluation standard, metrics dashboard reporting to leadership monthly, proactive user testing with disabled participants), Phase 4 Embedding (Months 19-24: accessibility is standard practice — not a separate initiative, every team has accessibility champion, innovation in accessible product features, sharing practices externally). Each phase has measurable success criteria"
    weight: 0.30
    description: "ImprovementRoadmap"
