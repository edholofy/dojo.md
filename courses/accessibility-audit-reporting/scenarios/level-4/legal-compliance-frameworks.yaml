meta:
  id: legal-compliance-frameworks
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Legal compliance frameworks — navigate ADA, Section 508, EAA, EN 301 549, and other accessibility regulations for audit reporting"
  tags: [legal, ADA, Section-508, EAA, EN-301-549, expert]

state: {}

trigger: |
  A VP of Compliance says: "We operate in the US,
  EU, and Canada. Our legal team is asking:

  1. What are our legal obligations for digital
     accessibility in each region?
  2. What standard do we audit against — is WCAG
     enough for all regions?
  3. The ADA Title II deadline is approaching —
     what do we need to do?
  4. The European Accessibility Act requires an
     accessibility statement — what goes in it?
  5. If we get sued, does our audit report help
     or hurt our defense?

  We need a compliance-aware audit approach that
  satisfies all jurisdictions. Our audit reports
  need to serve as evidence of due diligence."

  Task: Create a multi-jurisdictional compliance
  framework for accessibility auditing and explain
  how audit reports serve as legal evidence.

assertions:
  - type: llm_judge
    criteria: "Response maps legal requirements by jurisdiction — United States (ADA Title II: state and local government websites must conform to WCAG 2.1 AA by April 2026, ADA Title III: private businesses — no explicit web standard yet but courts increasingly apply WCAG 2.1 AA, Section 508: federal government IT procurement requires WCAG 2.0 AA — updating to 2.1/2.2), European Union (European Accessibility Act effective June 2025: applies to private sector products and services, EN 301 549 v3.2.1: technical standard referencing WCAG 2.1 AA plus additional requirements for software and mobile, mandatory accessibility statement on website, penalties: up to €300,000 per violation), Canada (AODA: Ontario businesses must meet WCAG 2.0 AA, ACA: Accessible Canada Act for federally regulated organizations, pending national harmonization), and practical recommendation (audit against WCAG 2.2 AA — this exceeds all current regional requirements and future-proofs compliance, with supplemental EN 301 549 requirements documented for EU operations)"
    weight: 0.35
    description: "JurisdictionalMapping"
  - type: llm_judge
    criteria: "Response covers audit reports as legal evidence — how reports help defense (demonstrate 'good faith' effort: regular audits show the organization takes accessibility seriously, documented remediation plans show commitment to improvement — courts consider ongoing effort favorably, timestamped audit history shows progressive improvement — not a one-time effort), how reports can hurt (audit identifying Critical issues with no remediation action — creates evidence of known problems that were ignored, overly optimistic assessments that don't match reality — creates credibility issues, incomplete audits that miss obvious issues — suggests negligent evaluation), best practices for legally defensible reports (include methodology section documenting thoroughness, date and sign reports with auditor qualifications, track remediation progress: original finding → fix date → verification, maintain audit history showing improvement trajectory, include scope limitations: 'This audit covers pages X, Y, Z — pages not included in scope were not evaluated'), and accessibility statements (EU requirement: publish statement on website declaring conformance status, known limitations, feedback mechanism for users to report barriers, date of last evaluation — this is a legal document, not marketing)"
    weight: 0.35
    description: "LegalEvidence"
  - type: llm_judge
    criteria: "Response addresses proactive legal strategy — risk-based audit prioritization (audit highest legal risk first: public-facing customer portals > internal tools, revenue-generating features > informational pages, features used by known disabled users > general features), compliance roadmap for multi-jurisdictional organizations (single audit program covering the strictest standard — if WCAG 2.2 AA meets all jurisdictions, use that as baseline, supplement with jurisdiction-specific requirements: EU accessibility statement, US Section 508 VPAT, Canadian AODA compliance report), incident response (if accessibility complaint or lawsuit is filed: immediately audit the cited pages/features, document current state and remediation plan, engage accessibility counsel alongside technical team, produce updated VPAT if requested), and ongoing monitoring (don't wait for annual audits: continuous automated monitoring catches regressions, quarterly manual spot-checks of critical user journeys, annual comprehensive audit for legal documentation purposes)"
    weight: 0.30
    description: "ProactiveLegalStrategy"
