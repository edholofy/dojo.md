meta:
  id: expert-audit-shift
  level: 4
  course: accessibility-audit-reporting
  type: output
  description: "Expert audit shift — handle a week of enterprise accessibility challenges including legal response, vendor crisis, and board presentation"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're the Chief Accessibility Officer. Your week:

  MONDAY — Legal forwards an ADA demand letter from
  a blind user who couldn't complete a purchase on
  your e-commerce site. The letter lists 12 specific
  barriers and demands remediation within 60 days or
  faces a lawsuit. You need to: verify the claims,
  assess the actual state, create a response plan,
  and advise legal on whether to settle or fight.

  WEDNESDAY — Your primary CRM vendor (used by 5,000
  employees) pushes a major update that breaks screen
  reader compatibility. 15 employees with disabilities
  report they can't do their jobs. The vendor says
  a fix will take 4 weeks. You need an immediate
  response: accommodation plan, vendor escalation,
  and prevention strategy.

  FRIDAY — The CEO asks you to present to the board:
  "What's our accessibility risk exposure? How much
  would a lawsuit cost us? What's our investment vs
  risk comparison? Make me understand why this matters
  to the business."

  Task: Handle all three enterprise accessibility
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles the ADA demand letter — immediate actions (within 48 hours: conduct rapid assessment of the 12 cited barriers — verify each claim independently, document current state with screenshots and screen reader recordings, classify each as confirmed/partially confirmed/not reproduced), legal advisory (settlement analysis: typical ADA web accessibility settlements range $10K-$100K for first offense, remediation cost estimate for 12 issues: $20K-50K — compare settlement cost vs litigation cost of $200K+, recommend: acknowledge barriers, propose structured remediation agreement with 60-day timeline, avoid adversarial posture — courts favor organizations showing good faith), remediation plan (prioritize by cited user impact: issues blocking purchase completion are Critical — fix within 2 weeks, secondary issues within 30 days, full compliance within 60 days, assign dedicated developer team, conduct post-remediation verification with screen reader), and broader response (use this as catalyst: expand audit to full e-commerce flow, establish ongoing monitoring, prevent future complaints through proactive testing)"
    weight: 0.35
    description: "ADAResponse"
  - type: llm_judge
    criteria: "Response manages the vendor accessibility crisis — immediate accommodation (within 24 hours: provide alternative workflow for all 15 affected employees — phone-based access to CRM for urgent tasks, temporary access to previous version if available, assign assistants to help with critical tasks until fix is deployed, document each employee's specific needs and provide individual accommodation plans), vendor escalation (escalate through vendor's executive support: formal notification of accessibility regression, demand expedited fix timeline — 4 weeks is unacceptable for a blocking issue, invoke accessibility SLA from contract if it exists, request daily progress updates, document all communication for potential contract enforcement), prevention strategy (add regression testing clause to vendor contract: vendor must run accessibility tests before deploying updates, require vendor to notify of accessibility-impacting changes 30 days before deployment, establish internal testing protocol: test vendor updates in staging environment with screen reader before enabling for all users, maintain rollback capability for 30 days after vendor updates)"
    weight: 0.35
    description: "VendorCrisis"
  - type: llm_judge
    criteria: "Response creates the board presentation — risk quantification (legal exposure: $X based on revenue size, industry litigation rates, and current compliance level — cite recent settlements in our industry, operational risk: $Y in accommodation costs and productivity loss from inaccessible tools — example: this week's vendor crisis cost $Z in lost productivity, reputational risk: brand damage from public accessibility lawsuits — cite examples of companies facing PR consequences), investment vs risk comparison (current investment: $X annually on accessibility, risk exposure: $Y in potential legal costs, accommodation costs, and lost revenue from inaccessible products, ROI calculation: every dollar invested in proactive accessibility saves $3-5 in reactive costs — prevention is cheaper than remediation which is cheaper than litigation), board-ready metrics (portfolio compliance score trending over time, legal risk heat map by product, comparison to peer companies if available, investment request: specific dollar amount with expected ROI timeline), and compelling narrative (don't just present numbers — tell the story of this week: a customer couldn't buy our product, 15 employees couldn't do their jobs, we paid emergency costs that proactive investment would have prevented — this is what insufficient accessibility investment looks like)"
    weight: 0.30
    description: "BoardPresentation"
