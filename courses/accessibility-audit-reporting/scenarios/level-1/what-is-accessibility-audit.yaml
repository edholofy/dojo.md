meta:
  id: what-is-accessibility-audit
  level: 1
  course: accessibility-audit-reporting
  type: output
  description: "What is an accessibility audit — understand the purpose, scope, and basic structure of an accessibility audit report"
  tags: [fundamentals, audit-basics, introduction, beginner]

state: {}

trigger: |
  A junior designer asks: "My manager said we need
  to do an 'accessibility audit' of our website
  before launch. I've never done one before.

  What is an accessibility audit? What does the
  report look like? What am I actually checking?
  I know it has something to do with making the
  site usable for people with disabilities, but
  I don't know where to start."

  Task: Explain what an accessibility audit is,
  what it covers, and what the basic report
  structure looks like.

assertions:
  - type: llm_judge
    criteria: "Response explains what an accessibility audit is — definition (a systematic evaluation of a digital product against accessibility standards to identify barriers that prevent people with disabilities from using it), who benefits (people with visual impairments, hearing impairments, motor disabilities, cognitive disabilities — plus situational disabilities like bright sunlight, broken arm, noisy environment), what's checked (perceivable: can users see/hear content, operable: can users interact with controls, understandable: can users comprehend content, robust: does it work with assistive technology — the four WCAG principles), and why it matters (legal compliance: ADA, Section 508, EAA; ethical responsibility: equal access for all users; business value: larger audience, better SEO, improved usability for everyone)"
    weight: 0.35
    description: "AuditDefinition"
  - type: llm_judge
    criteria: "Response describes a basic audit report structure — report header (project name, audit date, auditor, scope: which pages/features were tested, standard tested against: WCAG 2.1 AA), executive summary (overall compliance level, total issues found by severity, top 3 priority fixes), findings section per issue (issue title, WCAG criterion violated with number and name, severity: critical/major/minor, location: page URL and element description, description of the problem, impact on users with specific disabilities, screenshot or code snippet showing the issue, recommended fix with specific guidance, effort estimate: low/medium/high), summary table (all issues listed with ID, title, severity, WCAG criterion, status, page), and methodology section (tools used, browsers/devices tested, assistive technologies tested). Report is actionable — developers can fix issues from the report without additional context"
    weight: 0.35
    description: "ReportStructure"
  - type: llm_judge
    criteria: "Response covers basic scope and approach — scope definition (which pages to audit: at minimum cover homepage, login, key user flows, forms, search, and any unique page templates — representative sample for large sites), testing approach overview (automated testing: run tools like axe or WAVE to catch ~30% of issues automatically, manual testing: keyboard navigation, visual inspection, content review — catches the other ~70%, assistive technology testing: test with screen reader to verify real-world usability), what an audit does NOT do (not a one-time certification — accessibility is ongoing, not just a checklist — it evaluates real usability, not a guarantee of compliance — it identifies known issues at a point in time), and next steps after audit (prioritize fixes by severity, create remediation plan with timeline, retest after fixes, establish ongoing monitoring)"
    weight: 0.30
    description: "ScopeApproach"
