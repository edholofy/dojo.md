meta:
  id: wcag-basics
  level: 1
  course: accessibility-audit-reporting
  type: output
  description: "WCAG basics — understand WCAG principles, conformance levels, and how to reference WCAG criteria in audit reports"
  tags: [WCAG, standards, conformance, principles, beginner]

state: {}

trigger: |
  A junior QA tester asks: "My audit report template
  says I need to reference 'WCAG criteria' for each
  issue I find. I looked up WCAG and got overwhelmed —
  there are hundreds of criteria.

  Can you explain:
  - What WCAG actually is (in plain language)?
  - What are levels A, AA, and AAA?
  - Which level should I test against?
  - How do I reference criteria in my report?
  - What are the most common criteria I'll use?"

  Task: Explain WCAG fundamentals and how to
  reference WCAG criteria in audit findings.

assertions:
  - type: llm_judge
    criteria: "Response explains WCAG clearly — what it is (Web Content Accessibility Guidelines: the international standard for web accessibility, created by W3C, currently version 2.2 — the globally accepted benchmark for digital accessibility), four principles explained simply (Perceivable: information must be presentable to users in ways they can perceive — not invisible to all senses, Operable: interface must be operable — users must be able to interact with all controls, Understandable: information and operation must be understandable — not confusing, Robust: content must be robust enough to work with assistive technologies — properly coded), and conformance levels (Level A: minimum accessibility — absolute barriers removed, Level AA: target for most organizations — addresses most common barriers, covers 90% of legal requirements, Level AAA: highest level — not typically required for entire sites, some criteria are aspirational for specific content types)"
    weight: 0.35
    description: "WCAGExplanation"
  - type: llm_judge
    criteria: "Response shows how to reference WCAG criteria in reports — reference format (Success Criterion number + name: 'WCAG 2.2 SC 1.1.1 Non-text Content (Level A)' — includes version, criterion number, name, and level), most commonly referenced criteria listed with plain-language explanations: 1.1.1 Non-text Content (images need alt text), 1.4.3 Contrast Minimum (text must have 4.5:1 contrast ratio against background), 2.1.1 Keyboard (everything must work with keyboard alone), 2.4.7 Focus Visible (keyboard focus must be visible), 3.3.2 Labels or Instructions (form fields need labels), 4.1.2 Name Role Value (interactive elements need accessible names and roles). For each criterion: what it means, what a violation looks like, and how to write it in a finding"
    weight: 0.35
    description: "CriteriaReference"
  - type: llm_judge
    criteria: "Response provides practical guidance on level selection and testing — which level to target (almost always AA: it's the legal standard in most jurisdictions, covers the most impactful accessibility issues, achievable for most websites without redesign), how to organize findings by WCAG level (tag each finding with A, AA, or AAA — prioritize A failures first as they represent the most severe barriers), example audit finding with WCAG reference (Issue: 'Product images missing alt text' — WCAG Criterion: 1.1.1 Non-text Content (Level A) — Impact: Screen reader users cannot identify products — Recommendation: Add descriptive alt text describing the product), and tip (don't try to memorize all criteria — focus on the 10-15 most common ones, use WCAG Quick Reference as a lookup tool during audits)"
    weight: 0.30
    description: "PracticalGuidance"
