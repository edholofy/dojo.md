meta:
  id: common-image-issues
  level: 1
  course: accessibility-audit-reporting
  type: output
  description: "Common image accessibility issues — audit and report on missing alt text, decorative images, complex images, and image-based content"
  tags: [images, alt-text, common-issues, beginner]

state: {}

trigger: |
  A junior auditor is reviewing an e-commerce website
  and finds several image-related issues:

  1. Product photos have no alt text at all
  2. A banner image contains promotional text but the
     alt text just says "banner"
  3. Decorative divider images have alt text that says
     "divider line"
  4. An infographic explaining shipping options has
     no text alternative
  5. Team member photos have alt text that says
     "IMG_3847.jpg"

  The auditor asks: "How do I write up each of these
  image issues in my audit report? Are they all the
  same severity?"

  Task: Write audit findings for each image
  accessibility issue with proper WCAG references,
  severity, and remediation guidance.

assertions:
  - type: llm_judge
    criteria: "Response writes distinct findings for each image issue — Product photos without alt (WCAG 1.1.1 Level A, Severity: Critical — screen reader users cannot identify products, Fix: add descriptive alt text like 'Red leather crossbody bag with gold chain strap' not just 'bag'), Banner with poor alt (WCAG 1.1.1 Level A, Severity: Major — promotional content is inaccessible, alt text should convey the same information as the visual text: 'Summer Sale: 30% off all shoes. Shop now' not 'banner'), Decorative dividers with alt text (WCAG 1.1.1 Level A, Severity: Minor — screen reader announces 'divider line' repeatedly which is distracting, Fix: use empty alt='' or role='presentation' for purely decorative images), Infographic without text alternative (WCAG 1.1.1 Level A, Severity: Critical — complex information completely inaccessible, Fix: provide detailed text description of shipping options either as alt text or as visible text on the page), Filename as alt text (WCAG 1.1.1 Level A, Severity: Major — screen reader reads 'IMG_3847.jpg' which is meaningless, Fix: use person's name and role: 'Sarah Chen, Head of Design')"
    weight: 0.35
    description: "ImageFindings"
  - type: llm_judge
    criteria: "Response explains alt text best practices within the findings — decision framework (Is the image decorative? → use alt=''. Does the image contain text? → alt text must include that text. Is the image a link/button? → alt describes the destination/action. Is the image complex like a chart? → provide detailed description. Is the image a product photo? → describe the product for someone who can't see it), alt text quality guidelines (be specific: 'Woman running on a forest trail in blue running shoes' not 'person running', be concise: 20-125 characters for most images, don't start with 'Image of' or 'Picture of' — screen readers already announce it as an image, convey function not just appearance for interactive images: 'Go to shopping cart' not 'shopping cart icon'), and common mistakes to check for (CMS auto-generated alt from filename, same alt text on every image in a gallery, alt text that describes the image file rather than its content)"
    weight: 0.35
    description: "AltTextGuidance"
  - type: llm_judge
    criteria: "Response demonstrates proper audit report formatting — each finding follows a consistent template (Issue ID: IMG-001, Issue Title: descriptive name, WCAG Criterion: number and name, Severity: Critical/Major/Minor with justification, Location: specific page URL and element selector or description, Current State: what exists now, Expected State: what should exist, User Impact: who is affected and how — e.g., 'Screen reader users hear IMG_3847.jpg instead of the team member's name', Remediation: specific fix instructions with code example if helpful, Effort: Low/Medium/High). Severity assignments are justified based on user impact, not just technical violation"
    weight: 0.30
    description: "ReportFormatting"
