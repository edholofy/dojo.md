meta:
  id: automated-testing-tools
  level: 1
  course: accessibility-audit-reporting
  type: output
  description: "Automated testing tools — understand and use accessibility testing tools like axe, WAVE, and Lighthouse for audit reporting"
  tags: [tools, automated, axe, WAVE, Lighthouse, beginner]

state: {}

trigger: |
  A junior auditor asks: "I've heard of tools like
  axe, WAVE, and Lighthouse for accessibility testing.
  But I'm confused:

  - Which tool should I use?
  - Do they find the same things?
  - Can I just run a tool and use its output as my
    audit report?
  - How do I include tool results in my report?
  - What do these tools miss?

  I tested a page with two different tools and got
  different results — one found 12 issues, the other
  found 8. Which one is right?"

  Task: Explain accessibility testing tools, their
  capabilities and limitations, and how to use their
  output in audit reports.

assertions:
  - type: llm_judge
    criteria: "Response explains major testing tools — axe DevTools (browser extension by Deque: scans current page DOM, identifies WCAG violations with detailed descriptions and fix suggestions, categorizes by impact — critical/serious/moderate/minor, most comprehensive automated scanner, integrates with CI/CD via axe-core library), WAVE (Web Accessibility Evaluation Tool by WebAIM: visual overlay showing issues directly on the page, color-coded icons for errors/alerts/features, helpful for visual learners and quick checks, shows structural elements like headings and landmarks), Lighthouse (built into Chrome DevTools: accessibility is one audit category alongside performance and SEO, scores 0-100 based on automated checks, good for quick overview but less detailed than axe), and others worth knowing (Pa11y: command-line tool for CI integration, ANDI: Section 508 testing tool, Colour Contrast Analyser: standalone desktop tool for contrast measurement). Explains when to use each tool"
    weight: 0.35
    description: "ToolExplanation"
  - type: llm_judge
    criteria: "Response clarifies tool limitations — what automated tools CAN find (~30-40% of accessibility issues: missing alt text, color contrast failures, missing form labels, missing document language, empty buttons/links, duplicate IDs, missing landmarks — issues that are detectable in the HTML code), what automated tools CANNOT find (~60-70% of issues: whether alt text is actually meaningful, whether focus order is logical, whether content is understandable, whether custom widgets are keyboard-operable, whether screen reader announcements make sense, whether the page makes sense visually for cognitive disabilities, whether video has accurate captions), why tools disagree (different rule sets — axe and WAVE use slightly different rules and interpretations, different DOM states — dynamic content may render differently between scans, different defaults — some tools flag 'needs review' items as issues while others don't). Key message: automated tools are essential but are the starting point, not the entire audit"
    weight: 0.35
    description: "ToolLimitations"
  - type: llm_judge
    criteria: "Response shows how to use tool output in reports — do NOT just export tool results as the audit report (tool output is too technical, lacks context, and doesn't include manual findings), proper workflow (Step 1: run automated tools to identify baseline issues, Step 2: review each automated finding — confirm it's a real issue, not a false positive, Step 3: add context — explain the user impact in plain language, Step 4: combine with manual testing findings, Step 5: deduplicate — same issue on multiple pages becomes one finding with 'Affected pages' list), including tool data in reports (reference the tool as methodology: 'Automated testing performed with axe DevTools v4.x', include tool-generated screenshots or highlights where they help illustrate the issue, use tool's WCAG references but write your own impact descriptions), and false positive handling (some tool findings aren't actual issues — investigate before including, note false positives in methodology section to show thoroughness)"
    weight: 0.30
    description: "ToolInReports"
