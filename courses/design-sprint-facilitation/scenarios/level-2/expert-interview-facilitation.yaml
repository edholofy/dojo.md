meta:
  id: expert-interview-facilitation
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Expert interview facilitation — structure and facilitate Monday afternoon expert interviews for maximum insight"
  tags: [expert-interviews, monday, hmw, facilitation, intermediate]

state: {}

trigger: |
  It's Monday afternoon of your design sprint. The challenge
  is redesigning the checkout flow for an e-commerce platform
  — current cart abandonment rate is 68%. You have 90 minutes
  for expert interviews and have scheduled four experts:

  1. Head of Analytics — has data on where users drop off
  2. Customer Support Lead — handles checkout complaints daily
  3. Senior Engineer — knows the technical limitations of the
     current checkout system
  4. A power user — processes 50+ orders per month for their
     small business

  Sprint team: 6 people taking HMW notes during interviews.
  The team has never done HMW notes before and doesn't
  understand the format.

  Problem: The Head of Analytics wants to present a 30-slide
  deck. The power user is nervous and gives one-word answers.
  The Senior Engineer keeps going on tangents about
  microservices architecture.

  Task: Facilitate the expert interviews and teach HMW
  note-taking to the team.

assertions:
  - type: llm_judge
    criteria: "Response teaches and facilitates HMW note-taking — HMW format explanation (teaches the team before interviews begin: HMW stands for 'How Might We' — it's a way to capture problems and insights as opportunity statements; when you hear a problem like 'users don't trust the payment page', write 'HMW make the payment page feel trustworthy?'; when you hear a need like 'I need to see shipping costs early', write 'HMW show shipping costs before checkout?'; the format turns complaints into actionable design challenges), HMW quality guidance (provides examples of good vs bad HMW notes: too broad — 'HMW fix checkout?' is too vague to act on; too narrow — 'HMW add a green trust badge to the payment form?' is a solution, not a question; just right — 'HMW reduce anxiety at the payment step?'; each person should aim for 1-2 HMW notes per minute of interview; write one note per sticky note so they can be organized later), real-time coaching (during the first interview, pauses briefly to check the team's HMW notes; corrects common mistakes early — turning insights into solutions instead of questions; shares a few of your own HMW notes as examples; by the second interview, the team should be self-sufficient)."
    weight: 0.35
    description: "HMWNoteTaking"
  - type: llm_judge
    criteria: "Response manages the four different expert personalities — analytics deck problem (redirects the 30-slide presentation: 'We'd love to see the data, but in the sprint format we do a conversational interview — can you walk us through the top 3-5 findings about where users drop off?'; if they insist on slides, allow 5 minutes for the key slides then shift to Q&A; the goal is insight extraction, not a formal presentation; ask specific questions: 'Which checkout step has the highest drop-off? What do users do right before abandoning?'), nervous power user (creates a comfortable environment: start with easy rapport-building questions — 'Tell us about your business and how often you order'; use open-ended prompts — 'Walk us through your last checkout experience'; avoid 'why' questions which can feel interrogating — use 'what happened next?' instead; the power user's real-world experience is the most valuable input; validate their answers — 'That's really helpful, tell me more about that'), tangential engineer (keeps the engineer focused: acknowledge the technical knowledge — 'The architecture context is helpful'; then redirect — 'For the sprint, we're focused on the user experience — from a user's perspective, what are the biggest checkout limitations?'; use specific questions to prevent tangents — 'What technical constraint most impacts checkout speed?' rather than open-ended 'tell us about the system'; if tangents persist, gently intervene — 'Let's capture that for later and come back to the user experience')."
    weight: 0.35
    description: "ExpertManagement"
  - type: llm_judge
    criteria: "Response structures the interview session effectively — time allocation (90 minutes for 4 experts: 20 minutes per expert with 5-minute transitions between each, leaving 10 minutes at the end for HMW organization; each 20-minute interview: 2 minutes of introduction, 15 minutes of Q&A, 3 minutes for the team to capture final thoughts; order matters — start with the analytics person for data context, then support lead for qualitative stories, then the power user for firsthand experience, end with the engineer for feasibility context), interview structure per expert (prepares 3-5 key questions for each expert in advance: Analytics — where do users drop off? what's the conversion difference between mobile and desktop? what do returning users do differently?; Support — what are the top 3 checkout complaints? what do customers say when they call about failed orders?; Power User — walk us through a typical order, what frustrates you most, what would make checkout faster?; Engineer — what are the top 3 technical constraints, what's hard to change in the current system?), post-interview synthesis (after all 4 interviews: team organizes HMW notes on the wall or board; group similar notes into themes — likely themes: trust and security, shipping cost transparency, mobile experience, payment flexibility, speed and performance; vote on the most important HMW themes to carry into Tuesday's sketching; this synthesis bridges Monday's understanding to Tuesday's ideation)."
    weight: 0.30
    description: "InterviewStructure"
