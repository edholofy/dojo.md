meta:
  id: intermediate-sprint-shift
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Intermediate sprint shift — navigate a mid-sprint crisis that tests all intermediate facilitation skills simultaneously"
  tags: [shift, crisis, multi-challenge, intermediate]

state: {}

trigger: |
  It's Wednesday morning (Decide day) of a design sprint
  for a healthcare patient portal. Everything was going well
  until this morning when multiple issues converge:

  1. The Art Museum review reveals that 3 of 5 solution
     sketches solve different problems — the team diverged
     during Tuesday's sketching because Monday's target
     wasn't clear enough.

  2. The Decider (Chief Medical Officer) announces she needs
     to leave by 2pm for a hospital emergency and won't be
     back until Friday morning.

  3. The recruited test users for Friday are all healthcare
     providers, but the sprint is designing for patients —
     the wrong user segment was recruited.

  4. The PM pulls you aside and says: "The engineering team
     just told me the patient data API we planned to use is
     being deprecated. Half these solutions won't be
     technically feasible."

  Sprint team: 6 people. You have the room until 5pm today
  and all day Thursday and Friday.

  Task: Navigate this multi-crisis Wednesday and salvage
  the sprint.

assertions:
  - type: llm_judge
    criteria: "Response addresses the divergent sketches — diagnosis (recognizes this is a Monday target problem manifesting on Wednesday — the team's divergent sketches are a symptom of an unclear sprint target, not poor sketching; in a healthy sprint, all sketches address the same target area even if solutions differ; 3 of 5 solving different problems means the target was ambiguous), recovery approach (doesn't restart Monday — instead, uses the divergence productively: review all 5 sketches and identify the common thread — is there a theme that appears across most sketches?; have the team do a quick re-vote on which problem area is most critical; the Decider's Supervote becomes especially important — she can cut through the divergence by picking the direction; if 2 sketches address the same problem well, focus the storyboard on that area; the other sketches become documented ideas for future sprints, not wasted work), storyboard implications (the storyboard must be laser-focused after the divergence: pick one clear user journey based on the Supervote; make sure every panel addresses the same problem; the facilitator should co-create the storyboard more actively than usual to prevent further divergence; Wednesday afternoon's storyboard session should start with a 5-minute recap of the chosen direction)."
    weight: 0.35
    description: "DivergentSketches"
  - type: llm_judge
    criteria: "Response handles the Decider departure and wrong test users — accelerated Decider decisions (the CMO leaving at 2pm means all Decider-dependent decisions must happen before 2pm: move the Supervote to first thing — 9:30am; get the storyboard direction decided by lunch; have the CMO designate a decision proxy for Thursday — ideally someone clinical who understands patient needs; get the CMO's explicit blessing: 'If the proxy decides, will you support the outcome?'; schedule a 15-minute video call Thursday evening for a storyboard review), test user crisis (wrong test users is a serious problem — healthcare providers and patients have fundamentally different needs: immediately start recruiting replacement users — the UX researcher should begin outreach today; if replacement patients can't be found by Friday, consider: testing with friends or family who've used patient portals — they're imperfect but closer to the right segment than healthcare providers; alternatively, shift Friday to Monday and give 2 extra days for recruitment; the healthcare providers could still provide a 'clinical validation' perspective as a supplementary test, not the primary one), triage and prioritization (with multiple crises, prioritize by impact: first — Decider decisions before 2pm, because everything downstream depends on direction; second — test user recruitment, because it has the longest lead time; third — the technical API issue, which affects feasibility but not the prototype; fourth — sketch divergence, which the Supervote will resolve)."
    weight: 0.35
    description: "DeciderAndTestUsers"
  - type: llm_judge
    criteria: "Response handles the technical feasibility issue — API deprecation impact (assesses which solutions are affected: if half the solutions rely on the deprecated patient data API, those solutions need a feasibility adjustment — not elimination; asks the engineer: 'Is there a replacement API? What's the timeline? Can we prototype with the current API even if production will use something different?'; the prototype doesn't need production-ready APIs — it can simulate the data), sprint vs production separation (clarifies a critical sprint principle: the prototype is a facade for testing desirability, not a production system; even if the API is deprecated, the prototype can use fake data; the engineering concern is valid for post-sprint development planning but shouldn't derail the sprint itself; note the technical constraint for the sprint-to-development handoff document), revised Wednesday schedule (creates an adjusted timeline: 9:00-9:30 — brief team on all issues transparently, set expectations; 9:30-10:30 — Art Museum review and Supervote with the CMO present; 10:30-11:00 — quick feasibility review with engineer — which solutions work with existing tech?; 11:00-12:00 — begin storyboard with the Supervote winner; 12:00-12:30 — CMO reviews storyboard progress and designates proxy; 12:30-1:00 — lunch; 1:00-5:00 — complete storyboard, begin prototype planning; parallel: UX researcher recruits replacement test users all day)."
    weight: 0.30
    description: "TechnicalFeasibilityAndSchedule"
