meta:
  id: sprint-outcome-measurement
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Sprint outcome measurement — define success criteria and measure the impact of design sprint results"
  tags: [measurement, outcomes, metrics, success-criteria, intermediate]

state: {}

trigger: |
  You've now facilitated 5 design sprints over the past year.
  The CEO asks: "We've spent 25 person-weeks on design
  sprints. What's the ROI? How do I know these are worth it
  compared to just having the team build features?"

  Here's what happened with each sprint:

  Sprint 1 (New onboarding): Validated. Built and shipped.
  Activation rate improved 23%.

  Sprint 2 (Search redesign): Prototype tested poorly. Team
  pivoted to a different approach without building.

  Sprint 3 (Pricing page): Validated. Built but hasn't been
  A/B tested yet — no measurable impact.

  Sprint 4 (Mobile app concept): Invalidated the concept
  entirely. The team was about to spend 6 months building it.

  Sprint 5 (Dashboard redesign): Mixed results. 3/5 users
  liked the new layout, 2/5 preferred the old one. Team is
  unsure whether to proceed.

  Task: Create a framework for measuring design sprint ROI
  and present the case to the CEO.

assertions:
  - type: llm_judge
    criteria: "Response creates a sprint ROI framework — value categories (defines multiple types of sprint value beyond just shipped features: validated ideas that succeeded — Sprint 1's 23% activation improvement is direct measurable ROI; invalidated ideas that saved resources — Sprint 4 prevented 6 months of wasted engineering on a concept users didn't want; this is cost avoidance — potentially the highest-value outcome; faster decisions — Sprint 2 failed fast in 1 week instead of failing after months of development; reduced risk — Sprint 3 validated before full investment, Sprint 5 provided data for a difficult decision), quantifying the savings (puts numbers on the value: Sprint 4 alone — 6 months of engineering for a team of 4-5 people saved; at average fully loaded engineering cost, that's significant; Sprint 2 — testing poorly in 1 week vs discovering failure after 3 months of building; Sprint 1 — 23% activation improvement has compounding revenue impact; frame the 25 person-weeks as investment against these returns), comparison to alternatives (addresses the CEO's question directly: without sprints, teams typically build first and test after — the failure rate for untested features is 60-90% in product development; sprints front-load the learning to week 1; compare: 5 weeks of sprint investment vs the potential months of wasted development across 5 initiatives; the sprint process doesn't replace building — it ensures the team builds the right things)."
    weight: 0.35
    description: "ROIFramework"
  - type: llm_judge
    criteria: "Response evaluates each sprint's outcome honestly — Sprint 1 success story (23% activation improvement is the clear win — quantify the revenue impact: if 1000 new users per month and 23% more activate, what's the LTV difference?; this single sprint may have paid for all 5 sprints in ROI; track ongoing — is the improvement sustained 6 months later?), Sprint 2 smart failure (reframe: the sprint didn't fail — it succeeded at finding that the approach was wrong; the team pivoted before investing engineering resources; the question is — what did the team build instead, and was that successful?; the sprint's value was preventing a bad build, not producing a good prototype), Sprint 4 biggest save (this is potentially the highest-value sprint: 6 months of engineering time saved by learning in 1 week that the concept didn't work; the CEO should understand that invalidation is not failure — it's the sprint working as designed; many teams would have built the mobile app, launched it, and then discovered it didn't work — that's the expensive failure), Sprint 3 and 5 incomplete data (Sprint 3 validated but hasn't been measured post-launch — this is a process gap, not a sprint failure; recommend A/B testing within 2 weeks of launch to close the loop; Sprint 5's mixed results are actually useful data — suggests the redesign needs iteration, not full commitment; recommend a follow-up sprint focused on the specific areas 2/5 users disliked)."
    weight: 0.35
    description: "SprintEvaluation"
  - type: llm_judge
    criteria: "Response establishes ongoing measurement practices — sprint success metrics (defines what to measure for every future sprint: immediate — did the prototype test well with users? what was validated vs invalidated?; short-term — was the validated solution built and shipped within 3 months?; medium-term — did the shipped solution achieve its target metrics 3-6 months later?; long-term — has the sprint practice improved the team's overall product success rate?), measurement infrastructure (recommends tracking systems: a sprint outcome tracker — simple spreadsheet or dashboard tracking each sprint from ideation through implementation to impact; sprint-to-ship pipeline — tracks how many sprint outputs actually get built; metric tracking — connects sprint goals to product analytics; quarterly sprint retrospective — reviews all sprints from the quarter and their outcomes), presenting to the CEO (structures the narrative: 'In 25 person-weeks, we validated 2 ideas worth building, killed 2 ideas that would have wasted months of engineering, and gathered data on 1 that needs more work; the cost-avoidance from Sprint 4 alone likely exceeds the total investment in all 5 sprints; sprints aren't a replacement for building — they're insurance against building the wrong things')."
    weight: 0.30
    description: "OngoingMeasurement"
