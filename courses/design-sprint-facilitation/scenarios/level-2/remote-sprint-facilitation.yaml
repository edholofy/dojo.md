meta:
  id: remote-sprint-facilitation
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Remote sprint facilitation — adapt the design sprint for fully remote teams"
  tags: [remote, virtual, distributed, miro, intermediate]

state: {}

trigger: |
  You're facilitating a design sprint for a fully remote
  team distributed across 3 time zones (US East, US West,
  and Europe). The sprint challenge: redesigning the user
  onboarding flow for a developer tools platform.

  Team: 7 people
  - San Francisco (PST): 2 engineers, 1 PM
  - New York (EST): VP of Product (Decider), 1 designer
  - Berlin (CET): 1 UX researcher, 1 data analyst

  Constraints:
  - Berlin is 6 hours ahead of San Francisco — a 9am PST
    start is 6pm CET (too late), a 6am PST start is
    unreasonable
  - The team has never met in person
  - Tools available: Zoom, Miro, Figma, Slack
  - Some team members have spotty internet connections
  - The CEO insists on keeping the sprint to 5 days
    despite the remote challenges

  5 test users are recruited and will test remotely via
  Zoom on Friday.

  Task: Design the remote sprint plan addressing time
  zones, tool setup, and engagement.

assertions:
  - type: llm_judge
    criteria: "Response solves the time zone challenge — overlapping hours analysis (identifies the overlap window: PST 8am-12pm = EST 11am-3pm = CET 5pm-9pm; this gives 4 hours of full overlap — but 5pm-9pm CET is evening for Berlin, which is burdensome for 5 days; better approach: PST 7am-11am = EST 10am-2pm = CET 4pm-8pm — still evening for Berlin but slightly less extreme), hybrid sync/async structure (designs a schedule that maximizes the 4-hour overlap for collaborative exercises while using async time for individual work: synchronous blocks for exercises requiring interaction — goal setting, expert interviews, voting, storyboard creation, test debrief; asynchronous blocks for individual work — Crazy 8s, solution sketches, prototype building, note-taking; this might extend the sprint across more calendar hours but preserves the critical collaborative moments), Berlin team accommodation (acknowledges the burden on Berlin participants working evenings: offer to shift some sync sessions to favor Berlin timezone on alternating days; provide clear async deliverable timelines so Berlin participants can complete individual work during their regular hours; have the facilitator do pre-meeting prep with Berlin to ensure they're caught up on any work that happened during US-only hours)."
    weight: 0.35
    description: "TimeZoneSolution"
  - type: llm_judge
    criteria: "Response designs the remote tool setup — Miro workspace (pre-builds the digital workspace before the sprint starts: Monday board with goal-setting template, sprint questions section, journey map framework, HMW sticky note area; Tuesday board with Lightning Demos template, Crazy 8s upload section, solution sketch upload area; Wednesday board with art museum gallery, voting section, storyboard template; pre-populated templates reduce confusion and save synchronous time), remote exercise adaptations (adapts exercises for remote: Crazy 8s — participants sketch on paper, photograph and upload to Miro; voting — Miro's built-in voting feature with anonymous dots; silent Art Museum — 'everyone turn off cameras and mics for 10 minutes while you review the Miro board'; expert interviews — conducted over Zoom with HMW notes captured in Miro in real-time; solution sketches — upload to Miro as images or PDFs), engagement management (remote sprints have higher disengagement risk: require cameras on during synchronous sessions; use frequent check-ins and round-robin sharing; alternate between full-group and breakout-room exercises; assign a co-facilitator to monitor the chat for questions and engagement signals; schedule breaks every 45-60 minutes — remote meetings are more fatiguing than in-person)."
    weight: 0.35
    description: "RemoteToolSetup"
  - type: llm_judge
    criteria: "Response addresses remote-specific challenges — pre-sprint preparation (remote sprints require more preparation than in-person: send all participants a 'remote sprint kit' — Miro tutorial, exercise explanations, technology check instructions; run a 30-minute tech rehearsal with all participants before Monday; ensure everyone has reliable internet, a quiet workspace, and a second monitor if possible; establish ground rules — cameras on, phones away, Slack notifications off during sync sessions), remote testing on Friday (adapts user testing for remote: Zoom-based sessions with screen sharing — the test user shares their screen while interacting with the Figma prototype; the observation team watches in a separate Zoom room with the facilitator's audio piped in; one person manages the technology while the facilitator focuses on the interview; record all sessions for team members who are in a different time zone during testing), the team-hasn't-met challenge (remote sprint with strangers is harder than in-person: start Monday with a 15-minute icebreaker — not just names and roles but a personal question like 'what's the worst onboarding experience you've ever had?'; use video and first names throughout; create a casual Slack channel for non-work conversation during the sprint week; the remote sprint can actually build team cohesion if facilitated with intention)."
    weight: 0.30
    description: "RemoteChallenges"
