meta:
  id: design-sprint-2-0
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Design Sprint 2.0 — facilitate the compressed 4-day sprint format by AJ&Smart"
  tags: [sprint-2-0, four-day, ajsmart, compressed, intermediate]

state: {}

trigger: |
  You're a product designer at a mid-size company. The
  VP of Product says: "I love design sprints but we can't
  afford to pull the team for 5 full days. I heard there's
  a 4-day version. Can we do that instead?"

  You've run several 5-day sprints and are now being asked
  to run a Design Sprint 2.0 (the AJ&Smart 4-day format)
  for the first time. The challenge: redesigning the
  company's customer support chat experience — current
  CSAT is 2.8/5.

  Team: 6 people including the VP of Product as Decider.
  Time: Monday through Thursday, 9am-5pm each day.

  The VP asks: "What's different about the 4-day version?
  What are we cutting? Are we sacrificing quality?"

  Task: Plan and explain the Design Sprint 2.0 format,
  how it differs from the original 5-day sprint, and
  what trade-offs are involved.

assertions:
  - type: llm_judge
    criteria: "Response explains the Design Sprint 2.0 format — 4-day structure (describes how the sprint is compressed: Day 1 combines Map and Sketch — morning is mapping with goals, sprint questions, journey map, and expert interviews; afternoon shifts to sketching with Lightning Demos and Crazy 8s, ending with solution sketches; Day 2 focuses on Decide — art museum, voting, Supervote, storyboard creation; Day 3 is Prototype — full day of building; Day 4 is Test — user interviews and synthesis), what's compressed vs cut (explains the differences honestly: the mapping exercises are tightened — faster expert interviews, more focused journey mapping; sketching starts the same day as mapping, which means less overnight reflection time; the decide day has more time for storyboard detail since it's not sharing with sketch; the structure is proven by AJ&Smart across hundreds of sprints — it's not a hastily compressed version but a deliberately redesigned format), trade-offs acknowledged (honest about what changes: less overnight incubation between Map and Sketch — in the 5-day version, the team sleeps on the problem before sketching; the afternoon sketch session after a morning of mapping can feel rushed; the 4-day format requires more disciplined time management — there's less buffer for exercises that run long; benefit: the team commitment is 4 days instead of 5, which is significant for busy organizations)."
    weight: 0.35
    description: "Sprint2Format"
  - type: llm_judge
    criteria: "Response provides a detailed Day 1 plan combining Map and Sketch — morning map session (9am-12pm: 9:00 — sprint brief review and goal setting; 9:30 — sprint questions; 10:00 — expert interviews in How Might We format — compressed to 2-3 experts at 10 minutes each instead of the original's longer interviews; 11:00 — journey map creation; 11:30 — HMW organization and voting; 11:45 — target selection by the Decider), afternoon sketch session (1pm-5pm: 1:00 — Lightning Demos — each person presents 1 inspiring solution in 3 minutes; 2:00 — individual note-taking and idea generation; 2:30 — Crazy 8s exercise; 3:00 — solution sketch — detailed 3-panel storyboard; 4:30 — sketches posted on wall for overnight review; the transition from map to sketch in one day requires clear facilitation — 'this morning we understood the problem, this afternoon we generate solutions'), facilitation tips for the compressed Day 1 (the biggest risk is Day 1 fatigue — the team goes from intense mapping to creative sketching without a night to process; combat this with an energizing transition activity after lunch; the Crazy 8s exercise at 2:30 serves as a warm-up before the detailed sketch, which is especially important when the team hasn't had overnight to incubate)."
    weight: 0.35
    description: "Day1Combined"
  - type: llm_judge
    criteria: "Response applies the 4-day format to the support chat challenge — problem-specific adaptation (the customer support chat challenge at 2.8/5 CSAT is well-suited for a 4-day sprint: the problem is clear and focused, the solution can be prototyped in Figma or a chat simulation tool, and user testing can evaluate a chat interaction in a single session), Day 1 expert interviews (suggests relevant experts for the support chat challenge: current support agents who handle chat daily, a customer who recently had a bad chat experience, the support team lead with data on common issues — these interviews will reveal why CSAT is 2.8 and where the chat experience breaks down), Day 4 testing approach (describes how to test a chat prototype: recruit 5 users who have used chat support recently; give them a scenario — 'you need to resolve a billing issue via chat'; test the redesigned chat flow including response time simulation, agent handoff, and resolution confirmation; measure both task completion and emotional satisfaction — CSAT is about how users feel, not just whether they got help)."
    weight: 0.30
    description: "AppliedFormat"
