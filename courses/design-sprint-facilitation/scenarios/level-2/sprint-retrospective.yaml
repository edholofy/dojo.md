meta:
  id: sprint-retrospective
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Sprint retrospective — facilitate a post-sprint retrospective to improve future sprint processes"
  tags: [retrospective, reflection, improvement, process, intermediate]

state: {}

trigger: |
  You've just completed your company's third design sprint.
  The PM asks you to run a retrospective because each
  sprint has had recurring problems. Here's what happened
  across the three sprints:

  Sprint 1 (Onboarding redesign):
  - Successful outcome — validated a new onboarding flow
  - Problem: Monday ran 2 hours over schedule, compressing
    the rest of the week
  - Problem: The Decider was distracted by phone all week

  Sprint 2 (Search feature):
  - Mixed outcome — prototype tested poorly
  - Problem: Only 3 of 5 test users showed up Friday
  - Problem: The engineering team wasn't involved, so the
    winning idea was technically impossible
  - Win: Best sketching session yet — Crazy 8s produced
    an unexpected breakthrough idea

  Sprint 3 (Pricing page redesign):
  - Failed outcome — the prototype confused all 5 users
  - Problem: The team skipped How Might We notes on Monday
    because "they take too long"
  - Problem: Thursday's prototype was too polished — the
    team spent all day on visual design instead of getting
    the flow right
  - Problem: The sprint brief was vague — "make the pricing
    better" wasn't specific enough

  Task: Facilitate the retrospective and identify patterns
  to improve future sprints.

assertions:
  - type: llm_judge
    criteria: "Response facilitates a structured retrospective — retrospective format (uses a clear framework: Rose/Bud/Thorn or Start/Stop/Continue or 4Ls — Liked, Learned, Lacked, Longed for; structured agenda — 60-90 minutes: opening — set context with a summary of all 3 sprints; individual reflection — 10 minutes of silent writing; sharing and grouping — each person shares their items and the facilitator groups by theme; pattern identification — which issues are recurring?; action items — specific improvements for the next sprint), cross-sprint pattern analysis (identifies patterns across all 3 sprints, not just individual sprint problems: time management is a recurring issue — Monday overrun in Sprint 1, skipping exercises in Sprint 3, over-polishing prototype in Sprint 3; sprint preparation quality varies — Sprint 3 had a vague brief, Sprint 2 didn't include engineering; test user recruitment needs a process — Sprint 2 had 3 no-shows), what worked (doesn't just focus on problems: Sprint 1 produced a validated outcome despite process issues; Sprint 2's Crazy 8s session was the best yet — what made it great and how to replicate it; the team is gaining sprint experience and can now identify issues faster)."
    weight: 0.35
    description: "RetrospectiveStructure"
  - type: llm_judge
    criteria: "Response identifies root causes and specific improvements — Sprint 1 root causes (Monday overrun: the facilitator wasn't strict enough with time boxes; expert interviews probably ran long; improvement: set a visible timer for every exercise and commit to cutting discussions at time; the Decider's distraction: a 'no devices' rule wasn't enforced; improvement: establish a clear no-phone policy and call it out when violated — 'CEO, we need your full attention for the Supervote'), Sprint 2 root causes (test user no-shows: recruitment was probably last-minute with no backups; improvement: recruit 7 users for 5 slots — always have 2 backups; missing engineering: the team composition was wrong; improvement: always include at least one engineer and assess technical feasibility during Wednesday's storyboard), Sprint 3 root causes (skipping HMW notes: this likely contributed to the prototype confusing users — without HMW notes, the team's understanding of the problem was incomplete; improvement: never skip exercises; they exist for a reason and the later exercises depend on the earlier ones; vague brief: 'make the pricing better' gave no clear target; improvement: the sprint brief must include a specific challenge, measurable goal, and sprint questions; prototype over-polishing: the team spent time on visual design instead of getting the flow right; improvement: set a 'no visual design' rule for prototype day — gray boxes and system fonts only)."
    weight: 0.35
    description: "RootCausesAndImprovements"
  - type: llm_judge
    criteria: "Response produces actionable retrospective outcomes — action items with owners (each improvement has a specific owner and timeline: establish a sprint checklist — facilitator owns before each sprint; create a user recruitment template with timeline — UX researcher owns; enforce a time management protocol — facilitator commits to strict time-boxing; update the sprint brief template with required fields — PM owns), sprint playbook creation (suggests creating a team sprint playbook based on the 3 sprints of experience: document what works — the Crazy 8s breakthrough process from Sprint 2, the exercises that can't be skipped; document what to avoid — vague briefs, missing team members, over-polished prototypes; this playbook grows with each sprint and prevents repeated mistakes), measuring retrospective effectiveness (how to know if the retrospective worked: track the action items — healthy teams complete 70-80% of retro action items; review the action items at the start of the next retrospective — did the changes improve things?; compare Sprint 4's process health to Sprints 1-3 — are the recurring problems actually fixed?)."
    weight: 0.30
    description: "ActionableOutcomes"
