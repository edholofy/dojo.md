meta:
  id: stakeholder-management-sprint
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Stakeholder management during sprints — handle executives, skeptics, and scope creep while maintaining sprint integrity"
  tags: [stakeholders, management, executives, scope, intermediate]

state: {}

trigger: |
  You're facilitating a design sprint for an enterprise SaaS
  company's billing dashboard redesign. On Day 2 (Sketch),
  three stakeholder issues emerge simultaneously:

  1. The CFO (not part of the sprint team) walks in and says:
     "I just realized we're not including the tax compliance
     feature I mentioned last month. This sprint is pointless
     without it."

  2. The Decider (VP of Product) gets pulled into a board
     meeting and says she'll "check in later" — leaving no
     one with decision-making authority for Wednesday's
     Supervote.

  3. Two engineers on the sprint team are quietly sketching
     solutions that require a 6-month infrastructure rebuild,
     ignoring the constraint that the solution must work with
     the existing tech stack.

  Sprint team: 7 people (VP Product as Decider, 2 designers,
  2 engineers, 1 PM, 1 customer support lead).

  Task: Address all three stakeholder challenges while
  keeping the sprint on track.

assertions:
  - type: llm_judge
    criteria: "Response handles the CFO interruption — acknowledging without derailing (validates the CFO's concern — tax compliance may be important; but explains that the sprint has a defined scope agreed upon Monday with the sprint team; the sprint brief specifically scoped the billing dashboard UX, not the feature set; adding tax compliance mid-sprint would invalidate Monday's work and derail the week), appropriate redirection (offers constructive alternatives: 'Let's capture tax compliance as a potential follow-up sprint topic'; suggests a 15-minute meeting after the sprint to discuss how tax compliance fits the roadmap; if the CFO insists, asks the Decider to make the call — scope changes require the Decider, not a visiting stakeholder), protecting the team (doesn't let the CFO interaction consume sprint time: takes the conversation outside the sprint room; limits it to 5-10 minutes maximum; returns to the team with a clear statement — 'The CFO raised tax compliance; we've noted it for follow-up, and our sprint scope remains unchanged'; the team needs to see the facilitator protect the process)."
    weight: 0.35
    description: "CFOInterruption"
  - type: llm_judge
    criteria: "Response handles the Decider absence — immediate action (the Decider leaving is a critical problem — Wednesday's entire structure depends on the Supervote; acts immediately: before the Decider leaves, asks her to delegate decision authority to someone specific — 'Can the PM act as Decider in your absence?' or 'Can you commit to a 30-minute Supervote session tomorrow, even if you miss the rest?'; if neither is possible, restructure Wednesday's schedule to move collaborative exercises earlier and delay the Supervote until the Decider returns), contingency planning (prepares for the possibility the Decider doesn't return: have the team vote normally and present the top 2-3 options to the Decider for a quick decision via Slack or a 10-minute call; document the rationale behind each option so the Decider can make an informed choice quickly; worst case — reschedule the Supervote to Thursday morning and compress the prototype day), preventing future occurrences (addresses the systemic issue: the sprint brief should include explicit time commitments — 'The Decider must be available for the full 5 days'; sprint kickoff should include calendar blocking for the entire week; if an executive can't commit to 5 days, discuss whether they should be the Decider or whether someone else with more availability should fill that role)."
    weight: 0.35
    description: "DeciderAbsence"
  - type: llm_judge
    criteria: "Response handles the engineering scope creep — identifying the pattern (recognizes that engineers sketching 6-month rebuilds is a common sprint anti-pattern — they're solving the technical problem they want to solve rather than the user problem the sprint is addressing; this often happens when engineers feel constrained by 'build with existing tech' and default to 'if only we rebuilt everything'), constructive redirection (doesn't dismiss the engineers' ideas but redirects: 'These are interesting long-term architectural ideas; for this sprint, the constraint is working with the existing stack — can you sketch a version that works within that constraint?'; reframe the constraint as a creative challenge — 'What's the best experience we can deliver without rebuilding infrastructure?'; if the engineers push back, remind them that the sprint tests desirability with users first and feasibility is addressed after validation), facilitation technique (uses the sprint's built-in mechanisms: during Wednesday's feasibility review, technical constraints are formally assessed; solutions that require 6-month rebuilds can be noted as 'future state' while the sprint focuses on 'achievable now'; the storyboard should reflect what can be prototyped and tested this week; connect back to the sprint's purpose — test ideas with users quickly, not plan the perfect architecture)."
    weight: 0.30
    description: "EngineeringScopeCreep"
