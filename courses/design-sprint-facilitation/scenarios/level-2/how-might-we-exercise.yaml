meta:
  id: how-might-we-exercise
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "How Might We exercise — facilitate HMW generation, organization, and voting to frame the sprint's design challenge"
  tags: [hmw, how-might-we, framing, voting, intermediate]

state: {}

trigger: |
  You're running a design sprint for a fitness app that's
  losing users after the first week. After Monday morning's
  mapping and afternoon expert interviews, the team has
  generated 87 HMW sticky notes. Now you need to organize
  them, vote on the most important ones, and use them to
  select a target on the journey map.

  Some sample HMW notes from the team:
  - "HMW make the first workout feel achievable?"
  - "HMW help users set realistic goals?"
  - "HMW fix the onboarding?" (too vague)
  - "HMW add a chatbot that guides users?" (solution, not question)
  - "HMW prevent users from feeling overwhelmed by options?"
  - "HMW make users come back on day 3?"
  - "HMW ensure the app works offline?" (edge case)
  - "HMW reduce the 15-step signup process?" (embedded solution)

  The team is tired after a full day. Two people think HMW
  is "just more Post-it note nonsense." The Decider is
  impatient and wants to "just pick a focus area and move on."

  Task: Facilitate the HMW organization, voting, and target
  selection process.

assertions:
  - type: llm_judge
    criteria: "Response organizes the 87 HMW notes effectively — quality check (quickly reviews and filters the notes: identifies notes that are too vague — 'HMW fix the onboarding?' needs rewriting to 'HMW make onboarding feel quick and rewarding?'; identifies embedded solutions — 'HMW add a chatbot?' should become 'HMW guide users through their first experience?'; identifies edge cases that can be set aside — 'HMW ensure offline?' is valid but not core to retention; doesn't rewrite every note — just flags the most problematic ones for the team to refine in 2-3 minutes), thematic grouping (organizes notes into clusters — likely themes from a fitness app retention sprint: first experience — notes about day 1, first workout, initial setup; goal setting — realistic goals, personalization, expectations; overwhelm and complexity — too many options, confusing navigation; habit formation — day 3 return, streaks, reminders, motivation; social and accountability — community, friends, coaching; the grouping should take 10-15 minutes with the team silently reading and physically moving sticky notes into groups), naming the themes (after grouping, the team names each cluster with a clear label: each name should capture the 'design opportunity' — not 'onboarding problems' but 'first-day experience'; the themes become the lens for selecting a sprint target; typically 5-8 themes emerge from 87 notes)."
    weight: 0.35
    description: "HMWOrganization"
  - type: llm_judge
    criteria: "Response facilitates voting and target selection — dot voting process (each team member gets 2 large dot stickers and can vote on any HMW theme; the Decider gets 4 dots — their votes carry extra weight but don't override the team; voting is silent — no campaigning or explaining your vote; 3 minutes maximum; the themes with the most dots become candidates for the sprint target), connecting to the journey map (the voted HMW themes map to specific moments on Monday morning's customer journey map: if 'first-day experience' wins the vote, the sprint target becomes the first-workout moment on the journey map; if 'habit formation' wins, the target becomes the day 2-3 return loop; the Decider makes the final call on the sprint target — 'We're going to focus on making the first workout experience so good that users want to come back'; this target guides all of Tuesday's sketching), handling the skeptics and impatient Decider (addresses the 'Post-it nonsense' concern: 'I understand this feels like a lot of sticky notes — the value is that we just synthesized 4 expert interviews and a full day of research into clear themes; without this, we'd be sketching solutions tomorrow without agreeing on what problem to solve'; for the impatient Decider: 'We're 15 minutes from having a clear target — the voting makes this faster than a discussion because we skip the debate')."
    weight: 0.35
    description: "VotingAndTargetSelection"
  - type: llm_judge
    criteria: "Response bridges HMW to Tuesday sketching — Monday wrap-up (summarizes what the team accomplished: a clear sprint target mapped to the customer journey; 3-5 prioritized HMW questions that will guide tomorrow's sketching; the sprint questions from the morning now have context from the expert interviews; sends the team home with a homework assignment — 'Tonight, look at 3 apps or products that solve a similar problem well; you'll share these as Lightning Demos tomorrow'), setting up Tuesday (explains how the HMW work feeds into sketching: the prioritized HMW questions become the creative brief for solution sketching; when the team does Lightning Demos and Crazy 8s on Tuesday, they're generating solutions to these specific HMW questions; the journey map target tells them exactly which moment in the user experience they're redesigning; without Monday's HMW work, Tuesday's sketching would be unfocused — 'solve the retention problem' vs 'make the first workout feel achievable'), energy management (acknowledges the team is tired after a full day: keeps the HMW organization energetic by making it physical — standing, moving sticky notes; the voting is quick and satisfying — dots create a visible result; ends the day on a high note — 'We just turned a vague problem into a specific target in one day'; preview tomorrow's activities — 'Tomorrow is the fun part — you get to design solutions')."
    weight: 0.30
    description: "MondayToTuesdayBridge"
