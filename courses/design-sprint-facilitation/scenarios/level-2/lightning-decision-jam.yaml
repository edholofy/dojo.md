meta:
  id: lightning-decision-jam
  level: 2
  course: design-sprint-facilitation
  type: output
  description: "Lightning Decision Jam — facilitate the rapid decision-making workshop format for smaller problems"
  tags: [ldj, lightning-decision-jam, rapid, decision-making, intermediate]

state: {}

trigger: |
  Your product team has a recurring problem: they spend
  90-minute meetings debating issues without reaching
  decisions. The PM says: "We need to decide 3 things
  this week: (1) which onboarding step to remove, (2)
  what our empty state should say, and (3) whether to
  add dark mode. Each of these has been debated for weeks
  with no resolution."

  You propose running a Lightning Decision Jam (LDJ) —
  the 45-60 minute decision framework from AJ&Smart.

  Team: 5 people (PM, 2 designers, 1 engineer, 1 data
  analyst). No separate Decider role — the PM has final
  authority.

  The team has never done an LDJ before and is skeptical:
  "How can we decide in 45 minutes what we haven't decided
  in weeks?"

  Task: Plan and facilitate the Lightning Decision Jam
  for these three decisions.

assertions:
  - type: llm_judge
    criteria: "Response explains and plans the LDJ format — LDJ structure (describes the 7-step process: 1. Write problems on sticky notes — 7 min, silent; 2. Present and group problems — 4 min; 3. Dot vote on the most important problems — 4 min; 4. Prioritize the top problem — 2 min; 5. Reframe the top problem as HMW — 1 min; 6. Generate solutions on sticky notes — 7 min, silent; 7. Dot vote on solutions and create action items — 5 min; total: approximately 30-45 minutes per topic), why LDJ works for these decisions (explains the value: the team has been debating because meetings allow open-ended discussion without forcing a decision; the LDJ works by constraining time and using silent individual writing followed by voting — this eliminates the 'loudest voice wins' problem; dot voting makes preferences visible without debate; the PM's final authority prevents deadlock), adaptation for 3 decisions (either run 3 mini-LDJs — 20 minutes each — or run one LDJ where all 3 topics are listed as problems and the team votes on which to tackle first; for well-defined decisions with clear options — like 'which onboarding step to remove' — the LDJ can be compressed; for less defined decisions — like dark mode — more time may be needed)."
    weight: 0.35
    description: "LDJFormat"
  - type: llm_judge
    criteria: "Response facilitates the LDJ for the three specific decisions — onboarding step removal (present the data: which onboarding steps have the lowest completion rates? which steps correlate with user activation? the team silently writes which step they'd remove and why; vote; the PM makes the final call with evidence from the votes), empty state copy (frame as an HMW: 'How might we make the empty state guide users to their first action?'; team silently writes 3-5 options each; vote on favorites; the winning option gets refined — the team spends 5 minutes wordsmithing together after the vote picks the direction), dark mode decision (this is a yes/no strategic decision, not a design problem: reframe — instead of 'should we add dark mode?', ask 'what would dark mode cost and what would it achieve?'; team silently writes pros and cons; vote on whether it's worth the engineering investment; the PM's final call should consider the opportunity cost — is dark mode the best use of engineering time compared to other priorities?), handling skepticism (after the first LDJ completes in 15-20 minutes with a clear decision: the skepticism will likely dissolve; the team just made a decision they'd been debating for weeks — that's the proof; if the team questions the quality of the decision, note that the LDJ produces better decisions because it forces individual thinking before group discussion, reducing groupthink)."
    weight: 0.35
    description: "ThreeDecisions"
  - type: llm_judge
    criteria: "Response differentiates LDJ from full design sprints — when to use each (LDJ is for decisions with known options and limited scope — 'which step to remove' or 'what should the copy say?'; design sprints are for open-ended problems where the solution isn't known — 'how do we improve onboarding?' requires a full sprint; the LDJ is a complement to design sprints, not a replacement), LDJ as sprint training (the LDJ introduces sprint exercises — silent writing, dot voting, HMW framing — in a low-stakes format; teams that have done several LDJs are better prepared for their first full design sprint; the voting mechanics and silent ideation are the same exercises used in a 5-day sprint but at a smaller scale), output and follow-up (the LDJ should produce: 3 clear decisions with the rationale documented; action items — who implements each decision and by when; the decisions should be communicated to stakeholders who weren't in the room; review the decisions in 2-4 weeks — did they stick? did the team revert to debating? a good LDJ decision should survive contact with reality)."
    weight: 0.30
    description: "LDJvsSprintContext"
