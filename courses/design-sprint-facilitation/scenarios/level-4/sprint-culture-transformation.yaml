meta:
  id: sprint-culture-transformation
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint culture transformation — build a design sprint practice across an organization, training facilitators and embedding sprint methodology into product development"
  tags: [culture, transformation, organizational, practice, expert]

state: {}

trigger: |
  You're the Head of Design at a 500-person technology
  company. The CEO attended a design sprint workshop and
  returned saying: "Every product team should be running
  design sprints. Make it happen." Currently:

  - 12 product teams, each with their own PM and engineers
  - Only you and 1 senior designer have sprint experience
  - Teams currently use 6-week waterfall planning cycles
  - Engineering leadership is skeptical: "Sprints sound like
    another design exercise that won't affect how we build"
  - The company has no facilitation culture — meetings are
    unstructured and often unproductive
  - Budget: training budget of $50K and your time for 6 months

  The CEO wants to see "sprint adoption across the company"
  within 6 months. You know that mandating sprints without
  building capability will fail.

  Task: Design a sprint culture transformation program that
  builds genuine organizational capability.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased adoption strategy — phase 1 months 1-2 pilot (don't try to transform all 12 teams at once: select 2-3 teams for pilot sprints based on — willingness to try, a well-defined problem suitable for sprinting, and a mix of skeptics and enthusiasts; you personally facilitate these pilot sprints to demonstrate the methodology; document outcomes rigorously — before/after metrics, team feedback, time saved vs spent; the pilots create internal case studies and sprint advocates), phase 2 months 3-4 facilitator training (identify 4-6 potential facilitators from across the company: look for people with strong facilitation instincts — not necessarily designers; PMs, scrum masters, and team leads are often excellent facilitators; run a facilitator training program — 2-day intensive workshop plus co-facilitation of their first sprint with your mentorship; each trainee co-facilitates 1 sprint with you, then leads 1 sprint with you observing; by month 4, you should have 4-6 trained facilitators who can run sprints independently), phase 3 months 5-6 scaling (with trained facilitators, expand to more teams: aim for 6-8 teams running their first sprint by month 6; create a sprint support infrastructure — templates, Miro boards, scheduling tools, user recruitment process; establish a facilitator community of practice — monthly meetups to share learnings, troubleshoot problems, and improve the methodology; report to the CEO with data — number of sprints run, outcomes achieved, team satisfaction, and measurable product improvements)."
    weight: 0.35
    description: "PhasedAdoption"
  - type: llm_judge
    criteria: "Response addresses engineering skepticism and organizational resistance — winning over engineering (engineering skepticism is the biggest barrier: invite engineering leaders to observe a pilot sprint — seeing is believing; emphasize the engineering benefits — sprints reduce wasted development by validating before building; share Sprint 2-type failure stories — 'The sprint showed us the idea wouldn't work, saving 3 months of engineering'; include engineers in every sprint team — they're not spectators, they're participants; the first pilot should include a respected engineering leader whose endorsement carries weight), navigating the waterfall transition (the 6-week waterfall cycle and sprints can coexist initially: position sprints as the discovery phase before waterfall planning — 'Sprint first to validate what to build, then plan the build'; sprints don't replace engineering planning — they inform it; show that a 1-week sprint investment reduces the risk of the 6-week build cycle; over time, teams that sprint regularly will naturally adopt more agile practices because they've experienced the value of rapid validation), avoiding mandate fatigue (the CEO's 'every team should sprint' is well-intentioned but risky: mandated practices create compliance without commitment; instead, create demand through success — when pilot teams share great outcomes, other teams will want to try; let teams opt in rather than be assigned; the goal is 'most teams choose to sprint' not 'all teams are forced to sprint'; report to the CEO on adoption rate and enthusiasm, not just compliance)."
    weight: 0.35
    description: "ResistanceManagement"
  - type: llm_judge
    criteria: "Response builds sustainable sprint infrastructure — sprint playbook creation (document the company's sprint methodology: standard sprint format — the company's version of the 5-day or 4-day sprint; role definitions — who can be a Decider, who facilitates, team composition guidelines; templates — sprint brief template, storyboard template, testing protocol, handoff document; Miro workspace templates — pre-built boards for each sprint day; this playbook captures the organizational learning from pilot sprints and becomes the reference for all future sprints), measurement and continuous improvement (tracks sprint program health: sprint frequency — how many sprints per quarter across the company?; sprint-to-ship rate — what percentage of sprint outcomes get implemented?; sprint quality — facilitator self-assessment, team satisfaction surveys, outcome impact; facilitator development — are facilitators improving? are they mentoring new facilitators?; create a quarterly sprint retrospective for the facilitator community — what's working, what's not, how to improve), budget and resource allocation ($50K training budget allocation: $10K — external sprint training for 4-6 facilitators; $5K — Miro/Figma enterprise licenses for sprint work; $10K — user recruitment budget for test users across sprints; $5K — sprint materials and supplies; $20K — reserve for bringing in an external expert facilitator for one sprint and a company-wide sprint workshop; the real cost isn't the budget — it's the time investment of 12 teams spending 1 week per sprint; calculate the ROI by tracking validated ideas and prevented failures)."
    weight: 0.30
    description: "SustainableInfrastructure"
