meta:
  id: sprint-facilitator-coaching
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint facilitator coaching — mentor and develop new sprint facilitators through observation, feedback, and progressive skill building"
  tags: [coaching, mentoring, facilitator-development, training, expert]

state: {}

trigger: |
  You're the senior sprint facilitator at a product
  consultancy. You need to develop 3 junior facilitators
  who have each completed the sprint certification course
  but haven't facilitated independently. Each has different
  strengths and weaknesses:

  Facilitator A (former project manager): Excellent at
  time management and logistics. Weakness: treats the sprint
  like a project plan — follows the schedule rigidly without
  reading the room. When the team was having a breakthrough
  during sketching, she cut them off because "time's up."

  Facilitator B (former UX designer): Deep understanding
  of design process and user research. Weakness: gets pulled
  into the design work — during sketching, she starts
  sketching her own solutions and forgets to facilitate.
  During testing, she asks leading questions because she's
  invested in the outcome.

  Facilitator C (former sales manager): Charismatic and
  energetic, great at managing group dynamics. Weakness:
  talks too much — fills every silence with commentary,
  doesn't let the team think independently. During silent
  exercises, he adds "helpful" suggestions that influence
  the team's individual work.

  Task: Design a coaching program for each facilitator
  that builds on their strengths while addressing their
  specific weaknesses.

assertions:
  - type: llm_judge
    criteria: "Response creates personalized coaching plans — Facilitator A coaching (builds on PM strengths while developing facilitation flexibility: strength to leverage — her time management ensures sprints stay on track, which is genuinely valuable; weakness to address — she needs to learn when to bend the schedule for productive divergence; coaching approach: teach her the difference between productive and unproductive time overruns — a breakthrough during sketching is productive, a rambling discussion is not; give her decision criteria: 'If the energy in the room is high and ideas are flowing, extend by 10 minutes and compress the next exercise; if the energy is low and people are going through the motions, stick to the schedule'; practice exercise: during her next co-facilitated sprint, she must intentionally extend one exercise and compress another, reporting on the impact), Facilitator B coaching (builds on design expertise while developing facilitator neutrality: strength to leverage — her design understanding means she can identify great ideas and coach teams on design quality; weakness to address — she must separate the facilitator role from the designer role; coaching approach: during sprints, she is not allowed to sketch or contribute ideas — her role is exclusively facilitation; for testing, give her a script with neutral questions and practice with role-play until neutral questioning is automatic; teach her that her design expertise is most valuable in the storyboard phase — guiding the team's design decisions without making them herself; mantra: 'The facilitator serves the process, not the outcome')."
    weight: 0.35
    description: "PersonalizedCoaching"
  - type: llm_judge
    criteria: "Response addresses Facilitator C and creates a development progression — Facilitator C coaching (builds on charisma while developing restraint: strength to leverage — his energy creates a positive sprint atmosphere and his people skills manage team dynamics effectively; weakness to address — he must learn that silence is a facilitation tool, not a problem to fix; coaching approach: teach the '10-second rule' — after giving an instruction, count to 10 silently before speaking again; during silent exercises, he must leave the room or sit in a corner with headphones — physically removing the temptation to 'help'; practice uncomfortable silence — in coaching sessions, have him practice sitting quietly while someone works; reframe silence as productive — 'When you're quiet, the team is thinking; when you talk, they're listening to you instead of generating their own ideas'), progressive development framework (designs a 3-sprint development path for each facilitator: Sprint 1 — co-facilitate with you leading: they observe your facilitation choices and debrief after each day; Sprint 2 — they lead with you observing: you intervene only for critical mistakes; debrief focuses on their specific weakness areas; Sprint 3 — they facilitate independently: you observe remotely via video or receive a daily facilitator journal; post-sprint debrief covers their growth areas and readiness for independent facilitation), feedback methodology (uses structured feedback: after each sprint day, conduct a 15-minute debrief: 'What went well? What would you change? What did you notice about the team's energy?'; provide specific behavioral feedback — not 'you talked too much' but 'when you suggested an idea during Crazy 8s at 2:15pm, I noticed two team members erased what they were drawing and adopted your suggestion'; video review — if sprints are recorded, review key moments together; the goal is self-awareness — facilitators who can diagnose their own patterns improve faster than those who rely on external feedback)."
    weight: 0.35
    description: "FacilitatorCAndProgression"
  - type: llm_judge
    criteria: "Response builds a facilitator community and continuous development — facilitator community of practice (creates ongoing development beyond the initial training: monthly facilitator meetups — share sprint stories, discuss challenges, practice exercises; facilitate-the-facilitator sessions — one facilitator runs a practice exercise for the group and receives feedback on their facilitation; sprint observation rotation — facilitators observe each other's sprints quarterly and provide peer feedback; shared sprint library — templates, exercise variations, and case studies that all facilitators contribute to), advanced skills development (after basic certification, builds advanced capabilities: advanced skill 1 — reading the room: recognizing when the team is genuinely engaged vs going through the motions, and adjusting accordingly; advanced skill 2 — adaptive facilitation: knowing which exercises to modify, compress, or extend based on the specific sprint context; advanced skill 3 — stakeholder management: handling executives, skeptics, and scope creep while maintaining sprint integrity; advanced skill 4 — sprint design: creating custom sprint variations for unique organizational contexts), measuring facilitator quality (establishes metrics for facilitator development: sprint outcome quality — do their sprints produce actionable, validated results?; team satisfaction — do sprint participants rate the facilitation positively?; sprint fidelity — do they execute the methodology properly while adapting intelligently?; self-improvement — do they demonstrate growth across successive sprints?; the metrics should be developmental, not punitive — they identify growth areas, not rank facilitators)."
    weight: 0.30
    description: "CommunityAndDevelopment"
