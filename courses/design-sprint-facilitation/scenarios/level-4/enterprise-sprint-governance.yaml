meta:
  id: enterprise-sprint-governance
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Enterprise sprint governance — establish sprint standards, quality control, and governance frameworks for large organizations running multiple concurrent sprints"
  tags: [enterprise, governance, standards, quality, expert]

state: {}

trigger: |
  You're the Director of Design Operations at a Fortune 500
  retail company. After 2 years of growing design sprint
  adoption, you now face governance challenges:

  - 8 facilitators running sprints across 4 business units
  - 30+ sprints completed in the past year
  - Quality is inconsistent — some facilitators produce great
    outcomes, others run "sprint theater" (going through the
    motions without meaningful results)
  - Sprint outcomes often conflict — the e-commerce team's
    sprint validated an approach that contradicts the store
    experience team's sprint findings
  - No central tracking of sprint outcomes, learnings, or
    implementation status
  - The CFO questions the ROI: "We've spent $2M in person-
    hours on sprints. What did we get?"

  Sprint data (estimated):
  - 30 sprints × 7 people × 5 days = 1,050 person-days
  - Of 30 sprints: 18 produced validated outcomes, 8 produced
    invalidated outcomes, 4 produced inconclusive results
  - Of 18 validated outcomes: 11 were fully implemented,
    4 partially implemented, 3 never implemented

  Task: Design the enterprise sprint governance framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a sprint quality framework — quality standards (defines what a 'good sprint' looks like: sprint brief quality — does the brief include a specific challenge, measurable goals, and sprint questions?; team composition — is the right mix of roles included, especially a committed Decider?; process fidelity — are core exercises executed properly, not skipped or replaced?; testing rigor — are 5 external users tested with a proper protocol?; output quality — does the sprint produce actionable findings with clear evidence?; create a sprint quality scorecard that facilitators self-assess and that is reviewed by a senior facilitator), facilitator certification (addresses the inconsistent quality: level 1 — trained facilitator: completed the training program and co-facilitated 2 sprints; level 2 — certified facilitator: independently facilitated 3+ sprints with quality scores above threshold; level 3 — senior facilitator: 10+ sprints, mentors other facilitators, can adapt the methodology for complex challenges; facilitators at each level have different sprint assignment permissions — complex or high-stakes sprints require a level 2 or 3 facilitator), sprint theater prevention (identifies the signs of 'sprint theater': the team goes through exercises without genuine engagement; the Decider isn't present or doesn't exercise authority; the prototype is built without following the storyboard decisions; testing uses internal employees instead of real users; sprint outcomes are ignored post-sprint; prevention — pair new facilitators with experienced ones, conduct periodic sprint observations, review sprint outputs for quality)."
    weight: 0.35
    description: "QualityFramework"
  - type: llm_judge
    criteria: "Response addresses cross-sprint coordination and conflict — sprint portfolio management (treats sprints as a portfolio, not isolated events: maintain a sprint calendar showing all planned and completed sprints across business units; before approving a new sprint, check for overlap or conflict with past or concurrent sprints; assign a 'sprint coordinator' role — someone who sees across all business units and identifies potential conflicts or synergies; the sprint coordinator reviews sprint briefs before they launch), resolving conflicting outcomes (the e-commerce vs store experience conflict is a governance failure: when two sprints produce contradictory findings, it usually means the user segments or contexts are different — online shoppers vs in-store shoppers; the governance framework should require cross-referencing — before a sprint launches, the coordinator checks if a related sprint has already run; when conflicts arise, run a synthesis session with both teams to understand the difference — the findings may both be valid for different contexts; if the conflict is genuine, escalate to a shared Decider who can make the strategic call), sprint outcome tracking (builds a central sprint knowledge base: every sprint logs its findings in a shared repository — challenge, approach, validated findings, invalidated findings, implementation status; this repository prevents teams from re-sprinting problems that have already been addressed; it also surfaces patterns — if 3 sprints across different teams all identify 'checkout friction', that's a company-wide problem requiring a company-wide solution)."
    weight: 0.35
    description: "CrossSprintCoordination"
  - type: llm_judge
    criteria: "Response builds the ROI case for the CFO — quantifying sprint value (builds the financial case: of 30 sprints, 18 validated outcomes — 11 fully implemented; calculate the revenue or efficiency impact of each implemented outcome; of 8 invalidated outcomes — each prevented the company from building something that would have failed; estimate the cost of building those 8 features without validation — likely $500K-$2M each in engineering costs; the 4 inconclusive results are the governance improvement opportunity — with better sprint quality, fewer sprints would be inconclusive), ROI calculation framework (provides a formula: sprint ROI = value of validated outcomes implemented + cost of failed ideas prevented - total sprint investment; the $2M person-hour investment should be compared against: the revenue generated by 11 implemented solutions, the development cost avoided by 8 invalidated ideas, the strategic clarity gained from 30 weeks of focused product thinking; even one major prevented failure — saving $1M in wasted development — makes the sprint program net positive), reporting cadence and format (establishes regular ROI reporting: quarterly — sprint activity summary showing sprints run, outcomes validated, implementation status; semi-annually — impact report showing the measurable business impact of implemented sprint outcomes; annually — strategic review of the sprint program's contribution to the company's product strategy; each report should be executive-ready — 1 page with key metrics, not a detailed process document; the CFO cares about financial outcomes, not facilitation methodology)."
    weight: 0.30
    description: "ROICase"
