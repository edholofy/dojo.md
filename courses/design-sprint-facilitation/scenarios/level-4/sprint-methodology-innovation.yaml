meta:
  id: sprint-methodology-innovation
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint methodology innovation — create custom sprint variations and exercises tailored to specific organizational contexts and problem types"
  tags: [methodology, innovation, custom, exercises, expert]

state: {}

trigger: |
  You're a sprint methodology expert who has facilitated 50+
  sprints. Three organizations approach you with challenges
  that the standard 5-day or 4-day sprint format doesn't
  address well:

  Organization A (Healthcare startup): "We need to sprint on
  our patient diagnosis workflow, but we can't pull our
  doctors out for 5 consecutive days. They have patients to
  see. Can we do a sprint in 2-hour daily sessions over
  2 weeks?"

  Organization B (Government agency): "Our procurement
  process requires committee approval at every stage. The
  Decider concept doesn't work — decisions must go through
  a 7-person committee. How do we sprint with decision-by-
  committee?"

  Organization C (Creative agency): "The standard sprint
  format is too structured for our creative team. Crazy 8s
  and voting feel mechanical. Our designers do their best
  work in freeform exploration, not timed exercises. Can
  the sprint be more fluid?"

  Task: Design custom sprint variations for each organization
  while preserving the methodology's core principles.

assertions:
  - type: llm_judge
    criteria: "Response designs a distributed sprint for healthcare — format adaptation (creates a 2-week distributed sprint: week 1 — Map and Sketch spread across 5 sessions of 2 hours each; Monday 2pm-4pm: goal setting, sprint questions, abbreviated journey map; Tuesday 2pm-4pm: expert interviews with HMW notes; Wednesday 2pm-4pm: Lightning Demos; Thursday 2pm-4pm: Crazy 8s and solution sketch start; Friday 2pm-4pm: complete solution sketches; week 2 — Decide, Prototype, Test; Monday: Art Museum and Supervote; Tuesday-Wednesday: prototype building; Thursday: prototype review; Friday: user testing; the schedule respects doctors' patient commitments while maintaining sprint momentum), preserving core principles (identifies what must be preserved even in a distributed format: individual silent work — Crazy 8s and solution sketches are still done individually, not as group brainstorming; the Decider role — a senior physician must have final authority; user testing — real patients or patient proxies must test the prototype; time-boxing — each 2-hour session must be tightly facilitated; what can flex: the overnight incubation between Map and Sketch actually improves with this format — doctors have multiple days to think about the problem before sketching), healthcare-specific considerations (the patient diagnosis workflow has unique requirements: clinical accuracy must be validated — include a clinical review step before user testing; the prototype must feel medically credible to test users — patients need to trust the interface; HIPAA and privacy considerations affect what can be shown in a prototype; test with actual healthcare scenarios — 'You're experiencing these symptoms, walk us through using this tool')."
    weight: 0.35
    description: "DistributedSprint"
  - type: llm_judge
    criteria: "Response designs a committee-compatible sprint for government — committee integration (adapts the sprint to work with committee decision-making: the committee can't replace the Decider — but the committee can inform the Decider; identify the committee chair or most senior member as the sprint Decider; they attend the sprint and make real-time decisions; the full committee reviews the sprint outcome in a post-sprint presentation; alternatively, run the sprint as a 'recommendation engine' — the sprint team produces a validated recommendation that the committee votes on; this preserves the committee's authority while giving them evidence-based options instead of opinions), exercise adaptations for government culture (government teams may find some exercises unusual: replace 'Crazy 8s' with 'Rapid Concepts' — same exercise, different framing that feels more professional; frame dot voting as 'priority assessment' — familiar language in government contexts; the Art Museum becomes a 'solution review gallery'; the language should feel appropriate for a government context while the exercises remain functionally identical; include documentation throughout — government agencies need an audit trail of how decisions were made), procurement and approval considerations (the government procurement process adds constraints: prototype any solution that requires procurement with clear 'this is a concept' labeling; testing should evaluate the user experience separately from the procurement feasibility; the sprint brief should explicitly scope what the sprint can and cannot decide — it can recommend a solution direction but cannot commit procurement dollars; post-sprint, the sprint team presents validated findings to the committee with a procurement recommendation)."
    weight: 0.35
    description: "CommitteeSprint"
  - type: llm_judge
    criteria: "Response designs a creative-friendly sprint for the agency — understanding the resistance (the creative team's resistance to structure isn't opposition to the sprint — it's a valid concern about creative process: designers who do freeform exploration produce different work than timed exercises generate; the sprint's value isn't the specific exercises — it's the progression from understanding to ideation to decision to testing; the exercises can be adapted as long as the progression is preserved), creative sprint format (designs a modified sprint that respects creative process: replace Crazy 8s with an extended exploration session — 90 minutes of freeform sketching, mood boarding, and concept exploration; replace structured solution sketches with 'creative briefs' — each designer presents their concept as a story, not a 3-panel storyboard; keep the voting — but make it a 'gallery critique' format where the team discusses each concept before voting; the Art Museum becomes a literal gallery opening — pin up work, walk around, discuss openly before voting; the structure is looser but the decision points remain the same), what can't change (identifies the non-negotiable sprint elements: individual ideation before group discussion — even creative agencies benefit from independent thinking before group influence; a clear decision mechanism — whether it's voting or a Decider, something must prevent endless exploration; user testing — creativity is not a substitute for validation; the creative team's instinct to explore is valuable during Tuesday's ideation but must converge by Wednesday's decision; the sprint's constraint is what creates breakthrough creativity — unlimited time often produces safer work than constrained time)."
    weight: 0.30
    description: "CreativeSprint"
