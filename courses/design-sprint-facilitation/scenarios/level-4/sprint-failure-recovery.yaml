meta:
  id: sprint-failure-recovery
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint failure recovery — diagnose why sprints fail, recover value from failed sprints, and prevent future failures"
  tags: [failure, recovery, diagnosis, prevention, expert]

state: {}

trigger: |
  You're brought in as a sprint consultant after a company
  experienced three consecutive sprint failures. The Head of
  Product says: "We're about to kill the sprint program.
  Leadership thinks sprints don't work."

  Failed Sprint 1 — "Redesign the search experience":
  - The team produced a beautiful prototype that 5/5 users
    loved in testing
  - 4 months later, nothing was built — engineering said
    the solution required a complete search infrastructure
    rebuild that wasn't budgeted
  - The sprint team and engineering team were different people

  Failed Sprint 2 — "New pricing model":
  - The sprint tried to design a pricing page for a new
    pricing model that hadn't been finalized
  - Monday was spent debating pricing strategy instead of
    mapping the user experience
  - The team never got past Tuesday — the sprint collapsed
    into a multi-day pricing strategy meeting

  Failed Sprint 3 — "Enterprise dashboard":
  - The Decider was the CEO who changed the sprint direction
    every day based on conversations with board members
  - Monday's target was "simplify the dashboard"
  - Tuesday the CEO said "actually, make it more powerful"
  - Wednesday the CEO said "what if we pivot to analytics?"
  - The team was demoralized and the prototype tested poorly
    because it was incoherent

  Task: Diagnose each failure, extract value from the failed
  sprints, and design prevention strategies.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses each failure's root cause — Sprint 1 diagnosis (the sprint succeeded as a sprint but failed as a product initiative: root cause — the sprint team and engineering team were separate; the sprint validated desirability without validating feasibility; the prototype was tested with users but never vetted by the people who would build it; the 4-month gap between sprint and 'nothing built' indicates no sprint-to-development handoff process existed; this is a process failure, not a sprint methodology failure), Sprint 2 diagnosis (this sprint should never have been run: root cause — the sprint brief was premature; you can't design a pricing page for a pricing model that doesn't exist yet; the sprint requires a defined challenge — 'design the pricing experience for our new per-seat pricing model' is sprintable; 'figure out our pricing model' is not — that's a strategy exercise requiring different tools; the sprint collapsed because the team needed to answer strategic questions before design questions; the facilitator should have caught this during sprint brief review), Sprint 3 diagnosis (this is a Decider dysfunction failure: root cause — the CEO used the sprint as a personal thinking tool rather than following the process; daily direction changes meant the team was doing the CEO's exploratory thinking, not converging on a solution; the poor test results were inevitable — the prototype reflected 3 different visions, not one coherent solution; the CEO may not be the right Decider — they're too influenced by external inputs and not committed to the sprint's decision process)."
    weight: 0.35
    description: "FailureDiagnosis"
  - type: llm_judge
    criteria: "Response extracts value from the failed sprints — Sprint 1 salvage (the validated prototype is still valuable: the user testing data proves the concept is desirable — 5/5 users loved it; the gap is feasibility, not desirability; action — schedule a joint session with the sprint team and engineering to assess: what parts of the validated solution CAN be built with existing infrastructure? is a phased approach possible — basic search improvement now, advanced features after infrastructure investment?; the sprint findings should inform the infrastructure investment case — 'Users validated this experience; here's what we need to build it'), Sprint 2 salvage (the pricing strategy discussion, while not a sprint, produced useful strategic alignment: review the Monday-Tuesday discussion notes — did the team reach any pricing consensus?; if so, use those decisions to write a proper sprint brief for a future sprint on the pricing page design; if not, facilitate a separate pricing strategy workshop using an LDJ or similar decision framework; the sprint failed but the strategic conversation was necessary — it just happened in the wrong format), Sprint 3 salvage (the most damaged sprint but still has recoverable value: the team explored 3 directions — simplify, add power, pivot to analytics; each direction had sketches and partial solutions; review these as 3 separate concepts and assess each independently; the user testing data, even from a poor prototype, may reveal which direction resonated more; the demoralized team needs acknowledgment — their work wasn't wasted, the process was; validate the team's effort while diagnosing the leadership failure)."
    weight: 0.35
    description: "ValueExtraction"
  - type: llm_judge
    criteria: "Response designs prevention strategies and saves the sprint program — sprint readiness checklist (prevents future failures with pre-sprint gates: sprint brief quality — is the challenge specific and sprintable? is it a design challenge, not a strategy question?; team composition — does the team include engineering representation? is the Decider committed and appropriate?; feasibility awareness — has the team discussed technical constraints before the sprint?; each gate must be passed before the sprint launches; create a 'sprint brief review' process where a senior facilitator reviews and approves the brief), Decider protocol (prevents Sprint 3-type failures: the Decider commits to the sprint direction set on Monday; mid-sprint direction changes require formal justification and team agreement — it's not a unilateral decision; if the Decider can't commit to consistency, they shouldn't be the Decider — delegate to someone who will follow the process; brief the Decider before the sprint on their role: 'Your job is to make one clear decision on Wednesday and stick with it through Friday'), saving the sprint program (presents the case to leadership: 'The sprints didn't fail because the methodology is wrong — they failed because of specific preventable issues: no engineering inclusion, premature sprint brief, and Decider dysfunction'; show that each failure has a clear root cause and a clear prevention strategy; propose a 'redemption sprint' — take one of the 3 failed challenges, apply the corrective measures, and demonstrate a successful outcome; the sprint program needs a win — pick the challenge with the highest likelihood of success for the next sprint, likely the search experience with engineering included this time)."
    weight: 0.30
    description: "PreventionAndProgramSave"
