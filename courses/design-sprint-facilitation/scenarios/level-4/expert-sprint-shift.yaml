meta:
  id: expert-sprint-shift
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Expert sprint shift — handle a politically charged, high-stakes sprint where organizational dynamics threaten to override the methodology"
  tags: [shift, expert, politics, high-stakes, organizational]

state: {}

trigger: |
  You're facilitating a design sprint at a Fortune 500
  company for their flagship product's next major release.
  The sprint has become politically charged:

  1. Two VPs are in the sprint room and have been publicly
     disagreeing about the product direction for months.
     VP of Sales wants features that close enterprise deals.
     VP of Product wants to simplify the product for SMBs.
     The CEO designated the VP of Product as Decider but the
     VP of Sales is furious and threatens to "escalate."

  2. The sprint is being live-blogged by the internal
     communications team. Every exercise, vote, and decision
     is being shared company-wide in real-time. The team is
     performing for an audience instead of doing genuine work.

  3. Wednesday morning, the VP of Sales submits a solution
     sketch that is clearly his pre-existing product roadmap
     reformatted as a sprint sketch. It includes features
     that weren't discussed during Monday's mapping and
     contradicts the sprint's target.

  4. The CEO calls during Wednesday's Supervote: "I've been
     following the live blog. I think the VP of Sales has
     the right idea. Can you make sure his sketch gets
     selected?"

  Task: Navigate these political challenges while preserving
  the sprint's integrity and producing a valid outcome.

assertions:
  - type: llm_judge
    criteria: "Response handles the VP conflict and CEO interference — VP conflict management (addresses the disagreement constructively: the sprint's structure should resolve the conflict through evidence, not debate; both VPs voted during dot voting — their preferences are visible; the Supervote belongs to the VP of Product as Decider — this was agreed before the sprint; if the VP of Sales threatens to escalate, acknowledge their frustration privately: 'The sprint is designed to test ideas with users on Friday — if your approach is right, the user testing will prove it; if the Decider's choice tests poorly, that evidence supports reconsidering'; the sprint process protects both VPs — neither has to win the argument, the users decide), CEO phone call management (the CEO's call is the most delicate challenge: don't agree to manipulate the Supervote — this would destroy the sprint's integrity and the team's trust; respond diplomatically: 'The Supervote is about to happen and the VP of Product is the designated Decider; I can ensure the VP of Sales' sketch is given full consideration by the team, but the sprint process requires the Decider to make the final call based on the team's votes; the real validation comes Friday when we test with users — that's where we'll know which approach works'; if the CEO insists, escalate the conflict: 'If you'd like to override the Decider role, we should pause the sprint and have a conversation about the sprint's decision process — changing the rules mid-sprint will undermine the team's trust in the process'), protecting the team (the sprint team is caught between two VPs and a CEO: the facilitator must shield the team from political dynamics; during exercises, redirect political comments to process: 'Let's capture that in the sketches and let the users decide on Friday'; after the CEO call, don't share the conversation with the team — it would further politicize the environment; keep the team focused on the work, not the politics)."
    weight: 0.35
    description: "PoliticalNavigation"
  - type: llm_judge
    criteria: "Response addresses the live-blogging and roadmap-as-sketch problems — live-blogging intervention (the live blog is undermining the sprint: team members are self-censoring because their ideas are public; the Art Museum and voting become performative; approach the internal comms team: 'The sprint's value depends on psychological safety — the team needs to generate ideas freely without real-time public scrutiny; can we switch to a daily summary posted at the end of each day instead of live updates?'; if live-blogging can't be stopped, at minimum request that individual contributions aren't attributed — 'The team generated 5 solution concepts' rather than 'VP of Sales proposed X while the designer proposed Y'; the voting results should not be shared live — the Supervote outcome is shared after the sprint, not during), roadmap-as-sketch problem (the VP of Sales submitting his pre-existing roadmap as a sprint sketch violates the sprint's principles: the sprint generates solutions from Monday's research, not pre-existing plans; however, rejecting the sketch outright would escalate the political conflict; handle it within the process: during the Art Museum, the team reviews all sketches including the VP's; if the VP's sketch doesn't address Monday's sprint target, the team's dot votes will naturally deprioritize it; if specific elements of the VP's sketch are relevant, they might earn votes on their merits; the Supervote by the VP of Product resolves the selection; the facilitator's role is to ensure the process runs fairly, not to pre-judge which sketch wins)."
    weight: 0.35
    description: "LiveBlogAndRoadmapSketch"
  - type: llm_judge
    criteria: "Response produces a valid sprint outcome despite political challenges — Friday as the resolution mechanism (positions user testing as the political resolution: both the VP of Sales' and VP of Product's approaches can inform the prototype or be tested as separate concepts; user reactions provide objective evidence that transcends internal politics; if the VP of Product's direction tests well — the data supports the Decider's choice; if it tests poorly — the VP of Sales' concerns have merit and should be revisited; either outcome produces valuable data that moves the company forward; the key message: 'We don't need to agree internally — we need to learn what users want'), post-sprint political follow-up (the sprint outcome must be communicated carefully: present findings to the CEO, both VPs, and key stakeholders together — not separately; lead with user evidence, not the sprint team's opinions; frame results as organizational learning: 'We learned X about our customers this week'; if the VP of Sales' ideas weren't selected but had merit, acknowledge this: 'Several enterprise-focused ideas from the sprint should be explored further — here are the specific concepts that resonated'; the sprint should reduce political tension by providing shared evidence, not increase it by declaring a winner), facilitator integrity (reflects on the facilitator's role in political sprints: the facilitator must maintain process integrity even under pressure from executives; saying 'no' to the CEO's request to manipulate the Supervote is essential — if the facilitator caves, the sprint becomes a rubber-stamping exercise and the team will never trust the process again; after the sprint, the facilitator should debrief with the CEO: 'The sprint's value is that it produces honest user evidence; if we manipulate the process, we lose that value and might as well just build what we think is right without testing'; the facilitator may need organizational support — a design leader or CPO who backs the sprint's integrity)."
    weight: 0.30
    description: "ValidOutcomeAndIntegrity"
