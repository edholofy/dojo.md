meta:
  id: sprint-for-organizational-design
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint for organizational design — apply design sprint methodology to non-product challenges like team structure, processes, and internal tools"
  tags: [organizational-design, internal, process, team-structure, expert]

state: {}

trigger: |
  The CHRO (Chief Human Resources Officer) approaches you
  after hearing about design sprints from the product team.
  She says: "Our employee onboarding process is terrible —
  new hires take 90 days to become productive and 30% leave
  within the first 6 months. Can we run a design sprint on
  employee onboarding?"

  This is different from a product sprint because:
  - The "users" are new employees, not customers
  - The "product" is a process involving HR, IT, managers,
    and multiple software systems (HRIS, Slack, email, LMS)
  - The "prototype" can't be a Figma mockup — it's a
    combination of process flows, emails, meetings, and
    experiences across 90 days
  - The "test" can't be run in 60-minute sessions — employee
    onboarding takes weeks or months
  - Success metrics are retention and time-to-productivity,
    not task completion

  Sprint team: 7 people (CHRO as Decider, HR director,
  IT director, a hiring manager, a recent new hire who
  onboarded 3 months ago, 1 designer, you as facilitator).

  Task: Adapt the design sprint for this organizational
  design challenge.

assertions:
  - type: llm_judge
    criteria: "Response adapts the sprint for organizational design — Monday mapping for processes (maps the employee onboarding journey across 90 days: the journey map spans pre-day-1, day 1, week 1, month 1, month 3; each stage includes the employee's experience, the manager's tasks, HR's activities, and IT's responsibilities; the expert interviews are especially powerful here — the recent new hire provides firsthand experience: 'Tell us about your first 90 days — what helped, what confused you, what made you consider leaving?'; the hiring manager describes the burden of onboarding from the manager side; the IT director reveals the technical setup bottlenecks), sprint questions for organizational challenges (frames sprint questions differently for process design: 'Can we reduce time-to-productivity from 90 days to 30 days?'; 'Can we design an onboarding experience that makes new hires feel confident and connected by the end of week 1?'; 'Can we create a process that works regardless of which manager the new hire reports to?'; these questions are measurable and focus on the experience, not just the logistics; the journey map should highlight the 30% who leave within 6 months — what happens in their onboarding journey that differs from those who stay?), HMW for process innovation (the HMW notes will look different from product sprints: 'HMW help new hires feel connected to their team before their first day?'; 'HMW reduce the 3-week wait for a fully configured laptop?'; 'HMW help managers onboard effectively when they haven't been trained on the process?'; 'HMW make the first day feel exciting rather than overwhelming with paperwork?'; these HMW notes target the emotional experience of onboarding, not just the logistical process)."
    weight: 0.35
    description: "OrganizationalMapping"
  - type: llm_judge
    criteria: "Response adapts prototyping and testing for organizational design — process prototype strategy (Thursday's prototype must represent a multi-week experience in a testable format: create a 'journey walkthrough' prototype — a step-by-step narrative with tangible artifacts for each onboarding stage; prototype the day-1 experience as a detailed schedule with sample emails, meeting invitations, and welcome materials; prototype the week-1 experience as a checklist with manager touchpoints; prototype the month-1 check-in as a sample conversation guide; create the key communications — the pre-start welcome email, the day-1 agenda, the week-1 manager check-in template, the month-1 progress review), Friday testing adaptation (can't test 90 days of onboarding in an hour — adapt the testing approach: recruit 5 recent hires — ideally a mix of people who stayed and people considering leaving; walk them through the redesigned onboarding journey step by step: 'Here's what your first day would look like — what's your reaction?'; 'Here's the week-1 schedule — does this address the confusion you experienced?'; show the prototype artifacts — emails, schedules, checklists — and get reactions; ask comparative questions — 'How does this compare to what you actually experienced?'; the testing validates the concept and emotional response, not the operational execution), pilot planning instead of immediate implementation (organizational changes can't be shipped like software: the sprint outcome is a validated onboarding concept that needs a pilot before full rollout; plan a 60-day pilot with the next 5-10 new hires; the pilot tests the redesigned process in reality — are managers following the new check-in cadence? does the day-1 experience feel different? is time-to-productivity improving?; measure the pilot against the current baseline — the 90-day productivity metric and the 6-month retention rate; the sprint produces the hypothesis, the pilot validates it in practice)."
    weight: 0.35
    description: "ProcessPrototypeAndTest"
  - type: llm_judge
    criteria: "Response addresses organizational sprint complexities — multi-stakeholder implementation (unlike product sprints where one team builds the solution, organizational changes require coordination: HR owns the process design and communications; IT owns the technical setup timeline; managers own the relationship and integration experience; the sprint must produce implementation plans for each stakeholder — not just a holistic vision but specific action items for each group; the CHRO as Decider can drive cross-functional implementation, which is why senior leadership as Decider is essential for organizational sprints), change management considerations (organizational changes face resistance that product changes don't: managers may resist new onboarding requirements — 'I don't have time for weekly check-ins'; IT may resist timeline commitments — 'We can't guarantee same-day laptop setup'; HR may resist process changes that affect compliance — 'We legally need these forms signed on day 1'; the sprint should acknowledge these constraints and design around them — not ignore them; include implementation ease as a voting criterion during Wednesday's decision), broader applications of organizational sprints (positions this as a methodology extension: the same sprint adaptation works for other organizational challenges — performance review redesign, meeting culture transformation, internal tool selection, office space design; the key adaptations are — journey maps spanning longer timeframes, process prototypes instead of screen prototypes, testing through walkthrough rather than task-based testing, pilot programs instead of direct implementation; this expands the sprint's organizational value beyond product design)."
    weight: 0.30
    description: "OrganizationalComplexity"
