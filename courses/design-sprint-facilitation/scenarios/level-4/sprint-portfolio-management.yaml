meta:
  id: sprint-portfolio-management
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint portfolio management — manage a portfolio of sprint outcomes across multiple product lines, tracking implementation and impact over time"
  tags: [portfolio, management, tracking, impact, expert]

state: {}

trigger: |
  You're the Director of Product Design at a multi-product
  company with 5 product lines. Over the past 18 months,
  teams have run 40 design sprints across all product lines.
  The CPO says:

  "I need a single view of all our sprint outcomes. Which
  sprints produced results that shipped? Which validated
  ideas are stuck in a backlog? Which invalidated ideas
  keep getting re-proposed by different teams? And are our
  sprints getting better over time?"

  Sprint portfolio data:
  - Product A (CRM): 12 sprints — 8 validated, 4 invalidated.
    Of 8 validated: 5 shipped, 2 in backlog, 1 abandoned
  - Product B (Analytics): 10 sprints — 6 validated,
    3 invalidated, 1 inconclusive. Of 6 validated: 4 shipped,
    2 never started
  - Product C (Messaging): 8 sprints — 4 validated,
    3 invalidated, 1 inconclusive. Of 4 validated: 2 shipped,
    1 in backlog, 1 abandoned
  - Product D (Billing): 6 sprints — 5 validated,
    1 invalidated. Of 5 validated: 3 shipped, 2 in backlog
  - Product E (Mobile): 4 sprints — 2 validated,
    2 invalidated. Of 2 validated: 1 shipped, 1 in progress

  Recurring issue: Product A invalidated an "AI chatbot for
  CRM" concept in Sprint 3 (month 4). Product C re-proposed
  and sprinted on a nearly identical "AI messaging assistant"
  concept in Sprint 6 (month 14) — also invalidated.

  Task: Create the sprint portfolio management system.

assertions:
  - type: llm_judge
    criteria: "Response creates the portfolio tracking system — portfolio dashboard design (creates a comprehensive sprint portfolio view: sprint outcome summary — validated/invalidated/inconclusive counts per product line; implementation funnel — validated → in backlog → in development → shipped → measured impact; sprint velocity — sprints per quarter per product line, trending over time; outcome quality — what percentage of validated outcomes show positive metrics post-ship?; the dashboard should be accessible to the CPO, product leaders, and design leaders; recommend a tool — Airtable, Notion, or a simple internal dashboard that updates after each sprint), implementation tracking (addresses the 'stuck in backlog' problem: 7 validated outcomes are in backlog across product lines — this represents significant unrealized sprint value; for each backlogged outcome, assess — why hasn't it been implemented? is it deprioritized, blocked by engineering capacity, or lost in the roadmap?; create an 'implementation SLA' — validated sprint outcomes should enter development within 90 days or be formally deprioritized with a documented reason; the 3 abandoned outcomes need investigation — was the sprint finding wrong, or did organizational priorities shift?; track the 'sprint-to-ship rate' as a key portfolio metric — currently approximately 15 shipped of 25 validated or 60%), cross-product insight sharing (addresses the duplicate sprint problem: the AI chatbot/messaging assistant case shows that teams don't share sprint learnings across product lines; create a 'sprint findings repository' — every sprint's validated and invalidated findings are logged with evidence; before a new sprint is approved, the sprint coordinator checks the repository for related past findings; the Sprint 3 CRM chatbot invalidation should have surfaced when Product C proposed a similar concept; this prevents wasting a sprint week re-learning what another team already discovered)."
    weight: 0.35
    description: "PortfolioTracking"
  - type: llm_judge
    criteria: "Response analyzes portfolio health and trends — product line analysis (evaluates each product line's sprint health: Product A — 12 sprints is the most active but 67% validation rate and only 63% ship rate of validated outcomes suggest room for improvement; are briefs being written well? is the team sprinting on appropriate challenges?; Product B — strong 67% ship rate of validated outcomes but 2 validated never started is concerning; Product D — 83% validation rate is unusually high; are they sprinting on challenges they already know the answer to? or are they genuinely efficient?; Product E — too few sprints to draw conclusions but early results look healthy), quality trend analysis (assesses whether sprints are improving over time: compare sprint quality metrics across the 18-month period: early sprints vs recent sprints — are validation rates improving?; are sprint outcomes becoming more implementable — fewer 'abandoned' outcomes in recent sprints?; are facilitators getting better — do sprints with experienced facilitators produce higher implementation rates?; track test user quality — are teams recruiting better test users as the program matures?; the CPO wants to know if sprints are getting better — the data should answer this definitively), inconclusive sprint investigation (2 inconclusive sprints need attention: inconclusive results usually indicate — the sprint brief was too vague, the prototype didn't adequately test the hypothesis, or the test users weren't the right segment; review both inconclusive sprints to identify the root cause; create guidelines — sprints should produce clear validated or invalidated results; if the outcome is ambiguous, the facilitator should document what additional research is needed and recommend a follow-up study or sprint)."
    weight: 0.35
    description: "PortfolioAnalysis"
  - type: llm_judge
    criteria: "Response creates portfolio governance and optimization — sprint approval process (establishes a lightweight governance process: sprint request — product teams submit a sprint brief to the sprint coordinator; sprint coordinator review — checks for overlap with past sprints, assesses sprint-suitability, reviews team composition and Decider availability; sprint calendar management — ensures sprints don't compete for facilitators, design resources, or test user pools; sprint priority — when multiple teams want to sprint simultaneously, prioritize based on business impact, uncertainty level, and implementation readiness), portfolio optimization recommendations (specific recommendations for the CPO: reduce sprints for Product A — 12 sprints in 18 months is aggressive; focus on higher-quality, more strategic sprints; investigate Product D's high validation rate — if they're only sprinting on obvious problems, encourage them to tackle higher-uncertainty challenges; increase Product E's sprint cadence — mobile is underserved with only 4 sprints; address the 7 backlogged validated outcomes — hold a 'sprint outcome review' meeting with product and engineering to commit to implementation timelines or formally deprioritize), ROI reporting (creates the business case across the portfolio: total sprint investment — 40 sprints × estimated person-days and costs; total value generated — revenue impact of 15 shipped outcomes plus cost avoidance from 11 invalidated outcomes; sprint ROI ratio — value generated per dollar invested in sprints; portfolio health score — composite of validation rate, ship rate, impact rate, and sprint quality; present to the CPO quarterly with trend lines — the sprint program should demonstrate improving ROI over time as teams get better at selecting sprint challenges and implementing outcomes)."
    weight: 0.30
    description: "GovernanceAndOptimization"
