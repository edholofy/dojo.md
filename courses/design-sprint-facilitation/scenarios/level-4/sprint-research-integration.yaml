meta:
  id: sprint-research-integration
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint research integration — integrate ongoing research programs, past studies, and continuous discovery into the design sprint process"
  tags: [research, integration, continuous-discovery, data, expert]

state: {}

trigger: |
  You're the Head of UX Research at a product company with
  a mature research program. Your team has conducted:

  - 120+ user interviews in the past year
  - 4 ethnographic studies
  - Continuous unmoderated testing (500+ sessions)
  - A comprehensive customer segmentation model (6 personas)
  - Quarterly customer satisfaction surveys (2000+ responses)

  A product team wants to run a design sprint for a new
  feature — AI-powered writing assistance. The PM says:
  "We've done so much research already. Do we really need
  to start from scratch with Monday's mapping? Can't we skip
  to sketching?"

  At the same time, the sprint team includes members who
  haven't seen any of the existing research and would benefit
  from Monday's exercises as an onboarding tool.

  Complication: Your ethnographic study from 6 months ago
  identified a key insight — users don't want AI to write
  for them; they want AI to help them think more clearly.
  But the sprint brief focuses on "AI writing features."

  Task: Design the integration of existing research into
  the sprint while maintaining the sprint's structured
  discovery process.

assertions:
  - type: llm_judge
    criteria: "Response balances existing research with sprint discovery — strategic Monday redesign (doesn't skip Monday but restructures it around existing knowledge: instead of starting from zero, pre-populate the journey map with key findings from existing research; use Monday morning as a 'research download' — 30-minute curated presentation of the most relevant research findings, not all 120 interviews; the team still generates their own HMW notes — but from synthesized research rather than raw expert interviews; the team members unfamiliar with the research get a rapid education while experienced members re-engage with findings they may have forgotten), research as expert input (adapts the expert interview structure: replace traditional expert interviews with 'research insight sessions' — the UX researcher presents the top 5 findings relevant to AI writing assistance; the ethnographic study finding about 'helping users think clearly vs writing for them' becomes a key insight presentation; other experts still participate — an AI engineer can discuss technical capabilities, a customer support lead can share AI-related complaints; the existing research accelerates Monday without replacing it), the sprint brief challenge (the ethnographic insight that users want thinking assistance, not writing automation, may fundamentally change the sprint direction: present this finding early Monday as part of the research download; ask the team: 'Given this research, should our sprint focus on AI writing features or AI thinking tools?'; let the Decider resolve the direction based on the evidence; this is the highest-value use of existing research — it prevents the sprint from solving the wrong problem; the sprint brief might be revised Monday morning based on research — 'Help users think more clearly using AI' rather than 'Add AI writing features')."
    weight: 0.35
    description: "ResearchIntegration"
  - type: llm_judge
    criteria: "Response designs research-informed sprint exercises — persona-informed sketching (Tuesday's sketching should leverage the 6-persona segmentation: instead of sketching for a generic user, each team member selects a persona and sketches for that specific user; this produces solutions tailored to different user needs; the Art Museum review evaluates solutions against the persona model — 'Does this work for the power writer? The occasional writer? The non-native speaker?'; the voting and Supervote should consider which persona represents the highest-value opportunity), research-validated testing plan (Friday's testing should build on the existing research program: recruit test users who match the existing persona segments — test with representatives from 2-3 key segments; use the continuous unmoderated testing platform for supplementary testing — run the prototype through the same platform used for the 500+ sessions; test not just usability but the core research question — do users want AI writing or AI thinking assistance?; compare Friday's qualitative findings with the quantitative data from customer satisfaction surveys), research gap identification (uses the sprint to fill research gaps: the existing research covers general user behavior but may not address AI-specific attitudes; Monday's mapping should identify where the existing research is strong and where gaps exist; the sprint becomes a focused research initiative — generating AI-specific insights that complement the broader research program; Friday's findings should be synthesized back into the research repository, enriching the company's customer knowledge)."
    weight: 0.35
    description: "ResearchInformedExercises"
  - type: llm_judge
    criteria: "Response connects the sprint to the broader research program — sprint as research amplifier (the sprint produces research outputs beyond the product decision: Friday's 5 user tests generate qualitative data about AI attitudes that feed back into the research program; the sprint's HMW notes reveal team assumptions that can be validated in future research; the sprint prototype becomes a stimulus for future unmoderated testing at scale; the sprint doesn't just consume research — it generates new research), continuous discovery integration (positions the sprint within a continuous discovery framework: the sprint is a high-intensity research and design event within an ongoing discovery process; pre-sprint research informs the sprint direction; the sprint generates hypotheses tested in the sprint week; post-sprint, the validated or invalidated hypotheses are added to the continuous discovery backlog; future research cycles can dig deeper into sprint findings that need more evidence), research operations impact (addresses the implications for the research team: the research team should support sprint preparation — curating relevant findings, preparing research download presentations; they should participate in Friday testing — either as interviewers or observers; post-sprint, they integrate sprint findings into the broader research repository; over time, sprint findings become part of the research corpus that informs future sprints — creating a virtuous cycle of research and product development)."
    weight: 0.30
    description: "BroaderResearchProgram"
