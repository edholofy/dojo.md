meta:
  id: sprint-strategy-alignment
  level: 4
  course: design-sprint-facilitation
  type: output
  description: "Sprint strategy alignment — connect design sprints to company strategy, OKRs, and product roadmap decisions"
  tags: [strategy, alignment, okrs, roadmap, expert]

state: {}

trigger: |
  You're the VP of Design at a Series C startup ($50M raised).
  The company has ambitious growth targets and the CPO wants
  to use design sprints strategically — not just for individual
  feature design, but as a strategic planning tool. She says:

  "We have 4 OKRs this quarter:
  1. Increase enterprise customer acquisition by 40%
  2. Reduce churn by 25% in the SMB segment
  3. Launch in 2 new international markets
  4. Improve NPS from 35 to 50

  I want to know: which of these should we sprint on? How
  do sprints connect to our roadmap? And how do I tell the
  board that design sprints are part of our strategic
  execution, not just design exploration?"

  Context:
  - 3 product teams (Enterprise, SMB, Platform)
  - The Enterprise team has a clear roadmap but uncertain
    product-market fit for the enterprise segment
  - The SMB team has strong product-market fit but high churn
  - International expansion is mostly a localization effort
  - NPS improvement spans all teams and all customer segments

  Task: Create a strategic sprint planning framework that
  connects sprints to company OKRs and roadmap.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each OKR for sprint suitability — OKR 1 enterprise acquisition analysis (high sprint suitability: the Enterprise team has a roadmap but uncertain PMF — this is exactly where sprints add the most value; sprint opportunity — validate the enterprise value proposition and onboarding experience before building the roadmap features; the sprint can test whether the planned features actually resonate with enterprise buyers; sprint focus — 'How might we convince an enterprise IT leader to choose our platform over established competitors?'), OKR 2 SMB churn analysis (medium-high sprint suitability: strong PMF means the product works — the churn problem is likely experience or value delivery; sprint opportunity — understand why SMB customers leave and design retention interventions; analyze churn data to identify the key moments where customers decide to leave; this could be a focused sprint on the churn journey — from first signs of disengagement through cancellation), OKR 3 international expansion analysis (low sprint suitability: localization is primarily an execution challenge, not a design challenge; a sprint on 'how should we localize?' would produce obvious answers — translate the UI, adapt payment methods, comply with local regulations; exception — if there's uncertainty about which markets to enter or how the product concept translates culturally, a sprint could validate the market-specific value proposition), OKR 4 NPS improvement analysis (medium sprint suitability: NPS is an aggregate metric influenced by many factors; a single sprint can't address all NPS drivers; sprint opportunity — identify the top 3 NPS detractor themes and sprint on the highest-impact one; or run a focused sprint on the most complained-about experience)."
    weight: 0.35
    description: "OKRSprintMapping"
  - type: llm_judge
    criteria: "Response creates a strategic sprint planning framework — sprint prioritization matrix (creates a framework for deciding when to sprint: axis 1 — uncertainty level: how confident are we in the right solution? high uncertainty = sprint; low uncertainty = just build; axis 2 — impact: how much does this affect company goals? high impact = worth the sprint investment; low impact = handle through normal design process; axis 3 — reversibility: is this decision easily reversible? irreversible decisions deserve sprint validation; reversible decisions can be shipped and iterated; the matrix produces a clear sprint/don't sprint recommendation for each initiative), sprint-to-roadmap integration (connects sprint outputs to the product roadmap: before-sprint — the roadmap identifies what to build; the sprint validates whether to build it and how; after-sprint — sprint findings update the roadmap: validated features move to 'build' with sprint evidence; invalidated features are removed or deprioritized with sprint evidence; new discoveries from the sprint may add items to the roadmap; the sprint becomes a 'validation gate' in the roadmap process — high-uncertainty items pass through a sprint before entering development), quarterly sprint planning (creates a cadence: at the beginning of each quarter, review OKRs and identify sprint-worthy challenges; plan 2-3 sprints per quarter per team — enough to validate key initiatives without over-sprinting; each sprint should have a clear connection to an OKR — 'This sprint validates our approach to reducing SMB churn, supporting OKR 2'; at the end of each quarter, review sprint outcomes and their contribution to OKR achievement)."
    weight: 0.35
    description: "StrategicFramework"
  - type: llm_judge
    criteria: "Response builds the board-level narrative — presenting sprints to the board (frames sprints in board-relevant language: don't say 'design sprint' — say 'rapid product validation' or 'customer-validated product development'; the board cares about risk reduction — 'We validated our enterprise approach with target customers before investing 3 months of engineering'; the board cares about speed — 'We identified and killed a feature that would have cost $500K in development in just 5 days'; the board cares about customer evidence — 'Our roadmap is informed by direct customer testing, not just internal assumptions'), strategic sprint metrics for the board (identifies board-appropriate metrics: validation hit rate — what percentage of sprinted ideas are validated vs invalidated?; cost avoidance — how much development cost did invalidated sprints prevent?; time-to-validation — how quickly are strategic bets tested with customers?; sprint-to-ship rate — how efficiently do validated ideas move from sprint to production?; OKR contribution — which sprint outcomes directly contributed to quarterly OKR achievement?), recommended sprint plan for the quarter (provides a specific recommendation: Sprint 1 month 1 — Enterprise value proposition validation, supporting OKR 1; Sprint 2 month 2 — SMB churn journey redesign, supporting OKR 2; Sprint 3 month 2 — NPS detractor deep-dive, supporting OKR 4; skip sprinting on international expansion — commission a market research study instead; this plan uses sprints where they add the most value and avoids sprinting where other approaches are more appropriate)."
    weight: 0.30
    description: "BoardNarrative"
