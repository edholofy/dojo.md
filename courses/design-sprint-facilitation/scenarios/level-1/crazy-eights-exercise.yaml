meta:
  id: crazy-eights-exercise
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Crazy 8s exercise facilitation — run the rapid ideation sketching exercise effectively"
  tags: [crazy-eights, sketching, ideation, exercise, beginner]

state: {}

trigger: |
  You're facilitating a design sprint for a meal-planning
  app. It's Tuesday afternoon and it's time for the
  Crazy 8s exercise. The sprint target is: "The moment
  when a user selects recipes for their weekly meal plan."

  Your team of 6 has mixed comfort with sketching:
  - Product Manager: "I haven't drawn anything since
    high school"
  - Data Scientist: "Can I just write bullet points
    instead?"
  - Marketing Manager: "I'm actually pretty good at
    drawing"
  - Engineer: "What am I supposed to draw? Like,
    wireframes?"
  - Customer Support Rep: "I have so many ideas from
    customer calls but I'm not sure how to show them"
  - UX Designer (experienced, eager to sketch)

  Task: Facilitate the Crazy 8s exercise including
  instructions, coaching, and debrief.

assertions:
  - type: llm_judge
    criteria: "Response provides clear Crazy 8s instructions and coaching — setup instructions (explain the exercise before starting: fold your paper into 8 sections — fold in half 3 times; you'll have 1 minute per section to sketch a different idea for how users could select weekly recipes; the sketches should be rough — words, boxes, arrows, stick figures are all fine; the goal is to push past your first 2-3 obvious ideas and reach unexpected territory by sketch 6-7-8), addressing sketching anxiety (handles each concern: PM — 'you're not drawing art, you're drawing ideas — a box with a label is a perfectly valid sketch'; Data Scientist — 'words are allowed but try to include at least one visual element per panel — even a box with an arrow shows a flow'; Engineer — 'wireframes are great but simpler is fine too — a square labeled RECIPE CARD with an arrow to MEAL PLAN is enough'; Customer Support — 'your customer insight is your superpower — sketch the solutions customers have asked for'), the timer is sacred (run the exercise with strict timing: 'Ready? 60 seconds for sketch 1 — go!' then loud timer at each minute; don't allow extra time even if people protest — the constraint IS the exercise; 8 minutes total, no exceptions; the speed prevents overthinking and self-censoring)."
    weight: 0.35
    description: "ExerciseInstructions"
  - type: llm_judge
    criteria: "Response facilitates the exercise and debrief — during the exercise (facilitator's role during the 8 minutes: call out the time clearly — 'Sketch 2, go!'; offer mid-exercise encouragement — 'You should be on sketch 4 now — remember, ugly and fast is perfect'; don't look at people's sketches during the exercise — this is private ideation; if someone freezes, quietly say 'try a variation of your last idea, or the opposite of it'), energy management (Crazy 8s should feel energizing not stressful: play upbeat background music quietly; encourage physical movement before starting — stand up, stretch; frame it as fun not a test — 'the best Crazy 8s sketches I've seen were stick figures and boxes'; after the exercise, acknowledge the effort — 'you just generated 48 ideas in 8 minutes — that's more ideas than most teams generate in a month of meetings'), debrief approach (after the exercise: give everyone 2 minutes to circle their favorite idea from their 8 sketches; this favorite becomes the starting point for their detailed Solution Sketch; no group sharing of Crazy 8s — they're a personal ideation tool, not a presentation; the Solution Sketch that follows is the real output — Crazy 8s are the warm-up that expands thinking)."
    weight: 0.35
    description: "FacilitationAndDebrief"
  - type: llm_judge
    criteria: "Response explains the purpose and connects to the broader sprint — why Crazy 8s works (explains the exercise's purpose: the first 2-3 ideas anyone has are usually the obvious ones — the same ideas everyone else has too; by forcing 8 variations in 8 minutes, the exercise pushes people past the obvious into unexpected territory; the constraint of 1 minute prevents perfectionism — there's no time to second-guess, which liberates creativity; the exercise also democratizes ideation — the PM's idea has the same format and time investment as the Designer's), connection to the sprint flow (Crazy 8s sits between Lightning Demos and Solution Sketches: Lightning Demos provided external inspiration; Crazy 8s generates a wide range of internal ideas; the Solution Sketch that follows takes the best ideas from Crazy 8s and develops one into a detailed 3-panel storyboard; by Wednesday, the team has 6 well-developed solution sketches, each informed by 8 rapid concepts — the quality of Wednesday's decision depends on the breadth of Tuesday's ideation)."
    weight: 0.30
    description: "PurposeAndContext"
