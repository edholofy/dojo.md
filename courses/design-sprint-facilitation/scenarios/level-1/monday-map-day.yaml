meta:
  id: monday-map-day
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Monday Map Day — facilitate the problem definition and mapping phase of a design sprint"
  tags: [monday, map, problem-definition, hmw, beginner]

state: {}

trigger: |
  It's Monday morning of your design sprint. The team of
  7 is in the room. You're facilitating a sprint to solve
  the company's checkout abandonment problem — 72% of
  users who add items to cart never complete purchase.

  The CEO (Decider) says: "Let's just redesign the whole
  checkout. I saw this great checkout flow on Amazon..."

  You need to run Monday's agenda:
  1. Set the long-term goal
  2. List sprint questions (what could go wrong?)
  3. Create the customer journey map
  4. Conduct expert interviews (How Might We notes)
  5. Choose a target for the sprint

  You have expert interviewees available:
  - Customer Support Lead: "Most complaints are about
    unexpected shipping costs appearing at checkout"
  - Data Analyst: "We see the biggest drop-off at the
    payment step — 45% of abandoners leave there. Also,
    guests vs account holders: guests abandon at 82%,
    account holders at 55%"
  - Marketing Manager: "Our competitor offers one-click
    checkout and free shipping over $50"

  Task: Facilitate Monday's sprint exercises, including
  handling the CEO's desire to jump to solutions.

assertions:
  - type: llm_judge
    criteria: "Response facilitates Monday's exercises properly — redirecting the CEO (handles the CEO's Amazon suggestion diplomatically: 'That's a great reference — let's capture it for Tuesday's Lightning Demos. Today is about understanding the problem deeply before we jump to solutions. The sprint process works best when we map first, then sketch tomorrow.' — acknowledges the input without dismissing it but keeps the structure), long-term goal (facilitates setting a measurable goal: something like 'In 6 months, our checkout completion rate will increase from 28% to 50%' or 'Reduce checkout abandonment by 50%' — specific, measurable, and ambitious; the goal is about the outcome not the solution — it doesn't prescribe a specific design), sprint questions (captures what the team worries about: 'Will users trust our payment process?', 'Can we compete without free shipping?', 'Will forcing account creation lose more users?', 'Is the shipping cost surprise the real problem or a symptom?' — these questions will be tested on Friday)."
    weight: 0.35
    description: "MondayExercises"
  - type: llm_judge
    criteria: "Response creates the map and conducts expert interviews — journey map creation (maps the checkout journey on the whiteboard: Browse → Add to Cart → View Cart → Begin Checkout → Account/Guest Selection → Shipping Information → Shipping Cost Reveal → Payment → Confirmation; marks the key actors on the left and the goal on the right; this is a simplified customer journey that the whole team can reference all week), How Might We notes during expert interviews (as each expert shares their knowledge, the team captures insights as HMW questions on sticky notes: from Support — 'HMW eliminate the surprise of shipping costs?', 'HMW set shipping expectations before checkout?'; from Data — 'HMW reduce the guest checkout friction?', 'HMW make the payment step less intimidating?'; from Marketing — 'HMW compete with one-click checkout?', 'HMW use the $50 free shipping threshold?'), organizing HMW notes (after interviews, HMW notes are grouped by theme on the map, placed near the relevant journey stage; the team votes on the most important HMW clusters — these point to the sprint target)."
    weight: 0.35
    description: "MapAndInterviews"
  - type: llm_judge
    criteria: "Response chooses a sprint target — target selection (based on the data and expert interviews, guides the team to choose a specific target area: the payment step is where 45% of abandoners leave, but the shipping cost surprise may be the root cause that makes payment feel worse; the Decider chooses: 'the moment from shipping cost reveal through payment completion' — this is specific enough to prototype in one day but broad enough to address the core problem), target justification (the target connects to the data: the 82% guest abandonment vs 55% account holder rate suggests friction in the checkout process itself; the shipping cost surprise is the most-cited customer complaint; focusing on this moment gives the team the best chance of impacting the 72% overall abandonment rate), end-of-day summary (documents what Monday produced: the long-term goal, the sprint questions, the journey map with HMW clusters, and the chosen target — this is the foundation for the rest of the sprint week; the team should leave Monday feeling aligned on the problem even though no solutions have been discussed yet)."
    weight: 0.30
    description: "TargetSelection"
