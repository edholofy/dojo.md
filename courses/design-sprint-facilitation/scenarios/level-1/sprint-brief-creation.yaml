meta:
  id: sprint-brief-creation
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Sprint brief creation — write a clear sprint brief that aligns stakeholders and sets up a successful sprint"
  tags: [sprint-brief, preparation, alignment, documentation, beginner]

state: {}

trigger: |
  You're a product designer asked to write the sprint
  brief for an upcoming design sprint. The company is
  a B2B project management tool and the problem is:

  "Enterprise customers are requesting a reporting
  dashboard, but we don't know what metrics they actually
  need. We've been delaying this feature for 6 months
  because we can't agree on what to build."

  Key context:
  - 3 enterprise customers have threatened to churn if
    reporting isn't available by Q3
  - The PM wants analytics dashboards with 15 metrics
  - The VP of Sales wants a "pretty report" for executive
    buyers
  - The Head of CS wants a usage report so customers
    can justify ROI to their bosses
  - The engineering team is concerned about data
    infrastructure for real-time dashboards
  - No user research has been done on reporting needs

  Sprint team proposed:
  - VP of Product (Decider)
  - Senior PM
  - Lead Engineer
  - UX Designer (you)
  - VP of Sales
  - Customer Success Manager
  - Data Engineer

  Task: Write the sprint brief document.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive sprint brief — challenge statement (clearly frames the problem in sprint terms: 'We need to determine what reporting our enterprise customers actually need and validate a solution in 5 days, before we commit engineering resources to building the wrong dashboard'; frames it as a question to answer, not a feature to build; acknowledges the 6-month delay and the urgency from churning customers), sprint goal (defines a measurable long-term goal: 'Enterprise customers can independently generate reports that demonstrate ROI to their leadership, reducing churn risk and supporting expansion conversations'; the goal is customer-outcome-focused, not feature-focused — 'customers can demonstrate ROI' not 'we build a dashboard'), sprint questions (captures the key unknowns to test: 'Do enterprise customers need real-time dashboards or periodic reports?', 'Which metrics do customers actually use vs which do we think they need?', 'Is the buyer's reporting need different from the end user's need?', 'Can we solve this with a simpler solution than a full analytics dashboard?')."
    weight: 0.35
    description: "SprintBrief"
  - type: llm_judge
    criteria: "Response includes logistical details and stakeholder alignment — team and roles (lists all 7 participants with their roles: VP of Product as Decider, UX Designer as Facilitator, and each person's contribution to the sprint — VP of Sales brings buyer perspective, CSM brings customer voice, Data Engineer provides technical feasibility, Lead Engineer provides implementation perspective), pre-sprint preparation (what needs to happen before the sprint: schedule 2-3 enterprise customer interviews for Monday's expert sessions — these customers can share what reporting they actually need; gather any existing data on feature requests related to reporting; review competitor reporting features for Tuesday's Lightning Demos; prepare the room and materials), stakeholder expectations (sets clear expectations: all 7 team members commit to 5 full days — no partial attendance; the sprint will produce a tested prototype, not a production feature; the outcome will inform the product roadmap, not replace the development process; the VP of Product as Decider has final authority on Wednesday's decision)."
    weight: 0.35
    description: "LogisticsAndAlignment"
  - type: llm_judge
    criteria: "Response acknowledges tensions and sets sprint boundaries — addressing disagreements (the brief acknowledges the PM vs VP Sales vs CS disagreement without resolving it — the sprint is designed to resolve this through customer evidence: 'the PM envisions analytics dashboards, Sales wants executive-friendly reports, CS wants ROI justification tools — the sprint will test which framing resonates with actual enterprise customers'), sprint scope boundaries (defines what's in and out of scope: in scope — the reporting experience from the enterprise customer's perspective; out of scope — data infrastructure decisions, real-time vs batch processing architecture, pricing model for reporting; the sprint tests desirability and usability, not technical feasibility — the Data Engineer is present to flag major technical blockers during the sprint but the prototype doesn't need to be technically feasible in every detail), success criteria (what a successful sprint looks like: we leave Friday with tested evidence of what enterprise customers actually need for reporting; the team is aligned on a direction — the 6-month disagreement is resolved by customer evidence; we have enough clarity to write engineering requirements in the following week)."
    weight: 0.30
    description: "TensionsAndBoundaries"
