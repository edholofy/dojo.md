meta:
  id: tuesday-sketch-day
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Tuesday Sketch Day — facilitate the solution sketching phase with Lightning Demos and Crazy 8s"
  tags: [tuesday, sketch, crazy-eights, lightning-demos, beginner]

state: {}

trigger: |
  It's Tuesday morning of your design sprint. Yesterday
  the team mapped the checkout problem and chose the
  target: the moment from cart review through payment
  completion.

  Today's agenda:
  1. Lightning Demos (20 min) — review inspiring solutions
  2. Individual note-taking (quiet sketching begins)
  3. Crazy 8s exercise (8 sketches in 8 minutes)
  4. Solution Sketch (detailed 3-panel storyboard)

  Challenges you're facing:
  - The Head of Engineering says: "I can't draw. This
    exercise isn't for me."
  - The Marketing Manager keeps talking during what should
    be silent individual work
  - The CEO already has a solution in mind and keeps
    steering the conversation
  - Two team members are sketching the exact same idea
    (copying each other)

  Task: Facilitate Tuesday's sketching exercises and
  handle the team dynamics challenges.

assertions:
  - type: llm_judge
    criteria: "Response facilitates Tuesday's exercises properly — Lightning Demos (each team member presents 1-2 inspiring examples from other products in 3-minute time slots: the CEO's Amazon checkout reference from yesterday is perfect here; other examples might include Shopify one-page checkout, Apple's payment flow, Stripe checkout; the team captures 'big ideas' from each demo on sticky notes; this grounds the sketching in real-world inspiration, not abstract brainstorming), Crazy 8s facilitation (the core rapid ideation exercise: fold paper into 8 panels, 1 minute per panel to sketch a different idea for the checkout experience; the facilitator keeps strict time — 'Ready, go! 1 minute!' then 'Switch! Next panel!'; the goal is quantity over quality — pushing past the obvious first 2-3 ideas to discover unexpected solutions; after 8 minutes, each person has 8 rough concepts), Solution Sketch (each person works silently for 30-45 minutes to create a detailed 3-panel storyboard of their best idea: panel 1 — the user arrives at the moment, panel 2 — the key interaction, panel 3 — the result; the sketch should be self-explanatory — someone should be able to understand it without the sketcher explaining; sketches are anonymous to reduce bias in tomorrow's voting)."
    weight: 0.35
    description: "TuesdayExercises"
  - type: llm_judge
    criteria: "Response handles the team dynamics — the engineer who 'can't draw' (reassure: 'design sprint sketches are about ideas, not art — stick figures, boxes, and arrows are perfect; we're evaluating solutions not drawing ability; everyone's ideas are equally important, and some of the best sprint ideas come from engineers who think about what's buildable'; provide examples of effective ugly sketches), the Marketing Manager who keeps talking (enforce the silent work protocol: 'Tuesday's power comes from independent thinking — when we talk during sketching, we converge too early and lose the diversity of ideas; let's save discussion for Wednesday when we review all the sketches together'; be kind but firm about the no-talking rule during individual work), the CEO steering toward their solution (the sprint structure handles this: the CEO's solution will be one of 7 solution sketches reviewed and voted on tomorrow — it competes equally with everyone else's ideas; if it's the best solution, it will win the vote; the CEO is the Decider but Tuesday is about generating options, not making decisions), team members copying (the seating arrangement should prevent this — people face away from each other during sketching; if copying is still happening, remind the team that the goal of having 7 independent sketches is to maximize the range of ideas — similar ideas can be combined tomorrow during the decision phase)."
    weight: 0.35
    description: "TeamDynamics"
  - type: llm_judge
    criteria: "Response documents the day's output appropriately — sketch documentation (at the end of Tuesday, you should have: 7 Crazy 8s sheets showing 56 rapid concepts across the team, 7 detailed solution sketches — each a 3-panel storyboard, the lightning demo notes with big ideas captured; sketches are posted on the wall anonymously — no names on them — ready for Wednesday's silent critique), preparation for Wednesday (sets up tomorrow's decision exercises: explain to the team what Wednesday will look like — silent art museum viewing of all sketches, dot voting, Decider's final choice, and storyboard creation for the prototype; remind the team that the Decider role matters tomorrow — the CEO will have the final say if the vote is split; make sure all sketches are posted clearly and legibly on the wall before the team leaves), facilitator notes (captures your observations for the sprint record: which exercise generated the most energy? did the Crazy 8s unlock unexpected ideas? were there recurring themes across sketches? these notes help with the sprint report and retrospective)."
    weight: 0.30
    description: "OutputDocumentation"
