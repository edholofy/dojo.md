meta:
  id: sprint-overview-planning
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Sprint overview and planning — understand the design sprint structure and plan a sprint from scratch"
  tags: [overview, planning, structure, basics, beginner]

state: {}

trigger: |
  You're a product designer at a startup. Your CEO just
  read Jake Knapp's "Sprint" book and says: "Let's run
  a design sprint next week! We need to figure out how
  to improve our onboarding flow — we're losing 60% of
  users in the first 3 days."

  You've never facilitated a sprint before. You have:
  - 5 available days next week (Monday-Friday)
  - Budget for lunch delivery each day
  - A conference room with whiteboard
  - Sticky notes, markers, and dot stickers
  - Access to 5 target users for Friday testing

  The team available:
  - CEO (the Decider)
  - Head of Engineering
  - Product Manager
  - UX Designer (you)
  - Customer Support Lead
  - Marketing Manager
  - Data Analyst

  Task: Create the sprint plan including daily schedule,
  roles, materials, and preparation needed.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 5-day sprint plan — daily structure (Monday: Map — define the long-term goal, list sprint questions, create a customer journey map, choose a target for the sprint; Tuesday: Sketch — lightning demos of existing solutions, Crazy 8s sketching exercise, each person creates a detailed solution sketch; Wednesday: Decide — art museum with silent critique of solutions, dot voting, the Decider makes the final call, create a storyboard for the prototype; Thursday: Prototype — build a realistic facade prototype of the winning solution, assign roles like maker, writer, asset collector, interviewer prep; Friday: Test — conduct 5 user interviews testing the prototype, capture feedback, debrief and identify patterns), daily schedule (each day runs approximately 10am-5pm with morning and afternoon sessions, lunch break, and energizer activities; specific time blocks for each exercise within the day — e.g., Monday: 10am goal setting, 11am sprint questions, 1pm journey mapping, 3pm choose target), role assignments (CEO as Decider — makes final calls when the team can't reach consensus; you as Facilitator — manages time, exercises, and group dynamics; Data Analyst as expert interviewee on Day 1; Customer Support Lead as expert interviewee on Day 1; all 7 team members participate in sketching and voting)."
    weight: 0.35
    description: "SprintPlan"
  - type: llm_judge
    criteria: "Response covers preparation and materials — pre-sprint preparation (at least 1 week before: send team a brief explaining design sprints and what to expect; schedule all 5 days on everyone's calendars as full-day blocks; recruit 5 target users for Friday testing — screen for users who match the onboarding problem; prepare the sprint brief: the problem — 60% user loss in first 3 days, the long-term goal to draft in the sprint, relevant data to present on Monday), materials and space setup (conference room prepared with: large whiteboard or wall space for mapping, sticky notes in multiple colors, Sharpie markers for everyone — thick so they're readable from distance, dot stickers for voting — green for everyone plus red/pink for the Decider, timer for time-boxed exercises, printer for Thursday prototyping if needed, snacks and lunch arranged for all 5 days), logistics details (no devices policy during sprint exercises — phones and laptops away to maintain focus; calendar cleared of all other meetings for all 7 participants for 5 full days; prototyping tools prepared — Figma, Keynote, or whatever the team can work fastest in; interview space set up for Friday — separate from the sprint room so the team can watch remotely)."
    weight: 0.35
    description: "PreparationAndMaterials"
  - type: llm_judge
    criteria: "Response demonstrates understanding of sprint fundamentals — the sprint philosophy (explains why a design sprint works: compressed timeline forces decisions that would otherwise take months of meetings; the structure prevents the team from jumping to solutions before understanding the problem; prototyping before building saves engineering time — test ideas with users before committing to code; the Decider role prevents design-by-committee), the onboarding focus (connects the sprint to the specific problem: the 60% day-3 drop-off is a clear, measurable problem that can be mapped, sketched, prototyped, and tested in 5 days; Monday's mapping exercise should focus on the first 3 days of user experience; the sprint target should be a specific moment in the onboarding where the biggest drop-off occurs), realistic expectations (sets appropriate expectations: a sprint doesn't produce a finished product — it produces a tested prototype and validated direction; after the sprint, the team will have clear evidence of what works and what doesn't; the sprint output feeds into the product roadmap, not directly into production)."
    weight: 0.30
    description: "SprintFundamentals"
