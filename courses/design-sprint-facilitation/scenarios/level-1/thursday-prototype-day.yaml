meta:
  id: thursday-prototype-day
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Thursday Prototype Day — facilitate rapid prototyping and prepare for user testing"
  tags: [thursday, prototype, rapid-prototyping, preparation, beginner]

state: {}

trigger: |
  It's Thursday morning. The team needs to build a
  realistic prototype of the winning checkout redesign
  in one day. The storyboard from yesterday shows a
  12-screen flow: simplified cart → transparent pricing
  with shipping visible → guest checkout with minimal
  fields → saved payment options → order confirmation
  with delivery tracking.

  Your team of 7 needs role assignments for the day:
  - The UX Designer is the fastest in Figma
  - The Engineer can help with realistic interactions
  - The PM can write all the UI copy
  - The Data Analyst can prepare realistic test data
  - The Marketing Manager can source product images
  - The Support Lead can write help text and error states
  - The CEO has strong opinions about the visual design

  Complications:
  - The storyboard has a gap — it doesn't specify what
    happens when a payment fails
  - The team realizes they need real-looking product
    data for the prototype to feel authentic
  - At 2pm, only 6 of 12 screens are done and the team
    is panicking
  - The CEO wants to add a feature that wasn't in the
    storyboard

  Task: Facilitate Thursday's prototyping process
  including role assignment, timeline, and handling
  the complications.

assertions:
  - type: llm_judge
    criteria: "Response assigns roles and manages the prototyping process — role assignments (follows the sprint book's role framework: Makers — the UX Designer leads Figma work, the Engineer handles interactive elements; Writers — the PM writes all UI copy, the Support Lead writes error messages and help text; Asset Collectors — the Marketing Manager sources product images and icons, the Data Analyst creates realistic product names, prices, and order data; Stitcher — one person ensures all pieces connect into a coherent flow; Interviewer — someone prepares Friday's test script and questions while others build), timeline management (the day should be structured: 10am-12pm — assign screens to makers, start building from the first screen of the storyboard; 12pm-1pm — lunch while screens are in progress; 1pm-3pm — continue building, start stitching completed screens together; 3pm-4pm — dry run the complete prototype — walk through it as a user would; 4pm-5pm — fix gaps, polish, and do a final trial run), the 'just enough' principle (the prototype needs to look real to a test user for 15 minutes — it doesn't need to work: fake data is fine, screens that aren't in the test path can be skipped, the payment processing can be a loading animation followed by a confirmation screen, the goal is a convincing facade not a functional product)."
    weight: 0.35
    description: "PrototypingProcess"
  - type: llm_judge
    criteria: "Response handles the complications — the storyboard gap (the payment failure state wasn't planned: make a quick decision — either add a simple error screen with a 'retry' message — 10 minutes of work — or decide that the test path will always succeed and skip the error state; the Decider calls it; don't let this gap derail the prototyping timeline; document it as a gap to explore post-sprint), the 2pm panic (6 of 12 screens at 2pm with 3 hours left: first, assess which screens are essential for the test flow and which are nice-to-have; cut any screens that aren't in the critical path — maybe the 12-screen flow can be tested with 8 core screens; reassign makers to the highest-priority remaining screens; remind the team that 'done is better than perfect' — a rough screen that communicates the concept is fine for testing), the CEO's new feature (the CEO wants to add something not in the storyboard: this is a facilitation challenge — diplomatically redirect: 'Great idea — but adding it now would risk not finishing the prototype by end of day. Let's capture it for after the sprint. Today we build exactly what the storyboard shows so we can test it tomorrow. After Friday's results, we can decide if your feature should be added'; the storyboard was agreed upon by the team and Decider — changes now undermine the process)."
    weight: 0.35
    description: "ComplicationHandling"
  - type: llm_judge
    criteria: "Response prepares for Friday testing — test preparation (while the prototype is being built, someone should be preparing: the interview script with 5-6 key questions tied to the sprint questions from Monday; the test scenario — 'Imagine you've found 3 items you want to buy. Walk me through how you'd complete the purchase'; a consent form for recording; the Zoom or screen-sharing setup for remote observation by the rest of the team), prototype review (end-of-day dry run is critical: one person plays the test user while the facilitator runs the interview script; the whole team watches to catch issues — broken links, confusing copy, missing screens, unrealistic data; fix anything that would confuse a real user or break the illusion), logistics confirmation (confirm that all 5 test users are confirmed for Friday with specific time slots — typically 1 hour each, staggered throughout the day; confirm the test space is set up — separate from the sprint room so the team can watch via video feed without being in the room; confirm recording equipment works)."
    weight: 0.30
    description: "TestPreparation"
