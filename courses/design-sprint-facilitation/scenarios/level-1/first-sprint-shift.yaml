meta:
  id: first-sprint-shift
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "First sprint shift — handle multiple beginner sprint facilitation challenges in a single session"
  tags: [shift, combined, assessment, beginner]

state: {}

trigger: |
  You're a junior UX designer about to facilitate your
  first design sprint next week. Three problems arise
  before the sprint even starts:

  TASK 1 — The CEO (Decider) says: "I can only attend
  Monday and Wednesday. I have investor meetings Tuesday,
  Thursday, and Friday." But the sprint requires the
  Decider for all 5 days, especially Wednesday's Supervote
  and Friday's test debrief.
  How do you handle this?

  TASK 2 — You need to recruit 5 users for Friday testing.
  The product is a B2B invoicing tool for small businesses.
  Your PM says: "Just use employees to test — it's faster."
  But the Sprint book says to use real target users.
  Create a user recruitment plan.

  TASK 3 — Your team of 7 has never heard of a design
  sprint. Two engineers on the team are openly skeptical:
  "Five days of sticky notes? We could be writing code."
  Another team member asks: "Is this like a hackathon?"
  Write the pre-sprint email that explains what a design
  sprint is, why it matters, and what to expect.

  Task: Handle all three pre-sprint challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — the part-time Decider — negotiation strategy (the Decider must be present for Monday's target selection, Wednesday's Supervote, and Friday's debrief at minimum: negotiate with the CEO — 'I understand your schedule is packed. Can we block Monday full day, Wednesday morning for the Supervote, and Friday 3-5pm for the test debrief? These are the 3 moments where your decision authority is essential'; if the CEO truly can't attend, ask — 'Can you delegate Decider authority to the VP of Product for the days you're absent? The sprint needs someone who can make final calls without waiting for approval'; the worst outcome is no Decider — the sprint becomes design-by-committee), backup plan (if the CEO can only do Monday and Wednesday: Tuesday sketching works without the Decider; Wednesday Supervote is critical — the CEO must be present for this 30-minute exercise even if nothing else; Thursday prototyping works without the Decider; Friday testing is important but the CEO can review recordings and the sprint report instead of watching live; document what authority is delegated to whom for the days the CEO is absent)."
    weight: 0.35
    description: "DeciderScheduling"
  - type: llm_judge
    criteria: "Response handles Task 2 — user recruitment — why not employees (explains to the PM: employees know the product's internals, have built-in biases, and will navigate based on insider knowledge — they won't reveal the real usability issues that actual small business owners would encounter; the sprint methodology requires 5 external users who match the target persona; using employees would waste the entire week's work because the test results would be unreliable), recruitment plan (practical approach for B2B user recruitment: reach out to existing customers who match the target persona — small business owners who do their own invoicing; offer a $100 gift card incentive for 1 hour of their time; schedule 5 participants plus 1-2 backups in case of no-shows; screen for the right profile — must actually handle invoicing for their business, not just any small business owner; timeline: start recruiting immediately — Friday is 5 business days away, recruitment needs at least 3-4 days; alternative sources: local business associations, LinkedIn outreach, customer success team introductions)."
    weight: 0.35
    description: "UserRecruitment"
  - type: llm_judge
    criteria: "Response handles Task 3 — pre-sprint communication — addresses skepticism (the email should address engineer concerns directly: 'This is NOT a week of sticky notes — it's a structured process that compresses months of debate, design, and testing into 5 days. By Friday, we'll have tested a real solution with real users. This saves engineering weeks or months of building the wrong thing'; differentiates from a hackathon: 'A hackathon builds something. A design sprint tests an idea before building. The output is a validated direction, not code'), what to expect (the email explains the week clearly: daily structure — 10am to 5pm, focused work sessions; what to bring — just yourself and an open mind, no laptops during exercises; each day's focus in one sentence — Monday: understand the problem; Tuesday: generate solutions; Wednesday: choose the best one; Thursday: build a prototype; Friday: test with real users; the outcome — by Friday we'll know which direction to take and have evidence to support the decision), tone (the email should be enthusiastic but not dismissive of skepticism: acknowledge that giving up 5 days of coding time is a real cost; frame the sprint as the best investment of that time — 'would you rather spend 5 days validating an idea, or 5 months building something users don't want?'; include the Sprint book or a short video link for those who want to learn more before Monday)."
    weight: 0.30
    description: "PreSprintCommunication"
