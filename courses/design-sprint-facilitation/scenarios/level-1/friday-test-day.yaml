meta:
  id: friday-test-day
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Friday Test Day — facilitate user testing, capture feedback, and synthesize results"
  tags: [friday, test, user-testing, feedback, synthesis, beginner]

state: {}

trigger: |
  It's Friday morning. You have 5 users scheduled for
  1-hour sessions throughout the day. The prototype is
  ready. The team will watch from a separate room via
  video feed.

  The test schedule:
  - 9:00am — User 1: Sarah, frequent online shopper
  - 10:15am — User 2: Mike, occasional shopper, prefers
    in-store
  - 11:30am — User 3: Priya, tech-savvy power user
  - 1:30pm — User 4: Carlos, price-sensitive comparison
    shopper
  - 2:45pm — User 5: Linda, older user, less comfortable
    with technology

  Sprint questions to answer:
  1. Do users understand the transparent pricing before
     checkout?
  2. Can users complete guest checkout without confusion?
  3. Do users trust the payment process?

  Complications:
  - User 2 (Mike) finishes the task in 2 minutes and says
    "it's fine" with no elaboration — you need deeper
    feedback
  - User 3 (Priya) finds a prototype bug — the back button
    doesn't work on one screen
  - User 4 (Carlos) hates the design — "I would never buy
    from a site that looks like this"
  - The CEO watching from the observation room wants to
    stop the test after User 4 and redesign

  Task: Facilitate Friday's testing, handle the
  complications, and synthesize the results.

assertions:
  - type: llm_judge
    criteria: "Response facilitates user testing properly — interview technique (uses the 5-Act Interview structure from the Sprint book: friendly welcome — build rapport; context questions — understand their shopping habits; introduce the prototype — 'this is an early concept, it won't all work, and your honest feedback helps us'; tasks — 'imagine you want to buy these 3 items for your home'; debrief — open-ended questions about the experience), observation protocol (the team in the observation room takes structured notes: one column per user, rows for each sprint question; notes capture observations not interpretations — 'user paused for 10 seconds on the shipping page' not 'user was confused by shipping'; at the end of each session, the observation team has a 10-minute debrief to capture top insights while they're fresh), testing best practices (let the user lead — don't guide them to the right answer; use 'think aloud' protocol — ask them to narrate what they're thinking as they interact; when they get stuck, resist the urge to help — the struggle IS the data; ask follow-up questions — 'what were you expecting to see here?' 'what would you do next if this were real?')."
    weight: 0.35
    description: "TestFacilitation"
  - type: llm_judge
    criteria: "Response handles the testing complications — Mike's shallow feedback (techniques for deeper probing: 'You said it's fine — can you tell me what specifically felt easy?'; 'Was there anything that made you pause, even briefly?'; 'If you could change one thing, what would it be?'; 'On a scale of 1-10, how confident did you feel about the final price?'; sometimes a user who says 'it's fine' truly found it intuitive — that's valid positive data, not a failure of the interview), Priya's prototype bug (handle gracefully: 'Oh, that button isn't working in this prototype — go ahead and tell me what you'd expect to happen, and I'll navigate you there'; the bug becomes a conversation prompt — 'what would you want to see when you go back?'; note the bug for the team but don't let it derail the session; a prototype is expected to have rough edges), Carlos's negative reaction (this is valuable data, not a disaster: probe deeper — 'what specifically about the design concerns you?'; understand if it's aesthetic preference or usability issue — 'would you be comfortable entering your payment information here? why or why not?'; one strongly negative user out of 5 is a data point, not a verdict; capture his specific concerns for the debrief), the CEO wanting to stop testing (firmly but respectfully maintain the process: 'we have 5 users for a reason — one negative reaction doesn't invalidate the whole concept; let's complete all 5 sessions and look at the patterns; Carlos's feedback is valuable precisely because it identifies potential problems, but we need to see if it's a pattern or an outlier')."
    weight: 0.35
    description: "ComplicationHandling"
  - type: llm_judge
    criteria: "Response synthesizes results and closes the sprint — pattern identification (after all 5 sessions, synthesize: look at the observation notes across all users — what patterns emerge? sprint question answers: question 1 about transparent pricing — did 3+ users understand it? question 2 about guest checkout — did users complete it without confusion? question 3 about payment trust — did users express confidence?; patterns across 5 users are directional: 5/5 is strong validation, 4/5 is encouraging, 3/5 is mixed, 2/5 or fewer is a red flag), sprint close and next steps (the sprint ends with a team discussion: what worked? — validated elements to carry into development; what didn't work? — elements that need redesign before development; what was surprising? — unexpected insights that change the team's understanding; next steps: which sprint questions were answered? what should be built vs what needs more exploration? who owns the next phase?), sprint documentation (what to capture for the sprint report: the original sprint challenge and goal, the target chosen on Monday, the solution sketched and decided, the prototype built, the test results with patterns and quotes from each user, the validated and invalidated assumptions, recommended next steps with evidence supporting each recommendation)."
    weight: 0.30
    description: "SynthesisAndClose"
