meta:
  id: sprint-notes-documentation
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Sprint notes and documentation — capture and organize design sprint activities and decisions throughout the week"
  tags: [documentation, notes, decision-log, sprint-report, beginner]

state: {}

trigger: |
  You've just completed a 5-day design sprint for a
  travel booking app. The sprint focused on the hotel
  search and comparison experience. Your PM says: "I
  need a sprint report I can share with leadership and
  the engineering team so they understand what we learned
  and what we should build."

  What happened during the sprint:

  Monday: Goal — "Travelers can find and confidently book
  the right hotel in under 10 minutes." Target chosen:
  the hotel comparison moment (when users have 3-5 options
  and need to decide). Sprint questions: "Do users trust
  our reviews?", "Is price or location the primary filter?",
  "Can users compare hotels without opening 5 tabs?"

  Tuesday: 7 solution sketches. Most focused on comparison
  tables, one proposed a "Tinder-like" swipe interface,
  one proposed an AI recommendation.

  Wednesday: Team voted for the comparison table approach
  with integrated map view. Decider used one Supervote on
  the AI recommendation element, combining it with the
  comparison table.

  Thursday: Built a Figma prototype — hotel search results
  → side-by-side comparison with map → AI recommendation
  overlay → booking flow.

  Friday: 5 users tested. Results:
  - 4/5 loved the side-by-side comparison
  - 3/5 ignored the AI recommendation ("I don't trust
    algorithms to pick my hotel")
  - 5/5 said the map integration was "essential"
  - 2/5 were confused by the filter system
  - Average task completion: 7 minutes (under the 10-min
    goal)

  Task: Write the sprint report documenting the full
  week and its recommendations.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured sprint report — report structure (organized clearly: executive summary — 2-3 sentences on what was tested and the key finding; sprint overview — challenge, goal, team, dates; day-by-day summary — key activities and decisions each day; test results — detailed findings from Friday; recommendations — what to build, what to explore, what to drop; appendix — photos, prototype screenshots, raw user quotes), executive summary (concise and actionable: 'The sprint tested a hotel comparison experience combining side-by-side comparison, integrated map view, and AI recommendations. The comparison and map features were strongly validated — 4/5 and 5/5 users respectively found them valuable. The AI recommendation was not trusted by most users — 3/5 ignored it. We recommend building the comparison and map features and conducting further research on AI recommendations before investing in that feature.'), decision documentation (captures key decisions and rationale: Monday target selection — the comparison moment was chosen because analytics show users open an average of 5 hotel tabs, suggesting they lack comparison tools; Wednesday decision — comparison table won the vote with AI recommendation added via Decider's Supervote; these decisions and their reasoning should be clear to someone who wasn't in the room)."
    weight: 0.35
    description: "ReportStructure"
  - type: llm_judge
    criteria: "Response documents test results rigorously — quantified findings (presents each finding with the number of users: side-by-side comparison validated by 4/5, map integration validated by 5/5, AI recommendation rejected by 3/5, filter confusion experienced by 2/5; the 7-minute average completion is under the 10-minute goal — quantitative validation of the overall approach), user quotes (includes specific user quotes that bring the data to life: the AI rejection quote — 'I don't trust algorithms to pick my hotel' — captures a fundamental user attitude that numbers alone don't convey; captures what made the comparison 'loved' — specific observations about user behavior, not just 'they liked it'), sprint question answers (explicitly answers each Monday sprint question: 'Do users trust our reviews?' — not directly tested, remains an open question; 'Is price or location the primary filter?' — test results showed users relied on the map first, then price — location was primary; 'Can users compare hotels without opening 5 tabs?' — yes, 4/5 users completed comparison in the side-by-side view without leaving the page)."
    weight: 0.35
    description: "TestResults"
  - type: llm_judge
    criteria: "Response provides actionable recommendations — build recommendations (categorized by confidence: high confidence — build the side-by-side comparison view and map integration, these are validated; medium confidence — redesign the filter system to address the 2/5 confusion; low confidence — the AI recommendation needs more research before building; this gives the engineering team a clear priority list), what not to build yet (explicitly recommends against building the AI recommendation feature as designed — 3/5 rejection is a clear signal; suggests alternative approaches: test with more users, try different framing — 'curated picks' instead of 'AI recommendation', or start with simpler personalization before full AI), post-sprint next steps (what happens after the report: engineering estimates for the comparison and map features; additional user research on the AI recommendation concept; design refinement on the filter system; a follow-up sprint in 4-6 weeks if additional validation is needed; assigns ownership for each next step)."
    weight: 0.30
    description: "ActionableRecommendations"
