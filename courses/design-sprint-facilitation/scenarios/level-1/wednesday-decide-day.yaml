meta:
  id: wednesday-decide-day
  level: 1
  course: design-sprint-facilitation
  type: output
  description: "Wednesday Decide Day — facilitate the decision-making phase with silent critique, voting, and storyboarding"
  tags: [wednesday, decide, voting, storyboard, beginner]

state: {}

trigger: |
  It's Wednesday morning. 7 solution sketches are posted
  on the wall from yesterday. Today you need to:
  1. Art Museum — silent review of all sketches
  2. Heat Map — dot voting on interesting elements
  3. Speed Critique — 3 minutes discussing each sketch
  4. Straw Poll — each person votes for one sketch
  5. Supervote — the Decider (CEO) makes the final call
  6. Create the prototype storyboard

  Complications:
  - Two sketches are very similar (both redesign the
    payment form)
  - One sketch is radically different from the others
    (it removes checkout entirely and uses a subscription
    model instead)
  - The CEO's own sketch got the fewest votes in the
    straw poll
  - The team's favorite sketch would require 3 months
    of engineering work to build for real (but only needs
    to be prototyped, not built)

  Task: Facilitate Wednesday's decision exercises and
  handle the voting dynamics.

assertions:
  - type: llm_judge
    criteria: "Response facilitates the decision exercises properly — Art Museum (team walks around the room looking at all 7 sketches in silence for 10-15 minutes; no discussion, no questions — just observation and reading; this prevents the loudest person from influencing opinions before people form their own views), Heat Map voting (each person gets dot stickers — place dots on any part of any sketch that interests them; this creates a heat map showing which elements across all sketches attracted the most attention; clusters of dots reveal the team's collective instinct about what's promising), Speed Critique (3 minutes per sketch: the facilitator narrates what they see in the sketch while the team adds observations; the sketcher stays silent — they don't defend or explain; after 3 minutes, move to the next sketch regardless of whether discussion is 'finished'; the timer is sacred — without it, one sketch could dominate the discussion), Straw Poll and Supervote (straw poll: each person places one large dot on their favorite overall sketch; then the Supervote: the CEO gets 3 large dots with their initials — these are the final votes that determine which sketch moves to prototyping; the CEO can follow the group or override — both are valid)."
    weight: 0.35
    description: "DecisionExercises"
  - type: llm_judge
    criteria: "Response handles the voting dynamics — the CEO's sketch losing (this is a delicate moment: the CEO may feel embarrassed or overruled; handle it by normalizing the process — 'the beauty of the sprint process is that ideas compete on merit, and the Supervote gives you the final decision regardless of the straw poll'; if the CEO's sketch had strong elements even though it didn't win overall, highlight those elements; the CEO can use their Supervote to include elements from their sketch in the storyboard), the radical subscription sketch (this sketch challenges assumptions — don't dismiss it: during speed critique, note that it questions a fundamental assumption — whether traditional checkout is needed at all; even if it doesn't win, the team should capture this insight for future exploration; the Decider might use one Supervote on a radical idea and two on the practical favorite), similar sketches (the two similar payment form redesigns: during speed critique, highlight what makes each different despite the similarity; they may be combined in the storyboard — taking the best elements of each; this is a strength, not a problem — convergent thinking validates the direction)."
    weight: 0.35
    description: "VotingDynamics"
  - type: llm_judge
    criteria: "Response creates the storyboard for prototyping — storyboard creation (after the Supervote, the team creates a step-by-step storyboard for what will be prototyped Thursday: typically 10-15 frames showing the user's experience from start to finish — including the opening scene, the key interaction, and the resolution; the storyboard should be specific enough that Thursday's prototype team can build from it without ambiguity), handling the buildability concern (the team's favorite sketch would require 3 months of engineering — but the prototype doesn't need to be real: Thursday's prototype is a facade — it looks real to test users but isn't functional behind the scenes; a 3-month engineering project can be prototyped in 1 day using Figma, Keynote, or even paper; remind the team that the sprint tests the idea not the implementation), end-of-day documentation (Wednesday's outputs to capture: photos of all sketches with their heat maps, the straw poll and Supervote results, the completed storyboard for Thursday, any notes about interesting ideas from sketches that weren't selected — these may inform future work)."
    weight: 0.30
    description: "Storyboard"
