meta:
  id: sprint-industry-thought-leadership
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint industry thought leadership — establish yourself as a design sprint thought leader through publishing, speaking, and community building"
  tags: [thought-leadership, publishing, speaking, community, master]

state: {}

trigger: |
  After 8 years and 150+ sprints, you want to establish
  yourself as a leading voice in design sprint methodology.
  You have unique insights from running sprints across
  healthcare, fintech, government, and consumer tech. A
  publisher approaches you about writing a book, and you've
  been invited to speak at a major design conference.

  Your unique contributions to the field:
  - A framework for adapting sprints to regulated industries
  - A "Sprint Maturity Model" for organizations
  - Data from 150 sprints showing success patterns
  - A methodology for "Continuous Sprint" — integrating
    sprint practices into daily product development

  The publisher says: "The Sprint book by Jake Knapp is the
  bible. Your book needs to be the 'what's next' — not
  replacing the original but advancing the practice."

  The conference organizer says: "We want a talk that
  challenges the audience's assumptions about sprints.
  Something provocative that starts a conversation."

  Task: Design your thought leadership strategy including
  the book concept, conference talk, and community building.

assertions:
  - type: llm_judge
    criteria: "Response designs the book concept — book positioning (positions the book as the practitioner's evolution guide: title direction — something that signals advancement, not replacement: 'Beyond the Sprint', 'Sprint Mastery', or 'The Sprint at Scale'; the book fills the gap between the original Sprint book for beginners and the advanced challenges practitioners face; target audience — people who've read Sprint and run 5+ sprints but are hitting the ceiling of the basic methodology; the book should be practical, not theoretical — every chapter includes exercises, templates, and case studies), book structure (outlines a compelling table of contents: Part 1 — Mastering the Fundamentals: common anti-patterns and how to fix them; the exercises the original book doesn't explain well enough; Part 2 — Adapting the Sprint: sprints for AI products, platform ecosystems, services, hardware, organizational design; regulated industry adaptations; remote and distributed sprints; Part 3 — Scaling Sprints: building a sprint practice in an organization; facilitator development and certification; sprint governance and quality; connecting sprints to strategy and OKRs; Part 4 — The Future of Sprints: continuous sprint practices; AI-assisted facilitation; sprint methodology evolution; each chapter opens with a real sprint story — not hypothetical examples but anonymized real cases from the 150 sprints), data-driven credibility (leverages the 150-sprint dataset: publish aggregate findings — success rates by industry, by team size, by challenge type; identify the factors that predict sprint success or failure; the data gives the book authority beyond personal opinion — 'Across 150 sprints, we found that teams with an engineer present had a 40% higher implementation rate'; this positions the book as research-backed, not just experience-based)."
    weight: 0.35
    description: "BookConcept"
  - type: llm_judge
    criteria: "Response designs the conference talk — provocative talk concept (creates a talk that challenges assumptions: title — 'The Sprint Is Broken (And How to Fix It)' or 'Everything You Know About Sprints Is Wrong' — provocative enough to draw an audience; thesis — the original sprint methodology was designed for early-stage consumer tech; most organizations using sprints today face challenges the original methodology wasn't built for; the talk presents 3-5 ways the sprint must evolve and offers concrete solutions from real experience; the provocation isn't that sprints are bad — it's that the practice has stagnated and needs evolution), talk structure (designs a compelling 30-45 minute talk: opening — a story of a spectacular sprint failure that reveals the methodology's limitations; problem statement — 'The Sprint book was published in 2016 for a specific context; the world has changed but our sprint methodology hasn't'; 3-5 insights from 150 sprints — each insight challenges a common sprint assumption with data and case studies; example insights: 'Crazy 8s produces more ideas but not necessarily better ideas — here's what we do instead for complex problems'; 'The Decider role works for startups but breaks down in enterprise — here's the adaptation'; 'Friday testing validates desirability but not behavior change — here's how to test for real impact'; closing — a vision for the next generation of sprint methodology; call to action — invite the audience to contribute to the methodology's evolution), audience engagement strategy (maximizes the talk's impact: live demonstration — run a micro-exercise with the audience during the talk to illustrate one of the adaptations; controversial moments — include 2-3 statements designed to provoke discussion: 'Most sprints fail not during the sprint but after it — and facilitators are responsible for that failure'; takeaway — provide a downloadable 'Sprint Evolution Kit' that the audience can use immediately; the talk should generate conversation, social media discussion, and invitations to other speaking events)."
    weight: 0.35
    description: "ConferenceTalk"
  - type: llm_judge
    criteria: "Response designs the community building strategy — community platform (builds a practitioner community around the methodology evolution: create an online community — Slack or Discord — for sprint practitioners who want to advance their practice; the community provides peer support, methodology discussions, case study sharing, and access to new research and templates; tiered membership — free tier for general practitioners, paid tier for advanced workshops, template libraries, and mentorship; the community becomes a feedback loop for the book and speaking content — practitioners share their experiences, which inform future writing and presentations), content strategy (creates a regular content cadence: monthly newsletter — sprint insights, case study highlights, and methodology updates; quarterly webinars — deep dives into specific sprint challenges with Q&A; annual sprint methodology report — aggregate findings from the community's sprints, industry trends, and methodology innovations; podcast or video series — interviews with sprint practitioners, client stories, and methodology experiments; the content strategy positions you as the ongoing voice of sprint evolution, not just an author who published once), ecosystem partnerships (builds strategic relationships: partner with AJ&Smart and Jake Knapp's organizations — not as competitors but as complementary voices in the sprint ecosystem; collaborate with design tool companies — Miro, Figma, Mural — for sprint-specific integrations and templates; connect with business schools for executive education programs; build relationships with enterprise consulting firms who want to add sprint facilitation to their offerings; the thought leadership ecosystem creates referrals, speaking opportunities, and commercial partnerships)."
    weight: 0.30
    description: "CommunityBuilding"
