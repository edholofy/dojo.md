meta:
  id: sprint-ai-augmentation
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint AI augmentation — integrate AI tools into the design sprint process to enhance research, prototyping, testing, and synthesis"
  tags: [ai, augmentation, tools, future, master]

state: {}

trigger: |
  It's 2026 and AI tools have matured significantly. You're
  redesigning the design sprint methodology to leverage AI
  at every stage. The Head of Innovation at your company
  asks: "How do AI tools change the design sprint? Can we
  run sprints faster? Can we get better results? Or does
  AI fundamentally change what's possible?"

  Available AI capabilities:
  - Generative AI for text, images, and code (GPT-4+, Claude,
    Midjourney, Cursor)
  - AI-powered user research tools (synthetic users,
    automated interview analysis, sentiment analysis)
  - AI prototyping (natural language to Figma designs,
    AI-generated UI components)
  - AI synthesis tools (automated theme extraction from
    interview transcripts, pattern recognition across data)

  The team is excited but the UX Research Director warns:
  "Synthetic users and AI-generated insights are not the
  same as talking to real people. I'm worried we'll lose
  the human connection that makes sprints valuable."

  Task: Design the AI-augmented sprint methodology, clearly
  defining where AI adds value and where human judgment
  remains essential.

assertions:
  - type: llm_judge
    criteria: "Response defines AI augmentation opportunities at each sprint stage — Monday AI augmentation (AI enhances the mapping phase: use AI to synthesize existing research — feed interview transcripts, support tickets, and analytics data into AI to identify themes and patterns before the sprint begins; AI-generated competitive analysis — analyze competitor products, reviews, and positioning in minutes instead of hours; AI-assisted HMW generation — after expert interviews, AI can suggest additional HMW questions based on the interview content; LIMIT — AI should augment human mapping, not replace it; the team still needs to build shared understanding through discussion; AI-generated journey maps based on data are a starting point, not the final map), Tuesday AI augmentation (AI transforms the sketching phase: AI-generated design concepts — use generative AI to rapidly produce visual concepts based on the sprint's HMW questions; 'Augmented Crazy 8s' — instead of sketching 8 ideas in 8 minutes, each person writes 8 text prompts and AI generates visual concepts for each; this produces more diverse ideas because AI isn't limited by individual drawing ability; AI-generated Lightning Demos — AI can find and summarize relevant design examples from across industries; LIMIT — AI concepts are starting points for human refinement; the team must evaluate, combine, and improve AI-generated ideas using human judgment about user psychology and business context), Thursday AI augmentation (AI dramatically accelerates prototyping: AI code generation creates interactive prototypes from design descriptions — what took a full day might take 2-3 hours; AI-generated realistic content — product copy, user data, and scenario-specific content at scale; AI can create multiple prototype variants for A/B testing — test 2-3 approaches instead of just 1; LIMIT — the prototype must still tell the story defined in Wednesday's storyboard; AI speed shouldn't lead to scope creep — prototype the storyboard, not everything possible)."
    weight: 0.35
    description: "AIAtEachStage"
  - type: llm_judge
    criteria: "Response addresses the synthetic users debate and human judgment boundaries — synthetic users position (takes a nuanced position on AI-generated user feedback: synthetic users can be valuable for — pre-sprint hypothesis generation, identifying edge cases the team hasn't considered, stress-testing assumptions before real user testing; synthetic users cannot replace — real user testing on Friday, emotional responses and trust signals, unexpected behaviors and workarounds that only emerge in real interaction; the recommended approach — use synthetic users for early filtering on Tuesday-Wednesday to narrow solution options, then validate the winning solution with real users on Friday; frame synthetic users as 'pre-testing' not 'testing'), where human judgment is irreplaceable (draws clear lines: real user testing — AI can analyze transcripts but can't replace the facilitator's ability to read body language, follow up on unexpected reactions, and build rapport; Decider decisions — the Supervote requires human judgment about business strategy, feasibility, and organizational context that AI can't assess; team dynamics management — AI can't facilitate the interpersonal dynamics that make or break a sprint; ethical evaluation — AI can identify patterns but can't assess whether a solution is equitable, inclusive, or ethically sound; the sprint's most valuable moments are the human ones — the breakthrough insight during an expert interview, the team's energy during a great Crazy 8s session, the Decider's aha moment during user testing), the UX Research Director's concern (validates and addresses the concern: the worry is legitimate — over-relying on AI analysis could produce sprints that are data-rich but insight-poor; AI-generated insights lack the empathy and contextual understanding that comes from direct user interaction; the solution is 'AI-augmented human research' not 'AI-replaced human research'; Friday testing with real users remains the non-negotiable core of the sprint — everything else can be augmented; the research director should own the testing protocol and synthesis, using AI as a tool in their process)."
    weight: 0.35
    description: "HumanJudgmentBoundaries"
  - type: llm_judge
    criteria: "Response designs the AI-augmented sprint format — compressed sprint format (AI enables a faster sprint without sacrificing quality: 'AI-Augmented Sprint 3.0' — potentially compressible to 3 days: Day 1 — Map and Sketch with AI-assisted research synthesis, AI-generated competitive analysis, and augmented Crazy 8s; Day 2 — Decide and Prototype with AI-assisted voting analysis, AI-accelerated prototype building; Day 3 — Test with real users and AI-assisted synthesis; the 2 days saved come from AI handling the mechanical work — research synthesis, prototype building, data analysis — while humans focus on the creative and evaluative work), new sprint exercises enabled by AI (creates exercises that weren't possible before AI: 'AI Challenge' — after the team sketches solutions, feed the concepts to AI and ask it to find flaws, suggest improvements, or generate alternative approaches; the team evaluates AI feedback and decides what to incorporate; 'Rapid Variant Testing' — AI generates 3-5 prototype variants of the storyboard, each emphasizing different aspects; synthetic users pre-screen the variants; real users test the top 2 on Friday; '100-User Synthesis' — after Friday testing with 5 real users, supplement with 100 synthetic user responses to identify patterns the 5-user sample might miss; use cautiously and transparently — always prioritize real user data), implementation and change management (guides the transition to AI-augmented sprints: don't switch overnight — introduce AI tools gradually: start with AI-assisted research synthesis, then add AI prototyping, then augmented exercises; train facilitators on AI tools and their limitations — facilitators must understand what AI can and can't do; establish clear protocols — real user testing is always required, AI-generated insights must be validated, the team maintains creative ownership of solutions; monitor sprint quality — does AI augmentation improve outcomes or just speed? if quality drops, recalibrate the balance between AI and human work)."
    weight: 0.30
    description: "AIAugmentedFormat"
