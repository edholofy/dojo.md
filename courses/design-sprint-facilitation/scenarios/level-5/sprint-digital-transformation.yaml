meta:
  id: sprint-digital-transformation
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint for digital transformation — use design sprints as the methodology backbone for large-scale digital transformation programs"
  tags: [digital-transformation, enterprise, large-scale, program, master]

state: {}

trigger: |
  A Fortune 200 insurance company is embarking on a 3-year
  digital transformation worth $200M. The Chief Transformation
  Officer says: "We've hired McKinsey for strategy and
  Accenture for implementation. But we keep building digital
  products that our agents and customers hate. I want design
  sprints embedded in our transformation program to ensure
  we build the right things."

  Transformation scope:
  - Agent portal (20,000 insurance agents)
  - Customer self-service portal (2M policyholders)
  - Claims processing system (internal + customer-facing)
  - Underwriting automation tools
  - Mobile app for policyholders

  Current state:
  - Most processes are paper-based or use 20-year-old systems
  - Agents are resistant to digital tools — "I've been doing
    this for 25 years without a computer"
  - Customers expect modern self-service but the company's
    digital experience is rated 2.1/5
  - The transformation has already started but early digital
    products have low adoption (15% agent adoption, 8%
    customer adoption)
  - The company has zero design sprint experience

  Task: Design the sprint integration into the digital
  transformation program.

assertions:
  - type: llm_judge
    criteria: "Response integrates sprints into the transformation program — sprint program architecture (designs how sprints fit within the $200M transformation: the transformation has 5 major workstreams — each needs sprint-validated direction before significant investment; propose a 'validate before you build' mandate — no workstream invests more than $1M in development without sprint validation; this prevents the current problem — building digital products nobody wants; the sprint program operates alongside McKinsey's strategy and Accenture's implementation — sprints bridge the gap between strategy recommendations and technical implementation), sprint sequencing across workstreams (plans the sprint sequence strategically: immediate — sprint on the agent portal first because it has the lowest adoption and the highest internal resistance; the agent sprint will reveal why adoption is 15% and what agents actually need; month 2 — sprint on customer self-service because it directly impacts the 2.1/5 rating; month 3 — sprint on claims processing which affects both agents and customers; months 4-6 — sprint on underwriting automation and mobile app; the sequence prioritizes workstreams with the most uncertainty and risk of wasted investment), addressing the adoption crisis (the 15% agent adoption and 8% customer adoption rates indicate the transformation is already building the wrong things: before running new sprints, conduct a rapid evaluation of existing digital products — why is adoption so low?; the first sprint should diagnose the adoption problem, not design new features; the sprint might reveal that the existing digital products need UX improvement, not replacement; this saves the transformation from the most expensive mistake — rebuilding what could be fixed)."
    weight: 0.35
    description: "TransformationIntegration"
  - type: llm_judge
    criteria: "Response addresses the unique challenges of insurance industry sprints — agent-centric sprint design (the 20,000 agents are the most critical user group: include real agents in sprint teams — not just agent managers or executive representatives; agents who've been working 25 years have deep workflow knowledge that digital designers lack; the sprint must respect their expertise: 'You know this business better than anyone — help us design tools that make your job easier, not harder'; test prototypes with agents in their actual office environments — not in a conference room in headquarters; agent adoption is the transformation's biggest risk and the sprint's biggest opportunity), insurance-specific testing challenges (insurance products have unique testing constraints: claims processing can't be prototyped with fake claims — use anonymized real claim scenarios; underwriting decisions involve regulated processes — the sprint must include compliance review; policy management involves year-long customer relationships — the sprint's 1-week testing can only capture a slice; adapt testing to evaluate specific moments — the claim filing experience, the policy renewal decision, the agent quoting process; don't try to test the entire insurance lifecycle in one sprint), paper-to-digital transition sensitivity (the transformation from paper to digital is emotionally charged: some agents see digital tools as threatening their jobs — the sprint must address this fear directly; during Monday mapping, map both the current paper process and the proposed digital process side by side; identify where digital genuinely improves the agent's experience vs where it adds complexity; the sprint outcome might include hybrid solutions — digital tools that enhance the paper process rather than replace it entirely; the most successful insurance digital transformations preserve agent relationships while removing administrative burden)."
    weight: 0.35
    description: "InsuranceIndustryAdaptation"
  - type: llm_judge
    criteria: "Response builds sprint capability for the transformation — organizational capability building (the company has zero sprint experience — build capability fast: hire or contract 2 experienced sprint facilitators for the first 6 months; they facilitate early sprints while training internal facilitators; identify 6-8 internal facilitator candidates from across the transformation workstreams; by month 6, internal facilitators should be running sprints independently with periodic quality reviews; the facilitator team should include representation from both the consulting partners and the internal team — this builds sprint knowledge into the organization, not just the consultants), consultant integration (navigates the relationship with McKinsey and Accenture: McKinsey's strategy work should inform sprint briefs — 'McKinsey identified agent productivity as a key lever; the sprint validates how to improve it'; Accenture's implementation teams should participate in sprints — ensuring they build what the sprint validated; the sprint program shouldn't compete with the consultants but complement them — 'Strategy → Sprint Validation → Implementation' is the flow; if consultants resist sprints, demonstrate value through the first sprint's outcomes — show that sprint-validated work has higher adoption than non-sprint work), transformation measurement (measures the sprint program's impact on the transformation: track adoption rates for sprint-validated products vs non-sprint products — the current 15% and 8% rates are the baseline; measure time-to-useful — how quickly do agents and customers become productive with sprint-validated tools?; report sprint ROI to the Chief Transformation Officer quarterly — in a $200M program, even small improvements in adoption represent millions in value; the sprint program should ultimately prove that 'validate before you build' reduces the transformation's total cost and increases its success rate)."
    weight: 0.30
    description: "CapabilityBuilding"
