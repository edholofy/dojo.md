meta:
  id: sprint-ma-due-diligence
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint for M&A due diligence — use design sprints to evaluate acquisition targets' product-market fit and integration potential"
  tags: [ma, due-diligence, acquisition, integration, master]

state: {}

trigger: |
  You're the VP of Product at a public SaaS company ($500M
  ARR). The company is evaluating the acquisition of a
  smaller competitor ($30M ARR) that serves a different
  market segment. The CEO says:

  "The financial due diligence is done. The numbers look
  good. But I've seen acquisitions fail because the product
  didn't integrate well or the target's product-market fit
  was weaker than their growth suggested. Can we use a design
  sprint to evaluate the product before we sign?"

  The acquisition timeline is tight — the board votes in
  3 weeks. You have 1 week for a product due diligence sprint.

  Available information:
  - The target company's product (you have a demo account)
  - Their public customer testimonials and case studies
  - Access to 3 of their customers for interviews (NDA-bound)
  - Their product roadmap (shared under NDA)
  - Your company's integration requirements and technical
    architecture documentation

  Constraints:
  - Confidentiality — the acquisition can't be disclosed
  - You can't include the target company's team in the sprint
  - The sprint team must be small (5 people) and trusted
  - The output must inform a board-level go/no-go decision

  Task: Design a product due diligence sprint that evaluates
  the acquisition target.

assertions:
  - type: llm_judge
    criteria: "Response designs the due diligence sprint structure — adapted sprint format for evaluation (restructures the sprint for evaluation rather than creation: Monday — map the target product's user experience, identify their claimed value proposition, and compare to their actual product experience; Tuesday — deep-dive into the target's product via the demo account: every team member uses the product for real tasks, documenting strengths, weaknesses, and gaps; Wednesday — customer interviews with the 3 available customers: understand real usage patterns, satisfaction, and switching risks; Thursday — integration assessment: how does the target's product fit with your architecture and product vision?; Friday — synthesis and board recommendation), sprint questions for M&A (frames sprint questions as due diligence questions: 'Is the target's product-market fit genuine or growth-driven by sales?'; 'Can the target's product be integrated into our platform within 12 months?'; 'Will the target's customers remain after the acquisition?'; 'Does the target's product roadmap align with or conflict with our product strategy?'; these questions guide the sprint and structure the board presentation), Monday deep mapping (maps the competitive and product landscape: map the target's market segment — who are their customers, what problems do they solve, how do they differ from your product?; map the integration points — where does the target's product overlap with yours? where does it complement?; identify the acquisition value — is it the technology, the customer base, the team, or the market position?; compare the target's claimed positioning with what you observe in the product — is there a gap between marketing and reality?)."
    weight: 0.35
    description: "DueDiligenceStructure"
  - type: llm_judge
    criteria: "Response designs the product and customer evaluation — product evaluation methodology (Tuesday's deep product analysis: each sprint team member uses the target's product for 2-3 hours completing real tasks; document using a structured evaluation framework: first-time user experience — is onboarding effective?; core workflow — does the product deliver on its value proposition?; edge cases — how does the product handle errors, unusual inputs, and scale?; technical quality — is the product fast, reliable, and well-built?; design quality — is the interface intuitive, consistent, and modern?; competitive comparison — where is the target better or worse than your own product?; the evaluation should reveal whether the product is genuinely good or if growth was driven by sales and marketing), customer interview strategy (Wednesday's customer interviews are the most critical day: with only 3 customers available, each interview must be highly structured; interview 1 — a happy customer: why do they use the product? what would they do if it disappeared? would they pay more?; interview 2 — a power user: how do they use the product daily? what workarounds have they built? what's missing?; interview 3 — if possible, a customer who considered leaving: what almost made them leave? what kept them?; listen for signs of real PMF — customers who restructured their workflows around the product vs customers who could easily switch; NDA-bound means you can't reveal the acquisition — position interviews as 'market research for a partnership exploration'), integration assessment (Thursday evaluates technical and product integration: technical integration — can the target's technology stack integrate with yours? what's the engineering effort for integration?; product integration — does the target's product become a feature within your platform or remain standalone?; customer integration — will the target's customers benefit from your platform's features? will your customers benefit from the target's capabilities?; roadmap alignment — does the target's planned roadmap conflict with your own? are there redundant development efforts?; the integration assessment should produce a realistic timeline and cost estimate for the board)."
    weight: 0.35
    description: "ProductAndCustomerEvaluation"
  - type: llm_judge
    criteria: "Response produces a board-ready output — Friday synthesis and recommendation (creates a structured board recommendation: executive summary — 1-page go/no-go recommendation with supporting evidence; product assessment — product quality score with specific strengths and weaknesses; PMF assessment — is the product-market fit genuine based on customer interviews and product usage?; integration assessment — timeline, cost, and risk of integration; customer retention risk — likelihood of customer churn post-acquisition; strategic fit — does this acquisition accelerate your product strategy?), risk identification (identifies acquisition risks the financial due diligence might miss: PMF risk — if customers are lukewarm or easily could switch, the $30M ARR may be fragile; integration risk — if the tech stack is incompatible, integration could take 24 months instead of 12; talent risk — without the target company's team in the sprint, assess whether the product requires their specific expertise to maintain; market risk — if the target's segment is shrinking or being commoditized, the acquisition's long-term value is uncertain; product debt risk — if the product has significant technical or design debt, the true cost of the acquisition is higher than the purchase price), confidentiality management (maintains confidentiality throughout: the sprint team must sign NDAs specific to the acquisition evaluation; all sprint artifacts are classified and stored securely; the 3 customer interviews are positioned as partnership research, not acquisition research; the sprint output goes directly to the CEO and board — it's not shared with the broader organization until the acquisition is announced or canceled; if the sprint recommends against the acquisition, the findings must remain confidential to protect both companies' reputations)."
    weight: 0.30
    description: "BoardRecommendation"
