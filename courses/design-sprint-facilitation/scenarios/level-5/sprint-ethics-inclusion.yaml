meta:
  id: sprint-ethics-inclusion
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint ethics and inclusion — ensure design sprints produce equitable, inclusive outcomes and address ethical implications of sprint-validated products"
  tags: [ethics, inclusion, equity, accessibility, master]

state: {}

trigger: |
  You're a senior sprint consultant asked to advise on three
  ethical and inclusion challenges that have emerged in your
  clients' sprint programs:

  Case 1: A healthcare company's sprint validated a symptom
  checker AI that performed well in testing with 5 users —
  all of whom were college-educated English speakers. The
  product launched and immediately failed for non-English
  speakers and users with low health literacy, affecting
  vulnerable populations who need the tool most.

  Case 2: A financial services company's sprint team of 7
  was entirely male, ages 28-42. They designed a retirement
  planning tool that tested well with users matching their
  demographic but completely missed the needs of single
  mothers, recent immigrants, and older adults — the segments
  with the most urgent retirement planning needs.

  Case 3: A city government's sprint for a public transit
  app recruited test users by posting in a tech-focused
  online community. All 5 test users were smartphone-savvy
  millennials. The app launched and excluded elderly riders,
  people with disabilities, and residents without reliable
  internet access — 40% of the city's transit users.

  Task: Diagnose the ethical and inclusion failures, create
  a framework for inclusive sprints, and design prevention
  strategies.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses the root causes across all three cases — systemic inclusion failures (identifies the common pattern: all three cases failed because the sprint's 'test with 5 users' model didn't represent the diversity of actual users; the sprint methodology's strength — speed — becomes a weakness when speed means testing with only the most accessible users; the 5-user testing model assumes users are relatively homogeneous — this works for narrow consumer products but fails for products serving diverse populations; the root cause isn't malice — it's structural: sprint teams and test user recruitment default to convenience, which systematically excludes marginalized populations), Case 1 healthcare diagnosis (the symptom checker failed specific populations: the sprint tested desirability and usability but not equity — does the product work equally well for all users?; health literacy is a critical variable the sprint ignored — medical language that college-educated users understand may be incomprehensible to others; language access wasn't tested — a healthcare product must work for non-English speakers; the vulnerable populations most affected are the ones who would benefit most from a symptom checker and are least likely to be recruited for sprint testing), Case 2 financial services diagnosis (the homogeneous sprint team created a blind spot: a team of men ages 28-42 designed from their perspective — retirement planning for dual-income households with steady employment; they didn't consider the retirement challenges unique to single parents, gig workers, immigrants with interrupted employment histories, or older adults starting planning late; the sprint team's composition directly limited the solution's applicability; the sprint tested well because the test users matched the team's assumptions), Case 3 government services diagnosis (the recruitment strategy excluded the primary user base: posting in tech communities recruited tech-savvy users — the opposite of a public transit app's primary users; 40% of transit users were excluded from the validation process; for government services, inclusion isn't just good design — it's a public obligation; the sprint produced a product that served the privileged minority and excluded the majority)."
    weight: 0.35
    description: "DiagnosisOfFailures"
  - type: llm_judge
    criteria: "Response creates an inclusive sprint framework — inclusive team composition (establishes guidelines for sprint team diversity: the sprint team should reflect the diversity of the product's user base — not perfectly, but intentionally; include at least one team member who represents or advocates for underserved user segments; for products serving diverse populations, include a community representative, an accessibility specialist, or a social worker who understands vulnerable users; the team diversity requirement should be part of the sprint readiness checklist — if the team doesn't represent the users, the sprint brief must address how underrepresented perspectives will be included), inclusive testing protocol (redesigns Friday testing for equity: instead of 5 homogeneous users, recruit for diversity: 2 users from the primary target segment, 2 users from underserved segments, 1 user with accessibility needs; for public services, the testing panel must reflect the community's demographics — age, language, ability, socioeconomic status; test in multiple languages if the product serves multilingual populations; test with assistive technologies if the product will be used by people with disabilities; the testing protocol should include an 'equity check' — does the product work equally well for all test users, or does it work better for some than others?), inclusive design exercises (adds new exercises to the sprint methodology: 'Exclusion Mapping' on Monday — identify which user groups are most likely to be excluded by the product and what barriers they face; 'Accessibility Review' on Wednesday — before storyboarding, review the proposed solution for accessibility barriers; 'Equity Testing Protocol' for Friday — specific test tasks that evaluate whether the product works for diverse users; these exercises don't replace existing sprint exercises — they augment them with an equity lens)."
    weight: 0.35
    description: "InclusiveFramework"
  - type: llm_judge
    criteria: "Response designs prevention strategies and organizational change — sprint ethics review (creates a lightweight ethics review process: before every sprint, the facilitator completes an 'ethics and inclusion pre-flight check': who does this product serve? who might it exclude? what are the consequences of exclusion?; for products with high ethical stakes — healthcare, financial services, government — add an ethics advisor to the sprint team; the ethics review isn't bureaucratic — it's a 15-minute assessment that catches obvious inclusion gaps before the sprint begins), organizational accountability (embeds inclusion into sprint governance: sprint quality scorecards should include an 'inclusion dimension' — was the team diverse? was testing inclusive? were equity concerns addressed?; sprint outcome reports should include an 'exclusion risk assessment' — which populations were not represented in testing and what's the risk?; training programs should include inclusion-focused modules — facilitators learn to design inclusive sprints, not just effective sprints; track inclusion metrics across sprints — are teams becoming more diverse? is testing becoming more representative?), industry-level advocacy (positions the inclusive sprint framework as an industry contribution: publish the framework as a methodology extension that any sprint practitioner can adopt; present at conferences with real case studies — the cases above are powerful examples of why this matters; collaborate with accessibility and inclusion organizations to validate and improve the framework; the sprint methodology community has largely ignored inclusion — being the voice that brings equity into sprint practice is both ethically important and professionally distinctive)."
    weight: 0.30
    description: "PreventionAndChange"
