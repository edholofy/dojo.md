meta:
  id: sprint-methodology-evolution
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint methodology evolution — advance the design sprint methodology with new exercises, tools, and approaches for emerging product categories"
  tags: [methodology, evolution, innovation, emerging, master]

state: {}

trigger: |
  You're a recognized design sprint thought leader invited
  to write a chapter for the next edition of the Sprint book.
  Jake Knapp asks you: "The original Sprint book was written
  in 2016 for screen-based products. The world has changed.
  How should the sprint methodology evolve for:

  1. AI-first products where the user experience is
     conversational and non-deterministic
  2. Platform ecosystems where the 'product' is a marketplace
     of interconnected services
  3. Climate and sustainability challenges where the impact
     is measured in decades, not sprint cycles

  I want concrete methodology adaptations, not abstract
  theory. New exercises, new testing approaches, new ways
  to structure the week."

  Your track record: 100+ sprints across industries,
  published methodology adaptations, and a reputation for
  pushing sprint boundaries.

  Task: Design concrete sprint methodology evolutions for
  these three emerging product categories.

assertions:
  - type: llm_judge
    criteria: "Response designs sprint adaptations for AI-first products — AI-specific Monday mapping (the journey map for AI products must capture uncertainty: map the user's intent, the AI's response range, and the gap between them; instead of mapping screens and clicks, map conversations and decision trees; the sprint question becomes — 'Can we design an AI interaction that users trust even when the AI is uncertain?'; expert interviews should include an AI/ML engineer who explains what the model can and cannot reliably do — the team must understand the technology's limitations before designing), AI sketching and prototyping (new exercises for AI products: replace Crazy 8s with 'Conversation Flows' — sketch 8 different conversation paths for the same user intent; solution sketches become conversation scripts with branching logic: 'If the user says X, the AI responds with Y; if the user says Z, the AI responds with W'; Thursday's prototype uses Wizard of Oz methodology — a human behind the scenes plays the AI, responding to real user inputs in real-time; the prototype tests the conversation design, not the technology; this reveals whether users understand and trust the AI interaction model), AI testing adaptations (Friday testing must evaluate unique AI challenges: test for trust — does the user trust the AI's responses? when does trust break?; test for recovery — what happens when the AI gives a wrong or unexpected answer? does the user know how to recover?; test for edge cases — give users scenarios where the AI will struggle and observe their reaction; measure not just task completion but comfort level, trust, and willingness to use again; the sprint's validated outcome might be 'users trust AI for X but not Y' — this insight is more valuable than a polished UI)."
    weight: 0.35
    description: "AIProductAdaptation"
  - type: llm_judge
    criteria: "Response designs sprint adaptations for platform ecosystems — platform-specific Monday mapping (maps the ecosystem, not a single user journey: identify all actors — platform operators, service providers, and end consumers; map the value flow — how does value move between actors?; the sprint target should focus on one critical interaction between two actors — for example, the onboarding experience for new service providers, or the discovery experience for consumers; don't try to sprint on the entire ecosystem — that's like trying to sprint on 'the internet'), multi-sided sketching (Tuesday's exercises adapt for platform dynamics: solution sketches must show both sides of the platform simultaneously — what the provider sees AND what the consumer sees; the marketplace 'match' moment is the key interaction to design — how does a consumer find the right provider?; Lightning Demos should feature successful platform designs — how does Airbnb's search work? how does Uber's matching algorithm feel to users?; the voting should consider both sides — a solution that's great for consumers but terrible for providers won't work), platform testing challenges (Friday testing must cover multiple actors: test with 2-3 consumers AND 2-3 providers — different test protocols for each; for marketplace platforms, test the 'match quality' — does the platform connect users with the right services?; test trust signals — reviews, ratings, verification badges; test the cold-start problem — what's the experience when there's limited supply or demand?; the sprint may validate the consumer experience but invalidate the provider experience, or vice versa — both perspectives must inform the go/no-go decision)."
    weight: 0.35
    description: "PlatformAdaptation"
  - type: llm_judge
    criteria: "Response designs sprint adaptations for climate and sustainability — long-horizon Monday mapping (sustainability challenges require mapping beyond typical sprint timeframes: map both immediate user behavior and long-term environmental impact; the journey map spans — today's user action, this year's behavioral change, this decade's environmental impact; sprint questions become — 'Can we design a product that changes daily behavior in a way that compounds into significant environmental impact over 5 years?'; expert interviews should include an environmental scientist who can quantify the impact of behavior changes at scale), new exercises for systemic impact (creates exercises the original sprint doesn't have: 'Impact Mapping' — a new Monday exercise that connects individual user actions to systemic outcomes; 'Unintended Consequences' — a Tuesday exercise where the team identifies potential negative second-order effects of their solution; 'Scale Projection' — a Wednesday exercise where the team calculates the environmental impact if 1 million users adopted the solution; these exercises ensure the sprint addresses systemic impact, not just user desirability), sustainability testing adaptations (Friday testing evaluates behavior change potential: test not just usability but motivation — 'Would you actually do this in your daily life?'; test for sustained engagement — 'Would you still do this in 6 months?'; the sprint can't test actual environmental impact in one week — instead, test the behavioral hypothesis: 'Users will reduce energy consumption by 15% if given real-time feedback'; the validated outcome is a behavioral hypothesis with supporting user evidence; post-sprint, design a longitudinal study to validate the long-term impact hypothesis)."
    weight: 0.30
    description: "SustainabilityAdaptation"
