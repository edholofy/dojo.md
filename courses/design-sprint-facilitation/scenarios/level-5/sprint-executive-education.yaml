meta:
  id: sprint-executive-education
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint executive education — design and deliver executive education programs that teach C-suite leaders how to use design sprints strategically"
  tags: [executive-education, c-suite, leadership, strategic, master]

state: {}

trigger: |
  A top-10 business school invites you to design a 2-day
  executive education program on design sprints. The audience
  is 30 C-suite executives and senior VPs from Fortune 500
  companies across industries (technology, healthcare,
  finance, retail, manufacturing).

  The program director says: "These executives don't need
  to become facilitators. They need to understand when and
  why to deploy design sprints, how to be an effective
  Decider, and how to measure sprint impact. Most of them
  have never participated in a sprint and are skeptical
  about 'design thinking' approaches."

  Constraints:
  - 2 days, 9am-5pm (16 hours total)
  - No homework or pre-reading — executives won't do it
  - Must include experiential learning, not just lectures
  - Must address skepticism about "design thinking" being
    fluffy or non-rigorous
  - Must produce takeaways executives can implement
    immediately at their companies

  Budget: $50K for program development and materials.

  Task: Design the 2-day executive education curriculum.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling Day 1 curriculum — morning session overcoming skepticism (9am-12pm: don't start with theory — start with evidence; open with a 15-minute case study — a specific company that used sprints to save $10M in wasted development or capture a market opportunity; present the data — sprint failure rates vs non-sprint failure rates, time-to-market improvements, ROI metrics from published sprint programs; address the 'design thinking is fluffy' concern directly — 'Design sprints are structured decision-making frameworks with measurable outcomes, not brainstorming workshops'; include a 'sprint myths vs reality' segment — executives often confuse sprints with ideation sessions, hackathons, or design thinking workshops), afternoon mini-sprint experience (1pm-5pm: run a compressed 4-hour mini-sprint so executives experience the methodology: use a real business challenge relevant to the audience — 'How might we reduce customer onboarding time from 30 days to 3 days?'; compress the full sprint week into 4 hours: 30 min — define the challenge and sprint questions; 30 min — rapid expert interview with a pre-briefed 'customer'; 30 min — individual Crazy 8s and solution sketching; 30 min — Art Museum and dot voting; 30 min — Supervote by a designated Decider; 30 min — storyboard the winning concept; 30 min — debrief and reflection; the mini-sprint lets executives feel the methodology — individual work, silent voting, Decider authority — rather than just hearing about it), addressing executive concerns (weave in executive-relevant insights: 'Notice how the Decider role prevents the committee paralysis many of you experience in your organizations'; 'The silent sketching produced more ideas in 30 minutes than a typical 2-hour meeting would'; 'The dot voting made preferences visible without the political dynamics of open debate'; these real-time observations connect the experience to executives' daily challenges)."
    weight: 0.35
    description: "Day1Curriculum"
  - type: llm_judge
    criteria: "Response designs Day 2 focused on strategic deployment — morning strategic application (9am-12pm: Day 2 shifts from experience to strategy; session 1 — when to sprint and when not to: provide a decision framework — sprint on high-uncertainty, high-impact initiatives; don't sprint on well-understood problems or pure execution challenges; include examples of inappropriate sprint uses — executives often want to sprint on strategy or budgeting, which don't fit the format; session 2 — the Decider masterclass: most executives will be Deciders, not facilitators; teach effective Decider behavior — commit to the process, make clear decisions, resist changing direction mid-sprint; role-play exercise — present 3 solution sketches and ask executives to make Supervote decisions, then discuss their reasoning; session 3 — building a sprint organization: how to find and develop facilitators, what organizational conditions enable successful sprints, common organizational barriers and how to remove them), afternoon implementation planning (1pm-4pm: each executive creates their company's sprint implementation plan; workshop format — executives work in industry groups of 5-6; each group identifies 1-2 sprint-worthy challenges at their companies; they draft sprint briefs using the template provided; peer review — groups critique each other's sprint briefs for specificity and sprint-suitability; individual reflection — each executive writes their 'first 30 days' action plan: who to appoint as facilitator, which challenge to sprint on first, how to pitch the sprint to their leadership team), closing session (4pm-5pm: panel discussion with 2-3 executives who have successfully implemented sprint programs at their companies; these are pre-arranged speakers who share honest experiences — what worked, what failed, what they'd do differently; Q&A with the panel and the instructor; final takeaway — each executive leaves with a printed 'Sprint Starter Kit' including sprint brief template, Decider guide, facilitator selection criteria, and ROI measurement framework)."
    weight: 0.35
    description: "Day2Curriculum"
  - type: llm_judge
    criteria: "Response addresses program design considerations — executive learning psychology (designs for how executives actually learn: executives are impatient with theory — lead with evidence and experience; they value peer learning — build in structured peer discussion, not just instructor lectures; they want applicable frameworks — every concept should come with a template or tool they can use Monday morning; they're competitive — use the mini-sprint's voting and Supervote to tap into competitive energy; they respect authority — bring credible speakers from companies they admire, not just academic researchers), skepticism management throughout (proactively addresses skepticism at multiple points: Day 1 morning — evidence-based opening dissolves the 'fluffy' perception; Day 1 afternoon — experiencing the sprint creates visceral understanding; Day 2 morning — strategic framing positions sprints as a business tool, not a design tool; Day 2 afternoon — implementation planning makes it concrete and actionable; the program should never apologize for or defend design thinking — it should present sprints as a validated business methodology with measurable outcomes), post-program support and measurement (extends value beyond the 2 days: provide a 90-day email sequence with sprint tips, case studies, and implementation reminders; create an alumni Slack channel or LinkedIn group for ongoing peer support; offer a 30-minute coaching call 60 days post-program to discuss implementation progress; track program impact — survey at 90 and 180 days: did participants launch sprints? what were the outcomes?; the business school partnership provides credibility — 'As taught at [top business school]' becomes a marketing asset for the sprint methodology)."
    weight: 0.30
    description: "ProgramDesign"
