meta:
  id: master-sprint-shift
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Master sprint shift — navigate a career-defining sprint engagement that tests every dimension of sprint mastery simultaneously"
  tags: [shift, master, career-defining, comprehensive, complex]

state: {}

trigger: |
  You're the world's foremost design sprint consultant,
  hired by a government health ministry to run a design
  sprint that will shape national healthcare policy. The
  challenge: designing the digital patient experience for
  a new national health system serving 50 million people.

  The stakes:
  - The sprint's recommendations will influence a $2B
    technology investment
  - The sprint is being observed by health ministry
    officials from 3 other countries considering similar
    systems
  - Media coverage is expected — this is a public interest
    project

  The complexities:
  1. The sprint team includes 10 people with radically
     different perspectives: a cabinet minister (Decider),
     2 hospital administrators, 2 practicing physicians,
     1 nurse, 1 patient advocate, 1 health IT expert,
     1 accessibility specialist, and 1 rural health worker

  2. Day 1 reveals a fundamental conflict: the cabinet
     minister wants a centralized digital system for
     efficiency; the rural health worker says 60% of the
     population has no reliable internet access

  3. Day 3, a major newspaper publishes a leaked internal
     document suggesting the health ministry has already
     chosen a technology vendor — implying the sprint is
     "theater" to legitimize a pre-made decision

  4. Day 4, three of the five recruited test "patients" turn
     out to be health ministry employees, not actual patients

  5. Day 5 morning, the cabinet minister says: "I need the
     results to support the centralized approach. The
     minister's reputation depends on it."

  Task: Navigate this career-defining engagement while
  maintaining methodological and ethical integrity.

assertions:
  - type: llm_judge
    criteria: "Response addresses the scale and diversity challenges — sprint for 50 million users (adapts the methodology for population-scale impact: the sprint can't design a complete national health system in 5 days — scope it to one critical patient journey; recommend focusing on the most universal healthcare interaction — scheduling a doctor's appointment, or accessing medical records; the selected journey should work for ALL segments: urban tech-savvy users, rural users without internet, elderly users, users with disabilities; the sprint produces design principles and a validated concept, not a complete system specification), managing 10 diverse perspectives (10 people is too many for a standard sprint but necessary for representativeness: consider splitting into 2 sub-teams of 5 that work on different aspects of the patient journey and reconvene for decisions; ensure the rural health worker, nurse, and patient advocate have equal voice to the cabinet minister and administrators — the sprint's silent exercises help equalize hierarchy; the diversity is a strength — this team represents the actual complexity of the healthcare system; the facilitator's role is to channel the diversity into productive outcomes, not suppress it for efficiency), the internet access conflict (this is the sprint's most important design constraint, not a problem to resolve: if 60% lack reliable internet, the digital system must include offline or low-connectivity modes; the sprint should explore hybrid solutions — digital for connected areas, SMS or phone-based for disconnected areas, in-person for areas with no technology; the cabinet minister's centralization goal and the rural worker's reality aren't necessarily contradictory — a centralized system can have distributed access points; reframe: 'How might we create a unified health system that works regardless of internet connectivity?')."
    weight: 0.35
    description: "ScaleAndDiversity"
  - type: llm_judge
    criteria: "Response handles the ethical crises — leaked vendor document (Day 3's newspaper article threatens the sprint's credibility: address it head-on with the team: 'I've seen the article. If a vendor has been pre-selected, this sprint cannot legitimately proceed. I need honest clarification from the cabinet minister'; if the vendor selection is real — the sprint must be reframed as 'designing the patient experience requirements that the selected vendor must meet' rather than 'selecting the approach'; if the vendor selection is not confirmed — make a public statement: 'The sprint is an independent process and its recommendations are based on patient needs and evidence, not pre-made decisions'; the facilitator's credibility and the sprint's legitimacy depend on transparency — covering this up would destroy both), fake test users (Day 4's ministry employees as test users is a critical integrity issue: immediately flag this to the team and the cabinet minister: 'Testing with internal employees produces invalid results; we need actual patients'; assess which test users are genuine — if 2 of 5 are real patients, conduct those tests and note the limitation; cancel the employee tests — their feedback will be biased by organizational knowledge and loyalty; attempt rapid recruitment of 3 replacement patients — contact patient advocacy groups, hospital waiting rooms, or community health centers; if replacement isn't possible, extend testing to the following week; document the incident in the sprint report — this transparency protects the sprint's credibility with the observing officials from other countries), the Day 5 pressure (the cabinet minister's request to guarantee results supporting centralization is the ultimate ethical test: respond clearly and privately: 'Minister, the sprint's value — and your reputation — depends on its credibility; if I guarantee a specific outcome, and it's discovered, it undermines the entire initiative; the strongest position for your reputation is a genuinely independent process with honest findings; if the results support centralization, that's powerful evidence; if they don't, better to learn now than after a $2B investment'; if the minister insists, the facilitator must consider whether to continue — facilitating a predetermined outcome violates the sprint's integrity and the facilitator's professional ethics; document the request in personal records)."
    weight: 0.35
    description: "EthicalCrises"
  - type: llm_judge
    criteria: "Response produces credible outcomes despite the challenges — sprint output for policy impact (the sprint must produce outputs appropriate for government decision-making: design principles for the national health system — accessibility, connectivity independence, multi-language support, privacy protection; a validated patient journey concept — tested with real patients showing specific insights about what works and what doesn't; an honest assessment of the centralization vs distributed design question — based on evidence from the sprint, not political preference; implementation recommendations — phased rollout starting with the most ready regions, technology requirements that don't lock in a specific vendor, accessibility standards that must be met), credibility with international observers (the 3 observing countries need to see a legitimate process: transparency about the challenges — acknowledge the leaked document, the test user issue, and how they were addressed; the sprint's handling of these crises actually demonstrates the methodology's integrity — 'We discovered testing issues and corrected them rather than proceeding with invalid data'; share the methodology adaptations — how the sprint was modified for government context, diverse stakeholders, and population-scale impact; the observing countries should see both the process and the outcomes — the process is as valuable as the results for countries considering their own sprints), facilitator's professional legacy (this engagement defines the facilitator's career: maintaining integrity under political pressure establishes reputation and credibility; the sprint report should be publishable — anonymized if necessary — as a case study in high-stakes sprint facilitation; the experience contributes to the field's understanding of how sprints work in government and public policy contexts; regardless of whether the cabinet minister follows the recommendations, the facilitator's integrity in the process is the lasting professional outcome)."
    weight: 0.30
    description: "CredibleOutcomes"
