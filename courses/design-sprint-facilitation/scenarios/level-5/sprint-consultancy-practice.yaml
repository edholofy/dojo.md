meta:
  id: sprint-consultancy-practice
  level: 5
  course: design-sprint-facilitation
  type: output
  description: "Sprint consultancy practice — build and scale a design sprint consulting business serving multiple clients and industries"
  tags: [consultancy, business, practice, clients, master]

state: {}

trigger: |
  You're launching a design sprint consultancy after 5 years
  of facilitating sprints in-house. A venture studio has
  offered you a partnership: they'll provide office space and
  initial clients if you can demonstrate a scalable model.

  Your situation:
  - Personal track record: 60+ sprints facilitated
  - You've trained 12 facilitators across 3 companies
  - Your methodology has been adapted for healthcare,
    fintech, and SaaS industries
  - Initial pricing: $25K per sprint (5 days of facilitation
    plus preparation and follow-up)
  - First 3 potential clients:
    * A seed-stage startup that needs product-market fit
      validation ($5M raised, 8 people)
    * A mid-market SaaS company struggling with churn ($50M
      ARR, 200 people)
    * A Fortune 100 financial institution exploring digital
      transformation (50,000+ employees)

  The venture studio partner asks: "How do you plan to scale
  this beyond yourself? And how do you deliver consistent
  quality across vastly different clients?"

  Task: Design the sprint consultancy business model,
  service offerings, and quality assurance framework.

assertions:
  - type: llm_judge
    criteria: "Response designs the business model and service tiers — tiered service offerings (creates offerings for different client needs: Sprint Essentials — $15K-$20K: standard 5-day sprint for teams with some sprint experience; includes pre-sprint preparation, 5-day facilitation, and a post-sprint handoff document; best for startups and SMBs with defined challenges; Sprint Premium — $25K-$35K: includes pre-sprint research, 5-day sprint, post-sprint design specifications, and 2-week implementation support; best for mid-market companies with complex challenges; Sprint Enterprise — $50K-$75K: includes stakeholder alignment workshop, sprint readiness assessment, customized sprint methodology, 5-day sprint, comprehensive handoff documentation, facilitator training for internal team, and 90-day implementation advisory; best for large organizations; Sprint Program — $100K-$200K annually: quarterly sprint cadence, facilitator training and certification, sprint methodology customization, ongoing advisory), revenue model (builds predictable revenue beyond one-off sprints: one-off sprints generate immediate revenue but are unpredictable; retainer clients — companies that run quarterly sprints with your facilitation and guidance; training revenue — facilitator certification programs for in-house teams; this creates a flywheel — facilitate sprints, train internal facilitators, maintain advisory relationships; target revenue mix — 40% one-off sprints, 30% retainers, 30% training), client-specific adaptation for the 3 prospects (tailors the approach: seed-stage startup — Sprint Essentials focused on PMF validation; the sprint should test the core value proposition with potential customers; at $5M raised, every week of clarity is valuable; keep costs appropriate for a startup budget; mid-market SaaS — Sprint Premium focused on churn root causes; bring data-driven approach using their analytics; the sprint's ROI is measurable against churn metrics; Fortune 100 — Sprint Enterprise with heavy stakeholder management; the sprint itself is a proof of concept for the methodology; success here leads to a multi-sprint program engagement; price reflects the organizational complexity and decision-making overhead)."
    weight: 0.35
    description: "BusinessModel"
  - type: llm_judge
    criteria: "Response addresses scaling and quality assurance — facilitator team development (scales beyond the founder: hiring criteria — look for people with facilitation instincts, not just sprint knowledge; strong candidates include experienced UX researchers, product managers, and management consultants; training program — 2-week intensive: sprint methodology, facilitation techniques, client management, industry adaptation; apprenticeship model — new facilitators co-facilitate 3 sprints before leading independently; your first hires should be 2 senior facilitators who can eventually manage their own client relationships), quality assurance framework (ensures consistent quality across facilitators and clients: pre-sprint — sprint brief review by a senior facilitator; standardized preparation checklist; client readiness assessment; during-sprint — daily facilitator journal documenting decisions and adaptations; mid-sprint check-in with a senior facilitator for complex engagements; post-sprint — client satisfaction survey; outcome tracking at 30, 60, and 90 days; facilitator self-assessment; the quality framework should be light enough not to burden facilitators but rigorous enough to catch quality issues early), intellectual property development (builds proprietary methodology assets: sprint methodology documentation — the consultancy's specific approach and adaptations; industry playbooks — healthcare sprint adaptations, fintech sprint adaptations, enterprise sprint adaptations; exercise library — custom exercises developed for specific challenge types; template library — Miro boards, Figma templates, testing protocols, handoff documents; these assets differentiate the consultancy from competitors and enable faster facilitator onboarding)."
    weight: 0.35
    description: "ScalingAndQuality"
  - type: llm_judge
    criteria: "Response builds the long-term consultancy strategy — market positioning (differentiates from competitors in the sprint consultancy space: don't compete on price — compete on outcomes; the consultancy's differentiator is measurable impact tracking — '87% of our sprint-validated features show positive metrics post-implementation'; publish case studies showing sprint ROI across industries; position as the 'evidence-based sprint practice' that goes beyond facilitation to business impact), client relationship management (builds lasting client relationships: the initial sprint is the start of a relationship, not a transaction; post-sprint implementation support increases the likelihood of sprint outcomes being built and measured; successful implementations lead to follow-up sprints and referrals; the consultancy should track and celebrate client wins — 'Our sprint with Company X led to a 30% improvement in user activation'; client success is the best marketing), growth and exit strategy (plans for long-term growth: year 1 — founder plus 2 facilitators, 15-20 sprints, $400K-$600K revenue; year 2 — 5 facilitators, 30-40 sprints plus training, $1M-$1.5M revenue; year 3 — 8-10 facilitators plus training team, $2M-$3M revenue; potential exit paths — acquisition by a design consultancy, merger with a product strategy firm, or build into a design operations consultancy that offers sprints alongside broader design strategy services; the venture studio partnership provides initial clients and credibility while the consultancy builds its reputation)."
    weight: 0.30
    description: "LongTermStrategy"
