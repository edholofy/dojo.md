meta:
  id: prototype-fidelity-strategy
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Prototype fidelity strategy — determine the right level of prototype fidelity for different sprint challenges and testing goals"
  tags: [prototype, fidelity, testing, strategy, advanced]

state: {}

trigger: |
  You're consulting for a company that runs frequent design
  sprints but keeps having prototype problems. They share
  three recent cases:

  Case 1: A B2B analytics dashboard sprint where the
  high-fidelity Figma prototype looked so polished that
  test users thought it was a real product. When they tried
  clicking on interactive elements that weren't built, they
  got frustrated. Users rated the "product" 2/5 because of
  the "bugs" (which were really just prototype limitations).

  Case 2: A mobile app onboarding sprint where the prototype
  was too low-fidelity — wireframes in grayscale. Test users
  couldn't tell what was a button vs. text, and the onboarding
  flow's emotional design (welcoming illustrations,
  encouraging copy) was impossible to evaluate without visuals.

  Case 3: A voice assistant sprint where the team built a
  Figma prototype for a voice-first experience. Users tapped
  screens when they should have been speaking. The prototype
  medium didn't match the product medium.

  Task: Create a prototype fidelity strategy framework for
  choosing the right approach for different sprint challenges.

assertions:
  - type: llm_judge
    criteria: "Response creates a fidelity decision framework — fidelity spectrum definition (defines the levels clearly: low fidelity — paper sketches, wireframes, grayscale; useful for testing flow and information architecture; medium fidelity — styled wireframes with real content, some color, basic interactions; useful for testing usability and comprehension; high fidelity — polished visuals, realistic data, smooth transitions; useful for testing emotional response and desirability; the right fidelity depends on what you're testing, not a universal best practice), decision criteria (provides criteria for choosing fidelity level: what question is the sprint answering? — if testing flow and logic, medium fidelity is sufficient; if testing emotional response or brand perception, high fidelity is needed; if testing a new interaction paradigm, match the medium; what's the product category? — consumer apps need higher fidelity because users judge by visual quality; B2B tools can use lower fidelity because users focus on functionality; enterprise users are more tolerant of prototype-looking prototypes), Case 1 diagnosis (the B2B dashboard prototype was too polished — high fidelity created false expectations: the fix — use a 'Goldilocks' fidelity for B2B: styled enough to be professional but clearly not a finished product; include a visible 'prototype' label; brief users explicitly: 'This is a prototype — some elements are clickable, some are not; focus on the concept, not the polish'; use realistic data but intentionally leave some UI elements in wireframe state to signal 'this is not done')."
    weight: 0.35
    description: "FidelityFramework"
  - type: llm_judge
    criteria: "Response diagnoses and fixes the three cases — Case 2 diagnosis (the mobile onboarding was too low-fidelity for an emotionally-driven experience: the fix — onboarding is inherently about first impressions and emotional design; you can't test 'does this feel welcoming?' with grayscale wireframes; the prototype needs at minimum: real copy with the actual tone and personality, key illustrations or visual elements that convey the emotional design, color that communicates the brand feeling; it doesn't need pixel-perfect design — but it needs enough emotional fidelity to test the emotional response), Case 3 diagnosis (the voice assistant used the wrong prototype medium entirely: the fix — for a voice-first experience, use a Wizard of Oz prototype: a human behind the scenes responds to voice commands as if they were the AI; the test user speaks naturally while a team member types responses that are played through a speaker; this tests the actual interaction model — voice in, voice out; alternatively, use a simple script-based approach where the facilitator plays the voice assistant role following a decision tree; Figma is the wrong tool for voice — the medium must match the experience), generalizable principles (extracts principles from all three cases: match prototype fidelity to the test question, not to the team's Figma skills; brief test users appropriately — set expectations about what's real and what's simulated; the prototype medium should match the product medium — screens for screen products, voice for voice products, physical props for physical products; when in doubt, err toward medium fidelity — it's the safest default that avoids both the too-polished and too-rough extremes)."
    weight: 0.35
    description: "CaseDiagnoses"
  - type: llm_judge
    criteria: "Response provides prototype planning for Thursday — time allocation by fidelity (Thursday is one day — fidelity choices affect what's achievable: low fidelity — can prototype 20+ screens, good for testing complex flows; medium fidelity — can prototype 10-15 screens, good for most sprints; high fidelity — can prototype 5-8 screens, only for emotional and visual testing; the prototype should cover the storyboard panels from Wednesday — typically 10-15 panels), prototyping tools by context (recommends tools matched to the sprint type: Figma — best for screen-based products at any fidelity level; Keynote/PowerPoint — surprisingly effective for quick clickable prototypes; paper and role-play — best for service design and physical products; video — effective for demonstrating complex interactions or future-state concepts; Wizard of Oz — essential for AI, voice, and intelligent system prototypes), prototype testing preparation (the prototype must be tested by someone who didn't build it: Thursday afternoon — the facilitator or a team member not involved in building does a 'dry run' test; identifies broken links, confusing flows, and missing screens; creates a test script that matches the prototype's capabilities — don't ask users to do things the prototype can't show; prepares a list of 'if the user clicks here, do this' instructions for prototype operators during Friday's testing)."
    weight: 0.30
    description: "PrototypePlanning"
