meta:
  id: sprint-with-real-data
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint with real data — integrate quantitative data, analytics, and research into each sprint day for evidence-based decisions"
  tags: [data, analytics, research, evidence-based, advanced]

state: {}

trigger: |
  You're facilitating a design sprint for an e-learning
  platform's course completion problem. Unlike previous
  sprints where the team relied on assumptions, this time
  you have extensive data:

  - Analytics: 73% of users start a course, 41% complete
    lesson 1, 12% reach lesson 5, 4% complete the full course
  - Heatmaps: users spend 80% of time on video content, 5%
    on quizzes, skip text content entirely
  - User interviews (20 interviews): top complaints are
    "courses are too long" (14/20), "I forget to come back"
    (11/20), "quizzes feel punitive" (9/20)
  - A/B test results: shorter lessons (5 min vs 20 min)
    improved completion by 34% but reduced comprehension
    scores by 18%
  - Competitor analysis: top 3 competitors average 8-minute
    lessons with completion rates of 15-25%

  Sprint team: 7 people (VP of Education as Decider, 1 data
  analyst, 1 instructional designer, 2 engineers, 1 product
  manager, you as facilitator).

  The data analyst says: "The data clearly shows we need
  shorter lessons. Why do we need a sprint? Just make
  lessons shorter."

  Task: Integrate data into the sprint process while
  maintaining the sprint's creative exploration value.

assertions:
  - type: llm_judge
    criteria: "Response integrates data into Monday's mapping — data-informed journey map (builds the journey map with actual data at each stage: 'Start course' — 73% reach this point; 'Complete lesson 1' — 41% reach this point, meaning 32% drop off during or after lesson 1; annotate each journey stage with the real dropout numbers; this transforms the abstract journey map into a quantitative funnel; the team immediately sees that the lesson 1-to-lesson 5 drop from 41% to 12% is the critical zone), data as expert interview (treats the data as one of Monday's expert inputs: the data analyst presents findings in a structured 20-minute session — funnel data, heatmap insights, and A/B test results; the instructional designer presents qualitative patterns from the 20 user interviews; the sprint team generates HMW notes from the data just like they would from expert interviews; 'HMW reduce the 29-percentage-point drop between lesson 1 and lesson 5?'), addressing the 'just make it shorter' argument (responds to the data analyst constructively: 'The data shows shorter lessons improve completion but reduce comprehension — that's a trade-off, not a solution; the sprint explores whether there's a design that improves completion WITHOUT sacrificing comprehension; maybe the answer is shorter lessons, or maybe it's better engagement mechanics, or better reminder systems; the sprint tests solutions with real users instead of choosing based on data alone; data tells us WHAT's happening but not always WHY or what the best solution is')."
    weight: 0.35
    description: "DataIntegration"
  - type: llm_judge
    criteria: "Response uses data throughout the sprint week — Tuesday sketching with data constraints (gives the team data-driven sketching constraints: 'Your solution must address the 41%-to-12% completion drop; the heatmap data shows users engage with video but skip text — your solution should account for content format preferences; the A/B test shows a tension between completion and comprehension — can your sketch resolve both?'; Lightning Demos should include products that solved similar data-informed challenges — Duolingo's streak mechanics, Khan Academy's mastery-based progression, Headspace's session length choices), Wednesday deciding with data (the Supervote should be informed by data: when reviewing solution sketches, the data analyst provides a 'data compatibility check' — does this solution align with what the data tells us about user behavior?; if a sketch proposes longer, more engaging lessons but the data shows users want shorter sessions, that tension should be discussed; the storyboard should include measurable moments — 'at this point, we expect to reduce the lesson 1 drop-off by X%'), prototype and testing with baselines (Thursday's prototype should enable measurement: design test tasks that mirror the analytics funnel — 'Start a course, complete lesson 1, decide whether to continue to lesson 2'; Friday's testing compares user behavior against the baseline data — do test users show the same dropout patterns or does the new design change their behavior?; include comprehension checks in testing — don't just measure completion but whether users actually learned; the sprint should produce data that directly compares to the existing analytics)."
    weight: 0.35
    description: "DataThroughoutSprint"
  - type: llm_judge
    criteria: "Response balances data with creative exploration — data as input, not answer (establishes the principle: data informs the sprint but doesn't dictate the solution; the sprint's value is exploring solutions the data alone wouldn't suggest; example — the data shows users skip text content, but the sprint might discover that interactive text with inline exercises works better than passive video; the sprint tests creative hypotheses against the data baseline), protecting creative space (ensures the data analyst doesn't shut down creative ideas prematurely: during Crazy 8s and solution sketching, all ideas are valid — even ones that seem to contradict the data; the data analyst's role shifts from 'telling us the answer' to 'helping us understand which assumptions we're challenging'; some of the best sprint outcomes come from solutions that reframe the data — maybe the 4% completion rate isn't the real problem; maybe the problem is that courses aren't designed for the way people actually learn), post-sprint data plan (after Friday's testing: define the analytics plan for measuring the sprint solution's impact; set up the A/B test comparing the current experience to the sprint-validated design; establish the comprehension vs completion metrics that the A/B test conflicted on; plan a 4-week measurement period before declaring success or failure; the sprint generates a hypothesis — 'this design will improve completion to 15% while maintaining comprehension' — that the A/B test validates)."
    weight: 0.30
    description: "DataCreativeBalance"
