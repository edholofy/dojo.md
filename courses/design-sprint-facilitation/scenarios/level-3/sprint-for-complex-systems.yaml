meta:
  id: sprint-for-complex-systems
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint for complex systems — adapt the design sprint for enterprise software, multi-user systems, and complex workflows"
  tags: [complex-systems, enterprise, multi-user, workflows, advanced]

state: {}

trigger: |
  You're asked to run a design sprint for an enterprise
  resource planning (ERP) system's procurement module. The
  challenge: the current procurement workflow takes 47 clicks
  and involves 4 different user roles (Requester, Approver,
  Procurement Officer, Finance Controller) across 3 different
  software systems.

  Complexity factors:
  - The workflow has 12 decision points and 6 exception paths
  - Different user roles see different interfaces
  - Regulatory requirements mandate specific approval chains
  - The system integrates with SAP, Salesforce, and a custom
    inventory system
  - Users range from tech-savvy procurement officers to
    executives who just need to click "approve"

  Sprint team: 8 people (VP of Operations as Decider,
  1 procurement officer, 1 finance controller, 2 engineers,
  1 product manager, 1 designer, you as facilitator).

  The VP says: "A regular sprint prototype can't show all
  4 user roles and 12 decision points. How does this work?"

  Task: Adapt the design sprint methodology for this
  multi-role, complex-workflow challenge.

assertions:
  - type: llm_judge
    criteria: "Response adapts Monday mapping for complex systems — multi-role journey mapping (instead of a single linear journey map, creates a role-based map: map the procurement workflow from each role's perspective — the Requester's journey from 'I need something' to 'it arrived'; the Approver's journey from 'notification received' to 'approved or rejected'; map the handoff points between roles — these are usually where the 47 clicks accumulate; identify which of the 12 decision points are mandatory vs organizational habit), complexity reduction strategy (helps the team identify the sprint's focus: you can't sprint on the entire 47-click workflow in one week; use Monday's mapping to identify the highest-pain segment — likely the requester-to-approver handoff or the multi-system data entry; apply the 80/20 rule — which 20% of the workflow causes 80% of the frustration?; the sprint target should be one critical segment with 1-2 user roles, not the entire end-to-end flow), expert interviews for domain knowledge (the procurement officer and finance controller are both sprint team members AND domain experts: structure interviews to extract workflow knowledge — 'Walk us through the last purchase order you processed, step by step'; identify which of the 47 clicks are regulatory requirements vs legacy UI design; separate 'must have for compliance' from 'always been done this way' — the sprint can challenge the latter but must respect the former)."
    weight: 0.35
    description: "ComplexMapping"
  - type: llm_judge
    criteria: "Response adapts sketching and prototyping for multi-role systems — focused sketching (Tuesday's sketching targets the sprint focus area, not the whole system: if the focus is the requester-to-approver handoff, all sketches address that specific interaction; but sketches must show both sides — what the requester sees AND what the approver sees; Crazy 8s can be adapted — '4 ideas for the requester experience, 4 ideas for the approver experience' or '8 ideas for the handoff moment'), storyboard adaptation (Wednesday's storyboard becomes a multi-lane storyboard: lane 1 — what the Requester sees and does; lane 2 — what the Approver sees and does; lane 3 — what happens in the system between them; this is more complex than a standard sprint storyboard but essential for multi-role systems; keep the storyboard to 10-12 panels maximum — complexity should be in the interaction design, not the storyboard length), prototype strategy (Thursday's prototype needs to handle multiple roles: build 2 connected Figma prototypes — one for the Requester flow, one for the Approver flow; the Requester prototype ends with 'request submitted' and the Approver prototype begins with 'notification received'; use realistic data — fake purchase orders, realistic dollar amounts, actual approval categories; the prototype should feel like a real system, not a consumer app — enterprise users expect density and functionality over visual polish)."
    weight: 0.35
    description: "MultiRoleSketchingAndPrototype"
  - type: llm_judge
    criteria: "Response adapts Friday testing for complex systems — multi-role testing approach (Friday testing must cover multiple perspectives: test with 5 users total but split by role — 3 Requesters and 2 Approvers; each Requester test takes 45-60 minutes — longer than consumer tests because the workflow is complex; each Approver test takes 30 minutes — they have a simpler but critical interaction; consider running a linked test — one person submits a request and another person approves it — to test the handoff experience end-to-end), realistic test scenarios (create test scenarios that reflect real procurement situations: 'You need to order 50 laptops for the new engineering team — go through the process'; 'You received an approval request for $25,000 in office furniture — review and decide'; include an exception path — 'The request was rejected; now resubmit with the corrected budget code'; the scenarios should test whether the redesigned workflow actually reduces the click count and time-on-task), success metrics for complex systems (define what success looks like: click count reduction — from 47 to under 15 for the target workflow; time-on-task — can a requester complete a standard purchase order in under 5 minutes?; error rate — does the new design reduce approval rejections due to incorrect form submission?; satisfaction — do both requesters and approvers feel the process is faster and clearer?; compare to the current system during testing — 'How does this compare to your current process?')."
    weight: 0.30
    description: "ComplexTesting"
