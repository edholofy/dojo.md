meta:
  id: multi-sprint-program
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Multi-sprint program — design and manage a connected series of sprints addressing a complex product initiative"
  tags: [program, multi-sprint, series, connected, advanced]

state: {}

trigger: |
  Your company is rebuilding its entire customer platform —
  a 12-month initiative affecting onboarding, dashboard,
  billing, support, and account management. The VP of Product
  wants to use design sprints but says: "We can't sprint on
  everything. How do we decide what to sprint on, in what
  order, and how do the sprints connect?"

  Current situation:
  - 5 major product areas need redesign
  - 3 product teams (each with their own PM and engineers)
  - 1 design team shared across all product teams
  - Customer research shows the biggest pain points are:
    onboarding (NPS -12), billing (NPS +5 but high support
    ticket volume), and support experience (NPS -30)
  - Engineering is already building the new dashboard based
    on stakeholder requirements (no sprint was run)
  - The company has only done 2 design sprints before

  Task: Design a multi-sprint program that addresses the
  platform rebuild strategically.

assertions:
  - type: llm_judge
    criteria: "Response designs a strategic sprint program — sprint prioritization (doesn't sprint on everything — selects based on risk, uncertainty, and impact: sprint on support experience first — NPS -30 is the biggest pain point and the team doesn't know the right solution; sprint on onboarding second — NPS -12 with high uncertainty; billing may not need a full sprint — NPS +5 suggests the experience is acceptable, the support ticket volume might be a UX fix addressable with an LDJ; dashboard — flag that building without user validation is risky; recommend a rapid validation sprint or user testing of current plans), sprint sequencing and dependencies (designs the order strategically: Sprint 1 — support experience, because it's highest pain and the insights may inform other areas; Sprint 2 — onboarding, because new users encounter onboarding before support; Sprint 3 — billing UX improvements based on support ticket analysis; the sprints should be spaced 3-4 weeks apart to allow for synthesis, design specs, and team recovery; each sprint's findings feed into the next), cross-sprint learning (builds connections between sprints: insights from the support sprint will reveal onboarding gaps — users contacting support often have onboarding issues; the billing sprint should incorporate support ticket data gathered during Sprint 1; create a shared insight repository accessible to all 3 product teams; after each sprint, hold a 30-minute cross-team briefing so all teams benefit from the learnings)."
    weight: 0.35
    description: "StrategicProgram"
  - type: llm_judge
    criteria: "Response addresses resource management and team logistics — design team capacity (the shared design team is the bottleneck: 1 designer per sprint as core team, plus the facilitator; between sprints, designers need time for post-sprint design specs — each sprint generates 1-2 weeks of follow-up design work; schedule sprints so the design team isn't running sprints back-to-back — minimum 3-week gap between sprints), sprint team composition (varies the team per sprint based on the topic: support sprint — include a support agent, a customer success manager, and an engineer familiar with the support tools; onboarding sprint — include a growth PM, a data analyst with activation data, and a new hire who recently experienced onboarding; billing sprint — include a finance team member, a billing engineer, and a customer who's had billing issues; the Decider may change per sprint based on the product area), facilitator development (with only 2 prior sprints, the company needs facilitator capacity: the primary facilitator runs Sprints 1-2; train a second facilitator by having them co-facilitate Sprint 2; the second facilitator leads Sprint 3 independently; this builds organizational sprint capability beyond one person)."
    weight: 0.35
    description: "ResourceManagement"
  - type: llm_judge
    criteria: "Response creates program governance and measurement — program-level metrics (defines success metrics across the sprint program: individual sprint success — did each sprint produce validated, buildable solutions?; implementation rate — what percentage of sprint outputs get built within 3 months?; impact metrics — NPS improvements in each area 6 months after implementation; program efficiency — is each successive sprint faster and higher quality as the team gains experience?), dashboard intervention (addresses the dashboard being built without a sprint: recommends a rapid validation — take the current dashboard designs and test them with 5 users this week; if testing reveals major issues, pause development and run a sprint; if testing validates the direction, continue building but incorporate any usability improvements; this is a diplomatic approach — doesn't criticize the decision to build without a sprint but introduces validation before it's too late), stakeholder communication (designs a program communication cadence: pre-sprint — brief stakeholders on the sprint's purpose and expected outcomes; post-sprint — share results within 48 hours with all stakeholders, including teams not in the sprint; monthly — program update showing sprint outcomes, implementation progress, and metric changes; quarterly — executive review of the sprint program's overall ROI and impact on the platform rebuild timeline)."
    weight: 0.30
    description: "GovernanceAndMeasurement"
