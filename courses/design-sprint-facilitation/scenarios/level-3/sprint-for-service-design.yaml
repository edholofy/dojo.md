meta:
  id: sprint-for-service-design
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint for service design — adapt the design sprint for services involving physical touchpoints, human interactions, and multi-channel experiences"
  tags: [service-design, physical, multi-channel, touchpoints, advanced]

state: {}

trigger: |
  A regional bank asks you to run a design sprint for their
  new account opening experience. Unlike typical digital
  product sprints, this service spans multiple channels:

  - Digital: website, mobile app, email communications
  - Physical: branch visit, ID verification, document signing
  - Human: teller interactions, phone support, relationship
    manager meetings

  Current experience: opening an account takes 3-5 days
  across 4 touchpoints (website research → branch visit →
  document processing → account activation email). Competitor
  neobanks offer 10-minute fully digital account opening.

  Complications:
  - Regulatory requirements mandate in-person ID verification
    for certain account types
  - Branch staff are resistant to change — "our personal
    service is what differentiates us"
  - The digital team and branch operations team rarely
    collaborate and have different KPIs

  Sprint team: 8 people (Chief Digital Officer as Decider,
  1 branch manager, 1 teller, 1 digital product manager,
  1 compliance officer, 1 designer, 1 engineer, you as
  facilitator).

  Task: Adapt the design sprint for this multi-channel
  service design challenge.

assertions:
  - type: llm_judge
    criteria: "Response adapts the sprint for service design — service journey mapping on Monday (creates a journey map that spans channels: map the current 3-5 day experience across digital, physical, and human touchpoints; identify channel transitions — when does the customer move from website to branch? what happens at each handoff?; mark the pain points at each transition — the gap between 'I started online' and 'now I have to visit a branch' is likely the biggest friction point; compare to the neobank 10-minute experience as a benchmark, noting what regulatory constraints prevent full digital), service blueprint integration (goes beyond a standard journey map to create a service blueprint: frontstage — what the customer sees and does at each touchpoint; backstage — what bank staff do behind the scenes to support each step; support processes — what systems, documents, and approvals are needed; this blueprint reveals the invisible complexity — the customer sees 4 touchpoints but staff execute 15+ backstage steps; the sprint target should focus on reducing backstage complexity, not just improving the frontstage), reframing the challenge (helps the team define a sprint question that bridges digital and physical: not 'how do we make a digital account opening' — that ignores regulatory constraints and branch value; better — 'how might we reduce account opening from 5 days to same-day while maintaining the personal service that differentiates us?'; this frames the challenge as optimization, not elimination of the branch experience)."
    weight: 0.35
    description: "ServiceDesignAdaptation"
  - type: llm_judge
    criteria: "Response handles the digital-physical prototype challenge — multi-channel prototype strategy (Thursday's prototype must represent a multi-channel experience: prototype the digital touchpoints in Figma — the website research, mobile application start, email communications; prototype the physical touchpoints differently — create a role-play script for the branch visit with props like sample documents and ID verification process; prototype the human touchpoints with conversation scripts — what does the teller say? what does the relationship manager discuss?; the prototype is part digital mockup, part theatrical script), Friday testing for services (adapt testing to evaluate the full service: the test user walks through the entire journey in sequence — start on the website prototype, then role-play the branch visit with a team member playing the teller, then receive the simulated email confirmation; measure the entire journey time and satisfaction at each transition; compare the experience to the current 3-5 day process — does same-day feel achievable?; test both the digital ease and the personal service quality), branch staff involvement (the branch manager and teller on the sprint team are critical: during sketching, they contribute ideas about how the branch experience could evolve — maybe the branch visit becomes a consultation rather than paperwork processing; during prototyping, they role-play the new branch interaction to test if it feels natural; their buy-in during the sprint determines whether the solution is adopted by branch staff after the sprint)."
    weight: 0.35
    description: "MultiChannelPrototype"
  - type: llm_judge
    criteria: "Response manages the organizational tensions — digital vs branch alignment (the different KPIs create competing incentives — digital wants speed and conversion, branches want relationship depth; the sprint must produce a solution both teams can support; use Monday's goal setting to find shared metrics — 'What if we measured time-to-account AND customer satisfaction together?'; the sprint outcome should show that faster doesn't mean impersonal), change management through the sprint (uses the sprint as a change management tool: the branch manager and teller experience the new process firsthand during prototyping and testing; seeing customers respond positively to a faster, more personal experience overcomes resistance better than any presentation; if the teller helps design the new interaction, they own the change; the sprint becomes 'something we created together' rather than 'something digital imposed on us'), regulatory integration (the compliance officer ensures the solution is viable: during Monday mapping, clearly mark which steps are regulatory requirements — in-person ID verification for certain account types is non-negotiable; during Wednesday's storyboard, the compliance officer reviews for regulatory gaps; the sprint might discover creative compliance solutions — video ID verification, notarized digital signatures, or streamlined in-branch verification that takes 5 minutes instead of 30; the compliance constraint drives innovation rather than blocking it)."
    weight: 0.30
    description: "OrganizationalTensions"
