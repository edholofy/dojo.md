meta:
  id: sprint-user-recruitment-testing
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint user recruitment and testing — plan and execute Friday's user testing from recruitment through synthesis"
  tags: [testing, recruitment, user-research, friday, advanced]

state: {}

trigger: |
  You're running a design sprint for a meal planning app
  targeting busy parents. It's Monday and you need to plan
  Friday's user testing. The challenges:

  Recruitment constraints:
  - The target user is "parents with kids under 12 who cook
    at least 3 times a week" — specific and hard to recruit
  - The company has no existing user panel or research
    recruitment process
  - Friday testing slots are 9am, 10am, 11am, 1pm, 2pm
    (5 users needed)
  - Budget: $500 total for user incentives
  - The UX researcher is junior and has never run sprint
    testing before

  Testing concerns:
  - The prototype will be a Figma mobile app — how do you
    test a mobile prototype on a laptop screen?
  - The PM wants to add a survey after each test session
    "to get quantitative data"
  - Two sprint team members want to sit in on all 5 tests
    and "help explain the prototype" to users

  Task: Create the complete user recruitment and testing
  plan for Friday.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive recruitment plan — screening criteria (defines specific screener questions: 'Do you have children under 12?' — must be yes; 'How many times per week do you cook dinner at home?' — must be 3+; 'Do you currently use any meal planning tools?' — capture but don't disqualify; 'Are you available Friday [date] between 9am-2pm?' — must be yes for at least one slot; avoid leading questions like 'Would you like a meal planning app?' — this biases recruitment), recruitment channels (identifies realistic channels for this specific persona: parenting Facebook groups and subreddits — post a friendly recruitment message; local mom/dad groups, school parent networks, or community centers; ask team members for referrals — 'Do you know any parents who cook regularly?'; Craigslist or UserTesting.com as backup; recruit 7-8 people for 5 slots — always have 2-3 backups for no-shows; start recruitment immediately on Monday — don't wait until Wednesday), incentive strategy ($500 for 5 users: $75-100 per participant for a 60-minute session is appropriate for this demographic; offer Amazon gift cards — universally useful for parents; for backup participants who aren't needed, offer a $25 thank-you for being available; communicate incentives clearly in the recruitment message — 'Receive a $100 Amazon gift card for 1 hour of your time')."
    weight: 0.35
    description: "RecruitmentPlan"
  - type: llm_judge
    criteria: "Response designs the testing protocol — test session structure (60 minutes per session: 5 minutes — introduction, consent, and rapport building with warm-up questions about cooking habits; 5 minutes — context setting without leading: 'We're going to show you a prototype of an app; it's not finished and some things won't work; we want your honest reaction'; 30 minutes — task-based testing with 3-4 core tasks: 'Plan meals for this week', 'Add a recipe you found online', 'Adjust the plan when a child has a playdate'; 10 minutes — open-ended questions: 'What did you find most useful?', 'What confused you?', 'Would you use this?'; 5 minutes — debrief and incentive; 5 minutes — team note-taking break between sessions), mobile prototype on laptop (addresses the mobile-on-laptop testing issue: use Figma's device preview mode to display the prototype at phone dimensions on the laptop screen; or better — mirror the Figma prototype to an actual phone using Figma Mirror; if using a laptop, frame the prototype on screen at phone size with a phone bezel image around it; brief users: 'Imagine you're using this on your phone — tap where you would tap on your phone screen'; accept that laptop testing of mobile prototypes is imperfect but still valuable), managing the PM's survey request (redirects diplomatically: 'Quantitative data from 5 users isn't statistically significant — a survey would give us false confidence in numbers too small to be meaningful; instead, capture qualitative patterns: did 4/5 or 5/5 users have the same reaction? that's more valuable than survey scores from 5 people; if quantitative validation is needed, plan a follow-up survey with 50-100 users after the sprint using the insights from testing')."
    weight: 0.35
    description: "TestingProtocol"
  - type: llm_judge
    criteria: "Response addresses team dynamics and synthesis — observer management (handles the team members who want to 'help explain': absolutely no one explains the prototype to the user — that defeats the purpose of testing; if you have to explain it, the design failed and that's valuable information; observers must be silent — they can take notes but cannot speak, gesture, or react; set up a separate observation room if possible — team watches a live stream or screen share; if observers must be in the room, they sit behind the user and take notes silently; brief the team before testing: 'Your job is to watch and learn, not to help or defend'), coaching the junior researcher (prepares the junior UX researcher: provide a written test script with exact questions and prompts; do a practice run Thursday afternoon — the researcher conducts the test with a team member acting as user; teach key facilitation techniques: 'ask follow-up questions with tell me more about that', 'don't say good job or great after user actions — stay neutral', 'if the user is stuck, wait 10 seconds before offering a hint, then note the struggle'; have the facilitator or a senior team member observe the first test and provide feedback before session 2), synthesis process (after all 5 tests: team gathers for a 60-90 minute synthesis session; each observer shares their top 3 observations — not opinions, observations; organize observations on a board: patterns that appeared across 4-5 users are strong signals; patterns from 2-3 users are worth noting; patterns from 1 user are individual preferences; create a clear 'validated / invalidated / needs more research' summary; end with action recommendations — what to build, what to change, what to cut)."
    weight: 0.30
    description: "TeamAndSynthesis"
