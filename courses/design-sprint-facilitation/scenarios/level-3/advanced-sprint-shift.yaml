meta:
  id: advanced-sprint-shift
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Advanced sprint shift — navigate a complex multi-day crisis requiring advanced facilitation across sprint methodology, team dynamics, and strategic thinking"
  tags: [shift, advanced, multi-day, crisis, complex]

state: {}

trigger: |
  You're facilitating a design sprint for a major airline's
  rebooking experience during flight disruptions. On Thursday
  (Prototype day), a cascade of problems hits:

  1. The prototype team discovers that the storyboard from
     Wednesday requires 25 screens — too many for a one-day
     prototype. The storyboard tried to cover rebooking for
     delayed flights, cancelled flights, and missed
     connections — three separate user flows.

  2. Thursday at 11am, the airline's PR department calls:
     a major flight disruption happened this morning and
     it's trending on social media. The Head of Customer
     Experience (your Decider) wants to pull the sprint team
     to help with the real crisis. "The sprint can wait —
     we have actual customers stranded right now."

  3. The junior designer building the prototype just told
     you they've never used Figma and have been "figuring
     it out" for the past 2 hours. They've completed 2 of
     the planned 25 screens.

  4. Two of your five Friday test users are airline employees
     recruited by the PM. The UX researcher flags that
     employees will test differently than real passengers.

  Task: Navigate this Thursday crisis and ensure the sprint
  produces a valid outcome.

assertions:
  - type: llm_judge
    criteria: "Response addresses the prototype scope and designer capability — storyboard triage (25 screens is too many — the storyboard was too ambitious: identify the single most important user flow — likely cancelled flight rebooking since it's the most stressful and the real-world disruption today makes it topical; reduce to 8-10 screens covering only the cancelled flight rebooking flow; the delayed flight and missed connection flows become 'future sprint' topics; this decision should take 15 minutes maximum — every minute of discussion is a minute lost from prototype building), designer capability crisis (the junior designer's Figma inexperience is a critical Thursday problem: option 1 — swap roles: if someone else on the team knows Figma, they become the prototyper and the junior designer supports with content and assets; option 2 — use a simpler tool: switch to Keynote/PowerPoint, which is faster to learn and sufficient for a click-through prototype; option 3 — pair prototyping: an experienced team member drives Figma while the junior designer directs the design decisions; choose the option that produces a testable prototype by end of day — this is not the time for learning Figma), realistic prototype timeline (with a late start and scope reduction: 11am-12pm — finalize the reduced storyboard and assign prototype tasks; 12-1pm — lunch and asset gathering; 1-5pm — 4 hours of focused prototype building for 8-10 screens; this is tight but achievable if the scope stays disciplined; no visual polish — functional flow only; test the prototype with a team member at 4:30pm to catch issues before Friday)."
    weight: 0.35
    description: "PrototypeScopeAndDesigner"
  - type: llm_judge
    criteria: "Response handles the real-world crisis and Decider departure — reframing the crisis as an opportunity (the real-world flight disruption is actually valuable for the sprint: 'The exact problem we're sprinting on is happening right now — this is real-time user research'; suggest that 1-2 team members monitor social media and customer service channels to gather real customer reactions — this becomes data for Friday's testing context; the sprint becomes more relevant, not less, because of the real crisis), negotiating Decider availability (the Decider wants to leave — negotiate a middle ground: 'Can you give us 2 hours this afternoon to finalize the prototype direction? The sprint's solution could help with exactly this kind of crisis in the future'; if the Decider must leave entirely: get their input on the reduced storyboard scope before they go — 'We're focusing on cancelled flight rebooking; do you agree?'; designate a proxy for any remaining Thursday decisions; schedule a 15-minute Friday morning check-in so the Decider can review the prototype before testing begins; emphasize that the sprint outcome directly addresses the crisis they're managing), team morale and energy (the team is facing a demoralizing Thursday — real crisis outside, prototype crisis inside: be transparent — 'We have challenges, but here's the plan to produce something great by Friday'; celebrate the reduced scope as smart strategy, not failure — 'We're testing the most critical flow and doing it well, not spreading thin'; keep energy up with a working lunch and clear milestones — 'By 3pm we need 5 screens done, by 5pm we need 8')."
    weight: 0.35
    description: "CrisisAndDecider"
  - type: llm_judge
    criteria: "Response fixes the test user problem and ensures valid Friday outcomes — employee test user replacement (2 of 5 test users being airline employees is a validity problem: employees know the rebooking system from the inside — they'll test differently than stranded passengers; keep 1 employee as a supplementary test: their insider perspective can identify operational issues the prototype doesn't address; recruit 2 replacement users today — check if the UX researcher has contacts or use a rapid recruitment channel; if replacements aren't possible by Friday: test with the 3 valid users and schedule 2 additional tests for Monday; 3 genuine users are better than 5 mixed users for sprint decision-making), adapted Friday schedule (with a reduced prototype and potential Decider constraints: 9:00 — Decider reviews the prototype; 9:30 — first test session; 10:30, 11:30, 1:00, 2:00 — remaining sessions; if only 3 valid users are available, use the extra time for deeper interviews; the employee test can happen last as a 'bonus' perspective; synthesis at 3:00 — the team reviews all sessions and identifies patterns), redefining sprint success (manages expectations for a compromised sprint: the sprint will validate one critical flow — cancelled flight rebooking — instead of three flows; this is still a successful sprint if the tested flow is validated or invalidated with clear evidence; the real-world disruption happening simultaneously makes the findings immediately actionable — 'We can show leadership a validated rebooking solution while they're dealing with exactly this problem'; frame the remaining flows as a follow-up sprint or rapid design exercise, not as a failure of this sprint)."
    weight: 0.30
    description: "TestUsersAndOutcome"
