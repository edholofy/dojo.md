meta:
  id: sprint-facilitation-anti-patterns
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint facilitation anti-patterns — identify and correct common facilitation mistakes that derail design sprints"
  tags: [anti-patterns, mistakes, facilitation, correction, advanced]

state: {}

trigger: |
  You're mentoring a new sprint facilitator who just ran
  their first 3 sprints. They share their experience and
  you notice several anti-patterns:

  Sprint A: "The team loved brainstorming together so I let
  them do group sketching instead of individual Crazy 8s.
  The ideas were all similar and the loudest person dominated.
  The final solution was basically the PM's idea from day 1."

  Sprint B: "The Decider couldn't make it for the Supervote
  so I had the team vote democratically. They couldn't agree
  and we spent 2 hours debating. We ended up combining 3
  solutions into one Frankenstein prototype."

  Sprint C: "Friday testing went great — all 5 users loved
  the prototype! But 3 months later the engineering team
  built something different because 'the prototype was
  unrealistic.' The sprint felt like a waste."

  The facilitator asks: "What am I doing wrong? The team
  seems to enjoy the sprints but the outcomes aren't great."

  Task: Diagnose the anti-patterns, explain why they're
  harmful, and provide corrections for future sprints.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses Sprint A's anti-pattern — group vs individual ideation (identifies the core mistake: replacing individual silent sketching with group brainstorming violates one of the sprint's most important principles; research shows that group brainstorming produces fewer and less diverse ideas than individual ideation; the sprint's silent sketching exercises exist specifically to prevent groupthink and social loafing; when the loudest person dominates, the team gets one person's ideas dressed up as group consensus), why individual work matters (explains the science behind the sprint's structure: individual Crazy 8s and solution sketches force everyone to think independently before seeing others' ideas; this produces genuine diversity — each person brings their unique perspective; the 'Art Museum' on Wednesday is where the group reviews individual work silently before voting; the voting mechanism then surfaces the best ideas regardless of who proposed them; the PM's day-1 idea winning isn't inherently bad — but it should win because the team independently converged on it, not because the PM advocated loudest), correction for future sprints (specific guidance: never replace individual exercises with group exercises — they serve different purposes; if the team enjoys collaboration, channel it into appropriate moments — expert interviews, storyboard discussion, test synthesis; use a timer and enforce silence during Crazy 8s and solution sketching; remind the team: 'The sprint uses silence strategically — your individual thinking is the most valuable input this week')."
    weight: 0.35
    description: "SprintAAntiPattern"
  - type: llm_judge
    criteria: "Response diagnoses Sprint B's anti-pattern — democratic voting vs Decider authority (identifies the mistake: the sprint isn't a democracy — it's a structured process with a designated Decider; democratic voting leads to compromise solutions because no one has authority to make a clear choice; the 'Frankenstein prototype' — combining 3 solutions — is the classic result of design by committee; each solution was probably coherent individually but the combination lost the coherence), why the Decider role exists (explains the purpose: the Decider prevents decision paralysis — someone must choose and the sprint designates this person in advance; the Supervote gives the Decider a structured way to choose informed by the team's dot votes; the Decider can overrule the popular vote — this is by design; without a Decider, teams default to consensus which produces mediocre compromises; the Decider's authority is what makes the sprint fast — 'we disagree but the Decider chose direction A, so we prototype direction A'), correction for future sprints (specific guidance: never run a sprint without a Decider who can attend key decision moments — at minimum Wednesday's Supervote; if the Decider can't attend, they must delegate authority to one person — not the whole team; the backup Decider must have real authority to make the call; if no delegation happens, pause the sprint — better to reschedule the Supervote than to design by committee; brief the Decider before the sprint on the importance of their role and time commitment)."
    weight: 0.35
    description: "SprintBAntiPattern"
  - type: llm_judge
    criteria: "Response diagnoses Sprint C's anti-pattern — the handoff gap (identifies the disconnect: the sprint produced a validated prototype but failed to translate it into a buildable plan; '5/5 users loved it' is a great sprint outcome but it's not enough — the sprint output must include what to build, what's feasible, and what's the implementation priority; the engineering team built something different because they weren't adequately involved in or informed about the sprint's decisions), why sprints fail post-sprint (explains the common failure mode: the sprint is not just 5 days of design — it's 5 days of design plus a handoff process; many teams treat Friday afternoon as the end, but the real work begins: translating the prototype into specifications, prioritizing features by feasibility and impact, aligning engineering on what to build; if engineering wasn't in the sprint or doesn't understand the user evidence, they'll default to building what they think is right), correction for future sprints (specific guidance: always include at least one engineer in the sprint team — they provide feasibility input during sketching and own the technical translation post-sprint; create a sprint-to-development handoff document within 1 week of the sprint ending; the handoff should include: what was validated and the evidence, what was invalidated, a prioritized feature list, and a development recommendation; schedule a sprint debrief with the full engineering team — share the test recordings and let them hear user feedback directly; track implementation fidelity — is what gets built aligned with what was validated?), meta-lesson for the facilitator (the facilitator's role extends beyond the 5 sprint days: their responsibility includes ensuring sprint outcomes are actionable and acted upon; if sprints consistently fail in implementation, the facilitator needs to own the handoff process; the facilitator should also retrospect on each sprint's implementation — was it built? did it work? this feedback loop improves both the sprint process and the facilitator's skill)."
    weight: 0.30
    description: "SprintCAntiPattern"
