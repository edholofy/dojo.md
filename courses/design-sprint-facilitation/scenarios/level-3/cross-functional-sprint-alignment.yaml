meta:
  id: cross-functional-sprint-alignment
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Cross-functional sprint alignment — align engineering, design, product, and business during a high-stakes sprint"
  tags: [cross-functional, alignment, engineering, business, advanced]

state: {}

trigger: |
  You're facilitating a design sprint for a fintech company's
  new investment product. The sprint is high-stakes — the CEO
  is personally invested and the product could represent 30%
  of next year's revenue. The cross-functional tensions are
  already visible on Monday morning:

  - The Head of Engineering says: "Whatever you design, it
    needs to work within our compliance framework. I've seen
    sprints produce beautiful designs that are impossible to
    build securely."
  - The Head of Design says: "The last product we shipped was
    an engineering-led ugly duckling. This time, user
    experience comes first."
  - The Head of Compliance says: "I'm here to make sure you
    don't design something that violates securities
    regulations. I have veto power."
  - The CEO says: "I want something innovative — not another
    boring fintech app."

  Sprint team: 8 people (CEO as Decider, Head of Engineering,
  Head of Design, Head of Compliance, 2 product managers,
  1 UX researcher, you as facilitator).

  Task: Facilitate alignment across these competing priorities
  while maintaining sprint structure.

assertions:
  - type: llm_judge
    criteria: "Response establishes productive tension management — Monday goal setting (uses the opening exercises to surface and resolve tensions: during goal setting, each person's concerns become explicit sprint questions — 'Can we design an investment experience that's both innovative and compliant?'; 'Can we create a product that's technically feasible within the existing compliance framework?'; these questions frame the tensions as design challenges rather than interpersonal conflicts; the journey map should include compliance checkpoints and technical constraints as explicit elements, not afterthoughts), role clarification (clarifies sprint roles without undermining organizational authority: the CEO is the Decider — they make the final Supervote call; Compliance has advisory authority — they can flag regulatory issues but the Decider makes the final call; the Head of Engineering provides feasibility input during Wednesday's review — not veto power during sketching; the Head of Design participates as a team member, not as the design authority; the sprint equalizes hierarchy — everyone sketches, everyone votes, the process decides), managing the compliance concern (the Head of Compliance claiming 'veto power' needs careful handling: acknowledge the importance — 'Compliance is non-negotiable and the sprint will respect that'; integrate compliance as a constraint, not a roadblock — 'Let's identify the key regulations during Monday's mapping so all solutions account for them'; schedule a compliance check during Wednesday's storyboard review — before prototyping, Compliance reviews the proposed solution for regulatory issues; this gives Compliance a structured role rather than ad-hoc vetoes)."
    weight: 0.35
    description: "TensionManagement"
  - type: llm_judge
    criteria: "Response adapts sprint exercises for high-stakes cross-functional dynamics — expert interviews with internal tension (Monday's expert interviews become a controlled environment for each perspective: the Head of Engineering presents technical constraints as facts, not barriers — 'Here's what our compliance framework requires'; Compliance presents the regulatory landscape — 'These are the 3 regulations that apply to investment products'; the UX researcher presents user research — 'Here's what users want from an investment app'; the HMW notes will naturally capture the intersection of innovation, feasibility, and compliance), Tuesday sketching with constraints (provides clear sketching guidance that incorporates all perspectives: 'Your solution must be innovative enough to excite the CEO, feasible within the current tech stack, and compliant with securities regulations — that's the creative challenge'; the constraints make better solutions, not limited ones; Crazy 8s forces rapid ideation that bypasses the analytical objections; solution sketches must include a 'feasibility and compliance note' panel alongside the user flow), Wednesday decision with full alignment (the Art Museum, voting, and Supervote become the alignment mechanism: everyone sees all solutions — engineering sees design quality, design sees technical thinking, compliance sees user-first approaches; the Supervote by the CEO resolves competing priorities with a single decision; after the Supervote, do a 15-minute 'red flag check' — Engineering and Compliance identify any showstoppers in the chosen direction before storyboarding begins)."
    weight: 0.35
    description: "AdaptedExercises"
  - type: llm_judge
    criteria: "Response manages the CEO's involvement and innovation expectation — CEO as Decider dynamics (having the CEO as Decider is both an advantage and a risk: advantage — decisions stick, no one overrides the sprint outcome; risk — the team may self-censor around the CEO, sketching what they think the CEO wants rather than their best ideas; mitigation — emphasize that sketching is anonymous and voting is silent; the CEO should not share their preferred direction before sketching begins; during expert interviews, the CEO should listen, not lead), innovation within constraints (addresses the CEO's 'not another boring fintech app' request: innovation in fintech often comes from simplifying complexity — the most innovative thing might be making investing feel simple and safe, not flashy; use Lightning Demos to show innovative examples from outside fintech — how does Duolingo make learning feel fun? how does Headspace make meditation accessible? these analogies spark innovation without violating compliance; the sprint's value is testing whether users respond to the innovation, not just whether the team thinks it's cool), post-sprint stakeholder management (after the sprint: present results to the broader leadership team with all sprint participants present — Engineering, Design, and Compliance should jointly present, showing alignment; the sprint prototype becomes a shared artifact that all functions contributed to; if the test results are positive, the cross-functional alignment from the sprint carries into development; if results are negative, the team learned together — no one function is blamed for the failure)."
    weight: 0.30
    description: "CEOAndInnovation"
