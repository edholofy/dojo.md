meta:
  id: sprint-for-hardware-physical
  level: 3
  course: design-sprint-facilitation
  type: output
  description: "Sprint for hardware and physical products — adapt the design sprint when the solution involves physical objects, spaces, or tangible experiences"
  tags: [hardware, physical, tangible, adaptation, advanced]

state: {}

trigger: |
  A smart home device company asks you to run a design sprint
  for their next product — a smart kitchen display that helps
  with cooking. Unlike software sprints, the product involves:

  - Physical form factor: screen size, mounting options,
    placement in the kitchen
  - Hardware interactions: touch screen, voice commands,
    physical buttons, gesture control
  - Environmental factors: kitchen heat, moisture, grease,
    viewing distance while cooking
  - Software interface: recipes, timers, grocery lists,
    video calls, music playback

  The team has only done software design sprints before.
  The Head of Hardware Engineering says: "You can't prototype
  hardware in one day. This sprint thing won't work for us."

  Sprint team: 8 people (VP of Product as Decider, 1 hardware
  engineer, 1 industrial designer, 1 software designer,
  2 software engineers, 1 product manager, you as facilitator).

  Task: Adapt the design sprint for this hardware-software
  product challenge.

assertions:
  - type: llm_judge
    criteria: "Response adapts the sprint for hardware constraints — Monday mapping for physical products (the journey map must include the physical context: map the cooking journey — from deciding what to cook through prep, cooking, plating, and cleanup; identify when and how the user interacts with the device at each stage: hands full of food, voice commands needed, viewing from 6 feet away while stirring; environmental context becomes a design constraint — where in the kitchen is the device? can you see it from the stove?; expert interviews should include someone who cooks daily and can describe their kitchen workflow in detail), sketching physical and digital together (Tuesday's sketching must address both form factor and software: solution sketches should show the physical device in context — what does it look like mounted on a wall? sitting on the counter?; sketches must include the screen interface AND the physical interaction model — which features are touch? which are voice? are there physical buttons for timers?; Crazy 8s can alternate — 4 ideas for the physical form, 4 ideas for the key software interaction; the industrial designer and software designer should cross-pollinate — each sketches in the other's domain), addressing the 'can't prototype hardware in a day' objection (the hardware engineer is right that you can't build a physical prototype in one day — but you can simulate one: use a tablet mounted in a cardboard or foam core housing to simulate the device's form factor; the tablet runs the Figma prototype for the software interface; test voice interactions with a Wizard of Oz approach — a team member behind the scenes responds to voice commands; this 'hardware simulation' is enough to test the concept with users even though the industrial design isn't final)."
    weight: 0.35
    description: "HardwareAdaptation"
  - type: llm_judge
    criteria: "Response designs the hardware-specific prototype and testing — Thursday prototype strategy (creates a multi-component prototype: component 1 — physical mockup using a tablet in a custom housing; use foam core, 3D-printed shell, or even a modified tablet stand to approximate the form factor; the size and placement should match the intended product dimensions; component 2 — Figma prototype for the screen interface covering the core cooking scenario; component 3 — voice interaction script for Wizard of Oz testing; component 4 — printed cards showing the device in different kitchen placements for placement preference testing), Friday testing in context (test in an environment that approximates a kitchen: if possible, test in an actual kitchen — the company's office kitchen or a test kitchen; if not possible, set up a simulation — counter surface, stove placeholder, ingredients; give test users a real cooking scenario: 'You're making pasta with this recipe on the device — walk us through the experience'; test voice commands while the user's hands are 'busy' with prep — simulated by having them hold objects; test screen readability from 3 and 6 feet away; test the physical form factor — 'Where would you put this in your kitchen? Can you reach it? Can you see it?'), what the sprint can and can't validate (sets honest expectations: the sprint CAN validate — the core software interaction model, voice vs touch preferences, screen content and information hierarchy, placement preferences, the cooking workflow integration; the sprint CANNOT validate — industrial design aesthetics, material quality, actual hardware performance, long-term durability, manufacturing feasibility; the sprint produces a 'concept validation' that informs the hardware development process, not a final product design)."
    weight: 0.35
    description: "HardwarePrototypeAndTest"
  - type: llm_judge
    criteria: "Response connects the sprint to hardware development — sprint-to-hardware-development pipeline (the sprint outputs feed into a longer hardware development cycle: sprint output — validated interaction model, user-preferred form factor concept, software interface direction; next steps — industrial design exploration based on sprint learnings, engineering feasibility assessment of the validated concept, software development can begin on the interface while hardware is designed; the sprint is step 1 of a 12-18 month hardware development cycle, not the only step), hardware-specific follow-up (recommends post-sprint activities specific to hardware: build higher-fidelity physical prototypes based on the validated concept — 3D printed shells, working screen prototypes; conduct in-home testing — place a semi-functional prototype in real kitchens for a week; test environmental durability — how does the device handle steam, grease, heat?; the sprint identifies the right concept to invest in — the follow-up validates the physical execution), team alignment across hardware and software (uses the sprint to align the hardware and software teams: during the sprint, both teams sketch and design together — breaking down the typical silo between hardware and software development; the shared sprint experience creates a common vision; post-sprint, maintain this alignment with regular cross-functional reviews; the sprint's validated concept becomes the north star that keeps hardware and software development aligned)."
    weight: 0.30
    description: "HardwareDevelopmentPipeline"
