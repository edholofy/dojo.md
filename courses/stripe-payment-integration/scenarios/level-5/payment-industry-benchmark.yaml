meta:
  id: payment-industry-benchmark
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Create a payment systems benchmark study — design and execute a comparative analysis of payment infrastructure across B2B SaaS companies"
  tags: [stripe, benchmark, industry-study, comparative, best-practices, research, master]

state: {}

trigger: |
  You're a payment systems researcher at a technology advisory firm.
  A consortium of 20 B2B SaaS companies has funded a $600K benchmark
  study on payment infrastructure. Each company wants to know: "How
  does our payment system compare to peers?"

  Participating companies (anonymized):
  - 5 companies: $10-50M ARR (early growth)
  - 8 companies: $50-200M ARR (scaling)
  - 5 companies: $200M-1B ARR (mature)
  - 2 companies: $1B+ ARR (enterprise)

  Data collected per company:
  - Payment processor(s) used and volume per processor
  - Authorization rate by card type, country, and payment method
  - Effective processing cost (total fees / total volume)
  - Chargeback/dispute rate
  - Failed payment recovery rate
  - Time from payment to cash (settlement speed)
  - Payment system uptime
  - Payment engineering team size
  - Compliance posture (PCI level, SOX if applicable)
  - Technology stack (processor, gateway, fraud tool, billing system)
  - Use of AI/ML in payment optimization

  Preliminary findings:
  - Authorization rates range from 84% to 97%
  - Processing costs range from 1.8% to 3.4%
  - Only 30% use more than one processor (no failover for 70%)
  - AI/ML adoption for payments: 15% (3 of 20 companies)
  - Median payment engineering team: 4 engineers (range: 0.5 to 35)
  - Companies using Stripe exclusively: 65% (13 of 20)
  - Stripe + secondary processor: 20% (4 of 20)
  - Non-Stripe primary: 15% (3 of 20)

  Tasks:
  1. Design and present the benchmark study findings. Include: the
     methodology, key findings across 10 dimensions (auth rate, cost,
     reliability, security, technology, team, fraud, recovery, speed,
     AI adoption), the maturity model (what differentiates top quartile
     from bottom), and actionable recommendations by company size.

  2. Create the individual benchmark scorecard format. Design: how each
     company sees their metrics vs. peer average, size cohort, and top
     quartile. Include: the radar chart dimensions, the gap analysis,
     the improvement priority matrix (high impact + low effort first),
     and the estimated ROI of closing each gap.

  3. Write the "State of Payment Infrastructure in B2B SaaS" executive
     summary for public release. Include: the industry trends, the
     maturity curve, predictions for 2027-2030, and the call to action
     for engineering leaders.

assertions:
  - type: llm_judge
    criteria: "Benchmark findings are analytically rigorous — uses the 20-company dataset across 10 dimensions, identifies meaningful patterns by company size, maturity model differentiates top from bottom performers, and recommendations are size-appropriate"
    weight: 0.35
    description: "Rigorous benchmark findings"
  - type: llm_judge
    criteria: "Scorecard format is individually useful — each company can see relative position clearly, radar chart dimensions are meaningful, gap analysis prioritizes high-impact improvements, and ROI estimates help justify investment"
    weight: 0.35
    description: "Individually useful scorecard"
  - type: llm_judge
    criteria: "Executive summary is publishable — industry trends are well-supported, maturity curve adds context, predictions are bold but defensible, and the call to action gives engineering leaders concrete next steps"
    weight: 0.30
    description: "Publishable executive summary"
