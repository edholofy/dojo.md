meta:
  id: comprehensive-payment-system
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Comprehensive payment system engagement — serve as the Chief Payment Officer building a world-class payment infrastructure from scratch"
  tags: [stripe, comprehensive, CPO, infrastructure, transformation, executive, master]

state: {}

trigger: |
  You've been hired as the first Chief Payment Officer (CPO) at
  "OmniCommerce" — a rapidly growing e-commerce platform ($3B GMV,
  growing 40% YoY) that's preparing for an IPO in 18 months. The CEO
  created this role because: "Payments are 3% of our GMV in fees and
  our biggest operational risk. We need a world-class payment system."

  Current state:
  - Payment processors: Stripe (US), Adyen (EU), 3 local processors
    (Brazil, India, Japan)
  - Authorization rate: 88% (costing $360M in lost sales at $3B GMV)
  - Processing costs: $87M/year (2.9% effective rate)
  - Fraud losses: $15M/year
  - 5 payment-related outages in the past year (72 hours total downtime)
  - Payment engineering: 28 engineers, no dedicated payment org
  - No payment analytics or business intelligence
  - PCI DSS Level 1 certification overdue by 6 months
  - No SOX controls on payment processes

  Your 18-month mandate (board-approved):
  1. Authorization rate: 88% → 96% ($240M in recovered sales)
  2. Processing costs: 2.9% → 2.3% ($18M annual savings)
  3. Fraud rate: 0.5% → 0.15% ($10.5M annual savings)
  4. System uptime: 99.9% → 99.99%
  5. PCI DSS Level 1 certification achieved
  6. SOX-ready payment controls for IPO
  7. Real-time payment analytics for the board

  Resources:
  - Budget: $25M over 18 months
  - Headcount: Authority to grow from 28 to 60 engineers
  - Executive support: Direct report to CEO, board presentation quarterly

  Tasks:
  1. Create the 18-month strategic plan. Include: the 4 phases
     (stabilize, optimize, scale, IPO-ready), the 10 key initiatives
     with owners and milestones, the technology roadmap (platform
     consolidation, ML fraud system, payment orchestration), the org
     design (60-person payment org structure), and the budget
     allocation across phases.

  2. Write your first 100 days plan. Include: the diagnostic (what to
     measure immediately), the quick wins (what delivers visible impact
     in 90 days), the critical hires (first 5 roles), the PCI
     certification emergency plan, and the stakeholder management
     approach (CEO, CFO, CTO, board).

  3. Design the "Payment Excellence Operating System" — the complete
     system that sustains payment excellence beyond your tenure. Include:
     the governance model, the metrics framework (OKRs for payments),
     the continuous improvement mechanism, the vendor management
     process, the incident management system, and how the system
     scales from $3B to $10B GMV.

assertions:
  - type: llm_judge
    criteria: "Strategic plan is comprehensive and credible — 4 phases with realistic timelines, 10 initiatives cover auth rate, costs, fraud, uptime, compliance, and analytics; budget allocation across $25M is justified; and there's a clear path to each of the 7 board targets"
    weight: 0.35
    description: "Comprehensive credible strategic plan"
  - type: llm_judge
    criteria: "First 100 days is pragmatic — diagnostic focuses on the most impactful metrics, quick wins are achievable and visible (auth rate improvements, cost negotiation), first 5 hires are the right roles, PCI emergency plan is urgent, and stakeholder management is politically aware"
    weight: 0.35
    description: "Pragmatic first 100 days"
  - type: llm_judge
    criteria: "Operating system is sustainable — governance ensures continuity, metrics framework is measurable, continuous improvement is built-in, incident management prevents future outages, and the system scales from $3B to $10B GMV"
    weight: 0.30
    description: "Sustainable payment operating system"
