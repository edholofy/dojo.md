meta:
  id: payment-ecosystem-strategy
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Design a payment ecosystem strategy — architect the payment infrastructure for a platform company that must serve merchants, consumers, and financial partners simultaneously"
  tags: [stripe, ecosystem, platform, strategy, merchants, embedded-finance, master]

state: {}

trigger: |
  You're the Chief Payment Architect at "PlatformX" — a vertical
  SaaS company ($5B GMV, 50,000 merchant customers) that is
  transforming from a software company into a payments company.
  The board has approved the strategy: "Payments will become 40%
  of our revenue within 3 years (currently 8%)."

  Current state:
  - Software revenue: $400M ARR (growing 20%)
  - Payment revenue: $35M (payment facilitation fees, growing 60%)
  - Using Stripe Connect with Express accounts for merchants
  - Merchants process $5B through the platform
  - Take rate: 0.7% (Stripe charges 2.9%, you mark up 0.5%, Stripe
    takes 2.4% → net 0.7% to you after Stripe's cut)

  Board targets (3-year):
  - Payment revenue: $35M → $180M
  - GMV: $5B → $15B
  - Take rate: 0.7% → 1.2%
  - New revenue streams: lending, insurance, treasury

  Strategic options on the table:
  1. Stay on Stripe Connect but negotiate better economics and add
     Stripe Treasury, Stripe Capital, and Stripe Issuing
  2. Become a Payment Facilitator (PayFac) — register with card
     networks directly, control the merchant underwriting, take a
     larger share of the processing fee
  3. Hybrid approach — use Stripe for processing but build PayFac
     capabilities for underwriting, risk, and merchant onboarding
  4. Build embedded finance products (lending, insurance, bank
     accounts) on top of the payment platform regardless of the
     processing choice

  Constraints:
  - Becoming a full PayFac requires $15-25M investment and 12-18
    months to achieve compliance
  - Card network registration requires sponsoring bank relationship
  - State money transmitter licenses needed for 50 US states
  - PCI DSS Level 1 as a service provider (not just merchant)
  - Merchants expect instant onboarding (currently 2 minutes via
    Stripe Express) — cannot regress

  Tasks:
  1. Evaluate the 4 strategic options. For each: the revenue model
     (how you get to $180M), the investment required (upfront and
     ongoing), the timeline to revenue, the risk profile (regulatory,
     operational, competitive), and the impact on merchant experience.
     Make a recommendation with a clear justification.

  2. Design the payment ecosystem architecture. Include: the merchant
     onboarding system (KYC/KYB, underwriting, risk scoring), the
     transaction processing flow (authorization, settlement, funding),
     the embedded finance stack (lending risk model, insurance
     distribution, treasury/banking-as-a-service), and the data
     platform that powers cross-selling (merchant payment data →
     lending pre-qualification → insurance pricing).

  3. Write the 3-year financial model and board presentation. Include:
     the revenue build-up by product line (payment facilitation,
     lending, insurance, treasury), the investment schedule ($M by
     quarter), the unit economics at scale (cost to serve per
     merchant, LTV:CAC for financial products), and the competitive
     moat analysis (why this strategy creates defensibility).

assertions:
  - type: llm_judge
    criteria: "Strategic evaluation is thorough — all 4 options are analyzed with realistic revenue paths to $180M, investment figures are credible, risk profiles differentiate meaningfully, and the recommendation is well-justified with clear trade-offs"
    weight: 0.35
    description: "Thorough strategic evaluation"
  - type: llm_judge
    criteria: "Ecosystem architecture is technically sound — merchant onboarding handles KYC/KYB at scale, transaction flow covers authorization through funding, embedded finance products have viable risk models, and the data platform creates genuine cross-sell capability"
    weight: 0.35
    description: "Technically sound ecosystem architecture"
  - type: llm_judge
    criteria: "Financial model is investor-grade — revenue build-up by product is detailed, unit economics are realistic, investment schedule shows clear milestones, and the competitive moat analysis articulates genuine defensibility"
    weight: 0.30
    description: "Investor-grade financial model"
