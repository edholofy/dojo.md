meta:
  id: payment-ai-optimization
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Apply AI to payment optimization — use machine learning to optimize authorization rates, reduce fraud, and predict payment failures"
  tags: [stripe, AI, ML, optimization, authorization, prediction, master]

state: {}

trigger: |
  You're the Head of Payment Intelligence at a subscription SaaS company
  ($500M ARR, 200K subscribers). You're building an AI-powered payment
  optimization system that goes beyond Stripe Radar and Smart Retries.

  Current metrics:
  - First-attempt authorization rate: 91%
  - Retry recovery rate: 52%
  - Overall success rate: 95.7%
  - Involuntary churn (failed payment → lost customer): 4.3% annually
  - Fraud rate: 0.3% (Radar is good but misses friendly fraud)
  - Revenue at risk from payment failures: $21.5M/year

  AI optimization opportunities:
  1. Optimal retry timing: Predict the best time to retry each failed
     payment based on customer behavior, bank patterns, and historical
     data
  2. Payment method recommendation: Suggest the best payment method
     for each customer (card vs. ACH vs. wallet) based on past success
  3. Pre-failure prediction: Identify subscriptions likely to fail
     before the billing date (expiring cards, low balance patterns)
  4. Dynamic routing: Route transactions to the processor most likely
     to approve based on card type, amount, and geography
  5. Fraud scoring enhancement: Layer custom ML on top of Radar for
     friendly fraud and ATO detection

  Available data:
  - 3 years of transaction history (12M transactions)
  - Customer behavioral data (login times, product usage, engagement)
  - Bank identification numbers (BINs) and issuer data
  - Decline codes with timestamps
  - Customer support interactions
  - Stripe Radar risk scores

  Constraints:
  - Models must be explainable (regulators require it)
  - Real-time scoring: <50ms per transaction
  - Training data is imbalanced (95% success vs. 5% failure)
  - Must comply with fair lending regulations (cannot use protected
    attributes)

  Tasks:
  1. Design the ML system architecture for payment optimization.
     Include: the feature engineering pipeline (what features to extract
     from transaction, customer, and bank data), the model architecture
     for each of the 5 use cases, the real-time scoring infrastructure,
     and the model training/deployment pipeline.

  2. Address the technical challenges. For each: the class imbalance
     problem (sampling strategies, loss functions), the explainability
     requirement (SHAP values, feature importance), the latency
     constraint (model serving optimization), and the fairness testing
     (detecting and mitigating bias in payment decisions).

  3. Build the business case. Calculate: the expected revenue recovery
     from each AI optimization (retry timing, pre-failure, dynamic
     routing), the cost of building vs. buying (build the ML system
     vs. use Stripe's Adaptive Acceptance), and the 3-year ROI
     projection with different improvement scenarios.

assertions:
  - type: llm_judge
    criteria: "ML architecture covers all 5 use cases — each has appropriate features, model type, and scoring approach; real-time infrastructure achieves <50ms latency; training pipeline handles 12M transactions with proper train/test split"
    weight: 0.35
    description: "Complete ML payment architecture"
  - type: llm_judge
    criteria: "Technical challenges are properly addressed — class imbalance uses appropriate techniques (SMOTE, focal loss), explainability uses SHAP or similar, latency optimization is specific (model size, caching, batching), and fairness testing detects protected attribute proxies"
    weight: 0.35
    description: "Properly addressed ML challenges"
  - type: llm_judge
    criteria: "Business case is data-driven — revenue recovery estimates for each optimization are calculated from the provided data ($21.5M at risk), build vs. buy analysis is balanced, and 3-year ROI shows realistic improvement scenarios"
    weight: 0.30
    description: "Data-driven AI business case"
