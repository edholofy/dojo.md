meta:
  id: master-stripe-shift
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Master Stripe shift — handle a Stripe account migration under regulatory pressure, a payment data breach, and a board-level cost crisis simultaneously"
  tags: [stripe, migration, data-breach, board-crisis, regulation, shift-simulation, master]

state: {}

trigger: |
  You're the CPO of a global fintech company ($2B GMV) in the final
  months before IPO. Three existential payment crises converge.

  Crisis 1 — Regulatory-Forced Processor Change:
  Your payment license regulator in the EU has notified you: "Your
  current payment processing arrangement does not comply with PSD2
  Article 21 requirements for safeguarding. You must demonstrate
  compliant safeguarding within 60 days or your license will be
  suspended."

  The issue: Stripe holds customer funds in a pooled account, which
  the regulator argues doesn't meet the safeguarding requirements for
  your specific license type. You need to either: (a) restructure
  your Stripe arrangement with segregated accounts, (b) move EU
  payment processing to a processor with compliant safeguarding, or
  (c) negotiate a regulatory exemption.

  EU volume: $600M/year (30% of total). License suspension = 30% of
  revenue gone.

  Crisis 2 — Payment Data Breach:
  Your security team discovered that an attacker exploited a
  vulnerability in your webhook processing endpoint. The attacker
  crafted malicious webhook events that bypassed signature verification
  (they exploited a timing-based side channel in your verification
  code). Through this, they:
  - Extracted 45,000 customer email addresses and last-4 card digits
  - Triggered $180,000 in fraudulent refunds to attacker-controlled
    accounts
  - The breach persisted for 12 days before detection

  GDPR requires 72-hour notification. PCI DSS requires immediate
  investigation and potential notification to card brands. Your IPO
  counsel says: "This could delay or kill the IPO."

  Crisis 3 — Board Cost Challenge:
  Your board member (former PayPal executive) has challenged your
  payment processing costs in writing: "At $2B GMV, you're paying
  $58M in processing fees (2.9%). At our scale, this should be under
  $40M (2.0%). Every basis point above 2.0% is destroying shareholder
  value. I want a plan to reach 2.0% before IPO or an explanation
  of why it's impossible."

  The $18M gap is real. Your current Stripe contract was negotiated
  at $500M volume. You're now at $2B but haven't renegotiated.

  Tasks:
  1. Address the regulatory crisis. Analyze the three options (Stripe
     restructure, processor change, regulatory exemption). For each:
     the feasibility within 60 days, the cost, the risk, and the
     impact on the IPO timeline. Make a recommendation and write the
     implementation plan.

  2. Address the data breach. Write: the 72-hour GDPR notification,
     the PCI DSS incident response (including card brand notification),
     the IPO disclosure assessment (material vs. non-material breach),
     the technical fix for the webhook vulnerability, and the customer
     communication. Address the $180K in fraudulent refunds.

  3. Address the board cost challenge. Write: the cost reduction plan
     to reach 2.0% (or the analysis showing why 2.0% is unrealistic
     and what IS achievable), the Stripe renegotiation strategy, the
     alternative processor evaluation, and the board response memo
     that is honest about what's achievable and by when.

assertions:
  - type: llm_judge
    criteria: "Regulatory response is pragmatic — analyzes all 3 options with realistic 60-day feasibility, makes a defensible recommendation, implementation plan is achievable, and IPO impact is assessed honestly"
    weight: 0.35
    description: "Pragmatic regulatory response"
  - type: llm_judge
    criteria: "Breach response is legally and technically sound — GDPR notification meets 72-hour requirement, PCI response follows forensic investigation procedure, IPO materiality assessment is honest, webhook fix addresses the timing side-channel, and fraudulent refund recovery is addressed"
    weight: 0.35
    description: "Sound breach response"
  - type: llm_judge
    criteria: "Board cost response is honest and strategic — analyzes the path to 2.0% (or explains why an alternative target is more realistic), Stripe renegotiation leverages the $2B volume, alternative processors are evaluated, and the board memo balances ambition with honesty"
    weight: 0.30
    description: "Honest strategic cost response"
