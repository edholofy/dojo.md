meta:
  id: payment-regulatory-landscape
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Navigate the global payment regulatory landscape — advise a multinational fintech on compliance strategy across PSD2, PSD3, open banking, AML directives, and emerging crypto payment regulations"
  tags: [stripe, regulation, PSD2, PSD3, compliance, open-banking, AML, global, master]

state: {}

trigger: |
  You're a payment regulatory strategist advising "GlobalPay" — a
  payments infrastructure company ($12B in annual transaction volume)
  that operates across 35 countries. The CEO has asked you to prepare
  the company for the next 5 years of payment regulation.

  Current regulatory challenges:
  1. PSD3/PSR transition (EU): The European Commission's proposed
     PSD3 and Payment Services Regulation will replace PSD2. Key
     changes include: mandatory IBAN verification, stricter SCA
     requirements, open banking API standards, and new liability
     rules for unauthorized transactions. Expected enforcement: 2027.

  2. Open banking expansion: UK's Open Banking is maturing (4M users).
     Brazil's Open Finance (Pix integration), India's UPI/Account
     Aggregator framework, and Australia's CDR are creating a
     fragmented global open banking landscape. GlobalPay must decide
     how to participate in each market.

  3. AML/CFT evolution: The EU's new AML Authority (AMLA) centralizes
     AML supervision. The US is updating FinCEN's CDD rule. FATF's
     updated guidance on virtual assets requires monitoring of crypto
     payment rails. Transaction monitoring must evolve.

  4. Crypto payment regulation: MiCA (EU Markets in Crypto-Assets) is
     live. US regulation is fragmented (state-by-state). Singapore's
     PS Act covers crypto payments. GlobalPay's merchants are asking
     for stablecoin acceptance — but the regulatory risk is high.

  5. Data localization: India requires payment data stored locally.
     Russia's data localization is extreme. Indonesia, Vietnam, and
     Nigeria have varying requirements. This impacts GlobalPay's
     cloud infrastructure strategy.

  Current state at GlobalPay:
  - Licensed as a PI (Payment Institution) in the EU, EMI in UK
  - Uses Stripe as primary processor in 15 countries
  - Transaction monitoring: rule-based system, 85% false positive rate
  - Compliance team: 40 people (struggling to keep up)
  - Technology stack: monolithic payment service, single AWS region
  - No crypto payment capabilities
  - Open banking: basic PSD2 compliance only

  Tasks:
  1. Write the 5-year regulatory roadmap. For each regulatory domain
     (PSD3, open banking, AML, crypto, data localization): the key
     changes and their timeline, the impact on GlobalPay's business
     model and technology, the compliance investment required, and
     the strategic opportunities (not just compliance costs). Map
     dependencies between regulatory changes.

  2. Design the regulatory technology (RegTech) architecture. Include:
     the transaction monitoring upgrade (ML-based, reduce false
     positives from 85% to 30%), the KYC/KYB orchestration system
     (multi-jurisdiction, reusable verification), the regulatory
     reporting automation (35 countries, different formats), the
     data localization strategy (multi-region infrastructure), and
     the compliance-as-code framework (regulatory rules as testable,
     deployable code).

  3. Write the board strategy memo. Include: the regulatory risk
     heat map (which regulations pose existential vs. manageable
     risk), the investment case ($X in compliance investment prevents
     $Y in potential fines and enables $Z in new revenue), the
     competitive positioning (how regulatory capability becomes a
     moat), and the crypto payment recommendation (enter, wait,
     or partner — with clear rationale).

assertions:
  - type: llm_judge
    criteria: "Regulatory roadmap is comprehensive and current — covers PSD3, open banking in multiple markets, AMLA/AML evolution, MiCA/crypto, and data localization; timelines are realistic; impacts on business model are specific; and strategic opportunities are identified alongside compliance costs"
    weight: 0.35
    description: "Comprehensive regulatory roadmap"
  - type: llm_judge
    criteria: "RegTech architecture is technically viable — ML monitoring with realistic false positive targets, KYC orchestration handles multi-jurisdiction, regulatory reporting covers 35 countries, data localization strategy is architecturally sound, and compliance-as-code is a practical framework"
    weight: 0.35
    description: "Viable RegTech architecture"
  - type: llm_judge
    criteria: "Board memo is strategically valuable — risk heat map prioritizes correctly, investment case has credible numbers, competitive moat argument is genuine, and crypto recommendation is nuanced with clear rationale"
    weight: 0.30
    description: "Strategically valuable board memo"
