meta:
  id: payment-public-company
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Manage payments for a public company — design payment systems that meet SOX compliance, revenue recognition, and investor reporting requirements"
  tags: [stripe, public-company, SOX, revenue-recognition, audit, investor, master]

state: {}

trigger: |
  You're the VP of Payment Systems at a newly public SaaS company
  ($800M ARR, IPO 6 months ago). Your payment infrastructure must now
  meet public company standards. The audit committee flagged several
  concerns in your first quarterly review.

  Audit committee findings:
  1. Revenue recognition timing: Your system recognizes subscription
     revenue at payment receipt rather than over the service period
     (violates ASC 606). Impact: $12M in revenue needs restatement.
  2. Payment controls: No segregation of duties for refund processing.
     Any developer can issue refunds via Stripe API with no approval
     workflow.
  3. Data integrity: No formal reconciliation between Stripe and your
     general ledger. Discrepancies discovered at quarter-end take 2
     weeks to resolve.
  4. Change management: Payment system changes go to production without
     formal change advisory board approval. A recent webhook change
     caused $200K in missed revenue.
  5. Disaster recovery: No documented DR plan for payment systems. RTO
     and RPO are undefined.
  6. Vendor risk: Stripe is a single point of failure for $800M in
     revenue. No formal vendor risk assessment has been completed.

  Additional requirements from your CFO:
  - Quarterly close process for payment data must complete in 3 days
     (currently takes 12)
  - SOX 404 internal controls over financial reporting must be documented
  - External auditors need read access to payment system audit logs
  - Board reporting requires real-time revenue metrics (not 2-week lag)

  Tasks:
  1. Design the SOX-compliant payment control framework. For each audit
     finding: define the control objective, the control activity (what
     process ensures compliance), the evidence of control operation, and
     the testing procedure for auditors. Include: refund approval
     workflow with dollar thresholds, reconciliation automation,
     change management process, DR plan with RTO/RPO, and vendor risk
     assessment.

  2. Redesign the revenue recognition system. Include: how to extract
     Stripe subscription and payment data for ASC 606 compliance, the
     deferred revenue calculation (annual subscriptions recognized
     monthly), the journal entry automation, and the integration with
     your ERP. Fix the $12M restatement issue.

  3. Build the quarterly close acceleration plan. Reduce from 12 days
     to 3 days. Include: the automated reconciliation system (Stripe
     ↔ bank ↔ GL daily instead of monthly), the pre-close checklist,
     the real-time revenue dashboard for the board, and the auditor
     access portal.

assertions:
  - type: llm_judge
    criteria: "SOX control framework addresses all 6 findings — each has a specific control objective, activity, evidence, and test procedure; refund approval workflow includes dollar thresholds, reconciliation is automated, change management is formalized, DR has specific RTO/RPO, and vendor risk assessment covers Stripe dependency"
    weight: 0.35
    description: "Complete SOX control framework"
  - type: llm_judge
    criteria: "Revenue recognition system is ASC 606 compliant — deferred revenue calculation for annual subscriptions, monthly recognition, journal entry automation, ERP integration, and the $12M restatement approach is technically sound"
    weight: 0.35
    description: "ASC 606 compliant revenue system"
  - type: llm_judge
    criteria: "Quarterly close acceleration is realistic — daily reconciliation replaces monthly, pre-close reduces quarter-end surprises, 12→3 day reduction plan has specific automation steps, and the real-time board dashboard is achievable"
    weight: 0.30
    description: "Realistic close acceleration plan"
