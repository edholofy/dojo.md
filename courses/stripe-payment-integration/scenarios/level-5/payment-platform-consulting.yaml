meta:
  id: payment-platform-consulting
  level: 5
  course: stripe-payment-integration
  type: output
  description: "Design a payment platform consulting engagement — assess, architect, and implement a complete payment system for a Fortune 500 client"
  tags: [stripe, consulting, Fortune-500, architecture, engagement, assessment, master]

state: {}

trigger: |
  You're a Principal Payment Systems Consultant hired by a Fortune 500
  retailer ($12B annual revenue) to redesign their payment infrastructure.
  They currently process payments through 7 different processors across
  4 countries. The engagement: $4M, 6-month assessment and architecture.

  Client context:
  - 7 payment processors (Stripe, Adyen, Worldpay, PayPal, Chase
    Paymentech, Cielo Brazil, Paytm India)
  - 4 countries: US, UK, Brazil, India
  - 450M transactions/year ($12B volume)
  - Payment team: 45 engineers across 3 offices
  - 12 different payment-related systems (billing, fraud, tax,
    reconciliation, reporting, compliance)
  - Annual payment processing cost: $310M (2.6% effective rate)
  - Authorization rate: 89% (industry leader is 96%)
  - Chargeback rate: 1.1% (risk of network penalties)
  - Reconciliation takes 5 business days per month

  CEO's mandate: "Reduce payment costs by $50M/year, improve
  authorization rates to 95%, and modernize our payment infrastructure
  to support our next-generation e-commerce platform."

  Assessment findings after week 4:
  - Each country has its own payment stack with no shared services
  - Fraud detection is processor-specific (no unified view)
  - Tax calculation is manual in Brazil and India
  - No payment orchestration layer (each channel talks directly to
    processors)
  - Technical debt: 40% of payment code was written 8+ years ago
  - 3 processors are on end-of-support legacy APIs

  Tasks:
  1. Write the assessment report. Include: current state analysis
     (architecture, costs, risks), gap analysis against industry
     benchmarks, the opportunity sizing ($50M savings target broken
     down), and the strategic recommendation (consolidate vs. optimize
     vs. hybrid).

  2. Design the target-state payment platform architecture. Include:
     the payment orchestration layer, the unified fraud system, the
     processor strategy (which processors for which markets and why),
     the data architecture, and the migration approach (big bang vs.
     phased). Show how the architecture achieves the 95% auth rate
     and $50M savings.

  3. Create the implementation roadmap. Include: the 6-phase program
     plan (18 months), resource requirements, risk register, vendor
     evaluation criteria for any new processors, and the financial
     model showing when savings are realized. Include the governance
     structure for a program of this scale.

assertions:
  - type: llm_judge
    criteria: "Assessment report is consulting-quality — current state analysis covers all 7 processors and 4 countries, gap analysis uses industry benchmarks, $50M savings is broken down into achievable components (routing optimization, auth rate improvement, processor consolidation), and recommendation is justified"
    weight: 0.35
    description: "Consulting-quality assessment report"
  - type: llm_judge
    criteria: "Target architecture is achievable — orchestration layer abstracts processors, unified fraud system combines signals across countries, processor strategy is market-appropriate, and the architecture path to 95% auth rate and $50M savings is credible"
    weight: 0.35
    description: "Achievable target architecture"
  - type: llm_judge
    criteria: "Implementation roadmap is realistic for Fortune 500 — 18-month phased plan, resource requirements reflect the scale (45-engineer team), risk register captures real risks (migration downtime, processor migration), and governance structure handles organizational complexity"
    weight: 0.30
    description: "Realistic Fortune 500 roadmap"
