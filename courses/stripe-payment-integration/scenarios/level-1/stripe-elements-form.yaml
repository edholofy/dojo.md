meta:
  id: stripe-elements-form
  level: 1
  course: stripe-payment-integration
  type: output
  description: "Build a custom payment form with Stripe Elements — create a branded, accessible payment form using the Payment Element"
  tags: [stripe, elements, payment-form, UI, frontend, accessibility, beginner]

state: {}

trigger: |
  You're a frontend developer building a custom checkout page. The
  designer doesn't want Stripe's hosted checkout — they want a payment
  form that matches your brand. Your tech lead said: "Use the Payment
  Element, not the Card Element. Payment Element supports more payment
  methods and handles 3D Secure automatically."

  Tech stack: React, TypeScript, Tailwind CSS

  Design requirements:
  - Payment form embedded in your checkout page
  - Matches your brand (custom fonts, colors, border radius)
  - Handles loading states while Stripe.js initializes
  - Shows inline validation errors
  - Supports both card payments and Apple Pay / Google Pay
  - Accessible (keyboard navigation, screen reader support)
  - Mobile responsive

  Current issues with the old Card Element implementation:
  1. It doesn't support Apple Pay or Google Pay
  2. Custom styling is limited to the appearance API
  3. 3D Secure opens in a popup that gets blocked by browsers
  4. The form doesn't show loading states — users click "Pay" multiple
     times

  Tasks:
  1. Write the React component that integrates the Payment Element.
     Include: loading Stripe.js with loadStripe, wrapping with
     Elements provider, mounting the Payment Element with appearance
     customization, and the form submission handler that calls
     confirmPayment.

  2. Handle all the edge cases: loading state while Stripe initializes,
     form validation before submission, preventing double-submissions,
     the redirect flow after confirmPayment (return_url), and error
     display. Show the TypeScript types for Stripe.js events.

  3. Write the appearance configuration that customizes the Payment
     Element to match a brand. Show: theme customization (colors, fonts,
     borders), the difference between the appearance API and CSS, and
     how to handle dark mode. Explain what can and cannot be customized
     in the Payment Element.

assertions:
  - type: llm_judge
    criteria: "React component is correct — uses loadStripe, Elements provider, PaymentElement component, confirmPayment with return_url, proper TypeScript typing; handles the complete payment flow from mount to confirmation"
    weight: 0.35
    description: "Correct Payment Element React integration"
  - type: llm_judge
    criteria: "Edge cases are handled — loading state prevents premature interaction, double-submission prevention (disable button, state flag), redirect after 3D Secure, inline error display, and form validation"
    weight: 0.35
    description: "Complete edge case handling"
  - type: llm_judge
    criteria: "Appearance customization is accurate — uses the correct Stripe appearance API structure (theme, variables, rules), explains limitations (can't change layout, limited font options), and dark mode approach is correct"
    weight: 0.30
    description: "Accurate appearance customization"
