meta:
  id: advanced-stripe-shift
  level: 3
  course: stripe-payment-integration
  type: output
  description: "Advanced Stripe shift — handle a payment processor migration crisis, a tax compliance audit, and a marketplace payout failure simultaneously"
  tags: [stripe, migration, tax, marketplace, crisis, shift-simulation, advanced]

state: {}

trigger: |
  You're the VP of Engineering at a marketplace platform ($15M ARR).
  Three payment crises hit in the same week.

  Crisis 1 — Stripe Account Suspension Risk:
  Stripe sent an email: "Your dispute rate has exceeded 1% for the
  second consecutive month. If not reduced to below 0.75% within 30
  days, your account may be restricted." Current dispute rate: 1.3%.
  Dispute breakdown: 60% "product not received" (shipping partners),
  25% "unauthorized" (potential fraud), 15% "not as described."
  You have 30 days to fix this or lose your payment processing.

  Crisis 2 — EU VAT Audit:
  Your company received a VAT audit notice from the German tax
  authority. They're requesting: documentation of VAT collection for
  all EU sales in the last 2 years, proof of VAT ID validation for
  B2B transactions, and evidence of proper reverse charge application.

  Problem: You implemented Stripe Tax 6 months ago but the first
  18 months of EU sales had NO tax collection. You owe back-taxes
  plus penalties. Your legal team estimates the liability at €180K.

  Crisis 3 — Connected Account Payout Failure:
  100 of your marketplace sellers didn't receive their weekly payout
  (total: $340,000). The payout system shows "failed" for all of them.
  Error: "Your platform's Stripe balance is insufficient to cover
  payouts." Investigation reveals: a large refund ($95,000) depleted
  your platform balance, and the remaining payouts were queued but
  couldn't be processed. Sellers are threatening to leave the platform.

  Tasks:
  1. Address the dispute rate crisis. Write: the 30-day action plan
     to reduce from 1.3% to below 0.75%, the immediate measures (better
     shipping tracking, Radar rules for fraud, pre-emptive refunds),
     the seller quality program for "not as described" disputes, and
     the communication to Stripe showing your remediation plan.

  2. Address the VAT audit. Write: the data extraction plan (pull all
     EU transactions from Stripe for the last 2 years), the gap
     analysis (which transactions should have had VAT but didn't), the
     remediation plan (back-file VAT returns, pay owed taxes), and the
     Stripe Tax configuration verification.

  3. Address the payout failure. Write: the immediate fix (fund the
     platform balance), the communication to 100 affected sellers,
     the root cause analysis (why did one large refund cascade to payout
     failures?), and the prevention system (reserve balance, payout
     pre-checks, alerts when balance is low).

assertions:
  - type: llm_judge
    criteria: "Dispute reduction plan is actionable within 30 days — addresses all 3 dispute categories with specific measures (shipping tracking for 'not received,' Radar rules for 'unauthorized,' seller quality for 'not as described'), and the communication to Stripe is professional and credible"
    weight: 0.35
    description: "Actionable 30-day dispute reduction"
  - type: llm_judge
    criteria: "VAT audit response is comprehensive — data extraction covers 2 years, gap analysis quantifies the liability, remediation includes back-filing and payment, and Stripe Tax configuration is verified for current compliance"
    weight: 0.35
    description: "Comprehensive VAT audit response"
  - type: llm_judge
    criteria: "Payout failure resolution is immediate and prevents recurrence — funds the balance quickly, seller communication is empathetic with timeline, root cause identifies the reserve gap, and prevention system includes balance monitoring and payout pre-checks"
    weight: 0.30
    description: "Immediate payout failure resolution"
