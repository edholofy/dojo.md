meta:
  id: payment-compliance-framework
  level: 4
  course: stripe-payment-integration
  type: output
  description: "Build a payment compliance framework — design policies and systems for PCI DSS, PSD2, anti-money laundering, and sanctions screening"
  tags: [stripe, compliance, PCI, AML, sanctions, PSD2, regulation, expert]

state: {}

trigger: |
  You're the Head of Payment Compliance at a fintech company ($400M
  in annual payment volume) that uses Stripe as its payment processor
  but has compliance obligations beyond what Stripe handles.

  Regulatory landscape:
  1. PCI DSS Level 2 (1-6M transactions/year): Annual SAQ required,
     quarterly ASV scan
  2. PSD2/SCA: Strong Customer Authentication for EU payments
  3. AML (Anti-Money Laundering): Customer due diligence, transaction
     monitoring, suspicious activity reporting
  4. OFAC Sanctions: Cannot process payments to/from sanctioned
     entities or countries
  5. State money transmitter licenses: 50 US states with different
     requirements
  6. Consumer protection: Truth in Lending, ECOA, state usury laws

  Current compliance gaps:
  - AML: No transaction monitoring beyond Stripe Radar
  - Sanctions: Relying entirely on Stripe's screening (insufficient
    for your license requirements)
  - SAQ: Last completed 14 months ago (should be annual)
  - PSD2: Exemption strategy not documented
  - Training: Engineering team has no PCI security awareness training
  - Vendor management: No formal assessment of Stripe's compliance

  Upcoming audit: Your payment services license requires an annual
  compliance audit in 90 days. The auditor will review: PCI compliance
  evidence, AML program documentation, sanctions screening procedures,
  consumer protection policies, and vendor management.

  Tasks:
  1. Design the comprehensive compliance framework. For each regulation:
     define the requirements, your current gap, the remediation plan,
     and the ongoing monitoring system. Prioritize by audit deadline.

  2. Build the AML and sanctions screening system. Write: the customer
     due diligence (CDD/KYC) process, the transaction monitoring rules
     (large transactions, structuring detection, velocity patterns),
     the OFAC sanctions screening integration (how to screen customer
     names and addresses against the SDN list), and the SAR (Suspicious
     Activity Report) filing procedure.

  3. Create the audit preparation package. Include: the PCI compliance
     evidence (network diagrams, SAQ-A, ASV scan results), the AML
     program documentation, the sanctions screening procedure, the
     vendor management assessment of Stripe, and the training records.
     Identify what can be completed in 90 days.

assertions:
  - type: llm_judge
    criteria: "Compliance framework covers all regulations — PCI, PSD2, AML, sanctions, money transmitter, and consumer protection each have requirements, gaps, remediation, and monitoring; prioritization reflects the 90-day audit deadline"
    weight: 0.35
    description: "Complete regulatory compliance framework"
  - type: llm_judge
    criteria: "AML/sanctions system is operationally viable — CDD process is practical, transaction monitoring rules catch structuring and velocity patterns, OFAC screening uses the SDN list, and SAR filing procedure follows FinCEN requirements"
    weight: 0.35
    description: "Viable AML/sanctions system"
  - type: llm_judge
    criteria: "Audit package is audit-ready — PCI evidence includes current SAQ and ASV scans, AML program is documented, vendor assessment of Stripe is comprehensive, and the 90-day plan shows what's achievable vs. what needs post-audit remediation"
    weight: 0.30
    description: "Audit-ready compliance package"
