meta:
  id: payment-vendor-evaluation
  level: 4
  course: stripe-payment-integration
  type: output
  description: "Conduct a payment vendor evaluation — lead a comprehensive assessment of payment processors for a multi-product enterprise transitioning from Stripe-only to a multi-processor strategy"
  tags: [stripe, vendor-evaluation, RFP, multi-processor, procurement, enterprise, expert]

state: {}

trigger: |
  You're the VP of Payments at a SaaS holding company that operates
  4 products across different verticals ($800M combined GMV). The
  CEO has mandated a formal payment vendor evaluation because:

  1. Single-vendor risk: 100% of payment processing goes through
     Stripe. A 4-hour Stripe outage last quarter cost $2.1M in
     lost transactions.
  2. Cost pressure: At $800M GMV, the blended rate of 2.85% ($22.8M
     in annual fees) is above industry benchmarks.
  3. Feature gaps: Product D (marketplace) needs payment facilitation
     features that Stripe Connect doesn't fully support (custom
     settlement schedules, cross-border payouts to 40+ countries).
  4. Geographic expansion: Entering Southeast Asia and Africa where
     Stripe has limited coverage.

  The 4 products:
  - Product A: B2B SaaS subscriptions ($300M GMV, US/EU, 95% card)
  - Product B: E-commerce platform ($250M GMV, global, mixed methods)
  - Product C: Digital marketplace ($150M GMV, US, Connect payouts)
  - Product D: Cross-border marketplace ($100M GMV, 30 countries)

  Candidate processors to evaluate:
  1. Stripe (incumbent) — retain and renegotiate
  2. Adyen — enterprise focus, global coverage
  3. Checkout.com — competitive pricing, strong EU/UK presence
  4. PayPal/Braintree — consumer brand recognition, PayPal wallet
  5. dLocal — emerging market specialist (LatAm, Africa, SEA)

  Budget for evaluation and potential migration: $3M over 18 months.

  Tasks:
  1. Design the RFP and evaluation framework. Include: the 8
     evaluation dimensions (pricing, auth rates, geographic coverage,
     payment methods, platform features, reliability, compliance,
     developer experience), the scoring methodology (weighted matrix),
     the proof-of-concept requirements (what each vendor must
     demonstrate), and the evaluation timeline (12-week process).

  2. Write the vendor assessment for each of the 5 candidates.
     For each: strengths and weaknesses against the 8 dimensions,
     TCO analysis (not just processing fees — include integration
     cost, maintenance, opportunity cost of auth rate differences),
     the fit for each of the 4 products, and the risk assessment
     (vendor stability, lock-in, contractual flexibility).

  3. Deliver the recommendation to the CEO. Include: the recommended
     multi-processor strategy (which vendor for which product/region),
     the migration roadmap (phased approach to avoid disruption),
     the expected cost savings and risk reduction, the Stripe
     renegotiation strategy (using competitive bids as leverage),
     and the build-vs-buy analysis for the payment orchestration
     layer that ties the processors together.

assertions:
  - type: llm_judge
    criteria: "RFP framework is comprehensive — 8 dimensions cover all critical factors, scoring methodology uses justified weights, POC requirements test real scenarios, and the 12-week timeline has clear milestones"
    weight: 0.35
    description: "Comprehensive RFP framework"
  - type: llm_judge
    criteria: "Vendor assessments are balanced and specific — each of 5 vendors is assessed against all dimensions, TCO goes beyond processing fees, product-vendor fit is matched to actual product needs, and risk assessment is honest about each vendor's weaknesses"
    weight: 0.35
    description: "Balanced vendor assessments"
  - type: llm_judge
    criteria: "CEO recommendation is actionable — multi-processor strategy is justified, migration roadmap is phased and risk-aware, Stripe renegotiation leverages the evaluation, and orchestration layer decision is well-reasoned"
    weight: 0.30
    description: "Actionable CEO recommendation"
