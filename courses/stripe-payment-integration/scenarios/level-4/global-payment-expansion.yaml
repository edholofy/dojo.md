meta:
  id: global-payment-expansion
  level: 4
  course: stripe-payment-integration
  type: output
  description: "Expand payments globally — design a multi-region Stripe setup with local payment methods, multi-currency settlement, and regulatory compliance"
  tags: [stripe, global, expansion, multi-region, compliance, local-payments, expert]

state: {}

trigger: |
  You're the Director of Payments at a SaaS company ($200M ARR)
  expanding from US-only to 6 regions. The CEO says: "We need to
  accept payments like a local company in every market."

  Expansion markets and requirements:

  Europe (EU):
  - Local payment methods: SEPA, iDEAL (Netherlands), Bancontact
    (Belgium), giropay (Germany), Przelewy24 (Poland)
  - Settlement: EUR account for EU settlement
  - Compliance: PSD2/SCA, GDPR, Digital Services Act
  - VAT: Collect and remit in each EU country

  United Kingdom:
  - Local methods: Bacs Direct Debit, Open Banking
  - Settlement: GBP account
  - Compliance: UK GDPR, FCA regulations

  Japan:
  - Local methods: Konbini (convenience store payments), JCB cards
  - Settlement: JPY account
  - Compliance: APPI, J-SOX for enterprise
  - Cultural: Invoices required for all B2B transactions

  Brazil:
  - Local methods: Boleto bancário, PIX (instant payments)
  - Settlement: BRL account (restricted, requires local entity)
  - Compliance: LGPD (data protection), Central Bank regulations
  - Tax: Complex ISS/ICMS tax structure

  India:
  - Local methods: UPI, Netbanking, RuPay cards
  - Settlement: INR (requires local entity and RBI approval)
  - Compliance: RBI data localization (payment data must stay in India)
  - Pricing: Must show prices in INR with MRP compliance

  Australia:
  - Local methods: BECS Direct Debit, PayTo
  - Settlement: AUD account
  - Compliance: Australian Privacy Act, GST collection

  Current setup: Single US Stripe account, USD only, cards only.

  Tasks:
  1. Design the multi-region Stripe architecture. Include: the account
     structure (single vs. multiple Stripe accounts per region), the
     local payment method integration plan for each region, the
     settlement currency strategy, and the customer experience flow
     (auto-detect region → show local methods → charge in local
     currency).

  2. Create the regulatory compliance matrix. For each region: the
     data handling requirements (especially India's data localization),
     the tax collection obligations, the payment-specific regulations,
     and the required licenses or local entities. Identify which
     markets you can enter with just a Stripe account vs. which need
     a local legal entity.

  3. Write the 12-month expansion roadmap. Prioritize the markets by:
     revenue opportunity, implementation complexity, and regulatory
     burden. Include: the phased rollout order, the resource
     requirements (engineering, legal, finance), the go-live checklist
     per market, and the success metrics.

assertions:
  - type: llm_judge
    criteria: "Architecture handles multi-region correctly — account structure makes sense (likely separate accounts for settlement), local payment methods are correctly mapped to regions, settlement currencies avoid unnecessary FX, and customer detection is accurate"
    weight: 0.35
    description: "Correct multi-region architecture"
  - type: llm_judge
    criteria: "Compliance matrix is accurate — correctly identifies India's data localization requirement, Brazil's local entity need, EU SCA/GDPR, Japan's APPI, and correctly distinguishes markets needing Stripe-only vs. local entity"
    weight: 0.35
    description: "Accurate regulatory compliance matrix"
  - type: llm_judge
    criteria: "Roadmap prioritizes sensibly — likely EU/UK first (large market, Stripe well-supported), then Australia (English-speaking, simpler), then Japan, then Brazil/India (complex, need local entity); resource requirements are realistic"
    weight: 0.30
    description: "Sensibly prioritized expansion roadmap"
