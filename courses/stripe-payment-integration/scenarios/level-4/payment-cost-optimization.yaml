meta:
  id: payment-cost-optimization
  level: 4
  course: stripe-payment-integration
  type: output
  description: "Optimize payment processing costs — reduce Stripe fees through intelligent routing, interchange optimization, and fee negotiation"
  tags: [stripe, cost-optimization, interchange, routing, fees, negotiation, expert]

state: {}

trigger: |
  You're the VP of Finance at an e-commerce company. Your payment
  processing costs are $8.2M/year on $280M in payment volume — an
  effective rate of 2.93%. The CEO wants you to reduce this to under
  2.5%, saving $1.2M/year.

  Current fee breakdown:
  - Stripe standard pricing: 2.9% + $0.30 per transaction
  - International cards: additional 1.5% (Stripe international fee)
  - Currency conversion: additional 1% (when presentment ≠ settlement)
  - Dispute fees: $15 per dispute × 800/year = $12,000
  - Stripe Connect fees: additional $2/active account/month

  Volume breakdown:
  - Domestic (US) card payments: $196M (70%)
  - International card payments: $56M (20%)
  - ACH payments: $14M (5%)
  - Other: $14M (5%)

  Transaction size distribution:
  - Under $10: 15% of transactions (high per-transaction fee impact)
  - $10-$100: 55% of transactions
  - $100-$500: 25% of transactions
  - Over $500: 5% of transactions

  Optimization levers available:
  1. Stripe volume discount negotiation (>$10M/year qualifies)
  2. Interchange Plus pricing (IC+ instead of blended)
  3. Network token optimization (higher auth rates, lower fees)
  4. ACH for large transactions (flat fee vs. percentage)
  5. Smart routing for international transactions
  6. Consolidating currencies to reduce FX fees
  7. Reducing disputes to lower dispute fee costs

  Tasks:
  1. Build the complete cost optimization model. For each lever:
     calculate the current cost, the optimized cost, and the savings.
     Include: the Stripe pricing negotiation strategy (what volume
     discount to request and why), the IC+ vs. blended analysis, and
     the ACH migration for large transactions.

  2. Design the smart routing system for cost optimization. Include:
     routing rules that minimize processing costs (ACH for >$500,
     local processing for international cards to avoid cross-border
     fees, network tokens for returning customers), and the expected
     savings from each routing rule.

  3. Write the CFO presentation. Include: the current cost breakdown,
     the optimization plan with phased savings, the implementation
     timeline, the required investment (engineering time, Stripe
     negotiation), and the projected savings over 3 years. Make it
     clear which savings are guaranteed vs. estimated.

assertions:
  - type: llm_judge
    criteria: "Cost model is mathematically sound — correctly calculates current costs by segment, each optimization lever has realistic savings estimates, IC+ analysis shows when it's better than blended, and the total savings path from 2.93% to under 2.5% is credible"
    weight: 0.35
    description: "Mathematically sound cost model"
  - type: llm_judge
    criteria: "Smart routing rules optimize real cost drivers — ACH for large transactions saves the most, local acquiring for international reduces cross-border fees, network tokens improve auth rates, and each rule has quantified savings"
    weight: 0.35
    description: "Cost-optimizing routing rules"
  - type: llm_judge
    criteria: "CFO presentation is financially rigorous — cost breakdown is clear, savings are categorized as guaranteed vs estimated, implementation investment is included, and 3-year projection shows cumulative impact"
    weight: 0.30
    description: "Financially rigorous CFO presentation"
