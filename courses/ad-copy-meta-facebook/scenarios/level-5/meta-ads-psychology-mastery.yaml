meta:
  id: meta-ads-psychology-mastery
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Apply advanced persuasion psychology to Meta ad copy for maximum conversion impact"
  tags: [meta-ads, psychology, persuasion, behavioral, mastery]

state: {}

trigger: |
  Master-level Meta ad copywriters understand the behavioral psychology
  behind every scroll, click, and purchase. This goes beyond basic
  emotional triggers to applying cognitive science frameworks that
  predict and influence behavior at scale.

  Apply 8 advanced psychological frameworks to Meta ad copy:

  Framework 1: Cognitive load theory
  Product: Complex SaaS tool ($79/month, 50+ features)
  Challenge: Simplify a complex product into a 125-character hook
  Task: Write 3 ads that reduce cognitive load to increase comprehension
  and conversion

  Framework 2: Narrative transportation theory
  Product: D2C sneaker brand ($120)
  Challenge: Transport the reader into a story that creates brand attachment
  Task: Write a long-form ad that achieves narrative transportation

  Framework 3: Regulatory focus theory (promotion vs prevention)
  Product: Financial planning app ($15/month)
  Promotion focus: Gain, growth, aspiration — "Build your dream future"
  Prevention focus: Safety, security, avoiding loss — "Protect what
  you've earned"
  Task: Write both versions and predict which performs for which audience

  Framework 4: Elaboration likelihood model (central vs peripheral)
  Product: Enterprise software ($500/month)
  Central route: Logic, evidence, detailed arguments
  Peripheral route: Authority, social proof, attractive design
  Task: Write ads for each processing route

  Framework 5: Temporal discounting (present vs future reward)
  Product: Online course ($299)
  Present reward: "Start seeing results this week"
  Future reward: "Build a career that lasts 20 years"
  Task: Write both framings and analyze which drives immediate action

  Framework 6: Choice architecture and defaults
  Product: Subscription box ($35/month, $25 annual, $45 premium)
  Task: Write ads that frame the pricing tiers to guide the "right" choice
  Apply: Decoy effect, anchoring, and default bias

  Framework 7: Identity-based persuasion
  Product: Electric vehicle charging station ($499 + installation)
  Task: Write ads that appeal to identity ("the kind of person who...")
  rather than features or benefits

  Framework 8: Reciprocity and the foot-in-the-door technique
  Product: Marketing agency ($5,000/month retainer)
  Task: Write a sequence — free audit → paid consultation → retainer —
  where each step builds commitment

  For each framework:
  1. Explain the psychological principle in 2-3 sentences
  2. Write the complete Meta ad applying the framework
  3. Write a version that doesn't apply the framework (control)
  4. Predict the performance difference
  5. Identify the ethical considerations

  Then provide:
  - The copywriter's behavioral psychology toolkit (10 frameworks ranked)
  - How to combine multiple frameworks in a single ad
  - Ethics in persuasive advertising: the line between influence and manipulation
  - Testing psychological frameworks: how to validate which works
  - Recommended reading for ad psychology

assertions:
  - type: llm_judge
    criteria: "Psychological frameworks are correctly applied — narrative transportation creates genuine immersion, regulatory focus correctly matches promotion vs prevention messaging"
    weight: 0.30
    description: "Correctly applied psychology frameworks"
  - type: llm_judge
    criteria: "Control versions demonstrate the contrast — ads without the psychological framework are noticeably less compelling, validating the framework's impact"
    weight: 0.25
    description: "Contrast-demonstrating control versions"
  - type: llm_judge
    criteria: "Ethical considerations are thoughtfully addressed — each framework includes honest assessment of where persuasion becomes manipulation"
    weight: 0.25
    description: "Thoughtful ethical considerations"
  - type: llm_judge
    criteria: "The ranked framework toolkit is practical — provides a prioritized list that copywriters can reference when approaching different campaign challenges"
    weight: 0.20
    description: "Practical ranked framework toolkit"
