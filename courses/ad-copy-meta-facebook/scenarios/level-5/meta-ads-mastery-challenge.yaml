meta:
  id: meta-ads-mastery-challenge
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Demonstrate mastery by writing Meta ads across every format, objective, audience, and industry"
  tags: [meta-ads, mastery, comprehensive, challenge, mastery]

state: {}

trigger: |
  The ultimate Meta ad copy challenge. Write exceptional ads across 10
  radically different scenarios — each requiring different formats,
  tones, audiences, compliance requirements, and conversion strategies.

  Write master-level Meta ads for all 10 scenarios:

  1. $5 impulse purchase: Novelty phone case
  Format: Reels ad (UGC style)
  Challenge: Make a commodity feel irresistible in 15 seconds

  2. $49/month SaaS: Email marketing tool
  Format: Carousel ad (feature walkthrough)
  Challenge: Sell software to non-technical small business owners

  3. $2,500 high-ticket: Online business coaching
  Format: Long-form feed ad (founder story)
  Challenge: Build credibility without income claims

  4. Non-profit: Ocean cleanup charity (donation ask)
  Format: Video ad (impact story)
  Challenge: Drive donations through emotion without guilt-tripping

  5. Local service: Emergency plumber
  Format: Stories ad (quick, local)
  Challenge: Be top-of-mind for future emergencies

  6. B2B enterprise: Cybersecurity platform ($10K/year)
  Format: Lead gen ad (whitepaper download)
  Challenge: Speak to CISO and VP Engineering simultaneously

  7. Regulated industry: CBD sleep gummies ($34)
  Format: Feed ad (compliant copy)
  Challenge: Promote wellness benefits without health claims

  8. Luxury: $800 designer sunglasses
  Format: Collection ad (brand + product)
  Challenge: Sell exclusivity without being discount-driven

  9. App install: Meditation app (free with premium)
  Format: Reels ad (trending format)
  Challenge: Cut through the crowded wellness app space

  10. International: Same product, 3 markets
  Product: Wireless earbuds ($99)
  Markets: US, UK, Brazil
  Challenge: Localize copy beyond just language translation

  For each scenario:
  1. Write the complete ad (format-specific)
  2. Write 2 alternative variations
  3. Identify the single most important conversion driver
  4. Explain your strategic approach
  5. Write the one-line creative brief for the designer

  After all 10, provide:
  - Cross-scenario analysis: what universal principles apply everywhere
  - The 5 most important Meta ad copy skills
  - Your personal ad copywriting process (step by step)
  - How to stay current: resources for Meta ad copy trends

assertions:
  - type: llm_judge
    criteria: "All 10 ads are format-appropriate and compelling — each adapts perfectly to its format, audience, and industry while driving the specified action"
    weight: 0.30
    description: "Format-appropriate compelling ads"
  - type: llm_judge
    criteria: "Difficult scenarios are handled expertly — the regulated CBD ad is compliant yet persuasive, the non-profit avoids guilt-tripping, the B2B speaks to multiple stakeholders"
    weight: 0.30
    description: "Expert handling of difficult scenarios"
  - type: llm_judge
    criteria: "Universal principles are genuinely insightful — identify patterns that work across all 10 scenarios while acknowledging what must change"
    weight: 0.20
    description: "Insightful universal principles"
  - type: llm_judge
    criteria: "The copywriting process is detailed and teachable — provides a repeatable methodology another copywriter could follow"
    weight: 0.20
    description: "Detailed teachable process"
