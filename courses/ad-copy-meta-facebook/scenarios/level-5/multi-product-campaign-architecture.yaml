meta:
  id: multi-product-campaign-architecture
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Design Meta ad copy architecture for multi-product brands with complex product lines"
  tags: [meta-ads, multi-product, architecture, campaign-structure, mastery]

state: {}

trigger: |
  Multi-product brands face a unique Meta ad copy challenge: how to
  promote multiple products without cannibalizing your own ads,
  confusing audiences, or spreading budget too thin. The copy
  architecture — which products get which messaging for which
  audiences — determines whether multi-product campaigns compound
  returns or compete against themselves.

  Design a multi-product Meta ad copy architecture:

  Brand: "Zenith Wellness" — Health and wellness D2C brand
  Product lines:
  1. Supplements (8 products, $25-$55, highest margin)
  2. Fitness equipment (5 products, $50-$400, highest AOV)
  3. Wellness apparel (12 products, $30-$90, highest volume)
  4. Digital programs (3 courses, $99-$299, highest LTV)
  5. Subscription box ($45/month, best retention)

  Monthly budget: $75,000
  Current approach: Each product line has separate campaigns with no
  coordination — ads compete against each other

  Part 1: Product hierarchy and copy strategy
  1. Define the "hero products" for each product line (entry points)
  2. Map the customer journey across product lines (first purchase →
     cross-sell → subscription)
  3. Design the product introduction sequence: which product to show
     cold audiences first
  4. Create the cross-sell messaging matrix (who sees what, when)

  Part 2: Campaign architecture
  1. Write the brand-level campaigns (brand awareness, brand story)
  2. Write product-line-level campaigns (category education, comparison)
  3. Write product-level campaigns (specific product benefits, offers)
  4. Write cross-sell campaigns (bundle offers, "You bought X, try Y")
  5. Write retention campaigns (subscription, loyalty, winback)

  For each campaign layer:
  - Write 2-3 ad variations
  - Define the audience and exclusion rules
  - Set the budget allocation percentage
  - Explain how this layer feeds the next

  Part 3: Anti-cannibalization strategy
  1. How to prevent your ads from competing with each other
  2. Audience exclusion rules that prevent overlap
  3. Copy differentiation between campaigns targeting similar audiences
  4. Budget distribution methodology across product lines

  Part 4: Measurement and optimization
  1. Define success metrics at each campaign layer
  2. Create the cross-product attribution model
  3. Build the optimization decision framework
  4. Design the quarterly product-line copy review

  Then provide:
  - Multi-product campaign architecture blueprint
  - Budget allocation framework by product line performance
  - Anti-cannibalization checklist
  - Customer lifetime value optimization through ad copy sequencing

assertions:
  - type: llm_judge
    criteria: "Campaign architecture is logical and comprehensive — each layer serves a clear purpose and feeds the next, creating a cohesive multi-product ad ecosystem"
    weight: 0.30
    description: "Logical comprehensive campaign architecture"
  - type: llm_judge
    criteria: "Anti-cannibalization strategy is specific — provides concrete audience exclusion rules and copy differentiation techniques, not just theoretical advice"
    weight: 0.25
    description: "Specific anti-cannibalization strategy"
  - type: llm_judge
    criteria: "Cross-sell messaging is strategic — product recommendations are based on logical purchase sequences and customer behavior, not random product promotion"
    weight: 0.25
    description: "Strategic cross-sell messaging"
  - type: llm_judge
    criteria: "Budget allocation is data-driven — distributes spend based on margin, volume, and LTV potential rather than equal splits across product lines"
    weight: 0.20
    description: "Data-driven budget allocation"
