meta:
  id: meta-ads-agency-pitch
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Create an agency pitch demonstrating Meta ad copy expertise across industries and objectives"
  tags: [meta-ads, agency, portfolio, pitch, mastery]

state: {}

trigger: |
  You run a paid social copywriting agency. A potential client — a
  $20M e-commerce brand selling home fitness equipment — wants proof
  that your Meta ad copy will outperform their current agency. Create
  a pitch that demonstrates mastery.

  Client: "FitHome Pro" — Home fitness equipment
  Products: Smart treadmill ($1,499), resistance trainer ($399),
  yoga mat bundle ($89), protein supplements ($39-$59)
  Current performance: 2.1x ROAS (industry avg 3.5x), 0.8% CTR
  (industry avg 1.2%), $42 CPA for supplement line (target $18)
  Problems: Generic copy, no audience segmentation, same ad for all
  products, no retargeting sequence, ad fatigue every 5 days

  Create the full pitch:

  Part 1: Audit of current ads (3 examples)
  Current ad A (treadmill):
  "Get fit at home with our amazing smart treadmill! Best features and
  great price. Order now and start your fitness journey today! 💪🏃‍♂️"

  Current ad B (supplements):
  "Premium protein powder for fitness enthusiasts. Try our delicious
  flavors. Free shipping on all orders! Shop now."

  Current ad C (yoga mat retargeting):
  "Still thinking about it? Our yoga mat bundle is selling fast!
  Don't miss out — grab yours before they're gone!"

  For each:
  1. Score on 0-100 scale with breakdown
  2. Identify every specific problem
  3. Write the dramatically improved version
  4. Project the performance improvement

  Part 2: Strategy presentation
  1. Audience segmentation plan (cold, warm, hot × product line)
  2. Full-funnel campaign architecture
  3. Copy differentiation strategy by product price point
  4. Creative testing roadmap (first 90 days)
  5. Retargeting sequence design

  Part 3: Sample campaign (supplements line)
  Write a complete 5-ad campaign for the protein supplement line:
  1. Cold awareness ad (ingredient story/education)
  2. Cold interest ad (comparison to competitors)
  3. Warm consideration ad (customer transformation)
  4. Hot retargeting ad (cart abandoner)
  5. Customer loyalty ad (reorder/subscription)

  Part 4: ROI projection
  1. Expected ROAS improvement trajectory (month 1-6)
  2. CPA reduction targets by product line
  3. Revenue impact model
  4. Investment payback timeline

assertions:
  - type: llm_judge
    criteria: "The audit is devastating and specific — clearly shows why current ads underperform with precise diagnoses that demonstrate expertise"
    weight: 0.25
    description: "Devastating specific audit"
  - type: llm_judge
    criteria: "Improved ads are dramatically better — each rewrite addresses every diagnosed problem and demonstrates clear mastery of Meta ad copywriting"
    weight: 0.30
    description: "Dramatically improved rewrites"
  - type: llm_judge
    criteria: "The 5-ad campaign is cohesive — flows logically from cold awareness through customer loyalty with each ad serving a clear funnel role"
    weight: 0.25
    description: "Cohesive 5-ad funnel campaign"
  - type: llm_judge
    criteria: "ROI projections are credible — improvement from 2.1x to target ROAS is achievable given the current underperformance, with realistic timelines"
    weight: 0.20
    description: "Credible ROI projections"
