meta:
  id: enterprise-meta-ads-governance
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Design enterprise-level Meta ad copy governance for multi-brand, multi-market organizations"
  tags: [meta-ads, enterprise, governance, multi-brand, mastery]

state: {}

trigger: |
  Enterprise organizations running Meta ads across multiple brands,
  markets, and agencies face unique governance challenges. Without
  centralized copy standards, quality degrades, brand voice fractures,
  compliance risks increase, and optimization learnings are siloed.

  Design an enterprise Meta ad copy governance system:

  Organization: Global consumer goods company
  - 5 brands (beauty, food, home care, pet care, personal health)
  - 12 markets (US, UK, Germany, France, Japan, Brazil, India,
    Australia, Canada, Mexico, South Korea, Indonesia)
  - 3 agencies managing different brand portfolios
  - Total monthly Meta ad spend: $2.5M
  - 500+ active ad sets across all brands and markets

  Part 1: Governance framework
  1. Create the centralized brand ad copy guidelines
     - Brand voice parameters for each of the 5 brands
     - Shared compliance standards across all brands
     - Quality scoring rubric (1-5 scale)
     - Approval workflow for each level of copy review

  2. Design the role structure:
     - Global copy director: standards, strategy, oversight
     - Regional copy leads: market adaptation, local compliance
     - Brand copy managers: brand voice, campaign consistency
     - Agency copy teams: execution within guidelines

  3. Build the compliance management system:
     - Pre-publication review checklist
     - Market-specific regulatory requirements
     - Automated compliance scanning
     - Issue escalation process

  Part 2: Knowledge management
  1. Design the cross-brand learning system
     - Winning copy patterns that transfer across brands
     - Market-specific insights (what works in Japan vs Brazil)
     - Testing learnings database
  2. Create the copy asset library
     - Shared hook templates
     - Universal body copy modules
     - Brand-specific CTA libraries
  3. Build the onboarding curriculum for new agency teams

  Part 3: Performance standards
  1. Define KPIs for copy quality across the organization
  2. Create the monthly copy performance review process
  3. Design the quarterly brand voice audit
  4. Build the annual copy strategy planning framework

  Part 4: Technology and tools
  1. Recommend the copy management tech stack
  2. Design the approval workflow in DAM/project management tools
  3. Set up automated quality checks (readability, compliance, brand voice)
  4. Integration with Meta Business Suite for publishing

  Then provide:
  - Enterprise ad copy governance playbook (executive summary)
  - Change management: how to implement governance without killing creativity
  - Measuring governance ROI: compliance cost reduction + performance lift
  - Scaling from 5 brands to 10: how the system grows

assertions:
  - type: llm_judge
    criteria: "The governance framework balances control with creativity — provides guardrails without making every ad feel templated or bureaucratic"
    weight: 0.30
    description: "Control-creativity balanced governance"
  - type: llm_judge
    criteria: "Role structure is realistic for enterprise — clear responsibilities prevent overlap while ensuring no blind spots in quality or compliance"
    weight: 0.25
    description: "Realistic enterprise role structure"
  - type: llm_judge
    criteria: "Cross-brand learning system captures real value — shows how beauty brand copy insights can inform food brand strategy through abstracted principles"
    weight: 0.25
    description: "Value-capturing cross-brand learning"
  - type: llm_judge
    criteria: "Change management advice is practical — addresses agency pushback, creative team resistance, and the common concern that governance kills innovation"
    weight: 0.20
    description: "Practical change management advice"
