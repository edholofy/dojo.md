meta:
  id: meta-ads-international-scaling
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Scale Meta ad copy across international markets with cultural adaptation and localization"
  tags: [meta-ads, international, localization, global, mastery]

state: {}

trigger: |
  Scaling Meta ads internationally requires more than translation.
  Cultural norms, humor, visual preferences, purchasing behavior, and
  platform usage patterns vary dramatically. A US ad that performs at
  3x ROAS may get 0.5x in Japan without cultural adaptation.

  Scale Meta ad copy for a D2C brand entering 5 new markets:

  Brand: "Peak Performance" — Premium fitness supplements
  Current market: US (proven ads, $500K/month spend, 4x ROAS)
  New markets: UK, Germany, Japan, Brazil, India
  Budget per new market: $20,000/month for first 3 months
  Products: Protein powder ($39), pre-workout ($35), recovery drink ($29)

  For each new market:
  1. Analyze the cultural context:
     - Fitness culture and supplement attitudes
     - Purchasing behavior on Meta platforms
     - Price sensitivity and premium willingness
     - Regulatory environment for supplement advertising
     - Local competitor landscape

  2. Adapt the winning US ads:
     US winning ad (protein powder):
     "Still mixing chalky protein shakes? 🤢

     Peak Performance Whey tastes like a milkshake, hits 30g protein,
     and mixes in 10 seconds flat. No clumps. No aftertaste. No BS.

     Join 200,000+ athletes who've made the switch.

     Try risk-free: 30-day money-back guarantee."

     For each market:
     a) Write the culturally adapted version (in English, noting
        what would change in local language)
     b) Explain every adaptation and why (tone, references, proof
        points, offer framing)
     c) Identify cultural pitfalls to avoid

  3. Write 2 market-specific original ads:
     a) One that leverages a local cultural insight
     b) One that addresses a market-specific objection

  4. Design the market testing plan:
     - Which ads to test first
     - How to allocate the $20K budget
     - Success metrics for market validation
     - Timeline to decide if the market is viable

  Then provide:
  - International Meta ad copy playbook (10 global markets)
  - Cultural sensitivity checklist for ad copy
  - Translation vs transcreation: when each is appropriate
  - How to work with local copywriters and agencies
  - International compliance guide (EU, APAC, LATAM regulations)
  - Currency and pricing display best practices by market

assertions:
  - type: llm_judge
    criteria: "Cultural adaptations are meaningful — not just translated but genuinely adapted for local fitness culture, humor, purchasing norms, and communication styles"
    weight: 0.30
    description: "Meaningful cultural adaptations"
  - type: llm_judge
    criteria: "Market-specific ads leverage genuine local insights — reference actual cultural phenomena, local fitness trends, or market-specific objections"
    weight: 0.25
    description: "Genuine local insight leverage"
  - type: llm_judge
    criteria: "Market entry plans are financially realistic — $20K/month budgets with practical testing strategies that can validate market viability"
    weight: 0.25
    description: "Financially realistic market entry"
  - type: llm_judge
    criteria: "The international compliance guide is accurate — covers EU advertising standards, Japan supplement regulations, Brazil ANVISA rules, and India FSSAI requirements"
    weight: 0.20
    description: "Accurate international compliance"
