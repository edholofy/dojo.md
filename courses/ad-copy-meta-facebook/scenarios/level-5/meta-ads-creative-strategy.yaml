meta:
  id: meta-ads-creative-strategy
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Build a creative strategy that unifies copy, visual, and format decisions for Meta ad campaigns"
  tags: [meta-ads, creative-strategy, holistic, copy-visual, mastery]

state: {}

trigger: |
  At the mastery level, ad copy doesn't exist separately from creative
  strategy. The best Meta ad copywriters think holistically — copy,
  visual, format, placement, and audience are all interconnected. A
  creative strategist designs the complete ad concept, not just the words.

  Build complete creative strategies for 4 campaign launches:

  Campaign 1: Product launch — Smart water bottle ($49)
  Features: Tracks hydration, glows to remind you to drink, syncs with
  health apps, 24-hour cold retention
  Goal: 5,000 units in first 30 days
  Task: Design the creative strategy unifying copy + visual + format

  Campaign 2: Brand repositioning — Budget skincare brand going premium
  Current perception: Affordable, drugstore quality
  Desired perception: Clinical-grade, dermatologist-developed
  Budget: $30,000/month for 3-month campaign
  Task: Design the repositioning creative strategy

  Campaign 3: Competitive conquest — Challenger meal kit vs HelloFresh
  Differentiators: 15-minute meals (vs 30+ min), 100% organic, no
  subscription required (order anytime)
  Goal: Acquire HelloFresh's dissatisfied customers
  Task: Design the competitive conquest creative strategy

  Campaign 4: Community building — Running shoe brand with ambassadors
  Brand: Premium running shoes ($150-$200)
  Assets: 50 brand ambassador UGC creators, race sponsorships, running
  club partnerships
  Goal: Build community that drives organic advocacy alongside paid
  Task: Design the community-driven creative strategy

  For each campaign:
  1. Write the creative brief (objective, audience, key message,
     tone, success metrics)
  2. Write the copy for 5 ad concepts:
     - Concept A: Hero/product-focused
     - Concept B: Story/narrative-focused
     - Concept C: Social proof/UGC-focused
     - Concept D: Educational/value-focused
     - Concept E: Emotional/lifestyle-focused
  3. For each concept, describe the visual, format, and placement
  4. Map the concepts to the campaign calendar (which runs when)
  5. Design the testing plan and success criteria

  Then provide:
  - Creative strategy framework: brief → concepts → execution → testing
  - How copywriters and designers collaborate on Meta ad creative
  - The concept matrix: mapping copy angles × visual approaches
  - Creative testing velocity: how many concepts to test per week
  - The creative strategist career path: from copywriter to strategist

assertions:
  - type: llm_judge
    criteria: "Creative strategies are holistic — copy, visual, format, and placement decisions are interconnected and reinforce each other"
    weight: 0.30
    description: "Holistic interconnected creative strategies"
  - type: llm_judge
    criteria: "Five concepts per campaign are genuinely different approaches — each takes a distinct creative angle that tests a different hypothesis about what resonates"
    weight: 0.25
    description: "Genuinely different campaign concepts"
  - type: llm_judge
    criteria: "Campaign calendars are strategic — concepts are sequenced to build on each other, with testing phases informing which concepts scale"
    weight: 0.25
    description: "Strategic campaign calendars"
  - type: llm_judge
    criteria: "The creative strategy framework is comprehensive — provides a repeatable process from brief through testing that any creative team could adopt"
    weight: 0.20
    description: "Comprehensive repeatable framework"
