meta:
  id: meta-ad-copy-roi
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Build a framework for measuring and maximizing the ROI of Meta ad copy optimization"
  tags: [meta-ads, roi, measurement, optimization, mastery]

state: {}

trigger: |
  Most brands can't quantify the ROI of better ad copy. They know
  "copy matters" but can't prove that investing in a copywriter vs
  writing ads themselves generates measurable returns. Building an
  ROI framework for ad copy requires isolating copy's contribution
  from creative, targeting, and bidding factors.

  Build a Meta ad copy ROI framework:

  Part 1: Baseline and impact modeling
  Given this Meta ad account data:

  Account: D2C fashion brand
  Monthly ad spend: $100,000
  Current metrics:
  - Average CTR: 0.9% (industry avg: 1.2%)
  - Average CPC: $1.85 (industry avg: $1.45)
  - Average CVR (post-click): 2.1%
  - Average ROAS: 2.8x
  - Monthly revenue from Meta: $280,000
  - Average order value: $72
  - Number of active ad sets: 45

  1. Calculate the revenue impact of improving CTR from 0.9% to 1.2%
  2. Calculate the revenue impact of improving CVR from 2.1% to 2.8%
  3. Calculate the combined impact of both improvements
  4. Model the 12-month revenue impact at current ad spend
  5. Calculate the acceptable investment in copy improvement

  Part 2: Attribution methodology
  1. Design the copy attribution model:
     - How to isolate copy's impact from creative (image/video) impact
     - Controlling for audience, bidding, and placement variables
     - Before/after analysis methodology
  2. Set up the controlled experiment:
     - Same audience, same creative, different copy → copy impact
     - Same copy, same audience, different creative → creative impact
     - How to run these tests on Meta's platform
  3. Handle the challenges:
     - Small sample sizes
     - Seasonal fluctuations
     - Algorithm learning periods
     - Multiple changes happening simultaneously

  Part 3: Cost-benefit analysis
  Calculate the ROI of 3 copy investment scenarios:
  1. DIY copy (business owner writes ads): $0 + time cost
  2. Freelance copywriter ($500-$2,000/month): cost vs improvement
  3. Agency copy team ($3,000-$8,000/month): cost vs improvement

  For each:
  - Expected performance improvement range
  - Break-even point
  - 12-month ROI projection (conservative, moderate, optimistic)

  Part 4: Ongoing optimization ROI
  1. The diminishing returns curve: when copy optimization stops adding value
  2. How to reinvest copy savings into testing budget
  3. The compounding effect: how testing learnings accumulate over time
  4. Building the case for ongoing copy investment

  Then provide:
  - Executive-ready ROI presentation template
  - How to present copy ROI to CMOs and CFOs
  - Benchmarks for copy improvement impact by industry
  - The meta-ROI: how measuring copy ROI improves overall ad performance

assertions:
  - type: llm_judge
    criteria: "Financial calculations are accurate — revenue impact projections use correct math based on the provided baseline metrics"
    weight: 0.30
    description: "Accurate financial calculations"
  - type: llm_judge
    criteria: "Attribution methodology is rigorous — properly controls for variables and provides practical experimental designs that work within Meta's platform"
    weight: 0.25
    description: "Rigorous attribution methodology"
  - type: llm_judge
    criteria: "Cost-benefit analysis is realistic — investment levels and expected improvements reflect actual market rates and achievable performance gains"
    weight: 0.25
    description: "Realistic cost-benefit analysis"
  - type: llm_judge
    criteria: "The executive presentation is persuasive — frames copy investment in business terms that resonate with financial decision-makers"
    weight: 0.20
    description: "Persuasive executive presentation"
