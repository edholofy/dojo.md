meta:
  id: full-meta-ad-system
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Design a complete Meta ad copy system for a brand launching paid social from scratch"
  tags: [meta-ads, system-design, full-funnel, launch, mastery]

state: {}

trigger: |
  You've been hired as the Head of Paid Social Copy for a D2C brand
  launching Meta advertising from scratch. Build the complete copy
  system — strategy, production, testing, and optimization.

  Brand: "Nomad Kitchen" — Premium outdoor cooking gear
  Products: 35 SKUs ($25-$350), average order value $85
  Monthly ad budget: $50,000
  Target: Outdoor enthusiasts 28-55, household income $80K+
  Goal: $250K monthly revenue from Meta ads within 6 months
  Team: 1 media buyer, 1 copywriter (you), 1 designer

  Build the complete system:

  Phase 1: Foundation (Month 1)
  1. Define the brand's Meta ad voice (distinct from website voice)
  2. Research and map the competitive landscape (what competitors run)
  3. Create the audience-message matrix (personas × funnel stages)
  4. Build the initial hook library (20 hooks across 5 categories)
  5. Create the copy testing framework

  Phase 2: Launch campaigns (Month 1-2)
  1. Write the full-funnel campaign structure:
     - TOFU: 3 awareness campaigns (brand story, education, UGC)
     - MOFU: 2 consideration campaigns (product demos, testimonials)
     - BOFU: 2 conversion campaigns (offers, retargeting)
  2. Write 5 ad variations per campaign (35 total ad sets)
  3. Set up the testing plan for the first 30 days
  4. Write the catalog ad copy for Advantage+ shopping

  Phase 3: Optimization (Month 2-4)
  1. Design the weekly copy review process
  2. Create the winning ad documentation system
  3. Build the creative refresh schedule
  4. Develop the seasonal campaign calendar (6-month view)
  5. Create the scaling playbook (how to add budget to winners)

  Phase 4: Scaling (Month 4-6)
  1. Expand to international markets (copy localization)
  2. Launch Messenger/WhatsApp ad campaigns
  3. Build the UGC creator brief system
  4. Create the AI-assisted copy production pipeline
  5. Design the monthly performance reporting framework

  Deliverables:
  - Complete brand ad voice guide
  - Audience-message matrix (visual)
  - 35 ad copy sets (written out)
  - Testing plan with hypothesis and metrics
  - 6-month campaign calendar
  - Reporting template

assertions:
  - type: llm_judge
    criteria: "The system is comprehensive and realistic — covers strategy through execution with practical timelines for a 3-person team and $50K monthly budget"
    weight: 0.25
    description: "Comprehensive realistic system"
  - type: llm_judge
    criteria: "The 35 ad copy sets demonstrate quality and variety — each takes a genuinely different approach while maintaining brand voice consistency"
    weight: 0.30
    description: "Quality variety in ad sets"
  - type: llm_judge
    criteria: "The testing plan is methodical — prioritizes high-impact elements first with clear success criteria and timeline for each test"
    weight: 0.25
    description: "Methodical testing plan"
  - type: llm_judge
    criteria: "Revenue projections are grounded — $250K/month from $50K ad spend implies 5x ROAS which is achievable but aggressive, with clear milestones"
    weight: 0.20
    description: "Grounded revenue projections"
