meta:
  id: meta-ads-ai-future
  level: 5
  course: ad-copy-meta-facebook
  type: output
  description: "Future-proof Meta ad copy skills for AI automation, Advantage+ evolution, and emerging ad formats"
  tags: [meta-ads, ai, future, automation, mastery]

state: {}

trigger: |
  Meta is rapidly automating ad creation through Advantage+ campaigns,
  AI-generated creative tools, and automated optimization. By 2027,
  Meta projects that 80% of ads will be AI-generated or AI-assisted.
  Copywriters must evolve from writing individual ads to designing
  copy systems that feed AI optimization.

  Future-proof your Meta ad copy skills:

  Part 1: AI-generated ad copy evaluation
  Meta's AI can now generate ad copy. Evaluate 5 AI-generated ads:

  AI ad 1 (e-commerce — shoes):
  "Step into comfort with our latest collection. Premium materials meet
  innovative design. Shop now and discover the difference quality makes.
  Free shipping on all orders."

  AI ad 2 (SaaS — project management):
  "Streamline your workflow with powerful project management tools.
  Collaborate seamlessly with your team. Start your free trial today
  and boost productivity."

  AI ad 3 (local — restaurant):
  "Experience unforgettable dining at [Restaurant Name]. Fresh ingredients,
  expert preparation, warm atmosphere. Reserve your table today and
  savor every moment."

  For each:
  1. Score the AI output (0-100)
  2. Identify what AI does well and where it falls flat
  3. Write the human-improved version
  4. Explain what human copywriters add that AI currently can't

  Part 2: Designing for AI optimization
  1. Write "copy inputs" for Meta's AI creative tools:
     - Key messages and value propositions (not full ads)
     - Brand voice parameters and guardrails
     - Audience insights that inform messaging
     - Tone and emotional direction guidelines
  2. Create the AI copy review rubric (what to check in AI output)
  3. Design the human-AI workflow for maximum efficiency

  Part 3: Emerging Meta ad formats
  Write copy for 3 emerging or evolving formats:
  1. AR/VR ads (Meta Quest, try-on experiences)
  2. AI-personalized ads (dynamic text based on user signals)
  3. Threads ads (Meta's Twitter competitor — conversational native ads)

  Part 4: The evolving copywriter role
  1. Skills that become MORE valuable as AI improves (strategy, brand
     voice, emotional intelligence, compliance)
  2. Skills that become LESS valuable (volume production, basic
     variations, formatting)
  3. How to position yourself as a Meta ad copy strategist vs writer
  4. Career path evolution for paid social copywriters

  Then provide:
  - Meta ad copy predictions for 2025-2030
  - How to work WITH AI rather than compete against it
  - Building a sustainable career in Meta ad copywriting
  - Skills to develop now for the AI-augmented future

assertions:
  - type: llm_judge
    criteria: "AI evaluation is fair and insightful — correctly identifies AI's strengths (consistency, speed) and weaknesses (generic messaging, lack of brand specificity, emotional flatness)"
    weight: 0.30
    description: "Fair insightful AI evaluation"
  - type: llm_judge
    criteria: "Human improvements clearly demonstrate added value — show what human creativity, brand understanding, and emotional intelligence add beyond AI generation"
    weight: 0.25
    description: "Clearly demonstrated human value-add"
  - type: llm_judge
    criteria: "The human-AI workflow is practical — shows how copywriters can use AI for first drafts and variations while adding strategic direction and quality control"
    weight: 0.25
    description: "Practical human-AI workflow"
  - type: llm_judge
    criteria: "Career predictions are grounded — based on current trends in Meta's product development and AI capabilities rather than speculation"
    weight: 0.20
    description: "Grounded career predictions"
