meta:
  id: ad-copy-for-beginners
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Write complete Meta ad sets for common business types — a beginner's guided walkthrough"
  tags: [meta-ads, beginner, complete-ads, walkthrough, basics]

state: {}

trigger: |
  Most small business owners write their first Meta ad with no training.
  This walkthrough guides through writing a complete ad for 4 common
  business types, explaining every decision and component.

  Write complete Meta ad sets for 4 business types:

  Business 1: Local restaurant (Italian, fine dining)
  Goal: Drive weekend reservations
  Budget: $500/month
  Audience: Couples 30-55 within 15 miles

  Business 2: Online Shopify store (pet accessories)
  Goal: Drive sales of a new product (dog bandana, $18)
  Budget: $1,000/month
  Audience: Dog owners 25-45, nationwide

  Business 3: Service business (house cleaning)
  Goal: Generate leads (free estimate requests)
  Budget: $750/month
  Audience: Homeowners 30-65 within 20 miles

  Business 4: Personal brand (life coach)
  Goal: Build email list (free webinar registration)
  Budget: $600/month
  Audience: Professional women 28-45 interested in career growth

  For each business, write a COMPLETE ad set with:
  1. Primary text (full copy with hook)
  2. Headline (under 40 characters)
  3. Description (under 30 characters)
  4. CTA button selection with reasoning
  5. 3 variations for A/B testing
  6. Targeting recommendation (interests, demographics, behaviors)
  7. Ad format recommendation (feed, Stories, Reels, carousel)

  Then provide:
  - Step-by-step guide: writing your first Meta ad in 30 minutes
  - The minimum viable ad: what you need to get started
  - Budget allocation advice for ad copy testing
  - 5 beginner mistakes that waste the most money
  - When to hire a professional vs DIY your ad copy

assertions:
  - type: llm_judge
    criteria: "All ad components are complete and properly formatted — each ad includes primary text, headline, description, CTA, and testing variations within Meta's character limits"
    weight: 0.25
    description: "Complete properly formatted ad components"
  - type: llm_judge
    criteria: "Copy is tailored to each business type — the restaurant ad feels local and inviting, the Shopify ad drives urgency, the service business focuses on trust, the coach ad inspires"
    weight: 0.30
    description: "Business-type-tailored copy"
  - type: llm_judge
    criteria: "A/B test variations test meaningful elements — each variation changes one significant element (hook approach, offer framing, or emotional angle) rather than just synonyms"
    weight: 0.25
    description: "Meaningful A/B test variations"
  - type: llm_judge
    criteria: "The beginner guide is genuinely helpful — provides a realistic 30-minute workflow that a non-marketer could follow to create a functional first ad"
    weight: 0.20
    description: "Genuinely helpful beginner guide"
