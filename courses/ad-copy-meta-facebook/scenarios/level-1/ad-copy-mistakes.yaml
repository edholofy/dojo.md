meta:
  id: ad-copy-mistakes
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Identify and fix common Meta ad copy mistakes that waste ad spend"
  tags: [meta-ads, mistakes, diagnosis, fixes, basics]

state: {}

trigger: |
  Most Meta ad copy fails for predictable reasons — generic messaging,
  missing hooks, weak CTAs, policy violations, and mismatched audience-
  copy alignment. These mistakes waste ad spend and tank ROAS.

  Diagnose and fix 6 real Meta ad copy failures:

  Ad 1 (E-commerce — jewelry store):
  "Check out our beautiful jewelry collection! We have rings, necklaces,
  bracelets, and more. High quality at affordable prices. Shop now and
  get free shipping! 💎✨💍"
  Headline: "Beautiful Jewelry"
  Problem type: Too generic, no specific audience or product

  Ad 2 (SaaS — CRM tool):
  "Our AI-powered CRM leverages machine learning algorithms and
  proprietary neural networks to optimize your sales pipeline through
  automated lead scoring, predictive analytics, and multi-channel
  attribution modeling."
  Headline: "Next-Gen CRM Platform"
  Problem type: Too technical, features without benefits

  Ad 3 (Local business — gym):
  "BEST GYM IN TOWN!!! 🏋️💪🔥 JOIN NOW!!! LIMITED SPOTS!!!
  DON'T MISS OUT!!! 50% OFF!!! HURRY!!! 🚨⚡🎯"
  Headline: "JOIN NOW!!!"
  Problem type: Spam signals, all caps, excessive emojis/punctuation

  Ad 4 (Course — photography):
  "Want to become a better photographer? Our course teaches you
  everything you need to know. It's really great. Students love it.
  Sign up today."
  Headline: "Photography Course"
  Problem type: Vague, no specifics, no proof, weak language

  Ad 5 (Health — supplement):
  "This miracle supplement CURES fatigue and ELIMINATES brain fog
  forever. Doctors don't want you to know about this ancient secret.
  100% guaranteed to work or your money back!"
  Headline: "Cure Your Fatigue"
  Problem type: Policy violations (health claims, misleading language)

  Ad 6 (Finance — investing app):
  "Make money while you sleep! Our users made $10,000+ last month
  with zero experience. Start investing today and watch your money
  grow automatically."
  Headline: "Make Money Fast"
  Problem type: Policy violations (income claims, unrealistic promises)

  For each ad:
  1. List every specific problem
  2. Categorize the problem type
  3. Explain why it hurts performance (low CTR, policy rejection,
     poor ROAS)
  4. Write the dramatically improved version
  5. Write the matching improved headline

  Then provide:
  - Meta ad copy quality checklist (15 items to review before publishing)
  - Top 10 Meta ad policy violations in copy (what gets ads rejected)
  - The "5-second test": how to evaluate ad copy quickly
  - Performance red flags: which metrics indicate copy problems

assertions:
  - type: llm_judge
    criteria: "Diagnoses are specific — identifies exact problems like 'no target audience identified,' 'jargon without benefit translation,' and 'health claims violating Meta policy'"
    weight: 0.25
    description: "Specific problem diagnoses"
  - type: llm_judge
    criteria: "Fixed versions are dramatically better — each rewrite addresses every identified problem with specific, audience-focused, compliant copy"
    weight: 0.30
    description: "Dramatically improved rewrites"
  - type: llm_judge
    criteria: "Policy violations are correctly identified — health claims, income claims, and misleading language are flagged with reference to specific Meta advertising policies"
    weight: 0.25
    description: "Correctly identified policy violations"
  - type: llm_judge
    criteria: "The quality checklist is practical — covers hook strength, audience specificity, benefit clarity, policy compliance, and CTA alignment"
    weight: 0.20
    description: "Practical quality checklist"
