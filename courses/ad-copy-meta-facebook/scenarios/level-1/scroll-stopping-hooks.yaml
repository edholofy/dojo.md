meta:
  id: scroll-stopping-hooks
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Write scroll-stopping hooks for Meta ad primary text that capture attention in 2 seconds"
  tags: [meta-ads, hooks, attention, primary-text, basics]

state: {}

trigger: |
  You have 2 seconds before a user scrolls past your ad. Only 125
  characters of primary text are visible before "See more..." — your
  hook must live in those 125 characters. The hook's only job is to
  stop the scroll and earn 3 more seconds of attention.

  Write scroll-stopping hooks for 6 different products using 6 different
  hook techniques:

  Technique 1: Call out the audience
  Product: Project management tool for freelancers ($12/month)
  Example pattern: "Freelancers: stop losing clients because of..."

  Technique 2: Bold/contrarian claim
  Product: Natural deodorant ($14)
  Example pattern: "Everything you've been told about deodorant is wrong."

  Technique 3: Curiosity gap
  Product: Online cooking class ($49)
  Example pattern: "The secret ingredient 90% of home cooks miss..."

  Technique 4: Pain point agitation
  Product: Back pain relief device ($79)
  Example pattern: "Still waking up with that nagging back pain?"

  Technique 5: Social proof lead
  Product: Language learning app ($9/month)
  Example pattern: "2 million people learned Spanish this way..."

  Technique 6: Before/after transformation
  Product: Skincare serum ($38)
  Example pattern: "My skin went from [problem] to [result] in 14 days."

  For each hook:
  1. Write 3 variations (all under 125 characters)
  2. Write the full primary text that follows the hook (up to 300 words)
  3. Explain why this hook technique works for this product
  4. Write a BAD hook for comparison (generic, boring, or too clever)
  5. Identify which audience temperature (cold/warm/hot) this hook
     works best for

  Then provide:
  - 10 proven hook formulas for Meta ads with fill-in templates
  - The psychology behind scroll-stopping: pattern interrupts,
    curiosity gaps, and self-identification
  - Hook mistakes that kill CTR (starting with brand name, being too
    vague, clickbait that doesn't deliver)

assertions:
  - type: llm_judge
    criteria: "All hooks are under 125 characters and genuinely attention-grabbing — they create immediate interest through specificity, emotion, or curiosity"
    weight: 0.30
    description: "Under-125-char attention-grabbing hooks"
  - type: llm_judge
    criteria: "Each hook technique is correctly demonstrated — call-outs directly address the target, contrarian claims challenge assumptions, curiosity gaps create information asymmetry"
    weight: 0.25
    description: "Correctly demonstrated hook techniques"
  - type: llm_judge
    criteria: "Full primary text delivers on the hook's promise — the expanded copy fulfills the curiosity or addresses the pain point introduced by the hook"
    weight: 0.25
    description: "Hook-fulfilling primary text"
  - type: llm_judge
    criteria: "Hook formulas are practical and adaptable — templates that any advertiser could fill in with their own product details"
    weight: 0.20
    description: "Practical adaptable hook formulas"
