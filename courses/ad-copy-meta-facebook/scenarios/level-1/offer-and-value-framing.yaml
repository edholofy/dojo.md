meta:
  id: offer-and-value-framing
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Frame offers and value propositions in Meta ads for maximum perceived value"
  tags: [meta-ads, offers, value-proposition, pricing, basics]

state: {}

trigger: |
  How you frame an offer determines whether people click. "$50 off"
  feels different from "Save 25%" which feels different from "Get $200
  of value for $149." The same offer, framed differently, can change
  click-through rates by 20-40%.

  Frame offers for 6 different products using different value framing
  techniques:

  Product 1: SaaS tool — $29/month, first month free
  Framing options: "Free for 30 days," "Save $29 today," "Try before
  you buy — $0 to start," "$0 risk trial"

  Product 2: E-commerce — Skincare set, $89 (normally $120)
  Framing options: "Save $31," "26% off," "$120 value for $89,"
  "Less than $15 per product," "Save enough for a free moisturizer"

  Product 3: Course — $499, payment plan available ($99/month × 6)
  Framing options: "Just $3.30/day," "$99/month investment,"
  "Less than your daily coffee," "6 easy payments"

  Product 4: Subscription box — $35/month, annual plan $300/year
  Framing options: "Save $120/year," "2 months free," "$25/month
  with annual," "Save 29%"

  Product 5: Free lead magnet — E-book download, $0
  Framing options: "Free guide," "Get instant access," "Download now
  — no credit card needed," "Your free [topic] blueprint"

  Product 6: Limited time — Flash sale, 40% off for 48 hours
  Framing options: "Ends tomorrow," "48 hours only," "Flash sale:
  40% off everything," "Best prices of the season"

  For each product:
  1. Write the full ad copy for each framing option
  2. Rank the framings from most to least effective
  3. Explain the psychology behind the top-ranked framing
  4. Write the headline and CTA that amplify the offer
  5. Identify which framing works for cold vs warm audiences

  Then provide:
  - Offer framing hierarchy: percentage off vs dollar off vs value
    stacking vs price comparison
  - The "Rule of 100": when to use percentage vs dollar amount
  - Urgency framing: ethical vs manipulative time pressure
  - Free trial/lead magnet framing best practices
  - Meta ad policy on pricing and offer claims

assertions:
  - type: llm_judge
    criteria: "Framing variations are genuinely different approaches — each reframes the same offer in a psychologically distinct way that changes perceived value"
    weight: 0.30
    description: "Psychologically distinct framing variations"
  - type: llm_judge
    criteria: "Rankings are well-reasoned — explains why '$3.30/day' outperforms '$499' for the course, or why 'Save $31' outperforms '26% off' for the skincare set, using pricing psychology"
    weight: 0.25
    description: "Well-reasoned framing rankings"
  - type: llm_judge
    criteria: "The Rule of 100 is correctly applied — percentage works better for items under $100, dollar amount works better for items over $100"
    weight: 0.25
    description: "Correctly applied Rule of 100"
  - type: llm_judge
    criteria: "Urgency framing guidelines distinguish ethical from manipulative — real deadlines and limited stock vs fake countdown timers and manufactured scarcity"
    weight: 0.20
    description: "Ethical vs manipulative urgency distinction"
