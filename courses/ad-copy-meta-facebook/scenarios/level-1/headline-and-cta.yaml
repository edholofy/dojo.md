meta:
  id: headline-and-cta
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Write compelling Meta ad headlines and choose the right CTA button for maximum click-through"
  tags: [meta-ads, headlines, cta, click-through, basics]

state: {}

trigger: |
  Meta ad headlines appear below the image/video and are limited to
  40 characters for full display. The headline works with the CTA button
  (Shop Now, Learn More, Sign Up, etc.) to drive the click. Together,
  they're the final push before a user decides to engage or scroll on.

  Write headlines + CTA combinations for 8 products:

  Product 1: SaaS email marketing tool (free trial)
  Product 2: Women's running shoes ($120)
  Product 3: Online fitness coaching ($59/month)
  Product 4: Home security camera ($99)
  Product 5: Children's educational toy ($35)
  Product 6: Meal kit delivery service ($9/serving)
  Product 7: Digital marketing course ($299)
  Product 8: Organic protein powder ($39)

  For each product:
  1. Write 3 headline variations (all under 40 characters)
  2. Select the best CTA button from Meta's options: Shop Now, Learn More,
     Sign Up, Subscribe, Book Now, Download, Get Offer, Contact Us
  3. Explain why this CTA matches the offer and funnel stage
  4. Write the headline-CTA combo that creates the strongest call to action
  5. Write a headline that's too long or too vague (for contrast)

  Then provide:
  - Headline formula cheat sheet: 10 templates under 40 characters
  - CTA button selection guide: which CTA for which offer type
  - How headline and CTA work together (they should say different things,
    not repeat each other)
  - Headline testing priorities: what to test first for maximum lift
  - Common headline mistakes (too generic, too long, not matching the ad)

assertions:
  - type: llm_judge
    criteria: "All headlines are under 40 characters and compelling — each creates urgency, communicates value, or sparks curiosity within the character limit"
    weight: 0.30
    description: "Under-40-char compelling headlines"
  - type: llm_judge
    criteria: "CTA selections match the offer — 'Shop Now' for direct purchase, 'Learn More' for consideration, 'Sign Up' for free trials, with clear reasoning"
    weight: 0.25
    description: "Offer-matching CTA selections"
  - type: llm_judge
    criteria: "Headline-CTA combos are complementary — the headline and button say different but aligned things that together create a complete call to action"
    weight: 0.25
    description: "Complementary headline-CTA combos"
  - type: llm_judge
    criteria: "The formula cheat sheet is practical — provides 10 usable templates that any advertiser can adapt for their product"
    weight: 0.20
    description: "Practical headline formula cheat sheet"
