meta:
  id: meta-ad-formats
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Write copy optimized for each Meta ad format — feed, Stories, Reels, and carousel"
  tags: [meta-ads, formats, stories, reels, carousel, basics]

state: {}

trigger: |
  Each Meta ad format has different character limits, viewing behavior,
  and copy requirements. Feed ads allow longer text, Stories are full-screen
  with minimal text overlay, Reels are short-form video with captions, and
  carousel ads tell a multi-card story.

  Write format-optimized copy for ONE product across 4 Meta ad formats:

  Product: Plant-based protein powder ($39)
  Features: 25g protein per serving, 6 flavors, no artificial sweeteners,
  third-party tested, smooth texture, soy-free and gluten-free
  Target: Health-conscious adults 25-45 who work out regularly

  Format 1: Feed ad (single image)
  - Primary text: up to 2,200 characters (125 visible)
  - Headline: 40 characters
  - Description: 30 characters
  - CTA button: choose appropriate option
  Task: Write the full feed ad copy

  Format 2: Stories ad (full-screen vertical)
  - Primary text: 125 characters (overlaid on image/video)
  - Minimal text — the visual does heavy lifting
  - Swipe-up CTA
  Task: Write the Stories ad text overlay and CTA

  Format 3: Reels ad (short-form video)
  - Caption: up to 2,200 characters (72 visible)
  - Script/voiceover text: 15-30 seconds
  - Native, authentic feel (not polished commercial)
  Task: Write the Reels ad caption and video script

  Format 4: Carousel ad (multi-card)
  - Primary text: 125 characters (shared across cards)
  - Per-card headline: 40 characters each
  - Per-card description: 20 characters each
  - 3-5 cards telling a sequential story
  Task: Write all carousel card copy

  For each format:
  1. Write the complete ad copy within format constraints
  2. Explain how viewing behavior differs for this format
  3. Identify what copy element matters most in this format
  4. Write the creative brief notes (what the visual should show)
  5. Show a common mistake for this format

  Then provide:
  - Format selection guide: which format for which campaign objective
  - Character limit reference sheet for all Meta ad formats
  - How to adapt one message across multiple formats efficiently
  - Format-specific CTR benchmarks and best practices

assertions:
  - type: llm_judge
    criteria: "Each format's copy respects its unique constraints — feed ads leverage longer text, Stories use minimal overlay, Reels feel native and authentic, carousel tells a sequential story"
    weight: 0.30
    description: "Format-respecting copy constraints"
  - type: llm_judge
    criteria: "Viewing behavior differences are correctly identified — Stories are consumed quickly (5 seconds), Reels demand entertainment, feed allows more reading time"
    weight: 0.25
    description: "Correct viewing behavior identification"
  - type: llm_judge
    criteria: "Carousel cards tell a coherent story — each card builds on the previous one with a clear progression that leads to the CTA on the final card"
    weight: 0.25
    description: "Coherent carousel story progression"
  - type: llm_judge
    criteria: "The format selection guide matches objectives — awareness campaigns favor Reels/Stories, conversion campaigns favor feed/carousel, with data-backed reasoning"
    weight: 0.20
    description: "Objective-matching format guide"
