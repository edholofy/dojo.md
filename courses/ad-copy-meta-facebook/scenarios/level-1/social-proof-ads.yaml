meta:
  id: social-proof-ads
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Incorporate social proof into Meta ad copy to build instant credibility"
  tags: [meta-ads, social-proof, testimonials, credibility, basics]

state: {}

trigger: |
  Social proof is the #1 trust builder in paid social. Ads with
  testimonials see 4x higher CTR, and user-generated content (UGC)
  style ads outperform branded content by 50%. Social proof in Meta
  ads comes in many forms: customer quotes, statistics, expert
  endorsements, and crowd validation.

  Write Meta ads incorporating social proof for 5 products:

  Product 1: Project management SaaS ($29/month)
  Available proof: "Saved us 10 hours per week" — Sarah K., Marketing
  Director | 15,000+ teams use it | 4.8/5 on G2 (2,400 reviews)

  Product 2: Teeth whitening kit ($39)
  Available proof: "My dentist asked what I've been doing differently"
  — @jessicam on TikTok | 500,000+ kits sold | Before/after photos
  from real customers

  Product 3: Online bookkeeping service ($149/month)
  Available proof: "I stopped dreading tax season" — Mike R., Freelance
  Designer | Backed by CPA-certified accountants | 98% client retention

  Product 4: Smart home doorbell ($129)
  Available proof: "Caught a package thief on day one" — verified buyer |
  Featured on CNET and Wirecutter | 50,000+ homes protected

  Product 5: Kids coding bootcamp ($199/session)
  Available proof: "My 10-year-old built her first app in 3 weeks" —
  Parent review | 94% of parents rate 5 stars | Taught by ex-Google
  engineers

  For each product:
  1. Write the primary text leading with social proof
  2. Write the primary text with social proof in the middle
  3. Write the primary text closing with social proof
  4. Explain which placement works best for this product and why
  5. Write the headline that reinforces the social proof

  Then provide:
  - 6 types of social proof for Meta ads (ranked by effectiveness):
    customer testimonials, UGC content, statistics, expert endorsements,
    media mentions, crowd validation
  - How to format testimonials in ad copy (quotation marks, attribution)
  - FTC disclosure requirements for testimonials and endorsements in ads
  - How to create UGC-style ad copy that feels organic, not promotional

assertions:
  - type: llm_judge
    criteria: "Social proof is naturally integrated — testimonials and statistics feel like part of the ad narrative, not awkwardly inserted or disconnected"
    weight: 0.30
    description: "Naturally integrated social proof"
  - type: llm_judge
    criteria: "Placement variations create genuinely different effects — leading with proof builds immediate trust while closing with proof reinforces the CTA"
    weight: 0.25
    description: "Distinct placement effect variations"
  - type: llm_judge
    criteria: "Social proof types are ranked with reasoning — explains why customer testimonials outperform statistics for certain products based on purchase psychology"
    weight: 0.25
    description: "Reasoned social proof ranking"
  - type: llm_judge
    criteria: "FTC disclosure guidelines are accurate — covers material connections, typical results disclaimers, and paid endorsement disclosure requirements"
    weight: 0.20
    description: "Accurate FTC disclosure guidelines"
