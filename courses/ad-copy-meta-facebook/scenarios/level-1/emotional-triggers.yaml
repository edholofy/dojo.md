meta:
  id: emotional-triggers
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Use emotional triggers and power words in Meta ad copy to drive action"
  tags: [meta-ads, emotions, power-words, persuasion, basics]

state: {}

trigger: |
  Emotional ads outperform rational ads by 2x in driving purchase intent.
  Meta ads thrive on emotional triggers because users are in a browsing
  (not searching) mindset — they need to FEEL something to stop scrolling.
  Different emotions drive different actions.

  Write Meta ads using 6 different emotional triggers:

  Emotion 1: FOMO (Fear of Missing Out)
  Product: Limited-edition sneaker drop ($180)
  Task: Create urgency and exclusivity through ad copy

  Emotion 2: Aspiration / Pride
  Product: Premium business course ($997)
  Task: Tap into the desire to be successful and respected

  Emotion 3: Belonging / Community
  Product: Running club app ($12/month)
  Task: Make the reader feel part of something bigger

  Emotion 4: Relief / Peace of Mind
  Product: Identity theft protection ($15/month)
  Task: Address anxiety and position the product as the solution

  Emotion 5: Curiosity / Discovery
  Product: Mystery subscription box ($35/month)
  Task: Create irresistible curiosity without revealing too much

  Emotion 6: Nostalgia / Warmth
  Product: Personalized photo book ($29)
  Task: Evoke emotional memories and the desire to preserve them

  For each emotional trigger:
  1. Write the full primary text (200-300 words)
  2. Write the headline (under 40 characters)
  3. Identify the specific power words used and why they work
  4. Write a rational-only version for comparison
  5. Explain when this emotion is appropriate vs when it backfires

  Then provide:
  - 50 power words for Meta ads organized by emotion
  - The emotional trigger selection guide: which emotion for which
    product category
  - Ethical boundaries: emotional persuasion vs manipulation
  - How to test emotional angles against each other
  - Emotional copy that converts vs emotional copy that engages
    but doesn't convert

assertions:
  - type: llm_judge
    criteria: "Each emotional trigger is authentically evoked — FOMO feels urgent without being manipulative, aspiration feels inspiring without being unrealistic"
    weight: 0.30
    description: "Authentically evoked emotions"
  - type: llm_judge
    criteria: "Power words are strategically placed — used in hooks and CTAs where they have the most impact, not scattered randomly throughout the copy"
    weight: 0.25
    description: "Strategically placed power words"
  - type: llm_judge
    criteria: "Emotional vs rational comparisons demonstrate the difference — rational versions feel flat and uninspiring next to emotional versions"
    weight: 0.25
    description: "Clear emotional vs rational contrast"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly defined — distinguishes between legitimate emotional appeal and manipulative fear-mongering or false scarcity"
    weight: 0.20
    description: "Clearly defined ethical boundaries"
