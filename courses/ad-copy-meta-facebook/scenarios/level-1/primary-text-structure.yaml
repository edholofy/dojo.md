meta:
  id: primary-text-structure
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Structure Meta ad primary text for maximum readability and engagement"
  tags: [meta-ads, primary-text, structure, formatting, basics]

state: {}

trigger: |
  Meta ad primary text can be up to 2,200 characters, but only 125 are
  visible before "See more..." The best ads use strategic formatting —
  line breaks, emojis (sparingly), short paragraphs, and bullet points —
  to make the expanded text scannable and engaging.

  Write primary text in 3 different length/format styles for 4 products:

  Product 1: Fitness app with AI personal trainer ($19/month)
  Product 2: Luxury scented candle ($45)
  Product 3: Business credit card (0% intro APR)
  Product 4: Pet DNA testing kit ($99)

  For each product, write:

  Style A: Short-form (under 150 characters total)
  - Everything visible without "See more"
  - Punchy, single message, immediate CTA

  Style B: Medium-form (300-500 characters)
  - Hook visible, key benefit below fold
  - 2-3 short paragraphs with line breaks

  Style C: Long-form (800-1,500 characters)
  - Hook visible, story or detailed benefits below fold
  - Formatted with line breaks, bullets, or emojis
  - For warm/hot audiences who need more info

  For each style:
  1. Write the complete primary text
  2. Mark where the "See more..." cutoff falls
  3. Explain when this length performs best
  4. Write the matching headline and description

  Then provide:
  - Primary text length guide: when to use short, medium, and long
  - Formatting best practices: line breaks, emojis, bullets, and symbols
  - The "See more" strategy: how to craft the visible hook that makes
    users expand the text
  - Emoji usage guidelines: when emojis help vs hurt ad performance
  - Text-to-image ratio: how much primary text is optimal

assertions:
  - type: llm_judge
    criteria: "All three lengths are complete and functional — short-form delivers one clear message, medium-form expands with key benefits, long-form tells a compelling story"
    weight: 0.30
    description: "Complete functional length variations"
  - type: llm_judge
    criteria: "The 'See more' cutoff is strategically placed — the visible 125 characters create enough interest to drive expansion without giving away the complete message"
    weight: 0.25
    description: "Strategic 'See more' cutoff placement"
  - type: llm_judge
    criteria: "Length recommendations match scenarios — short for impulse products and retargeting, medium for consideration-stage offers, long for high-ticket or complex products"
    weight: 0.25
    description: "Scenario-matching length recommendations"
  - type: llm_judge
    criteria: "Formatting guidelines are specific — provides clear rules for emoji placement, line break frequency, and symbol usage with examples"
    weight: 0.20
    description: "Specific formatting guidelines"
