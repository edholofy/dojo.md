meta:
  id: ad-copy-formulas
  level: 1
  course: ad-copy-meta-facebook
  type: output
  description: "Apply proven copywriting formulas (AIDA, PAS, BAB) to Meta ad primary text"
  tags: [meta-ads, formulas, aida, pas, bab, basics]

state: {}

trigger: |
  Copywriting formulas provide reliable structures for ad copy that
  converts. The three most effective for Meta ads are AIDA (Attention,
  Interest, Desire, Action), PAS (Problem, Agitate, Solution), and
  BAB (Before, After, Bridge).

  Apply all 3 formulas to 3 different products:

  Product 1: Noise-canceling headphones ($199)
  Target audience: Remote workers who struggle to focus at home

  Product 2: Meal prep delivery service ($65/week)
  Target audience: Busy professionals who want to eat healthy but have
  no time to cook

  Product 3: Online yoga subscription ($15/month)
  Target audience: Stressed office workers looking for work-life balance

  For each product, write the FULL primary text using each formula:

  Formula 1: AIDA
  - Attention: Hook that stops the scroll
  - Interest: Build curiosity with a relevant detail
  - Desire: Paint the picture of life with this product
  - Action: Clear CTA that drives the click

  Formula 2: PAS
  - Problem: State the pain point directly
  - Agitate: Make the problem feel urgent and costly
  - Solution: Position your product as the answer

  Formula 3: BAB
  - Before: Describe their current frustrating situation
  - After: Paint the ideal outcome they want
  - Bridge: Show how your product gets them there

  For each formula × product combination (9 total):
  1. Write the full primary text (150-250 words)
  2. Label each section of the formula
  3. Write the matching headline (under 40 characters)
  4. Explain why this formula works best for this product/audience

  Then provide:
  - Formula selection guide: which formula works best for which
    product type and audience temperature
  - 3 additional formulas for Meta ads: FAB, 4Ps, Star-Story-Solution
  - How to adapt formulas for short-form (Stories/Reels) vs long-form
    (Feed) ad copy

assertions:
  - type: llm_judge
    criteria: "All 3 formulas are correctly applied — AIDA follows the attention-interest-desire-action sequence, PAS follows problem-agitate-solve, BAB follows before-after-bridge"
    weight: 0.30
    description: "Correctly applied copywriting formulas"
  - type: llm_judge
    criteria: "Each formula produces genuinely different copy — the same product described through AIDA, PAS, and BAB should feel like 3 different ads, not the same ad rearranged"
    weight: 0.25
    description: "Genuinely different formula outputs"
  - type: llm_judge
    criteria: "The formula selection guide provides clear criteria — matches formulas to scenarios based on audience awareness level, product complexity, and emotional vs rational purchase"
    weight: 0.25
    description: "Clear formula selection criteria"
  - type: llm_judge
    criteria: "Short-form adaptations are practical — shows how to condense each formula for Stories/Reels (15-30 second attention window) without losing effectiveness"
    weight: 0.20
    description: "Practical short-form adaptations"
