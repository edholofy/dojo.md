meta:
  id: industry-specific-ad-copy
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy optimized for specific industries with unique challenges"
  tags: [meta-ads, industry-specific, vertical, specialization, advanced]

state: {}

trigger: |
  Different industries have dramatically different ad copy requirements.
  What works for e-commerce (urgency, discounts) fails for B2B SaaS
  (education, credibility). Each industry has unique compliance rules,
  audience expectations, and conversion paths.

  Write industry-optimized Meta ad campaigns for 6 industries:

  Industry 1: Real estate (luxury home listing, $1.2M)
  Challenges: Special ad category restrictions, high-ticket decision,
  emotional purchase, local targeting
  Task: Write 2 ad variations within housing category constraints

  Industry 2: Education (online MBA program, $25,000)
  Challenges: Long sales cycle, multiple decision influencers, ROI
  justification, accreditation credibility
  Task: Write 2 ad variations for different funnel stages

  Industry 3: Healthcare (telemedicine platform, $49/visit)
  Challenges: Health claims restrictions, HIPAA awareness, trust building,
  removing stigma
  Task: Write 2 ad variations that build trust without health claims

  Industry 4: Coaching/consulting ($3,000 program)
  Challenges: High-ticket digital product, guru skepticism, income claim
  restrictions, building credibility
  Task: Write 2 ad variations that build authority without hype

  Industry 5: Non-profit (environmental charity, donation ask)
  Challenges: Emotional without guilt-tripping, specific impact framing,
  recurring donation conversion
  Task: Write 2 ad variations (one-time donation, monthly recurring)

  Industry 6: App install (fitness tracking app, free with premium)
  Challenges: Competitive space, quick value demonstration, app store
  conversion, install-to-open gap
  Task: Write 2 ad variations for app install campaigns

  For each industry:
  1. Write 2 complete ad variations
  2. Identify the industry-specific copy rules
  3. List the words/phrases to avoid for this industry
  4. Recommend the optimal ad format and placement
  5. Provide industry CTR and CPA benchmarks

  Then provide:
  - Industry copy quick-reference guide (dos and don'ts for 10 industries)
  - How to research industry-specific ad best practices
  - Adapting general copywriting skills to specialized verticals
  - Compliance checklists by industry

assertions:
  - type: llm_judge
    criteria: "Copy is genuinely industry-appropriate — real estate copy respects housing category rules, healthcare avoids health claims, coaching avoids income hype"
    weight: 0.30
    description: "Industry-appropriate copy"
  - type: llm_judge
    criteria: "Industry-specific challenges are addressed in the copy — luxury real estate uses lifestyle framing, education emphasizes ROI, non-profit creates impact framing"
    weight: 0.25
    description: "Challenge-addressing industry copy"
  - type: llm_judge
    criteria: "The quick-reference guide is practical — provides immediately usable dos and don'ts for each industry that a copywriter could reference before writing"
    weight: 0.25
    description: "Practical industry quick-reference"
  - type: llm_judge
    criteria: "Benchmarks are realistic — industry CTR and CPA figures reflect actual Meta advertising performance data"
    weight: 0.20
    description: "Realistic industry benchmarks"
