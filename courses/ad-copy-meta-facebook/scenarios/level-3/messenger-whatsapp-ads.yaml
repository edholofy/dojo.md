meta:
  id: messenger-whatsapp-ads
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for Messenger and WhatsApp click-to-message campaigns"
  tags: [meta-ads, messenger, whatsapp, conversational, advanced]

state: {}

trigger: |
  Click-to-message ads (Messenger, WhatsApp, Instagram DM) generate
  conversations instead of website visits. These ads have 3-5x higher
  engagement rates because they feel personal and low-commitment. The
  ad copy must invite conversation, not demand a purchase.

  Write click-to-message ad campaigns for 5 businesses:

  Business 1: Real estate agent
  Goal: Start conversations with potential home buyers
  Platform: Messenger
  Task: Write ad copy that invites a casual conversation about their
  home search, plus the opening chatbot message sequence (3 messages)

  Business 2: Custom jewelry brand
  Goal: Drive custom order inquiries
  Platform: WhatsApp
  Task: Write ad copy that invites design consultations, plus the
  greeting message and first 3 automated responses

  Business 3: Local gym / fitness studio
  Goal: Drive class trial bookings
  Platform: Instagram DM
  Task: Write ad copy that invites DM conversation about fitness goals,
  plus the DM welcome sequence

  Business 4: B2B consulting firm
  Goal: Qualify and book discovery calls
  Platform: Messenger
  Task: Write ad copy that starts a conversation about business
  challenges, plus qualifying question sequence

  Business 5: Online tutoring service
  Goal: Match parents with tutors
  Platform: WhatsApp
  Task: Write ad copy that invites parents to discuss their child's
  needs, plus the intake conversation flow

  For each business:
  1. Write the Meta ad (primary text, headline, CTA — "Send Message"
     or "Send WhatsApp Message")
  2. Write the conversation opening message (what the user sees when
     they click)
  3. Write the first 3-5 automated response messages (chatbot sequence)
  4. Write the handoff message (transitioning from bot to human)
  5. Explain why conversational ads work for this business

  Then provide:
  - Click-to-message ad copy formula: Invite, Don't Sell
  - Conversation design principles for ad-driven chats
  - When Messenger vs WhatsApp vs Instagram DM is most appropriate
  - Chatbot conversation flow best practices
  - Measuring conversational ad success (conversation rate, lead
    quality, response time impact)

assertions:
  - type: llm_judge
    criteria: "Ad copy invites conversation rather than demanding purchase — uses language like 'Let's talk about...' or 'Message us to...' rather than 'Buy now'"
    weight: 0.30
    description: "Conversation-inviting ad copy"
  - type: llm_judge
    criteria: "Chatbot sequences feel natural — automated messages read like a helpful person, not a robotic form, with genuine conversational flow"
    weight: 0.25
    description: "Natural-feeling chatbot sequences"
  - type: llm_judge
    criteria: "Platform selection is correct — WhatsApp for international/personal, Messenger for US/quick, Instagram DM for visual/lifestyle businesses"
    weight: 0.25
    description: "Correct platform selection"
  - type: llm_judge
    criteria: "The bot-to-human handoff is smooth — transitions naturally when the conversation requires human input without jarring the user"
    weight: 0.20
    description: "Smooth bot-to-human handoff"
