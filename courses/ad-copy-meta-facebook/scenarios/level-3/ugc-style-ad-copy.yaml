meta:
  id: ugc-style-ad-copy
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write UGC-style Meta ad copy and creator briefs that feel authentic and native"
  tags: [meta-ads, ugc, creator-content, authenticity, advanced]

state: {}

trigger: |
  UGC-style ads outperform branded content by 50% on Meta. They feel
  like organic posts rather than advertisements, which builds trust
  and reduces ad blindness. The key is writing scripts and captions
  that sound like a real person sharing their experience — not a brand
  reading a script.

  Write UGC-style ad content for 5 products:

  Product 1: Skincare brand — Acne clearing kit ($49)
  UGC style: "My honest review after 30 days" video testimonial
  Creator persona: College student, 21, struggled with acne
  Task: Write the video script and caption as the creator would say it

  Product 2: Kitchen gadget — Electric milk frother ($25)
  UGC style: "Watch me make a cafe-quality latte at home" demo
  Creator persona: Work-from-home parent, 34, coffee lover
  Task: Write the TikTok-native script with product demo

  Product 3: Fitness supplement — Pre-workout ($35)
  UGC style: "Why I switched to [brand] and never looked back"
  Creator persona: Gym enthusiast, 28, tried many supplements
  Task: Write the talking-head script with gym footage

  Product 4: Pet product — Dog anxiety vest ($39)
  UGC style: "My rescue dog during fireworks — before and after this vest"
  Creator persona: Dog mom, 30, emotional pet owner
  Task: Write the emotional before/after script

  Product 5: Tech product — Portable charger ($29)
  UGC style: "This saved me at a music festival" story
  Creator persona: Adventurous 25-year-old, frequently traveling
  Task: Write the story-based script with travel footage

  For each UGC ad:
  1. Write the complete video script (with delivery notes: tone, pacing,
     where to show product)
  2. Write the ad caption (primary text that accompanies the video)
  3. Write the creator brief (what to send to a real UGC creator)
  4. Write the headline and CTA
  5. Explain why this UGC angle works for this product

  Then provide:
  - UGC ad script formulas: 5 proven structures
  - How to write scripts that don't sound scripted
  - Creator brief template: what to include when hiring UGC creators
  - UGC vs polished content: when each performs better on Meta
  - How to repurpose UGC across organic and paid social
  - Legal considerations: FTC disclosure for paid UGC partnerships

assertions:
  - type: llm_judge
    criteria: "Scripts sound like real people — conversational language, personal anecdotes, natural pauses, and authentic emotion rather than marketing speak"
    weight: 0.30
    description: "Authentic-sounding UGC scripts"
  - type: llm_judge
    criteria: "Creator personas are consistent — the college student sounds different from the work-from-home parent, each with appropriate language and references"
    weight: 0.25
    description: "Consistent creator personas"
  - type: llm_judge
    criteria: "Creator briefs are professional and complete — include brand guidelines, key talking points, content requirements, and usage rights without being overly restrictive"
    weight: 0.25
    description: "Professional complete creator briefs"
  - type: llm_judge
    criteria: "FTC disclosure guidance is accurate — covers #ad, #sponsored, material connection disclosure, and platform-specific requirements"
    weight: 0.20
    description: "Accurate FTC UGC disclosure guidance"
