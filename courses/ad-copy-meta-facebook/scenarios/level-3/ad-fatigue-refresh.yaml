meta:
  id: ad-fatigue-refresh
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Diagnose ad fatigue and create copy refresh strategies that maintain performance"
  tags: [meta-ads, ad-fatigue, creative-refresh, performance, advanced]

state: {}

trigger: |
  Ad fatigue occurs when your audience sees the same ad too many times,
  causing CTR to drop and CPA to rise. Most Meta ads show fatigue
  signals within 7-14 days. The fix isn't always a complete rewrite —
  strategic refreshes can extend ad life significantly.

  Diagnose and fix ad fatigue for 4 campaigns:

  Campaign 1: E-commerce — Skincare brand
  Original winning ad (ran for 3 weeks, now fatigued):
  "Your skin deserves better than drugstore moisturizer.

  Our Vitamin C serum is made with 20% L-ascorbic acid — the same
  concentration dermatologists recommend. No fillers. No fragrance.
  Just results you can see in 14 days.

  ⭐ 4.8/5 from 3,200+ customers

  Try it risk-free with our 30-day money-back guarantee."

  Fatigue signals: CTR dropped from 2.1% to 0.8%, frequency hit 4.2,
  CPM increased 35%

  Campaign 2: SaaS — Project management tool
  Original winning ad (ran for 2 weeks, fatigue starting):
  Primary text about saving 10 hours/week, customer testimonial
  Fatigue signals: CTR dropped from 1.4% to 0.9%, CPA up 28%

  Campaign 3: Online course — Photography masterclass
  Original winning ad (ran for 4 weeks, severe fatigue):
  Primary text about transforming amateur photos into professional work
  Fatigue signals: CTR dropped from 1.8% to 0.4%, conversions near zero

  Campaign 4: Subscription box — Gourmet coffee
  Original winning ad (ran for 1 week, premature fatigue):
  Primary text about first box 50% off
  Fatigue signals: CTR dropped from 3.2% to 1.5% in 5 days

  For each campaign:
  1. Diagnose the cause of fatigue (frequency, audience saturation,
     offer exhaustion, seasonal relevance)
  2. Write 3 refresh approaches:
     a) Light refresh: same message, different angle or hook
     b) Medium refresh: same offer, new story/framework
     c) Full creative swap: new angle entirely
  3. Write the complete ad for each refresh level
  4. Recommend which refresh level to deploy first
  5. Design the creative rotation schedule going forward

  Then provide:
  - Ad fatigue early warning signals: which metrics to monitor
  - Creative rotation framework: how many ads to run simultaneously
  - The "angle library" approach: cataloging angles for future refreshes
  - Refresh vs replace: decision framework
  - Evergreen ad strategies: copy that resists fatigue longer

assertions:
  - type: llm_judge
    criteria: "Fatigue diagnoses correctly identify the cause — distinguishes between audience saturation, creative exhaustion, offer fatigue, and seasonal decline"
    weight: 0.25
    description: "Correct fatigue cause identification"
  - type: llm_judge
    criteria: "Three refresh levels are genuinely different — light refresh tweaks the hook, medium refresh reframes the story, full swap introduces an entirely new angle"
    weight: 0.30
    description: "Genuinely different refresh levels"
  - type: llm_judge
    criteria: "Refreshed ads maintain the original's strengths — the core value proposition and winning elements are preserved while introducing enough novelty to re-engage"
    weight: 0.25
    description: "Strength-preserving refreshed ads"
  - type: llm_judge
    criteria: "The creative rotation framework is practical — provides specific recommendations for how many ads to rotate, when to introduce new creatives, and how to phase out fatigued ones"
    weight: 0.20
    description: "Practical creative rotation framework"
