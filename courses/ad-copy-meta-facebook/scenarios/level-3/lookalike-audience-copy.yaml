meta:
  id: lookalike-audience-copy
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy optimized for different lookalike audience percentages and seed sources"
  tags: [meta-ads, lookalike, audience, targeting, advanced]

state: {}

trigger: |
  Lookalike audiences are Meta's most powerful targeting tool — they
  find new users who resemble your best customers. But different
  lookalike percentages (1%, 3%, 5%, 10%) and different seed audiences
  (purchasers, high-value customers, email subscribers) require
  different copy approaches to maximize performance.

  Write Meta ad copy for 3 products across different lookalike strategies:

  Product 1: D2C supplements brand ($35-$55)
  Seed A: 1% lookalike of past purchasers (highest match)
  Seed B: 5% lookalike of past purchasers (broader)
  Seed C: 1% lookalike of email subscribers (different quality)
  Task: Write ads tailored to each lookalike's expected awareness level

  Product 2: B2B SaaS tool ($99/month)
  Seed A: 1% lookalike of free-trial-to-paid converters
  Seed B: 3% lookalike of webinar attendees
  Seed C: 5% lookalike of website visitors (broadest, lowest intent)
  Task: Write ads matching the qualification level of each lookalike

  Product 3: E-commerce fashion ($40-$120)
  Seed A: 1% lookalike of repeat purchasers (high LTV)
  Seed B: 1% lookalike of Instagram engagers
  Seed C: 3% lookalike of cart abandoners
  Task: Write ads matching the psychographic profile of each seed

  For each lookalike:
  1. Write the complete ad (primary text, headline, CTA)
  2. Explain how the seed audience quality affects copy strategy
  3. Identify what assumptions you can make about this audience
  4. Recommend the offer type and CTA intensity
  5. Define the success metrics for this specific lookalike

  Then provide:
  - Lookalike audience copy framework: how copy changes as % increases
  - Seed audience quality hierarchy: which seeds produce best lookalikes
  - How to test copy across lookalike types simultaneously
  - Combining lookalike targeting with copy-based qualification
  - When lookalike audiences lose effectiveness and how copy adapts

assertions:
  - type: llm_judge
    criteria: "Copy adapts to lookalike precision — 1% lookalike ads assume higher familiarity and use direct offers while 5-10% ads use more educational, brand-building copy"
    weight: 0.30
    description: "Precision-adapted lookalike copy"
  - type: llm_judge
    criteria: "Seed source differences are reflected in copy — purchaser lookalikes get product-focused ads while email subscriber lookalikes get value-first content"
    weight: 0.25
    description: "Seed-source-reflected copy differences"
  - type: llm_judge
    criteria: "The framework clearly maps lookalike percentage to copy strategy — provides specific guidelines for how messaging changes from 1% to 10%"
    weight: 0.25
    description: "Clear percentage-to-strategy mapping"
  - type: llm_judge
    criteria: "Testing recommendations are practical — provides actionable methods for comparing lookalike performance across seed types and percentages"
    weight: 0.20
    description: "Practical lookalike testing methods"
