meta:
  id: competitive-ad-analysis
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Analyze competitor Meta ads and write copy that differentiates and outperforms"
  tags: [meta-ads, competitive, analysis, differentiation, advanced]

state: {}

trigger: |
  Meta's Ad Library makes competitor ads transparent. Analyzing what
  competitors run, how long they run it, and what angles they use
  reveals opportunities to differentiate. The goal isn't to copy —
  it's to find gaps and write better copy that stands out.

  Analyze competitor ads and write differentiated copy for 3 categories:

  Category 1: D2C mattress brands
  Competitor ads found in Ad Library:
  - Brand A: Leads with "$200 off" discount + "100-night trial"
  - Brand B: Leads with "Doctor recommended" + back pain testimonials
  - Brand C: Leads with "Best mattress of 2025" + press logos

  Your brand: Eco-friendly mattress ($1,099), organic materials,
  carbon-neutral, no chemicals, 365-night trial

  Category 2: Online course creators (business/marketing)
  Competitor ads found in Ad Library:
  - Guru A: "I made $1M in 90 days — here's how" (income claim heavy)
  - Guru B: Long testimonial videos from successful students
  - Guru C: "Free training reveals the 3 secrets to..." (lead magnet)

  Your brand: Evidence-based marketing course ($497), taught by
  practitioners (not gurus), focused on fundamentals, money-back guarantee

  Category 3: Meal delivery services
  Competitor ads found in Ad Library:
  - Service A: "$4.99/serving — cheapest meal kit" (price leader)
  - Service B: "Chef-prepared, just heat and eat" (convenience)
  - Service C: "150+ menu options every week" (variety)

  Your brand: Farm-to-table meal delivery ($8.99/serving), locally
  sourced within 100 miles, seasonal menu, supports local farmers,
  zero-waste packaging

  For each category:
  1. Analyze the competitive landscape: what angles are saturated?
  2. Identify the whitespace: which angles are NOT being used?
  3. Write 3 differentiated ad variations that avoid competitor angles
  4. Write the "anti-competitor" ad that explicitly positions against
     the category norms (without naming competitors)
  5. Predict which angle will outperform and why

  Then provide:
  - How to use Meta Ad Library for competitive research
  - Competitive positioning framework: category leader, challenger,
    niche specialist, and disruptor approaches
  - When to follow category conventions vs when to break them
  - How to monitor competitor ad changes and respond
  - Differentiation through copy: 10 techniques to stand out in
    a crowded feed

assertions:
  - type: llm_judge
    criteria: "Competitive analysis correctly identifies saturated angles — recognizes that discounting, income claims, and price leadership are overused in each category"
    weight: 0.25
    description: "Correct saturated angle identification"
  - type: llm_judge
    criteria: "Differentiated ads use genuinely unique angles — eco-friendly mattress doesn't compete on price, evidence-based course doesn't use income claims"
    weight: 0.30
    description: "Genuinely unique differentiated angles"
  - type: llm_judge
    criteria: "Anti-competitor positioning is effective — implicitly contrasts against category norms without naming competitors or appearing defensive"
    weight: 0.25
    description: "Effective anti-competitor positioning"
  - type: llm_judge
    criteria: "The Ad Library research guide is practical — provides step-by-step instructions for analyzing competitor ads on Meta's platform"
    weight: 0.20
    description: "Practical Ad Library research guide"
