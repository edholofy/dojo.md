meta:
  id: seasonal-event-campaigns
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for seasonal events, holidays, and sales campaigns"
  tags: [meta-ads, seasonal, holidays, campaigns, advanced]

state: {}

trigger: |
  Seasonal campaigns drive 25-40% of annual Meta ad revenue for most
  brands. Holiday ad copy must balance urgency with authenticity,
  compete in a crowded feed where CPMs increase 30-50%, and create
  emotional connection beyond just discounts.

  Write seasonal Meta ad campaigns for 5 key events:

  Event 1: Black Friday / Cyber Monday
  Brand: E-commerce electronics store
  Offer: Up to 60% off, free shipping, extended returns
  Challenge: Standing out when every brand is running deals
  Task: Write 3 ad variations that cut through BFCM noise

  Event 2: Valentine's Day
  Brand: Artisan chocolate company ($35-$120 gift boxes)
  Offer: Free personalized note + gift wrapping
  Challenge: Reaching gift buyers, not self-purchasers
  Task: Write 2 ad variations (for him, for her — inclusive framing)

  Event 3: Back-to-school (August)
  Brand: EdTech learning app for kids ($12/month)
  Offer: First 2 months free
  Challenge: Reaching parents who are budget-conscious
  Task: Write 2 ad variations (parent-focused, student achievement)

  Event 4: New Year (January)
  Brand: Fitness equipment brand (home gym set, $499)
  Offer: Payment plan + free setup guide
  Challenge: Competing with gym memberships and New Year resolve fatigue
  Task: Write 2 ad variations that acknowledge resolution skepticism

  Event 5: Mother's Day / Father's Day
  Brand: Personalized gift shop ($25-$150 range)
  Offer: Guaranteed delivery by holiday + gift wrapping
  Challenge: Last-minute buyers, gift anxiety, "what do I get them?"
  Task: Write 3 ad variations (early bird, last minute, gift guide)

  For each event:
  1. Write the complete ad variations (primary text, headline, CTA)
  2. Recommend the campaign timeline (when to start, peak, wind down)
  3. Write the pre-event teaser ad
  4. Write the last-chance urgency ad
  5. Write the post-event follow-up ad

  Then provide:
  - Meta seasonal ad calendar: key dates and recommended lead times
  - How to adjust copy when CPMs spike during holidays
  - Emotional vs promotional seasonal copy: finding the balance
  - Post-holiday strategies: converting seasonal buyers into
    year-round customers
  - Budget pacing strategies for seasonal campaigns

assertions:
  - type: llm_judge
    criteria: "Seasonal ads stand out from generic holiday messaging — each avoids cliche holiday copy and finds a unique angle for the brand's seasonal campaign"
    weight: 0.30
    description: "Standout non-cliche seasonal ads"
  - type: llm_judge
    criteria: "Campaign timelines are realistic — pre-event teasers, peak period intensity, and wind-down timing reflect actual advertising best practices"
    weight: 0.25
    description: "Realistic campaign timelines"
  - type: llm_judge
    criteria: "The emotional-promotional balance is appropriate — Valentine's Day ads lead with emotion while Black Friday ads lead with deals, matching shopper mindset"
    weight: 0.25
    description: "Appropriate emotional-promotional balance"
  - type: llm_judge
    criteria: "Post-holiday conversion strategy is actionable — provides specific approaches to retain seasonal buyers beyond the holiday period"
    weight: 0.20
    description: "Actionable post-holiday retention"
