meta:
  id: dynamic-creative-optimization
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write text variations for Meta's dynamic creative optimization and Advantage+ campaigns"
  tags: [meta-ads, dco, advantage-plus, automation, advanced]

state: {}

trigger: |
  Meta's Advantage+ creative and Dynamic Creative Optimization (DCO)
  automatically test combinations of text, images, and CTAs to find the
  best-performing combinations for each audience segment. Copywriters
  must provide multiple text variations that work independently and in
  any combination.

  Write DCO text variation sets for 4 campaigns:

  Campaign 1: E-commerce — Sustainable activewear ($45-$89 range)
  Write:
  - 5 primary text variations (each must work as standalone)
  - 5 headline variations
  - 3 description variations
  - Explain which combinations would work best and worst

  Campaign 2: SaaS — Email automation platform ($49/month)
  Write:
  - 5 primary text variations (different angles: save time, increase
    revenue, reduce manual work, social proof, competitive advantage)
  - 5 headline variations
  - 3 description variations
  - Predict the top 3 performing combinations

  Campaign 3: Local service — Plumbing company
  Write:
  - 4 primary text variations (emergency, routine, seasonal, social proof)
  - 4 headline variations
  - 3 description variations
  - Identify which shouldn't be paired (conflicting messages)

  Campaign 4: Online course — Digital marketing certification ($499)
  Write:
  - 5 primary text variations (career growth, ROI, fear of being left
    behind, community, course content)
  - 5 headline variations
  - 3 description variations
  - Recommend the audience segments each variation serves best

  For each campaign:
  1. Write all text variations with clear differentiation
  2. Ensure every combination is coherent (no conflicting messages)
  3. Tag each variation with the angle/approach it uses
  4. Identify which metric each variation optimizes (CTR, CVR, CPA)
  5. Write the creative brief for accompanying visual variations

  Then provide:
  - DCO copywriting rules: how to write modular text that works in
    any combination
  - Advantage+ creative optimization: what it does and how to feed it
  - How to analyze DCO results and learn from winning combinations
  - When DCO outperforms manual ad sets vs when manual control is better
  - Common DCO mistakes (conflicting variations, too-similar options)

assertions:
  - type: llm_judge
    criteria: "All variations work in any combination — no conflicting messages or awkward pairings between primary text, headline, and description"
    weight: 0.30
    description: "Combination-safe text variations"
  - type: llm_judge
    criteria: "Variations are genuinely different angles — each takes a distinct approach rather than rephrasing the same message, giving DCO meaningful combinations to test"
    weight: 0.25
    description: "Genuinely different variation angles"
  - type: llm_judge
    criteria: "DCO rules are clear and practical — provides specific guidelines for writing modular copy that maintains coherence across random combinations"
    weight: 0.25
    description: "Clear practical DCO rules"
  - type: llm_judge
    criteria: "Analysis guidance is actionable — explains how to read DCO results to understand which angles, emotions, and framings work for which audience segments"
    weight: 0.20
    description: "Actionable DCO analysis guidance"
