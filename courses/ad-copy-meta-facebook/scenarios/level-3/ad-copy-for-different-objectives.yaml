meta:
  id: ad-copy-for-different-objectives
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy optimized for different campaign objectives — awareness, traffic, leads, and sales"
  tags: [meta-ads, objectives, campaign-types, optimization, advanced]

state: {}

trigger: |
  Meta offers 6 campaign objectives, and each requires fundamentally
  different copy. Awareness campaigns optimize for reach and recall,
  traffic campaigns optimize for clicks, lead campaigns optimize for
  form completions, and sales campaigns optimize for purchases. Using
  conversion-focused copy in an awareness campaign (or vice versa)
  wastes budget.

  Write objective-specific ads for ONE product across all 4 main
  campaign types:

  Product: Premium noise-canceling earbuds ($149)
  Brand: Mid-market audio brand with moderate brand recognition

  Objective 1: Awareness campaign
  Goal: Maximize brand recall and reach
  Optimization: Reach and frequency
  Copy approach: Brand story, product category education, emotional
  connection — NOT a hard sell
  Task: Write 2 awareness ad variations

  Objective 2: Traffic campaign
  Goal: Drive clicks to product page
  Optimization: Link clicks or landing page views
  Copy approach: Curiosity and value proposition — enough to earn the
  click, not to close the sale
  Task: Write 2 traffic ad variations

  Objective 3: Lead generation campaign
  Goal: Collect email addresses via lead form
  Offer: "5 Mistakes People Make Buying Wireless Earbuds" (PDF guide)
  Optimization: Lead form completions
  Copy approach: Value of the lead magnet, low commitment
  Task: Write 2 lead gen ad variations (with lead form questions)

  Objective 4: Sales campaign
  Goal: Drive direct purchases
  Offer: Free shipping + 30-day trial
  Optimization: Purchases or ROAS
  Copy approach: Urgency, social proof, risk reversal — close the sale
  Task: Write 2 sales ad variations

  For each objective:
  1. Write 2 complete ad variations
  2. Explain how the copy differs from other objectives
  3. Define the primary and secondary metrics to track
  4. Recommend the audience targeting approach
  5. Write the ad creative brief (what the visual should accomplish)

  Then provide:
  - Campaign objective selection guide: which objective for which goal
  - How copy changes across objectives (specificity, CTA intensity,
    information density)
  - Common mistakes: using sales copy in awareness campaigns and
    awareness copy in sales campaigns
  - How to sequence objectives in a full-funnel strategy
  - Budget split recommendations by objective

assertions:
  - type: llm_judge
    criteria: "Copy genuinely differs by objective — awareness ads build brand story, traffic ads drive curiosity, lead ads sell the magnet, sales ads close with urgency"
    weight: 0.30
    description: "Objective-differentiated copy"
  - type: llm_judge
    criteria: "CTA intensity matches the objective — awareness uses soft CTAs, traffic uses 'Learn More,' lead gen uses 'Download,' sales uses 'Shop Now'"
    weight: 0.25
    description: "Objective-matching CTA intensity"
  - type: llm_judge
    criteria: "The objective selection guide is clear — provides specific criteria for choosing between objectives based on business goals and funnel stage"
    weight: 0.25
    description: "Clear objective selection guide"
  - type: llm_judge
    criteria: "Common mistakes are insightful — explains specific examples of mismatched copy-objective combinations and why they underperform"
    weight: 0.20
    description: "Insightful common mistakes"
