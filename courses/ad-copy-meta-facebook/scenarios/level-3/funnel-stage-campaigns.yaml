meta:
  id: funnel-stage-campaigns
  level: 3
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for every funnel stage — TOFU, MOFU, and BOFU campaigns"
  tags: [meta-ads, funnel, tofu-mofu-bofu, full-funnel, advanced]

state: {}

trigger: |
  A full-funnel Meta ad strategy uses different copy at each stage:
  Top of Funnel (TOFU) builds awareness, Middle of Funnel (MOFU)
  drives consideration, and Bottom of Funnel (BOFU) converts. Each
  stage requires different messaging, offers, and CTAs.

  Build a complete full-funnel ad campaign for 3 businesses:

  Business 1: B2C — Premium mattress brand ($999-$2,499)
  TOFU goal: Awareness — reach people who don't know they need a new mattress
  MOFU goal: Consideration — educate about mattress technology and differentiators
  BOFU goal: Conversion — drive purchases with trial offer

  Business 2: B2B SaaS — Accounting software for small business ($39/month)
  TOFU goal: Awareness — reach small business owners during tax stress
  MOFU goal: Consideration — demonstrate time savings and accuracy
  BOFU goal: Conversion — drive free trial signups

  Business 3: D2C — Specialty coffee subscription ($18/month)
  TOFU goal: Awareness — reach coffee enthusiasts who buy grocery store beans
  MOFU goal: Consideration — educate about specialty coffee difference
  BOFU goal: Conversion — drive first subscription with intro offer

  For each business × funnel stage (9 total):
  1. Write the complete ad (primary text, headline, description, CTA)
  2. Define the audience targeting for this stage
  3. Explain the campaign objective (awareness, traffic, conversions)
  4. Recommend the ad format (video, carousel, single image)
  5. Write the success metrics specific to this funnel stage
  6. Explain how this stage feeds into the next

  Then provide:
  - Full-funnel copy framework: what changes at each stage (message,
    tone, offer, CTA intensity)
  - Budget allocation by funnel stage (typical splits)
  - How to build audiences that flow from TOFU to MOFU to BOFU
  - Funnel leakage: where people drop off and how copy can fix it
  - When to skip stages (some products don't need full-funnel)

assertions:
  - type: llm_judge
    criteria: "TOFU copy educates without selling — introduces a problem or idea that makes the audience receptive to the brand without pushing a purchase"
    weight: 0.25
    description: "Education-first TOFU copy"
  - type: llm_judge
    criteria: "MOFU copy bridges awareness to intent — provides enough information and proof to move the audience from 'interesting' to 'I need this'"
    weight: 0.25
    description: "Intent-building MOFU copy"
  - type: llm_judge
    criteria: "BOFU copy drives immediate action — uses urgency, risk reversal, and direct CTAs appropriate for an audience ready to convert"
    weight: 0.25
    description: "Action-driving BOFU copy"
  - type: llm_judge
    criteria: "The full-funnel framework is comprehensive — clearly maps what changes at each stage with specific guidelines for messaging, offers, and metrics"
    weight: 0.25
    description: "Comprehensive full-funnel framework"
