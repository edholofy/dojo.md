meta:
  id: saas-lead-gen-ads
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for SaaS and lead generation campaigns that drive qualified signups"
  tags: [meta-ads, saas, lead-generation, b2b, intermediate]

state: {}

trigger: |
  SaaS and lead generation ads on Meta face a unique challenge: the
  conversion (signup, trial, demo) is free, but the audience isn't
  actively searching. You must create demand, educate, and qualify
  leads through ad copy alone. Average SaaS CTR on Meta is 0.88%.

  Write Meta ad copy for 5 SaaS/lead gen scenarios:

  Scenario 1: Free trial offer
  Product: Project management tool for agencies ($39/month)
  Offer: 14-day free trial, no credit card required
  Audience: Agency owners and project managers
  Task: Drive trial signups from cold audience

  Scenario 2: Lead magnet download
  Product: Email marketing platform ($29/month)
  Lead magnet: "50 Email Subject Lines That Get 40%+ Open Rates" (PDF)
  Audience: Small business owners, e-commerce marketers
  Task: Drive downloads to build email list for nurture sequence

  Scenario 3: Webinar registration
  Product: HR compliance software ($99/month)
  Webinar: "3 HR Compliance Mistakes That Cost Companies $50K+" (live)
  Audience: HR Directors and People Operations leads
  Task: Drive webinar registrations from warm audience

  Scenario 4: Demo request (B2B)
  Product: Enterprise CRM ($500/month)
  Offer: Personalized demo with solutions consultant
  Audience: VP Sales, Revenue Operations, C-suite at companies 50-500
  Task: Drive qualified demo requests from targeted decision-makers

  Scenario 5: Freemium to paid upgrade
  Product: Design tool with free tier ($15/month for Pro)
  Audience: Current free users who've created 5+ designs
  Task: Drive upgrade conversions from engaged free users

  For each scenario:
  1. Write the complete ad (primary text, headline, description, CTA)
  2. Write the lead form questions (for lead form ads) or landing page
     headline (for traffic ads)
  3. Qualify leads in the copy — signal who this is for (and who it's not)
  4. Address the "Why should I give you my info?" objection
  5. Write the follow-up email subject line that continues the ad's message

  Then provide:
  - SaaS ad copy formula: Problem → Tease Solution → Social Proof → CTA
  - Lead magnet ad copy best practices (value-first, not product-first)
  - How to qualify leads in ad copy without reducing volume
  - Lead form ads vs landing page ads: when each performs better
  - Cost per lead benchmarks by industry and offer type

assertions:
  - type: llm_judge
    criteria: "Copy creates demand rather than captures it — educates cold audiences about problems they may not know they have before positioning the product"
    weight: 0.30
    description: "Demand-creating copy"
  - type: llm_judge
    criteria: "Lead qualification is built into the copy — signals who the product is for through language, use cases, and specificity without explicitly saying 'not for you'"
    weight: 0.25
    description: "Copy-embedded lead qualification"
  - type: llm_judge
    criteria: "Lead magnet copy sells the content, not the product — focuses on the immediate value of the download rather than pitching the paid product directly"
    weight: 0.25
    description: "Content-selling lead magnet copy"
  - type: llm_judge
    criteria: "The SaaS formula is clearly explained with examples — provides a reusable structure specifically designed for B2B and SaaS products on Meta"
    weight: 0.20
    description: "Clear SaaS formula with examples"
