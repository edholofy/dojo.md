meta:
  id: local-business-ads
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for local businesses that drive foot traffic and local leads"
  tags: [meta-ads, local-business, geo-targeting, foot-traffic, intermediate]

state: {}

trigger: |
  Local businesses are Meta's bread and butter — restaurants, salons,
  gyms, dentists, and service businesses all benefit from geo-targeted
  ads. Local ad copy must reference location, build community trust,
  and drive in-person actions. Average local business CTR is 1.3%.

  Write Meta ad copy for 5 local business types:

  Business 1: Family dental practice
  Goal: New patient appointments
  Offer: Free initial consultation + X-rays ($250 value)
  Radius: 10 miles from office
  Unique selling point: Open Saturdays, same-day emergencies

  Business 2: Craft brewery / taproom
  Goal: Drive weekend foot traffic
  Offer: Happy hour specials (Fri-Sun, 3-6 PM)
  Radius: 15 miles
  Unique selling point: Rotating taps, live music, dog-friendly patio

  Business 3: Home remodeling contractor
  Goal: Generate leads for kitchen/bathroom remodels
  Offer: Free in-home estimate
  Radius: 25 miles
  Unique selling point: 15 years experience, 500+ completed projects,
  licensed and insured, financing available

  Business 4: Yoga studio
  Goal: Drive first-class trials
  Offer: First class free, $79/month unlimited after
  Radius: 5 miles
  Unique selling point: Hot yoga, vinyasa, meditation, beginner-friendly,
  new student special

  Business 5: Auto detailing service (mobile)
  Goal: Drive bookings
  Offer: Full detail starting at $149, we come to you
  Radius: 20 miles
  Unique selling point: Mobile service (home or office), eco-friendly
  products, 5-star Google rating (200+ reviews)

  For each business:
  1. Write the primary text (reference the local area naturally)
  2. Write the headline and description
  3. Select the CTA button and explain why
  4. Write a "neighbor-to-neighbor" style ad (community trust)
  5. Write a "special offer" style ad (promotion-focused)
  6. Recommend targeting strategy (location, interests, behaviors)

  Then provide:
  - Local ad copy formula: [Neighborhood] + [Problem/Desire] +
    [Local Trust Signal] + [Offer] + [CTA]
  - How to reference location without being awkward
  - Building trust for local businesses (reviews, years in business,
    community involvement)
  - Special ad categories: housing, employment, and credit restrictions
  - Local business ad budget allocation guide

assertions:
  - type: llm_judge
    criteria: "Local references feel natural — mentions the area organically rather than awkward insertions like 'Attention [City Name] residents!'"
    weight: 0.30
    description: "Natural local references"
  - type: llm_judge
    criteria: "Both ad styles work for each business — the community trust style builds relationships while the offer style drives immediate action"
    weight: 0.25
    description: "Effective dual ad styles"
  - type: llm_judge
    criteria: "Trust signals are appropriate for local businesses — Google reviews, years in business, licensing, and community involvement rather than national brand signals"
    weight: 0.25
    description: "Appropriate local trust signals"
  - type: llm_judge
    criteria: "Special ad category restrictions are accurately noted — identifies which businesses require special categories and how copy must adapt"
    weight: 0.20
    description: "Accurate special category restrictions"
