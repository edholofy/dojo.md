meta:
  id: audience-temperature-copy
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write different ad copy for cold, warm, and hot audiences based on awareness level"
  tags: [meta-ads, audience-targeting, cold-warm-hot, funnel, intermediate]

state: {}

trigger: |
  The same product needs completely different ad copy for different
  audience temperatures. Cold audiences (never heard of you) need
  education and trust. Warm audiences (engaged but haven't bought)
  need social proof and urgency. Hot audiences (past customers) need
  loyalty offers and new products.

  Write audience-specific ad copy for 4 products across 3 temperature levels:

  Product 1: Online course platform ($49/month)
  Cold: Interest-based targeting (people interested in online learning)
  Warm: Website visitors who viewed pricing page
  Hot: Current free-tier users

  Product 2: Premium skincare brand ($45 face serum)
  Cold: Lookalike audience based on past buyers
  Warm: Instagram engagers and video viewers (50%+)
  Hot: Past purchasers (bought 60+ days ago)

  Product 3: B2B HR software ($99/user/month)
  Cold: Job title targeting (HR Directors, People Ops)
  Warm: Downloaded the free HR compliance guide
  Hot: Free trial users who haven't converted

  Product 4: Subscription meal kit ($65/week)
  Cold: Interest-based (healthy eating, cooking, meal planning)
  Warm: Visited site, abandoned checkout
  Hot: Cancelled subscribers (churned 30+ days ago)

  For each product × audience temperature (12 total):
  1. Write the full primary text
  2. Write the headline and CTA
  3. Identify the key message shift from cold → warm → hot
  4. Explain what objections this audience has at this stage
  5. Recommend the ad format and creative direction

  Then provide:
  - Audience temperature framework: how copy changes at each level
  - Copy ladder: awareness → consideration → conversion → retention
  - How to use custom audiences to match copy to audience temperature
  - Retargeting copy best practices (don't repeat the same ad!)
  - Frequency capping and copy rotation strategies

assertions:
  - type: llm_judge
    criteria: "Copy genuinely shifts between temperatures — cold ads educate and build trust, warm ads handle objections and create urgency, hot ads leverage familiarity and offer incentives"
    weight: 0.30
    description: "Genuine temperature-based copy shifts"
  - type: llm_judge
    criteria: "Objection handling is stage-appropriate — cold audiences doubt the category, warm audiences doubt the brand, hot audiences need a reason to act now"
    weight: 0.25
    description: "Stage-appropriate objection handling"
  - type: llm_judge
    criteria: "The copy ladder framework is clear and actionable — shows exactly how messaging evolves from awareness through retention"
    weight: 0.25
    description: "Clear actionable copy ladder"
  - type: llm_judge
    criteria: "Retargeting copy avoids the repetition trap — each retargeting stage introduces new information or angles rather than showing the same ad again"
    weight: 0.20
    description: "Non-repetitive retargeting copy"
