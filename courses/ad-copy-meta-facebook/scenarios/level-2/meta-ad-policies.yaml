meta:
  id: meta-ad-policies
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write compelling Meta ad copy that complies with all advertising policies and avoids rejection"
  tags: [meta-ads, policies, compliance, rejection, intermediate]

state: {}

trigger: |
  Meta rejects approximately 20% of ads due to policy violations. The
  most common rejections involve health claims, income promises, personal
  attributes targeting, misleading content, and special category
  restrictions. Understanding policies is essential for keeping ads live.

  Write policy-compliant ads for 6 sensitive product categories:

  Category 1: Weight loss supplement ($39)
  Policy concerns: Health claims, before/after imagery rules, body
  shaming, unrealistic promises
  Task: Write a compliant ad that still drives sales

  Category 2: Financial investment app ($0 to start)
  Policy concerns: Income claims, guaranteed returns, misleading
  performance data
  Task: Write a compliant ad that communicates opportunity without promises

  Category 3: Real estate (new condo development)
  Policy concerns: Special ad category (housing), cannot target by age,
  gender, or zip code; restricted audience options
  Task: Write a compliant housing ad with broader targeting

  Category 4: Job recruiting (tech company hiring)
  Policy concerns: Special ad category (employment), cannot target by age,
  gender, or zip code
  Task: Write a compliant employment ad

  Category 5: CBD wellness products ($34)
  Policy concerns: Varies by region, cannot make health claims, some
  regions prohibit entirely
  Task: Write a compliant ad for regions where CBD ads are allowed

  Category 6: Dating/relationship coaching ($99 course)
  Policy concerns: Personal attributes, cannot imply user's relationship
  status, body image, or personal shortcomings
  Task: Write a compliant ad without triggering personal attribute flags

  For each category:
  1. List the specific Meta policies that apply
  2. Write the compliant ad (primary text, headline, CTA)
  3. Show a non-compliant version and explain why it would be rejected
  4. Identify the trigger words and phrases to avoid
  5. Explain the appeal process if an ad is incorrectly rejected

  Then provide:
  - Meta ad policy cheat sheet: 15 most common rejection reasons
  - Trigger words that get ads flagged by automated review
  - Special ad categories explained: housing, employment, credit
  - How to write health and wellness ads within policy limits
  - Financial product ad guidelines (disclaimers, required disclosures)
  - The appeal process: how to get wrongly rejected ads approved

assertions:
  - type: llm_judge
    criteria: "Compliant ads are still compelling — they drive conversions despite policy restrictions, using creative approaches to communicate value within guidelines"
    weight: 0.30
    description: "Compelling despite compliance"
  - type: llm_judge
    criteria: "Policy references are accurate — correctly identifies specific Meta advertising policies for each category including special ad categories"
    weight: 0.25
    description: "Accurate policy references"
  - type: llm_judge
    criteria: "Non-compliant examples clearly show the violations — each rejected version includes specific language that would trigger automated or manual review"
    weight: 0.25
    description: "Clear violation demonstrations"
  - type: llm_judge
    criteria: "Trigger word list is comprehensive — covers health claims ('cure,' 'guarantee'), personal attributes ('Are you overweight?'), and income promises ('Make $X')"
    weight: 0.20
    description: "Comprehensive trigger word list"
