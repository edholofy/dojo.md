meta:
  id: ab-testing-ad-copy
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Design and analyze A/B tests for Meta ad copy elements"
  tags: [meta-ads, ab-testing, optimization, testing, intermediate]

state: {}

trigger: |
  The best Meta advertisers test continuously. A/B testing ad copy
  can improve CTR by 25-50% over time. But testing everything at once
  gives you data on nothing. Strategic testing isolates one variable
  at a time and builds winning ad copy through iteration.

  Design A/B tests for 5 ad copy elements:

  Test 1: Hook approach
  Product: Fitness coaching app ($19/month)
  Version A: Pain-point hook — "Tired of starting over every Monday?"
  Version B: Aspiration hook — "What if you could love working out?"
  Version C: Social proof hook — "Join 500K+ who finally got consistent."
  Variables: Hook type | Control: everything else
  Task: Write all 3 complete ads and predict the winner

  Test 2: Primary text length
  Product: Luxury watch ($899)
  Version A: Short (under 125 characters — no "See more")
  Version B: Medium (300 characters)
  Version C: Long (1,000+ characters — detailed story)
  Variables: Length | Control: same hook, headline, CTA
  Task: Write all 3 versions and predict which converts best

  Test 3: Offer framing
  Product: SaaS reporting tool ($49/month, annual plan available)
  Version A: "Try free for 14 days"
  Version B: "Save 30% with annual plan"
  Version C: "Just $1.63/day for unlimited reports"
  Variables: Offer frame | Control: same hook, benefits, CTA
  Task: Write all 3 and predict which drives more trials

  Test 4: Emotional angle
  Product: Home security system ($29/month)
  Version A: Fear-based — "Is your family safe right now?"
  Version B: Peace-of-mind — "Sleep soundly knowing your home is protected"
  Version C: Practical — "24/7 monitoring for less than $1/day"
  Variables: Emotional tone | Control: same offer, format
  Task: Write all 3 and analyze psychological impact

  Test 5: CTA approach
  Product: Online cooking class ($49)
  Version A: Direct CTA — "Sign up now and start cooking tonight"
  Version B: Soft CTA — "See what you'll learn in your first class"
  Version C: Urgency CTA — "Only 50 spots left — reserve yours"
  Variables: CTA intensity | Control: same primary text, headline
  Task: Write all 3 and predict which drives highest conversion

  For each test:
  1. Write all versions as complete ads
  2. Predict the winner with reasoning (cite psychology or benchmarks)
  3. Define the primary metric (CTR, CPA, ROAS, CVR)
  4. Recommend the test duration and budget
  5. Describe how to iterate based on results

  Then provide:
  - A/B testing roadmap: what to test first (hook → headline → offer →
    length → emotional angle → CTA)
  - Statistical significance for Meta ads: when to call a winner
  - How to use Meta's A/B testing tool vs manual testing
  - Common testing mistakes (testing too many variables, ending too early)
  - How to build a "winning ad" iteratively through sequential testing

assertions:
  - type: llm_judge
    criteria: "All test versions are high-quality — each variation is a genuine contender, not a straw man, making the test meaningful"
    weight: 0.25
    description: "High-quality test versions"
  - type: llm_judge
    criteria: "Predictions are backed by reasoning — cite specific psychological principles or industry benchmarks rather than guessing"
    weight: 0.30
    description: "Reasoning-backed predictions"
  - type: llm_judge
    criteria: "The testing roadmap is strategically ordered — tests highest-impact elements first (hook, headline) before lower-impact elements (description, emoji usage)"
    weight: 0.25
    description: "Strategically ordered testing roadmap"
  - type: llm_judge
    criteria: "Statistical significance guidance is correct — recommends appropriate sample sizes and test durations for Meta's advertising platform"
    weight: 0.20
    description: "Correct statistical significance guidance"
