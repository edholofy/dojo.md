meta:
  id: ecommerce-ad-copy
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write high-converting Meta ad copy for e-commerce products across the purchase funnel"
  tags: [meta-ads, ecommerce, shopping, conversion, intermediate]

state: {}

trigger: |
  E-commerce is the largest category of Meta ad spend. The best
  e-commerce ads combine product benefits, urgency, social proof,
  and offer framing — all within the constraints of paid social.
  Average e-commerce CTR on Meta is 1.11%; top performers hit 3-5%.

  Write Meta ad copy for 5 e-commerce scenarios:

  Scenario 1: New product launch
  Product: Wireless charging desk pad ($69)
  Offer: 20% off for launch week, free shipping
  Audience: Tech-savvy professionals, cold audience
  Task: Write launch ad that introduces the product and drives first sales

  Scenario 2: Best-seller promotion
  Product: Organic cotton joggers ($55)
  Offer: No discount, just best-seller positioning
  Audience: Fashion-interested 25-40, cold to warm
  Task: Write an ad that sells without discounting

  Scenario 3: Bundle offer
  Product: Complete skincare routine set ($89, normally $120 if bought
  separately)
  Offer: Save $31 with the bundle
  Audience: Warm — viewed individual products but didn't buy
  Task: Write bundle ad that frames value and reduces decision fatigue

  Scenario 4: Flash sale
  Product: Entire store — 48-hour flash sale, up to 50% off
  Offer: Time-limited, site-wide
  Audience: Full funnel — broad reach
  Task: Write urgent flash sale ad that drives immediate action

  Scenario 5: Cart abandonment retargeting
  Product: The exact product left in cart (wireless earbuds, $79)
  Offer: 10% off if purchased within 24 hours
  Audience: Hot — added to cart but didn't buy
  Task: Write retargeting ad that closes the sale

  For each scenario:
  1. Write the complete ad (primary text, headline, description, CTA)
  2. Write 2 creative variations for testing
  3. Identify the conversion psychology at work
  4. Recommend the ad format and bidding strategy
  5. Write the landing page headline that matches the ad (congruence)

  Then provide:
  - E-commerce ad copy templates for 5 common scenarios
  - ROAS benchmarks by product category
  - How to write catalog/shopping ad copy at scale
  - Product-specific vs brand-level ads: when to use each

assertions:
  - type: llm_judge
    criteria: "Each scenario's ad copy matches its context — launch ads build excitement, best-seller ads leverage popularity, flash sale ads create urgency, retargeting ads are personalized"
    weight: 0.30
    description: "Context-matching scenario copy"
  - type: llm_judge
    criteria: "Ad-to-landing-page congruence is maintained — headlines and offers in the ad match what the user sees after clicking"
    weight: 0.25
    description: "Ad-landing page congruence"
  - type: llm_judge
    criteria: "Creative variations test meaningful differences — each variation takes a different approach (different hook, different proof, different framing) rather than minor word changes"
    weight: 0.25
    description: "Meaningful creative variations"
  - type: llm_judge
    criteria: "E-commerce templates are reusable — provide fill-in structures that any store could adapt for their products"
    weight: 0.20
    description: "Reusable e-commerce templates"
