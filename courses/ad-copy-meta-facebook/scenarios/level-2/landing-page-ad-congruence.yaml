meta:
  id: landing-page-ad-congruence
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Ensure message match between Meta ad copy and landing page for higher conversion"
  tags: [meta-ads, landing-page, congruence, message-match, intermediate]

state: {}

trigger: |
  Message match — the alignment between ad copy and landing page — is
  responsible for up to 30% of post-click conversion rate. When users
  click an ad promising "Free 14-day trial" but land on a page headlined
  "See Our Plans," they bounce. Perfect congruence means the landing page
  fulfills exactly what the ad promised.

  Write matched ad + landing page copy for 5 campaigns:

  Campaign 1: E-commerce (flash sale)
  Ad promise: "48-Hour Flash Sale: 40% off everything"
  Task: Write the ad AND the landing page headline, subhead, and hero CTA

  Campaign 2: SaaS (free trial)
  Ad promise: "Try [Product] free for 14 days — no credit card needed"
  Task: Write the ad AND the trial signup page headline, form copy, and CTA

  Campaign 3: Lead magnet (PDF guide)
  Ad promise: "Free guide: 7 proven templates that tripled our sales"
  Task: Write the ad AND the download page headline, value summary, and
  form fields

  Campaign 4: Webinar registration
  Ad promise: "Live training: How to [specific outcome] in 30 days"
  Task: Write the ad AND the registration page headline, agenda preview,
  and speaker bio

  Campaign 5: E-commerce (product launch)
  Ad promise: "New arrival: [Product] — first 100 orders get free [gift]"
  Task: Write the ad AND the product page banner copy, product description
  lead, and CTA

  For each campaign:
  1. Write the complete Meta ad (primary text, headline, description, CTA)
  2. Write the landing page above-fold copy (headline, subhead, CTA button)
  3. Identify the 3 elements that MUST match (offer, language, visual tone)
  4. Show a mismatched version and explain why it kills conversion
  5. Write the post-click confirmation message (thank you page or email)

  Then provide:
  - Message match checklist: 10 elements to align between ad and page
  - The "scent trail" concept: maintaining consistency from ad through
    conversion
  - How to create dedicated landing pages vs using existing pages
  - Dynamic text replacement: matching landing page headlines to ad copy
    automatically
  - Measuring message match: bounce rate, time on page, and conversion
    rate signals

assertions:
  - type: llm_judge
    criteria: "Ad and landing page copy are seamlessly aligned — the same offer, language, and tone flow naturally from click to conversion"
    weight: 0.30
    description: "Seamless ad-landing page alignment"
  - type: llm_judge
    criteria: "Mismatched examples clearly demonstrate the problem — show how broken message match creates confusion and increases bounce rates"
    weight: 0.25
    description: "Clear mismatch demonstrations"
  - type: llm_judge
    criteria: "The message match checklist covers all critical elements — offer, headline, visual tone, CTA language, urgency level, and social proof consistency"
    weight: 0.25
    description: "Comprehensive message match checklist"
  - type: llm_judge
    criteria: "Dynamic text replacement is practically explained — shows how to implement personalized landing pages that match different ad variations"
    weight: 0.20
    description: "Practical dynamic text replacement"
