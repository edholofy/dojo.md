meta:
  id: carousel-ad-storytelling
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Master carousel ad copy that tells a sequential story across multiple cards"
  tags: [meta-ads, carousel, storytelling, sequential, intermediate]

state: {}

trigger: |
  Carousel ads have 72% higher CTR than single-image ads when used
  correctly. The key is telling a story across cards rather than
  treating each card as an independent ad. Sequential narratives
  keep users swiping and build momentum toward the CTA.

  Write carousel ad campaigns for 5 products using different
  storytelling structures:

  Structure 1: Problem → Solution progression (5 cards)
  Product: Meal planning app ($8/month)
  Card 1: The problem (Sunday night meal planning stress)
  Card 2: The consequence (unhealthy takeout, wasted groceries)
  Card 3: The solution (how the app works)
  Card 4: Social proof (customer result)
  Card 5: CTA (free trial offer)

  Structure 2: Feature showcase (4 cards)
  Product: Wireless earbuds ($99)
  Card 1: Sound quality benefit
  Card 2: Battery life benefit
  Card 3: Comfort/fit benefit
  Card 4: Price + CTA

  Structure 3: Before/after transformation (4 cards)
  Product: Home organization service ($199 first session)
  Card 1: "Before" — cluttered space
  Card 2: The process — what they do
  Card 3: "After" — organized space
  Card 4: Testimonial + CTA

  Structure 4: Step-by-step guide (5 cards)
  Product: Investing app ($0 commission)
  Card 1: "Step 1: Download and set up (2 min)"
  Card 2: "Step 2: Connect your bank"
  Card 3: "Step 3: Choose your strategy"
  Card 4: "Step 4: Watch your money grow"
  Card 5: CTA with social proof

  Structure 5: Product catalog (5 cards)
  Product: Artisan candle collection ($28-$42 each)
  Card 1: "For cozy nights" — Vanilla & sandalwood
  Card 2: "For productivity" — Peppermint & eucalyptus
  Card 3: "For romance" — Rose & oud
  Card 4: "For relaxation" — Lavender & chamomile
  Card 5: Collection CTA with bundle offer

  For each carousel:
  1. Write the shared primary text (visible across all cards)
  2. Write each card's headline (under 40 characters)
  3. Write each card's description (under 20 characters)
  4. Describe the visual concept for each card
  5. Explain why this structure works for this product

  Then provide:
  - 5 carousel storytelling structures with templates
  - Optimal number of carousel cards by objective
  - How to maintain narrative momentum across cards
  - Common carousel mistakes (treating cards independently,
    burying the CTA, poor visual consistency)
  - When carousel outperforms single image/video

assertions:
  - type: llm_judge
    criteria: "Carousel narratives create genuine momentum — each card builds on the previous one and makes the user want to swipe to see what's next"
    weight: 0.30
    description: "Momentum-building carousel narratives"
  - type: llm_judge
    criteria: "Per-card copy is concise and impactful — headlines under 40 characters and descriptions under 20 characters that communicate one clear message per card"
    weight: 0.25
    description: "Concise impactful per-card copy"
  - type: llm_judge
    criteria: "The 5 structures are distinctly different approaches — each tells a different type of story suitable for different product types and campaign objectives"
    weight: 0.25
    description: "Distinctly different carousel structures"
  - type: llm_judge
    criteria: "Shared primary text complements the cards — doesn't repeat what the cards say but provides context that enhances the carousel experience"
    weight: 0.20
    description: "Complementary shared primary text"
