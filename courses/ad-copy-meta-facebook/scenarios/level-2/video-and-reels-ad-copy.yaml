meta:
  id: video-and-reels-ad-copy
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write scripts and captions for Meta video ads and Reels ads that feel native"
  tags: [meta-ads, video, reels, scripts, intermediate]

state: {}

trigger: |
  Video ads on Meta get 20-30% more engagement than static images.
  Reels ads in particular must feel native — produced like creator
  content, not polished commercials. The script structure for Meta
  video ads follows: Hook (0-3s) → Problem/Promise (3-10s) →
  Solution (10-20s) → CTA (20-30s).

  Write video ad scripts and captions for 5 products:

  Product 1: UGC-style testimonial video
  Product: Teeth whitening strips ($29)
  Format: Self-filmed customer review, 20 seconds
  Style: Authentic, phone-recorded, casual delivery
  Task: Write the UGC script and video caption

  Product 2: Problem-solution demo video
  Product: Portable blender ($35)
  Format: Product demo showing the problem and solution, 25 seconds
  Style: Satisfying visual, quick cuts, text overlay-heavy
  Task: Write the video script with text overlay copy

  Product 3: Founder story Reel
  Product: Handmade jewelry brand ($35-$150 range)
  Format: Founder speaking to camera, behind-the-scenes clips, 30 seconds
  Style: Personal, authentic, brand-building
  Task: Write the founder script and Reel caption

  Product 4: Trending audio/format Reel
  Product: Fitness app ($12/month)
  Format: Uses trending "day in my life" format, 20 seconds
  Style: Native Reel feel, text overlays, trending audio reference
  Task: Write the text overlay sequence and caption

  Product 5: Product comparison video
  Product: Robot vacuum ($299)
  Format: Side-by-side comparison with traditional vacuum, 25 seconds
  Style: Split-screen, satisfying cleaning shots, minimal narration
  Task: Write the comparison script and text overlays

  For each video:
  1. Write the complete script with timestamps (second-by-second for
     key moments)
  2. Write the text overlay copy for each scene
  3. Write the video caption (primary text)
  4. Write the headline and CTA
  5. Describe the visual direction (what the viewer sees)
  6. Identify the hook moment (what stops the scroll)

  Then provide:
  - Video ad script formula: Hook (3s) → Promise (5s) → Proof (10s) →
    CTA (5s)
  - UGC vs branded content: tone and script differences
  - Text overlay best practices (font, placement, reading speed)
  - Sound-on vs sound-off optimization
  - Reels-specific tips: trending formats, native feel, music selection

assertions:
  - type: llm_judge
    criteria: "Scripts follow proper video ad structure — hooks land in the first 3 seconds, the pacing feels natural at each timestamp, and the CTA is clear"
    weight: 0.30
    description: "Properly structured video scripts"
  - type: llm_judge
    criteria: "UGC scripts feel authentic — the teeth whitening review sounds like a real person filmed it on their phone, not a scripted commercial"
    weight: 0.25
    description: "Authentic-feeling UGC scripts"
  - type: llm_judge
    criteria: "Text overlays are readable and impactful — short enough to read in the allotted time, placed strategically, and reinforce the visual message"
    weight: 0.25
    description: "Readable impactful text overlays"
  - type: llm_judge
    criteria: "Sound-on vs sound-off advice is practical — scripts work whether audio is playing or not, with text overlays carrying the message independently"
    weight: 0.20
    description: "Practical sound-on/off optimization"
