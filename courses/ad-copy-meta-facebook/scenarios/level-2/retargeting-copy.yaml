meta:
  id: retargeting-copy
  level: 2
  course: ad-copy-meta-facebook
  type: output
  description: "Write retargeting ad copy that converts warm audiences without being annoying"
  tags: [meta-ads, retargeting, warm-audience, remarketing, intermediate]

state: {}

trigger: |
  Retargeting ads convert 10x better than cold ads, but most advertisers
  just show the same ad again. Effective retargeting matches copy to
  the specific action the user took — page visit, add-to-cart, video
  view, or content engagement — with escalating offers and new angles.

  Write retargeting sequences for 3 products (4 stages each):

  Product 1: Premium headphones ($249)
  Stage A: Viewed product page (left within 30 seconds)
  → Copy approach: Remind + highlight key benefit they may have missed
  Stage B: Spent 60+ seconds on page (didn't add to cart)
  → Copy approach: Address likely objection (price) + social proof
  Stage C: Added to cart but didn't purchase (within 24 hours)
  → Copy approach: Urgency + risk reversal (free returns)
  Stage D: Added to cart but didn't purchase (3-7 days later)
  → Copy approach: Incentive offer (10% off) + scarcity

  Product 2: Online course ($299)
  Stage A: Watched sales video (25-50%)
  → Copy approach: Tease what they missed in the rest of the video
  Stage B: Watched sales video (75%+) but didn't enroll
  → Copy approach: Testimonial from successful student
  Stage C: Visited checkout page but didn't complete
  → Copy approach: Payment plan option + money-back guarantee
  Stage D: Clicked email link but didn't purchase (email subscribers)
  → Copy approach: Enrollment deadline + bonus bundle

  Product 3: Subscription box ($35/month)
  Stage A: Liked/commented on organic post (Instagram engagers)
  → Copy approach: "You liked our post — here's a special offer"
  Stage B: Visited homepage but didn't explore products
  → Copy approach: Best-seller showcase + first-box discount
  Stage C: Started quiz/survey but didn't complete
  → Copy approach: "Your perfect box is waiting" + finish quiz CTA
  Stage D: Subscribed and cancelled (win-back)
  → Copy approach: "We miss you" + improved features since they left

  For each retargeting stage (12 total):
  1. Write the complete ad (primary text, headline, CTA)
  2. Explain the psychology of this specific retargeting stage
  3. Recommend the frequency cap (impressions per day/week)
  4. Write the ad creative direction (what the visual should convey)
  5. Define the exclusion audiences (who NOT to show this ad to)

  Then provide:
  - Retargeting sequence blueprint: page view → engagement → cart →
    purchase → upsell
  - How to avoid ad fatigue in retargeting (creative rotation strategy)
  - Dynamic retargeting vs sequential retargeting: when each works
  - Frequency capping best practices by funnel stage
  - Retargeting attribution: how to measure true impact

assertions:
  - type: llm_judge
    criteria: "Each retargeting stage has genuinely different copy — not the same ad with minor tweaks but distinct messaging matched to the user's specific behavior"
    weight: 0.30
    description: "Behavior-matched retargeting copy"
  - type: llm_judge
    criteria: "Offer escalation is strategic — starts with no incentive (just reminding), builds to social proof, then risk reversal, and finally a discount as last resort"
    weight: 0.25
    description: "Strategic offer escalation"
  - type: llm_judge
    criteria: "Exclusion audiences are correctly defined — each stage excludes people who've already advanced to the next stage, preventing irrelevant ad delivery"
    weight: 0.25
    description: "Correctly defined exclusion audiences"
  - type: llm_judge
    criteria: "The retargeting blueprint is comprehensive — covers the full journey from first touch through win-back with clear sequencing rules"
    weight: 0.20
    description: "Comprehensive retargeting blueprint"
