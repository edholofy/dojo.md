meta:
  id: ad-copy-at-scale
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Build systems for producing Meta ad copy at scale across multiple campaigns and products"
  tags: [meta-ads, scale, systems, production, expert]

state: {}

trigger: |
  Agencies and large brands run hundreds of ads simultaneously across
  dozens of campaigns. Producing ad copy at scale requires systems —
  templates, swipe files, modular copy blocks, AI assistance, and
  quality control processes that maintain performance while increasing
  output.

  Design an ad copy production system for a Meta ads agency:

  Agency profile:
  - 20 clients across e-commerce, SaaS, and local business
  - Average 15-25 new ad creatives per client per month
  - 3 copywriters + 1 creative director
  - Target: 300-500 new ad copy sets per month

  Part 1: Copy production infrastructure
  1. Create the ad copy brief template (what copywriters need from
     account managers before writing)
  2. Design the modular copy system:
     - Hook library (categorized by type: pain point, curiosity,
       social proof, call-out, contrarian)
     - Body copy blocks (benefit modules, proof modules, offer modules)
     - CTA library (categorized by objective and intensity)
     - Headline formula library
  3. Create the brand voice quick-reference for each client type
  4. Design the AI-assisted first draft workflow
  5. Build the quality control checklist before ads go live

  Part 2: Scaling with AI
  1. Write the AI prompt templates for generating ad copy variations
  2. Create the human review process for AI-generated copy
  3. Design the quality scoring rubric (1-5 scale)
  4. Build the feedback loop: using performance data to improve AI prompts
  5. Identify what AI does well vs what requires human copywriters

  Part 3: Testing and iteration at scale
  1. Design the testing framework: how to test across 20 clients efficiently
  2. Create the "winning ad" documentation system (what works, why, for whom)
  3. Build the knowledge base: learnings that transfer across clients
  4. Design the creative refresh schedule across all accounts
  5. Create the performance reporting template for copy metrics

  Part 4: Team workflow
  1. Copywriter capacity planning (ads per writer per day)
  2. Review and approval workflow (draft → review → approve → launch)
  3. Client communication templates for copy presentation
  4. How to onboard new copywriters to the system
  5. Quality maintenance as the team scales

assertions:
  - type: llm_judge
    criteria: "The modular copy system is practical — hook, body, and CTA libraries are organized in a way that copywriters can quickly assemble quality ads"
    weight: 0.30
    description: "Practical modular copy system"
  - type: llm_judge
    criteria: "AI integration is realistic — uses AI for first drafts and variations while maintaining human oversight for quality, brand voice, and strategy"
    weight: 0.25
    description: "Realistic AI integration"
  - type: llm_judge
    criteria: "Production targets are achievable — 300-500 ad sets per month with 3 copywriters is feasible with the proposed systems and AI assistance"
    weight: 0.25
    description: "Achievable production targets"
  - type: llm_judge
    criteria: "Cross-client learning system captures insights — winning patterns from one client type can be adapted and tested for similar clients"
    weight: 0.20
    description: "Cross-client learning capture"
