meta:
  id: brand-response-hybrid-ads
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Write hybrid brand-response ads that build brand while driving measurable conversions"
  tags: [meta-ads, brand-response, hybrid, brand-building, expert]

state: {}

trigger: |
  The false choice between "brand awareness" and "direct response" is
  over. The best Meta ads do both — building brand equity while driving
  measurable action. Hybrid brand-response ads combine storytelling
  with conversion elements, creating sustainable performance that
  doesn't burn out like pure DR ads.

  Write hybrid brand-response campaigns for 4 brands:

  Brand 1: Premium DTC coffee brand ($18-$25/bag)
  Brand elements: Origin story, sustainability mission, founder personality
  Response elements: First order discount, subscription offer, free shipping
  Task: Write 3 ads that tell the brand story while driving first purchase

  Brand 2: B2B cybersecurity company ($500/month)
  Brand elements: Industry authority, thought leadership, trust/reliability
  Response elements: Free security audit, whitepaper download, demo request
  Task: Write 3 ads that build authority while generating qualified leads

  Brand 3: Children's educational toy company ($25-$75)
  Brand elements: Child development mission, play-based learning philosophy
  Response elements: New product launch, holiday gift guide, bundle offer
  Task: Write 3 ads that educate parents about play-based learning while
  driving product sales

  Brand 4: Sustainable fashion brand ($50-$200)
  Brand elements: Ethical manufacturing story, environmental impact,
  community values
  Response elements: New collection launch, limited edition, loyalty program
  Task: Write 3 ads that communicate values while driving immediate action

  For each brand:
  1. Write 3 complete hybrid ads
  2. Annotate: label which elements are brand-building vs direct-response
  3. Explain how the brand story enhances the conversion ask
  4. Write a pure brand ad and a pure DR ad for comparison
  5. Design the measurement framework (brand metrics + response metrics)

  Then provide:
  - The brand-response spectrum: where to position ads based on goals
  - How to measure brand lift alongside ROAS
  - Why hybrid ads sustain performance longer than pure DR
  - Brand voice integration in direct-response copy
  - The "brandformance" framework: building brand while performing

assertions:
  - type: llm_judge
    criteria: "Hybrid ads genuinely blend both approaches — brand story and conversion elements are integrated, not just placed next to each other"
    weight: 0.30
    description: "Genuinely blended hybrid ads"
  - type: llm_judge
    criteria: "Brand stories enhance conversion — the origin story, mission, or values create emotional buy-in that makes the conversion ask feel natural rather than abrupt"
    weight: 0.25
    description: "Conversion-enhancing brand stories"
  - type: llm_judge
    criteria: "Comparison ads show the spectrum — pure brand ads feel incomplete without action, pure DR ads feel transactional, and hybrid ads achieve the best of both"
    weight: 0.25
    description: "Spectrum-demonstrating comparison ads"
  - type: llm_judge
    criteria: "The measurement framework captures both dimensions — includes brand awareness metrics alongside conversion metrics in a unified view"
    weight: 0.20
    description: "Unified brand-response measurement"
