meta:
  id: advanced-audience-copy-strategy
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Design advanced audience-copy matching strategies for lookalike, broad, and AI-optimized targeting"
  tags: [meta-ads, audience-strategy, lookalike, broad-targeting, expert]

state: {}

trigger: |
  Meta's AI targeting has evolved beyond manual interest-based audiences.
  Advantage+ audience, broad targeting, and AI-optimized delivery now
  outperform manual targeting in many cases — but they require different
  copy strategies. When the algorithm selects the audience, your copy
  must do the qualifying work.

  Design audience-copy strategies for 4 targeting approaches:

  Approach 1: Broad targeting with Advantage+ audience
  Product: D2C skincare brand ($30-$60 range)
  Audience: Broad (no interest or demographic restrictions)
  Challenge: Copy must self-select the right audience since targeting
  doesn't filter
  Task: Write 3 ads that qualify different audience segments through
  copy alone (women 25-35 with acne, women 40-55 anti-aging,
  men 25-40 simple routine)

  Approach 2: Lookalike audiences (1%, 5%, 10%)
  Product: B2B accounting software ($79/month)
  Audience: 1% lookalike (highest match), 5% (broader), 10% (broadest)
  Challenge: Copy must adjust specificity based on lookalike precision
  Task: Write different ads for each lookalike percentage

  Approach 3: Interest stacking with exclusions
  Product: Premium outdoor gear ($100-$500 range)
  Audience: Interest in hiking + camping + outdoor photography,
  excluding bargain shoppers
  Challenge: Speaking to a specific psychographic profile
  Task: Write 2 ads that resonate with premium outdoor enthusiasts

  Approach 4: Advantage+ shopping campaigns (ASC)
  Product: Fashion e-commerce ($40-$150 range)
  Audience: Fully automated by Meta's AI
  Challenge: Copy must work for all funnel stages since AI mixes
  cold and warm audiences
  Task: Write 3 ads that work across audience temperatures simultaneously

  For each approach:
  1. Write the complete ads
  2. Explain how copy compensates for targeting breadth
  3. Identify the self-qualifying elements in each ad
  4. Recommend the creative testing strategy
  5. Define the success metrics specific to this targeting approach

  Then provide:
  - The targeting-copy matrix: how copy changes as targeting broadens
  - When to let Meta's AI target vs when to maintain manual control
  - How to use ad copy as a targeting tool (self-selecting audiences)
  - Advantage+ best practices for copy input
  - The death of interest targeting: how copy strategy adapts

assertions:
  - type: llm_judge
    criteria: "Self-qualifying copy effectively filters audiences — ads for acne-prone skin won't resonate with anti-aging seekers, creating natural audience segmentation through messaging"
    weight: 0.30
    description: "Effective self-qualifying copy"
  - type: llm_judge
    criteria: "Lookalike audience copy adjusts appropriately — 1% lookalike gets more specific language while 10% gets broader, more educational copy"
    weight: 0.25
    description: "Lookalike-adjusted copy specificity"
  - type: llm_judge
    criteria: "The targeting-copy matrix is clear — shows exactly how copy elements change as targeting broadens from precise to AI-optimized"
    weight: 0.25
    description: "Clear targeting-copy matrix"
  - type: llm_judge
    criteria: "Advantage+ shopping campaign copy works across temperatures — the same ad set can engage cold browsers and warm retargeting prospects"
    weight: 0.20
    description: "Cross-temperature ASC copy"
