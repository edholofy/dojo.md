meta:
  id: lead-form-ad-copy
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Optimize Meta lead form ad copy for high-quality lead generation with qualification"
  tags: [meta-ads, lead-forms, lead-quality, qualification, expert]

state: {}

trigger: |
  Meta's Instant Forms (lead form ads) generate leads without leaving
  the platform — reducing friction but often producing lower-quality
  leads. Expert lead form ad copy maximizes both volume AND quality
  through strategic copy, qualifying questions, and expectation setting.

  Optimize lead form ad campaigns for 5 businesses:

  Business 1: Solar panel installation ($15,000-$30,000 projects)
  Current problem: 200 leads/month but only 5% are qualified homeowners
  Task: Write the ad + lead form that pre-qualifies for homeownership,
  roof type, and installation timeline

  Business 2: B2B marketing agency ($3,000-$10,000/month retainers)
  Current problem: Leads are too small (under $500K revenue)
  Task: Write the ad + lead form that qualifies by company size and budget

  Business 3: Online university (MBA program, $25,000)
  Current problem: High lead volume but low enrollment rate (2%)
  Task: Write the ad + lead form that qualifies for education level,
  work experience, and intent to enroll

  Business 4: Real estate (luxury condos, $500K-$1.5M)
  Current problem: Leads are browsers, not buyers
  Task: Write the ad + lead form that qualifies for budget, timeline,
  and financing pre-approval

  Business 5: SaaS enterprise ($500+/month)
  Current problem: Leads are individual users, not decision-makers
  Task: Write the ad + lead form that qualifies for company role,
  team size, and decision authority

  For each business:
  1. Write the ad (primary text, headline, CTA: "Sign Up" or
     "Get Quote" or "Learn More")
  2. Write the lead form:
     - Intro section headline and description
     - 3-5 qualifying questions (custom + prefilled)
     - Privacy policy summary text
     - Thank you screen copy and next steps
  3. Write the conditional thank you message (different for qualified
     vs unqualified leads)
  4. Write the immediate follow-up message (SMS or email)
  5. Explain the volume-quality tradeoff for each form design

  Then provide:
  - Lead form copy optimization guide:
    - How form length affects lead quality (more questions = fewer but
      better leads)
    - Prefilled vs custom questions: when each works
    - Conditional logic in lead forms
  - Higher intent vs lower intent form designs
  - How to A/B test lead forms on Meta
  - Lead quality scoring methodology
  - CRM integration best practices for lead form data

assertions:
  - type: llm_judge
    criteria: "Qualifying questions effectively filter leads — homeownership for solar, company size for B2B, decision authority for enterprise, without being so restrictive that volume drops to zero"
    weight: 0.30
    description: "Effective lead-qualifying questions"
  - type: llm_judge
    criteria: "Form intro copy sets proper expectations — clearly communicates what happens after submission, reducing the 'I just wanted info' low-quality leads"
    weight: 0.25
    description: "Expectation-setting form intro copy"
  - type: llm_judge
    criteria: "The volume-quality tradeoff analysis is nuanced — provides specific guidance on how each additional question affects lead count and quality for each business type"
    weight: 0.25
    description: "Nuanced volume-quality tradeoff analysis"
  - type: llm_judge
    criteria: "Follow-up messages are immediate and relevant — connect back to the ad promise and advance the lead through the sales process"
    weight: 0.20
    description: "Immediate relevant follow-up messages"
