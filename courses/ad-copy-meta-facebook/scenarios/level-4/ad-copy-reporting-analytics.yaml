meta:
  id: ad-copy-reporting-analytics
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Build ad copy performance reporting and analytics frameworks for Meta campaigns"
  tags: [meta-ads, reporting, analytics, performance, expert]

state: {}

trigger: |
  Most ad copy reporting focuses on campaign-level metrics (CTR, CPA,
  ROAS) without isolating copy's specific contribution. Expert reporting
  connects copy elements (hooks, angles, offers, emotional triggers)
  to performance outcomes, creating a data-driven copy optimization loop.

  Build a comprehensive ad copy analytics framework:

  Part 1: Copy performance tagging system
  Design a tagging taxonomy for ad copy:
  1. Hook type tags: pain-point, curiosity, social-proof, call-out,
     contrarian, before-after
  2. Body approach tags: story, testimonial, feature-list, comparison,
     how-it-works
  3. Offer type tags: discount, free-trial, lead-magnet, no-offer,
     limited-time, bundle
  4. Emotional angle tags: fear, aspiration, belonging, relief,
     curiosity, urgency
  5. CTA intensity tags: soft, medium, hard, urgency-driven

  Apply these tags to 15 sample ads and show how to analyze performance
  by tag dimension (e.g., "pain-point hooks outperform curiosity hooks
  by 23% CTR for our SaaS ads")

  Part 2: Performance analysis
  Given this sample data set:

  Ad Group A (e-commerce skincare):
  - Pain-point hook + testimonial body + 20% off offer: CTR 2.1%, ROAS 4.2x
  - Curiosity hook + feature-list body + 20% off offer: CTR 1.4%, ROAS 2.8x
  - Social-proof hook + story body + free shipping: CTR 1.8%, ROAS 3.5x

  Ad Group B (SaaS project management):
  - Pain-point hook + how-it-works + free trial: CTR 1.2%, CPA $22
  - Before-after hook + testimonial + free trial: CTR 1.6%, CPA $18
  - Call-out hook + comparison + free trial: CTR 0.9%, CPA $28

  1. Analyze the data to extract copy insights
  2. Identify the winning copy patterns
  3. Recommend the next tests based on findings
  4. Build the copy performance dashboard

  Part 3: Reporting templates
  1. Weekly copy performance report (for internal team)
  2. Monthly copy optimization report (for clients/stakeholders)
  3. Quarterly copy strategy review (patterns, learnings, next quarter plan)
  4. Annual copy performance retrospective

  Then provide:
  - How to set up copy-level tracking in Meta Ads Manager
  - The copy performance dashboard: which metrics to display
  - Connecting copy performance to business outcomes
  - How to present copy insights to non-creative stakeholders
  - Building organizational knowledge from ad copy data

assertions:
  - type: llm_judge
    criteria: "The tagging taxonomy is comprehensive and practical — covers all major copy dimensions and can be implemented in a spreadsheet or ad management tool"
    weight: 0.25
    description: "Comprehensive practical tagging taxonomy"
  - type: llm_judge
    criteria: "Data analysis extracts genuine insights — identifies that before-after hooks outperform for SaaS while pain-point hooks win for skincare, with actionable implications"
    weight: 0.30
    description: "Genuine data-driven copy insights"
  - type: llm_judge
    criteria: "Reporting templates are stakeholder-appropriate — weekly reports focus on tactical metrics, quarterly reports on strategic patterns"
    weight: 0.25
    description: "Stakeholder-appropriate reporting"
  - type: llm_judge
    criteria: "The performance dashboard design is clear — displays the right metrics in a format that enables quick decision-making about copy optimization"
    weight: 0.20
    description: "Clear actionable dashboard design"
