meta:
  id: ios-privacy-ad-strategy
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Adapt Meta ad copy strategy for iOS privacy changes and signal loss"
  tags: [meta-ads, ios-privacy, att, signal-loss, expert]

state: {}

trigger: |
  Apple's App Tracking Transparency (ATT) and iOS privacy changes
  reduced Meta's tracking capabilities significantly. With limited
  conversion data, ad copy must work harder to qualify audiences,
  communicate value quickly, and drive on-platform conversions.
  This fundamentally changed how copywriters approach Meta ads.

  Adapt ad copy strategy for the post-iOS privacy landscape:

  Part 1: Copy changes for signal loss
  Before iOS 14.5, you could target precisely and track conversions
  across devices. Now you can't. How does ad copy adapt?

  Product: D2C skincare brand ($30-$60 range)

  1. Write an ad optimized for broad targeting (since precise targeting
     is less reliable):
     - Copy must self-qualify the audience
     - Include more product information in the ad itself
     - Reduce dependency on the landing page for conversion

  2. Write an ad optimized for on-platform conversion:
     - Drive to Meta's lead form instead of website
     - Use Meta Shop instead of external checkout
     - Minimize the funnel steps that require tracking

  3. Write an ad for first-party data audiences:
     - Customer email list uploaded as custom audience
     - Copy leverages existing brand relationship
     - Cross-sell and upsell messaging

  Part 2: Creative-first strategy
  Product: SaaS tool ($29/month, free trial)

  1. Write 5 ad variations designed for Advantage+ creative testing
  2. Use copy diversity to help Meta's AI find the right audience
  3. Write ads that convert without requiring multi-touch tracking
  4. Design the CAPI (Conversions API) optimized ad flow

  Part 3: Privacy-first messaging
  1. How to handle "Why am I seeing this ad?" concerns in copy
  2. Writing ads that feel relevant without being creepy
  3. Building trust when consumers are privacy-conscious
  4. Transparent messaging about data usage

  Part 4: Measurement adaptation
  1. How to write ad copy tests when you have incomplete data
  2. Using engagement metrics (comments, saves, shares) as proxies
     for conversion
  3. Writing copy that generates measurable on-platform signals
  4. Lift studies and holdout testing for copy

  Then provide:
  - Post-iOS privacy ad copy playbook
  - How creative quality replaces targeting precision
  - First-party data collection through ad copy (quizzes, lead forms,
    Messenger conversations)
  - The future of Meta ad copy in a cookieless world
  - How to present privacy changes to clients who expect old performance

assertions:
  - type: llm_judge
    criteria: "Ads adapt to signal loss — copy does more qualifying work, provides more information upfront, and reduces dependency on multi-step conversion tracking"
    weight: 0.30
    description: "Signal-loss-adapted ads"
  - type: llm_judge
    criteria: "On-platform conversion strategies are practical — using lead forms, Meta Shop, and Messenger as alternatives to website-dependent funnels"
    weight: 0.25
    description: "Practical on-platform conversion strategies"
  - type: llm_judge
    criteria: "Privacy-first messaging builds trust — acknowledges consumer privacy concerns without being defensive, using transparency as a differentiator"
    weight: 0.25
    description: "Trust-building privacy messaging"
  - type: llm_judge
    criteria: "Measurement recommendations are actionable — provides real alternatives to attribution when tracking is limited"
    weight: 0.20
    description: "Actionable measurement alternatives"
