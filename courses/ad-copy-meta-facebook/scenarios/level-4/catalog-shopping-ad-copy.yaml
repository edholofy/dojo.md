meta:
  id: catalog-shopping-ad-copy
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Optimize copy for Meta catalog ads, dynamic product ads, and shopping campaigns"
  tags: [meta-ads, catalog, dynamic-product-ads, shopping, expert]

state: {}

trigger: |
  Catalog-based ads (Dynamic Product Ads, Advantage+ catalog ads) are
  Meta's most scalable ad format for e-commerce. They automatically
  show relevant products from your catalog to interested users. But
  the copy that surrounds the dynamic product feed is often neglected —
  and it significantly impacts performance.

  Optimize catalog ad copy for 4 e-commerce scenarios:

  Scenario 1: Dynamic Product Ad — retargeting
  Store: Fashion e-commerce (500 SKUs, $30-$200 range)
  Audience: Viewed or added products to cart in last 7 days
  Dynamic elements: Product image, name, price (auto-populated)
  Task: Write the primary text, headline template, and description
  template that work with ANY product from the catalog

  Scenario 2: Advantage+ catalog — prospecting
  Store: Home goods (1,000 SKUs, $15-$500 range)
  Audience: Broad targeting — Meta shows products to likely buyers
  Dynamic elements: Product image, name, price, availability
  Task: Write copy that introduces the brand to cold audiences while
  the product feed does the product-specific work

  Scenario 3: Collection ad — curated catalog
  Store: Beauty brand (200 SKUs, $20-$80 range)
  Format: Hero video + 4 product catalog items below
  Task: Write the hero video caption and primary text, plus the
  collection theme that ties the products together

  Scenario 4: Catalog ad with overlay text
  Store: Electronics (300 SKUs, $50-$500)
  Feature: Dynamic text overlays on product images (price, discount
  percentage, "Best Seller" badge)
  Task: Write the overlay text rules and the surrounding ad copy

  For each scenario:
  1. Write the complete ad copy (primary text, headline template,
     description template)
  2. Use dynamic variables: {{product.name}}, {{product.price}},
     {{product.brand}} where appropriate
  3. Write copy that works regardless of which product is shown
  4. Create 3 primary text variations for testing
  5. Recommend the catalog optimization strategy

  Then provide:
  - Catalog ad copy best practices: what to control vs what to automate
  - Dynamic variable usage guide: which variables to use where
  - How to write "universal" primary text that works with any product
  - Overlay text optimization (price display, badge text, discount format)
  - Catalog ad performance benchmarks (DPA retargeting vs prospecting)

assertions:
  - type: llm_judge
    criteria: "Template copy works with any product — primary text and headlines make sense whether the catalog shows a $30 candle or a $500 mixer"
    weight: 0.30
    description: "Universal catalog template copy"
  - type: llm_judge
    criteria: "Dynamic variables are used strategically — product names and prices are inserted where they add value, not just scattered randomly"
    weight: 0.25
    description: "Strategic dynamic variable usage"
  - type: llm_judge
    criteria: "Retargeting vs prospecting copy differs appropriately — retargeting assumes familiarity while prospecting introduces the brand"
    weight: 0.25
    description: "Appropriate retargeting vs prospecting copy"
  - type: llm_judge
    criteria: "Overlay text rules are practical — provides clear guidelines for badge text, price display, and discount formatting that work across product images"
    weight: 0.20
    description: "Practical overlay text rules"
