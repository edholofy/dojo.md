meta:
  id: meta-ad-performance-diagnosis
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Diagnose underperforming Meta ad campaigns and prescribe copy-driven fixes"
  tags: [meta-ads, performance, diagnosis, optimization, expert]

state: {}

trigger: |
  When Meta ad campaigns underperform, the copy is often the culprit —
  but not always in obvious ways. Expert diagnosis requires reading
  metrics to identify whether the problem is the hook, the body copy,
  the offer, the audience-message match, or something outside copy entirely.

  Diagnose 5 underperforming Meta ad campaigns:

  Campaign 1: High impressions, low CTR (0.4%)
  Product: E-commerce jewelry brand
  Ad copy: Generic benefit-focused text, "Shop our beautiful collection"
  Metrics: 500K impressions, 0.4% CTR, $2.80 CPC (industry avg 1.1% CTR)
  Hypothesis: The hook isn't stopping the scroll

  Campaign 2: Good CTR (1.8%), terrible conversion rate (0.2%)
  Product: SaaS project management tool (free trial)
  Ad copy: Curiosity-driven hook that promises "the secret to 10x
  productivity," followed by feature list
  Metrics: 1.8% CTR, 0.2% CVR on landing page, $85 CPA (target: $25)
  Hypothesis: Click-bait copy attracting wrong audience

  Campaign 3: Good everything but high CPA ($45 vs $20 target)
  Product: Subscription box ($35/month, first box $19)
  Ad copy: Solid hook, social proof, clear offer — technically good copy
  Metrics: 1.2% CTR, 2.1% CVR, but $45 CPA due to high CPM ($28)
  Hypothesis: Copy competition — too similar to category norms

  Campaign 4: High engagement (comments/shares) but low purchases
  Product: Online course ($299)
  Ad copy: Inspiring founder story, transformation narrative, long-form
  Metrics: 2.3% CTR, 500 comments, 200 shares, 3 purchases
  Hypothesis: Engaging content but no conversion mechanism

  Campaign 5: Great first week, then complete performance collapse
  Product: Fitness app ($19/month free trial)
  Ad copy: Strong testimonial-led ad with before/after framing
  Metrics: Week 1: 2.5% CTR, $8 CPA. Week 3: 0.6% CTR, $35 CPA
  Hypothesis: Ad fatigue + audience saturation

  For each campaign:
  1. Analyze all available metrics to confirm or revise the hypothesis
  2. Identify the specific copy element causing the problem
  3. Write the diagnostic report (what's wrong and why)
  4. Write the optimized ad copy that fixes the identified problems
  5. Define the A/B test to validate the fix
  6. Project the expected improvement

  Then provide:
  - Meta ad diagnostic flowchart: metric → likely problem → copy fix
  - How to read Meta Ads Manager data to diagnose copy issues
  - The 10 most common copy-related performance problems
  - When the problem is NOT copy (audience, bidding, creative, landing page)
  - Performance benchmarks by objective, industry, and ad format

assertions:
  - type: llm_judge
    criteria: "Diagnoses are metric-driven — each analysis traces the performance problem to specific metrics and connects them to copy elements"
    weight: 0.30
    description: "Metric-driven diagnoses"
  - type: llm_judge
    criteria: "Fixes address the actual problem — the click-bait ad gets qualified copy, the engaging-but-not-converting ad gets stronger CTAs and urgency"
    weight: 0.25
    description: "Problem-addressing fixes"
  - type: llm_judge
    criteria: "The diagnostic flowchart is practical — provides a repeatable decision tree that any media buyer could use to diagnose copy problems"
    weight: 0.25
    description: "Practical diagnostic flowchart"
  - type: llm_judge
    criteria: "Non-copy problems are correctly identified — knows when to fix the landing page, bidding strategy, or audience rather than blaming copy"
    weight: 0.20
    description: "Correct non-copy problem identification"
