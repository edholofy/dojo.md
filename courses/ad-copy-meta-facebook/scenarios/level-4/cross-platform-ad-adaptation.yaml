meta:
  id: cross-platform-ad-adaptation
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Adapt Meta ad copy across Facebook, Instagram, Messenger, and WhatsApp placements"
  tags: [meta-ads, cross-platform, placement, adaptation, expert]

state: {}

trigger: |
  Meta's family of apps serves different user mindsets: Facebook is
  community and discovery, Instagram is visual and aspirational,
  Messenger is personal and conversational, WhatsApp is private and
  utility-focused. The same ad served across all placements should
  adapt its copy — but Meta's Advantage+ placement often serves ads
  everywhere.

  Adapt ad copy for ONE product across ALL Meta placements:

  Product: Premium productivity app ($12/month, 7-day free trial)
  Features: AI task prioritization, calendar integration, team
  collaboration, focus mode, analytics dashboard

  Placement 1: Facebook Feed
  User mindset: Browsing, community engagement, discovery
  Format: Single image or video ad
  Copy approach: Educational, social proof, feature-rich

  Placement 2: Facebook Right Column
  User mindset: Peripheral awareness, quick glance
  Format: Small image, limited text
  Copy approach: Ultra-concise headline + CTA

  Placement 3: Instagram Feed
  User mindset: Visual-first, aspirational, lifestyle
  Format: Polished image or carousel
  Copy approach: Clean, aesthetic, lifestyle-integrated

  Placement 4: Instagram Stories
  User mindset: Quick consumption, full attention, ephemeral
  Format: Full-screen vertical, 5 seconds attention
  Copy approach: Minimal text overlay, single strong message

  Placement 5: Instagram Reels
  User mindset: Entertainment, native content, trending
  Format: Short-form video, native feel
  Copy approach: UGC-style, trending format, authentic

  Placement 6: Messenger inbox
  User mindset: Personal messages, intimate space
  Format: Sponsored message appearance
  Copy approach: Personal, conversational, non-intrusive

  Placement 7: Audience Network
  User mindset: Using other apps, interstitial attention
  Format: Banner or interstitial
  Copy approach: Maximum clarity, brand recognition

  For each placement:
  1. Write the adapted copy (within placement constraints)
  2. Explain how user mindset affects copy strategy
  3. Identify the character limits and format restrictions
  4. Write the visual direction for this placement
  5. Define success metrics specific to this placement

  Then provide:
  - Placement-specific copy guide for all Meta placements
  - How Advantage+ placement affects your copy strategy
  - When to use placement-specific ads vs universal ads
  - Cross-placement testing methodology
  - Placement performance benchmarks (CTR, CPM by placement)

assertions:
  - type: llm_judge
    criteria: "Each placement adaptation reflects genuine user mindset differences — Facebook is community-oriented, Instagram is visual-first, Messenger is personal"
    weight: 0.30
    description: "Mindset-reflecting placement adaptations"
  - type: llm_judge
    criteria: "Format constraints are respected — right column copy is ultra-brief, Stories text is minimal, Reels feel native, Messenger feels personal"
    weight: 0.25
    description: "Constraint-respecting format copy"
  - type: llm_judge
    criteria: "The placement guide is comprehensive — covers every Meta placement with specific character limits, best practices, and performance expectations"
    weight: 0.25
    description: "Comprehensive placement guide"
  - type: llm_judge
    criteria: "The universal vs placement-specific decision framework is practical — helps advertisers decide when the effort of customization is worthwhile"
    weight: 0.20
    description: "Practical customization decision framework"
