meta:
  id: high-ticket-ad-copy
  level: 4
  course: ad-copy-meta-facebook
  type: output
  description: "Write Meta ad copy for high-ticket products and services ($500+) with long sales cycles"
  tags: [meta-ads, high-ticket, premium, sales-cycle, expert]

state: {}

trigger: |
  High-ticket products ($500+) require fundamentally different ad copy
  than impulse purchases. The sales cycle is longer, the decision
  involves more stakeholders, and the risk perception is higher.
  Meta ads for high-ticket items rarely aim for direct purchase —
  they drive to applications, consultations, webinars, or content
  that nurtures over time.

  Write Meta ad campaigns for 5 high-ticket products:

  Product 1: Executive coaching program ($5,000)
  Sales process: Ad → application form → phone screening → enrollment
  Audience: C-suite and senior managers, $200K+ income
  Task: Write the ad that drives qualified applications

  Product 2: Custom home renovation ($50,000-$150,000)
  Sales process: Ad → portfolio viewing → in-home consultation → estimate
  Audience: Homeowners, household income $150K+, specific neighborhoods
  Task: Write the ad that drives consultation requests

  Product 3: Enterprise SaaS platform ($2,000/month)
  Sales process: Ad → case study download → demo request → sales call
  Audience: VP-level decision makers at companies 200-5,000 employees
  Task: Write the ad sequence (top-of-funnel + retargeting)

  Product 4: Luxury travel package ($8,000/person, all-inclusive)
  Sales process: Ad → trip brochure download → phone consultation → booking
  Audience: Affluent travelers 40-65, household income $250K+
  Task: Write the ad that combines aspiration with concrete value

  Product 5: Professional certification program ($3,500)
  Sales process: Ad → free workshop → enrollment
  Audience: Mid-career professionals seeking advancement
  Task: Write the ad that drives free workshop registration

  For each product:
  1. Write the complete ad (primary text, headline, CTA)
  2. Design the micro-conversion path (what happens between ad click
     and final purchase)
  3. Write the qualification copy — elements that attract serious
     buyers and repel tire-kickers
  4. Address the price objection without mentioning the exact price
  5. Write the follow-up retargeting ad for people who clicked but
     didn't convert

  Then provide:
  - High-ticket ad copy framework: Educate → Qualify → Nurture → Close
  - How to handle price in ad copy (when to show, when to hide)
  - Qualification techniques: attracting buyers, filtering browsers
  - Long sales cycle ad strategies: nurture sequences on Meta
  - High-ticket CTR and CPA benchmarks by category

assertions:
  - type: llm_judge
    criteria: "Copy builds credibility for premium purchases — uses authority signals, social proof, and expertise markers appropriate for high-ticket decision-making"
    weight: 0.30
    description: "Premium credibility building"
  - type: llm_judge
    criteria: "Qualification is built into the copy — language and specificity naturally attract decision-makers and filter out unqualified prospects"
    weight: 0.25
    description: "Copy-embedded qualification"
  - type: llm_judge
    criteria: "The micro-conversion path is logical — each step reduces perceived risk and builds commitment incrementally toward the high-ticket purchase"
    weight: 0.25
    description: "Logical micro-conversion path"
  - type: llm_judge
    criteria: "The high-ticket framework is comprehensive — covers the full journey from awareness to close with specific copy recommendations at each stage"
    weight: 0.20
    description: "Comprehensive high-ticket framework"
