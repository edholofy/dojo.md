meta:
  id: countdown-email
  level: 1
  course: email-product-launch
  type: output
  description: "Write a countdown/final reminder pre-launch email"
  tags: [email, countdown, pre-launch, urgency]

state: {}

trigger: |
  Write a "launching tomorrow" countdown email for "BrewKit," a premium
  home coffee brewing starter kit ($129).

  Context:
  - Physical product launching tomorrow at 9am EST
  - Limited first run: only 500 kits produced
  - Early bird price: $99 for first 200 orders (normally $129)
  - Includes: pour-over dripper, grinder, scale, and 3 bags of single-origin beans
  - 4,800 people on the email list, 1,200 on the waitlist
  - Brand voice: craft-focused, coffee-passionate, premium

  The email should create excitement without manufactured hype.

assertions:
  - type: llm_judge
    criteria: "The countdown creates genuine excitement — the 500-unit limited run and $99 early bird pricing are real constraints that justify urgency without manipulation"
    weight: 0.30
    description: "Genuine urgency from real constraints"
  - type: llm_judge
    criteria: "The specific launch time (9am EST) is prominently communicated — the subscriber knows exactly when to be ready to order"
    weight: 0.20
    description: "Specific launch time prominently displayed"
  - type: llm_judge
    criteria: "The kit contents are showcased with passion — the email makes the pour-over dripper, grinder, and beans sound desirable, not just listed as features"
    weight: 0.25
    description: "Kit contents showcased with passion"
  - type: llm_judge
    criteria: "The early bird math is clear — $99 vs. $129 saves $30, but only for the first 200 orders out of 4,800+ subscribers. The urgency is real: demand will exceed supply"
    weight: 0.25
    description: "Clear early bird math and real scarcity"
