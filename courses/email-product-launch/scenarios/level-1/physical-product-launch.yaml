meta:
  id: physical-product-launch
  level: 1
  course: email-product-launch
  type: output
  description: "Write a launch email for a physical product"
  tags: [email, physical-product, launch, ecommerce]

state: {}

trigger: |
  Write a launch announcement email for "AuraLamp," a smart desk lamp with
  circadian rhythm lighting that adjusts color temperature throughout the day.

  Context:
  - Price: $149 (competitors: $200-$300 for similar features)
  - Ships in 5-7 business days
  - Features: circadian rhythm adjustment, app control, USB-C charging port,
    ambient light sensor, 50,000-hour LED lifespan
  - Available in 3 colors: Matte Black, Warm White, Space Gray
  - Brand voice: clean, modern, design-conscious
  - Early reviews from tech bloggers have been positive

  Write subject line, preview text, and email body.

assertions:
  - type: llm_judge
    criteria: "The circadian rhythm benefit is explained in human terms — not just 'adjusts color temperature' but how it helps you focus during the day and wind down at night"
    weight: 0.30
    description: "Circadian benefit explained in human terms"
  - type: llm_judge
    criteria: "The price positioning is smart — $149 against $200-$300 competitors is highlighted as a value advantage without making the product seem cheap"
    weight: 0.25
    description: "Smart price positioning vs. competitors"
  - type: llm_judge
    criteria: "The visual design aspect comes through in the copy — the email describes the lamp in a way that makes you want to see it on your desk, appealing to the design-conscious audience"
    weight: 0.25
    description: "Design appeal in copy"
  - type: llm_judge
    criteria: "Shipping timeline is clearly communicated — the 5-7 day timeline sets expectations, and the 3 color options give the buyer a concrete choice to envision"
    weight: 0.20
    description: "Clear shipping and options communication"
