meta:
  id: post-launch-social-proof
  level: 1
  course: email-product-launch
  type: output
  description: "Write a post-launch social proof email"
  tags: [email, post-launch, social-proof, momentum]

state: {}

trigger: |
  Write a post-launch social proof email for "ChartFlow," a data visualization
  SaaS tool that launched 5 days ago.

  Launch results to share:
  - 2,847 users signed up in the first week
  - 4.9/5 average rating from early users
  - Featured in TechCrunch and Product Hunt (#2 product of the day)
  - Key testimonials:
    * "Built my investor deck charts in 20 minutes instead of 4 hours" — Sarah, Founder
    * "Our team switched from Tableau. ChartFlow is 10x simpler" — Mike, Data Lead
    * "The AI chart suggestions are genuinely useful, not a gimmick" — Priya, Analyst

  Context:
  - 40% of the email list hasn't signed up yet
  - Launch pricing ($19/month) ends in 5 days
  - Brand voice: data-smart, precise, visual

  Convince the non-converters that the momentum is real.

assertions:
  - type: llm_judge
    criteria: "Launch momentum metrics are used persuasively — 2,847 signups, 4.9 rating, TechCrunch feature, and Product Hunt #2 collectively create a 'this is real' narrative"
    weight: 0.30
    description: "Momentum metrics create credibility"
  - type: llm_judge
    criteria: "Testimonials are strategically selected — each one addresses a different use case (solo founder, team migration, AI features) to reach different segments of the remaining 40%"
    weight: 0.25
    description: "Strategically selected diverse testimonials"
  - type: llm_judge
    criteria: "The launch pricing deadline creates secondary urgency — the social proof is the main message, but the 5-day pricing deadline provides a reason to act now"
    weight: 0.25
    description: "Launch pricing deadline as secondary urgency"
  - type: llm_judge
    criteria: "The email doesn't shame non-converters — it makes them feel like they're joining something exciting, not that they missed out"
    weight: 0.20
    description: "Inviting not shaming non-converters"
