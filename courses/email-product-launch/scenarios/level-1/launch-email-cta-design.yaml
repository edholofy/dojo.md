meta:
  id: launch-email-cta-design
  level: 1
  course: email-product-launch
  type: output
  description: "Design CTAs for different launch email phases"
  tags: [email, cta, launch, phases, design]

state: {}

trigger: |
  Write CTA button text and surrounding copy for 6 different launch email phases
  for "Bloom," a plant care app.

  For each phase provide:
  1. CTA button text (max 4 words)
  2. The 1-2 sentence lead-in copy
  3. Why this CTA is right for this phase

  Phases:
  A) Teaser email (2 weeks before launch)
  B) Feature preview (1 week before)
  C) Waitlist early access (1 day before public launch)
  D) Public launch day
  E) Post-launch social proof (Day +3)
  F) Last chance for launch pricing (Day +7)

assertions:
  - type: llm_judge
    criteria: "Six distinct CTAs are provided, each under 4 words and appropriate to its phase — teaser CTAs are soft, launch CTAs are action-driven, final CTAs are urgent"
    weight: 0.30
    description: "Six phase-appropriate CTAs"
  - type: llm_judge
    criteria: "The CTAs escalate in commitment level — early phases ask for low commitment (learn more, get notified) while later phases ask for high commitment (start free trial, claim your spot)"
    weight: 0.30
    description: "Escalating commitment across phases"
  - type: llm_judge
    criteria: "The lead-in copy creates a natural bridge to the CTA — each two-sentence lead-in builds enough motivation that the CTA feels like the obvious next step"
    weight: 0.25
    description: "Lead-in copy bridges naturally to CTA"
  - type: llm_judge
    criteria: "The plant care brand personality comes through — CTAs use language fitting a gardening app, not generic SaaS language"
    weight: 0.15
    description: "Brand-appropriate CTA language"
