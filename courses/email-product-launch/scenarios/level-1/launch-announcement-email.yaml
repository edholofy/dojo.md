meta:
  id: launch-announcement-email
  level: 1
  course: email-product-launch
  type: output
  description: "Write a launch day announcement email"
  tags: [email, launch-day, announcement, product]

state: {}

trigger: |
  Write a launch day announcement email for "FocusBoard," a new digital
  whiteboard tool for remote teams.

  Context:
  - Product: real-time collaborative whiteboard with AI meeting summaries
  - Price: $12/month per user (free plan with limited boards)
  - Launch day: today
  - Target audience: remote teams of 5-50 people
  - 3,200 people signed up for the waitlist
  - Brand voice: energetic, modern, team-oriented
  - This is THE launch email — should feel like an event

  Write subject line, preview text, and email body with a clear CTA.

assertions:
  - type: llm_judge
    criteria: "The email captures launch day energy — it feels like an event, not just another product update. The excitement is contagious"
    weight: 0.25
    description: "Launch day energy and excitement"
  - type: llm_judge
    criteria: "The value proposition is benefit-driven — leads with what teams can DO with FocusBoard, not a feature list. AI meeting summaries and collaboration are framed as outcomes"
    weight: 0.25
    description: "Benefit-driven value proposition"
  - type: llm_judge
    criteria: "There is ONE clear CTA — not 'try free, see pricing, watch demo, read blog' but a single primary action like 'Start for Free'"
    weight: 0.25
    description: "Single clear CTA"
  - type: llm_judge
    criteria: "The waitlist audience is acknowledged — they waited for this, and the email makes them feel valued for being early"
    weight: 0.25
    description: "Waitlist audience acknowledged"
