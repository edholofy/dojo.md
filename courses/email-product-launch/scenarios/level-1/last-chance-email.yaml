meta:
  id: last-chance-email
  level: 1
  course: email-product-launch
  type: output
  description: "Write a last-chance launch pricing email"
  tags: [email, last-chance, urgency, launch-closing]

state: {}

trigger: |
  Write the final "last chance" email for the launch of "MindMap Pro," a
  mind mapping tool for students and educators.

  Context:
  - Launch pricing: $4.99/month (regular: $9.99/month)
  - Launch pricing expires tonight at midnight EST
  - This is Email #6 (final email in the launch sequence)
  - 8,500 signups so far, goal was 10,000
  - Target audience: college students and professors
  - Brand voice: academic but accessible, slightly playful

  The email must create final-push urgency while maintaining brand integrity.
  Do NOT use fake scarcity or manipulative tactics.

assertions:
  - type: llm_judge
    criteria: "The midnight deadline is specific and real — the email states the exact time and timezone, and the price increase from $4.99 to $9.99 is a genuine consequence of waiting"
    weight: 0.30
    description: "Specific real deadline with consequences"
  - type: llm_judge
    criteria: "The email recaps the key value proposition one final time — for a student audience, emphasizing that $4.99/month is essentially the price of one coffee"
    weight: 0.25
    description: "Value recap with relatable pricing"
  - type: llm_judge
    criteria: "The 8,500 signup metric creates social proof — it shows momentum without feeling manufactured"
    weight: 0.20
    description: "Signup milestone as social proof"
  - type: llm_judge
    criteria: "The tone is appropriately urgent without being aggressive — it feels like a friendly heads-up from a teacher, not a pushy salesperson"
    weight: 0.25
    description: "Urgent but friendly academic tone"
