meta:
  id: basic-teaser-email
  level: 1
  course: email-product-launch
  type: output
  description: "Write a pre-launch teaser email that builds curiosity"
  tags: [email, teaser, pre-launch, curiosity]

state: {}

trigger: |
  Write a pre-launch teaser email for "ZenDesk Pro" (fictional), a new meditation
  app launching in 2 weeks.

  Context:
  - The app features AI-guided meditation personalized to your stress patterns
  - Target audience: busy professionals aged 28-45
  - Brand voice: calm, confident, intriguing
  - This is the FIRST email — don't reveal the product name or full details
  - Goal: create curiosity and get subscribers to watch for the next email

  Write subject line, preview text, and email body.

assertions:
  - type: llm_judge
    criteria: "The email creates genuine curiosity — it hints at the product's value without revealing full details, making the reader want to open the next email"
    weight: 0.30
    description: "Creates genuine curiosity"
  - type: llm_judge
    criteria: "The email focuses on the problem (stress, no time for wellness) rather than the solution — teasing the pain point before revealing the product"
    weight: 0.25
    description: "Problem-focused not solution-focused"
  - type: llm_judge
    criteria: "The tone is calm and intriguing — consistent with a meditation brand. Not hype-driven or overly excited"
    weight: 0.25
    description: "Calm intriguing tone"
  - type: llm_judge
    criteria: "The email is concise — under 100 words in the body. Teasers should be short and mysterious, not information-dense"
    weight: 0.20
    description: "Concise teaser length"
