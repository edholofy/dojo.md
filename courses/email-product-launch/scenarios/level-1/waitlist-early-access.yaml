meta:
  id: waitlist-early-access
  level: 1
  course: email-product-launch
  type: output
  description: "Write an early access email for waitlist subscribers"
  tags: [email, waitlist, early-access, exclusivity]

state: {}

trigger: |
  Write an early access email for waitlist subscribers of "CodePair," a new
  AI pair programming tool.

  Context:
  - 6,500 developers on the waitlist
  - Early access starts 48 hours before public launch
  - Early access benefit: 40% off first year ($96/year instead of $160/year)
  - The tool works inside VS Code and JetBrains IDEs
  - Brand voice: developer-friendly, technically precise, no marketing fluff
  - Developers hate being "marketed to" — this email should feel like a
    product update, not a sales pitch

  Write the email that makes waitlist subscribers feel valued and motivated
  to claim their early access.

assertions:
  - type: llm_judge
    criteria: "The email feels like a product announcement, not a marketing pitch — developers are allergic to sales language, and this email respects that by being direct and technical"
    weight: 0.30
    description: "Product announcement tone, not sales pitch"
  - type: llm_judge
    criteria: "The 48-hour early access window makes waitlist subscribers feel genuinely valued — they're getting something the public doesn't have yet"
    weight: 0.25
    description: "Genuine early access exclusivity"
  - type: llm_judge
    criteria: "Technical details are included — IDE compatibility (VS Code, JetBrains), how the AI works, and practical integration details that developers actually care about"
    weight: 0.25
    description: "Relevant technical details included"
  - type: llm_judge
    criteria: "The 40% discount is presented matter-of-factly — not with exclamation marks and hype but as a straightforward early adopter benefit"
    weight: 0.20
    description: "Discount presented matter-of-factly"
