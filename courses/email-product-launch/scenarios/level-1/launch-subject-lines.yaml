meta:
  id: launch-subject-lines
  level: 1
  course: email-product-launch
  type: output
  description: "Write subject lines for each phase of a product launch"
  tags: [email, subject-line, launch, phases]

state: {}

trigger: |
  Write subject lines for each email in a 6-email product launch sequence for
  "TasteBox," a gourmet snack subscription launching a new "International Flavors"
  quarterly box ($49.99).

  For each email in the sequence:
  1. The subject line (under 50 characters)
  2. Preview text
  3. The phase and purpose of the email

  Sequence:
  - Email 1: Teaser (2 weeks before launch)
  - Email 2: Preview with details (1 week before)
  - Email 3: Early access for subscribers (2 days before)
  - Email 4: Public launch day
  - Email 5: Social proof (3 days after)
  - Email 6: Last chance (1 week after, before orders close)

assertions:
  - type: llm_judge
    criteria: "Six subject lines are provided, each under 50 characters, with matching preview text and phase identification"
    weight: 0.25
    description: "Six complete subject line packages"
  - type: llm_judge
    criteria: "The subject lines build momentum across the sequence — from mysterious teaser to excited launch to urgent final push. Each one feels like the next chapter"
    weight: 0.30
    description: "Momentum builds across the sequence"
  - type: llm_judge
    criteria: "Different psychological approaches are used — curiosity for teasers, exclusivity for early access, excitement for launch day, FOMO for last chance"
    weight: 0.25
    description: "Varied psychological approaches per phase"
  - type: llm_judge
    criteria: "The food/flavor theme is present in the subject lines — they don't sound generic but connect to the gourmet snack product category"
    weight: 0.20
    description: "Product-relevant subject line language"
