meta:
  id: feature-spotlight-email
  level: 1
  course: email-product-launch
  type: output
  description: "Write a pre-launch feature spotlight email"
  tags: [email, feature-spotlight, pre-launch, benefits]

state: {}

trigger: |
  Write a pre-launch feature spotlight email for "PlannerPro," a new AI-powered
  daily planner app.

  Key features to spotlight:
  1. AI auto-scheduling (analyzes your habits and schedules tasks at optimal times)
  2. Focus mode (blocks distracting apps during deep work)
  3. Smart reminders (learns when you actually check reminders and adjusts)

  Context:
  - Launches in 5 days
  - This is Email #3 in the pre-launch sequence (after teaser and announcement)
  - Target: productivity enthusiasts who've tried every planner app
  - Brand voice: smart, efficient, slightly nerdy
  - Price: $7.99/month

  Write the email focusing on benefits, not just features.

assertions:
  - type: llm_judge
    criteria: "Each feature is presented as a benefit — AI scheduling saves time, Focus mode gets more done, Smart reminders mean nothing falls through cracks. Features serve outcomes"
    weight: 0.30
    description: "Benefits-first feature presentation"
  - type: llm_judge
    criteria: "The email speaks to productivity app fatigue — it acknowledges that the audience has tried many apps before and positions PlannerPro as the one that actually works differently"
    weight: 0.25
    description: "Addresses productivity app fatigue"
  - type: llm_judge
    criteria: "The 3 features are presented in a scannable format — not buried in paragraphs but visually separated and easy to digest quickly"
    weight: 0.25
    description: "Scannable feature presentation"
  - type: llm_judge
    criteria: "The email builds toward the launch date — it creates anticipation for the 5-day-away launch with a CTA to get notified or join early access"
    weight: 0.20
    description: "Builds anticipation for upcoming launch"
