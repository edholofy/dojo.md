meta:
  id: international-launch-localization
  level: 4
  course: email-product-launch
  type: output
  description: "Adapt a launch email for three different international markets"
  tags: [email, launch, international, localization, cultural]

state: {}

trigger: |
  "PayFlow," a B2B invoicing tool ($19/month), is launching simultaneously
  in three new markets. Adapt the core launch email for each market.

  Core value proposition:
  - Send invoices in 30 seconds, get paid 3x faster
  - Supports local payment methods, currencies, and tax compliance
  - 15,000 businesses already use it in the US market

  Market 1 — Japan:
  - List: 8,000 (collected through partnership with a Japanese accounting firm)
  - Must respect formal business communication norms (keigo concepts)
  - Emphasize: reliability, precision, data security
  - Local payment: supports bank transfers (furikomi) and convenience store payment
  - Tax: consumption tax (10%) compliance built-in

  Market 2 — Brazil:
  - List: 12,000 (from a fintech newsletter partnership)
  - Brazilian business communication is warmer and more relationship-driven
  - Emphasize: speed, ease, mobile-first (80% will read on mobile)
  - Local payment: supports Pix, boleto bancário
  - Tax: nota fiscal eletrônica (NF-e) generation included

  Market 3 — Germany:
  - List: 6,000 (from trade show leads)
  - German business communication values precision, credentials, data privacy
  - Emphasize: GDPR compliance, German data hosting, accuracy
  - Local payment: supports SEPA direct debit, Giropay
  - Tax: Umsatzsteuer (VAT) compliant with reverse charge support

  Write all three localized versions IN ENGLISH but adapted for each
  market's business communication norms and priorities.

assertions:
  - type: llm_judge
    criteria: "Japan version reflects formal business norms — respectful tone, emphasis on reliability and precision, proper honorific awareness even in English, and trust-building before the ask"
    weight: 0.25
    description: "Japan-appropriate formal business tone"
  - type: llm_judge
    criteria: "Brazil version is warmer and mobile-optimized — conversational business tone, shorter paragraphs, prominent mobile CTAs, and emphasis on speed and Pix/boleto support"
    weight: 0.25
    description: "Brazil warm mobile-optimized approach"
  - type: llm_judge
    criteria: "Germany version leads with data privacy and credentials — GDPR compliance, German hosting, precision claims are backed by specifics, and the tone is professional and thorough"
    weight: 0.25
    description: "Germany privacy-first precise approach"
  - type: llm_judge
    criteria: "Each version features the correct local payment methods and tax compliance — these aren't generic mentions but specific to each market's actual business payment infrastructure"
    weight: 0.25
    description: "Accurate local payment and tax features"
