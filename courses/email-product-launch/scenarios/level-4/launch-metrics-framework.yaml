meta:
  id: launch-metrics-framework
  level: 4
  course: email-product-launch
  type: output
  description: "Design a launch email metrics and reporting framework"
  tags: [email, launch, metrics, analytics, reporting]

state: {}

trigger: |
  You're the email marketing lead for "ShopifyPlus" (fictional) launching
  a new AI product recommendation engine to their 150,000 merchant email list.

  The CMO wants a comprehensive metrics framework BEFORE the launch
  emails go out. She wants to know exactly how you'll measure success
  at every stage.

  Campaign details:
  - 7-email sequence over 21 days
  - Goal: 5,000 merchants activate the AI feature (free for existing plans)
  - Secondary goal: 500 merchants upgrade to a higher plan for advanced AI
  - List segments: small merchants (<$10K/mo), mid-market ($10K-$100K/mo),
    enterprise (>$100K/mo)

  Create:
  1. A metrics framework with KPIs at each funnel stage:
     Delivered → Opened → Clicked → Landed → Activated → Upgraded
  2. Benchmarks for each metric (what good looks like for B2B SaaS)
  3. Segment-specific targets (small, mid-market, enterprise)
  4. A real-time dashboard specification (what to track hourly/daily/weekly)
  5. Decision triggers — at what metric thresholds do you change strategy?
  6. Write the launch email (Email 1) with tracking parameters built
     into every link and CTA

  Then write Email 1 with UTM parameters and tracking annotations.

assertions:
  - type: llm_judge
    criteria: "The funnel framework is complete — every stage from delivery to upgrade has specific KPIs, benchmarks, and segment-specific targets that are realistic for B2B SaaS"
    weight: 0.25
    description: "Complete funnel KPI framework"
  - type: llm_judge
    criteria: "Decision triggers are specific and actionable — 'if open rate drops below X% after email 3, do Y' rather than vague 'monitor performance' guidance"
    weight: 0.25
    description: "Specific actionable decision triggers"
  - type: llm_judge
    criteria: "The dashboard specification is practical — it specifies exactly what to track at hourly, daily, and weekly intervals, with alert thresholds that a marketing ops team could implement"
    weight: 0.25
    description: "Practical dashboard specification"
  - type: llm_judge
    criteria: "Email 1 has proper tracking — UTM parameters on every link, event tracking annotations, and clear connection between email interactions and funnel metrics"
    weight: 0.25
    description: "Properly tracked Email 1"
