meta:
  id: multichannel-launch-orchestration
  level: 4
  course: email-product-launch
  type: output
  description: "Design a multi-channel launch email sequence with SMS and push"
  tags: [email, launch, multichannel, sms, orchestration]

state: {}

trigger: |
  Design a 14-day multi-channel launch campaign for "FreshPrep," a
  meal kit delivery service expanding to 5 new cities.

  Channels available:
  - Email (42,000 subscribers in the new cities, from waitlist)
  - SMS (18,000 opted-in for text updates)
  - Push notifications (12,000 app installs from "coming soon" page)
  - In-app messages (for app users)

  Product:
  - Meal kits: $8.99-$12.99 per serving, 3 plans (2, 3, or 4 nights/week)
  - First box: 50% off with code FRESHSTART
  - Free delivery on first 3 orders
  - Local chef partnerships in each city (unique selling point)

  Requirements:
  - Map out every touchpoint across all channels for 14 days
  - Specify which channel fires when and what triggers the next message
  - Email opens should suppress SMS for the same message
  - Non-openers get SMS follow-up after 24 hours
  - Write the full copy for: Day 1 launch email, Day 1 SMS, Day 3 follow-up
    email, and Day 7 "last chance for 50% off" email
  - Include behavioral triggers (e.g., opened but didn't click, clicked
    but didn't order)

  Design the complete orchestration with full copy for the 4 specified pieces.

assertions:
  - type: llm_judge
    criteria: "The 14-day calendar is complete and logical — every touchpoint is mapped with channel, timing, trigger conditions, and suppression rules. No channel bombards users"
    weight: 0.25
    description: "Complete logical 14-day orchestration"
  - type: llm_judge
    criteria: "Channel coordination prevents fatigue — email/SMS suppression rules are clear, behavioral triggers are well-defined, and users on multiple channels aren't overwhelmed"
    weight: 0.25
    description: "Smart channel coordination and suppression"
  - type: llm_judge
    criteria: "All four required copy pieces are written — Day 1 email, Day 1 SMS, Day 3 follow-up, and Day 7 last chance. Each piece is appropriate for its channel and timing"
    weight: 0.25
    description: "All four copy pieces written"
  - type: llm_judge
    criteria: "The SMS copy is genuinely SMS-optimized — under 160 characters where possible, conversational tone, clear CTA link, and feels native to text messaging"
    weight: 0.25
    description: "SMS-native copy optimization"
