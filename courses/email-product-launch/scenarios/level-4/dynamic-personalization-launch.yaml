meta:
  id: dynamic-personalization-launch
  level: 4
  course: email-product-launch
  type: output
  description: "Design a dynamically personalized launch email with conditional content"
  tags: [email, launch, personalization, dynamic-content, segmentation]

state: {}

trigger: |
  Design a single launch email template with dynamic content blocks for
  "WorkOS," a productivity suite launching to replace multiple tools
  (project management, docs, chat, video).

  Price: $12/user/month (vs. $35+ for separate tools)

  Dynamic variables available:
  - {{company_size}}: startup (1-50), mid-market (51-500), enterprise (500+)
  - {{current_tools}}: list of tools they currently use (from survey data)
  - {{role}}: manager, IC (individual contributor), executive
  - {{industry}}: tech, finance, healthcare, education, other
  - {{pain_point}}: from lead scoring — "too many tools," "expensive stack,"
    "poor collaboration," or "security concerns"

  Write the complete email template with:
  1. A base structure that works for everyone
  2. Dynamic hero headline variations (by pain_point)
  3. Dynamic social proof blocks (by company_size and industry)
  4. Dynamic feature highlights (based on current_tools they'd replace)
  5. Dynamic CTA (by role — managers get "Start team trial,"
     ICs get "Try it free," executives get "See ROI calculator")
  6. Fallback content for any missing variables

  Show at least 3 complete "rendered" examples for different personas.

assertions:
  - type: llm_judge
    criteria: "The template structure is clear — base content, dynamic blocks, and conditional logic are well-organized and a developer could implement this in an ESP like Klaviyo or HubSpot"
    weight: 0.25
    description: "Implementable template structure"
  - type: llm_judge
    criteria: "Dynamic content is genuinely personalized — headline variations, social proof, and features change meaningfully based on the variables, not just swapping a name"
    weight: 0.25
    description: "Genuinely personalized dynamic content"
  - type: llm_judge
    criteria: "At least 3 rendered examples show distinct personas — a startup tech manager, a mid-market finance executive, and an enterprise healthcare IC (or similar variety)"
    weight: 0.25
    description: "Three distinct rendered persona examples"
  - type: llm_judge
    criteria: "Fallback content is provided — when variables are missing, the email still reads well with sensible defaults rather than showing blank blocks or broken logic"
    weight: 0.25
    description: "Graceful fallback content"
