meta:
  id: ab-test-launch-strategy
  level: 4
  course: email-product-launch
  type: output
  description: "Design A/B test variants for a launch email campaign"
  tags: [email, launch, ab-testing, optimization, strategy]

state: {}

trigger: |
  You're launching "CloudKitchen," a ghost kitchen management platform for
  restaurant owners ($199/month). Your list has 18,000 restaurant owners
  and managers.

  Design a comprehensive A/B testing strategy for the launch email campaign.

  For each test, provide:
  - The two variants (A and B)
  - The hypothesis behind each
  - Which metric determines the winner
  - Minimum sample size reasoning

  Tests to design:
  1. Subject line test (curiosity vs. benefit-driven)
  2. Hero section test (problem-focused vs. solution-focused opening)
  3. Social proof test (data-driven stats vs. customer story)
  4. CTA test (free trial vs. demo request)

  Then write BOTH full email variants for Test 2 (hero section), since
  that typically has the highest impact on conversion.

  Constraints:
  - Only test one variable at a time
  - Tests must be statistically valid (explain sample size requirements)
  - Account for the restaurant industry's lower email engagement rates

assertions:
  - type: llm_judge
    criteria: "All four A/B tests have clear hypotheses — each test explains WHY each variant might win, grounded in email marketing principles and restaurant industry context"
    weight: 0.25
    description: "Clear hypotheses for all tests"
  - type: llm_judge
    criteria: "Statistical rigor is present — sample sizes account for the 18K list, restaurant industry open rates (~15-20%), and provide enough power to detect meaningful differences"
    weight: 0.25
    description: "Statistical rigor in test design"
  - type: llm_judge
    criteria: "The two full hero section variants are genuinely different — one leads with the problem (chaos of managing ghost kitchens) and one leads with the solution (streamlined operations)"
    weight: 0.25
    description: "Genuinely different hero section variants"
  - type: llm_judge
    criteria: "Success metrics are well-chosen — subject line tests measure open rate, hero section tests measure scroll depth or CTA click, etc. Each metric matches what the test actually measures"
    weight: 0.25
    description: "Appropriate success metrics per test"
