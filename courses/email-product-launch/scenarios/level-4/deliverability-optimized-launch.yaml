meta:
  id: deliverability-optimized-launch
  level: 4
  course: email-product-launch
  type: output
  description: "Write a launch email optimized for deliverability"
  tags: [email, launch, deliverability, inbox-placement, technical]

state: {}

trigger: |
  Write a launch email for "SecurePass," a password manager for small
  businesses ($3/user/month), specifically optimized for email deliverability.

  Context:
  - Sending domain is new (registered 2 months ago, warming up)
  - List: 25,000 contacts from a lead magnet (downloaded a security guide)
  - List age: collected over 6 months, no cleaning done yet
  - ESP: SendGrid
  - Previous campaign (security guide follow-up) got 38% open rate

  Deliverability concerns:
  - New sending domain, limited reputation
  - List hasn't been cleaned (expect some bounces)
  - Security/password topics can trigger spam filters
  - The word "password" in subject lines often gets flagged

  Requirements:
  1. Write the email (subject line, preview text, body, CTA) optimized
     to avoid spam filters while remaining compelling
  2. Provide a pre-send deliverability checklist
  3. Recommend a sending strategy (batching, timing, warm-up)
  4. List specific words and phrases to avoid in security product emails
  5. Recommend list hygiene steps before sending

  The email must be compelling enough to drive sign-ups while being
  technically optimized for inbox placement.

assertions:
  - type: llm_judge
    criteria: "The email avoids spam trigger words — no ALL CAPS, excessive exclamation marks, 'free,' 'guaranteed,' or aggressive security language that triggers filters"
    weight: 0.25
    description: "Spam trigger word avoidance"
  - type: llm_judge
    criteria: "The deliverability checklist is comprehensive — covers authentication (SPF, DKIM, DMARC), list hygiene, text-to-image ratio, unsubscribe link, and sending infrastructure"
    weight: 0.25
    description: "Comprehensive deliverability checklist"
  - type: llm_judge
    criteria: "The sending strategy accounts for domain warming — batch sizes, timing between batches, engagement-based sending order, and monitoring recommendations"
    weight: 0.25
    description: "Domain warming sending strategy"
  - type: llm_judge
    criteria: "The email itself is still compelling — despite all the technical constraints, the copy drives genuine interest in SecurePass and has a clear, motivating CTA"
    weight: 0.25
    description: "Compelling despite deliverability constraints"
