meta:
  id: launch-sequence-audit
  level: 4
  course: email-product-launch
  type: output
  description: "Audit a complete launch email sequence and fix it"
  tags: [email, launch, audit, optimization, sequence]

state: {}

trigger: |
  Audit this 5-email launch sequence for "DesignSpace," a design tool
  for non-designers ($14/month). Identify all problems and rewrite the
  problematic emails.

  Current sequence and metrics:

  Email 1 - Teaser (Day -7):
  Subject: "Something exciting is coming..."
  Open rate: 34%, Click rate: 2.1%
  Body: Vague teaser with blurred product screenshot, "Stay tuned!"
  CTA: "Get notified" (but they're already on the list)

  Email 2 - Launch Day (Day 0):
  Subject: "DesignSpace is HERE! 🎨"
  Open rate: 28%, Click rate: 4.3%
  Body: Feature list (templates, AI suggestions, export options,
  collaboration, brand kit). Free trial CTA. Solid email overall.

  Email 3 - Features Deep Dive (Day 2):
  Subject: "Check out these 47 features!"
  Open rate: 18%, Click rate: 1.2%
  Body: Literally lists 47 features in bullet points. No narrative.

  Email 4 - Social Proof (Day 5):
  Subject: "People are loving DesignSpace"
  Open rate: 15%, Click rate: 0.9%
  Body: 8 testimonials back-to-back, all saying similar things
  ("great tool!", "so easy!", "love it!"). Generic and repetitive.

  Email 5 - Deadline (Day 10):
  Subject: "LAST CHANCE: 40% off ends TONIGHT!!!"
  Open rate: 22%, Click rate: 3.8%
  Body: Heavy urgency, countdown timer, all-caps sections.
  This is the first mention of any discount in the entire sequence.

  Provide:
  1. A detailed audit of each email with specific problems
  2. Sequence-level issues (pacing, narrative arc, engagement drop-off)
  3. Rewritten versions of Emails 1, 3, and 4 (the weakest performers)
  4. Recommended changes to the overall sequence strategy

assertions:
  - type: llm_judge
    criteria: "The audit identifies specific problems per email — not just 'this is bad' but exactly what's wrong (redundant CTA in email 1, feature dump in email 3, generic testimonials in email 4, surprise discount in email 5)"
    weight: 0.25
    description: "Specific per-email problem identification"
  - type: llm_judge
    criteria: "Sequence-level analysis is provided — the engagement drop-off pattern is explained, the narrative arc problems are identified, and the sudden discount in email 5 undermines earlier full-price positioning"
    weight: 0.25
    description: "Sequence-level pattern analysis"
  - type: llm_judge
    criteria: "The three rewritten emails are substantially improved — Email 1 has a compelling specific teaser, Email 3 transforms features into benefits/use cases, Email 4 uses diverse specific testimonials"
    weight: 0.30
    description: "Substantially improved rewrites"
  - type: llm_judge
    criteria: "Strategic sequence recommendations are actionable — suggestions for pacing, narrative arc, when to introduce pricing, and how to maintain engagement across the full sequence"
    weight: 0.20
    description: "Actionable sequence strategy recommendations"
