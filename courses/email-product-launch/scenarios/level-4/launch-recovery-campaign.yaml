meta:
  id: launch-recovery-campaign
  level: 4
  course: email-product-launch
  type: output
  description: "Design a post-launch recovery campaign after disappointing results"
  tags: [email, launch, recovery, post-launch, strategy]

state: {}

trigger: |
  Your product launch underperformed significantly. Design a recovery
  email campaign.

  Product: "TeamSync," a team communication tool ($8/user/month)
  Launch results (Day 0-7):
  - Sent to: 50,000 email subscribers
  - Launch email: 21% open, 2.1% click, 0.3% trial sign-up (150 trials)
  - Follow-up email (Day 3): 14% open, 0.8% click
  - Target was: 1,500 trials in Week 1
  - You hit 10% of target

  Post-launch analysis:
  - Product-market messaging was off — positioned as "Slack killer" when
    audience wanted "Slack complement" (not replacement)
  - Pricing page had a confusing tier structure (3 tiers too similar)
  - The sign-up flow had 6 steps (industry average: 3)
  - Competitive launch: Slack released a major update the same week

  Recovery resources:
  - Engineering simplified sign-up to 2 steps
  - Pricing page redesigned (2 clear tiers: Free and Pro)
  - New positioning: "The async layer your team needs alongside Slack"
  - Budget for a relaunch email + 3-email recovery sequence

  Design the complete recovery campaign:
  1. Relaunch email acknowledging the pivot (without seeming desperate)
  2. Three follow-up emails over 10 days
  3. Strategy for re-engaging the 49,850 who didn't convert

assertions:
  - type: llm_judge
    criteria: "The relaunch email repositions without seeming desperate — the messaging pivot from 'Slack killer' to 'Slack complement' feels like a natural evolution, not an admission of failure"
    weight: 0.25
    description: "Confident repositioning without desperation"
  - type: llm_judge
    criteria: "The simplified sign-up and pricing are featured — the friction reduction (6 steps to 2, clearer pricing) is communicated as product improvements that benefit the user"
    weight: 0.25
    description: "Friction reduction clearly communicated"
  - type: llm_judge
    criteria: "The 3-email sequence has a logical arc — each email serves a different purpose (reintroduce, demonstrate value, convert) rather than repeating the same pitch"
    weight: 0.25
    description: "Logical 3-email recovery arc"
  - type: llm_judge
    criteria: "Re-engagement strategy is segmented — different approaches for non-openers, openers who didn't click, clickers who didn't sign up, addressing each drop-off point"
    weight: 0.25
    description: "Segmented re-engagement by drop-off point"
