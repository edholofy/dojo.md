meta:
  id: launch-timing-strategy
  level: 4
  course: email-product-launch
  type: output
  description: "Design send timing strategy for a global launch email campaign"
  tags: [email, launch, timing, send-time, optimization]

state: {}

trigger: |
  Design the complete send timing strategy for the launch of "RemoteHQ,"
  a virtual office platform ($15/user/month) targeting distributed teams.

  List composition:
  - 65,000 total subscribers across time zones:
    - US East: 22,000 (34%)
    - US West: 15,000 (23%)
    - UK/Europe: 12,000 (18%)
    - Asia-Pacific: 9,000 (14%)
    - Other: 7,000 (11%)
  - Mix of decision-makers (40%) and end-users (60%)
  - B2B audience — primarily opens during work hours

  Historical engagement data:
  - Best open rates: Tuesday-Thursday, 9-11am local time
  - Decision-makers open earlier (7-9am), end-users later (10am-12pm)
  - Weekend sends have 40% lower engagement
  - Mobile opens: 55% of total (higher for Asia-Pacific at 72%)

  Campaign:
  - 5-email launch sequence over 14 days
  - Email 1: Announcement (Day 0)
  - Email 2: Feature deep-dive (Day 3)
  - Email 3: Case study (Day 5)
  - Email 4: Q&A / objection handling (Day 9)
  - Email 5: Last chance for launch pricing (Day 14)

  Provide:
  1. Optimal send time for each email by time zone segment
  2. Role-based timing adjustments (decision-makers vs. end-users)
  3. Day-of-week strategy for each email
  4. Write the subject line and preview text for all 5 emails
  5. Recommended resend strategy for non-openers

assertions:
  - type: llm_judge
    criteria: "Time zone segmentation is specific — each of the 5 segments gets a recommended send time that accounts for local business hours, not just one global send time"
    weight: 0.25
    description: "Specific time zone send recommendations"
  - type: llm_judge
    criteria: "Role-based timing is practical — decision-makers and end-users get different send windows, with explanation of how to implement this in a real ESP"
    weight: 0.25
    description: "Practical role-based timing"
  - type: llm_judge
    criteria: "The 14-day calendar avoids timing conflicts — no emails land on weekends, the cadence allows breathing room, and each email falls on a high-engagement day"
    weight: 0.25
    description: "Conflict-free 14-day timing calendar"
  - type: llm_judge
    criteria: "All 5 subject lines and preview texts are written — each pair works together (preview text extends, not repeats, the subject) and reflects the email's purpose in the sequence"
    weight: 0.25
    description: "Five cohesive subject line and preview pairs"
