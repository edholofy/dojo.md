meta:
  id: accessibility-inclusive-launch
  level: 4
  course: email-product-launch
  type: output
  description: "Write a fully accessible and inclusive launch email"
  tags: [email, launch, accessibility, inclusive-design, wcag]

state: {}

trigger: |
  Write a launch email for "AccessKit," an accessibility testing tool
  for web developers ($29/month), that itself serves as a model of
  accessible email design.

  Product:
  - Automated WCAG 2.1 AA compliance checking
  - Real-time suggestions as developers code
  - Integrates with VS Code, Chrome DevTools, CI/CD pipelines
  - Simulates screen reader, color blindness, motor impairment experiences
  - Free tier: 1 site, Pro: unlimited sites + CI/CD

  Audience:
  - 20,000 web developers from tech newsletters and conference lists
  - Many use screen readers or assistive technology themselves
  - Accessibility-conscious community that will scrutinize your email

  The email must:
  - Follow WCAG 2.1 AA guidelines in its own design
  - Include proper semantic structure (heading hierarchy, alt text notes)
  - Maintain 4.5:1 contrast ratio minimum
  - Work without images (image-off rendering)
  - Be fully navigable by keyboard/screen reader
  - Avoid relying solely on color to convey information
  - Include accessible HTML/CSS annotations and guidance

  Write the email with inline comments explaining each accessibility
  decision, so it serves as both marketing and education.

assertions:
  - type: llm_judge
    criteria: "The email itself follows WCAG 2.1 AA — proper heading hierarchy, alt text directions, contrast ratios specified, no color-only information, and keyboard/screen reader navigability addressed"
    weight: 0.30
    description: "WCAG 2.1 AA compliant email design"
  - type: llm_judge
    criteria: "Inline accessibility annotations are educational — comments explain WHY each decision was made (not just what), teaching developers accessibility principles through the email itself"
    weight: 0.25
    description: "Educational accessibility annotations"
  - type: llm_judge
    criteria: "The email works without images — the content degrades gracefully, alt text is meaningful, and the core message is fully conveyed through text alone"
    weight: 0.20
    description: "Graceful image-off degradation"
  - type: llm_judge
    criteria: "Despite all accessibility constraints, the email is compelling marketing — the product's value proposition is clear, the CTA is motivating, and it doesn't feel like a compliance checkbox"
    weight: 0.25
    description: "Compelling marketing within accessibility constraints"
