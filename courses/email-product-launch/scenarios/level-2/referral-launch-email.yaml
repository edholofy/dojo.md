meta:
  id: referral-launch-email
  level: 2
  course: email-product-launch
  type: output
  description: "Write a launch email with a referral incentive"
  tags: [email, launch, referral, viral, incentive]

state: {}

trigger: |
  Write a post-launch referral email for "StudyBuddy," a flashcard and study
  app for students. The app launched 3 days ago.

  Referral program:
  - Referrer gets: 1 month free Premium for every friend who signs up
  - Friend gets: 2 weeks free Premium
  - Current users: 3,200 (launched 3 days ago)
  - Goal: reach 10,000 users in 30 days through referrals
  - Referral link: unique per user (can be shared anywhere)
  - The app works best with friends (study groups, shared decks)

  Context:
  - Target: college students (18-24)
  - Brand voice: fun, energetic, student-speak
  - Price: Free tier, Premium $3.99/month (unlimited decks, AI explanations)

  Make the referral feel natural, not like a pyramid scheme.

assertions:
  - type: llm_judge
    criteria: "The referral is framed as sharing something valuable — 'Your friends need this for finals too' rather than 'Earn rewards by referring'"
    weight: 0.30
    description: "Value-sharing framing, not reward-hunting"
  - type: llm_judge
    criteria: "The social element is leveraged — studying with friends is more effective, shared flashcard decks save time. The referral aligns with how students actually use study tools"
    weight: 0.25
    description: "Social study benefit leveraged"
  - type: llm_judge
    criteria: "The incentive structure is clear — both parties benefit, and the math is simple. No confusing tiers or conditions"
    weight: 0.25
    description: "Clear simple incentive structure"
  - type: llm_judge
    criteria: "The tone matches student speak — casual, energetic, uses language that resonates with college students without being try-hard or cringey"
    weight: 0.20
    description: "Authentic student-appropriate tone"
