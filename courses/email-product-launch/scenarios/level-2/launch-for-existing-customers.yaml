meta:
  id: launch-for-existing-customers
  level: 2
  course: email-product-launch
  type: output
  description: "Write a new product launch email to existing customers"
  tags: [email, launch, existing-customers, upsell, new-product]

state: {}

trigger: |
  "FitTrack" (a fitness wearable company) is launching a new product to their
  existing customer base.

  Existing product: FitTrack Band ($79) — basic activity tracker
  New product: FitTrack Pro ($199) — advanced smartwatch with health monitoring

  New features in Pro: ECG, blood oxygen, sleep staging, GPS, 5-day battery
  Upgrade offer: existing Band customers get $50 off Pro ($149)

  Context:
  - Sending to 45,000 existing Band customers
  - These customers already trust the brand and wear a FitTrack daily
  - They do NOT need to be sold on the brand — just on the upgrade
  - Brand voice: health-focused, motivational, data-driven
  - Average FitTrack Band customer has owned theirs for 14 months

  Write the launch email specifically for existing customers (not new prospects).

assertions:
  - type: llm_judge
    criteria: "The email recognizes the existing relationship — it doesn't introduce the brand from scratch but celebrates that they've been FitTrack users and positions Pro as their next step"
    weight: 0.30
    description: "Leverages existing customer relationship"
  - type: llm_judge
    criteria: "The upgrade benefits are positioned relative to what they already have — not 'Pro has GPS' but 'your Band tracks steps; Pro tracks your entire health story with ECG, blood oxygen, and sleep staging'"
    weight: 0.25
    description: "Benefits positioned relative to current product"
  - type: llm_judge
    criteria: "The $50 loyalty discount is presented as earned, not random — it's framed as a thank-you for being an existing customer, making them feel valued"
    weight: 0.25
    description: "Loyalty discount feels earned"
  - type: llm_judge
    criteria: "Data migration or continuity is addressed — existing customers want to know their historical fitness data carries over to the new device"
    weight: 0.20
    description: "Data continuity concern addressed"
