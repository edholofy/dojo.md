meta:
  id: beta-to-launch-email
  level: 2
  course: email-product-launch
  type: output
  description: "Write a launch email leveraging beta tester feedback"
  tags: [email, beta, launch, testimonials, feedback]

state: {}

trigger: |
  Write a launch announcement email for "InboxZero," an email management tool
  that's transitioning from closed beta to public launch.

  Beta results:
  - 350 beta testers over 3 months
  - Average time saved: 47 minutes per day
  - NPS score: 82
  - Key quote: "I went from 200+ unread emails to inbox zero every day" — David, VP Sales
  - Key quote: "The AI categorization is scary accurate" — Priya, Product Manager
  - Key quote: "I've unsubscribed from my other email tools" — Marcus, Founder
  - 3 bugs reported and fixed during beta, 47 feature requests implemented

  Context:
  - Price: $12/month (beta testers get $8/month for life)
  - The beta period built real credibility
  - Brand voice: productive, clean, no-clutter (like the product itself)

  Leverage the beta results to make the public launch irresistible.

assertions:
  - type: llm_judge
    criteria: "Beta results are used as powerful social proof — 350 testers, 47 minutes saved daily, NPS 82, and specific quotes create a 'proven product' narrative"
    weight: 0.30
    description: "Beta results as powerful social proof"
  - type: llm_judge
    criteria: "The beta-to-public transition is framed positively — the product is mature and tested, not an untested new release. This reduces perceived risk for new users"
    weight: 0.25
    description: "Mature tested product framing"
  - type: llm_judge
    criteria: "The '47 minutes saved per day' statistic is the hero metric — it's specific, quantified, and immediately compelling to anyone who struggles with email overload"
    weight: 0.25
    description: "Hero metric prominently featured"
  - type: llm_judge
    criteria: "The beta tester loyalty pricing ($8/month for life) is mentioned to signal that existing users love it enough to lock in — social proof through committed pricing"
    weight: 0.20
    description: "Beta loyalty pricing as social proof"
