meta:
  id: landing-page-alignment
  level: 2
  course: email-product-launch
  type: output
  description: "Write a launch email aligned with its landing page"
  tags: [email, landing-page, alignment, consistency]

state: {}

trigger: |
  "VoiceNote" (a voice-to-text note-taking app) has a landing page with these elements:
  - Headline: "Turn Your Voice Into Organized Notes in Seconds"
  - Subheadline: "AI-powered voice notes that automatically categorize, summarize, and action-item your thoughts"
  - Hero image: person speaking into phone, text appearing on screen
  - Social proof bar: "Used by 25,000+ professionals"
  - Price: Free, Pro $6.99/month
  - CTA: "Start Free"

  Write a launch day email that perfectly aligns with this landing page.
  Then explain 5 specific alignment principles you followed.

assertions:
  - type: llm_judge
    criteria: "The email headline/messaging mirrors the landing page — the subscriber should feel immediate continuity when clicking from email to page, not confusion"
    weight: 0.30
    description: "Email-to-landing page messaging alignment"
  - type: llm_judge
    criteria: "The email CTA matches the landing page CTA — 'Start Free' is used consistently, creating a coherent journey from inbox to signup"
    weight: 0.20
    description: "Consistent CTA across email and page"
  - type: llm_judge
    criteria: "The 5 alignment principles are identified and explained — covering headline consistency, visual tone, offer matching, CTA alignment, and audience expectation management"
    weight: 0.30
    description: "Five clear alignment principles explained"
  - type: llm_judge
    criteria: "The social proof (25,000+ professionals) appears in both email and page — reinforcing the message rather than introducing new claims"
    weight: 0.20
    description: "Social proof consistency"
