meta:
  id: full-saas-launch-sequence
  level: 2
  course: email-product-launch
  type: output
  description: "Design a complete 6-email SaaS product launch sequence"
  tags: [email, saas, launch-sequence, full-sequence]

state: {}

trigger: |
  Design a complete 6-email launch sequence for "ScheduleAI," an AI scheduling
  assistant that integrates with Google Calendar and Outlook.

  Product details:
  - Price: Free tier (basic scheduling), Pro $8/month (AI features + team sync)
  - Key differentiator: learns your scheduling preferences over time
  - Competitors: Calendly, Cal.com, SavvyCal
  - Target: solopreneurs and small team leads
  - Waitlist: 4,200 people
  - Brand voice: efficient, smart, friendly

  For each of the 6 emails provide: timing, subject line, email body summary,
  CTA, and the strategic goal.

assertions:
  - type: llm_judge
    criteria: "The 6-email sequence covers the full arc — teaser, preview, early access, launch day, social proof, and last chance. Each email has a clear distinct purpose"
    weight: 0.25
    description: "Complete launch arc across 6 emails"
  - type: llm_judge
    criteria: "The competitive positioning is handled — the sequence differentiates from Calendly, Cal.com, and SavvyCal without badmouthing them, focusing on the AI learning advantage"
    weight: 0.25
    description: "Smart competitive differentiation"
  - type: llm_judge
    criteria: "The free-to-Pro upgrade path is woven in — the sequence primarily drives free signups but plants seeds for Pro conversion throughout"
    weight: 0.25
    description: "Free-to-Pro upgrade path woven in"
  - type: llm_judge
    criteria: "Timing is strategically planned — emails are spaced to build momentum without fatigue, with the intensity increasing closer to launch day"
    weight: 0.25
    description: "Strategic timing and pacing"
