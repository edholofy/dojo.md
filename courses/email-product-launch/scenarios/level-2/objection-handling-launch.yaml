meta:
  id: objection-handling-launch
  level: 2
  course: email-product-launch
  type: output
  description: "Write a post-launch objection-handling email"
  tags: [email, launch, objection-handling, conversion]

state: {}

trigger: |
  Write a post-launch objection-handling email for "FitTrack," a connected
  fitness scale that measures 17 body metrics ($79.99).

  The product launched 5 days ago. Sales are below target. Customer survey
  of non-buyers reveals the top 4 objections:

  1. "I already have a regular scale — why do I need a smart one?" (38%)
  2. "I don't trust the accuracy of body composition measurements" (27%)
  3. "$80 seems expensive for a scale" (22%)
  4. "I'm worried about my health data privacy" (13%)

  Address all four objections in a single email without making it feel
  like a FAQ page. The email should be persuasive, not defensive.

assertions:
  - type: llm_judge
    criteria: "All four objections are addressed — each one is acknowledged and reframed with evidence, not dismissed or ignored"
    weight: 0.25
    description: "All four objections addressed"
  - type: llm_judge
    criteria: "The objections flow naturally within a narrative — the email reads as a cohesive persuasion piece, not a bulleted FAQ list"
    weight: 0.25
    description: "Natural narrative flow, not FAQ format"
  - type: llm_judge
    criteria: "Evidence is used for the accuracy objection — perhaps mentioning clinical testing, comparison to DEXA scans, or medical professional endorsements"
    weight: 0.25
    description: "Evidence-based accuracy rebuttal"
  - type: llm_judge
    criteria: "The privacy concern is taken seriously — the email provides specific privacy commitments (encryption, data not sold, GDPR compliance) rather than a vague 'we take privacy seriously'"
    weight: 0.25
    description: "Specific privacy commitments"
