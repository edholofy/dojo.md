meta:
  id: physical-product-launch-sequence
  level: 2
  course: email-product-launch
  type: output
  description: "Design a launch sequence for a limited-run physical product"
  tags: [email, physical-product, launch-sequence, limited-edition]

state: {}

trigger: |
  Design a 5-email launch sequence for "ArtFrame," a company launching a
  limited-edition smart digital photo frame.

  Product: 10-inch digital frame with AI photo curation — automatically selects
  your best photos and displays them in rotating galleries.
  - Price: $199
  - Limited run: 1,000 units (genuine manufacturing constraint)
  - Ships 2 weeks after order
  - Email list: 12,000 subscribers
  - Pre-orders open for 1 week, then closes until next production run
  - Brand voice: creative, artsy, sentimental (photos = memories)

  The sequence must create genuine urgency from real scarcity.

assertions:
  - type: llm_judge
    criteria: "The 1,000-unit limit creates genuine urgency — with 12,000 subscribers competing for 1,000 units, the math naturally creates scarcity without manipulation"
    weight: 0.25
    description: "Genuine scarcity from real production limits"
  - type: llm_judge
    criteria: "The emotional angle is strong — the email sequence connects the product to memories, family, and meaningful moments, not just tech specs"
    weight: 0.25
    description: "Emotional connection to memories"
  - type: llm_judge
    criteria: "The pre-order window creates a clear buying window — 1 week to order, then it's gone until the next production run. This timeline drives action"
    weight: 0.25
    description: "Clear pre-order window drives action"
  - type: llm_judge
    criteria: "The shipping timeline (2 weeks) is managed — expectations are set clearly so customers aren't surprised or frustrated by the wait"
    weight: 0.25
    description: "Shipping expectations managed"
