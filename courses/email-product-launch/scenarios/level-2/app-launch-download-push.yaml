meta:
  id: app-launch-download-push
  level: 2
  course: email-product-launch
  type: output
  description: "Write a launch email optimized for app downloads"
  tags: [email, app-launch, downloads, mobile]

state: {}

trigger: |
  Write a launch day email for "SleepWell," a sleep tracking and improvement app.

  Context:
  - Available on iOS and Android (just went live)
  - Free with premium at $4.99/month
  - Key feature: AI sleep coaching that analyzes your patterns and gives personalized tips
  - Goal: 10,000 downloads in the first week
  - Target: adults 25-55 who struggle with sleep quality
  - Brand voice: soothing, science-backed, trustworthy
  - The email must work on mobile (most people will read it on their phone)
  - CTA should deep-link to the appropriate app store

  Write the email optimized for driving downloads.

assertions:
  - type: llm_judge
    criteria: "The email is designed for mobile viewing — short paragraphs, large CTA buttons for both iOS and Android, and copy that's scannable on a phone screen"
    weight: 0.25
    description: "Mobile-optimized email design"
  - type: llm_judge
    criteria: "Both app store download options are provided — separate CTAs for App Store and Google Play, making it easy to download regardless of device"
    weight: 0.20
    description: "Both app store options provided"
  - type: llm_judge
    criteria: "The free tier is emphasized to reduce download friction — the email makes it clear they can start free, removing the payment barrier"
    weight: 0.25
    description: "Free tier emphasized for low-friction download"
  - type: llm_judge
    criteria: "The AI sleep coaching benefit is framed as a personal improvement — not tech features but 'wake up feeling rested' or 'understand why you're tired'"
    weight: 0.30
    description: "Sleep improvement benefit framing"
