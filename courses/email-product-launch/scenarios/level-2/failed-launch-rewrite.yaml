meta:
  id: failed-launch-rewrite
  level: 2
  course: email-product-launch
  type: output
  description: "Diagnose and fix a failed product launch email"
  tags: [email, launch, diagnosis, rewrite, fix]

state: {}

trigger: |
  This launch email performed terribly. Diagnose why and rewrite it.

  Original email:
  ---
  Subject: EXCITING NEWS!!! 🎉🎉🎉 Big Announcement Inside!!!
  Preview: You won't believe what we've been working on

  Hi there!

  We are SO EXCITED to announce that after 18 months of hard work, our amazing
  team has finally created something truly revolutionary that will change the
  way you think about project management forever!!!

  Introducing ProjectFlow 2.0 — the ULTIMATE project management platform that
  has EVERYTHING you need! Here's what makes it INCREDIBLE:

  ✅ Task management
  ✅ Team chat
  ✅ File sharing
  ✅ Time tracking
  ✅ Reporting dashboards
  ✅ Gantt charts
  ✅ Kanban boards
  ✅ Calendar view
  ✅ Resource planning
  ✅ Budget tracking
  ✅ Client portal
  ✅ Invoicing
  ✅ 500+ integrations

  ALL of this for just $29/month! (That's less than a dollar a day!!!)

  But WAIT — there's MORE! Sign up TODAY and get 30% off your first 3 months!
  Use code LAUNCH30 at checkout! But HURRY — this offer won't last forever!!!

  [TRY IT FREE] [SEE PRICING] [WATCH DEMO] [READ BLOG] [JOIN WEBINAR]

  Let's gooooo! 🚀🚀🚀

  The ProjectFlow Team
  ---

  Performance: 12% open rate, 0.8% click rate, 0.1% conversion

  Provide:
  1. Diagnosis: list every problem with this email
  2. Rewritten version that fixes all issues
  3. Expected performance improvement

assertions:
  - type: llm_judge
    criteria: "The diagnosis identifies at least 8 specific problems — excessive caps/exclamation marks, generic subject line, self-focused copy, feature dump, multiple competing CTAs, no personalization, manufactured urgency, and no clear value proposition"
    weight: 0.30
    description: "Comprehensive diagnosis of all problems"
  - type: llm_judge
    criteria: "The rewritten email fixes every identified problem — calm professional tone, benefit-focused messaging, single CTA, personalized greeting, and genuine value proposition"
    weight: 0.35
    description: "Rewrite fixes all identified problems"
  - type: llm_judge
    criteria: "The rewrite transforms the 13-feature dump into 2-3 key benefits — focusing on what the user GETS, not what the product HAS"
    weight: 0.20
    description: "Feature dump transformed to key benefits"
  - type: llm_judge
    criteria: "Expected performance improvements are reasonable — perhaps 35-45% open rate and 5-8% click rate, with explanation of which fixes drive which improvements"
    weight: 0.15
    description: "Reasonable performance improvement estimates"
