meta:
  id: course-launch-sequence
  level: 2
  course: email-product-launch
  type: output
  description: "Design a launch email sequence for an online course"
  tags: [email, online-course, launch-sequence, education]

state: {}

trigger: |
  Design a 7-email launch sequence for "Revenue Engine," an online course
  teaching freelancers how to build recurring revenue streams.

  Course details:
  - Instructor: Alex Rivera, 7-figure freelancer turned consultant
  - Price: $497 (or 3 payments of $179)
  - Course format: 6-week cohort with live Q&A sessions
  - Cohort size: limited to 50 students (genuine — for live interaction quality)
  - Lead magnet: "The Freelancer's Revenue Playbook" (free PDF, 8K downloads)
  - Email list: 15,000 freelancers
  - Brand voice: mentor-like, no-BS, results-focused

  The course launches once per quarter (genuine cohort scarcity).

assertions:
  - type: llm_judge
    criteria: "The 7-email sequence follows the classic course launch arc — lead magnet value, problem agitation, instructor credibility, student results, objection handling, enrollment open, and last chance"
    weight: 0.25
    description: "Classic course launch arc"
  - type: llm_judge
    criteria: "The 50-person cohort limit is leveraged as genuine scarcity — it's real (live Q&A quality), and the math (15,000 list, 50 spots) makes urgency self-evident"
    weight: 0.25
    description: "Genuine cohort scarcity leveraged"
  - type: llm_judge
    criteria: "The payment plan option ($179 x 3) is strategically introduced — not in the first email but when pricing is discussed, reducing the sticker shock of $497"
    weight: 0.25
    description: "Strategic payment plan introduction"
  - type: llm_judge
    criteria: "The instructor's credibility is built through results, not just claims — '7-figure freelancer' is backed by specific examples, student outcomes, or verifiable achievements"
    weight: 0.25
    description: "Credibility built through evidence"
