meta:
  id: pivot-rebrand-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a launch email for a product pivot and rebrand"
  tags: [email, launch, pivot, rebrand, repositioning]

state: {}

trigger: |
  Write a launch email for "Nomad" (formerly "TripTracker"), a travel
  planning app that's undergoing a major rebrand and pivot.

  What changed:
  - Old: TripTracker — basic itinerary organizer (functional but boring)
  - New: Nomad — AI-powered travel discovery + planning platform
  - New features: AI suggests destinations based on interests, budget,
    and travel style. Creates full itineraries with bookings.
  - New visual identity: bold, adventure-focused (from corporate blue to
    warm earth tones)
  - Price: Free basic planning, Premium $9.99/month (AI features + booking deals)

  Challenge:
  - 85,000 existing users who know "TripTracker"
  - Don't confuse them — make it clear this is the same app, evolved
  - Don't alienate users who liked the simple itinerary features
  - Reassure them: all their existing trips and data are preserved
  - Get them excited about the new capabilities

  The email must manage the rebrand transition while generating excitement
  for the new product direction.

assertions:
  - type: llm_judge
    criteria: "The rebrand transition is clear — the connection between TripTracker and Nomad is explicit, so users understand this is their app evolving, not a different product"
    weight: 0.30
    description: "Clear rebrand transition communication"
  - type: llm_judge
    criteria: "Data preservation is reassured early — existing trips, itineraries, and settings are safe. This addresses the top anxiety of any rebrand"
    weight: 0.25
    description: "Early data preservation reassurance"
  - type: llm_judge
    criteria: "New AI capabilities are positioned as additive — the simple features users loved still exist, now enhanced with AI. Nothing was taken away"
    weight: 0.25
    description: "Additive not replacement positioning"
  - type: llm_judge
    criteria: "The email generates genuine excitement — the pivot feels like a leap forward that benefits users, not a corporate strategy. The tone is 'we built what you wished for'"
    weight: 0.20
    description: "Genuine excitement for pivot"
