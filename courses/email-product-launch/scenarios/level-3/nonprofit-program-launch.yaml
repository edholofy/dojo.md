meta:
  id: nonprofit-program-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a launch email for a nonprofit's new program"
  tags: [email, launch, nonprofit, program, mission]

state: {}

trigger: |
  Write a launch announcement email for "CodeBridge," a nonprofit launching
  a free coding bootcamp for underserved communities.

  Program details:
  - 12-week intensive, fully remote, completely free
  - Covers web development (HTML/CSS, JavaScript, React)
  - Includes mentorship from tech professionals, laptop provided
  - Job placement support with 15 partner companies
  - First cohort: 50 seats, applications open for 3 weeks
  - Starts in 6 weeks

  Impact data:
  - Pilot program: 92% completion rate, 78% employed within 6 months
  - Average salary increase: $35,000 for graduates
  - Partners include 3 Fortune 500 tech companies

  Audience: The email goes to three groups simultaneously:
  1. Potential applicants (community organizations, social workers, local contacts)
  2. Potential mentors (tech professionals on the mailing list)
  3. Potential donors (philanthropic contacts and past supporters)

  Brand voice: hopeful, empowering, community-driven

  Write a single email that works for all three audiences, with clear
  sections or CTAs for each group's action (apply, mentor, donate).

assertions:
  - type: llm_judge
    criteria: "The email serves all three audiences — applicants see how to apply, mentors see how to volunteer, and donors see the impact of their support, each with a clear CTA"
    weight: 0.30
    description: "Triple-audience email with distinct CTAs"
  - type: llm_judge
    criteria: "The pilot results drive credibility — 92% completion, 78% employment, $35K salary increase are presented as proof this program works, not just aspirations"
    weight: 0.25
    description: "Pilot results as credibility proof"
  - type: llm_judge
    criteria: "The tone is empowering without being patronizing — the program is positioned as an opportunity, not charity. Potential applicants are addressed with dignity"
    weight: 0.25
    description: "Empowering non-patronizing tone"
  - type: llm_judge
    criteria: "Urgency is natural — 50 seats and a 3-week application window create genuine scarcity without manufactured pressure"
    weight: 0.20
    description: "Natural scarcity and urgency"
