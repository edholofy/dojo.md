meta:
  id: health-wellness-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a health supplement launch email with compliance constraints"
  tags: [email, launch, health, supplements, compliance]

state: {}

trigger: |
  Write a launch email for "VitalRoots," a new line of adaptogenic
  supplements from an established wellness brand.

  Products launching:
  - Stress Shield (ashwagandha + L-theanine) — $34
  - Focus Fuel (lion's mane + bacopa) — $34
  - Sleep Reset (magnesium glycinate + reishi) — $34
  - Starter Bundle (all three) — $89 (save $13)

  Claims and constraints:
  - FDA disclaimer required: "These statements have not been evaluated by
    the Food and Drug Administration. This product is not intended to
    diagnose, treat, cure, or prevent any disease."
  - You CANNOT say: "cures anxiety," "treats insomnia," "fixes focus problems"
  - You CAN say: "supports stress response," "promotes calm focus,"
    "supports healthy sleep patterns"
  - All ingredients are third-party tested, GMP certified
  - Clinical studies support individual ingredients (not the specific formulas)

  Audience:
  - 35,000 email subscribers of the parent wellness brand
  - Health-conscious adults 28-50
  - Already trust the brand (purchased other products)

  Brand voice: warm, science-informed, empowering (not preachy)

  The email must be persuasive while staying fully compliant with
  supplement marketing regulations.

assertions:
  - type: llm_judge
    criteria: "All health claims use compliant language — 'supports,' 'promotes,' 'helps maintain' rather than 'cures,' 'treats,' or 'fixes.' No diagnosis or disease claims are made"
    weight: 0.30
    description: "Compliant health claim language"
  - type: llm_judge
    criteria: "The FDA disclaimer is included and properly positioned — it's present but doesn't dominate the email or undermine the product narrative"
    weight: 0.20
    description: "FDA disclaimer properly included"
  - type: llm_judge
    criteria: "The products are differentiated clearly — each formula has a distinct use case and the reader can quickly identify which product solves their specific concern"
    weight: 0.25
    description: "Clear product differentiation"
  - type: llm_judge
    criteria: "Third-party testing and GMP certification build trust — the quality credentials are woven into the narrative as proof of rigor, not just checkbox items"
    weight: 0.25
    description: "Quality credentials build trust"
