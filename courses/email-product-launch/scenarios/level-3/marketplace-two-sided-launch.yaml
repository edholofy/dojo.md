meta:
  id: marketplace-two-sided-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write launch emails for both sides of a marketplace"
  tags: [email, launch, marketplace, two-sided, platform]

state: {}

trigger: |
  Write launch emails for "TutorMatch," an online tutoring marketplace
  connecting students with expert tutors. You need to write emails for
  BOTH sides of the marketplace.

  Platform:
  - Students post what they need help with, tutors respond
  - Video sessions, screen sharing, whiteboard tools built in
  - Subjects: math, science, CS, languages, test prep
  - Students pay per session ($25-75/hr depending on subject and tutor level)
  - Tutors keep 80%, platform takes 20%
  - Launching with 150 vetted tutors already on the platform

  Email 1 — For potential students (college and high school):
  - List of 15,000 from educational newsletter partnerships
  - Key concern: "Is the tutor actually good?"
  - Offer: first session is $10 flat (any subject, any tutor)

  Email 2 — For potential tutors:
  - List of 5,000 from academic job boards and grad student networks
  - Key concern: "Will I actually get students?"
  - Offer: 90% revenue share for first 3 months (vs. standard 80%)

  Write both emails. Each should address its audience's key concern directly.

assertions:
  - type: llm_judge
    criteria: "Two distinct emails are provided — the student email focuses on finding quality help and the tutor email focuses on earning opportunity. Neither reads like a generic platform pitch"
    weight: 0.25
    description: "Two distinct audience-tailored emails"
  - type: llm_judge
    criteria: "The student email addresses quality concerns — the 150 vetted tutors, the $10 first session risk reduction, and possibly ratings or tutor profiles are used to build trust"
    weight: 0.25
    description: "Student quality concern addressed"
  - type: llm_judge
    criteria: "The tutor email addresses demand concerns — the existing student pipeline, the 90% revenue share incentive, and the platform's commitment to driving demand are featured"
    weight: 0.25
    description: "Tutor demand concern addressed"
  - type: llm_judge
    criteria: "Each email has an appropriate CTA — students are encouraged to try a low-risk first session, tutors are encouraged to create a profile or apply. Both CTAs are low-friction"
    weight: 0.25
    description: "Audience-appropriate low-friction CTAs"
