meta:
  id: luxury-limited-edition-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a luxury limited-edition product launch email"
  tags: [email, launch, luxury, limited-edition, exclusivity]

state: {}

trigger: |
  Write a launch email for "Maison Élara," a luxury watchmaker releasing
  a limited-edition timepiece.

  Product:
  - "The Meridian" — hand-finished automatic movement, 42mm
  - 18K rose gold case, sapphire exhibition caseback
  - Limited to 200 pieces worldwide, individually numbered
  - Price: $8,500
  - Each comes with a hand-written note from the master watchmaker
  - Available exclusively through the brand's website

  Audience:
  - 12,000 email subscribers (collectors, enthusiasts, past buyers)
  - Past buyers have spent an average of $4,200
  - High-net-worth individuals who appreciate craftsmanship

  Context:
  - Brand voice: understated elegance, never shouts, respects the reader's intelligence
  - No discounts, no urgency language, no "buy now" pressure
  - The scarcity is real (200 pieces) but should feel like information, not a sales tactic
  - Previous limited editions sold out in 48-72 hours
  - Photography is stunning — the email should let the product speak

  Write an email that makes 200 people feel like they must own this watch.

assertions:
  - type: llm_judge
    criteria: "The tone is luxury-appropriate — restrained, elegant, no exclamation marks, no urgency words. The email reads like a private invitation, not a sales blast"
    weight: 0.30
    description: "Luxury-appropriate restrained tone"
  - type: llm_judge
    criteria: "Craftsmanship details create desire — the hand-finishing, movement, materials, and master watchmaker's note are described with reverence that makes the price feel justified"
    weight: 0.25
    description: "Craftsmanship-driven desire"
  - type: llm_judge
    criteria: "Scarcity is stated as fact, not pressure — '200 pieces' is mentioned naturally without 'hurry' or 'limited time.' The reader understands the implication without being pushed"
    weight: 0.25
    description: "Factual non-pressured scarcity"
  - type: llm_judge
    criteria: "The email design respects whitespace and photography — visual directions suggest letting images breathe, minimal text, and an overall aesthetic matching the product's elegance"
    weight: 0.20
    description: "Visually elegant email design"
