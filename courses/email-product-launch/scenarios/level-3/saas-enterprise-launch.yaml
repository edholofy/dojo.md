meta:
  id: saas-enterprise-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a B2B SaaS enterprise launch email targeting CTOs"
  tags: [email, launch, saas, enterprise, b2b]

state: {}

trigger: |
  Write a product launch email for "DataVault Pro," an enterprise data
  governance platform launching to B2B prospects.

  Product details:
  - Enterprise data cataloging, lineage tracking, and compliance automation
  - SOC 2 Type II certified, GDPR/CCPA compliant
  - Integrates with Snowflake, Databricks, BigQuery, Redshift
  - Pricing: starts at $2,500/month (usage-based, custom enterprise plans)
  - Already adopted by 3 Fortune 500 companies during private pilot

  Target audience:
  - CTOs, VP Engineering, Chief Data Officers at companies with 500+ employees
  - Pain point: data teams spend 40% of time on compliance instead of analysis
  - Buying cycle: 3-6 months, multiple stakeholders

  Context:
  - Brand voice: authoritative, precise, no fluff
  - The email goes to a curated list of 2,000 senior data leaders
  - Include a CTA for a personalized demo, not a free trial
  - Reference the pilot results without naming companies

  Write an email that reads like it was sent by a peer, not a marketer.

assertions:
  - type: llm_judge
    criteria: "The tone is executive-level — no hype words, no exclamation marks, reads like a respected colleague sharing a solution rather than a marketing blast"
    weight: 0.25
    description: "Executive peer-level tone"
  - type: llm_judge
    criteria: "The compliance pain point is quantified and specific — '40% of time on compliance' or similar data-driven framing that resonates with data leaders"
    weight: 0.25
    description: "Quantified compliance pain point"
  - type: llm_judge
    criteria: "Social proof is subtle but powerful — Fortune 500 pilot results referenced without name-dropping, creating intrigue and credibility"
    weight: 0.25
    description: "Subtle enterprise social proof"
  - type: llm_judge
    criteria: "The CTA is appropriate for enterprise — personalized demo, not a free trial. The ask matches the buying cycle and decision-making process"
    weight: 0.25
    description: "Enterprise-appropriate CTA"
