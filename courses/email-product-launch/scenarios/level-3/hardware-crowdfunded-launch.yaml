meta:
  id: hardware-crowdfunded-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a shipping announcement for a crowdfunded hardware product"
  tags: [email, launch, hardware, crowdfunding, shipping]

state: {}

trigger: |
  Write the "We're shipping!" launch email for "AirDesk," a motorized
  standing desk that was crowdfunded on Kickstarter 14 months ago.

  Product:
  - Smart standing desk with app-controlled height presets
  - Built-in wireless charger and cable management
  - Raised $1.2M from 4,800 backers (goal was $150K)
  - Retail price will be $699, backers paid $449

  Context:
  - The project is 4 months behind the original shipping date
  - Backers have been patient but some are frustrated (you sent monthly updates)
  - Manufacturing delays were due to supply chain issues (not design problems)
  - Quality: every desk passed a 500-hour stress test
  - Shipping in 3 waves over 6 weeks (backer number determines wave)

  Audience: 4,800 Kickstarter backers who've been waiting

  The email must:
  - Acknowledge the delay without being overly apologetic
  - Reignite excitement about the product they backed
  - Clearly explain the shipping wave system
  - Make backers feel like early adopters, not forgotten customers
  - Include a referral code for friends (backers get $50 credit toward accessories)

assertions:
  - type: llm_judge
    criteria: "The delay is acknowledged honestly but briefly — the email doesn't dwell on apologies or make excuses. It validates backer patience then pivots to excitement"
    weight: 0.25
    description: "Honest brief delay acknowledgment"
  - type: llm_judge
    criteria: "The quality narrative reframes the delay — the 500-hour stress test and manufacturing care make the wait feel worthwhile, turning a negative into proof of quality"
    weight: 0.25
    description: "Quality reframe of delay"
  - type: llm_judge
    criteria: "The shipping wave system is explained clearly — backers can easily understand which wave they're in and when to expect delivery, reducing support tickets"
    weight: 0.25
    description: "Clear shipping wave explanation"
  - type: llm_judge
    criteria: "Backers feel like privileged early adopters — the $449 vs. $699 retail price, early access, and referral rewards reinforce their smart decision to back early"
    weight: 0.25
    description: "Early adopter pride reinforcement"
