meta:
  id: seasonal-product-relaunch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a seasonal relaunch email for a returning product"
  tags: [email, launch, seasonal, relaunch, returning-product]

state: {}

trigger: |
  Write a relaunch email for "BrewBox," a subscription coffee company
  bringing back their popular "Summer Cold Brew Collection" for its
  third year.

  Product:
  - 4 specialty cold brew concentrates (Vanilla Oat, Citrus Bloom,
    Spiced Horchata, Classic Dark)
  - Available June through August only
  - $49 for all 4 bottles, $15 per individual bottle
  - Each bottle makes 8 servings
  - New this year: Citrus Bloom flavor and compostable packaging

  History:
  - Year 1: sold out in 3 weeks, 2,400 orders
  - Year 2: sold out in 10 days, 5,100 orders
  - Year 3 (now): increased production to 8,000 units

  Audience:
  - Full email list: 28,000 subscribers
  - Segment A (8,200): bought the collection last year
  - Segment B (3,400): bought Year 1 but not Year 2
  - Segment C (16,400): never bought the collection

  Write the email for Segment A (returning buyers). Make them feel like
  insiders who know this collection is special.

assertions:
  - type: llm_judge
    criteria: "Returning buyers are treated as insiders — references to previous years, 'you already know,' and early access create a sense of being part of the tradition"
    weight: 0.30
    description: "Insider treatment for returning buyers"
  - type: llm_judge
    criteria: "The new additions are highlighted — Citrus Bloom and compostable packaging are featured as fresh reasons to buy again, preventing 'same thing as last year' fatigue"
    weight: 0.25
    description: "New additions highlighted for freshness"
  - type: llm_judge
    criteria: "The sell-out history creates natural urgency — Year 1 (3 weeks) and Year 2 (10 days) patterns suggest this will sell out fast, without artificial pressure"
    weight: 0.25
    description: "Sell-out history as natural urgency"
  - type: llm_judge
    criteria: "The seasonal nature is a feature — the limited availability (June-August) is positioned as what makes it special, creating anticipation and scarcity"
    weight: 0.20
    description: "Seasonal scarcity as feature"
