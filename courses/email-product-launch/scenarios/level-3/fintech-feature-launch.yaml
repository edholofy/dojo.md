meta:
  id: fintech-feature-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a feature launch email for an existing fintech product"
  tags: [email, launch, fintech, feature, existing-product]

state: {}

trigger: |
  Write a major feature launch email for "Pocketwise," an existing personal
  finance app (200K active users) that's launching AI-powered spending insights.

  New feature:
  - AI analyzes spending patterns and predicts upcoming expenses
  - Sends weekly "Money Forecast" with personalized saving opportunities
  - Found an average of $340/month in savings for beta testers
  - Available to all Premium users immediately, Free users get limited version

  Existing product context:
  - App has been live for 2 years, known for simple budgeting
  - This is the biggest feature launch since the app's debut
  - Premium: $7.99/month, Free tier has basic budgeting
  - Users range from college students to families

  Challenge:
  - Don't make it feel like the old product was incomplete
  - Position this as evolution, not a pivot
  - Free users should feel excited, not left out (limited version still useful)
  - Premium users should feel their subscription just got more valuable

  Write the email for the full user base with dynamic content blocks
  that personalize for Free vs. Premium users.

assertions:
  - type: llm_judge
    criteria: "The feature is positioned as a natural evolution — the language builds on the existing product's strengths rather than implying it was previously lacking"
    weight: 0.25
    description: "Evolution not pivot positioning"
  - type: llm_judge
    criteria: "Dynamic content blocks are clearly indicated — sections for Free and Premium users are marked, with each segment getting a tailored value proposition"
    weight: 0.25
    description: "Clear Free vs Premium dynamic content"
  - type: llm_judge
    criteria: "The $340/month savings metric is the emotional hook — it's specific, personal, and immediately compelling for anyone managing their finances"
    weight: 0.25
    description: "Compelling savings metric as hook"
  - type: llm_judge
    criteria: "Free users are motivated to upgrade without feeling excluded — the limited version is positioned as genuinely useful, with Premium as the natural next step"
    weight: 0.25
    description: "Inclusive upgrade path for free users"
