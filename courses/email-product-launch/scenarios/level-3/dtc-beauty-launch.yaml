meta:
  id: dtc-beauty-launch
  level: 3
  course: email-product-launch
  type: output
  description: "Write a DTC beauty brand product launch email"
  tags: [email, launch, dtc, beauty, ecommerce]

state: {}

trigger: |
  Write a launch email for "GlowLab," a DTC clean beauty brand releasing
  a new vitamin C serum ($38).

  Product details:
  - 15% Vitamin C + Hyaluronic Acid + Niacinamide
  - Dermatologist-developed, cruelty-free, vegan
  - 8-week clinical trial: 89% saw brighter skin, 76% reduced dark spots
  - Glass bottle with airless pump (extends potency)
  - Ships free over $50

  Audience:
  - Existing email list of 45,000 (mix of customers and prospects)
  - Female, 25-40, skincare-educated, reads ingredient lists
  - They've been teased about this product for 2 weeks

  Context:
  - Brand voice: clean, scientific but warm, Instagram-aesthetic
  - Hero image: the serum bottle on a marble surface with citrus
  - Segment: send different versions to past buyers vs. prospects
  - Past buyers get early access (24 hours before general launch)
  - Prospects get a "welcome bundle" offer ($38 serum + $12 moisturizer sample for $42)

  Write BOTH email versions — one for past buyers, one for prospects.

assertions:
  - type: llm_judge
    criteria: "Two distinct email versions are provided — past buyers get early access and loyalty treatment, prospects get a bundle incentive. Each version is tailored to its segment"
    weight: 0.30
    description: "Two properly segmented versions"
  - type: llm_judge
    criteria: "Clinical results are presented credibly — percentages from the trial are included but framed as benefits, not just data dumps"
    weight: 0.25
    description: "Credible clinical results framing"
  - type: llm_judge
    criteria: "The ingredient story is told for educated consumers — vitamin C concentration, complementary ingredients, and the airless pump detail that shows product quality"
    weight: 0.25
    description: "Ingredient-savvy product storytelling"
  - type: llm_judge
    criteria: "The past buyer version makes them feel valued — early access is framed as a reward for loyalty, not just a marketing tactic"
    weight: 0.20
    description: "Genuine loyalty recognition for past buyers"
