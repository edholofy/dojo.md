meta:
  id: full-launch-system-architecture
  level: 5
  course: email-product-launch
  type: output
  description: "Design a complete email launch system for a multi-product company"
  tags: [email, launch, system-architecture, playbook, enterprise]

state: {}

trigger: |
  You're Head of Email Marketing at a SaaS company that launches 8-12
  products per year. The CEO is tired of each launch being run differently
  with inconsistent results.

  Design a reusable Launch Email System that any product team can use.

  Company context:
  - 500,000 total email subscribers across 4 product lines
  - ESP: Iterable (supports advanced segmentation, A/B testing, journeys)
  - Team: 3 email marketers, 2 designers, 1 data analyst
  - Average launch: 5-7 emails over 3 weeks
  - Current problem: launches take 4 weeks to prepare, quality varies wildly

  The system must include:

  1. LAUNCH TIER CLASSIFICATION
  - Define 3 tiers (Major, Standard, Minor) with criteria for each
  - Resource allocation per tier
  - Timeline requirements per tier

  2. EMAIL TEMPLATE LIBRARY
  - Define the 8 essential email types needed across all launches
  - For each: purpose, timing, key elements, word count targets
  - Write a full example of 2 email types (teaser and launch day)

  3. SEGMENTATION FRAMEWORK
  - How to segment the 500K list for any product launch
  - Suppression rules (who NOT to email)
  - Engagement-based sending priority

  4. QUALITY CHECKLIST
  - Pre-send review process
  - Required approvals per tier
  - Common failure modes and how to prevent them

  5. MEASUREMENT PLAYBOOK
  - Standard metrics per email type
  - Success thresholds per tier
  - Post-launch retrospective template

  This should be a document that a new hire could follow to run a launch.

assertions:
  - type: llm_judge
    criteria: "The tier classification is clear and practical — Major, Standard, and Minor launches have specific criteria, and a product manager could easily classify their launch into the right tier"
    weight: 0.20
    description: "Clear practical launch tier classification"
  - type: llm_judge
    criteria: "The email template library covers the full launch lifecycle — teaser, launch day, features, social proof, objection handling, deadline, and post-launch emails are all defined with their purpose and timing"
    weight: 0.20
    description: "Complete launch email template library"
  - type: llm_judge
    criteria: "The segmentation framework is sophisticated — considers product line relevance, engagement history, purchase behavior, and explicit suppression rules to prevent list fatigue"
    weight: 0.20
    description: "Sophisticated segmentation framework"
  - type: llm_judge
    criteria: "The two full email examples (teaser and launch day) are high-quality — they serve as gold-standard templates that demonstrate the system's principles in action"
    weight: 0.20
    description: "High-quality template examples"
  - type: llm_judge
    criteria: "The overall system is practical enough for a new hire — clear processes, decision trees, and checklists make it actionable rather than theoretical"
    weight: 0.20
    description: "New-hire-ready practical system"
