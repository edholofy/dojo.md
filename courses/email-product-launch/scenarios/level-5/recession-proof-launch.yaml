meta:
  id: recession-proof-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Launch a premium product during an economic downturn"
  tags: [email, launch, recession, economic-downturn, pricing]

state: {}

trigger: |
  Launch a premium product during an economic recession through email.

  Product: "Executive Coach AI" — AI-powered leadership coaching platform
  Price: $199/month per user (enterprise), $49/month individual

  Economic context:
  - Unemployment at 6.2% and rising
  - Tech layoffs dominating headlines
  - B2B budgets frozen or cut 20-30%
  - Your competitors are slashing prices
  - Consumer confidence at a 3-year low

  Product strengths:
  - ROI-proven: companies using it during pilot saw 23% reduction in
    manager turnover and 18% improvement in team performance scores
  - Replaces $500/hour executive coaches at a fraction of the cost
  - "Recession skill": leadership is more important in downturns
  - Individual plan helps laid-off professionals upskill

  Audience:
  - Enterprise list: 15,000 HR directors and L&D leaders
  - Individual list: 22,000 professionals from career development content

  Design a launch campaign that acknowledges the economic reality without
  being tone-deaf or exploitative:

  1. Positioning strategy: how to sell a premium product in a recession
  2. Enterprise launch email (to HR directors) — emphasize ROI and cost
     comparison vs. traditional coaching
  3. Individual launch email (to professionals) — emphasize career
     resilience without exploiting fear
  4. Pricing page copy that justifies the price in a down economy
  5. Objection-handling framework for "we can't spend money right now"

assertions:
  - type: llm_judge
    criteria: "The positioning acknowledges economic reality without exploiting it — the recession is treated as context, not a fear lever. The tone is empathetic and solution-oriented"
    weight: 0.25
    description: "Empathetic non-exploitative recession positioning"
  - type: llm_judge
    criteria: "The enterprise email leads with ROI — the 23% turnover reduction and cost comparison to $500/hour coaches make a compelling business case that survives budget scrutiny"
    weight: 0.25
    description: "ROI-driven enterprise business case"
  - type: llm_judge
    criteria: "The individual email empowers without fearmongering — 'invest in yourself during uncertainty' rather than 'you might get laid off.' Career resilience is positive, not anxiety-driven"
    weight: 0.25
    description: "Empowering individual messaging"
  - type: llm_judge
    criteria: "The objection-handling framework addresses real budget concerns — provides specific responses to 'no budget,' 'bad timing,' and 'cutting costs' that reframe the product as a cost-saver, not an expense"
    weight: 0.25
    description: "Realistic budget objection handling"
