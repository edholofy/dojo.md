meta:
  id: regulated-industry-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Launch email campaign for a heavily regulated financial product"
  tags: [email, launch, regulated, financial, compliance]

state: {}

trigger: |
  Write a launch email campaign for "WealthBridge," a new robo-advisor
  platform for retail investors.

  Product:
  - Automated portfolio management with tax-loss harvesting
  - 0.25% annual management fee (vs. 1% for traditional advisors)
  - SIPC insured, SEC registered
  - Minimum investment: $500
  - Available in all 50 US states

  Regulatory constraints (ALL must be followed):
  - SEC Rule 206(4)-1: No testimonials implying specific investment returns
  - Cannot guarantee returns or imply guaranteed performance
  - Must include: "Investing involves risk, including possible loss of principal"
  - Cannot use words: "guaranteed," "safe," "risk-free," "no-loss"
  - Past performance disclaimers required if any historical data is shown
  - Fee disclosures must be clear and prominent
  - Cannot target vulnerable populations with aggressive tactics
  - CAN-SPAM compliance required
  - Must offer a way to contact a registered representative

  Audience:
  - 30,000 leads from financial literacy content downloads
  - Age 28-45, first-time or early investors
  - Income: $60K-$150K
  - Primary motivation: growing wealth without the complexity

  Write:
  1. Launch announcement email (fully compliant)
  2. A compliance review checklist for financial product emails
  3. "Dos and Don'ts" guide with examples of compliant vs. non-compliant
     phrases for financial product launches

assertions:
  - type: llm_judge
    criteria: "The launch email is fully SEC-compliant — risk disclaimers present, no return guarantees, no prohibited words, fee disclosure clear, and registered representative contact provided"
    weight: 0.30
    description: "Fully SEC-compliant launch email"
  - type: llm_judge
    criteria: "Despite compliance constraints, the email is compelling — the value proposition (0.25% vs. 1%, automated tax-loss harvesting) is clearly communicated within regulatory bounds"
    weight: 0.25
    description: "Compelling within regulatory bounds"
  - type: llm_judge
    criteria: "The compliance checklist is comprehensive and actionable — a marketing team could use it to self-audit any financial product email before sending"
    weight: 0.25
    description: "Comprehensive actionable compliance checklist"
  - type: llm_judge
    criteria: "The dos and don'ts guide has specific examples — shows exactly what language to use and avoid, with before/after examples that make compliance intuitive"
    weight: 0.20
    description: "Specific compliant vs non-compliant examples"
