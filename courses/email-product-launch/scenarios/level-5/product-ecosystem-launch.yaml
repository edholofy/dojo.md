meta:
  id: product-ecosystem-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Launch an interconnected product ecosystem via email"
  tags: [email, launch, ecosystem, multi-product, platform]

state: {}

trigger: |
  Design the email launch strategy for "CreatorSuite," launching 3
  interconnected products simultaneously as an ecosystem.

  Products launching together:
  1. CreatorStudio — video editing tool ($19/month)
  2. CreatorAnalytics — audience analytics dashboard ($9/month)
  3. CreatorShop — digital product storefront ($14/month)
  - Bundle: All three for $29/month (save $13)

  The ecosystem story:
  - Each product works standalone but they're 10x more powerful together
  - Studio analytics feed into Analytics, which informs what to sell in Shop
  - Example: "See which video topics get most engagement → create a course
    on that topic → sell it through CreatorShop"

  Audience segments:
  - Video creators (45,000) — primarily interested in Studio
  - Data-driven creators (15,000) — primarily interested in Analytics
  - Creator-entrepreneurs (25,000) — primarily interested in Shop
  - Power users (8,000) — want everything

  Challenge:
  - Don't overwhelm people with 3 products at once
  - Each segment should feel their primary interest is the focus
  - The bundle should feel like a natural upgrade, not a forced upsell
  - The ecosystem narrative should emerge organically

  Design:
  1. Email sequence for each segment (4 emails each over 10 days)
  2. Write the Day 1 launch email for 2 segments (video creators AND
     creator-entrepreneurs)
  3. The bundle pitch email for all segments (Day 7)
  4. Cross-sell strategy for users who activate only one product

assertions:
  - type: llm_judge
    criteria: "Each segment's sequence leads with their primary interest — video creators see Studio first, entrepreneurs see Shop first, with other products introduced as natural complements"
    weight: 0.25
    description: "Segment-first product sequencing"
  - type: llm_judge
    criteria: "The ecosystem narrative emerges naturally — the connection between products (create → analyze → monetize) is woven into the emails without feeling like a forced sales funnel"
    weight: 0.25
    description: "Natural ecosystem narrative"
  - type: llm_judge
    criteria: "The two Day 1 emails are genuinely different — the video creator version and entrepreneur version have different hooks, benefits, and emotional appeals even though they're from the same company"
    weight: 0.25
    description: "Genuinely different segment Day 1 emails"
  - type: llm_judge
    criteria: "The bundle pitch on Day 7 makes the math irresistible — the $13 savings is framed alongside the compounding value of the ecosystem, making the bundle the obvious choice"
    weight: 0.25
    description: "Irresistible bundle value proposition"
