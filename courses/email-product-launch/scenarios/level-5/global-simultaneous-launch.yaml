meta:
  id: global-simultaneous-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Orchestrate a global simultaneous product launch across 12 markets"
  tags: [email, launch, global, localization, orchestration]

state: {}

trigger: |
  Orchestrate a simultaneous product launch email campaign across 12
  markets for "Notion" (fictional scenario) launching a new AI workspace
  feature globally.

  Markets and list sizes:
  - US (800K), UK (200K), Canada (150K), Australia (100K)
  - Germany (180K), France (160K), Spain (90K), Netherlands (70K)
  - Japan (250K), South Korea (120K), India (300K), Brazil (200K)
  Total: 2.62 million subscribers

  Constraints:
  - Launch must happen in a 6-hour window (not 6 hours per market, total)
  - Each market needs language-appropriate email (English, German, French,
    Spanish, Dutch, Japanese, Korean, Hindi, Portuguese)
  - Cultural adaptation required (not just translation)
  - Legal requirements vary by country (GDPR in EU, LGPD in Brazil,
    APPI in Japan, etc.)
  - Pricing differs by market (PPP-adjusted)
  - Some markets have SMS opt-in lists, others don't
  - Time zones span 20 hours (Tokyo to Honolulu)

  Design:
  1. Launch orchestration timeline — exact send times for each market
     within the 6-hour window, accounting for optimal local times
  2. Cultural adaptation framework — what changes per market beyond
     language (tone, imagery, social proof, CTA style)
  3. Legal compliance matrix — required elements per jurisdiction
  4. Write the full email for 3 markets (US English, Japan, Brazil)
     showing genuine cultural adaptation, not just translation
  5. Crisis protocol — what happens if the feature breaks in one market
     mid-launch? How do you handle cascading sends?

assertions:
  - type: llm_judge
    criteria: "The launch timeline accounts for time zones within the 6-hour window — send times are optimized for local business hours where possible, with clear reasoning for sequence order"
    weight: 0.20
    description: "Time-zone-optimized 6-hour launch timeline"
  - type: llm_judge
    criteria: "The three market emails (US, Japan, Brazil) are culturally adapted — Japan's email is more formal and detail-oriented, Brazil's is warmer and mobile-first, US is direct and benefit-focused"
    weight: 0.25
    description: "Genuinely culturally adapted emails"
  - type: llm_judge
    criteria: "The legal compliance matrix covers real requirements — GDPR consent language for EU, LGPD requirements for Brazil, APPI requirements for Japan, with specific required email elements per jurisdiction"
    weight: 0.20
    description: "Accurate legal compliance matrix"
  - type: llm_judge
    criteria: "The crisis protocol is practical — clear decision trees for pausing remaining markets, communicating with already-launched markets, and escalation procedures"
    weight: 0.15
    description: "Practical crisis protocol"
  - type: llm_judge
    criteria: "The cultural adaptation framework goes beyond language — considers local social proof, payment method preferences, design aesthetics, and communication norms per market"
    weight: 0.20
    description: "Deep cultural adaptation framework"
