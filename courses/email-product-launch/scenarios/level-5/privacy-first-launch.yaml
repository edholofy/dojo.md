meta:
  id: privacy-first-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Launch email campaign with minimal data and privacy-first constraints"
  tags: [email, launch, privacy, gdpr, minimal-tracking]

state: {}

trigger: |
  Design a product launch email campaign with extreme privacy constraints.

  Product: "VaultMail" — an end-to-end encrypted email service ($5/month)
  competing with ProtonMail and Tutanota.

  Privacy constraints for YOUR marketing emails:
  - No tracking pixels (you literally cannot track opens)
  - No link tracking (no click-through measurement)
  - No third-party cookies or cross-site tracking
  - GDPR, CCPA, and ePrivacy Directive compliant
  - Double opt-in required (your list is already double opted-in)
  - Minimal data: you only have email address and signup date
  - No behavioral data, no purchase history, no demographic data
  - Your email tool cannot see if emails were opened or links clicked

  List: 50,000 privacy-conscious subscribers from tech forums, privacy
  blogs, and security conferences.

  The irony: you're marketing a privacy product and MUST practice what
  you preach. Your audience will scrutinize your email practices.

  Design:
  1. How to measure campaign success without tracking pixels or link tracking
  2. How to personalize without personal data
  3. A 4-email launch sequence where each email stands alone (you can't
     trigger based on previous email behavior)
  4. Write all 4 emails
  5. Alternative measurement strategy using privacy-respecting methods

  Your audience will respect you MORE for these constraints. Use that.

assertions:
  - type: llm_judge
    criteria: "Alternative measurement methods are creative and valid — UTM parameters on landing pages, self-reported surveys, coupon codes per email, or server-side signup attribution"
    weight: 0.25
    description: "Creative privacy-respecting measurement"
  - type: llm_judge
    criteria: "Each email stands alone — since behavior-based triggers are impossible, each email provides full context and value independently, not assuming previous emails were read"
    weight: 0.25
    description: "Self-contained standalone emails"
  - type: llm_judge
    criteria: "The privacy constraints become a selling point — the emails explicitly mention 'we don't track this email' or 'no tracking pixel here' as proof of VaultMail's values"
    weight: 0.25
    description: "Privacy constraints as selling point"
  - type: llm_judge
    criteria: "All 4 emails are written and each has a distinct angle — awareness, technical credibility, social proof, and conversion, progressing logically even without behavioral triggers"
    weight: 0.25
    description: "Four distinct well-written emails"
