meta:
  id: platform-migration-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Design launch emails that migrate users from a legacy product"
  tags: [email, launch, migration, legacy, platform-transition]

state: {}

trigger: |
  Design an email campaign to migrate 120,000 users from your legacy
  product to a completely rebuilt replacement.

  Legacy product: "TaskMaster Classic" — project management tool, 8 years old
  New product: "TaskMaster Next" — ground-up rebuild, modern architecture

  Migration context:
  - Classic is being sunset in 6 months (end of support)
  - Next has 90% of Classic's features but some workflows changed
  - 5 popular Classic features won't be in Next at launch (planned for later)
  - Next has 20+ new capabilities Classic never had
  - Pricing: same price, no increase (major selling point)
  - Migration tool: one-click data transfer (projects, files, settings)
  - Beta testers (2,000 users) report 30% productivity improvement

  User segments:
  - Power users (18,000): use Classic daily, complex workflows, will notice
    missing features. HIGHEST RISK for churn.
  - Regular users (65,000): use Classic weekly, standard workflows.
    Should transition smoothly.
  - Light users (37,000): use Classic occasionally. Might not bother
    migrating and just leave entirely.

  Design:
  1. 6-month migration email timeline (high-level cadence)
  2. Segment-specific messaging strategy for each group
  3. Write the initial announcement email for power users (hardest audience)
  4. Write the migration day email (when one-click tool goes live)
  5. Write the "features coming soon" email addressing the 5 missing features
  6. Churn prevention strategy for users who haven't migrated by month 4

assertions:
  - type: llm_judge
    criteria: "The power user announcement email is honest about missing features — it acknowledges the 5 gaps with specific timelines, showing respect for power users' intelligence and workflows"
    weight: 0.25
    description: "Honest power user feature gap communication"
  - type: llm_judge
    criteria: "The segment strategies are genuinely different — power users get hand-holding and feature roadmaps, regular users get simplicity, light users get re-engagement before migration"
    weight: 0.25
    description: "Genuinely differentiated segment strategies"
  - type: llm_judge
    criteria: "The 6-month timeline has appropriate pacing — early months are educational and voluntary, middle months increase urgency, final months provide deadline support without panic"
    weight: 0.25
    description: "Well-paced 6-month migration timeline"
  - type: llm_judge
    criteria: "The churn prevention strategy for month 4 non-migrators is proactive — identifies why they haven't moved and provides targeted solutions (hands-on help, migration assistance, feature commitments)"
    weight: 0.25
    description: "Proactive churn prevention for holdouts"
