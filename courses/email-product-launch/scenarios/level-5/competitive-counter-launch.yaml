meta:
  id: competitive-counter-launch
  level: 5
  course: email-product-launch
  type: output
  description: "Design a counter-launch email strategy when a competitor launches first"
  tags: [email, launch, competitive, counter-launch, strategy]

state: {}

trigger: |
  Disaster scenario: Your competitor just launched a product nearly
  identical to yours — 2 weeks before your planned launch.

  Your product: "AnalyticsPro" — AI-powered marketing analytics ($49/month)
  Competitor: "DataPulse" — just launched with similar AI analytics ($39/month)

  Situation:
  - Your launch was planned for 2 weeks from now
  - 4 pre-launch teaser emails already sent (your list knows something's coming)
  - 40,000 subscribers, many of whom also received DataPulse's launch email
  - DataPulse is getting media coverage and positive reviews
  - Your product is actually better: more integrations (200 vs. 80),
    real-time processing (vs. hourly batches), custom AI models (vs. templates)
  - But you're $10/month more expensive

  The CEO says: "We need to launch THIS WEEK, not in 2 weeks."

  Design:
  1. Revised launch timeline (compressed from 14 days to 5 days)
  2. Competitive positioning strategy (acknowledge DataPulse without
     appearing reactive or negative)
  3. Write 3 emails:
     - Email 1: Accelerated launch announcement (Day 0)
     - Email 2: Differentiation email that subtly addresses DataPulse (Day 2)
     - Email 3: Conversion push with comparison angle (Day 4)
  4. Pricing strategy recommendation (match, hold, or reframe)
  5. Talking points for the team (what to say when asked about DataPulse)

assertions:
  - type: llm_judge
    criteria: "The competitive positioning is confident, not reactive — AnalyticsPro is positioned on its own strengths (real-time, more integrations, custom AI) without appearing desperate or bitter about DataPulse"
    weight: 0.25
    description: "Confident non-reactive competitive positioning"
  - type: llm_judge
    criteria: "The compressed timeline is realistic — 5 days with 3 emails is achievable, with clear daily milestones and no corners cut on quality"
    weight: 0.20
    description: "Realistic compressed timeline"
  - type: llm_judge
    criteria: "The differentiation email handles the competitor subtly — it doesn't name DataPulse directly but addresses the comparison implicitly through feature advantages and use cases"
    weight: 0.25
    description: "Subtle competitor differentiation"
  - type: llm_judge
    criteria: "The pricing strategy is well-reasoned — whether recommending hold, match, or reframe, the reasoning accounts for long-term brand positioning, not just short-term competitive reaction"
    weight: 0.15
    description: "Well-reasoned pricing strategy"
  - type: llm_judge
    criteria: "Team talking points are practical — concise responses to 'Why should I choose you over DataPulse?' that sales and customer success teams can use immediately"
    weight: 0.15
    description: "Practical team talking points"
