meta:
  id: ai-personalized-launch-at-scale
  level: 5
  course: email-product-launch
  type: output
  description: "Design an AI-powered personalized launch campaign at scale"
  tags: [email, launch, ai-personalization, scale, advanced]

state: {}

trigger: |
  Design an AI-powered, hyper-personalized launch email system for
  "Shopify" (fictional scenario) launching a new AI storefront builder
  to their 2 million merchant email list.

  The challenge: 2 million merchants with vastly different:
  - Store sizes ($100/month to $10M+/month in GMV)
  - Industries (fashion, electronics, food, services, etc.)
  - Technical sophistication (template users to custom developers)
  - Launch history with Shopify (new merchant to 10-year veteran)
  - Current pain points (design, conversion, SEO, mobile, speed)

  AI capabilities available:
  - GPT-4 for real-time email content generation
  - Predictive models for send time and channel optimization
  - Recommendation engine trained on merchant behavior
  - Real-time A/B testing with automatic winner selection
  - Dynamic content assembly from a library of 200+ content blocks

  Design:
  1. PERSONALIZATION ARCHITECTURE
  - How AI selects and assembles content for each merchant
  - The data signals that drive personalization decisions
  - Content block taxonomy and selection logic

  2. EXAMPLE RENDERS
  - Write 4 completely different versions of the launch email as they
    would appear for:
    a) A small fashion store owner who struggles with mobile conversion
    b) A mid-size electronics retailer who's technically sophisticated
    c) A large food brand that values speed and simplicity
    d) A brand-new merchant who just signed up last week

  3. SAFEGUARDS
  - How to prevent AI hallucination in email content
  - Approval workflows for AI-generated content
  - Brand consistency guardrails
  - Fallback strategy when personalization data is insufficient

  4. MEASUREMENT
  - How to measure if personalization actually outperforms static emails
  - Holdout group design for causal measurement

assertions:
  - type: llm_judge
    criteria: "The personalization architecture is technically sound — data signals, content block taxonomy, selection logic, and assembly pipeline are clearly defined and implementable"
    weight: 0.25
    description: "Technically sound personalization architecture"
  - type: llm_judge
    criteria: "The four rendered examples are genuinely distinct — each email feels like it was written specifically for that merchant persona, not just with different variables swapped in"
    weight: 0.25
    description: "Four genuinely distinct personalized renders"
  - type: llm_judge
    criteria: "AI safeguards are comprehensive — hallucination prevention, brand guardrails, approval workflows, and graceful fallbacks show understanding of AI limitations in production email"
    weight: 0.25
    description: "Comprehensive AI safeguards"
  - type: llm_judge
    criteria: "The measurement approach is scientifically rigorous — holdout groups, causal inference, and clear criteria for determining if personalization justifies its complexity"
    weight: 0.25
    description: "Scientifically rigorous measurement approach"
