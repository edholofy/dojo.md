meta:
  id: crisis-launch-management
  level: 5
  course: email-product-launch
  type: output
  description: "Handle a launch email crisis when things go wrong"
  tags: [email, launch, crisis, damage-control, recovery]

state: {}

trigger: |
  Multiple things have gone wrong during your product launch. Handle
  the crisis through email communications.

  Product: "HealthTrack," a wellness platform ($12/month)
  Launch email was sent to 80,000 subscribers yesterday morning.

  What went wrong (in chronological order):
  1. The launch email had a broken CTA button — link went to a 404 page
     (discovered 2 hours after send, 18,000 had already opened)
  2. You sent a "fix" email but it went to the ENTIRE list including
     people who hadn't opened the first email (creating confusion)
  3. Social media picked it up — a few tweets mocking the "broken launch"
  4. The product itself had a billing bug — 200 people who signed up
     were charged twice (engineering fixed it after 4 hours)
  5. A tech blog published: "HealthTrack's Launch Is a Masterclass in
     What Not to Do"

  Current state:
  - 2,400 successful sign-ups despite everything
  - 200 people double-charged (all refunded + credited with 1 free month)
  - Engineering has fixed all technical issues
  - CEO wants to "own the narrative"

  Write:
  1. Immediate apology email to double-charged customers (highest priority)
  2. "Honest relaunch" email to the full 80,000 list that acknowledges
     the mess, shows authenticity, and re-invites them to try HealthTrack
  3. A "thank you" email to the 2,400 who signed up despite the chaos
  4. Internal post-mortem talking points for the team
  5. Decision framework: when to send more emails vs. when to stop

assertions:
  - type: llm_judge
    criteria: "The double-charge apology is exemplary — specific about what happened, what was done (refund + 1 free month), no corporate-speak, and treats affected customers with genuine respect"
    weight: 0.25
    description: "Exemplary double-charge apology"
  - type: llm_judge
    criteria: "The relaunch email turns vulnerability into authenticity — it acknowledges the mess honestly, possibly with humor, and reframes the situation as proof the team is transparent and responsive"
    weight: 0.25
    description: "Authentic vulnerability in relaunch"
  - type: llm_judge
    criteria: "The thank-you email makes early adopters feel special — they're the people who believed in the product despite the chaos, and that loyalty is acknowledged meaningfully"
    weight: 0.20
    description: "Meaningful early adopter recognition"
  - type: llm_judge
    criteria: "The decision framework for 'send more vs. stop' is nuanced — it considers email fatigue, audience segments (affected vs. unaffected), timing, and the risk of over-communicating"
    weight: 0.15
    description: "Nuanced send vs stop decision framework"
  - type: llm_judge
    criteria: "The internal post-mortem talking points identify root causes and preventive measures — not just what went wrong but what process changes prevent each failure mode"
    weight: 0.15
    description: "Root-cause internal post-mortem"
