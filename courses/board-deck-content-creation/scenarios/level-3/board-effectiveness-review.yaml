meta:
  id: board-effectiveness-review
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board effectiveness review deck — assessing the board's own performance, composition, governance practices, and areas for improvement"
  tags: [board-effectiveness, governance, self-assessment, advanced]

state: {}

trigger: |
  You're the Board Chair (independent director) of a
  Series C SaaS company ($40M raised, 150 employees,
  $22M ARR). The board has decided to conduct its
  first formal board effectiveness review — a self-
  assessment of how well the board is functioning and
  what improvements are needed as the company prepares
  for a potential IPO in 2-3 years.

  Current board composition (6 members):
  1. Board Chair (you): Former CEO of a public SaaS
     company; on 3 other boards; 2 years on this board
  2. CEO/Founder: 5 years, deep product expertise but
     limited public company governance experience
  3. Series C lead (Warburg Pincus): 1 year on board;
     strong operational expertise; sometimes over-
     involved in management decisions
  4. Series B lead (Lightspeed): 3 years; experienced
     board member; provides good governance counsel
  5. Independent director 1: Former CMO at Salesforce;
     2 years; great marketing/brand expertise but
     rarely attends full meetings (80% attendance)
  6. Independent director 2: Former CTO at a fintech;
     1 year; strong technical perspective; but can
     dominate discussions with technical deep-dives

  Board effectiveness survey results (anonymous,
  administered by external firm):
  - Overall board effectiveness: 6.8/10
  - Strategic oversight: 7.2/10
  - Financial oversight: 7.5/10
  - Risk management: 5.8/10 (gap identified)
  - CEO support and evaluation: 6.5/10
  - Board dynamics and culture: 6.2/10
  - Meeting effectiveness: 5.5/10 (significant gap)
  - Information quality (board materials): 7.0/10
  - Board composition and diversity: 5.0/10 (gap)
  - Succession planning: 4.2/10 (major gap)

  Specific feedback themes:
  - Meetings run over time; too much presentation, not
    enough discussion
  - Warburg Pincus representative sometimes crosses
    from governance to management
  - Need more diversity (all male board; limited
    industry diversity)
  - No formal CEO evaluation process
  - No emergency succession plan
  - Committee structure underdeveloped (informal audit
    and compensation oversight)
  - Board materials could be more strategic and less
    operational

  Task: Create the board effectiveness review deck
  — presenting the survey results, analyzing the gaps,
  proposing improvements, and recommending specific
  actions including board composition changes and
  governance upgrades needed for IPO readiness.

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough board effectiveness review — presents survey results clearly with strengths and gaps identified; addresses each feedback theme with specific observations and recommendations; proposes improvements for meeting effectiveness (format, time allocation, pre-read expectations); addresses the board composition gap (diversity, skills matrix); proposes formal committee structures (audit, compensation, nominating); the overall review is constructive, not punitive."
    weight: 0.35
    description: "EffectivenessReview"
  - type: llm_judge
    criteria: "Response addresses the specific governance challenges diplomatically — handles the Warburg Pincus governance/management boundary issue without being confrontational; addresses the CMO's attendance issue professionally; discusses the CTO's discussion-dominating tendency constructively; proposes the CEO evaluation process and succession planning with appropriate sensitivity; each sensitive issue is framed as a process improvement rather than personal criticism."
    weight: 0.35
    description: "DiplomaticChallenges"
  - type: llm_judge
    criteria: "Response connects board governance improvements to IPO readiness — frames the composition gap (diversity, independence ratio) as both a governance best practice and an IPO requirement; proposes committee formalization as IPO preparation; discusses director recruitment criteria for new board members; addresses the evolution from a startup board to a public-company-ready board; the improvement plan has a 12-24 month timeline aligned with the IPO horizon; the overall deck demonstrates governance sophistication appropriate for a pre-IPO company."
    weight: 0.30
    description: "IPOReadiness"
