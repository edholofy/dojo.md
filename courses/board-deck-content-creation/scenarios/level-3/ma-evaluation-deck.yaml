meta:
  id: ma-evaluation-deck
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck evaluating an inbound acquisition offer with financial analysis, strategic assessment, and recommendation framework for a company with competing M&A interest"
  tags: [ma-evaluation, acquisition, strategic-options, advanced]

state: {}

trigger: |
  You're the CEO of a Series B vertical SaaS company
  building fleet management software for trucking
  companies ($20M raised, 85 employees, $12M ARR).
  You've received two unsolicited acquisition
  approaches and need to present an M&A evaluation
  to your board.

  Approach 1 — KeepTruckin (now Motive):
  - Offer: $120M (10x ARR, all cash)
  - Rationale: Wants your customer base (mid-market
    trucking; they're strong in enterprise)
  - Structure: All cash, 2-year retention for
    leadership team, modest earnout ($10M over 2 years)
  - Timeline: Can close in 45 days (no regulatory
    issues expected)

  Approach 2 — Trimble:
  - Offer: $150M (12.5x ARR, 60% cash / 40% stock)
  - Rationale: Strategic fit with transportation
    division; would make your product part of their
    connected fleet platform
  - Structure: Cash + stock, 3-year retention with
    higher earnout ($20M over 3 years tied to growth)
  - Timeline: 90+ days (larger company, more
    integration diligence needed)
  - Risk: Trimble stock has been volatile; 40% stock
    component adds uncertainty

  Standalone alternative:
  - Current trajectory: $12M → projected $20M ARR
    by year-end next year
  - Series C potential: $50-60M raise at $200-250M
    valuation (15-20x forward ARR) in 12-18 months
  - Risks: Competitive landscape intensifying; 3 well-
    funded competitors; market consolidation happening
  - Potential standalone outcome (5 years): IPO or
    strategic exit at $500M-1B+ if execution goes well

  Financial analysis needed:
  - Return analysis for each investor class (seed,
    A, B) under each scenario
  - Employee stock option implications
  - Tax considerations (stock vs cash)
  - Opportunity cost analysis

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + seed investor (Board observer)
  + independent director (Board seat, former M&A
  banker at Goldman Sachs)

  Task: Create the board deck evaluating all three
  options (Motive, Trimble, standalone) with financial
  analysis, strategic assessment, risk analysis, and
  a recommendation framework — designed for a board
  meeting that must result in a decision on next steps.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive M&A evaluation deck — presents all three options (Motive $120M, Trimble $150M, standalone) with consistent analytical framework; includes financial analysis (return multiples by investor class, option pool impact, tax considerations); strategic assessment for each option (customer base synergy, product integration, brand/team implications); risk analysis (execution risk, market risk, stock volatility for Trimble); the framework enables apples-to-apples comparison across fundamentally different options."
    weight: 0.35
    description: "MAEvaluationFramework"
  - type: llm_judge
    criteria: "Response provides rigorous financial analysis — calculates returns for each investor class under each scenario; addresses the cash vs stock consideration for Trimble (stock volatility, lock-up, tax treatment); presents the standalone IRR scenario with realistic assumptions; addresses the opportunity cost of selling at $120-150M vs potential $500M-1B standalone outcome; includes employee stock option analysis (acceleration provisions, underwater options, retention considerations); the financial analysis would satisfy the former Goldman M&A banker on the board."
    weight: 0.35
    description: "FinancialAnalysis"
  - type: llm_judge
    criteria: "Response presents a clear recommendation framework — doesn't just present data but guides the board toward a decision; addresses the different perspectives of each board member (seed investors wanting liquidity, Series B wanting maximum return, independent director wanting governance rigor); includes a recommended next step (engage, negotiate, decline) for each approach; provides a decision timeline; the deck would result in a clear board decision and authorized next steps."
    weight: 0.30
    description: "DecisionFramework"
