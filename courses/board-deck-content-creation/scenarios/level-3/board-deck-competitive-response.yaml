meta:
  id: board-deck-competitive-response
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for an emergency strategy session responding to a major competitor's aggressive move — a well-funded competitor just launched a free tier that directly threatens your business model"
  tags: [competitive-response, strategy-session, pricing, advanced]

state: {}

trigger: |
  You're the CEO of a Series B startup building an
  email deliverability platform ($15M raised, 65
  employees, $9.5M ARR). Your largest competitor —
  SendGrid (Twilio) — just announced a free tier that
  includes features comparable to your entry-level
  paid plan. You're calling an emergency board strategy
  session.

  Competitive threat:
  - SendGrid's new free tier: Up to 100K emails/month
    with deliverability analytics (previously their
    $89/month plan)
  - Impact: Your $49/month starter plan serves
    customers sending 50K-100K emails; these customers
    now have a free alternative
  - Affected customer base: 280 of your 520 customers
    (54%) are on the starter plan; $3.2M of your
    $9.5M ARR (34%)
  - Timeline: SendGrid launches in 30 days; you have
    a narrow window to respond
  - Likely motivation: Twilio's stock pressure; they're
    trading customer acquisition cost for market share

  Your customer analysis:
  - Starter plan customers ($49/month, 280 customers):
    High churn risk; limited switching cost; 15% likely
    to leave within 90 days (42 customers, $500K ARR)
  - Growth plan customers ($199/month, 160 customers):
    Moderate risk; some features not in SendGrid free
    tier; 5% may downgrade or leave
  - Enterprise ($500+/month, 80 customers): Low risk;
    deep integrations, compliance requirements;
    unlikely to switch for free tier

  Response options:
  1. Match with a free tier: Offer your starter plan
     free; accept $3.2M revenue loss; compete on
     retention and upsell
  2. Differentiate up-market: Abandon starter segment;
     double down on growth/enterprise features; accept
     starter churn
  3. Freemium lite: Offer a limited free tier (25K
     emails) to compete; protect most starter revenue
  4. Lock-in pricing: Offer 12-month discounted
     contracts to at-risk starter customers (30%
     discount = $2.2M retained vs $3.2M)
  5. Product moat: Accelerate development of features
     SendGrid doesn't have (AI content optimization,
     advanced analytics, multi-channel)

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + independent director (Board
  seat, former VP Marketing at Mailchimp)

  Task: Create the emergency board deck for the
  strategy session — presenting the competitive threat,
  customer impact analysis, each response option with
  financial modeling, a recommendation, and a 30-day
  action plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear competitive threat analysis — presents SendGrid's move with factual detail and strategic interpretation (why they're doing it, what it means for the market); segments the customer base by risk level with financial quantification; includes a timeline (30-day response window); the analysis is urgent but analytical, not panicked; the board understands both the severity and the bounded nature of the threat (54% of customers, 34% of ARR at varying risk levels)."
    weight: 0.35
    description: "ThreatAnalysis"
  - type: llm_judge
    criteria: "Response analyzes each response option with financial modeling — each option includes revenue impact, cost, competitive positioning effect, timeline, and risk assessment; the options are genuinely different strategies (not variations of the same approach); the financial modeling shows 12-month projected outcomes under each scenario; the recommendation is clear and justified; the independent director's Mailchimp experience is leveraged for competitive strategy insights."
    weight: 0.35
    description: "ResponseOptions"
  - type: llm_judge
    criteria: "Response includes an actionable 30-day plan — regardless of which strategic option the board chooses, there are immediate actions (customer retention outreach, product acceleration, competitive intelligence, team communication); the plan assigns ownership and milestones; it addresses both offensive (product differentiation) and defensive (customer retention) actions; the overall deck would result in a clear board decision and authorized action plan within the 30-day window."
    weight: 0.30
    description: "ActionPlan"
