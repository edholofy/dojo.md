meta:
  id: advanced-deck-shift
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create multiple board documents simultaneously — a quarterly board deck during an active fundraise, a confidential investor reference packet for potential Series C leads, and a board resolution for approving a key customer contract with unusual terms"
  tags: [multi-document, fundraise, board-resolution, advanced, shift-simulation]

state: {}

trigger: |
  You're the CEO of a Series B enterprise software
  company ($22M raised, 90 employees, $15M ARR)
  building an AI-powered contract lifecycle management
  platform. You need to prepare three documents for a
  complex board meeting happening during an active
  Series C fundraise.

  Document 1 — Quarterly board deck (Q4):
  - ARR: $15M → $17.2M (+14.7% QoQ, +85% YoY)
  - Key wins: 3 Fortune 500 customers signed ($1.2M
    combined ACV)
  - Concerns: VP Sales left mid-quarter (recruited
    away by a competitor); interim head of sales
    appointed
  - Product: AI contract analysis accuracy hit 94%
    (up from 87%); this is a key competitive metric
  - Burn: $380K/month; Cash: $6.8M; Runway: 17.9
    months
  - Series C process: In active discussions with 4
    firms; targeting $40-50M at $200-250M valuation

  Document 2 — Investor reference packet:
  Two Series C candidates (Insight Partners and General
  Atlantic) have requested board member references.
  You need to prepare a reference guide for your board
  members — what to say, what not to say, key
  messages to convey, and how to handle difficult
  questions (like the VP Sales departure).

  Key messages for references:
  - Market leadership in AI-powered CLM
  - Strong product-market fit (94% AI accuracy, NPS 62)
  - Growth trajectory supports $200M+ valuation
  - Management team is strong despite VP Sales gap
  - Competitive moat: proprietary training data from
    2M+ contracts analyzed

  Sensitive topics for reference calls:
  - VP Sales departure: Frame as "mutual decision;
    already identified strong candidates"
  - Customer concentration: Top 3 customers = 22%
    of ARR (address diversification)
  - Competition: DocuSign, Ironclad both raised;
    differentiate on AI accuracy

  Document 3 — Board resolution for key contract:
  A Fortune 100 pharmaceutical company wants to sign
  a $2.4M/3-year enterprise contract but with unusual
  terms that require board approval:
  - Most Favored Nation (MFN) pricing clause: If you
    offer a lower price to any customer in pharma, they
    get the same price
  - Unlimited liability for data breaches (your
    standard is 2x annual contract value)
  - Right of first refusal on any pharma-specific
    features you develop
  - 90-day termination for convenience (your standard
    is 12 months)

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + 2 independent directors (Board
  seats)

  Task: Create all three documents — the quarterly
  board deck, the investor reference guide for board
  members, and the board resolution with analysis of
  the pharmaceutical company's unusual contract terms.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct documents with appropriate content and purpose — the quarterly deck presents Q4 performance and Series C progress without being a fundraise pitch (it's a board deck, not an investor deck); the reference guide prepares board members for reference calls with key messages, handling of sensitive topics, and do/don't guidance; the board resolution presents the pharmaceutical contract's unusual terms with legal analysis and recommendation; each document serves its distinct purpose."
    weight: 0.35
    description: "ThreeDocumentClarity"
  - type: llm_judge
    criteria: "Response navigates the interconnected dynamics — the quarterly deck addresses the VP Sales departure honestly (board context) while the reference guide frames it diplomatically (investor context); the Series C fundraise status is appropriate for the board deck but the reference guide ensures consistent messaging; the pharmaceutical contract (Document 3) would strengthen the fundraise narrative if signed (Fortune 100 customer) but the unusual terms need careful board analysis; the three documents reflect a CEO managing multiple workstreams simultaneously."
    weight: 0.35
    description: "InterconnectedDynamics"
  - type: llm_judge
    criteria: "Response analyzes the pharmaceutical contract terms with sophistication — each unusual term (MFN, unlimited liability, feature ROFR, 90-day termination) is analyzed for business impact, precedent risk, and negotiation leverage; the board resolution includes a clear recommendation (accept, reject, or counter-propose for each term); the analysis considers the strategic value of the customer ($2.4M ACV, Fortune 100 pharma logo for fundraise) against the precedent risk of unusual terms; the overall package demonstrates CEO judgment in balancing short-term wins against long-term positioning."
    weight: 0.30
    description: "ContractAnalysis"
