meta:
  id: series-b-board-package
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive Series B+ board package with executive summary, department deep-dives, financial model review, and strategic initiative tracking for a company with a 5-person board"
  tags: [series-b, comprehensive-package, department-dives, advanced]

state: {}

trigger: |
  You're the CFO of a Series B SaaS company building
  an AI-powered legal research platform ($32M raised,
  120 employees, $18M ARR). The board expects a
  comprehensive quarterly package with significantly
  more depth than earlier-stage board decks.

  Board composition (5 members):
  - CEO (Board seat)
  - Series B lead: General Atlantic partner (Board
    seat) — expects operational rigor, financial model
    accuracy, public-company-quality metrics
  - Series A lead: Bessemer partner (Board seat) —
    focused on market leadership and competitive moat
  - Independent director 1: Former Chief Legal Officer
    at Thomson Reuters (Board seat) — deep legal tech
    domain expertise
  - Independent director 2: Former CEO of a SaaS
    company that IPO'd (Board seat) — focused on
    organizational scaling and operational excellence

  Q3 performance highlights:
  - ARR: $18M → $20.5M (+13.9% QoQ, +82% YoY)
  - Customers: 340 (280 law firms, 45 corporate legal
    departments, 15 government agencies)
  - Enterprise (>$50K ACV): 42 customers, 65% of ARR
  - Net revenue retention: 132%
  - Gross margin: 74% (AI inference costs significant)
  - Sales efficiency: Magic number 1.2
  - Burn: $580K/month
  - Cash: $12.4M
  - Runway: 21.4 months

  Department updates needed:
  - Engineering: New ML model launch (GPT-4 → custom
    fine-tuned model; 40% cost reduction, 15% accuracy
    improvement)
  - Product: 3 new features shipped; customer adoption
    rates for each
  - Sales: Bookings by segment, pipeline coverage,
    win rates by competitor
  - Customer Success: Health scores, expansion revenue,
    churn analysis
  - People: 18 new hires, 2 departures, engagement
    survey results (72 eNPS)
  - Finance: Detailed P&L, budget vs actual, 18-month
    forecast

  Strategic initiatives:
  1. International expansion (UK launch in Q1)
  2. Government sector push (GSA schedule pending)
  3. AI cost optimization (custom model migration)
  4. Platform ecosystem (API/integration partners)

  Task: Create the comprehensive Q3 board package
  including executive summary, key metrics dashboard,
  department deep-dives, financial review, strategic
  initiative tracking, and board discussion items —
  at the quality level expected by a Series B+ board
  with institutional investors.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive Series B+ board package — includes an executive summary with key highlights and lowlights, a detailed metrics dashboard with SaaS-specific metrics, department-by-department updates (engineering, product, sales, CS, people, finance), strategic initiative tracking with status and milestones, and board discussion items; the package depth is appropriate for a 120-person company with institutional board members; the quality matches what a General Atlantic partner would expect."
    weight: 0.35
    description: "ComprehensivePackage"
  - type: llm_judge
    criteria: "Response demonstrates financial and operational rigor — the financial review includes budget vs actual with variance analysis; the 18-month forecast is presented with key assumptions; unit economics are detailed by segment; the AI cost optimization is quantified; the department updates include specific KPIs and targets; the overall package demonstrates the operational maturity expected at Series B+ stage; the independent director with SaaS IPO experience would find the operational metrics complete."
    weight: 0.35
    description: "OperationalRigor"
  - type: llm_judge
    criteria: "Response leverages the board's diverse expertise — frames legal tech market analysis for the former Thomson Reuters CLO; presents scaling challenges for the former SaaS CEO; presents financial model rigor for the General Atlantic partner; frames competitive positioning for the Bessemer partner; strategic initiative tracking invites board input at the right level; the overall package facilitates a 2-3 hour board meeting with productive discussion across multiple domains."
    weight: 0.30
    description: "BoardExpertise"
