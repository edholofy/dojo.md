meta:
  id: international-expansion-deck
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck presenting an international expansion strategy with market entry analysis, financial model, organizational structure, and risk assessment for expanding into 3 new markets"
  tags: [international, expansion, market-entry, advanced]

state: {}

trigger: |
  You're the CEO of a Series B HR tech company
  building a performance management platform ($25M
  raised, 95 employees, $14M ARR — all US). Your
  board has approved exploring international expansion
  and you need to present a detailed plan for entering
  3 markets.

  Target markets (prioritized):
  1. United Kingdom:
     - Market size: $1.2B for performance management
     - Competition: Lower than US; 3 UK incumbents
     - Go-to-market: Direct sales + partner channel
     - Requirements: GDPR compliance, UK entity setup,
       local sales team (3-5 people)
     - Estimated investment: $1.2M Year 1
     - Projected revenue: $800K ARR by month 18
     - Risk level: Low-medium

  2. Germany:
     - Market size: $900M
     - Competition: Strong local players (Personio)
     - Go-to-market: Partner-led initially, then direct
     - Requirements: GDPR, works council compliance
       (Betriebsrat), German entity, localization (UI
       + content in German), data residency (EU hosting)
     - Estimated investment: $1.5M Year 1
     - Projected revenue: $500K ARR by month 18
     - Risk level: Medium-high (regulatory complexity)

  3. Australia:
     - Market size: $400M
     - Competition: Moderate; US players entering
     - Go-to-market: Direct sales with local partner
     - Requirements: Privacy Act compliance, local
       entity, time zone coverage (APAC support)
     - Estimated investment: $800K Year 1
     - Projected revenue: $400K ARR by month 18
     - Risk level: Low

  Financial impact:
  - Total Year 1 investment: $3.5M
  - Projected combined international ARR by Month 18:
    $1.7M
  - Cash impact: International expansion will consume
    35% of remaining cash reserves
  - Break-even timeline: Each market individually at
    month 24-30

  Organizational considerations:
  - Need VP International (senior hire)
  - Local country managers in each market
  - Engineering resources for localization (2-3
    dedicated engineers for 6 months)
  - Legal costs: Entity setup + employment law
    compliance + data privacy ($200K across 3 markets)

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + independent directors (2 Board
  seats, one with European SaaS experience, one CFO
  background)

  Task: Create the board deck presenting the
  international expansion strategy — including market
  analysis for each country, the financial model,
  organizational plan, risk assessment, phasing
  recommendation, and specific board decisions needed.

assertions:
  - type: llm_judge
    criteria: "Response creates a detailed international expansion strategy deck — presents each market with consistent analysis framework (market size, competition, GTM approach, regulatory requirements, investment, projected revenue, risk); includes a phasing recommendation (which market first, sequencing logic); the financial model shows investment vs return timeline for each market and combined; organizational plan includes hiring timeline and structure; the overall strategy is data-driven and specific enough to be actionable."
    weight: 0.35
    description: "ExpansionStrategy"
  - type: llm_judge
    criteria: "Response addresses the financial and operational risks of international expansion — discusses the cash impact (35% of reserves) and its implications for runway; presents the break-even timeline realistically; addresses the risk of distraction from the core US business; discusses currency risk and transfer pricing; addresses what happens if one market underperforms (exit criteria, sunk cost management); the risk assessment is honest about the challenges of international expansion for a 95-person company."
    weight: 0.35
    description: "RiskAssessment"
  - type: llm_judge
    criteria: "Response presents clear board decisions needed — frames the key choices (all 3 markets simultaneously vs phased entry; direct hire vs partner-led; fund from existing cash vs raise additional capital); leverages the board's expertise (European SaaS director on UK/Germany strategy, CFO director on financial model); includes go/no-go criteria for each market; the deck would result in a clear board decision on the international expansion plan with authorized budget and timeline."
    weight: 0.30
    description: "BoardDecisions"
