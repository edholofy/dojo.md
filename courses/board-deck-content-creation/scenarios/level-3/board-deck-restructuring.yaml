meta:
  id: board-deck-restructuring
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck proposing a major company restructuring — layoffs, product line shutdown, and strategic refocusing — requiring board approval"
  tags: [restructuring, layoffs, strategic-refocus, advanced]

state: {}

trigger: |
  You're the CEO of a Series B startup that builds
  both a B2B analytics platform and a B2C data
  visualization tool ($18M raised, 110 employees). The
  company has been trying to serve two markets for 2
  years and it's not working. You need to propose a
  major restructuring to the board.

  Current state (combined):
  - Total ARR: $8.5M
  - B2B platform: $6.2M ARR, 85 customers, growing
    35% YoY, positive unit economics (LTV/CAC: 4.1x)
  - B2C tool: $2.3M ARR, 12,000 users, growing 8%
    YoY, negative unit economics (LTV/CAC: 0.8x)
  - Total burn: $520K/month
  - Cash: $5.2M
  - Runway: 10 months

  The problem:
  - B2C product consumes 40% of engineering resources
    but generates 27% of revenue with negative unit
    economics
  - B2B is winning but starved of resources (lost 3
    enterprise deals to competitors who shipped faster)
  - Team is stretched thin across two very different
    products with different GTM motions
  - Series C investors have indicated they'd fund a
    focused B2B company but not a split-focus company

  Proposed restructuring:
  - Shut down B2C product line (sunset over 90 days
    with customer migration to alternatives)
  - Lay off 30 employees (27% of company): 15 B2C
    engineers, 5 B2C marketing/sales, 5 B2C support,
    5 G&A
  - Redeploy 10 B2C engineers to B2B product
  - New burn: $340K/month (35% reduction)
  - New runway: 15.3 months
  - Revenue impact: $2.3M ARR lost; $6.2M retained
  - Expected B2B growth with full focus: 60% YoY
    (vs 35% currently)

  Restructuring costs:
  - Severance: $420K (6 weeks per employee average)
  - Legal: $50K
  - Customer transition: $30K
  - Total one-time: $500K

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + independent director (Board
  seat) + co-founder/CTO (Board observer)

  Task: Create the board deck proposing the
  restructuring — including the strategic rationale,
  financial analysis, implementation plan, risk
  assessment, team impact analysis, and the approval
  items needed from the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling restructuring proposal — presents the strategic rationale clearly (two-market split is unsustainable; B2B is winning; B2C has negative unit economics); includes detailed financial analysis (before/after burn, runway extension, revenue impact, one-time costs, projected growth acceleration); the implementation plan covers the 90-day timeline with specific milestones; the proposal is structured as a formal board approval item with clear resolution language."
    weight: 0.35
    description: "RestructuringProposal"
  - type: llm_judge
    criteria: "Response addresses the human impact with appropriate gravity — discusses the 30-person layoff with empathy (severance, outplacement support, communication plan, legal compliance); addresses the B2C customer transition responsibly; discusses how to communicate internally (remaining team, morale, trust); addresses the co-founder/CTO's perspective (they may have built the B2C product); the proposal demonstrates that the CEO takes the human cost seriously while maintaining strategic clarity."
    weight: 0.35
    description: "HumanImpact"
  - type: llm_judge
    criteria: "Response presents the case for focus and connects it to fundraising — links the restructuring to Series C readiness; presents the 'focused B2B company' narrative that investors want; addresses the risk of the restructuring (losing good people, customer trust, brand impact, competitor narrative); includes a post-restructuring growth plan that justifies the pain; the overall deck would convince a board that this restructuring is necessary, well-planned, and positions the company for its next phase."
    weight: 0.30
    description: "StrategicJustification"
