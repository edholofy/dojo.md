meta:
  id: board-deck-with-regulatory-risk
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a fintech company navigating a regulatory compliance issue that impacts business operations, product roadmap, and fundraising"
  tags: [regulatory, compliance, fintech, advanced]

state: {}

trigger: |
  You're the CEO of a Series A fintech startup building
  an earned wage access (EWA) platform ($12M raised,
  55 employees, $6.2M ARR). Your state is about to
  pass legislation that would classify EWA as consumer
  lending, requiring you to obtain lending licenses in
  all operating states. This is a existential
  regulatory issue that your board needs to understand
  and act on.

  Regulatory situation:
  - Current: You operate as a payroll technology
    company (not a lender); no lending licenses
  - Pending legislation: State of California AB-1234
    (expected to pass within 60 days) would classify
    EWA as consumer credit under state lending laws
  - Impact: Would require lending licenses in all 18
    states where you operate
  - Timeline: 6-12 months to obtain licenses; $400K-
    $600K in legal and compliance costs
  - Industry response: Trade association (EWA
    Coalition) is lobbying against; but passage looks
    likely
  - Competitive impact: 2 competitors already have
    lending licenses (Earnin, DailyPay); 3 competitors
    (including you) do not

  Business impact:
  - Must pause new state expansion until licensed
  - Existing state operations may need to pause if
    other states follow California
  - Product changes: Must add Truth-in-Lending
    disclosures, rate calculations, complaint handling
  - Cost: Ongoing compliance adds $15K/month (CCO
    hire, compliance software, legal counsel)
  - Revenue impact: Could lose 15-20% of customers
    during transition (friction from new disclosures)

  Quarterly metrics (for context):
  - ARR: $6.2M (+45% YoY)
  - Active employers: 180
  - Active employees using EWA: 42,000
  - Revenue per user: $12/month average
  - Burn: $310K/month
  - Cash: $5.8M
  - Runway: 18.7 months (pre-regulatory cost)

  Strategic options:
  1. Proactive licensing: Start licensing process now;
     position as industry leader in compliance
  2. Restructure as bank partner: Partner with a bank
     to offer EWA under their charter (faster but less
     control)
  3. Lobby and delay: Join industry coalition; push
     for favorable regulatory framework
  4. Pivot product model: Restructure fees to avoid
     triggering lending classification

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat, former state banking regulator)

  Task: Create the board deck that presents the
  regulatory risk clearly, analyzes each strategic
  option, quantifies the financial impact, and
  prepares the board for a strategic decision on the
  company's regulatory response.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear regulatory risk presentation — explains the pending legislation (AB-1234) and its implications for the business in terms a non-legal board member can understand; quantifies the financial impact (licensing costs, compliance costs, potential revenue loss, timeline impact on expansion); presents the competitive landscape (which competitors are prepared vs not); the risk assessment is thorough without being alarmist; the board understands both the severity and the solvability of the challenge."
    weight: 0.35
    description: "RegulatoryRiskPresentation"
  - type: llm_judge
    criteria: "Response analyzes each strategic option with depth — Option 1 (proactive licensing) includes cost, timeline, and competitive advantage analysis; Option 2 (bank partnership) addresses control vs speed trade-offs; Option 3 (lobby and delay) assesses probability of success and risk of inaction; Option 4 (product restructuring) evaluates regulatory viability; each option has a clear recommendation or ranking; the analysis leverages the independent director's banking regulator experience."
    weight: 0.35
    description: "StrategicOptionAnalysis"
  - type: llm_judge
    criteria: "Response integrates the regulatory issue into the broader company context — presents quarterly metrics alongside the regulatory risk; addresses the impact on fundraising timeline (will this affect Series B prospects?); discusses customer communication (how to manage employer relationships during transition); addresses team implications (need to hire compliance talent); the overall deck shows a CEO who can manage a regulatory crisis while maintaining business momentum."
    weight: 0.30
    description: "IntegratedContext"
