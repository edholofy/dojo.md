meta:
  id: board-deck-data-breach
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for an emergency meeting following a data breach, including incident assessment, customer impact, regulatory exposure, and remediation plan"
  tags: [data-breach, incident-response, regulatory, advanced]

state: {}

trigger: |
  You're the CEO of a Series B edtech SaaS company
  ($20M raised, 75 employees, $11M ARR) that serves
  K-12 school districts. 48 hours ago, your security
  team discovered a data breach affecting student
  records. You're preparing an emergency board deck.

  Incident details:
  - Discovery: Engineering team noticed unusual database
    queries Monday evening
  - Breach vector: Compromised API key (former
    employee's credentials not properly revoked)
  - Data exposed: Student names, birthdates, school
    IDs, parent contact information, and academic
    performance records for 156,000 students across
    42 school districts
  - No SSNs, financial data, or health records exposed
  - Duration: Estimated 12-day window of exposure
    (credentials compromised 2 weeks ago)
  - Attacker: Unknown; no ransomware deployed; appears
    to be data exfiltration
  - Current status: Breach contained; compromised
    credentials revoked; external forensics firm
    (CrowdStrike) engaged

  Regulatory exposure:
  - FERPA (Family Educational Rights and Privacy Act):
    Federal law protecting student records; breach
    notification required to Department of Education
  - COPPA: Children's Online Privacy Protection Act
    (many students under 13)
  - State notification laws: 42 districts across 8
    states; each state has different notification
    requirements and timelines (most require 30-60
    day notification)
  - Potential investigations: State AGs, FTC (COPPA),
    Department of Education (FERPA)

  Customer impact:
  - 42 of 185 school districts affected (23%)
  - These districts represent $2.8M ARR (25% of total)
  - Districts have vendor security requirements;
    breach may trigger contract review clauses
  - Parent notification required by districts
  - Reputational risk: K-12 data security is
    politically sensitive; media coverage likely

  Immediate actions taken:
  - Breach contained (credentials revoked, affected
    systems isolated)
  - CrowdStrike retained for forensic investigation
  - Outside counsel (Goodwin Procter) engaged
  - Internal investigation launched (credential
    management audit)
  - Cyber insurance carrier notified ($5M policy)

  Board: CEO + Series B lead (Board seat) + Series A
  lead (Board seat) + independent directors (2 Board
  seats, one former CISO, one education industry
  executive)

  Task: Create the emergency board deck — presenting
  the incident assessment, regulatory exposure,
  customer impact, remediation plan, and the board's
  oversight responsibilities for the breach response.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear incident assessment deck — presents the breach facts clearly (what happened, what data was exposed, scope, duration, containment status); includes the regulatory framework (FERPA, COPPA, state notification laws) with specific compliance timelines; assesses customer impact with financial quantification ($2.8M ARR at risk); presents the immediate actions already taken; the deck provides the board with enough information to fulfill their oversight responsibilities without being overwhelming."
    weight: 0.35
    description: "IncidentAssessment"
  - type: llm_judge
    criteria: "Response addresses the multi-layered response requirements — covers regulatory notifications (federal and 8 state requirements with different timelines); customer communication plan (42 school districts, parent notification support); media/PR strategy (K-12 data security is politically sensitive); the remediation plan includes both immediate technical fixes and long-term security improvements; the board's oversight role is clearly defined (what decisions they need to make vs what management is handling); the former CISO board member's expertise is leveraged."
    weight: 0.35
    description: "ResponsePlan"
  - type: llm_judge
    criteria: "Response addresses the strategic implications honestly — discusses the revenue risk ($2.8M ARR in affected districts); addresses the reputational damage in the K-12 market; discusses cyber insurance coverage and its limitations; presents the cost of remediation (forensics, legal, customer retention, security upgrades); discusses the root cause (credential management failure) with accountability; addresses how this affects fundraising or customer acquisition in the near term; the overall deck demonstrates crisis leadership and builds board confidence in the response."
    weight: 0.30
    description: "StrategicImplications"
