meta:
  id: ceo-succession-deck
  level: 3
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a CEO succession discussion — the founding CEO is stepping into a Chief Product Officer role and the board needs to evaluate internal and external CEO candidates"
  tags: [ceo-succession, leadership-transition, governance, advanced]

state: {}

trigger: |
  You're the Board Chair (independent director) of a
  Series C SaaS company building a construction project
  management platform ($45M raised, 180 employees,
  $28M ARR). The founding CEO has approached you
  privately to say he wants to transition to Chief
  Product Officer and bring in a professional CEO. You
  need to prepare a board deck for an executive session
  (without the CEO present) to discuss the succession.

  Context:
  - Founding CEO is a brilliant product leader but
    struggles with operational scaling; the company
    has grown beyond his management capabilities
  - He's self-aware — this was his suggestion, not the
    board's pressure
  - Company is performing well but could be performing
    better with stronger operational leadership
  - Series D fundraise planned in 12 months; investors
    want to see a scalable leadership team

  Internal candidates:
  1. COO (current): Sarah, 3 years at the company,
     former VP Ops at Procore; manages sales, CS, and
     operations; well-respected internally; but limited
     CEO experience
  2. VP Engineering: Mike, 4 years at the company,
     built the engineering team from 8 to 60; strong
     technical leader; but limited commercial experience

  External candidate profile:
  - Industry CEO with construction tech or vertical
    SaaS experience
  - Track record of scaling companies from $30M to
    $100M+ ARR
  - Experience working with founder-CPOs (not
    replacing founders entirely)
  - Ability to lead a Series D process
  - Estimated timeline: 4-6 month search
  - Search firm: Spencer Stuart or Heidrick & Struggles

  Succession considerations:
  - Founder transition: From CEO to CPO is sensitive;
    reporting line, authority, Board seat status
  - Team impact: How to communicate without creating
    anxiety
  - Investor perception: Series D investors want
    stability; transition mid-fundraise is risky
  - Timeline: Search vs fundraise timing overlap

  Board: Independent Chair (you) + Series C lead
  (Board seat) + Series B lead (Board seat) + Series A
  lead (Board seat) + founding CEO (Board seat, will
  recuse for this discussion)

  Task: Create the board deck for the executive
  session discussing CEO succession — covering the
  rationale, internal candidate assessments, external
  search plan, founder transition framework, timeline,
  risk analysis, and decision framework for the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough CEO succession deck — presents the succession rationale sensitively (founder's self-awareness, company growth beyond current capabilities); provides honest assessments of internal candidates (COO Sarah's strengths and gaps, VP Engineering Mike's profile); outlines the external search plan (profile, search firms, timeline); addresses the founder transition framework (CEO to CPO, reporting, authority, board seat); the overall deck facilitates a thoughtful, confidential board discussion about leadership succession."
    weight: 0.35
    description: "SuccessionFramework"
  - type: llm_judge
    criteria: "Response addresses the timing and risk considerations — discusses the overlap between CEO search (4-6 months) and Series D fundraise (12 months); addresses investor perception of leadership transition; presents scenarios for how to sequence the transition and fundraise; discusses communication risk (internal team anxiety, external market perception); addresses what happens if the search takes longer than expected; the risk analysis is realistic and includes mitigation strategies."
    weight: 0.35
    description: "TimingAndRisk"
  - type: llm_judge
    criteria: "Response demonstrates governance sophistication — the deck is prepared by the independent Chair (not the CEO); addresses the founding CEO's board seat status through the transition; discusses the founder-CPO reporting structure and authority boundaries; includes a decision framework for the board (proceed with search, promote internally, delay, or decline the transition); addresses compensation considerations for both the incoming CEO and the transitioning founder; the overall presentation reflects mature board governance practices."
    weight: 0.30
    description: "GovernanceSophistication"
