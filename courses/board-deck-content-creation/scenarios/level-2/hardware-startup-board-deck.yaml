meta:
  id: hardware-startup-board-deck
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a hardware startup with hardware-specific metrics — BOM cost, manufacturing yield, inventory management, and certification progress"
  tags: [hardware, manufacturing, bom, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A hardware startup
  building smart water quality monitors for municipal
  water systems ($10M raised, 30 employees). Your
  quarterly board deck needs to address hardware-
  specific challenges that are different from typical
  SaaS metrics.

  Hardware metrics:
  - Units shipped this quarter: 420 (target: 500)
  - Cumulative units deployed: 1,850
  - Manufacturing yield: 91% (target: 95%)
  - BOM cost per unit: $342 (target: $310; 10% over)
  - Selling price: $1,200/unit + $200/year subscription
  - Hardware gross margin: 52% (target: 58%)
  - Subscription gross margin: 88%
  - Blended gross margin: 64%
  - Defect rate (field failures): 2.8% (target: <2%)
  - Warranty claims: 18 this quarter ($14K cost)

  Manufacturing status:
  - Manufacturer: Contract manufacturer in Shenzhen
  - Lead time: 12 weeks (was 8 weeks; component
    shortages)
  - Key component risk: Water quality sensor supplier
    (single source) has delivery delays
  - Inventory: 180 finished units on hand; 320 in
    production
  - Tooling investment: $280K amortized over expected
    10,000 unit production

  Certification progress:
  - NSF/ANSI 61 (drinking water contact): Approved ✓
  - UL/CSA (electrical safety): Approved ✓
  - FCC Part 15 (emissions): In testing, expected
    approval in 6 weeks
  - EPA WaterSense: Application submitted, 4-month
    timeline

  Revenue model:
  - Hardware revenue: $504K this quarter
  - Subscription revenue: $148K this quarter (growing
    as installed base grows)
  - Total revenue: $652K this quarter ($2.6M
    annualized)
  - Recurring revenue ratio: 23% (growing each quarter)

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent (Board seat,
  former VP Operations at a water tech company)

  Task: Create the quarterly board deck addressing
  hardware-specific metrics — BOM cost analysis,
  manufacturing yield, supply chain risks, inventory
  management, certification milestones, and the
  hardware + subscription revenue model.

assertions:
  - type: llm_judge
    criteria: "Response creates a hardware-specific board deck with appropriate metrics — presents BOM cost analysis with target vs actual and drivers of the gap; shows manufacturing yield trends and improvement actions; addresses supply chain risks (single-source sensor, component shortages, lead time increase); presents inventory levels in context of demand and production; the certification progress is shown as a milestone tracker; the deck is specifically designed for a hardware business, not a SaaS template applied to hardware."
    weight: 0.35
    description: "HardwareMetrics"
  - type: llm_judge
    criteria: "Response addresses the hardware + subscription revenue model — presents hardware and subscription revenue separately with different margin profiles; shows how the recurring revenue ratio grows as installed base grows; addresses the tension between hardware margin pressure and subscription margin strength; the blended margin analysis helps the board understand the business model evolution; the unit economics consider both the hardware sale and the subscription lifetime value."
    weight: 0.35
    description: "RevenueModel"
  - type: llm_judge
    criteria: "Response presents supply chain and manufacturing risks with mitigation plans — addresses the single-source sensor risk with diversification timeline; discusses the lead time increase and its impact on sales forecasting; presents the defect rate and warranty claim data with root cause analysis; the BOM cost overage (10%) is analyzed with specific cost reduction strategies; the independent director's water tech operations experience is leveraged for manufacturing and supply chain discussion; the overall deck demonstrates operational sophistication for a hardware company."
    weight: 0.30
    description: "OperationalRisks"
