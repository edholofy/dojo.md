meta:
  id: crisis-board-meeting
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for an emergency board meeting addressing a sudden cash crisis and the need for immediate cost reduction"
  tags: [crisis, emergency-meeting, cost-reduction, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A startup building a
  supply chain visibility platform ($8M raised, 45
  employees). You've called an emergency board meeting
  because your largest customer (28% of revenue) just
  gave 30-day notice of contract termination, and your
  financial position has changed dramatically.

  Before the loss:
  - ARR: $2.8M
  - Largest customer: $780K ARR (28% of total)
  - Burn: $320K/month
  - Cash: $2.4M
  - Runway: 7.5 months

  After the loss (in 30 days):
  - ARR: $2.02M
  - Revenue decline: 28%
  - Burn (unchanged): $320K/month
  - New runway: 5.2 months (critical)
  - At-risk customers: 2 additional customers ($340K
    combined) may follow — they were referred by the
    departing customer

  Why the customer left:
  - They were acquired by a larger company that has
    its own supply chain platform
  - Not a product quality issue — but the loss is real
  - 30-day notice per contract terms

  Options to present to the board:
  1. Aggressive cost reduction: Lay off 15 people (33%),
     reduce burn to $200K/month, extend runway to 10
     months, focus on retention and organic growth
  2. Bridge financing: Raise $1-2M bridge while
     replacing revenue; keep team intact but dilutive
  3. Hybrid: Lay off 8 people (18%), reduce burn to
     $260K/month, raise $750K bridge
  4. Accelerated fundraise: Start Series B process now
     despite unfavorable metrics

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat, former COO at a logistics company)

  Task: Create the emergency board deck — presenting
  the situation clearly, analyzing each option with
  trade-offs, making a recommendation, and outlining
  the immediate action plan regardless of which option
  the board chooses.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear emergency board deck — presents the situation with appropriate urgency (customer loss, revenue impact, runway compression); provides context for why the customer left (acquisition, not product quality); flags the at-risk customers ($340K); each of the 4 options is presented with clear financial projections, pros/cons, and timeline implications; a CEO recommendation is included with reasoning; the deck format supports rapid decision-making in an emergency meeting."
    weight: 0.35
    description: "CrisisDeckClarity"
  - type: llm_judge
    criteria: "Response analyzes each option with appropriate depth — Option 1 (aggressive cuts) shows specific savings and impact on capability; Option 2 (bridge) addresses dilution, timeline, and likelihood of success; Option 3 (hybrid) presents the middle ground with specific numbers; Option 4 (accelerated fundraise) addresses the challenge of fundraising with declining metrics; each option includes the financial runway impact; the analysis is honest about trade-offs and risks."
    weight: 0.35
    description: "OptionAnalysis"
  - type: llm_judge
    criteria: "Response includes immediate actions regardless of option chosen — presents retention actions for remaining customers (especially the 2 at-risk); outlines the customer replacement strategy; addresses team communication planning; includes a 30-60-90 day timeline; the deck demonstrates CEO decisiveness and preparedness even in crisis; the board can make an informed decision quickly."
    weight: 0.30
    description: "ImmediateActions"
