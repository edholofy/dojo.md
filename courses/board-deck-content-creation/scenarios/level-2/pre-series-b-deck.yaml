meta:
  id: pre-series-b-deck
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck designed to build the case for Series B fundraising, with the board meeting doubling as a fundraise strategy session"
  tags: [series-b, fundraise-prep, strategy-session, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A SaaS startup building
  a procurement platform for mid-market manufacturers
  ($8M raised, 42 employees, $5.8M ARR). You're
  planning to raise a Series B in 4-6 months, and this
  board meeting should double as a fundraise strategy
  session — getting board alignment on the story,
  valuation expectations, and investor targeting.

  Company metrics:
  - ARR: $5.8M (growing 72% YoY)
  - Customers: 85 (average ACV: $68K)
  - NRR: 128%
  - Gross margin: 76%
  - CAC payback: 14 months
  - Rule of 40: 52 (72% growth + (-20%) margin)
  - LTV/CAC: 4.2x
  - Magic number: 1.1
  - Burn: $340K/month
  - Cash: $4.1M
  - Runway: 12 months

  Series B positioning:
  - Target raise: $25-35M
  - Expected valuation: $150-200M (25-35x ARR)
  - Key narrative: Vertical SaaS for manufacturing
    procurement; massive underserved market ($180B
    spend managed by spreadsheets); land-and-expand
    model working (128% NRR); first-mover in
    AI-powered procurement for mid-market
  - Competitive advantage: Deep domain expertise;
    manufacturing-specific features that horizontal
    tools can't replicate; strong NRR proves PMF
  - Risk factors: Customer concentration (top 5 = 35%
    of ARR); limited international; sales cycle
    lengthening (was 45 days, now 62 days)

  Board input needed:
  - Story alignment: Is the "vertical AI for
    manufacturing procurement" narrative compelling?
  - Valuation: Is 25-35x ARR realistic in current
    market?
  - Investor targeting: Which firms to prioritize?
  - Timeline: Start in Q1 or wait for stronger Q4
    results?
  - Risk mitigation: Should we address concentration
    and sales cycle before fundraising?

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat, former CFO of a public SaaS company)

  Task: Create the board deck that serves dual
  purposes — quarterly performance review AND Series B
  fundraise strategy session — presenting the company
  metrics through a "fundraise readiness" lens.

assertions:
  - type: llm_judge
    criteria: "Response creates a dual-purpose board deck — presents quarterly performance metrics while framing them in the context of Series B readiness; compares company metrics against Series B benchmarks (Rule of 40, NRR, growth rate, magic number); presents the fundraising narrative clearly; identifies strengths (128% NRR, 72% growth, 4.2x LTV/CAC) and gaps (concentration, lengthening sales cycle) relative to what investors will care about; the deck serves both as a quarterly update and a fundraise strategy discussion."
    weight: 0.35
    description: "DualPurposeDeck"
  - type: llm_judge
    criteria: "Response frames the Series B strategy for board discussion — presents the valuation expectations (25-35x ARR) with market comparables; discusses investor targeting criteria and preferences; addresses timing trade-offs (start Q1 vs wait for Q4 results vs runway constraint); presents the narrative options and asks for board input; addresses the risk factors honestly (how to present customer concentration and sales cycle to investors); the strategy discussion would yield actionable decisions."
    weight: 0.35
    description: "FundraiseStrategy"
  - type: llm_judge
    criteria: "Response leverages the board's diverse expertise — the Series A lead's fundraising experience informs investor targeting; the independent director's public SaaS CFO background informs valuation methodology and metrics presentation; specific asks are matched to each board member's expertise; the deck includes a clear list of board actions needed (intros, reference calls, story validation); the overall presentation demonstrates CEO strategic sophistication appropriate for a Series B-stage company."
    weight: 0.30
    description: "ExpertiseLeverage"
