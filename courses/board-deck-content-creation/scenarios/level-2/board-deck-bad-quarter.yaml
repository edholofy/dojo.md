meta:
  id: board-deck-bad-quarter
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a genuinely bad quarter — missed targets across the board — without sugar-coating or catastrophizing"
  tags: [bad-quarter, missed-targets, transparency, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A SaaS startup building
  an appointment scheduling platform for healthcare
  clinics ($5.5M raised, 26 employees). Q3 was a bad
  quarter — you missed almost every target — and you
  need to present this honestly to your board without
  either sugar-coating or catastrophizing.

  Q3 targets vs actuals:
  - New ARR added: Target $320K, Actual $180K (56%)
  - New customers: Target 24, Actual 14 (58%)
  - Churn: Target <3%, Actual 5.8% (missed)
  - NRR: Target 115%, Actual 98% (net contraction)
  - Total ARR: Target $2.6M, Actual $2.35M
  - Burn: Target $210K, Actual $235K (+12% over budget)
  - Cash: $2.8M (vs $3.0M projected)

  What went wrong:
  1. Sales execution: VP Sales hired in Q2 made 3 bad
     hires (SDRs); pipeline generation dropped 40%;
     VP Sales was let go mid-quarter
  2. Product quality: Major bug in the scheduling
     engine caused 3 weeks of intermittent failures;
     4 customers downgraded; 2 churned citing
     reliability
  3. Market: Competitors (Calendly, Acuity) launched
     healthcare-specific features; pricing pressure
     from free tiers
  4. Churn: 2 largest churned customers were acquired
     by health systems with existing scheduling tools

  What went right (limited):
  - Core product quality recovered; platform is now
    stable
  - One enterprise pilot ($180K ACV) signed mid-Q3
  - New Head of Sales started (strong hire from
    athenahealth); she's rebuilt the SDR team
  - Customer satisfaction for remaining customers is
    recovering (NPS from 28 → 38 in last month)

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat, healthcare IT executive)

  Task: Create the Q3 board deck that presents the
  bad quarter with honesty and accountability while
  demonstrating that you understand what went wrong
  and have a credible recovery plan.

assertions:
  - type: llm_judge
    criteria: "Response presents the bad quarter with appropriate honesty and accountability — leads with the misses clearly (shows targets vs actuals for every metric); doesn't bury bad news in positive spin; takes CEO accountability for the hiring mistake (VP Sales) and product quality issues; distinguishes between controllable failures (sales execution, product quality) and uncontrollable factors (market, customer acquisitions); the presentation earns board trust through transparency rather than losing it through obfuscation."
    weight: 0.35
    description: "HonestyAndAccountability"
  - type: llm_judge
    criteria: "Response includes a credible recovery plan — presents the corrective actions already taken (VP Sales replaced, SDR team rebuilt, platform stabilized); shows the enterprise pilot as a positive signal; presents the Q4 plan with realistic targets (not just restating the original plan); addresses the competitive landscape changes; the recovery plan includes specific milestones the board can track; the plan acknowledges that recovery takes time without being defeatist."
    weight: 0.35
    description: "RecoveryPlan"
  - type: llm_judge
    criteria: "Response facilitates a constructive board discussion despite the bad news — frames specific questions for the board (should we adjust strategy given competitive changes? should we slow hiring to extend runway?); leverages the independent director's healthcare IT experience for competitive analysis; doesn't over-promise for Q4; the overall tone is humble, determined, and analytical — this is a CEO who learns from mistakes; the deck would result in a tough but productive board meeting."
    weight: 0.30
    description: "ConstructiveDiscussion"
