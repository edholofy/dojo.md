meta:
  id: board-deck-with-data-viz
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck that emphasizes data visualization тАФ designing chart descriptions, dashboard layouts, and visual storytelling for complex metrics"
  tags: [data-visualization, charts, dashboard, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A SaaS startup building
  a customer data platform for D2C brands ($7M raised,
  35 employees, $4.5M ARR). Your Series A lead has
  given you feedback that your board decks are "too
  text-heavy" and "need to show, not tell." You're
  redesigning your Q4 board deck with a data
  visualization-first approach.

  Data to visualize:
  1. Revenue trajectory:
     - Monthly ARR progression (12 months): $1.8M тЖТ
       $2.1M тЖТ $2.3M тЖТ $2.5M тЖТ $2.7M тЖТ $2.9M тЖТ $3.1M
       тЖТ $3.4M тЖТ $3.6M тЖТ $3.9M тЖТ $4.2M тЖТ $4.5M
     - Revenue mix: Self-serve (35%), sales-assisted
       (45%), enterprise (20%)

  2. Customer cohort analysis:
     - Q1'25 cohort: 22 customers, 78% retained at
       12 months, 115% NRR
     - Q2'25 cohort: 28 customers, 82% retained at
       9 months, 122% NRR
     - Q3'25 cohort: 34 customers, 85% retained at
       6 months, 128% NRR
     - Q4'25 cohort: 41 customers, 3 months in, early
       signals strong

  3. Unit economics waterfall:
     - Blended CAC: $12,000
     - First-year gross profit: $8,400 (70% margin on
       avg $12K ACV)
     - Expansion in year 2: +$2,800 average
     - LTV (4-year estimated): $42,000
     - LTV/CAC: 3.5x

  4. Burn and runway:
     - Monthly burn rate (6-month trend): $240K тЖТ $255K
       тЖТ $260K тЖТ $270K тЖТ $275K тЖТ $285K
     - Cash: $3.2M
     - Revenue offset: $375K/month

  5. Pipeline funnel:
     - Leads: 820/month
     - MQLs: 164/month (20% conversion)
     - SQLs: 49/month (30% conversion)
     - Opportunities: 22/month (45% conversion)
     - Closed won: 8/month (36% win rate)

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat)

  Task: Create the board deck with detailed
  descriptions of the data visualizations тАФ describe
  each chart type, layout, color coding, annotations,
  and how the visual tells the story. The content
  should enable a designer or tool to create the actual
  slides.

assertions:
  - type: llm_judge
    criteria: "Response creates detailed data visualization descriptions тАФ specifies chart types for each dataset (line chart for ARR trajectory, cohort retention curves, waterfall chart for unit economics, stacked bar for revenue mix, funnel for pipeline); includes color coding logic, axis labels, annotations, and callouts; the descriptions are detailed enough that a designer could create the actual charts; each visualization is chosen because it best tells the story of that particular dataset."
    weight: 0.35
    description: "VisualizationDesign"
  - type: llm_judge
    criteria: "Response uses visual storytelling to convey insights тАФ each chart description includes what the viewer should take away (e.g., cohort curves showing improving retention over time; ARR line showing acceleration; pipeline funnel highlighting conversion bottleneck); annotations highlight key moments or thresholds; comparative elements show improvement or degradation; the overall visual narrative builds from growth metrics to efficiency metrics to forward-looking indicators."
    weight: 0.35
    description: "VisualStorytelling"
  - type: llm_judge
    criteria: "Response addresses dashboard layout and information hierarchy тАФ describes how charts are arranged on slides for scanning (most important metrics prominent, supporting data secondary); suggests a slide count and flow; addresses the Series A lead's feedback about being less text-heavy; includes KPI summary tiles or scorecard elements alongside detailed charts; the overall deck design would be a significant improvement over text-heavy presentations."
    weight: 0.30
    description: "DashboardLayout"
