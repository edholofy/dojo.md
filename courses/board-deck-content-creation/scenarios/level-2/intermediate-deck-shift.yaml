meta:
  id: intermediate-deck-shift
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create multiple board-related documents simultaneously — a full quarterly deck, a confidential appendix on a potential acquisition, and a compensation committee summary for a Series A company"
  tags: [multi-document, acquisition, compensation, intermediate, shift-simulation]

state: {}

trigger: |
  You're the CEO of a Series A cybersecurity startup
  ($6M raised, 35 employees, $3.5M ARR). You need to
  prepare three documents for the upcoming board
  meeting.

  Document 1 — Quarterly board deck:
  Standard Q4 update with these key metrics:
  - ARR: $3.5M → $4.1M (+17% QoQ)
  - New customers: 18 (best quarter)
  - NRR: 120%
  - Burn: $250K/month
  - Cash: $2.8M
  - Runway: 11.2 months
  - Team: 35 → 38 (3 new engineers)
  - Key win: First government contract ($120K ACV)
  - Key concern: 3 enterprise deals slipped from Q4
    to Q1 ($280K combined)

  Document 2 — Confidential acquisition appendix:
  A 4-person threat intelligence startup has approached
  you about being acquired. This is strictly
  confidential — only the board should see it.
  - Target: "ThreatWatch" ($180K ARR, 4 people)
  - Asking price: $1.2M (6.7x ARR)
  - Strategic rationale: Their threat feed would
    differentiate your product; team is strong
  - Financial impact: Would add $100K/month to burn
    for 6 months before integration
  - Risks: Uses all cash runway margin; their tech
    has technical debt; distraction risk
  - Alternative: Build the capability internally
    (estimated 9 months, 2 engineers)

  Document 3 — Compensation committee summary:
  The board formed a compensation committee (Series A
  lead + independent director). They need a summary
  of current compensation structure for review.
  - Salary ranges by level (entry to VP)
  - Equity grant framework (new hire grants, refresh
    grants)
  - 2 promotions this quarter (Senior Engineer →
    Staff Engineer, SDR → Account Executive)
  - 1 retention concern: VP Engineering received a
    competing offer (20% above current salary)
  - Proposed: 15% salary increase + equity refresh
    for VP Engineering retention

  Board: CEO + Series A lead (Board seat, comp
  committee) + seed investor (Board seat) + independent
  director (Board seat, comp committee)

  Task: Create all three documents — the quarterly
  deck, the confidential acquisition appendix, and
  the compensation committee summary — with appropriate
  detail and information barriers for each.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct documents with appropriate content and information barriers — the quarterly deck covers standard metrics without referencing the acquisition (which is confidential); the acquisition appendix provides a thorough M&A analysis (strategic rationale, financial impact, build vs buy, risks); the compensation summary is formatted for a committee review (salary bands, equity framework, specific decisions needed); each document is self-contained and appropriate for its audience."
    weight: 0.35
    description: "ThreeDocumentSystem"
  - type: llm_judge
    criteria: "Response addresses the key issues in each document effectively — the quarterly deck highlights the government contract win and addresses the slipped deals honestly; the acquisition appendix presents a balanced build vs buy analysis with clear recommendation; the compensation summary addresses the VP Engineering retention situation with urgency and a specific proposal; each document supports decision-making by the relevant audience."
    weight: 0.35
    description: "KeyIssuesAddressed"
  - type: llm_judge
    criteria: "Response demonstrates board governance awareness — the compensation committee summary follows appropriate committee structure (2 members review, full board approves); the acquisition appendix handles confidentiality appropriately; the quarterly deck is designed for full board consumption; the overall package shows a CEO who understands board governance mechanics and prepares materials that support each function of the board."
    weight: 0.30
    description: "GovernanceAwareness"
