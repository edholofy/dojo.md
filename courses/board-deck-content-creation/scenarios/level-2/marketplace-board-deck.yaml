meta:
  id: marketplace-board-deck
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a two-sided marketplace startup with marketplace-specific metrics — liquidity, matching, take rate analysis, and supply/demand balance"
  tags: [marketplace, two-sided, liquidity, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A marketplace connecting
  independent pet sitters with pet owners ($4M raised,
  22 employees, 18 months post-launch). Your board
  meeting requires marketplace-specific metrics that
  tell the story of a healthy (or not) marketplace.

  Marketplace metrics:
  - GMV: $1.8M this quarter (Q1: $1.2M, +50% QoQ)
  - Take rate: 18% (platform fee)
  - Net revenue: $324K this quarter
  - ARR equivalent: $1.3M (annualized quarterly net
    revenue)

  Supply side (pet sitters):
  - Registered sitters: 4,200
  - Active sitters (≥1 booking/month): 1,100 (26%)
  - New sitters this quarter: 620
  - Sitter churn: 8% monthly
  - Average sitter earnings: $420/month
  - Supply utilization: 34% of available hours booked
  - Top 10% of sitters: 55% of all bookings

  Demand side (pet owners):
  - Registered owners: 18,000
  - Active owners (≥1 booking/quarter): 3,400 (19%)
  - New owners this quarter: 4,200
  - Repeat booking rate: 58%
  - Average booking value: $85
  - Average bookings per active owner: 2.3/quarter
  - Search-to-book conversion: 22%

  Marketplace health indicators:
  - Time to first booking (new owner): 3.2 days
    (down from 5.1 days last quarter)
  - Match rate: 78% of searches result in a booking
    within 48 hours
  - Cancellation rate: 6.2% (industry: 8-12%)
  - Review score: 4.7/5.0 average
  - Geographic coverage: 12 metro areas; 3 are
    "liquid" (>50 sitters), 5 are "emerging,"
    4 are "thin"

  Concerns:
  - Supply concentration: Top 10% do 55% of bookings
    (risk if key sitters leave)
  - Thin markets: 4 metros have poor matching (>5 day
    time to first booking)
  - Sitter churn: 8%/month is high; losing sitters
    faster than acquiring

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent (Board observer,
  former exec at Rover.com)

  Task: Create the quarterly board deck with
  marketplace-specific metrics — covering supply/demand
  balance, liquidity metrics, matching efficiency,
  unit economics, geographic analysis, and marketplace
  health concerns.

assertions:
  - type: llm_judge
    criteria: "Response creates a marketplace-specific board deck with appropriate two-sided metrics — presents supply and demand metrics separately and in relationship to each other; includes liquidity metrics (match rate, time to first booking, search-to-book conversion); shows geographic analysis with market maturity classification; presents the supply concentration risk clearly; the marketplace metrics tell a coherent story about marketplace health beyond just GMV and revenue."
    weight: 0.35
    description: "MarketplaceMetrics"
  - type: llm_judge
    criteria: "Response addresses the marketplace-specific concerns with analytical depth — the supply concentration risk (top 10% = 55% bookings) is presented with mitigation strategies; the thin markets problem is analyzed with data; the sitter churn rate (8% vs acquisition) is flagged as a sustainability concern; the take rate (18%) is benchmarked against comparable marketplaces; the overall analysis shows understanding of two-sided marketplace dynamics beyond a simple SaaS framework."
    weight: 0.35
    description: "MarketplaceConcerns"
  - type: llm_judge
    criteria: "Response leverages the board's marketplace expertise — the independent director's Rover.com experience is relevant to the marketplace health discussion; specific asks about geographic expansion, supply acquisition strategy, and take rate optimization are framed for board input; the deck would facilitate a discussion about marketplace flywheel health and growth strategy; the presentation format is appropriate for a marketplace business (not just a SaaS template applied to a marketplace)."
    weight: 0.30
    description: "BoardExpertiseLeverage"
