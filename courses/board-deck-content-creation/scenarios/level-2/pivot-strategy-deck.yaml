meta:
  id: pivot-strategy-deck
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a board deck presenting a strategic pivot recommendation — from consumer to B2B — with supporting data and implementation plan"
  tags: [pivot, strategy, b2b-transition, intermediate]

state: {}

trigger: |
  You're the CEO of a seed-stage startup that built a
  consumer app for personal finance budgeting ($1.8M
  raised, 15 employees). After 18 months, you've
  concluded the consumer model won't work and want to
  propose a pivot to B2B (selling the budgeting engine
  as an API to neobanks and fintech apps) at the next
  board meeting.

  Consumer business (current):
  - Downloads: 85,000
  - MAU: 12,000 (14% retention — poor)
  - Paying subscribers: 620 ($4.99/month)
  - Consumer MRR: $3,100
  - CAC: $8.50 per download, $116 per paying user
  - LTV: $42 (average subscriber stays 8.4 months)
  - LTV/CAC: 0.36x (unsustainable)

  B2B opportunity (discovered organically):
  - 3 fintech companies approached you about licensing
    your budgeting engine
  - You built a quick API prototype in 2 weeks
  - Pilot customers:
    * Neobank A: $5K/month pilot (3-month trial, paying)
    * Fintech B: $3K/month pilot (starting next month)
    * Neobank C: In discussions, estimated $8K/month
  - B2B pipeline: 6 additional conversations from
    conference networking
  - Estimated B2B TAM: $500M (budgeting/PFM API market)

  Pivot implications:
  - Team: Need to shift 4 mobile engineers to API
    development; may need to lay off 2 consumer
    marketing people
  - Product: Core engine is reusable; consumer UI
    layer would be deprecated
  - Runway impact: B2B higher ACV = faster path to
    sustainability; consumer wind-down saves $15K/month
  - Timeline: Full pivot execution in 3 months
  - Risk: Consumer users will be upset; potential
    negative press

  Board: CEO + seed investor (Board seat) + angel
  investor (Board seat)

  Task: Create the board deck content presenting the
  pivot recommendation — including the case against the
  current model, the B2B opportunity analysis, the
  pivot implementation plan, and specific risks and
  mitigations.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling pivot presentation — presents the case against the consumer model with clear data (0.36x LTV/CAC, 14% retention, $3.1K MRR after 18 months); presents the B2B opportunity with early traction evidence (3 pilots, 6 pipeline conversations); compares the two models on key dimensions (unit economics, market size, competitive dynamics); the pivot is presented as a data-driven strategic decision, not an emotional reaction; the board deck format facilitates a yes/no decision from the board."
    weight: 0.35
    description: "PivotPresentation"
  - type: llm_judge
    criteria: "Response includes a detailed implementation plan — covers the team restructuring (engineering reallocation, marketing layoffs), product transition timeline, consumer wind-down plan, B2B go-to-market approach, and financial impact analysis; addresses risks honestly (consumer user backlash, negative press, execution risk of team transition); presents mitigations for each risk; the implementation plan is realistic for a 15-person startup."
    weight: 0.35
    description: "ImplementationPlan"
  - type: llm_judge
    criteria: "Response frames the pivot as a board decision with clear options — presents the recommendation clearly but acknowledges the board needs to decide; provides enough information for board members to evaluate the opportunity; addresses the emotional dimension (18 months of work on the consumer product); discusses what happens if the B2B pivot also doesn't work (risk scenario); the overall deck would facilitate a productive, decision-oriented board meeting."
    weight: 0.30
    description: "DecisionFramework"
