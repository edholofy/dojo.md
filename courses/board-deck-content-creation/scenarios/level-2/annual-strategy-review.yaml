meta:
  id: annual-strategy-review
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create an annual strategy review board deck covering year-end performance, strategic priorities for the coming year, and annual plan"
  tags: [annual-review, strategy, planning, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A startup building a
  platform for managing corporate volunteer programs
  ($5M raised, 28 employees, 2 years post-launch).
  You're preparing the annual board meeting — the most
  important board meeting of the year — which combines
  year-end performance review with strategic planning
  for the coming year.

  Year-end performance:
  - ARR: Started at $1.1M, ended at $2.4M (+118% YoY)
  - Customers: 42 → 78 (enterprise and mid-market)
  - NRR: 124% (strong expansion within accounts)
  - Gross margin: 79%
  - Burn: $185K/month (average for the year)
  - Team: Grew from 18 to 28
  - Key wins: 3 Fortune 500 customers signed (first
    enterprise deals)
  - Key misses: Missed Q3 new logo target by 30%;
    international expansion delayed; mobile app
    behind schedule

  Strategic priorities for next year (proposed):
  1. Enterprise acceleration: Double down on Fortune
     500 (need enterprise sales team, longer cycles
     but 5x ACV)
  2. Platform expansion: Launch impact measurement
     module (top customer request; competitive
     differentiator)
  3. International: Enter UK market (5 customer
     requests; 2 partner opportunities)
  4. Team scaling: Grow to 45 people (VP Sales,
     enterprise AEs, product manager, additional
     engineers)

  Financial plan:
  - Target ARR: $5.2M (117% growth)
  - Target burn: $260K/month (increased for hiring)
  - Will need Series B by Q3 next year
  - Budget request: $3.6M operating budget (current
    cash: $2.8M + revenue)

  Board: CEO + Series A lead (Board seat) + seed
  investor (Board seat) + independent director (Board
  seat, former VP HR at a Fortune 100)

  Task: Create the annual strategy review board deck
  — covering year-end performance review, lessons
  learned, strategic priorities for the coming year,
  the financial plan, and key decisions for the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive annual strategy review — presents year-end performance with clear YoY comparisons; acknowledges both wins (118% growth, Fortune 500 customers, strong NRR) and misses (Q3 target miss, international delay, mobile app); includes lessons learned from the year; presents the 4 strategic priorities with clear rationale and resource requirements; the annual plan is specific enough to be actionable but flexible enough to adapt."
    weight: 0.35
    description: "AnnualReviewStructure"
  - type: llm_judge
    criteria: "Response presents the financial plan and resource needs clearly — the $5.2M ARR target is justified with assumptions; the burn increase is tied to specific hiring needs; the Series B timing (Q3) is connected to the growth plan; the budget request ($3.6M operating) is broken down by category; the plan addresses the cash bridge between current reserves and Series B; the financial projections are realistic for the company's growth trajectory."
    weight: 0.35
    description: "FinancialPlan"
  - type: llm_judge
    criteria: "Response facilitates strategic board discussion — presents the 4 priorities as a portfolio requiring board input on sequencing and trade-offs; the enterprise vs mid-market balance is framed as a strategic choice; the international expansion is presented with go/no-go decision criteria; the independent director's HR background is relevant to the team scaling discussion; specific board decisions are identified (priority ranking, budget approval, Series B timing); the deck would support a 2-3 hour annual strategy session."
    weight: 0.30
    description: "StrategicDiscussion"
