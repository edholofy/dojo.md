meta:
  id: series-a-board-package
  level: 2
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive quarterly board deck for a Series A company with mixed performance — strong growth but emerging unit economics concerns"
  tags: [series-a, quarterly, mixed-performance, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A SaaS startup building
  customer feedback analytics for e-commerce brands
  ($6M raised, 32 employees, $3.2M ARR). You're
  preparing the Q3 board deck for a company with strong
  top-line growth but emerging unit economics concerns.

  Board composition:
  - CEO (you, Board seat)
  - Series A lead partner (Board seat) — focused on
    growth efficiency metrics
  - Seed investor (Board seat) — focused on product-
    market fit signals
  - Independent director (Board seat) — former VP
    Sales at Shopify, focused on GTM execution

  Q3 performance:
  - ARR: $3.2M → $3.8M (+18.8% QoQ, +95% YoY)
  - New customers: 28 (best quarter ever)
  - Logo churn: 4 customers (3.2% quarterly)
  - Net revenue retention: 112%
  - Gross margin: 71% (down from 76% — increased
    hosting costs from AI features)
  - CAC: $18,500 (up from $14,200 last quarter)
  - CAC payback: 16 months (up from 12 months)
  - LTV/CAC: 3.8x (down from 4.5x)
  - Magic number: 0.72 (acceptable but trending down)
  - Burn: $280K/month (up from $240K)
  - Cash: $3.1M
  - Runway: 11 months

  The tension: Growth is accelerating but unit
  economics are degrading. The Series A investor will
  want to understand if this is a temporary growth
  investment or a structural problem.

  Key developments:
  - Launched AI-powered sentiment analysis (driving
    customer wins but increasing COGS)
  - Hired VP Marketing and 3 SDRs (driving CAC up
    short-term)
  - Lost 2 customers to a new competitor (Medallia
    launched a self-serve product)
  - Partnership with Shopify app store generating
    30% of new leads

  Task: Create the full quarterly board deck content
  that presents the growth story while honestly
  addressing the unit economics degradation — the deck
  should facilitate a productive board discussion about
  the growth vs efficiency trade-off.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive Series A board deck — includes executive summary with key highlights and lowlights, detailed metrics dashboard (ARR, growth, retention, unit economics), product update, GTM update, team and hiring, financial overview, and strategic discussion items; the metrics are presented with QoQ and YoY trends; the deck follows a logical narrative flow; the format is appropriate for a 4-person board at a Series A company."
    weight: 0.35
    description: "ComprehensiveDeck"
  - type: llm_judge
    criteria: "Response honestly addresses the unit economics tension — presents the CAC increase, gross margin decline, and CAC payback degradation alongside the strong growth; provides context for each metric change (AI features increasing COGS, new marketing hires increasing CAC short-term); presents the question of whether this is a temporary investment phase or structural; facilitates a productive board discussion about the growth vs efficiency trade-off rather than hiding the concern."
    weight: 0.35
    description: "UnitEconomicsTension"
  - type: llm_judge
    criteria: "Response tailors content to the board's diverse perspectives — the Series A lead gets efficiency metrics they care about; the seed investor sees product-market fit signals; the independent director (ex-Shopify VP Sales) sees GTM execution data; the competitive threat from Medallia is addressed; the Shopify partnership is highlighted; specific board input is requested on the growth vs efficiency question; the deck demonstrates that the CEO is managing the company thoughtfully, not just growing at any cost."
    weight: 0.30
    description: "BoardMemberPerspectives"
