meta:
  id: board-deck-turnaround
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a company turnaround — new CEO presenting a 180-day transformation plan with aggressive cost restructuring, product refocusing, and culture rebuilding to a skeptical board"
  tags: [turnaround, transformation, new-ceo, expert]

state: {}

trigger: |
  You're the newly appointed CEO (45 days in) of a
  Series C SaaS company ($60M raised, down to 180
  employees from 310) that builds a customer engagement
  platform. You were brought in by the board after the
  founding team was asked to leave. This is your first
  full board deck — essentially your turnaround plan.

  What you inherited:
  - ARR: $24M (down from peak $32M; 25% revenue loss)
  - Burn: $1.8M/month (reduced from $3.2M after
    layoffs executed by the interim CEO)
  - Cash: $11M
  - Runway: 6.1 months at current burn
  - Customers: 280 (down from 420; massive churn wave)
  - NPS: 12 (down from 48)
  - Employee engagement: 2.4/5.0 (Glassdoor: 2.6)
  - Technical debt: 40% of engineering time spent on
    maintenance and bug fixes
  - Product: 6 product lines, only 2 are profitable
  - Management: CFO stayed; all other C-suite departed
    with founders

  Root cause analysis (your 45-day assessment):
  1. Over-expansion: Company tried to be everything to
     everyone; 6 products diluted focus and quality
  2. Customer neglect: Rapid growth prioritized new
     logos over existing customer success
  3. Cultural breakdown: Founder-driven decisions
     without management process; toxic internal politics
  4. Financial mismanagement: No unit economics
     discipline; unprofitable products subsidized by
     profitable ones
  5. Technical debt: Architecture shortcuts to ship
     features created reliability issues

  Your 180-day turnaround plan:
  Phase 1 (Days 1-60, mostly complete):
  - Assessment and stabilization
  - Hired: COO (former turnaround specialist), VP
    Customer Success (retention focus)
  - Stabilized top 50 at-risk accounts (saved 38,
    lost 12 — $1.4M ARR saved)
  - Identified the 2 profitable products to focus on

  Phase 2 (Days 61-120):
  - Shut down 4 unprofitable product lines
  - Reduce headcount by 30 more people (to 150)
  - Reduce burn to $1.1M/month
  - Intensive customer success program
  - Engineering: 50% time on reliability, 50% on
    core product improvements

  Phase 3 (Days 121-180):
  - Resume growth from stabilized base
  - Launch customer win-back program
  - New pricing model for focused product portfolio
  - Rebuild employer brand
  - Bridge financing or Series D conversations

  Board: 3 investor board members + 2 independent
  directors (7 total including CEO and former interim
  CEO who stays as advisor). Board is skeptical but
  invested in the turnaround succeeding.

  Task: Create the comprehensive turnaround board
  deck — presenting your 45-day assessment, root cause
  analysis, 180-day plan with specific milestones and
  KPIs, financial projections under the turnaround
  scenario, and what you need from the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling turnaround board deck — presents the 45-day assessment with honest root cause analysis (over-expansion, customer neglect, cultural breakdown, financial mismanagement, technical debt); the 180-day plan is specific with phased milestones and measurable KPIs; financial projections show burn reduction, revenue stabilization, and path to sustainability; each phase has clear deliverables and accountability; the deck builds confidence in the new CEO's diagnostic capability and action-orientation."
    weight: 0.35
    description: "TurnaroundPlan"
  - type: llm_judge
    criteria: "Response addresses the financial urgency and bridge to sustainability — the 6.1-month runway is front and center; Phase 2 cost reduction extends runway to ~10 months; the bridge financing or Series D timing is addressed honestly; the deck includes scenario analysis (optimistic, base, pessimistic); the product line shutdown is quantified (revenue loss vs cost savings); the overall financial plan shows a credible path from $1.8M burn to $1.1M and eventually to break-even; the board can evaluate whether the turnaround is financially feasible."
    weight: 0.35
    description: "FinancialFeasibility"
  - type: llm_judge
    criteria: "Response demonstrates leadership credibility and cultural awareness — the root cause analysis is honest without blaming predecessors excessively; the culture section addresses employee morale (2.4/5.0 engagement) with specific rebuilding actions; the customer success focus demonstrates outside-in thinking; specific board asks are clear (patience, bridge financing participation, hiring referrals); the tone is determined but not overconfident; the deck would make a skeptical board cautiously optimistic about the turnaround under new leadership."
    weight: 0.30
    description: "LeadershipCredibility"
