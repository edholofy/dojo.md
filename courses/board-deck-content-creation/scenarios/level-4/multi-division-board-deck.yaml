meta:
  id: multi-division-board-deck
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a board deck for a multi-division company with segment reporting, division-level P&Ls, shared services allocation, and cross-divisional strategic initiatives"
  tags: [multi-division, segment-reporting, shared-services, expert]

state: {}

trigger: |
  You're the CFO of a late-stage technology company
  ($240M ARR, 1,800 employees) that operates 3
  distinct business divisions. The board requires
  segment-level reporting with division P&Ls, shared
  services allocations, and cross-divisional strategic
  analysis.

  Division 1 — Enterprise Platform (the core):
  - Revenue: $160M ARR (67% of total)
  - Growth: 22% YoY (decelerating from 35%)
  - Gross margin: 82%
  - Contribution margin: 28%
  - Customers: 680
  - Status: Mature, profitable, cash cow; needs
    investment to defend against cloud-native
    competitors

  Division 2 — SMB Cloud (newer business):
  - Revenue: $55M ARR (23% of total)
  - Growth: 65% YoY (accelerating)
  - Gross margin: 71% (AI inference costs)
  - Contribution margin: -8% (heavy sales investment)
  - Customers: 4,200
  - Status: Growth engine; burning cash but strong
    unit economics trajectory

  Division 3 — Data & Analytics (acquired 18 months
  ago):
  - Revenue: $25M ARR (10% of total)
  - Growth: 15% YoY (below acquisition thesis of 40%)
  - Gross margin: 75%
  - Contribution margin: 2%
  - Customers: 320
  - Status: Underperforming; integration challenges;
    board questioning the acquisition thesis

  Shared services (allocated across divisions):
  - G&A: $28M/year (allocated by revenue %)
  - R&D shared platform: $12M/year (allocated by
    engineering headcount)
  - Corporate marketing: $8M/year (allocated by
    customer count)
  - Total shared: $48M/year
  - Allocation methodology is debated — Division 2
    argues they're over-allocated on G&A; Division 3
    argues R&D allocation is unfair

  Cross-divisional initiatives:
  1. Unified data layer: $4M investment to enable
     cross-selling between divisions
  2. AI platform: Shared AI/ML capabilities used by
     all 3 divisions
  3. Single sign-on and identity: Common customer
     identity across products

  Board: CEO + 3 investor board members + 3
  independent directors (7 total)

  Task: Create the multi-division board package
  including: consolidated executive summary, division-
  level deep-dives with P&Ls, shared services
  allocation analysis, cross-divisional initiative
  tracking, and strategic discussion items about the
  portfolio composition (including whether to divest
  the underperforming Data & Analytics division).

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive multi-division board package — presents consolidated company performance alongside division-level detail; each division has a complete P&L with contribution margin; shared services allocation methodology is presented transparently; cross-divisional initiatives are tracked with status and ROI; the executive summary synthesizes the portfolio performance without losing division-level accountability; the format supports both portfolio-level and division-level board discussions."
    weight: 0.35
    description: "MultiDivisionPackage"
  - type: llm_judge
    criteria: "Response addresses the portfolio management questions — presents the Enterprise division's deceleration as a strategic concern; presents the SMB Cloud division's growth investment case with unit economics trajectory; addresses the Data & Analytics underperformance honestly (integration challenges, below-acquisition-thesis growth); raises the divestiture question with analysis (what would the portfolio look like without Division 3?); the allocation methodology debate is addressed with alternative approaches."
    weight: 0.35
    description: "PortfolioManagement"
  - type: llm_judge
    criteria: "Response handles the cross-divisional complexity — presents the shared platform investments as portfolio-level decisions (who benefits, who pays); addresses the allocation methodology disputes with data; discusses cross-selling opportunities between divisions; addresses the tension between division autonomy and corporate synergy; the board can evaluate whether the multi-division structure creates value or destroys it; the overall deck demonstrates CFO capability to manage a complex multi-business organization."
    weight: 0.30
    description: "CrossDivisionalComplexity"
