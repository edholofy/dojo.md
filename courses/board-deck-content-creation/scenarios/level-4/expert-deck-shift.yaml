meta:
  id: expert-deck-shift
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create multiple expert-level board documents simultaneously — a quarterly board package during an SEC investigation, a special committee report on CEO misconduct allegations, and an audit committee presentation on restatement risk"
  tags: [sec-investigation, misconduct, restatement, expert, shift-simulation]

state: {}

trigger: |
  You're the General Counsel and Corporate Secretary
  of a late-stage SaaS company ($95M ARR, $680M last
  valuation, 520 employees). You're preparing 3
  critical board documents for what will be the most
  difficult board meeting in the company's history.

  Document 1 — Quarterly board package (Q2):
  Despite the crises, business continues operating:
  - ARR: $95M → $98M (+3.2% QoQ, +28% YoY)
  - Growth has decelerated (was 45% YoY last year)
  - 4 enterprise customers have paused expansion deals
    citing "concerns about company stability"
  - Employee attrition: 6.2% quarterly (up from 2.8%)
  - Product roadmap on track; 2 major features shipped
  - Cash: $42M; Burn: $2.1M/month; Runway: 20 months
  - The quarterly deck must present business
    performance while acknowledging the crisis context

  Document 2 — Special committee report on CEO:
  The board formed a special committee (3 independent
  directors, external counsel Cravath) to investigate
  allegations against the CEO:
  - Allegation 1: CEO approved $2.8M in consulting
    contracts to a company owned by his college
    roommate, without board disclosure (related-party
    transaction violation)
  - Allegation 2: CEO submitted $340K in personal
    expenses as business expenses over 18 months
  - Allegation 3: CEO made verbal promises of
    accelerated vesting to 3 senior executives
    without board/comp committee approval
  - Investigation status: External counsel has
    completed interviews (42 people); forensic
    accountant has completed expense audit
  - Findings: Allegations 1 and 2 are substantiated;
    Allegation 3 is partially substantiated (verbal
    commitments made but not formalized)
  - CEO has retained personal counsel; denies
    willful misconduct

  Document 3 — Audit committee presentation:
  The CEO misconduct investigation has uncovered
  accounting concerns:
  - The $2.8M in undisclosed consulting contracts may
    constitute a related-party transaction requiring
    disclosure under ASC 850
  - If the personal expenses ($340K) were improperly
    classified, prior period financials may need
    adjustment
  - The unauthorized vesting promises, if honored,
    would affect stock compensation expense
  - External auditor (EY) has been notified; has
    flagged potential "material weakness" in internal
    controls over financial reporting
  - Risk of financial restatement for prior 2 fiscal
    years
  - D&O insurance carrier notified; coverage review
    in progress

  Board: 3 investor directors + 4 independent
  directors + CEO (under investigation, will be
  recused from Document 2 discussion) + CFO + General
  Counsel (you)

  Task: Create all three documents — the quarterly
  board package (acknowledging crisis context), the
  special committee report (investigation findings
  and recommendations), and the audit committee
  presentation (restatement risk and remediation) —
  maintaining appropriate information barriers and
  legal privilege.

assertions:
  - type: llm_judge
    criteria: "Response creates three documents with appropriate information barriers and legal privilege — the quarterly board package presents business performance while acknowledging the crisis context without prejudging the investigation outcome (CEO is still in his role during investigation); the special committee report presents investigation findings with legal precision (substantiated vs unsubstantiated, evidence quality, CEO's position); the audit committee presentation addresses restatement risk with accounting specificity; each document maintains attorney-client privilege where appropriate; the overall package demonstrates corporate governance under extreme pressure."
    weight: 0.35
    description: "InformationBarriersAndPrivilege"
  - type: llm_judge
    criteria: "Response handles the CEO misconduct investigation with governance rigor — the special committee report includes clear findings on each allegation; presents the evidence for substantiated allegations (related-party contracts, expense audit results); addresses the CEO's defense position fairly; recommends specific board actions (termination for cause vs negotiated departure vs remediation); addresses the legal implications (fiduciary duty breach, potential securities law implications, D&O coverage); the report would withstand legal review by both sides' counsel."
    weight: 0.35
    description: "InvestigationRigor"
  - type: llm_judge
    criteria: "Response addresses the accounting and restatement risk with precision — the audit committee presentation identifies each potential adjustment (related-party disclosure, expense reclassification, stock comp expense); discusses materiality thresholds; addresses the EY material weakness finding; presents the restatement process and timeline if needed; discusses the impact on the company's capital markets positioning (fundraise, potential IPO delay); addresses investor notification requirements; the presentation demonstrates that the audit committee and management are taking the accounting concerns seriously and following proper remediation process."
    weight: 0.30
    description: "RestatementRisk"
