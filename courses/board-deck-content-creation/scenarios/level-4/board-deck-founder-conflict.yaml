meta:
  id: board-deck-founder-conflict
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create board materials for managing a co-founder conflict that has escalated to a board-level dispute, including a governance review, mediation framework, and potential separation scenarios"
  tags: [founder-conflict, governance, board-dispute, expert]

state: {}

trigger: |
  You're the Lead Independent Director of a Series C
  SaaS company ($50M raised, 200 employees, $32M ARR)
  where a co-founder dispute has escalated to a board-
  level crisis. You need to prepare materials for a
  special board session (without the co-founders
  present).

  The situation:
  Co-founder/CEO (Alex, 28% ownership) and co-founder/
  CTO (Jordan, 22% ownership) have a fundamental
  disagreement about the company's strategic direction
  that has become personal and is affecting the
  organization.

  Strategic disagreement:
  - Alex (CEO) wants to pivot the product toward AI-
    first architecture, even if it means 12 months of
    reduced growth (rebuild the core platform)
  - Jordan (CTO) believes the current architecture
    can be incrementally improved with AI features and
    that a full rebuild would destroy the company
  - Both have valid technical arguments; the dispute
    is about risk tolerance and timing, not competence

  Escalation timeline:
  - Month 1: Disagreement discussed in executive team
  - Month 3: Disagreement brought to board; board
    asked both to find compromise
  - Month 5: No compromise; Alex started hiring AI
    engineers without Jordan's approval
  - Month 6: Jordan threatened to resign; 8 engineers
    said they'd follow her
  - Month 7 (now): Alex asked the board to fire Jordan;
    Jordan asked the board to replace Alex as CEO

  Impact on the company:
  - Engineering team split into 2 camps (Team Alex vs
    Team Jordan)
  - VP Product resigned citing "toxic leadership
    dynamic"
  - Q3 metrics suffered: New logo acquisition dropped
    25%; product releases delayed 6 weeks
  - 3 enterprise customers have noticed the internal
    turmoil (sales team quality declined)
  - Series D fundraise was supposed to start this
    quarter; investors are aware of the conflict

  Board composition (6 members):
  - Alex (CEO, co-founder, Board seat)
  - Jordan (CTO, co-founder, Board seat)
  - Series C lead (Board seat) — invested based on
    Alex's vision; generally aligned with CEO
  - Series B lead (Board seat) — close personal
    relationship with Jordan
  - Lead Independent Director (you, Board seat)
  - Independent director 2 (Board seat) — former COO,
    neutral

  Legal considerations:
  - Both co-founders have drag-along rights at 70%+
    vote
  - Neither co-founder's shares are subject to vesting
    (fully vested)
  - Severance obligations differ by termination type
  - Non-compete provisions exist (12 months, narrow
    scope)
  - Board members with investor relationships may have
    conflicts

  Task: Create the board materials for the special
  session — including the situation assessment,
  mediation framework options, separation scenarios
  (if mediation fails), financial and organizational
  impact analysis, and governance process for the
  board's handling of the dispute.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive board materials for the co-founder dispute — presents the situation assessment objectively (both perspectives have merit); outlines mediation framework options (external mediator, structured compromise, time-bound decision process); presents separation scenarios with financial and legal analysis (CEO departure, CTO departure, dual departure); addresses the organizational impact (team splits, VP Product loss, customer concerns, fundraise delay); the materials are prepared from the Lead Independent Director's perspective with appropriate neutrality."
    weight: 0.35
    description: "DisputeAssessment"
  - type: llm_judge
    criteria: "Response addresses the governance complexity — identifies the board member conflicts of interest (Series C aligned with Alex, Series B close to Jordan); proposes a governance process that handles these conflicts (recusal, independent committee, external advisors); addresses the legal considerations (vesting, drag-along, non-competes, severance); discusses how to protect the company during the resolution process (interim leadership arrangements, customer communication, team stability); the governance process would withstand legal scrutiny."
    weight: 0.35
    description: "GovernanceProcess"
  - type: llm_judge
    criteria: "Response balances the urgency of resolution with the complexity of the situation — acknowledges that both co-founders have valid perspectives (this isn't a clear right/wrong); presents a time-bound decision framework (the company can't afford indefinite conflict); addresses the Series D fundraise impact and timeline; discusses what the company looks like under each scenario (with Alex, with Jordan, with a new CEO); the materials would enable the independent directors to drive toward a resolution that serves shareholder interests while treating both co-founders fairly."
    weight: 0.30
    description: "ResolutionFramework"
