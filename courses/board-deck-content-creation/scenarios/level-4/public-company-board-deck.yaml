meta:
  id: public-company-board-deck
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a public company quarterly board package with full committee reports, earnings preview, shareholder engagement summary, and risk management dashboard"
  tags: [public-company, quarterly, earnings, expert]

state: {}

trigger: |
  You're the Chief of Staff and Board Secretary at a
  publicly traded SaaS company ($420M ARR, $4.8B
  market cap, 2,800 employees, listed on NASDAQ 18
  months ago). You're preparing the Q3 board package
  for the company's quarterly board meeting, which
  occurs 2 weeks before the earnings call.

  Board composition (11 members):
  - CEO (Board Chair)
  - CFO
  - Lead Independent Director
  - 8 independent directors (diverse backgrounds:
    technology, finance, healthcare, international
    business, cybersecurity, marketing, ESG, legal)

  Committees: Audit (5 members), Compensation (4),
  Nominating & Governance (4), Technology & Cyber (3),
  Risk (3)

  Q3 financial results (pre-earnings, MNPI):
  - Revenue: $112M (+28% YoY; consensus estimate: $110M)
  - Non-GAAP EPS: $0.42 (consensus: $0.38)
  - ARR: $420M → $448M
  - Free cash flow: $18M
  - Guidance: Raising full-year revenue guidance by $8M

  Key business updates:
  - Won 2 $5M+ ACV deals (largest in company history)
  - Completed bolt-on acquisition ($28M, AI company,
    45 employees) — integration in progress
  - Activist investor (Starboard Value) has accumulated
    a 4.2% stake; sent private letter requesting board
    representation and margin improvement
  - Short seller report published 3 weeks ago
    questioning revenue recognition (management
    believes allegations are unfounded; audit committee
    reviewed and found no issues)
  - ESG rating downgraded by MSCI (from AA to A) due
    to insufficient carbon disclosure

  Regulatory items:
  - SEC staff comment on prior 10-Q (revenue
    recognition for multi-year contracts)
  - FTC review of acquisition (Hart-Scott-Rodino
    filing; expected clearance)
  - EU AI Act compliance assessment for product

  Shareholder engagement:
  - Top 20 shareholders engaged in Q3 (represent 68%
    of float)
  - Proxy advisory firm (ISS) engagement ahead of
    annual meeting
  - Retail shareholder questions about dividend policy
  - Say-on-pay vote passed with 82% support (down from
    91% prior year)

  Task: Create the comprehensive public company board
  package — including executive summary, financial
  results (pre-earnings review), committee reports
  (audit, compensation, nom/gov, technology, risk),
  activist investor response strategy, short seller
  defense, shareholder engagement summary, and
  strategic discussion items.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive public company board package with all required components — includes executive summary, pre-earnings financial results with guidance discussion, full committee reports (5 committees), activist investor strategy, short seller defense, shareholder engagement summary, and strategic items; the package handles MNPI appropriately (board sees results before earnings call); the format and depth match what an 11-person public company board expects; each committee report follows governance protocols."
    weight: 0.35
    description: "PublicCompanyPackage"
  - type: llm_judge
    criteria: "Response addresses the activist investor and short seller challenges with strategic sophistication — the Starboard Value response strategy includes engagement approach, vulnerability assessment (where is the activist right?), defensive measures, and Board member selection defense; the short seller defense includes the audit committee's findings, communication strategy, and legal considerations; both situations are presented as governance issues requiring board oversight, not management alone; the former SEC Commissioner's expertise (if applicable) would be leveraged."
    weight: 0.35
    description: "ActivistShortSellerResponse"
  - type: llm_judge
    criteria: "Response demonstrates public company governance mastery — the earnings preview section handles the beat-and-raise guidance thoughtfully (board approval of raised guidance); the shareholder engagement summary connects to proxy season preparation; the say-on-pay decline (91% to 82%) is flagged as a concern requiring compensation committee attention; the ESG rating downgrade is addressed with remediation plan; the acquisition integration and regulatory items are tracked; the overall package demonstrates the complexity of public company board governance."
    weight: 0.30
    description: "GovernanceMastery"
