meta:
  id: board-deck-risk-management
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive enterprise risk management board deck covering cybersecurity, regulatory, operational, financial, and strategic risks with heat maps, mitigation tracking, and risk appetite framework"
  tags: [risk-management, erm, cybersecurity, expert]

state: {}

trigger: |
  You're the Chief Risk Officer of a late-stage
  fintech company ($120M ARR, 680 employees) that
  processes $4.2B in annual payment volume. Your board
  has established a Risk Committee and requires a
  comprehensive quarterly Enterprise Risk Management
  (ERM) report. This is the first full ERM board
  presentation.

  Risk categories and key risks:

  1. Cybersecurity risks (Critical):
  - Threat landscape: 340 attack attempts/day blocked;
    2 near-miss incidents this quarter
  - SOC 2 Type II: Current, valid through Q2 next year
  - PCI DSS: Level 1 compliant; audit in Q1
  - Vulnerability management: 12 critical vulns
    patched; 3 medium outstanding; average patch
    time: 4.2 days (target: 3 days)
  - Third-party risk: 14 critical vendors; 3 have
    outdated SOC 2 reports

  2. Regulatory risks (High):
  - Multi-state money transmitter licenses: Licensed
    in 48 states; 2 pending (Mississippi, Montana)
  - CFPB examination: Scheduled for Q1 next year
  - AML/BSA compliance: SAR filing volume up 40%;
    compliance team stretched
  - New regulations: Open Banking (CFPB 1033 rule)
    requires significant product changes by 2027

  3. Operational risks (Medium-High):
  - Platform availability: 99.95% uptime (target:
    99.99%); 3 incidents exceeding 15 minutes
  - Processing errors: 0.003% error rate ($126K in
    processing errors this quarter)
  - Key person dependencies: 4 critical roles without
    succession plans
  - Vendor concentration: 2 processors handle 85% of
    volume

  4. Financial risks (Medium):
  - Customer concentration: Top 10 = 28% of revenue
  - FX exposure: 15% of revenue in non-USD currencies
  - Credit risk: $8M in sponsor bank settlement risk
  - Fraud losses: $420K this quarter (0.01% of volume;
    industry average: 0.015%)

  5. Strategic risks (Medium):
  - Competitive: 3 well-funded competitors raised
    $200M+ combined in last 12 months
  - Market: Embedded finance trend could disintermediate
    standalone fintech platforms
  - Technology: Legacy payment rails constraining
    innovation speed
  - Talent: 8% attrition in engineering; below-market
    compensation for compliance roles

  Board Risk Committee: 3 independent directors
  (former bank CRO as Chair, cybersecurity expert,
  former regulator)

  Task: Create the comprehensive ERM board deck
  including risk heat map, risk appetite framework,
  detailed assessment of each risk category, mitigation
  status tracking, emerging risk identification, and
  risk committee recommendations for the full board.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive ERM presentation — includes a risk heat map with likelihood and impact scoring for each category; establishes a risk appetite framework (what level of risk is acceptable in each category); presents each of the 5 risk categories with detailed assessment, current mitigation measures, and residual risk rating; tracks mitigation initiatives with status and ownership; identifies emerging risks not yet materialized; the overall presentation meets the standards expected by a Risk Committee chaired by a former bank CRO."
    weight: 0.35
    description: "ERMFramework"
  - type: llm_judge
    criteria: "Response addresses the fintech-specific risk dimensions — cybersecurity assessment is appropriately detailed for a company processing $4.2B in payments; regulatory risks include specific compliance obligations (MTLs, PCI DSS, AML/BSA, CFPB 1033); operational risks quantify processing errors and availability against SLAs; financial risks address the sponsor bank relationship and settlement risk; the risk assessment demonstrates understanding of fintech-specific risk dynamics beyond generic ERM frameworks."
    weight: 0.35
    description: "FintechRiskDepth"
  - type: llm_judge
    criteria: "Response provides actionable risk committee recommendations — includes specific recommendations for each risk category (budget requests for security improvements, compliance hiring, vendor diversification timeline); presents risk trends (improving, stable, deteriorating) for each category; includes a risk dashboard suitable for ongoing board monitoring; the committee report includes items to escalate to the full board; the overall deck establishes a risk management culture and reporting cadence that positions the company for institutional maturity."
    weight: 0.30
    description: "CommitteeRecommendations"
