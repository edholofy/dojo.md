meta:
  id: board-deck-pe-portfolio
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a PE-style board deck for a portfolio company — including value creation plan tracking, leverage and covenant compliance, add-on acquisition pipeline, and management incentive plan status"
  tags: [private-equity, portfolio-company, value-creation, expert]

state: {}

trigger: |
  You're the CFO of a mid-market B2B software company
  ($85M ARR, 450 employees) that was acquired by a
  private equity firm (Vista Equity Partners) 18 months
  ago in a $550M LBO. The board meeting format and
  content expectations are fundamentally different from
  a VC-backed company.

  PE ownership context:
  - Purchase price: $550M (6.5x trailing revenue)
  - Equity: $220M (40%)
  - Debt: $330M (60%; senior term loan + mezzanine)
  - Management rollover: CEO, CFO, CTO rolled 25% of
    proceeds ($22M combined)
  - Management equity: Additional 8% option pool tied
    to exit IRR hurdles

  Value creation plan (100-day plan, now at Month 18):
  - Revenue growth: Target 25% CAGR → Actual 22%
    (slightly behind)
  - EBITDA margin expansion: Target 18% → 28% by
    Year 3; Currently at 22% (on track)
  - Pricing optimization: Implemented 12% average
    price increase; minimal churn impact (98.5%
    retention)
  - Cost rationalization: $8M in annual savings
    realized (target $12M by Year 2)
  - Product consolidation: Sunset 2 of 5 legacy
    products (in progress)
  - Add-on acquisitions: 1 completed ($18M, 40-person
    company); 2 more in pipeline

  Financial performance (Q3):
  - Revenue: $22.8M quarterly ($91.2M run-rate)
  - EBITDA: $5.0M (22% margin)
  - Adjusted EBITDA: $5.8M (25.4%, adding back one-
    time integration costs)
  - Free cash flow: $3.2M
  - Debt service: $2.8M/quarter (interest + mandatory
    amortization)
  - Net leverage: 3.4x Adjusted EBITDA (covenant: <5x)
  - Cash: $14M
  - Credit facility availability: $20M undrawn revolver

  Add-on acquisition pipeline:
  1. Target A: $12M revenue, $3M EBITDA; complementary
     product; $40M ask (13x EBITDA pre-synergies, 8x
     post); LOI stage
  2. Target B: $8M revenue, $1.5M EBITDA; geographic
     expansion (UK); $25M ask; early discussions
  3. Target C: Talent acquisition (15-person team,
     AI capability); $5M; term sheet issued

  Board composition (5 members):
  - Vista Operating Partner (Board Chair)
  - Vista Principal (Board member)
  - CEO (Board member)
  - CFO (you, Board observer)
  - Independent director (industry expert, former CEO
    of a public competitor)

  Task: Create the PE-style quarterly board deck
  including: value creation plan scorecard, detailed
  financial performance (with EBITDA bridge and
  adjustments), leverage and covenant compliance,
  add-on acquisition pipeline analysis, management
  incentive plan status, and operational improvement
  initiatives.

assertions:
  - type: llm_judge
    criteria: "Response creates a PE-style board deck that differs fundamentally from VC-style decks — focuses on EBITDA margin expansion, cash generation, debt service coverage, and leverage ratios rather than growth-at-all-costs metrics; includes the value creation plan scorecard tracking each initiative against targets; presents EBITDA bridge with clear add-backs and adjustments; the financial presentation includes covenant compliance analysis; the deck format matches what a Vista Equity operating partner would expect (operational rigor, margin focus, cash generation emphasis)."
    weight: 0.35
    description: "PEStyleDeck"
  - type: llm_judge
    criteria: "Response addresses the add-on acquisition pipeline with M&A discipline — evaluates each target on pre- and post-synergy multiples; presents the leverage impact of each acquisition (how it affects net leverage ratio vs covenant); addresses financing considerations (revolver draw, incremental term loan, equity co-invest from Vista); presents the integration playbook lessons from the completed acquisition; the overall M&A analysis demonstrates buy-and-build strategy sophistication."
    weight: 0.35
    description: "AddOnAcquisitions"
  - type: llm_judge
    criteria: "Response addresses management incentive alignment — presents the management equity pool status (8% tied to exit IRR hurdles); discusses how current performance tracks against IRR hurdle targets; addresses the pricing optimization success and its impact on the value creation thesis; discusses product consolidation progress (sunsetting legacy products); the deck demonstrates that management is aligned with PE value creation objectives; the independent director's competitive industry insight is leveraged for strategic discussion."
    weight: 0.30
    description: "ManagementAlignment"
