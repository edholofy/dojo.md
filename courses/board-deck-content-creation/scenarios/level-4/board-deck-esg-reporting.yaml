meta:
  id: board-deck-esg-reporting
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive ESG board deck for a late-stage company — covering environmental impact, social responsibility, governance metrics, and alignment with SASB/TCFD frameworks for a company preparing for public market scrutiny"
  tags: [esg, sustainability, sasb, tcfd, expert]

state: {}

trigger: |
  You're the VP of Corporate Social Responsibility and
  Sustainability at a late-stage cloud infrastructure
  company ($300M ARR, 2,200 employees, 12 data centers
  globally). The board has established an ESG
  subcommittee and you're delivering the first
  comprehensive ESG board presentation.

  Environmental metrics:
  - Total energy consumption: 285 GWh/year
  - Renewable energy: 62% (target: 100% by 2030)
  - Scope 1 emissions: 2,400 tCO2e (backup generators)
  - Scope 2 emissions: 48,000 tCO2e (purchased
    electricity, market-based)
  - Scope 3 emissions: Estimated 120,000 tCO2e (supply
    chain, employee commuting, end-of-life hardware)
  - Water usage: 1.2B gallons/year (data center
    cooling); PUE: 1.28 (industry avg: 1.57)
  - E-waste: 42 tons recycled; zero landfill policy
    in 9 of 12 data centers
  - Science-Based Targets: Committed to SBTi; targets
    submitted, pending validation

  Social metrics:
  - Workforce diversity:
    * Women in leadership (VP+): 28% (target: 40%)
    * Underrepresented minorities in US workforce: 22%
    * Pay equity audit: 97 cents/$1 (women to men);
      addressing 3% gap
  - Employee engagement: eNPS 42 (up from 36)
  - Training: Average 40 hours/employee/year
  - Supply chain: 85% of suppliers assessed on labor
    standards; 3 flagged for working conditions
  - Community investment: $2.4M in grants and employee
    volunteer hours

  Governance metrics:
  - Board diversity: 3 of 9 directors are women; 2
    are underrepresented minorities
  - Board independence: 6 of 9 are independent
  - CEO-to-median pay ratio: 48:1
  - Data privacy incidents: 0 material breaches
  - Ethics hotline: 14 reports; 11 resolved, 3 open
  - Political contributions: $0 (company policy)

  Frameworks:
  - SASB (Software & IT Services): Mapped to all
    relevant metrics
  - TCFD: Climate risk assessment in progress (physical
    and transition risks to data centers)
  - CDP: Score B (target: A by 2027)
  - UN SDGs: Aligned to 5 of 17 goals

  Investor expectations:
  - 3 of top 10 shareholders have ESG mandates
  - ISS E&S Quality Score: 5 (scale 1-10, lower better)
  - MSCI ESG Rating: A (target: AA)
  - Upcoming annual meeting: 2 ESG-related shareholder
    proposals

  Board ESG subcommittee: 3 independent directors
  (sustainability expert as Chair, former regulator,
  technology executive)

  Task: Create the comprehensive ESG board deck —
  covering all three pillars (environmental, social,
  governance), alignment with reporting frameworks,
  investor engagement on ESG, shareholder proposal
  analysis, and the 3-year ESG strategy with specific
  targets and accountability.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive ESG presentation covering all three pillars — environmental metrics (energy, emissions Scope 1/2/3, water, e-waste) with targets and progress; social metrics (diversity, pay equity, supply chain labor, community investment) with benchmarks; governance metrics (board diversity, independence, pay ratio, ethics) with best practice comparison; each pillar has current status, targets, and timeline; the presentation is aligned with SASB and TCFD frameworks; the overall deck would satisfy institutional investors with ESG mandates."
    weight: 0.35
    description: "ComprehensiveESG"
  - type: llm_judge
    criteria: "Response addresses the strategic dimensions of ESG — presents the 3-year ESG strategy with specific, measurable targets; addresses the shareholder proposals with analysis and board recommendation; discusses the ESG rating improvement path (MSCI A→AA, CDP B→A); connects ESG performance to business value (customer requirements, talent attraction, risk mitigation); addresses the investor engagement on ESG with specific shareholder positions; the deck demonstrates that ESG is a strategic priority, not a compliance checkbox."
    weight: 0.35
    description: "ESGStrategy"
  - type: llm_judge
    criteria: "Response handles the ESG reporting frameworks with sophistication — maps metrics to SASB Software & IT Services standards; addresses TCFD climate risk assessment (physical risks to data centers from extreme weather, transition risks from carbon pricing); discusses SBTi commitment and validation process; addresses Scope 3 emissions estimation methodology and limitations; the reporting is credible and honest about where the company is strong (PUE, zero landfill) and where it needs improvement (renewable energy gap, diversity targets, Scope 3); the deck would withstand scrutiny from ESG analysts and proxy advisory firms."
    weight: 0.30
    description: "FrameworkSophistication"
