meta:
  id: pre-ipo-board-package
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a pre-IPO board package with public-company-quality reporting — GAAP/non-GAAP reconciliation, SOX readiness assessment, committee reports, and governance disclosures for a company 6 months from IPO"
  tags: [pre-ipo, public-company, sox, expert]

state: {}

trigger: |
  You're the CFO of a late-stage SaaS company ($180M
  ARR, $2.2B last-round valuation, 1,400 employees)
  that has confidentially filed its S-1 and expects to
  go public in approximately 6 months. The board now
  requires public-company-quality board packages.

  Board composition (9 members):
  - CEO/Founder (Board Chair)
  - CFO (you, Board member)
  - President/COO (Board member)
  - Lead independent director (former Fortune 500 CEO)
  - Series D lead partner (Board member)
  - Series C lead partner (Board member)
  - Independent director 1 (former SEC Commissioner)
  - Independent director 2 (former CTO at Microsoft)
  - Independent director 3 (CEO of a public SaaS co.)

  Board committees:
  - Audit Committee: Lead independent, former SEC
    Commissioner, Independent 3 (Chair)
  - Compensation Committee: Lead independent (Chair),
    Series C lead, Independent 2
  - Nominating & Governance: Lead independent, former
    SEC Commissioner (Chair), Independent 2

  Q4 financial results:
  - Revenue: $48.2M (GAAP), $49.8M (adjusted for
    contract modification impact)
  - ARR: $180M → $195M (+8.3% QoQ, +52% YoY)
  - Non-GAAP operating income: $4.8M (2.5% margin)
  - GAAP operating loss: -$12.3M (stock comp: $14.2M,
    IPO-related costs: $2.9M)
  - Free cash flow: $6.2M (FCF positive for 3rd
    consecutive quarter)
  - RPO: $285M (+38% YoY)
  - DBNRR: 128%
  - Customers >$100K ACV: 220 (+45% YoY)
  - Rule of 40: 54.5 (52% growth + 2.5% non-GAAP
    margin)

  IPO readiness items:
  - SOX 404 readiness: 85% complete; 3 material
    weaknesses identified and being remediated
  - PCAOB audit: In progress with Deloitte
  - SEC comments: First round received; 12 comments,
    mostly on revenue recognition and non-GAAP
    reconciliation
  - D&O insurance: Quotes received ($40M tower)
  - Board independence: Need to add 1 more independent
    director before listing

  Task: Create the full pre-IPO board package
  including: executive summary, GAAP/non-GAAP financial
  presentation with reconciliation, audit committee
  report (SOX readiness, material weaknesses),
  compensation committee report (IPO equity grants),
  nominating committee report (new director search),
  IPO readiness dashboard, and strategic discussion
  items for the full board.

assertions:
  - type: llm_judge
    criteria: "Response creates a public-company-quality board package — includes GAAP/non-GAAP financial presentation with proper reconciliation; the audit committee section addresses SOX 404 readiness and material weakness remediation; the compensation committee section addresses IPO equity grants and executive compensation disclosure; the nominating committee section addresses the independent director search; the package quality matches what a board with a former SEC Commissioner would expect; the overall format and rigor represent the transition from private to public company governance."
    weight: 0.35
    description: "PublicCompanyQuality"
  - type: llm_judge
    criteria: "Response addresses IPO-specific governance requirements — discusses the SEC comment letter responses and their implications; addresses the SOX material weaknesses with remediation timelines; presents the D&O insurance evaluation; addresses board independence requirements for listing; discusses the quiet period and its impact on communications; the IPO readiness dashboard tracks all workstreams with status; the package would satisfy pre-IPO governance requirements for NYSE/NASDAQ listing."
    weight: 0.35
    description: "IPOGovernance"
  - type: llm_judge
    criteria: "Response demonstrates CFO-level financial sophistication — the GAAP/non-GAAP reconciliation is presented correctly (identifying stock comp, IPO costs, and contract modifications); RPO, DBNRR, and Rule of 40 are presented as key SaaS metrics; FCF is highlighted as an important milestone; the financial narrative would be consistent with what would appear in the S-1; the committee reports follow proper governance protocols; the overall package demonstrates the financial and governance maturity needed for a public company."
    weight: 0.30
    description: "FinancialSophistication"
