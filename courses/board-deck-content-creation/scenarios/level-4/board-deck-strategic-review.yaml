meta:
  id: board-deck-strategic-review
  level: 4
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive strategic review board deck for a company at a crossroads — evaluating whether to remain independent, pursue a strategic sale, take the company public, or execute a leveraged recapitalization"
  tags: [strategic-review, options-analysis, crossroads, expert]

state: {}

trigger: |
  You're the CFO of a late-stage B2B software company
  ($65M ARR, $520M last-round valuation, 420 employees)
  that is at a strategic crossroads. The board has
  authorized a comprehensive strategic review with
  Goldman Sachs as financial advisor. You need to
  prepare the board deck presenting all strategic
  alternatives.

  Company profile:
  - Vertical: Enterprise resource planning for mid-
    market food and beverage manufacturers
  - ARR: $65M, growing 32% YoY
  - Gross margin: 78%
  - EBITDA margin: 12% (and improving)
  - Rule of 40: 44
  - $120M total raised across 4 rounds
  - Strong market position: #2 in vertical, behind
    only SAP's food manufacturing module
  - Customer base: 850 companies, <1% churn, 122% NRR

  Strategic alternatives:

  1. Remain independent (status quo):
     - Continue scaling; target $100M ARR by end of
       next year
     - Need to raise $30-40M to fund growth
     - Risk: Market consolidation happening; 3
       competitors acquired in last 18 months
     - Upside: $1-2B company in 3-5 years if execution
       continues

  2. IPO:
     - Bankers estimate $800M-$1.2B IPO valuation
       (12-18x ARR)
     - Timeline: 12-18 months to IPO readiness
     - Risk: Public market volatility; SaaS multiples
       compressed
     - Requirements: 2 more independent directors,
       SOX compliance, CFO upgrade (you may not be the
       right profile for a public company CFO)

  3. Strategic sale:
     - 3 potential acquirers identified by Goldman:
       * Oracle: $900M-$1.1B (strategic fit with
         Oracle Cloud ERP; would become their food
         vertical solution)
       * Infor (Koch Industries): $750-900M (direct
         competitor; combination creates market leader)
       * SAP: Informal interest at ~$1B (would
         strengthen their food manufacturing position)
     - Timeline: 4-6 month process
     - Risk: Integration uncertainty; team retention

  4. Leveraged recapitalization (PE buyout):
     - Silver Lake and Vista Equity have expressed
       interest
     - Estimated valuation: $650-800M (lower than
       strategic, but includes management rollover)
     - Structure: 50-60% leverage; management rolls
       25-40% of proceeds
     - Timeline: 3-4 months to close
     - Risk: Debt burden limits growth investment

  Board dynamics:
  - Series D lead (owns 22%): Wants liquidity; fund
    is approaching end of life
  - Series C lead (owns 15%): Prefers strategic sale
    at premium
  - Series A/B investors (combined 18%): Mixed; some
    want IPO upside, some want near-term exit
  - Management and employees (45%): Want growth
    opportunity but also liquidity for early employees

  Task: Create the comprehensive strategic review
  board deck — presenting each alternative with
  detailed financial analysis, risk assessment,
  stakeholder impact, and a recommendation framework
  for the board to evaluate all options.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive strategic review deck — presents all 4 alternatives (independent, IPO, strategic sale, PE buyout) with consistent analytical framework; includes financial analysis for each (valuation range, return analysis by investor class, timeline, transaction costs); addresses the Goldman Sachs process and methodology; the deck is structured for a multi-session board review (not a single meeting decision); the overall quality matches what a board with a Goldman Sachs financial advisor would expect."
    weight: 0.35
    description: "StrategicReviewFramework"
  - type: llm_judge
    criteria: "Response addresses stakeholder impact analysis for each alternative — shows return multiples for each investor class under each scenario; addresses management and employee outcomes (retention, liquidity, equity treatment); discusses customer impact (strategic sale may disrupt relationships); addresses the Series D fund lifecycle pressure honestly; the analysis acknowledges that different stakeholders have legitimately different preferences; the board can see how each alternative serves different constituencies."
    weight: 0.35
    description: "StakeholderImpact"
  - type: llm_judge
    criteria: "Response provides a decision framework and recommendation process — includes criteria for evaluating alternatives (valuation, certainty, timeline, team impact, customer impact, long-term value); presents a recommended process for narrowing options (which to pursue in parallel, which to eliminate); addresses the CFO's honest self-assessment about public company readiness; the overall deck facilitates a structured board decision process rather than a single-meeting vote; the recommendation framework would survive scrutiny from minority shareholders."
    weight: 0.30
    description: "DecisionFramework"
