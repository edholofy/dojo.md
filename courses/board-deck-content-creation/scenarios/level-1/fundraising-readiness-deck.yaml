meta:
  id: fundraising-readiness-deck
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create a board deck section discussing Series A fundraising readiness with the board, including timeline, target metrics, and preparation steps"
  tags: [fundraising, series-a, readiness, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage SaaS startup building
  workflow automation for accounting firms ($1.1M
  raised, 11 employees, 14 months post-launch). You're
  planning to raise a Series A in 6 months and want to
  use the next board meeting to discuss readiness.

  Current metrics:
  - ARR: $720K (growing 12% MoM)
  - Customers: 45 accounting firms
  - NRR: 118%
  - Gross margin: 82%
  - Burn: $78K/month
  - Cash: $390K
  - Runway: 5 months at current burn

  Series A benchmarks (from your research):
  - Typical Series A SaaS metrics: $1-2M ARR, 15%+
    MoM growth, <5% monthly churn, strong unit economics
  - Your projected ARR at fundraise start: ~$1.2M ARR
    (at 12% MoM growth)
  - Target raise: $5-8M at $25-35M pre-money

  Preparation tasks:
  - Data room: Need to assemble (financials, cap table,
    customer list, contracts, IP)
  - Pitch deck: Draft started, needs refinement
  - Target investors: List of 40 VCs compiled; 12
    with relevant portfolio companies
  - References: Need to prepare 5-7 customer references
  - Metrics package: Need to build standardized
    metrics package

  Board input needed:
  - Fundraising strategy (lead with product demo vs
    metrics story?)
  - Target investor prioritization (which of the 40?)
  - Valuation expectations
  - Timeline optimization (your runway is tight)

  Your board: CEO + seed investor (Board seat) +
  independent advisor (Board seat)

  Task: Create the fundraising readiness section of
  your board deck — presenting current metrics vs
  Series A benchmarks, the preparation timeline,
  specific board input needed, and risk factors
  (especially the tight runway).

assertions:
  - type: llm_judge
    criteria: "Response creates a clear fundraising readiness assessment — compares current metrics against Series A benchmarks with honest gap analysis; projects where metrics will be at fundraise start; presents the preparation timeline with specific milestones (data room, pitch deck, investor targeting); the format helps the board evaluate readiness and provide specific input; the runway concern (5 months) is flagged prominently as a constraint on timing."
    weight: 0.35
    description: "ReadinessAssessment"
  - type: llm_judge
    criteria: "Response frames specific board discussion items — presents the strategy question (product demo vs metrics story) with trade-offs; asks for help prioritizing the investor list; raises valuation expectations for discussion; addresses the timeline risk (tight runway means less room for a slow fundraise); each discussion item has enough context for the board to provide informed input."
    weight: 0.35
    description: "BoardDiscussion"
  - type: llm_judge
    criteria: "Response addresses the runway constraint realistically — discusses the scenario where the fundraise takes longer than expected; presents contingency options (bridge round, expense reduction, revenue acceleration); the preparation checklist is practical and prioritized; the overall section demonstrates CEO preparedness and self-awareness about the fundraising challenge ahead."
    weight: 0.30
    description: "RunwayAndContingency"
