meta:
  id: first-deck-shift
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create multiple board-related documents simultaneously — a full quarterly board deck, a pre-read executive summary email, and a post-meeting action items memo for a seed-stage startup"
  tags: [multi-document, board-meeting, pre-read, beginner, shift-simulation]

state: {}

trigger: |
  You're the CEO of a seed-stage startup building an
  AI-powered resume screening tool for staffing agencies
  ($850K raised, 8 employees, 9 months post-launch).
  You need to prepare three documents for your upcoming
  Q3 board meeting.

  Company status:
  - MRR: $14K (from 18 customers)
  - Growth: 18% MoM average
  - Churn: 2 customers lost this quarter (both very
    small agencies, <5 employees)
  - Pipeline: 22 active opportunities
  - Burn: $68K/month
  - Cash: $380K
  - Runway: 5.6 months
  - Team: 8 (4 engineering, 1 sales, 1 CS, 1 product
    manager, 1 CEO)
  - Product: V2.0 launched — added bias detection
    feature (regulatory driver); 78% adoption by
    existing customers
  - Key win: Partnership with 2nd largest staffing
    association (NAPS — 1,200 member agencies) for
    co-marketing
  - Key concern: 2 competitors raised Series A rounds
    ($6M and $8M respectively)

  Your board: CEO + seed investor (Board seat) +
  advisor (Board observer)

  Board meeting logistics:
  - 90-minute meeting next Thursday
  - Seed investor has requested materials 3 days
    in advance
  - Advisor wants a brief email summary she can read
    on her phone before the meeting

  Task: Create three documents:
  1. The full quarterly board deck content (covering
     all standard sections — exec summary, metrics,
     product, GTM, team, financials, asks)
  2. A pre-read email to board members highlighting
     the 3-4 key topics for discussion (the advisor
     can read this on her phone)
  3. A post-meeting action items template with the
     key decisions needed and follow-up owners

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct documents appropriate for their purposes — the full board deck covers all standard sections with appropriate depth; the pre-read email is concise and mobile-friendly (highlights 3-4 key discussion topics without duplicating the full deck); the action items template identifies key decisions needed and has a clear format for capturing follow-ups; each document serves its purpose without redundancy; the three documents together show a CEO who is organized and respects board members' time."
    weight: 0.35
    description: "ThreeDocumentSystem"
  - type: llm_judge
    criteria: "Response addresses the key issues in each document — the NAPS partnership is highlighted as a major win; the competitive funding rounds are addressed honestly; the runway situation (5.6 months) is flagged with appropriate urgency; the bias detection feature adoption (78%) is presented as a product-market fit signal; the pre-read email prioritizes the most important topics for discussion; the action items template focuses on decisions that need to be made (fundraising timing, competitive response, hiring)."
    weight: 0.35
    description: "KeyIssuesCoverage"
  - type: llm_judge
    criteria: "Response creates a cohesive board meeting package — the three documents work together as a system (pre-read primes the discussion, deck provides the detail, action items capture the outcomes); the presentation format is appropriate for a 90-minute meeting; the investor's 3-day advance distribution request is acknowledged; the advisor's mobile-friendly preference is addressed in the pre-read format; the overall package demonstrates board meeting best practices for an early-stage company."
    weight: 0.30
    description: "CohesivePackage"
