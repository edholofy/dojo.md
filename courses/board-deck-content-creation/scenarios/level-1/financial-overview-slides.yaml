meta:
  id: financial-overview-slides
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the financial overview section of a board deck for an early-stage startup, covering burn rate, runway, and simple P&L"
  tags: [financial, burn-rate, runway, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage B2B SaaS startup that
  builds scheduling software for veterinary clinics
  ($900K raised, 10 employees, 8 months post-launch).
  Your board meeting is next week and you need to
  prepare the financial overview section.

  Financial data for Q3:
  - Revenue: $32K/month (MRR, up from $24K in Q2)
  - COGS: $4.2K/month (AWS hosting, third-party APIs)
  - Gross margin: 86.9%
  - Operating expenses breakdown:
    * Salaries & benefits: $72K/month (10 employees)
    * Office & equipment: $4K/month
    * Software & tools: $3.5K/month
    * Sales & marketing: $8K/month
    * Legal & accounting: $2K/month
    * Miscellaneous: $1.5K/month
  - Total OpEx: $91K/month
  - Net burn: $63.2K/month ($91K - $27.8K gross profit)
  - Cash balance: $520K
  - Runway: 8.2 months at current burn

  Budget vs actual (Q3):
  - Revenue: $32K actual vs $28K budget (+14%)
  - Total OpEx: $91K actual vs $88K budget (+3.4%)
  - Net burn: $63.2K actual vs $64.2K budget (-1.5%,
    better than plan due to higher revenue)

  Key financial items for discussion:
  - Need to hire 2 engineers in Q4 (will increase burn
    to ~$85K/month)
  - Series A fundraise should begin in Q1 (need 6
    months of runway when starting, so timing is tight)
  - One large customer ($3K/month) is 60 days overdue
    on payment

  Your board: CEO + seed investor (Board seat) +
  advisor (Board observer, fractional CFO background)

  Task: Create the financial overview section of your
  board deck — including a clear P&L summary, burn
  rate analysis, runway projection, budget vs actual
  comparison, and flagging the key financial items
  for board discussion.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear financial overview with all essential components — includes a simple P&L or income statement format (revenue, COGS, gross margin, operating expenses by category, net burn); presents the burn rate analysis with monthly trends; shows runway calculation and projection; includes budget vs actual comparison with variance explanations; the financial data is presented accurately and clearly; the format is appropriate for a board presentation (not an accounting report)."
    weight: 0.35
    description: "FinancialPresentation"
  - type: llm_judge
    criteria: "Response contextualizes the financial data for strategic decision-making — flags the runway situation in context of hiring plans (2 engineers increasing burn to $85K) and Series A timing (need 6 months runway when starting); addresses the overdue payment ($3K, 60 days) appropriately; presents the budget vs actual favorably but honestly; connects the financial trajectory to the company's strategic milestones; the board can make informed decisions about hiring pace and fundraising timing based on this presentation."
    weight: 0.35
    description: "StrategicContext"
  - type: llm_judge
    criteria: "Response is appropriately detailed for a seed-stage financial overview — doesn't over-complicate with metrics the company doesn't need yet (no EBITDA adjustments, no complex unit economics); presents the gross margin (86.9%) as a positive signal; the expense breakdown is at the right level of detail for a 10-person company; includes forward-looking projections (Q4 burn with hires, runway impact); the overall section would satisfy a board member with CFO background while remaining accessible to all board members."
    weight: 0.30
    description: "StageAppropriateness"
