meta:
  id: customer-success-slides
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the customer success section of a board deck showcasing early customer wins, testimonials, and usage data"
  tags: [customer-success, retention, usage-data, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage startup building a
  project management tool for construction companies
  ($1M raised, 9 employees, 10 months post-launch).
  Your board wants to see a dedicated customer success
  section in the next board deck.

  Customer metrics:
  - Total customers: 34
  - Monthly churn: 3.2% (lost 3 customers this quarter)
  - NPS: 48 (surveyed 28 customers)
  - Logo retention: 90.4% quarterly
  - Net revenue retention: 108% (expansion from users
    adding team members)
  - Average seats per customer: 8.2 (up from 6.4 last
    quarter)
  - Daily active users: 62% of total seats
  - Weekly active users: 84% of total seats
  - Support tickets: Average 2.1 per customer per month
  - First response time: 4.2 hours (target: 4 hours)

  Customer wins this quarter:
  - Largest customer signed: Martinez Construction
    ($2.8K/month, 45 seats) — biggest general
    contractor in region; replaced Procore
  - Case study: Thompson Builders reduced project
    delays by 22% and saved 6 hours/week on admin
    per project manager after implementing your tool
  - Expansion: 8 customers added seats this quarter
    (average 3.4 new seats each)

  Churn analysis:
  - Customer A: Went out of business (not product-
    related)
  - Customer B: Too small, reverted to spreadsheets
    (1 seat)
  - Customer C: Feature gap — needed integrated
    estimating (major feature request from 6 other
    customers too)

  Customer feedback themes:
  - Love: Mobile app for field teams, real-time project
    tracking, photo documentation
  - Want: Integrated estimating/bidding, subcontractor
    portal, QuickBooks integration
  - Concern: Occasional slow loading for large projects
    (50+ tasks)

  Your board: CEO + seed investor (Board seat) +
  advisor (Board observer, 20 years in construction
  tech)

  Task: Create the customer success section of your
  board deck — covering retention metrics, customer
  wins, usage data, churn analysis, and product
  feedback themes.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear customer success section with key retention and usage metrics — presents logo retention, NPS, net revenue retention, DAU/WAU rates, and support responsiveness; the Martinez Construction win is highlighted with context (replaced Procore, largest in region); the Thompson Builders case study is presented with quantified outcomes (22% delay reduction, 6 hours/week saved); seat expansion is shown as a positive engagement signal; the metrics paint a picture of product-market fit and customer health."
    weight: 0.35
    description: "CustomerMetrics"
  - type: llm_judge
    criteria: "Response presents churn analysis and feedback with appropriate honesty — categorizes the 3 churned customers with context (out of business, too small, feature gap); connects the feature gap churn to the broader feedback theme (estimating/bidding requested by 6+ customers); presents customer feedback themes in a balanced way (loves, wants, concerns); the performance concern (slow loading for large projects) is acknowledged; the overall section doesn't cherry-pick only positive signals."
    weight: 0.35
    description: "ChurnAndFeedback"
  - type: llm_judge
    criteria: "Response connects customer success data to product and business strategy — the feature request pattern (estimating/bidding) is presented as a strategic input for the product roadmap; the seat expansion trend supports the growth narrative; the advisor's construction tech expertise is leveraged through specific asks; the section supports a board discussion about product priorities, expansion strategy, and customer segmentation."
    weight: 0.30
    description: "StrategicImplications"
