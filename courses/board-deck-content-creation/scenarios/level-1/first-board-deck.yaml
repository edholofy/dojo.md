meta:
  id: first-board-deck
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create a first-ever board deck for a seed-stage startup's inaugural formal board meeting with newly appointed board members"
  tags: [first-deck, seed-stage, board-meeting, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage SaaS startup that
  builds employee onboarding software for mid-market
  companies ($1.2M raised, 8 employees, 6 months post-
  launch). You've just closed your seed round with two
  investors who each took a board seat, and you need
  to prepare your first formal board deck for the
  inaugural board meeting.

  Your board:
  - You (CEO, Board seat)
  - Sarah Chen (Seed investor, Board seat) — former VP
    Product at Workday, wants to see product-market fit
    signals
  - James Rodriguez (Angel syndicate lead, Board seat)
    — serial entrepreneur, wants to see capital
    efficiency

  Company metrics:
  - MRR: $18K (from 12 paying customers)
  - Growth: 22% MoM average over last 3 months
  - Churn: 1 customer lost (freelancer, wrong segment)
  - Pipeline: 28 demos scheduled this month
  - Burn: $85K/month
  - Runway: 14 months
  - Team: 8 (3 engineering, 2 sales, 1 CS, 1 product,
    1 CEO)
  - Product: Core platform live; 3 key features in
    development (workflow builder, integrations, analytics)
  - NPS: 52 (from 11 respondents)

  You've never created a board deck before. Your lead
  investor Sarah has mentioned that she prefers "concise
  decks that lead with what matters and don't hide
  problems behind data."

  Task: Create your first board deck content — covering
  business overview, key metrics, product update,
  go-to-market progress, team update, financial
  summary, and key asks/discussion items for the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a well-structured first board deck with appropriate sections — includes an executive summary or key highlights slide, business metrics dashboard (MRR, growth, churn, pipeline), product development update (features in development, roadmap priorities), go-to-market update (customer acquisition, sales pipeline), team status, financial overview (burn, runway, cash position), and strategic discussion items/asks; the deck follows a logical flow from performance to plans; the format is appropriate for a seed-stage company (not over-engineered or trying to look like a later-stage company)."
    weight: 0.35
    description: "BoardDeckStructure"
  - type: llm_judge
    criteria: "Response presents metrics and data appropriately for a seed-stage company — uses the right level of detail for the stage (MRR, MoM growth, churn, pipeline, burn, runway); doesn't fabricate sophisticated metrics that a 6-month-old company wouldn't have; presents the single churn event honestly with context (wrong segment); includes forward-looking elements (pipeline, product roadmap) without over-promising; the NPS score is presented with appropriate caveats (small sample size); the financial summary is clear about burn rate and runway; the overall data presentation would satisfy both a product-focused board member (Sarah) and a capital-efficiency-focused member (James)."
    weight: 0.35
    description: "StageAppropriateMetrics"
  - type: llm_judge
    criteria: "Response includes meaningful board discussion items and asks — doesn't just report data but prepares strategic questions for the board (e.g., market segment focus, hiring priorities, feature prioritization); includes specific asks of board members (introductions, advice, decisions needed); follows Sarah's preference for conciseness and honesty; the deck would facilitate a productive 60-90 minute board meeting; the tone is professional but not overly formal for a seed-stage company; the overall deck demonstrates CEO preparedness and self-awareness about what the company knows and doesn't know."
    weight: 0.30
    description: "DiscussionAndAsks"
