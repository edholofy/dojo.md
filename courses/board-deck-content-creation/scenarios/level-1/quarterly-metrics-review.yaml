meta:
  id: quarterly-metrics-review
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create a quarterly board deck focused on metrics and KPIs for a seed-stage startup with straightforward growth"
  tags: [quarterly, metrics, kpis, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage marketplace connecting
  local fitness instructors with clients ($800K raised,
  6 employees). You're preparing your Q2 board deck —
  your third quarterly board meeting. The business is
  growing steadily and there are no major issues.

  Q2 metrics:
  - GMV: $245K (Q1: $180K, +36% QoQ)
  - Net revenue (15% take rate): $36.7K
  - Active instructors (supply): 142 (Q1: 108, +31%)
  - Active clients (demand): 890 (Q1: 620, +44%)
  - Bookings: 3,200 (Q1: 2,100, +52%)
  - Average booking value: $76.50
  - Instructor retention: 88% monthly
  - Client retention: 62% monthly
  - Repeat booking rate: 45%
  - Burn: $52K/month
  - Cash: $480K
  - Runway: 9.2 months

  Product updates:
  - Launched mobile app (iOS) — 340 downloads in first
    month, 28% of bookings now mobile
  - Added group classes feature (instructor-requested)
  - Payment processing switched from Stripe Connect to
    custom solution (saving 0.8% per transaction)

  Your board: CEO + seed investor (Board seat) +
  independent advisor (Board observer)

  Task: Create the Q2 quarterly board deck content with
  a clear metrics dashboard, quarter-over-quarter
  comparisons, and a straightforward update on product
  and business progress.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear quarterly metrics dashboard — presents all key marketplace metrics (GMV, net revenue, supply/demand counts, bookings, average booking value) with QoQ comparisons; includes retention metrics for both sides of the marketplace (instructor 88%, client 62%); presents the repeat booking rate as a key engagement indicator; financial metrics are clear (burn, cash, runway); the dashboard format makes trends immediately visible; the metrics tell a coherent story about marketplace health and growth trajectory."
    weight: 0.35
    description: "MetricsDashboard"
  - type: llm_judge
    criteria: "Response presents product and business updates in context — the mobile app launch is presented with early adoption data (340 downloads, 28% of bookings); group classes feature tied to instructor feedback (demand-driven development); the payment processing change is presented as an operational efficiency gain; QoQ growth rates are calculated correctly and presented clearly; the update acknowledges what's going well without being complacent; includes forward-looking priorities for Q3."
    weight: 0.35
    description: "ContextualUpdates"
  - type: llm_judge
    criteria: "Response is appropriately concise for a seed-stage quarterly with no major issues — doesn't over-elaborate on straightforward growth; includes brief discussion items for the board meeting; the deck would support a focused 45-60 minute board meeting; the runway (9.2 months) is flagged appropriately as something to discuss (fundraising timing); the overall presentation is professional but proportional to the company's stage and the simplicity of the quarter's story."
    weight: 0.30
    description: "AppropriateScope"
