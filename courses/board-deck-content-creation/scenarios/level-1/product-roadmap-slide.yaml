meta:
  id: product-roadmap-slide
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the product roadmap section of a board deck for a pre-revenue startup preparing to launch its MVP"
  tags: [product-roadmap, pre-revenue, mvp, beginner]

state: {}

trigger: |
  You're the CEO of a pre-revenue startup building an
  AI-powered contract review tool for small law firms
  ($600K raised in a pre-seed round, 5 employees — 3
  engineers, 1 designer, 1 CEO). You're 2 months from
  MVP launch and your board wants to see the product
  roadmap at the next meeting.

  Product status:
  - MVP (Month 0-4, currently Month 2): Core contract
    review engine — upload a contract, AI identifies
    key clauses, flags risks, suggests edits. Currently
    in private alpha with 5 law firms.
  - Alpha feedback: Lawyers love the risk-flagging
    feature but want better handling of non-standard
    clause language and support for contract types
    beyond NDAs (currently NDA-only).
  - V1.1 (Month 5-7): Expand to 3 contract types
    (NDAs, service agreements, employment contracts);
    improve non-standard clause handling; add
    comparison feature (compare against firm's standard
    templates).
  - V1.2 (Month 8-10): Collaboration features (share
    reviews between attorneys), bulk upload, basic
    analytics dashboard.
  - V2.0 (Month 11-14): Full contract lifecycle
    management (draft → review → negotiate → sign →
    store); integration with Clio and MyCase (top
    legal practice management tools).

  Technical decisions for board discussion:
  - Build on GPT-4 API vs fine-tune open-source model
    (currently using GPT-4; cost is $0.42 per contract
    review; would need to decrease for unit economics
    at scale)
  - Data privacy: Law firms require SOC 2 compliance
    by V1.1 — estimated $40K and 3 months to certify

  Your board: CEO + pre-seed investor (Board seat) +
  advisor (former GC at a legal tech company)

  Task: Create the product roadmap section of your
  board deck — clearly presenting the development
  timeline, alpha feedback, upcoming milestones, key
  technical decisions, and what input you need from
  the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear product roadmap presentation — organizes the roadmap by phase (MVP, V1.1, V1.2, V2.0) with timelines and key features for each; presents the alpha feedback as actionable input that shapes the roadmap (non-standard clauses, contract type expansion); the roadmap shows a logical progression from core review to broader contract lifecycle; technical dependencies and milestones are clear; the visual/content format would work as slides in a board presentation."
    weight: 0.35
    description: "RoadmapClarity"
  - type: llm_judge
    criteria: "Response presents the technical decisions and trade-offs for board discussion — frames the GPT-4 vs open-source model decision with clear trade-offs (cost per review, accuracy, data privacy, control); presents the SOC 2 compliance requirement with cost and timeline implications; these decisions are presented as genuine board discussion items, not as fait accompli; the technical content is accessible to non-technical board members; the advisory board member's legal tech expertise is leveraged appropriately."
    weight: 0.35
    description: "TechnicalDecisions"
  - type: llm_judge
    criteria: "Response connects the product roadmap to business outcomes — ties feature development to customer acquisition and revenue potential; presents the alpha feedback as validation (or signals to adjust); addresses how the roadmap supports fundraising timeline (what milestones matter for Series A); the roadmap is realistic for a 5-person team; the presentation would facilitate a productive board discussion about priorities and resource allocation."
    weight: 0.30
    description: "BusinessConnection"
