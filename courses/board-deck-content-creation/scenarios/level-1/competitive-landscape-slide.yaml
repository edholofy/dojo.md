meta:
  id: competitive-landscape-slide
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the competitive landscape section of a board deck for a seed-stage startup positioning itself against established incumbents"
  tags: [competitive, market-positioning, landscape, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage startup building an
  AI-powered bookkeeping tool for freelancers and
  solopreneurs ($500K raised, 5 employees). Your board
  has asked you to include a competitive landscape
  analysis in the next board deck.

  Your product:
  - AI auto-categorizes transactions (92% accuracy)
  - Connects to bank accounts and credit cards
  - Generates tax-ready profit/loss statements
  - Pricing: $19/month (vs $30-55 for competitors)
  - Target: Freelancers earning $50K-250K/year
  - Current: 480 users, 120 paying ($2,280 MRR)

  Competitive landscape:
  1. QuickBooks Self-Employed (Intuit):
     - Market leader, massive brand recognition
     - $30/month; includes tax features
     - Weakness: Overly complex for freelancers;
       designed for small businesses, not solopreneurs
     - Threat level: High (brand, distribution)

  2. FreshBooks:
     - Strong in invoicing and client management
     - $34/month for equivalent features
     - Weakness: Bookkeeping/categorization is manual
     - Threat level: Medium (different core strength)

  3. Wave (acquired by H&R Block):
     - Free accounting software
     - Revenue from payments and payroll
     - Weakness: No AI categorization; limited
       reporting; reliability concerns post-acquisition
     - Threat level: Medium (free is hard to compete
       with on price)

  4. Bench:
     - Human bookkeepers + software
     - $299/month (different price tier)
     - Weakness: Expensive; not self-service
     - Threat level: Low (different market segment)

  5. Emerging competitors:
     - 2-3 other AI bookkeeping startups at similar
       stage; none have significant traction yet
     - Keeper Tax: Tax-focused, $16/month, strong
       marketing

  Your differentiation:
  - AI-first approach (92% auto-categorization vs
    manual categorization in most competitors)
  - Designed specifically for freelancers (not
    down-marketed small business software)
  - Lowest price point for a premium product
  - 3-minute monthly close (vs hours for competitors)

  Your board: CEO + pre-seed investor (Board seat) +
  advisor (Board observer, former Intuit product lead)

  Task: Create the competitive landscape section of
  your board deck — presenting the market positioning,
  key competitors, your differentiation, and strategic
  implications.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear competitive landscape presentation — positions each competitor with honest assessment (strengths, weaknesses, threat level); doesn't dismiss competitors or overstate your own advantages; presents the differentiation clearly (AI-first, freelancer-specific, lower price, faster close); the format works for a board presentation (matrix, chart, or structured comparison); the analysis shows the CEO understands the competitive dynamics, not just the feature comparison."
    weight: 0.35
    description: "CompetitiveAnalysis"
  - type: llm_judge
    criteria: "Response addresses strategic implications of the competitive landscape — discusses the free competitor challenge (Wave); addresses the brand/distribution advantage of QuickBooks; presents the emerging competitor landscape honestly; discusses defensive moat (AI accuracy, data network effects, freelancer focus); identifies potential competitive threats and how to respond; the analysis is forward-looking, not just a snapshot."
    weight: 0.35
    description: "StrategicImplications"
  - type: llm_judge
    criteria: "Response leverages the board's expertise — acknowledges the advisor's Intuit background and frames competitive questions appropriately; asks the board for specific input on competitive strategy; the competitive section supports a productive discussion about market positioning and go-to-market approach; the overall analysis is proportional to the company's stage (doesn't over-invest in competitive analysis for a 5-person startup)."
    weight: 0.30
    description: "BoardEngagement"
