meta:
  id: team-and-hiring-update
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the team and hiring section of a board deck for a growing seed-stage startup making its first key hires"
  tags: [team, hiring, org-chart, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage edtech startup
  building an AI tutoring platform for high school
  math ($1.5M raised, 14 employees). Your company has
  grown from 6 to 14 people in the last quarter, and
  the board wants a detailed team update at the next
  meeting.

  Current team (14):
  - Engineering (7): VP Engineering (hired 2 months
    ago, ex-Duolingo), 4 software engineers, 1 ML
    engineer, 1 QA
  - Product (2): Head of Product (co-founder), 1
    product designer
  - Go-to-Market (3): Head of Sales (hired 1 month
    ago, ex-Clever), 1 SDR, 1 marketing coordinator
  - Operations (2): CEO (co-founder), 1 office manager
    /executive assistant

  Recent hires (last quarter):
  - VP Engineering: Sarah Kim, 12 years at Duolingo
    and Khan Academy; reporting to CEO; took 3 months
    to recruit (turned down offers from 2 other
    startups)
  - Head of Sales: Marcus Johnson, 8 years at Clever
    and ClassDojo; building the sales motion from
    scratch
  - 2 software engineers: Both strong hires from
    coding bootcamps; ramping well
  - 1 SDR: First outbound sales hire

  Open roles (Q4 hiring plan):
  - Senior ML Engineer: Critical for next-gen tutoring
    model; posting for 6 weeks, 3 final candidates
  - Customer Success Manager: First CS hire; needed
    as school district pilot expands
  - Content Specialist: Need someone to build math
    curriculum content for the AI

  Team challenges:
  - Engineering team is adjusting to having a VP (used
    to report directly to CEO)
  - Sales team is brand new — no established process
    or metrics yet
  - Compensation: 2 early engineers asking about equity
    refresh as team grows

  Your board: CEO + 2 board members (seed investors)

  Task: Create the team and hiring section of your
  board deck — covering the current org structure, key
  hires, Q4 hiring plan, team challenges, and what
  support you need from the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear team section with org structure and key hires — presents the current team by function with appropriate detail; highlights the VP Engineering and Head of Sales hires with relevant background; shows the growth trajectory (6 to 14); presents the org chart or structure in a way that shows reporting lines; the Q4 hiring plan is presented with clear priorities and status (ML Engineer in pipeline, CS Manager and Content Specialist to start); the team section tells a story about the company building its core capabilities."
    weight: 0.35
    description: "TeamPresentation"
  - type: llm_judge
    criteria: "Response addresses team challenges honestly and constructively — discusses the engineering team's adjustment to new VP leadership as a normal growing pain; acknowledges the sales team is brand new without established processes; addresses the equity refresh concern from early engineers (compensation as a retention and fairness issue); each challenge is presented with context and suggested approach; the board can provide input on these challenges."
    weight: 0.35
    description: "ChallengesAndTransparency"
  - type: llm_judge
    criteria: "Response connects hiring to business strategy and asks the board for specific help — ties the ML Engineer hire to product roadmap; ties CS Manager to school district expansion; ties Content Specialist to curriculum quality; asks board members for specific recruiting help (referrals, introductions); discusses hiring velocity and burn rate implications; the overall section demonstrates that the CEO is building a team strategically, not just filling seats."
    weight: 0.30
    description: "StrategicHiring"
