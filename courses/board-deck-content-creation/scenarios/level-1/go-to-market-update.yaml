meta:
  id: go-to-market-update
  level: 1
  course: board-deck-content-creation
  type: output
  description: "Create the go-to-market section of a board deck for a seed-stage startup that recently started outbound sales"
  tags: [go-to-market, sales, pipeline, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage B2B startup that
  builds compliance training software for restaurants
  ($700K raised, 7 employees). You started outbound
  sales 3 months ago and your board wants to see the
  GTM progress at the next meeting.

  GTM metrics (first 3 months of outbound):
  - Outbound emails sent: 2,400
  - Response rate: 12%
  - Demos booked: 48
  - Demos completed: 38
  - Proposals sent: 14
  - Closed won: 6 new customers
  - Closed lost: 5
  - Still in pipeline: 3
  - Average deal size: $450/month
  - Average sales cycle: 28 days
  - Win rate (from demo): 15.8%

  Customer acquisition channels:
  - Outbound (new): 6 customers ($2,700 MRR)
  - Inbound (word of mouth): 4 customers ($1,600 MRR)
  - Referral from existing customers: 2 customers
    ($800 MRR)
  - Total customers: 22 (10 pre-outbound + 12 new)
  - Total MRR: $8,200

  Reasons for closed-lost deals:
  - Price too high for small single-location restaurants
    (2 deals)
  - Chose competitor with Spanish language support (1)
  - Internal compliance training already adequate (1)
  - Went dark after proposal (1)

  ICP refinement:
  - Multi-location restaurant groups (3+ locations)
    convert at 2x the rate of single-location
  - Fast casual and quick service segments respond
    better than fine dining

  Your board: CEO + seed investor (Board seat) +
  advisor (Board observer, ex-VP Sales at Toast)

  Task: Create the go-to-market section of your board
  deck — covering sales metrics, pipeline analysis,
  ICP learnings, and what you need from the board.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive GTM section with clear sales metrics — presents the outbound funnel (emails → responses → demos → proposals → closed) with conversion rates at each stage; shows customer acquisition by channel; includes win/loss analysis with closed-lost reasons; presents average deal size and sales cycle; the metrics tell a story about early sales motion efficiency and where improvements are needed."
    weight: 0.35
    description: "SalesMetrics"
  - type: llm_judge
    criteria: "Response presents the ICP refinement insights as actionable learnings — highlights the multi-location vs single-location conversion difference; addresses the segment insights (fast casual/QSR vs fine dining); connects the closed-lost reasons to ICP adjustments (price sensitivity of small restaurants, Spanish language gap); the GTM section shows a learning-oriented sales organization; the advisor's Toast experience is leveraged through specific asks."
    weight: 0.35
    description: "ICPLearnings"
  - type: llm_judge
    criteria: "Response connects GTM progress to strategic priorities — addresses whether the sales motion is working well enough to invest more (hire another SDR, expand outbound); presents the referral channel as an organic growth signal; identifies specific asks for the board (introductions to restaurant groups, feedback on pricing, go/no-go on Spanish language support); the overall section supports a board discussion about GTM investment and strategy."
    weight: 0.30
    description: "StrategicConnection"
