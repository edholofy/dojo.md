meta:
  id: global-board-governance
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Design the board reporting framework for a global conglomerate with boards across 8 jurisdictions — navigating different governance codes, reporting requirements, and cultural communication norms"
  tags: [global-governance, multi-jurisdiction, conglomerate, master]

state: {}

trigger: |
  You're the Group General Counsel and Corporate
  Secretary of a $45B global technology conglomerate
  ("GlobalTech") listed on NYSE, with subsidiary
  boards in 8 countries. You need to design a unified
  board reporting framework that satisfies all local
  governance requirements while enabling group-level
  oversight.

  Corporate structure:
  - Parent: GlobalTech Inc. (NYSE, Delaware)
  - Board: 13 directors, 10 independent; meets
    quarterly + annual strategy offsite
  - Revenue: $45B across 4 divisions

  Subsidiary boards:
  1. UK (FTSE subsidiary, dual listing): 8 directors;
     UK Corporate Governance Code; FCA reporting;
     "comply or explain" on 40+ provisions
  2. Germany (subsidiary with Aufsichtsrat): 12-member
     supervisory board + 6-member management board;
     co-determination (6 employee representatives);
     German Corporate Governance Kodex
  3. Japan (TSE subsidiary): 15 directors; J-SOX;
     statutory auditor system (kansayaku); annual
     general meeting in June (tight timeline)
  4. India (NSE subsidiary): 12 directors; SEBI
     (LODR) regulations; mandatory woman director;
     mandatory Independent Directors' meeting
  5. Brazil (B3 subsidiary): Novo Mercado listing;
     100% tag-along rights; mandatory arbitration
     for disputes
  6. Singapore (subsidiary): 9 directors; SGX listing
     rules; Singapore Code of Corporate Governance
  7. Australia (ASX subsidiary): 8 directors; ASX
     Corporate Governance Principles; continuous
     disclosure regime
  8. UAE (DIFC subsidiary): 7 directors; DIFC
     governance principles; Sharia compliance for
     certain operations

  Cross-jurisdictional challenges:
  - Different fiscal years (Japan: March, India:
    March, others: December)
  - Different governance codes with different
    requirements (UK comply-or-explain vs US
    prescriptive vs German co-determination)
  - Different board structures (unitary vs two-tier
    vs statutory auditor)
  - Different reporting frequencies and timelines
  - Different independence definitions
  - Cultural communication norms (German boards
    expect detailed technical data; Japanese boards
    expect consensus-oriented presentation; US boards
    expect action-oriented discussion)
  - Translation requirements (materials in 6 languages)

  Regulatory matrix:
  - SOX 404 (US), J-SOX (Japan), UK SOX equivalent
    (coming), Indian Companies Act
  - Sustainability: CSRD (EU, impacting UK and Germany),
    BRSR (India), TCFD (global)
  - Data privacy: GDPR, POPIA, LGPD, APPI, DPDP Act
  - Transfer pricing and intercompany governance

  Task: Design the comprehensive global board
  reporting framework — including the group-level
  reporting structure, subsidiary board reporting
  templates by jurisdiction, cultural adaptation
  guidance, regulatory compliance matrix, and a
  sample parent board package that synthesizes
  information from all 8 subsidiary boards.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global board reporting framework — covers all 8 jurisdictions with specific governance code requirements; creates a group-level reporting structure that synthesizes subsidiary performance; addresses the fiscal year alignment challenge; provides templates adaptable to different board structures (unitary, two-tier, statutory auditor); the regulatory compliance matrix maps requirements across jurisdictions; the overall framework would satisfy a NYSE-listed parent board's need for global oversight while respecting local governance requirements."
    weight: 0.35
    description: "GlobalFramework"
  - type: llm_judge
    criteria: "Response addresses the cultural and structural differences across jurisdictions — adapts communication styles for different board cultures (German technical depth, Japanese consensus, US action-orientation); handles co-determination requirements for Germany (employee representative information needs); addresses the J-SOX and kansayaku system for Japan; navigates the UK Corporate Governance Code's comply-or-explain approach; addresses SEBI requirements for India; the framework demonstrates genuine understanding of how governance operates differently across cultures and legal systems."
    weight: 0.35
    description: "CulturalAdaptation"
  - type: llm_judge
    criteria: "Response creates a practical parent board package that synthesizes global information — presents group-level performance with division and geographic drill-down; includes a governance compliance dashboard across all jurisdictions; addresses sustainability reporting requirements (CSRD, BRSR, TCFD) in a harmonized format; handles intercompany governance and transfer pricing oversight; the sample package demonstrates how a parent board can govern a complex global organization without being overwhelmed by jurisdictional detail; the framework would serve as a best-practice reference for multinational corporate governance."
    weight: 0.30
    description: "ParentBoardPackage"
