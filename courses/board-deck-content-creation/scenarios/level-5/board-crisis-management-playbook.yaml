meta:
  id: board-crisis-management-playbook
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Create the definitive board-level crisis management playbook — covering every major crisis type with board communication templates, director briefing protocols, special committee formation guides, and governance checklists"
  tags: [crisis-playbook, board-governance, templates, master]

state: {}

trigger: |
  You're a former Lead Independent Director who has
  served on 12 boards over 25 years, including during
  5 major corporate crises (a CEO fraud investigation,
  an SEC enforcement action, a hostile takeover, a
  product liability crisis, and a company bankruptcy).
  You've been commissioned by NACD to write the
  definitive "Board Crisis Governance Playbook."

  Your experience includes:
  - CEO fraud investigation: Discovery of CEO
    embezzlement ($8M); special committee formed;
    CEO terminated for cause; SEC cooperation
  - SEC enforcement action: Revenue recognition
    investigation; $15M settlement; 3-year deferred
    prosecution agreement; independent compliance
    monitor
  - Hostile takeover: $2B unsolicited bid; poison pill
    activation; proxy contest; ultimate white knight
    acquisition at 35% premium
  - Product liability: Consumer product recall (1.2M
    units); 340 personal injury claims; $180M insurance
    claim; congressional hearing
  - Company bankruptcy: Chapter 11 filing; DIP
    financing; creditor committee negotiations; plan
    of reorganization; emergence as private company

  The playbook should cover:

  1. Crisis taxonomy for boards:
     - Financial crises (fraud, restatement, insolvency)
     - Leadership crises (misconduct, succession, death)
     - Legal/regulatory crises (investigation, SEC
       action, consent decree)
     - Operational crises (product recall, data breach,
       supply chain failure)
     - Governance crises (proxy contests, shareholder
       activism, hostile takeover)
     - Reputational crises (media scandal, social media,
       whistleblower)
     - Each with board-specific response protocols

  2. Board notification and briefing protocols:
     - When to notify: Immediately (within 24 hours)
       vs next regular meeting vs special session
     - How to brief: Phone vs email vs secure portal
       vs in-person
     - What to share: Attorney-client privileged
       information, MNPI considerations
     - Who briefs: CEO, GC, outside counsel, or
       forensic expert

  3. Special committee formation:
     - When to form (mandatory vs discretionary)
     - Composition (independence, expertise, conflicts)
     - Charter and authority
     - Counsel retention
     - Budget and timeline
     - Reporting to the full board

  4. Director liability protection:
     - Duty of care and business judgment rule during
       crisis
     - Caremark obligations (failure of oversight)
     - D&O insurance considerations
     - Personal legal counsel for directors
     - Documentation requirements (minutes, resolutions)

  5. Board communication templates by crisis type:
     - Initial notification (CEO to directors)
     - Special meeting agenda
     - Board resolution templates
     - External communication approval process
     - Post-crisis assessment framework

  Task: Write the complete Board Crisis Governance
  Playbook — comprehensive enough to serve as the
  authoritative reference for any board chair or lead
  independent director facing a crisis.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive crisis governance playbook — covers all 6 crisis categories with board-specific response protocols; the notification and briefing protocols are detailed and practical; special committee guidance includes formation criteria, charter elements, and counsel retention process; director liability protections are addressed with legal precision; templates for each crisis type are provided; the overall playbook would serve as the definitive reference for corporate directors facing crises."
    weight: 0.35
    description: "ComprehensivePlaybook"
  - type: llm_judge
    criteria: "Response demonstrates deep governance expertise from real crisis experience — draws credibly on the author's 5 crisis experiences without breaching confidentiality; the CEO fraud section reflects real special committee dynamics; the SEC enforcement section addresses cooperation strategy and settlement negotiation; the hostile takeover section covers Revlon duties and defensive measures; the product liability section addresses congressional testimony; the bankruptcy section covers DIP financing and plan of reorganization; each section reflects practitioner-level knowledge."
    weight: 0.35
    description: "PractitionerExpertise"
  - type: llm_judge
    criteria: "Response provides immediately usable templates and checklists — board notification templates can be adapted during actual crises; special meeting agendas are structured for efficiency under pressure; board resolution templates cover the legal requirements; the post-crisis assessment framework enables boards to learn from crises; the director liability checklist helps directors protect themselves while fulfilling their duties; the overall playbook balances comprehensiveness with usability — a director in crisis can find what they need quickly."
    weight: 0.30
    description: "PracticalUsability"
