meta:
  id: board-diversity-benchmarking
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Create a comprehensive annual board diversity and governance benchmarking report for the technology sector — analyzing board composition, governance practices, and communication quality across 500+ companies"
  tags: [diversity, benchmarking, governance-report, master]

state: {}

trigger: |
  You're the Executive Director of the Technology
  Governance Institute (TGI) — a nonprofit research
  organization focused on corporate governance in the
  technology sector. You're writing the 2026 Annual
  Technology Sector Governance Report, the 5th annual
  edition and the most cited governance report in tech.

  Dataset:
  - 520 technology companies analyzed:
    * 280 public companies (S&P 500 tech + mid-cap)
    * 180 late-stage private companies (Series C+)
    * 60 recently IPO'd companies (2023-2025)
  - Data sources: SEC filings, proxy statements, board
    management platform data (anonymized), company
    surveys (42% response rate)

  Key findings to present:

  1. Board composition trends:
     - Average board size: Public 10.2, Private 6.4
     - Independence: Public 82%, Private 34%
     - Women directors: Public 32% (up from 24% in
       2022), Private 18% (up from 12%)
     - Underrepresented minorities: Public 22%, Private
       11%
     - Technology expertise: Only 35% of public tech
       boards have a director with hands-on AI/ML
       experience
     - Average director age: Public 61, Private 48
     - Director overboarding: 28% of public company
       directors serve on 3+ boards

  2. Committee structure:
     - Audit: 100% of public, 45% of private
     - Compensation: 95% of public, 32% of private
     - Nominating/Governance: 90% of public, 18% of
       private
     - Technology/Cybersecurity: 42% of public (up from
       15% in 2022), 8% of private
     - AI/Ethics: 12% of public (new category), 3% of
       private

  3. Board communication quality:
     - Average board package length: Public 285 pages,
       Private 42 pages
     - Pre-read distribution: 5.2 days (public), 2.1
       days (private)
     - Use of real-time dashboards: 38% of public, 12%
       of private
     - AI-assisted board material creation: 22% of
       companies (up from 5% in 2024)
     - Director satisfaction with board materials:
       6.4/10 (public), 5.8/10 (private)

  4. Governance practices:
     - Board self-evaluation: 78% of public, 22% of
       private
     - CEO succession planning: 65% of public, 15% of
       private
     - Director orientation program: 55% of public,
       10% of private
     - ESG/sustainability oversight: 68% of public,
       28% of private
     - Cybersecurity board oversight: 85% of public,
       42% of private

  5. Correlation analysis:
     - Board diversity → financial performance:
       Companies in top quartile of board diversity
       outperformed bottom quartile by 18% in revenue
       growth and 12% in TSR (3-year)
     - Board material quality → governance outcomes:
       Higher director satisfaction correlated with
       fewer governance incidents (r=-0.34)
     - Technology committee → cybersecurity posture:
       Companies with tech committees had 40% fewer
       material breaches

  Task: Write the complete 2026 Annual Technology
  Sector Governance Report — suitable for publication,
  media citation, board reference, and policy
  discussion — presenting all findings with analysis,
  trends, and recommendations.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive annual governance report — presents all 5 areas of findings (composition, committees, communication quality, governance practices, correlations) with clear data visualization descriptions and trend analysis; compares public vs private companies throughout; shows year-over-year trends where relevant; the report is structured for multiple audiences (board members, investors, policymakers, media); the format and quality match what the most-cited governance report in tech would require."
    weight: 0.35
    description: "ComprehensiveReport"
  - type: llm_judge
    criteria: "Response presents findings with analytical rigor and policy relevance — the diversity findings are presented with nuance (progress and gaps); the technology committee trend is analyzed as a governance evolution; the AI-assisted board material creation trend is discussed with both opportunities and risks; the correlation analysis is presented with appropriate caution about causality; the recommendations are specific and actionable for different constituencies (boards, investors, regulators); the report advances the governance conversation in the technology sector."
    weight: 0.35
    description: "AnalyticalRigor"
  - type: llm_judge
    criteria: "Response addresses the emerging governance challenges specific to technology — discusses the AI expertise gap on tech boards (only 35% have hands-on AI/ML experience); addresses the new AI/Ethics committee category; discusses the rise of AI-assisted board materials and its governance implications; addresses cybersecurity board oversight trends; discusses the private company governance gap (lower independence, fewer committees, less evaluation); the report positions TGI as the authoritative voice on technology sector governance and drives the public conversation about board accountability."
    weight: 0.30
    description: "TechGovernanceFocus"
