meta:
  id: board-communications-thought-leadership
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Write a definitive thought leadership piece on the evolution of board communications — from paper board books to AI-augmented governance — for a keynote at the NACD Annual Summit"
  tags: [thought-leadership, board-evolution, governance, master]

state: {}

trigger: |
  You're the founder of a leading board management
  platform (think Diligent + OnBoard) with 25 years
  of corporate governance experience and a seat on 8
  boards. You've been invited to deliver the keynote
  at the 2026 NACD (National Association of Corporate
  Directors) Annual Summit. Your topic: "The Future of
  Board Communications: From Board Books to Board
  Intelligence."

  Your thesis: Board communications have barely
  evolved in 50 years — we've digitized the board
  book but haven't fundamentally reimagined how
  information flows to directors. The next decade
  will see a transformation from static quarterly
  presentations to dynamic, AI-augmented governance
  intelligence.

  Key arguments to develop:

  1. The board information problem:
     - Directors average 240+ hours/year in board work
       but spend 60% on reading materials, not
       strategic thinking
     - Average board book: 200-400 pages; directors
       read 60% at best
     - Information is backward-looking (last quarter's
       results, not real-time data)
     - Management controls what the board sees
       (information asymmetry)

  2. The evolution (and stagnation):
     - Era 1 (1970s-2000s): Paper board books, FedEx'd
       3 days before meetings
     - Era 2 (2000s-2015): PDF board books on secure
       portals (Diligent, Boardvantage)
     - Era 3 (2015-present): Cloud portals with some
       interactivity, annotations, voting
     - Era 4 (emerging): AI-augmented board intelligence
       — what does this look like?

  3. What "Board Intelligence" means:
     - Real-time dashboards: Directors see live KPIs,
       not stale quarterly data
     - AI-synthesized materials: AI summarizes 400
       pages into 20-page strategic briefs with
       supporting detail on demand
     - Predictive analytics: Board sees forward-looking
       risk indicators, not just backward-looking
       metrics
     - Peer benchmarking: Real-time comparison to
       industry peers on financial, operational, and
       governance metrics
     - Sentiment analysis: AI analyzes employee,
       customer, and market sentiment trends

  4. Governance implications:
     - Does real-time information change director
       liability? (Caremark duties)
     - If directors can see problems in real-time,
       are they expected to act faster?
     - How does AI-augmented governance affect the
       business judgment rule?
     - Confidentiality and MNPI with real-time data

  5. Practical recommendations:
     - For boards: Demand better materials, not more
       materials; invest in board technology
     - For management: Shift from "reporting to the
       board" to "enabling the board"
     - For governance: Update board charters to address
       technology-enabled oversight
     - For the industry: Develop standards for board
       information quality

  Task: Write the keynote address (for publication
  in the NACD Directorship magazine) and an
  accompanying practical framework that companies
  can use to assess and upgrade their board
  communications maturity.

assertions:
  - type: llm_judge
    criteria: "Response delivers a compelling keynote on board communication evolution — traces the journey from paper board books to digital portals to AI-augmented intelligence; uses specific data points about director workload and information consumption; presents the 'Board Intelligence' vision with concrete examples; addresses the governance and legal implications of real-time board information; the keynote would command attention at the NACD Summit and spark industry-wide discussion about board communication transformation."
    weight: 0.35
    description: "ThoughtLeadershipKeynote"
  - type: llm_judge
    criteria: "Response creates a practical board communications maturity framework — provides a maturity model that companies can self-assess against (levels from basic board books to AI-augmented intelligence); includes specific recommendations for each level of maturity; addresses the change management challenge (directors resistant to new technology); provides actionable steps for management teams to improve board materials; the framework is immediately usable by corporate secretaries and board operations teams."
    weight: 0.35
    description: "PracticalFramework"
  - type: llm_judge
    criteria: "Response addresses the legal and governance implications with depth — discusses Caremark duties in the context of real-time information availability; addresses the business judgment rule implications; discusses MNPI concerns with real-time dashboards; addresses the tension between board access to information and management's role in curating it; the legal analysis would be respected by governance attorneys; the overall piece advances the field of corporate governance beyond incremental improvements."
    weight: 0.30
    description: "GovernanceImplications"
