meta:
  id: board-tech-platform-strategy
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Design the product strategy for an AI-powered board management platform that transforms how boards receive, process, and act on information — including the product vision, competitive analysis, and the platform's own board deck"
  tags: [board-tech, ai-platform, product-strategy, master]

state: {}

trigger: |
  You're the CEO of "BoardIQ" — an AI-powered board
  management platform that aims to transform board
  communications from static document delivery to
  intelligent governance support. You've raised $8M
  seed round and have 35 paying customers ($2.4M ARR).

  Product capabilities (current):
  - AI-powered board package creation: Integrates with
    financial systems, CRM, HRIS to auto-generate
    board deck content
  - Intelligent summarization: Reduces 400-page board
    books to 20-page strategic briefs
  - Real-time KPI dashboards: Directors see live
    metrics between meetings
  - Meeting intelligence: AI-generated meeting notes,
    action items, and follow-up tracking
  - Director engagement analytics: Track which
    materials directors read, how long, what they
    annotate

  Product roadmap (Series A funding):
  - Phase 1: "Smart Board Books" — AI that adapts
    board materials to each director's interests and
    expertise (the audit committee chair sees deeper
    financial data; the technology director sees
    product detail)
  - Phase 2: "Governance Intelligence" — predictive
    analytics for governance risk (director
    engagement declining, meeting frequency below
    peers, committee coverage gaps)
  - Phase 3: "Board Benchmarking" — anonymized
    cross-company board performance benchmarking
    (meeting frequency, material quality, governance
    structure vs peers)
  - Phase 4: "AI Board Advisor" — AI that suggests
    agenda items, flags risks from board materials,
    and generates discussion questions for directors

  Market:
  - Existing competitors: Diligent ($800M+ revenue,
    market leader, acquired by Insight Partners),
    OnBoard, BoardEffect, Nasdaq Boardvantage
  - Competitor weakness: All are document management
    platforms; none use AI for content creation or
    governance intelligence
  - TAM: $3.2B (board management software market)
  - SAM: $800M (growth/late-stage companies + mid-
    market public companies)
  - Your differentiation: AI-first (competitors
    retrofitting AI); content creation not just
    delivery; governance intelligence

  Your metrics:
  - ARR: $2.4M (growing 18% MoM)
  - Customers: 35 (avg $69K ARR)
  - NRR: 142% (expansion from basic to full platform)
  - Platform generates 850 board packages/month
  - Director engagement: 89% read rate (industry avg
    for board portals: 62%)

  Task: Write both (1) the product vision document
  for BoardIQ's Series A pitch — articulating the
  platform strategy and AI-powered governance vision
  — AND (2) your own quarterly board deck, which
  serves as a live demonstration of your platform's
  capabilities and philosophy.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision document — articulates the market opportunity (static document delivery vs AI-powered governance intelligence); presents the 4-phase roadmap with strategic logic; differentiates from Diligent, OnBoard, and other incumbents convincingly; presents the AI-first approach with specifics; the vision of personalized board materials, predictive governance analytics, and cross-company benchmarking represents a genuine category evolution; the document would excite a Series A investor about the board technology market."
    weight: 0.35
    description: "ProductVision"
  - type: llm_judge
    criteria: "Response writes an exemplary quarterly board deck that serves as a meta-demonstration — the deck itself showcases BoardIQ's principles (executive summary first, data visualization, balanced reporting, structured asks, forward-looking content); presents metrics compellingly ($2.4M ARR, 18% MoM, 142% NRR, 89% director read rate); the deck format demonstrates what 'great board materials' look like in practice; this is the most important meta-demonstration in the entire course — a board technology company whose own board deck must be the best board deck the investor has ever seen."
    weight: 0.35
    description: "MetaDemonstration"
  - type: llm_judge
    criteria: "Response addresses the unique challenges of the board technology market — discusses trust and security concerns (board materials are among the most sensitive corporate documents); addresses the director adoption challenge (directors are often technology-resistant); discusses the AI governance implications (when AI generates board materials, who is responsible for accuracy?); addresses the data moat (850 board packages/month creating training data); the overall package demonstrates founder-market fit and deep understanding of both technology and corporate governance."
    weight: 0.30
    description: "MarketUnderstanding"
