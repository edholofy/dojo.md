meta:
  id: board-advisory-practice
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Design a board advisory consulting practice specializing in board effectiveness, board deck design, and governance communications for growth-stage and pre-IPO companies"
  tags: [consulting, board-advisory, practice-design, master]

state: {}

trigger: |
  You're a former corporate secretary at 3 public
  companies (including a FAANG company) who is
  launching "BoardCraft" — a consulting practice
  specializing in board communications and governance
  for growth-stage and pre-IPO companies. You've
  raised $400K from angel investors.

  Your market insight: Most growth-stage companies
  have terrible board materials. CEOs spend hours
  creating board decks that don't facilitate strategic
  discussion. The gap between "startup board meeting"
  and "public-company-quality board governance" is
  where companies waste time, damage board
  relationships, and miss critical governance issues.

  Service lines to design:

  1. "Board Communications Audit" (one-time):
     - Review last 4 quarterly board packages
     - Interview all board members on information needs
     - Gap analysis against best practices
     - Deliverable: Board Communications Score + redesign
       roadmap
     - Target: Series B+ companies; Price: $20-30K

  2. "Board Deck Redesign" (project):
     - Design the board package template system
     - Create a data visualization framework
     - Establish metrics dashboard standards
     - Build pre-read and post-meeting document templates
     - Target: Pre-IPO companies; Price: $40-60K

  3. "Fractional Corporate Secretary" (retainer):
     - Monthly board meeting preparation support
     - Agenda design and materials coordination
     - Minutes and resolution drafting
     - Committee materials preparation
     - Target: Series B/C without a corp secretary
     - Price: $6-10K/month

  4. "IPO Governance Readiness" (6-month engagement):
     - Board composition assessment and director search
       support
     - Committee charter development
     - Board evaluation process design
     - Proxy statement narrative preparation
     - Target: Pre-IPO companies ($100M+ ARR)
     - Price: $120-200K

  5. "Board Effectiveness Program" (ongoing):
     - Annual board evaluation facilitation
     - Director orientation program design
     - Board education sessions (AI governance, cyber,
       ESG)
     - Governance benchmarking against peers
     - Target: Series C+ through early public
     - Price: $30-50K/year

  Task: Write the complete business plan for BoardCraft
  — including the proprietary methodology for board
  communication excellence, detailed service
  descriptions with sample deliverables, pricing
  rationale, sales strategy (how to reach CEOs and
  board members), and a demonstration board deck for
  your own company's angel investor board meeting.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive board advisory practice — each service line has clear scope, deliverables, pricing, and target market; the Board Communications Audit methodology is detailed and credible; the Board Deck Redesign service includes a framework that reflects deep understanding of board information needs; the IPO Governance Readiness service addresses the full spectrum of pre-IPO governance requirements; sample deliverables demonstrate quality; the overall practice design demonstrates that BoardCraft has genuine expertise to offer."
    weight: 0.35
    description: "PracticeDesign"
  - type: llm_judge
    criteria: "Response creates a viable business model and go-to-market strategy — pricing is justified relative to client value; the revenue build from Year 1 to Year 3 is credible; the sales strategy identifies specific channels to reach CEOs and board members (law firm referrals, NACD partnerships, VC relationships); addresses client acquisition and retention; discusses team scaling; the financial model is realistic for a consulting business; the go-to-market differentiates BoardCraft from generic management consultancies and governance advisory firms."
    weight: 0.35
    description: "BusinessViability"
  - type: llm_judge
    criteria: "Response develops a proprietary methodology that codifies board communication best practices — creates a named and branded framework for evaluating and improving board communications; the methodology addresses both content (what to present) and process (how to prepare and deliver); includes a maturity model or scoring system; the demonstration board deck for BoardCraft's own angel meeting practices what the firm preaches (showcasing the methodology in action); the overall package would convince both potential clients and angel investors that BoardCraft has a differentiated, scalable approach."
    weight: 0.30
    description: "ProprietaryMethodology"
