meta:
  id: master-deck-shift
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Create the board communications for a mega-merger integration — designing unified board reporting for a $28B combined entity formed from the merger of 2 public companies, with 2 legacy boards merging, regulatory requirements across 12 jurisdictions, and the most complex governance challenge in corporate history"
  tags: [mega-merger, board-integration, governance-design, master, shift-simulation]

state: {}

trigger: |
  You're the newly appointed Group General Counsel
  and Corporate Secretary of "TechNova" — a $28B
  combined technology company formed from the merger
  of "AlphaTech" ($16B, NYSE, 8,200 employees, 12
  directors) and "BetaSoft" ($12B, NASDAQ, 5,400
  employees, 10 directors). The merger closed 30 days
  ago. You need to design and produce the unified
  board's first set of materials.

  Merger context:
  - Structure: Stock-for-stock merger; AlphaTech
    shareholders received 1.4 BetaSoft shares per
    AlphaTech share
  - New board: 15 directors (8 from AlphaTech, 7 from
    BetaSoft); new independent Chair (recruited
    externally)
  - CEO: Former AlphaTech CEO
  - President/COO: Former BetaSoft CEO
  - Integration: Expected 3-year integration; $1.2B
    in synergies targeted; $800M in integration costs
  - Regulatory: FTC consent decree required divestiture
    of overlapping product line ($420M divested)

  Board integration challenges:
  1. Two legacy board cultures:
     - AlphaTech board: Formal, process-oriented,
       detailed 300-page board books, 5 committees,
       structured executive sessions
     - BetaSoft board: Informal, discussion-oriented,
       40-page decks, 3 committees, CEO-led meetings
     - 15 directors who don't know each other and have
       different governance expectations

  2. Committee structure redesign:
     - Need to merge 5 AlphaTech committees + 3
       BetaSoft committees into a unified structure
     - Integration Oversight Committee (new): Monitors
       $1.2B synergy program
     - Who chairs what? (political dynamics — both
       legacy groups want representation)

  3. Financial reporting complexity:
     - Purchase accounting adjustments ($4.2B in
       goodwill, $2.8B in intangibles)
     - Pro forma combined financials (what does the
       combined company actually look like?)
     - Synergy tracking methodology
     - Integration cost tracking
     - Divested product line transition

  4. Regulatory and legal:
     - FTC consent decree compliance monitoring
     - SEC reporting for the combined entity
     - SOX 404 for the merged company (dual systems
       for 12-18 months)
     - Employment integration (2 HQ cities, 13,600
       combined employees, inevitable layoffs)
     - International subsidiary board alignment (8
       countries)

  5. Cultural and organizational:
     - Leadership team announcements (who stays, who
       goes)
     - Brand integration (AlphaTech brand vs BetaSoft
       brand vs TechNova)
     - Customer communication (combined customer base
       of 12,000)
     - Employee retention (both companies' best people
       being recruited by competitors)

  First board meeting agenda:
  - Board orientation (directors meeting each other)
  - Governance framework approval (committees, charters)
  - Integration status (Day 30)
  - Pro forma financial overview
  - Key leadership appointments
  - 100-day integration plan review

  Task: Create the complete first-meeting board
  package for TechNova's unified board — including:
  1. A board orientation document introducing all 15
     directors and the new governance framework
  2. The proposed committee structure with charters
  3. Pro forma combined financial overview with
     purchase accounting explanation
  4. Day-30 integration status report with synergy
     tracking
  5. The 100-day integration plan with milestones
  All materials must bridge two different board
  cultures and set the governance tone for the
  combined company.

assertions:
  - type: llm_judge
    criteria: "Response creates 5 comprehensive documents for the first unified board meeting — the board orientation introduces all directors and establishes governance norms (bridging AlphaTech's formal style and BetaSoft's informal style); the committee structure proposal is logical and politically balanced (representation from both legacy boards); the pro forma financials explain purchase accounting clearly (goodwill, intangibles, adjusted metrics); the Day-30 integration status is honest about progress and challenges; the 100-day plan has specific milestones; the overall package sets the governance tone for TechNova."
    weight: 0.35
    description: "ComprehensiveFirstMeeting"
  - type: llm_judge
    criteria: "Response navigates the board culture integration with diplomatic sophistication — addresses the tension between AlphaTech's 300-page formal approach and BetaSoft's 40-page informal approach; proposes a unified board communication standard that respects both traditions; handles the political dynamics of committee assignments and chair selections; addresses the Chair's role in establishing the new board culture; the orientation materials facilitate relationship-building among 15 directors who don't know each other; the overall approach demonstrates that governance integration is as important as business integration."
    weight: 0.35
    description: "CultureIntegration"
  - type: llm_judge
    criteria: "Response addresses the financial, regulatory, and operational complexity of the mega-merger — the pro forma financials bridge both legacy companies' reporting with clear purchase accounting adjustments; the FTC consent decree compliance is tracked; the synergy program ($1.2B target) has a credible tracking methodology; the integration costs ($800M) are categorized and monitored; the divestiture transition is addressed; the SOX 404 dual-system challenge is flagged; the overall package demonstrates that TechNova's governance is ready for the most complex corporate integration scenario — one that will be scrutinized by shareholders, regulators, and media."
    weight: 0.30
    description: "MergerComplexity"
