meta:
  id: governance-standards-framework
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Draft a comprehensive corporate governance reporting standard for private companies — the equivalent of what NACD and SEC provide for public companies, but designed for venture-backed startups"
  tags: [governance-standards, private-companies, nacd, master]

state: {}

trigger: |
  You're the Chair of a new NVCA (National Venture
  Capital Association) working group tasked with
  creating "Governance Communication Standards for
  Venture-Backed Companies" — the first comprehensive
  framework for board communication quality in private
  companies.

  Working group composition:
  - 6 VC representatives (Sequoia, a16z, Bessemer,
    Insight, General Atlantic, Tiger Global)
  - 4 startup CEO/CFO representatives (Series A
    through pre-IPO)
  - 3 governance experts (NACD director, former SEC
    staff, corporate governance professor)
  - 2 corporate secretaries (one from a recently-IPO'd
    company, one from a late-stage private company)
  - 1 board management platform representative

  Scope of the standards:

  1. Board meeting structure and frequency:
     - Minimum meeting frequency by stage (seed: 4x/yr,
       Series A: 4-6x/yr, Series B+: quarterly + ad hoc)
     - Recommended meeting duration and agenda structure
     - Executive session expectations
     - Committee structure recommendations by stage

  2. Board package content requirements:
     - Minimum content by stage (seed vs Series A vs
       Series B+ vs pre-IPO)
     - Executive summary standards
     - Financial reporting depth (what metrics, what
       format, what comparisons)
     - Operational reporting requirements
     - Strategic update expectations
     - Risk reporting framework (scaled by stage)

  3. Material distribution and timing:
     - Minimum advance distribution (3 days for regular,
       24 hours for emergency)
     - Pre-read vs presentation material distinction
     - Consent agenda for routine items
     - Post-meeting minutes and action item tracking

  4. Information rights and access:
     - Board vs observer information differentiation
     - Confidentiality protocols
     - Real-time information access (dashboards vs
       periodic reports)
     - MNPI management for boards of private companies

  5. Quality standards:
     - Data accuracy and timeliness requirements
     - Visualization and presentation standards
     - Forward-looking content requirements
     - "Asks" framework (management requests of the
       board)
     - Balanced reporting (positive and negative)

  Contentious issues:
  - VCs want more information; founders want less
    overhead
  - Information rights vary by investment size/stage
  - Board observer vs board member rights unclear
  - Real-time dashboard access vs periodic reporting
  - Standards might burden small seed-stage companies

  Task: Draft the NVCA Governance Communication
  Standards framework — including tiered requirements
  by stage, specific content standards, implementation
  guidelines, and commentary addressing the
  contentious issues with balanced perspectives.

assertions:
  - type: llm_judge
    criteria: "Response drafts comprehensive governance communication standards — covers all 5 scope areas (meeting structure, content requirements, distribution timing, information rights, quality standards) with specific, actionable requirements; the standards are tiered by stage (seed, Series A, Series B+, pre-IPO) with appropriate scaling; includes both mandatory minimums and recommended best practices; the format is suitable for publication as an NVCA standard; the overall framework fills the governance gap for private companies."
    weight: 0.35
    description: "ComprehensiveStandards"
  - type: llm_judge
    criteria: "Response navigates the VC-founder tension with diplomatic balance — addresses VCs' desire for more information while acknowledging founders' operational burden concerns; the tiered approach provides proportional requirements; the board observer vs member distinction is addressed clearly; the real-time access debate is resolved with a practical framework; the seed-stage exemptions prevent over-burdening early companies; each contentious issue includes the perspectives of both working group constituencies."
    weight: 0.35
    description: "StakeholderBalance"
  - type: llm_judge
    criteria: "Response provides implementation guidance and a path for adoption — includes templates or checklists for each stage; discusses how companies can self-assess against the standards; proposes a voluntary adoption framework (not mandatory); addresses how the standards connect to public company governance (IPO transition); discusses how board management platforms can support the standards; proposes a review and update mechanism; the overall framework would be adopted voluntarily by leading VC firms and their portfolio companies."
    weight: 0.30
    description: "ImplementationGuidance"
