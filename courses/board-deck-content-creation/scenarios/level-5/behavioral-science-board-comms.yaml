meta:
  id: behavioral-science-board-comms
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Write an academic chapter applying cognitive science and decision-making research to board communications design — how information presentation, cognitive load, and decision architecture shape board effectiveness"
  tags: [behavioral-science, decision-making, cognitive-load, master]

state: {}

trigger: |
  You're a professor of organizational behavior at
  INSEAD who has been commissioned to write a chapter
  for the Cambridge Handbook of Corporate Governance
  titled "The Cognitive Science of Board
  Communications: How Information Architecture Shapes
  Governance Decisions."

  Your research combines experimental psychology with
  analysis of actual board materials. You've conducted
  6 experimental studies with 450 current and former
  board directors and analyzed the 2,400-package
  dataset from the Harvard study.

  Key findings to present:

  1. Cognitive load and board materials:
     - Directors' decision quality decreases 28% when
       board packages exceed 200 pages
     - "Information overload threshold": Beyond 150
       pages, directors rely on executive summary and
       skip detailed sections (confirmed by eye-
       tracking study)
     - Optimal board package: 80-120 pages with
       hierarchical navigation (executive summary →
       section summaries → detailed appendices)
     - Color coding and consistent formatting reduce
       cognitive load by 35%

  2. Decision architecture in board presentations:
     - Order effects: Items presented first in board
       meetings receive 40% more discussion time
     - Consent agendas increase meeting efficiency but
       reduce oversight of "routine" items by 60%
     - Choice architecture: Presenting 3 options (with
       a recommended option) produces better decisions
       than 2 options or open-ended discussion
     - The "pre-read effect": Directors who read
       materials 48+ hours before meetings make 25%
       better decisions (measured by outcome quality)

  3. Data visualization and comprehension:
     - Charts convey trend information 3.4x faster
       than tables
     - BUT: 45% of board charts are poorly designed
       (truncated axes, missing labels, misleading
       scales)
     - Dashboard fatigue: Directors shown >12 KPIs
       recall fewer than directors shown 6-8 KPIs
     - Narrative + chart integration: 2.1x better
       retention than charts alone

  4. Risk communication biases:
     - "Risk normalization": Repeated exposure to the
       same risk language causes directors to
       underweight persistent risks
     - Red/yellow/green status indicators create false
       confidence (82% of directors trust a "green"
       status without reading details)
     - Probability neglect: Directors respond to risk
       narratives (stories) more than risk probabilities
     - The "absence of bad news" bias: Directors assume
       unreported areas are performing well

  5. Group dynamics and information processing:
     - CEO presentation dominance: CEOs speak 45% of
       total board meeting time; discussion quality
       improves when reduced to 30%
     - Director expertise utilization: Boards with
       structured "director spotlight" sessions (where
       each director is asked about their area of
       expertise) have 35% higher governance quality
     - Dissent suppression: 68% of directors say they
       sometimes withhold concerns; structured
       discussion protocols reduce this to 32%

  Task: Write the complete handbook chapter including
  theoretical framework, presentation of each finding,
  practical design recommendations for board materials,
  and implications for governance reform.

assertions:
  - type: llm_judge
    criteria: "Response writes a rigorous academic chapter applying cognitive science to board communications — presents each of the 5 research areas with appropriate experimental methodology; connects findings to established cognitive science (dual-process theory, bounded rationality, cognitive load theory, choice architecture); includes effect sizes and methodological details; distinguishes between experimental and observational findings; the chapter would meet Cambridge Handbook standards for academic rigor while remaining accessible to governance practitioners."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Response presents findings with nuance and practical implications — addresses the cognitive load research with specific design recommendations (page limits, hierarchical navigation, formatting standards); the decision architecture findings lead to actionable agenda design; the data visualization research leads to specific chart design guidelines; the risk communication biases lead to specific risk reporting reforms; each finding is translated into a practical governance recommendation that board operations teams can implement."
    weight: 0.35
    description: "PracticalTranslation"
  - type: llm_judge
    criteria: "Response addresses the implications for governance reform — discusses whether corporate governance codes should incorporate cognitive science insights; addresses the tension between comprehensive disclosure (legal requirements) and cognitive optimization (what directors can actually process); discusses the implications for director orientation and ongoing education; addresses the AI opportunity (can AI help manage cognitive load while maintaining oversight quality?); the chapter advances both the academic understanding of board cognition and the practical design of governance communications."
    weight: 0.30
    description: "GovernanceReform"
