meta:
  id: board-effectiveness-research
  level: 5
  course: board-deck-content-creation
  type: output
  description: "Design and write up an empirical research study on the relationship between board material quality and company performance outcomes, using data from 500+ companies"
  tags: [empirical-research, board-effectiveness, academic, master]

state: {}

trigger: |
  You're a professor at Harvard Business School who
  specializes in corporate governance and has secured
  a unique dataset: 2,400 board packages from 520
  companies (2018-2025), provided under NDA by 4 major
  board management platforms. Combined with public
  company performance data, you're studying whether
  board material quality predicts company outcomes.

  Research questions:
  1. Does the quality and structure of board materials
     correlate with company performance (revenue
     growth, profitability, stock performance)?
  2. What board communication patterns distinguish
     high-performing boards from low-performing ones?
  3. How does the transition from private to public
     board reporting affect governance quality?

  Dataset details:
  - 2,400 board packages from 520 companies
  - 280 private companies (Series B through pre-IPO)
  - 240 public companies (first 3 years post-IPO)
  - Financial performance data for all companies
  - Board composition data (size, diversity,
    independence, committee structure)
  - Meeting frequency and duration data
  - 120 companies that IPO'd during the study period
    (pre/post comparison)

  Preliminary findings:
  1. Board material quality scoring (your framework):
     - Developed "Governance Communication Index" (GCI)
       scoring 0-100 based on: strategic focus (vs
       operational detail), data visualization quality,
       forward-looking content, risk discussion depth,
       ask clarity, and information balance
     - Top-quartile GCI companies: 35% higher revenue
       growth, 22% better stock performance (public
       companies)

  2. Private vs public board materials:
     - Private companies average GCI of 52; public
       companies average 71
     - Companies that IPO'd showed GCI improvement from
       48 (2 years pre-IPO) to 68 (1 year post-IPO)
     - The GCI improvement strongly predicted post-IPO
       stock performance (r=0.38)

  3. Key differentiators of high-GCI boards:
     - 3.2x more time on forward-looking content
     - 2.8x more structured "asks" from management
     - 40% fewer pages (quality over quantity)
     - 2.1x more data visualization (vs text tables)
     - 4.5x more competitor and market analysis
     - Regular use of executive summaries (92% vs 34%)

  4. Board composition effects:
     - Boards with former public company CFOs had 15
       higher GCI scores
     - Board diversity (gender, ethnicity) correlated
       with 8-point GCI improvement
     - Committees (especially audit) improved financial
       reporting quality by 12 GCI points

  Task: Write the full research paper for submission
  to the Academy of Management Journal — including
  abstract, theoretical framework, methodology,
  results, discussion of causality challenges, and
  implications for governance practitioners.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible academic research paper — includes a compelling abstract; the theoretical framework connects to governance theory (agency theory, stewardship theory, resource dependence); the methodology section describes the GCI construction, data sources, and analytical approach; results are presented with appropriate statistical rigor; the discussion addresses causality challenges honestly (do better materials cause better performance, or do better companies produce better materials?); the paper would be taken seriously by AMJ reviewers."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Response presents the GCI framework with methodological sophistication — describes how each dimension (strategic focus, data viz, forward-looking content, risk discussion, ask clarity, information balance) was operationalized and scored; addresses inter-rater reliability; discusses the validation approach; presents the private-to-public transition findings as a natural experiment; the IPO cohort analysis (pre/post GCI improvement predicting stock performance) is the most causally compelling finding; the framework advances the academic study of corporate governance communications."
    weight: 0.35
    description: "GCIMethodology"
  - type: llm_judge
    criteria: "Response bridges academic research and practical governance implications — translates findings into actionable guidance for boards (executive summaries, data visualization, forward-looking content, structured asks); discusses implications for board management platforms (what features matter most); addresses implications for corporate secretaries and CFOs (how to improve board materials); discusses the regulatory implications (should governance codes address board material quality?); the practitioner section would be excerpted by NACD and governance advisory firms."
    weight: 0.30
    description: "PracticalImplications"
