meta:
  id: promotional-thought-leadership
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Establish global thought leadership in open house promotional content — keynote development, industry influence, and shaping the future discourse of real estate marketing"
  tags: [thought-leadership, global-influence, industry-shaping, master]

state: {}

trigger: |
  You are invited to deliver the opening keynote at the
  Global Real Estate Marketing Summit, the most
  prestigious gathering of real estate marketing leaders
  worldwide. Your talk will set the industry agenda for
  the next decade.

  Event details:
  - Audience: 3,000 attendees from 45 countries
  - Mix: CMOs, broker/owners, top agents, PropTech CEOs
  - Keynote: 45 minutes + 15 minute Q&A
  - Theme: "The Next Decade of Property Marketing"
  - Your slot: Opening keynote (sets tone for conference)
  - Live-streamed to 50,000+ online viewers
  - Published in conference proceedings

  Your thesis:
  "The open house is not dying — it's evolving into the
  most powerful omnichannel marketing event in real
  estate, but only for those who understand how to
  leverage it."

  Supporting arguments to develop:
  - Data showing evolved open houses outperform digital-only
  - Case studies from 5 markets (US, UK, Australia, UAE, Singapore)
  - Technology integration that enhances rather than replaces
  - The psychology of physical space in buying decisions
  - Community-building as competitive advantage
  - The AI revolution in promotional content creation

  Create:
  1. Complete keynote script with stage directions
  2. Supporting data narrative and visualizations
  3. International case study summaries
  4. Audience engagement strategy (interactive elements)
  5. Post-keynote thought leadership content plan
  6. Industry framework/model to be associated with your name
  7. Call to action for the global real estate community

assertions:
  - type: llm_judge
    criteria: "Keynote is compelling and original — presents a provocative but defensible thesis, uses storytelling to make data memorable, builds to a crescendo with clear call to action; this is a speech people would talk about afterward."
    weight: 0.35
    description: "KeynoteCompelling"
  - type: llm_judge
    criteria: "International perspective is genuinely global — case studies reflect different markets' unique characteristics (not just US examples applied elsewhere), acknowledges cultural differences in property marketing, and proposes frameworks that work across contexts."
    weight: 0.35
    description: "GlobalPerspective"
  - type: llm_judge
    criteria: "Industry framework is memorable and adoptable — creates a named model or methodology that attendees can immediately apply, is simple enough to remember but robust enough to be useful, and positions the speaker as the originator."
    weight: 0.30
    description: "IndustryFrameworkAdoption"
