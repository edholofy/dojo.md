meta:
  id: promotional-memoir
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Write a professional memoir documenting a career spent pioneering open house promotional innovation — personal stories, industry evolution, and lessons for the next generation"
  tags: [memoir, career-reflection, industry-history, master]

state: {}

trigger: |
  Write a professional memoir documenting your 25-year
  career pioneering open house promotional innovation.
  This memoir will serve as both industry history and
  practical wisdom for the next generation.

  Career arc:

  Act 1 — The Accidental Marketer (Years 1-8)
  - Started as agent in 2001, pre-social media era
  - First open house: 0 visitors (terrible flyer, wrong day)
  - Discovery: marketing matters more than the property
  - Early adoption of Craigslist, then Zillow integration
  - Built reputation as "the agent who fills open houses"
  - Turning point: First viral open house video (2008)
  - Lesson: "Nobody teaches agents to market"

  Act 2 — The System Builder (Years 9-16)
  - Instagram launch (2010) changed everything
  - Built the first social-media-first open house system
  - Hired first marketing coordinator on a team
  - Spoke at first conference (terrified, standing ovation)
  - Published first article in RISMedia
  - Founded consulting practice (2014)
  - Failure: $200K tech product that nobody used
  - Lesson: "Systems beat talent every time"

  Act 3 — The Industry Shaper (Years 17-25)
  - NAR advisory board appointment
  - Created certification program (2,500 graduates)
  - Wrote "Open House Mastery" (bestseller)
  - COVID pivot: pioneered virtual open house format
  - Founded social enterprise for marketing equity
  - Current: Shaping AI integration in RE marketing
  - Lesson: "The industry is ready to learn"

  Key themes throughout:
  - From print to digital to AI (technology evolution)
  - The agent as content creator (role evolution)
  - Fair housing in marketing (ethical evolution)
  - From individual to systemic thinking (scale evolution)

  Create:
  1. Complete memoir outline (20 chapters)
  2. Three sample chapters (Acts 1, 2, and 3)
  3. Key anecdotes and turning points narrative
  4. Industry evolution timeline woven into personal story
  5. Lessons distilled for new agents
  6. Reflection on failures and growth
  7. Vision for the future of the profession

assertions:
  - type: llm_judge
    criteria: "Memoir voice is authentic and reflective — balances professional insights with personal vulnerability, shares failures as openly as successes, and creates a narrative arc that readers can see themselves in; not just a resume in prose form."
    weight: 0.35
    description: "AuthenticVoice"
  - type: llm_judge
    criteria: "Industry evolution is told through personal experience — technology shifts, market changes, and regulatory evolution are experienced through specific stories and moments, not abstract historical summaries; the reader learns history through lived experience."
    weight: 0.35
    description: "IndustryHistoryThroughExperience"
  - type: llm_judge
    criteria: "Lessons for new agents are practical and earned — each lesson comes from a specific experience (success or failure), is stated clearly, and includes enough context for the reader to apply it; wisdom feels hard-won rather than platitudinous."
    weight: 0.30
    description: "PracticalWisdom"
