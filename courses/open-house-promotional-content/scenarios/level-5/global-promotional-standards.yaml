meta:
  id: global-promotional-standards
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Develop global standards for open house promotional content — international best practices, cross-border compliance, and universal quality frameworks"
  tags: [global-standards, international-practices, quality-frameworks, master]

state: {}

trigger: |
  Lead the development of the first global standards
  for open house promotional content, commissioned by
  the International Real Estate Federation (FIABCI).

  Scope:
  - Standards applicable across 70+ member countries
  - Must accommodate vastly different regulatory environments
  - Must work for both luxury and mass-market properties
  - Must address digital, print, and experiential marketing
  - Must be technology-agnostic but forward-looking

  Regional considerations:

  North America:
  - Fair housing laws (US/Canada)
  - MLS-based marketing ecosystem
  - Heavy digital/social media emphasis
  - Individual agent branding culture

  Europe:
  - GDPR and strict data privacy
  - Energy performance certificate requirements
  - Multiple languages within markets
  - Agent/buyer relationship formality

  Asia-Pacific:
  - WeChat/LINE platform dominance
  - Developer-driven marketing (new builds)
  - Feng shui and cultural considerations
  - Virtual-first buyer preferences

  Middle East/Africa:
  - Luxury-heavy markets (Dubai, etc.)
  - Islamic finance considerations
  - Emerging digital infrastructure
  - Multilingual, multicultural audiences

  Latin America:
  - Informal market segments
  - WhatsApp-centric communication
  - Security considerations for open houses
  - Growing digital adoption

  Create:
  1. Global standards framework document
  2. Regional adaptation guidelines
  3. Compliance assessment methodology
  4. Technology standards for digital content
  5. Cross-border promotional best practices
  6. Cultural sensitivity guidelines
  7. Standards governance and evolution process

assertions:
  - type: llm_judge
    criteria: "Standards framework accommodates diversity without being so broad as to be meaningless — identifies universal principles (truthfulness, accessibility, quality) while allowing regional variation in implementation; standards are specific enough to audit."
    weight: 0.35
    description: "StandardsFlexibility"
  - type: llm_judge
    criteria: "Regional adaptations reflect genuine understanding — not just surface-level cultural notes but deep awareness of how property marketing works differently in each region; UAE luxury marketing is fundamentally different from German efficiency-focused promotion."
    weight: 0.35
    description: "RegionalDepth"
  - type: llm_judge
    criteria: "Governance process ensures standards evolve — includes review cycles, stakeholder input mechanisms, technology update procedures, and handles the challenge of governing standards across countries with different legal systems and market maturity."
    weight: 0.30
    description: "GovernanceEvolution"
