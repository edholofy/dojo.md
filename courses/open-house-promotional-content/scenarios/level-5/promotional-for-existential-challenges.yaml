meta:
  id: promotional-for-existential-challenges
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Apply open house promotional expertise to existential challenges — climate adaptation housing, disaster recovery marketing, and promoting resilient communities"
  tags: [existential-challenges, climate-adaptation, disaster-recovery, master]

state: {}

trigger: |
  Apply open house promotional content expertise to
  address existential challenges facing the real estate
  industry and communities. Climate change, housing
  crises, and social disruption require new promotional
  paradigms.

  Challenge 1 — Climate-Adapted Housing:
  Promote properties in climate-vulnerable areas honestly
  while highlighting resilience features.
  - Coastal property with flood mitigation (elevated, impact
    windows, backup power)
  - Wildfire-zone property with defensible space and fire-
    resistant materials
  - How to market climate risk transparently without
    destroying property values

  Challenge 2 — Disaster Recovery Marketing:
  Help communities rebuild after natural disasters by
  promoting reconstructed homes and neighborhoods.
  - Post-hurricane rebuilt neighborhood (better than before)
  - Community that rebuilt with climate resilience
  - Attracting buyers back to areas with disaster stigma
  - Balancing hope with honest risk communication

  Challenge 3 — Housing Crisis Promotion:
  Promote affordable and innovative housing solutions in
  markets with severe housing shortages.
  - ADU (accessory dwelling unit) open house campaigns
  - Micro-unit and co-living promotional content
  - Community land trust marketing
  - Manufactured housing de-stigmatization

  Challenge 4 — Aging Population:
  Promote age-appropriate housing transitions sensitively.
  - Downsizing from family home (emotional marketing)
  - Senior community open houses (dignity and independence)
  - Multigenerational housing promotions
  - Universal design feature marketing

  Create:
  1. Climate transparency in property promotion framework
  2. Disaster recovery promotional campaign templates
  3. Affordable housing marketing that builds aspiration
  4. Senior housing promotional content guidelines
  5. Ethical framework for promoting in challenged markets
  6. Community resilience storytelling strategy
  7. Policy recommendations for honest marketing standards

assertions:
  - type: llm_judge
    criteria: "Climate transparency framework balances honesty with market viability — acknowledges risks without sensationalizing, highlights resilience investments as value-adds, and helps buyers make informed decisions; sets a new standard for responsible property marketing."
    weight: 0.35
    description: "ClimateTransparencyBalance"
  - type: llm_judge
    criteria: "Disaster recovery campaigns rebuild community narrative — goes beyond individual property promotion to tell the story of community resilience, recovery, and improvement; helps overcome disaster stigma with evidence and emotion."
    weight: 0.35
    description: "DisasterRecoveryNarrative"
  - type: llm_judge
    criteria: "Affordable housing marketing maintains aspiration and dignity — promotes ADUs, micro-units, and manufactured homes as innovative lifestyle choices rather than compromises; marketing quality matches what luxury properties receive."
    weight: 0.30
    description: "AffordableHousingDignity"
