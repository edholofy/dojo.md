meta:
  id: promotional-research-handbook
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Author the definitive research handbook on open house promotional content — comprehensive academic reference covering theory, methodology, findings, and future directions"
  tags: [research-handbook, academic-reference, comprehensive-review, master]

state: {}

trigger: |
  Author the definitive research handbook on open house
  promotional content for an academic publisher. This
  will be the foundational reference for researchers,
  practitioners, and policy makers.

  Publisher: Routledge (Real Estate Research Series)
  Format: Edited handbook, 25 chapters, 600+ pages
  Timeline: 18 months to completion
  Contributors: 40+ scholars and practitioners worldwide

  Handbook structure:

  Part I — Theoretical Foundations (Chapters 1-5)
  - History of property marketing and open houses
  - Communication theory applied to RE promotion
  - Consumer behavior in property decision-making
  - Digital transformation of RE marketing
  - Behavioral economics of property promotion

  Part II — Methodology (Chapters 6-10)
  - Quantitative methods for promotional research
  - Qualitative approaches to understanding buyer response
  - Experimental design for content testing
  - Big data and computational approaches
  - Mixed methods in RE marketing research

  Part III — Content and Channels (Chapters 11-17)
  - Visual content effectiveness research
  - Copywriting and linguistic analysis
  - Video and multimedia in property promotion
  - Social media platform dynamics
  - Email and direct marketing research
  - Print and physical media studies
  - Emerging technologies (AR/VR/AI)

  Part IV — Context and Application (Chapters 18-22)
  - Cross-cultural promotional research
  - Luxury vs affordable market promotion
  - Legal and ethical dimensions
  - Technology adoption by practitioners
  - Impact measurement and ROI

  Part V — Future Directions (Chapters 23-25)
  - AI and automation in RE marketing
  - Sustainability and responsible promotion
  - Research agenda for the next decade

  Create:
  1. Complete table of contents with chapter abstracts
  2. Three full chapter drafts (one from each Part)
  3. Contributor recruitment strategy
  4. Editorial guidelines for contributors
  5. Research gaps identification across all parts
  6. Cross-referencing and integration plan
  7. Teaching resources companion

assertions:
  - type: llm_judge
    criteria: "Chapter abstracts are substantive and position each chapter uniquely — each abstract identifies specific research questions, theoretical frameworks, and expected contributions; together they cover the field comprehensively without significant overlap."
    weight: 0.35
    description: "ChapterAbstractSubstance"
  - type: llm_judge
    criteria: "Sample chapters demonstrate academic rigor — proper literature review structure, theoretical grounding, empirical evidence or methodological detail, and scholarly tone; these would pass peer review at a reputable journal."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Research gaps identification is genuinely novel — doesn't just call for 'more research' but identifies specific unanswered questions with suggested methodologies, data sources, and potential findings; gives PhD students a roadmap."
    weight: 0.30
    description: "ResearchGapNovelty"
