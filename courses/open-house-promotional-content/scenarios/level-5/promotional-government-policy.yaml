meta:
  id: promotional-government-policy
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Shape government policy on real estate marketing and promotional content — testimony, policy proposals, and regulatory frameworks that protect consumers while enabling innovation"
  tags: [government-policy, regulatory-framework, consumer-protection, master]

state: {}

trigger: |
  You are invited to testify before a Congressional
  subcommittee and advise on comprehensive real estate
  marketing regulation. Your expertise in open house
  promotional content makes you uniquely qualified to
  shape policy that protects consumers while enabling
  industry innovation.

  Congressional context:
  - Subcommittee on Housing and Community Development
  - Hearing: "Truth and Transparency in Real Estate
    Marketing in the Digital Age"
  - Triggered by: consumer complaints about AI-generated
    property photos, misleading promotional content, and
    fair housing violations in digital advertising

  Issues under consideration:

  1. AI-Generated Content in RE Marketing:
  - Virtual staging that misrepresents property condition
  - AI-enhanced photos that alter property appearance
  - Chatbot interactions that make unauthorized promises
  - Deepfake video tours of properties
  - No current federal disclosure requirements

  2. Digital Advertising and Fair Housing:
  - Algorithmic bias in ad targeting
  - Platform monopoly effects on RE marketing
  - Dark patterns in lead capture
  - Data privacy in open house sign-ins
  - Accessibility of digital marketing content

  3. Consumer Protection:
  - Standardized disclosure requirements
  - Marketing content archival requirements
  - Consumer complaint mechanisms
  - Enforcement mechanisms and penalties
  - Interstate marketing consistency

  4. Innovation and Competition:
  - Balancing regulation with innovation
  - Small agent vs large brokerage impact
  - PropTech startup ecosystem effects
  - International competitiveness
  - Technology mandate considerations

  Create:
  1. Written testimony for Congressional hearing
  2. Policy proposal with specific legislative language
  3. Regulatory impact analysis
  4. Industry implementation roadmap
  5. Consumer protection framework
  6. Innovation safeguard provisions
  7. Enforcement mechanism recommendations

assertions:
  - type: llm_judge
    criteria: "Written testimony is authoritative and balanced — presents expert knowledge with specific examples, acknowledges legitimate concerns on all sides, avoids partisan framing, and makes concrete recommendations with supporting evidence."
    weight: 0.35
    description: "TestimonyAuthority"
  - type: llm_judge
    criteria: "Policy proposals are specific and implementable — includes actual regulatory language or frameworks, considers enforcement mechanisms and costs, addresses interstate commerce issues, and phases implementation to allow industry adaptation."
    weight: 0.35
    description: "PolicySpecificity"
  - type: llm_judge
    criteria: "Innovation safeguards prevent regulatory overreach — ensures regulations target harmful practices rather than technologies, include safe harbors for good-faith compliance, and don't disproportionately burden small agents or startups."
    weight: 0.30
    description: "InnovationSafeguards"
