meta:
  id: promotional-technology-unicorn
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Scale a PropTech startup from MVP to unicorn status — building the platform that redefines how the global real estate industry creates and distributes open house promotional content"
  tags: [proptech-unicorn, scaling, global-platform, master]

state: {}

trigger: |
  Scale "OpenHouseOS" from successful MVP to global
  platform. After 2 years, you've achieved product-market
  fit in the US. Now build a unicorn-scale PropTech company.

  Current state (Year 2):
  - 15,000 paying agents (US only)
  - $8M ARR, growing 15% MoM
  - Series A: $25M raised (Andreessen Horowitz lead)
  - 45-person team
  - NPS: 72 (exceptional for RE tech)
  - Features: template engine, social scheduling, analytics
  - Integrations: 3 CRMs, 2 MLS feeds

  Growth targets (Year 2-5):
  - Year 3: 75,000 agents, $40M ARR, international launch
  - Year 4: 200,000 agents, $120M ARR, platform ecosystem
  - Year 5: 500,000 agents, $350M ARR, unicorn valuation

  Strategic challenges:

  Product evolution:
  - AI content generation (images, copy, video)
  - Real-time performance optimization
  - Marketplace for content creators and photographers
  - Consumer-facing features (buyer-side experience)
  - Virtual/AR open house experiences

  International expansion:
  - UK/Australia (Year 3, similar markets)
  - Continental Europe (Year 4, regulatory complexity)
  - Asia-Pacific (Year 5, platform differences)
  - Localization beyond translation

  Competitive moat:
  - Network effects from shared content performance data
  - MLS integrations as barriers to entry
  - AI models trained on millions of campaigns
  - Brokerage enterprise contracts (switching costs)

  Create:
  1. Product roadmap (Years 3-5 by quarter)
  2. International expansion playbook
  3. AI strategy and competitive differentiation
  4. Enterprise sales motion design
  5. Marketplace and ecosystem strategy
  6. Organizational scaling plan
  7. Fundraising strategy (Series B through D)

assertions:
  - type: llm_judge
    criteria: "Product roadmap balances innovation with execution — doesn't try to build everything at once, sequences features based on customer demand and technical dependencies, and maintains focus on the core value proposition while expanding."
    weight: 0.35
    description: "ProductRoadmapFocus"
  - type: llm_judge
    criteria: "International expansion acknowledges real complexity — doesn't assume US playbook works globally, addresses regulatory differences, platform preferences, agent workflow variations, and the challenge of building local teams and relationships."
    weight: 0.35
    description: "InternationalExpansionRealism"
  - type: llm_judge
    criteria: "Competitive moat strategy builds compounding advantages — network effects get stronger with more users, AI models improve with more data, and ecosystem lock-in increases with more integrations; the moat deepens over time."
    weight: 0.30
    description: "CompetitiveMoatDepth"
