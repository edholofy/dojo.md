meta:
  id: promotional-graduate-program
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Design a graduate-level academic program in real estate promotional content and marketing — curriculum, research agenda, and academic-industry bridge"
  tags: [graduate-program, academic-design, research-agenda, master]

state: {}

trigger: |
  Design a graduate-level academic program focused on
  real estate promotional content and marketing. A top
  university business school has invited you to create
  this first-of-its-kind specialization.

  University context:
  - Top-25 business school with existing RE finance program
  - Strong marketing department with digital expertise
  - PropTech incubator on campus
  - Industry advisory board with major brokerage CEOs
  - Endowment for 3 faculty positions available

  Program structure options:
  - MS in Real Estate Marketing (standalone, 12-18 months)
  - MBA concentration (6 courses within MBA program)
  - Executive certificate (weekend/online, 6 months)
  - PhD track (research-focused, 4-5 years)

  Curriculum to design for all tracks:

  Core knowledge areas:
  - Real estate market dynamics and consumer behavior
  - Digital marketing strategy and analytics
  - Content creation and brand management
  - Technology and innovation in RE marketing
  - Legal and ethical frameworks
  - Data science applied to RE marketing
  - International comparative RE marketing

  Experiential components:
  - Live client projects with brokerages
  - PropTech startup lab
  - Marketing campaign competition
  - Industry internship requirements
  - Study abroad option (compare global markets)

  Create:
  1. Program design for all four tracks
  2. Detailed course descriptions (15 courses)
  3. Faculty hiring profiles (3 positions)
  4. Research agenda for the center
  5. Industry partnership model
  6. Student recruitment strategy
  7. Program accreditation and assessment plan

assertions:
  - type: llm_judge
    criteria: "Course descriptions blend theory and practice — each course grounds RE marketing in academic frameworks (consumer psychology, media theory, data science) while requiring practical application through real projects; graduates are both thinkers and doers."
    weight: 0.35
    description: "TheoryPracticeBalance"
  - type: llm_judge
    criteria: "Research agenda identifies genuinely unanswered questions — doesn't just study 'what works' but asks deeper questions about consumer decision-making in property contexts, the economics of attention in RE marketing, and the social impact of property promotion."
    weight: 0.35
    description: "ResearchAgendaDepth"
  - type: llm_judge
    criteria: "Industry partnership model benefits both sides — companies get talent pipeline, research insights, and innovation; students get practical experience, mentorship, and job placement; the model is financially sustainable and doesn't compromise academic independence."
    weight: 0.30
    description: "IndustryPartnershipBalance"
