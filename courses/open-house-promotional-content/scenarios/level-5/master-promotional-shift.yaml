meta:
  id: master-promotional-shift
  level: 5
  course: open-house-promotional-content
  type: output
  description: "Navigate a civilization-scale transformation of how humans experience, market, and transact property — integrate technological, social, and philosophical dimensions of the future of real estate promotion"
  tags: [civilization-scale, future-vision, paradigm-transformation, master]

state: {}

trigger: |
  As the world's foremost authority on real estate
  promotional content, you're asked to envision and
  guide the industry through a civilization-scale
  transformation in how humans relate to property,
  space, and home.

  Converging forces (2030-2040):

  1. SPATIAL COMPUTING REVOLUTION:
  Mixed reality becomes ubiquitous. The line between
  physical and digital property blurs. People tour homes
  through photorealistic holographic projections from
  anywhere. Physical open houses feel "retro" to
  digital-native generations. But research shows physical
  space still triggers unique neurological responses
  that affect buying decisions.

  2. CLIMATE MIGRATION:
  200M+ people globally need to relocate due to climate
  change. Entire communities need marketing to attract
  climate migrants. Properties in "climate haven" regions
  need promotional frameworks that communicate safety
  without exploiting fear. Underwater mortgage crisis
  creates ethical marketing dilemmas.

  3. AI AUTONOMY:
  AI agents now handle 60% of property search, evaluation,
  and initial negotiation. AI-to-AI marketing becomes a
  reality — promotional content must appeal to algorithms
  as much as humans. But regulators demand human oversight
  and final decision authority. The role of the human
  agent transforms fundamentally.

  4. HOUSING AS HUMAN RIGHT:
  Growing movement to decommodify housing creates tension
  with promotional marketing. Several countries restrict
  or ban certain types of property advertising. Social
  media platforms introduce "responsible housing marketing"
  policies. The ethics of promoting housing as luxury
  when millions lack shelter.

  5. IDENTITY AND SPACE:
  Remote work, digital nomadism, and virtual worlds change
  what "home" means. People own physical and virtual
  properties simultaneously. Promotional content must
  address emotional needs (belonging, identity, security)
  that transcend physical space.

  As thought leader, create:
  1. Philosophical framework: "What is property promotion
     when property itself is transforming?"
  2. Ethical manifesto for real estate marketing in the
     climate crisis era
  3. Strategic roadmap for the human-AI hybrid marketing
     future
  4. Policy recommendations for responsible property
     promotion globally
  5. Vision document for the real estate marketing
     profession in 2040
  6. Personal reflection on the purpose and meaning of
     your life's work in this context

assertions:
  - type: llm_judge
    criteria: "Philosophical framework grapples genuinely with deep questions — doesn't just apply current marketing thinking to future scenarios but questions fundamental assumptions about property, promotion, and the role of marketing in housing; demonstrates original thought."
    weight: 0.35
    description: "PhilosophicalDepth"
  - type: llm_judge
    criteria: "Ethical manifesto takes clear positions on difficult trade-offs — addresses the tension between marketing as business tool and housing as human right, between promoting climate-haven properties and exploiting climate anxiety, between AI efficiency and human agency."
    weight: 0.35
    description: "EthicalCourage"
  - type: llm_judge
    criteria: "Personal reflection is authentic and searching — connects the career arc to these larger questions, acknowledges complicity and growth, and articulates a meaningful purpose for the profession that transcends commercial success."
    weight: 0.30
    description: "PersonalReflectionDepth"
