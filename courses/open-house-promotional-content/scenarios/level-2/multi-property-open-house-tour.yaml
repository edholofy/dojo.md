meta:
  id: multi-property-open-house-tour
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Create promotional content for a multi-property open house tour — coordinated marketing across multiple listings with route planning, themed branding, and cross-promotion strategies"
  tags: [multi-property, tour-marketing, cross-promotion, intermediate]

state: {}

trigger: |
  Create a coordinated promotional campaign for a
  multi-property open house tour featuring 4 listings
  on the same day.

  Tour Properties (Saturday, sequential timing):

  Stop 1 — 10:00-11:30 AM
  122 Starter Street, $265,000
  - 2BR/1.5BA, 1,100 sq ft, updated condo
  - Perfect first-time buyer property
  - Walk to transit, restaurants

  Stop 2 — 12:00-1:30 PM
  456 Family Court, $425,000
  - 4BR/2.5BA, 2,400 sq ft, cul-de-sac
  - Top-rated school district
  - Large fenced backyard, playset

  Stop 3 — 2:00-3:30 PM
  789 Executive Drive, $615,000
  - 5BR/3.5BA, 3,400 sq ft, upgraded everything
  - Home office suite, wine room
  - Pool and outdoor kitchen

  Stop 4 — 4:00-5:30 PM
  1010 Luxury Lane, $895,000
  - 5BR/4.5BA, 4,200 sq ft, custom estate
  - Smart home, theater room
  - 1-acre lot with views

  Tour concept: "Find Your Perfect Fit" — one day,
  four price points, four lifestyles

  Create:
  1. Unified tour branding and visual identity
  2. Tour map with route and timing guide
  3. Individual property teasers that connect to tour theme
  4. Social media countdown campaign (5 days out)
  5. Day-of social media coverage plan
  6. Cross-promotion strategy between properties

assertions:
  - type: llm_judge
    criteria: "Unified branding connects all four properties cohesively — 'Find Your Perfect Fit' theme ties together different price points without making any property feel inferior; visual identity works across all marketing materials."
    weight: 0.35
    description: "UnifiedTourBranding"
  - type: llm_judge
    criteria: "Individual property teasers highlight each home's unique lifestyle appeal — starter vs family vs executive vs luxury positioning feels aspirational at every level, not just a price ladder."
    weight: 0.35
    description: "IndividualPropertyTeasers"
  - type: llm_judge
    criteria: "Cross-promotion strategy maximizes attendance — buyers who visit one property are encouraged to see others (even at different price points for referral potential); agents can redirect buyers to better-fitting properties."
    weight: 0.30
    description: "CrossPromotionStrategy"
