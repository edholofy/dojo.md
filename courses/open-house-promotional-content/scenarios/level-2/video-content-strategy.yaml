meta:
  id: video-content-strategy
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Develop a comprehensive video content strategy for open house promotion — short-form, long-form, live, and repurposed video across multiple platforms"
  tags: [video-marketing, content-strategy, multi-platform, intermediate]

state: {}

trigger: |
  Develop a comprehensive video content strategy to
  promote an open house across multiple platforms with
  different video formats.

  Property: 234 Modern Way, $465,000
  - 4BR/3BA, 2,800 sq ft, contemporary design
  - Floor-to-ceiling windows with mountain views
  - Open-concept living with 12-foot ceilings
  - Chef's kitchen with waterfall island
  - Master suite with spa bathroom
  - Rooftop deck with panoramic views
  - Open House: Saturday & Sunday 12-4 PM

  Available video resources:
  - Professional videographer (4-hour shoot)
  - Drone pilot (1-hour flight time)
  - Agent comfortable on camera
  - iPhone for casual/authentic content
  - Basic editing software

  Platform requirements:
  - Instagram Reels (15-60 seconds, vertical)
  - TikTok (15-60 seconds, vertical, trending audio)
  - YouTube (3-5 minute property tour)
  - Facebook (1-2 minute highlight, landscape)
  - Instagram Stories (series of 15-second clips)

  Create:
  1. Shot list for professional video shoot
  2. Drone flight plan highlighting views
  3. Instagram Reels concepts (5 variations)
  4. TikTok content strategy (5 hook ideas)
  5. YouTube full tour script
  6. Content calendar leading to open house
  7. Behind-the-scenes authentic content plan

assertions:
  - type: llm_judge
    criteria: "Video concepts are platform-native — Reels use trending formats (transitions, reveals), TikTok hooks capture attention in first 2 seconds, YouTube provides comprehensive value, Facebook suits passive scrolling; each platform gets content designed for how users consume it."
    weight: 0.35
    description: "PlatformNativeContent"
  - type: llm_judge
    criteria: "Shot list maximizes the 4-hour professional shoot — captures hero shots (mountain views, rooftop deck), transition shots for Reels/TikTok, wide establishing shots for YouTube, and b-roll for flexible editing; nothing critical is missed."
    weight: 0.35
    description: "ShotListCompleteness"
  - type: llm_judge
    criteria: "Content calendar builds momentum strategically — teaser content early, feature highlights mid-week, behind-the-scenes closer to event, and day-of live content; each piece drives toward open house attendance."
    weight: 0.30
    description: "ContentCalendarStrategy"
