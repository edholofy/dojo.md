meta:
  id: full-funnel-marketing-campaign
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Create a full-funnel marketing campaign — awareness through conversion, with paid and organic strategies driving open house attendance"
  tags: [full-funnel, paid-organic, conversion-optimization, intermediate]

state: {}

trigger: |
  Design a complete full-funnel marketing campaign for
  a premium listing's open house weekend.

  Property: 1890 Grand Oak Estates, $675,000
  - 5BR/4BA, 3,800 sq ft, custom-built 2020
  - Chef's kitchen, home theater, wine cellar
  - Pool with waterfall, outdoor kitchen
  - Smart home system, solar panels
  - Half-acre lot backing to preserve
  - Grand Open House: Saturday & Sunday 12-4 PM

  Marketing budget: $2,500
  Timeline: 2 weeks before event

  Funnel stages to address:
  1. Awareness: Reach 50,000+ potential buyers
  2. Interest: Drive 5,000+ to listing/landing page
  3. Consideration: Get 500+ to save/share listing
  4. Intent: 100+ RSVPs or expressed interest
  5. Attendance: 40-60 groups through the door
  6. Conversion: 3-5 serious offers

  Available channels:
  - Facebook/Instagram ads ($1,500 budget)
  - Google Ads ($500 budget)
  - Email database (3,200 contacts)
  - Social media organic (8K followers)
  - Agent network (450 agents)
  - Print ($500 budget)
  - Local media/influencer partnerships

  Create:
  1. Channel strategy with budget allocation
  2. Content plan for each funnel stage
  3. Ad creative concepts (3 variations for A/B testing)
  4. Landing page design and lead capture
  5. Retargeting strategy for non-converters
  6. ROI measurement framework

assertions:
  - type: llm_judge
    criteria: "Channel strategy allocates budget strategically — Facebook/Instagram for awareness and retargeting, Google for high-intent searchers, email for warm leads, organic for social proof; each channel has specific KPIs and expected performance."
    weight: 0.35
    description: "ChannelStrategy"
  - type: llm_judge
    criteria: "Content varies by funnel stage — top-of-funnel uses stunning visuals and lifestyle content, mid-funnel provides detailed property info and neighborhood data, bottom-funnel creates urgency and specific CTAs; retargeting addresses those who viewed but didn't RSVP."
    weight: 0.35
    description: "FunnelContentStrategy"
  - type: llm_judge
    criteria: "ROI measurement connects spend to outcomes — tracks cost-per-RSVP, cost-per-attendee, and ultimately cost-per-offer; attributes conversions to specific channels; establishes benchmarks for future campaigns."
    weight: 0.30
    description: "ROIMeasurement"
