meta:
  id: broker-open-marketing
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Design a broker open house marketing campaign — create excitement among agents, provide market positioning data, and generate cooperative showing activity"
  tags: [broker-open, agent-marketing, cooperative-showing, intermediate]

state: {}

trigger: |
  Plan a broker open house that generates excitement
  among agents and results in buyer showings. This is
  a new listing in a competitive market.

  Property: 789 Summit View, $548,000
  - New listing, just hit market today
  - 4BR/3.5BA, 3,200 sq ft, contemporary design
  - Open-concept with cathedral ceilings
  - Home office with built-in cabinetry
  - Theater room with 4K projector
  - Solar array (owned, not leased)
  - EV charging in garage
  - Broker Open: Tuesday 11 AM - 1 PM

  Agent database:
  - 450 agents in your board
  - 85 have active buyers in this price range
  - 30 are top producers (10+ transactions/year)
  - Average agent brings 2.3 buyers per listing viewed

  Broker open differentiation:
  - Catered lunch (BBQ food truck)
  - Raffle: $100 restaurant gift card
  - CMA packet showing competitive positioning
  - Technology feature demo (smart home, solar app)
  - Listing agent available for full tour and Q&A

  Create:
  1. Agent invitation (email + social media)
  2. CMA/competitive positioning packet
  3. Event experience design
  4. Agent feedback collection strategy
  5. Post-broker open follow-up campaign
  6. Converting agent visits to buyer showings

assertions:
  - type: llm_judge
    criteria: "Agent invitation creates genuine interest — highlights what makes this listing different (theater room, solar, EV charging), mentions the food truck and raffle as incentives, and provides enough detail for agents to determine if their buyers might be interested."
    weight: 0.35
    description: "AgentInvitationEffectiveness"
  - type: llm_judge
    criteria: "CMA packet positions the listing competitively — shows comparable sales, explains how this property's features (solar, theater, contemporary design) differentiate it, and gives agents talking points they can use with their buyers."
    weight: 0.35
    description: "CompetitivePositioning"
  - type: llm_judge
    criteria: "Follow-up strategy converts broker visits to buyer showings — collects agent feedback systematically, follows up with specific agents whose buyers match, provides marketing materials agents can share with clients, and tracks conversion from broker open to showings."
    weight: 0.30
    description: "ConversionStrategy"
