meta:
  id: virtual-open-house-experience
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Design a virtual open house experience — live streaming, 3D tours, interactive features, and hybrid in-person/virtual events"
  tags: [virtual-open-house, live-streaming, 3d-tours, intermediate]

state: {}

trigger: |
  Design a virtual open house experience that reaches
  buyers who can't attend in person — out-of-state
  relocators, international buyers, and busy professionals.

  Property: 456 Lakeside Drive, $525,000
  - Waterfront, 4BR/3BA, 2,600 sq ft
  - Expansive lake views from 3 rooms
  - Dock with boat lift
  - Screened lanai with outdoor living
  - Updated throughout, move-in ready

  Virtual experience requirements:
  - Must convey the property's waterfront appeal
  - Must allow real-time Q&A
  - Must capture leads effectively
  - Must be reusable as marketing content after event
  - Must be accessible on mobile devices

  Technology options:
  - Instagram/Facebook Live
  - Zoom with screen sharing
  - Matterport 3D tour
  - Pre-recorded professional video
  - Interactive floor plan with hotspots

  Audience segments for virtual:
  - Out-of-state relocators (40% of expected interest)
  - International buyers (10%)
  - Busy professionals who can't attend weekend (25%)
  - Second-home buyers (25%)

  Create:
  1. Virtual open house format and technology selection
  2. Live stream script and run-of-show
  3. Interactive 3D tour design
  4. Lead capture and follow-up integration
  5. Hybrid event coordination (in-person + virtual)
  6. Post-event content repurposing plan

assertions:
  - type: llm_judge
    criteria: "Technology selection matches the property and audience — waterfront properties need video (not just photos) to convey the experience; live stream allows real-time lake views; 3D tour enables self-guided exploration after the live event."
    weight: 0.35
    description: "TechnologySelection"
  - type: llm_judge
    criteria: "Live stream script is engaging and thorough — walks through the property highlighting lake views at key moments, answers common questions proactively, includes a dock/outdoor tour, and has natural pacing that doesn't feel rushed."
    weight: 0.35
    description: "LiveStreamScript"
  - type: llm_judge
    criteria: "Content repurposing plan maximizes investment — live stream becomes YouTube video, clips become Reels/TikToks, 3D tour lives on listing indefinitely, and Q&A highlights become FAQ content; each piece serves a different marketing purpose."
    weight: 0.30
    description: "ContentRepurposing"
