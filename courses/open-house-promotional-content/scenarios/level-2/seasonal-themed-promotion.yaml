meta:
  id: seasonal-themed-promotion
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Create seasonally-themed open house promotions — leverage holidays, seasons, and local events to make open houses memorable and shareable"
  tags: [seasonal-marketing, themed-events, community-tie-ins, intermediate]

state: {}

trigger: |
  Create seasonally-themed open house promotional content
  for four different properties across different times
  of year.

  Property 1 — Spring (April):
  - 234 Garden Way, $395,000
  - Beautiful landscaping, flower gardens, patio
  - Theme opportunity: "Spring Into Your New Home"
  - Event idea: Local garden club partnership

  Property 2 — Summer (July):
  - 567 Poolside Drive, $485,000
  - In-ground pool, outdoor kitchen, fire pit
  - Theme opportunity: "Summer Living at Its Best"
  - Event idea: Pool party open house

  Property 3 — Fall (October):
  - 890 Harvest Lane, $355,000
  - Large lot, mature trees, cozy fireplace
  - Theme opportunity: "Fall in Love with This Home"
  - Event idea: Fall festival/harvest theme

  Property 4 — Winter (December):
  - 123 Evergreen Circle, $415,000
  - Updated kitchen, family room, gas fireplace
  - Theme opportunity: "Home for the Holidays"
  - Event idea: Holiday decorating showcase

  For each property/season, create:
  1. Themed social media campaign (3 posts)
  2. Event concept with experiential elements
  3. Seasonal photography/video direction
  4. Community partnership opportunities

assertions:
  - type: llm_judge
    criteria: "Each seasonal theme is creative but tasteful — themes enhance the property's features (spring gardens, summer pool, fall coziness, winter warmth) without being gimmicky or overshadowing the home itself."
    weight: 0.35
    description: "ThemeCreativity"
  - type: llm_judge
    criteria: "Event concepts create shareable moments — experiential elements encourage attendees to post on social media (photo-worthy setups, interactive features), extending reach organically beyond paid promotion."
    weight: 0.35
    description: "ShareableExperiences"
  - type: llm_judge
    criteria: "Community partnerships are mutually beneficial — local businesses (garden club, caterer, decorator) gain exposure at the event, agent gains credibility and content, and the partnership feels natural rather than forced."
    weight: 0.30
    description: "CommunityPartnerships"
