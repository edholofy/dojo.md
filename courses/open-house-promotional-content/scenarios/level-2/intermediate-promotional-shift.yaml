meta:
  id: intermediate-promotional-shift
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Navigate a promotional crisis when open house plans change suddenly — adapt marketing materials, manage audience expectations, and pivot strategy while maintaining momentum"
  tags: [crisis-management, promotional-pivot, audience-communication, intermediate]

state: {}

trigger: |
  Your open house promotional campaign is in full swing
  when multiple complications arise simultaneously.
  Adapt your strategy while maintaining momentum.

  Original plan:
  Property: 890 Riverside Drive, $445,000
  - 4BR/2.5BA, 2,200 sq ft, river views
  - Updated throughout, beautiful landscaping
  - Open House: Saturday 1-4 PM
  - Budget: $500 already spent on promotion
  - 200+ RSVPs/interested via social media
  - Professional photos posted, video scheduled

  Complications (Tuesday before Saturday event):

  1. WEATHER: Severe storm forecast for Saturday
     - River views are a key selling point
     - Outdoor features can't be shown properly
     - Attendance likely to drop 60-70%

  2. COMPETING EVENT: Biggest open house weekend of
     the season just announced by competing brokerage
     - 15 properties on the same Saturday
     - They're running a "Mega Open House Tour" with
       prizes and food trucks

  3. SELLER CONCERN: Seller saw low online engagement
     on early posts and is questioning the strategy
     - Wants to cancel and relist with another agent
     - Needs reassurance and adjusted expectations

  4. LAST-MINUTE ASSET: A drone video from the prior
     listing (6 months ago, sunny day) is available
     but shows the old owner's furniture/decor

  Address all four challenges:
  1. Weather contingency promotional plan
  2. Competitive differentiation strategy
  3. Seller communication and expectation management
  4. Repurposed content strategy using old drone footage
  5. Revised social media messaging
  6. Post-event recovery plan if attendance is low

assertions:
  - type: llm_judge
    criteria: "Weather contingency is creative, not just postponement — considers Sunday backup, virtual tour alternative, 'exclusive small-group showing' reframe, or 'cozy rainy day' angle; turns the negative into a marketing opportunity."
    weight: 0.35
    description: "WeatherContingencyCreativity"
  - type: llm_judge
    criteria: "Competitive differentiation addresses the mega event directly — positions the single listing as intimate and focused vs the overwhelming tour, highlights quality over quantity, or finds ways to complement rather than compete."
    weight: 0.35
    description: "CompetitiveDifferentiation"
  - type: llm_judge
    criteria: "Seller communication is empathetic and strategic — acknowledges concerns without being defensive, reframes engagement metrics in context, presents the adapted plan with confidence, and demonstrates value rather than just promising results."
    weight: 0.30
    description: "SellerCommunication"
