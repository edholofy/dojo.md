meta:
  id: digital-advertising-campaign
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Build a digital advertising campaign for open houses — Facebook, Instagram, and Google Ads with targeting, creative, and optimization strategies"
  tags: [digital-advertising, facebook-ads, google-ads, intermediate]

state: {}

trigger: |
  Build a complete digital advertising campaign to
  drive attendance to an open house.

  Property: 345 Oakmont Drive, $399,000
  - 3BR/2.5BA, 2,000 sq ft, move-in ready
  - Updated kitchen and bathrooms
  - Finished basement with bar
  - Walking distance to downtown shops/restaurants
  - Open house: Saturday 1-4 PM

  Ad budget: $750 (10 days before event)
  
  Platform allocation to recommend:
  - Facebook/Instagram: $___
  - Google Ads: $___
  - Other (Waze, Nextdoor, etc.): $___

  Target audience parameters:
  - Geographic: 15-mile radius + 3 feeder markets
    (people relocating from nearby cities)
  - Demographic: Ages 28-55, household income $75K+
  - Interest: Home buying, real estate, home improvement
  - Behavior: Recently searching Zillow/Realtor.com

  Available creative assets:
  - 15 professional photos
  - 30-second video walkthrough
  - Agent headshot
  - Floor plan
  - Neighborhood map

  Create:
  1. Platform budget allocation with rationale
  2. Facebook/Instagram ad campaign structure
  3. Google Ads campaign structure
  4. Ad creative variations (3 concepts per platform)
  5. Audience targeting strategy
  6. Optimization plan (what to adjust and when)

assertions:
  - type: llm_judge
    criteria: "Budget allocation is strategic — allocates more to Facebook/Instagram (visual platform, targeting precision) with Google capturing high-intent searches; provides specific rationale for the split based on audience behavior and platform strengths."
    weight: 0.35
    description: "BudgetAllocation"
  - type: llm_judge
    criteria: "Ad creative variations test meaningfully different approaches — not just different photos but different hooks (lifestyle vs features vs urgency), formats (carousel vs video vs single image), and copy angles; each variation has a hypothesis for why it might work."
    weight: 0.35
    description: "CreativeVariations"
  - type: llm_judge
    criteria: "Optimization plan is specific and timeline-aware — day 1-3 let ads learn, day 4-5 pause underperformers and increase budget on winners, day 6-10 retarget engaged users and push final urgency; includes specific metrics to evaluate each variation."
    weight: 0.30
    description: "OptimizationPlan"
