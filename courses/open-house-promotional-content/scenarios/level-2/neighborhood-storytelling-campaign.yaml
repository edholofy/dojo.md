meta:
  id: neighborhood-storytelling-campaign
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Create a neighborhood-focused storytelling campaign for an open house — weave the community narrative into property promotion to sell the lifestyle, not just the home"
  tags: [neighborhood-marketing, storytelling, community-content, intermediate]

state: {}

trigger: |
  Create a neighborhood storytelling campaign that
  promotes an open house by selling the lifestyle and
  community, not just the property.

  Property: 567 Elm Street, $375,000
  - 3BR/2BA, 1,800 sq ft, charming craftsman
  - Original hardwood floors, built-in bookshelves
  - Updated kitchen with farmhouse sink
  - Covered front porch, detached garage
  - Open House: Sunday 1-4 PM

  Neighborhood: Historic Elmwood District
  - Walkability score: 89
  - Local coffee shop (The Daily Grind) — 2 blocks
  - Farmers market every Saturday — 4 blocks
  - Award-winning elementary school — 0.5 miles
  - Community garden — 1 block
  - Annual block party tradition (20+ years)
  - Mix of young families and longtime residents
  - Local bookstore, bakery, hardware store
  - Tree-lined streets, sidewalks throughout

  Storytelling assets:
  - Neighbor testimonials (3 willing participants)
  - Historic photos of the neighborhood (1920s-present)
  - Map of walkable amenities
  - Seasonal photos (all four seasons)

  Create:
  1. Neighborhood narrative arc (story framework)
  2. "A Day in the Life" content series (3 posts)
  3. Neighbor spotlight features (short profiles)
  4. Walking tour content with open house tie-in
  5. Community-focused social media campaign
  6. Storytelling integration into open house event

assertions:
  - type: llm_judge
    criteria: "Neighborhood narrative creates emotional connection — tells a story about community life that makes viewers imagine themselves living there; uses specific details (coffee shop name, block party tradition) rather than generic neighborhood praise."
    weight: 0.35
    description: "NarrativeEmotionalConnection"
  - type: llm_judge
    criteria: "'A Day in the Life' content is vivid and relatable — paints specific daily scenes (morning coffee walk, Saturday market, evening porch sitting) that feel authentic and aspirational without being fabricated."
    weight: 0.35
    description: "DayInLifeContent"
  - type: llm_judge
    criteria: "Storytelling seamlessly integrates with open house promotion — the neighborhood story naturally leads to 'come see for yourself' at the open house; it doesn't feel like two separate campaigns awkwardly merged."
    weight: 0.30
    description: "StorytellingIntegration"
