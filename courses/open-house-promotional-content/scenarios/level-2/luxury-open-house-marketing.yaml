meta:
  id: luxury-open-house-marketing
  level: 2
  course: open-house-promotional-content
  type: output
  description: "Create luxury open house promotional content — premium branding, exclusive invitation strategies, and white-glove event marketing for high-end properties"
  tags: [luxury-marketing, premium-branding, exclusive-events, intermediate]

state: {}

trigger: |
  Market a luxury open house event for a $2.1M estate.
  The marketing must match the property's prestige.

  Property: 1 Belmont Estate Lane, $2,100,000
  - 6BR/5.5BA, 5,800 sq ft, custom built 2019
  - Imported Italian marble, custom millwork throughout
  - Professional chef's kitchen with La Cornue range
  - Wine cellar (200 bottles), tasting room
  - Infinity pool overlooking valley
  - 3-car garage with epoxy floor, car lift
  - Smart home with Crestron automation
  - 2-acre manicured grounds with mature gardens
  - Exclusive Open House: Sunday 2-5 PM (by invitation)

  Target audience:
  - High-net-worth individuals (liquid assets $5M+)
  - Luxury agent network (top 50 agents in market)
  - Relocation executives (corporate transferees)
  - International buyers (connections through luxury
    RE networks)

  Marketing budget: $8,000
  Brand standards: Elegant, understated, exclusive

  Create:
  1. Exclusive invitation (digital and printed)
  2. Property brochure/lookbook design concept
  3. Social media campaign (luxury aesthetic)
  4. PR/media outreach strategy
  5. Event experience design (catering, atmosphere)
  6. Follow-up strategy for luxury prospects

assertions:
  - type: llm_judge
    criteria: "Invitation conveys exclusivity and prestige — uses premium design language, high-quality materials (for print), and creates a sense of exclusive access; doesn't feel like a mass-market open house announcement."
    weight: 0.35
    description: "ExclusiveInvitation"
  - type: llm_judge
    criteria: "Property brochure/lookbook is editorial quality — describes features as lifestyle experiences (not just specs), uses evocative language appropriate for luxury (subtle, not overwrought), and includes professional photography concepts."
    weight: 0.35
    description: "LuxuryBrochure"
  - type: llm_judge
    criteria: "Event experience matches the property — curated catering (not generic hors d'oeuvres), ambient atmosphere (live music, floral design), guided tour by agent, and white-glove hospitality; the event IS the marketing."
    weight: 0.30
    description: "EventExperienceDesign"
