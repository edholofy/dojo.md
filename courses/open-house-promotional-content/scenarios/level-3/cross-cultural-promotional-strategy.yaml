meta:
  id: cross-cultural-promotional-strategy
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Develop cross-cultural open house promotional strategies — adapt messaging, visuals, channels, and event formats for diverse buyer demographics and international audiences"
  tags: [cross-cultural, diversity-marketing, international-buyers, advanced]

state: {}

trigger: |
  Develop a cross-cultural promotional strategy for
  open houses in a highly diverse market. Content must
  resonate across cultural backgrounds without
  stereotyping or excluding any group.

  Market demographics:
  - Metro area: 2.3M population
  - Hispanic/Latino: 28% (growing, many first-gen buyers)
  - Asian (Chinese, Indian, Vietnamese, Korean): 18%
  - African American: 15%
  - International relocations: 12% of transactions
  - Multigenerational households: 22% of buyers

  Property: 456 Heritage Boulevard, $520,000
  - 5BR/3.5BA, 3,100 sq ft
  - Multigenerational-friendly layout
  - Large kitchen with two prep areas
  - First-floor bedroom suite
  - Spacious backyard for entertaining
  - Near cultural centers, international grocers
  - Open House: Saturday & Sunday 12-5 PM

  Cultural considerations:
  - Platform preferences vary by demographic
  - WeChat, WhatsApp groups, KakaoTalk usage
  - Language accessibility needs
  - Cultural taboos in home features (feng shui, etc.)
  - Community trust networks vs mass marketing
  - Religious/cultural calendar awareness

  Create:
  1. Culturally-inclusive messaging framework
  2. Platform strategy by demographic segment
  3. Multilingual content plan (key languages)
  4. Community ambassador/influencer partnerships
  5. Culturally-sensitive visual and staging guidance
  6. Event format adaptations for cultural preferences

assertions:
  - type: llm_judge
    criteria: "Messaging framework is genuinely inclusive, not tokenistic — goes beyond translating English copy to understanding what different cultures prioritize in homes (multigenerational living, kitchen size, proximity to community); avoids stereotypes while acknowledging real cultural preferences."
    weight: 0.35
    description: "GenuineInclusivity"
  - type: llm_judge
    criteria: "Platform strategy reflects actual usage patterns — recognizes that different communities use different platforms (WeChat for Chinese buyers, WhatsApp groups for Latino communities, KakaoTalk for Korean) and adapts content format, not just language."
    weight: 0.35
    description: "PlatformCulturalFit"
  - type: llm_judge
    criteria: "Community partnerships build authentic trust — leverages existing community networks, cultural organizations, and trusted figures rather than relying solely on mass-market advertising; understands that trust-based referral is paramount in many cultures."
    weight: 0.30
    description: "CommunityTrustBuilding"
