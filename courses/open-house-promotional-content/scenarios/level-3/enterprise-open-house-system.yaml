meta:
  id: enterprise-open-house-system
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Design an enterprise-level open house promotional system for a large brokerage — standardized templates, brand guidelines, agent training, and scalable workflows across hundreds of listings"
  tags: [enterprise-system, brokerage-operations, scalable-marketing, advanced]

state: {}

trigger: |
  Design a comprehensive open house promotional system
  for a 200-agent brokerage that hosts 50-80 open houses
  per weekend. The system must ensure brand consistency
  while allowing agent personalization.

  Brokerage: Premier Realty Group
  - 200 agents across 8 offices
  - 50-80 open houses per weekend
  - Annual marketing budget: $2.4M
  - Current problem: inconsistent quality, no standards
  - Brand identity exists but agents ignore it
  - Mix of tech-savvy and traditional agents

  System requirements:
  - Standardized promotional templates (customizable)
  - Automated social media scheduling
  - Centralized content calendar
  - Quality control and approval workflows
  - Performance tracking across all open houses
  - Agent training and certification

  Technology constraints:
  - Agents use various CRMs (no single platform)
  - Budget for marketing tech: $150K/year
  - Must integrate with MLS auto-posting
  - Mobile-first (agents work from phones)

  Create:
  1. Promotional template library (categories and specs)
  2. Brand compliance framework with flexibility zones
  3. Technology stack recommendation
  4. Agent onboarding and training program
  5. Quality assurance workflow
  6. Performance metrics and reporting dashboard
  7. Scalability plan for growth to 400 agents

assertions:
  - type: llm_judge
    criteria: "Template library balances consistency with personalization — provides mandatory brand elements (logo, colors, fonts) with flexible zones for agent photos, property details, and personal messaging; agents feel ownership while brokerage maintains brand integrity."
    weight: 0.35
    description: "TemplateLibraryDesign"
  - type: llm_judge
    criteria: "Technology stack is practical for a mixed-tech-savvy team — recommends tools that work on mobile, integrate with existing CRMs via APIs or Zapier, and don't require extensive training; acknowledges the reality of agent adoption challenges."
    weight: 0.35
    description: "TechnologyPracticality"
  - type: llm_judge
    criteria: "Quality assurance workflow doesn't bottleneck operations — review process handles 50-80 listings per week without creating delays; uses automation for compliance checks and human review only for edge cases."
    weight: 0.30
    description: "QAWorkflowEfficiency"
