meta:
  id: ai-powered-content-generation
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Design an AI-powered content generation pipeline for open house promotion — automated copywriting, image generation, personalization engines, and human-AI collaboration workflows"
  tags: [ai-content, automation, personalization, advanced]

state: {}

trigger: |
  Design an AI-powered content generation pipeline that
  automates open house promotional content creation while
  maintaining quality and authenticity.

  Current pain points:
  - Agents spend 3-5 hours per listing on promotion
  - Content quality varies wildly between agents
  - Repetitive copy across similar properties
  - Missed posting windows due to time constraints
  - No personalization for different buyer segments

  AI capabilities to integrate:
  - LLM for copy generation (descriptions, social posts)
  - Image AI for virtual staging and enhancement
  - Predictive analytics for optimal posting times
  - NLP for sentiment analysis of engagement
  - Recommendation engines for content templates

  Constraints:
  - Must feel authentic, not AI-generated
  - Fair housing compliance is non-negotiable
  - Agent voice and personal brand must be preserved
  - MLS accuracy requirements for property details
  - Client approval workflows required
  - Budget: $50K for initial implementation

  Create:
  1. AI content generation pipeline architecture
  2. Prompt engineering templates for property copy
  3. Human-AI collaboration workflow (who reviews what)
  4. Fair housing compliance safeguards
  5. Personalization engine design (buyer segment targeting)
  6. Quality scoring and continuous improvement loop
  7. Agent training for AI-assisted content creation

assertions:
  - type: llm_judge
    criteria: "Pipeline architecture is practical and well-sequenced — MLS data feeds into AI for draft generation, agent reviews and personalizes, compliance check runs automatically, then scheduling and distribution; each step adds value without creating bottlenecks."
    weight: 0.35
    description: "PipelineArchitecture"
  - type: llm_judge
    criteria: "Fair housing compliance is deeply integrated, not bolted on — AI prompts are designed to avoid discriminatory language from the start, automated scanners catch violations before posting, and the system logs all content for audit trails."
    weight: 0.35
    description: "FairHousingIntegration"
  - type: llm_judge
    criteria: "Human-AI collaboration preserves authenticity — agents add personal touches, local knowledge, and emotional context that AI can't replicate; the workflow makes it easy for agents to enhance AI drafts rather than just approve them."
    weight: 0.30
    description: "HumanAICollaboration"
