meta:
  id: data-driven-promotional-optimization
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Build a data-driven open house promotional optimization framework — A/B testing, attribution modeling, ROI analysis, and predictive content performance"
  tags: [data-analytics, ab-testing, roi-optimization, advanced]

state: {}

trigger: |
  Build a data-driven framework to optimize open house
  promotional content performance. Use historical data
  to predict what works and continuously improve.

  Historical data available (past 12 months):
  - 450 open houses promoted across all channels
  - Social media: 1,800 posts (avg 2.3% engagement)
  - Email campaigns: 96 sends (avg 22% open rate)
  - Digital ads: $180K spent (avg $12.50 per RSVP)
  - Print: 450 flyer designs distributed
  - Video: 120 property videos produced

  Performance variations observed:
  - Top 10% of posts: 8.5% engagement rate
  - Bottom 10%: 0.4% engagement rate
  - Best email subject lines: 38% open rate
  - Worst email subject lines: 9% open rate
  - Some ads: $3.50/RSVP; others: $45/RSVP

  Key questions to answer:
  - What visual styles drive highest engagement?
  - Which copy approaches generate most RSVPs?
  - How does posting time/day affect performance?
  - Which platforms deliver best ROI by property type?
  - How do seasonal factors affect promotion success?

  Create:
  1. Content performance taxonomy and tagging system
  2. A/B testing framework for promotional content
  3. Attribution model (touch to attendance to sale)
  4. Predictive content scoring model
  5. Real-time optimization decision framework
  6. Monthly reporting and insight generation process

assertions:
  - type: llm_judge
    criteria: "Content taxonomy enables meaningful analysis — tags capture actionable variables (hook type, visual style, CTA placement, property price range, day of week) that can be correlated with performance; not just surface-level categorization."
    weight: 0.35
    description: "ContentTaxonomy"
  - type: llm_judge
    criteria: "A/B testing framework is statistically sound — defines minimum sample sizes, test duration, confidence levels, and isolation of variables; understands that real estate's small sample sizes require different approaches than e-commerce A/B testing."
    weight: 0.35
    description: "ABTestingRigor"
  - type: llm_judge
    criteria: "Attribution model connects content to business outcomes — tracks the journey from social impression to RSVP to attendance to offer, acknowledging the multi-touch nature and long timelines of real estate purchases."
    weight: 0.30
    description: "AttributionModel"
