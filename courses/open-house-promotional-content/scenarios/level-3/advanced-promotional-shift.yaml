meta:
  id: advanced-promotional-shift
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Navigate a complex promotional crisis involving multiple stakeholders, legal concerns, and market disruption — integrate systems thinking across enterprise promotional operations"
  tags: [crisis-integration, systems-thinking, multi-stakeholder, advanced]

state: {}

trigger: |
  Your brokerage faces a perfect storm of promotional
  challenges that test every system you've built. Address
  all issues with integrated, systems-level thinking.

  Situation (all happening simultaneously):

  1. PLATFORM DISRUPTION:
  Meta (Facebook/Instagram) announces new restrictions on
  real estate advertising — all housing ads now require
  special category certification, targeting is limited to
  geographic radius only (no demographic/interest targeting),
  and AI-generated content must be labeled. This affects
  70% of your digital promotion strategy.

  2. COMPETITOR INNOVATION:
  A tech-forward competitor launches an AI-powered "instant
  open house" app — buyers can request private showings
  within 2 hours via the app. Their marketing tagline:
  "Why wait for an open house?" It's gaining viral traction.

  3. AGENT REVOLT:
  15 top-producing agents (representing 40% of volume)
  threaten to leave if the brokerage mandates use of the
  new promotional templates and compliance review process.
  They claim it "kills their personal brand" and "slows
  them down."

  4. LEGAL EXPOSURE:
  A fair housing audit reveals that 23% of your brokerage's
  open house promotions from the past year contain
  potentially non-compliant language. Three formal
  complaints are pending with the state commission.

  5. BUDGET CUT:
  Corporate announces a 30% reduction in marketing budget
  for Q3 due to market slowdown. Revenue is down 22% YoY.

  Create a comprehensive response that:
  1. Adapts digital strategy to new platform restrictions
  2. Competitive response to the "instant showing" disruptor
  3. Agent retention and change management plan
  4. Fair housing remediation with legal protection
  5. Budget reallocation strategy under constraints
  6. Integrated timeline for executing all changes

assertions:
  - type: llm_judge
    criteria: "Response treats all five challenges as interconnected, not isolated — budget cuts inform platform strategy, agent revolt connects to compliance requirements, competitive response leverages open house's strengths that instant showings can't replicate."
    weight: 0.35
    description: "IntegratedSystemsThinking"
  - type: llm_judge
    criteria: "Agent retention plan balances compliance with autonomy — addresses legitimate concerns about template rigidity while maintaining non-negotiable compliance requirements; finds creative middle ground rather than top-down mandates."
    weight: 0.35
    description: "AgentRetentionBalance"
  - type: llm_judge
    criteria: "Budget reallocation under 30% cut is strategic, not just proportional — identifies highest-ROI channels for increased investment, cuts low-performing spend entirely rather than spreading pain, and leverages free/organic channels more heavily."
    weight: 0.30
    description: "StrategicBudgetReallocation"
