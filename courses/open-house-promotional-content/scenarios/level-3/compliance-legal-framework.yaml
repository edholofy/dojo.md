meta:
  id: compliance-legal-framework
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Build a comprehensive compliance and legal framework for open house promotional content — fair housing, advertising regulations, data privacy, and intellectual property protection"
  tags: [legal-compliance, fair-housing, advertising-law, advanced]

state: {}

trigger: |
  Build a comprehensive compliance and legal framework
  for all open house promotional content. Recent
  regulatory changes and enforcement actions require
  a proactive approach.

  Regulatory landscape:

  Fair Housing Act compliance:
  - Protected classes (race, color, religion, sex,
    national origin, disability, familial status)
  - State/local additions (sexual orientation, gender
    identity, source of income, age)
  - Recent HUD enforcement actions on digital advertising
  - Facebook/Meta settlement on housing ad targeting

  Advertising regulations:
  - State real estate commission ad requirements
  - Brokerage name and license number display
  - Truth in advertising (FTC guidelines)
  - MLS photograph and data usage rights
  - RESPA anti-kickback rules for partnerships
  - TCPA compliance for text/call marketing
  - CAN-SPAM requirements for email

  Data privacy:
  - Open house sign-in data collection
  - CCPA/CPRA compliance (California)
  - GDPR considerations (international buyers)
  - Cookie consent on websites
  - Data sharing with partners/vendors

  Intellectual property:
  - Photo copyright and usage rights
  - Virtual staging disclosure requirements
  - Testimonial and endorsement rules
  - Trademark usage (brand names, MLS)

  Create:
  1. Fair housing content review checklist
  2. Digital advertising compliance protocol
  3. Data privacy and consent framework
  4. Intellectual property usage guidelines
  5. Compliance training curriculum for agents
  6. Audit process and documentation standards
  7. Violation response and remediation procedures

assertions:
  - type: llm_judge
    criteria: "Fair housing checklist is comprehensive and practical — catches both obvious violations (race/religion references) and subtle ones (school district coding, neighborhood descriptions that imply demographics); provides approved alternative language."
    weight: 0.35
    description: "FairHousingChecklist"
  - type: llm_judge
    criteria: "Data privacy framework addresses real estate specifics — covers open house sign-in sheets, lead capture forms, CRM data sharing, and the unique situation where agents collect personal info in someone's home; not just generic GDPR boilerplate."
    weight: 0.35
    description: "DataPrivacySpecificity"
  - type: llm_judge
    criteria: "Compliance training is engaging, not just legal CYA — uses real-world examples and scenarios agents will actually encounter, quizzes with nuanced situations, and makes compliance feel like professional excellence rather than bureaucratic burden."
    weight: 0.30
    description: "TrainingEngagement"
