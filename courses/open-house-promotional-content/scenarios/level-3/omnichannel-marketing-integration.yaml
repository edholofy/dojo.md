meta:
  id: omnichannel-marketing-integration
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Design an omnichannel marketing integration strategy for open house promotion — seamless experience across digital, print, in-person, and emerging channels with unified messaging and tracking"
  tags: [omnichannel, marketing-integration, unified-messaging, advanced]

state: {}

trigger: |
  Design an omnichannel marketing integration strategy
  that delivers a seamless open house promotional
  experience across all touchpoints.

  Available channels (currently siloed):

  Digital:
  - Website/IDX (listing pages, blog)
  - Email marketing (12,000 subscriber list)
  - Social media (FB 8K, IG 5K, LI 3K, TikTok 2K)
  - Google Business Profile
  - YouTube channel (450 subscribers)
  - Text/SMS marketing (3,200 opted-in contacts)

  Print/Physical:
  - Direct mail (targeted neighborhoods)
  - Property flyers and brochures
  - Yard signs and directional signs
  - Local magazine advertisements
  - Community bulletin boards

  In-Person:
  - Open house events
  - Broker opens
  - Community events and sponsorships
  - Networking group presentations

  Emerging:
  - Podcast (monthly, 200 listeners)
  - Waze advertising
  - Nextdoor community posts
  - Connected TV/streaming ads (new)

  Current problems:
  - Each channel has different messaging
  - No way to track a prospect across channels
  - Print and digital teams don't coordinate
  - Event registrations don't connect to CRM
  - Content is created separately for each channel

  Create:
  1. Unified messaging framework across all channels
  2. Channel orchestration timeline (pre, during, post event)
  3. Cross-channel tracking and attribution system
  4. Content creation workflow (create once, adapt many)
  5. CRM integration and lead scoring
  6. Channel-specific optimization within unified strategy
  7. Measurement dashboard design

assertions:
  - type: llm_judge
    criteria: "Unified messaging framework maintains core narrative while adapting to channel strengths — same story told differently on Instagram (visual), email (detailed), SMS (urgent), print (tangible); consistency without identical content."
    weight: 0.35
    description: "UnifiedMessagingAdaptation"
  - type: llm_judge
    criteria: "Cross-channel tracking system is implementable — uses UTM parameters, QR codes on print, unique phone numbers, landing page variants, and CRM tagging to connect touchpoints; acknowledges attribution challenges honestly."
    weight: 0.35
    description: "CrossChannelTracking"
  - type: llm_judge
    criteria: "Content creation workflow eliminates duplication — starts with a 'content core' that gets adapted for each channel, with clear roles and templates; agents don't create content from scratch for each platform."
    weight: 0.30
    description: "ContentWorkflowEfficiency"
