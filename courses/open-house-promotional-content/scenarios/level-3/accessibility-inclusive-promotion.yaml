meta:
  id: accessibility-inclusive-promotion
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Design accessible and inclusive open house promotional content — ADA compliance, universal design principles, and content that reaches people with disabilities"
  tags: [accessibility, inclusive-design, ada-compliance, advanced]

state: {}

trigger: |
  Design an accessible and inclusive promotional content
  strategy for open houses that ensures people with
  disabilities can fully engage with marketing materials
  and attend events.

  Accessibility requirements:

  Digital content:
  - Screen reader compatibility for all materials
  - Alt text standards for property photos
  - Color contrast ratios (WCAG 2.1 AA minimum)
  - Closed captioning for all video content
  - Audio descriptions for virtual tours
  - Keyboard-navigable interactive content

  Physical event accessibility:
  - ADA-compliant property showing procedures
  - Accommodations for wheelchair users
  - Communication aids for hearing-impaired visitors
  - Visual aids for visually-impaired visitors
  - Service animal protocols
  - Sensory-friendly showing options

  Inclusive marketing:
  - Representation in promotional imagery
  - Language that doesn't assume ability
  - Multiple format availability (large print, audio)
  - Accessible RSVP and registration processes

  Property for case study: 234 Universal Drive, $410,000
  - Single-story, 3BR/2BA, 1,900 sq ft
  - Wide doorways, zero-threshold entries
  - Roll-in shower in master bath
  - Open floor plan with clear sightlines
  - Smart home voice controls throughout

  Create:
  1. Accessible content creation guidelines
  2. Property photography accessibility standards
  3. Video content accessibility checklist
  4. Physical event accessibility protocol
  5. Inclusive language guide for real estate
  6. Accessibility audit process for all materials
  7. Training program for agents

assertions:
  - type: llm_judge
    criteria: "Content guidelines are technically thorough — specifies exact WCAG standards, alt text writing protocols, video captioning requirements, and color contrast ratios; not just 'make it accessible' but provides actionable specifications."
    weight: 0.35
    description: "TechnicalAccessibilityStandards"
  - type: llm_judge
    criteria: "Physical event protocols are practical and dignified — accommodations are offered proactively (not just upon request), procedures preserve independence and dignity, and the showing experience is equivalent for all visitors."
    weight: 0.35
    description: "EventAccessibilityDignity"
  - type: llm_judge
    criteria: "Inclusive language guide addresses real estate specifics — handles terms like 'walk-in closet,' 'steps to downtown,' 'master suite' thoughtfully; provides alternatives without being awkward or overly clinical."
    weight: 0.30
    description: "InclusiveLanguageGuide"
