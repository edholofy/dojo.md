meta:
  id: crisis-communication-framework
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Build a crisis communication framework for open house promotion — handle negative publicity, safety incidents, viral misinformation, and reputation management"
  tags: [crisis-communication, reputation-management, risk-mitigation, advanced]

state: {}

trigger: |
  Build a comprehensive crisis communication framework
  for open house promotional activities. Recent incidents
  in the market have highlighted the need for preparedness.

  Recent incidents requiring response protocols:

  Incident A — Safety concern:
  An open house attendee posted on social media that they
  felt unsafe at an open house (aggressive visitor, no
  sign-in protocol). Post went semi-viral locally (2,000+
  shares). Media picked it up.

  Incident B — Fair housing complaint:
  A promoted open house used language that was flagged as
  potentially discriminatory ("perfect for young
  professionals" in a historically diverse neighborhood).
  Complaint filed with HUD.

  Incident C — Misinformation:
  A competitor agent posted a negative review claiming
  your open house property had undisclosed issues (mold,
  foundation). The post appeared in search results and
  social media before the open house.

  Incident D — Social media backlash:
  An open house promotional video was criticized for
  "poverty tourism" because it highlighted how the
  neighborhood was "improving" and showed before/after
  shots of gentrification.

  Create:
  1. Crisis response protocol (first 2 hours, 24 hours, 1 week)
  2. Social media rapid response templates
  3. Media relations strategy and spokesperson prep
  4. Fair housing compliance remediation plan
  5. Reputation recovery content strategy
  6. Prevention framework for future incidents
  7. Training materials for agents

assertions:
  - type: llm_judge
    criteria: "Crisis response protocol has clear escalation paths — defines who responds when, approval chains for public statements, and specific timelines; distinguishes between incidents requiring immediate response (safety) vs measured response (complaints)."
    weight: 0.35
    description: "CrisisProtocol"
  - type: llm_judge
    criteria: "Fair housing remediation is thorough and genuine — doesn't just apologize but reviews all promotional content for similar issues, implements preventive review processes, and demonstrates understanding of why certain language is problematic."
    weight: 0.35
    description: "FairHousingRemediation"
  - type: llm_judge
    criteria: "Prevention framework addresses root causes — training on fair housing language, safety protocols at open houses, social media review processes, and cultural sensitivity awareness; doesn't just react to incidents but systematically prevents them."
    weight: 0.30
    description: "PreventionFramework"
