meta:
  id: content-partnership-ecosystem
  level: 3
  course: open-house-promotional-content
  type: output
  description: "Design a content partnership ecosystem for open house promotion — influencer collaborations, media partnerships, local business co-marketing, and strategic alliance management"
  tags: [content-partnerships, influencer-marketing, co-marketing, advanced]

state: {}

trigger: |
  Design a content partnership ecosystem that amplifies
  open house promotional reach through strategic
  collaborations with influencers, media, and local
  businesses.

  Market context:
  - Metro area: 800K population
  - Active real estate market (4,500 transactions/year)
  - Strong local media (2 newspapers, 4 TV stations,
    12 local blogs/podcasts)
  - Growing influencer community
  - Vibrant small business scene

  Partnership opportunities to develop:

  1. Local influencers:
     - Home decor bloggers (5K-50K followers)
     - Lifestyle content creators (10K-100K followers)
     - Food/restaurant reviewers (for neighborhood content)
     - Family/parenting influencers (school district content)

  2. Media partnerships:
     - Weekly real estate column opportunity
     - TV segment sponsorship (local morning show)
     - Podcast advertising and guest appearances
     - Digital publication sponsored content

  3. Local business co-marketing:
     - Interior designers (staging partnerships)
     - Mortgage lenders (co-hosted events)
     - Home inspectors (educational content)
     - Restaurants/caterers (open house catering)

  Budget: $3,000/month for partnerships

  Create:
  1. Partnership tier structure (free, trade, paid)
  2. Influencer collaboration playbook
  3. Media partnership proposals (3 outlets)
  4. Local business co-marketing program
  5. Content co-creation workflow
  6. Partnership performance measurement
  7. Legal and compliance framework

assertions:
  - type: llm_judge
    criteria: "Partnership tiers are realistic and valuable for both sides — free partnerships offer genuine exposure (not just 'exposure'), trade partnerships exchange equivalent value, and paid partnerships have clear deliverables and ROI expectations."
    weight: 0.35
    description: "PartnershipTierRealism"
  - type: llm_judge
    criteria: "Influencer playbook addresses real estate's unique needs — influencers must comply with fair housing, can't make guarantees about property value, and content must be clearly marked as sponsored; the playbook makes compliance easy rather than burdensome."
    weight: 0.35
    description: "InfluencerPlaybookCompliance"
  - type: llm_judge
    criteria: "Performance measurement connects partnerships to business outcomes — tracks not just impressions and engagement but lead generation, open house attendance, and ultimately closed transactions attributable to partnership content."
    weight: 0.30
    description: "PartnershipROIMeasurement"
