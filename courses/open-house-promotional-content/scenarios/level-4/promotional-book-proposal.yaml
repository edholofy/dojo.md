meta:
  id: promotional-book-proposal
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Write a compelling book proposal for a definitive guide to open house promotional content — publishing strategy, chapter outlines, and market positioning for industry authority"
  tags: [book-proposal, publishing, thought-leadership, expert]

state: {}

trigger: |
  Write a book proposal for the definitive guide to
  open house promotional content. This book will become
  the industry standard reference.

  Book concept: "Open House Mastery: The Complete Guide
  to Promotional Content That Sells"

  Author platform:
  - 18 years in real estate (2,000+ transactions)
  - Created promotional campaigns for $500M+ in listings
  - Keynote speaker at NAR, Inman, Tom Ferry events
  - Monthly column in RISMedia
  - YouTube channel: 25K subscribers (RE marketing)
  - Podcast: "The Open House Advantage" (500 episodes)
  - Developed promotional systems used by 3 national brands

  Target audience:
  - Primary: Real estate agents (years 2-10 in business)
  - Secondary: Team leaders and broker/owners
  - Tertiary: RE marketing professionals and educators

  Comparable titles:
  - "Ninja Selling" by Larry Kendall (relationship-based)
  - "The Conversion Code" by Chris Smith (digital leads)
  - "SOLD" by David Greene (general RE marketing)
  - Gap: No book specifically on open house promotional
    content and event marketing

  Publisher targets:
  - Primary: HarperCollins Leadership / AMACOM
  - Secondary: Wiley Business
  - Self-publish option: Hybrid press consideration

  Create:
  1. Book proposal (complete, submission-ready)
  2. Chapter outline with summaries (15-18 chapters)
  3. Sample chapter (Chapter 1 or strongest chapter)
  4. Marketing and promotion plan for the book
  5. Author platform leverage strategy
  6. Companion digital resources plan

assertions:
  - type: llm_judge
    criteria: "Book proposal is professionally structured — includes market analysis, competitive positioning, author platform summary, chapter-by-chapter outline, and sample material; follows industry-standard proposal format that a literary agent would accept."
    weight: 0.35
    description: "ProposalProfessionalStructure"
  - type: llm_judge
    criteria: "Chapter outline covers the full spectrum comprehensively — from foundational content creation to advanced digital strategy, with practical case studies and actionable frameworks in each chapter; organized for progressive skill building."
    weight: 0.35
    description: "ChapterOutlineComprehensiveness"
  - type: llm_judge
    criteria: "Marketing plan leverages the author's existing platform — uses podcast, YouTube, speaking engagements, and industry relationships to drive pre-orders and launch; creates a flywheel between the book and existing content channels."
    weight: 0.30
    description: "BookMarketingStrategy"
