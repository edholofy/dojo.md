meta:
  id: promotional-governance-framework
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Establish a governance framework for open house promotional standards across a national real estate franchise — policy development, compliance enforcement, and brand protection at scale"
  tags: [governance, franchise-standards, policy-development, expert]

state: {}

trigger: |
  Establish a comprehensive governance framework for
  open house promotional standards across a national
  real estate franchise with 800 offices and 35,000
  agents.

  Organization: National Premier Realty (franchise model)
  - 800 offices across 45 states
  - 35,000 agents (independent contractors)
  - Franchise fee includes marketing support
  - Current state: wildly inconsistent promotional quality
  - Recent class action lawsuit threat over misleading
    promotional content by a franchisee

  Governance challenges:
  - Agents are independent contractors (limited control)
  - State-by-state regulatory variations
  - 800 office owners with different standards
  - Cultural resistance to "corporate control"
  - Technology adoption varies dramatically
  - International franchise expansion planned

  Governance scope:
  - Promotional content standards and approval
  - Brand usage and consistency requirements
  - Fair housing compliance mandates
  - Data privacy and consent protocols
  - Technology platform requirements
  - Quality assurance and auditing
  - Violation enforcement and remediation

  Create:
  1. Governance charter and authority structure
  2. Promotional standards policy document
  3. Compliance tiers (mandatory vs recommended vs optional)
  4. State-by-state regulatory compliance matrix
  5. Enforcement mechanism and violation escalation
  6. Franchise agreement amendment language
  7. Change management and communication plan

assertions:
  - type: llm_judge
    criteria: "Governance structure respects the independent contractor relationship — distinguishes between brand protection requirements (non-negotiable) and best practice recommendations (encouraged); enforcement mechanisms are legally defensible within franchise law."
    weight: 0.35
    description: "GovernanceStructureLegality"
  - type: llm_judge
    criteria: "Compliance tiers are practical and prioritized — mandatory items focus on legal risk and brand damage prevention, recommended items improve quality, optional items enable innovation; agents aren't overwhelmed with requirements."
    weight: 0.35
    description: "ComplianceTierPracticality"
  - type: llm_judge
    criteria: "Change management plan acknowledges resistance and works with it — phases implementation, provides support resources, showcases early adopter success stories, and includes feedback loops; doesn't just mandate compliance but builds buy-in."
    weight: 0.30
    description: "ChangeManagementRealism"
