meta:
  id: promotional-certification-program
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Design a professional certification program for open house promotional excellence — curriculum, assessment, credentialing, and industry recognition"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  Design a professional certification program that
  establishes open house promotional excellence as a
  recognized specialization in real estate.

  Program context:
  - No existing certification for RE promotional skills
  - NAR has 80+ designations but none marketing-specific
  - Agents increasingly compete on marketing ability
  - Brokerages want to hire agents with proven promo skills
  - CE credit approval needed from state commissions

  Certification tiers:
  - Tier 1: Certified Open House Marketing Specialist (COHMS)
    Target: Individual agents, 20-hour program
  - Tier 2: Open House Marketing Manager (OHMM)
    Target: Team leads/marketing directors, 40-hour program
  - Tier 3: Master Open House Marketing Strategist (MOHMS)
    Target: Consultants/trainers, 80-hour + portfolio

  Curriculum must cover:
  - Content creation fundamentals (photo, video, copy)
  - Digital marketing strategy and execution
  - Fair housing compliance in marketing
  - Data analytics and optimization
  - Brand development and consistency
  - Event design and experiential marketing
  - Technology tools and automation
  - Crisis communication and reputation management

  Assessment requirements:
  - Knowledge assessments (not just multiple choice)
  - Practical portfolio submissions
  - Live presentation or campaign defense
  - Peer review component
  - Recertification every 2 years

  Create:
  1. Full curriculum outline for all three tiers
  2. Assessment rubrics and portfolio requirements
  3. Instructor qualification standards
  4. CE credit application strategy
  5. Marketing plan for the certification program
  6. Revenue model and pricing strategy
  7. Advisory board composition and governance

assertions:
  - type: llm_judge
    criteria: "Curriculum progresses logically across tiers — Tier 1 builds foundational skills, Tier 2 adds management and strategy, Tier 3 requires original thought leadership and teaching ability; each tier has clear prerequisites and distinct value."
    weight: 0.35
    description: "CurriculumProgression"
  - type: llm_judge
    criteria: "Assessment methods test real-world competency — portfolio submissions show actual campaign work, presentations demonstrate strategic thinking, and peer review provides industry validation; avoids the trap of certifications that only test memorization."
    weight: 0.35
    description: "AssessmentAuthenticity"
  - type: llm_judge
    criteria: "Revenue model sustains the program independently — accounts for development costs, instructor compensation, marketing, and technology platform; pricing reflects value to agents (ROI from better marketing) and is competitive with other RE designations."
    weight: 0.30
    description: "RevenueSustainability"
