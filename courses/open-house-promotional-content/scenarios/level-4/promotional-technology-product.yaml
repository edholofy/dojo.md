meta:
  id: promotional-technology-product
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Design a SaaS product for open house promotional content — product strategy, feature roadmap, user experience, and go-to-market plan for a PropTech startup"
  tags: [product-design, saas, proptech, expert]

state: {}

trigger: |
  Design a SaaS product that revolutionizes how real
  estate agents create and distribute open house
  promotional content. You're the founding product
  manager at a PropTech startup.

  Product vision: "OpenHouseOS"
  One platform to create, distribute, and measure all
  open house promotional content in minutes, not hours.

  Market research findings:
  - Agents spend avg 4.2 hours per listing on promotion
  - 78% use 3+ separate tools (Canva, Mailchimp, Buffer)
  - 62% say promotional content creation is their biggest
    time waste
  - 45% never measure promotional effectiveness
  - Average agent markets 15-25 listings per year
  - Willingness to pay: $49-149/month

  Competitive landscape:
  - Canva: Great templates, no real estate specifics
  - Coffee & Contracts: Social media templates only
  - Breakthrough Broker: Print-focused, dated design
  - Lab Coat Agents: Community/education, not tools
  - None offer end-to-end open house promo solution

  Technical constraints:
  - Must integrate with top 5 CRMs
  - MLS data feed integration required
  - Mobile-first design essential
  - AI features expected by market
  - Compliance checking must be automated

  Create:
  1. Product strategy and positioning document
  2. MVP feature set (launch in 6 months)
  3. Full feature roadmap (18-month vision)
  4. User persona and journey maps
  5. Key screens/wireframe concepts
  6. Pricing and packaging strategy
  7. Go-to-market plan for real estate industry

assertions:
  - type: llm_judge
    criteria: "MVP feature set is ruthlessly prioritized — focuses on the highest-pain, most-frequent workflows first (likely social media post creation and scheduling), defers nice-to-haves, and can deliver a complete experience within 6 months."
    weight: 0.35
    description: "MVPPrioritization"
  - type: llm_judge
    criteria: "User journey maps reflect real agent workflows — accounts for mobile-first usage, time-pressured creation at the listing, need for seller approval, and the reality that agents are not designers or marketers by training."
    weight: 0.35
    description: "UserJourneyRealism"
  - type: llm_judge
    criteria: "Go-to-market strategy leverages real estate's unique distribution channels — brokerage partnerships for bulk adoption, conference/association presence, influencer agents for social proof, and MLS integration as a competitive moat."
    weight: 0.30
    description: "GoToMarketStrategy"
