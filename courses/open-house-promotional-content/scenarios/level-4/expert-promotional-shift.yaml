meta:
  id: expert-promotional-shift
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Navigate an expert-level disruption affecting the entire open house promotional industry — technological paradigm shift, regulatory overhaul, and market transformation simultaneously"
  tags: [industry-disruption, paradigm-shift, expert-integration, expert]

state: {}

trigger: |
  The open house promotional landscape faces a
  fundamental paradigm shift. As the leading industry
  expert, advise the National Association of Realtors
  on strategic response.

  Converging disruptions:

  1. TECHNOLOGY PARADIGM SHIFT:
  Apple releases "SpatialHome" — an Apple Vision Pro app
  that creates photorealistic 3D scans of any home in
  minutes using iPhone LiDAR. Buyers can experience
  full spatial walkthroughs from anywhere. Downloads hit
  5M in first month. Traditional open houses see 35%
  attendance drop in markets where it's popular.

  2. REGULATORY OVERHAUL:
  The FTC proposes new "Truth in Real Estate Marketing"
  rules that would require:
  - Disclosure of all AI-generated or enhanced content
  - Standardized property condition ratings in all promos
  - Digital accessibility compliance for all online marketing
  - Mandatory performance disclaimers (no "best neighborhood")
  - Enforcement with significant fines ($50K per violation)

  3. CONSUMER BEHAVIOR SHIFT:
  Gen Z buyers (now 28% of first-time buyers) show
  radically different preferences:
  - 80% prefer virtual/AR experiences over in-person
  - Won't engage with content longer than 30 seconds
  - Expect interactive, personalized marketing
  - Distrust polished content, prefer authentic/raw
  - Make decisions through TikTok and Discord communities

  4. MARKET ECONOMICS:
  Commission compression (post-NAR settlement) means
  agents can't afford current promotional spend levels.
  Average marketing budget per listing drops 45%.

  Advise NAR on:
  1. Industry position paper on the future of open house promotion
  2. Technology adoption guidance for members
  3. Regulatory compliance preparation framework
  4. Gen Z engagement strategy for the industry
  5. Sustainable promotional economics model
  6. Transition roadmap (3-year horizon)

assertions:
  - type: llm_judge
    criteria: "Position paper redefines rather than defends — acknowledges that traditional open houses are evolving, positions the industry as leading the change rather than resisting it, and articulates a compelling vision for what open house promotion becomes."
    weight: 0.35
    description: "PositionPaperVision"
  - type: llm_judge
    criteria: "Gen Z strategy is authentic, not patronizing — reflects genuine understanding of how younger buyers discover and evaluate homes, doesn't just mean 'post on TikTok more,' and acknowledges that different generation requires fundamentally different marketing philosophy."
    weight: 0.35
    description: "GenZStrategyAuthenticity"
  - type: llm_judge
    criteria: "Sustainable economics model is mathematically sound — shows how agents can maintain promotional effectiveness at 45% lower budgets through efficiency gains, technology leverage, and cooperative models; includes specific numbers and trade-offs."
    weight: 0.30
    description: "EconomicModelSustainability"
