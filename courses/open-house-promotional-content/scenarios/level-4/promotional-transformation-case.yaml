meta:
  id: promotional-transformation-case
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Document a comprehensive promotional transformation case study — from struggling brokerage to market leader through systematic promotional content improvement"
  tags: [case-study, transformation, organizational-change, expert]

state: {}

trigger: |
  Document a comprehensive case study of a brokerage's
  promotional content transformation. This will be
  published as an industry reference for organizational
  change in real estate marketing.

  Subject: Riverside Realty Group
  - Before: 120-agent brokerage, declining market share
  - After: 18-month transformation, #1 in market

  Before state (Month 0):
  - Market share: 12% (down from 18% three years ago)
  - Open house attendance: avg 8 visitors per event
  - Agent marketing spend: mostly print flyers
  - No social media strategy (agents on own)
  - No brand consistency across 120 agents
  - Top agents leaving for "more marketing-forward" firms
  - Owner considering selling the brokerage

  Transformation journey:

  Phase 1 (Months 1-3): Assessment and Foundation
  - Hired marketing director (first ever)
  - Audited all promotional materials
  - Surveyed agents on pain points and needs
  - Benchmarked against top competitors
  - Key finding: agents wanted help but feared losing autonomy

  Phase 2 (Months 4-9): Implementation
  - Launched template library (voluntary adoption)
  - Built social media content calendar
  - Created video production capability
  - Implemented CRM with marketing automation
  - Early adopters showed 3x improvement in traffic
  - Resistance from 30% of agents

  Phase 3 (Months 10-18): Scale and Optimize
  - Template adoption reached 85%
  - Added paid digital advertising support
  - Launched brokerage YouTube channel
  - Implemented performance tracking dashboard
  - Net new agent recruitment increased 40%

  After state (Month 18):
  - Market share: 22% (#1 in market)
  - Open house attendance: avg 24 visitors per event
  - Social media following: 35K (from 2K)
  - Agent retention: 94% (from 78%)
  - 15 new agents recruited specifically for marketing

  Create:
  1. Executive summary of the transformation
  2. Detailed phase-by-phase narrative with decision points
  3. Key metrics dashboard (before, during, after)
  4. Lessons learned and failure analysis
  5. Replicability framework for other brokerages
  6. Agent testimonials and resistance management
  7. Financial impact analysis (ROI of transformation)

assertions:
  - type: llm_judge
    criteria: "Case study narrative is honest about challenges — doesn't present the transformation as smooth or inevitable; documents resistance, failed initiatives, budget overruns, and how setbacks were overcome; this honesty makes it credible and useful."
    weight: 0.35
    description: "NarrativeHonesty"
  - type: llm_judge
    criteria: "Replicability framework abstracts principles from specifics — identifies what's transferable (phased approach, agent autonomy balance, data-driven optimization) vs what was unique to this brokerage (market conditions, team dynamics)."
    weight: 0.35
    description: "ReplicabilityFramework"
  - type: llm_judge
    criteria: "Financial impact analysis is rigorous — connects promotional improvements to business outcomes (market share, agent retention, revenue) with clear attribution methodology; acknowledges what can and can't be directly attributed to the transformation."
    weight: 0.30
    description: "FinancialImpactRigor"
