meta:
  id: promotional-knowledge-graph
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Build a knowledge graph for open house promotional expertise — structured knowledge representation connecting strategies, channels, audiences, content types, and outcomes"
  tags: [knowledge-graph, knowledge-management, structured-expertise, expert]

state: {}

trigger: |
  Build a comprehensive knowledge graph that captures
  and structures all expertise related to open house
  promotional content. This will serve as the foundation
  for AI-assisted content recommendations and agent
  training pathways.

  Knowledge domains to map:

  Content types:
  - Photography (professional, iPhone, drone, virtual staging)
  - Video (walkthrough, lifestyle, neighborhood, testimonial)
  - Copy (listing description, social posts, email, SMS, ad copy)
  - Design (flyers, brochures, social graphics, signage)
  - Interactive (3D tours, floor plans, virtual open houses)

  Distribution channels:
  - Social media (platform-specific characteristics)
  - Email marketing (segmentation, automation)
  - Paid advertising (platform targeting, budgets)
  - Print (direct mail, publications, flyers)
  - Emerging (podcasts, connected TV, apps)

  Audience segments:
  - Buyer types (first-time, move-up, downsizer, investor)
  - Demographics (age, income, family stage)
  - Behavioral (browsing stage, urgency level)
  - Geographic (local, relocation, international)

  Property characteristics:
  - Price range effects on promotional strategy
  - Property type (condo, SFH, luxury, multi-family)
  - Condition (new build, renovated, fixer)
  - Location features (waterfront, urban, suburban)

  Outcomes:
  - Engagement metrics by channel
  - Attendance correlation factors
  - Conversion rates by content type
  - ROI benchmarks by strategy

  Create:
  1. Knowledge graph schema and ontology
  2. Entity definitions and relationships
  3. Decision tree for content recommendations
  4. Agent skill assessment mapped to knowledge domains
  5. AI recommendation engine logic
  6. Continuous learning and graph update process
  7. Visualization and query interface design

assertions:
  - type: llm_judge
    criteria: "Knowledge graph ontology captures meaningful relationships — not just categories but connections between content types and audience segments, channels and property types, strategies and outcomes; relationships are typed and directional."
    weight: 0.35
    description: "OntologyRelationships"
  - type: llm_judge
    criteria: "Decision tree for recommendations is actionable — given a property type, price range, target audience, and available resources, the tree produces specific content recommendations with channel allocation and expected outcomes."
    weight: 0.35
    description: "DecisionTreeActionability"
  - type: llm_judge
    criteria: "Continuous learning process keeps the graph current — defines how new campaigns feed performance data back into the graph, how emerging channels and content types get incorporated, and how agent expertise contributes to collective knowledge."
    weight: 0.30
    description: "ContinuousLearningProcess"
