meta:
  id: promotional-behavioral-science
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Apply behavioral science principles to open house promotional content — leverage cognitive biases, decision architecture, and psychological triggers ethically to increase engagement and attendance"
  tags: [behavioral-science, psychology, decision-architecture, expert]

state: {}

trigger: |
  Apply behavioral science principles to redesign open
  house promotional content for maximum effectiveness.
  Use psychological research to inform content strategy
  while maintaining ethical standards.

  Behavioral science principles to apply:

  Cognitive biases:
  - Scarcity effect (limited time, exclusive access)
  - Social proof (attendance numbers, testimonials)
  - Anchoring (price positioning, comparison framing)
  - Loss aversion (what buyers miss by not attending)
  - Mere exposure effect (repeated touchpoints)
  - Peak-end rule (memorable event experiences)

  Decision architecture:
  - Choice architecture (how options are presented)
  - Default effects (opt-in vs opt-out RSVPs)
  - Friction reduction (ease of attendance)
  - Commitment escalation (small yeses lead to big ones)
  - Information asymmetry (what to reveal when)

  Emotional triggers:
  - Nostalgia (home memories)
  - Aspiration (lifestyle visualization)
  - Belonging (community connection)
  - Security (home ownership stability)
  - FOMO (fear of missing opportunity)

  Ethical boundaries:
  - Must not manipulate vulnerable populations
  - Must not create false urgency or scarcity
  - Must comply with fair housing principles
  - Must be truthful in all representations
  - Must respect consumer autonomy

  Case study property: 789 Maple Avenue, $445,000
  - 4BR/2.5BA, 2,200 sq ft
  - Recently renovated, move-in ready
  - Great school district, walkable neighborhood
  - Open House: Saturday 1-4 PM

  Create:
  1. Behavioral science audit of standard promotional content
  2. Redesigned promotional materials using each principle
  3. Ethical framework for applying psychology in RE marketing
  4. A/B testing plan to measure psychological effects
  5. Training guide for agents on ethical persuasion
  6. Consumer protection safeguards

assertions:
  - type: llm_judge
    criteria: "Behavioral principles are applied specifically to real estate — not just textbook definitions but concrete examples of how scarcity, social proof, and anchoring manifest in property marketing; each principle has a specific implementation for open house promotion."
    weight: 0.35
    description: "BehavioralApplicationSpecificity"
  - type: llm_judge
    criteria: "Ethical framework draws clear lines — distinguishes between ethical persuasion (highlighting genuine benefits, reducing friction) and manipulation (creating false scarcity, exploiting anxiety); provides real-world judgment calls, not just abstract principles."
    weight: 0.35
    description: "EthicalFrameworkClarity"
  - type: llm_judge
    criteria: "A/B testing plan isolates psychological variables — tests one principle at a time with proper controls, defines measurable outcomes (not just 'more engagement'), and accounts for ethical review of test conditions."
    weight: 0.30
    description: "ABTestingPsychology"
