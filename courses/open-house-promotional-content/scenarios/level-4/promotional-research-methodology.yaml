meta:
  id: promotional-research-methodology
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Design a rigorous research methodology for studying open house promotional effectiveness — academic-quality research that advances industry understanding"
  tags: [research-methodology, academic-research, industry-study, expert]

state: {}

trigger: |
  Design a comprehensive research study to measure the
  effectiveness of different open house promotional
  strategies. The findings will be published and used
  to establish industry best practices.

  Research context:
  - No large-scale academic study exists on open house
    promotional content effectiveness
  - Industry relies on anecdotal evidence and vendor claims
  - NAR statistics show 41% of buyers attend open houses
    but don't measure promotional impact
  - PropTech companies claim 3-10x improvements but
    methodology is questionable

  Research questions:
  1. Which promotional channels most effectively drive
     open house attendance?
  2. What content types generate highest engagement-to-
     attendance conversion?
  3. How does promotional spend correlate with open house
     outcomes (attendance, offers, sale price)?
  4. Do different buyer segments respond to different
     promotional approaches?
  5. What is the ROI of open house promotion vs. other
     marketing strategies?

  Available resources:
  - Partnership with 5 brokerages (2,500 agents)
  - Access to 12 months of historical data
  - Budget: $150K for research
  - Partnership with university business school
  - Access to MLS data for outcome tracking
  - Survey capabilities across agent and buyer pools

  Create:
  1. Research design and methodology
  2. Data collection framework and instruments
  3. Sampling strategy and sample size calculations
  4. Variable definitions and measurement protocols
  5. Statistical analysis plan
  6. Ethical considerations and IRB requirements
  7. Publication and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Research design controls for confounding variables — property price, market conditions, agent experience, listing quality, and location are all accounted for; the study can isolate the effect of promotional content from other factors influencing open house success."
    weight: 0.35
    description: "ResearchDesignRigor"
  - type: llm_judge
    criteria: "Data collection instruments are practical for real estate context — agents can realistically track what's asked, buyer surveys are short enough to get responses, and MLS data integration is technically feasible."
    weight: 0.35
    description: "DataCollectionPracticality"
  - type: llm_judge
    criteria: "Statistical analysis plan is appropriate — uses methods suited to the data types (ordinal, categorical, continuous), accounts for clustering within brokerages, and defines meaningful effect sizes rather than just statistical significance."
    weight: 0.30
    description: "StatisticalAnalysisPlan"
