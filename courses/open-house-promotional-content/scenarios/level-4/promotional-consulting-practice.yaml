meta:
  id: promotional-consulting-practice
  level: 4
  course: open-house-promotional-content
  type: output
  description: "Launch a specialized consulting practice for open house promotional strategy — build a business advising brokerages, teams, and individual agents on marketing optimization"
  tags: [consulting-practice, business-building, advisory-services, expert]

state: {}

trigger: |
  Launch a specialized consulting practice focused on
  open house promotional strategy for real estate
  professionals. You're transitioning from top-producing
  agent to industry consultant.

  Your credentials:
  - 15 years as top-producing agent (500+ transactions)
  - Pioneered video-first open house marketing in your market
  - Built promotional systems for 3 brokerages
  - Recognized by NAR for marketing innovation
  - Speaking invitations at industry conferences
  - Average listing gets 3x more open house traffic than
    market average using your methods

  Target clients:
  - Tier 1: Large brokerages (500+ agents) — $25K+ retainers
  - Tier 2: Teams (5-20 agents) — $5K-15K projects
  - Tier 3: Individual agents — $500-2K workshops
  - Tier 4: PropTech companies — $15K+ advisory

  Service offerings to design:
  - Promotional system audit and optimization
  - Custom template and workflow design
  - Agent training programs (in-person and virtual)
  - Technology stack consulting
  - Content strategy development
  - Brand positioning for open house marketing

  Create:
  1. Consulting practice business plan
  2. Service offering catalog with pricing
  3. Client acquisition strategy
  4. Diagnostic assessment framework
  5. Deliverable templates for each service tier
  6. Thought leadership content strategy
  7. Revenue projection model (Year 1-3)

assertions:
  - type: llm_judge
    criteria: "Service offerings demonstrate deep expertise — each offering solves a specific, well-defined problem that real estate professionals actually face with open house promotion; pricing reflects value delivered, not just time spent."
    weight: 0.35
    description: "ServiceOfferingDepth"
  - type: llm_judge
    criteria: "Diagnostic assessment framework is comprehensive and reveals insights — goes beyond surface-level metrics to uncover systemic issues in promotional operations; clients gain value from the assessment itself."
    weight: 0.35
    description: "DiagnosticFrameworkValue"
  - type: llm_judge
    criteria: "Revenue model is realistic — accounts for typical consulting ramp-up, client acquisition costs, capacity constraints, and seasonal real estate cycles; doesn't assume instant full capacity or unrealistic close rates."
    weight: 0.30
    description: "RevenueModelRealism"
