meta:
  id: social-media-announcement
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Create social media open house announcements — platform-specific posts for Instagram, Facebook, and TikTok that drive attendance"
  tags: [social-media, announcement, multi-platform, beginner]

state: {}

trigger: |
  Create social media announcements for an upcoming
  open house across multiple platforms.

  Property details:
  - Address: 1245 Sunridge Drive
  - Price: $425,000
  - Style: Updated ranch, 3BR/2BA, 1,800 sq ft
  - Features: Open floor plan, quartz countertops,
    new roof (2024), fenced backyard, 2-car garage
  - Lot: 0.28 acres, mature trees, cul-de-sac
  - Neighborhood: Meadowbrook — top-rated schools,
    walking trails, community pool
  - Open house: Saturday 1-4 PM

  Photos available:
  - Bright kitchen with island
  - Spacious living room with fireplace
  - Backyard with patio and trees
  - Front exterior (curb appeal)
  - Master bedroom

  Create posts for:
  1. Instagram (feed post + Story + Reel concept)
  2. Facebook (event + post + group share)
  3. TikTok (short video concept with trending format)
  4. Hashtag strategy for each platform

assertions:
  - type: llm_judge
    criteria: "Instagram content is visually-driven with platform-appropriate formatting — carousel feed post with best photos and key details, Story with countdown sticker and swipe-up/link, Reel concept using trending audio or walkthrough format; captions use strategic hashtags."
    weight: 0.35
    description: "InstagramOptimization"
  - type: llm_judge
    criteria: "Facebook content leverages community features — creates an event (with RSVP tracking), writes a shareable post with complete details, and suggests neighborhood/community group sharing; copy is slightly longer and more detailed than Instagram."
    weight: 0.35
    description: "FacebookOptimization"
  - type: llm_judge
    criteria: "TikTok concept uses platform-native format — suggests a trending format (POV, day-in-the-life, 'house tour that will make you want to move'), with hook in first 2 seconds, and leverages trending sounds; doesn't just repurpose Instagram content."
    weight: 0.30
    description: "TikTokOptimization"
