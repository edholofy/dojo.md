meta:
  id: listing-description-writing
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Write compelling MLS listing descriptions — craft property narratives that attract buyers and drive showing/open house traffic"
  tags: [listing-description, MLS-copy, property-narrative, beginner]

state: {}

trigger: |
  Write the MLS listing description for a property
  hosting its first open house this weekend.

  Property data:
  - 567 Birch Lane, $398,000
  - 4BR/3BA, 2,100 sq ft, built 2018
  - Two-story with open concept main level
  - Kitchen: granite counters, stainless appliances,
    pantry, island with seating
  - Primary suite: walk-in closet, double vanity,
    tiled shower
  - Basement: finished rec room, full bath, storage
  - Backyard: privacy fence, paver patio, pergola
  - Garage: 2-car attached
  - HOA: $45/month (maintains common areas, playground)
  - Utilities: avg $185/month (energy efficient)
  - School district: Lincoln Elementary (8), Jefferson
    Middle (7), Lincoln High (8)

  Constraints:
  - MLS character limit: 1,000 characters
  - Must include Fair Housing compliant language
  - Cannot use: "master" bedroom (use "primary")
  - Must mention open house date/time
  - Should not use ALL CAPS or excessive exclamation

  Write:
  1. Full MLS description (under 1,000 characters)
  2. Extended description for Zillow/Realtor.com
  3. One-sentence "elevator pitch" version
  4. Headline for social media (10 words or less)

assertions:
  - type: llm_judge
    criteria: "MLS description is under 1,000 characters, compelling, and compliant — leads with the strongest selling point, uses descriptive but efficient language, mentions the open house, and avoids Fair Housing violations (no neighborhood demographics or prohibited terms)."
    weight: 0.35
    description: "MLSDescriptionQuality"
  - type: llm_judge
    criteria: "Extended description adds lifestyle narrative — paints a picture of living in the home (morning coffee on the patio, kids playing in the yard), while still including all key features; goes beyond specs to tell a story."
    weight: 0.35
    description: "ExtendedDescriptionNarrative"
  - type: llm_judge
    criteria: "Elevator pitch and social headline are concise and hook-worthy — the elevator pitch captures the essence in one compelling sentence, the headline stops scrolling with curiosity or emotion, neither is generic or could apply to any home."
    weight: 0.30
    description: "ConciseVersions"
