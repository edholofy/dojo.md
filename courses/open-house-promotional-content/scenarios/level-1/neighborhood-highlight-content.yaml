meta:
  id: neighborhood-highlight-content
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Create neighborhood highlight content for open house promotion — showcase the community, amenities, and lifestyle that come with the home"
  tags: [neighborhood-content, community-highlight, lifestyle-marketing, beginner]

state: {}

trigger: |
  Create neighborhood highlight content to promote
  an open house. Buyers aren't just buying a home —
  they're buying a neighborhood.

  Property: 234 Riverside Terrace, $375,000
  Open house: Sunday 1-4 PM

  Neighborhood: Riverside District
  - Established in 1985, 450 homes
  - Walk score: 72 (Very Walkable)
  - Bike score: 68 (Bikeable)

  Amenities within walking distance:
  - Riverside Park (0.2 miles) — playground, splash pad,
    walking trails along river
  - Blue Moon Coffee (0.3 miles) — local favorite
  - Riverside Elementary (0.4 miles) — rated 9/10
  - Fresh Market grocery (0.5 miles)
  - Community pool and tennis courts (0.6 miles)
  - Riverside Trail (connects to 12-mile greenway)

  Community events:
  - Monthly food truck Friday
  - Annual 4th of July parade
  - Holiday lights competition
  - Neighborhood book club and running group

  Demographic appeal:
  - Mix of young families and empty nesters
  - Active HOA with responsive board
  - Low crime (well below city average)
  - Strong home value appreciation (5.2% avg/year)

  Create:
  1. Neighborhood guide (1-page, print/digital)
  2. Social media posts highlighting the community
  3. "A Day in Riverside" lifestyle narrative
  4. Map-based content showing proximity to amenities

assertions:
  - type: llm_judge
    criteria: "Neighborhood guide is informative and attractive — includes walk/bike scores, school ratings, key amenities with distances, community events, and appreciation data; formatted for both print handout and digital sharing."
    weight: 0.35
    description: "NeighborhoodGuideQuality"
  - type: llm_judge
    criteria: "Social media posts sell the lifestyle, not just the location — uses storytelling ('Imagine Saturday mornings starting at Blue Moon Coffee, then a walk along the river trail'), pairs descriptions with photo/video concepts, and stays Fair Housing compliant."
    weight: 0.35
    description: "LifestyleMarketingContent"
  - type: llm_judge
    criteria: "'A Day in Riverside' narrative is engaging and specific — follows a realistic day (morning coffee walk, kids at the splash pad, dinner at food truck Friday), making the neighborhood feel real and inviting without being generic."
    weight: 0.30
    description: "LifestyleNarrative"
