meta:
  id: print-flyer-design
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Design an open house print flyer — compelling layout, copywriting, and distribution strategy for maximum neighborhood awareness"
  tags: [print-flyer, copywriting, distribution, beginner]

state: {}

trigger: |
  Design a print flyer and distribution plan for an
  open house.

  Property: 456 Maple Court, $349,000
  - 3BR/2BA ranch, 1,650 sq ft
  - Corner lot, 0.3 acres
  - Remodeled bathroom, new carpet
  - Attached 2-car garage with storage
  - Near shopping, restaurants, and highway
  - Open house: Saturday 11 AM - 2 PM

  Flyer requirements:
  - One-sided, full color, 8.5" x 11"
  - Must include: photo, price, address, date/time,
    key features, agent contact, QR code
  - Will be used as: door knocker (500 homes),
    open house handout, sign rider insert

  Target distribution:
  - 500 door knockers in surrounding streets
  - 50 handed out at open house
  - 25 posted at local businesses (coffee shops,
    gym, grocery store bulletin boards)

  Write:
  1. Flyer copy (headline, body, feature bullets, CTA)
  2. Layout description (what goes where)
  3. Distribution plan with timing
  4. Door-knocker script (what to say when delivering)

assertions:
  - type: llm_judge
    criteria: "Flyer copy has a compelling headline (not just the address), scannable feature bullets prioritizing buyer benefits (not just specs), a clear CTA, and professional but warm tone; includes all required elements without feeling cluttered."
    weight: 0.35
    description: "FlyerCopyQuality"
  - type: llm_judge
    criteria: "Layout description creates visual hierarchy — hero photo at top, headline below, price prominent, features scannable, agent info and QR code at bottom; designed for quick scanning with key info visible at arm's length."
    weight: 0.35
    description: "LayoutDesign"
  - type: llm_judge
    criteria: "Distribution plan is strategic — door knockers delivered 2-3 days before (not too early, not too late), business postings 1 week before, with a friendly door-knock script that invites neighbors and asks if they know anyone looking."
    weight: 0.30
    description: "DistributionStrategy"
