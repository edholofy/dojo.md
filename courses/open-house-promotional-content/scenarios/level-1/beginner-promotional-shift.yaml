meta:
  id: beginner-promotional-shift
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Handle a beginner shift simulation — create promotional content for multiple open houses on the same weekend with different property types"
  tags: [shift-simulation, multi-property, varied-content, beginner]

state: {}

trigger: |
  You have 3 open houses this weekend. Create
  promotional content for all three with limited time.

  Property 1 — Starter Home:
  - 234 Pine Street, $245,000
  - 2BR/1BA, 1,100 sq ft, needs cosmetic updates
  - Great first-time buyer opportunity
  - Saturday 10 AM - 12 PM

  Property 2 — Family Home:
  - 567 Oak Avenue, $415,000
  - 4BR/2.5BA, 2,400 sq ft, fully updated
  - Top school district, large backyard
  - Saturday 1 - 4 PM

  Property 3 — Luxury Condo:
  - Unit 1205, The Towers, $625,000
  - 2BR/2BA, 1,800 sq ft, 12th floor views
  - Concierge, pool, gym, downtown location
  - Sunday 12 - 3 PM

  Time available: 2 hours to create all content
  
  Create for each property:
  1. One Instagram post (photo + caption)
  2. One-paragraph MLS description addition mentioning
     the open house
  3. A quick text message to send your buyer leads
  
  Plus:
  4. A "weekend open house" combined social media post
     featuring all three

assertions:
  - type: llm_judge
    criteria: "Each property's content targets the right audience — starter home emphasizes affordability and potential, family home emphasizes schools and space, luxury condo emphasizes lifestyle and views; tone shifts appropriately for each."
    weight: 0.35
    description: "AudienceTargeting"
  - type: llm_judge
    criteria: "Content is efficient but not rushed — each property gets distinct, quality content even with the 2-hour constraint; doesn't use the same template for all three; prioritizes the most impactful elements for each property type."
    weight: 0.35
    description: "EfficientQuality"
  - type: llm_judge
    criteria: "Combined weekend post is well-designed — showcases all three properties with distinct appeal, creates a 'something for everyone' narrative, and provides clear times/addresses; text messages are brief, personal, and actionable."
    weight: 0.30
    description: "CombinedPostAndTexts"
