meta:
  id: email-campaign-announcement
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Create an email marketing campaign for an open house — subject lines, body copy, and follow-up sequences that drive attendance"
  tags: [email-marketing, campaign, attendance-driving, beginner]

state: {}

trigger: |
  Create an email campaign to promote an open house
  to your database of 2,500 contacts.

  Property: 789 Oakwood Lane, $385,000
  - 4BR/2.5BA colonial, 2,200 sq ft
  - Updated kitchen, hardwood floors throughout
  - Large backyard with deck
  - Excellent school district (9/10 rated)
  - New HVAC system, energy-efficient windows
  - Open house: Sunday 2-5 PM

  Email segments in your database:
  - Active buyers (searching now): 180 contacts
  - Past clients (referral sources): 850 contacts
  - Sphere of influence: 1,200 contacts
  - Agent-to-agent network: 270 contacts

  Create:
  1. Email to active buyers (urgency, details)
  2. Email to sphere of influence (share with friends)
  3. Email to agent network (broker cooperation)
  4. Subject line options for each (A/B testable)
  5. Follow-up email (day after open house)

assertions:
  - type: llm_judge
    criteria: "Emails are segmented appropriately — active buyers get detailed property info with urgency; sphere gets shareable content with 'know anyone looking?'; agents get professional cooperation details with showing instructions; each has a different tone and CTA."
    weight: 0.35
    description: "SegmentedMessaging"
  - type: llm_judge
    criteria: "Subject lines are compelling and A/B testable — provides 2-3 options per segment using different approaches (curiosity, urgency, benefit-driven, emoji vs no emoji); avoids spam triggers and is mobile-optimized (under 50 characters)."
    weight: 0.35
    description: "SubjectLineQuality"
  - type: llm_judge
    criteria: "Follow-up email leverages the open house event — reports on attendance/interest (creates social proof), invites those who couldn't attend to schedule private showings, and provides a next step CTA; doesn't just repeat the original announcement."
    weight: 0.30
    description: "FollowUpStrategy"
