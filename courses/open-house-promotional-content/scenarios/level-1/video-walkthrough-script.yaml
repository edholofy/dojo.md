meta:
  id: video-walkthrough-script
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Script a video walkthrough for open house promotion — create a compelling 60-90 second property tour video script"
  tags: [video-walkthrough, property-tour, scripting, beginner]

state: {}

trigger: |
  Script a video walkthrough to promote an upcoming
  open house. The video will be posted on social media
  and sent via email.

  Property: 890 Cedar Ridge, $445,000
  - Contemporary 3BR/2.5BA, 2,350 sq ft
  - Stunning mountain views from great room
  - Floor-to-ceiling windows in living area
  - Chef's kitchen with waterfall island
  - Primary suite with spa-like bathroom
  - Covered deck with outdoor kitchen
  - Smart home features (Nest, Ring, smart lighting)
  - 2-car garage with EV charging
  - Open house: Saturday & Sunday 12-4 PM

  Video parameters:
  - Length: 60-90 seconds
  - Format: Agent-hosted walkthrough (you on camera)
  - Style: Professional but personable
  - Music: Upbeat, modern (licensed)
  - End screen: Open house details + contact info

  Create:
  1. Shot-by-shot video script with narration
  2. Opening hook (first 3 seconds)
  3. Key feature callouts (what to emphasize)
  4. Call-to-action ending
  5. Caption/description for each platform

assertions:
  - type: llm_judge
    criteria: "Script has a compelling opening hook — first 3 seconds grab attention (start with the mountain view, or a dramatic reveal of the great room), not a talking-head intro; the narration flows naturally as if giving a friend a tour."
    weight: 0.35
    description: "VideoHookAndFlow"
  - type: llm_judge
    criteria: "Shot-by-shot plan is specific and visual — describes camera angles, movement (dolly shots, reveals, overhead), and timing for each room; prioritizes the most impressive features (views, kitchen, outdoor kitchen) over basic rooms."
    weight: 0.35
    description: "ShotPlanQuality"
  - type: llm_judge
    criteria: "CTA ending is clear and multi-platform appropriate — includes open house details prominently, provides multiple contact methods, and captions are tailored for each platform (Instagram vs YouTube vs Facebook)."
    weight: 0.30
    description: "CTAAndCaptions"
