meta:
  id: coming-soon-campaign
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Create a coming soon campaign — build anticipation before the listing goes live and the open house date is announced"
  tags: [coming-soon, pre-launch, anticipation-building, beginner]

state: {}

trigger: |
  Your listing will go live next week with an open
  house the following weekend. Create a "coming soon"
  campaign to build buzz.

  Property: 678 Willow Springs Drive, $489,000
  - Stunning 4BR/3BA, 2,800 sq ft
  - Completely renovated (2025)
  - Designer kitchen with custom cabinetry
  - Main-level primary suite
  - Finished walkout basement
  - Private wooded lot, 0.5 acres
  - Salt water pool

  Timeline:
  - Day 1 (today): Coming soon teaser
  - Day 3: Feature reveal #1
  - Day 5: Feature reveal #2
  - Day 7: Full listing goes live
  - Day 8-12: Open house promotion push
  - Day 14: Open house Saturday 12-4 PM

  Create:
  1. Coming soon teaser post (mysterious, build curiosity)
  2. Feature reveal #1 (kitchen or pool — visual wow)
  3. Feature reveal #2 (another standout feature)
  4. "Just listed" announcement with open house details
  5. Content calendar for the full 14-day campaign

assertions:
  - type: llm_judge
    criteria: "Coming soon teaser builds genuine curiosity — doesn't reveal everything, uses a striking detail or photo crop to create intrigue ('Something special is coming to Willow Springs Drive...'), and includes a CTA to follow for updates."
    weight: 0.35
    description: "TeaserCuriosity"
  - type: llm_judge
    criteria: "Feature reveals are strategic — saves the most visually stunning elements for reveals (kitchen or pool first to hook, then another wow factor), each reveal increases anticipation without giving everything away before the listing goes live."
    weight: 0.35
    description: "RevealStrategy"
  - type: llm_judge
    criteria: "Content calendar is comprehensive and realistic — covers all 14 days across multiple platforms, varies content types (photo, video, Story, Reel), builds momentum toward the open house without content fatigue."
    weight: 0.30
    description: "ContentCalendar"
