meta:
  id: directional-signage-plan
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Plan open house directional signage — strategic placement, messaging, and compliance for maximum drive-by traffic"
  tags: [signage, directional-signs, drive-by-traffic, beginner]

state: {}

trigger: |
  Plan the complete signage strategy for an open house
  in a subdivision that's slightly hard to find.

  Property: 345 Hidden Valley Court
  - Located in Hidden Valley subdivision
  - 3 turns from main road (Oak Street)
  - Subdivision entrance is easy to miss
  - Local sign ordinance: Max 6 directional signs,
    must be on private property or right-of-way,
    removed same day, no larger than 18" x 24"

  Available sign inventory:
  - 1 yard sign with rider (at property)
  - 6 directional arrow signs
  - 2 "Open House" A-frame signs
  - 1 large feature banner (for yard)
  - Sign riders: "Open Saturday 1-4"

  Key intersections/decision points:
  1. Oak Street & Main (heavy traffic)
  2. Oak Street & Valley Road (turn here)
  3. Valley Road & Hidden Valley entrance
  4. Hidden Valley entrance & Valley Court
  5. Valley Court & Hidden Valley Court (final turn)

  Create:
  1. Sign placement map (which sign at which location)
  2. Sign messaging for each location
  3. Setup timeline (when to place and remove)
  4. Compliance checklist (local ordinance)
  5. Digital signage alternatives (Google Maps pin,
     Waze advertising)

assertions:
  - type: llm_judge
    criteria: "Sign placement is strategically mapped to decision points — guides drivers from the main road through each turn to the property, with clear directional arrows and messaging that's readable at driving speed."
    weight: 0.35
    description: "SignPlacementStrategy"
  - type: llm_judge
    criteria: "Sign messaging is concise and action-oriented — includes address, direction arrow, and time; largest text is readable from 50+ feet; considers driver perspective at each intersection for optimal placement angle."
    weight: 0.35
    description: "SignMessaging"
  - type: llm_judge
    criteria: "Plan includes digital signage alternatives — Google Maps pin/business listing, Waze advertising pin, and GPS-friendly address sharing; setup and removal timeline ensures compliance with same-day removal ordinance."
    weight: 0.30
    description: "DigitalAndCompliance"
