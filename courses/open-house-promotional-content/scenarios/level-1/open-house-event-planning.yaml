meta:
  id: open-house-event-planning
  level: 1
  course: open-house-promotional-content
  type: output
  description: "Plan an open house event — create an experience beyond just showing the property, including refreshments, materials, and guest engagement"
  tags: [event-planning, guest-experience, materials, beginner]

state: {}

trigger: |
  Plan a complete open house event that creates a
  memorable experience for visitors.

  Property: 123 Magnolia Lane, $365,000
  - Charming 3BR/2BA cottage, 1,550 sq ft
  - Updated kitchen with farmhouse sink
  - Original hardwood floors, built-in bookshelves
  - Screened porch overlooking garden
  - Detached workshop/studio
  - Open house: Saturday 12-3 PM
  - Expected attendance: 15-25 groups

  Budget: $150 for event expenses

  Preparation needed:
  1. Property staging and presentation
  2. Refreshments and hospitality
  3. Printed materials (feature sheets, flyers)
  4. Sign-in process and lead capture
  5. Conversation starters and tour guidance
  6. Follow-up materials and process

  Seller instructions:
  - Pets need to be removed
  - Valuables secured
  - All lights on, blinds open
  - Temperature comfortable
  - Fresh flowers or candles optional

  Create the complete event plan.

assertions:
  - type: llm_judge
    criteria: "Event plan creates a welcoming experience — includes specific refreshment suggestions within budget, staging touches that enhance the cottage charm, and hospitality details like background music, pleasant scent, and comfortable temperature."
    weight: 0.35
    description: "GuestExperience"
  - type: llm_judge
    criteria: "Lead capture is seamless but effective — sign-in process that's not off-putting (digital preferred, paper backup), captures name, email, phone, agent status, and feedback; provides value in exchange (neighborhood guide, market report)."
    weight: 0.35
    description: "LeadCapture"
  - type: llm_judge
    criteria: "Printed materials are professional and useful — property feature sheet with all key details + photos, neighborhood guide, school info, and agent contact card; materials serve as take-home reminders that keep the property top of mind."
    weight: 0.30
    description: "PrintedMaterials"
