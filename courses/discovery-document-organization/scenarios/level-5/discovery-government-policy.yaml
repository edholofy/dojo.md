meta:
  id: discovery-government-policy
  level: 5
  course: discovery-document-organization
  type: output
  description: "Develop government policy recommendations for reforming civil discovery — create a policy framework addressing costs, technology, access to justice, and international harmonization"
  tags: [government-policy, civil-justice-reform, discovery-reform, master]

state: {}

trigger: |
  The Federal Judicial Center has commissioned you
  to develop policy recommendations for reforming
  civil discovery in the federal courts. Your report
  will inform the Advisory Committee on Civil Rules
  and congressional testimony.

  POLICY CONTEXT:
  - Discovery costs are the most commonly cited
    barrier to civil justice access
  - The 2015 proportionality amendments had limited
    impact — compliance is inconsistent
  - AI technology is transforming discovery but
    courts lack standards for its use
  - Cross-border discovery conflicts are increasing
    with no federal policy framework
  - Small businesses and individuals face discovery
    demands they cannot afford
  - The discovery industry ($15B) has regulatory
    capture concerns

  REPORT MUST ADDRESS:

  1. COST REDUCTION
  - Mandatory cost-shifting for disproportionate
    discovery requests
  - Fee caps for discovery in cases under $1M
  - Simplified discovery tracks for small cases
  - Technology mandates to reduce costs

  2. AI GOVERNANCE
  - Standards for AI use in document review
  - Disclosure requirements for AI-assisted discovery
  - Defensibility standards for AI review
  - Quality metrics and validation requirements

  3. ACCESS TO JUSTICE
  - Discovery support for pro se litigants
  - Legal aid e-discovery funding
  - Simplified discovery for consumer cases
  - Public defender digital evidence support

  4. INTERNATIONAL HARMONIZATION
  - Federal policy on discovery/privacy conflicts
  - Hague Convention modernization
  - Model cross-border protocols
  - Data localization impact on discovery

  Create:
  1. Complete policy report
  2. Draft FRCP rule amendments
  3. Congressional testimony
  4. Pilot program designs
  5. Stakeholder engagement strategy

assertions:
  - type: llm_judge
    criteria: "Policy report balances competing interests with evidence-based recommendations — addresses the discovery cost crisis with specific data (average discovery costs by case type and value, percentage of cases where discovery costs exceed case value); proposes a tiered discovery system: Track 1 (cases under $500K: limited discovery, mandatory initial disclosures only, no depositions without court approval, 10-hour total attorney time for discovery), Track 2 (cases $500K-$10M: standard proportionality-governed discovery with mandatory cost estimates), Track 3 (cases over $10M: full discovery with enhanced proportionality protections); cost-shifting proposals include a presumption of cost-shifting when discovery costs exceed 10% of the amount in controversy; technology mandates require courts to accept TAR as a reasonable review methodology (ending the case-by-case acceptance currently required); the report acknowledges opposition from the plaintiff's bar (who benefit from broad discovery) and the defense bar (who benefit from burdensome discovery as a settlement tool)."
    weight: 0.35
    description: "PolicyReport"
  - type: llm_judge
    criteria: "FRCP amendments are specific and implementable — proposes amendments to: Rule 26(b)(1) (adding explicit cost thresholds for proportionality analysis), new Rule 26(g)(4) (requiring disclosure of AI use in discovery and validation methodology), Rule 34 (specifying production format standards for AI-reviewed documents), Rule 37(e) (updating preservation standards for AI-era data types including ephemeral messaging and cloud data), and new Rule 26.1 (simplified discovery track for small cases); each amendment includes advisory committee notes explaining the purpose, examples of application, and anticipated impact; the amendments are drafting-ready (written in the style of existing FRCP rules) and include transition provisions; the congressional testimony distills the report into a 15-minute presentation with compelling case examples, data visualizations, and specific funding requests ($25M for legal aid e-discovery technology, $10M for research, $5M for judicial training)."
    weight: 0.35
    description: "FRCPAmendments"
  - type: llm_judge
    criteria: "Pilot programs and stakeholder strategy enable practical implementation — three pilot programs: (1) Simplified Discovery Track Pilot ($5M, 3 years, 5 federal districts testing the Track 1 simplified discovery procedures with controlled evaluation), (2) AI Standards Pilot ($3M, 2 years, 3 districts implementing mandatory AI disclosure and validation requirements with outcome tracking), (3) Legal Aid E-Discovery Pilot ($10M, 3 years, grants to 15 legal aid organizations to implement e-discovery tools with effectiveness measurement); each pilot includes: eligibility criteria, random assignment where feasible, evaluation methodology, reporting requirements, and decision criteria for national implementation; the stakeholder strategy identifies supporters (access to justice organizations, corporate defendants, judicial efficiency advocates) and opponents (plaintiff's bar concerned about discovery limitations, e-discovery vendors concerned about technology mandates, defense firms benefiting from current complexity) with specific engagement strategies for each."
    weight: 0.30
    description: "PilotsAndStakeholders"
