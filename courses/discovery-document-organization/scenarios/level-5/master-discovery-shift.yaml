meta:
  id: master-discovery-shift
  level: 5
  course: discovery-document-organization
  type: output
  description: "Master shift simulation — synthesize all dimensions of e-discovery expertise to address a defining moment that will shape the future of civil litigation"
  tags: [shift-simulation, master-synthesis, profession-defining, master]

state: {}

trigger: |
  You are the most influential voice on e-discovery
  in the world. Three converging events create a
  defining moment for civil justice.

  EVENT 1 — THE SUPREME COURT CASE
  The Supreme Court has granted certiorari in
  "DataCorp v. Chen" — a case challenging whether
  the Federal Rules of Civil Procedure's discovery
  provisions violate the Fourth Amendment when
  applied to require production of personal data
  stored on private devices. The petitioner argues
  that modern discovery has become an unreasonable
  search and seizure, particularly when AI tools
  can analyze millions of personal documents
  including those with no relevance to the case.

  You've been asked to write an amicus brief on
  behalf of the Sedona Conference.

  Address:
  - Fourth Amendment analysis of civil discovery
  - The reasonable expectation of privacy in
    personal data subject to discovery
  - How AI-powered review changes the privacy
    calculus (AI "sees" everything, even non-
    relevant personal content)
  - Proposed framework balancing discovery rights
    with privacy protections
  - Practical implications for e-discovery practice

  EVENT 2 — THE INDUSTRY CRISIS
  A major e-discovery vendor (processing 30% of
  all US litigation) has experienced a catastrophic
  data breach. 10,000 active litigation matters'
  documents are exposed, including:
  - Privileged attorney-client communications from
    500+ law firms
  - Trade secrets from 200+ corporate clients
  - Personal data of millions of individuals whose
    documents were in litigation
  - Government investigation materials including
    sealed grand jury documents

  You've been retained as the crisis response
  expert and industry reform architect.

  EVENT 3 — THE VISION QUESTION
  You've been asked to write a letter to the legal
  profession of 2050. What will civil discovery
  look like in 25 years? What must the profession
  preserve, abandon, and create?

  Address all three events with comprehensive
  analysis and strategic response.

assertions:
  - type: llm_judge
    criteria: "Amicus brief demonstrates sophisticated constitutional analysis — engages with the Fourth Amendment's application to civil proceedings (traditionally limited to government action, but discovery enforced by court orders is state action); analyzes the reasonable expectation of privacy in personal devices subject to civil discovery (drawing on Carpenter v. United States for digital privacy expectations); examines how AI review changes the analysis (AI examines every document including intimate personal content that human reviewers might quickly pass over; AI pattern recognition can infer private information from non-private data); proposes a framework: (1) personal device discovery requires heightened showing of relevance and need, (2) AI review of personal data must use privacy-preserving techniques (in-situ analysis, differential privacy, anonymized output), (3) courts must appoint independent reviewers for personal device discovery, (4) produced personal data must be returned and destroyed after litigation; the brief balances discovery access with privacy protection at a level worthy of Supreme Court consideration."
    weight: 0.35
    description: "AmicusBrief"
  - type: llm_judge
    criteria: "Industry crisis response is comprehensive and catalyzes systemic reform — immediate response: notification to all 500+ law firms and their clients (tiered by severity — matters with exposed privileged communications get immediate personal notification, others within 72 hours); forensic investigation to determine scope of exposure; coordination with DOJ for sealed materials; addresses privilege implications (has the exposure waived privilege?); argues for FRE 502(d)-type protection (exposure due to vendor breach should not constitute waiver); industry reform proposals include: mandatory security standards for e-discovery vendors (SOC 2 Type II as minimum, plus litigation-specific security requirements), vendor certification program, insurance requirements, industry-wide incident response protocol, and data minimization requirements (vendors must delete litigation data within 90 days of matter closure); the response acknowledges that the industry's concentration (one vendor handling 30% of matters) is itself a systemic risk."
    weight: 0.35
    description: "IndustryCrisisResponse"
  - type: llm_judge
    criteria: "Letter to 2050 is visionary yet grounded in current trajectory — predicts specific developments: AI will handle 95%+ of document classification with human oversight focused on the 5% that requires judgment; discovery and privacy will be reconciled through privacy-preserving computation (analyzing data without exposing it); cross-border discovery conflicts will be resolved through international standards (building on the work done in 2025-2030); the document review industry will have transformed from labor-intensive to technology-intensive with a smaller, more skilled workforce; identifies what must be preserved (human judgment for privilege, the adversarial system's role in truth-seeking, access to evidence as a foundation of civil justice), what must be abandoned (the fiction that manual review is thorough, per-GB pricing that incentivizes data hoarding, the assumption that all evidence must be document-based), and what must be created (universal discovery standards, privacy-preserving review technology, access-to-justice discovery programs); the letter has genuine emotional and intellectual weight, suitable for publication in a major legal journal."
    weight: 0.30
    description: "LetterTo2050"
