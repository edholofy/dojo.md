meta:
  id: discovery-graduate-program
  level: 5
  course: discovery-document-organization
  type: output
  description: "Design a graduate-level academic program in e-discovery and litigation technology — create curriculum for an emerging academic discipline at the intersection of law, technology, and information science"
  tags: [academic-program, curriculum-design, interdisciplinary, master]

state: {}

trigger: |
  A top law school, in partnership with the school
  of information science, has invited you to design
  a joint graduate program: the M.S. in E-Discovery
  and Litigation Technology.

  PROGRAM PARAMETERS:
  - 36-credit master's degree (2 academic years or
    3 years part-time)
  - Joint offering between law school and school of
    information science
  - Target enrollment: 30 students per cohort
  - Students: mid-career litigation support
    professionals, attorneys seeking specialization,
    IT professionals entering legal tech, e-discovery
    vendor employees
  - Budget: $1.5M startup, $600K annual operating
  - Must achieve financial sustainability by Year 3

  CURRICULUM DOMAINS:
  1. Legal foundations (civil procedure, evidence,
     professional responsibility, privacy law)
  2. Information science (data management, metadata,
     classification theory, search technology)
  3. Technology (AI/ML, NLP, database systems, cloud
     computing, cybersecurity)
  4. Practice management (project management, vendor
     management, budgeting, client relations)
  5. Research methods (empirical legal studies, data
     analytics, experimental design)
  6. Capstone (original research or practice
     innovation project)

  Create:
  1. Complete curriculum with course descriptions
  2. Faculty recruitment plan
  3. Industry advisory board and partnerships
  4. Executive education and certificate programs
  5. Five-year strategic plan with financial model

assertions:
  - type: llm_judge
    criteria: "Curriculum integrates legal and technical knowledge uniquely — required courses span both schools: from the law school (Civil Procedure for Technologists, Evidence and Discovery Law, Legal Ethics and Professional Responsibility, Privacy and Data Protection Law) and from information science (Information Organization and Retrieval, Machine Learning for Document Classification, Natural Language Processing, Database Systems and Data Management); joint courses bridge both disciplines (E-Discovery Workflow Design, AI-Assisted Document Review, Cross-Border Discovery and Data Governance); practice courses develop professional skills (E-Discovery Project Management, Vendor Evaluation and Management, Client Communication and Budgeting); the capstone requires either original empirical research or a documented technology innovation; the curriculum produces graduates who can function in both legal and technical conversations."
    weight: 0.35
    description: "Curriculum"
  - type: llm_judge
    criteria: "Faculty plan and industry partnerships are credible — identifies the interdisciplinary expertise needed and maps it to the two schools: law school faculty for legal courses (civil procedure scholars, evidence law experts, privacy law specialists), information science faculty for technical courses (IR researchers, NLP specialists, database experts), and practitioner-faculty for practice courses (former litigation support directors, e-discovery consultants, vendor executives); industry partnerships with Relativity, Everlaw, and major law firms provide: internship and capstone project opportunities, adjunct faculty, technology access for teaching labs, career placement assistance, and revenue (corporate sponsorships, employer-paid tuition); the advisory board includes representation from all stakeholder groups (law firms, corporate legal departments, e-discovery vendors, judiciary, bar associations)."
    weight: 0.35
    description: "FacultyAndPartners"
  - type: llm_judge
    criteria: "Financial model achieves sustainability — revenue sources: master's degree tuition ($30K-45K per year × 30 students = $900K-1.35M), executive education certificates ($100K-200K annually), corporate sponsorships ($100K-150K annually), continuing education programs ($50K-100K annually); expenses: faculty (4 FTE at academic rates, supplemented by adjuncts from both schools and industry), staff (2 FTE — program coordinator and technology lab manager), technology lab equipment and software ($100K startup, $30K annual), marketing and recruitment ($50K annual); break-even achievable by Year 3 with 85% enrollment; executive education programs include: E-Discovery Fundamentals Certificate (2-day for attorneys), TAR/AI in Discovery Certificate (3-day for practitioners), Cross-Border Discovery Certificate (2-day for international practice); programs priced at $1,500-3,000 per participant."
    weight: 0.30
    description: "FinancialModel"
