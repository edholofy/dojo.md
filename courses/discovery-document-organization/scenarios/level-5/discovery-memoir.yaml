meta:
  id: discovery-memoir
  level: 5
  course: discovery-document-organization
  type: output
  description: "Write a professional memoir exploring how e-discovery evolved from a backwater to the most consequential aspect of modern litigation — chronicle the human stories behind the technology revolution"
  tags: [memoir, professional-narrative, industry-history, master]

state: {}

trigger: |
  Write a professional memoir chapter titled
  "From Bankers Boxes to Algorithms: How I Watched
  Discovery Transform the Law."

  AUTHOR CONTEXT:
  You are a retiring litigation partner who has
  practiced for 35 years (1990-2025). You've
  witnessed the entire evolution of e-discovery
  from its earliest days to the AI era. Your career
  arc: first-generation associate (paper discovery
  era) → partner managing major document reviews
  (early e-discovery) → thought leader on discovery
  technology (modern era).

  MEMOIR ELEMENTS:

  1. THE PAPER YEARS (1990-2000)
  You started practicing when discovery meant
  warehouses full of bankers boxes. Your first
  major case involved reviewing 500,000 pages by
  hand. You can still remember the paper cuts, the
  fluorescent lights, and the moment you found the
  "smoking gun" memo buried in Box 347.

  2. THE ZUBULAKE MOMENT (2003-2005)
  Judge Scheindlin's Zubulake opinions changed
  everything. Suddenly, email preservation was
  mandatory. You watched firms scramble to understand
  what "electronically stored information" even meant.
  Your firm lost a case because of a backup tape
  that nobody knew existed.

  3. THE VOLUME EXPLOSION (2008-2015)
  Data volumes exploded. A case that once involved
  500,000 pages now involved 5 million emails. You
  hired your first "litigation support" person and
  discovered the world of processing, hosting, and
  review platforms. You were skeptical of Relativity
  until you saw it work.

  4. THE TAR REVOLUTION (2012-2020)
  Technology-assisted review arrived. Your partners
  resisted ("a computer can't read like a lawyer").
  You championed TAR after seeing it find documents
  your review team missed. The Da Silva Moore
  decision was a watershed moment.

  5. THE AI ERA (2020-2025)
  Generative AI arrived. You marveled at its
  capabilities and worried about its risks. You
  saw a young associate submit an AI-generated
  privilege log without checking it. You realized
  your career bookended the transformation from
  analog to artificial intelligence.

  Create:
  1. Full memoir chapter (5,000-7,000 words)
  2. Lessons for the next generation
  3. Predictions for 2035
  4. Teaching guide for law school use

assertions:
  - type: llm_judge
    criteria: "Memoir captures the human experience of a technological revolution — the paper years section is vivid and specific (the physical experience of reviewing boxes, the camaraderie of review teams, the thrill of finding the key document by hand); the Zubulake moment captures the profession's confusion and adaptation (attorneys who didn't understand email, firms that learned about preservation obligations the hard way); the volume explosion section honestly describes the author's learning curve (skepticism about technology, the humbling experience of needing to rely on non-lawyer expertise); the TAR revolution section captures the cultural resistance and eventual acceptance; the AI era section conveys both wonder and concern; the memoir connects personal stories to industry transformation without being self-aggrandizing; the writing quality is literary, using specific details and dialogue."
    weight: 0.35
    description: "MemoirChapter"
  - type: llm_judge
    criteria: "Lessons and predictions demonstrate wisdom earned through experience — lessons include: 'Technology is a tool, not a strategy — every failed discovery project I witnessed failed because someone confused having the right software with having the right approach'; 'The most expensive document review is the one you have to do twice'; 'Your litigation hold is only as good as your weakest custodian's understanding of it'; each lesson is grounded in a specific story from the memoir; predictions for 2035 are grounded in current trajectory but genuinely forward-looking: AI will handle 90%+ of document review, but the remaining 10% (privilege, strategy, judgment) will require more skilled humans, not fewer; the discovery/privacy conflict will be resolved by technical solutions (in-situ analysis that never moves data) rather than legal solutions; the document review industry will transform from a labor business to a technology business."
    weight: 0.35
    description: "LessonsAndPredictions"
  - type: llm_judge
    criteria: "Teaching guide makes the memoir pedagogically valuable — discussion questions prompt students to examine the evolution critically (Was the Zubulake framework too rigid? Has proportionality been implemented effectively? Should TAR be mandatory?); exercises based on memoir scenarios (simulate a paper document review to appreciate the scale, negotiate an ESI protocol using the author's framework, evaluate a TAR validation report); the guide connects each historical era to current practice (students learn not just what happened but why it matters now); includes a timeline of key cases, rule amendments, and technology milestones; the guide is suitable for a 3-hour law school seminar or a full-day CLE program."
    weight: 0.30
    description: "TeachingGuide"
