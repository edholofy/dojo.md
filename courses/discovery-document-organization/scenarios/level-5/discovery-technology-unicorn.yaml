meta:
  id: discovery-technology-unicorn
  level: 5
  course: discovery-document-organization
  type: output
  description: "Build a legal tech unicorn in the e-discovery space — design a comprehensive business strategy for an AI-native discovery platform that disrupts a $15B industry"
  tags: [technology-unicorn, startup-strategy, market-disruption, master]

state: {}

trigger: |
  You are the founder and CEO of "DocuMind" — a
  legal tech startup that has raised a $50M Series B
  to disrupt the $15B e-discovery industry. Design
  the comprehensive strategy to reach unicorn status.

  MARKET THESIS:
  The e-discovery industry is ripe for disruption
  because:
  - Incumbent platforms (Relativity, Everlaw) were
    built as document management systems, not AI-
    native platforms
  - The industry charges per-GB pricing that creates
    perverse incentives (more data = more revenue)
  - 80% of review spend is wasted on non-relevant
    documents
  - Cross-border discovery is handled through manual
    processes
  - No platform integrates collection, review, and
    production with end-to-end AI

  DOCUMIND'S COMPETITIVE ADVANTAGE:
  - Founded by former Relativity engineering leads
    and litigation partners
  - AI models trained on 100M+ reviewed documents
    (licensed from 5 law firms)
  - Patent-pending "Zero-Touch Review" technology
    (AI classifies documents on ingest with human
    verification only for edge cases)
  - 10x cost reduction demonstrated in beta testing
  - SOC 2 Type II certified, FedRAMP in progress

  GROWTH STRATEGY:
  - Year 1: 100 law firm customers, $5M ARR
  - Year 2: 500 customers, $25M ARR, international
    expansion
  - Year 3: 1,500 customers, $75M ARR, government
    contracts
  - Year 4: 3,000 customers, $150M ARR, platform
    marketplace
  - Year 5: IPO or acquisition at $1.5B+ valuation

  Create:
  1. Complete business strategy
  2. Product and technology roadmap
  3. Market entry and expansion plan
  4. Financial model with unit economics
  5. IPO/exit strategy

assertions:
  - type: llm_judge
    criteria: "Business strategy demonstrates deep understanding of e-discovery market dynamics — addresses the industry's unique characteristics: long sales cycles (6-12 months for law firms, 12-18 months for corporations), high switching costs (data migration, workflow disruption), regulatory requirements (SOC 2, FedRAMP for government work), and relationship-driven sales; the competitive analysis honestly assesses Relativity's dominant market position (80%+ share in large law firms) and identifies the attack vector (small-to-mid-size firms underserved by Relativity's complexity and cost, corporate legal departments frustrated by per-GB pricing, international firms needing cross-border solutions); the pricing model disrupts per-GB pricing with outcome-based pricing (per matter, per production, or subscription) that aligns incentives (more efficiency = more margin for DocuMind, lower cost for clients)."
    weight: 0.35
    description: "BusinessStrategy"
  - type: llm_judge
    criteria: "Product roadmap is technically ambitious and achievable — Year 1 MVP focuses on AI-first review with integration to existing platforms (Relativity connector allows firms to use DocuMind's AI within their existing Relativity environment, reducing switching friction); Year 2 adds end-to-end capability (collection, processing, review, production all in one platform), international compliance module (GDPR, PIPL automated compliance), and mobile evidence collection; Year 3 adds advanced AI (multi-model privilege detection, predictive coding 3.0, automated privilege log generation), government compliance (FedRAMP authorization), and marketplace (third-party integrations and extensions); Year 4 adds platform ecosystem (API marketplace, certified partner program, custom AI model training); the technology stack uses modern cloud-native architecture with specific attention to data isolation (client data never co-mingled) and AI model governance."
    weight: 0.35
    description: "ProductRoadmap"
  - type: llm_judge
    criteria: "Financial model demonstrates realistic path to unicorn valuation — unit economics: customer acquisition cost ($15K-25K for small firms, $50K-100K for mid-size, $200K+ for enterprise), average annual contract value ($30K small, $120K mid-size, $500K enterprise), gross margin (75-80% as a SaaS platform vs. 40-50% for traditional e-discovery services), net revenue retention (120%+ as customers expand usage); the growth trajectory from $5M to $150M ARR over 5 years requires aggressive but achievable customer acquisition (net 400 new customers/year by Year 3); the valuation model uses legal tech comparables (10-15x forward revenue for high-growth legal SaaS); the IPO/exit strategy identifies potential acquirers (Thomson Reuters, Relativity, private equity) and IPO readiness requirements (predictable revenue, positive unit economics, international presence); capital allocation of the $50M Series B is detailed (40% product development, 30% sales and marketing, 15% operations, 15% reserve)."
    weight: 0.30
    description: "FinancialModel"
