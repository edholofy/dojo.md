meta:
  id: discovery-research-handbook
  level: 5
  course: discovery-document-organization
  type: output
  description: "Author a comprehensive research handbook on e-discovery — create the definitive academic reference synthesizing law, technology, and information science perspectives on modern discovery"
  tags: [research-handbook, academic-reference, interdisciplinary, master]

state: {}

trigger: |
  Cambridge University Press has commissioned you
  to edit "The Cambridge Handbook of E-Discovery
  and Litigation Technology." Design the handbook
  and write the editor's introduction.

  HANDBOOK PARAMETERS:
  - 28 chapters by leading scholars and practitioners
  - Target audience: academics, doctoral students,
    judges, policy makers, senior practitioners
  - First comprehensive academic reference bridging
    law, computer science, and information science
    perspectives on e-discovery
  - Must become the standard reference for 10+ years

  ORGANIZE INTO SECTIONS:

  Part I: Legal Foundations (Chapters 1-6)
  Part II: Technology and Information Science
  (Chapters 7-14)
  Part III: Practice and Management (Chapters 15-20)
  Part IV: International and Comparative Perspectives
  (Chapters 21-24)
  Part V: Future Directions (Chapters 25-28)

  Create:
  1. Complete table of contents with chapter
     descriptions and suggested authors
  2. Editor's introduction (5,000-7,000 words)
  3. Interdisciplinary methodology chapter
  4. Contributor guidelines
  5. Impact and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Table of contents demonstrates genuine interdisciplinary integration — Part I covers legal foundations (proportionality doctrine, preservation obligations, privilege in the digital age, international discovery conflicts, judicial management of e-discovery, discovery ethics); Part II covers technology (information retrieval theory applied to legal search, machine learning for document classification, NLP for legal text analysis, data processing and deduplication science, AI transparency and explainability, cybersecurity for litigation data); Part III covers practice (project management methodology, cost modeling, quality assurance, vendor ecosystem, change management in litigation support); Part IV covers international perspectives (US-EU comparative analysis, Asian approaches to electronic evidence, international arbitration discovery, cross-border data protection); Part V addresses future directions (AI and the future of human review, quantum computing implications, discovery in decentralized systems, ethical frameworks for emerging technology); suggested authors span law schools, computer science departments, and industry."
    weight: 0.35
    description: "TableOfContents"
  - type: llm_judge
    criteria: "Editor's introduction synthesizes the field as an interdisciplinary discipline — traces the evolution from a niche procedural topic to a multi-billion-dollar industry with profound implications for justice, privacy, and technology policy; identifies the key intellectual tensions: efficiency vs. thoroughness, technology vs. professional judgment, discovery access vs. data protection, cost reduction vs. quality; articulates why an interdisciplinary approach is essential (lawyers understand the legal framework but not the technology, computer scientists understand the algorithms but not the legal context, information scientists understand classification theory but not litigation dynamics); identifies research gaps: no large-scale empirical studies of review accuracy, limited understanding of AI bias in legal classification, absence of international comparative analysis, minimal research on discovery's impact on access to justice; positions the handbook as establishing e-discovery as a legitimate academic field deserving of systematic study."
    weight: 0.35
    description: "EditorsIntroduction"
  - type: llm_judge
    criteria: "Methodology chapter and contributor guidelines establish rigorous scholarly standards — the interdisciplinary methodology chapter addresses: how to design research that bridges legal and technical perspectives (e.g., testing whether court-accepted TAR protocols actually achieve their stated recall targets requires both legal understanding and IR expertise); challenges of studying proprietary systems (most review platforms are commercial, limiting reproducibility); ethics of studying litigation data (privilege, confidentiality, informed consent from litigants); appropriate statistical methods for evaluating review accuracy; contributor guidelines specify: chapter length (10,000-15,000 words), citation standards (combining legal citation with scientific citation), required elements (literature review spanning both legal and technical sources, original contribution, practical implications, future research directions), and review process (each chapter reviewed by one legal scholar and one technical expert)."
    weight: 0.30
    description: "MethodologyAndGuidelines"
