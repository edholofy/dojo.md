meta:
  id: discovery-thought-leadership
  level: 5
  course: discovery-document-organization
  type: output
  description: "Develop a thought leadership platform on the future of e-discovery — publish research, deliver keynotes, and influence the profession's evolution toward AI-native, privacy-respecting, cost-effective discovery"
  tags: [thought-leadership, future-of-discovery, industry-influence, master]

state: {}

trigger: |
  You are the world's foremost authority on e-discovery.
  You've been invited to deliver the keynote at the
  Sedona Conference's Annual Meeting. 1,500 judges,
  attorneys, and e-discovery professionals will attend.

  Your keynote must address:

  1. THE DISCOVERY COST CRISIS
  - Discovery now represents 60-80% of litigation
    costs in complex cases
  - The average Fortune 500 company spends $30M+
    annually on discovery
  - Small and mid-size firms are priced out of
    effective discovery
  - The discovery cost burden falls disproportionately
    on defendants and responding parties
  - Courts apply proportionality inconsistently

  2. THE AI INFLECTION POINT
  - Generative AI can now classify documents with
    accuracy exceeding human reviewers
  - AI can draft privilege logs, generate production
    indices, and identify relevant custodians
  - But AI hallucinations, bias, and opacity create
    new risks
  - The profession lacks standards for AI use in
    discovery

  3. THE PRIVACY PARADOX
  - Discovery obligations conflict with data
    protection laws globally
  - GDPR, PIPL, and other privacy regimes make
    cross-border discovery increasingly difficult
  - The "privacy vs. discovery" tension has no
    resolution framework
  - Companies are restructuring operations to
    minimize discovery exposure

  4. A FRAMEWORK FOR THE NEXT DECADE
  - Propose a comprehensive framework for modernizing
    discovery that addresses cost, technology, and
    privacy simultaneously

  Create:
  1. Full keynote text (30-minute speech)
  2. Accompanying Sedona Conference principle
     proposals
  3. Post-keynote article for Judicature or similar
  4. Research agenda for the next decade
  5. Model rule amendments for discovery reform

assertions:
  - type: llm_judge
    criteria: "Keynote is compelling and authoritative — opens with a powerful illustration of the discovery cost crisis (a specific case where discovery costs exceeded the amount in controversy, or a pro bono matter abandoned because discovery was unaffordable); uses data effectively to quantify the crisis (average costs, time spent, documents reviewed); the AI section honestly assesses both the promise (10x efficiency improvements) and the peril (hallucinations in privilege logs, bias in relevance coding, opacity in classification decisions); the privacy paradox section goes beyond reciting the conflict to proposing resolution principles; the framework for the next decade is memorable, practical, and ambitious; the speech has the gravitas appropriate for a Sedona Conference keynote — scholarly but accessible, provocative but grounded, forward-looking but practical."
    weight: 0.35
    description: "KeynoteAddress"
  - type: llm_judge
    criteria: "Sedona Conference principle proposals are specific and implementable — proposes 5-7 new principles addressing: (1) AI transparency (parties using AI in discovery must disclose the methodology and provide validation statistics), (2) AI defensibility standards (minimum recall and precision thresholds for AI-assisted review, with practice area adjustments), (3) cross-border discovery protocol (parties must agree on data protection compliance mechanisms before cross-border collection begins), (4) proportionality operationalization (specific cost-per-relevant-document thresholds above which cost-shifting should be presumed), (5) discovery cost accountability (producing parties must provide cost estimates before discovery begins, with consequences for material variance), (6) AI ethics in discovery (prohibition on using AI to generate court submissions without human verification); each principle includes commentary explaining its purpose and application."
    weight: 0.35
    description: "SedonaPrinciples"
  - type: llm_judge
    criteria: "Research agenda and model rule amendments are substantive — the research agenda identifies 5-7 major research initiatives with methodology, timeline, and institutional partners: (1) multi-site study comparing AI-assisted vs. human review across case types, (2) cross-jurisdictional study of privacy law impact on discovery effectiveness, (3) longitudinal study of proportionality application in federal courts, (4) cost-benefit analysis of different discovery approaches by matter type, (5) study of AI bias in document classification across demographic and linguistic variables; model rule amendments propose specific changes to FRCP Rules 26, 34, and 37 addressing: AI disclosure requirements, international discovery coordination, proportionality benchmarks, and discovery cost allocation; each amendment includes commentary and rationale."
    weight: 0.30
    description: "ResearchAndRules"
