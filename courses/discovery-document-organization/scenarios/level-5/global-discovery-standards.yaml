meta:
  id: global-discovery-standards
  level: 5
  course: discovery-document-organization
  type: output
  description: "Develop international standards for e-discovery — create a cross-jurisdictional framework harmonizing discovery obligations with data protection requirements worldwide"
  tags: [international-standards, harmonization, global-framework, master]

state: {}

trigger: |
  The International Bar Association (IBA) and the
  Sedona Conference have jointly commissioned you
  to develop International Standards for E-Discovery
  that harmonize discovery obligations with data
  protection requirements.

  CONTEXT:
  - US-style discovery is expanding globally (UK
    disclosure, EU evidence regulations, Asian
    commercial arbitration)
  - GDPR and similar laws make US-style discovery
    nearly impossible for EU data
  - No international framework resolves the conflict
  - The Hague Convention is too slow and limited
    for modern e-discovery
  - Companies restructure to avoid discovery
    (moving data, changing reporting structures)
  - International arbitration tribunals struggle
    with e-discovery expectations

  STANDARDS MUST ADDRESS:
  1. Core principles for international e-discovery
  2. Data protection compliance framework
  3. Cross-border data transfer protocols
  4. Technology standards for international
     productions
  5. Dispute resolution mechanisms for conflicts
     between discovery and privacy
  6. Special procedures for international arbitration

  Create:
  1. Complete standards document
  2. Data protection compliance toolkit
  3. Model cross-border discovery protocol
  4. Implementation guide for practitioners
  5. Monitoring and evolution framework

assertions:
  - type: llm_judge
    criteria: "Standards document resolves the discovery-privacy conflict through principled framework — proposes a hierarchy of principles: (1) proportionality first (discovery requests must be proportional before data protection analysis begins), (2) data minimization (collect and transfer only what is necessary, anonymize where possible), (3) purpose limitation (data collected for discovery may not be used for other purposes), (4) transparency (data subjects must be informed when their data is subject to discovery), (5) security (transferred data must be protected at the highest applicable standard); the framework resolves conflicts through a balancing test that weighs: the importance of the evidence, the availability from alternative sources, the data protection risk, and the existence of protective measures; the standards accommodate both common law discovery (broad, party-driven) and civil law evidence gathering (narrow, court-directed) by establishing a spectrum of acceptable approaches."
    weight: 0.35
    description: "StandardsDocument"
  - type: llm_judge
    criteria: "Cross-border protocol provides step-by-step procedures — for each cross-border discovery scenario (US litigation seeking EU data, EU proceedings seeking US data, international arbitration, multi-jurisdictional investigations): identifies the applicable legal framework, required procedural steps, available transfer mechanisms, timeline expectations, and dispute resolution procedures; the model protocol includes: pre-collection data mapping, Data Protection Impact Assessment template, Standard Contractual Clause integration, in-country review option (review data in source jurisdiction, transfer only responsive non-personal data), anonymization and pseudonymization protocols, and judicial coordination procedures (requesting court communicates with source jurisdiction court); addresses practical challenges (time zone coordination, language differences, format incompatibility, cost allocation)."
    weight: 0.35
    description: "CrossBorderProtocol"
  - type: llm_judge
    criteria: "Implementation guide and monitoring framework enable practical adoption — the implementation guide provides jurisdiction-specific supplements for 10 key jurisdictions (US, UK, Germany, France, Japan, China, Singapore, Brazil, UAE, Australia) with: local legal requirements, approved data transfer mechanisms, regulatory contact information, and typical timelines; the data protection compliance toolkit includes: DPIA template for discovery purposes, consent form templates in 6 languages, Standard Contractual Clause annexes for discovery data, and data processing agreements for e-discovery vendors; the monitoring framework establishes a standing committee that reviews standards annually, publishes guidance on new legislation (e.g., AI Act implications), maintains a database of cross-border discovery decisions, and proposes amendments to keep the standards current; the framework recognizes that this is an evolving field and builds in flexibility for future developments."
    weight: 0.30
    description: "ImplementationAndMonitoring"
