meta:
  id: discovery-existential-challenges
  level: 5
  course: discovery-document-organization
  type: output
  description: "Address existential challenges facing e-discovery — confront fundamental questions about AI replacing human review, the end of document-based evidence, and discovery in a post-privacy world"
  tags: [existential-challenges, future-of-discovery, philosophical-analysis, master]

state: {}

trigger: |
  A prestigious law journal has invited you to write
  a symposium article addressing existential
  challenges facing e-discovery. Three provocative
  scenarios require analysis:

  SCENARIO A — THE END OF HUMAN REVIEW
  Year: 2030. AI document review achieves 95% recall
  and 90% precision — significantly exceeding human
  reviewers (60-70% recall). A federal court in the
  Southern District of New York issues a standing
  order requiring AI-first review for all cases with
  more than 10,000 documents, allowing human review
  only for documents flagged by AI. Attorneys who
  insist on manual review must justify the additional
  cost.

  Questions:
  - Should human review be required when AI is
    demonstrably superior?
  - What happens to the document review industry
    (100,000+ contract reviewers)?
  - Who is responsible when AI misses a privileged
    document?
  - Does attorney competence (Rule 1.1) now require
    AI proficiency?

  SCENARIO B — EVIDENCE WITHOUT DOCUMENTS
  Year: 2032. Most business communication occurs
  through ephemeral channels (disappearing messages,
  voice-only meetings, VR interactions). Traditional
  document review becomes impossible because there
  are no documents. Instead, evidence exists as:
  - AI-generated meeting summaries (no transcript)
  - Metadata patterns (who communicated with whom,
    when, how long)
  - Behavioral analytics (organizational network
    analysis)
  - Reconstructed evidence (AI recreating likely
    communication content from context)

  Questions:
  - How does discovery work when documents don't
    exist?
  - Is AI-reconstructed evidence admissible?
  - Should businesses be required to create durable
    records for litigation purposes?
  - What are the authentication challenges for
    non-document evidence?

  SCENARIO C — DISCOVERY IN A SURVEILLANCE STATE
  Year: 2029. Advances in surveillance technology
  mean that virtually all communications are
  recorded somewhere (smart speakers, IoT devices,
  employer monitoring software, government
  surveillance). Discovery requests can theoretically
  access everything anyone has ever said or written.

  Questions:
  - Should there be limits on what technology can
    discover?
  - Is proportionality sufficient, or do we need
    new privacy-based limitations?
  - How do we protect attorney-client privilege
    when all communications are recorded?
  - What happens to the right to private thought
    when brain-computer interfaces create discoverable
    records of cognitive processes?

  Create:
  1. Full symposium article (8,000-10,000 words)
  2. Proposed amendments to FRCP discovery rules
  3. Ethical framework for emerging discovery
     challenges
  4. Technology recommendations
  5. Response to counterarguments

assertions:
  - type: llm_judge
    criteria: "End of human review analysis grapples with the workforce and competence implications — examines the tension between efficiency (AI is demonstrably better and cheaper) and professional obligation (attorneys must exercise independent judgment); analyzes whether Rule 1.1 competence now requires understanding AI capabilities and limitations (citing Comment 8's technology competence requirement); addresses the economic displacement of 100,000+ contract reviewers (proposes transition support, retraining for AI oversight roles, expanded access to justice roles); analyzes liability for AI errors (the attorney remains responsible, but should malpractice standards evolve to recognize AI-reasonable review?); proposes a framework where AI handles initial classification but human attorneys make all privilege determinations, case-critical relevance decisions, and quality validation; the analysis avoids both technophobia and uncritical AI enthusiasm."
    weight: 0.35
    description: "EndOfHumanReview"
  - type: llm_judge
    criteria: "Evidence without documents analysis addresses genuinely novel territory — examines the foundational assumption of discovery (that relevant evidence exists in durable form) and how it breaks down in an ephemeral communication environment; analyzes whether AI-reconstructed evidence can meet FRE authentication standards (how do you authenticate what an AI thinks someone probably said?); examines the business records exception (FRE 803(6)) for AI-generated meeting summaries (is an AI summary a 'record of regularly conducted activity'?); proposes a duty to create discoverable records for certain categories of business decisions (analogous to record-keeping requirements in regulated industries); addresses metadata-as-evidence (communication patterns, timing, frequency can prove conspiracy without content); the analysis is forward-looking without being speculative, grounding each scenario in current technological trajectory."
    weight: 0.35
    description: "EvidenceWithoutDocuments"
  - type: llm_judge
    criteria: "Surveillance state discovery analysis confronts privacy fundamentals — examines whether the concept of proportionality (Rule 26(b)(1)) is sufficient to protect privacy when everything is potentially discoverable, or whether new categorical limitations are needed (areas of life that are simply off-limits to discovery regardless of relevance); addresses the attorney-client privilege in a world where smart speakers may have recorded privileged conversations; examines the brain-computer interface scenario seriously (if cognitive data is discoverable, does the 5th Amendment privilege against self-incrimination apply?); proposes FRCP amendments creating: a privacy presumption (certain categories of personal data are presumptively non-discoverable), technology-specific limitations (restrictions on IoT and surveillance data discovery), and enhanced proportionality standards for highly intrusive discovery; the article maintains scholarly rigor while engaging with genuinely provocative questions."
    weight: 0.30
    description: "SurveillanceDiscovery"
