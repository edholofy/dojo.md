meta:
  id: beginner-discovery-shift
  level: 1
  course: discovery-document-organization
  type: output
  description: "Beginner shift simulation — handle multiple discovery document tasks including production preparation, privilege review, and exhibit organization in a single working day"
  tags: [shift-simulation, multi-task, discovery-basics, beginner]

state: {}

trigger: |
  You are a litigation paralegal starting your
  Monday morning. Three urgent discovery tasks
  await you.

  TASK 1 — PRODUCTION DEADLINE (Due: Wednesday)
  In Garcia v. Mountain View Apartments, your firm
  represents the defendant landlord. You must prepare
  a production of 75 documents in response to
  plaintiff's first set of RFPs in a habitability
  case. The documents include:
  - Lease agreements (3 versions over 5 years)
  - Maintenance request logs (2 years)
  - Work orders for plaintiff's unit (15 orders)
  - Building inspection reports (3 annual inspections)
  - Communications with plaintiff (20 emails)
  - Vendor invoices for repairs (10 invoices)
  - Property management policies (5 documents)
  - Photographs of the property (12 photos)

  You need to: Bates-number all documents, create
  a production index, and draft a transmittal letter.
  Three documents appear privileged (emails between
  property manager and in-house counsel).

  TASK 2 — PRIVILEGE LOG REVIEW (Due: Today)
  In Chen v. Pacific Rim Trading, opposing counsel
  has challenged your privilege log, claiming 5
  entries have insufficient descriptions. The court
  has ordered you to supplement the log by end of
  day. The challenged entries are:
  - Entry 12: "Email, 4/3/24, privileged"
  - Entry 15: "Memo, undated, work product"
  - Entry 18: "Notes, 5/15/24, privileged"
  - Entry 22: "Spreadsheet, 6/1/24, work product"
  - Entry 28: "Letter, 7/10/24, privileged and
    work product"

  TASK 3 — DEPOSITION PREP (Due: Tomorrow morning)
  In Patel v. City Hospital, you need to organize
  12 exhibits for tomorrow's deposition of the
  hospital's Chief of Surgery. The exhibits include
  medical records, surgical protocols, incident
  reports, and personnel files. Create an exhibit
  list and organization memo.

  Address all three tasks with appropriate work
  product for each.

assertions:
  - type: llm_judge
    criteria: "Production preparation is complete and professional — Bates numbering scheme uses appropriate prefix (e.g., MVA-) with sequential numbering; the production index maps all 75 documents to Bates ranges, dates, descriptions, and responsive RFP numbers; the transmittal letter identifies the case, production date, total documents and pages, format, and any documents withheld on privilege grounds; the 3 privileged emails are identified and logged in a privilege log with proper descriptions (date, author, recipient, subject matter, privilege claimed); the work demonstrates organization and attention to the Wednesday deadline."
    weight: 0.35
    description: "ProductionPreparation"
  - type: llm_judge
    criteria: "Privilege log supplementation corrects the deficiencies — each of the 5 challenged entries is supplemented with: complete date, author name and title, recipient name and title, document type, general subject matter description, and specific privilege or protection claimed with basis; the supplemented descriptions are detailed enough to allow opposing counsel to assess the privilege claim without revealing privileged content; the response addresses the court's order directly and is formatted for filing; the work demonstrates understanding of why the original entries were deficient."
    weight: 0.35
    description: "PrivilegeLogSupplement"
  - type: llm_judge
    criteria: "Deposition exhibit organization is strategic and practical — exhibit list assigns numbers to all 12 exhibits with descriptions, Bates ranges, and deposition topics; the organization memo groups exhibits by examination topic (medical care provided, surgical protocols followed/violated, incident reporting, personnel qualifications); suggests an order of use that builds the examination logically; identifies key exhibits for impeachment or admissions; includes practical preparation notes (number of copies, tab organization, backup copies); the work is ready for attorney use the next morning."
    weight: 0.30
    description: "DepositionExhibitOrg"
