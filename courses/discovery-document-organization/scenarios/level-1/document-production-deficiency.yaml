meta:
  id: document-production-deficiency
  level: 1
  course: discovery-document-organization
  type: output
  description: "Identify deficiencies in opposing counsel's document production — analyze a production for missing documents, incomplete responses, and improper redactions"
  tags: [production-deficiency, meet-and-confer, missing-documents, beginner]

state: {}

trigger: |
  You received a document production from opposing
  counsel that appears incomplete. Your supervising
  attorney wants you to identify all deficiencies
  and draft a meet-and-confer letter.

  CASE: Henderson v. Pacific Financial Group
  CLAIM: Securities fraud — plaintiff alleges
  misrepresentation in investment advisor
  recommendations
  YOUR CLIENT: Henderson (plaintiff investor)

  YOUR REQUESTS FOR PRODUCTION:
  RFP 1: All communications between defendant and
  plaintiff regarding investment recommendations
  (2020-2024)
  RFP 2: All internal analyses or research reports
  relied upon in making investment recommendations
  to plaintiff
  RFP 3: All documents reflecting defendant's
  compensation or commission structure for recommended
  products
  RFP 4: All complaints from other clients regarding
  similar investment recommendations
  RFP 5: All regulatory filings, audits, or
  compliance reviews mentioning the investment
  products recommended to plaintiff

  PRODUCTION RECEIVED (Bates PFG-001 to PFG-089):
  - RFP 1: 22 emails produced (PFG-001-045). But
    plaintiff's own records show at least 15
    additional emails that were not produced. Also,
    no text messages produced despite plaintiff
    having screenshots of texts with the advisor.
  - RFP 2: Response states "No responsive documents."
    However, the produced emails reference attached
    research reports ("see attached analysis") that
    were not included in the production.
  - RFP 3: Two pages produced with heavy redactions
    (PFG-046-047). Redactions cover entire paragraphs
    with no privilege log entries explaining the
    redactions.
  - RFP 4: Response states "Objection: overbroad,
    unduly burdensome, and not reasonably calculated
    to lead to the discovery of admissible evidence."
    No documents produced.
  - RFP 5: Three SEC filings produced (PFG-048-089)
    but no internal compliance reviews or audit
    reports.

  Create:
  1. A deficiency analysis listing each production
     gap
  2. A meet-and-confer letter to opposing counsel
  3. A motion to compel outline if the meet-and-confer
     fails

assertions:
  - type: llm_judge
    criteria: "Deficiency analysis is thorough and specific — identifies at least 5 specific deficiencies: (1) RFP 1: 15+ known missing emails and no text messages produced despite evidence they exist; (2) RFP 2: false 'no responsive documents' response contradicted by references to research reports in produced emails; (3) RFP 3: improper redactions without privilege log entries violating Rule 26(b)(5); (4) RFP 4: boilerplate objections without any production or meaningful response; (5) RFP 5: incomplete production limited to public SEC filings while omitting internal compliance documents; each deficiency cites the specific evidence supporting the claim (email references, plaintiff's records, etc.)."
    weight: 0.35
    description: "DeficiencyAnalysis"
  - type: llm_judge
    criteria: "Meet-and-confer letter is professional and legally effective — addresses each deficiency with specific requests for supplemental production; cites FRCP Rule 37(a) requiring good faith conferral before filing a motion to compel; identifies the specific inadequacies in each response; requests a supplemental privilege log for redacted materials; challenges the boilerplate objection to RFP 4 on legal grounds (relevance of similar complaints to pattern evidence, proportionality analysis); sets a reasonable deadline for response (14-21 days); maintains a professional tone while firmly asserting discovery rights; notes that failure to resolve these issues will necessitate court intervention."
    weight: 0.35
    description: "MeetAndConferLetter"
  - type: llm_judge
    criteria: "Motion to compel outline is strategically sound — identifies the legal standard for compelling production under Rule 37(a); organizes arguments by RFP with specific relief requested for each; highlights the most egregious deficiency (false 'no responsive documents' claim for RFP 2) as the lead argument; requests sanctions under Rule 37(a)(5) for expenses incurred in making the motion; addresses proportionality arguments preemptively; includes a request for in camera review of redacted documents; the outline would serve as a working blueprint for drafting the actual motion."
    weight: 0.30
    description: "MotionToCompelOutline"
