meta:
  id: redaction-protocol
  level: 1
  course: discovery-document-organization
  type: output
  description: "Develop a redaction protocol for document production — create guidelines for properly redacting privileged, confidential, and irrelevant information from documents"
  tags: [redaction, privilege-protection, document-production, beginner]

state: {}

trigger: |
  You are preparing a document production in a
  trade secret misappropriation case. Many documents
  contain a mix of responsive and non-responsive
  information, requiring careful redaction.

  CASE: Innovatech Solutions v. DataCore Systems
  CLAIM: Former employee took trade secrets when
  joining competitor
  YOUR CLIENT: Innovatech Solutions (plaintiff)

  REDACTION SCENARIOS YOU WILL ENCOUNTER:

  1. PRIVILEGED INFORMATION:
  An email chain between the VP of Engineering and
  in-house counsel discussing the trade secret
  protection strategy contains 3 emails. The first
  email (from VP to counsel seeking advice) is
  privileged. The reply (counsel's advice) is
  privileged. But the third email (VP forwarding
  counsel's advice to the engineering team with
  additional non-privileged business instructions)
  contains both privileged and non-privileged content.

  2. TRADE SECRET CONTENT:
  Technical specifications documents describe both
  the trade secrets at issue AND general product
  information. The trade secrets (specific algorithms
  and formulas) must be redacted from production to
  third parties but may need to be produced under
  a protective order to defendant.

  3. PERSONAL INFORMATION:
  HR records of the former employee contain
  responsive information (employment dates, job
  duties, access to trade secrets) mixed with
  non-responsive personal information (Social
  Security numbers, medical information, salary
  for non-relevant periods).

  4. THIRD-PARTY CONFIDENTIAL:
  Documents contain confidential information of
  Innovatech's other clients and business partners
  that is not relevant to this case.

  5. ATTORNEY WORK PRODUCT:
  An investigation memo prepared by outside counsel
  contains both factual findings (potentially
  discoverable) and attorney mental impressions
  (protected opinion work product).

  Create:
  1. Redaction protocol with guidelines for each
     scenario
  2. Redaction log template
  3. Quality control procedures for redactions
  4. Redaction training guide for review team

assertions:
  - type: llm_judge
    criteria: "Redaction protocol provides clear guidelines for each scenario — addresses each of the 5 scenarios with specific instructions: (1) partial privilege redaction of the mixed email preserving non-privileged business content while redacting counsel's legal advice; (2) trade secret redaction with dual-track approach (full redaction for third parties, protective-order-governed production to defendant); (3) personal information redaction following minimization principles (redact SSN, medical, irrelevant salary while preserving employment facts); (4) third-party confidential information redaction with consideration of whether a protective order covers it; (5) work product redaction distinguishing fact work product from opinion work product; each guideline includes a decision tree for ambiguous situations."
    weight: 0.35
    description: "RedactionProtocol"
  - type: llm_judge
    criteria: "Redaction log and training guide are practically useful — the redaction log template captures: document Bates number, page(s) redacted, basis for redaction (privilege, trade secret, personal information, third-party confidential, work product), brief description of redacted content (sufficient for the court to evaluate if challenged), redactor identity, and review/approval status; the training guide covers: proper redaction technique (permanent vs. reversible redactions), common mistakes (incomplete redaction leaving readable text, metadata not scrubbed, redaction boxes that can be removed), and specific examples from each scenario showing before/after redaction."
    weight: 0.35
    description: "LogAndTraining"
  - type: llm_judge
    criteria: "Quality control procedures prevent redaction failures — includes pre-production QC steps: verify all redactions are permanent (not just overlay boxes), confirm metadata is scrubbed from redacted documents, sample review of redacted documents by senior attorney, verification that redaction log entries match actual redactions, check that redactions are consistent across similar documents (same type of information redacted the same way throughout), and a final review comparing the redacted production to the privilege log and redaction log for completeness; addresses the risk of inadvertent production of unredacted documents and includes a protocol for responding to such events (FRE 502(b) analysis)."
    weight: 0.30
    description: "QualityControl"
