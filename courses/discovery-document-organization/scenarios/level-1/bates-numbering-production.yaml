meta:
  id: bates-numbering-production
  level: 1
  course: discovery-document-organization
  type: output
  description: "Prepare a document production with proper Bates numbering — apply consistent numbering, create a production transmittal letter, and prepare a production log"
  tags: [bates-numbering, document-production, transmittal-letter, beginner]

state: {}

trigger: |
  You are preparing your client's first document
  production in response to a Request for Production
  of Documents in a commercial lease dispute.

  CASE: Parkview Properties v. Green Valley Restaurants
  YOUR CLIENT: Green Valley Restaurants (defendant
  tenant)
  DISPUTE: Landlord claims tenant breached lease by
  making unauthorized modifications and failing to
  maintain the premises

  OPPOSING COUNSEL'S REQUESTS:
  Request No. 1: All documents relating to the lease
  Request No. 2: All communications with the landlord
  Request No. 3: All documents relating to
  modifications or improvements to the premises
  Request No. 4: All photographs of the premises
  Request No. 5: All financial records relating to
  maintenance and repair expenditures

  DOCUMENTS TO PRODUCE (gathered from client):
  - Original lease agreement (12 pages)
  - Lease amendment #1 (3 pages)
  - 8 emails between tenant and landlord's property
    manager (various dates over 18 months)
  - 3 letters from tenant to landlord requesting
    permission for modifications
  - 2 letters from landlord granting permission
  - 1 letter from landlord denying permission for
    patio expansion
  - Contractor bid for kitchen renovation (4 pages)
  - Contractor invoice for completed kitchen work
    (2 pages)
  - 15 photographs of the premises (before and
    after modifications)
  - Maintenance log maintained by restaurant manager
    (6 pages)
  - 4 repair invoices from various vendors
  - Building inspection report (3 pages)
  - Insurance policy declarations page (2 pages)

  Create:
  1. A Bates numbering plan with prefix and numbering
     scheme
  2. A production index mapping each document to
     Bates ranges and responsive request numbers
  3. A transmittal letter to opposing counsel
  4. Responses to each Request for Production

assertions:
  - type: llm_judge
    criteria: "Bates numbering plan is professional and consistent — uses a clear prefix (e.g., GVR- for Green Valley Restaurants) with sequential numbering (GVR-000001 through the last page); documents are organized logically (by request number or chronologically); multi-page documents have continuous Bates ranges; photographs are individually numbered; the total page count is accounted for; the plan explains the format (TIFF with load files, or PDF with Bates stamps, or native format for specific document types)."
    weight: 0.35
    description: "BatesNumberingPlan"
  - type: llm_judge
    criteria: "Production index is complete and cross-referenced — maps every document to: Bates range, document description, date, author/source, document type, and which Request for Production numbers it is responsive to; documents responsive to multiple requests are properly cross-referenced; the index allows opposing counsel to quickly locate documents relevant to each request; total production volume is stated (number of documents and total pages)."
    weight: 0.35
    description: "ProductionIndex"
  - type: llm_judge
    criteria: "Transmittal letter and responses are professionally drafted — the transmittal letter identifies the case, production date, Bates range, format, and any applicable confidentiality designations; responses to each RFP include proper objections where warranted (overbreadth, proportionality) while still producing responsive documents; responses identify which Bates-numbered documents are responsive to each request; the letter includes a reservation of rights (to supplement production, to assert additional privilege claims); the tone is professional and compliant with discovery obligations."
    weight: 0.30
    description: "TransmittalAndResponses"
