meta:
  id: document-review-checklist
  level: 1
  course: discovery-document-organization
  type: output
  description: "Create a document review checklist for a first-pass review — develop a systematic review protocol for coding documents by relevance, privilege, and confidentiality"
  tags: [document-review, review-protocol, coding-checklist, beginner]

state: {}

trigger: |
  You are training a new contract reviewer who will
  be conducting first-pass document review on a
  personal injury case. Create a comprehensive review
  checklist and protocol.

  CASE: Martinez v. City Transit Authority
  CLAIM: Bus accident causing serious injuries to
  a passenger
  KEY ISSUES: Driver negligence, vehicle maintenance,
  training records, prior incidents, damages

  PRODUCTION TO REVIEW: 500 documents from the
  City Transit Authority including:
  - Bus driver's personnel file
  - Vehicle maintenance records
  - Incident reports
  - Training manuals and records
  - Internal investigation documents
  - Surveillance camera footage logs
  - Passenger complaint records
  - Safety audit reports
  - Communications between driver and supervisors
  - Insurance and claims records

  CODING CATEGORIES NEEDED:
  - Relevance (Highly Relevant / Relevant /
    Marginally Relevant / Not Relevant)
  - Privilege (Privileged / Potentially Privileged /
    Not Privileged)
  - Confidentiality (Confidential / Not Confidential)
  - Issue tags (Negligence, Maintenance, Training,
    Prior Incidents, Damages, Other)
  - Key document flag (Yes/No)
  - Hot document flag (Yes/No — documents requiring
    immediate attorney attention)

  Create:
  1. Complete review protocol with instructions
     for each coding category
  2. Decision trees for privilege and relevance
     determinations
  3. Examples of how to code 5 sample documents
  4. Escalation procedures for ambiguous documents
  5. Quality control checklist

assertions:
  - type: llm_judge
    criteria: "Review protocol provides clear, actionable instructions for each coding category — relevance coding includes specific definitions of each level with examples from this case (e.g., 'Highly Relevant: documents directly showing the incident, driver's actions that day, vehicle condition on incident date; Relevant: driver's training history, vehicle maintenance history, prior complaints about this driver; Marginally Relevant: general safety policies, unrelated employee records; Not Relevant: documents about other buses, unrelated administrative matters'); privilege instructions explain how to identify attorney-client communications and work product in a government entity context (in-house counsel communications, investigation reports prepared at counsel's direction); confidentiality coding addresses HIPAA concerns for medical records and personnel file privacy."
    weight: 0.35
    description: "ReviewProtocol"
  - type: llm_judge
    criteria: "Decision trees are logical and comprehensive — the privilege decision tree walks through: (1) Is the document a communication? → (2) Does it involve an attorney? → (3) Was it for the purpose of seeking/providing legal advice? → (4) Was it kept confidential? → Privileged; separate branch for work product: (1) Was it prepared in anticipation of litigation? → (2) By or at the direction of an attorney? → Work product; the relevance decision tree connects document types to case issues; each terminal node in the decision tree gives a clear coding instruction; the trees handle common ambiguities (cc'd attorneys on business emails, mixed-purpose documents, draft documents)."
    weight: 0.35
    description: "DecisionTrees"
  - type: llm_judge
    criteria: "Sample coding examples and QC checklist demonstrate practical application — 5 sample documents show diverse coding scenarios: one clearly privileged document, one hot document requiring escalation, one marginally relevant document, one document with mixed privilege/business content, and one not relevant document; each example shows the completed coding form with explanations for each field; the QC checklist includes sampling methodology (10% random sample for inter-reviewer consistency), accuracy targets (95% agreement on relevance, 99% on privilege), escalation thresholds, and daily/weekly quality metrics to track."
    weight: 0.30
    description: "ExamplesAndQC"
