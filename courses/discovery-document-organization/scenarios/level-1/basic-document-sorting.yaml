meta:
  id: basic-document-sorting
  level: 1
  course: discovery-document-organization
  type: output
  description: "Sort a basic document production into logical categories — organize 50 documents from a single custodian into issue-based folders with a document index"
  tags: [document-sorting, basic-organization, document-index, beginner]

state: {}

trigger: |
  You are a paralegal at a small litigation firm.
  Your supervising attorney just received a document
  production from opposing counsel in a breach of
  contract case.

  CASE: Smith v. Johnson Construction LLC
  CLAIM: Breach of construction contract for a
  residential home renovation ($85,000 contract)
  ISSUES: Scope of work disputes, change orders,
  quality of workmanship, payment schedule

  PRODUCTION RECEIVED: 50 documents from a single
  custodian (defendant's project manager), all
  Bates-numbered JC-000001 through JC-000050:

  - JC-000001-003: Original construction contract
    (3 pages)
  - JC-000004-005: Change Order #1 (kitchen upgrade,
    $12,000)
  - JC-000006-007: Change Order #2 (bathroom tile,
    $4,500)
  - JC-000008: Email from homeowner approving
    Change Order #1
  - JC-000009: Email from homeowner disputing
    Change Order #2 cost
  - JC-000010-012: Project timeline/Gantt chart
  - JC-000013-015: Inspection reports (3 separate
    inspections)
  - JC-000016-020: Photographs of completed work
    (5 photos)
  - JC-000021-025: Invoices #1-5 (monthly billing)
  - JC-000026-028: Subcontractor agreements
    (plumbing, electrical, tile)
  - JC-000029: Payment ledger
  - JC-000030-032: Emails between project manager
    and subcontractors about scheduling
  - JC-000033-035: Homeowner complaint emails
    (3 emails over 2 months)
  - JC-000036: Attorney demand letter from homeowner
  - JC-000037-038: Project manager's handwritten
    notes from site visits
  - JC-000039-041: Material receipts and supplier
    invoices
  - JC-000042-044: Building permit applications
    and approvals
  - JC-000045: Insurance certificate
  - JC-000046-048: Text message screenshots between
    project manager and homeowner
  - JC-000049-050: Final walkthrough punch list

  Create:
  1. A document organization system with logical
     categories
  2. A document index listing each document with
     Bates range, description, date, category, and
     relevance notes
  3. A summary memo to the supervising attorney
     highlighting key documents for each case issue

assertions:
  - type: llm_judge
    criteria: "Document organization uses logical issue-based categories — creates 5-7 clear folders/categories such as: Contract Documents (original contract, change orders), Financial Records (invoices, payment ledger, material receipts), Communications (emails, text messages), Project Documentation (timeline, inspection reports, permit applications, site notes), Photographs and Evidence (photos, punch list), Third-Party Documents (subcontractor agreements, insurance certificate); each document is assigned to exactly one primary category; the organization system would allow the attorney to quickly locate documents relevant to any specific case issue."
    weight: 0.35
    description: "OrganizationSystem"
  - type: llm_judge
    criteria: "Document index is complete and professionally formatted — includes all 50 documents with: Bates number range, document type, date (or 'undated'), author/source, recipient (where applicable), category assignment, and brief relevance note; the index is sorted by Bates number with cross-references to categories; key documents are flagged for attorney review; the format is consistent and would be usable as a working litigation document."
    weight: 0.35
    description: "DocumentIndex"
  - type: llm_judge
    criteria: "Summary memo identifies key documents for each case issue — maps documents to the four main issues: (1) Scope of work (contract, change orders, approval/dispute emails), (2) Quality of workmanship (inspection reports, photographs, punch list, complaint emails), (3) Payment disputes (invoices, payment ledger, demand letter), (4) Timeline and delays (Gantt chart, scheduling emails, permit timeline); the memo highlights the most important documents (homeowner's email disputing Change Order #2, complaint emails, inspection reports showing deficiencies) and notes any gaps in the production (e.g., missing homeowner's own communications, missing final payment records)."
    weight: 0.30
    description: "SummaryMemo"
