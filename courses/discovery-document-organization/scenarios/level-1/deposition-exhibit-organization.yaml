meta:
  id: deposition-exhibit-organization
  level: 1
  course: discovery-document-organization
  type: output
  description: "Organize exhibits for a deposition — select, number, and prepare document exhibits for use during a witness deposition"
  tags: [deposition-exhibits, exhibit-preparation, witness-examination, beginner]

state: {}

trigger: |
  You are preparing exhibits for the deposition of
  the plaintiff in a slip-and-fall case. The
  deposition is in 5 days.

  CASE: Thompson v. MegaMart Stores
  CLAIM: Plaintiff slipped on a wet floor in the
  produce section, fracturing her hip
  DEPONENT: Patricia Thompson (plaintiff, age 72)

  AVAILABLE DOCUMENTS FROM DISCOVERY:
  1. Incident report completed by MegaMart store
     manager (2 pages, Bates MM-000101-102)
  2. Surveillance video still frames (6 images
     showing plaintiff's path through store,
     MM-000200-205)
  3. Plaintiff's medical records from ER visit
     (15 pages, MM-000300-314)
  4. Orthopedic surgeon's operative report
     (4 pages, MM-000315-318)
  5. Plaintiff's physical therapy records
     (22 pages, MM-000319-340)
  6. Plaintiff's prior medical records showing
     previous hip complaints (8 pages, MM-000341-348)
  7. MegaMart floor inspection log for incident date
     (1 page, MM-000400)
  8. MegaMart cleaning protocol manual excerpt
     (5 pages, MM-000401-405)
  9. "Wet Floor" sign placement policy
     (2 pages, MM-000406-407)
  10. Photographs of plaintiff's shoes worn that day
      (3 photos, MM-000500-502)
  11. Plaintiff's Facebook posts showing activities
      after the incident (4 pages, MM-000600-603)
  12. Plaintiff's interrogatory answers (8 pages,
      not Bates-numbered — plaintiff's own responses)
  13. Plaintiff's damages calculation spreadsheet
      prepared by plaintiff's counsel (3 pages)
  14. Weather report for incident date (1 page)
  15. Plaintiff's employment records showing missed
      work (5 pages, MM-000700-704)

  The attorney wants to question the plaintiff about:
  - How the incident occurred
  - Her physical condition before and after
  - The extent of her injuries and treatment
  - Her damages claims
  - Her activities post-incident (social media)
  - Prior medical history

  Create:
  1. Exhibit list with exhibit numbers and deposition
     topic mapping
  2. Exhibit organization strategy (order of use)
  3. Preparation memo for the attorney showing
     suggested exhibit use during questioning

assertions:
  - type: llm_judge
    criteria: "Exhibit list is complete and strategically organized — assigns exhibit numbers (Exhibit 1, 2, 3...) to selected documents in a logical order that supports the deposition examination flow; each exhibit entry includes: exhibit number, document description, Bates range, number of pages, and the deposition topic it relates to; not all documents need to be marked as exhibits — the selection shows judgment about which documents are most useful for deposition questioning (e.g., the damages spreadsheet prepared by opposing counsel is likely not an exhibit for this deposition); the list distinguishes between documents the attorney will definitely use and those to have available as potential impeachment exhibits."
    weight: 0.35
    description: "ExhibitList"
  - type: llm_judge
    criteria: "Organization strategy follows effective deposition examination flow — groups exhibits by topic area aligned with the attorney's questioning plan: (1) incident facts (incident report, surveillance stills, floor inspection log), (2) injuries and treatment (ER records, operative report, PT records), (3) prior medical history (previous hip complaints), (4) damages (employment records, damages claims), (5) impeachment/credibility (Facebook posts showing post-incident activities, prior medical records contradicting injury claims); the strategy explains why certain exhibits should be introduced early (foundational documents) vs. reserved for later (impeachment exhibits like social media posts)."
    weight: 0.35
    description: "OrganizationStrategy"
  - type: llm_judge
    criteria: "Attorney preparation memo provides practical examination guidance — for each exhibit, suggests specific questions to ask when introducing the exhibit; identifies potential impeachment opportunities (Facebook posts showing plaintiff hiking 3 months after claiming she couldn't walk; prior medical records showing hip complaints before the incident); flags exhibits that may draw objections and suggests how to handle them; notes which exhibits should be shown to plaintiff's counsel before the deposition vs. reserved as surprise impeachment; includes logistics notes (number of copies needed, exhibit sticker placement, handling of multi-page exhibits)."
    weight: 0.30
    description: "PreparationMemo"
