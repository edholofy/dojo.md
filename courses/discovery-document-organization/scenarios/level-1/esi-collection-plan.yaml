meta:
  id: esi-collection-plan
  level: 1
  course: discovery-document-organization
  type: output
  description: "Develop a basic ESI collection plan — identify electronically stored information sources and create a collection protocol for a single-defendant case"
  tags: [esi-collection, electronic-discovery, data-sources, beginner]

state: {}

trigger: |
  Your firm has been retained to defend a small
  technology company in an employment discrimination
  case. You need to create an ESI collection plan.

  CASE: Williams v. TechStart Inc.
  CLAIM: Race discrimination and hostile work
  environment
  YOUR CLIENT: TechStart Inc. (25 employees,
  startup)
  PLAINTIFF: Former software engineer employed
  for 2 years (2022-2024)
  RELEVANT TIME PERIOD: January 2022 - June 2024

  KEY CUSTODIANS (identified by client):
  1. Sarah Chen — CEO (made termination decision)
  2. Mike Rodriguez — Engineering Manager (plaintiff's
     direct supervisor)
  3. Lisa Park — HR Manager (handled complaints)
  4. Tom Baker — CTO (participated in performance
     reviews)

  KNOWN DATA SOURCES:
  - Email: Google Workspace (Gmail)
  - Chat: Slack (company-wide, 50+ channels)
  - Documents: Google Drive (shared and personal)
  - HR System: BambooHR (personnel records,
    performance reviews)
  - Code Repository: GitHub (for performance
    evidence)
  - Calendar: Google Calendar
  - Video Meetings: Zoom (recordings stored for
    90 days, but may have been preserved)
  - Personal Devices: 2 custodians used personal
    phones for work Slack

  Create:
  1. ESI collection plan identifying all data sources
  2. Custodian interview questionnaire
  3. Litigation hold notice for all custodians
  4. Collection priority matrix
  5. Data preservation protocol

assertions:
  - type: llm_judge
    criteria: "ESI collection plan systematically identifies all data sources — maps each custodian to their data sources (email, Slack, Drive, calendar, etc.); identifies non-custodial data sources (BambooHR system data, GitHub repository logs, Zoom cloud recordings); addresses BYOD issues (personal phones used for work Slack — discusses whether personal devices are within scope and how to collect from them without invading personal content); estimates data volumes for each source; specifies collection methodology for each platform (Google Workspace admin export, Slack export via admin tools, BambooHR report generation); identifies potential challenges (Slack message retention policies, Zoom recording auto-deletion, Google Drive shared files with multiple editors)."
    weight: 0.35
    description: "ESICollectionPlan"
  - type: llm_judge
    criteria: "Litigation hold notice is comprehensive and legally sound — addressed to all 4 custodians plus IT administrator; defines the scope of materials to be preserved (all documents, communications, and data related to the plaintiff, discrimination complaints, performance reviews, hiring/firing decisions during the relevant period); specifies data types to preserve (emails, Slack messages, documents, calendar entries, text messages, voicemails); prohibits routine destruction and auto-deletion; explains the consequences of spoliation; requires acknowledgment of receipt; is written in plain language that non-lawyers can understand; includes specific instructions for preserving Slack messages and Google Drive documents."
    weight: 0.35
    description: "LitigationHoldNotice"
  - type: llm_judge
    criteria: "Collection priority matrix and custodian questionnaire are practical — the priority matrix ranks data sources by relevance and urgency (Priority 1: HR files and discrimination complaint records; Priority 2: email and Slack between plaintiff and supervisors; Priority 3: performance reviews and GitHub activity; Priority 4: general company communications); the custodian questionnaire asks about: all devices used for work, personal accounts used for work communications, any documents stored outside company systems, any relevant communications deleted or lost, awareness of other relevant custodians or data sources; the data preservation protocol addresses ongoing preservation (new documents created during litigation) and chain-of-custody documentation."
    weight: 0.30
    description: "PriorityAndQuestionnaire"
