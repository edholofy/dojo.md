meta:
  id: litigation-hold-implementation
  level: 1
  course: discovery-document-organization
  type: output
  description: "Implement a litigation hold for a new case — draft hold notices, identify custodians, and create a preservation protocol"
  tags: [litigation-hold, preservation, spoliation-prevention, beginner]

state: {}

trigger: |
  Your firm was just retained to defend a medical
  device manufacturer in a product liability case.
  The complaint was filed yesterday. You need to
  implement a litigation hold immediately.

  CASE: Anderson v. MedTech Innovations Inc.
  CLAIM: Plaintiff alleges a defective knee implant
  caused premature failure requiring revision surgery
  YOUR CLIENT: MedTech Innovations Inc. (manufacturer,
  200 employees)
  PRODUCT: ProFlex 3000 Knee Implant System
  IMPLANT DATE: March 2022
  FAILURE DATE: November 2024
  LOT NUMBER: PF3-2022-0847

  KEY CUSTODIANS TO IDENTIFY:
  - Engineering team (product design and testing)
  - Quality assurance department
  - Regulatory affairs (FDA submissions)
  - Manufacturing (production records for the lot)
  - Sales representative who sold to the implanting
    hospital
  - Customer complaints department
  - Executive leadership (any communications about
    product issues)
  - Legal department (prior complaints about this
    product)

  DATA SOURCES:
  - Email (Microsoft 365)
  - Document management system (SharePoint)
  - Engineering design files (SolidWorks, CAD)
  - Quality management system (MasterControl)
  - ERP system (SAP — manufacturing records)
  - CRM (Salesforce — sales and complaint records)
  - Personal devices (some engineers use personal
    laptops)
  - Paper files (lab notebooks, inspection records)

  Create:
  1. Litigation hold notice for all custodians
  2. Custodian identification memo
  3. IT preservation directive
  4. Compliance tracking system
  5. Hold reminder schedule

assertions:
  - type: llm_judge
    criteria: "Litigation hold notice is comprehensive and clear — addressed to all identified custodians by name/role; defines the scope of the hold (all documents related to ProFlex 3000, lot PF3-2022-0847, and knee implant products generally); specifies document types to preserve (emails, design files, test results, quality records, manufacturing data, complaint records, regulatory submissions, meeting notes, text messages, voicemails); prohibits deletion, modification, or destruction of any potentially relevant materials; suspends routine document destruction policies for materials within scope; requires immediate acknowledgment; explains consequences of non-compliance (spoliation sanctions); is written in plain language accessible to non-legal employees; includes contact information for questions."
    weight: 0.35
    description: "LitigationHoldNotice"
  - type: llm_judge
    criteria: "Custodian identification is thorough and justified — identifies specific individuals or roles across all relevant departments (engineering, QA, regulatory, manufacturing, sales, complaints, executive, legal); for each custodian, explains why they are relevant (what unique information they possess); identifies custodians who may not be obvious (IT administrator who manages backup systems, the sales rep who may have made representations about the product, the complaint handler who received reports of similar failures); addresses former employees who may have relevant knowledge; estimates data volume per custodian to inform collection planning."
    weight: 0.35
    description: "CustodianIdentification"
  - type: llm_judge
    criteria: "IT preservation directive and compliance tracking are operationally sound — the IT directive provides specific technical instructions for each data source (suspend Microsoft 365 retention policies for custodian mailboxes, preserve SharePoint sites, export and preserve MasterControl quality records, freeze SAP lot records, export Salesforce complaint data); addresses backup tape preservation; provides instructions for imaging personal devices; the compliance tracking system includes acknowledgment tracking (who has confirmed receipt), periodic reminder schedule (30-day, 60-day, quarterly reminders), new custodian onboarding process, and documentation sufficient to defend against spoliation claims."
    weight: 0.30
    description: "ITDirectiveAndTracking"
