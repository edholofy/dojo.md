meta:
  id: discovery-behavioral-science
  level: 4
  course: discovery-document-organization
  type: output
  description: "Apply behavioral science to document review — research how cognitive biases affect reviewer accuracy and design interventions to improve review quality"
  tags: [behavioral-science, cognitive-bias, reviewer-accuracy, expert]

state: {}

trigger: |
  Design a research and application program
  exploring how cognitive biases affect document
  review accuracy and how behavioral interventions
  can improve review quality.

  RESEARCH CONTEXT:
  Document review is the most expensive and error-
  prone phase of e-discovery. Studies suggest human
  reviewers achieve only 60-70% recall, meaning
  30-40% of relevant documents are missed. Yet the
  profession relies heavily on human judgment for
  critical decisions (privilege, relevance, issue
  coding).

  COGNITIVE BIASES IN DOCUMENT REVIEW:

  1. ANCHORING BIAS
  - First documents reviewed set expectations for
    the entire collection
  - If initial documents are highly relevant,
    reviewers over-code subsequent documents as
    relevant
  - If initial documents are irrelevant, reviewers
    under-code relevance

  2. FATIGUE EFFECTS
  - Review accuracy declines after 2-3 hours of
    continuous review
  - "Decision fatigue" leads to defaulting to the
    easier coding decision (usually "not relevant")
  - End-of-day reviews show 15-20% lower accuracy

  3. CONFIRMATION BIAS
  - Reviewers form case theories early and look
    for confirming documents
  - Documents that contradict the reviewer's
    understanding of the case are more likely to be
    miscoded
  - Team discussions can create groupthink in
    coding decisions

  4. ATTENTION BLINDNESS
  - In large collections, reviewers develop
    "patterns" and miss anomalous documents
  - Key documents embedded in routine correspondence
    are overlooked
  - Reviewer fatigue compounds attention blindness

  5. FRAMING EFFECTS
  - How review instructions are framed affects
    coding decisions
  - "Find all relevant documents" produces different
    results than "eliminate non-relevant documents"
  - The definition of "relevant" shifts based on
    reviewer interpretation

  Create:
  1. Research program with study designs for each
     bias
  2. Practical interventions for review managers
  3. Review workflow redesign based on behavioral
     insights
  4. Training module for reviewers on cognitive bias
  5. Quality improvement metrics

assertions:
  - type: llm_judge
    criteria: "Research program uses appropriate experimental designs — the anchoring study randomizes document presentation order across reviewer groups (some start with highly relevant documents, others with irrelevant, others with random); the fatigue study measures accuracy in 30-minute intervals across 8-hour review days with and without mandated breaks; the confirmation bias study provides reviewers with different case narratives and measures how it affects coding of identical documents; each study controls for confounding variables (reviewer experience, document complexity, case familiarity); sample sizes are sufficient for detecting meaningful effect sizes; studies use real litigation documents (anonymized) for ecological validity; IRB protocols address the ethical implications of studying legal professionals' cognitive limitations."
    weight: 0.35
    description: "ResearchProgram"
  - type: llm_judge
    criteria: "Practical interventions are evidence-based and implementable — anchoring intervention: randomize document presentation order for each reviewer, use diverse seed sets for TAR training; fatigue intervention: enforce 15-minute breaks every 90 minutes, limit review sessions to 6 productive hours (not 10), schedule complex reviews (privilege) in morning hours; confirmation bias intervention: rotate reviewers across case issues, provide balanced case narratives, use blind review for critical documents (reviewer doesn't know which party produced them); attention blindness intervention: insert known-relevant control documents to detect reviewer drift, use AI-flagged anomalous documents as attention checks; framing intervention: standardize review instructions with explicit definitions and examples for each coding decision, use positive framing ('find all documents that meet these criteria') rather than negative ('eliminate non-responsive documents')."
    weight: 0.35
    description: "PracticalInterventions"
  - type: llm_judge
    criteria: "Review workflow redesign integrates behavioral insights into standard practice — redesigned workflow includes: structured warm-up period (reviewers start with 20 pre-coded calibration documents to reduce anchoring), scheduled breaks with mandatory logout (platform enforces breaks), varied document batching (mix document types and custodians within batches to prevent pattern blindness), real-time attention monitoring (embedded control documents at 5% rate, automatic alerts when reviewer accuracy on controls drops below threshold), blind re-review of a statistical sample (10% reviewed by a second reviewer without access to first reviewer's coding), and adaptive difficulty (after 2 hours, route reviewers to less complex documents); the training module uses interactive exercises demonstrating each bias with the reviewer's own data (showing them their coding patterns over time)."
    weight: 0.30
    description: "WorkflowRedesign"
