meta:
  id: expert-discovery-shift
  level: 4
  course: discovery-document-organization
  type: output
  description: "Expert shift simulation — address organizational-level discovery challenges including governance design, technology transformation, professional development, and knowledge management across a litigation practice"
  tags: [shift-simulation, organizational-leadership, strategic-planning, expert]

state: {}

trigger: |
  You are the Chief Litigation Technology Officer at
  a global law firm (400 attorneys, 15 offices,
  6 countries). Three strategic challenges require
  your expertise.

  CHALLENGE 1 — AI DISCOVERY ETHICS CRISIS
  Your firm deployed generative AI for document
  review 8 months ago. This week, a federal judge
  discovered that an associate submitted a privilege
  log where 30% of the privilege descriptions were
  AI-generated hallucinations — the descriptions
  didn't match the actual documents. The judge has
  ordered a show cause hearing and is considering
  sanctions. Legal media has the story.

  Address:
  - Immediate response to the court
  - Investigation into how AI hallucinations
    entered the privilege log
  - Firm-wide AI usage policy for discovery
  - Technology guardrails to prevent recurrence
  - Media and client communication strategy
  - Training program on responsible AI use in
    discovery

  CHALLENGE 2 — DISCOVERY COST CRISIS
  Three of your firm's top 10 clients have
  simultaneously demanded 30% reductions in discovery
  costs, threatening to move work to competitors
  using alternative fee arrangements. Current
  discovery costs average $15/document (including
  collection, processing, review, and production).
  Competitor firms are quoting $8-10/document.

  Design a cost reduction strategy that maintains
  quality.

  CHALLENGE 3 — CROSS-BORDER DISCOVERY COMPLIANCE
  Your firm's offices in London, Frankfurt, and
  Tokyo have been operating under different discovery
  standards than the US offices. A recent audit
  revealed:
  - London office produced EU personal data to US
    courts without GDPR-compliant transfer mechanisms
    in 3 matters
  - Frankfurt office refuses to implement litigation
    holds citing German works council requirements
  - Tokyo office's document review process doesn't
    meet US defensibility standards
  - No unified cross-border discovery protocol exists

  Design a unified global discovery compliance
  framework.

assertions:
  - type: llm_judge
    criteria: "AI ethics crisis response is comprehensive and principled — immediate court response includes: full disclosure of the error, attorney affidavit explaining how the AI-generated descriptions entered the privilege log without adequate human review, corrected privilege log with verified descriptions, proposed remedial measures, and acceptance of responsibility (not blaming the technology); the investigation identifies the root cause (AI generated privilege log descriptions that were not verified against actual documents, the associate relied on AI output without checking); the firm-wide AI policy establishes: mandatory human verification of all AI-generated discovery work product, prohibited uses (AI cannot make final privilege determinations or generate privilege log descriptions without attorney verification of each entry against the source document), required disclosures to courts about AI use in discovery, and audit procedures for AI-assisted work product."
    weight: 0.35
    description: "AIEthicsCrisisResponse"
  - type: llm_judge
    criteria: "Cost reduction strategy achieves the 30% target without sacrificing quality — identifies specific cost drivers and reduction strategies: collection (move from vendor-managed to in-house collection for common platforms, saving 20-30%), processing (standardize processing parameters to reduce rework, implement deduplication across matters), review (expand TAR/CAL usage from 30% to 80% of matters, reducing review hours by 40-50%), production (automate Bates numbering and format conversion, reducing production time by 30%); presents a revised cost model showing reduction from $15 to $9-10/document; addresses the quality concern by showing that TAR-assisted review achieves equal or better recall than manual review; proposes alternative fee arrangements for top clients (fixed fee per matter based on predictive budgeting, risk-sharing arrangements, volume discounts); the strategy preserves firm profitability while meeting client demands."
    weight: 0.35
    description: "CostReductionStrategy"
  - type: llm_judge
    criteria: "Global discovery compliance framework addresses each jurisdiction's specific requirements — creates a unified framework with: global core standards (applicable everywhere: litigation hold procedures, minimum review quality, production format standards) and jurisdiction-specific modules (UK: SRA compliance + GDPR data transfer mechanisms; Germany: works council consultation protocols + GDPR; Japan: APPI compliance + cultural adaptation of US-style discovery); addresses the London GDPR violations with specific remediation (Standard Contractual Clauses, Data Protection Impact Assessments, retroactive notification to DPAs); resolves the Frankfurt works council issue by designing a litigation hold process that includes mandatory works council notification within 48 hours of hold issuance; brings the Tokyo office's review process to US defensibility standards while respecting Japanese legal culture; implementation includes mandatory training, quarterly compliance audits, and escalation procedures for cross-border discovery requests."
    weight: 0.30
    description: "GlobalComplianceFramework"
