meta:
  id: discovery-knowledge-management
  level: 4
  course: discovery-document-organization
  type: output
  description: "Design a knowledge management system for e-discovery — build an organizational memory capturing ESI protocols, review workflows, privilege determinations, and lessons learned across all matters"
  tags: [knowledge-management, organizational-learning, best-practices, expert]

state: {}

trigger: |
  Design a knowledge management system for e-discovery
  at a national litigation firm.

  FIRM: Carter & Associates (200 attorneys, 8 offices,
  4 practice groups: commercial litigation, product
  liability, employment, white-collar defense)

  PROBLEM: Discovery institutional knowledge is lost
  when attorneys and litigation support staff leave.
  The same mistakes are repeated. The same solutions
  are reinvented. Each matter starts from scratch
  instead of building on the firm's experience.

  KNOWLEDGE ASSETS TO CAPTURE:
  1. ESI Protocols — every negotiated protocol with
     outcomes (which provisions were accepted,
     challenged, or modified by courts)
  2. TAR Methodologies — seed set strategies, training
     approaches, validation results, court submissions
  3. Privilege Determinations — how specific privilege
     questions were resolved (especially close calls)
  4. Cost Data — actual costs by matter type, data
     volume, review methodology, enabling accurate
     future budgets
  5. Vendor Performance — processing times, quality,
     pricing, responsiveness for each e-discovery
     vendor
  6. Court Preferences — individual judges'
     preferences on ESI formats, TAR acceptance,
     privilege log requirements, proportionality
     analysis
  7. Lessons Learned — what went wrong and how to
     prevent it (sanctions, cost overruns, privilege
     waivers)
  8. Client Preferences — each major client's
     preferred platforms, format requirements, budget
     expectations, and reporting requirements

  Create:
  1. Knowledge system architecture
  2. Content capture and curation workflow
  3. AI-powered recommendation engine
  4. Governance and quality assurance
  5. Adoption incentive program

assertions:
  - type: llm_judge
    criteria: "Knowledge system architecture enables practical knowledge reuse — designs a multi-layer system: content layer (structured database for protocols, cost data, vendor evaluations; document repository for templates, court filings, TAR documentation; wiki for lessons learned and best practices), intelligence layer (search engine with legal-domain NLP, recommendation engine, pattern recognition), and interface layer (integrated into Relativity, email, and document management); the architecture supports the key use case: when a new matter starts, the system recommends relevant ESI protocols from similar past matters, suggests appropriate TAR methodology based on data volume and case type, provides cost estimates based on historical data, and flags judicial preferences for the assigned judge; version control ensures templates and protocols are current."
    weight: 0.35
    description: "SystemArchitecture"
  - type: llm_judge
    criteria: "AI recommendation engine provides contextual, actionable suggestions — uses matter metadata (practice area, case type, data volume, jurisdiction, judge, opposing counsel) to recommend: applicable ESI protocol provisions (based on what similar matters negotiated), appropriate review methodology (TAR vs. manual based on volume and budget), privilege review approach (based on privilege issues likely to arise in this case type), realistic budget range (based on historical cost data for similar matters), and vendor selection (based on past performance for similar data types and volumes); the engine learns from attorney feedback (which recommendations were useful, which were not) and improves over time; recommendations are surfaced proactively at matter initiation and at key milestones (before ESI negotiation, before production deadlines)."
    weight: 0.35
    description: "RecommendationEngine"
  - type: llm_judge
    criteria: "Content capture requires minimal effort and governance ensures quality — automated capture includes: ESI protocols filed with the court are automatically ingested, cost data flows from billing system, TAR validation statistics are exported from Relativity, vendor performance metrics are tracked through project management tools; manual capture is streamlined: post-matter debriefs (30-minute structured interview capturing lessons learned), privilege determination memos flagged for the knowledge base, judicial preference notes entered through a simple form; governance includes a Knowledge Committee (one representative per practice group) that reviews submissions quarterly, retires outdated content, and resolves conflicting guidance; a half-time knowledge curator manages the system; adoption incentives include: recognition in partner meetings for top contributors, inclusion of knowledge contribution in annual reviews, and 'knowledge dividend' (practice groups that contribute more get priority access to new features)."
    weight: 0.30
    description: "CaptureAndGovernance"
