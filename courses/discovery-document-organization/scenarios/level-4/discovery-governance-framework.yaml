meta:
  id: discovery-governance-framework
  level: 4
  course: discovery-document-organization
  type: output
  description: "Design a discovery governance framework for a multinational corporation — create policies, procedures, and oversight structures for managing discovery obligations across a global enterprise"
  tags: [governance, corporate-policy, multinational, expert]

state: {}

trigger: |
  A multinational corporation's board of directors
  has requested a comprehensive discovery governance
  framework after a series of costly discovery
  failures.

  COMPANY: GlobalPharma Inc.
  SIZE: 80,000 employees, operations in 50 countries
  ANNUAL LITIGATION: 500+ active matters globally
  ANNUAL DISCOVERY SPEND: $75M
  REGULATORY ENVIRONMENT: FDA, EMA, PMDA (Japan),
  NMPA (China), plus 30+ national health authorities

  RECENT GOVERNANCE FAILURES:
  - $50M sanctions in a product liability MDL for
    failure to preserve manufacturing data from a
    closed facility
  - GDPR fine of EUR 20M for unauthorized transfer
    of EU employee data in US litigation
  - 3 separate matters where the same documents
    were reviewed independently by 3 different
    outside law firms (total waste: $5M)
  - Board-level communications were produced without
    privilege review in a regulatory investigation
  - No centralized visibility into discovery spend
    or obligations across the enterprise

  GOVERNANCE FRAMEWORK MUST ADDRESS:
  - Centralized vs. decentralized discovery authority
  - Cross-matter coordination and deduplication
  - Information governance and records retention
  - Litigation hold management at enterprise scale
  - Outside counsel management and standards
  - Technology standards and vendor management
  - Compliance with 50 countries' data protection
    laws
  - Board and executive oversight
  - Budget control and cost allocation

  Create:
  1. Discovery governance charter
  2. Organizational structure and authority matrix
  3. Enterprise litigation hold policy
  4. Outside counsel discovery standards
  5. Compliance monitoring and reporting framework

assertions:
  - type: llm_judge
    criteria: "Governance charter establishes clear authority and accountability — creates a Discovery Governance Committee (DGC) reporting to the General Counsel with membership including: Chief Litigation Officer, Chief Privacy Officer, CIO/CISO, VP of Records Management, and regional legal heads; the charter defines the DGC's authority over: technology platform selection, outside counsel discovery standards, litigation hold compliance, cross-matter coordination, and budget allocation; the organizational structure balances centralized standards with regional execution (global policies, regional implementation tailored to local data protection requirements); the authority matrix clearly delineates who can approve: new vendor engagements ($50K+ requires DGC approval), production format decisions, privilege waiver decisions, and cross-border data transfers."
    weight: 0.35
    description: "GovernanceCharter"
  - type: llm_judge
    criteria: "Enterprise litigation hold policy prevents the failures that triggered the governance mandate — addresses the closed facility failure with specific provisions: hold notices extend to all facilities including those being closed, decommissioned, or divested; data from closed facilities must be preserved before decommissioning; IT decommissioning workflows include mandatory legal hold check; hold implementation includes automated technical enforcement (not just notice-based holds); the policy covers all 50 countries with jurisdiction-specific requirements (GDPR-compliant hold notices in EU, works council notification in Germany, data localization compliance in China); hold compliance monitoring includes quarterly certifications from all custodians and annual audits of technical enforcement; addresses the personal device challenge with a BYOD preservation policy."
    weight: 0.35
    description: "LitigationHoldPolicy"
  - type: llm_judge
    criteria: "Outside counsel standards and cross-matter coordination prevent duplication — outside counsel discovery standards require: use of approved technology platforms (preventing 3 firms from using 3 different platforms on related matters), standardized production formats, minimum QC requirements, budget reporting templates, privilege review protocols, and GDPR compliance attestations; cross-matter coordination includes: a matter intake process that identifies overlapping custodians and document sets across matters, mandatory deduplication across related matters, shared document repositories for common documents, and a central privilege determination database (once a document is determined privileged in one matter, that determination carries forward); cost allocation methodology fairly distributes shared discovery costs across matters; compliance monitoring includes quarterly reports to the DGC on spend, compliance metrics, and risk indicators."
    weight: 0.30
    description: "OutsideCounselAndCoordination"
