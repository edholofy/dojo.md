meta:
  id: discovery-technology-product
  level: 4
  course: discovery-document-organization
  type: output
  description: "Design a next-generation e-discovery technology product — create a comprehensive product specification for an AI-native discovery platform that disrupts the current market"
  tags: [technology-product, ai-native, product-design, expert]

state: {}

trigger: |
  You are the Chief Product Officer of a legal tech
  startup building the next generation of e-discovery
  technology. Design the product.

  COMPANY: LitIntel (Series B, $30M raised)
  MISSION: Make e-discovery 10x more efficient
  through AI-native architecture

  MARKET INSIGHT:
  Current e-discovery platforms (Relativity, Everlaw)
  were designed as document management systems with
  AI features bolted on. LitIntel is building an
  AI-native platform where machine learning is the
  foundation, not an add-on.

  PRODUCT VISION — "LITINTEL ONE":

  1. INTELLIGENT COLLECTION
  - AI-powered data mapping that automatically
    identifies relevant data sources
  - Smart custodian identification based on
    organizational analysis
  - Predictive preservation (identify data at risk
    of deletion before litigation hold)
  - Cloud-native collection from 50+ data sources
    (SaaS, email, messaging, cloud storage)

  2. AUTONOMOUS PROCESSING
  - Zero-configuration processing pipeline
  - AI-driven deduplication that handles near-
    duplicates intelligently
  - Automatic language detection and translation
  - Intelligent OCR with layout preservation
  - Metadata enrichment through entity extraction

  3. AI-FIRST REVIEW
  - No first-pass manual review — AI classifies
    all documents on ingest
  - Continuous active learning from every reviewer
    decision
  - Multi-model architecture (separate models for
    relevance, privilege, issues, PII, sensitivity)
  - Real-time review analytics and prediction
  - Smart batching (route documents to reviewers
    based on expertise matching)

  4. INTELLIGENT PRODUCTION
  - Automated Bates numbering and format conversion
  - AI-generated privilege log entries
  - Smart redaction recommendations
  - Production QC automation
  - Cross-production consistency checking

  Create:
  1. Complete product specification
  2. AI/ML architecture overview
  3. Competitive differentiation analysis
  4. Go-to-market strategy
  5. Product roadmap (18-month plan)

assertions:
  - type: llm_judge
    criteria: "Product specification demonstrates genuine innovation beyond existing platforms — each feature area provides specific capabilities that current platforms lack: intelligent collection uses organizational network analysis to identify custodians (analyzing email patterns to find hidden relevant custodians), not just manual designation; autonomous processing uses NLP-based near-duplicate detection that understands semantic similarity, not just hash-based deduplication; AI-first review eliminates the first-pass linear review entirely, presenting reviewers with AI-prioritized documents grouped by predicted issue and confidence level; intelligent production uses NLP to generate draft privilege log descriptions that are more consistent than human-drafted entries; each feature includes user stories, acceptance criteria, and technical requirements."
    weight: 0.35
    description: "ProductSpecification"
  - type: llm_judge
    criteria: "AI/ML architecture is technically credible — describes the multi-model architecture: separate specialized models for relevance (fine-tuned transformer), privilege detection (hybrid rule+ML), PII identification (NER + pattern matching), issue coding (multi-label classifier), and sensitivity analysis (sentiment + context analysis); addresses model training strategy (pre-trained on anonymized legal document corpus, fine-tuned per matter with active learning); discusses computational requirements (GPU infrastructure for real-time classification at ingest), model versioning and reproducibility (critical for defensibility), explainability (attorneys need to understand why a document was classified a certain way for court challenges), and data privacy (how training data from one client's matter is isolated from others); the architecture supports the claimed 10x efficiency improvement with specific throughput estimates."
    weight: 0.35
    description: "AIArchitecture"
  - type: llm_judge
    criteria: "Go-to-market strategy addresses the unique challenges of selling AI to lawyers — recognizes that law firms and corporations are risk-averse technology adopters; proposes a land-and-expand strategy: start with processing and collection (less controversial, clear cost savings) then expand to AI-first review (requires more trust); addresses the defensibility concern directly (documentation package for courts, expert testimony support, validation statistics); pricing disrupts the traditional per-GB or per-user model with a per-matter flat fee or outcome-based pricing; channel strategy includes partnerships with litigation support providers and law firm IT departments; the 18-month roadmap phases feature delivery: MVP (months 1-6) with collection + processing + basic AI classification, Growth (months 7-12) with full AI review + privilege detection, Enterprise (months 13-18) with production automation + analytics + multi-model architecture."
    weight: 0.30
    description: "GoToMarketAndRoadmap"
