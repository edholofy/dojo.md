meta:
  id: discovery-book-proposal
  level: 4
  course: discovery-document-organization
  type: output
  description: "Write a book proposal for the definitive practitioner's guide to e-discovery — design a comprehensive reference covering law, technology, and practice management"
  tags: [book-proposal, practitioner-guide, comprehensive-reference, expert]

state: {}

trigger: |
  Write a book proposal for the definitive
  practitioner's guide to modern e-discovery.

  PROPOSED TITLE: "Digital Discovery: The Complete
  Guide to E-Discovery Law, Technology, and Practice"

  AUTHOR PROFILE:
  - 20 years of e-discovery experience (law firm
    litigation support director, then independent
    consultant)
  - Certified in CEDS and RCA
  - Former chair of the Sedona Conference Working
    Group on Electronic Document Retention and
    Production
  - Published extensively in e-discovery journals
  - Expert witness in 50+ cases on e-discovery
    methodology
  - Adjunct professor teaching e-discovery at 2
    law schools
  - Annual speaker at Legaltech, ILTANET, and
    Sedona Conference

  TARGET PUBLISHER: West Academic or ABA Publishing
  TARGET AUDIENCE:
  - Primary: Litigation attorneys and paralegals
  - Secondary: Litigation support professionals
    and e-discovery specialists
  - Tertiary: Law students, judges, corporate
    counsel

  MARKET GAP:
  - Existing books are either too technical (written
    for IT professionals) or too legal (ignore
    technology and project management)
  - No comprehensive book integrates law, technology,
    and practice management
  - The field changes rapidly — most existing books
    are outdated
  - Courts increasingly expect e-discovery competence
    but lack accessible training resources

  Create:
  1. Complete book proposal with 20-chapter outline
  2. Sample chapter outline (Chapter on TAR/CAL)
  3. Market analysis and competitive positioning
  4. Author platform and marketing plan
  5. Online supplement and update strategy

assertions:
  - type: llm_judge
    criteria: "Chapter outline provides comprehensive, integrated coverage — progresses from legal foundations (FRCP discovery framework, proportionality, preservation obligations, spoliation sanctions) through technology (ESI formats, processing, review platforms, TAR/CAL, AI classification) to practice management (project management, cost control, vendor management, staffing) to specialized topics (cross-border discovery, government investigations, privilege review, protective orders, social media discovery) to emerging issues (AI-generated content in discovery, blockchain evidence, IoT data, quantum computing implications); each chapter integrates law, technology, and practice (e.g., the preservation chapter covers legal standards, technology for automated preservation, and practice guidelines for litigation hold management); the outline justifies 20 chapters without redundancy."
    weight: 0.35
    description: "ChapterOutline"
  - type: llm_judge
    criteria: "TAR/CAL sample chapter demonstrates the book's integrated approach — covers: legal acceptance of TAR (case law timeline from Da Silva Moore through current), TAR 1.0 vs. TAR 2.0/CAL methodology comparison with clear explanations accessible to attorneys who aren't technologists, practical protocol design (seed set selection, training rounds, validation, stop criteria), defensibility documentation and court submissions, cost-benefit analysis template, quality metrics (recall, precision, F1 score explained for non-statisticians), common pitfalls and how to avoid them, opposing counsel challenges and responses, and a step-by-step implementation guide with platform-specific instructions (Relativity, Everlaw); includes practice tips, checklists, and sample court filings; the chapter demonstrates that the book will be the single reference attorneys need."
    weight: 0.35
    description: "SampleChapter"
  - type: llm_judge
    criteria: "Market analysis and online supplement strategy address the rapidly changing field — identifies 5-7 competing titles with specific weaknesses (too technical, too narrow, outdated, US-only); positions the book as the only comprehensive integrated reference; the online supplement strategy addresses the book's greatest challenge (rapid obsolescence) through: companion website with case law updates, technology reviews, updated checklists and templates, video tutorials, and annual supplementation; pricing model includes the book ($150-200) plus annual online subscription ($50-75) creating recurring revenue; the author platform leverages existing speaking, consulting, and teaching channels; marketing includes CLE integration (book adoption for e-discovery CLE programs), law school adoption, and professional association endorsements."
    weight: 0.30
    description: "MarketAndSupplement"
