meta:
  id: discovery-certification-program
  level: 4
  course: discovery-document-organization
  type: output
  description: "Design a professional certification program for e-discovery practitioners — create a comprehensive credentialing system covering knowledge, skills, and ethical standards"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  The Association of E-Discovery Specialists (AEDS)
  has commissioned you to design a comprehensive
  professional certification program for e-discovery
  practitioners.

  PROGRAM CONTEXT:
  - No single dominant certification exists (CEDS,
    ACEDS, RCA certifications serve different niches)
  - E-discovery is a $15B industry with 100,000+
    practitioners
  - Practitioners come from diverse backgrounds
    (law, IT, library science, project management)
  - Courts increasingly expect e-discovery competence
    (Model Rule 1.1 Comment 8)
  - No consistent quality standards across the
    industry

  CERTIFICATION TIERS:
  Tier 1 — Certified E-Discovery Practitioner (CEP)
  Entry-level certification for paralegals, junior
  associates, litigation support staff

  Tier 2 — Certified E-Discovery Specialist (CES)
  Mid-level certification for senior paralegals,
  associates, project managers, technical specialists

  Tier 3 — Certified E-Discovery Master (CEM)
  Expert-level certification for partners, directors
  of litigation support, expert witnesses, consultants

  PROGRAM REQUIREMENTS:
  - Knowledge domains and competency frameworks
  - Examination design and psychometric standards
  - Experience requirements for each tier
  - Continuing education requirements
  - Ethics code for certified practitioners
  - Reciprocity with existing certifications

  Create:
  1. Competency framework for all three tiers
  2. Examination design and administration plan
  3. Experience and education requirements
  4. Continuing education and recertification
  5. Ethics code and disciplinary procedures

assertions:
  - type: llm_judge
    criteria: "Competency framework is comprehensive and progressive — Tier 1 covers foundational knowledge: EDRM stages, basic FRCP rules (26, 34, 37), document coding and review skills, technology platform basics, and ethics fundamentals; Tier 2 adds: TAR/CAL methodology, ESI protocol negotiation, privilege review management, project management for document review, cross-border discovery basics, and quality metrics; Tier 3 adds: expert-level knowledge of case law (Zubulake, Da Silva Moore, Rio Tinto), AI/ML in discovery, international data protection law, expert witness methodology, strategic consulting, and thought leadership; each tier builds on the previous one with specific, measurable competency statements; the framework maps competencies to real-world job functions (paralegal, associate, partner, consultant, vendor)."
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Examination design meets psychometric standards — each tier has a distinct examination format: Tier 1 uses multiple-choice and scenario-based questions (150 questions, 3 hours); Tier 2 adds performance tasks (review a sample production for deficiencies, create a privilege log, design a TAR protocol) plus multiple-choice (100 MC + 3 performance tasks, 5 hours); Tier 3 includes a portfolio submission (documented expert experience), an oral examination before a panel, and a written analysis of a complex discovery scenario (portfolio + 2-hour oral + 4-hour written); examination development uses item response theory with pilot testing, statistical validation, and bias review; passing criteria are evidence-based (standard setting using the Angoff or bookmark method); test security measures prevent cheating (item banking, randomization, proctoring)."
    weight: 0.35
    description: "ExaminationDesign"
  - type: llm_judge
    criteria: "Ethics code and continuing education support professional standards — the ethics code addresses e-discovery-specific issues: duty of competence (staying current with technology under Model Rule 1.1 Comment 8), duty of supervision (managing contract reviewers, vendor relationships), conflicts of interest (vendor relationships, cross-matter data access), confidentiality (handling client data across matters and platforms), candor to the court (honest representation of TAR methodology, accurate privilege logs), proportionality obligations (not running up costs with unnecessary discovery), and data protection (GDPR/privacy compliance in e-discovery workflows); continuing education requires 20 hours annually (Tier 1), 30 hours (Tier 2), 40 hours (Tier 3) with minimum hours in technology updates and ethics; recertification every 3 years with demonstrated ongoing practice."
    weight: 0.30
    description: "EthicsAndCE"
