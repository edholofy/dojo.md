meta:
  id: discovery-consulting-practice
  level: 4
  course: discovery-document-organization
  type: output
  description: "Build a discovery consulting practice — design a firm specializing in e-discovery strategy, technology selection, and litigation readiness for corporate clients"
  tags: [consulting-practice, business-development, ediscovery-services, expert]

state: {}

trigger: |
  You are launching a boutique e-discovery consulting
  firm. Design the practice.

  FIRM: DiscoveryStar Consulting
  MISSION: Help corporations and law firms optimize
  discovery processes, reduce costs, and mitigate
  litigation risk through technology and best practices

  SERVICE LINES:
  1. Litigation Readiness Assessment — evaluate
     corporate clients' preparedness for discovery
     obligations
  2. Technology Selection & Implementation — advise
     on e-discovery platform selection and deployment
  3. TAR/AI Strategy — design and validate technology-
     assisted review programs
  4. Cross-Border Discovery — navigate international
     data privacy and blocking statutes
  5. Expert Witness Services — testify on e-discovery
     methodology and defensibility
  6. Training & Certification — develop e-discovery
     competency programs for law firms

  TARGET MARKET:
  - Fortune 1000 in-house legal departments
  - AmLaw 200 law firms
  - Government agencies
  - International corporations

  Create:
  1. Complete business plan with financial projections
  2. Service delivery methodology for each service line
  3. Expert witness practice design
  4. Thought leadership and marketing strategy
  5. Staffing plan and talent acquisition strategy

assertions:
  - type: llm_judge
    criteria: "Business plan demonstrates viable market positioning — identifies the specific market gap (most e-discovery vendors sell technology, not strategy; most law firms lack in-house e-discovery expertise beyond basic usage); the competitive analysis positions DiscoveryStar against existing players (e-discovery vendors like Relativity, full-service providers like Consilio/Epiq, Big 4 consulting firms) with a differentiated focus on strategy and methodology rather than technology sales; financial projections include Year 1 revenue of $1-2M (from 5-10 clients), scaling to $5-8M by Year 3 with 15-25 consultants; pricing model includes project-based fees ($50K-250K per engagement), retainer arrangements ($10K-25K/month), and expert witness hourly rates ($500-750/hour); the plan addresses the sales cycle challenge (6-12 months for corporate clients) with cash flow management strategies."
    weight: 0.35
    description: "BusinessPlan"
  - type: llm_judge
    criteria: "Service delivery methodologies are structured and repeatable — each of the 6 service lines has a defined methodology: Litigation Readiness uses a proprietary assessment framework (scoring across 10 dimensions with benchmarks); Technology Selection uses a requirements-driven evaluation process (RFP templates, vendor scoring matrices, proof-of-concept protocols); TAR Strategy includes protocol design, validation methodology, and court-ready documentation; Cross-Border Discovery uses a jurisdiction analysis framework mapping data protection requirements; Expert Witness services include pre-engagement assessment (is the case defensible?), report preparation methodology, and deposition/trial preparation; Training programs have defined curricula, competency assessments, and certification levels; each methodology includes deliverables templates that ensure consistency across engagements."
    weight: 0.35
    description: "ServiceMethodologies"
  - type: llm_judge
    criteria: "Expert witness practice and thought leadership are strategically designed — the expert witness practice targets 3 areas: TAR defensibility (defending or challenging technology-assisted review), spoliation and preservation (opining on reasonableness of preservation efforts), and e-discovery cost and proportionality (supporting proportionality arguments with industry data); marketing strategy combines thought leadership with business development: publications in litigation journals (2-3 articles/year), speaking at ILTANET, Legaltech, and Sedona Conference events, white papers on emerging topics (AI in discovery, cross-border challenges), webinar series for in-house counsel, and strategic partnerships with law firms who refer clients; the staffing plan recruits from litigation support departments, e-discovery vendors, and Big 4 consulting firms, with specific expertise requirements for each service line."
    weight: 0.30
    description: "ExpertWitnessAndThoughtLeadership"
