meta:
  id: discovery-research-program
  level: 4
  course: discovery-document-organization
  type: output
  description: "Design a research program studying e-discovery effectiveness — create an empirical research agenda measuring the impact of different discovery approaches on litigation outcomes and costs"
  tags: [research-program, empirical-study, effectiveness-measurement, expert]

state: {}

trigger: |
  The RAND Institute for Civil Justice has
  commissioned you to design a multi-year research
  program studying the effectiveness and efficiency
  of different e-discovery approaches.

  RESEARCH CONTEXT:
  - E-discovery costs now represent 50-80% of total
    litigation costs in complex cases
  - No rigorous empirical data exists comparing
    different review methodologies
  - Courts accept TAR but have limited data on its
    actual effectiveness vs. manual review
  - The Sedona Conference and EDRM provide best
    practices but with limited empirical validation
  - Proportionality analysis under Rule 26(b)(1)
    lacks data-driven benchmarks
  - Cross-border discovery costs are escalating with
    no comparative effectiveness data

  RESEARCH PROGRAM MUST ADDRESS:

  1. TAR EFFECTIVENESS STUDY
  - Compare TAR 1.0, TAR 2.0/CAL, and manual review
    on the same document sets
  - Measure recall, precision, cost, and time
  - Include diverse case types and document volumes
  - Assess reviewer quality variation in each method

  2. PROPORTIONALITY BENCHMARKING
  - What is the actual cost per relevant document
    found across different case types?
  - How does discovery cost relate to case value?
  - What are the diminishing returns of broader
    discovery?
  - When does additional discovery stop producing
    useful information?

  3. PRIVILEGE REVIEW EFFICIENCY
  - Compare manual vs. technology-assisted privilege
    review
  - Measure error rates (missed privilege and
    over-designation)
  - Assess the cost of errors (waiver claims,
    sanctions)
  - Study the impact of FRE 502(d) orders on review
    costs

  Create:
  1. Five-year research agenda with study designs
  2. Methodology for the TAR effectiveness study
  3. Data collection and analysis framework
  4. Funding and partnership strategy
  5. Publication and policy impact plan

assertions:
  - type: llm_judge
    criteria: "Research agenda uses rigorous empirical methodology — the TAR effectiveness study uses a controlled experimental design: same document collection reviewed by 3 groups (TAR 1.0, TAR 2.0/CAL, manual review) with blinded evaluation; sample sizes are sufficient for statistical significance; study uses real litigation documents (with anonymization) rather than artificial collections; measures primary outcomes (recall, precision, F1) and secondary outcomes (cost per relevant document, reviewer time, quality variation); addresses the ecological validity challenge (laboratory conditions vs. real litigation pressure); includes replication across case types (employment, antitrust, IP, product liability); the proportionality study uses regression analysis on court records and billing data to model the relationship between discovery investment and case outcomes."
    weight: 0.35
    description: "ResearchAgenda"
  - type: llm_judge
    criteria: "Data collection framework addresses the fundamental challenge of accessing litigation data — proposes partnerships with 10-15 law firms who contribute anonymized discovery data (costs, volumes, outcomes) to a research database; addresses confidentiality concerns through data use agreements, anonymization protocols, and aggregation; collects data from e-discovery vendors (with vendor cooperation agreements) on processing volumes, review speeds, and TAR performance metrics; supplements firm data with court records (docket analysis of discovery disputes, sanctions, and cost-shifting decisions); proposes a standardized data collection template that participating firms can integrate into their matter management systems; discusses the survivorship bias challenge (firms only share data from matters that concluded, not ongoing matters)."
    weight: 0.35
    description: "DataCollectionFramework"
  - type: llm_judge
    criteria: "Funding strategy and policy impact plan are realistic — funding sources include: RAND institutional funding, law firm consortium contributions ($50K-100K per firm from 10-15 firms), e-discovery vendor sponsorships (Relativity, Everlaw, Nuix — $100K-250K each), foundation grants (Access to Justice organizations interested in reducing litigation costs), government research contracts (FJC, DOJ Office for Access to Justice); total budget of $3-5M over 5 years; publication plan targets law reviews, empirical legal studies journals, and practitioner publications (ABA Litigation Journal, The Sedona Conference Journal); policy impact strategy includes: presenting findings to the Advisory Committee on Civil Rules (to inform future Rule 26 amendments), Sedona Conference working groups, judicial education programs; addresses the challenge of translating academic research into practical guidelines that practitioners will adopt."
    weight: 0.30
    description: "FundingAndImpact"
