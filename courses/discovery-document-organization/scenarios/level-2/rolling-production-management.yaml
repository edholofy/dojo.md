meta:
  id: rolling-production-management
  level: 2
  course: discovery-document-organization
  type: output
  description: "Manage a rolling production schedule — coordinate phased document productions with multiple deadlines, supplemental productions, and ongoing discovery obligations"
  tags: [rolling-production, supplemental-production, scheduling, intermediate]

state: {}

trigger: |
  You are managing rolling document productions in
  a complex product liability case with multiple
  production deadlines and ongoing supplementation
  obligations.

  CASE: In re AutoSafe Airbag Recall Litigation (MDL)
  YOUR CLIENT: AutoSafe Systems (defendant
  manufacturer)
  CLAIM: Defective airbag inflators causing injuries

  PRODUCTION SCHEDULE (court-ordered):
  Production 1 (completed): Design and engineering
  documents — 45,000 documents produced (Bates
  AS-000001 to AS-085000)

  Production 2 (due in 3 weeks): Manufacturing and
  quality control records — estimated 80,000 documents

  Production 3 (due in 6 weeks): Customer complaints
  and warranty claims — estimated 120,000 records
  from 3 different databases

  Production 4 (due in 9 weeks): Internal
  communications (email) — estimated 300,000 emails
  from 25 custodians

  ONGOING OBLIGATIONS:
  - Supplemental production of newly created
    documents every 30 days
  - Immediate production of any "hot" documents
    identified during review (within 5 business days)
  - Correction of any errors in prior productions
    within 10 business days
  - Updated privilege log with each supplemental
    production

  CURRENT COMPLICATIONS:
  - Production 1 had 200 documents with incorrect
    Bates numbering (duplicate numbers)
  - 15 documents in Production 1 were produced
    without required redactions of third-party PII
  - Opposing counsel claims Production 1 is missing
    a category of engineering test reports
  - The customer complaint database (Production 3)
    is in a proprietary format requiring custom
    export tools
  - One key custodian for Production 4 left the
    company and her laptop may not have been preserved

  Create:
  1. Production management dashboard and tracking
     system
  2. Error correction protocol for Productions 1
     issues
  3. Production 3 database export plan
  4. Production 4 custodian preservation analysis
  5. Supplemental production workflow

assertions:
  - type: llm_judge
    criteria: "Production management dashboard tracks all obligations — visualizes the timeline of all 4 productions plus ongoing supplemental obligations; tracks for each production: documents collected, processed, reviewed, produced, and any pending corrections; maintains a master Bates log ensuring no numbering conflicts across productions; includes a risk register flagging potential issues for upcoming productions (database format for Production 3, departed custodian for Production 4); tracks privilege log entries cumulatively across all productions; monitors compliance with court-ordered deadlines and the 30-day supplemental cycle; includes status reporting for stakeholders (partner, client, court if required)."
    weight: 0.35
    description: "ProductionDashboard"
  - type: llm_judge
    criteria: "Error correction protocol addresses Production 1 issues properly — for duplicate Bates numbers: issues a correction notice to all parties identifying affected documents, assigns new unique Bates numbers (using a supplemental range like AS-S000001+), updates the production index, and files a notice with the court if required by the case management order; for unredacted PII: immediately notifies opposing counsel and requests return/destruction of unredacted versions, produces properly redacted replacements, documents the error for potential FRE 502 analysis, and implements additional QC steps to prevent recurrence; for missing engineering test reports: investigates whether the documents exist, were collected, were improperly excluded during review, or were never in scope, and responds to opposing counsel's claim with specifics."
    weight: 0.35
    description: "ErrorCorrectionProtocol"
  - type: llm_judge
    criteria: "Database export plan and custodian analysis address complex technical challenges — the Production 3 database export plan: identifies the proprietary format and required custom export tools, proposes a structured export (CSV/delimited) with agreed field definitions, addresses data integrity verification (record counts, field validation), estimates timeline and cost for custom export, proposes producing a sample set for opposing counsel's review before full production; the Production 4 custodian analysis: investigates whether the departed employee's laptop was preserved under the litigation hold, identifies alternative data sources (corporate email preserved on server, shared drive documents, colleagues' email containing the custodian's communications), proposes forensic examination of backup systems, and assesses potential spoliation exposure if the laptop was not preserved."
    weight: 0.30
    description: "DatabaseAndCustodian"
