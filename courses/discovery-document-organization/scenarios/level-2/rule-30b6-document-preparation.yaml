meta:
  id: rule-30b6-document-preparation
  level: 2
  course: discovery-document-organization
  type: output
  description: "Prepare document packages for a Rule 30(b)(6) deposition — organize documents by noticed topic, create topic-document maps, and prepare the corporate designee"
  tags: [rule-30b6, corporate-deposition, topic-preparation, intermediate]

state: {}

trigger: |
  Opposing counsel has noticed a Rule 30(b)(6)
  deposition of your client corporation on 10 topics.
  You must organize the relevant documents by topic
  to prepare the corporate designee(s).

  CASE: Riverside Development v. EcoGreen Consulting
  YOUR CLIENT: EcoGreen Consulting (defendant)
  CLAIM: Negligent environmental assessment that
  failed to identify soil contamination on a
  development site

  NOTICED TOPICS:
  1. EcoGreen's qualifications and experience in
     environmental site assessments
  2. The methodology used for the Riverside
     Development site assessment
  3. All testing performed on the Riverside site,
     including sampling locations and methods
  4. The findings and conclusions of the Phase I
     and Phase II assessments
  5. Communications with Riverside Development
     regarding the assessment
  6. EcoGreen's quality assurance procedures for
     environmental assessments
  7. Industry standards for environmental site
     assessments (ASTM E1527, E1903)
  8. Any prior assessments of the Riverside site
     or neighboring properties
  9. EcoGreen's insurance coverage for professional
     liability claims
  10. Similar claims or complaints against EcoGreen
      in the past 10 years

  DOCUMENT UNIVERSE: 1,200 documents already
  produced, plus 300 internal documents not yet
  produced (some may require supplemental production).

  Create:
  1. Topic-to-document mapping for all 10 topics
  2. Designee preparation binders (organized by
     topic)
  3. Gap analysis identifying missing documents
  4. Supplemental production recommendation
  5. Designee preparation memo with key documents
     to review

assertions:
  - type: llm_judge
    criteria: "Topic-to-document mapping is comprehensive and organized — creates a matrix mapping each of the 10 topics to specific documents from the 1,200 produced documents and 300 internal documents; identifies the 20-30 most critical documents for each topic; documents appearing under multiple topics are cross-referenced; the mapping prioritizes documents the designee must review vs. documents that are supplementary; identifies documents that are responsive to specific topics but have not yet been produced (triggering supplemental production obligations); the mapping allows the designee to efficiently prepare for each topic in sequence."
    weight: 0.35
    description: "TopicDocumentMapping"
  - type: llm_judge
    criteria: "Gap analysis and supplemental production are thorough — identifies specific document gaps for each topic (e.g., Topic 3: sampling location maps referenced in the report but not in the production; Topic 6: QA procedures manual current version not produced; Topic 8: prior assessments of neighboring properties may exist in project files; Topic 10: claims history from insurance carrier not collected); the supplemental production recommendation lists specific documents to be produced, explains why they are responsive, and notes any privilege concerns; addresses the obligation to prepare the designee with information beyond documents (institutional knowledge, corporate memory) and how to handle topics where the designee's knowledge is limited."
    weight: 0.35
    description: "GapAnalysisAndProduction"
  - type: llm_judge
    criteria: "Designee preparation memo is strategically focused — identifies the most dangerous documents for each topic (documents that could be used to establish negligence, such as internal QA findings showing deficiencies in assessment methodology, or prior complaints showing a pattern); suggests which topics may require multiple designees (technical topics requiring a scientist vs. corporate topics requiring an executive); highlights areas where the designee should be prepared for hostile questioning (Topic 7: did EcoGreen follow ASTM standards? Topic 10: prior complaints suggesting a pattern of negligent assessments); includes a preparation timeline (recommended 2-3 full days of designee preparation with counsel before the deposition)."
    weight: 0.30
    description: "DesigneePreparationMemo"
