meta:
  id: intermediate-discovery-shift
  level: 2
  course: discovery-document-organization
  type: output
  description: "Intermediate shift simulation — manage concurrent discovery challenges including a privilege dispute, a production deadline, and a spoliation investigation"
  tags: [shift-simulation, concurrent-challenges, discovery-management, intermediate]

state: {}

trigger: |
  You are a senior litigation paralegal managing
  discovery across three active cases simultaneously.
  Each case presents an urgent challenge this week.

  CASE 1 — PRIVILEGE DISPUTE (hearing Friday)
  In Torres v. Consolidated Energy, the court has
  ordered an in camera privilege review of 50
  documents you withheld. You must prepare a
  submission package for the judge including:
  - The 50 documents organized by privilege category
  - A supplemented privilege log with enhanced
    descriptions
  - A brief explaining the privilege basis for each
    document category
  - Index tabs and reference sheet for the judge
  The documents fall into 4 categories: (A) attorney-
  client communications (20 docs), (B) litigation
  work product (15 docs), (C) joint defense
  communications (10 docs), (D) disputed documents
  where privilege is questionable (5 docs).

  CASE 2 — PRODUCTION DEADLINE (Wednesday)
  In Park v. Regional Healthcare, your production
  of 5,000 medical records is due Wednesday. The
  records must be redacted for non-party patient
  PHI under HIPAA. You have 2 contract reviewers
  available. Current status: 3,200 documents reviewed
  and redacted, 1,800 remaining. At current pace,
  you will finish Thursday (1 day late).

  CASE 3 — SPOLIATION INVESTIGATION (report due
  Monday)
  In Goldman v. Pacific Shipping, you just discovered
  that a key custodian's text messages were not
  preserved despite the litigation hold. The custodian
  upgraded his phone 3 months ago and the old phone
  was traded in. You must investigate the scope of
  the loss and prepare an internal memo assessing
  the firm's exposure.

  Address all three situations with appropriate
  action plans and work product.

assertions:
  - type: llm_judge
    criteria: "In camera submission is organized for judicial efficiency — the 50 documents are organized into the 4 privilege categories with clear tabs and labels; the supplemented privilege log provides enhanced descriptions that go beyond boilerplate (specific enough for the judge to understand the nature and context of each communication without reading it); the brief addresses each category's legal basis with case law support (attorney-client under Upjohn, work product under Hickman, joint defense under common interest doctrine); for the 5 questionable documents, the submission candidly identifies the weakness in the privilege claim while arguing for protection; the reference sheet provides a one-page summary allowing the judge to efficiently review all 50 documents."
    weight: 0.35
    description: "InCameraSubmission"
  - type: llm_judge
    criteria: "Production acceleration plan meets the Wednesday deadline — identifies specific strategies to accelerate the remaining 1,800 documents: (1) triage by document type (some records may require minimal redaction), (2) assign additional reviewers (request overtime or additional contract staff), (3) prioritize by complexity (simple records first, complex multi-patient records second), (4) implement batch redaction for common PHI elements (patient names, DOBs, MRNs), (5) consider requesting a 1-day extension if acceleration is insufficient; the plan includes specific daily targets (e.g., 600 documents Monday, 600 Tuesday, 600 Wednesday) with contingency plans; HIPAA redaction guidelines are clear (what constitutes PHI, how to handle incidental mentions, redaction methods that are HIPAA-compliant)."
    weight: 0.35
    description: "ProductionAcceleration"
  - type: llm_judge
    criteria: "Spoliation investigation memo is thorough and candid — investigates: when the phone upgrade occurred relative to the litigation hold, whether the custodian was reminded of preservation obligations before the upgrade, whether text messages were backed up to cloud services (iCloud, Google), whether the carrier retains message logs, whether the old phone can be recovered from the trade-in program; assesses the scope of potential loss (how many relevant text messages might have existed, whether the same communications exist in other forms); evaluates the firm's exposure under Rule 37(e) (distinguishes between negligence and intent to deprive); recommends immediate remedial steps (contact carrier, check cloud backups, interview custodian about message content, consider voluntary disclosure to opposing counsel to mitigate bad faith arguments); the memo is drafted for partner review and is candid about the severity of the issue."
    weight: 0.30
    description: "SpoliationInvestigation"
