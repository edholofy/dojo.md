meta:
  id: spoliation-defense
  level: 2
  course: discovery-document-organization
  type: output
  description: "Defend against a spoliation motion — analyze alleged preservation failures and prepare a defense demonstrating reasonable preservation efforts"
  tags: [spoliation, preservation, rule-37e, intermediate]

state: {}

trigger: |
  Opposing counsel has filed a motion for sanctions
  under FRCP Rule 37(e), alleging your client
  spoliated evidence. You must prepare the defense.

  CASE: Omega Partners v. Sterling Industries
  YOUR CLIENT: Sterling Industries (defendant)
  CLAIM: Breach of joint venture agreement

  OPPOSING COUNSEL'S ALLEGATIONS:
  1. Sterling's VP of Operations, James Morrison,
     deleted 3 months of emails (Jan-Mar 2023) from
     his personal email account after the litigation
     hold was issued in February 2023
  2. Sterling's auto-delete policy for Slack messages
     (90-day retention) destroyed potentially relevant
     Slack communications before they could be
     preserved
  3. A laptop belonging to a key engineer was
     returned to the IT department and reimaged
     (wiped) 2 weeks after the litigation hold
  4. Text messages between Morrison and the joint
     venture partner's CEO were not preserved because
     Morrison used a personal phone not subject to
     the litigation hold

  FACTS IN YOUR CLIENT'S FAVOR:
  - Litigation hold was issued within 48 hours of
    receiving the complaint
  - Hold notice was sent to all 12 identified
    custodians including Morrison
  - Morrison's corporate email (Exchange) was
    preserved — the deleted emails were from his
    personal Gmail account used occasionally for work
  - Slack retention policy was changed to indefinite
    within 1 week of the hold, but messages from
    before the change were already auto-deleted
  - The laptop reimaging was a mistake by an IT
    technician who was not informed of the hold
  - Morrison's corporate phone was preserved;
    personal phone texts were not captured
  - Your firm sent hold reminders at 30, 60, and
    90 days

  Create:
  1. Opposition brief to the motion for sanctions
  2. Analysis of each allegation under Rule 37(e)
  3. Declaration from IT director supporting
     preservation efforts
  4. Proposed curative measures (if any sanctions
     are warranted)
  5. Lessons learned memo for the client

assertions:
  - type: llm_judge
    criteria: "Opposition brief applies the correct Rule 37(e) framework — analyzes each allegation under the two-part structure: 37(e)(1) (curative measures for prejudice without intent) and 37(e)(2) (severe sanctions requiring intent to deprive); argues that the email deletion from personal Gmail requires analysis of whether Morrison acted with intent to deprive (critical distinction); argues that the Slack auto-delete was a routine business practice, not intentional destruction, and the company took reasonable steps by changing the policy within a week; argues the laptop reimaging was an isolated mistake, not a systemic failure; distinguishes between the duty to preserve (which was triggered) and perfection in preservation (which is not required); cites relevant case law (Zubulake, Chin v. Port Authority, GN Netcom for the reasonable steps standard)."
    weight: 0.35
    description: "OppositionBrief"
  - type: llm_judge
    criteria: "Individual allegation analysis is factually detailed and legally precise — for each of the 4 allegations: (1) Personal email deletion — strongest allegation; argues Morrison may have negligently deleted rather than intentionally destroyed, but acknowledges this is the most problematic fact; proposes forensic recovery as a curative measure; (2) Slack auto-delete — argues company took reasonable steps by changing policy within a week; pre-hold deletions were routine business operations; (3) Laptop reimaging — argues IT error was promptly identified, was an isolated incident, and other data sources capture the same information; (4) Personal phone — argues reasonable steps were taken for corporate devices; extending hold to personal devices was not clearly required; for each allegation, identifies whether the information can be obtained from other sources (reducing prejudice)."
    weight: 0.35
    description: "AllegationAnalysis"
  - type: llm_judge
    criteria: "IT declaration and curative measures are practical — the IT director's declaration establishes: the timeline of hold implementation, specific preservation actions taken for each custodian, the Slack policy change, the laptop reimaging was an unauthorized error by a new technician, corporate systems (Exchange, OneDrive) captured the vast majority of relevant communications; proposed curative measures are proportionate: forensic examination of Morrison's devices to attempt email recovery, supplemental production from alternative sources (corporate email, other custodians' records), stipulation to specific facts if documents are unrecoverable; the lessons learned memo identifies specific improvements (personal device policies, IT department training on litigation holds, automated hold enforcement tools, expanded custodian interviews about personal account use)."
    weight: 0.30
    description: "DeclarationAndCurativeMeasures"
