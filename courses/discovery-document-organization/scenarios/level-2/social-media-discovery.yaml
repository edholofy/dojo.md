meta:
  id: social-media-discovery
  level: 2
  course: discovery-document-organization
  type: output
  description: "Manage social media discovery — collect, preserve, and organize social media evidence including authentication and admissibility considerations"
  tags: [social-media, digital-evidence, authentication, intermediate]

state: {}

trigger: |
  You are handling social media discovery in a
  defamation and cyberbullying case. Both sides
  have significant social media evidence.

  CASE: Nguyen v. Bradford
  CLAIM: Defamation, cyberbullying, intentional
  infliction of emotional distress
  PLAINTIFF: Sarah Nguyen (high school teacher)
  DEFENDANT: Marcus Bradford (parent of a student)

  SOCIAL MEDIA EVIDENCE TO MANAGE:

  DEFENDANT'S SOCIAL MEDIA (to collect from opposing
  party):
  1. Facebook posts (public and restricted) —
     alleged defamatory statements about plaintiff
     being an "incompetent teacher" and "danger to
     children" (15+ posts over 3 months)
  2. Facebook group "Parents Against Bad Teachers" —
     defendant created this group with 200 members;
     contains discussions about plaintiff
  3. Twitter/X posts — defendant's tweets tagging
     the school district demanding plaintiff's firing
  4. YouTube video — defendant posted a 10-minute
     video making allegations about plaintiff
  5. Instagram stories — screenshots of plaintiff's
     classroom shared with derogatory captions
     (stories may have expired)

  PLAINTIFF'S SOCIAL MEDIA (your client's own):
  6. Facebook posts showing plaintiff's emotional
     distress and impact on career
  7. Private messages from supportive colleagues
     and parents
  8. LinkedIn profile showing career progression
     (and recent gap in activity suggesting impact)

  THIRD-PARTY SOCIAL MEDIA:
  9. Comments by other parents on defendant's posts
  10. School district's official social media
      responses
  11. News outlet social media coverage and comment
      threads

  Create:
  1. Social media preservation and collection plan
  2. Authentication protocol for each platform
  3. Organization system for social media evidence
  4. Admissibility analysis for key evidence
  5. Discovery requests for defendant's social
     media data

assertions:
  - type: llm_judge
    criteria: "Preservation and collection plan addresses platform-specific challenges — for each platform: Facebook (data download request via Settings, third-party preservation tools like PageVault or X1 Social Discovery for public content, preservation letters to Meta for litigation hold); Twitter/X (API-based collection for public posts, data download request for defendant's account via discovery); YouTube (video download and hash verification, metadata preservation); Instagram (ephemeral content challenge — discusses whether expired stories can be recovered, preservation letters to Meta); collection methods address both public content (screenshot with metadata, hash values, URL preservation) and private content (discovery requests, subpoenas to platforms); addresses the risk of defendant deleting content and proposes a TRO or preservation order if needed."
    weight: 0.35
    description: "PreservationAndCollection"
  - type: llm_judge
    criteria: "Authentication protocol meets evidentiary standards — addresses FRE 901(b) authentication requirements for each type of social media evidence; discusses the challenges of authenticating social media (accounts can be hacked, posts can be fabricated, screenshots can be altered); proposes multiple authentication methods: (1) testimony from the poster or someone who witnessed the posting, (2) circumstantial evidence (content, writing style, account details), (3) platform metadata and business records (FRE 902(14) certification from platforms), (4) forensic examination of metadata in screenshots (EXIF data, timestamps); addresses the specific challenge of authenticating expired Instagram stories (may only exist as screenshots on other users' devices); references relevant case law on social media authentication (Griffin v. State, Tienda v. State)."
    weight: 0.35
    description: "AuthenticationProtocol"
  - type: llm_judge
    criteria: "Organization system and admissibility analysis are practically useful — the organization system catalogs each piece of social media evidence with: platform, date, author, content description, URL (if still live), screenshot file reference, hash value, authentication status, and relevance to each claim element; the system chronologically tracks the escalation of defendant's campaign; the admissibility analysis identifies potential hearsay issues (third-party comments may be hearsay unless offered for their effect on the listener or as co-conspirator statements), best evidence concerns (screenshots vs. original posts), and relevance objections; discovery requests are specific to social media (requesting data downloads, account activity logs, deleted content, and IP login records) and cite applicable case law supporting social media discovery."
    weight: 0.30
    description: "OrganizationAndAdmissibility"
