meta:
  id: tar-implementation
  level: 2
  course: discovery-document-organization
  type: output
  description: "Implement a technology-assisted review workflow — design a TAR/CAL protocol for a large document review with defensibility documentation"
  tags: [tar, predictive-coding, cal, intermediate]

state: {}

trigger: |
  Your firm has been retained in a large employment
  class action. The document collection totals
  850,000 documents (3.2 million pages). Manual
  review at $85/hour would cost approximately $4.2M.
  The partner has approved using TAR to reduce costs.

  CASE: Robinson v. NorthStar Corp. (class action)
  CLAIMS: Systematic gender discrimination in
  promotions and compensation
  CLASS SIZE: 2,500 current and former female employees
  RELEVANT PERIOD: 2018-2024
  YOUR CLIENT: NorthStar Corp. (defendant)

  DOCUMENT COLLECTION:
  - 500,000 emails from 45 custodians
  - 200,000 HR system records (performance reviews,
    promotion decisions, compensation data)
  - 100,000 documents from shared drives (policies,
    reports, presentations)
  - 50,000 Slack messages from HR and management
    channels

  REVIEW OBJECTIVES:
  - Identify responsive documents for production
  - Flag privileged documents for logging
  - Code for 8 issue categories (hiring, promotion,
    compensation, performance evaluation, termination,
    harassment, retaliation, policy/training)
  - Identify "hot" documents for case strategy
  - Achieve defensible recall rate (target: 80%+)

  Create:
  1. TAR workflow design (TAR 1.0 vs. TAR 2.0/CAL
     analysis with recommendation)
  2. Seed set and training protocol
  3. Quality control and validation plan
  4. Defensibility documentation framework
  5. Cost-benefit analysis comparing TAR to manual
     review

assertions:
  - type: llm_judge
    criteria: "TAR workflow design makes an informed choice between methodologies — recommends TAR 2.0/CAL for this case with clear justification (continuous learning is superior for large, diverse collections with 8 issue categories; TAR 1.0's fixed training phase is less effective for multi-issue coding); the workflow includes: initial seed set selection strategy, SME reviewer identification and training, document prioritization queue design, review team structure (SME reviewers for training, junior reviewers for bulk coding with QC), iterative validation checkpoints, and stop criteria (when additional review yields diminishing returns); addresses the practical challenge of coding for 8 issue categories simultaneously vs. running separate TAR models per issue."
    weight: 0.35
    description: "TARWorkflowDesign"
  - type: llm_judge
    criteria: "Quality control and validation plan meets defensibility standards — specifies recall target (80%+) with methodology for measuring it (control set of randomly selected documents reviewed by SMEs); tracks precision to manage over-inclusion costs; uses elusion testing (sampling documents below the cutoff score to estimate missed relevant documents); inter-reviewer agreement protocols include Cohen's Kappa targets (>0.60 for relevance, >0.75 for privilege); QC sampling rate (10% of reviewed documents checked by senior reviewer); addresses the specific challenge of privilege review within TAR (whether to use TAR for privilege identification or manual review)."
    weight: 0.35
    description: "QCAndValidation"
  - type: llm_judge
    criteria: "Cost-benefit analysis demonstrates clear savings — compares TAR costs (platform licensing, SME reviewer time for training, reduced bulk review hours, QC overhead, validation) against manual review costs ($4.2M baseline); estimates TAR will reduce review volume by 60-70% (reviewing 250,000-350,000 documents vs. 850,000); projects total TAR-assisted review cost at $1.2-1.8M; includes timeline comparison (TAR: 8-12 weeks vs. manual: 16-24 weeks); addresses potential challenges (opposing counsel objection to TAR, court approval requirements) with reference to case law accepting TAR (Rio Tinto, Da Silva Moore, Hyles v. New York City); the analysis acknowledges that TAR requires upfront investment in SME time but delivers superior long-term economics."
    weight: 0.30
    description: "CostBenefitAnalysis"
