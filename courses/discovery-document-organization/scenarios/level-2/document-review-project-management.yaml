meta:
  id: document-review-project-management
  level: 2
  course: discovery-document-organization
  type: output
  description: "Manage a large-scale document review project — staff, train, and oversee a team of contract reviewers on a complex litigation matter"
  tags: [project-management, review-team, staffing, intermediate]

state: {}

trigger: |
  You are the document review project manager for
  a large securities fraud case. You must plan and
  execute a review of 400,000 documents within
  8 weeks using a team of contract reviewers.

  CASE: SEC v. Pinnacle Capital Management
  CLAIM: Securities fraud, insider trading,
  market manipulation
  YOUR CLIENT: Pinnacle Capital (defendant)
  DOCUMENT COLLECTION: 400,000 documents (1.6M pages)
  DEADLINE: 8 weeks for production
  BUDGET: $1.5M for document review

  DOCUMENT BREAKDOWN:
  - 250,000 emails from 30 custodians (traders,
    compliance officers, executives)
  - 80,000 instant messages (Bloomberg terminal
    chats, WhatsApp)
  - 40,000 financial documents (trade blotters,
    position reports, P&L statements)
  - 20,000 documents from shared drives (policies,
    research reports, presentations)
  - 10,000 personal documents from executive
    custodians

  REVIEW REQUIREMENTS:
  - First-pass relevance review (responsive/not
    responsive)
  - Privilege review (attorney-client, work product,
    broker-dealer privilege)
  - Issue coding (12 issue categories: insider
    trading, front-running, market manipulation,
    compliance failures, regulatory evasion, etc.)
  - "Hot document" identification
  - Foreign language review (15% of documents in
    Mandarin Chinese)
  - Financial document specialized review (trade
    data requiring securities industry expertise)

  Create:
  1. Staffing plan with team structure
  2. Reviewer training program
  3. Review workflow and daily production targets
  4. Quality control protocol
  5. Budget allocation and tracking system

assertions:
  - type: llm_judge
    criteria: "Staffing plan is realistic for the timeline and budget — calculates required reviewer hours (400,000 docs at estimated review rate of 50-75 docs/hour = 5,333-8,000 hours); proposes a tiered team structure: 1-2 senior reviewers/SMEs (securities industry experience, $100-125/hour), 2-3 mid-level reviewers (privilege review specialists, $75-100/hour), 15-20 first-pass reviewers ($45-65/hour), 2-3 Mandarin-speaking reviewers, 1-2 financial document specialists; includes a project manager and QC coordinator; the budget allocation breaks down across labor, technology (Relativity hosting), and overhead; daily production targets account for ramp-up period (Week 1-2 at 60% productivity, Weeks 3-8 at full capacity)."
    weight: 0.35
    description: "StaffingPlan"
  - type: llm_judge
    criteria: "Training program covers case-specific and technical requirements — training includes: case background and legal theories (2 hours), securities industry terminology and concepts (2 hours), review platform mechanics (Relativity navigation, coding panel, batch operations) (3 hours), issue coding definitions with examples for each of the 12 categories (3 hours), privilege identification specific to broker-dealer context (2 hours), hot document identification criteria (1 hour), foreign language document handling procedures (1 hour), QC expectations and escalation procedures (1 hour); training uses sample documents from the actual collection as practice materials; includes a competency assessment before reviewers begin production review; addresses the specialized knowledge needed for Bloomberg chat format and trade blotter interpretation."
    weight: 0.35
    description: "TrainingProgram"
  - type: llm_judge
    criteria: "QC protocol and budget tracking ensure quality and fiscal discipline — QC includes: 10% random sample review by senior reviewers, real-time dashboard tracking reviewer agreement rates, daily spot-checks on privilege coding (zero tolerance for missed privilege), weekly inter-reviewer reliability testing (Cohen's Kappa > 0.65 target), escalation path for ambiguous documents (reviewer → senior reviewer → attorney → partner), overturn tracking by reviewer to identify underperforming team members; budget tracking includes: weekly burn rate reports, per-document cost tracking, variance analysis against budget, triggers for budget adjustment discussions (if >10% over projected pace); the workflow prioritizes custodians by relevance (key traders and executives reviewed first, lower-priority custodians later if budget permits)."
    weight: 0.30
    description: "QCAndBudget"
