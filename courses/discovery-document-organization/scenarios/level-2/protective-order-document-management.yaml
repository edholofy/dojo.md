meta:
  id: protective-order-document-management
  level: 2
  course: discovery-document-organization
  type: output
  description: "Manage documents under a tiered protective order — implement a system for tracking confidentiality designations and handling challenges"
  tags: [protective-order, confidentiality, document-management, intermediate]

state: {}

trigger: |
  The court has entered a tiered protective order
  in a complex antitrust case. You must implement
  a system for managing documents under the order's
  three confidentiality tiers.

  CASE: In re Industrial Chemical Pricing Litigation
  (MDL consolidated case)
  YOUR CLIENT: ChemCorp International (defendant)

  PROTECTIVE ORDER TIERS:
  Tier 1 — CONFIDENTIAL: Business information not
  publicly available. Accessible to outside counsel,
  in-house counsel, experts, and court personnel.

  Tier 2 — HIGHLY CONFIDENTIAL — ATTORNEYS' EYES
  ONLY: Trade secrets, proprietary pricing data,
  customer lists. Accessible only to outside counsel,
  experts (subject to additional restrictions), and
  court personnel. NOT accessible to in-house counsel
  or party representatives.

  Tier 3 — HIGHLY CONFIDENTIAL — SOURCE CODE:
  Proprietary algorithms and source code. Accessible
  only to outside counsel and specifically designated
  independent experts. Viewable only in a secure
  review facility.

  MANAGEMENT CHALLENGES:
  - 150,000 documents produced across 8 parties
  - 12,000 documents designated Tier 1
  - 3,500 documents designated Tier 2
  - 200 documents designated Tier 3
  - Your client wants to challenge 500 of opposing
    parties' Tier 2 designations as over-designated
  - Expert witnesses need access to Tier 2 documents
    but must sign supplemental agreements
  - Deposition transcripts contain Tier 2 information
    and must be properly marked

  Create:
  1. Document management system for tracking all
     three tiers
  2. Access control protocol
  3. Challenge procedure for over-designations
  4. Expert witness access protocol
  5. Deposition handling procedures for confidential
     documents

assertions:
  - type: llm_judge
    criteria: "Document management system properly tracks all tiers — maintains a master database linking each document's Bates number to its confidentiality designation, designating party, date of designation, and any pending challenges; the system supports filtering and searching by tier, allowing counsel to quickly identify which documents they can share with in-house counsel (Tier 1 only) vs. which are restricted; tracks designation changes (upgrades, downgrades, challenges); provides audit trail showing who accessed Tier 2 and Tier 3 documents; addresses the practical challenge of 150,000 documents across 8 parties with different designation approaches."
    weight: 0.35
    description: "DocumentManagementSystem"
  - type: llm_judge
    criteria: "Access control and expert protocols enforce the protective order — access controls map each tier to permitted personnel categories with specific implementation steps (Tier 2 documents in a separate Relativity workspace or with access restrictions, Tier 3 in an isolated environment with physical security); expert witness access protocol includes: supplemental confidentiality agreement template, certification that expert understands restrictions, access logging for Tier 2 and Tier 3 materials, return/destruction requirements at end of engagement, provisions for expert reports that reference Tier 2 information (how to handle at trial); the protocol addresses the common challenge of experts who work for competitors and may need additional restrictions."
    weight: 0.35
    description: "AccessControlAndExperts"
  - type: llm_judge
    criteria: "Challenge procedure for over-designations is strategic and efficient — proposes a batch challenge process for the 500 over-designated documents rather than individual challenges; groups challenges by category (e.g., 200 documents are publicly available financial data improperly designated Tier 2, 150 are general industry information, 150 are dated materials whose confidentiality has expired); drafts a meet-and-confer framework with specific arguments for each category; if the meet-and-confer fails, outlines a motion to re-designate with supporting legal authority; the deposition procedures address real-time designation of testimony, handling of exhibits at depositions involving Tier 2 materials, and post-deposition transcript marking protocols."
    weight: 0.30
    description: "ChallengeAndDeposition"
