meta:
  id: multi-party-ediscovery
  level: 2
  course: discovery-document-organization
  type: output
  description: "Manage e-discovery across multiple parties in a complex commercial case — coordinate document productions, negotiate ESI protocols, and manage cross-party privilege issues"
  tags: [multi-party, esi-protocol, coordination, intermediate]

state: {}

trigger: |
  You are managing e-discovery in a complex commercial
  fraud case with 5 parties. Coordinating productions
  and managing conflicting interests is your primary
  challenge.

  CASE: Apex Industries v. GlobalTech Corp., et al.
  PARTIES:
  1. Apex Industries (plaintiff — your client)
  2. GlobalTech Corp. (defendant — primary target)
  3. Smith & Associates (defendant — consulting firm
     that advised GlobalTech)
  4. First National Bank (defendant — financed the
     allegedly fraudulent transaction)
  5. Williams Holdings (third-party defendant —
     brought in by GlobalTech for indemnification)

  DISCOVERY CHALLENGES:
  - 5 different Bates prefixes needed
  - GlobalTech has 2 TB of potentially relevant ESI
  - Smith & Associates claims all consulting reports
    are privileged (common interest with GlobalTech)
  - First National Bank's production is subject to
    banking privacy regulations
  - Williams Holdings has produced documents in
    native format while everyone else uses TIFF
  - 3 parties use different document review platforms
  - Cross-designations of confidentiality under the
    protective order are disputed
  - Depositions are scheduled but exhibit
    coordination between parties is chaotic

  Create:
  1. Unified ESI protocol for all parties
  2. Cross-party document tracking system
  3. Common interest privilege analysis
  4. Production format standardization plan
  5. Exhibit coordination protocol for depositions

assertions:
  - type: llm_judge
    criteria: "ESI protocol addresses multi-party complexity — assigns unique Bates prefixes to each party (e.g., APEX-, GT-, SA-, FNB-, WH-); establishes uniform production format (TIFF with load files or agreed alternative) resolving the Williams Holdings native format issue; sets coordinated production schedules with staggered deadlines to prevent review bottleneck; addresses banking privacy regulations for First National Bank's production (in camera review, redaction protocols, regulatory compliance); specifies metadata fields required from all parties; establishes a common document repository or exchange platform; includes meet-and-confer protocols for cross-party disputes."
    weight: 0.35
    description: "ESIProtocol"
  - type: llm_judge
    criteria: "Common interest privilege analysis is legally rigorous — analyzes whether Smith & Associates' common interest claim with GlobalTech is valid (requires identical legal interest, not merely commercial alignment; consulting relationship alone may be insufficient); evaluates whether a formal joint defense agreement exists; identifies documents where the common interest doctrine likely applies (legal strategy communications) vs. where it likely fails (business consulting reports pre-dating litigation); recommends challenging the blanket privilege claim while acknowledging valid claims for specific categories; addresses the practical implications for the privilege log (each party must independently log or can they submit a joint log)."
    weight: 0.35
    description: "CommonInterestAnalysis"
  - type: llm_judge
    criteria: "Cross-party tracking and exhibit coordination are operationally practical — the document tracking system tracks productions received and sent across all party combinations (10 possible pairings); maintains a master Bates index cross-referencing all productions; tracks confidentiality designations and challenges across parties; the deposition exhibit coordination protocol establishes a shared exhibit numbering system, advance exchange requirements (48-72 hours before deposition), and procedures for handling confidential documents of one party used in another party's deposition; addresses the practical reality of managing multiple review platforms by establishing standardized export/import procedures."
    weight: 0.30
    description: "TrackingAndCoordination"
