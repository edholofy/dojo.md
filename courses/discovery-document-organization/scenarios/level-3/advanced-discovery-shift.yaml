meta:
  id: advanced-discovery-shift
  level: 3
  course: discovery-document-organization
  type: output
  description: "Advanced shift simulation — manage enterprise-level discovery challenges including cross-border collection, AI-assisted review, and government investigation response simultaneously"
  tags: [shift-simulation, enterprise-challenges, multi-faceted, advanced]

state: {}

trigger: |
  You are the head of litigation support at a global
  law firm. Three critical discovery situations
  require your expertise this week.

  SITUATION 1 — AI REVIEW CHALLENGE
  In Franklin v. MegaCorp Industries, opposing
  counsel has filed a motion challenging your use
  of TAR 2.0 (CAL) for document review. They argue:
  - Your TAR process was not transparent (they
    weren't informed until after production)
  - The recall rate (75%) is inadequate for a case
    of this magnitude ($200M damages)
  - Your seed set was biased (selected by the
    attorney who knows the case best, not randomly)
  - They want access to your TAR training data and
    algorithm settings
  The hearing is Friday. Prepare your defense.

  SITUATION 2 — INTERNATIONAL DATA BREACH
  In the Pinnacle Global Antitrust Investigation,
  a law firm in your network's London office
  accidentally produced 500 documents from the
  EU data collection that contain unredacted personal
  data of EU citizens. The documents were produced
  to the US DOJ. The EU Data Protection Authority
  has been notified and is investigating. Your
  client faces potential GDPR fines up to 4% of
  global revenue ($800M).

  Address:
  - Immediate remediation steps
  - GDPR breach notification requirements
  - DOJ coordination (can they use the data?)
  - Future prevention measures

  SITUATION 3 — PRIVILEGE WAIVER CRISIS
  In Tech Innovations v. CyberSecure Corp., your
  client's in-house counsel inadvertently produced
  a 47-page internal investigation report containing
  detailed attorney mental impressions, witness
  interview notes, and case strategy analysis. The
  document was buried in a production of 100,000
  documents. Opposing counsel has already reviewed
  the document and cited it in a brief filed
  yesterday. You have no FRE 502(d) order in place.

  Address:
  - Clawback demand strategy
  - FRE 502(b) inadvertent waiver analysis
  - Motion to strike the brief citations
  - Prevention measures for future productions

assertions:
  - type: llm_judge
    criteria: "TAR defense is legally and technically sound — responds to each objection: (1) transparency — while disclosure of TAR is best practice, no court has required pre-disclosure; cites cases where post-hoc TAR validation was accepted (Rio Tinto, Hyles); (2) recall rate — 75% recall is within the range courts have accepted; argues that manual review typically achieves lower recall; cites studies showing human review recall rates of 60-70%; proposes additional validation (elusion testing) to demonstrate adequacy; (3) seed set bias — judgmental sampling by the most knowledgeable attorney is a recognized and defensible approach in TAR 2.0/CAL; the algorithm corrects for any initial bias through continuous learning; (4) training data access — opposes disclosure of training data as work product but offers to submit validation statistics and methodology to the court; proposes a court-appointed expert or special master to validate the TAR process if the court has concerns."
    weight: 0.35
    description: "TARDefense"
  - type: llm_judge
    criteria: "GDPR breach response addresses all regulatory and practical requirements — immediate steps: contact the London office to identify all 500 documents and the personal data contained; issue a formal request to the DOJ to return or sequester the documents containing personal data; notify the EU DPA within 72 hours of becoming aware of the breach (as required by GDPR Article 33); assess whether individual notification to data subjects is required (Article 34 — required if high risk to rights and freedoms); conduct a root cause analysis (how did the production process fail to catch unredacted personal data?); future prevention includes: automated PII detection in production QC, mandatory GDPR compliance checklist before any EU data production, dual-review protocol for cross-border productions, updated data processing agreements with all firms in the network; addresses the potential GDPR fine calculation and mitigation arguments."
    weight: 0.35
    description: "GDPRBreachResponse"
  - type: llm_judge
    criteria: "Privilege waiver analysis applies FRE 502(b) correctly — analyzes the five factors under FRE 502(b) for inadvertent waiver: (1) the disclosure was inadvertent (47 pages in a 100,000-document production); (2) the holder took reasonable steps to prevent disclosure (what was the QC process? If robust, this favors no waiver); (3) the holder promptly took reasonable steps to rectify (immediate clawback demand, motion to strike); (4) whether the scope of the error indicates systematic failures (one document suggests isolated error) or pattern (multiple privileged documents would indicate systemic failure); cites case law on inadvertent production of investigation reports (similar cases where courts have found no waiver); the clawback demand is drafted immediately with specific legal authority; the motion to strike argues that opposing counsel's use of the document in a brief violates the duty to notify under FRE 502 and ethical obligations; prevention measures include enhanced privilege review QC, automated detection of investigation reports and memoranda, FRE 502(d) orders sought in all future matters."
    weight: 0.30
    description: "PrivilegeWaiverAnalysis"
