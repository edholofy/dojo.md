meta:
  id: ai-document-classification
  level: 3
  course: discovery-document-organization
  type: output
  description: "Implement AI-powered document classification beyond TAR — design a multi-model AI system for automated document categorization, privilege detection, PII identification, and issue coding"
  tags: [ai-classification, machine-learning, automation, advanced]

state: {}

trigger: |
  Your firm wants to move beyond basic TAR to
  implement a comprehensive AI-powered document
  classification system. Design the system.

  FIRM: Whitfield & Associates (250 attorneys,
  heavy litigation practice)
  ANNUAL REVIEW VOLUME: 5 million documents across
  all matters
  CURRENT STATE: Basic TAR used on 20% of matters;
  80% still manually reviewed

  AI CLASSIFICATION GOALS:

  1. RELEVANCE CLASSIFICATION
  - Multi-class relevance (Hot / Highly Relevant /
    Relevant / Marginally Relevant / Not Relevant)
  - Practice-area-specific models (employment,
    antitrust, IP, securities, product liability)
  - Cross-matter learning (models improve from
    each matter's training data)

  2. PRIVILEGE DETECTION
  - Automated identification of potentially
    privileged documents
  - Attorney name recognition linked to bar
    registration databases
  - Communication pattern analysis (attorney-to-
    client, attorney-to-attorney)
  - "Seeking legal advice" language pattern detection
  - Work product indicators (prepared in anticipation
    of litigation)

  3. PII IDENTIFICATION
  - Automated detection of SSNs, credit card
    numbers, bank accounts, medical record numbers
  - Name entity recognition for personal names
  - Address detection and classification
  - Automated redaction recommendations
  - HIPAA and GDPR compliance flags

  4. ISSUE CODING
  - Automated multi-label issue coding
  - Topic modeling for issue discovery
  - Sentiment analysis for communication tone
  - Timeline extraction from document content
  - Key player identification

  Create:
  1. System architecture and model design
  2. Training data strategy
  3. Validation and testing framework
  4. Ethical and defensibility considerations
  5. Phased deployment plan

assertions:
  - type: llm_judge
    criteria: "System architecture uses appropriate AI/ML approaches for each classification task — relevance classification uses fine-tuned transformer models (BERT or similar) trained on labeled review data with practice-area-specific models; privilege detection combines rule-based systems (attorney name matching, email domain analysis) with ML-based language pattern recognition; PII identification uses a combination of regex patterns (SSN, credit card formats), NER models (names, addresses), and context-aware classifiers; issue coding uses multi-label classification with topic modeling for emerging issues; the architecture addresses the challenge of model drift (performance degradation over time) with continuous monitoring and retraining protocols; discusses whether to build custom models, fine-tune open-source models, or license commercial solutions for each component."
    weight: 0.35
    description: "SystemArchitecture"
  - type: llm_judge
    criteria: "Training data strategy addresses the core challenge of legal AI — acknowledges that legal document classification requires domain-specific training data that is expensive to create; proposes a federated learning approach: each matter's review data contributes to model improvement while maintaining client confidentiality through anonymization; estimates training data requirements for each model (10,000+ labeled documents per practice area for relevance, 5,000+ for privilege detection); addresses class imbalance (typically 5-10% of documents are relevant, creating a skewed training set); proposes active learning to maximize the value of human labeling effort; discusses the ethical implications of cross-matter learning (client consent, conflict checking, data isolation)."
    weight: 0.35
    description: "TrainingDataStrategy"
  - type: llm_judge
    criteria: "Validation framework and defensibility considerations are rigorous — validation includes: hold-out test sets for each model, cross-validation across matters, human-in-the-loop validation for edge cases, performance metrics tracked over time (precision, recall, F1 by class), A/B testing comparing AI-assisted vs. manual review outcomes; defensibility addresses: court acceptance of AI classification (citing case law), documentation requirements for Daubert challenges, transparency of model decisions (explainability/interpretability), human oversight requirements (AI assists but does not replace attorney judgment for privilege and relevance), bias detection (does the model perform differently across document types, languages, or custodians); ethical considerations include: Model Rule 1.1 competency in understanding AI limitations, Rule 1.6 confidentiality in training data use, informed consent from clients for AI-assisted review."
    weight: 0.30
    description: "ValidationAndDefensibility"
