meta:
  id: cross-border-ediscovery
  level: 3
  course: discovery-document-organization
  type: output
  description: "Navigate cross-border e-discovery challenges — manage document collection and production across multiple jurisdictions with conflicting privacy laws and blocking statutes"
  tags: [cross-border, gdpr, international-discovery, advanced]

state: {}

trigger: |
  You are lead discovery counsel in a multi-
  jurisdictional antitrust investigation involving
  document collection from 6 countries with
  conflicting legal requirements.

  CASE: EU Commission & US DOJ v. PharmaCorp Global
  INVESTIGATION: Price-fixing conspiracy in generic
  pharmaceutical markets
  YOUR CLIENT: PharmaCorp Global (headquartered in
  Switzerland, operations in 40 countries)

  DATA LOCATIONS AND LEGAL CHALLENGES:

  1. UNITED STATES (New Jersey HQ operations)
  - 2 TB of email and documents
  - Standard FRCP discovery obligations
  - DOJ second request requires broad production
  - No blocking statute issues

  2. EUROPEAN UNION (Germany, France offices)
  - 1.5 TB of data including employee personal data
  - GDPR restricts transfer of personal data outside
    EU without adequate safeguards
  - German blocking statute (Section 7 of the
    German Code of Civil Procedure) may restrict
    production to US courts
  - Works council rights in Germany require
    consultation before accessing employee data
  - French Blocking Statute (Law No. 68-678)
    criminalizes providing documents for foreign
    legal proceedings

  3. CHINA (Shanghai operations)
  - 500 GB of data on local servers
  - China's Personal Information Protection Law
    (PIPL) restricts cross-border data transfers
  - Data Security Law requires government approval
    for transfer of "important data"
  - Cybersecurity Law requires data localization
    for certain categories
  - Chinese blocking statute may apply

  4. JAPAN (Tokyo office)
  - 300 GB of data
  - Act on Protection of Personal Information (APPI)
    requires consent for cross-border transfer
  - Cultural expectations around employee privacy
  - Hague Convention procedures available

  5. BRAZIL (São Paulo office)
  - 200 GB of data
  - Lei Geral de Proteção de Dados (LGPD) mirrors
    GDPR
  - No blocking statute but data protection
    authority may object

  6. SWITZERLAND (headquarters)
  - 800 GB including board-level communications
  - Swiss Federal Act on Data Protection (FADP)
  - Banking secrecy laws may apply to financial data
  - Swiss blocking statute (Article 271 of the Swiss
    Penal Code) criminalizes unauthorized actions
    for foreign governments

  Create:
  1. Jurisdiction-by-jurisdiction collection strategy
  2. Data transfer legal analysis
  3. GDPR compliance framework for EU data
  4. China-specific data export protocol
  5. Unified production plan respecting all
     jurisdictions

assertions:
  - type: llm_judge
    criteria: "Jurisdiction-by-jurisdiction strategy demonstrates deep knowledge of each legal regime — for each country: identifies the specific laws that apply, the legal basis for data collection and transfer, the required procedural steps (works council consultation in Germany, government approval in China, consent requirements in Japan), and the timeline implications; the US collection proceeds normally while international collections require careful sequencing; proposes in-country review for GDPR-restricted data (review in EU, produce only responsive non-personal data to US); addresses the French blocking statute by proposing Hague Convention procedures as a parallel track; identifies the Swiss criminal exposure under Article 271 and proposes a Swiss government authorization request; the strategy prioritizes collection from jurisdictions with fewer restrictions while working through complex jurisdictions in parallel."
    weight: 0.35
    description: "JurisdictionStrategy"
  - type: llm_judge
    criteria: "GDPR compliance framework is practically implementable — addresses each GDPR principle: lawful basis for processing (legitimate interest under Article 6(1)(f) or compliance with legal obligation under Article 6(1)(c)); data minimization (collect only what is necessary and proportionate); purpose limitation (processing for litigation defense only); transfer mechanisms (Standard Contractual Clauses, Binding Corporate Rules, or derogation under Article 49(1)(e) for legal claims); Data Protection Impact Assessment (DPIA) required under Article 35; employee notification requirements; works council consultation timeline in Germany (typically 2-4 weeks); addresses the practical challenge of separating personal data from business data in email collections; proposes anonymization and pseudonymization where possible."
    weight: 0.35
    description: "GDPRFramework"
  - type: llm_judge
    criteria: "China data export protocol and unified production plan address the most complex challenges — the China protocol: identifies whether the data constitutes 'important data' under the Data Security Law (requiring CAC assessment), proposes a security assessment application to the Cyberspace Administration of China, addresses the timeline risk (government approval may take 3-6 months), proposes in-country review with US-based attorney access via secure terminal, identifies data that can be exported (anonymized business records) vs. data requiring special handling (personal information, potentially important data); the unified production plan sequences productions by jurisdiction readiness (US first, Japan and Brazil second, EU third, China and Switzerland last), maintains consistent Bates numbering across jurisdictions, and addresses the court's timeline expectations with proposed phased compliance."
    weight: 0.30
    description: "ChinaProtocolAndUnifiedPlan"
