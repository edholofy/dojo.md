meta:
  id: government-investigation-discovery
  level: 3
  course: discovery-document-organization
  type: output
  description: "Manage document production in a government investigation — respond to subpoenas, grand jury requests, and regulatory demands while protecting privilege and avoiding obstruction"
  tags: [government-investigation, subpoena, grand-jury, advanced]

state: {}

trigger: |
  Your client, a multinational bank, is simultaneously
  subject to investigations by 3 government agencies.
  You must coordinate document productions while
  navigating overlapping and sometimes conflicting
  demands.

  CLIENT: Atlas National Bank (50,000 employees,
  $200B in assets)

  INVESTIGATION 1 — DOJ CRIMINAL
  Grand jury subpoena demanding all documents related
  to suspected money laundering through correspondent
  banking relationships with 5 foreign banks
  (2020-2024). Demands production within 30 days.
  Includes: transaction records, compliance files,
  suspicious activity reports (SARs), KYC documentation,
  and all communications regarding the 5 banks.

  INVESTIGATION 2 — SEC CIVIL
  SEC subpoena in a parallel civil investigation of
  potential securities fraud related to the bank's
  disclosure of AML compliance deficiencies. Demands
  all board presentations, audit committee materials,
  SEC filings and drafts, and communications about
  AML compliance disclosures (2021-2024).

  INVESTIGATION 3 — OCC REGULATORY
  Office of the Comptroller of the Currency consent
  order requiring production of all BSA/AML program
  documents, examination materials, internal audit
  reports, and remediation plans. Ongoing production
  obligation with quarterly updates.

  CROSS-CUTTING CHALLENGES:
  - Many documents are responsive to all 3 requests
  - DOJ criminal investigation means 5th Amendment
    considerations for individual employees
  - SEC wants documents the bank considers privileged
    (internal investigation reports)
  - OCC production may waive privilege for DOJ/SEC
  - Banking secrecy laws restrict production of
    foreign customer data
  - SARs are protected from disclosure under 31
    USC § 5318(g)(2) but must be produced to DOJ
  - Board-level documents implicate attorney-client
    privilege (in-house counsel attended all board
    meetings)
  - 2 senior executives have retained personal
    counsel and may invoke the 5th Amendment

  Create:
  1. Coordinated production strategy across all 3
     investigations
  2. Privilege protection framework
  3. SAR disclosure analysis
  4. Individual rights protection plan
  5. Production tracking and deconfliction system

assertions:
  - type: llm_judge
    criteria: "Coordinated production strategy addresses the interplay between criminal, civil, and regulatory investigations — proposes a unified collection and review process that tags documents by which investigation(s) they respond to; addresses the typical DOJ request for sequential production (DOJ first, SEC second) to protect the criminal investigation; negotiates with SEC for a stay or coordination agreement to avoid inconsistent productions; OCC production is ongoing and may create a floor for what must be produced to other agencies; addresses the practical challenge of producing to 3 different agencies with different format requirements, different privilege standards, and different timelines; proposes a common ESI protocol where possible; coordinates with in-house compliance team while maintaining independence of the legal defense."
    weight: 0.35
    description: "CoordinatedStrategy"
  - type: llm_judge
    criteria: "Privilege framework navigates the selective waiver challenge — analyzes whether production to one agency waives privilege for the others: OCC production may waive privilege for DOJ/SEC under most circuits (no selective waiver doctrine), unless an FRE 502(d) order or confidentiality agreement is obtained; proposes obtaining FRE 502(d)-style protections from each agency before production; addresses the specific challenge of board documents where in-house counsel was present (were counsel's communications privileged or was counsel acting in a business capacity?); analyzes the internal investigation reports (Upjohn warnings, scope of investigation, whether investigation was conducted for legal or business purposes); recommends producing privileged documents to DOJ under a cooperation agreement with explicit non-waiver terms."
    weight: 0.35
    description: "PrivilegeFramework"
  - type: llm_judge
    criteria: "SAR disclosure and individual rights analyses demonstrate specialized knowledge — SAR analysis: SARs must be produced to FinCEN and DOJ under BSA requirements but 31 USC § 5318(g)(2) prohibits disclosure to the subject of the SAR; the bank cannot disclose SARs to the SEC without FinCEN authorization; discusses the procedure for obtaining FinCEN consent for SEC production; individual rights plan: identifies executives who may invoke the 5th Amendment, proposes Garrity-type protections for employees interviewed by the bank (statements compelled by employer cannot be used in criminal prosecution), coordinates with personal counsel for affected executives, addresses Upjohn warning requirements for employee interviews (the bank is the client, not the individual), manages the practical challenge of employees who refuse to be interviewed."
    weight: 0.30
    description: "SARAndIndividualRights"
