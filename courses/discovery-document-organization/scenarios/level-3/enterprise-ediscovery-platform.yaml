meta:
  id: enterprise-ediscovery-platform
  level: 3
  course: discovery-document-organization
  type: output
  description: "Design an enterprise e-discovery platform for a large law firm — architect a firm-wide system integrating collection, processing, review, and production across all practice groups"
  tags: [enterprise-platform, system-design, firm-wide, advanced]

state: {}

trigger: |
  You are the Director of Litigation Support at a
  500-attorney law firm. The managing partner has
  asked you to design a unified e-discovery platform
  to replace the current fragmented approach where
  each practice group uses different tools.

  CURRENT STATE:
  - 5 practice groups use 4 different review
    platforms (2 groups on Relativity, 1 on Everlaw,
    1 on Logikcull, 1 using manual review)
  - 3 different e-discovery vendors for processing
  - No standardized workflows or quality metrics
  - Annual e-discovery spend: $8M (growing 15%/year)
  - 200+ active litigation matters at any time
  - Data volumes growing 30% annually
  - No centralized privilege review standards
  - Client complaints about discovery costs increasing

  REQUIREMENTS:
  - Single platform for all practice groups
  - Scalable to handle 500+ TB annually
  - Integrated TAR/CAL capabilities
  - Standardized workflows with practice-group
    customization
  - Client-facing cost dashboards
  - Privilege review automation
  - Analytics for matter budgeting and staffing
  - Integration with case management and billing
  - SOC 2 Type II compliant
  - Support for international matters (GDPR, PIPL)

  Create:
  1. Platform architecture and technology selection
  2. Migration plan from current tools
  3. Standardized workflow library
  4. Cost model and ROI analysis
  5. Implementation roadmap (18-month plan)

assertions:
  - type: llm_judge
    criteria: "Platform architecture addresses enterprise-scale requirements — evaluates leading platforms (Relativity, Everlaw, Reveal) against requirements with a justified recommendation; the architecture includes: collection layer (integrated forensic collection tools), processing layer (automated deduplication, deNIST, OCR), review layer (unified workspace with matter-level isolation), analytics layer (TAR/CAL, clustering, email threading, communication analysis), production layer (automated Bates numbering, format conversion, redaction), and reporting layer (cost tracking, quality metrics, client dashboards); addresses data sovereignty requirements (GDPR-compliant EU hosting, PIPL-compliant China hosting); SOC 2 compliance strategy; API integrations with case management (e.g., Aderant) and billing systems."
    weight: 0.35
    description: "PlatformArchitecture"
  - type: llm_judge
    criteria: "Migration plan minimizes disruption to active matters — proposes a phased migration: Phase 1 (months 1-3): pilot with one practice group on new matters only; Phase 2 (months 4-9): roll out to remaining practice groups for new matters; Phase 3 (months 10-15): migrate active matters from legacy platforms as they reach natural transition points (e.g., post-production); Phase 4 (months 16-18): decommission legacy platforms; addresses the risk of data loss during migration with validation protocols; includes training plan for each practice group (role-based training for attorneys, paralegals, and contract reviewers); handles the practical challenge of maintaining access to legacy matter data after migration."
    weight: 0.35
    description: "MigrationPlan"
  - type: llm_judge
    criteria: "Cost model demonstrates clear ROI — current $8M annual spend is benchmarked against projected costs with the unified platform; identifies savings from: vendor consolidation (eliminating 2 of 3 processing vendors), platform licensing optimization (enterprise license vs. per-matter pricing), reduced review hours through improved TAR/CAL (20-30% reduction), standardized workflows reducing rework and quality failures, in-house processing reducing vendor dependency; estimates 3-year total cost of ownership including implementation ($1.5-2M), licensing ($1.5-2M/year), staffing (2-3 additional litigation support staff), and training ($200-300K); projected ROI of 150-200% over 3 years; client-facing dashboards reduce billing disputes and improve realization rates."
    weight: 0.30
    description: "CostModelAndROI"
