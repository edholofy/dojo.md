meta:
  id: mdl-discovery-coordination
  level: 3
  course: discovery-document-organization
  type: output
  description: "Coordinate discovery in a multi-district litigation — manage the PSC's discovery plan, coordinate document depositories, and handle bellwether case selection"
  tags: [mdl, multi-district, psc-coordination, advanced]

state: {}

trigger: |
  You are discovery counsel for the Plaintiffs'
  Steering Committee (PSC) in a newly consolidated
  MDL involving a defective medical device.

  CASE: In re CardioStent 5000 Products Liability
  Litigation, MDL No. 3456
  TRANSFEREE COURT: Eastern District of Pennsylvania
  CONSOLIDATED CASES: 2,800 individual actions from
  45 federal districts
  DEFENDANT: CardioStent Medical Corp.

  CLAIMS: Defective coronary stent causing premature
  fracture, vessel perforation, and death in some
  cases
  CLASS: Patients implanted with CardioStent 5000
  between 2020-2024

  YOUR ROLE AS PSC DISCOVERY COUNSEL:
  - Design the master discovery plan
  - Coordinate common document discovery
  - Establish the document depository
  - Manage privilege issues across 2,800+ cases
  - Select bellwether cases for trial preparation
  - Coordinate fact depositions of defendant's
    witnesses
  - Manage expert discovery

  MDL DISCOVERY CHALLENGES:
  - Defendant has 5 million pages of documents to
    produce
  - 2,800 plaintiff fact sheets must be collected
    and organized
  - 45 different law firms represent plaintiffs
    (some with 1 case, some with 500+)
  - Defendant's key witnesses overlap across all
    cases (CEO, head of engineering, VP of quality)
  - FDA regulatory files add another 200,000 pages
  - Foreign manufacturing data from facilities in
    Ireland and Costa Rica
  - Medical records for 2,800 plaintiffs must be
    organized

  Create:
  1. Master discovery plan for Case Management Order
  2. Document depository design and access protocol
  3. Plaintiff fact sheet design and processing
     workflow
  4. Bellwether case selection criteria
  5. Common deposition coordination plan

assertions:
  - type: llm_judge
    criteria: "Master discovery plan follows MDL best practices — proposes a Case Management Order with phased discovery: Phase 1 (common discovery): defendant's corporate documents, FDA files, manufacturing records, regulatory correspondence; Phase 2 (bellwether discovery): case-specific medical records, treating physician depositions, plaintiff-specific fact development; Phase 3 (expert discovery): common expert reports, Daubert challenges; the plan establishes ESI protocols for defendant's production (format, Bates numbering, metadata, privilege procedures); sets a realistic timeline (12-18 months for common discovery, 6 months for bellwether, 3 months for expert); addresses the foreign manufacturing data from Ireland and Costa Rica (Hague Convention vs. direct US court authority over the US-headquartered defendant); includes proportionality protections for the defendant while ensuring plaintiffs get adequate discovery."
    weight: 0.35
    description: "MasterDiscoveryPlan"
  - type: llm_judge
    criteria: "Document depository is accessible and secure — proposes a centralized electronic depository (Relativity or similar) accessible to all 45 plaintiff firms and defendant; establishes access tiers (PSC members have full access, individual plaintiff firms have access to common documents plus their specific cases); addresses cost sharing (PSC assessment structure, defendant bears its own costs, common costs shared per capita or proportional to case count); security requirements include: role-based access, audit trails, confidentiality agreement prerequisites, protective order compliance; the depository handles 5M+ pages with proper indexing, search capability, and production tracking; plaintiff fact sheets are processed through a centralized intake system with data validation."
    weight: 0.35
    description: "DocumentDepository"
  - type: llm_judge
    criteria: "Bellwether selection and deposition coordination are strategically sound — bellwether selection criteria include: geographic diversity, injury severity spectrum (minor complications to death), implant date range, demographic diversity, case development status, and representation by different firms; proposes 20-30 candidate cases narrowed to 6-8 trial cases through a joint selection process (each side strikes cases); common depositions are coordinated to avoid duplication (defendant's CEO deposed once with all parties having notice and opportunity to examine); deposition topics are mapped to common issues (design defects, failure to warn, regulatory compliance, manufacturing defects, corporate knowledge); foreign witness depositions are addressed (Rule 28(b) procedures for Ireland and Costa Rica witnesses)."
    weight: 0.30
    description: "BellwetherAndDepositions"
