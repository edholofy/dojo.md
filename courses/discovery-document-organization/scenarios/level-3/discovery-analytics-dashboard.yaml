meta:
  id: discovery-analytics-dashboard
  level: 3
  course: discovery-document-organization
  type: output
  description: "Design a discovery analytics dashboard — create data visualization and reporting tools for managing discovery costs, quality, and progress across a litigation portfolio"
  tags: [analytics, dashboard, data-visualization, advanced]

state: {}

trigger: |
  The General Counsel of a Fortune 500 company wants
  a discovery analytics dashboard to manage the
  company's $25M annual discovery spend across 150
  active litigation matters.

  CLIENT: Meridian Technologies Inc.
  ANNUAL LITIGATION MATTERS: 150 active
  ANNUAL DISCOVERY SPEND: $25M
  OUTSIDE COUNSEL: 12 law firms handling Meridian
  matters
  IN-HOUSE LITIGATION TEAM: 8 attorneys, 4 paralegals

  DASHBOARD REQUIREMENTS:

  1. COST ANALYTICS
  - Real-time spend tracking by matter, law firm,
    and practice area
  - Cost per document reviewed (benchmark against
    industry)
  - Processing cost per GB
  - Hosting cost trends
  - Budget vs. actual variance by matter
  - Predictive cost modeling for new matters
  - Outside counsel cost comparison

  2. QUALITY METRICS
  - Review accuracy rates (QC results) by firm
    and reviewer
  - Privilege review error rates
  - Production deficiency rates (meet-and-confer
    letters received)
  - Court sanctions or adverse rulings related to
    discovery
  - Timeline compliance (percentage of deadlines met)

  3. OPERATIONAL METRICS
  - Document volume by matter and aggregate
  - Review throughput (documents/hour by firm)
  - Time from collection to production
  - Data volume growth trends
  - Custodian coverage analysis
  - Litigation hold compliance rates

  4. STRATEGIC INSIGHTS
  - Which matters are most discovery-intensive?
  - Which law firms are most cost-effective?
  - Where is the company's greatest discovery risk?
  - What are the trends in discovery costs and
    volumes?
  - Where can technology reduce costs?

  Create:
  1. Dashboard design with wireframes for each view
  2. Data model and integration architecture
  3. KPI definitions and benchmarks
  4. Alerting and exception reporting
  5. Implementation and adoption plan

assertions:
  - type: llm_judge
    criteria: "Dashboard design provides actionable insights at multiple levels — executive view shows aggregate KPIs (total spend, average cost per matter, portfolio risk score, budget variance) with drill-down capability; matter view shows individual matter status (documents collected/reviewed/produced, spend vs. budget, timeline compliance, quality scores); law firm comparison view benchmarks outside counsel on cost per document, throughput, quality, and timeline compliance; the design follows data visualization best practices (appropriate chart types, clear labeling, logical grouping, interactive filtering); wireframes show the layout and navigation flow; the dashboard balances comprehensiveness with usability (not every metric on every screen)."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Data model integrates disparate sources into a unified view — identifies data sources: e-discovery platform APIs (Relativity, Everlaw), law firm billing systems (LEDES format), matter management system, litigation hold tracking tool, and manual inputs for quality and compliance data; the data model normalizes data across different platforms and firms; addresses the challenge of firms using different review platforms with different metrics; proposes standardized reporting templates for outside counsel (quarterly discovery reports with specified metrics); ETL pipeline design handles data freshness (daily for cost and volume, weekly for quality metrics); data governance addresses confidentiality (aggregate firm comparison data should not be shared with individual firms)."
    weight: 0.35
    description: "DataModelAndIntegration"
  - type: llm_judge
    criteria: "KPIs and alerting enable proactive management — KPI definitions include specific calculation methodologies and industry benchmarks: cost per document reviewed (benchmark: $1.50-3.00 for first pass, $3.00-5.00 for privilege), review throughput (benchmark: 50-80 docs/hour for first pass), processing cost per GB (benchmark: $15-30), privilege review error rate (target: <0.5%); alerting rules flag exceptions: matters exceeding budget by >15%, review throughput below benchmark by >25%, privilege errors detected in QC, missed production deadlines, hosting costs exceeding thresholds; exception reports are routed to appropriate stakeholders (GC for strategic issues, litigation managers for operational issues); the implementation plan includes change management for outside counsel (who may resist standardized reporting)."
    weight: 0.30
    description: "KPIsAndAlerting"
