meta:
  id: complex-esi-negotiation
  level: 3
  course: discovery-document-organization
  type: output
  description: "Negotiate a complex ESI protocol in a high-stakes case — draft and negotiate production specifications for diverse data types including structured databases, ephemeral messaging, and IoT data"
  tags: [esi-protocol, negotiation, emerging-data-types, advanced]

state: {}

trigger: |
  You are negotiating the ESI protocol in a $500M
  patent infringement case involving autonomous
  vehicle technology. The data types are novel and
  the stakes are high.

  CASE: AutonomX Corp. v. DriveSafe Technologies
  CLAIM: Patent infringement — 5 patents covering
  autonomous driving algorithms, sensor fusion, and
  decision-making systems
  YOUR CLIENT: AutonomX Corp. (plaintiff patent
  holder)

  DATA TYPES REQUIRING PROTOCOL PROVISIONS:

  1. SOURCE CODE
  - Defendant's autonomous driving software
    (10M+ lines of code)
  - Version history from Git repositories
  - Code review comments and pull requests
  - Compilation and testing artifacts

  2. MACHINE LEARNING MODELS
  - Trained neural network models (weights and
    architectures)
  - Training datasets (terabytes of driving data)
  - Model evaluation metrics and test results
  - Hyperparameter tuning records

  3. SENSOR DATA
  - LIDAR point cloud data from test vehicles
  - Camera footage from autonomous driving tests
  - GPS and telemetry data
  - Data from thousands of test miles

  4. EPHEMERAL MESSAGING
  - Slack messages (90-day retention policy)
  - Signal messages used by engineering team
  - WhatsApp group chats
  - Disappearing message threads

  5. CLOUD INFRASTRUCTURE
  - AWS/GCP deployment configurations
  - CI/CD pipeline logs
  - Cloud storage (S3 buckets with version history)
  - Containerized application logs

  6. COLLABORATIVE TOOLS
  - Jira tickets and sprint records
  - Confluence wiki pages with edit history
  - Google Docs with revision history
  - Figma design files

  OPPOSING COUNSEL'S POSITION:
  - Wants all source code in native format with
    full Git history
  - Demands access to trained ML models in
    executable format
  - Requests all sensor data in native format
  - Claims ephemeral messaging must be preserved
    and produced
  - Wants cloud infrastructure logs going back 5 years

  Create:
  1. Proposed ESI protocol addressing all data types
  2. Source code inspection protocol
  3. ML model production framework
  4. Ephemeral messaging preservation and production
     plan
  5. Negotiation strategy with fallback positions

assertions:
  - type: llm_judge
    criteria: "ESI protocol addresses novel data types with appropriate provisions — source code: proposes secure review facility (not full native production to opposing counsel's systems) with logging and access controls, review by outside counsel and designated experts only, no copying except limited excerpts for briefing; ML models: proposes producing model architecture descriptions and evaluation metrics rather than executable models (trade secret protection), with expert-supervised testing of specific patent-related functionality in a controlled environment; sensor data: proposes sampling approach (representative test drives rather than all data) with ability to request additional data upon showing of relevance; ephemeral messaging: requires immediate preservation of existing messages and prospective preservation, with production of messages relevant to patent development timelines; cloud data: limits to configuration and deployment records relevant to the accused products, not all infrastructure logs."
    weight: 0.35
    description: "ESIProtocol"
  - type: llm_judge
    criteria: "Source code inspection protocol protects trade secrets while enabling patent analysis — proposes a secure review facility (on defendant's premises or neutral location) with specific controls: no internet-connected devices, no photography, limited note-taking (notes subject to review for trade secret content), access restricted to outside counsel and 2-3 designated independent experts, time limitations (reasonable but sufficient for analysis), defendant's counsel may be present, inspection logs maintained, specific code modules relevant to patent claims identified in advance to focus the review; addresses the practical challenge of reviewing 10M+ lines of code (keyword searches, file path navigation, specific function identification rather than line-by-line review); includes provisions for disputes about what constitutes 'relevant' source code."
    weight: 0.35
    description: "SourceCodeProtocol"
  - type: llm_judge
    criteria: "Negotiation strategy includes realistic fallback positions — identifies priority items (source code access and ML model analysis are essential for patent claims, ephemeral messaging is important for willfulness/copying evidence) vs. lower priority items (full sensor data and 5-year cloud logs are disproportionate); proposes concessions on lower-priority items in exchange for adequate access to high-priority items; fallback positions for source code: if secure facility is rejected, proposes producing to an independent expert under strict confidentiality; for ML models: if architectural descriptions are rejected, proposes expert testing of specific functionality with defendant's cooperation; for ephemeral messaging: if retroactive preservation is impossible, proposes forensic analysis of devices and declarations under oath about deleted messages; addresses the cost allocation for specialized data production (forensic collection of ephemeral messages, ML model testing infrastructure)."
    weight: 0.30
    description: "NegotiationStrategy"
