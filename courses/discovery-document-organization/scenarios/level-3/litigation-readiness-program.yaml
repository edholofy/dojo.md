meta:
  id: litigation-readiness-program
  level: 3
  course: discovery-document-organization
  type: output
  description: "Design a corporate litigation readiness program — create proactive policies and procedures that reduce discovery costs and risk before litigation begins"
  tags: [litigation-readiness, proactive-management, information-governance, advanced]

state: {}

trigger: |
  A Fortune 500 company's board of directors has
  mandated a litigation readiness program after a
  $15M discovery cost overrun in a single antitrust
  case. Design the program.

  CLIENT: Vertex Manufacturing Corporation
  SIZE: 35,000 employees, 40 locations, $12B revenue
  LITIGATION PROFILE: 200+ active matters, $40M
  annual legal spend, $15M annual discovery costs
  CURRENT STATE: Reactive — discovery begins from
  scratch each time a new lawsuit is filed

  RECENT FAILURES:
  - Antitrust case: $15M discovery cost (3x original
    estimate) due to unstructured data collection
    and no pre-existing information map
  - Product liability MDL: 6-month delay in
    production because legacy systems had no export
    capability
  - Employment class action: spoliation sanctions
    ($500K) because the litigation hold was issued
    to only 10 of 50 relevant custodians
  - Trade secret case: opposing counsel found
    relevant documents on a decommissioned server
    that the company didn't know existed

  PROGRAM REQUIREMENTS:
  - Information governance framework
  - Data mapping and inventory
  - Automated litigation hold system
  - Records retention policy alignment
  - Employee training program
  - Vendor management standards
  - Metrics and continuous improvement
  - Budget: $5M over 3 years

  Create:
  1. Litigation readiness assessment
  2. Information governance framework
  3. Data map and custodian inventory
  4. Automated litigation hold implementation plan
  5. Three-year implementation roadmap with ROI

assertions:
  - type: llm_judge
    criteria: "Litigation readiness assessment identifies systemic weaknesses — analyzes each recent failure to identify root causes: antitrust cost overrun resulted from no data map (didn't know where data was or how much existed), product liability delay resulted from legacy system incompatibility (no export capability planning), employment spoliation resulted from incomplete custodian identification (no pre-built custodian universe), trade secret failure resulted from incomplete asset inventory (decommissioned server); the assessment scores the company across key dimensions (information governance maturity, litigation hold effectiveness, data accessibility, records retention compliance, employee awareness) with specific recommendations for each dimension; benchmarks against industry peers and best practices (Sedona Conference guidelines, EDRM readiness framework)."
    weight: 0.35
    description: "ReadinessAssessment"
  - type: llm_judge
    criteria: "Information governance framework addresses the full data lifecycle — establishes policies for: data creation (classification at creation, metadata standards), data retention (retention schedules aligned with legal obligations and business needs, defensible deletion of expired records), data storage (approved repositories, prohibitions on shadow IT, cloud governance), data access (role-based access controls, audit trails), and data disposal (certificate of destruction, defensible deletion); the data map inventories all systems containing potentially relevant data across all 40 locations (email, file shares, databases, cloud applications, legacy systems, backup tapes, mobile devices, IoT/manufacturing systems); addresses the specific challenge of manufacturing data (PLM systems, quality management systems, ERP data) that is often overlooked in information governance."
    weight: 0.35
    description: "InformationGovernance"
  - type: llm_judge
    criteria: "Implementation roadmap demonstrates realistic phasing and ROI — Year 1 ($2M): information governance assessment, data mapping, automated litigation hold implementation, records retention policy update, initial employee training; Year 2 ($1.5M): legacy system remediation, vendor standardization, advanced analytics implementation, expanded training; Year 3 ($1.5M): continuous improvement, metric optimization, proactive data culling, advanced automation; ROI calculation shows: reduced discovery costs (20-30% reduction from $15M baseline = $3-4.5M annual savings), avoided spoliation sanctions ($500K+ per incident), reduced outside counsel costs (standardized data reduces collection and processing time), improved litigation outcomes (faster access to relevant documents); payback period of 18-24 months; the roadmap addresses change management (executive sponsorship, departmental champions, incentive alignment)."
    weight: 0.30
    description: "ImplementationAndROI"
