meta:
  id: dashboard-audience
  level: 1
  course: dashboard-kpi-design
  type: output
  description: "Design dashboards for different audiences — understand what executives, managers, and analysts need and how to tailor dashboards for each audience"
  tags: [audience, executive, operational, analyst, dashboard-types, beginner]

state: {}

trigger: |
  A data analyst builds one dashboard and shares it with everyone:
  the CEO, the VP of Sales, sales managers, and individual sales
  reps. The CEO says it's "too detailed," the sales reps say it
  "doesn't show my pipeline," and the sales managers say they
  "can't find team performance."

  Task: Explain how to design dashboards for different audiences.

assertions:
  - type: llm_judge
    criteria: "Response defines the three audience types and their needs — audiences: 'Three dashboard audience types: Executive (CEO, CFO, VP): What they need: high-level health check in 30 seconds. 3-5 KPIs with trends and comparisons (vs target, vs last period). They ask: are we on track? What needs attention? Dashboard characteristics: KPI summary cards at the top, trend lines, red/green status indicators. Minimal detail — no individual transactions. Refresh: daily or weekly is sufficient. Example: Revenue $1.2M (↑12% MoM), pipeline $3.5M, churn 3.2% (↓0.5pp). One page, no scrolling required. Manager (Sales Manager, Marketing Lead): What they need: team performance and operational levers. They ask: which team members are performing? Which campaigns are working? Where should I focus? Dashboard characteristics: team rankings, campaign comparisons, drill-down from summary to team member. More detail than executive but not individual transactions. Refresh: daily. Example: team quota attainment by rep, campaign ROI by channel, top deals in pipeline. Analyst (Sales Rep, Data Analyst): What they need: individual records and full detail. They ask: what are my specific numbers? Where is each deal? Which customer needs follow-up? Dashboard characteristics: tables with sortable rows, filters for individual rep or customer, time-granular data (daily or hourly). Self-service capability to explore data. Refresh: real-time or hourly. Example: my pipeline by deal stage, my accounts by last contact date, individual order history'"
    weight: 0.35
    description: "Audiences"
  - type: llm_judge
    criteria: "Response shows how to restructure the single dashboard into three — restructure: 'Restructuring the single dashboard into three: Original problem: one dashboard serving all audiences. Solution: create a three-level dashboard hierarchy. Dashboard 1 — Executive Sales Dashboard (for the CEO): Row 1: three KPI cards — total revenue (vs target), total pipeline value, win rate. Row 2: revenue trend (line chart, 12 months), pipeline by stage (funnel chart). Row 3: top 5 deals closing this month (table, sorted by value). Total: 5 visualizations. Fits one screen. Takes 30 seconds to review. Dashboard 2 — Sales Manager Dashboard: Row 1: team quota attainment (progress bars for each rep). Row 2: pipeline by rep (stacked bar chart), win rate by rep (bar chart). Row 3: deals at risk (table — deals past expected close date or with no activity in 14 days). Includes a filter to select team. The manager can compare reps and identify who needs coaching. Dashboard 3 — Sales Rep Dashboard: Row 1: my quota attainment (progress bar), my pipeline value, my win rate. Row 2: my deals by stage (Kanban-style or table), my activities this week. Row 3: my accounts with next action due (table, sortable by date). Includes drill-down to individual deal details. Each dashboard links to the one below it. The CEO can click on a revenue number to see the manager view. The manager can click on a rep to see the rep view. This is the drill-down pattern'"
    weight: 0.35
    description: "Restructure"
  - type: llm_judge
    criteria: "Explanation includes a decision framework for audience-based design — framework: 'Audience-based dashboard design framework: Before building a dashboard, answer four questions: 1. Who is the primary viewer? (Title and role). 2. What decision will they make after viewing? (Take action, report up, investigate). 3. How much time do they have? (CEO: 30 seconds. Manager: 5 minutes. Analyst: 30 minutes). 4. How often will they view it? (Daily, weekly, ad-hoc). The answers determine: level of detail (more time = more detail). Number of charts (less time = fewer charts). Interactivity (analysts need filters, executives need simplicity). Refresh frequency (operational dashboards need real-time, strategic need daily). Common mistake: building for the analyst because they are the ones requesting it, but the actual viewer is the executive. Always design for the end consumer, not the requester. Rule of thumb: executive dashboards have 5-7 elements. Manager dashboards have 7-12 elements. Analyst dashboards have 12-20 elements with extensive filtering. If your executive dashboard has 20 charts, it is actually an analyst dashboard and will not be used by the executive'"
    weight: 0.30
    description: "Framework"
