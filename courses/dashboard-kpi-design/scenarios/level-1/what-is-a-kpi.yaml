meta:
  id: what-is-a-kpi
  level: 1
  course: dashboard-kpi-design
  type: output
  description: "Understand what a KPI is — distinguish between metrics, KPIs, and vanity metrics, and identify the characteristics of an effective KPI"
  tags: [KPI, metrics, fundamentals, SMART, vanity-metrics, beginner]

state: {}

trigger: |
  A startup founder says: "We track 50 metrics but I have no idea
  which ones actually matter. What's the difference between a metric
  and a KPI? How do I know which metrics to focus on?"

  The company has: total page views, signups, revenue, social media
  followers, app downloads, daily active users, customer support
  tickets, email open rates, NPS score, and server uptime.

  Task: Explain what a KPI is and help select the right ones.

assertions:
  - type: llm_judge
    criteria: "Response clearly defines KPIs versus metrics and vanity metrics — definition: 'What is a KPI: A metric is any number you can measure — page views, downloads, email opens. A KPI (Key Performance Indicator) is a metric that directly measures progress toward a specific business goal. The difference: all KPIs are metrics, but not all metrics are KPIs. A vanity metric looks impressive but does not drive decisions. Page views: vanity metric — 1 million page views sounds great, but if none convert to customers, the number is meaningless. Revenue: KPI — directly measures the business goal of generating income. Decisions flow from it (if revenue drops, investigate and fix). Characteristics of a good KPI: Specific — measures one clear thing (monthly recurring revenue, not vague growth). Measurable — has a number attached (not a subjective rating). Actionable — when it changes, you know what action to take (if churn rises, improve onboarding). Relevant — connected to the business goal (an e-commerce company cares about conversion rate, not blog comments). Time-bound — measured over a defined period (weekly active users, not just active users). This is the SMART framework applied to KPIs'"
    weight: 0.35
    description: "Definition"
  - type: llm_judge
    criteria: "Response selects appropriate KPIs from the given list — selection: 'KPI selection for the startup: From the 50 metrics, select 5-7 KPIs organized by business goal: Goal 1 — Growth: Daily Active Users (DAU) — measures product engagement, more meaningful than total signups because it shows retention. Signups is a supporting metric (leading indicator) but DAU is the KPI (lagging indicator of real engagement). Goal 2 — Revenue: Monthly Recurring Revenue (MRR) or total revenue — directly measures financial health. This is the primary KPI for most startups. Goal 3 — Customer Satisfaction: NPS Score — measures whether customers would recommend you. Predicts long-term retention and word-of-mouth growth. Goal 4 — Product Health: Server uptime — if the product is down, nothing else matters. Set a target (99.9%) and monitor. Metrics to deprioritize: page views (vanity — high views with low conversion means the wrong audience), social media followers (vanity — followers do not equal customers), app downloads (vanity — downloads without activation are meaningless), email open rates (supporting metric — useful for marketing team but not a company KPI). The rule of thumb: if the CEO would not change a business decision based on the number, it is not a KPI'"
    weight: 0.35
    description: "Selection"
  - type: llm_judge
    criteria: "Explanation covers KPI hierarchy and target setting — hierarchy: 'KPI hierarchy and targets: Company-level KPIs (3-5 max): MRR, DAU, NPS. These appear on the executive dashboard. Everyone in the company should know these numbers. Department-level KPIs: Marketing — Customer Acquisition Cost (CAC), conversion rate from page view to signup. Product — feature adoption rate, session duration. Engineering — deploy frequency, incident count. Support — first response time, resolution rate. Each department KPI supports a company KPI. If marketing reduces CAC, MRR grows faster. If product improves adoption, DAU increases. Target setting: every KPI needs a target. Revenue: $100K MRR by end of quarter. DAU: 5,000 daily active users by month 3. NPS: 50 or higher. Without targets, KPIs are just numbers. With targets, they become actionable — if MRR is at $80K with 2 weeks left in the quarter, the team knows they need to close more deals or reduce churn. Review cadence: check company KPIs weekly. Check department KPIs daily. React when a KPI deviates more than 10% from trend'"
    weight: 0.30
    description: "Hierarchy"
