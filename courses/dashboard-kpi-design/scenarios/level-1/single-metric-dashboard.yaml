meta:
  id: single-metric-dashboard
  level: 1
  course: dashboard-kpi-design
  type: output
  description: "Build a single-metric dashboard — focus on one KPI with full context including trends, breakdowns, and alerts to demonstrate dashboard thinking at its simplest"
  tags: [single-metric, focused-dashboard, depth, drill-down, beginner]

state: {}

trigger: |
  The head of customer success says: "I just need one dashboard that
  answers one question: is our churn getting better or worse? I don't
  want 20 charts. I want to understand churn deeply."

  Current churn rate: 3.2% monthly. Target: below 2.5%.

  Available data: churn by month (12 months), churn by customer
  segment (Enterprise, SMB, Startup, Free), churn by reason
  (pricing, competitor, product issues, no longer needed), and
  individual churned customers.

  Task: Design a single-metric dashboard focused entirely on churn.

assertions:
  - type: llm_judge
    criteria: "Response designs a focused churn dashboard with full context — dashboard: 'Single-metric churn dashboard: Section 1 — The headline (top): Large KPI card: Monthly Churn Rate: 3.2%. Target: 2.5%. Status: Above Target (red). ↑0.5pp from last month. Sparkline showing 12-month trend. This immediately answers the question: churn is getting worse (3.2% is above the 2.5% target and increased from last month). Section 2 — The trend (middle-left): Line chart: monthly churn rate over 12 months. Include the target line (2.5%) as a dashed horizontal reference. Color the area above the target red and below green. The viewer can see: churn was below target (green) from January to August, then crossed above (red) in September and has stayed above since. Section 3 — The breakdown (middle-right): Horizontal bar chart: churn rate by segment. Enterprise: 1.1% (green — below target). SMB: 3.8% (red — above target). Startup: 5.2% (red — significantly above target). Free: 8.0% (red — expected for free tier). Immediately reveals: the overall 3.2% is being dragged up by Startup and Free segments. Enterprise retention is strong. Section 4 — The reasons (bottom-left): Horizontal bar chart: churned customers by reason. Pricing: 45%. Product issues: 25%. Competitor: 20%. No longer needed: 10%. This tells the customer success team where to focus: pricing is the top churn reason. Section 5 — The action list (bottom-right): Table: top 10 customers at risk of churning (based on declining usage or support escalations). Customer name, segment, monthly spend, risk score, last activity date. This gives the team specific accounts to save'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response explains the power of single-metric depth over multi-metric breadth — depth: 'Why single-metric dashboards work: A dashboard with 20 different metrics gives the viewer breadth but no depth. They know the surface-level state of everything but cannot act on anything. A single-metric dashboard gives depth: not just what churn is, but why it is changing, where it is worst, and what to do about it. The churn dashboard answers: What is churn right now? → 3.2% (Section 1). Is it getting better or worse? → Worse — up 0.5pp and above target (Section 1 and 2). Where is churn worst? → Startup segment at 5.2% (Section 3). Why are customers churning? → 45% cite pricing (Section 4). Who specifically can we save? → Top 10 at-risk customers (Section 5). This is a complete narrative about one metric. The viewer goes from awareness to understanding to action in a single page. When to use single-metric dashboards: when a specific metric is critical and needs focused attention (churn, revenue, NPS). When the viewer is a functional leader (Head of CS owns churn). When the organization needs to rally around improving one number. When multiple stakeholders need to understand the same metric deeply'"
    weight: 0.35
    description: "Depth"
  - type: llm_judge
    criteria: "Explanation covers alerting and thresholds for the focused metric — alerting: 'Alerting and thresholds: A single-metric dashboard benefits from automated alerts: Alert 1 — Threshold breach: if churn exceeds 3.5% (critical threshold), send a Slack notification to the CS team. Action: immediate review meeting to identify the spike cause. Alert 2 — Trend alert: if churn has increased for 3 consecutive months, send an email to the VP of Customer Success. Action: escalate to leadership — the trend indicates a systemic issue, not a one-month blip. Alert 3 — Segment alert: if any segment's churn exceeds 2x its historical average, flag it on the dashboard with a warning badge. Action: deep-dive into that segment's recent experience. Alert 4 — Individual alert: if a customer with more than $10K annual revenue shows risk signals (no login for 30 days, support ticket opened), add them to the at-risk table. Action: assign a CS manager to proactively reach out. Threshold setting: green (on track): churn below 2.5%. Yellow (caution): churn between 2.5% and 3.5%. Red (critical): churn above 3.5%. These thresholds should be agreed upon with leadership and reviewed quarterly. If the team consistently achieves below 2.0%, tighten the target to 1.5%'"
    weight: 0.30
    description: "Alerting"
