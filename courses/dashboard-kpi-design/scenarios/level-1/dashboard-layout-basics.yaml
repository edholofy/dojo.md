meta:
  id: dashboard-layout-basics
  level: 1
  course: dashboard-kpi-design
  type: output
  description: "Learn dashboard layout basics — arrange KPIs, charts, and filters in a logical hierarchy that guides the viewer from summary to detail"
  tags: [dashboard, layout, hierarchy, visual-design, UX, beginner]

state: {}

trigger: |
  A product manager designs their first dashboard. It has 15 charts
  crammed into one screen with no logical order. Revenue is in the
  bottom-right corner. A pie chart with 20 slices takes up half the
  screen. There's no title, no date range indicator, and no way to
  tell when the data was last updated.

  Their manager says: "I can't find anything on this dashboard. I
  don't know what I'm supposed to look at first."

  Task: Teach the principles of effective dashboard layout.

assertions:
  - type: llm_judge
    criteria: "Response covers the inverted pyramid layout and visual hierarchy — layout: 'Dashboard layout principles: The inverted pyramid: most important information at the top, details below. Row 1 (top) — KPI summary cards: 3-5 large number cards showing the most critical metrics. Revenue: $1.2M (up 12% MoM). Active Users: 15,200 (up 5%). Churn: 3.2% (down 0.5 points). These numbers are visible the moment the dashboard loads. The viewer gets the health check in 3 seconds. Row 2 (middle) — Trend charts: line charts showing how the KPIs from Row 1 are trending over time. Revenue by month (12 months). Active users by week (8 weeks). These let the viewer understand the direction — is the KPI improving or declining? Row 3 (bottom) — Breakdown and detail: bar charts, tables, or heatmaps that break down the KPIs by dimension. Revenue by region. Active users by segment. Churn by cohort. The viewer drills into these only when they see something unexpected in Rows 1 or 2. Visual hierarchy: the eye reads left to right, top to bottom (in Western cultures). Place the most important element in the top-left corner. Use size to signal importance — the revenue number should be the largest text on the dashboard. Use whitespace to separate sections — crowded dashboards are harder to read than ones with breathing room'"
    weight: 0.35
    description: "Layout"
  - type: llm_judge
    criteria: "Response addresses the specific problems in the trigger dashboard — fixes: 'Fixing the problem dashboard: Problem 1 — 15 charts on one screen: reduce to 7-9 maximum. Remove or consolidate charts that show the same data in different ways. If 3 charts all show revenue from different angles, keep one overview and move the others to a drill-down page. Problem 2 — Revenue in the bottom-right: move it to the top-left. Revenue is the most important metric — it should be the first thing the viewer sees. Problem 3 — Pie chart with 20 slices: replace with a horizontal bar chart showing the top 10 categories. Group the remaining 10 into an Other category. Or use a treemap if the part-of-whole relationship is important. Problem 4 — No title: add a clear dashboard title at the top. Example: Product Performance Dashboard — February 2026. The title tells the viewer exactly what they are looking at. Problem 5 — No date range: add a date range selector or indicator. Example: Showing data from Jan 1 to Feb 27, 2026. The viewer needs to know the time window to interpret the numbers correctly. Problem 6 — No last updated indicator: add a timestamp in the header. Example: Last updated: Feb 27, 2026 6:05 AM. This tells the viewer how fresh the data is. If the dashboard shows yesterday's data, the viewer knows not to look for today's numbers'"
    weight: 0.35
    description: "Fixes"
  - type: llm_judge
    criteria: "Explanation provides a dashboard layout checklist — checklist: 'Dashboard layout checklist: Before publishing a dashboard, verify: 1. Title and date range are visible at the top. 2. Last updated timestamp is shown. 3. KPI summary cards are in the top row (3-5 max). 4. Each KPI card shows the current value, trend direction (up/down arrow), and comparison (vs last period or vs target). 5. Charts are arranged from summary (top) to detail (bottom). 6. No more than 9 visualizations on one page. If more are needed, create a second page or drill-down. 7. Consistent color scheme — green for positive, red for negative. Same color always means the same thing. 8. Whitespace between sections — charts are not touching each other. 9. Axis labels and chart titles are present on every chart. 10. Filters are at the top or left side and clearly labeled. 11. Mobile responsiveness — if executives view on phones, test the layout on a small screen. The 5-second test: show the dashboard to someone for 5 seconds, then hide it. Ask what they remember. If they cannot recall the top KPI, the layout needs work'"
    weight: 0.30
    description: "Checklist"
