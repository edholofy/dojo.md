meta:
  id: kpi-cards-and-sparklines
  level: 1
  course: dashboard-kpi-design
  type: output
  description: "Design effective KPI cards — create summary cards with current value, trend direction, comparison context, and sparklines that communicate status at a glance"
  tags: [KPI-cards, sparklines, summary, comparison, status, beginner]

state: {}

trigger: |
  The executive dashboard shows KPI cards that display only the
  current value:
  - Revenue: $1,200,000
  - Users: 15,200
  - Churn: 3.2%

  The CEO asks: "Is $1.2M good or bad? Is it up or down? Are we
  hitting our target? I need context, not just numbers."

  Task: Redesign the KPI cards to provide context and enable instant
  understanding.

assertions:
  - type: llm_judge
    criteria: "Response designs complete KPI cards with all contextual elements — cards: 'Effective KPI card anatomy: Each KPI card should include 5 elements: 1. Current value (large, prominent): $1.2M. The most important number, displayed in the largest font. 2. Comparison to previous period: ↑12% vs last month (or ↑$130K). Shows direction and magnitude of change. Color coded: green for positive change in a positive metric, red for negative. 3. Target or benchmark: Target: $1.1M — 109% of target. Shows whether the metric is on track. If above target, green. Below target, red. 4. Sparkline: a tiny line chart (no axes, no labels) showing the trend over the last 8-12 periods. The sparkline gives context without taking up space — the viewer can see if the number is trending up, trending down, or volatile. 5. Status indicator: a small colored dot or badge. Green = on track. Yellow = within 10% of target. Red = more than 10% below target. Redesigned cards: Revenue: $1.2M | ↑12% MoM | Target: $1.1M (109%) | [sparkline trending up] | Green dot. Users: 15,200 | ↑5% MoM | Target: 16,000 (95%) | [sparkline flat] | Yellow dot. Churn: 3.2% | ↑0.5pp MoM | Target: below 3% | [sparkline trending up] | Red dot. The CEO can now see in 5 seconds: revenue is great (green), users are slightly below target (yellow), and churn is worsening and needs attention (red)'"
    weight: 0.35
    description: "Cards"
  - type: llm_judge
    criteria: "Response covers comparison types and when to use each — comparisons: 'Types of KPI comparisons: Month-over-month (MoM): Revenue ↑12% vs last month. Best for: metrics that change frequently. Shows short-term momentum. Risk: seasonal businesses look bad in off-months even if overall trend is positive. Year-over-year (YoY): Revenue ↑45% vs same month last year. Best for: seasonal businesses. Compares February 2026 to February 2025, eliminating seasonal effects. Risk: hides recent short-term changes. Versus target: Revenue 109% of target. Best for: showing whether the team is meeting goals. Targets should be set in advance and not changed mid-period. Risk: if targets are too easy, 120% of target is not impressive. Versus plan/budget: Revenue $100K above budget. Best for: financial reports. The CFO wants to see actual versus planned. Rolling average: revenue 12-month rolling average is $1.05M. Best for: smoothing out volatility. Shows the underlying trend without month-to-month noise. Choosing the right comparison: operational dashboards (daily/weekly) → use MoM or week-over-week. Executive dashboards (monthly) → use YoY and vs target side by side. Financial dashboards → use vs budget/plan. Board presentations → use YoY (investors think in annual terms). Always show at least two comparisons: direction (up/down vs previous period) and status (above/below target). One comparison alone is insufficient'"
    weight: 0.35
    description: "Comparisons"
  - type: llm_judge
    criteria: "Explanation covers sparkline design and common KPI card mistakes — sparklines: 'Sparkline best practices: Sparklines are miniature charts embedded in the KPI card. They show the shape of the trend without cluttering the card with axes and labels. Design rules: no axes, no labels, no gridlines — sparklines are purely about the shape. Consistent time window: always show the same period (last 12 months, last 8 weeks). Include a reference line for the target or average if helpful. Color the area under the line or make the final data point a larger dot to emphasize the current value. Common KPI card mistakes: 1. No comparison context: just showing $1.2M tells the viewer nothing. Always include vs previous period and vs target. 2. Wrong direction color: churn going up should be red (bad), not green. Revenue going up should be green (good). The color maps to business impact, not to the direction of the number. 3. Too many decimal places: $1,234,567.89 on a KPI card is unreadable. Use $1.2M. Analysts can click for the precise number. 4. Stale data without indicator: if the KPI shows yesterday's data, label it: as of Feb 26, 2026. If it shows real-time data, show a live indicator. 5. Too many KPI cards: more than 7 KPI cards on one dashboard creates information overload. If everything is a KPI, nothing is. Select 3-5 that the viewer must see at a glance'"
    weight: 0.30
    description: "Sparklines"
