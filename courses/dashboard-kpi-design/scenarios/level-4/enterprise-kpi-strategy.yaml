meta:
  id: enterprise-kpi-strategy
  level: 4
  course: dashboard-kpi-design
  type: output
  description: "Design an enterprise KPI strategy — build a company-wide KPI framework that cascades from corporate objectives to team-level metrics with clear ownership and accountability"
  tags: [enterprise, strategy, cascading, OKR, accountability, expert]

state: {}

trigger: |
  The new CEO of a 2,000-person company says: "Every department has
  their own metrics but they don't connect to our corporate strategy.
  Engineering measures velocity. Sales measures pipeline. Marketing
  measures leads. But nobody can tell me if we're winning as a company.

  I want a KPI framework where every team's metrics connect back to
  3-5 company-level objectives. When I look at the company dashboard,
  I should see the health of every strategic objective. When a VP looks
  at their dashboard, they should see how their team contributes to
  those objectives."

  Task: Design a cascading KPI framework from corporate strategy to
  team-level metrics.

assertions:
  - type: llm_judge
    criteria: "Response designs a cascading KPI hierarchy from corporate to team level — cascade: 'Enterprise KPI cascade: Level 0 — Corporate objectives (CEO dashboard, 3-5 metrics): Objective 1: Grow revenue to $50M ARR (currently $35M). KPI: ARR. Target: $50M by EOY. Current: $35M. Status: on track. Objective 2: Achieve profitability. KPI: Operating margin. Target: 5%. Current: -8%. Status: behind. Objective 3: Build a market-leading product. KPI: NPS. Target: 60. Current: 48. Status: behind. Objective 4: Scale the team effectively. KPI: Revenue per employee. Target: $250K. Current: $175K. Status: behind. Level 1 — Department objectives (VP dashboards, 3-5 metrics each, linked to corporate): VP Sales dashboard (supports Objective 1 — Revenue): New ARR target: $15M. Current: $8M. Pipeline coverage: 3.2x (target: 3x). Win rate: 32%. Average deal size: $45K. Enterprise mix: 40% (target: 50%). VP Product dashboard (supports Objective 3 — Product): Feature adoption rate: 28% (target: 40%). Time to value for new users: 14 days (target: 7 days). Core workflow completion: 78% (target: 90%). Bug escape rate: 2.1% (target: <1%). VP Finance dashboard (supports Objective 2 — Profitability): Gross margin: 72% (target: 78%). CAC payback period: 18 months (target: 12 months). Burn rate: $2.8M/month (target: $2.2M). Operating expenses as % of revenue: 108% (target: 95%). Level 2 — Team objectives (Manager dashboards, 3-5 metrics each, linked to department): Sales team East (supports VP Sales — New ARR): Team ARR target: $4M. Current: $2.2M. Rep quota attainment average: 68%. Pipeline per rep: $450K. Activity metrics: 180 calls/week (target: 200). Each level links upward: if Sales East misses their $4M target, it directly impacts the VP's $15M target, which impacts the CEO's $50M objective. The cascade is visible on every dashboard'"
    weight: 0.35
    description: "Cascade"
  - type: llm_judge
    criteria: "Response covers metric ownership, accountability, and review cadence — accountability: 'Metric ownership and accountability: Every KPI has exactly one owner — the person accountable for moving it. Ownership matrix: ARR ($50M) → CEO (accountable), VP Sales (responsible for new business), VP CS (responsible for retention and expansion). Operating margin (5%) → CFO (accountable), all VPs (responsible for their department's cost efficiency). NPS (60) → CPO (accountable), VP Product (responsible for product experience), VP Support (responsible for service experience). Revenue per employee ($250K) → COO (accountable), VP People (responsible for hiring efficiency). The RACI model applies: one Accountable person per metric, multiple Responsible contributors. Review cadence by level: Daily: operational teams review their Level 2 metrics in standups. The sales manager checks pipeline and activity metrics. The support manager checks queue and response times. Weekly: VPs review their Level 1 dashboards in leadership meetings. Focus on: what changed this week? What is off track? What action are we taking? Monthly: CEO reviews Level 0 corporate dashboard with the executive team. Focus on: are we on track for quarterly and annual targets? What strategic adjustments are needed? Quarterly: board reviews the same Level 0 metrics plus a narrative. Focus on: are we executing the strategy? Do we need to change direction? Escalation protocol: if a Level 2 metric is off track for 2+ weeks, it escalates to the VP (Level 1 review). If a Level 1 metric is off track for a full month, it escalates to the CEO (Level 0 review). If a Level 0 metric is off track for a full quarter, it triggers a strategy review. The escalation ensures problems are caught early and addressed at the right level'"
    weight: 0.35
    description: "Accountability"
  - type: llm_judge
    criteria: "Explanation covers challenges of enterprise KPI implementation — challenges: 'Enterprise KPI implementation challenges: Challenge 1 — Too many metrics: a 2,000-person company has hundreds of potential metrics. If every team tracks 10 metrics and there are 50 teams, that is 500 metrics. Solution: enforce the rule of 3-5 KPIs per level. The CEO sees 4 KPIs. Each VP sees 4-5. Each manager sees 3-5. Total actively tracked: approximately 50-80 KPIs across the company. Every other metric is a supporting metric — tracked but not on the primary dashboard. Challenge 2 — Conflicting incentives: Sales optimizes for revenue (discounting to close deals). Finance optimizes for margin (wants higher prices). Product optimizes for adoption (wants a free tier). Solution: include counterbalancing metrics. Sales has a revenue target AND a margin floor. Discounting below 15% margin requires VP approval. Product has an adoption target AND a conversion target. Free tier success is measured by conversion to paid, not just signups. Challenge 3 — Gaming metrics: if a team is measured on call volume, they will make short, unhelpful calls. If measured on deal count, they will close small deals. Solution: pair quantity metrics with quality metrics. Support: tickets resolved (quantity) paired with CSAT (quality). Sales: deals closed (quantity) paired with average deal size and retention rate (quality). Inspect the pair together — improving one at the expense of the other is not acceptable. Challenge 4 — Stale KPIs: KPIs set in January may not reflect the company's priorities by July. Solution: quarterly KPI review as part of the OKR cycle. Each quarter, confirm that every KPI is still aligned with the current strategy. Retire KPIs that no longer matter. Add new KPIs if priorities have shifted. The framework is a living system, not a one-time exercise'"
    weight: 0.30
    description: "Challenges"
