meta:
  id: executive-scorecard-design
  level: 4
  course: dashboard-kpi-design
  type: output
  description: "Design executive scorecards — build balanced scorecards for the C-suite that connect financial, customer, process, and learning perspectives into a unified strategic view"
  tags: [scorecard, balanced-scorecard, executive, strategic, C-suite, expert]

state: {}

trigger: |
  The board chair says to the CEO: "Your board deck has 40 slides of
  charts but I still can't answer three simple questions: Are we
  executing on strategy? Where are we falling short? What's being done
  about it? I want a single scorecard — one page — that answers these
  questions. If it takes more than 5 minutes to present, it's too long."

  Task: Design a one-page executive scorecard that the CEO can present
  to the board in under 5 minutes.

assertions:
  - type: llm_judge
    criteria: "Response designs a balanced scorecard layout — scorecard: 'Executive scorecard — one-page layout: The scorecard uses the Balanced Scorecard framework with four perspectives, each answering a strategic question. Perspective 1 — Financial (Are we creating shareholder value?): Top-left quadrant (25% of page). Three metrics: Revenue: $35M ARR. Target: $38M. Status: yellow (92% of target). Operating margin: -8%. Target: 0% (breakeven). Status: red (still unprofitable). Cash runway: 24 months. Target: >18 months. Status: green (safe). Perspective 2 — Customer (Are our customers successful?): Top-right quadrant (25% of page). Three metrics: NPS: 48. Target: 55. Status: yellow (improving but below target). Net revenue retention: 112%. Target: 120%. Status: yellow. Logo churn: 2.8% monthly. Target: <2%. Status: red (too high). Perspective 3 — Internal Process (Are we executing efficiently?): Bottom-left quadrant (25% of page). Three metrics: Sales cycle: 42 days. Target: 35 days. Status: red (lengthening). Release velocity: 3 releases/month. Target: 4. Status: yellow. Support resolution: 4.2 hours. Target: 4 hours. Status: green (close to target). Perspective 4 — Learning & Growth (Are we building capability?): Bottom-right quadrant (25% of page). Three metrics: Employee NPS: 62. Target: 70. Status: yellow. Key role vacancy: 8 open positions. Target: <5. Status: red. Engineering skill coverage: 78% of required skills covered. Target: 90%. Status: yellow. Summary banner at the top: Overall strategic health: 4 of 12 KPIs on track (green), 5 need attention (yellow), 3 are critical (red). Net assessment: Strategy execution is behind — primary gaps in profitability, customer retention, and hiring. The board sees the complete strategic picture in one glance'"
    weight: 0.35
    description: "Scorecard"
  - type: llm_judge
    criteria: "Response covers the narrative layer and action items — narrative: 'Narrative layer (below the scorecard): The scorecard shows WHERE we stand. The narrative explains WHY and WHAT WE ARE DOING. Narrative structure — 3 sections, each 2-3 sentences: The win: Revenue grew 28% YoY to $35M ARR. Enterprise segment grew 45% following the Q3 pricing launch. Three new enterprise logos worth $2.4M ARR closed in Q4. This momentum continues into Q1 with a record $12M pipeline. The concern: Customer retention is below target. Logo churn at 2.8% is driven by SMB (4.1% churn) following the free tier removal in Q3. 45% of churned customers cited pricing. Net revenue retention at 112% is healthy but below the 120% target needed to achieve IPO benchmarks. The action: Three initiatives to address the gaps. 1. Launch SMB starter tier at $29/month. Owner: CPO. Target: February launch. Expected impact: reduce SMB churn from 4.1% to 2.5% by Q2. 2. Hire 3 Enterprise account executives. Owner: VP Sales. Target: Q1. Expected impact: support the $12M pipeline and accelerate Enterprise growth. 3. Achieve breakeven by Q4 2026. Owner: CFO. Plan: reduce COGS by consolidating infrastructure providers (saves $200K/quarter) and improve CAC payback from 18 to 12 months. The presentation flow (under 5 minutes): 1 minute: read the scorecard (green, yellow, red at a glance). 1 minute: The win (celebrate momentum). 1 minute: The concern (acknowledge the gap honestly). 2 minutes: The action (specific plans with owners and timelines). Board questions are focused on the actions, not on trying to understand the data'"
    weight: 0.35
    description: "Narrative"
  - type: llm_judge
    criteria: "Explanation covers scorecard design principles and common pitfalls — principles: 'Scorecard design principles: 1. Maximum 12-15 metrics: more metrics dilute attention. The board should focus on the vital few, not the trivial many. If a metric does not connect to a strategic objective, it does not belong on the scorecard. 2. Every metric needs a target: a number without a target is meaningless. Revenue $35M — is that good or bad? Revenue $35M vs target $38M — now the board knows we are behind. Targets should be set at the beginning of the year and reviewed quarterly. Do not change targets mid-year to make the scorecard look better. 3. Status colors are binary: green = on track to hit the annual target at current trajectory. Yellow = at risk of missing the target without intervention. Red = will miss the target without significant course correction. Avoid using yellow as a safe color. If a metric is yellow for two consecutive quarters, it should be treated as red. 4. Trends matter more than snapshots: show a small arrow or sparkline next to each metric indicating the direction. Revenue $35M ↑ is very different from Revenue $35M ↓. A red metric with an improving trend (churn 2.8% ↓ from 3.5%) tells a different story than a red metric that is worsening. Common pitfalls: 1. Too many greens: if every metric is green, the targets are too easy or the scorecard is not measuring the right things. A healthy scorecard has a mix of green, yellow, and red. 2. Vanity metrics on the scorecard: total registered users or total page views sound impressive but do not indicate strategic health. Replace with active users or conversion rate. 3. No actions: a scorecard that shows red metrics without action plans is useless. Every red or yellow metric must have an associated action, owner, and timeline. 4. Metric changes between meetings: if the scorecard changes metrics each quarter, the board cannot track progress. Keep the same core metrics for at least a year. Add or replace only during the annual strategy review'"
    weight: 0.30
    description: "Principles"
