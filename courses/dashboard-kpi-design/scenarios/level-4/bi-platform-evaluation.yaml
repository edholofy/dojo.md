meta:
  id: bi-platform-evaluation
  level: 4
  course: dashboard-kpi-design
  type: output
  description: "Evaluate BI platforms — compare Tableau, Looker, Power BI, Metabase and others to select the right dashboard tool for an organization's needs, budget, and technical maturity"
  tags: [BI-platform, Tableau, Looker, PowerBI, Metabase, evaluation, expert]

state: {}

trigger: |
  The CTO says: "We've outgrown our current dashboarding setup — a mix
  of Google Sheets, Metabase, and ad-hoc Python scripts. Different
  teams use different tools and nothing is consistent.

  I need a recommendation for a single BI platform that can serve our
  whole company — 200 employees, $25M ARR, growing 40% YoY. We have
  a 3-person data team. Budget is flexible but I need to justify ROI."

  The Head of Data adds: "Our stack is Snowflake, dbt, and Fivetran.
  The platform needs to integrate with our modern data stack and
  support self-service for business users."

  Task: Evaluate BI platforms and recommend the best fit.

assertions:
  - type: llm_judge
    criteria: "Response provides a structured comparison of major BI platforms — comparison: 'BI platform comparison: Evaluation criteria: 1. Ease of use for business users (self-service). 2. Integration with modern data stack (Snowflake, dbt). 3. Governance and metric consistency. 4. Total cost of ownership. 5. Scalability for a growing company. 6. Implementation effort for a 3-person data team. Tableau: Strengths: most powerful visualization engine. Drag-and-drop interface is industry standard. Largest community and ecosystem. Best for complex, exploratory analysis. Weaknesses: expensive at scale ($70/Creator, $42/Explorer, $15/Viewer per month). Governance is weaker — users can create inconsistent metrics. Requires Tableau Server or Tableau Cloud for sharing. Snowflake integration: native connector, good performance with live queries and extracts. Self-service score: 7/10 (powerful but steep learning curve for non-analysts). Looker (Google Cloud): Strengths: LookML semantic layer enforces consistent metric definitions. Excellent governance — all metrics defined in code, version-controlled. Native Snowflake integration with push-down queries. Strong API and embedding capabilities. Weaknesses: steeper learning curve for initial setup (requires LookML modeling). Higher implementation effort (2-4 months for a 3-person team). Pricing is opaque (enterprise sales, typically $3K-5K/month for 200 users). Self-service score: 6/10 (powerful once set up, but users need training). Power BI: Strengths: lowest cost ($10/user/month Pro, $20/user Premium Per User). Deep Microsoft ecosystem integration. Good for companies already using Azure and Microsoft 365. AI features (Q&A natural language queries, AutoML). Weaknesses: Snowflake connector works but is not as native as BigQuery. Governance requires discipline — easy to create ungoverned reports. Desktop app is Windows-only (web version improving). Self-service score: 8/10 (familiar Excel-like interface). Metabase: Strengths: open source with a free tier. Simplest setup — can be running in 30 minutes. Best self-service for non-technical users (question builder). Lowest barrier to entry. Weaknesses: limited visualization options compared to Tableau. Governance features are basic (no semantic layer). Not designed for large-scale enterprise deployments. Snowflake integration: works but lacks advanced optimization. Self-service score: 9/10 (simplest interface, but limited depth)'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response provides a clear recommendation with justification — recommendation: 'Recommendation for this company: Given: 200 employees, $25M ARR, 40% growth, 3-person data team, Snowflake/dbt/Fivetran stack, need for self-service and governance. Recommended: Looker. Justification: 1. Semantic layer aligns with dbt: the company already uses dbt for data transformation. Looker's LookML extends this philosophy to the presentation layer — metrics are defined in code, version-controlled, and consistent across every dashboard. This solves the current problem of different teams using different tools with inconsistent numbers. 2. Snowflake-native: Looker pushes queries to Snowflake, leveraging existing investment. No data extracts or duplication needed. 3. Governance by default: with LookML, business users can explore data freely but within guardrails. They cannot accidentally create a revenue metric that conflicts with Finance's definition. This is critical at 200 employees where ungoverned self-service creates chaos. 4. Scales with growth: at 40% YoY growth, the company will be 400+ employees in 2 years. Looker's governance model prevents dashboard sprawl that plagues fast-growing companies. 5. API and embedding: future ability to embed dashboards in the product (customer-facing analytics) supports potential revenue opportunities. Why not the others: Tableau: more powerful visualization but weaker governance. The 3-person data team cannot police metric consistency across 200 Tableau users. Power BI: cheapest option but Snowflake integration is secondary to Azure. Does not fit the modern data stack as well. Metabase: excellent for the current size but will not scale governance-wise as the company grows past 300 employees. Implementation plan: Months 1-2: build LookML models for core business domains (revenue, customers, product). 3-person team can model 5-8 explores. Month 3: onboard 20 power users across departments as Looker champions. Months 4-6: roll out self-service to all 200 employees with training. Cost estimate: approximately $3,500-5,000/month (negotiate annual contract). ROI: eliminates 3 separate tools, reduces analyst time spent on ad-hoc requests by 40%, prevents metric conflicts that cost 5+ hours per month in reconciliation'"
    weight: 0.35
    description: "Recommendation"
  - type: llm_judge
    criteria: "Explanation covers migration strategy and change management — migration: 'Migration and change management: Migration strategy (6-month plan): Phase 1 — Foundation (Months 1-2): set up Looker instance connected to Snowflake. Build LookML models for the 5 most-used existing dashboards. Validate numbers match existing reports exactly — any discrepancy during migration destroys trust. Create a Looker style guide: color palette, chart type standards, naming conventions. Phase 2 — Parallel run (Months 3-4): run Looker alongside existing tools. Power users validate that Looker produces identical results. Build remaining dashboards in Looker. Document every metric definition in LookML with descriptions. Phase 3 — Cutover (Months 5-6): migrate remaining users to Looker. Decommission old tools (Metabase, Google Sheets dashboards). Archive old dashboards with redirect links. Change management: the hardest part of BI migration is not technical — it is people. Challenges and solutions: The analyst who built 20 Metabase dashboards: they will resist losing their work. Solution: involve them early as a Looker champion. Their domain knowledge is invaluable for building LookML models. The executive who likes their Google Sheet: they will resist changing their routine. Solution: build their exact view in Looker first. Make it better than the Google Sheet (auto-refresh, drill-down, mobile). The power user who wants Tableau: they will argue Looker is less flexible. Solution: acknowledge the trade-off honestly. Looker sacrifices some visualization flexibility for governance consistency. For a 200-person company growing fast, governance is more important. Training plan: 2-hour workshops for business users (how to explore and build simple reports). 8-hour deep dive for power users (how to build looks, dashboards, and schedule reports). Ongoing office hours: weekly 30-minute drop-in session for questions. Success metric: within 6 months, 80% of dashboard views come from Looker. If less than 50%, investigate adoption barriers'"
    weight: 0.30
    description: "Migration"
