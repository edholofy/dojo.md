meta:
  id: crisis-command-center
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Design a crisis command center dashboard — build a war room dashboard for managing company crises with real-time situational awareness, coordinated response, and stakeholder communication"
  tags: [crisis, war-room, command-center, incident-management, master]

state: {}

trigger: |
  The company experiences a security breach. Customer data may have
  been exposed. The CEO activates the crisis team and says: "I need
  a single screen that shows me everything: how many customers are
  affected, what data was exposed, what we've done so far, what's
  still pending, and what we're telling customers and regulators. I
  cannot afford to ask 5 different people for status updates during
  a crisis. One dashboard. One source of truth."

  Task: Design a crisis command center dashboard that provides
  situational awareness and coordination during a company crisis.

assertions:
  - type: llm_judge
    criteria: "Response designs a crisis command center dashboard — dashboard: 'Crisis command center dashboard: Top banner — crisis summary: ACTIVE INCIDENT — Security Breach. Severity: CRITICAL. Duration: 4 hours 23 minutes. Commander: CISO. Status: CONTAINMENT IN PROGRESS. Last update: 3 minutes ago. The banner is red and impossible to miss. It shows the essential context: what is happening, how long it has been happening, who is in charge, and the current phase. Section 1 — Impact assessment (left column, 40% width): Customers potentially affected: 12,400 of 45,000 (27.6%). Data types exposed: email addresses (confirmed), usage data (confirmed), payment tokens (investigating — NOT confirmed). Geographic distribution: US 8,200, EU 3,100, APAC 1,100. Regulatory jurisdictions affected: GDPR (EU customers), CCPA (California customers), SOC 2 (all customers). Revenue at risk: $2.8M ARR from affected customers (8% of total ARR). Churn risk estimate: 5-15% of affected customers may churn = $140K-$420K ARR. These numbers update as the investigation progresses. When the security team confirms payment tokens were NOT exposed, the dashboard updates immediately. Section 2 — Response timeline (center column, 35% width): Chronological log of all actions taken: 14:22 — Anomalous database access detected by monitoring. 14:25 — On-call engineer alerted via PagerDuty. 14:31 — Security team confirms unauthorized access. 14:35 — CEO notified. Crisis team activated. 14:40 — Affected database isolated. Access revoked. 14:55 — Forensic analysis started. Scope assessment underway. 15:15 — Initial scope: 12,400 customer records accessed. 15:45 — Legal team notified. GDPR 72-hour clock starts. 16:30 — Customer communication drafted. Pending CEO approval. NOW — Containment confirmed. Root cause analysis in progress. The timeline shows what happened and when. Board members and executives can trace the response without asking questions. Section 3 — Action tracker (right column, 25% width): Open actions with owners and deadlines: 1. Complete forensic analysis. Owner: CISO. Due: 20:00 today. Status: in progress. 2. Confirm payment data status. Owner: Security Lead. Due: 18:00 today. Status: in progress (critical). 3. Send customer notification email. Owner: VP Marketing. Due: pending CEO approval. 4. File GDPR breach notification. Owner: Legal. Due: within 72 hours (deadline: Feb 28 14:31). 5. Prepare board communication. Owner: CEO. Due: tomorrow 9 AM. 6. Conduct root cause analysis. Owner: VP Engineering. Due: 48 hours. Each action has a status indicator: green (done), yellow (in progress), red (overdue or blocked)'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response covers multi-stakeholder communication tracking — communication: 'Stakeholder communication tracker: The crisis affects multiple stakeholder groups, each needing different communication at different times. Communication matrix (tracked on the dashboard): Stakeholder | Status | Channel | Owner | Sent at | Next update. Affected customers | PENDING | Email + in-app | VP Marketing | — | Pending CEO approval. All customers | NOT YET | Blog post | VP Marketing | — | After affected customers notified. Board of directors | BRIEFED | Email | CEO | 15:00 | Tomorrow 9 AM board call. Investors (lead VC) | BRIEFED | Phone call | CEO | 15:30 | Tomorrow with board. Regulators (GDPR) | PENDING | Official filing | Legal | — | Due by Feb 28 14:31. Regulators (CCPA) | PENDING | Official filing | Legal | — | Due within 72 hours. Press/media | NOT YET | Press statement | VP Comms | — | After customer notification. Employees | BRIEFED | All-hands Slack | COO | 16:00 | Daily at 9 AM. Each row tracks: what we told them, when, and when the next update is due. Communication templates are pre-drafted and attached: customer email template (empathetic, factual, action-oriented). Board briefing template (scope, impact, response, next steps). Regulatory filing template (compliant with GDPR Article 33 requirements). Press statement template (factual, non-speculative, customer-focused). The CEO can review and approve each communication directly from the dashboard. Communication sequencing is critical: affected customers are notified FIRST, before any public statement. If the press learns about the breach before customers do, trust is further damaged. Dashboard enforcement: the press statement row is blocked until the customer notification row shows SENT'"
    weight: 0.35
    description: "Communication"
  - type: llm_judge
    criteria: "Explanation covers crisis dashboard design principles and post-crisis metrics — principles: 'Crisis dashboard design principles: 1. Single screen, no navigation: during a crisis, every click is wasted time. The entire command center fits on one screen — no tabs, no drill-downs, no scrolling. If information does not fit, it is not essential during the crisis. 2. Auto-refresh every 30 seconds: the dashboard pulls the latest data automatically. No one should need to click refresh. A stale number during a crisis is dangerous. 3. Prominent timestamps: every data point shows when it was last updated. Customers affected: 12,400 (updated 3 min ago). If a number has not updated in more than 15 minutes, it is flagged as potentially stale. 4. Collaborative editing: the action tracker is editable by all crisis team members. The security lead updates their action status directly on the dashboard. The legal team updates the regulatory filing status. Everyone sees the same real-time view. 5. Audit trail: every change to the dashboard is logged with timestamp and user. This log is essential for post-incident review and regulatory compliance. Who updated the customer count? When was the CEO briefed? The audit trail answers these questions. 6. Pre-built, not built during the crisis: the crisis dashboard template must exist BEFORE a crisis occurs. Building a dashboard during a crisis wastes critical time. Template includes: impact assessment section (fill in the numbers), timeline section (auto-populated from incident management tool), action tracker (pre-loaded with standard crisis response actions), communication matrix (pre-loaded with stakeholder groups). The crisis team rehearses using the dashboard in quarterly tabletop exercises. Post-crisis metrics dashboard: after the crisis is resolved, track recovery: customer churn rate among affected customers vs unaffected (measured at 30, 60, 90 days). Support ticket volume related to the incident. NPS change before vs after the incident. Time to resolution for each action item. Communication effectiveness: did customers feel informed? (survey). These metrics inform the post-incident review and improve the response for next time'"
    weight: 0.30
    description: "Principles"
