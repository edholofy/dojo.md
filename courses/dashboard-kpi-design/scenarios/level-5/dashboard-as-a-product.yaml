meta:
  id: dashboard-as-a-product
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Build dashboards as a product — design and monetize customer-facing analytics as a core product feature with product management discipline, user research, and iterative development"
  tags: [product, monetization, customer-facing, analytics-product, master]

state: {}

trigger: |
  The CEO says: "Our customers keep asking for analytics inside our
  product — they want to see their own data, track their performance,
  and generate reports. Right now they export CSVs and build their own
  charts in Excel.

  I want to build an analytics product inside our platform. Not just
  a few charts — a real analytics experience that customers would pay
  for. Our competitors charge $50-200/month extra for analytics
  features. This could be a $5M ARR revenue line."

  Task: Design a dashboard-as-a-product strategy, from user research
  to monetization.

assertions:
  - type: llm_judge
    criteria: "Response designs a product strategy for customer-facing analytics — strategy: 'Dashboard-as-a-product strategy: Phase 1 — User research (Weeks 1-4): before building, understand what customers actually need. Research methods: Interview 20 customers: what analytics do you do today? Show me your Excel reports. What questions do you try to answer weekly? Survey 200 customers: which of these analytics features would you use? Rank by importance. How much would you pay for in-product analytics? Analyze CSV exports: what data do customers export most frequently? This reveals what they are analyzing externally. Findings (typical for B2B SaaS): 85% of customers export data at least weekly. The most common analyses: performance over time (used by 72%), comparison across segments/teams (used by 58%), goal tracking vs targets (used by 45%). Customers spend 2-4 hours per week building Excel reports from exported data. Willingness to pay: $50/month (small customers), $200/month (enterprise). Phase 2 — Product design (Weeks 4-8): MVP analytics dashboard: three views that cover 80% of customer needs: View 1 — Performance overview: KPI cards for the 5 metrics customers track most. Trend chart: primary metric over the last 90 days (customizable). Comparison: this period vs prior period. The customer opens the app and sees how they are performing in 10 seconds. View 2 — Detailed analysis: filterable table with all their data. Group by any dimension (team, category, region, time period). Sort, filter, and search. This replaces the CSV export + Excel workflow. View 3 — Scheduled reports: configure a weekly email report with selected metrics. PDF export for sharing with stakeholders. Eliminates the Monday morning Excel ritual. Design principles: the analytics must feel native to the product — same design system, same navigation, same performance. Users should not feel like they left the product to enter a different tool. Mobile-responsive: many users check analytics on their phone'"
    weight: 0.35
    description: "Strategy"
  - type: llm_judge
    criteria: "Response covers monetization and packaging — monetization: 'Monetization strategy: Pricing tiers: Free tier (included in all plans): performance overview with 3 KPI cards. 30-day data retention. No export. Purpose: give every customer a taste of analytics. Drive adoption and create demand for paid tiers. Starter tier ($49/month): full performance overview with 5+ KPIs. Detailed analysis with filters and grouping. CSV and PDF export. 12-month data retention. Weekly scheduled email reports. Purpose: serve small to mid-market customers who need basic self-service analytics. Pro tier ($149/month): everything in Starter plus: custom dashboards (build your own views). Benchmark comparisons (compare your performance to anonymized peer data). API access to analytics data. Unlimited data retention. Purpose: serve mid-market and enterprise customers who want advanced capabilities. Enterprise tier ($299/month or custom): everything in Pro plus: white-label analytics (embed in their own product or share with their clients). Custom metrics and calculated fields. Dedicated analytics support. SLA guarantees on data freshness. Purpose: serve enterprise customers and platform customers who resell analytics. Revenue projections: current customer base: 1,240 customers. Conservative adoption estimates: free tier: 80% (992 customers). Starter conversion: 15% of free users (149 customers × $49 = $88K ARR). Pro conversion: 5% of free users (50 customers × $149 = $89K ARR). Enterprise: 2% (20 customers × $299 = $72K ARR). Year 1 projected analytics ARR: $249K. Growth path: as the product matures and adoption increases: Year 2: $1.2M ARR (better product, more adoption, new customers). Year 3: $3.5M ARR (pro and enterprise tier expansion). Year 4: $5M+ ARR (approaching the CEO's target). The analytics product has strong unit economics: marginal cost per customer is low (shared infrastructure), gross margin above 90%'"
    weight: 0.35
    description: "Monetization"
  - type: llm_judge
    criteria: "Explanation covers iterative development and success measurement — iteration: 'Iterative product development: Build analytics like any product — with iteration based on usage data and customer feedback. Launch metrics for the analytics product: activation rate: percentage of customers who open analytics at least once. Target: 60% within 30 days of launch. Weekly active users: percentage of customers who use analytics weekly. Target: 30% within 90 days. Feature adoption: which views are used most? Which features are ignored? Conversion rate: free to paid. Target: 15% within 6 months. Retention: do analytics users churn less than non-analytics users? Hypothesis: yes — analytics increases stickiness. NPS for analytics: separate NPS score for the analytics feature. Target: above 40. Usage-driven iteration: Month 1-3 post-launch: monitor activation and identify drop-off points. If users open analytics but do not return, the initial experience is not compelling enough. Fix: improve the default dashboard to show high-value insights immediately. Month 3-6: analyze which features are used and which are not. If 80% of users use the performance overview but only 10% use detailed analysis, invest in making the overview even better. Do not invest in features nobody uses. Month 6-12: introduce advanced features based on customer requests. Benchmark comparisons (how do I compare to others?) is usually the most requested feature. Custom dashboards for power users. API access for customers building their own integrations. The analytics product should have its own product manager, its own roadmap, and its own success metrics — just like any other product feature. Success metric for the business: analytics as a retention lever. Measure: do customers who use analytics churn at a lower rate than those who do not? If analytics users churn at 2% and non-analytics users churn at 5%, the analytics feature prevents $X in annual churn. This retention value often exceeds the direct subscription revenue from analytics pricing'"
    weight: 0.30
    description: "Iteration"
