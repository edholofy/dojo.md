meta:
  id: master-dashboard-shift
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Master dashboard shift — handle executive-level dashboard strategy challenges requiring organizational transformation, investor communication, product strategy, and crisis response in a single day"
  tags: [shift-simulation, master, executive, transformation, investor]

state: {}

trigger: |
  Three high-stakes requests arrive on the same day:

  Request 1 (CEO): "We're preparing for our Series C fundraise. The
  lead investor wants our complete metrics package — SaaS unit
  economics, cohort analysis, and public company benchmarks. This
  package needs to tell a compelling growth story while being
  completely transparent. Build the investor metrics dashboard."

  Request 2 (Board Chair): "The company has been data-available but
  not data-driven for two years. I want a 12-month plan to transform
  this into a metrics-driven organization. Every meeting, every
  decision, every initiative should be backed by data. Design the
  transformation program."

  Request 3 (CPO): "Our biggest competitor just launched customer-
  facing analytics. Our customers are asking for the same thing.
  Design an analytics product we can embed in our platform — with
  monetization strategy, technical architecture, and a 6-month
  roadmap."

  Task: Handle all three requests.

assertions:
  - type: llm_judge
    criteria: "Response addresses the CEO's investor metrics package — investor: 'Request 1 — Investor metrics dashboard: SaaS metrics package for Series C: Growth story: ARR $35M growing 65% YoY. Net new ARR accelerating: Q1 $2.8M → Q4 $4.6M (+64% within the year). Rule of 40: 65% growth + (-12%) margin = 53 (well above 40 threshold). Magic number: 1.92 (excellent S&M efficiency). Unit economics: blended CAC $17.5K with payback of 8 months. LTV/CAC 21x (blended). Enterprise LTV/CAC 93x. Burn multiple 0.61 (best-in-class — below 1.0). Cohort analysis (the strongest slide): NDR improving by vintage: 2022 cohorts 108%, 2023 cohorts 115%, 2024 cohorts 118%. This proves the product is getting stickier over time. GDR 92% (above the 90% threshold for B2B SaaS). Cohort payback curves: all segments recover CAC within 12 months. Benchmarking: growth rate (65%) is top-decile among public SaaS. NDR (118%) is above median (110%) but below top quartile (130%). Gross margin (74%) near median — room for improvement with infrastructure optimization. The investor reads this in 15 minutes and concludes: efficient growth, improving cohort economics, capital-efficient business model. Compelling Series C investment'"
    weight: 0.35
    description: "Investor"
  - type: llm_judge
    criteria: "Response addresses the Board Chair's data culture transformation — culture: 'Request 2 — Data culture transformation program (12 months): Quarter 1 — Executive modeling: CEO commits to starting every executive meeting with the company scorecard. Every VP defines their 5 KPIs aligned to corporate objectives. No strategic decision approved without supporting data. Weekly executive dashboard review becomes a ritual. VP training: 4-hour workshop on reading dashboards, asking data questions, and connecting metrics to decisions. Quarter 2 — Manager enablement: train 150 managers on self-service analytics (Looker explores). Install team dashboard rituals in every standup. Launch a data ambassador program: 30 data-savvy managers trained as department champions. Reduce data team request backlog from 6 weeks to 3 weeks through self-service adoption. Quarter 3 — Organization-wide rollout: Tier 1 training (dashboard reading) for all employees during onboarding. Tier 2 training (self-service exploration) for 25% of employees. Integrate data usage into performance reviews: using data for decisions becomes a competency. Monthly data hero recognition: celebrate teams that use data to drive results. Quarter 4 — Sustainability: self-service handles 80% of data questions. Data team backlog reduced to 1 week (focused on complex analysis). Quarterly data literacy assessments for new hires. Measurement: track dashboard daily active users (target: 500 of 1,500 by month 12), self-service query count (target: 200/week), percentage of decisions documented with supporting data, and forecast accuracy improvement'"
    weight: 0.35
    description: "Culture"
  - type: llm_judge
    criteria: "Response addresses the CPO's analytics product request — product: 'Request 3 — Customer-facing analytics product: Product strategy: build embedded analytics as a monetizable product feature. User research (Weeks 1-4): interview 20 customers about their current analytics workflow (most export CSVs to Excel). Survey 200 customers on feature priorities and willingness to pay. Analyze CSV export patterns to understand what customers analyze. Product design (Weeks 4-8): MVP with three views: performance overview (KPI cards + trend chart), detailed analysis (filterable table replacing CSV exports), scheduled reports (weekly email with selected metrics). Architecture: embed Looker (fast to market) with multi-tenant data isolation. Row-level security ensures each customer sees only their own data. Pre-computed summary tables for sub-second load times. Monetization: Free tier (included): 3 KPI cards, 30-day retention. Starter ($49/month): full analytics, 12-month retention, exports. Pro ($149/month): custom dashboards, benchmarks, API access. Enterprise ($299/month): white-label, custom metrics, unlimited retention. Revenue projection: Year 1 $249K, Year 2 $1.2M, Year 3 $3.5M, Year 4 $5M+ ARR. Roadmap (6 months): Months 1-2: build infrastructure and MVP. Month 3: beta launch with 20 customers. Month 4: public launch of free and Starter tiers. Month 5: launch Pro tier with custom dashboards. Month 6: launch Enterprise tier with white-label capabilities. Success metrics: 60% activation within 30 days, 30% weekly active usage within 90 days, 15% free-to-paid conversion within 6 months, analytics users churn 40% less than non-analytics users (the retention lever)'"
    weight: 0.30
    description: "Product"
