meta:
  id: competitive-intelligence-dashboards
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Design competitive intelligence dashboards — build dashboards that track competitor positioning, market share, win/loss analysis, and strategic benchmarking to inform go-to-market decisions"
  tags: [competitive-intelligence, market-share, win-loss, benchmarking, master]

state: {}

trigger: |
  The Chief Strategy Officer says: "We operate in a market with 4
  major competitors. I have no systematic way to track their moves.
  When a competitor launches a feature, I hear about it from a
  customer. When they change pricing, I find out weeks later from
  a lost deal report.

  I need a competitive intelligence dashboard that gives our leadership
  team a real-time view of our competitive position — market share,
  win/loss patterns, feature gaps, and pricing intelligence."

  Task: Design a competitive intelligence dashboard system.

assertions:
  - type: llm_judge
    criteria: "Response designs a competitive intelligence dashboard — dashboard: 'Competitive intelligence dashboard: Section 1 — Market position overview: Market share estimates (updated quarterly): Us: 22% ($35M of estimated $160M TAM). ↑2pp YoY. Competitor A: 30% ($48M). ↓1pp YoY (market leader, losing share). Competitor B: 18% ($29M). ↑3pp YoY (fastest growing). Competitor C: 12% ($19M). Flat. Competitor D: 8% ($13M). ↓2pp YoY. Others: 10% ($16M). Visualization: stacked area chart showing market share over time (8 quarters). Our share is growing, Competitor A is declining, Competitor B is rising fast. Key insight: we are gaining share but Competitor B is gaining faster. They are the primary competitive threat. Section 2 — Win/loss analysis: Win rate by competitor (last 12 months): vs Competitor A: we win 55% of head-to-head deals. ↑5pp from last year. vs Competitor B: we win 38% of head-to-head deals. ↓8pp from last year. Concerning. vs Competitor C: we win 62%. Stable. vs Competitor D: we win 71%. Stable. Loss reason breakdown (when we lose to Competitor B): Price: 40% (they undercut us by 15-25%). Product feature gap: 30% (their analytics module is ahead). Existing relationship: 20% (incumbent advantage). Other: 10%. Dashboard element: horizontal bar chart of loss reasons, updated from CRM win/loss notes and sales exit interviews. Each bar is clickable → drill into specific deals lost for that reason. Section 3 — Feature comparison matrix: A feature comparison table updated monthly: Feature | Us | Comp A | Comp B | Comp C. Core workflow | ✓ | ✓ | ✓ | ✓. Advanced analytics | Partial | ✓ | ✓ | ✗. API access | ✓ | ✓ | ✓ | ✓. Mobile app | ✓ | ✓ | ✗ | ✓. AI features | ✗ | ✓ | ✓ | ✗. Enterprise SSO | ✓ | ✓ | ✓ | ✗. Gap analysis: we lack AI features (both Comp A and B have them). This is the feature most frequently cited in losses. Product roadmap connection: AI features planned for Q3 — linked to the product roadmap dashboard'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response covers data collection methods and pricing intelligence — datacollection: 'Data collection for competitive intelligence: Source 1 — CRM win/loss data (structured, reliable): every closed deal (won or lost) records the competitor involved and the loss reason. Sales reps fill this out at deal close. Data quality: require structured fields (competitor dropdown, loss reason dropdown) plus a free-text notes field. Audit quarterly: if more than 20% of lost deals have no competitor noted, address with sales management. Source 2 — Customer and prospect interviews: quarterly win/loss interview program with 10-15 lost prospects. Conducted by product marketing (not sales, to reduce bias). Structured questions: what were your top 3 evaluation criteria? How did we compare to [competitor]? What was the deciding factor? Findings are tagged and coded into the dashboard database. Source 3 — Public data monitoring: competitor websites monitored for: pricing page changes (pricing intelligence). New feature announcements (product intelligence). Job postings (reveals strategic direction — hiring AI engineers = AI product coming). Press releases, funding announcements, partnership announcements. Tools: automated web scrapers, Google Alerts, and competitive intelligence platforms. Source 4 — Industry reports and analyst data: Gartner, Forrester, IDC reports for market share estimates. G2 and Capterra for user review sentiment tracking. Review sentiment dashboard: our average G2 rating: 4.3 ↑0.2 YoY. Competitor A: 4.1 ↓0.1. Competitor B: 4.5 ↑0.3 (outpacing us on review scores). Category-level sentiment: reliability (us: strong), ease of use (us: moderate), analytics (us: weak, competitor B strong). Pricing intelligence: Competitor pricing comparison table (updated when changes detected): Plan tier | Us | Comp A | Comp B | Comp C. Starter | $49/mo | $59/mo | $39/mo | $45/mo. Pro | $149/mo | $179/mo | $119/mo | $139/mo. Enterprise | Custom | Custom | $299/mo | Custom. Insight: Competitor B undercuts us by 20% at every tier. This aligns with the 40% of losses citing price. Decision input: should we compete on price, or differentiate on value?'"
    weight: 0.35
    description: "DataCollection"
  - type: llm_judge
    criteria: "Explanation covers strategic decision-making from competitive data — strategic: 'Strategic decisions driven by competitive intelligence: Decision 1 — Competitive positioning: the dashboard reveals we are losing to Competitor B on price and features. Two strategic options: Option A: compete on price — reduce prices by 15% to match Competitor B. Expected impact: win rate vs B improves from 38% to 50%. Revenue impact: +$2M from won deals, -$4M from reduced prices on existing customers. Net: -$2M. Not recommended. Option B: differentiate on value — invest in the features B lacks (enterprise security, compliance, API ecosystem) and target Enterprise where price sensitivity is lower. Expected impact: Enterprise win rate improves. ARPC increases from $3,800 to $5,200. Revenue impact: +$3.5M from larger deals, no price reduction. Net: +$3.5M. The dashboard data directly informs the strategic choice. Decision 2 — Product roadmap prioritization: the feature gap analysis shows AI features are the most cited product loss reason (30% of losses to Competitor B). Connect competitive intelligence to product roadmap: feature requests from lost deals are weighted higher in prioritization. If 30% of lost deals cite analytics gaps and the AI analytics feature is in the backlog, it should be accelerated. Estimated revenue impact: closing 30% of the feature-gap losses = $1.8M additional ARR. Decision 3 — Market entry and expansion: the market share trend shows Competitor D is declining (↓2pp). Their customers may be receptive to switching. Build a targeted competitive displacement campaign: identify Competitor D customers through win/loss data and industry contacts. Create migration incentives (free data migration, competitive pricing for the first year). Track on the dashboard: competitive displacement deals won (target: 15 accounts from Competitor D in 12 months). The competitive intelligence dashboard is not just informational — it drives specific, quantifiable strategic actions'"
    weight: 0.30
    description: "Strategic"
