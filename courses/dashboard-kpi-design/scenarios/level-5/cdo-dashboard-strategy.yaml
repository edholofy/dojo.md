meta:
  id: cdo-dashboard-strategy
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Define a CDO dashboard strategy — design the Chief Data Officer's strategic dashboard portfolio that monitors data platform health, team effectiveness, data quality, and organizational data maturity"
  tags: [CDO, data-strategy, platform-health, data-quality, maturity, master]

state: {}

trigger: |
  A newly hired Chief Data Officer arrives at a 3,000-person company.
  The CEO says: "I hired you to make this company data-driven. You
  have a $5M annual budget, a team of 25, and 18 months to show
  results. I need you to build your own dashboard — one that shows
  me whether the data function is delivering value. If you can't
  measure your own team's impact, how can I trust you to measure
  everyone else's?"

  Task: Design the CDO's strategic dashboard portfolio — the
  dashboards that track the data function's performance and impact
  on the organization.

assertions:
  - type: llm_judge
    criteria: "Response designs the CDO's strategic dashboard — dashboard: 'CDO strategic dashboard: Dashboard 1 — Data platform health: Monitors the technical foundation. Data freshness SLA compliance: 94% of dashboards updated within SLA. Target: 99%. Trend: improving ↑3pp this month. Pipeline reliability: 98.2% of dbt runs completed successfully. Target: 99.5%. Failures this week: 3 (2 resolved, 1 in progress). Query performance: P95 dashboard load time: 3.8 seconds. Target: under 3 seconds. Trend: degrading (investigate). Data warehouse cost: $42K this month. Budget: $45K. Trend: ↑8% MoM (growing with data volume — expected). Cost per query: $0.12 average. Top expensive queries: list the 5 most expensive recurring queries. Infrastructure utilization: Snowflake warehouse utilization 72%. Right-sized or opportunity to downsize. Dashboard 2 — Data team effectiveness: Monitors the team of 25. Request backlog: 47 requests in queue. Average time to fulfillment: 3.2 weeks. Target: under 2 weeks. Trend: backlog growing (need more capacity or better self-service). Requests by type: new dashboards (35%), ad-hoc analysis (28%), data model changes (18%), bug fixes (12%), other (7%). Self-service ratio: 62% of data questions answered by business users. Target: 80%. This ratio is the key leverage metric — higher self-service means the team can focus on high-value work. Team capacity allocation: platform and infrastructure (30%), new dashboards and features (25%), support and maintenance (20%), data quality and governance (15%), strategic projects (10%). The CDO wants to shift allocation toward strategic projects (target: 25%) by reducing support through better self-service. Dashboard 3 — Data quality scorecard: Monitors trust in the data. Overall data quality score: 87/100. Broken down by dimension: completeness (92%), accuracy (88%), timeliness (94%), consistency (82%), uniqueness (95%). The weakest dimension is consistency (82%) — same metrics calculated differently across systems. This connects to the metric governance initiative. Data quality incidents this month: 4 (2 minor, 1 moderate, 1 major). Major incident: revenue discrepancy between billing system and dashboard ($45K difference). Root cause: timezone handling in ETL. Resolution time: 6 hours. Certified metrics: 45 of 120 important metrics are certified (37.5%). Target: 80% certified within 12 months'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response covers measuring the business impact of the data function — impact: 'Measuring business impact of the data function: The CDO must prove the $5M investment delivers value. Framework — four value dimensions: Dimension 1 — Revenue impact: decisions driven by dashboards that generated measurable revenue. Example: the marketing team used the campaign attribution dashboard to reallocate $200K from low-performing channels to high-performing ones. Result: pipeline increased by $800K. Revenue attributed to data-driven decisions: $3.2M this year. Tracking method: decision log — when a team cites a dashboard in a decision that produces measurable results, log it. Dimension 2 — Cost savings: efficiency gains from automated reporting and self-service. Manual reporting hours eliminated: 350 hours/month (previously 15 analysts spent 6 hours/week each on manual reports). At $75/hour loaded cost: $315K annual savings. Data pipeline automation: replaced 5 manual ETL processes with automated pipelines. Savings: $180K annual contractor costs eliminated. Dimension 3 — Risk reduction: data quality improvements that prevented financial misstatements. Revenue reconciliation automated: catches discrepancies within 24 hours instead of at month-end. Compliance dashboards: GDPR and SOC 2 monitoring prevents regulatory fines. Estimated risk avoided: $500K per year (one audit finding costs this much in remediation). Dimension 4 — Speed to insight: time reduction for decision-makers to get answers. Average time from question to answer: reduced from 3 weeks (data team backlog) to 5 minutes (self-service). Executive decision cycle: reduced from monthly (wait for reports) to weekly (real-time dashboards). ROI calculation: total annual value delivered: $3.2M revenue impact + $495K cost savings + $500K risk reduction = $4.2M. Investment: $5M (team of 25 + infrastructure). ROI: 84% in year 1 (and improving as self-service scales). Present this ROI dashboard to the CEO quarterly'"
    weight: 0.35
    description: "Impact"
  - type: llm_judge
    criteria: "Explanation covers the data maturity roadmap and organizational metrics — maturity: 'Data maturity roadmap (18 months): Phase 1 — Foundation (Months 1-6): Build the data platform and initial dashboard portfolio. Deliverables: modern data stack operational (Snowflake, dbt, Looker, Fivetran). 20 core dashboards covering all departments. Self-service enabled for Tier 2 users (200 employees). Data quality score above 85. Metric governance framework with 30 certified metrics. Maturity milestone: organization moves from Level 1 (Data-Aware) to Level 2 (Data-Informed). Phase 2 — Adoption (Months 6-12): Drive organization-wide adoption and behavior change. Deliverables: self-service ratio above 70%. Data ambassador program active in every department. Executive dashboard rituals established and running for 3+ months. Data literacy training completed for 80% of managers. Request backlog below 2 weeks. Maturity milestone: organization moves from Level 2 to Level 3 (Data-Driven). Phase 3 — Optimization (Months 12-18): Advanced capabilities and measurable business impact. Deliverables: predictive dashboards for revenue, churn, and pipeline. Experimentation framework active (10+ experiments per quarter). Metric certification above 80%. Self-service ratio above 80%. Demonstrable ROI above 100% annually. Maturity milestone: organization approaching Level 4 (Data-Native). Organizational data maturity dashboard: track maturity across 6 dimensions: data infrastructure, data quality, self-service adoption, data literacy, decision culture, and governance. Each dimension scored 1-5. Radar chart showing the current maturity profile vs target. This is the CDO's north star dashboard — it measures whether the overall mission (make this company data-driven) is succeeding. Present to the CEO quarterly alongside the ROI dashboard. Together they answer: is the data function delivering value? and is the organization becoming more data-driven?'"
    weight: 0.30
    description: "Maturity"
