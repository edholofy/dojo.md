meta:
  id: metrics-driven-transformation
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Lead a metrics-driven business transformation — use KPIs and dashboards to drive a company turnaround, changing organizational behavior through measurement and accountability"
  tags: [transformation, turnaround, accountability, behavioral-change, master]

state: {}

trigger: |
  A PE firm acquired a struggling $80M revenue B2B company. The new
  CEO (brought in by the PE firm) says: "This company has no metrics
  culture. There are no dashboards. Decisions are made by committee
  consensus, not data. The sales team doesn't know their win rate.
  Finance closes the books 3 weeks after quarter-end. Product ships
  features nobody asked for.

  The PE firm expects us to double EBITDA in 3 years. I need to
  install a metrics-driven operating system across this entire company.
  Where do I start?"

  Task: Design a metrics-driven transformation plan for a PE-backed
  turnaround.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased metrics transformation plan — plan: 'Metrics-driven transformation plan (3 years): Year 1 — Foundation (install the operating system): Quarter 1 — Emergency metrics (weeks 1-12): install the 5 metrics the CEO needs immediately, before any infrastructure is built. Revenue: monthly revenue reconciled from the billing system (even if manually). Gross margin: revenue minus direct costs. Cash: weekly cash balance and 13-week cash forecast. Pipeline: total sales pipeline and weighted forecast. Headcount and payroll: the largest cost line. These 5 metrics go on a single Google Sheet updated weekly by the CFO. It is not elegant but it gives the CEO visibility in week 1, not month 6. Quarter 2 — Data infrastructure (weeks 12-24): implement the modern data stack. Fivetran connects CRM (Salesforce), ERP (NetSuite), and product database to Snowflake. dbt transforms raw data into clean models. Looker provides the dashboard layer. Build the first 10 dashboards: CEO scorecard. CFO financial dashboard. VP Sales pipeline and performance. VP Product usage and adoption. VP CS retention and health scores. Each VP gets a dashboard within 90 days of the transformation starting. Quarter 3 — Department metrics (weeks 24-36): each department defines their 5 KPIs aligned to the CEO scorecard. Sales: new ARR, win rate, average deal size, sales cycle length, quota attainment. Product: NPS, feature adoption, time to value, release velocity, bug escape rate. Customer Success: NRR, logo churn, expansion revenue, health score, time to first value. Finance: gross margin, operating margin, DSO, CAC payback, cash runway. Each VP presents their metrics weekly to the CEO. Quarter 4 — Operational cadence (weeks 36-48): install the management rhythms. Daily: team standups reference the team dashboard. Weekly: VP meets with the CEO — dashboard review and action tracking. Monthly: all-hands meeting includes a company metrics review. Quarterly: board meeting with the PE firm using the executive scorecard'"
    weight: 0.35
    description: "Plan"
  - type: llm_judge
    criteria: "Response covers using metrics to drive specific turnaround initiatives — initiatives: 'Using metrics to drive the turnaround: The PE firm expects EBITDA to double from $8M to $16M in 3 years. The dashboard is the tool for tracking progress. Initiative 1 — Pricing optimization (Year 1): Current state: pricing has not changed in 4 years. Many customers are on legacy plans 30-40% below market rate. Dashboard metric: average revenue per customer (ARPC) by cohort vintage. Discovery: 2020-2022 cohorts pay $2,400/year average. 2023+ cohorts pay $3,800/year. Legacy customers represent $12M in under-priced revenue. Action: price increase program for legacy customers. Phase 1: 15% increase for the lowest-paying 20% of accounts. Phase 2: bring all accounts to within 10% of current list price. Dashboard tracking: ARPC trend (target: increase from $3,100 to $3,800 by year end). Churn rate by pricing-change cohort (monitor for backlash). Revenue impact waterfall: $12M legacy base × 25% average increase × 85% retention = $2.55M incremental revenue. Initiative 2 — Cost rationalization (Year 1-2): Current state: gross margin is 62% (peer benchmark: 75%). Dashboard metric: cost breakdown by category as percentage of revenue. Discovery: infrastructure costs 22% of revenue (benchmark: 12%). Support costs 16% (benchmark: 8%). Over-provisioned servers. Tier 1 support handling issues that should be self-service. Action: right-size infrastructure (migrate to reserved instances, consolidate services). Implement self-service knowledge base to deflect 40% of tickets. Dashboard tracking: gross margin trend (target: 62% to 72% by year 2). Cost per customer trend. Support ticket volume and self-service deflection rate. Initiative 3 — Sales productivity (Year 1-2): Current state: win rate is 18% (benchmark: 25%). Sales cycle is 120 days (benchmark: 75 days). Dashboard metric: sales funnel conversion by stage, time in each stage. Discovery: deals stall at the proposal stage for 45+ days. Root cause: proposals require 3 levels of approval and custom pricing for every deal. Action: standardize pricing tiers, reduce approval layers, create proposal templates. Dashboard tracking: win rate trend (target: 18% to 28%). Sales cycle trend (target: 120 days to 80 days). Revenue per sales rep (productivity measure)'"
    weight: 0.35
    description: "Initiatives"
  - type: llm_judge
    criteria: "Explanation covers the year 2-3 maturity progression and PE reporting — maturity: 'Year 2 — Optimization (mature the operating system): By year 2, the foundation is in place. Now optimize: Predictive dashboards: replace backward-looking metrics with forward-looking indicators. Revenue forecast with confidence intervals. Churn prediction model integrated into the CS dashboard. Pipeline aging analysis to predict deal slippage. Experimentation framework: every major initiative must be measured. Pricing change: compare cohorts before and after. Product changes: A/B test with control groups. Marketing campaigns: attribution modeling. The dashboards track experiment results and calculate ROI. Self-service analytics: 50% of data questions should be answered by business users without data team involvement. Looker explores are available to all managers. Training ensures they can answer questions like: what is our win rate for Enterprise deals in the Northeast this quarter? Advanced KPI decomposition: revenue decomposition tree shows exactly which drivers are improving and which are lagging. EBITDA waterfall: revenue growth contribution + margin improvement contribution + cost reduction contribution = total EBITDA improvement. Year 3 — Scale and exit-readiness: The PE firm is preparing for exit (sale or IPO). Metrics shift to: benchmark comparison: every KPI compared to public company benchmarks. NRR above 120%, gross margin above 75%, growth above 30% = attractive acquisition target. Rule of 40 dashboard: growth rate + profit margin. Target: above 40. Currently: 25% growth + 15% margin = 40. Hit. Cohort economics: LTV/CAC by vintage, showing improving unit economics over time. This is the story acquirers want to see. Board-ready metrics: auditable definitions, SOX-ready financial reporting, consistent reporting cadence. PE reporting package: monthly operating report with the 10 KPIs the PE firm tracks. Quarterly deep-dive with initiative-level ROI analysis. The dashboard system IS the company's operating system. When a buyer evaluates the company, the first thing they request is the metrics package. If it is clean, consistent, and tells a compelling story, the company commands a premium valuation'"
    weight: 0.30
    description: "Maturity"
