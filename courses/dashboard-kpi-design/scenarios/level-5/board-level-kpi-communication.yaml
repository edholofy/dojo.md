meta:
  id: board-level-kpi-communication
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Master board-level KPI communication — design board decks and dashboards that communicate company performance to a board of directors with the right metrics, narrative, and candor"
  tags: [board, governance, communication, investor, narrative, master]

state: {}

trigger: |
  A first-time CEO is preparing for their first board meeting. The
  lead investor (a seasoned VC partner) says: "I've seen hundreds of
  board decks. Most are terrible — either too many metrics with no
  narrative, or too much narrative with no metrics. I want you to show
  me: (1) are you executing on the plan we agreed on, (2) where you're
  struggling and what you're doing about it, and (3) what you need from
  the board. If I can't assess those three things in 15 minutes, the
  deck needs work."

  Task: Design the board metrics and dashboard package that meets
  this investor's expectations.

assertions:
  - type: llm_judge
    criteria: "Response designs a board metrics package — package: 'Board metrics package: The board deck has 3 sections, presented in 15 minutes: Section 1 — Executive summary (2 minutes, 1 slide): A single slide with 6 KPIs in a grid, each showing actual vs plan: KPI | Plan | Actual | Status. ARR | $38M | $35M | Yellow (92%). Gross margin | 75% | 72% | Yellow (96%). Net revenue retention | 120% | 112% | Yellow (93%). New logos | 50/quarter | 42 | Red (84%). Cash runway | 24 months | 22 months | Green. Headcount | 200 | 185 | Yellow (92%). Below the grid, a one-sentence summary: We are tracking behind plan on growth metrics (ARR, new logos) due to longer sales cycles in Enterprise, while unit economics (margin, retention) are improving QoQ. The investor reads this in 60 seconds and knows: mostly on track but growth is lagging. Section 2 — Detailed performance with narrative (10 minutes, 5 slides): Slide 2 — Revenue deep-dive: ARR waterfall: starting ARR $30M + new $5.2M + expansion $2.8M - churn $1.5M - contraction $1.5M = ending ARR $35M. New ARR of $5.2M is below the $8M plan. Root cause: 3 Enterprise deals worth $2.1M slipped from Q4 to Q1 (they are still in pipeline, expected to close in 6 weeks). Net: the miss is timing, not demand. Chart: ARR by cohort (vintage analysis) showing newer cohorts retain better. Slide 3 — Customer metrics: new logos (42 vs 50 target), logo churn 2.8%, NRR 112%. Cohort retention improving: 2025 cohorts retain at 118% vs 2024 cohorts at 108%. Slide 4 — Unit economics: CAC $18K (target $15K), CAC payback 16 months (target 12), LTV/CAC 4.2x (target 5x). Improving QoQ but not yet at target. Trend line shows trajectory to hit target by Q3 if current improvement continues. Slide 5 — Product: NPS 48 (target 55), feature adoption 28%, enterprise feature roadmap on track. Slide 6 — Team and operations: headcount 185 vs 200 plan (15 open positions). Attrition 12% annualized (industry average 15%). Key hires: VP Engineering joined, Head of CS starts next month. Section 3 — Forward look and asks (3 minutes, 2 slides): Slide 7 — Q1 forecast and risks. Slide 8 — Board asks'"
    weight: 0.35
    description: "Package"
  - type: llm_judge
    criteria: "Response covers board-appropriate metric selection and candor — selection: 'Board-appropriate metric selection: What boards care about (and what they do not): Boards care about: growth efficiency (ARR growth rate, net new ARR), unit economics (CAC, LTV, CAC payback, LTV/CAC ratio), retention (NRR, logo churn, cohort retention), profitability path (gross margin, operating margin, burn rate, runway), team capacity (headcount vs plan, key hires, attrition). Boards do NOT care about: daily active users (too operational), page views or session duration (vanity metrics), number of features shipped (output, not outcome), support ticket count (operational detail). Rule of thumb: if a metric does not affect the investment thesis, it does not belong in the board deck. The investment thesis for a growth-stage SaaS company is: grow ARR efficiently while improving unit economics toward profitability. Every board metric should connect to that thesis. Candor and trust: the most important quality in board communication is honesty. Presenting bad news with context: do NOT hide the ARR miss. Present it with the root cause and the recovery plan. Bad: ARR is $35M, growing well (hides the miss). Good: ARR is $35M, $3M below plan. Three Enterprise deals worth $2.1M slipped to Q1 — they are still in pipeline. Adjusted Q1 forecast includes them. The remaining $0.9M gap is from higher-than-expected SMB churn. We are launching a retention program in February. Boards respect CEOs who present problems with analysis and plans. They lose trust in CEOs who minimize or hide issues. The pre-read: send the board deck 48 hours before the meeting. Board members should arrive having read the data. The meeting time is for discussion, not for reading slides. Include a top 3 questions for discussion list with the pre-read so board members can prepare their input'"
    weight: 0.35
    description: "Selection"
  - type: llm_judge
    criteria: "Explanation covers the board asks section and ongoing board reporting cadence — cadence: 'The board asks section: Every board meeting should end with specific asks — what the CEO needs from the board. Ask types: 1. Introductions: We are hiring a VP of Marketing. If any board member can introduce candidates, it would accelerate the search. 2. Strategic input: We are considering entering the APAC market. We would value board perspective on timing and approach given the current economic environment. 3. Approval: We are requesting board approval for a $500K increase in marketing budget to fund the retention program discussed in the deck. 4. Awareness: We expect to close a $1.5M deal with a Fortune 500 company next month. This will be our largest deal to date and may require contract terms outside standard policy. Each ask is specific, actionable, and framed so the board can respond. Vague asks (we need help with growth) waste board time. Ongoing board reporting cadence: Monthly: CEO sends a 1-page investor update email. 5 KPIs (ARR, cash, pipeline, NRR, headcount). 3 highlights and 3 lowlights. One paragraph on outlook. Takes the CEO 30 minutes to write. Keeps investors informed between meetings. Quarterly: full board meeting (15-20 minutes of metrics presentation, 40 minutes of discussion). The full metrics package described above. One deep-dive topic per quarter (rotation: product strategy, go-to-market, team, finance). Annually: strategy review with the board. Full-year actuals vs plan. Next year's plan and targets. Update to the metrics framework if company strategy shifts. Board dashboard: in addition to the deck, provide a live Looker dashboard the board can access anytime. Same 6 KPIs as the executive summary. Updated monthly after the board close. Board members can check the latest numbers without waiting for the quarterly meeting. Access-controlled: board members see only the board view, not operational dashboards'"
    weight: 0.30
    description: "Cadence"
