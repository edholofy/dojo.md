meta:
  id: organizational-data-culture
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Build organizational data culture through dashboards — transform a company from gut-feel decision-making to metrics-driven culture where dashboards drive every meeting, decision, and initiative"
  tags: [data-culture, organizational-change, adoption, metrics-driven, master]

state: {}

trigger: |
  The CEO of a 1,500-person company says: "We spent $2M on our data
  stack — Snowflake, Looker, dbt, the whole modern data stack. We have
  200 dashboards. But when I walk into meetings, people still present
  opinions without data. Managers make hiring decisions based on gut
  feel. Product prioritization is driven by the loudest voice, not
  metrics. We have the tools but not the culture.

  I need you to design a program that transforms this company from
  data-available to data-driven. Dashboards exist — but nobody uses
  them to make decisions."

  Task: Design an organizational data culture transformation program
  centered on dashboard adoption and metrics-driven decision-making.

assertions:
  - type: llm_judge
    criteria: "Response designs a data culture transformation program — program: 'Data culture transformation program: Assessment — current state maturity: Level 1 (Data-Aware): the company knows data exists. Dashboards are built. This is where the company is today. Level 2 (Data-Informed): teams reference data in decisions but still rely on intuition for final calls. Level 3 (Data-Driven): every significant decision requires supporting data. Dashboards are the starting point of every meeting. Level 4 (Data-Native): data is embedded in every process. Teams self-serve analytics. Experimentation is the default. Target: move from Level 1 to Level 3 within 12 months. Phase 1 — Executive modeling (Months 1-3): Culture change starts at the top. The CEO commits to: every executive meeting starts with the company scorecard (2 minutes reviewing the dashboard). No strategic decision is approved without supporting data. The CEO asks what does the data say? in every discussion. Executive dashboard ritual: Monday 8 AM — CEO and directs review the company dashboard. Each VP presents their 3 KPIs: current value, trend, and one action they are taking. No slides — only the live dashboard on screen. This ritual signals to the entire organization: data matters here. VP training: 4-hour workshop for all VPs on how to read dashboards, ask data questions, and use metrics to make decisions. Focus: how to interpret trends (not just snapshot values), how to ask for drill-downs, how to connect metrics to business actions. Phase 2 — Manager enablement (Months 3-6): Train 150 managers to use dashboards in their daily work. Manager dashboard ritual: every team standup references the team dashboard. What changed since yesterday? What is off track? What action are we taking? Template: the standup starts with 60 seconds of dashboard review before discussion. Self-service training: 8-hour Looker training for all managers. Focus on building their own explores, setting up alerts, and scheduling reports. Goal: managers can answer 80% of their own data questions without filing a request to the data team. Data ambassador program: select 30 data-savvy managers (2 per department). They receive advanced training. They are the first point of contact for data questions in their department. They evangelize dashboard usage'"
    weight: 0.35
    description: "Program"
  - type: llm_judge
    criteria: "Response covers adoption measurement and behavior change mechanisms — adoption: 'Measuring data culture adoption: Dashboard usage metrics (leading indicators): Daily active dashboard users (target: 500 of 1,500 employees by month 6). Dashboard views per user per week (target: 3+). Self-service query count (target: 200/week by month 6, indicating managers exploring data themselves). Data request backlog (target: decrease 50% as self-service increases). Decision quality metrics (lagging indicators): Percentage of strategic decisions documented with supporting data (track in decision logs). A/B test velocity: number of experiments run per quarter (target: 10 per quarter by month 12). Forecast accuracy: compare predictions to outcomes (data-driven forecasts should improve over time). Time to decision: measure how long major decisions take (should decrease as data is readily available). Behavior change mechanisms: 1. Make data the path of least resistance: pre-populate meeting agendas with dashboard links. Embed KPIs in Slack channels (daily automated posts). Default every new project kickoff template to include a metrics section. 2. Celebrate data-driven wins: when a team uses data to make a decision that produces results, share the story company-wide. Monthly data hero recognition: highlight a person who used data to drive a meaningful outcome. Example: the marketing team used cohort analysis to identify that LinkedIn campaigns converted 3x better than Google ads, reallocated $50K in budget, and increased pipeline by 22%. 3. Address data anxiety: some employees are afraid of data — they fear it will expose poor performance. Training must include: data is for learning, not punishment. Dashboards show team performance, not individual blame. The goal is improvement, not surveillance. 4. Integrate data into performance reviews: add using data to make decisions as a competency in performance evaluations. Managers are evaluated on whether their team uses dashboards regularly. This connects data culture to career growth'"
    weight: 0.35
    description: "Adoption"
  - type: llm_judge
    criteria: "Explanation covers overcoming resistance and sustaining the culture change — resistance: 'Overcoming resistance: Resistance pattern 1 — the HiPPO (Highest Paid Person's Opinion): some executives override data with their opinion. Solution: the CEO must consistently ask what does the data say? when an executive presents an opinion. When data and intuition conflict, require an experiment: run a small test and let the data decide. Over time, the organization learns that opinions must be backed by data. Resistance pattern 2 — the data is wrong: teams that do not like what the data shows will attack the data instead of the conclusion. Solution: the metric governance system (certified definitions) makes this harder. If the revenue number is certified by the CFO, it is the official number. Teams cannot reject data without evidence of an error. When someone says the data is wrong, ask them to specify: which data point, what they believe the correct value is, and why. Resistance pattern 3 — we are too busy: managers say they do not have time to learn Looker or review dashboards. Solution: make dashboards save time, not cost time. The manager who checks the dashboard in 2 minutes catches a problem early. The manager who does not check spends 4 hours firefighting a problem that could have been prevented. Demonstrate the time savings with concrete examples. Resistance pattern 4 — analysis paralysis: some teams over-index on data and cannot make decisions without perfect information. Solution: establish a good enough standard. Not every decision needs a dashboard. Quick decisions (reversible, low impact) should be made in 5 minutes with basic data. Significant decisions (irreversible, high impact) warrant deeper analysis. Provide a decision framework: if the decision is easily reversible, move fast with directional data. If irreversible, invest in thorough analysis. Sustaining the culture: after 12 months, the formal program ends. Sustaining mechanisms: quarterly data literacy assessments for new hires (part of onboarding). Annual refresher training for managers. Data culture metrics on the executive scorecard (yes, measure the culture with a dashboard). The data team's charter includes culture support, not just dashboard building'"
    weight: 0.30
    description: "Resistance"
