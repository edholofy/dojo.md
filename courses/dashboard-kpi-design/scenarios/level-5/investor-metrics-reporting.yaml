meta:
  id: investor-metrics-reporting
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Design investor metrics reporting — build the metrics package that venture capital and private equity investors expect, covering SaaS benchmarks, cohort economics, and IPO-readiness metrics"
  tags: [investor, SaaS-metrics, benchmarks, IPO, fundraising, master]

state: {}

trigger: |
  The CFO is preparing for a Series C fundraise ($50M round). The
  lead VC partner says: "Before we proceed with due diligence, I need
  your metrics package. I want to see: SaaS unit economics, cohort-
  level data, capital efficiency metrics, and how you compare to public
  company benchmarks. The quality of your metrics tells me as much
  about the company as the metrics themselves."

  Task: Design the investor metrics package for a Series C SaaS
  company.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive investor metrics package — package: 'Investor metrics package for Series C: Section 1 — Growth metrics: ARR: $35M. Growth rate: 65% YoY (last year: $21.2M). Net new ARR by quarter: Q1 $2.8M, Q2 $3.1M, Q3 $3.5M, Q4 $4.6M. Acceleration: net new ARR grew 64% from Q1 to Q4. NNAARR (next twelve months net new ARR implied): $14M+ at current trajectory. Revenue composition: subscription (recurring): 92%. Services: 6%. Usage-based: 2%. High recurring percentage is favorable — investors value predictability. Customer count and segmentation: total customers: 1,240. Enterprise (>$50K ACV): 85 customers, $18M ARR (51% of ARR). Mid-market ($10K-$50K): 320 customers, $12M ARR (34%). SMB (<$10K): 835 customers, $5M ARR (14%). Enterprise concentration is good — large, sticky customers. No single customer exceeds 3% of ARR (low concentration risk). Section 2 — Unit economics: CAC (Customer Acquisition Cost): total S&M spend / new customers acquired. Last 12 months: $8.4M S&M / 480 new customers = $17,500 CAC. By segment: Enterprise CAC $45K, Mid-market $18K, SMB $8K. LTV (Lifetime Value): ARPC / churn rate (simplified). Enterprise: $212K ACV / 5% annual churn = $4.2M LTV. Mid-market: $37.5K / 10% = $375K LTV. SMB: $6K / 18% = $33K LTV. LTV/CAC ratio: Enterprise: 93x. Mid-market: 21x. SMB: 4.2x. All segments are above the 3x threshold. Enterprise is extremely efficient. CAC payback period: months to recover CAC from gross margin. Enterprise: 8 months. Mid-market: 7 months. SMB: 12 months. Target: under 18 months. All segments pass. Magic number: net new ARR / prior quarter S&M spend. Q4: $4.6M net new ARR / $2.4M Q3 S&M = 1.92. Above 1.0 is efficient. 1.92 is excellent — every $1 of S&M produces $1.92 of ARR'"
    weight: 0.35
    description: "Package"
  - type: llm_judge
    criteria: "Response covers cohort economics and retention analysis — cohorts: 'Cohort economics: Dollar retention by cohort (the most important chart for investors): Vintage | Month 12 | Month 24 | Month 36 | Month 48. 2022 cohort | 108% | 112% | 118% | 122%. 2023 cohort | 115% | 125% | -- | --. 2024 cohort | 118% | -- | -- | --. 2025 cohort | 122% (projected) | -- | -- | --. Key insight: each successive cohort retains and expands better than the prior cohort. 2024 cohort retains at 118% at month 12 vs 108% for 2022 cohort. This proves the product is getting stickier over time. Investors love this pattern — it means the business gets better as it scales. Gross dollar retention (GDR): measures revenue retained excluding expansion. GDR: 92% (8% of revenue churns or contracts annually). Target: above 90% for B2B SaaS. We pass. Net dollar retention (NDR): measures revenue retained including expansion. NDR: 118% (customers grow 18% annually after accounting for churn). Target: above 110% for growth-stage SaaS. We exceed. Cohort payback visualization: for each cohort, chart cumulative gross margin over time. The x-axis is months since acquisition. The y-axis is cumulative gross margin minus CAC. When the line crosses zero, CAC is recovered. 2024 Enterprise cohort: payback at month 8. 2024 Mid-market cohort: payback at month 7. 2024 SMB cohort: payback at month 12. All cohorts recover CAC within 12 months — capital efficient. Logo retention vs dollar retention: logo retention: 88% (12% of customers churn). Dollar retention: 118% (remaining customers expand enough to offset churn and grow). The gap between logo and dollar retention shows strong expansion — even though some customers leave, the remaining customers spend significantly more over time'"
    weight: 0.35
    description: "Cohorts"
  - type: llm_judge
    criteria: "Explanation covers benchmarking and IPO-readiness metrics — benchmarks: 'Public company benchmarking: Compare the company's metrics to public SaaS benchmarks (Bessemer Cloud Index, KeyBanc SaaS Survey): Metric | Our company | Top quartile public SaaS | Median public SaaS. ARR growth | 65% | 40%+ | 20-30%. NDR | 118% | 130%+ | 110-120%. Gross margin | 74% | 80%+ | 70-75%. CAC payback | 8 months | <12 months | 12-18 months. LTV/CAC | 21x (blended) | 10x+ | 5-8x. Rule of 40 | 65% growth + (-12%) margin = 53 | 40+ | 30-40. Burn multiple | $8.4M burned / $13.8M net new ARR = 0.61 | <1.0 | 1.0-2.0. Positioning: our growth rate (65%) is top-decile. Our burn multiple (0.61) is excellent — we burn $0.61 for every $1 of net new ARR. Gross margin (74%) is slightly below top quartile — room to improve with infrastructure optimization. NDR (118%) is strong but below top quartile (130%) — opportunity to improve expansion. The investor reads this benchmarking and concludes: this company is growing efficiently with strong unit economics. The areas to improve (gross margin, NDR) are addressable. IPO-readiness metrics (for the Series C narrative): companies IPO at approximately $200-300M ARR with decelerating but consistent growth. At 65% growth, we reach $100M ARR in approximately 2.5 years. IPO timeline: 3-4 years post-Series C (2029-2030). Financial controls: SOX-readiness starts at Series C. Metric definitions must be auditable. Revenue recognition must follow ASC 606. The metrics package itself demonstrates operational maturity. Investors assess not just the numbers but the sophistication of how they are tracked. A company with a clean, consistent, well-documented metrics package signals strong operations — which correlates with strong execution'"
    weight: 0.30
    description: "Benchmarks"
