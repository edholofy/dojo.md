meta:
  id: data-democratization-strategy
  level: 5
  course: dashboard-kpi-design
  type: output
  description: "Design a data democratization strategy — enable every employee to access, understand, and use data for decision-making while maintaining governance, quality, and security"
  tags: [democratization, self-service, governance, literacy, access, master]

state: {}

trigger: |
  The CDO (Chief Data Officer) presents to the executive team: "We
  have a data team of 12 people serving 800 employees. Our request
  backlog is 6 weeks. Business users wait 6 weeks for a dashboard or
  report. By the time they get it, the decision has already been made
  on gut feel — or the question has changed.

  I want to flip the model: instead of 12 people serving 800, I want
  800 people serving themselves. The data team should build the
  platform and governance. Business users should answer their own
  questions."

  Task: Design a data democratization strategy that enables self-
  service analytics while maintaining data quality and governance.

assertions:
  - type: llm_judge
    criteria: "Response designs a data democratization architecture — architecture: 'Data democratization architecture: Current state problem: centralized model where every data question flows through the data team. 800 employees → 12-person data team → 6-week backlog → stale answers. Target state: federated model where business users self-serve for 80% of questions. 800 employees → self-service platform → instant answers for routine questions. 12-person data team → complex analysis, platform maintenance, governance → 1-week turnaround for the 20% that requires expert help. Architecture layers: Layer 1 — Curated data layer (built by data team): certified datasets in Snowflake, modeled by dbt, documented in a data catalog. Every table has: description of what it contains. Column-level descriptions. Data freshness SLA. Certification status (certified by the data team, or exploratory/uncertified). Business users can query certified datasets with confidence. They know the data is clean, documented, and trustworthy. Layer 2 — Self-service exploration (used by business users): Looker explores allow business users to ask questions by selecting dimensions and measures. The metric layer (LookML) ensures calculations are consistent. Example: a marketing manager wants to know conversion rate by campaign by region for the last 90 days. In the centralized model: file a data request → wait 6 weeks → receive a static report. In the democratized model: open the Marketing explore in Looker → select conversion rate (measure) → add campaign and region (dimensions) → set date filter to last 90 days → click Run. Answer in 30 seconds. Layer 3 — Governed publishing (controlled by data team): business users can create and save their own dashboards (self-service). But only the data team can promote a dashboard to certified status (governance). Certified dashboards appear in the official directory. Self-service dashboards are clearly marked as user-created, uncertified. This allows experimentation without polluting the official dashboard layer'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers data literacy program and self-service enablement — literacy: 'Data literacy program: Not every employee needs to be a data analyst. Define skill tiers: Tier 1 — Data consumer (all 800 employees): can read dashboards, interpret trends, and understand KPIs. Training: 2-hour dashboard reading workshop. Covers: how to read a chart, what trends mean, what the colors indicate, how to use filters. Delivered during onboarding for new hires. Tier 2 — Data explorer (200 employees, target 25%): can use Looker explores to ask their own questions, build simple reports, and set up alerts. Training: 8-hour Looker self-service workshop. Covers: how to build an explore, select dimensions and measures, apply filters, save and share reports. Requires passing a quiz: can you build a report showing revenue by region for Q4? Tier 3 — Data creator (50 employees, target 6%): can build dashboards, write LookML (with review), and perform analysis. Training: 20-hour advanced analytics program. Covers: dashboard design principles, basic SQL, LookML fundamentals, statistical concepts. These are the data ambassadors in each department. Tier 4 — Data team (12 employees): builds the platform, manages governance, handles complex analysis. Certification and recertification: Tier 2 and 3 users are recertified annually. If a Tier 2 user has not logged into Looker in 6 months, their access is downgraded to Tier 1. This prevents unused licenses and ensures active users are current on best practices. Self-service enablement tools: data catalog: searchable directory of all datasets and metrics. Business users search for revenue and find the certified revenue dataset with documentation, lineage, and sample queries. Suggested explores: when a user opens Looker, they see suggested starting points based on their department. A marketing user sees: Campaign Performance, Lead Funnel, Channel Attribution. A sales user sees: Pipeline, Rep Performance, Deal Analysis. Saved question library: frequently asked questions with pre-built answers. New users browse the library before building their own reports, learning from examples'"
    weight: 0.35
    description: "Literacy"
  - type: llm_judge
    criteria: "Explanation covers governance guardrails and measuring democratization success — guardrails: 'Governance guardrails: Democratization without governance is chaos. The balance: empower users to explore while preventing data misuse. Guardrail 1 — Certified vs exploratory: certified datasets and dashboards are the source of truth. The board deck, executive meetings, and official reports must use certified assets. Self-service dashboards can use any data but are clearly marked uncertified. If a business user's analysis contradicts a certified metric, the certified metric is correct until proven otherwise. Guardrail 2 — PII and sensitive data: restrict access to personally identifiable information (PII), financial data, and HR data. Tier 2 users can explore revenue by segment but cannot see individual customer names or contract values. Looker access filters hide columns containing PII unless the user has explicit approval. Guardrail 3 — Query cost controls: self-service users might accidentally run expensive queries. Set query cost limits: Tier 2 users are limited to queries scanning less than 100GB. If a query exceeds the limit, it is blocked with: this query scans 250GB of data. Please add filters to narrow the date range or scope. Tier 3 and 4 users have higher limits. Guardrail 4 — Dashboard proliferation controls: without controls, 200 self-service users will create 500 dashboards. Rules: dashboards unused for 90 days are auto-archived. New dashboards must have a description and audience. Monthly cleanup: the data team reviews new user-created dashboards and promotes the best ones to certified status. Measuring success: primary metric: data team request backlog. Target: reduce from 6 weeks to 1 week within 12 months. Self-service adoption: percentage of data questions answered without data team involvement. Target: 80%. Time to insight: how long from question to answer for a business user. Target: under 5 minutes for standard questions. Data team leverage: ratio of certified assets created by the data team to self-service reports created by business users. Target: 1:10 (for every certified asset, 10 self-service reports are built on top of it). User satisfaction: quarterly survey of business users. Do you have the data you need to make decisions? Target: 80% yes'"
    weight: 0.30
    description: "Guardrails"
