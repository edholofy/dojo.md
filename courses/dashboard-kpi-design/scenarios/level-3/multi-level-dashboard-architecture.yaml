meta:
  id: multi-level-dashboard-architecture
  level: 3
  course: dashboard-kpi-design
  type: output
  description: "Design multi-level dashboard architecture — build strategic, tactical, and operational dashboard layers that connect executive summaries to ground-level detail"
  tags: [architecture, strategic, tactical, operational, drill-path, advanced]

state: {}

trigger: |
  The company has 47 dashboards. Nobody knows which one to look at.
  The VP of Operations says: "I check 6 different dashboards every
  morning and they sometimes contradict each other." The CEO says:
  "I need one number that tells me if the business is healthy, and
  then I want to drill into the details if something looks wrong."

  Investigation reveals dashboards were built ad-hoc over 3 years by
  different analysts. No hierarchy, no naming convention, no ownership.

  Task: Design a multi-level dashboard architecture that organizes
  all dashboards into a coherent hierarchy.

assertions:
  - type: llm_judge
    criteria: "Response designs a three-layer dashboard hierarchy — hierarchy: 'Multi-level dashboard architecture: Layer 1 — Strategic dashboards (for executives): Purpose: answer Is the business healthy? in under 60 seconds. Audience: CEO, CFO, board members. Refresh: daily. Content: 5-8 KPIs maximum. No filters, no drill-down complexity. Company Health Dashboard: Revenue: $4.2M MRR ↑8% MoM. Green. Customers: 1,240 ↑3% MoM. Green. Churn: 3.2% ↓0.5pp MoM. Green. NPS: 52 ↑4 pts. Green. Burn rate: $1.8M/month. Yellow (above target of $1.5M). Runway: 18 months. Green. Each KPI is a card with current value, trend, and status color. The CEO scans this in 30 seconds. If something is yellow or red, they click through to Layer 2. Layer 2 — Tactical dashboards (for VPs and directors): Purpose: answer Why is this metric moving? and What should we do? Audience: VP Sales, VP Product, VP Engineering, etc. Refresh: daily or hourly. Content: 10-15 metrics with filters and time comparisons. Revenue Tactical Dashboard (linked from the Revenue KPI in Layer 1): MRR by segment: Enterprise $2.8M, SMB $1.0M, Startup $0.4M. New MRR: $180K this month. Expansion MRR: $95K. Churned MRR: $42K. Net new: $233K. Pipeline: $1.2M weighted. Expected close this month: $320K. Revenue by region, by product line, by sales rep. The VP Sales sees where revenue is growing, where it is declining, and what the pipeline looks like. They can filter by region or time period. Layer 3 — Operational dashboards (for managers and ICs): Purpose: answer What do I need to do right now? Audience: sales reps, support agents, engineers. Refresh: real-time or near real-time. Content: detailed, filterable, actionable data. Sales Rep Dashboard (linked from the rep-level data in Layer 2): My deals: 12 active, 3 closing this week, 2 at risk. Today's tasks: 5 follow-up calls, 2 demos scheduled. Quota attainment: 78% with 8 days remaining. The rep sees their personal metrics and actionable items. This dashboard drives daily work'"
    weight: 0.35
    description: "Hierarchy"
  - type: llm_judge
    criteria: "Response covers drill-down paths and cross-dashboard navigation — navigation: 'Drill-down paths connecting the layers: The power of multi-level architecture is the drill path — the ability to start at the top and navigate to the root cause. Example drill path: CEO sees: Revenue $4.2M MRR (green, but growth slowing). Click → Revenue Tactical Dashboard. VP sees: Enterprise $2.8M (strong), SMB $1.0M (declining ↓8%). Click → SMB segment detail. Director sees: SMB churn increased in APAC region. 3 accounts churned last week. Click → Churn detail for APAC. Manager sees: 3 churned accounts all cited pricing as the reason. All were on the legacy plan. The CEO went from business is healthy but growth is slowing to the specific root cause (legacy pricing in APAC) in 4 clicks. Navigation design: every KPI at Layer 1 links to a specific Layer 2 dashboard. Every dimension in Layer 2 (segment, region, product) links to the relevant Layer 3 detail. Breadcrumb navigation shows the drill path: Company Health → Revenue → SMB → APAC. Back buttons preserve filter state — clicking back from APAC returns to the SMB view, not the top level. Cross-linking between dashboards: the Revenue dashboard links to the Customer dashboard when viewing customer-level revenue data. The Product dashboard links to the Engineering dashboard when viewing feature adoption tied to release velocity. These cross-links connect related insights across functional areas'"
    weight: 0.35
    description: "Navigation"
  - type: llm_judge
    criteria: "Explanation includes dashboard governance and consolidation — governance: 'Dashboard governance and consolidation: Consolidating 47 dashboards: Audit all 47 dashboards. For each, record: name, owner, audience, last viewed date, data sources, overlap with other dashboards. Findings (typical): 12 dashboards have not been viewed in 90+ days → archive immediately. 8 dashboards are duplicates or near-duplicates → merge into one. 15 dashboards serve a clear purpose and audience → keep and categorize. 12 dashboards need redesign to fit the new architecture → redesign. Result: 47 dashboards become 15-20 organized dashboards across 3 layers. Governance rules: naming convention: [Layer]-[Department]-[Purpose]. Examples: Strategic-Company-Health, Tactical-Sales-Revenue, Operational-Support-Queue. Every dashboard must have an owner (a named person, not a team). The owner is responsible for accuracy, relevance, and performance. New dashboard request process: submit a request describing the audience, purpose, and what decisions it enables. The data team checks if an existing dashboard already answers the question. If yes, add a view or filter to the existing dashboard instead of creating a new one. Quarterly dashboard review: review usage metrics. Dashboards with fewer than 5 views per month are candidates for archiving. This prevents dashboard sprawl from recurring'"
    weight: 0.30
    description: "Governance"
