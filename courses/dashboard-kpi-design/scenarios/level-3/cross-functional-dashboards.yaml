meta:
  id: cross-functional-dashboards
  level: 3
  course: dashboard-kpi-design
  type: output
  description: "Build cross-functional dashboards — design shared dashboards that align multiple departments around common metrics and reveal interdependencies between teams"
  tags: [cross-functional, alignment, shared-metrics, interdependency, advanced]

state: {}

trigger: |
  The COO says: "Every department has their own dashboard but nobody
  sees the connections. Marketing celebrates a record number of leads
  but Sales says lead quality is terrible. Product ships features but
  Support tickets spike after each release. Engineering improves
  uptime but nobody connects that to customer retention.

  I need a dashboard that shows how these departments affect each
  other — a single view that reveals the whole customer journey from
  marketing to retention."

  Task: Design a cross-functional dashboard that shows how metrics
  from different departments connect and influence each other.

assertions:
  - type: llm_judge
    criteria: "Response designs a customer journey funnel dashboard across departments — funnel: 'Cross-functional customer journey dashboard: The dashboard follows the customer lifecycle from acquisition to retention, showing each department's contribution. Layout — horizontal funnel flow: Marketing → Sales → Product → Support → Success. Each stage shows the department's key metrics and the handoff quality to the next stage. Stage 1 — Marketing (Awareness → Leads): Visitors: 120,000/month ↑15%. Leads generated: 4,800/month ↑22%. Cost per lead: $45 ↓10%. Lead quality score: 62/100 ↓8 points. The handoff metric to Sales: Marketing Qualified Leads (MQLs): 2,400 (50% of leads). Handoff quality: declining — more leads but lower quality. Stage 2 — Sales (Leads → Customers): MQLs received: 2,400. SQL conversion rate: 35% (840 SQLs). Won deals: 210/month ↑5%. Average deal size: $4,200 ↓12%. Sales cycle: 38 days ↑5 days. Handoff quality from Marketing: Sales says only 35% of MQLs are truly qualified → feedback loop to Marketing. The dashboard shows: Marketing is generating more leads but Sales is converting fewer — the quality gap is visible. Stage 3 — Product (Customers → Active Users): New user onboarding completion: 58%. Feature adoption (latest release): 23% within 7 days. DAU/MAU ratio: 0.38. Core action completion: 82%. Handoff to Support: bugs reported per release ↑40%. The dashboard connects: releases that increase adoption but also increase support tickets. Stage 4 — Support (Issues → Resolution): Tickets per 100 users: 8.2 ↑15%. First response time: 4.2 hours. Resolution time: 18 hours. CSAT: 3.8/5.0. Handoff to Success: escalated accounts: 45 this month ↑20%. Stage 5 — Customer Success (Retention): Net revenue retention: 108%. Churn rate: 3.2%. Expansion revenue: $95K/month. NPS: 52. The complete funnel shows: Marketing drives volume, Sales converts, Product activates, Support resolves, Success retains. Problems in one stage cascade downstream'"
    weight: 0.35
    description: "Funnel"
  - type: llm_judge
    criteria: "Response covers metric interdependencies and feedback loops — interdependencies: 'Metric interdependencies: The cross-functional dashboard reveals connections that siloed dashboards hide: Connection 1 — Marketing lead quality → Sales conversion: when lead quality score drops from 70 to 62, SQL conversion drops from 42% to 35% one month later. Scatter plot: lead quality score (x-axis) vs SQL conversion rate (y-axis) by month. The correlation is visible. Action: Marketing and Sales agree on a minimum lead quality score of 65. Leads below 65 are nurtured, not sent to Sales. Connection 2 — Product releases → Support tickets: each product release causes a 40% spike in support tickets for 2 weeks. Timeline chart: vertical markers for each release date, with support ticket volume overlaid. Every spike aligns with a release. Action: Product team includes 2 days of support documentation and known-issue communication before each release. Connection 3 — Support resolution → Churn: customers with more than 3 unresolved tickets in 30 days churn at 4x the normal rate. Churn rate by support interaction: 0 tickets = 2% churn. 1-2 tickets = 3% churn. 3+ unresolved tickets = 12% churn. Action: auto-escalate any customer with 3+ open tickets to Customer Success for proactive outreach. Connection 4 — Onboarding completion → Lifetime value: users who complete onboarding have 3x higher LTV than those who do not. Onboarding: completed = $12,600 LTV. Not completed = $4,200 LTV. Action: Product prioritizes improving onboarding completion from 58% to 75%. The estimated revenue impact: 17pp improvement × 210 new customers/month × $8,400 LTV difference = $300K additional annual revenue. The dashboard makes these connections visible to leadership in one view'"
    weight: 0.35
    description: "Interdependencies"
  - type: llm_judge
    criteria: "Explanation covers shared metric ownership and cross-team alignment — alignment: 'Shared metric ownership: The cross-functional dashboard requires shared ownership of handoff metrics. Handoff metrics belong to BOTH teams: MQL quality: owned jointly by Marketing (generation) and Sales (feedback). Marketing cannot optimize for volume alone — they must maintain quality above the agreed threshold. Onboarding completion: owned jointly by Product (design) and Customer Success (follow-up). Product builds the flow, CS follows up with users who drop off. Support ticket volume post-release: owned jointly by Engineering (code quality) and Support (documentation). Engineering tracks bugs-per-release as a quality metric. Cross-team alignment meetings: the COO holds a monthly cross-functional review using this dashboard. Agenda: review each stage of the funnel. Identify bottlenecks — where is the funnel narrowing? Trace problems upstream — if churn is up, look at support, then product, then onboarding. Agree on 2-3 cross-team initiatives per quarter. Example: Marketing and Sales align on lead scoring model updates. Product and Support plan joint release readiness process. Support and Success create an early warning system for at-risk accounts. Dashboard governance for cross-functional views: neutral ownership — the cross-functional dashboard is owned by the data team or the COO's office, not by any single department. This prevents any team from biasing the metrics in their favor. Every department has input on their section's metrics but cannot change the overall narrative. The dashboard is the single source of truth for how the customer journey performs end-to-end'"
    weight: 0.30
    description: "Alignment"
