meta:
  id: predictive-kpi-dashboards
  level: 3
  course: dashboard-kpi-design
  type: output
  description: "Design predictive KPI dashboards — incorporate forecasts, projections, and leading indicators that show where metrics are heading, not just where they have been"
  tags: [predictive, forecasting, projections, leading-indicators, advanced]

state: {}

trigger: |
  The CEO says: "Our dashboards are like driving by looking in the
  rearview mirror. They tell me what happened last month but not what's
  going to happen next month. When I ask 'will we hit our quarterly
  target?', nobody can answer until the quarter is almost over.
  I need forward-looking dashboards."

  Task: Redesign the executive dashboard to include predictive elements
  — forecasts, projections, and leading indicators that anticipate
  future performance.

assertions:
  - type: llm_judge
    criteria: "Response designs a forward-looking executive dashboard — dashboard: 'Predictive executive dashboard: Section 1 — Current vs forecast: Revenue KPI card (redesigned): Actual (month to date): $1.4M. Forecast (end of month): $2.1M. Target: $2.0M. Confidence: 85% likely to hit target. Status: green. The traditional dashboard would show only $1.4M (actual) — which is meaningless without context on where the month will land. The forecast adds: at current trajectory plus pipeline, we expect $2.1M. Forecast methods: Linear projection: extend the current run rate. If we earned $1.4M in 20 days, we will earn $2.1M in 30 days. Pipeline-weighted: add weighted pipeline deals by close probability. $800K in pipeline × 60% average close rate = $480K expected. Combined forecast: $1.4M actual + $480K weighted pipeline + $220K projected organic = $2.1M. Forecast confidence band: show the forecast as a range: optimistic ($2.4M), expected ($2.1M), pessimistic ($1.7M). Line chart: revenue by day with three lines: actual (solid, ends at today), forecast expected (dashed, extends to month end), optimistic and pessimistic (light shaded area). A vertical line marks today — everything to the left is actual, everything to the right is forecast. The CEO sees: we are on track to exceed target, with 85% confidence. Section 2 — Quarterly trajectory: Quarter target: $6.0M. Month 1 actual: $2.2M (hit target). Month 2 forecast: $2.1M (on track). Month 3 needed: $1.7M (below average — achievable). Quarter forecast: $6.3M. Confidence: 78%. Bar chart: stacked bars for each month — actual (solid) and forecast (hatched). The quarterly view tells the CEO whether to worry about the quarter, not just the month'"
    weight: 0.35
    description: "Dashboard"
  - type: llm_judge
    criteria: "Response covers leading indicators and their use in prediction — leading: 'Leading indicators on the dashboard: Leading indicators predict future outcomes. They change before the lagging metric changes. For revenue (lagging), the leading indicators are: 1. Pipeline created this month: $1.8M. If pipeline creation slows, revenue will slow 1-2 months later. Trend: ↑12% vs last month. Green. 2. Demo-to-close conversion rate: 28%. If conversion drops, fewer deals close next month. Trend: stable. Green. 3. Average sales cycle length: 34 days. If the cycle lengthens, revenue pushes out. Trend: ↑3 days vs last quarter. Yellow. 4. Website traffic and trial signups: 4,200 trials this month ↑8%. More trials today mean more customers in 30-60 days. Green. For churn (lagging), the leading indicators are: 1. Support ticket volume per customer: 2.1 tickets/customer this month ↑40%. Rising support needs predict churn 30-60 days out. Red. 2. Product usage (DAU/MAU ratio): 0.38 ↓ from 0.42. Declining engagement precedes churn. Yellow. 3. NPS detractor percentage: 22% ↑ from 15%. Unhappy customers churn within 90 days. Red. Dashboard layout: a Leading Indicators panel next to each lagging KPI. Revenue card shows $2.1M forecast → next to it: Pipeline ↑, Conversion stable, Cycle lengthening. Churn card shows 3.2% → next to it: Support tickets ↑, Engagement ↓, NPS declining. The viewer reads the lagging metric (where we are) and the leading indicators (where we are heading). Red leading indicators next to a green lagging metric means: the lagging metric will turn red soon. Act now'"
    weight: 0.35
    description: "Leading"
  - type: llm_judge
    criteria: "Explanation covers forecast accuracy and communicating uncertainty — uncertainty: 'Communicating forecast uncertainty: Forecasts are estimates, not guarantees. The dashboard must communicate uncertainty clearly. Methods: 1. Confidence intervals: show the forecast as a range. Revenue forecast: $2.1M (expected), $1.7M-$2.4M (80% confidence interval). This means: there is an 80% chance revenue will fall between $1.7M and $2.4M. Visualize as a shaded fan chart — wider bands further in the future. 2. Scenario labels: instead of a single number, show three scenarios. Best case: $2.4M (3 large deals close early). Expected: $2.1M (normal close rates). Worst case: $1.7M (2 deals slip to next month). The CEO can plan for the expected while preparing for the worst case. 3. Forecast accuracy tracking: show how accurate past forecasts were. Last month: forecast $2.0M, actual $2.2M. Accuracy: 90%. Track forecast accuracy over time. If accuracy is below 70%, the forecast methodology needs improvement. Show a small accuracy score next to each forecast so the viewer calibrates their trust. 4. Forecast vs actual waterfall: at the end of each period, show what drove the difference between forecast and actual. Forecast: $2.0M. Deals closed earlier than expected: +$150K. Unexpected churn: -$80K. New inbound deal: +$130K. Actual: $2.2M. This builds intuition about what the forecast captures and what it misses. 5. Do not show decimal precision that implies false accuracy: $2,134,567 suggests precision to the dollar. Revenue forecasts are not that precise. Show $2.1M — the appropriate level of precision for a forecast. Round to the level of precision the method supports'"
    weight: 0.30
    description: "Uncertainty"
