meta:
  id: leading-vs-lagging
  level: 2
  course: dashboard-kpi-design
  type: output
  description: "Balance leading and lagging indicators — pair predictive metrics with outcome metrics to create dashboards that show both where you've been and where you're heading"
  tags: [leading-indicators, lagging-indicators, prediction, outcome, balance, intermediate]

state: {}

trigger: |
  The head of customer success presents the quarterly dashboard:
  "Churn rate is 4.2% — up from 3.1% last quarter." The CEO asks:
  "Why didn't we see this coming? By the time churn shows up, the
  customers are already gone. I need earlier warning signals."

  The current dashboard only shows lagging indicators: revenue,
  churn, customer count, NPS. By the time these change, the damage
  is done.

  Task: Redesign the dashboard to include leading indicators that
  predict problems before they appear in lagging metrics.

assertions:
  - type: llm_judge
    criteria: "Response defines leading vs lagging and pairs them for customer success — pairing: 'Leading vs lagging indicators: Lagging indicators measure outcomes — they tell you what already happened. Revenue, churn rate, NPS, customer count. By the time churn rises to 4.2%, those customers decided to leave weeks or months ago. Leading indicators measure activities and signals that predict future outcomes. They tell you what is going to happen. The key: leading indicators are actionable now. Lagging indicators are only observable after the fact. Customer success leading and lagging pairs: Lagging: Churn rate (4.2%). Leading: Product login frequency. If a customer's weekly logins drop from 15 to 2, they are disengaging. This signal appears 4-6 weeks before they cancel. Action: proactive outreach when logins decline. Lagging: NPS score (declining). Leading: Support ticket volume and sentiment. A spike in support tickets with negative sentiment predicts an NPS decline next quarter. Action: address common complaints before the NPS survey. Lagging: Revenue decline. Leading: Pipeline value and renewal rate forecast. If renewals scheduled for next quarter have low health scores, revenue will decline. Action: assign CS managers to at-risk renewals. Lagging: Customer count decrease. Leading: Feature adoption rate for new customers. If new customers are not adopting the core feature within 30 days, they will churn within 90 days. Action: improve onboarding, increase touchpoints with new customers'"
    weight: 0.35
    description: "Pairing"
  - type: llm_judge
    criteria: "Response redesigns the dashboard with both indicator types — redesign: 'Redesigned customer success dashboard: Left column — Leading indicators (early warning): 1. Customer Health Score distribution: a composite score (0-100) based on login frequency, feature adoption, support ticket sentiment, and billing status. Show as a histogram: how many customers are in healthy (green, 70-100), at-risk (yellow, 40-69), and critical (red, 0-39) ranges. Today: 120 customers in critical (up from 80 last month) — this predicts churn will increase further if not addressed. 2. Weekly login trend: line chart showing average logins per customer over the past 12 weeks. A declining trend means engagement is dropping across the base. 3. Support ticket sentiment: percentage of tickets with negative sentiment over the past 4 weeks. Rising negative sentiment predicts NPS decline. 4. Feature adoption rate: percentage of customers using the core feature at least once per week. A dip below 60% predicts increased churn. Right column — Lagging indicators (outcomes): 1. Churn rate: 4.2% (KPI card with 12-month trend). 2. NPS: 48 (KPI card with quarterly trend). 3. Revenue: $2.1M (KPI card with MoM comparison). 4. Customer count: 850 (KPI card with net adds/losses). The viewer reads left-to-right: leading indicators on the left explain why lagging indicators on the right are changing. If 120 customers are in critical health (left), the viewer understands why churn is 4.2% (right). More importantly, they can act on the left column to prevent the right column from getting worse'"
    weight: 0.35
    description: "Redesign"
  - type: llm_judge
    criteria: "Explanation covers the time-lag relationship and monitoring cadence — timelag: 'Time-lag between leading and lagging: Every leading indicator has a time delay before it appears in the lagging indicator. Login frequency decline → churn appears 4-6 weeks later. Support ticket spike → NPS decline appears 1 quarter later. Pipeline health decline → revenue decline appears 1-2 quarters later. Feature adoption drop → churn increase appears 2-3 months later. Understanding the time lag is critical: if login frequency drops today and churn takes 6 weeks to show, the team has a 6-week intervention window. This is the value of leading indicators — they buy time to act. Monitoring cadence: Leading indicators: monitor daily or weekly. These change fast and require quick response. If customer health scores drop, act within days. Lagging indicators: monitor monthly or quarterly. These change slowly and reflect the cumulative effect of many leading indicator changes. Churn rate does not change overnight. Dashboard alert design: set alerts on leading indicators, not lagging indicators. Alert: 15 customers moved from healthy to at-risk this week (leading). Do not alert: churn rate increased 0.3% this month (lagging — too late to act). The leading indicator alert triggers action. The lagging indicator confirms whether the action worked'"
    weight: 0.30
    description: "TimeLag"
