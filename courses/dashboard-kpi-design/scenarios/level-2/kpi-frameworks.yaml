meta:
  id: kpi-frameworks
  level: 2
  course: dashboard-kpi-design
  type: output
  description: "Apply KPI frameworks — use OKRs, Balanced Scorecard, HEART, and AARRR to structure metric selection for different business contexts"
  tags: [OKR, balanced-scorecard, HEART, AARRR, frameworks, intermediate]

state: {}

trigger: |
  Three different companies ask for help selecting KPIs:

  Company A (B2B SaaS, Series B): "We're growing fast but losing
  focus. Leadership sets goals but nobody knows what metrics to
  track to prove we're hitting them."

  Company B (Consumer mobile app): "We have 2 million downloads
  but can't figure out which UX metrics to track. Users say they
  like the app but we're not retaining them."

  Company C (E-commerce marketplace): "We need to track our growth
  funnel from acquisition to revenue but don't know how to structure
  it."

  Task: Recommend the right KPI framework for each company and
  show how to apply it.

assertions:
  - type: llm_judge
    criteria: "Response applies OKRs for Company A and Balanced Scorecard context — okr: 'Company A — OKRs (Objectives and Key Results): Why OKRs: the problem is alignment — leadership sets goals but teams do not know what to track. OKRs explicitly connect ambitious objectives to measurable key results. Structure: Objective (qualitative, aspirational): Become the market leader in our category. Key Results (quantitative, measurable): KR1: increase ARR from $5M to $8M by end of Q2. KR2: achieve net revenue retention of 120%. KR3: reduce sales cycle from 45 days to 30 days. KR4: launch in 2 new markets with 50 customers each. Each key result is a KPI on the dashboard. The team can check daily: are we on track for $8M ARR? OKR dashboard design: one section per objective. Under each objective, 3-5 key results with progress bars. Current value, target value, percentage complete, and status (on track / at risk / behind). Review cadence: weekly team check-in on KR progress. Monthly leadership review of all OKRs. Quarterly OKR reset (new objectives or adjusted targets). OKR scoring: 0.0 to 1.0 scale. 0.7 is considered successful (OKRs should be ambitious — hitting 100% means the targets were too easy). An alternative for mature enterprises: the Balanced Scorecard. Four perspectives: Financial (revenue, margin), Customer (NPS, retention), Internal Process (cycle time, quality), Learning and Growth (training, innovation). The Balanced Scorecard is better for large organizations with complex, multi-departmental strategies. OKRs are better for fast-moving startups that need focus and alignment'"
    weight: 0.35
    description: "OKR"
  - type: llm_judge
    criteria: "Response applies HEART for Company B and AARRR for Company C — heart_aarrr: 'Company B — HEART Framework (Google's UX Metrics): Why HEART: the problem is understanding user experience at scale. Users say they like the app but are not retained — HEART measures UX quality across 5 dimensions. H — Happiness: how do users feel? Metric: in-app CSAT survey score (trigger after 5 sessions). Target: 4.2 out of 5. Dashboard: trend line of weekly average score. E — Engagement: how deeply do users interact? Metric: sessions per week per active user. Target: 4 sessions per week. Dashboard: distribution histogram — what percentage of users hit 4+ sessions? A — Adoption: are new users trying the product? Metric: percentage of new users who complete onboarding within 24 hours. Target: 60%. Dashboard: funnel chart showing onboarding steps and drop-off rates. R — Retention: do users come back? Metric: Day 7 and Day 30 retention rates. Target: D7 = 40%, D30 = 20%. Dashboard: cohort retention table (this is the critical metric given the retention problem). T — Task Success: can users accomplish what they came to do? Metric: core task completion rate (the primary action in the app). Target: 85%. Dashboard: completion rate by user segment. The HEART dashboard reveals: users are happy (H is high) but adoption is low (A — onboarding is confusing) and retention drops sharply after Day 3 (R — there is nothing bringing users back after the initial novelty wears off). Company C — AARRR Pirate Metrics: Why AARRR: the problem is understanding the growth funnel from acquisition through revenue. AARRR maps exactly to this. Acquisition: how do users find us? Metric: visitors by channel (organic, paid, referral, social). Activation: do they have a good first experience? Metric: percentage who complete first purchase within 7 days. Retention: do they come back? Metric: monthly repeat purchase rate. Referral: do they tell others? Metric: referral rate (percentage of customers who invite a friend). Revenue: do they generate value? Metric: average revenue per user (ARPU) and customer lifetime value (LTV). Dashboard: a funnel visualization showing conversion rates between each stage. The biggest drop between stages is the highest-leverage improvement area. If acquisition is strong but activation is weak, fix onboarding. If retention is strong but referral is weak, build a referral program'"
    weight: 0.35
    description: "HEART_AARRR"
  - type: llm_judge
    criteria: "Explanation provides a framework selection guide — guide: 'Framework selection guide: OKRs — when you need alignment between strategy and execution. Best for: startups and growth-stage companies with ambitious goals. Dashboard focus: progress toward objectives. Review cadence: weekly. Balanced Scorecard — when you need comprehensive organizational performance measurement. Best for: large enterprises with multiple departments and complex strategies. Dashboard focus: four perspectives (financial, customer, process, learning). Review cadence: quarterly. HEART — when you need to understand and improve user experience. Best for: product teams building consumer or B2B software. Dashboard focus: UX quality across 5 dimensions. Review cadence: weekly. AARRR — when you need to optimize a growth funnel. Best for: marketplace, e-commerce, and product-led growth companies. Dashboard focus: funnel conversion rates between stages. Review cadence: weekly. You can combine frameworks: use OKRs for company-level goals with AARRR as the metric structure for the growth team's key results. Example: Objective: accelerate marketplace growth. KR1 (Acquisition): increase organic traffic 30%. KR2 (Activation): improve first-purchase rate from 12% to 18%. KR3 (Revenue): grow ARPU from $45 to $60. The OKR provides the goal; AARRR provides the metrics'"
    weight: 0.30
    description: "Guide"
