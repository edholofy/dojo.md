meta:
  id: storytelling-with-data
  level: 2
  course: dashboard-kpi-design
  type: output
  description: "Tell stories with data — structure dashboards as narratives that guide viewers from insight to action using annotations, highlights, and contextual information"
  tags: [storytelling, narrative, annotations, insight, communication, intermediate]

state: {}

trigger: |
  The quarterly business review presentation uses 30 slides of
  charts with no narrative. The CEO's feedback: "I see lots of
  numbers but I don't know what any of them mean. What's the story?
  What should I care about? What do we do next?"

  Task: Transform the data dump into a narrative dashboard that
  tells a clear story with beginning, middle, and end.

assertions:
  - type: llm_judge
    criteria: "Response structures the dashboard as a narrative with clear story arc — narrative: 'Dashboard storytelling structure: Beginning — the headline (what happened): Start with the single most important insight as a text banner at the top: Q2 was our strongest quarter: revenue grew 28% YoY driven by Enterprise expansion, but SMB churn is accelerating and needs immediate attention. This one sentence tells the CEO: what to celebrate, what to worry about, and that action is needed. The viewer now has a mental framework for interpreting everything below. Middle — the evidence (why it happened): Section 1: Revenue growth story. Revenue KPI card: $3.2M ↑28% YoY. Green. Trend chart: revenue by month showing the growth trajectory. Annotation on the chart: March — launched Enterprise pricing tier (arrow pointing to the inflection point). The annotation explains why the trend changed. Without it, the viewer sees growth but does not know the cause. Section 2: The concern. Churn KPI card: SMB churn 6.1% ↑2.3pp QoQ. Red. Cohort chart: SMB retention is declining for each recent cohort. Annotation: Sep — removed free tier, affecting SMB retention. The annotation connects the business decision to the metric change. End — the recommendation (what to do next): Text section at the bottom: Recommended actions: 1. Double down on Enterprise — the pricing change is working. Increase Enterprise sales team by 3 headcount. 2. Address SMB churn — consider a discounted starter tier to retain price-sensitive SMBs. Estimated impact: reversing SMB churn to 4% would add $180K in annual revenue. The dashboard now has a beginning (headline), middle (evidence with annotations), and end (recommended actions)'"
    weight: 0.35
    description: "Narrative"
  - type: llm_judge
    criteria: "Response covers annotation and callout techniques — annotations: 'Annotation and callout techniques: Annotations are text labels added directly to charts that explain what happened and why. Types of annotations: 1. Event markers: vertical line on a trend chart marking when something happened. Example: a dashed vertical line labeled Product launch on the date the new feature shipped. The viewer can see the before-and-after impact. 2. Callout boxes: a text box pointing to a specific data point. Example: a box on the highest revenue month: Record month — $1.2M driven by 3 Enterprise deals closing. 3. Trend annotations: text along a trend line explaining the slope. Example: Revenue growing 8% MoM since pricing change. 4. Comparison annotations: text highlighting the gap between two lines. Example: between the actual line and the target line: $200K gap — need 5 more deals to close the target. When to annotate: when a trend changes direction (what caused the inflection?). When a data point is an outlier (why is this month different?). When a metric crosses a threshold (what does it mean that we hit 100% of target?). When a business decision caused a change (connecting cause and effect). When NOT to annotate: do not annotate every data point — it creates clutter. Annotate 2-3 key moments per chart maximum. If every month needs an annotation, the chart is too detailed or the metric is too volatile for the audience'"
    weight: 0.35
    description: "Annotations"
  - type: llm_judge
    criteria: "Explanation includes the so-what principle and action-oriented design — sowhat: 'The so-what principle: For every metric shown, the viewer should be able to answer: so what? Revenue is $3.2M. So what? → It is 28% above last year and 15% above target. We are winning. SMB churn is 6.1%. So what? → It is the highest ever and accelerating. If unchecked, it will cost $500K in annual revenue. We need to act. If the viewer cannot answer so what, the metric should not be on the dashboard — or it needs more context. Action-oriented dashboard design: every dashboard should have a what next section, either as a text block at the bottom or as linked action items. Example: Insight: Enterprise revenue is growing 28% YoY. Action: increase Enterprise sales headcount. Owner: VP Sales. Due: next month. Insight: SMB churn at 6.1%. Action: launch retention campaign for at-risk SMBs. Owner: Head of CS. Due: this week. Insight: Conversion rate below target at 2.4%. Action: A/B test new onboarding flow. Owner: Product Manager. Due: 2 weeks. Connecting insights to actions ensures the dashboard drives decisions, not just awareness. A dashboard that is reviewed but never acted upon is a waste. Measure dashboard effectiveness: track how many action items are generated from each dashboard review. A good dashboard generates 2-3 actions per review. A bad dashboard generates zero actions — it is informational, not actionable'"
    weight: 0.30
    description: "SoWhat"
