meta:
  id: enterprise-pr-governance
  level: 5
  course: press-release-writing
  type: output
  description: "Design enterprise PR governance framework with approval workflows, brand guidelines enforcement, and multi-division coordination"
  tags: [press-release, enterprise, governance, approval, brand, mastery]

state: {}

trigger: |
  Enterprise organizations with multiple business units, geographic
  regions, and product lines need governance systems that ensure
  consistency, compliance, and quality while enabling speed. Without
  governance, a 10,000-person company could issue contradictory press
  releases on the same day.

  Build an enterprise PR governance framework for:

  Company: "Atlas Industries" — Fortune 500 industrial conglomerate
  Profile: $25B revenue, 45,000 employees, 6 business divisions
  Divisions:
  1. Atlas Aerospace (defense & commercial aviation)
  2. Atlas Energy (renewables & traditional energy)
  3. Atlas Materials (advanced materials & chemicals)
  4. Atlas Digital (enterprise software & IoT)
  5. Atlas Healthcare (medical devices & diagnostics)
  6. Atlas Infrastructure (construction & civil engineering)
  Geographic presence: 40 countries, HQ in Chicago
  PR team: 35 people (corporate + divisional)

  Part 1: Governance structure
  1. Define the PR authority hierarchy:
     - Corporate Communications (final authority)
     - Divisional PR leads (day-to-day authority)
     - Regional PR coordinators (local execution)
     - Subject matter experts (content review)
     - Legal and compliance (regulatory review)
  2. Create the RACI matrix for press release creation,
     review, approval, and distribution
  3. Define escalation protocols for conflicts between
     divisions or between corporate and divisional interests

  Part 2: Approval workflows
  Design approval workflows for 5 release types:
  1. Routine product announcements (Division-level)
  2. Financial results and guidance (Corporate + Legal + IR)
  3. M&A and strategic transactions (CEO + Board + Legal)
  4. Crisis communications (Crisis team + CEO + Legal)
  5. Cross-divisional announcements (Multi-division + Corporate)
  Include SLA timelines for each approval stage

  Part 3: Brand and style governance
  1. Create the press release style guide covering:
     - Brand voice (how Atlas sounds across all divisions)
     - Naming conventions (Atlas Aerospace vs. the Aerospace division)
     - Approved boilerplate library (corporate + 6 divisional)
     - Quote approval process and spokesperson hierarchy
     - Visual identity standards for multimedia releases
  2. Define the quality gate checklist every release must pass

  Part 4: Coordination protocols
  1. Design the editorial calendar system (visibility across divisions)
  2. Create the conflict resolution process (two divisions want to
     announce on the same day)
  3. Build the competitive monitoring and rapid response framework
  4. Define the measurement and reporting cadence

  Part 5: Training and enablement
  1. Design the PR onboarding program for new team members
  2. Create the annual PR skills assessment framework
  3. Build the vendor/agency management governance
  4. Define the technology stack requirements (DAM, workflow, analytics)

assertions:
  - type: llm_judge
    criteria: "Governance hierarchy is clear and practical — authority levels, RACI matrix, and escalation paths would actually work in a 45,000-person organization"
    weight: 0.25
    description: "Clear practical governance hierarchy"
  - type: llm_judge
    criteria: "Approval workflows balance speed with control — routine releases move fast while high-stakes releases get appropriate scrutiny without unnecessary bureaucracy"
    weight: 0.25
    description: "Speed-control balanced workflows"
  - type: llm_judge
    criteria: "Brand governance maintains unity across diversity — the style guide creates consistent Atlas identity while allowing divisional personality"
    weight: 0.25
    description: "Unity across divisional diversity"
  - type: llm_judge
    criteria: "Training and enablement are comprehensive — the framework develops PR talent and maintains quality standards across a distributed team"
    weight: 0.25
    description: "Comprehensive training enablement"
