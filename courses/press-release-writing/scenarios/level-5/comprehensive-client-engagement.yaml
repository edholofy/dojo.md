meta:
  id: comprehensive-client-engagement
  level: 5
  course: press-release-writing
  type: output
  description: "Execute a complete end-to-end PR engagement — from strategy development through 12 months of press release execution, measurement, and optimization"
  tags: [press-release, client-engagement, strategy, execution, annual-plan, mastery]

state: {}

trigger: |
  This capstone scenario simulates a complete 12-month PR engagement
  from strategic planning through execution, measurement, and
  optimization. It requires integrating every skill from the course —
  writing, strategy, distribution, measurement, crisis response,
  and stakeholder management.

  Execute a full-year PR engagement for:

  Client: "NovaBridge Financial" — fintech company
  Profile: Series D ($150M raised), 500 employees, pre-IPO stage
  Product: AI-powered financial planning platform for advisors
  Market position: #3 in category, growing fastest
  CEO: Sarah Chen (strong speaker, limited media experience)
  Target audiences: Financial advisors, enterprise wealth management
  firms, financial media, potential IPO investors
  Competition: 2 established players + several startups
  Annual PR budget: $500K (agency fees + distribution + events)

  Part 1: Strategic foundation (Month 0)
  1. Conduct the communications audit:
     - Current media coverage analysis
     - Competitive share of voice assessment
     - Message testing framework
     - Stakeholder mapping
  2. Develop the 12-month PR strategy:
     - Key messages and positioning
     - Thought leadership platform for CEO
     - News calendar (planned announcements)
     - Media target list (tier 1, 2, 3)
     - KPIs and success metrics
  3. Create the crisis preparedness assessment

  Part 2: Q1 execution (Months 1-3)
  Write complete press releases for:
  1. Month 1: Year-end results announcement (record growth year)
  2. Month 2: Major enterprise client win (top-5 wealth management firm)
  3. Month 3: New product feature launch (AI risk assessment module)
  Include for each: the release, distribution plan, media pitch,
  social amplification, and measurement targets

  Part 3: Q2 execution (Months 4-6)
  4. Month 4: Industry conference keynote announcement + byline
  5. Month 5: Strategic partnership with major bank
  6. Month 6: Mid-year thought leadership campaign (data report)
  Plus: Handle an unexpected crisis — a competitor publicly claims
  NovaBridge's AI has accuracy problems. Write the response strategy
  and all communications.

  Part 4: Q3 execution (Months 7-9)
  7. Month 7: Key executive hire (new CTO from major tech company)
  8. Month 8: International expansion announcement (UK launch)
  9. Month 9: Industry award win + customer success story
  Plus: Begin IPO narrative groundwork — position the company
  for investor attention without making forward-looking claims

  Part 5: Q4 execution and annual review (Months 10-12)
  10. Month 10: Platform milestone (100,000 advisor users)
  11. Month 11: Annual predictions / thought leadership piece
  12. Month 12: Year-in-review and forward-looking strategy
  Plus:
  - Write the annual PR performance report
  - Conduct the year-end strategy review
  - Present the Year 2 PR strategy recommendation
  - Write the engagement renewal proposal

  Throughout all 12 months:
  - Show how messaging evolves and builds over the year
  - Demonstrate how early coverage creates foundation for later stories
  - Track cumulative impact on brand awareness and market position
  - Show budget allocation and ROI across the year

assertions:
  - type: llm_judge
    criteria: "Strategic arc is visible across 12 months — the PR program builds momentum progressively, with each announcement reinforcing the narrative and positioning for IPO readiness"
    weight: 0.25
    description: "Visible 12-month strategic arc"
  - type: llm_judge
    criteria: "Individual press releases are excellent — each of the 12 releases demonstrates mastery of format, voice, newsworthiness, and audience targeting"
    weight: 0.25
    description: "Excellent individual releases"
  - type: llm_judge
    criteria: "Crisis response integrates seamlessly — the mid-year competitor attack is handled professionally and the response strengthens rather than derails the overall narrative"
    weight: 0.25
    description: "Seamless crisis integration"
  - type: llm_judge
    criteria: "Business value is demonstrated — the annual report, renewal proposal, and Year 2 strategy show clear ROI and make a compelling case for continued PR investment"
    weight: 0.25
    description: "Demonstrated business value"
