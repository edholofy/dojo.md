meta:
  id: pr-portfolio-creation
  level: 5
  course: press-release-writing
  type: output
  description: "Build a professional PR writing portfolio demonstrating range across industries, formats, and situations for career advancement"
  tags: [press-release, portfolio, career, professional-development, mastery]

state: {}

trigger: |
  A strong PR writing portfolio demonstrates range, quality, and
  strategic thinking. It's not just a collection of press releases —
  it's a curated demonstration of professional capability that shows
  potential employers or clients what you can do.

  Build a complete PR writing portfolio for a senior-level PR
  professional seeking a VP of Communications role:

  Part 1: Portfolio strategy
  1. Define the portfolio structure:
     - What types of work to include (and what to leave out)
     - How to organize by skill vs. industry vs. situation
     - Ideal portfolio length and format
     - How to present work you contributed to but didn't solely write
  2. Create the portfolio narrative arc:
     - What story does this collection of work tell?
     - How does it demonstrate career progression?
     - What differentiates this portfolio from competitors?

  Part 2: Portfolio pieces (write 6 complete samples)

  Sample 1: Product launch press release
  Company: A B2B SaaS company launching an AI analytics platform
  Demonstrate: Clear technical communication, strong structure,
  compelling narrative for complex product

  Sample 2: Crisis communication
  Company: A food and beverage company managing a product contamination
  Demonstrate: Calm authority, appropriate tone, stakeholder awareness,
  legal sensitivity

  Sample 3: M&A announcement
  Company: A mid-cap acquiring a competitor in a $500M deal
  Demonstrate: Financial precision, regulatory awareness, stakeholder
  management, strategic narrative

  Sample 4: Thought leadership / bylined article
  Topic: The future of corporate communications in the AI era
  Demonstrate: Strategic thinking, industry knowledge, compelling
  argument, executive voice

  Sample 5: Nonprofit impact report press release
  Organization: A global education nonprofit releasing annual results
  Demonstrate: Emotional storytelling, data presentation, donor
  audience awareness, mission-driven communication

  Sample 6: Multimedia / integrated campaign press release
  Company: A consumer electronics company launching a flagship product
  Demonstrate: Multimedia integration, social amplification planning,
  influencer coordination, event tie-in

  Part 3: Portfolio context (for each sample)
  1. Write the case study context:
     - The brief and objectives
     - Strategic decisions made and why
     - Results achieved (using hypothetical but realistic metrics)
     - What you would do differently
  2. Include "behind the scenes" notes showing strategic thinking

  Part 4: Portfolio presentation
  1. Write the portfolio introduction / cover letter
  2. Design the portfolio navigation and organization
  3. Create the "About Me" professional bio
  4. Write 3 tailored portfolio cover messages for:
     - Agency VP role (demonstrate client management skills)
     - In-house VP role (demonstrate strategic business alignment)
     - Consulting practice launch (demonstrate range and expertise)

assertions:
  - type: llm_judge
    criteria: "Portfolio samples demonstrate genuine range — each piece sounds authentically different in voice, format, and approach while all showing high quality"
    weight: 0.30
    description: "Genuine range demonstration"
  - type: llm_judge
    criteria: "Strategic thinking is visible — case study context reveals the 'why' behind writing decisions, not just the final product"
    weight: 0.25
    description: "Visible strategic thinking"
  - type: llm_judge
    criteria: "Portfolio presentation is professional — introduction, organization, and cover messages would impress a hiring manager or potential client"
    weight: 0.25
    description: "Professional presentation"
  - type: llm_judge
    criteria: "Career narrative is compelling — the portfolio as a whole tells a story of professional growth, versatility, and leadership readiness"
    weight: 0.20
    description: "Compelling career narrative"
