meta:
  id: pr-agency-system
  level: 5
  course: press-release-writing
  type: output
  description: "Build a complete PR agency press release service — from client onboarding to writing, distribution, measurement, and reporting"
  tags: [press-release, agency, system, client-service, mastery]

state: {}

trigger: |
  Running a PR agency's press release service requires systematizing
  every step — from understanding client needs to writing, approval,
  distribution, measurement, and reporting. The system must scale
  across multiple clients while maintaining quality and consistency.

  Build a complete PR agency press release service system for:

  Agency: "Apex Communications" — mid-size PR agency
  Profile: 50 employees, 25 active clients, $8M annual revenue
  Specialization: Technology and healthcare PR
  Annual output: 300+ press releases across all clients

  Part 1: Client onboarding and discovery
  1. Design the client intake questionnaire covering:
     - Brand voice and messaging framework
     - Spokesperson roster and approval authority
     - Competitive landscape and positioning
     - Target media list and journalist relationships
     - Regulatory constraints and legal review requirements
     - Historical PR performance and benchmarks
  2. Create the client brief template for individual releases
  3. Define the SLA structure (turnaround times, revision rounds)

  Part 2: Writing process and quality control
  1. Design the press release creation workflow:
     - Brief intake → Research → Draft → Internal review →
       Client review → Legal review → Final approval → Distribution
  2. Create the writer assignment system (matching expertise to client)
  3. Build the internal quality review checklist
  4. Define the revision management process (scope, limits, escalation)
  5. Create the press release template library (by type and industry)

  Part 3: Distribution and media relations
  1. Design the distribution strategy framework:
     - Wire service selection by client and announcement type
     - Targeted media outreach strategy
     - Embargo and exclusive management
     - Social media amplification coordination
  2. Create the media list management system
  3. Build the journalist relationship tracking framework

  Part 4: Measurement and reporting
  1. Design the per-release measurement report:
     - Distribution metrics (pickups, reach, impressions)
     - Media coverage analysis (tone, key messages, share of voice)
     - Digital metrics (website traffic, SEO impact, social engagement)
  2. Create the monthly client report template
  3. Build the quarterly business review framework
  4. Define the ROI calculation methodology

  Part 5: Demonstrate the system with a real example
  Run through the complete system for a sample client:
  Client: "MedTech Innovations" — medical device startup
  Announcement: FDA 510(k) clearance for AI-powered diagnostic device
  Write the actual press release plus all supporting documents:
  - Completed client brief
  - The press release itself
  - Distribution plan
  - Media pitch email
  - Measurement report template (pre-filled with targets)
  - Client presentation deck outline

assertions:
  - type: llm_judge
    criteria: "Agency system is complete and scalable — every step from intake to reporting is systematized and could handle 25+ simultaneous clients"
    weight: 0.25
    description: "Complete scalable agency system"
  - type: llm_judge
    criteria: "Quality control is rigorous — internal review, template libraries, and revision management ensure consistent output quality"
    weight: 0.25
    description: "Rigorous quality control"
  - type: llm_judge
    criteria: "The sample execution demonstrates mastery — the MedTech press release and supporting documents show expert-level PR writing for a regulated industry"
    weight: 0.25
    description: "Expert sample execution"
  - type: llm_judge
    criteria: "Measurement and reporting add genuine value — the reporting framework goes beyond vanity metrics to connect PR activity to business outcomes"
    weight: 0.25
    description: "Genuine value measurement"
