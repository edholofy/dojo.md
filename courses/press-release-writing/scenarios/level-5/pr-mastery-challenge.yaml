meta:
  id: pr-mastery-challenge
  level: 5
  course: press-release-writing
  type: output
  description: "Complete a comprehensive press release mastery challenge — writing 8 releases across different formats, industries, and situations in one session"
  tags: [press-release, mastery, challenge, comprehensive, portfolio]

state: {}

trigger: |
  This mastery challenge tests your ability to write press releases
  across every dimension — format, industry, tone, audience, and
  situation. Each release must be complete, publication-ready, and
  demonstrate mastery of the specific requirements.

  Write 8 complete press releases, each targeting a different skill:

  Release 1: Speed and precision (15-minute format)
  Company: "QuantumLeap Computing" — quantum computing startup
  News: Achieved quantum advantage in drug discovery simulation
  Constraint: Write a complete, AP-style release in under 400 words
  that still includes all essential elements (headline, dateline,
  lead, body, quote, boilerplate)

  Release 2: Technical complexity made accessible
  Company: "NeuralPath Biotech" — CRISPR gene editing company
  News: First successful in-vivo gene editing for rare disease
  Constraint: Make cutting-edge science understandable to general
  media while maintaining accuracy for scientific journals

  Release 3: Negative news, positive framing
  Company: "GreenFleet Motors" — EV manufacturer
  News: Voluntary recall of 50,000 vehicles for battery software
  update (no safety incidents, proactive measure)
  Constraint: Frame a recall as responsible corporate behavior
  without minimizing the issue

  Release 4: Multi-stakeholder complexity
  Company: "EduTech Alliance" — education technology consortium
  News: Partnership between 3 universities, 2 tech companies,
  and 1 government agency to create AI tutoring platform
  Constraint: Give appropriate credit to all 6 organizations
  without the release becoming a committee-written mess

  Release 5: Data-heavy announcement
  Company: "MarketPulse Analytics" — market research firm
  News: Annual State of Digital Commerce Report (50 key findings)
  Constraint: Present data compellingly without turning the release
  into a statistics dump — lead with 3-4 headline findings

  Release 6: Emotional storytelling
  Company: "HopeBuilders Foundation" — nonprofit
  News: Completed 10,000th home for families in need
  Constraint: Tell a human story while including the organizational
  achievements and impact data donors and media need

  Release 7: Regulatory and legal precision
  Company: "PharmaCure Inc." (NYSE: PCUR) — pharmaceutical company
  News: Phase III trial results for Alzheimer's treatment
  Constraint: Follow FDA communication guidelines, include proper
  disclaimers, present efficacy data accurately, and manage
  expectations while acknowledging the breakthrough

  Release 8: Crisis under time pressure
  Company: "AirLink Airlines" — regional airline
  News: Emergency landing due to engine failure, all passengers safe
  Constraint: Write an initial holding statement (within 30 minutes
  of incident) plus a follow-up detailed release (2 hours later)
  that balances transparency with legal protection

  For each release, also provide:
  - A self-assessment: what makes this release effective
  - One thing you would improve with more time
  - The ideal distribution strategy

assertions:
  - type: llm_judge
    criteria: "All 8 releases are complete and publication-ready — each follows AP style, includes all required elements, and is appropriate for its specific situation"
    weight: 0.25
    description: "Complete publication-ready releases"
  - type: llm_judge
    criteria: "Tonal range is demonstrated — the quantum computing release sounds different from the nonprofit release, the crisis release sounds different from the data report"
    weight: 0.25
    description: "Demonstrated tonal range"
  - type: llm_judge
    criteria: "Constraints are respected — each release solves its specific challenge (accessibility, multi-stakeholder, data presentation, emotional storytelling, legal precision)"
    weight: 0.25
    description: "Constraints respected"
  - type: llm_judge
    criteria: "Self-assessments show critical awareness — the analysis of each release demonstrates understanding of PR writing craft and areas for improvement"
    weight: 0.25
    description: "Critical self-awareness"
