meta:
  id: pr-roi-measurement
  level: 5
  course: press-release-writing
  type: output
  description: "Build a comprehensive PR ROI measurement system connecting press releases to revenue, brand equity, and business outcomes"
  tags: [press-release, roi, measurement, analytics, business-outcomes, mastery]

state: {}

trigger: |
  PR ROI measurement is one of the most challenging areas in
  communications — connecting press releases to revenue and business
  outcomes requires sophisticated attribution, honest methodology,
  and clear communication to executives who want simple answers
  to complex questions.

  Build a comprehensive PR ROI measurement system for:

  Company: "Velocity SaaS" — B2B software ($200M ARR)
  PR investment: $2M annually (team + agency + distribution)
  PR output: 36 press releases, 100+ media pitches per year
  Business model: Enterprise SaaS with 12-month sales cycles
  Challenge: CMO wants to justify PR budget vs. paid advertising

  Part 1: ROI framework design
  1. Define what "PR ROI" means for Velocity SaaS:
     - Direct attribution (PR → website → lead → pipeline → revenue)
     - Indirect attribution (PR → brand awareness → shorter sales cycles)
     - Defensive value (PR → reputation protection → customer retention)
  2. Create the measurement model for each attribution type
  3. Address the fundamental challenge: PR's influence is often
     indirect, long-term, and difficult to isolate from other factors

  Part 2: Quantitative measurement
  1. Design the press release performance scorecard:
     - Media pickup metrics (quantity, quality, relevance)
     - Digital metrics (traffic, engagement, SEO impact)
     - Lead generation attribution (first-touch, multi-touch)
     - Pipeline influence (PR-sourced vs. PR-influenced deals)
  2. Calculate the cost-per-outcome for each metric
  3. Benchmark against industry standards and paid channels

  Part 3: Qualitative measurement
  1. Design the brand health tracking system:
     - Share of voice trends (monthly, quarterly)
     - Message penetration (are key messages appearing in coverage?)
     - Sentiment analysis methodology
     - Spokesperson effectiveness scoring
  2. Create the competitive positioning tracker
  3. Build the analyst and influencer perception survey

  Part 4: Executive reporting
  1. Write the annual PR ROI report for the CFO:
     - Total PR investment vs. measurable returns
     - Comparison to paid channel efficiency
     - Brand equity value estimate
     - Risk mitigation value (what crises were avoided or managed)
  2. Write the board presentation summary (2 slides)
  3. Write the budget justification narrative for next year

  Part 5: Demonstrate with real data
  Using hypothetical but realistic numbers:
  - Show a sample quarter where PR clearly drove results
  - Show a sample quarter where PR value was hard to prove
  - Show how to present both quarters honestly and persuasively
  - Identify what additional measurement capabilities to invest in

assertions:
  - type: llm_judge
    criteria: "ROI framework is intellectually honest — acknowledges the genuine difficulty of PR attribution while providing the best available methodologies"
    weight: 0.25
    description: "Intellectually honest ROI framework"
  - type: llm_judge
    criteria: "Quantitative measurement is rigorous — scorecard metrics are well-defined, benchmarked, and connected to business outcomes through clear attribution logic"
    weight: 0.25
    description: "Rigorous quantitative measurement"
  - type: llm_judge
    criteria: "Executive reporting is persuasive — the CFO report and board presentation make a compelling case for PR investment using both data and narrative"
    weight: 0.25
    description: "Persuasive executive reporting"
  - type: llm_judge
    criteria: "Real-world complexity is addressed — the sample quarters show how to handle both strong and weak periods, demonstrating mature measurement practice"
    weight: 0.25
    description: "Real-world complexity addressed"
