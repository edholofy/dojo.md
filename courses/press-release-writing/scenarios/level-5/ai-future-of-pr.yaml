meta:
  id: ai-future-of-pr
  level: 5
  course: press-release-writing
  type: output
  description: "Design an AI-integrated PR operations system that augments press release writing, distribution, measurement, and media relations"
  tags: [press-release, ai, automation, future, innovation, mastery]

state: {}

trigger: |
  AI is transforming every aspect of press release writing —
  from drafting and editing to distribution optimization, media
  targeting, and performance measurement. PR professionals who
  understand AI capabilities and limitations will define the
  next generation of communications.

  Design an AI-integrated PR operations system for:

  Company: "Horizon PR Group" — communications agency
  Size: 75 employees, 40 clients across tech, healthcare, finance
  Current tools: Traditional PR workflow, basic media database
  Goal: Integrate AI throughout the PR process while maintaining
  quality, authenticity, and human judgment where it matters

  Part 1: AI-augmented writing workflow
  1. Design the AI-assisted press release creation process:
     - AI-powered brief analysis and research
     - First draft generation with human oversight
     - AI editing for AP style, clarity, and SEO optimization
     - Headline A/B testing using AI predictions
     - Quote refinement (AI suggests, human approves)
  2. Define where AI adds value vs. where human judgment is essential
  3. Create quality gates that prevent AI-generated content from
     going out without appropriate human review
  4. Address the authenticity question: when does AI assistance
     cross the line into inauthenticity?

  Part 2: Intelligent distribution
  1. Design the AI-powered distribution system:
     - Predictive journalist targeting (who's most likely to cover?)
     - Optimal send-time prediction (by journalist, by topic)
     - Subject line optimization for email pitches
     - Wire service vs. direct pitch decision engine
  2. Create the media relationship intelligence system:
     - Journalist interest tracking and topic modeling
     - Relationship strength scoring
     - Coverage prediction modeling
     - Competitive intelligence on journalist preferences

  Part 3: Real-time measurement and optimization
  1. Design the AI-powered measurement dashboard:
     - Real-time coverage monitoring and sentiment analysis
     - Automated coverage reports with AI-generated insights
     - Predictive analytics for PR campaign performance
     - Anomaly detection (coverage spikes, sentiment shifts)
  2. Build the feedback loop: how measurement data improves
     future writing, distribution, and targeting

  Part 4: Ethics and governance
  1. Define the AI ethics framework for PR:
     - Disclosure policy (when to reveal AI involvement)
     - Bias monitoring in AI-generated content
     - Data privacy in journalist relationship management
     - Intellectual property considerations
  2. Create the human-in-the-loop requirements matrix
  3. Design the AI skills training program for PR professionals

  Part 5: Demonstrate with a real scenario
  Show the AI-integrated system in action:
  Client: "ClimateTech Solutions" — carbon capture startup
  Announcement: $100M Series C funding round
  Walk through the entire process — from brief to published
  release to measurement — showing exactly where AI assists
  and where humans lead at each stage

assertions:
  - type: llm_judge
    criteria: "AI integration is practical and grounded — the system uses AI capabilities that actually exist and adds genuine value rather than replacing human judgment indiscriminately"
    weight: 0.25
    description: "Practical grounded AI integration"
  - type: llm_judge
    criteria: "Human-AI boundaries are well-defined — the framework clearly identifies where AI adds value and where human judgment, creativity, and relationships are irreplaceable"
    weight: 0.25
    description: "Well-defined human-AI boundaries"
  - type: llm_judge
    criteria: "Ethics and governance are taken seriously — disclosure policies, bias monitoring, and privacy considerations show mature thinking about AI in communications"
    weight: 0.25
    description: "Serious ethics and governance"
  - type: llm_judge
    criteria: "The demonstration is convincing — the ClimateTech walkthrough shows the AI-integrated system producing better outcomes than a traditional workflow"
    weight: 0.25
    description: "Convincing demonstration"
