meta:
  id: multi-brand-pr-architecture
  level: 5
  course: press-release-writing
  type: output
  description: "Design press release architecture for a multi-brand portfolio — coordinating messaging across parent company, sub-brands, and acquired companies"
  tags: [press-release, multi-brand, portfolio, architecture, coordination, mastery]

state: {}

trigger: |
  Multi-brand organizations face unique PR challenges: each brand
  has its own voice and audience, but all exist within a parent
  company ecosystem. Press releases must reinforce individual brand
  identity while supporting the portfolio narrative — without
  confusing journalists or diluting any brand's message.

  Design PR architecture for:

  Company: "Constellation Consumer Brands" — consumer goods holding company
  Brands:
  1. "FreshField" — organic food and beverages (mass market)
  2. "LuxeVita" — premium skincare and cosmetics (luxury)
  3. "ActiveEdge" — sports nutrition and supplements (performance)
  4. "PureHome" — eco-friendly cleaning products (sustainability-focused)
  5. "KidsBright" — children's educational toys and games (family)
  Parent brand awareness: Low (B2B/investor audiences only)
  Individual brand awareness: High (consumer recognition)
  Total PR team: 20 people across brands + corporate

  Part 1: Brand voice architecture
  1. Define the press release voice for each brand:
     - FreshField: warm, approachable, farm-to-table authenticity
     - LuxeVita: sophisticated, aspirational, science-backed elegance
     - ActiveEdge: bold, energetic, performance-driven
     - PureHome: earthy, transparent, mission-driven activism
     - KidsBright: playful, educational, parent-trusted
     - Constellation (parent): corporate, strategic, investor-focused
  2. Write a sample press release headline and lead paragraph for
     each brand announcing a new product — demonstrating how the
     same type of news sounds completely different for each brand
  3. Create the brand voice decision tree for ambiguous situations

  Part 2: Coordination challenges
  Write press releases for 4 cross-brand scenarios:

  Scenario A: Corporate acquisition
  Constellation acquires "GreenGlow" — a natural beauty brand.
  Write 3 coordinated releases:
  - Constellation corporate (investor/business audience)
  - LuxeVita response (how this affects their brand)
  - GreenGlow "joining the family" announcement

  Scenario B: Shared sustainability initiative
  All 5 brands commit to carbon-neutral operations by 2030.
  Write the unified announcement that gives each brand its own
  angle while maintaining one cohesive Constellation narrative.

  Scenario C: Brand crisis with portfolio impact
  ActiveEdge product recalled for contamination. Write:
  - ActiveEdge recall press release
  - Constellation corporate statement
  - Talking points for other brands if asked about safety standards

  Scenario D: Cross-brand product launch
  FreshField and ActiveEdge collaborate on a protein-enriched
  organic snack line. Write the joint announcement that serves
  both brand audiences without confusing either.

  Part 3: Media relations architecture
  1. Design the journalist segmentation strategy:
     - Which journalists cover which brands?
     - When does Constellation corporate pitch vs. brand PR?
     - How to prevent journalist fatigue from too many brand pitches?
  2. Create the editorial calendar coordination system
  3. Build the media exclusivity management framework (preventing
     two brands from offering exclusives to the same publication)

  Part 4: Measurement across the portfolio
  1. Design the portfolio-level PR dashboard
  2. Create the individual brand PR scorecard
  3. Build the cross-brand synergy measurement (does coverage of
     one brand lift awareness of others?)

assertions:
  - type: llm_judge
    criteria: "Brand voices are distinct and authentic — each brand's sample content sounds genuinely different, not like the same writer with different adjectives"
    weight: 0.30
    description: "Distinct authentic brand voices"
  - type: llm_judge
    criteria: "Cross-brand scenarios are handled expertly — acquisition, shared initiative, crisis, and collaboration releases balance individual brand needs with portfolio coherence"
    weight: 0.30
    description: "Expert cross-brand handling"
  - type: llm_judge
    criteria: "Media relations architecture prevents conflicts — journalist segmentation, editorial calendar, and exclusivity management would work in practice"
    weight: 0.20
    description: "Conflict-preventing media architecture"
  - type: llm_judge
    criteria: "Portfolio measurement captures synergies — the dashboard and scorecards show how individual brand PR contributes to overall portfolio value"
    weight: 0.20
    description: "Synergy-capturing measurement"
