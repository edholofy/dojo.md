meta:
  id: crisis-mastery-simulation
  level: 5
  course: press-release-writing
  type: output
  description: "Navigate a multi-day, multi-stakeholder crisis communications simulation with evolving facts, media pressure, and legal constraints"
  tags: [press-release, crisis, simulation, multi-day, mastery]

state: {}

trigger: |
  Real crises don't follow templates. They evolve over days, involve
  multiple stakeholders with conflicting interests, and require
  adapting communications as facts change. This simulation tests
  mastery of crisis press release writing under realistic conditions.

  Navigate this multi-day crisis simulation:

  Company: "SafeTravel Technologies" — autonomous vehicle company
  Profile: Publicly traded (NASDAQ: SFTR), $3B valuation
  Product: Level 4 autonomous driving system used by ride-sharing fleets
  Employees: 4,000 across US, Germany, and Japan

  DAY 1 (Hour 0): The incident
  - A SafeTravel-equipped vehicle is involved in a serious accident
  - One pedestrian critically injured
  - Vehicle was in autonomous mode
  - Incident captured on bystander video, going viral on social media
  - Local news has arrived at the scene
  Tasks:
  1. Write the initial holding statement (within 30 minutes)
  2. Write the first full press release (within 2 hours)
  3. Create the social media response framework
  4. Draft the internal employee communication

  DAY 1 (Hour 6): Facts emerge
  - Police preliminary report suggests pedestrian jaywalked
  - But vehicle sensors may not have responded optimally
  - NHTSA announces it will investigate
  - Senator issues statement calling for autonomous vehicle moratorium
  - Stock drops 12% in after-hours trading
  Tasks:
  1. Write the updated press release incorporating new facts
  2. Draft the response to the Senator's statement
  3. Write the NHTSA cooperation statement
  4. Create talking points for CEO media interviews

  DAY 2: Escalation
  - Pedestrian's family retains high-profile attorney
  - Attorney holds press conference demanding SafeTravel data
  - A second, minor incident with a different SafeTravel vehicle
     emerges from 3 months ago (no injuries, not previously reported)
  - Competitor "DriveAI" issues statement about their safety record
  - Major ride-sharing partner publicly "evaluating" the relationship
  Tasks:
  1. Write the press release addressing the unreported prior incident
  2. Draft the response to the family's attorney (without admitting fault)
  3. Write the partner reassurance communication
  4. Create the media Q&A document for the CEO press conference

  DAY 3: Turning point
  - Full sensor data shows the vehicle detected the pedestrian
    but software uncertainty delayed braking by 0.3 seconds
  - Company decides to voluntarily pause autonomous operations
    for software review
  - Pedestrian upgraded from critical to serious condition
  Tasks:
  1. Write the voluntary pause announcement
  2. Write the technical transparency report (public-facing)
  3. Write the customer notification for ride-sharing users
  4. Draft the recovery narrative framework

  DAY 7: Path forward
  - Software update developed and validated
  - Independent safety audit completed
  - Pedestrian's condition improving
  - Regulatory meetings completed
  Tasks:
  1. Write the resumption of operations press release
  2. Write the safety commitment and policy changes announcement
  3. Draft the CEO op-ed for major publication
  4. Create the long-term reputation recovery plan outline

  Throughout the simulation:
  - Maintain consistent messaging across all communications
  - Balance transparency with legal protection
  - Manage multiple stakeholder needs simultaneously
  - Show how messaging evolves as facts change

assertions:
  - type: llm_judge
    criteria: "Crisis narrative arc is coherent — messaging evolves naturally from initial response through escalation to resolution while maintaining consistency"
    weight: 0.25
    description: "Coherent crisis narrative arc"
  - type: llm_judge
    criteria: "Legal and communications balance is maintained — releases are transparent enough to build trust but careful enough to avoid admissions or liability"
    weight: 0.25
    description: "Legal-communications balance"
  - type: llm_judge
    criteria: "Multi-stakeholder management is demonstrated — each communication addresses the right audience with appropriate content while not contradicting other communications"
    weight: 0.25
    description: "Multi-stakeholder management"
  - type: llm_judge
    criteria: "Recovery narrative is credible — the path from crisis to resolution shows genuine accountability and systemic improvement rather than empty promises"
    weight: 0.25
    description: "Credible recovery narrative"
