meta:
  id: stakeholder-communications
  level: 4
  course: press-release-writing
  type: output
  description: "Write press releases that serve multiple stakeholder groups simultaneously — investors, employees, customers, regulators"
  tags: [press-release, stakeholder, multi-audience, corporate, expert]

state: {}

trigger: |
  Complex corporate announcements must address multiple stakeholder
  groups with a single press release. Each group has different
  concerns: investors care about financial impact, employees about
  job security, customers about service continuity, and regulators
  about compliance.

  Write multi-stakeholder press releases for 4 complex scenarios:

  Scenario 1: Major layoff announcement
  Company: "TechVista" (NASDAQ: TVSQ) — 5,000 employees
  News: Restructuring that eliminates 800 positions (16%)
  Investor concern: Cost savings, severance costs, restructuring charges
  Employee concern: Who is affected, severance packages, timeline
  Customer concern: Will service quality be maintained?
  Media angle: Tech industry layoff trend
  Task: Write one press release that addresses all four groups

  Scenario 2: Major data center outage (cloud service provider)
  Company: "CloudBase" — enterprise cloud hosting (10,000 customers)
  Incident: 6-hour outage affecting all customers
  Investor concern: Financial impact, SLA credits, customer retention
  Customer concern: Data safety, compensation, prevention of recurrence
  Employee concern: Workload, blame, investigation
  Regulator concern: Data protection compliance
  Task: Write a post-incident press release for all stakeholders

  Scenario 3: CEO succession
  Company: "Meridian Corp" (NYSE: MERC) — $10B conglomerate
  News: Founder/CEO retiring after 25 years, COO promoted to CEO
  Investor concern: Strategic continuity, new CEO's vision
  Employee concern: Culture preservation, leadership style change
  Customer concern: Relationship continuity
  Board: Confidence in succession planning
  Task: Write the succession press release that satisfies all groups

  Scenario 4: Pivot from B2C to B2B
  Company: "AppDirect" — consumer app pivoting to enterprise platform
  News: Discontinuing consumer app (5M users) to focus on enterprise
  Investor concern: Revenue transition plan
  Consumer users: Timeline, data export, alternatives
  Enterprise customers: Product roadmap commitment
  Employees: Skill transition, new opportunities
  Task: Write the pivot announcement addressing all affected parties

  For each release:
  1. Write the complete press release
  2. Mark which sections/sentences address which stakeholder group
  3. Identify potential contradictions between stakeholder messages
  4. Write the internal employee communication that accompanies it
  5. Prepare the Q&A document for media inquiries
  6. Recommend the distribution timing relative to market hours

assertions:
  - type: llm_judge
    criteria: "All stakeholder concerns are addressed — no group's primary concern is ignored or insufficiently handled in the release"
    weight: 0.30
    description: "Complete stakeholder coverage"
  - type: llm_judge
    criteria: "Messages don't contradict — what investors hear is consistent with what employees and customers hear, despite different emphasis"
    weight: 0.25
    description: "Non-contradictory messaging"
  - type: llm_judge
    criteria: "Internal communications complement external — the employee communication provides additional context while staying consistent with the press release"
    weight: 0.25
    description: "Complementary internal communications"
  - type: llm_judge
    criteria: "Q&A documents anticipate tough questions — media FAQ covers the hardest questions journalists would ask, with honest, defensible answers"
    weight: 0.20
    description: "Tough-question-anticipating Q&A"
