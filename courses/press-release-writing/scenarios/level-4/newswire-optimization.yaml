meta:
  id: newswire-optimization
  level: 4
  course: press-release-writing
  type: output
  description: "Optimize press releases for maximum newswire distribution performance and media pickup"
  tags: [press-release, newswire, distribution, optimization, expert]

state: {}

trigger: |
  Different newswire services (PR Newswire, Business Wire, GlobeNewswire,
  PRWeb) have different strengths, pricing, and distribution networks.
  Optimizing for newswire distribution involves formatting, targeting,
  multimedia integration, and timing.

  Optimize distribution strategies for 4 announcement types:

  Announcement 1: Major tech product launch (global distribution needed)
  Company: Enterprise SaaS, $200M revenue
  Budget: $5,000 for distribution
  Needs: National US + international (UK, Germany, Japan)
  Task: Compare and recommend newswire services, write the
  wire-optimized version with formatting, targeting selections,
  and multimedia inclusions

  Announcement 2: Local business expansion (regional distribution)
  Company: Restaurant chain opening in new metro area
  Budget: $500 for distribution
  Needs: Local/regional coverage only (Houston, TX metro)
  Task: Design cost-effective local distribution strategy

  Announcement 3: IPO pricing (SEC-compliant distribution required)
  Company: Publicly traded tech company
  Budget: Regulatory requirement (no budget constraint)
  Needs: SEC filing + investor notification + media distribution
  Task: Design the SEC-compliant distribution with Business Wire
  or PR Newswire Comply tier

  Announcement 4: Thought leadership report (trade media focused)
  Company: B2B market research firm
  Budget: $2,000 for distribution
  Needs: Industry trade publications, analyst community
  Task: Design targeted trade distribution with high pickup potential

  For each announcement:
  1. Recommend the specific newswire service and tier
  2. Write the wire-formatted press release (formatted for the
     specific service's requirements)
  3. Select the geographic and industry targeting options
  4. Design the multimedia package (images, video, infographics)
  5. Recommend distribution timing (day/time for maximum pickup)
  6. Estimate the expected pickup, impressions, and backlinks
  7. Compare the cost-benefit of different distribution options

assertions:
  - type: llm_judge
    criteria: "Wire service recommendations are appropriate — matches the right service tier and targeting to each announcement's needs and budget"
    weight: 0.25
    description: "Appropriate wire service matching"
  - type: llm_judge
    criteria: "Formatting follows wire service conventions — press releases are formatted for the specific distribution platform's requirements"
    weight: 0.25
    description: "Wire-convention formatting"
  - type: llm_judge
    criteria: "Distribution targeting is precise — geographic and industry targeting selections match the announcement's actual audience"
    weight: 0.25
    description: "Precise distribution targeting"
  - type: llm_judge
    criteria: "Cost-benefit analysis is realistic — compares options with reasonable pickup and impression estimates based on distribution tier"
    weight: 0.25
    description: "Realistic cost-benefit analysis"
