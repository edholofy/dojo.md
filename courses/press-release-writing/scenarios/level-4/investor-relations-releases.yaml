meta:
  id: investor-relations-releases
  level: 4
  course: press-release-writing
  type: output
  description: "Write investor relations press releases for public companies — guidance, dividends, activism, and proxy fights"
  tags: [press-release, investor-relations, public-company, sec, expert]

state: {}

trigger: |
  Investor relations press releases are among the most scrutinized
  communications a public company produces. They directly affect
  stock price and are subject to SEC regulations, analyst scrutiny,
  and institutional investor review.

  Write IR press releases for 4 scenarios:

  Scenario 1: Guidance update (lowering expectations)
  Company: "CloudPeak" (NASDAQ: CPEK) — cloud computing
  Current guidance: FY2026 revenue $800-$840M
  Updated guidance: $740-$770M (downward revision)
  Reason: Delayed enterprise deals due to economic uncertainty
  Positive offsets: Pipeline grew 20%, existing customers expanding
  Task: Write the guidance revision that manages investor expectations
  without triggering panic selling

  Scenario 2: Dividend announcement
  Company: "Meridian Corp" (NYSE: MERC) — industrial conglomerate
  News: Increasing quarterly dividend by 15% to $0.85/share
  Context: 35 consecutive years of dividend increases (Aristocrat)
  Record date, ex-dividend date, payment date all needed
  Task: Write the dividend press release with all required details

  Scenario 3: Shareholder activism response
  Company: "MediaGroup" (NYSE: MGRP) — media conglomerate
  Activist: Hedge fund with 8% stake demanding board seats and
  streaming division spin-off
  Company position: Board rejects activist demands, believes current
  strategy maximizes shareholder value
  Task: Write the company's response press release without being
  dismissive or inflammatory

  Scenario 4: Stock buyback and capital allocation update
  Company: "TechCore" (NASDAQ: TCOR) — enterprise software
  News: Completed $1B share repurchase + authorizing new $2B program
  Additional: Converting $500M credit facility, maintaining investment
  grade rating, no change to R&D spending
  Task: Write the capital allocation press release that reassures
  both growth and value investors

  For each release:
  1. Write the complete SEC-compliant press release
  2. Include all required financial disclosures
  3. Write CEO and CFO quotes addressing investor concerns
  4. Include Safe Harbor / forward-looking statement disclaimers
  5. Recommend timing (pre-market, post-market, during market hours)
  6. Anticipate analyst questions and prepare responses

assertions:
  - type: llm_judge
    criteria: "Financial communications are precise — numbers, dates, and financial terminology are exactly correct and consistently formatted"
    weight: 0.25
    description: "Precise financial communications"
  - type: llm_judge
    criteria: "Guidance revision is skillfully framed — acknowledges the miss honestly while providing sufficient context and forward-looking confidence"
    weight: 0.25
    description: "Skillfully framed guidance revision"
  - type: llm_judge
    criteria: "Activist response is professional — firm in rejecting demands while respectful to all shareholders and focused on value creation"
    weight: 0.25
    description: "Professional activist response"
  - type: llm_judge
    criteria: "SEC compliance is demonstrated — forward-looking statements, Safe Harbor, and required disclosures are properly included"
    weight: 0.25
    description: "SEC compliance demonstrated"
