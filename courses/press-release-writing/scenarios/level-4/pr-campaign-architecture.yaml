meta:
  id: pr-campaign-architecture
  level: 4
  course: press-release-writing
  type: output
  description: "Design multi-release PR campaign architectures for major company milestones"
  tags: [press-release, campaign, architecture, multi-release, expert]

state: {}

trigger: |
  Major company milestones require a PR campaign architecture —
  a coordinated sequence of press releases, media pitches, thought
  leadership placements, and social amplification that maximizes
  coverage over weeks or months.

  Design a PR campaign architecture for 2 scenarios:

  Scenario 1: Company rebrand and product platform launch
  Company: "DataSync" rebranding to "Velocity" — complete platform
  overhaul with new name, logo, product suite, and positioning
  Timeline: 12-week campaign
  Components:
  - Week 1-2: Teaser campaign (social, embargoed briefings)
  - Week 4: Brand reveal press release
  - Week 5: Product platform launch release
  - Week 6: Customer migration announcement
  - Week 8: First customer success story under new brand
  - Week 10: Industry analyst endorsement
  - Week 12: Campaign wrap-up and results

  Task: Write the complete campaign plan with press releases for
  each milestone, distribution strategy, and measurement framework

  Scenario 2: International expansion campaign
  Company: "FinPay" — US payments startup expanding to Europe
  Timeline: 8-week campaign
  Components:
  - Week 1: Market entry announcement (UK headquarters)
  - Week 2: Regulatory approval press release
  - Week 3: Local partnership announcement (European bank)
  - Week 4: UK customer launch
  - Week 5: EU market expansion (Germany, France)
  - Week 6: Hiring announcement (200 European positions)
  - Week 8: First month results and customer testimonials

  Task: Write the campaign plan with key press releases, local
  media strategy, and cross-market coordination

  For each campaign:
  1. Write complete press releases for the 3 most critical milestones
  2. Write brief descriptions for all other releases
  3. Design the distribution timeline with channel mapping
  4. Create the media relationship strategy (who gets what, when)
  5. Define the measurement framework across the full campaign
  6. Identify the interdependencies between releases
  7. Plan contingencies for timing delays or news conflicts

assertions:
  - type: llm_judge
    criteria: "Campaign architecture is cohesive — each release builds on previous ones, creating a sustained narrative rather than disconnected announcements"
    weight: 0.30
    description: "Cohesive campaign architecture"
  - type: llm_judge
    criteria: "Timing is strategic — release spacing allows each announcement to breathe while maintaining campaign momentum"
    weight: 0.25
    description: "Strategic release timing"
  - type: llm_judge
    criteria: "Media strategy is coordinated — exclusive and embargo strategies prevent self-cannibalization while maximizing total coverage"
    weight: 0.25
    description: "Coordinated media strategy"
  - type: llm_judge
    criteria: "Contingency plans are realistic — addresses what happens when a release needs to be delayed, a competitor pre-empts, or media interest is lower than expected"
    weight: 0.20
    description: "Realistic contingency planning"
