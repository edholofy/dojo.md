meta:
  id: pr-analytics-dashboard
  level: 4
  course: press-release-writing
  type: output
  description: "Design a comprehensive PR analytics dashboard connecting press releases to business outcomes"
  tags: [press-release, analytics, dashboard, roi, measurement, expert]

state: {}

trigger: |
  Modern PR measurement goes beyond media pickup counts to
  connect press releases to business outcomes: lead generation,
  website traffic, brand sentiment, and revenue influence.

  Design a PR analytics framework for:

  Company: "TechScale" — B2B SaaS ($100M ARR, 1,500 customers)
  PR team: 3 people + 1 agency
  Annual PR activity: 24 press releases, 50+ media pitches,
  12 bylined articles, 6 speaking engagements
  Current measurement: Only tracking media mentions (no ROI data)

  Part 1: Metrics framework
  1. Define the PR measurement hierarchy:
     - Output metrics (releases sent, pitches made, articles published)
     - Outtake metrics (media pickup, reach, share of voice)
     - Outcome metrics (website traffic, lead generation, sentiment)
     - Impact metrics (revenue influenced, brand value, market position)
  2. Set benchmarks for each metric level

  Part 2: Dashboard design
  1. Design the weekly PR pulse dashboard (5 key metrics)
  2. Design the monthly PR performance dashboard (15+ metrics)
  3. Design the quarterly executive PR report (5-page format)
  4. Design the annual PR ROI summary for the board

  Part 3: Attribution methodology
  1. Connect media coverage to website traffic (UTM + time-based)
  2. Map press releases to lead generation (content attribution)
  3. Calculate media value equivalent (and why it's controversial)
  4. Design the multi-touch attribution model for PR

  Part 4: Competitive intelligence
  1. Track competitor PR activity and media coverage
  2. Measure share of voice trends over time
  3. Monitor sentiment shifts around key topics
  4. Identify coverage gaps and opportunities

  Part 5: Reporting templates
  1. Write sample dashboard commentary for 3 scenarios:
     - Strong month (high pickup, positive coverage)
     - Weak month (low pickup, missed targets)
     - Crisis month (high volume, mixed sentiment)
  2. Write the executive summary narrative for each

assertions:
  - type: llm_judge
    criteria: "Metrics hierarchy is comprehensive — progresses from outputs through outtakes and outcomes to business impact, with clear definitions at each level"
    weight: 0.25
    description: "Comprehensive metrics hierarchy"
  - type: llm_judge
    criteria: "Dashboard designs are practical — weekly, monthly, and quarterly views contain genuinely different information at appropriate levels of detail"
    weight: 0.25
    description: "Practical dashboard designs"
  - type: llm_judge
    criteria: "Attribution methodology is honest — acknowledges the difficulty of attributing business outcomes to PR while providing the best available approaches"
    weight: 0.25
    description: "Honest attribution methodology"
  - type: llm_judge
    criteria: "Sample commentary is insightful — dashboard narratives interpret data rather than just restating it, providing actionable recommendations"
    weight: 0.25
    description: "Insightful sample commentary"
