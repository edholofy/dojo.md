meta:
  id: competitive-pr-strategy
  level: 4
  course: press-release-writing
  type: output
  description: "Write press releases that strategically position against competitors without negative attacks"
  tags: [press-release, competitive, positioning, strategy, expert]

state: {}

trigger: |
  Competitive press releases position your company favorably
  relative to competitors without naming them, making claims that
  can't be substantiated, or appearing petty. The goal is to own
  the narrative in your category.

  Write competitively positioned press releases for 4 scenarios:

  Scenario 1: Responding to a competitor's major announcement
  Context: Your main competitor just announced an AI feature
  Your company: Had a similar feature for 6 months
  Challenge: Remind the market you were first without looking
  reactive or petty
  Company: "IntelliCRM" — CRM platform ($50M ARR)
  Task: Write a press release that reinforces your leadership
  position timed to capitalize on the competitor's announcement
  generating category interest

  Scenario 2: Launching in a competitive category
  Context: Entering a market dominated by 3 established players
  Your advantage: 40% lower price, modern architecture, better UX
  Company: "StreamCloud" — video conferencing startup
  Competitors: Zoom, Microsoft Teams, Google Meet (don't name them)
  Task: Write a launch press release that positions against
  incumbents without naming them

  Scenario 3: Winning a major customer from a competitor
  Context: Fortune 500 company switched from competitor to you
  Your company: "SecureNet" — cybersecurity platform
  Customer: Major bank (will provide a quote about switching)
  Challenge: Leverage the win without making it adversarial
  Task: Write a customer win press release with competitive
  implications

  Scenario 4: Third-party validation
  Context: Industry analyst report ranks you #1 over competitors
  Your company: "DataFlow" — analytics platform
  Report: Forrester Wave ranks DataFlow as Leader, competitors
  as Strong Performers
  Task: Write the analyst report press release maximizing
  competitive advantage

  For each release:
  1. Write the complete press release
  2. Explain the competitive positioning strategy
  3. Identify language that positions favorably without attacking
  4. Note what would cross the line into unprofessional territory
  5. Design the distribution timing for maximum competitive impact
  6. Write the social media amplification plan

assertions:
  - type: llm_judge
    criteria: "Competitive positioning is implicit, not explicit — conveys category leadership through proof points rather than naming and attacking competitors"
    weight: 0.30
    description: "Implicit competitive positioning"
  - type: llm_judge
    criteria: "Timing strategy maximizes competitive impact — releases are timed to capitalize on competitor news cycles or category attention"
    weight: 0.25
    description: "Competitively timed releases"
  - type: llm_judge
    criteria: "Third-party validation is leveraged effectively — analyst reports and customer switches are positioned as objective evidence of superiority"
    weight: 0.25
    description: "Effective third-party leverage"
  - type: llm_judge
    criteria: "Professional boundaries are maintained — identifies where competitive messaging would cross into unprofessional, libelous, or counterproductive territory"
    weight: 0.20
    description: "Professional boundary maintenance"
