meta:
  id: regulated-industry-releases
  level: 4
  course: press-release-writing
  type: output
  description: "Write press releases for highly regulated industries with legal, compliance, and disclosure requirements"
  tags: [press-release, regulated, compliance, legal, disclosure, expert]

state: {}

trigger: |
  Regulated industries (pharmaceutical, financial services,
  publicly traded companies, defense, healthcare) have strict
  requirements for press release content, approval workflows,
  and distribution timing.

  Write compliant press releases for 4 regulated scenarios:

  Scenario 1: Pharmaceutical — FDA drug approval
  Company: "PharmaVida" (NASDAQ: PVDA)
  News: FDA approves new treatment for moderate-to-severe psoriasis
  Drug: Dermasol (generic: vidalimab), first-in-class IL-23 inhibitor
  Clinical data: 78% of patients achieved PASI 90 at Week 16
  Label: For adults who failed at least one systemic therapy
  Requirements: Must include indication, safety information,
  boxed warning text, and Important Safety Information section
  Task: Write the FDA approval press release with full ISI

  Scenario 2: Financial services — SEC material event
  Company: "CapitalGroup" (NYSE: CPGR) — investment bank
  News: Board authorizes $2B share repurchase program
  Requirements: Must be filed with SEC, include forward-looking
  disclaimers, timing constraints (post-market hours)
  Task: Write the SEC-compliant press release with proper disclosures

  Scenario 3: Defense/government contractor
  Company: "AeroDefense" — defense technology contractor
  News: Awarded $1.2B contract by Department of Defense for
  next-gen surveillance system
  Requirements: OPSEC compliance, limited technical disclosure,
  government quote approval, classified/unclassified boundary
  Task: Write the contract award press release within disclosure limits

  Scenario 4: Cannabis industry
  Company: "GreenLeaf" — legal cannabis operator (multi-state)
  News: Expanding to 3 new states following legalization
  Requirements: State-specific compliance language, no health
  claims, age restriction disclaimers, banking/financial
  limitations disclosure
  Task: Write the expansion press release navigating complex
  multi-state regulatory environment

  For each release:
  1. Write the complete compliant press release
  2. Identify all required regulatory disclosures
  3. Explain the approval workflow (who reviews before publication)
  4. Note distribution timing requirements
  5. Identify language that would trigger regulatory issues
  6. Write the legal review checklist for each industry

assertions:
  - type: llm_judge
    criteria: "Regulatory disclosures are complete — ISI for pharma, Safe Harbor for SEC, OPSEC for defense, state compliance for cannabis"
    weight: 0.30
    description: "Complete regulatory disclosures"
  - type: llm_judge
    criteria: "Approval workflows are realistic — describes the actual review chain (legal, compliance, regulatory affairs) required before publication"
    weight: 0.25
    description: "Realistic approval workflows"
  - type: llm_judge
    criteria: "Compliance language is integrated naturally — required disclaimers and disclosures are woven into the release without making it unreadable"
    weight: 0.25
    description: "Naturally integrated compliance"
  - type: llm_judge
    criteria: "Industry-specific pitfalls are identified — flags the specific language and claims that would trigger regulatory scrutiny in each industry"
    weight: 0.20
    description: "Industry-specific pitfall identification"
