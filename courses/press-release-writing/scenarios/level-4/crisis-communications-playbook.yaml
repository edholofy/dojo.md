meta:
  id: crisis-communications-playbook
  level: 4
  course: press-release-writing
  type: output
  description: "Build a comprehensive crisis communications playbook with pre-approved templates and response protocols"
  tags: [press-release, crisis, playbook, templates, protocols, expert]

state: {}

trigger: |
  A crisis communications playbook prepares organizations to
  respond to crises rapidly and consistently. It includes pre-
  approved statement templates, escalation protocols, spokesperson
  training guidelines, and response timelines.

  Build a complete crisis playbook for:

  Company: "AeroSpace Dynamics" — commercial satellite company
  Profile: 2,000 employees, $500M revenue, publicly traded (NASDAQ)
  Operations: Launch services, satellite manufacturing, ground stations
  Risk landscape: Launch failures, orbital debris incidents, data
  breaches (customer satellite data), regulatory investigations,
  employee safety incidents, environmental concerns

  Part 1: Crisis classification and response tiers
  1. Define 4 crisis severity levels (Level 1-4) with examples
  2. Create the response timeline for each level:
     - Level 1 (minor): Response within 24 hours
     - Level 2 (moderate): Response within 4 hours
     - Level 3 (major): Response within 1 hour
     - Level 4 (catastrophic): Response within 30 minutes
  3. Define the approval chain for each level

  Part 2: Pre-approved statement templates
  Write templates for 6 crisis scenarios:
  1. Launch failure (satellite lost during launch)
  2. Orbital debris incident (company satellite creates debris)
  3. Customer data breach (satellite data exposure)
  4. Workplace safety incident (manufacturing accident)
  5. Regulatory investigation (FAA or FCC inquiry)
  6. Environmental compliance violation

  Part 3: Spokesperson protocols
  1. Define who speaks for each crisis type
  2. Write the spokesperson briefing template
  3. Create the media training talking points framework
  4. Design the "bridge and pivot" response technique guide

  Part 4: Monitoring and assessment
  1. Define the crisis monitoring system (what triggers activation)
  2. Create the real-time assessment checklist
  3. Design the post-crisis review process

assertions:
  - type: llm_judge
    criteria: "Crisis classification is practical — severity levels have clear criteria and each level triggers an appropriate response timeline"
    weight: 0.25
    description: "Practical crisis classification"
  - type: llm_judge
    criteria: "Templates are customizable yet complete — pre-approved statements have enough structure for rapid deployment but enough flexibility for specific situations"
    weight: 0.30
    description: "Customizable complete templates"
  - type: llm_judge
    criteria: "Spokesperson protocols are actionable — clearly define who speaks, what they say, and how they're prepared for each crisis type"
    weight: 0.25
    description: "Actionable spokesperson protocols"
  - type: llm_judge
    criteria: "Post-crisis review is built in — includes systematic process for learning from each crisis and updating the playbook"
    weight: 0.20
    description: "Built-in post-crisis review"
