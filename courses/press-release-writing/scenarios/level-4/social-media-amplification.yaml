meta:
  id: social-media-amplification
  level: 4
  course: press-release-writing
  type: output
  description: "Design social media amplification strategies for press releases across LinkedIn, Twitter/X, and owned channels"
  tags: [press-release, social-media, amplification, linkedin, twitter, expert]

state: {}

trigger: |
  Press releases don't live on wire services alone. Social media
  amplification extends reach, drives traffic, and creates
  engagement around announcements. But social posts require
  completely different formatting than press releases.

  Design social media amplification for 3 press releases:

  Press release 1: Funding announcement ($50M Series C)
  Company: "DataFlow" — data analytics platform
  CEO: Dr. Lisa Park
  Platforms: LinkedIn (primary), Twitter/X, company blog

  Task: Write the complete amplification package:
  - LinkedIn CEO post (personal account, 1,200 characters)
  - LinkedIn company page post (700 characters)
  - Twitter/X thread (5 tweets) from CEO account
  - Twitter/X single tweet from company account
  - Company blog post summarizing the press release
  - Employee advocacy template (for team to share)
  - Investor quote shareable graphic text

  Press release 2: Product launch
  Company: "SmartHome" — IoT platform
  Product: New whole-home automation system
  Platforms: LinkedIn, Twitter/X, Instagram, company blog

  Task: Write the amplification package with visual content focus:
  - LinkedIn product announcement post
  - Twitter/X launch thread with feature highlights
  - Instagram carousel copy (10 slides)
  - Company blog deep-dive article outline
  - Influencer seeding message template

  Press release 3: Crisis communication (data breach)
  Company: "SecureCloud" — enterprise cloud provider
  Platforms: Twitter/X (primary for rapid response), LinkedIn,
  company blog

  Task: Write crisis-appropriate social content:
  - Twitter/X initial acknowledgment (single tweet)
  - Twitter/X update thread as information emerges
  - LinkedIn CEO statement
  - Company blog detailed response
  - Customer email notification (not social, but coordinated)
  - Social media monitoring response templates

  For each package:
  1. Write all social content for all specified platforms
  2. Adapt tone and format to each platform's norms
  3. Define the posting schedule relative to press release distribution
  4. Design the employee advocacy activation plan
  5. Recommend paid amplification where appropriate
  6. Define the engagement response strategy (how to reply to comments)

assertions:
  - type: llm_judge
    criteria: "Platform adaptations are authentic — LinkedIn is professional, Twitter/X is concise and conversational, Instagram is visual-first"
    weight: 0.30
    description: "Authentic platform adaptations"
  - type: llm_judge
    criteria: "Posting schedule is strategically timed — social content is sequenced relative to press release distribution for maximum cumulative impact"
    weight: 0.25
    description: "Strategically timed posting"
  - type: llm_judge
    criteria: "Crisis social content is appropriately restrained — brief, factual, empathetic, and directs to the full press release for details"
    weight: 0.25
    description: "Appropriately restrained crisis content"
  - type: llm_judge
    criteria: "Employee advocacy is well-designed — templates are easy to personalize and feel authentic rather than corporate astroturfing"
    weight: 0.20
    description: "Well-designed employee advocacy"
