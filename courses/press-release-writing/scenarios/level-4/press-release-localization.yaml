meta:
  id: press-release-localization
  level: 4
  course: press-release-writing
  type: output
  description: "Localize press releases for multiple markets simultaneously with cultural and regulatory precision"
  tags: [press-release, localization, multi-market, cultural, expert]

state: {}

trigger: |
  Scaling press releases across multiple markets simultaneously
  requires a localization system — not just translation. Each
  market needs cultural adaptation, regulatory compliance, local
  media targeting, and timing coordination.

  Localize a major announcement for 6 markets:

  Base announcement: "GlobalPay" — payment processing company
  News: Launching instant cross-border payments in 30 countries
  with zero foreign exchange fees
  Company: US-based, $2B valuation, processing $50B annually
  CEO: American (provides base English quote)

  Markets to localize for:
  1. United Kingdom — Financial Conduct Authority (FCA) compliance,
     GBP pricing, Brexit-era financial services context
  2. Japan — Formal business communication norms, JPY pricing,
     Financial Services Agency compliance
  3. Brazil — Portuguese adaptation, Central Bank of Brazil
     regulations, BRL pricing, growing FinTech market narrative
  4. Germany — GDPR emphasis, BaFin compliance, EUR pricing,
     precision-focused communication
  5. India — UPI integration angle, RBI compliance, INR pricing,
     mobile-first market emphasis
  6. Nigeria — CBN regulations, NGN pricing, financial inclusion
     narrative, mobile money integration angle

  For each market:
  1. Write the localized press release
  2. Adapt the CEO quote or add a local executive quote
  3. Include market-specific regulatory language
  4. Recommend local distribution channels and target media
  5. Suggest launch timing (local business hours, avoid holidays)
  6. Identify cultural adaptations beyond translation
  7. Note local competitive landscape references

  Then provide:
  - The master localization template and workflow
  - Quality control checklist for localized releases
  - Coordination plan for simultaneous multi-market launch

assertions:
  - type: llm_judge
    criteria: "Cultural adaptation is deep — each market version reflects genuine understanding of local business communication norms and values"
    weight: 0.30
    description: "Deep cultural adaptation"
  - type: llm_judge
    criteria: "Regulatory compliance varies by market — FCA for UK, GDPR for Germany, RBI for India, CBN for Nigeria are correctly addressed"
    weight: 0.25
    description: "Market-specific regulatory compliance"
  - type: llm_judge
    criteria: "Local angles are found — each market version leads with the locally relevant hook (financial inclusion for Nigeria, UPI for India, Brexit context for UK)"
    weight: 0.25
    description: "Locally relevant angles"
  - type: llm_judge
    criteria: "Coordination plan is practical — the multi-market launch process handles time zones, approval chains, and distribution timing"
    weight: 0.20
    description: "Practical coordination plan"
