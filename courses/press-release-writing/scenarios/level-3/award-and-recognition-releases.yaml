meta:
  id: award-and-recognition-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write press releases for awards, rankings, and industry recognition without sounding self-congratulatory"
  tags: [press-release, awards, recognition, rankings, advanced]

state: {}

trigger: |
  Award and recognition press releases are among the most commonly
  written — and most commonly boring. The challenge is communicating
  legitimate achievement without descending into self-congratulation
  that journalists will ignore.

  Write award/recognition press releases for 4 scenarios:

  Scenario 1: Industry award
  Company: "InnoSoft" — enterprise software
  Award: Gartner Magic Quadrant Leader (for the 3rd consecutive year)
  Significance: Only company to move from Challenger to Leader
  in 2 years
  Task: Write a press release that focuses on what the recognition
  means for customers rather than company pride

  Scenario 2: "Best Places to Work" recognition
  Company: "TalentFirst" — HR consulting firm (350 employees)
  Recognition: #14 on Fortune Best Small Companies to Work For
  Key differentiator: 4-day work week, unlimited PTO, 98% retention
  Task: Write a press release that tells the story behind the
  ranking rather than just announcing it

  Scenario 3: Patent milestone
  Company: "BioPharm Innovations" — biotech
  Milestone: 100th patent granted (for novel drug delivery system)
  Context: Portfolio covers gene therapy, immunology, and oncology
  Task: Write a press release that communicates innovation depth
  without being a list of accomplishments

  Scenario 4: Customer satisfaction award
  Company: "ServicePro" — customer service platform
  Award: J.D. Power Customer Satisfaction Leader, 5 years running
  Data: 99.2% customer satisfaction, NPS of 82
  Task: Write a press release that makes the customer the hero,
  not the company

  For each release:
  1. Write the complete press release
  2. Focus on stakeholder value, not company pride
  3. Include a customer or third-party quote for credibility
  4. Avoid superlatives and self-congratulatory language
  5. Identify why a journalist would cover this (beyond the company
     caring about its own award)
  6. Suggest the news angle that makes it interesting to media

assertions:
  - type: llm_judge
    criteria: "Releases avoid self-congratulation — focus on what the recognition means for customers, employees, or the industry rather than company pride"
    weight: 0.30
    description: "Self-congratulation avoidance"
  - type: llm_judge
    criteria: "Newsworthy angles are found — each release identifies why this recognition matters beyond the company receiving it"
    weight: 0.25
    description: "Newsworthy angle identification"
  - type: llm_judge
    criteria: "Third-party validation is included — customer quotes, analyst commentary, or industry context adds credibility"
    weight: 0.25
    description: "Third-party validation inclusion"
  - type: llm_judge
    criteria: "Stories behind the numbers are told — the releases explain what the company did differently, not just that it won"
    weight: 0.20
    description: "Story behind the numbers"
