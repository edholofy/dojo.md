meta:
  id: thought-leadership-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write press releases that position executives and companies as industry thought leaders"
  tags: [press-release, thought-leadership, positioning, authority, advanced]

state: {}

trigger: |
  Thought leadership press releases position a company or executive
  as an industry authority by sharing original insights, research,
  predictions, or commentary on industry trends. They differ from
  standard announcements because the news IS the insight.

  Write thought leadership press releases for 4 scenarios:

  Scenario 1: Original research findings
  Company: "WorkTrends" — HR analytics platform
  Research: Annual survey of 10,000 employees reveals that hybrid
  workers are 23% more productive than full-time office workers,
  but 31% report feeling disconnected from company culture
  CEO: Dr. Sarah Mitchell (organizational psychologist)
  Task: Write a research-driven press release that positions
  Dr. Mitchell as the go-to expert on hybrid work

  Scenario 2: Industry prediction
  Company: "FinSight" — financial technology consultancy
  Prediction: CEO predicts that 50% of banks will adopt blockchain
  for cross-border payments by 2028, based on proprietary analysis
  CEO: Michael Chen (former Federal Reserve advisor)
  Task: Write a prediction press release with credibility anchors

  Scenario 3: Trend commentary (reactive)
  Context: A major tech company just announced mass layoffs
  Company: "TalentBridge" — executive recruitment firm
  CEO: Amanda Torres (25 years in executive search)
  Commentary: How mass layoffs actually create unprecedented
  hiring opportunities for mid-market companies
  Task: Write a reactive commentary press release that is timely
  and provides a contrarian but credible perspective

  Scenario 4: White paper launch
  Company: "CyberShield" — enterprise cybersecurity
  Report: "The 2026 State of Ransomware" — original data from
  analyzing 50,000 attacks across 120 countries
  Key finding: Average ransom demand increased 340% YoY
  CISO: Dr. James Park (former NSA cybersecurity analyst)
  Task: Write a press release launching the report with enough
  data to be newsworthy without giving away the full report

  For each release:
  1. Write the complete press release
  2. Include the executive's credentials that establish authority
  3. Balance data sharing with report/insight exclusivity
  4. Suggest media opportunities (interviews, op-eds, panels)
  5. Identify target journalists covering this topic
  6. Explain how this press release supports broader thought
     leadership strategy

assertions:
  - type: llm_judge
    criteria: "Thought leadership is credible — positions executives through genuine expertise and data rather than self-promotional claims"
    weight: 0.30
    description: "Credible thought leadership positioning"
  - type: llm_judge
    criteria: "Data sharing is strategic — provides enough original data to be newsworthy without eliminating the reason to download the full report or book the interview"
    weight: 0.25
    description: "Strategic data sharing"
  - type: llm_judge
    criteria: "Executive credibility is established — relevant credentials, experience, and authority signals are woven in naturally"
    weight: 0.25
    description: "Established executive credibility"
  - type: llm_judge
    criteria: "Reactive commentary is timely and valuable — the trend commentary feels current and provides genuine insight rather than obvious observations"
    weight: 0.20
    description: "Timely valuable commentary"
