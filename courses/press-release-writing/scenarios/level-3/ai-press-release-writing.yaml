meta:
  id: ai-press-release-writing
  level: 3
  course: press-release-writing
  type: output
  description: "Use AI tools effectively in press release writing while maintaining quality and accuracy"
  tags: [press-release, ai, automation, workflow, advanced]

state: {}

trigger: |
  AI tools are increasingly used in press release writing for
  drafting, editing, and optimization. However, AI-generated
  content requires careful human review for accuracy, tone, brand
  voice, and journalistic integrity.

  Design AI-augmented press release workflows for 4 scenarios:

  Scenario 1: AI-assisted first draft
  Announcement: Standard product launch press release
  AI input: Product specs, target audience, key messages, quotes
  Task: Write the AI prompt that would generate a strong first
  draft, then show what human editing is needed (identify 5+
  specific improvements a human editor should make)

  Scenario 2: AI for headline optimization
  Announcement: Funding round ($20M Series B)
  Task: Write 10 AI-generated headline candidates, then evaluate
  each for newsworthiness, SEO value, character count, and AP
  style compliance. Select the best and explain why.

  Scenario 3: AI fact-checking risks
  Announcement: Clinical trial results press release
  AI draft: Contains plausible-sounding statistics and claims
  Task: Identify 5 types of AI-generated errors that could appear
  in a press release (fabricated statistics, incorrect attributions,
  made-up quotes, wrong dates, exaggerated claims). Write the
  fact-checking checklist for AI-assisted press releases.

  Scenario 4: AI for localization at scale
  Announcement: Global product launch in 10 markets
  Base release: Written in English
  Task: Design the AI-assisted localization workflow — prompt
  structure for cultural adaptation (not just translation),
  human review checkpoints, and quality standards

  For each scenario:
  1. Design the AI workflow (input → AI processing → human review)
  2. Identify where AI adds the most value
  3. Identify where AI creates the most risk
  4. Write the quality control checklist
  5. Estimate time savings vs full manual writing
  6. Address the ethical considerations of AI in PR

assertions:
  - type: llm_judge
    criteria: "AI workflows are practical — the prompts, review processes, and quality checkpoints could be implemented by a real PR team"
    weight: 0.25
    description: "Practical AI workflows"
  - type: llm_judge
    criteria: "AI risks are accurately identified — correctly flags the specific types of errors AI introduces in press release writing"
    weight: 0.30
    description: "Accurate AI risk identification"
  - type: llm_judge
    criteria: "Human review checkpoints are well-placed — identifies the specific moments where human judgment is essential and cannot be automated"
    weight: 0.25
    description: "Well-placed human checkpoints"
  - type: llm_judge
    criteria: "Ethical considerations are thoughtfully addressed — covers transparency about AI use, accuracy responsibility, and journalistic integrity"
    weight: 0.20
    description: "Thoughtful ethical considerations"
