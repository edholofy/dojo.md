meta:
  id: event-driven-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write press release sequences for events — pre-event, live, and post-event communications"
  tags: [press-release, events, conferences, sequence, advanced]

state: {}

trigger: |
  Major events require a sequence of press releases: pre-event
  (build anticipation and media attendance), live announcements
  (news breaking during the event), and post-event (results,
  impact, recordings). Each serves a different purpose.

  Write event press release sequences for 2 events:

  Event 1: Annual tech conference
  Event: "InnovateCon 2026" — company's flagship customer conference
  Host: "TechPlatform" (enterprise SaaS, 5,000 customers)
  Details: 3 days, 2,000 attendees, Las Vegas, September 15-17
  Major announcements: New AI product, strategic partnership,
  customer success awards

  Pre-event releases:
  - Release A (8 weeks before): Event announcement with keynote
    speaker reveals
  - Release B (3 weeks before): Agenda highlights and major
    sponsor announcements
  - Release C (1 week before): Final registration push with
    exclusive preview hints

  Live event releases:
  - Release D (Day 1 keynote): AI product launch announcement
  - Release E (Day 2): Strategic partnership announcement
  - Release F (Day 3): Customer awards and conference wrap-up

  Post-event release:
  - Release G (1 week after): Results, impact data, key
    takeaways, recording availability

  Event 2: Industry summit
  Event: "Sustainability Leadership Summit 2026"
  Host: Industry association (100 member companies)
  Details: 1 day, 500 leaders, Washington DC, April 22 (Earth Day)
  Announcements: Joint industry pledge, research findings, policy
  recommendations

  Write 4 releases: pre-event, opening announcement,
  pledge announcement, post-summit results

  For each release in both sequences:
  1. Write the complete press release
  2. Show how each release builds on the previous one
  3. Identify the target audience for each release
  4. Define the distribution timing and channels
  5. Explain what makes event releases different from standard ones

assertions:
  - type: llm_judge
    criteria: "Sequence tells a cohesive story — pre-event builds anticipation, live releases deliver news, post-event provides context and results"
    weight: 0.30
    description: "Cohesive event release sequence"
  - type: llm_judge
    criteria: "Each release serves a distinct purpose — no two releases in the sequence feel redundant or cover the same ground"
    weight: 0.25
    description: "Distinct release purposes"
  - type: llm_judge
    criteria: "Timing strategy is logical — release cadence matches what media need at each stage (advance planning, real-time coverage, post-event analysis)"
    weight: 0.25
    description: "Logical timing strategy"
  - type: llm_judge
    criteria: "Live event releases are formatted for speed — concise, immediately publishable, with all key details front-loaded for breaking news coverage"
    weight: 0.20
    description: "Speed-formatted live releases"
