meta:
  id: crisis-escalation-sequence
  level: 3
  course: press-release-writing
  type: output
  description: "Write a multi-stage crisis communication sequence from initial response through resolution"
  tags: [press-release, crisis, escalation, sequence, advanced]

state: {}

trigger: |
  Major crises require a sequence of communications over days or
  weeks. Each release must advance the narrative, address new
  developments, and maintain stakeholder confidence.

  Write a complete crisis communication sequence:

  Crisis scenario: "AeroTech" — autonomous drone delivery company
  Incident timeline:
  - Day 1, 2pm: Delivery drone crashes into a parked car in
    residential neighborhood, no injuries, car damaged
  - Day 1, 6pm: Local news picks up the story, video goes viral
  - Day 2: FAA announces investigation, company grounds fleet
  - Day 3: Investigation reveals software bug in obstacle avoidance
  - Day 5: Company announces fix, requests permission to resume
  - Day 10: FAA clears fleet to resume with new safety protocols
  - Day 15: Company announces enhanced safety measures and
    compensation program

  Write press releases for each stage:

  Release 1: Initial response (Day 1, within 4 hours of incident)
  Task: Write the immediate acknowledgment with limited information

  Release 2: Fleet grounding (Day 2)
  Task: Write the voluntary grounding announcement showing
  proactive safety commitment

  Release 3: Root cause identified (Day 3)
  Task: Write the technical explanation for media and regulators
  without creating additional liability

  Release 4: Fix and resumption request (Day 5)
  Task: Write the fix announcement positioning the company as
  transparent and responsible

  Release 5: Clearance and safety measures (Day 10)
  Task: Write the resumption announcement with enhanced safety focus

  Release 6: Compensation and forward-looking (Day 15)
  Task: Write the comprehensive resolution and future commitment

  For each release:
  1. Write the complete press release
  2. Show how messaging evolves from the previous release
  3. Address the specific audience concerns at each stage
  4. Include appropriate spokesperson quotes
  5. Identify potential media questions and prepare responses

assertions:
  - type: llm_judge
    criteria: "Narrative progresses logically — each release builds on the previous one, advancing the story from incident through investigation to resolution"
    weight: 0.30
    description: "Logical narrative progression"
  - type: llm_judge
    criteria: "Tone evolves appropriately — from urgent concern in Release 1 to cautious optimism in Release 5 to confident commitment in Release 6"
    weight: 0.25
    description: "Appropriately evolving tone"
  - type: llm_judge
    criteria: "Information disclosure is staged — reveals appropriate details at each stage without premature conclusions or withholding critical information"
    weight: 0.25
    description: "Staged information disclosure"
  - type: llm_judge
    criteria: "Stakeholder concerns are anticipated — each release addresses the questions stakeholders would have at that specific stage of the crisis"
    weight: 0.20
    description: "Anticipated stakeholder concerns"
