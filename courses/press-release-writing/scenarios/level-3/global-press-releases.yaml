meta:
  id: global-press-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Adapt press releases for international markets with cultural and regulatory localization"
  tags: [press-release, international, localization, global, advanced]

state: {}

trigger: |
  Global press releases require cultural adaptation beyond
  translation. Different markets have different media norms,
  regulatory requirements, and cultural sensitivities.

  Adapt a single announcement for 4 international markets:

  Base announcement: "TechGlobal" launches AI-powered customer
  service platform available in 30 languages
  Company: US-based enterprise SaaS ($10B valuation)
  News: Platform now available globally with local data centers
  in each region

  Market 1: Japan
  Considerations: Formal language expected, emphasis on group
  benefit over individual, quality and reliability valued over
  innovation claims, double-width characters affect formatting
  Task: Write the culturally adapted press release

  Market 2: Germany
  Considerations: Precision and factual accuracy paramount,
  GDPR compliance must be addressed, data center location critical
  for data sovereignty, skepticism toward hype
  Task: Write with emphasis on privacy, precision, and compliance

  Market 3: Brazil
  Considerations: Warm, relationship-focused tone, emphasis on
  local job creation and investment, Portuguese language nuances,
  growing tech market narrative
  Task: Write with local economic impact emphasis

  Market 4: United Arab Emirates
  Considerations: Formal business tone, government and vision
  alignment valued (UAE Vision 2031), Ramadan sensitivity,
  Arabic right-to-left formatting considerations
  Task: Write with alignment to national development priorities

  For each market:
  1. Write the complete localized press release
  2. Explain specific cultural adaptations beyond translation
  3. Identify local regulatory requirements
  4. Recommend local distribution channels and target media
  5. Suggest timing considerations (local news cycles, holidays)
  6. Note what should NOT be said in each market

assertions:
  - type: llm_judge
    criteria: "Cultural adaptation is substantive — messaging reflects genuine understanding of local values and communication styles, not surface-level changes"
    weight: 0.30
    description: "Substantive cultural adaptation"
  - type: llm_judge
    criteria: "Regulatory considerations are market-specific — GDPR for Germany, data sovereignty for Japan, national vision alignment for UAE"
    weight: 0.25
    description: "Market-specific regulatory awareness"
  - type: llm_judge
    criteria: "Distribution recommendations are locally informed — target media and channels reflect actual media landscapes in each market"
    weight: 0.25
    description: "Locally informed distribution"
  - type: llm_judge
    criteria: "Cultural taboos and sensitivities are identified — notes what to avoid in each market, not just what to include"
    weight: 0.20
    description: "Cultural sensitivity awareness"
