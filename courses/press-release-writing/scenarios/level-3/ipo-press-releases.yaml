meta:
  id: ipo-press-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write IPO-related press releases with SEC compliance and investor-ready messaging"
  tags: [press-release, ipo, sec, investor-relations, public-offering, advanced]

state: {}

trigger: |
  IPO press releases have the highest regulatory scrutiny of any
  type. They must comply with SEC quiet period rules, contain
  proper disclaimers, and serve both institutional investors
  and the media while avoiding material misstatements.

  Write IPO-related press releases for 3 stages:

  Stage 1: IPO filing announcement
  Company: "StreamFlow" — video streaming platform
  Filing: S-1 filed with SEC, proposed NASDAQ listing (STRM)
  Revenue: $450M (FY2025), growing 40% YoY
  Underwriters: Goldman Sachs, Morgan Stanley
  Details to include: Filing notice, exchange, underwriters
  Details to exclude: Share price, valuation (not yet determined)
  Task: Write the IPO filing press release compliant with SEC rules

  Stage 2: Pricing announcement
  Company: Same "StreamFlow"
  Pricing: 20M shares at $28/share, raising $560M
  Valuation: $4.2B
  Lock-up: 180-day insider lock-up period
  Task: Write the pricing press release with required financial details

  Stage 3: First day of trading announcement
  Company: Same "StreamFlow"
  Opening price: $35 (25% above IPO price)
  Day close: $38.50
  CEO remarks: First day celebration
  Task: Write the first-trading-day press release with celebration
  balanced by forward-looking restraint

  For each stage:
  1. Write the complete press release
  2. Include all required SEC disclaimers
  3. Identify what CANNOT be said at each stage (quiet period rules)
  4. Write executive quotes appropriate to each stage
  5. Define the distribution strategy (Business Wire required for SEC)
  6. Explain the legal review process

assertions:
  - type: llm_judge
    criteria: "SEC compliance is demonstrated — each stage correctly handles quiet period restrictions, required disclaimers, and prohibited statements"
    weight: 0.30
    description: "SEC compliance demonstrated"
  - type: llm_judge
    criteria: "Stage-appropriate information boundaries — the filing release doesn't include pricing, the pricing release doesn't speculate on trading"
    weight: 0.25
    description: "Stage-appropriate information boundaries"
  - type: llm_judge
    criteria: "Financial data is precisely formatted — share counts, pricing, valuation, and financial metrics follow standard investor relations formatting"
    weight: 0.25
    description: "Precisely formatted financial data"
  - type: llm_judge
    criteria: "Executive quotes progress appropriately — from measured filing announcement to more celebratory first-day tone without being unprofessional"
    weight: 0.20
    description: "Appropriately progressing executive quotes"
