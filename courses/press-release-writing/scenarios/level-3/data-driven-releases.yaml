meta:
  id: data-driven-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write data-driven press releases that present research, surveys, and statistics for maximum media pickup"
  tags: [press-release, data, research, statistics, surveys, advanced]

state: {}

trigger: |
  Data-driven press releases — featuring original research,
  survey results, or statistical analysis — have significantly
  higher media pickup rates than standard announcements. Journalists
  rank compelling data as the #1 factor in coverage decisions.

  Write data-driven press releases for 4 research projects:

  Research 1: Consumer behavior survey
  Company: "ShopInsights" — e-commerce analytics
  Survey: 5,000 US consumers on holiday shopping behavior
  Key findings:
  - 72% plan to start holiday shopping before November
  - Average planned spend: $1,200 (up 8% from last year)
  - 45% will use AI assistants for product recommendations
  - Gen Z spending 34% more on experiences vs products
  Methodology: Online survey, October 2026, ±1.4% margin of error
  Task: Write the data-driven press release with findings
  structured for maximum media pickup

  Research 2: Industry benchmark report
  Company: "CloudBench" — cloud computing consultancy
  Report: "State of Cloud Migration 2026" — surveyed 1,000 CTOs
  Key findings:
  - 67% of enterprises are multi-cloud now (up from 42% in 2024)
  - Average migration cost: $2.3M (down 18% from 2025)
  - Top barrier: Security concerns (58%), not cost (29%)
  - Companies saving avg 31% on infrastructure post-migration
  Task: Write for tech trade media with benchmark comparisons

  Research 3: Economic analysis
  Company: "EconPulse" — economic research firm
  Study: Impact of remote work on commercial real estate
  Key findings:
  - Office vacancy hit 22% nationally (highest since 2001)
  - Companies saving avg $12,000/employee/year on office space
  - But suburban coworking space demand up 180% since 2023
  - Prediction: 35% of office space will be repurposed by 2030
  Task: Write for business and real estate media

  Research 4: Social impact study
  Organization: "HealthEquity Foundation" (nonprofit)
  Study: Access to mental health services across income levels
  Key findings:
  - Low-income Americans wait 47 days for a therapy appointment
    (vs 8 days for high-income)
  - 68% of rural counties have zero psychiatrists
  - Telehealth reduced wait times by 62% where available
  - $1 invested in mental health returns $4 in productivity
  Task: Write for health policy media and advocacy audiences

  For each release:
  1. Write the complete data-driven press release
  2. Structure findings from most to least newsworthy
  3. Include methodology transparency (sample size, dates, margin)
  4. Write data visualization descriptions (suggested charts/graphs)
  5. Offer spokesperson for interviews and data access
  6. Identify the "headline stat" that will drive coverage

assertions:
  - type: llm_judge
    criteria: "Data is presented for maximum impact — the most surprising or newsworthy finding leads, with supporting data arranged to build the narrative"
    weight: 0.30
    description: "Maximum impact data presentation"
  - type: llm_judge
    criteria: "Methodology is transparent — sample sizes, dates, margins of error, and research methods are clearly stated to establish credibility"
    weight: 0.25
    description: "Transparent methodology"
  - type: llm_judge
    criteria: "Headline stats are correctly identified — the single most compelling data point that would make a journalist write about this is chosen for the lead"
    weight: 0.25
    description: "Correctly identified headline stat"
  - type: llm_judge
    criteria: "Data visualization suggestions are practical — chart/graph descriptions would effectively communicate the key findings visually"
    weight: 0.20
    description: "Practical visualization suggestions"
