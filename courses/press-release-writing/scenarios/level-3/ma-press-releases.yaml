meta:
  id: ma-press-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write M&A press releases that satisfy regulatory, investor, and employee audiences simultaneously"
  tags: [press-release, merger, acquisition, ma, corporate, advanced]

state: {}

trigger: |
  Merger and acquisition press releases serve multiple critical
  audiences simultaneously: investors (stock impact), employees
  (job security), customers (continuity), regulators (compliance),
  and media (deal significance). They require legal precision,
  financial transparency, and strategic messaging.

  Write M&A press releases for 3 deal scenarios:

  Scenario 1: Friendly acquisition
  Acquirer: "TechCorp" (NASDAQ: TECH, $5B market cap)
  Target: "DataAI" (private, AI analytics startup)
  Deal: $340M all-cash acquisition
  Rationale: Adding AI capabilities to TechCorp's platform
  Timeline: Expected to close Q2 2026, pending regulatory approval
  Employee impact: All DataAI employees to be retained
  Task: Write the joint press release from both companies

  Scenario 2: Merger of equals
  Company A: "CloudSync" (cloud storage, $2B revenue)
  Company B: "SecureVault" (cybersecurity, $1.8B revenue)
  Deal: All-stock merger, new entity "CloudGuard"
  CEO: CloudSync CEO will lead; SecureVault CEO becomes President
  Synergies: $200M annual cost savings expected by 2028
  Layoffs: 500 positions to be eliminated (from combined 8,000)
  Task: Write the merger press release that addresses job losses
  honestly while maintaining confidence

  Scenario 3: Hostile takeover bid
  Bidder: "MegaCorp" ($50B conglomerate)
  Target: "InnoTech" ($3B specialized software company)
  Bid: $45/share (20% premium over current price)
  InnoTech board: Unanimously rejected, calls bid "undervalued"
  Task: Write both the bidder's press release AND the target's
  rejection response

  For each scenario:
  1. Write the complete press release(s)
  2. Include required financial and regulatory disclosures
  3. Write quotes addressing each key audience
  4. Include Safe Harbor disclaimers and transaction details
  5. Address employee and customer continuity concerns
  6. Identify the legal review requirements

assertions:
  - type: llm_judge
    criteria: "Multi-audience messaging is balanced — investor, employee, customer, and regulatory concerns are all addressed without contradicting each other"
    weight: 0.30
    description: "Balanced multi-audience messaging"
  - type: llm_judge
    criteria: "Financial disclosures are complete — deal terms, timing, regulatory conditions, and financial impact are transparently presented"
    weight: 0.25
    description: "Complete financial disclosures"
  - type: llm_judge
    criteria: "Sensitive topics are handled skillfully — layoffs, rejected bids, and leadership changes are addressed honestly without creating panic"
    weight: 0.25
    description: "Skillful sensitive topic handling"
  - type: llm_judge
    criteria: "Legal language is appropriate — Safe Harbor disclaimers, forward-looking statements, and regulatory compliance language are included correctly"
    weight: 0.20
    description: "Appropriate legal language"
