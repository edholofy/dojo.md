meta:
  id: product-recall-releases
  level: 3
  course: press-release-writing
  type: output
  description: "Write product recall press releases with consumer safety, regulatory compliance, and brand protection"
  tags: [press-release, recall, safety, regulatory, compliance, advanced]

state: {}

trigger: |
  Product recall press releases must simultaneously protect
  consumer safety, comply with regulatory requirements (CPSC, FDA,
  NHTSA), maintain brand trust, and provide clear action steps.
  They are among the highest-stakes releases a company issues.

  Write recall press releases for 4 scenarios:

  Scenario 1: Consumer electronics recall
  Company: "PowerTech" — portable battery manufacturer
  Product: 10,000mAh portable charger (Model PT-1000)
  Issue: Risk of overheating and fire in specific manufacturing batch
  Units affected: 45,000 units sold between Jan-March 2026
  Incidents: 3 reports of overheating, 1 minor burn, no hospitalizations
  CPSC: Coordinated recall with Consumer Product Safety Commission
  Remedy: Full refund or replacement
  Task: Write the recall press release following CPSC format

  Scenario 2: Food product recall
  Company: "NutriPure" — organic snack manufacturer
  Product: Organic almond butter (12oz jars)
  Issue: Possible presence of undeclared peanuts (allergen risk)
  Units affected: 200,000 jars distributed nationally
  Incidents: No reported illnesses
  FDA: Class II recall (potential health hazard, not life-threatening)
  Remedy: Full refund at point of purchase
  Task: Write the recall with FDA-compliant allergen warning language

  Scenario 3: Automotive recall
  Company: "ElectraMotors" — electric vehicle manufacturer
  Product: Model S3 sedan (2025 model year)
  Issue: Software update required for brake assist system calibration
  Units affected: 12,000 vehicles
  NHTSA: Filed recall notice
  Incidents: No accidents, discovered in internal testing
  Remedy: Free over-the-air software update
  Task: Write the recall emphasizing proactive discovery and easy fix

  Scenario 4: Medical device recall
  Company: "MedTech Solutions" — medical device manufacturer
  Product: Blood glucose monitoring system (Model BG-200)
  Issue: Potential for inaccurate readings in extreme humidity
  Units affected: 30,000 units in clinical settings
  FDA: Class I recall (serious risk of health consequences)
  Remedy: Immediate replacement units shipped to all facilities
  Task: Write the urgent recall with healthcare provider instructions

  For each recall:
  1. Write the complete press release following agency-specific format
  2. Include consumer action steps prominently
  3. Write the helpline/contact information section
  4. Include product identification details (model, UPC, batch)
  5. Write the follow-up FAQ for consumer questions
  6. Explain the legal review requirements before publication

assertions:
  - type: llm_judge
    criteria: "Consumer safety information is prominent — action steps, product identification, and remedy instructions are immediately clear and actionable"
    weight: 0.30
    description: "Prominent consumer safety information"
  - type: llm_judge
    criteria: "Regulatory compliance is demonstrated — follows CPSC, FDA, or NHTSA format requirements appropriate to each product type"
    weight: 0.25
    description: "Regulatory format compliance"
  - type: llm_judge
    criteria: "Tone balances urgency with reassurance — communicates the seriousness of the issue without creating unnecessary panic"
    weight: 0.25
    description: "Urgency-reassurance balance"
  - type: llm_judge
    criteria: "FAQ anticipates real consumer questions — addresses what to do with the product, how to get a refund, and whether they're at risk"
    weight: 0.20
    description: "Consumer-anticipating FAQ"
