meta:
  id: seo-press-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Optimize press releases for search engines and AI Overviews with strategic keyword placement"
  tags: [press-release, seo, keywords, search-optimization, intermediate]

state: {}

trigger: |
  96% of PR professionals use newswire services for SEO benefits.
  SEO-optimized press releases increase discoverability in search
  results and AI Overviews.

  Key SEO elements:
  - Headline: Include primary keyword, under 70 characters
  - First paragraph: Primary and secondary keywords naturally
  - Anchor text: Descriptive links, not "click here"
  - Multimedia: Images with alt text, embedded video
  - Structure: Use subheadings, bullet points for scannability
  - Keywords: Specific long-tail phrases ("eco-friendly sneaker
    launch 2026" not just "sneakers")

  Write SEO-optimized press releases for 3 announcements:

  Announcement 1: SaaS product launch
  Company: "ProjectFlow" project management platform
  Target keywords: "AI project management software," "automated
  project tracking," "team productivity tool 2026"
  Task: Write a complete press release with natural keyword
  integration, optimized headline, and suggested anchor text links

  Announcement 2: Healthcare research
  Company: "BioGenesis Labs" pharmaceutical research
  Target keywords: "Type 2 diabetes treatment breakthrough,"
  "blood sugar management research," "oral insulin alternative"
  Task: Write with medical credibility while optimizing for search

  Announcement 3: Sustainability initiative
  Company: "GreenThread" fashion brand
  Target keywords: "sustainable fashion brand," "recycled fabric
  clothing," "carbon-neutral clothing line 2026"
  Task: Write with environmental specifics while targeting search terms

  For each release:
  1. Write the complete SEO-optimized press release
  2. Highlight where keywords are placed and why
  3. Write 3 anchor text links with descriptive text
  4. Recommend image alt text for multimedia elements
  5. Explain the balance between SEO and readability
  6. Note: Google attempts to ignore press release links for ranking,
     so explain the realistic SEO value

assertions:
  - type: llm_judge
    criteria: "Keywords are integrated naturally — target terms appear in headlines, leads, and body copy without keyword stuffing or awkward phrasing"
    weight: 0.30
    description: "Natural keyword integration"
  - type: llm_judge
    criteria: "SEO value is realistically assessed — acknowledges that Google discounts press release links while explaining genuine SEO benefits (indexed content, brand visibility)"
    weight: 0.25
    description: "Realistic SEO value assessment"
  - type: llm_judge
    criteria: "Anchor text and multimedia optimization are practical — links use descriptive text and image alt text serves both accessibility and search purposes"
    weight: 0.25
    description: "Practical anchor and multimedia optimization"
  - type: llm_judge
    criteria: "Readability is maintained — press releases read naturally and serve journalistic purposes despite keyword optimization"
    weight: 0.20
    description: "Maintained readability"
