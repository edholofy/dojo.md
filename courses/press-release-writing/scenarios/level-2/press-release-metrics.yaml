meta:
  id: press-release-metrics
  level: 2
  course: press-release-writing
  type: output
  description: "Measure and report press release performance using pickup rates, backlinks, and media coverage"
  tags: [press-release, metrics, measurement, roi, intermediate]

state: {}

trigger: |
  Press release performance metrics include:
  - Media pickup rate (~25% without follow-up, 2-3% result in
    original coverage)
  - Backlinks earned (median 13 per high-performing release)
  - Website traffic lift (10-20% typical post-release)
  - Share of voice change
  - Lead generation (5-10 qualified leads per release average)
  - Social media engagement
  - Sentiment analysis

  Design measurement frameworks for 4 press release campaigns:

  Campaign 1: Product launch press release
  Company: SaaS startup, $2M marketing budget, first major product
  Distribution: PR Newswire national circuit + targeted pitches
  Task: Define the KPIs, set benchmarks, and design the measurement
  dashboard for 30 days post-release

  Campaign 2: Crisis communication press release
  Company: Food manufacturer product recall
  Distribution: Business Wire + direct media outreach + social media
  Task: Define crisis-specific metrics (sentiment shift, narrative
  control, misinformation rate) alongside standard metrics

  Campaign 3: Quarterly earnings press release
  Company: Publicly traded tech company
  Distribution: Business Wire + SEC filing + investor relations
  Task: Define financial PR-specific metrics (analyst coverage,
  stock price impact, investor sentiment)

  Campaign 4: Nonprofit impact report press release
  Organization: Education nonprofit
  Distribution: PRWeb + direct pitches to education reporters
  Task: Define mission-driven metrics (volunteer signups, donations,
  partnership inquiries) alongside media metrics

  For each campaign:
  1. Define primary and secondary KPIs
  2. Set realistic benchmarks based on industry data
  3. Identify the measurement tools (GA4, Ahrefs, Meltwater, etc.)
  4. Design the reporting template (weekly and monthly views)
  5. Write the "performance summary" narrative for stakeholders
  6. Recommend optimization actions based on different result scenarios

assertions:
  - type: llm_judge
    criteria: "KPIs are appropriate to the campaign type — product launches measure differently from crisis communications or earnings releases"
    weight: 0.30
    description: "Campaign-appropriate KPIs"
  - type: llm_judge
    criteria: "Benchmarks are realistic — metrics targets are grounded in industry data rather than arbitrary numbers"
    weight: 0.25
    description: "Realistic benchmarks"
  - type: llm_judge
    criteria: "Measurement tools are practical — recommends specific, accessible tools for tracking each metric"
    weight: 0.25
    description: "Practical measurement tools"
  - type: llm_judge
    criteria: "Optimization actions are scenario-specific — provides different next steps for exceeding, meeting, or missing benchmarks"
    weight: 0.20
    description: "Scenario-specific optimization"
