meta:
  id: multimedia-press-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Create multimedia press releases with images, video, and infographic integration"
  tags: [press-release, multimedia, visual, video, intermediate]

state: {}

trigger: |
  Press releases with visuals see 9.7x more views than text-only
  releases. 81% of journalists prefer press releases that include
  images. Multimedia elements include high-quality images, video,
  infographics, audio clips, and interactive content.

  Design multimedia press release strategies for 4 announcements:

  Announcement 1: Consumer product launch
  Company: "AquaPure" — smart water filtration system ($299)
  Visual needs: Product shots, comparison infographic (before/after
  water quality), installation video, CEO headshot
  Task: Write the press release with multimedia integration notes —
  specify exactly where each visual element is placed and its purpose

  Announcement 2: Company milestone
  Company: "CodeAcademy" — online coding education
  Milestone: 5 million students, 1 million job placements
  Visual needs: Impact infographic, student success stories,
  data visualization, CEO video statement
  Task: Write with integrated data visualization descriptions

  Announcement 3: Scientific research announcement
  Company: "DeepOcean" — marine research organization
  News: Discovery of new deep-sea species in Pacific trench
  Visual needs: Species photography, discovery location map,
  research team photos, video footage of discovery
  Task: Write with scientific imagery integration

  Announcement 4: Corporate social responsibility
  Company: "TechCorp" — enterprise software
  Initiative: Built 20 schools in developing countries
  Visual needs: Before/after photos, impact infographic,
  student testimonials, drone footage of completed schools
  Task: Write with emotional visual storytelling

  For each press release:
  1. Write the complete text with [IMAGE], [VIDEO], [INFOGRAPHIC]
     placement markers
  2. Write image captions and alt text for each visual
  3. Write video descriptions and suggested lengths
  4. Describe the infographic content and data points
  5. Explain how multimedia elements enhance the story
  6. Recommend the multimedia format for different distribution
     channels (newswire, email pitch, social media)

assertions:
  - type: llm_judge
    criteria: "Multimedia placements are strategic — visual elements appear at points where they enhance comprehension or emotional impact, not randomly"
    weight: 0.30
    description: "Strategic multimedia placement"
  - type: llm_judge
    criteria: "Image captions and alt text are well-crafted — captions add context beyond what's visible, and alt text serves accessibility and SEO"
    weight: 0.25
    description: "Well-crafted captions and alt text"
  - type: llm_judge
    criteria: "Infographic descriptions are data-rich — clearly define the data points, comparisons, and visual hierarchy for each infographic"
    weight: 0.25
    description: "Data-rich infographic descriptions"
  - type: llm_judge
    criteria: "Channel-specific recommendations are practical — explains how the same multimedia assets adapt across newswire, email, and social distribution"
    weight: 0.20
    description: "Practical channel-specific recommendations"
