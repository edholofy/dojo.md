meta:
  id: audience-specific-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Adapt press release tone and content for different target audiences — journalists, investors, consumers"
  tags: [press-release, audience, journalists, investors, consumers, intermediate]

state: {}

trigger: |
  The same news requires different treatment for different audiences.
  Journalists want facts and data (89% consider press releases their
  most trusted source). Investors want financial context and strategic
  implications. Consumers want relevance and practical value.

  Write audience-adapted versions for 3 announcements:

  Announcement: "MediTech" launches AI diagnostic tool
  - Product: AI-powered medical imaging analysis
  - Accuracy: 98.7% detection rate for early-stage tumors
  - FDA status: Cleared for clinical use
  - Price: $50,000/unit for hospitals
  - Impact: Could reduce misdiagnosis by 40%
  - Investors: Expecting $30M revenue in first year

  Version 1: For technology/business journalists
  Target: TechCrunch, Wired, VentureBeat reporters
  Emphasis: Technical innovation, competitive landscape, market disruption
  Task: Write the full press release optimized for tech media

  Version 2: For investors and financial analysts
  Target: Institutional investors, Wall Street analysts
  Emphasis: Revenue projections, market size, competitive advantage,
  FDA clearance as a moat, scalability
  Task: Write the full press release optimized for financial audiences

  Version 3: For healthcare consumers and patients
  Target: Health publications, patient advocacy groups
  Emphasis: Patient outcomes, accessibility, what this means for
  cancer detection, human impact stories
  Task: Write the full press release optimized for consumer audiences

  For each version:
  1. Write the complete press release
  2. Highlight what changes between versions (emphasis, data, quotes,
     language complexity, CTA)
  3. Explain why the same fact is framed differently per audience
  4. Identify the distribution channel for each version
  5. Write audience-specific quotes (CTO for tech, CFO for investors,
     CMO for consumers)

assertions:
  - type: llm_judge
    criteria: "Audience adaptations are meaningful — each version genuinely differs in emphasis, language, and framing rather than superficial word changes"
    weight: 0.30
    description: "Meaningful audience adaptations"
  - type: llm_judge
    criteria: "Technical depth matches audience — journalist version includes technical detail, investor version focuses on financials, consumer version uses accessible language"
    weight: 0.25
    description: "Audience-matched technical depth"
  - type: llm_judge
    criteria: "Quotes are appropriately sourced — the right spokesperson speaks to the right audience (CTO for tech, CFO for finance, CMO for consumers)"
    weight: 0.25
    description: "Appropriately sourced quotes"
  - type: llm_judge
    criteria: "Core news remains consistent — despite different framing, all three versions accurately represent the same underlying announcement"
    weight: 0.20
    description: "Consistent core news"
