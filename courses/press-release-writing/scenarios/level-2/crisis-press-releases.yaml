meta:
  id: crisis-press-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Write crisis communication press releases that address incidents with transparency and empathy"
  tags: [press-release, crisis, communication, reputation, intermediate]

state: {}

trigger: |
  Crisis press releases require speed, transparency, empathy,
  and accountability. Core principles: limit to 3-4 major points,
  acknowledge the situation factually, take appropriate responsibility,
  outline solutions, and show genuine concern.

  Write crisis press releases for 4 scenarios:

  Scenario 1: Data breach
  Company: "SecureBank" — online banking platform (2M customers)
  Incident: Unauthorized access exposed names and email addresses
  of 150,000 customers (no financial data compromised)
  Timeline: Discovered 48 hours ago, breach contained 12 hours ago
  Task: Write the initial crisis press release

  Scenario 2: Product safety issue
  Company: "BabyFirst" — baby food manufacturer
  Incident: Voluntary recall of one batch of organic purees due to
  potential elevated lead levels detected in routine testing
  Affected: 50,000 units sold in 12 states
  Task: Write the recall announcement press release

  Scenario 3: Executive misconduct allegation
  Company: "GlobalTech" — enterprise software company
  Incident: CFO placed on administrative leave pending investigation
  into financial reporting irregularities
  Context: Board-initiated independent investigation, SEC notified
  Task: Write the press release that maintains investor confidence

  Scenario 4: Environmental incident
  Company: "PetroChem Industries" — chemical manufacturer
  Incident: Accidental release of non-toxic wastewater into local
  river exceeding permit levels, discovered during routine monitoring
  Impact: No health risk, but environmental remediation required
  Task: Write the press release that addresses community concerns

  For each crisis release:
  1. Write the complete press release
  2. Include a CEO/spokesperson quote that shows empathy without
     admitting unnecessary liability
  3. Outline specific remediation steps
  4. Provide contact information for affected parties
  5. Explain what should NOT be said in this situation
  6. Write the follow-up press release (24-48 hours later)
  7. Identify the legal review requirements before publication

assertions:
  - type: llm_judge
    criteria: "Transparency and accountability are balanced — takes appropriate responsibility without creating unnecessary legal exposure"
    weight: 0.30
    description: "Balanced transparency and accountability"
  - type: llm_judge
    criteria: "Speed and completeness are balanced — provides enough information to address immediate concerns without waiting for all facts"
    weight: 0.25
    description: "Speed-completeness balance"
  - type: llm_judge
    criteria: "Remediation steps are concrete — outlines specific actions being taken rather than vague promises of 'looking into it'"
    weight: 0.25
    description: "Concrete remediation steps"
  - type: llm_judge
    criteria: "Follow-up releases advance the narrative — the second release provides meaningful updates rather than repeating the initial statement"
    weight: 0.20
    description: "Narrative-advancing follow-ups"
