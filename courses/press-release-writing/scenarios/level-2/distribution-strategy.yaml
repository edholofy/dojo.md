meta:
  id: distribution-strategy
  level: 2
  course: press-release-writing
  type: output
  description: "Design press release distribution strategies across newswires, direct pitches, and digital channels"
  tags: [press-release, distribution, newswire, pitching, intermediate]

state: {}

trigger: |
  Press release distribution has evolved beyond simple newswire
  syndication. Modern strategies combine newswire services (PR
  Newswire, Business Wire), direct journalist pitches (94% of
  journalists prefer one-on-one), social media amplification,
  and owned media publishing.

  Design distribution strategies for 4 announcements:

  Announcement 1: Unicorn funding round ($100M Series D)
  Company: Major FinTech startup
  News value: Very high (unicorn status, major investors)
  Target media: Tier 1 (WSJ, TechCrunch, Bloomberg, Forbes)
  Task: Design the distribution strategy including embargo timing,
  exclusive offers, wire distribution, and social amplification

  Announcement 2: Local business expansion
  Company: Regional restaurant chain opening 5 new locations
  News value: Moderate (local interest, job creation)
  Target media: Local newspapers, city business journals, food blogs
  Task: Design a local-focused distribution strategy

  Announcement 3: Industry research report
  Company: B2B market research firm
  News value: High for trade media, low for general media
  Target media: Industry trade publications, analyst newsletters
  Task: Design a trade-media-focused distribution strategy

  Announcement 4: Nonprofit impact report
  Company: Education nonprofit releasing annual results
  News value: Moderate (human interest angle)
  Target media: Education publications, local news, philanthropy media
  Task: Design a multi-channel distribution strategy

  For each announcement:
  1. Choose the distribution channels (wire, direct pitch, social,
     owned media, email) and justify each
  2. Write the media pitch email (under 200 words) that accompanies
     the press release
  3. Define the timing strategy (day of week, time of day, lead time)
  4. Recommend wire service tier and geographic targeting
  5. Design the social media amplification plan
  6. Estimate the expected pickup and coverage metrics

assertions:
  - type: llm_judge
    criteria: "Channel selection matches news value — tier-1 strategies for major news, local/trade strategies for niche news, with clear justification"
    weight: 0.30
    description: "News-value-matched channel selection"
  - type: llm_judge
    criteria: "Media pitch emails are compelling — under 200 words, personalized angle, clear news value, and easy journalist action"
    weight: 0.25
    description: "Compelling media pitch emails"
  - type: llm_judge
    criteria: "Timing strategy is strategic — considers day-of-week best practices, lead times for embargoes, and coordination across channels"
    weight: 0.25
    description: "Strategic timing"
  - type: llm_judge
    criteria: "Metric estimates are realistic — pickup rate, coverage, and reach predictions are grounded in industry benchmarks"
    weight: 0.20
    description: "Realistic metric estimates"
