meta:
  id: industry-specific-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Write press releases tailored to specific industries — tech, healthcare, finance, and nonprofit"
  tags: [press-release, industry-specific, tech, healthcare, finance, intermediate]

state: {}

trigger: |
  Different industries have different press release conventions,
  required disclosures, jargon expectations, and media targets.

  Write industry-specific press releases for 4 sectors:

  Industry 1: Technology
  Company: "QuantumAI" — quantum computing startup
  News: Achieved quantum advantage on a commercial optimization
  problem for the first time
  Audience: Tech journalists, enterprise CTOs, investors
  Requirements: Technical credibility without inaccessibility,
  benchmark comparisons, commercial applications
  Task: Write a tech press release balancing technical precision
  with business impact

  Industry 2: Healthcare/Pharma
  Company: "NeuroGen Therapeutics"
  News: Phase 3 clinical trial results for Alzheimer's treatment
  show 35% cognitive decline reduction
  Audience: Medical journals, healthcare reporters, patient advocates
  Requirements: Clinical data accuracy, FDA regulatory context,
  patient impact, no overpromising
  Task: Write a healthcare press release with proper clinical data
  presentation and regulatory disclaimers

  Industry 3: Financial services
  Company: "Atlas Wealth Management"
  News: Launching a new ESG investment fund ($500M initial AUM)
  with proprietary AI-driven scoring methodology
  Audience: Financial advisors, institutional investors, ESG analysts
  Requirements: Performance disclaimers, regulatory disclosures,
  methodology transparency
  Task: Write a financial services press release with proper disclosures

  Industry 4: Nonprofit
  Organization: "WaterFirst Foundation"
  News: Completed 1,000th clean water well in Sub-Saharan Africa,
  providing water access to 2.5 million people
  Audience: Philanthropic media, donors, partner organizations
  Requirements: Impact data, human stories, donor recognition,
  call to action
  Task: Write a nonprofit press release focused on mission impact

  For each release:
  1. Write the complete press release
  2. Identify industry-specific formatting requirements
  3. Note the regulatory or compliance considerations
  4. List the target publications for each industry
  5. Explain what makes this industry's press releases unique

assertions:
  - type: llm_judge
    criteria: "Industry conventions are followed — tech releases include benchmarks, healthcare includes clinical data, finance includes disclaimers, nonprofit includes impact metrics"
    weight: 0.30
    description: "Industry convention compliance"
  - type: llm_judge
    criteria: "Regulatory requirements are addressed — clinical trial disclaimers, financial performance disclaimers, and other required language is included"
    weight: 0.25
    description: "Regulatory requirement coverage"
  - type: llm_judge
    criteria: "Technical depth is audience-appropriate — tech and healthcare releases use precise terminology while remaining accessible to non-specialists"
    weight: 0.25
    description: "Audience-appropriate technical depth"
  - type: llm_judge
    criteria: "Target publication lists are realistic — recommended media outlets are actual publications that would cover each industry's news"
    weight: 0.20
    description: "Realistic target publications"
