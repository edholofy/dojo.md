meta:
  id: media-pitch-conversion
  level: 2
  course: press-release-writing
  type: output
  description: "Convert press releases into targeted media pitches for individual journalists"
  tags: [press-release, media-pitch, journalist, outreach, intermediate]

state: {}

trigger: |
  94% of journalists prefer receiving personalized pitches over
  sifting through press releases on wire services. The pitch
  should be under 200 words, tailored to the journalist's beat,
  and offer a unique angle they can't get elsewhere.

  Convert press releases into targeted pitches for 4 stories:

  Story 1: AI hiring platform raises $30M
  Press release: Standard funding announcement (already written)
  Target journalist: Sarah Chen, TechCrunch (covers HR tech)
  Her recent coverage: AI replacing recruiters, bias in hiring
  Task: Write a personalized pitch that hooks into her existing
  beat and angles

  Story 2: Electric vehicle battery breakthrough
  Press release: Scientific breakthrough announcement
  Target journalist: James Park, Wired (covers clean energy)
  His recent coverage: Battery supply chain issues, lithium alternatives
  Task: Write a pitch that connects the breakthrough to his
  ongoing storylines

  Story 3: Restaurant chain using AI to reduce food waste
  Press release: Technology partnership announcement
  Target journalist: Maria Rodriguez, Bloomberg (covers food industry)
  Her recent coverage: Restaurant industry labor challenges, sustainability
  Task: Write a pitch that positions this as a sustainability trend story

  Story 4: Nonprofit coding bootcamp achieving 90% job placement
  Press release: Impact milestone announcement
  Target journalist: David Kim, local newspaper education reporter
  His recent coverage: Workforce development, community programs
  Task: Write a pitch offering a local angle with student interviews

  For each conversion:
  1. Write the under-200-word personalized pitch email
  2. Write a compelling subject line (under 60 characters)
  3. Explain what you changed from the press release and why
  4. Identify what exclusive element you're offering
  5. Write the follow-up email (for no response after 3 days)
  6. Explain how the pitch solves a problem for the journalist
     rather than creating one

assertions:
  - type: llm_judge
    criteria: "Pitches are genuinely personalized — reference the journalist's recent coverage and connect the story to their existing beat"
    weight: 0.30
    description: "Genuinely personalized pitches"
  - type: llm_judge
    criteria: "Pitches are concise — each stays under 200 words while including all essential elements (hook, news, angle, CTA)"
    weight: 0.25
    description: "Concise effective pitches"
  - type: llm_judge
    criteria: "Angles differ from the press release — pitches offer journalist-specific angles rather than just summarizing the release"
    weight: 0.25
    description: "Journalist-specific angles"
  - type: llm_judge
    criteria: "Follow-up emails add value — the second touch provides new information or an alternative angle rather than just asking 'did you get my email?'"
    weight: 0.20
    description: "Value-adding follow-ups"
