meta:
  id: embargo-and-exclusive
  level: 2
  course: press-release-writing
  type: output
  description: "Design embargo and exclusive pitching strategies for maximum media coverage"
  tags: [press-release, embargo, exclusive, media-relations, intermediate]

state: {}

trigger: |
  76% of journalists are more likely to cover a story if offered
  an exclusive. Embargoes give multiple journalists advance access
  with a coordinated publication date. Each strategy has tradeoffs.

  Design embargo and exclusive strategies for 4 announcements:

  Announcement 1: Major acquisition ($500M deal)
  Companies: Large SaaS company acquiring AI startup
  Significance: Largest AI acquisition of 2026
  Regulatory: SEC filing required, publicly traded acquirer
  Task: Design the full embargo strategy — who gets early access,
  when the embargo lifts, how to handle if someone breaks it

  Announcement 2: Consumer product reveal
  Company: Premium headphone brand launching $400 flagship product
  Strategy: Want one exclusive review to build buzz before launch
  Target: The Verge or Wired for exclusive review
  Task: Design the exclusive pitch — how to approach, what to offer,
  what to withhold from other media

  Announcement 3: Research report with policy implications
  Organization: Climate research institute
  Report: New data showing accelerated ice melt in Antarctica
  Strategy: Want broad coverage, need embargo for fact-checking
  Target: Science journalists at NYT, Washington Post, Nature
  Task: Design the embargo with background briefing strategy

  Announcement 4: Celebrity partnership
  Company: D2C skincare brand partnering with celebrity co-founder
  Strategy: Want maximum buzz — exclusive announcement followed by
  broad coverage
  Task: Design a tiered exclusive → embargo → broad strategy

  For each strategy:
  1. Write the embargo/exclusive communication to journalists
  2. Define the timing (embargo lift date/time, advance notice period)
  3. Write the "pitch tease" that gets journalist agreement without
     revealing the full news
  4. Plan for embargo breaches — what happens if someone publishes early
  5. Write the follow-up for non-exclusive media after the exclusive runs
  6. Explain the tradeoffs of the chosen strategy

assertions:
  - type: llm_judge
    criteria: "Embargo/exclusive strategy matches the announcement's significance — major acquisitions get different treatment than product launches"
    weight: 0.25
    description: "Significance-matched strategy"
  - type: llm_judge
    criteria: "Pitch teases are effective — reveal enough to generate journalist interest without giving away the full story before agreement"
    weight: 0.25
    description: "Effective pitch teases"
  - type: llm_judge
    criteria: "Breach contingencies are realistic — provides practical responses to common embargo violations"
    weight: 0.25
    description: "Realistic breach contingencies"
  - type: llm_judge
    criteria: "Timing strategy is well-reasoned — embargo lift times, advance notice periods, and post-exclusive follow-up timing are strategically chosen"
    weight: 0.25
    description: "Well-reasoned timing strategy"
