meta:
  id: earnings-and-financial-releases
  level: 2
  course: press-release-writing
  type: output
  description: "Write earnings reports and financial press releases with proper disclosure and investor communication"
  tags: [press-release, earnings, financial, investor-relations, intermediate]

state: {}

trigger: |
  Financial press releases — earnings reports, guidance updates,
  and material events — have specific formatting, disclosure, and
  regulatory requirements. They serve investors, analysts, and
  regulatory bodies simultaneously.

  Write financial press releases for 3 scenarios:

  Scenario 1: Quarterly earnings beat
  Company: "CloudNet" (NASDAQ: CLNT) — cloud infrastructure
  Q4 2025 Results:
  - Revenue: $245M (up 32% YoY, beat consensus of $230M)
  - Net income: $28M ($0.42 EPS vs $0.35 expected)
  - ARR: $1.1B (milestone crossed)
  - Customer count: 12,500 (up from 9,200)
  - Guidance: Q1 2026 revenue $255-$265M
  Task: Write the earnings press release with tables, guidance,
  and CEO/CFO quotes

  Scenario 2: Revenue miss with positive outlook
  Company: "ShopDirect" (NYSE: SHPD) — e-commerce platform
  Q4 2025 Results:
  - Revenue: $180M (missed consensus of $195M)
  - Adjusted EBITDA: $22M (in line)
  - Reason for miss: Supply chain disruptions in December
  - Positive: Record holiday orders, delayed to Q1
  - Guidance: FY2026 revenue $820-$860M (reaffirmed)
  Task: Write an earnings release that acknowledges the miss while
  maintaining investor confidence

  Scenario 3: Material event — strategic review
  Company: "MediaCorp" (NYSE: MCOR) — media conglomerate
  News: Board initiating strategic review of streaming division,
  considering sale or partnership
  Context: Streaming division losing $50M/quarter, core business
  profitable
  Task: Write the material event press release with appropriate
  forward-looking statement disclaimers

  For each release:
  1. Write the complete press release with financial data tables
  2. Include appropriate Safe Harbor / forward-looking statement
     disclaimers
  3. Write CEO and CFO quotes tailored to the financial narrative
  4. Format numbers consistently (millions, EPS, percentages)
  5. Include conference call details
  6. Identify SEC disclosure requirements

assertions:
  - type: llm_judge
    criteria: "Financial data is presented clearly — revenue, earnings, guidance, and comparisons are formatted consistently and easy to scan"
    weight: 0.25
    description: "Clear financial data presentation"
  - type: llm_judge
    criteria: "Forward-looking statement disclaimers are included — proper Safe Harbor language protects the company while being transparent about projections"
    weight: 0.25
    description: "Proper forward-looking disclaimers"
  - type: llm_judge
    criteria: "Revenue miss handling is sophisticated — acknowledges underperformance honestly while providing context and maintaining credibility"
    weight: 0.25
    description: "Sophisticated miss handling"
  - type: llm_judge
    criteria: "CEO/CFO quotes complement each other — CEO provides strategic vision while CFO provides financial detail, without redundancy"
    weight: 0.25
    description: "Complementary executive quotes"
