meta:
  id: press-release-mistakes
  level: 1
  course: press-release-writing
  type: output
  description: "Identify and fix common press release writing mistakes"
  tags: [press-release, mistakes, diagnosis, beginner]

state: {}

trigger: |
  57% of journalists block contacts who send overly promotional
  press releases. Common mistakes include jargon, burying the lead,
  promotional language, and poor formatting.

  Identify and fix mistakes in 6 press release excerpts:

  Excerpt 1: Promotional language
  "XYZ Corp, the world's leading provider of innovative,
  cutting-edge, best-in-class enterprise solutions, is thrilled
  to announce the launch of its revolutionary, game-changing
  platform that will disrupt the industry and transform how
  businesses operate in the digital age."
  Task: Identify all promotional/jargon words and rewrite

  Excerpt 2: Buried lead
  "Founded in 2018 by two MIT graduates, TechVenture has grown
  from a small startup to a mid-size company with 200 employees.
  The company, which is based in Boston, Massachusetts, has been
  recognized for its innovative culture. Today, TechVenture
  announced a $50M acquisition of competitor DataFlow."
  Task: Restructure to lead with the news

  Excerpt 3: Missing news value
  "GreenTech Solutions today announced that it will continue to
  provide excellent service to its customers. The company remains
  committed to innovation and looks forward to a bright future."
  Task: Explain why this isn't newsworthy and suggest what would be

  Excerpt 4: Quote problems
  "CEO Bob Johnson said: 'Our synergistic approach to leveraging
  paradigm-shifting technologies enables us to deliver best-of-breed
  solutions that drive ROI across the value chain.'"
  Task: Rewrite as a quote a real person would say

  Excerpt 5: Formatting chaos
  "FOR IMMEDIATE RELEASE!!!! *** MAJOR NEWS *** Contact: Marketing
  Dept HEADLINE: WE ARE THE BEST!!! San francisco california
  feb 27 2026 - company does something good. for more info visit
  our website. thanks for reading."
  Task: Fix all formatting errors and rewrite properly

  Excerpt 6: Too long and unfocused
  A 1,000-word press release that covers: the company's history,
  its mission statement, the new product, the CEO's background,
  the company's other products, future plans, and industry trends.
  Task: Explain what to cut and how to focus to 400 words

  For each excerpt:
  1. Name the specific mistake(s)
  2. Explain why it hurts media pickup chances
  3. Rewrite or restructure to fix the problem
  4. Provide the principle behind the fix

assertions:
  - type: llm_judge
    criteria: "Mistakes are correctly identified — accurately names specific issues like promotional language, buried lead, missing news value, jargon-filled quotes"
    weight: 0.30
    description: "Accurate mistake identification"
  - type: llm_judge
    criteria: "Rewrites demonstrate the fix — the corrected versions clearly show the opposite of the mistake while maintaining professional press release quality"
    weight: 0.30
    description: "Fix-demonstrating rewrites"
  - type: llm_judge
    criteria: "Impact on media pickup is explained — connects each mistake to specific consequences (journalist blocking, ignored releases, lost coverage)"
    weight: 0.20
    description: "Media impact explanation"
  - type: llm_judge
    criteria: "Principles are transferable — each fix teaches a general rule that applies beyond the specific example"
    weight: 0.20
    description: "Transferable principles"
