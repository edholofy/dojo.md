meta:
  id: boilerplate-writing
  level: 1
  course: press-release-writing
  type: output
  description: "Write effective company boilerplate paragraphs for press releases"
  tags: [press-release, boilerplate, company-description, beginner]

state: {}

trigger: |
  The boilerplate ("About [Company]") appears at the end of every
  press release. It's a standardized company description that
  provides context about who the company is. It should be 2-3
  sentences covering: what the company does, who it serves, key
  differentiators, and notable achievements.

  Write boilerplates for 6 companies:

  Company 1: Early-stage startup
  Name: PetPal | Founded: 2024 | Employees: 15
  What: AI-powered pet health monitoring app
  Customers: 50,000 pet owners
  Differentiator: Uses wearable sensors to detect health issues early
  Funding: $3M seed round
  Task: Write a boilerplate that conveys credibility despite small size

  Company 2: Mid-size B2B SaaS
  Name: FlowOps | Founded: 2018 | Employees: 250
  What: Supply chain visibility platform
  Customers: 400 enterprise clients including 3 Fortune 500
  Differentiator: Real-time tracking across 100+ carriers
  Revenue: $45M ARR
  Task: Write a boilerplate that positions as an industry leader

  Company 3: Large public company
  Name: Nexus Industries | Founded: 1972 | Employees: 12,000
  What: Industrial automation and robotics manufacturer
  Customers: Manufacturing facilities in 40 countries
  Listed: NYSE (NXI) | Revenue: $3.2B
  Task: Write a boilerplate appropriate for a publicly traded company

  Company 4: Nonprofit organization
  Name: CodeForward Foundation | Founded: 2015
  What: Provides free coding education to underserved youth
  Impact: 100,000 students trained, 85% job placement rate
  Partnerships: Google, Microsoft, Amazon
  Task: Write a mission-focused boilerplate

  Company 5: Government agency
  Name: National Renewable Energy Commission (NREC)
  What: Federal agency overseeing renewable energy policy
  Mission: Accelerate transition to 100% clean energy by 2040
  Task: Write an institutional boilerplate with appropriate gravitas

  Company 6: Recently pivoted company
  Name: ShelfSmart | Founded: 2019 (as a retail analytics tool)
  Pivot: Now an AI-powered inventory management platform
  Customers: 800 retail chains
  Task: Write a boilerplate that acknowledges evolution without
  undermining stability

  For each boilerplate:
  1. Keep to 2-3 sentences (50-80 words)
  2. Include what the company does and who it serves
  3. Add one credibility signal (customers, revenue, awards, impact)
  4. Write in third person, present tense
  5. Explain your strategic choices

assertions:
  - type: llm_judge
    criteria: "Boilerplates are concise and informative — each is 2-3 sentences that clearly communicate what the company does and who it serves"
    weight: 0.30
    description: "Concise informative boilerplates"
  - type: llm_judge
    criteria: "Credibility signals are appropriate to company stage — startups use different proof points than public companies or nonprofits"
    weight: 0.25
    description: "Stage-appropriate credibility signals"
  - type: llm_judge
    criteria: "Tone matches company type — startups feel dynamic, public companies feel established, nonprofits feel mission-driven, government feels authoritative"
    weight: 0.25
    description: "Company-type-appropriate tone"
  - type: llm_judge
    criteria: "Written in proper boilerplate format — third person, present tense, factual, without promotional superlatives"
    weight: 0.20
    description: "Proper boilerplate format"
