meta:
  id: lead-paragraph-writing
  level: 1
  course: press-release-writing
  type: output
  description: "Write strong lead paragraphs that answer all 5 Ws within the first 30 words"
  tags: [press-release, lead-paragraph, 5ws, beginner]

state: {}

trigger: |
  The lead (lede) paragraph is the most critical part of a press
  release. It must answer the 5 Ws — Who, What, Where, When,
  Why — within approximately 30 words. Journalists often decide
  whether to cover a story based on the lead alone.

  Write lead paragraphs for 6 announcements:

  Announcement 1: Product launch
  Who: NovaTech (AI startup)
  What: Launching "SmartDraft" AI writing assistant for legal professionals
  Where: Available globally via web and mobile
  When: April 1, 2026
  Why: Legal documents take 40% longer than necessary to draft
  Task: Write 3 lead paragraph variations

  Announcement 2: Funding announcement
  Who: HealthBridge (telehealth platform)
  What: Closed $25M Series B funding round
  Where: San Francisco headquarters
  When: Today (Feb 27, 2026)
  Why: To expand telehealth access to rural communities
  Led by: Andreessen Horowitz
  Task: Write 3 lead paragraph variations

  Announcement 3: Event announcement
  Who: Global Climate Alliance (nonprofit)
  What: Hosting Climate Action Summit 2026
  Where: Geneva, Switzerland
  When: June 15-17, 2026
  Why: Unite 2,000+ leaders to set binding emissions targets
  Task: Write 3 lead paragraph variations

  Announcement 4: Personnel change
  Who: Zenith Motors (electric vehicle manufacturer)
  What: Appointing Dr. Maria Gonzalez as Chief Technology Officer
  Where: Detroit headquarters
  When: Effective March 1, 2026
  Why: To accelerate solid-state battery development
  Previous role: Head of R&D at Tesla
  Task: Write 3 lead paragraph variations

  Announcement 5: Research findings
  Who: Stanford University researchers
  What: Discovered new method to recycle lithium-ion batteries
  Where: Published in Nature Energy
  When: This week
  Why: Could reduce battery waste by 80% and cut recycling costs by 60%
  Task: Write 3 lead paragraph variations

  Announcement 6: Partnership
  Who: FreshFarm (farm-to-table delivery) × WholeMeal (meal kit service)
  What: Strategic partnership to combine fresh produce delivery with
  meal planning
  Where: Initially in 12 US metro areas
  When: Launching Q2 2026
  Why: Meet growing demand for convenient, healthy meal solutions
  Task: Write 3 lead paragraph variations

  For each set of 3 leads:
  1. Verify all 5 Ws are answered
  2. Keep each under 35 words
  3. Vary the lead structure (straight news, feature, question)
  4. Identify which lead is strongest and why
  5. Highlight the most newsworthy element in each

assertions:
  - type: llm_judge
    criteria: "All 5 Ws are answered in each lead — who, what, where, when, and why are clearly communicated without requiring additional context"
    weight: 0.30
    description: "Complete 5W coverage"
  - type: llm_judge
    criteria: "Leads are concise — each stays under 35 words while still being informative and compelling"
    weight: 0.25
    description: "Concise lead paragraphs"
  - type: llm_judge
    criteria: "Lead structures vary — includes straight news leads, feature leads, and different emphasis patterns across the three options"
    weight: 0.25
    description: "Varied lead structures"
  - type: llm_judge
    criteria: "Most newsworthy element leads — the strongest news angle is positioned at the very beginning of each lead paragraph"
    weight: 0.20
    description: "Newsworthy element prominence"
