meta:
  id: quotes-and-attribution
  level: 1
  course: press-release-writing
  type: output
  description: "Write effective press release quotes with proper attribution and strategic positioning"
  tags: [press-release, quotes, attribution, spokesperson, beginner]

state: {}

trigger: |
  Press releases with quotes have a 40% higher media pickup rate.
  Effective quotes add perspective, emotion, or vision that
  straight reporting cannot. They should sound like a real person
  speaking, not a marketing brochure.

  Write quotes for 6 press release scenarios:

  Scenario 1: CEO announcing a product launch
  Company: DataVault (cloud security)
  Product: Zero-trust authentication platform
  Bad example: "We're thrilled to announce this innovative,
  best-in-class solution that leverages our synergies."
  Task: Write 2 strong CEO quotes and explain why the bad example fails

  Scenario 2: Investor commenting on funding round
  Company: EcoCharge (EV charging network) | Investor: Sequoia Capital
  Round: $50M Series C
  Task: Write 1 CEO quote + 1 investor (partner) quote that complement
  each other without redundancy

  Scenario 3: Both partners in a partnership announcement
  Partners: CityHealth (urban clinic chain) × PharmaTech (drug delivery)
  Partnership: Same-day prescription delivery from clinic to home
  Task: Write 1 quote per partner that shows mutual value

  Scenario 4: New executive hire
  Company: Meridian Aerospace
  Hire: James Wu as VP of Engineering
  Background: 15 years at Boeing, led 787 avionics team
  Task: Write 1 CEO quote about the hire + 1 quote from the new hire

  Scenario 5: Crisis response
  Company: SafeDrive (autonomous vehicle startup)
  Incident: Software malfunction caused a minor accident, no injuries
  Task: Write 1 CEO quote that takes responsibility without
  admitting legal liability

  Scenario 6: Milestone achievement
  Company: LearnFlow (EdTech platform)
  Milestone: 10 million students served across 45 countries
  Task: Write 1 CEO quote that celebrates without being self-congratulatory

  For each scenario:
  1. Write the quote(s) with proper attribution format
  2. Explain why the quote adds value beyond the factual reporting
  3. Identify what makes a quote "sound like a real person"
  4. Show where in the press release the quote should be placed

assertions:
  - type: llm_judge
    criteria: "Quotes sound authentic — each quote sounds like a real person speaking rather than marketing copy, avoiding jargon like 'thrilled,' 'innovative,' or 'synergies'"
    weight: 0.30
    description: "Authentic-sounding quotes"
  - type: llm_judge
    criteria: "Quotes add value — each quote provides perspective, vision, or context that the factual reporting cannot convey"
    weight: 0.25
    description: "Value-adding quotes"
  - type: llm_judge
    criteria: "Attribution format is correct — follows AP style for titles and name formatting in quote attribution"
    weight: 0.20
    description: "Correct attribution format"
  - type: llm_judge
    criteria: "Crisis quote is carefully worded — takes responsibility and shows empathy without creating legal liability"
    weight: 0.25
    description: "Carefully worded crisis quote"
