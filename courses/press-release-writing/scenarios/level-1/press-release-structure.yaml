meta:
  id: press-release-structure
  level: 1
  course: press-release-writing
  type: output
  description: "Write a press release using the inverted pyramid structure with all required components"
  tags: [press-release, structure, inverted-pyramid, beginner]

state: {}

trigger: |
  The inverted pyramid is the foundational structure for press
  releases. It places the most important information first, with
  supporting details in descending order of importance:
  - 100% of readers read the headline
  - 70% read the first paragraph
  - 50% read the second paragraph
  - Only 10% read the fourth paragraph

  Required components:
  1. Headline (concise, newsworthy, under 70 characters for SEO)
  2. Subheadline (optional — secondary angle)
  3. Dateline (CITY, State (Month Day, Year) —)
  4. Lead paragraph (5 Ws: who, what, where, when, why in ~30 words)
  5. Body paragraphs (supporting details, descending importance)
  6. Quote (from company spokesperson)
  7. Boilerplate (company background, 2-3 sentences)
  8. Contact information (media contact name, email, phone)
  9. ### (end marker)

  Write press releases for 3 announcements:

  Announcement 1: Product launch
  Company: "StreamVault" — cloud storage startup
  News: Launching an AI-powered file organization feature that
  auto-tags and categorizes documents
  Price: Free for existing Pro users ($14.99/month plan)
  Available: March 15, 2026
  Task: Write a complete press release following all structural rules

  Announcement 2: Funding round
  Company: "GreenPack" — sustainable packaging startup
  News: Raised $12M Series A led by Sequoia Capital
  Use of funds: Expand manufacturing to serve 500+ brands
  Current traction: 120 brand customers, 3x growth year-over-year
  Task: Write a complete press release with investor quote included

  Announcement 3: Partnership
  Company: "EduBridge" online tutoring × "MathGenius" curriculum provider
  News: Partnership to offer AI-adaptive math tutoring in 5,000 schools
  Impact: Expected to reach 2M students by Fall 2026
  Task: Write a complete press release with quotes from both partners

  For each press release:
  1. Follow the inverted pyramid exactly
  2. Ensure the lead paragraph answers all 5 Ws
  3. Include all required components
  4. Keep total length between 300-500 words
  5. Explain your structural decisions

assertions:
  - type: llm_judge
    criteria: "Inverted pyramid is correctly applied — most important information appears first, with supporting details in descending order of importance"
    weight: 0.30
    description: "Correct inverted pyramid structure"
  - type: llm_judge
    criteria: "Lead paragraphs answer all 5 Ws — who, what, where, when, and why are clearly addressed within the first paragraph"
    weight: 0.25
    description: "Complete 5W lead paragraphs"
  - type: llm_judge
    criteria: "All components are present — headline, dateline, lead, body, quote, boilerplate, contact info, and end marker are included in every release"
    weight: 0.25
    description: "All required components present"
  - type: llm_judge
    criteria: "Length and tone are appropriate — each release stays within 300-500 words and uses a professional, informative tone rather than promotional language"
    weight: 0.20
    description: "Appropriate length and tone"
