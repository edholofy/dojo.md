meta:
  id: complete-press-release
  level: 1
  course: press-release-writing
  type: output
  description: "Write a complete, distribution-ready press release integrating all Level 1 skills"
  tags: [press-release, complete, distribution-ready, beginner]

state: {}

trigger: |
  Write a complete, distribution-ready press release that
  integrates all foundational skills: structure, AP style,
  headline, lead paragraph, quotes, boilerplate, and
  newsworthiness evaluation.

  Scenario: "NovaBridge" — AI-powered language translation platform

  News: NovaBridge announces the launch of "RealTime Translate,"
  the first AI translation tool that preserves cultural context,
  idioms, and emotional tone across 95 languages — not just
  word-for-word translation.

  Key details:
  - Company: NovaBridge, founded 2022, San Francisco, 85 employees
  - Product: RealTime Translate — real-time, context-aware translation
  - Technology: Built on proprietary "CultureAI" model trained on
    500M culturally-annotated text pairs
  - Languages: 95 languages at launch, 150 by end of 2026
  - Pricing: Free tier (5,000 words/month), Pro ($19/month),
    Enterprise (custom pricing)
  - Target users: Global businesses, translators, content creators
  - Traction: Beta tested by 200 companies including 3 Fortune 500
  - Competitive landscape: Google Translate, DeepL, but no competitor
    preserves cultural context
  - CEO: Dr. Anika Patel (former Google Brain researcher)
  - Availability: Immediate — web, iOS, Android, API
  - Quote from CEO: Needed
  - Quote from beta customer: Needed (a global marketing agency)

  Task: Write the complete press release including:
  1. Headline (under 70 characters, sentence case)
  2. Subheadline (optional, if it adds value)
  3. Dateline (proper AP format)
  4. Lead paragraph (5 Ws, under 35 words)
  5. Body paragraphs (2-3, descending importance)
  6. CEO quote (authentic, adds vision)
  7. Customer quote (adds third-party validation)
  8. Product availability paragraph
  9. Boilerplate (2-3 sentences)
  10. Contact information
  11. ### end marker

  Additional requirements:
  - Follow AP style throughout
  - Stay within 400-500 words
  - Avoid promotional language (no "revolutionary," "game-changing")
  - Evaluate the newsworthiness of this announcement (1-10) and
    explain your rating
  - Suggest 3 publications that would likely cover this story and
    explain why

assertions:
  - type: llm_judge
    criteria: "Press release is complete and distribution-ready — all 11 components are present, properly formatted, and the release could be sent to a wire service immediately"
    weight: 0.30
    description: "Complete distribution-ready release"
  - type: llm_judge
    criteria: "AP style is followed consistently — dateline, numbers, titles, dates, and formatting all comply with AP guidelines"
    weight: 0.25
    description: "Consistent AP style compliance"
  - type: llm_judge
    criteria: "Language is professional and factual — avoids promotional superlatives while still making the product sound compelling through specific facts and data"
    weight: 0.25
    description: "Professional factual language"
  - type: llm_judge
    criteria: "Publication targeting is strategic — suggested media outlets are realistic targets for this type of announcement, with clear reasoning"
    weight: 0.20
    description: "Strategic publication targeting"
