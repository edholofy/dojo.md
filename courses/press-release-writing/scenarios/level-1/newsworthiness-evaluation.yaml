meta:
  id: newsworthiness-evaluation
  level: 1
  course: press-release-writing
  type: output
  description: "Evaluate announcement newsworthiness and identify the strongest angle for media coverage"
  tags: [press-release, newsworthiness, news-angle, media, beginner]

state: {}

trigger: |
  Not every company announcement deserves a press release. The key
  question is: "Would a journalist outside your company care about
  this?" Newsworthy elements include: timeliness, impact, novelty,
  conflict, prominence, proximity, and human interest.

  Evaluate 8 potential announcements for newsworthiness:

  Announcement 1: Company hires new VP of Sales
  Company: Mid-size SaaS (200 employees, $20M ARR)
  The VP: 10 years at a mid-size competitor, no notable achievements
  Task: Rate newsworthiness (1-10) and explain. If low, suggest
  how to make it newsworthy or whether to skip the release.

  Announcement 2: Startup raises $100M at $1B valuation (unicorn)
  Company: FinTech startup, 3 years old, growing 400% YoY
  Led by: SoftBank
  Task: Rate newsworthiness and identify the strongest angle

  Announcement 3: Company updates its privacy policy
  Company: Social media platform with 50M users
  Change: Now shares data with third-party advertisers
  Task: Rate newsworthiness and identify the angle

  Announcement 4: Restaurant chain opens 3rd location
  Company: Local burger chain in Austin, TX
  Task: Rate newsworthiness for national vs local media

  Announcement 5: Pharmaceutical company discovers potential
  cancer treatment breakthrough
  Company: Biotech with 500 employees
  Data: Phase 2 trials show 89% tumor reduction rate
  Task: Rate newsworthiness and identify the primary audience

  Announcement 6: Company releases annual sustainability report
  Company: Fortune 500 retailer
  Highlight: Reduced carbon emissions by 3% year-over-year
  Task: Rate newsworthiness and suggest a stronger angle

  Announcement 7: App reaches 1 million downloads
  Company: 2-year-old mobile game startup
  Context: Game went viral on TikTok
  Task: Rate newsworthiness and find the human interest angle

  Announcement 8: Company donates $500 to local charity
  Company: Small business (10 employees)
  Charity: Local food bank
  Task: Rate newsworthiness and recommend the right channel

  For each announcement:
  1. Rate newsworthiness on a 1-10 scale
  2. Identify which newsworthiness factors are present
  3. Recommend the strongest angle if the story is viable
  4. Suggest whether to issue a press release, pitch directly,
     use social media, or skip it entirely
  5. For low-scoring announcements, suggest what would make them
     newsworthy

assertions:
  - type: llm_judge
    criteria: "Newsworthiness ratings are calibrated — high-impact stories (unicorn funding, cancer breakthrough) score highest while routine updates score lowest"
    weight: 0.30
    description: "Calibrated newsworthiness ratings"
  - type: llm_judge
    criteria: "Angles are identified correctly — finds the most compelling hook for each story rather than just restating the announcement"
    weight: 0.25
    description: "Correctly identified angles"
  - type: llm_judge
    criteria: "Channel recommendations are appropriate — not every announcement needs a press release; some are better as pitches, social posts, or blog entries"
    weight: 0.25
    description: "Appropriate channel recommendations"
  - type: llm_judge
    criteria: "Improvement suggestions are practical — for low-scoring announcements, provides specific changes that would increase newsworthiness"
    weight: 0.20
    description: "Practical improvement suggestions"
