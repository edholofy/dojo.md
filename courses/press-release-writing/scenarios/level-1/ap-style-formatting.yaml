meta:
  id: ap-style-formatting
  level: 1
  course: press-release-writing
  type: output
  description: "Apply AP style guidelines to press release formatting — dates, numbers, titles, and datelines"
  tags: [press-release, ap-style, formatting, guidelines, beginner]

state: {}

trigger: |
  AP (Associated Press) style is the standard for press releases.
  Key rules include:

  Dateline: CITY, State (Month Day, Year) —
  - Cities in ALL CAPS
  - Major cities stand alone (no state needed): NEW YORK, LOS ANGELES,
    CHICAGO, HOUSTON, etc.
  - Use AP state abbreviations (not postal codes)

  Dates: Abbreviate Jan., Feb., Aug., Sept., Oct., Nov., Dec.
  when used with specific dates. Spell out March, April, May, June,
  July when used with dates. Never use ordinal indicators (st, nd, th).

  Numbers: Spell out one through nine. Use numerals for 10+.
  Exceptions: Always use numerals for ages, money, percentages,
  dates, and dimensions.

  Headlines: Sentence case (capitalize first word and proper nouns
  only). No periods.

  Titles: Capitalize formal titles before names (CEO Jane Smith).
  Lowercase titles after names or standing alone.

  Fix 8 AP style errors in these press release excerpts:

  Excerpt 1: "NEW YORK, NY (February 27th, 2026) — TechCorp, the
  World's Leading Provider of AI solutions, today announced..."
  Errors to identify and fix: ___

  Excerpt 2: "The Company Raised Fifteen Million Dollars In Series
  B Funding Led By Accel Partners."
  Errors to identify and fix: ___

  Excerpt 3: "CEO john smith said, 'We're thrilled to announce this
  partnership.' The forty-five year old executive has led the
  company for 3 years."
  Errors to identify and fix: ___

  Excerpt 4: "PORTLAND, Oregon (Sept 15, 2026) — The event will
  take place on November 3rd at ten a.m."
  Errors to identify and fix: ___

  Excerpt 5: "The product, priced at nine dollars and ninety-nine
  cents per month, serves over 5 thousand customers across
  twelve countries."
  Errors to identify and fix: ___

  Excerpt 6: "San Francisco, CA (Mar. 10, 2026) — The 7-person
  startup reported revenue growth of two hundred percent."
  Errors to identify and fix: ___

  Excerpt 7: "vice president of marketing Sarah Chen announced
  the release of 3 new features for the company's 2000000
  users worldwide."
  Errors to identify and fix: ___

  Excerpt 8: "The Partnership, Which Was Announced Today, Will
  Generate An Estimated $2,500,000 In Annual Revenue."
  Errors to identify and fix: ___

  For each excerpt:
  1. Identify every AP style error
  2. Write the corrected version
  3. Cite the specific AP rule being violated

assertions:
  - type: llm_judge
    criteria: "All AP style errors are correctly identified — catches dateline format, number rules, title capitalization, date formatting, and headline case issues"
    weight: 0.30
    description: "Correct AP style error identification"
  - type: llm_judge
    criteria: "Corrections follow AP style exactly — fixed versions use proper dateline format, number rules, title case rules, and date abbreviations"
    weight: 0.30
    description: "Accurate AP style corrections"
  - type: llm_judge
    criteria: "Specific AP rules are cited — each correction references the relevant AP style rule rather than just fixing without explanation"
    weight: 0.20
    description: "Specific rule citation"
  - type: llm_judge
    criteria: "Nuanced rules are handled — correctly applies exceptions for money, ages, percentages, and the difference between major cities and state requirements"
    weight: 0.20
    description: "Nuanced rule application"
