meta:
  id: headline-writing
  level: 1
  course: press-release-writing
  type: output
  description: "Write compelling press release headlines that communicate newsworthiness within character limits"
  tags: [press-release, headlines, newsworthy, seo, beginner]

state: {}

trigger: |
  Press release headlines must communicate newsworthiness in under
  70 characters for SEO visibility (6-10 words ideal). They use
  sentence case, avoid promotional language, and should work as
  standalone summaries of the news.

  Write headlines for 8 announcements:

  Announcement 1: SaaS company reaches 1 million users
  Company: TaskFlow (project management tool)
  Task: Write 3 headline options

  Announcement 2: Biotech startup receives FDA breakthrough designation
  Company: GeneCure Therapeutics (rare disease treatment)
  Task: Write 3 headline options

  Announcement 3: Retail chain opening 50 new stores
  Company: FreshMarket (organic grocery chain)
  Region: Expanding across Southeast US in 2026
  Task: Write 3 headline options

  Announcement 4: Tech company acquires competitor
  Acquirer: CloudSync | Target: DataBridge | Price: $340M
  Task: Write 3 headline options

  Announcement 5: New CEO appointment
  Company: Meridian Financial | New CEO: Sarah Park
  Background: Former Goldman Sachs VP, 20 years experience
  Task: Write 3 headline options

  Announcement 6: Company launches scholarship program
  Company: TechForward Foundation | Amount: $5M over 5 years
  Focus: Underrepresented students in STEM
  Task: Write 3 headline options

  Announcement 7: Product recall
  Company: SafeHome (smart home devices) | Product: Smart thermostat
  Issue: Software bug causing incorrect temperature readings
  Task: Write 3 headline options

  Announcement 8: Record quarterly earnings
  Company: Atlas Energy | Revenue: $2.3B (up 28% YoY)
  Task: Write 3 headline options

  For each set of 3 headlines:
  1. Verify each is under 70 characters
  2. Include the most newsworthy element first
  3. Use sentence case (not Title Case)
  4. Explain which headline is strongest and why
  5. Show how the headline would appear in Google search results

assertions:
  - type: llm_judge
    criteria: "Headlines communicate news value — each headline immediately conveys what is newsworthy about the announcement without requiring context"
    weight: 0.30
    description: "Clear newsworthy headlines"
  - type: llm_judge
    criteria: "Character limits respected — all headlines stay under 70 characters and use sentence case formatting"
    weight: 0.25
    description: "Character limit and formatting compliance"
  - type: llm_judge
    criteria: "Three genuine variations per announcement — each option takes a different angle rather than minor rewording"
    weight: 0.25
    description: "Genuine headline variations"
  - type: llm_judge
    criteria: "Headline analysis is insightful — explains why the strongest headline works based on newsworthiness, clarity, and SEO principles"
    weight: 0.20
    description: "Insightful headline analysis"
