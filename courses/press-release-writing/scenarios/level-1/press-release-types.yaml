meta:
  id: press-release-types
  level: 1
  course: press-release-writing
  type: output
  description: "Write press releases for different announcement types — product, funding, partnership, event, and personnel"
  tags: [press-release, announcement-types, variety, beginner]

state: {}

trigger: |
  Different types of announcements require different press release
  approaches. The structure remains similar, but the emphasis,
  tone, and required information differ significantly.

  Write one press release for each of 5 announcement types:

  Type 1: Product launch
  Company: "QuantumSafe" cybersecurity firm
  Product: Post-quantum encryption tool for financial institutions
  Key info: First commercially available, NIST-compliant, backward
  compatible with existing systems
  Price: Enterprise licensing starting at $50,000/year
  Task: Write a product launch press release emphasizing technical
  innovation and market need

  Type 2: Funding announcement
  Company: "FarmFlow" agricultural technology startup
  Round: $18M Series A led by Khosla Ventures
  Participating: Google Ventures, Y Combinator
  Use of funds: Expand precision agriculture platform to 10 states
  Traction: 500 farms using platform, $2M ARR
  Task: Write a funding press release with investor validation

  Type 3: Event announcement
  Company: "TechSummit Global"
  Event: Annual AI Ethics Conference 2026
  Location: London, UK | Dates: September 10-12, 2026
  Speakers: 50+ including government officials and tech CEOs
  Expected attendance: 5,000
  Task: Write an event press release that drives registrations

  Type 4: Executive appointment
  Company: "Meridian Health Systems" (hospital network)
  Appointment: Dr. Elena Vasquez as Chief Medical Officer
  Background: 25 years at Mayo Clinic, published researcher
  Previous role: Department Chief of Internal Medicine
  Task: Write a personnel press release with credibility focus

  Type 5: Partnership announcement
  Partners: "SwiftPay" (fintech) × "RetailOS" (POS platform)
  Partnership: Integrated payment processing for 50,000 retailers
  Benefit: 30% faster checkout, unified analytics dashboard
  Launch: Q3 2026
  Task: Write a partnership press release showing mutual value

  For each press release:
  1. Follow complete press release format (headline through ###)
  2. Adapt emphasis to the announcement type
  3. Include appropriate quotes
  4. Stay within 300-500 words
  5. Note what makes this type unique vs other types

assertions:
  - type: llm_judge
    criteria: "Each press release type has appropriate emphasis — product launches focus on innovation and market need, funding on validation, events on value proposition for attendees"
    weight: 0.30
    description: "Type-appropriate emphasis"
  - type: llm_judge
    criteria: "All five are complete, properly formatted press releases — none are outlines or summaries, each could be distributed as-is"
    weight: 0.25
    description: "Complete distributable press releases"
  - type: llm_judge
    criteria: "Quotes are tailored to the announcement type — investor quotes for funding, partner quotes for partnerships, board quotes for appointments"
    weight: 0.25
    description: "Type-tailored quotes"
  - type: llm_judge
    criteria: "Tone shifts appropriately — product launches are forward-looking, funding is validation-focused, events are action-driving, appointments are credibility-building"
    weight: 0.20
    description: "Appropriate tone shifts"
