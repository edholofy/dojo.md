meta:
  id: regulatory-data-migration
  level: 5
  course: database-migration-planning
  type: output
  description: "Regulatory data migration — plan database migrations under strict regulatory constraints including GDPR, HIPAA, PCI-DSS, and data sovereignty requirements"
  tags: [database, migration, compliance, GDPR, HIPAA, PCI-DSS, data-sovereignty, master]

state: {}

trigger: |
  You are the Data Protection Officer and Database Architect for a
  global healthcare fintech company. You process both health data
  (HIPAA) and payment data (PCI-DSS) for customers in the US, EU,
  UK, and Canada.

  Your company must migrate from a single US-based database to a
  compliant multi-region architecture within 12 months due to:

  - GDPR enforcement action: EU regulators have given you 12 months
    to move EU patient data to EU-hosted infrastructure
  - HIPAA audit finding: your current setup lacks required access
    controls and audit logging for PHI
  - PCI-DSS recertification: your payment data handling needs
    isolation from non-payment systems
  - UK data adequacy: post-Brexit, UK data must be handled under
    UK GDPR separately from EU GDPR

  Current database: PostgreSQL 14, 3TB, single instance in
  US-East-1. Contains intermingled health records, payment data,
  and general business data in shared tables.

  Task: Design the regulatory-compliant database migration plan
  that satisfies all four regulatory frameworks simultaneously.

assertions:
  - type: llm_judge
    criteria: "Data classification and separation strategy addresses all regulatory requirements — classification: 'Step 1: Data classification audit. Before any migration, classify every table and column by regulatory domain. Classification categories: (1) PHI (Protected Health Information) — HIPAA regulated: patient names, medical record numbers, diagnoses, treatment records, insurance information, any data that identifies a patient and relates to health. (2) PCI (Payment Card Industry) — PCI-DSS regulated: credit card numbers, CVVs, cardholder names, billing addresses associated with payment instruments, transaction records. (3) PII (Personally Identifiable Information) — GDPR/UK GDPR regulated: names, email addresses, physical addresses, phone numbers, dates of birth, IP addresses, any data that can identify a natural person. (4) Business data — minimal regulatory constraint: product catalog, pricing, system configuration, anonymized analytics, aggregated reports. Critical finding: many tables contain MULTIPLE regulatory categories. Example: a patients table may contain: patient_name (PHI + PII), email (PII), credit_card_token (PCI reference), diagnosis_code (PHI), address (PII, and if EU: GDPR). The intermingled data is the core problem. Step 2: Data separation architecture. Target state — 4 isolated database domains: (1) Health Data Store (PHI): HIPAA-compliant infrastructure. Encrypted at rest (AES-256) and in transit (TLS 1.3). Row-level access controls with audit logging. US data: US-East-1. EU data: EU-West-1 (GDPR). UK data: EU-West-2 London (UK GDPR). Canada: CA-Central-1. (2) Payment Data Store (PCI): PCI-DSS Level 1 compliant isolated environment. Network segmentation (separate VPC, no direct internet access). Tokenization: actual card numbers replaced with tokens. Only the payment processing service can access this store. Minimal data retention (card data purged after processing). (3) Personal Data Store (PII): GDPR/UK GDPR compliant. Regional instances (EU PII in EU, UK PII in UK, US PII in US). Supports right to erasure (GDPR Article 17). Consent tracking per data element. (4) Business Data Store: general business data with standard security. No regulatory-specific requirements beyond SOC 2'"
    weight: 0.35
    description: "Data classification"
  - type: llm_judge
    criteria: "Migration execution plan handles the intermingled data problem — execution plan: 'The migration must disentangle intermingled data across 4 regulatory domains AND move data to regional infrastructure — simultaneously. Phase 1 (months 1-3): Schema redesign and infrastructure. Design the target schemas for each domain. The current patients table becomes: health_records table (PHI store): patient_id, medical_record_number, diagnosis_codes, treatment_history, provider_notes. patient_profiles table (PII store): patient_id, name, email, phone, address, date_of_birth, consent_status. patient_payments table (PCI store): patient_id, payment_token (not actual card number), billing_address, transaction_history. For each original table: create the mapping of which columns go to which domain. Identify foreign keys that will span domains (these become API calls or event-based references instead of database joins). Provision infrastructure: 4 VPCs (one per domain) with network isolation. Regional database instances for PHI and PII stores. PCI-DSS compliant infrastructure with penetration testing. Audit logging infrastructure (every access to PHI and PCI data must be logged). Phase 2 (months 4-7): Data migration with regulatory controls. Migration order: PCI data first (smallest volume, strictest requirements). If the PCI migration succeeds with full compliance, the approach is validated for the other domains. Migration process for each domain: (1) Create the target tables in the domain-specific database. (2) Build ETL pipeline to extract domain-specific columns from the source. (3) Transform: apply encryption, tokenization, and data masking as required by the domain. (4) Load into the target database with full audit trail. (5) Verify: row counts, checksums, and regulatory compliance checks. For PCI specifically: tokenize all credit card numbers during migration. Actual card numbers are never stored in the target — only tokens. The tokenization service (Stripe, Adyen, or a dedicated vault) holds the mapping. After migration: verify the source database no longer contains card numbers in the clear. For GDPR specifically: EU resident data migrates to EU-West-1. UK resident data migrates to EU-West-2 (London). Resident determination: based on the address and account registration country. Ambiguous cases: default to the most restrictive jurisdiction. During migration: data briefly exists in both US and EU (in transit). Document this as a time-limited data processing activity under GDPR Article 49. Phase 3 (months 8-10): Application refactoring. Applications currently issue queries that join across regulatory domains. Example: SELECT p.name, p.diagnosis, p.credit_card FROM patients p — this single query touches PHI, PII, and PCI data. After migration: this query must become 3 separate API calls. Refactoring approach: create a Patient Service that aggregates data from all 3 domain stores. The service enforces access controls (only authorized users see PHI, only the payment system sees PCI tokens). Audit logging happens at the service layer (who accessed what, when, why). Application teams update their code to use the Patient Service instead of direct database queries. Phase 4 (months 11-12): Compliance verification and cutover. External audits: HIPAA: engage a HIPAA compliance auditor to verify the PHI store meets all requirements. PCI-DSS: engage a QSA (Qualified Security Assessor) for PCI recertification. GDPR: engage a DPO-approved auditor to verify data residency and processing controls. UK GDPR: separate verification for UK data handling. Decommission the original single database: only after all 4 audits pass. Take a final encrypted backup (retained for the period required by each regulation). Drop the original tables'"
    weight: 0.35
    description: "Execution plan"
  - type: llm_judge
    criteria: "Ongoing compliance architecture ensures continued regulatory adherence — ongoing compliance: 'The migration is not the end — the new architecture must maintain compliance indefinitely. Automated compliance controls: (1) Data residency enforcement: database-level constraints prevent EU data from being written to US instances. The application layer determines the user's region at account creation. All subsequent writes are routed to the correct regional database. A nightly audit job scans for data residency violations (data in the wrong region). Any violations trigger an alert to the DPO within 1 hour. (2) Access control and audit: HIPAA: role-based access control with minimum necessary principle. Every access to PHI is logged: who, what record, when, from where, why (break-the-glass access requires justification). Audit logs are immutable (write-once storage) and retained for 6 years (HIPAA requirement). PCI-DSS: only the payment processing service account can access the PCI store. No human has direct database access to PCI data. All administrative access goes through a privileged access management (PAM) system with session recording. (3) Right to erasure (GDPR Article 17): when a user requests deletion: the system must delete their PII from the PII store. The system must delete or anonymize their PHI (subject to medical record retention laws). The system must verify deletion across all regional instances. The system must delete data from backups within a reasonable timeframe (or ensure backups are encrypted and will expire). Build a deletion pipeline that handles this automatically and produces an audit trail proving deletion. (4) Breach notification: GDPR: 72-hour notification requirement to supervisory authority. HIPAA: 60-day notification to HHS and affected individuals. PCI-DSS: immediate notification to acquiring bank and card brands. Build automated breach detection: anomalous access patterns trigger investigation. If a breach is confirmed, the notification workflow starts automatically with pre-drafted templates for each regulatory body. (5) Regular compliance testing: quarterly: penetration testing of the PCI environment. Semi-annually: HIPAA security risk assessment. Annually: GDPR data protection impact assessment (DPIA). Annually: PCI-DSS recertification (QSA audit)'"
    weight: 0.30
    description: "Ongoing compliance"
