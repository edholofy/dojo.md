meta:
  id: mainframe-to-cloud-migration
  level: 5
  course: database-migration-planning
  type: output
  description: "Mainframe to cloud migration — plan the migration of legacy mainframe databases to cloud-native platforms with minimal business disruption"
  tags: [database, migration, mainframe, legacy, cloud-native, modernization, master]

state: {}

trigger: |
  You are consulting for a large insurance company that has been
  running on IBM mainframes for 35 years. Their database landscape:

  - IBM DB2 for z/OS: 12TB across 3 mainframe LPARs
  - 2,000 tables with 800 stored procedures in COBOL and PL/I
  - 40 million policy records, 200 million claim records
  - CICS transaction processing: 50,000 transactions per hour
  - Batch processing: nightly batch jobs run for 6 hours
  - 3 DB2 DBAs remaining (average age 58, planning retirement)
  - Annual mainframe cost: $8M (hardware lease, software licensing,
    specialized staff)

  The insurance company has tried twice before to modernize and
  failed both times (once in 2015, once in 2019). Both attempts
  tried a "big bang" approach and were abandoned after 18 months.

  The CIO asks: "We need to get off the mainframe before our DBAs
  retire. But we cannot afford another failed attempt. How do we
  do this right?"

  Task: Design the mainframe database migration strategy that avoids
  the mistakes of previous attempts and succeeds within 30 months.

assertions:
  - type: llm_judge
    criteria: "Strategy addresses why previous attempts failed and avoids those mistakes — lessons and strategy: 'Why previous attempts failed: (1) Big bang approach: both attempts tried to migrate everything at once. This created a multi-year project with no intermediate value delivery. When the project hit difficulties at 18 months, there was nothing to show for the investment — so it was cancelled. (2) Underestimated COBOL complexity: the 800 stored procedures contain 35 years of business logic, edge cases, and regulatory rules. Attempting to rewrite all of them at once overwhelmed the team. (3) Insufficient mainframe expertise on the migration team: the migration teams were cloud engineers who did not understand mainframe concepts (CICS, JCL, VSAM, EBCDIC). They spent months learning instead of migrating. (4) No co-existence strategy: the previous attempts required everything to move at once. There was no way to run old and new systems side by side. Strategy to succeed this time: (1) Strangler fig pattern — migrate one domain at a time, not everything at once. Identify bounded contexts in the insurance domain: policy administration, claims processing, billing, underwriting, reporting, customer management. Migrate one domain completely before starting the next. Each domain migration delivers value independently. If the project is cancelled at any point, the completed domains remain modernized. (2) Invest in mainframe expertise: hire or contract mainframe-to-cloud migration specialists (companies like Micro Focus, AWS Mainframe Modernization, or Google Cloud for Mainframes specialize in this). The retiring DBAs must be involved full-time for the first 18 months (offer retention bonuses). Pair every mainframe expert with 2 cloud engineers (knowledge transfer happens through doing). (3) Co-existence is mandatory: the mainframe and cloud databases run simultaneously for the entire 30-month migration. An integration layer (API gateway or event bus) allows applications to talk to both. This eliminates the pressure of a single cutover date. (4) Automated COBOL analysis: use static analysis tools to map every stored procedure, its dependencies, and its business logic. Tools: AWS Mainframe Modernization Analyzer, Micro Focus Enterprise Analyzer. This creates the map that was missing in previous attempts'"
    weight: 0.35
    description: "Strategy and lessons"
  - type: llm_judge
    criteria: "Domain-by-domain migration plan is realistic and sequenced — migration plan: 'Domain sequencing (migrate in this order): (1) Reporting (months 1-6): lowest risk, highest quick win. Why first: reporting is read-only — it does not modify mainframe data. Reporting queries are the primary source of mainframe CPU consumption (and cost). Migrating reporting off the mainframe reduces mainframe costs immediately. How: set up a CDC pipeline from DB2 to a cloud data warehouse (Snowflake, BigQuery, or Redshift). Replicate all tables needed for reporting. Rebuild reports against the cloud data warehouse. Decommission mainframe reporting jobs. Savings: reduce mainframe CPU by 30% (reporting batch jobs eliminated). Cost reduction: approximately $2.4M/year. (2) Customer management (months 4-10): medium complexity. Why second: customer data is used by many domains but has simpler business logic than policies or claims. Modernizing customer management creates a clean API that other domains can use. How: extract customer-related tables (approximately 200 tables). Rewrite customer stored procedures in PostgreSQL (approximately 100 procedures, simpler logic). Build a customer API service. Migrate customer data via CDC with dual-write during transition. (3) Billing (months 8-16): medium-high complexity. Why third: billing has well-defined interfaces (invoices in, payments out). It interacts with external payment processors (already API-based). How: extract billing tables and procedures. Build a modern billing microservice. Integrate with existing payment processors. Run parallel billing (mainframe and cloud) for 3 months before cutover. (4) Claims processing (months 14-24): high complexity. Why fourth: claims processing has complex business logic (adjudication rules, fraud detection, regulatory calculations). But by this point, the team has experience from 3 successful domain migrations. How: analyze all claims stored procedures (approximately 300). Classify: rewrite in modern code vs. wrap in API (for the most complex procedures, wrapping the COBOL logic in a container may be faster than rewriting). Build claims processing service with comprehensive test suite (use mainframe production data for test cases). (5) Policy administration (months 20-30): highest complexity. Why last: policy administration is the core of the insurance business. It has the most complex business logic, the most regulatory requirements, and the most stored procedures. By migrating this last, the team is fully experienced and the co-existence infrastructure is proven. How: the approach depends on what was learned in previous migrations. If COBOL rewriting was effective: rewrite policy procedures. If COBOL rewriting was too slow: use runtime COBOL modernization (Micro Focus or similar) to run COBOL code in containers on the cloud. This avoids rewriting 35 years of business logic'"
    weight: 0.35
    description: "Migration plan"
  - type: llm_judge
    criteria: "Knowledge preservation and risk mitigation addresses the DBA retirement cliff — knowledge and risk: 'DBA retirement crisis management: the 3 retiring DBAs are the single biggest risk to this migration. They hold 35 years of institutional knowledge that exists nowhere else. Immediate actions (month 1): retention bonuses — offer each DBA a retention bonus ($50-100K) for staying through month 24 of the migration. This must be approved immediately — every month of delay increases the risk. Knowledge capture program: each DBA spends 20% of their time creating documentation. Video recordings of them explaining each major system, its quirks, and its business logic. Written runbooks for every operational procedure. Architecture decision records: why was this table structured this way? What business rule does this stored procedure implement? Pair programming: each DBA is paired with 2 cloud engineers for all migration work. The cloud engineers learn by doing, not just by reading documentation. Reverse mentoring: the cloud engineers teach the DBAs about cloud database concepts (this keeps the DBAs engaged and prevents them from feeling replaced). Knowledge preservation deliverables: by month 6 — complete database inventory with business context (not just technical schema, but what each table means to the business). By month 12 — all 800 stored procedures documented with business logic explanations. By month 18 — at least 6 cloud engineers can independently operate and troubleshoot the mainframe databases (reducing the bus factor from 3 to 9). By month 24 — mainframe operational knowledge is fully transferred. DBAs can retire without risk. Risk mitigation beyond DBAs: (1) Migration quality gates: each domain migration must pass — data integrity verification (row counts, checksums, business rule validation), performance benchmarking (new system must meet or exceed mainframe performance), parallel running period (minimum 30 days of running both systems simultaneously), rollback test (demonstrate that traffic can be switched back to the mainframe within 15 minutes). (2) Independent verification: hire an external firm to audit each domain migration. They verify data integrity, performance, and compliance independently. This provides confidence that was missing in previous attempts. (3) Budget protection: total budget estimate: $15-20M over 30 months. But: each domain migration delivers value independently. If the budget is cut at month 18: 3 domains are already migrated (reporting, customer, billing). The mainframe cost is already reduced by 50%. The remaining domains (claims, policy) can be migrated when budget is available. This is the critical difference from previous attempts — partial completion still delivers value'"
    weight: 0.30
    description: "Knowledge and risk"
