meta:
  id: chaos-testing-migrations
  level: 5
  course: database-migration-planning
  type: output
  description: "Chaos testing for migrations — design chaos engineering experiments to validate database migration resilience, rollback procedures, and failure recovery"
  tags: [database, migration, chaos-engineering, resilience, testing, failure-injection, master]

state: {}

trigger: |
  You are the Staff Reliability Engineer responsible for ensuring
  that your company's database migrations are resilient to failures.
  After a recent migration caused a 4-hour outage (the rollback
  procedure failed because it had never been tested), the CTO
  mandates:

  "Every migration must be chaos-tested before production. I want
  to know that our rollback works, our monitoring catches issues,
  and our team knows what to do when things go wrong."

  Upcoming migrations that need chaos testing:
  1. PostgreSQL 14 → 16 major version upgrade (2TB database)
  2. Single database → read replica architecture (for scaling)
  3. MySQL → PostgreSQL cross-engine migration (500GB, 100 tables)
  4. Schema restructuring: 20 tables → 8 tables with data transform

  Task: Design the chaos testing program for database migrations,
  including specific experiments, success criteria, and the chaos
  testing framework.

assertions:
  - type: llm_judge
    criteria: "Chaos experiments are specific and targeted per migration type — experiments: 'Chaos experiment catalog — specific tests for each migration: Migration 1: PostgreSQL 14 → 16 major version upgrade. Experiment 1A: Kill the target database during data loading. Inject: terminate the PostgreSQL 16 instance while pg_upgrade or pg_dump/pg_restore is running (at 50% completion). Expected behavior: the migration process detects the failure and stops cleanly. The source PostgreSQL 14 database is unaffected. The migration can be restarted from the beginning (or from a checkpoint if the tool supports it). Success criteria: source database continues serving traffic with zero impact. Migration process exits with a clear error (not hung or corrupted). Restarting the migration succeeds without manual intervention. Experiment 1B: Simulate slow network during upgrade. Inject: introduce 500ms latency and 5% packet loss between source and target using tc (traffic control). Expected behavior: the migration slows but does not fail. Data integrity is maintained (no corrupted rows due to network issues). The monitoring detects the slowdown and alerts. Success criteria: migration completes (slower) with zero data corruption. Monitoring alerts fire within 2 minutes of degradation. Estimated migration time with degradation is calculable (for planning buffer). Experiment 1C: Rollback the version upgrade after completion. Inject: after the PostgreSQL 16 upgrade completes and applications are running on PostgreSQL 16, trigger the rollback procedure. Expected behavior: traffic switches back to PostgreSQL 14. No data is lost (writes to PostgreSQL 16 are preserved or replayed to PostgreSQL 14). Applications recover within the documented rollback time. Success criteria: rollback completes within documented time estimate (plus or minus 20%). Application error rate during rollback: under 0.1%. Data verification: all rows match between PostgreSQL 14 and 16 after rollback. Migration 2: Single database → read replica architecture. Experiment 2A: Kill the read replica during traffic shifting. Inject: terminate the read replica while 50% of read traffic is being routed to it. Expected behavior: the application detects the replica failure. Read traffic falls back to the primary database. No errors visible to users (connection retry handles it). Success criteria: zero user-visible errors. Fallback to primary happens within 5 seconds. Primary database handles the additional read load without degrading. Experiment 2B: Introduce replication lag. Inject: pause replication on the replica for 60 seconds, then resume. Expected behavior: the monitoring detects replication lag and alerts. If the application has stale-read tolerance: reads continue from the replica with a warning. If the application requires consistent reads: reads automatically shift to the primary. Success criteria: replication lag alert fires within 30 seconds. Application behavior matches the configured stale-read policy. After replication resumes: lag catches up within a documented timeframe. Migration 3: MySQL → PostgreSQL cross-engine migration. Experiment 3A: Corrupt the CDC pipeline during dual-write. Inject: drop 1% of CDC events between MySQL and PostgreSQL (simulate Kafka consumer lag or processing failure). Expected behavior: the consistency checker detects missing rows in PostgreSQL. An alert fires indicating data drift between MySQL and PostgreSQL. The reconciliation process fills in the missing rows. Success criteria: consistency checker detects drift within 15 minutes. Reconciliation process repairs the drift automatically. No manual intervention required. Experiment 3B: Simulate a failed cutover. Inject: switch application writes to PostgreSQL, then simulate a PostgreSQL failure 5 minutes later. Expected behavior: the application detects the PostgreSQL failure. Writes fall back to MySQL (the rollback path). Any writes that succeeded on PostgreSQL but not MySQL are reconciled. Success criteria: write availability is restored within 60 seconds. No writes are lost (PostgreSQL writes are replayed to MySQL during reconciliation). The team follows the runbook without confusion. Migration 4: Schema restructuring (20 tables → 8 tables). Experiment 4A: Trigger rollback during the expand phase. Inject: after the new 8 tables are created and dual-write is active, simulate a data integrity issue (intentionally write conflicting data to old and new tables). Expected behavior: the consistency checker detects the conflict. The system can roll back to reading from the old 20 tables. The new 8 tables are identified as inconsistent and flagged for repair. Success criteria: rollback to old tables completes within 5 minutes (feature flag flip). Application continues operating normally on old tables. The conflict is logged with enough detail to diagnose the root cause'"
    weight: 0.35
    description: "Chaos experiments"
  - type: llm_judge
    criteria: "Chaos testing framework is reusable and integrated into the migration process — framework: 'Chaos testing framework for database migrations: the goal is not ad-hoc chaos experiments but a systematic framework that every migration uses. Framework architecture: (1) Pre-migration chaos suite. Every migration plan must include a chaos test plan. The chaos test plan specifies: which experiments to run (from the experiment catalog). What the expected outcomes are. What the success criteria are. Who runs the experiments and when. The chaos test plan is reviewed as part of the migration plan review (same as the rollback plan). (2) Staging environment requirements. Chaos tests run in staging, never in production. Staging must be production-like: same database size (or a representative subset — at least 10% of production volume). Same network topology (simulate cross-AZ or cross-region latency). Same application deployment (all connected applications running). Same monitoring and alerting (alerts fire in staging, not just production). If staging is not production-like: the chaos tests are not valid. Invest in staging quality before running chaos experiments. (3) Experiment execution framework. Experiment definition (YAML): name, description, migration type, inject (what failure to introduce), expected behavior, success criteria, rollback (how to undo the injection), duration (how long to let the failure persist). Execution engine: reads the experiment definition, injects the failure (using tools like toxiproxy for network failures, kill commands for process failures, custom scripts for data corruption), monitors the system behavior, compares actual behavior to expected behavior, produces a pass/fail report. Tools: toxiproxy (network failure injection — latency, packet loss, connection drops). kill/sigterm (process failure injection). Custom scripts (data corruption, CDC event dropping, replication pausing). Monitoring integration (verify alerts fire correctly). (4) Integration into the migration workflow. The migration workflow becomes: write migration plan → write chaos test plan → run chaos tests in staging → fix any failures → re-run chaos tests until all pass → execute production migration. Chaos tests are a quality gate (like the other quality gates: data integrity, performance, rollback). A migration cannot proceed to production if chaos tests fail. (5) Experiment catalog growth. After each production migration, conduct a retrospective. If any unexpected issue occurred: create a new chaos experiment that would have caught it. The experiment catalog grows over time, becoming more comprehensive. Share the catalog across teams (every team benefits from every other team's migration experiences)'"
    weight: 0.35
    description: "Chaos framework"
  - type: llm_judge
    criteria: "Team readiness and runbook validation through chaos testing is addressed — team readiness: 'Chaos testing is not just about systems — it is about people. The 4-hour outage happened because the rollback procedure had never been tested. But it also happened because the team did not know how to execute the rollback under pressure. Game day exercises: beyond automated chaos tests, run game day exercises where the team practices responding to migration failures. Game day structure: (1) Set up the scenario. The staging environment has an in-progress migration. The migration team is assembled (the same people who will run the production migration). The game day facilitator (a senior engineer NOT on the migration team) introduces the failure. (2) Introduce the failure. The facilitator triggers a realistic failure: the target database goes down. Or: replication lag spikes to 5 minutes. Or: the consistency check reports 10,000 mismatched rows. Or: the rollback script fails with an unexpected error. The team does not know in advance what the failure will be. (3) Team responds using runbooks. The team must: detect the failure (using monitoring, not the facilitator telling them). Diagnose the root cause. Decide: fix forward or rollback. Execute the fix or rollback using documented procedures. Verify the system is healthy after recovery. (4) Debrief. After the exercise: what went well? What took too long? Where was the runbook unclear or incorrect? Update the runbook based on the findings. Runbook validation: the game day validates that the runbook actually works when executed by real humans under pressure. Common findings: runbook says step 3 but step 3 depends on step 2b which is not documented. Runbook says run this command but the command requires permissions that the on-call engineer does not have. Runbook says check this metric but the dashboard does not exist or shows stale data. Each finding is a runbook improvement. After 2-3 game days, the runbook is battle-tested. Frequency: one game day per major migration (before the production execution). For the 4 upcoming migrations: run one game day each over 4 weeks. The first game day will be rough (many runbook gaps). Each subsequent game day will be smoother. Success criteria for team readiness: the team detects the failure within 5 minutes (using monitoring, not manual checking). The team makes the fix-forward vs. rollback decision within 10 minutes. The team executes the recovery within the documented time estimate (plus 50% for human factors). No single person is a bottleneck — if the lead engineer is unavailable, someone else can execute the runbook. After game days: the team feels confident, not anxious, about the production migration. Confidence is the ultimate success metric'"
    weight: 0.30
    description: "Team readiness"
