meta:
  id: zero-downtime-petabyte-migration
  level: 5
  course: database-migration-planning
  type: output
  description: "Zero-downtime petabyte-scale migration — plan and execute a petabyte-scale database migration with zero downtime for a high-traffic global platform"
  tags: [database, migration, zero-downtime, petabyte-scale, high-availability, master]

state: {}

trigger: |
  You are the Principal Database Engineer at a social media platform
  with 200 million daily active users. The platform needs to migrate
  its primary database:

  - Source: Sharded MySQL (Vitess) — 64 shards, 50PB total
  - Target: CockroachDB (distributed NewSQL) — for native multi-
    region support and simplified operations
  - Traffic: 2 million queries per second at peak
  - SLA: 99.99% availability (4.3 minutes downtime per month max)
  - Data: 500 billion rows across 80 tables
  - Largest table: user_events — 300 billion rows, 30PB

  Constraints:
  - Zero scheduled downtime (the platform cannot have a maintenance
    window — users are global, traffic never drops below 500K QPS)
  - Data must remain consistent during migration (no lost writes)
  - Migration must complete within 6 months
  - Budget: $5M for migration infrastructure and tooling
  - Rollback must be possible at any point during the migration

  The CTO says: "This is the most critical infrastructure project
  we have ever attempted. How do we do it without any user impact?"

  Task: Design the zero-downtime petabyte-scale migration plan.

assertions:
  - type: llm_judge
    criteria: "Migration architecture handles petabyte scale with zero downtime — architecture: 'Architecture: dual-write with incremental migration. The fundamental approach: never stop the source database. Build the target alongside it and gradually shift traffic. Layer 1: CDC (Change Data Capture) pipeline. Set up CDC from every MySQL shard to CockroachDB. Tool: Debezium or a custom CDC pipeline reading MySQL binlogs. CDC captures every INSERT, UPDATE, DELETE from all 64 shards in real-time. The CDC pipeline transforms MySQL row formats to CockroachDB schema format during streaming. For 2M QPS peak: the CDC pipeline must handle sustained throughput of 2M events per second. Architecture: Kafka as the intermediate buffer (handles backpressure). Kafka topic per shard (64 topics). Consumer groups write to CockroachDB regions. Lag monitoring: CDC lag must stay under 5 seconds. If lag exceeds 30 seconds: alert. If lag exceeds 5 minutes: pause migration activities and investigate. Layer 2: Historical data backfill. CDC handles new data (writes happening now). Historical data (the existing 50PB) must be backfilled separately. Backfill process: scan MySQL shards in parallel (all 64 shards simultaneously). Read in batches of 10,000 rows per query (to avoid long-running transactions). Write batches to CockroachDB in parallel. For the user_events table (300B rows, 30PB): at 500K rows/second sustained write rate: 300B / 500K = 600,000 seconds = approximately 7 days. But we need to account for network bandwidth and CockroachDB write amplification: realistic estimate: 3-4 weeks for user_events alone. Total backfill estimate for all tables: 5-6 weeks. During backfill: CDC is running simultaneously, capturing new writes. When backfill completes: the CDC pipeline catches up and the databases are in sync. Layer 3: Verification layer. Continuous verification that source and target are consistent. Shadow reads: for a configurable percentage of read queries (start at 1%, increase to 10%), read from both MySQL and CockroachDB. Compare results. Log any discrepancies. Discrepancies indicate a CDC pipeline bug or a schema mapping error. Periodic full-table checksums: for each table, run a checksum comparison weekly. This catches any drift between source and target that shadow reads might miss. For the 300B row user_events table: partition the checksum by time range (checksum one day at a time). Layer 4: Traffic migration (the actual cutover). After verification confirms consistency: migrate reads first (reads are safe — they do not modify data). Phase 1: route 1% of reads to CockroachDB. Monitor latency, error rates, and result correctness. Phase 2: increase to 10%, then 25%, 50%, 75%, 100% of reads. Each phase runs for at least 48 hours to observe patterns. Phase 3: route writes to CockroachDB. This is the critical cutover. Approach: dual-write (application writes to BOTH MySQL and CockroachDB). CockroachDB is the primary (source of truth). MySQL receives writes for rollback safety. Phase 4: stop MySQL writes. After 30 days of stable CockroachDB-primary operation. MySQL becomes read-only (retained for rollback). Phase 5: decommission MySQL. After 90 days of stable operation'"
    weight: 0.35
    description: "Migration architecture"
  - type: llm_judge
    criteria: "Risk mitigation ensures rollback capability and data consistency — risk mitigation: 'Rollback strategy — available at every phase: Phase: reads at CockroachDB. Rollback: route reads back to MySQL (configuration change, under 1 minute). Data impact: none (reads do not modify data). Phase: dual-write active. Rollback: stop CockroachDB writes, route reads back to MySQL. Data impact: none (MySQL has received all writes). Time: under 5 minutes (configuration change + cache flush). Phase: CockroachDB primary (MySQL receiving copies). Rollback: make MySQL primary again, route reads to MySQL. Data impact: minimal — MySQL has been receiving copies of all writes. Verify MySQL is current before switching. Time: 5-15 minutes. Phase: MySQL decommissioned. Rollback: not possible without restoring from backup. This is why we wait 90 days before decommissioning. Time: hours (restore from backup). Key insight: the rollback capability degrades as the migration progresses. The earlier phases are easily reversible, the later phases are not. This is why each phase has minimum observation periods (48 hours for reads, 30 days before stopping MySQL writes, 90 days before decommissioning). Data consistency guarantees: (1) No lost writes — the dual-write approach ensures both databases receive every write. The application writes to CockroachDB first (primary). If CockroachDB write succeeds: asynchronously write to MySQL (for rollback). If CockroachDB write fails: write to MySQL (fallback) and queue retry for CockroachDB. This means: in the worst case, a write exists in one database but not the other temporarily. The reconciliation process (running continuously) detects and fixes these discrepancies within minutes. (2) No stale reads — during the read migration phase, the shadow read comparison catches stale data. If CockroachDB returns stale data: the shadow read detects it and MySQL's response is used. The staleness is investigated and fixed before increasing CockroachDB read percentage. (3) Schema consistency — the schema mapping between MySQL (Vitess) and CockroachDB is tested extensively before migration begins. Every data type, constraint, and index is verified. Integration tests run against both databases simultaneously to ensure query results match. Operational risks: (1) CDC pipeline failure — likelihood: MEDIUM (at 2M events/sec, any component can fail). Mitigation: Kafka provides buffering (24-hour retention). If CDC consumers fail: they resume from the last committed offset. If CDC lag exceeds 5 minutes: all migration activities pause until lag is resolved. (2) CockroachDB performance at scale — likelihood: MEDIUM. CockroachDB at 50PB with 2M QPS is at the extreme end of its scale. Mitigation: engage CockroachDB engineering team as partners (enterprise support). Run load tests at 3x expected traffic before migration. Have a dedicated CockroachDB performance team during the migration. (3) Budget overrun — $5M is tight for a 50PB migration. Infrastructure costs: CockroachDB cluster for 50PB: approximately $200K/month. Migration infrastructure (Kafka, CDC, verification): approximately $50K/month. Running dual infrastructure for 6 months: approximately $1.5M. Total infrastructure: approximately $1.5M + $1.5M dual-running = $3M. Remaining for tooling and engineering: $2M. Risk: if the migration takes 9 months instead of 6, infrastructure costs increase by $750K'"
    weight: 0.35
    description: "Risk mitigation"
  - type: llm_judge
    criteria: "Operational plan addresses the 99.99% SLA during migration — operational plan: 'Maintaining 99.99% SLA during migration: 99.99% = 4.3 minutes of downtime per month. The migration cannot consume ANY of this budget — it must be invisible to users. Operational safeguards: (1) Circuit breaker on every migration component. If CockroachDB latency exceeds 100ms (p99): circuit breaker trips, reads fall back to MySQL instantly. If CDC lag exceeds the threshold: circuit breaker pauses migration activities. If error rate for CockroachDB queries exceeds 0.1%: circuit breaker trips. The circuit breaker is automatic — no human intervention needed. Recovery: when the issue resolves, the circuit breaker gradually reopens (1% traffic, then 5%, then 25%, etc.). (2) Canary regions. Do not migrate all 64 shards simultaneously. Migration order: start with the 2 lowest-traffic shards (canary). Run canary shards on CockroachDB for 2 weeks. If canary succeeds: migrate the next 8 shards. Continue in batches of increasing size (2, 8, 16, 38). Each batch has a minimum observation period before the next batch starts. If any batch shows issues: stop and fix before continuing. (3) Migration team operating model. During the 6-month migration: a dedicated migration on-call rotation (separate from the regular database on-call). The migration on-call has authority to pause or rollback migration activities without approval. Runbooks for every migration failure mode (CDC lag, consistency drift, performance degradation). Daily migration standup (15 minutes): review CDC lag, consistency metrics, performance dashboards. Weekly migration review: progress against the plan, risks, blockers. (4) Communication protocol. Users notice nothing — but internal teams need to be informed. Before each shard batch migration: notify application teams whose services use those shards. After each batch: share the results (latency changes, error rates, any issues). If a rollback occurs: incident communication to all engineering teams. Monthly migration status update to the CTO and executive team. Success criteria (migration is complete when): all 64 shards migrated to CockroachDB. 30 days of CockroachDB-primary operation with zero SLA impact. Consistency verification passes for all tables. Performance meets or exceeds MySQL baselines. Rollback tested successfully (even though we hope never to use it)'"
    weight: 0.30
    description: "Operational plan"
