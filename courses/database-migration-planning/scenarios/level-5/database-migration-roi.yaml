meta:
  id: database-migration-roi
  level: 5
  course: database-migration-planning
  type: output
  description: "Database migration ROI — build a board-level business case for a major database migration, including total cost of ownership analysis and risk-adjusted returns"
  tags: [database, migration, ROI, business-case, TCO, board-advisory, master]

state: {}

trigger: |
  You are presenting to the CFO and board of a mid-size fintech
  company ($200M ARR, 800 employees). Engineering wants to migrate
  from Oracle to PostgreSQL. The CFO is skeptical:

  "Oracle costs us $4M per year in licensing. PostgreSQL is free.
  But the last time engineering said a project would save money, it
  cost twice the estimate and took 3x longer. I need a real business
  case — not just 'PostgreSQL is free.' What are the true costs,
  the true savings, and the true risks? And what happens if this
  goes wrong?"

  Context:
  - Oracle: 12 databases, 3TB total, 150 tables, 200 stored
    procedures, 5 Oracle DBAs ($180K average salary)
  - Current Oracle costs: $4M licensing + $600K support + $500K
    infrastructure = $5.1M/year
  - 40 applications connected to Oracle databases
  - Oracle-specific features used: PL/SQL, Oracle Text, Materialized
    Views, Oracle Partitioning, Real Application Clusters (RAC)
  - Engineering estimate: 18-month migration, $2M budget

  Task: Build the complete business case with honest TCO analysis.

assertions:
  - type: llm_judge
    criteria: "TCO analysis is honest and includes hidden costs — TCO analysis: 'Total Cost of Ownership — the real numbers: Current state (Oracle) — annual costs: licensing: $4M (12 databases × average $333K per database). Support contract: $600K (required for patches and updates). Infrastructure: $500K (on-premises servers, storage, networking). DBA team: $900K (5 DBAs × $180K average). Operational overhead: $200K (patching, upgrades, compliance scanning). Total annual Oracle cost: $6.2M (not $5.1M — the DBA team and operational overhead are often excluded). Migration investment — the honest estimate: engineering says $2M for 18 months. Historically, database migrations run 1.5-2x over budget. Realistic estimate: $3-4M. Detailed breakdown: consulting (Oracle-to-PostgreSQL specialists): $1.2M. This is the highest-value spend — these specialists have converted Oracle-to-PostgreSQL before. They will handle PL/SQL conversion, Oracle Text replacement, and RAC equivalent architecture. Internal engineering time: $1M. 4 engineers working 50% on migration for 18 months. Opportunity cost: these engineers are not building features. Tooling: $200K. Ora2Pg (open source, but consulting to configure), AWS DMS, testing infrastructure. Infrastructure (parallel running): $400K. Running both Oracle and PostgreSQL simultaneously for 6+ months during migration. Testing and validation: $300K. Performance testing, regression testing, compliance re-testing. Training: $150K. Retraining 5 Oracle DBAs on PostgreSQL. Certification courses, hands-on labs, conference attendance. Contingency (20%): $650K. For unexpected issues — PL/SQL conversion complexity, performance regressions, application compatibility issues. Total migration investment: $3.9M (realistic) vs. $2M (engineering estimate). Recommendation to the CFO: budget $4M and communicate the $2M engineering estimate as the base case with $2M contingency. Target state (PostgreSQL) — annual costs: licensing: $0 (PostgreSQL is open source). Support: $150K (enterprise PostgreSQL support from EDB, Crunchy, or Percona). Infrastructure: $350K (Aurora PostgreSQL or similar managed service). DBA team: $720K (4 DBAs × $180K — one DBA position eliminated through managed services). Operational overhead: $100K (managed services reduce patching and upgrade burden). Total annual PostgreSQL cost: $1.32M. Annual savings: $6.2M - $1.32M = $4.88M per year. Payback period: $3.9M investment / $4.88M annual savings = 9.6 months. But: savings ramp up gradually (not all 12 databases migrate on day 1). Realistic payback: 14-18 months from project start'"
    weight: 0.35
    description: "TCO analysis"
  - type: llm_judge
    criteria: "Risk-adjusted returns and failure scenarios are presented honestly — risk analysis: 'Risk-adjusted ROI: the CFO is right to be skeptical. Here are the failure scenarios: Scenario A: Migration succeeds on time and budget ($2M, 18 months). Probability: 20%. 5-year NPV: ($2M investment) + ($4.88M × 4 years savings) = $17.5M net benefit. Scenario B: Migration succeeds but over budget and time ($4M, 24 months). Probability: 50%. 5-year NPV: ($4M investment) + ($4.88M × 3.5 years savings) = $13.1M net benefit. Scenario C: Migration partially succeeds — 8 of 12 databases migrated in 24 months. Remaining 4 databases are the most complex and require another 12 months. Probability: 20%. Total investment: $5M. 5-year NPV: ($5M investment) + (graduated savings over 3 years) = $9M net benefit. Scenario D: Migration fails — abandoned after 18 months with 4 databases migrated. Probability: 10%. Total investment: $3M (spent before abandonment). 5-year NPV: ($3M sunk cost) + ($1.5M/year savings from 4 migrated databases × 3.5 years) = $2.25M net benefit. Even in the worst case, partial migration generates positive ROI. Expected value (probability-weighted): (0.2 × $17.5M) + (0.5 × $13.1M) + (0.2 × $9M) + (0.1 × $2.25M) = $3.5M + $6.55M + $1.8M + $0.225M = $12.075M expected 5-year net benefit. What happens if it goes wrong — specific failure modes: (1) PL/SQL conversion is harder than expected. The 200 stored procedures may contain Oracle-specific features that have no PostgreSQL equivalent. Impact: timeline extends by 3-6 months, budget increases by $500K-1M. Mitigation: audit all 200 stored procedures before committing to the project. Classify each as: automatic conversion (estimated 60%), manual conversion (30%), rewrite required (10%). The rewrite-required procedures are the risk — scope them before starting. (2) Performance regression. PostgreSQL may be slower than Oracle for specific workloads (particularly complex analytical queries that Oracle optimizes well). Impact: application performance degrades, user complaints, potential revenue impact. Mitigation: benchmark the top 50 queries before migration. Any query that performs worse on PostgreSQL must be optimized before cutover. Budget $200K specifically for PostgreSQL query optimization consulting. (3) Application compatibility breaks. 40 applications connect to Oracle. Some may use Oracle-specific SQL syntax, data types, or features. Impact: applications break during or after migration, requiring emergency fixes. Mitigation: run all application test suites against PostgreSQL in staging before any production migration. Any failing test must be fixed in the application before that database is migrated. (4) Team burnout and attrition. An 18-24 month migration is mentally exhausting. Engineers may leave mid-project. Impact: knowledge loss, timeline delays, budget overrun. Mitigation: rotate engineers on and off the migration project (no one works on it for more than 6 months continuously). Celebrate milestones (each database migrated is a win). Provide retention bonuses for key migration team members'"
    weight: 0.35
    description: "Risk-adjusted returns"
  - type: llm_judge
    criteria: "Strategic benefits beyond cost savings are articulated for the board — strategic benefits: 'Beyond cost savings — strategic value: the $4.88M annual savings is the headline number. But the strategic benefits may be more valuable: (1) Talent availability. Oracle DBA talent pool is shrinking. The average Oracle DBA age is increasing. PostgreSQL is the most popular database among developers (Stack Overflow survey, consistently top 2). Hiring PostgreSQL engineers: average time to fill is 4-6 weeks. Hiring Oracle specialists: average time to fill is 3-6 months. Salary premium for Oracle specialists: 15-25% above PostgreSQL equivalents. Strategic impact: easier hiring, lower salaries, larger talent pool. For a growing company, this is critical — database staffing will not be a bottleneck. (2) Cloud flexibility. Oracle licensing on cloud infrastructure is complex and expensive (Oracle charges extra for cloud deployments). PostgreSQL runs on every cloud provider with managed services (AWS Aurora, GCP Cloud SQL, Azure Database for PostgreSQL). Strategic impact: no vendor lock-in. Can negotiate between AWS, GCP, and Azure for best pricing. Can adopt multi-cloud strategy if needed for resilience or compliance. (3) Innovation velocity. Oracle upgrades require expensive downtime and extensive testing (annual patching cycles). PostgreSQL major releases are free and well-supported by managed services. PostgreSQL extension ecosystem (PostGIS, pg_vector, TimescaleDB) allows adding capabilities without additional licensing. Strategic impact: can adopt new database features faster, supporting product innovation. (4) M&A readiness. If the company acquires or is acquired: PostgreSQL is easier to integrate (standard, well-understood). Oracle licensing negotiations in M&A are notoriously complex (license transfer, audit risk). Strategic impact: simpler due diligence and integration in M&A scenarios. Recommendation to the board: approve the $4M budget with these conditions: (1) Phase the investment — $1.5M for the first 6 months (migrate the 4 simplest databases). If the first phase succeeds on time and budget: approve the remaining $2.5M. If the first phase struggles: reassess before committing more capital. (2) Measure and report — quarterly board updates with: databases migrated (number and percentage). Actual cost vs. budget. Realized savings (Oracle licenses cancelled). Risk assessment (updated probability-weighted scenarios). (3) Define the exit criteria — if at the 12-month mark, fewer than 6 databases are migrated and the budget is more than 30% overspent: pause the program and conduct an independent assessment before continuing. This gives the CFO control points without killing the project prematurely'"
    weight: 0.30
    description: "Strategic benefits"
