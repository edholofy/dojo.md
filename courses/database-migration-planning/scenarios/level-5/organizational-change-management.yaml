meta:
  id: organizational-change-management
  level: 5
  course: database-migration-planning
  type: output
  description: "Organizational change management — lead the people and process transformation required for a major database platform shift across the organization"
  tags: [database, migration, change-management, organizational, leadership, culture, master]

state: {}

trigger: |
  You are the VP of Platform Engineering leading a company-wide
  migration from SQL Server to PostgreSQL. The technical plan is
  solid, but the organizational challenges are threatening the
  project:

  - 15 SQL Server DBAs feel their jobs are at risk and are
    passively resisting the migration
  - 200 application developers are comfortable with SQL Server
    and do not want to learn PostgreSQL syntax differences
  - The DBA team lead wrote a 10-page document arguing against the
    migration, citing every PostgreSQL limitation
  - 3 senior engineers have threatened to quit if forced to change
  - Product teams are refusing to allocate sprint capacity for
    migration work ("we have features to ship")
  - The sales team is concerned: "Will this break the product for
    our enterprise customers?"

  The CEO asks: "The technical plan looks great on paper, but the
  organization is not on board. How do we get people to support
  this instead of fight it?"

  Task: Design the organizational change management strategy for
  the database migration.

assertions:
  - type: llm_judge
    criteria: "Stakeholder analysis and resistance management is empathetic and practical — stakeholder management: 'Understanding the resistance — it is rational, not irrational. Before designing the change strategy, understand why people are resisting. They have legitimate concerns: (1) The 15 SQL Server DBAs: their concern is job security. They have built careers on SQL Server expertise. If the company moves to PostgreSQL, their specialized knowledge loses value. This is not irrational — it is self-preservation. Response: guarantee that no DBA will lose their job due to the migration. Every DBA gets a funded training path to PostgreSQL certification. Position the migration as a career upgrade: PostgreSQL skills are more marketable than SQL Server skills (PostgreSQL is growing, SQL Server market share is declining). Create a DBA career ladder that values multi-database expertise: DBAs who learn PostgreSQL while maintaining SQL Server knowledge become more valuable, not less. The DBA team lead who wrote the 10-page critique: do not dismiss the document. Read it carefully. Acknowledge the valid points publicly. Invite the DBA team lead to be the migration quality reviewer — their deep SQL Server knowledge is exactly what is needed to catch migration issues. Turn the critic into the quality champion. (2) The 200 application developers: their concern is productivity loss. Learning a new database syntax means they ship features more slowly in the short term. This affects their performance reviews, their team velocity, and their sense of competence. Response: minimize the learning curve. PostgreSQL and SQL Server are 90% similar for application developers. Create a SQL Server to PostgreSQL cheat sheet (the 10% that differs). Provide IDE tooling that helps (pgAdmin training, DataGrip licenses). Run hands-on workshops (not lectures) where developers convert actual application queries. Do not force all 200 developers to learn at once — migrate teams one at a time. (3) The 3 senior engineers threatening to quit: understand their specific concerns. Is it about the technology (they genuinely believe SQL Server is better)? Is it about the change process (they feel unheard)? Is it about workload (they are already overloaded and do not want additional work)? Response: one-on-one conversations with each. Listen first, propose solutions second. If their concerns are technical: involve them in the migration architecture decisions. If their concerns are workload: ensure migration work replaces other work, not adds to it. If they still want to leave: accept it gracefully. Do not hold the project hostage to 3 people. (4) Product teams refusing to allocate capacity: their concern is business metrics. They are measured on feature delivery, not infrastructure improvements. Asking them to give up sprints for migration work means missing their OKRs. Response: do not ask product teams to sacrifice their goals. Instead: migration work is funded separately (dedicated migration engineers, not product team capacity). Product teams only need to allocate testing time (1-2 days per migration). If product team code changes are needed: the migration team does the work and product team reviews. Frame it as: the migration team handles 95% of the work. Product teams validate that their application still works'"
    weight: 0.35
    description: "Stakeholder management"
  - type: llm_judge
    criteria: "Communication and engagement strategy builds genuine support — communication strategy: 'Communication strategy — build support through transparency and inclusion: (1) The narrative. Do not lead with cost savings — it sounds like layoffs. Lead with: we are investing in a better platform so our team can build better products. Frame: SQL Server to PostgreSQL is like upgrading from a licensed proprietary tool to the industry standard. We are not taking something away — we are giving the team more powerful, more flexible tools. The engineers who learn PostgreSQL become more marketable. The company becomes more agile. Both sides win. (2) Communication cadence. Month 1 — Town hall announcement: the CEO (not just engineering leadership) announces the migration. Why: the CEO framing shows this is a company priority, not just an engineering whim. Content: the business case (why), the commitment to the team (no layoffs), the timeline (phased, not big-bang), and the support resources (training, consulting, dedicated migration team). Month 1 — DBA-specific meeting: the VP of Platform Engineering meets with all 15 DBAs. Acknowledge their expertise and their concerns. Present the training program and career path. Answer every question honestly. If you do not know the answer: say so and follow up within 48 hours. Monthly — Migration newsletter: progress updates, wins (databases migrated without issues), lessons learned, upcoming activities. Include quotes from engineers who have already migrated successfully. Bi-weekly — Office hours: an open session where anyone can ask migration questions. Staffed by migration engineers and the DBA team lead (once they are on board as quality reviewer). (3) Engagement tactics. Migration Champions program: recruit 10-15 volunteers (1 per major team) who are enthusiastic about the migration. Train them first (they become the local experts). They help their teammates, answer questions, and provide feedback to the migration team. They are recognized and rewarded (conference attendance, bonus, public recognition). Hands-on workshops: 2-hour sessions where developers migrate a real (but low-risk) application from SQL Server to PostgreSQL. They see firsthand that it is not as hard as they feared. Run 10 workshops over 2 months to cover all 200 developers. Feedback loops: after each database migration, survey the affected team. What went well? What was painful? What should we change? Act on the feedback visibly — if a team says the migration documentation was confusing, fix it before the next migration. Show that feedback matters'"
    weight: 0.35
    description: "Communication strategy"
  - type: llm_judge
    criteria: "Training and transition program is concrete and addresses skill gaps — training program: 'Training program — skills transition, not replacement: Tier 1: DBA team (15 people) — intensive program. Month 1-2: PostgreSQL fundamentals (40 hours). Official PostgreSQL administration course. Hands-on labs with Aurora PostgreSQL (the target platform). Focus areas: PostgreSQL architecture (vs. SQL Server architecture), backup and recovery (pg_dump, pg_basebackup, WAL archiving), performance tuning (EXPLAIN ANALYZE, pg_stat_statements, auto-vacuum tuning), high availability (streaming replication, patroni, Aurora failover). Month 3-4: PostgreSQL advanced operations (40 hours). Migration-specific training: Ora2Pg (for stored procedure conversion, also works for SQL Server). AWS DMS configuration and troubleshooting. Monitoring and alerting for PostgreSQL. Month 5-6: Certification. Each DBA takes the PostgreSQL Professional Certification exam. Company pays for the exam and a bonus for passing. Goal: all 15 DBAs are PostgreSQL-proficient by month 6. Budget: $150K total ($10K per DBA for courses, labs, certification, and time). Tier 2: Application developers (200 people) — targeted training. A 4-hour workshop covering the differences that matter for application development. Content: connection string and driver changes (SQL Server JDBC → PostgreSQL JDBC). Syntax differences (TOP vs LIMIT, string concatenation, date functions). Data type mapping (NVARCHAR → TEXT, UNIQUEIDENTIFIER → UUID, BIT → BOOLEAN). ORM configuration (Entity Framework, Hibernate — mostly configuration changes). Delivery: 10 workshops of 20 developers each, over 2 months. Each workshop includes hands-on exercises converting real application queries. Budget: $30K total (instructor time, lab environments). Tier 3: Product and sales teams — awareness briefing. A 1-hour briefing covering: what is changing (database platform, not the product). What is NOT changing (the product, the API, the user experience). How this benefits customers (better performance, lower costs passed as investment). Talking points for sales: this is a strategic investment in platform reliability. FAQ document: answers to the most common customer questions. Measuring training effectiveness: DBA team: PostgreSQL certification pass rate (target: 100% within 6 months). Developer workshops: post-workshop survey (target: 80%+ feel confident with PostgreSQL). Migration defect rate: track bugs caused by SQL Server vs. PostgreSQL differences. If defect rate is high for a specific team: provide additional targeted training. Overall success metrics for the change management program: migration timeline met (within 10% of plan). Voluntary attrition during migration: under 5% (normal attrition). Employee satisfaction survey: no more than 10% decrease during migration. DBA team satisfaction specifically: measured separately (they are the most affected group). Post-migration productivity: within 3 months of each team's migration, their velocity returns to pre-migration levels'"
    weight: 0.30
    description: "Training program"
