meta:
  id: vendor-migration-strategy
  level: 4
  course: database-migration-planning
  type: output
  description: "Plan a vendor database migration — migrate from Oracle to PostgreSQL to reduce licensing costs while maintaining functionality and performance"
  tags: [database, migration, vendor, Oracle, PostgreSQL, cost-reduction, expert]

state: {}

trigger: |
  Your company pays $1.2M/year in Oracle Database licenses. The CFO
  has mandated a migration to PostgreSQL to reduce costs. The Oracle
  database has:

  - 500 tables across 8 schemas
  - 200 stored procedures (PL/SQL)
  - 50 database triggers
  - 30 materialized views
  - Oracle-specific features: partitioning, Advanced Queuing, Oracle
    Text Search, database links, sequences with CACHE, CONNECT BY
    for hierarchical queries
  - 800GB of data
  - 50 applications connecting to the database
  - 24/7 availability requirement

  Budget for migration: $500K (includes tools, consulting, and
  engineering time)

  Task: Create the Oracle-to-PostgreSQL migration plan. Include:
  feature parity assessment, conversion strategy, risk analysis,
  and the phased migration approach.

assertions:
  - type: llm_judge
    criteria: "Feature parity assessment identifies gaps and alternatives — feature assessment: 'Oracle feature → PostgreSQL equivalent or alternative: Partitioning → PostgreSQL native partitioning (declarative, since PG 10). Feature parity is good for range and list partitioning. Hash partitioning available since PG 11. Oracle subpartitioning → requires custom implementation (partitioned tables with sub-partitions need manual design). PL/SQL stored procedures → PL/pgSQL. Syntax is similar but not identical. Estimated conversion: 60-70% automated by tools like AWS SCT or Ora2Pg. The remaining 30-40% requires manual rewrite. Key differences: Oracle exception handling, cursor syntax, package support (PL/pgSQL has no direct equivalent to Oracle packages — use schemas + functions). Oracle Advanced Queuing → PostgreSQL LISTEN/NOTIFY for simple cases, or pgmq extension, or external message queue (RabbitMQ, SQS) for advanced cases. If the application uses AQ heavily: this is a significant re-architecture, not just a migration. Oracle Text Search → PostgreSQL full-text search (tsvector, tsquery). PostgreSQL FTS is capable but has different syntax and configuration. Alternative: Elasticsearch for advanced search requirements. Database links → PostgreSQL Foreign Data Wrappers (FDW). postgres_fdw provides similar functionality for cross-database queries. Performance may differ for complex cross-database joins. CONNECT BY (hierarchical queries) → PostgreSQL recursive CTEs (WITH RECURSIVE). Functionally equivalent but different syntax. Every CONNECT BY query must be rewritten as a recursive CTE. Sequences with CACHE → PostgreSQL sequences support CACHE natively. Direct equivalent. Materialized views → PostgreSQL materialized views. Oracle supports automatic refresh; PostgreSQL requires manual REFRESH MATERIALIZED VIEW or a scheduled job (pg_cron). Critical assessment: most Oracle features have PostgreSQL equivalents. The two highest-risk areas are: (1) PL/SQL conversion (200 procedures, 30-40% manual work = 60-80 procedures to rewrite), (2) Advanced Queuing replacement (potential re-architecture)'"
    weight: 0.35
    description: "Feature assessment"
  - type: llm_judge
    criteria: "Phased migration approach minimizes risk — phased approach: 'Do NOT migrate all 50 applications at once. Phase 1 (months 1-3): Foundation and pilot. Month 1: set up PostgreSQL infrastructure (Aurora PostgreSQL or self-managed). Run Ora2Pg or AWS SCT to auto-convert schemas and identify conversion issues. Compile a table of all PL/SQL procedures with conversion complexity (auto-convertible vs manual). Month 2-3: pilot migration of 2-3 low-risk applications. Select applications with: few stored procedures, no Advanced Queuing dependency, independent data (minimal cross-application queries). Convert schemas, procedures, and application code. Run in parallel (application reads from both databases, writes to Oracle, compares results). Milestone: 2-3 applications running on PostgreSQL with validated data integrity. Phase 2 (months 4-6): Core application migration. Migrate the next 15-20 applications in batches of 5. Priority: applications with the simplest Oracle dependencies first. For each batch: convert schemas and procedures, update application connection strings, run parallel for 2 weeks, cut over to PostgreSQL, keep Oracle as fallback for 2 weeks. Begin re-architecting Advanced Queuing replacement (this is a parallel workstream, not a sequential dependency). Milestone: 50% of applications on PostgreSQL. Phase 3 (months 7-9): Complex migrations. Migrate the remaining applications, including those with: complex PL/SQL (the manually-rewritten procedures), Advanced Queuing dependencies (using the new queuing solution), cross-database links (using FDW or application-level integration). These are the highest-risk migrations and get the most testing. Milestone: all applications on PostgreSQL. Phase 4 (months 10-12): Optimization and decommission. Tune PostgreSQL performance (indexes, query plans, configuration). Decommission Oracle after 30-day parallel running. Cancel Oracle licenses. Realize cost savings. Milestone: Oracle decommissioned. $1.2M/year in licensing savings begins'"
    weight: 0.35
    description: "Phased approach"
  - type: llm_judge
    criteria: "Cost analysis and risk management included — cost and risk: 'Cost analysis: migration cost: $500K budget. Breakdown: tooling (Ora2Pg, AWS SCT, AWS DMS): $50K. Consulting (Oracle-to-PostgreSQL specialists for PL/SQL conversion): $200K. Engineering time (internal team dedicated to migration): $200K equivalent. Infrastructure (running both databases in parallel for 6 months): $50K. Year 1 total cost: $500K (migration) + $300K (PostgreSQL infrastructure) = $800K. Year 1 savings: $1.2M (Oracle license eliminated) - $800K (migration + PostgreSQL) = $400K net savings in year 1. Year 2+ annual savings: $1.2M (Oracle) - $300K (PostgreSQL infrastructure) = $900K/year ongoing savings. 3-year ROI: $400K (year 1) + $900K (year 2) + $900K (year 3) = $2.2M savings over 3 years on $500K investment. ROI: 340%. Risk analysis: (1) PL/SQL conversion errors (high likelihood, high impact). Risk: subtle logic differences between PL/SQL and PL/pgSQL cause incorrect results. Mitigation: parallel running with result comparison for every migrated application. Automated regression testing with production data. (2) Performance regression (medium likelihood, high impact). Risk: PostgreSQL performs differently than Oracle for certain query patterns. Queries that were fast in Oracle may be slow in PostgreSQL (different optimizer, different index behavior). Mitigation: benchmark the top 100 queries before and after. Tune PostgreSQL configuration and indexes. Engage PostgreSQL performance consulting if needed. (3) Timeline slip (high likelihood, medium impact). Risk: PL/SQL conversion takes longer than estimated. Mitigation: prioritize automated conversion. Accept some technical debt (not every procedure needs to be perfectly rewritten — functionally correct is sufficient). Extend timeline if needed rather than rushing (a bad migration is worse than a late migration). (4) Team skill gap (medium likelihood, medium impact). Risk: team knows Oracle well but PostgreSQL is new. Mitigation: training program ($20K of the consulting budget). Pair Oracle-experienced engineers with PostgreSQL consultants during migration'"
    weight: 0.30
    description: "Cost and risk"
