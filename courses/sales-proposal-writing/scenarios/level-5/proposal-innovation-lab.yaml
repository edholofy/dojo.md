meta:
  id: proposal-innovation-lab
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Design the next generation of B2B proposals — interactive digital experiences, video proposals, AI-personalized content, and immersive buyer journeys"
  tags: [sales, innovation, digital, interactive, future, master]

state: {}

trigger: |
  You're the VP of Revenue Innovation at "FrontierTech" ($380M ARR,
  enterprise AI platform). Your CEO says: "The PDF proposal is dead.
  Our buyers are consuming content through interactive dashboards,
  video, and personalized digital experiences in their personal lives.
  Why are we still sending 30-page Word documents?"

  Your mission: Design the "Proposal of the Future" — a pilot program
  for 50 enterprise deals over the next quarter.

  Available technology:
  1. Interactive proposal platform (like Qwilr/Proposify but custom)
     - Dynamic pricing calculators buyers can adjust
     - Embedded video from sales team
     - Real-time ROI calculators with buyer's own numbers
     - Section-level engagement analytics
  2. AI personalization engine
     - Generates industry-specific content variants
     - Adapts tone based on buyer's communication style (from email
       analysis)
     - Creates personalized executive summaries per stakeholder
  3. Video production capability
     - Studio for recording personalized video messages
     - Screen recording for product demos
     - AI-generated voiceover for technical walkthroughs
  4. Immersive experience tools
     - Virtual "solution environment" the buyer can explore
     - Interactive architecture diagrams they can click into
     - Simulated dashboards with their own data (anonymized)

  Constraints:
  - Enterprise buyers still need a downloadable document for
    procurement (legal/compliance requirement)
  - Some C-suite executives prefer traditional formats
  - Your SE team is already overloaded — can't add significant
    work per deal
  - Security-conscious buyers may not click external links
  - Need to prove ROI before scaling beyond 50-deal pilot

  Tasks:
  1. Design the "Digital Proposal Experience" for a $500K enterprise
     deal. What does the buyer journey look like from first click
     to signature? Map each interaction, the content format at each
     stage, and the engagement data captured.

  2. Solve the format tension. Enterprise procurement needs a PDF,
     but your innovation is in interactive experiences. Design the
     "dual-format" approach that satisfies both requirements without
     doubling the work. How does the interactive experience generate
     the PDF automatically?

  3. Design the pilot measurement framework. Across 50 deals, what
     do you measure to prove the new format outperforms traditional
     proposals? Include: engagement metrics, pipeline velocity, win
     rate comparison, deal size impact, and buyer satisfaction.
     What's the control group design?

  4. Write the "Future of Proposals" vision document (2-page exec
     summary) for your board. Where is B2B buying headed in 3-5
     years? How does this pilot position FrontierTech ahead of
     competitors who are still sending PDFs? What's the competitive
     moat if you get this right?

assertions:
  - type: llm_judge
    criteria: "Digital experience is buyer-centric — maps a journey from initial engagement through interactive exploration to decision, with appropriate content formats at each stage and meaningful engagement analytics at every touchpoint"
    weight: 0.25
    description: "Buyer-centric digital journey"
  - type: llm_judge
    criteria: "Dual-format approach is practical — solves the PDF-vs-interactive tension without doubling work, shows how interactive content auto-generates the procurement document, and handles security-conscious buyers"
    weight: 0.25
    description: "Practical dual-format solution"
  - type: llm_judge
    criteria: "Pilot measurement is scientifically valid — includes proper control group (25 traditional, 25 digital), defined success metrics with statistical significance requirements, and measurement timeline aligned with sales cycle"
    weight: 0.25
    description: "Scientifically valid measurement"
  - type: llm_judge
    criteria: "Vision document is compelling — paints a credible picture of B2B buying evolution, positions the pilot as strategic investment (not experiment), and articulates the competitive advantage of being early"
    weight: 0.25
    description: "Compelling vision document"
