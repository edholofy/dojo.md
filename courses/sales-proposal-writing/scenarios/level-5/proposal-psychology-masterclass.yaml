meta:
  id: proposal-psychology-masterclass
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Apply cognitive psychology and behavioral economics to proposal writing — leverage anchoring, framing, loss aversion, social proof, and narrative psychology to increase win rates"
  tags: [sales, psychology, behavioral-economics, persuasion, master]

state: {}

trigger: |
  You're a behavioral scientist who specializes in B2B decision-making.
  "SaaSLeader" ($450M ARR) has hired you to apply psychological
  principles to their proposal process. Their win rate is 24% and they
  want to reach 32% within 12 months using evidence-based persuasion
  techniques.

  Current proposal problems (from buyer feedback):
  - "All vendor proposals look the same" — lack of distinctiveness
  - "Too much about the vendor, not enough about us" — self-focus bias
  - "The pricing section feels like a trap" — pricing anxiety
  - "I couldn't remember what made them different after reading 4
    proposals" — memorability failure
  - "The proposal was logical but didn't feel right" — emotional
    resonance gap

  Psychological principles to apply:
  1. Anchoring Effect: How initial information sets the frame for all
     subsequent evaluation
  2. Loss Aversion: Losses are felt 2x more intensely than equivalent
     gains (Kahneman & Tversky)
  3. Peak-End Rule: People judge experiences by the peak moment and
     the ending, not the average
  4. Social Proof: People follow the actions of similar others under
     uncertainty
  5. Narrative Transportation: Stories that transport the reader
     reduce counter-arguing by 50%
  6. Processing Fluency: Information that's easier to process is
     perceived as more trustworthy
  7. Endowment Effect: People value things more once they feel
     ownership
  8. Choice Architecture: How options are presented affects selection
     (Thaler & Sunstein)

  Tasks:
  1. Design the "Psychology-Informed Proposal Framework." Map each of
     the 8 principles to specific proposal sections and techniques.
     For each: explain the principle, show the current common mistake,
     and prescribe the evidence-based alternative with a concrete
     proposal example.

  2. Rewrite this standard pricing section using choice architecture
     and anchoring:
     Current: "Platform license: $150K/year. Implementation: $45K.
     Training: $15K. Total Year 1: $210K."
     Apply: anchoring, decoy effect, framing, and the endowment
     effect. Show 3 different psychologically-optimized versions and
     explain which biases each leverages.

  3. Create the "Memorability Audit" — a checklist that evaluates
     whether a proposal will be remembered after the buyer reads 4
     competing proposals. Based on the Peak-End Rule, cognitive
     distinctiveness, and processing fluency. Apply it to evaluate
     a sample executive summary.

  4. Design the training program for AEs on ethical persuasion in
     proposals. Where's the line between persuasion and manipulation?
     Create the "Ethics of Influence in Proposals" framework that
     helps AEs use psychology responsibly.

assertions:
  - type: llm_judge
    criteria: "Framework maps principles to specific techniques — each of the 8 principles is connected to concrete proposal sections with before/after examples showing the common mistake and the evidence-based improvement"
    weight: 0.25
    description: "Principle-to-technique mapping"
  - type: llm_judge
    criteria: "Pricing rewrites demonstrate real psychological effects — shows how anchoring, decoy, and framing change perception of the same $210K investment, with explanations of which cognitive biases each version leverages"
    weight: 0.25
    description: "Psychologically-informed pricing"
  - type: llm_judge
    criteria: "Memorability audit is practical — includes specific checkpoints based on Peak-End Rule (proposal peaks and ending), cognitive distinctiveness (unique framing), and processing fluency (readability, visual design)"
    weight: 0.25
    description: "Practical memorability audit"
  - type: llm_judge
    criteria: "Ethics framework draws clear lines — distinguishes between legitimate persuasion (making value clear, reducing cognitive load) and manipulation (creating false urgency, hiding information), with specific proposal examples of each"
    weight: 0.25
    description: "Clear ethical boundaries"
