meta:
  id: proposal-economics-model
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Model the economics of proposal operations — quantify the cost of proposals, optimize resource allocation, and demonstrate ROI of proposal investments to the board"
  tags: [sales, economics, ROI, board, financial-modeling, master]

state: {}

trigger: |
  You're the SVP of Revenue Operations at "ScalePlatform" ($600M ARR,
  300 AEs). The CFO has challenged you: "We spend $18M per year on
  proposal-related activities and our win rate is 23%. Prove to me
  that proposal investment drives revenue, or I'm cutting the budget."

  Full cost model (annual):
  - AE time on proposals: 300 AEs × 5 proposals/month × 7 hours ×
    $125/hour fully loaded = $15.75M
  - Proposal Operations team (8 people): $1.2M
  - Proposal software (PandaDoc, Highspot): $180K
  - Design resources (outsourced): $120K
  - Legal review time on proposals: $450K
  - Executive time reviewing proposals: $300K
  - Total: ~$18M/year

  Performance data:
  - 18,000 proposals/year → 4,140 wins (23% win rate)
  - Average deal size: $95K ACV
  - Average contract length: 2.3 years
  - Proposals with ProOps support: 28% win rate (2,800 proposals)
  - Proposals without ProOps support: 19% win rate (15,200 proposals)
  - ProOps-supported proposals are 35% faster to create
  - ProOps-supported proposals have 22% larger deal sizes

  Competitor intelligence:
  - Industry average win rate: 27%
  - Top quartile companies: 34% win rate
  - Top quartile invest 2.1% of revenue in proposal operations
    (you invest 3.0% — higher spend, lower results)

  CFO's specific questions:
  1. "What's the incremental revenue from having ProOps vs. not?"
  2. "Why are we spending more than industry average but getting
     less? Where's the waste?"
  3. "If I gave you $2M more, what would you do with it and what
     return would I see?"
  4. "If I cut $5M, what would we lose?"

  Tasks:
  1. Build the full economic model of proposals. Calculate the cost
     per proposal, cost per win, revenue per dollar invested, and
     compare ProOps-supported vs. unsupported proposals. Show the
     CFO the unit economics clearly.

  2. Answer the efficiency question. Why are you spending 3.0% of
     revenue but underperforming the 2.1% benchmark? Identify the
     waste, diagnose the root causes, and propose reallocation.

  3. Build the investment case ($2M additional) and the cut scenario
     ($5M reduction). For each: model the impact on win rate,
     revenue, deal velocity, and AE productivity. Present both as
     a clear comparison with expected outcomes.

  4. Present the board-ready "Proposal ROI Dashboard" — the 6 metrics
     the CFO should track monthly to understand whether proposal
     investments are paying off. Include current baselines, targets,
     and the leading indicators that predict lagging results.

assertions:
  - type: llm_judge
    criteria: "Economic model is rigorous — correctly calculates cost per proposal, cost per win, incremental revenue from ProOps support, and presents unit economics that make the ROI case (or expose problems) clearly"
    weight: 0.25
    description: "Rigorous economic model"
  - type: llm_judge
    criteria: "Efficiency diagnosis is honest — identifies that the 3.0% spend underperforms because most proposals (84%) get no ProOps support, meaning AE time is the largest cost but also the least supported area"
    weight: 0.25
    description: "Honest efficiency diagnosis"
  - type: llm_judge
    criteria: "Investment and cut scenarios are credible — models $2M additional with specific allocations and projected win rate/revenue impact, and models $5M cut with honest assessment of what breaks, both with clear assumptions"
    weight: 0.25
    description: "Credible investment scenarios"
  - type: llm_judge
    criteria: "ROI dashboard includes leading and lagging indicators — tracks proposal velocity, quality scores, content reuse (leading) alongside win rate, deal size, revenue (lagging) with clear baselines and targets"
    weight: 0.25
    description: "Leading-lagging ROI dashboard"
