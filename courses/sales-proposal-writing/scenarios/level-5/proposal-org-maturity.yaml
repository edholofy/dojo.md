meta:
  id: proposal-org-maturity
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Assess and advance proposal organizational maturity — build capability models, design career paths for proposal professionals, and create centers of excellence"
  tags: [sales, maturity-model, center-of-excellence, career-path, master]

state: {}

trigger: |
  You're a Managing Director at a revenue consulting firm. Three
  clients at different maturity stages need your guidance:

  Client A: "StartupRocket" ($30M ARR, 25 AEs, Series C)
  - No proposal function at all
  - AEs write proposals in Google Docs, no templates
  - Win rate: 31% (high because deals are small and founder-led)
  - Growing to 75 AEs in 12 months
  - Question: "When should we invest in proposal operations?
    What do we build first? How do we not lose our scrappy speed?"

  Client B: "MidMarketPro" ($180M ARR, 120 AEs)
  - Has a 4-person proposal team (1 manager, 2 writers, 1 designer)
  - Templates exist but are outdated (last updated 14 months ago)
  - Proposal tool in place (PandaDoc) with low adoption (40%)
  - Win rate: 22% (declining — was 27% two years ago)
  - Question: "We invested in a proposal team but win rate is still
    dropping. What are we doing wrong? How do we get to the next level?"

  Client C: "EnterpriseMega" ($1.2B ARR, 400 AEs, 12 countries)
  - 18-person proposal operations team (global)
  - Mature content library with 500+ content blocks
  - AI-assisted proposal generation (custom tool)
  - Win rate: 29% (above industry average but plateaued)
  - Question: "We've built the machine but it's plateaued. What's
    the next frontier for proposal excellence? How do we get from
    29% to 35%?"

  Tasks:
  1. Create the "Proposal Maturity Model" — a 5-stage framework
     that maps the journey from startup to world-class. Define each
     stage's characteristics, capabilities, required investment,
     and transition triggers. Place each client on the model.

  2. For Client A (startup): Design the "Minimum Viable Proposal
     Operations" — the lightest possible investment that maintains
     their speed while adding quality. What do they build in the
     first 6 months as they scale from 25 to 75 AEs?

  3. For Client B (mid-market): Diagnose why their investment isn't
     working. The 4-person team exists but win rate is declining.
     Identify the 3 most likely root causes and design the
     intervention for each.

  4. For Client C (enterprise): Design the "Proposal Excellence
     Frontier" — the advanced capabilities that take a mature
     organization from 29% to 35%. These aren't basic improvements;
     they're innovations in buyer psychology, predictive analytics,
     competitive intelligence, and hyper-personalization.

assertions:
  - type: llm_judge
    criteria: "Maturity model is comprehensive and progressive — defines 5 distinct stages with clear capabilities, investments, and transition triggers, and accurately places all 3 clients at appropriate stages"
    weight: 0.25
    description: "Progressive maturity model"
  - type: llm_judge
    criteria: "Startup prescription preserves speed — recommends lightweight interventions (templates, basic quality checklist, one shared resource) that scale without bureaucracy, appropriate for the 25-to-75 AE growth phase"
    weight: 0.25
    description: "Speed-preserving startup plan"
  - type: llm_judge
    criteria: "Mid-market diagnosis identifies real root causes — goes beyond 'adopt the tool' to identify issues like team capacity (4 people for 120 AEs), stale content, lack of analytics feedback loops, or misalignment between team and AE needs"
    weight: 0.25
    description: "Real root-cause diagnosis"
  - type: llm_judge
    criteria: "Enterprise frontier identifies advanced capabilities — proposes innovations beyond process improvements, such as predictive deal scoring from proposal engagement, AI personalization per stakeholder, or competitive intelligence automation"
    weight: 0.25
    description: "Advanced capability frontier"
