meta:
  id: comprehensive-proposal-engagement
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Execute a comprehensive proposal engagement combining strategy, execution, psychology, analytics, and organizational design in a high-stakes multi-quarter initiative"
  tags: [sales, comprehensive, shift-simulation, multi-quarter, master]

state: {}

trigger: |
  You're the newly appointed Chief Commercial Officer at "NexusCloud"
  ($1.1B ARR, 600 AEs, 30 countries, preparing for IPO in 24 months).
  The board hired you specifically to "fix the revenue engine." Your
  first 90-day assessment reveals that proposals are the weakest link.

  Assessment findings:

  Financial impact:
  - Win rate: 20% (industry: 27%, best-in-class: 35%)
  - Each 1% win rate improvement = $18M additional ARR at current
    pipeline volume
  - Proposal-related cost: $32M/year (AE time, tools, team, legal)
  - Revenue lost to proposal failures (estimated): $120M/year

  Root causes identified (in order of impact):
  1. No proposal qualification — AEs propose to unqualified deals
     (38% of proposals go to deals with < 10% probability)
  2. Content problem — 600 AEs write from scratch, no institutional
     knowledge captured or shared
  3. Skill gap — bottom 50% of AEs score 3.8/10 on proposal quality
     vs. top 10% at 8.6/10
  4. Process problem — no workflow, no approval gates, no SLAs
  5. Technology gap — using basic tools (Google Docs + Salesforce)
     with no proposal-specific platform
  6. Analytics void — no data on what works, decisions made on
     opinions
  7. Global inconsistency — 30 countries, 30 different approaches
  8. Leadership gap — no single executive owns proposal excellence

  Stakeholder map:
  - CEO: "Fix this before IPO. You have $5M budget and 24 months."
  - CFO: "Show me the math. I want quarterly ROI milestones."
  - CTO: "Don't add another tool. We're consolidating our tech stack."
  - Regional VPs (5): "Don't impose American practices on us."
  - AE population (600): Range from enthusiastic to hostile about change
  - Board: "We need to see win rate above 25% before we file the S-1."

  Tasks:
  1. Design the 24-month "Proposal Excellence Transformation" — a
     phased initiative that addresses all 8 root causes. Phase 1
     (months 1-6): foundation. Phase 2 (months 7-12): scale.
     Phase 3 (months 13-18): optimize. Phase 4 (months 19-24):
     innovate. For each phase: objectives, key initiatives,
     required investment, expected win rate impact, and risk factors.

  2. Build the organizational model. You need to create the Proposal
     Excellence function. Design the org structure, role profiles,
     hiring sequence, and reporting relationships. How does this
     function interact with Sales, Marketing, Legal, Product, and
     Regional VPs? How do you handle the $5M budget constraint
     across 24 months?

  3. Create the change management strategy. You're changing how 600
     AEs work across 30 countries. Design the adoption strategy that
     overcomes resistance, builds champions, creates accountability,
     and achieves 80%+ adoption within 18 months. Address the
     specific objections from the CTO (no new tools), Regional VPs
     (no American practices), and hostile AEs.

  4. Design the IPO-readiness metrics package. The board needs win
     rate above 25% before filing the S-1. Create the dashboard
     that tracks progress, the early warning system that detects
     if you're off track, the quarterly board updates, and the
     narrative that connects proposal excellence to revenue
     predictability — a key metric public market investors evaluate.

  5. Write the 2-page memo to the CEO summarizing your entire plan.
     This is the document she'll share with the board. It must be
     compelling, data-driven, honest about risks, and demonstrate
     that you understand the urgency of the IPO timeline.

assertions:
  - type: llm_judge
    criteria: "24-month plan is phased and realistic — addresses all 8 root causes in a logical sequence, with each phase building on the previous, clear investment allocation, and realistic win rate improvement trajectory from 20% toward 25%+"
    weight: 0.20
    description: "Phased realistic transformation"
  - type: llm_judge
    criteria: "Organizational model is right-sized and well-integrated — proposes appropriate roles and hiring sequence within $5M budget, defines clear interactions with Sales/Marketing/Legal/Product/Regional teams"
    weight: 0.20
    description: "Right-sized org model"
  - type: llm_judge
    criteria: "Change management addresses all resistance — includes champion-based adoption, addresses CTO's tool consolidation concern, Regional VP localization concerns, and AE skepticism with specific strategies for each"
    weight: 0.20
    description: "Resistance-addressing change management"
  - type: llm_judge
    criteria: "IPO metrics connect proposals to revenue predictability — tracks leading and lagging indicators, includes early warning system, and frames proposal excellence in the language of public market investors"
    weight: 0.20
    description: "IPO-connected metrics"
  - type: llm_judge
    criteria: "CEO memo is executive-ready — 2 pages that are compelling, data-driven, honest about risks, and convey urgency aligned with IPO timeline, suitable for board distribution"
    weight: 0.20
    description: "Executive-ready CEO memo"
