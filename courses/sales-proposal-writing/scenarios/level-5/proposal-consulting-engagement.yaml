meta:
  id: proposal-consulting-engagement
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Lead a consulting engagement to transform a client's entire proposal capability — assess maturity, design strategy, implement systems, and measure outcomes"
  tags: [sales, consulting, transformation, maturity-model, master]

state: {}

trigger: |
  You're a Principal Consultant at a top sales effectiveness firm.
  "TechGiant" ($2B ARR, 500 AEs, selling in 40 countries) has hired
  you for a 6-month, $1.2M engagement to transform their proposal
  capability.

  Client situation:
  - Proposal win rate: 19% (industry benchmark: 28%)
  - 500 AEs produce 3,000 proposals/month across 40 countries
  - Average proposal creation time: 11 hours (benchmark: 4 hours)
  - Content reuse rate: 8% (benchmark: 45%)
  - No centralized proposal function (each region operates independently)
  - 3 previous transformation attempts failed in 2 years
  - CRO sponsor has 18 months left before retirement
  - Board has mandated "operational excellence" across revenue ops

  Discovery findings (from 40 stakeholder interviews):
  - Regional VPs resist centralization ("our market is different")
  - Top performers (22% of AEs) have personal content libraries they
    won't share ("it's my competitive advantage within the company")
  - Marketing owns brand but not proposal content (gap)
  - Legal review adds 4 days to every enterprise proposal
  - No proposal analytics — decisions are made on anecdotes
  - IT has evaluated 5 proposal tools but none have been adopted
  - Customer feedback: "Your proposals feel like they were written
    for someone else" (personalization problem)

  Why previous attempts failed:
  1. Year 1: Hired proposal tool (Proposify) — low adoption, canceled
  2. Year 1.5: Created template library — AEs found them too rigid
  3. Year 2: Hired 2 proposal writers — couldn't scale to 500 AEs

  Tasks:
  1. Present the Proposal Maturity Assessment to the CRO. Score
     TechGiant on a 5-level maturity model across 8 dimensions
     (content, process, tools, analytics, governance, talent,
     personalization, competitive positioning). Where are they
     today and where do they need to be?

  2. Design the transformation strategy. Why did the 3 previous
     attempts fail? What's different about your approach? Create the
     6-month phased plan with clear milestones, quick wins (first
     60 days), and the change management strategy that overcomes
     regional resistance and top-performer hoarding.

  3. Build the business case for the transformation. If TechGiant
     moves from 19% to 25% win rate (conservative) on 3,000
     proposals/month with an average deal size of $120K: what's the
     revenue impact? What's the productivity impact of reducing
     proposal time from 11 to 5 hours? Present the 3-year ROI.

  4. Design the governance model that prevents regression. After
     your 6-month engagement ends, how does TechGiant sustain the
     improvements? What roles, processes, metrics, and incentive
     structures need to be permanently in place?

assertions:
  - type: llm_judge
    criteria: "Maturity assessment is rigorous and calibrated — scores TechGiant across 8 dimensions with specific evidence for each rating, identifies the most critical gaps, and benchmarks against industry leaders"
    weight: 0.25
    description: "Rigorous maturity assessment"
  - type: llm_judge
    criteria: "Transformation strategy learns from failures — explicitly addresses why tool-first, template-first, and people-first approaches each failed, and proposes an integrated approach with change management at its core"
    weight: 0.25
    description: "Failure-informed strategy"
  - type: llm_judge
    criteria: "Business case is credible and compelling — quantifies revenue impact from win rate improvement, productivity gains from time reduction, and presents conservative/moderate/aggressive scenarios with clear assumptions"
    weight: 0.25
    description: "Credible business case"
  - type: llm_judge
    criteria: "Governance model ensures sustainability — includes permanent roles, metrics dashboards, incentive alignment (top performers rewarded for sharing), and escalation triggers that detect regression early"
    weight: 0.25
    description: "Sustainability-ensuring governance"
