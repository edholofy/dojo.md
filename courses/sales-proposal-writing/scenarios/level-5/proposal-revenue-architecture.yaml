meta:
  id: proposal-revenue-architecture
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Architect the proposal function within a revenue operations framework — align proposals with pipeline stages, forecast accuracy, and revenue predictability"
  tags: [sales, revenue-architecture, revops, pipeline, forecasting, master]

state: {}

trigger: |
  You're the Chief Revenue Officer at "RevenueOS" ($500M ARR, IPO
  planned in 18 months). Your board has mandated "revenue predictability"
  and your CFO says proposals are the biggest black box in your
  revenue engine.

  The problem:
  - Pipeline is $2.5B (5x coverage on $500M target)
  - But proposal-stage conversion is only 23% (down from 31%)
  - Forecast accuracy at proposal stage: 42% (should be 70%+)
  - 35% of proposals go to deals that were never going to close
    ("proposal-as-discovery" problem)
  - Average time in proposal stage: 28 days (increasing)
  - No correlation between proposal quality and forecast category

  Data available:
  - 5 years of proposal data (15,000 proposals)
  - CRM data: stage, amount, close date, win/loss, competitor
  - Proposal metadata: pages, sections, author, review status,
    time to create, number of revisions
  - Buyer engagement data: who opened, how long they read, which
    sections, how many times
  - Post-close surveys: 2,000 responses on proposal effectiveness
  - Gong data: 8,000 recorded calls mentioning proposals

  Board expectations for IPO readiness:
  - Forecast accuracy at proposal stage: 70%+ within 12 months
  - Proposal conversion rate: 30%+ within 12 months
  - Revenue predictability score: 85+ (currently 62)

  Tasks:
  1. Diagnose the proposal-revenue disconnect. Using the available
     data sources, explain why 35% of proposals go to dead deals and
     why forecast accuracy at proposal stage is only 42%. What's the
     root cause of the "proposal-as-discovery" problem?

  2. Design the "Proposal Qualification Framework" — the criteria
     that must be met BEFORE a proposal is created. How does this
     integrate with your CRM stages? What data triggers a proposal
     vs. what triggers a "not ready for proposal" coaching session?

  3. Build the "Proposal-Revenue Attribution Model." Using engagement
     data (opens, read time, section views) and proposal metadata,
     create the predictive model that improves forecast accuracy.
     What signals predict a win? What signals predict a stall or loss?

  4. Present the IPO-readiness plan to the board. How do you get
     from 42% forecast accuracy to 70%+ and 23% conversion to 30%+
     in 12 months? Include quarterly milestones, investment
     requirements, and the metrics dashboard the board will review.

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies root causes — explains that the 'proposal-as-discovery' problem stems from weak qualification gates, AE incentive to show pipeline activity, and lack of proposal-readiness criteria at the opportunity stage"
    weight: 0.25
    description: "Root-cause diagnosis"
  - type: llm_judge
    criteria: "Qualification framework prevents premature proposals — defines specific criteria (MEDDPICC-aligned or similar) that must be verified before proposal creation, with CRM integration and coaching triggers for unqualified deals"
    weight: 0.25
    description: "Premature proposal prevention"
  - type: llm_judge
    criteria: "Attribution model uses engagement signals — incorporates proposal opens, read time, section engagement, and revision requests as predictive signals for forecasting, with clear methodology for model validation"
    weight: 0.25
    description: "Engagement-based attribution"
  - type: llm_judge
    criteria: "IPO readiness plan is board-appropriate — presents quarterly milestones with specific metrics targets, required investments, risk factors, and a confidence-building narrative about revenue predictability improvement"
    weight: 0.25
    description: "Board-appropriate IPO plan"
