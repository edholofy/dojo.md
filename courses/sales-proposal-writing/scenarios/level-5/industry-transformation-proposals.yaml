meta:
  id: industry-transformation-proposals
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Write proposals for industry transformation deals — where the proposal itself must convince the buyer to change their entire operating model, not just buy a product"
  tags: [sales, transformation, change-management, industry, master]

state: {}

trigger: |
  You're the Global Head of Strategic Sales at "TransformAI" ($800M
  ARR, enterprise AI platform). You're pursuing 3 "transformation
  deals" — where the customer isn't buying software, they're buying
  a new way of operating. These deals require proposals that are
  part business case, part change management plan, part vision
  document.

  Deal 1: "AutoNation" — $12M TCV, automotive manufacturer
  - They want to transform from traditional quality inspection
    (human inspectors, 3% defect rate) to AI-powered quality
    (computer vision, projected 0.3% defect rate)
  - 14 factories, 28,000 workers, union workforce
  - The union is concerned about job displacement
  - The CFO wants hard ROI (10x reduction in defects = $50M savings)
  - The plant managers are skeptical ("AI doesn't understand
    manufacturing")
  - The CEO is a visionary who wants to be "the Tesla of quality"
  - Your proposal must convince 6 different audiences simultaneously

  Deal 2: "GlobalHealth" — $8M TCV, hospital network (22 hospitals)
  - Transforming from paper-based clinical workflows to AI-assisted
    diagnosis and treatment recommendations
  - FDA regulatory requirements for any AI in clinical decisions
  - Physician resistance ("AI can't replace clinical judgment")
  - Patient safety is the #1 concern (not cost, not efficiency)
  - 3 hospitals lost to malpractice suits last year — risk tolerance
    is near zero
  - Your proposal must navigate the most risk-averse buying
    environment in any industry

  Deal 3: "MegaBank" — $15M TCV, top-5 US bank
  - Transforming fraud detection from rules-based to AI-powered
  - Current system: 2% false positive rate, $200M annual fraud loss
  - AI system projection: 0.4% false positive, $50M annual fraud loss
  - OCC (banking regulator) requires explainable AI — no black boxes
  - The Chief Risk Officer needs to personally approve AI models
  - The bank's board requires a "model risk management" plan
  - Your proposal must satisfy both business buyers and regulators

  Tasks:
  1. Write the "Transformation Narrative" section for AutoNation.
     This isn't a product pitch — it's a vision of what their
     factories look like in 3 years. Address all 6 audiences:
     CEO (vision), CFO (ROI), plant managers (practical proof),
     union (job evolution not elimination), quality team (enhanced
     capability), and IT (technical feasibility).

  2. Write the "Risk Mitigation Framework" for GlobalHealth. This
     proposal section must address patient safety, FDA compliance,
     physician autonomy, and malpractice liability. How do you sell
     AI to the most risk-averse buyers? Every claim must be
     defensible in a regulatory and legal context.

  3. Write the "Regulatory Compliance and Model Governance" section
     for MegaBank. This must satisfy the OCC's explainability
     requirements, the CRO's model risk management needs, and the
     board's governance expectations. How do you make AI technical
     governance readable for banking board members?

  4. Across all 3 deals: what's the common framework for
     "transformation proposals"? How do they differ from standard
     sales proposals? Create the "Transformation Proposal
     Methodology" that your team can apply to any industry.

assertions:
  - type: llm_judge
    criteria: "Transformation narrative addresses all audiences — CEO gets vision, CFO gets ROI, plant managers get practical proof, union gets job evolution framing, quality team gets capability enhancement, IT gets feasibility, all woven into one cohesive narrative"
    weight: 0.25
    description: "Multi-audience transformation narrative"
  - type: llm_judge
    criteria: "Risk framework is healthcare-appropriate — addresses patient safety as primary concern, includes FDA regulatory pathway, preserves physician decision authority, and includes malpractice liability consideration, all with defensible claims"
    weight: 0.25
    description: "Healthcare-appropriate risk framework"
  - type: llm_judge
    criteria: "Regulatory section satisfies banking governance — addresses OCC explainability, model risk management, board governance, and makes technical AI concepts accessible to non-technical banking board members"
    weight: 0.25
    description: "Banking governance compliance"
  - type: llm_judge
    criteria: "Transformation methodology identifies common patterns — distills what makes transformation proposals different (vision + change management + risk + proof), creates a reusable framework applicable across industries"
    weight: 0.25
    description: "Reusable transformation methodology"
