meta:
  id: proposal-board-strategy
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Present proposal strategy to the board of directors — connect proposal operations to company valuation, public market narratives, and investor expectations"
  tags: [sales, board, investor, valuation, public-market, master]

state: {}

trigger: |
  You're the CRO of "CloudScale" ($700M ARR, publicly traded, $8B
  market cap). Your board includes 2 private equity partners, 1 former
  public company CEO, and 2 independent directors. You're presenting
  at the quarterly board meeting on "Revenue Execution Excellence."

  Board context:
  - Stock price down 18% in 6 months due to missed revenue targets
  - Win rate declined from 29% to 22% over 4 quarters
  - Sales cycle lengthened from 62 days to 89 days
  - Analysts downgraded the stock citing "execution concerns"
  - The board is evaluating whether to replace the sales leadership
  - One PE board member wants to bring in a consulting firm to
    "fix sales execution"

  Your proposal-specific data:
  - 2,400 proposals/quarter, win rate 22% (was 29%)
  - Proposal stage is where 45% of deals die (up from 28%)
  - Average time in proposal stage: 32 days (was 18 days)
  - Proposal quality scores: declining from 7.1 to 5.4 over 4 quarters
  - The decline correlates with: losing 3 senior proposal writers,
    a poorly executed CRM migration that disrupted proposal workflows,
    and a new pricing model that AEs struggle to present
  - Fix is estimated at $1.5M investment over 6 months
  - Expected impact: return to 28% win rate within 3 quarters

  Board member perspectives:
  - PE Partner 1: "Just cut non-performing AEs and hire better ones"
  - PE Partner 2: "What's the data say? Show me the regression analysis"
  - Former CEO: "This sounds like an execution problem, not a strategy
    problem. What's the 30-day plan?"
  - Independent 1: "How do we know this fix will work? What's the
    risk if it doesn't?"
  - Independent 2: "What are our competitors doing? Are they seeing
    the same declines?"

  Tasks:
  1. Write the board presentation (8 slides, with talking points for
     each). Diagnose the problem honestly without being defensive,
     present the root cause analysis, propose the $1.5M fix with
     expected ROI, and address each board member's likely objection.

  2. The PE Partner who wants to "cut and hire" is wrong but
     influential. Build the data-driven case that the win rate
     decline is a systems problem, not a people problem. Show that
     the same AEs had higher win rates under the old system.

  3. Build the "Revenue Recovery Model" — the financial model showing
     how returning from 22% to 28% win rate impacts quarterly
     revenue, annual targets, and stock price (based on revenue
     multiple). Make the case that $1.5M investment yields $40M+
     in recovered revenue.

  4. Design the board reporting cadence. What monthly metrics do you
     send the board to demonstrate progress? What are the "circuit
     breaker" metrics that trigger escalation if the fix isn't
     working? How do you rebuild trust with a skeptical board?

assertions:
  - type: llm_judge
    criteria: "Board presentation is honest and executive — diagnoses root causes without defensiveness, addresses each board member's perspective, presents data-driven proposal with clear ROI and risk mitigation"
    weight: 0.25
    description: "Honest executive presentation"
  - type: llm_judge
    criteria: "Data case disproves people-problem hypothesis — uses cohort analysis or similar to show same AEs performed better under previous system, isolating the system changes (CRM migration, pricing model, team attrition) as causal factors"
    weight: 0.25
    description: "System-vs-people data case"
  - type: llm_judge
    criteria: "Revenue recovery model connects proposals to stock price — quantifies the revenue impact of win rate improvement, applies the company's revenue multiple to show market cap impact, making $1.5M investment clearly justified"
    weight: 0.25
    description: "Revenue-to-valuation recovery model"
  - type: llm_judge
    criteria: "Board reporting builds trust — includes monthly leading indicators, quarterly outcome metrics, defined circuit breakers with escalation triggers, and transparency mechanisms that rebuild credibility with skeptical directors"
    weight: 0.25
    description: "Trust-rebuilding reporting cadence"
