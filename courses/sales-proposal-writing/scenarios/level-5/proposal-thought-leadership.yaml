meta:
  id: proposal-thought-leadership
  level: 5
  course: sales-proposal-writing
  type: output
  description: "Develop thought leadership on proposal excellence — write industry research, speak at conferences, and build a body of work that advances the field"
  tags: [sales, thought-leadership, research, conference, publishing, master]

state: {}

trigger: |
  You're a recognized expert in B2B sales proposals with 15 years of
  experience. You've been invited to deliver a keynote at the Sales
  Enablement Society's annual conference (2,000 attendees, mostly
  VP+ level). The theme is: "The Death and Rebirth of the Sales
  Proposal."

  You've also been commissioned to write a research report for a
  major analyst firm (Forrester-level) based on a study you conducted:

  Research study: "The Proposal Paradox" (12 months, 5,000 proposals,
  50 companies)
  Key findings:
  1. Companies that spend the MOST time on proposals have the LOWEST
     win rates (inverse correlation above 6 hours)
  2. The #1 predictor of proposal success is NOT quality — it's
     TIMING (proposals sent within 48 hours of the decision trigger
     win 2.3x more often)
  3. Buyer attention span on proposals has dropped 40% in 5 years
     (average read time: 3.2 minutes for a 20-page document)
  4. 67% of proposals are evaluated by someone who was NOT in the
     discovery meetings (the "stranger reader" problem)
  5. Proposals that tell a story (narrative arc) convert 34% better
     than proposals organized by feature/capability
  6. Personalized video proposals (< 3 minutes) are opened 4.7x
     more often than PDF proposals
  7. The gap between top-performing proposal organizations and
     average ones has WIDENED in the last 3 years (divergence, not
     convergence)
  8. AI-assisted proposals currently show NO win rate improvement
     over human-written proposals (but 60% faster creation)

  Tasks:
  1. Write the keynote talk outline (45 minutes + 15 min Q&A). The
     audience expects provocative insights, not best practices.
     Structure the talk around the most counterintuitive findings.
     Include: opening hook, 3 main arguments, supporting data for
     each, the "so what," and the call to action.

  2. Write the executive summary of the research report (2 pages).
     This will be read by 10,000+ sales leaders. Present the 8
     findings with implications and recommendations. Handle finding
     #8 (AI shows no win rate improvement) carefully — the industry
     is heavily invested in AI proposals.

  3. Finding #4 (the "stranger reader" problem) is your most
     original contribution. Develop this concept fully: define it,
     quantify its impact, explain why it happens, and propose the
     solution framework. This will be the section that gets cited.

  4. Design the "Proposal Excellence Benchmark" — an annual study
     methodology that other organizations can use to measure their
     proposal maturity and compare against peers. Define the
     dimensions, data collection method, scoring rubric, and
     reporting format.

assertions:
  - type: llm_judge
    criteria: "Keynote is provocative and structured — opens with a counterintuitive hook, builds 3 arguments from the most surprising findings, supports each with data, and concludes with an actionable call to action for VP+ audience"
    weight: 0.25
    description: "Provocative keynote structure"
  - type: llm_judge
    criteria: "Research executive summary is rigorous — presents all 8 findings with appropriate nuance, handles the AI finding (#8) honestly without dismissing AI investment, and provides actionable recommendations"
    weight: 0.25
    description: "Rigorous research summary"
  - type: llm_judge
    criteria: "Stranger reader concept is fully developed — defines the problem clearly, quantifies impact, explains root causes (buying committee dynamics, proposal forwarding), and proposes a solution framework that addresses the core issue"
    weight: 0.25
    description: "Fully developed stranger reader concept"
  - type: llm_judge
    criteria: "Benchmark methodology is replicable — defines clear dimensions, practical data collection methods, objective scoring rubrics, and a reporting format that enables meaningful peer comparison"
    weight: 0.25
    description: "Replicable benchmark methodology"
