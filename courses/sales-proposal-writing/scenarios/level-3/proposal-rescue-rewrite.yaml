meta:
  id: proposal-rescue-rewrite
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Rescue failed proposals — diagnose why a proposal lost, rewrite critical sections, and re-engage prospects with an improved approach"
  tags: [sales, rescue, rewrite, loss-analysis, advanced]

state: {}

trigger: |
  You're a senior AE at "IntegratePro" (integration platform, $60M
  ARR). Your team lead assigns you 3 lost deals and asks you to
  diagnose what went wrong with each proposal and how to win them
  back.

  Lost Deal 1: "RetailChain" ($150K deal, lost to competitor)
  Loss reason (from prospect): "Your proposal was technically strong
  but didn't clearly show how you'd solve our specific problem.
  The competitor's proposal was tailored to retail specifically."
  Original proposal excerpt (exec summary): "IntegratePro is the
  leading iPaaS platform with 200+ pre-built connectors, supporting
  REST, SOAP, GraphQL APIs. Our drag-and-drop workflow builder..."
  What your competitor did: Customized every section around retail
  use cases, included retail-specific case studies, and showed
  mockups of RetailChain's actual data flowing through their system.

  Lost Deal 2: "FinTechPro" ($200K deal, lost to "no decision")
  Loss reason: "We couldn't get internal alignment. The proposal
  was great for our engineering team but the CFO didn't see the
  value. We decided to revisit next year."
  Original proposal: 35 pages of technical architecture, integration
  diagrams, API documentation. Pricing section was 1 paragraph.
  No ROI model. No executive summary.

  Lost Deal 3: "HealthGroup" ($100K deal, lost on price)
  Loss reason: "You were our preferred vendor technically, but your
  price was 40% higher than the other option. We couldn't justify
  the premium."
  Original pricing: $100K/year flat rate. No tiers. No options.
  Competitor: Offered $60K/year with a 3-year commitment discount.
  Your cost analysis: HealthGroup's problem costs them $300K/year.

  Tasks:
  1. For each lost deal, diagnose the root cause. Go beyond the
     surface-level loss reason — what was the proposal-writing
     failure that caused it?

  2. Rewrite the executive summary for Lost Deal 1 (RetailChain)
     to be retail-specific. Show the contrast between the original
     and your rewrite.

  3. Rewrite the pricing section for Lost Deal 3 (HealthGroup) to
     justify the 40% premium. Use value-framing, tiered options,
     and ROI comparison. Show why $100K is cheaper than $60K when
     you factor in total value.

  4. For Lost Deal 2 (FinTechPro), you have a chance to re-engage
     "next year" — which is now 3 months away. Write the re-
     engagement proposal strategy. What changes in the new proposal?

assertions:
  - type: llm_judge
    criteria: "Root cause diagnosis goes deeper than surface — identifies Deal 1 as a personalization failure, Deal 2 as an audience-mismatch (engineers vs. executives), Deal 3 as a value-framing failure, not just 'lost on price'"
    weight: 0.25
    description: "Deep root cause diagnosis"
  - type: llm_judge
    criteria: "RetailChain rewrite is dramatically more personalized — references retail-specific challenges (POS integration, omnichannel, seasonal peaks), uses RetailChain's data, and contrast with the generic original is clear"
    weight: 0.25
    description: "Dramatically personalized rewrite"
  - type: llm_judge
    criteria: "HealthGroup pricing rewrite justifies the premium — frames $100K against $300K problem, offers tiered options, shows total cost of ownership comparison, and demonstrates why the cheaper option may cost more long-term"
    weight: 0.25
    description: "Premium-justifying pricing rewrite"
  - type: llm_judge
    criteria: "Re-engagement strategy adds the missing CFO content — includes executive summary, ROI model, and value-framing that were absent before, while maintaining the strong technical content"
    weight: 0.25
    description: "CFO-inclusive re-engagement"
