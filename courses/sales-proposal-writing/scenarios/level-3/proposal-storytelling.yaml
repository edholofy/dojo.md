meta:
  id: proposal-storytelling
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Use narrative storytelling in proposals — create compelling arcs, use customer success stories, and make data emotionally resonant"
  tags: [sales, storytelling, narrative, emotional, persuasion, advanced]

state: {}

trigger: |
  You're a senior AE at "TransformHQ" (digital transformation SaaS,
  $90M ARR). Your VP of Sales attended a writing workshop and is now
  pushing the team to "tell stories, not list features." He gives
  you a framework.

  Proposal storytelling framework:
  1. The Hero's Journey (adapted for sales):
     - The hero is the PROSPECT (not you)
     - The problem is the villain
     - You are the guide (like Gandalf, not Frodo)
     - The proposal shows the path to victory
     - The outcome is the prospect transformed

  2. Three-act structure for proposals:
     Act 1 (Problem): Where they are today (pain, costs, risks)
     Act 2 (Journey): How they'll get from here to there (solution,
     implementation, support)
     Act 3 (Transformation): Where they'll be (outcomes, growth,
     competitive advantage)

  3. Data with emotion:
     Bad: "Reduce processing time by 65%"
     Good: "Your team will leave the office at 5 PM instead of 8 PM
     because the 3 hours of manual processing that keeps them late
     every night will be automated."

  Practice prospect:
  "MedDevice Corp" (medical device manufacturer, 600 employees)
  Their story:
  - Founded 20 years ago, grown to $100M revenue
  - But still running on processes from when they were a $10M company
  - Quality team of 15 spends 60% of time on paperwork instead of
    actual quality engineering
  - FDA audit last year: 4 observations, almost lost a product line
  - CEO's quote in discovery: "We're a $100M company running like
    a $10M company. If we don't modernize, we won't survive the
    next 5 years."

  Tasks:
  1. Write the executive summary for MedDevice Corp using the
     Hero's Journey framework. Position them as the hero, their
     outdated processes as the villain, and your platform as the
     guide. Keep it to 1 page.

  2. Rewrite these 5 dry data points as emotionally resonant
     narratives:
     a. "60% time on paperwork"
     b. "4 FDA audit observations"
     c. "$100M revenue with $10M processes"
     d. "15-person quality team"
     e. "5-year survival timeline"

  3. Write a customer success story for the proposal that follows
     the 3-act structure. Use a similar (fictional) company that
     went through the same transformation.

  4. When does storytelling backfire in proposals? What are 3
     situations where straight facts are better than narrative?

assertions:
  - type: llm_judge
    criteria: "Hero's Journey executive summary casts MedDevice as the hero — positions their growth as the achievement, processes as the obstacle to continued success, and the proposal as the map to their next chapter"
    weight: 0.25
    description: "Hero-centric executive summary"
  - type: llm_judge
    criteria: "Data rewrites create emotional resonance — transforms dry statistics into human stories (e.g., quality engineers doing paperwork instead of engineering, FDA risk threatening products that help patients)"
    weight: 0.25
    description: "Emotionally resonant data"
  - type: llm_judge
    criteria: "Customer success story follows 3-act structure — Act 1 shows a similar company's pain, Act 2 describes the transformation journey, Act 3 reveals measurable outcomes, all feeling like a real narrative"
    weight: 0.25
    description: "Three-act success story"
  - type: llm_judge
    criteria: "Storytelling limitations are well-identified — correctly notes that technical audiences, RFP responses, or compliance sections require facts over narrative, with specific examples"
    weight: 0.25
    description: "Well-identified storytelling limits"
