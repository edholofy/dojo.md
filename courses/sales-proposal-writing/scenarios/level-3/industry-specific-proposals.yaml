meta:
  id: industry-specific-proposals
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Write industry-specific proposals for healthcare, financial services, and government — adapt compliance language, terminology, and social proof"
  tags: [sales, industry, healthcare, financial-services, government, advanced]

state: {}

trigger: |
  You're a senior AE at "DataPlatform" (enterprise data management
  SaaS, $100M ARR). You sell across 3 heavily regulated industries
  and each requires a completely different proposal approach.

  Industry 1: Healthcare
  Prospect: "RegionalHealth" (hospital network, 3,000 employees)
  Deal: $200K/year
  Key requirements: HIPAA BAA, HITRUST certification, ePHI handling,
  patient data de-identification, audit trails
  Decision makers: CMIO, CISO, CFO, CMO
  Language: Clinical, patient-centric, outcomes-focused
  Typical evaluation: 12-18 months with compliance review

  Industry 2: Financial Services
  Prospect: "PacificBank" (regional bank, 2,000 employees)
  Deal: $150K/year
  Key requirements: SOX compliance, GLBA, PCI DSS, FFIEC guidelines,
  data residency, penetration testing results
  Decision makers: CTO, CISO, Chief Compliance Officer, CFO
  Language: Risk-focused, regulatory, conservative
  Typical evaluation: 6-9 months with IT security review

  Industry 3: Government
  Prospect: "FedAgency" (federal agency, 5,000 employees)
  Deal: $300K/year
  Key requirements: FedRAMP High, Section 508 accessibility, NIST
  800-171, FISMA compliance, Made in America preferences
  Decision makers: CIO, ISSO, Contracting Officer, Program Manager
  Language: Formal, compliance-heavy, mission-focused
  Typical evaluation: 9-12 months with formal procurement

  Tasks:
  1. For each industry, write a 300-word executive summary that
     uses the correct industry language, references relevant
     compliance frameworks, and addresses the specific decision
     makers' priorities.

  2. Create the "compliance section template" for each industry.
     What certifications, attestations, and frameworks must be
     referenced? How do you present compliance as a competitive
     advantage?

  3. The same product, 3 different proposals. What sections change
     between industries and what stays the same? Create a content
     reuse matrix showing which content is universal vs. industry-
     specific.

  4. A prospect from healthcare says: "Your banking case studies
     are irrelevant to us." But you don't have a healthcare case
     study yet. How do you handle social proof in the proposal?

assertions:
  - type: llm_judge
    criteria: "Executive summaries use correct industry language — healthcare uses clinical/patient terms, financial uses risk/regulatory terms, government uses mission/compliance terms, each feeling like it was written by an industry expert"
    weight: 0.25
    description: "Industry-fluent executive summaries"
  - type: llm_judge
    criteria: "Compliance templates are comprehensive — healthcare covers HIPAA/HITRUST/ePHI, financial covers SOX/GLBA/PCI/FFIEC, government covers FedRAMP/NIST/FISMA/Section 508, each positioned as competitive advantage"
    weight: 0.25
    description: "Comprehensive compliance templates"
  - type: llm_judge
    criteria: "Content reuse matrix is practical — clearly identifies universal sections (company overview, support, implementation methodology) vs. industry-specific sections (compliance, use cases, social proof, pricing)"
    weight: 0.25
    description: "Practical reuse matrix"
  - type: llm_judge
    criteria: "Missing social proof is handled creatively — suggests alternatives like data security certifications, compliance attestations, pilot programs, relevant regulatory expertise, or anonymized outcome data"
    weight: 0.25
    description: "Creative proof alternatives"
