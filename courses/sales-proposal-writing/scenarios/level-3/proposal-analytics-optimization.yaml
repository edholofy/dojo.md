meta:
  id: proposal-analytics-optimization
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Use proposal analytics to optimize proposal effectiveness — analyze engagement data, A/B test approaches, and build data-driven improvement loops"
  tags: [sales, analytics, data-driven, optimization, A/B-testing, advanced]

state: {}

trigger: |
  You're the Senior Sales Operations Manager at "InsightPlatform"
  ($120M ARR, 80 AEs). You've implemented PandaDoc with full
  analytics tracking 6 months ago. Now you have data on 2,400
  proposals and your CRO wants actionable insights.

  Engagement data highlights:
  - Average proposal open rate: 72% (28% are never opened)
  - Average time spent reading: 4.2 minutes for a 15-page proposal
  - Most-viewed section: Pricing (89% view rate, 1.8 min avg)
  - Least-viewed section: Company Overview (31% view rate, 12 sec avg)
  - Executive Summary: 78% view rate, 42 seconds average
  - Case Studies: 56% view rate, but prospects who view spend 2.1
    minutes (highest engagement per viewer)
  - Proposals viewed by 3+ people win at 34% vs. 18% for single viewer
  - Proposals viewed within 24 hours of receipt win at 31% vs. 16%
    if first opened after 5+ days
  - Mobile views: 38% of first opens are on mobile (but proposals
    aren't mobile-optimized)

  A/B test results (last 3 months, 400 proposals per variant):
  - Test 1: Executive summary length
    A: 1 page (29% win rate) vs. B: 2+ pages (21% win rate)
  - Test 2: Pricing position
    A: After solution section (26% win rate) vs. B: Separate
    attachment (23% win rate)
  - Test 3: Video intro included
    A: With 90-second video (32% win rate) vs. B: No video (24%)
  - Test 4: Number of case studies
    A: 1 relevant case study (27%) vs. B: 3 case studies (25%)

  Concerning patterns:
  - 28% of proposals never opened — but AEs aren't following up
  - Proposals sent on Friday have 40% lower engagement than Tuesday
  - Proposals over 20 pages have declining engagement per page
  - The pricing section gets the most attention but has the highest
    "rage click" rate (rapid scrolling/clicking = confusion)

  Tasks:
  1. Present the "State of Proposals" report to the CRO. Synthesize
     the engagement data into 5 key insights with clear actions. For
     each insight: what the data shows, why it matters, and what to
     change.

  2. The 28% never-opened problem is your biggest opportunity. Design
     the system to detect unopened proposals and trigger AE follow-up.
     What's the optimal timing? What does the follow-up say? How do
     you make this automatic without being annoying to buyers?

  3. Based on the A/B test results, create the "Proposal Optimization
     Playbook" — the set of evidence-based guidelines AEs should
     follow. How do you communicate the results and drive adoption
     without overwhelming AEs with data?

  4. Design the next round of A/B tests. You've tested the easy
     variables. What are the next 4 tests that could move win rate?
     For each: hypothesis, test design, sample size needed, and
     expected impact.

assertions:
  - type: llm_judge
    criteria: "CRO report synthesizes data into actionable insights — identifies the highest-impact findings (video proposals, exec summary length, multi-viewer correlation) and proposes specific changes with expected impact"
    weight: 0.25
    description: "Actionable CRO report"
  - type: llm_judge
    criteria: "Unopened proposal system is automated and appropriate — detects unopened proposals with proper timing windows, triggers AE alerts with suggested follow-up language, and balances persistence with buyer experience"
    weight: 0.25
    description: "Automated unopened proposal system"
  - type: llm_judge
    criteria: "Optimization playbook translates data to practice — converts A/B test results into simple guidelines AEs can follow (shorter exec summaries, include video, pricing placement) with clear adoption strategy"
    weight: 0.25
    description: "Data-to-practice playbook"
  - type: llm_judge
    criteria: "Next-round tests are hypothesis-driven — proposes 4 tests targeting deeper variables (proposal structure, personalization level, follow-up timing, stakeholder-specific content) with proper experimental design"
    weight: 0.25
    description: "Hypothesis-driven next tests"
