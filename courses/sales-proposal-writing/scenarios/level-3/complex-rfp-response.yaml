meta:
  id: complex-rfp-response
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Manage complex RFP responses — coordinate cross-functional teams, optimize for evaluation criteria, and differentiate in constrained formats"
  tags: [sales, RFP, response-management, cross-functional, advanced]

state: {}

trigger: |
  You're a senior AE and RFP Response Lead at "EnterpriseSaaS"
  ($120M ARR). You received a major RFP from "StateGov" (state
  government agency, $500K deal). This is the largest government
  opportunity you've pursued.

  RFP specifications:
  - 200-page RFP with 450 individual requirements
  - Response deadline: 6 weeks from today
  - Oral presentation: 2 weeks after submission
  - Format: Must follow their template (no creative freedom)
  - Maximum response length: 300 pages + unlimited appendices
  - Evaluation by 8-person committee over 4 weeks

  Evaluation criteria:
  - Technical approach and methodology: 40%
  - Past performance and references: 20%
  - Management approach and staffing: 15%
  - Price: 20%
  - Small business participation: 5%

  Compliance challenges:
  - 12 of 450 requirements are "must-have" where you don't fully
    comply (e.g., specific state certifications you're obtaining)
  - 30 requirements where your compliance is partial
  - 408 requirements where you're fully compliant

  Your response team:
  - You (proposal lead, account owner)
  - Solutions Engineer (technical writing)
  - Legal counsel (terms and conditions)
  - Implementation manager (methodology section)
  - Marketing (case studies, formatting)
  - Subject matter experts (3 people for specific modules)
  - Executive sponsor (VP of Sales, for escalations)

  Tasks:
  1. Create the 6-week response plan. Week by week, what happens?
     Who does what? Include: kickoff, writing, review cycles, and
     final production. Account for the fact that your SE has 2 other
     RFPs in parallel.

  2. For the 12 non-compliant requirements, design the response
     strategy. Which ones can be addressed with workarounds or
     timelines? Which ones are disqualification risks? Write the
     compliance narrative for 3 of them.

  3. Technical approach is weighted 40% — the highest. Design the
     technical section strategy that maximizes your score. What
     gets the most space? What visual elements do you include?

  4. Write the oral presentation outline (45 minutes). The
     evaluation committee wants to see your team, not just slides.
     How do you structure a presentation that demonstrates both
     capability and chemistry?

assertions:
  - type: llm_judge
    criteria: "6-week plan is resource-realistic — accounts for SE's parallel workload, includes review cycles (peer, management, Red Team), and builds in buffer time for production and QA"
    weight: 0.25
    description: "Resource-realistic response plan"
  - type: llm_judge
    criteria: "Non-compliance strategy is transparent and solutions-oriented — categorizes gaps by risk level, provides honest timelines for certifications in progress, and offers workarounds that satisfy the spirit of requirements"
    weight: 0.25
    description: "Solutions-oriented compliance strategy"
  - type: llm_judge
    criteria: "Technical section maximizes the 40% weight — allocates proportional space, includes diagrams and architecture visuals, maps directly to evaluation criteria, and uses clear requirement-to-response traceability"
    weight: 0.25
    description: "Weight-maximized technical section"
  - type: llm_judge
    criteria: "Oral presentation demonstrates team capability — includes customer-facing roles, demo elements, Q&A preparation, and role assignments that show the committee who they'll work with day-to-day"
    weight: 0.25
    description: "Capability-demonstrating presentation"
