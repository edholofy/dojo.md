meta:
  id: enterprise-proposal-strategy
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Write enterprise proposals for complex, multi-stakeholder deals — orchestrate win themes, executive messaging, and technical depth in a single document"
  tags: [sales, enterprise, strategy, complex-deals, advanced]

state: {}

trigger: |
  You're a senior AE at "CloudPlatform" (enterprise cloud SaaS,
  $200M ARR). You're writing the proposal for your biggest deal of
  the year: "NationalBank" ($1.2M annual contract, 3-year term).

  Deal context:
  - 8 months of discovery and evaluation
  - 6 stakeholders in the buying committee
  - Competing against AWS and Microsoft Azure
  - Your champion (VP of Digital) has been fighting internally
    for your solution
  - Final decision at board level in 4 weeks

  Buying committee and their positions:
  1. CIO (Sponsor): Supportive but cautious. Burned by a failed
     Oracle migration 2 years ago.
  2. VP of Digital (Champion): Strong advocate. Needs this to
     succeed for her career.
  3. CISO: Neutral. Needs to see security certifications and
     penetration test results.
  4. CFO: Skeptical. Wants hard ROI. Previous tech investments
     haven't delivered promised returns.
  5. Head of Procurement: Process-focused. Needs compliance with
     bank's vendor management policy.
  6. CTO: Leaning toward AWS (existing relationship). Concerned
     about migration risk.

  Win themes you've developed:
  Theme 1: "Banking-native cloud" — You understand financial
  services compliance (SOX, PCI, GLBA) natively, unlike generic
  cloud providers.
  Theme 2: "Proven migration" — You've migrated 15 banks with
  zero data loss and average 40% faster than competing approaches.
  Theme 3: "Total cost certainty" — Fixed-price migration with
  a money-back guarantee on timeline.

  Tasks:
  1. Write the proposal outline (section titles and key content
     for each) for a 40-page enterprise proposal. How do you weave
     the 3 win themes throughout every section?

  2. Write the executive summary page that speaks to all 6
     stakeholders while maintaining a coherent narrative. The CIO
     will read it first.

  3. Write the "Risk Mitigation" section. The CIO was burned by
     Oracle. The CFO's investments haven't delivered. The CTO
     worries about migration risk. Address all 3 directly.

  4. Your champion (VP of Digital) needs to present this to the
     board. Create the "Board Summary" — a 2-page document that
     distills the 40-page proposal into an executive decision
     document.

assertions:
  - type: llm_judge
    criteria: "Proposal outline weaves win themes — each section reinforces at least one win theme (banking-native in compliance sections, proven migration in implementation, cost certainty in pricing)"
    weight: 0.25
    description: "Win-theme-woven outline"
  - type: llm_judge
    criteria: "Executive summary addresses all 6 stakeholders — touches on security (CISO), ROI (CFO), compliance (Procurement), migration safety (CTO), and strategic value (CIO, VP Digital) in a cohesive 1-page narrative"
    weight: 0.25
    description: "All-stakeholder executive summary"
  - type: llm_judge
    criteria: "Risk mitigation addresses past trauma — directly references failed Oracle migration, undelivered ROI, and migration risk with specific countermeasures (money-back guarantee, phased approach, reference calls)"
    weight: 0.25
    description: "Trauma-aware risk mitigation"
  - type: llm_judge
    criteria: "Board summary is decision-ready — 2 pages with clear recommendation, headline ROI, risk profile, competitive comparison, and timeline, written in executive language suitable for board review"
    weight: 0.25
    description: "Decision-ready board summary"
