meta:
  id: advanced-proposal-shift
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Handle an advanced proposal week with enterprise deals, competitive situations, RFP responses, and proposal negotiations simultaneously"
  tags: [sales, simulation, advanced, multi-proposal, shift]

state: {}

trigger: |
  You're a senior AE at "PlatformOne" (enterprise platform, $100M
  ARR). You have 3 critical proposal situations this week that each
  test different advanced skills.

  Situation 1: The Competitive Rewrite
  Your $250K proposal to "GlobalRetail" (5,000 employees) is in a
  head-to-head evaluation with your biggest competitor. The prospect's
  champion shared (confidentially) that your proposal scored lower
  on "business impact" and "implementation risk" but higher on
  "technical capability" and "support." You have 5 days to submit
  a revised proposal. Changes allowed: executive summary, business
  case section, and implementation section only.

  Situation 2: The Multi-Award RFP
  "CityGov" issued an RFP for a citywide platform with 3 separate
  awards (Lot 1: Data Management $200K, Lot 2: Analytics $150K,
  Lot 3: Citizen Portal $100K). You can bid on all 3, but winning
  Lot 1 would disqualify you from Lot 3 (conflict of interest
  provision). You need to decide your bid strategy and write the
  pricing approach.

  Situation 3: The Down-Sell
  "StartupCo" loved your $80K/year proposal but their board only
  approved $40K/year. Your champion says: "We either find a way
  to make this work at $40K or I have to go with the competitor."
  You can't discount 50% — you need to restructure the proposal
  with a phased approach that starts at $40K and expands.

  Tasks:
  1. For the competitive rewrite, how do you improve "business
     impact" and "implementation risk" scores without changing
     technical sections? Write the revised executive summary and
     outline the business case improvements.

  2. For the multi-award RFP, what's your bid strategy — all 3
     lots, Lot 1+2, or just the most strategic? Justify with
     financial and strategic analysis. Write the pricing strategy.

  3. For the down-sell, restructure the $80K proposal into a $40K
     Phase 1 with a clear path to the full $80K in Year 2. Write
     the revised investment summary that shows this as a smart
     phased approach, not a concession.

  4. Across all 3 situations, what's the common skill that
     separates good proposal writers from great ones?

assertions:
  - type: llm_judge
    criteria: "Competitive rewrite targets scored weaknesses — strengthens business impact (adds ROI model, quantified outcomes) and implementation risk (adds phased approach, references, risk mitigation) without touching technical sections"
    weight: 0.25
    description: "Weakness-targeted rewrite"
  - type: llm_judge
    criteria: "RFP bid strategy is analytically justified — weighs revenue, strategic value, competitive position, and conflict provision to recommend the optimal lot combination with clear reasoning"
    weight: 0.25
    description: "Analytically justified bid strategy"
  - type: llm_judge
    criteria: "Down-sell feels like a strategy not a concession — Phase 1 delivers meaningful value at $40K, includes natural expansion triggers, and creates a compelling path to $80K that feels like the prospect's idea"
    weight: 0.25
    description: "Strategic phased restructuring"
  - type: llm_judge
    criteria: "Common skill identification is insightful — identifies the ability to adapt proposals to constraints (budget, competition, format) while maintaining value narrative as the differentiating skill"
    weight: 0.25
    description: "Insightful common skill"
