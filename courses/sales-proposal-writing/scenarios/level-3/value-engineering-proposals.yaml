meta:
  id: value-engineering-proposals
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Build sophisticated value engineering into proposals — multi-year financial models, sensitivity analysis, and CFO-ready business cases"
  tags: [sales, value-engineering, financial-model, CFO, advanced]

state: {}

trigger: |
  You're a senior AE and Value Consultant at "ProcessAI" (enterprise
  process automation, $150M ARR). You specialize in building financial
  models that help CFOs justify large investments.

  Prospect: "NationalInsurance" (insurance company, 8,000 employees,
  $3B revenue, 40 branch offices)
  Deal size: $800K/year (3-year contract = $2.4M total)
  Your champion: COO. Blocker: CFO.

  The CFO said: "I've approved 3 automation projects in the last 5
  years. None delivered the ROI that was promised. Give me a business
  case I can actually believe."

  Discovery data for the value model:

  Claims processing (their biggest cost center):
  - 200 claims processors handle 500K claims/year
  - Average processing time: 45 minutes per claim
  - Error rate: 8% (each error costs $350 to remediate)
  - Annual claims processing cost: $18M
  - Overtime during peak periods: $1.2M/year

  Policy underwriting:
  - 50 underwriters handle 100K applications/year
  - Average underwriting time: 4 hours per application
  - Manual data entry: 30% of underwriter time
  - Underwriting errors cause $2M/year in mispriced policies

  Customer service:
  - 80 agents handle 300K calls/year
  - Average handle time: 12 minutes (industry avg: 8 minutes)
  - 40% of calls are status inquiries that could be automated
  - Customer satisfaction: 3.2/5 (below industry avg of 3.8)

  Your solution's expected impact (based on similar insurance clients):
  - Claims processing time: 45 min → 15 min (67% reduction)
  - Claims errors: 8% → 2%
  - Underwriter manual entry: Eliminated (30% time freed)
  - Status inquiry calls: 40% deflected to self-service

  Tasks:
  1. Build the 5-year value model with 3 scenarios. Include:
     labor savings, error reduction, overtime elimination, and
     customer satisfaction improvement. Show Year 1 investment
     costs offsetting savings, with full value realized by Year 2.

  2. Build the sensitivity analysis. What assumptions have the
     biggest impact on ROI? If claims processing reduction is only
     50% instead of 67%, how does ROI change? Create the "what-if"
     scenarios.

  3. Write the 2-page CFO business case. Remember: this CFO has
     been burned before. Address his skepticism directly. Include:
     methodology, assumptions, conservative estimates, risk factors,
     and validation approach (how you'll prove ROI is being achieved).

  4. Design the "Value Realization Dashboard" — a post-implementation
     reporting framework that proves ROI is being delivered. What
     metrics do you track, and when do you share them?

assertions:
  - type: llm_judge
    criteria: "5-year model is detailed and defensible — includes all cost centers with clear calculations, ramp-up assumptions for Year 1, full steady-state by Year 2, and cumulative ROI across all 3 scenarios"
    weight: 0.25
    description: "Detailed defensible model"
  - type: llm_judge
    criteria: "Sensitivity analysis identifies key variables — shows how ROI changes when claims processing improvement varies, when error reduction is lower, or when implementation takes longer, with clear impact magnitude"
    weight: 0.25
    description: "Key-variable sensitivity analysis"
  - type: llm_judge
    criteria: "CFO business case addresses past failures — leads with conservative estimates, explains why this is different from past projects, includes validation milestones, and proposes a phased approach with off-ramps"
    weight: 0.25
    description: "Skepticism-addressing business case"
  - type: llm_judge
    criteria: "Value realization dashboard is measurable — includes specific metrics (processing time, error rate, call deflection), measurement frequency, reporting cadence, and accountability for results"
    weight: 0.25
    description: "Measurable realization dashboard"
