meta:
  id: proposal-coaching-review
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Coach and review proposals from junior AEs — provide structured feedback, run Red Team reviews, and build team-wide proposal quality"
  tags: [sales, coaching, review, Red-Team, quality, advanced]

state: {}

trigger: |
  You're a Senior Sales Director at "SaaSSuite" ($75M ARR) managing
  8 AEs. You're running a weekly "Proposal Review Clinic" to improve
  team proposal quality. This week, 3 AEs have submitted proposals
  for your review before they go out.

  Proposal from Alex (18 months experience):
  Prospect: "TechStartup" ($50K deal)
  Issues you notice:
  - Executive summary is 3 pages (should be 1)
  - Opens with "SaaSSuite is the leading..." (company-focused)
  - Pricing shows one number with no context ($4,200/month)
  - Solution section lists 15 features without connecting to needs
  - No social proof section at all
  - Next steps: "Let us know if you have questions"
  - Several grammatical errors in the pricing table
  Quality score: 3/10

  Proposal from Sarah (3 years experience):
  Prospect: "MidMarket Corp" ($120K deal, competitive)
  Issues you notice:
  - Executive summary is solid but doesn't mention the competitor
  - Problem section uses their data but misses the #1 pain point
    from discovery (she focused on #3 instead)
  - Pricing is well-structured but doesn't include ROI comparison
  - Implementation section is great
  - Social proof section uses a case study from a different industry
  - Strong next steps with specific date
  Quality score: 7/10

  Proposal from Jordan (6 months experience):
  Prospect: "Enterprise Inc" ($300K deal, formal RFP)
  Issues you notice:
  - Jordan clearly copied an old proposal and did find-replace
    with the new company name — missed 2 places where old name
    still appears
  - Technical section is excellent (strongest on the team)
  - But executive summary reads like a technical spec
  - No stakeholder-specific messaging (5 evaluators)
  - Pricing buried on page 42 of a 45-page doc
  - Risk section says "There are no significant risks"
  Quality score: 5/10

  Tasks:
  1. Write the structured feedback for each AE. For each: identify
     the top 3 issues, explain impact on the deal, provide specific
     improvement actions, and highlight what they did well.

  2. Design a "Red Team Review" process for proposals over $100K.
     Who participates? What questions do they answer? How long does
     it take? What's the checklist?

  3. Jordan's find-replace mistake is a quality control issue. Design
     a pre-send QA checklist that prevents this. What are the 10
     things every AE should check before clicking "send"?

  4. How do you give Alex (3/10 proposal) direct feedback without
     being demoralizing? Write the first 3 minutes of your 1:1
     coaching conversation.

assertions:
  - type: llm_judge
    criteria: "Feedback is specific and constructive — each AE gets targeted advice (Alex: shorten exec summary, add social proof; Sarah: reprioritize pain points, add ROI; Jordan: customize exec summary, reposition pricing)"
    weight: 0.25
    description: "Specific constructive feedback"
  - type: llm_judge
    criteria: "Red Team process is practical — defines participants (SE, marketing, manager), time commitment (1-2 hours), specific review questions, and a scoring rubric that catches strategic and tactical issues"
    weight: 0.25
    description: "Practical Red Team process"
  - type: llm_judge
    criteria: "QA checklist prevents real errors — includes company name verification, pricing accuracy, date consistency, link testing, formatting, grammar, and prospect-specific content verification"
    weight: 0.25
    description: "Error-preventing QA checklist"
  - type: llm_judge
    criteria: "Coaching approach builds confidence — starts with genuine praise (Alex showed enthusiasm and met the deadline), asks Alex for self-assessment first, then focuses on the highest-impact improvements"
    weight: 0.25
    description: "Confidence-building coaching"
