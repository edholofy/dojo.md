meta:
  id: proposal-negotiation-tactics
  level: 3
  course: sales-proposal-writing
  type: output
  description: "Handle proposal revisions and negotiations — respond to discount requests, scope changes, and term modifications while protecting deal value"
  tags: [sales, negotiation, pricing, discount, contract, advanced]

state: {}

trigger: |
  You're a senior AE at "SecurePlatform" (security SaaS, $80M ARR).
  You sent a $180K/year proposal to "TechCorp" (technology company,
  1,500 employees). The procurement director comes back with a list
  of demands.

  Original proposal:
  - Platform license: $15K/month ($180K/year)
  - Implementation: $40K (one-time)
  - Training: $15K (one-time)
  - 3-year term with annual billing
  - Total Year 1: $235K, Year 2-3: $180K/year
  - Total 3-year value: $595K

  Procurement's demands:
  1. "We need 25% off the platform license" ($135K/year instead of
     $180K/year)
  2. "Implementation should be included free" (eliminate the $40K)
  3. "We want a 1-year term, not 3-year" (reduce commitment)
  4. "Payment terms: Net 90 instead of Net 30"
  5. "We need a 99.99% uptime SLA with penalties" (your standard
     is 99.9%)
  6. "Add a 30-day termination clause" (cancel anytime with 30 days
     notice)

  Your negotiation guardrails (from your VP of Sales):
  - Maximum discount: 15% on license (non-negotiable above that)
  - Implementation: Can reduce by 25% max, not free
  - Minimum term: 2 years for this deal size
  - Payment terms: Net 60 max
  - SLA: 99.95% max with standard credit structure
  - Termination: 90-day minimum with 6-month initial commitment

  Tasks:
  1. Write the response to each of the 6 demands. For each, decide:
     accept, counter-offer, or decline. Explain your reasoning and
     write the specific language for the revised proposal.

  2. Procurement is asking for everything. They likely don't expect
     to get it all. What's your negotiation strategy? Which items
     do you give on to win the ones that matter most?

  3. Write the revised proposal pricing section that incorporates
     your counter-offers. Present it as a "value-added revision"
     rather than a concession.

  4. The champion (CTO) texts you: "Procurement is being difficult.
     Can you just give them what they want?" How do you handle this
     diplomatically while protecting deal value?

assertions:
  - type: llm_judge
    criteria: "Demand responses are strategic — accepts or counters each demand within guardrails, with clear reasoning about which concessions protect value and which can be traded"
    weight: 0.25
    description: "Strategic demand responses"
  - type: llm_judge
    criteria: "Negotiation strategy prioritizes correctly — identifies the highest-value items to protect (pricing, term length) and lower-value items to concede on (payment terms, partial implementation discount)"
    weight: 0.25
    description: "Priority-based negotiation"
  - type: llm_judge
    criteria: "Revised pricing feels collaborative — presents counter-offers as value improvements rather than begrudging concessions, potentially bundling concessions to create perceived generosity"
    weight: 0.25
    description: "Collaborative revision framing"
  - type: llm_judge
    criteria: "Champion response is diplomatically firm — explains why meeting all demands hurts the partnership long-term, shares what you CAN do, and enlists the CTO's help in explaining value to procurement"
    weight: 0.25
    description: "Diplomatically firm champion response"
