meta:
  id: mega-deal-proposals
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Write proposals for mega-deals ($1M+) — manage executive engagement, multi-year commitments, custom terms, and board-level presentations"
  tags: [sales, mega-deal, enterprise, executive, board, expert]

state: {}

trigger: |
  You're a Strategic Account Executive at "EnterpriseCloud" ($500M
  ARR). You're leading the proposal for your company's largest deal
  ever: "GlobalBank" ($5M annual contract, 5-year term = $25M TCV).

  Deal context:
  - GlobalBank: Top 20 US bank, 60,000 employees, $50B in assets
  - 18 months of relationship building and discovery
  - 14 stakeholders in the buying committee
  - Competing against IBM and Oracle (both incumbent in other areas)
  - Final presentation to GlobalBank's Executive Committee (5 C-suite
    executives) in 6 weeks
  - Your CEO will co-present with you

  Proposal requirements:
  - Executive proposal document (30 pages)
  - Technical architecture document (50 pages, written by SE team)
  - Financial business case (15 pages, written with Value Engineering)
  - Legal/commercial terms (negotiated with GlobalBank's legal)
  - Implementation plan (20 pages, written by Professional Services)
  - Reference package (5 reference calls arranged)

  Special considerations:
  - GlobalBank's procurement requires a "Total Cost of Ownership"
    analysis over 10 years (not just your 5-year contract)
  - Their legal team has 47 redlines on your standard MSA
  - The CIO (your champion) is retiring in 8 months — you need to
    build relationships beyond her
  - IBM is offering a "strategic partnership" with dedicated staff
  - Oracle is offering 40% below your price (but lower capability)

  Tasks:
  1. Design the proposal package architecture. How do the 6
     documents work together? What's the reading order? How do you
     ensure consistency across documents written by different teams?

  2. Write the executive summary for the 30-page executive proposal.
     This will be read by 5 C-suite executives who each have different
     priorities. The CIO is supportive, the CFO is price-sensitive,
     the CTO favors IBM, the Chief Risk Officer wants guarantees,
     and the CEO cares about competitive advantage.

  3. How do you position against IBM's "strategic partnership" offer
     and Oracle's 40% lower price? Write the competitive positioning
     section that addresses both without naming either competitor.

  4. Design the Executive Committee presentation (60 minutes). Your
     CEO will deliver 20 minutes, you deliver 25 minutes, and 15
     minutes for Q&A. Write the presentation outline and talking
     points for both presenters.

assertions:
  - type: llm_judge
    criteria: "Proposal package is architecturally coherent — defines how 6 documents cross-reference, establishes a reading order, assigns consistency reviewers, and ensures all documents tell the same story"
    weight: 0.25
    description: "Architecturally coherent package"
  - type: llm_judge
    criteria: "Executive summary addresses all 5 C-suite perspectives — weaves competitive advantage (CEO), cost justification (CFO), technical credibility (CTO), risk mitigation (CRO), and strategic vision (CIO) into a unified narrative"
    weight: 0.25
    description: "Five-perspective executive summary"
  - type: llm_judge
    criteria: "Competitive positioning addresses both threats — counters 'strategic partnership' with depth of platform capability and counters low price with TCO analysis and risk of capability gaps, without naming competitors"
    weight: 0.25
    description: "Dual-threat competitive positioning"
  - type: llm_judge
    criteria: "Executive presentation leverages both speakers — CEO delivers vision and peer-to-peer credibility, AE delivers specifics and business case, with Q&A preparation for likely challenges from each C-suite member"
    weight: 0.25
    description: "Dual-speaker presentation design"
