meta:
  id: global-proposal-standardization
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Standardize proposals across a global sales organization — manage localization, cultural adaptation, compliance variations, and quality consistency"
  tags: [sales, global, standardization, localization, expert]

state: {}

trigger: |
  You're the VP of Global Sales Operations at "WorldSaaS" (enterprise
  platform, $400M ARR, selling in 25 countries). Your CEO says:
  "A customer in Tokyo gets a different quality proposal than one in
  New York. Fix it."

  Current state:
  - 200 AEs across 5 regions: Americas (80), EMEA (60), APAC (40),
    LATAM (15), MEA (5)
  - Each region has its own proposal templates, pricing, and approval
    process
  - Win rates vary wildly: Americas 28%, EMEA 22%, APAC 18%, LATAM
    15%, MEA 12%
  - No centralized content library
  - Proposals are in 8 languages
  - Legal terms differ by country (GDPR in EU, PIPL in China, LGPD
    in Brazil, POPIA in South Africa)
  - Currency, tax, and pricing structures are region-specific
  - Cultural expectations differ (Japanese proposals are more formal
    and longer; German proposals require more technical depth;
    Brazilian proposals are more relationship-focused)

  Specific challenges:
  1. EMEA AEs translate American proposals poorly — cultural
     references don't land
  2. APAC proposals lack the technical depth expected in Japan/Korea
  3. LATAM proposals don't meet the formal procurement standards of
     Brazilian government deals
  4. A global customer (operates in 15 countries) received 3
     different proposals from 3 of your regions — all different

  Tasks:
  1. Design the global proposal framework that balances
     standardization with localization. What's global (brand,
     structure, quality standards) vs. regional (language, culture,
     compliance, pricing)?

  2. Create the "Global Proposal Quality Standard" — the minimum
     requirements every proposal must meet regardless of region.
     Include: content standards, design standards, approval
     standards, and compliance standards.

  3. Solve the "one global customer, multiple regions" problem.
     Design the process for proposals to global accounts that
     ensures consistency across regions while allowing local
     adaptation.

  4. Build the cultural adaptation guide for 3 regions: Japan
     (formal, detail-oriented, consensus-driven), Germany (direct,
     technical, privacy-conscious), and Brazil (relationship-first,
     expressive, hierarchy-aware). What changes in each proposal?

assertions:
  - type: llm_judge
    criteria: "Global framework balances standardization and localization — defines global elements (brand identity, section structure, quality gates) and regional elements (language, cultural tone, legal terms, pricing) with clear governance"
    weight: 0.25
    description: "Balanced global framework"
  - type: llm_judge
    criteria: "Quality standard is universally applicable — defines minimum requirements that work across all 5 regions without being culturally biased toward American proposal norms"
    weight: 0.25
    description: "Universally applicable standard"
  - type: llm_judge
    criteria: "Global account process prevents inconsistency — includes account-level proposal coordination, single source of truth for pricing/terms, and a process for regional AEs to collaborate on cross-border deals"
    weight: 0.25
    description: "Consistency-ensuring process"
  - type: llm_judge
    criteria: "Cultural adaptations are specific and respectful — Japan section addresses formality and consensus, Germany addresses technical depth and data privacy, Brazil addresses relationship emphasis, all without stereotyping"
    weight: 0.25
    description: "Respectful cultural adaptations"
