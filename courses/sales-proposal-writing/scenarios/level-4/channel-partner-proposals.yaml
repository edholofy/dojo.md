meta:
  id: channel-partner-proposals
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Create proposals for channel and partner-led deals — manage co-selling dynamics, white-labeling, partner margins, and joint value propositions"
  tags: [sales, channel, partner, co-selling, white-label, expert]

state: {}

trigger: |
  You're the Director of Channel Sales at "IntegratePro" ($200M ARR,
  cloud integration platform). 40% of your revenue comes through
  channel partners (system integrators, consultants, resellers). You
  have 3 critical partner proposals this quarter:

  Deal 1: Accenture co-sell to "AutoCorp" ($1.8M)
  - Accenture is leading the engagement (implementation + your software)
  - Total deal: $6M (your software $1.8M + Accenture services $4.2M)
  - Accenture wants to present a unified proposal under their brand
  - Your proposal needs to be a "module" within their larger proposal
  - Challenge: Accenture's proposal template is rigid, your value
    proposition gets buried
  - AutoCorp's VP of IT trusts Accenture but doesn't know your brand

  Deal 2: Regional reseller "TechPartners" selling to "CityGov" ($400K)
  - TechPartners is a platinum reseller with 30% margin
  - They want a white-labeled proposal (your product, their brand)
  - CityGov requires government procurement format (SAM registration,
    small business compliance, prevailing wage certification)
  - Challenge: TechPartners doesn't understand your technical depth,
    their proposal quality is inconsistent
  - You can't contact CityGov directly per your partner agreement

  Deal 3: Technology alliance with Salesforce for "MegaRetail" ($2.5M)
  - Joint solution: Salesforce CRM + your integration platform
  - Both companies presenting together to MegaRetail's C-suite
  - Salesforce has a $4M deal riding on this (your tech is critical)
  - Challenge: Salesforce's AE wants to lead the proposal and minimize
    your visibility to protect their relationship
  - MegaRetail's CTO specifically requested your product by name

  Tasks:
  1. For Deal 1 (Accenture co-sell): Write the proposal "module" that
     fits within Accenture's larger proposal but still communicates
     your differentiated value. How do you ensure your value isn't
     buried while respecting Accenture's lead position?

  2. For Deal 2 (white-label): Create the proposal quality framework
     for partner-delivered proposals. What do you provide TechPartners
     (templates, content, review process) to ensure CityGov gets a
     high-quality proposal while maintaining the white-label agreement?

  3. For Deal 3 (Salesforce alliance): Design the joint proposal
     structure. How do you balance Salesforce's desire to lead with
     MegaRetail's interest in your specific capabilities? Write the
     section that positions the joint solution.

  4. Create the "Partner Proposal Playbook" that covers all 3 models
     (co-sell, white-label, alliance). Define: who writes what, who
     reviews, branding rules, pricing presentation, and escalation
     paths when partner interests conflict with yours.

assertions:
  - type: llm_judge
    criteria: "Co-sell module is self-contained but compelling — delivers differentiated value within Accenture's structure, includes standalone proof points, and makes IntegratePro memorable without undermining Accenture's lead position"
    weight: 0.25
    description: "Compelling co-sell module"
  - type: llm_judge
    criteria: "White-label framework ensures quality — provides templates, content blocks, and review checkpoints that enable TechPartners to deliver quality proposals without breaking the white-label boundary"
    weight: 0.25
    description: "Quality-ensuring white-label framework"
  - type: llm_judge
    criteria: "Joint proposal balances both parties — acknowledges Salesforce's relationship leadership while ensuring IntegratePro's capabilities get appropriate visibility given MegaRetail's specific request"
    weight: 0.25
    description: "Balanced joint proposal"
  - type: llm_judge
    criteria: "Partner playbook covers all 3 models — defines clear roles, branding guidelines, pricing rules, and conflict resolution for co-sell, white-label, and alliance proposal types"
    weight: 0.25
    description: "Comprehensive partner playbook"
