meta:
  id: proposal-win-loss-analysis
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Conduct systematic proposal win/loss analysis — identify patterns in won and lost proposals, quantify improvement opportunities, and drive organizational change"
  tags: [sales, win-loss, analysis, data-driven, improvement, expert]

state: {}

trigger: |
  You're the Director of Sales Effectiveness at "PlatformPro" ($150M
  ARR, 100 AEs). The CRO wants you to conduct a comprehensive
  proposal win/loss analysis and present findings to the leadership
  team.

  Data available (last 4 quarters, 1,200 proposals):

  Win rate by proposal attributes:
  - Proposals with ROI model: 38% win rate (vs. 18% without)
  - Proposals with 3+ case studies: 34% (vs. 21% with 0-1)
  - Proposals sent within 5 days of discovery: 35% (vs. 19% after
    10+ days)
  - Proposals with executive summary under 1 page: 32% (vs. 22%
    over 2 pages)
  - Proposals with tiered pricing: 30% (vs. 24% single price)
  - Proposals reviewed by Red Team: 41% (vs. 23% no review)
  - Proposals with competitive differentiation: 36% (vs. 20% none)
  - Proposals with implementation timeline: 29% (vs. 19% without)

  Win rate by proposal quality score (AI-scored):
  - Score 8-10: 42% win rate
  - Score 6-7: 28% win rate
  - Score 4-5: 18% win rate
  - Score 1-3: 8% win rate

  Loss reasons from prospect surveys (400 responses):
  - "Didn't understand our needs" — 32%
  - "Price too high" — 25%
  - "Competitor was more compelling" — 22%
  - "Too complex/long" — 12%
  - "No decision made" — 9%

  AE performance distribution:
  - Top 10% of AEs: 44% proposal win rate, avg quality score 8.2
  - Middle 80%: 24% proposal win rate, avg quality score 5.6
  - Bottom 10%: 9% proposal win rate, avg quality score 3.1

  Tasks:
  1. Conduct the analysis. What are the 5 most impactful findings?
     Correlate proposal attributes with win rates. What single
     change would have the biggest impact on overall win rate?

  2. The #1 loss reason is "Didn't understand our needs" — but the
     proposals DID contain discovery data. Dig deeper. Why are
     proposals failing to demonstrate understanding even when the
     data exists? Design the investigation.

  3. Present the findings to the CRO in a 5-slide deck format.
     Include: the headline, supporting data, root causes, 5 ranked
     recommendations, and expected ROI of implementing them.

  4. Design the "Proposal Excellence Program" — a 6-month initiative
     to close the gap between top 10% and middle 80%. What
     interventions would you implement, and in what order?

assertions:
  - type: llm_judge
    criteria: "Analysis identifies highest-impact findings — correctly identifies Red Team review (41% vs 23%), ROI inclusion (38% vs 18%), and proposal speed (35% vs 19%) as the biggest leverage points"
    weight: 0.25
    description: "High-impact finding identification"
  - type: llm_judge
    criteria: "Needs-understanding investigation goes deeper — hypothesizes that having data isn't enough (it must be woven into narrative, reflected in solution design, and framed as their story), and designs a study to verify"
    weight: 0.25
    description: "Deep understanding investigation"
  - type: llm_judge
    criteria: "CRO presentation is executive-ready — leads with financial impact, presents 5 ranked recommendations with expected ROI, and concludes with a clear ask for investment and timeline"
    weight: 0.25
    description: "Executive-ready presentation"
  - type: llm_judge
    criteria: "Excellence program targets the middle 80% — includes specific interventions (templates, coaching, Red Team reviews, quality scoring) phased over 6 months with measurable milestones"
    weight: 0.25
    description: "Middle-80% excellence program"
