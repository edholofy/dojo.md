meta:
  id: proposal-team-management
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Lead cross-functional proposal teams — coordinate writers, designers, subject matter experts, legal, and executives to deliver complex proposals on deadline"
  tags: [sales, team-management, coordination, deadline, expert]

state: {}

trigger: |
  You're the Director of Strategic Proposals at "CloudForce" ($320M
  ARR). You lead a team responsible for all proposals over $500K TCV.
  A critical situation has emerged:

  Active proposal portfolio (all due within 3 weeks):
  1. "HealthFirst" — $2.1M, healthcare, due in 8 business days
     - Status: Discovery complete, solution design 60% done
     - Challenge: Requires HIPAA compliance section (legal backlogged)
     - Team: 1 AE, 1 SE, 1 writer (your best), legal (shared)

  2. "RetailMax" — $1.4M, retail, due in 12 business days
     - Status: RFP response, 200 questions, 40% answered
     - Challenge: Competing against incumbent (Salesforce)
     - Team: 1 AE, 2 SEs, 1 writer (junior), no legal needed

  3. "GovTech" — $3.8M, government, due in 15 business days
     - Status: Just received the RFP, haven't started
     - Challenge: Government procurement requirements, security
       clearances needed for some content, FedRAMP certification proof
     - Team: 1 AE, 1 SE (government specialist), no writer assigned

  Resource constraints:
  - 3 proposal writers total (1 senior, 1 mid, 1 junior)
  - 2 designers (both currently assigned to marketing campaign)
  - Legal team has a 5-day SLA but you need HealthFirst in 3 days
  - Your CEO wants to review all proposals over $2M before submission
  - The senior SE for GovTech is on vacation for 5 more days

  Tasks:
  1. Create the resource allocation plan. How do you staff all 3
     proposals given the constraints? Where do you make trade-offs?
     What risks do you accept and how do you mitigate them?

  2. Design the project timeline for all 3 proposals with
     dependencies mapped. What's the critical path for each? Where
     are the bottleneck risks and what's your contingency plan?

  3. The HealthFirst AE just told you the prospect moved the deadline
     up by 3 days (now due in 5 business days). Write the crisis
     response plan — what gets cut, what gets fast-tracked, and how
     do you communicate the change to the team?

  4. Create the "Proposal War Room" operating model — daily standup
     agenda, escalation paths, quality gates, and decision-making
     framework for when proposals compete for the same resources.

assertions:
  - type: llm_judge
    criteria: "Resource allocation makes defensible trade-offs — assigns strongest writer to highest-value or most-complex deal, addresses legal bottleneck creatively, and accepts calculated risks with mitigation plans"
    weight: 0.25
    description: "Defensible resource allocation"
  - type: llm_judge
    criteria: "Project timeline identifies critical paths — maps dependencies across all 3 proposals, identifies shared-resource conflicts, and includes buffer time and contingency triggers"
    weight: 0.25
    description: "Critical path timeline"
  - type: llm_judge
    criteria: "Crisis response is decisive — makes clear cuts to HealthFirst scope, fast-tracks essentials, communicates transparently to team, and doesn't sacrifice quality on the highest-value sections"
    weight: 0.25
    description: "Decisive crisis response"
  - type: llm_judge
    criteria: "War room model enables coordination — includes structured standups, clear escalation paths, resource-conflict resolution framework, and quality gates that prevent shortcuts under pressure"
    weight: 0.25
    description: "Coordination war room model"
