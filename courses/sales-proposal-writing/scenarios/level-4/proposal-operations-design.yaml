meta:
  id: proposal-operations-design
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Design a proposal operations function — build content libraries, standardize workflows, implement tools, and measure proposal effectiveness at scale"
  tags: [sales, operations, process-design, content-library, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ScaleForce" (enterprise
  SaaS, $250M ARR, 150 AEs). The CRO asks you to build a Proposal
  Operations function from scratch. Currently, proposals are entirely
  ad hoc — every AE creates proposals independently.

  Current problems:
  - 150 AEs × 5 proposals/month × 8 hours each = 6,000 hours/month
    on proposals (37.5 FTE equivalent)
  - Win rate on proposals: 24% (declining from 30% two years ago)
  - Average time from discovery to proposal sent: 12 days (should
    be 3-5 days)
  - No content library — every proposal starts from scratch
  - No approval workflow — $1M proposals go out with typos
  - No analytics — no one knows which proposals win or why
  - Brand inconsistency — some proposals look amateur
  - Legal review bottleneck — legal team reviews 40% of proposals,
    takes 5 days average

  Budget: $500K/year for the Proposal Operations function

  Available tools:
  - CRM: Salesforce
  - Proposal software: Evaluating PandaDoc vs. Proposify
  - Content management: None (considering Highspot or Seismic)
  - Analytics: Gong for calls (proposals not tracked)

  Tasks:
  1. Design the Proposal Operations org structure. What roles do
     you hire? How many people? What does each role do? How does
     ProOps interact with Sales, Marketing, Legal, and Product?

  2. Build the content library architecture. What categories of
     content do you need (industry, competitor, pricing, compliance)?
     How is content maintained and updated? Who owns each category?

  3. Design the proposal workflow from "discovery complete" to
     "proposal sent." Map each step, who's responsible, what tools
     are used, and what the SLA is for each step. Include approval
     gates based on deal size.

  4. Define the 8 KPIs for Proposal Operations. How do you measure
     proposal velocity, quality, win rate correlation, and content
     effectiveness? Create the dashboard layout.

assertions:
  - type: llm_judge
    criteria: "Org structure is right-sized for the function — proposes appropriate roles (Proposal Manager, Content Strategist, Designer) with headcount justified against the $500K budget and 150-AE workload"
    weight: 0.25
    description: "Right-sized org structure"
  - type: llm_judge
    criteria: "Content library is strategically organized — categorizes by industry, competitor, deal stage, and content type, with clear ownership, update cadence, and governance to prevent stale content"
    weight: 0.25
    description: "Strategically organized library"
  - type: llm_judge
    criteria: "Workflow reduces proposal time — maps a clear path from discovery to sent with SLAs for each step, approval gates by deal size, and automation that reduces the 12-day average significantly"
    weight: 0.25
    description: "Time-reducing workflow"
  - type: llm_judge
    criteria: "KPIs are measurable and actionable — includes both leading (proposal velocity, content reuse rate) and lagging (win rate, deal size) indicators with clear dashboard design"
    weight: 0.25
    description: "Measurable actionable KPIs"
