meta:
  id: expert-proposal-shift
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Navigate a complex proposal situation combining organizational transformation, competitive crisis, and executive stakeholder management in a high-stakes multi-million dollar deal"
  tags: [sales, shift-simulation, expert, transformation, crisis, executive]

state: {}

trigger: |
  You're the Chief Revenue Officer at "VelocityCloud" ($350M ARR,
  enterprise data platform). Three crises have converged:

  Crisis 1: Your largest deal ever is at risk
  - "NationalInsurance" — $8M ACV, 5-year term = $40M TCV
  - You're in final two with AWS (their existing cloud provider)
  - NationalInsurance's procurement just leaked that AWS offered a
    $15M "strategic commitment credit" if they consolidate on AWS
  - Your champion (CIO) called you directly: "I want your solution
    but my board is meeting in 2 weeks and the AWS economics are
    hard to argue against. I need ammunition."
  - The board presentation is not yours to give — the CIO will
    present your case internally. You need to arm her.

  Crisis 2: Your proposal organization is failing
  - Win rate has dropped from 32% to 21% over 3 quarters
  - Average proposal quality score (peer-reviewed): 4.8/10
  - Top performers are leaving because they get no support
  - The Proposal Operations team you hired 6 months ago has
    produced templates that AEs refuse to use ("too rigid, too
    generic")
  - Marketing and Sales are blaming each other for bad proposals
  - The CEO has given you 90 days to show improvement or he's
    restructuring

  Crisis 3: A compliance failure in a recent proposal
  - An AE sent a proposal to a healthcare prospect with unapproved
    HIPAA compliance language that overstated your certifications
  - The prospect's legal team caught it and escalated to their CISO
  - Your VP of Sales says "it was just marketing language, not a
    legal claim" but your General Counsel disagrees
  - This could become a PR issue if not handled immediately

  Tasks:
  1. NationalInsurance: Create the "Board Ammunition Package" for
     your CIO champion. This isn't a traditional proposal — it's
     a set of materials she can use to present your case to her
     board against AWS's $15M credit offer. Include: the counter-
     narrative, the TCO comparison, the risk framing, and the
     "what happens in year 3 when credits expire" analysis.

  2. Proposal Organization: Design the 90-day turnaround plan for
     your proposal function. Diagnose why the current approach
     failed (templates without buy-in), and design an approach
     that gets AEs to actually adopt better practices. Include
     week-by-week milestones the CEO can track.

  3. Compliance Crisis: Write the response plan. What do you say
     to the healthcare prospect? What internal changes prevent
     this from happening again? How do you handle the AE and
     the VP of Sales who are minimizing the issue?

  4. Tie it all together: Write the memo to your CEO explaining
     how these three issues are connected (they all stem from
     the same root cause), and present your integrated plan to
     fix the systemic problem, not just the symptoms.

assertions:
  - type: llm_judge
    criteria: "Board ammunition is champion-enabling — provides the CIO with a counter-narrative that reframes AWS credits as short-term vs. long-term value, includes TCO analysis showing credit expiration risk, and gives her talk tracks for boardroom objections"
    weight: 0.25
    description: "Champion-enabling board package"
  - type: llm_judge
    criteria: "90-day plan diagnoses root cause — identifies that templates-without-buy-in failed because AEs weren't involved in creation, and designs a collaborative approach with measurable weekly milestones"
    weight: 0.25
    description: "Root-cause turnaround plan"
  - type: llm_judge
    criteria: "Compliance response is proportionate — takes the issue seriously (not dismissive like the VP), responds transparently to the prospect, implements controls (legal review gates, approved language library), and addresses the cultural issue of compliance minimization"
    weight: 0.25
    description: "Proportionate compliance response"
  - type: llm_judge
    criteria: "CEO memo connects all three crises — identifies the systemic root cause (lack of proposal governance, quality standards, and accountability) and presents an integrated solution rather than three separate fixes"
    weight: 0.25
    description: "Integrated systemic analysis"
