meta:
  id: proposal-content-strategy
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Design and implement a proposal content strategy — build reusable content blocks, case study libraries, competitive intelligence databases, and value proposition frameworks"
  tags: [sales, content-strategy, library, reuse, scalability, expert]

state: {}

trigger: |
  You're the VP of Sales Enablement at "GrowthStack" ($280M ARR,
  180 AEs across 6 industry verticals). Your CEO is frustrated:
  "We sell to 6 industries but our proposals all sound generic. Our
  competitors are winning with industry-specific stories."

  Current state audit:
  - 180 AEs produce ~720 proposals/month
  - Content reuse rate: 12% (88% written from scratch each time)
  - Only 8 case studies documented (from 2,000+ customers)
  - No competitive battlecards for proposals (exist for calls only)
  - Value propositions are inconsistent across verticals
  - Average proposal creation: 9 hours (industry benchmark: 4 hours)

  Industry verticals and their unique needs:
  1. Financial Services (30% of revenue): Compliance-heavy, ROI-driven,
     risk-averse buyers, long procurement cycles
  2. Healthcare (25%): HIPAA, patient outcomes, interoperability,
     clinical workflows
  3. Technology (20%): Technical depth, API documentation, scalability
     proof, developer experience
  4. Manufacturing (10%): Supply chain, operational efficiency, IoT
     integration, shop floor examples
  5. Retail (10%): Omnichannel, customer experience, seasonal demand,
     POS integration
  6. Government (5%): FedRAMP, procurement compliance, small business
     subcontracting, security clearances

  Tasks:
  1. Design the modular content architecture. What content blocks do
     you need? How do they combine for different deal types, sizes,
     and industries? Create the taxonomy and the rules for assembly.

  2. Build the case study development program. You have 2,000+
     customers but only 8 case studies. Design the system to
     identify, capture, write, and maintain case studies at scale.
     How many do you need per vertical? What format works in
     proposals vs. presentations vs. web?

  3. Create the competitive intelligence integration plan. How do
     you get battlecard content into proposals? Design the workflow
     from competitive intel team → proposal content → AE usage.
     Include freshness guarantees (competitive data decays fast).

  4. Write the industry-specific value proposition framework for
     Financial Services and Healthcare. For each: the master value
     prop, 3 supporting pillars, proof points for each pillar, and
     the "why us over alternatives" positioning.

assertions:
  - type: llm_judge
    criteria: "Modular architecture enables assembly — defines content blocks (intro, problem, solution, proof, pricing, legal) that can be combined with industry-specific variants, with clear rules for which blocks are required vs. optional"
    weight: 0.25
    description: "Assembly-enabling architecture"
  - type: llm_judge
    criteria: "Case study program is scalable — includes customer identification criteria, capture templates, writer resources, approval workflow, and maintenance cadence, targeting specific numbers per vertical"
    weight: 0.25
    description: "Scalable case study program"
  - type: llm_judge
    criteria: "Competitive intelligence workflow is practical — connects existing battlecard content to proposal usage with specific triggers, update cadence, and AE adoption mechanisms"
    weight: 0.25
    description: "Practical competitive intel workflow"
  - type: llm_judge
    criteria: "Value propositions are industry-authentic — Financial Services framework emphasizes compliance, risk, and ROI while Healthcare framework emphasizes patient outcomes, interoperability, and clinical workflows, each with specific proof points"
    weight: 0.25
    description: "Industry-authentic value propositions"
