meta:
  id: ai-proposal-transformation
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Leverage AI to transform proposal creation — design AI-powered workflows for drafting, personalization, quality scoring, and competitive intelligence"
  tags: [sales, AI, automation, proposal-technology, expert]

state: {}

trigger: |
  You're the Head of Sales Enablement at "FutureSaaS" ($180M ARR,
  120 AEs). The CEO just approved a $300K investment in AI-powered
  proposal tools. You need to design the AI proposal system.

  Current state:
  - Average 7 hours per proposal (research, writing, design, review)
  - 120 AEs × 4 proposals/month = 480 proposals/month
  - Content reuse rate: 15% (most proposals written from scratch)
  - Personalization level varies wildly by AE experience
  - Quality score (peer-reviewed): 5.8/10 average
  - Proposal win rate: 26%

  AI capabilities available:
  1. AI Draft Generation: Feed discovery notes + CRM data → generates
     first draft of executive summary, problem statement, and
     solution section
  2. AI Personalization: Analyzes prospect's website, 10-K filing,
     LinkedIn, and news to auto-customize industry language and
     references
  3. AI Quality Scoring: Scans proposals for: buyer-centric language
     ratio, data specificity, competitive positioning, section
     completeness, and readability score
  4. AI Competitive Intelligence: When prospect mentions a competitor,
     auto-generates differentiation content and win themes
  5. AI Pricing Optimization: Based on deal attributes (size,
     industry, competition), recommends optimal pricing structure

  Team concerns:
  - "AI will make all proposals sound the same"
  - "I don't trust AI with technical content"
  - "What about hallucinations in customer data?"
  - "If AI writes proposals, what do I do?"

  Tasks:
  1. Design the AI-augmented proposal workflow. At each stage
     (research, draft, customize, review, send), what does AI do
     vs. what does the human do? Create a clear human-AI
     collaboration model.

  2. Build the AI quality scoring rubric. What 10 dimensions does
     the AI evaluate? What score constitutes "ready to send" vs.
     "needs revision"? How do you calibrate the AI against human
     reviewers?

  3. Address each team concern with honest, practical answers.
     Design the "AI Guidelines" document that sets boundaries on
     AI use in proposals.

  4. Model the ROI. If AI reduces proposal time from 7 hours to
     3 hours and improves quality scores from 5.8 to 7.5, what's
     the impact on win rate, revenue, and AE productivity?

assertions:
  - type: llm_judge
    criteria: "Human-AI workflow is balanced — AI handles research aggregation, first drafts, and quality checking while humans provide strategic thinking, personalization judgment, and final approval"
    weight: 0.25
    description: "Balanced human-AI workflow"
  - type: llm_judge
    criteria: "Quality scoring rubric is comprehensive — covers buyer-centricity, data specificity, section completeness, readability, competitive positioning, pricing framing, and more with clear thresholds"
    weight: 0.25
    description: "Comprehensive scoring rubric"
  - type: llm_judge
    criteria: "Concern responses are honest — doesn't dismiss worries but addresses them (hallucination = human review required, sameness = AI templates are starting points, roles = AEs become editors/strategists)"
    weight: 0.25
    description: "Honest concern responses"
  - type: llm_judge
    criteria: "ROI model quantifies impact — calculates time savings (480 proposals × 4 hrs saved), estimates win rate improvement from quality gains, and shows total revenue impact with clear assumptions"
    weight: 0.25
    description: "Quantified impact model"
