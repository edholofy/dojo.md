meta:
  id: proposal-risk-management
  level: 4
  course: sales-proposal-writing
  type: output
  description: "Manage proposal risk — navigate legal redlines, compliance requirements, indemnification clauses, and liability limitations in high-stakes enterprise proposals"
  tags: [sales, risk, legal, compliance, enterprise, expert]

state: {}

trigger: |
  You're the Head of Deal Strategy at "SecureCloud" ($220M ARR,
  cybersecurity platform). You're managing the proposal for
  "MegaFinance" — a $4.2M deal with a financial services firm that
  has the most demanding legal and compliance requirements you've
  ever encountered.

  Their procurement team has sent back your standard proposal with
  these issues:

  Legal redlines (27 total, top 10 critical):
  1. Unlimited liability for data breaches (your standard: capped
     at 12 months of contract value)
  2. Right to audit your security practices with 24-hour notice
     (your standard: 30 days notice, once per year)
  3. Data residency requirement: all data must stay in US-East
     region (you currently use multi-region)
  4. Breach notification within 4 hours (your standard: 72 hours)
  5. Guaranteed 99.999% uptime (your standard: 99.95%)
  6. Right to terminate for convenience with 30-day notice and full
     refund of prepaid amounts (your standard: no refund)
  7. Most favored customer pricing clause
  8. Requirement to carry $50M cyber insurance (your current: $10M)
  9. Indemnification for any third-party claims arising from your
     service (unlimited, uncapped)
  10. Source code escrow with release triggers including "material
      change in financial condition"

  Internal constraints:
  - Your legal team says items 1, 7, and 9 are "absolute no-go"
  - Your CFO says item 6 would create a revenue recognition problem
  - Your CTO says item 5 is physically impossible (99.999% = 5.26
    minutes downtime/year)
  - Your insurance broker says item 8 would cost $800K/year
  - Items 2, 3, 4, and 10 are negotiable with modifications

  Tasks:
  1. Categorize all 10 items into: accept, accept with modification,
     or reject with alternative. For each modification or rejection,
     propose specific counter-language that protects your company
     while addressing the customer's underlying concern.

  2. Write the "Proposal Risk Memo" for your CEO — a 2-page document
     explaining the deal economics, the risk profile, what you're
     conceding, what you're holding firm on, and why the deal is
     still worth pursuing (or not).

  3. Design the negotiation sequence. You can't present all 27
     redlines at once. What's your strategy for the negotiation
     meetings? What do you concede early to build goodwill? What
     do you hold until you understand their priorities?

  4. MegaFinance's CISO says: "If you can't accept unlimited
     liability for data breaches, we can't do business." Write the
     response that keeps the deal alive while not accepting unlimited
     liability. What creative alternatives can you propose?

assertions:
  - type: llm_judge
    criteria: "Categorization addresses underlying concerns — doesn't just reject items but proposes alternatives that solve the customer's actual need (e.g., breach liability cap tied to insurance + incident response SLA instead of unlimited liability)"
    weight: 0.25
    description: "Concern-addressing categorization"
  - type: llm_judge
    criteria: "Risk memo is executive-ready — quantifies financial exposure for each concession, presents clear recommendation with rationale, and frames risk in terms the CEO can act on"
    weight: 0.25
    description: "Executive-ready risk memo"
  - type: llm_judge
    criteria: "Negotiation sequence is strategic — leads with easy concessions, identifies items to trade against each other, and sequences contentious items after building rapport and understanding priorities"
    weight: 0.25
    description: "Strategic negotiation sequence"
  - type: llm_judge
    criteria: "CISO response is creative and credible — proposes alternatives to unlimited liability (enhanced insurance, breach response guarantees, financial penalties) that address the security concern without accepting uncapped risk"
    weight: 0.25
    description: "Creative liability response"
