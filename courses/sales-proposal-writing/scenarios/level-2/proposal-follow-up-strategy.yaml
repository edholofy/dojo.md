meta:
  id: proposal-follow-up-strategy
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Follow up on proposals effectively — manage post-proposal communication, handle silence, and maintain momentum toward a decision"
  tags: [sales, follow-up, proposal, communication, momentum, intermediate]

state: {}

trigger: |
  You're an AE at "ScalePlatform" (enterprise SaaS, $35M ARR).
  You sent out 5 proposals this month. Your manager wants to review
  your follow-up strategy for each.

  Key statistics:
  - Only 2% of deals close after the first contact
  - 5-12 touchpoints are typically needed to close
  - 80% of deals require at least 5 follow-ups
  - Deals in proposal stage beyond 21 days see 70% lower win rates
  - Silence doesn't mean "no" — it usually means competing priorities

  Your 5 open proposals:

  Proposal 1: "TechCo" ($80K, sent 3 days ago)
  Status: Champion (VP of Eng) said "I'll review this week and
  share with the CTO." No response yet.
  Risk level: Low (normal timeline)

  Proposal 2: "RetailMax" ($120K, sent 10 days ago)
  Status: VP of Ops said "Looks great, sharing with the team."
  Then silence. Two follow-up emails got no response.
  Risk level: Medium (momentum stalling)

  Proposal 3: "FinServ" ($200K, sent 3 weeks ago)
  Status: After initial enthusiasm, the CFO requested a "revised
  pricing proposal." You sent it 5 days ago. No response.
  Risk level: High (deal may be dead)

  Proposal 4: "HealthTech" ($50K, sent 1 week ago)
  Status: Prospect said "We're reviewing yours alongside 2 others.
  Decision by end of month." Radio silence since.
  Risk level: Medium (competitive evaluation)

  Proposal 5: "StartupXYZ" ($15K, sent 2 weeks ago)
  Status: CEO was excited in demo. Said she'd "sign this week."
  That was 2 weeks ago. She's dodged 3 follow-ups.
  Risk level: High (likely lost or deprioritized)

  Tasks:
  1. For each proposal, write the specific follow-up action you'd
     take THIS WEEK. Include: channel (email, phone, LinkedIn),
     message content, and timing.

  2. For Proposal 2 (silence after 2 emails), write a "value-add"
     follow-up that provides new information rather than just
     "checking in." What could you share that gives them a reason
     to respond?

  3. For Proposal 5 (likely lost), write the "honest conversation"
     message. It's better to get a clear "no" than chase forever.
     How do you give them an easy exit while leaving the door open?

  4. Create a "Post-Proposal Follow-Up Cadence" — a standard
     timeline with touchpoints, channels, and escalation triggers
     that any AE on your team could follow.

assertions:
  - type: llm_judge
    criteria: "Follow-up actions are situation-specific — each proposal gets a different approach based on its risk level and status, not a generic 'checking in' email for all 5"
    weight: 0.25
    description: "Situation-specific follow-ups"
  - type: llm_judge
    criteria: "Value-add follow-up provides genuine new information — shares a relevant case study, industry insight, ROI calculator, or new feature that gives RetailMax a reason to re-engage, not just 'bumping this up'"
    weight: 0.25
    description: "Genuine value-add content"
  - type: llm_judge
    criteria: "Honest conversation is professional and non-guilt-tripping — gives the CEO a graceful exit ('I understand if priorities have shifted') while still expressing continued interest and leaving the door open"
    weight: 0.25
    description: "Professional honest exit"
  - type: llm_judge
    criteria: "Follow-up cadence is structured and practical — includes specific timing (Day 1, Day 3, Week 1, Week 2, etc.), multiple channels, escalation triggers, and clear 'stop' criteria to avoid over-following-up"
    weight: 0.25
    description: "Structured practical cadence"
