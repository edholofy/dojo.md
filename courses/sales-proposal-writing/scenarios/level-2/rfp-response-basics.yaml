meta:
  id: rfp-response-basics
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Respond to formal RFPs effectively — build compliance matrices, align with evaluation criteria, and differentiate within rigid formats"
  tags: [sales, RFP, response, compliance, evaluation, intermediate]

state: {}

trigger: |
  You're an AE at "GovTech Solutions" (government technology SaaS,
  $40M ARR). You received an RFP from "Metro County" (local
  government, 1,200 employees) for a citizen services platform.
  Budget: $300K over 3 years.

  RFP details:
  Response deadline: March 15 (3 weeks away)
  Format: Must follow their template exactly
  Page limit: 50 pages (excluding appendices)

  Evaluation criteria (from the RFP):
  - Technical capability: 35% weight
  - Price: 25% weight
  - Implementation approach: 20% weight
  - Vendor experience/references: 15% weight
  - Small business/diversity: 5% weight

  Mandatory requirements (must answer "Compliant" to all):
  1. FedRAMP authorized or equivalent
  2. WCAG 2.1 AA accessibility compliance
  3. Data hosted within the United States
  4. 99.9% uptime SLA
  5. SOC 2 Type II certified
  6. Integration with Tyler Technologies (their current ERP)

  Your status on mandatory requirements:
  1. FedRAMP: In process (expected Q3). Currently SOC 2 + StateRAMP.
  2. WCAG 2.1 AA: Fully compliant
  3. US data hosting: Yes (AWS us-east-1 and us-west-2)
  4. Uptime: 99.95% SLA (exceeds requirement)
  5. SOC 2 Type II: Yes, current certification
  6. Tyler Technologies: No native integration (would need custom API)

  Competitors likely responding:
  - Tyler Technologies themselves (incumbent advantage)
  - Salesforce Government Cloud (brand recognition)
  - Smaller GovTech startup (lower price)

  Tasks:
  1. Build the compliance matrix for the 6 mandatory requirements.
     For #1 (FedRAMP in process) and #6 (no Tyler integration), how
     do you respond without being automatically disqualified?

  2. The evaluation weights 35% on technical capability. Write the
     technical section outline that maximizes your score. What
     content gets the most space?

  3. Your price will be higher than the small startup but lower
     than Salesforce. Write the pricing section narrative that
     justifies your position as the best value.

  4. What's the go/no-go decision framework for RFPs? What criteria
     should you evaluate before spending 3 weeks writing a response?
     Would you respond to this RFP? Why or why not?

assertions:
  - type: llm_judge
    criteria: "Compliance matrix handles gaps strategically — doesn't lie about FedRAMP status but positions StateRAMP as equivalent with timeline for full FedRAMP, and proposes a concrete Tyler integration plan"
    weight: 0.25
    description: "Strategic gap handling"
  - type: llm_judge
    criteria: "Technical section is evaluation-optimized — allocates the most content to the highest-weighted criteria (35% technical), with clear subsections addressing each technical requirement from the RFP"
    weight: 0.25
    description: "Evaluation-optimized structure"
  - type: llm_judge
    criteria: "Pricing narrative positions value — frames the price between startup and Salesforce by emphasizing total cost of ownership, implementation risk, and long-term value rather than just unit pricing"
    weight: 0.25
    description: "Value-positioned pricing"
  - type: llm_judge
    criteria: "Go/no-go framework is practical — includes criteria like win probability, competitive landscape, resource cost, strategic importance, and compliance gaps, with clear recommendation for this specific RFP"
    weight: 0.25
    description: "Practical go/no-go framework"
