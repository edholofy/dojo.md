meta:
  id: competitive-differentiation
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Differentiate your proposal from competitors — develop win themes, position strengths, and address competitive gaps without bashing"
  tags: [sales, competitive, differentiation, win-themes, intermediate]

state: {}

trigger: |
  You're an AE at "DataGuard" (data security platform, $55M ARR).
  You're writing a proposal for "HealthNet" ($200K deal) and you
  know they're also evaluating CrowdStrike and Palo Alto.

  Competitive intelligence:

  CrowdStrike (their strengths/weaknesses):
  + Market leader, strong brand recognition
  + Best-in-class endpoint detection
  - Expensive ($25-30/endpoint vs. your $15-20)
  - Weak on data security (their focus is endpoints)
  - Complex implementation (average 4 months)
  - No HIPAA-specific compliance templates

  Palo Alto (their strengths/weaknesses):
  + Strong network security
  + Large enterprise customer base
  + Good firewall capabilities
  - Data security is add-on, not native
  - Requires multiple products for full coverage
  - Implementation complexity (average 6 months)
  - Healthcare isn't their primary vertical

  DataGuard (your strengths/weaknesses):
  + Purpose-built for data security
  + HIPAA compliance built-in (pre-configured templates)
  + Fast implementation (6-8 weeks)
  + 50+ healthcare customers
  + Competitive pricing
  - Smaller company, less brand recognition
  - Weaker endpoint detection than CrowdStrike
  - Smaller partner ecosystem

  Prospect context:
  - HealthNet: 3 hospitals, 5,000 employees, HIPAA-regulated
  - Primary need: Data security and HIPAA compliance
  - Secondary need: Endpoint protection
  - Decision criteria: 1) HIPAA compliance, 2) Implementation speed,
    3) Total cost, 4) Vendor reliability

  Tasks:
  1. Develop 3 "win themes" for your proposal — overarching messages
     that highlight your advantages without naming competitors. Each
     should be a complete narrative, not just a tagline.

  2. Write the "Why DataGuard" section of the proposal. Position
     your strengths against HealthNet's decision criteria. Subtly
     address competitor weaknesses without naming them (ghosting).

  3. Address your biggest weakness: smaller company with less brand
     recognition. How do you turn this potential objection into a
     strength in the proposal?

  4. HealthNet's CISO says: "CrowdStrike is the Gartner Magic
     Quadrant leader. Why should we choose you?" Write the response
     for the proposal.

assertions:
  - type: llm_judge
    criteria: "Win themes are specific to HealthNet — not generic 'we're great' statements but themes like 'healthcare-native security' or 'compliance by design' that directly address HealthNet's priorities"
    weight: 0.25
    description: "Prospect-specific win themes"
  - type: llm_judge
    criteria: "Ghosting is effective but ethical — highlights advantages (fast implementation, HIPAA templates) that implicitly contrast with competitor weaknesses without naming them or being negative"
    weight: 0.25
    description: "Effective ethical ghosting"
  - type: llm_judge
    criteria: "Size weakness is reframed convincingly — positions smaller size as advantages (dedicated attention, faster support, healthcare focus, agile development) rather than just dismissing the concern"
    weight: 0.25
    description: "Convincing weakness reframing"
  - type: llm_judge
    criteria: "Gartner response is confident — doesn't dismiss the Magic Quadrant but explains that category leadership doesn't equal best fit for healthcare data security, using HealthNet's specific criteria"
    weight: 0.25
    description: "Confident analyst response"
