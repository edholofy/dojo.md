meta:
  id: tiered-pricing-proposals
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Design and present tiered pricing in proposals — use anchoring, decoy effects, and value framing to guide prospects toward the optimal tier"
  tags: [sales, pricing, tiers, anchoring, psychology, intermediate]

state: {}

trigger: |
  You're an AE at "AnalyticsPro" (business intelligence SaaS, $50M
  ARR). Your company just moved from single pricing to tiered
  pricing and you need to present tiers effectively in proposals.

  Pricing psychology principles:
  - Anchoring: The first price a prospect sees influences their
    perception of all subsequent prices
  - Decoy effect: Including an option that's slightly worse value
    makes the target option look better
  - Goldilocks effect: When given 3 options, most people choose
    the middle one
  - Loss aversion: Framing what they'd miss by choosing a lower
    tier is more motivating than what they'd gain with a higher tier

  Your tiers:
  Starter ($3K/month): 10 dashboards, 5 data sources, email support,
  basic reporting, 25 users
  Professional ($6K/month): 50 dashboards, 20 data sources, priority
  support, advanced reporting, custom alerts, 100 users, API access
  Enterprise ($12K/month): Unlimited dashboards, unlimited data
  sources, dedicated CSM, custom reporting, predictive analytics,
  SSO, unlimited users, SLA guarantee

  Prospect scenarios:

  Prospect A: "MidSizeRetail" (200 employees, $40M revenue)
  Needs: 15 dashboards, 8 data sources, 40 users
  Budget: "Around $5K/month"
  Best fit: Professional tier

  Prospect B: "SmallStartup" (30 employees, $5M revenue)
  Needs: 5 dashboards, 3 data sources, 10 users
  Budget: "Under $2K/month if possible"
  Best fit: Starter tier (but they're pushing below it)

  Prospect C: "BigCorp" (2,000 employees, $500M revenue)
  Needs: Unlimited everything, SSO required, predictive analytics
  Budget: "$15K/month is fine"
  Best fit: Enterprise tier

  Tasks:
  1. Write the pricing section for Prospect A's proposal that uses
     anchoring and the Goldilocks effect to guide them toward
     Professional. Present all 3 tiers but make Professional the
     obvious choice.

  2. Prospect B's budget is below your lowest tier. Write the
     pricing section that presents Starter as the entry point while
     showing enough value to justify the investment. How do you
     handle the budget gap?

  3. Prospect C can afford Enterprise easily. But how do you make
     them feel the price is justified rather than that they're
     overpaying? Write the pricing narrative.

  4. A prospect asks: "Can I mix and match features from different
     tiers?" How do you handle this in the proposal? When should
     you say yes, and when should you hold firm?

assertions:
  - type: llm_judge
    criteria: "Prospect A pricing guides toward Professional — presents Enterprise first (anchor), then Professional (sweet spot), then Starter (limited), highlighting what Professional includes that Starter doesn't"
    weight: 0.25
    description: "Goldilocks-guided pricing"
  - type: llm_judge
    criteria: "Prospect B budget gap is handled constructively — doesn't immediately discount but shows ROI that justifies the investment, potentially offers annual billing discount or phased approach"
    weight: 0.25
    description: "Constructive budget-gap handling"
  - type: llm_judge
    criteria: "Enterprise justification emphasizes unique value — highlights capabilities exclusive to Enterprise (predictive analytics, dedicated CSM, SLA) and positions the price against the value of unlimited scale"
    weight: 0.25
    description: "Enterprise value justification"
  - type: llm_judge
    criteria: "Mix-and-match response is strategic — explains when customization is possible (enterprise deals) vs. when tiers should hold (standard deals), considering margin protection and precedent-setting"
    weight: 0.25
    description: "Strategic customization response"
