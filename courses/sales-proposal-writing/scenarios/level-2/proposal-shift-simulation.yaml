meta:
  id: proposal-shift-simulation
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Handle multiple proposal requests in a single week — prioritize, customize efficiently, and maintain quality across different deal sizes and industries"
  tags: [sales, simulation, multi-proposal, prioritization, intermediate]

state: {}

trigger: |
  You're an AE at "WorkflowMax" (workflow automation SaaS, $40M
  ARR). It's Monday morning and you have 4 proposals due this week.
  Your manager says: "Prioritize, customize, and deliver quality.
  No excuses for generic proposals."

  Proposal 1: Due Tuesday (tomorrow)
  Prospect: "QuickShip" (logistics, 100 employees, $20K/year deal)
  Status: Small deal, single decision maker, ready to buy if
  proposal is solid. Quick win.
  Discovery: Simple — they need order tracking automation.

  Proposal 2: Due Wednesday
  Prospect: "MedGroup" (healthcare, 500 employees, $80K/year deal)
  Status: Competitive evaluation (vs. Monday.com). VP of Ops is
  champion. Need to differentiate.
  Discovery: Complex — HIPAA compliance, multi-department rollout,
  8 stakeholders in buying committee.

  Proposal 3: Due Thursday
  Prospect: "TechCorp" (enterprise SaaS, 2,000 employees, $200K deal)
  Status: RFP response. Formal procurement. Specific format required.
  Discovery: Thorough — 3 discovery calls completed.

  Proposal 4: Due Friday
  Prospect: "StartupAI" (AI startup, 20 employees, $8K/year deal)
  Status: CEO wants to move fast. "Just send me something I can
  sign." Smallest deal but founder is well-connected (referral
  potential).
  Discovery: Light — 1 call, basic needs identified.

  Your available time: 20 hours this week for proposals.

  Tasks:
  1. How do you allocate your 20 hours across the 4 proposals?
     Justify your time allocation based on deal size, complexity,
     win probability, and strategic importance.

  2. Write the executive summary for Proposal 2 (MedGroup — the
     competitive deal). This is the highest-stakes proposal. Show
     how you differentiate against Monday.com.

  3. Proposal 4 (StartupAI) is small but the CEO wants speed.
     Write a streamlined 2-page proposal that covers the essentials
     without cutting corners on quality.

  4. You realize at 3 PM Thursday that the TechCorp RFP has a
     requirement you missed — they need SOC 2 Type II certification,
     which your company has but you forgot to include. How do you
     handle this under time pressure?

assertions:
  - type: llm_judge
    criteria: "Time allocation is strategically justified — allocates the most time to MedGroup ($80K, competitive) and TechCorp ($200K, RFP), less to QuickShip and StartupAI, with clear reasoning"
    weight: 0.25
    description: "Strategic time allocation"
  - type: llm_judge
    criteria: "MedGroup executive summary differentiates clearly — highlights HIPAA compliance, healthcare experience, and multi-department capabilities that Monday.com likely lacks, without naming the competitor"
    weight: 0.25
    description: "Differentiated executive summary"
  - type: llm_judge
    criteria: "StartupAI proposal is concise but complete — covers problem, solution, pricing, and next steps in 2 pages without feeling rushed, respecting the CEO's preference for speed"
    weight: 0.25
    description: "Concise complete proposal"
  - type: llm_judge
    criteria: "Missed requirement response is practical — quickly adds the SOC 2 section, checks for other gaps, and potentially sends a brief note with the submission acknowledging the addition"
    weight: 0.25
    description: "Practical crisis resolution"
