meta:
  id: proposal-personalization
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Personalize proposals beyond basic customization — use buyer research, discovery insights, and industry context to make proposals feel written specifically for the prospect"
  tags: [sales, personalization, customization, buyer-research, intermediate]

state: {}

trigger: |
  You're an Account Executive at "DataFlow" (data integration
  platform, $80M ARR). You've done solid discovery with "LogiCorp"
  (a mid-market logistics company, 800 employees, $200M revenue).

  Discovery notes from your 3 calls:
  - VP of Operations (Jessica): Frustrated that data from their
    warehouse management system, transportation management system,
    and ERP don't talk to each other. She manually reconciles
    reports every Monday morning, taking 4 hours
  - IT Director (Raj): Currently maintaining 12 point-to-point
    integrations built by a contractor who left. Integration failures
    cost them 2-3 days of troubleshooting per month
  - CFO (Sarah): Approved a $150K budget for "integration
    modernization." She's comparing you against MuleSoft (2x your
    price) and a custom-built solution (cheaper but risky)
  - They're opening 2 new distribution centers next year and current
    integration approach won't scale
  - Jessica mentioned their biggest competitor just deployed a
    "real-time supply chain visibility" platform

  Your standard proposal template has these sections:
  1. About DataFlow (company overview)
  2. Platform Capabilities
  3. Technical Architecture
  4. Implementation Plan
  5. Pricing
  6. Customer Success Stories

  Tasks:
  1. Rewrite the "About DataFlow" section so it's about LogiCorp,
     not about you. Transform the self-focused company overview into
     a section that demonstrates you understand their business, their
     challenges, and their competitive landscape.

  2. Personalize the "Platform Capabilities" section. Don't list all
     30 features — select and frame the 5-7 capabilities that
     directly solve problems Jessica, Raj, and Sarah described.
     Connect each capability to a specific pain point from discovery.

  3. Write the competitive framing. LogiCorp is comparing you to
     MuleSoft and a custom-built solution. Without naming either,
     write the "Why DataFlow" section that positions your advantages
     against both alternatives using language specific to LogiCorp's
     situation.

  4. Create the personalized ROI section. Using the specific data
     points from discovery (Jessica's 4 hours/week, Raj's 2-3 days/
     month troubleshooting, 2 new DCs opening), calculate the
     business case that justifies the $150K investment to Sarah.

assertions:
  - type: llm_judge
    criteria: "About section is buyer-focused — leads with LogiCorp's situation and challenges, positions DataFlow as the answer to their specific problems, references their competitive landscape and growth plans"
    weight: 0.25
    description: "Buyer-focused about section"
  - type: llm_judge
    criteria: "Capabilities are discovery-connected — selects relevant features (not all 30) and explicitly links each to a pain point from Jessica, Raj, or Sarah's interviews"
    weight: 0.25
    description: "Discovery-connected capabilities"
  - type: llm_judge
    criteria: "Competitive framing addresses both alternatives — positions against expensive enterprise platform (MuleSoft) and risky custom build without naming them, using LogiCorp-specific framing"
    weight: 0.25
    description: "Both-alternative competitive framing"
  - type: llm_judge
    criteria: "ROI uses prospect's own numbers — calculates business value using Jessica's 4 hrs/week, Raj's troubleshooting time, and new DC scaling to build a credible case for the $150K investment"
    weight: 0.25
    description: "Prospect-number ROI"
