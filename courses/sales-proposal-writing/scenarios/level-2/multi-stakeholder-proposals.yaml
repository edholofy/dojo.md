meta:
  id: multi-stakeholder-proposals
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Write proposals that resonate with multiple stakeholders — tailor messaging for executives, technical teams, finance, and end users in one document"
  tags: [sales, multi-stakeholder, tailoring, audience, intermediate]

state: {}

trigger: |
  You're an AE at "ConnectPro" (enterprise communication platform,
  $70M ARR). You're writing a $150K proposal for "GlobalManufacture"
  (industrial manufacturer, 2,000 employees across 8 factories).

  The buying committee (who will read your proposal):
  1. CEO, Patricia Wong — Cares about: competitive advantage,
     innovation, board-reportable outcomes
  2. CFO, James Park — Cares about: ROI, payback period, total cost,
     budget approval
  3. VP of Operations, Sarah Chen — Your champion. Cares about:
     production efficiency, cross-factory communication, reducing
     downtime
  4. IT Director, Mike Johnson — Cares about: security, integration
     with SAP, bandwidth requirements, maintenance burden
  5. Factory Floor Manager, Ana Rodriguez — End user. Cares about:
     ease of use, training time, mobile access on factory floor

  Discovery findings:
  - 8 factories use different communication tools (mix of Slack,
    email, walkie-talkies, and paper notices)
  - Information silos cause 4-hour average delay in cross-factory
    coordination
  - Last quarter: 3 production stops ($85K each) due to delayed
    communication about supply issues
  - IT manages 5 different tools with 5 different vendors
  - Factory workers have limited computer access — need mobile/rugged
    device support

  Tasks:
  1. Write the executive summary that speaks to all 5 stakeholders.
     How do you include something for each reader without the
     summary becoming 5 pages long?

  2. Within the proposal, create a "Stakeholder Benefits" section
     with sub-sections for each audience. Write 150-200 words per
     stakeholder that addresses their specific concerns.

  3. The CFO will flip straight to pricing. The IT Director will
     flip to the technical section. The CEO will only read the exec
     summary. Knowing this, how do you structure the proposal so
     each reader finds what they need quickly?

  4. Sarah (your champion) needs to present this to the committee.
     Create a 1-page "Champion's Cheat Sheet" — a summary she can
     use to walk the team through the proposal's highlights.

assertions:
  - type: llm_judge
    criteria: "Executive summary weaves all perspectives — includes competitive advantage (CEO), ROI (CFO), operational efficiency (VP Ops), simplified IT (IT Director), and ease of use (factory floor) in a cohesive 1-page narrative"
    weight: 0.25
    description: "Multi-perspective executive summary"
  - type: llm_judge
    criteria: "Stakeholder sections are genuinely tailored — each sub-section speaks the language of that role (financial metrics for CFO, technical specs for IT, daily workflow impact for factory manager)"
    weight: 0.25
    description: "Role-appropriate tailoring"
  - type: llm_judge
    criteria: "Proposal structure enables scanning — uses clear section headers, table of contents, visual callouts, and strategic placement so each reader can quickly find their relevant section"
    weight: 0.25
    description: "Scannable structure design"
  - type: llm_judge
    criteria: "Champion's cheat sheet is concise and persuasive — 1 page with key talking points per stakeholder, headline ROI, and anticipated objections with responses, enabling Sarah to lead the discussion"
    weight: 0.25
    description: "Concise champion enablement"
