meta:
  id: proposal-automation-tools
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Evaluate and implement proposal automation tools — compare PandaDoc, Proposify, and Qwilr, design workflows, and measure impact on proposal velocity"
  tags: [sales, automation, tools, PandaDoc, Proposify, intermediate]

state: {}

trigger: |
  You're the Sales Operations Manager at "GrowthSaaS" ($30M ARR,
  25 AEs). Your CEO says: "Our reps spend 8 hours per proposal.
  That's insane. Fix it."

  Current state:
  - Average proposals per AE per month: 6
  - Average time per proposal: 8 hours (research, writing, design,
    review, send)
  - Time breakdown: Research 1hr, Writing 3hr, Design/formatting
    2hr, Internal review 1hr, Sending/tracking 1hr
  - Win rate on proposals: 28%
  - Average time from proposal sent to decision: 18 days
  - Annual proposals: 25 AEs × 6/month × 12 = 1,800 proposals

  Budget: $30K/year for proposal tooling

  Tool options you're evaluating:

  PandaDoc ($49/user/month = $14,700/year for 25 users):
  + Drag-and-drop editor, content library, e-signatures
  + CRM integration (Salesforce, HubSpot)
  + Payment collection built-in
  + Proposal analytics (who viewed what, how long)
  - Learning curve for advanced features
  - Template customization can be complex

  Proposify ($49/user/month = $14,700/year for 25 users):
  + Designed specifically for sales proposals
  + Content locking (legal can protect pricing/terms sections)
  + Strong approval workflows
  + Branded templates with design control
  - Fewer integrations than PandaDoc
  - No built-in payment collection

  Qwilr ($35/month + $59/user for enterprise):
  + Web-based interactive proposals (not PDFs)
  + Modern, mobile-friendly design
  + Real-time pricing calculators
  + Engagement analytics
  - Smaller company, less mature
  - May not suit formal/conservative industries

  Tasks:
  1. Build the evaluation matrix comparing all 3 tools against
     your requirements: ease of use, CRM integration, template
     quality, analytics, approval workflows, security, and pricing.
     Score each 1-5 and recommend one.

  2. If you implement PandaDoc, design the template library:
     what proposal templates do you need, what content blocks go
     in the content library, and how do you ensure consistency
     across 25 AEs?

  3. Calculate the ROI of proposal automation. If you reduce time
     per proposal from 8 hours to 3 hours, what's the value of
     recovered selling time? What if win rate improves 5%?

  4. Proposal analytics show Prospect A spent 8 minutes on your
     pricing page but 0 seconds on your case studies. Prospect B
     spent 5 minutes on case studies and 1 minute on pricing.
     What does each behavior tell you, and how do you adjust your
     follow-up?

assertions:
  - type: llm_judge
    criteria: "Evaluation matrix is thorough — scores all 3 tools across all criteria with justification, identifies trade-offs, and makes a clear recommendation with reasoning based on GrowthSaaS's specific needs"
    weight: 0.25
    description: "Thorough tool evaluation"
  - type: llm_judge
    criteria: "Template library is strategic — includes templates for different deal sizes/segments, reusable content blocks (exec summaries, case studies, pricing tables), and governance to maintain quality"
    weight: 0.25
    description: "Strategic template library"
  - type: llm_judge
    criteria: "ROI calculation is concrete — quantifies time savings (25 AEs × 5 hrs saved × 6 proposals × 12 months), converts to revenue capacity, and models win-rate improvement impact"
    weight: 0.25
    description: "Concrete ROI calculation"
  - type: llm_judge
    criteria: "Analytics interpretation drives action — correctly reads Prospect A as price-focused (follow up with ROI justification) and Prospect B as validation-focused (follow up with more references/proof)"
    weight: 0.25
    description: "Actionable analytics interpretation"
