meta:
  id: proposal-design-formatting
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Design visually professional proposals — use visual hierarchy, data visualization, white space, and brand consistency to enhance readability and credibility"
  tags: [sales, design, formatting, visual, branding, intermediate]

state: {}

trigger: |
  You're an AE at "DesignSaaS" (creative project management tool,
  $25M ARR). Your sales enablement team is upgrading proposal
  templates and asks you to help define the design standards.

  Current problems with proposals:
  - Text-heavy walls of content that no one reads
  - Inconsistent fonts, colors, and layouts across sections
  - No data visualization — just numbers in paragraphs
  - Poor use of white space — everything feels cramped
  - Screenshots are blurry and untitled

  Design principles for proposals:
  1. Visual hierarchy: Guide the reader's eye (headers > subheaders
     > body > captions). Use 3 font sizes max.
  2. White space: Empty space improves readability. Don't fill every
     inch.
  3. Data visualization: Charts and graphs for quantitative data.
     Tables for comparisons. Icons for lists.
  4. Brand consistency: Your colors, fonts, and logo placement
     should be identical on every page.
  5. Scanability: A reader should grasp the key message of each
     page in 5 seconds by scanning headers and callout boxes.

  Practice exercises:

  Exercise 1: Redesign this pricing table
  Current (text format):
  "Standard plan: $2,000/month. Includes 50 users, 10 projects,
  email support, and basic reporting. Professional plan: $4,000/
  month. Includes 200 users, unlimited projects, priority support,
  advanced reporting, and API access. Enterprise plan: $8,000/month.
  Includes unlimited users, unlimited projects, dedicated support,
  custom reporting, SSO, and custom integrations."

  Exercise 2: Visualize this ROI data
  "In Year 1, the customer saves $50K. In Year 2, they save $120K.
  In Year 3, they save $180K. The investment is $60K/year. The
  cumulative ROI by Year 3 is 194%."

  Exercise 3: Improve this page layout
  A proposal page that has: a 500-word paragraph, a small screenshot
  in the corner, no headers, no bullet points, and 0.5-inch margins.

  Tasks:
  1. For each exercise, describe the redesigned version in detail.
     Explain what visual elements you'd use, how you'd structure
     the content, and why each design choice improves communication.

  2. Create the "Proposal Design System" — a set of standards
     covering: typography (fonts, sizes, weights), color palette
     (primary, secondary, accent), spacing (margins, padding),
     and component library (callout boxes, tables, charts).

  3. When should you use a chart vs. a table vs. an infographic
     vs. plain text? Create a decision guide with examples.

  4. Your best AE says: "I don't have time for design. Content is
     what matters." Make the case for why design directly impacts
     win rates. Use specific evidence.

assertions:
  - type: llm_judge
    criteria: "Redesigns improve communication — pricing table uses comparison grid format, ROI data uses bar/line chart with clear labels, and page layout adds headers, bullets, white space, and properly sized screenshots"
    weight: 0.25
    description: "Communication-improving redesigns"
  - type: llm_judge
    criteria: "Design system is specific and implementable — provides actual font recommendations, color hex codes or descriptions, spacing measurements, and component descriptions that a designer could implement"
    weight: 0.25
    description: "Implementable design system"
  - type: llm_judge
    criteria: "Visualization decision guide is practical — maps data types to visualization types (comparison = table, trends = line chart, composition = pie chart) with clear examples for each"
    weight: 0.25
    description: "Practical visualization guide"
  - type: llm_judge
    criteria: "Design-impact argument is evidence-based — connects visual quality to proposal effectiveness, citing that readers process visuals faster, scan before reading, and professional design builds credibility"
    weight: 0.25
    description: "Evidence-based design argument"
