meta:
  id: roi-business-case-writing
  level: 2
  course: sales-proposal-writing
  type: output
  description: "Build compelling ROI models and business cases in proposals — quantify value, model returns, and present financial justification for investment"
  tags: [sales, ROI, business-case, financial-modeling, intermediate]

state: {}

trigger: |
  You're an AE at "AutomateHQ" (business process automation SaaS,
  $45M ARR, pricing $2K-$15K/month). Your sales trainer says:
  "Every proposal needs a business case. If you can't show ROI,
  you're asking prospects to take a leap of faith."

  ROI model framework:
  - Current state costs (what the problem costs them today)
  - Future state benefits (what changes with your solution)
  - Investment required (your pricing + implementation)
  - Net value = Benefits - Investment
  - ROI = Net Value / Investment × 100%
  - Payback period = Investment / Monthly benefit

  Important: Always build 3 scenarios:
  - Conservative (pessimistic assumptions)
  - Moderate (likely assumptions)
  - Aggressive (best-case assumptions)

  Prospect: "MedSupply Co" (medical device distributor, 400 employees,
  $80M revenue)

  Discovery data for ROI model:
  Current state costs:
  - Order processing: 8 FTEs process orders manually ($55K avg salary
    each = $440K/year). Each processes 50 orders/day.
  - Error rate: 4.2% of orders have errors. Average error costs $180
    to fix (rework, returns, credits). 200,000 orders/year = 8,400
    errors = $1.5M in error costs.
  - Compliance: 2 FDA audit findings last year. Remediation cost:
    $250K. Risk of further penalties.
  - Overtime: During peak periods, $120K/year in overtime pay.

  Your solution impact (based on similar customers):
  - Reduces manual processing by 70% (reassign or reduce 5.6 FTEs)
  - Reduces errors to 0.8% (from 4.2%)
  - Eliminates compliance gaps (automated audit trail)
  - Eliminates overtime through automated processing

  Your pricing:
  - Platform: $12,000/month ($144K/year)
  - Implementation: $50,000 (one-time)
  - Training: $15,000 (one-time)
  - Year 1 total: $209,000
  - Year 2+ annual: $144,000

  Tasks:
  1. Build the 3-year ROI model with Conservative, Moderate, and
     Aggressive scenarios. Show your assumptions for each. Calculate:
     total savings, net value, ROI percentage, and payback period.

  2. Write the "Investment Summary" section of the proposal that
     presents this ROI model to the CFO. Make it compelling but
     credible — CFOs distrust inflated numbers.

  3. The CFO says: "Your ROI looks too good. What are the risks?"
     Write the honest response that addresses risks while
     maintaining confidence.

  4. When should you NOT include an ROI model? Are there situations
     where a business case hurts more than it helps?

assertions:
  - type: llm_judge
    criteria: "ROI model is mathematically sound — correctly calculates savings across all cost categories, applies different reduction percentages for each scenario, and shows 3-year cumulative value with payback period"
    weight: 0.25
    description: "Mathematically sound ROI model"
  - type: llm_judge
    criteria: "Investment summary is CFO-appropriate — leads with conservative scenario, shows assumptions transparently, uses clean financial formatting, and focuses on hard savings over soft benefits"
    weight: 0.25
    description: "CFO-appropriate presentation"
  - type: llm_judge
    criteria: "Risk response is credible — acknowledges real risks (adoption, change management, ramp-up time) and provides mitigation strategies (phased rollout, training, success metrics), maintaining trust"
    weight: 0.25
    description: "Credible risk acknowledgment"
  - type: llm_judge
    criteria: "No-ROI scenarios are insightful — identifies situations like when data is too uncertain, when the prospect is compliance-driven (must-buy), or when ROI claims can't be substantiated"
    weight: 0.25
    description: "Insightful no-ROI scenarios"
