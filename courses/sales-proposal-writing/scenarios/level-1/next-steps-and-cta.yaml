meta:
  id: next-steps-and-cta
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write clear next steps and calls to action in proposals — make it easy for prospects to say yes and move forward"
  tags: [sales, next-steps, CTA, closing, proposal, beginner]

state: {}

trigger: |
  You're a junior AE at "SignFlow" (e-signature and document
  automation SaaS, $22M ARR). Your manager reviews your first 5
  proposals and says: "Your next steps sections are killing your
  close rate. They're either too vague or too aggressive."

  Examples of bad next steps:

  Too vague:
  "We'd love to discuss this further. Please don't hesitate to
  reach out if you have any questions. We look forward to hearing
  from you soon."

  Too aggressive:
  "Please sign the attached contract by Friday. Payment is due
  within 30 days. We need to begin implementation immediately."

  Too complicated:
  "Step 1: Review proposal. Step 2: Get IT approval. Step 3:
  Schedule legal review. Step 4: Sign MSA. Step 5: Sign SOW.
  Step 6: Complete vendor registration. Step 7: Process PO.
  Step 8: Schedule kickoff."

  Good next steps formula:
  1. Summarize the mutual agreement (what they said they wanted)
  2. Propose ONE clear next action (not 8 steps)
  3. Include a specific date or deadline
  4. Make it easy to say yes (remove friction)
  5. Explain what happens after they say yes

  Write next steps for 4 different proposal scenarios:

  Scenario A: Small deal, single decision maker
  Prospect: "DesignCo" (30 employees, $1K/month deal)
  Status: Owner loved the demo. Ready to buy. Just needs to sign.

  Scenario B: Mid-market, needs internal approval
  Prospect: "MedGroup" (300 employees, $5K/month deal)
  Status: VP of Ops is your champion. Needs CFO approval.
  Timeline: Decision by end of month.

  Scenario C: Enterprise, formal procurement
  Prospect: "BankCorp" (2,000 employees, $25K/month deal)
  Status: Technical evaluation complete. Procurement wants to
  negotiate terms. Legal needs to review MSA.

  Scenario D: Competitive situation
  Prospect: "TechStartup" (80 employees, $2K/month deal)
  Status: Evaluating you and DocuSign. Decision in 2 weeks.

  Tasks:
  1. Write the next steps section for each scenario. Adapt the
     complexity and tone to the situation.

  2. For Scenario B, the champion needs to sell your proposal
     internally. Write a "champion enablement" paragraph that helps
     the VP make the case to the CFO.

  3. For Scenario D (competitive), how do you create urgency
     without being pushy? Write the next steps that tip the
     decision in your favor.

  4. What's the single most important element of a next steps
     section? Defend your answer.

assertions:
  - type: llm_judge
    criteria: "Next steps adapt to deal complexity — Scenario A is simple and direct, B includes champion support, C acknowledges procurement process, D creates competitive urgency, each matching the situation"
    weight: 0.25
    description: "Situation-adapted next steps"
  - type: llm_judge
    criteria: "Champion enablement provides ammunition — gives the VP specific talking points, ROI data, and a concise summary they can forward to the CFO, not just asking them to 'share the proposal'"
    weight: 0.25
    description: "Effective champion enablement"
  - type: llm_judge
    criteria: "Competitive urgency is subtle — creates reasons to choose quickly (implementation timeline advantage, dedicated onboarding slot, limited-time offer) without pressuring or badmouthing DocuSign"
    weight: 0.25
    description: "Subtle competitive urgency"
  - type: llm_judge
    criteria: "Most important element is well-defended — identifies a specific element (likely specificity, a clear date, or a single action) with reasoning about why it drives conversion more than other elements"
    weight: 0.25
    description: "Well-defended critical element"
