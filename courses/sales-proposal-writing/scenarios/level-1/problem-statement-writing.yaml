meta:
  id: problem-statement-writing
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write compelling problem statements in proposals — reflect discovery findings, quantify impact, and create urgency without fear-mongering"
  tags: [sales, problem-statement, writing, urgency, beginner]

state: {}

trigger: |
  You're a junior AE at "HRCloud" (HR platform SaaS, $35M ARR).
  Your sales trainer says: "The problem statement is where you prove
  you listened. If the prospect doesn't see their own words and
  data reflected back, they won't trust the rest of the proposal."

  Problem statement guidelines:
  - Use the prospect's language, not yours
  - Include specific data from discovery (numbers, percentages)
  - Show the business impact (not just the operational problem)
  - Create urgency without being manipulative
  - End with the cost of inaction

  Practice: Write problem statements for 3 different prospects.

  Prospect 1: "GrowthTech" (SaaS company, 250 employees, 40% growth)
  Discovery notes:
  - HR team of 3 managing 250 people (industry ratio: 1 HR per 50)
  - Onboarding takes 3 weeks (target: 1 week)
  - 2 compliance issues in last audit (missing I-9 forms)
  - Employee satisfaction survey: 3.2/5 for "onboarding experience"
  - Turnover in first 90 days: 25% (industry average: 12%)
  - HR director quote: "We're drowning. Every new hire adds to the chaos."

  Prospect 2: "RetailChain" (restaurant group, 800 employees)
  Discovery notes:
  - 12 locations, each doing HR differently
  - Paper-based scheduling — managers spend 6 hours/week on schedules
  - Overtime violations: $85K in penalties last year
  - Time theft estimated at $120K/year (buddy punching)
  - GM quote: "I spend more time on scheduling than on customers."

  Prospect 3: "FinanceGroup" (accounting firm, 100 employees)
  Discovery notes:
  - Annual performance reviews take 4 months to complete (should
    take 4 weeks)
  - 40% of managers don't complete reviews at all
  - No standardized competency framework
  - Lost 3 senior accountants last year who cited "no career path"
  - Managing partner quote: "We're losing our best people and we
    don't even know why until they're gone."

  Tasks:
  1. Write a 200-300 word problem statement for each prospect.
     Use their specific data and language from discovery.

  2. For Prospect 1, calculate the "cost of inaction" — what does
     it cost GrowthTech to NOT solve these problems? Show the math.

  3. Rewrite Prospect 2's problem statement in two versions:
     Version A for the GM (operational focus) and Version B for
     the CFO (financial focus). Same data, different framing.

  4. What's the difference between creating urgency and using
     fear? Write an example of each for Prospect 3.

assertions:
  - type: llm_judge
    criteria: "Problem statements use prospect's data and language — includes specific numbers (25% turnover, $85K penalties, 40% review completion), quotes from stakeholders, and industry benchmarks for comparison"
    weight: 0.25
    description: "Data-specific problem statements"
  - type: llm_judge
    criteria: "Cost of inaction is quantified — calculates GrowthTech's costs from early turnover (replacement cost × turnover rate), compliance risk, and productivity loss with documented assumptions"
    weight: 0.25
    description: "Quantified inaction cost"
  - type: llm_judge
    criteria: "Dual-audience versions differ meaningfully — GM version focuses on time spent on scheduling and operational impact, CFO version focuses on $85K penalties, $120K time theft, and labor cost optimization"
    weight: 0.25
    description: "Meaningful audience adaptation"
  - type: llm_judge
    criteria: "Urgency vs. fear distinction is clear — urgency connects to real business consequences and timelines, while fear uses exaggeration, worst-case scenarios, or emotional manipulation"
    weight: 0.25
    description: "Clear urgency-fear distinction"
