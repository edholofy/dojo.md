meta:
  id: implementation-timeline-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write the implementation and timeline section of a proposal — set realistic expectations, define milestones, and build confidence in delivery"
  tags: [sales, implementation, timeline, milestones, beginner]

state: {}

trigger: |
  You're a junior AE at "OnboardFlow" (customer onboarding SaaS,
  $12M ARR). Your prospects always ask: "How long until we're
  live?" The implementation section is where you answer this and
  build confidence that you can deliver.

  Implementation section components:
  1. Overview (what the implementation includes)
  2. Phases and timeline (broken into clear stages)
  3. Milestones (specific deliverables at each stage)
  4. Responsibilities (what you do vs. what they do)
  5. Resources needed (from both sides)
  6. Risk factors and mitigation

  Prospect: "FinTechPro" (financial services SaaS, 200 employees)
  What they're implementing: OnboardFlow to automate customer
  onboarding. Currently manual — each onboarding takes 3 days
  of staff time. They onboard 50 new customers per month.

  Implementation details:
  Phase 1 — Setup (Weeks 1-2):
  Configure platform, integrate with their Salesforce CRM and
  Stripe billing. Set up SSO. Import existing customer data.
  Your team's work: 80%. Their work: 20% (provide access, data).

  Phase 2 — Build (Weeks 3-4):
  Create onboarding workflows (3 customer segments), build
  document templates, configure automation rules.
  Your team's work: 60%. Their work: 40% (design workflows, review).

  Phase 3 — Test (Week 5):
  UAT with 5 pilot customers. Fix issues. Staff training (2 sessions).
  Your team's work: 50%. Their work: 50% (test, provide feedback).

  Phase 4 — Launch (Week 6):
  Go live with all new customers. Monitor for 2 weeks. Handoff
  to Customer Success.
  Your team's work: 30%. Their work: 70% (operate, adopt).

  Tasks:
  1. Write the full implementation section for FinTechPro. Include
     all 6 components. Make it visual (use tables or timelines where
     appropriate — describe the format).

  2. The VP of Operations asks: "What could go wrong?" Write the
     risk factors section. Be honest about risks (data migration
     issues, integration delays, low adoption) but show you have
     mitigation plans.

  3. FinTechPro says: "We need to be live in 3 weeks, not 6." How
     do you handle this in the proposal? Write the response that
     manages expectations while showing flexibility.

  4. What should NEVER be in an implementation timeline? List 3
     things that AEs commonly include that hurt the proposal.

assertions:
  - type: llm_judge
    criteria: "Implementation section is complete — covers all 6 components (overview, phases, milestones, responsibilities, resources, risks) with clear formatting described for a proposal document"
    weight: 0.25
    description: "Complete implementation section"
  - type: llm_judge
    criteria: "Risk section is honest with mitigations — identifies real risks (data migration, integration delays, low adoption) and provides specific countermeasures for each, not just 'we'll handle it'"
    weight: 0.25
    description: "Honest risk mitigation"
  - type: llm_judge
    criteria: "Timeline compression response is professional — doesn't just say 'no' or 'yes' but proposes options (phased rollout, priority features first, parallel workstreams) with clear trade-offs"
    weight: 0.25
    description: "Professional timeline negotiation"
  - type: llm_judge
    criteria: "Timeline anti-patterns are practical — identifies real mistakes like overly optimistic dates, hiding prospect responsibilities, or including too much technical detail that scares non-technical stakeholders"
    weight: 0.25
    description: "Practical anti-patterns"
