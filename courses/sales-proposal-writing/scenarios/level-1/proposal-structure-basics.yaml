meta:
  id: proposal-structure-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Learn the fundamental structure of a sales proposal — executive summary, problem statement, solution overview, pricing, and next steps"
  tags: [sales, proposal, structure, fundamentals, beginner]

state: {}

trigger: |
  You're a junior AE at "CloudSync" (cloud integration SaaS, $20M
  ARR, pricing $500-$5,000/month). Your manager gives you a proposal
  template and asks you to learn each section.

  Standard proposal structure:
  1. Cover page (company name, prospect name, date, prepared by)
  2. Executive summary (1 page — the most important section)
  3. Understanding of the problem (show you listened in discovery)
  4. Proposed solution (how your product addresses their needs)
  5. Implementation plan (timeline, milestones, resources)
  6. Investment summary (pricing, payment terms)
  7. Social proof (case studies, testimonials, logos)
  8. Team and support (who they'll work with)
  9. Next steps (clear path forward)
  10. Appendix (technical specs, terms, legal)

  Prospect for your first proposal:
  Company: "FastShip Logistics" (e-commerce fulfillment, 200 emp)
  Contact: Director of Operations, Maria Santos
  Discovery findings:
  - Using 4 separate tools for order management, inventory, shipping,
    and customer notifications — none integrated
  - Manual data entry between tools takes 15 hours/week (2 FTEs)
  - Shipping errors: 3.2% rate (industry average: 0.8%)
  - Lost $45K in Q3 from shipping mistakes and customer refunds
  - Timeline: Need solution before holiday season (4 months)
  - Budget: $3K-5K/month approved by VP of Operations
  - Decision maker: VP of Operations (Maria's boss)

  Tasks:
  1. Write the 1-page executive summary for FastShip. Remember: many
     decision makers ONLY read this section. It must stand on its own.

  2. Write the "Understanding of the Problem" section. Show Maria
     you listened in discovery by reflecting her specific pain points
     back — not generic problems.

  3. Write the "Investment Summary" section. Present pricing at
     $3,500/month ($42K/year) in a way that connects cost to value.
     How do you frame the price relative to the $45K/quarter they're
     losing?

  4. What makes a bad proposal? List 5 common mistakes junior AEs
     make and how to avoid each one.

assertions:
  - type: llm_judge
    criteria: "Executive summary stands alone — captures the problem, proposed solution, expected outcomes, investment, and next steps in 1 page, written for a busy VP who may not read anything else"
    weight: 0.25
    description: "Standalone executive summary"
  - type: llm_judge
    criteria: "Problem section reflects discovery — uses FastShip's specific data (4 tools, 15 hours/week, 3.2% error rate, $45K losses) rather than generic language about 'integration challenges'"
    weight: 0.25
    description: "Discovery-reflective problem section"
  - type: llm_judge
    criteria: "Pricing is value-framed — presents $42K/year against the $180K/year in losses and labor costs, showing clear ROI, not just listing a price"
    weight: 0.25
    description: "Value-framed pricing"
  - type: llm_judge
    criteria: "Common mistakes are specific — identifies real junior AE errors like feature-dumping, generic templates, no personalization, burying pricing, or weak next steps"
    weight: 0.25
    description: "Specific mistake identification"
