meta:
  id: solution-section-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write the solution section of a proposal — connect product capabilities to prospect needs without feature-dumping"
  tags: [sales, solution, proposal, value-mapping, beginner]

state: {}

trigger: |
  You're a junior AE at "InventoryPro" (inventory management SaaS,
  $18M ARR). Your sales trainer teaches: "The solution section isn't
  a feature list — it's a bridge between the prospect's problem and
  their desired future state."

  Solution section formula:
  1. Restate the need (from the problem section)
  2. Describe how you solve it (capability, not feature)
  3. Show the expected outcome (quantified where possible)
  4. Provide evidence (case study snippet, data point)

  Example:
  BAD: "InventoryPro includes real-time stock tracking, automated
  reorder alerts, and multi-warehouse management."
  GOOD: "To eliminate the stockout events that cost FoodCo $80K
  last quarter, InventoryPro provides real-time visibility across
  all 5 warehouses, automatically triggering reorders when stock
  drops below your defined thresholds. Similar retailers using this
  approach reduced stockouts by 92%."

  Prospect: "FreshFoods" (grocery distributor, 150 employees)
  Their problems (from discovery):
  1. Stockouts on top 20 products happen 3x/month, losing $25K/event
  2. Manual inventory counts take 2 full days per warehouse (3
     warehouses = 6 days/month of labor)
  3. Expiration waste: $180K/year in expired products because FIFO
     isn't enforced consistently
  4. No visibility — the VP of Ops can't see inventory levels across
     warehouses without calling each warehouse manager

  Your product capabilities:
  - Real-time inventory tracking (barcode scanning, IoT sensors)
  - Automated reorder points with supplier integration
  - FIFO enforcement with expiration date tracking and alerts
  - Multi-warehouse dashboard with real-time sync
  - Mobile app for warehouse floor staff

  Tasks:
  1. Write the solution section for FreshFoods using the 4-part
     formula for each of their 4 problems. Total length: 1-2 pages.

  2. Rewrite this bad solution paragraph to make it good:
     "InventoryPro is a cloud-based SaaS platform with barcode
     scanning, RFID support, automated reordering, expiration
     tracking, multi-location management, role-based access,
     custom reports, API integrations, and a mobile app."

  3. How do you handle a capability gap? FreshFoods also wants
     route optimization for delivery trucks, but you don't have
     that feature. Write how you'd address this in the proposal.

  4. What's the ideal length for a solution section? When is it
     too short, and when is it too long?

assertions:
  - type: llm_judge
    criteria: "Solution section maps each need to a capability — follows the 4-part formula (need → capability → outcome → evidence) for each of FreshFoods' 4 problems, not just listing features"
    weight: 0.25
    description: "Need-to-capability mapping"
  - type: llm_judge
    criteria: "Rewrite transforms feature list into value narrative — converts the generic feature dump into prospect-specific benefits, connecting each capability to a FreshFoods problem"
    weight: 0.25
    description: "Feature-to-value transformation"
  - type: llm_judge
    criteria: "Capability gap is handled transparently — acknowledges the route optimization gap honestly, suggests a partner integration or workaround, and doesn't hide the limitation"
    weight: 0.25
    description: "Transparent gap handling"
  - type: llm_judge
    criteria: "Length guidance is practical — provides specific guidelines (e.g., 1-2 pages for mid-market, shorter for SMB) and explains that length should match problem complexity, not word count targets"
    weight: 0.25
    description: "Practical length guidance"
