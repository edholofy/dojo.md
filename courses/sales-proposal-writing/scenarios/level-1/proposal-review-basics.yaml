meta:
  id: proposal-review-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Review and improve proposals before sending — use checklists, peer review, and self-editing to catch common errors"
  tags: [sales, review, editing, quality, checklist, beginner]

state: {}

trigger: |
  You're a junior AE at "PayFlow" (payment processing SaaS, $28M
  ARR). Your team has a mandatory "proposal review" step before any
  proposal is sent. Your manager asks you to review 2 proposals from
  teammates and then create a review checklist.

  Proposal 1 (from teammate Alex):
  Prospect: "ShopEasy" (e-commerce company, 100 employees)

  Executive Summary: "PayFlow is excited to partner with ShopEasy.
  We are the leading payment processing platform with over 1,000
  customers. We offer competitive pricing and best-in-class support."

  Problem Section: "ShopEasy faces some challenges with payment
  processing."

  Solution: "PayFlow will solve these problems with our platform.
  Key features include: multi-currency, fraud detection, recurring
  billing, PCI compliance, and API integration."

  Pricing: "$4,500/month"

  Next Steps: "Let us know if you're interested."

  Proposal 2 (from teammate Jordan):
  Prospect: "TravelMax" (travel booking platform, 300 employees)

  Executive Summary: "TravelMax processes 50,000 transactions/month
  across 12 currencies. With a 2.3% transaction failure rate costing
  approximately $180K/month in lost revenue, and customer complaints
  about payment UX growing 40% quarter-over-quarter, TravelMax
  needs a payment infrastructure that matches its growth trajectory.
  PayFlow's multi-currency engine and smart retry logic can reduce
  failures to under 0.5%, recovering an estimated $160K/month in
  previously lost revenue. At $6,000/month, the investment pays for
  itself 26x over."

  Problem Section: [Detailed, with data from discovery]
  Solution: [Mapped to TravelMax's specific problems]
  Pricing: [Value-framed with ROI comparison]
  Next Steps: "We propose a 30-minute call on Thursday, March 6 to
  finalize technical requirements. If aligned, we can begin
  integration in Week 2 of March."

  Tasks:
  1. Review Proposal 1. List every issue you find, organized by
     section. Rate each issue as Critical, Major, or Minor. What's
     the overall quality score (1-10)?

  2. Review Proposal 2. What does it do well? Are there any
     improvements you'd still suggest?

  3. Create the "Pre-Send Proposal Checklist" with 15 items that
     every proposal should pass before being sent to a prospect.
     Organize by category (content, formatting, accuracy, strategy).

  4. How do you give constructive feedback to Alex (Proposal 1)
     without demoralizing them? Write the opening of your review
     conversation.

assertions:
  - type: llm_judge
    criteria: "Proposal 1 review is thorough — identifies missing personalization, no prospect data in exec summary, vague problem section, feature-dumped solution, unframed pricing, and weak CTA, with correct severity ratings"
    weight: 0.25
    description: "Thorough issue identification"
  - type: llm_judge
    criteria: "Proposal 2 review identifies strengths — recognizes the specific data, ROI framing, value-based pricing, and concrete next steps, while suggesting minor improvements"
    weight: 0.25
    description: "Balanced strength recognition"
  - type: llm_judge
    criteria: "Checklist is comprehensive and organized — 15 items covering content (personalization, data accuracy), formatting (branding, layout), accuracy (pricing, names, dates), and strategy (value framing, next steps)"
    weight: 0.25
    description: "Comprehensive organized checklist"
  - type: llm_judge
    criteria: "Feedback approach is constructive — leads with what Alex did right, uses questions rather than accusations, focuses on the proposal not the person, and provides specific improvement guidance"
    weight: 0.25
    description: "Constructive feedback approach"
