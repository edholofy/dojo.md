meta:
  id: social-proof-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Use social proof effectively in proposals — select relevant case studies, write compelling testimonials, and match proof to prospect needs"
  tags: [sales, social-proof, case-studies, testimonials, beginner]

state: {}

trigger: |
  You're a junior AE at "DataVault" (data security SaaS, $25M ARR).
  Your proposal template includes a "Why DataVault?" section that
  uses social proof. Your manager says: "The right social proof
  closes deals. The wrong social proof loses credibility."

  Your company's social proof assets:
  - 350+ customers across healthcare, finance, tech, and retail
  - Customer logos: Stripe, Mayo Clinic, JPMorgan, Target, Shopify
  - 3 detailed case studies:
    1. "HealthFirst Hospital" — Reduced data breach risk by 85%,
       saved $1.2M in potential HIPAA fines, 200-employee deployment
    2. "FinanceApp" (fintech startup) — SOC 2 compliance achieved
       in 8 weeks (vs. 6-month industry average), 50 employees
    3. "RetailGiant" — Protected 50M customer records, 99.99%
       uptime, 5,000-employee deployment
  - G2 rating: 4.7/5 (220 reviews)
  - Gartner "Cool Vendor" recognition
  - 3 customer quotes available

  Prospect A: "MedDevice Corp" (medical device manufacturer, 300 emp)
  Need: HIPAA compliance, patient data protection
  Decision maker: CISO

  Prospect B: "TechScale" (B2B SaaS startup, 60 employees)
  Need: SOC 2 certification before enterprise sales
  Decision maker: Head of Engineering

  Prospect C: "BankSecure" (community bank, 150 employees)
  Need: Regulatory compliance (FFIEC, GLBA), customer data protection
  Decision maker: Chief Compliance Officer

  Tasks:
  1. For each prospect, select the most relevant social proof
     (case study, logos, quotes, awards). Explain why you chose each
     piece — relevance matters more than impressiveness.

  2. Write the social proof section for Prospect A's proposal.
     Show how you weave the HealthFirst case study into a narrative
     that connects to MedDevice Corp's specific needs.

  3. Prospect B is a small startup. Your biggest case studies are
     enterprises. How do you make social proof work when your
     examples are larger than the prospect? Write the approach.

  4. What makes social proof backfire? Give 3 examples of social
     proof that would HURT a proposal, and explain why.

assertions:
  - type: llm_judge
    criteria: "Social proof selection is relevance-matched — chooses HealthFirst for MedDevice (same industry), FinanceApp for TechScale (same size/need), and positions finance case for BankSecure, with clear reasoning"
    weight: 0.25
    description: "Relevance-matched selection"
  - type: llm_judge
    criteria: "Prospect A narrative connects proof to needs — doesn't just paste the HealthFirst case study but draws parallels between HealthFirst's challenges and MedDevice's specific situation"
    weight: 0.25
    description: "Need-connected narrative"
  - type: llm_judge
    criteria: "Small prospect approach is thoughtful — addresses the size gap by emphasizing shared needs rather than company size, using the FinanceApp case, and positioning scale as a capability they'll grow into"
    weight: 0.25
    description: "Thoughtful size-gap handling"
  - type: llm_judge
    criteria: "Backfire examples are insightful — identifies real problems like irrelevant industries, competitor's customer as reference, outdated case studies, or claims that feel unbelievable without context"
    weight: 0.25
    description: "Insightful backfire examples"
