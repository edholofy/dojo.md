meta:
  id: first-proposal-shift
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write a complete sales proposal from scratch — apply all fundamental skills to produce a professional, persuasive document"
  tags: [sales, proposal, comprehensive, simulation, beginner]

state: {}

trigger: |
  You're a junior AE at "TaskMaster" (task management SaaS, $16M
  ARR). You just finished a great discovery call and your manager
  says: "Write the full proposal. I'll review it before you send."

  Your product:
  - Task management platform with project templates, time tracking,
    resource allocation, and reporting
  - Pricing: $12/user/month (Standard), $22/user/month (Professional),
    $35/user/month (Enterprise)
  - Implementation: 2-4 weeks depending on complexity
  - Integrations: Slack, Jira, Google Workspace, Microsoft 365

  Prospect: "BuildWell Construction" (commercial construction, 150
  employees, $45M revenue)
  Contact: VP of Operations, Tom Rivera
  Decision maker: CEO, Linda Chen (Tom's boss)

  Discovery findings:
  - 20 active construction projects at any time
  - Project managers use a mix of Excel, email, and whiteboards
  - No real-time visibility for leadership on project status
  - Average project delay: 12 days (costs $8K/day in penalties)
  - Tom's team of 8 PMs spend 5 hours/week each on status reports
  - Last year: 2 projects went over budget by 15% ($300K combined)
    because resource conflicts weren't visible
  - Tom's quote: "I need to see everything in one place. Right now,
    I'm flying blind."
  - Team of 45 people would use the platform (PMs, superintendents,
    admin staff)
  - Budget: Tom can approve up to $50K/year. Above that needs CEO.
  - Timeline: Want to implement before Q3 project season
  - Competition: Also looked at Monday.com (liked it but too generic
    for construction)

  Recommended tier: Professional at $22/user × 45 users = $990/month
  ($11,880/year). With implementation: $15,880 first year.

  Tasks:
  1. Write the complete proposal for BuildWell Construction. Include
     all standard sections: cover page (describe it), executive
     summary, problem statement, proposed solution, implementation
     plan, investment summary, social proof (make up relevant case
     studies), team/support, and next steps.

  2. The proposal needs to work for both Tom (your champion) and
     Linda (the CEO who Tom will forward it to). How do you write
     for both audiences in one document?

  3. Monday.com is cheaper ($10/user). BuildWell mentioned this.
     How do you address the competitive pricing in your proposal
     without bashing the competitor?

  4. After writing, review your own proposal against the quality
     checklist. What score would you give it? What would you improve?

assertions:
  - type: llm_judge
    criteria: "Complete proposal covers all sections — includes executive summary, problem statement with BuildWell's data, solution mapped to needs, implementation plan, value-framed pricing, social proof, and specific next steps"
    weight: 0.25
    description: "Complete proposal coverage"
  - type: llm_judge
    criteria: "Dual-audience writing is addressed — explains how to write for both an operational VP (detail-oriented, daily impact) and CEO (strategic, financial, high-level) in one document"
    weight: 0.25
    description: "Dual-audience technique"
  - type: llm_judge
    criteria: "Competitive positioning is value-based — addresses the Monday.com price gap by focusing on construction-specific capabilities, ROI difference, and total cost of ownership rather than feature comparisons"
    weight: 0.25
    description: "Value-based competitive positioning"
  - type: llm_judge
    criteria: "Self-review shows critical thinking — honestly assesses the proposal's strengths and weaknesses, identifies specific areas for improvement, and demonstrates proposal quality awareness"
    weight: 0.25
    description: "Critical self-review"
