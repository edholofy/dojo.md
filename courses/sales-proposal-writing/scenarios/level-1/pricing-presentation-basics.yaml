meta:
  id: pricing-presentation-basics
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Present pricing in proposals effectively — frame value before cost, use anchoring, and structure pricing options clearly"
  tags: [sales, pricing, proposal, value-framing, beginner]

state: {}

trigger: |
  You're a junior AE at "TeamFlow" (project management SaaS).
  Your sales trainer teaches you 5 pricing presentation principles:

  Principle 1: Value Before Price
  Always present the value/ROI BEFORE showing the price. If the
  prospect sees "$50K" before understanding the "$500K problem,"
  the price feels high.

  Principle 2: Anchoring
  Show the cost of the problem first. "$200K in annual waste" makes
  "$50K/year solution" feel like a bargain.

  Principle 3: Tiered Options
  Offer 3 tiers (Good/Better/Best). Most buyers choose the middle.
  This gives them control and prevents a yes/no decision.

  Principle 4: Monthly vs. Annual
  Show both. Monthly feels smaller ($4,000/mo), annual shows
  commitment ($42K/year with 12% discount). Recommend annual.

  Principle 5: Total Cost of Ownership
  Include implementation, training, and ongoing costs. Surprises
  kill deals.

  Practice scenarios:

  Scenario A: Small deal
  Product: TeamFlow Pro ($2,000/month or $20,000/year)
  Prospect: "DesignStudio" (creative agency, 30 employees)
  Their problem costs: $8,000/month in project overruns

  Scenario B: Mid-market deal
  Product: TeamFlow Enterprise ($8,000/month or $84,000/year)
  Prospect: "BuildRight" (construction company, 200 employees)
  Their problem costs: $400K/year in resource conflicts and delays
  Additional: $15K implementation, $5K training

  Scenario C: Competitive pricing situation
  Product: TeamFlow Enterprise ($8,000/month)
  Prospect: "TechStartup" (SaaS company, 80 employees)
  Competitor: Asana at $5,500/month (they told you this)
  Your advantages: Better reporting, custom workflows, dedicated CSM

  Tasks:
  1. Write the pricing section for Scenario A. Apply Principles
     1 and 2 (value before price, anchoring against the problem cost).

  2. Write the pricing section for Scenario B with 3 tiers
     (Standard, Professional, Enterprise). Define what's in each
     tier and recommend the middle option. Include total cost of
     ownership.

  3. For Scenario C, the competitor is cheaper. How do you present
     pricing that justifies the $2,500/month premium? Write the
     pricing narrative.

  4. A prospect says: "Can you just email me the price?" before
     you've presented value. What do you do?

assertions:
  - type: llm_judge
    criteria: "Scenario A anchors against problem cost — presents the $8K/month problem first, then $2K/month solution, making the ROI obvious (4x return) before the prospect fixates on the number"
    weight: 0.25
    description: "Effective price anchoring"
  - type: llm_judge
    criteria: "Scenario B tiers are well-structured — 3 options with clear differentiation, middle tier positioned as best value, total cost of ownership includes implementation and training, and annual discount is highlighted"
    weight: 0.25
    description: "Well-structured tier pricing"
  - type: llm_judge
    criteria: "Competitive pricing justification is value-based — doesn't apologize for the premium but frames it in terms of ROI difference, unique capabilities, and total value delivered vs. price per seat"
    weight: 0.25
    description: "Value-based premium justification"
  - type: llm_judge
    criteria: "Price-before-value response redirects appropriately — explains why context matters for an accurate quote, offers to provide pricing in the context of a brief value discussion, not as a standalone number"
    weight: 0.25
    description: "Appropriate price redirect"
