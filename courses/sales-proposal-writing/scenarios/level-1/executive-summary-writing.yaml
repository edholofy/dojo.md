meta:
  id: executive-summary-writing
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Write compelling executive summaries that capture attention, communicate value, and stand alone as decision-making documents"
  tags: [sales, executive-summary, writing, value-proposition, beginner]

state: {}

trigger: |
  You're a junior AE at "MarketPulse" (marketing analytics platform,
  $30M ARR). Your sales manager says: "The executive summary is the
  most important page in any proposal. 60% of decision makers read
  ONLY this section."

  Executive summary formula:
  1. Opening hook (1-2 sentences that reference their specific pain)
  2. Problem summary (what's happening and why it matters)
  3. Proposed solution (high level, not feature lists)
  4. Expected outcomes (quantified where possible)
  5. Investment overview (pricing context, not just the number)
  6. Why us (1-2 differentiators, not a feature dump)
  7. Recommended next step (specific and time-bound)

  Your manager gives you 3 proposals written by other AEs and asks
  you to evaluate and rewrite each executive summary.

  Proposal A (bad example):
  "MarketPulse is an industry-leading marketing analytics platform
  trusted by over 500 companies. Our AI-powered solution provides
  real-time campaign tracking, multi-touch attribution, predictive
  analytics, and automated reporting. We integrate with 50+ tools
  including Salesforce, HubSpot, and Google Analytics. Our platform
  has won 3 industry awards..."
  [Continues for 2 pages about the product]

  Proposal B (mediocre example):
  "Thank you for the opportunity to present this proposal. After our
  discovery call, we understand that you need better marketing
  analytics. MarketPulse can help with campaign tracking and ROI
  measurement. Our pricing starts at $2,000/month. Please let us
  know if you'd like to move forward."

  Proposal C (for a specific prospect):
  Prospect: "EduTech Corp" (online education, 400 employees, $50M rev)
  Discovery: Their marketing team of 12 spends 20 hours/week manually
  compiling reports from 6 data sources. They can't prove which
  channels drive student enrollments. Last quarter, they wasted
  $200K on channels with zero attributable conversions. The CMO
  has a board meeting in 6 weeks and needs data to justify the
  $3M marketing budget.

  Tasks:
  1. Identify every mistake in Proposal A's executive summary.
     Why would a decision maker stop reading?

  2. Identify what's wrong with Proposal B. It's not terrible —
     so what's missing that would make it compelling?

  3. Write the executive summary for Proposal C (EduTech Corp)
     using the 7-part formula. Limit it to 1 page.

  4. Write 3 different opening hooks for Proposal C. Which is
     strongest, and why?

assertions:
  - type: llm_judge
    criteria: "Proposal A critique identifies product-centricity — explains that it talks entirely about MarketPulse without mentioning the prospect, their problems, or expected outcomes"
    weight: 0.25
    description: "Product-centric critique"
  - type: llm_judge
    criteria: "Proposal B critique identifies missed depth — recognizes it's brief and generic, lacks specific pain points, has no quantified value, and the next step is vague"
    weight: 0.25
    description: "Missing-depth critique"
  - type: llm_judge
    criteria: "EduTech executive summary follows the formula — includes all 7 elements, references specific discovery data ($200K waste, 20 hrs/week, 6-week board deadline), and fits on 1 page"
    weight: 0.25
    description: "Formula-following executive summary"
  - type: llm_judge
    criteria: "Opening hooks vary in approach — provides at least 3 distinct hooks (e.g., pain-led, outcome-led, question-led) and correctly identifies which is most compelling with reasoning"
    weight: 0.25
    description: "Varied compelling hooks"
