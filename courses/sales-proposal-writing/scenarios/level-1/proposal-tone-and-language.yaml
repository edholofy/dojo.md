meta:
  id: proposal-tone-and-language
  level: 1
  course: sales-proposal-writing
  type: output
  description: "Master the right tone and language for sales proposals — buyer-centric writing, avoiding jargon, active voice, and professional persuasion"
  tags: [sales, writing, tone, language, buyer-centric, beginner]

state: {}

trigger: |
  You're a junior AE at "LearnHub" (corporate training SaaS, $15M
  ARR). Your VP of Sales reviews proposals from the team and creates
  a "writing clinic" with real examples of what to fix.

  Writing rules:
  1. "You" > "We": The proposal should be about the prospect, not
     about you. Count the "we/our" vs. "you/your" — aim for 3:1
     ratio of "you" to "we."
  2. Active voice > Passive voice: "LearnHub reduces training time"
     not "Training time is reduced by LearnHub."
  3. Simple > Complex: Write at an 8th-grade reading level. No
     jargon unless the prospect uses it.
  4. Specific > Generic: "Reduce onboarding time from 3 weeks to 5
     days" not "Dramatically improve onboarding efficiency."
  5. Benefits > Features: "Your managers reclaim 10 hours/month"
     not "AI-powered automated course assignment."

  Editing exercises:

  Passage 1 (fix "we" focus):
  "We are proud to be the leading provider of corporate training
  solutions. Our platform has been recognized by Gartner and
  Forrester. We serve over 500 enterprise clients. Our team of
  experts has 50+ years of combined experience. We believe our
  solution is the best fit for your organization."

  Passage 2 (fix passive voice):
  "Training completion rates are improved by 40% when LearnHub is
  implemented. Course assignments are automatically generated based
  on role requirements. Employee progress is tracked in real-time
  and reports are generated weekly."

  Passage 3 (fix jargon):
  "LearnHub's proprietary NLP-driven adaptive learning engine
  leverages machine learning algorithms to dynamically optimize
  the learner journey through multimodal content delivery,
  ensuring synergistic alignment with competency frameworks."

  Passage 4 (fix generic language):
  "LearnHub dramatically improves training outcomes, significantly
  reduces administrative burden, and delivers industry-leading ROI.
  Our solution is best-in-class, cutting-edge, and transformative."

  Tasks:
  1. Rewrite each of the 4 passages following the writing rules.
     For each, explain what was wrong and why your version is better.

  2. Write a 200-word proposal paragraph for this scenario using
     all 5 rules: Prospect "TechCorp" (500 employees) spends
     $400K/year on training but only 55% of employees complete
     required courses. Manager compliance with training assignments
     is 30%. HR spends 20 hours/week chasing completions.

  3. Create a "proposal language cheat sheet" — a reference card
     with 10 phrases to avoid and 10 better alternatives. Make them
     specific to sales proposals, not generic writing tips.

  4. When is it appropriate to break these rules? Give 2 examples
     where jargon, passive voice, or "we" focus is actually the
     right choice.

assertions:
  - type: llm_judge
    criteria: "Rewrites follow all rules — Passage 1 shifts to prospect-focused, Passage 2 uses active voice, Passage 3 eliminates jargon, Passage 4 adds specifics, each with clear explanation of improvement"
    weight: 0.25
    description: "Rule-following rewrites"
  - type: llm_judge
    criteria: "TechCorp paragraph is exemplary — uses 'you' more than 'we,' active voice, simple language, specific numbers ($400K, 55%, 20 hrs/week), and focuses on benefits over features"
    weight: 0.25
    description: "Exemplary buyer-centric paragraph"
  - type: llm_judge
    criteria: "Cheat sheet is sales-specific — includes proposal-specific phrases to avoid ('best-in-class,' 'leverage,' 'synergy') with concrete alternatives, not generic writing advice"
    weight: 0.25
    description: "Sales-specific cheat sheet"
  - type: llm_judge
    criteria: "Rule-breaking examples are valid — identifies legitimate cases like using technical jargon for IT audiences or 'we' focus when establishing credibility in the 'Why Us' section"
    weight: 0.25
    description: "Valid rule-breaking exceptions"
