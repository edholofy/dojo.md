meta:
  id: master-debugging-shift
  level: 5
  course: terraform-infrastructure-setup
  type: output
  description: "Combined master shift — serve as fractional CTO advising on complete IaC platform strategy encompassing technology, people, process, and business alignment"
  tags: [Terraform, troubleshooting, combined, shift-simulation, CTO, master]

state: {}

trigger: |
  You're engaged as a fractional CTO for a Series B healthtech
  startup ($30M raised, 80 engineers). They've been growing fast
  and their infrastructure management is breaking down.

  Technical challenges:
  - 150 AWS resources, 40% managed by Terraform, 60% console-created
  - Single S3 state file (no locking, no encryption, no versioning)
  - 15 "modules" that are actually just copy-pasted directories
  - terraform apply from 3 different laptops, no CI/CD
  - Monthly AWS bill: $60K, growing 25% MoM with no cost controls
  - Last month: production outage when engineer applied wrong workspace

  People challenges:
  - 2-person "DevOps team" supporting 80 engineers (massive bottleneck)
  - Engineers afraid of Terraform (3 past incidents from bad applies)
  - No on-call rotation — CTO handles all infrastructure emergencies
  - No documentation — tribal knowledge in 2 people's heads

  Business context:
  - Series C fundraising in 9 months
  - 3 enterprise prospects require SOC2 and HIPAA compliance
  - Board concerned about "operational maturity"
  - Competitors with stronger platforms winning enterprise deals
  - CEO: "Fix the infrastructure. Make it enterprise-grade."

  Task: Design the comprehensive 9-month roadmap for Series C
  readiness. Write: phased approach, hiring plan, IaC standardization,
  compliance sprint, cost optimization, and board presentation strategy.

assertions:
  - type: llm_judge
    criteria: "Phased roadmap is actionable — Month 1-2 (Stabilize): encrypt and version S3 state, add DynamoDB locking, set up Terraform Cloud (free tier initially), implement CI/CD pipeline (plan on PR, apply on merge), stop all laptop applies. Month 3-4 (Standardize): import console-created resources into Terraform, create module library from copy-paste configs, establish naming conventions and tagging. Month 5-6 (Secure): SOC2 gap assessment, implement compliance-as-code (checkov), encrypt all data at rest, enable CloudTrail and Config, HIPAA risk assessment. Month 7-8 (Scale): hire additional platform engineers, implement Infracost for cost governance, establish on-call rotation. Month 9 (Demonstrate): enterprise readiness demos, Series C preparation materials, board metrics dashboard"
    weight: 0.35
    description: "Phased roadmap"
  - type: llm_judge
    criteria: "Hiring and team building are justified — immediate hires: (1) Senior Platform Engineer (IaC expert — build the module library, CI/CD, and standards), (2) Security/Compliance Engineer (SOC2/HIPAA — enterprise deal blocker, must start in month 1). Month 3-4: (3) Platform Engineer #2 (scale the platform work, reduce bus factor from 2 to 4 people). Month 5-6: (4) SRE (on-call rotation, incident management, observability). Team structure: platform team of 4 supporting 80+ engineers (1:20 ratio is sustainable). DevOps team transitions to platform engineering focus. Engineer enablement: monthly Terraform workshops, office hours, internal documentation wiki"
    weight: 0.35
    description: "Hiring and team"
  - type: llm_judge
    criteria: "Business outcomes and board narrative are compelling — cost optimization target: reduce from $60K to $48K/month (20% savings) through: right-sizing dev instances, eliminating unused resources, implementing auto-shutdown for non-prod. SOC2 Type I: achievable in 6 months (Type II requires 6 months of evidence — start Type I immediately). Board narrative: 'Infrastructure maturity is our path to enterprise revenue. Each enterprise customer is worth $500K+ ARR. 3 prospects blocked by compliance = $1.5M ARR at risk. $300K investment in platform and compliance unlocks $1.5M+ in enterprise pipeline.' Series C readiness metrics: IaC coverage > 90%, deployment frequency (weekly → daily), MTTR < 30 minutes, SOC2 Type I certified, zero unplanned outages for 3 consecutive months"
    weight: 0.30
    description: "Business outcomes"
