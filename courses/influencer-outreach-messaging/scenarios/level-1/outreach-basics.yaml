meta:
  id: outreach-basics
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Understand influencer outreach fundamentals — learn the principles of effective outreach, why influencers respond or ignore, and the anatomy of a successful first contact"
  tags: [influencer, outreach, basics, first-contact, fundamentals, basics]

state: {}

trigger: |
  Influencer outreach is the process of contacting content creators
  to propose collaborations, partnerships, or sponsored content.
  Most outreach messages get ignored — understanding why separates
  successful partnerships from wasted effort.

  Part 1: Influencer outreach fundamentals
  1. Why influencer outreach matters:
     - 89% of marketers say influencer ROI is comparable
       or better than other channels
     - Authentic partnerships outperform paid ads in trust
     - The creator economy is a $250B+ industry
  2. Why outreach fails (common mistakes):
     - Generic copy-paste messages
     - Not researching the influencer's content
     - Leading with your needs, not their value
     - Wrong influencer-brand fit
     - Too formal or too casual tone
     - Unclear expectations and deliverables
  3. The outreach mindset:
     - You're proposing a collaboration, not asking a favor
     - The influencer is evaluating you too
     - Mutual value is the foundation
     - Respect their time and creative autonomy

  Part 2: Anatomy of a successful outreach message
  Break down the key components:
  1. Subject line / opening line (for email or DM)
     - Personalization that shows you know their work
     - Intrigue without clickbait
  2. The connection:
     - Why you're reaching out to THEM specifically
     - Reference specific content they've created
  3. The value proposition:
     - What's in it for them (not just for you)
     - Clear but not overwhelming detail
  4. The ask:
     - Simple, low-commitment first step
     - Not "here's a 20-point campaign brief"
  5. The close:
     - Professional but warm
     - Easy to respond to

  Write 5 example outreach messages for a skincare brand
  reaching out to beauty micro-influencers (10K-50K followers):
  - 1 email outreach
  - 1 Instagram DM
  - 1 TikTok comment-to-DM approach
  - 1 LinkedIn message (for B2B skincare professional)
  - 1 follow-up message (after no response)

  Part 3: Outreach channel selection
  1. When to use email vs. DM vs. other channels
  2. Finding the right contact information
  3. Outreach timing (best days, times, and frequency)

assertions:
  - type: llm_judge
    criteria: "All 5 outreach messages are personalized and specific — they reference the influencer's content and explain why this partnership makes sense for them"
    weight: 0.30
    description: "Personalized outreach messages"
  - type: llm_judge
    criteria: "Messages lead with value for the influencer — the pitch explains what they gain, not just what the brand wants"
    weight: 0.25
    description: "Value-first messaging"
  - type: llm_judge
    criteria: "Each channel's message is appropriately formatted — email is professional, DM is casual, LinkedIn is business-oriented"
    weight: 0.25
    description: "Channel-appropriate formatting"
  - type: llm_judge
    criteria: "The follow-up message is persistent without being pushy — it adds new information or value rather than just saying 'did you see my message?'"
    weight: 0.20
    description: "Non-pushy follow-up"
