meta:
  id: compensation-models
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Understand influencer compensation models — learn product gifting, flat fees, revenue sharing, affiliate programs, and usage rights pricing to make fair offers"
  tags: [influencer, compensation, pricing, payment, gifting, basics]

state: {}

trigger: |
  Influencer compensation varies widely by tier, platform, content
  type, and usage rights. Understanding compensation models helps
  you make fair offers that attract quality creators while
  staying within budget.

  Part 1: Compensation model overview
  Explain each model with pros, cons, and best use cases:
  1. Product gifting (sending free products):
     - When it works (nano/micro, genuine fans)
     - When it's insulting (larger influencers, expensive asks)
     - How to position gifting attractively
  2. Flat fee (fixed payment per deliverable):
     - Industry rate ranges by tier and platform
     - Per-post vs. per-campaign pricing
     - Factors that affect pricing
  3. Revenue sharing / commission:
     - Percentage structures (10-30% typical)
     - When creators prefer this model
     - Tracking and attribution challenges
  4. Affiliate programs:
     - Commission rates by industry
     - Setting up affiliate tracking
     - Long-term passive income appeal
  5. Hybrid models:
     - Base fee + performance bonus
     - Product + payment combination
     - Retainer-based partnerships
  6. Usage rights pricing:
     - Organic only vs. paid amplification
     - Exclusivity fees
     - Content licensing terms

  Part 2: Create compensation packages
  For "Luminary Watches" — a mid-range watch brand ($200-$500 price point):
  Design 5 compensation packages:
  1. Nano influencer (5K followers): Product gifting package
  2. Micro influencer (30K followers): Flat fee + gifting
  3. Mid-tier influencer (200K followers): Campaign package
  4. Affiliate program: Open enrollment structure
  5. Brand ambassador: Long-term retainer package

  For each package include:
  - What's offered (product, payment amounts, perks)
  - What's expected (deliverables, timeline, usage rights)
  - How to present the offer in the outreach message
  - Rate justification (why this is fair market value)

  Part 3: Negotiation basics
  1. When influencers counter-offer (and how to respond)
  2. What to never negotiate on (usage rights, exclusivity)
  3. Red flags in influencer rate cards
  4. Building long-term value vs. one-time transactions

assertions:
  - type: llm_judge
    criteria: "All compensation models are accurately described with realistic rate ranges — pricing reflects actual influencer market rates"
    weight: 0.30
    description: "Accurate compensation rates"
  - type: llm_judge
    criteria: "The 5 compensation packages are appropriately scaled — nano gets gifting while mid-tier gets a proper campaign package"
    weight: 0.25
    description: "Appropriately scaled packages"
  - type: llm_judge
    criteria: "Outreach messaging for each package presents compensation attractively — the offer sounds appealing, not transactional"
    weight: 0.25
    description: "Attractive compensation presentation"
  - type: llm_judge
    criteria: "Negotiation guidance is practical — it addresses real scenarios like counter-offers and rate card analysis"
    weight: 0.20
    description: "Practical negotiation guidance"
