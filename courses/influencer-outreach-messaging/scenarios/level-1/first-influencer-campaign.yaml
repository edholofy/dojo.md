meta:
  id: first-influencer-campaign
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Plan your first complete influencer campaign — bring together research, outreach, briefs, compliance, and management into a ready-to-execute influencer marketing plan"
  tags: [influencer, first-campaign, complete, capstone, planning, basics]

state: {}

trigger: |
  Bringing it all together — plan a complete influencer campaign
  from identification to execution, combining research, outreach
  messaging, campaign briefs, compensation, and compliance into
  a single actionable plan.

  Plan a complete influencer campaign for:
  Brand: "Zenith Coffee Roasters" — a specialty coffee brand
  Budget: $3,000 total for the campaign
  Goal: Launch a new cold brew line, drive trial and awareness
  Timeline: 4 weeks
  Platforms: Instagram and TikTok
  Target audience: Coffee enthusiasts, 25-40, urban

  The campaign plan should include:

  1. Influencer strategy (who to target):
     - Recommended tier mix (how many at each tier)
     - 5 influencer profiles to target (hypothetical but realistic)
     - Evaluation scores for each using your criteria
     - Budget allocation across influencers

  2. Outreach plan:
     - Outreach timeline (when to reach out to each)
     - Complete outreach message for each influencer
       (customized to their style and content)
     - Follow-up schedule
     - Expected response rate and backup options

  3. Campaign brief:
     - Complete campaign brief for the selected influencers
     - Deliverables per influencer
     - Creative direction and guidelines
     - Hashtags and required elements

  4. Compensation and logistics:
     - Payment structure per influencer
     - Product shipping plan
     - FTC compliance requirements
     - Content approval process

  5. Success metrics:
     - KPIs for the campaign
     - How to track and measure results
     - Post-campaign analysis plan

assertions:
  - type: llm_judge
    criteria: "The campaign plan is complete and realistic — $3,000 is allocated effectively across influencers with appropriate tier selection for a coffee brand"
    weight: 0.30
    description: "Complete realistic campaign plan"
  - type: llm_judge
    criteria: "Outreach messages are personalized to each influencer profile — each message references the influencer's specific content style and audience"
    weight: 0.25
    description: "Personalized outreach messages"
  - type: llm_judge
    criteria: "The campaign brief provides clear creative direction — influencers know what to create without losing their authentic voice"
    weight: 0.25
    description: "Clear creative direction"
  - type: llm_judge
    criteria: "Success metrics are measurable and tied to the campaign goal — KPIs connect to awareness and trial objectives, not just vanity metrics"
    weight: 0.20
    description: "Goal-tied success metrics"
