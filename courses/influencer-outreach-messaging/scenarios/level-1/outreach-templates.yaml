meta:
  id: outreach-templates
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Create reusable outreach templates — build a library of customizable templates for different outreach scenarios, platforms, and influencer types"
  tags: [influencer, templates, outreach, library, reusable, basics]

state: {}

trigger: |
  Outreach templates save time while maintaining personalization.
  The key is creating templates with clear customization points
  so each message feels personal while maintaining consistent
  brand messaging and professional quality.

  Part 1: Template design principles
  1. Template structure:
     - Fixed elements (brand intro, value prop framework)
     - Variable elements (personalization, specific references)
     - Customization markers ([THEIR NAME], [SPECIFIC POST])
  2. Template categories:
     - By platform (email, IG DM, TikTok, LinkedIn)
     - By tier (nano, micro, mid, macro)
     - By purpose (gifting, paid, ambassador, event)
     - By relationship stage (cold, warm, re-engagement)
  3. The personalization spectrum:
     - Minimum viable personalization (name + 1 specific detail)
     - Medium personalization (references content, shows research)
     - High personalization (deeply researched, custom pitch)
     - When each level is appropriate

  Part 2: Build a template library
  For "Verdant Gardens" — a plant and gardening supplies brand:
  Create 10 outreach templates:

  1. Cold email — product seeding (micro influencer)
  2. Cold email — paid collaboration (mid-tier)
  3. Instagram DM — first contact (nano)
  4. Instagram DM — warm outreach (already follows brand)
  5. TikTok DM — trending content opportunity
  6. Follow-up #1 — 5 days after no response
  7. Follow-up #2 — 10 days, new angle
  8. Re-engagement — past collaborator, new campaign
  9. Event invitation — plant care workshop
  10. Ambassador program invitation — long-term partnership

  For each template include:
  - The complete template with [customization brackets]
  - Platform and use case
  - Personalization guide (what to research and insert)
  - Example of the template filled in for a specific influencer

  Part 3: Template management
  1. Organizing templates for team use
  2. A/B testing template variations
  3. Updating templates based on response rates
  4. When to go fully custom (no template)

assertions:
  - type: llm_judge
    criteria: "All 10 templates are complete with customization brackets — each has clear variable elements that must be personalized"
    weight: 0.30
    description: "Complete templates with customization"
  - type: llm_judge
    criteria: "Templates are distinct — each serves a clearly different purpose and isn't just a slight variation of another"
    weight: 0.25
    description: "Distinct template purposes"
  - type: llm_judge
    criteria: "Filled-in examples demonstrate effective personalization — the customized versions show how research transforms the template into a genuine message"
    weight: 0.25
    description: "Effective personalization examples"
  - type: llm_judge
    criteria: "Template management guidance is practical — A/B testing and updating processes are achievable without complex systems"
    weight: 0.20
    description: "Practical template management"
