meta:
  id: dm-outreach
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Master DM outreach — write effective direct messages on Instagram, TikTok, and other platforms that start conversations with influencers"
  tags: [influencer, dm, direct-message, instagram, tiktok, basics]

state: {}

trigger: |
  Direct messages (DMs) are the fastest and most personal way to
  reach influencers, especially nano and micro creators who may
  not have management or a business email. DM outreach requires
  a different approach than email — more conversational, shorter,
  and platform-native.

  Part 1: DM outreach fundamentals
  1. DM vs. email outreach:
     - When DMs work better (smaller influencers, quick asks)
     - When email is better (detailed proposals, larger influencers)
     - The DM-to-email bridge (starting on DM, moving to email)
  2. Platform-specific DM etiquette:
     - Instagram: Message requests, character limits, voice notes
     - TikTok: Creator inbox, comment-first strategy
     - Twitter/X: Character limits, public vs. private approach
     - YouTube: Community tab, about page email
  3. DM message structure:
     - First line (hook — they see this in notification preview)
     - Body (concise, 2-3 short sentences max)
     - CTA (specific, easy to respond to)
     - Tone (casual but professional, match their energy)

  Part 2: Write DM outreach messages
  For "Spark Fitness" — a fitness app launching an ambassador program:
  1. Instagram DM to a fitness micro-influencer (20K followers)
  2. TikTok DM to a workout content creator (50K followers)
  3. Instagram DM to a wellness nano-influencer (5K followers)
  4. Comment-to-DM strategy:
     - 3 engaging comments to post first (before DM)
     - The DM that references the comment relationship
  5. Voice note DM outline (for Instagram/TikTok):
     - What to say in a 30-second voice message
     - When voice notes outperform text DMs
  6. Follow-up DM (5 days after no response):
     - Adding value without being annoying

  For each message:
  - The complete message text
  - Platform it's designed for
  - Why this approach works on this platform
  - Character count and format notes

  Part 3: DM outreach best practices
  1. Building rapport before the pitch (engagement strategy)
  2. Red flags that get you blocked or reported
  3. Managing DM conversations after initial contact
  4. Moving from DM to formal partnership

assertions:
  - type: llm_judge
    criteria: "All DM messages are appropriately concise — they respect platform norms and don't read like emails crammed into a DM"
    weight: 0.30
    description: "Appropriately concise DMs"
  - type: llm_judge
    criteria: "The comment-to-DM strategy is genuine — the 3 comments show real engagement with the creator's content, not empty praise"
    weight: 0.25
    description: "Genuine engagement strategy"
  - type: llm_judge
    criteria: "Platform differences are respected — Instagram DMs differ from TikTok DMs in tone and approach"
    weight: 0.25
    description: "Platform-native approaches"
  - type: llm_judge
    criteria: "Voice note guidance is practical — the 30-second outline covers key points without being awkward or scripted"
    weight: 0.20
    description: "Practical voice note guidance"
