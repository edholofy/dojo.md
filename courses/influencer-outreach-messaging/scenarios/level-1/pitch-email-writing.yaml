meta:
  id: pitch-email-writing
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Write compelling pitch emails — craft professional outreach emails that get opened, read, and replied to by influencers"
  tags: [influencer, pitch, email, outreach, writing, basics]

state: {}

trigger: |
  Email remains one of the most effective channels for influencer
  outreach, especially for mid-tier and above. A well-crafted
  pitch email stands out in a crowded inbox and clearly
  communicates value, expectations, and next steps.

  Part 1: Pitch email components
  1. Subject lines that get opened:
     - Personalized subject lines (+26% open rate)
     - Name-dropping their content ("Loved your [specific post]")
     - Curiosity-driven ("Partnership idea for [their niche]")
     - Subject lines to avoid (ALL CAPS, "opportunity," too vague)
  2. Email body structure:
     - Opening hook (personal connection, 1-2 sentences)
     - Brand introduction (brief, relevant to them)
     - Partnership idea (specific, not vague "collaboration")
     - Compensation signal (what's in it for them)
     - Call to action (simple next step)
     - Signature (professional with social proof)
  3. Email formatting:
     - Ideal length (150-300 words)
     - Paragraph structure (short, scannable)
     - Mobile optimization (most read on phone)

  Part 2: Write pitch emails
  For "Bloom Botanicals" — a plant-based supplement brand:
  Write 5 complete pitch emails for different scenarios:
  1. Cold outreach to a wellness micro-influencer
     who's never heard of the brand
  2. Warm outreach to an influencer who already
     follows the brand and has engaged with content
  3. Re-engagement email to a past collaborator
     for a new campaign
  4. Product seeding email (gifting product, no payment)
  5. Paid partnership proposal with specific deliverables
     and compensation

  For each email, include:
  - Subject line
  - Complete email body
  - What makes this email effective
  - Common mistakes to avoid for this type

  Part 3: Email outreach optimization
  1. A/B testing subject lines
  2. When to send (timing and frequency)
  3. Follow-up sequence (timing and content)
  4. Managing responses and next steps

assertions:
  - type: llm_judge
    criteria: "All 5 pitch emails are complete, professional, and would genuinely appeal to an influencer — not generic templates"
    weight: 0.30
    description: "Complete professional pitch emails"
  - type: llm_judge
    criteria: "Subject lines are creative and varied — each uses a different approach and would stand out in a busy inbox"
    weight: 0.25
    description: "Creative varied subject lines"
  - type: llm_judge
    criteria: "Each email scenario is distinct — cold vs. warm vs. re-engagement emails have fundamentally different approaches and tones"
    weight: 0.25
    description: "Distinct email scenarios"
  - type: llm_judge
    criteria: "Common mistakes are specific — not generic 'be professional' but specific errors like 'don't lead with follower count requirements'"
    weight: 0.20
    description: "Specific mistake identification"
