meta:
  id: campaign-brief-basics
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Write basic campaign briefs — create clear, actionable briefs that tell influencers exactly what you need while leaving room for creative freedom"
  tags: [influencer, campaign-brief, deliverables, guidelines, creative, basics]

state: {}

trigger: |
  A campaign brief is the document you share with influencers
  after they agree to collaborate. It outlines deliverables,
  timelines, brand guidelines, and creative direction. A great
  brief gives enough direction for on-brand content while
  leaving room for the influencer's authentic voice.

  Part 1: Campaign brief components
  1. Campaign overview:
     - Campaign name and objective
     - Key messaging and talking points
     - Target audience for this campaign
  2. Deliverables:
     - Content type and format (post, reel, story, etc.)
     - Number of pieces
     - Platform(s)
     - Timeline and deadlines
  3. Brand guidelines:
     - Do's and don'ts
     - Required mentions (brand name, hashtags, tags)
     - Visual guidelines (product styling, background)
     - Key phrases to include/avoid
  4. Creative direction:
     - Mood and tone references
     - Example content (inspiration, not imitation)
     - Creative freedom parameters
  5. Logistics:
     - Approval process (review before posting?)
     - FTC disclosure requirements (#ad, #sponsored)
     - Content rights and usage
     - Payment terms and timeline

  Part 2: Write 3 campaign briefs
  For "Maple & Main" — a home fragrance brand launching a
  holiday candle collection:

  Brief 1: Instagram Reel campaign
  - 1 reel (15-30 seconds) + 3 Stories
  - Holiday cozy at-home aesthetic
  - Micro-influencer audience (lifestyle, home decor)
  - Complete brief with all sections filled in

  Brief 2: TikTok unboxing campaign
  - 1 TikTok (30-60 seconds) showing unboxing and first impressions
  - Authentic, genuine reaction style
  - Nano to micro-influencer audience
  - Complete brief

  Brief 3: Blog + Instagram package
  - 1 blog post (800+ words) + 2 Instagram feed posts
  - SEO-focused gift guide inclusion
  - Mid-tier lifestyle blogger
  - Complete brief

  Part 3: Brief best practices
  1. How much creative freedom to give (the spectrum)
  2. Getting influencer input on the brief
  3. Handling revision requests without micromanaging
  4. Brief templates vs. custom briefs

assertions:
  - type: llm_judge
    criteria: "All 3 campaign briefs are complete with every section filled in — deliverables, timelines, guidelines, and logistics are all specified"
    weight: 0.30
    description: "Complete campaign briefs"
  - type: llm_judge
    criteria: "Briefs balance direction with creative freedom — they guide the influencer without scripting every word"
    weight: 0.25
    description: "Direction-freedom balance"
  - type: llm_judge
    criteria: "FTC disclosure requirements are clearly included — each brief specifies exactly how the influencer should disclose the partnership"
    weight: 0.25
    description: "Clear FTC disclosure guidance"
  - type: llm_judge
    criteria: "Each brief is tailored to its format — the Reel brief focuses on visual direction while the blog brief includes SEO requirements"
    weight: 0.20
    description: "Format-specific brief tailoring"
