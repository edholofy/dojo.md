meta:
  id: influencer-research
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Research influencers before outreach — learn how to identify, vet, and evaluate potential influencer partners to ensure brand fit and audience authenticity"
  tags: [influencer, research, vetting, identification, evaluation, basics]

state: {}

trigger: |
  Effective outreach starts with thorough research. Identifying
  the right influencers, verifying their audience authenticity,
  and understanding their content style ensures your outreach
  targets creators who will genuinely move the needle.

  Part 1: Influencer identification
  1. Finding influencers:
     - Hashtag and keyword searching on platforms
     - Competitor analysis (who are competitors working with?)
     - Audience listening (who does YOUR audience follow?)
     - Influencer discovery platforms (tools and databases)
     - Industry events and communities
  2. Evaluation criteria:
     - Audience demographics (age, location, interests)
     - Engagement rate calculation (likes + comments / followers)
     - Content quality and consistency
     - Brand alignment and values fit
     - Posting frequency and platform activity
     - Previous brand partnerships (what brands they've worked with)
  3. Red flags to watch for:
     - Fake followers (sudden spikes, bot comments)
     - Engagement pods (artificial engagement)
     - Controversial history or brand safety risks
     - Too many sponsored posts (audience fatigue)
     - Inconsistent posting or declining metrics

  Part 2: Build an influencer research profile
  For "Horizon Travel" — a sustainable travel brand:
  1. Create a research template with 15 evaluation criteria
     organized into categories:
     - Audience metrics (5 criteria)
     - Content quality (5 criteria)
     - Brand fit (5 criteria)
  2. Using the template, evaluate 3 hypothetical influencers:
     - Influencer A: Travel photographer (80K IG followers)
       Strong visuals, moderate engagement, luxury travel focus
     - Influencer B: Eco-travel blogger (25K followers)
       Mission-aligned, high engagement, smaller reach
     - Influencer C: Adventure vlogger (200K YouTube)
       High production value, young audience, some controversy
  3. Score each influencer and recommend:
     - Which to outreach first and why
     - Which to skip and why
     - What to verify before sending outreach

  Part 3: Research tools and workflows
  1. Free vs. paid research tools
  2. Creating an influencer database/CRM
  3. How much research is enough (diminishing returns)
  4. Keeping research current (influencer landscapes change)

assertions:
  - type: llm_judge
    criteria: "The 15-criteria evaluation template is comprehensive and practical — criteria are measurable and cover audience quality, content fit, and brand alignment"
    weight: 0.30
    description: "Comprehensive evaluation template"
  - type: llm_judge
    criteria: "The 3 influencer evaluations show nuanced analysis — scores reflect trade-offs between reach, engagement, alignment, and risk"
    weight: 0.25
    description: "Nuanced influencer evaluations"
  - type: llm_judge
    criteria: "Red flag identification is specific — not just 'check for fake followers' but specific indicators like engagement rate anomalies and comment quality"
    weight: 0.25
    description: "Specific red flag identification"
  - type: llm_judge
    criteria: "The recommendation prioritizes strategic fit over reach — the best influencer for the brand may not be the one with the most followers"
    weight: 0.20
    description: "Strategic fit prioritization"
