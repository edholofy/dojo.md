meta:
  id: influencer-tiers
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Understand influencer tiers — learn the differences between nano, micro, mid-tier, macro, and mega influencers and how outreach strategy changes for each"
  tags: [influencer, tiers, nano, micro, macro, mega, basics]

state: {}

trigger: |
  Influencer tiers define audience size ranges, and each tier
  requires a different outreach approach, compensation model,
  and partnership structure. Understanding these tiers helps
  you target the right creators for your goals and budget.

  Part 1: Influencer tier breakdown
  For each tier, explain:
  - Follower range and typical engagement rates
  - Strengths and weaknesses
  - Best use cases for brands
  - Typical compensation expectations
  - Outreach approach differences

  1. Nano influencers (1K-10K followers)
  2. Micro influencers (10K-100K followers)
  3. Mid-tier influencers (100K-500K followers)
  4. Macro influencers (500K-1M followers)
  5. Mega influencers (1M+ followers)

  Part 2: Tier-appropriate outreach messages
  For "Alpine Trail Co." — an outdoor gear startup with a
  $5,000 monthly influencer budget:
  1. Write an outreach message for each tier:
     - Nano: Direct, personal, product-gifting focus
     - Micro: Professional but warm, collaboration-oriented
     - Mid-tier: More formal, detailed value proposition
     - Macro: Agent-ready, clear budget and expectations
     - Mega: Brief, high-level, agency-to-agency approach
  2. For each message, explain:
     - Why the tone and approach differ
     - What compensation to offer at this tier
     - Expected response rate
     - How to handle their response

  Part 3: Choosing the right tier
  1. Budget-to-tier matching guide
  2. When multiple nano/micro beats one macro
  3. The "messy middle" — mid-tier challenges
  4. Building a mixed-tier influencer strategy

assertions:
  - type: llm_judge
    criteria: "All 5 tiers are accurately described with realistic engagement rates and compensation expectations"
    weight: 0.25
    description: "Accurate tier descriptions"
  - type: llm_judge
    criteria: "Outreach messages genuinely differ by tier — the nano message doesn't read like a scaled-down macro message"
    weight: 0.30
    description: "Tier-differentiated outreach"
  - type: llm_judge
    criteria: "Budget allocation advice is practical — a $5,000/month budget is distributed realistically across recommended tiers"
    weight: 0.25
    description: "Practical budget allocation"
  - type: llm_judge
    criteria: "The mixed-tier strategy recommendation is strategic — it explains when to combine tiers for maximum impact"
    weight: 0.20
    description: "Strategic tier mixing"
