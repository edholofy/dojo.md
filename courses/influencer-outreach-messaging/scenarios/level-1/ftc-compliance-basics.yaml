meta:
  id: ftc-compliance-basics
  level: 1
  course: influencer-outreach-messaging
  type: output
  description: "Understand FTC compliance for influencer outreach — learn disclosure requirements, partnership transparency rules, and how to communicate compliance expectations to influencers"
  tags: [influencer, ftc, compliance, disclosure, legal, basics]

state: {}

trigger: |
  FTC (Federal Trade Commission) disclosure rules require that
  influencer partnerships be clearly disclosed to audiences.
  Brands are responsible for ensuring influencers comply — and
  violations can result in fines up to $50,000+ per incident.
  Understanding compliance is essential from the first outreach.

  Part 1: FTC compliance fundamentals
  1. What requires disclosure:
     - Any material connection (payment, free products, affiliate)
     - Gifted products (even if no payment)
     - Family/employee relationships
     - Anything that could affect credibility
  2. How to disclose properly:
     - Clear and conspicuous placement
     - #ad, #sponsored, #partner (accepted terms)
     - Platform-specific tools (Instagram's "Paid Partnership")
     - What doesn't count (buried in hashtags, ambiguous language)
  3. FTC enforcement:
     - Penalty amounts ($43,792+ per violation)
     - Recent enforcement cases and lessons
     - Brand vs. influencer responsibility
     - International equivalents (ASA in UK, ARPP in France)
  4. What NOT to do:
     - "Just mention our product naturally"
     - Hiding disclosures below the fold
     - #collab instead of #ad
     - Assuming small influencers don't need to disclose

  Part 2: Compliance in outreach messaging
  For "PureFit Nutrition" — a sports nutrition brand:
  1. Write compliance-aware outreach messages:
     - Initial pitch email that mentions disclosure expectations
     - Campaign brief section on FTC compliance
     - Pre-posting checklist for influencers
  2. Create a compliance guide for influencers:
     - Simple, 1-page guide explaining what they need to do
     - Platform-specific disclosure instructions
     - Examples of compliant vs. non-compliant posts
     - What to do if they forget to disclose
  3. Design a compliance monitoring process:
     - How to check if influencers disclose properly
     - What to do when they don't
     - Documentation and record-keeping

  Part 3: Compliance best practices
  1. Making compliance feel natural (not forced)
  2. Training influencers on disclosure requirements
  3. International campaign compliance considerations
  4. Staying current with evolving regulations

assertions:
  - type: llm_judge
    criteria: "FTC rules are accurately explained — disclosure requirements, penalty amounts, and enforcement mechanisms are correct and current"
    weight: 0.30
    description: "Accurate FTC rule explanation"
  - type: llm_judge
    criteria: "The 1-page compliance guide is clear and influencer-friendly — a creator with no legal knowledge can follow it immediately"
    weight: 0.25
    description: "Clear influencer-friendly guide"
  - type: llm_judge
    criteria: "Outreach messages integrate compliance naturally — FTC requirements are communicated as standard practice, not as threats"
    weight: 0.25
    description: "Natural compliance integration"
  - type: llm_judge
    criteria: "Compliant vs. non-compliant examples are specific — they show real scenarios, not just generic 'use #ad'"
    weight: 0.20
    description: "Specific compliance examples"
