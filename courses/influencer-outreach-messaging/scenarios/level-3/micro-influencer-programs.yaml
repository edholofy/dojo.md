meta:
  id: micro-influencer-programs
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Build micro-influencer programs at scale — design efficient systems for recruiting, managing, and optimizing large networks of micro-influencers"
  tags: [influencer, micro-influencer, programs, scale, network, advanced]

state: {}

trigger: |
  Micro-influencer programs leverage large networks of smaller
  creators (10K-100K followers) to achieve scale with
  authenticity. These programs require efficient recruitment,
  streamlined management, and data-driven optimization to
  make hundreds of small partnerships worthwhile.

  Part 1: Micro-influencer program strategy
  1. Why micro-influencers at scale:
     - Higher engagement rates (3-6% vs. 1-2% for macro)
     - More authentic content and audience trust
     - Lower cost per engagement
     - Geographic and niche targeting precision
     - Content variety and testing opportunities
  2. Program models:
     - Open application (anyone can apply)
     - Invitation-only (curated selection)
     - Customer-to-creator (existing customers who create)
     - Affiliate-creator hybrid
  3. Scale considerations:
     - Managing 100+ micro-influencers
     - Content quality consistency
     - Communication efficiency
     - Performance tracking across large networks

  Part 2: Build a micro-influencer network
  For "Glow Naturals" — an organic skincare brand:
  Goal: Build a network of 100 micro-influencers generating
  200+ pieces of content monthly

  1. Recruitment strategy:
     - Application portal design (what to include)
     - Selection criteria and scoring
     - Outreach message for proactive recruitment
     - Customer-to-influencer conversion email
     - Onboarding sequence (5 emails)
  2. Program operations:
     - Monthly content prompts (themes and challenges)
     - Content submission and approval workflow
     - Standardized compensation tiers
     - Performance-based advancement system
     - Community features (private group, ambassador perks)
  3. Content management at scale:
     - Content calendar for the network
     - Quality standards and review process
     - Content rights and repurposing framework
     - Top performer spotlighting
  4. Program metrics and optimization:
     - Network health dashboard
     - Creator retention rate tracking
     - Content output vs. quality correlation
     - Cost per acquisition through micro-influencer channel
     - Program ROI vs. other channels

  Part 3: Network growth and maintenance
  1. Keeping 100+ creators engaged and motivated
  2. Seasonal recruitment campaigns
  3. Graduating top performers to paid partnerships
  4. Technology platforms for micro-influencer management

assertions:
  - type: llm_judge
    criteria: "The 100-influencer program is operationally feasible — management systems are efficient enough that a small team can run the network"
    weight: 0.30
    description: "Operationally feasible program"
  - type: llm_judge
    criteria: "Recruitment and onboarding are systematic — the process scales from 10 to 100 without proportionally increasing team effort"
    weight: 0.25
    description: "Systematic scalable recruitment"
  - type: llm_judge
    criteria: "Content quality is maintained at scale — quality standards and review processes prevent quality degradation as the network grows"
    weight: 0.25
    description: "Quality maintained at scale"
  - type: llm_judge
    criteria: "Program metrics demonstrate clear ROI — the dashboard shows whether the micro-influencer network is worth the investment"
    weight: 0.20
    description: "Clear ROI demonstration"
