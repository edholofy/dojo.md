meta:
  id: influencer-analytics-advanced
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Master influencer analytics — use advanced data analysis, attribution modeling, and predictive scoring to optimize influencer selection, partnerships, and ROI"
  tags: [influencer, analytics, data, attribution, predictive, advanced]

state: {}

trigger: |
  Advanced influencer analytics goes beyond engagement rates
  to predictive performance modeling, multi-touch attribution,
  audience quality assessment, and data-driven influencer
  selection that maximizes ROI before the first message is sent.

  Part 1: Advanced analytics framework
  1. Audience quality metrics:
     - Audience authenticity score (real vs. fake followers)
     - Audience demographics match (overlap with target)
     - Audience purchase intent indicators
     - Audience overlap between influencers (redundancy check)
  2. Performance prediction:
     - Historical performance trending
     - Engagement velocity (rate of engagement growth/decline)
     - Content format performance by influencer
     - Seasonal performance patterns
  3. Attribution and ROI:
     - Multi-touch attribution for influencer marketing
     - Incrementality testing (did influencer drive net new?)
     - Customer lifetime value of influencer-acquired customers
     - Content longevity analysis (how long does content generate value?)

  Part 2: Build an analytics system
  For "NexGen Fitness" — a fitness app using data to optimize
  their influencer program:
  1. Create an influencer scoring model:
     - 10 scoring criteria with weights
     - Score calculation methodology
     - Apply the model to 8 hypothetical influencers
     - Show how scores predict campaign performance
  2. Design an attribution analysis:
     - Tracking setup (UTM parameters, promo codes, pixels)
     - First-touch vs. last-touch vs. multi-touch comparison
     - Show how attribution model choice changes ROI calculations
     - Real example with hypothetical conversion data
  3. Build a performance dashboard:
     - Real-time campaign monitoring metrics
     - Influencer comparison leaderboard
     - Cost efficiency metrics (CPE, CPA, ROAS)
     - Content performance heat map
     - Audience growth correlation analysis
  4. Create a quarterly influencer program report:
     - Portfolio performance summary
     - Top 3 insights with actionable recommendations
     - Budget efficiency analysis
     - Influencer program vs. other channels comparison

  Part 3: Data-driven optimization
  1. Using data to inform outreach personalization
  2. Predictive churn analysis (which influencers might leave?)
  3. Optimal portfolio composition (how many of each tier)
  4. Machine learning applications in influencer marketing

assertions:
  - type: llm_judge
    criteria: "The scoring model has well-weighted criteria — scoring reflects genuine predictive value, not arbitrary equal weighting"
    weight: 0.30
    description: "Well-weighted scoring model"
  - type: llm_judge
    criteria: "Attribution analysis shows how model choice changes results — the same data yields different ROI under different attribution models"
    weight: 0.25
    description: "Attribution model comparison"
  - type: llm_judge
    criteria: "The performance dashboard provides actionable insights — not just numbers but visual representations that guide decisions"
    weight: 0.25
    description: "Actionable dashboard insights"
  - type: llm_judge
    criteria: "The quarterly report is executive-quality — it tells a strategic story about influencer program health and recommendations"
    weight: 0.20
    description: "Executive-quality reporting"
