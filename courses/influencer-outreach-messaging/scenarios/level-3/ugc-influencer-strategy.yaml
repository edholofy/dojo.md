meta:
  id: ugc-influencer-strategy
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Build UGC creator partnerships — recruit and manage user-generated content creators for ad-ready content at scale with streamlined outreach and production"
  tags: [influencer, ugc, creators, ad-content, production, advanced]

state: {}

trigger: |
  UGC (User-Generated Content) creators are a distinct category
  from traditional influencers. They create content that looks
  authentic and native for brands to use as ad creative or
  organic posts — without posting on their own channels.
  This requires different outreach and partnership models.

  Part 1: UGC creator landscape
  1. UGC creators vs. influencers:
     - Influencers: Post on THEIR channels, audience matters
     - UGC creators: Create for BRAND channels, production matters
     - Different skills (authenticity vs. production quality)
     - Different compensation models
  2. UGC content types:
     - Testimonials and reviews
     - Product demonstrations
     - Unboxing and first impressions
     - Day-in-the-life featuring product
     - Problem-solution narratives
     - Tutorials and how-tos
  3. Where UGC content is used:
     - Paid ad creative (Facebook, TikTok, Instagram ads)
     - Brand social media accounts
     - Website and landing pages
     - Email marketing
     - Product pages

  Part 2: Build a UGC creator program
  For "Pulse Headphones" — a premium headphone brand:
  1. UGC creator recruitment:
     - Where to find UGC creators (platforms, communities)
     - Creator application and portfolio review process
     - Outreach message for recruiting UGC creators
     - Talent assessment criteria
  2. UGC creator brief template:
     - Content format specifications (aspect ratio, length, quality)
     - Script/storyline guidance
     - Product showcase requirements
     - Brand guidelines for UGC
     - Technical requirements (lighting, audio, resolution)
  3. Production management:
     - Content request workflow
     - Revision and approval process
     - Content library organization
     - Usage rights and licensing
     - Payment per deliverable (rate card)
  4. Scale UGC production:
     - Managing 20+ UGC creators simultaneously
     - Content variety and A/B testing
     - Seasonal content refreshes
     - Performance-based creator retention

  Part 3: UGC optimization
  1. Testing UGC styles for ad performance
  2. UGC content that converts vs. content that doesn't
  3. Combining UGC with influencer marketing
  4. Legal considerations for UGC content usage

assertions:
  - type: llm_judge
    criteria: "UGC creators are correctly distinguished from influencers — the outreach and partnership model reflects the different value proposition"
    weight: 0.30
    description: "Correct UGC-influencer distinction"
  - type: llm_judge
    criteria: "The UGC brief template includes production-quality specifications — technical requirements ensure content is ad-ready"
    weight: 0.25
    description: "Production-quality brief template"
  - type: llm_judge
    criteria: "Scale management is practical — managing 20+ creators has efficient systems without requiring a full production team"
    weight: 0.25
    description: "Practical scale management"
  - type: llm_judge
    criteria: "Usage rights and licensing are clearly addressed — brands know exactly what they can do with UGC content and for how long"
    weight: 0.20
    description: "Clear usage rights guidance"
