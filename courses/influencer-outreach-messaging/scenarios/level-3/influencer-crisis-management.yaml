meta:
  id: influencer-crisis-management
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Manage influencer partnership crises — handle scandals, controversial content, contract breaches, and PR disasters involving brand-partnered influencers"
  tags: [influencer, crisis, scandal, damage-control, reputation, advanced]

state: {}

trigger: |
  Influencer partnerships carry reputational risk. When a
  partnered influencer faces a scandal, posts controversial
  content, or breaches their agreement, brands need rapid
  response protocols to protect their reputation while
  handling the situation professionally.

  Part 1: Influencer crisis types
  1. Influencer-generated crises:
     - Personal scandal (legal issues, offensive behavior)
     - Controversial content (political, insensitive posts)
     - Fake follower/engagement fraud discovery
     - Competitor partnership violation (exclusivity breach)
     - Poor product representation (dangerous use, misinformation)
  2. Campaign-generated crises:
     - Backlash against the partnership (audience doesn't approve)
     - Content goes viral for wrong reasons
     - FTC violation discovered publicly
     - Cultural insensitivity in campaign content
  3. External crises affecting partnerships:
     - Platform changes (account suspended, algorithm shift)
     - Industry-wide influencer backlash
     - Social media boycotts

  Part 2: Crisis response plans
  For "Heritage Clothing" — a heritage fashion brand:
  Create detailed response plans for 5 scenarios:

  Scenario 1: Brand ambassador arrested for DUI
  - Hour-by-hour response timeline (first 48 hours)
  - Internal decision framework (pause, review, terminate?)
  - Public communication plan
  - Social media content pause/adjustment
  - Contract enforcement (morality clause activation)
  - Message to other brand ambassadors

  Scenario 2: Influencer posts racist content
  - Immediate response actions
  - Public statement messaging
  - Social media response to audience outrage
  - Termination communication
  - Recovery strategy

  Scenario 3: FTC investigates an influencer's posts for
  your brand — disclosure was insufficient
  - Legal response preparation
  - Audit of all influencer partnerships for compliance
  - Corrective action plan
  - Communication to other influencers

  Scenario 4: Influencer switches to a competitor
  mid-campaign (exclusivity breach)
  - Contract enforcement communication
  - Campaign pivot strategy
  - Replacement influencer rapid outreach

  Scenario 5: Campaign content receives major audience backlash
  (tone-deaf or culturally insensitive)
  - Response and accountability messaging
  - Content removal decision framework
  - Internal review and learning process

  Part 3: Crisis prevention
  1. Vetting red flags that prevent crises
  2. Contract clauses that protect against crises
  3. Ongoing monitoring of influencer activity
  4. Building a crisis response playbook

assertions:
  - type: llm_judge
    criteria: "All 5 crisis response plans are detailed and time-sensitive — they include hour-by-hour actions for the critical first 48 hours"
    weight: 0.30
    description: "Detailed time-sensitive responses"
  - type: llm_judge
    criteria: "Public communication messaging is thoughtful — statements are empathetic, accountable, and brand-appropriate without being defensive"
    weight: 0.25
    description: "Thoughtful public communication"
  - type: llm_judge
    criteria: "Legal considerations are addressed — contract enforcement, FTC response, and termination procedures are handled properly"
    weight: 0.25
    description: "Legal considerations addressed"
  - type: llm_judge
    criteria: "Prevention advice is actionable — specific vetting steps and contract clauses would genuinely reduce crisis risk"
    weight: 0.20
    description: "Actionable prevention advice"
