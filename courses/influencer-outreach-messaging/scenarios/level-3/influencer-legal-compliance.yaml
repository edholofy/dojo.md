meta:
  id: influencer-legal-compliance
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Navigate influencer marketing legal compliance — manage FTC regulations, international advertising standards, content rights, and liability across complex partnerships"
  tags: [influencer, legal, compliance, ftc, international, advanced]

state: {}

trigger: |
  Influencer marketing operates in an increasingly regulated
  environment. FTC enforcement is intensifying, international
  regulations vary by country, and content rights complexities
  grow with scale. Legal compliance protects both brands
  and creators from costly penalties.

  Part 1: Regulatory landscape
  1. US regulations (FTC):
     - FTC Endorsement Guidelines (updated 2023)
     - Material connection definition
     - Disclosure requirements and placement
     - Penalties and enforcement trends
     - Brand vs. influencer liability
  2. International regulations:
     - UK ASA (Advertising Standards Authority)
     - EU regulations (GDPR data implications)
     - Australia AANA (Advertising Standards)
     - Canada Competition Act requirements
     - Platform-specific regulations
  3. Content rights law:
     - Copyright in influencer content
     - Licensing vs. ownership
     - Fair use and parody
     - Model releases and likeness rights
     - Music and third-party IP in content

  Part 2: Build a compliance system
  For "Meridian Pharmaceuticals" — a wellness supplement company
  (highly regulated industry):
  1. Compliance checklist for influencer campaigns:
     - Pre-campaign legal review requirements
     - Claim substantiation documentation
     - Health/medical claim restrictions
     - Before/after photo regulations
     - Testimonial disclosure requirements
  2. Create compliance documentation:
     - Influencer compliance guide (2-page, readable)
     - Campaign-specific compliance addendum
     - Content review checklist for legal team
     - Compliance training presentation outline
  3. Handle 4 compliance scenarios:
     Scenario 1: Influencer makes an unauthorized health claim
     - Response and corrective action
     Scenario 2: International campaign with different rules per country
     - Country-specific disclosure requirements
     Scenario 3: Content goes viral without proper disclosure
     - Retroactive compliance steps
     Scenario 4: FTC inquiry about a campaign
     - Response protocol and documentation
  4. Design a compliance monitoring system:
     - Automated and manual monitoring processes
     - Documentation and record-keeping requirements
     - Regular compliance audits
     - Corrective action procedures

  Part 3: Staying compliant at scale
  1. Compliance training for large influencer networks
  2. Technology tools for compliance monitoring
  3. Working with legal counsel on influencer programs
  4. Future regulatory trends to prepare for

assertions:
  - type: llm_judge
    criteria: "Regulatory information is accurate and current — FTC, ASA, and other regulatory requirements are correctly described"
    weight: 0.30
    description: "Accurate regulatory information"
  - type: llm_judge
    criteria: "The wellness/supplement context is properly handled — health claim restrictions and testimonial rules are addressed for this highly regulated industry"
    weight: 0.25
    description: "Industry-appropriate compliance"
  - type: llm_judge
    criteria: "Compliance documents are readable — the influencer guide is accessible to non-lawyers while being legally thorough"
    weight: 0.25
    description: "Readable compliance documents"
  - type: llm_judge
    criteria: "Scenario responses show practical crisis management — each compliance issue has a specific, actionable response protocol"
    weight: 0.20
    description: "Practical compliance crisis responses"
