meta:
  id: b2b-influencer-outreach
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Master B2B influencer outreach — adapt strategies for thought leaders, industry experts, and professional creators in business-to-business contexts"
  tags: [influencer, b2b, thought-leaders, industry-experts, professional, advanced]

state: {}

trigger: |
  B2B influencer marketing targets industry experts, thought
  leaders, analysts, and professional content creators whose
  audiences are business decision-makers. B2B outreach requires
  different messaging, value propositions, and partnership
  structures than B2C consumer influencer campaigns.

  Part 1: B2B influencer landscape
  1. B2B influencer types:
     - Industry analysts and consultants
     - LinkedIn thought leaders
     - Podcast hosts (industry-specific)
     - Conference speakers and authors
     - YouTube educators (tech, business, finance)
     - Newsletter writers and bloggers
     - Academic researchers and professors
  2. B2B vs. B2C differences:
     - Longer decision cycles (months, not impulse)
     - Credibility and expertise over aesthetics
     - Content format preferences (whitepapers, webinars, case studies)
     - Compensation expectations (often higher)
     - Relationship over transaction
  3. B2B influencer value:
     - Pipeline influence (not just awareness)
     - Credibility transfer (expert endorsement)
     - Content co-creation (not just promotion)
     - Community access (niche professional audiences)

  Part 2: B2B outreach strategies
  For "CloudScale AI" — an enterprise AI infrastructure company:
  1. Identify 5 B2B influencer profiles:
     - AI researcher with large LinkedIn following
     - Cloud computing podcast host
     - Tech industry analyst at research firm
     - YouTube tech educator focused on enterprise
     - Newsletter writer covering AI infrastructure
  2. Write outreach messages for each:
     - Tailored to their professional standing
     - Value proposition beyond product promotion
     - Partnership structure (co-creation, not just endorsement)
     - Compensation approach for each type
  3. Design 3 B2B collaboration formats:
     - Co-authored industry report
     - Webinar co-host arrangement
     - Product review by industry expert
     With complete outreach and partnership structure for each

  Part 3: B2B relationship building
  1. The advisory relationship model (not just marketing)
  2. Executive-to-executive outreach approaches
  3. Conference and event-based relationship building
  4. Measuring B2B influencer impact on pipeline

assertions:
  - type: llm_judge
    criteria: "All 5 outreach messages reflect B2B professionalism — they treat influencers as peers and experts, not as marketing channels"
    weight: 0.30
    description: "B2B-appropriate professionalism"
  - type: llm_judge
    criteria: "Value propositions go beyond payment — they offer professional value like research access, customer data, or co-creation opportunities"
    weight: 0.25
    description: "Professional value propositions"
  - type: llm_judge
    criteria: "Collaboration formats are genuinely B2B — co-authored reports and webinars reflect how B2B content actually works"
    weight: 0.25
    description: "Genuine B2B collaboration formats"
  - type: llm_judge
    criteria: "Pipeline impact measurement connects influencer activity to business outcomes — not just brand awareness but lead generation and deal influence"
    weight: 0.20
    description: "Pipeline-connected measurement"
