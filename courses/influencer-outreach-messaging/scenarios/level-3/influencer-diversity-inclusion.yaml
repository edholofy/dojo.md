meta:
  id: influencer-diversity-inclusion
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Build diverse influencer programs — create inclusive outreach strategies that represent diverse communities authentically and avoid tokenism"
  tags: [influencer, diversity, inclusion, representation, authentic, advanced]

state: {}

trigger: |
  Diverse influencer programs reflect real audiences, expand
  brand reach, and demonstrate genuine commitment to inclusion.
  However, diversity in influencer marketing requires authentic
  partnership approaches that avoid tokenism, stereotyping,
  and performative representation.

  Part 1: Diversity in influencer marketing
  1. Why diversity matters:
     - Audiences are diverse (representation affects trust)
     - Diverse influencer programs outperform homogeneous ones
     - 61% of consumers prefer brands that show diversity
     - Avoiding echo chambers and audience blind spots
  2. Dimensions of diversity:
     - Race and ethnicity
     - Gender and gender identity
     - Age and generational diversity
     - Body size and ability
     - Geographic and cultural diversity
     - Socioeconomic diversity
     - Neurodiversity
  3. Common mistakes:
     - Tokenism (one diverse influencer in a sea of sameness)
     - Stereotyping (only casting POC for "urban" campaigns)
     - Performative inclusion (diversity only during heritage months)
     - Ignoring intersectionality
     - Pay inequity across demographics

  Part 2: Build an inclusive influencer program
  For "Harmony Athletics" — an athleisure brand committed
  to authentic diversity:
  1. Diversity audit framework:
     - How to assess current influencer roster diversity
     - Identifying representation gaps
     - Setting diversity goals without quotas
     - Measuring progress over time
  2. Inclusive outreach strategies:
     - Finding influencers from underrepresented communities
     - Outreach messaging that respects cultural context
     - Avoiding microaggressions in outreach
     - Compensation equity (equal pay for equal work)
     Write 3 outreach messages:
     - To a plus-size fitness influencer
     - To an adaptive athlete content creator
     - To a multilingual lifestyle creator
  3. Campaign design for inclusion:
     - Ensuring diverse representation in campaign visuals
     - Cultural sensitivity review process
     - Involving diverse voices in campaign development
     - Community feedback loops

  Part 3: Sustainable inclusion
  1. Year-round diversity vs. heritage month campaigns only
  2. Internal team diversity and its impact on outreach
  3. Handling criticism (from both sides)
  4. Authentic allyship in influencer partnerships

assertions:
  - type: llm_judge
    criteria: "Outreach messages are culturally sensitive — they don't make assumptions about the influencer based on their identity"
    weight: 0.30
    description: "Culturally sensitive outreach"
  - type: llm_judge
    criteria: "The diversity framework avoids tokenism — it promotes authentic, ongoing inclusion rather than performative gestures"
    weight: 0.25
    description: "Anti-tokenism framework"
  - type: llm_judge
    criteria: "Compensation equity is explicitly addressed — equal pay for equal work regardless of follower demographics"
    weight: 0.25
    description: "Compensation equity addressed"
  - type: llm_judge
    criteria: "Sustainability guidance goes beyond campaigns — year-round inclusion practices are recommended, not just heritage month activations"
    weight: 0.20
    description: "Year-round inclusion practices"
