meta:
  id: event-influencer-outreach
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Manage influencer outreach for events — recruit creators for brand events, press trips, launch parties, and experiential activations with coordinated content"
  tags: [influencer, events, press-trips, activations, experiential, advanced]

state: {}

trigger: |
  Event-based influencer campaigns create immersive experiences
  that generate high-quality, authentic content. Press trips,
  launch events, brand activations, and experiential campaigns
  require specialized outreach, logistics, and content coordination.

  Part 1: Event influencer strategies
  1. Event types for influencer marketing:
     - Press trips (travel experiences, hotel stays)
     - Product launch events (exclusive reveals)
     - Brand activations (pop-ups, experiential)
     - Conferences and trade shows (industry events)
     - Virtual events (webinars, live streams)
  2. Event outreach differences:
     - Higher commitment (time, travel)
     - Experience as compensation (trip value)
     - Group dynamics (multiple influencers together)
     - Real-time content creation
     - Logistics coordination

  Part 2: Plan an event influencer campaign
  For "Azura Resort & Spa" — a luxury resort hosting a
  3-day wellness retreat for influencers:
  1. Invitation strategy:
     - Target 10 wellness and travel influencers
     - Mix of nano/micro (for authenticity) and mid-tier (for reach)
     - Write the event invitation outreach message
     - Include the experience package (what's covered)
     - RSVP and confirmation process
  2. Pre-event communication:
     - Welcome package with event details
     - Content expectations and guidelines
     - Travel logistics coordination
     - Group introduction (connecting influencers beforehand)
     - Pre-event social media teasers
  3. During-event coordination:
     - Daily content schedule and photo opportunities
     - Real-time social media coordination
     - Branded moments and activations
     - Behind-the-scenes access planning
     - Event hashtag and tagging strategy
  4. Post-event follow-up:
     - Thank you message with event photos
     - Content submission and tracking
     - Performance review per influencer
     - Relationship continuation plan
     - Event recap content creation

  Part 3: Event best practices
  1. Managing group dynamics (influencer egos and hierarchy)
  2. Capturing content in real-time without being overbearing
  3. FTC considerations for event hosting
  4. Measuring event ROI vs. standard campaigns

assertions:
  - type: llm_judge
    criteria: "The event invitation is compelling — it sells the experience as aspirational and exclusive while being clear about content expectations"
    weight: 0.30
    description: "Compelling event invitation"
  - type: llm_judge
    criteria: "Logistics coordination is thorough — travel, scheduling, content planning, and group management are all addressed"
    weight: 0.25
    description: "Thorough logistics coordination"
  - type: llm_judge
    criteria: "Content expectations balance structure with spontaneity — the event has planned moments but leaves room for organic content creation"
    weight: 0.25
    description: "Structured yet spontaneous content"
  - type: llm_judge
    criteria: "Post-event follow-up maximizes the investment — content tracking, relationship continuation, and ROI measurement are all addressed"
    weight: 0.20
    description: "Maximized post-event value"
