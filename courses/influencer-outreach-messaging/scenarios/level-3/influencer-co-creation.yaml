meta:
  id: influencer-co-creation
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Design influencer co-creation partnerships — build collaborations where influencers help develop products, content series, and brand experiences beyond just promotion"
  tags: [influencer, co-creation, collaboration, product-development, partnership, advanced]

state: {}

trigger: |
  Co-creation partnerships go beyond sponsored content to
  involve influencers in product development, brand strategy,
  and content creation as creative partners. These deep
  collaborations produce more authentic outcomes and create
  stronger brand-creator alignment.

  Part 1: Co-creation models
  1. Product co-creation:
     - Influencer-designed product lines
     - Limited edition collaborations
     - Product advisory and feedback roles
     - Revenue-sharing partnerships
  2. Content co-creation:
     - Co-produced content series
     - Influencer as creative director
     - Brand content guest appearances
     - Community content programs
  3. Experience co-creation:
     - Influencer-curated events
     - Workshop and class development
     - Community building partnerships
     - Brand ambassador advisory boards

  Part 2: Design a co-creation partnership
  For "Palette & Pour" — a craft cocktail mixer brand:
  1. Product co-creation partnership with a cocktail influencer:
     - Outreach message proposing co-creation (not just promotion)
     - Partnership structure:
       Phase 1: Concept development (3 months)
       Phase 2: Product development and testing (3 months)
       Phase 3: Launch campaign (1 month)
       Phase 4: Ongoing promotion (6 months)
     - Revenue sharing model
     - Creative control boundaries
     - Marketing responsibilities per party
  2. Content series co-creation:
     - 12-part cocktail education video series
     - Roles: Brand provides production, influencer provides expertise
     - Outreach message for this specific partnership
     - Series structure and content plan
     - Distribution and ownership rights
  3. Community co-creation:
     - Monthly virtual cocktail class led by influencer
     - Brand provides ingredients kit, influencer leads class
     - Outreach and partnership structure
     - Revenue model (ticket sales, sponsorship, content)

  Part 3: Co-creation management
  1. Protecting intellectual property in co-creation
  2. Managing creative differences
  3. When co-creation fails (and how to exit gracefully)
  4. Scaling co-creation across multiple influencers

assertions:
  - type: llm_judge
    criteria: "Co-creation outreach messages position the influencer as a creative partner — not as a marketing tool but as a valued collaborator"
    weight: 0.30
    description: "Partner-positioned outreach"
  - type: llm_judge
    criteria: "Revenue sharing and business structures are fair — both parties benefit proportionally to their contribution"
    weight: 0.25
    description: "Fair revenue structures"
  - type: llm_judge
    criteria: "Creative control boundaries are clearly defined — both parties know who decides what, preventing future conflicts"
    weight: 0.25
    description: "Clear creative boundaries"
  - type: llm_judge
    criteria: "Exit strategies are realistic — graceful separation is possible if the partnership doesn't work"
    weight: 0.20
    description: "Realistic exit strategies"
