meta:
  id: influencer-campaign-strategy
  level: 3
  course: influencer-outreach-messaging
  type: output
  description: "Design advanced influencer campaign strategies — build multi-phase campaigns, influencer-led product launches, and integrated influencer-brand content ecosystems"
  tags: [influencer, campaign-strategy, multi-phase, launches, integrated, advanced]

state: {}

trigger: |
  Advanced influencer campaigns go beyond single posts. They're
  multi-phase, cross-platform strategies where influencers play
  central roles in product launches, brand storytelling, and
  audience building over weeks or months.

  Part 1: Advanced campaign architectures
  1. Multi-phase campaign design:
     - Phase 1: Awareness (teaser content, mystery builds)
     - Phase 2: Engagement (interactive content, challenges)
     - Phase 3: Conversion (direct response, limited offers)
     - Phase 4: Advocacy (UGC amplification, community)
  2. Campaign amplification strategies:
     - Organic influencer content + paid amplification
     - Influencer content as ad creative (whitelisting)
     - User-generated content cascades
     - Cross-influencer content challenges
  3. Integrated campaign models:
     - Influencer-led product development
     - Co-branded content series
     - Influencer takeovers and residencies
     - Influencer + PR + event integration

  Part 2: Design an advanced campaign
  For "Solstice Wellness" — launching a new adaptogen supplement line:
  Budget: $50,000 | Timeline: 8 weeks | Goal: 1,000 first-month sales

  1. Campaign architecture:
     - 20 influencers across 3 tiers
     - Instagram, TikTok, YouTube, podcast
     - 4-phase campaign timeline

  2. Phase 1 (Weeks 1-2): Seeding & Teaser
     - Seed product to 20 influencers
     - 5 influencers post "mystery" teaser content
     - Outreach messages for seeding
     - Brief for teaser content

  3. Phase 2 (Weeks 3-4): Launch
     - 15 influencers post launch content simultaneously
     - YouTube long-form reviews from 3 creators
     - Podcast interview on 2 wellness podcasts
     - Cross-platform hashtag challenge
     - Complete outreach and briefs for each

  4. Phase 3 (Weeks 5-6): Social Proof
     - UGC repurposing from customer reactions
     - Testimonial compilation content
     - Influencer Q&A sessions and Lives
     - Paid amplification of top-performing content

  5. Phase 4 (Weeks 7-8): Community
     - Ambassador program launch for top performers
     - Customer challenge with influencer judges
     - Retargeting with influencer content as ads
     - Campaign wrap-up and results sharing

  6. Budget allocation across phases and influencers
  7. KPIs per phase and overall campaign

  Part 3: Campaign innovation
  1. Influencer content as brand advertising assets
  2. Platform algorithm optimization for campaigns
  3. Real-time campaign adjustment based on performance
  4. Post-campaign influencer relationship transition

assertions:
  - type: llm_judge
    criteria: "The 4-phase campaign builds logically — each phase creates momentum that the next phase leverages"
    weight: 0.30
    description: "Logical phase progression"
  - type: llm_judge
    criteria: "The $50,000 budget is allocated strategically — spending reflects the importance and impact of each phase and influencer tier"
    weight: 0.25
    description: "Strategic budget allocation"
  - type: llm_judge
    criteria: "Outreach and briefs are phase-appropriate — teaser content briefs differ fundamentally from launch content briefs"
    weight: 0.25
    description: "Phase-appropriate outreach"
  - type: llm_judge
    criteria: "KPIs are phase-specific — awareness metrics for early phases, conversion metrics for later phases"
    weight: 0.20
    description: "Phase-specific KPIs"
