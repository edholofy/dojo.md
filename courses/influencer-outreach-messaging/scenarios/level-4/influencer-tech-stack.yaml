meta:
  id: influencer-tech-stack
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Design an influencer marketing technology stack — select, integrate, and optimize platforms for discovery, outreach, management, analytics, and compliance at scale"
  tags: [influencer, technology, platforms, tools, integration, expert]

state: {}

trigger: |
  Scaling influencer operations requires the right technology
  infrastructure. From discovery platforms and CRM systems to
  content management and analytics tools, the tech stack
  determines operational efficiency and data quality.

  For "Amplitude Brands" — a DTC brand portfolio company
  managing influencer programs for 5 brands:

  1. Technology needs assessment:
     - Discovery and research (finding influencers)
     - Outreach and communication (sending and tracking messages)
     - Relationship management (CRM for influencers)
     - Campaign management (briefs, content, approvals)
     - Content management (storage, rights, repurposing)
     - Payment processing (invoicing, tax compliance)
     - Analytics and reporting (performance, ROI)
     - Compliance monitoring (FTC, disclosure tracking)

  2. Platform evaluation and recommendation:
     For each category, evaluate 3 options:
     - Discovery: CreatorIQ vs. Upfluence vs. Aspire
     - CRM: Custom Airtable vs. Grin vs. HubSpot integration
     - Campaign: Sprout Social vs. Later vs. Planoly
     - Analytics: Own dashboard vs. Traackr vs. Meltwater
     For each comparison provide:
     - Key features, pricing tier, strengths, weaknesses
     - Best fit for multi-brand DTC operations
     - Integration capabilities

  3. Integration architecture:
     - How platforms connect (APIs, webhooks, Zapier)
     - Data flow between systems
     - Single source of truth for influencer data
     - Cross-brand data isolation and sharing
     - Reporting dashboard aggregation

  4. Implementation plan:
     - 90-day rollout across 5 brands
     - Data migration from current tools
     - Team training and adoption plan
     - Change management considerations

  5. Build vs. buy analysis:
     - Custom solutions vs. SaaS platforms
     - When internal tools make sense
     - Total cost of ownership comparison

assertions:
  - type: llm_judge
    criteria: "Platform evaluations are accurate and current — features, pricing, and comparisons reflect real products as of 2025-2026"
    weight: 0.30
    description: "Accurate platform evaluations"
  - type: llm_judge
    criteria: "Integration architecture is technically sound — data flows are logical and the single source of truth is achievable"
    weight: 0.25
    description: "Sound integration architecture"
  - type: llm_judge
    criteria: "Multi-brand considerations are addressed — the tech stack supports 5 brands without requiring 5 separate tool instances"
    weight: 0.25
    description: "Multi-brand support"
  - type: llm_judge
    criteria: "The 90-day implementation plan is realistic — it accounts for data migration, training, and adoption challenges"
    weight: 0.20
    description: "Realistic implementation plan"
