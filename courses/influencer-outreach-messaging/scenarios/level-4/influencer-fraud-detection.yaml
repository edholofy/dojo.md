meta:
  id: influencer-fraud-detection
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Detect and prevent influencer fraud — identify fake followers, engagement pods, bot activity, and fraudulent metrics to protect marketing investments"
  tags: [influencer, fraud, fake-followers, bots, vetting, expert]

state: {}

trigger: |
  Influencer fraud costs brands an estimated $1.3 billion
  annually. Fake followers, engagement pods, click farms,
  and inflated metrics can make ineffective influencers
  look impressive. Advanced fraud detection protects
  marketing budgets and ensures genuine audience reach.

  Part 1: Influencer fraud landscape
  1. Types of fraud:
     - Fake followers (purchased bots, follow-for-follow farms)
     - Engagement pods (coordinated liking/commenting groups)
     - Click farms (outsourced engagement from low-cost countries)
     - Engagement bots (automated commenting and liking)
     - Inflated metrics (screenshot manipulation, vanity metrics)
     - Fake brand deals (claiming partnerships that don't exist)
  2. Fraud indicators:
     - Follower growth anomalies (sudden spikes)
     - Engagement rate inconsistencies
     - Comment quality analysis (generic vs. genuine)
     - Audience geography mismatches
     - Following-to-follower ratio anomalies
     - Content quality vs. metrics mismatch
  3. Impact of fraud:
     - Wasted budget ($1.3B annually industry-wide)
     - Inaccurate performance data
     - Brand reputation risk
     - Campaign failure from fake reach

  Part 2: Build a fraud detection system
  For "Shield Insurance" — a brand investing $500K annually
  in influencer marketing:
  1. Pre-campaign fraud screening process:
     - 15-point fraud detection checklist
     - Manual analysis methodology (10-minute screening)
     - Tool-based analysis (automated fraud scoring)
     - Red flag scoring system (green/yellow/red)
  2. Analyze 5 hypothetical influencer profiles:
     - Influencer A: 200K followers, 5% engagement
       (Legitimate — show why)
     - Influencer B: 500K followers, 8% engagement
       (Suspicious — show red flags)
     - Influencer C: 50K followers, 2% engagement
       (Legitimate but low — acceptable?)
     - Influencer D: 100K followers, 15% engagement
       (Pod activity — show indicators)
     - Influencer E: 300K followers, 0.5% engagement
       (Dead audience — show evidence)
     For each, provide analysis and recommendation
  3. Contract protections:
     - Performance guarantee clauses
     - Fraud termination rights
     - Metric verification requirements
     - Clawback provisions
  4. Ongoing monitoring:
     - During-campaign fraud indicators
     - Post-campaign audience quality audit
     - Fraud reporting to platforms

  Part 3: Fraud prevention strategy
  1. Tools for automated fraud detection (85-92% accuracy)
  2. Building a vetted influencer whitelist
  3. Industry collaboration against fraud
  4. Emerging fraud tactics and countermeasures

assertions:
  - type: llm_judge
    criteria: "The 15-point fraud checklist is specific and actionable — each item identifies a specific metric or pattern to check"
    weight: 0.30
    description: "Specific fraud detection checklist"
  - type: llm_judge
    criteria: "The 5 influencer analyses correctly identify legitimate vs. fraudulent profiles — red flags are genuine indicators of fraud"
    weight: 0.25
    description: "Accurate fraud identification"
  - type: llm_judge
    criteria: "Contract protections are legally sound — fraud termination, clawback, and verification clauses protect the brand effectively"
    weight: 0.25
    description: "Legally sound contract protections"
  - type: llm_judge
    criteria: "The system balances thoroughness with efficiency — screening doesn't take hours per influencer but catches major fraud"
    weight: 0.20
    description: "Efficient fraud screening"
