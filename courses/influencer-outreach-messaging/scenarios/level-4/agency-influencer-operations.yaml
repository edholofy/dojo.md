meta:
  id: agency-influencer-operations
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Build agency-scale influencer operations — design multi-client influencer management systems, team structures, and processes for marketing agencies"
  tags: [influencer, agency, operations, multi-client, scale, expert]

state: {}

trigger: |
  Agencies managing influencer campaigns for multiple clients
  need scalable systems that maintain quality and personalization
  across accounts. This requires standardized processes, team
  specialization, and technology infrastructure.

  For "Momentum Marketing" — an influencer marketing agency
  managing 15 active clients with a 10-person team:

  1. Agency organizational structure:
     - Team roles and specializations:
       Account Directors (client relationship, strategy)
       Influencer Managers (recruitment, outreach, relationships)
       Campaign Coordinators (logistics, content management)
       Data Analysts (reporting, optimization)
       Creative Strategists (briefs, content direction)
     - Client-to-team ratios and capacity planning
     - When to hire and role progression paths

  2. Multi-client operational systems:
     - Client onboarding playbook (from pitch to first campaign)
     - Standardized campaign workflow across all clients
     - Influencer database management (shared vs. client-exclusive)
     - Cross-client influencer conflict prevention
     - Technology stack and tool integration
     - Quality assurance across all accounts

  3. Service packaging and pricing:
     - Retainer packages (tiered by service level)
     - Project-based campaign pricing
     - Rate cards for influencer management services
     - Scope management and change order processes
     - Profitability tracking per client

  4. Client reporting and communication:
     - Weekly status update template
     - Monthly performance dashboard
     - Quarterly business review presentation
     - Annual strategy planning workshop
     - Write 1 example of each report

  5. Scaling operations:
     - From 15 to 50 clients: What changes
     - Process documentation and SOPs
     - Training and knowledge management
     - Client retention strategies

assertions:
  - type: llm_judge
    criteria: "The agency structure supports 15 clients with 10 people — the organizational model is efficient without being understaffed"
    weight: 0.30
    description: "Efficient agency structure"
  - type: llm_judge
    criteria: "Multi-client systems prevent cross-contamination — influencer exclusivity conflicts and brand confusion are actively prevented"
    weight: 0.25
    description: "Cross-client conflict prevention"
  - type: llm_judge
    criteria: "Service packaging is commercially viable — pricing allows profitability while delivering real value to clients"
    weight: 0.25
    description: "Commercially viable packaging"
  - type: llm_judge
    criteria: "Client reports demonstrate agency value — they prove ROI and strategic thinking, not just activity logging"
    weight: 0.20
    description: "Value-demonstrating reports"
