meta:
  id: global-influencer-campaigns
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Run global influencer campaigns — coordinate multi-market outreach, cultural adaptation, regulatory compliance, and performance measurement across countries"
  tags: [influencer, global, international, multi-market, localization, expert]

state: {}

trigger: |
  Global influencer campaigns coordinate creators across
  multiple countries, languages, and cultural contexts.
  Each market has different platforms, influencer ecosystems,
  cultural norms, and regulations that require localized
  approaches within a unified campaign strategy.

  For "Zenith Electronics" — a consumer electronics brand
  launching a wireless earbuds campaign across 6 markets:
  Markets: US, UK, Germany, Japan, Brazil, Australia

  1. Market-specific influencer strategies:
     For each of the 6 markets, define:
     - Primary platforms (differs by market)
     - Influencer ecosystem overview
     - Cultural considerations for outreach
     - Regulatory requirements (FTC, ASA, etc.)
     - Compensation norms and currency
     - Content format preferences
     Write 1 localized outreach message per market

  2. Global campaign coordination:
     - Unified campaign brief with localization guidelines
     - Global hashtag and local adaptations
     - Centralized vs. local influencer management
     - Content approval workflow across time zones
     - Cross-market content sharing and repurposing
     - Budget allocation across markets

  3. Global influencer management:
     - Working with local agencies and talent managers
     - Payment processing across currencies
     - Contract localization per jurisdiction
     - Performance benchmarking across markets
     - Communication protocols for multi-language teams

  4. Global campaign reporting:
     - Per-market performance dashboards
     - Cross-market comparison framework
     - Global campaign aggregate metrics
     - Market-specific insights and learnings
     - Currency-normalized cost calculations

  5. Scaling global programs:
     - Adding new markets systematically
     - Building a global influencer database
     - Centralizing best practices across regions
     - Knowledge transfer between market teams

assertions:
  - type: llm_judge
    criteria: "Market-specific strategies reflect genuine local knowledge — platform preferences, cultural norms, and regulatory requirements differ appropriately"
    weight: 0.30
    description: "Genuine local market knowledge"
  - type: llm_judge
    criteria: "The 6 localized outreach messages are culturally appropriate — each reflects the communication style and business norms of its market"
    weight: 0.25
    description: "Culturally appropriate outreach"
  - type: llm_judge
    criteria: "Global coordination is practical — the system allows local execution within unified strategy without creating bureaucratic bottlenecks"
    weight: 0.25
    description: "Practical global coordination"
  - type: llm_judge
    criteria: "Cross-market reporting enables comparison — performance can be meaningfully compared despite different currencies, platforms, and norms"
    weight: 0.20
    description: "Comparable cross-market reporting"
