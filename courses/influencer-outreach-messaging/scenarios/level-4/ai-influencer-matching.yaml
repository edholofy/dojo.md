meta:
  id: ai-influencer-matching
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Use AI for influencer matching and outreach — leverage machine learning, predictive analytics, and AI tools to optimize influencer discovery, selection, and campaign planning"
  tags: [influencer, ai, matching, predictive, machine-learning, expert]

state: {}

trigger: |
  AI is transforming influencer marketing — from automated
  matching algorithms and predictive performance models to
  AI-generated outreach personalization and real-time campaign
  optimization. Understanding how to leverage AI tools while
  maintaining authentic human relationships is key.

  Part 1: AI in influencer marketing
  1. AI-powered discovery and matching:
     - Audience-brand affinity scoring
     - Content style and visual analysis
     - Engagement pattern prediction
     - Fraud detection algorithms
     - Cross-platform influence mapping
  2. AI for outreach optimization:
     - Personalization at scale (AI-customized messages)
     - Send time optimization
     - Response prediction modeling
     - A/B testing automation for outreach messages
  3. AI for campaign management:
     - Real-time performance optimization
     - Content performance prediction
     - Budget allocation optimization
     - Trend detection and opportunity identification

  Part 2: Build an AI-enhanced outreach system
  For "TechFlow" — a SaaS company with a data-driven approach:
  1. AI matching model:
     - Define 12 matching criteria with weights
     - Design the scoring algorithm logic
     - Show how 10 influencers are scored and ranked
     - Compare AI ranking vs. manual selection
     - Measure accuracy after 3 hypothetical campaigns
  2. AI-assisted outreach personalization:
     - Base template structure
     - AI personalization elements:
       Content references (AI-identified relevant posts)
       Tone matching (mirror their communication style)
       Value proposition customization (based on their content themes)
     - Show 3 AI-personalized messages vs. human-written
     - Quality comparison and hybrid recommendation
  3. AI campaign optimization:
     - Real-time dashboard with AI recommendations
     - Automated budget reallocation suggestions
     - Content performance prediction for upcoming posts
     - Influencer portfolio optimization recommendations

  Part 3: AI ethics and limitations
  1. When AI selection reinforces bias
  2. Transparency with influencers about AI use
  3. Human oversight requirements
  4. Future of AI in influencer marketing (2026+)

assertions:
  - type: llm_judge
    criteria: "The AI matching model has logical criteria and weights — the algorithm design is plausible and would produce meaningful rankings"
    weight: 0.30
    description: "Logical AI matching model"
  - type: llm_judge
    criteria: "AI-personalized vs. human-written comparison is honest — it shows where AI excels and where human touch is still superior"
    weight: 0.25
    description: "Honest AI-human comparison"
  - type: llm_judge
    criteria: "AI recommendations are actionable — the system suggests specific actions, not just insights"
    weight: 0.25
    description: "Actionable AI recommendations"
  - type: llm_judge
    criteria: "Ethical considerations are genuinely addressed — bias, transparency, and human oversight are treated seriously, not as afterthoughts"
    weight: 0.20
    description: "Genuine ethical considerations"
