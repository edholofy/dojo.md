meta:
  id: influencer-content-licensing
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Master influencer content licensing — negotiate usage rights, build content libraries, and manage intellectual property across complex multi-use scenarios"
  tags: [influencer, content-licensing, usage-rights, ip, intellectual-property, expert]

state: {}

trigger: |
  Content licensing determines what a brand can do with
  influencer-created content beyond the initial post. Usage
  rights for paid ads, website content, email marketing,
  retail displays, and other channels require careful
  negotiation and clear legal frameworks.

  Part 1: Content licensing framework
  1. License types:
     - Organic social use only
     - Paid amplification (social ads)
     - Owned media (website, email, app)
     - Offline/OOH (retail, print, billboards)
     - Derivatives (edited versions, compilations)
     - Exclusive vs. non-exclusive rights
  2. License parameters:
     - Duration (30 days, 6 months, 1 year, perpetual)
     - Territory (country, region, global)
     - Platforms (specific vs. all)
     - Modifications (can brand edit the content?)
     - Sublicensing (can brand give rights to partners?)
  3. Pricing for usage rights:
     - Typical premium by use case (20-100%+ over base rate)
     - Duration-based pricing tiers
     - Territory-based pricing
     - Bundled vs. à la carte rights

  Part 2: Build a licensing program
  For "Aurora Cosmetics" — a beauty brand with extensive
  multi-channel content needs:
  1. Create a usage rights matrix:
     - Content Type × Use Case × Duration → Price Premium
     - Fill in realistic premium percentages
     - Show total cost comparison: organic-only vs. full rights
  2. Write licensing communications:
     - Initial outreach including usage rights request
     - Standalone licensing request (for existing content)
     - Licensing extension request (beyond original term)
     - Rights expiration notification to influencer
     - Counter-offer response to licensing pushback
  3. Design licensing agreements:
     - Simple organic + paid amplification license
     - Comprehensive multi-channel license
     - Perpetual content library license
     - For each: key terms, pricing, restrictions
  4. Content library management:
     - Cataloging licensed content
     - Tracking license expirations
     - Managing content across channels
     - Measuring ROI of licensed vs. original content

  Part 3: Advanced licensing
  1. Retroactive licensing (wanting to use content after the fact)
  2. International licensing considerations
  3. AI training rights (using content to train models)
  4. Licensing trends and creator perspectives

assertions:
  - type: llm_judge
    criteria: "The usage rights matrix is comprehensive — it covers all common use cases with realistic pricing premiums"
    weight: 0.30
    description: "Comprehensive usage rights matrix"
  - type: llm_judge
    criteria: "Licensing communications are professional — requests, negotiations, and notifications handle content rights with appropriate legal care"
    weight: 0.25
    description: "Professional licensing communications"
  - type: llm_judge
    criteria: "Pricing is fair to both parties — premiums reflect the genuine value of extended usage without exploiting creators"
    weight: 0.25
    description: "Fair licensing pricing"
  - type: llm_judge
    criteria: "Content library management prevents rights violations — tracking systems ensure brands don't use content beyond their licensed terms"
    weight: 0.20
    description: "Rights-compliant content management"
