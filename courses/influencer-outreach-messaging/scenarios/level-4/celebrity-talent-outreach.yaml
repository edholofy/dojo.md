meta:
  id: celebrity-talent-outreach
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Navigate celebrity and talent outreach — work with agents, managers, and entertainment lawyers to secure high-profile influencer partnerships"
  tags: [influencer, celebrity, talent, agents, managers, expert]

state: {}

trigger: |
  Celebrity and macro-influencer outreach requires navigating
  the talent management ecosystem — agents, managers, publicists,
  and entertainment lawyers all play roles. The outreach process,
  negotiation dynamics, and partnership structures differ
  fundamentally from direct creator outreach.

  Part 1: The talent ecosystem
  1. Key gatekeepers:
     - Talent agent (deals and negotiations)
     - Manager (career strategy, day-to-day)
     - Publicist (media, image, brand alignment)
     - Business manager (financial decisions)
     - Entertainment lawyer (contracts, rights)
  2. How to find the right contact:
     - IMDbPro and talent databases
     - LinkedIn research
     - Agency directories
     - Networking and warm introductions
  3. Outreach etiquette:
     - Professional communications standards
     - What to include in initial inquiry
     - What to expect (timelines, response patterns)
     - Red flags (scams, fake agents)

  Part 2: Execute talent outreach
  For "Prism Luxury" — a luxury fashion brand seeking a
  celebrity ambassador ($500K budget):

  1. Talent selection strategy:
     - Define ideal celebrity profile
     - Create a tiered target list:
       Tier A: Dream ambassadors (3 names with rationale)
       Tier B: Strong alternatives (3 names)
       Tier C: Accessible options (3 names)
     - Brand safety vetting for each

  2. Write outreach communications:
     - Initial inquiry email to talent agent
     - Follow-up after initial interest
     - Brand deck/one-sheet for the talent team
     - Partnership proposal (deal memo format)
     - Negotiation response to counter-offer

  3. Deal structure:
     - Ambassador vs. campaign deal comparison
     - Compensation structure (fee + bonus + equity options)
     - Deliverables and usage rights
     - Exclusivity scope and duration
     - Performance benchmarks
     - Morality and termination clauses
     - Option for renewal

  4. Campaign activation:
     - Content creation process with talent
     - Managing talent schedules and availability
     - PR and media coordination
     - Social media activation timeline
     - Performance measurement

  Part 3: Celebrity partnership management
  1. Maintaining celebrity relationships long-term
  2. Crisis management with high-profile partners
  3. ROI measurement for celebrity endorsements
  4. When celebrity partnerships are worth it (vs. micro)

assertions:
  - type: llm_judge
    criteria: "Talent ecosystem navigation is accurate — the roles of agents, managers, and publicists are correctly described with appropriate outreach protocols"
    weight: 0.30
    description: "Accurate talent ecosystem navigation"
  - type: llm_judge
    criteria: "Outreach communications are appropriately professional — the tone matches what talent agencies expect from brand partnerships"
    weight: 0.25
    description: "Appropriately professional outreach"
  - type: llm_judge
    criteria: "Deal structure is comprehensive — compensation, rights, exclusivity, and protections cover the full scope of a $500K partnership"
    weight: 0.25
    description: "Comprehensive deal structure"
  - type: llm_judge
    criteria: "The tiered target list shows strategic thinking — selection rationale goes beyond fame to consider brand alignment and audience overlap"
    weight: 0.20
    description: "Strategic talent selection"
