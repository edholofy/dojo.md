meta:
  id: influencer-marketplace-strategy
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Leverage influencer marketplaces and platforms — optimize brand presence on creator marketplaces, write compelling brand listings, and manage inbound influencer interest"
  tags: [influencer, marketplace, platforms, inbound, listings, expert]

state: {}

trigger: |
  Influencer marketplaces flip the outreach model — instead of
  brands reaching out to influencers, creators discover and
  apply to brand campaigns. Platforms like TikTok Creator
  Marketplace, Instagram's branded content tools, and third-party
  marketplaces require different strategies than traditional outreach.

  Part 1: Marketplace landscape
  1. Platform-native marketplaces:
     - TikTok Creator Marketplace
     - Instagram Branded Content Partnership Ads
     - YouTube BrandConnect
     - Pinterest Creator Hub
  2. Third-party marketplaces:
     - Aspire (formerly AspireIQ)
     - Grin
     - CreatorIQ
     - Upfluence
     - Mavrck
  3. Marketplace advantages:
     - Inbound interest (creators come to you)
     - Verified metrics and data
     - Streamlined discovery and communication
     - Built-in campaign management tools

  Part 2: Build a marketplace strategy
  For "SunBrew Beverages" — a craft beverage brand:
  1. Marketplace optimization:
     - Create a compelling brand profile for each marketplace
     - Write a brand description that attracts quality creators
     - Showcase past campaigns and results
     - Define ideal creator criteria
  2. Campaign listing creation:
     - Write 3 campaign listings for different goals:
       Listing 1: Product launch awareness campaign
       Listing 2: Ongoing content creation program
       Listing 3: UGC content creation (for ads, not influencer channels)
     - Each listing with:
       Campaign description, deliverables, compensation,
       ideal creator profile, timeline, application questions
  3. Inbound application management:
     - Application screening criteria
     - Response templates:
       Acceptance message
       Waitlist message
       Rejection message
       Request for more information
     - Interview/vetting process for applicants
     - Onboarding flow after acceptance
  4. Marketplace vs. direct outreach:
     - When to use marketplaces
     - When direct outreach is better
     - Hybrid approach strategy
     - Cost comparison (marketplace fees vs. outreach time)

  Part 3: Marketplace optimization
  1. Standing out as a brand in competitive marketplaces
  2. Pricing strategy for marketplace campaigns
  3. Building a talent pipeline from marketplace applicants
  4. Marketplace analytics and reporting

assertions:
  - type: llm_judge
    criteria: "Campaign listings are compelling — they attract quality creators by clearly communicating opportunity, compensation, and creative freedom"
    weight: 0.30
    description: "Compelling campaign listings"
  - type: llm_judge
    criteria: "Application management is efficient — the screening and response system handles high volumes without losing personal touch"
    weight: 0.25
    description: "Efficient application management"
  - type: llm_judge
    criteria: "Marketplace vs. direct outreach comparison is strategic — the guidance helps brands choose the right approach for each situation"
    weight: 0.25
    description: "Strategic marketplace guidance"
  - type: llm_judge
    criteria: "Brand profile optimization shows marketplace expertise — profiles are designed to attract the right creators, not just any applicants"
    weight: 0.20
    description: "Optimized brand profiles"
