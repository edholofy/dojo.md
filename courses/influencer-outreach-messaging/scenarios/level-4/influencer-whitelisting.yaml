meta:
  id: influencer-whitelisting
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Master influencer whitelisting and paid amplification — negotiate ad permissions, optimize influencer content as paid media, and integrate organic and paid strategies"
  tags: [influencer, whitelisting, paid-amplification, ads, performance, expert]

state: {}

trigger: |
  Influencer whitelisting (also called creator licensing or
  spark ads) allows brands to run paid ads through the
  influencer's account. This combines the influencer's
  authenticity with the targeting precision of paid media,
  often outperforming both organic influencer content and
  traditional brand ads.

  Part 1: Whitelisting fundamentals
  1. How whitelisting works:
     - Brand gets ad permissions on influencer's account
     - Ads appear as the influencer's content (not brand ads)
     - Better performance: 20-50% lower CPA than brand ads
     - Platform-specific whitelisting:
       Meta (Facebook/Instagram): Business Manager partnership
       TikTok: Spark Ads authorization
       YouTube: BrandConnect and ad partnerships
  2. Why whitelisting outperforms:
     - Social proof (content from a person, not a brand)
     - Audience targeting + creator authenticity
     - Access to influencer's first-party data
     - Extended content lifespan
  3. Types of whitelisted content:
     - Organic posts boosted with paid budget
     - Dark posts (ads from influencer account, not on feed)
     - Hybrid (organic post + paid amplification)

  Part 2: Build a whitelisting program
  For "Flux Performance" — a performance nutrition brand:
  1. Whitelisting negotiation strategy:
     - How to introduce whitelisting in the initial pitch
     - Outreach message that includes whitelisting request
     - Pricing models for whitelisting rights:
       Flat fee add-on (common: 20-40% premium)
       Performance-based (brand pays for results)
       Included in package (for larger deals)
     - Contract language for ad permissions
  2. Campaign design with whitelisting:
     - Create a campaign brief for whitelisted content
     - Content format optimization for paid amplification
     - A/B testing framework (influencer content vs. brand creative)
     - Audience targeting strategy using influencer's audience
     - Budget allocation: organic + paid amplification split
  3. Performance optimization:
     - Creative testing and iteration
     - Audience expansion using lookalike audiences
     - Retargeting with influencer content
     - Scaling winning creative
     - Dashboard design for whitelisted campaign performance
  4. Show hypothetical performance comparison:
     - Campaign A: Organic-only influencer content
     - Campaign B: Same content with paid amplification
     - Campaign C: Whitelisted dark posts with targeting
     - Performance metrics comparison

  Part 3: Advanced whitelisting strategies
  1. Always-on whitelisting programs
  2. Whitelisting with UGC creators
  3. Multi-influencer whitelisting campaigns
  4. Legal and compliance considerations

assertions:
  - type: llm_judge
    criteria: "Whitelisting is technically accurately described — platform-specific processes for Meta, TikTok, and YouTube are correct"
    weight: 0.30
    description: "Technically accurate whitelisting"
  - type: llm_judge
    criteria: "Negotiation strategy addresses creator hesitancy — many influencers are wary of brands running ads from their accounts, and this is handled diplomatically"
    weight: 0.25
    description: "Creator-sensitive negotiation"
  - type: llm_judge
    criteria: "Performance comparison is compelling — the data shows clear advantages of whitelisting vs. organic-only approaches"
    weight: 0.25
    description: "Compelling performance comparison"
  - type: llm_judge
    criteria: "Pricing models are fair to both parties — whitelisting premiums reflect the additional value and risk for the influencer"
    weight: 0.20
    description: "Fair whitelisting pricing"
