meta:
  id: influencer-roi-attribution
  level: 4
  course: influencer-outreach-messaging
  type: output
  description: "Build advanced influencer ROI attribution — design multi-touch models, incrementality tests, and lifetime value analysis for influencer marketing investment decisions"
  tags: [influencer, roi, attribution, incrementality, ltv, expert]

state: {}

trigger: |
  Proving influencer marketing ROI requires sophisticated
  attribution beyond last-click tracking. Multi-touch models,
  incrementality testing, and customer lifetime value analysis
  demonstrate the true business impact of influencer partnerships.

  For "Apex Health" — a DTC health supplement company ($20M annual
  revenue, $2M annual influencer spend):

  1. Attribution model design:
     - Current state: Last-click promo code attribution
     - Problem: Only captures 30-40% of influencer impact
     - Design 3 attribution models:
       Model A: Multi-touch attribution (weighted touchpoints)
       Model B: Time-decay attribution (recency-weighted)
       Model C: Data-driven attribution (algorithmic)
     - Apply all 3 models to the same hypothetical dataset
     - Show how each model values influencer marketing differently
     - Recommend the best model for this business

  2. Incrementality testing framework:
     - Design an incrementality test:
       Test group (exposed to influencer content)
       Control group (not exposed)
       Test duration and sample size requirements
     - Measure incremental conversions
     - Calculate true incremental ROAS
     - Compare to blended/last-click ROAS
     - Show hypothetical results with analysis

  3. Customer lifetime value analysis:
     - Compare CLV of influencer-acquired vs. other channels:
       Influencer-acquired customer avg order: $85
       Paid social-acquired avg order: $62
       Organic/SEO-acquired avg order: $73
     - 12-month retention and repeat purchase rates
     - CLV calculation per acquisition channel
     - Long-term ROI when factoring in CLV

  4. Executive ROI presentation:
     - Build a business case for increasing influencer spend
     - Connect ROI data to budget recommendations
     - Competitive benchmarking ($5.20 avg ROI per $1 spent)
     - Future investment thesis

  5. Continuous measurement:
     - Real-time attribution dashboard design
     - Monthly ROI reporting cadence
     - Quarterly incrementality tests
     - Annual full program ROI assessment

assertions:
  - type: llm_judge
    criteria: "The 3 attribution models are technically sound — each methodology is correctly explained and applied to the same dataset with different results"
    weight: 0.30
    description: "Technically sound attribution models"
  - type: llm_judge
    criteria: "Incrementality testing is rigorous — test and control groups, sample sizes, and measurement periods are scientifically appropriate"
    weight: 0.25
    description: "Rigorous incrementality testing"
  - type: llm_judge
    criteria: "CLV analysis shows meaningful differences — influencer-acquired customers have quantifiably different lifetime value"
    weight: 0.25
    description: "Meaningful CLV differentiation"
  - type: llm_judge
    criteria: "The executive presentation makes a compelling business case — it connects data to specific investment recommendations"
    weight: 0.20
    description: "Compelling executive business case"
