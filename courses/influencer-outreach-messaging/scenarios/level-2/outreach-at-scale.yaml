meta:
  id: outreach-at-scale
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Scale influencer outreach — build systems for managing high-volume outreach while maintaining personalization, tracking, and follow-up consistency"
  tags: [influencer, scale, systems, tracking, high-volume, intermediate]

state: {}

trigger: |
  Scaling outreach from 10 influencers to 100+ per month
  requires systems: tracking tools, template libraries,
  workflow automation, and team coordination. The challenge
  is maintaining personalization quality while increasing volume.

  Part 1: Scaling outreach operations
  1. Outreach volume management:
     - Organizing outreach in batches
     - Daily/weekly outreach cadence
     - Team role assignments (researcher, writer, sender)
     - Avoiding platform rate limits and spam flags
  2. Tracking and CRM systems:
     - Spreadsheet-based tracking (for small teams)
     - Dedicated influencer CRM platforms
     - Pipeline stages: Research → Outreach → Follow-up →
       Negotiation → Contract → Active → Complete
     - Status tracking and reporting
  3. Personalization at scale:
     - Research shortcuts that still yield quality insights
     - Template customization workflows
     - Batch research sessions
     - Quality control checkpoints

  Part 2: Build a scaled outreach system
  For "Elevate Supplements" — a sports nutrition brand
  launching a major campaign needing 50 influencer partners:
  1. Design the outreach pipeline:
     - Target list: 150 influencers to research and contact
       (expecting ~33% response rate)
     - Research workflow: 10 minutes per influencer
     - Outreach schedule: 10 messages per day for 15 days
     - Follow-up automation: Day 5, Day 10, Day 20
     - Pipeline tracking spreadsheet template
  2. Create batch outreach templates:
     - 3 template variants for A/B testing
     - Personalization checklist (minimum 3 custom elements)
     - Quality assurance review process
  3. Design the team workflow:
     - Researcher: Find and vet influencers (3/hour)
     - Writer: Customize outreach messages (5/hour)
     - Account manager: Handle responses and negotiations
     - Show daily and weekly workflow schedules
  4. Build outreach performance metrics:
     - Open rates, response rates, conversion rates
     - Time-to-first-response averages
     - Best-performing templates
     - Pipeline velocity (outreach to signed deal)

  Part 3: Scale sustainably
  1. When volume hurts quality (warning signs)
  2. Automation tools that help vs. hurt
  3. Maintaining brand reputation during mass outreach
  4. Scaling from 50 to 500 influencer partnerships

assertions:
  - type: llm_judge
    criteria: "The outreach pipeline is mathematically sound — target numbers, response rates, and timelines work together realistically"
    weight: 0.30
    description: "Mathematically sound pipeline"
  - type: llm_judge
    criteria: "Personalization is maintained at scale — the system doesn't sacrifice quality for volume, with clear quality checkpoints"
    weight: 0.25
    description: "Quality maintained at scale"
  - type: llm_judge
    criteria: "Team workflow is realistic — hourly output expectations per role are achievable for skilled professionals"
    weight: 0.25
    description: "Realistic team workflow"
  - type: llm_judge
    criteria: "Performance metrics are actionable — they identify what to improve, not just what happened"
    weight: 0.20
    description: "Actionable performance metrics"
