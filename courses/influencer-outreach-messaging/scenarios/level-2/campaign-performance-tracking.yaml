meta:
  id: campaign-performance-tracking
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Track influencer campaign performance — measure ROI, engagement metrics, conversion attribution, and content value to prove campaign effectiveness"
  tags: [influencer, performance, tracking, roi, metrics, intermediate]

state: {}

trigger: |
  Measuring influencer campaign performance proves ROI and
  informs future partnerships. Beyond likes and comments,
  tracking conversions, brand lift, and content value
  demonstrates the business impact of influencer marketing.

  Part 1: Performance measurement framework
  1. Engagement metrics:
     - Engagement rate (likes + comments / reach)
     - Save rate (Instagram saves / impressions)
     - Share rate (shares / impressions)
     - Comment quality (sentiment, depth)
  2. Reach and awareness metrics:
     - Impressions and reach
     - Video views and watch time
     - Profile visits and follower growth
     - Brand mention volume
  3. Conversion metrics:
     - Click-through rate (CTR)
     - Landing page visits from influencer content
     - Promo code redemptions
     - Direct sales attribution
     - Lead generation (sign-ups, downloads)
  4. Content value metrics:
     - Earned media value (EMV) calculation
     - Content quality score
     - Content lifespan (how long it generates value)
     - Repurposing potential

  Part 2: Build a performance tracking system
  For "BrightPath Learning" — an ed-tech platform:
  1. Design a campaign tracking dashboard:
     - Per-influencer performance cards
     - Campaign-level aggregate metrics
     - Cost-per-engagement calculations
     - Cost-per-acquisition from influencer channel
     - Comparison to other marketing channels
  2. Create 3 months of hypothetical performance data
     for a 10-influencer campaign:
     - Show performance variation across influencers
     - Identify top performers and underperformers
     - Calculate overall campaign ROI
     - Show which metrics matter most for ed-tech
  3. Build a post-campaign report template:
     - Executive summary (1 page)
     - Per-influencer performance breakdown
     - Top-performing content analysis
     - Lessons learned and recommendations
     - Next campaign optimization plan
  4. Design re-investment recommendations:
     - Which influencers to re-engage
     - Budget allocation adjustments
     - Format and platform optimization

  Part 3: Advanced performance analysis
  1. Attribution modeling for influencer marketing
  2. Long-term brand lift measurement
  3. Benchmarking against industry standards
  4. Predictive performance modeling for influencer selection

assertions:
  - type: llm_judge
    criteria: "The tracking dashboard captures meaningful metrics — it goes beyond vanity metrics to measure actual business impact"
    weight: 0.30
    description: "Meaningful performance metrics"
  - type: llm_judge
    criteria: "The 3-month hypothetical data is realistic — performance varies across influencers and shows plausible engagement rates and conversion numbers"
    weight: 0.25
    description: "Realistic performance data"
  - type: llm_judge
    criteria: "The post-campaign report tells a story — it doesn't just list numbers but provides insights and actionable recommendations"
    weight: 0.25
    description: "Insight-driven reporting"
  - type: llm_judge
    criteria: "Re-investment recommendations are data-driven — they connect performance data to specific decisions about future partnerships"
    weight: 0.20
    description: "Data-driven re-investment"
