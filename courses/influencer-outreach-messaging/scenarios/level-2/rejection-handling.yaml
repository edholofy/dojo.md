meta:
  id: rejection-handling
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Handle outreach rejections professionally — respond to declines, no-responses, and difficult conversations while keeping doors open for future collaboration"
  tags: [influencer, rejection, follow-up, professionalism, persistence, intermediate]

state: {}

trigger: |
  Most outreach messages don't get responses, and many that do
  are rejections. How you handle rejection determines whether
  the door stays open for future opportunities. Professional,
  graceful rejection handling is a core outreach skill.

  Part 1: Understanding rejection
  1. Types of rejection:
     - No response (most common — 70-80% of outreach)
     - Polite decline ("not interested right now")
     - Rate mismatch ("my rates are higher than your budget")
     - Brand fit decline ("not aligned with my content")
     - Timing decline ("fully booked for the next 3 months")
     - Ghosting mid-conversation (agreed, then disappeared)
  2. Why influencers don't respond:
     - Inbox overload (popular creators get 50+ pitches/week)
     - Message went to spam or requests folder
     - Genuinely not interested
     - Forgot to respond (life happens)
  3. The psychology of rejection:
     - Don't take it personally
     - Rejection is data, not failure
     - Today's "no" can be tomorrow's "yes"

  Part 2: Handle rejection scenarios
  For "Wildcraft Skincare" — a natural skincare brand:
  Write professional responses for each rejection type:

  1. No response after initial outreach:
     - Follow-up #1 (5 days later)
     - Follow-up #2 (10 days later, different angle)
     - When to stop following up

  2. "I don't think it's the right fit":
     - Graceful acceptance response
     - Ask for feedback (optional, low-pressure)
     - Future door-opener

  3. "Your budget is too low":
     - Response exploring alternatives (scope adjustment,
       different deliverables, value-adds)
     - When to increase budget vs. walk away

  4. "I'm booked for the next few months":
     - Response that books them for the future
     - How to stay on their radar until then

  5. "I only work through my manager/agent":
     - How to pivot to working with management
     - Agent outreach message template

  6. Ghosted after initial agreement:
     - First check-in message
     - Second check-in with easy exit ramp
     - When to move on

  Part 3: Improving outreach from rejection data
  1. Tracking rejection reasons and patterns
  2. Adjusting outreach based on rejection feedback
  3. Reapproaching declined influencers (timing and approach)
  4. Building a "warm bench" from polite declines

assertions:
  - type: llm_judge
    criteria: "All rejection responses are professional and graceful — they maintain dignity for both parties and keep doors open"
    weight: 0.30
    description: "Professional graceful responses"
  - type: llm_judge
    criteria: "Follow-up sequences know when to stop — the guidance prevents pestering while allowing reasonable persistence"
    weight: 0.25
    description: "Appropriate persistence limits"
  - type: llm_judge
    criteria: "Budget mismatch responses are creative — they explore alternatives beyond just paying more or walking away"
    weight: 0.25
    description: "Creative budget mismatch solutions"
  - type: llm_judge
    criteria: "Rejection data analysis is practical — patterns are tracked to improve future outreach, not just to feel better about rejections"
    weight: 0.20
    description: "Practical rejection analysis"
