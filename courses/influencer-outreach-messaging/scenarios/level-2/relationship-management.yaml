meta:
  id: relationship-management
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Manage influencer relationships — build long-term partnerships through consistent communication, exclusive opportunities, and genuine relationship nurturing"
  tags: [influencer, relationships, partnerships, retention, nurturing, intermediate]

state: {}

trigger: |
  The best influencer partnerships are long-term relationships,
  not one-off transactions. Relationship management turns a
  single campaign into an ongoing partnership where influencers
  become genuine brand advocates.

  Part 1: Relationship management fundamentals
  1. Why long-term beats one-off:
     - Audience trust builds with repeated endorsement
     - Lower cost per activation (reduced negotiation/onboarding)
     - Deeper product understanding and authentic content
     - Exclusive access to their audience insights
  2. Relationship lifecycle:
     - Discovery → Outreach → First Campaign → Evaluation →
       Re-engagement → Deepening → Ambassador → Advocate
  3. Relationship building activities:
     - Between-campaign engagement (commenting, sharing)
     - Exclusive previews and early access
     - Birthday/milestone acknowledgments
     - Invitations to brand events
     - Asking for their input on products/strategy
     - Surprise and delight moments

  Part 2: Build a relationship management system
  For "Evergreen Outdoor" — an outdoor lifestyle brand:
  1. Create an influencer CRM framework:
     - Contact information and social profiles
     - Campaign history and performance
     - Communication log (every interaction)
     - Relationship score (1-10 based on engagement and results)
     - Notes on personal preferences, interests, important dates
     - Next touchpoint scheduled
  2. Design relationship nurturing sequences:
     - Post-campaign: 5-touch follow-up sequence
       (thank you, results share, feedback request,
        future opportunity tease, anniversary acknowledgment)
     - Between campaigns: Monthly touchpoint calendar
       (what to share, when to engage, how to stay top-of-mind)
     - Re-engagement: Winning back an inactive influencer
  3. Write relationship messages:
     - Campaign wrap-up thank you (with results shared)
     - Birthday/milestone message
     - Exclusive product preview invitation
     - Feedback request (valuing their opinion)
     - Ambassador program upgrade invitation

  Part 3: Relationship scaling
  1. Managing 50+ influencer relationships efficiently
  2. When to end an influencer relationship (and how)
  3. Turning influencers into co-creators and advisors
  4. Measuring relationship health metrics

assertions:
  - type: llm_judge
    criteria: "The CRM framework captures meaningful relationship data — not just metrics but personal details that enable genuine connection"
    weight: 0.30
    description: "Meaningful CRM framework"
  - type: llm_judge
    criteria: "Nurturing sequences are genuine — they show real care for the relationship, not just marketing automation"
    weight: 0.25
    description: "Genuine nurturing sequences"
  - type: llm_judge
    criteria: "Relationship messages are warm and personal — they don't read like automated templates but like messages from a person who cares"
    weight: 0.25
    description: "Warm personal messages"
  - type: llm_judge
    criteria: "Ending relationships is handled gracefully — there's a professional, respectful approach to winding down partnerships"
    weight: 0.20
    description: "Graceful relationship endings"
