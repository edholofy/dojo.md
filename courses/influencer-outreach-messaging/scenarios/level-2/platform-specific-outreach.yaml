meta:
  id: platform-specific-outreach
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Adapt outreach for specific platforms — customize messaging, deliverables, and campaign structures for Instagram, TikTok, YouTube, LinkedIn, and podcast influencers"
  tags: [influencer, platform-specific, instagram, tiktok, youtube, intermediate]

state: {}

trigger: |
  Each platform has unique creator cultures, content formats,
  audience behaviors, and monetization norms. Outreach that
  works on Instagram may fail on TikTok. Platform-specific
  outreach shows creators you understand their world.

  Part 1: Platform-specific outreach principles
  For each platform, explain the creator culture and outreach norms:
  1. Instagram:
     - Creator types (lifestyle, niche, aesthetic-focused)
     - Content deliverables (feed posts, Reels, Stories, Guides)
     - Outreach channel (DM for nano/micro, email for larger)
     - Pricing norms and engagement expectations
  2. TikTok:
     - Creator types (entertainment, educational, trend-driven)
     - Content deliverables (videos, duets, stitches, Lives)
     - Outreach channel (DM, email, creator marketplace)
     - Pricing norms (often lower per-post, higher volume)
  3. YouTube:
     - Creator types (long-form, shorts, educational, review)
     - Content deliverables (dedicated video, integration, shorts)
     - Outreach channel (business email in about, agent)
     - Pricing norms (higher per-video, longer creation time)
  4. LinkedIn:
     - Creator types (thought leaders, industry experts)
     - Content deliverables (posts, articles, newsletters, videos)
     - Outreach channel (InMail, connection request, email)
     - Pricing norms (premium for B2B audience)
  5. Podcasts:
     - Creator types (interview, solo, panel, storytelling)
     - Content deliverables (guest appearance, ad read, sponsorship)
     - Outreach channel (email, booking form, agent)
     - Pricing norms (CPM-based or flat rate)

  Part 2: Write platform-specific outreach
  For "DataSphere" — a B2B data analytics platform:
  Write 1 outreach message for each platform:
  1. Instagram: Tech influencer for product demo Reel
  2. TikTok: Data science creator for educational content
  3. YouTube: Tech reviewer for in-depth software review
  4. LinkedIn: Industry thought leader for sponsored post
  5. Podcast: Data podcast host for guest interview + sponsorship

  For each message include:
  - The complete outreach message
  - Platform-specific formatting and tone
  - Deliverables requested
  - Compensation approach
  - Why this approach works on this specific platform

  Part 3: Cross-platform campaigns
  1. When to work with the same creator across platforms
  2. Platform-exclusive content strategies
  3. Measuring performance across different platforms
  4. Emerging platforms and early-mover outreach advantages

assertions:
  - type: llm_judge
    criteria: "All 5 platform outreach messages reflect genuine platform culture — the TikTok message doesn't read like a LinkedIn InMail"
    weight: 0.30
    description: "Genuine platform culture reflection"
  - type: llm_judge
    criteria: "Deliverables are platform-appropriate — YouTube gets long-form integration, TikTok gets short-form creative, LinkedIn gets thought leadership"
    weight: 0.25
    description: "Platform-appropriate deliverables"
  - type: llm_judge
    criteria: "Compensation approaches match platform norms — YouTube creators expect higher per-video rates while TikTok may involve lower per-post but more content"
    weight: 0.25
    description: "Platform-appropriate compensation"
  - type: llm_judge
    criteria: "B2B context is maintained — outreach messages for a data analytics platform maintain professional credibility while matching each platform's tone"
    weight: 0.20
    description: "B2B context maintenance"
