meta:
  id: contract-essentials
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Draft influencer contracts — create clear partnership agreements covering deliverables, payment, content rights, exclusivity, termination, and legal protections"
  tags: [influencer, contracts, legal, agreements, rights, intermediate]

state: {}

trigger: |
  Written contracts protect both brands and influencers.
  A clear agreement prevents misunderstandings about
  deliverables, payment, content ownership, exclusivity,
  and what happens when things go wrong.

  Part 1: Contract components
  1. Essential clauses:
     - Parties and engagement period
     - Scope of work (deliverables, specifications)
     - Compensation and payment terms
     - Content approval process
     - FTC disclosure requirements
     - Content rights and licensing
     - Exclusivity and non-compete
     - Confidentiality
     - Termination conditions
     - Morality/reputation clause
  2. Content rights explained:
     - License vs. ownership (creators usually retain ownership)
     - Organic use vs. paid amplification rights
     - Duration of content rights
     - Derivative works and repurposing
     - Platforms and territories
  3. Risk protection:
     - Indemnification clauses
     - Force majeure provisions
     - Dispute resolution
     - Insurance requirements (for larger deals)

  Part 2: Draft contract templates
  For "Nova Cosmetics" — a beauty brand:
  1. Draft a basic influencer agreement (nano/micro level):
     - Simple 1-2 page agreement
     - Key terms in plain language
     - Appropriate for gifting + small fee arrangements
  2. Draft a comprehensive partnership agreement (mid/macro):
     - Full legal agreement covering all clauses
     - Multi-deliverable campaign terms
     - Usage rights matrix
     - Performance benchmarks
  3. Draft a brand ambassador agreement (long-term):
     - 6-12 month ongoing partnership
     - Monthly deliverables and compensation
     - Exclusivity terms
     - Renewal and termination provisions
  4. Create a contract negotiation guide:
     - Which clauses influencers typically push back on
     - Reasonable flexibility for each clause
     - Deal-breaker terms (non-negotiable)

  Part 3: Contract best practices
  1. When to use formal contracts vs. simple agreements
  2. Getting contracts signed quickly (reducing friction)
  3. Contract management and tracking
  4. International partnership considerations

assertions:
  - type: llm_judge
    criteria: "All 3 contract templates are comprehensive for their level — the basic agreement covers essentials while the comprehensive one addresses complex scenarios"
    weight: 0.30
    description: "Level-appropriate contract templates"
  - type: llm_judge
    criteria: "Content rights and licensing terms are clearly explained — both brand and influencer understand who can use what, where, and for how long"
    weight: 0.25
    description: "Clear content rights terms"
  - type: llm_judge
    criteria: "Contracts are written in accessible language — a non-lawyer influencer can understand the terms without legal counsel"
    weight: 0.25
    description: "Accessible contract language"
  - type: llm_judge
    criteria: "The negotiation guide identifies real friction points — it addresses clauses that actually cause deal delays"
    weight: 0.20
    description: "Real friction point identification"
