meta:
  id: ambassador-programs
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Design brand ambassador programs — create long-term influencer partnership structures with tiered benefits, ongoing deliverables, and exclusive community features"
  tags: [influencer, ambassador, long-term, program, community, intermediate]

state: {}

trigger: |
  Brand ambassador programs transform one-off influencer
  partnerships into long-term relationships with consistent
  content creation, deeper brand integration, and mutual
  growth. A well-designed program attracts and retains top
  creators while providing predictable content output.

  Part 1: Ambassador program fundamentals
  1. Ambassador vs. one-off collaboration:
     - Duration (3-12 months minimum)
     - Deeper brand relationship and product knowledge
     - Consistent content cadence
     - Exclusive benefits and perks
     - Performance-based growth opportunities
  2. Ambassador program models:
     - Tiered (Bronze/Silver/Gold based on performance)
     - Flat (same benefits for all ambassadors)
     - Application-based (competitive selection)
     - Invitation-only (hand-picked creators)
  3. Program components:
     - Monthly deliverables (content requirements)
     - Compensation structure (retainer, commission, hybrid)
     - Exclusive benefits (early access, events, gifts)
     - Community features (ambassador group, networking)
     - Growth path (advancement opportunities)

  Part 2: Build an ambassador program
  For "Drift & Co." — a surf and beach lifestyle brand:
  1. Design a 3-tier ambassador program:
     Tier 1: "Wave Riders" (entry level)
     - Requirements, deliverables, compensation, benefits
     Tier 2: "Tide Makers" (proven performers)
     - Requirements, deliverables, compensation, benefits
     Tier 3: "Ocean Partners" (elite ambassadors)
     - Requirements, deliverables, compensation, benefits
  2. Create the application and onboarding flow:
     - Application form (what to ask)
     - Selection criteria and scoring
     - Welcome package contents
     - Onboarding sequence (emails, materials, community access)
  3. Write all program communications:
     - Ambassador recruitment outreach message
     - Application confirmation email
     - Acceptance email with program details
     - Rejection email (encouraging future application)
     - Monthly check-in template
     - Tier advancement notification
     - Program renewal invitation

  Part 3: Program management
  1. Tracking ambassador performance and engagement
  2. Handling underperforming ambassadors
  3. Ambassador community management
  4. Program evolution and seasonal updates

assertions:
  - type: llm_judge
    criteria: "The 3-tier program has meaningfully different levels — each tier offers proportionally more benefits for more commitment, with clear advancement criteria"
    weight: 0.30
    description: "Meaningfully tiered program"
  - type: llm_judge
    criteria: "All program communications are complete and professional — from recruitment to renewal, every touchpoint is covered"
    weight: 0.25
    description: "Complete program communications"
  - type: llm_judge
    criteria: "The program is attractive to influencers — benefits go beyond just free products and include genuine career and community value"
    weight: 0.25
    description: "Attractive program design"
  - type: llm_judge
    criteria: "Underperformance handling is fair — there's a constructive approach to ambassadors not meeting expectations before termination"
    weight: 0.20
    description: "Fair underperformance handling"
