meta:
  id: influencer-content-review
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Review and approve influencer content — provide constructive feedback, manage revision processes, and maintain brand standards without stifling creator authenticity"
  tags: [influencer, content-review, feedback, approval, quality, intermediate]

state: {}

trigger: |
  Content review is one of the most delicate parts of influencer
  partnerships. Brands need content that meets their standards,
  but heavy-handed feedback can damage relationships and produce
  inauthentic content. The art is guiding without controlling.

  Part 1: Content review fundamentals
  1. What to review:
     - Brand messaging accuracy
     - FTC disclosure compliance
     - Visual quality and brand alignment
     - Caption accuracy and tone
     - Hashtags and tagging
     - Content safety (nothing controversial or off-brand)
  2. What NOT to review:
     - Personal style and aesthetic (it's their brand too)
     - Minor creative choices that don't affect messaging
     - Grammar preferences (their voice, their rules)
     - Platform-native formatting (they know their audience)
  3. Review process design:
     - Draft submission timeline
     - Review turnaround time (24-48 hours max)
     - Revision limits (1-2 rounds maximum)
     - Approval confirmation process

  Part 2: Handle content review scenarios
  For "Prism Beauty" — a cosmetics brand:
  Write review feedback for 6 scenarios:

  1. Content is great — approve with enthusiasm
     (response message that reinforces the relationship)

  2. Minor feedback — product name is wrong
     (correction message that's helpful, not critical)

  3. Major feedback — key message is missing entirely
     (constructive revision request with clear guidance)

  4. FTC compliance issue — no disclosure visible
     (compliance correction that educates, not lectures)

  5. Visual concern — product shown incorrectly
     (specific, visual-focused feedback)

  6. Difficult situation — content feels forced and inauthentic
     (diplomatic feedback encouraging more natural approach)

  For each scenario provide:
  - The feedback message (email or DM)
  - The tone and approach rationale
  - What to avoid saying
  - How to maintain the positive relationship

  Part 3: Content review best practices
  1. Creating a review checklist for consistency
  2. Building a feedback library (common responses)
  3. When to accept imperfect content (not every detail matters)
  4. Escalation: when influencer refuses revisions

assertions:
  - type: llm_judge
    criteria: "All 6 feedback scenarios are handled with appropriate tone — positive for approvals, constructive for corrections, diplomatic for difficult situations"
    weight: 0.30
    description: "Appropriately toned feedback"
  - type: llm_judge
    criteria: "Feedback is specific and actionable — each revision request tells the influencer exactly what to change and why"
    weight: 0.25
    description: "Specific actionable feedback"
  - type: llm_judge
    criteria: "The difficult scenario response preserves the relationship — the inauthentic content feedback doesn't insult the creator's work"
    weight: 0.25
    description: "Relationship-preserving difficult feedback"
  - type: llm_judge
    criteria: "The review process balances brand standards with creative freedom — it doesn't try to control every creative choice"
    weight: 0.20
    description: "Standards-freedom balance"
