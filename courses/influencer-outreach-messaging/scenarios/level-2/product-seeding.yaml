meta:
  id: product-seeding
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Master product seeding campaigns — design gifting strategies that generate authentic content, manage logistics, and measure earned media value from product sends"
  tags: [influencer, product-seeding, gifting, earned-media, unboxing, intermediate]

state: {}

trigger: |
  Product seeding — sending free products to influencers in
  exchange for potential (not guaranteed) content — is one of
  the most cost-effective influencer strategies. When done
  right, it generates authentic content at a fraction of
  paid partnership costs.

  Part 1: Product seeding strategy
  1. How product seeding works:
     - Send product → Influencer tries it → They may post
     - No posting obligation (organic mentions)
     - vs. "Gifting with expectations" (posting required)
     - vs. Paid partnerships (guaranteed deliverables)
  2. Why seeding works:
     - Lower cost per activation
     - More authentic content (genuine reactions)
     - Scale (can seed 100+ influencers affordably)
     - Discovery of organic brand advocates
  3. Seeding challenges:
     - No guaranteed content
     - Logistics of shipping to many influencers
     - ROI measurement difficulty
     - Product waste (some never post)

  Part 2: Build a seeding campaign
  For "Aura Candle Co." — a luxury candle brand ($35-65 per candle):
  1. Design a seeding strategy:
     - Target 50 nano/micro influencers in lifestyle and home decor
     - Selection criteria for seeding recipients
     - Product selection (which products to seed)
     - Seeding package design (unboxing experience)
  2. Create seeding outreach and materials:
     - Initial outreach message (asking for shipping address)
     - Package insert card (personalized note + brand info)
     - Post-delivery follow-up message
     - Social media engagement strategy after delivery
     - Thank you message if they post (whether paid-required or not)
  3. Design the unboxing experience:
     - Package aesthetics (Instagram-worthy presentation)
     - Personal touches (handwritten note, name personalization)
     - Product information card (not a sales sheet)
     - Clear but soft posting guidance
     - Hashtag and tagging suggestions
  4. Tracking and measurement:
     - Expected post rate (industry benchmark: 30-40%)
     - Earned media value calculation
     - Content quality assessment
     - Conversion tracking from seeded content

  Part 3: Seeding optimization
  1. When to upgrade seedees to paid partnerships
  2. Seasonal seeding strategies
  3. Re-seeding campaigns (sending new products to past recipients)
  4. Managing negative reactions to seeded products

assertions:
  - type: llm_judge
    criteria: "The seeding strategy is realistic — targeting 50 influencers with $35-65 candles is a manageable investment with realistic post rate expectations"
    weight: 0.30
    description: "Realistic seeding strategy"
  - type: llm_judge
    criteria: "The unboxing experience is thoughtfully designed — packaging, personal touches, and presentation would genuinely inspire an influencer to share"
    weight: 0.25
    description: "Thoughtful unboxing design"
  - type: llm_judge
    criteria: "Outreach messages respect the 'no obligation' nature of seeding — they don't pressure posting while making it easy to share"
    weight: 0.25
    description: "Respectful seeding outreach"
  - type: llm_judge
    criteria: "Earned media value calculation is methodologically sound — it provides a realistic way to measure seeding ROI"
    weight: 0.20
    description: "Sound EMV calculation"
