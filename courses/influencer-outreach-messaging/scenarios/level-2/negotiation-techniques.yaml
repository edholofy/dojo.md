meta:
  id: negotiation-techniques
  level: 2
  course: influencer-outreach-messaging
  type: output
  description: "Master influencer negotiation — handle counter-offers, scope adjustments, exclusivity terms, and rate discussions while maintaining positive relationships"
  tags: [influencer, negotiation, rates, counter-offers, terms, intermediate]

state: {}

trigger: |
  Negotiation is a normal part of influencer partnerships.
  Influencers often counter-offer on rates, scope, or terms.
  Effective negotiation finds win-win solutions that respect
  the creator's value while meeting the brand's budget and goals.

  Part 1: Negotiation fundamentals
  1. What's negotiable:
     - Compensation (rates, bonuses, commission)
     - Deliverables (number, format, platform)
     - Timeline (deadlines, posting schedule)
     - Usage rights (duration, platforms, paid amplification)
     - Exclusivity (category, duration, scope)
  2. What's NOT negotiable:
     - FTC disclosure requirements
     - Brand safety standards
     - Content quality expectations
     - Payment timeline (pay on time, always)
  3. Negotiation mindset:
     - Partnership, not adversarial
     - Understanding the influencer's perspective
     - Knowing your walk-away point
     - Creating value, not just dividing it

  Part 2: Handle negotiation scenarios
  For "Catalyst Activewear" — a sustainable activewear brand:
  Respond to 6 negotiation scenarios:

  Scenario 1: Rate counter-offer
  Influencer (50K followers) quotes $2,500 for an IG Reel.
  Your budget is $1,500. Write a response that finds middle ground.

  Scenario 2: Scope expansion request
  Influencer agrees to rate but wants to post only 1 piece
  instead of the 3 in your brief. How to respond.

  Scenario 3: Exclusivity pushback
  Influencer doesn't want 6-month exclusivity in athleisure.
  How to adjust terms while protecting the brand.

  Scenario 4: Usage rights discussion
  Influencer agrees to organic posting but doesn't want content
  used in paid ads. How to negotiate usage rights.

  Scenario 5: Payment terms
  Influencer wants full payment upfront. You normally pay
  50% upfront, 50% after posting. How to find agreement.

  Scenario 6: Creative control
  Influencer wants full creative control with no approval.
  You need brand safety review. How to navigate.

  For each scenario, provide:
  - The response message (email or DM)
  - The negotiation strategy behind it
  - Best possible outcome
  - Walk-away criteria

  Part 3: Advanced negotiation tactics
  1. Anchoring techniques in rate discussions
  2. Building packages vs. negotiating per-item
  3. When to walk away (and how to do it gracefully)
  4. Re-engaging after a failed negotiation

assertions:
  - type: llm_judge
    criteria: "All 6 negotiation responses find genuine compromises — they don't just cave or hardball but create win-win solutions"
    weight: 0.30
    description: "Genuine compromise solutions"
  - type: llm_judge
    criteria: "Response messages maintain positive relationship tone — negotiations feel collaborative, not combative"
    weight: 0.25
    description: "Positive relationship tone"
  - type: llm_judge
    criteria: "Walk-away criteria are well-defined — clear lines exist for when a deal isn't worth pursuing"
    weight: 0.25
    description: "Well-defined walk-away criteria"
  - type: llm_judge
    criteria: "Negotiation strategies show understanding of influencer perspective — responses acknowledge why the influencer's position is reasonable"
    weight: 0.20
    description: "Influencer-perspective understanding"
