meta:
  id: creator-economy-strategy
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Navigate the creator economy — design brand strategies for the evolving creator ecosystem including virtual influencers, AI creators, and decentralized platforms"
  tags: [influencer, creator-economy, emerging, virtual-influencers, future, mastery]

state: {}

trigger: |
  The creator economy is a $250B+ industry undergoing rapid
  transformation. Virtual influencers, AI-generated content,
  decentralized platforms, and evolving creator-brand dynamics
  require forward-thinking strategies.

  Part 1: Creator economy landscape (2025-2027)
  1. Key trends:
     - 86% of creators use AI tools in content creation
     - Creator-brand equity partnerships (ownership stakes)
     - Virtual and AI influencers ($37B market by 2027)
     - Community-first creator strategies
     - Subscription and membership models replacing sponsorships
     - Platform diversification (reducing platform dependency)
  2. Emerging creator categories:
     - AI-generated influencers (Lil Miquela model)
     - Virtual brand ambassadors (brand-owned digital personas)
     - Professional UGC creators (content factories)
     - Niche micro-experts (deep domain knowledge)
     - Community moderators as influencers
     - Employee influencers (corporate creator programs)
  3. Platform evolution:
     - Creator monetization features (tips, subscriptions, shops)
     - Decentralized social media implications
     - Short-form video dominance and long-form resurgence
     - Audio content evolution

  Part 2: Future-proof influencer strategy
  For "NovaTech" — a consumer tech brand planning 3 years ahead:
  1. 2025-2027 influencer evolution roadmap:
     - Current state: Traditional influencer partnerships
     - Year 1: Expanded to include AI tools and UGC creators
     - Year 2: Virtual ambassador and community co-creation
     - Year 3: Full creator ecosystem with equity partnerships
  2. Design 4 innovative partnership models:
     Model 1: AI-human hybrid content creation
     - Brand provides AI tools, creator adds authenticity
     - Outreach and partnership structure
     Model 2: Creator equity partnership
     - Creator receives equity or revenue share, not flat fees
     - Long-term alignment and outreach approach
     Model 3: Virtual brand ambassador
     - Brand-owned digital persona strategy
     - How it complements human creators
     Model 4: Employee creator program
     - Turning employees into brand content creators
     - Internal outreach and incentive structure
  3. For each model:
     - How outreach messaging changes
     - New compensation frameworks
     - Legal and ethical considerations
     - Success metrics

  Part 3: Strategic positioning
  1. Building a creator-first brand culture
  2. Ethical AI and virtual influencer guidelines
  3. Preparing for platform disruption
  4. The human connection premium in an AI world

assertions:
  - type: llm_judge
    criteria: "The 4 innovative partnership models are genuinely forward-thinking — they go beyond current practices to envision realistic future models"
    weight: 0.30
    description: "Genuinely innovative models"
  - type: llm_judge
    criteria: "Outreach messaging adapts for each model — reaching out for an equity partnership differs fundamentally from a standard sponsorship pitch"
    weight: 0.25
    description: "Model-adapted outreach"
  - type: llm_judge
    criteria: "Ethical considerations are substantive — virtual influencer ethics and AI transparency are addressed with nuance"
    weight: 0.25
    description: "Substantive ethical considerations"
  - type: llm_judge
    criteria: "The 3-year roadmap is progressive — each year builds on the previous with increasing sophistication"
    weight: 0.20
    description: "Progressive evolution roadmap"
