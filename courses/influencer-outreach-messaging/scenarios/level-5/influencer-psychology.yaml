state: {}

trigger: |
  Understanding the psychology behind why influencers say yes
  or no to partnerships transforms outreach from guesswork to
  science. Persuasion principles, relationship psychology, and
  behavioral economics inform every aspect of creator outreach.

  Part 1: Psychology of influencer decision-making
  1. Why influencers accept partnerships:
     - Reciprocity (they feel valued and want to give back)
     - Social proof (other respected creators work with you)
     - Authority (your brand has credibility in their space)
     - Scarcity (exclusive opportunity, limited spots)
     - Consistency (aligns with their existing values and content)
     - Liking (genuine relationship and rapport)
  2. Why influencers reject partnerships:
     - Cognitive overload (too many pitches, decision fatigue)
     - Risk aversion (fear of audience backlash)
     - Identity threat (partnership conflicts with their brand)
     - Autonomy loss (too many restrictions on creative freedom)
     - Unfairness perception (compensation feels insulting)
  3. Relationship psychology:
     - Trust development stages (awareness → familiarity → trust)
     - Attachment theory in brand-creator relationships
     - Communication styles and personality matching

  Part 2: Apply psychology to outreach
  For "Resonance Audio" — a premium headphone brand:
  1. Design psychologically-informed outreach sequences:
     Sequence A: Reciprocity-led approach
     - Give value before asking (feature their content, send product)
     - 5-touch sequence over 30 days before the pitch
     - Complete messages for each touchpoint

     Sequence B: Social proof approach
     - Lead with who else is partnered
     - Community and belonging messaging
     - 3-touch sequence with messages

     Sequence C: Scarcity and exclusivity
     - Limited ambassador spots
     - Early access and insider positioning
     - 3-touch sequence with messages

  2. For each approach:
     - The psychological principle being applied
     - When this approach works best (influencer personality type)
     - Potential pitfalls (when it backfires)
     - Ethical boundaries

  3. Behavioral economics in compensation:
     - Anchoring in rate negotiation
     - Loss aversion in exclusivity discussions
     - Endowment effect in product gifting
     - How framing changes perceived value
     - 3 compensation offer messages using different frames

  Part 3: Ethical persuasion
  1. Persuasion vs. manipulation boundary
  2. Building authentic relationships (not just applying tactics)
  3. Transparency about brand intentions
  4. Long-term trust vs. short-term conversion

