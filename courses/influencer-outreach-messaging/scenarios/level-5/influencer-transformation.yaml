meta:
  id: influencer-transformation
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Lead an influencer marketing transformation — drive organizational change from ad-hoc creator partnerships to strategic, data-driven influencer operations"
  tags: [influencer, transformation, leadership, organizational, change, mastery]

state: {}

trigger: |
  Influencer marketing transformation requires driving
  organizational change from treating influencer partnerships
  as one-off marketing tactics to building them as a strategic
  growth channel with proper operations, measurement, and
  executive support.

  For "Frontier Industries" — a $300M B2B/B2C company where
  influencer marketing has been an afterthought:
  Current state: Occasional gifting, no strategy, no measurement,
  CMO skeptical, social team does it ad hoc when they have time.

  Lead the complete transformation:

  1. Executive sponsorship:
     - Build the business case for influencer marketing
       (competitor analysis, market opportunity, projected ROI)
     - CMO presentation: "Creator Partnerships as Growth Engine"
     - CFO-friendly ROI projections
     - CEO objection handling (5 objections with responses)
     - Board-level quarterly update framework

  2. Organizational change management:
     - Stakeholder analysis (who supports, who resists)
     - Change coalition building strategy
     - Quick wins plan (prove value in first 60 days)
     - Cross-functional alignment (marketing, product, sales)
     - Communication plan for the transformation

  3. 12-month transformation plan:
     Quarter 1: Foundation
     - Hire influencer marketing manager
     - Implement technology stack
     - Launch first 10 partnerships
     - Establish measurement baseline

     Quarter 2: Build
     - Scale to 25 active partnerships
     - Launch ambassador program
     - First ROI report to leadership
     - Content integration with broader marketing

     Quarter 3: Optimize
     - Data-driven optimization cycle
     - Advanced measurement implementation
     - Cross-functional content creation
     - Industry-specific B2B influencer strategy

     Quarter 4: Scale
     - Full program operations
     - Proven ROI and budget expansion case
     - Team expansion plan
     - Year 2 strategic roadmap

  4. Success metrics per quarter

  5. Sustainability plan:
     - Embedding influencer thinking into culture
     - Process documentation for continuity
     - Training programs for non-marketing teams
     - Continuous improvement framework

assertions:
  - type: llm_judge
    criteria: "The business case is compelling — it speaks in revenue and competitive language that skeptical executives find persuasive"
    weight: 0.30
    description: "Compelling executive business case"
  - type: llm_judge
    criteria: "Change management addresses real organizational resistance — skepticism about influencer marketing is common and specific objections are handled"
    weight: 0.25
    description: "Realistic change management"
  - type: llm_judge
    criteria: "The 12-month plan is progressive — each quarter builds capability and demonstrates increasing value"
    weight: 0.25
    description: "Progressive transformation plan"
  - type: llm_judge
    criteria: "Sustainability planning ensures lasting impact — the program survives personnel changes and leadership transitions"
    weight: 0.20
    description: "Sustainable transformation design"
