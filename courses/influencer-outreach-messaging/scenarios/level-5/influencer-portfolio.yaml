meta:
  id: influencer-portfolio
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Create an influencer marketing portfolio — assemble case studies, frameworks, and strategic deliverables demonstrating mastery of influencer outreach and partnerships"
  tags: [influencer, portfolio, case-studies, professional, frameworks, mastery]

state: {}

trigger: |
  Build a professional portfolio demonstrating comprehensive
  influencer outreach and partnership expertise.

  Create a complete portfolio with 5 components:

  Component 1: Case study — Product launch campaign
  Client: "Pinnacle Skincare" — DTC beauty brand
  Campaign: Launch of a new retinol serum
  - Situation analysis and objectives
  - Influencer strategy and selection rationale
  - Outreach approach and response rates
  - Campaign execution (briefs, content, timeline)
  - Results (metrics, ROI, lessons learned)
  - Complete with sample outreach messages used

  Component 2: Framework library
  Create 3 original frameworks:
  - Framework 1: "The Resonance Score" — predicting influencer-
    brand alignment beyond metrics
  - Framework 2: "The Outreach Ladder" — staged approach from
    cold contact to brand ambassador
  - Framework 3: "The Partnership Equation" — calculating
    fair compensation across variables
  Each with visual description, methodology, and use guide

  Component 3: Strategic pitch deck
  A 10-slide pitch deck selling influencer marketing
  services to a prospective client:
  - Slide-by-slide content and talking points
  - Data-driven persuasion elements
  - Case study references
  - ROI projections methodology

  Component 4: Operational playbook table of contents
  Design a comprehensive influencer marketing playbook:
  - 20+ sections covering all operational aspects
  - Brief description of each section
  - How the playbook is used by teams

  Component 5: Thought leadership article
  Write a 500-word opinion article:
  "The Death of Influencer Marketing (And What's Actually
  Replacing It)"
  - Provocative but evidence-based
  - Original insights
  - Actionable predictions

assertions:
  - type: llm_judge
    criteria: "The case study is compelling — it tells a complete story with real metrics, genuine challenges, and honest lessons learned"
    weight: 0.25
    description: "Compelling complete case study"
  - type: llm_judge
    criteria: "The 3 original frameworks are genuinely original — they offer new thinking about influencer marketing, not repackaged common knowledge"
    weight: 0.25
    description: "Genuinely original frameworks"
  - type: llm_judge
    criteria: "The pitch deck is professionally persuasive — it would win business from a skeptical CMO"
    weight: 0.25
    description: "Professionally persuasive pitch"
  - type: llm_judge
    criteria: "The thought leadership piece has a distinctive viewpoint — it challenges conventional thinking with evidence"
    weight: 0.25
    description: "Distinctive thought leadership"
