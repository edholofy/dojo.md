meta:
  id: influencer-consultancy
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Run an influencer marketing consultancy — deliver comprehensive audits, strategic transformations, and advisory services for brands building influencer programs"
  tags: [influencer, consultancy, advisory, audit, transformation, mastery]

state: {}

trigger: |
  As an influencer marketing consultant, you're hired to audit
  existing programs, design new ones, and transform how
  organizations approach creator partnerships.

  Complete consulting engagement:
  Client: "Vertex Outdoor" — a $100M outdoor recreation company
  expanding from wholesale/retail to DTC with influencer marketing.

  Current state:
  - No existing influencer program
  - $500K annual marketing budget for influencer/creator initiatives
  - 3-person marketing team (no influencer experience)
  - Strong brand recognition in outdoor community
  - Competitors have established influencer programs
  - DTC website launching in 60 days

  Deliverable 1: Market assessment
  - Competitive influencer audit (3 competitors analyzed)
  - Influencer landscape mapping for outdoor recreation
  - Opportunity analysis and market positioning
  - SWOT analysis for Vertex's influencer potential

  Deliverable 2: Influencer program strategy
  - Program vision, goals, and KPIs
  - Influencer tier and type recommendations
  - Content strategy and format mix
  - Platform prioritization (with rationale)
  - Budget allocation across program elements
  - Year 1 vs. Year 2 roadmap
  - Team structure and hiring recommendations

  Deliverable 3: Operational playbook
  - Influencer research and vetting SOP
  - Outreach template library (10 templates)
  - Campaign brief framework
  - Contract templates (3 tiers)
  - Content review and approval process
  - Performance tracking and reporting system
  - Compliance and legal checklist

  Deliverable 4: Launch plan (first 90 days)
  - Month 1: Foundation (tools, templates, initial outreach)
  - Month 2: Launch (first 15 partnerships, DTC launch support)
  - Month 3: Optimize (performance review, scaling decisions)
  - Detailed weekly action items for each month
  - Quick wins to demonstrate value early

  Deliverable 5: Advisory framework
  - Monthly strategic review structure
  - Quarterly program assessment
  - Knowledge transfer plan to internal team
  - Self-sufficiency timeline

assertions:
  - type: llm_judge
    criteria: "The consulting engagement is comprehensive and professionally structured — deliverables are what a real influencer consultancy would provide"
    weight: 0.30
    description: "Professional consulting deliverables"
  - type: llm_judge
    criteria: "The $500K budget is allocated strategically — spending matches the DTC launch timeline and program maturity stage"
    weight: 0.25
    description: "Strategic budget allocation"
  - type: llm_judge
    criteria: "The 90-day launch plan is actionable — a 3-person team with no influencer experience can execute it with the provided playbook"
    weight: 0.25
    description: "Actionable launch plan"
  - type: llm_judge
    criteria: "Knowledge transfer ensures self-sufficiency — the consultant builds the team's capability, not permanent dependency"
    weight: 0.20
    description: "Self-sufficiency focused advisory"
