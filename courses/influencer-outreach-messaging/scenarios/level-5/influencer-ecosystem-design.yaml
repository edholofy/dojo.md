meta:
  id: influencer-ecosystem-design
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Design an influencer ecosystem — build interconnected creator networks where partnerships amplify each other, creating flywheel effects for brand growth"
  tags: [influencer, ecosystem, network, flywheel, interconnected, mastery]

state: {}

trigger: |
  An influencer ecosystem is more than a collection of partnerships.
  It's an interconnected network where creators amplify each other,
  content compounds, and audience growth accelerates through
  strategic relationship design.

  For "Atlas Lifestyle" — a premium lifestyle brand building
  a creator-powered growth engine:

  1. Ecosystem architecture:
     - Hub: 5 anchor partners (long-term, deep integration)
     - Ring 1: 20 ambassador partners (monthly content)
     - Ring 2: 50 affiliate creators (ongoing, commission-based)
     - Ring 3: 200+ community creators (UGC, micro-content)
     Show how each ring feeds the others:
     - Anchor content inspires ambassador content
     - Ambassador content generates affiliate interest
     - Affiliate creators recruit community creators
     - Community creators become future ambassadors

  2. Network effects:
     - Cross-creator content collaboration
     - Audience sharing and cross-pollination
     - Content cascade strategies (how one post triggers others)
     - Community building across the creator network
     - Shared hashtags, challenges, and content themes

  3. Outreach strategy per ring:
     - Anchor partner outreach (executive-level, custom proposals)
     - Ambassador recruitment (curated, relationship-first)
     - Affiliate creator enrollment (scalable, self-serve options)
     - Community creator onboarding (open application, minimal barriers)
     Write 1 outreach message per ring

  4. Ecosystem management:
     - Governance (rules, expectations, escalation)
     - Communication infrastructure (groups, newsletters, events)
     - Performance monitoring across the ecosystem
     - Conflict resolution between creators
     - Value distribution (ensuring fairness across rings)

  5. Flywheel metrics:
     - Network growth velocity
     - Cross-creator amplification rate
     - Organic ecosystem content generation
     - Creator retention and advancement
     - Total ecosystem impact vs. sum of individual partnerships

assertions:
  - type: llm_judge
    criteria: "The ecosystem architecture shows genuine network effects — each ring amplifies the others in specific, described ways"
    weight: 0.30
    description: "Genuine network effects"
  - type: llm_judge
    criteria: "Outreach messages are appropriately differentiated by ring — anchor partner outreach is fundamentally different from community creator enrollment"
    weight: 0.25
    description: "Ring-differentiated outreach"
  - type: llm_judge
    criteria: "The flywheel model demonstrates compounding growth — total ecosystem impact is shown to exceed the sum of individual partnerships"
    weight: 0.25
    description: "Demonstrated compounding growth"
  - type: llm_judge
    criteria: "Value distribution is fair — all rings receive appropriate value, preventing exploitation of smaller creators"
    weight: 0.20
    description: "Fair value distribution"
