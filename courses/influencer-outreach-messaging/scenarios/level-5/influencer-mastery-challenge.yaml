meta:
  id: influencer-mastery-challenge
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Complete the influencer outreach mastery challenge — solve a complex multi-constraint scenario combining all influencer marketing skills"
  tags: [influencer, mastery, challenge, comprehensive, multi-constraint, mastery]

state: {}

trigger: |
  Mastery challenge: Solve a complex influencer outreach scenario
  with multiple constraints and competing priorities.

  You're the new Head of Influencer Marketing at "Pulse Electronics"
  — a consumer electronics company that just had a major PR crisis
  (product safety recall affecting their flagship headphones).

  Constraints:
  - 5 existing ambassador relationships (3 have paused, 2 ghosting)
  - Budget reduced 40% (from $300K to $180K annual)
  - Competitor launched aggressive influencer campaign this week
  - CEO wants influencer content to rebuild trust (not just sell)
  - Legal team requires all influencer content pre-approved
  - 2 ex-ambassadors are now posting for competitors
  - The recalled product was featured in 50+ influencer posts
     (some still live, creating liability risk)
  - Brand sentiment is negative on social media
  - New product launching in 8 weeks needs influencer support
  - Team: Just you + 1 coordinator (previous manager left)

  Deliver a complete recovery and rebuilding plan:

  1. Crisis influencer communications:
     - Message to paused ambassadors (rebuilding trust)
     - Message to ghosting ambassadors (re-engagement or closure)
     - Legal request to remove/update old recalled product content
     - Outreach to potential new partners (how to address the crisis)

  2. Program restructuring:
     - New program strategy with reduced budget
     - Which partnerships to save vs. let go
     - New influencer type focus (trust-rebuilders)
     - Content strategy pivot (trust > promotion)

  3. New product launch plan:
     - Influencer launch strategy on $180K budget
     - Outreach messages addressing the elephant in the room
     - Content brief emphasizing safety and quality
     - Competitive response strategy

  4. 6-month recovery roadmap:
     - Month 1-2: Crisis management and cleanup
     - Month 3-4: Rebuilding and new partnerships
     - Month 5-6: Growth and competitive recovery
     - KPIs for each phase

  5. Risk assessment:
     - Top 5 risks and mitigation strategies
     - Worst-case scenarios and contingencies

assertions:
  - type: llm_judge
    criteria: "All constraints are addressed — none of the 10+ complications are ignored, and solutions work together coherently"
    weight: 0.30
    description: "All constraints addressed"
  - type: llm_judge
    criteria: "Crisis communications are empathetic and honest — messages to ambassadors acknowledge the situation without being defensive"
    weight: 0.25
    description: "Empathetic honest communications"
  - type: llm_judge
    criteria: "The $180K budget is used efficiently — reduced spending forces smart choices about where to invest for maximum impact"
    weight: 0.25
    description: "Efficient reduced budget use"
  - type: llm_judge
    criteria: "The recovery roadmap shows genuine rebuilding — it doesn't pretend the crisis didn't happen but uses it as a turning point"
    weight: 0.20
    description: "Genuine recovery roadmap"
