meta:
  id: comprehensive-influencer-engagement
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Design a comprehensive influencer engagement system — build end-to-end creator partnership infrastructure from discovery to long-term advocacy"
  tags: [influencer, comprehensive, engagement, end-to-end, system, mastery]

state: {}

trigger: |
  Design the ultimate influencer engagement system that covers
  every stage of the creator partnership lifecycle, from initial
  discovery through long-term brand advocacy.

  For "Elevate Brands" — a DTC brand portfolio company
  managing influencer programs for 5 brands ($3M total annual
  influencer budget, 20-person marketing team):

  1. Discovery and identification system:
     - Multi-source influencer discovery pipeline
     - Unified scoring and vetting methodology
     - Cross-brand influencer database management
     - Audience overlap analysis across brands
     - Competitive intelligence on creator partnerships

  2. Outreach and conversion engine:
     - Multi-channel outreach orchestration
     - Personalization at scale with quality controls
     - Response management and follow-up automation
     - Conversion optimization (outreach to signed deal)
     - A/B testing framework for outreach approaches
     - Create the complete outreach playbook

  3. Partnership management platform:
     - Campaign brief and content management system
     - Multi-brand contract and compliance management
     - Content review and approval workflow
     - Payment and invoicing across brands
     - Creator experience management (making partnerships enjoyable)

  4. Performance and optimization:
     - Real-time campaign performance monitoring
     - Cross-brand performance benchmarking
     - Attribution and ROI across the portfolio
     - Predictive performance modeling
     - Continuous optimization recommendations

  5. Relationship and advocacy development:
     - Partnership lifecycle management
     - Ambassador advancement and retention programs
     - Creator community building across brands
     - Long-term advocacy measurement
     - Creator satisfaction and NPS tracking

  6. Operational excellence:
     - Team roles and responsibilities across 5 brands
     - Technology stack architecture
     - Quality assurance and compliance monitoring
     - Knowledge management and best practice sharing
     - Annual program assessment and planning cycle

assertions:
  - type: llm_judge
    criteria: "The end-to-end system is comprehensive — every stage from discovery to advocacy is covered with specific processes and tools"
    weight: 0.30
    description: "Comprehensive end-to-end system"
  - type: llm_judge
    criteria: "Multi-brand management is practical — the system serves 5 brands efficiently without requiring 5 separate operations"
    weight: 0.25
    description: "Practical multi-brand management"
  - type: llm_judge
    criteria: "Creator experience is prioritized — the system makes partnerships enjoyable for creators, not just efficient for the brand"
    weight: 0.25
    description: "Creator-centric experience"
  - type: llm_judge
    criteria: "Operational roles and technology support the $3M scale — team structure and tools can handle the volume without burning out staff"
    weight: 0.20
    description: "Scale-appropriate operations"
