meta:
  id: influencer-roi-framework
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Build an enterprise influencer ROI framework — design comprehensive measurement systems connecting influencer partnerships to business revenue and brand equity"
  tags: [influencer, roi, enterprise, measurement, framework, mastery]

state: {}

trigger: |
  Enterprise influencer ROI measurement connects hundreds of
  creator partnerships across multiple campaigns to business
  outcomes. Build a framework that proves influencer marketing's
  contribution to revenue, brand equity, and customer lifetime
  value at board-level sophistication.

  For "Meridian Consumer Brands" — a $500M CPG company with
  $5M annual influencer investment across 3 product lines:

  1. Enterprise measurement architecture:
     - Data infrastructure:
       Influencer platform → Analytics → Attribution → Revenue
     - Cross-campaign measurement framework
     - Product line comparison methodology
     - Integration with existing marketing mix modeling

  2. Multi-dimensional ROI model:
     - Direct ROI:
       Revenue directly attributed to influencer campaigns
       Cost per acquisition by influencer tier and type
       Channel comparison (influencer vs. paid vs. organic)
     - Brand ROI:
       Brand lift measurement methodology
       Sentiment analysis before and after campaigns
       Share of voice impact
       Brand search volume correlation
     - Content ROI:
       Content asset value (organic + paid usage)
       Content library growth and utilization rate
       Creative testing value (learnings from influencer content)
     - Relationship ROI:
       Creator network value over time
       Community building contribution
       Long-term partnership economics

  3. Calculate total program value:
     - Provide 12 months of hypothetical data across all dimensions
     - Show how total ROI differs from simple revenue attribution
     - Present the "true ROI" including all value dimensions
     - Compare influencer ROI to other marketing channels

  4. Board-level reporting:
     - Quarterly board presentation (5 slides)
     - Annual influencer marketing review
     - Investment recommendation for next fiscal year
     - Competitive benchmarking analysis

  5. Continuous optimization:
     - Monthly program optimization cadence
     - Influencer portfolio rebalancing triggers
     - Budget reallocation decision framework
     - Long-term program evolution plan

assertions:
  - type: llm_judge
    criteria: "The multi-dimensional ROI model captures value beyond revenue — brand equity, content assets, and relationship value are quantified"
    weight: 0.30
    description: "Multi-dimensional value capture"
  - type: llm_judge
    criteria: "The 12 months of hypothetical data is realistic — metrics are plausible for a $500M CPG company with $5M influencer spend"
    weight: 0.25
    description: "Realistic enterprise data"
  - type: llm_judge
    criteria: "Board-level reporting is executive-appropriate — presentations tell a strategic story, not a tactical activity report"
    weight: 0.25
    description: "Executive-appropriate reporting"
  - type: llm_judge
    criteria: "Investment recommendations are data-driven — budget proposals connect directly to measured ROI and projected returns"
    weight: 0.20
    description: "Data-driven investment recommendations"
