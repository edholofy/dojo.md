meta:
  id: influencer-future-trends
  level: 5
  course: influencer-outreach-messaging
  type: output
  description: "Anticipate influencer marketing future trends — analyze emerging technologies, platform shifts, and creator economy changes that will reshape outreach and partnerships"
  tags: [influencer, future, trends, predictions, emerging, mastery]

state: {}

trigger: |
  Influencer marketing is evolving rapidly. AI, platform shifts,
  creator empowerment, and new partnership models are reshaping
  how brands and creators work together. Strategic foresight
  positions brands to lead rather than follow.

  Part 1: Technology trends (2026-2030)
  1. AI in influencer marketing:
     - AI-generated content and virtual creators
     - AI matching and predictive performance
     - Automated outreach personalization
     - Content performance prediction models
     - Impact on creator jobs and opportunities
  2. Platform evolution:
     - Social commerce integration (content as storefront)
     - Decentralized platforms and creator ownership
     - New platforms and format innovation
     - Platform creator fund evolution
  3. Measurement evolution:
     - First-party data in a cookieless world
     - Real-time attribution advances
     - Brand equity measurement sophistication
     - Unified marketing measurement integration

  Part 2: Future-proof outreach strategy
  For "Prism Digital" — a digital agency preparing for the future:
  1. Design 3 future scenarios with adapted strategies:
     Scenario A: "AI-native creators" — most content is AI-assisted
     - How outreach changes when AI creates 80% of content
     - New partnership structures for AI-human hybrid creators
     - Compensation models for AI-enhanced productivity

     Scenario B: "Creator-first economy" — creators have all power
     - How outreach changes when creators are selective
     - Equity and co-ownership partnership models
     - Building a creator-attractive brand

     Scenario C: "Fragmented platforms" — 20+ platforms matter
     - How outreach changes with platform fragmentation
     - Cross-platform partnership strategies
     - Resource allocation across many channels

  2. Build a 3-year capability roadmap:
     - Skills to develop now vs. in 2 years
     - Technology investments to make
     - Partnership model evolution
     - Team structure changes

  3. Innovation experiments:
     - Design 5 experiments to test emerging approaches
     - Virtual influencer pilot
     - AI outreach personalization test
     - Creator equity partnership trial
     - Decentralized platform early presence
     - Community co-creation model

  Part 3: Strategic positioning
  1. Building competitive moats in influencer marketing
  2. The human premium in an AI-content world
  3. Ethical considerations in emerging technologies
  4. Preparing for regulation changes

assertions:
  - type: llm_judge
    criteria: "The 3 future scenarios are plausible and distinct — each presents a meaningfully different influencer landscape with practical strategy implications"
    weight: 0.30
    description: "Plausible distinct future scenarios"
  - type: llm_judge
    criteria: "Innovation experiments are testable — each has a clear hypothesis, methodology, and success criteria"
    weight: 0.25
    description: "Testable innovation experiments"
  - type: llm_judge
    criteria: "The capability roadmap is actionable — specific skills, technologies, and team changes are recommended for each timeframe"
    weight: 0.25
    description: "Actionable capability roadmap"
  - type: llm_judge
    criteria: "The tension between AI efficiency and human authenticity is thoughtfully addressed — it's not pro-AI or anti-AI but strategically nuanced"
    weight: 0.20
    description: "Nuanced AI-human strategy"
