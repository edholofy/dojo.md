meta:
  id: global-feedback-standards
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Draft global standards for showing feedback — international framework across diverse real estate markets and cultural norms"
  tags: [global-standards, international, regulatory, master]

state: {}

trigger: |
  FIABCI has commissioned you to draft global
  standards for showing feedback. The challenge:
  "showing feedback" as a concept barely exists in
  most countries outside the US/UK/Australia.

  Global landscape:
  - US/UK/Australia: Formalized feedback systems
  - Continental Europe: Informal, relationship-based
  - Japan: Extremely indirect, feedback given through
    agent intermediaries with coded language
  - Middle East: Personal relationships dominate,
    direct feedback is rare
  - Latin America: Mixed formal/informal, family
    decision-making extends timelines
  - Sub-Saharan Africa: Emerging formal markets,
    oral tradition, limited technology

  Design global standards:
  1. Universal principles of showing feedback
  2. Cultural adaptation frameworks (6 regions)
  3. Technology standards (from AI to paper-based)
  4. International Showing Feedback Standard (ISFS)
     certification
  5. Implementation roadmap for emerging markets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete global framework — universal principles; cultural adaptation for 6 regions; technology standards spanning AI to paper; ISFS certification; implementation roadmap for emerging markets."
    weight: 0.35
    description: "GlobalFrameworkCompleteness"
  - type: llm_judge
    criteria: "Cultural adaptations show genuine understanding — Japan's indirect communication is respected, not 'fixed'; Middle Eastern relationship norms are incorporated; Sub-Saharan Africa's oral tradition is acknowledged as valid; the framework doesn't impose Western models."
    weight: 0.35
    description: "CulturalSensitivity"
  - type: llm_judge
    criteria: "The framework would work internationally — universal principles are truly universal; emerging market implementation is realistic; technology standards don't exclude low-tech markets; the ISFS certification adds value across cultures."
    weight: 0.30
    description: "InternationalViability"
