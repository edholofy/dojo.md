meta:
  id: feedback-government-policy
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Draft national policy on showing feedback standards — consumer protection, transparency mandates, and data governance"
  tags: [government-policy, consumer-protection, transparency, master]

state: {}

trigger: |
  You're the lead policy advisor to a federal
  commission on "Transparency in Property Showing
  Communications." The commission found that lack
  of standardized showing feedback practices causes
  consumer harm.

  Key findings:
  - 42% of showing feedback is never shared with
    sellers in a timely manner
  - Feedback quality varies dramatically by property
    price point (luxury gets detailed reports, starter
    homes get nothing)
  - AI-generated feedback summaries contain inaccuracies
    in 18% of cases
  - Discriminatory language appears in 8% of agent-
    to-agent feedback
  - No privacy standards exist for buyer information
    captured during showings
  - Seller complaints about inadequate feedback
    increased 190% since 2020

  Draft the policy framework:
  1. Commission report: "The Feedback Gap"
  2. Showing Feedback Standards Act:
     - Title I: Minimum Feedback Standards
     - Title II: Feedback Equity Requirements
     - Title III: AI and Technology Governance
     - Title IV: Data Privacy and Buyer Protection
     - Title V: Agent Training and Accountability
     - Title VI: Enforcement and Penalties
  3. Implementation guidance
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report; 6-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — feedback standards are measurable; equity requirements address price-point disparities; AI governance addresses inaccuracy; privacy protections cover buyer data; penalties are proportionate."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would protect consumers — the 42% non-sharing rate would decrease; feedback equity across price points would improve; discriminatory language would be addressed; buyer privacy would be protected."
    weight: 0.30
    description: "ConsumerProtectionOutcome"
