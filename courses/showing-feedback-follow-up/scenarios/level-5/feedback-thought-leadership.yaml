meta:
  id: feedback-thought-leadership
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Establish thought leadership in showing feedback — keynote, manifesto, industry article, and TEDx talk"
  tags: [thought-leadership, keynote, manifesto, master]

state: {}

trigger: |
  You're recognized as the world's leading authority
  on showing feedback in real estate. Create four
  thought leadership pieces:

  1. Keynote: "The 24-Hour Window: How Showing
     Feedback Determines Everything" (NAR Annual
     Conference, 25 minutes)

  2. Manifesto: "The Showing Feedback Bill of Rights
     and Responsibilities" — 10 principles for
     sellers, buyers, and agents

  3. Industry article: "Stop Sanitizing Feedback:
     Why Honest Showing Feedback Is an Act of Service"
     (RealTrends, 1,200 words)

  4. TEDx outline: "What the Way We Talk About
     Houses Reveals About How We See Ourselves"
     (18 minutes) — the broader lesson about
     feedback, judgment, and human aspiration

assertions:
  - type: llm_judge
    criteria: "Response creates four complete thought leadership pieces — a 25-minute keynote with data and stories; a 10-principle manifesto with explanations; a 1,200-word article making a contrarian argument; a TEDx outline connecting real estate feedback to human psychology."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Content demonstrates genuine expertise and originality — the keynote reveals a non-obvious truth; the manifesto challenges industry norms; the article makes a compelling case for honesty over comfort; the TEDx talk transcends real estate."
    weight: 0.35
    description: "ExpertiseAndOriginality"
  - type: llm_judge
    criteria: "Each piece would influence its audience — practitioners would change their feedback practices; the manifesto would be adopted; the article would spark industry debate; the TEDx would make general audiences think differently about homes and feedback."
    weight: 0.30
    description: "AudienceInfluence"
