meta:
  id: feedback-memoir
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Write a professional memoir about a career in showing feedback — 3 chapters on the human stories behind property evaluations"
  tags: [memoir, career-reflection, storytelling, master]

state: {}

trigger: |
  You've spent 20 years collecting, analyzing, and
  delivering showing feedback. Write your memoir:
  "Between the Lines: What Showing Feedback Really
  Tells Us"

  Chapter 1: "The Feedback That Saved a Marriage"
  (~2,500 words)
  A couple was fighting through their home search —
  he wanted a fixer-upper, she wanted move-in ready.
  After a showing, their honest feedback revealed
  something deeper: he wanted a project because he
  was losing purpose in retirement; she wanted
  stability because her childhood was chaotic. You
  learned that showing feedback is never just about
  the house.

  Chapter 6: "The Seller Who Couldn't Hear"
  (~2,500 words)
  A widowed seller refused to hear any negative
  feedback about the home her late husband designed.
  Every comment about "dated" finishes felt like a
  criticism of his memory. You spent 3 months learning
  that sometimes feedback needs to wait for grief.
  Eventually, she heard the feedback not as criticism
  but as permission to move forward.

  Chapter 11: "Fifty Thousand Opinions" (~2,500 words)
  Your final year overseeing a system processing
  50,000 showing feedbacks annually. You reflect on
  what all that feedback taught you: that people see
  the same house differently because they're seeing
  through the lens of their lives. And the best
  agents don't just collect feedback — they translate
  between two families' dreams.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 reveals the deeper psychology behind showing feedback; Chapter 6 navigates grief and property attachment; Chapter 11 reflects on the wisdom of 50,000 opinions."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — uses scenes and dialogue, not summaries; the couple's argument is vivid; the widow's grief is handled with genuine sensitivity; the final chapter weaves specific stories into broader wisdom."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "The memoir would resonate with readers — real estate professionals would see their work reflected; non-industry readers would understand homes as mirrors of human aspiration; each chapter reveals that showing feedback is really about understanding people."
    weight: 0.30
    description: "ReaderResonanceOutcome"
