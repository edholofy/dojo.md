meta:
  id: feedback-social-enterprise
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Build a social enterprise improving housing equity through feedback transparency — ensuring all buyers receive equal service quality"
  tags: [social-enterprise, housing-equity, transparency, master]

state: {}

trigger: |
  You're founding "FairView," a social enterprise
  with the mission: "Equal feedback, equal service,
  equal housing access for every home seeker."

  Research shows systemic bias in showing feedback:
  - Properties in minority neighborhoods receive
    35% less detailed feedback
  - Buyer's agents for non-white clients spend 22%
    less time on post-showing follow-up
  - Sellers in lower-income areas receive feedback
    reports 3x less often than luxury sellers
  - First-generation home buyers receive less
    guidance interpreting showing experiences

  Design FairView:

  1. Mission, theory of change, impact model
  2. Four programs:
     - FeedbackEquity: Audit tools to measure feedback
       equity across demographics
     - FirstHome Guides: Trained volunteers who
       accompany first-generation buyers on showings
       to help them notice and articulate feedback
     - ShowingTranslate: Multilingual showing feedback
       tools in 12 languages
     - DataLight: Open-source showing feedback
       analytics revealing service quality disparities
  3. Impact measurement framework
  4. Funding model and sustainability plan
  5. Scaling strategy

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission with theory of change; 4 programs addressing specific equity gaps; impact measurement; funding model; scaling strategy."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Programs address root causes of inequality — FeedbackEquity makes bias visible; FirstHome Guides empower inexperienced buyers; ShowingTranslate removes language barriers; DataLight creates transparency and accountability."
    weight: 0.35
    description: "EquityProgramDesign"
  - type: llm_judge
    criteria: "FairView would measurably reduce feedback inequity — the 35% detail gap in minority neighborhoods would narrow; first-generation buyers would be empowered; multilingual tools would reach excluded populations; data transparency would create accountability."
    weight: 0.30
    description: "EquityOutcome"
