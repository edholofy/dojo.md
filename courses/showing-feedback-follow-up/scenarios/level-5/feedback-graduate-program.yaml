meta:
  id: feedback-graduate-program
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Design a graduate program in property evaluation communication — curriculum bridging psychology, data science, and real estate"
  tags: [graduate-program, academic, interdisciplinary, master]

state: {}

trigger: |
  A university's schools of Business, Psychology,
  and Communication are jointly launching a graduate
  certificate in "Property Evaluation Communication
  Science." You're the founding director.

  Program vision: Create experts who understand how
  property evaluations are communicated, interpreted,
  and acted upon — applicable to real estate, insurance,
  lending, and investment.

  Design the program:

  1. 5 core courses with syllabi:
     - PECS 501: Psychology of Property Evaluation
     - PECS 502: Communication Science for Real Estate
     - PECS 503: Data Analytics for Evaluation Feedback
     - PECS 504: Legal, Ethical, and Compliance
       Frameworks
     - PECS 505: Technology and AI in Property
       Communication

  2. 2 elective tracks:
     - Track A: "Residential & Commercial Markets"
     - Track B: "InsurTech & LendTech Applications"

  3. Research agenda: 5 priority questions
  4. Industry partnerships and practicum design
  5. Career outcomes and market positioning

assertions:
  - type: llm_judge
    criteria: "Response creates a complete graduate program — 5 core courses with detailed syllabi; 2 elective tracks; capstone; 5 research questions; industry partnerships; career outcomes."
    weight: 0.35
    description: "ProgramCompleteness"
  - type: llm_judge
    criteria: "The program is genuinely interdisciplinary — it bridges psychology, data science, communication, and real estate practice; courses are not siloed but interconnected; the broad application (insurance, lending, investment) adds value."
    weight: 0.35
    description: "InterdisciplinaryQuality"
  - type: llm_judge
    criteria: "Graduates would be valued by industry — the skills combination is unique; career outcomes span real estate, proptech, insurance, and lending; the program fills a genuine gap in professional education."
    weight: 0.30
    description: "CareerValue"
