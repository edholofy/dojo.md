meta:
  id: feedback-for-existential-challenges
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Redesign showing feedback for existential challenges — climate risk, housing scarcity, and AI-mediated property evaluation"
  tags: [existential-challenges, climate, ai-mediated, master]

state: {}

trigger: |
  Three existential challenges are reshaping showing
  feedback:

  === CHALLENGE 1: Climate-Informed Feedback ===
  Buyers now evaluate properties partly on climate
  resilience. Showing feedback increasingly mentions
  flood risk, wildfire proximity, extreme heat, and
  insurance availability. Traditional feedback forms
  don't capture these concerns. Sellers in affected
  areas face devastating feedback patterns.
  Design: Climate-aware showing feedback framework —
  how to capture, communicate, and act on climate
  concerns in property evaluations.

  === CHALLENGE 2: The Scarcity Feedback Loop ===
  In housing-scarce markets, showing feedback is
  almost irrelevant — buyers must compete aggressively
  regardless of property deficiencies. Sellers ignore
  feedback because "someone will buy it anyway."
  Agents question whether collecting feedback adds
  value in a seller's market. But feedback still
  protects buyers from bad decisions.
  Design: A showing feedback framework that maintains
  value in extreme scarcity markets.

  === CHALLENGE 3: AI-Only Evaluations ===
  AI systems now evaluate properties through computer
  vision, satellite imagery, sensor data, and
  historical records — without human showings. 15%
  of institutional purchases skip physical showings
  entirely. The "feedback" is algorithmic, not human.
  Design: A framework for evaluating and communicating
  AI-generated property assessments, including what
  AI misses that humans see.

  Create comprehensive responses to all three.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three challenges — climate-aware feedback framework; scarcity market feedback preservation; AI-only evaluation framework with human-AI comparison."
    weight: 0.35
    description: "ExistentialChallengeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates forward-thinking expertise — climate feedback captures genuinely new buyer concerns; the scarcity argument for feedback is compelling even in seller's markets; the AI-human comparison identifies what algorithms genuinely miss."
    weight: 0.35
    description: "ForwardThinkingExpertise"
  - type: llm_judge
    criteria: "Each framework would serve stakeholders well — climate-affected sellers get actionable guidance; scarcity-market buyers are still protected; AI evaluations are complemented by irreplaceable human observations."
    weight: 0.30
    description: "StakeholderServiceOutcome"
