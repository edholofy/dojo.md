meta:
  id: feedback-research-handbook
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Author chapters for the definitive academic handbook on property showing communication — editorial framework and 3 chapters"
  tags: [research-handbook, academic, showing-communication, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Handbook of
  Property Showing Communication," the first
  comprehensive academic treatment of how property
  evaluations are communicated in real estate.

  Handbook scope:
  - 18 chapters by 25+ contributing authors
  - Bridges communication science, psychology,
    behavioral economics, and real estate
  - Target: Researchers, graduate students, industry

  Design the handbook:
  1. Editorial introduction (~1,500 words)
  2. Table of contents: 18 chapters in 4 parts
  3. Chapter 1: "The Evolution of Showing Feedback:
     From Handshake Deals to AI Analysis" (~3,000
     words)
  4. Chapter 9: "The Psychology of Property
     Evaluation: How Cognitive Biases Shape Buyer
     Feedback" (~3,000 words)
  5. Chapter 18: "The Future of Showing Communication
     in an AI-Mediated World" (~3,000 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — editorial introduction; 18-chapter TOC in 4 parts; Chapter 1 history (~3,000 words); Chapter 9 psychology (~3,000 words); Chapter 18 future (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic scholarship — chapters reference relevant literature; the history traces from informal to formalized to AI; the psychology chapter applies cognitive bias research; the future chapter engages current technology trends."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "The handbook would establish showing communication as a legitimate field of study — it would be cited in research; the 18-chapter structure comprehensively covers the domain; it would attract cross-disciplinary interest."
    weight: 0.30
    description: "FieldEstablishmentOutcome"
