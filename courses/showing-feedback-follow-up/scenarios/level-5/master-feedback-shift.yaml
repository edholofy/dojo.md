meta:
  id: master-feedback-shift
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Master shift simulation — simultaneously address five converging crises revealing showing feedback as the intersection of commerce, psychology, technology, and human connection"
  tags: [shift-simulation, converging-crises, master]

state: {}

trigger: |
  You are the world's preeminent authority on showing
  feedback. In a single extraordinary week, five
  converging crises demand your expertise.

  === CRISIS 1: The Authenticity Crisis ===
  AI now generates 55% of showing feedback reports.
  Sellers can't tell if feedback reflects genuine
  buyer reactions or AI hallucinations. A lawsuit
  alleges AI-generated feedback praised a property's
  "stunning ocean views" — the property is landlocked.
  Design: Showing feedback authentication framework.

  === CRISIS 2: The Privacy Earthquake ===
  IoT-equipped smart homes now record showing visitor
  behavior — room traffic, time spent, even
  conversations. A viral video shows a seller
  watching their showing in real-time via hidden
  cameras. Buyers feel surveilled.
  Design: Showing privacy standards for the smart
  home era.

  === CRISIS 3: The Equity Reckoning ===
  Matched-pair testing proves that feedback quality
  correlates with buyer demographics — white buyers
  receive 3x more detailed post-showing feedback
  than Black buyers from the same agents.
  Design: Equitable feedback standards with
  accountability mechanisms.

  === CRISIS 4: The Attention Collapse ===
  Sellers now receive so many notifications, reports,
  and updates that 60% of feedback reports go unread.
  Meanwhile, buyers are shown 15+ properties and
  can't remember specific feedback about any of them.
  Design: Next-generation feedback formats for the
  attention-scarce era.

  === CRISIS 5: The Legacy Question ===
  After 25 years in showing feedback, you ask: What
  is the relationship between how we evaluate a
  property and how we judge a home? Write your
  legacy document on the power of feedback to
  shape real estate markets and human lives.

  Write complete responses to all five crises.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI authentication; smart home privacy standards; equitable feedback with accountability; attention-scarce formats; philosophical legacy on evaluation and home."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of showing feedback as societal infrastructure — AI crisis reveals trust; privacy shows surveillance ethics; equity proves feedback shapes access; attention demands evolution; legacy connects feedback to human dignity."
    weight: 0.35
    description: "SocietalInfrastructureMastery"
  - type: llm_judge
    criteria: "Response would define the future of showing feedback — frameworks would restore trust, protect privacy, ensure equity, engage attention, and inspire the next generation to see feedback as a force for both commerce and justice."
    weight: 0.30
    description: "FutureDefiningOutcome"
