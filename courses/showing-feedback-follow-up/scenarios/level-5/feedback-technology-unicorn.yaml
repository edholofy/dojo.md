meta:
  id: feedback-technology-unicorn
  level: 5
  course: showing-feedback-follow-up
  type: output
  description: "Build a unicorn startup around AI-powered showing feedback intelligence — product vision, Series C pitch, and category creation"
  tags: [unicorn, startup, ai-feedback, master]

state: {}

trigger: |
  You're the CEO of ShowPulse (from L4), now
  preparing for a $55M Series C at $550M valuation.
  ShowPulse has created a new category: "Showing
  Intelligence."

  Updated traction:
  - $12M ARR, growing 200% YoY
  - 580 brokerage customers (130 enterprise)
  - 45,000 active agents
  - 8.8M feedback recordings processed
  - PulsePredict accuracy: 78% for offer prediction
  - Average 2.6x improvement in listing conversion
  - NPS: 72
  - Net revenue retention: 152%

  Create:
  1. Series C pitch deck narrative (12-15 slides)
  2. Category creation: "Showing Intelligence"
  3. Product roadmap: Next 18 months
  4. Competitive moat analysis
  5. Path to $100M ARR
  6. IPO vs acquisition analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch with growth story; category creation for Showing Intelligence; 18-month roadmap; competitive moat; $100M ARR path; IPO vs acquisition analysis."
    weight: 0.35
    description: "UnicornNarrativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture expertise — pitch leverages 8.8M recordings and 78% prediction accuracy as data moat; category creation uses proven frameworks; projections are credible with clear unit economics."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would convince investors — the $55M raise is justified; Showing Intelligence would become a recognized category; ShowPulse would become the industry standard for feedback-driven listing optimization."
    weight: 0.30
    description: "InvestorConviction"
