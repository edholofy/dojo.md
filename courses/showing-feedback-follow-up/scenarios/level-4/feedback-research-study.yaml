meta:
  id: feedback-research-study
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Design a research study on showing feedback effectiveness — methodology, behavioral analysis, and publication plan"
  tags: [research, academic-study, methodology, expert]

state: {}

trigger: |
  You've received a $275,000 grant to study "The
  Informational and Behavioral Impact of Showing
  Feedback on Real Estate Transaction Outcomes."

  Research questions:
  1. Does the quality of showing feedback correlate
     with listing price accuracy and time-to-sale?
  2. How does feedback delivery method affect seller
     decision-making (raw vs. curated, immediate vs.
     delayed)?
  3. Do buyers' stated objections during showings
     predict their actual purchase behavior?

  Design the complete study:

  1. Literature review outline
  2. Research methodology:
     - Mixed methods design
     - Sample: 2,500 showing transactions across
       4 markets
     - Variables and measures
     - Data collection methods
     - IRB and ethical considerations
  3. Analysis plan with statistical methods
  4. Deliverables: journals, industry reports, tools
  5. Timeline and budget

assertions:
  - type: llm_judge
    criteria: "Response creates a complete research design — literature review outline; mixed methods methodology with 2,500 transactions; clearly defined variables; analysis plan; deliverables and timeline with budget allocation."
    weight: 0.35
    description: "ResearchDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research rigor — the study design can answer all 3 questions; variables are properly operationalized; the gap between stated objections and actual behavior is investigated appropriately; ethical considerations address seller and buyer privacy."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "The study would produce valuable findings — results would inform how feedback should be collected and delivered; the stated vs. actual behavior analysis would change industry assumptions; tools would be practical for adoption."
    weight: 0.30
    description: "KnowledgeContribution"
