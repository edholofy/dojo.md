meta:
  id: feedback-governance-framework
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Create industry governance standards for showing feedback — data ownership, privacy, quality standards, and accountability"
  tags: [governance, industry-standards, data-ownership, expert]

state: {}

trigger: |
  A coalition of major brokerages, MLS organizations,
  and consumer advocacy groups has appointed you to
  draft "National Standards for Real Estate Showing
  Feedback." This is the first attempt to establish
  industry-wide governance.

  Key issues to address:
  - Who owns showing feedback data? (Seller? Agent?
    Brokerage? MLS?)
  - What feedback quality standards should exist?
  - How should feedback be stored, shared, and deleted?
  - How do Fair Housing and privacy laws apply?
  - Should showing feedback be part of MLS data?
  - What are agents' obligations to collect and share?

  Design the governance framework:

  1. Data ownership and rights framework
  2. Quality standards for feedback content
  3. Privacy and data handling requirements
  4. Fair Housing compliance standards
  5. MLS integration recommendations
  6. Agent obligations and accountability
  7. Enforcement and dispute resolution
  8. Technology vendor requirements

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive governance framework — data ownership clarity; quality standards; privacy requirements; Fair Housing compliance; MLS integration; agent obligations; enforcement mechanisms; vendor requirements."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates sophisticated governance thinking — data ownership addresses the multi-stakeholder complexity; quality standards are measurable; privacy requirements balance transparency with protection; Fair Housing integration is seamless."
    weight: 0.35
    description: "GovernanceSophistication"
  - type: llm_judge
    criteria: "The framework would be adopted by the industry — it addresses real pain points; balances competing interests fairly; MLS integration is practical; enforcement is proportionate; the standards would improve feedback quality and compliance."
    weight: 0.30
    description: "IndustryAdoptionLikelihood"
