meta:
  id: feedback-book-proposal
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Write a book proposal on showing feedback mastery — market analysis, chapter outline, and sample chapter"
  tags: [book-proposal, publishing, thought-leadership, expert]

state: {}

trigger: |
  Write a book proposal for:
  "The Feedback Loop: How Showing Feedback Transforms
  Real Estate Outcomes"

  Create:
  1. Book overview and market analysis
  2. Competitive analysis (3 existing books)
  3. Chapter outline (12 chapters in 3 parts):
     - Part I: The Science of Feedback
     - Part II: The Practice of Feedback
     - Part III: The Future of Feedback
  4. Author platform and marketing plan
  5. Sample chapter: "Chapter 5 — The Art of Difficult
     Conversations: Delivering Feedback Sellers Don't
     Want to Hear" (~2,500 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — overview with market analysis; competitive differentiation; 12-chapter outline in 3 parts; author platform; sample Chapter 5 at ~2,500 words on difficult seller conversations."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "The sample chapter is compelling — it uses real scenarios, provides actionable techniques for difficult conversations, balances empathy with honesty, and reads as engaging non-fiction rather than a dry manual."
    weight: 0.35
    description: "SampleChapterQuality"
  - type: llm_judge
    criteria: "A publisher would acquire this book — the market gap is clear; the competitive analysis shows differentiation; the sample chapter proves the author can deliver; the marketing plan reaches the target audience."
    weight: 0.30
    description: "PublishingViability"
