meta:
  id: feedback-consulting-practice
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Launch a consulting practice specializing in showing feedback optimization — proprietary methodology, service tiers, and client proposals"
  tags: [consulting, methodology, practice-building, expert]

state: {}

trigger: |
  After 12 years optimizing showing feedback systems
  and documenting a 2.8x improvement in listing
  conversion rates, you're launching ShowInsight
  Consulting. Your proprietary framework is LISTEN:
  - L: Log (systematic feedback capture)
  - I: Interpret (AI-assisted pattern analysis)
  - S: Strategize (data-driven listing adjustments)
  - T: Train (agent skill development)
  - E: Execute (implementation and monitoring)
  - N: Nurture (continuous improvement cycle)

  Build your consulting practice:

  1. LISTEN Framework documentation with tools
  2. Service tiers:
     - Tier 1: Feedback Audit ($4,000)
     - Tier 2: System Implementation ($20,000)
     - Tier 3: Enterprise Transformation ($60,000)
  3. Two client proposals:
     - Proposal A: 30-agent team with 38% feedback
       collection rate (Tier 2)
     - Proposal B: 600-agent brokerage with no
       standardized feedback process (Tier 3)
  4. Case studies: 3 past engagements with results

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — LISTEN framework with tools for each phase; 3 service tiers with pricing and deliverables; 2 tailored client proposals; 3 case studies with measurable results."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "The LISTEN framework demonstrates deep expertise — each phase has specific tools and methods; the framework would produce measurable results; the progression from Log to Nurture creates a continuous improvement cycle."
    weight: 0.35
    description: "FrameworkExpertise"
  - type: llm_judge
    criteria: "Proposals would win business — the 30-agent proposal addresses their specific 38% collection rate; the 600-agent proposal tackles standardization at scale; case studies provide proof of concept; pricing is justified by projected ROI."
    weight: 0.30
    description: "ProposalWinRate"
