meta:
  id: feedback-knowledge-graph
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Design a knowledge graph mapping showing feedback signals to optimal listing strategies — connect buyer objections, property features, and market conditions"
  tags: [knowledge-graph, feedback-mapping, strategic-intelligence, expert]

state: {}

trigger: |
  Design a knowledge graph that connects showing
  feedback signals to optimal listing strategies.
  This system would power an AI that recommends
  listing adjustments based on feedback patterns.

  Graph components:

  1. Feedback signal taxonomy:
     - 8 primary objection categories (price, condition,
       layout, location, size, style, features, external)
     - 5 positive signal categories (emotional,
       functional, financial, lifestyle, investment)
     - 3 behavioral signals (time spent, return visits,
       agent behavior)

  2. Property attribute nodes:
     - Physical features (rooms, finishes, systems)
     - Location factors (neighborhood, commute, schools)
     - Financial factors (price, taxes, HOA, insurance)
     - Marketing factors (photos, description, staging)

  3. Strategy recommendation nodes:
     - Price adjustments (amount, timing)
     - Presentation changes (staging, photos, repairs)
     - Marketing pivots (targeting, messaging)
     - Timeline decisions (hold, reduce, withdraw)

  4. Create 8 example feedback-to-strategy pathways
     showing how the knowledge graph would work

  5. Graph relationship rules and weighting system

assertions:
  - type: llm_judge
    criteria: "Response creates a complete knowledge graph — feedback signal taxonomy with 16 categories; property attribute nodes; strategy recommendation nodes; 8 example pathways; relationship rules and weighting."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "The taxonomy is comprehensive and logical — objection categories cover real feedback patterns; positive signals capture genuine buyer enthusiasm; behavioral signals add objective data; the categories are mutually exclusive and collectively exhaustive."
    weight: 0.35
    description: "TaxonomyQuality"
  - type: llm_judge
    criteria: "The 8 example pathways demonstrate practical value — each shows how a feedback pattern maps through property attributes to a specific, actionable strategy recommendation that would improve listing performance."
    weight: 0.30
    description: "PathwayPracticalValue"
