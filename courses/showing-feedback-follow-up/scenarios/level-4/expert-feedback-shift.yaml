meta:
  id: expert-feedback-shift
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Shift simulation — address three industry-defining challenges in showing feedback at the expert level"
  tags: [shift-simulation, industry-defining, expert]

state: {}

trigger: |
  Three industry-defining challenges require your
  expert-level response:

  === CHALLENGE 1: The Transparency Mandate ===
  Several states are proposing legislation requiring
  listing agents to share ALL showing feedback with
  sellers unfiltered — no agent interpretation or
  curation. Consumer groups say agents "sanitize"
  feedback to protect their listings. Agents argue
  unfiltered feedback includes discriminatory
  comments, strategic misinformation, and
  unprofessional language.
  Design: Policy position paper on feedback
  transparency — what should be shared, filtered,
  and redacted, with legal justification.

  === CHALLENGE 2: The Feedback Marketplace ===
  A startup is selling aggregated showing feedback
  data to hedge funds, institutional investors, and
  insurance companies. They argue it's anonymized.
  Agents and brokerages say it's their proprietary
  data. Consumers say it violates privacy. The data
  reveals hyperlocal market trends before they appear
  in MLS statistics.
  Design: Position paper on feedback data ownership,
  commercialization ethics, and regulatory needs.

  === CHALLENGE 3: The Showing Replacement ===
  VR technology now allows "virtual showings" that
  are nearly indistinguishable from in-person visits.
  30% of buyers under 35 are purchasing homes they've
  never physically visited. Traditional "showing
  feedback" doesn't apply. How do you collect and
  use feedback from virtual-only buyers?
  Design: Next-generation feedback framework for
  virtual showings — what to measure, how to collect,
  and how it differs from physical showing feedback.

  Create comprehensive responses to all three.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three challenges — transparency mandate with legal justification for filtering; data marketplace with ownership and ethics analysis; VR showing feedback framework for virtual-only buyers."
    weight: 0.35
    description: "TripleChallengeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy and industry leadership — the transparency paper balances consumer rights with professional judgment; the data ownership analysis addresses all stakeholder perspectives; the VR framework recognizes a genuine paradigm shift."
    weight: 0.35
    description: "LeadershipQuality"
  - type: llm_judge
    criteria: "Each response would shape industry direction — the transparency position would inform legislation; the data ownership paper would set ethical standards; the VR framework would be adopted as virtual showings increase."
    weight: 0.30
    description: "IndustryInfluence"
