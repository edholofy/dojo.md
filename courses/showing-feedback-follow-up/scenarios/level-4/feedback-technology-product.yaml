meta:
  id: feedback-technology-product
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Build a proptech product for showing feedback intelligence — product requirements, AI models, and go-to-market strategy"
  tags: [proptech, product-management, ai-feedback, expert]

state: {}

trigger: |
  You're the founder of ShowPulse, a proptech startup
  that raised $4.8M in seed funding. ShowPulse's
  mission: "Transform showing feedback from a
  checkbox into a conversion engine."

  Product features:
  1. PulseCapture: 60-second voice feedback (agent
     speaks after showing, AI transcribes and
     categorizes)
  2. PulseAnalyze: AI pattern detection across all
     showings for a listing
  3. PulsePredict: Offer probability scoring based
     on feedback signals
  4. PulseReport: Auto-generated seller reports with
     visualizations
  5. PulseCoach: Agent feedback quality scoring with
     improvement suggestions

  Traction:
  - MVP launched 6 months ago
  - 180 brokerage customers
  - 8,500 active agents
  - 45,000 feedback recordings processed
  - PulsePredict accuracy: 72% for offer prediction
  - Feedback collection rate improved from 38% to
    81% for customers

  Create:
  1. Product requirements document for V2
  2. Technical architecture (voice AI, NLP, ML)
  3. Series A pitch (targeting $18M at $90M valuation)
  4. Competitive landscape and differentiation
  5. 12-month product roadmap

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product plan — V2 PRD building on 5 features; technical architecture for voice AI and NLP; Series A pitch leveraging traction; competitive analysis; 12-month roadmap."
    weight: 0.35
    description: "ProductPlanCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and technical expertise — voice AI transcription architecture is realistic; NLP categorization would work for real estate feedback; the 72% prediction accuracy is positioned correctly; the architecture would scale."
    weight: 0.35
    description: "ProductTechnicalExpertise"
  - type: llm_judge
    criteria: "The Series A pitch would attract investors — the 38% to 81% feedback rate improvement is compelling; $4.8M seed with 180 customers shows traction; the $18M raise at $90M is justified; the market opportunity is clear."
    weight: 0.30
    description: "InvestorConviction"
