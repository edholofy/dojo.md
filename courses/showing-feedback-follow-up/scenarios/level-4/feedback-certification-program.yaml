meta:
  id: feedback-certification-program
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Design a professional certification in showing feedback excellence — curriculum, assessment, and continuing education"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  You're designing the "Certified Showing Feedback
  Specialist" (CSFS) designation — the first
  credential focused on showing feedback collection,
  analysis, and communication excellence.

  Design the certification:

  1. Three tiers:
     - CSFS-Foundation (new agents, 1+ year)
     - CSFS-Professional (experienced, 3+ years)
     - CSFS-Master (leaders, 7+ years + teaching)

  2. CSFS-Professional curriculum (6 modules):
     - Feedback psychology and buyer behavior
     - Collection techniques and technology
     - Analysis and pattern recognition
     - Seller communication and difficult conversations
     - Compliance (Fair Housing, privacy, defamation)
     - AI and automation in feedback systems

  3. Assessment: Written exam, portfolio, live
     role-play, and peer review

  4. Continuing education (24 credits / 2 years)

  5. Business case: ROI for agents and brokerages

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification — 3 tiers with clear progression; 6-module Professional curriculum; multi-method assessment; continuing education requirements; business case with ROI."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Curriculum covers essential competencies — psychology, technology, analysis, communication, compliance, and AI — with each module building practical skills, not just theoretical knowledge."
    weight: 0.35
    description: "CurriculumQuality"
  - type: llm_judge
    criteria: "The CSFS would be valued — agents would pursue it to improve conversion rates; brokerages would see it as a quality indicator; the business case demonstrates clear ROI through improved feedback-driven outcomes."
    weight: 0.30
    description: "CredentialValue"
