meta:
  id: feedback-behavioral-science
  level: 4
  course: showing-feedback-follow-up
  type: output
  description: "Apply behavioral science to showing feedback — cognitive biases in buyer feedback, seller reception, and agent interpretation"
  tags: [behavioral-science, cognitive-biases, decision-making, expert]

state: {}

trigger: |
  You're a behavioral scientist studying cognitive
  biases in showing feedback. Your research reveals
  that feedback is systematically distorted at every
  stage of the process.

  Identified biases:

  Buyer biases (when giving feedback):
  - Anchoring: First property sets the benchmark
  - Peak-end rule: Remember best/worst moments, not
    overall impression
  - Confirmation bias: See what they expect based on
    photos/description
  - Social desirability: Tell agents what they think
    agents want to hear

  Agent biases (when collecting/interpreting):
  - Selective attention: Focus on feedback that
    confirms their pricing opinion
  - Optimism bias: Interpret neutral feedback as
    positive
  - Recency bias: Over-weight the most recent showing
  - Commission bias: Unconsciously steer interpretation
    toward a sale

  Seller biases (when receiving feedback):
  - Endowment effect: Overvalue their own property
  - Loss aversion: Focus on negative feedback,
    dismiss positive
  - Sunk cost fallacy: "We invested too much to
    reduce the price"
  - Attribution error: Blame market/agents, not price

  Design:
  1. Bias identification guide with real estate
     examples
  2. Debiasing techniques for each stakeholder
  3. A "bias-aware" feedback form and process
  4. Training module: "Seeing Through the Bias"
  5. Research proposal to quantify bias impact on
     transaction outcomes

assertions:
  - type: llm_judge
    criteria: "Response identifies and addresses biases at all three levels — buyer, agent, and seller — with specific real estate examples and debiasing techniques for each."
    weight: 0.35
    description: "BiasAnalysisCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates genuine behavioral science expertise — biases are correctly identified and defined; debiasing techniques are evidence-based; the bias-aware feedback form would actually reduce distortion."
    weight: 0.35
    description: "BehavioralScienceExpertise"
  - type: llm_judge
    criteria: "The debiasing approaches would improve decision quality — buyers would give more honest feedback; agents would interpret more accurately; sellers would make better pricing decisions; transaction outcomes would improve."
    weight: 0.30
    description: "DecisionQualityImprovement"
