meta:
  id: feedback-compliance-framework
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Build a compliance framework for showing feedback — Fair Housing, privacy, defamation risk, and documentation requirements"
  tags: [compliance, fair-housing, legal-framework, advanced]

state: {}

trigger: |
  Your brokerage's legal counsel has flagged several
  compliance risks in how showing feedback is
  collected, shared, and stored. Design a
  comprehensive compliance framework.

  Identified risks:
  - Fair Housing: Feedback referencing neighborhood
    demographics ("too many renters," "the neighbors
    seem sketchy," "family-friendly area")
  - Privacy: Buyer financial details shared in
    feedback ("buyer is pre-approved for $X")
  - Defamation: Harsh feedback about property
    condition shared with sellers verbatim ("house
    is a health hazard")
  - Discrimination: Feedback filtered or modified
    based on buyer demographics
  - Data retention: Feedback stored indefinitely
    without consent
  - Cross-border: International clients subject to
    different privacy laws

  Design the compliance framework:

  1. Fair Housing feedback guidelines:
     - Prohibited content in feedback
     - Redaction rules for non-compliant feedback
     - Training for agents on compliant feedback
     - Audit process

  2. Privacy framework:
     - What buyer information can be shared in feedback
     - Consent requirements
     - Data retention and deletion policies
     - GDPR/CCPA considerations

  3. Defamation risk management:
     - Guidelines for sharing negative feedback
     - When to paraphrase vs quote
     - Documentation for legal protection

  4. Equal treatment verification:
     - Feedback must be collected and shared equally
       regardless of buyer demographics
     - Audit trail requirements
     - Anti-discrimination training

  5. Policy document template for brokerage adoption

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive compliance framework — Fair Housing guidelines with prohibited content; privacy framework with consent and retention; defamation risk management; equal treatment verification; policy document template."
    weight: 0.35
    description: "ComplianceFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates legal and compliance expertise — Fair Housing feedback guidelines correctly identify prohibited language; privacy requirements address both GDPR and CCPA; defamation risk guidance is practical; equal treatment audit is enforceable."
    weight: 0.35
    description: "ComplianceExpertise"
  - type: llm_judge
    criteria: "The framework would protect the brokerage from legal risk — agents know what feedback is compliant; buyer privacy is protected; defamation exposure is minimized; the audit trail provides documentation if challenged."
    weight: 0.30
    description: "LegalProtectionOutcome"
