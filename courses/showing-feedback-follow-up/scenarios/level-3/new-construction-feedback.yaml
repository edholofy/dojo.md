meta:
  id: new-construction-feedback
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Manage showing feedback for new construction communities — builder relations, model home traffic analysis, and buyer journey tracking"
  tags: [new-construction, builder-relations, model-home, advanced]

state: {}

trigger: |
  You're the on-site sales manager for a 120-home
  new construction community. You have 3 model homes
  and a sales center. Average 40 visitor groups per
  weekend. Current feedback collection: a paper
  sign-in sheet and whatever you remember.

  Design a comprehensive feedback system:

  1. Visitor traffic analysis:
     - Digital sign-in capturing demographics,
       motivation, timeline, budget, and source
     - Model home path tracking (which models visited,
       time spent, features examined)
     - Interest level classification system

  2. Builder feedback loop:
     - Compile visitor feedback on floor plans, finishes,
       pricing, and lot preferences
     - Monthly trend report for the builder
     - Feature request tracking (what buyers want that
       you don't offer)
     - Competitive intelligence from visitors who
       mention other communities

  3. Long-cycle follow-up system:
     - New construction buyers decide over months
     - 90-day nurture sequence by buyer stage
     - Phase release and pricing update notifications
     - Construction progress updates for deposits

  4. Conversion funnel analysis:
     - Visitor → Registered → Return visit → Design
       center → Contract → Close
     - Drop-off analysis at each stage
     - Feedback correlation to conversion

  5. Community-level insights:
     - Which floor plans generate most interest vs.
       most sales (they're not always the same)
     - Price sensitivity by floor plan
     - Lot premium preferences

assertions:
  - type: llm_judge
    criteria: "Response creates a complete new construction feedback system — digital visitor tracking; builder feedback loop with monthly reports; 90-day nurture sequence; conversion funnel analysis; community-level insights."
    weight: 0.35
    description: "NewConstructionSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates new construction sales expertise — understands the long sales cycle, builder relationship dynamics, phase-release pricing, design center conversion, and the gap between model home interest and actual purchase patterns."
    weight: 0.35
    description: "NewConstructionExpertise"
  - type: llm_judge
    criteria: "The system would improve community sales performance — builders get actionable data on floor plan and feature preferences; the long-cycle nurture prevents lead loss; conversion analysis identifies where buyers drop off and why."
    weight: 0.30
    description: "SalesPerformanceImprovement"
