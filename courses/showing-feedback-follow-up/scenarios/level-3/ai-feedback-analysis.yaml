meta:
  id: ai-feedback-analysis
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Build an AI system that analyzes showing feedback at scale — NLP pipeline, classification model, and actionable insights engine"
  tags: [ai-analysis, nlp, machine-learning, advanced]

state: {}

trigger: |
  You're building an AI system to analyze 50,000+
  showing feedback responses collected over 3 years
  from a major brokerage. The system must extract
  actionable insights at scale.

  Dataset characteristics:
  - 52,000 feedback responses
  - Average length: 45 words
  - 18,000 resulted in offers (34.6%)
  - Mix of structured (ratings) and unstructured
    (free text) data
  - 12% contain agent-to-agent strategic non-answers
    ("Buyers will let us know")

  Design the AI analysis system:

  1. NLP pipeline:
     - Text preprocessing and normalization
     - Named entity recognition (property features,
       locations, condition descriptors)
     - Sentiment analysis at feature level (kitchen
       positive, bathrooms negative)
     - Intent classification (interested, passing,
       negotiating, strategic)

  2. Classification model:
     - Feature extraction from feedback text
     - Offer prediction model (will this feedback
       lead to an offer?)
     - Feature importance ranking
     - Model validation approach

  3. Insight generation:
     - Listing-level: "Your top 3 feedback themes"
     - Market-level: "Buyers in your area care most
       about ___"
     - Predictive: "Based on feedback patterns, expect
       an offer within ___ days"

  4. Handling edge cases:
     - Strategic non-answers
     - Contradictory feedback
     - Cultural/language differences
     - Sarcasm and irony detection

assertions:
  - type: llm_judge
    criteria: "Response creates a complete AI analysis system — NLP pipeline with preprocessing, NER, and sentiment; classification model with offer prediction; insight generation at listing and market levels; edge case handling."
    weight: 0.35
    description: "AISystemCompleteness"
  - type: llm_judge
    criteria: "The NLP and ML approaches are technically appropriate — feature-level sentiment analysis is realistic for real estate text; the classification model uses plausible predictors; edge cases like strategic non-answers are handled thoughtfully."
    weight: 0.35
    description: "TechnicalAppropriateness"
  - type: llm_judge
    criteria: "The system would produce genuinely actionable insights — listing agents would adjust strategies based on feedback themes; the offer prediction model would prioritize follow-up; market-level insights would inform pricing."
    weight: 0.30
    description: "ActionableInsightQuality"
