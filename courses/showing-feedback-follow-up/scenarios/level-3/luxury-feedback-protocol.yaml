meta:
  id: luxury-feedback-protocol
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Design a luxury showing feedback protocol — white-glove communication, high-net-worth buyer expectations, and concierge-level follow-up"
  tags: [luxury, white-glove, high-net-worth, advanced]

state: {}

trigger: |
  You're the Director of Luxury Services for a
  Sotheby's International affiliate handling
  properties $2M+. Your current feedback process
  is identical to your standard residential process
  and it's embarrassing — generic text surveys don't
  match the luxury brand experience.

  Design a luxury feedback protocol:

  1. Showing experience design:
     - Pre-showing preparation (property staging,
       lighting, temperature, scent, music)
     - Concierge welcome protocol
     - Showing flow and pacing
     - Post-showing departure experience

  2. Feedback collection (luxury-appropriate):
     - Personalized follow-up call (script)
     - Handwritten note templates
     - Private client portal feedback option
     - Discreet agent-to-agent communication

  3. Seller communication (luxury level):
     - Curated feedback presentation (not raw data)
     - Market positioning narrative
     - Photography and video market comparison
     - Quarterly luxury market report integration

  4. International buyer protocols:
     - Cultural communication preferences (by country)
     - Translation and interpretation services
     - Time zone and communication scheduling
     - Privacy considerations for high-profile buyers

  5. Example: Complete feedback cycle for a $4.5M
     waterfront estate showing

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive luxury feedback protocol — showing experience design with sensory details; luxury-appropriate feedback collection methods; curated seller communication; international buyer protocols; complete example for a $4.5M property."
    weight: 0.35
    description: "LuxuryProtocolCompleteness"
  - type: llm_judge
    criteria: "The protocol reflects genuine luxury service understanding — generic text surveys are replaced with personalized calls and handwritten notes; seller reports are curated narratives not raw data dumps; international protocols address cultural communication differences."
    weight: 0.35
    description: "LuxuryServiceUnderstanding"
  - type: llm_judge
    criteria: "The protocol would elevate the brand — every touchpoint matches Sotheby's caliber; high-net-worth buyers would feel the experience is befitting properties at this price point; sellers would feel their listing receives premium service."
    weight: 0.30
    description: "BrandElevationOutcome"
