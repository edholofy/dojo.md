meta:
  id: feedback-technology-integration
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Integrate showing feedback with property technology stack — smart lockbox data, virtual tour analytics, and IoT showing insights"
  tags: [proptech, iot-integration, smart-showing, advanced]

state: {}

trigger: |
  You're a proptech consultant designing a "Smart
  Showing" system that integrates multiple data
  sources for comprehensive feedback beyond just
  what agents report.

  Data sources to integrate:

  1. Smart lockbox data (Supra/SentriLock):
     - Exact showing times and duration
     - Agent identification
     - Access patterns (time of day, day of week)

  2. Virtual tour analytics (Matterport):
     - Which rooms viewed most in 3D tour
     - Average tour duration
     - "Favorite" tagged rooms
     - Measurement tool usage (indicates serious buyers)

  3. IoT sensors (optional, privacy-considered):
     - Room traffic flow during showings
     - Time spent in each room
     - Which features examined (smart home activation)

  4. Online behavior:
     - Listing page views before and after showing
     - Save/favorite activity post-showing
     - Similar property searches after showing
     - Mortgage calculator usage

  5. Agent-reported feedback (traditional):
     - Buyer reactions
     - Price perception
     - Objections and concerns

  Design the integrated Smart Showing system:
  1. Data integration architecture
  2. Combined insight dashboard
  3. Privacy framework (what data is ethical to use)
  4. Use cases: 5 scenarios where integrated data
     reveals insights traditional feedback misses
  5. Implementation plan for a mid-size brokerage

assertions:
  - type: llm_judge
    criteria: "Response creates a complete Smart Showing system — data integration across 5 sources; combined insight dashboard; privacy framework addressing ethical data use; 5 use cases with integrated insights; implementation plan."
    weight: 0.35
    description: "SmartShowingCompleteness"
  - type: llm_judge
    criteria: "The privacy framework is thoughtful — it addresses which IoT data collection is ethical (room traffic yes, recording no); virtual tour analytics are privacy-safe; online behavior tracking requires consent; the system doesn't feel invasive."
    weight: 0.35
    description: "PrivacyFrameworkQuality"
  - type: llm_judge
    criteria: "The 5 use cases demonstrate value traditional feedback misses — e.g., a buyer who spent 20 minutes in the kitchen but said 'it's fine' actually loved it; online behavior after showing reveals true interest level."
    weight: 0.30
    description: "IntegratedInsightValue"
