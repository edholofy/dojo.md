meta:
  id: team-feedback-culture
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Transform a team's feedback culture — from compliance-driven checkbox to insight-driven competitive advantage"
  tags: [culture-transformation, team-leadership, competitive-advantage, advanced]

state: {}

trigger: |
  You're the team leader of a 15-agent team. Feedback
  culture is broken:
  - Agents see feedback collection as busywork
  - Feedback forms are filled out with minimal effort
    ("Good house. Buyers liked it.")
  - No one reads feedback before their next showing
  - Sellers don't receive timely feedback reports
  - The team's conversion rate (2.1%) is below the
    market average (3.4%)

  Design a culture transformation initiative:

  1. Vision: "Feedback as competitive intelligence"
     - How feedback drives better outcomes for everyone
     - Examples of feedback that changed a deal

  2. New feedback framework:
     - "The 3-Minute Debrief" — structured post-showing
       conversation with buyers
     - "The Insight Note" — feedback that tells a story,
       not just checks boxes
     - "The Pattern Report" — weekly team meeting
       reviewing aggregate feedback

  3. Incentive structure:
     - Recognition for best feedback insights
     - Correlation tracking: agents with best feedback
       have best conversion
     - Team competitions and gamification

  4. Training program:
     - "How to ask questions that reveal real feelings"
     - "Writing feedback that helps, not just fills
       forms"
     - Role-play practice sessions

  5. 90-day implementation plan with milestones

assertions:
  - type: llm_judge
    criteria: "Response creates a complete culture transformation — vision reframing feedback as intelligence; new framework with the 3-Minute Debrief, Insight Note, and Pattern Report; incentives; training program; 90-day implementation plan."
    weight: 0.35
    description: "CultureTransformationCompleteness"
  - type: llm_judge
    criteria: "The transformation addresses root causes — agents don't see value (vision fixes this); forms enable laziness (new framework prevents it); no one reads feedback (Pattern Report creates use); sellers don't get reports (accountability fixes this)."
    weight: 0.35
    description: "RootCauseAddressing"
  - type: llm_judge
    criteria: "The initiative would improve the 2.1% conversion rate toward or above the 3.4% market average — better feedback leads to better listing adjustments, faster objection resolution, and more informed buyer guidance."
    weight: 0.30
    description: "ConversionRateImprovement"
