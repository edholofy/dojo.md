meta:
  id: seller-psychology-feedback
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Navigate seller psychology when delivering feedback — manage emotional attachment, unrealistic expectations, and resistance to change"
  tags: [seller-psychology, emotional-management, difficult-conversations, advanced]

state: {}

trigger: |
  You're leading a training workshop for 30 agents
  on "Seller Psychology and Feedback Delivery." Design
  the workshop content around 5 seller archetypes:

  Archetype 1: The Emotionally Attached Seller
  "This is where my children grew up. It's priceless."
  They reject feedback that doesn't validate their
  emotional value. Every negative comment hurts
  personally.

  Archetype 2: The HGTV Overimprover
  Spent $120K on renovations expecting a $200K return.
  Feedback says renovations are "too personalized"
  (purple accent walls, oversized wine cellar).
  They're devastated and angry.

  Archetype 3: The Data Denier
  Despite 30 showings with zero offers and consistent
  "overpriced" feedback, they say: "The market is
  wrong. My house is worth what I say it is. Zillow
  says $50K more."

  Archetype 4: The Absentee Investor
  Doesn't live in the property, doesn't visit for
  showings, and dismisses feedback: "Just sell it.
  I don't care about feedback, I care about the
  price." But the property has deferred maintenance
  issues driving buyers away.

  Archetype 5: The Divorcing Couple
  One spouse wants to reduce price and sell quickly;
  the other wants full price and is in no rush.
  Feedback goes to both and is weaponized in their
  conflict. Every showing update becomes a battleground.

  For each archetype:
  1. Psychology explanation
  2. Feedback delivery strategy
  3. Specific language to use and avoid
  4. Role-play dialogue example

assertions:
  - type: llm_judge
    criteria: "Response covers all 5 seller archetypes with psychology explanations, delivery strategies, specific language guidance, and role-play dialogues — creating a complete workshop curriculum."
    weight: 0.35
    description: "ArchetypeCoverage"
  - type: llm_judge
    criteria: "Psychology explanations are insightful — emotional attachment is about identity not value; the HGTV overimprover is experiencing sunk cost fallacy; the data denier uses Zillow as confirmation bias; the divorcing couple uses feedback as ammunition."
    weight: 0.35
    description: "PsychologicalInsight"
  - type: llm_judge
    criteria: "Delivery strategies would actually work — each approach matches the archetype's psychology; language guidance is specific and actionable; role-play dialogues model realistic conversations that agents could practice."
    weight: 0.30
    description: "PracticalEffectiveness"
