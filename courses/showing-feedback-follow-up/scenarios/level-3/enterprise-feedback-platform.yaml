meta:
  id: enterprise-feedback-platform
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Design an enterprise showing feedback platform for a 400-agent brokerage — AI analysis, sentiment scoring, and predictive conversion modeling"
  tags: [enterprise, platform-design, ai-analysis, advanced]

state: {}

trigger: |
  You're the CTO of a 400-agent brokerage building
  a proprietary showing feedback platform. Current
  state: feedback is captured in 5 different systems,
  40% of showings have no feedback, and sellers
  complain about lack of information.

  Design the enterprise platform:

  1. Architecture:
     - Unified feedback intake (app, web, SMS, voice)
     - AI-powered sentiment analysis of free-text
       feedback
     - NLP categorization of objections and praise
     - Integration with ShowingTime, MLS, and CRM

  2. AI analysis features:
     - Automatic sentiment scoring (positive/neutral/
       negative for 10 property dimensions)
     - Pattern detection across all listings
     - Predictive model: "Will this showing lead to
       an offer?" (using historical data)
     - Anomaly detection (unusual feedback patterns)

  3. Stakeholder dashboards:
     - Agent dashboard: Personal feedback metrics
     - Listing dashboard: Property-specific feedback
       trends
     - Manager dashboard: Team performance overview
     - Seller portal: Real-time feedback access
       (filtered by agent)

  4. Automation rules:
     - 15 trigger-based workflows
     - Escalation rules
     - Seller notification filtering

  5. Data privacy and compliance framework

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise platform — unified intake; AI sentiment analysis with NLP categorization; predictive modeling; 4 stakeholder dashboards; 15 automation rules; privacy framework."
    weight: 0.35
    description: "PlatformCompleteness"
  - type: llm_judge
    criteria: "The AI analysis features are technically sound — sentiment scoring across 10 dimensions is realistic; predictive modeling uses plausible historical signals; NLP categorization would accurately classify real estate feedback."
    weight: 0.35
    description: "AITechnicalSoundness"
  - type: llm_judge
    criteria: "The platform would solve the brokerage's problems — the 40% missing feedback rate would decrease; sellers would have real-time access; the 5 disparate systems would be unified; agents would have actionable insights."
    weight: 0.30
    description: "ProblemResolutionOutcome"
