meta:
  id: cross-market-feedback-study
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Conduct a cross-market study of showing feedback patterns — compare buyer priorities and objections across 6 geographic markets"
  tags: [cross-market, research, geographic-analysis, advanced]

state: {}

trigger: |
  A national brokerage has given you access to
  showing feedback data from 6 markets. Analyze
  the differences and design a market-adaptive
  feedback strategy.

  Market data summary (12 months, ~5,000 feedbacks
  per market):

  Market 1 — Miami, FL (luxury/international):
  Top objections: hurricane insurance costs, HOA
  fees, age of building
  Top positives: views, amenities, location
  Unique: 30% of feedback is in Spanish

  Market 2 — Austin, TX (tech/growth):
  Top objections: traffic, property taxes, cedar
  allergies
  Top positives: outdoor space, modern design, tech
  infrastructure
  Unique: "Walkability" mentioned 3x more than
  national average

  Market 3 — Detroit, MI (value/revitalization):
  Top objections: neighborhood safety perception,
  school quality, property condition
  Top positives: value, space, renovation potential
  Unique: Investor feedback is 40% of total

  Market 4 — Portland, OR (sustainability):
  Top objections: lack of AC, parking, property taxes
  Top positives: character, walkability, energy
  efficiency
  Unique: "Environmental features" mentioned 5x
  national average

  Market 5 — Nashville, TN (relocation/growth):
  Top objections: price increases, construction
  quality, traffic
  Top positives: community, lifestyle, value vs.
  coastal cities
  Unique: 55% of buyers are relocators

  Market 6 — Phoenix, AZ (retirement/seasonal):
  Top objections: summer heat, HOA restrictions,
  landscape maintenance
  Top positives: price, single-level homes, amenities
  Unique: Seasonal buyer patterns (Oct-Mar peak)

  Create:
  1. Cross-market analysis report
  2. Market-adaptive feedback collection forms (key
     questions vary by market)
  3. Market-specific follow-up templates addressing
     local objections
  4. Best practices transferable across all markets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete cross-market analysis — comparison of objection and positive patterns; market-adaptive feedback forms with locally relevant questions; market-specific follow-up templates; transferable best practices."
    weight: 0.35
    description: "CrossMarketAnalysisCompleteness"
  - type: llm_judge
    criteria: "Analysis shows genuine market understanding — Miami's hurricane/international buyer dynamics; Austin's tech-driven walkability demand; Detroit's investor-heavy feedback; Portland's environmental focus; Nashville's relocator patterns; Phoenix's seasonal cycles."
    weight: 0.35
    description: "MarketUnderstandingDepth"
  - type: llm_judge
    criteria: "The adaptive strategy would improve feedback effectiveness in each market — locally relevant questions capture better data; templates address the actual objections buyers have; transferable practices create consistency without ignoring local differences."
    weight: 0.30
    description: "AdaptiveStrategyEffectiveness"
