meta:
  id: advanced-feedback-shift
  level: 3
  course: showing-feedback-follow-up
  type: output
  description: "Shift simulation — handle three complex feedback scenarios requiring cross-functional expertise"
  tags: [shift-simulation, cross-functional, advanced]

state: {}

trigger: |
  Three complex feedback scenarios hit your desk:

  === SCENARIO 1: The Feedback Fraud ===
  You discover that an agent on your team has been
  fabricating showing feedback to make sellers feel
  good. She's been writing fake "positive feedback"
  from buyers who actually passed. Her listings have
  the lowest conversion rates on the team (0.4%) but
  her sellers love her. Two sellers are now suing the
  brokerage for "misleading information that caused
  them to keep an overpriced listing too long."
  Design: Investigation, remediation, and prevention.

  === SCENARIO 2: The Public Feedback Disaster ===
  A seller found their showing feedback on a public
  Facebook group. An agent's assistant accidentally
  posted a feedback summary that included: buyer
  financial details, negative comments about the
  home's condition, and a buyer's comment about the
  "weird neighbor." The post went viral locally.
  Design: Crisis response, privacy breach handling,
  and data security overhaul.

  === SCENARIO 3: The AI Gone Wrong ===
  Your brokerage deployed an AI system to summarize
  showing feedback for sellers. The AI summarized
  feedback from 5 showings as "Buyers find the
  property appealing but several noted the
  neighborhood appears to be transitioning
  demographically." This AI-generated Fair Housing
  violation was sent to the seller automatically.
  Design: Immediate response, AI system remediation,
  and human-in-the-loop requirements.

  Create response plans for all three scenarios.

assertions:
  - type: llm_judge
    criteria: "Response creates complete plans for all three scenarios — fraud investigation with remediation and prevention; privacy breach crisis response with security overhaul; AI Fair Housing violation response with system remediation."
    weight: 0.35
    description: "TripleScenarioCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates cross-functional expertise — the fraud investigation balances HR, legal, and client relations; the privacy breach addresses data security and public relations; the AI violation addresses technology governance and compliance."
    weight: 0.35
    description: "CrossFunctionalExpertise"
  - type: llm_judge
    criteria: "All three responses protect the brokerage while serving clients — the fabricating agent is handled; affected sellers receive remediation; the privacy breach is contained; the AI system is fixed with appropriate human oversight."
    weight: 0.30
    description: "ProtectionAndServiceBalance"
