meta:
  id: virtual-showing-follow-up
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Follow up after a virtual showing — collect feedback when buyers haven't physically visited the property"
  tags: [virtual-showing, remote-buyers, video-tour, beginner]

state: {}

trigger: |
  You conducted a FaceTime video showing of 310
  Sunset Boulevard ($525,000) for out-of-state buyers
  Alex and Jordan who are relocating from Chicago.
  They can't visit in person for another 3 weeks.

  During the 25-minute video showing:
  - They loved the open floor plan and natural light
  - Asked you to re-show the master closet (seemed
    small)
  - Wanted to see the garage but your phone signal
    dropped briefly
  - Asked about street noise (you held the phone
    outside for 30 seconds)
  - Compared it favorably to another listing they
    saw virtually last week
  - Requested you measure the dining room

  Write a follow-up that:
  1. Addresses the technical limitations of the video
     showing (garage signal drop)
  2. Provides the measurements they requested
  3. Sends supplementary materials (photos, floor
     plan, Matterport link if available)
  4. Helps them compare to the other listing
  5. Plans their in-person visit in 3 weeks
  6. Keeps engagement high despite the distance

assertions:
  - type: llm_judge
    criteria: "Response addresses video showing limitations — provides garage photos/video to compensate for the signal drop, includes dining room measurements, and offers supplementary materials like floor plans or Matterport tours."
    weight: 0.35
    description: "VirtualShowingCompensation"
  - type: llm_judge
    criteria: "Response maintains engagement across distance — keeps excitement high, provides a comparison framework for the other listing, and creates a concrete plan for the in-person visit in 3 weeks."
    weight: 0.35
    description: "DistanceEngagement"
  - type: llm_judge
    criteria: "Response would keep this property top-of-mind for 3 weeks — it provides enough information for the buyers to discuss privately, sets up interim touchpoints, and makes the in-person visit feel like a confirmation not a first impression."
    weight: 0.30
    description: "TopOfMindMaintenance"
