meta:
  id: seller-feedback-report
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Compile and present showing feedback to sellers — summarize buyer reactions honestly while maintaining seller motivation"
  tags: [seller-report, feedback-summary, seller-communication, beginner]

state: {}

trigger: |
  You're a listing agent preparing a weekly showing
  feedback report for your sellers, Jim and Pat
  Henderson. Their home at 42 Birch Lane has been
  listed for 3 weeks at $389,000.

  Feedback collected from 6 showings:

  Showing 1: "Nice home but feels overpriced compared
  to the one on Pine Street that sold for $365K."

  Showing 2: "Loved the layout but the carpet in the
  bedrooms is dated. Would want a carpet allowance."

  Showing 3: "Too close to the busy road. Noise was
  noticeable." (No interest)

  Showing 4: "Beautiful kitchen! But only 1 bathroom
  for a 3-bedroom feels limiting." (Mild interest)

  Showing 5: "Our clients are very interested. Asking
  about seller flexibility on price and closing date.
  Pre-approved for $400K." (High interest)

  Showing 6: "Not what we expected from the photos.
  Rooms felt smaller in person." (No interest)

  Market context:
  - Average days on market for area: 22
  - Their home: 21 days, 6 showings (slightly below
    average showing pace)
  - 2 price reductions in comparable listings nearby

  Write a feedback report that:
  1. Summarizes all feedback honestly but tactfully
  2. Identifies patterns and themes
  3. Highlights the strong interest from Showing 5
  4. Makes a recommendation (continue, adjust, reduce)
  5. Maintains seller confidence and partnership

assertions:
  - type: llm_judge
    criteria: "Response summarizes all 6 showing feedbacks honestly — including the negative ones (overpriced, dated carpet, road noise, photos vs reality) — while remaining tactful and professional."
    weight: 0.35
    description: "HonestFeedbackPresentation"
  - type: llm_judge
    criteria: "Response identifies patterns (price sensitivity is the main theme), highlights the Showing 5 strong interest with specific next steps, and makes a clear recommendation supported by the data and market context."
    weight: 0.35
    description: "PatternAnalysisAndRecommendation"
  - type: llm_judge
    criteria: "Response maintains seller confidence while being honest — it doesn't sugarcoat but doesn't demoralize either; the Hendersons would feel informed and trust their agent's guidance."
    weight: 0.30
    description: "SellerRelationshipMaintenance"
