meta:
  id: buyer-second-showing-request
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Follow up with a buyer to encourage a second showing — use feedback from the first visit to address concerns and build momentum"
  tags: [second-showing, momentum-building, buyer-engagement, beginner]

state: {}

trigger: |
  Your buyer clients, the Nguyens, saw a home they
  seemed to love but left saying "we need to think
  about it." It's been 4 days. You know from
  experience that hesitation often means unaddressed
  concerns, not lack of interest.

  Property: 55 Riverside Drive, $375,000
  - 3 bed / 2 bath, 1,950 sq ft
  - Waterfront lot, updated throughout
  - Only concern mentioned: worried about flood
    insurance costs

  Your research since the showing:
  - Flood insurance for this zone: ~$1,800/year
  - Property has never flooded in 30 years
  - Elevation certificate shows home is 3 feet above
    base flood elevation
  - Seller installed flood mitigation (sump pump,
    French drain) in 2020
  - Comparable waterfront homes are selling $30-50K
    higher

  Write:
  1. A follow-up message addressing their flood
     concern with the research you've done
  2. A suggested plan for a second showing (what to
     look at, who to bring — inspector, contractor)
  3. A brief comparison showing this property's value
     relative to other waterfront options

assertions:
  - type: llm_judge
    criteria: "Response proactively addresses the flood insurance concern with specific data — the $1,800 annual cost, 30-year flood-free history, elevation certificate details, and mitigation features — demonstrating the agent did homework between showings."
    weight: 0.35
    description: "ProactiveConcernResolution"
  - type: llm_judge
    criteria: "Response proposes a purposeful second showing — specific things to examine, relevant professionals to bring, and a value comparison with other waterfront options — making the second visit feel productive, not repetitive."
    weight: 0.35
    description: "SecondShowingPlan"
  - type: llm_judge
    criteria: "Response would move the Nguyens from hesitation to action — the flood concern is resolved with data, the value proposition is clear, and the second showing has a defined purpose that reduces uncertainty."
    weight: 0.30
    description: "HesitationToAction"
