meta:
  id: listing-agent-feedback-request
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Request showing feedback as a listing agent — collect buyer's agent impressions to report to your seller"
  tags: [listing-agent, feedback-request, agent-to-agent, beginner]

state: {}

trigger: |
  You're the listing agent for 88 Oak Drive
  ($429,000, 4 bed/2.5 bath colonial). Three buyer's
  agents showed the property this week. You need to
  collect feedback to share with your sellers.

  Showing 1 (Monday): Agent Sarah T. showed property
  to a young couple. They were there 35 minutes.

  Showing 2 (Wednesday): Agent Mike R. showed to an
  investor. Quick 15-minute tour.

  Showing 3 (Saturday): Agent Diana L. showed to a
  family of 5. They were there 50 minutes and came
  back to measure rooms.

  Write:
  1. A feedback request template (text message) you'd
     send to all three agents
  2. A customized follow-up for Diana's showing (high
     interest signals)
  3. A feedback collection form with 8-10 questions
     that would give your sellers useful information
  4. A brief guide on feedback request best practices
     (timing, tone, persistence)

assertions:
  - type: llm_judge
    criteria: "Response creates a professional feedback request template, a customized follow-up for the high-interest showing, an 8-10 question feedback form covering price, condition, interest level, and objections, and a best practices guide."
    weight: 0.35
    description: "FeedbackToolsCompleteness"
  - type: llm_judge
    criteria: "Feedback questions are well-designed — they capture useful information for the seller without being leading or overly long; they ask about price perception, property condition, buyer interest level, and potential objections."
    weight: 0.35
    description: "QuestionDesignQuality"
  - type: llm_judge
    criteria: "The feedback system would produce actionable insights — the seller would understand buyer reactions; the listing agent could adjust strategy based on patterns; the high-interest lead (Diana) would be appropriately followed up on."
    weight: 0.30
    description: "ActionableInsights"
