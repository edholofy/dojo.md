meta:
  id: first-showing-follow-up
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Write a post-showing follow-up message to a buyer after their first property viewing — collect feedback and gauge interest"
  tags: [post-showing, buyer-follow-up, first-viewing, beginner]

state: {}

trigger: |
  You're a buyer's agent. Your clients, the Garcias,
  just finished viewing their first property:

  Property: 215 Maple Court
  - 3 bed / 2 bath, 1,800 sq ft ranch
  - Listed at $345,000
  - Updated kitchen, original bathrooms
  - Large fenced backyard, mature trees
  - 15-minute commute to their workplace
  - Near elementary school rated 8/10

  Observations during showing:
  - Maria loved the kitchen and backyard
  - Carlos seemed concerned about the bathrooms
  - Both commented the living room felt smaller
    than expected
  - They spent 40 minutes (above average)
  - Asked about the neighbors and HOA rules
  - Took several photos

  Write a follow-up email sent 2 hours after the
  showing that:
  1. Thanks them for their time
  2. References specific things they noticed/liked
  3. Addresses potential concerns proactively
  4. Asks 3-4 targeted feedback questions
  5. Outlines possible next steps

assertions:
  - type: llm_judge
    criteria: "Response references specific observations from the showing — Maria's enthusiasm for the kitchen/backyard, Carlos's bathroom concern, the living room size comment — demonstrating attentive listening during the showing."
    weight: 0.35
    description: "PersonalizedObservations"
  - type: llm_judge
    criteria: "Response asks thoughtful, targeted feedback questions — not generic 'did you like it?' but specific questions about their concerns and priorities — and outlines clear next steps based on their interest level."
    weight: 0.35
    description: "FeedbackQuestionQuality"
  - type: llm_judge
    criteria: "Response would advance the buying process — it keeps momentum without pressure, addresses concerns proactively (bathroom renovation costs, living room staging), and makes the next step easy to take."
    weight: 0.30
    description: "ProcessAdvancement"
