meta:
  id: beginner-feedback-shift
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Shift simulation — handle three showing feedback scenarios simultaneously across listing agent, buyer's agent, and dual roles"
  tags: [shift-simulation, multi-role, beginner]

state: {}

trigger: |
  It's Monday morning and you have three showing
  feedback situations to handle:

  === SITUATION 1: Listing Agent Role ===
  Your listing at 55 Cedar Court ($399K) had 4
  showings over the weekend. You've collected feedback
  from 3 agents:
  - Agent 1: "Buyers loved it. Asking about seller
    flexibility. May submit offer today."
  - Agent 2: "Nice home but $15-20K overpriced for
    the area."
  - Agent 3: "Layout was awkward. Buyers passed."
  Your sellers are anxious and calling for an update.
  Write the seller update.

  === SITUATION 2: Buyer's Agent Role ===
  Your buyer clients saw their "dream home" Saturday
  but it has 2 competing offers already. They need
  to decide TODAY whether to submit an offer. Their
  feedback: "We love everything except the price
  ($425K vs our $400K budget)." Write your guidance
  message to the buyers.

  === SITUATION 3: Follow-Up Recovery ===
  You realize you forgot to follow up with a buyer
  from a showing 8 days ago. They seemed very
  interested at the time. Write an honest, non-
  awkward recovery message.

  Handle all three situations with appropriate
  urgency, tone, and content.

assertions:
  - type: llm_judge
    criteria: "Response handles all three situations — seller update synthesizing mixed feedback with the potential offer; buyer guidance on the competing-offer dream home vs budget; recovery message for the missed 8-day follow-up."
    weight: 0.35
    description: "ThreeSituationCompleteness"
  - type: llm_judge
    criteria: "Each response matches the appropriate urgency — the seller update balances excitement (potential offer) with honesty (pricing feedback); the buyer guidance conveys time pressure without panic; the recovery message is honest about the delay."
    weight: 0.35
    description: "UrgencyCalibration"
  - type: llm_judge
    criteria: "Each response would produce the right outcome — sellers are informed and prepared; buyers can make a confident decision about stretching their budget; the forgotten buyer is re-engaged without the agent losing credibility."
    weight: 0.30
    description: "OutcomeEffectiveness"
