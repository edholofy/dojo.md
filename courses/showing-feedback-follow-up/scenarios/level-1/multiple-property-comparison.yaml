meta:
  id: multiple-property-comparison
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Follow up after showing multiple properties in one day — help buyers organize feedback and prioritize preferences"
  tags: [multiple-showings, comparison, decision-support, beginner]

state: {}

trigger: |
  You showed your buyers, the Patels, 5 homes today
  in a 4-hour tour. By the end, they were
  overwhelmed and said "they all blur together."

  Properties shown:
  1. 12 Cedar Lane - $340K, 3/2, updated but small yard
  2. 88 Pine Ave - $365K, 4/2, needs kitchen update,
     great neighborhood
  3. 205 Oak Rd - $355K, 3/2.5, townhouse, low
     maintenance, HOA $285/month
  4. 17 Willow Dr - $378K, 4/2.5, spacious but 25-min
     commute
  5. 445 Maple St - $349K, 3/1.5, charming character
     home, only 1.5 baths

  Your observations during showings:
  - Priya lit up at #2's neighborhood and #4's space
  - Raj focused on price and seemed most comfortable
    at #1 and #5
  - Both dismissed #3 quickly (didn't want HOA)
  - They disagreed about the commute to #4
  - Neither mentioned #5's 1.5-bath limitation

  Write a follow-up that:
  1. Creates a comparison framework (chart or matrix)
  2. Notes your observations about their reactions
  3. Gently highlights the 1.5-bath issue at #5
  4. Helps them narrow to 2-3 for second showings
  5. Acknowledges the "decision fatigue" they're feeling

assertions:
  - type: llm_judge
    criteria: "Response creates a clear comparison framework — a matrix or chart comparing the 5 properties on key criteria (price, beds/baths, yard, commute, condition) — and references specific observations about each showing."
    weight: 0.35
    description: "ComparisonFramework"
  - type: llm_judge
    criteria: "Response demonstrates attentive observation — notes Priya's neighborhood preference, Raj's price focus, the #3 HOA dismissal, the #4 commute disagreement — and gently flags the 1.5-bath limitation at #5 they may have overlooked."
    weight: 0.35
    description: "AttentiveObservation"
  - type: llm_judge
    criteria: "Response would help the Patels overcome decision fatigue — it organizes overwhelming information, suggests 2-3 properties for second showings with reasoning, and makes the next step simple and clear."
    weight: 0.30
    description: "DecisionFatigueRelief"
