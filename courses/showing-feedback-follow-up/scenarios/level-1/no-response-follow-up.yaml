meta:
  id: no-response-follow-up
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Handle the no-response situation — follow up when a buyer's agent or buyer goes silent after a showing"
  tags: [no-response, re-engagement, persistence, beginner]

state: {}

trigger: |
  You're the listing agent for 92 Meadow Lane. A
  buyer's agent showed the property 5 days ago. You
  sent a feedback request text the same day and a
  follow-up email 2 days later. No response to either.

  Your seller is asking daily: "Did you hear anything
  from that showing?"

  Meanwhile, as a buyer's agent, your client saw a
  home 3 days ago and seemed excited, but hasn't
  returned your follow-up call or text. They were
  active and responsive before the showing.

  Write:
  1. Third (and final) follow-up to the unresponsive
     buyer's agent — professional but clear this is
     your last attempt
  2. A message to your seller explaining the no-
     response situation honestly
  3. A creative re-engagement message to your silent
     buyer client (not pushy, but genuinely checking
     in)
  4. Guidelines for appropriate follow-up persistence
     (how many attempts, spacing, when to stop)

assertions:
  - type: llm_judge
    criteria: "Response creates appropriate messages for all three situations — a professional final follow-up to the agent; an honest explanation to the seller about no-response being common; a creative re-engagement to the silent buyer."
    weight: 0.35
    description: "ThreeSituationCoverage"
  - type: llm_judge
    criteria: "Messages strike the right tone — the agent follow-up is professional not passive-aggressive; the seller message manages expectations without excuses; the buyer re-engagement is caring not desperate."
    weight: 0.35
    description: "ToneAppropriateness"
  - type: llm_judge
    criteria: "The follow-up guidelines are practical — they specify reasonable attempt counts, spacing, channel variety, and clear criteria for when to stop — and the overall approach respects everyone's time while maintaining professionalism."
    weight: 0.30
    description: "FollowUpGuidelines"
