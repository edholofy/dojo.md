meta:
  id: negative-feedback-delivery
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Deliver consistently negative showing feedback to sellers — communicate difficult truths about price, condition, or location concerns"
  tags: [negative-feedback, difficult-conversations, seller-management, beginner]

state: {}

trigger: |
  You're the listing agent for a property that's been
  on the market for 45 days with 11 showings and zero
  offers. Your sellers, the Thompsons, are frustrated
  and asking "Why isn't our home selling?"

  Property: 167 Elm Street, listed at $449,000
  - 4 bed / 2 bath, 2,200 sq ft
  - Built 1978, original kitchen and bathrooms
  - Above-ground pool (aging, needs liner)
  - Backs to commercial property (auto repair shop)

  Consistent feedback themes (from 11 showings):
  - 8 of 11 mentioned price is too high for the
    condition
  - 6 of 11 mentioned the dated kitchen as a
    deal-breaker
  - 5 of 11 were concerned about the commercial
    property behind
  - 3 mentioned the pool as a liability, not an asset
  - Average comparable: $399-415K for updated homes
    in the area

  Write:
  1. An email to the Thompsons presenting this
     feedback (honest but compassionate)
  2. Three specific recommendations with rationale:
     - Option A: Price reduction to $___
     - Option B: Pre-listing improvements to justify
       current price
     - Option C: Combination approach
  3. Talking points for the follow-up phone call

assertions:
  - type: llm_judge
    criteria: "Response delivers difficult feedback honestly — the pricing gap, dated kitchen, commercial property concern, and pool liability are all communicated clearly without hedging or burying the message."
    weight: 0.35
    description: "HonestFeedbackDelivery"
  - type: llm_judge
    criteria: "Response is compassionate and constructive — it acknowledges the Thompsons' frustration, validates their emotional investment, and presents three actionable options with specific pricing and rationale rather than just delivering bad news."
    weight: 0.35
    description: "CompassionateConstruction"
  - type: llm_judge
    criteria: "Response would motivate the Thompsons to take action — they would understand why the home isn't selling, see a clear path forward with each option, and feel their agent is an honest advocate working in their interest."
    weight: 0.30
    description: "MotivationToAct"
