meta:
  id: open-house-feedback-collection
  level: 1
  course: showing-feedback-follow-up
  type: output
  description: "Collect and organize feedback from an open house — design sign-in process, feedback forms, and follow-up sequences"
  tags: [open-house, feedback-collection, lead-capture, beginner]

state: {}

trigger: |
  You're hosting an open house this Saturday for
  425 Pinecrest Lane ($459,000, 4 bed/3 bath). You
  expect 15-25 visitors over 3 hours. You want to
  maximize feedback collection and lead capture.

  Create:

  1. Digital sign-in form (fields to capture):
     - Essential contact information
     - Buyer qualification questions (working with
       agent?, pre-approved?, timeline?)
     - What brought them to the open house?
     - Privacy-compliant data collection notice

  2. Feedback form (paper or digital):
     - 8-10 questions about the property
     - Rating scale for key features
     - Open-ended comment section
     - "Interest level" indicator

  3. Follow-up email templates by interest level:
     - Template A: "Very interested" visitors
     - Template B: "Mildly interested / comparing"
     - Template C: Neighbors / not currently buying

  4. Feedback summary template for seller report

assertions:
  - type: llm_judge
    criteria: "Response creates complete open house tools — sign-in form with qualification questions; 8-10 question feedback form with rating scales; 3 follow-up email templates by interest level; seller feedback summary template."
    weight: 0.35
    description: "OpenHouseToolsCompleteness"
  - type: llm_judge
    criteria: "Tools balance lead capture with visitor experience — sign-in isn't intrusive, feedback form is quick to complete, qualification questions are natural, and the privacy notice addresses data collection concerns."
    weight: 0.35
    description: "VisitorExperienceBalance"
  - type: llm_judge
    criteria: "The system would produce actionable results — feedback forms reveal buyer sentiment patterns; follow-up emails are appropriately tailored; the seller report provides useful insights; the agent captures qualified leads."
    weight: 0.30
    description: "ActionableResultsSystem"
