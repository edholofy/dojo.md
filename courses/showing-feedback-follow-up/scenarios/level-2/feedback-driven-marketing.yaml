meta:
  id: feedback-driven-marketing
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Use showing feedback to improve listing marketing — adjust photos, descriptions, and targeting based on buyer reactions"
  tags: [marketing-optimization, feedback-driven, listing-improvement, intermediate]

state: {}

trigger: |
  Your listing at 612 Parkview ($429,000) is getting
  plenty of online views (2,400 in 3 weeks) but only
  8 showings — well below average for the price
  point. Of those 8 showings, feedback reveals a
  disconnect between marketing and reality.

  Online metrics:
  - Zillow views: 1,200 | Saves: 45 | Inquiries: 12
  - Realtor.com views: 800 | Saves: 28 | Inquiries: 6
  - Photo gallery: Average 18 of 35 photos viewed
  - Most-viewed photos: Kitchen (95%), backyard (88%),
    master bath (82%)
  - Least-viewed: Garage, laundry, bedrooms 3-4

  Showing feedback patterns:
  - "Looked bigger in photos" - 5 of 8
  - "The backyard is amazing — even better than
    photos show" - 6 of 8
  - "Didn't realize it was on a corner lot — love
    the extra light" - 4 of 8
  - "Description said 'gourmet kitchen' but it's
    really just a nice kitchen" - 3 of 8
  - "Where's the office? The listing mentioned a
    home office" - 2 of 8 (it's a nook, not a room)

  Create:
  1. Marketing audit identifying disconnects
  2. Revised listing description addressing the gaps
  3. Photography reshoot plan (which photos to
     replace, add, or reorder)
  4. Updated online marketing strategy
  5. Revised buyer persona targeting

assertions:
  - type: llm_judge
    criteria: "Response identifies specific marketing disconnects — 'bigger in photos' suggests over-staging or wide-angle overuse; the backyard is under-marketed; corner lot advantages aren't highlighted; 'gourmet kitchen' and 'home office' are misleading."
    weight: 0.35
    description: "MarketingAuditQuality"
  - type: llm_judge
    criteria: "The revised marketing materials address every disconnect — updated description removes exaggerated claims and highlights undermarketed features; photo plan emphasizes realistic representation and the standout backyard; targeting is adjusted."
    weight: 0.35
    description: "MarketingRevisionQuality"
  - type: llm_judge
    criteria: "The revisions would improve showing-to-listing conversion — buyers who visit would find a home that matches or exceeds expectations, reducing showing disappointment and increasing offer likelihood."
    weight: 0.30
    description: "ExpectationAlignmentOutcome"
