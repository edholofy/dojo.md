meta:
  id: feedback-objection-resolution
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Resolve common showing objections through targeted follow-up — address price, condition, layout, and location concerns with data and solutions"
  tags: [objection-resolution, data-driven, problem-solving, intermediate]

state: {}

trigger: |
  After showings, you've identified 5 common
  objections that kill deals. For each, create a
  follow-up response that resolves or reframes the
  objection.

  Objection 1: "The kitchen needs a complete remodel"
  Property: 225 Oak Ave ($375K), kitchen from 2002
  Buyer budget: $350-400K
  Research needed: local kitchen remodel costs,
  comparable homes with updated kitchens

  Objection 2: "The commute is too long"
  Property: 18 Country Lane ($310K), 35-min commute
  Buyer currently commutes 15 minutes
  Research needed: reverse commute data, remote work
  days, cost savings from lower-priced area

  Objection 3: "The school district isn't great"
  Property: 45 Elm Dr ($280K), district rated 5/10
  Buyers have 2 elementary-age children
  Research needed: magnet/charter options, school
  improvement trends, private school alternatives
  (Fair Housing compliant response)

  Objection 4: "It's on a busy street"
  Property: 112 Main Street ($345K), main road
  Buyers concerned about safety and noise
  Research needed: traffic data, noise mitigation,
  comparable price advantage

  Objection 5: "The basement had a musty smell"
  Property: 88 Pine Rd ($395K), stone foundation
  Buyers worried about water issues
  Research needed: inspection options, remediation
  costs, waterproofing solutions

  For each objection, provide:
  1. Empathetic acknowledgment
  2. Research-backed response with specific data
  3. Solution or reframe
  4. Decision point for the buyer

assertions:
  - type: llm_judge
    criteria: "Response addresses all 5 objections with the four-part structure — empathetic acknowledgment, research-backed data, solution or reframe, and a clear decision point for each buyer."
    weight: 0.35
    description: "ObjectionResolutionCompleteness"
  - type: llm_judge
    criteria: "Responses use real data and research — kitchen remodel costs are realistic; commute analysis includes cost savings; school information is Fair Housing compliant (no demographic descriptions); traffic and moisture solutions are practical."
    weight: 0.35
    description: "DataBackedResponses"
  - type: llm_judge
    criteria: "Responses would resolve or reframe objections effectively — buyers would reconsider with new information; solutions address root concerns; decision points empower buyers to make informed choices rather than being pressured."
    weight: 0.30
    description: "ObjectionResolutionEffectiveness"
