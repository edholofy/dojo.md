meta:
  id: showing-feedback-analytics
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Build a showing feedback analytics dashboard — track patterns, identify conversion indicators, and predict outcomes"
  tags: [analytics, dashboard-design, predictive, intermediate]

state: {}

trigger: |
  You're designing a showing feedback analytics
  dashboard for a brokerage with 45 agents and
  200+ monthly showings. The goal: turn qualitative
  feedback into quantitative insights.

  Design the analytics system:

  1. Data collection framework:
     - Standardized feedback categories
     - Sentiment scoring (1-5 scale for 8 dimensions)
     - Free-text analysis keywords
     - Showing duration and engagement metrics

  2. Dashboard metrics (4 views):
     - Listing View: Feedback trends for individual
       listings over time
     - Agent View: Agent performance in feedback
       collection and follow-up
     - Market View: Common objections and buyer
       sentiment trends across all listings
     - Predictive View: Which showings are likely
       to result in offers

  3. Predictive indicators:
     - Which feedback signals predict offers?
     - What showing behaviors indicate high interest?
     - How many showings typically precede an offer?

  4. Automated alerts:
     - "Hot showing" alert criteria
     - "Listing needs adjustment" trigger
     - "Agent needs coaching" threshold

  5. Sample monthly report with visualizations

assertions:
  - type: llm_judge
    criteria: "Response creates a complete analytics system — standardized data collection; 4 dashboard views (listing, agent, market, predictive); predictive indicators; automated alerts; sample monthly report with visualizations."
    weight: 0.35
    description: "AnalyticsSystemCompleteness"
  - type: llm_judge
    criteria: "The dashboard design is practical and insightful — metrics are measurable; the 8 sentiment dimensions are relevant to real estate; predictive indicators are based on realistic behavioral signals; alerts would trigger appropriate actions."
    weight: 0.35
    description: "DashboardDesignQuality"
  - type: llm_judge
    criteria: "The analytics system would improve outcomes — listing agents would adjust strategies faster; the brokerage would identify market trends; agents would receive timely coaching; the predictive model would help prioritize hot leads."
    weight: 0.30
    description: "OutcomeImprovementPotential"
