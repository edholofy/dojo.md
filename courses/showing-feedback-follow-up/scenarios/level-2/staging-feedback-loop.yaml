meta:
  id: staging-feedback-loop
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Use showing feedback to create a staging improvement cycle — identify presentation issues and implement targeted changes"
  tags: [staging, feedback-loop, presentation, intermediate]

state: {}

trigger: |
  Your listing at 330 Magnolia Court ($485,000) is
  getting showings but not offers. After 20 showings
  over 4 weeks, you've identified presentation issues
  through feedback.

  Feedback-identified issues:
  - "Cluttered" mentioned in 12 of 20 feedbacks
  - "Smells like pets" mentioned 8 times
  - "Dark living room" mentioned 7 times
  - "Can't envision themselves in the master —
    too personal" mentioned 6 times
  - "Garage is a disaster" mentioned 5 times
  - Price feedback: Only 4 said overpriced (lower
    than expected)

  Property context:
  - Sellers are a family of 6 with 2 dogs
  - They're living in the home during sale
  - Budget for improvements: $3,000 maximum
  - Sellers are resistant to change ("buyers should
    see it as a lived-in family home")

  Create:
  1. Feedback analysis showing the presentation gap
  2. A prioritized staging improvement plan within
     the $3,000 budget
  3. A compassionate message to the sellers explaining
     why changes are needed (using buyer feedback as
     evidence)
  4. Before/after descriptions of 5 key improvements
  5. Timeline: 1-week transformation plan

assertions:
  - type: llm_judge
    criteria: "Response creates a data-backed staging plan — prioritizes the most-mentioned issues (clutter, pet odor, dark room), stays within $3,000 budget with specific cost estimates, and provides a realistic 1-week timeline."
    weight: 0.35
    description: "StagingPlanQuality"
  - type: llm_judge
    criteria: "The seller message is compassionate and persuasive — uses feedback data as evidence rather than personal criticism, respects the family's attachment, and frames changes as helping buyers see the home's potential."
    weight: 0.35
    description: "SellerCommunicationQuality"
  - type: llm_judge
    criteria: "The improvements would change buyer perception — addressing clutter, odor, lighting, personalization, and garage presentation would shift feedback from negative to positive and likely generate offers."
    weight: 0.30
    description: "PerceptionShiftOutcome"
