meta:
  id: feedback-automation-system
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Design an automated showing feedback workflow — CRM triggers, timed sequences, and escalation rules for a real estate team"
  tags: [automation, crm-workflow, feedback-system, intermediate]

state: {}

trigger: |
  You're implementing an automated showing feedback
  system for your 8-agent team that handles 60+
  showings per week. Currently, feedback collection
  is inconsistent — only 35% of showings get
  documented feedback.

  Design the automated workflow:

  1. Feedback collection automation:
     - Trigger: Showing marked "completed" in CRM
     - Sequence: Text (1 hour) → Email (24 hours) →
       Text reminder (48 hours) → Agent call (72 hours)
     - Templates for each touchpoint
     - Response capture and CRM logging

  2. Feedback routing rules:
     - Positive feedback → alert listing agent + seller
       notification
     - Negative feedback → alert listing agent only
       (agent filters before seller)
     - High interest → trigger "hot lead" workflow
     - No feedback after 72 hours → close loop

  3. Seller reporting automation:
     - Weekly digest email template
     - Real-time alerts for offers/high interest
     - Monthly market comparison report

  4. Agent accountability metrics:
     - Feedback collection rate by agent
     - Follow-up compliance scoring
     - Response time tracking

assertions:
  - type: llm_judge
    criteria: "Response creates a complete automated workflow — 4-step feedback collection sequence with templates; routing rules for positive, negative, high-interest, and no-response scenarios; automated seller reporting; agent accountability metrics."
    weight: 0.35
    description: "AutomationCompleteness"
  - type: llm_judge
    criteria: "The workflow is operationally sound — trigger timing is realistic; routing rules appropriately filter negative feedback before it reaches sellers; hot lead workflows create urgency; agent accountability metrics are fair and measurable."
    weight: 0.35
    description: "OperationalSoundness"
  - type: llm_judge
    criteria: "The system would improve the 35% feedback collection rate significantly — the multi-touchpoint sequence increases response likelihood; automation ensures consistency; accountability metrics motivate agents."
    weight: 0.30
    description: "CollectionRateImprovement"
