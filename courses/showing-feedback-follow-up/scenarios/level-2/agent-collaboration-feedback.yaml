meta:
  id: agent-collaboration-feedback
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Navigate agent-to-agent feedback dynamics — handle strategic withholding, conflicting feedback, and relationship management"
  tags: [agent-collaboration, feedback-dynamics, relationship-management, intermediate]

state: {}

trigger: |
  You're dealing with three challenging agent-to-
  agent feedback situations:

  Situation 1: Strategic Withholding
  Agent Karen showed your listing to a buyer who
  spent 90 minutes and came back for measurements.
  When you ask for feedback, Karen says "My client
  liked it. We'll be in touch." You suspect an offer
  is coming but she's withholding details for
  negotiating position.

  Situation 2: Contradictory Feedback
  Three agents showed the same property this week:
  - Agent A: "Priced perfectly, great home"
  - Agent B: "Overpriced by $30K, needs work"
  - Agent C: "Under-priced for this neighborhood,
    excellent value"
  Your seller wants to know: who's right?

  Situation 3: Unprofessional Feedback
  An agent provided feedback that reads: "Honestly,
  this house is a dump. I can't believe you listed
  it at this price. The yard is a joke and the
  bathrooms are embarrassing. My buyers laughed."
  Your sellers would be devastated and it's not
  constructive.

  Write:
  1. Strategy for handling Karen's strategic
     withholding (what to do and not do)
  2. Analysis of contradictory feedback for your
     seller with guidance
  3. How to handle the unprofessional feedback —
     what to share, what to filter, and whether to
     address it with the agent

assertions:
  - type: llm_judge
    criteria: "Response handles all three situations — strategic withholding with appropriate patience and techniques; contradictory feedback with context and analysis; unprofessional feedback with filtering and professional response."
    weight: 0.35
    description: "AgentDynamicsCoverage"
  - type: llm_judge
    criteria: "Response demonstrates professional maturity — doesn't push Karen too hard; explains contradictory feedback as reflecting different buyer perspectives; filters the unprofessional feedback without hiding useful information from sellers."
    weight: 0.35
    description: "ProfessionalMaturity"
  - type: llm_judge
    criteria: "Each approach protects the client relationship while maintaining agent professionalism — sellers get useful information without unnecessary hurt; professional relationships are preserved; the agent's reputation is protected."
    weight: 0.30
    description: "RelationshipProtection"
