meta:
  id: feedback-to-pricing-strategy
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Translate showing feedback patterns into pricing strategy recommendations — data-driven approach to price adjustments"
  tags: [pricing-strategy, data-driven, market-analysis, intermediate]

state: {}

trigger: |
  You've collected showing feedback over 30 days for
  a listing that isn't generating offers. Analyze the
  data and create a pricing strategy recommendation.

  Property: 780 Heritage Drive, listed at $549,000
  - 5 bed / 3 bath, 3,200 sq ft
  - Premium neighborhood, good schools
  - Updated kitchen, dated bathrooms
  - Large lot, pool needs resurfacing

  30-Day Feedback Data (22 showings):
  Pricing perception:
  - "Overpriced": 14 responses (64%)
  - "Fair price": 5 responses (23%)
  - "Good value": 3 responses (13%)

  Top objections (frequency):
  1. "Pool needs work" - 16 mentions
  2. "Bathrooms dated" - 12 mentions
  3. "Price too high for condition" - 11 mentions
  4. "Love the location" - 18 mentions (positive)
  5. "Kitchen is beautiful" - 15 mentions (positive)

  Comparable sales (last 60 days):
  - 812 Heritage Dr: $535K (similar, updated baths)
  - 145 Oak Park: $525K (smaller lot, all updated)
  - 903 Heritage Dr: $562K (pool resurfaced, 5 bed)

  Interest level tracking:
  - "Would make offer": 2 (but cited price barrier)
  - "Second showing": 4
  - "Passed": 16

  Create:
  1. Feedback analysis report with visualizations
  2. Three pricing strategy options with projected
     outcomes
  3. Non-price adjustments that could shift perception
  4. Recommendation with supporting rationale
  5. Script for presenting this to the seller

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough feedback analysis — synthesizes the 22-showing dataset, identifies the pricing perception gap (64% overpriced), correlates objections with positive feedback, and uses comparable sales to anchor recommendations."
    weight: 0.35
    description: "FeedbackAnalysisQuality"
  - type: llm_judge
    criteria: "Three pricing strategies are distinct and data-supported — each option has a specific price point, projected timeline, and expected outcome; non-price adjustments (pool credit, bathroom staging) are practical alternatives."
    weight: 0.35
    description: "StrategyOptionsQuality"
  - type: llm_judge
    criteria: "The seller presentation script would be persuasive — it uses the data to justify the recommendation, acknowledges the property's strengths (location, kitchen), and presents the recommendation as the path to the best possible outcome."
    weight: 0.30
    description: "SellerPresentationEffectiveness"
