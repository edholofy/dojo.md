meta:
  id: emotional-buyer-follow-up
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Handle emotionally complex buyer follow-ups — divorce, estate sales, relocation grief, and first-time buyer anxiety"
  tags: [emotional-intelligence, sensitive-situations, buyer-psychology, intermediate]

state: {}

trigger: |
  You have four buyers who each need emotionally
  sensitive follow-up after showings. Write
  appropriate messages for each:

  Buyer 1: Divorce Situation
  Mark is buying because of a divorce. He just saw
  a 2-bedroom condo and said, "I guess this is my
  life now — going from a 4-bedroom colonial to
  this." He left the showing looking defeated.

  Buyer 2: Estate Sale / Grief
  The Chen family is selling their late mother's home
  and looking for a smaller place for their father.
  During the showing, Mr. Chen kept saying "Mom would
  have liked this kitchen" and "This garden isn't as
  big as hers." The family is clearly grieving.

  Buyer 3: Reluctant Relocation
  The Johnsons are relocating from California for a
  job transfer. They don't want to leave but have no
  choice. After seeing 3 homes, Lauren said "Nothing
  here feels like home. I miss our neighborhood."

  Buyer 4: First-Time Buyer Panic
  Aisha, 27, just saw her first property and is
  overwhelmed. She texted: "I don't know how anyone
  makes this decision. What if I pick the wrong
  house? What if the market crashes? What if
  something breaks? I'm freaking out."

  Write follow-up messages for each that acknowledge
  the emotional reality while gently advancing the
  process.

assertions:
  - type: llm_judge
    criteria: "Response creates four emotionally attuned follow-ups — Mark's divorce transition is validated; the Chens' grief is honored; the Johnsons' relocation resistance is acknowledged; Aisha's first-time panic is calmed — each with genuine empathy, not formulaic sympathy."
    weight: 0.35
    description: "EmotionalAttunement"
  - type: llm_judge
    criteria: "Each message balances emotional support with professional guidance — doesn't just sympathize but gently moves each buyer toward their next step while respecting their emotional process and timeline."
    weight: 0.35
    description: "SupportAndProgressBalance"
  - type: llm_judge
    criteria: "Each buyer would feel genuinely seen and supported — Mark wouldn't feel pitied; the Chens wouldn't feel rushed through grief; the Johnsons wouldn't feel dismissed; Aisha wouldn't feel patronized — while each moves one step closer to finding their home."
    weight: 0.30
    description: "AuthenticConnectionOutcome"
