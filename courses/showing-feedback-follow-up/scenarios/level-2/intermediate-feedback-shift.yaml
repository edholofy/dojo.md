meta:
  id: intermediate-feedback-shift
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Shift simulation — handle a complex week of feedback challenges requiring strategic thinking and emotional intelligence"
  tags: [shift-simulation, complex-scenarios, intermediate]

state: {}

trigger: |
  It's Friday afternoon. Your week has produced three
  challenging feedback situations that need resolution
  before the weekend:

  === SITUATION 1: The Price Reduction Conversation ===
  Your listing at 750 Oak ($549K) has had 25 showings
  in 5 weeks with zero offers. Feedback is clear: 80%
  say overpriced. But your sellers, the Millers, are
  emotionally attached ("We put $90K into renovations!")
  and have rejected two previous price reduction
  suggestions. You need a new approach.
  Design: A data-presentation strategy that finally
  convinces the Millers, including a formal CMA
  update and a "what if we don't reduce" scenario.

  === SITUATION 2: The Ethical Dilemma ===
  A buyer's agent gave you feedback about your listing:
  "My clients loved the house but they're concerned
  about the Asian family next door — they had some
  kind of cultural cooking smell." This is clearly
  discriminatory. But the underlying feedback (odor
  concern) might actually be about your listing's
  proximity to a restaurant, not the neighbors.
  Design: How to handle discriminatory feedback
  ethically while extracting any legitimate concern.

  === SITUATION 3: The Buyer Breakup ===
  After 4 months and 22 showings, your buyer clients
  want to fire you. Their feedback: "We don't feel
  heard. You keep showing us colonial-style homes
  and we've told you we want modern. You push us
  toward your own listings. We feel like a
  transaction, not a relationship."
  Design: A response that either saves the
  relationship or handles the breakup professionally.

  Address all three situations with detailed
  response plans.

assertions:
  - type: llm_judge
    criteria: "Response handles all three situations — a new approach for the resistant sellers with CMA data and consequences; ethical handling of discriminatory feedback; professional response to the buyer breakup with self-reflection."
    weight: 0.35
    description: "ThreeSituationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates sophisticated judgment — the Miller approach uses data not emotion; the discriminatory feedback is handled by addressing the legitimate concern while rejecting the discriminatory framing; the breakup response shows genuine accountability."
    weight: 0.35
    description: "SophisticatedJudgment"
  - type: llm_judge
    criteria: "Each approach would produce a professional outcome — the Millers would finally consider a reduction; the discriminatory feedback is handled ethically without ignoring potential legitimate issues; the buyer relationship is either saved through genuine change or ends with mutual respect."
    weight: 0.30
    description: "ProfessionalOutcome"
