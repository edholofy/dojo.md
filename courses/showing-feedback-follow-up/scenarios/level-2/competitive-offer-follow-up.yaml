meta:
  id: competitive-offer-follow-up
  level: 2
  course: showing-feedback-follow-up
  type: output
  description: "Follow up after showings in a competitive market — create urgency, prepare for multiple offers, and guide buyer strategy"
  tags: [competitive-market, multiple-offers, urgency, intermediate]

state: {}

trigger: |
  Your market is extremely competitive — homes are
  receiving 5-8 offers within 48 hours of listing.
  You need follow-up strategies for three different
  competitive scenarios:

  Scenario 1: Your buyer's "The One"
  The Nguyens just saw 42 Elm Street and said "This
  is it." The listing agent told you there are
  already 3 offers and the deadline is tomorrow at
  5 PM. They're pre-approved for $400K; the home is
  listed at $375K.

  Scenario 2: Your listing with multiple offers
  You're the listing agent for 19 River Road ($325K).
  After Saturday showings, 4 buyer's agents called
  saying their clients want to submit offers. You
  need to communicate the multiple-offer situation
  to all agents while maintaining ethical standards.

  Scenario 3: Your buyer lost the bidding war
  The Parkers just lost their 3rd bidding war in 2
  months. They're demoralized and considering giving
  up. You need to re-engage them with a new strategy.

  Write follow-up communications for all three
  scenarios including buyer guidance, agent-to-agent
  communication, and strategy documents.

assertions:
  - type: llm_judge
    criteria: "Response handles all three competitive scenarios — urgency guidance for the Nguyens with offer strategy; ethical multiple-offer communication as listing agent; demoralized buyer re-engagement for the Parkers."
    weight: 0.35
    description: "CompetitiveScenarioCoverage"
  - type: llm_judge
    criteria: "Response demonstrates competitive market expertise — the Nguyens get escalation strategy advice; the multiple-offer notification is ethical and transparent; the Parkers get a concrete new approach with adjusted strategy."
    weight: 0.35
    description: "CompetitiveMarketExpertise"
  - type: llm_judge
    criteria: "Each follow-up would produce the right outcome — the Nguyens are prepared to compete effectively; all buyer agents receive equal information; the Parkers feel hopeful and equipped with a winning strategy."
    weight: 0.30
    description: "CompetitiveOutcomeEffectiveness"
