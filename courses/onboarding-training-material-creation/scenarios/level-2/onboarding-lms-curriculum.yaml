meta:
  id: onboarding-lms-curriculum
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a self-paced onboarding curriculum for an LMS platform with modules, quizzes, videos, and completion tracking for a 500-person company"
  tags: [lms-curriculum, self-paced, e-learning, modules, intermediate]

state: {}

trigger: |
  You're the L&D manager at a 500-person insurance
  company that just purchased an LMS (TalentLMS).
  Currently, onboarding is a 3-day in-person
  program run monthly. Problems: new hires starting
  mid-month wait up to 3 weeks for the next session,
  content is outdated, and there's no way to track
  who completed what. You need to convert the
  onboarding program to a self-paced LMS curriculum
  that new hires complete in their first 2 weeks.

  Current onboarding topics to convert:
  - Company overview (history, mission, org chart)
  - Insurance industry fundamentals
  - Product knowledge (5 insurance product lines)
  - Compliance (state insurance regulations, ethics,
    anti-fraud)
  - Systems training (policy management system,
    claims system, CRM)
  - Customer communication standards
  - Benefits and HR policies

  Design the complete LMS onboarding curriculum:

  1. Curriculum Architecture
     - Learning paths by role type (underwriting,
       claims, sales, operations, corporate)
     - Core modules (required for all) vs. role-
       specific modules
     - Prerequisite dependencies (Module A before
       Module B)
     - Estimated completion time per module
     - 2-week completion timeline with daily
       recommendations

  2. Module Design (for 8 core modules)
     - Each module includes: learning objectives,
       content outline (slide-by-slide), knowledge
       check questions, video script for key
       sections, interactive elements
     - Write one complete module as an example:
       "Insurance 101: Understanding Our Products"

  3. Assessment Strategy
     - Module-level quizzes (5-8 questions each,
       80% pass rate)
     - Final comprehensive assessment (25 questions,
       85% pass rate)
     - Practical scenario assessments (3 scenarios)
     - How to handle failures (retake policies)

  4. Engagement Strategy
     - Gamification elements (badges, progress bars,
       leaderboard)
     - Manager notifications at key milestones
     - Social learning elements (discussion boards,
       peer questions)
     - Completion celebration (virtual certificate)

  5. Administration
     - Enrollment automation (triggered by HRIS
       new hire event)
     - Reporting dashboard design (completion rates,
       assessment scores, time to complete)
     - Content update schedule and ownership
     - Accessibility requirements (WCAG 2.1 AA)

  Task: Write the complete LMS onboarding
  curriculum design.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete LMS curriculum — learning paths by role type; 8 core modules with objectives, outlines, quizzes, video scripts, and interactive elements; one fully designed example module; assessment strategy with module quizzes, final assessment, and scenario assessments; gamification elements; manager notifications; enrollment automation; reporting dashboard design; content update schedule; accessibility requirements."
    weight: 0.35
    description: "LMSCurriculumCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates e-learning design expertise — the curriculum architecture has logical prerequisite dependencies; role-specific paths avoid unnecessary content; the example module uses multimedia effectively; quizzes test application, not just recall; scenario assessments simulate real insurance situations; gamification motivates without trivializing; the 2-week timeline is realistic for self-paced completion."
    weight: 0.35
    description: "ELearningDesignExpertise"
  - type: llm_judge
    criteria: "Response would transform the onboarding experience — new hires wouldn't wait weeks for a class; self-pacing would accommodate different learning speeds; completion tracking would ensure nothing is missed; the LMS would reduce L&D team workload; assessment scores would demonstrate competency; the insurance company would have a scalable, consistent onboarding platform."
    weight: 0.30
    description: "LMSTransformationOutcome"
