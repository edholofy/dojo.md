meta:
  id: engineering-onboarding-program
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a software engineer onboarding program with codebase orientation, development workflow, architecture deep-dives, and first-contribution milestones"
  tags: [engineering-onboarding, codebase, dev-workflow, architecture, intermediate]

state: {}

trigger: |
  You're the engineering manager at a Series C
  fintech startup (80 engineers across 6 squads).
  New engineers take 3 months before their first
  meaningful code contribution. The VP Engineering
  wants to cut this to 6 weeks. The main blockers:
  complex microservices architecture, tribal
  knowledge, inconsistent documentation, and no
  structured onboarding path.

  Tech stack:
  - Backend: Go microservices (12 services)
  - Frontend: React + TypeScript
  - Database: PostgreSQL + Redis
  - Infrastructure: Kubernetes on AWS, Terraform
  - CI/CD: GitHub Actions
  - Monitoring: Datadog
  - Communication: Slack, Linear (tickets), Notion
    (docs)

  Design the 6-week engineering onboarding program:

  Week 1: Environment and Culture
  - Development environment setup guide (step-by-step)
  - Architecture overview (system diagram + service
    map)
  - Engineering culture doc (how we make decisions,
    code review standards, on-call expectations)
  - First PR: Fix a "good first issue" bug
  - Meet: Direct manager, squad members, platform
    team lead

  Week 2: Codebase Deep Dive
  - Service-by-service walkthrough (guided by
    squad members)
  - Data model and database schema review
  - API documentation and Postman collection
  - Testing philosophy and testing pyramid
  - Second PR: Add a test for existing functionality

  Week 3: Development Workflow Mastery
  - PR review process (writing good PRs, reviewing
    others)
  - Feature flag system
  - Deployment pipeline walkthrough
  - Incident response and on-call procedures
  - Third PR: Small feature addition

  Week 4: Domain Knowledge
  - Fintech domain training (regulatory requirements,
    compliance implications in code)
  - Product team collaboration patterns
  - Customer journey walkthrough
  - Fourth PR: Feature with product requirements

  Week 5-6: Independence
  - Own a medium-sized feature end-to-end
  - Participate in squad sprint planning
  - Start on-call shadow rotation
  - Architecture Decision Record (ADR) review
  - Graduation: Demo your feature to the squad

  Provide:
  - Day-by-day schedule for each week
  - Dev environment setup guide (the actual steps)
  - Architecture overview document template
  - "Good first issue" criteria and example tickets
  - Engineering culture document
  - Code review checklist for new engineers
  - Onboarding buddy responsibilities (technical)
  - Success metrics (what "ready" looks like at
    Week 6)

  Task: Write the complete engineering onboarding
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 6-week program — day-by-day schedules; dev environment setup guide; architecture overview template; good first issue criteria; engineering culture doc; code review checklist; onboarding buddy responsibilities; success metrics; PR milestones for each week; domain training; on-call procedures."
    weight: 0.35
    description: "EngineeringOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates engineering onboarding expertise — the setup guide is actually executable (not vague); architecture overview makes a complex system approachable; PRs escalate in complexity realistically; the culture doc addresses real engineering norms (not just values); code review checklist teaches quality standards; the fintech domain section addresses regulatory code implications specifically."
    weight: 0.35
    description: "EngineeringOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would cut time-to-contribution from 3 months to 6 weeks — engineers would have a working environment on Day 1; they'd ship their first PR in Week 1; they'd understand the architecture by Week 3; they'd handle product requirements by Week 4; they'd own a feature by Week 6; the program would work regardless of which squad the engineer joins."
    weight: 0.30
    description: "TimeToContributionOutcome"
