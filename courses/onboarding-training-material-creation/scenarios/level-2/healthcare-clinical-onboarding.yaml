meta:
  id: healthcare-clinical-onboarding
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a clinical onboarding program for new nurses at a hospital including competency assessments, preceptor program, and regulatory compliance"
  tags: [healthcare-onboarding, nursing, clinical-competency, preceptor, intermediate]

state: {}

trigger: |
  You're the nursing education coordinator at a
  350-bed community hospital. You onboard 60-80
  new nurses annually (mix of new graduates and
  experienced nurses). Current onboarding is
  inconsistent: some units have great preceptors,
  others throw new nurses into patient care with
  minimal support. A recent near-miss incident
  involved a new nurse who was never oriented to
  the unit's high-risk medication protocols. The
  CNO wants a standardized clinical onboarding
  program.

  Program scope:
  - Duration: 12 weeks for new graduates, 6 weeks
    for experienced nurses
  - Settings: Med-Surg, ICU, ED, L&D, Peds
    (unit-specific adaptations needed)
  - Regulatory requirements: Joint Commission,
    state board of nursing, hospital credentialing

  Design the complete nursing onboarding program:

  Phase 1 — Hospital Orientation (Week 1, all nurses):
  - Hospital mission, values, and patient care
    philosophy
  - Electronic health record (EHR) training (Epic)
  - Medication administration safety (5 Rights,
    high-alert medications, smart pump programming)
  - Infection control and hand hygiene competency
  - Patient safety and fall prevention
  - Code Blue and rapid response protocols
  - Restraint use and documentation
  - Blood transfusion procedures
  - Fire safety and emergency codes

  Phase 2 — Unit Orientation (Weeks 2-6/12):
  - Unit-specific protocols and procedures
  - Preceptor-guided clinical practice
  - Progressive patient load increase
  - Weekly competency checkoffs
  - Critical thinking simulation scenarios

  Phase 3 — Independent Practice (final 2 weeks):
  - Full patient load with preceptor available
  - Night/weekend shift experience
  - Final competency evaluation
  - Transition to independent practice

  Provide:
  - Hospital orientation week schedule (day-by-day)
  - Core competency checklist (skills every nurse
    must demonstrate)
  - Unit-specific orientation template (adaptable
    for any unit)
  - Preceptor selection criteria and training guide
  - Weekly progress evaluation form
  - Clinical simulation scenarios (3 scenarios with
    debriefing guides)
  - New graduate vs. experienced nurse pathway
    differences
  - Competency assessment rubric
  - "Red flags" checklist (when to extend
    orientation)

  Task: Write the complete clinical nursing
  onboarding program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete nursing program — hospital orientation week schedule; core competency checklist; unit-specific orientation template; preceptor selection and training guide; weekly progress evaluation; 3 clinical simulation scenarios with debriefs; new grad vs. experienced pathways; competency assessment rubric; red flags checklist for extending orientation."
    weight: 0.35
    description: "ClinicalOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates clinical onboarding expertise — competency requirements reflect actual nursing practice standards; medication safety protocols address real risks; the preceptor guide develops teaching skills, not just clinical skills; simulation scenarios test critical thinking, not just procedures; the progressive patient load increase is realistic; red flags for extending orientation protect patient safety."
    weight: 0.35
    description: "ClinicalOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would produce safe, competent nurses — near-miss incidents like the medication protocol failure would be prevented; new graduates would be supported through their transition; experienced nurses would adapt quickly without redundant training; preceptors would provide consistent guidance; the program would meet Joint Commission requirements; patient safety would be measurably improved."
    weight: 0.30
    description: "PatientSafetyOutcome"
