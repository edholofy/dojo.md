meta:
  id: sales-onboarding-program
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a complete sales rep onboarding program with product training, sales methodology, role-play exercises, and ramp-to-quota plan"
  tags: [sales-onboarding, product-training, sales-methodology, ramp-plan, intermediate]

state: {}

trigger: |
  You're the sales enablement manager at a B2B
  cybersecurity company (ARR $40M, 15 AEs, growing
  to 25). Current sales onboarding is 2 days of
  product demos followed by "shadow a rep for a
  week." Ramp time averages 6 months and new reps
  consistently miss quota in their first 2 quarters.
  The CRO wants a structured program that cuts
  ramp time to 3 months.

  Company and role details:
  - Product: Cloud security platform (CSPM + CWPP)
  - Avg deal size: $85K ARR
  - Sales cycle: 60-90 days
  - Sales methodology: MEDDPICC
  - Target buyer: CISO and VP of Engineering
  - Competitors: Wiz, Palo Alto Prisma Cloud,
    Orca Security
  - Sales tools: Salesforce, Gong, Outreach,
    LinkedIn Sales Navigator

  Design the complete 12-week onboarding program:

  Week 1-2: Product and Industry
  - Cybersecurity landscape and cloud security
    market
  - Product deep dive (features, architecture,
    differentiators)
  - Competitive positioning (vs. top 3 competitors)
  - Customer success stories and case studies
  - Assessment: Product knowledge certification

  Week 3-4: Sales Methodology and Process
  - MEDDPICC framework training
  - Sales process stages and exit criteria
  - Discovery call framework and questions
  - Demo methodology
  - Assessment: Mock discovery call

  Week 5-6: Tools and Territory
  - Salesforce workflow and hygiene standards
  - Gong call review process
  - Outreach sequence creation
  - LinkedIn prospecting methodology
  - Territory planning exercise
  - Assessment: Pipeline building plan

  Week 7-8: Practice and Shadow
  - Shadow top AEs on real calls (5+ calls)
  - Role-play exercises (cold call, discovery,
    objection handling, negotiation)
  - First solo prospecting activity
  - Assessment: Live role-play evaluation

  Week 9-12: Supervised Selling
  - Own pipeline with weekly coaching
  - Weekly deal reviews with manager
  - Gradual reduction of supervision
  - Assessment: First closed deal (target)

  For the program, provide:
  - Detailed weekly schedule with specific activities
  - 5 role-play scenarios with scripts
  - Product knowledge quiz (20 questions)
  - MEDDPICC deal qualification template
  - Ramp-to-quota milestones (activity and outcome
    metrics by week)
  - Manager's coaching guide for Weeks 9-12

  Task: Write the complete sales onboarding program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 12-week program — detailed weekly schedules; product and industry training; MEDDPICC methodology training; tools training; 5 role-play scenarios with scripts; product knowledge quiz (20 questions); MEDDPICC deal template; shadow program structure; ramp-to-quota milestones with weekly metrics; manager coaching guide for supervised selling."
    weight: 0.35
    description: "SalesOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates sales onboarding expertise — the program progressively builds from knowledge to skill to application; MEDDPICC is taught through practice, not just theory; role-plays reflect real cybersecurity sales scenarios; competitive positioning is specific (not generic); ramp milestones are realistic for $85K deals; the coaching guide helps managers support without micromanaging."
    weight: 0.35
    description: "SalesEnablementExpertise"
  - type: llm_judge
    criteria: "Response would cut ramp time from 6 to 3 months — new reps would be productively prospecting by Week 6; they'd run solo discovery calls by Week 8; they'd have pipeline by Week 12; the structured approach would produce consistent results across all new hires; the CRO would see measurable improvement in time-to-first-deal."
    weight: 0.30
    description: "RampReductionOutcome"
