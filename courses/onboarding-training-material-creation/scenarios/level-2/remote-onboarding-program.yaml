meta:
  id: remote-onboarding-program
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a fully remote onboarding program for a distributed company across 4 time zones including async training, virtual social integration, and remote-specific tooling"
  tags: [remote-onboarding, distributed-team, async-training, virtual-integration, intermediate]

state: {}

trigger: |
  You're the Head of People at a 180-person fully
  remote company (no offices, employees in 15
  countries, 4 primary time zones: US Pacific,
  US Eastern, UK/Europe, and Southeast Asia). You
  hire 5-8 people per month and need an onboarding
  program that works without a single in-person
  interaction.

  Current problems:
  - New hires feel isolated in their first month
  - Training is scattered across Notion pages
    with no clear path
  - Time zone overlap is limited (max 4 hours
    between Pacific and Asia)
  - Cultural integration is slow (takes 6+ months
    to "feel part of the team")
  - Remote new hires don't build cross-functional
    relationships

  Company tools:
  - Communication: Slack (async-first culture)
  - Video: Zoom (for scheduled meetings only)
  - Documentation: Notion
  - Project management: Linear
  - HR: Rippling
  - Learning: No LMS currently
  - Social: Donut (random coffee chats)

  Design the complete remote onboarding program:

  1. Pre-boarding (2 weeks before start):
     - Equipment shipping and home office setup
     - Account provisioning
     - Pre-boarding email sequence (4 emails)
     - Welcome Slack channel setup
     - Async welcome video from team

  2. Week 1 — "Connect and Orient":
     - Self-paced orientation modules in Notion
       (company, product, values, tools)
     - Live welcome call with People team (1 hour,
       offered in 2 time slots)
     - Manager 1:1 (30 min, first day)
     - "Random coffee" with 3 people across the
       company
     - Async team introductions

  3. Week 2-4 — "Learn and Integrate":
     - Role-specific training path (self-paced +
       scheduled sessions)
     - Cross-functional "shadow" sessions (virtual)
     - Async daily check-ins via Slack thread
     - Weekly video 1:1 with manager
     - Virtual team lunch (optional, expense-
       covered delivery)

  4. Month 2-3 — "Contribute and Belong":
     - Fully participating in team workflows
     - Monthly People team check-in
     - Cross-team project involvement
     - Remote culture rituals participation

  Provide:
  - Self-paced orientation module outlines (6
    modules, 30-45 min each)
  - Async communication guidelines for new hires
  - Time zone management guide (scheduling across
    zones)
  - Remote culture rituals handbook (what makes
    distributed culture work)
  - Manager's remote onboarding checklist
  - New hire feedback survey (Day 7, Day 30, Day 90)
  - Equipment and home office setup guide with
    budget

  Task: Write the complete remote onboarding program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete remote program — pre-boarding with equipment, accounts, emails, and welcome channel; Week 1 with self-paced modules and live elements in time-zone-friendly formats; Weeks 2-4 with role-specific training and integration; Months 2-3 with contribution milestones; 6 orientation module outlines; async communication guide; time zone management; remote culture rituals; manager checklist; feedback surveys at Day 7/30/90; equipment guide."
    weight: 0.35
    description: "RemoteOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates remote onboarding expertise — async-first design respects all time zones; live sessions are offered in multiple slots; the balance between self-paced and synchronous is realistic; the remote culture rituals create genuine belonging; the communication guide prevents remote isolation; the time zone management is practical; social integration is intentional, not left to chance."
    weight: 0.35
    description: "RemoteOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would successfully onboard remote employees — new hires would feel connected by end of Week 1; cultural integration would happen in weeks, not months; cross-functional relationships would form early; the program would work equally well for someone in California and someone in Singapore; isolation would be measurably reduced; the company would retain remote new hires."
    weight: 0.30
    description: "RemoteIntegrationOutcome"
