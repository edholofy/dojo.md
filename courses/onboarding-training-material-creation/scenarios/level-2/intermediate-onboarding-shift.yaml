meta:
  id: intermediate-onboarding-shift
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Create three distinct onboarding programs: a manufacturing floor worker orientation, a franchise owner training package, and a nonprofit volunteer onboarding kit"
  tags: [multi-context, manufacturing, franchise, volunteer, intermediate]

state: {}

trigger: |
  You're an HR consultant specializing in
  onboarding design. Three clients with very
  different needs need complete onboarding programs.

  === CLIENT 1: Manufacturing Floor Worker ===
  An auto parts manufacturer (500 workers, 3 shifts)
  is hiring 50 new production workers for a new
  assembly line. Safety is paramount — OSHA
  recordable incidents have been above industry
  average.
  - Workforce: 60% Spanish-speaking, 30% English-
    speaking, 10% other languages
  - Education level: High school diploma or GED
  - Training window: 3 days before they start on
    the floor
  - Work: Standing, repetitive motion, operating
    CNC machines and robotic assembly cells

  Program must include:
  - 3-day training schedule (bilingual)
  - Safety training module (OSHA compliance,
    lockout/tagout, PPE, chemical handling)
  - Machine operation basics (step-by-step with
    diagrams)
  - Quality control checkpoints
  - Ergonomics and injury prevention
  - Shift schedule, break policies, attendance
  - Visual job aids (minimal text, heavy on
    diagrams/photos)
  - Safety competency assessment (practical, not
    written test)

  === CLIENT 2: Franchise Owner Training ===
  A fast-growing smoothie franchise (80 locations)
  needs to onboard new franchise owners who have
  no food service experience. Franchise fee:
  $250K. Franchisees are typically small business
  owners transitioning from other industries.
  - Training window: 2 weeks at corporate HQ +
    1 week at their location
  - They need to learn: operations, food prep,
    staffing, inventory, marketing, financials,
    technology, customer service

  Program must include:
  - 3-week training schedule (Week 1-2 at HQ,
    Week 3 on-site)
  - Operations manual summary (daily/weekly/monthly
    tasks)
  - Financial management basics (P&L reading,
    food cost management, labor cost optimization)
  - Staff hiring and training guide (how to
    onboard their own employees)
  - Marketing playbook (local marketing, social
    media, grand opening)
  - Technology setup guide (POS, ordering system,
    inventory management)
  - Ongoing support structure (field consultant,
    franchise community)
  - Final certification assessment

  === CLIENT 3: Nonprofit Volunteer Onboarding ===
  A food bank (15 staff, 300 active volunteers)
  needs a volunteer onboarding process. Current
  state: volunteers show up, are pointed to a task,
  and leave confused. Retention is low — most
  volunteers come once and never return.
  - Volunteer types: Warehouse sorting, food
    distribution, delivery drivers, office/admin,
    special events
  - Volunteer commitment: Some weekly, some monthly,
    some one-time
  - Ages: 16-80 (high school groups, corporate
    teams, retirees)

  Program must include:
  - Volunteer welcome and orientation (30 min,
    self-guided + video)
  - Role-specific quick-start guides for each
    volunteer type
  - Safety and food handling basics (15 min)
  - Volunteer handbook (code of conduct, dress
    code, parking, what to expect)
  - Appreciation and recognition program design
  - Feedback mechanism (how volunteers can share
    ideas/concerns)
  - Retention strategy (what brings volunteers
    back)
  - Group volunteer coordination guide (for
    corporate and school groups)

  Task: Write all three complete onboarding
  programs.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete programs — Manufacturing with bilingual 3-day schedule, safety module, machine operation guides, visual job aids, and practical assessment; Franchise with 3-week schedule, operations manual, financial management, staff hiring guide, marketing playbook, tech setup, and certification; Volunteer with 30-min orientation, role-specific guides, safety training, handbook, recognition program, and retention strategy."
    weight: 0.35
    description: "ThreeOnboardingProgramsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across contexts — manufacturing training addresses bilingual workforce and OSHA requirements; franchise training transforms non-food-service owners into operators; volunteer onboarding addresses diverse age groups and commitment levels; each program is tailored to its audience's education level, motivation, and context; visual job aids for manufacturing are genuinely visual."
    weight: 0.35
    description: "MultiContextOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would solve each client's problem — OSHA incidents would decrease for the manufacturer; franchise owners would open successfully; volunteer retention would improve significantly; each program could be implemented immediately; all three demonstrate professional-quality onboarding design appropriate to their unique constraints."
    weight: 0.30
    description: "ThreeContextOutcomes"
