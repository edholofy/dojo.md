meta:
  id: retail-seasonal-onboarding
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a rapid onboarding program for 200 seasonal retail employees that compresses training into 2 days while maintaining service quality"
  tags: [retail-onboarding, seasonal-hiring, rapid-training, high-volume, intermediate]

state: {}

trigger: |
  You're the regional training manager for a
  national outdoor gear retailer (150 stores).
  Every September, each store hires 8-15 seasonal
  employees for the holiday season (Oct-Jan). That's
  ~2,000 seasonal hires nationally. Current training
  is 1 day of shadowing a regular employee — leading
  to inconsistent customer experiences, high error
  rates at the register, and seasonal employees
  who can't answer basic product questions.

  Challenge: You have 2 days to make a seasonal
  employee functional. They won't have the luxury
  of a month-long onboarding.

  Store details:
  - Avg store: 5,000 sq ft, 8 departments
    (camping, hiking, climbing, cycling, water
    sports, winter sports, apparel, footwear)
  - POS system: Shopify POS
  - Loyalty program: REI-style membership program
  - Return policy: 1-year, no questions asked
  - Customer demographic: Enthusiastic outdoor
    people who expect knowledgeable staff

  Design the 2-day rapid onboarding program:

  Day 1 — "Ready to Help" (8 hours):
  - Company overview and culture (30 min)
  - Customer service philosophy and standards
    (45 min)
  - POS system training (90 min with hands-on
    practice)
  - Store tour and department overview (60 min)
  - Product knowledge essentials (90 min — not
    everything, just enough to help)
  - Loss prevention basics (30 min)
  - Lunch + meet the team (60 min)

  Day 2 — "Ready to Sell" (8 hours):
  - Role-play: Customer interactions (90 min)
  - Loyalty program and upselling (45 min)
  - Returns and exchanges process (45 min)
  - Inventory and stock room procedures (45 min)
  - Emergency procedures (30 min)
  - Supervised floor time with a buddy (120 min)
  - Day 2 assessment: Simulated customer
    interaction evaluation

  Provide:
  - Minute-by-minute Day 1 and Day 2 facilitator
    guides
  - Product knowledge cheat sheet (what to know
    about each department in 2 sentences)
  - POS quick reference card (common transactions)
  - Customer interaction scripts (greeting,
    helping, closing, handling complaints)
  - Role-play scenario cards (10 scenarios)
  - Day 2 assessment rubric
  - "Week 1 on the Floor" survival guide (one-pager)
  - Store manager's checklist for seasonal onboarding

  Task: Write the complete seasonal onboarding
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 2-day program — minute-by-minute Day 1 and Day 2 guides; product knowledge cheat sheet for 8 departments; POS quick reference card; customer interaction scripts; 10 role-play scenarios; Day 2 assessment rubric; Week 1 survival guide; store manager checklist."
    weight: 0.35
    description: "SeasonalOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates rapid onboarding expertise — the 2-day program prioritizes ruthlessly (must-know vs. nice-to-know); product knowledge cheat sheet gives enough to be helpful without overwhelming; POS training includes hands-on practice; role-plays cover realistic retail scenarios; the assessment measures readiness realistically; the Week 1 guide fills gaps the 2 days couldn't cover."
    weight: 0.35
    description: "RapidOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would produce functional seasonal employees in 2 days — they'd handle basic customer interactions confidently; they'd operate the POS without constant help; they'd know enough about products to guide customers; they'd represent the brand appropriately; customer experience scores wouldn't drop during holiday season; the program would scale across 150 stores consistently."
    weight: 0.30
    description: "SeasonalReadinessOutcome"
