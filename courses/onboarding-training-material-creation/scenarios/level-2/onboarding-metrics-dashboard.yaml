meta:
  id: onboarding-metrics-dashboard
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design an onboarding effectiveness measurement framework with KPIs, surveys, and a metrics dashboard for continuous improvement"
  tags: [onboarding-metrics, kpis, measurement, dashboard, intermediate]

state: {}

trigger: |
  You're the VP of People at a 400-person tech
  company. The CEO asks: "Is our onboarding
  working?" and you can't answer with data. You
  know it "feels" better than last year, but you
  have no metrics. The CEO wants a measurement
  framework that proves onboarding ROI and
  identifies improvement areas.

  Current onboarding program:
  - Pre-boarding: Email sequence + equipment setup
  - Week 1: In-person orientation + IT setup
  - Weeks 2-4: Manager-led role training
  - Month 2-3: Buddy program + gradual independence
  - Current annual turnover: 22% (industry avg 18%)
  - New hire turnover (first year): 35%

  Design the complete measurement framework:

  1. KPI Framework (categorized):

  Speed metrics:
  - Time to productivity (how to measure)
  - Time to first solo project completion
  - Onboarding completion rate and timeline

  Quality metrics:
  - New hire satisfaction (survey at Day 7, 30, 90)
  - Manager satisfaction with new hire readiness
  - Training assessment scores

  Retention metrics:
  - 90-day retention rate
  - 1-year retention rate
  - New hire voluntary turnover reasons

  Business impact metrics:
  - New hire performance ratings at first review
  - Revenue per new hire (for revenue roles)
  - Cost of onboarding per employee

  2. Survey Instruments
  - Day 7 survey: First impressions (10 questions)
  - Day 30 survey: Integration and training
    (15 questions)
  - Day 90 survey: Readiness and belonging
    (15 questions)
  - Manager survey: New hire readiness assessment
    (10 questions)
  - Buddy survey: Program effectiveness (8 questions)

  3. Dashboard Design
  - Executive dashboard: Key metrics for CEO
    (5 tiles)
  - HR operations dashboard: Detailed metrics for
    People team (12 tiles)
  - Manager dashboard: Individual new hire progress
    (8 tiles)
  - Describe each tile: metric, visualization type,
    data source, refresh frequency

  4. Analysis and Action
  - How to identify onboarding bottlenecks from
    data
  - Benchmark comparisons (internal and industry)
  - Quarterly review process
  - Improvement prioritization framework
  - Annual onboarding program ROI calculation

  Task: Write the complete onboarding measurement
  framework with all instruments and dashboard
  designs.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete measurement framework — KPIs across speed, quality, retention, and business impact categories; 5 survey instruments (Day 7, Day 30, Day 90, manager, buddy) with specific questions; 3 dashboard designs with tile descriptions, visualization types, and data sources; bottleneck identification methodology; benchmarking approach; quarterly review process; ROI calculation methodology."
    weight: 0.35
    description: "MetricsFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding analytics expertise — KPIs are measurable and actionable; surveys ask questions that drive improvement; dashboard designs serve different audience needs; the bottleneck identification methodology reveals root causes; benchmarks are realistic; the ROI calculation connects onboarding to business outcomes; the framework would work with data actually available to a 400-person company."
    weight: 0.35
    description: "OnboardingAnalyticsExpertise"
  - type: llm_judge
    criteria: "Response would enable data-driven onboarding improvement — the CEO would get a clear answer to 'Is our onboarding working?'; the People team would identify specific improvement areas; new hire turnover would decrease from 35% as problems are surfaced and addressed; the framework would demonstrate ROI; the company would shift from 'feels better' to 'measurably better.'"
    weight: 0.30
    description: "DataDrivenImprovementOutcome"
