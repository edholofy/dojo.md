meta:
  id: internship-onboarding-program
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a 12-week summer internship onboarding and development program including project assignments, mentorship, and conversion to full-time"
  tags: [internship, summer-program, mentorship, development, intermediate]

state: {}

trigger: |
  You're the university recruiting manager at a
  mid-size consulting firm (400 employees). You're
  launching the company's first formal summer
  internship program: 15 interns across 3
  departments (strategy consulting, data analytics,
  and marketing). The goal is to convert 60%+ of
  interns to full-time hires. Past "intern
  experiences" were informal — interns did busy
  work and learned nothing.

  Program parameters:
  - Duration: 12 weeks (June-August)
  - Interns: 15 (5 per department), rising juniors
    and seniors from target universities
  - Compensation: Paid ($30/hour)
  - Work model: Hybrid (3 days in office, 2 remote)
  - Budget: $50K for program activities

  Design the complete internship program:

  1. Pre-Arrival (May):
     - Welcome package and pre-reading materials
     - Mentor assignment and introduction
     - Technology setup and access provisioning
     - Housing and logistics support guide

  2. Week 1 — Orientation:
     - Company and industry overview
     - Department rotations (half-day in each of
       3 departments)
     - Professional development foundations
       (business communication, consulting 101)
     - Cohort bonding activities
     - Project assignment reveal

  3. Weeks 2-10 — Project Work + Development:
     - Real client project involvement (not busy
       work) — each intern on a team with a project
       lead
     - Weekly professional development workshops
       (8 topics: presentations, data analysis,
       client management, networking, time management,
       feedback skills, personal branding, career
       planning)
     - Bi-weekly mentor meetings
     - Monthly executive lunch-and-learn
     - Mid-program feedback and course correction
       (Week 6)

  4. Weeks 11-12 — Showcase + Evaluation:
     - Final project presentations to leadership
     - Individual performance reviews
     - Conversion decisions and full-time offers
     - Exit survey and alumni network enrollment
     - Closing celebration

  Provide:
  - Complete 12-week calendar with weekly focus
  - Orientation week facilitator guide (Day 1-5)
  - Mentor program guide (expectations, meeting
    templates, conversation prompts)
  - 8 professional development workshop outlines
  - Project assignment template (scope, deliverables,
    evaluation criteria)
  - Mid-program feedback form
  - Final presentation evaluation rubric
  - Conversion decision criteria framework
  - Intern handbook (policies, expectations,
    resources)

  Task: Write the complete internship onboarding
  and development program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete internship program — 12-week calendar; orientation week facilitator guide; mentor program guide with templates; 8 professional development workshop outlines; project assignment template; mid-program feedback form; final presentation rubric; conversion decision criteria; intern handbook."
    weight: 0.35
    description: "InternshipProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates internship program expertise — projects are real client work, not busy work; professional development workshops build genuine skills; mentor program has structure but isn't rigid; the mid-program course correction prevents problems from festering; the evaluation criteria for conversion are fair and transparent; the program balances learning with contribution; the $50K budget is allocated effectively."
    weight: 0.35
    description: "InternshipDesignExpertise"
  - type: llm_judge
    criteria: "Response would achieve 60%+ conversion — interns would have meaningful experiences worth accepting full-time offers for; they'd build real skills and relationships; the final presentations would demonstrate genuine contribution; the company would see interns as talent pipeline, not cheap labor; the program would attract top talent from target universities in subsequent years."
    weight: 0.30
    description: "InternConversionOutcome"
