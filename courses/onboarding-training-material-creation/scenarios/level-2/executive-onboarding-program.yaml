meta:
  id: executive-onboarding-program
  level: 2
  course: onboarding-training-material-creation
  type: output
  description: "Design a VP-level executive onboarding program covering stakeholder mapping, organizational navigation, strategic context, and first-100-day plan"
  tags: [executive-onboarding, vp-level, stakeholder-mapping, strategic-context, intermediate]

state: {}

trigger: |
  You're the CHRO at a $200M B2B SaaS company
  (600 employees). You just hired a VP of Customer
  Success — a critical role because churn has
  increased 40% YoY. The last VP of CS lasted
  8 months before leaving, citing "lack of support"
  and "unclear expectations." You cannot afford
  another executive failure.

  VP of CS details:
  - Reports to: CEO
  - Direct reports: 4 directors (onboarding, support,
    account management, renewals)
  - Team size: 45 people total
  - Budget: $6M annually
  - Prior experience: VP at a competitor, 15 years
    in CS

  The role's complexity:
  - Must quickly understand the product (complex
    enterprise platform)
  - Must navigate relationships with Sales (who
    overpromise), Product (who under-deliver on
    feature requests), and Finance (who want lower
    cost-to-serve)
  - Must rebuild a demoralized team that's been
    without a VP for 4 months
  - Must address churn immediately while building
    long-term strategy
  - Board expects a CS strategy presentation at the
    next board meeting (Day 60)

  Design the 100-day executive onboarding program:

  Pre-start (2 weeks):
  - CEO briefing document (strategic context, key
    challenges, expectations)
  - Stakeholder map with relationship notes
  - Team profiles and org chart with notes on
    each director
  - Key metrics dashboard access
  - Reading list (industry reports, competitor
    analysis, customer feedback themes)

  Days 1-30 — "Listen and Learn":
  - Week 1: Structured 1:1s with all 4 directors,
    CEO, and key cross-functional leaders (Sales VP,
    Product VP, CFO, CTO)
  - Week 2-3: Customer listening tour (5 key
    accounts, 5 at-risk accounts)
  - Week 3-4: Team listening sessions (skip-levels
    with all 45 CS team members)
  - Deliverable: Diagnostic assessment and initial
    hypotheses

  Days 31-60 — "Assess and Plan":
  - Refine organizational structure assessment
  - Develop CS strategy framework
  - Identify 3 "quick wins" to build credibility
  - Build key relationships across the C-suite
  - Deliverable: Board presentation draft

  Days 61-100 — "Act and Communicate":
  - Execute quick wins
  - Roll out strategic initiatives
  - Present to the board
  - Establish operating cadence for the CS org
  - Deliverable: Q3/Q4 operational plan

  Provide:
  - CEO briefing document template
  - Stakeholder map template with relationship
    guide
  - 1:1 conversation guides for each stakeholder
    type (direct reports, peers, CEO, customers)
  - Listening tour interview guide
  - Diagnostic assessment template
  - Board presentation outline
  - First-100-day milestone tracker
  - Executive coaching touchpoints (CHRO support
    schedule)

  Task: Write the complete executive onboarding
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 100-day executive program — pre-start materials with CEO briefing and stakeholder map; Days 1-30 with structured 1:1s, customer listening tour, and team listening sessions; Days 31-60 with strategy development and quick wins; Days 61-100 with execution and board presentation; CEO briefing template; stakeholder map; 1:1 conversation guides; listening tour guide; diagnostic template; board presentation outline; milestone tracker; CHRO coaching schedule."
    weight: 0.35
    description: "ExecutiveOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates executive onboarding expertise — the listening-before-acting approach prevents premature decisions; stakeholder mapping surfaces political dynamics; 1:1 guides are tailored to each relationship type; the customer listening tour focuses on at-risk accounts strategically; the diagnostic assessment template is executive-level; the board presentation outline addresses investor concerns; the program prevents the 'lonely at the top' failure pattern."
    weight: 0.35
    description: "ExecutiveOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would prevent another VP failure — the new VP would understand organizational dynamics before acting; they'd build credibility through quick wins; they'd present a compelling strategy to the board by Day 60; cross-functional relationships would be established; the demoralized CS team would feel heard and re-energized; churn would begin declining by Month 3; the CHRO coaching would provide an executive sounding board."
    weight: 0.30
    description: "ExecutiveSuccessOutcome"
