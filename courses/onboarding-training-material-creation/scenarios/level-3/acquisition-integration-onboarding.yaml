meta:
  id: acquisition-integration-onboarding
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design an onboarding-as-integration program for 150 employees being absorbed from an acquired company, managing culture shock and retention"
  tags: [acquisition-integration, culture-shock, retention, re-onboarding, advanced]

state: {}

trigger: |
  You're the integration program manager at a
  $1B enterprise software company that just
  acquired a 150-person startup. The acquisition
  closes in 6 weeks and all 150 startup employees
  will become employees of the acquiring company.
  This is effectively "onboarding" 150 people who
  didn't choose to join your company. The last
  acquisition lost 40% of the acquired team within
  12 months.

  Context:
  - Acquired company: 150 people, 5-year-old AI/ML
    startup, casual culture, flat hierarchy, Macs,
    Slack-first, unlimited PTO
  - Acquiring company: 2,000 people, 15-year-old
    enterprise company, business casual, traditional
    hierarchy, PCs, email-first, structured PTO
  - Key concern: Retaining the AI/ML engineering
    team (30 people) — they're the acquisition's
    primary value
  - Emotional reality: Acquired employees feel
    loss of identity, fear of bureaucracy, resentment
    about being "swallowed"

  Design the complete integration onboarding:

  1. Pre-Close Communication (6 weeks before):
  - What to communicate before Day 1 (and what
    to wait on)
  - FAQ addressing the top 20 acquired employee
    concerns (compensation, title, reporting, tools,
    culture, autonomy, PTO, benefits)
  - Manager preparation guide (both acquiring and
    acquired managers)

  2. Day 1 Experience Design:
  - NOT a standard new hire orientation (they're
    not "new" — they have tenure and expertise)
  - Welcome from CEO that acknowledges the
    acquisition honestly
  - What changes immediately vs. what stays the
    same vs. what's TBD
  - Technology transition plan (phased, not
    cold-turkey)
  - Employment paperwork without infantilizing
    experienced professionals

  3. First 90 Days — "Integration Journey":
  - Week 1: Systems access, org chart, key contacts
  - Weeks 2-4: Cultural orientation (how things
    work here — meetings, decisions, communication)
  - Month 2: Cross-team integration projects
    (building relationships with acquiring company
    peers)
  - Month 3: Role clarification and career path
    discussion

  4. Retention-Focused Elements:
  - Stay bonuses and retention package communication
  - Career path mapping for acquired employees
  - "Culture bridge" program (acquired employees
    paired with acquiring company guides)
  - Feedback channel (anonymous, direct to
    integration team)
  - Executive sponsor program (each acquired
    director gets a C-suite sponsor)

  5. Special Handling:
  - AI/ML team retention plan (autonomy preservation,
    tool flexibility, reporting structure)
  - Acquired leadership transition (some will lead,
    some will be absorbed, some may exit)
  - Brand and identity preservation (the acquired
    company's name and culture elements worth keeping)

  Provide:
  - Pre-close communication plan with email templates
  - FAQ document (20 questions with honest answers)
  - Day 1 event design (not an orientation)
  - 90-day integration journey with weekly milestones
  - Cultural orientation workshop design (2 hours)
  - AI/ML team-specific retention plan
  - Integration health dashboard (metrics to track)
  - Escalation process for integration issues

  Task: Write the complete acquisition integration
  onboarding program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete integration program — pre-close communication plan with email templates; 20-question FAQ; Day 1 event design that respects acquired employees; 90-day integration journey; cultural orientation workshop; retention elements including stay bonuses, culture bridges, and executive sponsors; AI/ML team retention plan; integration health dashboard; escalation process."
    weight: 0.35
    description: "IntegrationOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates acquisition integration expertise — Day 1 design treats acquired employees as experienced professionals, not new hires; the FAQ addresses real concerns honestly; the cultural orientation acknowledges culture clash without dismissing the acquired culture; technology transition is phased; the AI/ML retention plan preserves the autonomy they value; acquired leadership transitions are handled sensitively; the program acknowledges the emotional reality of being acquired."
    weight: 0.35
    description: "AcquisitionIntegrationExpertise"
  - type: llm_judge
    criteria: "Response would prevent the 40% attrition of the last acquisition — acquired employees would feel respected, not processed; the AI/ML team would see reasons to stay; cultural integration would happen gradually; the acquiring company would preserve the innovation that made the acquisition valuable; the integration health dashboard would catch problems early; 12-month retention would exceed 80%."
    weight: 0.30
    description: "RetentionOutcome"
