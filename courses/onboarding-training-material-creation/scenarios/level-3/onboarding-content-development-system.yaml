meta:
  id: onboarding-content-development-system
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Build an onboarding content development and maintenance system — authoring standards, review workflows, version control, and SME collaboration for a rapidly changing product"
  tags: [content-development, authoring-standards, version-control, sme-collaboration, advanced]

state: {}

trigger: |
  You're the onboarding content manager at a
  fast-growing SaaS company (400 employees, product
  updates every 2 weeks). Your biggest problem:
  onboarding materials are always out of date.
  By the time you create a training module about
  a feature, the product team has already changed
  it. New hires are learning workflows that no
  longer exist. SMEs (subject matter experts)
  promise to review content but never do. Nobody
  knows which version of which document is current.

  Current content inventory:
  - 45 onboarding modules across 6 departments
  - 120+ pages of process documentation
  - 30 training videos (60% are outdated)
  - 15 quick reference guides
  - Content lives in: Google Drive (scattered),
    Notion (some), Confluence (some), Loom (videos),
    facilitator laptops (terrifying)

  Design the complete content development system:

  1. Content Architecture
  - Content taxonomy (how to organize and find
    onboarding content)
  - Module template standards (consistent structure
    for all modules)
  - Content types and when to use each (video,
    written, interactive, checklist)
  - Content reuse strategy (shared modules vs.
    role-specific)
  - Single source of truth: Where content lives
    and why

  2. Authoring and Review Process
  - Content creation workflow (request → draft →
    review → approve → publish)
  - SME collaboration model (how to get busy experts
    to contribute)
  - Style guide for onboarding content (tone, voice,
    formatting, accessibility)
  - Template library (slide deck, written module,
    video script, quiz, checklist)
  - Quality review checklist

  3. Version Control and Maintenance
  - Version numbering system
  - Content update triggers (what events require
    content updates)
  - Content owner matrix (who owns what, who
    reviews what)
  - Product release → content update workflow
    (integrated with product sprints)
  - Sunset process for obsolete content
  - Content freshness audit (quarterly review
    calendar)

  4. Technology and Tools
  - Content management platform recommendation
  - Authoring tools recommendation
  - Video update strategy (modular videos that
    can be partially re-recorded)
  - Analytics: Which content is used, which is
    skipped, which is confusing

  5. Governance
  - Content governance committee (who, what, when)
  - Escalation for outdated content
  - Annual content audit process
  - Budget and resource model for content
    maintenance

  Task: Write the complete onboarding content
  development and maintenance system.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete content system — content taxonomy and architecture; module template standards; content creation workflow with SME collaboration; style guide; template library; version numbering; update triggers integrated with product sprints; content owner matrix; sunset process; quarterly freshness audit; technology recommendations; analytics; governance committee; annual audit; budget model."
    weight: 0.35
    description: "ContentSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content management expertise — the SME collaboration model realistically addresses the 'experts don't have time' problem; the product sprint integration ensures content keeps pace with product changes; the version control prevents the 'which version is current' confusion; the modular video strategy avoids full re-recordings; content analytics identify what's working; the governance model sustains quality without creating bureaucracy."
    weight: 0.35
    description: "ContentManagementExpertise"
  - type: llm_judge
    criteria: "Response would solve the outdated content problem — new hires would learn current workflows, not obsolete ones; SMEs would contribute because the process respects their time; content would update within one sprint of product changes; the single source of truth would eliminate scattered documents; the quarterly audit would catch gaps; the company would scale content production as it grows."
    weight: 0.30
    description: "ContentFreshnessOutcome"
