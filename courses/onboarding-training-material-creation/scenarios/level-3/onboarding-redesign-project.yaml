meta:
  id: onboarding-redesign-project
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Lead a complete onboarding program redesign based on employee feedback data, exit interview themes, and industry benchmarks"
  tags: [onboarding-redesign, data-driven, employee-feedback, benchmarking, advanced]

state: {}

trigger: |
  You're the newly hired Director of Employee
  Experience at a 1,200-person financial services
  company. Your first project: redesign the
  onboarding program, which hasn't been updated
  in 5 years. The CEO called it "a disaster"
  after hearing from a recent hire that their
  first week consisted of "watching 12 hours of
  compliance videos in a windowless room."

  Data you've gathered:

  New hire survey data (n=180, last 12 months):
  - Overall onboarding satisfaction: 2.8/5.0
  - "I understood my role clearly": 2.4/5.0
  - "I felt welcomed": 3.5/5.0
  - "Training was relevant": 2.1/5.0
  - "My manager was involved": 2.3/5.0
  - "I had the tools I needed on Day 1": 1.9/5.0
  - Net Promoter Score for onboarding: -12

  Exit interview themes (first-year leavers, n=45):
  - "Thrown into the deep end after orientation"
  - "No connection between orientation and actual job"
  - "Manager was too busy to help"
  - "Took 3 weeks to get system access"
  - "Compliance videos were mind-numbing"
  - "No clarity on career progression"

  Industry benchmarks:
  - Best-in-class onboarding NPS: +35
  - Average time to productivity (financial
    services): 4.5 months
  - Current company time to productivity: 7+ months
  - Best-in-class 1-year retention: 88%
  - Current 1-year retention: 72%

  Design the complete onboarding redesign:

  1. Current State Assessment Report
  - Analysis of survey data with key findings
  - Exit interview theme analysis
  - Gap analysis vs. industry benchmarks
  - Root cause identification for each problem
  - Stakeholder impact assessment

  2. Future State Design
  - Redesigned onboarding journey (pre-boarding
    through 90 days)
  - New program architecture (what replaces the
    "12 hours of compliance videos")
  - Manager accountability framework
  - Technology improvement plan (Day 1 readiness)
  - Role-specific training paths for 5 job families
  - New measurement framework

  3. Implementation Plan
  - Phased rollout (what to fix immediately vs.
    what needs more time)
  - Budget request with ROI justification
  - Change management for managers (who are
    currently uninvolved)
  - Content development plan and timeline
  - Technology requirements (LMS, HRIS integration,
    automated workflows)
  - Pilot plan (which department first, why)

  4. Executive Presentation
  - 10-slide executive summary for the CEO and
    CHRO
  - Business case with financial impact of improved
    onboarding
  - Before/after comparison (current vs. proposed)
  - Success metrics and timeline

  Task: Write the complete onboarding redesign
  project document with assessment, design,
  implementation plan, and executive presentation.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete redesign document — current state assessment with data analysis, gap analysis, and root causes; future state design with new journey, architecture, manager framework, technology plan, role-specific paths, and measurement; implementation plan with phases, budget, change management, content plan, technology, and pilot; 10-slide executive summary with business case and success metrics."
    weight: 0.35
    description: "RedesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding redesign expertise — the data analysis reveals actionable insights; root causes address systemic issues, not symptoms; the future state design directly addresses each survey and exit interview pain point; the manager accountability framework changes behavior; the compliance training replacement is genuinely engaging; the phased rollout is realistic; the business case calculates ROI convincingly."
    weight: 0.35
    description: "RedesignExpertise"
  - type: llm_judge
    criteria: "Response would transform the onboarding experience — NPS would improve from -12 toward +35; time to productivity would decrease from 7+ to 4.5 months; 1-year retention would improve from 72% toward 88%; the CEO would approve the redesign based on the business case; managers would become actively involved; new hires would describe onboarding as valuable, not painful."
    weight: 0.30
    description: "RedesignOutcome"
