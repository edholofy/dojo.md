meta:
  id: regulated-industry-onboarding
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design an onboarding program for a pharmaceutical company that meets FDA 21 CFR Part 11 compliance, GMP training requirements, and audit readiness"
  tags: [regulated-industry, pharmaceutical, fda-compliance, gmp-training, advanced]

state: {}

trigger: |
  You're the training compliance manager at a
  pharmaceutical manufacturer (800 employees,
  3 manufacturing sites). The FDA just issued a
  483 observation citing inadequate training
  documentation and gaps in employee qualification
  records. The VP of Quality has given you 90 days
  to redesign the onboarding program to be fully
  compliant and audit-ready.

  Regulatory requirements:
  - 21 CFR Part 11: Electronic records and
    signatures (training records must be validated)
  - 21 CFR Part 211: Current Good Manufacturing
    Practice (cGMP) for pharmaceuticals
  - ICH Q10: Pharmaceutical Quality System
  - Training must be documented, assessed, and
    traceable for every employee
  - Annual requalification required

  Employee types requiring onboarding:
  - Manufacturing operators (clean room, aseptic
    processing, equipment operation)
  - Quality assurance/control staff (documentation
    review, deviation investigation, CAPA)
  - Laboratory technicians (analytical methods,
    instrument qualification, data integrity)
  - Warehouse/logistics (GDP, cold chain management,
    material handling)
  - Office/administrative (GMP awareness, document
    control)

  Design the complete regulated onboarding program:

  1. Training Management System
  - Qualification matrix (roles × required trainings)
  - Training curriculum by role (required modules,
    sequence, assessment requirements)
  - Training documentation standards (21 CFR Part
    11 compliant records)
  - Training effectiveness measurement
  - Annual requalification schedule

  2. Core GMP Training Program
  - GMP Fundamentals (all employees)
  - Data Integrity (all employees)
  - Documentation Practices (all employees)
  - Clean Room Behavior (manufacturing)
  - Aseptic Technique (applicable roles)
  - Deviation and CAPA Management (QA/QC)

  3. Job-Specific Qualification Process
  - Standard Operating Procedure (SOP) read-and-
    understand process
  - On-the-job training with trainer sign-off
  - Practical competency assessment
  - Qualification criteria and documentation
  - Trainer qualification requirements

  4. Audit Readiness
  - Training file structure (what auditors look for)
  - Self-inspection checklist for training
    compliance
  - Common 483 observations related to training
    (and how to prevent each)
  - Mock audit protocol

  5. Corrective Action Plan
  - Addressing the specific 483 observation
  - Gap analysis of current training records
  - Remediation plan for existing employees
  - Timeline for full compliance

  Task: Write the complete regulated industry
  onboarding program with compliance documentation.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete regulated program — qualification matrix; role-based curricula with sequence and assessments; Part 11 compliant documentation standards; training effectiveness measurement; core GMP modules (fundamentals, data integrity, documentation, clean room, aseptic, deviation/CAPA); SOP read-and-understand process; practical competency assessments; trainer qualifications; audit-ready file structure; self-inspection checklist; 483 corrective action plan."
    weight: 0.35
    description: "RegulatedOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates pharmaceutical training compliance expertise — the qualification matrix reflects real pharmaceutical role requirements; Part 11 compliance for training records is specifically addressed; GMP training content is technically accurate; competency assessments go beyond reading to practical demonstration; the 483 corrective action plan addresses root causes; the audit readiness section reflects what FDA investigators actually look for."
    weight: 0.35
    description: "RegulatoryComplianceExpertise"
  - type: llm_judge
    criteria: "Response would resolve the FDA 483 and prevent future observations — training records would be complete, compliant, and audit-ready; every employee would be qualified for their role with documented evidence; the training management system would sustain compliance; the self-inspection would catch gaps before auditors find them; the VP of Quality would have confidence in the program within 90 days."
    weight: 0.30
    description: "ComplianceResolutionOutcome"
