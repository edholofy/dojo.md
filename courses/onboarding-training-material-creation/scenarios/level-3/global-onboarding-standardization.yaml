meta:
  id: global-onboarding-standardization
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design a global onboarding framework that standardizes the experience across 12 countries while respecting local labor laws, cultures, and languages"
  tags: [global-onboarding, multi-country, localization, standardization, advanced]

state: {}

trigger: |
  You're the Global Head of Talent Experience at
  a 3,000-person enterprise software company with
  offices in 12 countries (US, UK, Germany, France,
  India, Japan, Singapore, Australia, Brazil,
  Mexico, Canada, Israel). Each country currently
  runs its own onboarding — quality ranges from
  excellent (Germany, Japan) to nonexistent
  (Brazil, India). The CHRO wants a global framework
  that ensures every new hire worldwide has a
  consistent, high-quality experience while
  respecting local requirements.

  Challenges:
  - Labor laws differ dramatically (probationary
    periods: 0 in US, 6 months in Germany, 3 months
    in Japan)
  - Cultural expectations vary (formal in Japan,
    casual in Israel, hierarchical in India)
  - Languages: English is corporate language but
    local materials needed in 8+ languages
  - Time zones span 20 hours
  - Benefits, holidays, and employment terms are
    all different
  - Some offices have HR (US, UK, Germany), others
    rely on PEOs or EORs
  - Budget varies by region

  Design the complete global onboarding framework:

  1. Global-Local Architecture
  - "Global core" vs. "local flex" model — what's
    standardized globally vs. adapted locally
  - Global core modules (company, product, values,
    security, compliance)
  - Local flex areas (benefits, employment terms,
    office logistics, cultural norms, holidays)
  - Governance model: Global program owner + local
    onboarding leads

  2. Country Adaptation Playbook
  - Template for adapting the global program per
    country
  - Compliance checklist by country (key legal
    requirements for each of the 12 countries)
  - Cultural adaptation guidelines (communication
    style, formality, group vs. individual
    orientation, hierarchy sensitivity)
  - Write complete adaptations for 3 countries
    (US, Japan, Germany) showing how the same
    program manifests differently

  3. Technology and Delivery
  - Multi-language LMS configuration
  - Content localization workflow (translation,
    cultural review, approval)
  - Blended delivery model (what's self-paced vs.
    live, and why)
  - How to deliver live sessions across 20 hours
    of time zones

  4. Quality Assurance
  - Global onboarding scorecard
  - New hire experience survey (translated, culturally
    adapted)
  - Quarterly review cadence with local leads
  - Escalation process for onboarding failures

  5. Rollout Plan
  - 12-month rollout strategy (which countries
    first, why)
  - Change management for countries with existing
    strong programs (Germany, Japan)
  - Quick-start guide for countries with no program
    (Brazil, India)
  - Budget model by region

  Task: Write the complete global onboarding
  framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete global framework — global-local architecture with core vs. flex model; country adaptation playbook with compliance checklists for 12 countries; complete adaptations for US, Japan, and Germany; multi-language LMS configuration; content localization workflow; blended delivery model; time zone strategy; global scorecard; culturally adapted survey; quarterly review cadence; 12-month rollout plan with change management."
    weight: 0.35
    description: "GlobalFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global HR expertise — the global-local model balances consistency with local relevance; labor law requirements are specific and accurate; cultural adaptations reflect genuine differences (Japan's formality, Israel's directness, India's hierarchy); the 3 country adaptations show meaningful differences, not just translations; the rollout respects existing strong programs; the governance model empowers local leads while maintaining standards."
    weight: 0.35
    description: "GlobalHRExpertise"
  - type: llm_judge
    criteria: "Response would create a consistent global experience — new hires in Tokyo and São Paulo would receive equally high-quality onboarding; local legal requirements would be met everywhere; cultural expectations would be respected; the 12-month rollout would succeed without resistance from strong-program countries; the scorecard would reveal gaps; the framework would scale as the company enters new countries."
    weight: 0.30
    description: "GlobalConsistencyOutcome"
