meta:
  id: onboarding-for-neurodivergent
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design an inclusive onboarding program that accommodates neurodivergent employees — ADHD, autism, dyslexia — with universal design and reasonable accommodations"
  tags: [neurodivergent, inclusive-design, accommodations, universal-design, advanced]

state: {}

trigger: |
  You're the Head of DEI at a 600-person technology
  company. Your neurodiversity employee resource
  group (ERG) has presented data showing that
  neurodivergent employees (ADHD, autism spectrum,
  dyslexia, and others) have 3x higher turnover
  in their first year compared to neurotypical
  employees. Exit interviews reveal: "Orientation
  was overwhelming," "Too much information at
  once," "Social activities were exhausting,"
  "Written materials were inaccessible," and
  "Nobody asked how I learn best."

  The CEO wants the onboarding program redesigned
  with universal design principles so it works for
  everyone — not a separate "neurodivergent track"
  but an inclusive program that accommodates
  different learning styles, sensory needs, and
  communication preferences.

  Current onboarding pain points for ND employees:
  - Day-long orientation sessions (attention/energy)
  - Open-plan office tours with loud environments
  - Forced group icebreakers (social anxiety)
  - Dense written handbooks (reading challenges)
  - Verbal-only instructions (processing speed)
  - Ambiguous expectations ("figure it out")
  - No advance information about what to expect
  - Overwhelming number of new people to meet

  Design the inclusive onboarding program:

  1. Universal Design Principles for Onboarding
  - Multiple means of representation (how info is
    presented)
  - Multiple means of engagement (how people
    participate)
  - Multiple means of action/expression (how people
    demonstrate learning)

  2. Pre-Boarding Accommodations
  - "How I Work Best" questionnaire (voluntary,
    no diagnosis required)
  - Detailed Day 1 preview with photos and schedule
  - Option to visit the office before start date
  - Manager briefing on accommodation requests

  3. Redesigned Orientation
  - Shorter sessions (max 45 min) with genuine
    breaks
  - Materials in multiple formats (written, video,
    audio, visual/infographic)
  - Opt-in social activities (not forced)
  - Quiet room available during breaks
  - Clear, explicit expectations (nothing implicit)
  - Agenda provided in advance with timing

  4. Ongoing Onboarding Accommodations
  - Flexible training pace (self-directed modules)
  - Written follow-up for all verbal instructions
  - Buddy matching that considers communication
    preferences
  - Regular check-ins with explicit questions
    (not "How's it going?" but "Do you have what
    you need to complete X?")
  - Workspace accommodation process

  5. Manager Training
  - Neurodiversity awareness training for all
    managers
  - How to have accommodation conversations
    without diagnosis disclosure
  - Adjusting management style for different
    communication needs
  - Recognizing signs of overwhelm vs. disengagement

  Provide:
  - "How I Work Best" questionnaire
  - Redesigned orientation schedule with UDL
    principles applied
  - Materials in 3 formats for one core module
    (written, visual, video script)
  - Manager accommodation conversation guide
  - Workspace accommodation menu (common
    accommodations with request process)
  - Inclusive team introduction protocol
  - Feedback mechanism design for ND employees

  Task: Write the complete inclusive onboarding
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete inclusive program — UDL principles applied; 'How I Work Best' questionnaire; Day 1 preview materials; redesigned orientation with shorter sessions and opt-in activities; materials in 3 formats for one module; flexible training pace; written follow-up for verbal instructions; manager neurodiversity training; accommodation conversation guide; workspace accommodation menu; inclusive introduction protocol; ND-specific feedback mechanism."
    weight: 0.35
    description: "InclusiveOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates neurodiversity expertise — accommodations are presented as universal design (not special treatment); the questionnaire doesn't require diagnosis disclosure; the orientation redesign benefits ALL employees, not just ND; manager training addresses real accommodation conversations; the quiet room and opt-in activities are normalized; explicit expectations replace ambiguity; the program reduces overwhelm without being patronizing."
    weight: 0.35
    description: "NeurodiversityExpertise"
  - type: llm_judge
    criteria: "Response would reduce ND first-year turnover — neurodivergent employees would feel accommodated from Day 1; the universal design would improve onboarding for everyone; managers would have tools for accommodation conversations; the 3x turnover gap would narrow; ND employees would rate onboarding satisfaction comparable to neurotypical peers; the company would become known for inclusive onboarding."
    weight: 0.30
    description: "InclusionOutcome"
