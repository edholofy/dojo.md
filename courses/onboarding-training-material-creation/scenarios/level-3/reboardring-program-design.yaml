meta:
  id: reboarding-program-design
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design a reboarding program for employees returning from extended leave (parental, medical, sabbatical) and for role transitions within the company"
  tags: [reboarding, return-from-leave, internal-mobility, role-transition, advanced]

state: {}

trigger: |
  You're the Employee Experience Director at a
  700-person tech company. Three distinct "reboarding"
  needs have been identified, each requiring its
  own program design.

  Context: The company has grown rapidly — when
  employees return from leave or change roles, they
  often find a company that's changed significantly.
  New tools, new processes, new people, new strategy.
  They feel like "new hires who know where the
  bathroom is."

  Design three reboarding programs:

  === PROGRAM A: Return from Parental Leave ===
  - 15-20 employees annually take 4-6 months of
    parental leave
  - Common experience: "I came back and everything
    changed — new manager, new tools, my project
    was reassigned, and everyone assumed I'd just
    pick up where I left off"
  - Legal considerations: Cannot penalize for leave,
    must offer equivalent position, lactation
    accommodations

  Program must include:
  - Pre-return communication plan (starting 4 weeks
    before return)
  - Manager preparation guide (what to have ready)
  - First-day-back experience (not orientation,
    but re-orientation)
  - 30-day ramp plan (gradual return to full
    capacity)
  - "What changed while you were away" briefing
    template
  - Lactation room and schedule accommodation
    process
  - Flexible work arrangement discussion guide
  - Peer re-connection activities
  - Check-in cadence (weekly for first month)
  - Return-to-leave survey (what worked, what
    didn't)

  === PROGRAM B: Return from Medical Leave ===
  - 10-15 employees annually return from medical
    leave (2-12 weeks, sometimes longer)
  - Conditions: Injury recovery, surgery, mental
    health leave, chronic illness management
  - Sensitivity: Cannot ask about diagnosis,
    must follow ADA interactive accommodation
    process, respect privacy
  - Often need modified duties or gradual return

  Program must include:
  - Return coordination process (employee, manager,
    HR, occupational health)
  - Modified duty plan template
  - Gradual return schedule options (50% → 75% →
    100%)
  - Workplace accommodation assessment
  - Manager sensitivity guide (what to say and
    NOT say)
  - Team communication template (what colleagues
    are told, respecting privacy)
  - Wellness check-in schedule (without being
    intrusive)
  - EAP and ongoing support resources
  - ADA interactive process summary

  === PROGRAM C: Internal Role Transition ===
  - 60-80 employees annually change roles internally
    (lateral moves, promotions, department transfers)
  - Current process: Nothing — employee shows up
    in new team and starts. No formal transition.
  - Result: Internal transfers take longer to
    become productive than external hires (because
    everyone assumes they "already know the company")

  Program must include:
  - Transition planning guide (before the move:
    knowledge transfer from old role, warm handoff)
  - New role onboarding plan (adapted from new
    hire onboarding — what to skip, what to keep)
  - "Quick start" guide for the new department
    (team, tools, processes, norms)
  - Stakeholder introduction plan (new peers,
    cross-functional partners)
  - Previous manager → new manager handoff template
  - 30-60-90 day plan adapted for internal transfers
  - How to manage "I used to do it this way"
    syndrome
  - Career development conversation (why this move,
    where it leads)

  Task: Write all three complete reboarding
  programs.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete reboarding programs — Parental Leave with pre-return communication, manager prep, 30-day ramp, 'what changed' briefing, lactation accommodations, and flexible work guide; Medical Leave with return coordination, modified duty plans, gradual return schedules, manager sensitivity guide, privacy-respecting team communication, and ADA process; Internal Transition with knowledge transfer, adapted onboarding, quick start guide, manager handoff, and adapted 30-60-90 plan."
    weight: 0.35
    description: "ReboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates reboarding expertise — parental leave return addresses the real 'everything changed' experience; medical leave respects privacy and follows ADA requirements; manager sensitivity guides include specific do's and don'ts; the internal transfer program fills the gap that external hires get but transfers don't; gradual return plans are practical; each program recognizes that returning employees are not new hires but have unique re-integration needs."
    weight: 0.35
    description: "ReboardingExpertise"
  - type: llm_judge
    criteria: "Response would improve the return experience — parents would return feeling supported, not overwhelmed; medical leave returners would have privacy respected with appropriate accommodations; internal transfers would ramp faster than the current 'figure it out' approach; managers would know exactly how to support each type of return; employee retention after these transitions would improve; the programs would demonstrate the company cares about employee wellbeing."
    weight: 0.30
    description: "ReturnExperienceOutcome"
