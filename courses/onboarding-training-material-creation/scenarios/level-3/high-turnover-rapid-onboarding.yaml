meta:
  id: high-turnover-rapid-onboarding
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design an onboarding system for a high-turnover environment (call center, 200% annual turnover) that balances speed with quality and reduces early attrition"
  tags: [high-turnover, call-center, rapid-onboarding, attrition-reduction, advanced]

state: {}

trigger: |
  You're the training director at a 1,500-person
  customer service outsourcing company (3 call
  centers). Annual turnover is 200% — you hire
  ~3,000 people per year to maintain 1,500 FTEs.
  Most attrition happens in the first 90 days
  (60% of leavers quit within 3 months). Current
  onboarding is 2 weeks of classroom training
  followed by "nesting" (supervised calls for 1
  week). The COO wants you to redesign onboarding
  to cut 90-day attrition from 40% to 20% while
  maintaining quality metrics.

  Current metrics:
  - 90-day attrition: 40%
  - Time to proficiency: 6 weeks
  - Training class NPS: -5 (boring, overwhelming)
  - First-month QA scores: 65% (target: 80%)
  - Training cost per new hire: $4,200
  - Exit interview themes: "It was nothing like
    they described in the interview," "Training
    was boring and irrelevant," "I wasn't prepared
    for angry callers," "No support after nesting"

  Call center details:
  - 5 client programs (telecom, insurance, retail,
    utilities, healthcare)
  - Agents handle inbound calls (billing, tech
    support, claims)
  - Systems: Five9 (phones), Salesforce Service
    Cloud (CRM), Confluence (knowledge base)
  - Agents: Avg age 24, many first jobs, diverse
    education levels
  - Shifts: 6 AM - 10 PM, 7 days/week

  Design the complete onboarding system:

  1. Realistic Job Preview (Pre-hire)
  - "Day in the life" video showing real calls
  - Realistic job preview assessment
  - Expectation-setting conversation guide for
    recruiters

  2. Redesigned Training (3 weeks, blended)
  Week 1: Foundation
  - Company and client program orientation (Day 1)
  - Systems training with hands-on simulation
    (Days 2-3)
  - Communication skills and de-escalation (Days
    4-5)
  - Daily practice calls (simulated)

  Week 2: Client-Specific
  - Client program deep dive (product, processes,
    common scenarios)
  - Progressive complexity: simple calls → moderate
    → complex
  - Role-play with feedback (daily)
  - Emotional resilience workshop

  Week 3: Nesting
  - Supervised live calls (increasing independence)
  - Real-time coaching from floor support
  - Daily debrief and targeted coaching
  - Graduation criteria: 5 consecutive calls at
    QA standard

  3. Post-Nesting Support (Months 1-3)
  - Weekly 1:1 coaching sessions
  - Peer support groups (cohort-based)
  - "Lifeline" system (help button for tough calls)
  - 30-day milestone celebration
  - Performance tracking with early intervention
    triggers

  4. Attrition Prevention System
  - Early warning indicators (attendance, QA
    scores, engagement survey)
  - Stay interview process at Day 30
  - Career path visibility (what's possible beyond
    agent role)
  - Quick win recognition program

  Provide:
  - 3-week training schedule with daily activities
  - Realistic job preview video script
  - De-escalation training module (60 min)
  - Nesting supervisor guide with coaching framework
  - Early warning dashboard design
  - Stay interview guide (Day 30)
  - ROI calculation: cost of improved retention
    vs. training investment

  Task: Write the complete high-turnover onboarding
  system.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete high-turnover system — realistic job preview with video script; 3-week training schedule with daily activities; de-escalation module; nesting supervisor guide; post-nesting support structure; early warning dashboard; stay interview guide; attrition prevention system with career path visibility; ROI calculation comparing retention improvement to training investment."
    weight: 0.35
    description: "HighTurnoverCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates call center onboarding expertise — the realistic job preview sets honest expectations; training progressively builds complexity; de-escalation training addresses the #1 exit interview complaint; nesting graduation criteria are clear and achievable; the early warning system catches at-risk agents before they quit; the stay interview at Day 30 is timed for maximum impact; the ROI calculation is financially compelling."
    weight: 0.35
    description: "CallCenterOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would cut 90-day attrition from 40% to 20% — realistic job preview would eliminate mismatched expectations; improved training would produce higher first-month QA scores; emotional resilience training would prepare agents for angry callers; post-nesting support would prevent the cliff; stay interviews would surface fixable issues; the $4,200 training cost would decrease as fewer people churn through the system."
    weight: 0.30
    description: "AttritionReductionOutcome"
