meta:
  id: advanced-onboarding-shift
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design three complex onboarding programs: a government security clearance onboarding, a multi-site construction crew rapid deployment, and a university faculty onboarding with tenure-track considerations"
  tags: [multi-context, security-clearance, construction, faculty, advanced]

state: {}

trigger: |
  You're a senior onboarding consultant. Three
  clients with complex, specialized needs need
  complete programs this month.

  === CLIENT 1: Government Contractor Security
  Clearance Onboarding ===
  A defense contractor (800 employees) needs an
  onboarding program for employees who require
  security clearances. The challenge: employees
  start work months before their clearance is
  granted, must be restricted from classified
  projects, and the limbo period causes frustration
  and attrition.
  - Clearance types: Secret (3-6 months to process)
    and Top Secret (6-18 months)
  - During clearance processing: Can do unclassified
    work only
  - Once cleared: Must complete additional
    classified onboarding

  Program must include:
  - Pre-clearance onboarding path (meaningful work
    during the waiting period)
  - Clearance process communication plan (setting
    expectations, reducing anxiety)
  - Security training for different clearance levels
  - Classified onboarding addendum (when clearance
    is granted)
  - OPSEC (operational security) training module
  - Insider threat awareness training
  - Handling classified materials training
  - Retention strategies during the clearance gap
  - Continuous evaluation awareness

  === CLIENT 2: Multi-Site Construction Crew
  Rapid Deployment ===
  A national construction company deploys crews
  to new project sites every 3-6 months. Each
  deployment is essentially a "new job" — new
  location, new team configuration, new site
  conditions. Workers need rapid site-specific
  onboarding within 1 day.
  - Crew size: 40-60 workers per site
  - Trades: Electricians, plumbers, ironworkers,
    operators, laborers, carpenters
  - Safety: OSHA 10/30 already completed, but
    site-specific hazard orientation required
  - Duration: 1 day before work begins

  Program must include:
  - Site-specific safety orientation template
    (adaptable to any site in 1 hour)
  - Site layout and emergency procedures
  - Environmental hazard assessment and controls
  - Equipment and tool check-out procedures
  - Daily huddle format and communication protocols
  - Quality standards for the specific project
  - Team configuration and reporting structure
  - Subcontractor coordination protocols
  - Site-specific onboarding checklist (signed,
    documented for OSHA)

  === CLIENT 3: University Faculty Onboarding ===
  A research university (2,000 faculty) has no
  faculty onboarding — new professors receive a
  parking pass and a course schedule. The provost
  wants a comprehensive onboarding program that
  addresses the unique challenges of academic
  careers.
  - Faculty types: Tenure-track assistant professors,
    clinical faculty, lecturers, adjuncts
  - Challenges: Teaching, research, service
    expectations unclear; tenure process opaque;
    departmental politics navigated by trial and
    error; work-life balance in academia
  - Timeline: Summer before first semester

  Program must include:
  - Pre-arrival academic setup (lab space, research
    accounts, course assignments, TA allocation)
  - Teaching support (pedagogy workshop, LMS
    training, syllabus development support)
  - Research support (grant writing resources,
    IRB process, research mentorship matching)
  - Tenure and promotion process explanation
    (clear timeline, criteria, dossier preparation)
  - Service expectations (committee assignments,
    advising loads)
  - Navigating academic culture (governance,
    departmental politics, collegial relationships)
  - Different tracks for different appointment types
  - Faculty mentoring program (senior to junior
    faculty)
  - Work-life balance resources (especially for
    faculty with families)
  - First-year check-in cadence

  Task: Write all three complete onboarding
  programs.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete programs — Security Clearance with pre-clearance path, clearance communication, OPSEC/insider threat/classified materials training, and retention strategies; Construction with site-specific safety template, hazard assessment, daily huddle format, and signed documentation; Faculty with teaching/research/service onboarding, tenure process explanation, mentoring program, and different appointment track paths."
    weight: 0.35
    description: "ThreeSpecializedCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across three distinct contexts — the security clearance program addresses the unique limbo period with meaningful unclassified work; the construction deployment is genuinely rapid (1 day) and OSHA-compliant; the faculty onboarding demystifies tenure and navigates academic culture; each program reflects deep understanding of its industry-specific challenges."
    weight: 0.35
    description: "SpecializedContextExpertise"
  - type: llm_judge
    criteria: "Response would solve each client's problem — defense contractor retention during clearance processing would improve; construction crews would be safe and productive on Day 1 of deployment; new faculty would understand tenure requirements and feel supported; each program handles its unique power dynamics and regulatory requirements; all three are implementable in their respective contexts."
    weight: 0.30
    description: "ThreeSpecializedOutcomes"
