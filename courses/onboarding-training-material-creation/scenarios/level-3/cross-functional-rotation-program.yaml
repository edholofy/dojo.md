meta:
  id: cross-functional-rotation-program
  level: 3
  course: onboarding-training-material-creation
  type: output
  description: "Design a 12-month rotational onboarding program for management trainees that builds cross-functional expertise through 4 department rotations"
  tags: [rotational-program, management-trainee, cross-functional, leadership-pipeline, advanced]

state: {}

trigger: |
  You're the talent development director at a
  $500M consumer goods company. The CEO wants to
  build a leadership pipeline by launching a
  Management Trainee Rotational Program — hiring
  10 high-potential MBA graduates annually for a
  12-month program with 4 rotations (3 months
  each) before permanent placement.

  Program design:
  - Duration: 12 months, 4 rotations of 3 months
  - Participants: 10 MBAs per cohort
  - Rotations: Supply Chain, Marketing, Finance,
    and Sales (each trainee does all 4)
  - Each rotation: Real project work with a
    department sponsor, not observation
  - Compensation: $120K base + $15K signing bonus
  - Success metric: 80%+ permanent placement rate
    with 3-year retention

  Design the complete rotational program:

  1. Program Architecture
  - Rotation sequence options (fixed vs. flexible,
    rationale)
  - Department placement criteria (matching
    trainee interests + company needs)
  - Project scope guidelines (what's appropriate
    for a 3-month engagement)
  - Transition protocols between rotations

  2. Rotation-Specific Onboarding (for each of
  the 4 departments):
  - Week 1 department orientation design
  - Project scoping meeting guide
  - Key stakeholder introduction plan
  - Department-specific training curriculum
  - Deliverables and evaluation criteria
  - End-of-rotation presentation format

  3. Cross-Cutting Development
  - Monthly leadership development workshops (12
    topics)
  - Executive mentorship program (each trainee
    paired with a VP)
  - Cohort learning activities (team projects,
    case competitions)
  - 360-degree feedback at rotation midpoints
  - Personal development plan

  4. Evaluation and Placement
  - Rotation evaluation rubric (performance +
    potential)
  - Final placement decision process (trainee
    preference + department need + company priority)
  - Mutual selection process (both trainee and
    department choose)
  - What happens if a trainee underperforms

  Provide:
  - 12-month program calendar with weekly focus
  - Rotation onboarding guide (template for each
    department)
  - Department sponsor guide and expectations
  - 12 monthly workshop outlines
  - Executive mentor matching criteria and guide
  - Rotation evaluation rubric
  - Placement decision framework
  - Program ROI model (cost of program vs. value
    of accelerated leaders)

  Task: Write the complete rotational onboarding
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete rotational program — 12-month calendar; rotation sequence rationale; department placement criteria; rotation onboarding template for each of 4 departments; department sponsor guide; 12 monthly workshop outlines; executive mentor program; 360-degree feedback; rotation evaluation rubric; placement decision framework; underperformance process; ROI model."
    weight: 0.35
    description: "RotationalProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates rotational program expertise — rotation projects are scoped for 3-month impact; transition protocols prevent knowledge loss between rotations; monthly workshops complement rotation learning; the mentor program pairs strategically; the evaluation rubric assesses both performance and leadership potential; the placement process balances trainee preference with company needs; the program builds genuine cross-functional leaders, not generalists."
    weight: 0.35
    description: "RotationalProgramExpertise"
  - type: llm_judge
    criteria: "Response would build a leadership pipeline — 80%+ of trainees would accept permanent placement; they'd bring cross-functional perspective that departmental hires lack; department sponsors would want to participate; the cohort model would create lasting peer networks; 3-year retention would exceed standard MBA hire retention; the program would become a differentiator in MBA recruiting."
    weight: 0.30
    description: "LeadershipPipelineOutcome"
