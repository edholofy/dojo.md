meta:
  id: onboarding-thought-leadership
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Deliver a keynote address and publish a manifesto redefining onboarding for the future of work — addressing AI, distributed teams, portfolio careers, and the end of traditional employment"
  tags: [thought-leadership, keynote, manifesto, future-of-work, master]

state: {}

trigger: |
  You're the world's foremost authority on employee
  onboarding. You've been invited to deliver the
  opening keynote at the SHRM Annual Conference
  (25,000 HR professionals) on the topic: "The End
  of Onboarding as We Know It: Reimagining How
  People Join Organizations in the Age of AI,
  Distributed Work, and Portfolio Careers."

  Your argument: Traditional onboarding was designed
  for a world where people joined one company, worked
  in one office, had one role, and stayed for years.
  That world is gone. The future requires "continuous
  onboarding" — a perpetual state of integration
  that adapts as work itself constantly changes.

  Create your complete thought leadership package:

  1. Keynote Address (45 minutes)
  Write the complete keynote script including:
  - Opening hook (a story that captures the absurdity
    of current onboarding)
  - The 5 forces destroying traditional onboarding:
    * AI replacing and creating roles continuously
    * Distributed/hybrid work eliminating the physical
      office as integration mechanism
    * Portfolio careers (people working for multiple
      organizations simultaneously)
    * Accelerating organizational change (constant
      restructuring, pivots, M&A)
    * Generational expectations (Gen Z demands
      purpose, flexibility, belonging from Day 1)
  - "Continuous Onboarding" — your new paradigm:
    * From event to process to ecosystem
    * From organization-centric to person-centric
    * From information transfer to relationship
      building
    * From compliance to culture co-creation
    * From manager-dependent to community-supported
  - The Continuous Onboarding Framework (your model):
    * Anticipate (pre-joining intelligence)
    * Welcome (belonging acceleration)
    * Equip (just-in-time capability building)
    * Connect (network weaving)
    * Evolve (continuous re-onboarding as context
      changes)
  - Three provocative predictions for onboarding
    in 2030
  - Call to action for the HR profession
  - Closing story that brings it full circle

  2. Manifesto: "The Continuous Onboarding Manifesto"
  Write a bold, shareable manifesto (publishable as
  a standalone document):
  - 10-12 principles of Continuous Onboarding
  - Each principle contrasts old thinking vs. new
    thinking
  - Written in declarative, inspiring language
  - Designed to go viral in HR communities
  - Includes a "pledge" that HR leaders can sign

  3. Harvard Business Review Article
  Write a 3,000-word HBR-style article that makes
  the business case for Continuous Onboarding:
  - Data-driven argument for why traditional
    onboarding fails
  - Three company case studies (realistic fictional)
    showing Continuous Onboarding in action
  - ROI analysis comparing traditional vs.
    continuous approaches
  - Implementation roadmap for CHROs
  - Sidebar: "5 Questions Every CEO Should Ask
    About Onboarding"

  4. TEDx Talk Outline
  Write a 15-minute TEDx talk outline on the single
  most provocative idea from your keynote:
  - "What If We Never Stopped Onboarding?"
  - The personal story that drives the idea
  - The surprising research finding
  - The reframe that changes everything
  - The practical implication
  - The memorable closing

  Task: Write the complete thought leadership
  package — keynote, manifesto, HBR article, and
  TEDx outline.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete thought leadership package — 45-minute keynote script with opening/closing stories, 5 forces, Continuous Onboarding paradigm, framework (Anticipate/Welcome/Equip/Connect/Evolve), and predictions; manifesto with 10-12 principles in old vs. new format with pledge; 3,000-word HBR article with data, 3 case studies, ROI, and CEO questions sidebar; TEDx talk outline with story, research, reframe, and memorable close."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visionary expertise — the 5 forces analysis captures real disruptions; Continuous Onboarding is a genuine paradigm shift, not just rebranding; the framework is both intellectually rigorous and practically applicable; the manifesto is bold enough to provoke discussion; the HBR article would pass editorial scrutiny; the keynote would hold 25,000 people's attention; the TEDx talk has a single powerful idea."
    weight: 0.35
    description: "VisionaryExpertise"
  - type: llm_judge
    criteria: "Response would reshape the onboarding field — HR professionals would leave the keynote rethinking their approach; the manifesto would be shared across LinkedIn and HR communities; the HBR article would be cited in board presentations; the Continuous Onboarding Framework would become the new standard; the thought leadership would elevate the entire profession's thinking about how people join and re-join organizations."
    weight: 0.30
    description: "FieldReshapingOutcome"
