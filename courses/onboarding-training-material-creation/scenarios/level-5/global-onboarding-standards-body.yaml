meta:
  id: global-onboarding-standards-body
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Establish the International Onboarding Standards Council — developing ISO-equivalent global standards for employee onboarding quality, certification, and organizational accreditation"
  tags: [global-standards, certification, accreditation, iso-equivalent, master]

state: {}

trigger: |
  You've been appointed the founding Executive
  Director of the International Onboarding Standards
  Council (IOSC), established by a consortium of
  SHRM, CIPD, WorldatWork, and the ILO. Your mission:
  develop global onboarding standards that organizations
  can be certified against, similar to how ISO 9001
  works for quality management.

  The problem: There are no global standards for what
  constitutes "good" onboarding. Companies spend $1B+
  annually on onboarding worldwide, with no way to
  benchmark quality, no certification for excellence,
  and no accountability for poor practices that cost
  the global economy $500B+ in preventable turnover.

  Design the complete standards body:

  1. IOSC Organizational Charter
  - Mission, vision, and values
  - Governance structure (board of directors, technical
    committees, regional chapters)
  - Founding member organizations and their roles
  - Funding model (membership dues, certification
    fees, research grants)
  - 5-year strategic plan with milestones
  - Stakeholder engagement strategy (employers,
    employees, governments, academia)

  2. Onboarding Quality Standard (OQS-1000)
  Design the standard framework:
  - OQS-1001: Onboarding Governance and Leadership
  - OQS-1002: Onboarding Program Design and Delivery
  - OQS-1003: New Hire Experience and Wellbeing
  - OQS-1004: Onboarding Measurement and Improvement
  - OQS-1005: Technology and Innovation in Onboarding
  - OQS-1006: Compliance and Legal Requirements
  - OQS-1007: Equity, Inclusion, and Accessibility

  For each standard section, define:
  - Scope and applicability
  - Normative requirements ("shall" statements)
  - Best practice recommendations ("should" statements)
  - Maturity levels (Bronze, Silver, Gold, Platinum)
  - Evidence requirements for certification
  - Adaptation guidance for different organization
    sizes and industries

  3. Certification and Accreditation System
  - Organizational certification process (how
    companies get certified)
  - Auditor qualification and training program
  - Certification levels and what each requires
  - Surveillance audit requirements (maintaining
    certification)
  - Appeals and complaints process
  - Reciprocity with other HR certifications
    (SHRM-CP, CIPD)

  4. Individual Professional Certification
  - Certified Onboarding Professional (COP)
    credential
  - Competency framework for onboarding professionals
  - Certification exam blueprint
  - Continuing education requirements
  - Code of professional ethics
  - Specialization tracks (technology, healthcare,
    global, executive)

  5. Research and Benchmarking Program
  - Global Onboarding Benchmarking Study design
    (annual survey of 10,000+ organizations)
  - Research agenda for the first 3 years
  - Partnership with academic institutions
  - Publication strategy (journal, white papers,
    annual report)
  - Data privacy and ethics framework for research

  6. Implementation Roadmap
  - Year 1: Standards development and pilot
  - Year 2: Certification launch and first audits
  - Year 3: Individual certification and global
    expansion
  - Year 4: Research program and benchmarking launch
  - Year 5: Full maturity and self-sustainability

  Task: Write the complete IOSC founding documents
  including the OQS-1000 standard framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — IOSC charter with governance, funding, and strategic plan; OQS-1000 standard framework with 7 sections each containing requirements, recommendations, maturity levels, and evidence; organizational certification with auditor training and surveillance; individual COP credential with competency framework and exam blueprint; research program with benchmarking study; 5-year implementation roadmap."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards and certification expertise — the OQS-1000 follows ISO-like structure with normative requirements; maturity levels provide a credible progression path; the certification process is rigorous but not prohibitive; the auditor training ensures consistency; the individual credential fills a real professional development gap; the research program would produce actionable benchmarking data; the funding model is sustainable."
    weight: 0.35
    description: "StandardsCertificationExpertise"
  - type: llm_judge
    criteria: "Response would establish a credible global institution — employers would seek OQS certification; HR professionals would pursue the COP credential; governments would reference the standards in employment policy; the annual benchmarking study would become the definitive source; the standards would improve onboarding quality globally; the IOSC would become as recognized in HR as ISO is in quality management."
    weight: 0.30
    description: "GlobalInstitutionOutcome"
