meta:
  id: onboarding-government-policy
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Draft national onboarding legislation and policy framework — employer requirements, employee rights, government incentives, and enforcement mechanisms to improve workforce integration outcomes"
  tags: [government-policy, legislation, workforce-integration, national-framework, master]

state: {}

trigger: |
  You're the lead policy advisor to a bipartisan
  congressional commission on "Workforce Integration
  and Retention." After 18 months of hearings,
  research, and testimony from employers, employees,
  and academics, the commission is drafting landmark
  legislation: the "Workforce Integration and
  Retention Act" (WIRA).

  The problem WIRA addresses: The US loses $1 trillion
  annually to preventable employee turnover. Research
  shows that 20% of turnover happens in the first 45
  days and 33% within the first year — the onboarding
  period. Yet no federal standards exist for employee
  onboarding. While OSHA regulates workplace safety
  training and the EEOC regulates discrimination
  training, no one regulates the broader onboarding
  experience that determines whether employees
  succeed or fail.

  Draft the complete policy framework:

  1. Commission Report: "The Onboarding Crisis"
  - Executive summary of findings
  - Scale of the problem (economic cost data)
  - Root causes of poor onboarding (underinvestment,
    no standards, no accountability)
  - Comparative analysis (how other countries handle
    workforce integration: Germany's apprenticeship
    onboarding, Japan's corporate socialization,
    Denmark's flexicurity system)
  - Testimony highlights (3 employer perspectives,
    3 employee stories, 3 academic expert findings)
  - Policy recommendations summary

  2. Legislative Framework: Workforce Integration
  and Retention Act (WIRA)
  - Title I: Employer Onboarding Requirements
    * Minimum onboarding standards for companies
      with 50+ employees
    * Required elements: role-specific training plan,
      designated onboarding contact, 30/60/90-day
      check-ins, written performance expectations
    * Timeline requirements (what must happen in
      first week, first month, first 90 days)
    * Record-keeping requirements
    * Anti-retaliation protections for employees
      who report inadequate onboarding

  - Title II: Employee Rights
    * Right to onboarding information before start
      date
    * Right to reasonable accommodation during
      onboarding
    * Right to training necessary for job performance
    * Right to regular feedback during probationary
      period
    * Whistleblower protections

  - Title III: Government Incentives
    * Tax credits for onboarding program investment
    * Small business onboarding grants program
    * Onboarding Innovation Fund (competitive grants
      for employer-led innovation)
    * Preferred contractor status for companies with
      certified onboarding programs
    * Public recognition program ("Best Onboarding
      Employers")

  - Title IV: Measurement and Reporting
    * Annual employer reporting on onboarding
      metrics (completion rates, new hire satisfaction,
      early turnover)
    * Aggregated national onboarding scorecard
    * BLS integration (onboarding data in employment
      statistics)
    * Research mandate for DOL

  - Title V: Enforcement and Administration
    * DOL Workforce Integration Division (new
      office)
    * Enforcement mechanisms (complaints, audits,
      penalties)
    * State-federal coordination
    * Implementation timeline (phased over 5 years)

  3. Regulatory Implementation Plan
  - Rulemaking process and timeline
  - Industry-specific guidance documents
  - Small business compliance toolkit
  - Employer self-assessment tool
  - State coordination framework

  4. Economic Impact Analysis
  - Cost to employers of compliance
  - Projected savings from reduced turnover
  - GDP impact of improved workforce productivity
  - Tax credit fiscal impact
  - Small business impact assessment
  - Net economic benefit over 10 years

  5. Stakeholder Analysis and Political Strategy
  - Supporter coalition building (which industries,
    unions, associations support WIRA)
  - Opposition anticipation and counterarguments
  - Bipartisan framing strategy
  - Media and public communication plan
  - Implementation phasing to build support

  Task: Write the complete policy framework including
  the commission report, legislative text, and
  implementation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report with economic data, root causes, international comparison, and testimony highlights; 5-title legislative framework covering employer requirements, employee rights, incentives, measurement, and enforcement; regulatory implementation plan with rulemaking and compliance tools; economic impact analysis with 10-year projections; stakeholder analysis with coalition strategy and opposition response."
    weight: 0.35
    description: "PolicyFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy and legislative expertise — the commission report cites credible economic data; the legislative text uses proper statutory language; employer requirements are reasonable and enforceable; employee rights are specific and actionable; the tax credits and grants are structured effectively; the enforcement mechanism balances compliance with employer burden; the implementation timeline is phased realistically; the international comparisons provide genuine policy learning."
    weight: 0.35
    description: "LegislativePolicyExpertise"
  - type: llm_judge
    criteria: "Response would advance national onboarding policy — the commission report would convince skeptical legislators; the legislation would have bipartisan appeal; employers would comply because the requirements are reasonable and the incentives are meaningful; employees would benefit from better onboarding experiences; the national onboarding scorecard would drive improvement; early turnover would decrease measurably; the policy would become a model for other countries."
    weight: 0.30
    description: "NationalPolicyOutcome"
