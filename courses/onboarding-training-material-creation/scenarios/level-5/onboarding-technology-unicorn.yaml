meta:
  id: onboarding-technology-unicorn
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Write the complete product strategy for WelcomeAI — a $50M Series C AI-native onboarding platform aiming to become the category-defining product that replaces all existing onboarding tools"
  tags: [technology-unicorn, ai-native, platform-strategy, category-creation, master]

state: {}

trigger: |
  You're the CEO of WelcomeAI, which just closed a
  $50M Series C at a $500M valuation. Your investors
  (Andreessen Horowitz, Sequoia, and Tiger Global)
  believe you're building the "Salesforce of
  Onboarding" — a platform so comprehensive and
  intelligent that it replaces all existing onboarding
  tools, processes, and even some HR functions.

  Your vision: WelcomeAI doesn't just digitize
  onboarding — it uses AI to fundamentally reinvent
  how humans join organizations. Every new hire gets
  a personalized, adaptive onboarding experience
  that's as engaging as the best consumer apps and
  as effective as having a dedicated personal coach.

  Current traction: 200 enterprise customers, $15M
  ARR, 150% NDR, 400 employees. You need to 5x in
  3 years to justify the valuation.

  Write the complete product and company strategy:

  1. Category Creation Strategy
  - Define the category: "Intelligent Talent
    Integration" (why "onboarding software" is too
    small)
  - Category narrative and thought leadership plan
  - Analyst relations strategy (Gartner Magic Quadrant,
    Forrester Wave creation)
  - Market sizing for the new category ($15B TAM)
  - Competitive landscape and moat analysis

  2. Platform Architecture (Next Generation)
  - AI Onboarding Brain: The central intelligence
    that learns from every onboarding across all
    customers
  - Onboarding Genome: A universal model of what
    makes onboarding successful (trained on data
    from 200+ companies)
  - Key platform modules:
    * Journey Composer: AI generates personalized
      onboarding journeys from minimal input
    * Content Intelligence: Auto-generates, updates,
      and personalizes onboarding content using
      company knowledge bases
    * Relationship Engine: Algorithmically builds
      new hire networks (not just buddy assignment,
      but strategic relationship design)
    * Pulse AI: Real-time sentiment and engagement
      analysis with predictive attrition modeling
    * Manager Co-Pilot: AI assistant that coaches
      managers through each new hire's onboarding
    * Compliance Autopilot: Automated regulatory
      compliance that adapts to jurisdiction
    * Integration Hub: Deep integrations with 100+
      enterprise tools (HRIS, ATS, LMS, Slack/Teams,
      knowledge bases)

  3. AI and Data Strategy
  - Foundation model approach (fine-tuned LLM for
    HR/onboarding domain)
  - Data flywheel: More customers → more data →
    better AI → more customers
  - Privacy and data sovereignty architecture
    (EU compliance, data isolation)
  - AI ethics framework (bias detection, fairness
    in recommendations)
  - Responsible AI principles and governance
  - Key ML models and their training approach:
    * Attrition prediction model
    * Optimal onboarding sequence model
    * Content effectiveness model
    * Manager coaching recommendation model
    * Cultural fit and integration speed model

  4. Go-to-Market Strategy (Series C Phase)
  - Enterprise sales motion (move upmarket to
    Fortune 500)
  - PLG motion for mid-market (self-serve trial)
  - International expansion plan (UK, Germany,
    Japan, Australia)
  - Partner ecosystem (consulting firms, HRIS
    vendors, staffing agencies)
  - Customer success at scale (high-touch for
    enterprise, tech-touch for mid-market)
  - Community strategy (user groups, annual
    conference, certification)

  5. Financial Plan (3-Year Path to $75M ARR)
  - Revenue projections by segment and geography
  - Pricing evolution (usage-based, platform fee,
    AI premium)
  - Key metrics targets: ARR, NDR, gross margin,
    magic number, burn multiple
  - Headcount plan (400 → 1,200 employees)
  - Path to profitability analysis
  - Potential exit scenarios (IPO, strategic
    acquisition)

  6. Organizational Strategy
  - Engineering and AI team scaling plan
  - Culture at scale (maintaining startup culture
    during 3x growth)
  - Key leadership hires needed
  - Board governance and investor relations
  - Risk factors and mitigation strategies

  Task: Write the complete WelcomeAI strategy that
  would justify the $500M valuation.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete unicorn strategy — category creation with narrative and analyst relations; platform architecture with AI Brain, Onboarding Genome, and 7+ modules; AI strategy with foundation model, data flywheel, ethics framework, and 5+ ML models; GTM with enterprise and PLG motions, international expansion, and partner ecosystem; 3-year financial plan with ARR targets and exit scenarios; organizational strategy with culture and leadership plans."
    weight: 0.35
    description: "UnicornStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and venture strategy expertise — the category creation is genuinely larger than 'onboarding software'; the AI features are technically feasible and defensible; the data flywheel creates a real moat; the privacy architecture handles enterprise requirements; the financial projections are credible for a Series C company; the pricing evolution makes sense; the go-to-market balances enterprise and PLG; the competitive analysis identifies real threats."
    weight: 0.35
    description: "VentureProductExpertise"
  - type: llm_judge
    criteria: "Response would satisfy Series C investors — a16z and Sequoia would see a credible path to $75M ARR; the category creation would establish WelcomeAI as the category leader; enterprises would choose WelcomeAI because the AI advantage is clear; the platform would become the system of record for onboarding; the company could credibly IPO; the strategy would make WelcomeAI the 'Salesforce of Onboarding' that investors envisioned."
    weight: 0.30
    description: "InvestorConfidenceOutcome"
