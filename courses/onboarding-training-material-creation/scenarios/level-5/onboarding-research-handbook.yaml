meta:
  id: onboarding-research-handbook
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Edit the Oxford Handbook of Organizational Onboarding — design the 30-chapter outline, write the editorial introduction, and author three key chapters synthesizing the field"
  tags: [research-handbook, academic-publishing, field-synthesis, oxford-handbook, master]

state: {}

trigger: |
  Oxford University Press has commissioned you to
  edit "The Oxford Handbook of Organizational
  Onboarding" — the definitive academic reference
  that synthesizes 50 years of onboarding research
  and sets the agenda for the next decade. This will
  be the authoritative reference that every doctoral
  student, researcher, and serious practitioner
  consults.

  As editor, you're responsible for the handbook's
  architecture and are personally authoring the
  editorial introduction and three key chapters.

  Design and write:

  1. Handbook Architecture (30 chapters across 7 parts)

  Part I: Theoretical Foundations (5 chapters)
  - Chapter 1: Historical evolution of onboarding
    as a field of study
  - Chapter 2: Organizational socialization theory
    (Van Maanen & Schein revisited)
  - Chapter 3: Newcomer adjustment models (Bauer,
    Saks, Klein & Polin)
  - Chapter 4: Psychological contract formation
    during onboarding
  - Chapter 5: Identity and sensemaking in
    organizational entry

  Part II: Onboarding Program Design (5 chapters)
  - Chapters 6-10 covering program architecture,
    content design, technology, assessment, and
    measurement

  Part III: Context and Contingencies (5 chapters)
  - Chapters 11-15 covering industry, culture,
    organization size, work arrangement, and role
    level moderators

  Part IV: Special Populations (4 chapters)
  - Chapters 16-19 covering executive onboarding,
    diverse and underrepresented groups, international
    assignees, and non-traditional workers (gig,
    contract, part-time)

  Part V: The Manager and Social Context (4 chapters)
  - Chapters 20-23 covering manager role, peer
    relationships, mentoring, and team integration

  Part VI: Outcomes and Measurement (4 chapters)
  - Chapters 24-27 covering retention, performance,
    engagement, and ROI/business impact

  Part VII: Future Directions (3 chapters)
  - Chapter 28: AI and technology in onboarding
  - Chapter 29: Onboarding in the future of work
  - Chapter 30: An integrative model and research
    agenda

  For each chapter provide: title, author description
  (type of scholar who would write it), 200-word
  abstract, and 5 key questions addressed.

  2. Editorial Introduction (~4,000 words)
  Write the complete editorial introduction:
  - The case for a handbook on onboarding now
  - How the field has evolved (3 eras of onboarding
    research)
  - Key debates and unresolved questions
  - How the handbook is organized and why
  - What's new in this handbook that prior reviews
    haven't covered
  - A call to action for the research community

  3. Chapter 1: "The Evolution of Onboarding: From
  Orientation to Strategic Integration" (~6,000 words)
  Write the complete historical review chapter:
  - Pre-1970s: Orientation as administrative function
  - 1970s-1980s: Socialization research emerges
  - 1990s-2000s: Onboarding becomes strategic
  - 2010s: Technology and personalization
  - 2020s: Remote, AI, and continuous onboarding
  - Paradigm shifts and what drove them
  - Bibliometric analysis of the field's growth

  4. Chapter 15: "Cross-Cultural Onboarding: A Global
  Perspective" (~6,000 words)
  Write the complete chapter on how culture moderates
  onboarding:
  - Cultural dimensions relevant to onboarding
    (individualism-collectivism, power distance,
    uncertainty avoidance, time orientation)
  - How onboarding practices differ across cultures
    (US, Japan, Germany, India, Brazil, Nigeria)
  - When "best practices" become "Western practices"
  - Global companies' onboarding standardization
    dilemma
  - Research methodology challenges in cross-cultural
    onboarding research
  - Toward a culture-contingent model of onboarding

  5. Chapter 30: "An Integrative Model and Research
  Agenda for Onboarding" (~6,000 words)
  Write the capstone chapter:
  - Synthesis of key findings across all chapters
  - The Integrative Onboarding Model (your
    contribution — a comprehensive model linking
    antecedents, processes, moderators, and outcomes)
  - 10 most important unanswered research questions
  - Methodological recommendations for future
    research
  - Bridging the research-practice gap
  - The next 10 years of onboarding research

  Task: Write the complete handbook architecture,
  editorial introduction, and three full chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — 30-chapter architecture across 7 parts with titles, author descriptions, abstracts, and key questions for each chapter; editorial introduction (~4,000 words) with field evolution and organization rationale; Chapter 1 (~6,000 words) historical review with 5 eras and bibliometric analysis; Chapter 15 (~6,000 words) cross-cultural analysis with 6+ countries and culture-contingent model; Chapter 30 (~6,000 words) integrative model with 10 research questions and methodology recommendations."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic handbook expertise — the chapter architecture covers the field comprehensively without gaps or redundancy; theoretical foundations reference real socialization theory; the editorial introduction contextualizes why this handbook is needed now; the historical chapter traces genuine intellectual evolution; the cross-cultural chapter goes beyond surface-level cultural comparisons; the integrative model synthesizes across domains; the research agenda identifies genuinely unresolved questions."
    weight: 0.35
    description: "AcademicHandbookExpertise"
  - type: llm_judge
    criteria: "Response would become the definitive reference — doctoral students would cite it in every onboarding dissertation; researchers would use the integrative model as their starting framework; the research agenda would guide funding decisions; practitioners would use it to ground their work in evidence; the handbook would be compared to other Oxford Handbooks in management; it would define the onboarding field for the next decade."
    weight: 0.30
    description: "DefinitiveReferenceOutcome"
