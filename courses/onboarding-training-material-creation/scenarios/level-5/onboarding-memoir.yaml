meta:
  id: onboarding-memoir
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Write a professional memoir — 'Everyone's First Day' — chronicling 25 years of transforming how organizations welcome people, with lessons from spectacular successes and painful failures"
  tags: [memoir, professional-narrative, career-reflection, literary, master]

state: {}

trigger: |
  You're retiring after 25 years dedicated to
  employee onboarding — from your first HR coordinator
  role where you realized "orientation" was killing
  new hire enthusiasm, to your final role as a
  globally recognized onboarding authority. A
  publisher has commissioned your memoir: "Everyone's
  First Day: 25 Years of Helping People Belong."

  Write the book proposal and three complete chapters:

  1. Book Proposal
  - Overview and hook
  - Target audience
  - Chapter-by-chapter outline (14 chapters, each
    centered on a transformative experience)
  - Author bio and platform

  Suggested chapter arc:
  - Chapter 1: Your own terrible onboarding experience
    that sparked a career mission
  - Chapters 2-4: Early career — discovering what
    makes people feel welcome (or unwelcome)
  - Chapters 5-7: Building and breaking onboarding
    programs at growing companies
  - Chapters 8-10: Going global — onboarding across
    cultures and the mistakes you made
  - Chapters 11-12: The technology revolution in
    onboarding — promise and peril
  - Chapter 13: The pandemic — when everything
    changed overnight
  - Chapter 14: What I know now that I wish I'd
    known on my first day

  2. Chapter 1: "The Worst First Day" (~5,000 words)
  Your own onboarding experience at your first
  professional job — the excitement, the reality,
  the moment you realized someone had to fix this.
  Written as literary narrative with:
  - Vivid sensory details of the day
  - The specific moment of disillusionment
  - The conversation with a veteran employee who
    said "they all start like this"
  - The decision that became a career
  - Reflection on what that experience taught you
    about belonging

  3. Chapter 7: "The Onboarding That Saved a Company"
  (~5,000 words)
  The story of a mid-size company on the verge of
  failure — turnover was destroying them, and you
  were brought in as a consultant. The transformation
  you led, the resistance you faced, the breakthrough
  moment, and the aftermath. Written with:
  - The CEO who didn't believe in onboarding ("just
    hire better people")
  - The data that changed their mind
  - The pilot program and its unexpected champion
  - The cultural shift that went far beyond onboarding
  - The employee whose story embodied the change
  - Hard-won lessons about organizational change

  4. Chapter 13: "The Day the Office Disappeared"
  (~5,000 words)
  March 2020 — overnight, everything you knew about
  onboarding became obsolete. New hires starting
  in their bedrooms. The scramble to reinvent. The
  surprising discoveries. The things that mattered
  more than you expected and the things that mattered
  less. Written with:
  - The specific new hire you onboarded on March 16,
    2020 (the first fully remote onboarding)
  - The failures of the first weeks (just putting
    orientation on Zoom)
  - The breakthrough insight about what onboarding
    actually is (not logistics, but belonging)
  - The innovations that emerged from crisis
  - The permanent changes to your philosophy
  - The gratitude for being forced to rethink
    everything

  Task: Write the complete book proposal and all
  three chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete memoir package — book proposal with overview, audience, and 14-chapter outline; Chapter 1 (~5,000 words) about the author's terrible first day with vivid narrative and career-defining moment; Chapter 7 (~5,000 words) about saving a company through onboarding with CEO skepticism, data breakthrough, and cultural transformation; Chapter 13 (~5,000 words) about pandemic onboarding with March 2020 specificity, failures, breakthroughs, and permanent philosophical changes."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates literary and professional memoir craft — the writing is narrative-driven, not instructional; characters are vivid and specific; scenes have sensory detail; the emotional arc of each chapter is compelling; professional insights emerge from stories, not lectures; the memoir voice is reflective and honest about failures; each chapter works as standalone narrative while building the career arc; the pandemic chapter avoids cliche and captures genuine transformation."
    weight: 0.35
    description: "LiteraryMemoirCraft"
  - type: llm_judge
    criteria: "Response would produce a published, impactful memoir — a literary agent would sign it; HR professionals and general business readers would buy it; the stories would be shared in keynotes and workshops; the memoir would humanize onboarding as a profession; readers would see their own first-day experiences in the pages; the book would inspire a new generation of HR professionals to care deeply about how organizations welcome people."
    weight: 0.30
    description: "MemoirPublishingOutcome"
