meta:
  id: master-onboarding-shift
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Master shift simulation — simultaneously address five converging onboarding crises that threaten to redefine how humanity integrates into organizations, communities, and new ways of working"
  tags: [shift-simulation, converging-crises, civilization-defining, future-of-work, master]

state: {}

trigger: |
  You are the world's preeminent authority on how
  humans integrate into organizations and communities.
  In a single extraordinary week, five converging
  crises demand your expertise simultaneously. Each
  alone would define a career; together, they reveal
  that onboarding is not an HR function — it's a
  fundamental human process that determines whether
  people thrive or fail in every transition of life.

  === CRISIS 1: The AI Onboarding Paradox ===
  A Fortune 50 technology company has replaced 40%
  of its workforce with AI agents. The remaining
  60% of human employees need to be "re-onboarded"
  to work alongside AI colleagues. Simultaneously,
  the AI agents themselves need a form of "onboarding"
  — organizational context, values alignment, and
  human collaboration protocols. The CEO asks you:
  "How do we onboard humans to work with AI, and
  how do we onboard AI to work with humans?"

  Design:
  - Human re-onboarding program for AI-augmented roles
  - AI agent organizational integration framework
  - Human-AI collaboration onboarding protocols
  - Ethics and boundaries training (what AI should
    and shouldn't do)
  - Grieving the old way of working (change management
    for radical transformation)
  - New performance frameworks for human-AI teams
  - Psychological safety in human-AI workplaces

  === CRISIS 2: The Mars Colony ===
  The first permanent Mars colony of 100 people is
  being established. These colonists will never return
  to Earth. They come from 30 countries and must build
  a functioning society from scratch in an environment
  where interpersonal failure can be fatal.

  Design:
  - Pre-departure Earth-based team integration (2 years)
  - In-transit onboarding during 7-month journey
  - Colony "founding culture" design process
  - Governance onboarding (they must create their
    own laws and decision-making systems)
  - Role rotation onboarding (everyone must learn
    multiple survival-critical roles)
  - Conflict resolution in a no-exit environment
  - Onboarding future colonists who arrive later
  - Preserving and transmitting culture across
    generations
  - Psychological resilience for permanent separation
    from Earth
  - Children born on Mars: onboarding into a culture
    they didn't choose

  === CRISIS 3: Post-Pandemic Education Reset ===
  The WHO has declared that global learning loss from
  the pandemic constitutes an educational emergency.
  500 million students worldwide need to be
  "re-onboarded" into effective learning. Traditional
  classroom onboarding (back-to-school orientation)
  is wildly insufficient. Many students have
  disengaged entirely, lost social skills, developed
  mental health challenges, and fallen years behind.

  Design:
  - Student re-engagement onboarding framework
    (primary, secondary, higher education)
  - Teacher preparation program (onboarding educators
    to a fundamentally changed student body)
  - Social-emotional learning integration
  - Academic re-integration without stigma
  - Parent and family re-engagement
  - Technology-enabled personalized re-onboarding
  - Mental health screening and support integration
  - Community partnership model for wraparound
    support
  - Measurement framework for re-engagement success

  === CRISIS 4: Democratic Onboarding ===
  Three newly democratic nations (following
  authoritarian collapses) need to "onboard" their
  entire populations into democratic citizenship.
  People who have lived under authoritarian rule
  for decades need to learn civic participation,
  free press literacy, independent judiciary respect,
  and democratic norms — while authoritarian habits
  and power structures persist.

  Design:
  - National civic onboarding curriculum
  - Media literacy and disinformation resistance
    training
  - Democratic participation skills (voting, civic
    engagement, peaceful protest, community organizing)
  - Government official onboarding to democratic
    governance (for former authoritarian bureaucrats)
  - Justice system onboarding (onboarding judges,
    lawyers, police to rule of law)
  - Economic transition onboarding (from state-
    controlled to market economy)
  - Youth democratic identity program
  - International mentorship program (established
    democracies partnering with new ones)
  - Preventing democratic backsliding through
    sustained onboarding

  === CRISIS 5: The Legacy Question ===
  You've been diagnosed with a terminal illness. You
  have 18 months. The question that haunts you: How
  do you "onboard" the next generation of onboarding
  leaders to carry this work forward? How do you
  ensure that everything you've learned — about
  belonging, about the human need to be welcomed,
  about the organizational imperative to integrate
  people well — survives and evolves after you're gone?

  Design:
  - Your intellectual legacy document (the principles
    that must survive)
  - Mentorship transition plan (your 5 most promising
    protégés)
  - Knowledge capture methodology (codifying tacit
    expertise)
  - The "Onboarding Foundations" nonprofit you
    establish
  - Your final keynote: "Everyone Deserves a Good
    First Day" — the speech that distills 30 years
    into 20 minutes
  - Letter to the future of the onboarding profession

  Task: Write complete responses to all five crises,
  recognizing how they interconnect and reveal
  onboarding as a fundamental human process.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI onboarding paradox with human re-onboarding and AI integration protocols; Mars colony with 2-year pre-departure integration, founding culture, and intergenerational transmission; education reset with student re-engagement, teacher preparation, and mental health integration; democratic onboarding with civic curriculum, media literacy, and backsliding prevention; legacy question with intellectual document, mentorship plan, nonprofit, final keynote, and letter to the profession."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of onboarding as universal human process — the AI crisis reveals that even machines need organizational context; the Mars colony shows onboarding as civilization-building; the education crisis reframes student disengagement as a belonging failure; the democratic transition shows citizenship as the ultimate onboarding; the legacy question turns the lens inward; each crisis builds on the others to reveal that onboarding is fundamentally about how humans create and transmit belonging, purpose, and capability."
    weight: 0.35
    description: "UniversalProcessMastery"
  - type: llm_judge
    criteria: "Response would define the future of onboarding — the AI framework would become the standard for human-AI workplaces; the Mars colony design would influence real space colonization planning; the education framework would be adopted by UNESCO; the democratic onboarding would guide democratic transitions; the legacy question would move readers emotionally and professionally; the interconnections between crises would reveal onboarding as one of humanity's most important and undervalued practices."
    weight: 0.30
    description: "CivilizationDefiningOutcome"
