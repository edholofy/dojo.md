meta:
  id: onboarding-for-existential-transitions
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Design onboarding frameworks for three civilization-scale workforce transitions — AI displacement, climate migration, and post-pandemic hybrid work — each affecting millions of workers simultaneously"
  tags: [existential-transitions, ai-displacement, climate-migration, civilization-scale, master]

state: {}

trigger: |
  You're the Special Advisor on Workforce Transitions
  to the Secretary-General of the OECD. Three
  simultaneous mega-trends are creating the largest
  workforce transitions in human history. Each
  requires an onboarding framework that operates at
  population scale — not for one company, but for
  entire economies.

  Design onboarding frameworks for all three:

  === FRAMEWORK 1: AI Displacement and Re-skilling
  Onboarding ===
  By 2028, AI will displace 85 million jobs globally
  while creating 97 million new ones (WEF estimate).
  The challenge isn't the net number — it's the
  transition. Workers displaced from one sector need
  to be "onboarded" into entirely new industries,
  roles, and ways of working.

  Design a national-scale onboarding framework for
  AI-displaced workers:
  - Skills assessment and career pathway mapping
    (from displaced role to AI-adjacent or AI-
    complementary roles)
  - Modular re-skilling programs designed as
    "onboarding" to new careers (not just education,
    but workplace integration)
  - Employer incentive programs for hiring and
    onboarding displaced workers
  - Industry transition consortia (groups of employers
    who coordinate onboarding for displaced workers)
  - Digital literacy foundation program (for workers
    from analog industries)
  - Psychological support for career identity loss
  - Regional economic transition onboarding (when
    entire communities lose their primary employer)
  - Public-private partnership model for funding
  - Success metrics at individual, employer, and
    economy level
  - Policy recommendations for OECD member countries

  === FRAMEWORK 2: Climate Migration Workforce
  Integration ===
  Climate change will create 200+ million climate
  migrants by 2050 (World Bank estimate). These
  workers will move from climate-vulnerable regions
  to climate-stable regions, needing to integrate
  into new economies, new cultures, and often new
  industries entirely.

  Design a regional onboarding framework for climate-
  displaced workers:
  - Pre-migration preparation programs (before
    workers leave climate-vulnerable areas)
  - Receiving community preparation (onboarding
    communities to accept climate migrants)
  - Skills translation framework (mapping skills from
    agriculture/fishing/tourism to receiving economy
    jobs)
  - Cultural integration programs (respecting
    migrants' culture while building belonging in
    new communities)
  - Language and workplace communication programs
  - Housing, healthcare, and education navigation
  - Employer partnerships for preferential hiring
  - Community integration beyond work (social bonds,
    civic participation, religious communities)
  - Children and family integration support
  - Trauma-informed design for loss of homeland
  - Bilateral country agreements for coordinated
    transitions
  - Long-term integration monitoring (5-10 year
    outcomes)

  === FRAMEWORK 3: Post-Pandemic Hybrid Work
  Onboarding Paradigm ===
  The pandemic permanently changed how organizations
  onboard. 60% of knowledge workers are now hybrid
  or remote. But onboarding hasn't caught up — new
  hires report feeling disconnected, having weaker
  networks, taking longer to feel productive, and
  struggling to understand culture when they're not
  physically present.

  Design a new paradigm for hybrid onboarding that
  becomes the global standard:
  - Research synthesis: What the data says about
    remote/hybrid onboarding outcomes
  - The "Digital-First, Human-Always" onboarding
    framework
  - Virtual belonging acceleration techniques
  - Asynchronous onboarding design principles
  - In-person intensive model (strategic use of
    limited in-person time)
  - Manager training for hybrid onboarding
  - Technology stack for world-class hybrid onboarding
  - Culture transmission in distributed environments
  - Network building without physical proximity
  - Measurement framework for hybrid onboarding
    effectiveness
  - Implementation guide for organizations at
    different hybrid maturity levels
  - Government policy recommendations for remote
    work onboarding standards

  Task: Write all three population-scale onboarding
  frameworks.

assertions:
  - type: llm_judge
    criteria: "Response creates three population-scale frameworks — AI displacement with skills assessment, re-skilling modules, employer incentives, industry consortia, and OECD policy recommendations; climate migration with pre-migration prep, receiving community onboarding, skills translation, cultural integration, and bilateral agreements; hybrid work paradigm with Digital-First framework, virtual belonging, async design principles, technology stack, and government policy recommendations."
    weight: 0.35
    description: "PopulationScaleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy-level expertise — the AI displacement framework addresses career identity loss beyond just skills; the climate migration framework recognizes that receiving communities also need onboarding; the hybrid framework is based on real research about remote onboarding challenges; all three operate at systemic scale with public-private partnerships; the policy recommendations are actionable for OECD governments; each framework addresses the psychological dimension of massive transition."
    weight: 0.35
    description: "PolicyLevelExpertise"
  - type: llm_judge
    criteria: "Response would shape global workforce policy — OECD member countries would adopt these frameworks; the AI displacement framework would reduce transition time and suffering; climate-displaced workers would integrate successfully into new economies; hybrid onboarding would become standardized globally; each framework balances economic efficiency with human dignity; the collective work would be cited as the definitive guide for workforce transition onboarding."
    weight: 0.30
    description: "GlobalPolicyOutcome"
