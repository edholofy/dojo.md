meta:
  id: onboarding-social-enterprise
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Design a social enterprise that provides free onboarding programs to underserved populations — refugees, formerly incarcerated individuals, and first-generation professionals entering the workforce"
  tags: [social-enterprise, underserved-populations, workforce-integration, equity, master]

state: {}

trigger: |
  You're launching "First Steps Forward," a social
  enterprise with a dual mission: (1) provide free,
  culturally responsive onboarding and workplace
  integration programs for underserved populations,
  and (2) consult with employers on inclusive
  onboarding practices, using consulting revenue
  to fund the free programs.

  Target populations:
  - Refugees and asylum seekers entering the workforce
    (language barriers, credential recognition gaps,
    cultural adjustment, trauma histories)
  - Formerly incarcerated individuals re-entering
    the workforce (stigma, skill gaps, digital
    literacy, supervision requirements)
  - First-generation professionals (first in family
    to enter white-collar work; no inherited
    professional social capital, unwritten rules
    unknown)

  Design the complete social enterprise:

  1. Organizational Design
  - Mission, theory of change, and impact model
  - Revenue model (consulting fees fund free programs;
    grant funding; corporate partnerships)
  - Organizational structure and key roles
  - 3-year growth plan with milestones
  - Board composition (lived experience, business,
    nonprofit, government)
  - Impact measurement framework

  2. Program Design: Refugee Workforce Integration
  - Pre-employment preparation (workplace culture
    in the host country, professional communication,
    industry orientation)
  - Language support integrated into onboarding
    (not separate ESL, but workplace-contextualized
    language learning)
  - Credential assessment and equivalency navigation
  - Employer education package (how to onboard
    refugees successfully)
  - Mentor matching (pairing with professionals
    from the same country/industry)
  - Trauma-informed program design (recognizing
    trauma without pathologizing)
  - Family integration support (spouse employment,
    children's school adjustment)
  - Cultural bridging workshops (helping navigate
    cultural differences in the workplace)
  - 6-month follow-up and support
  - Success metrics and case studies

  3. Program Design: Returning Citizens (Formerly
  Incarcerated)
  - Pre-release preparation (starting in
    correctional facilities 6 months before release)
  - Digital literacy crash course (many have been
    away from technology for years)
  - Workplace norms and expectations training
    (professional communication, conflict resolution,
    time management)
  - Employer partnership program (companies committed
    to fair chance hiring)
  - Navigating disclosure and stigma (when and how
    to discuss background)
  - Probation/parole coordination (scheduling,
    reporting, restrictions)
  - Peer support network (connecting with others
    who've successfully re-entered)
  - Financial literacy and benefits navigation
  - Mental health and substance abuse support
    resources
  - 12-month follow-up with employer and participant

  4. Program Design: First-Generation Professionals
  - "Hidden curriculum" of professional work
    (networking, email etiquette, meeting behavior,
    office politics, asking for help)
  - Professional identity development (imposter
    syndrome, code-switching, belonging)
  - Career navigation and mentorship (how to get
    promoted, how to negotiate, how to find sponsors)
  - Financial literacy for professional salaries
    (benefits selection, 401k, student loan
    management)
  - Building professional networks from scratch
  - Managing family expectations and cultural
    tension (when your success changes family
    dynamics)
  - Employer education on first-generation employee
    support
  - Alumni network and ongoing professional
    development
  - 2-year longitudinal support program

  5. Employer Consulting Practice
  - Inclusive Onboarding Assessment (diagnostic for
    employer clients)
  - "Onboarding for All" training program for
    hiring managers
  - Inclusive onboarding program design service
  - Pricing model (sliding scale, enterprise rate
    subsidizes nonprofit rate)
  - Marketing to corporate clients (business case
    for inclusive onboarding)

  6. Curriculum and Content
  - Write 3 complete workshop outlines (one for
    each population)
  - Participant workbook design for each program
  - Facilitator guide with cultural competency
    requirements
  - Multi-language content strategy
  - Digital and in-person delivery models

  Task: Write the complete social enterprise design
  with all three programs and the consulting practice.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — organizational design with mission, revenue model, and impact framework; refugee program with language support, credential navigation, and trauma-informed design; returning citizens program with pre-release preparation, digital literacy, and stigma navigation; first-generation professionals program with hidden curriculum, imposter syndrome support, and career navigation; employer consulting practice; 3 workshop outlines and content strategy."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise with underserved populations — refugee program integrates language learning into workplace context; returning citizens program starts pre-release and addresses digital gaps; first-generation program names the hidden curriculum explicitly; trauma-informed design is integrated without pathologizing; employer education changes organizational behavior, not just individual preparation; the consulting revenue model sustainably funds the free programs; each program respects dignity and agency."
    weight: 0.35
    description: "UnderservedPopulationExpertise"
  - type: llm_judge
    criteria: "Response would create real social impact — refugees would successfully integrate into the workforce; returning citizens would have lower recidivism through meaningful employment; first-generation professionals would thrive and pay it forward; employers would become more inclusive; the enterprise would be financially sustainable; the model would be replicable in other cities; participants would feel their dignity and potential recognized."
    weight: 0.30
    description: "SocialImpactOutcome"
