meta:
  id: onboarding-graduate-program
  level: 5
  course: onboarding-training-material-creation
  type: output
  description: "Design a graduate certificate program in Strategic Onboarding and Talent Integration — curriculum, faculty, research center, and partnership model for a top business school"
  tags: [graduate-program, curriculum-design, research-center, academia, master]

state: {}

trigger: |
  You've been hired as the founding Program Director
  for a new Graduate Certificate in Strategic
  Onboarding and Talent Integration at a top-25
  business school. The dean recognizes that onboarding
  is underserved in management education — MBA programs
  teach strategy, finance, and marketing but ignore
  how organizations integrate the talent they spend
  millions to recruit.

  Your budget: $1.5M for program development and a
  3-year runway to self-sustainability. The program
  targets working HR professionals, talent leaders,
  and organizational consultants.

  Design the complete academic program:

  1. Program Design
  - Program mission and learning outcomes (what
    graduates can do that they couldn't before)
  - Target student profile and admission requirements
  - Program structure: 4 courses (12 credits),
    completable in 2 semesters part-time
  - Delivery model: hybrid (weekend intensives +
    online asynchronous + cohort projects)
  - Stackable credential pathway (certificate →
    MS in Human Capital Management)
  - Advisory board composition (industry + academic)

  2. Curriculum (4 courses with full syllabi)

  Course 1: Foundations of Organizational
  Socialization and Talent Integration
  - Theoretical foundations (Van Maanen & Schein's
    socialization tactics, Bauer's adjustment model,
    Klein & Polin's inform-welcome-guide framework)
  - Research methods for studying onboarding
  - Cross-cultural onboarding considerations
  - Historical evolution of onboarding practice
  - Weekly topics, readings, and assignments

  Course 2: Strategic Onboarding Program Design
  - Needs assessment and stakeholder analysis
  - Onboarding architecture (pre-boarding → Day 1 →
    first year)
  - Content design for adult learners
  - Technology platforms and digital onboarding
  - Measuring onboarding effectiveness
  - Capstone: Design an onboarding program for a
    real organization
  - Weekly topics, readings, and assignments

  Course 3: Special Topics in Onboarding
  - Executive and leadership onboarding
  - Remote and distributed workforce onboarding
  - M&A integration and reboarding
  - Onboarding in regulated industries
  - Onboarding for diversity, equity, and inclusion
  - Global onboarding standardization
  - Weekly topics, readings, and assignments

  Course 4: Onboarding Analytics, ROI, and
  Organizational Impact
  - People analytics for onboarding
  - Building the business case for onboarding
    investment
  - Predictive analytics (attrition risk, time to
    productivity)
  - Experimental design for onboarding research
  - Presenting to the C-suite
  - Capstone: Conduct an onboarding analytics
    project with real data
  - Weekly topics, readings, and assignments

  3. Faculty Plan
  - Core faculty requirements (2 full-time, 4
    adjunct practitioners)
  - Faculty recruitment strategy
  - Industry practitioner-in-residence program
  - Guest speaker series design

  4. Research Center: Center for Onboarding
  Excellence (COE)
  - Research agenda (3-year plan)
  - Flagship annual study design
  - Corporate partnership research model
  - Publication strategy
  - Annual conference design
  - Student research assistantship program

  5. Financial Model
  - Tuition and fee structure
  - Enrollment projections (Years 1-5)
  - Revenue and expense breakdown
  - Corporate sponsorship model
  - Path to self-sustainability by Year 3

  6. Marketing and Recruitment
  - Student recruitment strategy
  - Corporate partnership and sponsorship
  - Alumni network development
  - Industry engagement and visibility

  Task: Write the complete graduate program design
  with full course syllabi.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete graduate program — program design with learning outcomes, structure, and advisory board; 4 full course syllabi with weekly topics, readings, and assignments covering foundations, program design, special topics, and analytics; faculty plan with recruitment strategy; Center for Onboarding Excellence with research agenda and conference; financial model with 5-year projections; marketing and recruitment strategy."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic program design expertise — theoretical foundations reference real socialization theory; course progression builds from foundations to application; assignments include both academic rigor and practical application; the capstone projects connect theory to practice; the research center agenda would advance the field; the financial model is realistic for a business school context; the hybrid delivery model serves working professionals."
    weight: 0.35
    description: "AcademicDesignExpertise"
  - type: llm_judge
    criteria: "Response would produce a successful academic program — HR professionals would enroll because the credential fills a genuine gap; graduates would transform onboarding at their organizations; the research center would become a recognized authority; corporate partners would sponsor students and fund research; the program would become self-sustaining; it would be the definitive academic program for onboarding professionals."
    weight: 0.30
    description: "AcademicProgramOutcome"
