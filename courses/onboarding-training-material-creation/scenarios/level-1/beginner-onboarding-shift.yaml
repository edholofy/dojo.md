meta:
  id: beginner-onboarding-shift
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create three distinct onboarding materials: a restaurant server training manual, a remote employee pre-boarding email sequence, and a contractor onboarding packet"
  tags: [multi-format, restaurant-training, remote-preboarding, contractor-onboarding, beginner]

state: {}

trigger: |
  You're an HR consultant who helps small
  businesses with onboarding. Three clients need
  help this week, each with a very different
  context.

  === CLIENT 1: Restaurant Server Training Manual ===
  A new farm-to-table restaurant is opening in 3
  weeks with 12 servers (all hired, none trained).
  The chef/owner has no HR experience and needs a
  complete server training manual.
  - Restaurant: 60 seats, seasonal menu, craft
    cocktail program
  - Service style: Upscale casual, knowledgeable
    but not stuffy
  - Training timeline: 5 days before opening
  - POS system: Toast

  Manual must include:
  - Service standards and philosophy
  - Step-by-step table service sequence (from
    greeting to farewell)
  - Menu knowledge requirements (how to study
    and describe dishes)
  - Wine and cocktail basics (enough to recommend)
  - POS system essentials (entering orders, split
    checks, comps)
  - Common scenarios: dietary restrictions, long
    waits, unhappy customers, large parties
  - Side work duties and closing procedures
  - Tip pooling policy explanation

  === CLIENT 2: Remote Employee Pre-Boarding
  Email Sequence ===
  A 40-person fully remote SaaS company has no
  pre-boarding process. Between offer acceptance
  and Day 1 (usually 2-4 weeks), new hires hear
  nothing — and 2 have ghosted in the past year.
  - Company: CloudMetrics (analytics platform)
  - All employees remote, distributed across
    3 time zones
  - Tools: Slack, Notion, Zoom, Linear, GitHub

  Create a 5-email pre-boarding sequence:
  - Email 1 (Day of acceptance): Welcome and
    excitement
  - Email 2 (1 week before): Logistics and tech
    setup
  - Email 3 (3 days before): Team introduction
    and culture
  - Email 4 (1 day before): Day 1 agenda and Zoom
    links
  - Email 5 (Day 1 morning): "We're excited you're
    here" + first steps
  Each email: subject line, body, tone guidance

  === CLIENT 3: Contractor Onboarding Packet ===
  A marketing agency regularly hires freelance
  designers and writers on project contracts (5-10
  at any given time). Currently, contractors get
  no onboarding — they're added to Slack, assigned
  a project, and expected to figure it out.
  - Agency: 25 full-time employees + 5-10
    contractors
  - Contractor types: Graphic designers, copywriters,
    web developers
  - Typical engagement: 1-6 month project contracts

  Packet must include:
  - Contractor welcome guide (how we work, who's
    who, communication norms)
  - Project brief template (what contractors receive
    for each project)
  - Access and tools checklist (what they get
    access to, and what they don't)
  - Brand guidelines summary (quick reference for
    creative work)
  - Invoicing and payment instructions
  - Feedback and revision process
  - Confidentiality and IP summary (plain language)
  - Contractor FAQ (8 questions)

  Task: Write all three complete onboarding
  materials.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete materials — Server Training Manual with service philosophy, table service sequence, menu knowledge, wine/cocktail basics, POS essentials, common scenarios, side work, and tip pooling; Pre-Boarding Email Sequence with 5 emails including subject lines, body text, and tone guidance; Contractor Packet with welcome guide, project brief template, access checklist, brand guidelines summary, invoicing instructions, feedback process, IP summary, and FAQ."
    weight: 0.35
    description: "ThreeOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding expertise across contexts — the server manual reflects upscale casual service standards; the email sequence builds engagement and prevents ghosting; the contractor packet establishes clear boundaries while being welcoming; each material is tailored to its specific audience and context; the tone shifts appropriately between hospitality, tech startup, and agency."
    weight: 0.35
    description: "MultiContextExpertise"
  - type: llm_judge
    criteria: "Response would solve each client's problem — servers would deliver consistent service by opening night; remote new hires would arrive engaged and informed; contractors would integrate smoothly into projects; each material could be used immediately without modification; all three demonstrate professional-quality onboarding design."
    weight: 0.30
    description: "ThreeClientOutcomes"
