meta:
  id: it-systems-setup-guide
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create an IT systems setup and training guide for new hires covering all company tools, accounts, and security protocols"
  tags: [it-setup, systems-training, security, tools-guide, beginner]

state: {}

trigger: |
  You're the IT administrator at a 60-person
  accounting firm. New hires constantly need
  hand-holding through tech setup — you spend 3-4
  hours with each person getting their accounts
  configured and showing them basic tools. With
  5 new hires starting in the next month, your
  manager wants a self-service IT setup guide that
  reduces your involvement to a 30-minute check-in.

  Systems new hires need to set up:
  - Laptop: MacBook Pro (pre-configured, picked up
    from IT)
  - Email: Microsoft 365 (Outlook)
  - Communication: Microsoft Teams (chat, calls,
    meetings)
  - File storage: SharePoint + OneDrive
  - Time tracking: Harvest
  - Accounting software: QuickBooks Online (view
    access for all, edit for accountants)
  - Client portal: CCH Axcess
  - Password manager: 1Password
  - VPN: FortiClient (required for remote access)
  - Printer: Network printer setup

  Security requirements:
  - MFA (multi-factor authentication) on all
    accounts
  - 1Password for all passwords (no browser-saved
    passwords)
  - VPN required when working remotely
  - No personal files on work laptop
  - Phishing awareness (recognize and report)
  - Clean desk policy (lock screen, secure
    documents)

  Create:
  1. Step-by-step IT setup guide (with screenshots
     described as placeholders — "[Screenshot:
     Teams login screen]")
  2. Quick reference card: "Your Daily Tools"
     (what each tool is for, how to access)
  3. Security essentials one-pager
  4. Troubleshooting FAQ (10 common IT issues
     and how to fix them)
  5. IT support contact info and escalation process

  Task: Write the complete IT systems setup and
  training guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete IT guide — step-by-step setup for all 10 systems with screenshot placeholders; daily tools quick reference card; security essentials one-pager covering MFA, passwords, VPN, phishing; 10-item troubleshooting FAQ; IT support contact and escalation info."
    weight: 0.35
    description: "ITGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates IT onboarding expertise — setup steps are ordered logically (dependencies first — email before Teams, 1Password before other logins); instructions are written for non-technical users; security requirements are explained with 'why' not just 'what'; the troubleshooting FAQ covers real common issues; the guide would actually reduce IT involvement from 3-4 hours to a 30-minute check-in."
    weight: 0.35
    description: "ITOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would enable self-service setup — a new hire could follow the guide independently; they'd understand each tool's purpose; security habits would be established from day one; the troubleshooting FAQ would handle most issues without IT support; the IT admin would save significant time across 5 new hires."
    weight: 0.30
    description: "SelfServiceOutcome"
