meta:
  id: company-culture-handbook
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Write a company culture handbook section for new hires that authentically communicates values, norms, and 'how we work here'"
  tags: [culture-handbook, values, norms, how-we-work, beginner]

state: {}

trigger: |
  You're the culture and engagement manager at a
  90-person product design consultancy. Your company
  has a strong culture but it's never been written
  down. New hires learn the culture through
  osmosis — which takes months and leads to
  missteps. The CEO wants you to write the "culture"
  section of the employee handbook, but she's
  adamant: "No corporate BS. If it reads like every
  other handbook, throw it away."

  Company culture details:
  - Name: DesignCraft Studio
  - Industry: Product design consultancy
  - Core values (from a recent all-hands vote):
    1. "Craft over speed" — Quality matters more
       than deadlines (within reason)
    2. "Direct and kind" — Say what you mean, but
       say it respectfully
    3. "Clients are partners" — Collaborative, not
       transactional relationships
    4. "Learn publicly" — Share mistakes and lessons
       openly

  Culture norms (unwritten rules to make explicit):
  - Meetings start on time and end 5 min early
  - Feedback is given directly, not through managers
  - Friday afternoons are "maker time" (no meetings)
  - We review each other's work before showing
    clients
  - We celebrate launches, not just wins
  - Taking PTO without guilt is expected (really)
  - Slack is async — respond within 4 hours, not
    instantly
  - No working on weekends (the CEO will call you
    if you do)

  Things new hires need to know:
  - How decisions are made (consensus on design,
    leadership on business)
  - How to give feedback (specific, about the work
    not the person)
  - How to ask for help (it's expected, not a sign
    of weakness)
  - What "good" looks like here (craftsmanship
    examples)
  - Common cultural missteps by new hires

  Write the culture handbook section that:
  - Explains each value with a real-ish example
  - Lists cultural norms honestly (not aspirational)
  - Includes a "Cultural FAQ" (10 questions new
    hires actually ask)
  - Has a "What we're still working on" section
    (where culture falls short)
  - Feels authentic, warm, and honest — not
    corporate brochure

  Task: Write the complete culture handbook section.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete culture section — each value explained with examples; cultural norms listed explicitly; Cultural FAQ with 10 real questions; 'What we're still working on' section acknowledging shortcomings; honest and authentic tone throughout."
    weight: 0.35
    description: "CultureHandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates culture communication expertise — values are illustrated with specific examples, not platitudes; norms are described descriptively, not prescriptively; the FAQ addresses genuine new-hire anxieties; the 'still working on' section is genuinely self-aware; the tone is warm and honest without being corporate; a new hire could read this and actually understand the culture."
    weight: 0.35
    description: "CultureCommunicationExpertise"
  - type: llm_judge
    criteria: "Response would accelerate cultural onboarding — new hires would understand 'how things work here' in days instead of months; cultural missteps would decrease; the handbook would be read (not skipped) because it's engaging; existing employees would recognize their culture in it; the CEO would approve it as 'not corporate BS.'"
    weight: 0.30
    description: "CulturalOnboardingOutcome"
