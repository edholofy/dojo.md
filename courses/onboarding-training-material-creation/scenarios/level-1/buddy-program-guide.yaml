meta:
  id: buddy-program-guide
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create an onboarding buddy program guide including buddy selection criteria, conversation guides, and timeline of buddy activities"
  tags: [buddy-program, peer-support, mentorship, relationship-building, beginner]

state: {}

trigger: |
  You're the people operations specialist at a
  100-person fintech startup. New hires report
  feeling "lost after the first week" — orientation
  covers logistics, but nobody helps them navigate
  the unwritten rules. Your VP of People wants a
  formal buddy program where every new hire is
  paired with an experienced employee for their
  first 90 days.

  Program parameters:
  - Buddy duration: 90 days
  - Buddy pool: Employees with 6+ months tenure
  - Pairing: Different team than the new hire
    (to broaden their network), similar level
  - Time commitment: ~2 hours/week for the buddy
  - Compensation: No extra pay, but counts toward
    performance review "culture contribution"

  Create the complete buddy program package:

  1. Buddy Program Overview (1-page explainer for
     all employees announcing the program)

  2. Buddy Selection Criteria and Application
     - What makes a good buddy (traits, not just
       tenure)
     - Application form (5-6 questions)
     - How buddies are matched to new hires

  3. Buddy Training Guide (30-minute self-study)
     - What the buddy role IS and IS NOT (not a
       manager, not a therapist)
     - How to be a great buddy
     - Common new hire challenges and how to help
     - Conversation starters and prompts

  4. 90-Day Buddy Activity Calendar
     - Week 1: Daily check-ins, office tour, lunch
     - Weeks 2-4: Weekly coffee chats, intro to
       key people
     - Month 2: Bi-weekly check-ins, help with
       first challenges
     - Month 3: Monthly check-in, transition to
       organic relationship

  5. Conversation Guide (10 suggested topics for
     buddy meetings across the 90 days)

  6. Buddy Feedback Form (end-of-program survey
     for both buddy and new hire)

  Task: Write the complete buddy program package.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete buddy program — program overview; selection criteria and application form; buddy training guide covering role boundaries, skills, and conversation starters; 90-day activity calendar with decreasing frequency; 10 conversation topics; feedback forms for both buddy and new hire."
    weight: 0.35
    description: "BuddyProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates buddy program expertise — selection criteria focus on traits not just tenure; the training guide clearly distinguishes buddy from manager/mentor/therapist; the 90-day calendar realistically tapers from daily to monthly; conversation topics address real new-hire needs (culture, politics, unwritten rules); the feedback form measures program effectiveness."
    weight: 0.35
    description: "BuddyProgramExpertise"
  - type: llm_judge
    criteria: "Response would create an effective buddy program — new hires would feel supported beyond orientation; buddies would know exactly what's expected; the program would reduce 'feeling lost after the first week'; the 90-day structure would build genuine relationships; the feedback loop would improve the program over time."
    weight: 0.30
    description: "BuddyProgramOutcome"
