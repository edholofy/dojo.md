meta:
  id: first-day-orientation-guide
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Write a facilitator guide for a half-day new employee orientation covering company culture, policies, benefits, and office tour"
  tags: [orientation, first-day, facilitator-guide, policies, beginner]

state: {}

trigger: |
  You're the HR generalist at a 150-person B2B
  software company. Currently, new hire orientation
  is a 4-hour session where someone from HR reads
  through a slide deck while new hires fill out
  paperwork. Feedback is terrible ("boring,"
  "information overload," "I don't remember
  anything"). Your HR director wants you to
  redesign orientation to be engaging and memorable.

  Orientation details:
  - Duration: 4 hours (9 AM - 1 PM, including
    lunch with the team)
  - Typical group size: 3-5 new hires per session
    (biweekly)
  - Location: Main conference room

  Content to cover (required by compliance):
  - Company history, mission, and values
  - Organizational structure overview
  - Employee handbook highlights (attendance,
    PTO, remote work policy, code of conduct)
  - Benefits overview and enrollment
  - IT security and acceptable use policy
  - Health and safety (emergency exits, first aid)
  - Anti-harassment and reporting procedures

  Additional goals:
  - Make new hires feel they belong
  - Introduce company culture authentically
  - Connect new hires to each other
  - Reduce information overload
  - Make compliance content not soul-crushing

  Write the complete orientation facilitator guide:
  - Detailed agenda with timing for each segment
  - Facilitator script for each section (what to
    say, how to say it)
  - 3 interactive activities to break up content
  - Participant handout (one-page reference card
    they'll actually keep)
  - Pre-orientation checklist (what to prepare)
  - Post-orientation survey (5 questions)

  Task: Write the complete first-day orientation
  facilitator guide.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete orientation guide — detailed agenda with timing; facilitator scripts for each section; 3 interactive activities; one-page participant reference card; pre-orientation checklist; post-orientation survey with 5 questions; all required compliance topics covered."
    weight: 0.35
    description: "OrientationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding design expertise — the agenda balances compliance requirements with engagement; interactive activities genuinely break up content (not just token exercises); the facilitator script is conversational, not lecture-style; compliance content is made relatable; the reference card captures what new hires actually need to remember; information overload is managed through pacing and prioritization."
    weight: 0.35
    description: "OrientationDesignExpertise"
  - type: llm_judge
    criteria: "Response would transform the orientation experience — new hires would describe it as 'engaging' and 'welcoming' instead of 'boring'; they'd remember key information; they'd feel connected to each other and the company; compliance topics would stick because they're made relevant; the post-orientation survey would show dramatic improvement over the old format."
    weight: 0.30
    description: "OrientationExperienceOutcome"
