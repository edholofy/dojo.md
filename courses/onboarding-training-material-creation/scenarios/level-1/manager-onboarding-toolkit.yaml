meta:
  id: manager-onboarding-toolkit
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create a manager's toolkit for onboarding new direct reports — meeting templates, check-in guides, and goal-setting frameworks"
  tags: [manager-toolkit, new-hire-meetings, goal-setting, check-ins, beginner]

state: {}

trigger: |
  You're the L&D specialist at a fast-growing
  tech company (300 employees, hired 80 last year).
  Your biggest onboarding gap: managers don't know
  how to onboard their new hires. HR handles Day 1
  orientation, but the real onboarding happens on
  the team — and managers are winging it. Some are
  great (structured plans, regular check-ins),
  others are terrible ("Here's your laptop, good
  luck"). Your VP of HR wants a Manager's Onboarding
  Toolkit that every manager uses.

  Toolkit must include:

  1. Manager's Pre-Arrival Checklist
     - What to prepare before the new hire starts
       (desk/equipment, accounts, team introduction
       email, first-week plan)
     - How to announce the new hire to the team
     - How to assign an onboarding buddy

  2. First Meeting Guide (Day 1, 30 min)
     - Welcome conversation script
     - Topics: role expectations, team structure,
       communication preferences, first-week plan
     - Questions to ask the new hire

  3. Week 1 Daily Check-in Template (5 min each)
     - Mon-Fri topics: How's it going? What do
       you need? Who should you meet?

  4. 30-Day Check-in Template (30 min)
     - Questions about role clarity, team integration,
       training gaps, early wins, concerns
     - Goal-setting for the next 30 days

  5. 60-Day Check-in Template (30 min)
     - Performance feedback conversation guide
     - Role adjustment discussion
     - Development needs identification

  6. 90-Day Review Template (45 min)
     - Formal performance conversation
     - End of onboarding / transition to regular
       1:1s
     - Growth plan for the next 6 months

  7. Manager Tips Sheet: "10 Things Great Managers
     Do During Onboarding" (one-pager)

  Task: Write the complete Manager's Onboarding
  Toolkit.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete manager toolkit — pre-arrival checklist; Day 1 meeting guide with script and questions; Week 1 daily check-in templates (Mon-Fri); 30-day check-in template with goal-setting; 60-day check-in with feedback guide; 90-day review template with transition plan; '10 Things' tips sheet."
    weight: 0.35
    description: "ManagerToolkitCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates manager onboarding expertise — the pre-arrival checklist covers what's often forgotten; the Day 1 script is conversational, not corporate; check-in templates progress naturally from logistics to performance to growth; the 90-day review marks a clear transition; the tips sheet captures what separates great onboarding managers from poor ones; templates are practical and quick to use."
    weight: 0.35
    description: "ManagerOnboardingExpertise"
  - type: llm_judge
    criteria: "Response would standardize manager onboarding quality — even poor onboarding managers would provide a baseline experience; new hires across teams would have consistent support; managers would save time (templates vs. winging it); new hire retention would improve; the toolkit would be adopted because it's genuinely useful, not bureaucratic."
    weight: 0.30
    description: "ManagerStandardizationOutcome"
