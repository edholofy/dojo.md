meta:
  id: thirty-sixty-ninety-plan
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create a 30-60-90 day onboarding plan for a new marketing manager including learning objectives, milestones, and success criteria"
  tags: [30-60-90, marketing-manager, milestones, success-criteria, beginner]

state: {}

trigger: |
  You're the VP of Marketing at a SaaS startup
  (Series B, 120 employees). You just hired a
  Marketing Manager who will own content marketing,
  SEO, and email campaigns. This is the first time
  you've had someone dedicated to these areas —
  you've been doing it yourself plus managing the
  2-person design team and the demand gen specialist.

  New hire details:
  - Title: Marketing Manager
  - Reports to: VP of Marketing (you)
  - Direct reports: None initially (may hire a
    content writer in 6 months)
  - Experience: 5 years in content marketing at
    a larger company
  - Start date: Next Monday

  Context they need to understand:
  - Product: Project management SaaS for agencies
  - Target audience: Creative and digital agencies,
    25-200 employees
  - Current state: Blog exists but inconsistent
    (2 posts/month), email list of 5,000 subscribers,
    basic SEO but no strategy, no content calendar
  - Key stakeholders: Product team (for feature
    content), Sales team (for case studies), CEO
    (for thought leadership)
  - Tools: HubSpot (CRM + email), WordPress (blog),
    Ahrefs (SEO), Figma (with design team)
  - Budget: $3K/month for content marketing

  Create a 30-60-90 day plan:
  - Days 1-30 (Learn): Understand the product,
    customers, market, and current state
  - Days 31-60 (Contribute): Start producing
    and improving
  - Days 61-90 (Lead): Own the function and show
    results

  For each phase include:
  - 3-5 specific learning objectives
  - Key activities and deliverables
  - People to meet and why
  - Success criteria (how you'll know they're
    on track)
  - Check-in schedule with the VP

  Also include:
  - Pre-boarding task list (what to prepare before
    they start)
  - First-day agenda
  - Week 1 detailed schedule

  Task: Write the complete 30-60-90 day onboarding
  plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete 30-60-90 plan — each phase has 3-5 learning objectives, key activities and deliverables, people to meet with rationale, measurable success criteria, and check-in schedule; pre-boarding task list; first-day agenda; Week 1 detailed schedule."
    weight: 0.35
    description: "ThirtySixtyNinetyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding plan expertise — the progression from learn to contribute to lead is realistic; learning objectives are specific to the role and context; success criteria are measurable and achievable; the people-to-meet list covers necessary stakeholders; the plan accounts for the startup context (wearing multiple hats, limited resources); deliverables in the 31-60 phase are realistic for someone still learning."
    weight: 0.35
    description: "OnboardingPlanExpertise"
  - type: llm_judge
    criteria: "Response would successfully onboard the marketing manager — they'd understand the product and audience by Day 30; they'd be producing quality content by Day 60; they'd be running the content function independently by Day 90; the VP would have clear criteria to assess progress; the marketing manager would feel supported without being micromanaged; the company would see measurable marketing improvement within 90 days."
    weight: 0.30
    description: "ManagerOnboardingOutcome"
