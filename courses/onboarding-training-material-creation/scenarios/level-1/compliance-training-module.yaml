meta:
  id: compliance-training-module
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create a compliance training module for new hires covering workplace harassment prevention, data privacy, and safety procedures"
  tags: [compliance, harassment-prevention, data-privacy, safety, beginner]

state: {}

trigger: |
  You're the compliance coordinator at a 200-person
  healthcare technology company. Federal and state
  regulations require all new hires to complete
  compliance training within their first 30 days.
  Current training is a 2-hour video from 2019 that
  employees clearly tune out (you can see completion
  times of 45 minutes for a 2-hour video — they're
  fast-forwarding). Your compliance officer wants
  an engaging, interactive training module.

  Topics to cover (all legally required):
  1. Workplace Harassment Prevention (45 min):
     - Definition of harassment (sexual, racial,
       disability-based)
     - Examples of harassment vs. appropriate
       workplace behavior
     - Reporting procedures (3 channels: manager,
       HR, anonymous hotline)
     - Bystander intervention techniques
     - Retaliation protection

  2. Data Privacy and HIPAA (30 min):
     - What PHI (Protected Health Information) is
     - Handling PHI in daily work (emails, Slack,
       shared drives)
     - Breach reporting requirements
     - Clean desk and clean screen policies
     - 5 common HIPAA violation scenarios

  3. Workplace Safety (15 min):
     - Emergency exits and assembly points
     - First aid kit locations
     - Incident reporting procedure
     - Ergonomic workstation setup
     - Work-from-home safety considerations

  Create the complete training module:
  - Module outline with learning objectives per
    section
  - Content for each section (written as facilitator
    notes or e-learning script)
  - 3 interactive scenarios per topic (choose-your-
    own-adventure style decision points)
  - Knowledge check quiz (5 questions per topic,
    15 total, with answer key)
  - Completion certificate template
  - Annual refresher training outline (condensed
    30-minute version)

  Task: Write the complete compliance training
  module.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete compliance module — learning objectives for each section; content covering harassment prevention, HIPAA/data privacy, and workplace safety; 3 interactive scenarios per topic (9 total); 15-question knowledge check with answer key; completion certificate template; annual refresher outline."
    weight: 0.35
    description: "ComplianceModuleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance training expertise — harassment examples are realistic and nuanced (not obvious); HIPAA scenarios reflect actual healthtech work (Slack messages with PHI, shared drives); the interactive scenarios have meaningful decision points; knowledge check questions test application, not just recall; the refresher training focuses on updates and reinforcement."
    weight: 0.35
    description: "ComplianceTrainingExpertise"
  - type: llm_judge
    criteria: "Response would produce effective compliance training — employees would actually engage (not fast-forward); they'd recognize harassment and know how to report; they'd handle PHI correctly in daily work; the company would meet regulatory requirements; the interactive scenarios would create genuine learning moments; the annual refresher would maintain awareness."
    weight: 0.30
    description: "ComplianceEffectivenessOutcome"
