meta:
  id: welcome-packet-creation
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create a new hire welcome packet for a mid-size marketing agency including company overview, first-day logistics, and key contacts"
  tags: [welcome-packet, first-day, logistics, beginner]

state: {}

trigger: |
  You're the HR coordinator at a 75-person digital
  marketing agency. New hires have been showing up
  on Day 1 confused about where to park, what to
  wear, and who to talk to. Your manager wants a
  professional welcome packet sent to every new
  hire 1 week before their start date.

  Company details:
  - Name: BrightSpark Digital
  - Industry: Digital marketing agency
  - Size: 75 employees
  - Location: Downtown office, 3rd floor of a
    shared building
  - Culture: Creative, casual dress, flexible
    hours (core hours 10-4), dog-friendly office
  - Perks: Free snacks, monthly team lunches,
    learning stipend ($500/year)

  Welcome packet must include:
  - Warm welcome letter from the CEO (tone: excited,
    personal, not corporate)
  - Company overview: mission, values, what makes
    BrightSpark different
  - First day logistics: arrival time, parking/
    transit info, building entry, what to bring,
    dress code, lunch plans
  - First week schedule template (Monday-Friday)
  - Key contacts list: manager, HR buddy, IT
    support, office manager
  - Technology setup info: laptop pickup, accounts
    they'll receive (Slack, email, project tools)
  - Benefits enrollment reminder (30-day window)
  - FAQ section (10 common new hire questions with
    answers)

  Task: Write the complete welcome packet.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete welcome packet — CEO welcome letter; company overview with mission and values; first-day logistics (parking, building entry, dress, lunch); first-week schedule template; key contacts list; technology setup info; benefits reminder; FAQ with 10 common questions and answers."
    weight: 0.35
    description: "WelcomePacketCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding expertise — the CEO letter is warm and personal (not generic corporate); logistics are specific enough to be useful; the FAQ addresses real new-hire anxieties; the tone matches a creative agency culture; the packet reduces first-day confusion; the first-week schedule balances orientation with starting real work."
    weight: 0.35
    description: "OnboardingExpertise"
  - type: llm_judge
    criteria: "Response would make a new hire feel welcome and prepared — they'd arrive confident about logistics; they'd understand the company culture before walking in; they'd know who to contact for different needs; the packet would reduce anxiety and build excitement; BrightSpark would make a strong first impression."
    weight: 0.30
    description: "NewHireExperienceOutcome"
