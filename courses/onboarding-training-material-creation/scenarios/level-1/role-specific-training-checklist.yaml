meta:
  id: role-specific-training-checklist
  level: 1
  course: onboarding-training-material-creation
  type: output
  description: "Create a role-specific onboarding checklist and training guide for a new customer support representative"
  tags: [role-specific, checklist, customer-support, training-guide, beginner]

state: {}

trigger: |
  You're the customer support team lead at an
  e-commerce company (online pet supplies). You're
  hiring 2 new customer support reps who will
  handle email, chat, and phone inquiries. Currently,
  training is inconsistent — whoever's available
  sits with the new person for a few days, and
  they're expected to figure it out. Your manager
  wants a structured training plan.

  Role details:
  - Title: Customer Support Representative
  - Reports to: Customer Support Team Lead (you)
  - Team size: 8 reps + 1 team lead
  - Tools: Zendesk (ticketing), Shopify (orders),
    Slack (internal), phone system (RingCentral)
  - Channels: Email (60%), live chat (30%),
    phone (10%)
  - Common inquiries: Order status, returns/
    exchanges, product questions, shipping issues,
    billing disputes, pet food recommendations
  - Performance metrics: First response time
    (<2 hours email, <30 sec chat), resolution
    rate (>90%), CSAT (>4.5/5), tickets per day
    (target: 40 after 30 days)

  Create:
  1. Week-by-week training plan (4 weeks)
     - Week 1: Observe, learn tools, study products
     - Week 2: Handle easy tickets with supervision
     - Week 3: Handle all ticket types, some
       independent
     - Week 4: Fully independent with daily check-ins

  2. Daily training checklist for Week 1
     (Monday-Friday, what to cover each day)

  3. Quick reference guide for common scenarios:
     - "Where is my order?"
     - "I want to return this"
     - "My item arrived damaged"
     - "Cancel my subscription"
     - "This product isn't right for my pet"
     (For each: steps to resolve, templates, when
     to escalate)

  4. Knowledge assessment (15 questions to confirm
     readiness at end of Week 2)

  Task: Write the complete role-specific onboarding
  package.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete onboarding package — 4-week training plan with progressive independence; daily Week 1 checklist (Mon-Fri); quick reference guide for 5 common scenarios with steps, templates, and escalation criteria; 15-question knowledge assessment for Week 2 readiness."
    weight: 0.35
    description: "RoleOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates customer support onboarding expertise — the 4-week plan progressively builds confidence; Week 1 daily checklist covers tools, products, and processes logically; the quick reference scenarios include realistic customer language; response templates are empathetic and professional; escalation criteria are clear; the knowledge assessment tests practical readiness, not memorization."
    weight: 0.35
    description: "SupportTrainingExpertise"
  - type: llm_judge
    criteria: "Response would produce a competent support rep in 4 weeks — a new hire following this plan would reach 40 tickets/day by Week 4; they'd handle common scenarios confidently; they'd know when to escalate; CSAT scores would be maintained; the training would be consistent across all future hires; the team lead wouldn't need to ad-hoc train each person."
    weight: 0.30
    description: "RepReadinessOutcome"
