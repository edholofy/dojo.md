meta:
  id: onboarding-content-strategy
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Develop an enterprise onboarding content strategy — content architecture, modular design system, personalization framework, and content lifecycle management for a rapidly scaling company"
  tags: [content-strategy, modular-design, personalization, content-lifecycle, expert]

state: {}

trigger: |
  You're the Director of Learning Content Strategy
  at a 4,000-person enterprise software company that
  acquires 2-3 companies per year. The onboarding
  content challenge is enormous: 200+ onboarding
  documents exist across the company, many are
  outdated, contradictory, or redundant. Each
  acquisition brings another set of materials that
  need to be integrated. The company has 15 product
  lines and hires across engineering, sales, customer
  success, marketing, and G&A functions.

  The CEO wants onboarding content that is "always
  current, always relevant, and never overwhelming."

  Design the complete onboarding content strategy:

  1. Content Architecture
  - Content taxonomy (how all onboarding content
    is categorized, tagged, and organized)
  - Modular content design system (content blocks
    that can be assembled into personalized journeys)
  - Content layers: Company-wide → Division →
    Department → Role → Individual
  - Content types: Reference (look up), Learning
    (complete), Action (do now), Social (connect)
  - Content format standards (when to use video,
    interactive, text, infographic, checklist)
  - Single-source-of-truth architecture (one source,
    many delivery channels)

  2. Personalization Framework
  - New hire profile attributes that drive
    personalization (role, level, location, product
    line, prior experience, learning preferences)
  - Content selection algorithm (given a new hire
    profile, which content blocks are assembled)
  - Adaptive sequencing (order and pacing based on
    engagement signals)
  - "Smart defaults" with override capability
  - Personalization examples for 5 different new
    hire personas
  - Balance between personalization and shared
    experience

  3. Content Creation and Governance
  - Content ownership model (who creates, reviews,
    approves each content type)
  - SME engagement framework (how to get busy
    experts to contribute content)
  - Content quality standards and style guide
  - Review and update cadence (quarterly, event-
    driven, continuous)
  - Content retirement process (how outdated
    content is archived)
  - Acquisition content integration playbook (when
    a new company is acquired, how their onboarding
    content is assessed and integrated)

  4. Content Lifecycle Management
  - Content freshness monitoring (automated checks
    for outdated information)
  - Product change → content update workflow
    (when a product changes, which onboarding
    content needs updating)
  - Version control and change tracking
  - Content analytics (which content is consumed,
    skipped, rated poorly)
  - Continuous improvement based on new hire
    feedback and completion data
  - Annual content audit methodology

  5. Technology and Tools
  - Content management system requirements
  - Authoring tools and templates
  - Content delivery platform specifications
  - Integration with HRIS, LMS, and product
    documentation systems
  - AI-assisted content creation and maintenance
    opportunities

  6. Migration Plan
  - Audit of existing 200+ documents
  - Prioritization framework (what to migrate first)
  - Content consolidation methodology (merging
    redundant documents)
  - 6-month migration timeline with milestones
  - Change management for content owners
  - Success metrics for the migration

  Task: Write the complete onboarding content
  strategy with all frameworks and templates.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete content strategy — content architecture with taxonomy, modular design, and layers; personalization framework with profile attributes, selection algorithm, and 5 persona examples; content creation governance with ownership model, SME engagement, and style guide; lifecycle management with freshness monitoring, version control, and analytics; technology requirements; 6-month migration plan with audit methodology."
    weight: 0.35
    description: "ContentStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content strategy expertise — the modular design system enables meaningful personalization without creating chaos; the acquisition integration playbook addresses the real challenge of frequent M&A; the content freshness monitoring would prevent the outdated content problem; the SME engagement framework gets busy experts to contribute; the personalization balances relevance with shared experience; the migration plan is realistic for 200+ documents."
    weight: 0.35
    description: "ContentStrategyExpertise"
  - type: llm_judge
    criteria: "Response would solve the content chaos — new hires would receive relevant, current content instead of generic binders; content would stay fresh as products change; acquisitions would be integrated smoothly; the modular system would scale with company growth; content owners would have clear responsibilities; the CEO's vision of 'always current, always relevant, never overwhelming' would be achieved."
    weight: 0.30
    description: "ContentStrategyOutcome"
