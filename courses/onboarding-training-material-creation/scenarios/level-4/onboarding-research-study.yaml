meta:
  id: onboarding-research-study
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Design and write a research study on the relationship between onboarding quality and long-term employee outcomes across 50 companies"
  tags: [research-study, longitudinal, employee-outcomes, evidence-based, expert]

state: {}

trigger: |
  You're a professor of organizational psychology
  conducting a large-scale study on onboarding
  effectiveness. Your research grant ($500K from
  SHRM Foundation) funds a 3-year longitudinal
  study: "From Day One to Year Three: How Onboarding
  Quality Predicts Employee Success, Engagement,
  and Retention."

  Study design:
  - 50 participating companies across 5 industries
  - 5,000 new hires tracked over 3 years
  - Research questions:
    1. Which onboarding practices most strongly
       predict 3-year retention?
    2. How does onboarding quality affect time to
       productivity and performance trajectory?
    3. What moderating factors (industry, role
       level, remote vs. in-person, company size)
       influence onboarding effectiveness?
    4. What is the ROI of onboarding investment?

  Write the complete research paper:

  1. Introduction (literature review):
  - Current state of onboarding research (gaps)
  - Theoretical framework (organizational
    socialization theory, Bauer's proximal and
    distal outcomes model, newcomer adjustment)
  - Hypotheses (8-10 specific, testable)

  2. Method:
  - Participants and company selection
  - Onboarding Quality Index (your measurement
    instrument — 45-item assessment of program
    quality)
  - Employee outcome measures (retention, performance,
    engagement, role clarity, social integration,
    time to productivity)
  - Data collection timeline and procedures
  - Statistical analysis plan (HLM, path analysis,
    moderation/mediation)

  3. Results (realistic fictional data):
  - Descriptive statistics
  - Main effects (which onboarding practices
    predict which outcomes)
  - Moderation analyses (industry, role level,
    remote/in-person)
  - ROI analysis
  - Unexpected findings

  4. Discussion:
  - Theoretical implications
  - Practical implications for HR practitioners
  - Limitations and future research
  - The "Onboarding Quality Index" as a diagnostic
    tool

  5. Appendices:
  - Complete Onboarding Quality Index (45-item
    instrument)
  - Company onboarding profile template
  - New hire survey instruments (Day 30, 90, Year 1,
    Year 2, Year 3)

  Task: Write the complete research paper with
  instruments.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete research paper — literature review with theoretical framework; 8-10 specific hypotheses; method with 45-item Onboarding Quality Index, outcome measures, and statistical analysis plan; results with realistic data including main effects, moderations, and ROI; discussion with theoretical and practical implications; appendices with complete OQI instrument, company profile template, and new hire surveys."
    weight: 0.35
    description: "ResearchPaperCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the Onboarding Quality Index measures meaningful onboarding dimensions; the longitudinal design captures what cross-sectional studies miss; the HLM analysis accounts for nesting within companies; the moderation analyses reveal when practices work best; the fictional data tells a nuanced story; the OQI could be used as a practical diagnostic tool."
    weight: 0.35
    description: "ResearchMethodExpertise"
  - type: llm_judge
    criteria: "Response would advance the onboarding field — the study would fill significant evidence gaps; the OQI would become a standard measurement tool; HR practitioners would know which onboarding practices to prioritize; the ROI analysis would justify onboarding investment to CFOs; the paper would be published in a top management journal; the findings would change how companies design onboarding."
    weight: 0.30
    description: "FieldAdvancementOutcome"
