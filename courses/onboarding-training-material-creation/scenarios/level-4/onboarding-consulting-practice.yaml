meta:
  id: onboarding-consulting-practice
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Build a complete onboarding consulting practice — service offerings, diagnostic methodology, client engagement model, and three detailed client proposals"
  tags: [consulting-practice, diagnostic-methodology, client-proposals, service-design, expert]

state: {}

trigger: |
  You're launching an onboarding consulting practice
  after 15 years as a corporate L&D leader. Your
  niche: helping mid-market companies (500-5,000
  employees) transform their onboarding from
  administrative compliance into strategic talent
  acceleration. You've seen every onboarding failure
  mode and know what works.

  Build your complete consulting practice:

  1. Service Portfolio (5-7 service offerings)
  - Onboarding Health Assessment (diagnostic)
  - Onboarding Program Design (full build)
  - Onboarding Technology Selection & Implementation
  - Manager Onboarding Capability Building
  - Onboarding Metrics & Analytics Setup
  - Executive Onboarding (specialized C-suite program)
  - Ongoing Onboarding Optimization Retainer

  For each service, define:
  - Service description and deliverables
  - Typical engagement duration
  - Pricing model (fixed, retainer, hybrid)
  - Ideal client profile
  - Sales qualification criteria

  2. Diagnostic Methodology: "Onboarding Health
  Assessment"
  - Assessment framework (8-10 dimensions of
    onboarding health)
  - Data collection methods (stakeholder interviews,
    new hire surveys, process mapping, document review,
    hiring manager assessment)
  - Scoring rubric (1-5 maturity scale per dimension)
  - Benchmarking methodology (how you compare to
    industry standards)
  - Report template structure
  - Presentation format for findings and recommendations

  3. Three Client Proposals
  Write three complete proposals for different clients:

  Proposal A: Series B SaaS startup (350 employees,
  tripling headcount in 18 months, no formal onboarding,
  founders do ad-hoc orientation)

  Proposal B: Regional hospital network (2,800 employees,
  clinical and non-clinical onboarding, Joint Commission
  compliance, nursing shortage retention crisis)

  Proposal C: Professional services firm (1,200
  employees, 40% annual new-grad hiring, high first-
  year attrition, multiple office locations, partner
  track expectations)

  Each proposal must include:
  - Executive summary
  - Understanding of client's situation
  - Proposed approach and methodology
  - Detailed scope and deliverables
  - Timeline with milestones
  - Investment (pricing with options)
  - Expected outcomes and ROI
  - Team and qualifications
  - Case study or reference

  4. Client Engagement Model
  - Discovery and scoping process
  - Statement of work template
  - Project governance structure
  - Change management approach
  - Knowledge transfer and sustainability plan
  - Success measurement framework

  Task: Write the complete consulting practice
  materials with all three proposals.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete consulting practice — 5-7 service offerings with descriptions, pricing, and qualification criteria; diagnostic methodology with 8-10 dimensions, scoring rubric, and benchmarking; three detailed proposals for SaaS startup, hospital network, and professional services firm each with executive summary, approach, scope, timeline, pricing, and ROI; client engagement model with discovery, SOW, governance, and sustainability."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates onboarding consulting expertise — the diagnostic methodology measures meaningful dimensions of onboarding maturity; pricing reflects market rates for mid-market consulting; the three proposals address distinctly different challenges (hypergrowth, clinical compliance, professional services attrition); the engagement model ensures knowledge transfer; the ROI projections are credible and specific to each client's situation."
    weight: 0.35
    description: "ConsultingExpertise"
  - type: llm_judge
    criteria: "Response would win consulting engagements — proposals would pass CFO scrutiny; the diagnostic methodology would reveal actionable insights; clients would choose this practice over competitors; the service portfolio covers the full onboarding lifecycle; the engagement model builds long-term client relationships; the practice would be financially viable and scalable."
    weight: 0.30
    description: "ConsultingViabilityOutcome"
