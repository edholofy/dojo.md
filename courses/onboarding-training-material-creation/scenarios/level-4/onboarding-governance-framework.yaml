meta:
  id: onboarding-governance-framework
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Design an enterprise onboarding governance framework — policies, standards, compliance architecture, audit methodology, and continuous improvement system for a regulated multinational"
  tags: [governance-framework, compliance, audit, standards, expert]

state: {}

trigger: |
  You're the Chief Learning Officer at a multinational
  financial services company (25,000 employees, 30
  countries, 4 business divisions: retail banking,
  investment banking, wealth management, insurance).
  After a regulatory audit found inconsistent
  onboarding across divisions — some new hires in
  regulated roles started client-facing work before
  completing mandatory training — you've been tasked
  with creating an enterprise onboarding governance
  framework.

  The stakes are high: regulatory fines for non-
  compliance in financial services can reach hundreds
  of millions. Three regulators (SEC, FCA, MAS) have
  different requirements. The company has 3,500 new
  hires annually across all divisions.

  Design the complete governance framework:

  1. Onboarding Policy Architecture
  - Enterprise Onboarding Policy (the "constitution"
    that all divisions must follow)
  - Division-specific policy supplements (what each
    division adds for its regulatory context)
  - Country-specific compliance addenda (how local
    labor law and regulations modify the base policy)
  - Policy hierarchy and conflict resolution
    (when policies conflict, which takes precedence)
  - Policy approval and update process
  - Write the complete Enterprise Onboarding Policy
    document

  2. Onboarding Standards and Requirements
  - Mandatory onboarding elements (non-negotiable
    across all divisions and countries)
  - Regulatory training requirements by division
    and jurisdiction (SEC Series licensing, FCA
    conduct rules, MAS competency framework)
  - Time-to-completion requirements (what must be
    done before client contact, before system access,
    before solo work)
  - Documentation and record-keeping standards
  - Manager accountability requirements
  - Escalation procedures for non-compliance

  3. Compliance Architecture
  - Automated compliance tracking system design
  - Real-time dashboard for completion rates by
    division, country, and role type
  - Early warning system for at-risk completions
  - Regulatory reporting templates (what each
    regulator needs to see)
  - Evidence of completion standards (what counts
    as "completed" for audit purposes)
  - Integration with HR systems and LMS

  4. Audit Methodology
  - Annual onboarding audit plan
  - Audit criteria and scoring rubric
  - Sample audit report template
  - Remediation tracking process
  - Lessons learned and pattern analysis
  - External audit preparation guide

  5. Continuous Improvement System
  - Quarterly onboarding effectiveness review process
  - New hire feedback integration methodology
  - Regulatory change management process (when
    regulations change, how onboarding updates)
  - Best practice sharing across divisions
  - Innovation pipeline (testing new approaches)
  - Annual onboarding benchmarking against industry

  6. Governance Bodies and Roles
  - Enterprise Onboarding Council (charter, members,
    cadence, decision rights)
  - Division Onboarding Leads (role description,
    accountability)
  - Country Compliance Officers (onboarding
    responsibilities)
  - RACI matrix for all governance activities
  - Escalation path from local issue to enterprise
    response

  Task: Write the complete onboarding governance
  framework with all policy documents and templates.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — enterprise policy document; division-specific supplements; country addenda approach; onboarding standards with regulatory requirements; compliance architecture with tracking, dashboards, and reporting; audit methodology with criteria, report template, and remediation; continuous improvement system; governance bodies with charter, RACI, and escalation paths."
    weight: 0.35
    description: "GovernanceFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates governance and regulatory expertise — the policy hierarchy resolves conflicts logically; regulatory requirements for SEC, FCA, and MAS are differentiated correctly; compliance tracking addresses real audit needs; the audit methodology would satisfy external regulators; the continuous improvement system prevents future compliance gaps; the governance bodies have clear decision rights without creating bureaucratic paralysis."
    weight: 0.35
    description: "GovernanceRegulatoryExpertise"
  - type: llm_judge
    criteria: "Response would protect the organization — regulators would find the framework satisfactory; the compliance architecture would catch non-compliance before it becomes a regulatory finding; the audit methodology would identify systemic issues; the governance bodies would balance enterprise consistency with division autonomy; the framework would scale across 30 countries; regulatory fines would be prevented through systematic compliance."
    weight: 0.30
    description: "GovernanceProtectionOutcome"
