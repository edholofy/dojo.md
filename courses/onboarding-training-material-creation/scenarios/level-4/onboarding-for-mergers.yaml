meta:
  id: onboarding-for-mergers
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Design a comprehensive Day 1 readiness and cultural integration onboarding program for a $2B merger of equals — covering 8,000 employees across both legacy organizations"
  tags: [merger-integration, day-one-readiness, cultural-integration, large-scale, expert]

state: {}

trigger: |
  You're the Chief People Officer overseeing the
  merger integration of two mid-size insurance
  companies into one combined entity. Company A
  (Meridian Insurance, 5,000 employees, traditional
  culture, 80-year history) is acquiring Company B
  (Nexus Insurance, 3,000 employees, digital-first
  culture, 15-year history). The merger closes in
  90 days.

  The challenge: On Day 1 of the combined company,
  8,000 employees will wake up working for a company
  that didn't exist the day before. They need to
  understand the new organization, their role in it,
  their new manager (40% of employees will have a
  new reporting structure), new systems (migrating
  to a unified tech stack over 18 months), and a
  new culture that blends both legacies.

  Historical context: 70% of mergers fail to achieve
  projected synergies, and the #1 reason is cultural
  integration failure. Employee attrition in the
  first year post-merger averages 25%. You need to
  beat those odds.

  Design the complete merger onboarding program:

  1. Pre-Close Preparation (90 days before Day 1)
  - Employee communication plan (what can be said
    before close due to SEC restrictions)
  - Manager preparation program (preparing 600
    managers for the new organization)
  - System and process documentation (what changes,
    what stays)
  - Cultural assessment of both companies (values,
    norms, communication styles, decision-making)
  - "Future state" organization design and how it's
    communicated
  - Retention risk assessment and key talent strategy

  2. Day 1 Experience Design
  - Unified Day 1 event (in-person + virtual for
    all 8,000 employees)
  - CEO message and vision for the combined company
  - New brand, mission, and values unveiling
  - "What this means for you" personalized guide
    by employee segment (staying in same role, moving
    to new team, moving to new location, role TBD)
  - New manager introduction protocol
  - Systems access and technology transition guide
  - FAQ document addressing the top 50 employee
    concerns
  - Day 1 welcome kit (physical and digital)

  3. First 90 Days Integration Onboarding
  - Week 1: Orientation to the new organization
    (structure, leadership, strategy)
  - Week 2-4: Team integration activities (building
    relationships across legacy company lines)
  - Month 2: Process and system integration training
    (new workflows, tools, policies)
  - Month 3: Culture integration workshops
    (creating shared norms, not "Company A's way"
    or "Company B's way" but "our way")
  - Throughout: Manager-led integration conversations
    (structured 1:1 guides)

  4. Cultural Integration Program
  - Cultural values definition process (blending
    both companies' best attributes)
  - "Best of Both" workshop design (identifying and
    adopting best practices from each company)
  - Cross-pollination program (pairing employees
    from both legacy companies)
  - Cultural ambassador network (100 employees from
    both companies)
  - Culture conflict resolution protocol (when
    "the way we've always done it" clashes)
  - Integration sentiment pulse surveys (weekly for
    first 90 days, then monthly)

  5. Manager Integration Toolkit
  - "Leading Through Merger" guide for all 600
    managers
  - Team integration facilitation guide
  - Having difficult conversations about change
  - Supporting anxious or resistant employees
  - Identifying and escalating retention risks
  - Performance management during transition
    (grace periods, modified expectations)

  6. Special Populations
  - Employees whose roles are eliminated (transition
    onboarding to outplacement)
  - Employees relocating to new offices
  - Employees keeping the same role but getting new
    systems, processes, or managers
  - Key talent with competing offers (retention
    onboarding)
  - Employees in regulated roles requiring
    re-licensing or re-certification

  7. Measurement Framework
  - Integration health scorecard (employee sentiment,
    attrition, productivity, cultural alignment)
  - 30/60/90-day pulse surveys
  - Manager integration effectiveness ratings
  - Synergy realization tracking tied to people
    integration
  - Year 1 integration retrospective

  Task: Write the complete merger onboarding and
  integration program.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete merger onboarding program — pre-close preparation with SEC-compliant communication and cultural assessment; Day 1 experience for 8,000 employees with personalized guides and FAQ; 90-day integration journey with weekly activities; cultural integration with values blending, cross-pollination, and ambassador network; manager toolkit with difficult conversations guide; special populations including eliminated roles; measurement framework with integration health scorecard."
    weight: 0.35
    description: "MergerOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates merger integration expertise — SEC communication restrictions are respected in pre-close phase; cultural assessment goes beyond surface-level; Day 1 addresses the emotional reality of merger anxiety; the cultural integration creates 'our way' rather than imposing one company's culture; the manager toolkit handles the specific challenges of merger leadership; special populations receive appropriately different treatment; the measurement framework tracks both people and synergy outcomes."
    weight: 0.35
    description: "MergerIntegrationExpertise"
  - type: llm_judge
    criteria: "Response would beat merger failure odds — first-year attrition would stay below 15% (vs. 25% average); cultural integration would create genuine cohesion, not surface compliance; managers would be equipped to lead through uncertainty; employees would feel informed and valued; the combined company would achieve synergy targets because people integration succeeded; the merger would be cited as a best-practice case study."
    weight: 0.30
    description: "MergerSuccessOutcome"
