meta:
  id: enterprise-onboarding-transformation
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Lead an enterprise-wide onboarding transformation at a 10,000-person company — strategy, technology, governance, change management, and ROI across all business units"
  tags: [enterprise-transformation, strategic-initiative, governance, roi, expert]

state: {}

trigger: |
  You've been hired as the VP of Employee Experience
  at a 10,000-person global financial services
  company. The CEO has made "employee experience"
  a board-level priority after Glassdoor reviews
  cited onboarding as the #1 complaint. You have
  a $2M budget and 18 months to transform
  onboarding across 5 business units, 15 countries,
  and 200+ job families.

  Current state:
  - Each business unit runs its own onboarding
    (quality varies from excellent to abysmal)
  - No shared technology platform
  - New hire surveys: 2.4/5.0 overall satisfaction
  - First-year turnover: 28% (industry avg: 18%)
  - Time to productivity: 7 months avg (best-in-
    class: 3.5 months)
  - Cost of turnover: $45K per exempt employee
  - 2,200 new hires annually
  - The company is simultaneously undergoing a
    digital transformation (moving to cloud, new
    ERP)

  Design the complete transformation:

  1. Strategic Vision and Business Case
  - Enterprise onboarding vision and principles
  - Current state assessment methodology
  - Financial business case (cost of poor onboarding,
    ROI of investment)
  - Board presentation on the strategic importance
    of onboarding
  - Success metrics and 3-year targets

  2. Enterprise Architecture
  - "Global core + local flex" model adapted for
    5 business units
  - Technology platform selection criteria and
    RFP framework
  - Integration with existing HRIS (Workday),
    LMS, and digital transformation initiatives
  - Data architecture (what to measure, where
    data lives, how it flows)
  - Content management system design

  3. Program Design
  - Pre-boarding experience (acceptance to Day 1)
  - Day 1 experience (universal and business-unit-
    specific)
  - First 90 days journey map by job family
  - Manager onboarding accountability system
  - Buddy/mentor program at scale
  - Compliance training integration

  4. Governance Model
  - Enterprise Onboarding Council (who, what, when)
  - Business unit onboarding lead roles
  - Content ownership and update responsibilities
  - Quality assurance and audit process
  - Continuous improvement methodology
  - Decision rights (what's centralized vs.
    distributed)

  5. Change Management
  - Stakeholder analysis across 5 business units
  - Resistance management (business units with
    "good" programs resisting standardization)
  - Executive sponsorship model
  - Communication campaign
  - Pilot strategy (which BU first, success
    criteria)
  - Phased rollout across 18 months

  6. Measurement and Reporting
  - Enterprise onboarding scorecard
  - Business unit comparison dashboards
  - Executive reporting cadence
  - Continuous improvement triggers
  - Annual program effectiveness review

  Task: Write the complete enterprise onboarding
  transformation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise plan — strategic vision with business case and board presentation; enterprise architecture with technology, HRIS integration, and data design; program design with pre-boarding through 90 days; governance model with council, roles, and decision rights; change management with stakeholder analysis, resistance management, and pilot strategy; measurement with scorecards, dashboards, and executive reporting."
    weight: 0.35
    description: "EnterpriseTransformationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise HR transformation expertise — the business case quantifies the cost of poor onboarding convincingly; the technology platform selection is rigorous; the 'global core + local flex' model respects business unit autonomy while ensuring consistency; change management addresses resistance from strong existing programs; the governance model is sustainable, not bureaucratic; the $2M budget is allocated strategically across 18 months."
    weight: 0.35
    description: "EnterpriseHRExpertise"
  - type: llm_judge
    criteria: "Response would transform enterprise onboarding — new hire satisfaction would improve from 2.4 to 4.0+; first-year turnover would decrease from 28% to 18% or below; time to productivity would halve; the board would see clear ROI; the transformation would survive leadership changes because it's institutionalized; the 10,000-person company would become an employer of choice for onboarding experience."
    weight: 0.30
    description: "EnterpriseTransformationOutcome"
