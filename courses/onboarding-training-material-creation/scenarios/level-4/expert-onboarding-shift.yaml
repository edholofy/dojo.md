meta:
  id: expert-onboarding-shift
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Expert shift simulation — design onboarding for three high-stakes contexts: a space agency's astronaut crew integration, a professional sports franchise's coaching staff rebuild, and a humanitarian organization's crisis deployment rapid onboarding"
  tags: [shift-simulation, astronaut, sports-franchise, humanitarian, expert]

state: {}

trigger: |
  You're a world-class onboarding design consultant.
  Three extraordinary clients need your expertise
  simultaneously. Each represents a unique, high-
  stakes onboarding challenge.

  === CLIENT 1: Space Agency Crew Integration ===
  A private space company (like SpaceX or Blue Origin)
  is preparing for its first long-duration mission
  (6 months). The crew of 6 includes 2 company
  astronauts, 2 international partner astronauts
  (ESA and JAXA), 1 mission specialist from a
  university research team, and 1 commercial payload
  specialist from a pharmaceutical company.

  Challenge: These 6 people have never worked together
  as a crew. They come from 4 different organizations
  with different cultures, communication styles, and
  authority structures. They'll be in a confined
  space with no escape for 6 months. Interpersonal
  conflicts in space have historically been mission-
  threatening.

  Design the crew integration onboarding program:
  - 12-month pre-mission team building and integration
  - Cross-training on each other's experiments and
    responsibilities
  - Communication protocols (with mission control
    and between crew members)
  - Conflict resolution framework for confined
    environments
  - Cultural sensitivity training (4 nationalities)
  - Emergency procedure joint training
  - Crew resource management (adapted from aviation)
  - Family integration program (supporting families
    during mission)
  - Psychological preparation for isolation
  - Re-integration plan for post-mission return

  === CLIENT 2: Professional Sports Franchise
  Coaching Staff Rebuild ===
  An NFL team has fired its entire coaching staff
  and hired a new head coach with a completely
  different philosophy. The new head coach is bringing
  15 assistant coaches (most from different teams),
  and they need to be integrated and operational in
  10 weeks before training camp begins. Meanwhile,
  60 players, 40 front office staff, and the owner
  are watching anxiously.

  Challenge: Coaching staffs are hierarchical but
  also deeply collaborative. Each coach brings
  schemes, terminology, and habits from their previous
  team. They need to develop a unified system in
  weeks, not months. The media scrutinizes every move.

  Design the coaching staff onboarding program:
  - Coach onboarding timeline (10 weeks to training
    camp)
  - Scheme installation and terminology unification
  - Support staff integration (strength coaches,
    trainers, analysts, equipment)
  - Technology systems onboarding (film study, data
    analytics, communication platforms)
  - Player relationship transfer (how new coaches
    build trust with returning players)
  - Front office and scouting coordination
  - Media training and brand alignment
  - Community and sponsor relationship orientation
  - Family relocation support (15 families moving
    to a new city)
  - Organizational culture and owner expectations

  === CLIENT 3: Humanitarian Organization Crisis
  Deployment Rapid Onboarding ===
  An international humanitarian organization (like
  MSF/Doctors Without Borders or UNHCR) deploys
  teams to crisis zones with 48-72 hours notice.
  A massive earthquake has struck, and they need to
  deploy 200 people (medical, logistics, water/
  sanitation, protection, communications) to a
  country where they have no existing presence.

  Challenge: These 200 people come from 30 countries,
  speak different languages, have varying field
  experience, and must become a functioning operation
  within days of arrival in a chaotic, dangerous
  environment with destroyed infrastructure.

  Design the crisis deployment onboarding:
  - Pre-deployment rapid briefing package (delivered
    digitally within 12 hours of activation)
  - Country context briefing (culture, language,
    political situation, security landscape)
  - Security protocols and evacuation procedures
  - Team structure and coordination mechanisms
  - Medical protocols and self-care in austere
    environments
  - Cultural sensitivity and "do no harm" principles
  - Communication systems and reporting requirements
  - Logistics and supply chain orientation
  - Coordination with local government and other
    agencies
  - Psychological first aid and staff wellbeing
  - Handover procedures for when deployment ends
  - Post-deployment reintegration support

  Task: Write all three complete onboarding programs
  for these extraordinary contexts.

assertions:
  - type: llm_judge
    criteria: "Response creates three complete programs — Space crew integration with 12-month team building, cross-training, conflict resolution for confined environments, cultural sensitivity, and post-mission reintegration; Sports coaching rebuild with 10-week timeline, scheme unification, player trust-building, and media training; Humanitarian deployment with 48-72 hour mobilization, security protocols, country briefing, inter-agency coordination, and post-deployment reintegration."
    weight: 0.35
    description: "ExtraordinaryOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across extraordinary contexts — the space program addresses the real psychology of isolation and confined environments; the sports franchise handles the unique dynamics of coaching hierarchies, player relationships, and media pressure; the humanitarian deployment balances speed with safety and cultural sensitivity; each program reflects deep understanding of its domain's specific power dynamics, risks, and success factors."
    weight: 0.35
    description: "ExtraordinaryContextExpertise"
  - type: llm_judge
    criteria: "Response would succeed in each context — the space crew would function as a cohesive team during 6 months of isolation; the coaching staff would be aligned and operational by training camp; the humanitarian team would establish effective operations within days of arriving in a crisis zone; each program handles the time pressure, interpersonal dynamics, and high stakes unique to its domain; all three are implementable within their constraints."
    weight: 0.30
    description: "ExtraordinaryOnboardingOutcomes"
