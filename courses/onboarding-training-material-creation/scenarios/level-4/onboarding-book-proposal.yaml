meta:
  id: onboarding-book-proposal
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Write a book proposal and two sample chapters for 'The Onboarding Advantage' — a practitioner's guide to transforming employee onboarding into a strategic business driver"
  tags: [book-proposal, practitioner-guide, thought-leadership, publishing, expert]

state: {}

trigger: |
  You're a veteran HR leader and onboarding expert
  (20+ years experience, former CHRO, now consultant
  and speaker) writing a book proposal for a major
  business publisher. Your book: "The Onboarding
  Advantage: How the Best Companies Turn New Hires
  into High Performers in Half the Time."

  Your thesis: Most companies treat onboarding as
  an administrative function (paperwork, compliance,
  orientation) when it should be treated as a
  strategic accelerator. Companies that get onboarding
  right see 2.5x faster time to productivity, 82%
  higher retention, and 70% higher new hire engagement.
  Yet 88% of companies admit their onboarding is
  mediocre or worse.

  Write the complete book proposal:

  1. Book Proposal
  - Overview (elevator pitch for the book)
  - Target audience (who reads this and why they
    need it)
  - Market analysis (competing books, your
    differentiation)
  - Author platform (speaking, consulting, media,
    social media following)
  - Chapter-by-chapter outline (12-14 chapters with
    2-3 sentence summaries)
  - Marketing and promotion plan
  - Comparable titles and competitive positioning

  Chapter outline should cover:
  - Why onboarding is broken (and the cost)
  - The Onboarding Advantage Framework (your
    proprietary model)
  - Pre-boarding: winning before Day 1
  - The first day that changes everything
  - The critical first 90 days
  - Manager as onboarding catalyst
  - Onboarding for different populations (remote,
    executive, frontline, international)
  - Technology and onboarding
  - Measuring what matters
  - Building the business case
  - The future of onboarding (AI, personalization)
  - Implementation roadmap

  2. Sample Chapter: "The Onboarding Advantage
  Framework" (Chapter 2)
  Write the complete chapter (~5,000 words) that
  introduces your proprietary framework:
  - The 5 Pillars of Strategic Onboarding:
    1. Belonging (emotional connection)
    2. Direction (role clarity and expectations)
    3. Knowledge (skills and information)
    4. Integration (relationships and networks)
    5. Momentum (early wins and confidence)
  - Each pillar explained with research evidence
  - The Onboarding Maturity Model (5 levels from
    "Sink or Swim" to "Strategic Accelerator")
  - Self-assessment: Where does your company fall?
  - Case study: A company that transformed using
    the framework
  - Key takeaways and action items

  3. Sample Chapter: "The Manager as Onboarding
  Catalyst" (Chapter 6)
  Write the complete chapter (~5,000 words):
  - Research on manager impact on new hire success
  - Why managers are the weakest link in onboarding
    (and how to fix it)
  - The "Manager Onboarding Playbook" (a practical
    tool introduced in this chapter)
  - Pre-arrival manager checklist
  - First-week manager behaviors that matter most
  - The art of the 30-day check-in conversation
  - Common manager mistakes with new hires
  - Case study: How one company trained managers
    to become onboarding catalysts
  - Tools and templates readers can use immediately

  Task: Write the complete book proposal with both
  sample chapters.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — overview with elevator pitch; target audience and market analysis; author platform; 12-14 chapter outline with summaries; marketing plan; plus two complete sample chapters of approximately 5,000 words each covering the Onboarding Advantage Framework (5 pillars, maturity model, self-assessment, case study) and the Manager as Onboarding Catalyst (research, playbook, checklist, common mistakes, case study)."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates thought leadership — the Onboarding Advantage Framework is original and comprehensive; the 5 Pillars cover the full scope of onboarding; the Maturity Model provides genuine diagnostic value; research citations are realistic and compelling; the manager chapter provides immediately actionable tools; the case studies illustrate transformation convincingly; the writing is engaging, authoritative, and accessible to HR practitioners."
    weight: 0.35
    description: "ThoughtLeadershipExpertise"
  - type: llm_judge
    criteria: "Response would get a publishing deal — a literary agent would sign this; a major business publisher would acquire it; HR leaders would buy and recommend it; the framework would become widely adopted; the book would elevate the author's speaking and consulting practice; it would be compared favorably to books like 'The First 90 Days' or 'Onboarding' by Bradt and Vonnegut; it would change how companies think about onboarding."
    weight: 0.30
    description: "PublishingViabilityOutcome"
