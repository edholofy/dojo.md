meta:
  id: onboarding-technology-platform
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Design an AI-powered onboarding technology platform — product requirements, UX design, AI personalization engine, and go-to-market strategy"
  tags: [technology-platform, ai-powered, product-design, personalization, expert]

state: {}

trigger: |
  You're the founder of OnboardOS, a venture-backed
  startup ($8M Series A) building an AI-powered
  onboarding platform. Your thesis: onboarding is
  broken because it's one-size-fits-all, content
  gets outdated instantly, and there's no feedback
  loop. OnboardOS uses AI to personalize the
  onboarding journey for every new hire, keep
  content fresh, and predict which new hires are
  at risk of early attrition.

  Write the complete product strategy:

  1. Product Vision and Architecture
  - Problem statement with market sizing
  - Product vision (3-year)
  - Core platform modules:
    * Journey Builder: AI-assisted onboarding
      journey design (drag-and-drop + AI suggestions)
    * Content Studio: Create, manage, and auto-
      update onboarding content with AI freshness
      monitoring
    * Personalization Engine: Adapts content,
      pace, and sequence based on role, experience,
      learning style, and engagement signals
    * Pulse Check: Automated sentiment analysis
      from new hire check-ins, predicting attrition
      risk
    * Manager Hub: Dashboard showing each new
      hire's progress, engagement, and recommended
      actions
    * Analytics: Enterprise-wide onboarding
      effectiveness metrics
  - Integration architecture (Workday, BambooHR,
    Slack, Teams, LMS)

  2. AI and Machine Learning Features
  - Content freshness detection (monitoring product
    changes that invalidate training content)
  - Personalized learning path optimization (what
    to learn, in what order, at what pace)
  - Attrition risk scoring (signals, model, alert
    thresholds)
  - Manager coaching recommendations (what to
    discuss in 1:1s based on new hire data)
  - Natural language processing for check-in
    sentiment analysis
  - Data requirements and model training approach

  3. User Experience Design
  - New hire experience flow (mobile-first)
  - Manager dashboard wireframe descriptions
  - HR admin experience (program design and
    management)
  - Executive reporting view
  - Write detailed user stories for 10 key
    interactions

  4. Go-to-Market Strategy
  - Target customer segments
  - Pricing model (per-employee, tiered)
  - Sales motion (PLG vs. enterprise sales)
  - Competitive positioning
  - Customer success model

  5. Financial Model
  - Revenue projections (Years 1-5)
  - Key metrics (ARR, NDR, CAC, LTV)
  - Fundraising milestones
  - Path to profitability

  Task: Write the complete product strategy for
  OnboardOS.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete product strategy — product vision with market sizing; 6 core modules with architecture; integration design; AI features for content freshness, personalization, attrition risk, coaching, and NLP; UX flows for 4 user types; 10 detailed user stories; go-to-market with segments, pricing, and sales; financial model with 5-year projections and key metrics."
    weight: 0.35
    description: "ProductStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product and AI expertise — the AI features are technically feasible; content freshness detection solves a real pain point; attrition risk scoring is based on meaningful signals; the personalization engine adapts meaningfully, not trivially; the UX prioritizes mobile-first for new hires; the integration architecture addresses real enterprise needs; the pricing model is competitive."
    weight: 0.35
    description: "ProductAIExpertise"
  - type: llm_judge
    criteria: "Response would produce a fundable product strategy — investors would see a compelling market opportunity; the product would solve real onboarding problems; enterprises would adopt because the ROI is clear; the AI features would differentiate from competitors; the financial projections would be credible; OnboardOS would become the category leader in onboarding technology."
    weight: 0.30
    description: "ProductViabilityOutcome"
