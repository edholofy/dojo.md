meta:
  id: onboarding-for-deskless-workers
  level: 4
  course: onboarding-training-material-creation
  type: output
  description: "Design a mobile-first onboarding system for 15,000 deskless workers across hospitality, logistics, and field services — SMS-based microlearning, multilingual content, and frontline manager enablement"
  tags: [deskless-workers, mobile-first, multilingual, frontline, expert]

state: {}

trigger: |
  You're the VP of People at a multi-brand hospitality
  and services conglomerate (15,000 employees across
  3 divisions: 45 hotels, a logistics/delivery fleet,
  and a facilities management company). 80% of your
  workforce are deskless workers who don't have
  company email, don't sit at computers, and may
  have limited English proficiency. Annual turnover
  is 65% and you hire 10,000+ people per year.

  Current onboarding: A 4-hour classroom session on
  Day 1 (mostly paperwork and videos) followed by
  "shadow a veteran employee for a few days." It's
  ineffective, inconsistent, and contributes to the
  40% of new hires who quit within 90 days.

  Design a revolutionary deskless worker onboarding
  system:

  1. Mobile-First Onboarding Platform Design
  - Platform requirements (works on personal phones,
    no app download required, low bandwidth)
  - SMS/WhatsApp-based onboarding journey (automated
    message sequences)
  - Microlearning content design (2-3 minute modules,
    video-first, minimal reading)
  - QR code integration (scan at worksite for location-
    specific content)
  - Offline capability for areas with poor connectivity
  - Content in 6 languages (English, Spanish, Mandarin,
    Tagalog, Portuguese, Haitian Creole)
  - Accessibility for workers with limited digital
    literacy

  2. Division-Specific Programs

  Hotels Division (8,000 employees):
  - Front desk, housekeeping, F&B, maintenance tracks
  - Brand standards training by hotel brand
  - Guest interaction scenarios (video-based)
  - Safety and emergency procedures
  - Cultural sensitivity for international guests
  - Tipping, scheduling, and benefits navigation

  Logistics Division (4,000 employees):
  - Driver onboarding (CDL verification, route
    training, vehicle inspection)
  - Warehouse worker onboarding (equipment operation,
    safety protocols, picking systems)
  - DOT compliance requirements
  - Technology training (handheld scanners, routing
    apps)

  Facilities Management Division (3,000 employees):
  - Client site protocols (each client has different
    rules)
  - Cleaning procedures and chemical safety (OSHA/SDS)
  - Equipment operation and maintenance
  - Quality inspection standards
  - Working alone safely

  3. Frontline Manager Enablement
  - "Manager as onboarding coach" training program
  - Structured on-the-job training templates
  - Daily check-in prompts (sent to manager's phone)
  - Skills verification checklists (observe and sign off)
  - Escalation process for struggling new hires
  - Manager accountability metrics

  4. Peer Learning System
  - Buddy matching algorithm (same shift, same role,
    same language preference)
  - Buddy responsibilities and incentives
  - Peer mentoring conversation guides
  - Knowledge sharing from experienced workers
    (capture tribal knowledge as microlearning)

  5. Measurement and Optimization
  - 90-day retention improvement targets by division
  - Time-to-independence metrics (when can they work
    unsupervised)
  - Quality metrics tied to onboarding completion
  - Cost-per-hire impact analysis
  - New hire sentiment tracking (emoji-based pulse
    surveys)
  - A/B testing framework for content optimization

  Task: Write the complete deskless worker onboarding
  system design with all programs and templates.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete deskless worker system — mobile-first platform design with SMS/WhatsApp, microlearning, QR codes, and 6-language support; three division-specific programs for hotels, logistics, and facilities management; frontline manager enablement with coaching training and check-in prompts; peer learning with buddy matching; measurement framework with retention targets, time-to-independence, and emoji pulse surveys."
    weight: 0.35
    description: "DesklessOnboardingCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deskless workforce expertise — the platform works on personal phones without app downloads; content is designed for limited digital literacy; language support goes beyond translation to cultural adaptation; each division's program addresses its specific regulatory and operational requirements; frontline manager tools work via mobile; the peer learning system captures tribal knowledge; the measurement approach uses methods accessible to deskless workers."
    weight: 0.35
    description: "DesklessWorkforceExpertise"
  - type: llm_judge
    criteria: "Response would transform deskless onboarding — 90-day attrition would decrease significantly from the current 40%; time-to-independence would be measurable and improving; the system would scale to 10,000+ annual hires; multilingual workers would feel included; frontline managers would become effective onboarding coaches; the conglomerate would become an employer of choice in hospitality and services."
    weight: 0.30
    description: "DesklessTransformationOutcome"
