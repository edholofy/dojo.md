meta:
  id: longform-to-tiktok
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Adapt a long-form testimonial into TikTok format without losing key messages"
  tags: [ugc, adaptation, long-form, editing]

state: {}

trigger: |
  Adapt the following 3-minute customer testimonial into a 30-second TikTok UGC script
  for "CloudSleep" mattress ($899).

  Original testimonial:
  "Hi, I'm Maria, and I've been dealing with chronic back pain for about 6 years now.
  I've tried literally everything — memory foam, spring mattresses, those fancy
  adjustable beds, even sleeping on the floor like some YouTube guy suggested. Nothing
  worked. My chiropractor was costing me $200 a month and I was still waking up in
  pain every single morning. My husband found CloudSleep from a podcast ad and honestly
  I was skeptical. Another mattress claiming to fix everything? Sure. But we were
  desperate so we ordered it with the 120-night trial. First week — not much different.
  Second week — I noticed I wasn't reaching for ibuprofen at 6am. By month two, I
  cancelled my chiropractor appointments. I'm not saying it cures back pain, because
  everyone is different, but for me personally, it changed everything. My husband
  says I'm a different person in the morning now. And at $899 with the trial, it was
  less than what I was spending on chiropractor visits in 6 months."

  Keep the emotional core and key persuasion points. Cut everything else.

assertions:
  - type: llm_judge
    criteria: "The adaptation preserves the emotional core of Maria's story (chronic pain → skepticism → gradual discovery → life changed) even though 80% of the content was cut"
    weight: 0.25
    description: "Emotional core preserved despite heavy editing"
  - type: llm_judge
    criteria: "The key persuasion points are retained: the specific timeline (weeks to see results), the credible skepticism, the concrete outcome (cancelled chiropractor), and the cost comparison"
    weight: 0.25
    description: "Key persuasion points retained"
  - type: llm_judge
    criteria: "The 30-second version feels like a complete TikTok script with proper hook, body, and CTA — not like a chopped-up longer video missing pieces"
    weight: 0.25
    description: "Feels complete, not like a chopped excerpt"
  - type: llm_judge
    criteria: "The adaptation maintains the important caveat ('everyone is different') and doesn't make medical claims the original testimonial carefully avoided"
    weight: 0.25
    description: "Maintains caveats and avoids medical claims"
