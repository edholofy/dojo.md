meta:
  id: paid-partnership-authentic
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script with mandatory paid partnership disclosure that still feels authentic"
  tags: [ugc, paid-partnership, disclosure, authenticity]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "ZenSpace" meditation app ($9.99/month).
  This is a PAID partnership — FTC requires clear disclosure.

  Requirements:
  - Must include "#ad" or "paid partnership" disclosure visibly
  - Must comply with FTC guidelines (disclosure at the BEGINNING, not buried)
  - Must still feel like genuine, organic content — not a forced ad read
  - Creator genuinely uses the app for anxiety management

  The tension: early disclosure often kills authenticity (viewers scroll past
  once they see "#ad"). Find a way to disclose early AND keep viewers watching.

assertions:
  - type: llm_judge
    criteria: "FTC disclosure is present at the beginning of the script (not hidden at the end) — the partnership is clearly identified in a way that meets legal requirements"
    weight: 0.25
    description: "FTC-compliant early disclosure present"
  - type: llm_judge
    criteria: "The disclosure is integrated smoothly — the hook is strong enough that viewers stay despite seeing '#ad,' OR the disclosure is woven into the opening in a way that doesn't feel like a commercial break announcement"
    weight: 0.30
    description: "Disclosure integrated without killing engagement"
  - type: llm_judge
    criteria: "The script feels like a genuine personal story about anxiety and meditation, not a script reading — the paid partnership doesn't prevent authentic vulnerability"
    weight: 0.25
    description: "Authentic personal story despite paid disclosure"
  - type: llm_judge
    criteria: "The meditation app's specific features are mentioned naturally within the personal narrative — viewers understand what the app offers without a feature dump"
    weight: 0.20
    description: "App features mentioned naturally"
