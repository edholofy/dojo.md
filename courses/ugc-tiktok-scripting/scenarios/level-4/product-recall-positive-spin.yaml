meta:
  id: product-recall-positive-spin
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Turn a product recall into positive brand storytelling"
  tags: [ugc, recall, crisis-to-positive, brand-trust]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "SafeStep" children's water bottle.
  Price: $18.99. Context: SafeStep voluntarily recalled their previous lid design
  after 3 parents reported a minor leaking issue. No safety hazard — just leaking.
  They redesigned the lid, tested it extensively, and relaunched with a better product.

  The script should:
  - Frame the recall as a POSITIVE brand story (they listened, they cared, they fixed it)
  - Show the new improved lid design
  - NOT hide the recall — use it to build trust
  - Come from a parent who had the original bottle and got the replacement

  Turn a potential PR negative into brand loyalty content.

assertions:
  - type: llm_judge
    criteria: "The recall is framed as evidence of the brand's integrity — they chose to recall proactively for a minor issue, which demonstrates they prioritize quality. This framing is believable and not spin-doctored"
    weight: 0.30
    description: "Recall framed as brand integrity, not spin"
  - type: llm_judge
    criteria: "The parent creator's perspective adds genuine credibility — their experience with both the old and new product (had the issue → got the replacement → it's better now) tells a trustworthy story"
    weight: 0.25
    description: "Parent perspective adds credible narrative"
  - type: llm_judge
    criteria: "The new lid improvement is highlighted as a concrete positive outcome — viewers understand specifically what changed and why the new version is better"
    weight: 0.20
    description: "Concrete improvement shown"
  - type: llm_judge
    criteria: "A parent watching this would feel MORE confident buying SafeStep than a brand that never had a recall — the story creates trust that this brand will do the right thing"
    weight: 0.25
    description: "Creates trust through transparency"
