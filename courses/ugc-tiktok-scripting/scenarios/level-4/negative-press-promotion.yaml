meta:
  id: negative-press-promotion
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script addressing negative press while promoting a product"
  tags: [ugc, crisis, negative-press, dual-purpose]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "QuickCharge" portable battery pack ($39.99).
  Context: Last month, a tech blog published an article claiming QuickCharge batteries
  overheat. The company investigated and found it was caused by using non-certified
  cables (not the battery itself). They've since added cable compatibility warnings
  and updated the manual.

  The script must:
  - Address the overheating concern without being defensive
  - Demonstrate confidence in the product's safety
  - Still be a compelling product promotion, not just damage control
  - Come across as transparent and trustworthy

assertions:
  - type: llm_judge
    criteria: "The script addresses the overheating concern directly rather than ignoring it — demonstrates transparency without being defensive, panicked, or dismissive of the concern"
    weight: 0.25
    description: "Addresses concern transparently, not defensively"
  - type: llm_judge
    criteria: "The explanation (non-certified cables, not the battery) is communicated clearly and credibly — the viewer understands what happened and feels reassured without feeling like the brand is shifting blame"
    weight: 0.25
    description: "Explanation is clear and credible"
  - type: llm_judge
    criteria: "Despite addressing the controversy, the script is still a compelling product promotion — it transitions from addressing the concern to showcasing genuine product benefits"
    weight: 0.25
    description: "Still compelling promotion, not just damage control"
  - type: llm_judge
    criteria: "The overall tone builds trust — a viewer who heard about the overheating issue would feel MORE confident about buying after watching this, not less"
    weight: 0.25
    description: "Builds trust in viewers who know about the issue"
