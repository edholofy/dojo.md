meta:
  id: cultural-sensitivity-global
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Brief requiring cultural sensitivity for a global campaign"
  tags: [ugc, cultural-sensitivity, global, inclusion]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "WorldBite" — a snack subscription box
  featuring snacks from a different country each month ($24.99/month).
  This month's box: Japanese snacks.

  CRITICAL REQUIREMENTS:
  - Must show genuine appreciation for Japanese food culture, NOT exoticize it
  - Avoid "weird food" or "look how crazy this is" framing
  - Don't reduce Japanese cuisine to stereotypes (sushi, ramen only)
  - The creator should approach unfamiliar snacks with curiosity and respect
  - Must be entertaining without using cultural unfamiliarity as the joke

  Target audience: US-based foodies (25-35) who love discovering new cuisines.

assertions:
  - type: llm_judge
    criteria: "The script shows genuine cultural appreciation — presents Japanese snacks with curiosity and respect, NOT exoticizing language like 'weird,' 'crazy,' 'you won't believe,' or treating unfamiliarity as inherently comedic"
    weight: 0.30
    description: "Genuine cultural appreciation, no exoticizing"
  - type: llm_judge
    criteria: "The script goes beyond surface-level Japanese food stereotypes — features actual snack varieties (mochi, senbei, pocky, matcha treats) rather than just defaulting to sushi/ramen references"
    weight: 0.20
    description: "Beyond surface stereotypes"
  - type: llm_judge
    criteria: "The script is still genuinely entertaining and engaging — the cultural sensitivity requirements don't make it boring or overly cautious. The excitement of discovering new flavors drives engagement"
    weight: 0.25
    description: "Entertaining despite cultural sensitivity requirements"
  - type: llm_judge
    criteria: "The creator's approach to unfamiliar snacks models the right attitude for the audience — curious, open, appreciative — and would encourage viewers to try new cuisines without cultural anxiety"
    weight: 0.25
    description: "Models curious, open attitude toward new cuisines"
