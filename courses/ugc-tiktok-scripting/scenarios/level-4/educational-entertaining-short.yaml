meta:
  id: educational-entertaining-short
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script must be educational AND entertaining AND under 30 seconds"
  tags: [ugc, educational, entertainment, constraints]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "BrightSmile" electric toothbrush ($89).
  The script must simultaneously:
  1. EDUCATE: Teach viewers that manual brushing misses 40% of tooth surfaces
     (this is the brand's key stat from dental research)
  2. ENTERTAIN: Be genuinely fun to watch — not a boring dental lecture
  3. FIT in 30 seconds: Cannot exceed ~80 words

  All three requirements are equally important. Sacrificing any one makes the
  script fail. The creator is a dental hygienist who moonlights as a TikTok creator.

assertions:
  - type: llm_judge
    criteria: "The 40% stat is clearly communicated and the educational value is real — a viewer learns something they didn't know about tooth brushing that makes them reconsider their habits"
    weight: 0.25
    description: "Educational stat clearly communicated"
  - type: llm_judge
    criteria: "The script is genuinely entertaining — uses humor, surprise, a visual gag, or engaging storytelling that makes the dental education enjoyable rather than preachy"
    weight: 0.25
    description: "Genuinely entertaining despite dental topic"
  - type: llm_judge
    criteria: "The script fits within 30 seconds (~80 words) without feeling rushed — all three elements (education, entertainment, product pitch) have space to breathe"
    weight: 0.25
    description: "Fits 30 seconds without feeling rushed"
  - type: llm_judge
    criteria: "The dental hygienist persona adds credibility to the educational claim while the TikTok creator side keeps the entertainment value — both identities serve the script"
    weight: 0.25
    description: "Dual persona serves both education and entertainment"
