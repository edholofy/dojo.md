meta:
  id: legal-disclaimers-natural
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script with mandatory legal disclaimers that must feel natural"
  tags: [ugc, legal, disclaimers, compliance]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "QuickFund" — a personal loan app.
  Interest rates from 5.99%-24.99% APR depending on credit.

  MANDATORY LEGAL DISCLAIMERS (must all appear in the script):
  1. "Rates and terms vary based on creditworthiness"
  2. "Not available in all states"
  3. "QuickFund Inc. NMLS #1234567"

  The challenge: three legal disclaimers in a 30-second casual UGC script.
  They can be text overlays, spoken, or a combination — but they must be present
  and the overall script must still feel like authentic, engaging TikTok content.

  Creator: someone who used QuickFund to cover an unexpected car repair.

assertions:
  - type: llm_judge
    criteria: "All three mandatory disclaimers are present in the script — credit-based rates, state availability, and NMLS number. None are missing or significantly altered"
    weight: 0.30
    description: "All three disclaimers present"
  - type: llm_judge
    criteria: "The disclaimers are integrated without destroying the script's flow — whether as natural spoken asides, clearly marked text overlays, or end-screen elements, they don't make the script feel like a legal document"
    weight: 0.25
    description: "Disclaimers don't destroy script flow"
  - type: llm_judge
    criteria: "The car repair story is compelling and relatable — viewers empathize with the unexpected expense scenario and understand how the loan app helped"
    weight: 0.25
    description: "Car repair story is compelling and relatable"
  - type: llm_judge
    criteria: "Despite heavy compliance requirements, the script would actually perform on TikTok — it doesn't feel like a regulated financial services ad but like a real person sharing their experience"
    weight: 0.20
    description: "Performs on TikTok despite compliance burden"
