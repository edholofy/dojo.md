meta:
  id: multi-segment-launch
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Product launch script addressing multiple distinct audience segments"
  tags: [ugc, product-launch, multi-segment, strategy]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for the launch of "FlexDesk" — a portable
  standing desk converter ($149). Three audience segments care about this product:
  1. Remote workers (want ergonomics for their home office)
  2. Students (need portable study setups for dorms/libraries)
  3. Gamers (want adjustable height for long gaming sessions)

  The script must resonate with at least two of these segments without feeling
  like it's trying to be everything to everyone. One TikTok, multiple entry points.

  Include a note explaining which segments you're targeting and why.

assertions:
  - type: llm_judge
    criteria: "The script effectively resonates with at least two distinct audience segments — viewers from both groups would feel like the script 'gets them' and their specific use case"
    weight: 0.25
    description: "Resonates with at least two audience segments"
  - type: llm_judge
    criteria: "The script doesn't feel like it's trying to please everyone — it has a focused concept and tone rather than awkwardly jumping between different audience appeals"
    weight: 0.25
    description: "Focused concept, not audience-jumping"
  - type: llm_judge
    criteria: "The strategic note demonstrates genuine understanding of which segments overlap on TikTok and why the chosen targeting makes sense for a single 30-second video"
    weight: 0.25
    description: "Strategic note shows targeting rationale"
  - type: llm_judge
    criteria: "The product's key benefit (portable, height-adjustable) is communicated in a way that naturally serves multiple use cases without listing them sequentially"
    weight: 0.25
    description: "Key benefit serves multiple use cases naturally"
