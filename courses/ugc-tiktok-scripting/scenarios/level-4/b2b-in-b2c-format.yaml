meta:
  id: b2b-in-b2c-format
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a B2B product using B2C UGC format"
  tags: [ugc, b2b, format-adaptation, creative-challenge]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "Notion" — a team workspace/project
  management tool. Price: Free for personal, $8/user/month for teams.

  The challenge: Notion is a B2B/productivity tool, but TikTok is a B2C entertainment
  platform. Traditional B2B marketing (feature demos, case studies) won't work here.

  The script must:
  - Make a productivity tool feel exciting on TikTok
  - Target individual knowledge workers who might bring Notion to their team
  - NOT be a feature walkthrough or screen recording narration
  - Use a UGC-native format that makes viewers say "I need this for my team"

assertions:
  - type: llm_judge
    criteria: "The script makes a productivity/B2B tool feel native to TikTok — uses a format, hook, or angle that would genuinely perform on the platform rather than feeling like a LinkedIn post on TikTok"
    weight: 0.30
    description: "B2B tool feels TikTok-native"
  - type: llm_judge
    criteria: "The script is NOT a feature walkthrough or screen recording narration — it uses a creative format (relatable workplace humor, before/after workflow, day-in-my-life as a PM) that shows value without being a tutorial"
    weight: 0.25
    description: "Creative format, not a feature walkthrough"
  - type: llm_judge
    criteria: "The script targets individual knowledge workers in a way that would make them think about bringing the tool to their team — the individual-to-team pipeline is implicit"
    weight: 0.25
    description: "Individual viewer → team adoption pipeline"
  - type: llm_judge
    criteria: "The productivity benefit is shown through relatable workplace pain and its resolution — viewers feel the problem viscerally before seeing the solution"
    weight: 0.20
    description: "Workplace pain felt before solution shown"
