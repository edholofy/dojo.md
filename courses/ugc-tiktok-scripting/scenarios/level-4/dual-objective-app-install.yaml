meta:
  id: dual-objective-app-install
  level: 4
  course: ugc-tiktok-scripting
  type: output
  description: "Script must drive app installs AND build brand awareness simultaneously"
  tags: [ugc, dual-objective, app-install, brand-awareness]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "Duolingo" language learning app.
  The marketing team has two EQUAL objectives for this campaign:
  1. Drive immediate app installs (performance marketing goal)
  2. Build brand personality and awareness (brand marketing goal)

  These often conflict: install-driving content is direct and CTA-heavy, while
  brand-building content is entertaining and shareable but may not convert.

  The script must serve BOTH objectives without sacrificing either.
  Lean into Duolingo's known brand personality (chaotic, funny green owl).

assertions:
  - type: llm_judge
    criteria: "The script has a clear, compelling CTA that would drive app installs — viewers know exactly what to do next and feel motivated to download immediately"
    weight: 0.25
    description: "Clear CTA drives installs"
  - type: llm_judge
    criteria: "The script is entertaining and shareable enough to build brand awareness — it's content people would share, comment on, or remember even if they don't install immediately"
    weight: 0.25
    description: "Entertaining enough to share for brand awareness"
  - type: llm_judge
    criteria: "Duolingo's chaotic/funny brand personality (the unhinged green owl) is authentically captured — the script feels like it could be official Duolingo content"
    weight: 0.25
    description: "Captures Duolingo's chaotic brand voice"
  - type: llm_judge
    criteria: "The install CTA and the entertainment value don't compete — they reinforce each other. The entertainment creates desire, and the CTA captures it naturally"
    weight: 0.25
    description: "Entertainment and CTA reinforce each other"
