meta:
  id: tech-unboxing
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write an unboxing UGC script for a wireless earbuds product"
  tags: [ugc, tech, unboxing, beginner]

state: {}

trigger: |
  Write a 30-second TikTok UGC unboxing script for "SoundPods Pro" wireless earbuds.
  Price: $59. Key features: 40-hour battery, noise cancellation, fits small ears.
  Make it feel like a genuine unboxing reaction, not a commercial.

assertions:
  - type: llm_judge
    criteria: "The hook creates anticipation or excitement about the unboxing moment — uses curiosity or a teaser that makes viewers want to see what's inside"
    weight: 0.25
    description: "Hook must build unboxing anticipation"
  - type: llm_judge
    criteria: "The script captures genuine surprise or delight reactions that feel authentic to real unboxing experiences, not rehearsed excitement"
    weight: 0.25
    description: "Reactions must feel genuinely spontaneous"
  - type: llm_judge
    criteria: "Key product features (battery life, noise cancellation, small ear fit) are mentioned naturally within the flow rather than listed robotically"
    weight: 0.25
    description: "Features woven in naturally, not listed"
  - type: llm_judge
    criteria: "The script includes visual/action cues in brackets or parentheses that a creator would actually film (opening box, putting in ears, reacting to sound)"
    weight: 0.25
    description: "Includes filmable visual direction"
