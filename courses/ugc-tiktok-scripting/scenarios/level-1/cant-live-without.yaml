meta:
  id: cant-live-without
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a 'things I can't live without' UGC script for a single product"
  tags: [ugc, favorites, lifestyle, beginner]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "HydroGlow" water bottle with a built-in
  fruit infuser. Price: $24.99. Format: "thing I literally can't live without" —
  focusing on just this one product. Creator is a college student who brings it everywhere.

assertions:
  - type: llm_judge
    criteria: "The hook uses the 'can't live without' format hook effectively — creates curiosity about what the product is or why the creator is so obsessed with it"
    weight: 0.25
    description: "Hook creates curiosity about the obsession"
  - type: llm_judge
    criteria: "The script shows multiple use cases or moments where the product fits into the creator's life (gym, class, study sessions) making the 'can't live without' claim believable"
    weight: 0.30
    description: "Multiple real-life use cases shown"
  - type: llm_judge
    criteria: "The enthusiasm feels genuine for a college student — uses age-appropriate language and references without trying too hard"
    weight: 0.25
    description: "Authentic college student voice"
  - type: llm_judge
    criteria: "The fruit infuser feature is highlighted as a specific reason for obsession, not just a bullet point"
    weight: 0.20
    description: "Key feature highlighted as reason for obsession"
