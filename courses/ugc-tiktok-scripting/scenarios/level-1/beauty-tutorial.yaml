meta:
  id: beauty-tutorial
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a quick tutorial UGC script for a beauty product"
  tags: [ugc, beauty, tutorial, how-to]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "VelvetLip" liquid lipstick in shade "Rosewood."
  Format: quick tutorial showing application. Price: $16. Key benefit: transfer-proof
  for 12 hours. The creator demonstrates how to apply it perfectly.

assertions:
  - type: llm_judge
    criteria: "The hook promises a specific result or reveals a beauty hack/tip that gives viewers a reason to watch the tutorial (not just 'let me show you this lipstick')"
    weight: 0.25
    description: "Hook promises a specific beauty result or tip"
  - type: llm_judge
    criteria: "The tutorial steps are clear and sequential — a viewer could actually follow along to apply the product correctly"
    weight: 0.25
    description: "Tutorial steps are clear and followable"
  - type: llm_judge
    criteria: "The script mentions the transfer-proof claim through a natural demonstration moment (drinking from a cup, touching lips) rather than just stating it"
    weight: 0.25
    description: "Transfer-proof claim shown through demo"
  - type: llm_judge
    criteria: "The tone is helpful and enthusiastic without being condescending — teaches without lecturing"
    weight: 0.25
    description: "Helpful tone without being condescending"
