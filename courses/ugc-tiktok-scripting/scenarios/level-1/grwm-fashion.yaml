meta:
  id: grwm-fashion
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a Get Ready With Me UGC script for a clothing brand"
  tags: [ugc, fashion, grwm, lifestyle]

state: {}

trigger: |
  Write a 30-second TikTok UGC "Get Ready With Me" script for "ThreadLine" — an
  affordable basics brand. Feature their $22 ribbed tank top. The creator is getting
  ready for a casual brunch. Tone should be chatty and relatable.

assertions:
  - type: llm_judge
    criteria: "The script follows GRWM conventions: starts with the getting-ready context, shows outfit building, and features the product as the key piece"
    weight: 0.25
    description: "Follows GRWM TikTok format"
  - type: llm_judge
    criteria: "The hook immediately establishes a relatable scenario (getting ready, what to wear dilemma) that the target audience connects with"
    weight: 0.25
    description: "Hook establishes relatable getting-ready scenario"
  - type: llm_judge
    criteria: "Tone is genuinely chatty and relatable — uses casual language, fillers like 'honestly' or 'okay but,' and feels like talking to a friend"
    weight: 0.30
    description: "Chatty, friend-like conversational tone"
  - type: llm_judge
    criteria: "The product's value proposition ($22, affordable basics) is mentioned without sounding like a price tag announcement"
    weight: 0.20
    description: "Price mentioned naturally"
