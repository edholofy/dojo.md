meta:
  id: day-in-life-meal-kit
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a day-in-my-life UGC script featuring a meal kit service"
  tags: [ugc, food, day-in-life, meal-kit]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "FreshBox" meal kit delivery.
  Format: "day in my life" style. Price: $8.99 per meal. Key benefit: healthy meals
  in 20 minutes. The creator is a busy parent. Show the product naturally within
  the daily routine.

assertions:
  - type: llm_judge
    criteria: "The script follows 'day in my life' format — narrates several moments throughout the day with the meal kit appearing as one natural beat, not the entire focus"
    weight: 0.25
    description: "Follows day-in-my-life format conventions"
  - type: llm_judge
    criteria: "The hook establishes the busy parent context with a specific, relatable moment (school drop-off chaos, work deadline, etc.) not a generic 'I'm a busy parent'"
    weight: 0.25
    description: "Hook uses specific relatable parent moment"
  - type: llm_judge
    criteria: "The meal kit integrates as a problem-solver within the daily chaos — the audience understands WHY it matters to this person's life"
    weight: 0.30
    description: "Product solves a real problem within the narrative"
  - type: llm_judge
    criteria: "The script includes enough scene variety (multiple daily moments) to feel like a real day-in-my-life, not just a cooking demo"
    weight: 0.20
    description: "Multiple daily scenes, not just one moment"
