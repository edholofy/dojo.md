meta:
  id: kitchen-gadget-demo
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a quick product demo UGC script for a kitchen gadget"
  tags: [ugc, kitchen, demo, product]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "ChopMaster" — a vegetable dicer that
  cuts prep time in half. Price: $19.99. The creator shows how fast it dices an onion.
  Keep it punchy and satisfying to watch.

assertions:
  - type: llm_judge
    criteria: "The hook creates immediate intrigue about the gadget — uses a time challenge, before/after speed comparison, or shocking claim that makes people stop scrolling"
    weight: 0.25
    description: "Hook creates intrigue about the gadget's capability"
  - type: llm_judge
    criteria: "The script captures the satisfying, almost ASMR-like quality of kitchen gadget TikToks — describes the cutting action, sound, or result in a way that feels visually satisfying"
    weight: 0.25
    description: "Captures satisfying kitchen gadget aesthetic"
  - type: llm_judge
    criteria: "The time-saving benefit is demonstrated concretely (specific comparison or timing) rather than vaguely claiming it's faster"
    weight: 0.25
    description: "Time-saving shown concretely"
  - type: llm_judge
    criteria: "The script is punchy — short sentences, high energy, no unnecessary filler words or slow explanations"
    weight: 0.25
    description: "Punchy pacing with no filler"
