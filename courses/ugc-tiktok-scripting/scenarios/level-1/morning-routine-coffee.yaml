meta:
  id: morning-routine-coffee
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a morning routine UGC script featuring a coffee product"
  tags: [ugc, coffee, routine, lifestyle]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "BrewBold" instant coffee pods.
  Format: "morning routine" style. Price: $14.99 for 12 pods.
  Key selling point: barista-quality taste without leaving the house.
  Target audience: busy professionals who love coffee but hate coffee shop lines.

assertions:
  - type: llm_judge
    criteria: "The hook relates to a specific morning pain point (rushing, no time for coffee shops, bad instant coffee) rather than a generic morning greeting"
    weight: 0.25
    description: "Hook addresses a specific morning pain point"
  - type: llm_judge
    criteria: "The script fits the 'morning routine' TikTok format — sequential actions narrated casually, showing a real morning, with the product integrated naturally into the flow"
    weight: 0.30
    description: "Follows morning routine TikTok format conventions"
  - type: llm_judge
    criteria: "The product mention feels like a natural part of the routine, not an obvious pivot to a sales pitch — the transition from routine to product is seamless"
    weight: 0.25
    description: "Product placement feels organic"
  - type: llm_judge
    criteria: "Script stays within 30-second speaking length (roughly 75-80 words) and ends with a clear, single CTA"
    weight: 0.20
    description: "Length appropriate with clear CTA"
