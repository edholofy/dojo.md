meta:
  id: simple-skincare-review
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a basic UGC product review script for a skincare serum"
  tags: [ugc, skincare, review, beginner]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for a vitamin C serum called "GlowDrop."
  The script should be a simple product review from a real user's perspective.
  Target audience: women 25-35. The serum costs $28 and brightens skin in 2 weeks.

assertions:
  - type: llm_judge
    criteria: "The hook (first 1-2 lines) grabs attention within 3 seconds — uses a question, bold claim, or pattern interrupt that would stop a scroller"
    weight: 0.30
    description: "Hook must be scroll-stopping and concise"
  - type: llm_judge
    criteria: "The script sounds conversational and authentic, like a real person talking to a friend — not polished ad copy or corporate language"
    weight: 0.25
    description: "Tone must be natural and conversational"
  - type: llm_judge
    criteria: "The script follows a clear Hook → Body → CTA structure and stays within 30 seconds when read aloud (roughly 75-80 words)"
    weight: 0.25
    description: "Structure and length must fit TikTok format"
  - type: llm_judge
    criteria: "The CTA is clear, single-action, and uses urgency or curiosity (e.g., 'link in bio' or 'grab yours before it sells out') rather than being vague"
    weight: 0.20
    description: "CTA must be clear and actionable"
