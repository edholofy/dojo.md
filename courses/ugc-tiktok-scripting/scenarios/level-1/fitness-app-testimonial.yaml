meta:
  id: fitness-app-testimonial
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a simple testimonial UGC script for a fitness app"
  tags: [ugc, fitness, testimonial, app]

state: {}

trigger: |
  Write a 30-second TikTok UGC testimonial script for "FitTrack" — a workout tracking
  app with a free tier. The creator has used it for 3 months and lost 15 pounds.
  Keep it genuine and motivational without being preachy.

assertions:
  - type: llm_judge
    criteria: "The hook shares a specific, attention-grabbing result or transformation moment (e.g., the 15-pound loss or a specific before/after moment) rather than starting with 'So I tried this app...'"
    weight: 0.25
    description: "Hook leads with a specific result"
  - type: llm_judge
    criteria: "The testimonial feels genuine — includes specific details about the user's experience (what workouts, what changed, a real moment) rather than generic praise"
    weight: 0.30
    description: "Testimonial includes specific personal details"
  - type: llm_judge
    criteria: "The tone is motivational without being preachy or guru-like — shares personal experience without lecturing the audience about fitness"
    weight: 0.25
    description: "Motivational but not preachy"
  - type: llm_judge
    criteria: "Mentions the free tier naturally as a low-barrier entry point without sounding like a hard sell"
    weight: 0.20
    description: "Free tier mentioned as accessible entry point"
