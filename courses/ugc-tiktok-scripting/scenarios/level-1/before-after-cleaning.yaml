meta:
  id: before-after-cleaning
  level: 1
  course: ugc-tiktok-scripting
  type: output
  description: "Write a before/after UGC script for a cleaning product"
  tags: [ugc, cleaning, before-after, home]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "SparkleMax" all-purpose cleaner.
  Format: before/after reveal. Price: $9.99. Key claim: removes grease stains
  in one wipe. The creator is showing their dirty kitchen stovetop transformation.

assertions:
  - type: llm_judge
    criteria: "The hook shows or describes the 'disgusting' before state in a way that's visually compelling and makes viewers want to see the transformation"
    weight: 0.25
    description: "Before state is compellingly described"
  - type: llm_judge
    criteria: "The script builds anticipation for the reveal moment — there's a clear dramatic beat between before and after, not just 'I cleaned it and now it's clean'"
    weight: 0.25
    description: "Builds anticipation for the transformation reveal"
  - type: llm_judge
    criteria: "The after reveal delivers a satisfying payoff with genuine-sounding excitement or disbelief at the result"
    weight: 0.25
    description: "After reveal is satisfying and authentic"
  - type: llm_judge
    criteria: "The product claim ('removes grease in one wipe') is demonstrated through the script's narrative rather than just stated as a fact"
    weight: 0.25
    description: "Product claim shown, not just told"
