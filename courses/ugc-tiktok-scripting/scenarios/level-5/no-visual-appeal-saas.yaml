meta:
  id: no-visual-appeal-saas
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a product with no visual appeal (SaaS/digital product)"
  tags: [ugc, saas, visual-challenge, creative]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "TaxBot" — an AI tax filing assistant
  for freelancers ($14.99/month). The product is a web dashboard with no physical
  presence, no aesthetic packaging, and no visually interesting interface.

  The fundamental challenge: TikTok is a VISUAL platform, and this product is
  an ugly tax dashboard. You can't show the product — or rather, showing the
  product (spreadsheets, numbers, forms) would kill engagement.

  Create a script that makes this visually unexciting product work on TikTok
  without relying on screen recordings or product shots.

  Include a creative direction note explaining your visual strategy.

assertions:
  - type: llm_judge
    criteria: "The visual strategy note demonstrates creative thinking about making a non-visual product work on TikTok — proposes a concrete visual approach (creator's reaction, lifestyle shots, metaphor, humor skit) rather than defaulting to screen recording"
    weight: 0.25
    description: "Creative visual strategy for non-visual product"
  - type: llm_judge
    criteria: "The script focuses on the FEELING of the product's benefit (tax stress relief, time saved, money back) rather than the product interface — sells the outcome, not the tool"
    weight: 0.25
    description: "Sells outcome and feeling, not the interface"
  - type: llm_judge
    criteria: "The freelancer-specific tax pain points are deeply relatable — mentions specific scenarios (quarterly estimated taxes, tracking expenses across gig apps, 1099 confusion) that make freelancers feel seen"
    weight: 0.25
    description: "Deeply relatable freelancer tax pain points"
  - type: llm_judge
    criteria: "The script would genuinely perform on TikTok — it's not just solving the brief theoretically but would actually get views, shares, and engagement from the target audience"
    weight: 0.25
    description: "Would genuinely perform on TikTok"
