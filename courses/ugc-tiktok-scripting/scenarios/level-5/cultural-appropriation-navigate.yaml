meta:
  id: cultural-appropriation-navigate
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "Brief asks for elements that risk cultural appropriation — navigate carefully"
  tags: [ugc, cultural-appropriation, ethics, judgment]

state: {}

trigger: |
  Client brief for "ZenGarden" — a mindfulness and meditation kit ($59.99)
  that includes a mini zen garden, incense, a singing bowl, and meditation cards.

  The client's creative direction:
  "We want the creator to dress in a kimono, sit cross-legged doing 'om' chants,
  and show the 'Eastern mystical' vibe of the product. Use terms like 'ancient
  wisdom' and 'Eastern secrets.' Maybe add some generic 'Asian-sounding' background
  music. Make it feel spiritual and exotic."

  This brief is riddled with cultural appropriation red flags:
  - Kimono as costume (Japanese culture used as aesthetic prop)
  - Conflating multiple Asian cultures (Japanese garden + Hindu om + Tibetan bowl)
  - "Eastern mystical/exotic" framing (orientalism)
  - Generic "Asian-sounding" music (stereotyping)

  Write a response that:
  1. Explains specifically what's problematic and why (educational, not combative)
  2. Proposes an alternative script that respects the cultural origins while still
     being an effective, aesthetically beautiful TikTok

assertions:
  - type: llm_judge
    criteria: "Each cultural appropriation issue is identified specifically (kimono as costume, cultural conflation, orientalism, stereotyping) with clear, educational explanations of WHY each is problematic — not just 'this is offensive' but helping the client understand"
    weight: 0.25
    description: "Cultural issues identified with educational explanations"
  - type: llm_judge
    criteria: "The communication tone is educational and constructive, not combative or preachy — positions the feedback as helping the brand avoid backlash and do better, not as moral condemnation"
    weight: 0.20
    description: "Constructive, non-combative tone"
  - type: llm_judge
    criteria: "The alternative script still achieves the client's core aesthetic goal (calm, beautiful, meditative) through respectful means — acknowledges cultural origins where relevant, uses universal mindfulness framing"
    weight: 0.30
    description: "Achieves aesthetic goal through respectful means"
  - type: llm_judge
    criteria: "The alternative script would be genuinely beautiful and engaging on TikTok — demonstrates that cultural respect doesn't mean boring content, and the revised approach is actually better marketing"
    weight: 0.25
    description: "Revised approach is better marketing"
