meta:
  id: brand-crisis-response
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "UGC script for a brand in active crisis on social media"
  tags: [ugc, crisis, brand-response, high-stakes]

state: {}

trigger: |
  "EcoBottle" reusable bottle brand ($32) is in a TikTok crisis. A viral video
  (2.3M views) showed mold growing inside the bottle's straw mechanism after
  2 weeks of normal use. The comments are brutal. The brand is trending for
  the wrong reasons.

  Investigation found: the mold issue affects bottles manufactured in one specific
  batch (March 2025). The straw design has been updated. Free replacements are
  being offered for affected bottles.

  Write a 30-second TikTok UGC script from an EcoBottle employee (not a paid creator)
  addressing the crisis. This is NOT a paid ad — it's a human from the company
  talking directly to the community.

  The stakes are high: this script either rebuilds trust or makes things worse.

assertions:
  - type: llm_judge
    criteria: "The script takes genuine accountability — doesn't blame users, doesn't minimize the issue, doesn't use corporate deflection language. Acknowledges the mold problem directly and honestly"
    weight: 0.25
    description: "Takes genuine accountability"
  - type: llm_judge
    criteria: "The response includes concrete remediation actions (batch identification, straw redesign, free replacements) — shows the company is doing something, not just apologizing"
    weight: 0.25
    description: "Concrete remediation actions communicated"
  - type: llm_judge
    criteria: "The employee persona feels human and genuine — not a PR-scripted corporate response but a real person who cares. The vulnerability and directness feel appropriate for TikTok crisis communication"
    weight: 0.25
    description: "Human, genuine employee voice"
  - type: llm_judge
    criteria: "The script strikes the right tone for crisis communication on TikTok — serious enough to show they care, but not so dramatic that it becomes meme-worthy or looks like performative corporate grief"
    weight: 0.25
    description: "Right tone: serious but not performative"
