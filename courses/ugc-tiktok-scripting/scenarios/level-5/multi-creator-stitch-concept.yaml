meta:
  id: multi-creator-stitch-concept
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "Multi-creator stitch/duet concept with complex narrative"
  tags: [ugc, stitch, duet, multi-creator, advanced]

state: {}

trigger: |
  Design a multi-creator TikTok campaign for "SharePlate" — a food sharing app
  that connects neighbors to share home-cooked meals. Free to use.

  Create a stitch-chain concept involving 3 creators that tells a connected story:

  CREATOR 1 (30 sec): The setup — introduces a problem or question
  CREATOR 2 (30 sec): Stitches Creator 1 — adds to the narrative
  CREATOR 3 (30 sec): Stitches Creator 2 — delivers the payoff + CTA

  Write all three scripts. The chain must:
  - Work as a stitch chain (each video makes sense stitched to the previous)
  - Each individual video must ALSO work standalone (if someone sees just one)
  - Build a narrative that's more powerful together than apart
  - Feel organic, not like a coordinated campaign

assertions:
  - type: llm_judge
    criteria: "All three scripts are provided and form a coherent stitch chain — each one responds to and builds on the previous, with a clear narrative progression from setup to payoff"
    weight: 0.25
    description: "Three scripts form coherent stitch chain"
  - type: llm_judge
    criteria: "Each individual video also works as standalone content — a viewer who sees only Creator 2's video would still find it engaging and understand the core message without needing context from Creator 1"
    weight: 0.25
    description: "Each video works standalone"
  - type: llm_judge
    criteria: "The combined narrative is genuinely more powerful than any single video — the chain adds up to something greater, whether through escalating emotion, building a surprise, or creating a community feeling"
    weight: 0.25
    description: "Chain is greater than sum of parts"
  - type: llm_judge
    criteria: "The chain feels organic rather than coordinated — each creator has a distinct voice and the stitches feel like genuine reactions/additions, not scripted corporate collaboration"
    weight: 0.25
    description: "Feels organic, not coordinated campaign"
