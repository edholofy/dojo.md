meta:
  id: outperform-competitor-viral
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "Script designed to outperform a specific competitor's viral video"
  tags: [ugc, competitive, viral-strategy, analysis]

state: {}

trigger: |
  "FoamRoller Pro" ($44.99) — a competitor "RollRelief" had a viral TikTok (4.1M views)
  with this script approach:
  - Hook: "POV: your physical therapist shows you the one thing you need"
  - Body: PT demonstrates 3 exercises with the roller
  - CTA: "Link in bio, you'll thank me later"
  - Why it worked: authority figure (PT), specific exercises, POV format

  Write a 30-second UGC script for FoamRoller Pro that:
  1. Analyzes why the competitor's video worked (include brief analysis)
  2. Creates a script that takes a DIFFERENT angle (don't copy the same format)
  3. Has equal or higher viral potential for a different reason
  4. Explains your strategic differentiation

assertions:
  - type: llm_judge
    criteria: "The competitive analysis correctly identifies why the competitor's video worked (authority, specificity, POV format) and shows genuine understanding of TikTok viral mechanics"
    weight: 0.20
    description: "Accurate competitive analysis"
  - type: llm_judge
    criteria: "The new script takes a genuinely DIFFERENT creative angle — not a slight variation of the competitor's PT/exercise approach but a fundamentally different hook, format, or emotional appeal"
    weight: 0.25
    description: "Genuinely different creative angle"
  - type: llm_judge
    criteria: "The strategic differentiation is smart and well-reasoned — explains why this different angle could perform equally well or better, based on TikTok dynamics (relatability, shareability, comment-bait, duet potential)"
    weight: 0.25
    description: "Smart strategic differentiation"
  - type: llm_judge
    criteria: "The script itself has genuine viral potential — it leverages a different TikTok mechanic (humor, controversy, transformation, trend-jacking) that could organically reach millions"
    weight: 0.30
    description: "Script has genuine viral potential"
