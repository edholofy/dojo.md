meta:
  id: regulated-cbd-product
  level: 5
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a CBD product navigating TikTok's strict substance policies"
  tags: [ugc, cbd, regulation, platform-policy]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "CalmLeaf" CBD gummies ($34.99/bottle).
  The product is 100% legal (hemp-derived, <0.3% THC), third-party lab tested.

  CRITICAL CONSTRAINTS:
  - TikTok's ad policy PROHIBITS direct promotion of CBD/cannabis products
  - However, organic (non-paid) content about CBD exists in a gray area
  - You cannot make health claims about CBD (FDA hasn't approved it for most uses)
  - Many CBD TikToks get taken down or shadowbanned

  Navigate this minefield. Write a script that:
  - Promotes the product without triggering TikTok's content moderation
  - Avoids health/medical claims
  - Is honest about what CBD is without being vague
  - Includes a note about the platform risk and recommended posting strategy

assertions:
  - type: llm_judge
    criteria: "The script navigates TikTok's CBD content restrictions intelligently — uses strategies like focusing on the creator's routine, lifestyle framing, or wellness context rather than direct product promotion that would trigger moderation"
    weight: 0.25
    description: "Navigates platform restrictions intelligently"
  - type: llm_judge
    criteria: "No medical or health claims are made — the script uses only experiential language and doesn't claim CBD treats, cures, or prevents any condition"
    weight: 0.25
    description: "Zero medical/health claims"
  - type: llm_judge
    criteria: "The included note about platform risk and posting strategy shows genuine expertise — mentions specific tactics (avoiding certain words, organic vs. paid distinction, backup strategies for content removal)"
    weight: 0.25
    description: "Expert platform risk strategy included"
  - type: llm_judge
    criteria: "Despite all the restrictions, the script still effectively communicates what the product is and why someone would buy it — the compliance doesn't render the script toothless"
    weight: 0.25
    description: "Effective promotion despite heavy restrictions"
