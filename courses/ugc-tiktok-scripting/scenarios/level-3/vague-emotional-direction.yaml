meta:
  id: vague-emotional-direction
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Brief with vague emotional direction that needs interpretation"
  tags: [ugc, vague-brief, emotional, interpretation]

state: {}

trigger: |
  Client brief for "SoulPrint" — a custom jewelry brand that turns pet photos
  into engraved pendants. Price: $45-$75 depending on style.

  Client's entire creative direction: "We want people to FEEL something.
  Make it emotional. Make them cry. Our product is about love and connection.
  That's all the direction we're giving — we trust you."

  Write a 30-second TikTok UGC script that delivers genuine emotion without
  being emotionally manipulative or cheesy.

assertions:
  - type: llm_judge
    criteria: "The script generates genuine emotion — the viewer feels something real about the bond between a person and their pet, not through manipulation (sad music cues, guilt) but through an authentic emotional moment"
    weight: 0.30
    description: "Generates genuine, non-manipulative emotion"
  - type: llm_judge
    criteria: "The emotional approach is specific, not generic — tells a particular story or captures a particular moment rather than vaguely gesturing at 'love and connection'"
    weight: 0.25
    description: "Specific emotional story, not generic sentiment"
  - type: llm_judge
    criteria: "The script avoids cheesy or greeting-card territory — the emotion comes from authenticity and specificity, not from overwrought language or clichéd pet-owner sentiments"
    weight: 0.25
    description: "Avoids cheesy greeting-card territory"
  - type: llm_judge
    criteria: "The product (custom pet pendant) is naturally integrated into the emotional narrative — it serves as the emotional climax or physical embodiment of the feeling, not an afterthought"
    weight: 0.20
    description: "Product is the emotional anchor of the narrative"
