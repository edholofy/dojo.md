meta:
  id: vague-make-it-viral
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Handle a vague 'make it viral' brief with no specific direction"
  tags: [ugc, vague-brief, viral, judgment]

state: {}

trigger: |
  Client brief from a new DTC candle brand called "MoodLit":
  "Hey! We just launched and we need a TikTok that goes viral. Our candles are $28
  and come in 6 scents. We want something fun and shareable. Make it pop! No specific
  format preference — just make it amazing. Budget for one creator. Thanks!"

  Write a 30-second UGC script based on this brief. You'll need to make creative
  decisions about format, hook style, target audience, and angle since the brief
  doesn't specify these.

assertions:
  - type: llm_judge
    criteria: "The agent made clear creative decisions rather than asking for more information — chose a specific format, angle, and target audience, and the choices are smart for a new DTC candle brand on TikTok"
    weight: 0.25
    description: "Made smart creative decisions from vague brief"
  - type: llm_judge
    criteria: "The chosen format/angle has actual viral potential on TikTok — leverages a trending format, relatable hook, or shareable concept rather than a generic product showcase"
    weight: 0.30
    description: "Format has genuine viral potential"
  - type: llm_judge
    criteria: "The script plays to candles' strengths on TikTok (aesthetic/visual appeal, mood, self-care, ASMR potential, scent descriptions) rather than treating it like any generic product"
    weight: 0.25
    description: "Leverages candle-specific TikTok appeal"
  - type: llm_judge
    criteria: "Despite the vague brief, the script has a clear, focused concept — doesn't try to do everything at once or cram in all 6 scents"
    weight: 0.20
    description: "Focused concept, not everything at once"
