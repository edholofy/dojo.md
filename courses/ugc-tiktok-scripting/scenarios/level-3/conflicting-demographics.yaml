meta:
  id: conflicting-demographics
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Brief with conflicting target demographics that need resolution"
  tags: [ugc, demographics, conflict, judgment]

state: {}

trigger: |
  Client brief for "FamilyBoard" — a digital family organizer app ($6.99/month):

  "Target audience: Gen Z AND parents of school-age kids."

  These demographics barely overlap. Gen Z (18-28) are mostly NOT parents of
  school-age kids. Parents of school-age kids are mostly millennials/Gen X (30-45).

  Write a 30-second TikTok UGC script. You need to decide:
  - Which audience to prioritize (or find a bridging angle)
  - How to handle the conflicting brief
  - What creator persona makes sense

  Include a brief note before the script explaining your strategic decision.

assertions:
  - type: llm_judge
    criteria: "The agent recognized the demographic conflict and made a clear, justified strategic decision — either chose one audience, found a bridging demographic (older Gen Z parents), or explained a dual-content strategy"
    weight: 0.30
    description: "Recognized conflict and made strategic decision"
  - type: llm_judge
    criteria: "The strategic note before the script demonstrates genuine understanding of why 'Gen Z AND parents of school-age kids' is contradictory and shows thoughtful audience analysis"
    weight: 0.20
    description: "Strategic note shows audience analysis depth"
  - type: llm_judge
    criteria: "The actual script is tailored to the chosen audience — the hook, language, scenarios, and creator persona all align with the strategic decision made"
    weight: 0.25
    description: "Script execution matches strategic decision"
  - type: llm_judge
    criteria: "The script still effectively sells the family organizer app — the demographic navigation doesn't come at the cost of a weak or unfocused sales message"
    weight: 0.25
    description: "Strong sales message despite demographic challenge"
