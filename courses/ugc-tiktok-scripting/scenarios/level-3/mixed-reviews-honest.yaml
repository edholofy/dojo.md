meta:
  id: mixed-reviews-honest
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a product with mixed reviews that must be honest yet promotional"
  tags: [ugc, honesty, mixed-reviews, judgment]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "AirPure" portable air purifier ($79).
  Context: The product has 3.8 stars on Amazon. Common complaints: it's louder than
  expected on high settings, and the filter replacement ($25 every 3 months) adds up.
  Common praise: noticeably reduces dust and pet dander, sleek design, great on low/medium.

  The brand wants an honest UGC review — they believe transparency builds trust.
  But the script still needs to make people want to buy it.
  Navigate the balance between honesty and promotion.

assertions:
  - type: llm_judge
    criteria: "The script acknowledges at least one real drawback (noise or filter cost) honestly rather than ignoring negative aspects entirely — demonstrates genuine transparency"
    weight: 0.25
    description: "Honestly acknowledges at least one real drawback"
  - type: llm_judge
    criteria: "The drawback is framed constructively — acknowledged but contextualized (e.g., 'it's louder on high but I only use medium' or 'filters add up but less than allergy meds') rather than just listed as a negative"
    weight: 0.25
    description: "Drawback framed constructively, not just negative"
  - type: llm_judge
    criteria: "Despite the honesty, the overall script still makes a compelling case to buy — the positives clearly outweigh the negatives and the viewer understands who this product IS right for"
    weight: 0.30
    description: "Overall compelling despite honest drawbacks"
  - type: llm_judge
    criteria: "The honest approach actually builds credibility — the viewer would trust this creator MORE because they mentioned downsides, making the positive claims more believable"
    weight: 0.20
    description: "Honesty builds trust and credibility"
