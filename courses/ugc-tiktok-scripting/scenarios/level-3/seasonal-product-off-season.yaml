meta:
  id: seasonal-product-off-season
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a seasonal product being promoted outside its peak season"
  tags: [ugc, seasonal, off-season, creative-angle]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "FrostGuard" heated gloves ($49.99).
  The catch: it's July. The client wants to start building awareness now for
  the winter season.

  You need to find a creative angle that makes heated gloves relevant in summer
  on TikTok. A straightforward "buy heated gloves" pitch won't work in July.

  Think creatively about WHY someone would engage with winter product content
  in summer.

assertions:
  - type: llm_judge
    criteria: "The script finds a creative angle that makes heated gloves genuinely relevant or engaging in summer — such as over-airconditioned offices, planning ahead, 'things I'm buying before winter,' travel to cold destinations, or humorous contrast"
    weight: 0.30
    description: "Creative angle makes product relevant in summer"
  - type: llm_judge
    criteria: "The hook acknowledges the off-season timing rather than ignoring it — uses the 'why is she talking about gloves in July?' reaction as a feature, not a bug"
    weight: 0.25
    description: "Leans into off-season timing as a hook"
  - type: llm_judge
    criteria: "The script would actually generate engagement on TikTok in summer — it's not just technically solving the brief but would genuinely perform well as content"
    weight: 0.25
    description: "Would actually perform well as summer content"
  - type: llm_judge
    criteria: "Despite the creative angle, the product features (heated, gloves, $49.99) are still clearly communicated so viewers remember the product when winter comes"
    weight: 0.20
    description: "Product features still clearly communicated"
