meta:
  id: luxury-in-ugc-format
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a luxury item using UGC's typically casual format"
  tags: [ugc, luxury, format-tension, judgment]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "Maison Lumière" — a luxury scented
  candle brand. Price: $85 for a single candle. Target: aspirational luxury buyers
  (25-35) who browse TikTok.

  The challenge: UGC is inherently casual and raw, but luxury brands need to feel
  premium and exclusive. A too-casual UGC script could cheapen the brand.
  A too-polished script defeats the purpose of UGC.

  Find the sweet spot between TikTok-native authenticity and luxury brand elevation.

assertions:
  - type: llm_judge
    criteria: "The script strikes a balance between UGC authenticity and luxury elevation — feels like a real person genuinely in love with a premium product, not a commercial but also not a budget haul video"
    weight: 0.30
    description: "Balance between casual UGC and luxury feel"
  - type: llm_judge
    criteria: "The language is elevated but not pretentious — uses sensory descriptions and aspirational language appropriate for luxury without sounding like a magazine ad or using over-the-top French phrases"
    weight: 0.25
    description: "Elevated language without pretension"
  - type: llm_judge
    criteria: "The $85 price is justified through the script — whether through unboxing experience, scent description, quality details, or lifestyle framing, the viewer understands why it's worth 3x a normal candle"
    weight: 0.25
    description: "Price justified through script narrative"
  - type: llm_judge
    criteria: "The script would feel at home on TikTok — it's not a YouTube luxury review transplanted to TikTok, but uses TikTok-native pacing and format while maintaining premium positioning"
    weight: 0.20
    description: "TikTok-native despite luxury positioning"
