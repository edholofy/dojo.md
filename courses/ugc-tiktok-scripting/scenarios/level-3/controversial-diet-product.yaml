meta:
  id: controversial-diet-product
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Navigate scripting for a potentially controversial diet product"
  tags: [ugc, diet, controversial, sensitivity]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "SlimBlend" — a meal replacement shake
  marketed for weight management. Price: $44.99 for 14 servings.
  The product is FDA-compliant and nutritionally complete (25g protein, vitamins, fiber).

  This is sensitive territory on TikTok. The script must:
  - Promote the product WITHOUT promoting diet culture or unhealthy body image
  - Focus on convenience and nutrition, NOT weight loss as the primary benefit
  - Avoid before/after body comparisons
  - Be mindful that TikTok's young audience includes people with eating disorders

  Make it appealing while being responsible.

assertions:
  - type: llm_judge
    criteria: "The script focuses on convenience and nutrition as primary benefits — does NOT center weight loss, does NOT include before/after body references, and does NOT use phrases like 'get skinny,' 'lose weight fast,' or 'summer body'"
    weight: 0.30
    description: "Focuses on nutrition/convenience, not weight loss"
  - type: llm_judge
    criteria: "The script is mindful of eating disorder sensitivity — doesn't glorify meal skipping, calorie restriction, or frame food as the enemy. Positions the shake as adding nutrition, not restricting food"
    weight: 0.25
    description: "ED-sensitive framing"
  - type: llm_judge
    criteria: "Despite the careful navigation, the script is still genuinely appealing and makes viewers want the product — it doesn't become so cautious that it loses all promotional energy"
    weight: 0.25
    description: "Still appealing despite careful navigation"
  - type: llm_judge
    criteria: "The script's angle (busy lifestyle, quick nutrition, tastes good) gives TikTok viewers a positive reason to engage rather than triggering community backlash about diet culture"
    weight: 0.20
    description: "Angle avoids diet culture backlash risk"
