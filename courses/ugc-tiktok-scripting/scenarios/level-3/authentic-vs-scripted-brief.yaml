meta:
  id: authentic-vs-scripted-brief
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Brief asks for 'authentic' content but provides an overly scripted brand message"
  tags: [ugc, authenticity, brand-conflict, judgment]

state: {}

trigger: |
  Client brief for "AquaFresh" reusable water filter bottle ($35):

  "We want authentic, organic-feeling UGC that doesn't look like an ad."

  But then they provide this mandatory copy:
  "AquaFresh's patented 5-stage filtration system delivers hospital-grade water
  purification with our proprietary NanoClean™ technology, providing up to 99.9%
  contaminant removal certified by NSF International."

  Write a 30-second TikTok UGC script that incorporates the brand's key message
  but makes it actually sound like a real person talking. You need to translate
  their corporate copy into authentic UGC language while keeping the core claims intact.

assertions:
  - type: llm_judge
    criteria: "The core claims from the mandatory copy are preserved (multi-stage filtration, high purity, certification) but translated into natural, conversational language a real person would use"
    weight: 0.30
    description: "Core claims kept but translated to natural language"
  - type: llm_judge
    criteria: "The script genuinely sounds like authentic UGC, not a corporate press release — a viewer would NOT immediately think 'this is an ad' in the first 3 seconds"
    weight: 0.30
    description: "Genuinely sounds like organic UGC"
  - type: llm_judge
    criteria: "Technical terms like 'NanoClean™' and 'NSF International' are either simplified, contextualized, or mentioned in a way that feels natural for a casual creator (not robotically inserted)"
    weight: 0.20
    description: "Technical terms handled naturally"
  - type: llm_judge
    criteria: "The script resolves the tension between the brief's contradictory requirements (authentic BUT mandatory corporate copy) in a way that would satisfy both the brand's message needs and TikTok audience expectations"
    weight: 0.20
    description: "Successfully resolves brief's internal contradiction"
