meta:
  id: boring-product-insurance
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Make a boring product category entertaining for TikTok"
  tags: [ugc, insurance, boring-product, creative-challenge]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "Lemonade" renters insurance.
  Price: starts at $5/month. Target: young renters (22-30) who think insurance is
  boring and unnecessary.

  The challenge: insurance is one of the most boring product categories imaginable.
  The script needs to make renters insurance actually entertaining and engaging
  on TikTok while communicating why young renters need it.

  Make the audience care about something they actively don't want to think about.

assertions:
  - type: llm_judge
    criteria: "The script makes insurance genuinely entertaining for TikTok — uses humor, a relatable scenario, storytelling, or a creative hook that would actually stop young people from scrolling past an insurance ad"
    weight: 0.30
    description: "Makes insurance genuinely entertaining"
  - type: llm_judge
    criteria: "The script creates a 'wait, I actually need this' moment — communicates the real risk of not having renters insurance through a specific, relatable scenario (apartment flood, theft, fire) not abstract fear-mongering"
    weight: 0.25
    description: "Creates genuine 'I need this' realization"
  - type: llm_judge
    criteria: "The $5/month price point is positioned as a no-brainer — compared to something the audience already spends money on (coffee, streaming subscription, etc.) to contextualize the value"
    weight: 0.25
    description: "Price positioned as obvious no-brainer"
  - type: llm_judge
    criteria: "The script doesn't try to make insurance itself cool — instead, it makes the SITUATION relatable and the SOLUTION easy, which is the right strategy for a boring product"
    weight: 0.20
    description: "Right strategy: relatable situation, easy solution"
