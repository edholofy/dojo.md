meta:
  id: humor-for-serious-product
  level: 3
  course: ugc-tiktok-scripting
  type: output
  description: "Brief asks for humor but the product is serious (security cameras)"
  tags: [ugc, humor, serious-product, tone-mismatch]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "WatchDog" home security camera system.
  Price: $199 for a 3-camera kit. Target: homeowners and renters 25-40.

  The client specifically requests: "Make it funny! We want humor, not fear-based
  marketing. No scary break-in footage or paranoia tactics."

  The challenge: home security is inherently about safety/fear, but the client
  wants humor. Find the comedy angle without trivializing home security
  or making light of actual break-ins.

assertions:
  - type: llm_judge
    criteria: "The script is genuinely funny — uses humor that would make TikTok viewers laugh or smile, not just mildly amusing corporate attempts at comedy"
    weight: 0.25
    description: "Genuinely funny, not just mildly amusing"
  - type: llm_judge
    criteria: "The humor doesn't trivialize home security or make light of actual break-ins/theft — finds comedy in adjacent territory (catching pets doing weird things, checking the camera obsessively, package theft paranoia) rather than in crime itself"
    weight: 0.30
    description: "Humor doesn't trivialize security concerns"
  - type: llm_judge
    criteria: "Despite the humorous tone, the product's actual value (home security, peace of mind, camera quality) still comes through — the viewer understands what the product does and why it's worth $199"
    weight: 0.25
    description: "Product value still clear through humor"
  - type: llm_judge
    criteria: "The comedy approach actually makes the product MORE approachable and appealing than a fear-based approach would — the humor serves a strategic purpose"
    weight: 0.20
    description: "Humor makes product more approachable"
