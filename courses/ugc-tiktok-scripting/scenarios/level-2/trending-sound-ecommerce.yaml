meta:
  id: trending-sound-ecommerce
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Write a script designed to work with a trending TikTok sound format"
  tags: [ugc, trending, sound, ecommerce]

state: {}

trigger: |
  Write a 20-second TikTok UGC script for "LumiDesk" LED desk lamp ($34.99).
  The script must work with the trending "Oh no, oh no no no" sound format where
  creators show a problem, then the beat drops and the solution appears.

  Structure for this sound:
  - First 5 sec: Show the problem (text overlay + creator reaction)
  - Beat drop at 5 sec: Cut to the solution/product reveal
  - Remaining 15 sec: Quick product showcase with text overlays

  The script should include both spoken words AND text overlay directions.

assertions:
  - type: llm_judge
    criteria: "The script is structured specifically for the 'Oh no' sound format — clearly marks the problem phase (first 5 seconds) and the solution reveal at the beat drop, showing understanding of how this trending sound works"
    weight: 0.30
    description: "Correctly structured for the specific sound format"
  - type: llm_judge
    criteria: "The script includes both spoken dialogue AND text overlay directions clearly distinguished from each other (using brackets, labels, or formatting)"
    weight: 0.25
    description: "Includes both spoken words and text overlay cues"
  - type: llm_judge
    criteria: "The problem shown in the first 5 seconds is relatable and desk-lamp relevant (bad lighting for video calls, eye strain, messy desk aesthetic) — not generic"
    weight: 0.25
    description: "Relatable problem tied to desk lighting"
  - type: llm_judge
    criteria: "The product reveal at the beat drop is visually satisfying as described — the transition from problem to solution feels like a dramatic, shareable moment"
    weight: 0.20
    description: "Beat-drop product reveal is dramatic and satisfying"
