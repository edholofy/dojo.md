meta:
  id: supplement-health-claims
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a supplement brand while navigating health claim restrictions"
  tags: [ugc, supplements, health-claims, compliance]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "ZenCalm" magnesium supplement.
  Price: $29.99/month. Target: health-conscious millennials who struggle with sleep.
  IMPORTANT: The FTC requires that supplement ads cannot make medical claims.
  You must NOT say it "cures insomnia" or "treats anxiety." Use experiential
  language only (how the creator feels, their personal experience).
  Include the product's key benefit: helps with relaxation and better sleep quality.

assertions:
  - type: llm_judge
    criteria: "The script avoids all medical/health claims — does NOT say the product 'cures,' 'treats,' 'prevents,' or 'heals' any condition. Uses only first-person experiential language ('I feel,' 'I noticed,' 'for me')"
    weight: 0.30
    description: "No medical claims, experiential language only"
  - type: llm_judge
    criteria: "Despite the compliance constraints, the script is still compelling and persuasive — the personal experience shared makes the audience want to try the product"
    weight: 0.25
    description: "Compelling despite compliance constraints"
  - type: llm_judge
    criteria: "The hook addresses a specific sleep-related pain point that millennials relate to (doom scrolling at 2am, racing thoughts, exhaustion cycle) not just 'can't sleep'"
    weight: 0.25
    description: "Hook uses specific millennial sleep pain point"
  - type: llm_judge
    criteria: "The script maintains TikTok's casual, authentic tone while still respecting the compliance requirements — doesn't become stiff or overly cautious"
    weight: 0.20
    description: "Stays casual despite compliance constraints"
