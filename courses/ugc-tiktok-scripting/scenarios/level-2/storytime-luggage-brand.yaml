meta:
  id: storytime-luggage-brand
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Write a storytime-format script for a luggage brand with specific brand voice"
  tags: [ugc, travel, storytime, brand-voice]

state: {}

trigger: |
  Write a 45-second TikTok UGC script for "Nomad & Co" carry-on luggage.
  Format: Storytime. Price: $189. Brand voice: witty, slightly sarcastic, adventure-loving.
  The creator tells the story of how their old suitcase broke at the airport and
  discovering Nomad & Co saved their trip.

  Brand voice examples: "Because adulting means owning luggage that doesn't betray
  you at baggage claim" and "Wanderlust with a warranty."

assertions:
  - type: llm_judge
    criteria: "The script matches the specified brand voice: witty, slightly sarcastic, and adventure-loving — uses humor and cleverness consistent with the provided brand voice examples"
    weight: 0.30
    description: "Matches witty/sarcastic brand voice"
  - type: llm_judge
    criteria: "The storytime format is engaging — has a clear narrative arc (setup of the old suitcase disaster, the crisis moment, the discovery of the product, the resolution) that keeps viewers watching"
    weight: 0.25
    description: "Engaging storytime narrative arc"
  - type: llm_judge
    criteria: "The script fits 45 seconds when spoken aloud (approximately 110-120 words) and maintains pacing that doesn't feel rushed or dragged out"
    weight: 0.20
    description: "Appropriate length for 45-second format"
  - type: llm_judge
    criteria: "The product mention feels like a natural plot point in the story rather than an interruption — the transition from 'my suitcase broke' to 'I found this brand' is smooth"
    weight: 0.25
    description: "Product mention is a natural story beat"
