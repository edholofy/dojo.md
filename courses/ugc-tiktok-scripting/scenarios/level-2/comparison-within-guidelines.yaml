meta:
  id: comparison-within-guidelines
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Comparison script that stays within TikTok's competitive ad guidelines"
  tags: [ugc, comparison, guidelines, competitors]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "BlendJet" portable blender ($49.95).
  Format: Comparison with regular full-size blenders.
  CONSTRAINTS:
  - Do NOT name any specific competitor brands (TikTok ad policy)
  - Do NOT make false claims about competitors
  - Focus on what BlendJet does better (portability, USB charging, easy cleanup)
    rather than bashing what others do worse
  Creator is a gym-goer who makes protein shakes.

assertions:
  - type: llm_judge
    criteria: "The script compares effectively WITHOUT naming any specific competitor brands — uses generic references like 'my old blender' or 'regular blenders' instead of brand names"
    weight: 0.30
    description: "No competitor brands named"
  - type: llm_judge
    criteria: "The comparison is positive-focused — highlights what BlendJet does well (portability, USB charging, easy cleanup) rather than bashing competitors"
    weight: 0.25
    description: "Positive comparison, not competitor bashing"
  - type: llm_judge
    criteria: "The gym-goer persona is authentic — the comparison scenarios are specific to gym/fitness life (making shakes at the gym, after workouts, on the go) not generic kitchen use"
    weight: 0.25
    description: "Comparison scenarios specific to gym life"
  - type: llm_judge
    criteria: "The script creates a clear 'aha moment' where viewers realize the product solves a problem they didn't know they had"
    weight: 0.20
    description: "Creates an aha moment about portability"
