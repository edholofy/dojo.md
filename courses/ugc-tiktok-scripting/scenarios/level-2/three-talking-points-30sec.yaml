meta:
  id: three-talking-points-30sec
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Hit exactly 3 specific talking points within a tight 30-second script"
  tags: [ugc, constraints, talking-points, tight-format]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "CloudRest" memory foam pillow.
  Price: $45. You MUST hit exactly these 3 talking points in order:
  1. The pillow is hypoallergenic (safe for sensitive skin and allergies)
  2. It has a cooling gel layer (doesn't trap heat like regular memory foam)
  3. It comes with a 100-night free trial (risk-free purchase)

  All three must feel natural, not like a bullet-point list read aloud.
  Creator persona: someone who's tried "every pillow on the internet."

assertions:
  - type: llm_judge
    criteria: "All three talking points (hypoallergenic, cooling gel layer, 100-night trial) are present in the script in the specified order without any being skipped"
    weight: 0.30
    description: "All 3 talking points present in correct order"
  - type: llm_judge
    criteria: "The talking points flow naturally within a conversational narrative — they don't sound like a feature list being read aloud but rather discoveries or benefits the creator genuinely cares about"
    weight: 0.30
    description: "Talking points woven naturally into conversation"
  - type: llm_judge
    criteria: "The 'tried every pillow' persona is authentic and relatable — establishes credibility through specific references to past pillow frustrations"
    weight: 0.20
    description: "Pillow-obsessed persona feels credible"
  - type: llm_judge
    criteria: "Script fits 30 seconds (75-80 words) despite needing to cover three distinct points — nothing feels rushed or crammed"
    weight: 0.20
    description: "Fits 30 seconds without feeling crammed"
