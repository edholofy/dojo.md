meta:
  id: finance-app-compliance
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a finance app with regulatory compliance requirements"
  tags: [ugc, finance, compliance, app]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "PennyWise" — a budgeting app.
  Price: Free with $4.99/month premium. Target: Gen Z first-jobbers.
  COMPLIANCE REQUIREMENTS:
  - Must include "Not financial advice" disclaimer naturally
  - Cannot guarantee specific savings amounts
  - Cannot imply the app replaces a financial advisor
  Share the creator's personal budgeting journey using the app.

assertions:
  - type: llm_judge
    criteria: "All three compliance requirements are met: includes a natural 'not financial advice' mention, makes no specific savings guarantees, and doesn't position the app as replacing professional financial advice"
    weight: 0.30
    description: "All compliance requirements met"
  - type: llm_judge
    criteria: "The disclaimer feels natural within the script flow — woven into the dialogue rather than awkwardly bolted on at the end like legal fine print"
    weight: 0.20
    description: "Disclaimer integrated naturally"
  - type: llm_judge
    criteria: "The script speaks authentically to Gen Z first-jobbers — references relatable financial moments (first paycheck confusion, rent shock, subscription creep) with age-appropriate language"
    weight: 0.25
    description: "Authentic Gen Z first-job financial voice"
  - type: llm_judge
    criteria: "Despite compliance constraints, the app's value is clearly communicated through the creator's personal story — viewers understand what the app does and why they'd want it"
    weight: 0.25
    description: "App value clear through personal story"
