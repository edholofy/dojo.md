meta:
  id: problem-agitation-solution
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Write a PAS-format script for an acne treatment product"
  tags: [ugc, skincare, PAS, acne]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "ClearSkin" acne patch set.
  Price: $12.99 for 36 patches. Use the Problem-Agitation-Solution (PAS) framework:
  1. Problem: Identify a specific acne frustration
  2. Agitation: Make the viewer feel the pain deeply
  3. Solution: Introduce the product as the answer

  Creator is a 20-something who dealt with hormonal acne.
  Must NOT shame people for having acne — empathetic, not judgmental.

assertions:
  - type: llm_judge
    criteria: "The PAS framework is clearly executed: there's a distinct Problem statement, an Agitation that deepens the emotional pain, and a Solution that positions the product as the answer"
    weight: 0.25
    description: "Clear PAS framework execution"
  - type: llm_judge
    criteria: "The agitation phase is empathetic, not shame-based — it connects with the emotional frustration of acne (canceling plans, feeling self-conscious, trying everything) without making viewers feel bad about their skin"
    weight: 0.30
    description: "Empathetic agitation, no skin-shaming"
  - type: llm_judge
    criteria: "The script feels like a personal story from someone who genuinely struggled with hormonal acne — includes specific, relatable details that build credibility"
    weight: 0.25
    description: "Authentic personal acne journey"
  - type: llm_judge
    criteria: "The solution/product introduction provides genuine relief after the emotional build-up — the transition from agitation to solution feels cathartic, not jarring"
    weight: 0.20
    description: "Cathartic transition from agitation to solution"
