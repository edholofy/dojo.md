meta:
  id: gen-z-sustainable-fashion
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Script targeting Gen Z for a sustainable fashion brand"
  tags: [ugc, sustainability, gen-z, fashion]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "ReThread" — a sustainable fashion brand
  that makes clothes from recycled ocean plastic. Hoodie price: $65.
  Target: Gen Z (18-24) who care about sustainability but are price-conscious.

  The creator must:
  - Address the "sustainable fashion is expensive" objection head-on
  - Avoid greenwashing vibes (don't oversell the environmental impact)
  - Use Gen Z language naturally (not cringe corporate attempts at slang)
  - Show the actual product quality, not just the sustainability story

assertions:
  - type: llm_judge
    criteria: "The script addresses the price objection directly and convincingly — explains why $65 is worth it (cost per wear, durability, vs. fast fashion replacement cycle) without being defensive"
    weight: 0.25
    description: "Price objection addressed convincingly"
  - type: llm_judge
    criteria: "The sustainability messaging is honest and proportionate — mentions the ocean plastic origin without exaggerating impact. Avoids greenwashing phrases like 'saving the planet' or 'eco-warrior'"
    weight: 0.25
    description: "Honest sustainability claims, no greenwashing"
  - type: llm_judge
    criteria: "The Gen Z language feels natural and current — not a corporate brand's cringey attempt at youth slang. If slang is used, it's appropriate and not forced"
    weight: 0.25
    description: "Natural Gen Z voice, not corporate cringe"
  - type: llm_judge
    criteria: "The script balances sustainability story with actual product quality — shows the hoodie looks good and feels good to wear, not just that it's ethical"
    weight: 0.25
    description: "Product quality shown alongside sustainability"
