meta:
  id: urgency-subscription-box
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Script with urgency/scarcity elements for a subscription box"
  tags: [ugc, subscription, urgency, scarcity]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "StyleBox" — a monthly fashion subscription
  box ($39/month). They're running a limited promotion: first box for $19 (50% off)
  and only 500 spots available this month.

  Create urgency WITHOUT being manipulative or using fake scarcity tactics.
  The creator just received their box and is genuinely excited.
  Target audience: women 22-30 who love discovering new brands.

assertions:
  - type: llm_judge
    criteria: "The urgency feels genuine and specific (mentions the actual deal: $19 first box, 500 spots) rather than using generic fake-scarcity language like 'HURRY before it's too late!!!' or 'going fast!!!'"
    weight: 0.30
    description: "Genuine urgency, not manipulative scarcity"
  - type: llm_judge
    criteria: "The excitement about the box contents comes first — the creator genuinely shows what they got before pivoting to the deal. The value proposition is demonstrated, not just claimed"
    weight: 0.25
    description: "Box contents shown before deal pitch"
  - type: llm_judge
    criteria: "The CTA creates urgency through specific details (price, limited spots) combined with the demonstrated value, making the deal feel logical rather than pressured"
    weight: 0.25
    description: "CTA combines specifics with demonstrated value"
  - type: llm_judge
    criteria: "The script captures the thrill of a subscription box unboxing — the 'discovery' element of finding new brands resonates with the target audience"
    weight: 0.20
    description: "Captures subscription box discovery excitement"
