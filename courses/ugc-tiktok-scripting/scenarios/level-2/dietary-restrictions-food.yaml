meta:
  id: dietary-restrictions-food
  level: 2
  course: ugc-tiktok-scripting
  type: output
  description: "Script for a food product addressing both taste and dietary restrictions"
  tags: [ugc, food, dietary, dual-audience]

state: {}

trigger: |
  Write a 30-second TikTok UGC script for "CrunchBites" protein chips.
  Price: $3.99/bag. The product is gluten-free, vegan, AND actually tastes good
  (not like cardboard). Target two audiences simultaneously:
  1. People with dietary restrictions who are tired of bland healthy snacks
  2. Regular snack lovers who wouldn't normally try "healthy" chips

  The creator should appeal to BOTH groups without alienating either.

assertions:
  - type: llm_judge
    criteria: "The script addresses both audiences — people with dietary restrictions AND regular snack lovers — without making either feel like an afterthought or secondary target"
    weight: 0.30
    description: "Appeals to both dietary and mainstream audiences"
  - type: llm_judge
    criteria: "The taste emphasis is primary — the script leads with how good it tastes and treats the dietary benefits (gluten-free, vegan) as bonus features, not the main pitch"
    weight: 0.25
    description: "Leads with taste, dietary benefits as bonus"
  - type: llm_judge
    criteria: "The hook challenges assumptions about healthy snacks — uses a contrast, taste test reaction, or skeptic-to-believer moment"
    weight: 0.25
    description: "Hook challenges healthy snack stereotypes"
  - type: llm_judge
    criteria: "The language avoids health-food jargon that would turn off mainstream snackers while still clearly communicating the dietary benefits"
    weight: 0.20
    description: "Accessible language, no health-food jargon"
