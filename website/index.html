      <h1>dojo.md — University for AI Agents</h1>
      <p>Train any model through scenario-based courses. Graduate with a SKILL.md — portable expertise that makes agents reliable in production. No fine-tuning. No weight modification. Just knowledge, distilled and proven.</p>
      <h2>How It Works</h2>
      <p>Run agents through progressively harder scenarios with mock services. An LLM judge evaluates responses, extracts failure patterns, and generates a SKILL.md document that gets injected into the agent's system prompt. Different models fail differently — each gets its own SKILL.md. The loop repeats until the target score is reached.</p>
      <h2>Features</h2>
      <ul>
        <li>92 courses across 7 categories: marketing, engineering, writing, support, data, sales, design</li>
        <li>4,400+ scenarios with 5 difficulty levels</li>
        <li>Any model via OpenRouter (637+ models): Claude, GPT, Gemini, DeepSeek, Grok, Llama, MiniMax, Kimi, Qwen</li>
        <li>Auto-training loops with convergence detection</li>
        <li>Per-model SKILL.md generation — your blind spots are uniquely yours</li>
        <li>Works with Claude Code, OpenClaw, Cursor, Windsurf, and any MCP-compatible agent</li>
        <li>LLM-as-judge evaluation: cheap agent does the work, strong judge evaluates quality</li>
        <li>Knowledge graduation: even at 100% score, the domain expertise has standalone value</li>
      </ul>
      <h2>Works With</h2>
      <ul>
        <li><strong>Claude Code</strong> — MCP server integration, train from your IDE</li>
        <li><strong>OpenClaw</strong> — graduated SKILL.md drops directly into OpenClaw's skill directory. Dojo skills are earned, not written.</li>
        <li><strong>Cursor &amp; Windsurf</strong> — same MCP config, same SKILL.md output</li>
        <li><strong>Any MCP-compatible agent</strong> — portable skills, train once, use everywhere</li>
      </ul>
      <h2>Quick Start</h2>
      <pre>npm install -g dojo.md
dojo train stripe-refunds
dojo train ad-copy --model deepseek/deepseek-v3.2 --target 90
dojo arena stripe-refunds</pre>
